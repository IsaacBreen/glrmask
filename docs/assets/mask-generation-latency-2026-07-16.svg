<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Mask generation latency</title>
  <desc id="desc">A logarithmic horizontal bar chart comparing GLRMask and LLGuidance mask generation latency at the median, p99, p99.9, and maximum. Lower is better.</desc>
  <rect width="960" height="430" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #24292f; }
    .title { font-size: 22px; font-weight: 650; }
    .subtitle { font-size: 14px; fill: #57606a; }
    .axis { font-size: 12px; fill: #57606a; }
    .label { font-size: 14px; font-weight: 600; }
    .value { font-size: 12px; font-weight: 600; }
    .grid { stroke: #d0d7de; stroke-width: 1; }
    .glrmask { fill: #1f6feb; }
    .llguidance { fill: #8c959f; }
  </style>

  <text x="40" y="38" class="title">Mask generation latency</text>
  <text x="40" y="62" class="subtitle">MaskBench / JSONSchemaBench · logarithmic scale · lower is better</text>

  <line x1="180" y1="92" x2="180" y2="360" class="grid"/>
  <line x1="360" y1="92" x2="360" y2="360" class="grid"/>
  <line x1="540" y1="92" x2="540" y2="360" class="grid"/>
  <line x1="720" y1="92" x2="720" y2="360" class="grid"/>
  <line x1="900" y1="92" x2="900" y2="360" class="grid"/>

  <text x="180" y="382" text-anchor="middle" class="axis">1 µs</text>
  <text x="360" y="382" text-anchor="middle" class="axis">10 µs</text>
  <text x="540" y="382" text-anchor="middle" class="axis">100 µs</text>
  <text x="720" y="382" text-anchor="middle" class="axis">1 ms</text>
  <text x="900" y="382" text-anchor="middle" class="axis">10 ms</text>

  <text x="40" y="124" class="label">Median</text>
  <rect x="180" y="102" width="28" height="16" rx="3" class="glrmask"/>
  <text x="216" y="115" class="value">1.440 µs</text>
  <rect x="180" y="124" width="195" height="16" rx="3" class="llguidance"/>
  <text x="383" y="137" class="value">12.197 µs</text>

  <text x="40" y="194" class="label">p99</text>
  <rect x="180" y="172" width="129" height="16" rx="3" class="glrmask"/>
  <text x="317" y="185" class="value">5.172 µs</text>
  <rect x="180" y="194" width="431" height="16" rx="3" class="llguidance"/>
  <text x="619" y="207" class="value">246.788 µs</text>

  <text x="40" y="264" class="label">p99.9</text>
  <rect x="180" y="242" width="159" height="16" rx="3" class="glrmask"/>
  <text x="347" y="255" class="value">7.675 µs</text>
  <rect x="180" y="264" width="536" height="16" rx="3" class="llguidance"/>
  <text x="724" y="277" class="value">950.309 µs</text>

  <text x="40" y="334" class="label">Maximum</text>
  <rect x="180" y="312" width="262" height="16" rx="3" class="glrmask"/>
  <text x="450" y="325" class="value">28.565 µs</text>
  <rect x="180" y="334" width="703" height="16" rx="3" class="llguidance"/>
  <text x="891" y="347" text-anchor="end" class="value">8,041.301 µs</text>

  <rect x="40" y="402" width="14" height="14" rx="2" class="glrmask"/>
  <text x="62" y="414" class="axis">GLRMask</text>
  <rect x="190" y="402" width="14" height="14" rx="2" class="llguidance"/>
  <text x="212" y="414" class="axis">LLGuidance</text>
</svg>
