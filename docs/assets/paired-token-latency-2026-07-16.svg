<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Paired token latency in the 16 July 2026 CFA engineering run</title>
  <desc id="desc">A logarithmic horizontal bar chart comparing GLRMask native and LLGuidance native mask-plus-commit latency at the median, p99, p99.9, and maximum over 2,111,184 shared token positions. Lower is better.</desc>
  <rect width="960" height="430" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #24292f; }
    .title { font-size: 22px; font-weight: 650; }
    .subtitle { font-size: 14px; fill: #57606a; }
    .axis { font-size: 12px; fill: #57606a; }
    .label { font-size: 14px; font-weight: 600; }
    .value { font-size: 12px; font-weight: 600; }
    .grid { stroke: #d0d7de; stroke-width: 1; }
    .glrmask { fill: #1f6feb; }
    .llguidance { fill: #8c959f; }
  </style>

  <text x="40" y="38" class="title">Paired mask-plus-commit latency</text>
  <text x="40" y="62" class="subtitle">2,111,184 shared token positions · logarithmic scale · lower is better</text>

  <!-- Plot runs from x=180 (1 µs) to x=900 (10,000 µs). -->
  <line x1="180" y1="92" x2="180" y2="360" class="grid"/>
  <line x1="360" y1="92" x2="360" y2="360" class="grid"/>
  <line x1="540" y1="92" x2="540" y2="360" class="grid"/>
  <line x1="720" y1="92" x2="720" y2="360" class="grid"/>
  <line x1="900" y1="92" x2="900" y2="360" class="grid"/>

  <text x="180" y="382" text-anchor="middle" class="axis">1 µs</text>
  <text x="360" y="382" text-anchor="middle" class="axis">10 µs</text>
  <text x="540" y="382" text-anchor="middle" class="axis">100 µs</text>
  <text x="720" y="382" text-anchor="middle" class="axis">1 ms</text>
  <text x="900" y="382" text-anchor="middle" class="axis">10 ms</text>

  <text x="40" y="124" class="label">Median</text>
  <rect x="180" y="102" width="98" height="16" rx="3" class="glrmask"/>
  <text x="286" y="115" class="value">3.498 µs</text>
  <rect x="180" y="124" width="205" height="16" rx="3" class="llguidance"/>
  <text x="393" y="137" class="value">13.718 µs</text>

  <text x="40" y="194" class="label">p99</text>
  <rect x="180" y="172" width="184" height="16" rx="3" class="glrmask"/>
  <text x="372" y="185" class="value">10.522 µs</text>
  <rect x="180" y="194" width="432" height="16" rx="3" class="llguidance"/>
  <text x="620" y="207" class="value">250.070 µs</text>

  <text x="40" y="264" class="label">p99.9</text>
  <rect x="180" y="242" width="215" height="16" rx="3" class="glrmask"/>
  <text x="403" y="255" class="value">15.692 µs</text>
  <rect x="180" y="264" width="537" height="16" rx="3" class="llguidance"/>
  <text x="725" y="277" class="value">957.235 µs</text>

  <text x="40" y="334" class="label">Maximum</text>
  <rect x="180" y="312" width="305" height="16" rx="3" class="glrmask"/>
  <text x="493" y="325" class="value">49.539 µs</text>
  <rect x="180" y="334" width="703" height="16" rx="3" class="llguidance"/>
  <text x="891" y="347" text-anchor="end" class="value">8,050.274 µs</text>

  <rect x="40" y="402" width="14" height="14" rx="2" class="glrmask"/>
  <text x="62" y="414" class="axis">GLRMask native</text>
  <rect x="190" y="402" width="14" height="14" rx="2" class="llguidance"/>
  <text x="212" y="414" class="axis">LLGuidance native</text>
</svg>
