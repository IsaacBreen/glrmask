[package]
name = "glrmask"
version = "0.1.0"
edition = "2024"
description = "Grammar-constrained token masking for large language model decoding"
license = "MIT OR Apache-2.0"
readme = "README.md"
documentation = "https://docs.rs/glrmask"
repository = "https://github.com/IsaacBreen/grammars2024"
keywords = ["grammar", "llm", "decoding", "parser", "json-schema"]
categories = ["algorithms", "parsing"]
exclude = [".benchmarks/**", ".cache/**", "glrmask-runtime/**", "python/**", "scripts/**", "target/**"]

[features]
default = []

[dependencies]
rustc-hash = "1"
ahash = "0.8"
smallvec = "1"
im = "15"
range-set-blaze = "0.3.0"
hashbrown = "0.15"
once_cell = "1"

serde = { version = "1", features = ["derive", "rc"] }
bincode = "1"
serde_json = { version = "1", features = ["preserve_order"] }

rayon = "1"
dashmap = "6"
rand = "0.8"
thiserror = "1"

[dev-dependencies]
pretty_assertions = "1"

