[package]
name = "sep1"
version = "0.1.0"
edition = "2024"

[dependencies]
bimap = "0.6.3"
regex = "1.11.1"
fixedbitset = "0.5.7"
bitvec = "1.0.1"
kdam = "0.6.0"
keyed_priority_queue = "0.4.2"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.107"
chrono = "0.4.41"
indicatif = "0.17.11"
reqwest = { version = "0.12.15", features = ["blocking", "json"] }
range-set-blaze = { version = "0.1.16", default-features = false, features = ["alloc"] }

# Add the derive macro crate
json_convertible_derive = { path = "json_convertible_derive" }
profiler_macro = { path = "profiler_macro" }
deterministic-hash = "1.0.1"
crc = "3.3.0"
rand = "0.9.1"
ordered_hash_map = "0.4.0"
similar = "2.7.0"

[dev-dependencies]
reqwest = { version = "0.12.15", features = ["blocking", "json"] }

[profile.dev]
debug = true
#opt-level = 1
