[package]
name = "glrmask"
version = "0.1.0"
edition = "2024"
description = "Efficient grammar-constrained decoding for large language models"
license = "MIT OR Apache-2.0"

[dependencies]
# Core
rustc-hash = "1"
ahash = "0.8"
smallvec = "1"
im = "15"
range-set-blaze = "0.3.0"
hashbrown = "0.15"
once_cell = "1"

# Serialization
serde = { version = "1", features = ["derive", "rc"] }
bincode = "1"
serde_json = { version = "1", features = ["preserve_order"] }

# Parallelism (optional)
rayon = { version = "1", optional = true }

# Logging
tracing = "0.1"

# Error handling
thiserror = "1"

[dev-dependencies]
pretty_assertions = "1"

[features]
default = ["rayon"]
