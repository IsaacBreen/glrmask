[package]
name = "glrmask"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Grammar-constrained token masking for large language model decoding"
license = "MIT OR Apache-2.0"
repository = "https://github.com/IsaacBreen/gsg"
readme = "README.md"
keywords = ["llm", "grammar", "decoding", "automata", "json-schema"]
categories = ["algorithms", "parsing"]
include = [
    "Cargo.toml",
    "README.md",
    "LICENSE*",
    "CHANGELOG.md",
    "CONTRIBUTING.md",
    "docs/**",
    "src/**",
    "examples/**",
    "benches/**",
]
exclude = [
    "__MACOSX/**",
    "**/.DS_Store",
    ".cache/**",
    "bindings/python/.cache/**",
    "target/**",
]

[lib]
name = "glrmask"
path = "src/lib.rs"

[workspace]
resolver = "2"
members = ["bindings/python"]

[dependencies]
ahash = "0.8"
bincode = "1"
dashmap = "6"
hashbrown = "0.15"
im = "15"
once_cell = "1"
rand = "0.8"
range-set-blaze = "0.3"
rayon = "1"
regex = "1"
regex-syntax = "0.8"
rustc-hash = "1"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
smallvec = "1"
thiserror = "1"

[dev-dependencies]
criterion = "0.5"
