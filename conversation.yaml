          gss_isolated_10 = gss_i_merged.isolate(10)
          yield from _yield_state(gss_isolated_10) # should have only [10] acc 2

          # --- Test 11: reduce_acc and peek ---
          gss_rp1 = gss_class.from_stacks([([1, 2], MergeableInt(3))])
