          let productions = vec![
              prod("S", vec![t("Z_T"), t("A_PLUS_T"), t("B_T"), t("M_T")]),
              prod("S", vec![t("Z_T"), t("A_PLUS_T"), t("B_T"), t("N_T")]),
          ];

          // 4. Mappings
          let mut grammar_token_map: BiBTreeMap<Terminal, TerminalID> = BiBTreeMap::new();
