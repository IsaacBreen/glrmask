              // writeln!(f, "    Terminal Expressions (Expr to GroupID, {}):", self.definition.terminal_expr_to_group_id.len())?;
              // let mut expr_terminals_sorted: Vec<_> = self.definition.terminal_expr_to_group_id.iter().collect();
