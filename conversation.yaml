      impl GrammarConstraint {
          pub fn from_compiled_grammar(
              compiled_grammar: CompiledGrammar,
              llm_token_map: LLMTokenMap,
              _eof_token_id: LLMTokenID,
              max_original_llm_token_id: usize,
          ) -> Self {
