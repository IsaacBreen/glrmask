              // ]))
              // digit = choice([eat_u8(c) for c in range(ord("0"), ord("9") + 1)])
              // alph_lower = choice([eat_u8(c) for c in range(ord("a"), ord("z") + 1)])
              // alph_upper = choice([eat_u8(c) for c in range(ord("A"), ord("Z") + 1)])
              //
