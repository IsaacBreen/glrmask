                                          child_mask = llm_mask.intersection(llm_bv)
                                          inter_cache[key] = child_mask

                                  # Merge parents
                                  s = next_gss.get(dest_idx)
                                  if s is None:
                                      s = set()
                                      next_gss[dest_idx] = s
                                  s.update(parents_all)

                                  # Merge mask
                                  m = next_mask.get(dest_idx)
                                  if m is None:
                                      next_mask[dest_idx] = child_mask
                                  else:
                                      next_mask[dest_idx] = m.union(child_mask)

