                          productions.push(Production { lhs: lhs_nt, rhs: rhs_symbols });
                          productions.extend(new_productions_for_rhs);
                      }
                  }
              }
      ```

      **Explanation of Changes:**

      1.  **`try_direct_terminal_mapping` Method:**
          *   It takes the `rule_name`, the `terminal_expr` (derived from `Literal` or `RegexExpr`), and mutable references to the grammar's internal structures.
          *   **Case 1:** If `terminal_expr` already exists in `terminal_expr_to_group_id`, it means this exact terminal expression is already known (possibly from another rule or a previous direct mapping). It reuses the existing terminal name and creates a production `rule_name -> ExistingTerminalName`.
          *   **Case 2:** If `terminal_expr` is new, it checks if `rule_name` is already present in `terminal_name_to_group_id`. If `rule_name` is already a terminal but for a *different* expression, we can't use `rule_name` for this new `terminal_expr`. In this scenario, it returns `false`, signaling that the standard `convert_grammar_expr_to_symbols` (fallback) should be used.
          *   **Case 3:** If `terminal_expr` is new and `rule_name` is available as a terminal name, it creates a new terminal. This new terminal is named `rule_name`, and its expression is `terminal_expr`. A production `rule_name -> rule_name` (NonTerminal -> Terminal) is added.
          *   It returns `true` if a direct mapping was made, `false` otherwise.

      2.  **`from_exprs` Loop Modification:**
          *   The loop now uses a `match` on the `expr` type.
          *   For `GrammarExpr::Literal` and `GrammarExpr::RegexExpr`:
              *   It first calls `try_direct_terminal_mapping`.
              *   If `try_direct_terminal_mapping` returns `true`, the rule has been handled, and the loop continues to the next rule.
              *   If it returns `false` (meaning a direct mapping with `rule_name` wasn't possible due to a name collision for the terminal name), it falls back to calling `Self::convert_grammar_expr_to_symbols` with the original `expr`. This ensures that a terminal is still created, but `convert_grammar_expr_to_symbols` will use its own logic to name it (e.g., `rule_name[0]` or a name derived from the literal's content like `"actual_literal_value"`).
          *   For `GrammarExpr::Choice`: The existing logic is maintained. Each arm of the choice is processed by `convert_grammar_expr_to_symbols`. The request was about top-level simple rules, not necessarily each arm of a choice being named after the choice's non-terminal.
          *   For other `GrammarExpr` variants (`Sequence`, `Ref`, `Optional`, `Repeat`): The existing logic of calling `convert_grammar_expr_to_symbols` is maintained as these are inherently complex and require such processing.

      These changes should achieve the desired cleaner naming for simple, top-level terminal rules while correctly handling potential naming conflicts and falling back to the robust generation mechanism when needed.
