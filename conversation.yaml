              states.add_transition(start, 100, end, WaWeight::all());

              let mut end_map = BTreeMap::new();
              end_map.insert(end, BTreeSet::from([vec![ParserStateID(100), ParserStateID(101)]]));

              AugmentedNwa {
                  states,
