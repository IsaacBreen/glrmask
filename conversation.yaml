          def empty(cls) -> 'RoaringRangeSet':
              return cls()

          @classmethod
          def from_json(cls, data: List[List[int]]) -> 'RoaringRangeSet':
              return cls.from_ranges(data)

          def to_json(self) -> List[List[int]]:
              return [list(r) for r in self.intervals]
