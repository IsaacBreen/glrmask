                  JSONNode::Array(arr) => {
                      let mut out = Vec::with_capacity(arr.len());
                      for (i, item) in arr.into_iter().enumerate() {
                          match T::from_json(item) {
                              Ok(v) => out.push(v),
                              Err(e) => return Err(format!("While deserializing Vec<T> at $[{}]: {}", i, e)),
