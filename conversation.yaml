              let mut acc2 = empty_acc();
              acc2.stored_trie_nodes_mut().insert(stored_trie_node2.clone());
              let leaf2 = Arc::new(GSSNode::new(acc2)); // This is "Node 2" with trie ...560

              // --- GSS A ---
              // Root -> (edge 1) -> leaf1
              let gss_a = GSSNode::new_with_single_predecessor(
                  leaf1.clone(),
                  mock_edge(1),
                  empty_acc(),
