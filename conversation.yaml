    src/trie3_opt/passes/prune_dead_paths.rs: |
      use std::collections::{BTreeMap, HashMap, VecDeque};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Remove edges that provably cannot lead to an end node by reverse reachability.
      /// Nodes are not deleted in the mini-trie (to keep NodeId stability), but edges to
      /// non-productive nodes are pruned.
      pub struct PruneDeadPathsPass;

      impl OptimizationPass for PruneDeadPathsPass {
          fn name(&self) -> &'static str {
              "PruneDeadPaths"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let mut predecessors: HashMap<NodeId, Vec<(NodeId, EdgeKey)>> = HashMap::new();
              let mut worklist = VecDeque::new();
              let mut live: HashMap<NodeId, SortedSet> = HashMap::new();
              let universe = SortedSet::from_iter(0..=ctx.max_llm_token_id);

              for node in &trie.nodes {
                  live.insert(node.id, SortedSet::new());
                  if node.end {
                      live.insert(node.id, universe.clone());
                      worklist.push_back(node.id);
                  }
                  for (ek, dm) in &node.children {
                      for (dst, _) in dm {
                          predecessors
                              .entry(*dst)
                              .or_default()
                              .push((node.id, ek.clone()));
                      }
                  }
              }

              while let Some(node_id) = worklist.pop_front() {
                  let live_at_node = live.get(&node_id).unwrap().clone();
                  if let Some(preds) = predecessors.get(&node_id) {
                      for (pred_id, edge_key) in preds {
                          let live_from_edge = live_at_node.intersect(&edge_key.tokens);
                          if live_from_edge.is_empty() {
                              continue;
                          }
                          let pred_live = live.get_mut(pred_id).unwrap();
                          let old_len = pred_live.len();
                          pred_live.union_inplace(&live_from_edge);
                          if pred_live.len() > old_len {
                              worklist.push_back(*pred_id);
                          }
                      }
                  }
              }

              for node in &mut trie.nodes {
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();
                  for (ek, dm) in &node.children {
                      for (dst, sids) in dm {
                          let live_from_child = live.get(dst).unwrap();
                          let live_on_edge = ek.tokens.intersect(live_from_child);

                          if !live_on_edge.is_empty() {
                              let new_ek = EdgeKey::new(ek.pop, live_on_edge);
                              new_children
                                  .entry(new_ek)
                                  .or_default()
                                  .entry(*dst)
                                  .and_modify(|e: &mut SortedSet| e.union_inplace(sids))
                                  .or_insert(sids.clone());
                          }
                      }
                  }
                  node.children = new_children;
              }
          }
      }
    src/trie3_opt/passes/prune_unproductive_paths.rs: |
      use std::collections::BTreeSet;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct PruneUnproductivePathsPass;

      impl OptimizationPass for PruneUnproductivePathsPass {
          fn name(&self) -> &'static str {
              "PruneUnproductivePaths"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let productive: BTreeSet<NodeId> = trie.can_reach_end();
              if productive.len() == trie.nodes.len() {
                  return;
              }
              for node in &mut trie.nodes {
                  if !productive.contains(&node.id) {
                      node.children.clear();
                  } else {
                      node.children.retain(|_, dm| {
                          dm.retain(|dst, _| productive.contains(dst));
                          !dm.is_empty()
                      });
                  }
              }
          }
      }
    src/trie3_opt/passes/reorder_llm_tokens.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::{context::OptimizationContext, core::{MiniTrie, SortedSet}, passes::OptimizationPass, NodeId};

      pub struct ReorderLLMTokensPass;

      impl OptimizationPass for ReorderLLMTokensPass {
          fn name(&self) -> &'static str {
              "ReorderLLMTokens"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let sv_rc = if let Some(sv_rc) = &ctx.stage_vocab {
                  sv_rc
              } else {
                  return;
              };

              let max_tok = ctx.max_llm_token_id;
              let mut freq: Vec<usize> = vec![0; max_tok + 1];
              for node in &trie.nodes {
                  for (ek, _) in &node.children {
                      for t in ek.tokens.iter() {
                          if t <= max_tok {
                              freq[t] += 1;
                          }
                      }
                  }
              }

              let mut present: Vec<usize> = (0..=max_tok).filter(|&t| freq[t] > 0).collect();
              if present.is_empty() {
                  return;
              }
              present.sort_by_key(|&t| (std::cmp::Reverse(freq[t]), t));

              let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
              for (new_id, old_id) in present.iter().enumerate() {
                  old_to_new.insert(*old_id, new_id);
              }

              let remap_sorted_set = |s: &SortedSet| -> SortedSet {
                  let mut new_elems = Vec::with_capacity(s.len());
                  for elem in s.iter() {
                      new_elems.push(old_to_new.get(&elem).copied().unwrap_or(elem));
                  }
                  SortedSet::from_iter(new_elems)
              };

              for node in &mut trie.nodes {
                  let mut new_children = BTreeMap::new();
                  for (mut ek, dm) in std::mem::take(&mut node.children) {
                      ek.tokens = remap_sorted_set(&ek.tokens);
                      let entry: &mut BTreeMap<NodeId, SortedSet> = new_children.entry(ek).or_default();
                      for (dst, sids) in dm {
                          entry.entry(dst).or_default().union_inplace(&sids);
                      }
                  }
                  node.children = new_children;
              }

              let mut sv_ref = sv_rc.borrow_mut();
              let sv = &mut **sv_ref;

              let mut new_internal_to_original = BTreeMap::new();
              for (old_id, setv) in sv.internal_to_original.clone() {
                  if let Some(new_id) = old_to_new.get(&old_id) {
                      new_internal_to_original.insert(*new_id, setv);
                  }
              }
              sv.internal_to_original = new_internal_to_original;

