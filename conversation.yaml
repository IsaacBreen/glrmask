                          while steps > 0 and p.state is not None:
                              p = p.prev
                              steps -= 1
              ```
          *   **Insert** this line in their place:
              ```python
                          p = pop_node_cached(node, n)
              ```

      These changes will significantly optimize the reduction steps, which are the primary source of the performance degradation.

