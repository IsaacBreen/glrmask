          pub debug_remove_pop_gt_0: bool,
          pub assert_pop0_paths_to_end_are_short: bool,
      }

      impl Default for Trie3Config {
          fn default() -> Self {
              Self {
                  enabled: true,
                  num_passes: 3,
                  eliminate_pop0_edges: true,
                  assert_no_pop0_nonroot_edges: true,
                  merge_equivalent_llm_tokens: true,
                  reorder_llm_tokens: true,
                  constrain_bitvecs: true,
                  gc: true,
                  prune_dead_paths: true,
                  compress_edges: true,
                  merge_nodes_exact: Trie3MergeConfig::default(),
                  merge_nodes_structural: true,
                  merge_nodes_ultrafast: false,
                  prune_nodes_not_reaching_end: true,
                  simplify_llm_token_bvs: false,
                  refine_token_atoms: true,
                  refine_token_atoms_exact: true,
                  refine_token_atoms_max_blocks: 2048,
                  factor_common_destinations: true,
                  factor_common_destinations_min_incoming: 12,
                  stochastic_equivalence_check: false,
                  debug_remove_pop_gt_0: false,
                  assert_pop0_paths_to_end_are_short: false,
              }
          }
      }

      impl Trie3Config {
          pub fn off() -> Self {
              Self {
                  enabled: false,
                  num_passes: 0,
                  eliminate_pop0_edges: false,
                  assert_no_pop0_nonroot_edges: false,
                  merge_equivalent_llm_tokens: false,
                  reorder_llm_tokens: false,
                  constrain_bitvecs: false,
                  gc: false,
                  prune_dead_paths: false,
                  compress_edges: false,
                  merge_nodes_exact: Trie3MergeConfig::off(),
                  merge_nodes_structural: false,
                  merge_nodes_ultrafast: false,
                  prune_nodes_not_reaching_end: false,
                  refine_token_atoms: false,
                  refine_token_atoms_exact: false,
                  refine_token_atoms_max_blocks: 0,
                  // keep these off for the .off() preset
                  factor_common_destinations_min_incoming: 0,
                  // eliminate_pop0_edges/assert_no_pop0_nonroot_edges already set above
                  simplify_llm_token_bvs: false,
                  factor_common_destinations: false,
                  stochastic_equivalence_check: false,
                  debug_remove_pop_gt_0: false,
                  assert_pop0_paths_to_end_are_short: false,
              }
          }
      }

      fn count_total_ranges_trie3(
          all_nodes: &[PrecomputeNode3Index],
          trie3_god: &Trie3GodWrapper,
      ) -> usize {
          let mut count = 0;
          for n in all_nodes {
              let g = n.read(trie3_god).expect("read");
              count += g.value.live_tokens.inner().ranges_len();
              for ((_pop, llm_bv), _dm) in g.children() {
                  count += llm_bv.inner().ranges_len();
              }
          }
          count
      }

      fn compute_and_print_precompute_stats3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          let mut stats = PrecomputeStats::default();
          calculate_final_stats3(roots, &mut stats, trie3_god);
          print_precompute_stats3(&stats, trie3_god);
      }

      fn debug_remove_pop_gt_0_edges_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "DEBUG: Removing all edges with pop > 0 from Trie3.");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          for node_idx in all_nodes {
              let mut w = node_idx.write(trie3_god).expect("write");

              let old_children = std::mem::take(w.children_mut());
              let mut new_children = BTreeMap::new();

              for ((pop, llm_bv), dest_map) in old_children {
                  if pop <= 0 {
                      new_children.insert((pop, llm_bv), dest_map);
                  }
              }

              let mut new_live = LLMTokenBV::zeros();
              for ((_, llm_bv), _) in &new_children {
                  new_live |= llm_bv;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = new_children;
          }
      }

      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &Trie3Config,
          max_state_id: usize,
          mut max_llm_token_id: usize,
          stage_vocab: &mut StageVocab,
          parser: &GLRParser,
      ) {
          has_true_cycle_trie3(trie3_god, &roots.values().cloned().collect::<Vec<_>>());
          has_true_cycle_trie3_llm_only(trie3_god, &roots.values().cloned().collect::<Vec<_>>(), stage_vocab.internal_max_llm_token);

      	if !config.enabled {
      		return;
      	}

          let (original_arena, original_roots) = if config.stochastic_equivalence_check {
              crate::debug!(2, "Stochastic equivalence check enabled. Cloning initial trie.");
              let initial_roots_map_sorted: Vec<_> = roots.iter().collect();
              let initial_roots_vec: Vec<_> = initial_roots_map_sorted.iter().map(|(_, &idx)| idx).collect();
              let (cloned_arena, cloned_roots_vec, _) = Trie::deep_copy_subtrees(trie3_god, &initial_roots_vec);
              let cloned_roots_map: BTreeMap<_, _> = initial_roots_map_sorted.into_iter().map(|(k, _)| *k).zip(cloned_roots_vec).collect();
              (Some(cloned_arena), Some(cloned_roots_map))
          } else {
              (None, None)
          };

      	crate::debug!(2, "Optimizing Trie 3 size...");

      	crate::debug!(2, "Initial stats:");
      	compute_and_print_precompute_stats3(roots, trie3_god);

          let mut step_counter = 1;
          macro_rules! run_pass {
              ($name:expr, $code:block) => {
                  crate::debug!(2, "Running optimization pass {}: {}...", step_counter, $name);
                  let start = Instant::now();
                  $code
                  let duration = start.elapsed();
                  crate::debug!(2, "Pass {} ('{}') finished in {:?}", step_counter, $name, duration);
                  crate::debug!(2, "Stats after pass {}:", step_counter);
                  compute_and_print_precompute_stats3(roots, trie3_god);
                  step_counter += 1;
              };
          }

      	for pass_num in 0..config.num_passes {
              if config.num_passes > 1 {
                  crate::debug!(2, "--- Starting optimization super-pass {}/{} ---", pass_num + 1, config.num_passes);
              }


              if config.debug_remove_pop_gt_0 {
                  run_pass!("DEBUG: Removing pop > 0 edges", {
                      debug_remove_pop_gt_0_edges_trie3(roots, trie3_god);
                  });
              }

              // --- Phase 1: Initial Pruning & Vocab Reduction ---
              // These passes are expensive but have a huge impact on the initial massive graph.
              // They are essential to run first to make subsequent passes feasible.
              if config.merge_nodes_ultrafast {
                  run_pass!("Merging nodes (fast pre-pass)", {
                      merge_nodes_trie3_ultrafast(roots, trie3_god);
                      merge_nodes_trie3(roots, trie3_god, 40);
                  });
              }

              if config.prune_dead_paths {
                  run_pass!("Pruning dead paths", {
                      prune_dead_paths_trie3(roots, &trie3_god);
                  });
              }

              if config.prune_nodes_not_reaching_end {
                  run_pass!("Pruning nodes that do not reach end", {
                      prune_nodes_not_reaching_end_trie3(roots, &trie3_god);
                  });
              }

              if config.merge_equivalent_llm_tokens {
                  run_pass!("Merging equivalent LLM tokens", {
                      merge_equivalent_llm_tokens_trie3(roots, trie3_god, stage_vocab);
                  });
              }

              if config.reorder_llm_tokens {
                  run_pass!("Reordering LLM tokens for range minimization", {
                      reorder_llm_tokens_for_range_minimization_trie3(roots, trie3_god, stage_vocab);
                      max_llm_token_id = stage_vocab.internal_max_llm_token;
                  });
              }

              if config.constrain_bitvecs {
                  let roots_vec: Vec<_> = roots.values().cloned().collect();
                  let _all_nodes_pinner = Trie::all_nodes(&trie3_god, &roots_vec);
                  run_pass!("Constraining bitvectors", {
                      constrain_bitvecs_trie3(trie3_god, &roots_vec, max_state_id, max_llm_token_id);
                  });
              }

              // --- Phase 2: Structural Compression and Merging ---
              // Now that the graph is smaller and token sets are simpler, we can apply
              // heavy structural optimizations.

              if config.simplify_llm_token_bvs {
                  run_pass!("Simplifying LLM token bitsets", {
                      simplify_llm_token_bvs_trie3(roots, &trie3_god, max_llm_token_id);
                  });
              }

              if config.factor_common_destinations {
                  run_pass!("Factoring common destinations", {
                      factor_common_destinations_trie3(roots, trie3_god, max_llm_token_id, max_state_id, config.factor_common_destinations_min_incoming);
                  });
              }

              if config.compress_edges {
                  run_pass!("Compressing edges + unary chains", {
                      compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                      // Contract simple linear chains where (pop, tokens) are identical across the hop.
                      compress_unary_chains_trie3(roots, &trie3_god);
                  });
              }

              // Refine token-sets to semantic atoms per node/pop to maximally coalesce behaviorally identical tokens.
              if config.refine_token_atoms {
                  run_pass!("Refining token-set atoms", {
                      refine_edges_to_token_atoms_trie3(
                          roots, &trie3_god,
                          max_llm_token_id, max_state_id,
                          config.refine_token_atoms_max_blocks);
                  });
              }

              // After compression, prune and GC before the expensive merge.
              if config.prune_dead_paths {
                  run_pass!("Pruning dead paths (post-compress)", {
                      prune_dead_paths_trie3(roots, &trie3_god);
                  });
              }
              if config.gc {
                  run_pass!("Garbage collection (pre-merge)", {
                      Trie::gc(&trie3_god, &roots.values().cloned().collect::<Vec<_>>());
                  });
              }

              if config.merge_nodes_structural {
                  run_pass!("Merging nodes (structural)", {
                      merge_nodes_trie3_structural(roots, &trie3_god, config.merge_nodes_exact.exact_max_iters);
                  });
                  // Structural merge can create parallel edges (same dest/pop/sids, diff tokens).
                  // Compress them immediately.
                  if config.compress_edges {
                      run_pass!("Compressing edges + unary chains (post-structural)", {
                          compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                          // Re-run chain contraction now that structure may have simplified.
                          compress_unary_chains_trie3(roots, &trie3_god);
                      });
                  }
              }

              if config.merge_nodes_exact.enabled {
                  run_pass!("Merging nodes", {
                      merge_nodes_trie3(roots, &trie3_god, config.merge_nodes_exact.exact_max_iters);
                  });
              }

              // --- Phase 3: Iterative Refinement ---
              // A few rounds of compression and merging on the now much smaller graph.

              if config.prune_nodes_not_reaching_end {
                  run_pass!("Pruning nodes that do not reach end (post-merge)", {
                      prune_nodes_not_reaching_end_trie3(roots, &trie3_god);
                  });
              }

              if config.compress_edges {
                  run_pass!("Compressing edges + unary chains (post-merge)", {
                      compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                      // Final contraction pass to remove any last unary runs.
                      compress_unary_chains_trie3(roots, &trie3_god);
                  });
              }
              if config.refine_token_atoms {
                  run_pass!("Refining token-set atoms (post-merge)", {
                      refine_edges_to_token_atoms_trie3(
                          roots,
                          &trie3_god,
                          max_llm_token_id,
                          max_state_id,
                          config.refine_token_atoms_max_blocks);
                  });
              }

              if config.merge_nodes_exact.enabled {
                  run_pass!("Merging nodes (post-compress)", {
                      merge_nodes_trie3(roots, &trie3_god, config.merge_nodes_exact.exact_max_iters);
                  });
              }

              // --- Phase 4: Final Cleanup and Polish ---

              if config.prune_dead_paths {
                  run_pass!("Pruning dead paths (final)", {
                      prune_dead_paths_trie3(roots, &trie3_god);
                  });
              }

              if config.gc {
                  run_pass!("Garbage collection (final)", {
                      Trie::gc(&trie3_god, &roots.values().cloned().collect::<Vec<_>>());
                  });
              }

              if config.merge_equivalent_llm_tokens {
                  run_pass!("Merging equivalent LLM tokens (final pass)", {
                      merge_equivalent_llm_tokens_trie3(roots, trie3_god, stage_vocab);
                  });
              }
              if config.reorder_llm_tokens {
                  run_pass!("Reordering LLM tokens (final pass)", {
                      reorder_llm_tokens_for_range_minimization_trie3(roots, trie3_god, stage_vocab);
                  });
              }

              // New pass: eliminate pop=0 edges originating from non-root nodes.
              if config.eliminate_pop0_edges {
                  run_pass!("Eliminating pop=0 edges (non-roots)", {
                      eliminate_pop0_edges_except_roots_trie3(roots, trie3_god);
                      if config.assert_no_pop0_nonroot_edges {
                          assert_no_pop0_nonroot_edges_trie3(roots, trie3_god);
                      }
                  });
                  // Optional compaction right after: merge identical dest maps and shrink live tokens.
                  if config.compress_edges {
                      run_pass!("Compressing edges + unary chains (post-pop0-elim)", {
                          // Use current maxes as we have the latest vocab and state bounds
                          compress_trie3_edges(
                              roots,
                              &trie3_god,
                              max_llm_token_id,
                              max_state_id,
                          );
                          compress_unary_chains_trie3(roots, &trie3_god);
                      });
                  }
                  if config.refine_token_atoms {
                      run_pass!("Refining token-set atoms (post-structural)", {
                          refine_edges_to_token_atoms_trie3(
                              roots,
                              &trie3_god,
                              max_llm_token_id,
                              max_state_id,
                              config.refine_token_atoms_max_blocks);
                      });
                  }
                  if config.refine_token_atoms_exact {
                      run_pass!("Refining token-set atoms (exact, post-pop0-elim)", {
                          refine_edges_to_token_atoms_trie3_exact(
                              roots,
                              &trie3_god,
                              max_llm_token_id,
                              max_state_id
                          );
                      });
                  }
                  // NEW: Immediately minimize after pop0 elimination to collapse the explosion.
                  if config.prune_dead_paths {
                      run_pass!("Pruning dead paths (post-pop0-elim)", {
                          prune_dead_paths_trie3(roots, &trie3_god);
                      });
                  }
                  if config.gc {
                      run_pass!("Garbage collection (post-pop0-elim)", {
                          Trie::gc(&trie3_god, &roots.values().cloned().collect::<Vec<_>>());
                      });
                  }
                  if config.merge_nodes_structural {
                      run_pass!("Merging nodes (structural, post-pop0-elim)", {
                          merge_nodes_trie3_structural(roots, &trie3_god, config.merge_nodes_exact.exact_max_iters);
                      });
                      if config.compress_edges {
                          run_pass!("Compressing edges + unary chains (post-pop0-struct-merge)", {
                              compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                              compress_unary_chains_trie3(roots, &trie3_god);
                          });
                      }
                  }
                  if config.merge_nodes_exact.enabled {
                      run_pass!("Merging nodes (exact, post-pop0-elim)", {
                          merge_nodes_trie3(roots, &trie3_god, config.merge_nodes_exact.exact_max_iters);
                      });
                  }
                  if config.prune_nodes_not_reaching_end {
                      run_pass!("Pruning nodes that do not reach end (post-pop0-elim)", {
                          prune_nodes_not_reaching_end_trie3(roots, &trie3_god);
                      });
                  }
                  if config.compress_edges {
                      run_pass!("Compressing edges + unary chains (post-pop0-elim-merge)", {
                          compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                          compress_unary_chains_trie3(roots, &trie3_god);
                      });
                  }
                  if config.refine_token_atoms {
                      run_pass!("Refining token-set atoms (post-pop0-elim-merge)", {
                          refine_edges_to_token_atoms_trie3(
                              roots, &trie3_god,
                              max_llm_token_id, max_state_id,
                              config.refine_token_atoms_max_blocks);
                      });
                  }
                  if config.refine_token_atoms_exact {
                      run_pass!("Refining token-set atoms (exact, post-pop0-elim-merge)", {
                          refine_edges_to_token_atoms_trie3_exact(
                              roots, &trie3_god,
                              max_llm_token_id, max_state_id
                          );
                      });
                  }
              }
          }

      	crate::debug!(2, "Recomputing max depths...");
          Trie::recompute_all_max_depths(&trie3_god, &roots.values().cloned().collect::<Vec<_>>());

          has_true_cycle_trie3(trie3_god, &roots.values().cloned().collect::<Vec<_>>());
          has_true_cycle_trie3_llm_only(trie3_god, &roots.values().cloned().collect::<Vec<_>>(), stage_vocab.internal_max_llm_token);

          // Optional final exact atom refinement as a polish step
          if config.refine_token_atoms_exact {
              run_pass!("Refining token-set atoms (exact, final)", {
                  refine_edges_to_token_atoms_trie3_exact(
                      roots, &trie3_god, max_llm_token_id, max_state_id
                  );
              });
          }

          // Final pop=0 elimination pass to be sure.
          if config.eliminate_pop0_edges {
              run_pass!("Eliminating pop=0 edges (final cleanup)", {
                  eliminate_pop0_edges_except_roots_trie3(roots, trie3_god);
                  if config.assert_no_pop0_nonroot_edges {
                      assert_no_pop0_nonroot_edges_trie3(roots, trie3_god);
                  }
              });
              if config.compress_edges {
                  run_pass!("Compressing edges (post-final-pop0-elim)", {
                      compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                      compress_unary_chains_trie3(roots, &trie3_god);
                  });
              }
              if config.merge_nodes_exact.enabled {
                  run_pass!("Merging nodes (post-final-pop0-elim)", {
                      merge_nodes_trie3(roots, &trie3_god, config.merge_nodes_exact.exact_max_iters);
                  });
              }
          }

          if let (Some(original_arena), Some(original_roots)) = (original_arena, original_roots) {
              crate::debug!(2, "Running stochastic equivalence check...");

              type PrecomputeTrie3Path = (
                  PrecomputedNodeContents,
                  Vec<((isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents)>,
              );

              fn pretty_print_path(path: &PrecomputeTrie3Path) -> String {
                  let (root_contents, edges) = path;
                  let mut s = String::new();
                  s.push_str(&format!(
                      "[Root] end: {}, live_tokens: {:?}\n",
                      root_contents.end, root_contents.live_tokens
                  ));

                  for (i, (edge_key, state_bv, dest_contents)) in edges.iter().enumerate() {
                      let (pop, llm_bv) = edge_key;
                      s.push_str("  |\n");
                      s.push_str(&format!(
                          "  +-- Edge(pop={}): llm_tokens={:?}, state_ids={:?}\n",
                          pop, llm_bv, state_bv
                      ));
                      s.push_str("  |\n");
                      s.push_str("  V\n");
                      s.push_str(&format!(
                          "[Node {}] end: {}, live_tokens: {:?}\n",
                          i + 1, dest_contents.end, dest_contents.live_tokens
                      ));
                  }
                  s
              }

              fn get_path_summary(path: &PrecomputeTrie3Path) -> (LLMTokenBV, BTreeMap<isize, StateIDBV>) {
                  let (root_contents, edges) = path;
                  let mut llm_intersection = LLMTokenBV::max_ones();
                  let mut state_checks = BTreeMap::<isize, StateIDBV>::new();
                  let mut current_pos: isize = 0;

                  let mut current_node_live_tokens = &root_contents.live_tokens;

                  for ((pop, llm_bv), state_bv, next_node_contents) in edges {
                      llm_intersection &= current_node_live_tokens;
                      llm_intersection &= llm_bv;

                      current_pos += *pop;
                      state_checks.entry(current_pos)
                          .and_modify(|e| *e &= state_bv)
                          .or_insert_with(|| state_bv.clone());
                      
                      current_node_live_tokens = &next_node_contents.live_tokens;
                  }

                  (llm_intersection, state_checks)
              }

              let compare = |p1: &PrecomputeTrie3Path, p2: &PrecomputeTrie3Path| -> PathComparison {
                  if p1.0 != p2.0 {
                      return PathComparison::Different;
                  }
                  if p1.1.len() > p2.1.len() {
                      return PathComparison::Different;
                  }
                  // We only need to compare the prefix of p2 that has the same length as p1.
                  let p2_prefix_path = (p2.0.clone(), p2.1[..p1.1.len()].to_vec());
                  
                  let (llm1, states1) = get_path_summary(p1);
                  let (llm2_prefix, states2_prefix) = get_path_summary(&p2_prefix_path);

                  if !llm2_prefix.is_subset(&llm1) {
                      return PathComparison::Different;
                  }

                  let all_positions: BTreeSet<_> = states1.keys().chain(states2_prefix.keys()).copied().collect();
                  for pos in all_positions {
                      let s1 = states1.get(&pos).cloned().unwrap_or_else(StateIDBV::max_ones);
                      let s2_prefix = states2_prefix.get(&pos).cloned().unwrap_or_else(StateIDBV::max_ones);
                      if !s2_prefix.is_subset(&s1) {
                          return PathComparison::Different;
                      }
                  }

                  if p1.1.len() == p2.1.len() {
                      PathComparison::Equal
                  } else {
                      PathComparison::Prefix
                  }
              };

              let mut rng = rand::thread_rng();
              let num_samples = 1000;
              let max_path_len = 50;

              let original_roots_vec: Vec<_> = original_roots.values().cloned().collect();
              let optimized_roots_vec: Vec<_> = roots.values().cloned().collect();

              let mut failing_path: Option<PrecomputeTrie3Path> = None;
              let mut a_is_original = true;

              // Check paths from original in optimized
              for _ in 0..num_samples {
                  if let Some(path) = Trie::sample_path(&original_arena, &original_roots_vec, max_path_len, &mut rng) {
                      if get_path_summary(&path).0.is_empty() {
                          continue; // Path is semantically invalid due to inconsistent live_tokens.
                      }
                      if !Trie::path_exists(trie3_god, &optimized_roots_vec, &path, compare) {
                          failing_path = Some(path);
                          a_is_original = true;
                          break;
                      }
                  }
              }

              if failing_path.is_none() {
                  // Check paths from optimized in original
                  for _ in 0..num_samples {
                      if let Some(path) = Trie::sample_path(trie3_god, &optimized_roots_vec, max_path_len, &mut rng) {
                          if get_path_summary(&path).0.is_empty() {
                              continue; // Path is semantically invalid
                          }
                          if !Trie::path_exists(&original_arena, &original_roots_vec, &path, compare) {
                              failing_path = Some(path);
                              a_is_original = false;
                              break;
                          }
                      }
                  }
              }

              if let Some(path) = failing_path {
                  println!("Stochastic equivalence check FAILED!");
                  let (trie_a_name, trie_b_name) = if a_is_original { ("original", "optimized") } else { ("optimized", "original") };
                  println!("Found path in {} that does not exist in {}.", trie_a_name, trie_b_name);
                  
                  let (llm, states) = get_path_summary(&path);
                  println!("--- Failing Path Summary ---");
                  println!("Valid for LLM tokens: {:?}", llm);
                  println!("State checks per position:");
                  for (pos, sids) in &states {
                      println!("  pos {}: {:?}", pos, sids);
                  }
                  println!("\n--- Failing Path (Formatted) ---");
                  println!("{}", pretty_print_path(&path));

                  // Minimize the example
                  let (mut arena_a, mut roots_a_vec) = if a_is_original { (original_arena.deep_clone(), original_roots_vec.clone()) } else { (trie3_god.deep_clone(), optimized_roots_vec.clone()) };
                  let (mut arena_b, mut roots_b_vec) = if a_is_original { (trie3_god.deep_clone(), optimized_roots_vec) } else { (original_arena.deep_clone(), original_roots_vec) };

                  println!("Attempting to minimize failing example by trimming...");
                  for i in 0..100 {
                      let (trimmed_a, trimmed_roots_a) = Trie::trim_randomly(&arena_a, &roots_a_vec, 0.1, &mut rng);
                      if Trie::path_exists(&trimmed_a, &trimmed_roots_a, &path, compare) { arena_a = trimmed_a; roots_a_vec = trimmed_roots_a; }
                      let (trimmed_b, trimmed_roots_b) = Trie::trim_randomly(&arena_b, &roots_b_vec, 0.1, &mut rng);
                      if !Trie::path_exists(&trimmed_b, &trimmed_roots_b, &path, compare) { arena_b = trimmed_b; roots_b_vec = trimmed_roots_b; }
                      if (i + 1) % 10 == 0 { println!("Trimming iteration {}...", i + 1); }
                  }

                  println!("--- MINIMIZED FAILING EXAMPLE ---");
                  println!("--- Failing Path Summary ---");
                  let (llm, states) = get_path_summary(&path);
                  println!("Valid for LLM tokens: {:?}", llm);
                  println!("State checks per position:");
                  for (pos, sids) in &states {
                      println!("  pos {}: {:?}", pos, sids);
                  }
                  println!("\n--- Failing Path (Formatted) ---");
                  println!("{}", pretty_print_path(&path));
                  println!("\n--- Trie A (path SHOULD exist here) ---");
                  println!("{}", Trie::pretty_print(&arena_a, &roots_a_vec));
                  println!("\n--- Trie B (path should NOT exist here) ---");
                  println!("{}", Trie::pretty_print(&arena_b, &roots_b_vec));

                  panic!("Stochastic equivalence check failed. See minimized example above.");
              } else {
                  crate::debug!(2, "Stochastic equivalence check passed.");
              }
          }

          if config.assert_pop0_paths_to_end_are_short {
              assert_pop0_paths_to_end_are_short(roots, trie3_god);
          }

      	crate::debug!(2, "Finished optimizing Trie 3 size.");
      }

      fn assert_pop0_paths_to_end_are_short(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Asserting that all pop=0 paths to an end node are of length <= 1, or are redundant.");

          for root_node in roots.values() {
              // 1. Find all short pop=0 paths from this root and collect their semantics.
              let mut short_path_semantics: Vec<(LLMTokenBV, StateIDBV)> = Vec::new();
              let r = root_node.read(trie3_god).expect("root must exist");
              for ((pop, llm_bv), dm) in r.children() {
                  if *pop == 0 {
                      for (dest, sids_bv) in dm {
                          if dest.read(trie3_god).expect("dest must exist").value.end {
                              short_path_semantics.push((llm_bv.clone(), sids_bv.clone()));
                          }
                      }
                  }
              }

              // 2. Find all long pop=0 paths and check if they are covered.
              // A long path starts with a pop=0 edge from the root to a non-end node.
              for ((pop, llm_bv1), dm) in r.children() {
                  if *pop == 0 {
                      for (dest, sids_bv1) in dm {
                          if dest.read(trie3_god).expect("dest must exist").value.end {
                              continue; // This is a short path, which is fine.
                          }

                          // This is the start of a potential long path from root -> dest.
                          // Find all pop=0 paths from `dest` to any end node.
                          let mut q: VecDeque<(PrecomputeNode3Index, LLMTokenBV, StateIDBV, Vec<PrecomputeNode3Index>)> = VecDeque::new();
                          
                          q.push_back((*dest, llm_bv1.clone(), sids_bv1.clone(), vec![*root_node, *dest]));

                          while let Some((curr, path_llm, path_sids, path_nodes)) = q.pop_front() {
                              let curr_guard = curr.read(trie3_god).expect("node must exist");

                              if curr_guard.value.end {
                                  // We found a long path. Check if it's covered.
                                  let long_llm = path_llm;
                                  let long_sids = path_sids;

                                  if long_llm.is_empty() || long_sids.is_empty() {
                                      continue; // Path is not actually traversable.
                                  }

                                  // Check coverage for every token in long_llm
                                  for t in long_llm.iter() {
                                      let mut sids_covered_for_t = StateIDBV::zeros();
                                      for (short_llm, short_sids) in &short_path_semantics {
                                          if short_llm.contains(t) {
                                              sids_covered_for_t |= short_sids;
                                          }
                                      }

                                      if !long_sids.is_subset(&sids_covered_for_t) {
                                          let violating_sids = &long_sids - &sids_covered_for_t;
                                          let first_violating_sid = violating_sids.iter().next().unwrap();
                                          let path_str = path_nodes.iter().map(|n| n.to_string()).collect::<Vec<_>>().join(" -> ");
                                          panic!(
                                              "Found a non-redundant pop=0 path of length > 1 to an end node.\n\
                                              Path: {}\n\
                                              The pair (llm_token={}, state_id={}) is accepted by this long path, \
                                              but not by any short (length=1) pop=0 path from the same root.",
                                              path_str, t, first_violating_sid
                                          );
                                      }
                                  }
                                  // This long path is covered. Don't traverse further from an end node.
                                  continue;
                              }

                              // Continue traversal
                              for ((pop2, llm_bv2), dm2) in curr_guard.children() {
                                  if *pop2 == 0 {
                                      for (next, sids_bv2) in dm2 {
                                          let next_path_llm = &path_llm & llm_bv2;
                                          let next_path_sids = &path_sids & sids_bv2;

                                          if !next_path_llm.is_empty() && !next_path_sids.is_empty() {
                                              // Simple cycle check on the current path being explored.
                                              if path_nodes.contains(next) {
                                                  continue;
                                              }
                                              let mut next_path_nodes = path_nodes.clone();
                                              next_path_nodes.push(*next);
                                              q.push_back((*next, next_path_llm, next_path_sids, next_path_nodes));
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }
      }

      fn has_true_cycle_trie3(
          arena: &Trie3GodWrapper,
          roots: &[PrecomputeNode3Index],
      ) {
          let all_nodes = Trie::all_nodes(arena, roots);
          if all_nodes.is_empty() {
              return;
          }

          const UNVISITED: u8 = 0;
          const VISITING: u8 = 1;
          const VISITED: u8 = 2;

          let mut states: HashMap<PrecomputeNode3Index, u8> = all_nodes
              .iter()
              .map(|&idx| (idx, UNVISITED))
              .collect();

          let mut path: Vec<PrecomputeNode3Index> = Vec::new();

          for node_idx in all_nodes {
              if states.get(&node_idx) == Some(&UNVISITED) {
                  if let Some(report) = detect_true_cycle_recursive_trie3_new(
                      node_idx,
                      arena,
                      &mut states,
                      &mut path,
                  ) {
                      panic!("{}", report);
                  }
              }
          }
      }

      fn detect_true_cycle_recursive_trie3_new(
          node_idx: PrecomputeNode3Index,
          arena: &Trie3GodWrapper,
          states: &mut HashMap<PrecomputeNode3Index, u8>,
          path: &mut Vec<PrecomputeNode3Index>,
      ) -> Option<String> {
          const UNVISITED: u8 = 0;
          const VISITING: u8 = 1;
          const VISITED: u8 = 2;

          states.insert(node_idx, VISITING);
          path.push(node_idx);

          let children_to_visit = if let Some(guard) = node_idx.read(arena) {
              guard.children().iter()
                  .filter(|((pop, _), _)| *pop == 0)
                  .map(|(_ek, dm)| dm.clone())
                  .collect::<Vec<_>>()
          } else {
              Vec::new()
          };

          for dest_map in children_to_visit {
              for child_idx in dest_map.keys() {
                  match states.get(child_idx).copied().unwrap_or(UNVISITED) {
                      VISITING => {
                          if let Some(cycle_start_index) = path.iter().position(|&p| p == *child_idx) {
                              let cycle_nodes = &path[cycle_start_index..];

                              let mut llm_intersection = LLMTokenBV::max_ones();
                              let mut sids_intersection = StateIDBV::max_ones();

                              for i in 0..cycle_nodes.len() {
                                  let u = cycle_nodes[i];
                                  let v = if i + 1 < cycle_nodes.len() { cycle_nodes[i + 1] } else { *child_idx };

                                  let u_guard = u.read(arena).unwrap();
                                  let mut edge_llm_union = LLMTokenBV::zeros();
                                  let mut edge_sids_union = StateIDBV::zeros();

                                  for ((pop, llm_bv), dm) in u_guard.children() {
                                      if *pop == 0 {
                                          if let Some(sids) = dm.get(&v) {
                                              edge_llm_union |= llm_bv;
                                              edge_sids_union |= sids;
                                          }
                                      }
                                  }

                                  llm_intersection &= &edge_llm_union;
                                  sids_intersection &= &edge_sids_union;
                              }

                              if !llm_intersection.is_empty() && !sids_intersection.is_empty() {
                                  let first_violating_token = llm_intersection.iter().next().unwrap();
                                  let first_violating_state = sids_intersection.iter().next().unwrap();

                                  let mut report = format!(
                                      "LLM-compatible cycle with pop=0 detected in precompute3 trie. Example violation: internal LLM token ID {} and state ID {}.\nCycle path:\n",
                                      first_violating_token, first_violating_state
                                  );
                                  for i in 0..cycle_nodes.len() {
                                      let u = cycle_nodes[i];
                                      let v = if i + 1 < cycle_nodes.len() { cycle_nodes[i + 1] } else { *child_idx };
                                      report.push_str(&format!("  {} --> {}\n", u, v));
                                  }
                                  return Some(report);
                              }
                          }
                      }
                      UNVISITED => {
                          if let Some(report) = detect_true_cycle_recursive_trie3_new(
                              *child_idx,
                              arena,
                              states,
                              path,
                          ) {
                              return Some(report);
                          }
                      }
                      _ => {}
                  }
              }
          }

          path.pop();
          states.insert(node_idx, VISITED);
          None
      }

      type CycleReport3 = (Vec<(PrecomputeNode3Index, Option<(isize, LLMTokenBV)>)>, usize);

      fn has_true_cycle_trie3_llm_only(
          arena: &Trie3GodWrapper,
          roots: &[PrecomputeNode3Index],
          internal_max_llm_token: usize,
      ) {
          // We check for each token individually. This is slow but thorough.
          for llm_token_id in 0..=internal_max_llm_token {
              let mut visited: HashSet<PrecomputeNode3Index> = HashSet::new();
              for &root in roots {
                  if visited.contains(&root) {
                      continue;
                  }
                  if let Some((cycle_path, _)) = detect_true_cycle_recursive_trie3_llm_only(
                      root,
                      None,
                      llm_token_id,
                      arena,
                      &mut HashMap::new(),
                      &mut visited,
                      &mut Vec::new(),
                  ) {
                      let mut report = format!(
                          "LLM-compatible cycle with pop=0 detected in precompute3 trie for internal LLM token ID {}.\nCycle path:\n",
                          llm_token_id
                      );
                      for i in 0..cycle_path.len() {
                          let (node_idx, _) = cycle_path[i];
                          let next_i = (i + 1) % cycle_path.len();
                          let (next_node_idx, edge_to_next_opt) = &cycle_path[next_i];
                          let edge_str = edge_to_next_opt.as_ref().map_or_else(
                              || " (root edge)".to_string(),
                              |ek| format!("pop={}, llm_bv=[...]", ek.0),
                          );
                          report.push_str(&format!("  {} --[{}]--> {}\n", node_idx, edge_str, next_node_idx));
                      }
                      panic!("{}", report);
                  }
              }
          }
      }

      fn detect_true_cycle_recursive_trie3_llm_only(
          node_idx: PrecomputeNode3Index,
          edge_key_opt: Option<(isize, LLMTokenBV)>,
          llm_token_id: usize,
          arena: &Trie3GodWrapper,
          recursion_stack: &mut HashMap<PrecomputeNode3Index, usize>,
          visited: &mut HashSet<PrecomputeNode3Index>,
          path: &mut Vec<(PrecomputeNode3Index, Option<(isize, LLMTokenBV)>)>,
      ) -> Option<CycleReport3> {
          path.push((node_idx, edge_key_opt));

          if let Some(&path_start_idx) = recursion_stack.get(&node_idx) {
              let cycle_path = path[path_start_idx..].to_vec();
              path.pop();
              return Some((cycle_path, llm_token_id));
          }

          if visited.contains(&node_idx) {
              path.pop();
              return None;
          }

          recursion_stack.insert(node_idx, path.len() - 1);

          let children_to_visit = if let Some(guard) = node_idx.read(arena) {
              guard.children().clone()
          } else {
              recursion_stack.remove(&node_idx);
              path.pop();
              return None;
          };

          for (edge_key, dest_map) in children_to_visit.iter() {
              let (pop, llm_bv) = edge_key;
              if *pop == 0 && llm_bv.contains(llm_token_id) {
                  for child_idx in dest_map.keys() {
                      if let Some(report) = detect_true_cycle_recursive_trie3_llm_only(
                          *child_idx,
                          Some(edge_key.clone()),
                          llm_token_id,
                          arena,
                          recursion_stack,
                          visited,
                          path,
                      ) {
                          return Some(report);
                      }
                  }
              }
          }

          recursion_stack.remove(&node_idx);
          visited.insert(node_idx);
          path.pop();
          None
      }

      fn remap_llm_bv_many_to_one(bv: &LLMTokenBV, map_old_to_new: &BTreeMap<usize, usize>, max_token_id: usize) -> LLMTokenBV {
          if bv.is_empty() { return LLMTokenBV::zeros(); }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          let process_range = |range: std::ops::RangeInclusive<usize>,
                               ranges_to_add: &mut Vec<_>,
                               elements_to_add: &mut Vec<_>| {
              let (mut current, end) = (*range.start(), *range.end());
              for (&k, &v) in map_old_to_new.range(current..=end) {
                  if current < k {
                      ranges_to_add.push(current..=k - 1);
                  }
                  elements_to_add.push(v);
                  current = k + 1;
              }
              if current <= end {
                  ranges_to_add.push(current..=end);
              }
          };

          if *bv == LLMTokenBV::max_ones() {
              process_range(0..=max_token_id, &mut ranges_to_add, &mut elements_to_add);
          } else {
              for range in bv.inner().ranges() {
                  process_range(*range.start()..=*range.end(), &mut ranges_to_add, &mut elements_to_add);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV { inner: crate::datastructures::cache::intern_l1(new_set) }
      }

      fn remap_llm_bv_permutation(bv: &LLMTokenBV, map_old_to_new: &BTreeMap<usize, usize>, _max_token_id: usize) -> LLMTokenBV {
          // Fast‑paths for empty or full‑universe bitvectors.
          if bv.is_empty() { return LLMTokenBV::zeros(); }
          if *bv == LLMTokenBV::max_ones() { return LLMTokenBV::max_ones(); }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          for range in bv.inner().ranges() {
              let (mut current, end) = (*range.start(), *range.end());

              for (&k, &v) in map_old_to_new.range(current..=end) {
                  if current < k {
                      // Identity mapping for elements not in map_old_to_new
                      ranges_to_add.push(current..=k - 1);
                  }
                  elements_to_add.push(v);
                  current = k + 1;
              }

              if current <= end {
                  // Identity mapping for the rest of the range
                  ranges_to_add.push(current..=end);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV { inner: crate::datastructures::cache::intern_l1(new_set) }
      }

      /// Merge equivalent internal LLM token ids in Trie3:
      /// Two tokens are equivalent if they occur together in every LLMTokenBV occurrence across:
      /// - node.value.live_tokens
      /// - each edge key's (pop, LLMTokenBV) mask
      ///
      /// Applies many-to-one mapping into representative ids, remapping node/edge masks,
      /// and updates the provided StageVocab.
      pub fn merge_equivalent_llm_tokens_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          stage_vocab: &mut StageVocab,
      ) {
          crate::debug!(2, "Merging equivalent LLM tokens in Trie3...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          // 1) Collect all unique bitsets to use as splitters.
          let mut all_bvs = HashSet::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie3 Merge Tokens (Collect BVs)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let g = n.read(trie3_god).expect("read");
              for ((_, llm_bv), _dm) in g.children() {
                  if !llm_bv.is_empty() {
                      all_bvs.insert(llm_bv.clone());
                  }
              }
          }
          if all_bvs.is_empty() { return; }

          // 2) Partition refinement.
          let max_tok = stage_vocab.internal_max_llm_token;
          let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
          let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
          class_to_tokens.insert(0, (0..=max_tok).collect());
          let mut num_classes = 1;

          #[cfg(not(rustrover))]
          let it = tqdm!(all_bvs.iter(), desc = "Trie3 Merge Tokens (Refine)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_bvs.iter();
          for splitter_bv in it {
              if *splitter_bv == LLMTokenBV::max_ones() { continue; }

              let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
              for token in splitter_bv.iter() {
                  if token <= max_tok {
                      let class_id = token_to_class[token];
                      members_in_splitter_by_class.entry(class_id).or_default().push(token);
                  }
              }

              for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                  let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                  if old_class_size == 0 { continue; }

                  if !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                      let new_class_id = num_classes;
                      num_classes += 1;

                      for &token in &tokens_for_new_class {
                          token_to_class[token] = new_class_id;
                      }

                      let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                      let moved_tokens_set: HashSet<_> = tokens_for_new_class.iter().cloned().collect();
                      old_class_tokens.retain(|t| !moved_tokens_set.contains(t));
                      
                      class_to_tokens.insert(new_class_id, tokens_for_new_class);
                  }
              }
          }

          // 3) Build many-to-one mapping from the final partition.
          let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
          let mut merged_count = 0;
          for (_class_id, group) in &class_to_tokens {
              if group.len() <= 1 { continue; }
              let rep = *group.iter().min().unwrap();
              for &t in group {
                  if t != rep {
                      old_to_new.insert(t, rep);
                      merged_count += 1;
                  }
              }
          }
          let tokens_before = max_tok + 1;
          let tokens_after = num_classes;
          crate::debug!(2, "Trie3: merged LLM tokens. Before: {}, After: {}. ({} merged)", tokens_before, tokens_after, merged_count);
          if merged_count == 0 { return; }

          // Memoization cache for remapping.
          let mut memo: HashMap<LLMTokenBV, LLMTokenBV> = HashMap::new();

          // Precompute the mapped universal set once (used when a set equals max_ones())
          let mut mapped_universe = LLMTokenBV::zeros();
          for t in 0..=max_tok {
              let rep = old_to_new.get(&t).copied().unwrap_or(t);
              mapped_universe.insert(rep);
          }

          // Identify affected bitvector instances (by Arc pointer identity)
          let mut affected_ptrs: HashSet<*const RangeSetBlaze<usize>> = HashSet::new();
          for splitter in all_bvs {
              affected_ptrs.insert(Arc::as_ptr(&splitter.inner));
          }

          // 4) Remap trie in‑place, only where needed
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie3 Merge (Remap In‑Place)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              // Quick check whether this node references any affected bitvector.
              let needs_update = {
                  let r = n.read(trie3_god).expect("read");
                  let lv_ptr = Arc::as_ptr(&r.value.live_tokens.inner);
                  if affected_ptrs.contains(&lv_ptr) {
                      true
                  } else {
                      let mut touched = false;
                      for ((_, llm_bv), _dm) in r.children() {
                          let key_ptr = Arc::as_ptr(&llm_bv.inner);
                          if affected_ptrs.contains(&key_ptr) {
                              touched = true;
                              break;
                          }
                      }
                      touched
                  }
              };
              if !needs_update { continue; }

              let mut w = n.write(trie3_god).expect("write");

              // Remap edge keys (pop, LLMTokenBV)
              let old_children = std::mem::take(w.children_mut());
              let mut new_children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTreeMap::new();
              for ((pop, llm_bv), dm) in old_children {
                  let mapped_key_bv = if llm_bv.is_empty() {
                      LLMTokenBV::zeros()
                  } else if llm_bv == LLMTokenBV::max_ones() {
                      mapped_universe.clone()
                  } else {
                      let key_ptr = Arc::as_ptr(&llm_bv.inner);
                      if affected_ptrs.contains(&key_ptr) {
                          memo.entry(llm_bv)
                              .or_insert_with_key(|bv| remap_llm_bv_many_to_one(bv, &old_to_new, max_tok))
                              .clone()
                      } else {
                          llm_bv
                      }
                  };
                  if mapped_key_bv.is_empty() { continue; }
                  let entry = new_children.entry((pop, mapped_key_bv)).or_insert_with(OrderedHashMap::new);
                  for (dst, sid_bv) in dm {
                      entry.entry(dst)
                          .and_modify(|e| *e |= &sid_bv)
                          .or_insert(sid_bv);
                  }
      		}
      		*w.children_mut() = new_children;

      		// Recompute live tokens from the new children
      		let mut new_live = LLMTokenBV::zeros();
      		for ((_, llm_bv), _) in w.children() {
      			new_live |= llm_bv;
      		}
      		w.value.live_tokens = new_live;
      	}
      	// 5) Update StageVocab
      	#[cfg(not(rustrover))]
      	let it = tqdm!(old_to_new.iter(), desc = "Trie3 Merge (Update Vocab)", total = old_to_new.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
      	#[cfg(rustrover)]
      	let it = old_to_new.iter();
      	for (old, rep) in it {
      		if old == rep { continue; }
      		if let Some(moved) = stage_vocab.internal_to_original.remove(old) {
      			let entry = stage_vocab.internal_to_original.entry(*rep).or_default();
      			*entry |= &moved;
      			for o in moved.iter() {
      				stage_vocab.original_to_internal.insert(o, *rep);
      			}
      		}
      	}
      }

      /// Reorder internal LLM tokens in Trie3 with a simple heuristic to cluster co-occurring tokens.
      pub fn reorder_llm_tokens_for_range_minimization_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          stage_vocab: &mut StageVocab,
      ) {
          crate::debug!(2, "Reordering LLM tokens in Trie3 for range minimization...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }
          let ranges_before = count_total_ranges_trie3(&all_nodes, trie3_god);

          let max_tok = stage_vocab.internal_max_llm_token;

          // 1. Collect unique BV counts to optimize frequency calculation.
          let mut bv_counts: HashMap<LLMTokenBV, usize> = HashMap::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie3 Reorder (Collect BVs)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let g = n.read(trie3_god).expect("read");
              for ((_, llm_bv), _dm) in g.children() {
                  if !llm_bv.is_empty() {
                      *bv_counts.entry(llm_bv.clone()).or_default() += 1;
                  }
              }
          }

          // 2. Compute token frequencies from unique BV counts.
          let mut freq: Vec<usize> = vec![0; max_tok + 1];
          #[cfg(not(rustrover))]
          let it = tqdm!(bv_counts.iter(), desc = "Trie3 Reorder (Count Frequencies)", total = bv_counts.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = bv_counts.iter();
          for (bv, &count) in it {
              if bv.is_all() {
                  for t in 0..=max_tok {
                      freq[t] += count;
                  }
              } else {
                  for t in bv.iter() {
                      if t <= max_tok {
                          freq[t] += count;
                      }
                  }
              }
          }
          crate::debug!(2, "Done computing frequencies.");
          let mut present: Vec<usize> = (0..=max_tok).filter(|t| freq[*t] > 0).collect();
          if present.is_empty() { return; }
          present.sort_by_key(|&t| (std::cmp::Reverse(freq[t]), t));

          let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
          for (new_id, old_id) in present.iter().enumerate() {
              old_to_new.insert(*old_id, new_id);
          }

          // Memoization cache
          let mut memo: HashMap<LLMTokenBV, LLMTokenBV> = HashMap::new();

          let mut new_states = Vec::with_capacity(all_nodes.len());
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie3 Reorder (Remap Read)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let r = n.read(trie3_god).expect("read");
              let mut new_children = BTreeMap::new();
              for ((pop, llm_bv), dm) in r.children() {
                  let mapped_key_bv = memo.entry(llm_bv.clone())
                      .or_insert_with_key(|bv| remap_llm_bv_permutation(bv, &old_to_new, max_tok))
                      .clone();
                  if mapped_key_bv.is_empty() { continue; }
                  let entry = new_children.entry((*pop, mapped_key_bv)).or_insert_with(OrderedHashMap::new);
                  for (dst, sid_bv) in dm {
                      entry.entry(dst.clone()).and_modify(|e| *e |= sid_bv).or_insert_with(|| sid_bv.clone());
                  }
              }
              new_states.push(new_children);
          }
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter().enumerate(), desc = "Trie3 Reorder (Remap Write)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter().enumerate();
          for (i, n) in it {
              let mut w = n.write(trie3_god).expect("write");
              let children = &new_states[i];
              let mut new_live = LLMTokenBV::zeros();
              for ((_, llm_bv), _) in children {
                  new_live |= llm_bv;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = children.clone();
          }
      	let ranges_after = count_total_ranges_trie3(&all_nodes, trie3_god);

      	// Update StageVocab under permutation
      	let mut new_internal_to_original: BTreeMap<usize, LLMTokenBV> = BTreeMap::new();
      	#[cfg(not(rustrover))]
      	let it = tqdm!(stage_vocab.internal_to_original.clone().into_iter(), desc = "Trie3 Reorder (Vocab 1)", disable = !PROGRESS_BAR_ENABLED, leave = true);
      	#[cfg(rustrover)]
      	let it = stage_vocab.internal_to_original.clone().into_iter();
      	for (old_id, setv) in it {
      		if let Some(new_id) = old_to_new.get(&old_id) {
      			new_internal_to_original.insert(*new_id, setv);
              }
          }
          stage_vocab.internal_to_original = new_internal_to_original;
          let mut new_original_to_internal: BTreeMap<usize, usize> = BTreeMap::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(stage_vocab.original_to_internal.clone().into_iter(), desc = "Trie3 Reorder (Vocab 2)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = stage_vocab.original_to_internal.clone().into_iter();
          for (orig, old_internal) in it {
              if let Some(new_internal) = old_to_new.get(&old_internal) {
                  new_original_to_internal.insert(orig, *new_internal);
              }
          }
          stage_vocab.original_to_internal = new_original_to_internal;
          stage_vocab.internal_max_llm_token = present.len().saturating_sub(1);
          crate::debug!(2, "Trie3 reordering complete. Ranges reduced from {} to {}. New max internal token ID: {}", ranges_before, ranges_after, stage_vocab.internal_max_llm_token);
      }

      fn simplify_llm_token_bvs_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
      ) {
          crate::debug!(2, "Simplifying LLM token bitsets in Trie3 to reduce range counts...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let universe = LLMTokenBV::ones(max_llm_token_id + 1);

          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie3 Simplify LLM BVs", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = false);
          #[cfg(rustrover)]
          let it = all_nodes.iter();

          for node_idx in it {
              let mut w = node_idx.write(trie3_god).expect("write");
              if w.children().is_empty() {
                  continue;
              }

              // Recompute live_tokens on the fly to ensure it's accurate for this pass.
              let live_u = {
                  let mut u = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in w.children() { u |= llm_bv; }
                  u
              };
              if live_u.is_all() { // If all tokens are live, no simplification is possible.
                  continue;
              }
              let dead_u = &universe - &live_u;

              let old_children = std::mem::take(w.children_mut());
              let mut new_children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTreeMap::new();

              for ((pop, l), dm) in old_children {
                  let mut l_new = l.clone();
                  l_new |= &dead_u;

                  let entry = new_children.entry((pop, l_new)).or_default();
                  for (dest, sids) in dm {
                      entry.entry(dest).and_modify(|e| *e |= &sids).or_insert(sids);
                  }
              }
              *w.children_mut() = new_children;
          }
          crate::debug!(2, "Finished simplifying LLM token bitsets.");
      }

      fn prune_nodes_not_reaching_end_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Pruning Trie3 nodes that cannot reach any end node (reverse reachability)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          if roots_vec.is_empty() {
              return;
          }

          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Build reverse adjacency: dest -> sources
          let mut incoming: HashMap<PrecomputeNode3Index, Vec<PrecomputeNode3Index>> = HashMap::new();
          for src in &all_nodes {
              let g = src.read(trie3_god).expect("read");
              for (_ek, dm) in g.children() {
                  for (dst, _bv) in dm {
                      incoming.entry(*dst).or_default().push(*src);
                  }
              }
          }

          // Initialize worklist with all end nodes
          let mut productive: HashSet<PrecomputeNode3Index> = HashSet::new();
          let mut q: VecDeque<PrecomputeNode3Index> = VecDeque::new();
          let mut end_nodes_count = 0usize;
          for n in &all_nodes {
              let r = n.read(trie3_god).expect("read");
              if r.value.end {
                  end_nodes_count += 1;
                  if productive.insert(*n) {
                      q.push_back(*n);
                  }
              }
          }
          if end_nodes_count == 0 {
              crate::debug!(2, "No end nodes found in Trie3; skipping end-reachability pruning.");
              return;
          }

          // Reverse BFS
          while let Some(d) = q.pop_front() {
              if let Some(srcs) = incoming.get(&d) {
                  for s in srcs {
                      if productive.insert(*s) {
                          q.push_back(*s);
                      }
                  }
              }
          }

          let total_nodes = all_nodes.len();
          let productive_nodes = productive.len();
          let prunable = total_nodes.saturating_sub(productive_nodes);
          crate::debug!(2, "Trie3 end-reachability: total={}, productive={}, prunable={}", total_nodes, productive_nodes, prunable);
          if prunable == 0 {
              return;
          }

          // Remove any edge to a non-productive destination
          for n in &all_nodes {
              let mut w = n.write(trie3_god).expect("write");
              let mut new_children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> = BTreeMap::new();
              for (ek, dm) in w.children().clone() {
                  let mut new_dm: OrderedHashMap<Trie2Index, StateIDBV> = OrderedHashMap::new();
                  for (dst, bv) in dm {
                      if productive.contains(&dst) {
                          new_dm.insert(dst, bv);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek, new_dm);
                  }
              }
              *w.children_mut() = new_children;
          }

          // GC everything now unreachable from roots
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec2);

          crate::debug!(2, "Finished end-reachability pruning in Trie3.");
      }

      fn factor_common_destinations_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          min_incoming: usize,
      ) {
          crate::debug!(2, "Factoring out common destinations in Trie3.");
          // use dynamic threshold provided by config via min_incoming
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          let all_llm_bv = LLMTokenBV::ones(max_llm_token_id + 1);
          let all_sids_bv = StateIDBV::ones(max_state_id + 1);

          // Map: dest -> { (pop, llm_bv) -> { state_id_bv -> [sources] } }
          let mut incoming_map: HashMap<
              PrecomputeNode3Index,
              HashMap<
                  (isize, LLMTokenBV),
                  HashMap<StateIDBV, Vec<PrecomputeNode3Index>>,
              >,
          > = HashMap::new();

          for src_idx in &all_nodes {
              let guard = src_idx.read(trie3_god).expect("read");
              for (edge_key, dest_map) in guard.children() {
                  for (dest_idx, sids_bv) in dest_map {
                      incoming_map
                          .entry(*dest_idx)
                          .or_default()
                          .entry(edge_key.clone())
                          .or_default()
                          .entry(sids_bv.clone())
                          .or_default()
                          .push(*src_idx);
                  }
              }
          }

          for (dest_idx, edges_by_key) in incoming_map {
              for (edge_key, sources_by_sids) in edges_by_key {
                  for (sids_bv, sources) in sources_by_sids {
                      if sources.len() >= min_incoming {
                          // Create intermediate node
                          let intermediate_node = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())));

                          // Add edge from intermediate to original destination
                          {
                              let mut intermediate_guard = intermediate_node.write(trie3_god).expect("write");
                              let dest_map = intermediate_guard.children_mut().entry(edge_key.clone()).or_default();
                              dest_map.insert(dest_idx, sids_bv.clone());
                              intermediate_guard.value.live_tokens |= &edge_key.1;
                          }

                          // Reroute sources to point to intermediate node
                          for src_idx in &sources {
                              let mut src_guard = src_idx.write(trie3_god).expect("write");

                              // Remove old edge
                              if let Some(dest_map_for_key) = src_guard.children_mut().get_mut(&edge_key) {
                                  dest_map_for_key.remove(&dest_idx);
                                  if dest_map_for_key.is_empty() {
                                      src_guard.children_mut().remove(&edge_key);
                                  }
                              }

                              // Add new edge to intermediate node. This is a "None-like" edge.
                              // pop=0, all llm tokens, all state ids.
                              let none_like_edge_key = (0, all_llm_bv.clone());
                              let dest_map = src_guard.children_mut().entry(none_like_edge_key).or_default();
                              dest_map.insert(intermediate_node, all_sids_bv.clone());
                              // Recompute live tokens from scratch after modifying edges.
                              let mut new_live = LLMTokenBV::zeros();
                              for ((_, llm_bv), _) in src_guard.children() {
                                  new_live |= llm_bv;
                              }
                              src_guard.value.live_tokens = new_live;
                          }
                      }
                  }
              }
          }
          crate::debug!(2, "Finished factoring common destinations in Trie3.");
      }

      fn constrain_bitvecs_trie3(
          trie3_god: &Trie3GodWrapper,
          roots_vec: &[PrecomputeNode3Index],
          max_state_id: usize,
          max_llm_token_id: usize,
      ) {
          crate::debug!(2, "Constraining bitvectors in Trie 3...");
          let all_nodes = Trie::all_nodes(trie3_god, roots_vec);
          if all_nodes.is_empty() { return; }

          for node_arc in all_nodes {
              let mut guard = node_arc.write(trie3_god).unwrap();

              // Constrain live_tokens on the node value
              guard.value.live_tokens.constrain(max_llm_token_id);

              let old_children = std::mem::take(guard.children_mut());
              let mut new_children = BTreeMap::new();

              for ((pop, mut llm_bv), dest_map) in old_children {
                  llm_bv.constrain(max_llm_token_id);

                  let mut new_dest_map = OrderedHashMap::new();
                  for (dest_wrapper, mut sids_bv) in dest_map {
                      sids_bv.constrain(max_state_id);
                      if !sids_bv.is_empty() {
                          new_dest_map.insert(dest_wrapper, sids_bv);
                      }
                  }

                  if !llm_bv.is_empty() && !new_dest_map.is_empty() {
                      // Need to merge if the key (with constrained llm_bv) already exists
                      let entry = new_children.entry((pop, llm_bv)).or_insert_with(OrderedHashMap::new);
                      for (dest, sids) in new_dest_map {
                          entry.entry(dest)
                              .and_modify(|existing_sids| *existing_sids |= &sids)
                              .or_insert(sids);
                      }
                  }
              }
              *guard.children_mut() = new_children;
          }
          crate::debug!(2, "Finished constraining bitvectors.");
      }

      pub fn prune_dead_paths_trie3(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper) {
          crate::debug!(2, "Pruning dead paths from precomputed trie 3.");

          let all_nodes = Trie::all_nodes(trie3_god, &roots.values().cloned().collect::<Vec<_>>());
          if all_nodes.is_empty() { return; }

          let mut predecessors: HashMap<PrecomputeNode3Index, Vec<(PrecomputeNode3Index, (isize, LLMTokenBV))>> = HashMap::new();
          let mut worklist = VecDeque::new();
          let mut live: HashMap<PrecomputeNode3Index, LLMTokenBV> = HashMap::new();

          // 1. Initialize live sets and build predecessor map.
          for node_arc in &all_nodes {
              let node_ptr = *node_arc;
              live.insert(node_ptr, LLMTokenBV::zeros());

              let guard = node_arc.read(trie3_god).unwrap();
              if guard.value.end {
                  // Seed end nodes with 'all tokens' to allow backward propagation through edge masks.
                  live.insert(node_ptr, LLMTokenBV::max_ones());
                  worklist.push_back(node_ptr);
              }

              for (edge_key, dest_map) in guard.children() {
                  for child_wrap in dest_map.keys() {
                      predecessors.entry(*child_wrap).or_default().push((node_ptr, edge_key.clone()));
                  }
              }
          }

          #[cfg(not(rustrover))]
          let pb = {
              let pb = ProgressBar::new(all_nodes.len() as u64);
              pb.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [Trie3 Prune] [{elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} ({eta})")
                      .unwrap(),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb.set_draw_target(indicatif::ProgressDrawTarget::hidden());
              }
              pb.set_position(0);
              pb
          };
          #[cfg(rustrover)]
          let pb = ProgressBar::hidden();

          // 2. Propagate liveness until a fixed point is reached.
          while let Some(node_ptr) = worklist.pop_front() {
              pb.inc(1);

              let live_at_node = live.get(&node_ptr).unwrap().clone();
              if let Some(preds) = predecessors.get(&node_ptr) {
                  for (pred_ptr, edge_key) in preds {
                      let live_from_edge = &live_at_node & &edge_key.1;
                      if live_from_edge.is_empty() {
                          continue;
                      }

                      let pred_live = live.get_mut(pred_ptr).unwrap();
                      let old_len = pred_live.len();
                      *pred_live |= &live_from_edge;
                      if pred_live.len() > old_len {
                          worklist.push_back(*pred_ptr);
                      }
                  }
              }
          }
          pb.finish_and_clear();

          // 3. Prune the graph based on the computed live sets.
          for node_arc in &all_nodes {
              let mut guard = node_arc.write(trie3_god).unwrap();
              let mut new_children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> = BTreeMap::new();

              for (edge_key, dest_map) in guard.children() {
                  for (child_wrapper, edge_value_sids) in dest_map {
                      let live_from_child = live.get(child_wrapper).unwrap();

                      let live_on_edge = &edge_key.1 & live_from_child;

                      if !live_on_edge.is_empty() {
                          let new_edge_key = (edge_key.0, live_on_edge);
                          let new_dest_map_for_key = new_children.entry(new_edge_key).or_default();
                          new_dest_map_for_key.entry(*child_wrapper)
                              .and_modify(|v| *v |= edge_value_sids)
                              .or_insert_with(|| edge_value_sids.clone());
                      }
                  }
              }
              *guard.children_mut() = new_children;

              // Update the node's own live_tokens field with the final computed value.
              let node_ptr = *node_arc;
              guard.value.live_tokens = live.get(&node_ptr).unwrap().clone();
          }
          crate::debug!(2, "Finished pruning dead paths from trie 3.");
      }

      pub fn merge_nodes_trie3_fast(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper) {
          merge_nodes_trie3_impl(roots, trie3_god, 2);
      }

      pub fn merge_nodes_trie3(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper, max_iters: usize) {
          merge_nodes_trie3_impl(roots, trie3_god, max_iters);
      }

      fn merge_nodes_trie3_impl(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper, max_iters: usize) {
          crate::debug!(2, "Merging identical subtrees in precomputed trie 3 (max_iters={}).", max_iters);

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          let mut dense_of: HashMap<Trie2Index, usize> = HashMap::new();
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(all_nodes.len());
          for (i, node_idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*node_idx, i);
              old_of.push(*node_idx);
          }
          let n = all_nodes.len();

          let mut ends: Vec<bool> = vec![false; n];
          type RawEdge3 = (isize, LLMTokenBV, usize, StateIDBV);
          let mut raw_edges: Vec<Vec<RawEdge3>> = vec![Vec::new(); n];

          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let guard = u_idx.read(trie3_god).unwrap();
              ends[u_dense] = guard.value.end;
              for (ek, dest_map) in guard.children() {
                  for (v_idx, bv) in dest_map {
                      if let Some(&v_dense) = dense_of.get(v_idx) {
                          raw_edges[u_dense].push((ek.0, ek.1.clone(), v_dense, bv.clone()));
                      }
                  }
              }
          }

          let mut prev_class: Vec<usize> = (0..n).map(|i| if ends[i] { 1 } else { 0 }).collect();

          let mut it: usize = 0;
          loop {
              type AggregatedEdge3 = ((isize, LLMTokenBV, usize), StateIDBV);
              type Signature3 = (bool, Vec<AggregatedEdge3>);

              let mut sig_to_id: HashMap<Signature3, usize> = HashMap::new();
              let mut new_class = vec![0; n];
              let mut next_id = 0;
              let mut changes = 0;

              #[cfg(not(rustrover))]
              let its = tqdm!(0..n, desc = format!("Trie3 Merge Iter {}", it + 1), total = n, disable = !PROGRESS_BAR_ENABLED, leave = true);
              #[cfg(rustrover)]
              let its = 0..n;
              for u in its {
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u] {
                      let dest_class = prev_class[*v_dense];
                      let key = (*p, bv_key.clone(), dest_class);
                      aggr.entry(key).and_modify(|e| *e |= sids).or_insert_with(|| sids.clone());
                  }
                  let agg_edges: Vec<AggregatedEdge3> = aggr.into_iter().collect();

                  let sig: Signature3 = (ends[u], agg_edges);

                  let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });

                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }

              crate::debug!(3, "Trie3 merge iter {}: classes={}, changes={}", it + 1, next_id, changes);
              prev_class = new_class;
              if changes == 0 { break; }
              it += 1;
              if max_iters > 0 && it >= max_iters {
                  break;
              }
          }

          let final_partition = prev_class;
          let num_classes = final_partition.iter().max().map_or(0, |m| m + 1);

          let mut representatives: Vec<Option<Trie2Index>> = vec![None; num_classes];
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              if representatives[class_id].is_none() {
                  representatives[class_id] = Some(old_of[u_dense]);
              }
          }

          let mut node_to_rep: HashMap<Trie2Index, Trie2Index> = HashMap::new();
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], representatives[class_id].unwrap());
          }

          for class_id in 0..num_classes {
              if let Some(rep_idx) = representatives[class_id] {
                  let u_dense = final_partition.iter().position(|&c| c == class_id).unwrap();

                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u_dense] {
                      let dest_class = final_partition[*v_dense];
                      aggr.entry((*p, bv_key.clone(), dest_class)).and_modify(|e| *e |= sids).or_insert_with(|| sids.clone());
                  }

                  let mut new_children = BTreeMap::new();
                  let mut new_live_tokens = LLMTokenBV::zeros();
                  for ((p, bv_key, dest_class), sids) in aggr {
                      if let Some(dest_rep_idx) = representatives[dest_class] {
                          new_children.entry((p, bv_key.clone())).or_insert_with(OrderedHashMap::new).insert(dest_rep_idx, sids);
                          new_live_tokens |= &bv_key;
                      }
                  }

                  // Recompute live tokens from the new merged edges.
                  let mut new_live_tokens = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &new_children {
                      new_live_tokens |= llm_bv;
                  }

                  let mut guard = rep_idx.write(trie3_god).unwrap();
                  *guard.children_mut() = new_children;
                  guard.value.live_tokens = new_live_tokens;
              }
          }

          for root_idx in roots.values_mut() {
              *root_idx = *node_to_rep.get(root_idx).unwrap();
          }

          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie3_god, &final_roots_vec);
      }

      fn merge_nodes_trie3_structural(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper, max_iters: usize) {
          crate::debug!(2, "Merging structurally equivalent subtrees in precomputed trie 3 (max_iters={}).", max_iters);

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          let mut dense_of: HashMap<Trie2Index, usize> = HashMap::new();
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(all_nodes.len());
          for (i, node_idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*node_idx, i);
              old_of.push(*node_idx);
          }
          let n = all_nodes.len();

          let mut ends: Vec<bool> = vec![false; n];
          type RawEdge3 = (isize, LLMTokenBV, usize, StateIDBV);
          let mut raw_edges: Vec<Vec<RawEdge3>> = vec![Vec::new(); n];

          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let guard = u_idx.read(trie3_god).unwrap();
              ends[u_dense] = guard.value.end;
              for (ek, dest_map) in guard.children() {
                  for (v_idx, bv) in dest_map {
                      if let Some(&v_dense) = dense_of.get(v_idx) {
                          // Note: we capture the LLMTokenBV here but won't use it in the signature.
                          raw_edges[u_dense].push((ek.0, ek.1.clone(), v_dense, bv.clone()));
                      }
                  }
              }
          }

          let mut prev_class: Vec<usize> = (0..n).map(|i| if ends[i] { 1 } else { 0 }).collect();

          let mut it: usize = 0;
          loop {
              // Signature is (end_flag, aggregated edges keyed by (pop, llm_bv, dest_class)).
              // Including the LLMTokenBV ensures we don't merge nodes that differ on token distributions.
              type SignatureStructural3 = (bool, Vec<((isize, LLMTokenBV, usize), StateIDBV)>);

              let mut sig_to_id: HashMap<SignatureStructural3, usize> = HashMap::new();
              let mut new_class = vec![0; n];
              let mut next_id = 0;
              let mut changes = 0;

              #[cfg(not(rustrover))]
              let its = tqdm!(0..n, desc = format!("Trie3 Merge Structural Iter {}", it + 1), total = n, disable = !PROGRESS_BAR_ENABLED, leave = true);
              #[cfg(rustrover)]
              let its = 0..n;
              for u in its {
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u] {
                      let dest_class = prev_class[*v_dense];
                      let key = (*p, bv_key.clone(), dest_class);
                      aggr.entry(key)
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }

                  let agg_edges: Vec<((isize, LLMTokenBV, usize), StateIDBV)> = aggr.into_iter().collect();
                  let sig: SignatureStructural3 = (ends[u], agg_edges);

                  let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });

                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }

              crate::debug!(3, "Trie3 structural merge iter {}: classes={}, changes={}", it + 1, next_id, changes);
              prev_class = new_class;
              if changes == 0 { break; }
              it += 1;
              if max_iters > 0 && it >= max_iters {
                  break;
              }
          }

          // Reconstruction
          let final_partition = prev_class;
          let num_classes = final_partition.iter().max().map_or(0, |m| m + 1);

          let mut representatives: Vec<Option<Trie2Index>> = vec![None; num_classes];
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              if representatives[class_id].is_none() {
                  representatives[class_id] = Some(old_of[u_dense]);
              }
          }

          let mut node_to_rep: HashMap<Trie2Index, Trie2Index> = HashMap::new();
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], representatives[class_id].unwrap());
          }

          for class_id in 0..num_classes {
              if let Some(rep_idx) = representatives[class_id] {
                  // Use a single exemplar node from the class to rebuild the representative's edges
                  // based on the final partition (safe and deterministic).
                  let u_dense = final_partition.iter().position(|&c| c == class_id).unwrap();

                  // Aggregate edges by (pop, llm_bv, dest_class)
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u_dense] {
                      let dest_class = final_partition[*v_dense];
                      aggr.entry((*p, bv_key.clone(), dest_class))
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }

                  // Build representative children by mapping dest classes to their representatives.
                  let mut new_children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> = BTreeMap::new();
                  for ((p, bv_key, dest_class), sids) in aggr {
                      if let Some(dest_rep_idx) = representatives[dest_class] {
                          let dm = new_children.entry((p, bv_key.clone())).or_insert_with(OrderedHashMap::new);
                          dm.entry(dest_rep_idx)
                              .and_modify(|e| *e |= &sids)
                              .or_insert(sids);
                      }
                  }

                  // Recompute live tokens from the new merged edges.
                  let mut new_live_tokens = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &new_children {
                      new_live_tokens |= llm_bv;
                  }

                  let mut guard = rep_idx.write(trie3_god).unwrap();
                  *guard.children_mut() = new_children;
                  guard.value.live_tokens = new_live_tokens;
              }
          }

          for root_idx in roots.values_mut() {
              *root_idx = *node_to_rep.get(root_idx).unwrap();
          }

          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie3_god, &final_roots_vec);
      }

      /// Extremely fast, cycle-safe node merging using WL-style refinement with a cheap signature
      /// (ignoring StateIDBV during coarse iterations) followed by a single exact refinement within
      /// candidate equivalence classes that compares aggregated SIDs exactly. Finally, only representatives
      /// are rewritten to point to representative destinations; later GC/pruning removes non-reps.
      pub fn merge_nodes_trie3_ultrafast(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Merging nodes (ultrafast WL + exact refine) in precomputed trie 3.");

          // Collect all nodes reachable from roots
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          // Build dense index for nodes
          let n = all_nodes.len();
          let mut dense_of: HashMap<Trie2Index, u32> = HashMap::with_capacity(n.checked_mul(2).unwrap_or(n));
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(n);
          for (i, node_idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*node_idx, i as u32);
              old_of.push(*node_idx);
          }

          // First pass: count edges per node and capture ends + live token ptrs
          let mut out_counts: Vec<usize> = vec![0; n];
          let mut ends: Vec<u8> = vec![0; n];
          // Store LLM live-token pointer addresses to assign ids later
          let mut live_llm_ptrs: Vec<*const RangeSetBlaze<usize>> = vec![std::ptr::null(); n];
          #[cfg(not(rustrover))]
          let it = tqdm!(old_of.iter().enumerate(), desc = "Trie3 Merge Ultra (Pass1 count)", total = n, disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = old_of.iter().enumerate();
          for (i, node_idx) in it {
              let g = node_idx.read(trie3_god).expect("read");
              ends[i] = if g.value.end { 1 } else { 0 };
              live_llm_ptrs[i] = Arc::as_ptr(&g.value.live_tokens.inner);

              let mut cnt = 0usize;
              for (_ek, dm) in g.children() {
                  cnt += dm.len();
              }
              out_counts[i] = cnt;
          }

          // Build offsets for flat edge storage
          let mut offsets: Vec<usize> = vec![0; n + 1];
          for i in 0..n {
              offsets[i + 1] = offsets[i] + out_counts[i];
          }
          let m = offsets[n];

          // LLM bitset pointer-id map
          let mut llm_id_map: HashMap<*const RangeSetBlaze<usize>, u32> = HashMap::new();
          let mut next_llm_id: u32 = 0;
          let mut get_or_insert_llm_id = |ptr: *const RangeSetBlaze<usize>| -> u32 {
              if let Some(id) = llm_id_map.get(&ptr) {
                  *id
              } else {
                  let id = next_llm_id;
                  next_llm_id = next_llm_id.wrapping_add(1);
                  llm_id_map.insert(ptr, id);
                  id
              }
          };

          // Assign live token ids
          let mut live_llm_id: Vec<u32> = vec![0; n];
          for i in 0..n {
              live_llm_id[i] = get_or_insert_llm_id(live_llm_ptrs[i]);
          }

          // Flat edge structure: pop, llm_id, dest_dense
          #[derive(Copy, Clone)]
          struct EdgeLight {
              pop: u32,
              llm_id: u32,
              dest: u32,
          }
          let mut edges: Vec<EdgeLight> = vec![EdgeLight { pop: 0, llm_id: 0, dest: 0 }; m];

          // Second pass: fill flat edges
          #[cfg(not(rustrover))]
          let it = tqdm!(old_of.iter().enumerate(), desc = "Trie3 Merge Ultra (Pass2 fill)", total = n, disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = old_of.iter().enumerate();
          for (i, node_idx) in it {
              let g = node_idx.read(trie3_god).expect("read");
              let mut p = offsets[i];
              for (ek, dm) in g.children() {
                  let pop_u32 = ek.0 as u32;
                  let llm_ptr = Arc::as_ptr(&ek.1.inner);
                  let llm_id = get_or_insert_llm_id(llm_ptr);
                  for (dst, _sids) in dm {
                      let dest_dense = *dense_of.get(dst).expect("dense id") as u32;
                      edges[p] = EdgeLight { pop: pop_u32, llm_id, dest: dest_dense };
                      p += 1;
                  }
              }
              debug_assert_eq!(p, offsets[i + 1]);
          }

          // Coarse WL refinement ignoring SIDs
          let max_iters_coarse: usize = 6; // small number of iterations for speed
          let mut prev_class: Vec<u32> = vec![0; n];
          // Initialize coarse classes by (end flag, degree, live_llm_id)
          {
              let mut init_map: HashMap<(u8, u32, usize), u32> = HashMap::with_capacity(n.checked_div(2).unwrap_or(1024));
              let mut next_c: u32 = 0;
              for i in 0..n {
                  let deg = offsets[i + 1] - offsets[i];
                  let key = (ends[i], live_llm_id[i], deg);
                  let c = init_map.entry(key).or_insert_with(|| { let id = next_c; next_c = next_c.wrapping_add(1); id });
                  prev_class[i] = *c;
              }
          }

          // Workspace vectors to avoid reallocations
          let mut tmp_items: Vec<(u32, u32, u32)> = Vec::with_capacity(16); // (pop, llm_id, dest_class)
          let mut agg_items: Vec<((u32, u32, u32), u32)> = Vec::with_capacity(16); // ((pop,llm,dest_class), count)
          let mut new_class: Vec<u32> = vec![0; n];
          for it in 0..max_iters_coarse {
              // Phase: compute coarse signature hashes per node
              // We'll use a simple FNV-1a over a sorted aggregated vector
              let mut h_of: Vec<u64> = vec![0; n];
              #[cfg(not(rustrover))]
              let itn = tqdm!(0..n, desc = format!("Trie3 Merge Ultra (WL coarse {} / {})", it + 1, max_iters_coarse), total = n, disable = !PROGRESS_BAR_ENABLED, leave = true);
              #[cfg(rustrover)]
              let itn = 0..n;
              for u in itn {
                  tmp_items.clear();
                  let begin = offsets[u];
                  let end = offsets[u + 1];
                  for idx in begin..end {
                      let e = edges[idx];
                      let dclass = prev_class[e.dest as usize];
                      tmp_items.push((e.pop, e.llm_id, dclass));
                  }
                  if tmp_items.len() > 1 {
                      tmp_items.sort_unstable();
                  }
                  agg_items.clear();
                  let mut i2 = 0usize;
                  while i2 < tmp_items.len() {
                      let key = tmp_items[i2];
                      let mut cnt: u32 = 1;
                      i2 += 1;
                      while i2 < tmp_items.len() && tmp_items[i2] == key {
                          cnt = cnt.wrapping_add(1);
                          i2 += 1;
                      }
                      agg_items.push((key, cnt));
                  }
                  // FNV-1a hash
                  let mut h: u64 = 0xcbf29ce484222325;
                  // end flag
                  h ^= ends[u] as u64;
                  h = h.wrapping_mul(0x100000001b3);
                  // live_llm_id
                  h ^= live_llm_id[u] as u64;
                  h = h.wrapping_mul(0x100000001b3);
                  // length
                  h ^= agg_items.len() as u64;
                  h = h.wrapping_mul(0x100000001b3);
                  for &((p, lid, dc), cnt) in &agg_items {
                      h ^= p as u64; h = h.wrapping_mul(0x100000001b3);
                      h ^= lid as u64; h = h.wrapping_mul(0x100000001b3);
                      h ^= dc as u64; h = h.wrapping_mul(0x100000001b3);
                      h ^= cnt as u64; h = h.wrapping_mul(0x100000001b3);
                  }
                  h_of[u] = h;
              }

              // Compress hashes to new classes
              let mut map: HashMap<u64, u32> = HashMap::with_capacity(n.checked_div(2).unwrap_or(1024));
              let mut next_c: u32 = 0;
              let mut changes = 0usize;
              for u in 0..n {
                  let cid = *map.entry(h_of[u]).or_insert_with(|| { let id = next_c; next_c = next_c.wrapping_add(1); id });
                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }
              crate::debug!(3, "Trie3 ultrafast coarse iter {}: classes={}, changes={}", it + 1, map.len(), changes);
              prev_class = new_class;
              new_class = vec![0; n];
              if changes == 0 { break; }
          }

          // Now do an exact refinement within each coarse class by aggregating SIDs exactly.
          // Build membership list as sorted pairs (class, node)
          let mut membership: Vec<(u32, u32)> = (0..n as u32).map(|u| (prev_class[u as usize], u)).collect();
          membership.sort_unstable_by_key(|x| x.0);

          // We'll produce a node->representative map (dense ids)
          let mut node_to_rep_dense: Vec<u32> = (0..n as u32).collect();

          #[derive(Hash, Eq, PartialEq, Clone)]
          struct KeyNoSids {
              end: u8,
              live: u32,
              // Sorted vector of (pop, llm_id, dest_class) triples
              edges: Vec<(u32, u32, u32)>,
          }
          struct Prototype {
              sids: Vec<StateIDBV>, // aligned with edges order
              rep_dense: u32,
          }

          // Iterate groups
          let mut i = 0usize;
          #[cfg(not(rustrover))]
          let total_groups = membership.len();
          #[cfg(not(rustrover))]
          let mut processed_nodes = 0usize;
          while i < membership.len() {
              let class_id = membership[i].0;
              let start = i;
              while i < membership.len() && membership[i].0 == class_id {
                  i += 1;
              }
              let end_span = i;
              let span_len = end_span - start;
              if span_len <= 1 {
                  // Single node - it is its own representative
                  let u_dense = membership[start].1;
                  node_to_rep_dense[u_dense as usize] = u_dense;
                  #[cfg(not(rustrover))]
                  { processed_nodes += 1; }
                  continue;
              }

              // Build prototype map keyed by (end, live, keys_without_sids)
              let mut key_map: HashMap<KeyNoSids, Vec<Prototype>> = HashMap::new();
              #[cfg(not(rustrover))]
              let it = tqdm!(start..end_span, desc = "Trie3 Merge Ultra (Exact refine group)", disable = !PROGRESS_BAR_ENABLED, leave = false);
              #[cfg(rustrover)]
              let it = start..end_span;
              for idx in it {
                  let u_dense = membership[idx].1 as usize;
                  let node_idx = old_of[u_dense];
                  let g = node_idx.read(trie3_god).expect("read");

                  // Aggregate SIDs per (pop, llm_id, coarse_dest_class)
                  let mut aggr: BTreeMap<(u32, u32, u32), StateIDBV> = BTreeMap::new();
                  for (ek, dm) in g.children() {
                      let pop_u32 = ek.0 as u32;
                      let llm_ptr = Arc::as_ptr(&ek.1.inner);
                      let llm_id = *llm_id_map.get(&llm_ptr).expect("llm_id present");
                      for (dst, sids) in dm {
                          let dest_dense = *dense_of.get(dst).expect("dense of dst") as usize;
                          let coarse_dest_class = prev_class[dest_dense];
                          aggr.entry((pop_u32, llm_id, coarse_dest_class))
                              .and_modify(|v| *v |= sids)
                              .or_insert_with(|| sids.clone());
                      }
                  }

                  // Build key without sids
                  let mut keys_vec: Vec<(u32, u32, u32)> = aggr.keys().cloned().collect();
                  // BTreeMap iteration is already sorted; we can rely on that
                  let key = KeyNoSids {
                      end: ends[u_dense],
                      live: live_llm_id[u_dense],
                      edges: keys_vec.clone(),
                  };
                  let sids_vec: Vec<StateIDBV> = aggr.into_values().collect();

                  // Try to match an existing prototype
                  let entry = key_map.entry(key).or_insert_with(Vec::new);
                  let mut found = None;
                  for proto in entry.iter() {
                      if proto.sids.len() != sids_vec.len() { continue; }
                      let mut ok = true;
                      for (a, b) in proto.sids.iter().zip(sids_vec.iter()) {
                          if a != b { ok = false; break; }
                      }
                      if ok {
                          found = Some(proto.rep_dense);
                          break;
                      }
                  }
                  if let Some(rep) = found {
                      node_to_rep_dense[u_dense] = rep;
                  } else {
                      // New prototype
                      let rep = u_dense as u32;
                      node_to_rep_dense[u_dense] = rep;
                      entry.push(Prototype { sids: sids_vec, rep_dense: rep });
                  }
                  #[cfg(not(rustrover))]
                  { processed_nodes += 1; }
              }
          }
          #[cfg(not(rustrover))]
          {
              let _ = processed_nodes; // avoid unused warning
          }

          // Representatives (unique)
          let mut rep_set: HashSet<u32> = HashSet::new();
          for (u_dense, &rep) in node_to_rep_dense.iter().enumerate() {
              if u_dense as u32 == rep {
                  rep_set.insert(rep);
              }
          }

          // Rewrite representatives' children to point to representatives and recompute live tokens
          #[cfg(not(rustrover))]
          let it = tqdm!(rep_set.iter(), desc = "Trie3 Merge Ultra (Rewrite reps)", total = rep_set.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = rep_set.iter();
          for rep_dense in it {
              let rep_idx = old_of[*rep_dense as usize];
              let mut w = rep_idx.write(trie3_god).expect("write");
              let mut new_children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> = BTreeMap::new();

              // Build new children by remapping destinations to their representatives
              for (ek, dm) in w.children().clone() {
                  let (pop, llm_bv) = ek;
                  let mut dest_map = OrderedHashMap::new();
                  for (dst, sids) in dm {
                      let dst_dense = *dense_of.get(&dst).expect("dense of dst") as usize;
                      let rep_dst_dense = node_to_rep_dense[dst_dense] as usize;
                      let rep_dst_idx = old_of[rep_dst_dense];
                      dest_map.entry(rep_dst_idx)
                          .and_modify(|v| *v |= &sids)
                          .or_insert(sids);
                  }
                  if !dest_map.is_empty() {
                      new_children.insert((pop, llm_bv), dest_map);
                  }
              }

              // Recompute live tokens as union of outgoing LLM masks
              let mut new_live = LLMTokenBV::zeros();
              for ((_, llm_bv), _) in &new_children {
                  new_live |= llm_bv;
              }
              *w.children_mut() = new_children;
              w.value.live_tokens = new_live;
          }

          // Remap roots to their representatives
          for root_idx in roots.values_mut() {
              if let Some(dense) = dense_of.get(root_idx) {
                  let rep_dense = node_to_rep_dense[*dense as usize] as usize;
                  *root_idx = old_of[rep_dense];
              }
          }

          // Finalize
          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie3_god, &final_roots_vec);
          crate::debug!(2, "Ultrafast merge completed: representatives kept = {}", rep_set.len());
      }

      /// Behaviorally minimize per-node/per-pop edges by refining tokens into "semantic atoms".
      /// For each node U and each pop P, consider the family of LLM masks {L_i} attached to the
      /// outgoing edges and the corresponding destination maps D_i (dest -> SIDs). For a token t,
      /// the one-step behavior is F_t(dest) = union over i: t ∈ L_i of D_i(dest). We:
      ///  - Partition the token universe U = ⋃_i L_i into atoms by iteratively splitting by each L_i.
      ///  - For each atom B, compute F_B(dest) = ⋃_{i: B ∩ L_i ≠ ∅} D_i(dest).
      ///  - Merge atoms with identical F_B (canonical dest->SIDs vector) and union their token-sets.
      ///  - Emit the resulting minimal set of edges for pop P.
      /// We only rewrite when it improves a local size metric (sum of LLM range-counts + dest entries).
      fn refine_edges_to_token_atoms_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          max_blocks: usize,
      ) {
          crate::debug!(2, "Refining token-sets to semantic atoms in Trie3 (cap = {} blocks)...", max_blocks);
          if max_blocks == 0 {
              crate::debug!(3, "Refinement disabled due to max_blocks=0.");
              return;
          }
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          // Helper: compute range-count for a mask (bounded and constrained for safety).
          #[inline]
          fn ranges_len_bounded(m: &LLMTokenBV, max_id: usize) -> usize {
              let mut c = m.clone();
              c.constrain(max_id);
              c.inner().ranges_len()
          }

          let mut nodes_changed = 0usize;
          let mut total_improvement = 0isize;

          for node_idx in &all_nodes {
              let mut w = if let Some(guard) = node_idx.write(trie3_god) { guard } else { continue };
              if w.children().is_empty() {
                  continue;
              }

              // Take ownership of children for processing.
              let old_children = std::mem::take(w.children_mut());

              // Group by pop.
              use std::collections::BTreeMap as BTM;
              let mut by_pop: BTM<isize, Vec<(LLMTokenBV, OrderedHashMap<PrecomputeNode3Index, StateIDBV>)>> = BTM::new();
              for ((pop, llm_bv), dm) in old_children {
                  // Constrain to avoid spurious universe bits; drop empty.
                  let mut l = llm_bv.clone();
                  l.constrain(max_llm_token_id);
                  if l.is_empty() { continue; }
                  // Constrain SIDs in the map and drop empties
                  let mut dm2: OrderedHashMap<PrecomputeNode3Index, StateIDBV> = OrderedHashMap::new();
                  for (dst, mut sids) in dm {
                      sids.constrain(max_state_id);
                      if !sids.is_empty() {
                          dm2.insert(dst, sids);
                      }
                  }
                  if dm2.is_empty() { continue; }
                  by_pop.entry(pop).or_default().push((l, dm2));
              }

              // Build new children here
              let mut new_children: BTM<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTM::new();
              let mut changed_locally = false;
              let mut local_improvement = 0isize;

              for (pop, mut entries) in by_pop {
                  if entries.is_empty() {
                      continue;
                  }
                  if entries.len() == 1 {
                      // Nothing to refine; forward as is.
                      let (l, dm) = entries.pop().unwrap();
                      new_children.insert((pop, l), dm);
                      continue;
                  }

                  // Universe U
                  let mut universe = LLMTokenBV::zeros();
                  for (l, _) in &entries {
                      universe |= l;
                  }
                  universe.constrain(max_llm_token_id);
                  if universe.is_empty() {
                      continue;
                  }

                  // Atomization: iteratively split by each L_i
                  let mut blocks: Vec<LLMTokenBV> = vec![universe.clone()];
                  let mut aborted = false;
                  for (l, _) in &entries {
                      let mut next_blocks: Vec<LLMTokenBV> = Vec::with_capacity(blocks.len().saturating_mul(2));
                      for b in blocks.iter() {
                          let inter = b & l;
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff = b - l;
                          if !diff.is_empty() {
                              next_blocks.push(diff);
                          }
                      }
                      if next_blocks.len() > max_blocks {
                          aborted = true;
                          break;
                      }
                      blocks = next_blocks;
                      if blocks.is_empty() {
                          break;
                      }
                  }

                  // Local size metric before:
                  let mut old_cost_ranges = 0usize;
                  let mut old_cost_dests = 0usize;
                  for (l, dm) in &entries {
                      old_cost_ranges += ranges_len_bounded(l, max_llm_token_id);
                      old_cost_dests += dm.len();
                  }
                  let old_cost = (old_cost_ranges + old_cost_dests) as isize;

                  if aborted || blocks.is_empty() {
                      // Fallback: keep original entries
                      for (l, dm) in entries {
                          new_children.insert((pop, l), dm);
                      }
                      continue;
                  }

                  // For each block, compute unioned dest->SIDs, then group by identical canonical dest-vector.
                  use std::collections::HashMap as HM;
                  let mut grouped: HM<Vec<(PrecomputeNode3Index, StateIDBV)>, LLMTokenBV> = HM::new();

                  for b in blocks.iter() {
                      let mut dest_agg: BTM<PrecomputeNode3Index, StateIDBV> = BTM::new();
                      for (l, dm) in &entries {
                          if (b & l).is_empty() {
                              continue;
                          }
                          for (dst, sids) in dm {
                              dest_agg.entry(*dst)
                                  .and_modify(|e| *e |= sids)
                                  .or_insert_with(|| sids.clone());
                          }
                      }
                      if dest_agg.is_empty() {
                          continue;
                      }
                      let dest_vec: Vec<(PrecomputeNode3Index, StateIDBV)> = dest_agg.into_iter().collect();
                      let entry = grouped.entry(dest_vec).or_insert_with(LLMTokenBV::zeros);
                      *entry |= b;
                  }

                  // Compute new cost
                  let mut new_cost_ranges = 0usize;
                  let mut new_cost_dests = 0usize;
                  for (dest_vec, lnew) in &grouped {
                      let mut ln = lnew.clone();
                      ln.constrain(max_llm_token_id);
                      if ln.is_empty() {
                          continue;
                      }
                      new_cost_ranges += ranges_len_bounded(&ln, max_llm_token_id);
                      new_cost_dests += dest_vec.len();
                  }
                  let new_cost = (new_cost_ranges + new_cost_dests) as isize;

                  if new_cost < old_cost {
                      changed_locally = true;
                      local_improvement += old_cost - new_cost;
                      // Emit refined edges
                      for (dest_vec, lnew) in grouped {
                          let mut ln = lnew.clone();
                          ln.constrain(max_llm_token_id);
                          if ln.is_empty() {
                              continue;
                          }
                          let mut dm_out: OrderedHashMap<PrecomputeNode3Index, StateIDBV> = OrderedHashMap::new();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dm_out.insert(dst, sids);
                              }
                          }
                          if !dm_out.is_empty() {
                              new_children.insert((pop, ln), dm_out);
                          }
                      }
                  } else {
                      // Keep originals (no improvement)
                      for (l, dm) in entries {
                          new_children.insert((pop, l), dm);
                      }
                  }
              }

              // Recompute live tokens as union of all outgoing LLM masks at this node.
              let mut new_live = LLMTokenBV::zeros();
              for ((_, l), _) in &new_children {
                  new_live |= l;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = new_children;

              if changed_locally {
                  nodes_changed += 1;
                  total_improvement += local_improvement;
              }
          }

          crate::debug!(2, "Refine token-atoms: nodes_changed={}, total_improvement(metric)={}", nodes_changed, total_improvement);
      }

      /// Exact token-atom refinement (per node and per pop) using the Boolean algebra of the outgoing
      /// LLMTokenBV masks. This constructs atoms by iteratively splitting with each L_i and groups
      /// atoms by identical one-step semantics F_B (dest -> union SIDs). The candidate result is adopted
      /// only if it strictly decreases a local cost metric:
      ///   cost = sum over edges of (llm_bv.ranges_len + number_of_dest_entries).
      /// This guarantees no blow-up while ensuring semantic minimality when adopted.
      fn refine_edges_to_token_atoms_trie3_exact(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) {
          crate::debug!(2, "Refining token-sets to semantic atoms in Trie3 (exact)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          #[inline]
          fn ranges_len_bounded(m: &LLMTokenBV, max_id: usize) -> usize {
              let mut c = m.clone();
              c.constrain(max_id);
              c.inner().ranges_len()
          }

          for node_idx in &all_nodes {
              let mut w = if let Some(guard) = node_idx.write(trie3_god) { guard } else { continue };
              if w.children().is_empty() { continue; }

              // Take old children and canonicalize inputs
              let old_children = std::mem::take(w.children_mut());
              use std::collections::BTreeMap as BTM;
              let mut by_pop: BTM<isize, Vec<(LLMTokenBV, OrderedHashMap<PrecomputeNode3Index, StateIDBV>)>> = BTM::new();

              for ((pop, mut llm_bv), dm) in old_children {
                  llm_bv.constrain(max_llm_token_id);
                  if llm_bv.is_empty() { continue; }
                  let mut dm2: OrderedHashMap<PrecomputeNode3Index, StateIDBV> = OrderedHashMap::new();
                  for (dst, mut sids) in dm {
                      sids.constrain(max_state_id);
                      if !sids.is_empty() {
                          dm2.insert(dst, sids);
                      }
                  }
                  if dm2.is_empty() { continue; }
                  by_pop.entry(pop).or_default().push((llm_bv, dm2));
              }

              // Build a reconstruction of the old children (for cost comparison or fallback)
              let mut old_as_children: BTM<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTM::new();
              for (pop, entries) in &by_pop {
                  for (l, dm) in entries {
                      old_as_children.insert((*pop, l.clone()), dm.clone());
                  }
              }
              let mut old_cost_ranges = 0usize;
              let mut old_cost_dests = 0usize;
              for ((_, l), dm) in &old_as_children {
                  old_cost_ranges += ranges_len_bounded(l, max_llm_token_id);
                  old_cost_dests += dm.len();
              }
              let old_cost = (old_cost_ranges + old_cost_dests) as isize;

              // Candidate exact representation
              let mut new_children: BTM<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTM::new();

              for (pop, entries) in by_pop {
                  if entries.is_empty() { continue; }
                  if entries.len() == 1 {
                      let (l, dm) = entries.into_iter().next().unwrap();
                      new_children.insert((pop, l), dm);
                      continue;
                  }

                  // Universe of tokens for this (node,pop)
                  let mut universe = LLMTokenBV::zeros();
                  for (l, _) in &entries { universe |= l; }
                  universe.constrain(max_llm_token_id);
                  if universe.is_empty() { continue; }

                  // Build atoms by iterative splitting
                  let mut blocks: Vec<LLMTokenBV> = vec![universe];
                  for (l, _) in &entries {
                      let mut next_blocks: Vec<LLMTokenBV> = Vec::with_capacity(blocks.len().saturating_mul(2));
                      for b in blocks.into_iter() {
                          let inter = &b & l;
                          if !inter.is_empty() { next_blocks.push(inter); }
                          let diff = &b - l;
                          if !diff.is_empty() { next_blocks.push(diff); }
                      }
                      blocks = next_blocks;
                      if blocks.is_empty() { break; }
                  }
                  if blocks.is_empty() { continue; }

                  // Group atoms by their semantic effect (canonical dest->SIDs vector)
                  use std::collections::HashMap as HM;
                  let mut grouped: HM<Vec<(PrecomputeNode3Index, StateIDBV)>, LLMTokenBV> = HM::new();
                  for b in blocks.into_iter() {
                      let mut dest_agg: BTM<PrecomputeNode3Index, StateIDBV> = BTM::new();
                      for (l, dm) in &entries {
                          if (&b & l).is_empty() { continue; }
                          for (dst, sids) in dm {
                              dest_agg.entry(*dst)
                                  .and_modify(|e| *e |= sids)
                                  .or_insert_with(|| sids.clone());
                          }
                      }
                      if dest_agg.is_empty() { continue; }
                      let dest_vec: Vec<(PrecomputeNode3Index, StateIDBV)> = dest_agg.into_iter().collect();
                      if let Some(acc) = grouped.get_mut(&dest_vec) {
                          *acc |= &b;
                      } else {
                          grouped.insert(dest_vec, b.clone());
                      }
                  }

                  // Emit grouped atoms as candidate edges
                  for (dest_vec, mut ln) in grouped {
                      ln.constrain(max_llm_token_id);
                      if ln.is_empty() { continue; }
                      let mut dm_out: OrderedHashMap<PrecomputeNode3Index, StateIDBV> = OrderedHashMap::new();
                      for (dst, sids) in dest_vec {
                          if !sids.is_empty() {
                              dm_out.insert(dst, sids);
                          }
                      }
                      if !dm_out.is_empty() {
                          new_children.insert((pop, ln), dm_out);
                      }
                  }
              }

              // Compare costs
              let mut new_cost_ranges = 0usize;
              let mut new_cost_dests = 0usize;
              for ((_, l), dm) in &new_children {
                  new_cost_ranges += ranges_len_bounded(l, max_llm_token_id);
                  new_cost_dests += dm.len();
              }
              let new_cost = (new_cost_ranges + new_cost_dests) as isize;

              // Adopt only if strictly better; otherwise restore original
              let chosen_children = if new_cost < old_cost { &new_children } else { &old_as_children };

              // Recompute live tokens and commit
              let mut new_live = LLMTokenBV::zeros();
              for ((_, l), _) in chosen_children {
                  new_live |= l;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = chosen_children.clone();
          }
          crate::debug!(2, "Finished exact token-atom refinement.");
      }

      pub fn compress_trie3_edges(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper, max_llm_token_id: usize, max_state_id: usize) {
          crate::debug!(2, "Compressing Trie3 edges (group identical dest-maps and union token masks)...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie3 Compress Edges", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for node_idx in it {
              let mut w = node_idx.write(trie3_god).expect("write");
              if w.children().is_empty() {
                  continue;
              }

              // Take existing children for processing.
              let old_children = std::mem::take(w.children_mut());

              // First stage: group by (pop, canonicalized destination map), while unioning LLM token masks for identical dest-maps.
              // Canonicalization: BTreeMap<Trie2Index, StateIDBV> (sorted by destination) -> Vec<(Trie2Index, StateIDBV)> as a stable key.
              use std::collections::BTreeMap as BTM;
              use std::collections::HashMap as HM;

              // by_pop: pop -> { canonical_dest_map_vec -> union_of_llm_bv }
              let mut by_pop: BTM<isize, HM<Vec<(Trie2Index, StateIDBV)>, LLMTokenBV>> = BTM::new();

              for ((pop, mut llm_bv), dest_map) in old_children {
                  // Constrain token bitset to bound and skip empties.
                  llm_bv.constrain(max_llm_token_id);
                  if llm_bv.is_empty() {
                      continue;
                  }

                  // Aggregate destinations by unioning SIDs and removing empties.
                  let mut dest_agg: BTM<Trie2Index, StateIDBV> = BTM::new();
                  for (dst, mut sids) in dest_map {
                      sids.constrain(max_state_id);
                      if sids.is_empty() { continue; }
                      dest_agg.entry(dst)
                          .and_modify(|e| *e |= &sids)
                          .or_insert(sids);
                  }
                  if dest_agg.is_empty() {
                      continue;
                  }

                  // Canonical destination vector (sorted by dst) for use as a key (Vec implements Hash/Eq/Ord given elements do).
                  let dest_vec: Vec<(Trie2Index, StateIDBV)> = dest_agg.into_iter().collect();

                  // Merge edges that have the same pop and identical destination map by unioning their LLM masks.
                  let entry = by_pop.entry(pop).or_default().entry(dest_vec).or_insert_with(LLMTokenBV::zeros);
                  *entry |= &llm_bv;
              }

              // Second stage: for each pop, combine groups that happen to yield identical final LLMTokenBV
              // by unioning their destination maps. This ensures we never create two entries keyed by the
              // same (pop, LLMTokenBV); the union is semantically equivalent to having parallel edges for
              // that same token-set.
              let mut new_children: BTM<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> = BTM::new();
              for (pop, groups) in by_pop {
                  // llm_bv -> aggregated destination map (as BTreeMap for determinism)
                  let mut out_by_llm: BTM<LLMTokenBV, BTM<Trie2Index, StateIDBV>> = BTM::new();

                  for (dest_vec, llm_bv) in groups {
                      if llm_bv.is_empty() {
                          continue;
                      }
                      let dest_out = out_by_llm.entry(llm_bv).or_insert_with(BTM::new);
                      for (dst, sids) in dest_vec {
                          dest_out.entry(dst)
                              .and_modify(|e| *e |= &sids)
                              .or_insert(sids);
                      }
                  }

                  // Emit final edges: (pop, llm_bv) -> OrderedHashMap<dst, StateIDBV>
                  for (llm_bv, dest_btree) in out_by_llm {
                      if llm_bv.is_empty() {
                          continue;
                      }
                      let mut ordered_dm: OrderedHashMap<Trie2Index, StateIDBV> = OrderedHashMap::new();
                      for (dst, sids) in dest_btree {
                          if !sids.is_empty() {
                              ordered_dm.insert(dst, sids);
                          }
                      }
                      if !ordered_dm.is_empty() {
                          // If an entry for (pop, llm_bv) already exists, union destination maps' SIDs (shouldn't happen,
                          // but this keeps the structure robust).
                          let entry = new_children.entry((pop, llm_bv)).or_insert_with(OrderedHashMap::new);
                          for (dst, sids) in ordered_dm {
                              entry.entry(dst)
                                  .and_modify(|e| *e |= &sids)
                                  .or_insert(sids);
                          }
                      }
                  }
              }

              // Recompute live tokens as the union of all outgoing LLM masks.
              let mut new_live = LLMTokenBV::zeros();
              for ((_, llm_bv), _) in &new_children {
                  new_live |= llm_bv;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = new_children;
          }

          crate::debug!(2, "Finished compressing Trie3 edges.");
      }

      /// Contract unary chains where a node U has exactly one incoming edge and one outgoing edge,
      /// both under the same (pop, LLMTokenBV) key, U is not an end node or a root, and the outgoing
      /// edge maps to exactly one destination. The rewrite composes SIDs as intersection and rewires
      /// the predecessor P to the child V, deleting the P->U entry. This preserves semantics and is
      /// cycle-safe (may reduce multi-node cycles to a self-loop with intersected SIDs).
      fn compress_unary_chains_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Contracting unary chains in Trie3...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let roots_set: HashSet<PrecomputeNode3Index> = roots.values().cloned().collect();

          // Iterate a few times until no more rewrites are possible.
          let mut total_rewired = 0usize;
          let max_outer_iters = 8usize;
          for _iter in 0..max_outer_iters {
              // Build indegree counts and track unique predecessor + edge-key for nodes with indegree == 1.
              let mut indegree: HashMap<PrecomputeNode3Index, usize> = HashMap::new();
              let mut unique_parent: HashMap<PrecomputeNode3Index, (PrecomputeNode3Index, (isize, LLMTokenBV))> = HashMap::new();

              for src in &all_nodes {
                  if let Some(g) = src.read(trie3_god) {
                      for (ek, dm) in g.children() {
                          for (dst, _sid) in dm {
                              let cnt = indegree.entry(*dst).or_insert(0);
                              *cnt += 1;
                              if *cnt == 1 {
                                  unique_parent.insert(*dst, (*src, ek.clone()));
                              } else {
                                  // More than one distinct incoming, not a unique-predecessor case.
                                  unique_parent.remove(dst);
                              }
                          }
                      }
                  }
              }

              // For outdegree, record nodes that have exactly one outgoing destination overall
              // (across all keys combined) and are not end nodes; also capture that single edge.
              let mut out_info: HashMap<
                  PrecomputeNode3Index,
                  ((isize, LLMTokenBV), PrecomputeNode3Index, StateIDBV)
              > = HashMap::new();

              for u in &all_nodes {
                  if let Some(g) = u.read(trie3_god) {
                      if g.value.end {
                          continue; // Don't contract through accept nodes.
                      }
                      let mut total_dests = 0usize;
                      let mut only_key: Option<(isize, LLMTokenBV)> = None;
                      let mut only_dst: Option<PrecomputeNode3Index> = None;
                      let mut only_sid: Option<StateIDBV> = None;

                      for (ek, dm) in g.children() {
                          for (dst, sid) in dm {
                              total_dests += 1;
                              if total_dests == 1 {
                                  only_key = Some(ek.clone());
                                  only_dst = Some(*dst);
                                  only_sid = Some(sid.clone());
                              }
                          }
                      }
                      if total_dests == 1 {
                          out_info.insert(*u, (only_key.unwrap(), only_dst.unwrap(), only_sid.unwrap()));
                      }
                  }
              }

              // Find candidates: nodes with indegree==1, outdegree==1, not roots, and matching keys on both sides.
              let mut rewired_this_iter = 0usize;
              for u in &all_nodes {
                  let u_idx = *u;
                  if roots_set.contains(&u_idx) {
                      continue; // Never rewire through a root.
                  }
                  let Some((out_key, v_idx, s_uv)) = out_info.get(&u_idx).cloned() else { continue };
                  let Some((p_idx, in_key)) = unique_parent.get(&u_idx).cloned() else { continue };
                  if p_idx == u_idx {
                      continue; // Avoid attempting to rewire a pure self-loop through itself.
                  }
                  // Only contract if the incoming and outgoing (pop, LLMTokenBV) keys match exactly.
                  if in_key != out_key {
                      continue;
                  }

                  // Perform the rewrite: in parent P, remove the U mapping under in_key,
                  // and add/union V mapping with SIDs intersection S(P->U) ∧ S(U->V).
                  if let Some(mut pw) = p_idx.write(trie3_god) {
                      let (pop, llm) = in_key.clone();
                      if let Some(dm) = pw.children_mut().get_mut(&(pop, llm.clone())) {
                          if let Some(s_pu_actual) = dm.remove(&u_idx) {
                              let s_comp = &s_pu_actual & &s_uv;
                              if !s_comp.is_empty() {
                                  dm.entry(v_idx)
                                      .and_modify(|e| *e |= &s_comp)
                                      .or_insert(s_comp);
                              }
                              if dm.is_empty() {
                                  pw.children_mut().remove(&(pop, llm.clone()));
                              }
                              // Recompute live tokens as union of outgoing LLM masks for robustness.
                              let mut new_live = LLMTokenBV::zeros();
                              for ((_, llm_bv), _) in pw.children() {
                                  new_live |= llm_bv;
                              }
                              pw.value.live_tokens = new_live;
                              rewired_this_iter += 1;
                          }
                      }
                  }
              }

              total_rewired += rewired_this_iter;
              if rewired_this_iter == 0 {
                  break;
              }
          }

          crate::debug!(2, "Unary-chain contraction rewired {} edges.", total_rewired);
      }

      /// Assert that no pop=0 edges exist from non-root nodes.
      /// When enabled in config, this runs after eliminating pop0 edges.
      fn assert_no_pop0_nonroot_edges_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          let roots_set: HashSet<PrecomputeNode3Index> = roots.values().cloned().collect();
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          for n in all_nodes {
              if roots_set.contains(&n) {
                  continue;
              }
              let r = n.read(trie3_god).expect("read");
              for ((pop, _llm_bv), _dm) in r.children() {
                  if *pop == 0 {
                      panic!(
                          "Invariant violated: found pop=0 edge originating from non-root node {}",
                          n
                      );
                  }
              }
          }
      }

      /// Remove all pop=0 edges whose source is not a root.
      /// For each 0-pop edge B --(0, L_bc, S_bc)--> C and each incoming edge
      /// A --(p_ab, L_ab, S_ab)--> B, add/update A --(p_ab, L_ab∧L_bc, S_ab∧S_bc)--> C.
      /// Then remove the original B->C (0, L_bc) mapping. Iterate until no such edges remain.
      pub fn eliminate_pop0_edges_except_roots_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Eliminating pop=0 edges from non-root nodes in Trie3...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          if roots_vec.is_empty() {
              return;
          }
          let roots_set: HashSet<PrecomputeNode3Index> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let mut total_removed = 0usize;
          let mut iter = 0usize;

          loop {
              iter += 1;

              // Snapshot incoming edges and current pop=0 edges.
              let mut incoming: HashMap<
                  PrecomputeNode3Index,
                  Vec<(PrecomputeNode3Index, (isize, LLMTokenBV), StateIDBV)>
              > = HashMap::new();
              let mut pop0_edges: Vec<(PrecomputeNode3Index, LLMTokenBV, PrecomputeNode3Index, StateIDBV)> = Vec::new();

              for src in &all_nodes {
                  if let Some(r) = src.read(trie3_god) {
                      for (ek, dm) in r.children() {
                          for (dst, sids) in dm {
                              incoming.entry(*dst).or_default().push((*src, (ek.0, ek.1.clone()), sids.clone()));
                              if pop_is_zero(ek) {
                                  pop0_edges.push((*src, ek.1.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                  }
              }

              // Early exit if there isn't any 0-pop edge at all.
              if pop0_edges.is_empty() {
                  break;
              }

              let mut removed_this_iter = 0usize;

              for (b, llm_bc, c, s_bc) in pop0_edges {
                  if roots_set.contains(&b) {
                      // pop=0 edge from a root is allowed by design, keep it
                      continue;
                  }
                  if let Some(preds) = incoming.get(&b) {
                      for (a, (p_ab, llm_ab), s_ab) in preds {
                          // Compose constraints at the same position (pop=0 does not advance position)
                          let new_llm = llm_ab & &llm_bc;
                          if new_llm.is_empty() {
                              continue;
                          }
                          let new_sids = s_ab & &s_bc;
                          if new_sids.is_empty() {
                              continue;
                          }
                          // Create/update A -> C with (p_ab, new_llm) and SIDs = intersection
                          if let Some(mut aw) = a.write(trie3_god) {
                              let key_llm = new_llm.clone();
                              let entry = aw.children_mut().entry((*p_ab, key_llm.clone())).or_default();
                              entry.entry(c).and_modify(|e| *e |= &new_sids).or_insert(new_sids.clone());
                              // keep live_tokens conservative; we'll recompute exactly later anyway
                              aw.value.live_tokens |= &key_llm;
                          }
                      }
                  }

                  // Remove specific B -> C mapping under (0, llm_bc).
                  if let Some(mut bw) = b.write(trie3_god) {
                      let key = (0isize, llm_bc.clone());
                      let mut removed_one = false;
                      if let Some(dm) = bw.children_mut().get_mut(&key) {
                          if dm.remove(&c).is_some() {
                              removed_one = true;
                          }
                          if dm.is_empty() {
                              bw.children_mut().remove(&key);
                          }
                      }
                      if removed_one {
                          removed_this_iter += 1;
                          // Recompute live tokens conservatively for B; exact recomputation follows post-loop
                          let mut new_live = LLMTokenBV::zeros();
                          for ((_, llm_bv), _) in bw.children() {
                              new_live |= llm_bv;
                          }
                          bw.value.live_tokens = new_live;
                      }
                  }
              }

              total_removed += removed_this_iter;
              crate::debug!(3, "Pop0-elim iter {}: removed {} pop=0 edges.", iter, removed_this_iter);
              if removed_this_iter == 0 {
                  break;
              }
          }

          // Final recomputation of live_tokens for all nodes.
          for n in &all_nodes {
              if let Some(mut w) = n.write(trie3_god) {
                  let mut new_live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in w.children() {
                      new_live |= llm_bv;
                  }
                  w.value.live_tokens = new_live;
              }
          }

          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie3_god, &roots_vec2);
          crate::debug!(2, "Eliminated {} pop=0 edges from non-root nodes.", total_removed);
      }

      #[inline]
      fn pop_is_zero(ek: &(isize, LLMTokenBV)) -> bool {
          ek.0 == 0
      }

