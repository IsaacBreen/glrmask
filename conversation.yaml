              Self {
                  enabled: false,
                  exact_max_iters: 0,
              }
          }
      }

      #[derive(Debug, Clone)]
      pub struct Trie3Config {
          pub enabled: bool,
          pub num_passes: usize,
          pub merge_equivalent_llm_tokens: bool,
          pub reorder_llm_tokens: bool,
          pub constrain_bitvecs: bool,
          pub gc: bool,
