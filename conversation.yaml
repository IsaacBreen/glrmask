           - Compute let key_id = interner.intern(weight).
           - Use (state_id, key_id) as the memo key.
           - If no change is needed (intersection with this weight is empty across all local weights), cache and return the original state_id.
           - Otherwise copy the state once, exclude the weight, cache, and return the new ID.

