        "aug25/models/precompute3_engine.cpp" \
        -o "aug25/models/precompute3_engine${EXT_SUFFIX}" \
        ${LDFLAGS}

      echo "Build complete:"
      echo " - python/aug25/models/icl_rangeset${EXT_SUFFIX}"
      echo " - python/aug25/models/precompute3_engine${EXT_SUFFIX}"

