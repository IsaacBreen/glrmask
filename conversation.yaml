              let w123 = SimpleBitset::from_iter(1..=3);
              let wall = SimpleBitset::all();

              // State 7 is final
              nwa.set_final_weight(7, wall.clone());

              // Transitions from s1 (1)
              nwa.add_transition(1, 1, 2, w0.clone());
              nwa.add_transition(1, 2, 7, w1.clone());
