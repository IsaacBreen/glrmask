      ### Summary

      The foundational component for graph optimization, `_unconditionalize_guaranteed_transitions`, has been added in the new `nodeopt_optimizer.py` module. This function performs a safe, "fast-path" optimization that prepares the graph for more significant structural improvements.

      ### What Was Implemented

      *   **New Optimizer Module**: A dedicated module, `nodeopt_optimizer.py`, was created to house graph optimization logic. It defines `NodeOpt`, `StateEdge`, and `UnconditionalEdge` to provide a more flexible in-memory representation of the graph for transformations.
      *   **Guaranteed Unconditionalization**: The function `_unconditionalize_guaranteed_transitions` implements the "local safety check" from the optimization plan. It iterates through all state-filtered edges and converts an edge to be unconditional if the set of "alive" parser states at its source node is already a subset of the states permitted by the edge filter.

      ### Immediate Effect & Expected Impact

      This optimization is a preparatory step. Its immediate effect is to clean up redundant state checks, turning them into unconditional transitions. While this alone may not produce dramatic performance changes, it is a critical enabler for the next phase of optimization.

      By increasing the number of `UnconditionalEdge` instances, this pass creates opportunities to identify and eliminate "passthrough" nodes—nodes where all outgoing transitions are unconditional.

      ### Next Steps

      The successful implementation of this initial pass paves the way for the more impactful structural optimizations outlined in the plan:

      1.  **Passthrough Node Elimination**: With unconditional edges in place, we can now implement logic to find nodes that simply pass execution along and remove them, merging their incoming and outgoing edges. This will simplify the graph topology and reduce traversal depth.
      2.  **Pop Merging**: When eliminating passthrough nodes, consecutive pop operations can be merged, further streamlining execution.
      3.  **Advanced Unconditionalization**: After the simpler structural cleanups, we can implement the full "tentative propagation" analysis to find and convert even more state-filtered edges to be unconditional.

      In conclusion, the optimization process is on track. The foundational code is in place, and the graph is now ready for the key structural simplification passes that will yield the most significant performance benefits.
