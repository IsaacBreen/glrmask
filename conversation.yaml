          FReplace: FnMut(&EK, isize) -> EK,
          FNeutral: FnMut() -> EK,
          FMerge: FnMut(&mut EV, EV),
      {
          let reachable = Trie::<EK, EV, T>::all_nodes(god, roots);
          if reachable.is_empty() {
              return;
