              assert!(regex.definitely_fully_matches(b"True"));
              assert!(regex.definitely_fully_matches(b"and"));
              assert!(regex.definitely_fully_matches(b"as"));
              assert!(regex.definitely_fully_matches(b"assert"));
          }

          #[test]
