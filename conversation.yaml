              if self.end {
                  f.write_str("[END]")?
              }
              Ok(())
          }
      }

      impl IntermediatePrecomputedNodeContents3 {
          pub fn leaf() -> Self {
              Self { end: true }
          }
          pub fn internal() -> Self {
              Self { end: false }
          }
          pub fn root() -> Self {
              Self { end: false }
          }
      }

