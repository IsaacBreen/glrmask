      #[test]
      fn validation_fails_direct_length_1_recursion() {
          // A -> A
          let productions = vec![
              prod("S", vec![nt("A")]), // Start rule
              prod("A", vec![nt("A")]), // Direct length-1 cycle
              prod("A", vec![t("x")]),  // To make A reachable/productive (though validation runs first)
