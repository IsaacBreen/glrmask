              recorder.end_phase()

              # Single push
              recorder.start_phase("push")
              g2 = g.push(("push", 1))
              recorder.end_phase()

              # Postcheck
              recorder.start_phase("postcheck")
              _ = g2.peek()
              _ = g2.is_empty()
              recorder.end_phase()
          except Exception as e:
              workload_result["outcome"] = "error"
