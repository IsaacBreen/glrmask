              let mut signature_to_terminals: HashMap<Vec<Option<&CacheValue>>, Vec<TerminalID>> = HashMap::new();
              for (tid, signature) in terminal_signatures {
                  signature_to_terminals.entry(signature).or_default().push(tid);
