              //    merge_bitset_union should merge new_ev_for_inserter into initial_ev_c1.
              let inserter = EdgeInserter::new(source.clone(), edge_key, new_ev_for_inserter.clone(), merge_bitset_union, |_, _| {}, |_, _| {});
