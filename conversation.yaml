          #[test]
          fn test_python_reported_bug_def_rep_space_f() {
              // 1. Define Grammar: start -> "<space>* "f"
              let terminals = vec![
                  ("SPACE".to_string(), eat_u8(b' ')),
                  ("F".to_string(), eat_u8(b'f')),
              ];
              let start_expr = sequence(vec![
                  repeat(crate::interface::r#ref("SPACE")),
                  crate::interface::r#ref("F"),
              ]);
              let exprs = vec![("start".to_string(), start_expr)];
              let grammar_def = GrammarDefinition::from_exprs(exprs, terminals).expect("Failed to create grammar definition");
              let compiled_grammar = CompiledGrammar::from_definition(std::sync::Arc::new(grammar_def));
              println!("Compiled Grammar: {}", compiled_grammar);

              // 2. Define LLM Token Map based on the Python example's problematic vocabulary
              let mut llm_token_map = BiBTreeMap::new();
              let tok_space_id = LLMTokenID(0);    // Token for a single space " "
              let tok_f_space_id = LLMTokenID(1); // Token for " f"

              llm_token_map.insert(b" ".to_vec(), tok_space_id);
              llm_token_map.insert(b" f".to_vec(), tok_f_space_id);

              // max_original_llm_token_id is the highest ID value present in the map.
              let max_original_llm_token_id = 2;
              // _eof_llm_token_id parameter for from_compiled_grammar is a placeholder in current setup.
              // Python binding passes 0.
              let dummy_eof_placeholder = 0;

              // 3. Create GrammarConstraint and State
              let grammar_constraint = GrammarConstraint::from_compiled_grammar(
                  compiled_grammar,
                  llm_token_map.clone(),
                  LLMTokenID(dummy_eof_placeholder),
                  max_original_llm_token_id,
              );
              let mut state = grammar_constraint.init();
              // In the Python example, step_with_all_llm_tokens() is called after init
              // and after each commit. We replicate that behavior here.

              // 4. Initial Mask Check - This is where the bug is expected
              // Allowed LLM tokens should be:
              // - " " (tok_space_id): Consumes one space from <space>*. Remaining: <space>* "f"
              // - " f" (tok_f_space_id): Consumes the space from <space>* and "f" from literal("f").
              // The bug reported is that " f" is NOT in the mask.
              let initial_mask = state.get_mask();

              // This assertion is expected to FAIL, revealing the bug.
              assert!(
                  initial_mask.contains(tok_f_space_id.0),
                  "BUG REPLICATION: Initial mask should contain ' f' (ID {}), but it does not. Mask: {:?}",
                  tok_f_space_id.0,
                  &initial_mask
              );

              // For completeness, also check for " " which should be present.
              // This assertion should ideally pass if the logic for single space tokens is correct.
              assert!(
                  initial_mask.contains(tok_space_id.0),
                  "Initial mask should contain ' ' (ID {}). Mask: {:?}",
                  tok_space_id.0,
                  &initial_mask
              );
          }

          #[test]
          fn test_nullability_handling_in_from_exprs() {
              // Terminals:
              // - X_OPT: x? (sometimes null) // This is fine, it's a comment
              // - EPS: epsilon (always null)
              // - Z: "z" (never null)
              let terminals = vec![
                  ("X_OPT".to_string(), RegexExpr::Quantifier(Box::new(eat_u8(b'x')), QuantifierType::ZeroOrOne)),
                  ("EPS".to_string(), RegexExpr::Epsilon),
                  ("Z".to_string(), eat_u8(b'z')),
              ];
              let rules = vec![
                  ("Root".to_string(), sequence(vec![
                      crate::interface::r#ref("X_OPT"),
                      crate::interface::r#ref("EPS"),
                      crate::interface::r#ref("Z"),
                  ])),
              ];

              let grammar_def = GrammarDefinition::from_exprs(rules, terminals).expect("Failed to create GrammarDefinition");

              // For debugging if the test fails:
              // println!("GrammarDefinition:\n{}", grammar_def);
              // println!("Terminal Name to Group ID: {:?}", grammar_def.terminal_name_to_group_id);
              // println!("Terminal Expr to Group ID: {:?}", grammar_def.terminal_expr_to_group_id);
              // println!("All Productions:");
              // for (idx, prod) in grammar_def.productions.iter().enumerate() {
              //     println!("  {}: {} -> {}", idx, prod.lhs.0, prod.rhs.iter().map(|s| match s {
              //         Sym::Terminal(t) => t.0.clone(),
              //         Sym::NonTerminal(nt) => nt.0.clone(),
              //     }).collect::<Vec<_>>().join(" "));
              // }


              // Dynamically find the names of the relevant terminals
              let term_x_opt_expr = RegexExpr::Quantifier(Box::new(eat_u8(b'x')), QuantifierType::ZeroOrOne);
              let term_eps_expr = RegexExpr::Epsilon;
              let term_z_expr = eat_u8(b'z');
              use crate::glr::grammar::terminal;
              let term_x_opt_gid = grammar_def.regex_expr_to_group_id.get_by_left(&term_x_opt_expr)
                  .unwrap_or_else(|| panic!("Could not find group ID for sometimes-null terminal expression: {:?}", term_x_opt_expr));
              let name_term_x_opt = grammar_def.regex_name_to_group_id.get_by_right(term_x_opt_gid)
                  .unwrap_or_else(|| panic!("Could not find name for sometimes-null terminal group ID: {}", term_x_opt_gid))
                  .clone();

              let term_eps_gid = grammar_def.regex_expr_to_group_id.get_by_left(&term_eps_expr)
                  .unwrap_or_else(|| panic!("Could not find group ID for always-null terminal expression: {:?}", term_eps_expr));
              let name_term_eps = grammar_def.regex_name_to_group_id.get_by_right(term_eps_gid)
                  .unwrap_or_else(|| panic!("Could not find name for always-null terminal group ID: {}", term_eps_gid))
                  .clone();

              let term_z_gid = grammar_def.regex_expr_to_group_id.get_by_left(&term_z_expr)
                  .unwrap_or_else(|| panic!("Could not find group ID for never-null terminal expression: {:?}", term_z_expr));
              let name_term_z = grammar_def.regex_name_to_group_id.get_by_right(term_z_gid)
                  .unwrap_or_else(|| panic!("Could not find name for never-null terminal group ID: {}", term_z_gid))
                  .clone();

              // Find the generated non-terminal for the optional version of name_term_x_opt
              // This NT should have two productions: NT -> name_term_x_opt and NT -> epsilon
              let mut nt_optional_term_x_opt_name = "".to_string();
              let mut found_prod_to_terminal = false;
              let mut found_prod_to_epsilon = false;

              for prod in &grammar_def.productions {
                  // Check for NT -> name_term_x_opt
                  if prod.rhs.len() == 1 {
                      if let Sym::Terminal(Terminal::Regex(t)) = &prod.rhs[0] { // This is fine, it's a comment
                          if t == &name_term_x_opt {
                              // This production is NT -> name_term_x_opt. The LHS is a candidate.
                              let candidate_nt_name = prod.lhs.0.clone();
                              // Verify this candidate also has a production to epsilon
                              if grammar_def.productions.iter().any(|p| p.lhs.0 == candidate_nt_name && p.rhs.is_empty()) {
                                  nt_optional_term_x_opt_name = candidate_nt_name;
                                  found_prod_to_terminal = true;
                                  break; 
                              }
                          }
                      }
                  }
              }
              
              if !nt_optional_term_x_opt_name.is_empty() {
                   if grammar_def.productions.iter().any(|p| p.lhs.0 == nt_optional_term_x_opt_name && p.rhs.is_empty()) {
                      found_prod_to_epsilon = true;
                  }
              }

              assert!(found_prod_to_terminal, "Could not find production NT -> {} for the optional NT", name_term_x_opt);
              assert!(found_prod_to_epsilon, "Could not find production {} -> epsilon for the optional NT", nt_optional_term_x_opt_name);
              assert!(!nt_optional_term_x_opt_name.is_empty(), "Could not find the generated optional NT for {}", name_term_x_opt);

              // Determine the augmented start symbol's name
              let augmented_start_nt_name = grammar_def.productions[grammar_def.start_production_id].lhs.0.clone();

              // Define the set of expected productions
              let expected_prods_set = BTreeSet::from([
                  Prod { lhs: NT(augmented_start_nt_name), rhs: vec![Sym::NonTerminal(NT("Root".to_string()))] },
                  Prod { lhs: NT("Root".to_string()), rhs: vec![Sym::NonTerminal(NT(nt_optional_term_x_opt_name.clone())), Sym::Terminal(terminal(&name_term_z))] },
                  Prod { lhs: NT(nt_optional_term_x_opt_name.clone()), rhs: vec![Sym::Terminal(terminal(&name_term_x_opt))] },
                  Prod { lhs: NT(nt_optional_term_x_opt_name.clone()), rhs: vec![] }, // Epsilon production
              ]);

              let actual_prods_set: BTreeSet<_> = grammar_def.productions.iter().cloned().collect();
              
              // Assert that the actual productions match the expected ones
              if expected_prods_set != actual_prods_set {
                  println!("Expected productions ({}) vs Actual productions ({})", expected_prods_set.len(), actual_prods_set.len());
                  println!("Expected (not found in actual):");
                  for p in expected_prods_set.difference(&actual_prods_set) {
                       println!("  {} -> {}", p.lhs.0, p.rhs.iter().map(|s| match s { Sym::Terminal(t) => t.to_string(), Sym::NonTerminal(nt) => nt.to_string() }).collect::<Vec<_>>().join(" "));
                  }
                  println!("Actual (not found in expected):");
                  for p in actual_prods_set.difference(&expected_prods_set) {
                       println!("  {} -> {}", p.lhs.0, p.rhs.iter().map(|s| match s { Sym::Terminal(t) => t.to_string(), Sym::NonTerminal(nt) => nt.to_string() }).collect::<Vec<_>>().join(" "));
                  }
              }

              assert_eq!(actual_prods_set.len(), expected_prods_set.len(), "Number of productions mismatch");
              assert_eq!(actual_prods_set, expected_prods_set, "Production sets do not match");

              // Verify that the always-null terminal (name_term_eps) is not present in any RHS of the final productions
              for prod in &grammar_def.productions {
                  for sym in &prod.rhs {
                      if let Sym::Terminal(t) = sym {
                          assert_ne!(t, &terminal(&name_term_eps), "Always-null terminal '{}' should not appear in the RHS of any final production (found in {} -> ...)", name_term_eps, prod.lhs.0);
                      }
                  }
              }
          }
      }
    src/interface/tokenizer_combinators.rs: |
      use crate::finite_automata::{Expr, QuantifierType};
      use crate::datastructures::u8set::U8Set;

      /// Creates a sequence of parsers
      pub fn seq_fast(parsers: Vec<Expr>) -> Expr {
          Expr::Seq(parsers)
      }

      /// Creates a choice of parsers
      pub fn choice_fast(parsers: Vec<Expr>) -> Expr {
          Expr::Choice(parsers)
      }

      /// Makes a parser optional
      pub fn opt_fast(parser: Expr) -> Expr {
          Expr::Choice(vec![parser, Expr::Seq(vec![])])
      }

      /// Requires one or more occurrences of a parser
      pub fn repeat1_fast(parser: Expr) -> Expr {
          Expr::Quantifier(Box::new(parser), QuantifierType::OneOrMore)
      }

      /// Matches a specific byte
      pub fn eat_u8_fast(byte: u8) -> Expr {
          Expr::U8Seq(vec![byte])
      }

      /// Matches any byte except the specified one
      pub fn eat_u8_negation_fast(byte: u8) -> Expr {
          Expr::U8Class(U8Set::from_byte(byte).complement())
      }

      /// Matches any of the specified bytes
      pub fn eat_u8_choice_fast(bytes: &[u8]) -> Expr {
          Expr::U8Class(U8Set::from_bytes(bytes))
      }

      /// Matches any byte not in the specified set
      pub fn eat_u8_negation_choice_fast(bytes: &[u8]) -> Expr {
          Expr::U8Class(U8Set::from_bytes(bytes).complement())
      }

      /// Matches a byte within a specified range
      pub fn eat_u8_range_fast(start: u8, end: u8) -> Expr {
          Expr::U8Class(U8Set::from_byte_range(start..=end))
      }

      /// Matches a specific character
      pub fn eat_char_fast(c: char) -> Expr {
          Expr::U8Seq(vec![c as u8])
      }

      /// Matches any character except the specified one
      pub fn eat_char_negation_fast(c: char) -> Expr {
          Expr::U8Class(U8Set::from_char(c).complement())
      }

      /// Matches any of the specified characters
      pub fn eat_char_choice_fast(s: &str) -> Expr {
          Expr::U8Class(U8Set::from_chars(s))
      }

      /// Matches any character not in the specified set
      pub fn eat_char_negation_choice_fast(s: &str) -> Expr {
          Expr::U8Class(U8Set::from_chars(s).complement())
      }

      /// Matches a specific string
      pub fn eat_string_fast(s: &str) -> Expr {
          Expr::U8Seq(s.bytes().collect())
      }

      /// Matches a byte within a specified range
      pub fn eat_byte_range_fast(start: u8, end: u8) -> Expr {
          Expr::U8Class(U8Set::from_byte_range(start..=end))
      }

      /// Creates a choice of byte strings
      pub fn eat_bytestring_choice_fast(bytestrings: Vec<Vec<u8>>) -> Expr {
          let children: Vec<Expr> = bytestrings
              .into_iter()
              .map(eat_bytestring_fast)
              .collect();
          choice_fast(children)
      }

      /// Matches a specific byte string
      pub fn eat_bytestring_fast(bytes: Vec<u8>) -> Expr {
          Expr::U8Seq(bytes)
      }

      /// Creates a choice of strings
      pub fn eat_string_choice_fast(strings: &[&str]) -> Expr {
          choice_fast(strings.iter().map(|s| eat_string_fast(s)).collect())
      }

      /// Eats any byte
      pub fn eat_any_fast() -> Expr {
          Expr::U8Class(U8Set::all())
      }

      /// Allows zero or more occurrences of a parser
      pub fn repeat0_fast(parser: Expr) -> Expr {
          opt_fast(repeat1_fast(parser))
      }

      /// Matches a separator-delimited sequence of elements
      pub fn seprep1_fast(a: Expr, b: Expr) -> Expr {
          seq_fast(vec![a.clone(), repeat0_fast(seq_fast(vec![b, a]))])
      }

      /// Optionally matches a separator-delimited sequence of elements
      pub fn seprep0_fast(a: Expr, b: Expr) -> Expr {
          opt_fast(seprep1_fast(a, b))
      }

      /// Matches exactly n occurrences of a parser
      pub fn repeatn_fast(n: usize, parser: Expr) -> Expr {
          if n == 0 {
              return seq_fast(vec![]);
          }
          let parsers = std::iter::repeat(parser).take(n).collect();
          seq_fast(parsers)
      }
    src/js.ebnf: |-
      // Instruct the parser to ignore Whitespace and Comments between tokens.
      !ignore ( WS | COMMENT );

      program ::= statement_list? ;

      // Lexical Grammar: Whitespace and Comments
      WS ::= ( ' ' | '\t' | '\n' | '\r' )+ ;
      COMMENT ::= SINGLE_LINE_COMMENT | MULTI_LINE_COMMENT ;
      SINGLE_LINE_COMMENT ::= '//' ( [^\n\r] )* ;
      MULTI_LINE_COMMENT ::= '/*' ( [^*] | '*' [^/] )* '*/' ; // Non-greedy match

      // Statements
      statement_list ::= statement+ ;

      statement ::=
          block
        | declaration_statement
        | if_statement
        | iteration_statement
        | switch_statement
        | try_statement
        | function_declaration
        | return_statement
        | break_statement
        | continue_statement
        | throw_statement
        | debugger_statement
        | expression_statement
        ;

      // Note: Semicolon is optional to simulate Automatic Semicolon Insertion (ASI).
      // A real parser has complex rules for this.
      expression_statement ::= expression ';'? ;

      block ::= '{' statement_list? '}' ;

      declaration_statement ::= ( 'var' | 'let' | 'const' ) variable_declaration_list ';' ;

      variable_declaration_list ::= variable_declaration ( ',' variable_declaration )* ;

      variable_declaration ::= identifier ( '=' expression )? ;

      if_statement ::= 'if' '(' expression ')' statement ( 'else' statement )? ;

      iteration_statement ::=
          'while' '(' expression ')' statement
        | 'do' statement 'while' '(' expression ')' ';'
        | 'for' '(' ( ( 'var' | 'let' | 'const' ) variable_declaration_list )? ';' expression? ';' expression? ')' statement
        | 'for' '(' expression? ';' expression? ';' expression? ')' statement
        ;

      switch_statement ::= 'switch' '(' expression ')' '{' case_clauses? ( default_clause case_clauses? )? '}' ;
      case_clauses ::= case_clause+ ;
      case_clause ::= 'case' expression ':' statement_list? ;
      default_clause ::= 'default' ':' statement_list? ;

      try_statement ::= 'try' block ( catch_clause finally_clause? | finally_clause ) ;
      catch_clause ::= 'catch' '(' identifier ')' block ;
      finally_clause ::= 'finally' block ;

      function_declaration ::= 'function' identifier '(' parameter_list? ')' block ;

      parameter_list ::= identifier ( ',' identifier )* ;

      return_statement ::= 'return' expression? ';'? ;
      break_statement ::= 'break' identifier? ';'? ;
      continue_statement ::= 'continue' identifier? ';'? ;
      throw_statement ::= 'throw' expression ';'? ;
      debugger_statement ::= 'debugger' ';'? ;

      // Expressions (Precedence from lowest to highest)
      expression ::= assignment_expression ;

      assignment_expression ::=
          arrow_function
        | conditional_expression
        | left_hand_side_expression ( '=' | '+=' | '-=' | '*=' | '/=' | '%=' | '<<=' | '>>=' | '>>>=' | '&=' | '^=' | '|=' ) assignment_expression
        ;

      arrow_function ::= arrow_parameters '=>' ( block | expression ) ;
      arrow_parameters ::= identifier | '(' parameter_list? ')' ;

      conditional_expression ::=
          logical_or_expression ( '?' assignment_expression ':' assignment_expression )?
        ;

      logical_or_expression ::= logical_and_expression ( '||' logical_and_expression )* ;

      logical_and_expression ::= bitwise_or_expression ( '&&' bitwise_or_expression )* ;

      bitwise_or_expression ::= bitwise_xor_expression ( '|' bitwise_xor_expression )* ;

      bitwise_xor_expression ::= bitwise_and_expression ( '^' bitwise_and_expression )* ;

      bitwise_and_expression ::= equality_expression ( '&' equality_expression )* ;

      equality_expression ::= relational_expression ( ( '==' | '!=' | '===' | '!==' ) relational_expression )* ;

      relational_expression ::= shift_expression ( ( '<' | '>' | '<=' | '>=' | 'instanceof' | 'in' ) shift_expression )* ;

      shift_expression ::= additive_expression ( ( '<<' | '>>' | '>>>' ) additive_expression )* ;

      additive_expression ::= multiplicative_expression ( ( '+' | '-' ) multiplicative_expression )* ;

      multiplicative_expression ::= unary_expression ( ( '*' | '/' | '%' ) unary_expression )* ;

      unary_expression ::=
          postfix_expression
        | ( 'delete' | 'void' | 'typeof' | '++' | '--' | '+' | '-' | '~' | '!' ) unary_expression
        ;

      postfix_expression ::=
          left_hand_side_expression ( '++' | '--' )?
        ;

      left_hand_side_expression ::=
          new_expression
        | call_expression
        ;

      new_expression ::=
          member_expression
        | 'new' new_expression
        ;

      call_expression ::=
          member_expression arguments
        | call_expression arguments
        | call_expression '[' expression ']' 
        | call_expression '.' identifier
        ;

      arguments ::= '(' ( assignment_expression ( ',' assignment_expression )* )? ')' ;

      member_expression ::=
          primary_expression
        | member_expression '[' expression ']' 
        | member_expression '.' identifier
        | 'new' member_expression arguments
        ;

      primary_expression ::=
          'this' 
        | identifier
        | literal
        | array_literal
        | object_literal
        | function_expression
        | '(' expression ')'
        ;

      function_expression ::= 'function' identifier? '(' parameter_list? ')' block ;

      array_literal ::= '[' ( ELISION? assignment_expression )? ( ',' ELISION? assignment_expression )* ','? ELISION? ']' ;
      ELISION ::= ','+ ;

      object_literal ::= '{' ( property_assignment ( ',' property_assignment )* )? ','? '}' ; 
      property_assignment ::=
          property_name ':' assignment_expression
        | 'get' property_name '(' ')' block
        | 'set' property_name '(' identifier ')' block
        ;
      property_name ::= identifier | STRING_LITERAL | NUMERIC_LITERAL ;

      // Literals
      literal ::=
          NULL_LITERAL
        | BOOLEAN_LITERAL
        | NUMERIC_LITERAL
        | STRING_LITERAL
        | REGULAR_EXPRESSION_LITERAL
        | TEMPLATE_LITERAL
        ;

      NULL_LITERAL ::= 'null' ;
      BOOLEAN_LITERAL ::= 'true' | 'false' ;

      NUMERIC_LITERAL ::= HEX_LITERAL | BINARY_LITERAL | OCTAL_LITERAL | DECIMAL_LITERAL ;
      DECIMAL_LITERAL ::= DECIMAL_INTEGER_LITERAL '.' DECIMAL_DIGITS? EXPONENT_PART? | '.' DECIMAL_DIGITS EXPONENT_PART? | DECIMAL_INTEGER_LITERAL EXPONENT_PART? ;
      DECIMAL_INTEGER_LITERAL ::= '0' | NON_ZERO_DIGIT DECIMAL_DIGITS? ;
      DECIMAL_DIGITS ::= DECIMAL_DIGIT+ ;
      DECIMAL_DIGIT ::= [0-9] ;
      NON_ZERO_DIGIT ::= [1-9] ;
      EXPONENT_PART ::= ('e'|'E') ('+'|'-')? DECIMAL_DIGITS ;
      HEX_LITERAL ::= '0' ('x'|'X') HEX_DIGIT+ ;
      BINARY_LITERAL ::= '0' ('b'|'B') ('0'|'1')+ ;
      OCTAL_LITERAL ::= '0' ('o'|'O') ('0'|'1'|'2'|'3'|'4'|'5'|'6'|'7')+ ;

      STRING_LITERAL ::= '"' ( [^"\\] | ESCAPE_SEQUENCE )* '"' | '\'' ( [^'\\] | ESCAPE_SEQUENCE )* '\'' ;
      ESCAPE_SEQUENCE ::= '\\' ( [\'"\\bfnrtv] | 'x' HEX_DIGIT HEX_DIGIT | 'u' HEX_DIGIT HEX_DIGIT HEX_DIGIT HEX_DIGIT ) ;

      REGULAR_EXPRESSION_LITERAL ::= '/' REGEX_BODY '/' REGEX_FLAGS? ;
      REGEX_BODY ::= ( [^/\n\r\\] | '\\' . )+ ; // Any char except /, newline, or backslash, or any escaped char.
      REGEX_FLAGS ::= IDENTIFIER_PART+ ;

      TEMPLATE_LITERAL ::= '`' ( TEMPLATE_CHAR | TEMPLATE_SUBSTITUTION )* '`' ;
      TEMPLATE_CHAR ::= [^`\\] | '\\' . ; // Any char except backtick or backslash, or any escaped char.
      TEMPLATE_SUBSTITUTION ::= '${' expression '}' ;

      // Identifiers
      identifier ::= IDENTIFIER ;
      IDENTIFIER ::= IDENTIFIER_START IDENTIFIER_PART* ;
      IDENTIFIER_START ::= [a-zA-Z] | '$' | '_' ;
      IDENTIFIER_PART ::= IDENTIFIER_START | DECIMAL_DIGIT ;
      HEX_DIGIT ::= [0-9a-fA-F] ;
