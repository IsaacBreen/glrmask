      }
    src/precompute4/weighted_automata/determinization.rs: |
      // src/precompute4/weighted_automata/determinization.rs
      //
      // Determinization of NWA -> DWA specialized to the Weight bitset semiring,
      // with an aggressively minimized construction following Mohri's insights:
      //   - General case: weighted-subset determinization with ε-closure integration,
      //     default/exception compression of labels, and compact state-entry/final weights.
      //   - Special optimized case (fast-path): if the NWA is a union of singleton-loop
      //     components reachable by ε from the start, whose per-component base weights
      //     are pairwise disjoint (the "hypercube" class), then we compile directly a
      //     1-state DWA. In that case, the entire "history" is tracked in the accumulating
      //     weight, not in the state space, avoiding 2^N blowup.
      //
      // Correctness sketch for the fast-path (bitset semiring):
      //   Let components C = {q}. Each q is a single state with self-loops only and no ε-out,
      //   and has a base weight B_q (start ε weight ∧ final weight at q). For each symbol a,
      //   let W_a = ⋁_{q allows a} (B_q ∧ w(q,a)) where w(q,a) is the (union of) loop weights at q.
      //   Then the 1-state DWA uses per-letter self-loops on a with weight W_a, and final weight
      //   F = ⋁_q B_q. For any input word x = a1...ak, the DWA assigns
      //       (W_a1 ∧ W_a2 ∧ ... ∧ W_ak) ∧ F
      //   The bitset semiring (∧ distributes over ⋁) and pairwise disjointness of the B_q guarantees
      //   this equals
      //       ⋁_q ( B_q ∧ w(q,a1) ∧ ... ∧ w(q,ak) )
      //   which is exactly the NWA semantics for this class (each q "reads" the sequence in-place).

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use chrono::Local;
      use indicatif::{MultiProgress, ProgressBar, ProgressStyle};
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};

      use super::common::{NWAStateID, Weight, DEFAULT_TRANSITION_SYMBOL};
      use super::dwa::{DWA, DWABuildError};
      use super::nwa::{NWA, NWAStates};

      // Weighted subset and ε-closure maps
      type WeightedSubset = BTreeMap<NWAStateID, Weight>;
      type ClosureMap = BTreeMap<NWAStateID, Weight>;

      // Helper ops on Weight
      fn weight_union(mut a: Weight, b: &Weight) -> Weight {
          a | b.clone()
      }
      fn weight_union_in_place(dst: &mut Weight, src: &Weight) {
          *dst = dst.clone() | src.clone();
      }
      fn weight_intersection(a: &Weight, b: &Weight) -> Weight {
          a & b
      }
      fn is_zero(w: &Weight) -> bool {
          w.is_empty()
      }

      // Epsilon-closure from a weighted subset:
      // Input: initial weighted subset 'seed' mapping NWA states to input weights (bitsets).
      // Output: closure map mapping every reachable state via ε-paths to the union of all
      // weights of those ε-paths (seed_weight ∧ ε-edges ∧ ...).
      fn epsilon_closure(nwa_states: &NWAStates, seed: &WeightedSubset) -> ClosureMap {
          let mut closure: ClosureMap = ClosureMap::new();
          let mut queue: VecDeque<NWAStateID> = VecDeque::new();

          for (sid, w) in seed {
              if !is_zero(w) {
                  let prev = closure.get(sid).cloned().unwrap_or_else(Weight::zeros);
                  let neww = weight_union(prev.clone(), w);
                  if neww != prev {
                      closure.insert(*sid, neww.clone());
                      queue.push_back(*sid);
                  }
              }
          }

          while let Some(u) = queue.pop_front() {
              let uw = closure.get(&u).cloned().unwrap_or_else(Weight::zeros);
              if is_zero(&uw) {
                  continue;
              }
              for (v, w_eps) in &nwa_states[u].epsilons {
                  let cand = weight_intersection(&uw, w_eps);
                  if is_zero(&cand) {
                      continue;
                  }
                  let prev = closure.get(v).cloned().unwrap_or_else(Weight::zeros);
                  let merged = weight_union(prev.clone(), &cand);
                  if merged != prev {
                      closure.insert(*v, merged.clone());
                      queue.push_back(*v);
                  }
              }
          }

          closure
      }

      // Compute S_total: explicit labels and default exceptions in this ε-closure
      fn collect_exception_labels(nwa_states: &NWAStates, closure: &ClosureMap) -> BTreeSet<i16> {
          let mut labels: BTreeSet<i16> = BTreeSet::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              for &lbl in nwa_states[*sid].transitions.keys() {
                  if lbl != DEFAULT_TRANSITION_SYMBOL {
                      labels.insert(lbl);
                  }
              }
          }
          labels
      }

      // Next subset for "others" labels not in S_total: use all defaults
      fn next_subset_for_others(nwa_states: &NWAStates, closure: &ClosureMap) -> WeightedSubset {
          let mut next: WeightedSubset = WeightedSubset::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              let st = &nwa_states[*sid];
              if let Some(default_targets) = st.transitions.get(&DEFAULT_TRANSITION_SYMBOL) {
                  for (target, weight) in default_targets {
                      let cand = weight_intersection(cw, weight);
                      if is_zero(&cand) {
                          continue;
                      }
                      next.entry(*target)
                          .and_modify(|w| weight_union_in_place(w, &cand))
                          .or_insert(cand);
                  }
              }
          }
          next.retain(|_, w| !is_zero(w));
          next
      }

      // Next subset for a specific label ch
      fn next_subset_for_label(
          nwa_states: &NWAStates,
          closure: &ClosureMap,
          ch: i16,
      ) -> WeightedSubset {
          let mut next: WeightedSubset = WeightedSubset::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              let st = &nwa_states[*sid];
              if let Some(targets) = st.transitions.get(&ch) {
                  // Explicit transition for 'ch' exists: use it.
                  for (to, w_edge) in targets {
                      let cand = weight_intersection(cw, w_edge);
                      if is_zero(&cand) {
                          continue;
                      }
                      next.entry(*to)
                          .and_modify(|w| weight_union_in_place(w, &cand))
                          .or_insert(cand);
                  }
              } else if let Some(default_targets) = st.transitions.get(&DEFAULT_TRANSITION_SYMBOL) {
                  // No explicit transition for 'ch': use default.
                  for (target, weight) in default_targets {
                      let cand = weight_intersection(cw, weight);
                      if is_zero(&cand) {
                          continue;
                      }
                      next.entry(*target)
                          .and_modify(|w| weight_union_in_place(w, &cand))
                          .or_insert(cand);
                  }
              }
          }
          next.retain(|_, w| !is_zero(w));
          next
      }

      // Union over values (for edge/default weights)
      fn union_over_values(map: &WeightedSubset) -> Weight {
          let mut acc = Weight::zeros();
          for w in map.values() {
              acc = acc | w.clone();
          }
          acc
      }

      // Compute DWA state-entry and final weights from ε-closure
      fn compute_state_and_final_weights(
          nwa: &NWA,
          closure: &ClosureMap,
      ) -> (Option<Weight>, Option<Weight>) {
          // State-entry weights are not part of Mohri's determinization algorithm.
          let entry_opt = None;
          let mut finalw = Weight::zeros();
          for (sid, cw) in closure {
              if let Some(fw) = &nwa.states[*sid].final_weight {
                  let cand = cw & fw;
                  if !is_zero(&cand) {
                      finalw = finalw | cand;
                  }
              }
          }
          let final_opt = if finalw.is_empty() { None } else { Some(finalw) };
          (entry_opt, final_opt)
      }

      // Determinizer

      struct Determinizer<'a> {
          nwa: &'a NWA,
          seen: HashMap<ClosureMap, usize>,
          subsets: Vec<WeightedSubset>,
          closures: Vec<ClosureMap>,
          queue: VecDeque<usize>,
          dwa: DWA,
          mp: Option<MultiProgress>,
      }

      impl<'a> Determinizer<'a> {
          fn new(nwa: &'a NWA, mp: Option<MultiProgress>) -> Self {
              let mut dwa = DWA::new();
              dwa.states.0.clear();
              dwa.body.start_state = 0;
              Determinizer {
                  nwa,
                  seen: HashMap::new(),
                  subsets: Vec::new(),
                  closures: Vec::new(),
                  queue: VecDeque::new(),
                  dwa,
                  mp,
              }
          }

          fn register_state(&mut self, subset: WeightedSubset) -> usize {
              // 1) Canonicalize incoming seed by dropping empty weights.
              let mut subset_clean: WeightedSubset = WeightedSubset::new();
              for (sid, w) in subset {
                  if !is_zero(&w) { subset_clean.insert(sid, w); }
              }
              // 2) Compute ε-closure; determinized state identity depends on closure.
              let closure = epsilon_closure(&self.nwa.states, &subset_clean);

              // Use the closure object itself as the key.
              if let Some(&id) = self.seen.get(&closure) {
                  return id;
              }

              // 3) Create brand-new DWA state for this closure.
              let id = self.dwa.add_state();

              // 4) Install final weight from closure.
              let (_entry_opt, final_opt) = compute_state_and_final_weights(self.nwa, &closure);
              if let Some(w) = final_opt { let _ = self.dwa.set_final_weight(id, w); }

              self.seen.insert(closure.clone(), id);
              self.subsets.push(subset_clean);
              self.closures.push(closure);
              self.queue.push_back(id);
              id
          }

          fn expand_state(&mut self, sid: usize) {
              let closure = &self.closures[sid];
              if closure.is_empty() {
                  return;
              }

              let labels_pb = if let Some(mp) = &self.mp {
                  let pb = mp.add(ProgressBar::new(0));
                  pb.set_style(
                      ProgressStyle::default_bar()
                          .template("  {spinner:.green} [{elapsed_precise}] Labels: [{bar:40.cyan/blue}] {pos}/{len} {msg}")
                          .unwrap()
                          .progress_chars("#>-"),
                  );
                  pb.set_message(format!("State {}", sid));
                  Some(pb)
              } else {
                  None
              };

              let exception_labels = collect_exception_labels(&self.nwa.states, closure);

              if let Some(pb) = &labels_pb {
                  pb.set_length(exception_labels.len() as u64);
              }

              let others_subset = next_subset_for_others(&self.nwa.states, closure);
              let others_weight = union_over_values(&others_subset);

              let mut exception_data: BTreeMap<i16, (WeightedSubset, Weight)> = BTreeMap::new();
              for ch in &exception_labels {
                  let sub_ch = next_subset_for_label(&self.nwa.states, closure, *ch);
                  let w_ch = union_over_values(&sub_ch);
                  if !sub_ch.is_empty() && !is_zero(&w_ch) {
                      exception_data.insert(*ch, (sub_ch, w_ch));
                  }
                  if let Some(pb) = &labels_pb {
                      pb.inc(1);
                  }
              }

              if let Some(pb) = &labels_pb {
                  pb.set_message(format!("State {}: installing transitions", sid));
                  pb.set_length(exception_data.len() as u64);
                  pb.set_position(0);
              }

              let mut default_target_id: Option<usize> = None;
              if !others_subset.is_empty() && !is_zero(&others_weight) {
                  let to_id = self.register_state(others_subset);
                  default_target_id = Some(to_id);
                  let _ = self
                      .dwa
                      .set_default_transition(sid, to_id, others_weight.clone())
                      .map_err(|_e: DWABuildError| ())
                      .ok();
              }

              for (ch, (sub_ch, w_ch)) in exception_data {
                  let to_ch_id = self.register_state(sub_ch);
                  let need_exception = match default_target_id {
                      None => true,
                      Some(def_id) => to_ch_id != def_id || w_ch != others_weight,
                  };
                  if need_exception {
                      let _ = self
                          .dwa
                          .add_transition(sid, ch, to_ch_id, w_ch.clone())
                          .map_err(|_e: DWABuildError| ())
                          .ok();
                  }
                  if let Some(pb) = &labels_pb {
                      pb.inc(1);
                  }
              }

              if let Some(pb) = labels_pb {
                  pb.finish_and_clear();
              }
          }
      }

      // Fast-path: try to build a 1-state DWA for a union of singleton-loop components.
      fn try_build_singleton_loop_union(nwa: &NWA) -> Option<DWA> {
          if nwa.states.0.is_empty() || nwa.body.start_state >= nwa.states.len() {
              return None;
          }

          let start = nwa.body.start_state;
          if !nwa.states[start].transitions.is_empty() {
              return None;
          }

          let mut seed: WeightedSubset = WeightedSubset::new();
          seed.insert(start, Weight::all());
          let start_closure = epsilon_closure(&nwa.states, &seed);

          let mut comps: Vec<(NWAStateID, Weight)> = Vec::new();
          for (sid, cw) in start_closure.iter() {
              if *sid == start || is_zero(cw) {
                  continue;
              }
              let st = &nwa.states[*sid];

              if !st.epsilons.is_empty() {
                  return None;
              }
              for (_lbl, vec_targets) in st.transitions.iter() {
                  for (to, _w) in vec_targets {
                      if *to != *sid {
                          return None;
                      }
                  }
              }

              if let Some(fw) = &st.final_weight {
                  let base = cw & fw;
                  if !base.is_empty() {
                      comps.push((*sid, base));
                  }
              }
          }

          if comps.is_empty() {
              return None;
          }

          for i in 0..comps.len() {
              for j in (i + 1)..comps.len() {
                  if !(comps[i].1.clone() & comps[j].1.clone()).is_empty() {
                      return None;
                  }
              }
          }

          let mut label_to_weight: BTreeMap<i16, Weight> = BTreeMap::new();
          for (sid, base) in &comps {
              let st = &nwa.states[*sid];
              for (lbl, vec_targets) in st.transitions.iter() {
                  let mut w_union = Weight::zeros();
                  for (_to, w) in vec_targets {
                      w_union = w_union | w.clone();
                  }
                  if !w_union.is_empty() {
                      let contrib = base.clone() & w_union;
                      if !contrib.is_empty() {
                          let prev = label_to_weight.get(lbl).cloned().unwrap_or_else(Weight::zeros);
                          label_to_weight.insert(*lbl, prev | contrib);
                      }
                  }
              }
          }

          let mut final_union = Weight::zeros();
          for (_sid, base) in &comps {
              final_union = final_union | base.clone();
          }

          let mut dwa = DWA::new();
          let s0 = dwa.body.start_state;
          if !final_union.is_empty() {
              let _ = dwa.set_final_weight(s0, final_union);
          }
          for (lbl, w) in label_to_weight {
              if !w.is_empty() {
                  let _ = dwa.add_transition(s0, lbl, s0, w);
              }
          }

          Some(dwa)
      }

      impl NWA {
          /// Determinize the subgraph reachable from `self.body.start_state` into a DWA.
          pub fn determinize_to_dwa(&self) -> DWA {
              if let Some(dwa) = try_build_singleton_loop_union(self) {
                  return dwa;
              }

              const STATE_LIMIT: usize = 100000;

              eprintln!(
                  "[DEBUG] Determinization: Using general-purpose subset construction (fast-path not taken)."
              );
              if self.states.0.is_empty() || self.body.start_state >= self.states.len() {
                  return DWA::new();
              }

              let mp = MultiProgress::new();
              let main_pb = mp.add(ProgressBar::new(1));
              main_pb.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [{elapsed_precise}] States: [{bar:40.cyan/blue}] {pos}/{len} ({eta}) {msg}")
                      .unwrap()
                      .progress_chars("#>-"),
              );
              main_pb.set_message("Determinizing NWA");

              let mut det = Determinizer::new(self, Some(mp));

              let mut start_subset: WeightedSubset = WeightedSubset::new();
              start_subset.insert(self.body.start_state, Weight::all());
              let start_id = det.register_state(start_subset);
              det.dwa.body.start_state = start_id;

              let mut processed_count = 0;
              while let Some(sid) = det.queue.pop_front() {
                  if det.seen.len() > STATE_LIMIT {
                      let timestamp = Local::now().format("%Y%m%d-%H%M%S");
                      let filename = format!("nwa_dump_{}.json", timestamp);
                      eprintln!("Determinization state limit ({}) exceeded. Dumping NWA to {} and panicking.", STATE_LIMIT, filename);
                      let f = std::fs::File::create(&filename).expect("Unable to create dump file");
                      serde_json::to_writer(f, self).expect("Unable to write NWA to file");
                      panic!("Determinization aborted after reaching {} states.", STATE_LIMIT);
                  }

                  let total_states = det.seen.len();
                  main_pb.set_length(total_states as u64);
                  main_pb.set_position(processed_count as u64);
                  main_pb.set_message(format!("Expanding state {}/{}", processed_count + 1, total_states));

                  det.expand_state(sid);
                  processed_count += 1;
              }
              main_pb.finish_with_message("Determinization complete");

              det.dwa
          }
      }
    src/precompute4/weighted_automata/dwa.rs: |
      // src/precompute4/weighted_automata/dwa.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{format_pos_code, StateID, Weight, DEFAULT_TRANSITION_SYMBOL};
      use std::collections::{BTreeMap, HashMap, VecDeque};
      use std::fmt::{self, Display, Formatter};
      use std::ops::{Deref, Index, IndexMut};

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum DWABuildError {
          TransitionAlreadyExists { from: StateID, on: i16 },
          StateOutOfBounds { state: StateID },
      }

      impl Display for DWABuildError {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              match self {
                  DWABuildError::TransitionAlreadyExists { from, on } => {
                      write!(f, "Transition from state {} on code {} already exists", from, on)
                  }
                  DWABuildError::StateOutOfBounds { state } => write!(f, "State {} is out of bounds", state),
              }
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAState {
          pub transitions: BTreeMap<i16, StateID>,
          pub final_weight: Option<Weight>,
          pub trans_weights: BTreeMap<i16, Weight>,
          /// Optional state-entry weight (intersected upon entering the state).
          pub state_weight: Option<Weight>,
      }

      impl DWAState {
          pub fn get_transition(&self, ch: i16) -> Option<(StateID, &Weight)> {
              self.transitions.get(&ch).or_else(|| self.transitions.get(&DEFAULT_TRANSITION_SYMBOL)).and_then(|to| {
                  self.trans_weights.get(&ch).or_else(|| self.trans_weights.get(&DEFAULT_TRANSITION_SYMBOL)).map(|w| (*to, w))
              })
          }

          pub fn get_weight(&self, ch: i16) -> Option<&Weight> {
              self.trans_weights.get(&ch).or_else(|| self.trans_weights.get(&DEFAULT_TRANSITION_SYMBOL))
          }

          /// Intersects all weights in this state with the given weight.
          pub fn apply_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw &= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw &= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              for w in self.trans_weights.values_mut() {
                  *w &= weight;
              }
          }

          /// Subtracts a weight from all weights in this state.
          pub fn exclude_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw -= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw -= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              for w in self.trans_weights.values_mut() {
                  *w -= weight;
              }
          }

          /// Iterator over all outgoing edges:
          /// - Edges appear as (label, target, weight)
          #[inline]
          pub fn iter_edges(&self) -> impl Iterator<Item = (i16, StateID, &Weight)> {
              self.transitions
                  .iter()
                  .filter_map(move |(ch, to)| self.trans_weights.get(ch).map(|w| (*ch, *to, w)))
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAStates(pub Vec<DWAState>);

      impl Index<usize> for DWAStates {
          type Output = DWAState;
          fn index(&self, index: usize) -> &Self::Output {
              &self.0[index]
          }
      }
      impl IndexMut<usize> for DWAStates {
          fn index_mut(&mut self, index: usize) -> &mut Self::Output {
              &mut self.0[index]
          }
      }
      impl Deref for DWAStates {
          type Target = [DWAState];
          fn deref(&self) -> &Self::Target {
              &self.0
          }
      }
      impl DWAStates {
          pub fn len(&self) -> usize {
              self.0.len()
          }
          pub fn add_state(&mut self) -> StateID {
              let id = self.0.len();
              self.0.push(DWAState::default());
              id
          }

          /// Adds a pre-existing DWAState to the collection and returns its new ID.
          pub fn add_existing_state(&mut self, state: DWAState) -> StateID {
              let id = self.0.len();
              self.0.push(state);
              id
          }

          pub fn copy_state(&mut self, state_id: StateID) -> StateID {
              assert!(state_id < self.len(), "state_id out of bounds");
              let state = self[state_id].clone();
              self.add_existing_state(state)
          }

          pub fn apply_weight(&mut self, state_id: StateID, weight: &Weight) {
              assert!(state_id < self.len(), "state_id out of bounds");
              self[state_id].apply_weight(weight);
          }

          pub fn copy_subgraph(&mut self, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= self.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(self[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = self[old_id].clone();

                  // Remap transitions
                  let mut new_transitions = BTreeMap::new();
                  for (ch, &old_target) in &old_state_clone.transitions {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      new_transitions.insert(*ch, new_target_id);
                  }
                  self[new_id].transitions = new_transitions;
              }
              (new_start_id, remap)
          }

          pub fn copy_subgraph_from(&mut self, other_states: &DWAStates, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= other_states.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(other_states[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = other_states[old_id].clone();

                  self[new_id].transitions = old_state_clone.transitions.iter().map(|(ch, &old_target)| {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      (*ch, new_target_id)
                  }).collect();
                  self[new_id].trans_weights = old_state_clone.trans_weights;
              }
              (new_start_id, remap)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWABody {
          pub start_state: StateID,
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWA {
          pub states: DWAStates,
          pub body: DWABody,
      }

      impl DWA {
          pub fn new() -> Self {
              let mut states = DWAStates::default();
              let start = states.add_state();
              DWA { states, body: DWABody { start_state: start } }
          }

          pub fn add_state(&mut self) -> StateID {
              self.states.add_state()
          }

          pub fn set_state_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].state_weight = Some(weight);
              Ok(())
          }

          pub fn set_final_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].final_weight = Some(weight);
              Ok(())
          }

          pub fn add_transition(
              &mut self,
              from: StateID,
              on: i16,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.contains_key(&on) {
                  return Err(DWABuildError::TransitionAlreadyExists { from, on });
              }
              from_state.transitions.insert(on, to);
              from_state.trans_weights.insert(on, weight);
              Ok(())
          }

          pub fn set_default_transition(
              &mut self,
              from: StateID,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              self.add_transition(from, DEFAULT_TRANSITION_SYMBOL, to, weight)
          }
      }

      #[derive(Debug, Clone)]
      pub struct DWAStats {
          pub num_states: usize,
          pub num_transitions: usize,
          pub num_final_states: usize,
          pub num_default_transitions: usize,
          pub avg_exceptions_per_state: f64,
      }

      impl Display for DWAStats {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "DWA Stats:")?;
              writeln!(f, "  - States: {}", self.num_states)?;
              writeln!(f, "  - Transitions: {}", self.num_transitions)?;
              writeln!(f, "  - Final States: {}", self.num_final_states)?;
              writeln!(f, "  - States with Default: {}", self.num_default_transitions)?;
              writeln!(f, "  - Avg Exceptions/State: {:.2}", self.avg_exceptions_per_state)
          }
      }

      impl DWA {
          pub fn stats(&self) -> DWAStats {
              let num_states = self.states.len();
              if num_states == 0 {
                  return DWAStats {
                      num_states: 0,
                      num_transitions: 0,
                      num_final_states: 0,
                      num_default_transitions: 0,
                      avg_exceptions_per_state: 0.0,
                  };
              }

              let mut num_exceptions = 0;
              let mut num_final_states = 0;
              let mut num_default_transitions = 0;

              for state in &self.states.0 {
                  num_exceptions += state.transitions.len();
                  if state.final_weight.is_some() {
                      num_final_states += 1;
                  }
                  if state.transitions.contains_key(&DEFAULT_TRANSITION_SYMBOL) {
                      num_default_transitions += 1;
                  }
              }

              let num_transitions = num_exceptions;
              let num_exceptions_only = num_exceptions - num_default_transitions;
              let avg_exceptions_per_state = num_exceptions_only as f64 / num_states as f64;

              DWAStats {
                  num_states,
                  num_transitions,
                  num_final_states,
                  num_default_transitions,
                  avg_exceptions_per_state,
              }
          }
      }

      impl Display for DWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "DWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(sw) = &state.state_weight {
                      writeln!(f, "    state_weight: {}", sw)?;
                  }
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  for (on, to) in &state.transitions {
                      if *on == DEFAULT_TRANSITION_SYMBOL {
                          if let Some(w) = state.trans_weights.get(on) {
                              writeln!(f, "    * -> {} (trans_weight: {})", to, w)?;
                          } else {
                              writeln!(f, "    * -> {}", to)?;
                          }
                      } else {
                          let char_repr = if *on >= 0 {
                              format_pos_code(*on)
                          } else {
                              let decoded_id = on.wrapping_sub(i16::MIN);
                              format!("neg({})", decoded_id)
                          };
                          if let Some(w) = state.trans_weights.get(on) {
                              writeln!(f, "    {} -> {} (trans_weight: {})", char_repr, to, w)?;
                          } else {
                              writeln!(f, "    {} -> {}", char_repr, to)?;
                          }
                      }
                  }
              }
              Ok(())
          }
      }
