              map.exceptions.insert(b'a' as u16, 10);
              map.exceptions.insert(b'b' as u16, 20);

              assert_eq!(map.get(b'a' as u16), Some(&10));
              assert_eq!(map.get(b'c' as u16), Some(&100)); // default
