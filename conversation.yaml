      1) Objective and constraints
      - Goal: Turn as many state-filtered edges as possible into unconditional edges without changing which tokens can be accepted, then exploit these unconditional edges to simplify the graph (preferably cutting out whole passthrough nodes and merging consecutive pops).
      - Constraints:
        - Preserve semantics: No new token should become accepted at any point (i.e., no extra parser state should be able to reach an end node because of the transformation).
        - Keep the final arena compact and efficient for get_mask:
          - Minimize number of per-node children entries by grouping tokens with identical behavior.
          - Prefer fewer pop layers (merge pop chains where safe).
          - Avoid exploding the number of edges.
        - Time-bound/stochastic: best-effort improvements within a time budget.

      2) Data model to optimize (NodeOpt)
      - Recommended NodeOpt shape (lossless, fast to repack):
        - children: Dict[LLMToken, Dict[Pop, Dict[NodeID, Edge]]]
          - Pop is an int.
          - Edge ∈ {UnconditionalEdge, StateEdge(states: Set[int])}.
        - is_end: bool
      - Notes:
        - If you keep the simplified variant children[token][dest] -> (pop, Edge), be aware it cannot represent multiple different pops to the same dest under the same token. Prefer the per-pop nested map to avoid lossy merges and to simplify grouping in _from_nodeopt_graph.

      3) Converting back and forth
      - To NodeOpt (_to_nodeopt_graph):
        - For each arena node:
          - Explode each ((pop, llm_bv), [(dest, state_bv), ...]) into per-token entries.
          - For state_bv empty => UnconditionalEdge; else => StateEdge with the concrete set of states.
          - Store in children[token][pop][dest] = (Edge).
        - If you must keep children[token][dest] = (pop, Edge), document the policy when you see two different pops for the same (token, dest). A stable-but-lossy policy will change semantics; avoid it if possible.
      - From NodeOpt (_from_nodeopt_graph) to arena:
        - Build signatures keyed by (pop, signature_of_dest_edges) and group tokens that share that exact signature:
          - signature_of_dest_edges: sorted tuple of (dest, ('U', ())) for unconditional or (dest, ('S', tuple(ranges))) for filtered with a canonical RangeSet/ranges tuple.
        - Emit children as ((pop, llm_bv: RangeSet), [(dest, state_bv_rs), ...]).
        - Performance tips:
          - Cache conversions from frozenset(states) to a RangeSet once (avoid O(E) RangeSet allocations).
          - Sorting and grouping should be deterministic.
          - If using children[token][pop][dest], grouping is straightforward and minimal by construction.

      4) Alive-state analysis (baseline fixpoint)
      - Purpose: Compute, for each node n, the set Alive[n] of parser states that can be “alive” at that node under the current graph semantics.
      - Semantics for propagation:
        - Across edge (pop = p, Edge e) from src -> dst:
          - S' = reverse_state_map^p(S), where S are alive states at src.
          - If e is StateEdge(states): S'' = S' ∩ states.
          - If e is UnconditionalEdge: S'' = S'.
          - Add S'' to Alive[dst].
        - Ignore LLM tokens during alive propagation; it’s a purely parser-state flow problem.
      - Seeding:
        - Add start_state_id to Alive[r] for every root node r.
      - Solve to fixpoint with a standard worklist.
      - Keep Alive for subsequent passes; you’ll incrementally update it when you accept transformations.

      5) Turning state-filtered edges into unconditional edges (main pass)
      - Candidate edges:
        - Iterate only over StateEdge edges.
        - Maintain a list or priority queue of candidates. Random selection is OK (stochastic approach).
      - Local safety check (fast path):
        - Let S_src = Alive[src], S_edge = edge.states. If S_src ⊆ S_edge: safe to make the edge unconditional immediately (no extra states can slip through).
      - Full safety check (tentative propagation):
        - When S_extra = S_src \ S_edge is non-empty:
          - We simulate the impact of making this particular edge unconditional:
            1) First hop (modified semantics only for the chosen edge):
               - frontier0 = reverse_state_map^pop(S_extra)  // do NOT apply the edge’s state mask
               - frontier0 = frontier0 \ Alive[dst]          // only states that are truly new at dst matter
               - If (frontier0 is empty): safe (no change); unconditionalize and continue.
               - If dst.is_end and frontier0 ≠ ∅: unsafe; skip this edge.
            2) Propagate forward normally from (dst, frontier0):
               - Use a local queue of (node_id, frontier_states).
               - For each outgoing edge (pop2, Edge2) to node dst2:
                 - next_states = reverse_state_map^pop2(frontier_states)
                 - If Edge2 is StateEdge(mask): next_states = next_states ∩ mask
                 - next_states = next_states \ Alive[dst2]   // Only newly-added states matter
                 - If next_states is empty: continue
                 - If dst2.is_end: unsafe; abort
                 - Enqueue (dst2, next_states) and accumulate Delta[dst2] |= next_states
          - If the tentative BFS finishes without reaching any end node, the transformation is safe.
      - Accepting a safe transformation:
        - Replace the original StateEdge with UnconditionalEdge at (src, token, pop, dest).
        - Update Alive by applying all newly discovered states: for each node u, Alive[u] |= Delta[u].
        - For each node u where Alive changed, re-enqueue it in the global alive worklist if you maintain one, or at least mark edges outgoing from u as higher-priority candidates (they may now satisfy the fast path).
      - Rejecting an unsafe transformation:
        - Discard Delta, leave the edge unchanged.
      - Loop control:
        - Time-box to T seconds, or stop after K consecutive failures, or when no StateEdge remains.
        - Heuristics to try first:
          - Smaller |S_extra| first.
          - Edges on deeper nodes (based on max_depth) may open more wins after success.
          - Trivial unconditionalizations (S_src ⊆ S_edge) first — they’re free.

      6) Passthrough node elimination and pop merging
      - Motivation: After many unconditionalizations, chain nodes A -> B -> C with unconditional edges can be collapsed so that A jumps directly to C with pop = pop_AB + pop_BC.
      - Definitions:
        - Passthrough node B: a node with
          - is_end == False
          - Every outgoing edge for every token is UnconditionalEdge (regardless of pop).
      - Parent map:
        - Build parents: Dict[node, List[(parent, token, pop, Edge, dest=that node)]]. This is needed to rewrite incoming edges when removing B.
      - Safe removal of B:
        - Do not remove roots unless you also update roots_map (more below).
        - For each parent A of B and each token t where A has A->B edges:
          - For each unconditional outgoing edge B->C under the same token t with pop pb:
            - Compose edge A->C with:
              - pop = pa + pb (pa is the pop on A->B)
              - Edge = the Edge on A->B:
                - If A->B is UnconditionalEdge, keep it UnconditionalEdge.
                - If A->B is StateEdge(S), keep the same StateEdge(S).
            - Insert/merge this composed edge into A’s children for token t (respecting NodeOpt’s representation):
              - If you use the recommended per-pop nested map: insert under [t][pa+pb][C].
              - Dedup rules:
                - If an existing edge is UnconditionalEdge, it dominates any StateEdge for the same (t, pop, C).
                - If both are StateEdges with same (t, pop, C), union their state sets.
                - If (t, pop, C) already exists but with a different pop, they are different entries and both must be kept.
          - Remove A->B edge(s) from A.
        - After all parents have been rewritten, if B has no remaining incoming edges, remove B entirely.
      - Roots and ends:
        - Do not remove end nodes.
        - Either:
          - Do not remove nodes that appear as roots_map[state_id], OR
          - If you remove a root node r with unconditional edges r->C under all tokens, rewrite roots_map[state_id] to point to C with the same strict semantics. Be careful: roots_map maps tokenizer states to node ids, not to pop. You must only rewrite when the composed pop for the root would be 0 across all tokens (otherwise you shift pop semantics for the entry point). In practice, easiest is to keep root nodes.
      - Alternative “edge-minimizing” mode:
        - If cutting B entirely is not possible, you can still add shortcuts A->C (with pop sums) while keeping B, to reduce depth. However, this increases the number of edges and may slow get_mask unless you are very careful with grouping. Prefer node removal to pure edge addition.

      7) Repacking back to the arena (efficient for get_mask)
      - Group-by strategy:
        - For each node, build groups keyed by (pop, dest-signature).
        - The signature must be exact and canonical so that unrelated tokens group reliably. Use:
          - For each dest: ('U', ()) or ('S', tuple(state_bv_rs.to_ranges()))
          - Key: (pop, tuple(sorted((dest, sig) for dest)))
        - For each group, build llm_bv = RangeSet.from_indices(sorted(tokens)). This produces minimal ranges.
        - The resulting children list per node consists of:
          - ((pop, llm_bv), [(dest, state_bv_rs), ...]) entries sorted deterministically.
      - Minimization tips:
        - Cache RangeSet for a given frozenset(state_ids).
        - If a group’s dest list is empty (shouldn’t happen), skip it.
        - Try to avoid creating many tiny groups: make sure the signature function is stable and hashes large identical structures identically.

      8) Maintaining max_depth
      - After rewriting/removal:
        - Recompute max_depth per node (longest number of edges to a sink/end) if feasible. get_mask uses depth ordering to prune earlier; stale depths can slow it down.
        - If recomputation is too expensive, at least update affected subgraphs (nodes touched by transformations). A simple DAG-like longest-path DP with cycle handling via iterative relaxation or Kahn-like passes works; if cycles exist, any upper bound is acceptable but a tight bound is better for pruning.

      9) Performance and caching notes
      - reverse_state_map^p(S):
        - You will call this a lot. Cache preimages per (p, frozenset(S)) cautiously or, better, precompute for small p the function f_p(s) = predecessors^p({s}) and then compute union over s ∈ S. That is often faster and much more memory friendly.
        - If pop values are bounded (they usually are), precompute f_p for 1..p_max. Use incremental composition: f_{p+1}(s) = union_{t∈f_p(s)} reverse_state_map[t].
      - Frontier representation:
        - Use Python sets of ints for states; they are simple and fast enough in most cases. If needed, swap to your bitset type for states to speed intersections.
      - Tentative propagation cutoffs:
        - If frontier grows beyond a threshold (e.g., > 10k states cumulatively), abort and mark the edge as unlikely to succeed.
        - Prioritize edges where |S_extra| is small.
      - Worklist control:
        - Track “success streak” and “failure streak”. If many consecutive failures happen, either stop or switch heuristics (e.g., try different nodes or edges).
      - Memory:
        - Reuse mutable sets where possible, but be careful not to alias Alive entries. Always take set differences into fresh sets.

      10) Correctness invariants and safety proofs (intuition)
      - Alive fixpoint describes states that are currently available under existing edge semantics.
      - The only way a new unconditionalization can change accepted tokens is by enabling some state that was previously blocked by a StateEdge to reach an end node. The tentative propagation simulates exactly “what new states would be added” if we made that edge unconditional:
        - It starts with S_extra (the states that were blocked).
        - It pushes them forward with the normal alive propagation rules, except that the first hop across the chosen edge ignores the state filter.
        - If we never hit an end node during this propagation, then those newly reachable states are “non-productive” (they die or get re-filtered). We can safely accept the transformation and update Alive by exactly the newly-found Delta.
      - Accepting a transformation strictly reduces the global measure “sum over all edges of |state filters|” or reduces the number of nodes after passthrough removal. The process terminates even without a time limit; the time-bound just caps work.

      11) Edge cases and pitfalls
      - Pop = 0 edges:
        - reverse_state_map^0(S) = S. Everything else is unchanged.
      - Missing entries in reverse_state_map:
        - Treat as empty predecessor sets; preimages can go to empty quickly.
      - End nodes:
        - Never remove them.
        - Tentative propagation must treat “frontier reaching an end node” as immediate failure.
      - Roots (roots_map):
        - Either forbid removal/rewiring of root nodes, or update roots_map carefully (only safe if all composed pops are zero for all tokens and the target is unique and unconditional).
      - Multi-pop to same dest under same token:
        - If you keep the simplified NodeOpt children[token][dest] = (pop, Edge), you risk silently dropping edges with conflicting pops. Prefer the per-pop nesting to avoid this.
      - Dedup during composition:
        - For identical (token, pop, dest), merge edges:
          - If either edge is unconditional => keep UnconditionalEdge.
          - If both are state-filtered => union their state sets.

      12) Optional modes
      - Node-minimizing mode (default):
        - Focus on removing as many passthrough nodes as possible.
      - Edge-minimizing mode:
        - Add shortcuts even if you keep intermediate nodes. Use with caution; only add when the added edges will compress significantly after grouping (e.g., identical signatures for large token sets), otherwise get_mask can slow down.

      13) Quick checklist for the implementation
      - Convert arena -> NodeOpt (losslessly, per-pop nested map).
      - Compute Alive fixpoint once.
      - Build candidate list of StateEdge edges.
      - Main loop for up to T seconds:
        - Pick candidate edge.
        - If S_src ⊆ S_edge: unconditionalize and update Alive (no Delta; trivial).
        - Else run tentative propagation:
          - If hits an end node: reject.
          - Else accept: turn to UnconditionalEdge and apply Delta to Alive.
      - Build parent map; remove passthrough nodes:
        - For each passthrough node (non-end, all unconditional outs):
          - Compose parents with children; insert composed edges with merged pops and appropriate Edge kind.
          - Remove old edges; drop the node if no incoming edges remain.
        - Avoid touching roots (or rewrite roots_map carefully).
      - Repack NodeOpt -> arena:
        - Group by (pop, dest-signature), coalesce tokens into RangeSets.
        - Cache state RangeSets.
        - Sort deterministically.
      - Recompute max_depth (at least for changed areas).
      - Validate:
        - Sanity checks: no dangling nodes; roots_map points to existing nodes; no end nodes lost.
        - Optional: Compare get_mask results on random prefixes before/after optimization for small samples.

      These notes capture the algorithm, the safety conditions, and the practical steps to keep the final graph compact and fast in get_mask. The two key ideas are (1) safe unconditionalization via state-level tentative propagation, and (2) structural compaction that only removes nodes when all their outs are unconditional, composing pops to keep traversal shallow without introducing edge blow-ups.
