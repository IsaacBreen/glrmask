        - pop_to_state_union[pop]: union of state_id sets across all edges in that pop-bucket.
        - pop_to_llm_union[pop]: union of llm_bv across all edges in that pop-bucket.
        - llm_bv_descendant: an upper bound on tokens that can reach a clean_end from this node, defined recursively:
          - If node.clean_end: all_ones
          - Else: union over edges e of (e.llm_bv ∩ union of llm_bv_descendant of all edge destinations)
      - Why it’s correct:
        - Bucket state pruning: If peeked_states ∩ pop_to_state_union[pop] is empty, then no edge in this bucket has any destination containing our states. Pruning that bucket is exact.
        - Bucket llm pruning: If popped_acc.llm_mask ∩ pop_to_llm_union[pop] is empty, then no edge in this bucket can pass the token-mask filter. Pruning is exact.
        - Descendant closure pruning: llm_bv_descendant is the union of path masks (edge.llm_bv ∩ descendant closure). It’s a strict upper bound on all tokens any path from this node could add to final_mask. If it doesn’t overlap remaining_mask ∩ current_acc_mask, the subtree can’t add anything. Pruning is exact.
      - Implementation:
        - Extend ArenaNode with:
          - llm_bv_descendant: LLMTokenSet
          - pop_to_state_union: Dict[int, StateIDSet]
          - pop_to_llm_union: Dict[int, LLMTokenSet]
        - Add Model._compute_bucket_unions() to fill per-pop unions.
        - Add Model._compute_descendant_llm_closure() to fill the closure. Compute bottom-up using max_depth in ascending order.

      2) Use closure in get_mask to prune whole nodes early
      - Replace the node-level “work_llm_mask = node.llm_bv_union ∩ gss_acc.llm_mask” with:
        - work_llm_mask = node.llm_bv_descendant ∩ gss_acc.llm_mask
        - If work_llm_mask ∩ remaining_mask is empty, skip node (count as closure prune).
      - Why it helps: This prunes many nodes that cannot possibly contribute to final_mask due to deeper constraints downstream. It directly attacks “nodes_processed” in worst-case spikes.

      3) Add global popn cache across the entire get_mask call
      - What: Cache popped results by (id(gss_node), pop). Reuse across different nodes. Keep the existing per-node pop_cache, but first probe a shared global cache. Record hits.
      - Why it’s correct: GSS.popn is a pure function of the GSS and pop value. Reusing popped results across nodes is exact. This directly reduces “popn” calls — the dominating cost in your worst spike (16+ ms).

      4) Add bucket-level prunes inside the per-node generator
      - On first time you touch a given pop value for a node:
        - Compute popped (via caches), then:
          - If peek_rs ∩ node.pop_to_state_union[pop] is empty: skip the entire bucket for this node.
          - If popped_acc.llm_mask ∩ node.pop_to_llm_union[pop] is empty: skip the entire bucket.
      - This removes thousands of “dest_union_pruned_after_pop” at the bucket level rather than per edge.

      5) Cache apply_and_prune across edges by (id(popped), id(llm_bv))
      - What: When you need to apply-and-prune with a specific llm_bv, cache the result keyed by (id(popped), id(llm_bv)). Reuse across multiple edges/dests that share the same llm_bv (common in your stats).
      - Why it’s correct: apply_and_prune returns a new GSS and does not mutate popped. Reusing the filtered GSS is exact. This reduces apply_and_prune counts (a nontrivial 3–4 ms in worst spike).

      6) Cache isolate_many across identical (source_gss, s-list) pairs
      - What: Cache isolate_many with key (id(source_gss), tuple(sorted(s_list))). Reuse identical cuts that occur multiple times.
      - Why: isolate_many is pure and returns a GSS derived from source_gss; reuse is exact. This targets spikes with hundreds to thousands of isolates.

      7) Increase gm_max_edges and gm_max_dests defaults (reduce heap churn)
      - What: Set gm_max_edges = 256 and gm_max_dests = 4096 (or similar).
      - Why: Thousands of tiny “Suspend/Resume” cycles amplify overhead in Python and distort worst-case latency. Larger chunks reduce schedule overhead without changing semantics.

      8) Instrumentation
      - Add counters:
        - get_mask.main_loop.node.closure_pruned
        - get_mask.main_loop.bucket_pruned_state
        - get_mask.main_loop.bucket_pruned_llm
