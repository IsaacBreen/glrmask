    python/aug25/benchmark_analyzer.py: |
      import argparse
      import json
      from pathlib import Path
      from typing import Dict, List, Tuple, Optional, Set
      import sys
      import warnings

      import pandas as pd


      # Suppress noisy FutureWarning from seaborn/pandas
      warnings.filterwarnings('ignore', category=FutureWarning)

      def _normalize_intervals(ranges: Optional[List[List[int]]]) -> Tuple[Tuple[int, int], ...]:
          """
          Normalize a list of [start, end] intervals into a sorted, merged, disjoint tuple of pairs.
          """
          if not ranges:
              return tuple()
          items = sorted((int(s), int(e)) for s, e in ranges)
          merged: List[Tuple[int, int]] = []
          cs, ce = items[0]
          for ns, ne in items[1:]:
              if ns <= ce + 1:
                  ce = max(ce, ne)
              else:
                  merged.append((cs, ce))
                  cs, ce = ns, ne
          merged.append((cs, ce))
          return tuple(merged)

      def _format_token_bytes(b: bytes) -> str:
          """Formats a token's bytes into a clean, readable string."""
          # Handle common whitespace single-byte tokens specially for clarity.
          if b == b'\n': return r"'\n'"
          if b == b'\t': return r"'\t'"
          if b == b'\r': return r"'\r'"
          if b == b' ': return "' '"

          # Try to decode as UTF-8. If successful, return the string's repr().
          # repr() will handle quotes and escape sequences correctly (e.g., 'a"b' -> '\'a"b\'').
          try:
              s = b.decode('utf-8')
              return repr(s)
          except UnicodeDecodeError:
              # If it's not valid UTF-8, fall back to a hex representation for readability.
              # This is better than the default b'...' repr for raw bytes.
              hex_str = b.hex()
              return f"hex({hex_str})"

      def _print_vocab_summary(id_to_token: Dict[int, bytes]):
          """Prints a summarized, readable version of the vocabulary."""
          print("\n--- Vocabulary Reference (Baseline) ---")
          if len(id_to_token) > 300:
              print(f"  Vocabulary has {len(id_to_token)} tokens (too large to display).")
              print("-------------------------------------\n")
              return

          if not id_to_token:
              print("  (Vocabulary is empty or was not loaded)")
              print("-------------------------------------\n")
              return

          sorted_ids = sorted(id_to_token.keys())
          
          digits_map = {ord(c) for c in "0123456789"}
          lower_map = {ord(c) for c in "abcdefghijklmnopqrstuvwxyz"}
          upper_map = {ord(c) for c in "ABCDEFGHIJKLMNOPQRSTUVWXYZ"}
          
          def get_token_group(token_id, id_to_token):
              tok = id_to_token.get(token_id)
              if tok is None or len(tok) != 1:
                  return None
              byte_val = tok[0]
              if byte_val in digits_map: return "digits"
              if byte_val in lower_map: return "lowercase"
              if byte_val in upper_map: return "uppercase"
              return None

          i = 0
          while i < len(sorted_ids):
              current_id = sorted_ids[i]
              current_tok = id_to_token[current_id]
              group = get_token_group(current_id, id_to_token)

              if group:
                  start_id = current_id
                  end_id = current_id
                  j = i + 1
                  while j < len(sorted_ids):
                      next_id = sorted_ids[j]
                      if next_id == end_id + 1 and get_token_group(next_id, id_to_token) == group:
                          end_id = next_id
                          j += 1
                      else:
                          break
                  
                  start_tok = id_to_token[start_id]
                  end_tok = id_to_token[end_id]
                  range_str = f"{start_id}..{end_id}"
                  print(f"  - {range_str:<12}: {_format_token_bytes(start_tok)}..{_format_token_bytes(end_tok)} ({group})")
                  i = j
              else:
                  range_str = f"{current_id}"
                  print(f"  - {range_str:<12}: {_format_token_bytes(current_tok)}")
                  i += 1
          print("-------------------------------------\n")

      def _format_ranges_as_tokens(ranges: Tuple[Tuple[int, int], ...], id_to_token: Dict[int, bytes]) -> str:
          """Converts token ID ranges to a summary string of token representations."""
          if not id_to_token:
              return "(vocab not loaded)"

          # Define known sequential groups of single-byte tokens.
          digits_bytes = {ord(c) for c in "0123456789"}
          lower_bytes = {ord(c) for c in "abcdefghijklmnopqrstuvwxyz"}
          upper_bytes = {ord(c) for c in "ABCDEFGHIJKLMNOPQRSTUVWXYZ"}

          def get_token_group(token_id: int, id_to_token: Dict[int, bytes]) -> Optional[str]:
              """Determines if a token belongs to a known sequential group."""
              tok = id_to_token.get(token_id)
              if tok is None or len(tok) != 1:
                  return None
              byte_val = tok[0]
              if byte_val in digits_bytes: return "digits"
              if byte_val in lower_bytes: return "lowercase"
              if byte_val in upper_bytes: return "uppercase"
              return None

          all_parts = []
          for start, end in ranges:
              if start > end:
                  continue

              sub_range_start_idx = start
              current_group = get_token_group(start, id_to_token)

              for i in range(start + 1, end + 2): # Iterate one past the end to flush the last sub-range
                  # Determine the group of the current token, or a unique group if we're past the end
                  next_group = get_token_group(i, id_to_token) if i <= end else object()

                  if next_group != current_group:
                      # The group has changed, so the previous sub-range has ended at i-1
                      sub_range_end_idx = i - 1
                      # If the group is a recognized sequential one, we can form a range.
                      if current_group is not None and sub_range_start_idx < sub_range_end_idx:
                          start_tok_str = _format_token_bytes(id_to_token.get(sub_range_start_idx, b'<??>'))
                          end_tok_str = _format_token_bytes(id_to_token.get(sub_range_end_idx, b'<??>'))
                          all_parts.append(f"{start_tok_str}..{end_tok_str}")
                      # Otherwise, print each token in the sub-range individually.
                      else:
                          for j in range(sub_range_start_idx, sub_range_end_idx + 1):
                              tok_str = _format_token_bytes(id_to_token.get(j, b'<??>'))
                              all_parts.append(tok_str)

                      # Start a new sub-range
                      sub_range_start_idx = i
                      current_group = next_group

          # Truncation logic
          MAX_LEN = 30000
          output_str = ""
          truncated = False
          for i, part in enumerate(all_parts):
              # Tentative next string with separator
              next_str = output_str + (", " if i > 0 else "") + part
              if len(next_str) > MAX_LEN and i > 0:
                  truncated = True
                  break
              output_str = next_str

          if truncated:
              output_str += ", ..."

          return output_str

      def _format_numeric_ranges(ranges: Tuple[Tuple[int, int], ...]) -> str:
          """Converts numeric ranges to a clean string like '1..10, 12, 15..20'."""
          parts = []
          for start, end in ranges:
              if start == end:
                  parts.append(str(start))
              else:
                  parts.append(f"{start}..{end}")
          return ", ".join(parts)

      def _print_mismatch_context(code_bytes: bytes, start_byte: int, end_byte: int):
          """Prints the source line and context for a token mismatch."""
          # Find the line containing the start of the token
          line_start_pos = code_bytes.rfind(b'\n', 0, start_byte) + 1
          line_end_pos = code_bytes.find(b'\n', start_byte)
          if line_end_pos == -1:
              line_end_pos = len(code_bytes)

          # Find context lines
          prev_line_start_pos = code_bytes.rfind(b'\n', 0, line_start_pos - 1) + 1
          next_line_end_pos = code_bytes.find(b'\n', line_end_pos + 1)
          if next_line_end_pos == -1:
              next_line_end_pos = len(code_bytes)

          # Get line numbers
          line_num = code_bytes.count(b'\n', 0, line_start_pos) + 1

          # Extract and decode lines, handling potential errors
          def decode_line(b: bytes) -> str:
              try:
                  return b.decode('utf-8')
              except UnicodeDecodeError:
                  return repr(b)

          prev_line = decode_line(code_bytes[prev_line_start_pos:line_start_pos-1]) if line_start_pos > 0 else ""
          current_line = decode_line(code_bytes[line_start_pos:line_end_pos])
          next_line = decode_line(code_bytes[line_end_pos+1:next_line_end_pos]) if line_end_pos < len(code_bytes) else ""

          # Calculate column and length for the pointer
          start_col = start_byte - line_start_pos
          # The token might span multiple lines. For visualization, we'll cap it at the end of the current line.
          token_len_on_line = min(end_byte, line_end_pos) - start_byte

          # Print with context
          print(f"  Mismatch context (line {line_num}):")
          if line_num > 1 and prev_line:
              print(f"    {line_num-1: >4} | {prev_line}")
          print(f"    {line_num: >4} | {current_line}")
          # Pointer line
          pointer = ' ' * start_col + '^' * max(1, token_len_on_line) # ensure at least one ^
          print(f"         | {pointer}")
          if next_line:
              print(f"    {line_num+1: >4} | {next_line}")

      def _print_mask_diff(
          baseline_mask: Tuple[Tuple[int, int], ...],
          current_mask: Tuple[Tuple[int, int], ...],
          baseline_vocab: Dict[int, bytes],
          current_vocab: Dict[int, bytes]
      ):
          """Calculates and prints the symmetric difference between two token masks."""
          def ranges_to_set(ranges: Tuple[Tuple[int, int], ...]) -> Set[int]:
              s = set()
              for start, end in ranges:
                  s.update(range(start, end + 1))
              return s

          def set_to_ranges(s: Set[int]) -> Tuple[Tuple[int, int], ...]:
              if not s:
                  return tuple()
              
              sorted_tokens = sorted(list(s))
              
              ranges: List[Tuple[int, int]] = []
              start = sorted_tokens[0]
              end = sorted_tokens[0]
              
              for i in range(1, len(sorted_tokens)):
                  if sorted_tokens[i] == end + 1:
                      end = sorted_tokens[i]
                  else:
                      ranges.append((start, end))
                      start = sorted_tokens[i]
                      end = sorted_tokens[i]
              
              ranges.append((start, end))
              return tuple(ranges)

          baseline_set = ranges_to_set(baseline_mask)
          current_set = ranges_to_set(current_mask)

          baseline_only_set = baseline_set - current_set
          if baseline_only_set:
              baseline_only_ranges = set_to_ranges(baseline_only_set)
              numeric_str = _format_numeric_ranges(baseline_only_ranges)
              token_str = _format_ranges_as_tokens(baseline_only_ranges, baseline_vocab)
              print(f"  - Baseline ONLY (numeric): {numeric_str}")
              print(f"  - Baseline ONLY (tokens):  {token_str}")

          current_only_set = current_set - baseline_set
          if current_only_set:
              current_only_ranges = set_to_ranges(current_only_set)
              numeric_str = _format_numeric_ranges(current_only_ranges)
              token_str = _format_ranges_as_tokens(current_only_ranges, current_vocab)
              print(f"  - Current ONLY (numeric):  {numeric_str}")
              print(f"  - Current ONLY (tokens):   {token_str}")

      def _generate_and_print_summary(df: pd.DataFrame, title: str, equivalence_info: Optional[Dict[str, bool]] = None, mismatch_counts: Optional[Dict[str, List[int]]] = None):
          """Calculates, formats, and prints a summary statistics table for a given DataFrame."""
          print(f"\n--- {title} ---")
          if df.empty:
              print("  (No data available)")
              return

          summary = df.groupby('model')['time_sec'].agg(
              ['mean', 'std', 'min', 'median', 'max', 'count']
          ).rename(columns={'median': 'p50'})

          # Add percentiles
          percentiles = df.groupby('model')['time_sec'].quantile([0.90, 0.99]).unstack(level=1)
          percentiles.columns = [f'p{int(c*100)}' for c in percentiles.columns]
          summary = summary.join(percentiles)

          # Add equivalence info if provided (only for get_mask)
          if equivalence_info and mismatch_counts:
              eq_series = pd.Series({k: ('✅' if v else '❌') for k, v in equivalence_info.items()}, name='equivalent')
              mm_series = pd.Series({k: len(v) for k, v in mismatch_counts.items()}, name='mask_mismatch_count')
              summary = summary.join(eq_series).join(mm_series)
              # Reorder columns for display
              summary = summary[['equivalent', 'mask_mismatch_count', 'count', 'mean', 'std', 'min', 'p50', 'p90', 'p99', 'max']]
          else:
              summary['equivalent'] = '-'
              summary['mask_mismatch_count'] = '-'
              summary = summary[['equivalent', 'mask_mismatch_count', 'count', 'mean', 'std', 'min', 'p50', 'p90', 'p99', 'max']]


          # Format for printing
          numeric_cols = ['mean', 'std', 'min', 'p50', 'p90', 'p99', 'max']
          summary[numeric_cols] *= 1000  # convert to ms
          summary = summary.rename(columns=lambda c: c + ' (ms)' if c in numeric_cols else c)
          
          # Use a formatter to explicitly right-align the mismatch count column,
          # ensuring it lines up perfectly between the two tables.
          mismatch_header = 'mask_mismatch_count'
          formatters = {
              mismatch_header: lambda x: f"{x: >{len(mismatch_header)}}"
          }

          print(summary.to_string(float_format="%.4f", formatters=formatters))


      def analyze_results(result_files: List[Path], output_dir: Path, baseline_key: Optional[str] = None, agg_method: Optional[str] = None, skip_plots: bool = False):
          """
          Loads benchmark results from JSON files, computes statistics, compares masks against a chosen baseline,
          and generates plots.
          """
          all_data_rows = []

          commit_timings_by_model: Dict[str, List[List[float]]] = {}
          masks_by_model: Dict[str, List[List[Tuple[Tuple[int, int], ...]]]] = {}
          get_mask_timings_by_model: Dict[str, List[List[float]]] = {}
          id_to_token_by_model: Dict[str, Dict[int, bytes]] = {}
          token_positions_by_model: Dict[str, List[List[Tuple[int, int]]]] = {}
          code_content_by_model: Dict[str, bytes] = {}

          model_order: List[str] = []

          # Load all results
          for file_path in result_files:
              with open(file_path, 'r') as f:
                  data = json.load(f)

              model_script = data.get("model_script") or data.get("competitor_script")  # legacy fallback
              grammar_file = data.get("inputs", {}).get("grammar_file")
              code_file = data.get("inputs", {}).get("code_file")

              model_stem = Path(model_script).stem if model_script else Path(file_path).stem
              
              if grammar_file:
                  grammar_stem = Path(grammar_file).name.replace('.json.gz', '').replace('.json', '')
                  model_name = f"{model_stem}__{grammar_stem}"
              else:
                  model_name = model_name = model_stem

              if model_name not in model_order:
                  model_order.append(model_name)

              # Load vocab if not already loaded for this model_name
              if model_name not in id_to_token_by_model and grammar_file:
                  try:
                      p = Path(grammar_file)
                      if str(p).endswith('.gz'):
                          import gzip
                          with gzip.open(p, 'rt', encoding='utf-8') as f_gz:
                              constraint_json = json.load(f_gz)
                      else:
                          with open(p, 'r', encoding='utf-8') as f_plain:
                              constraint_json = json.load(f_plain)

                      id_to_token: dict[int, bytes] = {}
                      llm_token_map = constraint_json.get('llm_token_map', [])
                      for token_bytes_list, token_id in llm_token_map:
                          id_to_token[token_id] = bytes(token_bytes_list)
                      id_to_token_by_model[model_name] = id_to_token
                  except Exception as e:
                      print(f"Warning: could not load vocab from {grammar_file} for {model_name}: {e}")
              
              if model_name not in code_content_by_model and code_file:
                  try:
                      code_content_by_model[model_name] = Path(code_file).read_bytes()
                  except Exception as e:
                      print(f"Warning: could not load code file {code_file} for {model_name}: {e}")

              # Initialize if first time seeing model
              if model_name not in get_mask_timings_by_model:
                  get_mask_timings_by_model[model_name] = []
                  commit_timings_by_model[model_name] = []
                  masks_by_model[model_name] = []
                  token_positions_by_model[model_name] = []

              timings = data["results"].get("get_mask_timings_seconds", [])
              get_mask_timings_by_model[model_name].append(timings)

              commit_timings = data["results"].get("commit_timings_seconds", [])
              commit_timings_by_model[model_name].append(commit_timings)

              masks_raw = data["results"].get("masks_ranges") or data["results"].get("masks_intervals")
              if masks_raw is None:
                  print(f"Warning: No masks present in {file_path}. Mask comparisons will be skipped for {model_name}.")
                  masks_by_model[model_name].append([])
              else:
                  masks_by_model[model_name].append([_normalize_intervals(r) for r in masks_raw])
              
              token_positions = data["results"].get("token_positions", [])
              token_positions_by_model[model_name].append(token_positions)

          if not get_mask_timings_by_model:
              print("No data to analyze.")
              return

          # --- Process repeated runs ---
          final_get_mask_timings: Dict[str, List[float]] = {}
          final_commit_timings: Dict[str, List[float]] = {}
          final_masks_by_model: Dict[str, List[Tuple[Tuple[int, int], ...]]] = {}
          final_token_positions_by_model: Dict[str, List[Tuple[int, int]]] = {}
          final_model_order: List[str] = []

          if agg_method:
              print(f"--- Aggregating results from multiple runs using '{agg_method}' ---")
              import numpy as np
              for model_name in model_order:
                  # Aggregate get_mask timings
                  runs = get_mask_timings_by_model.get(model_name, [])
                  if runs and any(r for r in runs):
                      max_len = max(len(r) for r in runs if r)
                      padded_runs = [r + ([np.nan] * (max_len - len(r))) for r in runs]
                      df_runs = pd.DataFrame(padded_runs).T
                      final_get_mask_timings[model_name] = df_runs.agg(agg_method, axis=1).dropna().tolist()
                  else:
                      final_get_mask_timings[model_name] = []

                  # Aggregate commit timings
                  runs_commit = commit_timings_by_model.get(model_name, [])
                  if runs_commit and any(r for r in runs_commit):
                      max_len_commit = max(len(r) for r in runs_commit if r)
                      padded_runs_commit = [r + ([np.nan] * (max_len_commit - len(r))) for r in runs_commit]
                      df_runs_commit = pd.DataFrame(padded_runs_commit).T
                      final_commit_timings[model_name] = df_runs_commit.agg(agg_method, axis=1).dropna().tolist()
                  else:
                      final_commit_timings[model_name] = []

                  # For masks, use the first run
                  mask_runs = masks_by_model.get(model_name, [])
                  if mask_runs:
                      final_masks_by_model[model_name] = mask_runs[0]
                      if len(mask_runs) > 1:
                          print(f"Info: For model '{model_name}', using masks from the first of {len(mask_runs)} runs for equivalence checks.")
                  else:
                      final_masks_by_model[model_name] = []
                  
                  # For token positions, use the first run
                  pos_runs = token_positions_by_model.get(model_name, [])
                  if pos_runs:
                      final_token_positions_by_model[model_name] = pos_runs[0]
                  else:
                      final_token_positions_by_model[model_name] = []

                  final_model_order.append(model_name)
          else:  # No aggregation, unpack runs
              for model_name in model_order:
                  num_runs = len(get_mask_timings_by_model.get(model_name, []))
                  if num_runs > 1:
                      for i in range(num_runs):
                          run_name = f"{model_name}_run{i+1}"
                          final_get_mask_timings[run_name] = get_mask_timings_by_model[model_name][i]
                          final_commit_timings[run_name] = commit_timings_by_model[model_name][i]
                          final_masks_by_model[run_name] = masks_by_model[model_name][i]
                          final_token_positions_by_model[run_name] = token_positions_by_model[model_name][i]
                          if model_name in id_to_token_by_model:
                              id_to_token_by_model[run_name] = id_to_token_by_model[model_name]
                          final_model_order.append(run_name)
                  elif num_runs == 1:
                      final_get_mask_timings[model_name] = get_mask_timings_by_model[model_name][0]
                      final_commit_timings[model_name] = commit_timings_by_model[model_name][0]
                      final_masks_by_model[model_name] = masks_by_model[model_name][0]
                      final_token_positions_by_model[model_name] = token_positions_by_model[model_name][0]
                      final_model_order.append(model_name)

          # Replace original data structures with the processed ones
          get_mask_timings_by_model = final_get_mask_timings
          commit_timings_by_model = final_commit_timings
          masks_by_model = final_masks_by_model
          token_positions_by_model = final_token_positions_by_model
          model_order = final_model_order

          # Determine baseline
          if baseline_key:
              # Allow either a composite model name or a path to a results file
              candidate = baseline_key
              path_candidate = Path(candidate)
              candidate_name = None
              if path_candidate.is_file():
                  try:
                      with open(path_candidate, 'r') as f:
                          d = json.load(f)
                      model_script = d.get("model_script") or d.get("competitor_script")
                      grammar_file = d.get("inputs", {}).get("grammar_file")
                      model_stem = Path(model_script).stem if model_script else path_candidate.stem
                      if grammar_file:
                          grammar_stem = Path(grammar_file).name.replace('.json.gz', '').replace('.json', '')
                          candidate_name = f"{model_stem}__{grammar_stem}"
                      else:
                          candidate_name = model_stem
                  except Exception as e:
                      print(f"Warning: Could not parse baseline file '{baseline_key}': {e}. Treating as a name.")
                      candidate_name = candidate
              else:
                  candidate_name = candidate

              if candidate_name not in masks_by_model:
                  print(f"Warning: Baseline '{baseline_key}' (resolved to '{candidate_name}') not found among models: {list(masks_by_model.keys())}. Using first available model.")
                  baseline_name = model_order[0]
              else:
                  baseline_name = candidate_name
          else:
              baseline_name = model_order[0]

          baseline_masks = masks_by_model.get(baseline_name, [])
          baseline_timings = get_mask_timings_by_model.get(baseline_name, [])
          print(f"Selected baseline: {baseline_name}")

          # Compute per-model mismatch indices against the baseline
          mismatch_indices_by_model: Dict[str, List[int]] = {}
          equivalent_by_model: Dict[str, bool] = {}
          vocab_printed_for_baseline: bool = False

          have_masks = all(len(v) > 0 for v in masks_by_model.values())

          for model_name, masks in masks_by_model.items():
              if not have_masks or not baseline_masks or not masks:
                  mismatch_indices_by_model[model_name] = []
                  equivalent_by_model[model_name] = True if model_name == baseline_name else False
                  continue

              # Get vocabs for baseline and current model
              baseline_vocab = id_to_token_by_model.get(baseline_name, {})
              current_vocab = id_to_token_by_model.get(model_name, {})

              length = min(len(baseline_masks), len(masks))
