      Why this is safe and effective
      - End-node safety: The NoOp compression pass never removes NoOp edges that target the template end node, ensuring the end remains reachable (the later cloning step relies on that). The dedup pass explicitly makes the template’s end node the canonical representative for its signature so that edges within the template continue to target that end node.
      - No cycles: Templates are DAGs; dedup does not introduce cycles because we only redirect edges to canonical nodes with identical (bottom-up) signatures. Since signatures are computed in sink-to-root order by unique children, we avoid self-looping scenarios.
      - Cross-template sharing: A global interner stores fingerprints to canonical nodes in the single shared arena, so later templates can reuse early-built subgraphs outright. Unreachable duplicates are acceptable since GC is intentionally disabled in this arena.
      - Stats reflection: You should see reduced node/edge counts per template due to intra-template dedup and NoOp flattening. Additionally, the debug log prints the interner’s counters (inserted/reused/merged), giving a view into shared structure across templates. The final arena size before precompute3’s path processing should shrink materially.

      Verification tips
      - Rebuild and run with debug level 2 or 3 enabled to see the intermediate stats and the interner counters. Look for decreased per-template “Nodes” and “Edges” (especially on large templates like '}' or 'IDENTIFIER'), and for non-zero merged/reused counts in the template optimizer logs.
      - The final Trie3 should be smaller and faster to produce due to reduced intermediate graph size and less duplication.
