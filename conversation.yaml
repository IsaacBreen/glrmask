                                      if prev is None or llm_mask is None:
                                          by_dest[dest_idx] = None
                                      else:
                                          by_dest[dest_idx] = prev.union(llm_mask)

                  # Convert accumulators into compact runtime structures
                  groups: Dict[int, _PopGroup] = {}
