          fn test_dense_dense_edge_cases() {
              // Empty sets
              let mut d1 = HybridBitset::new(); d1.ensure_dense();
              let mut d2 = HybridBitset::new(); d2.ensure_dense();
              let d3 = HybridBitset::from_iter(0..SPARSE_TO_DENSE_THRESHOLD); // Non-empty dense

