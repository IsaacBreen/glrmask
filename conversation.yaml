      +/// Finds the longest path (in terms of number of nodes) ending at one of the given root nodes.
      +/// Traverses backwards through predecessors. Handles shared nodes using memoization.
      +/// Returns the sequence of values (T) along the longest path found, starting from the deepest node.
      +pub fn find_longest_gss_path<T: Clone>(roots: &[Arc<GSSNode<T>>]) -> Option<Vec<T>> {
      +    if roots.is_empty() {
      +        return None;
      +    }
      +
      +    // Memoization: Node Ptr -> (Length of longest path ending here, Predecessor that achieves this length)
      +    let mut memo: HashMap<*const GSSNode<T>, (usize, Option<Arc<GSSNode<T>>>)> = HashMap::new();
      +
      +    fn find_longest_recursive<T: Clone>(
      +        node_arc: &Arc<GSSNode<T>>,
      +        memo: &mut HashMap<*const GSSNode<T>, (usize, Option<Arc<GSSNode<T>>>)>,
      +    ) -> (usize, Option<Arc<GSSNode<T>>>) {
      +        let node_ptr = Arc::as_ptr(node_arc);
      +        if let Some(cached) = memo.get(&node_ptr) {
      +            return cached.clone();
      +        }
      +
      +        if node_arc.predecessors.is_empty() {
      +            let result = (1, None);
      +            memo.insert(node_ptr, result.clone());
      +            return result;
      +        }
      +
      +        let mut max_len = 0;
      +        let mut best_pred: Option<Arc<GSSNode<T>>> = None;
      +
      +        for pred_arc in &node_arc.predecessors {
      +            let (pred_len, _) = find_longest_recursive(pred_arc, memo);
      +            if pred_len > max_len {
      +                max_len = pred_len;
      +                best_pred = Some(pred_arc.clone());
      +            }
      +        }
      +
      +        let result = (1 + max_len, best_pred);
      +        memo.insert(node_ptr, result.clone());
      +        result
      +    }
      +
      +    // Run DFS from all roots to populate memo
      +    let mut max_root_len = 0;
      +    let mut start_node: Option<Arc<GSSNode<T>>> = None;
      +    for root_arc in roots {
      +        let (len, _) = find_longest_recursive(root_arc, &mut memo);
      +        if len > max_root_len {
      +            max_root_len = len;
      +            start_node = Some(root_arc.clone());
      +        }
      +    }
      +
      +    // Reconstruct the path by backtracking from the start_node
      +    let mut path = Vec::new();
      +    let mut current_node_opt = start_node;
      +    while let Some(current_node) = current_node_opt {
      +        path.push(current_node.value.clone());
      +        let node_ptr = Arc::as_ptr(&current_node);
      +        // Get the predecessor from the memo that led to the longest path
      +        current_node_opt = memo.get(&node_ptr).and_then(|(_, pred_opt)| pred_opt.clone());
      +    }
      +
      +    // The path is constructed backwards, so reverse it
      +    path.reverse();
      +    Some(path)
      +}

