          fn internal_bv_to_original_with_map(
              &self,
              internal_bv: &LLMTokenBV,
              internal_to_original: &BTreeMap<usize, LLMTokenBV>,
              _internal_max_llm_token: usize,
          ) -> LLMTokenBV {
              let mut original_bv = HybridBitset::zeros();
              if internal_bv.is_all() {
                  // Fast path for "all tokens"
                  for bv in internal_to_original.values() {
                      original_bv |= bv;
                  }
              } else {
                  for i in internal_bv.iter() {
                      if let Some(bv) = internal_to_original.get(&i) {
                          original_bv |= bv;
                      }
                  }
              }
              original_bv
          }

          fn original_bv_to_internal_with_map(
              &self,
              original_bv: &LLMTokenBV,
              original_to_internal: &BTreeMap<usize, usize>,
              _original_max_llm_token: usize,
          ) -> LLMTokenBV {
              let mut internal_bv = HybridBitset::zeros();
              if original_bv.is_all() {
                  // Fast path for "all tokens"
                  for &internal_id in original_to_internal.values() {
                      internal_bv.insert(internal_id);
                  }
              } else {
                  for i in original_bv.iter() {
                      if let Some(&internal_id) = original_to_internal.get(&i) {
                          internal_bv.insert(internal_id);
                      }
                  }
              }
              internal_bv
          }

          fn compute_possible_matches_for_vocab_node(
              tokenizer: &Regex,
              vocab_node: &VocabPrefixTreeNode,
              tokenizer_state_id: TokenizerStateID,
              cache: &mut HashMap<
                  (*const VocabPrefixTreeNode, TokenizerStateID),
                  BTreeMap<GrammarTokenID, LLMTokenBV>,
              >,
          ) -> BTreeMap<GrammarTokenID, LLMTokenBV> {
              let cache_key = (vocab_node as *const VocabPrefixTreeNode, tokenizer_state_id);
              if let Some(cached_result) = cache.get(&cache_key) {
                  return cached_result.clone();
              }

              let mut result_map: BTreeMap<GrammarTokenID, LLMTokenBV> = BTreeMap::new();

              for (segment_bytes, child_vocab_arc) in vocab_node.iter_children() {
                  let child_vocab_node_ref = child_vocab_arc; // Get &VocabPrefixTreeNode
                  let exec_result =
                      tokenizer.execute_from_state(&segment_bytes, tokenizer_state_id);

                  for token_match in &exec_result.matches {
                      let grammar_token_id = GrammarTokenID(token_match.id);
                      // LLM tokens reachable under child_vocab_node_ref are those that start with segment_bytes
                      let applicable_tokens_rangeset =
                          child_vocab_node_ref.reachable_token_ids();
                      result_map
                          .entry(grammar_token_id)
                          .or_insert_with(LLMTokenBV::zeros)
                          .extend(applicable_tokens_rangeset.iter());
                  }

                  if let Some(final_state_val) = exec_result.end_state {
                      let final_tokenizer_state_id = TokenizerStateID(final_state_val);

                      let matches_possible_from_new_tokenizer_state: BTreeSet<_> =
                          tokenizer
                              .tokens_accessible_from_state(final_tokenizer_state_id)
                              .into_iter()
                              .collect();

                      let matches_from_current_segment: BTreeSet<_> = exec_result
                          .matches
                          .iter()
                          .map(|m| GrammarTokenID(m.id))
                          .collect();

                      let new_grammar_tokens_to_look_for =
                          &matches_possible_from_new_tokenizer_state
                              - &matches_from_current_segment;

                      if !new_grammar_tokens_to_look_for.is_empty() {
                          let next_results = Self::compute_possible_matches_for_vocab_node(
                              tokenizer,
                              child_vocab_node_ref, // Recurse with the child node
                              final_tokenizer_state_id,
                              cache,
                          );
                          for (token, bv) in next_results {
                              *result_map
                                  .entry(token)
                                  .or_insert_with(LLMTokenBV::zeros) |= bv;
                          }
                      }
                  }
              }
              cache.insert(cache_key, result_map.clone());
              result_map
          }

          pub fn print_gss_nodes(
              &self,
              roots: &Vec<Arc<GSSNode>>,
              labels: Option<&[String]>,
          ) {
              let config = GSSPrintConfig {
                  labels,
                  max_edges: 500,
                  original_internal_bimap: None,
                  llm_token_map: Some(&self.llm_vocab.llm_token_map),
                  verbose: false,
              };

              let (gss_str, _state_ids) =
                  print_gss_forest(roots, &self.parser.terminal_map, &config);
              println!("{}", gss_str);
          }
      }

      pub(crate) struct Precomputer0<'r> {
          pub(crate) tokenizer: &'r Regex,
          pub(crate) parser: Option<&'r GLRParser>,
          pub(crate) llm_vocab: Option<Arc<LLMVocab>>,
          pub(crate) vocab: VocabPrefixTree,
          pub(crate) roots: BTreeMap<TokenizerStateID, PrecomputeNode0Index>,
          pub(crate) possible_matches: RefCell<
              BTreeMap<
                  *const VocabPrefixTreeNode,
                  BTreeMap<TokenizerStateID, BTreeMap<GrammarTokenID, LLMTokenBV>>,
              >,
          >,
          pub(crate) all_llm_tokens: HybridBitset,
          pub(crate) merge_threshold: usize,
          pub(crate) pb: ProgressBar,
          pub(crate) stats: PrecomputeStats,
          pub(crate) terminal_follow_map:
              &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          pub(crate) ignore_terminal_id: Option<TerminalID>,
          pub(crate) token_name_map: &'r BiBTreeMap<Terminal, usize>,
          // One end node per final tokenizer state.
          pub(crate) end_nodes: BTreeMap<TokenizerStateID, PrecomputeNode0Index>,
          pub(crate) trie0_god: Trie0GodWrapper,
      }

      pub(crate) struct Precomputer1<'r> {
          pub(crate) tokenizer: &'r Regex,
          pub(crate) parser: Option<&'r GLRParser>,
          pub(crate) llm_vocab: Option<Arc<LLMVocab>>,
          pub(crate) vocab: VocabPrefixTree, // This will be moved out during dfs
          pub(crate) roots: BTreeMap<TokenizerStateID, TempPrecomputeNode1Index>,
          pub(crate) possible_matches: RefCell<
              BTreeMap<
                  *const VocabPrefixTreeNode,
                  BTreeMap<TokenizerStateID, BTreeMap<GrammarTokenID, LLMTokenBV>>,
              >,
          >,
          pub(crate) all_llm_tokens: RangeSetBlaze<usize>,
          pub(crate) merge_threshold: usize,
          pub(crate) pb: ProgressBar,
          pub(crate) stats: PrecomputeStats,
          pub(crate) terminal_follow_map:
              &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          pub(crate) ignore_terminal_id: Option<TerminalID>,
          pub(crate) token_name_map: &'r BiBTreeMap<Terminal, usize>,
          pub(crate) leaf_node: TempPrecomputeNode1Index,
          pub(crate) dfs_stats: DfsStats,
          pub(crate) trie1_god: TempTrie1GodWrapper,
          pub(crate) original_to_dummy_map: BTreeMap<TerminalID, TerminalID>,
      }

      impl<'r> Precomputer0<'r> {}
      impl<'r> Precomputer1<'r> {
          fn new(
              tokenizer: &'r Regex,
              parser: Option<&'r GLRParser>,
              llm_vocab: Option<Arc<LLMVocab>>,
              internal_llm_token_map: &BiBTreeMap<Vec<u8>, LLMTokenID>,
              internal_max_llm_token: usize,
              merge_threshold: usize,
              terminal_follow_map: &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
              ignore_terminal_id: Option<TerminalID>,
              token_name_map: &'r BiBTreeMap<Terminal, usize>,
              original_to_dummy_map: BTreeMap<TerminalID, TerminalID>,
          ) -> Self {
              let tokens: Vec<(usize, Vec<u8>)> = internal_llm_token_map
                  .iter()
                  .map(|(bytes, id)| (id.0 as usize, bytes.clone()))
                  .collect();

              crate::debug!(2, "Building vocab prefix tree");
              let vocab = VocabPrefixTree::build(&tokens);
              crate::debug!(2, "Done building vocab prefix tree");

              let mut roots = BTreeMap::new();
              let trie1_god = TempTrie1GodWrapper::new();
              for sid in tokenizer.iter_states() {
                  roots.insert(
                      sid,
                      TempPrecomputeNode1Index::new(trie1_god.insert(
                          TempPrecomputeNode1::new(
                              TempPrecomputedNodeContents::root(internal_max_llm_token),
                          ),
                      )),
                  );
              }
              crate::debug!(
                  2,
                  "Created trie1 roots for {} tokenizer states",
                  tokenizer.iter_states().count()
              );

              crate::debug!(2, "Counting vocab nodes for progress bar...");
              let total_nodes = count_vocab_nodes(&vocab.root);
              crate::debug!(2, "Counted {} vocab nodes", total_nodes);
              let pb = ProgressBar::new(total_nodes);
              pb.set_style(
                  ProgressStyle::default_bar()
                      .template(
                          "{spinner:.green} [{elapsed_precise}] \
                                 [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta})",
                      )
                      .expect("progress-bar"),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb.set_draw_target(ProgressDrawTarget::hidden());
              }

              let leaf_node = TempPrecomputeNode1Index::new(trie1_god.insert(
                  TempPrecomputeNode1::new(TempPrecomputedNodeContents::leaf()),
              ));
              crate::debug!(2, "Created trie1 leaf node");

              Self {
                  tokenizer,
                  parser,
                  llm_vocab,
                  vocab,
                  roots,
                  possible_matches: RefCell::new(BTreeMap::new()), // This is for grammar tokens, not LLM tokens
                  all_llm_tokens: RangeSetBlaze::from_iter(0..=internal_max_llm_token),
                  merge_threshold,
                  pb,
                  stats: PrecomputeStats::default(),
                  terminal_follow_map,
                  ignore_terminal_id,
                  token_name_map,
                  leaf_node,
                  dfs_stats: DfsStats::default(),
                  trie1_god,
                  original_to_dummy_map,
              }
          }

          fn get_leaf_node(&self) -> TempPrecomputeNode1Index {
              self.leaf_node.clone()
          }

          fn finish(self) -> (BTreeMap<TokenizerStateID, PrecomputeNode1Index>, Trie1GodWrapper)
          {
              let final_trie1_god = Trie1GodWrapper::new();
              let mut final_roots = BTreeMap::new();
              let mut node_map: HashMap<
                  TempPrecomputeNode1Index,
                  PrecomputeNode1Index,
              > = HashMap::new();

              for (sid, temp_root) in &self.roots {
                  let final_root = self.convert_trie1_recursive(
                      *temp_root,
                      &self.trie1_god,
                      &final_trie1_god,
                      &mut node_map,
                  );
                  final_roots.insert(*sid, final_root);
              }

              (final_roots, final_trie1_god)
          }

          fn convert_trie1_recursive(
              &self,
              temp_idx: TempPrecomputeNode1Index,
              temp_god: &TempTrie1GodWrapper,
              final_god: &Trie1GodWrapper,
              node_map: &mut HashMap<TempPrecomputeNode1Index, PrecomputeNode1Index>,
          ) -> PrecomputeNode1Index {
              if let Some(final_idx) = node_map.get(&temp_idx) {
                  return *final_idx;
              }

              let temp_guard = temp_idx.read(temp_god).unwrap();
              let final_node_contents = PrecomputedNodeContents {
                  end: temp_guard.value.end,
                  live_tokens: HybridBitset {
                      inner: crate::datastructures::cache::intern_l1(
                          temp_guard.value.live_tokens.clone(),
                      ),
                  },
              };
              let new_node = PrecomputeNode1::new(final_node_contents);
              let final_idx = PrecomputeNode1Index::new(final_god.insert(new_node));
              node_map.insert(temp_idx, final_idx);

              let children_to_copy = temp_guard.children().clone();
              drop(temp_guard);

              if self.original_to_dummy_map.is_empty() {
                  for (ek, dest_map) in children_to_copy {
                      for (temp_child_idx, rs_blaze) in dest_map {
                          let final_child_idx = self.convert_trie1_recursive(
                              temp_child_idx,
                              temp_god,
                              final_god,
                              node_map,
                          );
                          let hybrid_bitset = HybridBitset {
                              inner: crate::datastructures::cache::intern_l1(rs_blaze),
                          };
                          final_god.insert_edge_simple(
                              final_idx,
                              final_child_idx,
                              ek.clone(),
                              hybrid_bitset,
                          );
                      }
                  }
              } else {
                  let mut direct_edges = Vec::new();
                  // Group injected edges by their dummy terminal ID.
                  let mut injected_edges_by_dummy: BTreeMap<
                      TerminalID,
                      Vec<(
                          Option<TerminalID>,
                          OrderedHashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>>,
                      )>,
                  > = BTreeMap::new();

                  for (ek, dest_map) in children_to_copy {
                      if let Some(tid) = ek {
                          if let Some(dummy_tid) =
                              self.original_to_dummy_map.get(&tid)
                          {
                              injected_edges_by_dummy
                                  .entry(*dummy_tid)
                                  .or_default()
                                  .push((Some(tid), dest_map));
                              continue;
                          }
                      }
                      direct_edges.push((ek, dest_map));
                  }

                  for (ek, dest_map) in direct_edges {
                      for (temp_child_idx, rs_blaze) in dest_map {
                          let final_child_idx = self.convert_trie1_recursive(
                              temp_child_idx,
                              temp_god,
                              final_god,
                              node_map,
                          );
                          let hybrid_bitset = HybridBitset {
                              inner: crate::datastructures::cache::intern_l1(rs_blaze),
                          };
                          final_god.insert_edge_simple(
                              final_idx,
                              final_child_idx,
                              ek.clone(),
                              hybrid_bitset,
                          );
                      }
                  }

                  for (dummy_tid, edges) in injected_edges_by_dummy {
                      let inter_node =
                          PrecomputeNode1::new(PrecomputedNodeContents::internal());
                      let inter_idx =
                          PrecomputeNode1Index::new(final_god.insert(inter_node));
                      let mut total_inter_bitset = HybridBitset::zeros();

                      for (original_ek, dest_map) in edges {
                          for (temp_child_idx, rs_blaze) in dest_map {
                              let final_child_idx = self.convert_trie1_recursive(
                                  temp_child_idx,
                                  temp_god,
                                  final_god,
                                  node_map,
                              );
                              let hybrid_bitset = HybridBitset {
                                  inner: crate::datastructures::cache::intern_l1(
                                      rs_blaze,
                                  ),
                              };
                              total_inter_bitset |= &hybrid_bitset;
                              final_god.insert_edge_simple(
                                  inter_idx,
                                  final_child_idx,
                                  original_ek,
                                  hybrid_bitset,
                              );
                          }
                      }
                      final_god.insert_edge_simple(
                          final_idx,
                          inter_idx,
                          Some(dummy_tid),
                          total_inter_bitset,
                      );
                  }
              }

              final_idx
          }

          fn possible_matches(
              &self,
              vocab_node: &VocabPrefixTreeNode,
              tokenizer_state_id: TokenizerStateID,
          ) -> BTreeMap<GrammarTokenID, LLMTokenBV> {
              let cache_key_ptr = vocab_node as *const VocabPrefixTreeNode;

              if let Some(cached_for_vocab_node) =
                  self.possible_matches.borrow().get(&cache_key_ptr)
              {
                  if let Some(cached_result) =
                      cached_for_vocab_node.get(&tokenizer_state_id)
                  {
                      return cached_result.clone();
                  }
              }

              let mut result_map: BTreeMap<GrammarTokenID, LLMTokenBV> = BTreeMap::new();

              for (segment_bytes, child_vocab_node) in vocab_node.iter_children() {
                  let exec_result =
                      self.tokenizer.execute_from_state(&segment_bytes, tokenizer_state_id);
                  for token in &exec_result.matches {
                      let grammar_token_id = GrammarTokenID(token.id);
                      let applicable_tokens = child_vocab_node.reachable_token_ids();
                      *result_map
                          .entry(grammar_token_id)
                          .or_insert_with(LLMTokenBV::zeros) |=
                          HybridBitset::from(applicable_tokens);
                  }
                  if let Some(final_state_val) = exec_result.end_state {
                      let matches_possible_from_tokenizer_state: BTreeSet<_> = self
                          .tokenizer
                          .tokens_accessible_from_state(TokenizerStateID(final_state_val))
                          .into_iter()
                          .collect();
                      let matches_here: BTreeSet<_> = exec_result
                          .matches
                          .iter()
                          .map(|m| GrammarTokenID(m.id))
                          .collect();
                      let possible_new_matches =
                          &matches_possible_from_tokenizer_state - &matches_here;
                      if !possible_new_matches.is_empty() {
                          let next_results = self.possible_matches(
                              child_vocab_node,
                              TokenizerStateID(final_state_val),
                          );
                          for (token, bv) in next_results {
                              *result_map
                                  .entry(token)
                                  .or_insert_with(LLMTokenBV::zeros) |= bv;
                          }
                      }
                  }
              }

              self.possible_matches.borrow_mut().entry(cache_key_ptr).or_default().insert(tokenizer_state_id, result_map.clone());

              result_map
          }

          fn run_dfs(
              &mut self,
          ) {
              let mut assoc: BTreeMap<
                  TokenizerStateID,
                  HashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>>,
              > = BTreeMap::new();

              for (sid, arc) in &self.roots {
                  assoc
                      .entry(*sid)
                      .or_default()
                      .insert(arc.clone(), self.all_llm_tokens.clone());
              }

              crate::debug!(2, "Starting precompute DFS");
              crate::debug!(6, "Roots for each tokenizer state:");
              for (sid, root) in &self.roots {
                  crate::debug!(6, "  {}: {}", sid.0, root);
              }
              crate::profiler::reset();
              // Temporarily move vocab out of self to satisfy the borrow checker.
              let vocab = std::mem::replace(&mut self.vocab, VocabPrefixTree::new());
              self.dfs(&vocab.root, assoc);
              self.vocab = vocab; // Move it back.
              self.dfs_stats.print();
              crate::debug!(2, "Finished precompute DFS");
              self.pb.finish();
              crate::profiler::print_summary();
              crate::debug!(2, "Precomputation complete");
          }

          fn dfs(
              &mut self,
              vocab_node: &VocabPrefixTreeNode,
              assoc_by_state: BTreeMap<
                  TokenizerStateID,
                  HashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>>,
              >,
          ) {
              self.pb.inc(1);
              for (segment_bytes, child_vocab_node) in vocab_node.iter_children() {
                  let mut work_queue: BTreeMap<
                      usize,
                      BTreeMap<
                          TokenizerStateID,
                          HashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>>,
                      >,
                  > = BTreeMap::new();
                  work_queue.insert(0, assoc_by_state.clone());

                  let mut next_level_assoc: BTreeMap<_, HashMap<_, _>> = BTreeMap::new();

                  // === OPTIMIZATION 1: Cache node data to avoid repeated lock acquisitions ===
                  let mut node_cache: HashMap<
                      TempPrecomputeNode1Index,
                      (RangeSetBlaze<usize>, bool),
                  > = HashMap::new();
                  let get_node_data = |cache: &mut HashMap<_, _>,
                                       idx: TempPrecomputeNode1Index,
                                       god: &TempTrie1GodWrapper| {
                      cache
                          .entry(idx)
                          .or_insert_with(|| {
                              let guard = idx.read(god).unwrap();
                              (guard.value.live_tokens.clone(), guard.value.end)
                          })
                          .clone()
                  };

                  // === OPTIMIZATION 2: Batch all edge insertions and updates ===
                  let mut pending_edges: Vec<(
                      TempPrecomputeNode1Index,
                      TempPrecomputeNode1Index,
                      Option<GrammarTokenID>,
                      RangeSetBlaze<usize>,
                  )> = Vec::new();
                  let mut pending_live_token_updates: HashMap<
                      TempPrecomputeNode1Index,
                      RangeSetBlaze<usize>,
                  > = HashMap::new();

                  // === OPTIMIZATION 3: Pre-compute child_vocab reachable tokens (used frequently) ===
                  let child_reachable = child_vocab_node.reachable_token_ids();
                  let child_token_id = child_vocab_node.token_id();

                  // === OPTIMIZATION 4: Pre-compute possible_matches_at_end for all states we might need ===
                  let mut possible_matches_cache: HashMap<
                      TokenizerStateID,
                      BTreeMap<GrammarTokenID, LLMTokenBV>,
                  > = HashMap::new();

                  while let Some((pos, states_at_pos)) = work_queue.pop_first() {
                      if pos == segment_bytes.len() {
                          for (tokenizer_state_id, nodes_with_tokens) in states_at_pos
                          {
                              let entry =
                                  next_level_assoc.entry(tokenizer_state_id).or_default();
                              for (node, tokens) in nodes_with_tokens {
                                  entry
                                      .entry(node)
                                      .or_insert_with(RangeSetBlaze::new)
                                      .bitor_assign(&tokens);
                              }
                          }
                          continue;
                      }

                      for (tokenizer_state_id, precompute_nodes_with_tokens) in
                          states_at_pos
                      {
                          let exec_result = self
                              .tokenizer
                              .execute_from_state(&segment_bytes[pos..], tokenizer_state_id);

                          let possible_matches_at_end =
                              if let Some(end_state_val) = exec_result.end_state {
                                  let ts = TokenizerStateID(end_state_val);
                                  possible_matches_cache
                                      .entry(ts)
                                      .or_insert_with(|| {
                                          self.possible_matches(child_vocab_node, ts)
                                      })
                              } else {
                                  &BTreeMap::new()
                              };

                          for match_info in &exec_result.matches {
                              let terminal_id = GrammarTokenID(match_info.id);
                              let next_pos = pos + match_info.width;

                              for (src_node_wrapper, src_contextual_tokens) in
                                  &precompute_nodes_with_tokens
                              {
                                  let src_node_idx = *src_node_wrapper;

                                  // Use cache instead of repeated reads
                                  let (src_live_tokens, _) =
                                      get_node_data(&mut node_cache, src_node_idx, &self.trie1_god);

                                  // Handle exact end-of-segment match
                                  if next_pos == segment_bytes.len() {
                                      let mut edge_bv = RangeSetBlaze::new();
                                      edge_bv.insert(child_token_id);
                                      let final_edge_bv = &(&edge_bv & src_contextual_tokens)
                                          & &src_live_tokens;

                                      if !final_edge_bv.is_empty() {
                                          let end_idx = self.get_leaf_node();
                                          pending_edges.push((
                                              src_node_idx,
                                              end_idx,
                                              Some(terminal_id),
                                              final_edge_bv.clone(),
                                          ));
                                          pending_live_token_updates
                                              .entry(end_idx)
                                              .or_insert_with(RangeSetBlaze::new)
                                              .bitor_assign(&final_edge_bv);
                                      }
                                  }

                                  // Compute edge_bv once
                                  let mut edge_bv = child_reachable.clone();
                                  if next_pos == segment_bytes.len() {
                                      edge_bv.remove(child_token_id);
                                  }
                                  if let Some(matches_for_terminal) =
                                      possible_matches_at_end.get(&terminal_id)
                                  {
                                      edge_bv =
                                          &edge_bv - matches_for_terminal.inner.as_ref();
                                  }

                                  let edge_bv_for_inserter =
                                      &(&edge_bv & src_contextual_tokens) & &src_live_tokens;
                                  if edge_bv_for_inserter.is_empty() {
                                      continue;
                                  }

                                  let next_tokenizer_state =
                                      self.tokenizer.initial_state_id();
                                  let dest_nodes_in_queue = work_queue
                                      .entry(next_pos)
                                      .or_default()
                                      .entry(next_tokenizer_state)
                                      .or_default();

                                  // Find or create destination node
                                  let mut dest_node_opt = dest_nodes_in_queue
                                      .iter()
                                      .filter_map(
                                          |(dest_node, dest_contextual_tokens)| {
                                              let (dest_live_tokens, is_end) =
                                                  get_node_data(
                                                      &mut node_cache,
                                                      *dest_node,
                                                      &self.trie1_god,
                                                  );
                                              if is_end {
                                                  return None;
                                              }

                                              let risky_tokens =
                                                  &edge_bv_for_inserter - dest_contextual_tokens;
                                              if risky_tokens.is_empty()
                                                  || (&risky_tokens
                                                      & &dest_live_tokens)
                                                      .is_empty()
                                              {
                                                  Some(*dest_node)
                                              } else {
                                                  None
                                              }
                                          },
                                      )
                                      .next();

                                  if dest_node_opt.is_none() {
                                      // Check existing children - read once
                                      let children_of_src: Vec<
                                          TempPrecomputeNode1Index,
                                      > = {
                                          let guard =
                                              src_node_idx.read(&self.trie1_god).unwrap();
                                          guard
                                              .children()
                                              .values()
                                              .flat_map(|m| m.keys().cloned())
                                              .collect()
                                      };

                                      dest_node_opt = children_of_src
                                          .iter()
                                          .filter(|child_arc| {
                                              let (child_live_tokens, is_end) =
                                                  get_node_data(
                                                      &mut node_cache,
                                                      **child_arc,
                                                      &self.trie1_god,
                                                  );
                                              !is_end
                                                  && (&child_live_tokens
                                                      & &edge_bv_for_inserter)
                                                      .is_empty()
                                          })
                                          .copied()
                                          .next();
                                  }

                                  let result_node = dest_node_opt.unwrap_or_else(|| {
                                      let new_node = TempPrecomputeNode1::new(
                                          TempPrecomputedNodeContents::internal(),
                                      );
                                      let idx = TempPrecomputeNode1Index::new(
                                          self.trie1_god.insert(new_node),
                                      );
                                      node_cache.insert(
                                          idx,
                                          (RangeSetBlaze::new(), false),
                                      );
                                      idx
                                  });

                                  pending_edges.push((
                                      src_node_idx,
                                      result_node,
                                      Some(terminal_id),
                                      edge_bv_for_inserter.clone(),
                                  ));
                                  pending_live_token_updates
                                      .entry(result_node)
                                      .or_insert_with(RangeSetBlaze::new)
                                      .bitor_assign(&edge_bv_for_inserter);

                                  // Update cache
                                  node_cache
                                      .entry(result_node)
                                      .and_modify(|(live, _)| {
                                          *live |= &edge_bv_for_inserter
                                      });

                                  dest_nodes_in_queue
                                      .entry(result_node)
                                      .or_insert_with(RangeSetBlaze::new)
                                      .bitor_assign(&edge_bv_for_inserter);
                              }
                          }

                          // Handle continuation state
                          if let Some(end_state_val) = exec_result.end_state {
                              let final_tokenizer_state =
                                  TokenizerStateID(end_state_val);
                              let accessible_terminals = self
                                  .tokenizer
                                  .tokens_accessible_from_state(final_tokenizer_state);

                              for (src_node_wrapper, src_contextual_tokens) in
                                  &precompute_nodes_with_tokens
                              {
                                  let mut edge_bv = RangeSetBlaze::new();
                                  edge_bv.insert(child_token_id);
                                  let edge_bv_for_inserter =
                                      &edge_bv & src_contextual_tokens;
                                  if edge_bv_for_inserter.is_empty() {
                                      continue;
                                  }

                                  let src_node_idx = *src_node_wrapper;
                                  let (src_live_tokens, _) =
                                      get_node_data(&mut node_cache, src_node_idx, &self.trie1_god);
                                  let final_edge_bv =
                                      &edge_bv_for_inserter & &src_live_tokens;

                                  if !final_edge_bv.is_empty() {
                                      let end_idx = self.get_leaf_node();
                                      for terminal_id in &accessible_terminals {
                                          pending_edges.push((
                                              src_node_idx,
                                              end_idx,
                                              Some(*terminal_id),
                                              final_edge_bv.clone(),
                                          ));
                                          pending_live_token_updates
                                              .entry(end_idx)
                                              .or_insert_with(RangeSetBlaze::new)
                                              .bitor_assign(&final_edge_bv);
                                      }
                                  }
                              }

                              let entry =
                                  next_level_assoc.entry(final_tokenizer_state).or_default();
                              for (node, tokens) in precompute_nodes_with_tokens {
                                  entry
                                      .entry(node)
                                      .or_default()
                                      .bitor_assign(&tokens);
                              }
                          }
                      }
                  }

                  // === OPTIMIZATION 5: Batch write all edges and updates ===
                  for (src, dst, key, bv) in pending_edges {
                      self.trie1_god.insert_edge_simple(src, dst, key, bv);
                  }

                  for (node_idx, live_tokens) in pending_live_token_updates {
                      if let Some(mut guard) = node_idx.write(&self.trie1_god) {
                          guard.value.live_tokens |= &live_tokens;
                      }
                  }

                  if !next_level_assoc.is_empty() {
                      self.dfs(child_vocab_node, next_level_assoc);
                  }
              }
          }
      }

      fn count_vocab_nodes(node: &VocabPrefixTreeNode) -> u64 {
          1 + node
              .children()
              .values()
              .map(|c| count_vocab_nodes(c))
              .sum::<u64>()
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
          stack_state_id: StateID,
      }

      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }

      impl<K, V> InsertWith<K, V> for BTreeMap<K, V>
      where
          K: Eq + Ord,
      {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F) {
              match self.entry(k) {
                  std::collections::btree_map::Entry::Occupied(mut occupied) => {
                      let value = occupied.get_mut();
                      combine(value, v);
                  }
                  std::collections::btree_map::Entry::Vacant(vacant) => {
                      vacant.insert(v);
                  }
              }
          }
      }

      fn format_bv(bv: &LLMTokenBV) -> String {
          if bv.is_empty() {
              "[]".to_string()
          } else if *bv == HybridBitset::max_ones() {
              "[ALL]".to_string()
          } else {
              format!("[len={}]", bv.len())
          }
      }

      #[derive(Debug, Clone)]
      pub struct GrammarConstraintState<'a> {
          pub parent: &'a GrammarConstraint,
          pub state: BTreeMap<TokenizerStateID, GLRParserState<'a>>,
      }

      #[derive(Default, Clone)]
      struct TokenAcc {
          small: Vec<usize>,
          big: Vec<RangeSetBlaze<usize>>,
      }

      impl TokenAcc {
          fn add_token(&mut self, token: usize) {
              self.small.push(token);
          }

          fn add_bitset(&mut self, bitset: RangeSetBlaze<usize>) {
              if bitset.is_empty() {
                  return;
              }
              if bitset.len() == 1 {
                  self.small.push(bitset.iter().next().unwrap());
              } else {
                  self.big.push(bitset);
              }
          }

          fn len(&self) -> usize {
              self.small.len() + self.big.len()
          }
      }

      pub type Trie0GodWrapper = GodWrapper<
          Option<(TerminalID, Option<TokenizerStateID>)>,
          HybridBitset,
          PrecomputedNodeContents0,
      >;
      pub type Trie0God =
          God<Option<(TerminalID, Option<TokenizerStateID>)>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie1GodWrapper =
          GodWrapper<Option<TerminalID>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie1God =
          God<Option<TerminalID>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie2GodWrapper =
          GodWrapper<(usize, Option<StateID>), HybridBitset, PrecomputedNodeContents>;
      pub type Trie2God =
          God<(usize, Option<StateID>), HybridBitset, PrecomputedNodeContents>;
      pub type Trie3GodWrapper =
          GodWrapper<(isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents>;
      pub type Trie3God =
          God<(isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents>;

      impl<'a> PartialEq for GrammarConstraintState<'a> {
          fn eq(&self, other: &Self) -> bool {
              // Compare parent by pointer to ensure they originate from the same constraint object.
              std::ptr::eq(self.parent, other.parent) && self.state == other.state
          }
      }

      impl<'a> Eq for GrammarConstraintState<'a> {}

      impl<'a> Display for GrammarConstraintState<'a> {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(
                  f,
                  "GrammarConstraintState ({} active tokenizer states):",
                  self.state.len()
              )?;
              if self.state.is_empty() {
                  return Ok(());
              }

              let mut gss_roots = Vec::new();
              let mut tokenizer_state_info = Vec::new();

              for (tokenizer_state_id, glr_state) in &self.state {
                  if !glr_state.active_state.stack.is_empty() {
                      gss_roots.push(glr_state.active_state.stack.clone());
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: GSS Root ({} predecessors)",
                          tokenizer_state_id.0,
                          glr_state.active_state.stack.num_predecessors()
                      ));
                  } else {
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: (Empty GSS)",
                          tokenizer_state_id.0
                      ));
                  }
              }

              for info in tokenizer_state_info {
                  writeln!(f, "{}", info)?;
              }

              if !gss_roots.is_empty() {
                  writeln!(f, "\nCombined GSS Forest (showing up to 50 nodes):")?;
                  let config = GSSPrintConfig {
                      labels: None,
                      max_edges: 50,
                      original_internal_bimap: None,
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  let (gss_str, _) =
                      print_gss_forest(&gss_roots, &self.parent.parser.terminal_map, &config);
                  write!(f, "{}", gss_str)?;
              }

              Ok(())
          }
      }

      impl<'a> GrammarConstraintState<'a> {
          fn transform_gss_stacks<M, F>(&mut self, mut f: F)
          where
              M: Default,
              F: FnMut(&mut Arc<GSSNode>, &mut M),
          {
              let mut memo = M::default();
              for s in self.state.values_mut() {
                  f(&mut s.active_state.stack, &mut memo);
              }
          }

          fn map_gss_stacks<M, F>(&mut self, mut f: F)
          where
              M: Default,
              F: FnMut(&mut Arc<GSSNode>, &mut M) -> Arc<GSSNode>,
          {
              let mut memo = M::default();
              for s in self.state.values_mut() {
                  s.active_state.stack = f(&mut s.active_state.stack, &mut memo);
              }
          }

          pub fn compute_commit_maps(
              &self,
              llm_token_bytes: &[u8],
          ) -> (
              BTreeMap<TokenizerStateID, TokenizerStateID>,
              BTreeMap<TokenizerStateID, TerminalBV>,
          ) {
              let mut state_map: BTreeMap<TokenizerStateID, TokenizerStateID> =
                  BTreeMap::new();
              let mut terminals_map: BTreeMap<TokenizerStateID, TerminalBV> =
                  BTreeMap::new();
              for (tokenizer_state_id, _state) in self.state.iter() {
                  let exec_result = self.parent.tokenizer.execute_from_state(
                      &llm_token_bytes,
                      *tokenizer_state_id,
                  );
                  if let Some(new_state) = exec_result.end_state {
                      state_map.insert(*tokenizer_state_id, TokenizerStateID(new_state));
                  }
                  let mut terminals = TerminalBV::zeros();
                  for token in exec_result.matches {
                      terminals.insert(token.id);
                  }
                  terminals_map.insert(*tokenizer_state_id, terminals);
              }
              (state_map, terminals_map)
          }

          pub fn get_mask(&self) -> LLMTokenBV {
              if self.parent.run_precompute4 {
                  self.get_mask4()
              } else {
                  self.get_mask3()
              }
          }

          pub fn print_gss_stats(&self) {
              println!("GrammarConstraintState Stats:");
              println!("  - Active tokenizer states: {}", self.state.len());
              if self.state.is_empty() {
                  println!("  - GSS is empty.");
                  return;
              }
              let stats = gather_gss_stats(
                  &self
                      .state
                      .values()
                      .map(|s| s.active_state.stack.as_ref())
                      .collect::<Vec<_>>(),
              );
              println!("  - GSS Stats: {:#?}", stats);
          }

          pub fn print_gss(&self) {
              let roots: Vec<_> = self
                  .state
                  .values()
                  .map(|s| s.active_state.stack.clone())
                  .collect();
              if roots.is_empty() {
                  println!("GSS is empty.");
                  return;
              }
              let labels: Vec<_> = self
                  .state
                  .keys()
                  .map(|k| format!("Tokenizer State {}", k.0))
                  .collect();
              self.parent.print_gss_nodes(&roots, Some(&labels));
          }

          pub fn explain_stack(&self) {
              for (state_id, state) in &self.state {
                  println!("\n--- State {} ---", state_id.0);
                  // Sample and print a bunch of stacks
                  let mut seen = BTreeSet::new();
                  let num_to_sample = 10;
                  for i in 0..1000 {
                      if let Some(sampled_path_edges) =
                          sample_path(&[&state.active_state.stack], i)
                      {
                          let mut sampled_stack: Vec<usize> = sampled_path_edges
                              .iter()
                              .map(|edge| edge.state_id.0)
                              .collect();
                          sampled_stack.reverse();
                          if seen.contains(&sampled_stack) {
                              continue;
                          }
                          seen.insert(sampled_stack);
                          if seen.len() >= num_to_sample {
                              break;
                          }
                      };
                  }
                  for sampled_stack in seen {
                      println!("  Sampled stack: {:?}", sampled_stack);
                  }
                  // Sample a stack
                  if let Some(sampled_path_edges) =
                      sample_path(&[&state.active_state.stack], 1)
                  {
                      let mut sampled_stack: Vec<StateID> = sampled_path_edges
                          .iter()
                          .map(|edge| edge.state_id)
                          .collect();
                      sampled_stack.reverse();
                      let explanation =
                          self.parent.parser.explain_stack(&sampled_stack);
                      // Indent the explanation for readability
                      for line in explanation.lines() {
                          println!("      {}", line);
                      }
                  };
              }
          }

          pub fn num_unique_nodes(&self) -> usize {
              gather_gss_stats(
                  &self
                      .state
                      .values()
                      .map(|s| s.active_state.stack.as_ref())
                      .collect::<Vec<_>>(),
              )
              .unique_nodes()
          }

          pub fn get_mask3(&self) -> LLMTokenBV {
              let final_mask_internal = RefCell::new(HybridBitset::zeros());
              if self.state.is_empty() {
                  return self
                      .parent
                      .internal_bv_to_original_precompute3(&final_mask_internal.into_inner());
              }
              let traversal_data = match &self.parent.trie3_traversal_data {
                  Some(data) => data,
                  None => {
                      panic!(
                          "No traversal data for get_mask3, returning empty mask."
                      );
                  }
              };

              let mut initial_values_by_trie_node: BTreeMap<
                  PrecomputeNode3Index,
                  GLRParserState<'a>,
              > = BTreeMap::new();
              for (&tokenizer_state_id, glr_state) in &self.state {
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  let mut glr_state = glr_state.clone();
                  prune_llm_tokens_by_disallowed_terminals(
                      &mut glr_state.active_state.stack,
                      &self.parent.possible_matches,
                      &mut HashMap::new(),
                  );

                  if let Some(precomputed_trie_root_arc) =
                      self.parent.precomputed3.get(&tokenizer_state_id)
                  {
                      initial_values_by_trie_node
                          .entry(precomputed_trie_root_arc.clone())
                          .and_modify(|existing_glr| {
                              existing_glr.merge_with(glr_state.clone());
                          })
                          .or_insert(glr_state.clone());
                  } else {
                      panic!(
                          "No precomputed trie found for tokenizer state {:?}.",
                          tokenizer_state_id
                      );
                  }
              }

              let initial_values_for_map: Vec<_> =
                  initial_values_by_trie_node.into_iter().collect();

              if initial_values_for_map.is_empty() {
                  return self
                      .parent
                      .internal_bv_to_original(&final_mask_internal.into_inner());
              }

              Trie::special_map_grouped(
                  &self.parent.trie3_god,
                  traversal_data,
                  initial_values_for_map,
                  // step_fn: (current_state, (pop, llm_token_bv), destinations_map)
                  |glr_s: &GLRParserState,
                   (pop, llm_token_bv_from_edge),
                   dest_map| {
                      let popped = glr_s.active_state.stack.popn(*pop as usize);
                      let mut results = Vec::new();

                      for (dest_idx, state_id_bv) in dest_map.iter() {
                          let mut valid_gss_nodes = Vec::new();
                          for popper_item in popped.iter() {
                              for peek in popper_item.peek_iter() {
                                  if state_id_bv.contains(peek.edge_value().state_id.0)
                                  {
                                      valid_gss_nodes.push(peek.isolated_parent());
                                  }
                              }
                          }

                          if valid_gss_nodes.is_empty() {
                              continue;
                          }

                          let merged_gss =
                              GSSNode::merge_many_with_depth(1, valid_gss_nodes.clone());
                          let mut new_glr_s = glr_s.clone();
                          new_glr_s.active_state.stack = merged_gss;

                          allow_only_llm_tokens_and_prune_arc(
                              &mut new_glr_s.active_state.stack,
                              llm_token_bv_from_edge,
                              &mut HashMap::new(),
                          );

                          if new_glr_s.is_ok() {
                              results.push((dest_idx.clone(), new_glr_s));
                          }
                      }
                      results
                  },
                  // merge_fn
                  |glr_s1, glr_s2| glr_s1.merge_with(glr_s2),
                  // process_fn: (precomputed_node_data, final_state_for_this_path)
                  |precomputed_node_data, _, glr_s| {
                      let mut glr_s_copy = glr_s.clone();
                      let glr_active_tokens =
                          glr_s_copy.active_state.stack.allowed_llm_tokens();
                      let keep_going = glr_s_copy.is_ok();
                      if precomputed_node_data.value.end {
                          if !glr_active_tokens.is_empty() {
                              *final_mask_internal.borrow_mut() |= &glr_active_tokens;
                          }
                      }
                      keep_going.then(|| glr_s)
                  },
              );

              let final_mask_mapped = self
                  .parent
                  .internal_bv_to_original_precompute3(&final_mask_internal.into_inner());

              final_mask_mapped
          }

          pub fn get_mask4(&self) -> LLMTokenBV {
              fn simple_bitset_to_hybrid_bitset(sb: &SimpleBitset) -> HybridBitset {
                  HybridBitset::from(sb.rsb.clone())
              }
              let final_mask_internal = RefCell::new(HybridBitset::zeros());
              if self.state.is_empty() {
                  return self
                      .parent
                      .internal_bv_to_original_precompute3(&final_mask_internal.into_inner());
              }

              let mut pending_states: BTreeMap<WAStateID, GLRParserState<'a>> = BTreeMap::new();
              let dwa = &self.parent.precomputed4;
              let dwa_start_state = &dwa.states[dwa.body.start_state];

              // 1. Seed initial states
              for (&tokenizer_state_id, glr_state) in &self.state {
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  let mut glr_state = glr_state.clone();
                  prune_llm_tokens_by_disallowed_terminals(
                      &mut glr_state.active_state.stack,
                      &self.parent.possible_matches,
                      &mut HashMap::new(),
                  );

                  if !glr_state.is_ok() {
                      continue;
                  }

                  if let Some((target_wa_state_id, weight)) =
                      dwa_start_state.get_transition(tokenizer_state_id.0 as i16)
                  {
                      allow_only_llm_tokens_and_prune_arc(
                          &mut glr_state.active_state.stack,
                          &simple_bitset_to_hybrid_bitset(weight),
                          &mut HashMap::new(),
                      );

                      if glr_state.is_ok() {
                          pending_states
                              .entry(target_wa_state_id)
                              .and_modify(|existing| existing.merge_with(glr_state.clone()))
                              .or_insert(glr_state);
                      }
                  }
              }

              // 2. Main worklist loop
              while !pending_states.is_empty() {
                  let worklist = std::mem::take(&mut pending_states);

                  for (current_wa_state_id, mut current_glr_state) in worklist {
                      let dwa_state = &dwa.states[current_wa_state_id];

                      // Apply state weight
                      if let Some(sw) = &dwa_state.state_weight {
                          allow_only_llm_tokens_and_prune_arc(
                              &mut current_glr_state.active_state.stack,
                              &simple_bitset_to_hybrid_bitset(sw),
                              &mut HashMap::new(),
                          );
                          if !current_glr_state.is_ok() {
                              continue;
                          }
                      }

                      // Process final weight
                      if let Some(fw) = &dwa_state.final_weight {
                          let mut final_glr_state = current_glr_state.clone();
                          allow_only_llm_tokens_and_prune_arc(
                              &mut final_glr_state.active_state.stack,
                              &simple_bitset_to_hybrid_bitset(fw),
                              &mut HashMap::new(),
                          );
                          if final_glr_state.is_ok() {
                              *final_mask_internal.borrow_mut() |=
                                  &final_glr_state.active_state.stack.allowed_llm_tokens();
                          }
                      }

                      // Process transitions (pop 1)
                      let popped = current_glr_state.active_state.stack.popn(1);
                      if popped.num_predecessors() == 0 {
                          continue;
                      }

                      for (label, target_wa_state_id, trans_weight) in dwa_state.iter_edges() {
                          let parser_state_id = label as usize;

                          let mut valid_gss_nodes = Vec::new();
                          for popper_item in popped.iter() {
                              for peek in popper_item.peek_iter() {
                                  if peek.edge_value().state_id.0 == parser_state_id {
                                      valid_gss_nodes.push(peek.isolated_parent());
                                  }
                              }
                          }

                          if !valid_gss_nodes.is_empty() {
                              let merged_gss = GSSNode::merge_many_with_depth(1, valid_gss_nodes);
                              let mut new_glr_state = current_glr_state.clone();
                              new_glr_state.active_state.stack = merged_gss;

                              allow_only_llm_tokens_and_prune_arc(
                                  &mut new_glr_state.active_state.stack,
                                  &simple_bitset_to_hybrid_bitset(trans_weight),
                                  &mut HashMap::new(),
                              );

                              if new_glr_state.is_ok() {
                                  pending_states
                                      .entry(target_wa_state_id)
                                      .and_modify(|existing| existing.merge_with(new_glr_state.clone()))
                                      .or_insert(new_glr_state);
                              }
                          }
                      }
                  }
              }

              let final_mask_mapped = self
                  .parent
                  .internal_bv_to_original_precompute3(&final_mask_internal.into_inner());

              final_mask_mapped
          }

          pub fn commit(&mut self, llm_token_id: LLMTokenID) {
              self.commit_bytes(
                  &self
                      .parent
                      .llm_vocab
                      .llm_token_map
                      .get_by_right(&llm_token_id)
                      .unwrap()
                      .clone(),
              );
          }

          #[time_it]
          pub fn commit_bytes(&mut self, llm_token_bytes: &[u8]) {
              if llm_token_bytes.is_empty() {
                  return;
              }

              crate::debug!(
                  3,
                  "Committing bytes: {:?}",
                  String::from_utf8_lossy(llm_token_bytes)
              );

              self.transform_gss_stacks(|stack, memo| reset_llm_tokens(stack, memo));

              // Handle allowed terminals
              let (state_map, terminals_map) = self.compute_commit_maps(llm_token_bytes);

              let gss_stats_before_pruning = gather_gss_stats(
                  &self
                      .state
                      .values()
                      .map(|s| s.active_state.stack.as_ref())
                      .collect::<Vec<_>>(),
              );
              crate::debug!(5, "Terminals map: {:?}", terminals_map);
              self.transform_gss_stacks(|stack, memo| {
                  prune_disallowed_terminals(stack, &terminals_map, memo)
              });
              let gss_stats_after_pruning = gather_gss_stats(
                  &self
                      .state
                      .values()
                      .map(|s| s.active_state.stack.as_ref())
                      .collect::<Vec<_>>(),
              );
              crate::debug!(
                  4,
                  "GSS stats before pruning disallowed terminals: {:#?}",
                  gss_stats_before_pruning
              );
              if gss_stats_after_pruning != gss_stats_before_pruning {
                  crate::debug!(
                      4,
                      "GSS stats after pruning disallowed terminals: {:#?}",
                      gss_stats_after_pruning
                  );
                  crate::debug!(
                      4,
                      "GSS stats changed after pruning disallowed terminals."
                  );
              } else {
                  crate::debug!(
                      4,
                      "GSS stats did not change after pruning disallowed terminals."
                  );
              }

              self.transform_gss_stacks(|stack, memo| {
                  map_allowed_terminals_tokenizer_states(stack, &state_map, memo)
              });

              let mut new_overall_state: BTreeMap<TokenizerStateID, GLRParserState<'a>> =
                  BTreeMap::new();

              let mut processing_queue: BTreeMap<
                  usize,
                  BTreeMap<TokenizerStateID, GLRParserState<'a>>,
              > = BTreeMap::new();
              processing_queue.insert(0, std::mem::take(&mut self.state));

              while let Some((offset, states_to_process)) = processing_queue.pop_first()
              {
                  crate::debug!(
                      3,
                      "Processing offset {} with states {:?}.",
                      offset,
                      states_to_process.keys().map(|k| k.0).collect::<Vec<_>>()
                  );
                  for (tokenizer_s_id_at_offset, glr_s_at_offset) in states_to_process
                  {
                      assert!(offset < llm_token_bytes.len());

                      let exec_result = self.parent.tokenizer.execute_from_state(
                          &llm_token_bytes[offset..],
                          tokenizer_s_id_at_offset,
                      );

                      for match_info in &exec_result.matches {
                          let mut cloned_glr_s = glr_s_at_offset.clone();
                          let terminal_id = TerminalID(match_info.id);

                          if let Some(dummy_id) =
                              self.parent.original_to_dummy_map.get(&terminal_id)
                          {
                              crate::debug!(5, "Processing dummy token {:?}", dummy_id);
                              cloned_glr_s.process_token(*dummy_id);
                          }

                          crate::debug!(5, "Processing terminal token {:?}", terminal_id);
                          cloned_glr_s.process_token(terminal_id);

                          if cloned_glr_s.is_ok() {
                              let new_offset = offset + match_info.width;
                              // After a grammar token is consumed, the tokenizer resets for the next segment of the LLM token.
                              let next_tokenizer_id_for_segment =
                                  self.parent.tokenizer.initial_state_id();

                              if let Some(end_state_id) = exec_result.end_state {
                                  let terminals_accessible_from_end_state = self
                                      .parent
                                      .tokenizer
                                      .tokens_accessible_from_state(
                                          TokenizerStateID(end_state_id),
                                      );
                                  if terminals_accessible_from_end_state
                                      .contains(&TerminalID(match_info.id))
                                  {
                                      let mut disallowed_terminals =
                                          crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::new();
                                      let mut disallowed_terminals_for_end_state =
                                          TerminalBV::zeros();
                                      // Disallow this token from being matched again immediately.
                                      disallowed_terminals_for_end_state
                                          .insert(match_info.id);
                                      disallowed_terminals.insert_l2_bitset(
                                          end_state_id,
                                          disallowed_terminals_for_end_state,
                                      );
                                      disallow_terminals_and_prune_arc(
                                          &mut cloned_glr_s.active_state.stack,
                                          &disallowed_terminals,
                                          &mut HashMap::new(),
                                      );
                                  }
                              }

                              if new_offset == llm_token_bytes.len() {
                                  new_overall_state
                                      .entry(next_tokenizer_id_for_segment)
                                      .and_modify(|existing| {
                                          existing.merge_with(cloned_glr_s.clone())
                                      })
                                      .or_insert(cloned_glr_s);
                              } else {
                                  processing_queue
                                      .entry(new_offset)
                                      .or_default()
                                      .entry(next_tokenizer_id_for_segment)
                                      .and_modify(|existing| {
                                          existing.merge_with(cloned_glr_s.clone())
                                      })
                                      .or_insert(cloned_glr_s);
                              }
                          }
                      }

                      if let Some(final_tokenizer_s_id_for_llm_token_segment) =
                          exec_result.end_state
                      {
                          // The rest of llm_token_bytes (from offset) was consumed, tokenizer ended in this state.
                          // The glr_s_at_offset is carried over. This is a state *after* the current LLM token.
                          let final_tokenizer_state =
                              TokenizerStateID(final_tokenizer_s_id_for_llm_token_segment);
                          new_overall_state
                              .entry(final_tokenizer_state)
                              .and_modify(|existing| {
                                  existing.merge_with(glr_s_at_offset.clone())
                              })
                              .or_insert(glr_s_at_offset.clone());
                      }
                  }
              }

              self.state = new_overall_state.clone();
              for glr_parser_state in self.state.values_mut() {}

