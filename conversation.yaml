          -   `self.active_states.len()` becomes `self.head.predecessors.len()`.
          -   `p.iter().map(|n| n.value.state_id.0)` becomes `p.iter().map(|n| n.state_id.0)`.

      10. **Update `GLRParserState::step`:**
          -   `todo = std::mem::take(&mut self.active_states).into_values().collect::<Vec<_>>();`
              Becomes:
              ```rust
              let current_head_node = std::mem::replace(
