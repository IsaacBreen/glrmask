              enum Repr<'a> {
                  All(&'a str),
                  Ranges(Vec<RangeRepr>),
              }

              #[derive(Serialize)]
              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
