      ## 1. What’s going wrong (and why it only shows up on the NWA)

      ### 1.1. The role of `compute_cancellations`

      Conceptually, `compute_cancellations` is supposed to compute **new epsilon transitions** that summarize the effect of negative codes canceling later positive/default transitions.

      Informally:

      - For each negative transition
        \[
          a \xrightarrow{\text{neg}(c),\,w_{a\to b}} b
        \]
        we want to follow paths from `b` consisting of:
        - epsilon edges,
        - transitions labeled by the **matching positive code** `c`,
        - and default transitions (which match “other codes” but are used here as a “catch‑all” for cancellation).
      - Whenever we see a matching positive/default transition
        \[
          s \xrightarrow{c \text{ or default},\,w_{s\to t}} t
        \]
        reachable from `b`, we say the negative at `a` can be “canceled” along a path from `a` to `t` with weight
        \[
          w_{a\to s} \wedge w_{s\to t}
        \]
        where `w_{a->s}` is the accumulated weight from `a` to `s` along epsilons etc.
      - We represent that by adding a **new epsilon**:
        \[
          a \xrightarrow{\varepsilon,\,w_{a\to t}} t.
        \]

      But there may be *chains* of negatives: when we discover such an epsilon for some negative source `a`, other negatives that already had “queries” at `a` must be able to **reuse** that epsilon, extending their reachability.

      That’s exactly what `queries` and `new_epsilons` are encoding.

      ### 1.2. What the current algorithm does

      The current implementation maintains:

      - `queries[s][(a, c)] = W` meaning:
        > Starting from a negative edge with symbol `c` at state `a`, there is a path to state `s` with cumulative weight `W`.

      - `new_epsilons[(a, t)] = W` meaning:
        > We’ve discovered that from state `a` (source of some negative) we can “jump” (via cancellations) to state `t` with weight `W`.

      The worklist entries are `(s, a, c, w_as)` corresponding to `queries[s][(a, c)]`.

      Inside the loop:

      1. From `(s, a, c, w_as)` it looks at:
         - `s --c--> t` and
         - `s --DEFAULT--> t`

         and computes new epsilons `(a -> t)` via `check_cancellations`.

      2. `check_cancellations` updates `new_epsilons[(a, t)]` and, if that weight grew, it copies **all queries at `a`** and pushes them forward through this new epsilon to `t`.

      3. It also propagates `queries` through the *original* epsilon edges `s --ε--> t`.

      So, the algorithm is trying to implement these rules:

      - Seed:
        - For each negative edge `a --neg(c)--> b`:
          - add `queries[b][(a,c)] := w_ab`.

      - Epsilon propagation:
        - If `queries[s][(a,c)]` and `s --ε, w--> t`, then
          - `queries[t][(a,c)] |= queries[s][(a,c)] ∧ w`.

      - Cancellation:
        - If `queries[s][(a,c)]` and `s --(c or DEFAULT), w--> t`, then
          - `new_eps[a][t] |= queries[s][(a,c)] ∧ w`.

      - Lifting previous queries over new epsilons:
        - If `new_eps[a][t]` grows, for every `queries[a][(a',c')]`:
          - `queries[t][(a',c')] |= queries[a][(a',c')] ∧ new_eps[a][t]`.

      ### 1.3. The missing piece: new queries at `a` after epsilons from `a` already exist

      The critical subtlety is:

      > The procedure only propagates queries at `a` over `new_eps[a][t]` **at the moment** `new_eps[a][t]` grows.

      However, queries at `a` can be created **later**, via epsilon propagation.

      A minimal pattern:

      - There is some negative edge with source `a1`, and its processing eventually yields a new epsilon:
        \[
        a_1 \xrightarrow{\varepsilon} t.
        \]
      - Separately, there is another negative edge with source `a2` such that the epsilon path from its destination leads to state `a1`. This means:
        \[
        \text{during processing of } a_2: \quad \text{we will eventually add } queries[a_1][(a_2, c_2)].
        \]

      If we process the negative from `a1` *first*, the algorithm will:

      1. Discover some `new_eps[a1][t]`.
      2. At that moment, `queries[a1]` might still be empty (because paths from the `a2`‑negative haven’t been processed yet).
      3. Therefore, it does **not** propagate `(a2, c2)` queries, because they don’t exist yet.
      4. Later, when the queries for `(a2,c2)` at state `a1` are finally discovered via epsilon chains, the algorithm never goes back and re‑uses the already‑existing `new_eps[a1][t]`.

      So the rule

      > If a query arrives at state `a`, and we already know cancellations `a -> t`, then we must also be able to go to `t` with that query.

      is missing.

      Mathematically, if we define:

      - `R(s, a, c)` = the weight of paths from negative source `a` with code `c` reaching location `s`;
      - `E(a, t)` = weight of cancellation epsilon from `a` to `t`,

      the intended inference rules include:

      1. `R` grows along epsilons and cancellation epsilons:
         - If `R(s, a, c)` and `s --ε--> t`, then `R(t, a, c)` grows.
         - If `R(a, a0, c0)` and `E(a, t)`, then `R(t, a0, c0)` grows.

      2. `E` grows from `R` along matching positive/default transitions:
         - If `R(s, a, c)` and `s --(c or DEFAULT)--> t`, then `E(a, t)` grows.

      The current code implements “E grows ⇒ R grows” (via `queries_at_a` in `check_cancellations`), but **not** the symmetric “R grows ⇒ R can traverse existing `E` edges”.

      For epsilon‑free NWAs (like those coming from `NWA::from_dwa`), `queries[a]` is fully determined at seed time (there are no epsilon paths to move queries between states), so this missing rule never matters. That’s why all the DWA‑based tests pass.

      For the large hand‑built NWA:

      - There are many epsilon chains linking “negative segments” together (states 17→2→1→0, 34→18→3→4→5, 50→35→21→22, 66→51→36→37→38, etc.).
      - Some negative segments produce cancellation epsilons from state `a` to some `t` **before** other negatives have propagated queries along epsilons into `a`.
      - The missing “R over existing E” rule means those later queries never get to use the already‑known cancellation epsilons, and some cancellation chains are effectively truncated.
      - After determinization, `NWA::from_dwa` produces an epsilon‑free NWA, so the bug disappears there — exactly matching what your test observes.

      This explains both:

      - Why `resolve_negative_codes_in_dwa` (working on epsilon‑free NWA) passes all tests, and
      - Why `test_resolve_negatives_from_large_nwa_log` fails when resolving directly on the original NWA.

      ### 1.4. Fix idea

      To restore correctness we must enforce the missing rule:

      > Whenever a query `(s, a, c, w_as)` is processed for some location `s`, it must also be propagated over all *already discovered* cancellation epsilons out of `s`.

      Concretely:

      - We replace `new_epsilons: HashMap<(from, to), Weight>` with
        `new_eps_from: Vec<HashMap<to, Weight>>`, indexed by the **from** state.
      - On each worklist step `(s, a, c, w_as)` we:
        1. First propagate that query through all already‑known cancellation epsilons starting at `s`, using their current weights.
        2. Then proceed as before:
           - Look at `s --c--> t` and `s --DEFAULT--> t`, and call `check_cancellations`.
           - Propagate via original epsilon edges `s --ε--> t`.

      We **keep** the existing behavior inside `check_cancellations` that, when a cancellation epsilon from `a` to `t` grows, it propagates all existing queries currently at `a` across that epsilon. This handles the complementary situation “E grows ⇒ R grows”.

      Together, these two mechanisms guarantee that:

      - Any new query at state `s` uses all cancellation epsilons already known from `s`.
      - Any new cancellation epsilon out of `a` is used by all queries that are (already) at `a`.

      Because weights are represented as finite bitsets and all operations are monotone (only ever adding bits), the worklist computation terminates and yields the least fixpoint of these rules.

      ---

      ## 2. Step‑by‑step code changes

      We only need to modify `compute_cancellations` in
      `src/precompute4/resolve_negatives.rs`.

      ### 2.1. Replace `new_epsilons` with a per‑source adjacency map

      In `compute_cancellations`, change the declarations at the top of the function:

      1. Find:

      ```rust
      let mut queries: Vec<HashMap<QueryKey, Weight>> = vec![HashMap::new(); n];
      let mut worklist: VecDeque<(NWAStateID, NWAStateID, Code, Weight)> = VecDeque::new();
      let mut new_epsilons: HashMap<(NWAStateID, NWAStateID), Weight> = HashMap::new();
      ```

      2. Replace them with:

      ```rust
      let mut queries: Vec<HashMap<QueryKey, Weight>> = vec![HashMap::new(); n];
      let mut worklist: VecDeque<(NWAStateID, NWAStateID, Code, Weight)> = VecDeque::new();

      // new_eps_from[from][to] = weight of the cancellation epsilon from `from` to `to`.
      let mut new_eps_from: Vec<HashMap<NWAStateID, Weight>> = vec![HashMap::new(); n];
      ```

      This keeps the same information as `new_epsilons`, but organized so we can easily iterate over all cancellation epsilons leaving a given state.

      ### 2.2. Propagate queries over existing cancellation epsilons

      Inside the `while let Some((s, a, c, w_as)) = worklist.pop_front()` loop:

      1. Right at the top of the loop, *before* defining `check_cancellations`, insert propagation over the already‑known cancellation epsilons out of `s`:

      ```rust
      // First, propagate this query through any already-known cancellation epsilons
      // originating from the current location `s`.
      if !new_eps_from[s].is_empty() {
          for (&target, eps_w) in &new_eps_from[s] {
              let prop_w = &w_as & eps_w;
              if prop_w.is_empty() {
                  continue;
              }
              let query_key: QueryKey = (a, c);
              let query_weight = queries[target].entry(query_key).or_default();
              let old_qw = query_weight.clone();
              *query_weight |= &prop_w;
              if *query_weight != old_qw {
                  worklist.push_back((target, a, c, query_weight.clone()));
              }
          }
      }
      ```

      This adds the missing rule: if we’re currently at `s` with a query `(a, c)`, we can also walk along any already discovered cancellation epsilons starting from `s`.

      ### 2.3. Update `check_cancellations` to write into `new_eps_from`

      Now modify the `check_cancellations` closure to use `new_eps_from` instead of `new_epsilons`:

      1. Find the existing closure:

      ```rust
      let mut check_cancellations = |target: NWAStateID,
                                     w_st: &Weight,
                                     worklist: &mut VecDeque<(NWAStateID, NWAStateID, Code, Weight)>| {
          let new_eps_w = &w_as & w_st;
          if new_eps_w.is_empty() {
              return;
          }

          let eps_key = (a, target);
          let eps_weight = new_epsilons.entry(eps_key).or_default();
          let old_eps_w = eps_weight.clone();
          *eps_weight |= &new_eps_w;

          if *eps_weight != old_eps_w {
              let queries_at_a = queries[a].clone();
              for (&(a_prime, c_prime), w_a_prime_a) in &queries_at_a {
                  let prop_w = w_a_prime_a & &*eps_weight;
                  if prop_w.is_empty() {
                      continue;
                  }
                  let query_key: QueryKey = (a_prime, c_prime);
                  let query_weight = queries[target].entry(query_key).or_default();
                  let old_qw = query_weight.clone();
                  *query_weight |= &prop_w;
                  if *query_weight != old_qw {
                      worklist.push_back((target, a_prime, c_prime, query_weight.clone()));
                  }
              }
          }
      };
      ```

      2. Replace it with:

      ```rust
      let mut check_cancellations = |target: NWAStateID,
                                     w_st: &Weight,
                                     worklist: &mut VecDeque<(NWAStateID, NWAStateID, Code, Weight)>| {
          let new_eps_w = &w_as & w_st;
          if new_eps_w.is_empty() {
              return;
          }

