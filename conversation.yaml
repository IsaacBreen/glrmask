      1. Leave `src/precompute4/mod.rs` exactly as it is. No changes are required there.

      2. Open `src/precompute4/resolve_negatives.rs`.

      3. Replace the entire contents of `src/precompute4/resolve_negatives.rs` with the code in the next section titled “Final code: `src/precompute4/resolve_negatives.rs`”.

      4. Save the file and recompile your project. All existing callers of this module will continue to work, and the behavior of negative-code resolution remains unchanged.

