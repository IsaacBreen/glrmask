      I do a lot of operations with hybrid bitsets in my program.
      I want to make it much faster using a global cache.
      The cache should cache the results of expensive operations, especially binary operations like bitwise and/or.
      It should also cache the values themselves. To make this possible, make the `inner` fields on `HybridL2Bitset` and `HybridBitset` both of type `Acc`.
      Then, at every opportunity, check the values cache to see if an equivalent result is in it, and return the `Acc` for it instead. This way, we make best use of our ref counted pointers, minimising the number of actual values that are stored, and hence memory.
      It should also make operation caching faster, by making comparisons faster, since we can just check if the pointers are equal first (and only check the actual contents if the aren't).
      Do this caching at every opportunity. Ideally there'd only be one stored value for each unique hybrid bitset in the entire program, as in if any two are equal anywhere in the program, they have the same underlying data pointer.
      And ideally we'd only perform each operation once throughout the program.
