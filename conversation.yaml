                  # skip b intervals that end before s1
                  while j < len(b) and b[j][1] < s1:
                      j += 1

                  cur_start = s1
                  while j < len(b) and b[j][0] <= e1:
                      bs, be = b[j]
                      if bs > cur_start:
                          out.append((cur_start, min(e1, bs - 1)))
                      if be >= e1:
