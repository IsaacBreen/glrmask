          pub fn iter_mut(&mut self) -> impl Iterator<Item = (u8, &mut T)> {
              self.data.iter_mut().enumerate().filter_map(|(i, option)| {
                  option.as_mut().map(|boxed| (i as u8, boxed.as_mut()))
              })
