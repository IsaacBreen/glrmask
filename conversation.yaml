          df_commit = pd.DataFrame(all_commit_rows)

          # --- Print Summary Statistics ---
          print("--- Benchmark Summary ---")
          summary = df.groupby('model')['time_sec'].agg(
              ['mean', 'std', 'min', 'median', 'max', 'count']
