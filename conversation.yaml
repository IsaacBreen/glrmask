          // GLR should accept it, but performance *could* degrade on larger inputs.
          let productions = vec![
              prod("S'", vec![nt("S"), t("$")]), // Start
              prod("S", vec![nt("S"), nt("S")]),
              prod("S", vec![t("a")]),
