          fst.set_start(s1)
          fst.set_final(s2)

          old_isymt = SymbolTable.from_symbols(["a", "b"])
          new_isymt = SymbolTable.from_symbols(["b", "a"])

          old_osymt = SymbolTable.from_symbols(["aa", "bb"])
          new_osymt = SymbolTable.from_symbols(["bb", "aa"])

