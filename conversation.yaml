              let arr = match json {
                  sep1::json_serialization::JSONNode::Array(arr) => arr,
                  _ => vec![],
              };
              let mut out = Vec::new();
              for pair in arr {
                  if let sep1::json_serialization::JSONNode::Array(v) = pair {
                      if v.len() == 2 {
                          let s = usize::from_json(v[0].clone()).unwrap();
                          let e = usize::from_json(v[1].clone()).unwrap();
                          out.push((s,e));
