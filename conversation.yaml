      The fundamental issue is that when we have a gss with two paths
      A -> Bouter(Binner) -> Cinner
      A -> Douter(Dinner) -> Einner
      Bouter and Douter are interfaces (A is the root, and it's an upper branch), ie Bouter and Douter both contain lower nodes Binner and Dinner (as interfaces do)
      (Douter and Bouter must contain different accs, otherwise A would get promoted to an interface.)
      then when we pop, the lower nodes Binner and Dinner necessarily get destroyed. Couter and Douter are created instead and hold the accs.
      R -> Couter(Cinner)
      R -> Douter(Dinner)
      where R is a new root, an upper branch again.
      Then when we push something, we get
      A2 -> Bouter2(Binner2) -> Cinner
      A2 -> Douter2(Dinner2) -> Einner
      Here, Bouter2 != Bouter and Binner2 != Binner etc (pointer inequality, not value inequality).

      This is the case even if the value we pushed was the same as the value we popped.
      This seems inefficient. We've essentially performed an operation (pop) and then performed the inverse (push the popped value). The efficient result would be the same as the original.

      Actually, we it'd still be an issue if we'd pushed a different value from what we popped. We don't really care about Bouter2 != Bouter or Douter2 != Douter. It's Binner2 != Binner and Dinner2 != Dinner that are the problem.

