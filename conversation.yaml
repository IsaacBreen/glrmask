          // After "(i", the inner E is satisfied. The outer E is satisfied. We now expect EOF.
          assert_eq!(mask, HybridBitset::from_iter(vec![]));
      }

      #[test]
      fn test_gss_explosion_from_ambiguity() -> Result<(), Box<dyn std::error::Error>> {
          // This test checks for exponential GSS node growth in the face of ambiguity.
          // The grammar S -> 'a' S | 'b' S | '' creates 2^n parse trees for a string of length n.
          // A correct GLR parser with GSS should handle this in polynomial time and space.
          // We simulate feeding both 'a' and 'b' at each step and merging the results.
          // If GSS node sharing is working correctly, the number of unique nodes should
          // grow linearly, not exponentially.

          // 1. Grammar and Parser setup
          let productions = vec![
              prod("S", vec![t("A"), nt("S")]),
              prod("S", vec![t("B"), nt("S")]),
              prod("S", vec![]),
          ];
          let mut grammar_token_map: BiBTreeMap<Terminal, TerminalID> = BiBTreeMap::new();
          grammar_token_map.insert(regex_name("A"), TerminalID(0));
          grammar_token_map.insert(regex_name("B"), TerminalID(1));
          let parser = generate_glr_parser_with_terminal_map(&productions, grammar_token_map.clone(), None);

          // 2. Initial GLR state
          let mut glr_state = parser.init_glr_parser(None);
          glr_state.process_default_reductions(); // Process the S -> '' production

          let terminal_a = TerminalID(0);
          let terminal_b = TerminalID(1);

          let mut node_counts = Vec::new();
          let initial_nodes = glr_state.stats().unique_nodes();
          node_counts.push(initial_nodes);
          println!("Initial state: {} nodes", initial_nodes);

          // 3. Loop, feed tokens, merge, and check for explosion
          for i in 1..=10 {
              let mut state_a = glr_state.clone();
              state_a.process_token(terminal_a);
              state_a.process_default_reductions();

              let mut state_b = glr_state.clone();
              state_b.process_token(terminal_b);
              state_b.process_default_reductions();

              state_a.merge_with(state_b);
              glr_state = state_a;

              let current_nodes = glr_state.stats().unique_nodes();
              node_counts.push(current_nodes);
              println!("Step {}: {} nodes", i, current_nodes);
          }

          // 4. Analyze node growth
          println!("Node counts per step: {:?}", node_counts);
          let increases: Vec<usize> = node_counts.windows(2).map(|w| w[1] - w[0]).collect();
          println!("Node increases per step: {:?}", increases);

          // The growth should be roughly constant (linear). An explosion would show accelerating increases.
          if let (Some(&increase1), Some(&increase2)) = (increases.get(2), increases.get(increases.len() - 1)) {
              assert!(increase2 <= increase1, "GSS node growth appears exponential. Increase after 3 steps: {}, Last increase: {}. Full increases: {:?}", increase1, increase2, increases);
          }

          Ok(())
      }
      #[test]
      #[test]
      fn test_js_simplified_ebnf_string() -> Result<(), Box<dyn std::error::Error>> {
          // 1. Load and compile the grammar from the EBNF file
          let ebnf_grammar = indoc! {r#"
              program ::= (expression ';')* EOF;
              expression ::= '!'? (IDENTIFIER | STRING_LITERAL) ;
              EOF ::= '$';

              STRING_LITERAL ::= '"' [^"]* '"' ;
              IDENTIFIER ::= 'a' ;
          "#};
          let grammar_definition = GrammarDefinition::from_ebnf(&ebnf_grammar)?;
          let compiled_grammar = CompiledGrammar::from_definition(Arc::new(grammar_definition));

          // 2. Define the LLM vocabulary
          let mut llm_token_map = LLMTokenMap::new();
          let llm_a = LLMTokenID(0);
          let llm_not_quote = LLMTokenID(1);
          let llm_quote = LLMTokenID(2);
          llm_token_map.insert(b"a".to_vec(), llm_a);
          llm_token_map.insert(b"!\"".to_vec(), llm_not_quote);
          llm_token_map.insert(b"\"".to_vec(), llm_quote);
          let max_original_llm_token_id = 2;

          // 3. Create the GrammarConstraint
          let constraint = GrammarConstraint::from_compiled_grammar(
              compiled_grammar,
              llm_token_map,
              LLMTokenID(max_original_llm_token_id + 1), // dummy EOF
              max_original_llm_token_id,
          );
          println!("Tokenizer: {}", constraint.tokenizer);
          println!("Parser: {}", constraint.parser);
          constraint.dump_precomputed0();
          constraint.dump_precomputed1();
          constraint.dump_precomputed3();

          // 4. Initialize state and get the initial mask
          let mut state = constraint.init();
          let mask1 = state.get_mask();

          // The grammar can start with an IDENTIFIER ("a"), a unary '!' ("!\""), or a STRING_LITERAL ("\"").
          // It can also start with other things like 'let', 'if', 'while', '{', '(', 'true', 'false', a number, or a unary '-'.
          // The LLM tokens provided match the start of IDENTIFIER, unary '!', and STRING_LITERAL.
          let expected_mask1 = HybridBitset::from_iter(vec![llm_a.0, llm_not_quote.0, llm_quote.0]);
          assert_eq!(
              mask1,
              expected_mask1,
              "Initial mask should allow 'a', '!\"', and '\"'"
          );

          // 5. Commit "a" and get the next mask
          state.commit(llm_a);
          state.print_gss();
          let mask2 = state.get_mask();

          let expected_mask2 = HybridBitset::from_iter(vec![]);
          assert_eq!(
              mask2,
              expected_mask2,
          );

          Ok(())
      }

      #[test]
      fn test_gss_structural_sharing_factor() -> Result<(), Box<dyn std::error::Error>> {
          // This test verifies that for a grammar with a known ambiguity that can cause
          // GSS explosion, the structural sharing remains effective. A low sharing factor
          // indicates that many structurally identical sub-graphs are being correctly
          // deduplicated.

          // 1. Minimal grammar that causes GSS explosion without proper sharing.
          //    See `test_js_if_statement_gss_explosion` for a detailed explanation.
          let js_grammar_ebnf = indoc! {r#"
              program ::= statement* EOF;
              EOF ::= '<|EOF|>';

              statement ::= if_statement | expression | block ;
              block ::= '{' statement* '}' ;
              if_statement ::= 'if' expression statement ;

              expression ::= IDENTIFIER IDENTIFIER | IDENTIFIER ;
              IDENTIFIER ::= [a-zA-Z_] [a-zA-Z0-9_]* ;
          "#};
          let grammar_definition = GrammarDefinition::from_ebnf(js_grammar_ebnf)?;
          let compiled_grammar = CompiledGrammar::from_definition(Arc::new(grammar_definition));
          let parser = compiled_grammar.glr_parser;

          // 2. Replicate the GSS setup from `precompute3` to test a single token step.
          //    We are interested in the terminal for 'if', which is TerminalID(1) in this compiled grammar.
          use crate::datastructures::gss_leveled_adapter::{Acc, GSSNode};
          use crate::glr::parser::{BelowBottomReductionMode, ParseStateEdgeContent, ProcessTokenAdvancedConfig};

          let tid = 1; // Terminal ID for 'if'
          let terminal = TerminalID(tid);

          let trie3_god = crate::constraint::Trie3GodWrapper::new(); // Dummy 'god' object
          let acc = Acc::new_fresh();
          let gss_stack = parser.get_combined_gss_with_acc(acc);

          let mut glr_state = parser.init_glr_parser_from_stack(gss_stack).with_god(trie3_god.clone());

          const BELOW_BOTTOM_REDUCE_MODE: BelowBottomReductionMode = BelowBottomReductionMode::ContinueFromAll;
          glr_state.process_token_advanced(terminal, &ProcessTokenAdvancedConfig { below_bottom_mode: BELOW_BOTTOM_REDUCE_MODE });

          // 3. Get stats and assert on the structural sharing factor.
          let stats = glr_state.active_state.stack.inner.stats();
          println!("Stats for terminal ID {}: {:?}", tid, stats);

          let THRESHOLD = 0.49; // A reasonably high sharing factor
          if !(stats.structural_sharing_factor > THRESHOLD) {
              // Print the GSS structure before and after normalization for debugging.
              println!("GSS (low sharing factor):");
              println!("{}", glr_state.active_state.stack.inner.to_graph_string(false));
              println!("GSS after normalization (what it ideally should be):");
              println!("{}", glr_state.active_state.stack.inner.normalize().to_graph_string(false));
          }
          assert!(
              stats.structural_sharing_factor > THRESHOLD,
              "Structural sharing factor ({}) was not greater than {}, indicating poor GSS node sharing",
              stats.structural_sharing_factor,
              THRESHOLD
          );

          Ok(())
      }

