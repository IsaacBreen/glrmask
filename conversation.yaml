      **Public Fields:**

      *   `llm_token_map: BiBTreeMap<Vec<u8>, LLMTokenID>`: A bidirectional map between token byte sequences and their original `LLMTokenID`.
      *   `max_original_llm_token_id: usize`: The highest original token ID in the vocabulary.

      ### `StageVocab`

      Manages the mapping between original and internal LLM token IDs for a specific precomputation stage. This is necessary because optimizations can merge tokens, creating a smaller, internal vocabulary.

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct StageVocab {
      	pub original_to_internal: BTreeMap<usize, usize>,
      	pub internal_to_original: BTreeMap<usize, LLMTokenBV>,
      	pub internal_max_llm_token: usize,
      }
      ```

      **Public Fields:**

      *   `original_to_internal: BTreeMap<usize, usize>`: Maps an original token ID to its internal ID for this stage.
      *   `internal_to_original: BTreeMap<usize, LLMTokenBV>`: Maps an internal token ID back to a bitset of one or more original token IDs.
      *   `internal_max_llm_token: usize`: The highest internal token ID for this stage.

      ### `Precompute0Cache`

      A serializable struct for caching the results of the Trie0 precomputation stage, which is often the most time-consuming part of initialization.

