                  StopReason::GotoNotFound => "GotoNotFound",
              };
              JSONNode::String(variant_name.to_string()) // Simple enum as string
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::String(s) => match s.as_str() {
