  initial_file_contents:
    run_rust_and_cpp_models.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      # This script builds the Boost.ICL-backed C++ extension and runs the benchmarks
      # comparing the Rust baseline and the C++-accelerated Python model.
      #
      # Usage:
      #   bash run_rust_and_cpp_models.sh
      #
      # Requirements:
      #   - curl, tar, a C++17 compiler (clang++ or g++)
      #   - Python with pip
      #
      # It downloads Boost headers locally (no system install needed), builds the extension in-place,
      # and then runs the provided run_benchmarks.sh script.

      PROJECT_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
      cd "$PROJECT_ROOT"

      # 1) Ensure we are in the repo root and Python folder exists
      if [ ! -d "python" ]; then
        echo "Error: expected 'python' directory at repo root. Run this script from the repo root."
        exit 1
      fi

      # 2) Setup: download Boost headers locally and install pybind11
      BOOST_VERSION="1.83.0"
      BOOST_VER_UNDERSCORES="1_83_0"
      BOOST_DIR="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}"
      mkdir -p "${PROJECT_ROOT}/.build"

      if [ ! -d "$BOOST_DIR" ]; then
        BOOST_TGZ="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
        echo "Downloading Boost ${BOOST_VERSION} headers..."
        curl -L -o "$BOOST_TGZ" "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
        echo "Extracting Boost..."
        tar -C "${PROJECT_ROOT}/.build" -xzf "$BOOST_TGZ"
      fi

      echo "Installing pybind11 (local user)..."
      python3 -m pip install --user --quiet pybind11

      # 3) Build the C++ extension in place
      echo "Building C++ extension (Boost.ICL RangeSet) ..."
      cd "${PROJECT_ROOT}/python"

      # Compute extension suffix and includes via pybind11
      EXT_SUFFIX="$(python3 - << 'PY'
      import sysconfig
      print(sysconfig.get_config_var("EXT_SUFFIX"))
      PY
      )"

      PYBIND_INCLUDES="$(python3 -m pybind11 --includes)"
      CXX="${CXX:-c++}"
      LDFLAGS=""
      if [[ "$(uname)" == "Darwin" ]]; then
        LDFLAGS="-undefined dynamic_lookup"
      fi

      # Compile
      ${CXX} -O3 -std=c++17 -shared -fPIC \
        ${PYBIND_INCLUDES} \
        -I"${BOOST_DIR}" \
        "aug25/models/icl_rangeset.cpp" \
        -o "aug25/models/icl_rangeset${EXT_SUFFIX}" \
        ${LDFLAGS}

      echo "Build complete: python/aug25/models/icl_rangeset${EXT_SUFFIX}"

      # 4) Run benchmarks comparing Rust baseline vs C++-accelerated model
      echo
      echo "Running benchmarks..."
      cd "$PROJECT_ROOT"
      bash run_benchmarks.sh "python/aug25/models/rust_model.py" "python/aug25/models/precompute3_model_cpp.py"
    python/aug25/models/icl_rangeset.cpp: |
      #include <pybind11/pybind11.h>
      #include <pybind11/stl.h>

      #include <boost/icl/interval_set.hpp>
      #include <boost/icl/interval.hpp>

      #include <vector>
      #include <string>
      #include <sstream>
      #include <utility>
      #include <algorithm>

      namespace py = pybind11;

      class RangeSet {
      public:
          using interval_type = boost::icl::discrete_interval<int>;
          using set_type = boost::icl::interval_set<int>;

          RangeSet() = default;

          static RangeSet empty() {
              return RangeSet();
          }

          static RangeSet from_indices(const std::vector<int>& indices) {
              RangeSet rs;
              for (int v : indices) {
                  rs.m_set.add(interval_type::closed(v, v));
              }
              return rs;
          }

          static RangeSet from_ranges(const std::vector<std::pair<int,int>>& ranges) {
              RangeSet rs;
              for (auto const& pr : ranges) {
                  int l = pr.first;
                  int r = pr.second;
                  if (r < l) std::swap(l, r);
                  rs.m_set.add(interval_type::closed(l, r));
              }
              return rs;
          }

          bool contains(int v) const {
              return boost::icl::contains(m_set, v);
          }

          RangeSet union_with(const RangeSet& other) const {
              RangeSet res;
              res.m_set = m_set;
              res.m_set += other.m_set;
              return res;
          }

          RangeSet intersection_with(const RangeSet& other) const {
              RangeSet res;
              res.m_set = m_set & other.m_set;
              return res;
          }

          RangeSet difference_with(const RangeSet& other) const {
              RangeSet res;
              res.m_set = m_set - other.m_set;
              return res;
          }

          bool is_empty() const {
              return m_set.empty();
          }

          std::vector<std::pair<int,int>> to_ranges() const {
              std::vector<std::pair<int,int>> out;
              out.reserve(m_set.size());
              for (auto const& itv : m_set) {
                  int l = itv.lower();
                  int r = itv.upper();
                  out.emplace_back(l, r);
              }
              return out;
          }

          std::vector<int> to_indices() const {
              std::vector<int> out;
              for (auto const& itv : m_set) {
                  int l = itv.lower();
                  int r = itv.upper();
                  for (int v = l; v <= r; ++v) {
                      out.push_back(v);
                  }
              }
              return out;
          }

          bool operator==(const RangeSet& other) const {
              return m_set == other.m_set;
          }

          std::string repr() const {
              std::ostringstream oss;
              oss << "RangeSet(";
              bool first = true;
              for (auto const& itv : m_set) {
                  if (!first) oss << ", ";
                  first = false;
                  oss << "[" << itv.lower() << ", " << itv.upper() << "]";
              }
              oss << ")";
              return oss.str();
          }

      private:
          set_type m_set;
      };

      PYBIND11_MODULE(icl_rangeset, m) {
          m.doc() = "Boost.ICL-backed RangeSet";

          py::class_<RangeSet>(m, "RangeSet")
              .def(py::init<>())
              .def_static("empty", &RangeSet::empty, "Create an empty RangeSet")
              .def_static("from_indices", &RangeSet::from_indices, py::arg("indices"),
                          "Create a RangeSet from a list of indices")
              .def_static("from_ranges", &RangeSet::from_ranges, py::arg("ranges"),
                          "Create a RangeSet from a list of inclusive ranges [[start, end], ...]")
              .def("union", &RangeSet::union_with, py::arg("other"),
                   "Return the union of this and other")
              .def("intersection", &RangeSet::intersection_with, py::arg("other"),
                   "Return the intersection of this and other")
              .def("difference", &RangeSet::difference_with, py::arg("other"),
                   "Return the difference of this and other (self - other)")
              .def("contains", &RangeSet::contains, py::arg("index"),
                   "Check if index is contained in the set")
              .def("to_ranges", &RangeSet::to_ranges,
                   "Return list of inclusive ranges [[start, end], ...]")
              .def("to_indices", &RangeSet::to_indices,
                   "Return list of all indices in the set")
              .def("is_empty", &RangeSet::is_empty,
                   "True if the set is empty")
              .def("__repr__", &RangeSet::repr)
              .def("__eq__", &RangeSet::operator==)
              ;
      }
