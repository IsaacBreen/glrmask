              assert_eq!(node_ab.reachable_token_ids, expected_ab_bits);

              // Node "a" reachable: {2, 3} (ID 1 was overwritten)
              let expected_a_bits = HybridBitset::from_iter(vec![2, 3]);
              assert_eq!(node_a.reachable_token_ids, expected_a_bits);

