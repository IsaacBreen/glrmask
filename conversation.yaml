                  let mut visited: HashSet<*const PrecomputeNode> = HashSet::new();
                  // Pass the bimap
                  dump_precompute_trie_recursive(&root_node_arc, "".to_string(), &mut visited, Some(&self.original_to_internal_id_bimap));
              }
              println!("\n===================================");
              println!("Dump Complete.");
          }
      }


