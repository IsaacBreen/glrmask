          let space_token_id = LLMTokenID(0);
          let at_token_id = LLMTokenID(1);
          llm_token_map.insert(b" ".to_vec(), space_token_id);
          llm_token_map.insert(b"@".to_vec(), at_token_id);
          let max_original_llm_token_id = 1;

