              self.max_depth: Dict[int, int] = {}
              self.possible_matches_cache: Optional[Dict[int, Dict[int, ffi.Bitset]]] = None
              self.tokenizer: Optional[ffi.Regex] = None
              self.glr_parser: Optional[ffi.GLRParser] = None
