      The fix below:
      - Replaces the refinement-based structural merge with an exact structural equality check (same end flag, same edge-keys, and for each key the exact same set of child nodes).
      - Keeps “pinned” nodes (starts/ends) safe: we never merge pinned victims, and we prefer using a pinned node as canonical if present.
      - Uses a deterministic dense ID per node to build canonical signatures.

