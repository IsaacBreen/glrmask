              let set1 = HybridBitset::from_iter(vec![1, 2, 3, 10]);
              let set2 = HybridBitset::from_iter(vec![3, 4, 5, 10]);

              let intersection = &set1 & &set2;
              let union = &set1 | &set2;
              let difference = &set1 - &set2;
              let sym_diff = &set1 ^ &set2;

