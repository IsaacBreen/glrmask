          fn to_json(&self) -> JSONNode {
              self.lock()
                  .expect("Mutex poisoned during JSON serialization")
                  .to_json()
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              T::from_json(node).map(|val| Arc::new(Mutex::new(val)))
