      The coordination script can print a separator or something so we can easily see where each variation begins and where the `get_mask` call begins.

      What decides which `get_mask` call is most 'expensive'?
      Let's add a method to the model that returns some value for the last `get_mask` call, e.g. the cost. The coordinator calls this after each `get_mask`.
      For now, let's just use `get_mask.traversal.edges_traversed`. ie at the end of `get_mask`, get `stats.counts['get_mask.traversal.edges_traversed']` and store it in a field on the model.

      Also add a .sh script similar to python/run_benchmarks.sh that, if needed, handles compilation and such (with option to skip).
