      #[derive(Debug, Clone)]
      pub struct GrammarConstraint {
          pub(crate) tokenizer:        Regex,
          pub(crate) parser:           GLRParser,
          pub(crate) precomputed:      Precomputed,
          pub(crate) llm_vocab:        Arc<LLMVocab>,
