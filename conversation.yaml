      filename: src/equivalence_analysis_finite_automata.rs
  - user: |
      # Drastically Accelerating Equivalence Analysis (from ~10s to ~10ms)

      This document lays out a big-picture redesign to take the current equivalence analysis from seconds to milliseconds for a workload like:
      - ~1k DFA states
      - ~50k vocabulary items
      - ~5k equivalence classes
      - Typical token lengths ~3–8 bytes

      The core idea: convert per-token/per-state repeated regex executions into a few linear passes over compact tries with table-driven DFA transitions and an aggressively minimized state space. The work gets amortized across the entire vocabulary, and all remainders (suffixes) are shared explicitly.

      The plan below is intentionally implementation-ready (conceptually), but does not change any code yet.


      ## Executive Summary

      - Replace on-demand, per-suffix DFA execution with:
        1) DFA minimization (as a Moore machine) to collapse equivalent states,
        2) A vocabulary trie to share computation across tokens,
        3) A suffix-trie (prefix trie of all suffixes) to compute all remainder signatures exactly once,
        4) A single product traversal that propagates minimized DFA states over trie edges for all "initial contexts" at once, and
        5) A linear-time assembly of canonical signatures from precomputed acceptance outputs + suffix signatures.

      - Complexity becomes:
        - O((|E_vocab| + |E_suffixes|) * M) transitions, where:
          - |E_vocab| = total edges in the vocabulary trie (≈ total bytes across all tokens),
          - |E_suffixes| = total edges in the suffix-trie of all suffixes (≈ sum over tokens of L(L+1)/2),
          - M = number of minimized DFA states (often much smaller than 1k).
        - Plus light, mostly linear work to assemble canonical signatures.

      - With M reduced by minimization (e.g., to a few dozen or less), and total edges ~1e6 or below, the total number of memory-local, table-driven transitions can be on the order of 10–20 million — easily doable in ~10ms on a modern CPU.


      ## What’s Expensive Today

      The current approach:

      - For each string (token) and each initial DFA state, it calls `regex.execute_from_state2`.
      - For each match, it recurses into the remainder, again using `execute_from_state2` but from the start_state (remainder always restarts).
      - There is a SuffixDeduper, but the engine is still invoked repeatedly on many suffixes, and the top-level classification iterates across many initial states.

      This leads to a workload roughly proportional to:
      - #tokens × #initial_states × avg_token_length
      - plus traversals for many suffixes across states, with expensive engine calls.

      Even with memoization, the multiplicative factor of states × tokens dominates.


      ## The Big-Picture Redesign

      We will restructure computation around three pillars:

      1) Minimize the DFA (Moore-style) with outputs defined by “anchored acceptance groups” at each state.
      2) Share all per-prefix work via tries (one trie for the vocabulary and one trie for all token suffixes).
      3) Build canonical signatures purely from:
         - acceptance outputs at prefix nodes along paths, and
         - precomputed remainder signatures on suffix strings (always from start_state).


      ### 1) DFA Minimization (Moore Machine)

      - Treat the compiled regex DFA as a Moore machine:
        - Input alphabet: bytes (0–255).
        - State outputs: the set of “anchored-accept group IDs” at that state (i.e., if you start matching at position 0 and end here, which groups accept).
        - We also care about the “end state” after consuming a whole string, but we should record the state’s minimized class rather than the raw numeric state ID.

      - Run Hopcroft’s DFA minimization generalized for Moore outputs (two states are equivalent if they produce the same output now and for all future inputs). This is classic.

      - Replace the raw DFA states with minimized state IDs everywhere in the equivalence logic. This typically shrinks 1000 states down by a large factor (often to tens), especially when many states are observationally indistinguishable for anchored matching.

      Why this matters:
      - Later, when we propagate “current state” across trie edges for lots of contexts, we do it for M minimized states instead of 1k original states.
      - CanonicalSignature.final_state must reference minimized IDs (only when relevant) to avoid spurious distinctions from mere numeric differences.


      ### 2) Trie of the Vocabulary

      - Build a compact trie for the entire vocabulary (50k strings).
        - Each node has:
          - children keyed by byte (array of 256 or a sparse map, chosen by density),
          - depth (i.e., prefix length),
          - parent pointer / index (helps reconstruct prefix path efficiently),
          - an optional “token index” if that node is a terminal.

      - Memory layout: store children in contiguous slabs for cache locality (double-array trie or vector-of-small-arrays). The exact representation can be adjusted based on profiling.

      - At each trie node, we will store a vector of M minimized DFA states:
        - states_at_node[node][m] = state reached by starting from “initial minimized state m” and consuming the bytes labeling the path root→node.
        - Root states_at_node[root][m] = m.

      - Populate states_at_node with a single linear traversal of the trie:
        - For each edge labeled byte c from parent P to child C:
          - For each minimized state m:
            - states_at_node[C][m] = next_state[ states_at_node[P][m] ][ c ].
        - This costs O(|E_vocab| × M) table lookups into next_state, which is very fast.

      - Also precompute at each trie node and for each minimized state m the “anchored acceptance groups” at the resulting DFA state:
        - accept_groups[node][m] = groups_accept[ states_at_node[node][m] ].
        - Typically a very small list (often size 0–2).


      ### 3) Suffix Trie of All Token Suffixes

      We need canonical signatures for all suffixes (remainders) starting from the start state. These are independent of initial DFA states (the code already restarts remainders at the start_state).

      - Define W = { all suffixes of all tokens } ∪ { "" }.
      - Build a prefix trie for W (call it T_suffix); this is a trie on suffix strings (not reversed). For tokens of average length L≈5, each token contributes ~L(L+1)/2 suffix-characters, so total nodes is manageable (~750k for 50k tokens).

      - Single pass to compute states at nodes when starting from the single start_state (minimized):
        - For each node U in T_suffix:
          - state_suffix[U] = δ*(start_min_state, label(U)).
        - This is another linear pass: O(|E_suffixes|).

      - Compute canonical signatures bottom-up by increasing depth:
        - For each suffix string s (node U), the canonical signature is:
          - A sorted/deduped list:
            - for each prefix position p in [1..|s|]:
              - for each group g in groups_accept[ state_at_prefix_node_for_length(p) ]:
                - append (g, p, Sig(s[p..]))
            - final_state_minimized = Some(state_suffix[U]) only if there were zero matches; otherwise None.
        - Because s[p..] is strictly shorter than s, we can compute Sig(s) in increasing order of length. The Sig(s[p..]) for shorter suffixes is already interned.
        - To enumerate “state_at_prefix_node_for_length(p)” we use the parent chain along T_suffix (or cache a direct pointer to each prefix node to avoid climbing). The total work across all nodes is linear in the total length of all suffix strings, which is O(|E_suffixes|).

      - Intern canonical signatures as usual (with a fast fingerprint + equality check). Because we iterate in ascending length order and reuse signature IDs for shorter suffixes, building these signatures is almost purely memory-local.

      - The output of this step is:
        - For every suffix string node U (i.e., every (token, position) remainder), we have Sig_id_suffix[U] = SignatureId for that suffix string from start_state.


      ### 4) Top-Level Classification Across Initial States (But Using Minimized States)

      At this point:
      - We know Sig_id for every remainder needed by any token (suffix computed once, from start_state).
      - For the vocabulary trie, we have states_at_node[leaf][m] for each token leaf and minimized initial state m, and accept_groups at every depth.

      Now we build each token’s signature vector across the (reduced) set of initial minimized states:

      For each token (leaf node L in the vocabulary trie):
      - For each minimized initial state m in [0..M-1]:
        - Build matches_m as follows:
          - Walk the path root→L, depth d from 1..len(token):
            - For each group g in accept_groups[node_at_depth_d][m]:
              - remainder_sig = Sig_id_suffix[ suffix_trie_node_token_remainder_at_position(d) ]
              - Push (g, d, remainder_sig)
        - Sort/dedup matches_m (usually tiny; cost is negligible).
        - If matches_m is empty:
          - final_state = Some(states_at_node[L][m])  // minimized end-state id for m after full token
        - Else:
          - final_state = None
        - Intern CanonicalSignature { matches: matches_m, final_state } → SignatureId_m

      - The token’s classification key is the vector [SignatureId_m] for all m.

      - Group tokens by equality of this vector to produce equivalence classes.

      Complexity:
      - The path enumeration per token per m costs O(len(token)) pushes of accept groups. Since accept_groups is typically tiny and len(token) is small, this is low constant overhead per byte.
      - The per-edge state propagation has already been done in O(|E_vocab| × M).
      - No regex engine executions are needed here; it’s all table lookups and small vector operations.


      ## Why This Can Hit ~10ms

      - Assume:
        - |E_vocab| ≈ total bytes across all tokens ≈ 250k
        - |E_suffixes| ≈ sum of suffix lengths across all tokens ≈ 750k
        - M ≈ 32 (after minimization; realistic for many practical DFAs)
      - Table-driven transitions: (250k + 750k) × 32 = 32 million next_state lookups.
        - With a contiguous next_state table: next_state[state][byte] stored in a flat array, this is extremely cache-friendly.
        - 32 million integer loads and stores is well within a few milliseconds on modern CPUs.
      - Signature assembly:
        - Matches per token are small; total memory traffic is low.
        - Signature interning uses a 128-bit fingerprint and very small equality checks; number of unique signatures for suffixes and top-levels stays near the reported 5k–20k classes — tiny compared to 32 million transitions.
      - No dynamic engine calls in the inner loops; everything is precomputed and table-driven.


      ## Design Details and Notes

      ### Outputs (anchored accept groups)

      - Precompute `groups_accept[min_state] -> SmallVec<GroupID>`. This should already be implicit in the DFA if it’s compiled from a union of anchored sub-patterns corresponding to token IDs/groups.
      - This output is the “observable” that determines which matches fire at each prefix position (length).

      ### CanonicalSignature.final_state

      - Current code uses original DFA numeric state in `final_state`.
      - For the new plan, use the minimized state ID instead (only when there are zero matches).
      - This change removes artificial distinctions between states that are observationally identical for all future inputs (which is what matters for equivalence). It also reduces the number of distinct signatures, improving interning hit rates.

      ### Data Structures

      - `next_state`: a contiguous `u32` or `u16` table of shape [M][256]. If M <= 65535, use `u16` to halve bandwidth.
      - `states_at_node`: store as a flat array of length (#trie_nodes × M). This is SoA-like and cache-friendly. For a 200k-node trie and M=32, this is ~6.4M entries → ~12.8MB if `u16`.
      - `accept_groups`: store per state as a small list (SmallVec); often size <= 2. Access is random but very cheap.
      - `Sig_id_suffix`: an array per suffix-trie node storing a `SignatureId` (usize/u32).
      - `SignatureInterner`: keep your custom 128-bit fingerprint; consider adding a fast, inline canonicalization pass (the matches list is tiny).

      ### Tries

      - Vocabulary trie (prefix trie of all tokens):
        - Build once; keep node -> parent and node -> children.
        - Also keep a pointer from each leaf to its list of suffix-trie nodes representing remainders at every position; or keep an O(1) function mapping (token index, position) to suffix-trie node. This avoids searching suffix-trie for each remainder.
      - Suffix-trie (prefix trie of all suffixes):
        - Build by inserting all suffixes of all tokens (including empty suffix).
        - Keep node -> parent; keep an array of nodes bucketed by depth so we can iterate in ascending length when computing suffix signatures.

      ### Avoiding Duplicate Work

      - The current SuffixDeduper avoids repeated hashing of suffix content; the suffix-trie formalizes and extends this — we compute transitions and matches for all suffixes exactly once, in a single linear pass.
      - We never call `execute_from_state2` in a hot loop anymore. If needed, we can keep it for verification only.

      ### Memory Budget

      - With M small (e.g., 16–64), all arrays fit comfortably into tens of MB.
      - If M remains large (e.g., 256–1024), still consider:
        - Minimization (often essential),
        - Reducing the set of “initial contexts” by merging them upfront using the same minimization (if your initial_states are essentially “all states”, you likely only need one representative per equivalence class of states),
        - Using `u16` for minimized state IDs if M < 65536.

      ### Parallelism

      - The two large passes (vocab-trie propagation and suffix-trie propagation) are embarrassingly parallel per edge if you chunk carefully. But since memory bandwidth is often the limiting factor, a single-threaded version may already saturate caches. Parallelize only if profiling indicates a benefit.

      ### Determinism

      - Retain BTreeMap/BTreeSet at output boundaries if you need determinism.
      - Interners are deterministic if you preserve insertion order and use stable hashing.

      ### Correctness Notes

      - Zero-width matches: still filter out position == 0 (as today).
      - Remainders always restart at start_state: the suffix-signature computation satisfies this naturally.
      - CanonicalSignature equality remains “structural”: a suffix signature ID is unique per content-equivalence, independent of the token from which it originated.
      - Verification: keep the brute-force verifier as a slow, optional debug tool to validate the new algorithm on small test sets.

      ### Estimated Speed-Up

      - Remove per-suffix regex execution and per-token per-state engine runs → major constant factor win.
      - Reduce state-space via minimization → multiplicative reduction in “states × edges”.
      - Amortize all work across shared prefixes/suffixes → transforms “tokens × states × length” into “(sum lengths) × M with sharing,” which is much smaller.


      ## Migration Blueprint (No Code Yet)

      Here’s a stepwise plan you can implement incrementally while maintaining correctness:

      1) Expose DFA tables and accept outputs:
         - Ensure you can access a contiguous `next_state[min_state][byte]`.
         - Export `groups_accept[min_state]` as precomputed SmallVecs.

      2) Minimization:
         - Implement Hopcroft/minimization for the DFA as a Moore machine with outputs = `groups_accept`.
         - Produce:
           - `min_state_of_orig[orig_state]`,
           - `next_state_min[min_state][byte]`,
           - `groups_accept_min[min_state]`,
           - `start_min_state`.

      3) Build tries:
         - Construct `TrieVocab` on all tokens.
         - Construct `TrieSuffix` on all suffixes of all tokens (including empty).
         - Keep mappings:
           - For each token leaf, a vector `suffix_node_at_pos[d]` in `TrieSuffix` for remainder after d bytes.

      4) Precompute transitions:
         - Vocab pass: fill `states_at_node_v[node][m]` by a single BFS/DFS of `TrieVocab`.
         - Suffix pass: fill `state_suffix[node]` by a single BFS/DFS of `TrieSuffix` from `start_min_state`.

      5) Compute suffix signatures:
         - Bucket `TrieSuffix` nodes by depth.
         - For depth ascending:
           - For each node `U` (string `s`):
             - Enumerate prefixes of `s` via parent chain to gather matches (positions p and groups from `groups_accept_min[state_at_prefix]]`).
             - For each match at position p, get `Sig_id_suffix[ suffix_node_of(s[p..]) ]` (already computed).
             - Build CanonicalSignature for `s` (sort/dedup matches; set final_state only if matches empty, using `state_suffix[U]`).
             - Intern → `Sig_id_suffix[U]`.

      6) Top-level per-token vectors:
         - For each token leaf `L`:
           - For each minimized initial state `m`:
             - Walk root→L; at each depth d:
               - For each group g in `groups_accept_min[ states_at_node_v[node_at_d][m] ]`:
                 - Get remainder `Sig_id_suffix[ suffix_node_at_pos[d] ]`.
                 - Append (g, d, remainder).
             - Sort/dedup; final_state = Some(states_at_node_v[L][m]) if no matches else None.
             - Intern CanonicalSignature → `Sig_top[L][m]`.
           - The classification key is the vector `Sig_top[L][m]` over all `m`.
         - Group tokens by equality of these vectors.

      7) Verification and cleanup:
         - Run the existing brute-force verification on small datasets to ensure identical partitions.
         - Replace old on-demand recursion with the new pipeline in production builds.


      ## Optional Further Wins

      - SIMD or “byte-chunk composition”: precompute next_state for 2-byte or 4-byte chunks to reduce per-edge multiplications. This is an advanced micro-optimization once the macro redesign is in place.
      - Use a double-array trie to make children access O(1) with fewer cache misses.
      - Persist and reuse tries and minimized DFA across runs if the regex and vocab are stable.


      ## Final Remarks

      The proposed approach changes the asymptotics and the constants at the same time:
      - It eliminates per-suffix/per-state regex scans entirely,
      - It amortizes all state propagation across shared prefixes in tries,
      - It collapses initial contexts via minimization,
      - It constructs canonical signatures with a single bottom-up pass on suffixes.

      This is the “big picture” change likely to shrink 10s to <10ms for the target sizes. When you implement it, favor simple, cache-friendly arrays and straight-line loops; at this scale, the memory layout decisions will matter more than additional micro-optimizations inside hashing or maps.
