      In usual product DFA construction, we're at a state. A product state is a tuple of constituent states. Look at a transition for a symbol. The destination is the tuple of destinations of each of its constituents under that same symbol.
      What's nice about product construction for the purpose of building a DWA is that in the destination tuples, instead of writing the sink state fo a constituent DFA in the tuple, we can substitute in any state from that constituent DFA instead.
      This means we can avoid constructing some product states containing sinks, substituting for sink states so that we end up with another existing state instead.
      The natural question is: What state do we substitute in? That's not such an easy question to answer.
      We might imagine an optimal way of doing this if we build the full product and then figure out an optimal way of reassigning sinks. But that requires building the full product, which could be very inefficient.
      I could imagine doing it greedily. Suppose we have a destination state with a sink at one index. We could look for another existing product state that's the same at all non-sink positions in the tuple, and sub that in. This might actually even be the locally optimal decision.
      But consider the possibility there's no such existing state at this point. Do we create a new state with the sinks still in the tuple? Well then we potentially forgo future opportunities to merge into this. Do we insert some random states into the sink positions? But then what ones? If only we could look into the future.

      A more concrete example. Suppose we are looking at a dest transition (q1, rs) where rs is a sink for constituent r. We try to find an existing state (q1, r*) for any r*. What if none exists?  Maybe we just add (q1, rs) as is.
      But then what if later on we get a dest (q1, r2). Well, we could have merged (q1, rs) and (q1, r2) if we'd known about it earlier. But now we've already created (q1, rs) so...
      What if we just guess and sub r2 in for rs? So in the first instance add (q1, r2). Well then yippe we might get lucky later on. But what if we don't encounter another dest (q1, r2) later, and instead encounter (q1, r3)? Whoopsie, should have chosen r3.

      Maybe we could defer the creation of states with sinks in them as much as possible. Like process states and only commit to them in order of how many sinks they have, with 0 sinks being processed first.

      But still I can imagine cases where this leads to suboptimal results.
      Maybe this problem is NP-hard or something? Or maybe it isn't but it's still impossible to solve without constructing the full product DFA anyway.

      Maybe constructing the full product isn't that bad. We don't actually need to construct the product. We only need to discover all its states. Then with those states we can try to optimize them.

      Maybe there's a chunk based approach. We create a bunch of states until we have 100k undecided states. Then we stop and optimize those, merging them. Then we continue until... undecided states are just those that have any sink.

      ...

      Ok let's go with the approach where we create ALL states and then merge them optimally.
