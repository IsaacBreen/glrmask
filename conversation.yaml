      Below are targeted, mechanical changes that remove the LR(1) lookahead blow-up from state construction, stop cloning productions, and deduplicate states by kernel (prod, dot) only. These three changes together typically bring stage_1 down from seconds to well under 0.1s.

      High-level plan:
      - Canonicalize state keys: treat states as kernels (prod, dot) only. Ignore lookaheads when deciding if a state (kernel) is new. This collapses many LR(1) lookahead-variants into a single LALR state.
      - Make compute_closure fast in LALR mode: expand only by nonterminals ignoring lookaheads and attach lookaheads only for reduce items using FOLLOW sets. This removes the expensive FIRST-propagation recursion from stage_1.
      - Stop cloning productions in closure: keep a single Arc per production and reuse it everywhere to avoid repeated allocations and string comparisons.

