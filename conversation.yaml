      // --- JSONConvertible Trait ---
      pub trait JSONConvertible: Sized {
          fn to_json(&self) -> JSONNode;
          fn from_json(node: JSONNode) -> Result<Self, String>;
      }

      impl<T> Into<T> for JSONNode
      where
          T: JSONConvertible,
