    src/macro.rs: |
      /// Macro for creating a sequence of parsers
      #[macro_export]
      macro_rules! seq_fast {
          ($($x:expr),* $(,)?) => {
              $crate::interface::seq_fast(vec![$($x),*])
          };
      }

      /// Macro for creating a choice of parsers
      #[macro_export]
      macro_rules! choice_fast {
          ($($x:expr),* $(,)?) => {
              $crate::interface::choice_fast(vec![$($x),*])
          };
      }

      use once_cell::sync::Lazy;
      use std::env;
      use std::sync::Mutex;

      /// Returns the current debug level, read from the `MACRO_DEBUG_LEVEL` environment variable.
      pub fn get_macro_debug_level() -> usize {
          static MACRO_DEBUG_LEVEL: Lazy<usize> =
              Lazy::new(|| env::var("MACRO_DEBUG_LEVEL").ok().and_then(|s| s.parse().ok()).unwrap_or(5));
          *MACRO_DEBUG_LEVEL
      }

      /// Checks if a given debug level is enabled based on `MACRO_DEBUG_LEVEL`.
      pub fn is_debug_level_enabled(level: usize) -> bool {
          level <= get_macro_debug_level()
      }

      /// Tracks the last filename printed by the debug macro to avoid repetition.
      pub static LAST_DEBUG_FILE: Lazy<Mutex<String>> = Lazy::new(|| Mutex::new(String::new()));

      /// Tracks the last time a debug message was printed.
      pub static LAST_DEBUG_TIME: Lazy<Mutex<Option<std::time::Instant>>> = Lazy::new(|| Mutex::new(None));

      /// Tracks if the last debug message was a 'start' message that didn't print a newline.
      pub static PENDING_INCOMPLETE_LINE: Lazy<Mutex<bool>> = Lazy::new(|| Mutex::new(false));

      /// A list of filenames (not full paths) to allow debug messages from.
      pub const ALLOWED_FILES: &[&str] = &[
          // "parser.rs",
          // "constraint.rs",
      ];

      /// Formats a duration as seconds if >= 1000ms, otherwise milliseconds.
      pub fn format_duration(d: std::time::Duration) -> String {
          let millis = d.as_millis();
          if millis >= 1000 {
              format!("{:.2}s", millis as f64 / 1000.0)
          } else {
              format!("{}ms", millis)
          }
      }

      /// Internal implementation for the new grouped format (debug!).
      /// Uses ANSI colors: Bold Cyan for files, Dark Gray for line numbers.
      #[doc(hidden)]
      #[macro_export]
      macro_rules! __debug_grouped_impl {
          ($level:expr, $user_fmt:expr, $($user_args:tt)*) => {{
              if $level <= $crate::r#macro::get_macro_debug_level() {
                  let current_file_path = std::path::Path::new(file!());
                  let current_filename = current_file_path.file_name()
                      .map_or("", |os_str| os_str.to_str().unwrap_or(""));

                  if $crate::r#macro::ALLOWED_FILES.is_empty() || $crate::r#macro::ALLOWED_FILES.contains(&current_filename) {
                      let mut last_file_guard = $crate::r#macro::LAST_DEBUG_FILE.lock().unwrap();
                      let mut last_time_guard = $crate::r#macro::LAST_DEBUG_TIME.lock().unwrap();
                      let mut pending_guard = $crate::r#macro::PENDING_INCOMPLETE_LINE.lock().unwrap();

                      if *pending_guard {
                          println!();
                          *pending_guard = false;
                      }
                      let now = std::time::Instant::now();

                      let elapsed_suffix = if let Some(last_time) = *last_time_guard {
                          let diff = now.duration_since(last_time);
                          if diff.as_millis() > 1 {
                              format!(" \x1b[35m+{}\x1b[0m", $crate::r#macro::format_duration(diff))
                          } else {
                              String::new()
                          }
                      } else {
                          String::new()
                      };
                      *last_time_guard = Some(now);

                      let current_file_str = file!();

                      // If filename changed, print it in Bold Cyan
                      if *last_file_guard != current_file_str {
                          // \x1b[1;36m = Bold Cyan, \x1b[0m = Reset
                          println!("\x1b[1;36m{}\x1b[0m", current_file_str);
                          *last_file_guard = current_file_str.to_string();
                      }

                      // Print line number in Dark Gray, then the message
                      // \x1b[90m = Dark Gray (Bright Black)
                      println!(
                          concat!("\x1b[90m  {:>4}\x1b[0m  ", "{}", "{}"),
                          line!(),
                          format_args!($user_fmt, $($user_args)*),
                          elapsed_suffix
                      );
                  }
              }
          }};
      }

      /// Internal implementation for the start of a debug span (debug_start!).
      /// Prints the message without a newline and sets the pending flag.
      #[doc(hidden)]
      #[macro_export]
      macro_rules! __debug_start_impl {
          ($level:expr, $user_fmt:expr, $($user_args:tt)*) => {{
              if $level <= $crate::r#macro::get_macro_debug_level() {
                  let current_file_path = std::path::Path::new(file!());
                  let current_filename = current_file_path.file_name()
                      .map_or("", |os_str| os_str.to_str().unwrap_or(""));

                  if $crate::r#macro::ALLOWED_FILES.is_empty() || $crate::r#macro::ALLOWED_FILES.contains(&current_filename) {
                      let mut last_file_guard = $crate::r#macro::LAST_DEBUG_FILE.lock().unwrap();
                      let mut last_time_guard = $crate::r#macro::LAST_DEBUG_TIME.lock().unwrap();
                      let mut pending_guard = $crate::r#macro::PENDING_INCOMPLETE_LINE.lock().unwrap();

                      if *pending_guard {
                          println!();
                          *pending_guard = false;
                      }
                      let now = std::time::Instant::now();

                      let elapsed_suffix = if let Some(last_time) = *last_time_guard {
                          let diff = now.duration_since(last_time);
                          if diff.as_millis() > 1 {
                              format!(" \x1b[35m+{}\x1b[0m", $crate::r#macro::format_duration(diff))
                          } else {
                              String::new()
                          }
                      } else {
                          String::new()
                      };
                      *last_time_guard = Some(now);

                      let current_file_str = file!();

                      if *last_file_guard != current_file_str {
                          println!("\x1b[1;36m{}\x1b[0m", current_file_str);
                          *last_file_guard = current_file_str.to_string();
                      }

                      print!(
                          concat!("\x1b[90m  {:>4}\x1b[0m  ", "{}", "{}"),
                          line!(),
                          format_args!($user_fmt, $($user_args)*),
                          elapsed_suffix
                      );
                      use std::io::Write;
                      let _ = std::io::stdout().flush();
                      *pending_guard = true;
                      Some(())
                  } else { None }
              } else { None }
          }};
      }

      /// Internal implementation for the old format (debug_line!).
      /// Uses ANSI colors: Bold Yellow for the tag.
      #[doc(hidden)]
      #[macro_export]
      macro_rules! __debug_line_impl {
          ($level:expr, $user_fmt:expr, $($user_args:tt)*) => {{
              if $level <= $crate::r#macro::get_macro_debug_level() {
                  let current_file_path = std::path::Path::new(file!());
                  let current_filename = current_file_path.file_name()
                      .map_or("", |os_str| os_str.to_str().unwrap_or(""));

                  if $crate::r#macro::ALLOWED_FILES.is_empty() || $crate::r#macro::ALLOWED_FILES.contains(&current_filename) {
                      let mut pending_guard = $crate::r#macro::PENDING_INCOMPLETE_LINE.lock().unwrap();
                      if *pending_guard {
                          println!();
                          *pending_guard = false;
                      }

                      // \x1b[1;33m = Bold Yellow
                      println!(
                          concat!("\x1b[1;33m[DEBUG] {}]\x1b[0m {}:{}: ", $user_fmt),
                          $level,
                          file!(),
                          line!(),
                          $($user_args)*
                      );
                  }
              }
          }};
      }

      /// Internal implementation for the timer end (debug_timer_end!).
      #[doc(hidden)]
      #[macro_export]
      macro_rules! __debug_timer_end_impl {
          ($token:expr, $thresh:expr, $user_fmt:expr, $($user_args:tt)*) => {{
              if let Some((start_time, start_msg, start_file, start_line)) = $token {
                  let now = std::time::Instant::now();
                  let elapsed = now.duration_since(start_time);
                  if elapsed.as_millis() >= $thresh as u128 {
                      let mut last_file_guard = $crate::r#macro::LAST_DEBUG_FILE.lock().unwrap();
                      let mut last_time_guard = $crate::r#macro::LAST_DEBUG_TIME.lock().unwrap();
                      let mut pending_guard = $crate::r#macro::PENDING_INCOMPLETE_LINE.lock().unwrap();

                      if *pending_guard {
                          println!();
                          *pending_guard = false;
                      }

                      let elapsed_suffix = if let Some(last_time) = *last_time_guard {
                          let diff = now.duration_since(last_time);
                          if diff.as_millis() > 1 {
                              format!(" \x1b[35m+{}\x1b[0m", $crate::r#macro::format_duration(diff))
                          } else {
                              String::new()
                          }
                      } else {
                          String::new()
                      };
                      *last_time_guard = Some(now);

                      let current_file_str = start_file;
                      if *last_file_guard != current_file_str {
                          println!("\x1b[1;36m{}\x1b[0m", current_file_str);
                          *last_file_guard = current_file_str.to_string();
                      }

                      println!(
                          concat!("\x1b[90m  {:>4}\x1b[0m  {} ... {} (\x1b[35m{}\x1b[0m){}"),
                          start_line,
                          start_msg,
                          format!($user_fmt, $($user_args)*),
                          $crate::r#macro::format_duration(elapsed),
                          elapsed_suffix
                      );
                  }
              }
          }};
      }

      /// The main debug macro.
      /// Prints filename (Bold Cyan) only when it changes.
      /// Prints line numbers (Dark Gray) indented.
      #[macro_export]
      macro_rules! debug {
          ($level:expr, $fmt:literal $(, $($arg:tt)*)?) => {
              $crate::__debug_grouped_impl!($level, $fmt, $($($arg)*)?);
          };
          ($level:expr, $msg:expr) => {
              $crate::__debug_grouped_impl!($level, "{:?}", $msg);
          };
      }

      /// The legacy debug macro.
      /// Prints [DEBUG] (Yellow) level] file:line: msg.
      #[macro_export]
      macro_rules! debug_line {
          ($level:expr, $fmt:literal $(, $($arg:tt)*)?) => {
              $crate::__debug_line_impl!($level, $fmt, $($($arg)*)?);
          };
          ($level:expr, $msg:expr) => {
              $crate::__debug_line_impl!($level, "{:?}", $msg);
          };
      }

      /// Starts a debug message that will be completed later.
      /// Returns a token that must be passed to `debug_end!`.
      #[macro_export]
      macro_rules! debug_start {
          ($level:expr, $fmt:literal $(, $($arg:tt)*)?) => {
              $crate::__debug_start_impl!($level, $fmt, $($($arg)*)?)
          };
          ($level:expr, $msg:expr) => {
              $crate::__debug_start_impl!($level, "{:?}", $msg)
          };
      }

      /// Completes a debug message started with `debug_start!`.
      /// If no other debug messages were printed in between, it appends to the same line.
      /// Otherwise, it prints the message on a new line with a continuation marker.
      #[macro_export]
      macro_rules! debug_end {
          ($token:expr, $fmt:literal $(, $($arg:tt)*)?) => {
              if $token.is_some() {
                  let mut pending_guard = $crate::r#macro::PENDING_INCOMPLETE_LINE.lock().unwrap();
                  if *pending_guard {
                      println!($fmt $(, $($arg)*)?);
                      *pending_guard = false;
                  } else {
                      println!(concat!("... ", $fmt) $(, $($arg)*)?);
                  }
              }
          };
          ($token:expr, $msg:expr) => {
              $crate::debug_end!($token, "{:?}", $msg);
          };
      }

      /// Starts a debug timer. Returns a token to be passed to `debug_timer_end!`.
      /// Nothing is printed immediately.
      #[macro_export]
      macro_rules! debug_timer_start {
          ($level:expr, $fmt:literal $(, $($arg:tt)*)?) => {
              if $level <= $crate::r#macro::get_macro_debug_level() {
                  let current_file_path = std::path::Path::new(file!());
                  let current_filename = current_file_path.file_name()
                      .map_or("", |os_str| os_str.to_str().unwrap_or(""));

                  if $crate::r#macro::ALLOWED_FILES.is_empty() || $crate::r#macro::ALLOWED_FILES.contains(&current_filename) {
                      Some((std::time::Instant::now(), format!($fmt $(, $($arg)*)?), file!(), line!()))
                  } else {
                      None
                  }
              } else {
                  None
              }
          };
          ($level:expr, $msg:expr) => {
              $crate::debug_timer_start!($level, "{:?}", $msg)
          };
      }

      /// Ends a debug timer. Prints only if elapsed time >= threshold (default 10ms).
      /// Usage:
      /// debug_timer_end!(token, "Done"); // Default 10ms
      /// debug_timer_end!(token, thresh=50, "Done"); // 50ms threshold
      #[macro_export]
      macro_rules! debug_timer_end {
          ($token:expr, thresh = $thresh:expr, $fmt:literal $(, $($arg:tt)*)?) => {
              $crate::__debug_timer_end_impl!($token, $thresh, $fmt $(, $($arg)*)?)
          };
          ($token:expr, thresh = $thresh:expr, $msg:expr) => {
              $crate::__debug_timer_end_impl!($token, $thresh, "{:?}", $msg)
          };
          ($token:expr, $fmt:literal $(, $($arg:tt)*)?) => {
              $crate::__debug_timer_end_impl!($token, 10, $fmt $(, $($arg)*)?)
          };
          ($token:expr, $msg:expr) => {
              $crate::__debug_timer_end_impl!($token, 10, "{:?}", $msg)
          };
      }
    src/finite_automata.rs: |
      use crate::datastructures::char_transitions::CharTransitions;
      use crate::datastructures::frozenset::FrozenSet;
      use crate::datastructures::u8set::U8Set;
      use crate::json_serialization::{JSONConvertible, JSONNode};
      use std::collections::{BTreeMap, BTreeSet};
      use std::collections::BTreeMap as StdMap;
      use std::collections::HashMap;
      use std::fmt::{Debug, Display, Formatter};
      use std::sync::Arc;
      use memory_stats::memory_stats;

      pub type GroupID = usize;

      #[derive(Debug, Clone)]
      pub struct NFAState {
          /// Non-epsilon transitions: list of (input byte, target state).
          /// There may be multiple entries with the same input byte (non-determinism).
          transitions: Vec<(u8, usize)>,
          /// Epsilon transitions: target states reachable without consuming input.
          epsilon_transitions: Vec<usize>,
          finalizers: BTreeSet<GroupID>,
          non_greedy_finalizers: BTreeSet<GroupID>,
      }

      // Manual impl for NFAState
      impl JSONConvertible for NFAState {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();

              // Serialize transitions as a map from u8 to Vec<usize>,
              // matching the previous TrieMap<Vec<usize>> representation.
              let mut transitions_map: StdMap<String, JSONNode> = StdMap::new();
              let mut grouped: BTreeMap<u8, Vec<usize>> = BTreeMap::new();
              for &(byte, target) in &self.transitions {
                  grouped.entry(byte).or_default().push(target);
              }
              for (byte, targets) in grouped {
                  transitions_map.insert(byte.to_string(), targets.to_json());
              }
              obj.insert("transitions".to_string(), JSONNode::Object(transitions_map));

              obj.insert(
                  "epsilon_transitions".to_string(),
                  self.epsilon_transitions.to_json(),
              );
              obj.insert("finalizers".to_string(), self.finalizers.to_json());
              obj.insert(
                  "non_greedy_finalizers".to_string(),
                  self.non_greedy_finalizers.to_json(),
              );
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      // Deserialize transitions from the old JSON format:
                      // { "<u8>": [usize, usize, ...], ... }
                      let transitions_node = obj
                          .remove("transitions")
                          .ok_or_else(|| "Missing field transitions for NFAState".to_string())?;

                      let mut transitions: Vec<(u8, usize)> = Vec::new();
                      match transitions_node {
                          JSONNode::Object(map) => {
                              for (key_str, val_node) in map {
                                  let byte = key_str.parse::<u8>().map_err(|e| {
                                      format!(
                                          "Invalid u8 key in NFAState transitions: {}, err: {}",
                                          key_str, e
                                      )
                                  })?;
                                  let targets = Vec::<usize>::from_json(val_node)?;
                                  for target in targets {
                                      transitions.push((byte, target));
                                  }
                              }
                          }
                          other => {
                              return Err(format!(
                                  "NFAState 'transitions' field must be a JSON object, got {:?}",
                                  other
                              ))
                          }
                      }

                      let epsilon_transitions = obj
                          .remove("epsilon_transitions")
                          .ok_or_else(|| "Missing field epsilon_transitions for NFAState".to_string())
                          .and_then(Vec::<usize>::from_json)?;
                      let finalizers = obj
                          .remove("finalizers")
                          .ok_or_else(|| "Missing field finalizers for NFAState".to_string())
                          .and_then(BTreeSet::<GroupID>::from_json)?;
                      let non_greedy_finalizers = obj
                          .remove("non_greedy_finalizers")
                          .ok_or_else(|| {
                              "Missing field non_greedy_finalizers for NFAState".to_string()
                          })
                          .and_then(BTreeSet::<GroupID>::from_json)?;
                      Ok(NFAState {
                          transitions,
                          epsilon_transitions,
                          finalizers,
                          non_greedy_finalizers,
                      })
                  }
                  _ => Err("Expected JSONNode::Object for NFAState".to_string()),
              }
          }
      }

      #[derive(Debug, Clone)]
      pub struct NFA {
          states: Vec<NFAState>,
          start_state: usize,
      }

      // Manual impl for NFA
      impl JSONConvertible for NFA {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("states".to_string(), self.states.to_json());
              obj.insert("start_state".to_string(), self.start_state.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let states = obj
                          .remove("states")
                          .ok_or_else(|| "Missing field states for NFA".to_string())
                          .and_then(Vec::<NFAState>::from_json)?;
                      let start_state = obj
                          .remove("start_state")
                          .ok_or_else(|| "Missing field start_state for NFA".to_string())
                          .and_then(usize::from_json)?;
                      Ok(NFA {
                          states,
                          start_state,
                      })
                  }
                  _ => Err("Expected JSONNode::Object for NFA".to_string()),
              }
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct DFAState {
          pub transitions: CharTransitions<usize>,
          pub finalizers: BTreeSet<GroupID>,
          pub possible_future_group_ids: BTreeSet<GroupID>,
          pub group_id_to_u8set: BTreeMap<GroupID, U8Set>,
      }

      // Manual impl for DFAState
      impl JSONConvertible for DFAState {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("transitions".to_string(), self.transitions.to_json());
              obj.insert("finalizers".to_string(), self.finalizers.to_json());
              obj.insert(
                  "possible_future_group_ids".to_string(),
                  self.possible_future_group_ids.to_json(),
              );
              obj.insert(
                  "group_id_to_u8set".to_string(),
                  self.group_id_to_u8set.to_json(),
              );
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let transitions = obj
                          .remove("transitions")
                          .ok_or_else(|| "Missing field transitions for DFAState".to_string())
                          .and_then(|n| CharTransitions::<usize>::from_json(n))?;
                      let finalizers = obj
                          .remove("finalizers")
                          .ok_or_else(|| "Missing field finalizers for DFAState".to_string())
                          .and_then(BTreeSet::<GroupID>::from_json)?;
                      let possible_future_group_ids = obj
                          .remove("possible_future_group_ids")
                          .ok_or_else(|| {
                              "Missing field possible_future_group_ids for DFAState".to_string()
                          })
                          .and_then(BTreeSet::<GroupID>::from_json)?;
                      let group_id_to_u8set = obj
                          .remove("group_id_to_u8set")
                          .ok_or_else(|| {
                              "Missing field group_id_to_u8set for DFAState".to_string()
                          })
                          .and_then(|n| BTreeMap::<GroupID, U8Set>::from_json(n))?;
                      Ok(DFAState {
                          transitions,
                          finalizers,
                          possible_future_group_ids,
                          group_id_to_u8set,
                      })
                  }
                  _ => Err("Expected JSONNode::Object for DFAState".to_string()),
              }
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct DFA {
          pub states: Vec<DFAState>,
          pub start_state: usize,
          pub non_greedy_finalizers: BTreeSet<GroupID>,
      }

      // Manual impl for DFA
      impl JSONConvertible for DFA {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("states".to_string(), self.states.to_json());
              obj.insert("start_state".to_string(), self.start_state.to_json());
              obj.insert(
                  "non_greedy_finalizers".to_string(),
                  self.non_greedy_finalizers.to_json(),
              );
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let states = obj
                          .remove("states")
                          .ok_or_else(|| "Missing field states for DFA".to_string())
                          .and_then(Vec::<DFAState>::from_json)?;
                      let start_state = obj
                          .remove("start_state")
                          .ok_or_else(|| "Missing field start_state for DFA".to_string())
                          .and_then(usize::from_json)?;
                      let non_greedy_finalizers = obj
                          .remove("non_greedy_finalizers")
                          .ok_or_else(|| {
                              "Missing field non_greedy_finalizers for DFA".to_string()
                          })
                          .and_then(BTreeSet::<GroupID>::from_json)?;
                      Ok(DFA {
                          states,
                          start_state,
                          non_greedy_finalizers,
                      })
                  }
                  _ => Err("Expected JSONNode::Object for DFA".to_string()),
              }
          }
      }

