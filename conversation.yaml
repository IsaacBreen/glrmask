      pub fn disallowed_terminals_union_assign(left: &mut TerminalInfo, right: TerminalInfo) {
          let mut all_keys = BTreeSet::new();
          all_keys.extend(left.keys());
          all_keys.extend(right.keys());
          for tokenizer_state_id in all_keys {
