              s, e = a[i]
              return s <= x <= e

          # ---------- Set operations ----------

          def union(self, other: "RangeSet") -> "RangeSet":
              if self.is_empty():
                  return other
              if other.is_empty():
                  return self
              a, b = self.intervals, other.intervals
              i = j = 0
              out: List[Tuple[int, int]] = []
              def append_or_merge(s: int, e: int) -> None:
                  if not out:
                      out.append((s, e)); return
                  ps, pe = out[-1]
