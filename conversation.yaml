                      edges = arena.get(node, {}).get("children") or []
                      stats['edges_traversed'] += len(edges)  # number of edge-groups
                      for (pop, llm_bv), dests in edges:
                          stats['llm_bv_total_len'] += len(llm_bv)
                          dest_len_hist[len(dests)] += 1
