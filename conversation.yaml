          // B  ::=  (* epsilon *)
          let productions = vec![
              prod("S'", vec![nt("A"), t("$")]), // Start rule
              prod("A", vec![nt("B"), t("c")]),
              prod("B", vec![t("d")]),
              prod("B", vec![]), // Epsilon production for B
