              assert_eq!(edge_info_at_step.len(), 3); // 3 edges traversed (r->c1, r->c2, c1->gc)
              assert!(edge_info_at_step.contains(&("r->c1", "e1")));
              assert!(edge_info_at_step.contains(&("r->c2", "e2")));
              assert!(edge_info_at_step.contains(&("c1->gc", "e3")));
          }

