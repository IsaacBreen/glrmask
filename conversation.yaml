          def empty() -> 'PyRangeSet':
              """Creates an empty PyRangeSet."""
              return PyRangeSet()

          def to_indices(self) -> List[int]:
              """Converts the PyRangeSet to a list of individual indices."""
              result = []
              for start, end in self.intervals:
                  result.extend(range(start, end + 1))
              return result

