      High-level plan and reasoning

      - Key observation: After splitting the weighted NWA into per-atom DFAs and determinizing/minimizing each, the global product automaton over tuples of component states is a deterministic Mealy machine:
        - Each state is a tuple of component DFA states (or None for sink).
        - Each transition (symbol) has an output weight which is the union of atom-weights for components that survive this symbol (i.e., do not go to sink).
        - Each state has a final (output) weight which is the union of atom-weights for components that are currently accepting.

