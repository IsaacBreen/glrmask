        - get_mask.apply.cache_hits
        - get_mask.isolate_many.cache_hits

      Formal correctness quick proofs

      - Descendant closure:
        Define Reach(u) = set of tokens that can appear in final_mask by any path from u to an end, under the requirement that along the path token masks are intersected at each edge.
        Define C(u) recursively as:
          C(u) = all_ones, if u.clean_end
                 ⋃_{edges e from u} ( llm_bv(e) ∩ ( ⋃_{d∈dests(e)} C(d) ) ), otherwise.
        Any path P = (e1, e2, ..., ek, end) yields mask M(P) = ⋂_{i=1..k} llm_bv(ei).
        By induction on k, M(P) ⊆ C(u). Therefore Reach(u) ⊆ C(u).
        If C(u) ∩ remaining ∩ current_acc_mask = ∅, no path from u can add to final_mask, and pruning u is exact.

      - Pop-bucket state pruning:
        Let S = peek(popn(gss, p)), and U_states[p] = ⋃ over edges with pop p of dest_states_union. If S ∩ U_states[p] = ∅, then for every edge e with pop p and dest index j, D(e,j) ⊆ U_states[p], so (S ∩ D(e,j)) = ∅. No destinations survive. Pruning the bucket is exact.

      - Pop-bucket LLM pruning:
        Let M be the acc.llm_mask after pop. Let U_llm[p] = ⋃ over edges with pop p of llm_bv(e). If M ∩ U_llm[p] = ∅, then M ∩ llm_bv(e) = ∅ for each edge in the bucket. Every apply-and-prune would delete. Pruning the bucket is exact.

      - Global popn cache:
        popn depends only on (gss, p). Reuse is exact.

      - apply_and_prune caching and moving apply before isolate:
        For any mask-transform F_b that intersects the acc.llm_mask with b and prunes empties, and for any subset of head states H, we have:
          isolate_many(H, apply_and_prune(F_b, popped)) = apply_and_prune(F_b, isolate_many(H, popped)),
        because F_b acts pointwise on accs and isolate_many merely restricts heads to H. Therefore computing apply once per (popped, b) and reusing over multiple groups is exact.

      - Priority changes are not required for correctness and we keep the same traversal order, but prune earlier and cache more. If you later change priorities, the algorithm still enumerates identical states/edges and unions; order doesn’t affect final_mask.

