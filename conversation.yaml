          let mask = constraint_state.get_mask();

          let d_id = llm_token_map.get_by_left(&b"def"[..]).unwrap().0;
          assert!(mask.contains(d_id), "Expected LLM token ID {} to be in mask", d_id);

          // Step and commit the LLM token "a" repeatedly.
