              fn mutate_acc<A, B, M>(
                  a: &A,
                  memo: &mut StdHashMap<A, Option<B>>,
                  m: &mut M,
              ) -> Option<B>
              where
                  A: Clone + Eq + Hash,
                  B: Clone,
                  M: FnMut(&A) -> Option<B>,
              {
