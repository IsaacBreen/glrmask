                  productions,
                  terminal_map,
                  non_terminal_map,
                  item_set_map,
                  start_state_id,
              }
          }

          pub fn init_glr_parser(&self, llm_vocab: Option<Arc<LLMVocab>>) -> GLRParserState { // No longer generic
