                          pop=loaded_edge.pop,
                          llm_bv=loaded_edge.llm_bv,
                          dests=IntermediateArenaEdgeDest(d.dest_idx, d.state_bv),
                      ))
              intermediate_arena[uid] = IntermediateArenaNode(
                  children=intermediate_children,
                  clean_end=loaded_node.clean_end,
