  - assistant: |-
      This is a great feature for focusing the delta-debugging process. I will modify `scripts/delta_debug.py` to accept a comma-separated list of tokens via a new command-line argument, `--keep-tokens`, and ensure those tokens are never removed during minimization.

      ### Step-by-step Instructions

      1.  **Import `argparse`:** Add `import argparse` to the imports section at the top of `scripts/delta_debug.py`.
      2.  **Add `argparse` and `--keep-tokens`:** In the `main` function, add argument parsing for the new `--keep-tokens` argument.
      3.  **Separate Vocabulary:** After loading the original vocabulary, split it into two lists: `fixed_vocab` (tokens to keep) and `removable_vocab` (tokens to minimize).
      4.  **Update Minimization Logic:**
          *   The delta-debugging loop will now operate only on `minimal_removable_vocab`.
          *   Any test vocabulary (`test_vocab`) created for a parallel run must be the union of `fixed_vocab` and the current `test_removable_vocab`.
          *   The final result will be the union of `fixed_vocab` and the minimized `minimal_removable_vocab`.

      ### Git Diff

      Here is the git diff to apply these changes to `scripts/delta_debug.py`.

      ```diff
      diff --git a/scripts/delta_debug.py b/scripts/delta_debug.py
      index 575317b..5454179 100644
      --- a/scripts/delta_debug.py
      +++ b/scripts/delta_debug.py
      @@ -5,6 +5,7 @@
