              assert!(set.contains(0));
              assert!(set.contains(large_idx));
              assert!(!set.contains(1));
              assert!(!set.contains(large_idx - 1));

              set.remove(large_idx);
              assert_eq!(set.len(), 1);
              assert!(set.contains(0));
