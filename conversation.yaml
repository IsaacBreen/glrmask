      #[cfg(test)]
      mod tests {
          use super::*;
          use std::sync::atomic::{AtomicUsize, Ordering};
          use std::collections::{HashSet, HashMap};
          use crate::datastructures::hybrid_bitset::HybridBitset; // Import HybridBitset for tests
