      - Coalesce-by-destination within a node: for a given pop value, union LLM-token bitsets for edges that target the same child with identical StateIDBV, reducing multiple keys to one.
      - Shortcut chains of pop=0 edges: collapse sequences where after some edge, successive edges have pop=0, by intersecting state filters and LLM tokens; this never increases edge count and can remove intermediate nodes after later GC.
      - Shortcut via universal first edge: if the first edge has full LLM tokens and full state set and the intermediate node has exactly one outgoing edge (any pop, any LLM), redirect the edge and add pops; this doesn’t increase edge count, and GC will remove the intermediate node when it becomes unreachable.

