      use std::collections::{BTreeMap, HashMap};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{
          LLMTokenBV, PrecomputeNode3Index, PrecomputedNodeContents, StateIDBV, Trie3GodWrapper,
      };
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;

      /// Factor out common destinations: create intermediates when many sources share the same dest map.
      pub fn factor_common_destinations_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          min_incoming: usize,
      ) {
          crate::debug!(2, "Factoring out common destinations in Trie3.");
          // use dynamic threshold provided by config via min_incoming
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let all_llm_bv = LLMTokenBV::ones(max_llm_token_id + 1);
          let all_sids_bv = StateIDBV::ones(max_state_id + 1);

          // Map: dest -> { (pop, llm_bv) -> { state_id_bv -> [sources] } }
          let mut incoming_map: HashMap<
              PrecomputeNode3Index,
              HashMap<(isize, LLMTokenBV), HashMap<StateIDBV, Vec<PrecomputeNode3Index>>>,
          > = HashMap::new();

          for src_idx in &all_nodes {
              let guard = src_idx.read(trie3_god).expect("read");
              for (edge_key, dest_map) in guard.children() {
                  for (dest_idx, sids_bv) in dest_map {
                      incoming_map
                          .entry(*dest_idx)
                          .or_default()
                          .entry(edge_key.clone())
                          .or_default()
                          .entry(sids_bv.clone())
                          .or_default()
                          .push(*src_idx);
                  }
              }
          }

          for (dest_idx, edges_by_key) in incoming_map {
              for (edge_key, sources_by_sids) in edges_by_key {
                  for (sids_bv, sources) in sources_by_sids {
                      if sources.len() >= min_incoming {
                          // Create intermediate node
                          let intermediate_node = PrecomputeNode3Index::new(
                              trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())),
                          );

                          // Add edge from intermediate to original destination
                          {
                              let mut intermediate_guard =
                                  intermediate_node.write(trie3_god).expect("write");
                              let dest_map = intermediate_guard.children_mut().entry(edge_key.clone()).or_default();
                              dest_map.insert(dest_idx, sids_bv.clone());
                              intermediate_guard.value.live_tokens |= &edge_key.1;
                          }

                          // Reroute sources to point to intermediate node
                          for src_idx in &sources {
                              let mut src_guard = src_idx.write(trie3_god).expect("write");

                              // Remove old edge
                              if let Some(dest_map_for_key) = src_guard.children_mut().get_mut(&edge_key) {
                                  dest_map_for_key.remove(&dest_idx);
                                  if dest_map_for_key.is_empty() {
                                      src_guard.children_mut().remove(&edge_key);
                                  }
                              }

                              // Add new edge to intermediate node. This is a "None-like" edge.
                              // pop=0, all llm tokens, all state ids.
                              let none_like_edge_key = (0, all_llm_bv.clone());
                              let dest_map =
                                  src_guard.children_mut().entry(none_like_edge_key).or_default();
                              dest_map.insert(intermediate_node, all_sids_bv.clone());
                              // Recompute live tokens from scratch after modifying edges.
                              let mut new_live = LLMTokenBV::zeros();
                              for ((_, llm_bv), _) in src_guard.children() {
                                  new_live |= llm_bv;
                              }
                              src_guard.value.live_tokens = new_live;
                          }
                      }
                  }
              }
          }
          crate::debug!(2, "Finished factoring common destinations in Trie3.");
      }
    src/trie3_opt/passes/full/generalize.rs: |
      use std::collections::{BTreeMap, HashMap, VecDeque};

      use crate::constraint::{PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;
      use crate::glr::parser::GLRParser;
      use crate::glr::table::StateID;
      use crate::tokenizer::TokenizerStateID;

      /// Propagate possible parser states across the trie (respecting pop deltas)
      /// and generalize edge StateID bitvectors accordingly.
      ///
      /// This implementation computes a conservative "possible states" set per node by
      /// seeding all roots with all states, pushing forward along edges while applying
      /// n-step predecessors for pop>0 edges. It currently computes the fixed-point but
      /// does not modify the trie with the results. It is safe and provides a basis for
      /// downstream passes that may choose to use the propagated sets.
      pub fn propagate_and_generalize_sids_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          parser: &GLRParser,
          max_state_id: usize,
      ) {
          crate::debug!(2, "Propagating possible states to generalize StateIDBVs in Trie3...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Part A: Pre-computation
          let one_step_back_map = parser.build_one_step_back_map();

          let mut max_pop = 0;
          for node_idx in &all_nodes {
              let r = node_idx.read(trie3_god).expect("read");
              for ((pop, _), _) in r.children() {
                  if *pop > 0 {
                      max_pop = max_pop.max(*pop as usize);
                  }
              }
          }

          if max_pop == 0 {
              crate::debug!(2, "No pop > 0 edges found, skipping SID generalization.");
              return;
          }

          // Precompute T_{2^k} maps using repeated composition up to ceil(log2(max_pop))
          let num_levels = (max_pop as f64).log2().ceil() as usize + 1;
          let mut two_power_back_maps: Vec<BTreeMap<StateID, StateIDBV>> = Vec::with_capacity(num_levels);
          two_power_back_maps.push(one_step_back_map);

          for i in 1..num_levels {
              let prev_map = &two_power_back_maps[i - 1];
              let mut next_map: BTreeMap<StateID, StateIDBV> = BTreeMap::new();
              for (&state_id, preds1) in prev_map {
                  let mut preds2 = StateIDBV::zeros();
                  for pred1_val in preds1.iter() {
                      let sid = StateID(pred1_val);
                      if let Some(preds_of_pred) = prev_map.get(&sid) {
                          preds2 |= preds_of_pred;
                      }
                  }
                  if !preds2.is_empty() {
                      next_map.insert(state_id, preds2);
                  }
              }
              two_power_back_maps.push(next_map);
          }

          // Helper for T_n(S): apply the predecessor relation n times using the cached powers-of-two
          let apply_n_step_back = |s: &StateIDBV, n: usize| -> StateIDBV {
              let mut current_s = s.clone();
              for k in 0..two_power_back_maps.len() {
                  if (n >> k) & 1 == 1 {
                      let map_k = &two_power_back_maps[k];
                      let mut next_s = StateIDBV::zeros();
                      for state_id_val in current_s.iter() {
                          let state_id = StateID(state_id_val);
                          if let Some(preds) = map_k.get(&state_id) {
                              next_s |= preds;
                          }
                      }
                      current_s = next_s;
                  }
              }
              current_s
          };

          // Part B: Worklist propagation of possible states along trie edges.
          let mut possible_states: HashMap<PrecomputeNode3Index, StateIDBV> = HashMap::new();
          let mut worklist: VecDeque<PrecomputeNode3Index> = VecDeque::new();

          let all_states_bv = StateIDBV::ones(max_state_id + 1);
          for root_idx in roots.values() {
              possible_states.insert(*root_idx, all_states_bv.clone());
              worklist.push_back(*root_idx);
          }

          while let Some(u_idx) = worklist.pop_front() {
              let s_u = possible_states
                  .get(&u_idx)
                  .cloned()
                  .unwrap_or_else(StateIDBV::zeros);
              if s_u.is_empty() {
                  continue;
              }

              let u_guard = u_idx.read(trie3_god).expect("read");
              for ((pop, _), dest_map) in u_guard.children() {
                  let s_u_popped = if *pop > 0 {
                      apply_n_step_back(&s_u, *pop as usize)
                  } else {
                      s_u.clone()
                  };

                  if s_u_popped.is_empty() {
                      continue;
                  }

                  for (v_idx, sids_uv) in dest_map {
                      let s_transmitted = &s_u_popped & sids_uv;
                      if s_transmitted.is_empty() {
                          continue;
                      }

                      let s_v_old = possible_states.entry(*v_idx).or_default();
                      let old_len = s_v_old.len();
                      *s_v_old |= &s_transmitted;
                      if s_v_old.len() > old_len {
                          worklist.push_back(*v_idx);
                      }
                  }
              }
          }

          // Note: We currently compute 'possible_states' but do not update edges in-place.
          // If you want to use this information to shrink SIDs per edge safely, you can
          // intersect edge SIDs with the destination's 'possible_states' or the appropriate
          // preimage projection considering pops. Left as a safe no-op for the split pipeline.
      }
    src/trie3_opt/passes/full/global_atoms_merge.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::sync::Arc;

      use ordered_hash_map::OrderedHashMap;
      use range_set_blaze::RangeSetBlaze;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::datastructures::EntryApi;
      use crate::trie3_opt::passes::full::atoms::build_global_token_atoms_by_pop;
      use crate::trie3_opt::passes::full::rewire::rewire_all_edges_to_representatives;

      /// NEW MERGE PASS:
      /// Global-atoms bisimulation merge. Compared to existing WL / structural merges, this pass:
      ///  - Derives a global partition of tokens ("atoms") per pop across the entire graph by splitting a
      ///    universe set with all observed edge masks at that pop (with a cap).
      ///  - Iteratively refines node classes: two nodes are equivalent iff for every pop and every atom,
      ///    the aggregated semantics (mapping from destination class to union of SIDs) match.
      ///  - Rewires all edges to representatives and reconstructs representative edges deterministically.
      pub fn merge_nodes_trie3_global_atoms(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_iters: usize,
          max_atoms_per_pop: usize,
      ) {
          crate::debug!(2, "Merging nodes (global-atoms bisimulation) in precomputed trie 3 (iters={}, cap={} atoms/pop).",
              max_iters, max_atoms_per_pop);

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Derive global atoms by pop.
          let atoms_by_pop =
              build_global_token_atoms_by_pop(trie3_god, &all_nodes, max_llm_token_id, max_atoms_per_pop);
          if atoms_by_pop.is_empty() {
              crate::debug!(3, "Global-atoms merge: no edges present; skipping.");
              return;
          }

          // Dense ids for nodes
          let n = all_nodes.len();
          let mut dense_of: HashMap<Trie2Index, usize> = HashMap::with_capacity(n);
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(n);
          for (i, idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*idx, i);
              old_of.push(*idx);
          }

          // Ends and raw edges (pop, llm_bv, dest_dense, sids)
          type RawEdge3 = (isize, LLMTokenBV, usize, StateIDBV);
          let mut ends: Vec<bool> = vec![false; n];
          let mut raw_edges: Vec<Vec<RawEdge3>> = vec![Vec::new(); n];
          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let g = u_idx.read(trie3_god).expect("read");
              ends[u_dense] = g.value.end;
              for (ek, dm) in g.children() {
                  for (dst, sids) in dm {
                      if let Some(v_dense) = dense_of.get(dst) {
                          raw_edges[u_dense].push((ek.0, ek.1.clone(), *v_dense, sids.clone()));
                      }
                  }
              }
          }

          // Precompute, once, for every unique (pop, LLMTokenBV) mask pointer, which atoms (by index) it overlaps.
          // This avoids scanning all atoms for every edge repeatedly.
          use std::collections::BTreeMap as BTM;
          let mut unique_bvs_per_pop: BTM<isize, Vec<LLMTokenBV>> = BTM::new();
          let mut seen_ptrs_per_pop: BTM<isize, HashSet<*const RangeSetBlaze<usize>>> = BTM::new();
          for edges in &raw_edges {
              for (p, llm_bv, _v, _sids) in edges {
                  if !atoms_by_pop.contains_key(p) {
                      continue;
                  }
                  let ptr = Arc::as_ptr(&llm_bv.inner);
                  let seen = seen_ptrs_per_pop.entry(*p).or_default();
                  if seen.insert(ptr) {
                      unique_bvs_per_pop
                          .entry(*p)
                          .or_default()
                          .push(llm_bv.clone());
                  }
              }
          }
          let mut atom_idxs_by_pop_ptr: BTM<isize, HashMap<*const RangeSetBlaze<usize>, Vec<usize>>> =
              BTM::new();
          for (p, bvs) in unique_bvs_per_pop {
              if let Some(atoms) = atoms_by_pop.get(&p) {
                  let mut map: HashMap<*const RangeSetBlaze<usize>, Vec<usize>> = HashMap::new();
                  for bv in bvs {
                      let ptr = Arc::as_ptr(&bv.inner);
                      let mut idxs: Vec<usize> = Vec::new();
                      for (j, a) in atoms.iter().enumerate() {
                          if !(&bv & a).is_empty() {
                              idxs.push(j);
                          }
                      }
                      map.insert(ptr, idxs);
                  }
                  atom_idxs_by_pop_ptr.insert(p, map);
              }
          }

          // Compute longest path distance in pop=0 subgraph to prevent merging nodes in a chain.
          let mut pop0_adj: Vec<Vec<usize>> = vec![vec![]; n];
          let mut pop0_rev_adj: Vec<Vec<usize>> = vec![vec![]; n];
          let mut pop0_out_degree = vec![0; n];
          for u in 0..n {
              for (p, _, v_dense, _) in &raw_edges[u] {
                  if *p == 0 {
                      pop0_adj[u].push(*v_dense);
                      pop0_rev_adj[*v_dense].push(u);
                      pop0_out_degree[u] += 1;
                  }
              }
          }

          let mut dist = vec![0; n];
          let mut q: VecDeque<usize> = VecDeque::new();
          for i in 0..n {
              if pop0_out_degree[i] == 0 {
                  q.push_back(i);
              }
          }

          let mut processed_count = 0;
          while let Some(v) = q.pop_front() {
              processed_count += 1;
              for &u in &pop0_rev_adj[v] {
                  dist[u] = dist[u].max(1 + dist[v]);
                  pop0_out_degree[u] -= 1;
                  if pop0_out_degree[u] == 0 {
                      q.push_back(u);
                  }
              }
          }

          // Mark nodes in or that can reach a cycle with max distance
          if processed_count < n {
              let max_dist = n + 1;
              for i in 0..n {
                  if pop0_out_degree[i] > 0 {
                      q.push_back(i);
                  }
              }
              while let Some(v) = q.pop_front() {
                  if dist[v] != max_dist {
                      dist[v] = max_dist;
                      for &u in &pop0_rev_adj[v] {
                          q.push_back(u);
                      }
                  }
              }
          }

          // Partition refinement (optimized)
          // Initial partition based on end flag and pop=0 distance.
          let mut prev_class: Vec<usize> = vec![0; n];
          let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
          let mut next_class_id = 0;
          for i in 0..n {
              let key = (ends[i], dist[i]);
              let class_id = *class_map.entry(key).or_insert_with(|| {
                  let id = next_class_id;
                  next_class_id += 1;
                  id
              });
              prev_class[i] = class_id;
          }
          for it in 0..max_iters {
              // Signature (compact): (end_flag, Vec<((pop, atom_idx), Vec<(dest_class, StateIDBV)>)>)
              // Only atoms actually hit by this node are included; canonicalization is via sorted BTreeMaps below.
              type SigKey = (bool, Vec<((isize, usize), Vec<(usize, StateIDBV)>)>);
              let mut sig_to_id: HashMap<SigKey, usize> = HashMap::new();
              let mut next_id = 0usize;
              let mut new_class = vec![0usize; n];
              let mut changes = 0usize;

              #[cfg(not(rustrover))]
              let itn = kdam::tqdm!(
                  0..n,
                  desc = format!("Trie3 Merge Global-Atoms Iter {}", it + 1),
                  total = n,
                  disable = !crate::profiler::PROGRESS_BAR_ENABLED,
                  leave = true
              );
              #[cfg(rustrover)]
              let itn = 0..n;
              for u in itn {
                  // 1) Aggregate once per (pop, LLM mask pointer) to dest_class -> SIDs.
                  // This removes duplicate work across atoms for the same mask.
                  let mut per_bv_aggr: HashMap<
                      (isize, *const RangeSetBlaze<usize>),
                      BTreeMap<usize, StateIDBV>,
                  > = HashMap::new();
                  for (p, llm_bv, v_dense, sids) in &raw_edges[u] {
                      if !atoms_by_pop.contains_key(p) {
                          continue;
                      }
                      let dest_class = prev_class[*v_dense];
                      let ptr = Arc::as_ptr(&llm_bv.inner);
                      per_bv_aggr
                          .entry((*p, ptr))
                          .or_insert_with(BTreeMap::new)
                          .entry(dest_class)
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }

                  // 2) Fan out each (pop, mask-pointer) aggregated map to only the atoms it overlaps.
                  // Temporary aggregation: (pop, atom_idx) -> BTreeMap<dest_class, SIDs>, sorted for determinism.
                  let mut per_atom_aggr: BTreeMap<(isize, usize), BTreeMap<usize, StateIDBV>> =
                      BTreeMap::new();
                  for ((pop, ptr), dm) in per_bv_aggr {
                      if let Some(pop_map) = atom_idxs_by_pop_ptr.get(&pop) {
                          if let Some(atom_idxs) = pop_map.get(&ptr) {
                              for &j in atom_idxs {
                                  let entry = per_atom_aggr
                                      .entry((pop, j))
                                      .or_insert_with(BTreeMap::new);
                                  for (dest_class, sids) in &dm {
                                      entry
                                          .entry(*dest_class)
                                          .and_modify(|e| *e |= sids)
                                          .or_insert_with(|| sids.clone());
                                  }
                              }
                          }
                      }
                  }

                  // 3) Build compact signature. We only include non-empty atoms that this node touches.
                  let mut sig_entries: Vec<((isize, usize), Vec<(usize, StateIDBV)>)> =
                      Vec::with_capacity(per_atom_aggr.len());
                  for (key, m) in per_atom_aggr {
                      sig_entries.push((key, m.into_iter().collect()));
                  }
                  let sig: SigKey = (ends[u], sig_entries);
                  let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });
                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }
              crate::debug!(
                  3,
                  "Global-atoms merge iter {}: classes={}, changes={}",
                  it + 1,
                  new_class.iter().max().map(|m| m + 1).unwrap_or(0),
                  changes
              );
              prev_class = new_class;
              if changes == 0 {
                  break;
              }
          }

          // Representatives for final classes
          let final_partition = prev_class;
          let num_classes = final_partition.iter().max().map_or(0, |m| m + 1);
          let mut representatives: Vec<Option<Trie2Index>> = vec![None; num_classes];
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              if representatives[class_id].is_none() {
                  representatives[class_id] = Some(old_of[u_dense]);
              }
          }
          let mut node_to_rep: HashMap<Trie2Index, Trie2Index> = HashMap::with_capacity(n);
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], representatives[class_id].unwrap());
          }

          // Rewrite all edges in the graph to class representatives
          rewire_all_edges_to_representatives(trie3_god, roots, &node_to_rep);

          // Rebuild representative edges deterministically by aggregating to dest classes and mapping to reps.
          for class_id in 0..num_classes {
              if let Some(rep_idx) = representatives[class_id] {
                  // Use a single exemplar node from the class to rebuild representative edges
                  let u_dense = final_partition.iter().position(|&c| c == class_id).unwrap();
                  // Aggregate by (pop, llm_bv, dest_class) unioning SIDs
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, llm_bv, v_dense, sids) in &raw_edges[u_dense] {
                      let dest_class = final_partition[*v_dense];
                      aggr.entry((*p, llm_bv.clone(), dest_class))
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }
                  let mut new_children: BTreeMap<
                      (isize, LLMTokenBV),
                      OrderedHashMap<Trie2Index, StateIDBV>,
                  > = BTreeMap::new();
                  for ((p, bv_key, dest_class), sids) in aggr {
                      if let Some(dst_rep) = representatives[dest_class] {
                          new_children
                              .entry((p, bv_key.clone()))
                              .or_insert_with(OrderedHashMap::new)
                              .entry(dst_rep)
                              .and_modify(|e| *e |= &sids)
                              .or_insert(sids);
                      }
                  }
                  // Recompute live tokens
                  let mut new_live = LLMTokenBV::zeros();
                  for ((_, l), _) in &new_children {
                      new_live |= l;
                  }
                  let mut w = rep_idx.write(trie3_god).expect("write");
                  *w.children_mut() = new_children;
                  w.value.live_tokens = new_live;
              }
          }

          // Remap roots to representatives
          for r in roots.values_mut() {
              *r = *node_to_rep.get(r).unwrap();
          }
          // Cleanup
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec2);
      }
    src/trie3_opt/passes/full/merges.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::trie3_opt::passes::full::rewire::rewire_all_edges_to_representatives;
      use crate::profiler::PROGRESS_BAR_ENABLED;

      /// Extremely fast, cycle-safe node merging using WL-style refinement with a cheap signature
      /// (ignoring StateIDBV during coarse iterations) followed by a single exact refinement within
      /// candidate equivalence classes that compares aggregated SIDs exactly. Finally, only representatives
      /// are rewritten to point to representative destinations; later GC/pruning removes non-reps.
      pub fn merge_nodes_trie3_ultrafast(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(
              2,
              "Merging nodes (ultrafast WL + exact refine) in precomputed trie 3."
          );

          // Collect all nodes reachable from roots
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Build dense index for nodes
          let n = all_nodes.len();
          let mut dense_of: HashMap<Trie2Index, u32> =
              HashMap::with_capacity(n.checked_mul(2).unwrap_or(n));
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(n);
          for (i, node_idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*node_idx, i as u32);
              old_of.push(*node_idx);
          }

          // First pass: count edges per node and capture ends
          let mut out_counts: Vec<usize> = vec![0; n];
          let mut ends: Vec<u8> = vec![0; n];
          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              old_of.iter().enumerate(),
              desc = "Trie3 Merge Ultra (Pass1 count)",
              total = n,
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = old_of.iter().enumerate();
          for (i, node_idx) in it {
              let g = node_idx.read(trie3_god).expect("read");
              ends[i] = if g.value.end { 1 } else { 0 };

              let mut cnt = 0usize;
              for (_ek, dm) in g.children() {
                  cnt += dm.len();
              }
              out_counts[i] = cnt;
          }

          // Build offsets for flat edge storage
          let mut offsets: Vec<usize> = vec![0; n + 1];
          for i in 0..n {
              offsets[i + 1] = offsets[i] + out_counts[i];
          }
          let m = offsets[n];

          // LLM bitset pointer-id map (for edge-key LLM masks only)
          use range_set_blaze::RangeSetBlaze;
          let mut llm_id_map: HashMap<*const RangeSetBlaze<usize>, u32> = HashMap::new();
          let mut next_llm_id: u32 = 0;
          let mut get_or_insert_llm_id = |ptr: *const RangeSetBlaze<usize>| -> u32 {
              if let Some(id) = llm_id_map.get(&ptr) {
                  *id
              } else {
                  let id = next_llm_id;
                  next_llm_id = next_llm_id.wrapping_add(1);
                  llm_id_map.insert(ptr, id);
                  id
              }
          };

          // Flat edge structure: pop, llm_id, dest_dense
          #[derive(Copy, Clone)]
          struct EdgeLight {
              pop: u32,
              llm_id: u32,
              dest: u32,
          }
          let mut edges: Vec<EdgeLight> = vec![EdgeLight {
              pop: 0,
              llm_id: 0,
              dest: 0,
          }; m];

          // Second pass: fill flat edges
          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              old_of.iter().enumerate(),
              desc = "Trie3 Merge Ultra (Pass2 fill)",
              total = n,
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = old_of.iter().enumerate();
          for (i, node_idx) in it {
              let g = node_idx.read(trie3_god).expect("read");
              let mut p = offsets[i];
              for (ek, dm) in g.children() {
                  let pop_u32 = ek.0 as u32;
                  let llm_ptr = std::sync::Arc::as_ptr(&ek.1.inner);
                  let llm_id = get_or_insert_llm_id(llm_ptr);
                  for (dst, _sids) in dm {
                      let dest_dense = *dense_of.get(dst).expect("dense id") as u32;
                      edges[p] = EdgeLight {
                          pop: pop_u32,
                          llm_id,
                          dest: dest_dense,
                      };
                      p += 1;
                  }
              }
              debug_assert_eq!(p, offsets[i + 1]);
          }

          // Coarse WL refinement ignoring SIDs
          let max_iters_coarse: usize = 6; // small number of iterations for speed
          let mut prev_class: Vec<u32> = vec![0; n];
          // Initialize coarse classes by (end flag, degree, live_llm_id)
          {
              // Ignore live_tokens entirely: they are derived and must not partition nodes.
              let mut init_map: HashMap<(u8, usize), u32> =
                  HashMap::with_capacity(n.checked_div(2).unwrap_or(1024));
              let mut next_c: u32 = 0;
              for i in 0..n {
                  let deg = offsets[i + 1] - offsets[i];
                  let key = (ends[i], deg);
                  let c = init_map.entry(key).or_insert_with(|| {
                      let id = next_c;
                      next_c = next_c.wrapping_add(1);
                      id
                  });
                  prev_class[i] = *c;
              }
          }

          // Workspace vectors to avoid reallocations
          let mut tmp_items: Vec<(u32, u32, u32)> = Vec::with_capacity(16); // (pop, llm_id, dest_class)
          let mut agg_items: Vec<((u32, u32, u32), u32)> = Vec::with_capacity(16); // ((pop,llm,dest_class), count)
          let mut new_class: Vec<u32> = vec![0; n];
          for it in 0..max_iters_coarse {
              // Phase: compute coarse signature hashes per node
              // We'll use a simple FNV-1a over a sorted aggregated vector
              let mut h_of: Vec<u64> = vec![0; n];
              #[cfg(not(rustrover))]
              let itn = kdam::tqdm!(
                  0..n,
                  desc = format!("Trie3 Merge Ultra (WL coarse {} / {})", it + 1, max_iters_coarse),
                  total = n,
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = true
              );
              #[cfg(rustrover)]
              let itn = 0..n;
              for u in itn {
                  tmp_items.clear();
                  let begin = offsets[u];
                  let end = offsets[u + 1];
                  for idx in begin..end {
                      let e = edges[idx];
                      let dclass = prev_class[e.dest as usize];
                      tmp_items.push((e.pop, e.llm_id, dclass));
                  }
                  if tmp_items.len() > 1 {
                      tmp_items.sort_unstable();
                  }
                  agg_items.clear();
                  let mut i2 = 0usize;
                  while i2 < tmp_items.len() {
                      let key = tmp_items[i2];
                      let mut cnt: u32 = 1;
                      i2 += 1;
                      while i2 < tmp_items.len() && tmp_items[i2] == key {
                          cnt = cnt.wrapping_add(1);
                          i2 += 1;
                      }
                      agg_items.push((key, cnt));
                  }
                  // FNV-1a hash
                  let mut h: u64 = 0xcbf29ce484222325;
                  // end flag
                  h ^= ends[u] as u64;
                  h = h.wrapping_mul(0x100000001b3);
                  // length
                  h ^= agg_items.len() as u64;
                  h = h.wrapping_mul(0x100000001b3);
                  for &((p, lid, dc), cnt) in &agg_items {
                      h ^= p as u64;
                      h = h.wrapping_mul(0x100000001b3);
                      h ^= lid as u64;
                      h = h.wrapping_mul(0x100000001b3);
                      h ^= dc as u64;
                      h = h.wrapping_mul(0x100000001b3);
                      h ^= cnt as u64;
                      h = h.wrapping_mul(0x100000001b3);
                  }
                  h_of[u] = h;
              }

              // Compress hashes to new classes
              let mut map: HashMap<u64, u32> =
                  HashMap::with_capacity(n.checked_div(2).unwrap_or(1024));
              let mut next_c: u32 = 0;
              let mut changes = 0usize;
              for u in 0..n {
                  let cid = *map.entry(h_of[u]).or_insert_with(|| {
                      let id = next_c;
                      next_c = next_c.wrapping_add(1);
                      id
                  });
                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }
              crate::debug!(
                  3,
                  "Trie3 ultrafast coarse iter {}: classes={}, changes={}",
                  it + 1,
                  map.len(),
                  changes
              );
              prev_class = new_class;
              new_class = vec![0; n];
              if changes == 0 {
                  break;
              }
          }

          // Now do an exact refinement within each coarse class by aggregating SIDs exactly.
          // Build membership list as sorted pairs (class, node)
          let mut membership: Vec<(u32, u32)> =
              (0..n as u32).map(|u| (prev_class[u as usize], u)).collect();
          membership.sort_unstable_by_key(|x| x.0);

          // We'll produce a node->representative map (dense ids)
          let mut node_to_rep_dense: Vec<u32> = (0..n as u32).collect();

          #[derive(Hash, Eq, PartialEq, Clone)]
          struct KeyNoSids {
              end: u8,
              // Sorted vector of (pop, llm_id, dest_class) triples
              edges: Vec<(u32, u32, u32)>,
          }
          struct Prototype {
              sids: Vec<StateIDBV>, // aligned with edges order
              rep_dense: u32,
          }

          // Iterate groups
          let mut i = 0usize;
          #[cfg(not(rustrover))]
          let total_groups = membership.len();
          #[cfg(not(rustrover))]
          let mut processed_nodes = 0usize;
          while i < membership.len() {
              let class_id = membership[i].0;
              let start = i;
              while i < membership.len() && membership[i].0 == class_id {
                  i += 1;
              }
              let end_span = i;
              let span_len = end_span - start;
              if span_len <= 1 {
                  // Single node - it is its own representative
                  let u_dense = membership[start].1;
                  node_to_rep_dense[u_dense as usize] = u_dense;
                  #[cfg(not(rustrover))]
                  {
                      processed_nodes += 1;
                  }
                  continue;
              }

              // Build prototype map keyed by (end, live, keys_without_sids)
              let mut key_map: HashMap<KeyNoSids, Vec<Prototype>> = HashMap::new();
              #[cfg(not(rustrover))]
              let it = kdam::tqdm!(
                  start..end_span,
                  desc = "Trie3 Merge Ultra (Exact refine group)",
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = start..end_span;
              for idx in it {
                  let u_dense = membership[idx].1 as usize;
                  let node_idx = old_of[u_dense];
                  let g = node_idx.read(trie3_god).expect("read");

                  // Aggregate SIDs per (pop, llm_id, coarse_dest_class)
                  let mut aggr: BTreeMap<(u32, u32, u32), StateIDBV> = BTreeMap::new();
                  for (ek, dm) in g.children() {
                      let pop_u32 = ek.0 as u32;
                      let llm_ptr = std::sync::Arc::as_ptr(&ek.1.inner);
                      let llm_id = *llm_id_map.get(&llm_ptr).expect("llm_id present");
                      for (dst, sids) in dm {
                          let dest_dense = *dense_of.get(dst).expect("dense of dst") as usize;
                          let coarse_dest_class = prev_class[dest_dense];
                          aggr.entry((pop_u32, llm_id, coarse_dest_class))
                              .and_modify(|v| *v |= sids)
                              .or_insert_with(|| sids.clone());
                      }
                  }

                  // Build key without sids
                  let mut keys_vec: Vec<(u32, u32, u32)> = aggr.keys().cloned().collect();
                  // BTreeMap iteration is already sorted; we can rely on that
                  let key = KeyNoSids {
                      end: ends[u_dense],
                      edges: keys_vec.clone(),
                  };
                  let sids_vec: Vec<StateIDBV> = aggr.into_values().collect();

                  // Try to match an existing prototype
                  let entry = key_map.entry(key).or_insert_with(Vec::new);
                  let mut found = None;
                  for proto in entry.iter() {
                      if proto.sids.len() != sids_vec.len() {
                          continue;
                      }
                      let mut ok = true;
                      for (a, b) in proto.sids.iter().zip(sids_vec.iter()) {
                          if a != b {
                              ok = false;
                              break;
                          }
                      }
                      if ok {
                          found = Some(proto.rep_dense);
                          break;
                      }
                  }
                  if let Some(rep) = found {
                      node_to_rep_dense[u_dense] = rep;
                  } else {
                      // New prototype
                      let rep = u_dense as u32;
                      node_to_rep_dense[u_dense] = rep;
                      entry.push(Prototype {
                          sids: sids_vec,
                          rep_dense: rep,
                      });
                  }
                  #[cfg(not(rustrover))]
                  {
                      processed_nodes += 1;
                  }
              }
          }
          #[cfg(not(rustrover))]
          {
              let _ = processed_nodes; // avoid unused warning
          }

          // Representatives (unique)
          let mut rep_set: HashSet<u32> = HashSet::new();
          for (u_dense, &rep) in node_to_rep_dense.iter().enumerate() {
              if u_dense as u32 == rep {
                  rep_set.insert(rep);
              }
          }

          // Build a mapping from node index to its representative index for rewiring.
          let mut node_to_rep_map: HashMap<Trie2Index, Trie2Index> = HashMap::with_capacity(n);
          for u_dense in 0..n {
              let u_idx = old_of[u_dense];
              let rep_dense = node_to_rep_dense[u_dense] as usize;
              let rep_idx = old_of[rep_dense];
              node_to_rep_map.insert(u_idx, rep_idx);
          }
          // Rewire all graph edges to point to representatives.
          rewire_all_edges_to_representatives(trie3_god, roots, &node_to_rep_map);

          // Rewrite representatives' children to point to representatives and recompute live tokens
          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              rep_set.iter(),
              desc = "Trie3 Merge Ultra (Rewrite reps)",
              total = rep_set.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = rep_set.iter();
          for rep_dense in it {
              let rep_idx = old_of[*rep_dense as usize];
              let mut w = rep_idx.write(trie3_god).expect("write");
              let mut new_children: BTreeMap<
                  (isize, LLMTokenBV),
                  OrderedHashMap<Trie2Index, StateIDBV>,
              > = BTreeMap::new();

              // Build new children by remapping destinations to their representatives
              for (ek, dm) in w.children().clone() {
                  let (pop, llm_bv) = ek;
                  let mut dest_map = OrderedHashMap::new();
                  for (dst, sids) in dm {
                      let dst_dense = *dense_of.get(&dst).expect("dense of dst") as usize;
                      let rep_dst_dense = node_to_rep_dense[dst_dense] as usize;
                      let rep_dst_idx = old_of[rep_dst_dense];
                      dest_map
                          .entry(rep_dst_idx)
                          .and_modify(|v| *v |= &sids)
                          .or_insert(sids);
                  }
                  if !dest_map.is_empty() {
                      new_children.insert((pop, llm_bv), dest_map);
                  }
              }
              // Commit the rewritten children and recompute live_tokens
              let mut new_live = LLMTokenBV::zeros();
              for ((_, llm_bv), _) in &new_children {
                  new_live |= llm_bv;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = new_children;
          }

          // Remap roots to their representatives
          for root_idx in roots.values_mut() {
              if let Some(dense) = dense_of.get(root_idx) {
                  let rep_dense = node_to_rep_dense[*dense as usize] as usize;
                  *root_idx = old_of[rep_dense];
              }
          }

          // Finalize
          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &final_roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &final_roots_vec);
          crate::debug!(
              2,
              "Ultrafast merge completed: representatives kept = {}",
              rep_set.len()
          );
      }

      pub fn merge_nodes_trie3_fast(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          merge_nodes_trie3_impl(roots, trie3_god, 2);
      }

      pub fn merge_nodes_trie3(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_iters: usize,
      ) {
          merge_nodes_trie3_impl(roots, trie3_god, max_iters);
      }

      fn merge_nodes_trie3_impl(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_iters: usize,
      ) {
          crate::debug!(
              2,
              "Merging identical subtrees in precomputed trie 3 (max_iters={}).",
              max_iters
          );

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // NOTE: This pass already ignores 'live_tokens' (derived) in its signature.
          // The new global-atoms pass complements this by aligning semantics globally
          // across nodes for each pop and token atom.

          let mut dense_of: HashMap<Trie2Index, usize> = HashMap::new();
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(all_nodes.len());
          for (i, node_idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*node_idx, i);
              old_of.push(*node_idx);
          }
          let n = all_nodes.len();

          let mut ends: Vec<bool> = vec![false; n];
          type RawEdge3 = (isize, LLMTokenBV, usize, StateIDBV);
          let mut raw_edges: Vec<Vec<RawEdge3>> = vec![Vec::new(); n];

          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let guard = u_idx.read(trie3_god).unwrap();
              ends[u_dense] = guard.value.end;
              for (ek, dest_map) in guard.children() {
                  for (v_idx, bv) in dest_map {
                      if let Some(&v_dense) = dense_of.get(v_idx) {
                          raw_edges[u_dense].push((ek.0, ek.1.clone(), v_dense, bv.clone()));
                      }
                  }
              }
          }

          let mut prev_class: Vec<usize> = (0..n).map(|i| if ends[i] { 1 } else { 0 }).collect();

          let mut it: usize = 0;
          loop {
              type AggregatedEdge3 = ((isize, LLMTokenBV, usize), StateIDBV);
              type Signature3 = (bool, Vec<AggregatedEdge3>);

              let mut sig_to_id: HashMap<Signature3, usize> = HashMap::new();
              let mut new_class = vec![0; n];
              let mut next_id = 0;
              let mut changes = 0;

              #[cfg(not(rustrover))]
              let its = kdam::tqdm!(
                  0..n,
                  desc = format!("Trie3 Merge Iter {}", it + 1),
                  total = n,
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = true
              );
              #[cfg(rustrover)]
              let its = 0..n;
              for u in its {
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u] {
                      let dest_class = prev_class[*v_dense];
                      let key = (*p, bv_key.clone(), dest_class);
                      aggr.entry(key)
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }
                  let agg_edges: Vec<AggregatedEdge3> = aggr.into_iter().collect();

                  let sig: Signature3 = (ends[u], agg_edges);

                  let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });

                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }

              crate::debug!(
                  3,
                  "Trie3 merge iter {}: classes={}, changes={}",
                  it + 1,
                  next_id,
                  changes
              );
              prev_class = new_class;
              if changes == 0 {
                  break;
              }
              it += 1;
              if max_iters > 0 && it >= max_iters {
                  break;
              }
          }

          let final_partition = prev_class;
          let num_classes = final_partition.iter().max().map_or(0, |m| m + 1);

          let mut representatives: Vec<Option<Trie2Index>> = vec![None; num_classes];
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              if representatives[class_id].is_none() {
                  representatives[class_id] = Some(old_of[u_dense]);
              }
          }

          let mut node_to_rep: HashMap<Trie2Index, Trie2Index> = HashMap::new();
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], representatives[class_id].unwrap());
          }

          // Rewrite all edges in the graph to point to the representatives.
          rewire_all_edges_to_representatives(trie3_god, roots, &node_to_rep);

          for class_id in 0..num_classes {
              if let Some(rep_idx) = representatives[class_id] {
                  let u_dense = final_partition.iter().position(|&c| c == class_id).unwrap();

                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u_dense] {
                      let dest_class = final_partition[*v_dense];
                      aggr.entry((*p, bv_key.clone(), dest_class))
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }

                  let mut new_children = BTreeMap::new();
                  for ((p, bv_key, dest_class), sids) in aggr {
                      if let Some(dest_rep_idx) = representatives[dest_class] {
                          new_children
                              .entry((p, bv_key.clone()))
                              .or_insert_with(OrderedHashMap::new)
                              .insert(dest_rep_idx, sids);
                      }
                  }

                  // Recompute live tokens from the new merged edges.
                  let mut new_live_tokens = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &new_children {
                      new_live_tokens |= llm_bv;
                  }

                  let mut guard = rep_idx.write(trie3_god).unwrap();
                  *guard.children_mut() = new_children;
                  guard.value.live_tokens = new_live_tokens;
              }
          }

          for root_idx in roots.values_mut() {
              *root_idx = *node_to_rep.get(root_idx).unwrap();
          }

          // GC unreachable non-representatives and recompute depths.
          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &final_roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &final_roots_vec);
      }

      pub fn merge_nodes_trie3_structural(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_iters: usize,
      ) {
          crate::debug!(
              2,
              "Merging structurally equivalent subtrees in precomputed trie 3 (max_iters={}).",
              max_iters
          );

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let mut dense_of: HashMap<Trie2Index, usize> = HashMap::new();
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(all_nodes.len());
          for (i, node_idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*node_idx, i);
              old_of.push(*node_idx);
          }
          let n = all_nodes.len();

          let mut ends: Vec<bool> = vec![false; n];
          type RawEdge3 = (isize, LLMTokenBV, usize, StateIDBV);
          let mut raw_edges: Vec<Vec<RawEdge3>> = vec![Vec::new(); n];

          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let guard = u_idx.read(trie3_god).unwrap();
              ends[u_dense] = guard.value.end;
              for (ek, dest_map) in guard.children() {
                  for (v_idx, bv) in dest_map {
                      if let Some(&v_dense) = dense_of.get(v_idx) {
                          // Note: we capture the LLMTokenBV here but won't use it in the signature.
                          raw_edges[u_dense].push((ek.0, ek.1.clone(), v_dense, bv.clone()));
                      }
                  }
              }
          }

          let mut prev_class: Vec<usize> = (0..n).map(|i| if ends[i] { 1 } else { 0 }).collect();

          let mut it: usize = 0;
          loop {
              // Signature is (end_flag, aggregated edges keyed by (pop, llm_bv, dest_class)).
              // Including the LLMTokenBV ensures we don't merge nodes that differ on token distributions.
              type SignatureStructural3 = (bool, Vec<((isize, LLMTokenBV, usize), StateIDBV)>);

              let mut sig_to_id: HashMap<SignatureStructural3, usize> = HashMap::new();
              let mut new_class = vec![0; n];
              let mut next_id = 0;
              let mut changes = 0;

              #[cfg(not(rustrover))]
              let its = kdam::tqdm!(
                  0..n,
                  desc = format!("Trie3 Merge Structural Iter {}", it + 1),
                  total = n,
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = true
              );
              #[cfg(rustrover)]
              let its = 0..n;
              for u in its {
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u] {
                      let dest_class = prev_class[*v_dense];
                      let key = (*p, bv_key.clone(), dest_class);
                      aggr.entry(key)
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }

                  let agg_edges: Vec<((isize, LLMTokenBV, usize), StateIDBV)> = aggr.into_iter().collect();
                  let sig: SignatureStructural3 = (ends[u], agg_edges);

                  let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });

                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }

              crate::debug!(
                  3,
                  "Trie3 structural merge iter {}: classes={}, changes={}",
                  it + 1,
                  next_id,
                  changes
              );
              prev_class = new_class;
              if changes == 0 {
                  break;
              }
              it += 1;
              if max_iters > 0 && it >= max_iters {
                  break;
              }
          }

          // Reconstruction
          let final_partition = prev_class;
          let num_classes = final_partition.iter().max().map_or(0, |m| m + 1);

          let mut representatives: Vec<Option<Trie2Index>> = vec![None; num_classes];
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              if representatives[class_id].is_none() {
                  representatives[class_id] = Some(old_of[u_dense]);
              }
          }

          let mut node_to_rep: HashMap<Trie2Index, Trie2Index> = HashMap::new();
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], representatives[class_id].unwrap());
          }

          // Rewrite all edges in the graph to point to the representatives.
          rewire_all_edges_to_representatives(trie3_god, roots, &node_to_rep);

          for class_id in 0..num_classes {
              if let Some(rep_idx) = representatives[class_id] {
                  // Use a single exemplar node from the class to rebuild the representative's edges
                  // based on the final partition (safe and deterministic).
                  let u_dense = final_partition.iter().position(|&c| c == class_id).unwrap();

                  // Aggregate edges by (pop, llm_bv, dest_class)
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u_dense] {
                      let dest_class = final_partition[*v_dense];
                      aggr.entry((*p, bv_key.clone(), dest_class))
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }

                  // Build representative children by mapping dest classes to their representatives.
                  let mut new_children: BTreeMap<
                      (isize, LLMTokenBV),
                      OrderedHashMap<Trie2Index, StateIDBV>,
                  > = BTreeMap::new();
                  for ((p, bv_key, dest_class), sids) in aggr {
                      if let Some(dest_rep_idx) = representatives[dest_class] {
                          let dm = new_children
                              .entry((p, bv_key.clone()))
                              .or_insert_with(OrderedHashMap::new);
                          dm.entry(dest_rep_idx)
                              .and_modify(|e| *e |= &sids)
                              .or_insert(sids);
                      }
                  }

                  // Recompute live tokens from the new merged edges.
                  let mut new_live_tokens = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &new_children {
                      new_live_tokens |= llm_bv;
                  }

                  let mut guard = rep_idx.write(trie3_god).unwrap();
                  *guard.children_mut() = new_children;
                  guard.value.live_tokens = new_live_tokens;
              }
          }

          for root_idx in roots.values_mut() {
              *root_idx = *node_to_rep.get(root_idx).unwrap();
          }

          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &final_roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &final_roots_vec);
      }
