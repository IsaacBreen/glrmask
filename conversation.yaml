          fst_ref.set_start(s1)
          fst_ref.set_final(s2)

          fst_1 = fst.copy()
          fst_1.relabel_tables(
              old_isymbols=old_isymt,
              new_isymbols=new_isymt,
              attach_new_isymbols=True,
              old_osymbols=old_osymt,
              new_osymbols=new_osymt,
              attach_new_osymbols=True,
