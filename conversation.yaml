                          # Group peeks by SID (parents kept as lists; sets are built only at merge time)
                          for sid_val, parent_node in peeks:
                              lst = sid_to_parents.get(sid_val)
                              if lst is None:
                                  lst = [parent_node]
                                  sid_to_parents[sid_val] = lst
                              else:
