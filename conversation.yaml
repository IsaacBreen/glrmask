              // Valid JS sequences
              vec!["\"var\"", "IDENTIFIER", "\";\""],
              vec!["\"var\"", "IDENTIFIER", "\"=\"", "NUMERIC_LITERAL", "\";\""],
              vec!["\"if\"", "\"(\"", "IDENTIFIER", "\")\"", "\"{\""],
              vec!["IDENTIFIER", "\"||\"", "IDENTIFIER"],
              vec!["\"function\"", "IDENTIFIER", "\"(\"", "\")\"", "\"{\"","\"}\""],
