                      4,
                      "Filtering out production: {} (LHS can derive interesting: {}, RHS of this rule can derive interesting: {})",
                      production,
                      lhs_can_derive_interesting,
                      rhs_can_derive_interesting_for_this_rule
                  );
              }
          }
          
          kept_productions
