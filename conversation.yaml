          let equals_dest_node = equals_dest_wrapper.as_arc().lock().unwrap();
          assert!(equals_dest_node.value.end, "Destination for 'EQUALS' edge should be an end node");

          // 4. Check that the two end nodes are the same instance
          assert!(Arc::ptr_eq(x_dest_wrapper.as_arc(), equals_dest_wrapper.as_arc()), "Both paths should lead to the same end node instance");
      }

