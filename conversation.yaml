      // src/precompute4/weighted_automata/common.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset;
      use std::collections::BTreeMap;

      pub(crate) const STOCHASTIC_DEBUG: bool = false; // Set to false by default to avoid heavy stochastic validation on large automata

      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Hash, Debug, Default)]
      pub struct I16Map<T> {
          pub exceptions: BTreeMap<i16, T>,
          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String {
          format!("{}", code)
          // let u = code as u16;
          // if let Some(c) = char::from_u32(u as u32) {
          //     if c.is_ascii_graphic() || c == ' ' {
          //         format!("'{}'", c)
          //     } else {
          //         format!("{}", u)
          //     }
          // } else {
          //     format!("{}", u)
          // }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/ops.rs: |
      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWADefaultTransition, NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use std::collections::{BTreeSet, VecDeque};

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let result_dwa = union_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let result_dwa = concat_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      impl NWA {
          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      // Assume ALL if weight is missing, though this should not happen with current DWA builders.
                      let w = st.trans_weight_default.as_ref().cloned().unwrap_or_else(Weight::all);
                      let exceptions = st.transitions.exceptions.keys().copied().collect();
                      nwa.states.0[i].default.push(NWADefaultTransition {
                          target: to,
                          weight: w,
                          exceptions,
                      });
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      let w = st.trans_weights_exceptions.get(lbl).cloned().unwrap_or_else(Weight::all);
                      nwa.states.add_transition(i, *lbl, *to, w).unwrap();
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = union_nwa.determinize_to_dwa();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, targets) in states[u].transitions.iter() {
                      for (v, _) in targets {
                          if *v < states.len() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                          }
                      }
                  }
                  for def in &states[u].default {
                      if def.target < states.len() && !visited[def.target] {
                          visited[def.target] = true;
                          q.push_back(def.target);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }
          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = concat_nwa.determinize_to_dwa();


                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              Self::internal_concatenate_components(states, left, right, eps_weight)
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/weighted_automata/determinization.rs: |
      use super::bitset::{mix3, FP_K1, FP_K2, FP_ZERO};
      use super::common::Weight;
      use super::dwa::DWA;
      use super::nwa::{NWA, NWADefaultTransition};
      use crate::precompute4::weighted_automata::NWAStateID;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use crate::r#macro::is_debug_level_enabled;
      use indicatif::{ProgressBar, ProgressStyle};

      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};
      use std::time::Instant;

      type Label = i16;

      // Public determinization entry point.
      impl NWA {
          pub fn determinize_to_dwa(&self) -> DWA {
              let now = Instant::now();
              let mut nwa = self.clone();
              nwa.simplify();

              if is_debug_level_enabled(5) {
                  eprintln!("NWA after simplify:\n{}", nwa);
              }
              if nwa.states.0.is_empty() {
                  return DWA::new();
              }

              let mut det = Determinizer::new(&nwa);
              let dwa = det.run();

              if is_debug_level_enabled(5) {
                  eprintln!("NWA::determinize_to_dwa result DWA stats:\n{}", dwa.stats());
                  eprintln!("NWA::determinize_to_dwa took: {:?}", now.elapsed());
              }
              dwa
          }
      }

      // A default step: closure(target) masked by default weight; carries the default's exception set.
      #[derive(Clone)]
      struct DefaultStep {
          exceptions: BTreeSet<Label>,
          pairs: Vec<(NWAStateID, Weight)>,
      }

      // Per-NWA-state precomputation: labeled steps and default steps (all closure-applied).
      #[derive(Clone, Default)]
      struct StatePrecomp {
          // For label l: union over all edges (s -l,w-> t) of (closure(t) & w)
          labeled: BTreeMap<Label, Vec<(NWAStateID, Weight)>>,
          // For defaults: for each default d, closure(d.target) & d.weight with its exception set.
          defaults: Vec<DefaultStep>,
          // All labels that may differ from default: labeled keys ∪ all default exception labels
          labels_of_interest: BTreeSet<Label>,
      }

      // A simple interner for determinized states represented as canonical vectors (sid, mask).
      struct NodeInterner {
          nodes: Vec<Vec<(NWAStateID, Weight)>>,
          map: HashMap<u64, Vec<usize>>,
      }
      impl NodeInterner {
          fn new() -> Self {
              Self { nodes: Vec::new(), map: HashMap::new() }
          }
          fn fingerprint(pairs: &[(NWAStateID, Weight)]) -> u64 {
              pairs.iter().fold(FP_ZERO, |fp, (sid, w)| {
                  mix3(fp, (*sid as u64).wrapping_mul(FP_K1), w.fp.wrapping_mul(FP_K2))
              })
          }
          // Intern canonical vector; return (id, is_new)
          fn intern(&mut self, pairs: Vec<(NWAStateID, Weight)>) -> (usize, bool) {
              let fp = Self::fingerprint(&pairs);
              if let Some(ids) = self.map.get(&fp) {
                  for &i in ids {
                      if self.nodes[i] == pairs {
                          return (i, false);
                      }
                  }
              }
              let id = self.nodes.len();
              self.nodes.push(pairs);
              self.map.entry(fp).or_default().push(id);
              (id, true)
          }
          fn get(&self, id: usize) -> &[(NWAStateID, Weight)] {
              &self.nodes[id]
          }
          fn len(&self) -> usize { self.nodes.len() }
      }

      // Main determinizer (concise, cache-friendly).
      struct Determinizer<'a> {
          nwa: &'a NWA,

          // Backward reachability weights (weights that can reach some final).
          future: Vec<Weight>,
          // ε-closure(s): vector of (state, mask) pairs masked by 'future'.
          closures: Vec<Vec<(NWAStateID, Weight)>>,
          // For each s: union over closure(s) of mask & final_weight, used for finalization.
          final_via_closure: Vec<Weight>,

          // Per-state precomputation of labeled/default steps (applied to closures).
          pre: Vec<StatePrecomp>,

          interner: NodeInterner,
      }

      impl<'a> Determinizer<'a> {
          fn new(nwa: &'a NWA) -> Self {
              let n = nwa.states.len();
              Self {
                  nwa,
                  future: vec![Weight::zeros(); n],
                  closures: vec![Vec::new(); n],
                  final_via_closure: vec![Weight::zeros(); n],
                  pre: vec![StatePrecomp::default(); n],
                  interner: NodeInterner::new(),
              }
          }

          fn run(&mut self) -> DWA {
              self.compute_future_weights();
              self.compute_eps_closures();
              self.precompute_steps();

              // Start determinized state = ε-closure(start)
              let start_pairs = self.closures[self.nwa.body.start_state].clone();
              let (start_id, _) = self.interner.intern(start_pairs);
              let mut dwa = DWA::new();
              dwa.states.0.clear();
              dwa.states.0.resize(self.interner.len(), Default::default());
              dwa.body.start_state = start_id;

              let pb = Self::progress_bar(0, "Determinize (BFS)");

              // BFS over determinized states
              let mut q: VecDeque<usize> = VecDeque::new();
              let mut seen: Vec<bool> = vec![false; 1.max(self.interner.len())];
              q.push_back(start_id);
              seen.resize(self.interner.len(), false);
              seen[start_id] = true;

              while let Some(u) = q.pop_front() {
                  if let Some(p) = &pb {
                      p.inc(1);
                      p.set_length(self.interner.len() as u64);
                  }
                  // Ensure DWA arena is big enough
                  if dwa.states.len() < self.interner.len() {
                      dwa.states.0.resize(self.interner.len(), Default::default());
                  }

                  // Content of this determinized node
                  let content = self.interner.get(u).to_vec();

                  // 1) Final weight
                  let mut fin = Weight::zeros();
                  for (sid, gate) in &content {
                      let f = &self.final_via_closure[*sid];
                      if !f.is_empty() {
                          fin |= &(gate & f);
                      }
                  }
                  if !fin.is_empty() {
                      dwa.set_final_weight(u, fin).unwrap();
                  }

                  // 2) Default target (content + mask) aggregated over defaults ignoring exceptions.
                  let (def_vec, def_mask) = self.build_default_target(&content);
                  let mut def_target_id = None;
                  if !def_vec.is_empty() && !def_mask.is_empty() {
                      let (tid, is_new) = self.interner.intern(def_vec.clone());
                      def_target_id = Some(tid);
                      if is_new {
                          if self.interner.len() > dwa.states.len() {
                              dwa.states.0.resize(self.interner.len(), Default::default());
                          }
                          if tid >= seen.len() { seen.resize(tid + 1, false); }
                          if !seen[tid] {
                              seen[tid] = true;
                              q.push_back(tid);
                          }
                      }
                      // Set default transition; it may be overridden by exceptions next.
                      dwa.set_default_transition(u, tid, def_mask.clone()).unwrap();
                  }

                  // 3) Exception labels: labels where behavior differs from default.
                  let labels = self.labels_of_interest_for(&content);
                  for lbl in labels {
                      let (lbl_vec, lbl_mask) = self.build_label_target(&content, lbl);
                      if lbl_vec.is_empty() || lbl_mask.is_empty() {
                          continue;
                      }
                      // If label's target content equals default content, it's not an exception.
                      if def_target_id.is_some() {
                          if lbl_vec == def_vec {
                              continue;
                          }
                      } else {
                          // If no default exists, any non-empty labeled behavior is necessarily an exception.
                      }

                      let (tid, is_new) = self.interner.intern(lbl_vec);
                      if is_new {
                          if self.interner.len() > dwa.states.len() {
                              dwa.states.0.resize(self.interner.len(), Default::default());
                          }
                          if tid >= seen.len() { seen.resize(tid + 1, false); }
                          if !seen[tid] {
                              seen[tid] = true;
                              q.push_back(tid);
                          }
                      }
                      dwa.add_transition(u, lbl, tid, lbl_mask).unwrap();
                  }
              }

              if let Some(p) = pb {
                  p.finish_with_message(format!("Discovered {} DWA states", self.interner.len()));
              }
              dwa
          }

          // -------------------- Precomputation --------------------

          fn compute_future_weights(&mut self) {
              let n = self.nwa.states.len();
              let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![Vec::new(); n];

              for p in 0..n {
                  // ε
                  for &(t, ref w) in &self.nwa.states.0[p].epsilons {
                      if t < n { rev[t].push((p, w.clone())); }
                  }
                  // labeled
                  for (_, targets) in &self.nwa.states.0[p].transitions {
                      for (t, w) in targets {
                          if *t < n { rev[*t].push((p, w.clone())); }
                      }
                  }
                  // defaults (ignore exception sets for "reachability" – if a default exists, some label uses it)
                  for d in &self.nwa.states.0[p].default {
                      if d.target < n {
                          rev[d.target].push((p, d.weight.clone()));
                      }
                  }
              }

              let mut fut = vec![Weight::zeros(); n];
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              for s in 0..n {
                  if let Some(fw) = &self.nwa.states.0[s].final_weight {
                      if !fw.is_empty() {
                          fut[s] = fw.clone();
                          q.push_back(s);
                      }
                  }
              }

              while let Some(v) = q.pop_front() {
                  let fv = fut[v].clone();
                  if fv.is_empty() { continue; }
                  for (p, w) in &rev[v] {
                      let add = &fv & w;
                      if !add.is_empty() && !add.is_subset_of(&fut[*p]) {
                          fut[*p] |= &add;
                          q.push_back(*p);
                      }
                  }
              }
              self.future = fut;
          }

          fn compute_eps_closures(&mut self) {
              let n = self.nwa.states.len();
              let pb = Self::progress_bar(n as u64, "ε-closures");

              let mut scratch = vec![Weight::zeros(); n];
              let mut q = VecDeque::new();
              let mut touched: Vec<NWAStateID> = Vec::new();

              for s in 0..n {
                  let pairs = self.eps_closure(s, &mut scratch, &mut q, &mut touched);
                  // final via closure(s)
                  let mut fw = Weight::zeros();
                  for (t, w) in &pairs {
                      if let Some(f) = &self.nwa.states.0[*t].final_weight {
                          fw |= &(w & f);
                      }
                  }
                  self.closures[s] = pairs;
                  self.final_via_closure[s] = fw;
                  if let Some(p) = &pb { p.inc(1); }
              }

              if let Some(p) = pb {
                  p.finish_with_message("ε-closures done");
              }
          }

          fn eps_closure(
              &self,
              s: NWAStateID,
              scratch: &mut [Weight],
              q: &mut VecDeque<NWAStateID>,
              touched: &mut Vec<NWAStateID>,
          ) -> Vec<(NWAStateID, Weight)> {
              let n = self.nwa.states.len();
              if s >= n || self.future[s].is_empty() {
                  return Vec::new();
              }

              scratch[s] = self.future[s].clone();
              touched.push(s);
              q.push_back(s);

              while let Some(u) = q.pop_front() {
                  let base = scratch[u].clone();
                  if base.is_empty() { continue; }
                  for &(v, ref w) in &self.nwa.states.0[u].epsilons {
                      if v >= n { continue; }
                      let mut prop = &base & w;
                      if prop.is_empty() { continue; }
                      prop &= &self.future[v];
                      if prop.is_empty() { continue; }
                      if !prop.is_subset_of(&scratch[v]) {
                          if scratch[v].is_empty() { touched.push(v); }
                          scratch[v] |= &prop;
                          q.push_back(v);
                      }
                  }
              }

              let mut out = Vec::with_capacity(touched.len());
              for &i in touched.iter() {
                  if !scratch[i].is_empty() {
                      out.push((i, scratch[i].clone()));
                      scratch[i] = Weight::zeros();
                  }
              }
              touched.clear();
              out.sort_by_key(|(sid, _)| *sid);
              out
          }

          fn precompute_steps(&mut self) {
              let n = self.nwa.states.len();
              let pb = Self::progress_bar(n as u64, "Precompute steps");

              for s in 0..n {
                  // Defaults
                  let mut defaults: Vec<DefaultStep> = Vec::new();
                  for d in &self.nwa.states.0[s].default {
                      if d.target >= n { continue; }
                      let pairs = Self::apply_weight_to_pairs(&self.closures[d.target], &d.weight);
                      if !pairs.is_empty() {
                          defaults.push(DefaultStep { exceptions: d.exceptions.clone(), pairs });
                      }
                  }

                  // Labeled
                  let mut labeled: BTreeMap<Label, Vec<(NWAStateID, Weight)>> = BTreeMap::new();
                  for (lbl, targets) in &self.nwa.states.0[s].transitions {
                      let mut acc: HashMap<NWAStateID, Weight> = HashMap::new();
                      for (to, w) in targets {
                          if *to >= n { continue; }
                          for (t, wt) in Self::apply_weight_to_pairs(&self.closures[*to], w) {
                              *acc.entry(t).or_default() |= &wt;
                          }
                      }
                      let mut v: Vec<(NWAStateID, Weight)> = acc.into_iter().filter(|(_, w)| !w.is_empty()).collect();
                      v.sort_by_key(|(t, _)| *t);
                      if !v.is_empty() {
                          labeled.insert(*lbl, v);
                      }
                  }

                  // Labels of interest: union of labeled keys and default exception labels
                  let mut labels_of_interest: BTreeSet<Label> = labeled.keys().copied().collect();
                  for d in &defaults {
                      labels_of_interest.extend(d.exceptions.iter().copied());
                  }

                  self.pre[s] = StatePrecomp { labeled, defaults, labels_of_interest };
                  if let Some(p) = &pb { p.inc(1); }
              }

              if let Some(p) = pb {
                  p.finish_with_message("Precompute steps done");
              }
          }

          // -------------------- Builders for transitions --------------------

          fn labels_of_interest_for(&self, content: &[(NWAStateID, Weight)]) -> BTreeSet<Label> {
              let mut out = BTreeSet::new();
              for (sid, gate) in content {
                  if gate.is_empty() { continue; }
                  out.extend(self.pre[*sid].labels_of_interest.iter().copied());
              }
              out
          }

          // Default target content and its mask for a determinized state
          fn build_default_target(&self, content: &[(NWAStateID, Weight)]) -> (Vec<(NWAStateID, Weight)>, Weight) {
              let mut acc: HashMap<NWAStateID, Weight> = HashMap::new();
              let mut mask = Weight::zeros();

              for (sid, gate) in content {
                  if gate.is_empty() { continue; }
                  for d in &self.pre[*sid].defaults {
                      for (t, w) in &d.pairs {
                          let add = gate & w;
                          if !add.is_empty() {
                              *acc.entry(*t).or_default() |= &add;
                              mask |= &add;
                          }
                      }
                  }
              }

              let mut v: Vec<(NWAStateID, Weight)> = acc.into_iter().filter(|(_, w)| !w.is_empty()).collect();
              v.sort_by_key(|(t, _)| *t);
              (v, mask)
          }

          // Label target content and its mask for a determinized state on label 'lbl'.
          // Semantics: use labeled edges if present at a state; otherwise fallback to defaults (if 'lbl' not an exception).
          fn build_label_target(&self, content: &[(NWAStateID, Weight)], lbl: Label) -> (Vec<(NWAStateID, Weight)>, Weight) {
              let mut acc: HashMap<NWAStateID, Weight> = HashMap::new();
              let mut mask = Weight::zeros();

              for (sid, gate) in content {
                  if gate.is_empty() { continue; }
                  let sp = &self.pre[*sid];

                  let mut used_labeled = false;
                  if let Some(v) = sp.labeled.get(&lbl) {
                      used_labeled = true;
                      for (t, w) in v {
                          let add = gate & w;
                          if !add.is_empty() {
                              *acc.entry(*t).or_default() |= &add;
                              mask |= &add;
                          }
                      }
                  }
                  if !used_labeled {
                      // fallback via defaults unless label is in exceptions
                      for d in &sp.defaults {
                          if d.exceptions.contains(&lbl) { continue; }
                          for (t, w) in &d.pairs {
                              let add = gate & w;
                              if !add.is_empty() {
                                  *acc.entry(*t).or_default() |= &add;
                                  mask |= &add;
                              }
                          }
                      }
                  }
              }

              let mut v: Vec<(NWAStateID, Weight)> = acc.into_iter().filter(|(_, w)| !w.is_empty()).collect();
              v.sort_by_key(|(t, _)| *t);
              (v, mask)
          }

          // -------------------- Utilities --------------------

          fn apply_weight_to_pairs(base: &[(NWAStateID, Weight)], w: &Weight) -> Vec<(NWAStateID, Weight)> {
              if w.is_all_fast() {
                  return base.to_vec();
              }
              let mut out = Vec::with_capacity(base.len());
              for (sid, bw) in base {
                  let x = bw & w;
                  if !x.is_empty() {
                      out.push((*sid, x));
                  }
              }
              out
          }

          fn progress_bar(len: u64, label: &str) -> Option<ProgressBar> {
              if !PROGRESS_BAR_ENABLED {
                  return None;
              }
              let style = ProgressStyle::default_bar()
                  .template(&format!("{{spinner:.green}} [Determinize: {{elapsed_precise}}] [{{wide_bar:.cyan/blue}}] {{pos}}/{{len}} ({})", label))
                  .unwrap();
              Some(ProgressBar::new(len).with_style(style))
          }
      }
