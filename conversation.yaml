      +///
      +/// This is only available if the `attributes` feature is enabled (on by default).
      +///
      +/// # Example
      +///
      +/// ```ignore
      +/// use sep1::profiler::{timed, print_summary, reset};
      +///
      +/// #[timed]
      +/// fn my_function() {
      +///     std::thread::sleep(std::time::Duration::from_millis(50));
      +/// }
      +///
      +/// my_function();
      +/// print_summary();
      +/// reset();
