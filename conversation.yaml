      Here's what this means.
      Each phase has its own todo. Only after a `None` is encountered during phase 3 do we merge into the `next` state.
      Phase 1 is just the initial item in the todo right now, ie self.active_state.stack.clone(). As soon as an item is processed in this phase, it moves to phase 2, no matter what the action was.
      Phase 2 is like what we have now. It processes until a shift is found, and then it moves to the next phase (phase 3).
      Phase 3 is like the default reduction phase at the end of the function right now.

      Each phase uses only the data for that phase in the row.

      Currently, we have an enum that can either be a default reduction or a lookahead map from terminal to action.
      Now, default actions only exist in phase 3.
      Phase 2 shifts and reduces is just like what we have now, but as if we hadn't used `optimize_with_default_reductions`.
      Phase 1 shifts and reduces is the same as phase 2, but it excludes reduces where we've decided to promote to default reduces. Default reduces should have been executed in the prior step. (Make sure to remove split entries entirely if they're empty after excluding the promoted reduce.)
      Phase 3 default reduce is a reduce that we've decided to promote. It is optional - we don't have to promote any. If `phase3_default_reduces.clone_and_merge` is true, we should clone the parse state and merge it into `next`.

      What do we do to promote a reduce? It won't be the same criteria as in `optimize_with_default_reductions` right now.
      Instead, what we'll do is just choose the most common reduction (ignoring production IDs) as the one to promote.
      As mentioned earlier
      - this reduction will go into phase 3,
      - phase 2 will be unchanged here, but
      - the phase 1 shifts and reduces will be the same as the phase 2 ones, except that all entries with the promoted reduction as a value will be removed.

      Note that if `phase3_default_reduces.reduce` is `None`, `phase3_default_reduces.clone_and_merge` should be `true`.

      How do we choose `phase3_default_reduces.clone_and_merge` if `phase3_default_reduces.reduce` is not `None`?
      `phase3_default_reduces.clone_and_merge` should be `true` if there are *any* entries at all in phase 1 for this state.

      What do we mean when we say 'moves to the next phase'?
      Well we have this todo list, which contains parse states. But since `GSSNode` stores its data on edges, each `GSSNode` (and hence each `ParseState`) can have more than one top states. So, we then iterate over those top states using `state.stack.peek_iter()`.
      We treat each iteration in `state.stack.peek_iter()` as a separate kind of 'inner parse state'.
      When we say 'move to the next phase', we mean that we move the 'inner parse state' to the next todo list, first turning it into its own `ParseState` via `GSSPeek::to_arc_node` or similar, *not* that we move the whole outer `ParseState` itself.


