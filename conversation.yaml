              assert!(!Arc::ptr_eq(&s_mid1, &s_mid2), "Mid1 and Mid2 should be different nodes");

              let s_leaf1 = s_mid1.get_predecessors_arcs()[0].clone();
              let s_leaf2 = s_mid2.get_predecessors_arcs()[0].clone();

