      fn create_simple_parser() -> GLRParser {
          // This grammar is left-recursive but does NOT have length-1 cycles.
          let productions = vec![
              prod("S", vec![nt("A"), t("$")]), // Start rule
              prod("A", vec![nt("A"), t("a")]),
              prod("A", vec![t("b")]),
          ];

