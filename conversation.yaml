          }
          let max_passes = 3;
          for _ in 0..max_passes {
              let mut changed = false;
              if prune_unproductive_nodes(roots, end_node, god) {
                  changed = true;
              }
              if compress_noop_edges(roots, end_node, god) {
                  changed = true;
                  if prune_unproductive_nodes(roots, end_node, god) {
