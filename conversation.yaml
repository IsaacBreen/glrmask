                  ("STAR", eat_u8(b'*')),
                  ("SLASH", eat_u8(b'/')),
                  ("VBAR", eat_u8(b'|')),
                  ("AMPER", eat_u8(b'&')),
                  ("LESS", eat_u8(b'<')),
                  ("GREATER", eat_u8(b'>')),
                  ("EQUAL", eat_u8(b'=')),
                  ("PERCENT", eat_u8(b'%')),
                  ("CIRCUMFLEX", eat_u8(b'^')),
                  ("TILDE", eat_u8(b'~')),
