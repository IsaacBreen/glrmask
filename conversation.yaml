      def aggregate(values, method: str):
          if not values:
              return 0.0
          if method == "min":
              return float(min(values))
          if method == "max":
              return float(max(values))
          if method == "mean":
              return float(mean(values))
          if method == "median":
              return float(median(values))
          # Fallback: mean
          return float(mean(values))


