      (The `derive`s are the same as on the old node so all the `BTree*`
      containers keep working.)

      1.2  Delete the `pub value: T` field everywhere (the compiler will show
      you every remaining occurrence).

      1.3  Constructor helpers  
      Rewrite the four helpers so that they **never** need a label:

      • `fn new() -> Self`  
        – leave it exactly as today but drop the `value` parameter.

      • `fn new_with_predecessors(predecessors: Vec<(T, Arc<GSSNode<T>>)>)
         -> Self`  
        – each tuple becomes a `GSSEdge` and goes into the set.

      • `fn from_iter<I>(iter: I)`  
        – build an *empty* root node (`GSSNode::<T>::new()`), then for every
          value in `iter` call `push(label)` on the current head (see below).

      • `fn push(&self, label: T) -> GSSNode<T>`  
        – old `self.value` disappears; instead
          1. construct a fresh node `let mut n = GSSNode::<T>::new();`
          2. create an edge  
             `n.predecessors.insert(GSSEdge{pred: ArcPtrWrapper::new(Arc::new(self.clone())), label});`
          3. return `n`.

      1.4  “Navigation” helpers

      • `fn peek(&self) -> impl Iterator<Item=&T>` – returns *all* incoming
        labels, e.g.

              self.predecessors.iter().map(|e| &e.label)

      • `fn pop(&self) -> Vec<(Arc<GSSNode<T>>, &T)>` – same as today but
        keep the label:

              self.predecessors
                  .iter()
                  .map(|e| (e.pred.as_arc().clone(), &e.label))
                  .collect()

      • `fn popn(&self, n: usize) -> Vec<(Arc<GSSNode<T>>, &T)>` – adapt the
        recursion to propagate the label tuple instead of only the node.

      (The de-duplication logic you already wrote still works, only the value
      type of the vectors changes.)

      1.5  Delete `value_mut`, `map`, every `flatten*` function and the old
      `merge*` helpers – none of them makes sense any more once the label has
      moved off the node.  
      Later, if you *really* need them, re-introduce them with the new edge
      API, but they are not used elsewhere in the current code base.

      1.6  `GSSTrait`  
      Change the associated types and signatures so that

          fn peek(&self) -> impl Iterator<Item=&T>;
          fn pop(&self)  -> Vec<(Arc<GSSNode<T>>, &T)>;
          fn popn(&self, n: usize) -> Vec<(Arc<GSSNode<T>>, &T)>;

      Implement it for `GSSNode`, `Arc<GSSNode>` and the two `Option`
      wrappers exactly the same way you did before, only forwarding the new
      return types.

      1.7  `BulkMerge`  
      The grouping key can stay the (now empty) `Arc<GSSNode<T>>` pointer –
      the label is no longer part of the node so nothing changes here *except*
      that you use `edge.label.clone()` whenever you previously cloned
      `node.value`.

      --------------------------------------------------------------------
      2.  `src/glr/parser.rs` – one shared head instead of a map
      --------------------------------------------------------------------

      2.1  At the very top add a type alias you will use in place of the old
      `ParseState` struct:

          type ParseStack<T> = Arc<GSSNode<ParseStateNodeContent<T>>>;

      2.2  Delete the whole `ParseState<T>` struct and the helper
      `ParseStateKey`.  
      All code that needs the “top item” now does

          for (prev, label) in head.pop() {
              //  label is &ParseStateNodeContent<T>
              //  prev  is Arc<GSSNode<…>>
          }

      2.3  GLRParser::init_* helpers

      • Change `init_parse_state_with_t` so that it

          1. creates an *empty* root `let root = Arc::new(GSSNode::new());`
          2. returns `Arc::new(root.push(ParseStateNodeContent{ … }))`.

      (You no longer wrap it into `ParseState`, you directly return the
      `Arc<GSSNode<_>>`.)

      2.4  GLRParserState struct

      Replace

          active_states: BTreeMap<ParseStateKey, ParseState<T>>,
          action_not_found_states: BTreeMap<ParseStateKey, ParseState<T>>,

      with

          head: ParseStack<T>,          // new – the *current* top layer
          not_found: ParseStack<T>,     // optional: keep if you still need it

      2.5  All constructors of GLRParserState must now store
      `head = parser.init_parse_state_with_t(t)` instead of building the old
      map.

      2.6  Helper methods that used to expect a `ParseState` now work on
      edges:

      • `push_state` takes `&Arc<GSSNode<…>>` and `label`
        and returns `Arc::new(stack.push(label))`.

      • `pop_and_goto`
        1. iterate over `stack.popn(len)`  
           `for (parent, top_label) in stack.popn(len) { ... }`
        2. `let goto = self.parser.stage_7_table[&top_label.state_id].gotos[&nt];`
        3. create the new label with intersected `t`
           and `result.push(Arc::new(parent.push(new_label)))`.

      2.7  `step`

      The outer work list is now a `Vec<ParseStack<T>>` initialised with
      `vec![self.head.clone()]`.

      Inside the loop replace every access like

          let stack   = state.stack;
          let top     = stack.peek();

      with

          let (stack, top) = state;   // because `state` **is** the stack
                                     // and `top` will be assigned below

      but remember that `peek()` is now an *iterator*; pick the single element
      you want with `.next().unwrap()` (or iterate over all if you need to
      branch per edge).

      The easiest migration pattern is:

          for (stack, top) in todo.pop().peek().map(|l| (todo.pop(), l)) {
              ... old body with stack / top ...
          }

      and adapt the body line-by-line in the same spirit as you did for
      `pop_and_goto`.

      The end of `step` just assigns

          self.head = new_head;      // whatever head you built in that round

      and you can drop the whole `action_not_found_states` logic for now – add
      it back once the core works.

      --------------------------------------------------------------------
      3.  `constraint.rs` and the rest of the tree
      --------------------------------------------------------------------

      3.1  Every place that still reads or writes
      `parse_state.stack.xxx` becomes a traversal over the edge label that
      leads *into* the node you are currently looking at.  The pattern is
      always

          for (prev, label) in some_node.pop() {
              /* label == &ParseStateNodeContent<…> */
              /* prev   == Arc<GSSNode<…>>           */
          }

      Do **not** try to keep a `ParseState` helper – you will re-introduce all
      the duplication that the new model is meant to remove.

      3.2  All calls to `merge`, `merge_unchecked`, `value_mut`, the pretty
      printers, statistics helpers, etc. must be rewritten or removed.  They
      all depended on `value` being stored on the node; you now merge or print
      **edges**.  In almost every case the fix is:

      • iterate over `node.predecessors` and inspect/merge `edge.label`
        instead of `node.value`.  
      • keep the BFS/DFS logic unchanged – only the data that is carried
        around changes shape.

      3.3  As soon as everything compiles again, re-run the unit tests.  All
      tests that were written against node labels will have to be rewritten,
      too; they should now check the *edges*.

      --------------------------------------------------------------------
      4.  Quick checklist (things that are easy to overlook)
      --------------------------------------------------------------------

      • Remove every remaining `.value` access – search for `".value"`.

      • Remove every trait bound that required `T: PartialEq` just because it
        was used in `node.value == other.value`.  If you still need equality
        for something else keep it, otherwise drop it.

      • Remember that `BulkMerge` still groups by “node identity”, not by
        labels.  That is fine and exactly what we want.

      • All `Debug / Display` impls that printed the node value must be
        updated to print the incoming edge labels instead.

      --------------------------------------------------------------------
      5.  Compiling piecemeal
      --------------------------------------------------------------------

      The migration compiles cleanly if you do it in three waves:

      1. Finish **all** changes in `gss.rs` and make sure *nothing* outside
         that module compiles yet (`cargo check -p datastructures`).

      2. Adapt `glr/parser.rs` until the GLR crate compiles.

      3. Work your way upwards (`constraint.rs`, the CLI, tests, …).

      That way you never have more than a single crate in a non-compiling
      state, which makes the error messages manageable.

      --------------------------------------------------------------------
      That’s it
      --------------------------------------------------------------------

      After those edits the whole project uses one unified, edge-labelled GSS.
      There is only one head node per parser instance, no duplicated
      `ParseState` structs and no label duplication on the nodes
      themselves – exactly the layout you asked for.
