              todo: Dict[int, set[int]] = defaultdict(set)

              # Seed: map tokenizer states to trie roots; merge into values and schedule
              for sid, gss in state_to_gss.items():
                  root_idx = self.roots_map.get(int(sid))
                  if root_idx is None:
