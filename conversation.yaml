          }

          fn pop(&self) -> PyResult<Self> {
              Ok(LeveledGSS {
                  inner: self.inner.pop(),
              })
          }

          fn popn(&self, n: isize) -> PyResult<Self> {
              Ok(LeveledGSS {
                  inner: self.inner.popn(n),
              })
          }

          fn is_empty(&self) -> PyResult<bool> {
              Ok(self.inner.is_empty())
