          def from_symbols(cls, symbols: List[str]) -> SymbolTable:
              """
              Constructs a SymbolTable from list of strings.

              Args:
                  symbols: List of symbols

              Returns:
                  A new `SymbolTable`.
              """
              symt = cls()

              for symbol in symbols:
                  symt.add_symbol(symbol)

              return symt

