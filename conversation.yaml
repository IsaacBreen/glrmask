      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset;

      pub(crate) const STOCHASTIC_DEBUG: bool = false;
      pub(crate) const DETERMINIZE_DEBUG: bool = false;
      pub(crate) const BENCHMARK_DEBUG: bool = false;

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String { code.to_string() }

      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }

      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/ops.rs: |
      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWAStates, NWA};
      use std::collections::VecDeque;

      impl DWA {
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some((t, w)) = st.get_transition(ch) {
                      acc &= w;
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() {
                              return Weight::zeros();
                          }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }

              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() {
                          Weight::zeros()
                      } else {
                          res
                      }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };
              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);
              let union_nwa = NWA { states: combined_states, body: union_body };
              let result_dwa = union_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(self, other, &result_dwa);
              }
              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());
              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let result_dwa = concat_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(self, other, &result_dwa, &Weight::all());
              }
              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);
              self.states.apply_weight(new_start_id, weight);
              self.body.start_state = new_start_id;
              new_start_id
          }

          pub fn apply_weight_inplace(&mut self, weight: &Weight) {
              let start_state = self.states.0.get_mut(self.body.start_state).unwrap();
              if let Some(sw) = &start_state.state_weight {
                  start_state.state_weight = Some(sw & weight);
              } else {
                  start_state.state_weight = Some(weight.clone());
              }
              if let Some(sw) = &start_state.final_weight {
                  start_state.final_weight = Some(sw & weight);
              }
              for (_, tw) in start_state.trans_weights.iter_mut() {
                  *tw &= weight;
              }
          }
      }

      impl NWA {
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() {
                  nwa.states.add_state();
              }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  for (lbl, to) in &st.transitions {
                      let w = st.trans_weights.get(lbl).cloned().unwrap_or_else(Weight::all);
                      nwa.states.add_transition(i, *lbl, *to, w).unwrap();
                  }
              }
              nwa
          }

          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = union_nwa.determinize_to_dwa();
                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(
              states: &mut NWAStates,
              left: &NWABody,
              right: &NWABody,
              eps_weight: &Weight,
          ) -> NWABody {
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  for (_, targets) in states[u].transitions.iter() {
                      for (v, _) in targets {
                          if *v < states.len() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                          }
                      }
                  }
              }

              for sid in 0..states.len() {
                  if !visited[sid] {
                      continue;
                  }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }

          pub fn concatenate_components(
              states: &mut NWAStates,
              left: &NWABody,
              right: &NWABody,
              eps_weight: &Weight,
          ) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body =
                      Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = concat_nwa.determinize_to_dwa();
                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              let new_left = states.copy_subgraph_in_place_and_return_body(*left);
              Self::internal_concatenate_components(states, &new_left, right, eps_weight)
          }

          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/template_nwa.rs: |
      use std::collections::BTreeMap;

      use crate::glr::parser::GLRParser;
      use crate::glr::table::{NonTerminalID, StateID as ParserStateID, TerminalID};
      use crate::precompute4::characterize::{compute_all_characterizations, BelowBottomCharacterization};
      use crate::precompute4::utils;
      use crate::precompute4::utils::DEFAULT_TRANSITION_SYMBOL;
      use crate::precompute4::weighted_automata::{DWA, NWA, NWABuildError, StateID, Weight};

      /// Error type for building the full DWA structures used in precompute4.
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum FullDWABuildError {
          ParserStateIdOutOfRange { state_id: ParserStateID },
          AutomatonBuild(NWABuildError),
      }

      impl From<NWABuildError> for FullDWABuildError {
          fn from(e: NWABuildError) -> Self { FullDWABuildError::AutomatonBuild(e) }
      }

      /// Build a template NWA corresponding to the characterization of a single terminal.
      pub(crate) fn build_template_nwa_from_characterization(bb: &BelowBottomCharacterization) -> Result<NWA, FullDWABuildError> {
          let mut nwa = NWA::new();
          let w_all = Weight::all();

          // Node for each non-terminal.
          let mut nt_nodes: BTreeMap<NonTerminalID, StateID> = BTreeMap::new();
          for &nt in &bb.all_nts {
              let id = nwa.states.add_state();
              nt_nodes.insert(nt, id);
          }

          let start = nwa.body.start_state;

          // Initial shifts from start.
          for &(initial_state, shift_state) in &bb.initial_shifts {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let neg_initial = utils::encode_negative_i16(initial_state)?;
              let neg_shift = utils::encode_negative_i16(shift_state)?;

              let s0 = nwa.states.add_state();
              let s1 = nwa.states.add_state();
              let s2 = nwa.states.add_state();
              let s3 = nwa.states.add_state();

              // start --eps--> s0 --(+initial)--> s1 --(-initial)--> s2 --(-shift)--> s3 (final)
              nwa.add_epsilon(start, s0, w_all.clone());
              nwa.add_transition(s0, pos_initial, s1, w_all.clone())?;
              nwa.add_transition(s1, neg_initial, s2, w_all.clone())?;
              nwa.add_transition(s2, neg_shift, s3, w_all.clone())?;
              nwa.states[s3].final_weight = Some(w_all.clone());
          }

          // Initial reduces from start.
          for &(initial_state, len, nt) in &bb.initial_reduces {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let target_nt_state = *nt_nodes.get(&nt).expect("nt_node must exist for initial_reduce");

              // start --eps--> s0 --(+initial)--> s1 --(default)*len--> target_nt_state
              let s0 = nwa.states.add_state();
              nwa.add_epsilon(start, s0, w_all.clone());
              let mut from = s0;
              let next_state = if len == 0 { target_nt_state } else { nwa.states.add_state() };
              nwa.add_transition(from, pos_initial, next_state, w_all.clone())?;
              from = next_state;

              for i in 0..len {
                  let to = if i == len - 1 { target_nt_state } else { nwa.states.add_state() };
                  nwa.states.add_transition(from, DEFAULT_TRANSITION_SYMBOL, to, w_all.clone())?;
                  from = to;
              }
          }

          // Actions from non-terminal states.
          for (nt, rc) in &bb.reduce_characterizations {
              let src_nt_state = *nt_nodes.get(nt).expect("nt_node must exist for reduce_char");

              for &(revealed_state, len, reduce_nt) in &rc.reveal_and_rereduces {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let dst_nt_state = *nt_nodes.get(&reduce_nt).expect("dst nt_node must exist");

                  // src --eps--> s0 --(+revealed)--> s1 --(default)*len--> dst
                  let s0 = nwa.states.add_state();
                  nwa.add_epsilon(src_nt_state, s0, w_all.clone());
                  let mut from = s0;
                  let next_state = if len == 0 { dst_nt_state } else { nwa.states.add_state() };
                  nwa.add_transition(from, pos_revealed, next_state, w_all.clone())?;
                  from = next_state;

                  for i in 0..len {
                      let to = if i == len - 1 { dst_nt_state } else { nwa.states.add_state() };
                      nwa.states.add_transition(from, DEFAULT_TRANSITION_SYMBOL, to, w_all.clone())?;
                      from = to;
                  }
              }

              for &(revealed_state, goto_state, shift_state) in &rc.reveal_goto_shift_escapes {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let neg_revealed = utils::encode_negative_i16(revealed_state)?;
                  let neg_goto = utils::encode_negative_i16(goto_state)?;
                  let neg_shift = utils::encode_negative_i16(shift_state)?;

                  let s0 = nwa.states.add_state();
                  let s1 = nwa.states.add_state();
                  let s2 = nwa.states.add_state();
                  let s3 = nwa.states.add_state();
                  let s4 = nwa.states.add_state();

                  // src --eps--> s0 --(+revealed)--> s1 --(-revealed)--> s2 --(-goto)--> s3 --(-shift)--> s4 (final)
                  nwa.add_epsilon(src_nt_state, s0, w_all.clone());
                  nwa.add_transition(s0, pos_revealed, s1, w_all.clone())?;
                  nwa.add_transition(s1, neg_revealed, s2, w_all.clone())?;
                  nwa.add_transition(s2, neg_goto, s3, w_all.clone())?;
                  nwa.add_transition(s3, neg_shift, s4, w_all.clone())?;
                  nwa.states[s4].final_weight = Some(w_all.clone());
              }
          }

          Ok(nwa)
      }

      /// Build template DWAs for all terminals in the parser.
      pub(crate) fn build_template_dwas(parser: &GLRParser) -> Result<BTreeMap<TerminalID, DWA>, FullDWABuildError> {
          let all = compute_all_characterizations(parser);
          let mut out = BTreeMap::new();
          for (term, bb) in all {
              let mut nwa = build_template_nwa_from_characterization(&bb)?;
              nwa.simplify();
              let mut dwa = nwa.determinize_to_dwa_with_rustfst();
              dwa.simplify();
              crate::debug!(5, "Built template DWA for terminal {:?}:", term);
              crate::debug!(5, "{}", dwa);
              out.insert(term, dwa);
          }
          Ok(out)
      }

      /// Identity DWA used for the "ignore" terminal: start is final and there are no transitions.
      pub(crate) fn build_ignore_terminal_dwa() -> DWA {
          let mut dwa = DWA::new();
          dwa.states[dwa.body.start_state].final_weight = Some(Weight::all());
          dwa
      }

      /// DWA that accepts the empty string with the given weight.
      pub(crate) fn build_epsilon_dwa(weight: Weight) -> DWA {
          let mut dwa = DWA::new();
          dwa.states[dwa.body.start_state].final_weight = Some(weight);
          dwa
      }
    src/precompute4/full_dwa.rs: |
      use std::cell::RefCell;
      use std::collections::{BTreeMap, VecDeque};
      use std::env;
      use std::time::Instant;

      use chrono::Local;

      use crate::constraint::{LLMTokenBV, PrecomputeNode1Index, Trie1GodWrapper};
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::glr::parser::{ExpectElse, GLRParser};
      use crate::json_serialization::JSONConvertible;
      use crate::precompute4::nwa_optimizations::{prune_continuations_from_final_states, simplify_default_transitions};
      use crate::precompute4::resolve_negatives::{apply_cancellations, apply_finality_fixpoint, remove_negative_transitions};
      use crate::precompute4::template_nwa::{build_epsilon_dwa, build_ignore_terminal_dwa, build_template_dwas};
      use crate::precompute4::weighted_automata::{DWA, NWA, NWABody, NWAStates, Weight};
      use crate::r#macro::is_debug_level_enabled;
      use crate::tokenizer::TokenizerStateID;

      struct SimplifyRustfstConfig {
          rm_epsilon: bool,
          determinize: bool,
      }

      impl SimplifyRustfstConfig {
          fn default() -> Self { Self { rm_epsilon: false, determinize: false } }
          fn with_rm_epsilon(mut self, val: bool) -> Self { self.rm_epsilon = val; self }
          fn with_determinize(mut self, val: bool) -> Self { self.determinize = val; self }
      }

      impl NWA {
          pub fn determinize_to_dwa_with_rustfst(&self) -> DWA {
              determinize_nwa_to_dwa(self)
          }
          pub fn simplify_rustfst(&mut self) { self.simplify(); }
          pub fn simplify_rustfst_with_config(&mut self, _config: SimplifyRustfstConfig) { self.simplify(); }
      }

      // Re-export for backward compatibility: `FullDWABuildError` used to be defined here.
      pub use crate::precompute4::template_nwa::FullDWABuildError;
      use crate::precompute4::weighted_automata::determinization_rustfst::determinize_nwa_to_dwa;

      pub type Precomputed4 = DWA;

      /// Public API: precompute4 using an NWA-first approach, determinizing at the end.
      pub fn precompute4(
          parser: &GLRParser,
          precomputed1: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) -> DWA {
          let now_total = Instant::now();
          let now = Instant::now();
          crate::debug!(5, "Starting precompute4...");

          // 1. Build template DWAs for all terminals.
          let template_dwas = match build_template_dwas(parser) {
              Ok(m) => m,
              Err(e) => panic!("Failed to build template DWAs: {:?}", e),
          };
          let ignore_dwa = build_ignore_terminal_dwa();
          crate::debug!(4, "Built {} template DWAs in {:?}", template_dwas.len(), now.elapsed());
          if is_debug_level_enabled(5) {
              for (term, dwa) in template_dwas.iter().take(5) {
                  crate::debug!(5, "Stats for template DWA for terminal {:?}:\n{}", term, dwa.stats());
              }
          }

          // 2. Shared NWA state arena.
          let states_arena = RefCell::new(NWAStates::default());

          // 3. Reverse the precompute1 trie.
          let trie1_roots: Vec<_> = precomputed1.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &trie1_roots);

          let leaf_node = all_nodes
              .iter()
              .find_map(|&idx| idx.read(trie1_god).and_then(|g| if g.value.end { Some(idx) } else { None }))
              .expect("Precompute1 trie must have a single leaf node.");

          let reversed_trie1_god = Trie::reverse(trie1_god, &trie1_roots);
          let reversed_trie_root = leaf_node;

          // 4. Traverse the reversed trie with NWA bodies.
          let initial_nwa_body = {
              let mut states = states_arena.borrow_mut();
              let start = states.add_state();
              states[start].final_weight = Some(Weight::all());
              NWABody { start_state: start }
          };
          let initial_tokens = LLMTokenBV::max_ones();
          use crate::glr::table::TerminalID;
          let initial_term_map: BTreeMap<Option<TerminalID>, Weight> = BTreeMap::from([(None, Weight::all())]);
          let initial_body_map = BTreeMap::from([(initial_nwa_body, initial_term_map)]);
          let initial_values: Vec<(Trie2Index, (BTreeMap<NWABody, BTreeMap<Option<TerminalID>, Weight>>, LLMTokenBV))> =
              vec![(reversed_trie_root, (initial_body_map, initial_tokens))];

          let traversal_data =
              Trie::compute_traversal_data(&reversed_trie1_god, &[reversed_trie_root]).expect("Failed to compute traversal data for reversed trie1");

          let mut original_trie1_roots_map: BTreeMap<PrecomputeNode1Index, Vec<TokenizerStateID>> = BTreeMap::new();
          for (k, v) in precomputed1.iter() {
              original_trie1_roots_map.entry(*v).or_default().push(*k);
          }

          let options = crate::datastructures::trie::PrettyPrintOptions::default().omit_nodes().omit_depth();
          crate::debug!(5, "Trie:\n{}", Trie::pretty_print_with_options(&trie1_god, &trie1_roots, &options));
          crate::debug!(5, "Reversed trie:\n{}", Trie::pretty_print_with_options(&reversed_trie1_god, &[reversed_trie_root], &options));

          let mut final_bodies: BTreeMap<TokenizerStateID, NWABody> = BTreeMap::new();

          let now = Instant::now();
          Trie::special_map_grouped(
              &reversed_trie1_god,
              &traversal_data,
              initial_values,
              // step function
              |current_val: &(NWABody, LLMTokenBV), edge_terminal_opt, dest_map| {
                  let (current_nwa_body, current_tokens) = current_val;
                  let terminal_id = *edge_terminal_opt;

                  let mut results = Vec::new();
                  for (dest_idx, llm_token_bv) in dest_map.iter() {
                      let next_tokens = current_tokens & llm_token_bv;
                      if next_tokens.is_empty() {
                          continue;
                      }
                      let weight = Weight::from_rsb(llm_token_bv.inner.as_ref().clone());
                      let mut terminal_map = BTreeMap::new();
                      terminal_map.insert(terminal_id, weight);
                      let mut body_map = BTreeMap::new();
                      body_map.insert(*current_nwa_body, terminal_map);
                      results.push((*dest_idx, (body_map, next_tokens.clone())));
                  }
                  results
              },
              // merge function: union via epsilon
              |val1: &mut (BTreeMap<NWABody, BTreeMap<Option<TerminalID>, Weight>>, LLMTokenBV),
               val2: (BTreeMap<NWABody, BTreeMap<Option<TerminalID>, Weight>>, LLMTokenBV)| {
                  let (bodies1, tokens1) = val1;
                  let (bodies2, tokens2) = val2;
                  for (right_body, term_map2) in bodies2 {
                      let term_map1 = bodies1.entry(right_body).or_default();
                      for (term, weight2) in term_map2 {
                          *term_map1.entry(term).or_insert_with(Weight::zeros) |= &weight2;
                      }
                  }
                  *tokens1 |= &tokens2;
              },
              // process function: capture at original roots
              |_node_data,
               node_idx,
               val: (BTreeMap<NWABody, BTreeMap<Option<TerminalID>, Weight>>, LLMTokenBV)| {
                  let (nwa_bodies_map, tokens) = val;

                  // Combine all left bodies into a single NWA body via union (epsilon)
                  let mut nwa_body = {
                      let mut states = states_arena.borrow_mut();
                      let start = states.add_state();
                      NWABody { start_state: start }
                  };

                  crate::debug!(6, "NWA states:\n{}", states_arena.borrow());
                  crate::debug!(6, "{:?}", nwa_bodies_map);

                  for (right_body, terminal_map) in nwa_bodies_map {
                      let mut left_bodies = Vec::new();
                      for (terminal_id_opt, weight) in terminal_map {
                          let accum_weight = weight & Weight::from_rsb(tokens.inner.as_ref().clone());
                          if accum_weight.is_empty() {
                              continue;
                          }
                          let template_dwa: &DWA = match terminal_id_opt {
                              Some(terminal_id) if Some(terminal_id) != parser.ignore_terminal_id => {
                                  template_dwas.get(&terminal_id).expect_else(|| format!("No template DWA for terminal {:?}", terminal_id))
                              }
                              _ => &ignore_dwa,
                          };
                          let left_body = instantiate_template_nwa_with_weight(&states_arena, template_dwa, accum_weight);
                          left_bodies.push(left_body);
                      }
                      if left_bodies.is_empty() {
                          continue;
                      }
                      let left_bodies_union = union_left_bodies(&states_arena, left_bodies);
                      let mut states = states_arena.borrow_mut();
                      let composed_body =
                          NWA::concatenate_components(&mut states, &left_bodies_union, &right_body, &Weight::all());
                      nwa_body = NWA::union_components(&mut states, &nwa_body, &composed_body);
                  }

                  crate::debug!(
                      6,
                      "At trie node {:?}, obtained NWA body with start state {} and {} states.",
                      node_idx,
                      nwa_body.start_state,
                      states_arena.borrow().len()
                  );
                  crate::debug!(6, "NWA body:\n{}", nwa_body);
                  crate::debug!(6, "NWA states:\n{}", states_arena.borrow());

                  if !tokens.is_empty() {
                      if let Some(tokenizer_state_ids) = original_trie1_roots_map.get(&node_idx) {
                          for tokenizer_state_id in tokenizer_state_ids {
                              final_bodies.insert(*tokenizer_state_id, nwa_body.clone());
                          }
                      }
                      Some((nwa_body, tokens))
                  } else {
                      None
                  }
              },
          );
          crate::debug!(4, "Reversed trie traversal (special_map_grouped) took: {:?}", now.elapsed());

          // Combine all final NWA bodies into a single NWA
          let mut combined_nwa_states = states_arena.into_inner();
          let combined_start_state = combined_nwa_states.add_state();

          for (tok_id, body) in final_bodies {
              let label = tok_id.0 as i16;
              combined_nwa_states
                  .add_transition(combined_start_state, label, body.start_state, Weight::all())
                  .unwrap();
          }

          let combined_nwa = NWA { states: combined_nwa_states, body: NWABody { start_state: combined_start_state } };
          crate::debug!(4, "Combined NWA has {} states after merging all final bodies.", combined_nwa.states.len());

          let final_dwa = resolve_negatives_and_optimize_and_determinize(parser, combined_nwa);
          crate::debug!(3, "Total precompute4 time: {:?}", now_total.elapsed());
          final_dwa
      }

      fn resolve_negatives_and_optimize_and_determinize(parser: &GLRParser, mut combined_nwa: NWA) -> DWA {
          let now = Instant::now();
          crate::debug!(4, "Starting resolve negatives and optimization and determinization of combined NWA...");
          combined_nwa.simplify_rustfst();
          crate::debug!(4, "Initial simplification took: {:?}. NWA now has {} states.", now.elapsed(), combined_nwa.states.len());

          // crate::debug!(4, "Determinizing combined NWA before negative code resolution...");
          // combined_nwa.determinize_inplace();
          // crate::debug!(
          //     4,
          //     "Pre-resolution determinization took: {:?}. NWA now has {} states.",
          //     now.elapsed(),
          //     combined_nwa.states.len()
          // );
          crate::debug!(4, "Starting negative code resolution...");
          apply_cancellations(&mut combined_nwa);
          crate::debug!(4, "Applied cancellations.");
          apply_finality_fixpoint(&mut combined_nwa);
          crate::debug!(4, "Applied finality fixpoint.");
          remove_negative_transitions(&mut combined_nwa);
          crate::debug!(4, "Removed negative transitions.");
          combined_nwa.simplify_rustfst();
          crate::debug!(
              4,
              "Negative code resolution took: {:?}. NWA now has {} states.",
              now.elapsed(),
              combined_nwa.states.len()
          );
          crate::debug!(4, "Stats for combined NWA after negative resolution:\n{}", combined_nwa.stats());

          let now = Instant::now();
          crate::debug!(4, "Pruning continuations from final states...");
          prune_continuations_from_final_states(&mut combined_nwa);
          simplify_remove_epsilon(&mut combined_nwa);
          crate::debug!(
              4,
              "Pruning and simplifying took: {:?}. NWA now has {} states.",
              now.elapsed(),
              combined_nwa.states.len()
          );
          crate::debug!(4, "Stats for combined NWA after pruning:\n{}", combined_nwa.stats());

          let now = Instant::now();
          crate::debug!(4, "Simplifying default transitions...");
          simplify_default_transitions(&mut combined_nwa);
          simplify_remove_epsilon(&mut combined_nwa);
          crate::debug!(
              4,
              "Default transition simplification took: {:?}. NWA now has {} states.",
              now.elapsed(),
              combined_nwa.states.len()
          );
          crate::debug!(4, "Stats for combined NWA after default simplification:\n{}", combined_nwa.stats());

          crate::debug!(4, "Starting simplification before final determinization...");
          let now = Instant::now();
          simplify_remove_epsilon(&mut combined_nwa);
          combined_nwa.simplify();
          simplify_remove_epsilon(&mut combined_nwa);
          crate::debug!(
              4,
              "Simplification before final determinization took: {:?}. NWA now has {} states.",
              now.elapsed(),
              combined_nwa.states.len()
          );
          crate::debug!(4, "Stats for combined NWA before final determinization:\n{}", combined_nwa.stats());

          if env::var("RLLM_DUMP_NWA").is_ok() {
              let timestamp = Local::now().format("%Y%m%d-%H%M%S");
              let filename = format!("nwa_dump_before_final_det_{}.json", timestamp);
              eprintln!("Dumping NWA to {} before final determinization...", filename);
              let f = std::fs::File::create(&filename).expect("Unable to create NWA dump file");
              serde_json::to_writer_pretty(f, &combined_nwa).expect("Unable to write NWA to file");
              eprintln!("NWA dump complete.");
              let parser_filename = format!("parser_dump_before_final_det_{}.json", timestamp);
              eprintln!("Dumping parser to {}...", parser_filename);
              let parser_f = std::fs::File::create(&parser_filename).expect("Unable to create parser dump file");
              let parser_json = parser.to_json();
              serde_json::to_writer_pretty(parser_f, &parser_json).expect("Unable to write parser to file");
              eprintln!("Parser dump complete.");
          }

          let now = Instant::now();
          crate::debug!(4, "Determinizing final combined NWA...");
          combined_nwa = NWA::from_dwa(&combined_nwa.determinize_to_dwa2());
          crate::debug!(4, "Stats after final NWA determinization:\n{}", combined_nwa.stats());
          combined_nwa.simplify_rustfst();
          crate::debug!(
              4,
              "Final NWA simplification took: {:?}. NWA now has {} states.",
              now.elapsed(),
              combined_nwa.states.len()
          );
          crate::debug!(4, "Stats for final NWA before DWA determinization:\n{}", combined_nwa.stats());
          let mut final_dwa = combined_nwa.determinize_to_dwa();
          crate::debug!(
              4,
              "Final determinize & simplify took: {:?}. Final DWA has {} states.",
              now.elapsed(),
              final_dwa.states.len()
          );
          crate::debug!(4, "Stats for final DWA:\n{}", final_dwa.stats());

          final_dwa
      }

      fn instantiate_template_nwa_with_weight(
          states_arena: &RefCell<NWAStates>,
          template_dwa: &DWA,
          weight: Weight,
      ) -> NWABody {
          crate::debug!(5, "Applying template NWA with weight {:?}...", weight);
          let concatenated_dwa = template_dwa.concatenate(&build_epsilon_dwa(weight));
          let template_nwa = NWA::from_dwa(&concatenated_dwa);
          let mut states = states_arena.borrow_mut();
          let (template_start_in_arena, _) = states.copy_subgraph_from(&template_nwa.states, template_nwa.body.start_state);
          crate::debug!(5, "Template NWA copied into arena. Current arena size: {} states.", states.0.len());
          NWABody { start_state: template_start_in_arena }
      }

      fn union_left_bodies(states_arena: &RefCell<NWAStates>, left_bodies: Vec<NWABody>) -> NWABody {
          let mut queue: VecDeque<NWA> = VecDeque::with_capacity(left_bodies.len());
          {
              let arena = states_arena.borrow();
              for left_body in left_bodies {
                  let mut states = NWAStates::default();
                  let start = states.copy_subgraph_from_and_return_body(&arena, left_body).start_state;
                  queue.push_back(NWA { states, body: NWABody { start_state: start } });
              }
          }

          if queue.len() == 1 {
              simplify_and_determinize_nwa(queue.front_mut().unwrap());
          }

          while queue.len() > 1 {
              let nwa1 = queue.pop_front().unwrap();
              let nwa2 = queue.pop_front().unwrap();
              let mut states = nwa1.states;
              let (start2, _) = states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);
              let union_body = NWA::union_components(&mut states, &nwa1.body, &NWABody { start_state: start2 });
              let mut res = NWA { states, body: union_body };
              simplify_and_determinize_nwa(&mut res);
              queue.push_back(res);
          }

          let NWA { states: states2, body: left_bodies_union2 } = queue.pop_front().unwrap();
          let mut states = states_arena.borrow_mut();
          states.copy_subgraph_from_and_return_body(&states2, left_bodies_union2)
      }

      fn simplify_and_determinize_nwa(nwa: &mut NWA) {
          crate::debug!(5, "Simplifying and determinizing NWA with {} states...", nwa.states.len());
          nwa.simplify();
          crate::debug!(5, "NWA simplified to {} states.", nwa.states.len());
          let dwa = nwa.determinize_to_dwa_with_rustfst();
          crate::debug!(5, "NWA determinized to DWA with {} states.", dwa.states.len());
          *nwa = NWA::from_dwa(&dwa);
      }

      fn simplify_remove_epsilon(nwa: &mut NWA) {
          nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true));
      }
