          #[test]
          fn test_special_map_stop_processing() {
              // Structure:
              //      root (0) --e1,e2--> c1(1), c2(2)
              //      c1(1) --e3--> gc1(3)
              //      c2(2) --e4--> gc2(4)
              // Process returns false for c1, true otherwise.
              let root: TestNodeBasic = Arc::new(Mutex::new(TestTrieBasic::new(0)));
