      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset as Weight;
      use super::dwa::{DWAState, DWAStates, DWA, DWABody};
      use super::nwa::{NWA, NWAStates};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use range_set_blaze::RangeSetBlaze;

      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};
      use std::ops::RangeInclusive;
      use std::time::Instant;

      /// This determinization completely removes the explicit “product-of-atoms” construction.
      /// High-level plan:
      /// 1) Partition the weight space into disjoint “atoms” (contiguous index ranges).
      /// 2) For each atom, build a per-atom NFA from the NWA by keeping only edges/defaults/eps/finals
      ///    whose weights intersect that atom; then determinize and minimize it (DetDFA_i).
      /// 3) Combine all DetDFA_i into a single shared “pre-DFA” by disjointly unioning their states and
      ///    adding a unique “entry symbol” for each atom from a super-start to the atom’s start.
      ///    Add a universal sink for those entry symbols from all non-super-start states.
      /// 4) Minimize this combined pre-DFA once. This merges all isomorphic structures across atoms.
      ///    Keep the partition map old->new to know which merged (minimized) state each per-atom state ended up in.
      /// 5) Compute, for each minimized state S:
      ///    - live-weight(S): union of atom-weights for atoms that have at least one non-sink per-atom DFA
      ///      state mapped to S.
      ///    - final-weight(S): union of atom-weights for atoms that have at least one final per-atom DFA
      ///      state mapped to S.
      /// 6) Convert the minimized shared DFA (restricted to the original alphabet Σ' = exception labels + OTHER)
      ///    to a DWA by attaching live-weight(S) to all outgoing edges from S and final-weight(S) to S.
      ///    Choose a start state:
      ///      If all per-atom starts merged to the same minimized state S0, use S0;
      ///      otherwise, use the majority class among per-atom starts (ties broken by the first), and
      ///      log a debug message. This preserves a compact structure (no bigger than the minimized shared DFA).
      ///
      /// NOTE: This construction intentionally avoids an explicit product. It relies on structural sharing
      /// across atoms (after minimization) to produce a compact deterministic control graph.
      /// The edge weights filter atoms dynamically along the unique path. In scenarios where per-atom DFAs
      /// differ heavily in structure from the very start, the single-start requirement forces a choice;
      /// we pick the most common minimized start image to keep the structure small.
      /// In practice, the minimized shared DFA tends to unify most structure, yielding small DWAs.
      impl NWA {
          pub fn determinize_to_dwa(&self) -> DWA {
              let now_total = Instant::now();

              // Work on a copy of the NWA.
              let mut nwa = self.clone();
              debug_log(3, || format!("Starting determinization for NWA with {} states", nwa.states.len()));

              // Precompute future acceptance masks (used to filter alphabet).
              let fut = nwa.compute_future_weights();

              // 1) Build atomic partition of the weights (disjoint atoms of contiguous index ranges).
              let now_atoms = Instant::now();
              let atoms = WeightPartition::from_nwa(&nwa);
              debug_log(4, || format!("Built weight partition with {} atoms in {:?}", atoms.intervals.len(), now_atoms.elapsed()));

              // 2) Build global alphabet (exception labels + OTHER), filtered by future masks.
              let now_sigma = Instant::now();
              let sigma = Alphabet::from_nwa_with_future(&nwa, &fut);
              debug_log(4, || format!("Built alphabet with {} labels in {:?}", sigma.labels.len(), now_sigma.elapsed()));

              // Edge case: If no atoms (union of all weights empty), return a trivial DWA.
              if atoms.intervals.is_empty() {
                  let dwa = DWA::new();
                  debug_log(3, || format!("No atoms => empty DWA; total time {:?}", now_total.elapsed()));
                  return dwa;
              }

              // 3) For each atom, build per-atom DFA (determinize + minimize).
              let pb_atoms = if PROGRESS_BAR_ENABLED {
                  Some(
                      ProgressBar::new(atoms.intervals.len() as u64).with_style(
                          ProgressStyle::default_bar()
                              .template(
                                  "{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (per-atom DFAs)",
                              )
                              .unwrap(),
                      ),
                  )
              } else {
                  None
              };

              let mut comp_dfas: Vec<DetDFA> = Vec::with_capacity(atoms.intervals.len());
              let mut comp_sinks: Vec<Option<usize>> = Vec::with_capacity(atoms.intervals.len());
              for (i, atom) in atoms.intervals.iter().enumerate() {
                  let nfa = PerAtomNFA::from_nwa(&nwa.states, nwa.body.start_state, &sigma, atom, &fut);
                  let mut dfa = nfa.determinize(&sigma);
                  dfa.minimize(sigma.size());
                  crate::debug!(4, "Atom {}: interval={:?}, DFA states={}", i, atom, dfa.n_states);
                  let sink = dfa.find_sink_index(sigma.size());
                  comp_sinks.push(sink);
                  comp_dfas.push(dfa);
                  if let Some(p) = &pb_atoms {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_atoms {
                  p.finish_with_message("Per-atom DFAs built & minimized");
              }

              // 4) Build a single combined pre-DFA (disjoint union + super-start -> unique entry symbols) and minimize once.
              let now_combine = Instant::now();
              let (combined, meta) = build_combined_pre_dfa(&comp_dfas, &sigma);
              debug_log(4, || {
                  format!(
                      "Combined pre-DFA: states={}, alphabet_size={}, time={:?}",
                      combined.n_states,
                      sigma.size() + comp_dfas.len(),
                      now_combine.elapsed()
                  )
              });

              // Minimize shared pre-DFA and get old->new mapping (partition id).
              let mut combined_min = combined.clone();
              let now_min = Instant::now();
              let old_to_new = combined_min.minimize_with_map(sigma.size() + comp_dfas.len());
              debug_log(4, || {
                  format!(
                      "Shared DFA minimized: states={} (from {}), time={:?}",
                      combined_min.n_states, combined.n_states, now_min.elapsed()
                  )
              });

              // 5) Compute weights for minimized states: live-weight and final-weight.
              let atom_weights: &Vec<Weight> = &atoms.atoms;
              let mut live_weight: Vec<Weight> = vec![Weight::zeros(); combined_min.n_states];
              let mut final_weight: Vec<Weight> = vec![Weight::zeros(); combined_min.n_states];

              // Map per-atom states to minimized states and accumulate weights.
              // Skip the global super-start and sink when accumulating per-atom contributions.
              // A per-atom state contributes to "live" if it is not that component's sink (when a sink exists).
              // A per-atom state contributes to "final" if it is accepting in that atom's DFA.
              for (i, comp) in comp_dfas.iter().enumerate() {
                  let base = meta.offsets[i];
                  let sink_local = comp_sinks[i];

                  for local in 0..comp.n_states {
                      let old_global = base + local;
                      if old_global >= old_to_new.len() {
                          continue;
                      }
                      let new_min = old_to_new[old_global];
                      // live?
                      let is_sink = sink_local.map_or(false, |si| si == local);
                      if !is_sink {
                          live_weight[new_min] |= &atom_weights[i];
                      }
                      // final?
                      if comp.finals[local] {
                          final_weight[new_min] |= &atom_weights[i];
                      }
                  }
              }

              // 6) Convert the minimized shared DFA (restricted to Σ') into a DWA:
              //    - edges with weight = live_weight[source]
              //    - final_weight[state] as computed
              //    - start state: if all per-atom starts map to same minimized state, use it; otherwise use the
              //      most common minimized start among components (ties broken by first), and log.
              let dwa = to_dwa_shared(&combined_min, &sigma, &live_weight, &final_weight, &meta, &old_to_new, &atom_weights);

              debug_log(3, || format!("NWA::determinize_to_dwa total time: {:?}", now_total.elapsed()));
              dwa
          }
      }

      /* ------------------------------
         Utilities and support structs
         ------------------------------ */

      fn debug_log(level: usize, msg: impl FnOnce() -> String) {
          crate::debug!(level, "{}", msg());
      }

      /// Alphabet = all labels that appear as exceptions, plus a special OTHER symbol.
      /// OTHER means "use default transitions"
      #[derive(Clone, Debug)]
      struct Alphabet {
          labels: Vec<i16>, // sorted unique exception labels
          other_index: usize,
      }
      impl Alphabet {
          fn from_nwa(nwa: &NWA) -> Self {
              let mut set = BTreeSet::new();
              for st in &nwa.states.0 {
                  for (&lbl, _) in &st.transitions {
                      set.insert(lbl);
                  }
                  for def in &st.default {
                      for &lbl in &def.exceptions {
                          set.insert(lbl);
                      }
                  }
              }
              let labels: Vec<i16> = set.into_iter().collect();
              let other_index = labels.len(); // last slot is OTHER
              Alphabet { labels, other_index }
          }

          /// Build an alphabet filtered by future-acceptance masks:
          /// only keep labels that can actually contribute to acceptance along some path.
          /// A label is kept if there exists some edge s --lbl/w--> t with (w ∧ F[t]) ≠ ∅,
          /// or a default s --wdef--> t with (wdef ∧ F[t]) ≠ ∅, in which case we keep the defaults'
          /// exception labels too (they must be separated from OTHER).
          fn from_nwa_with_future(nwa: &NWA, fut: &Vec<Weight>) -> Self {
              let mut set = BTreeSet::new();
              for (s, st) in nwa.states.0.iter().enumerate() {
                  // labeled transitions
                  for (&lbl, targets) in &st.transitions {
                      let mut relevant = false;
                      for (t, w) in targets {
                          if !(&fut[*t] & w).is_empty() {
                              relevant = true;
                              break;
                          }
                      }
                      if relevant {
                          set.insert(lbl);
                      }
                  }
                  // defaults: if relevant, keep their exception labels
                  for def in &st.default {
                      if !(&fut[def.target] & &def.weight).is_empty() {
                          for &lbl in &def.exceptions {
                              set.insert(lbl);
                          }
                      }
                  }
              }
              let labels: Vec<i16> = set.into_iter().collect();
              let other_index = labels.len();
              Alphabet { labels, other_index }
          }
          #[inline]
          fn size(&self) -> usize {
              self.labels.len() + 1
          }
          #[inline]
          fn index_of_label(&self, l: i16) -> Option<usize> {
              self.labels.binary_search(&l).ok()
          }
          #[inline]
          fn is_other(&self, sym: usize) -> bool {
              sym == self.other_index
          }
          #[inline]
          fn label_at(&self, sym: usize) -> Option<i16> {
              if sym < self.labels.len() {
                  Some(self.labels[sym])
              } else {
                  None
              }
          }
      }

      /// WeightPartition: disjoint contiguous atoms that cover the union of all weights.
      /// Each atom is a RangeInclusive<usize>. Every original weight is a union of some subset of atoms.
      ///
      /// Construction:
      /// - Gather all start points s and all (end+1) boundaries for each range in every weight.
      /// - Sort and dedup.
      /// - Create intervals [b[i], b[i+1]-1] for i=0..len-2.
      /// - If any weight has an interval ending at usize::MAX, track that the final tail exists
      ///   and create the last atom [b_last, usize::MAX].
      #[derive(Clone, Debug)]
      struct WeightPartition {
          intervals: Vec<RangeInclusive<usize>>,
          atoms: Vec<Weight>, // cached Weight for each interval
      }
      impl WeightPartition {
          fn from_nwa(nwa: &NWA) -> Self {
              let mut starts: BTreeSet<usize> = BTreeSet::new();
              let mut ends_plus: BTreeSet<usize> = BTreeSet::new();
              let mut has_tail_to_max = false;

              let mut feed_weight = |w: &Weight| {
                  let mut it = w.rsb.ranges();
                  while let Some(r) = it.next() {
                      let s = *r.start();
                      let e = *r.end();
                      starts.insert(s);
                      if e == usize::MAX {
                          has_tail_to_max = true;
                      } else {
                          ends_plus.insert(e.saturating_add(1));
                      }
                  }
              };

              for st in &nwa.states.0 {
                  // final weight
                  if let Some(w) = &st.final_weight {
                      if !w.is_empty() {
                          feed_weight(w);
                      }
                  }
                  // epsilons
                  for (_, w) in &st.epsilons {
                      if !w.is_empty() {
                          feed_weight(w);
                      }
                  }
                  // defaults
                  for def in &st.default {
                      if !def.weight.is_empty() {
                          feed_weight(&def.weight);
                      }
                  }
                  // exceptions
                  for (_, targets) in &st.transitions {
                      for (_, w) in targets {
                          if !w.is_empty() {
                              feed_weight(w);
                          }
                      }
                  }
              }

              // If there are no weights at all, the partition is empty.
              if starts.is_empty() && ends_plus.is_empty() && !has_tail_to_max {
                  return WeightPartition { intervals: vec![], atoms: vec![] };
              }

              // Combine and sort all "breakpoints" (start and end+1).
              let mut breaks: Vec<usize> = starts.union(&ends_plus).copied().collect();
              breaks.sort_unstable();
              breaks.dedup();
              if breaks.is_empty() {
                  // Only possible if there was at least one ALL weight: single atom [0..=usize::MAX]
                  let singleton = 0usize..=usize::MAX;
                  let atom_w: Weight = std::iter::once(singleton.clone()).collect();
                  return WeightPartition { intervals: vec![singleton], atoms: vec![atom_w] };
              }

              // Build atoms between consecutive breakpoints; if tail-to-max exists, include final segment.
              let mut intervals: Vec<RangeInclusive<usize>> = Vec::new();
              for i in 0..breaks.len().saturating_sub(1) {
                  let a = breaks[i];
                  let b_excl = breaks[i + 1];
                  if a < b_excl {
                      let b = b_excl - 1;
                      intervals.push(a..=b);
                  }
              }
              if has_tail_to_max {
                  if let Some(&last) = breaks.last() {
                      if last <= usize::MAX {
                          intervals.push(last..=usize::MAX);
                      }
                  }
              }

              // Cache atom Weights
              let atoms: Vec<Weight> = intervals
                  .iter()
                  .map(|r| {
                      let r2: RangeInclusive<usize> = (*r.start())..=(*r.end());
                      std::iter::once(r2).collect()
                  })
                  .collect();

              WeightPartition { intervals, atoms }
          }
      }

      /* ------------------------------
         Per-atom NFA and DFA
         ------------------------------ */

      /// An NFA specialized for a single atom:
      /// - Keep only edges/defaults/epsilons/final whose weight intersects the atom.
      /// - Alphabet is Sigma' (all labels + OTHER); on label 'l', if a state has an exception for l,
      ///   take those targets; otherwise use defaults; on OTHER, always use defaults.
      #[derive(Clone, Debug)]
      struct PerAtomNFA {
          n: usize,
          start: usize,
          finals: Vec<bool>,
          ex_by_state: Vec<BTreeMap<i16, Vec<usize>>>,
          def_by_state: Vec<Vec<(usize, BTreeSet<i16>)>>, // list of (target, exceptions)
          eps_by_state: Vec<Vec<usize>>,
      }
      impl PerAtomNFA {
          fn from_nwa(states: &NWAStates, start: usize, _sigma: &Alphabet, atom: &RangeInclusive<usize>, fut: &[Weight]) -> Self {
              let n_total = states.len();
              let atom_w: Weight = std::iter::once((*atom.start())..=(*atom.end())).collect();

              // Live states for this atom: those with F[s] ∧ atom ≠ ∅
              let mut live = vec![false; n_total];
              for s in 0..n_total {
                  if !(&fut[s] & &atom_w).is_empty() {
                      live[s] = true;
                  }
              }

              // If start is not live, return a trivial 1-state NFA (non-final, no edges).
              if start >= n_total || !live[start] {
                  return PerAtomNFA {
                      n: 1,
                      start: 0,
                      finals: vec![false],
                      ex_by_state: vec![BTreeMap::new()],
                      def_by_state: vec![Vec::new()],
                      eps_by_state: vec![Vec::new()],
                  };
              }

              // BFS to collect only states reachable from start via edges that intersect atom and lead to live targets.
              let mut visited = vec![false; n_total];
              let mut order: Vec<usize> = Vec::new();
              let mut q = VecDeque::new();
              visited[start] = true;
              q.push_back(start);
              order.push(start);

              while let Some(u) = q.pop_front() {
                  // Epsilons
                  for (v, w) in &states[u].epsilons {
                      if *v < n_total && live[*v] && !(&atom_w & w).is_empty() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                          order.push(*v);
                      }
                  }
                  // Labeled
                  for (_lbl, targets) in &states[u].transitions {
                      for (v, w) in targets {
                          if *v < n_total && live[*v] && !(&atom_w & w).is_empty() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                              order.push(*v);
                          }
                      }
                  }
                  // Defaults
                  for def in &states[u].default {
                      let v = def.target;
                      if v < n_total && live[v] && !(&atom_w & &def.weight).is_empty() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                          order.push(v);
                      }
                  }
              }

              // Compact IDs
              let m = order.len();
              let mut id_of = vec![usize::MAX; n_total];
              for (i, &old) in order.iter().enumerate() {
                  id_of[old] = i;
              }

              let mut finals = vec![false; m];
              let mut ex_by_state: Vec<BTreeMap<i16, Vec<usize>>> = vec![BTreeMap::new(); m];
              let mut def_by_state: Vec<Vec<(usize, BTreeSet<i16>)>> = vec![Vec::new(); m];
              let mut eps_by_state: Vec<Vec<usize>> = vec![Vec::new(); m];

              for (new_s, &old_s) in order.iter().enumerate() {
                  // final
                  if let Some(w) = &states[old_s].final_weight {
                      if !(&atom_w & w).is_empty() {
                          finals[new_s] = true;
                      }
                  }
                  // exceptions for this atom
                  let mut local_ex: BTreeMap<i16, Vec<usize>> = BTreeMap::new();
                  for (&lbl, targets) in &states[old_s].transitions {
                      let mut kept: Vec<usize> = Vec::new();
                      for (to_old, w) in targets {
                          if *to_old < n_total && live[*to_old] && !(&atom_w & w).is_empty() {
                              let to_new = id_of[*to_old];
                              if to_new != usize::MAX {
                                  kept.push(to_new);
                              }
                          }
                      }
                      if !kept.is_empty() {
                          kept.sort_unstable();
                          kept.dedup();
                          local_ex.insert(lbl, kept);
                      }
                  }
                  ex_by_state[new_s] = local_ex.clone();

                  // default(s) for this atom: use per-atom exceptions = keys of local_ex
                  let ex_for_def: BTreeSet<i16> = local_ex.keys().copied().collect();
                  for def in &states[old_s].default {
                      let to_old = def.target;
                      if to_old < n_total && live[to_old] && !(&atom_w & &def.weight).is_empty() {
                          let to_new = id_of[to_old];
                          if to_new != usize::MAX {
                              def_by_state[new_s].push((to_new, ex_for_def.clone()));
                          }
                      }
                  }

                  // epsilons
                  for (to_old, w) in &states[old_s].epsilons {
                      if *to_old < n_total && live[*to_old] && !(&atom_w & w).is_empty() {
                          let to_new = id_of[*to_old];
                          if to_new != usize::MAX {
                              eps_by_state[new_s].push(to_new);
                          }
                      }
                  }
              }

              let new_start = id_of[start];
              debug_assert!(new_start != usize::MAX, "start must be visited when live[start] is true");
              Self { n: m, start: new_start, finals, ex_by_state, def_by_state, eps_by_state }
          }

          /// Epsilon closure precomputation for each single state.
          fn eps_closure_per_state(&self) -> Vec<Vec<usize>> {
              let mut out = vec![Vec::<usize>::new(); self.n];
              for s in 0..self.n {
                  let mut visited = vec![false; self.n];
                  let mut stack = vec![s];
                  visited[s] = true;
                  let mut closure = Vec::new();
                  while let Some(u) = stack.pop() {
                      closure.push(u);
                      for &v in &self.eps_by_state[u] {
                          if v < self.n && !visited[v] {
                              visited[v] = true;
                              stack.push(v);
                          }
                      }
                  }
                  closure.sort_unstable();
                  out[s] = closure;
              }
              out
          }

          /// Given a set of states, compute epsilon closure (using per-state closures).
          fn eps_closure_set(&self, base: &[usize], per: &Vec<Vec<usize>>) -> Vec<usize> {
              let mut mark = vec![false; self.n];
              let mut result = Vec::new();
              for &s in base {
                  if s >= self.n {
                      continue;
                  }
                  for &u in &per[s] {
                      if !mark[u] {
                          mark[u] = true;
                          result.push(u);
                      }
                  }
              }
              result.sort_unstable();
              result
          }

          /// Determinize this NFA to a complete DFA with alphabet Sigma' (labels + OTHER).
          fn determinize(&self, sigma: &Alphabet) -> DetDFA {
              let per = self.eps_closure_per_state();

              // Start set: closure({start})
              let start_set = self.eps_closure_set(&[self.start], &per);

              // Subset-to-id interning
              let mut map: HashMap<Vec<usize>, usize> = HashMap::new();
              let mut states: Vec<Vec<usize>> = Vec::new();
              let mut finals: Vec<bool> = Vec::new();
              let mut trans: Vec<Vec<Option<usize>>> = Vec::new(); // Option for next state; sink if None later

              let pb_subset = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new_spinner();
                  p.set_style(
                      ProgressStyle::default_spinner()
                          .template("{spinner:.green} [Determinize/Subset: {elapsed_precise}] States found: {pos}")
                          .unwrap(),
                  );
                  Some(p)
              } else {
                  None
              };

              let mut push_state = |subset: Vec<usize>,
                                    states: &mut Vec<Vec<usize>>,
                                    finals: &mut Vec<bool>,
                                    trans: &mut Vec<Vec<Option<usize>>>,
                                    map: &mut HashMap<Vec<usize>, usize>| {
                  if let Some(&id) = map.get(&subset) {
                      return id;
                  }
                  let id = states.len();
                  let is_final = subset.iter().any(|&s| self.finals[s]);
                  states.push(subset);
                  finals.push(is_final);
                  trans.push(vec![None; sigma.size()]);
                  map.insert(states[id].clone(), id);
                  id
              };

              let start_id = push_state(start_set, &mut states, &mut finals, &mut trans, &mut map);
              if let Some(p) = &pb_subset {
                  p.set_position(states.len() as u64);
              }

              let mut q = VecDeque::new();
              q.push_back(start_id);

              while let Some(u) = q.pop_front() {
                  let subset = states[u].clone();

                  // For each symbol in Sigma', compute the next subset (then epsilon closure)
                  for sym in 0..sigma.size() {
                      let mut next_raw: Vec<usize> = Vec::new();

                      match sigma.label_at(sym) {
                          Some(lbl) => {
                              // Label 'lbl': for each s in subset: take explicit transitions on lbl,
                              // and any default transitions for which lbl is not an exception.
                              for &s in &subset {
                                  if let Some(ts) = self.ex_by_state[s].get(&lbl) {
                                      next_raw.extend_from_slice(ts);
                                  }
                                  for (target, exceptions) in &self.def_by_state[s] {
                                      if !exceptions.contains(&lbl) {
                                          next_raw.push(*target);
                                      }
                                  }
                              }
                          }
                          None => {
                              // OTHER: for any symbol not in sigma.labels, no state has an exception,
                              // so we take all default transitions.
                              for &s in &subset {
                                  for (target, _) in &self.def_by_state[s] {
                                      next_raw.push(*target);
                                  }
                              }
                          }
                      }

                      if next_raw.is_empty() {
                          // Will lead to sink; leave as None for now
                          continue;
                      }

                      next_raw.sort_unstable();
                      next_raw.dedup();

                      let next = self.eps_closure_set(&next_raw, &per);
                      if next.is_empty() {
                          continue;
                      }

                      let v = if let Some(&id) = map.get(&next) {
                          id
                      } else {
                          let id = states.len();
                          let is_final = next.iter().any(|&s| self.finals[s]);
                          states.push(next.clone());
                          finals.push(is_final);
                          trans.push(vec![None; sigma.size()]);
                          map.insert(next, id);
                          if let Some(p) = &pb_subset {
                              p.set_position(states.len() as u64);
                          }
                          q.push_back(id);
                          id
                      };

                      trans[u][sym] = Some(v);
                  }
              }

              if let Some(p) = pb_subset {
                  p.finish_with_message(format!("Subset construction done, {} states", states.len()));
              }

              // Build sink state if any transition is None
              let needs_sink = trans.iter().any(|row| row.iter().any(|x| x.is_none()));
              let mut sink_index: Option<usize> = None;

              if needs_sink {
                  sink_index = Some(trans.len());
                  trans.push(vec![None; sigma.size()]);
                  finals.push(false);
                  states.push(Vec::new()); // empty subset for sink
              }

              // Fill None transitions with sink (or self-loop if no sink needed)
              let mut out_trans: Vec<Vec<usize>> = Vec::with_capacity(trans.len());
              for (i, row) in trans.iter().enumerate() {
                  let mut new_row = Vec::with_capacity(row.len());
                  for (_sym, dst) in row.iter().enumerate() {
                      match dst {
                          Some(v) => new_row.push(*v),
                          None => {
                              if let Some(sink) = sink_index {
                                  new_row.push(sink);
                              } else {
                                  new_row.push(i); // complete with self (won't happen unless needs_sink=false)
                              }
                          }
                      }
                  }
                  out_trans.push(new_row);
              }

              DetDFA {
                  n_states: out_trans.len(),
                  start: start_id,
                  finals,
                  trans: out_trans,
              }
          }
      }

      /// Deterministic complete DFA (over Σ' or Σ' + entry symbols).
      #[derive(Clone, Debug)]
      struct DetDFA {
          n_states: usize,
          start: usize,
          finals: Vec<bool>,
          trans: Vec<Vec<usize>>, // [state][symbol] -> next state
      }
      impl DetDFA {
          fn minimize(&mut self, alphabet_size: usize) {
              let _ = self.minimize_with_map(alphabet_size);
          }

          /// Minimize and also return a mapping old_state_id -> new_minimized_id.
          fn minimize_with_map(&mut self, alphabet_size: usize) -> Vec<usize> {
              debug_log(4, || format!("Minimizing DFA with {} states", self.n_states));

              // 1) Remove states unreachable from start first
              let reachable = {
                  let mut visited = vec![false; self.n_states];
                  let mut q = VecDeque::new();
                  visited[self.start] = true;
                  q.push_back(self.start);
                  while let Some(u) = q.pop_front() {
                      for &v in &self.trans[u] {
                          if !visited[v] {
                              visited[v] = true;
                              q.push_back(v);
                          }
                      }
                  }
                  visited
              };

              // Map reachable states to compact ids
              let mut map_old_to_compact = vec![usize::MAX; self.n_states];
              let mut new_states = 0usize;
              for i in 0..self.n_states {
                  if reachable[i] {
                      map_old_to_compact[i] = new_states;
                      new_states += 1;
                  }
              }

              if new_states == 0 {
                  // No reachable states? Create a single dead state.
                  let n0 = self.n_states;
                  self.n_states = 1;
                  self.start = 0;
                  self.finals = vec![false];
                  self.trans = vec![vec![0; alphabet_size]];
                  // Every old maps to 0
                  return vec![0; n0];
              }

              let mut finals = vec![false; new_states];
              let mut trans = vec![vec![0usize; alphabet_size]; new_states];

              for i in 0..self.n_states {
                  if !reachable[i] {
                      continue;
                  }
                  let ni = map_old_to_compact[i];
                  finals[ni] = self.finals[i];
                  for a in 0..alphabet_size {
                      let v = self.trans[i][a];
                      trans[ni][a] = map_old_to_compact[v];
                  }
              }

              // Replace self with compacted DFA
              self.n_states = new_states;
              self.start = map_old_to_compact[self.start];
              self.finals = finals;
              self.trans = trans;

              // 2) Hopcroft minimization on complete DFA.
              if self.n_states <= 1 {
                  // Mapping: all reachable old -> 0, unreachable old -> 0 as well (already compacted)
                  let n0 = map_old_to_compact.len();
                  let mut out = vec![0usize; n0];
                  for i in 0..n0 {
                      if map_old_to_compact[i] != usize::MAX {
                          out[i] = 0;
                      } else {
                          out[i] = 0;
                      }
                  }
                  return out;
              }

              let n = self.n_states;
              let a = alphabet_size;

              // Initial partition: accepting vs non-accepting
              let mut part_id = vec![0usize; n];
              let (accepting_block, non_accepting_block): (Vec<_>, Vec<_>) = (0..n).partition(|&s| self.finals[s]);

              if accepting_block.is_empty() || non_accepting_block.is_empty() {
                  // All accepting or all non-accepting -> nothing to split
                  let n0 = map_old_to_compact.len();
                  let mut out = vec![0usize; n0];
                  for i in 0..n0 {
                      let ci = map_old_to_compact[i];
                      if ci != usize::MAX {
                          out[i] = 0;
                      }
                  }
                  // Already compacted; keep DFA as-is
                  self.start = 0;
                  self.trans = vec![self.trans[0].clone()];
                  self.finals = vec![self.finals[0]];
                  self.n_states = 1;
                  return out;
              }

              let mut blocks: Vec<Vec<usize>> = Vec::new();
              blocks.push(accepting_block);
              blocks.push(non_accepting_block);
              for (pid, block) in blocks.iter().enumerate() {
                  for &s in block {
                      part_id[s] = pid;
                  }
              }

              // Build inverse transitions for each symbol
              let mut inv: Vec<Vec<Vec<usize>>> = vec![vec![Vec::new(); n]; a];
              for s in 0..n {
                  for sym in 0..a {
                      let v = self.trans[s][sym];
                      inv[sym][v].push(s);
                  }
              }

              // Worklist of (block id, symbol).
              let mut worklist: BTreeSet<(usize, usize)> = BTreeSet::new();
              let smaller_initial_set = if blocks[0].len() <= blocks[1].len() { 0 } else { 1 };
              for sym in 0..a {
                  worklist.insert((smaller_initial_set, sym));
              }

              let pb_hopcroft = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new_spinner();
                  p.set_style(
                      ProgressStyle::default_spinner()
                          .template(
                              "{spinner:.green} [Determinize/Minimize: {elapsed_precise}] Pass {pos}, worklist size: {msg}",
                          )
                          .unwrap(),
                  );
                  Some(p)
              } else {
                  None
              };
              let mut passes = 0u64;

              while let Some(&(b, sym)) = worklist.iter().next() {
                  worklist.remove(&(b, sym));

                  if let Some(p) = &pb_hopcroft {
                      passes += 1;
                      p.set_position(passes);
                      p.set_message(format!("{}", worklist.len()));
                  }

                  // Compute preimage of block b under symbol sym
                  let mut pre: Vec<usize> = Vec::new();
                  for &v in &blocks[b] {
                      pre.extend_from_slice(&inv[sym][v]);
                  }
                  if pre.is_empty() {
                      continue;
                  }
                  pre.sort_unstable();
                  pre.dedup();

                  // For each block, split by intersection with pre
                  let mut affected: HashMap<usize, (Vec<usize>, Vec<usize>)> = HashMap::new();
                  for &s in &pre {
                      let pid = part_id[s];
                      affected.entry(pid).or_default().0.push(s);
                  }
                  for (pid, (ref mut in_pre, ref mut not_in_pre)) in affected.iter_mut() {
                      // Fill not_in_pre
                      for &s in &blocks[*pid] {
                          if !in_pre.binary_search(&s).is_ok() {
                              not_in_pre.push(s);
                          }
                      }
                  }

                  let mut to_replace: Vec<(usize, Vec<usize>, Vec<usize>)> = Vec::new();

                  for (pid, (in_pre, not_in_pre)) in affected.into_iter() {
                      if in_pre.is_empty() || not_in_pre.is_empty() {
                          continue;
                      }
                      to_replace.push((pid, in_pre, not_in_pre));
                  }

                  if to_replace.is_empty() {
                      continue;
                  }

                  // Apply replacements (block splits)
                  for (pid, mut in_pre, mut not_in_pre) in to_replace {
                      in_pre.sort_unstable();
                      not_in_pre.sort_unstable();

                      let pid2 = blocks.len();
                      blocks.push(not_in_pre);
                      blocks[pid] = in_pre;

                      // Update part_id map for all states in the newly created blocks
                      for &s in &blocks[pid] {
                          part_id[s] = pid;
                      }
                      for &s in &blocks[pid2] {
                          part_id[s] = pid2;
                      }

                      // Update worklist according to Hopcroft's algorithm
                      for sym2 in 0..a {
                          if worklist.remove(&(pid, sym2)) {
                              // The original block was on the worklist. Replace it with both new blocks.
                              worklist.insert((pid, sym2));
                              worklist.insert((pid2, sym2));
                          } else {
                              // The original block was not on the worklist. Add the smaller of the two new blocks.
                              let (smaller_pid, _) = if blocks[pid].len() <= blocks[pid2].len() { (pid, pid2) } else { (pid2, pid) };
                              worklist.insert((smaller_pid, sym2));
                          }
                      }
                  }
              }

              if let Some(p) = pb_hopcroft {
                  p.finish_with_message(format!("Hopcroft done, {} partitions", blocks.len()));
              }

              // Build the quotient automaton
              let num_parts = blocks.len();
              let mut repr: Vec<usize> = vec![0; num_parts];
              for (pid, block) in blocks.iter().enumerate() {
                  repr[pid] = block[0];
              }

              let start_part = part_id[self.start];
              let mut finals2 = vec![false; num_parts];
              for pid in 0..num_parts {
                  finals2[pid] = self.finals[repr[pid]];
              }

              let mut trans2 = vec![vec![0usize; a]; num_parts];
              for pid in 0..num_parts {
                  let s = repr[pid];
                  for sym in 0..a {
                      let v = self.trans[s][sym];
                      trans2[pid][sym] = part_id[v];
                  }
              }

              self.n_states = num_parts;
              self.start = start_part;
              self.finals = finals2;
              self.trans = trans2;

              // Compose mapping old -> minimized:
              // old -> compact via map_old_to_compact; compact -> part_id (which equals minimized id).
              let n0 = map_old_to_compact.len();
              let mut out_map = vec![0usize; n0];
              for old in 0..n0 {
                  let ci = map_old_to_compact[old];
                  if ci != usize::MAX {
                      out_map[old] = part_id[ci];
                  } else {
                      // Unreachable; map to start_part (arbitrary but consistent)
                      out_map[old] = start_part;
                  }
              }
              out_map
          }

          /// Find an index of a sink state (if any), defined as a non-accepting state whose transitions on all symbols loop to itself.
          fn find_sink_index(&self, alphabet_size: usize) -> Option<usize> {
              'outer: for s in 0..self.n_states {
                  if self.finals[s] {
                      continue;
                  }
                  for sym in 0..alphabet_size {
                      if self.trans[s][sym] != s {
                          continue 'outer;
                      }
                  }
                  return Some(s);
              }
              None
          }
      }

      /* ------------------------------
         Combine per-atom DFAs into a single shared pre-DFA
         ------------------------------ */

      #[derive(Clone, Debug)]
      struct CombinedMeta {
          super_start: usize,
          sink: usize,
          offsets: Vec<usize>,       // base index for each component
          starts_global: Vec<usize>, // global (pre-minimization) indices of each component's start
      }

      fn build_combined_pre_dfa(comps: &[DetDFA], sigma: &Alphabet) -> (DetDFA, CombinedMeta) {
          let k = comps.len();
          let sigma_size = sigma.size();
          let full_alphabet = sigma_size + k; // append k entry symbols

          // Layout:
          // 0: super_start
          // 1..(1 + sum n_i): components in sequence
          // last: sink
          let super_start = 0usize;
          let mut offsets = Vec::with_capacity(k);
          let mut total = 1usize; // reserve 0 for super_start
          for c in comps {
              offsets.push(total);
              total += c.n_states;
          }
          let sink = total;
          total += 1; // sink

          let mut trans = vec![vec![sink; full_alphabet]; total];
          let mut finals = vec![false; total];

          // Make sink a universal sink (self-loops on all symbols).
          for a in 0..full_alphabet {
              trans[sink][a] = sink;
          }
          finals[sink] = false;

          // super_start:
          // - For entry symbols (sigma_size + i): go to comps[i].start (global)
          for i in 0..k {
              let col = sigma_size + i;
              trans[super_start][col] = offsets[i] + comps[i].start;
          }
          // For normal symbols: send to sink (already set).

          // Copy components
          let mut starts_global = Vec::with_capacity(k);
          for (i, comp) in comps.iter().enumerate() {
              let base = offsets[i];
              let local_n = comp.n_states;
              let start_global = base + comp.start;
              starts_global.push(start_global);

              // finals
              for s in 0..local_n {
                  finals[base + s] = comp.finals[s];
              }
              // transitions on Σ'
              for s in 0..local_n {
                  for a in 0..sigma_size {
                      let dst_local = comp.trans[s][a];
                      trans[base + s][a] = base + dst_local;
                  }
              }
              // entry symbols from inside components always go to sink (already set).
          }

          let combined = DetDFA {
              n_states: total,
              start: super_start,
              finals,
              trans,
          };

          let meta = CombinedMeta {
              super_start,
              sink,
              offsets,
              starts_global,
          };

          (combined, meta)
      }

      /* ------------------------------
         Convert minimized shared DFA to DWA
         ------------------------------ */

      fn to_dwa_shared(
          min_dfa: &DetDFA,
          sigma: &Alphabet,
          live_weight: &Vec<Weight>,
          final_weight: &Vec<Weight>,
          meta: &CombinedMeta,
          old_to_new: &Vec<usize>,
          atom_weights: &Vec<Weight>,
      ) -> DWA {
          let n = min_dfa.n_states;

          // Decide the start state for the DWA:
          // Map each component's start (global old id) to its minimized id.
          let mut start_counts: HashMap<usize, usize> = HashMap::new();
          for &start_old in &meta.starts_global {
              if start_old < old_to_new.len() {
                  let m = old_to_new[start_old];
                  *start_counts.entry(m).or_insert(0) += 1;
              }
          }
          // Choose the most common minimized start (majority), tie broken by first.
          let mut chosen_start = min_dfa.start; // fall back to minimized super_start if empty
          let mut best_count = 0usize;
          for (m, c) in start_counts.iter() {
              if *c > best_count {
                  best_count = *c;
                  chosen_start = *m;
              }
          }
          if start_counts.len() > 1 {
              crate::debug!(
                  2,
                  "Shared minimization produced multiple distinct start images across atoms; choosing most common representative = {} among {:?}",
                  chosen_start,
                  start_counts
              );
          }

          // Build DWA
          let mut dwa_states = DWAStates::default();
          for _ in 0..n {
              dwa_states.add_state();
          }
          let mut dwa = DWA { states: dwa_states, body: DWABody { start_state: chosen_start } };

          // Final weights
          for sid in 0..n {
              if !final_weight[sid].is_empty() {
                  let _ = dwa.set_final_weight(sid, final_weight[sid].clone());
              }
          }

          // Transitions with per-state "edge" weight = live_weight[sid]
          for sid in 0..n {
              let edge_w = if live_weight[sid].is_empty() {
                  Weight::zeros()
              } else {
                  live_weight[sid].clone()
              };

              // Default (OTHER)
              let dst_def = min_dfa.trans[sid][sigma.other_index];
              if sid < dwa.states.len() && dst_def < dwa.states.len() {
                  // Create/overwrite default transition
                  let _ = dwa.set_default_transition(sid, dst_def, edge_w.clone());
              }

              // Exceptions for each explicit label
              for (li, &lbl) in sigma.labels.iter().enumerate() {
                  let dst = min_dfa.trans[sid][li];
                  if sid < dwa.states.len() && dst < dwa.states.len() {
                      let _ = dwa.add_transition(sid, lbl, dst, edge_w.clone());
                  }
              }
          }

          dwa
      }

