                          return cached

                  result = fn(acc)
                  id_memo[acc_id] = result
                  if use_value_cache and result is not None:
                      val_memo[acc] = result
                  return result
              wrapper._acc_memo_size = lambda: len(id_memo)
              return wrapper
          return decorator

