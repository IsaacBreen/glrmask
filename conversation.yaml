          let fn_attrs = &item_fn.attrs;

          let result = quote! {
              #(#fn_attrs)*
              #fn_vis #fn_sig {
                  let _guard = crate::profiler::TimedBlockGuard::new(#timer_name_expr);
                  #fn_block
              }
