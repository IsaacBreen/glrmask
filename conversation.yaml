                  eliminate_pop0_except_roots: true,
                  merge_equivalent_llm_tokens: true,
                  reorder_llm_tokens: true,
                  generalize_sids: true,
              }
          }
      }

      impl CoordinatorConfig {
          pub fn off() -> Self {
