      /// A trait to provide a lazily-evaluated `expect`.
      pub trait ExpectElse<T> {
          fn expect_else<F>(self, f: F) -> T
          where
              F: FnOnce() -> String;
      }

      impl<T> ExpectElse<T> for Option<T> {
          #[inline]
          #[track_caller]
          fn expect_else<F>(self, f: F) -> T
          where
              F: FnOnce() -> String,
          {
              match self {
                  Some(v) => v,
                  None => panic!("{}", f()),
              }
          }
      }

      pub trait DynEq {
          fn dyn_eq(&self, other: &dyn Any) -> bool;
      }
      pub trait DynOrd {
          fn dyn_cmp(&self, other: &dyn Any) -> Ordering;
      }
      pub trait DynHash {
          fn dyn_hash(&self, state: &mut dyn std::hash::Hasher);
      }

      impl DynEq for () {
          fn dyn_eq(&self, _other: &dyn Any) -> bool {
              true
          }
      }
      impl DynOrd for () {
          fn dyn_cmp(&self, _other: &dyn Any) -> Ordering {
              Ordering::Equal
          }
      }
      impl DynHash for () {
          fn dyn_hash(&self, _state: &mut dyn std::hash::Hasher) {}
      }

      pub trait UserDataTrait: Any + Send + Sync + Debug + DynEq + DynOrd + DynHash {}
      impl UserDataTrait for () {}

      pub type ActionFn = Arc<dyn Fn(&mut Arc<dyn UserDataTrait>) -> bool + Send + Sync>;

      #[derive(Debug, Copy, Clone)]
      pub struct ParseStateEdgeContent {
          pub state_id: StateID,
      }

      impl PartialEq for ParseStateEdgeContent {
          fn eq(&self, other: &Self) -> bool {
              self.state_id == other.state_id
          }
      }
      impl Eq for ParseStateEdgeContent {}
      impl PartialOrd for ParseStateEdgeContent {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              self.state_id.partial_cmp(&other.state_id)
          }
      }
      impl Ord for ParseStateEdgeContent {
          fn cmp(&self, other: &Self) -> Ordering {
              self.state_id.cmp(&other.state_id)
          }
      }
      impl Hash for ParseStateEdgeContent {
          fn hash<H: Hasher>(&self, state: &mut H) {
              self.state_id.hash(state);
          }
      }

      impl JSONConvertible for ParseStateEdgeContent {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("state_id".to_string(), self.state_id.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let state_id = obj
                          .remove("state_id")
                          .ok_or_else(|| "Missing field state_id for ParseStateEdgeContent".to_string())
                          .and_then(StateID::from_json)?;
                      Ok(ParseStateEdgeContent { state_id })
                  }
                  _ => Err("Expected JSONNode::Object for ParseStateEdgeContent".to_string()),
              }
          }
      }

      pub type ParserGSS = LeveledGSS<ParseStateEdgeContent, Acc>;
      pub type GSSStats = LeveledGSSStats<ParseStateEdgeContent, Acc>;

      #[derive(Clone)]
      pub struct ParseState {
          pub stack: ParserGSS,
      }

      impl Debug for ParseState {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              f.debug_struct("ParseState")
                  // .field("stack", &self.stack)
                  .finish()
          }
      }

      impl PartialEq for ParseState {
          fn eq(&self, other: &Self) -> bool {
              todo!()
          }
      }

      impl Eq for ParseState {}

      impl ParseState {
          pub fn new() -> Self {
              ParseState { stack: LeveledGSS::empty() }
          }

          pub(crate) fn with_stack(stack: ParserGSS) -> Self {
              ParseState { stack }
          }
      }

      #[derive(Clone)]
      pub struct GLRParser {
          pub table: Table,
          pub productions: Vec<Production>,
          pub terminal_map: BiBTreeMap<Terminal, TerminalID>,
          pub non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
          pub item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
          pub start_state_id: StateID,
          pub everything_state_id: StateID,
          pub ignore_terminal_id: Option<TerminalID>,
          pub substring_gotos: BTreeMap<NonTerminalID, SubstringGoto>,
          pub reduce_goto_map: BTreeMap<NonTerminalID, BTreeMap<StateID, StateIDBV>>,
          pub actions: BTreeMap<NonTerminalID, ActionFn>,
      }

      impl Display for GLRParser {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "GLRParser:")?;
              eprintln!("TODO:");
              return Ok(());
          }
      }

      impl JSONConvertible for GLRParser {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("stage_7_table".to_string(), self.table.to_json());
              obj.insert("productions".to_string(), self.productions.to_json());
              obj.insert("terminal_map".to_string(), self.terminal_map.to_json());
              obj.insert("non_terminal_map".to_string(), self.non_terminal_map.to_json());
              obj.insert("item_set_map".to_string(), self.item_set_map.to_json());
              obj.insert("start_state_id".to_string(), self.start_state_id.to_json());
              obj.insert("everything_state_id".to_string(), self.everything_state_id.to_json());
              obj.insert("ignore_terminal_id".to_string(), self.ignore_terminal_id.to_json());
              // substring_gotos, reduce_goto_map, actions are recomputed or provided at runtime.
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let table = obj
                          .remove("stage_7_table")
                          .ok_or_else(|| "Missing field stage_7_table".to_string())
                          .and_then(Table::from_json)?;
                      let productions = obj
                          .remove("productions")
                          .ok_or_else(|| "Missing field productions".to_string())
                          .and_then(Vec::<Production>::from_json)?;
                      let _start_production_id =
                          obj.remove("start_production_id").and_then(|n| usize::from_json(n).ok());
                      let terminal_map = obj
                          .remove("terminal_map")
                          .ok_or_else(|| "Missing field terminal_map".to_string())
                          .and_then(|n| BiBTreeMap::<Terminal, TerminalID>::from_json(n))?;
                      let non_terminal_map = obj
                          .remove("non_terminal_map")
                          .ok_or_else(|| "Missing field non_terminal_map".to_string())
                          .and_then(|n| BiBTreeMap::<NonTerminal, NonTerminalID>::from_json(n))?;
                      let item_set_map = obj
                          .remove("item_set_map")
                          .ok_or_else(|| "Missing field item_set_map".to_string())
                          .and_then(|n| BiBTreeMap::<BTreeSet<Item>, StateID>::from_json(n))?;
                      let start_state_id = obj
                          .remove("start_state_id")
                          .ok_or_else(|| "Missing field start_state_id".to_string())
                          .and_then(StateID::from_json)?;
                      let everything_state_id = obj
                          .remove("everything_state_id")
                          .ok_or_else(|| "Missing field everything_state_id".to_string())
                          .and_then(StateID::from_json)?;
                      let ignore_terminal_id = obj
                          .remove("ignore_terminal_id")
                          .ok_or_else(|| "Missing field ignore_terminal_id for GLRParser".to_string())
                          .and_then(Option::<TerminalID>::from_json)?;

                      let substring_gotos = crate::glr::table::stage_9(&table, &non_terminal_map);
                      let reduce_goto_map = crate::glr::table::stage_10(&table);
                      Ok(GLRParser::new(
                          table,
                          productions,
                          terminal_map,
                          non_terminal_map,
                          item_set_map,
                          start_state_id,
                          everything_state_id,
                          BTreeMap::new(),
                          ignore_terminal_id,
                          substring_gotos,
                          reduce_goto_map,
                      ))
                  }
                  _ => Err("Expected JSONNode::Object for GLRParser".to_string()),
              }
          }
      }

      impl Debug for GLRParser {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              f.debug_struct("GLRParser")
                  .field("table_len", &self.table.len())
                  .field("productions_len", &self.productions.len())
                  .field("start_state_id", &self.start_state_id)
                  .field("everything_state_id", &self.everything_state_id)
                  .field("ignore_terminal_id", &self.ignore_terminal_id)
                  .field("substring_gotos_size", &self.substring_gotos.len())
                  .field("reduce_goto_map_size", &self.reduce_goto_map.len())
                  .field("actions_size", &self.actions.len())
                  .finish()
          }
      }

      impl PartialEq for GLRParser {
          fn eq(&self, other: &Self) -> bool {
              self.table == other.table
                  && self.productions == other.productions
                  && self.terminal_map == other.terminal_map
                  && self.non_terminal_map == other.non_terminal_map
                  && self.item_set_map == other.item_set_map
                  && self.start_state_id == other.start_state_id
                  && self.everything_state_id == other.everything_state_id
                  && self.ignore_terminal_id == other.ignore_terminal_id
                  && self.substring_gotos == other.substring_gotos
                  && self.reduce_goto_map == other.reduce_goto_map
          }
      }
      impl Eq for GLRParser {}

      impl GLRParser {
          pub fn new(
              table: Table,
              productions: Vec<Production>,
              terminal_map: BiBTreeMap<Terminal, TerminalID>,
              non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
              item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
              start_state_id: StateID,
              everything_state_id: StateID,
              actions: BTreeMap<NonTerminal, ActionFn>,
              ignore_terminal_id: Option<TerminalID>,
              substring_gotos: BTreeMap<NonTerminalID, SubstringGoto>,
              reduce_goto_map: BTreeMap<NonTerminalID, BTreeMap<StateID, StateIDBV>>,
          ) -> Self {
              let converted_actions: BTreeMap<NonTerminalID, ActionFn> = actions
                  .into_iter()
                  .map(|(nt, func)| {
                      let nt_id = non_terminal_map.get_by_left(&nt).unwrap_or_else(|| {
                          panic!(
                              "NonTerminal {:?} not found in non_terminal_map during GLRParser construction",
                              nt
                          )
                      });
                      (*nt_id, func)
                  })
                  .collect();

              GLRParser {
                  table,
                  productions,
                  terminal_map,
                  non_terminal_map,
                  item_set_map,
                  start_state_id,
                  everything_state_id,
                  ignore_terminal_id,
                  substring_gotos,
                  reduce_goto_map,
                  actions: converted_actions,
              }
          }

          pub fn init_glr_parser(&self, _llm_vocab: Option<Arc<LLMVocab>>) -> GLRParserState {
              self.init_glr_parser_with_acc()
          }

          pub fn init_glr_parser_with_acc(&self) -> GLRParserState {
              let initial_parse_state = self.init_parse_state_with_acc();
              GLRParserState { parser: self, stack: initial_parse_state.stack }
          }

          pub fn init_parse_state_with_acc(&self) -> ParseState {
              let initial_edge = ParseStateEdgeContent { state_id: self.start_state_id };
              let acc = Acc::new_fresh();
              let gss = LeveledGSS::from_stacks(&[(vec![], acc)]).push(initial_edge);
              ParseState::with_stack(gss)
          }

          pub fn init_parse_state_with_gss(&self, gss: LeveledGSS<ParseStateEdgeContent, Acc>) -> GLRParserState {
              GLRParserState { parser: self, stack: gss }
          }

          pub fn init_glr_parser_null(&self, llm_vocab: Option<Arc<LLMVocab>>) -> GLRParserState {
              let initial_parse_state = self.init_parse_state_with_acc();
              GLRParserState { parser: self, stack: initial_parse_state.stack }
          }

          pub fn parse(&self, input: &[TerminalID], llm_vocab: Option<Arc<LLMVocab>>) -> GLRParserState {
              let mut state = self.init_glr_parser(llm_vocab);
              state.parse(input);
              state
          }

          #[time_it]
          pub fn process_token_gss(&self, gss: &ParserGSS, token: TerminalID) -> ParserGSS {
              if Some(token) == self.ignore_terminal_id {
                  return gss.clone();
              }
              if gss.is_empty() {
                  return gss.clone();
              }

              let mut heads_by_state: BTreeMap<StateID, ParserGSS> = BTreeMap::new();
              for edge in gss.peek() {
                  let sid = edge.state_id;
                  let iso = gss.isolate(Some(edge));
                  heads_by_state.entry(sid).and_modify(|acc| *acc = acc.merge(&iso)).or_insert(iso);
              }

              let mut shifted: Vec<ParserGSS> = Vec::new();

              while let Some((state_id, state_gss)) = heads_by_state.pop_first() {
                  let row = match self.table.get(&state_id) {
                      Some(r) => r,
                      None => continue,
                  };
                  let action = match row.shifts_and_reduces_full.get(&token) {
                      Some(a) => a,
                      None => continue,
                  };

                  match action {
                      Stage7ShiftsAndReducesLookaheadValue::Shift(to) => {
                          let edge = ParseStateEdgeContent { state_id: *to };
                          shifted.push(state_gss.push(edge));
                      }
                      Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id, len, .. } => {
                          self.apply_reduces(&state_gss, *len, *nonterminal_id, &mut heads_by_state);
                      }
                      Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } => {
                          if let Some(to) = shift {
                              let edge = ParseStateEdgeContent { state_id: *to };
                              shifted.push(state_gss.push(edge));
                          }
                          for (len, nts) in reduces {
                              for (&nt_id, _pids) in nts.iter() {
                                  self.apply_reduces(&state_gss, *len, nt_id, &mut heads_by_state);
                              }
                          }
                      }
                  }
              }

              if shifted.is_empty() {
                  return LeveledGSS::empty();
              }
              let mut it = shifted.into_iter();
              let first = it.next().unwrap();
              it.fold(first, |acc, g| acc.merge(&g))
          }

          fn apply_reduces(
              &self,
              state_gss: &ParserGSS,
              len: usize,
              nt: NonTerminalID,
              heads_by_state: &mut BTreeMap<StateID, ParserGSS>,
          ) {
              let popped = state_gss.popn(len as isize);
              if popped.is_empty() {
                  return;
              }

              for edge in popped.peek() {
                  let from_id = edge.state_id;
                  if let Some(goto) = self.table[&from_id].gotos.get(&nt) {
                      if let Some(next_id) = goto.state_id {
                          let iso = popped.isolate(Some(edge));
                          let pushed = iso.push(ParseStateEdgeContent { state_id: next_id });
                          heads_by_state
                              .entry(next_id)
                              .and_modify(|acc| *acc = acc.merge(&pushed))
                              .or_insert(pushed);
                      }
                  }
              }
          }
      }

      #[derive(Clone)]
      pub struct GLRParserState<'a> {
          pub parser: &'a GLRParser,
          pub stack: ParserGSS,
      }

      impl Debug for GLRParserState<'_> {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              f.debug_struct("GLRParserState")
                  .field("parser", &self.parser)
                  // .field("stack", &self.stack)
                  .finish()
          }
      }

      impl PartialEq for GLRParserState<'_> {
          fn eq(&self, other: &Self) -> bool {
              self.stack.to_stacks() == other.stack.to_stacks()
          }
      }

      impl Eq for GLRParserState<'_> {}

      impl<'a> GLRParserState<'a> {
          pub fn step(&mut self, token_id: TerminalID) {
              self.stack = self.parser.process_token_gss(&self.stack, token_id);
          }

          pub fn parse(&mut self, input: &[TerminalID]) {
              for &t in input {
                  self.step(t);
              }
          }

          pub fn is_ok(&self) -> bool {
              !self.stack.is_empty()
          }

          pub fn stats(&self) -> GSSStats {
              self.stack.stats()
          }

          pub fn log_gss(&self, phase: &str, token: TerminalID) {
              if !GSS_LOGGING_ENABLED {
                  return;
              }
              let stats = self.stats();
              debug!(2, "{} - token {} - GSS stats: {:?}", phase, token.0, stats);
              if let Some((path, _acc)) = self.stack.get_first_path() {
                  let ids: Vec<_> = path.into_iter().map(|e| e.state_id.0).collect();
                  debug!(3, "Sample path: {:?}", ids);
              }
          }

          pub fn merge_with(&mut self, other: Self) {
              self.stack = self.stack.merge(&other.stack);
          }
      }
    src/glr/items.rs: |
      use crate::glr::grammar::{Production, Symbol};
      use crate::json_serialization::{JSONConvertible, JSONNode};
      use std::collections::BTreeMap as StdMap;
      use std::fmt::{Display, Formatter};

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord)]
      pub struct Item {
          /// Index into the `productions` array passed around the parser generator.
          pub production_id: usize,
          /// Dot position inside `productions[production_id].rhs` (0 <= dot_position <= len).
          pub dot_position: usize,
      }

      // Manual impl for Item (could be derived via serde-like mechanism)
      impl JSONConvertible for Item {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("production_id".to_string(), self.production_id.to_json());
              obj.insert("dot_position".to_string(), self.dot_position.to_json());
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let production_id = obj
                          .remove("production_id")
                          .ok_or_else(|| "Missing field production_id for Item".to_string())
                          .and_then(usize::from_json)?;
                      let dot_position = obj
                          .remove("dot_position")
                          .ok_or_else(|| "Missing field dot_position for Item".to_string())
                          .and_then(usize::from_json)?;
                      Ok(Item { production_id, dot_position })
                  }
                  _ => Err("Expected JSONNode::Object for Item".to_string()),
              }
          }
      }

      impl Display for Item {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              // Kept intentionally lightweight; the actual production can be recovered via
              // `productions[self.production_id]` when needed.
              write!(f, "[#{} @ {}]", self.production_id, self.dot_position)
          }
      }

      impl Item {
          /// Returns true if the dot is at the end of the RHS of the corresponding production.
          #[inline]
          pub fn dot_at_end(&self, productions: &[Production]) -> bool {
              self.dot_position == productions[self.production_id].rhs.len()
          }

          /// Returns the symbol *after* the dot and the corresponding next item, if any.
          #[inline]
          pub fn next(&self, productions: &[Production]) -> Option<(Symbol, Self)> {
              let prod = &productions[self.production_id];
              if let Some(symbol) = prod.rhs.get(self.dot_position) {
                  Some((
                      symbol.clone(),
                      Item {
                          production_id: self.production_id,
                          dot_position: self.dot_position + 1,
                      },
                  ))
              } else {
                  None
              }
          }

          /// Returns the symbol *before* the dot and the corresponding previous item, if any.
          #[inline]
          pub fn prev(&self, productions: &[Production]) -> Option<(Symbol, Self)> {
              if self.dot_position == 0 {
                  return None;
              }
              let prod = &productions[self.production_id];
              let symbol = prod.rhs[self.dot_position - 1].clone();
              Some((
                  symbol,
                  Item {
                      production_id: self.production_id,
                      dot_position: self.dot_position - 1,
                  },
              ))
          }
      }
    src/glr/analyze.rs: |
      use crate::glr::automaton::{
          compute_closure, compute_first_sets_for_nonterminals, compute_follow_sets_for_nonterminals,
          compute_nonterminal_nullability, compute_null_nonterminals, compute_nullable_nonterminals,
          Nullability,
      };
      use crate::glr::grammar::{NonTerminal, Production, Symbol, Terminal};
      use crate::glr::table::{Goto, NonTerminalID, StateID, Table};
      use bimap::BiBTreeMap;
      use kdam::{tqdm, BarExt};
      use std::collections::{BTreeMap, BTreeSet, VecDeque};

      /// Checks for non-terminals used in rule RHS but never defined in LHS.
      pub fn check_for_undefined_non_terminals(productions: &[Production]) -> Vec<String> {
          let mut lhs_nonterms: BTreeSet<NonTerminal> = BTreeSet::new();
          let mut rhs_nonterms: BTreeSet<NonTerminal> = BTreeSet::new();

          for prod in productions {
              lhs_nonterms.insert(prod.lhs.clone());
              for symbol in &prod.rhs {
                  if let Symbol::NonTerminal(nt) = symbol {
                      rhs_nonterms.insert(nt.clone());
                  }
              }
          }

          let missing_nonterms: BTreeSet<_> = rhs_nonterms.difference(&lhs_nonterms).collect();
          if !missing_nonterms.is_empty() {
              let missing_nonterm_strings: BTreeSet<_> =
                  missing_nonterms.into_iter().map(|nt| nt.0.clone()).collect();
              vec![format!(
                  "Non-terminal(s) used in rule RHS but never defined in LHS: {:?}",
                  missing_nonterm_strings
              )]
          } else {
              Vec::new()
          }
      }

      /// Helper for check_for_length_1_recursion. Detects all elementary cycles in a graph.
      fn detect_all_cycles_recursive(
          nt: &NonTerminal,
          graph: &BTreeMap<NonTerminal, BTreeSet<NonTerminal>>,
          visiting: &mut BTreeSet<NonTerminal>, // Nodes currently in the recursion stack for the current path
          visited: &mut BTreeSet<NonTerminal>,  // Nodes that have been fully explored
          path: &mut Vec<NonTerminal>,          // Current path for cycle detection
          cycles: &mut BTreeSet<Vec<NonTerminal>>, // Set to store unique, canonicalized cycles
      ) {
          visiting.insert(nt.clone());
          path.push(nt.clone());

          if let Some(neighbors) = graph.get(nt) {
              for neighbor in neighbors {
                  if visiting.contains(neighbor) {
                      // Cycle detected. Extract it from the current path.
                      let cycle_start_index = path.iter().position(|n| n == neighbor).unwrap_or(0);
                      let mut cycle: Vec<_> = path[cycle_start_index..].to_vec();

                      // Canonicalize the cycle by rotating it to start with the lexicographically smallest element.
                      // This ensures that A -> B -> A and B -> A -> B are treated as the same cycle.
                      if !cycle.is_empty() {
                          let min_node_pos = cycle
                              .iter()
                              .enumerate()
                              .min_by_key(|&(_, n)| n)
                              .map(|(i, _)| i)
                              .unwrap_or(0);
                          cycle.rotate_left(min_node_pos);
                      }
                      cycles.insert(cycle);
                      continue; // Continue to find other cycles from this node.
                  }

                  if !visited.contains(neighbor) {
                      detect_all_cycles_recursive(neighbor, graph, visiting, visited, path, cycles);
                  }
              }
          }

          visiting.remove(nt);
          visited.insert(nt.clone());
          path.pop();
      }

      /// Checks for length-1 recursion (e.g., A ::= A, A ::= B; B ::= A), considering nullable prefixes.
      pub fn check_for_length_1_recursion(productions: &[Production]) -> Vec<String> {
          let nullable_nonterminals = compute_nullable_nonterminals(productions);
          let all_nonterminals: BTreeSet<NonTerminal> = productions
              .iter()
              .flat_map(|p| {
                  let mut nts = vec![p.lhs.clone()];
                  for s in &p.rhs {
                      if let Symbol::NonTerminal(nt) = s {
                          nts.push(nt.clone());
                      }
                  }
                  nts
              })
              .collect();

          // Build a graph where an edge A -> B exists if a rule A ::= Nullable* B Nullable* exists.
          let mut unit_graph: BTreeMap<NonTerminal, BTreeSet<NonTerminal>> = BTreeMap::new();
          for nt in &all_nonterminals {
              unit_graph.entry(nt.clone()).or_default();
          }

          for prod in productions {
              let lhs = &prod.lhs;
              let rhs = &prod.rhs;

              let non_nullable_symbols: Vec<&Symbol> = rhs
                  .iter()
                  .filter(|symbol| match symbol {
                      Symbol::Terminal(_) => true,
                      Symbol::NonTerminal(nt) => !nullable_nonterminals.contains(nt),
                  })
                  .collect();

              if non_nullable_symbols.len() == 1 {
                  if let Symbol::NonTerminal(target_nt) = non_nullable_symbols[0] {
                      unit_graph
                          .entry(lhs.clone())
                          .or_default()
                          .insert(target_nt.clone());
                  }
              }
          }

          // Detect all unique cycles in the unit graph using DFS.
          let mut visiting = BTreeSet::new();
          let mut visited = BTreeSet::new();
          let mut cycles = BTreeSet::new();
          let sorted_nonterminals: Vec<_> = all_nonterminals.iter().collect();

          for nt in sorted_nonterminals {
              if !visited.contains(nt) {
                  let mut path = Vec::new();
                  detect_all_cycles_recursive(
                      nt,
                      &unit_graph,
                      &mut visiting,
                      &mut visited,
                      &mut path,
                      &mut cycles,
                  );
              }
          }

          // Format errors for each unique cycle found.
          cycles
              .into_iter()
              .map(|cycle| {
                  let mut cycle_nodes_for_display: Vec<_> = cycle.iter().map(|n| n.0.as_str()).collect();
                  cycle_nodes_for_display.push(cycle[0].0.as_str()); // Close the loop for display.

                  let cycle_path_str = cycle_nodes_for_display.join(" -> ");
                  let recursion_type = if cycle.len() == 1 {
                      "Direct"
                  } else {
                      "Indirect"
                  };

                  format!("{recursion_type} length-1 recursion cycle detected: {cycle_path_str}")
              })
              .collect()
      }

      /// Checks for left-nullable left recursion (e.g., A ::= B A ..., where B is nullable).
      pub fn check_for_left_nullable_left_recursion(productions: &[Production]) -> Vec<String> {
          let nullable_nonterminals = compute_nullable_nonterminals(productions);
          let mut errors = Vec::new();

          for prod in productions {
              let lhs = &prod.lhs;
              let rhs = &prod.rhs;

              // Iterate through RHS symbols to find the recursive non-terminal A
              for (i, symbol) in rhs.iter().enumerate() {
                  if let Symbol::NonTerminal(nt) = symbol {
                      if nt == lhs {
                          // Found potential left recursion: A ::= ... A ...
                          // Check if all preceding symbols (if any) are nullable non-terminals
                          let prefix = &rhs[0..i];
                          if !prefix.is_empty() {
                              // Only check if there's a prefix
                              let prefix_is_nullable = prefix.iter().all(|sym| match sym {
                                  Symbol::NonTerminal(prefix_nt) =>
                                      nullable_nonterminals.contains(prefix_nt),
                                  Symbol::Terminal(_) => false, // Terminals are not nullable
                              });

                              if prefix_is_nullable {
                                  errors.push(format!("Left-nullable left recursion detected in rule '{} ::= {:?}'. The prefix '{:?}' before the recursive non-terminal '{}' is nullable.", lhs.0, rhs, prefix, lhs.0));
                              }
                          }
                          // We only care about the first instance of recursion in a rule.
                          break;
                      }
                  }
              }
          }
          errors
      }

      /// Computes the set of productive non-terminals (those that can derive a terminal string).
      fn compute_productive_non_terminals(productions: &[Production]) -> BTreeSet<NonTerminal> {
          let mut productive_nts = BTreeSet::new();
          let mut changed = true;

          while changed {
              changed = false;
              for prod in productions {
                  if productive_nts.contains(&prod.lhs) {
                      continue;
                  }

                  // A rule's RHS is productive if all its symbols are productive.
                  // Terminals are inherently productive. Non-terminals are productive if they are in our set.
                  let rhs_is_productive = prod.rhs.iter().all(|symbol| match symbol {
                      Symbol::Terminal(_) => true,
                      Symbol::NonTerminal(nt) => productive_nts.contains(nt),
                  });

                  if rhs_is_productive {
                      if productive_nts.insert(prod.lhs.clone()) {
                          changed = true;
                      }
                  }
              }
          }
          productive_nts
      }

      /// Checks for non-terminals that cannot derive any terminal string.
      pub fn check_for_non_productive_non_terminals(productions: &[Production]) -> Vec<String> {
          // Collect all non-terminals defined on the LHS. If a non-terminal is only used on the RHS,
          // `check_for_undefined_non_terminals` will have already caught it.
          let all_nonterminals: BTreeSet<NonTerminal> =
              productions.iter().map(|p| p.lhs.clone()).collect();
          let productive_nts = compute_productive_non_terminals(productions);

          let non_productive_nts: BTreeSet<_> = all_nonterminals.difference(&productive_nts).collect();

          if !non_productive_nts.is_empty() {
              let mut non_productive_strings: Vec<_> =
                  non_productive_nts.into_iter().map(|nt| nt.0.clone()).collect();
              non_productive_strings.sort(); // For deterministic error messages
              vec![format!(
                  "Non-terminal(s) are non-productive (cannot derive a terminal string): {:?}",
                  non_productive_strings
              )]
          } else {
              Vec::new()
          }
      }

      /// Validates the grammar for common issues, collecting all errors.
      ///
      /// Checks for:
      /// 1. Undefined non-terminals.
      /// 2. Non-productive non-terminals.
      /// 3. Length-1 recursion (direct or indirect).
      /// 4. Left-nullable left recursion.
      pub fn validate(productions: &[Production]) -> Result<(), String> {
          let mut errors = Vec::new();

          errors.extend(check_for_undefined_non_terminals(productions));
          errors.extend(check_for_non_productive_non_terminals(productions));
          errors.extend(check_for_length_1_recursion(productions));
          errors.extend(check_for_left_nullable_left_recursion(productions));

          if errors.is_empty() {
              Ok(())
          } else {
              Err(format!(
                  "Grammar validation failed with {} error(s):\n- {}",
                  errors.len(),
                  errors.join("\n- ")
              ))
          }
      }

      /// Removes productions that use non-terminals on their RHS which are never defined on the LHS
      /// of any *remaining* production. This process is repeated until no more productions can be removed.
      ///
      /// This is useful for cleaning up grammars before further analysis or parser generation,
      /// especially if the grammar might contain references to non-terminals that have no rules.
      pub fn remove_productions_with_undefined_nonterminals(
          initial_productions: &[Production],
          exempt: &[usize],
      ) -> Vec<Production> {
          let mut current_productions: Vec<(usize, Production)> =
              initial_productions.iter().cloned().enumerate().collect();

          loop {
              let mut defined_lhs_nonterminals: BTreeSet<NonTerminal> = BTreeSet::new();
              for (i, prod) in &current_productions {
                  defined_lhs_nonterminals.insert(prod.lhs.clone());
              }
              let mut removed_productions: Vec<(usize, Production)> = Vec::new();
              let mut kept_productions: Vec<(usize, Production)> = Vec::new();
              for (i, prod) in current_productions {
                  let keep = prod
                      .rhs
                      .iter()
                      .all(|symbol| match symbol {
                          Symbol::Terminal(_) => true, // Terminals are always defined
                          Symbol::NonTerminal(nt) => defined_lhs_nonterminals.contains(nt),
                      })
                      || exempt.contains(&i);
                  if keep {
                      kept_productions.push((i, prod));
                  } else {
                      removed_productions.push((i, prod));
                  }
              }
              current_productions = kept_productions;
              if removed_productions.is_empty() {
                  break;
              }
              crate::debug!(
                  2,
                  "Removing {} productions with undefined non-terminals.",
                  removed_productions.len()
              );
              let all_rhs_nonterminals: BTreeSet<NonTerminal> = removed_productions
                  .iter()
                  .flat_map(|(_i, prod)| {
                      prod.rhs.iter().filter_map(|symbol| match symbol {
                          Symbol::NonTerminal(nt) => Some(nt.clone()),
                          _ => None,
                      })
                  })
                  .collect();
              crate::debug!(
                  2,
                  "Missing non-terminals ({}) in productions:",
                  all_rhs_nonterminals.len()
              );
              for nt in all_rhs_nonterminals.difference(&defined_lhs_nonterminals) {
                  crate::debug!(2, "  {}", nt.0);
              }
              crate::debug!(2, "Removed productions:");
              for (i, prod) in removed_productions {
                  crate::debug!(2, "  {}", prod);
              }
          }

          current_productions
              .into_iter()
              .map(|(_, prod)| prod)
              .collect()
      }

