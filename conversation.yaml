                          allowed: ffi.Bitset = llm_mask.difference(forbid)
                          if not allowed.is_empty():
                              final_mask = final_mask.union(allowed)

                      if llm_mask.is_empty():
                          # No tokens can pass through this node; prune further exploration
                          stopped.add(node)
