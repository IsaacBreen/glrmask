               if let BitsetRepr::Dense { cached_exact_count, .. } = &set.inner {
                   assert_eq!(*cached_exact_count.borrow(), Some(SPARSE_TO_DENSE_THRESHOLD));
               } else {
                   panic!("Expected Dense representation");
               }
          }

