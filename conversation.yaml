      ```text "/Users/isaacbreen/Projects2/obsidian/grammars25/NWA -> DWA examples.md"
      # Two Worked Examples: Direct NWA → DWA, Inefficient vs. Efficient (No Sink States)

      This document presents two examples that go directly from a nondeterministic weighted automaton (NWA) to two deterministic weighted automata (DWAs):
      - An inefficient, state-heavy DWA (mimicking the classic subset/product blow-up).
      - An efficient, weight-heavy DWA (merging states and pushing distinctions into transition weights).

      Semantics and notation (brief):
      - Weights are subsets of a universe U (atoms A1, A2, … are pairwise disjoint and U = A1 ∪ A2 ∪ …).
      - NWA: For a word, the output weight is the union over accepting paths; a path’s weight is the intersection of its transition weights intersected with the final weight F of the destination state.
      - DWA (partial): For a word, there is at most one run; if the run exists, its output is the intersection of all transition weights along it intersected with the final weight F of the destination state. If a needed transition is missing, the output is ∅.
      - We avoid intermediate NFAs/DFAs and we do not use sink states. Instead, we use partial DWAs. If a transition on some symbol is not present from a state, the run is undefined and the word yields the empty weight (∅).

      Tip: Put information on transition weights, not final weights within states.

      ## Example 1: Simple divergence (ac → A1, bc → A2)

      - Alphabet: {a, b, c}
      - Atoms: A1, A2; U = A1 ∪ A2
      - Desired behavior:
        - “ac” yields A1
        - “bc” yields A2
        - Any other word yields ∅

      ### NWA (direct)

      Idea: Branch on the first letter, tagging with A1 or A2; the c-step passes U and the final state passes U, so the only atom that survives is the one introduced at the first step.

      ```dot
      digraph NWA_Simple {
          rankdir=LR;
          node [shape=circle];

          start [shape=point];
          q0;
          q1;
          q2;
          qf [shape=doublecircle, label="qf (F=U)"];

          start -> q0;

          q0 -> q1 [label="a / A1"];
          q0 -> q2 [label="b / A2"];

          q1 -> qf [label="c / U"];
          q2 -> qf [label="c / U"];
      }
      ```

      ### Inefficient DWA (state-heavy; final weights carry the answer)

      Core idea:
      - Keep separate “after a” and “after b” states.
      - Make all shown transitions carry weight U (uninformative).
      - Put the deciding weight in the final states: F(T_A1)=A1, F(T_A2)=A2.
      - Transitions not shown simply do not exist (partial DWA); such inputs yield ∅.

      ```dot
      digraph DWA_Simple_Inefficient {
          rankdir=LR;
          node [shape=circle];

          start [shape=point];
          D0  [label="D0 (F=∅)"];
          Da  [label="Da (F=∅)"];
          Db  [label="Db (F=∅)"];
          TA1 [shape=doublecircle, label="T_A1 (F=A1)"];
          TA2 [shape=doublecircle, label="T_A2 (F=A2)"];

          start -> D0;

          D0 -> Da [label="a / U"];
          D0 -> Db [label="b / U"];

          Da -> TA1 [label="c / U"];
          Db -> TA2 [label="c / U"];
      }
      ```

      Why it works:
      - “ac”: U ∩ U ∩ F(T_A1)=A1 → A1.
      - “bc”: similarly yields A2.
      - Any other word has no complete run (some needed transition is missing), so ∅.

      Where it wastes states:
      - The difference between “after a” vs. “after b” is stored in states, even though their future structure is identical (both go to a single final on c).


      ### Efficient DWA (weight-heavy; merges states)

      Core idea:
      - Merge the two “middle” states (after a and after b) into one, because their future control is identical.
      - Encode the distinction on the incoming edges with weights A1 or A2.
      - The c-transition’s weight can be U (yes).

      ```dot
      digraph DWA_Simple_Efficient {
          rankdir=LR;
          node [shape=circle];

          start [shape=point];
          S0  [label="S0 (F=∅)"];
          S1  [label="S1 (F=∅)"];
          S2  [shape=doublecircle, label="S2 (F=U)"];

          start -> S0;

          // Encode which atom is active on incoming edges
          S0 -> S1 [label="a / A1"];
          S0 -> S1 [label="b / A2"];

          // c can carry U (simplest correct choice)
          S1 -> S2 [label="c / U"];
      }
      ```

      Why it works:
      - “ac”: A1 ∩ U ∩ F(S2)=U → A1.
      - “bc”: A2 ∩ U ∩ U → A2.
      - Any other word: missing transition ⇒ ∅.

      What improved:
      - Only 3 states; the “after a” and “after b” distinctions live in the weights rather than duplicating control states.


      ## Example 2: Hypercube catastrophe (exponential blow-up vs. one state)

      - Alphabet: Σn = {σ1, σ2, …, σn}
      - Atoms: A1, A2, …, An; U = A1 ∪ A2 ∪ … ∪ An
      - Desired behavior: For any word w, the output is ∪{Ai | σi does not occur in w}.

      ### NWA (one branch per atom)

      Idea:
      - From the start, epsilon-branch into each pi with weight U.
      - In pi, loop on all letters except the forbidden σi.
      - There is no transition on σi; encountering σi kills that branch (no accepting path).

      For concreteness, here is the case n=3:

      ```dot
      digraph NWA_Hypercube_n3_NoSinks {
          rankdir=LR;
          node [shape=circle];

          start [shape=point];

          p1 [label="p1 (F=A1)"];
          p2 [label="p2 (F=A2)"];
          p3 [label="p3 (F=A3)"];

          // epsilon-branches
          start -> p1 [label="ε / U"];
          start -> p2 [label="ε / U"];
          start -> p3 [label="ε / U"];

          // each branch loops on all letters except its forbidden one
          p1 -> p1 [label="σ2|σ3 / U"];
          p2 -> p2 [label="σ1|σ3 / U"];
          p3 -> p3 [label="σ1|σ2 / U"];
      }
      ```

      Why it works:
      - In branch i, if σi never occurs, the run remains in pi and contributes Ai (since transitions carry U, the path intersection is U ∩ F(pi)=Ai).
      - Union over i yields ∪{Ai | σi not in w}.

      ### Inefficient DWA (2^n states: track the set of seen letters)

      Core idea:
      - State S ⊆ {1..n} remembers exactly which letters have occurred.
      - On σi:
        - If i ∉ S: go to S ∪ {i}.
        - If i ∈ S: stay in S (self-loop).
      - All transition weights are U (uninformative).
      - Final weight F(S) = ∪{Aj | j ∉ S}.

      For n=3 (we show only edges that add a newly seen letter; the required self-loops for already-seen letters are described below to avoid clutter):

      ```dot
      digraph DWA_Hypercube_Inefficient_n3 {
          label="Inefficient DWA for n=3 (2^3 states)";
          labelloc="t";
          node [shape=box, style=rounded];

          S_     [label="{} | F=A1∪A2∪A3"];
          S_1    [label="{σ1} | F=A2∪A3"];
          S_2    [label="{σ2} | F=A1∪A3"];
          S_3    [label="{σ3} | F=A1∪A2"];
          S_12   [label="{σ1,σ2} | F=A3"];
          S_13   [label="{σ1,σ3} | F=A2"];
          S_23   [label="{σ2,σ3} | F=A1"];
          S_123  [label="{σ1,σ2,σ3} | F=∅"];

          // From {} to singletons
          S_   -> S_1   [label="σ1 / U"];
          S_   -> S_2   [label="σ2 / U"];
          S_   -> S_3   [label="σ3 / U"];

          // From singletons to pairs
          S_1  -> S_12  [label="σ2 / U"];
          S_1  -> S_13  [label="σ3 / U"];
          S_2  -> S_12  [label="σ1 / U"];
          S_2  -> S_23  [label="σ3 / U"];
          S_3  -> S_13  [label="σ1 / U"];
          S_3  -> S_23  [label="σ2 / U"];

          // From pairs to triple
          S_12 -> S_123 [label="σ3 / U"];
          S_13 -> S_123 [label="σ2 / U"];
          S_23 -> S_123 [label="σ1 / U"];
      }
      ```

      Required but not drawn (to keep the figure readable):
      - For each state S and each i ∈ S, add a self-loop S —σi / U→ S.
      - This ensures repeated letters are handled and there is a complete run for any word.

      Why it works:
      - The run’s final weight equals F(S) for the reached S, which is exactly the union of atoms whose letters have not been seen.

      Where it wastes states:
      - 2^n states (hypercube), storing a full subset of seen letters in the control state.


      ### Efficient DWA (one state: push all information into weights)

      Core idea:
      - One state q with F(q)=U.
      - For each σi, add a self-loop with weight Wi = ∪{Aj | j ≠ i}. Each time σi is read, the intersection removes Ai from the accumulated weight.

      For n=3:

      ```dot
      digraph DWA_Hypercube_Efficient_n3 {
          rankdir=LR;
          node [shape=circle];

          start [shape=point];
          q [shape=doublecircle, label="q (F=A1∪A2∪A3)"];

          start -> q;

          q -> q [label="σ1 / A2 ∪ A3"];
          q -> q [label="σ2 / A1 ∪ A3"];
          q -> q [label="σ3 / A1 ∪ A2"];
      }
      ```

      Why it works:
      - The accumulated intersection keeps Aj precisely when σj never occurs; intersecting with F(q)=U yields ∪{Aj | σj not in w}.
      - One state, no blow-up.
      ```
