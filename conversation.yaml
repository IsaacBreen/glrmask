          expected.add_transition(0, 'b' as i16, s_b, Weight::all()).unwrap();
          expected.set_final_weight(s_a, Weight::from_item(1)).unwrap();
          expected.set_final_weight(s_b, Weight::from_item(2)).unwrap();

