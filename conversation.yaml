      use anyhow::Result;
      use unsafe_unwrap::UnsafeUnwrap;

      use crate::algorithms::dfs_visit::{dfs_visit, Visitor};
      use crate::algorithms::tr_filters::AnyTrFilter;
      use crate::fst_properties::FstProperties;
      use crate::fst_traits::Fst;
