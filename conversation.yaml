              nwa.add_transition(s1, 2, s2, w01.clone());
              nwa.add_transition(s1, 3, s2, w01.clone());
              nwa.add_transition(s1, 4, s2, w01.clone());
              nwa.add_transition(s1, 4, s3, w1.clone());
