      I've thought of a new optimization pass.
      Basically, we can work out all possible parser states that can be active at a given node. Then, if an edge originating from that node has state bv that's a superset of the possible states at that edge, then we can replace it with `StateIDBV::max_ones()`.
      But we don't use the states at the origin with the superset test. We first have to transform those states. And we transform them according to the popn on the edge.
      So, states live at a node. The initial nodes just have *all* states on them.
      Then, when the states cross an edge, they first get transformed by popn. Then we can check whether the resulting states are a subset of the states on the edge, and replace the edge's state bv with `StateIDBV::max_ones()` if so. Then, the resulting states after the pop transformation are transmitted to the destination node.
      If that's not the case, and the states after the pop transform are not a subset of the edge states, then we can still do something. We can subtracted the pop transformed states from the edge states, modifying the edge states in-place, since those states aren't able to reach the edge state mask anyway.

      Now, what's this transform?
      It's a one-step transform that's applied n times.
      Basically, if we imagine a single state, the transform tells us which states can appear underneath that state in a parse stack.
      And if we imagine a set of states at a node, and a pop n edge, we transform that set by applying the single state transform to each item in the set and taking the union of the results, and then doing that again, for a total of n applications.

      How do we know what states can be underneath a state in the parse stack? We can look at the table.
      Suppose we have a state x. Look at its row. Look at all the shift actions. Let's say we have a shift to state y. Then clearly *y can appear above x*, which means that *x can appear above y*. We also have to look at goto actions similarly. Reduces aren't of importance here. (Use `shifts_and_reduces_full`.)


      Figure it out. Think deeply. Think mathematically.
      It must be correct but also completely thorough.
      It must handle cycles properly, too.

      Prove that your methods works. Prove mathematically and rigorously.
      And that your methods doesn't loop. It must be correct.
