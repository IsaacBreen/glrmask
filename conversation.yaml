      ## 1. Does `propagate_and_prune_labels` match your original design?

      Conceptually, yes, your implementation is very close to the algorithm described in your prompt. The important points in your spec:

      1. **Label-follow map from the parse table**

         - Spec text says: for `shift y` in row `x`, “add `x` to the set under key `y`”.
         - In code, `build_label_follower_map` does the opposite: it maps each **source** parser state to the set of **targets** reachable by shift/goto:

         ```rust
         let mut add_follower = |from_sid: ParserStateID, to_sid: ParserStateID| {
             follower_map.entry(from_sid).or_default().insert(to_sid.0);
         };
         ```

         This means `follower_map[p]` contains the parser states that can directly follow `p` by a shift/goto.

         Your propagation code uses `follower_map.get(&p_id)` in exactly this “forward” sense:

         - If label `a` has weight `w_a` at state `u` and there is a transition `u -(a,w_uv)-> v`,
         - It looks up `follower_map[a]` and files `(w_a & w_uv)` under all of those labels at `v`.

         This is self-consistent and actually matches the *intuitive* notion of “followers” (from state → possible next states), even though your original text described the inverse mapping. So the text is off, but the code is consistent and reasonable.

      2. **Initial states**

         Spec (originally):

         - Traverse initial edges (tokenizer IDs) to a set of *initial NWA states*.
         - For those states, “set the weights for all of them (which should be all outgoing labels) to the union of incoming weights (regardless of incoming label).”

         In your current code:

         - You do traverse the initial edges from `combined_nwa.body.start_state` to get initial NWA states.
         - You *seed* `state_info[s_init]` by looking at outgoing **positive parser-state labels** at `s_init` and unioning the outgoing edge weights per label.

           Given that the combined start → body transitions are all `Weight::all()`, the “union of incoming weights” is trivially `ALL`, so your current seeding — which uses outgoing weights — is a more precise variant. It still satisfies the main intent (start from initial states and record label→weight information) and is safe.

      3. **Propagation**

         Spec:

         - At each NWA state `u`, maintain a map `label -> weight`.
         - For an edge `u -(a, w_uv)-> v`, propagate `(w_a(u) & w_uv)` to `v`, filing it under all labels from the label-follow map.

         Code:

         - Exactly does this for positive labels (`is_pos`) and default labels (by iterating all labels in `info_at_u`).
         - There is a branch for negative labels (`is_neg`), which tries to treat them as “any label except p”, but since you now run this pass *after* `remove_negative_transitions`, that branch should be dead in practice.

