              // Cycle with unconnected node: root4 -> A -> B -> A; C (unconnected)
              let root4: TestNodeBasic = Arc::new(RwLock::new(TestTrieBasic::new(30)));
              let node_a2: TestNodeBasic = Arc::new(RwLock::new(TestTrieBasic::new(31)));
