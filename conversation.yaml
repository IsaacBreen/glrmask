                                                                        // RangeSetBlaze doesn't have an explicit dense conversion, iter_bits uses .last()
              assert_eq!(
                  dense_like_set.iter_bits().collect::<Vec<bool>>(),
                  expected_sparse_bools
              );
              assert_eq!(
                  dense_like_set.iter_bits().len(),
