          right.add_transition(0, 3, 3, Weight::from_item(3)).unwrap();

          right.set_default_transition(1, 4, Weight::all()).unwrap();
          right.add_transition(2, neg(2), 5, Weight::all()).unwrap();
          // state 3 is sink
