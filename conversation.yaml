          #[test]
          fn test_dense_dense_edge_cases() {
              // Conceptual names
              let d1 = HybridBitset::zeros();
              let d2 = HybridBitset::zeros();
              let d3 = HybridBitset::from_iter(0..DENSE_TO_SPARSE_THRESHOLD);

              assert_eq!(&d1 & &d2, d1);
              assert_eq!(&d1 | &d2, d1);
              assert_eq!(&d1 ^ &d2, d1);
              assert_eq!(&d1 - &d2, d1);

              assert_eq!(&d1 & &d3, d1);
              assert_eq!(&d3 & &d1, d1);
              assert_eq!(&d1 | &d3, d3);
              assert_eq!(&d3 | &d1, d3);
              assert_eq!(&d1 ^ &d3, d3);
              assert_eq!(&d3 ^ &d1, d3);
              assert_eq!(&d1 - &d3, d1);
              assert_eq!(&d3 - &d1, d3);

              let d4 = HybridBitset::from_iter(0..5);
              let d5 = HybridBitset::from_iter(3..10);

              let inter = &d4 & &d5;
              assert_eq!(
                  inter.iter_indices().collect::<BTreeSet<_>>(),
                  BTreeSet::from_iter(vec![3, 4])
              );

              let union = &d4 | &d5;
              assert_eq!(
                  union.iter_indices().collect::<BTreeSet<_>>(),
                  (0..10).collect::<BTreeSet<_>>()
              );

              let diff = &d4 - &d5;
              assert_eq!(
                  diff.iter_indices().collect::<BTreeSet<_>>(),
                  BTreeSet::from_iter(vec![0, 1, 2])
              );

              let sym_diff = &d4 ^ &d5;
              assert_eq!(
                  sym_diff.iter_indices().collect::<BTreeSet<_>>(),
                  BTreeSet::from_iter(vec![0, 1, 2, 5, 6, 7, 8, 9])
              );
          }

          #[test]
          fn test_from_iterator_trait() {
              // Renamed to avoid conflict
              let data = vec![10, 20, 10, 30, 20];
              let set: HybridBitset = data.into_iter().collect();

              let expected: BTreeSet<usize> = vec![10, 20, 30].into_iter().collect();
              assert_eq!(set.iter_indices().collect::<BTreeSet<_>>(), expected);
