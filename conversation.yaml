      ### 1.5. Proof sketch for Hypothesis B (fast execution)

      Old `execute_from_state2`:

      ```rust
      pub fn execute_from_state2(&self, text: &[u8], state: usize) -> ExecutionResult {
          let mut regex_state = self.init_to_state(state);
          let matches = regex_state.execute(text);

          let end_state = if regex_state.done { None } else { Some(regex_state.current_state) };

          ExecutionResult { matches, end_state }
      }
      ```

      Key behaviors:

      - `init_to_state`:
        - `position = 0`,
        - `current_state = state`,
        - `matches` map contains all finalizers of `state` with position 0,
        - `done = dfa.states[state].transitions.is_empty()`.

      - `execute`:
        - If `done` is `true` at the start:
          - It increments `position` by `text.len()`,
          - Returns an **empty** `Vec<Match>`,
          - Keeps `done == true`.
        - Otherwise:
          - It iterates over `text`, advancing `current_state` by DFA transitions,
          - At each step:
            - Appends `Match{ group_id, position }` for all finalizers at the new state,
            - Updates `self.matches` (map) used only for the early termination condition,
          - Early termination:
            - If the condition from 1.4 holds, it sets `done = true`, returns `all_matches`, and never uses `current_state` further.
          - If there is no transition for the next byte:
            - It sets `done = true` and returns `all_matches`.
          - If it consumes all bytes without early termination:
            - It leaves `done = true` only if there are no outgoing transitions from `current_state`.

      - `ExecutionResult`:
        - `matches` is exactly the `all_matches` vector built inside `execute`.
        - `end_state` is `None` iff `done == true`, otherwise `Some(current_state)`.

      New fast implementation:

      - We implement `execute_from_state_fast` that:
        - Does **not** allocate `RegexState`,
        - Initializes:
          - `current_state = state`,
          - `matched_groups = dfa.states[state].finalizers.clone()` (the same set of group IDs as the keys of `regex_state.matches` at start),
          - `all_matches = Vec::new()`.
        - If `dfa.states[state].transitions.is_empty()`, returns `ExecutionResult { matches: vec![], end_state: None }`.
        - Otherwise, loops over bytes:
          - Computes the next state (or returns early with `end_state = None` when no transition),
          - Appends `Match{ group_id, position }` for all finalizers at the new state (positions identical to `self.position + local_position` with initial `position = 0`),
          - Inserts all those group IDs into `matched_groups`,
          - Checks the same early termination condition via `should_terminate_early`.
        - At end-of-input:
          - Returns `end_state = None` if no transitions from `current_state`,
          - Else `Some(current_state)`.

      We then redefine:

      ```rust
      pub fn execute_from_state2(&self, text: &[u8], state: usize) -> ExecutionResult {
          self.execute_from_state_fast(text, state)
      }
      ```

      **Equality of behaviors:**

      - Starting in a “done” state:
        - Old: `execute` immediately returns empty matches, `done = true`.
        - New: we check `transitions.is_empty()` and immediately return empty matches with `end_state = None`.
      - Transitional steps:
        - State progression is identical (same DFA).
        - Matches:
          - Old: appended whenever entering a state with finalizers,
          - New: same.
          - Zero-length initial matches (finalizers of the starting state) were **never** added to `all_matches` in the old implementation, and are also not added in the new implementation — only tracked in `matched_groups` for early termination.
      - Early termination:
        - Old: uses sets as in 1.4.
        - New: uses semantically equivalent helper `should_terminate_early`.
      - End-of-input:
        - Old: `end_state` is `None` iff `done == true`, which happens exactly when `transitions.is_empty()` at the final state.
        - New: we compute `end_state` under the same condition.

      Therefore `ExecutionResult { matches, end_state }` is exactly the same for all `(text, state)`.

      Because the equivalence analysis only uses `ExecutionResult` (and not internal `RegexState` fields), this is a semantics-preserving optimization.

