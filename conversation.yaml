                  gss_node: GSS = values.pop(node)
                  enqueued_nodes.remove(node)
                  stats.inc('get_mask.gss.at_node.accs.sum', len(getattr(gss_node, 'get_all_accs', lambda: [])()))

                  # End-node handling: just union the allowed LLM tokens
