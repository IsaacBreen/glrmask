                  if let Some(JSONNode::Array(arr)) = obj.get("byte_buffer") {
                       assert_eq!(arr, &vec![JSONNode::UInt(10), JSONNode::UInt(20), JSONNode::UInt(30)]);
                  } else {
                      panic!("byte_buffer not found or not an array");
