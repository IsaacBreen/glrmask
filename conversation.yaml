      +        return;
      +    }
      +    let n = all_nodes.len();
      +
      +    // Dense indexing
      +    let mut dense_of: HashMap<Trie2Index, usize> = HashMap::with_capacity(n.saturating_mul(2));
      +    for (i, node_idx) in all_nodes.iter().enumerate() {
      +        dense_of.insert(*node_idx, i);
      +    }
      +
      +    // Phase A: Build unique-child counts per parent and unique-parents count per child.
      +    let mut unique_child_count: Vec<u32> = vec![0; n];        // number of unique children for each parent
      +    let mut parent_count_for_child: Vec<u32> = vec![0; n];    // number of unique parents for each child
      +
      +    #[cfg(not(rustrover))]
      +    let it = tqdm!(all_nodes.iter(), desc = "Trie3 UltraMerge (Count)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
