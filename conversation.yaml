                      let trie2_god = obj.remove("trie2_god").ok_or_else(|| "Missing field trie2_god".to_string())
                                          .and_then(|n| Trie2GodWrapper::from_json(n))?;
                      let trie3_god = obj.remove("trie3_god").ok_or_else(|| "Missing field trie3_god".to_string())
