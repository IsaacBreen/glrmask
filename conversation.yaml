          pub fn get_longest_path(&self) -> Option<(Vec<T>, A)> {
              let mut longest: Option<(Vec<T>, A)> = None;
              let mut path = Vec::new();
              Self::get_longest_path_upper(&self.inner, &mut path, &mut longest);
