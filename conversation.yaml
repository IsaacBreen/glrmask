              // -1 b, -1 c, +1 c, +1 b, +1 a  =>  +1 a
              let input = vec![
                  ek(-1, Some(&[1]), None), // b
                  ek(-1, Some(&[2]), None), // c
                  ek(1, Some(&[2]), None),  // c
                  ek(1, Some(&[1]), None),  // b
                  ek(1, Some(&[0]), None),  // a
