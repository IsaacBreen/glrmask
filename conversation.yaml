      - All transforms remain semantics-preserving, cycle-safe, and terminating. The extra post-elimination merges and prunes simply apply the same correctness guarantees that already apply elsewhere in the pipeline, just at the point they are most needed.

      Mathematical correctness sketch

      - Pop0 elimination: correctness follows from standard epsilon-removal in guarded automata: the composed guard on (tokens, states) is the conjunction (intersection) of the guards along the eliminated edge and the incoming one. Reachability and accepted behaviors are preserved.
