              &BiBTreeMap::new(), // empty name‐map
              internal_llm_token_map_for_precompute.iter().map(|(_, id)| id.0).max().unwrap_or(0),
              &BTreeMap::new(), // empty terminal_follow_map
              None,
              &mut BTreeMap::new(),
          );
          // print_precomputed(&_precomputed);
          println!("Done precomputing");
      }

