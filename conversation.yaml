              let json_node = original.to_json();
              // { "byte_buffer": [], "field1": Int(1), "field2": "world", "list_of_numbers": [], "optional_field": null }
              if let JSONNode::Object(obj) = &json_node {
                   assert_eq!(obj.get("optional_field"), Some(&JSONNode::Null));
