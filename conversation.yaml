      I will optimize this by adopting a strategy used in more performant graph algorithms:
      1.  Instead of using the full signature object as a key, I will compute a `u64` hash for each node's signature in every iteration.
      2.  These hashes will then be used to determine equivalence classes. This avoids storing and comparing large signature objects, significantly speeding up the process. While this introduces a theoretical risk of hash collisions, it's a standard and effective optimization for this type of algorithm.

