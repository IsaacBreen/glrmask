              f_2 -> f_2 [label="x:x", headport=s, tailport=s, minlen=2];
              f_2 -> f_0 [label="ε₂:ε₂", constraint=false];
          }
      }
      ```

      To apply that filter, we need to first augment $T_1$ and $T_2$ with auxiliary symbols that make the semantics of $\epsilon$ explicit. Thus, let $\tilde{T}_1$ ($\tilde{T}_2$) be the weighted transducer obtained from $T_1$ (resp. $T_2$) by replacing the output (resp. input) $\epsilon$ labels with $\epsilon_2$ (resp. $\epsilon_1$) as illustrated by Figure 7. Thus, matching with the symbol $\epsilon_1$ corresponds to remaining at the same state of $T_1$ and taking a transition of $T_2$ with input $\epsilon$. $\epsilon_2$ can be described in a symmetric way. The filter transducer $F$ disallows a matching $(\epsilon_2, \epsilon_2)$ immediately after $(\epsilon_1, \epsilon_1)$ since this can be done instead via $(\epsilon_2, \epsilon_1)$. By symmetry, it also disallows a matching $(\epsilon_1, \epsilon_1)$ immediately after $(\epsilon_2, \epsilon_2)$. In the same way, a matching $(\epsilon_1, \epsilon_1)$ immediately followed by $(\epsilon_2, \epsilon_1)$ is not permitted by the filter $F$ since a shorter path via the matchings $(\epsilon_2, \epsilon_1)(\epsilon_1, \epsilon_1)$ is possible. Similarly, $(\epsilon_2, \epsilon_2)(\epsilon_2, \epsilon_1)$ is ruled out. It is not hard to verify that the filter transducer $F$ is precisely a finite automaton over pairs accepting the complement of the language
      $$
      L = \sigma^* ((\epsilon_1, \epsilon_1)(\epsilon_2, \epsilon_2) + (\epsilon_2, \epsilon_2)(\epsilon_1, \epsilon_1) + (\epsilon_1, \epsilon_1)(\epsilon_2, \epsilon_1) + (\epsilon_2, \epsilon_2)(\epsilon_2, \epsilon_1))\sigma^*,
      $$
      where $\sigma = \{(\epsilon_1, \epsilon_1), (\epsilon_2, \epsilon_2), (\epsilon_2, \epsilon_1), x\}$ [4]. Thus, the filter $F$ guarantees that exactly one $\epsilon$-path is allowed in the composition of each $\epsilon$ sequences. To obtain the correct result of composition, it suffices then to use the $\epsilon$-free composition algorithm already described and compute
      $$
      \tilde{T}_1 \circ F \circ \tilde{T}_2.
      $$
      Indeed, the two compositions in $\tilde{T}_1 \circ F \circ \tilde{T}_2$ no more involve $\epsilon$s. Since the size of the filter transducer $F$ is constant, the complexity of general composition is the same as that of $\epsilon$-free composition, that is $O(|T_1||T_2|)$. In practice, the augmented transducers $\tilde{T}_1$ and $\tilde{T}_2$ are not explicitly constructed, instead the presence of the auxiliary symbols is simulated. Further filter optimizations help limit the number of non-coaccessible states created, for example by examining more carefully the case of states with only outgoing non-$\epsilon$-transitions or only outgoing $\epsilon$-transitions [46].

      Composition of weighted transducers can be further generalized to the *N-way composition* of weighted transducers [4]. Furthermore, N-way composition of three or more transducers can be substantially faster than the use of the standard composition [5].

      ## 5.2 Intersection

      The *intersection* (or Hadamard product) of two weighted automata $A_1$ and $A_2$ is defined by [22, 54, 36]:
      $$
      (A_1 \cap A_2)(x) = A_1(x) \otimes A_2(x).
      $$
      It coincides with the special case of composition of weighted transducers where the input label of each transition matches its output label. Thus, the same algorithm can be used to compute intersection with the same complexity. Figure 8 illustrates the application of the algorithm to two weighted automata extracted from the weighted transducers of Figure 6.

