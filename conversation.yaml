    metadata:
      filename: src/macro.rs
  - user: Often we kind of want to show where some part of the code *starts* running,
      and where it *ends*. BUT it gets messy to have to call `debug!` twice and show
      two separate lines. It'd be nice if we could print something like `Doing xyz...`
      and then add to that same line `Done.` So the full line is `Doing xyz... Done.`.
      The problem there is what if the code run in-between itself prints stuff. Then
      the output will become jumbled. How can we fix this? Figure out a way. I don't
      mind like if we have a special version of `debug!` in these cases that returns
      something, and then we pass that something to another special `debug!` that
      does some extra work... Try to keep it clean and beautiful.
    metadata:
  - user: |-
      Mode instruction: For this turn, first provide step-by-step instructions, and then provide git diffs in the same response.
                  - First, give concrete, step-by-step edits the user can apply. Be explicit about filenames, code regions, and exact insertions/deletions.
                  - After the instructions, output the corresponding git diff patches.
                  - Use one fenced ```diff code block per file.
                  - The diff must follow the standard unified diff format. It must start with a `diff --git a/FILE b/FILE` line, followed by `--- a/FILE` and `+++ b/FILE` lines, and then one or more hunk headers like `@@ -x,y +x,y @@`.
