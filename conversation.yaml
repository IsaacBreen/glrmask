      from functools import reduce
      from itertools import chain
      from typing import (
          Callable,
          Dict,
          Generic,
          List,
          Optional,
          Set,
          Tuple,
          Any,
          Generator,
          TypeVar,
          Iterator,
          Iterable,
          Union,
          Protocol,
      )
      from collections import defaultdict

      from ..common_interface import GraphProvider, RangeSet
