                  IntermediateTrie3EdgeKey::Push(bv_1.clone()),
                  IntermediateTrie3EdgeKey::Push(bv_2.clone()),
              ];

              let mut current_node = root;
              for (i, edge) in path.into_iter().enumerate() {
                  let next_node = nodes[i + 1];
                  current_node
                      .write(&god)
