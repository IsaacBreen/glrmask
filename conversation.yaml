      ### Mathematical notes & hypotheses (summary)

      - **Semiring model**:  
        `Weight = SimpleBitset` with operations:

        - ⊕ (plus) = bitwise OR (union of parameter sets),
        - ⊗ (times) = bitwise AND (intersection),
        - 0 = empty set,
        - 1 = universe `all()`.

        This is an idempotent, commutative semiring but **not** a ring and has no general multiplicative inverses.

      - **DWA weight pushing correctness**:

        - For non-start state `v`:
          - Old path weight when entering `v` via arc `e` is `... & w(e) & state_weight[v] & ...`.
          - New path weight after pushing onto `e`: `... & (w(e) & state_weight[v]) & ...`.
          - By associativity and commutativity of `&`, they are equal.

        - For start state `s0`:
          - Old path weight for word `w` ending in `f` is `state_weight[s0] & (∧_edges w_e) & final_weight[f]`.
          - New path weight is `(∧_edges w_e) & (final_weight[f] & state_weight[s0])`.
          - Again equal.

      - **Partition refinement correctness (DWA, NWA)**:

        - For a fixed partition `P` (classes), the state signatures capture all relevant behaviour **modulo `P`**:
          - For DWA, each outgoing label `a` leads to a single destination class and weight.
          - For NWA, each `(ArcLabel, weight)` leads to a set of destination classes.

        - Refinement continues until a fixed point where signatures are stable under `P`.
          At that point, two states in the same class have identical signatures, so their
          immediate behaviours are identical. By induction on path length, their right-languages coincide.

        - Quotient construction merges states in each class, unioning weights across transitions and finals.
          Because all members of the class have identical right-languages, the quotient state's right-language
          equals that of any representative. For the class containing the original start state, this ensures
          the automaton-level language (word -> Weight) is preserved.

      - **Why we avoid general weight pushing for NWA**:

        - OpenFst’s weight pushing uses potentials and multiplicative inverses:  
          `w'(e) = φ(u)^{-1} ⊗ w(e) ⊗ φ(v)`.  
          For intersection-based semiring, there are no inverses except the unit weight; so we cannot guarantee
          the existence of `φ(u)^{-1}` with `φ(u) ⊗ φ(u)^{-1} = 1`.  
        - Attempting to naively push final weights backwards onto incoming arcs changes the semantics of paths
          that **pass through** a final state but do not end there, because the final weight would then be applied
          too early. This is not acceptable.
        - Therefore we restrict NWA simplification to trimming and quotienting via bisimulation, both of which
          we can prove preserve semantics exactly, and avoid unsound reweighting.

      This new implementation follows the spirit of rustfst’s weighted acceptor minimization (trim, push, partition, quotient, trim) while respecting the algebraic constraints of your bitset weight semiring and **never determinizing** the NWA.
