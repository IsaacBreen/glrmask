      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct Row {
          pub shifts_and_reduces_without_default_reduce: ShiftsAndReducesWithoutDefaultReduce,
          pub shifts_and_reduces_full: ShiftsAndReducesFull,
