      +    ) -> BTreeMap<WaStateID, BTreeSet<WaStateID>> {
      +        let mut subgraph: BTreeSet<WaStateID> = BTreeSet::new();
      +        let mut preds: BTreeMap<WaStateID, Vec<WaStateID>> = BTreeMap::new();
      +        let mut q: VecDeque<WaStateID> = VecDeque::new();
