          //   - None: the entire stack should be eliminated due to a mismatch.
          fn eliminate_internal_pops_stack(
              stack: Vec<TestEK>,
              intersect: impl Fn(Option<usize>, Option<usize>) -> Option<Option<usize>>,
          ) -> Option<Vec<TestEK>> {
