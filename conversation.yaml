              q0b -> q1b [label="a/.2", headport=w, tailport=e];
              q0b -> q0b [label="a/.1", headport=n, tailport=n, minlen=2];
              q1b -> q2b [label="b/.4", headport=w, tailport=e];
              q1b -> q0b [label="b/.3", headport=e, tailport=w];
