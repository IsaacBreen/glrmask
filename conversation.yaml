      Rewrite the determinization pass completely. Discard what's there now. (But keep the public interface the same.)

      To construct the DWA, construct minimal DFA for each possible weight bit individually. Then combine them.
      This should produce a **minimal DWA**.

      So, first get a partition over all weights. Imagine it like this. Gather all weights `all_weights`. We want to find a minimal disjoint partition set of weights `partition` such that its union is the union of `all_weights`, and any weight in `all_weights` can be formed by a union of some subset of weights in `partition`.
      The partition kind represents 'redundancy' in the weights.
      We can imagine minimizing the weights using this. Once it's minimized, we have a reasonable min/max index to loop over. (Previously, the min/max index would have been 0/`usize::MAX`.)

      Define a NFA struct and a DFA struct.

      Initialize a shared DFA.

