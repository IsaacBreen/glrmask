          while let Some((nt_id, terminal)) = worklist.pop_front() {
              for &dependent_lhs_id in &deps_by_id[nt_id] {
                  if first_sets_by_id[dependent_lhs_id].insert(terminal.clone()) {
                      worklist.push_back((dependent_lhs_id, terminal.clone()));
                  }
              }
