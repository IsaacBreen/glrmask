                                      dest_gss_nodes[dest_idx] = s
                                  s.update(all_parents)
                                  prev_tf = dest_token_filters.get(dest_idx)
                                  dest_token_filters[dest_idx] = self._merge_token_filters(prev_tf, tok_filter)

