          pub optimize_trie2_merge_nodes: bool,
          pub optimize_trie2_factor_common_destinations: bool,
          pub optimize_trie2_compress_edges: bool,
          pub optimize_trie2_gc: bool,
          pub skip_precomputation: bool,
      }

