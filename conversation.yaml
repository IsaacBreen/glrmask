      Root Node Trie2Index(15) (MaxDepth: 0)
      ├── Edge (pop: 0, tokens: [0] (e.g., ["$"])): states [1] -> Node Trie2Index(17) (MaxDepth: 1)
      │  └── Edge (pop: 0, tokens: [0] (e.g., ["$"])): states [0..=5] -> Node Trie2Index(13) (MaxDepth: 2) [END]
      └── Edge (pop: 0, tokens: [1] (e.g., ["a"])): states [4] -> Node Trie2Index(18) (MaxDepth: 1)
         └── Edge (pop: 0, tokens: [1] (e.g., ["a"])): states [0..=5] -> Node Trie2Index(13) (MaxDepth: 2) [END]
      ```
      The final precompute3 trie is a bit more complex than it really needs to be. This simplifies down to
      ```
      --- Tokenizer State ID: 0 ---
      Root Node Trie2Index(0) (MaxDepth: 0) [Live: [0..=1] (e.g., ["$", "a"])]
      ├── Edge 'A': [1] (e.g., ["a"]) -> Node Trie2Index(2) (MaxDepth: 1) [END] [Live: [0..=1] (e.g., ["$", "a"])]
      └── Edge 'EOF': [0] (e.g., ["$"]) -> Node Trie2Index(2) (MaxDepth: 1) [END] [Live: [0..=1] (e.g., ["$", "a"])]
      ```
      I think this is a problem in `src/trie3_opt/passes/nwa_dwa_roundtrip.rs`. I've told it to create an edge to the final node. But it'd be better if before we create the edge to the second node (e.g. node 17) we could check whether the next edge would be final, and instead of making edge 15 -> 17 and 17 -> 13, we can just make 15 -> 17.
