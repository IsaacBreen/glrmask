              obj.insert("nonterminal_id".to_string(), self.nonterminal_id.to_json());
              obj.insert("len".to_string(), self.len.to_json());
              obj.insert("production_ids".to_string(), self.production_ids.to_json());
              JSONNode::Object(obj)
          }
