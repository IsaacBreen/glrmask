                  return RangeSet.empty()
              a, b = self.intervals, other.intervals
              i = j = 0
              out: List[Tuple[int, int]] = []
              while i < len(a) and j < len(b):
                  s1, e1 = a[i]; s2, e2 = b[j]
                  start = s1 if s1 >= s2 else s2
                  end = e1 if e1 <= e2 else e2
                  if start <= end:
