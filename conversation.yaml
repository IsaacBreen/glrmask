                      }
                  }

                  let mut current_start = u;
                  loop {
                      let best_neighbor = adj_graph.get(&current_start).and_then(|neighbors| {
                          neighbors
                              .iter()
                              .filter(|(node, _)| !used_nodes.contains(node))
                              .max_by_key(|(_, weight)| **weight)
