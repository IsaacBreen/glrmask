        pub fn precompute1_from0(
            precomputed0: &Precomputed0,
            trie0_god: &Trie0GodWrapper,
            internal_max_llm_token: usize,
        ) -> (Precomputed, Trie1GodWrapper) {
            // BFS over all nodes reachable from the roots in precomputed0,
            // cloning nodes into a new Trie1 arena while “dropping” the second component
            // of the edge key and merging children by OR-ing their bitvectors.

            let trie1_god = Trie1GodWrapper::new();
            let mut map_old_to_new: HashMap<PrecomputeNode0Index, PrecomputeNode1Index> = HashMap::new();

            // Helper to get/create new node:
            let mut get_or_create = |old_idx: PrecomputeNode0Index| -> PrecomputeNode1Index {
                if let Some(&ni) = map_old_to_new.get(&old_idx) { return ni; }
                let value = old_idx.read(trie0_god).expect("poison").value.clone();
                let new_idx = PrecomputeNode1Index::new(trie1_god.insert(PrecomputeNode1::new(value)));
                map_old_to_new.insert(old_idx, new_idx);
                new_idx
            };

            // Create new roots
            let mut precomputed1: Precomputed = BTreeMap::new();
            for (sid, root0) in precomputed0 {
                let root1 = get_or_create(*root0);
                precomputed1.insert(*sid, root1);
            }

            // BFS copy
            let all_nodes0 = Trie::<_, _, _>::all_nodes(trie0_god, &precomputed0.values().cloned().collect::<Vec<_>>());
            for old_idx in all_nodes0 {
                let new_idx = get_or_create(old_idx);
                // Group children by the dropped key (Option<GrammarTokenID>)
                let mut grouped: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
                {
                    let g0 = old_idx.read(trie0_god).expect("poison");
                    for ((gtid_opt, _disallowed_opt), dest_map0) in g0.children() {
                        let bucket = grouped.entry(*gtid_opt).or_default();
                        for (child0, ev_bv) in dest_map0.iter() {
                            let child1 = get_or_create(*child0);
                            bucket.entry(child1).and_modify(|bv| *bv |= ev_bv).or_insert(ev_bv.clone());
                        }
                    }
                }
                // Install grouped children in new node
                {
                    let mut g1 = new_idx.write(&trie1_god).expect("poison");
                    for (gtid_opt, dests1) in grouped {
                        g1.children_mut().insert(gtid_opt, dests1);
                    }
                }
            }

            Trie::<_, _, _>::recompute_all_max_depths(&trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
            (precomputed1, trie1_god)
        }

