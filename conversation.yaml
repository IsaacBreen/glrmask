      ### 1. High‑level idea and mathematical reasoning

      We want `compute_finality_fixpoint` to be both:

      * **Semantically identical** to the current implementation, and  
      * **Much faster**, especially when:
        * the automaton has *very many* states (e.g. 100M), but  
        * the `source_states_filter` is small (e.g. 1000 states).

      ---

      #### 1.1. What the current algorithm is doing

      Let:

      * `V` = set of NWA states (indices `0..n`),
      * `Filter ⊆ V` = `source_states_filter`,
      * `E_eps` = epsilon edges `(s → t, w)` from `states[s].epsilons`,
      * `E_neg` = negative edges `(s → t, w)`:
        * those transitions whose label satisfies `is_negative_symbol(label)`.

      The current `compute_finality_fixpoint` computes for each `a ∈ Filter`:

      > `future_final[a]` = the union over all *allowed* paths from `a` to any final state `f`, of
      >
      > `weight(path(a→f)) & final_weight(f)`.

      Here:

      * Path weights are combined along a path with `&` (e.g. intersection/product),  
      * Alternative paths are combined with `|` (e.g. union/sum).

      **Allowed paths**:  
      The code only traverses:

      * epsilon edges from *every* state, and
      * negative edges only from states in `Filter`.

      That is, from a state `s` we may use:

      * `E_eps(s)` always,
      * `E_neg(s)` only if `s ∈ Filter`.

      So for each `a ∈ Filter`, the function is computing exactly the semiring path‑sum over the graph whose edge set is:

      * `A = E_eps ∪ { (s→t, w) ∈ E_neg | s ∈ Filter }`.

      The current implementation stores:

      * `queries_at_state[s][a]` = weight of all allowed paths from `a` to `s`,  
      * and then, when `s` is final, it adds `queries_at_state[s][a] & final_weight[s]` into `future_final[a]`.

      This is **correct**, but **expensive**:

      * Complexity is roughly `O(|Filter| × |A_reachable|)` in both space and time, where
        * `A_reachable` are edges in the subgraph reachable from `Filter` using `A`.
      * For each pair `(s, a)` that’s reachable, we store one `Weight`.  
        If `|Filter| ~ 1000` and the reachable subgraph is large, this quickly dominates runtime and memory.

      ---

      #### 1.2. Key observation: global fixpoint without per‑source dimension

      Define a function `F: V → Weight` satisfying:

      > For every state `s ∈ V`:
      >
      > `F(s) = Final(s) | (⋁_{(s→t,w) ∈ A} (w & F(t)))`
      >
      > where `Final(s)` is `states[s].final_weight` (or zero if non‑final),
      > and `⋁` is `|`.

      Standard semiring/path‑sum theory (Kleene iteration / Tarski’s theorem) tells us:

      * `F` is the **least fixpoint** of this system of equations, and  
      * `F(s)` equals the path‑sum over **all allowed paths** from `s` to any final state:

        `F(s) = ⋁_{paths p: s→f final} (weight(p) & final_weight(f))`.

      The current algorithm is computing exactly `F(a)` for each `a ∈ Filter`, but indirectly:

      * It keeps track of every `W(a, s)` = weight of all paths from `a` to `s`, and then:
        `future_final[a] = ⋁_s (W(a,s) & Final(s))`.

      By associativity/commutativity and distributivity of `&` and `|` (our standard semiring assumptions), this is algebraically equal to `F(a)`.

      **Hypothesis**: Instead of tracking `(a, s)` pairs, we can compute `F(s)` globally once, and then just read off `F(a)` for `a ∈ Filter`. This will eliminate the per‑source dimension and should vastly reduce time and memory.

      ---

      #### 1.3. Restricting to the reachable subgraph

      Define:

      * `R ⊆ V` = all states reachable from **any** state in `Filter` via allowed edges `A`.

      Any allowed path starting at `a ∈ Filter` lies entirely inside `R`.

      Therefore:

      * For any `a ∈ Filter`, `F(a)` depends only on `F(t)` for `t ∈ R`.  
      * Edges or states outside `R` **cannot** appear on any allowed path from any `a ∈ Filter` to a final state.

      So we can:

      1. Do a **forward BFS from all states in `Filter`**, using allowed edges:
         * Epsilon edges everywhere,
         * Negative edges only from states in `Filter`.

         While doing this, we collect:

         * `reachable_states` = the list of states in `R`, and
         * **reverse adjacency**: for each `t ∈ R`, a list of *predecessor* edges `(s→t,w)` in `A` with `s ∈ R`.

      2. Afterwards, we only need to solve the fixpoint for `F` **restricted to `R`**:

         For each `s ∈ R`:
         `F_R(s) = Final(s) | ⋁_{(s→t,w) ∈ A_R} (w & F_R(t))`.

         Since `R` is forward‑closed under `A` (by construction) and any path from `a ∈ Filter` stays in `R`, we have:

         * For all `s ∈ R`, `F_R(s) = F(s)` as defined on the full graph,
         * In particular, for all `a ∈ Filter`, `F_R(a) = F(a)`.

      ---

      #### 1.4. Backward worklist algorithm

      On the reachable subgraph `R` with reverse adjacency, we compute `F_R` by a **backward worklist**:

      1. Initialize `F_R(s)` to `Final(s)` for all `s ∈ R` that are final (others implicitly zero).
      2. Push all such final states `s` into a `worklist`.
      3. While `worklist` non‑empty:

         * Pop `s`.
         * For each predecessor edge `(p→s, w)` in the reverse adjacency:
           * Compute `add = F_R(s) & w`.
           * Update `F_R(p) := F_R(p) | add`.
           * If `F_R(p)` changed, push `p` to `worklist`.

      This is a standard monotone worklist algorithm; since `|` is idempotent and weights live in a finite/Noetherian semiring, it converges to the least fixpoint.

      ---

      #### 1.5. Avoiding exponential blow‑up in sources

      The crucial difference:

      * **Old algorithm**: state dimension is `(s, a)` for each `a ∈ Filter`.  
        Space/time roughly scales with `|Filter| × |R|`.

      * **New algorithm**: state dimension is just `s`.  
        Space/time roughly scales with `|R|`.

      When `|Filter|` is small (e.g. 1000) but `|R|` is large, this is a huge asymptotic win.

      We also:

      * Build reverse adjacency **only** for the reachable subgraph `R`, not for the entire automaton.
      * Avoid cloning `Weight`s into the reverse adjacency:
        * We store *indices* of edges and look up `Weight` in `states` when needed.

      ---

      #### 1.6. Functional equivalence argument (sketch)

      1. **Old algorithm semantics**  
         Let `W(a,s)` be the union of weights of all allowed paths from `a` to `s`.  
         The current code maintains `queries_at_state[s][a]` and ensures, at fixpoint:

         * `queries_at_state[s][a] = W(a,s)`.

         It then accumulates:

         * `future_final[a] = ⋁_s (W(a,s) & Final(s))`, plus the zero‑length path (handled by seeding with `Final(a)` if `a` is final).

         This is the standard path‑sum semantics from `a` to final states using `A`.

      2. **Global fixpoint semantics**  
         Let `F: V → Weight` satisfy:

         * `F(s) = Final(s) | ⋁_{(s→t,w) ∈ A} (w & F(t))`.

         Standard semiring/path‑sum facts (Kleene theorem) yield:

         * `F(s) = ⋁_{paths p: s→f final} (weight(p) & Final(f))`.

         So for `a ∈ Filter`, `F(a)` is exactly what `future_final[a]` is intended to be.

      3. **Restriction to `R`**  
         Let `R` be the set of states reachable from `Filter` via `A`.

         * Any allowed path from `a ∈ Filter` is contained in `R`.  
         * So for `s ∈ R`, the contributions from outside `R` are zero, and
           `F_R(s) = F(s)` restricted to `R` solves the same equations.

      4. **Backward worklist correctness**  
         The backward worklist on `R` is computing the least fixpoint of the same monotone equation (just written in reverse: propagate from successors to predecessors).  
         By Tarski’s fixpoint theorem and idempotency of `|`, it converges to `F_R`.

      5. **Result mapping**  
         We then set:

         * `result[a] = F_R(a)` for each `a ∈ Filter`.

         Since `F_R(a) = F(a)` and `F(a)` equals the old `future_final[a]` (up to idempotent duplication of the direct final weight), the new implementation is semantically equivalent.

