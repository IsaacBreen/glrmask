                  nodes: Optional[Set[int]] = todo.pop(depth, None)
                  if not nodes:
                      continue
                  for node in nodes:
                      items: Optional[List[Tuple[GSS, ffi.Bitset]]] = values.pop(node, None)
                      if items is None:
                          continue

