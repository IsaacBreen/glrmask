      `Trie::special_map` is far too complex.
      Basically, what we want to do is allow the user to define some start node and some functions that act on nodes/edges, and then (starting from the start nodes) we traverse the tree and run those functions, accumulating values as we go, and doing so in such a way that each node is visited exactly once, and is only processed once all of its parents (that are reachable from the start nodes) have been processed.
      Note that the user may decide what the start nodes are, and they might not include all *actual* roots, so we can't just wait at a node until all its parents have been processed, as we could end up waiting forever.
      I guess the key feature here is that it waits for nodes to be "maximally informed" by its parents before processing them.
      Rewrite it much simpler. Don't changing anything from the user's point of view. It shouldn't require any adaptation.
