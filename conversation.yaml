          if let Some(clean_end) = &node.value.clean_end { // clean_end stores internal IDs
              println!("{}  Clean End LLM Tokens: {}", indent, format_bv_indices(clean_end, id_map)); // Pass id_map
          }

          // Print Children (Edges)
          if node.children().is_empty() {
