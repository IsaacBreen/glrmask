              continue;
          }
          let prop_w = &w_as & w_st;
          if prop_w.is_empty() {
              continue;
          }
          let query_key: QueryKey = (a, c);
          let query_weight = queries[*t].entry(query_key).or_default();
          let old_qw = query_weight.clone();
          *query_weight |= &prop_w;
          if *query_weight != old_qw {
              worklist.push_back((*t, a, c, query_weight.clone()));
          }
      }
      ```

      No changes are needed there.

      ### 2.5. Flatten `new_eps_from` instead of `new_epsilons` at the end

      At the end of `compute_cancellations`, replace the final `new_epsilons.into_iter(...)` with a flattening of `new_eps_from`:

      1. Find:

      ```rust
      new_epsilons
          .into_iter()
          .map(|((from, to), w)| (from, to, w))
          .collect()
      ```

      2. Replace with:

      ```rust
      let mut result = Vec::new();
      for (from, targets) in new_eps_from.into_iter().enumerate() {
          for (to, w) in targets {
              result.push((from, to, w));
          }
      }
      result
      ```

      This produces the same `Vec<(from, to, w)>` but from the new representation.

