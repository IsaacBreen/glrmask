              // Build [roots_map, arena] JSON array
              let roots_arr = sep1::json_serialization::JSONNode::Array(
                  self.inner.precomputed2.iter()
                      .map(|(sid, idx)| sep1::json_serialization::JSONNode::Array(vec![
                          sid.0.to_json(), idx.to_json()
