          raw_edges: List[List[Tuple[int, Optional[int], int, Tuple[Tuple[int, int], ...]]]] = [[] for _ in range(N)]

          for old_idx, node in arena.items():
              u = dense_of[int(old_idx)]
              node_val = (node.get("value", {}) or {})
