                  if dist.is_empty() { return; }
                  println!("\nDistribution of {}:", name);
                  let mut sorted_dist: Vec<_> = dist.iter().collect();
                  sorted_dist.sort_by_key(|&(_, count)| std::cmp::Reverse(*count));
                  for (val, count) in sorted_dist.iter().take(10) {
