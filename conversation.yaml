  - user: |-
      Define something that helps us try various ways of inserting into a Trie. Insertion may fail if it creates a cycle, so we often want to try inserting edges to a bunch of candidate destinations until one of them works.
      It should be possible to first initialise the inserter from the source node, specifying the desired edge key, edge value, and a function for merging edge values.
      It should be possible to use chain-calling style, eg `try` for a single destination, `try_slice` for multiple destinations (a slice of arc mutex trie nodes) (accepting the first that succeeds). Each of these should return an optional destination node.
      There should be a function `else_create()` that simply makes a new destination node and initialises `value` to its default, and `else_create_with` that takes a closure with no args that returns a value of type `T`, and `else_create_with_value` that takes a value of type `T`.
      And there should be a method `try_children` that tries this node's children (the implementation simply calls `try_slice` with the source node's children).
      Finally, there should be an `unwrap` that returns the node itself.
      And a method that returns an `Option<Trie<...>>`? Or is that `unwrap`? What's the proper way of doing it?
      Should `else_create` by `unwrap_or_default`?

      Implement it as a struct `EdgeInserter`.


      Again, it's important that we can call these in chain-call style.
