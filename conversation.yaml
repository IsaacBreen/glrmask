          fn get_mask<'py>(&mut self, py: Python<'py>) -> PyResult<Bound<'py, PyArray1<bool>>> {
              let bitset = self.inner.with_inner_mut(|state| state.get_mask());
              let bools: Vec<bool> = bitset.iter_bits().collect();
