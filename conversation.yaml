          reduces: BTreeMap<Option<Terminal>, BTreeSet<Item>>,
      }

      #[derive(Debug, Default, Clone, PartialEq, Eq)]
      struct Stage4Row {
          shifts: BTreeMap<Terminal, BTreeSet<Item>>,
          gotos: BTreeMap<NonTerminal, BTreeSet<Item>>,
