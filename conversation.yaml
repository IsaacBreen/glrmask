                  self.empty.as_ref().and_then(|e| e.as_ref(py).hash().ok()).hash(state);
              });
              // self.max_depth.hash(state);
              self.children.iter().for_each(|(k, v)| {
                  k.hash(state);
                  v.iter().for_each(|(d, n)| {
                      d.hash(state);
                      Arc::as_ptr(n).hash(state);
                  });
