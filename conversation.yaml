              sorted_tokens_with_original_ids.sort_by(|(bytes_a, _), (bytes_b, _)| bytes_a.cmp(bytes_b));

              // 2. Build the original_to_internal_id_bimap
              let mut original_to_internal_id_bimap = BiBTreeMap::new();
