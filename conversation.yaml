              if Arc::ptr_eq(&self.inner, &other.inner) {
                  return Some(Ordering::Equal);
              }
              PartialOrd::partial_cmp(
                  &*self.inner.read().unwrap(),
                  &*other.inner.read().unwrap(),
              )
          }
      }

