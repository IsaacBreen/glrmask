      5.  **Update `GLRParserState::pop_and_goto`:**
          *   This is where actions are executed.
          *   It needs to collect RHS `UserData`.
          *   It needs to execute the action.
          *   It needs to pass the new LHS `UserData` to the GOTO push.
          *   The return type will change to accommodate the LHS `UserData`.
              `-> Vec<(Arc<GSSNode>, UserData)>` where the `UserData` is for the GOTO edge.

          ```rust
          // Helper GSS method (conceptual, needs to be implemented in gss.rs or here if simpler)
          // For now, let's assume we can get it from temp_idk by walking back.
          // This is a simplified version that assumes a linear path in temp_idk,
          // which is true by its construction in step().
          fn collect_rhs_user_data(mut gss_node_after_rhs: Arc<GSSNode>, len: usize) -> Vec<UserData> {
              if len == 0 {
                  return Vec::new();
              }
              let mut rhs_data = Vec::with_capacity(len);
              for _i in 0..len {
                  if gss_node_after_rhs.predecessors().is_empty() {
                      // This case should ideally not happen if len > 0 and path is valid.
                      // Or it means we are trying to get user_data from the root of GSS.
                      // For safety, fill with default or handle error.
                      // For now, let's assume valid paths. If predecessors is empty, it's an issue.
                      // If len is 1, gss_node_after_rhs is the node *after* the single RHS symbol.
                      // Its predecessor edge is that symbol.
                      if gss_node_after_rhs.predecessors().len() != 1 {
                           // This implies an issue with how temp_idk was constructed or GSS structure.
                           // For a single path segment, there should be one predecessor.
                           // Or, if gss_node_after_rhs is the absolute root, it has no predecessors.
                           // This logic needs to be robust for GSS.
                           // Given temp_idk construction, it should have exactly one predecessor path.
                           debug!(0, "Warning: Expected one predecessor for RHS UserData collection, found {}. Node: {:p}, len: {}", gss_node_after_rhs.predecessors().len(), Arc::as_ptr(&gss_node_after_rhs), len);
                           // Fallback or error. For now, let's assume it works as expected for temp_idk.
                           // If it's the very first node (root of GSS), it has no pred, but len would be 0.
                           // This part is tricky and depends on exact GSS structure.
                           // Let's assume for temp_idk, it has a linear history.
                           return vec![Arc::new(()) as UserData; len]; // Fallback
                      }
                  }
                  // Assuming temp_idk has a linear history of `len` items
                  let (edge_content, pred_node) = gss_node_after_rhs.predecessors().iter().next().unwrap();
                  rhs_data.push(edge_content.user_data.clone());
                  gss_node_after_rhs = pred_node.clone();
              }
              rhs_data.reverse(); // Collected in reverse order (from last RHS symbol to first)
              rhs_data
          }


          fn pop_and_goto(
              &self,
              stack_after_rhs: &Arc<GSSNode>, // This is temp_idk from step()
              // edge_content_last_rhs: &ParseStateEdgeContent, // Edge for the last symbol of RHS
              // edge_src_before_last_rhs: &Arc<GSSNode>, // Node before the last symbol of RHS
              len: usize,
              nt_id: NonTerminalID, // Renamed from nt
              action: Option<&ActionContainer>, // Added action
          ) -> Vec<(Arc<GSSNode>, UserData)> { // Return includes UserData for the GOTO edge
              // stack_after_rhs is the GSSNode *after* the entire RHS has been processed for a specific path.
              // Its direct predecessor edge contains the ParseStateEdgeContent for the last symbol of the RHS.
              // And so on, backwards for `len` items.

              let mut resulting_goto_paths = Vec::new();

              // 1. Collect UserData for RHS symbols
              //    This needs to walk `len` steps back from `stack_after_rhs`.
              let rhs_user_data_vec = collect_rhs_user_data(stack_after_rhs.clone(), len);

              // 2. Prepare LHS UserData and execute action
              let mut lhs_user_data: UserData = Arc::new(()); // Default UserData for LHS
              let action_is_valid = if let Some(act_container) = action {
                  act_container.0.execute(&mut lhs_user_data, &rhs_user_data_vec)
              } else {
                  true // No action, always valid
              };

              if !action_is_valid {
                  crate::debug!(4, "Action for NT {} (len {}) deemed reduction invalid.", nt_id.0, len);
                  return resulting_goto_paths; // Empty, prune this path
              }

              // 3. Perform pop and GOTO (structural part)
              //    The `stack_after_rhs` is `parent_arc_of_rhs --edge_for_last_rhs_sym--> node_after_rhs`
              //    We need to pop `len` items from `stack_after_rhs`.
              //    The node *before* the RHS starts is `stack_after_rhs.popn(len)`.
              //    Let's call this `node_before_rhs_start`.
              let node_before_rhs_start = Arc::new(stack_after_rhs.popn(len));

              // The original `pop_and_goto` logic was complex. Let's adapt it.
              // It iterated `parent_gss_node.pop_iter()`.
              // `parent_gss_node` was `edge_src.popn(len - 1)`.
              // `edge_src` was `parent_arc` from `state.stack.pop_iter()`.
              // `state.stack` was the node *after* the full RHS.
              // So, `parent_arc` is node *before* last RHS symbol.
              // `edge_src.popn(len-1)` is node *before* first RHS symbol.
              // This is `node_before_rhs_start`.

              // Now, for each path leading to `node_before_rhs_start`, we do a GOTO.
              // `node_before_rhs_start.pop_iter()` gives `(grandparent_arc, edge_to_grandparent)`.
              // `grandparent_arc` is the state where the GOTO lookup happens.
              // `edge_to_grandparent` is the edge that led to `grandparent_arc`.

              // The `out` GSSNode in the original code was accumulating merged GOTO results.
              // We need to return a list of (GSSNode_after_goto, lhs_user_data)
              // because each distinct path through GOTO might need its own GSSNode.
              // However, GSS merging should handle this. `pop_and_goto` should return a single merged GSSNode
              // and the `lhs_user_data` (which is now singular after action).

              // Let's simplify: `pop_and_goto` is for *one* reduction path.
              // `stack_after_rhs` defines this path.
              // `node_before_rhs_start` is `Arc::new(stack_after_rhs.popn(len))`.
              // This `node_before_rhs_start` is the GSS node *from which the GOTO transition occurs*.
              // It has one or more predecessor edges. Each of these is a state `S_goto_source`.
              // For each `(S_goto_source_node, S_goto_source_edge)` from `node_before_rhs_start.pop_iter()`:
              //   Look up GOTO `(S_goto_source_edge.state_id, nt_id)`.
              //   Push `S_goto_target_state_id` onto `S_goto_source_node` via `S_goto_source_edge`.
              //   The `lhs_user_data` is associated with this new GOTO edge.

              // The `out` variable in the original code was trying to merge multiple GOTO results.
              // If `pop_and_goto` is called for each path from `step`'s `todo` loop,
              // then `stack_after_rhs` (which is `temp_idk`) represents one such path.
              // `node_before_rhs_start = temp_idk.popn(len)`
              // This `node_before_rhs_start` is the node where GOTO originates.
              // It should have one predecessor edge on this path.

              if node_before_rhs_start.predecessors().is_empty() && len > 0 {
                   // This means we popped the entire stack back to the GSS root, and it's not the start symbol reduction.
                   // Or, if len=0 (epsilon reduction), node_before_rhs_start is stack_after_rhs.
                   // If node_before_rhs_start is the GSS root (empty predecessors) and it's not an accept state, this path is likely invalid.
                   // However, GOTO from initial state is possible.
                   // Let's assume `node_before_rhs_start.pop_iter()` handles the GSS root case correctly (yields nothing or special marker).
                   // For now, if it has no predecessors, it means GOTO happens from the "conceptual state before any input".
                   // This is typically the initial state of the parser.
                   // The GSS root node itself doesn't have a state_id in its ParseStateEdgeContent.
                   // The first *pushed* node has the start_state_id.
                   // If node_before_rhs_start is the GSS root, we need to use parser.start_state_id for GOTO.
                   // This part of GSS interaction is subtle.

                   // If node_before_rhs_start is the GSS root (is_empty() is true for its predecessors map)
                   // then the GOTO lookup happens from the parser's global start_state_id.
                   if node_before_rhs_start.is_empty() { // is_empty checks predecessors
                      let goto_source_state_id = self.parser.start_state_id; // GOTO from initial parser state
                      let goto_action = self.parser.stage_7_table.get(&goto_source_state_id)
                          .and_then(|row| row.gotos.get(&nt_id));

                      if let Some(Goto::State(goto_target_state_id)) = goto_action {
                          // Create a new GSS path: root --goto_edge--> new_node
                          let goto_edge_content = ParseStateEdgeContent {
                              state_id: *goto_target_state_id,
                              user_data: lhs_user_data.clone(), // Use the action-modified UserData
                          };
                          // The new GSS node is formed by pushing onto the GSS root.
                          // The acc for this new node should be derived from the root's acc.
                          // The root's acc is typically default or set at init.
                          // The acc of the path being reduced (cur_acc_from_reducible_node)
                          // should influence the acc of the node after GOTO.
                          // This is complex. Let's assume acc propagates.
                          let acc_for_goto_node = node_before_rhs_start.acc().clone(); // Simplified
                          let new_gss_path_top = Arc::new(node_before_rhs_start.push(goto_edge_content, acc_for_goto_node));
                          resulting_goto_paths.push((new_gss_path_top, lhs_user_data));
                      } else if let Some(Goto::Accept) = goto_action {
                          // This means reducing to start symbol from initial state.
                          // Create a GSS node representing acceptance.
                          // For now, we can represent this by a GSS node that is "final".
                          // The `lhs_user_data` is associated with this acceptance.
                          // An empty GSSNode could signify acceptance if handled by caller.
                          // Or, a special marker. For now, let's assume an empty node is fine.
                          // The `out.merge` logic needs to handle this.
                          // Let's return the node_before_rhs_start itself, and the caller checks for Accept.
                          // This is simpler: if Goto::Accept, the path is valid but doesn't extend.
                          // We need a way to signal acceptance.
                          // For now, if it's accept, we add node_before_rhs_start to results.
                          // The `lhs_user_data` is still relevant for this accepted path.
                          resulting_goto_paths.push((node_before_rhs_start.clone(), lhs_user_data));
                      }
                      return resulting_goto_paths;
                   }
              }


              // Iterate over paths leading to node_before_rhs_start
              for (source_node_for_goto, edge_into_source_node) in node_before_rhs_start.pop_iter() {
                  let goto_source_state_id = edge_into_source_node.state_id;
                  let goto_action = self.parser.stage_7_table.get(&goto_source_state_id)
                      .and_then(|row| row.gotos.get(&nt_id));

                  match goto_action {
                      Some(Goto::State(goto_target_state_id)) => {
                          crate::debug!(4, " GOTO from state {} via NT {} to state {}", goto_source_state_id.0, nt_id.0, goto_target_state_id.0);

                          // The acc for the new node after GOTO.
                          // It should be related to `node_before_rhs_start.acc()` intersected with `source_node_for_goto.acc()`.
                          // And also the acc of the original `stack_after_rhs`.
                          // This is where `cur_acc_from_reducible_node` from original code was used.
                          // Let's use `stack_after_rhs.acc()` as the accumulator of the reduced path.
                          let path_acc = stack_after_rhs.acc().clone();

                          let acc_for_goto_node = path_acc.intersect(source_node_for_goto.acc().clone());

                          let goto_edge_content = ParseStateEdgeContent {
                              state_id: *goto_target_state_id,
                              user_data: lhs_user_data.clone(), // Use the action-modified UserData
                          };

                          // Construct the GSS path segment for this GOTO
                          // Path is: source_node_for_goto --edge_into_source_node--> (node_before_rhs_start conceptual) --goto_edge_content--> new_node
                          // Effectively, we push goto_edge_content onto the path ending at source_node_for_goto via edge_into_source_node.
                          let temp_path_base = Arc::new(source_node_for_goto.push(edge_into_source_node.clone(), acc_for_goto_node.clone()));
                          let new_gss_path_top = Arc::new(temp_path_base.push(goto_edge_content, acc_for_goto_node));

                          resulting_goto_paths.push((new_gss_path_top, lhs_user_data.clone()));
                      }
                      Some(Goto::Accept) => {
                          // Path is accepted. The GSS node representing this is `node_before_rhs_start`.
                          // Or more precisely, the path ending at `source_node_for_goto` via `edge_into_source_node`.
                          let accepted_path_node = Arc::new(source_node_for_goto.push(edge_into_source_node.clone(), stack_after_rhs.acc().clone()));
                          resulting_goto_paths.push((accepted_path_node, lhs_user_data.clone()));
                          crate::debug!(4, " GOTO from state {} via NT {} to ACCEPT", goto_source_state_id.0, nt_id.0);
                      }
                      None => {
                          // GOTO not found, this path is invalid after reduction.
                          crate::debug!(4, " GOTO not found for state {} via NT {}", goto_source_state_id.0, nt_id.0);
                      }
                  }
              }
              resulting_goto_paths
          }
          ```

      6.  **Update `GLRParserState::step`:**
          *   When calling `push_state` for a shift, use default `UserData`.
          *   When calling `pop_and_goto`, pass the action.
          *   The `todo` queue will now store `Vec<( (Arc<GSSNode>, UserData), BTreeSet<Arc<GSSNode>> )>` if `pop_and_goto` returns multiple.
              Or, `pop_and_goto` returns `Vec`, and we iterate that to push to `todo`.
              The `lhs_user_data` from `pop_and_goto` is for the *edge* that will be created by the GOTO.
              The `pop_and_goto` now returns `Vec<(Arc<GSSNode>, UserData)>`. The `Arc<GSSNode>` is the new top of stack *after* GOTO. The `UserData` is what was computed for the LHS by the action. This `UserData` isn't directly on the GSSNode, but was conceptually for the edge leading to the GOTO state.
              The `ParseState` in `todo` should just be `Arc<GSSNode>`. The `UserData` is embedded in its structure.

          ```rust
          pub fn step(&mut self, token_id: TerminalID) {
              crate::debug!(4, "++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++");
              self.log_gss("Step-start", token_id);
              self.cycled_states = ParseState::new();

              // todo stores GSS stack tops to be processed for reductions.
              let mut reduction_q: VecDeque<(Arc<GSSNode>, BTreeSet<Arc<GSSNode>>)> = VecDeque::new();
              reduction_q.push_back((self.active_state.stack.clone(), BTreeSet::new()));

              // next_shift_states accumulates GSS stack tops resulting from shifts.
              let mut next_shift_states = ParseState::new();
              // action_not_found_for_token accumulates states where no action (shift/reduce) was found for the current token.
              let mut action_not_found_for_token = ParseState::new();


              while let Some((current_stack_top, visited_on_this_reduction_path)) = reduction_q.pop_front() {
                  if visited_on_this_reduction_path.contains(&current_stack_top) {
                      crate::debug!(2, "Cycle detected during reduction: GSSNode at {:p} encountered again while processing token {:?}.", Arc::as_ptr(&current_stack_top), token_id);
                      // Handle cycle - e.g., add to self.cycled_states and don't re-process
                      // For now, panic as before, or simply skip.
                      // self.cycled_states.stack.merge(&current_stack_top); // Assuming merge for Arc<GSSNode>
                      continue; // Skip processing this path to prevent infinite loop
                  }

                  let mut next_visited_for_path = visited_on_this_reduction_path.clone();
                  next_visited_for_path.insert(current_stack_top.clone());

                  // Iterate over (predecessor_node, edge_to_predecessor) for current_stack_top
                  // This gives us the actual state ID (from edge_to_predecessor.state_id)
                  // current_stack_top is the node *after* some sequence of symbols.
                  // edge_to_predecessor is the edge for the *last* symbol in that sequence.
                  // predecessor_node is the node *before* that last symbol.
                  for (predecessor_node, edge_to_predecessor) in current_stack_top.pop_iter() {
                      // temp_idk represents the GSS stack *for this specific path* ending at current_stack_top
                      // acc for this path segment
                      let current_path_acc = current_stack_top.acc().clone().intersect(predecessor_node.acc().clone());
                      let temp_idk = Arc::new(predecessor_node.push(edge_to_predecessor.clone(), current_path_acc.clone()));

                      let current_state_id = edge_to_predecessor.state_id;
                      let row = match self.parser.stage_7_table.get(&current_state_id) {
                          Some(r) => r,
                          None => { // Should not happen if table is well-formed
                              action_not_found_for_token.merge(ParseState { stack: temp_idk.clone() });
                              continue;
                          }
                      };

                      match row.shifts_and_reduces.get(&token_id) {
                          Some(Stage7ShiftsAndReduces::Shift(to_state_id)) => {
                              crate::debug!(4, "Shift from state {} via token {} to state {}", current_state_id.0, token_id.0, to_state_id.0);
                              // UserData for a terminal shift is default
                              let new_parse_state = self.push_state(&temp_idk, *to_state_id, temp_idk.acc().clone(), Arc::new(()));
                              next_shift_states.merge(new_parse_state);
                          }
                          Some(Stage7ShiftsAndReduces::Reduce { nonterminal_id, len, action, .. }) => {
                              crate::debug!(4, "Reduce from state {} via token {} to NT {} (len {}), action: {:?}", current_state_id.0, token_id.0, nonterminal_id.0, len, action.is_some());
                              // temp_idk is the GSSNode *after* the RHS.
                              let goto_results = self.pop_and_goto(&temp_idk, *len, *nonterminal_id, action.as_ref());
                              for (goto_stack_top, _lhs_user_data) in goto_results {
                                  // _lhs_user_data is already incorporated into goto_stack_top's structure
                                  if !goto_stack_top.is_empty() { // Check if GOTO led to valid states
                                      reduction_q.push_back((goto_stack_top, next_visited_for_path.clone()));
                                  }
                              }
                          }
                          Some(Stage7ShiftsAndReduces::Split { shift, reduces }) => {
                              crate::debug!(4, "Split from state {} via token {}", current_state_id.0, token_id.0);
                              if let Some(to_state_id) = shift {
                                  crate::debug!(4, " Shift part of split: to state {}", to_state_id.0);
                                  let new_parse_state = self.push_state(&temp_idk, *to_state_id, temp_idk.acc().clone(), Arc::new(()));
                                  next_shift_states.merge(new_parse_state);
                              }
                              for (len, nt_map) in reduces {
                                  for (nt_id, (prods_no_action, prods_with_action)) in nt_map {
                                      crate::debug!(4, " Reduce part of split: NT {}, len {}", nt_id.0, len);
                                      for _prod_id in prods_no_action { // Action is None
                                          let goto_results = self.pop_and_goto(&temp_idk, *len, *nt_id, None);
                                          for (goto_stack_top, _) in goto_results {
                                              if !goto_stack_top.is_empty() {
                                                  reduction_q.push_back((goto_stack_top, next_visited_for_path.clone()));
                                              }
                                          }
                                      }
                                      for (_prod_id, action) in prods_with_action { // Action is Some(action)
                                          let goto_results = self.pop_and_goto(&temp_idk, *len, *nt_id, Some(action));
                                          for (goto_stack_top, _) in goto_results {
                                              if !goto_stack_top.is_empty() {
                                                  reduction_q.push_back((goto_stack_top, next_visited_for_path.clone()));
                                              }
                                          }
                                      }
                                  }
                              }
                          }
                          None => {
                              crate::debug!(4, "No action found for token {:?} in state {}", token_id.0, current_state_id.0);
                              // This state (temp_idk) cannot process the current token.
                              action_not_found_for_token.merge(ParseState { stack: temp_idk.clone() });
                          }
                      }
                  }
              }

              self.active_state = next_shift_states;
              self.action_not_found_states = action_not_found_for_token;

              if !self.active_state.stack.is_empty() {
                  Arc::make_mut(&mut self.active_state.stack).simplify();
              }

              self.log_gss("Step-end", token_id);
              crate::debug!(4, "----------------------------------------------------------------");
          }
          ```

