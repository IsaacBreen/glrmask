          let parser = generate_glr_parser(&productions, None);
          let eof = *parser.terminal_map.get_by_left(&regex_name("$")).unwrap();

          let test_cases = [
              ("b", true),
              ("ab", true),
              ("aab", true),
              ("aaab", true),
              ("a", false),   // Must end in 'b'
              ("ba", false),  // Cannot have 'a' after 'b'
              ("bb", false),  // Cannot have two 'b's
