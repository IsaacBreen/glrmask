                          s2, e2 = other_intervals[j]
                          if current_s < s2: return False # Gap
                          continue

                      covered_until = e2
                      
                      if e1 <= covered_until:
                          current_s = e1 + 1 # break inner loop
                      else:
                          current_s = covered_until + 1
                          j += 1
                          if j == len(other_intervals): return False
