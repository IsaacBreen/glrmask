      ### `InsertWith<K, V>`

      A trait for inserting a key-value pair into a collection, with a custom function to merge the new value with an existing one if the key is already present.

      ```rust
      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }
      ```

      **Methods:**

      *   `fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F)`: Inserts `(k, v)`. If `k` already exists, `combine` is called with a mutable reference to the existing value and the new value `v`.

