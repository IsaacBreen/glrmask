      +    // CSR for child -> parents adjacency
      +    let mut offsets: Vec<usize> = Vec::with_capacity(n + 1);
      +    offsets.push(0);
      +    for i in 0..n {
      +        offsets.push(offsets[i].saturating_add(parent_count_for_child[i] as usize));
      +    }
      +    let mut parents: Vec<u32> = vec![0; offsets[n]]; // parent indices in [0, n), stored as u32 for memory
      +    let mut cursor = offsets.clone();
      +
      +    #[cfg(not(rustrover))]
      +    let it = tqdm!(all_nodes.iter(), desc = "Trie3 UltraMerge (CSR Fill)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
      +    #[cfg(rustrover)]
      +    let it = all_nodes.iter();
      +    for (u_dense, node_idx) in it.enumerate() {
      +        let g = node_idx.read(trie3_god).expect("read");
      +        let mut seen_children: HashSet<usize> = HashSet::new();
      +        for (_ek, dm) in g.children() {
