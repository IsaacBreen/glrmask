      ## 3. Graph Utilities & Statistics

      ### struct `TrieStats`

      Represents statistics about a Trie graph reachable from a set of roots.

      ```rust
      #[derive(Debug, Clone, PartialEq)]
      pub struct TrieStats {
          pub num_reachable_nodes: usize,
          pub num_reachable_edges: usize,
          pub max_depth: usize,
          pub num_roots: usize,
          pub num_leaves: usize,
          pub max_in_degree: usize,
          pub avg_in_degree: f64,
          pub max_out_degree: usize,
          pub avg_out_degree: f64,
      }
      ```

      ### struct `PrettyPrintOptions<'a, EK, EV, T>`

      Options for customizing the output of `pretty_print_with_options`.

      ```rust
      pub struct PrettyPrintOptions<'a, EK, EV, T> {
          pub show_max_depth: bool,
          pub format_node: Box<dyn Fn(Trie2Index, &T) -> Option<String> + 'a>,
          pub format_edge: Box<dyn Fn(Trie2Index, Trie2Index, &EK, &EV) -> Option<String> + 'a>,
      }
      ```

      #### Methods (Fluent Builder API)

      *   `default() -> Self`: Default options show max depth and use `Debug` for edges.
      *   `debug_nodes(self) -> Self`: Formats node values using `Debug`.
      *   `display_nodes(self) -> Self`: Formats node values using `Display`.
      *   `debug_edges(self) -> Self`: Formats edges using `Debug`.
      *   `display_edges(self) -> Self`: Formats edges using `Display`.
      *   `display_edge_keys_only(self) -> Self`
      *   `debug_edge_keys_only(self) -> Self`
      *   `display_edge_values_only(self) -> Self`
      *   `debug_edge_values_only(self) -> Self`
      *   `debug_all(self) -> Self`: Uses `Debug` for both nodes and edges.
      *   `display_all(self) -> Self`: Uses `Display` for both nodes and edges.
      *   `omit_nodes(self) -> Self`: Hides node values.
      *   `omit_edges(self) -> Self`: Hides edge information.
      *   `omit_all(self) -> Self`: Hides all custom formatting.
      *   `omit_depth(self) -> Self`: Hides the `max_depth` field.

