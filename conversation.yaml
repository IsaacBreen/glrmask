                                       .and_then(GroupID::from_json)?;
                      let width = obj.remove("width").ok_or_else(|| "Missing field width for Token".to_string())
                                       .and_then(usize::from_json)?;
                      Ok(Token { id, width })
                  }
                  _ => Err("Expected JSONNode::Object for Token".to_string()),
              }
          }
      }


      #[derive(Debug)]
