      //

      // Trivial: s -> A EOF; A -> 'a'; EOF -> '$'
      #[test]
      fn test_p_opt_trivial_a_eof() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= A EOF;
              A ::= 'a';
              EOF ::= '$';
          "#;
          let llm = ["a", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Simple choice: s -> x EOF; x -> A B_OR_C | AB
      #[test]
      fn test_p_opt_simple_choice_ab_or_ac() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= x EOF;
