          """
          tiny = dict(tiny)
          small = dict(small)
          medium = dict(medium)
          large = dict(large)
          tiny.setdefault("max_ms", max_ms_tiny)
          small.setdefault("max_ms", max_ms_small)
          medium.setdefault("max_ms", max_ms_medium)
          large.setdefault("max_ms", max_ms_large)
          return {
              "tiny": tiny,
