      }
      impl<T> ExpectElse<T> for Option<T> {
          #[inline]
          #[track_caller]
          fn expect_else<F>(self, f: F) -> T
          where
              F: FnOnce() -> String,
          {
              match self {
                  Some(v) => v,
                  None => panic!("{}", f()),
              }
          }
      }

      /// Erased user-data hooks (kept for API completeness).
      pub trait DynEq {
          fn dyn_eq(&self, other: &dyn Any) -> bool;
      }
      pub trait DynOrd {
