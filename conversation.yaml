      // Remove MergeAndIntersect trait definition

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateEdgeContent { // No longer generic
          pub state_id: StateID,
          // Removed pub t: T,
      }
      // JSONConvertible for ParseStateNodeContent (now concrete type)
      impl JSONConvertible for ParseStateEdgeContent {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("state_id".to_string(), self.state_id.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let state_id = obj.remove("state_id").ok_or_else(|| "Missing field state_id for ParseStateNodeContent".to_string())
                                        .and_then(StateID::from_json)?;
                      Ok(ParseStateEdgeContent { state_id })
                  }
                  _ => Err("Expected JSONNode::Object for ParseStateNodeContent".to_string()),
              }
          }
      }


      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseState<A: PathAccumulator> { // Generic over Accumulator A
          pub stack: Arc<GSSNode<ParseStateEdgeContent, A>>,
      }
      // No JSONConvertible for ParseState<A> directly (depends on GSSNode).

      impl<A: PathAccumulator + Default> ParseState<A> {
          pub fn new() -> Self {
              ParseState { stack: Arc::new(GSSNode::new(A::default())) }
          }
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub enum StopReason {
          ActionNotFound,
          GotoNotFound,
      }
      // Manual impl for StopReason (enum) - unchanged.
      impl JSONConvertible for StopReason {
          fn to_json(&self) -> JSONNode {
              let variant_name = match self {
                  StopReason::ActionNotFound => "ActionNotFound",
                  StopReason::GotoNotFound => "GotoNotFound",
              };
              JSONNode::String(variant_name.to_string())
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::String(s) => match s.as_str() {
                      "ActionNotFound" => Ok(StopReason::ActionNotFound),
                      "GotoNotFound" => Ok(StopReason::GotoNotFound),
                      _ => Err(format!("Unknown variant {} for StopReason", s)),
                  },
                  _ => Err("Expected JSONNode::String for StopReason".to_string()),
              }
          }
      }



      // TODO: should this *really* derive `Clone`? Users probably shouldn't clone this, should they?
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct GLRParser {
          pub stage_7_table: Stage7Table,
          pub productions: Vec<Production>,
          pub terminal_map: BiBTreeMap<Terminal, TerminalID>,
          pub non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
          pub item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
          pub start_state_id: StateID,
      }

      impl JSONConvertible for GLRParser {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("stage_7_table".to_string(), self.stage_7_table.to_json());
              obj.insert("productions".to_string(), self.productions.to_json());
              obj.insert("terminal_map".to_string(), self.terminal_map.to_json());
              obj.insert("non_terminal_map".to_string(), self.non_terminal_map.to_json());
              obj.insert("item_set_map".to_string(), self.item_set_map.to_json());
              obj.insert("start_state_id".to_string(), self.start_state_id.to_json());
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let stage_7_table = obj.remove("stage_7_table").ok_or_else(|| "Missing field stage_7_table".to_string())
                                             .and_then(Stage7Table::from_json)?;
                      let productions = obj.remove("productions").ok_or_else(|| "Missing field productions".to_string())
                                           .and_then(Vec::<Production>::from_json)?;
                      let terminal_map = obj.remove("terminal_map").ok_or_else(|| "Missing field terminal_map".to_string())
                                            .and_then(|n| BiBTreeMap::<Terminal, TerminalID>::from_json(n))?;
                      let non_terminal_map = obj.remove("non_terminal_map").ok_or_else(|| "Missing field non_terminal_map".to_string())
                                                .and_then(|n| BiBTreeMap::<NonTerminal, NonTerminalID>::from_json(n))?;
                      let item_set_map = obj.remove("item_set_map").ok_or_else(|| "Missing field item_set_map".to_string())
                                            .and_then(|n| BiBTreeMap::<BTreeSet<Item>, StateID>::from_json(n))?;
                      let start_state_id = obj.remove("start_state_id").ok_or_else(|| "Missing field start_state_id".to_string())
                                              .and_then(StateID::from_json)?;
                      Ok(GLRParser {
                          stage_7_table,
                          productions,
                          terminal_map,
                          non_terminal_map,
                          item_set_map,
                          start_state_id,
                      })
                  }
                  _ => Err("Expected JSONNode::Object for GLRParser".to_string()),
              }
          }
      }


      impl GLRParser {
          pub fn new(
              stage_7_table: Stage7Table,
              productions: Vec<Production>,
              terminal_map: BiBTreeMap<Terminal, TerminalID>,
              non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
              item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
              start_state_id: StateID,
          ) -> Self {
              Self {
                  stage_7_table,
                  productions,
                  terminal_map,
                  non_terminal_map,
                  item_set_map,
                  start_state_id,
              }
          }

          pub fn init_glr_parser<A: PathAccumulator + Default>(&self) -> GLRParserState<A> {
              self.init_glr_parser_with_acc(A::default())
          }

          pub fn init_glr_parser_with_acc<A: PathAccumulator + Default>(&self, initial_acc: A) -> GLRParserState<A> {
              let initial_parse_state = self.init_parse_state_with_acc(initial_acc);
              GLRParserState {
                  parser: self,
                  active_state: initial_parse_state,
                  action_not_found_states: ParseState::new(),
                  cycled_states: ParseState::new(),
              }
          }
          pub fn init_glr_parser_from_parse_state<A: PathAccumulator + Default>(&self, parse_state: ParseState<A>) -> GLRParserState<A> {
              GLRParserState {
                  parser: self,
                  active_state: parse_state,
                  action_not_found_states: ParseState::new(),
                  cycled_states: ParseState::new(),
              }
          }

          pub fn init_parse_state<A: PathAccumulator + Default>(&self) -> ParseState<A> {
              self.init_parse_state_with_acc(A::default())
          }

          pub fn init_parse_state_with_acc<A: PathAccumulator + Default>(&self, initial_acc: A) -> ParseState<A> {
              let initial_content = ParseStateEdgeContent {
                  state_id: self.start_state_id,
              };
              let root = Arc::new(GSSNode::new(initial_acc));
              let stack = Arc::new(root.push(initial_content));
              ParseState { stack }
          }

          pub fn parse<A: PathAccumulator + Default>(&self, input: &[TerminalID]) -> GLRParserState<A> {
              let mut state = self.init_glr_parser();
              state.parse(input);
              state
          }
      }

      impl Display for GLRParser {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              let stage_7_table = &self.stage_7_table;
              let terminal_map = &self.terminal_map;
              let non_terminal_map = &self.non_terminal_map;
              let item_set_map = &self.item_set_map;

              // Import necessary items for closure computation
              use crate::glr::items::{compute_closure, Item};
              use std::collections::BTreeSet;

              writeln!(f, "Parse Table:")?;
              writeln!(f, "  Start State: {}", self.start_state_id.0)?;
              for (&state_id, row) in stage_7_table.iter().collect::<BTreeMap<_, _>>() {
                  writeln!(f, "  State {}:", state_id.0)?;

                  // Get the core items that define this state
                  let core_item_set = item_set_map.get_by_right(&state_id).unwrap();
                  // Compute the full closure based on the core items
                  let full_closure = compute_closure(core_item_set, &self.productions);

                  // Print Core Items
                  writeln!(f, "    Core Items:")?;
                  for item in core_item_set {
                      write!(f, "      - {} ->", item.production.lhs.0)?;
                      for (i, symbol) in item.production.rhs.iter().enumerate() {
                          if i == item.dot_position {
                              write!(f, " •")?;
                          }
                          match symbol {
                              Symbol::Terminal(terminal) => write!(f, " {:?}", terminal.0),
                              Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0),
                          }?;
                      }
                      if item.dot_position == item.production.rhs.len() {
                          write!(f, " •")?;
                      }
                      writeln!(f)?;
                  }

                  // Print Closure Items (items in full_closure but not in core_item_set)
                  let closure_only_items: BTreeSet<_> = full_closure.difference(core_item_set).cloned().collect();
                  if !closure_only_items.is_empty() {
                      writeln!(f, "    Closure Items:")?;
                      for item in &closure_only_items {
                          write!(f, "      - {} ->", item.production.lhs.0)?;
                          for (i, symbol) in item.production.rhs.iter().enumerate() {
                              if i == item.dot_position {
                                  write!(f, " •")?;
                              }
                              match symbol {
                                  Symbol::Terminal(terminal) => write!(f, " {}", terminal.0),
                                  Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0),
                              }?;
                          }
                          if item.dot_position == item.production.rhs.len() {
                              write!(f, " •")?;
                          }
                          writeln!(f)?;
                      }
                  }

                  // --- Rest of the state information ---
                  writeln!(f, "    Actions:")?;
                  for (&terminal_id, action) in &row.shifts_and_reduces {
                      let terminal = terminal_map.get_by_right(&terminal_id).unwrap();
                      match action {
                          Stage7ShiftsAndReduces::Shift(next_state_id) => {
                              writeln!(f, "      - {} -> Shift {}", terminal.0, next_state_id.0)?;
                          }
                          Stage7ShiftsAndReduces::Reduce { production_id, nonterminal_id: nonterminal, len } => {
                              let nt_name = non_terminal_map.get_by_right(nonterminal).unwrap();
                              writeln!(f, "      - {} -> Reduce {} (len {})", terminal.0, nt_name.0, len)?;
                          }
                          Stage7ShiftsAndReduces::Split { shift, reduces } => {
                              writeln!(f, "      - {} -> Conflict:", terminal.0)?;
                              if let Some(shift_state) = shift {
                                  writeln!(f, "        - Shift {}", shift_state.0)?;
                              }
                              for (len, nts) in reduces {
                                  writeln!(f, "        - Reduce (len {}):", len)?;
                                  for (nt_id, prod_ids) in nts {
                                      let nt = non_terminal_map.get_by_right(nt_id).unwrap();
                                      for prod_id_val in prod_ids {
                                          let prod = self.productions.get(prod_id_val.0).unwrap();
                                          writeln!(f, "          - {} -> {}", nt.0, prod.lhs.0)?;
                                      }
                                  }

                              }
                          }
                      }
                  }

                  writeln!(f, "    Gotos:")?;
                  for (&non_terminal_id, &next_state_id) in &row.gotos {
                      let non_terminal = non_terminal_map.get_by_right(&non_terminal_id).unwrap();
                      let goto_str = match &next_state_id {
                          Goto::State(state_id) => format!("{}", state_id.0),
                          Goto::Accept => "accept".to_string(),
                      };
                      writeln!(f, "      - {} -> {}", non_terminal.0, goto_str)?;
                  }
              }

              writeln!(f, "\nTerminal Map (name to terminal ID):")?;
              for (terminal, terminal_id) in terminal_map {
                  writeln!(f, "  {} -> {}", terminal.0, terminal_id.0)?;
              }

              writeln!(f, "\nNon-Terminal Map:")?;
              for (non_terminal, non_terminal_id) in non_terminal_map {
                  writeln!(f, "  {} -> {}", non_terminal.0, non_terminal_id.0)?;
              }

              Ok(())
          }
      }

      #[derive(Debug, Clone)]
      pub struct GLRParserState<'a, A: PathAccumulator + Default> { // Generic over Accumulator A
          pub parser: &'a GLRParser,
          pub active_state: ParseState<A>,
          pub action_not_found_states: ParseState<A>,
          pub cycled_states: ParseState<A>,
      }

      impl<'a, A: PathAccumulator + Default> GLRParserState<'a, A> {
          /* -------------------------------------------------
           * Helper utilities to make `step` compact and clear
           * ------------------------------------------------- */

          /// Push a new state on `stack` and wrap it in a `ParseState`.
          fn push_state(
              &self,
              stack: &Arc<GSSNode<ParseStateEdgeContent, A>>, // This is the parent stack Arc
              next_state_id: StateID,
              // The new node's acc will be inherited from stack.acc by stack.push()
          ) -> ParseState<A> {
              let new_content = ParseStateEdgeContent { state_id: next_state_id };
              // stack.push() is GSSTrait push for Arc<GSSNode<...>>
              // It creates a new GSSNode instance whose `acc` is cloned from `stack.acc`.
              let new_gss_node_instance = stack.push(new_content);
              ParseState { stack: Arc::new(new_gss_node_instance) }
          }

          /// Pop `len` nodes, follow the goto on `nt`, and return the resulting stacks.
          fn pop_and_goto(
              &self,
              stack: &Arc<GSSNode<ParseStateEdgeContent, A>>, // Node being reduced from
              edge_content: &ParseStateEdgeContent,
              edge_src: &Arc<GSSNode<ParseStateEdgeContent, A>>, // Parent node
              len: usize,
              nt: NonTerminalID,
          ) -> Arc<GSSNode<ParseStateEdgeContent, A>> { // Returns list of new stack tops
              let cur_acc_from_reducible_node = stack.acc(); // Get it from the stack being reduced

              let parent = Arc::new(if len == 0 {
                  edge_src.push(edge_content.clone())
              } else {
                  edge_src.popn(len - 1)
              });
              // println!("Parent: {}", print_gss_forest(&[parent.clone()], usize::MAX));
              let mut out = GSSNode::new_default();
              crate::debug!(4, "Popped with {} predecessors...", parent.num_predecessors());

              for (predecessor, edge_value) in parent.pop_iter() { // parent_arc is Arc<GSSNode<ParseStateNodeContent, A>>
                  // This is ParseStateNodeContent { state_id }
                  // let goto = self.parser.stage_7_table[&edge_value.state_id].gotos[&nt];
                  // let goto = *self.parser.stage_7_table.get(&edge_value.state_id).expect(format!("State {} not found in stage_7_table", top_of_parent_value.state_id.0).as_str()).gotos.get(&nt).expect(format!("Non-terminal {} not found in gotos", nt.0).as_str());
                  let goto = self.parser.stage_7_table.get(&edge_value.state_id).map_or_else(|| Err(format!("State {} not found in stage_7_table", edge_value.state_id.0)), |row| row.gotos.get(&nt).map_or_else(|| Err(format!("Non-terminal {} not found in gotos for {:?} (processing predecessor {:p})", nt.0, edge_value.state_id, Arc::as_ptr(&predecessor))), |state_id| Ok(*state_id))).unwrap();
                  match goto {
                      Goto::State(goto_state_id) => {
                          crate::debug!(4, " ...and edge value {:?}, predecessor {:p}, goto state ID {}", edge_value.state_id, Arc::as_ptr(&predecessor), goto_state_id.0);

                          // Calculate acc for the new GOTO state's GSS node
                          // It's the parent's acc intersected with the accumulator from the node being reduced.
                          let new_acc_for_goto_child = parent.acc().clone().pop(cur_acc_from_reducible_node.clone());
                          let goto_node_content = ParseStateEdgeContent { state_id: goto_state_id };

                          // TODO: what the heck
                          let new_parent_idk = predecessor.push(edge_value.clone());

                          let mut new_gss_node_arc = new_parent_idk.push(goto_node_content);
                          // Now, explicitly set its acc to the computed intersection
                          *new_gss_node_arc.acc_mut() = new_acc_for_goto_child;

                          out.merge(&new_gss_node_arc);
                      }
                      Goto::Accept => {
                          // No action needed for Accept
                      }
                  }
              }
              // println!("{}", print_gss_forest(&[Arc::new(out.clone())], usize::MAX));
              Arc::new(out)
          }

          /// Debug helper so the main `step` body stays short.
          pub(crate) fn log_gss(&self, phase: &str, token: TerminalID) {
              const MAX: usize = 30;
              const PANIC_THRESHOLD: usize = 1000;

              let roots: Vec<_> = vec![self.active_state.stack.clone()];
              let stats = gather_gss_stats(&roots);
              crate::debug!(3, "{} - token {} ({:?}) - nodes: {:?}",
                            phase, token.0, self.parser.terminal_map.get_by_right(&token).map(|t| &t.0), stats);

              let make_msg = |print_full_forest, max_nodes_to_print| {
                  if print_full_forest {
                      format!("GSS ({} nodes):\n{}", stats.unique_nodes,
                              print_gss_forest(&roots, max_nodes_to_print))
                  } else {
                      // fall back to longest path printing
                      match find_longest_path(&self.active_state.stack) {
                          Some(p) => format!("GSS too big ({} nodes). Longest path ({}): {}",
                                             stats.unique_nodes,
                                             p.len(),
                                             p.iter().map(|(ec, n)| ec.state_id.0)
                                                  .map(|id| id.to_string())
                                                  .collect::<Vec<_>>()
                                                  .join(" → ")),
                          None => format!("GSS too big ({} nodes) – path not found", stats.unique_nodes),
                      }
                  }
              };

              if stats.unique_nodes > PANIC_THRESHOLD {
                  let msg = make_msg(true, usize::MAX);
                  panic!("GSS too big ({} nodes). {}", stats.unique_nodes, msg);
              }

              debug!(4, "{}", make_msg(stats.unique_nodes <= MAX, MAX));
          }

          pub fn parse(&mut self, input: &[TerminalID]) {
              self.parse_part(input);
          }

          pub fn parse_part(&mut self, input: &[TerminalID]) {
              for &token_id in input {
                  self.step(token_id);
              }
          }

          pub fn and_step(mut self, token_id: TerminalID) -> Self {
              self.step(token_id);
              self
          }

          pub fn and_parse(mut self, input: &[TerminalID]) -> Self {
              self.parse(input);
              self
          }

          pub fn step(&mut self, token_id: TerminalID) {
              /* ---------- logging & preparation ---------- */
              crate::debug!(4, "++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++");

              // Arc::make_mut(&mut self.active_state.stack).simplify();

              self.log_gss("Step-start", token_id);

              // Clear cycled_states at the beginning of each step, as cycle detection is per-step.
              self.cycled_states = ParseState::new();

              // Change the type of `todo` to include a BTreeSet for visited nodes in the current reduction path.
              let mut todo: Vec<(ParseState<A>, BTreeSet<Arc<GSSNode<ParseStateEdgeContent, A>>>)> = Vec::new();

              // Initial population of todo:
              // States from active_states are roots of new reduction chains. Their visited set is initially empty.
              // self.log_gss("Simplified GSS after initial step", token_id);
              todo.push((ParseState { stack: self.active_state.stack.clone() }, BTreeSet::new()));

              let mut next = ParseState::new();
              let mut not_found = ParseState::new();

              /* ---------- core loop ---------- */
              // Modify the while loop condition and variable extraction:
              while let Some((state, visited_on_this_path)) = todo.pop() { // Process states from the worklist
                  // `state` is the current ParseState. `state.stack` is the Arc<GSSNode> for its stack top.
                  // Check for cycle: if state.stack is already in visited_on_this_path for this reduction chain.
                  if visited_on_this_path.contains(&state.stack) {
                      crate::debug!(2, "Cycle detected: GSSNode at {:p} encountered again in reduction path while processing token {:?}.", Arc::as_ptr(&state.stack), token_id);
                      // The `state` (which includes state.stack, the Arc that forms the cycle point) is moved into cycled_states.
                      // self.cycled_states.insert_with(state.key(), state, |existing, new_s| existing.merge(new_s));
                      // continue; // Don't process this state further down this cyclic path.
                      // Print the tree.
                      print_gss_forest(&[state.stack.clone()], usize::MAX);
                      // Panic
                      panic!("Cycle detected: GSSNode at {:p} encountered again in reduction path.", Arc::as_ptr(&state.stack));
                  }

                  // Add state.stack to the history for paths stemming from this node.
                  // This new set will be passed to children generated by reductions.
                  let mut next_visited_on_this_path = visited_on_this_path; // Takes ownership
                  next_visited_on_this_path.insert(state.stack.clone());

                  // Use state.stack for operations.
                  let stack_arc_for_operations = &state.stack; // This is &Arc<GSSNode<...>>
                  for (parent_arc, top) in state.stack.pop_iter() {
                      let temp_idk = Arc::new(parent_arc.push(top.clone()));
                      let row = &self.parser.stage_7_table[&top.state_id];

                      match row.shifts_and_reduces.get(&token_id) {
                          /* ------ 1. plain shift ------ */
                          Some(Stage7ShiftsAndReduces::Shift(to)) => {
                              crate::debug!(4, "Shift from state {} via token {} to state {}", top.state_id.0, token_id.0, to.0);
                              // Use stack_arc_for_operations
                              let new_parse_state = self.push_state(&temp_idk, *to);
                              next.merge(new_parse_state);
                          }

                          /* ------ 2. single reduce ------ */
                          Some(Stage7ShiftsAndReduces::Reduce {
                                   nonterminal_id: nt,
                                   len, ..
                               }) => {
                              crate::debug!(4, "Reduce from state {} via token {} to nonterminal {} of length {}", top.state_id.0, token_id.0, nt.0, len);
                              // Use stack_arc_for_operations
                              let s_new_arc = self.pop_and_goto(&stack_arc_for_operations, &top, &parent_arc, *len, *nt);
                              // Add to worklist for current step, passing the cloned updated visited set.
                              todo.push((ParseState { stack: s_new_arc }, next_visited_on_this_path.clone()));
                          }

                          /* ------ 3. shift / reduce split ------ */
                          Some(Stage7ShiftsAndReduces::Split { shift, reduces }) => {
                              crate::debug!(4, "Split from state {} via token {}", top.state_id.0, token_id.0);
                              // optional shift part
                              if let Some(to) = shift {
                                  crate::debug!(4, " Shift from state {} via token {} to state {}", top.state_id.0, token_id.0, to.0);
                                  // Use stack_arc_for_operations
                                  let new_parse_state = self.push_state(&temp_idk, *to);
                                  next.merge(new_parse_state);
                              }
                              // every reduce alternative
                              for (len, nts) in reduces {
                                  crate::debug!(4, " Reduce from state {} via token {} to nonterminals {:?}", top.state_id.0, token_id.0, nts);
                                  for (nt, _prod_ids) in nts {
                                      // Use stack_arc_for_operations
                                      crate::debug!(4, "  Reducing via nonterminal {} of length {}", nt.0, len);
                                      let s_new_arc = self.pop_and_goto(&stack_arc_for_operations, &top, &parent_arc, *len, *nt);
                                      // Add to worklist for current step, passing the cloned updated visited set.
                                      todo.push((ParseState { stack: s_new_arc }, next_visited_on_this_path.clone()));
                                  }
                              }
                          }

                          /* ------ 4. no action ------ */
                          None => {
                              crate::debug!(4, "No action found for token {:?} in state {}", token_id.0, top.state_id.0);
                              // The `state` is moved into not_found.
                              // not_found.insert_with(state.key(), state, |existing, new_s| existing.merge(new_s));
                              not_found.merge(state.clone());
                          },
                      }
                  }
              }

              /* ---------- finish up ---------- */
              self.active_state = next;
              self.action_not_found_states = not_found;

              self.log_gss("Step-end", token_id);
              self.action_not_found_states = ParseState::new();        // current design: we drop them

              crate::debug!(4, "----------------------------------------------------------------");
          }

          /// Merging is handled implicitly when states are added to `next` in the `step` method via `BTreeMap::insert_with`.
          /// The `ParseState::merge` method performs the actual merge logic on the GSS stacks.
          pub fn merge_active_states(&mut self) {
              // This method is no longer necessary as merging is done on insertion.
              // crate::debug!(3, "merge_active_states called (now a no-op due to BTreeMap usage)");
          }

          pub fn merge_with(&mut self, other: GLRParserState<A>) {
              assert!(std::ptr::eq(self.parser, other.parser));
              self.active_state.merge(other.active_state);
              self.action_not_found_states.merge(other.action_not_found_states);
              self.cycled_states.merge(other.cycled_states);
          }

          pub fn is_ok(&self) -> bool {
              !self.active_state.stack.is_empty()
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
          stack_state_id: StateID,
          // Removed action_stack
      }

      impl<A: PathAccumulator + Default> ParseState<A> { // Generic over Accumulator A
          /// Merges `other` into `self`. Assumes `self.key() == other.key()`.
          /// Merges the GSS structures and combines the `acc` value at the top node using `PathAccumulator::union`.
          pub fn merge(&mut self, other: ParseState<A>) {
              Arc::make_mut(&mut self.stack).merge(&other.stack);
          }
      }

      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }

      impl<K, V> InsertWith<K, V> for BTreeMap<K, V> where K: Eq + Ord {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F) {
              match self.entry(k) {
                  std::collections::btree_map::Entry::Occupied(mut occupied) => {
                      let value = occupied.get_mut();
                      combine(value, v);
                  }
                  std::collections::btree_map::Entry::Vacant(vacant) => {
                      vacant.insert(v);
                  }
              }
          }
      }
    src/datastructures/gss.rs: |-
      use std::collections::{BTreeMap, BTreeSet, HashMap, HashSet, VecDeque};
      use std::sync::Arc;
      use std::fmt::{Debug, Write};
      use std::hash::{Hash, Hasher};
      use std::cmp::Ordering;
      use std::collections::hash_map::DefaultHasher;
      use deterministic_hash::DeterministicHasher;

      // Type aliases for cleaner signatures
      type NodeCache<T, A> = HashMap<BTreeMap<T, Arc<GSSNode<T, A>>>, Arc<GSSNode<T, A>>>;
      type NodeMap<T, A> = BTreeMap<T, Arc<GSSNode<T, A>>>;
      type NodeSet<T, A> = BTreeSet<(Arc<GSSNode<T, A>>, T)>;

      pub trait PathAccumulator: Sized + Clone + Debug + Eq + PartialEq + Ord + PartialOrd + Hash {
          fn union_assign(&mut self, other: Self);
          fn pop_assign(&mut self, right: Self);
          fn union(mut self, other: Self) -> Self {
              self.union_assign(other);
              self
          }
          fn pop(mut self, right: Self) -> Self {
              self.pop_assign(right);
              self
          }
      }

      impl PathAccumulator for () {
          fn union_assign(&mut self, _other: Self) { /* () has no state to change */ }
          fn pop_assign(&mut self, _right: Self) { /* () has no state to change */ }
      }

      fn compute_hash_key<T: Hash, A: PathAccumulator>(predecessors: &NodeMap<T, A>) -> u64 {
          let mut hasher = DeterministicHasher::new(DefaultHasher::new());
          for (edge_val, pred_arc) in predecessors {
              edge_val.hash(&mut hasher);
              pred_arc.hash_key_cache.hash(&mut hasher);
          }
          hasher.finish()
      }

      #[derive(Debug, Clone)]
      pub struct GSSNode<T, A: PathAccumulator> {
          acc: A,
          predecessors: NodeMap<T, A>,
          hash_key_cache: u64,
      }

      #[derive(Clone)]
      pub struct PathsIter<'a, T: Clone, A: PathAccumulator> {
          queue: VecDeque<(&'a GSSNode<T, A>, Vec<T>)>,
      }

      impl<'a, T: Clone, A: PathAccumulator> Iterator for PathsIter<'a, T, A> {
          type Item = Vec<T>;

          fn next(&mut self) -> Option<Self::Item> {
              while let Some((current_node, mut path_suffix)) = self.queue.pop_front() {
                  if current_node.predecessors.is_empty() {
                      path_suffix.reverse();
                      return Some(path_suffix);
                  }

                  for (edge_val, pred_arc) in &current_node.predecessors {
                      let mut new_path = path_suffix.clone();
                      new_path.push(edge_val.clone());
                      self.queue.push_back((pred_arc.as_ref(), new_path));
                  }
              }
              None
          }
      }

      fn process_predecessors<T: Ord + Hash + Clone, A: PathAccumulator + Clone >(
          incoming: &NodeSet<T, A>
      ) -> NodeMap<T, A> {
          let mut grouped: BTreeMap<T, Vec<Arc<GSSNode<T, A>>>> = BTreeMap::new();
          for (pred_arc, edge_val) in incoming {
              grouped.entry(edge_val.clone()).or_default().push(pred_arc.clone());
          }

          let mut result = NodeMap::new();
          for (edge_val, pred_arcs) in grouped {
              if pred_arcs.is_empty() { continue; }

              let mut iter = pred_arcs.into_iter();
              let first = iter.next().unwrap();

              if iter.len() == 0 {
                  result.insert(edge_val, first);
              } else {
                  let mut merged = (*first).clone();
                  for other in iter {
                      merged.merge(&other);
                  }
                  result.insert(edge_val, Arc::new(merged));
              }
          }
          result
      }

      // Basic node creation and manipulation
      impl<T: Ord + Hash + Clone, A: PathAccumulator + Clone + Default> GSSNode<T, A> {
          pub fn new(acc: A) -> Self {
              let predecessors = NodeMap::new();
              let hash_key_cache = compute_hash_key(&predecessors);
              Self { acc, predecessors, hash_key_cache }
          }

          pub fn new_default() -> Self {
              Self::new(A::default())
          }

          pub fn new_with_predecessors(predecessors_set: NodeSet<T, A>) -> Self {
              let predecessors = process_predecessors(&predecessors_set);

              let acc = if predecessors.is_empty() {
                  A::default()
              } else {
                  let mut iter = predecessors.iter();
                  let mut acc = iter.next().expect("predecessors is not empty").1.acc.clone();
                  for (_, arc) in iter {
                      acc.union_assign(arc.acc.clone());
                  }
                  acc
              };

              let hash_key_cache = compute_hash_key(&predecessors);
              Self { acc, predecessors, hash_key_cache }
          }

          fn predecessors_with_values(&self) -> impl IntoIterator<Item = (&Arc<Self>, &T)> {
              self.predecessors.iter().map(|(edge_val, pred_arc)| (pred_arc, edge_val))
          }

          fn predecessors(&self) -> &NodeMap<T, A> {
              &self.predecessors
          }

          pub fn num_predecessors(&self) -> usize {
              self.predecessors.len()
                  }

          pub fn is_empty(&self) -> bool {
              self.predecessors.is_empty()
          }

          pub fn acc(&self) -> &A {
              &self.acc
          }

          pub fn acc_mut(&mut self) -> &mut A {
              &mut self.acc
          }
      }

      // Canonicalization methods
      impl<T: Clone + Ord + Hash + Debug, A: PathAccumulator + Clone + Ord + Hash + Debug + Default> GSSNode<T, A> {
          fn get_canonical(predecessors_set: NodeSet<T, A>, cache: &mut NodeCache<T, A>) -> Arc<Self> {
              let key = process_predecessors(&predecessors_set);

              let current_acc = if key.is_empty() {
                  A::default()
              } else {
                  let mut iter = key.iter();
                  let mut acc = iter.next().expect("key is not empty").1.acc.clone();
                  for (_, arc) in iter {
                      acc.union_assign(arc.acc.clone());
                  }
                  acc
              };

              if let Some(entry) = cache.get_mut(&key) {
                  let mut new_acc = entry.acc.clone(); new_acc.union_assign(current_acc);
                  if new_acc != entry.acc {
                      let mut temp_arc = entry.clone();
                      Arc::make_mut(&mut temp_arc).acc = new_acc;
                      *entry = temp_arc.clone();
                      return temp_arc;
                  }
                  return entry.clone();
              }

              let hash_key_cache = compute_hash_key(&key);
              let new_node = Arc::new(GSSNode {
                  acc: current_acc,
                  predecessors: key.clone(),
                  hash_key_cache,
              });
              cache.insert(key, new_node.clone());
              new_node
          }

          pub fn new_canonical(initial_acc: A, cache: &mut NodeCache<T, A>) -> Arc<Self> {
              let key = NodeMap::new();

              if let Some(entry) = cache.get_mut(&key) {
                  let mut new_acc = entry.acc.clone();
                  new_acc.union_assign(initial_acc);
                  if new_acc != entry.acc {
                      let mut temp_arc = entry.clone();
                      Arc::make_mut(&mut temp_arc).acc = new_acc;
                      *entry = temp_arc.clone();
                      return temp_arc;
                  }
                  return entry.clone();
              }

              let hash_key_cache = compute_hash_key(&key);
              let new_node = Arc::new(GSSNode {
                  acc: initial_acc,
                  predecessors: key.clone(),
                  hash_key_cache,
              });
              cache.insert(key, new_node.clone());
              new_node
          }
      }

      // Core manipulation methods
      impl<T: Ord + Hash + Clone, A: PathAccumulator + Clone> GSSNode<T, A> {
          pub fn push(self, edge_value: T) -> Self where A: Default {
              let predecessors_set = NodeSet::from([(Arc::new(self), edge_value)]);
              Self::new_with_predecessors(predecessors_set)
          }

          pub fn pop_into(&self, mut result: Self) -> Self where A: Default {
              for (pred_arc, _) in self.predecessors_with_values() {
                  let mut pred_arc = pred_arc.clone();
                  Arc::make_mut(&mut pred_arc).acc_mut().pop_assign(result.acc.clone());
                  result.merge(&pred_arc);
                  result.acc_mut().pop_assign(pred_arc.acc.clone());
              }
              result
          }

          pub fn pop(&self) -> Self where A: Default {
              self.pop_into(Self::new_default())
          }

          pub fn popn(&self, n: usize) -> Self where A: Default {
              if n == 0 {
                  self.clone()
              } else {
                  self.pop().popn(n - 1)
              }
          }

          pub fn pop_iter(&self) -> Vec<(Arc<Self>, T)> {
              self.predecessors.iter().map(|(edge_val, pred_arc)| {
                  let mut new_arc = pred_arc.clone();
                  Arc::make_mut(&mut new_arc).acc = self.acc.clone().pop(new_arc.acc.clone());
                  (new_arc, edge_val.clone())
              }).collect()
          }

          fn push_down_acc(&mut self) {
              for pred_arc in self.predecessors.values_mut() {
                  Arc::make_mut(pred_arc).acc.pop_assign(self.acc.clone());
              }
          }

          pub fn merge(&mut self, other: &Self) {
              if self == other { return; }
              self.push_down_acc();
              self.acc.union_assign(other.acc.clone());

              for (other_pred, edge_val) in &other.pop_iter() {
                  match self.predecessors.entry(edge_val.clone()) {
                      std::collections::btree_map::Entry::Vacant(entry) => {
                          entry.insert(other_pred.clone());
                      }
                      std::collections::btree_map::Entry::Occupied(mut entry) => {
                          Arc::make_mut(entry.get_mut()).merge(&other_pred);
                      }
                  }
              }
              self.hash_key_cache = compute_hash_key(&self.predecessors);
          }

          pub fn merged(mut self, other: Self) -> Self {
              self.merge(&other);
              self
          }

          pub fn iter_paths(&self) -> PathsIter<'_, T, A> {
              let mut queue = VecDeque::new();
              queue.push_back((self, Vec::new()));
              PathsIter { queue }
          }

          pub fn flatten(&self) -> Vec<Vec<(T, A)>> {
              let mut results = Vec::new();
              let mut queue = VecDeque::new();
              queue.push_back((self, Vec::new()));

              while let Some((node, mut path)) = queue.pop_front() {
                  if node.predecessors.is_empty() {
                      path.reverse();
                      results.push(path);
                  } else {
                      for (edge_val, pred_arc) in &node.predecessors {
                          let mut new_path = path.clone();
                          new_path.push((edge_val.clone(), node.acc.clone()));
                          queue.push_back((pred_arc.as_ref(), new_path));
                      }
                  }
              }
              results
          }

          pub fn flatten_bulk(nodes: &[Arc<Self>]) -> Vec<Vec<(T, A)>> {
              nodes.iter().flat_map(|node| node.flatten()).collect()
          }

          pub fn map<F, U>(&self, f: F) -> GSSNode<U, A>
          where
              F: Copy + Fn(&T) -> U,
              U: Ord + Hash + Clone,
              A: Default,
          {
              let new_predecessors: NodeSet<U, A> = self.predecessors.iter()
                  .map(|(edge_val, pred_arc)| {
                      let mapped_pred = Arc::new(pred_arc.map(f));
                      let new_edge_val = f(edge_val);
                      (mapped_pred, new_edge_val)
                  })
                  .collect();

              GSSNode::<U, A>::new_with_predecessors(new_predecessors)
          }
      }

      // Trait implementations
      impl<T: Hash, A: PathAccumulator> Hash for GSSNode<T, A> {
          fn hash<H: Hasher>(&self, state: &mut H) {
              self.hash_key_cache.hash(state);
          }
      }

      impl<T: Ord + Hash + PartialEq, A: PathAccumulator + PartialEq> PartialEq for GSSNode<T, A> {
          fn eq(&self, other: &Self) -> bool {
              std::ptr::eq(self, other) || (
                  self.hash_key_cache == other.hash_key_cache &&
                  self.acc == other.acc &&
                  self.predecessors == other.predecessors
              )
          }
      }

      impl<T: Ord + Hash + Eq, A: PathAccumulator + Eq> Eq for GSSNode<T, A> {}

      impl<T: Ord + Hash + PartialOrd, A: PathAccumulator + PartialOrd> PartialOrd for GSSNode<T, A> {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              if std::ptr::eq(self, other) { return Some(Ordering::Equal); }

              self.hash_key_cache.partial_cmp(&other.hash_key_cache)
                  .and_then(|ord| match ord {
                      Ordering::Equal => self.acc.partial_cmp(&other.acc)
                          .and_then(|ord| match ord {
                              Ordering::Equal => self.predecessors.partial_cmp(&other.predecessors),
                              other => Some(other),
                          }),
                      other => Some(other),
                  })
          }
      }

      impl<T: Ord + Hash, A: PathAccumulator + Ord> Ord for GSSNode<T, A> {
          fn cmp(&self, other: &Self) -> Ordering {
              if std::ptr::eq(self, other) { return Ordering::Equal; }

              self.hash_key_cache.cmp(&other.hash_key_cache)
                  .then_with(|| self.acc.cmp(&other.acc))
                  .then_with(|| self.predecessors.cmp(&other.predecessors))
          }
      }

      impl<T, A: PathAccumulator> Drop for GSSNode<T, A> {
          fn drop(&mut self) {
              let predecessors = std::mem::take(&mut self.predecessors);
              let mut worklist: Vec<Arc<GSSNode<T, A>>> = predecessors.into_values().collect();

              while let Some(node_arc) = worklist.pop() {
                  if Arc::strong_count(&node_arc) == 1 {
                      if let Ok(mut inner_node) = Arc::try_unwrap(node_arc) {
                          let inner_preds = std::mem::take(&mut inner_node.predecessors);
                          worklist.extend(inner_preds.into_values());
                      }
                  }
              }
          }
      }

      // Simplified trait for GSS operations
      pub trait GSSTrait<T: Clone + Hash, A: PathAccumulator> {
          fn push(&self, edge_value: T) -> GSSNode<T, A> where T: Ord + Clone, A: Clone;
          fn push_to(&self, edge_value: T, dest: &mut GSSNode<T, A>) where T: Ord + Clone, A: Clone;
          fn pop(&self) -> GSSNode<T, A> where T: Ord + Clone, A: Clone;
          fn popn(&self, n: usize) -> GSSNode<T, A> where T: Ord + Clone, A: Clone;
      }

      impl<T: Clone + Ord + Hash, A: PathAccumulator + Clone + Default> GSSTrait<T, A> for GSSNode<T, A> {
          fn push(&self, edge_value: T) -> GSSNode<T, A> {
              self.clone().push(edge_value)
          }

          fn push_to(&self, edge_value: T, dest: &mut GSSNode<T, A>) {
              let new_link = GSSNode::new_with_predecessors(
                  NodeSet::from([(Arc::new(self.clone()), edge_value)])
              );
              dest.merge(&new_link);
          }

          fn pop(&self) -> GSSNode<T, A> {
              GSSNode::pop(self)
          }

          fn popn(&self, n: usize) -> GSSNode<T, A> {
              GSSNode::popn(self, n)
          }
      }

      impl<T: Clone + Ord + Hash, A: PathAccumulator + Clone + Default> GSSTrait<T, A> for Arc<GSSNode<T, A>> {
          fn push(&self, edge_value: T) -> GSSNode<T, A> {
              GSSNode::new_with_predecessors(NodeSet::from([(self.clone(), edge_value)]))
          }

          fn push_to(&self, _edge_value: T, dest: &mut GSSNode<T, A>) {
              dest.merge(&self.as_ref().clone());
              dest.acc.pop_assign(self.acc.clone());
          }

          fn pop(&self) -> GSSNode<T, A> {
              self.as_ref().pop()
          }

          fn popn(&self, n: usize) -> GSSNode<T, A> {
              self.as_ref().popn(n)
          }
      }

      impl<T: Clone + Ord + Hash, A: PathAccumulator + Clone + Default> GSSTrait<T, A> for Option<Arc<GSSNode<T, A>>> {
          fn push(&self, edge_value: T) -> GSSNode<T, A> {
              match self {
                  Some(arc) => arc.push(edge_value),
                  None => {
                      let root = Arc::new(GSSNode::new(A::default()));
                      GSSNode::new_with_predecessors(NodeSet::from([(root, edge_value)]))
                  }
              }
          }

          fn push_to(&self, edge_value: T, dest: &mut GSSNode<T, A>) {
              match self {
                  Some(arc) => arc.push_to(edge_value, dest),
                  None => {
                      let default_node = GSSNode::new(A::default());
                      dest.merge(&default_node);
                      dest.acc.pop_assign(default_node.acc.clone());
                  }
              }
          }

          fn pop(&self) -> GSSNode<T, A> {
              self.as_ref().map(|arc| arc.pop()).unwrap_or_else(GSSNode::new_default)
          }

          fn popn(&self, n: usize) -> GSSNode<T, A> {
              self.as_ref().map(|arc| arc.popn(n)).unwrap_or_else(GSSNode::new_default)
          }
      }

      impl<T: Clone + Ord + Hash, A: PathAccumulator + Clone + Default> GSSTrait<T, A> for Option<GSSNode<T, A>> {
          fn push(&self, edge_value: T) -> GSSNode<T, A> {
              match self {
                  Some(node) => node.clone().push(edge_value),
                  None => GSSNode::new(A::default()).push(edge_value),
              }
          }

          fn push_to(&self, edge_value: T, dest: &mut GSSNode<T, A>) {
              match self {
                  Some(node) => node.push_to(edge_value, dest),
                  None => GSSNode::new(A::default()).push_to(edge_value, dest),
              }
          }

          fn pop(&self) -> GSSNode<T, A> {
              self.as_ref().map(|node| node.pop()).unwrap_or_else(GSSNode::new_default)
          }

          fn popn(&self, n: usize) -> GSSNode<T, A> {
              self.as_ref().map(|node| node.popn(n)).unwrap_or_else(GSSNode::new_default)
          }
      }

      // Utility functions
      pub fn prune_and_transform_recursive_canonical<T: Clone + Ord + Hash + Debug, A: PathAccumulator + Clone + Ord + Hash + Debug + Default>(
          node_arc: &Arc<GSSNode<T, A>>,
          closure: &impl Fn(&A) -> Option<(A, bool)>,
          memo: &mut HashMap<*const GSSNode<T, A>, Option<Arc<GSSNode<T, A>>>>,
          cache: &mut NodeCache<T, A>,
      ) -> Option<Arc<GSSNode<T, A>>> {
          let node_ptr = Arc::as_ptr(node_arc);
          if let Some(cached_result) = memo.get(&node_ptr) {
              return cached_result.clone();
          }

          match closure(&node_arc.acc) {
              None => {
                  memo.insert(node_ptr, None);
                  None
              }
              Some((new_acc, continue_recursion)) => {
                  let new_predecessors_set = if continue_recursion {
                      node_arc.predecessors.iter()
                          .filter_map(|(edge_val, pred_arc)| {
                              prune_and_transform_recursive_canonical(pred_arc, closure, memo, cache)
                                  .map(|new_pred| (new_pred, edge_val.clone()))
                          })
                          .collect()
                  } else {
                      node_arc.predecessors_with_values().into_iter()
                          .map(|(pred_arc, edge_val)| (pred_arc.clone(), edge_val.clone()))
                          .collect()
                  };

                  let canonical_arc = GSSNode::get_canonical(new_predecessors_set, cache);
                  let mut temp_arc = canonical_arc.clone();
                  // Arc::make_mut(&mut temp_arc).acc.union_assign(new_acc);
                  Arc::make_mut(&mut temp_arc).acc = new_acc;

                  memo.insert(node_ptr, Some(temp_arc.clone()));
                  Some(temp_arc)
              }
          }
      }

      pub fn prune_and_transform_recursive<T: Clone + Ord + Hash + Debug, A: PathAccumulator + Clone + Ord + Hash + Debug + Default>(
          node_arc: &Arc<GSSNode<T, A>>,
          closure: &impl Fn(&A) -> Option<(A, bool)>,
          memo: &mut HashMap<*const GSSNode<T, A>, Option<Arc<GSSNode<T, A>>>>,
      ) -> Option<Arc<GSSNode<T, A>>> {
          let mut cache = NodeCache::new();
          prune_and_transform_recursive_canonical(node_arc, closure, memo, &mut cache)
      }

      pub fn find_longest_path<T: Clone + Ord + Hash, A: PathAccumulator + Default>(
          root_node: &GSSNode<T, A>
      ) -> Option<Vec<(T, Arc<GSSNode<T, A>>)>> {
          if root_node.predecessors.is_empty() {
              return None;
          }

          fn find_longest_recursive<T: Clone + Ord + Hash, A: PathAccumulator + Default>(
              node_arc: &Arc<GSSNode<T, A>>,
              memo: &mut HashMap<*const GSSNode<T, A>, Vec<(T, Arc<GSSNode<T, A>>)>>,
              visited: &mut HashSet<*const GSSNode<T, A>>,
          ) -> Vec<(T, Arc<GSSNode<T, A>>)> {
              let node_ptr = Arc::as_ptr(node_arc);

              if let Some(cached) = memo.get(&node_ptr) {
                  return cached.clone();
              }
              if !visited.insert(node_ptr) {
                  return Vec::new();
              }

              if node_arc.predecessors.is_empty() {
                  visited.remove(&node_ptr);
                  memo.insert(node_ptr, Vec::new());
                  return Vec::new();
              }

              let mut longest = Vec::new();
              for (edge_val, pred_arc) in &node_arc.predecessors {
                  let mut path = find_longest_recursive(pred_arc, memo, visited);
                  path.push((edge_val.clone(), node_arc.clone()));
                  if path.len() > longest.len() {
                      longest = path;
                  }
              }

              memo.insert(node_ptr, longest.clone());
              visited.remove(&node_ptr);
              longest
          }

          let mut memo = HashMap::new();
          let mut longest_overall = None;

          for (_, pred_arc) in root_node.predecessors() {
              let mut visited = HashSet::new();
              let path = find_longest_recursive(pred_arc, &mut memo, &mut visited);
              if longest_overall.as_ref().map_or(true, |current: &Vec<_>| path.len() > current.len()) {
                  longest_overall = Some(path);
              }
          }
          longest_overall
      }

      #[derive(Debug, Clone, Default)]
      pub struct GSSStats {
          pub num_roots: usize,
          pub unique_nodes: usize,
          pub max_depth: usize,
          pub average_depth: f64,
          pub merge_points: usize,
          pub max_predecessors_with_values: usize,
          pub average_predecessors_with_values: f64,
      }

      pub fn gather_gss_stats<T, A: PathAccumulator>(roots: &[impl AsRef<GSSNode<T, A>>]) -> GSSStats {
          let mut stats = GSSStats::default();
          stats.num_roots = roots.len();

          let mut visited = HashSet::new();
          let mut processed = HashSet::new();
          let mut queue = VecDeque::new();
          let mut total_depth = 0u64;
          let mut total_preds = 0u64;

          for root in roots {
              let node_ref = root.as_ref();
              let node_ptr = node_ref as *const GSSNode<T, A>;
              if visited.insert(node_ptr) {
                  queue.push_back((node_ref, 0));
              }
          }

          while let Some((node, depth)) = queue.pop_front() {
              let node_ptr = node as *const GSSNode<T, A>;
              if !processed.insert(node_ptr) {
                  continue;
              }

              stats.unique_nodes += 1;
              stats.max_depth = stats.max_depth.max(depth);
              total_depth += depth as u64;

              let num_preds = node.predecessors.len();
              stats.max_predecessors_with_values = stats.max_predecessors_with_values.max(num_preds);
              total_preds += num_preds as u64;

              let unique_preds: HashSet<_> = node.predecessors.values()
                  .map(|arc| Arc::as_ptr(arc))
                  .collect();
              if unique_preds.len() > 1 {
                  stats.merge_points += 1;
              }

              for (_, pred_arc) in &node.predecessors {
                  let pred_ptr = pred_arc.as_ref() as *const GSSNode<T, A>;
                  if visited.insert(pred_ptr) {
                      queue.push_back((pred_arc.as_ref(), depth + 1));
                  }
              }
          }

          if stats.unique_nodes > 0 {
              stats.average_depth = total_depth as f64 / stats.unique_nodes as f64;
              stats.average_predecessors_with_values = total_preds as f64 / stats.unique_nodes as f64;
          }
          stats
      }

      pub fn print_gss_forest<T: Debug, A: PathAccumulator>(
          roots: &[Arc<GSSNode<T, A>>], // This is &[Arc<GSSNode<T, A>>]
          max_nodes: usize
      ) -> String {
          fn print_node<T: Debug, A: PathAccumulator>(
              node_arc: &Arc<GSSNode<T, A>>,
              visited: &mut HashSet<*const GSSNode<T, A>>,
              indent: usize,
              node_count: &mut usize,
              max_nodes: usize,
              output: &mut String,
          ) -> Result<(), std::fmt::Error> {
              if *node_count >= max_nodes {
                  return Ok(());
              }

              let node_ptr = Arc::as_ptr(node_arc);
              let prefix = format!("{:indent$}", "", indent = indent * 2);

              if visited.contains(&node_ptr) {
                  writeln!(output, "{}- Node {:p} (Visited)", prefix, node_ptr)?;
                  return Ok(());
              }

              visited.insert(node_ptr);
              *node_count += 1;

              writeln!(output, "{}- Node {:p}: (Acc: {:?})", prefix, node_ptr, node_arc.acc)?;

              if !node_arc.predecessors.is_empty() {
                  writeln!(output, "{}  Predecessors:", prefix)?;
                  for (edge_val, pred_arc) in &node_arc.predecessors {
                      writeln!(output, "{}    - Edge: {:?} -> {:p}", prefix, edge_val, Arc::as_ptr(pred_arc))?;
                      if *node_count < max_nodes {
                          print_node(pred_arc, visited, indent + 2, node_count, max_nodes, output)?;
                      }
                      if *node_count >= max_nodes {
                          return Ok(());
                      }
                  }
              }
              Ok(())
          }

          let mut visited = HashSet::new();
          let mut node_count = 0;
          let mut output = String::new();

          if roots.is_empty() {
              return "GSS Forest: (No roots)".to_string();
          }

          writeln!(&mut output, "GSS Forest (Max Nodes: {}):", max_nodes).unwrap();

          for (i, root) in roots.iter().enumerate() {
              writeln!(&mut output, "Root {}: {:p}", i, Arc::as_ptr(root)).unwrap();
              if print_node(root, &mut visited, 1, &mut node_count, max_nodes, &mut output).is_err() {
                  return format!("Error writing GSS structure");
              }
              if node_count >= max_nodes && i < roots.len() - 1 {
                  writeln!(&mut output, "... (Truncated)").unwrap();
                  break;
              }
          }

          output
      }

      // Simplification methods
      fn simplify_node_recursive<T: Clone + Ord + Hash + Debug, A: PathAccumulator + Clone + Ord + Hash + Debug + Default>(
          node_arc: &Arc<GSSNode<T, A>>,
          memo: &mut HashMap<*const GSSNode<T, A>, Arc<GSSNode<T, A>>>,
          cache: &mut NodeCache<T, A>,
      ) -> Arc<GSSNode<T, A>> {
          let node_ptr = Arc::as_ptr(node_arc);
          if let Some(simplified) = memo.get(&node_ptr) {
              return simplified.clone();
          }

          let simplified_predecessors: NodeSet<T, A> = node_arc.predecessors.iter()
              .map(|(edge_val, pred_arc)| {
                  let simplified_pred = simplify_node_recursive(pred_arc, memo, cache);
                  (simplified_pred, edge_val.clone())
              })
              .collect();

          let canonical_arc = GSSNode::get_canonical(simplified_predecessors, cache);
          let mut temp_arc = canonical_arc.clone();
          Arc::make_mut(&mut temp_arc).acc = node_arc.acc.clone();

          memo.insert(node_ptr, temp_arc.clone());
          temp_arc
      }

      fn simplify_gss_forest<T: Clone + Ord + Hash + Debug, A: PathAccumulator + Clone + Ord + Hash + Debug + Default>(
          roots: &[Arc<GSSNode<T, A>>],
      ) -> Vec<Arc<GSSNode<T, A>>> {
          let mut memo = HashMap::new();
          let mut cache = NodeCache::new();

          let mut simplified: Vec<_> = roots.iter()
              .map(|root| simplify_node_recursive(root, &mut memo, &mut cache))
              .collect();

          // Deduplicate
          let mut unique_map = HashMap::new();
          for arc in &mut simplified {
              let ptr = Arc::as_ptr(arc);
              let canonical = unique_map.entry(ptr).or_insert_with(|| arc.clone());
              *arc = canonical.clone();
          }

          simplified
      }

      impl<T: Ord + Hash + Clone + Debug, A: PathAccumulator + Clone + Ord + Hash + Debug + Default> GSSNode<T, A> {
          pub fn simplify(&mut self) {
              let self_arc = Arc::new(self.clone());
              let mut memo = HashMap::new();
              let mut cache = NodeCache::new();
              let simplified = simplify_node_recursive(&self_arc, &mut memo, &mut cache);
              *self = (*simplified).clone();
          }

          pub fn simplify_recursive(
              this_arc: &mut Arc<Self>,
              memo: &mut HashMap<*const Self, Arc<Self>>,
              cache: &mut NodeCache<T, A>,
          ) {
              *this_arc = simplify_node_recursive(this_arc, memo, cache);
          }

          pub fn simplify_together(nodes: &mut [&mut Arc<Self>]) {
              let mut memo = HashMap::new();
              let mut cache = NodeCache::new();
              for node_arc in nodes {
                  **node_arc = simplify_node_recursive(*node_arc, &mut memo, &mut cache);
              }
          }
      }

