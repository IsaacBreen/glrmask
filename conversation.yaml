                                              .and_then(|n| BiBTreeMap::<Terminal, usize>::from_json(n))?;
                      let max_original_llm_token_id = obj.remove("max_original_llm_token_id").ok_or_else(|| "Missing field max_original_llm_token_id".to_string())
