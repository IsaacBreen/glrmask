      """
      GSS Benchmarks Package

      This package provides a comprehensive, deterministic benchmarking harness for
      Graph-Structured Stack (GSS) implementations that implement the interface
      defined in gss_tester.interface.GSS.

      Key features:
      - Multiple workloads that stress different aspects of a GSS (push-heavy, branching,
        pop/merge collapse, wide merges, apply/prune, and seeded fuzz-like constructions).
      - Merge-sensitivity workloads that specifically probe whether merge operations scale with
        the “surface” changes rather than the entire structure:
        - split_surface_merge: split base by top-of-stack, shallowly modify small subsets in clones, then merge.
        - clone_push_merge: push a unique marker onto many clones and merge; then pop to collapse.
      - Scaling controls to evaluate asymptotic behavior as the structure grows.
      - Timing and memory measurement using Python's standard library (time, tracemalloc).
      - Structural metrics derived from to_stacks() and optional implementation-specific
        introspection (e.g., internal node counts for LeveledGSS).
      - JSON output suitable for further analysis or visualization.

      Run:
          python -m gss_tester.benchmarks.runner --help

      Examples:
          # Quick run on bundled implementations
          python -m gss_tester.benchmarks.runner

          # Compare specific implementations with a medium preset
          python -m gss_tester.benchmarks.runner \
              --implementations gss_tester.reference_impl:ReferenceGSS gss_tester.leveled_impl:LeveledGSS \
              --preset medium \
              --output bench_results.json
      """
      ```

      ```python "python/gss_tester/benchmarks/introspect.py"
      from __future__ import annotations

      import json
      from dataclasses import dataclass, asdict
      from typing import Any, Dict, Iterable, List, Optional, Sequence, Set, Tuple, Type

      # We intentionally avoid importing LeveledGSS at import time to prevent import cycles.
      # We'll import it lazily within the introspection functions.


      @dataclass
      class LeveledNodeStats:
          # Upper-level structure
          upper_nodes: int = 0
          upper_branch_nodes: int = 0
          upper_interfaces: int = 0
          upper_edges: int = 0

          # Lower-level structure
          lower_nodes: int = 0
          lower_branch_nodes: int = 0
          lower_leaf_nodes: int = 0
          lower_edges: int = 0


      @dataclass
      class StackTrieStats:
          # Derived purely from to_stacks()
          stack_count: int
          total_elements: int
          unique_prefix_nodes: int
          edges_in_trie: int
          max_depth: int
          avg_depth: float
          avg_branching_factor: float
          # A simple “sharing” indicator: how many repeated elements were collapsed by the trie.
          # 1.0 means no sharing; closer to 0 means heavy sharing.
          sharing_ratio: float


      @dataclass
      class StructuralSummary:
          # Always available
          trie: StackTrieStats
          # Implementation-specific (optional)
          leveled: Optional[LeveledNodeStats] = None

          def to_dict(self) -> Dict[str, Any]:
              data = {"trie": asdict(self.trie)}
              if self.leveled is not None:
                  data["leveled"] = asdict(self.leveled)
              return data


      def _compute_trie_from_stacks(stacks: Sequence[Tuple[List[Any], Any]]) -> StackTrieStats:
          """
          Build a prefix trie from the explicit stacks and compute structural stats.
          This is an approximation of sharing behavior available for any implementation.
          """
          # Root node not counted in unique_prefix_nodes for readability.
          trie: Dict[Any, Dict] = {}
          unique_nodes = 0
          edges = 0
          total_elements = 0
          max_depth = 0

          # Insert paths into the trie
          for vals, _acc in stacks:
              total_elements += len(vals)
              if len(vals) > max_depth:
                  max_depth = len(vals)
              node = trie
              for v in vals:
                  if v not in node:
                      node[v] = {}
                      unique_nodes += 1
                  node = node[v]
                  edges += 1

          # Compute average depth among non-empty stacks
          stack_count = len(stacks)
          avg_depth = (total_elements / stack_count) if stack_count > 0 else 0.0

          # Compute avg branching factor across internal trie nodes.
          # We'll do a BFS to count internal nodes and sum their degrees.
          internal_nodes = 0
          degree_sum = 0
          queue: List[Dict] = [trie]
          while queue:
              cur = queue.pop()
              # A node is internal if it has children.
              if cur:
                  internal_nodes += 1
                  deg = len(cur)
                  degree_sum += deg
                  for child in cur.values():
                      queue.append(child)

          avg_bf = (degree_sum / internal_nodes) if internal_nodes > 0 else 0.0
          sharing_ratio = (unique_nodes / total_elements) if total_elements > 0 else 0.0

          return StackTrieStats(
              stack_count=stack_count,
              total_elements=total_elements,
              unique_prefix_nodes=unique_nodes,
              edges_in_trie=edges,
              max_depth=max_depth,
              avg_depth=avg_depth,
              avg_branching_factor=avg_bf,
              sharing_ratio=sharing_ratio,
          )


      def _try_introspect_leveled(gss_obj: Any) -> Optional[LeveledNodeStats]:
          """
          If the object is a LeveledGSS, traverse its internal representation and
          compute detailed node/edge counts. Returns None if not applicable.
          """
          try:
              # Lazy import to avoid circular references.
              from gss_tester.leveled_impl import LeveledGSS, Upper, UpperBranch, Interface, Lower, LowerBranch, Leaf
          except Exception:
              return None

          if not isinstance(gss_obj, LeveledGSS):
              return None

          stats = LeveledNodeStats()

          # We'll traverse both the upper-level graph (tree-like) and referenced lower-level nodes.
          visited_upper: Set[int] = set()
          visited_lower: Set[int] = set()

          def visit_upper(u: Any):
              oid = id(u)
              if oid in visited_upper:
                  return
              visited_upper.add(oid)
              stats.upper_nodes += 1

              inner = u.inner
              # Interface -> link to lower
              if isinstance(inner, Interface):
                  stats.upper_interfaces += 1
                  # Visit lower node
                  visit_lower(inner.node)
              elif isinstance(inner, UpperBranch):
                  stats.upper_branch_nodes += 1
                  # Count edges and visit children
                  for _val, kids in inner.children.items():
                      for child in kids.values():
                          stats.upper_edges += 1
                          visit_upper(child)
              else:
                  # Unknown type; safeguard
                  pass

          def visit_lower(l: Any):
              oid = id(l)
              if oid in visited_lower:
                  return
              visited_lower.add(oid)
              stats.lower_nodes += 1

              inner = l.inner
              if isinstance(inner, LowerBranch):
                  stats.lower_branch_nodes += 1
                  for _val, kids in inner.children.items():
                      for child in kids.values():
                          stats.lower_edges += 1
                          visit_lower(child)
              elif isinstance(inner, Leaf):
                  stats.lower_leaf_nodes += 1
              else:
                  # Unknown; ignore
                  pass

          visit_upper(gss_obj.inner)
          return stats


      def summarize_structure(gss_obj: Any) -> StructuralSummary:
          """
          Produce a StructuralSummary using to_stacks() and optional implementation-specific
          introspection.
          """
          try:
              stacks = gss_obj.to_stacks()
          except Exception:
              # If to_stacks fails, return a minimal summary
              stacks = []

          trie_stats = _compute_trie_from_stacks(stacks)
          leveled_stats = _try_introspect_leveled(gss_obj)
          return StructuralSummary(trie=trie_stats, leveled=leveled_stats)
      ```

      ```python "python/gss_tester/benchmarks/runner.py"
      from __future__ import annotations

      import argparse
      import importlib
      import json
      import platform
      import statistics
      import sys
      import time
      from pathlib import Path
      from typing import Any, Dict, List, Tuple, Type

      from gss_tester.interface import GSS
      from .workloads import WORKLOADS, default_specs, WorkloadResult
      from .introspect import summarize_structure


      def _load_impl(descriptor: str) -> Tuple[str, Type[GSS]]:
          """
          Load an implementation from 'module:Class' or 'module.Class'.
          Returns (pretty_name, class_obj).
          """
          if ":" in descriptor:
              module_name, class_name = descriptor.split(":", 1)
          elif "." in descriptor:
              # Split on last dot to allow dotted module paths.
              parts = descriptor.split(".")
              module_name, class_name = ".".join(parts[:-1]), parts[-1]
          else:
              raise ValueError(f"Invalid implementation descriptor: {descriptor}. Use module:Class")
          module = importlib.import_module(module_name)
          cls = getattr(module, class_name)
          pretty = f"{module_name}.{class_name}"
          return pretty, cls


      def _summarize_per_op_timings(per_op: Dict[str, List[float]]) -> Dict[str, Dict[str, float]]:
          """
          For each op, compute count, mean, median, p95, max. Times are in seconds.
          """
          summary: Dict[str, Dict[str, float]] = {}
          for op, vals in per_op.items():
              if not vals:
                  summary[op] = {"count": 0, "mean": 0.0, "median": 0.0, "p95": 0.0, "max": 0.0}
                  continue
              vals_sorted = sorted(vals)
              n = len(vals)
              p95_idx = min(n - 1, int(n * 0.95))
              summary[op] = {
                  "count": float(n),
                  "mean": float(sum(vals) / n),
                  "median": float(statistics.median(vals)),
                  "p95": float(vals_sorted[p95_idx]),
                  "max": float(vals_sorted[-1]),
              }
          return summary


      def _run_workloads_for_impl(
          impl_name: str,
          impl_class: Type[GSS],
          selected: List[str],
          specs: Dict[str, List[Dict[str, Any]]],
          repeats: int,
      ) -> Dict[str, Any]:
          """
          Execute selected workloads with given parameter specs and repeats.
          Returns a dict of results for JSON emission.
          """
          results: List[Dict[str, Any]] = []
          for wl_name in selected:
              if wl_name not in WORKLOADS:
                  print(f"Warning: workload '{wl_name}' not found. Skipping.", file=sys.stderr)
                  continue
              workload_fn = WORKLOADS[wl_name]
              param_sets = specs.get(wl_name, [{}])  # default to empty param-set if unspecified

              for params in param_sets:
                  for r in range(repeats):
                      run_label = f"{wl_name} params={params} repeat={r+1}/{repeats}"
                      print(f"[{impl_name}] Running {run_label} ...", flush=True)
                      t0 = time.perf_counter()
                      wl_result: WorkloadResult = workload_fn(impl_class, **params)
                      elapsed = time.perf_counter() - t0

                      # Structural summary derived from final state
                      summary = summarize_structure(wl_result.final_state).to_dict()

                      per_op_summary = _summarize_per_op_timings(wl_result.timings.per_op)

                      results.append({
                          "workload": wl_result.name,
                          "params": wl_result.params,
                          "repeat_index": r,
                          "operations_executed": wl_result.operations_executed,
                          "timing": {
                              "total_wall_time": elapsed,
                              "peak_mem_kib": wl_result.timings.peak_mem_kib,
                              "phases": wl_result.timings.phases,
                              "per_op_summary": per_op_summary,
                          },
                          "structure": summary,
                      })
          return {
              "implementation": impl_name,
              "results": results,
          }


      def main():
          parser = argparse.ArgumentParser(description="Benchmark GSS implementations for performance and scaling.")
          parser.add_argument(
              "--implementations",
              nargs="*",
              default=[
                  "gss_tester.reference_impl:ReferenceGSS",
                  "gss_tester.leveled_impl:LeveledGSS",
              ],
              help="List of implementations in the form module:Class. Default runs the bundled ReferenceGSS and LeveledGSS.",
          )
          parser.add_argument(
              "--workloads",
              nargs="*",
              default=list(WORKLOADS.keys()),
              help=f"Subset of workloads to run. Available: {', '.join(sorted(WORKLOADS.keys()))}",
          )
          parser.add_argument(
              "--preset",
              choices=["tiny", "small", "medium", "large"],
              default="tiny",
              help="Parameter preset for workloads: tiny, small, medium, large."
          )
          parser.add_argument(
              "--repeats",
              type=int,
              default=1,
              help="Number of times to repeat each workload-param combination.",
          )
          parser.add_argument(
              "-o", "--output",
              type=Path,
              default=Path("gss_bench_results.json"),
              help="Path to write JSON results.",
          )
          parser.add_argument(
              "--config",
              type=Path,
              default=None,
              help="Optional JSON file specifying workload parameter sets. Structure: {workload_name: [ {param: value, ...}, ... ]}",
          )
          args = parser.parse_args()

          # Resolve workload specs
          if args.config and args.config.exists():
              try:
                  specs = json.loads(args.config.read_text())
                  if not isinstance(specs, dict):
                      raise ValueError("Config must be a JSON object mapping workload -> list of param dicts")
              except Exception as e:
                  print(f"Error reading config {args.config}: {e}", file=sys.stderr)
                  sys.exit(1)
          else:
              specs = default_specs(args.preset)

          # Load implementations
          loaded_impls: List[Tuple[str, Type[GSS]]] = []
          for desc in args.implementations:
              try:
                  pretty, cls = _load_impl(desc)
                  loaded_impls.append((pretty, cls))
              except Exception as e:
                  print(f"Error loading implementation '{desc}': {e}", file=sys.stderr)

          if not loaded_impls:
              print("No valid implementations loaded. Exiting.", file=sys.stderr)
              sys.exit(1)

          # Environment info
          env = {
              "python": sys.version.split()[0],
              "platform": platform.platform(),
              "implementation": platform.python_implementation(),
          }

          all_out: Dict[str, Any] = {
              "env": env,
              "workloads_selected": args.workloads,
              "preset": args.preset,
              "timestamp": time.time(),
              "implementations": [],
          }

          for impl_name, impl_class in loaded_impls:
              impl_out = _run_workloads_for_impl(
                  impl_name=impl_name,
