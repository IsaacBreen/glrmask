      #### `pub struct Trie2Index`
      A lightweight, copyable handle to a `Trie` node in an `Arena`.

      ##### Public Methods
      *   `pub(crate) fn as_arc(&self) -> &Self`: (Likely an internal-use or legacy method).
      *   `pub fn new(index: Index) -> Self`: Creates a new `Trie2Index` from an `Index`.
      *   `pub fn as_usize(self) -> usize`: Converts the index to a `usize`.
      *   `pub fn as_index(self) -> Index`: Converts the index to the underlying `Index` type.
      *   `pub fn read<'a, ...>(&self, arena: &'a Arena<...>) -> Option<Trie2ReadGuard<'a, ...>>`: Acquires a read lock on the arena and returns a read guard for the referenced node.
      *   `pub fn write<'a, ...>(&self, arena: &'a Arena<...>) -> Option<Trie2WriteGuard<'a, ...>>`: Acquires a write lock on the arena and returns a write guard for the referenced node.
      *   `pub fn from_usize(i: usize) -> Self`: Creates a `Trie2Index` from a `usize`.
      *   `pub fn insert_edge<'a, ...>(&self, ...) -> EdgeInserter<'a, ...>`: Creates an `EdgeInserter` to fluently add an edge originating from this node.

      ##### Trait Implementations
      *   `impl Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash for Trie2Index`
      *   `impl Display for Trie2Index`
