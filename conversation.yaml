                  ("GREATEREQUAL", Expr::U8Seq(b">=".to_vec())),
                  ("ATEQUAL", Expr::U8Seq(b"@=".to_vec())),
                  ("PLUSEQUAL", Expr::U8Seq(b"+=".to_vec())),
                  ("MINEQUAL", Expr::U8Seq(b"-=".to_vec())),
