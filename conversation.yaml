                  let rustfst_dwa = self.determinize_to_dwa_with_rustfst();
                  crate::debug!(5, "[DETERMINIZE_DEBUG] Comparing custom determinization with rustfst...");
                  crate::debug!(5, "[DETERMINIZE_DEBUG] Input NWA: {}", self);
