                  ("FSTRING_END", Expr::U8Seq(b"'".to_vec())),    // Example
                  ("FSTRING_MIDDLE", rep1(Expr::U8Class(U8Set::all().difference(&U8Set::from_slice(&[b'{', b'}']))))), // Simplified
