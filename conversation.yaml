                  """Returns the intervals as a list of lists for JSON serialization."""
                  return [list(r) for r in self._bitset.to_ranges()]

              def __or__(self, other: 'RangeSet') -> 'RangeSet':
                  new_set = RangeSet()
                  new_set._bitset = self._bitset.union(other._bitset)
                  return new_set

