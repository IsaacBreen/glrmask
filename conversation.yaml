         - Additionally, make “Factor common destinations” safer by parameterizing a minimum-incoming threshold via config to avoid the blow-ups you observed (defaults to 12). The current factoring can massively increase intermediate node counts; a higher threshold targets only high-gain opportunities.

      4. Why it is correct (sketch of proof)
         - Define an LTS where nodes are trie3 states and edges carry a label (pop, T, S) where T is an LLMTokenBV and S is a StateIDBV attached to deterministic destination maps. The node label includes the “end” bit.
         - Elimination of pop=0 edges is a semantics-preserving rewrite: A −(p,T,S)→ B and B −(0,U,R)→ C are replaced by A −(p, T∧U, S∧R)→ C. This is standard ϵ-removal in automata theory with conjunction over guard masks. It does not change the accepted behaviors; it only changes representation. No 0-pop edge is introduced by the subsequent passes we add.
         - Our structural merge is a partition refinement over signatures sig(n) = (end(n), multiset of aggregated edges keyed by (pop, token-mask, class(dest)) with unioned SIDs). At a fixpoint this is the coarsest partition stable under the 1-step successor classes. By the standard coinduction argument for bisimulation on finite LTS, two states in the same final block are bisimilar, hence indistinguishable by any finite observation built by following labeled edges, and thus can be merged without changing language.
         - Our exact merge refines within coarse classes by additionally using exact aggregated SIDs (no approximation), preserving semantics by construction.
         - Termination: Each successful merge strictly decreases the number of nodes. There are finitely many nodes; hence the process terminates. The “post-pop0-elim cleanup” runs a fixed sequence of passes exactly once after each elimination, so there is no loop in pass scheduling.
         - Cycles: Bisimulation minimization is well-defined on cyclic graphs (including SCCs); the partition refinement converges just as in DFA minimization or Paige–Tarjan-style algorithms. Eliminating pop=0 edges beforehand removes 0-labeled cycles; the remaining cycles (nonzero pop) are handled normally by the refinement. The cycle checks present in your code remain unaffected.

