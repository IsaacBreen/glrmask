          def isolate_many(self, values: Iterable[Optional[T]]) -> "LeveledGSS[T, Acc]":
              values_set = set(values)

              new_empty: Optional[Acc] = None
              if None in values_set and isinstance(self.inner, (UpperBranch, Interface)):
