              final_mask: ffi.Bitset = ffi.Bitset.zeros()

              # We carry only GSS per node; the per-path LLM mask lives inside PyAcc.llm_mask
              values: Dict[int, GSS] = {}
              todo: Dict[int, Set[int]] = {}
              depth_heap: List[int] = []

              hp, hpop = heapq.heappush, heapq.heappop
