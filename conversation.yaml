      // Instruct the parser to ignore Whitespace and Comments between tokens.
      !ignore ( WS | COMMENT );

      program ::= statement_list? ;

      // Lexical Grammar: Whitespace and Comments
      WS ::= ( ' ' | '\t' | '\n' | '\r' )+ ;
      COMMENT ::= SINGLE_LINE_COMMENT | MULTI_LINE_COMMENT ;
      SINGLE_LINE_COMMENT ::= '//' ( [^\n\r] )* ;
      MULTI_LINE_COMMENT ::= '/*' ( [^*] | '*' [^/] )* '*/' ; // Non-greedy match

      // Statements
      statement_list ::= statement+ ;

      statement ::=
          block
        | declaration_statement
        | if_statement
        | iteration_statement
        | switch_statement
        | try_statement
        | function_declaration
        | return_statement
        | break_statement
        | continue_statement
        | throw_statement
        | debugger_statement
        | expression_statement
        ;

      // Note: Semicolon is optional to simulate Automatic Semicolon Insertion (ASI).
      // A real parser has complex rules for this.
      expression_statement ::= expression ';'? ;

      block ::= '{' statement_list? '}' ;

      declaration_statement ::= ( 'var' | 'let' | 'const' ) variable_declaration_list ';' ;

      variable_declaration_list ::= variable_declaration ( ',' variable_declaration )* ;

      variable_declaration ::= identifier ( '=' expression )? ;

      if_statement ::= 'if' '(' expression ')' statement ( 'else' statement )? ;

      iteration_statement ::=
          'while' '(' expression ')' statement
        | 'do' statement 'while' '(' expression ')' ';'
        | 'for' '(' ( ( 'var' | 'let' | 'const' ) variable_declaration_list )? ';' expression? ';' expression? ')' statement
        | 'for' '(' expression? ';' expression? ';' expression? ')' statement
        ;

      switch_statement ::= 'switch' '(' expression ')' '{' case_clauses? ( default_clause case_clauses? )? '}' ;
      case_clauses ::= case_clause+ ;
      case_clause ::= 'case' expression ':' statement_list? ;
      default_clause ::= 'default' ':' statement_list? ;

      try_statement ::= 'try' block ( catch_clause finally_clause? | finally_clause ) ;
      catch_clause ::= 'catch' '(' identifier ')' block ;
      finally_clause ::= 'finally' block ;

      function_declaration ::= 'function' identifier '(' parameter_list? ')' block ;

      parameter_list ::= identifier ( ',' identifier )* ;

      return_statement ::= 'return' expression? ';'? ;
      break_statement ::= 'break' identifier? ';'? ;
      continue_statement ::= 'continue' identifier? ';'? ;
      throw_statement ::= 'throw' expression ';'? ;
      debugger_statement ::= 'debugger' ';'? ;

      // Expressions (Precedence from lowest to highest)
      expression ::= assignment_expression ;

      assignment_expression ::=
          arrow_function
        | conditional_expression
        | left_hand_side_expression ( '=' | '+=' | '-=' | '*=' | '/=' | '%=' | '<<=' | '>>=' | '>>>=' | '&=' | '^=' | '|=' ) assignment_expression
        ;

      arrow_function ::= arrow_parameters '=>' ( block | expression ) ;
      arrow_parameters ::= identifier | '(' parameter_list? ')' ;

      conditional_expression ::=
          logical_or_expression ( '?' assignment_expression ':' assignment_expression )?
        ;

      logical_or_expression ::= logical_and_expression ( '||' logical_and_expression )* ;

      logical_and_expression ::= bitwise_or_expression ( '&&' bitwise_or_expression )* ;

      bitwise_or_expression ::= bitwise_xor_expression ( '|' bitwise_xor_expression )* ;

      bitwise_xor_expression ::= bitwise_and_expression ( '^' bitwise_and_expression )* ;

      bitwise_and_expression ::= equality_expression ( '&' equality_expression )* ;

      equality_expression ::= relational_expression ( ( '==' | '!=' | '===' | '!==' ) relational_expression )* ;

      relational_expression ::= shift_expression ( ( '<' | '>' | '<=' | '>=' | 'instanceof' | 'in' ) shift_expression )* ;

      shift_expression ::= additive_expression ( ( '<<' | '>>' | '>>>' ) additive_expression )* ;

      additive_expression ::= multiplicative_expression ( ( '+' | '-' ) multiplicative_expression )* ;

      multiplicative_expression ::= unary_expression ( ( '*' | '/' | '%' ) unary_expression )* ;

      unary_expression ::=
          postfix_expression
        | ( 'delete' | 'void' | 'typeof' | '++' | '--' | '+' | '-' | '~' | '!' ) unary_expression
        ;

      postfix_expression ::=
          left_hand_side_expression ( '++' | '--' )?
        ;

      left_hand_side_expression ::=
          new_expression
        | call_expression
        ;

      new_expression ::=
          member_expression
        | 'new' new_expression
        ;

      call_expression ::=
          member_expression arguments
        | call_expression arguments
        | call_expression '[' expression ']' 
        | call_expression '.' identifier
        ;

      arguments ::= '(' ( assignment_expression ( ',' assignment_expression )* )? ')' ;

      member_expression ::=
          primary_expression
        | member_expression '[' expression ']' 
        | member_expression '.' identifier
        | 'new' member_expression arguments
        ;

      primary_expression ::=
          'this' 
        | identifier
        | literal
        | array_literal
        | object_literal
        | function_expression
        | '(' expression ')'
        ;

      function_expression ::= 'function' identifier? '(' parameter_list? ')' block ;

      array_literal ::= '[' ( ELISION? assignment_expression )? ( ',' ELISION? assignment_expression )* ','? ELISION? ']' ;
      ELISION ::= ','+ ;

      object_literal ::= '{' ( property_assignment ( ',' property_assignment )* )? ','? '}' ; 
      property_assignment ::=
          property_name ':' assignment_expression
        | 'get' property_name '(' ')' block
        | 'set' property_name '(' identifier ')' block
        ;
      property_name ::= identifier | STRING_LITERAL | NUMERIC_LITERAL ;

      // Literals
      literal ::=
          NULL_LITERAL
        | BOOLEAN_LITERAL
        | NUMERIC_LITERAL
        | STRING_LITERAL
        | REGULAR_EXPRESSION_LITERAL
        | TEMPLATE_LITERAL
        ;

      NULL_LITERAL ::= 'null' ;
      BOOLEAN_LITERAL ::= 'true' | 'false' ;

      NUMERIC_LITERAL ::= HEX_LITERAL | BINARY_LITERAL | OCTAL_LITERAL | DECIMAL_LITERAL ;
      DECIMAL_LITERAL ::= DECIMAL_INTEGER_LITERAL '.' DECIMAL_DIGITS? EXPONENT_PART? | '.' DECIMAL_DIGITS EXPONENT_PART? | DECIMAL_INTEGER_LITERAL EXPONENT_PART? ;
      DECIMAL_INTEGER_LITERAL ::= '0' | NON_ZERO_DIGIT DECIMAL_DIGITS? ;
      DECIMAL_DIGITS ::= DECIMAL_DIGIT+ ;
      DECIMAL_DIGIT ::= [0-9] ;
      NON_ZERO_DIGIT ::= [1-9] ;
      EXPONENT_PART ::= ('e'|'E') ('+'|'-')? DECIMAL_DIGITS ;
      HEX_LITERAL ::= '0' ('x'|'X') HEX_DIGIT+ ;
      BINARY_LITERAL ::= '0' ('b'|'B') ('0'|'1')+ ;
      OCTAL_LITERAL ::= '0' ('o'|'O') ('0'|'1'|'2'|'3'|'4'|'5'|'6'|'7')+ ;

      STRING_LITERAL ::= '"' ( [^"\\] | ESCAPE_SEQUENCE )* '"' | '\'' ( [^'\\] | ESCAPE_SEQUENCE )* '\'' ;
      ESCAPE_SEQUENCE ::= '\\' ( [\'"\\bfnrtv] | 'x' HEX_DIGIT HEX_DIGIT | 'u' HEX_DIGIT HEX_DIGIT HEX_DIGIT HEX_DIGIT ) ;

      REGULAR_EXPRESSION_LITERAL ::= '/' REGEX_BODY '/' REGEX_FLAGS? ;
      REGEX_BODY ::= ( [^/\n\r\\] | '\\' . )+ ; // Any char except /, newline, or backslash, or any escaped char.
      REGEX_FLAGS ::= IDENTIFIER_PART+ ;

      TEMPLATE_LITERAL ::= '`' ( TEMPLATE_CHAR | TEMPLATE_SUBSTITUTION )* '`' ;
      TEMPLATE_CHAR ::= [^`\\] | '\\' . ; // Any char except backtick or backslash, or any escaped char.
      TEMPLATE_SUBSTITUTION ::= '${' expression '}' ;

      // Identifiers
      identifier ::= IDENTIFIER ;
      IDENTIFIER ::= IDENTIFIER_START IDENTIFIER_PART* ;
      IDENTIFIER_START ::= [a-zA-Z] | '$' | '_' ;
      IDENTIFIER_PART ::= IDENTIFIER_START | DECIMAL_DIGIT ;
      HEX_DIGIT ::= [0-9a-fA-F] ;
