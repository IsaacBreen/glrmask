                  parser,
                  precomputed,
                  llm_token_map, // Store the original llm_token_map (bytes -> original LLMTokenID)
                  token_name_map,
                  max_original_llm_token_id,
                  original_to_internal_id_bimap,
                  internal_max_llm_token,
