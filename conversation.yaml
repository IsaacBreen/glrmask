              // 2) Flatten NoOp layers (but never remove NoOp edges pointing to end_node)
              if compress_noop_edges(&[*start_node], end_node, god) {
                  changed = true;
                  // NoOp flattening can expose new dead ends; prune again
                  if prune_unproductive_nodes(&[*start_node], end_node, god) {
                      changed = true;
                  }
              }

              // 3) Merge structurally equivalent nodes and share across templates
              if dedup_structurally_and_share(&[*start_node], end_node, god) {
                  changed = true;
                  // Merging can strand duplicates; prune again to clean edges to dead nodes
                  if prune_unproductive_nodes(&[*start_node], end_node, god) {
                      changed = true;
