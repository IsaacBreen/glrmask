                  merge_bisimulation_max_iters: 0,
                  merge_global_atoms: false,
                  merge_global_atoms_max_iters: 0,
                  merge_global_atoms_max_atoms_per_pop: 0,
                  eliminate_pop0_except_roots: false,
                  merge_equivalent_llm_tokens: false,
                  reorder_llm_tokens: false,
                  generalize_sids: false,
                  nwa_dwa_roundtrip: false,
                  assert_no_pop0_except_roots: false,
              }
          }
      }

      /// Build a default sequence of passes from config.
      fn build_pipeline(config: &CoordinatorConfig) -> Vec<Box<dyn OptimizationPass>> {
          let mut pipeline: Vec<Box<dyn OptimizationPass>> = Vec::new();

          // The pipeline is structured to run in super-passes.
          for pass_num in 0..config.num_passes {
              // Phase 1: Pruning and initial cleanup
              if config.prune_dead_paths {
                  pipeline.push(Box::new(PruneDeadPathsPass));
              }
              if config.prune_unproductive_paths {
                  pipeline.push(Box::new(PruneUnproductivePathsPass));
              }
              if config.canonicalize_end_nodes {
                  pipeline.push(Box::new(CanonicalizeEndNodesPass));
              }

              // Phase 2: Vocabulary and State ID optimization
              if config.merge_equivalent_llm_tokens {
                  pipeline.push(Box::new(MergeEquivalentLLMTokensPass));
              }
              if config.reorder_llm_tokens {
                  pipeline.push(Box::new(ReorderLLMTokensPass));
              }
              if config.generalize_sids {
                  pipeline.push(Box::new(GeneralizeSidsPass));
              }

              // Phase 3: Factoring and structural simplification
              if config.factor_common_destinations {
                  pipeline.push(Box::new(FactorCommonDestinationsPass::new(config.factor_common_destinations_min_incoming)));
              }

              // Phase 4: Edge compression and chain contraction
              if config.compress_edges {
                  pipeline.push(Box::new(CompressEdgesPass));
              }
              if config.compress_unary_chains {
                  pipeline.push(Box::new(CompressUnaryChainsPass));
              }

              // Phase 5: Heavy-duty merging passes
              if config.merge_global_atoms && config.merge_global_atoms_max_iters > 0 {
                  pipeline.push(Box::new(MergeGlobalAtomsPass::new(
                      config.merge_global_atoms_max_iters,
                      config.merge_global_atoms_max_atoms_per_pop,
                  )));
              }
              if config.merge_structural && config.merge_structural_max_iters > 0 {
                  pipeline.push(Box::new(MergeStructuralPass::new(config.merge_structural_max_iters)));
              }
              if pass_num == config.num_passes - 1 && config.merge_bisimulation && config.merge_bisimulation_max_iters > 0 {
                  pipeline.push(Box::new(MergeBisimulationPass::new(config.merge_bisimulation_max_iters)));
              }

              // Optional weighted automata roundtrip pass (experimental)
              if config.nwa_dwa_roundtrip {
                  pipeline.push(Box::new(NwaDwaRoundtripPass));
              }
              // Phase 6: Final cleanup within the loop
              if config.eliminate_pop0_except_roots {
                  pipeline.push(Box::new(EliminatePop0ExceptRootsPass));
              }
              if config.compress_edges { // Re-compress after merges and pop0 elim
                  pipeline.push(Box::new(CompressEdgesPass));
              }
          }

          // Final polish outside the main loop
          if config.canonicalize_end_nodes {
              pipeline.push(Box::new(CanonicalizeEndNodesPass));
          }

          pipeline
      }

      /// Convert the given precompute3 trie into a MiniTrie along with a stable list of root keys.
      pub(crate) fn export_to_mini(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) -> (MiniTrie, Vec<TokenizerStateID>, HashMap<PrecomputeNode3Index, NodeId>) {
          let mut mini = MiniTrie::new();
          let mut map_old_to_new: HashMap<PrecomputeNode3Index, NodeId> = HashMap::new();

          let all_nodes = Trie::all_nodes(trie3_god, &roots.values().cloned().collect::<Vec<_>>());

          // First, create all nodes in MiniTrie and map old to new
          #[cfg(not(rustrover))]
          let it_create = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (create nodes)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_create = all_nodes.iter();
          for old_idx in it_create {
              let end = old_idx.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
              let id = mini.add_node(end);
              map_old_to_new.insert(*old_idx, id);
          }

          // Mark roots in MiniTrie
          for r_idx in roots.values() {
              if let Some(&id) = map_old_to_new.get(r_idx) {
                  mini.add_root(id);
              }
          }

          // Second, add all edges
          #[cfg(not(rustrover))]
          let it_edges = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (add edges)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_edges = all_nodes.iter();
          for old_idx in it_edges {
              let new_id = *map_old_to_new.get(&old_idx).unwrap();
              let r = if let Some(g) = old_idx.read(trie3_god) { g } else { continue };

              for (ek, dm) in r.children() {
                  // Build token set
                  let mut toks = SortedSet::new();
                  if ek.1.is_all() {
                      toks = SortedSet::from_iter(0..=max_llm_token_id);
                  } else {
                      for t in ek.1.iter() {
                          toks.insert(t);
                      }
                  }
                  if toks.is_empty() {
                      continue;
                  }
                  let key = crate::trie3_opt::core::EdgeKey::new(ek.0, toks.clone());
                  for (dst, sids) in dm {
                      let dst_id = *map_old_to_new.get(dst).unwrap();
                      // Build state set
                      let mut st = SortedSet::new();
                      if sids.is_all() {
                          st = SortedSet::from_iter(0..=max_state_id);
                      } else {
                          for s in sids.iter() {
                              st.insert(s);
                          }
                      }
                      if !st.is_empty() {
                          mini.add_edge(new_id, key.clone(), dst_id, st);
                      }
                  }
              }
          }

          let root_keys = roots.keys().cloned().collect();
          (mini, root_keys, map_old_to_new)
      }

      /// Import a MiniTrie back into the precompute3 arena by constructing a fresh graph.
      /// - All new nodes are inserted; roots remapped to these.
      /// - Old nodes become unreachable and are GC'd.
      /// - live_tokens are recomputed from outgoing edges.
      /// - end flags are set from the mini-trie.
      pub(crate) fn import_from_mini(
          mini: &MiniTrie,
          root_keys: &[TokenizerStateID],
          trie3_god: &Trie3GodWrapper,
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          ctx: &OptimizationContext,
      ) {
          // Create all nodes first, and map MiniTrie NodeId to new PrecomputeNode3Index
          let mut id_map: BTreeMap<NodeId, PrecomputeNode3Index> = BTreeMap::new();
          for node_id in mini.node_ids() {
              let idx = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())));
              id_map.insert(node_id, idx);
          }

          // Fill end flags and edges
          for node in mini.nodes() {
              let idx = *id_map.get(&node.id()).unwrap();
              if let Some(mut w) = idx.write(trie3_god) {
                  w.value.end = node.is_end();

                  let mut children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTreeMap::new();

                  for (ek, dm) in node.children().iter() {
                      // Build LLMTokenBV from tokens set
                      let mut bv = LLMTokenBV::zeros();
                      for t in ek.tokens.iter() {
                          if t <= ctx.max_llm_token_id {
                              bv.insert(t);
                          }
                      }
                      if bv.is_empty() {
                          continue;
                      }

                      let entry = children.entry((ek.pop, bv)).or_insert_with(OrderedHashMap::new);
                      for (dst, sset) in dm {
                          let mut sbv = StateIDBV::zeros();
                          for s in sset.iter() {
                              if s <= ctx.max_state_id {
                                  sbv.insert(s);
                              }
                          }
                          if sbv.is_empty() {
                              continue;
                          }
                          let dst_idx = *id_map.get(dst).unwrap();
                          entry.entry(dst_idx)
                              .and_modify(|e| *e |= &sbv)
                              .or_insert(sbv);
                      }
                  }

                  // Recompute live tokens from children
                  let mut live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &children {
                      live |= llm_bv;
                  }
                  w.value.live_tokens = live;
                  *w.children_mut() = children;
              }
          }

          // Remap roots to new nodes
          roots.clear();
          for (key, nid) in root_keys.iter().zip(mini.root_ids.iter()) {
              if let Some(idx) = id_map.get(nid) {
                  roots.insert(*key, *idx);
              }
          }

          // GC and recompute depths
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec);
      }

      /// High-level entry point: export -> run passes on mini -> import.
      /// The coordinator isolates optimization authors from the full system types: they only need
      /// to implement passes over MiniTrie and add them to the pipeline here.
      pub fn run_pipeline_on_precompute3<'a>(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          config: CoordinatorConfig,
          stage_vocab: Option<&'a mut StageVocab>,
          parser: Option<&'a GLRParser>,
      ) {
          // Export the current graph into a minimal structure
          let (mut mini, root_keys, _old_mapping) =
              export_to_mini(roots, trie3_god, max_llm_token_id, max_state_id);

          // Build a fresh pass pipeline and context
          let mut ctx = OptimizationContext::new(max_llm_token_id, max_state_id);
          if let Some(sv) = stage_vocab {
              ctx.stage_vocab = Some(Rc::new(RefCell::new(sv)));
          }
          if let Some(p) = parser {
              ctx.parser = Some(Rc::new(RefCell::new(p)));
          }
          ctx.debug_level = 1;
          ctx.assert_no_pop0_except_roots = config.assert_no_pop0_except_roots;

          // Run initial metrics
          ctx.metrics_before = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(
                  1,
                  "[Trie3 Opt] Metrics before optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_before)
              );
          }

          let pipeline = build_pipeline(&config);

          // Run passes
          for pass in pipeline.iter() {
              if ctx.debug_level > 0 {
                  crate::debug!(1, "[Trie3 Opt] Running pass: {}", pass.name());
              }
              pass.run(&mut mini, &mut ctx);

              // After certain passes that are known to create garbage, run GC.
              let pass_name = pass.name();
              if pass_name == "PruneDeadPaths"
                  || pass_name == "PruneUnproductivePaths"
                  || pass_name == "MergeStructural"
                  || pass_name == "MergeBisimulation"
                  || pass_name == "MergeGlobalAtoms"
                  || pass_name == "EliminatePop0ExceptRoots"
                  || pass_name == "CompressUnaryChains"
              {
                  let before = mini.num_nodes();
                  mini.gc();
                  let after = mini.num_nodes();
                  if before != after && ctx.debug_level > 0 {
                      crate::debug!(
                          1,
                          "[Trie3 Opt] GC after '{}': nodes {} -> {}",
                          pass.name(),
                          before,
                          after
                      );
                  }
              }

              if ctx.debug_level > 0 {
                  let metrics = run_all_metrics(&mini);
                  crate::debug!(
                      1,
                      "[Trie3 Opt] Metrics after '{}': {}",
                      pass.name(),
                      crate::trie3_opt::metrics::pretty_print_metrics_map(&metrics)
                  );
              }
          }

          // Run final metrics
          ctx.metrics_after = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(1, "[Trie3 Opt] Metrics after optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_after)
              );
          }

          // Import the result back and finalize
          import_from_mini(&mini, &root_keys, trie3_god, roots, &ctx);
      }

