              let mut compiled_steps: Vec<CompiledStep> = Vec::with_capacity(step_pool.raw.len());
              for pairs in &step_pool.raw {
                  let mut acc: HashMap<usize, Weight> = HashMap::new();
                  for (t, w) in pairs.iter() {
