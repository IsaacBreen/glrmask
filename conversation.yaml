              assert!(Vec::<u8>::from_json(invalid_json).is_err());
              let invalid_json_fract = JSONNode::Array(vec![JSONNode::Number(10.5)]);
              assert!(Vec::<u8>::from_json(invalid_json_fract).is_err());
          }
      }

