  - user: |-
      I want to replace the way we deal with 'hallucinated' or 'everything' state.
      Basically, my idea is that we can combine states.

      Combined everything states with per-step state bv filters.
      Imagine a state graph, nodes and edges are sets of states.
      Actually, represent nodes as sets of state pairs so -> sn called a *origin set* (so = origin state, sn = state now).
      We start with a set mapping every normal state to itself. If we have N states, the set is `{0->0, 1->1, ..., N->N}`.
      This initial set is the 'combined' state. It can be seen as replacing the 'everything' state we have now.

      Each transition is another origin set.
      We figure them out by first gathering all actions for all states in the current node's set.
      We'll get a big set of shift actions and a big set of reduce actions for each terminal, and a big set of gotos for each nonterminal.

      Look at the shifts.
      The set of shift actions will be a origin set.
      Consider
      - an element x->y in the origin set
      - a terminal X
      Look under state y, terminal X for a shift action. Let's say it's a shift to z.
      We add to the big set of shifts an element x->z.

      The big set of reduces is going to be map from a proper reduce action to a set of state IDs.
      Consider
      - an element x->y in the origin set
      - a terminal X
      Look under state y, terminal X for any reduce actions. Ret's say we have reduce R.
      We get the entry for R in the map, and push state x to it.

      *Notice how state x, the first element in each x->y pair, always remains fixed.*

      For gotos, it's much like shifts.
      The set of goto actions will be a origin set.
      Consider
      - an element x->y in the origin set
      - a nonterminal A
      Look under state y, nonterminal A for a goto action. Let's say it's a goto to z.
      We add to the big set of gotos an element x->z.


      As you can imagine, the resulting sets become states of their own. And eventually we'll give each of these states, currently represented by their origin set, their own state ID.
      Crucially, however, when the core of a combined state consists of an origin set that has just one unique 'now' state, ie `{so0->sn0, so1->sn1, so2->sn2, ...}` and `sn0 == sn1 == sn2 == ...`, then we don't create a new combined state; instead, we just transition to that 'now' state.

      So, we now have a bunch of new states. We just keep going until there's no more to process.
      Let's suppose we're done.
      We have a bunch of new states, each containing big shift, reduce, goto maps. Now we want to convert them to states proper.
      BUT it won't be just any state. **Each action will be associated with a state ID set - the set of origin states for which that action applies.**
      You can imagine how this is computed. A shift in the big set is a set of x->y pairs. We form a single shift from this, and that shift's state ID set will be all the x values over the pairs.


      In fact, each state can boil down to the same type as the hallucinated row:
      ```rust
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct HallucinatedRow {
          pub shifts_and_reduces: BTreeMap<TerminalID, Vec<(Stage7ShiftsAndReducesLookaheadValue, StateIDBV)>>,
          pub gotos: BTreeMap<NonTerminalID, Vec<(Goto, StateIDBV)>>,
          pub default_reduce: DefaultReduce,
      }
      ```


      Now, how do we update the parser to use this?
      Well, it's not complicated: We'll just need to know if the current state is one we're interested in. And then the rest is quite similar to handling being in the hallucinated state. ie the state bv mask will be applied.


      (Leave the hallucinated state in there for now, although it'll be unused.)
