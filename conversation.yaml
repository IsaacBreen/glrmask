      1.  **Open the file `python/gss_tester/run_benchmarks.sh`**.

      2.  In the "Argument Parsing" section, rename the `IMPLS` array to `RAW_IMPLS`. This will make it clear that these are the unprocessed arguments.

      3.  After the argument parsing `if` block, insert a new section called "Implementation Path Parsing". This new code block will loop through the `RAW_IMPLS` array, convert any file paths into the `module:Class` format, and store the results in a new `PARSED_IMPLS` array.

      4.  In the "Setup" section, update the `echo` command to print the contents of the new `PARSED_IMPLS` array.

      5.  Finally, in the "Run Benchmarks" section, update the `cmd` definition to pass the `PARSED_IMPLS` array to the `--implementations` argument.

      Here is the code block to insert after the argument parsing section:

      ```bash
      # --- Implementation Path Parsing ---
      # Convert file paths (e.g., gss_tester/leveled_impl.py) to module:class format.
      PARSED_IMPLS=()
      for impl_path in "${RAW_IMPLS[@]}"; do
          if [[ "$impl_path" == *.py ]]; then
              # Handle file path: derive module and class name by convention.
              # Module name: strip path up to 'python/', remove '.py' suffix, replace '/' with '.'
              module_name=$(echo "$impl_path" | sed -e 's#^.*python/##' -e 's/\.py$//' -e 's#/#.#g')
              # Class name: e.g., 'leveled_impl' -> 'LeveledGSS'
              base_name=$(basename "$impl_path" .py)
              class_name_base=$(echo "$base_name" | sed 's/_impl$//')
              class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
              # The benchmark runner prefers module:Class format
              PARSED_IMPLS+=("${module_name}:${class_name}")
          else
              # Assume it's already in module:Class or module.Class format
              PARSED_IMPLS+=("$impl_path")
          fi
      done
