  - user: |-
      Add a method to the parser that takes a vector of `StateID` and 'explains' it.
      The explaination should be readable and informative.
      Often, when writing a GLR parser, we get an unexpected blowup in the GSS, and we want to know why. Usually it indicates some kind of insane ambiguity. We can sample from the GSS to get a vec of parse states - a parse stack - and doing this a bunch of times gives us valuable clues to where the ambiguity (or other issue, e.g. an unexpectedly valid parse) lies.
