      fn create_expression_parser() -> GLRParser {
          // S -> E $
          // E -> E + T
          // E -> T
          // T -> T * F
          // T -> F
          // F -> ( E )
          // F -> i
          // This grammar is left-recursive (E->E+T, T->T*F) and has unit productions (E->T, T->F),
