  - assistant: |-
      To address the issue of "start" and "end" logs getting jumbled when intermediate logs occur, we can introduce a stateful mechanism. We'll add a `PENDING_INCOMPLETE_LINE` flag to track if a log line was left open (without a newline).

      Here is the plan:
      1.  **Add `PENDING_INCOMPLETE_LINE`**: A global mutex to track if we are waiting for a "Done" message on the current line.
      2.  **Update existing macros**: Modify `__debug_grouped_impl` and `__debug_line_impl` to check this flag. If they run while a line is pending, they must print a newline first to prevent appending to the previous message.
      3.  **Add `debug_start!`**: A new macro that prints a message using `print!` (no newline), sets the pending flag, and returns a token.
      4.  **Add `debug_end!`**: A new macro that takes the token. If the line is still pending, it prints `Done.` on the same line. If interrupted, it prints `... Done.` on a new line.

      ### Step-by-Step Instructions

      1.  **Edit `src/macro.rs`**:
          *   Add `pub static PENDING_INCOMPLETE_LINE: Lazy<Mutex<bool>> = Lazy::new(|| Mutex::new(false));` after `LAST_DEBUG_TIME`.
          *   In `__debug_grouped_impl`, lock `PENDING_INCOMPLETE_LINE` and check it. If true, print a newline and set it to false.
          *   In `__debug_line_impl`, do the same check.
          *   Add a new internal macro `__debug_start_impl`. It should be a copy of `__debug_grouped_impl` but:
              *   Uses `print!` instead of `println!` for the main message.
              *   Flushes stdout.
              *   Sets `PENDING_INCOMPLETE_LINE` to `true` at the end.
              *   Returns `Some(())` on success, `None` otherwise.
          *   Add `debug_start!` and `debug_end!` macros at the end of the file.

      ### Git Diff

      ```diff
