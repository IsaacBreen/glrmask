      ### `GrammarConstraintState<'a>`

      Represents the active state of the grammar constraint at a specific point in generation. It holds a collection of GLR parser states, one for each active tokenizer state.

      ```rust
      #[derive(Debug, Clone)]
      pub struct GrammarConstraintState<'a> {
          pub parent: &'a GrammarConstraint,
          pub state: BTreeMap<TokenizerStateID, GLRParserState<'a>>,
      }
      ```

      **Public Fields:**

      *   `parent: &'a GrammarConstraint`: A reference to the parent `GrammarConstraint` object containing the precomputed data.
      *   `state: BTreeMap<TokenizerStateID, GLRParserState<'a>>`: The core state, mapping each active tokenizer state ID to its corresponding GLR parser state.

      **Methods:**

      *   `pub fn get_mask(&self) -> LLMTokenBV`: Computes and returns the bitmask of allowed original LLM token IDs from the current state. This is the primary function for constraining generation. It currently calls `get_mask3`.
      *   `pub fn get_mask1(&self) -> LLMTokenBV`: Computes the mask using the Trie1 precomputation.
      *   `pub fn get_mask2(&self) -> LLMTokenBV`: Computes the mask using the Trie2 precomputation.
      *   `pub fn get_mask3(&self) -> LLMTokenBV`: Computes the mask using the Trie3 precomputation.
      *   `pub fn commit(&mut self, llm_token_id: LLMTokenID)`: Updates the state by consuming a given LLM token (specified by its original ID).
      *   `pub fn commit_bytes(&mut self, llm_token_bytes: &[u8])`: Updates the state by consuming a given LLM token (specified by its byte representation).
      *   `pub fn is_active(&self) -> bool`: Returns `true` if the constraint state is not empty (i.e., if generation has not reached a dead end).
      *   `pub fn state(&self) -> &BTreeMap<TokenizerStateID, GLRParserState<'a>>`: Returns a reference to the internal state map.
      *   `pub fn print_gss_stats(&self)`: Prints statistics about the current GSS (Graph-Structured Stack) forest.
      *   `pub fn print_gss(&self)`: Prints a textual representation of the current GSS forest.
      *   `pub fn explain_stack(&self)`: Prints a detailed, human-readable explanation of a sample path through the GSS for each active state.
      *   `pub fn num_unique_nodes(&self) -> usize`: Returns the total number of unique nodes across all GSS instances in the current state.

