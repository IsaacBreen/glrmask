                      # Step

                      # Step
                      node = self.arena.get(node_idx, {})
                      children = node.get("children") or []
                      for (pop, sid_opt), dests in children:
                          if self.debug_logging:
                              print(f"    - Edge: pop={pop}, sid_opt={sid_opt}")
                          peeks = ffi.gss_popn_collect(gss_node, int(pop))
