      use std::collections::BTreeMap;
      use std::time::Instant;

      use crate::constraint::{PrecomputeNode3Index, StageVocab, Trie3GodWrapper};
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::trie3_opt::coordinator::{run_pipeline_on_precompute3, CoordinatorConfig};
      use crate::trie3_opt::Trie3Config;

      /// High-level size optimizer for precompute3 tries. This is a legacy API that wraps the
      /// new MiniTrie-based optimization pipeline.
      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &Trie3Config,
          max_state_id: usize,
          max_llm_token_id: usize,
          stage_vocab: &mut StageVocab,
          parser: &GLRParser,
      ) {
          crate::debug!(2, "Optimizing Trie 3 size (using new pipeline)...");
          let start = Instant::now();

          // Map legacy Trie3Config to new CoordinatorConfig
          let coordinator_config = CoordinatorConfig {
              num_passes: config.num_passes,
              prune_dead_paths: config.prune_dead_paths,
              prune_unproductive_paths: config.prune_unproductive_paths,
              canonicalize_end_nodes: true, // Always good practice
              compress_edges: config.compress_edges,
              compress_unary_chains: config.compress_edges,
              factor_common_destinations: config.factor_common_destinations,
              factor_common_destinations_min_incoming: config.factor_common_destinations_min_incoming,
              merge_structural: config.merge_structural,
              merge_structural_max_iters: config.merge_structural_max_iters,
              merge_bisimulation: config.merge_bisimulation,
              merge_bisimulation_max_iters: config.merge_bisimulation_max_iters,
              merge_global_atoms: config.merge_global_atoms,
              merge_global_atoms_max_iters: config.merge_global_atoms_max_iters,
              merge_global_atoms_max_atoms_per_pop: config.merge_global_atoms_max_atoms_per_pop,
              eliminate_pop0_except_roots: config.eliminate_pop0_except_roots,
              merge_equivalent_llm_tokens: config.merge_equivalent_llm_tokens,
              reorder_llm_tokens: config.reorder_llm_tokens,
              generalize_sids: config.generalize_sids,
          };

          run_pipeline_on_precompute3(
              roots,
              trie3_god,
              max_llm_token_id,
              max_state_id,
              coordinator_config,
              Some(stage_vocab),
              Some(parser),
          );

          crate::debug!(2, "Finished optimizing Trie 3 size in {:?}", start.elapsed());
      }
    src/trie3_opt/passes/compress_edges.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Group identical destination-maps under the same pop by unioning token masks.
      /// This reduces the number of edge-keys by ensuring that, for a fixed pop,
      /// edges with identical destination semantics share a single token-set.
      pub struct CompressEdgesPass;

      impl OptimizationPass for CompressEdgesPass {
          fn name(&self) -> &'static str {
              "CompressEdges"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let n = trie.get_node(node_id).unwrap();
                  if n.children().is_empty() {
                      continue;
                  }

                  let old_children = n.children().clone();
                  // Cost metric: sum of token set sizes and destination map sizes.
                  let old_cost: usize = old_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  // Stage 1: Group by (pop, canonicalized dest-map), unioning token sets.
                  let mut by_pop: BTreeMap<isize, HashMap<Vec<(u32, SortedSet)>, SortedSet>> =
                      BTreeMap::new();
                  for (ek, dm) in &old_children {
                      if ek.tokens.is_empty() || dm.is_empty() {
                          continue;
                      }
                      let mut dest_vec: Vec<(u32, SortedSet)> =
                          dm.iter().map(|(&dst, sids)| (dst, sids.clone())).collect();
                      dest_vec.sort_unstable_by_key(|k| k.0);
                      by_pop
                          .entry(ek.pop)
                          .or_default()
                          .entry(dest_vec)
                          .or_default()
                          .union_inplace(&ek.tokens);
                  }

                  // Stage 2: For each pop, combine groups that yield identical final token sets
                  // by unioning their destination maps.
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<u32, SortedSet>> = BTreeMap::new();
                  for (pop, groups) in by_pop {
                      // tokens -> aggregated destination map
                      let mut out_by_tokens: BTreeMap<SortedSet, BTreeMap<u32, SortedSet>> =
                          BTreeMap::new();

                      for (dest_vec, tokens) in groups {
                          if tokens.is_empty() {
                              continue;
                          }
                          let dest_out = out_by_tokens.entry(tokens).or_default();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dest_out.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                      }

                      // Emit final edges for this pop
                      for (tokens, dm) in out_by_tokens {
                          if !tokens.is_empty() && !dm.is_empty() {
                              new_children.insert(EdgeKey::new(pop, tokens), dm);
                          }
                      }
                  }

                  let new_cost: usize = new_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  if new_cost < old_cost {
                      trie.set_children(node_id, new_children);
                  }
              }
          }
      }
    src/trie3_opt/passes/eliminate_pop0.rs: |
      use std::collections::{BTreeMap, BTreeSet, HashMap};

      use crate::glr::table::StateID;
      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Cycle-safe pop=0 composition (add-only).
      ///
      /// For each non-root pop=0 edge B --(0, T_bc, S_bc)--> C and each predecessor
      /// A --(p_ab, T_ab, S_ab)--> B, we add a bypass edge
      ///   A --(p_ab, T_ab ∩ T_bc, S_ab ∩ pre^{p_ab}(S_bc))--> C.
      ///
      /// We do NOT delete any pop=0 edges. We also do NOT compose a 0-parent inside the
      /// same 0-SCC as B (to avoid perturbing cycles). We iterate a few rounds so that
      /// long chains of 0-edges are effectively summarized for outside predecessors.
      /// This is semantics-preserving: every original path remains; each added edge
      /// corresponds to an existing path segment and thus admits no new tokens/states.
      pub struct EliminatePop0ExceptRootsPass;

      impl OptimizationPass for EliminatePop0ExceptRootsPass {
          fn name(&self) -> &'static str {
              "EliminatePop0ExceptRoots"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let n = trie.num_nodes();
              if n == 0 {
                  return;
              }
              let root_set: BTreeSet<NodeId> = trie.root_ids.iter().cloned().collect();

              // Build dense indices for NodeId.
              let node_ids: Vec<NodeId> = trie.node_ids().collect();
              let id_to_idx: HashMap<NodeId, usize> =
                  node_ids.iter().enumerate().map(|(i, &id)| (id, i)).collect();

              // Build adjacency over only pop=0 edges for SCC detection.
              let mut adj0: Vec<Vec<usize>> = vec![Vec::new(); node_ids.len()];
              for node in trie.nodes() {
                  let u_idx = id_to_idx[&node.id()];
                  for (ek, dm) in node.children() {
                      if ek.pop == 0 {
                          for (v, _) in dm {
                              let v_idx = id_to_idx[v];
                              adj0[u_idx].push(v_idx);
                          }
                      }
                  }
              }

              // Tarjan's algorithm to find SCCs in the 0-pop graph.
              let mut index: usize = 0;
              let mut stack: Vec<usize> = Vec::new();
              let mut onstack: Vec<bool> = vec![false; node_ids.len()];
              let mut indices: Vec<Option<usize>> = vec![None; node_ids.len()];
              let mut lowlink: Vec<usize> = vec![0; node_ids.len()];
              let mut comp_id: Vec<usize> = vec![usize::MAX; node_ids.len()];
              let mut comp_count: usize = 0;

              fn strongconnect(
                  v: usize,
                  index: &mut usize,
                  stack: &mut Vec<usize>,
                  onstack: &mut [bool],
                  indices: &mut [Option<usize>],
                  lowlink: &mut [usize],
                  comp_id: &mut [usize],
                  comp_count: &mut usize,
                  adj0: &Vec<Vec<usize>>,
              ) {
                  indices[v] = Some(*index);
                  lowlink[v] = *index;
                  *index += 1;
                  stack.push(v);
                  onstack[v] = true;

                  for &w in &adj0[v] {
                      if indices[w].is_none() {
                          strongconnect(
                              w, index, stack, onstack, indices, lowlink, comp_id, comp_count, adj0,
                          );
                          lowlink[v] = lowlink[v].min(lowlink[w]);
                      } else if onstack[w] {
                          lowlink[v] = lowlink[v].min(indices[w].unwrap());
                      }
                  }

                  if lowlink[v] == indices[v].unwrap() {
                      // Start a new component
                      loop {
                          let w = stack.pop().unwrap();
                          onstack[w] = false;
                          comp_id[w] = *comp_count;
                          if w == v {
                              break;
                          }
                      }
                      *comp_count += 1;
                  }
              }

              for v in 0..node_ids.len() {
                  if indices[v].is_none() {
                      strongconnect(
                          v,
                          &mut index,
                          &mut stack,
                          &mut onstack,
                          &mut indices,
                          &mut lowlink,
                          &mut comp_id,
                          &mut comp_count,
                          &adj0,
                      );
                  }
              }

              // Precompute 2^k state preimage maps if we need to handle p > 0.
              let mut max_pop = 0usize;
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if ek.pop > 0 {
                          max_pop = max_pop.max(ek.pop as usize);
                      }
                  }
              }
              let mut two_power_back_maps: Vec<BTreeMap<StateID, SortedSet>> = Vec::new();
              if max_pop > 0 {
                  if let Some(p_rc) = &ctx.parser {
                      let parser = p_rc.borrow();
                      let one_step_back_map = parser.build_one_step_back_map();
                      let levels = (max_pop as f64).log2().ceil() as usize + 1;
                      two_power_back_maps.push(
                          one_step_back_map
                              .into_iter()
                              .map(|(k, v)| (k, SortedSet::from_iter(v.iter())))
                              .collect(),
                      );
                      for i in 1..levels {
                          let prev = &two_power_back_maps[i - 1];
                          let mut next: BTreeMap<StateID, SortedSet> = BTreeMap::new();
                          for (&sid, preds1) in prev {
                              let mut preds2 = SortedSet::new();
                              for p1 in preds1.iter() {
                                  let s = StateID(p1);
                                  if let Some(preds_of_pred) = prev.get(&s) {
                                      preds2.union_inplace(preds_of_pred);
                                  }
                              }
                              if !preds2.is_empty() {
                                  next.insert(sid, preds2);
                              }
                          }
                          two_power_back_maps.push(next);
                      }
                  }
                  // If parser is absent, we will only compose parents with p<=0 (safe).
              }

              let apply_n_step_back = |s: &SortedSet, n_steps: usize| -> SortedSet {
                  if n_steps == 0 || two_power_back_maps.is_empty() {
                      return s.clone();
                  }
                  let mut cur = s.clone();
                  for k in 0..two_power_back_maps.len() {
                      if ((n_steps >> k) & 1) == 1 {
                          let map_k = &two_power_back_maps[k];
                          let mut nxt = SortedSet::new();
                          for sid_val in cur.iter() {
                              let sid = StateID(sid_val);
                              if let Some(preds) = map_k.get(&sid) {
                                  nxt.union_inplace(preds);
                              }
                          }
                          cur = nxt;
                      }
                  }
                  cur
              };

              // Helper to get current states for a triple (src, key, dst).
              let get_existing = |trie: &MiniTrie, src: NodeId, key: &EdgeKey, dst: NodeId| -> SortedSet {
                  if let Some(src_node) = trie.get_node(src) {
                      if let Some(dm) = src_node.children().get(key) {
                          if let Some(s) = dm.get(&dst) {
                              return s.clone();
                          }
                      }
                  }
                  SortedSet::new()
              };

              // Iterate, adding bypass edges until no more can be added or a small round budget is hit.
              let max_rounds = 8usize;
              for _round in 0..max_rounds {
                  // Collect all candidate additions for this round, unioning their SID sets per (src,key,dst).
                  let mut to_add: HashMap<(NodeId, EdgeKey, NodeId), SortedSet> = HashMap::new();

                  // Enumerate all pop=0 edges B --(0, T_bc, S_bc)--> C.
                  for b_node in trie.nodes() {
                      let b_id = b_node.id();
                      if root_set.contains(&b_id) {
                          continue; // keep root-origin 0-edges untouched
                      }
                      let b_comp = comp_id[id_to_idx[&b_id]];
                      for (ek_bc, dm_bc) in b_node.children() {
                          if ek_bc.pop != 0 {
                              continue;
                          }
                          for (c_id, s_bc) in dm_bc {
                              let t_bc = &ek_bc.tokens;
                              let s_bc_clone = s_bc.clone();

                              // For each predecessor A --(p_ab, T_ab, S_ab)--> B:
                              let preds = b_node.parents().clone(); // clone to avoid borrow issues
                              for (a_id, edges_from_a) in &preds {
                                  let a_comp = comp_id[id_to_idx[a_id]];
                                  for (key_ab, s_ab) in edges_from_a {
                                      let p_ab = key_ab.pop;
                                      let t_ab = &key_ab.tokens;

                                      // Do not modify the 0-cycle: skip a 0-parent within the same 0-SCC.
                                      if p_ab == 0 && a_comp == b_comp {
                                          continue;
                                      }

                                      // Compose tokens.
                                      let new_tokens = t_ab.intersect(t_bc);
                                      if new_tokens.is_empty() {
                                          continue;
                                      }

                                      // Compose states: S_ab ∩ pre^{p_ab}(S_bc).
                                      let p_usize = if p_ab > 0 { p_ab as usize } else { 0 };
                                      if p_usize > 0 && two_power_back_maps.is_empty() {
                                          // No parser provided: cannot soundly compute p>0 preimages; skip.
                                          continue;
                                      }
                                      let s_bc_pre = apply_n_step_back(&s_bc_clone, p_usize);
                                      if s_bc_pre.is_empty() {
                                          continue;
                                      }
                                      let new_sids = s_ab.intersect(&s_bc_pre);
                                      if new_sids.is_empty() {
                                          continue;
                                      }

                                      let new_key = EdgeKey::new(p_ab, new_tokens);
                                      // Only add the difference relative to what's already present.
                                      let existing = get_existing(trie, *a_id, &new_key, *c_id);
                                      let delta = new_sids.difference(&existing);
                                      if delta.is_empty() {
                                          continue;
                                      }
                                      let k = (*a_id, new_key, *c_id);
                                      to_add.entry(k).or_default().union_inplace(&delta);
                                  }
                              }
                          }
                      }
                  }

                  if to_add.is_empty() {
                      break; // fixed point
                  }

                  // Apply all new edges for this round.
                  for ((src, key, dst), sids) in to_add {
                      trie.add_edge(src, key, dst, sids);
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_common_destinations.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct FactorCommonDestinationsPass {
          min_incoming: usize,
      }

      impl FactorCommonDestinationsPass {
          pub fn new(min_incoming: usize) -> Self {
              Self { min_incoming }
          }
      }

      impl OptimizationPass for FactorCommonDestinationsPass {
          fn name(&self) -> &'static str {
              "FactorCommonDestinations"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              if self.min_incoming == 0 {
                  return;
              }

              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              // Map: dest -> { (pop, tokens) -> { states -> [sources] } }
              let mut incoming_map: HashMap<NodeId, HashMap<EdgeKey, HashMap<SortedSet, Vec<NodeId>>>> =
                  HashMap::new();

              for src_node in trie.nodes() {
                  for (edge_key, dest_map) in src_node.children() {
                      for (dest_id, sids) in dest_map {
                          incoming_map
                              .entry(*dest_id)
                              .or_default()
                              .entry(edge_key.clone())
                              .or_default()
                              .entry(sids.clone())
                              .or_default()
                              .push(src_node.id());
                      }
                  }
              }

              for (dest_id, edges_by_key) in incoming_map {
                  for (edge_key, sources_by_sids) in edges_by_key {
                      for (sids, sources) in sources_by_sids {
                          if sources.len() >= self.min_incoming {
                              // Create intermediate node
                              let intermediate_id = trie.add_node(false);

                              // Add edge from intermediate to original destination
                              trie.add_edge(intermediate_id, edge_key.clone(), dest_id, sids.clone());

                              // Reroute sources to point to intermediate node
                              for src_id in &sources {
                                  trie.remove_edge_dest(*src_id, &edge_key, dest_id);

                                  // Add new edge to intermediate node. Use the same token-set as the factored key
                                  // instead of "all tokens" to avoid massive token-universe expansions in the MiniTrie.
                                  // This preserves exact semantics: the original (pop, tokens)->dest is now
                                  // source --(0, tokens)--> intermediate --(pop, tokens)--> dest.
                                  let none_like_edge_key = EdgeKey::new(0, edge_key.tokens.clone());
                                  trie.add_edge(
                                      *src_id,
                                      none_like_edge_key,
                                      intermediate_id,
                                      all_states.clone(),
                                  );
                              }
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/reorder_llm_tokens.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::{context::OptimizationContext, core::{MiniTrie, SortedSet}, passes::OptimizationPass, NodeId};

      pub struct ReorderLLMTokensPass;

      impl OptimizationPass for ReorderLLMTokensPass {
          fn name(&self) -> &'static str {
              "ReorderLLMTokens"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let sv_rc = if let Some(sv_rc) = &ctx.stage_vocab {
                  sv_rc
              } else {
                  return;
              };

              let max_tok = ctx.max_llm_token_id;
              let mut freq: Vec<usize> = vec![0; max_tok + 1];
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      for t in ek.tokens.iter() {
                          if t <= max_tok {
                              freq[t] += 1;
                          }
                      }
                  }
              }

              let mut present: Vec<usize> = (0..=max_tok).filter(|&t| freq[t] > 0).collect();
              if present.is_empty() {
                  return;
              }
              present.sort_by_key(|&t| (std::cmp::Reverse(freq[t]), t));

              let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
              for (new_id, old_id) in present.iter().enumerate() {
                  old_to_new.insert(*old_id, new_id);
              }

              let remap_sorted_set = |s: &SortedSet| -> SortedSet {
                  let mut new_elems = Vec::with_capacity(s.len());
                  for elem in s.iter() {
                      new_elems.push(old_to_new.get(&elem).copied().unwrap_or(elem));
                  }
                  SortedSet::from_iter(new_elems)
              };

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = BTreeMap::new();
                  for (mut ek, dm) in node.children().clone() {
                      ek.tokens = remap_sorted_set(&ek.tokens);
                      let entry: &mut BTreeMap<NodeId, SortedSet> = new_children.entry(ek).or_default();
                      for (dst, sids) in dm {
                          entry.entry(dst).or_default().union_inplace(&sids);
                      }
                  }
                  trie.set_children(node_id, new_children);
              }

              let mut sv_ref = sv_rc.borrow_mut();
              let sv = &mut **sv_ref;

              let mut new_internal_to_original = BTreeMap::new();
              for (old_id, setv) in sv.internal_to_original.clone() {
                  if let Some(new_id) = old_to_new.get(&old_id) {
                      new_internal_to_original.insert(*new_id, setv);
                  }
              }
              sv.internal_to_original = new_internal_to_original;

              let mut new_original_to_internal = BTreeMap::new();
              for (orig, old_internal) in sv.original_to_internal.clone() {
                  if let Some(new_internal) = old_to_new.get(&old_internal) {
                      new_original_to_internal.insert(orig, *new_internal);
                  }
              }
              sv.original_to_internal = new_original_to_internal;
              sv.internal_max_llm_token = present.len().saturating_sub(1);
              ctx.max_llm_token_id = sv.internal_max_llm_token;
          }
      }
    src/trie3_opt/context.rs: |
      use std::cell::RefCell;
      use std::collections::BTreeMap;
      use std::fmt;
      use std::rc::Rc;

      use crate::constraint::StageVocab;
      use crate::glr::parser::GLRParser;

      /// Shared, immutable and mutable context passed to every optimization pass.
      /// Keeps global bounds and simple telemetry.
      #[derive(Clone)]
      pub struct OptimizationContext<'a> {
          pub max_llm_token_id: usize,
          pub max_state_id: usize,
          pub iteration_budget: usize,
          pub debug_level: u8,
          pub metrics_before: BTreeMap<String, String>,
          pub metrics_after: BTreeMap<String, String>,
          // New fields for advanced passes
          pub stage_vocab: Option<Rc<RefCell<&'a mut StageVocab>>>,
          pub parser: Option<Rc<RefCell<&'a GLRParser>>>,
      }

      impl<'a> OptimizationContext<'a> {
          pub fn new(max_llm_token_id: usize, max_state_id: usize) -> Self {
              Self {
                  max_llm_token_id,
                  max_state_id,
                  iteration_budget: 1_000_000,
                  debug_level: 1,
                  metrics_before: BTreeMap::new(),
                  metrics_after: BTreeMap::new(),
                  stage_vocab: None,
                  parser: None,
              }
          }
      }

      impl<'a> fmt::Debug for OptimizationContext<'a> {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              f.debug_struct("OptimizationContext")
                  .field("max_llm_token_id", &self.max_llm_token_id)
                  .field("max_state_id", &self.max_state_id)
                  .field("iteration_budget", &self.iteration_budget)
                  .field("debug_level", &self.debug_level)
                  .field("metrics_before", &self.metrics_before)
                  .field("metrics_after", &self.metrics_after)
                  .field("stage_vocab_present", &self.stage_vocab.is_some())
                  .field("parser_present", &self.parser.is_some())
                  .finish()
          }
      }
    src/trie3_opt/coordinator.rs: |
      use std::cell::RefCell;
      use std::collections::{BTreeMap, HashMap};
      use std::rc::Rc;
      use std::env;

      use ordered_hash_map::OrderedHashMap;
      use kdam::BarExt;
      use once_cell::sync::Lazy;
      use serde::Deserialize;

      use crate::profiler::PROGRESS_BAR_ENABLED;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::metrics::run_all_metrics;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::*;

      use crate::constraint::{
          PrecomputeNode3Index, PrecomputedNodeContents, Trie3GodWrapper, LLMTokenBV, StateIDBV,
      };
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::constraint::StageVocab;
      use crate::trie3_opt::merge_global_atoms::MergeGlobalAtomsPass;

      /// Configuration for the coordinator: which passes to run and their key parameters.
      #[derive(Clone, Debug, Deserialize)]
      pub struct CoordinatorConfig {
          pub num_passes: usize,
          pub prune_dead_paths: bool,
          pub prune_unproductive_paths: bool,
          pub canonicalize_end_nodes: bool,
          pub compress_edges: bool,
          pub compress_unary_chains: bool,
          pub factor_common_destinations: bool,
          pub factor_common_destinations_min_incoming: usize,
          pub merge_structural: bool,
          pub merge_structural_max_iters: usize,
          pub merge_bisimulation: bool,
          pub merge_bisimulation_max_iters: usize,
          pub merge_global_atoms: bool,
          pub merge_global_atoms_max_iters: usize,
          pub merge_global_atoms_max_atoms_per_pop: usize,
          pub eliminate_pop0_except_roots: bool,
          pub merge_equivalent_llm_tokens: bool,
          pub reorder_llm_tokens: bool,
          pub generalize_sids: bool,
      }

      fn get_default_config_impl() -> CoordinatorConfig {
          CoordinatorConfig {
              num_passes: 3,
              prune_dead_paths: true,
              prune_unproductive_paths: true,
              canonicalize_end_nodes: true,
              compress_edges: true,
              compress_unary_chains: true,
              factor_common_destinations: true,
              factor_common_destinations_min_incoming: 12,
              merge_structural: true,
              merge_structural_max_iters: 4,
              merge_bisimulation: true,
              merge_bisimulation_max_iters: 1000,
              merge_global_atoms: true,
              merge_global_atoms_max_iters: 2,
              merge_global_atoms_max_atoms_per_pop: 4096,
              eliminate_pop0_except_roots: true,
              merge_equivalent_llm_tokens: true,
              reorder_llm_tokens: true,
              generalize_sids: true,
          }
      }

      static EFFECTIVE_CONFIG: Lazy<CoordinatorConfig> = Lazy::new(|| {
          let mut config = get_default_config_impl();
          if let Ok(json_str) = env::var("AICI_TRIE3_CONFIG") {
              if json_str.is_empty() {
                  return config;
              }
              match serde_json::from_str::<serde_json::Value>(&json_str) {
                  Ok(val) => {
                      if let serde_json::Value::Object(map) = val {
                          macro_rules! override_field {
                              ($field:ident, $type:ty, $as_fn:ident) => {
                                  if let Some(v) = map.get(stringify!($field)).and_then(|v| v.$as_fn()) {
                                      config.$field = v as $type;
                                  }
                              };
                              ($field:ident, $as_fn:ident) => {
                                  if let Some(v) = map.get(stringify!($field)).and_then(|v| v.$as_fn()) {
                                      config.$field = v;
                                  }
                              };
                          }
                          override_field!(num_passes, usize, as_u64);
                          override_field!(prune_dead_paths, as_bool);
                          override_field!(prune_unproductive_paths, as_bool);
                          override_field!(canonicalize_end_nodes, as_bool);
                          override_field!(compress_edges, as_bool);
                          override_field!(compress_unary_chains, as_bool);
                          override_field!(factor_common_destinations, as_bool);
                          override_field!(factor_common_destinations_min_incoming, usize, as_u64);
                          override_field!(merge_structural, as_bool);
                          override_field!(merge_structural_max_iters, usize, as_u64);
                          override_field!(merge_bisimulation, as_bool);
                          override_field!(merge_bisimulation_max_iters, usize, as_u64);
                          override_field!(merge_global_atoms, as_bool);
                          override_field!(merge_global_atoms_max_iters, usize, as_u64);
                          override_field!(merge_global_atoms_max_atoms_per_pop, usize, as_u64);
                          override_field!(eliminate_pop0_except_roots, as_bool);
                          override_field!(merge_equivalent_llm_tokens, as_bool);
                          override_field!(reorder_llm_tokens, as_bool);
                          override_field!(generalize_sids, as_bool);
                      } else {
                          eprintln!("[Trie3 Opt] WARNING: AICI_TRIE3_CONFIG is not a JSON object. Using default config.");
                      }
                  }
                  Err(e) => {
                      eprintln!("[Trie3 Opt] WARNING: Failed to parse AICI_TRIE3_CONFIG: {}. Using default config.", e);
                  }
              }
          }
          config
      });

      impl Default for CoordinatorConfig {
          fn default() -> Self {
              EFFECTIVE_CONFIG.clone()
          }
      }

      impl CoordinatorConfig {
          pub fn off() -> Self {
              Self {
                  num_passes: 0,
                  prune_dead_paths: false,
                  prune_unproductive_paths: false,
                  canonicalize_end_nodes: false,
                  compress_edges: false,
                  compress_unary_chains: false,
                  factor_common_destinations: false,
                  factor_common_destinations_min_incoming: 0,
                  merge_structural: false,
                  merge_structural_max_iters: 0,
                  merge_bisimulation: false,
                  merge_bisimulation_max_iters: 0,
                  merge_global_atoms: false,
                  merge_global_atoms_max_iters: 0,
                  merge_global_atoms_max_atoms_per_pop: 0,
                  eliminate_pop0_except_roots: false,
                  merge_equivalent_llm_tokens: false,
                  reorder_llm_tokens: false,
                  generalize_sids: false,
              }
          }
      }

      /// Build a default sequence of passes from config.
      fn build_pipeline(config: &CoordinatorConfig) -> Vec<Box<dyn OptimizationPass>> {
          let mut pipeline: Vec<Box<dyn OptimizationPass>> = Vec::new();

          // The pipeline is structured to run in super-passes.
          for pass_num in 0..config.num_passes {
              // Phase 1: Pruning and initial cleanup
              if config.prune_dead_paths {
                  pipeline.push(Box::new(PruneDeadPathsPass));
              }
              if config.prune_unproductive_paths {
                  pipeline.push(Box::new(PruneUnproductivePathsPass));
              }
              if config.canonicalize_end_nodes {
                  pipeline.push(Box::new(CanonicalizeEndNodesPass));
              }

              // Phase 2: Vocabulary and State ID optimization
              if config.merge_equivalent_llm_tokens {
                  pipeline.push(Box::new(MergeEquivalentLLMTokensPass));
              }
              if config.reorder_llm_tokens {
                  pipeline.push(Box::new(ReorderLLMTokensPass));
              }
              if config.generalize_sids {
                  pipeline.push(Box::new(GeneralizeSidsPass));
              }

              // Phase 3: Factoring and structural simplification
              if config.factor_common_destinations {
                  pipeline.push(Box::new(FactorCommonDestinationsPass::new(config.factor_common_destinations_min_incoming)));
              }

              // Phase 4: Edge compression and chain contraction
              if config.compress_edges {
                  pipeline.push(Box::new(CompressEdgesPass));
              }
              if config.compress_unary_chains {
                  pipeline.push(Box::new(CompressUnaryChainsPass));
              }

              // Phase 5: Heavy-duty merging passes
              if config.merge_global_atoms && config.merge_global_atoms_max_iters > 0 {
                  pipeline.push(Box::new(MergeGlobalAtomsPass::new(
                      config.merge_global_atoms_max_iters,
                      config.merge_global_atoms_max_atoms_per_pop,
                  )));
              }
              if config.merge_structural && config.merge_structural_max_iters > 0 {
                  pipeline.push(Box::new(MergeStructuralPass::new(config.merge_structural_max_iters)));
              }
              if pass_num == config.num_passes - 1 && config.merge_bisimulation && config.merge_bisimulation_max_iters > 0 {
                   pipeline.push(Box::new(MergeBisimulationPass::new(config.merge_bisimulation_max_iters)));
              }

              // Phase 6: Final cleanup within the loop
              if config.eliminate_pop0_except_roots {
                  pipeline.push(Box::new(EliminatePop0ExceptRootsPass));
              }
              if config.compress_edges { // Re-compress after merges and pop0 elim
                  pipeline.push(Box::new(CompressEdgesPass));
              }
          }

          // Final polish outside the main loop
          if config.canonicalize_end_nodes {
              pipeline.push(Box::new(CanonicalizeEndNodesPass));
          }

          pipeline
      }

      /// Convert the given precompute3 trie into a MiniTrie along with a stable list of root keys.
      pub(crate) fn export_to_mini(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) -> (MiniTrie, Vec<TokenizerStateID>, HashMap<PrecomputeNode3Index, NodeId>) {
          let mut mini = MiniTrie::new();
          let mut map_old_to_new: HashMap<PrecomputeNode3Index, NodeId> = HashMap::new();

          let all_nodes = Trie::all_nodes(trie3_god, &roots.values().cloned().collect::<Vec<_>>());

          // First, create all nodes in MiniTrie and map old to new
          #[cfg(not(rustrover))]
          let it_create = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (create nodes)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_create = all_nodes.iter();
          for old_idx in it_create {
              let end = old_idx.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
              let id = mini.add_node(end);
              map_old_to_new.insert(*old_idx, id);
          }

          // Mark roots in MiniTrie
          for r_idx in roots.values() {
              if let Some(&id) = map_old_to_new.get(r_idx) {
                  mini.add_root(id);
              }
          }

          // Second, add all edges
          #[cfg(not(rustrover))]
          let it_edges = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (add edges)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_edges = all_nodes.iter();
          for old_idx in it_edges {
              let new_id = *map_old_to_new.get(&old_idx).unwrap();
              let r = if let Some(g) = old_idx.read(trie3_god) { g } else { continue };

              for (ek, dm) in r.children() {
                  // Build token set
                  let mut toks = SortedSet::new();
                  if ek.1.is_all() {
                      toks = SortedSet::from_iter(0..=max_llm_token_id);
                  } else {
                      for t in ek.1.iter() {
                          toks.insert(t);
                      }
                  }
                  if toks.is_empty() {
                      continue;
                  }
                  let key = crate::trie3_opt::core::EdgeKey::new(ek.0, toks.clone());
                  for (dst, sids) in dm {
                      let dst_id = *map_old_to_new.get(dst).unwrap();
                      // Build state set
                      let mut st = SortedSet::new();
                      if sids.is_all() {
                          st = SortedSet::from_iter(0..=max_state_id);
                      } else {
                          for s in sids.iter() {
                              st.insert(s);
                          }
                      }
                      if !st.is_empty() {
                          mini.add_edge(new_id, key.clone(), dst_id, st);
                      }
                  }
              }
          }

          let root_keys = roots.keys().cloned().collect();
          (mini, root_keys, map_old_to_new)
      }

      /// Import a MiniTrie back into the precompute3 arena by constructing a fresh graph.
      /// - All new nodes are inserted; roots remapped to these.
      /// - Old nodes become unreachable and are GC'd.
      /// - live_tokens are recomputed from outgoing edges.
      /// - end flags are set from the mini-trie.
      pub(crate) fn import_from_mini(
          mini: &MiniTrie,
          root_keys: &[TokenizerStateID],
          trie3_god: &Trie3GodWrapper,
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          ctx: &OptimizationContext,
      ) {
          // Create all nodes first, and map MiniTrie NodeId to new PrecomputeNode3Index
          let mut id_map: BTreeMap<NodeId, PrecomputeNode3Index> = BTreeMap::new();
          for node_id in mini.node_ids() {
              let idx = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())));
              id_map.insert(node_id, idx);
          }

          // Fill end flags and edges
          for node in mini.nodes() {
              let idx = *id_map.get(&node.id()).unwrap();
              if let Some(mut w) = idx.write(trie3_god) {
                  w.value.end = node.is_end();

                  let mut children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTreeMap::new();

                  for (ek, dm) in node.children().iter() {
                      // Build LLMTokenBV from tokens set
                      let mut bv = LLMTokenBV::zeros();
                      for t in ek.tokens.iter() {
                          if t <= ctx.max_llm_token_id {
                              bv.insert(t);
                          }
                      }
                      if bv.is_empty() {
                          continue;
                      }

                      let entry = children.entry((ek.pop, bv)).or_insert_with(OrderedHashMap::new);
                      for (dst, sset) in dm {
                          let mut sbv = StateIDBV::zeros();
                          for s in sset.iter() {
                              if s <= ctx.max_state_id {
                                  sbv.insert(s);
                              }
                          }
                          if sbv.is_empty() {
                              continue;
                          }
                          let dst_idx = *id_map.get(dst).unwrap();
                          entry.entry(dst_idx)
                              .and_modify(|e| *e |= &sbv)
                              .or_insert(sbv);
                      }
                  }

                  // Recompute live tokens from children
                  let mut live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &children {
                      live |= llm_bv;
                  }
                  w.value.live_tokens = live;
                  *w.children_mut() = children;
              }
          }

          // Remap roots to new nodes
          roots.clear();
          for (key, nid) in root_keys.iter().zip(mini.root_ids.iter()) {
              if let Some(idx) = id_map.get(nid) {
                  roots.insert(*key, *idx);
              }
          }

          // GC and recompute depths
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec);
      }

      /// High-level entry point: export -> run passes on mini -> import.
      /// The coordinator isolates optimization authors from the full system types: they only need
      /// to implement passes over MiniTrie and add them to the pipeline here.
      pub fn run_pipeline_on_precompute3<'a>(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          config: CoordinatorConfig,
          stage_vocab: Option<&'a mut StageVocab>,
          parser: Option<&'a GLRParser>,
      ) {
          // Export the current graph into a minimal structure
          let (mut mini, root_keys, _old_mapping) =
              export_to_mini(roots, trie3_god, max_llm_token_id, max_state_id);

          // Build a fresh pass pipeline and context
          let mut ctx = OptimizationContext::new(max_llm_token_id, max_state_id);
          if let Some(sv) = stage_vocab {
              ctx.stage_vocab = Some(Rc::new(RefCell::new(sv)));
          }
          if let Some(p) = parser {
              ctx.parser = Some(Rc::new(RefCell::new(p)));
          }
          ctx.debug_level = 1;

          // Run initial metrics
          ctx.metrics_before = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(
                  1,
                  "[Trie3 Opt] Metrics before optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_before)
              );
          }

          let pipeline = build_pipeline(&config);

          // Run passes
          for pass in pipeline.iter() {
              if ctx.debug_level > 0 {
                  crate::debug!(1, "[Trie3 Opt] Running pass: {}", pass.name());
              }
              pass.run(&mut mini, &mut ctx);

              // After certain passes that are known to create garbage, run GC.
              let pass_name = pass.name();
              if pass_name == "PruneDeadPaths"
                  || pass_name == "PruneUnproductivePaths"
                  || pass_name == "MergeStructural"
                  || pass_name == "MergeBisimulation"
                  || pass_name == "MergeGlobalAtoms"
                  || pass_name == "EliminatePop0ExceptRoots"
                  || pass_name == "CompressUnaryChains"
              {
                  let before = mini.num_nodes();
                  mini.gc();
                  let after = mini.num_nodes();
                  if before != after && ctx.debug_level > 0 {
                      crate::debug!(
                          1,
                          "[Trie3 Opt] GC after '{}': nodes {} -> {}",
                          pass.name(),
                          before,
                          after
                      );
                  }
              }

              if ctx.debug_level > 0 {
                  let metrics = run_all_metrics(&mini);
                  crate::debug!(
                      1,
                      "[Trie3 Opt] Metrics after '{}': {}",
                      pass.name(),
                      crate::trie3_opt::metrics::pretty_print_metrics_map(&metrics)
                  );
              }
          }

          // Run final metrics
          ctx.metrics_after = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(1, "[Trie3 Opt] Metrics after optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_after)
              );
          }

          // Import the result back and finalize
          import_from_mini(&mini, &root_keys, trie3_god, roots, &ctx);
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::constraint::{LLMTokenBV, StateIDBV};
          use crate::datastructures::trie::Trie;
          use ordered_hash_map::OrderedHashMap;

          // A very basic roundtrip sanity test on a trivial graph.
          #[test]
          fn roundtrip_basic() {
              // Build a tiny God/arena with 2 nodes and one edge
              let arena = Trie3GodWrapper::new();

              let a_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));
              let b_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));

              {
                  let mut aw = a_idx.write(&arena).unwrap();
                  aw.value.end = false;

                  let mut bv = LLMTokenBV::zeros();
                  bv.insert(1);
                  bv.insert(3);

                  let mut sids = StateIDBV::zeros();
                  sids.insert(2);
                  sids.insert(4);

                  let mut dm = OrderedHashMap::new();
                  dm.insert(b_idx, sids);

                  aw.children_mut().insert((0isize, bv), dm);

                  // live tokens is derived but we'll set for completeness
                  let mut live = LLMTokenBV::zeros();
                  for ((_, l), _) in aw.children() {
                      live |= l;
                  }
                  aw.value.live_tokens = live;
              }
              {
                  let mut bw = b_idx.write(&arena).unwrap();
                  bw.value.end = true;
              }

              let mut roots = BTreeMap::new();
              roots.insert(TokenizerStateID(0), a_idx);

              let cfg = CoordinatorConfig::default();

              run_pipeline_on_precompute3(
                  &mut roots,
                  &arena,
                  10, // max token id
                  10, // max state id
                  cfg,
                  None,
                  None,
              );

              // After running, ensure roots still exist and points to some node.
              assert!(roots.get(&TokenizerStateID(0)).is_some());
          }
      }
    src/trie3_opt/passes/compress_unary_chains.rs: |
      use std::collections::{BTreeSet, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct CompressUnaryChainsPass;

      impl OptimizationPass for CompressUnaryChainsPass {
          fn name(&self) -> &'static str {
              "CompressUnaryChains"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let roots_set: BTreeSet<NodeId> = trie.root_ids.iter().cloned().collect();
              let max_iters = 8;
              for _ in 0..max_iters {
                  let mut indegree: HashMap<NodeId, usize> = HashMap::new();
                  let mut unique_parent: HashMap<NodeId, (NodeId, EdgeKey)> = HashMap::new();
                  let mut out_info: HashMap<NodeId, (EdgeKey, NodeId, crate::trie3_opt::core::SortedSet)> =
                      HashMap::new();

                  for node in trie.nodes() {
                      let node_id = node.id();
                      for (ek, dm) in node.children() {
                          for (dst, _) in dm {
                              let count = indegree.entry(*dst).or_default();
                              *count += 1;
                              if *count == 1 {
                                  unique_parent.insert(*dst, (node.id(), ek.clone()));
                              } else {
                                  unique_parent.remove(dst);
                              }
                          }
                      }
                      if node.is_end() {
                          continue;
                      }
                      let mut total_dests = 0;
                      let mut only_edge = None;
                      for (ek, dm) in node.children() {
                          for (dst, sids) in dm {
                              total_dests += 1;
                              if total_dests == 1 {
                                  only_edge = Some((ek.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                      if total_dests == 1 {
                          let (ek, dst, sids) = only_edge.unwrap();
                          out_info.insert(node_id, (ek, dst, sids));
                      }
                  }

                  let mut rewrites = vec![];
                  for u_id in trie.node_ids() {
                      if roots_set.contains(&u_id) {
                          continue;
                      }
                      if let (Some((out_key, v_id, s_uv)), Some((p_id, in_key))) =
                          (out_info.get(&u_id), unique_parent.get(&u_id))
                      {
                          if p_id != &u_id && in_key.pop == out_key.pop && in_key.tokens == out_key.tokens
                          {
                              rewrites.push((*p_id, u_id, *v_id, in_key.clone(), s_uv.clone()));
                          }
                      }
                  }

                  if rewrites.is_empty() {
                      break;
                  }

                  for (p_id, u_id, v_id, key, s_uv) in rewrites {
                      if let Some(s_pu) = trie.remove_edge_dest(p_id, &key, u_id) {
                          let s_comp = s_pu.intersect(&s_uv);
                          if !s_comp.is_empty() {
                              trie.add_edge(p_id, key, v_id, s_comp);
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/merge_structural.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Merge nodes with identical structure via iterative refinement. Signature includes:
      /// - End flag
      /// - For each edge-key: (pop, tokens) and destination-class aggregated states.
      /// This is a simplified variant of the structural merge in the large pipeline, implemented
      /// purely over the MiniTrie.
      pub struct MergeStructuralPass {
          pub max_iters: usize,
      }

      impl MergeStructuralPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeStructuralPass {
          fn name(&self) -> &'static str {
              "MergeStructural"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let dense_of: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              // Initial classes by end flag and out-degree
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class = 0usize;
              for (i, node_id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*node_id).unwrap();
                  let key = (node.is_end(), node.out_degree());
                  let cid = *class_map.entry(key).or_insert_with(|| {
                      let v = next_class;
                      next_class += 1;
                      v
                  });
                  prev_class[i] = cid;
              }

              // Refine until convergence. If a max_iters budget is provided and we do not
              // converge within that budget, abort without changing the trie to preserve semantics.
              let mut iter_count = 0usize;
              loop {
                  // Build signature per node
                  // Build signature per node
                  #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug, Hash)]
                  struct EdgeSig {
                      pop: isize,
                      tokens: SortedSet,
                      dest: Vec<(usize, SortedSet)>, // dest_class, states
                  }
                  type NodeSig = (bool, Vec<EdgeSig>);

                  let mut new_class: Vec<usize> = vec![0; n];
                  let mut next = 0usize;
                  let mut changes = 0usize;

                  for (i, node_id) in node_ids.iter().enumerate() {
                      let node = trie.get_node(*node_id).unwrap();
                      // Aggregate by (pop, tokens) -> dest_class -> union of states
                      let mut sig_to_id: HashMap<NodeSig, usize> = HashMap::new();

                      let mut per_key: BTreeMap<(isize, SortedSet), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in node.children() {
                          let inner = per_key.entry((ek.pop, ek.tokens.clone())).or_default();
                          for (dst, sids) in dm.iter() {
                              let d_dense = *dense_of.get(dst).unwrap();
                              let d_class = prev_class[d_dense];
                              let entry = inner.entry(d_class).or_default();
                              entry.union_inplace(sids);
                          }
                      }

                      // Build canonical signature vector
                      let mut esigs: Vec<EdgeSig> = Vec::with_capacity(per_key.len());
                      for ((pop, toks), dm_class) in per_key.into_iter() {
                          let mut dest_vec: Vec<(usize, SortedSet)> = dm_class.into_iter().collect();
                          dest_vec.sort_unstable_by(|a, b| {
                              let c = a.0.cmp(&b.0);
                              if c != std::cmp::Ordering::Equal {
                                  return c;
                              }
                              a.1.cmp(&b.1)
                          });
                          esigs.push(EdgeSig {
                              pop,
                              tokens: toks,
                              dest: dest_vec,
                          });
                      }
                      let sig: NodeSig = (node.is_end(), esigs);

                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let v = next;
                          next += 1;
                          v
                      });
                      new_class[i] = cid;
                      if new_class[i] != prev_class[i] {
                          changes += 1;
                      }
                  }
                  // If no change, we've reached a fixed point and can proceed to merge.
                  if changes == 0 {
                      prev_class = new_class;
                      break;
                  }
                  prev_class = new_class;

                  iter_count += 1;
                  if self.max_iters > 0 && iter_count >= self.max_iters {
                      // Did not converge within the configured budget; to preserve semantics,
                      // abort this pass without modifying the trie.
                      return;
                  }
              }

              // Build representative mapping
              let num_classes = prev_class.iter().max().map(|x| *x + 1).unwrap_or(0);
              let mut rep_of_class: Vec<Option<NodeId>> = vec![None; num_classes];
              for (i, &cid) in prev_class.iter().enumerate() {
                  if rep_of_class[cid].is_none() {
                      rep_of_class[cid] = Some(node_ids[i]);
                  }
              }
              let mut rep_of_node: HashMap<NodeId, NodeId> = HashMap::with_capacity(n);
              for (i, node_id) in node_ids.iter().enumerate() {
                  let cid = prev_class[i];
                  rep_of_node.insert(*node_id, rep_of_class[cid].unwrap());
              }

              for (cid, rep_id_opt) in rep_of_class.iter().enumerate() {
                  if let Some(rep_id) = rep_id_opt {
                      let exemplar_idx = prev_class.iter().position(|&c| c == cid).unwrap();
                      let exemplar_node = trie.get_node(node_ids[exemplar_idx]).unwrap().clone();

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          let mut new_dm: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                          for (dst, sids) in dm {
                              let rep = *rep_of_node.get(dst).unwrap();
                              new_dm.entry(rep).or_default().union_inplace(sids);
                          }
                          if !new_dm.is_empty() {
                              new_children.insert(ek.clone(), new_dm);
                          }
                      }
                      trie.set_children(*rep_id, new_children);
                  }
              }

              let rep_set: std::collections::HashSet<NodeId> =
                  rep_of_class.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false);
                  }
              }

              trie.root_ids = trie
                  .root_ids
                  .iter()
                  .map(|r| *rep_of_node.get(r).unwrap())
                  .collect();
          }
      }
