          # ------------- Construction -------------

          @classmethod
          def from_stacks(cls: Type["LeveledGSS[T, Acc]"], stacks: List[Tuple[List[T], Acc]]) -> "LeveledGSS[T, Acc]":
              factory: _NodeFactory[T] = _NodeFactory()
