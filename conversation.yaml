    src/precompute4/nwa_optimizations.rs: |
      use std::collections::{BTreeMap, BTreeSet, VecDeque};

      use crate::constraint::StateIDBV;
      use crate::glr::parser::GLRParser;
      use crate::glr::table::StateID as ParserStateID;
      use crate::precompute4::utils::{decode_symbol_i16, DEFAULT_TRANSITION_SYMBOL};
      use crate::precompute4::weighted_automata::{NWA, StateID, Weight};

      /// For any state with a final weight, subtract that weight from all outgoing transitions.
      /// This prunes paths that continue after a word has already been accepted with a given weight.
      pub(crate) fn prune_continuations_from_final_states(nwa: &mut NWA) -> bool {
          let mut changed = false;
          for i in 0..nwa.states.len() {
              if let Some(final_weight) = nwa.states[i].final_weight.clone() {
                  if final_weight.is_empty() {
                      continue;
                  }
                  let state = &mut nwa.states[i];

                  // Epsilon transitions
                  for (_, w) in &mut state.epsilons {
                      let old_w = w.clone();
                      *w -= &final_weight;
                      if *w != old_w {
                          changed = true;
                      }
                  }

                  // Labeled transitions
                  for targets in state.transitions.values_mut() {
                      for (_, w) in targets {
                          let old_w = w.clone();
                          *w -= &final_weight;
                          if *w != old_w {
                              changed = true;
                          }
                      }
                  }
              }
          }
          changed
      }

      /// If a default transition for A -> B exists with weight W, subtract W from the weights of all
      /// non-default transitions A -> B (and remove if the resulting weight is empty).
      pub(crate) fn simplify_default_transitions(nwa: &mut NWA) -> bool {
          let mut changed = false;
          for i in 0..nwa.states.len() {
              let state = &mut nwa.states[i];

              let mut default_weights: BTreeMap<StateID, Weight> = BTreeMap::new();
              if let Some(default_targets) = state.transitions.get(&DEFAULT_TRANSITION_SYMBOL) {
                  for (target, weight) in default_targets {
                      if !weight.is_empty() {
                          *default_weights.entry(*target).or_insert_with(Weight::zeros) |= weight;
                      }
                  }
              }
              if default_weights.is_empty() {
                  continue;
              }

              for (label, targets) in state.transitions.iter_mut() {
                  if *label == DEFAULT_TRANSITION_SYMBOL {
                      continue;
                  }
                  for (target, weight) in targets.iter_mut() {
                      if let Some(default_weight) = default_weights.get(target) {
                          let old_weight = weight.clone();
                          *weight -= default_weight;
                          if *weight != old_weight {
                              changed = true;
                          }
                      }
                  }
              }

              for targets in state.transitions.values_mut() {
                  let old_len = targets.len();
                  targets.retain(|(_, w)| !w.is_empty());
                  if targets.len() != old_len {
                      changed = true;
                  }
              }
              let old_len = state.transitions.len();
              state.transitions.retain(|_, targets| !targets.is_empty());
              if state.transitions.len() != old_len {
                  changed = true;
              }
          }
          changed
      }

      fn build_label_follower_map(parser: &GLRParser) -> BTreeMap<ParserStateID, StateIDBV> {
          let mut follower_map: BTreeMap<ParserStateID, StateIDBV> = BTreeMap::new();
          let mut add_follower = |from_sid: ParserStateID, to_sid: ParserStateID| {
              follower_map.entry(from_sid).or_default().insert(to_sid.0);
          };

          for (&from_sid, row) in &parser.table {
              for &to_sid in row
                  .shifts_and_reduces_full
                  .values()
                  .filter_map(|action| match action {
                      crate::glr::table::Stage7ShiftsAndReducesLookaheadValue::Shift(sid) => Some(sid),
                      crate::glr::table::Stage7ShiftsAndReducesLookaheadValue::Split { shift, .. } => shift.as_ref(),
                      _ => None,
                  })
              {
                  add_follower(from_sid, to_sid);
              }
              for goto in row.gotos.values() {
                  if let Some(to_sid) = goto.state_id {
                      add_follower(from_sid, to_sid);
                  }
              }
          }

          let default_sid = ParserStateID(DEFAULT_TRANSITION_SYMBOL as usize);
          for sid in 0..parser.table.len() {
              let state_id = ParserStateID(sid);
              add_follower(default_sid, state_id);
              add_follower(state_id, default_sid);
          }

          follower_map
      }

      /// Propagate label weights along the NWA and prune transitions whose labels are never reachable.
      /// Currently unused in the main `precompute4` pipeline but kept here as an optional optimization pass.
      pub(crate) fn propagate_and_prune_labels(parser: &GLRParser, nwa: &mut NWA) {
          crate::debug!(4, "Starting label propagation and pruning...");
          let now = std::time::Instant::now();

          let follower_map = build_label_follower_map(parser);

          let mut state_info: Vec<BTreeMap<ParserStateID, Weight>> = vec![BTreeMap::new(); nwa.states.len()];
          let mut worklist: VecDeque<StateID> = VecDeque::new();
          let mut in_worklist: BTreeSet<StateID> = BTreeSet::new();

          let start_state = &nwa.states[nwa.body.start_state];
          let mut initial_states: BTreeSet<StateID> = BTreeSet::new();
          for (_, targets) in &start_state.transitions {
              for (target_state, w) in targets {
                  initial_states.insert(*target_state);
                  let s_init = *target_state;
                  for (label, _) in &nwa.states[s_init].transitions {
                      if let Ok((is_pos, p_id)) = decode_symbol_i16(*label) {
                          if is_pos {
                              let entry = state_info[s_init].entry(p_id).or_insert_with(Weight::zeros);
                              *entry |= w;
                          }
                      }
                  }
                  if !state_info[s_init].is_empty() && in_worklist.insert(s_init) {
                      worklist.push_back(s_init);
                  }
              }
          }

          while let Some(u) = worklist.pop_front() {
              in_worklist.remove(&u);
              let info_at_u = state_info[u].clone();
              if info_at_u.is_empty() {
                  continue;
              }

              for (l, targets) in &nwa.states[u].transitions {
                  for (v, w_uv) in targets {
                      let v = *v;
                      let mut changed = false;

                      let process_propagation = |pw: &Weight, followers: &StateIDBV, state_info: &mut Vec<BTreeMap<ParserStateID, Weight>>| -> bool {
                          let mut any_change = false;
                          for follower_id_val in followers.iter() {
                              let follower_id = ParserStateID(follower_id_val);
                              let entry = state_info[v].entry(follower_id).or_insert_with(Weight::zeros);
                              let old_len = entry.len();
                              *entry |= pw;
                              if entry.len() != old_len {
                                  any_change = true;
                              }
                          }
                          any_change
                      };

                      match decode_symbol_i16(*l) {
                          Ok((is_pos, p_id)) => {
                              if is_pos {
                                  if let Some(w_p) = info_at_u.get(&p_id) {
                                      let pw = w_p & w_uv;
                                      if pw.is_empty() {
                                          continue;
                                      }
                                      if let Some(followers) = follower_map.get(&p_id) {
                                          if process_propagation(&pw, followers, &mut state_info) {
                                              changed = true;
                                          }
                                      }
                                  }
                              } else {
                                  panic!("Unexpected negative label during label propagation: {}", l);
                              }
                          }
                          Err(_) => panic!("Unexpected unknown non-default label during label propagation: {}", l),
                      }

                      if changed && in_worklist.insert(v) {
                          worklist.push_back(v);
                      }
                  }
              }
          }
          crate::debug!(4, "Label propagation fixpoint took: {:?}", now.elapsed());

          let now_prune = std::time::Instant::now();
          let mut changed_count = 0;
          for u in 0..nwa.states.len() {
              if initial_states.contains(&u) || u == nwa.body.start_state {
                  continue;
              }

              let info_at_u = &state_info[u];
              let state = &mut nwa.states[u];

              for (l, targets) in state.transitions.iter_mut() {
                  let valid_incoming_weight = match decode_symbol_i16(*l) {
                      Ok((is_pos, p_id)) => {
                          if is_pos {
                              info_at_u.get(&p_id).cloned().unwrap_or_else(Weight::zeros)
                          } else {
                              panic!("Unexpected negative label during pruning: {}", l);
                          }
                      }
                      Err(_) => panic!("Unexpected unknown non-default label during pruning: {}", l),
                  };

                  if valid_incoming_weight.is_empty() {
                      for (_, w_uv) in targets.iter_mut() {
                          if !w_uv.is_empty() {
                              changed_count += 1;
                              *w_uv = Weight::zeros();
                          }
                      }
                  } else {
                      for (_, w_uv) in targets.iter_mut() {
                          let old_w = w_uv.clone();
                          *w_uv &= &valid_incoming_weight;
                          if *w_uv != old_w {
                              changed_count += 1;
                          }
                      }
                  }
              }
          }

          crate::debug!(6, "state_info after propagation:");
          for (i, info) in state_info.iter().enumerate() {
              crate::debug!(6, "  State {}: {:?}", i, info);
          }

          for state in &mut nwa.states.0 {
              for targets in state.transitions.values_mut() {
                  targets.retain(|(_, w)| !w.is_empty());
              }
              state.transitions.retain(|_, v| !v.is_empty());
          }
          crate::debug!(4, "Pruning pass changed {} weights and took: {:?}", changed_count, now_prune.elapsed());
      }
    src/precompute4/resolve_negatives.rs: |
      use crate::precompute4::utils::DEFAULT_TRANSITION_SYMBOL;
      use crate::precompute4::weighted_automata::{DWA, NWA, NWAStateID, NWAStates, Weight};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use std::collections::{HashMap, VecDeque};
      use std::time::Instant;

      type Code = i16;
      type QueryKey = (NWAStateID, Code);

      #[inline]
      fn is_negative_symbol(label: Code) -> bool { label < 0 && label != DEFAULT_TRANSITION_SYMBOL }

      fn make_progress_bar(length: u64, template: &str) -> Option<ProgressBar> {
          if !PROGRESS_BAR_ENABLED {
              return None;
          }
          let pb = ProgressBar::new(length);
          pb.set_style(ProgressStyle::default_bar().template(template).expect("progress-bar"));
          Some(pb)
      }

      fn progress_step(pb: &Option<ProgressBar>, step: u64, msg: &str) {
          if let Some(p) = pb {
              p.set_message(msg.to_string());
              p.set_position(step);
          }
      }

      pub fn resolve_negative_codes_in_nwa(nwa: &mut NWA) {
          let pb = make_progress_bar(
              3,
              "{spinner:.green} [Resolving negatives in NWA: {elapsed_precise}] \
               [{wide_bar:.cyan/blue}] step {pos}/{len} ({msg})",
          );

          progress_step(&pb, 1, "Compute cancellations");
          apply_cancellations(nwa);

          progress_step(&pb, 2, "Propagate finality");
          apply_finality_fixpoint(nwa);

          progress_step(&pb, 3, "Apply changes & remove negatives");
          remove_negative_transitions(nwa);
          crate::debug!(4, "Applied changes to NWA.");

          if let Some(p) = &pb {
              p.finish_with_message("Done");
          }
      }

      pub fn apply_cancellations(nwa: &mut NWA) {
          let epsilons_to_add = compute_cancellations(&nwa.states);
          crate::debug!(4, "Computed {} new epsilon transitions from cancellations.", epsilons_to_add.len());
          for (from, to, w) in epsilons_to_add {
              nwa.states.add_epsilon(from, to, w);
          }
      }

      pub fn apply_finality_fixpoint(nwa: &mut NWA) {
          let final_fix = compute_finality_fixpoint(&nwa.states);
          for sid in 0..nwa.states.len() {
              if final_fix[sid].is_empty() {
                  continue;
              }
              let st = &mut nwa.states.0[sid];
              if let Some(fw) = &mut st.final_weight {
                  *fw |= &final_fix[sid];
              } else {
                  st.final_weight = Some(final_fix[sid].clone());
              }
          }
      }

      pub fn remove_negative_transitions(nwa: &mut NWA) {
          for st in &mut nwa.states.0 {
              st.transitions.retain(|&label, _| !is_negative_symbol(label));
          }
      }

      /// Resolve negative codes in a DWA by a single, high-performance, semantics-preserving NWA rewrite.
      pub fn resolve_negative_codes_in_dwa(dwa: &mut DWA) {
          let now = Instant::now();
          crate::debug!(4, "Resolving negative codes in DWA with {} states...", dwa.states.len());

          let pb = make_progress_bar(
              4,
              "{spinner:.green} [Resolving negative codes: {elapsed_precise}] \
               [{wide_bar:.cyan/blue}] step {pos}/{len} ({msg})",
          );

          progress_step(&pb, 1, "DWA -> NWA");
          let mut nwa = NWA::from_dwa(dwa);
          crate::debug!(4, "Converted to NWA with {} states.", nwa.states.len());
          crate::debug!(4, "Stats for NWA from DWA:\n{}", nwa.stats());

          progress_step(&pb, 2, "Resolve negatives in NWA");
          resolve_negative_codes_in_nwa(&mut nwa);
          crate::debug!(4, "Applied changes, NWA has {} states before determinization.", nwa.states.len());
          crate::debug!(4, "Stats for NWA after negative resolution:\n{}", nwa.stats());

          progress_step(&pb, 3, "Determinize");
          let mut result = nwa.determinize_to_dwa();

          progress_step(&pb, 4, "Simplify");
          result.simplify();
          *dwa = result;
          crate::debug!(4, "Stats for final DWA after negative resolution:\n{}", dwa.stats());

          if let Some(p) = &pb {
              p.finish_with_message("Done");
          }
          crate::debug!(4, "resolve_negative_codes_in_dwa took: {:?}", now.elapsed());
      }

      fn compute_cancellations(states: &NWAStates) -> Vec<(NWAStateID, NWAStateID, Weight)> {
          let n = states.len();

          let mut queries: Vec<HashMap<QueryKey, Weight>> = vec![HashMap::new(); n];
          let mut worklist: VecDeque<(NWAStateID, NWAStateID, Code, Weight)> = VecDeque::new();
          let mut new_epsilons: HashMap<(NWAStateID, NWAStateID), Weight> = HashMap::new();

          // Seed from negative transitions.
          for a in 0..n {
              for (&label, targets) in &states[a].transitions {
                  if !is_negative_symbol(label) {
                      continue;
                  }
                  let c = label.wrapping_sub(Code::MIN);
                  for (b, w_ab) in targets {
                      if *b >= n {
                          continue;
                      }
                      let query_key: QueryKey = (a, c);
                      let query_weight = queries[*b].entry(query_key).or_default();
                      let old_w = query_weight.clone();
                      *query_weight |= w_ab;
                      if *query_weight != old_w {
                          worklist.push_back((*b, a, c, query_weight.clone()));
                      }
                  }
              }
          }

          while let Some((s, a, c, w_as)) = worklist.pop_front() {
              let mut check_cancellations = |target: NWAStateID,
                                             w_st: &Weight,
                                             worklist: &mut VecDeque<(NWAStateID, NWAStateID, Code, Weight)>| {
                  let new_eps_w = &w_as & w_st;
                  if new_eps_w.is_empty() {
                      return;
                  }

                  let eps_key = (a, target);
                  let eps_weight = new_epsilons.entry(eps_key).or_default();
                  let old_eps_w = eps_weight.clone();
                  *eps_weight |= &new_eps_w;

                  if *eps_weight != old_eps_w {
                      let queries_at_a = queries[a].clone();
                      for (&(a_prime, c_prime), w_a_prime_a) in &queries_at_a {
                          let prop_w = w_a_prime_a & &*eps_weight;
                          if prop_w.is_empty() {
                              continue;
                          }
                          let query_key: QueryKey = (a_prime, c_prime);
                          let query_weight = queries[target].entry(query_key).or_default();
                          let old_qw = query_weight.clone();
                          *query_weight |= &prop_w;
                          if *query_weight != old_qw {
                              worklist.push_back((target, a_prime, c_prime, query_weight.clone()));
                          }
                      }
                  }
              };

              if let Some(pos_targets) = states[s].transitions.get(&c) {
                  for (t, w_st) in pos_targets {
                      if *t < n {
                          check_cancellations(*t, w_st, &mut worklist);
                      }
                  }
              }
              if let Some(default_targets) = states[s].transitions.get(&DEFAULT_TRANSITION_SYMBOL) {
                  for (target, weight) in default_targets {
                      check_cancellations(*target, weight, &mut worklist);
                  }
              }

              for (t, w_st) in &states[s].epsilons {
                  if *t >= n {
                      continue;
                  }
                  let prop_w = &w_as & w_st;
                  if prop_w.is_empty() {
                      continue;
                  }
                  let query_key: QueryKey = (a, c);
                  let query_weight = queries[*t].entry(query_key).or_default();
                  let old_qw = query_weight.clone();
                  *query_weight |= &prop_w;
                  if *query_weight != old_qw {
                      worklist.push_back((*t, a, c, query_weight.clone()));
                  }
              }
          }

          new_epsilons.into_iter().map(|((from, to), w)| (from, to, w)).collect()
      }

      fn compute_finality_fixpoint(states: &NWAStates) -> Vec<Weight> {
          let n = states.len();
          let mut future_final: Vec<Weight> = vec![Weight::zeros(); n];
          let mut predecessors: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

          for u in 0..n {
              for &(v, ref w) in &states[u].epsilons {
                  if v < n {
                      predecessors[v].push((u, w.clone()));
                  }
              }
              for (&label, targets) in &states[u].transitions {
                  if !is_negative_symbol(label) {
                      continue;
                  }
                  for (v, w) in targets {
                      if *v < n {
                          predecessors[*v].push((u, w.clone()));
                      }
                  }
              }
          }

          let mut queue: VecDeque<NWAStateID> = VecDeque::new();
          for s in 0..n {
              if let Some(ref fw) = states[s].final_weight {
                  if !fw.is_empty() {
                      future_final[s] = fw.clone();
                      queue.push_back(s);
                  }
              }
          }

          while let Some(v) = queue.pop_front() {
              let fv = future_final[v].clone();
              if fv.is_empty() {
                  continue;
              }
              for &(u, ref w_uv) in &predecessors[v] {
                  let add = &fv & w_uv;
                  if add.is_empty() {
                      continue;
                  }
                  let old = &future_final[u];
                  if (&add & old) != add {
                      future_final[u] |= &add;
                      queue.push_back(u);
                  }
              }
          }

          future_final
      }
    src/precompute4/template_nwa.rs: |
      use std::collections::BTreeMap;

      use crate::glr::parser::GLRParser;
      use crate::glr::table::{NonTerminalID, StateID as ParserStateID, TerminalID};
      use crate::precompute4::characterize::{compute_all_characterizations, BelowBottomCharacterization};
      use crate::precompute4::utils;
      use crate::precompute4::utils::DEFAULT_TRANSITION_SYMBOL;
      use crate::precompute4::weighted_automata::{DWA, NWA, NWABuildError, StateID, Weight};

      /// Error type for building the full DWA structures used in precompute4.
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum FullDWABuildError {
          ParserStateIdOutOfRange { state_id: ParserStateID },
          AutomatonBuild(NWABuildError),
      }

      impl From<NWABuildError> for FullDWABuildError {
          fn from(e: NWABuildError) -> Self { FullDWABuildError::AutomatonBuild(e) }
      }

      /// Build a template NWA corresponding to the characterization of a single terminal.
      pub(crate) fn build_template_nwa_from_characterization(bb: &BelowBottomCharacterization) -> Result<NWA, FullDWABuildError> {
          let mut nwa = NWA::new();
          let w_all = Weight::all();

          // Node for each non-terminal.
          let mut nt_nodes: BTreeMap<NonTerminalID, StateID> = BTreeMap::new();
          for &nt in &bb.all_nts {
              let id = nwa.states.add_state();
              nt_nodes.insert(nt, id);
          }

          let start = nwa.body.start_state;

          // Initial shifts from start.
          for &(initial_state, shift_state) in &bb.initial_shifts {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let neg_initial = utils::encode_negative_i16(initial_state)?;
              let neg_shift = utils::encode_negative_i16(shift_state)?;

              let s0 = nwa.states.add_state();
              let s1 = nwa.states.add_state();
              let s2 = nwa.states.add_state();
              let s3 = nwa.states.add_state();

              // start --eps--> s0 --(+initial)--> s1 --(-initial)--> s2 --(-shift)--> s3 (final)
              nwa.add_epsilon(start, s0, w_all.clone());
              nwa.add_transition(s0, pos_initial, s1, w_all.clone())?;
              nwa.add_transition(s1, neg_initial, s2, w_all.clone())?;
              nwa.add_transition(s2, neg_shift, s3, w_all.clone())?;
              nwa.states[s3].final_weight = Some(w_all.clone());
          }

          // Initial reduces from start.
          for &(initial_state, len, nt) in &bb.initial_reduces {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let target_nt_state = *nt_nodes.get(&nt).expect("nt_node must exist for initial_reduce");

              // start --eps--> s0 --(+initial)--> s1 --(default)*len--> target_nt_state
              let s0 = nwa.states.add_state();
              nwa.add_epsilon(start, s0, w_all.clone());
              let mut from = s0;
              let next_state = if len == 0 { target_nt_state } else { nwa.states.add_state() };
              nwa.add_transition(from, pos_initial, next_state, w_all.clone())?;
              from = next_state;

              for i in 0..len {
                  let to = if i == len - 1 { target_nt_state } else { nwa.states.add_state() };
                  nwa.states.add_transition(from, DEFAULT_TRANSITION_SYMBOL, to, w_all.clone())?;
                  from = to;
              }
          }

          // Actions from non-terminal states.
          for (nt, rc) in &bb.reduce_characterizations {
              let src_nt_state = *nt_nodes.get(nt).expect("nt_node must exist for reduce_char");

              for &(revealed_state, len, reduce_nt) in &rc.reveal_and_rereduces {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let dst_nt_state = *nt_nodes.get(&reduce_nt).expect("dst nt_node must exist");

                  // src --eps--> s0 --(+revealed)--> s1 --(default)*len--> dst
                  let s0 = nwa.states.add_state();
                  nwa.add_epsilon(src_nt_state, s0, w_all.clone());
                  let mut from = s0;
                  let next_state = if len == 0 { dst_nt_state } else { nwa.states.add_state() };
                  nwa.add_transition(from, pos_revealed, next_state, w_all.clone())?;
                  from = next_state;

                  for i in 0..len {
                      let to = if i == len - 1 { dst_nt_state } else { nwa.states.add_state() };
                      nwa.states.add_transition(from, DEFAULT_TRANSITION_SYMBOL, to, w_all.clone())?;
                      from = to;
                  }
              }

              for &(revealed_state, goto_state, shift_state) in &rc.reveal_goto_shift_escapes {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let neg_revealed = utils::encode_negative_i16(revealed_state)?;
                  let neg_goto = utils::encode_negative_i16(goto_state)?;
                  let neg_shift = utils::encode_negative_i16(shift_state)?;

                  let s0 = nwa.states.add_state();
                  let s1 = nwa.states.add_state();
                  let s2 = nwa.states.add_state();
                  let s3 = nwa.states.add_state();
                  let s4 = nwa.states.add_state();

                  // src --eps--> s0 --(+revealed)--> s1 --(-revealed)--> s2 --(-goto)--> s3 --(-shift)--> s4 (final)
                  nwa.add_epsilon(src_nt_state, s0, w_all.clone());
                  nwa.add_transition(s0, pos_revealed, s1, w_all.clone())?;
                  nwa.add_transition(s1, neg_revealed, s2, w_all.clone())?;
                  nwa.add_transition(s2, neg_goto, s3, w_all.clone())?;
                  nwa.add_transition(s3, neg_shift, s4, w_all.clone())?;
                  nwa.states[s4].final_weight = Some(w_all.clone());
              }
          }

          Ok(nwa)
      }

      /// Build template DWAs for all terminals in the parser.
      pub(crate) fn build_template_dwas(parser: &GLRParser) -> Result<BTreeMap<TerminalID, DWA>, FullDWABuildError> {
          let all = compute_all_characterizations(parser);
          let mut out = BTreeMap::new();
          for (term, bb) in all {
              let mut nwa = build_template_nwa_from_characterization(&bb)?;
              nwa.simplify();
              let mut dwa = nwa.determinize_to_dwa_with_rustfst();
              dwa.simplify();
              crate::debug!(5, "Built template DWA for terminal {:?}:", term);
              crate::debug!(5, "{}", dwa);
              out.insert(term, dwa);
          }
          Ok(out)
      }

      /// Identity DWA used for the "ignore" terminal: start is final and there are no transitions.
      pub(crate) fn build_ignore_terminal_dwa() -> DWA {
          let mut dwa = DWA::new();
          dwa.states[dwa.body.start_state].final_weight = Some(Weight::all());
          dwa
      }

      /// DWA that accepts the empty string with the given weight.
      pub(crate) fn build_epsilon_dwa(weight: Weight) -> DWA {
          let mut dwa = DWA::new();
          dwa.states[dwa.body.start_state].final_weight = Some(weight);
          dwa
      }
    src/precompute4/utils.rs: |
      use crate::glr::table::StateID as ParserStateID;
      use crate::precompute4::full_dwa::FullDWABuildError;

      pub const DEFAULT_TRANSITION_SYMBOL: i16 = i16::MAX;

      pub fn encode_symbol_i16(id: ParserStateID) -> Result<i16, FullDWABuildError> {
          if id.0 > i16::MAX as usize {
              Err(FullDWABuildError::ParserStateIdOutOfRange { state_id: id })
          } else {
              Ok(id.0 as i16)
          }
      }

      // Negative codes for stack-hitching: i16::MIN + id. Requires parser state IDs to fit in i16.
      pub fn encode_negative_i16(id: ParserStateID) -> Result<i16, FullDWABuildError> {
          if id.0 > i16::MAX as usize {
              Err(FullDWABuildError::ParserStateIdOutOfRange { state_id: id })
          } else {
              Ok(i16::MIN + id.0 as i16)
          }
      }

      // Returns (is_positive_label, parser_state_id).
      pub fn decode_symbol_i16(code: i16) -> Result<(bool, ParserStateID), ()> {
          if code >= 0 {
              Ok((true, ParserStateID(code as usize)))
          } else {
              Ok((false, ParserStateID(code.wrapping_sub(i16::MIN) as usize)))
          }
      }

      pub fn is_default_transition(code: i16) -> bool { code == DEFAULT_TRANSITION_SYMBOL }
    src/precompute4/weighted_automata/bitset.rs: |
      // src/precompute4/weighted_automata/bitset.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use range_set_blaze::RangeSetBlaze;
      use serde::{Deserialize, Deserializer, Serialize, Serializer};
      use std::fmt::{Debug, Display, Formatter};
      use std::hash::{Hash, Hasher};
      use std::iter::FromIterator;
      use std::ops::{BitAnd, BitAndAssign, BitOr, BitOrAssign, Not, Sub, SubAssign};

      /// Thin wrapper around `RangeSetBlaze<usize>` with cached fingerprint and `is_all` flag.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Default)]
      pub struct SimpleBitset {
          pub(crate) rsb: RangeSetBlaze<usize>,
          pub(crate) fp: u64,
          is_all: bool,
      }

      pub(crate) const FP_ZERO: u64 = 0x9E37_79B9_7F4A_7C15;
      const FP_ALL: u64 = 0xD6E8_FEB8_6659_FD93;
      pub(crate) const FP_K1: u64 = 0xC2B2_AE3D_27D4_EB4F;
      pub(crate) const FP_K2: u64 = 0x1656_67B1_F3E1_5A6D;
      const FP_K3: u64 = 0x9E37_79B1_1F37_9B97;

      #[inline]
      pub(crate) fn mix3(a: u64, b: u64, c: u64) -> u64 {
          let mut x = a ^ b.wrapping_mul(FP_K1);
          x = x.rotate_left(27) ^ c.wrapping_mul(FP_K2);
          x ^= x >> 33;
          x = x.wrapping_mul(FP_K3);
          x ^ (x >> 29)
      }

      #[inline]
      fn calc_is_all_and_fp(rsb: &RangeSetBlaze<usize>) -> (bool, u64) {
          let mut it = rsb.ranges();
          if let Some(first) = it.next() {
              if *first.start() == 0 && *first.end() == usize::MAX && it.next().is_none() {
                  return (true, FP_ALL);
              }
              let mut fp = mix3(FP_ZERO, *first.start() as u64, (*first.end() as u64).wrapping_mul(FP_K1));
              for r in it {
                  let s = *r.start() as u64;
                  let e = *r.end() as u64;
                  fp = mix3(fp, s.wrapping_mul(FP_K2), e.wrapping_mul(FP_K3));
              }
              (false, fp)
          } else {
              (false, FP_ZERO)
          }
      }

      #[inline]
      fn universe_rsb() -> RangeSetBlaze<usize> { RangeSetBlaze::from_iter([0usize..=usize::MAX]) }

      #[inline]
      fn complement_rsb(rsb: &RangeSetBlaze<usize>) -> RangeSetBlaze<usize> { &universe_rsb() - rsb }

      impl SimpleBitset {
          #[inline]
          fn from_rsb_inner(rsb: RangeSetBlaze<usize>) -> Self {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }

          #[inline]
          fn update_cached(&mut self) {
              let (is_all, fp) = calc_is_all_and_fp(&self.rsb);
              self.is_all = is_all;
              self.fp = fp;
          }

          pub fn zeros() -> Self {
              SimpleBitset { rsb: RangeSetBlaze::new(), fp: FP_ZERO, is_all: false }
          }

          pub fn all() -> Self {
              SimpleBitset { rsb: universe_rsb(), fp: FP_ALL, is_all: true }
          }

          pub fn from_item(item: usize) -> Self { SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter([item])) }

          pub fn from_rsb(rsb: RangeSetBlaze<usize>) -> Self { SimpleBitset::from_rsb_inner(rsb) }

          pub fn len(&self) -> usize { self.rsb.len().try_into().unwrap_or(usize::MAX) }

          pub fn is_empty(&self) -> bool { self.rsb.is_empty() }

          #[inline]
          pub fn is_all_fast(&self) -> bool { self.is_all }

          pub fn is_disjoint(&self, other: &SimpleBitset) -> bool {
              if self.is_empty() || other.is_empty() {
                  return true;
              }
              if self.is_all_fast() || other.is_all_fast() {
                  return false;
              }
              (&self.rsb & &other.rsb).is_empty()
          }

          pub fn contains(&self, index: usize) -> bool { self.rsb.contains(index) }

          pub fn max_item(&self) -> Option<usize> { self.rsb.iter().last() }

          pub fn iter_up_to(&self, max: usize) -> impl Iterator<Item = usize> {
              (&self.rsb & &RangeSetBlaze::from_iter([0..=max])).into_iter()
          }

          #[inline]
          pub fn is_subset_of(&self, rhs: &SimpleBitset) -> bool { (self & rhs) == *self }

          pub fn complement(&self) -> SimpleBitset {
              if self.is_empty() {
                  return SimpleBitset::all();
              }
              if self.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              let rsb = complement_rsb(&self.rsb);
              SimpleBitset::from_rsb_inner(rsb)
          }

          pub fn insert(&mut self, item: usize) {
              if self.is_all_fast() {
                  return;
              }
              self.rsb.insert(item);
              self.update_cached();
          }

          pub fn add(&mut self, item: usize) { self.insert(item); }

          pub fn remove(&mut self, item: usize) {
              if self.is_empty() {
                  return;
              }
              if self.is_all_fast() {
                  self.rsb = universe_rsb();
              }
              self.rsb.remove(item);
              self.update_cached();
          }

          pub fn set(&mut self, item: usize, value: bool) {
              if value {
                  self.insert(item);
              } else {
                  self.remove(item);
              }
          }

          pub fn clear(&mut self) {
              self.rsb.clear();
              self.fp = FP_ZERO;
              self.is_all = false;
          }

          pub fn clip_to_range(&mut self, min: usize, max: usize) {
              if self.is_empty() {
                  return;
              }
              if self.is_all_fast() {
                  self.rsb = universe_rsb();
              }
              let clip_rsb = RangeSetBlaze::from_iter([min..=max]);
              self.rsb = &self.rsb & &clip_rsb;
              self.update_cached();
          }

          pub fn clip_min(&mut self, min: usize) { self.clip_to_range(min, usize::MAX); }

          pub fn clip_max(&mut self, max: usize) { self.clip_to_range(0, max); }
      }

      impl Hash for SimpleBitset {
          fn hash<H: Hasher>(&self, state: &mut H) { state.write_u64(self.fp); }
      }

      impl Debug for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  write!(f, "SimpleBitset(ALL)")
              } else {
                  Debug::fmt(&self.rsb, f)
              }
          }
      }

      impl Display for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  return write!(f, "ALL");
              }
              write!(f, "[")?;
              let mut ranges = self.rsb.ranges().peekable();
              while let Some(range) = ranges.next() {
                  if range.start() == range.end() {
                      write!(f, "{}", range.start())?;
                  } else {
                      write!(f, "{}..={}", range.start(), range.end())?;
                  }
                  if ranges.peek().is_some() {
                      write!(f, ", ")?;
                  }
              }
              write!(f, "]")
          }
      }

      impl FromIterator<usize> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = usize>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      impl FromIterator<std::ops::RangeInclusive<usize>> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = std::ops::RangeInclusive<usize>>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      impl<'a> BitAnd<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() {
                  return SimpleBitset::zeros();
              }
              if self.is_all_fast() {
                  return rhs.clone();
              }
              if rhs.is_all_fast() {
                  return self.clone();
              }
              SimpleBitset::from_rsb_inner(&self.rsb & &rhs.rsb)
          }
      }

      impl<'a> BitOr<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_all_fast() || rhs.is_all_fast() {
                  return SimpleBitset::all();
              }
              if self.is_empty() {
                  return rhs.clone();
              }
              if rhs.is_empty() {
                  return self.clone();
              }
              SimpleBitset::from_rsb_inner(&self.rsb | &rhs.rsb)
          }
      }

      impl BitAndAssign<&SimpleBitset> for SimpleBitset {
          fn bitand_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() {
                  return;
              }
              if rhs.is_empty() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              if rhs.is_all_fast() {
                  return;
              }
              if self.is_all_fast() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb = &self.rsb & &rhs.rsb;
              self.update_cached();
          }
      }

      impl BitOrAssign<&SimpleBitset> for SimpleBitset {
          fn bitor_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_all_fast() || rhs.is_all_fast() {
                  *self = SimpleBitset::all();
                  return;
              }
              if rhs.is_empty() {
                  return;
              }
              if self.is_empty() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb |= &rhs.rsb;
              self.update_cached();
          }
      }

      impl BitAnd<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output { (&self) & (&rhs) }
      }

      impl BitOr<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output { (&self) | (&rhs) }
      }

      impl<'a> BitAnd<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output { (&self) & rhs }
      }

      impl<'a> BitOr<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output { (&self) | rhs }
      }

      impl<'a> BitAnd<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output { self & (&rhs) }
      }

      impl<'a> BitOr<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output { self | (&rhs) }
      }

      impl SubAssign<&SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() || rhs.is_empty() {
                  return;
              }
              if self.is_all_fast() && rhs.is_all_fast() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              self.rsb = &self.rsb - &rhs.rsb;
              self.update_cached();
          }
      }

      impl SubAssign<SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: SimpleBitset) { *self -= &rhs }
      }

      impl Sub<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: SimpleBitset) -> Self::Output { (&self) - (&rhs) }
      }

      impl<'a> Sub<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() {
                  return self.clone();
              }
              if self.is_all_fast() && rhs.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              SimpleBitset::from_rsb_inner(&self.rsb - &rhs.rsb)
          }
      }

      impl Not for SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() {
                  return SimpleBitset::all();
              }
              if self.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              SimpleBitset::from_rsb_inner(complement_rsb(&self.rsb))
          }
      }

      impl Not for &SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() {
                  return SimpleBitset::all();
              }
              if self.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              SimpleBitset::from_rsb_inner(complement_rsb(&self.rsb))
          }
      }

      impl Serialize for SimpleBitset {
          fn serialize<S>(&self, serializer: S) -> Result<S::Ok, S::Error>
          where S: Serializer {
              #[derive(Serialize)]
              #[serde(untagged)]
              enum Repr<'a> {
                  All(&'a str),
                  Ranges(Vec<RangeRepr>),
              }

              #[derive(Serialize)]
              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
              }

              if self.is_all {
                  Repr::All("ALL").serialize(serializer)
              } else {
                  let ranges: Vec<RangeRepr> = self
                      .rsb
                      .ranges()
                      .map(|r| {
                          if r.start() == r.end() {
                              RangeRepr::Single(*r.start())
                          } else {
                              RangeRepr::Range((*r.start(), *r.end()))
                          }
                      })
                      .collect();
                  Repr::Ranges(ranges).serialize(serializer)
              }
          }
      }

      impl<'de> Deserialize<'de> for SimpleBitset {
          fn deserialize<D>(deserializer: D) -> Result<Self, D::Error>
          where D: Deserializer<'de> {
              use serde::de;

              #[derive(Deserialize)]
              #[serde(untagged)]
              enum Repr {
                  All(String),
                  Ranges(Vec<RangeRepr>),
              }

              #[derive(Deserialize)]
              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
              }

              match Repr::deserialize(deserializer)? {
                  Repr::All(s) => {
                      if s == "ALL" {
                          Ok(SimpleBitset::all())
                      } else {
                          Err(de::Error::custom("expected string 'ALL' for all-bitset"))
                      }
                  }
                  Repr::Ranges(ranges) => {
                      let rsb = RangeSetBlaze::from_iter(ranges.into_iter().map(|rr| match rr {
                          RangeRepr::Single(i) => i..=i,
                          RangeRepr::Range((s, e)) => s..=e,
                      }));
                      Ok(SimpleBitset::from_rsb_inner(rsb))
                  }
              }
          }
      }
