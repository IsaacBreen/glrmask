                       let mut spec = 0;
                       for (i, opt_v) in x.iter().enumerate() {
                           if let Some(v) = opt_v {
                               inv_idx[i].entry(*v).or_default().insert(new_id);
                               spec += 1;
                           }
                       }
                       reps_spec.push(spec);
       
      +                reps.push(x.clone());
      +                image.insert(x, new_id);
                       work_queue.push_back(new_id);
                       work_set.insert(new_id);
                   }

      ```
