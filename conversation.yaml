          fn push_finalizer_info(
              &mut self,
              grammar_token: GrammarTokenID,
              llm_token: LLMTokenID, // This is internal ID
              tokenizer_state: TokenizerStateID,
          ) {
              let mut bv = HybridBitset::new();
