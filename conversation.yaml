      I also note that performance is highly variable here. In fact, what matters most is not average time, but maximum time - worst-case. Well, not actually worst case in the scientific sense. But within a string, the instance where one `get_mask` call takes the longest time to run. This is what limits our ability to reliably stream masks. A max time of 50 ms means we can generate 20 masks per second. Even if the average is 5 ms, the max is what counts. We can't be *late* for any mask.

