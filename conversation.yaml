          *   **Replace `step` closure:** The new `step` function will be much simpler. It will no longer instantiate automata. Instead, it will calculate the resulting token weights and pass along the edge's terminal ID and the weight to the destination nodes.
          *   **Replace `merge` closure:** The `merge` function will now combine the `BTreeMap<Option<TerminalID>, Weight>` maps by taking the union of weights for each terminal ID.
          *   **Replace `process` closure:** This closure will become more complex. It will now be responsible for:
