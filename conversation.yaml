              let child1: TestNodeEI = Arc::new(Mutex::new(TestTrieEI::new("child1".to_string())));
              let child2: TestNodeEI = Arc::new(Mutex::new(TestTrieEI::new("child2".to_string())));

              // Pre-insert edges with the target key
