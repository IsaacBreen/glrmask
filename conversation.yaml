      }
    src/precompute4/weighted_automata/determinization_rustfst.rs: |
      // src/precompute4/weighted_automata/determinization_rustfst.rs

      use super::common::{StateID, Weight};
      use super::dwa::{DWA, DWABuildError};
      use super::nwa::NWA;
      use crate::precompute4::weighted_automata::bitset::SimpleBitset;
      use crate::precompute4::weighted_automata::{NWAStateID};
      use anyhow::Result;
      use nom::IResult;
      use once_cell::sync::Lazy;
      use rustfst::NomCustomError;
      use rustfst::prelude::*;
      use rustfst::semirings::{
          DivideType, ReverseBack, SemiringProperties, SerializableSemiring, WeaklyDivisibleSemiring,
          WeightQuantize,
      };
      use serde::{Deserialize, Serialize};
      use std::borrow::Borrow;
      use std::collections::{HashMap, HashSet};
      use std::io::Write;
      use std::sync::{Arc, Mutex};
      use rustfst::algorithms::determinize::{determinize_with_config, DeterminizeConfig, DeterminizeType};
      use rustfst::algorithms::rm_epsilon::rm_epsilon;
      use range_set_blaze::RangeSetBlaze;
      use rustfst::fst_properties::FstProperties;

      static WEIGHT_INTERNER: Lazy<Mutex<HashSet<Arc<Weight>>>> = Lazy::new(|| Mutex::new(HashSet::new()));

      fn intern_weight(weight: Weight) -> Arc<Weight> {
          let mut interner = WEIGHT_INTERNER.lock().unwrap();
          if let Some(w) = interner.get(&weight) {
              return w.clone();
          }
          let arc_weight = Arc::new(weight);
          interner.insert(arc_weight.clone());
          arc_weight
      }

      #[derive(Clone, Debug, PartialOrd, Default, Eq, Hash)]
      pub struct BitsetWeight(pub Arc<Weight>);

      impl PartialEq for BitsetWeight {
          fn eq(&self, other: &Self) -> bool {
              Arc::ptr_eq(&self.0, &other.0) || *self.0 == *other.0
          }
      }

      impl Semiring for BitsetWeight {
          type Type = Weight;
          type ReverseWeight = BitsetWeight;

          fn zero() -> Self {
              BitsetWeight(intern_weight(Weight::zeros()))
          }
          fn one() -> Self {
              BitsetWeight(intern_weight(Weight::all()))
          }
          fn new(value: Self::Type) -> Self {
              BitsetWeight(intern_weight(value))
          }

          fn plus_assign<P: Borrow<Self>>(&mut self, rhs: P) -> Result<()> {
              let new_weight = &*self.0 | &*rhs.borrow().0;
              self.0 = intern_weight(new_weight);
              Ok(())
          }

          fn times_assign<P: Borrow<Self>>(&mut self, rhs: P) -> Result<()> {
              let new_weight = &*self.0 & &*rhs.borrow().0;
              self.0 = intern_weight(new_weight);
              Ok(())
          }

          fn approx_equal<P: Borrow<Self>>(&self, rhs: P, _delta: f32) -> bool {
              *self.0 == *rhs.borrow().0
          }

          fn value(&self) -> &Self::Type {
              &self.0
          }
          fn take_value(self) -> Self::Type {
              Arc::try_unwrap(self.0).unwrap_or_else(|arc| (*arc).clone())
          }
          fn set_value(&mut self, value: Self::Type) {
              self.0 = intern_weight(value);
          }
          fn reverse(&self) -> Result<Self::ReverseWeight> {
              Ok(self.clone())
          }

          fn properties() -> SemiringProperties {
              SemiringProperties::LEFT_SEMIRING
                  | SemiringProperties::RIGHT_SEMIRING
                  | SemiringProperties::COMMUTATIVE
                  | SemiringProperties::IDEMPOTENT
                  | SemiringProperties::PATH
          }
      }

      impl ReverseBack<BitsetWeight> for BitsetWeight {
          fn reverse_back(&self) -> Result<BitsetWeight> {
              Ok(self.clone())
          }
      }

      impl WeaklyDivisibleSemiring for BitsetWeight {
          fn divide_assign(&mut self, _rhs: &Self, _divide_type: DivideType) -> Result<()> {
              // For a boolean algebra (with OR as plus and AND as times), division a/b is a | !b.
              // This is because we need `(a/b) & b = a` when `a` is a "sub-weight" of `b` (i.e. a subset).
              // `(a | !b) & b = (a & b) | (!b & b) = a & b`.
              // Since `a` is a subset of `b` in this context, `a & b = a`.
              let new_weight = &*self.0 | &!&*_rhs.0;
              self.0 = intern_weight(new_weight);
              Ok(())
          }
      }

      impl WeightQuantize for BitsetWeight {
          fn quantize_assign(&mut self, _delta: f32) -> Result<()> {
              Ok(())
          }
      }

      impl SerializableSemiring for BitsetWeight {
          fn weight_type() -> String {
              "bitset".to_string()
          }

          fn parse_binary(i: &[u8]) -> IResult<&[u8], Self, NomCustomError<&[u8]>> {
              use nom::number::complete::le_u64;
              let (mut i, num_ranges) = le_u64(i)?;
              let mut ranges = Vec::with_capacity(num_ranges as usize);
              for _ in 0..num_ranges {
                  let (next_i, start) = le_u64(i)?;
                  let (next_i, end) = le_u64(next_i)?;
                  ranges.push(start as usize..=end as usize);
                  i = next_i;
              }
              let rsb = RangeSetBlaze::from_iter(ranges);
              Ok((i, BitsetWeight(intern_weight(Weight::from_rsb(rsb)))))
          }

          fn write_binary<F: Write>(&self, file: &mut F) -> Result<()> {
              let ranges: Vec<_> = self.0.rsb.ranges().collect();
              file.write_all(&(ranges.len() as u64).to_le_bytes())?;
              for range in ranges {
                  file.write_all(&((*range.start() as u64).to_le_bytes()))?;
                  file.write_all(&((*range.end() as u64).to_le_bytes()))?;
              }
              Ok(())
          }

          fn parse_text(i: &str) -> IResult<&str, Self> {
              use nom::combinator::map_res;
              map_res(nom::combinator::rest, |s: &str| -> Result<BitsetWeight, _> {
                  serde_json::from_str::<Weight>(s)
                      .map(|w| BitsetWeight(intern_weight(w)))
                      .map_err(|e| e.to_string())
              })(i)
          }
      }

      impl std::fmt::Display for BitsetWeight {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              write!(
                  f,
                  "{}",
                  serde_json::to_string(self.0.as_ref()).unwrap_or_else(|_| "err".to_string())
              )
          }
      }

      pub fn nwa_to_vector_fst(nwa: &NWA) -> VectorFst<BitsetWeight> {
          let mut fst = VectorFst::<BitsetWeight>::new();
          let mut state_map = HashMap::<NWAStateID, StateId>::new();

          for i in 0..nwa.states.len() {
              let s = fst.add_state();
              state_map.insert(i, s);
          }

          if !nwa.states.0.is_empty() {
              fst.set_start(state_map[&nwa.body.start_state]).unwrap();
          }

          for (i, nwa_state) in nwa.states.0.iter().enumerate() {
              let fst_state_id = state_map[&i];
              if let Some(w) = &nwa_state.final_weight {
                  if !w.is_empty() {
                      fst.set_final(fst_state_id, BitsetWeight::new(w.clone()))
                          .unwrap();
                  }
              }

              for (label, targets) in &nwa_state.transitions {
                  for (target, weight) in targets {
                      if !weight.is_empty() {
                          fst.add_tr(
                              fst_state_id,
                              Tr::new(
                                  (*label as u32) + 1,
                                  (*label as u32) + 1,
                                  BitsetWeight::new(weight.clone()),
                                  state_map[target],
                              ),
                          )
                          .unwrap();
                      }
                  }
              }

              for (target, weight) in &nwa_state.epsilons {
                  if !weight.is_empty() {
                      fst.add_tr(
                          fst_state_id,
                          Tr::new(
                              EPS_LABEL,
                              EPS_LABEL,
                              BitsetWeight::new(weight.clone()),
                              state_map[target],
                          ),
                      )
                      .unwrap();
                  }
              }
          }
          crate::debug!(5, "NWA to FST conversion done:\n{}", fst);
          fst
      }

      pub fn vector_fst_to_dwa(fst: &VectorFst<BitsetWeight>) -> DWA {
          let fst_start = match fst.start() {
              Some(s) => s,
              None => return DWA::new(),
          };

          let mut dwa = DWA::new();
          dwa.states.0.clear();
          let mut state_map = HashMap::<StateId, StateID>::new();

          for i in 0..fst.num_states() {
              let s = dwa.add_state();
              state_map.insert(i as StateId, s);
          }

          dwa.body.start_state = state_map[&fst_start];

          for i in 0..fst.num_states() {
              let fst_state_id = i as StateId;
              if !state_map.contains_key(&fst_state_id) {
                  continue;
              }
              let dwa_state_id = state_map[&fst_state_id];

              if let Some(w) = fst.final_weight(fst_state_id).unwrap() {
                  if !w.0.is_empty() {
                      dwa.set_final_weight(dwa_state_id, w.value().clone()).unwrap();
                  }
              }

              for tr in fst.get_trs(fst_state_id).unwrap().trs() {
                  if !tr.weight.0.is_empty() {
                      if !state_map.contains_key(&tr.nextstate) {
                          continue;
                      }
                      let res = dwa.add_transition(
                          dwa_state_id,
                          ((tr.ilabel - 1) as u16) as i16,
                          state_map[&tr.nextstate],
                          tr.weight.value().clone(),
                      );
                      if let Err(e) = res {
                          // This should not happen if the input FST is deterministic.
                          panic!("Error converting VectorFst to DWA: transition already exists. This indicates non-determinism. Error: {:?}", e);
                      }
                  }
              }
          }
          dwa
      }

      pub fn vector_fst_to_nwa(fst: &VectorFst<BitsetWeight>) -> NWA {
          if fst.num_states() == 0 {
              return NWA::new();
          }

          let mut nwa = NWA::new();
          nwa.states.0.clear();
          let mut state_map = HashMap::<StateId, NWAStateID>::new();

          for i in 0..fst.num_states() {
              let s = nwa.states.add_state();
              state_map.insert(i as StateId, s);
          }

          if let Some(fst_start) = fst.start() {
              nwa.body.start_state = state_map[&fst_start];
          } else {
              // FST has states but no start state. The NWA will also have no reachable final states from its start.
              // We must set a start state. Let's pick 0.
              nwa.body.start_state = 0;
          }

          for i in 0..fst.num_states() {
              let fst_state_id = i as StateId;
              let nwa_state_id = state_map[&fst_state_id];

              if let Some(w) = fst.final_weight(fst_state_id).unwrap() {
                  if !w.0.is_empty() {
                      nwa.states[nwa_state_id].final_weight = Some(w.value().clone());
                  }
              }

              for tr in fst.get_trs(fst_state_id).unwrap().trs() {
                  if !tr.weight.0.is_empty() {
                      let target_nwa_id = state_map[&tr.nextstate];
                      let weight = tr.weight.value().clone();

                      if tr.ilabel == EPS_LABEL {
                          nwa.states.add_epsilon(nwa_state_id, target_nwa_id, weight);
                      } else {
                          let label = ((tr.ilabel - 1) as u16) as i16;
                          nwa.states.add_transition(nwa_state_id, label, target_nwa_id, weight).unwrap();
                      }
                  }
              }
          }
          nwa
      }

      pub fn determinize_nwa_to_dwa(nwa: &NWA) -> DWA {
          let mut fst = nwa_to_vector_fst(nwa);
          fst.compute_and_update_properties_all().unwrap();
          assert!(fst.properties().contains(FstProperties::ACCEPTOR), "FST should be an acceptor before determinization");
          crate::debug!(4, "NFA states before rm_epsilon: {}", fst.num_states());
          rm_epsilon(&mut fst).unwrap();
          crate::debug!(4, "NFA states after rm_epsilon: {}", fst.num_states());

          crate::debug!(4, "NFA states before minimization: {}", fst.num_states());
          let min_config = MinimizeConfig::default().with_allow_nondet(true);
          minimize_with_config(&mut fst, min_config).unwrap();
          crate::debug!(4, "NFA states after minimization: {}", fst.num_states());

          let det_config = DeterminizeConfig::default().with_det_type(DeterminizeType::DeterminizeFunctional);
          crate::debug!(4, "NFA states before determinization: {}", fst.num_states());
          let mut det_fst: VectorFst<BitsetWeight> = determinize_with_config(&fst, det_config).unwrap();
          crate::debug!(4, "DFA states after determinization: {}", det_fst.num_states());
          let min_config = MinimizeConfig::default();
          crate::debug!(4, "DFA states before minimization: {}", det_fst.num_states());
          minimize_with_config(&mut det_fst, min_config).unwrap();
          crate::debug!(4, "DFA states after minimization: {}", det_fst.num_states());
          crate::debug!(5, "Determinized FST:\n{}", det_fst);
          vector_fst_to_dwa(&det_fst)
      }
    src/precompute4/weighted_automata/determinization.rs: |
      // src/precompute4/weighted_automata/determinization.rs
      //
      // Determinization of NWA -> DWA specialized to the Weight bitset semiring,
      // with an aggressively minimized construction following Mohri's insights:
      //   - General case: weighted-subset determinization with ε-closure integration,
      //     default/exception compression of labels, and compact state-entry/final weights.
      //   - Special optimized case (fast-path): if the NWA is a union of singleton-loop
      //     components reachable by ε from the start, whose per-component base weights
      //     are pairwise disjoint (the "hypercube" class), then we compile directly a
      //     1-state DWA. In that case, the entire "history" is tracked in the accumulating
      //     weight, not in the state space, avoiding 2^N blowup.
      //
      // Correctness sketch for the fast-path (bitset semiring):
      //   Let components C = {q}. Each q is a single state with self-loops only and no ε-out,
      //   and has a base weight B_q (start ε weight ∧ final weight at q). For each symbol a,
      //   let W_a = ⋁_{q allows a} (B_q ∧ w(q,a)) where w(q,a) is the (union of) loop weights at q.
      //   Then the 1-state DWA uses per-letter self-loops on a with weight W_a, and final weight
      //   F = ⋁_q B_q. For any input word x = a1...ak, the DWA assigns
      //       (W_a1 ∧ W_a2 ∧ ... ∧ W_ak) ∧ F
      //   The bitset semiring (∧ distributes over ⋁) and pairwise disjointness of the B_q guarantees
      //   this equals
      //       ⋁_q ( B_q ∧ w(q,a1) ∧ ... ∧ w(q,ak) )
      //   which is exactly the NWA semantics for this class (each q "reads" the sequence in-place).

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use chrono::Local;
      use indicatif::{MultiProgress, ProgressBar, ProgressStyle};
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};
      use crate::precompute4::test_weighted_automata;

      use super::common::{DETERMINIZE_DEBUG, NWAStateID, Weight};
      use super::dwa::{DWA, DWABuildError};
      use super::nwa::{NWA, NWAStates};

      // Weighted subset and ε-closure maps
      type WeightedSubset = BTreeMap<NWAStateID, Weight>;
      type ClosureMap = BTreeMap<NWAStateID, Weight>;

      // Helper ops on Weight
      fn weight_union(mut a: Weight, b: &Weight) -> Weight {
          a | b.clone()
      }
      fn weight_union_in_place(dst: &mut Weight, src: &Weight) {
          *dst = dst.clone() | src.clone();
      }
      fn weight_intersection(a: &Weight, b: &Weight) -> Weight {
          a & b
      }
      fn is_zero(w: &Weight) -> bool {
          w.is_empty()
      }

      // Epsilon-closure from a weighted subset:
      // Input: initial weighted subset 'seed' mapping NWA states to input weights (bitsets).
      // Output: closure map mapping every reachable state via ε-paths to the union of all
      // weights of those ε-paths (seed_weight ∧ ε-edges ∧ ...).
      fn epsilon_closure(nwa_states: &NWAStates, seed: &WeightedSubset) -> ClosureMap {
          let mut closure: ClosureMap = ClosureMap::new();
          let mut queue: VecDeque<NWAStateID> = VecDeque::new();

          for (sid, w) in seed {
              if !is_zero(w) {
                  let prev = closure.get(sid).cloned().unwrap_or_else(Weight::zeros);
                  let neww = weight_union(prev.clone(), w);
                  if neww != prev {
                      closure.insert(*sid, neww.clone());
                      queue.push_back(*sid);
                  }
              }
          }

          while let Some(u) = queue.pop_front() {
              let uw = closure.get(&u).cloned().unwrap_or_else(Weight::zeros);
              if is_zero(&uw) {
                  continue;
              }
              for (v, w_eps) in &nwa_states[u].epsilons {
                  let cand = weight_intersection(&uw, w_eps);
                  if is_zero(&cand) {
                      continue;
                  }
                  let prev = closure.get(v).cloned().unwrap_or_else(Weight::zeros);
                  let merged = weight_union(prev.clone(), &cand);
                  if merged != prev {
                      closure.insert(*v, merged.clone());
                      queue.push_back(*v);
                  }
              }
          }

          closure
      }

      // Compute all explicit labels in this ε-closure
      fn collect_labels(nwa_states: &NWAStates, closure: &ClosureMap) -> BTreeSet<i16> {
          let mut labels: BTreeSet<i16> = BTreeSet::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              labels.extend(nwa_states[*sid].transitions.keys());
          }
          labels
      }

      // Next subset for a specific label ch
      fn next_subset_for_label(
          nwa_states: &NWAStates,
          closure: &ClosureMap,
          ch: i16,
      ) -> WeightedSubset {
          let mut next: WeightedSubset = WeightedSubset::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              let st = &nwa_states[*sid];
              if let Some(targets) = st.transitions.get(&ch) {
                  // Explicit transition for 'ch' exists: use it.
                  for (to, w_edge) in targets {
                      let cand = weight_intersection(cw, w_edge);
                      if is_zero(&cand) {
                          continue;
                      }
                      next.entry(*to)
                          .and_modify(|w| weight_union_in_place(w, &cand))
                          .or_insert(cand);
                  }
              }
          }
          next.retain(|_, w| !is_zero(w));
          next
      }

      // Union over values (for edge/default weights)
      fn union_over_values(map: &WeightedSubset) -> Weight {
          let mut acc = Weight::zeros();
          for w in map.values() {
              acc = acc | w.clone();
          }
          acc
      }

      // Compute DWA state-entry and final weights from ε-closure
      fn compute_state_and_final_weights(
          nwa: &NWA,
          closure: &ClosureMap,
      ) -> (Option<Weight>, Option<Weight>) {
          // State-entry weights are not part of Mohri's determinization algorithm.
          let entry_opt = None;
          let mut finalw = Weight::zeros();
          for (sid, cw) in closure {
              if let Some(fw) = &nwa.states[*sid].final_weight {
                  let cand = cw & fw;
                  if !is_zero(&cand) {
                      finalw = finalw | cand;
                  }
              }
          }
          let final_opt = if finalw.is_empty() { None } else { Some(finalw) };
          (entry_opt, final_opt)
      }

      // Determinizer

      struct Determinizer<'a> {
          nwa: &'a NWA,
          seen: HashMap<ClosureMap, usize>,
          subsets: Vec<WeightedSubset>,
          closures: Vec<ClosureMap>,
          queue: VecDeque<usize>,
          dwa: DWA,
          mp: Option<MultiProgress>,
      }

      impl<'a> Determinizer<'a> {
          fn new(nwa: &'a NWA, mp: Option<MultiProgress>) -> Self {
              let mut dwa = DWA::new();
              dwa.states.0.clear();
              dwa.body.start_state = 0;
              Determinizer {
                  nwa,
                  seen: HashMap::new(),
                  subsets: Vec::new(),
                  closures: Vec::new(),
                  queue: VecDeque::new(),
                  dwa,
                  mp,
              }
          }

          fn register_state(&mut self, subset: WeightedSubset) -> usize {
              // 1) Canonicalize incoming seed by dropping empty weights.
              let mut subset_clean: WeightedSubset = WeightedSubset::new();
              for (sid, w) in subset {
                  if !is_zero(&w) { subset_clean.insert(sid, w); }
              }
              // 2) Compute ε-closure; determinized state identity depends on closure.
              let closure = epsilon_closure(&self.nwa.states, &subset_clean);

              // Use the closure object itself as the key.
              if let Some(&id) = self.seen.get(&closure) {
                  return id;
              }

              // 3) Create brand-new DWA state for this closure.
              let id = self.dwa.add_state();

              // 4) Install final weight from closure.
              let (_entry_opt, final_opt) = compute_state_and_final_weights(self.nwa, &closure);
              if let Some(w) = final_opt { let _ = self.dwa.set_final_weight(id, w); }

              self.seen.insert(closure.clone(), id);
              self.subsets.push(subset_clean);
              self.closures.push(closure);
              self.queue.push_back(id);
              id
          }

          fn expand_state(&mut self, sid: usize) {
              let closure = &self.closures[sid];
              if closure.is_empty() {
                  return;
              }

              let labels_pb = if let Some(mp) = &self.mp {
                  let pb = mp.add(ProgressBar::new(0));
                  pb.set_style(
                      ProgressStyle::default_bar()
                          .template("  {spinner:.green} [{elapsed_precise}] Labels: [{bar:40.cyan/blue}] {pos}/{len} {msg}")
                          .unwrap()
                          .progress_chars("#>-"),
                  );
                  pb.set_message(format!("State {}", sid));
                  Some(pb)
              } else {
                  None
              };

              let labels = collect_labels(&self.nwa.states, closure);

              if let Some(pb) = &labels_pb {
                  pb.set_length(labels.len() as u64);
              }

              let mut transition_data: BTreeMap<i16, (WeightedSubset, Weight)> = BTreeMap::new();
              for ch in &labels {
                  let sub_ch = next_subset_for_label(&self.nwa.states, closure, *ch);
                  let w_ch = union_over_values(&sub_ch);
                  if !sub_ch.is_empty() && !is_zero(&w_ch) {
                      transition_data.insert(*ch, (sub_ch, w_ch));
                  }
                  if let Some(pb) = &labels_pb {
                      pb.inc(1);
                  }
              }

              if let Some(pb) = &labels_pb {
                  pb.set_message(format!("State {}: installing transitions", sid));
                  pb.set_length(transition_data.len() as u64);
                  pb.set_position(0);
              }

              for (ch, (sub_ch, w_ch)) in transition_data {
                  let to_ch_id = self.register_state(sub_ch);
                  let _ = self.dwa.add_transition(sid, ch, to_ch_id, w_ch.clone()).ok();
                  if let Some(pb) = &labels_pb {
                      pb.inc(1);
                  }
              }

              if let Some(pb) = labels_pb {
                  pb.finish_and_clear();
              }
          }
      }

      // Fast-path: try to build a 1-state DWA for a union of singleton-loop components.
      fn try_build_singleton_loop_union(nwa: &NWA) -> Option<DWA> {
          if nwa.states.0.is_empty() || nwa.body.start_state >= nwa.states.len() {
              return None;
          }

          let start = nwa.body.start_state;
          if !nwa.states[start].transitions.is_empty() {
              return None;
          }

          let mut seed: WeightedSubset = WeightedSubset::new();
          seed.insert(start, Weight::all());
          let start_closure = epsilon_closure(&nwa.states, &seed);

          let mut comps: Vec<(NWAStateID, Weight)> = Vec::new();
          for (sid, cw) in start_closure.iter() {
              if *sid == start || is_zero(cw) {
                  continue;
              }
              let st = &nwa.states[*sid];

              if !st.epsilons.is_empty() {
                  return None;
              }
              for (_lbl, vec_targets) in st.transitions.iter() {
                  for (to, _w) in vec_targets {
                      if *to != *sid {
                          return None;
                      }
                  }
              }

              if let Some(fw) = &st.final_weight {
                  let base = cw & fw;
                  if !base.is_empty() {
                      comps.push((*sid, base));
                  }
              }
          }

          if comps.is_empty() {
              return None;
          }

          for i in 0..comps.len() {
              for j in (i + 1)..comps.len() {
                  if !(comps[i].1.clone() & comps[j].1.clone()).is_empty() {
                      return None;
                  }
              }
          }

          let mut label_to_weight: BTreeMap<i16, Weight> = BTreeMap::new();
          for (sid, base) in &comps {
              let st = &nwa.states[*sid];
              for (lbl, vec_targets) in st.transitions.iter() {
                  let mut w_union = Weight::zeros();
                  for (_to, w) in vec_targets {
                      w_union = w_union | w.clone();
                  }
                  if !w_union.is_empty() {
                      let contrib = base.clone() & w_union;
                      if !contrib.is_empty() {
                          let prev = label_to_weight.get(lbl).cloned().unwrap_or_else(Weight::zeros);
                          label_to_weight.insert(*lbl, prev | contrib);
                      }
                  }
              }
          }

          let mut final_union = Weight::zeros();
          for (_sid, base) in &comps {
              final_union = final_union | base.clone();
          }

          let mut dwa = DWA::new();
          let s0 = dwa.body.start_state;
          if !final_union.is_empty() {
              let _ = dwa.set_final_weight(s0, final_union);
          }
          for (lbl, w) in label_to_weight {
              if !w.is_empty() {
                  let _ = dwa.add_transition(s0, lbl, s0, w);
              }
          }

          Some(dwa)
      }

      impl NWA {
          /// Determinize the subgraph reachable from `self.body.start_state` into a DWA.
          pub fn determinize_to_dwa(&self) -> DWA {
              let custom_dwa = if let Some(dwa) = try_build_singleton_loop_union(self) {
                  dwa
              } else {
                  const STATE_LIMIT: usize = 100000;

                  eprintln!(
                      "[DEBUG] Determinization: Using general-purpose subset construction (fast-path not taken)."
                  );
                  if self.states.0.is_empty() || self.body.start_state >= self.states.len() {
                      DWA::new()
                  } else {
                      let mp = MultiProgress::new();
                      let main_pb = mp.add(ProgressBar::new(1));
                      main_pb.set_style(
                          ProgressStyle::default_bar()
                              .template("{spinner:.green} [{elapsed_precise}] States: [{bar:40.cyan/blue}] {pos}/{len} ({eta}) {msg}")
                              .unwrap()
                              .progress_chars("#>-"),
                      );
                      main_pb.set_message("Determinizing NWA");

                      let mut det = Determinizer::new(self, Some(mp));

                      let mut start_subset: WeightedSubset = WeightedSubset::new();
                      start_subset.insert(self.body.start_state, Weight::all());
                      let start_id = det.register_state(start_subset);
                      det.dwa.body.start_state = start_id;

                      let mut processed_count = 0;
                      while let Some(sid) = det.queue.pop_front() {
                          if det.seen.len() > STATE_LIMIT {
                              let timestamp = Local::now().format("%Y%m%d-%H%M%S");
                              let filename = format!("nwa_dump_{}.json", timestamp);
                              eprintln!("Determinization state limit ({}) exceeded. Dumping NWA to {} and panicking.", STATE_LIMIT, filename);
                              let f = std::fs::File::create(&filename).expect("Unable to create dump file");
                              serde_json::to_writer(f, self).expect("Unable to write NWA to file");
                              panic!("Determinization aborted after reaching {} states.", STATE_LIMIT);
                          }

                          let total_states = det.seen.len();
                          main_pb.set_length(total_states as u64);
                          main_pb.set_position(processed_count as u64);
                          main_pb.set_message(format!("Expanding state {}/{}", processed_count + 1, total_states));

                          det.expand_state(sid);
                          processed_count += 1;
                      }
                      main_pb.finish_with_message("Determinization complete");

                      det.dwa
                  }
              };

              if DETERMINIZE_DEBUG {
                  let rustfst_dwa = self.determinize_to_dwa_with_rustfst();
                  eprintln!("[DETERMINIZE_DEBUG] Comparing custom determinization with rustfst...");
                  eprintln!("[DETERMINIZE_DEBUG] Input NWA: {}", self);
                  eprintln!("[DETERMINIZE_DEBUG] Custom DWA stats: {}", custom_dwa.stats());
                  eprintln!("[DETERMINIZE_DEBUG] Rustfst DWA stats: {}", rustfst_dwa.stats());
                  test_weighted_automata::stochastic_equivalence_test(custom_dwa.clone(), rustfst_dwa);
                  eprintln!("[DETERMINIZE_DEBUG] Stochastic equivalence test passed.");
              }

              custom_dwa
          }
      }
