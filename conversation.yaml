              if not indices_sorted:
                  return PyRangeSet.empty()
              intervals: List[Tuple[int, int]] = []
              start = indices_sorted[0]
              prev = start
              for i in indices_sorted[1:]:
                  if i == prev + 1:
                      prev = i
                  else:
                      intervals.append((start, prev))
                      start = i
                      prev = i
              intervals.append((start, prev))
              return PyRangeSet(intervals)

