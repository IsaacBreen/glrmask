                          state_bv = RangeSet.from_ranges(state_bv_bitset.to_ranges())
                          new_dest_map.append((int(dest_idx), state_bv))
                      new_children.append(((int(pop), llm_bv), new_dest_map))
                  node["children"] = new_children
                  node["llm_bv_union"] = llm_bv_union

          @staticmethod
