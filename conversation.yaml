          let productions = vec![
              prod("S", vec![nt("E"), t("$")]), // Start rule
              prod("E", vec![nt("E"), t("+"), nt("T")]),
              prod("E", vec![nt("T")]),
              prod("T", vec![nt("T"), t("*"), nt("F")]),
              prod("T", vec![nt("F")]),
              prod("F", vec![t("("), nt("E"), t(")")]),
              prod("F", vec![t("i")]),
          ];
          generate_glr_parser(&productions, 0, None)
      }

      fn tokenize(parser: &GLRParser, input: &str) -> Vec<TerminalID> {
          input
              .chars()
              .filter_map(|c| {
                  parser.terminal_map.get_by_left(&terminal(&c.to_string()))
                      .copied()
              })
              .collect()
      }

