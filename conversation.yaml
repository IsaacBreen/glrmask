          let mut left = DWA::new();
          left.set_final_weight(left.body.start_state, Weight::from_iter([0, 1])).unwrap();

          // RIGHT: DWA (start: 0)
          //   State 0:
          //     weight: []
          //     final_weight: [1, 2]
          let mut right = DWA::new();
          right.set_final_weight(right.body.start_state, Weight::from_iter([1, 2])).unwrap();

