              let mut bv_2 = StateIDBV::zeros();
              bv_2.insert(2);
              let mut bv_4 = StateIDBV::zeros();
              bv_4.insert(4);
              let mut bv_5 = StateIDBV::zeros();
              bv_5.insert(5);
              let bv_max = StateIDBV::max_ones();

              let path = vec![
                  IntermediateTrie3EdgeKey::CheckLLM(llm_0),
                  IntermediateTrie3EdgeKey::Pop(0, bv_4.clone()),
