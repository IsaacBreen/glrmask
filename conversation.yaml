                      obj.insert("shift".to_string(), shift.to_json());
                      obj.insert("reduces".to_string(), reduces.to_json());
                  }
              }
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
