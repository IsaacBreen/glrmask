          #[test]
          fn test_ei_try_children_success_merge() {
              let source: TestNodeEI = Arc::new(RwLock::new(TestTrieEI::new("source".to_string())));
              let child1: TestNodeEI = Arc::new(RwLock::new(TestTrieEI::new("child1".to_string())));
