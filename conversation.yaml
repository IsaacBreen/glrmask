              #[derive(Clone)]
              struct PatchKey {
                  // sorted by ptr_id
                  ov: Vec<(usize, Weight)>, // def stepvec id -> gate
                  ex: Vec<(usize, Weight)>, // ex stepvec id -> gate
                  fp: u64,
