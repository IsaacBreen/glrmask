      fn equal_tr<W: Semiring>(tr_1: &Tr<W>, tr_2: &Tr<W>) -> bool {
          tr_1.ilabel == tr_2.ilabel && tr_1.olabel == tr_2.olabel && tr_1.nextstate == tr_2.nextstate
      }

      impl<W: Semiring> MutableFst<W> for VectorFst<W> {
          fn new() -> Self {
              VectorFst {
                  states: vec![],
