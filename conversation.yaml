              stats['final_mask_original_len'] = len(original_indices)

              t_total = time.time() - t0
              stats['t_total'] = t_total
              print("\n--- get_mask stats ---")
              for k, v in sorted(stats.items()):
                  if k.startswith('t_'):
                      if t_total > 1e-6:
                          print(f"{k:<25}: {v:8.4f}s ({v/t_total*100:5.1f}%)")
