              return res

          @time_method
          def is_empty(self) -> bool:
              res = self._bitset.is_empty()
              record_metric('FFIRangeSet.is_empty.true' if res else 'FFIRangeSet.is_empty.false', 1)
              return res

          @time_method
          def __len__(self) -> int:
