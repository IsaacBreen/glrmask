      use std::collections::BTreeMap;
      use std::time::Instant;

      use crate::constraint::{PrecomputeNode3Index, StageVocab, Trie3GodWrapper};
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::trie3_opt::coordinator::{run_pipeline_on_precompute3, CoordinatorConfig};
      use crate::trie3_opt::Trie3Config;

      /// High-level size optimizer for precompute3 tries. This is a legacy API that wraps the
      /// new MiniTrie-based optimization pipeline.
      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &Trie3Config,
          max_state_id: usize,
          max_llm_token_id: usize,
          stage_vocab: &mut StageVocab,
          parser: &GLRParser,
      ) {
          crate::debug!(2, "Optimizing Trie 3 size (using new pipeline)...");
          let start = Instant::now();

          // Map legacy Trie3Config to new CoordinatorConfig
          let coordinator_config = CoordinatorConfig {
              num_passes: config.num_passes,
              prune_dead_paths: config.prune_dead_paths,
              prune_unproductive_paths: config.prune_unproductive_paths,
              canonicalize_end_nodes: true, // Always good practice
              compress_edges: config.compress_edges,
              compress_unary_chains: config.compress_edges,
              factor_state_fanout: config.factor_state_fanout,
              factor_common_destinations: config.factor_common_destinations,
              factor_common_destinations_min_incoming: config.factor_common_destinations_min_incoming,
              factor_root_fanout: config.factor_root_fanout,
              factor_root_fanout_max_atoms_per_pop: config.factor_root_fanout_max_atoms_per_pop,
              merge_structural_max_iters: config.merge_structural_max_iters,
              merge_bisimulation_max_iters: config.merge_bisimulation_max_iters,
              merge_global_atoms: config.merge_global_atoms,
              merge_global_atoms_max_iters: config.merge_global_atoms_max_iters,
              merge_global_atoms_max_atoms_per_pop: config.merge_global_atoms_max_atoms_per_pop,
              eliminate_pop0_except_roots: config.eliminate_pop0_except_roots,
              merge_equivalent_llm_tokens: config.merge_equivalent_llm_tokens,
              reorder_llm_tokens: config.reorder_llm_tokens,
              generalize_sids: config.generalize_sids,
          };

          run_pipeline_on_precompute3(
              roots,
              trie3_god,
              max_llm_token_id,
              max_state_id,
              coordinator_config,
              Some(stage_vocab),
              Some(parser),
          );

          crate::debug!(2, "Finished optimizing Trie 3 size in {:?}", start.elapsed());
      }
    src/trie3_opt/passes/canonicalize_end_nodes.rs: |
      use std::collections::BTreeMap;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;
      use crate::trie3_opt::SortedSet;

      /// Canonicalize all end nodes to a single representative and rewire edges to it.
      /// The canonical end node keeps no outgoing edges. This preserves semantics and
      /// maximizes sharing downstream.
      pub struct CanonicalizeEndNodesPass;

      impl OptimizationPass for CanonicalizeEndNodesPass {
          fn name(&self) -> &'static str {
              "CanonicalizeEndNodes"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              // Collect end nodes
              let mut ends: Vec<NodeId> = trie.nodes.iter().filter(|n| n.end).map(|n| n.id).collect();
              if ends.len() <= 1 {
                  return;
              }
              ends.sort_unstable();
              let canonical = ends[0];

              // Ensure canonical has no outgoing edges
              {
                  let cnode = &mut trie.nodes[canonical as usize];
                  cnode.children.clear();
                  cnode.end = true;
              }

              // Rewire all edges to target canonical if they target any end
              let end_set: std::collections::BTreeSet<NodeId> = ends.into_iter().collect();

              for node in trie.nodes.iter_mut() {
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (ek, dm) in node.children.clone() {
                      let mut dm2: BTreeMap<NodeId, _> = BTreeMap::new();
                      for (dst, sids) in dm {
                          let new_dst = if end_set.contains(&dst) { canonical } else { dst };
                          dm2.entry(new_dst)
                              .and_modify(|e: &mut SortedSet| e.union_inplace(&sids))
                              .or_insert(sids);
                      }
                      if !dm2.is_empty() {
                          new_children.insert(ek, dm2);
                      }
                  }
                  node.children = new_children;
              }
          }
      }
    src/trie3_opt/passes/compress_edges.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Group identical destination-maps under the same pop by unioning token masks.
      /// This reduces the number of edge-keys by ensuring that, for a fixed pop,
      /// edges with identical destination semantics share a single token-set.
      pub struct CompressEdgesPass;

      impl OptimizationPass for CompressEdgesPass {
          fn name(&self) -> &'static str {
              "CompressEdges"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              for n in trie.nodes.iter_mut() {
                  if n.children.is_empty() {
                      continue;
                  }

                  let old_children = n.children.clone();
                  // Cost metric: sum of token set sizes and destination map sizes.
                  let old_cost: usize = old_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  // Stage 1: Group by (pop, canonicalized dest-map), unioning token sets.
                  let mut by_pop: BTreeMap<isize, HashMap<Vec<(u32, SortedSet)>, SortedSet>> =
                      BTreeMap::new();
                  for (ek, dm) in &old_children {
                      if ek.tokens.is_empty() || dm.is_empty() {
                          continue;
                      }
                      let mut dest_vec: Vec<(u32, SortedSet)> =
                          dm.iter().map(|(&dst, sids)| (dst, sids.clone())).collect();
                      dest_vec.sort_unstable_by_key(|k| k.0);
                      by_pop
                          .entry(ek.pop)
                          .or_default()
                          .entry(dest_vec)
                          .or_default()
                          .union_inplace(&ek.tokens);
                  }

                  // Stage 2: For each pop, combine groups that yield identical final token sets
                  // by unioning their destination maps.
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<u32, SortedSet>> = BTreeMap::new();
                  for (pop, groups) in by_pop {
                      // tokens -> aggregated destination map
                      let mut out_by_tokens: BTreeMap<SortedSet, BTreeMap<u32, SortedSet>> =
                          BTreeMap::new();

                      for (dest_vec, tokens) in groups {
                          if tokens.is_empty() {
                              continue;
                          }
                          let dest_out = out_by_tokens.entry(tokens).or_default();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dest_out.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                      }

                      // Emit final edges for this pop
                      for (tokens, dm) in out_by_tokens {
                          if !tokens.is_empty() && !dm.is_empty() {
                              new_children.insert(EdgeKey::new(pop, tokens), dm);
                          }
                      }
                  }

                  let new_cost: usize = new_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  if new_cost < old_cost {
                      n.children = new_children;
                  }
              }
          }
      }
    src/trie3_opt/passes/compress_unary_chains.rs: |
      use std::collections::{BTreeSet, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct CompressUnaryChainsPass;

      impl OptimizationPass for CompressUnaryChainsPass {
          fn name(&self) -> &'static str {
              "CompressUnaryChains"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let roots_set: BTreeSet<NodeId> = trie.root_ids.iter().cloned().collect();
              let max_iters = 8;
              for _ in 0..max_iters {
                  let mut indegree: HashMap<NodeId, usize> = HashMap::new();
                  let mut unique_parent: HashMap<NodeId, (NodeId, EdgeKey)> = HashMap::new();
                  let mut out_info: HashMap<NodeId, (EdgeKey, NodeId, crate::trie3_opt::core::SortedSet)> =
                      HashMap::new();

                  for node in &trie.nodes {
                      for (ek, dm) in &node.children {
                          for (dst, _) in dm {
                              let count = indegree.entry(*dst).or_default();
                              *count += 1;
                              if *count == 1 {
                                  unique_parent.insert(*dst, (node.id, ek.clone()));
                              } else {
                                  unique_parent.remove(dst);
                              }
                          }
                      }
                      if node.end {
                          continue;
                      }
                      let mut total_dests = 0;
                      let mut only_edge = None;
                      for (ek, dm) in &node.children {
                          for (dst, sids) in dm {
                              total_dests += 1;
                              if total_dests == 1 {
                                  only_edge = Some((ek.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                      if total_dests == 1 {
                          let (ek, dst, sids) = only_edge.unwrap();
                          out_info.insert(node.id, (ek, dst, sids));
                      }
                  }

                  let mut rewrites = vec![];
                  for u_id in trie.nodes.iter().map(|n| n.id) {
                      if roots_set.contains(&u_id) {
                          continue;
                      }
                      if let (Some((out_key, v_id, s_uv)), Some((p_id, in_key))) =
                          (out_info.get(&u_id), unique_parent.get(&u_id))
                      {
                          if p_id != &u_id && in_key.pop == out_key.pop && in_key.tokens == out_key.tokens
                          {
                              rewrites.push((*p_id, u_id, *v_id, in_key.clone(), s_uv.clone()));
                          }
                      }
                  }

                  if rewrites.is_empty() {
                      break;
                  }

                  for (p_id, u_id, v_id, key, s_uv) in rewrites {
                      let p_node = &mut trie.nodes[p_id as usize];
                      if let Some(dm) = p_node.children.get_mut(&key) {
                          if let Some(s_pu) = dm.remove(&u_id) {
                              let s_comp = s_pu.intersect(&s_uv);
                              if !s_comp.is_empty() {
                                  dm.entry(v_id).or_default().union_inplace(&s_comp);
                              }
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/eliminate_pop0.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Eliminate pop=0 edges whose source is not a root by composing predecessors:
      /// For each B --(0, L_bc, S_bc)--> C and each A --(p_ab, L_ab, S_ab)--> B,
      /// add A --(p_ab, L_ab∧L_bc, S_ab∧S_bc)--> C and remove the B->C entry.
      /// Iterate to a fixed point.
      pub struct EliminatePop0ExceptRootsPass;

      impl OptimizationPass for EliminatePop0ExceptRootsPass {
          fn name(&self) -> &'static str {
              "EliminatePop0ExceptRoots"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let root_set = trie.root_ids.clone();
              let n = trie.nodes.len();
              if n == 0 {
                  return;
              }

              loop {
                  // Build incoming map and collect pop=0 edges
                  let mut incoming: HashMap<NodeId, Vec<(NodeId, isize, SortedSet, SortedSet)>> = HashMap::new();
                  let mut zero_edges: Vec<(NodeId, SortedSet, NodeId, SortedSet)> = Vec::new();

                  for node in &trie.nodes {
                      for (ek, dm) in &node.children {
                          for (dst, sids) in dm {
                              incoming.entry(*dst).or_default().push((node.id, ek.pop, ek.tokens.clone(), sids.clone()));
                              if ek.pop == 0 {
                                  zero_edges.push((node.id, ek.tokens.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                  }

                  if zero_edges.is_empty() {
                      break;
                  }

                  let mut removed_this_iter = 0usize;

                  for (b, llm_bc, c, s_bc) in zero_edges {
                      if root_set.contains(&b) {
                          // pop=0 from root is allowed; skip
                          continue;
                      }
                      if let Some(preds) = incoming.get(&b) {
                          for (a, p_ab, llm_ab, s_ab) in preds {
                              let new_tokens = llm_ab.intersect(&llm_bc);
                              if new_tokens.is_empty() {
                                  continue;
                              }
                              let new_sids = s_ab.intersect(&s_bc);
                              if new_sids.is_empty() {
                                  continue;
                              }
                              // Add/update A -> C with (p_ab, new_tokens) and SIDs = intersection
                              let a_node = &mut trie.nodes[*a as usize];
                              let key = crate::trie3_opt::core::EdgeKey::new(*p_ab, new_tokens.clone());
                              let dm = a_node.children.entry(key).or_insert_with(BTreeMap::new);
                              dm.entry(c)
                                  .and_modify(|e| e.union_inplace(&new_sids))
                                  .or_insert(new_sids);
                          }
                      }

                      // Remove B -> C under (0, llm_bc)
                      let bnode = &mut trie.nodes[b as usize];
                      let key = crate::trie3_opt::core::EdgeKey::new(0, llm_bc.clone());
                      if let Some(dm) = bnode.children.get_mut(&key) {
                          if dm.remove(&c).is_some() {
                              removed_this_iter += 1;
                          }
                          if dm.is_empty() {
                              bnode.children.remove(&key);
                          }
                      }
                  }

                  if removed_this_iter == 0 {
                      break;
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_common_destinations.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct FactorCommonDestinationsPass {
          min_incoming: usize,
      }

      impl FactorCommonDestinationsPass {
          pub fn new(min_incoming: usize) -> Self {
              Self { min_incoming }
          }
      }

      impl OptimizationPass for FactorCommonDestinationsPass {
          fn name(&self) -> &'static str {
              "FactorCommonDestinations"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              if self.min_incoming == 0 {
                  return;
              }

              let all_tokens = SortedSet::from_iter(0..=ctx.max_llm_token_id);
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              // Map: dest -> { (pop, tokens) -> { states -> [sources] } }
              let mut incoming_map: HashMap<NodeId, HashMap<EdgeKey, HashMap<SortedSet, Vec<NodeId>>>> =
                  HashMap::new();

              for src_node in &trie.nodes {
                  for (edge_key, dest_map) in &src_node.children {
                      for (dest_id, sids) in dest_map {
                          incoming_map
                              .entry(*dest_id)
                              .or_default()
                              .entry(edge_key.clone())
                              .or_default()
                              .entry(sids.clone())
                              .or_default()
                              .push(src_node.id);
                      }
                  }
              }

              for (dest_id, edges_by_key) in incoming_map {
                  for (edge_key, sources_by_sids) in edges_by_key {
                      for (sids, sources) in sources_by_sids {
                          if sources.len() >= self.min_incoming {
                              // Create intermediate node
                              let intermediate_id = trie.add_node(false);

                              // Add edge from intermediate to original destination
                              trie.add_edge(intermediate_id, edge_key.clone(), dest_id, sids.clone());

                              // Reroute sources to point to intermediate node
                              for src_id in &sources {
                                  let src_node = &mut trie.nodes[*src_id as usize];

                                  // Remove old edge
                                  if let Some(dest_map_for_key) = src_node.children.get_mut(&edge_key) {
                                      dest_map_for_key.remove(&dest_id);
                                      if dest_map_for_key.is_empty() {
                                          src_node.children.remove(&edge_key);
                                      }
                                  }

                                  // Add new edge to intermediate node. This is a "None-like" edge.
                                  // pop=0, all tokens, all states.
                                  let none_like_edge_key = EdgeKey::new(0, all_tokens.clone());
                                  trie.add_edge(
                                      *src_id,
                                      none_like_edge_key,
                                      intermediate_id,
                                      all_states.clone(),
                                  );
                              }
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_root_fanout.rs: |
      use std::collections::BTreeMap;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct FactorRootFanoutPass {
          max_atoms_per_pop: usize,
      }

      impl FactorRootFanoutPass {
          pub fn new(max_atoms_per_pop: usize) -> Self {
              Self { max_atoms_per_pop }
          }
      }

      impl OptimizationPass for FactorRootFanoutPass {
          fn name(&self) -> &'static str {
              "FactorRootFanout"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);
              let root_ids: Vec<_> = trie.root_ids.iter().cloned().collect();

              for root_id in root_ids {
                  let root_node = trie.nodes[root_id as usize].clone();
                  if root_node.children.is_empty() {
                      continue;
                  }

                  let mut keep_children = BTreeMap::new();
                  let mut by_pop: BTreeMap<isize, Vec<(SortedSet, BTreeMap<NodeId, SortedSet>)>> =
                      BTreeMap::new();
                  let mut any_p_gt_0 = false;

                  for (ek, dm) in root_node.children {
                      if ek.pop <= 0 {
                          keep_children.insert(ek, dm);
                      } else {
                          any_p_gt_0 = true;
                          by_pop.entry(ek.pop).or_default().push((ek.tokens, dm));
                      }
                  }

                  if !any_p_gt_0 {
                      continue;
                  }

                  let mut new_children = keep_children;
                  let mut made_progress = false;

                  for (pop, entries) in by_pop {
                      let mut universe = SortedSet::new();
                      for (tokens, _) in &entries {
                          universe.union_inplace(tokens);
                      }
                      if universe.is_empty() {
                          continue;
                      }

                      let mut blocks = vec![universe.clone()];
                      let mut aborted = false;
                      for (tokens, _) in &entries {
                          let mut next_blocks = Vec::new();
                          for b in &blocks {
                              let inter = b.intersect(tokens);
                              if !inter.is_empty() {
                                  next_blocks.push(inter);
                              }
                              let diff_elems: Vec<_> =
                                  b.iter().filter(|t| !tokens.elems.binary_search(t).is_ok()).collect();
                              if !diff_elems.is_empty() {
                                  next_blocks.push(SortedSet::from_iter(diff_elems));
                              }
                          }
                          if self.max_atoms_per_pop > 0 && next_blocks.len() > self.max_atoms_per_pop {
                              aborted = true;
                              break;
                          }
                          blocks = next_blocks;
                      }
                      if aborted || blocks.is_empty() {
                          blocks = vec![universe];
                      }

                      for b in blocks {
                          let mut dest_agg: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                          for (tokens, dm) in &entries {
                              if b.intersect(tokens).is_empty() {
                                  continue;
                              }
                              for (dst, sids) in dm {
                                  dest_agg.entry(*dst).or_default().union_inplace(sids);
                              }
                          }
                          if dest_agg.is_empty() {
                              continue;
                          }

                          let mid_id = trie.add_node(false);
                          trie.add_edge(mid_id, EdgeKey::new(pop, b.clone()), dest_agg.keys().cloned().next().unwrap(), dest_agg.values().cloned().next().unwrap());
                          let mid_node = &mut trie.nodes[mid_id as usize];
                          mid_node.children.insert(EdgeKey::new(pop, b.clone()), dest_agg);

                          new_children
                              .entry(EdgeKey::new(0, b))
                              .or_default()
                              .insert(mid_id, all_states.clone());
                          made_progress = true;
                      }
                  }

                  if made_progress {
                      trie.nodes[root_id as usize].children = new_children;
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_state_fanout.rs: |
      use std::collections::BTreeMap;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::EdgeKey;
      use crate::trie3_opt::passes::OptimizationPass;

      /// Reduces state fanout by factoring edges. For each node, it groups outgoing edges
      /// by (pop, destination). For each group, it merges the edges by unioning their
      /// token sets and state ID sets. This can reduce the number of distinct edges
      /// a single (pop, state_id) transition can take, thus lowering state fanout.
      pub struct FactorStateFanoutPass;

      impl OptimizationPass for FactorStateFanoutPass {
          fn name(&self) -> &'static str {
              "FactorStateFanout"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              for node in trie.nodes.iter_mut() {
                  if node.children.is_empty() {
                      continue;
                  }

                  // Step 1: Deconstruct children into a per-destination view.
                  // Map from (pop, dest) -> list of (tokens, states)
                  let mut per_dest: BTreeMap<(isize, NodeId), Vec<(SortedSet, SortedSet)>> =
                      BTreeMap::new();
                  for (ek, dm) in &node.children {
                      for (dest, states) in dm {
                          per_dest
                              .entry((ek.pop, *dest))
                              .or_default()
                              .push((ek.tokens.clone(), states.clone()));
                      }
                  }

                  // Step 2: For each (pop, dest), merge edges with identical state sets by unioning token sets.
                  let mut merged_per_dest: BTreeMap<(isize, NodeId), Vec<(SortedSet, SortedSet)>> =
                      BTreeMap::new();
                  for ((pop, dest), edges) in per_dest {
                      // Group by state set
                      let mut by_states: BTreeMap<SortedSet, SortedSet> = BTreeMap::new();
                      for (tokens, states) in edges {
                          by_states
                              .entry(states)
                              .or_default()
                              .union_inplace(&tokens);
                      }

                      let new_edges: Vec<(SortedSet, SortedSet)> =
                          by_states.into_iter().map(|(s, t)| (t, s)).collect();
                      merged_per_dest.insert((pop, dest), new_edges);
                  }

                  // Step 3: Reconstruct node.children from the per-destination merged edges.
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();
                  for ((pop, dest), edges) in merged_per_dest {
                      for (tokens, states) in edges {
                          if tokens.is_empty() || states.is_empty() {
                              continue;
                          }
                          let key = crate::trie3_opt::core::EdgeKey::new(pop, tokens);
                          new_children.entry(key).or_default().insert(dest, states);
                      }
                  }
                  node.children = new_children;
              }
          }
      }
    src/trie3_opt/passes/full/compress.rs: |
      use std::collections::{BTreeMap, HashMap};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::profiler::PROGRESS_BAR_ENABLED;

      /// Compress edges by grouping identical destination maps (for a given pop) and unioning token masks.
      /// Adopt the rewrite only if a local cost metric improves.
      pub fn compress_trie3_edges(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) {
          crate::debug!(2, "Compressing Trie3 edges (group identical dest-maps and union token masks)...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Compress Edges (cost-aware)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for node_idx in it {
              let mut w = node_idx.write(trie3_god).expect("write");
              if w.children().is_empty() {
                  continue;
              }

              // Work from a snapshot so we can compute both old/new costs and adopt only if better.
              let old_snapshot = w.children().clone();

              // Local helpers for bounded range-count and cost metric
              #[inline]
              fn ranges_len_bounded(m: &LLMTokenBV, max_id: usize) -> usize {
                  let mut c = m.clone();
                  c.constrain(max_id);
                  c.inner().ranges_len()
              }
              use std::collections::BTreeMap as BTM;
              #[inline]
              fn children_cost(
                  children: &BTM<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>>,
                  max_llm_token_id: usize,
              ) -> (usize, usize, usize) {
                  let mut ranges_sum = 0usize;
                  let mut dests_sum = 0usize;
                  for ((_, l), dm) in children {
                      ranges_sum += ranges_len_bounded(l, max_llm_token_id);
                      dests_sum += dm.len();
                  }
                  (ranges_sum + dests_sum, ranges_sum, dests_sum)
              }

              // Compute old cost
              let old_cost = children_cost(&old_snapshot, max_llm_token_id).0;

              // First stage: group by (pop, canonicalized dest-map), unioning L masks for identical dest-maps.
              use std::collections::HashMap as HM;
              let mut by_pop: BTM<isize, HM<Vec<(Trie2Index, StateIDBV)>, LLMTokenBV>> = BTM::new();
              for ((pop, llm_bv_orig), dest_map_orig) in &old_snapshot {
                  // Constrain token bitset to bound and skip empties.
                  let mut llm_bv = llm_bv_orig.clone();
                  llm_bv.constrain(max_llm_token_id);
                  if llm_bv.is_empty() {
                      continue;
                  }

                  // Aggregate destinations by unioning SIDs and removing empties.
                  let mut dest_agg: BTM<Trie2Index, StateIDBV> = BTM::new();
                  for (dst, sids0) in dest_map_orig {
                      let mut sids = sids0.clone();
                      sids.constrain(max_state_id);
                      if sids.is_empty() {
                          continue;
                      }
                      dest_agg
                          .entry(*dst)
                          .and_modify(|e| *e |= &sids)
                          .or_insert(sids);
                  }
                  if dest_agg.is_empty() {
                      continue;
                  }

                  // Canonical destination vector (sorted by dst) for use as a key.
                  let dest_vec: Vec<(Trie2Index, StateIDBV)> = dest_agg.into_iter().collect();

                  // Merge edges that have the same pop and identical destination map by unioning their LLM masks.
                  let entry = by_pop
                      .entry(*pop)
                      .or_default()
                      .entry(dest_vec)
                      .or_insert_with(LLMTokenBV::zeros);
                  *entry |= &llm_bv;
              }

              // Second stage: for each pop, combine groups that yield identical final L masks
              // by unioning their destination maps (one entry per (pop, llm_bv)).
              let mut new_children: BTM<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> =
                  BTM::new();
              for (pop, groups) in by_pop {
                  // llm_bv -> aggregated destination map (as BTreeMap for determinism)
                  let mut out_by_llm: BTM<LLMTokenBV, BTM<Trie2Index, StateIDBV>> = BTM::new();

                  for (dest_vec, llm_bv) in groups {
                      if llm_bv.is_empty() {
                          continue;
                      }
                      let dest_out = out_by_llm.entry(llm_bv).or_insert_with(BTM::new);
                      for (dst, sids) in dest_vec {
                          dest_out
                              .entry(dst)
                              .and_modify(|e| *e |= &sids)
                              .or_insert(sids);
                      }
                  }

                  // Emit final edges: (pop, llm_bv) -> OrderedHashMap<dst, StateIDBV>
                  for (llm_bv, dest_btree) in out_by_llm {
                      if llm_bv.is_empty() {
                          continue;
                      }
                      let mut ordered_dm: OrderedHashMap<Trie2Index, StateIDBV> =
                          OrderedHashMap::new();
                      for (dst, sids) in dest_btree {
                          if !sids.is_empty() {
                              ordered_dm.insert(dst, sids);
                          }
                      }
                      if !ordered_dm.is_empty() {
                          let entry = new_children
                              .entry((pop, llm_bv))
                              .or_insert_with(OrderedHashMap::new);
                          for (dst, sids) in ordered_dm {
                              entry
                                  .entry(dst)
                                  .and_modify(|e| *e |= &sids)
                                  .or_insert(sids);
                          }
                      }
                  }
              }

              // Compare costs and adopt only if better.
              let new_cost = children_cost(&new_children, max_llm_token_id).0;
              if new_cost < old_cost {
                  let mut new_live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &new_children {
                      new_live |= llm_bv;
                  }
                  w.value.live_tokens = new_live;
                  *w.children_mut() = new_children;
              } else {
                  // Keep old structure; normalize live_tokens from old children.
                  let mut live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &old_snapshot {
                      live |= llm_bv;
                  }
                  w.value.live_tokens = live;
                  // w.children() already equals old_snapshot
              }
          }

          crate::debug!(2, "Finished compressing Trie3 edges.");
      }
    src/trie3_opt/passes/full/global_atoms_merge.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::sync::Arc;

      use ordered_hash_map::OrderedHashMap;
      use range_set_blaze::RangeSetBlaze;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::datastructures::EntryApi;
      use crate::trie3_opt::passes::full::atoms::build_global_token_atoms_by_pop;
      use crate::trie3_opt::passes::full::rewire::rewire_all_edges_to_representatives;

      /// NEW MERGE PASS:
      /// Global-atoms bisimulation merge. Compared to existing WL / structural merges, this pass:
      ///  - Derives a global partition of tokens ("atoms") per pop across the entire graph by splitting a
      ///    universe set with all observed edge masks at that pop (with a cap).
      ///  - Iteratively refines node classes: two nodes are equivalent iff for every pop and every atom,
      ///    the aggregated semantics (mapping from destination class to union of SIDs) match.
      ///  - Rewires all edges to representatives and reconstructs representative edges deterministically.
      pub fn merge_nodes_trie3_global_atoms(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_iters: usize,
          max_atoms_per_pop: usize,
      ) {
          crate::debug!(2, "Merging nodes (global-atoms bisimulation) in precomputed trie 3 (iters={}, cap={} atoms/pop).",
              max_iters, max_atoms_per_pop);

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Derive global atoms by pop.
          let atoms_by_pop =
              build_global_token_atoms_by_pop(trie3_god, &all_nodes, max_llm_token_id, max_atoms_per_pop);
          if atoms_by_pop.is_empty() {
              crate::debug!(3, "Global-atoms merge: no edges present; skipping.");
              return;
          }

          // Dense ids for nodes
          let n = all_nodes.len();
          let mut dense_of: HashMap<Trie2Index, usize> = HashMap::with_capacity(n);
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(n);
          for (i, idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*idx, i);
              old_of.push(*idx);
          }

          // Ends and raw edges (pop, llm_bv, dest_dense, sids)
          type RawEdge3 = (isize, LLMTokenBV, usize, StateIDBV);
          let mut ends: Vec<bool> = vec![false; n];
          let mut raw_edges: Vec<Vec<RawEdge3>> = vec![Vec::new(); n];
          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let g = u_idx.read(trie3_god).expect("read");
              ends[u_dense] = g.value.end;
              for (ek, dm) in g.children() {
                  for (dst, sids) in dm {
                      if let Some(v_dense) = dense_of.get(dst) {
                          raw_edges[u_dense].push((ek.0, ek.1.clone(), *v_dense, sids.clone()));
                      }
                  }
              }
          }

          // Precompute, once, for every unique (pop, LLMTokenBV) mask pointer, which atoms (by index) it overlaps.
          // This avoids scanning all atoms for every edge repeatedly.
          use std::collections::BTreeMap as BTM;
          let mut unique_bvs_per_pop: BTM<isize, Vec<LLMTokenBV>> = BTM::new();
          let mut seen_ptrs_per_pop: BTM<isize, HashSet<*const RangeSetBlaze<usize>>> = BTM::new();
          for edges in &raw_edges {
              for (p, llm_bv, _v, _sids) in edges {
                  if !atoms_by_pop.contains_key(p) {
                      continue;
                  }
                  let ptr = Arc::as_ptr(&llm_bv.inner);
                  let seen = seen_ptrs_per_pop.entry(*p).or_default();
                  if seen.insert(ptr) {
                      unique_bvs_per_pop
                          .entry(*p)
                          .or_default()
                          .push(llm_bv.clone());
                  }
              }
          }
          let mut atom_idxs_by_pop_ptr: BTM<isize, HashMap<*const RangeSetBlaze<usize>, Vec<usize>>> =
              BTM::new();
          for (p, bvs) in unique_bvs_per_pop {
              if let Some(atoms) = atoms_by_pop.get(&p) {
                  let mut map: HashMap<*const RangeSetBlaze<usize>, Vec<usize>> = HashMap::new();
                  for bv in bvs {
                      let ptr = Arc::as_ptr(&bv.inner);
                      let mut idxs: Vec<usize> = Vec::new();
                      for (j, a) in atoms.iter().enumerate() {
                          if !(&bv & a).is_empty() {
                              idxs.push(j);
                          }
                      }
                      map.insert(ptr, idxs);
                  }
                  atom_idxs_by_pop_ptr.insert(p, map);
              }
          }

          // Compute longest path distance in pop=0 subgraph to prevent merging nodes in a chain.
          let mut pop0_adj: Vec<Vec<usize>> = vec![vec![]; n];
          let mut pop0_rev_adj: Vec<Vec<usize>> = vec![vec![]; n];
          let mut pop0_out_degree = vec![0; n];
          for u in 0..n {
              for (p, _, v_dense, _) in &raw_edges[u] {
                  if *p == 0 {
                      pop0_adj[u].push(*v_dense);
                      pop0_rev_adj[*v_dense].push(u);
                      pop0_out_degree[u] += 1;
                  }
              }
          }

          let mut dist = vec![0; n];
          let mut q: VecDeque<usize> = VecDeque::new();
          for i in 0..n {
              if pop0_out_degree[i] == 0 {
                  q.push_back(i);
              }
          }

          let mut processed_count = 0;
          while let Some(v) = q.pop_front() {
              processed_count += 1;
              for &u in &pop0_rev_adj[v] {
                  dist[u] = dist[u].max(1 + dist[v]);
                  pop0_out_degree[u] -= 1;
                  if pop0_out_degree[u] == 0 {
                      q.push_back(u);
                  }
              }
          }

          // Mark nodes in or that can reach a cycle with max distance
          if processed_count < n {
              let max_dist = n + 1;
              for i in 0..n {
                  if pop0_out_degree[i] > 0 {
                      q.push_back(i);
                  }
              }
              while let Some(v) = q.pop_front() {
                  if dist[v] != max_dist {
                      dist[v] = max_dist;
                      for &u in &pop0_rev_adj[v] {
                          q.push_back(u);
                      }
                  }
              }
          }

          // Partition refinement (optimized)
          // Initial partition based on end flag and pop=0 distance.
          let mut prev_class: Vec<usize> = vec![0; n];
          let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
          let mut next_class_id = 0;
          for i in 0..n {
              let key = (ends[i], dist[i]);
              let class_id = *class_map.entry(key).or_insert_with(|| {
                  let id = next_class_id;
                  next_class_id += 1;
                  id
              });
              prev_class[i] = class_id;
          }
          for it in 0..max_iters {
              // Signature (compact): (end_flag, Vec<((pop, atom_idx), Vec<(dest_class, StateIDBV)>)>)
              // Only atoms actually hit by this node are included; canonicalization is via sorted BTreeMaps below.
              type SigKey = (bool, Vec<((isize, usize), Vec<(usize, StateIDBV)>)>);
              let mut sig_to_id: HashMap<SigKey, usize> = HashMap::new();
              let mut next_id = 0usize;
              let mut new_class = vec![0usize; n];
              let mut changes = 0usize;

              #[cfg(not(rustrover))]
              let itn = kdam::tqdm!(
                  0..n,
                  desc = format!("Trie3 Merge Global-Atoms Iter {}", it + 1),
                  total = n,
                  disable = !crate::profiler::PROGRESS_BAR_ENABLED,
                  leave = true
              );
              #[cfg(rustrover)]
              let itn = 0..n;
              for u in itn {
                  // 1) Aggregate once per (pop, LLM mask pointer) to dest_class -> SIDs.
                  // This removes duplicate work across atoms for the same mask.
                  let mut per_bv_aggr: HashMap<
                      (isize, *const RangeSetBlaze<usize>),
                      BTreeMap<usize, StateIDBV>,
                  > = HashMap::new();
                  for (p, llm_bv, v_dense, sids) in &raw_edges[u] {
                      if !atoms_by_pop.contains_key(p) {
                          continue;
                      }
                      let dest_class = prev_class[*v_dense];
                      let ptr = Arc::as_ptr(&llm_bv.inner);
                      per_bv_aggr
                          .entry((*p, ptr))
                          .or_insert_with(BTreeMap::new)
                          .entry(dest_class)
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }

                  // 2) Fan out each (pop, mask-pointer) aggregated map to only the atoms it overlaps.
                  // Temporary aggregation: (pop, atom_idx) -> BTreeMap<dest_class, SIDs>, sorted for determinism.
                  let mut per_atom_aggr: BTreeMap<(isize, usize), BTreeMap<usize, StateIDBV>> =
                      BTreeMap::new();
                  for ((pop, ptr), dm) in per_bv_aggr {
                      if let Some(pop_map) = atom_idxs_by_pop_ptr.get(&pop) {
                          if let Some(atom_idxs) = pop_map.get(&ptr) {
                              for &j in atom_idxs {
                                  let entry = per_atom_aggr
                                      .entry((pop, j))
                                      .or_insert_with(BTreeMap::new);
                                  for (dest_class, sids) in &dm {
                                      entry
                                          .entry(*dest_class)
                                          .and_modify(|e| *e |= sids)
                                          .or_insert_with(|| sids.clone());
                                  }
                              }
                          }
                      }
                  }

                  // 3) Build compact signature. We only include non-empty atoms that this node touches.
                  let mut sig_entries: Vec<((isize, usize), Vec<(usize, StateIDBV)>)> =
                      Vec::with_capacity(per_atom_aggr.len());
                  for (key, m) in per_atom_aggr {
                      sig_entries.push((key, m.into_iter().collect()));
                  }
                  let sig: SigKey = (ends[u], sig_entries);
                  let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });
                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }
              crate::debug!(
                  3,
                  "Global-atoms merge iter {}: classes={}, changes={}",
                  it + 1,
                  new_class.iter().max().map(|m| m + 1).unwrap_or(0),
                  changes
              );
              prev_class = new_class;
              if changes == 0 {
                  break;
              }
          }

          // Representatives for final classes
          let final_partition = prev_class;
          let num_classes = final_partition.iter().max().map_or(0, |m| m + 1);
          let mut representatives: Vec<Option<Trie2Index>> = vec![None; num_classes];
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              if representatives[class_id].is_none() {
                  representatives[class_id] = Some(old_of[u_dense]);
              }
          }
          let mut node_to_rep: HashMap<Trie2Index, Trie2Index> = HashMap::with_capacity(n);
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], representatives[class_id].unwrap());
          }

          // Rewrite all edges in the graph to class representatives
          rewire_all_edges_to_representatives(trie3_god, roots, &node_to_rep);

          // Rebuild representative edges deterministically by aggregating to dest classes and mapping to reps.
          for class_id in 0..num_classes {
              if let Some(rep_idx) = representatives[class_id] {
                  // Use a single exemplar node from the class to rebuild representative edges
                  let u_dense = final_partition.iter().position(|&c| c == class_id).unwrap();
                  // Aggregate by (pop, llm_bv, dest_class) unioning SIDs
                  let mut aggr: BTreeMap<(isize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, llm_bv, v_dense, sids) in &raw_edges[u_dense] {
                      let dest_class = final_partition[*v_dense];
                      aggr.entry((*p, llm_bv.clone(), dest_class))
                          .and_modify(|e| *e |= sids)
                          .or_insert_with(|| sids.clone());
                  }
                  let mut new_children: BTreeMap<
                      (isize, LLMTokenBV),
                      OrderedHashMap<Trie2Index, StateIDBV>,
                  > = BTreeMap::new();
                  for ((p, bv_key, dest_class), sids) in aggr {
                      if let Some(dst_rep) = representatives[dest_class] {
                          new_children
                              .entry((p, bv_key.clone()))
                              .or_insert_with(OrderedHashMap::new)
                              .entry(dst_rep)
                              .and_modify(|e| *e |= &sids)
                              .or_insert(sids);
                      }
                  }
                  // Recompute live tokens
                  let mut new_live = LLMTokenBV::zeros();
                  for ((_, l), _) in &new_children {
                      new_live |= l;
                  }
                  let mut w = rep_idx.write(trie3_god).expect("write");
                  *w.children_mut() = new_children;
                  w.value.live_tokens = new_live;
              }
          }

          // Remap roots to representatives
          for r in roots.values_mut() {
              *r = *node_to_rep.get(r).unwrap();
          }
          // Cleanup
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec2);
      }
    src/trie3_opt/passes/generalize_sids.rs: |
      use std::collections::{BTreeMap, HashMap, VecDeque};

      use crate::glr::{parser::GLRParser, table::StateID};
      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct GeneralizeSidsPass;

      impl OptimizationPass for GeneralizeSidsPass {
          fn name(&self) -> &'static str {
              "GeneralizeSids"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let parser = if let Some(p) = &ctx.parser {
                  p.borrow()
              } else {
                  return;
              };

              let one_step_back_map = parser.build_one_step_back_map();
              let mut max_pop = 0;
              for node in &trie.nodes {
                  for (ek, _) in &node.children {
                      if ek.pop > 0 {
                          max_pop = max_pop.max(ek.pop as usize);
                      }
                  }
              }
              if max_pop == 0 {
                  return;
              }

              let num_levels = (max_pop as f64).log2().ceil() as usize + 1;
              let mut two_power_back_maps: Vec<BTreeMap<StateID, SortedSet>> =
                  Vec::with_capacity(num_levels);
              two_power_back_maps.push(
                  one_step_back_map
                      .into_iter()
                      .map(|(k, v)| (k, SortedSet::from_iter(v.iter())))
                      .collect(),
              );

              for i in 1..num_levels {
                  let prev_map = &two_power_back_maps[i - 1];
                  let mut next_map: BTreeMap<StateID, SortedSet> = BTreeMap::new();
                  for (&state_id, preds1) in prev_map {
                      let mut preds2 = SortedSet::new();
                      for pred1_val in preds1.iter() {
                          let sid = StateID(pred1_val);
                          if let Some(preds_of_pred) = prev_map.get(&sid) {
                              preds2.union_inplace(preds_of_pred);
                          }
                      }
                      if !preds2.is_empty() {
                          next_map.insert(state_id, preds2);
                      }
                  }
                  two_power_back_maps.push(next_map);
              }

              let apply_n_step_back = |s: &SortedSet, n: usize| -> SortedSet {
                  let mut current_s = s.clone();
                  for k in 0..two_power_back_maps.len() {
                      if (n >> k) & 1 == 1 {
                          let map_k = &two_power_back_maps[k];
                          let mut next_s = SortedSet::new();
                          for state_id_val in current_s.iter() {
                              let state_id = StateID(state_id_val);
                              if let Some(preds) = map_k.get(&state_id) {
                                  next_s.union_inplace(preds);
                              }
                          }
                          current_s = next_s;
                      }
                  }
                  current_s
              };

              let mut possible_states: HashMap<NodeId, SortedSet> = HashMap::new();
              let mut worklist: VecDeque<NodeId> = VecDeque::new();
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              for root_id in &trie.root_ids {
                  possible_states.insert(*root_id, all_states.clone());
                  worklist.push_back(*root_id);
              }

              while let Some(u_id) = worklist.pop_front() {
                  let s_u = possible_states.get(&u_id).cloned().unwrap_or_default();
                  if s_u.is_empty() {
                      continue;
                  }
                  let u_node = &trie.nodes[u_id as usize];
                  for (ek, dm) in &u_node.children {
                      let s_u_popped = if ek.pop > 0 {
                          apply_n_step_back(&s_u, ek.pop as usize)
                      } else {
                          s_u.clone()
                      };
                      if s_u_popped.is_empty() {
                          continue;
                      }
                      for (v_id, sids_uv) in dm {
                          let s_transmitted = s_u_popped.intersect(sids_uv);
                          if s_transmitted.is_empty() {
                              continue;
                          }
                          let s_v_old = possible_states.entry(*v_id).or_default();
                          let old_len = s_v_old.len();
                          s_v_old.union_inplace(&s_transmitted);
                          if s_v_old.len() > old_len {
                              worklist.push_back(*v_id);
                          }
                      }
                  }
              }

              for node in &mut trie.nodes {
                  let s_u = possible_states.get(&node.id).cloned().unwrap_or_default();
                  for (ek, dm) in &mut node.children {
                      let s_u_popped = if ek.pop > 0 {
                          apply_n_step_back(&s_u, ek.pop as usize)
                      } else {
                          s_u.clone()
                      };
                      dm.retain(|_, sids| {
                          let intersection = s_u_popped.intersect(sids);
                          if !intersection.is_empty() {
                              *sids = intersection;
                              true
                          } else {
                              false
                          }
                      });
                  }
                  node.children.retain(|_, dm| !dm.is_empty());
              }
          }
      }
    src/trie3_opt/passes/merge_bisimulation.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct MergeBisimulationPass {
          max_iters: usize,
      }

      impl MergeBisimulationPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeBisimulationPass {
          fn name(&self) -> &'static str {
              "MergeBisimulation"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let n = trie.nodes.len();
              if n == 0 {
                  return;
              }

              let mut prev_class: Vec<usize> =
                  trie.nodes.iter().map(|node| if node.end { 1 } else { 0 }).collect();

              for _ in 0..self.max_iters {
                  type AggregatedEdge = ((isize, SortedSet, usize), SortedSet);
                  type Signature = (bool, Vec<AggregatedEdge>);
                  let mut sig_to_id: HashMap<Signature, usize> = HashMap::new();
                  let mut new_class = vec![0; n];
                  let mut next_id = 0;
                  let mut changes = 0;

                  for (u_idx, u_node) in trie.nodes.iter().enumerate() {
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in &u_node.children {
                          for (v_id, sids) in dm {
                              let dest_class = prev_class[*v_id as usize];
                              let key = (ek.pop, ek.tokens.clone(), dest_class);
                              aggr.entry(key).or_default().union_inplace(sids);
                          }
                      }
                      let sig = (u_node.end, aggr.into_iter().collect());
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let id = next_id;
                          next_id += 1;
                          id
                      });
                      new_class[u_idx] = cid;
                      if new_class[u_idx] != prev_class[u_idx] {
                          changes += 1;
                      }
                  }
                  prev_class = new_class;
                  if changes == 0 {
                      break;
                  }
              }

              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  if representatives[class_id].is_none() {
                      representatives[class_id] = Some(u_idx as NodeId);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  node_to_rep.insert(u_idx as NodeId, representatives[class_id].unwrap());
              }

              for node in &mut trie.nodes {
                  let mut new_children = BTreeMap::new();
                  for (ek, dm) in &node.children {
                      let mut new_dm: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                      for (dst, sids) in dm {
                          let rep = node_to_rep.get(dst).unwrap();
                          new_dm.entry(*rep).or_default().union_inplace(sids);
                      }
                      if !new_dm.is_empty() {
                          new_children.insert(ek.clone(), new_dm);
                      }
                  }
                  node.children = new_children;
              }
              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
    src/trie3_opt/passes/merge_equivalent_llm_tokens.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet};

      use crate::trie3_opt::{context::OptimizationContext, core::{MiniTrie, SortedSet}, passes::OptimizationPass, NodeId};

      pub struct MergeEquivalentLLMTokensPass;

      impl OptimizationPass for MergeEquivalentLLMTokensPass {
          fn name(&self) -> &'static str {
              "MergeEquivalentLLMTokens"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let sv_rc = if let Some(sv_rc) = &ctx.stage_vocab {
                  sv_rc
              } else {
                  return;
              };

              let mut all_bvs = HashSet::new();
              for node in &trie.nodes {
                  for (ek, _) in &node.children {
                      if !ek.tokens.is_empty() {
                          all_bvs.insert(ek.tokens.clone());
                      }
                  }
              }
              if all_bvs.is_empty() {
                  return;
              }

              let max_tok = ctx.max_llm_token_id;
              let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
              let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
              class_to_tokens.insert(0, (0..=max_tok).collect());
              let mut num_classes = 1;

              for splitter_bv in all_bvs {
                  let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
                  for token in splitter_bv.iter() {
                      if token <= max_tok {
                          let class_id = token_to_class[token];
                          members_in_splitter_by_class.entry(class_id).or_default().push(token);
                      }
                  }

                  for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                      let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                      if old_class_size > 0 && !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                          let new_class_id = num_classes;
                          num_classes += 1;
                          for &token in &tokens_for_new_class {
                              token_to_class[token] = new_class_id;
                          }
                          let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                          let moved_tokens_set: HashSet<_> = tokens_for_new_class.iter().cloned().collect();
                          old_class_tokens.retain(|t| !moved_tokens_set.contains(t));
                          class_to_tokens.insert(new_class_id, tokens_for_new_class);
                      }
                  }
              }

              let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
              for group in class_to_tokens.values() {
                  if group.len() > 1 {
                      let rep = *group.iter().min().unwrap();
                      for &t in group {
                          if t != rep {
                              old_to_new.insert(t, rep);
                          }
                      }
                  }
              }

              if old_to_new.is_empty() {
                  return;
              }

              let remap_sorted_set = |s: &SortedSet| -> SortedSet {
                  let mut new_elems = Vec::with_capacity(s.len());
                  for elem in s.iter() {
                      new_elems.push(old_to_new.get(&elem).copied().unwrap_or(elem));
                  }
                  SortedSet::from_iter(new_elems)
              };

              for node in &mut trie.nodes {
                  let mut new_children = BTreeMap::new();
                  for (mut ek, dm) in std::mem::take(&mut node.children) {
                      ek.tokens = remap_sorted_set(&ek.tokens);
                      let entry: &mut BTreeMap<NodeId, SortedSet> = new_children.entry(ek).or_default();
                      for (dst, sids) in dm {
                          entry.entry(dst).or_default().union_inplace(&sids);
                      }
                  }
                  node.children = new_children;
              }

              let mut sv_ref = sv_rc.borrow_mut();
              let sv = &mut **sv_ref;
              for (old, rep) in old_to_new {
                  if let Some(moved) = sv.internal_to_original.remove(&old) {
                      let entry = sv.internal_to_original.entry(rep).or_default();
                      *entry |= &moved;
                      for o in moved.iter() {
                          sv.original_to_internal.insert(o, rep);
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/merge_global_atoms.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};

      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{EdgeKey, MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct MergeGlobalAtomsPass {
          max_iters: usize,
          max_atoms_per_pop: usize,
      }

      impl MergeGlobalAtomsPass {
          pub fn new(max_iters: usize, max_atoms_per_pop: usize) -> Self {
              Self { max_iters, max_atoms_per_pop }
          }
      }

      impl OptimizationPass for MergeGlobalAtomsPass {
          fn name(&self) -> &'static str {
              "MergeGlobalAtoms"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let n = trie.nodes.len();
              if n == 0 {
                  return;
              }

              let mut by_pop_masks: BTreeMap<isize, HashSet<SortedSet>> = BTreeMap::new();
              for node in &trie.nodes {
                  for (ek, _) in &node.children {
                      if !ek.tokens.is_empty() {
                          by_pop_masks.entry(ek.pop).or_default().insert(ek.tokens.clone());
                      }
                  }
              }

              let universe = SortedSet::from_iter(0..=ctx.max_llm_token_id);
              let mut atoms_by_pop: BTreeMap<isize, Vec<SortedSet>> = BTreeMap::new();
              for (pop, masks) in by_pop_masks {
                  let mut blocks = vec![universe.clone()];
                  let mut aborted = false;
                  for m in masks {
                      let mut next_blocks = Vec::new();
                      for b in &blocks {
                          let inter = b.intersect(&m);
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff_elems: Vec<_> = b.iter().filter(|t| !m.elems.binary_search(t).is_ok()).collect();
                          if !diff_elems.is_empty() {
                              next_blocks.push(SortedSet::from_iter(diff_elems));
                          }
                      }
                      if self.max_atoms_per_pop > 0 && next_blocks.len() > self.max_atoms_per_pop {
                          aborted = true;
                          break;
                      }
                      blocks = next_blocks;
                  }
                  atoms_by_pop.insert(pop, if aborted { vec![universe.clone()] } else { blocks });
              }

              // Precompute atom overlaps for each unique token set.
              let mut atom_idxs_by_pop_mask: BTreeMap<isize, HashMap<SortedSet, Vec<usize>>> =
                  BTreeMap::new();
              for (pop, atoms) in &atoms_by_pop {
                  let pop_map = atom_idxs_by_pop_mask.entry(*pop).or_default();
                  if let Some(masks) = by_pop_masks.get(pop) {
                      for mask in masks {
                          let mut idxs = Vec::new();
                          for (i, atom) in atoms.iter().enumerate() {
                              if !mask.intersect(atom).is_empty() {
                                  idxs.push(i);
                              }
                          }
                          pop_map.insert(mask.clone(), idxs);
                      }
                  }
              }

              // Compute pop=0 distance for initial partitioning.
              let mut pop0_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_rev_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_out_degree = vec![0; n];
              for (u_idx, u_node) in trie.nodes.iter().enumerate() {
                  for (ek, dm) in &u_node.children {
                      if ek.pop == 0 {
                          for v_id in dm.keys() {
                              pop0_adj[u_idx].push(*v_id);
                              pop0_rev_adj[*v_id as usize].push(u_node.id);
                              pop0_out_degree[u_idx] += 1;
                          }
                      }
                  }
              }

              let mut dist = vec![0; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              for i in 0..n {
                  if pop0_out_degree[i] == 0 {
                      q.push_back(i);
                  }
              }

              let mut processed_count = 0;
              while let Some(v_idx) = q.pop_front() {
                  processed_count += 1;
                  for &u_id in &pop0_rev_adj[v_idx] {
                      let u_idx = u_id as usize;
                      dist[u_idx] = dist[u_idx].max(1 + dist[v_idx]);
                      pop0_out_degree[u_idx] -= 1;
                      if pop0_out_degree[u_idx] == 0 {
                          q.push_back(u_idx);
                      }
                  }
              }

              if processed_count < n {
                  let max_dist = n + 1;
                  for i in 0..n {
                      if pop0_out_degree[i] > 0 {
                          q.push_back(i);
                      }
                  }
                  while let Some(v_idx) = q.pop_front() {
                      if dist[v_idx] != max_dist {
                          dist[v_idx] = max_dist;
                          for &u_id in &pop0_rev_adj[v_idx] {
                              q.push_back(u_id as usize);
                          }
                      }
                  }
              }

              // Partition refinement.
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class_id = 0;
              for (i, node) in trie.nodes.iter().enumerate() {
                  let key = (node.end, dist[i]);
                  let class_id = *class_map.entry(key).or_insert_with(|| {
                      let id = next_class_id;
                      next_class_id += 1;
                      id
                  });
                  prev_class[i] = class_id;
              }

              for _ in 0..self.max_iters {
                  type SigKey = (bool, Vec<((isize, usize), Vec<(usize, SortedSet)>)>);
                  let mut sig_to_id: HashMap<SigKey, usize> = HashMap::new();
                  let mut next_id = 0;
                  let mut new_class = vec![0; n];
                  let mut changes = 0;

                  for (u_idx, u_node) in trie.nodes.iter().enumerate() {
                      let mut per_atom_aggr: BTreeMap<(isize, usize), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in &u_node.children {
                          if let Some(pop_map) = atom_idxs_by_pop_mask.get(&ek.pop) {
                              if let Some(atom_idxs) = pop_map.get(&ek.tokens) {
                                  for &atom_idx in atom_idxs {
                                      let entry = per_atom_aggr.entry((ek.pop, atom_idx)).or_default();
                                      for (v_id, sids) in dm {
                                          let dest_class = prev_class[*v_id as usize];
                                          entry.entry(dest_class).or_default().union_inplace(sids);
                                      }
                                  }
                              }
                          }
                      }
                      let sig_entries = per_atom_aggr.into_iter().map(|(k, v)| (k, v.into_iter().collect())).collect();
                      let sig = (u_node.end, sig_entries);
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| { let id = next_id; next_id += 1; id });
                      new_class[u_idx] = cid;
                      if new_class[u_idx] != prev_class[u_idx] { changes += 1; }
                  }
                  prev_class = new_class;
                  if changes == 0 { break; }
              }

              // Rewire and rebuild.
              let final_partition = prev_class;
              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  if representatives[class_id].is_none() {
                      representatives[class_id] = Some(trie.nodes[u_idx].id);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  node_to_rep.insert(trie.nodes[u_idx].id, representatives[class_id].unwrap());
              }

              // Rebuild representative edges.
              let original_nodes = trie.nodes.clone();
              for class_id in 0..num_classes {
                  if let Some(rep_id) = representatives[class_id] {
                      let exemplar_idx = final_partition.iter().position(|&c| c == class_id).unwrap();
                      let exemplar_node = &original_nodes[exemplar_idx];

                      // Aggregate by (pop, tokens, dest_class) -> union of sids
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in &exemplar_node.children {
                          for (v_id, sids) in dm {
                              let v_class = final_partition[*v_id as usize];
                              aggr.entry((ek.pop, ek.tokens.clone(), v_class))
                                  .or_default()
                                  .union_inplace(sids);
                          }
                      }

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for ((pop, tokens, dest_class), sids) in aggr {
                          if let Some(dest_rep) = representatives[dest_class] {
                              let key = EdgeKey::new(pop, tokens);
                              new_children.entry(key).or_default().insert(dest_rep, sids);
                          }
                      }
                      trie.nodes[rep_id as usize].children = new_children;
                  }
              }

              // Clear children of non-representatives.
              let rep_set: HashSet<NodeId> = representatives.iter().filter_map(|&x| x).collect();
              for node in &mut trie.nodes {
                  if !rep_set.contains(&node.id) {
                      node.children.clear();
                      node.end = false; // Non-reps are effectively deleted.
                  }
              }

              // Remap roots.
              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
    src/trie3_opt/passes/merge_structural.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Merge nodes with identical structure via iterative refinement. Signature includes:
      /// - End flag
      /// - For each edge-key: (pop, tokens) and destination-class aggregated states.
      /// This is a simplified variant of the structural merge in the large pipeline, implemented
      /// purely over the MiniTrie.
      pub struct MergeStructuralPass {
          pub max_iters: usize,
      }

      impl MergeStructuralPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeStructuralPass {
          fn name(&self) -> &'static str {
              "MergeStructural"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let n = trie.nodes.len();
              if n == 0 {
                  return;
              }

              // Map node id -> dense index
              let mut dense_of: HashMap<NodeId, usize> = HashMap::with_capacity(n);
              let mut old_of: Vec<NodeId> = Vec::with_capacity(n);
              for (i, node) in trie.nodes.iter().enumerate() {
                  dense_of.insert(node.id, i);
                  old_of.push(node.id);
              }

              // Initial classes by end flag and out-degree
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class = 0usize;
              for (i, node) in trie.nodes.iter().enumerate() {
                  let key = (node.end, node.out_degree());
                  let cid = *class_map.entry(key).or_insert_with(|| {
                      let v = next_class;
                      next_class += 1;
                      v
                  });
                  prev_class[i] = cid;
              }

              for _ in 0..self.max_iters.max(1) {
                  // Build signature per node
                  #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug, Hash)]
                  struct EdgeSig {
                      pop: isize,
                      tokens: SortedSet,
                      dest: Vec<(usize, SortedSet)>, // dest_class, states
                  }
                  type NodeSig = (bool, Vec<EdgeSig>);

                  let mut sig_to_id: HashMap<NodeSig, usize> = HashMap::new();
                  let mut new_class: Vec<usize> = vec![0; n];
                  let mut next = 0usize;
                  let mut changes = 0usize;

                  for (i, node) in trie.nodes.iter().enumerate() {
                      // Aggregate by (pop, tokens) -> dest_class -> union of states
                      let mut per_key: BTreeMap<(isize, SortedSet), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in &node.children {
                          let inner = per_key.entry((ek.pop, ek.tokens.clone())).or_default();
                          for (dst, sids) in dm.iter() {
                              let d_dense = *dense_of.get(dst).unwrap();
                              let d_class = prev_class[d_dense];
                              let entry = inner.entry(d_class).or_default();
                              entry.union_inplace(sids);
                          }
                      }

                      // Build canonical signature vector
                      let mut esigs: Vec<EdgeSig> = Vec::with_capacity(per_key.len());
                      for ((pop, toks), dm_class) in per_key.into_iter() {
                          let mut dest_vec: Vec<(usize, SortedSet)> = dm_class.into_iter().collect();
                          dest_vec.sort_unstable_by(|a, b| {
                              let c = a.0.cmp(&b.0);
                              if c != std::cmp::Ordering::Equal {
                                  return c;
                              }
                              a.1.cmp(&b.1)
                          });
                          esigs.push(EdgeSig {
                              pop,
                              tokens: toks,
                              dest: dest_vec,
                          });
                      }
                      let sig: NodeSig = (node.end, esigs);

                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let v = next;
                          next += 1;
                          v
                      });
                      new_class[i] = cid;
                      if new_class[i] != prev_class[i] {
                          changes += 1;
                      }
                  }
                  prev_class = new_class;
                  if changes == 0 {
                      break;
                  }
              }

              // Build representative mapping
              let num_classes = prev_class.iter().max().map(|x| *x + 1).unwrap_or(0);
              let mut rep_of_class: Vec<Option<NodeId>> = vec![None; num_classes];
              for (i, &cid) in prev_class.iter().enumerate() {
                  if rep_of_class[cid].is_none() {
                      rep_of_class[cid] = Some(old_of[i]);
                  }
              }
              let mut rep_of_node: HashMap<NodeId, NodeId> = HashMap::with_capacity(n);
              for (i, node_id) in old_of.iter().enumerate() {
                  let cid = prev_class[i];
                  rep_of_node.insert(*node_id, rep_of_class[cid].unwrap());
              }

              // Rewire edges to representatives and union state-sets
              for node in trie.nodes.iter_mut() {
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (ek, dm) in node.children.clone() {
                      let mut d2: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                      for (dst, sids) in dm {
                          let rep = *rep_of_node.get(&dst).unwrap_or(&dst);
                          d2.entry(rep)
                              .and_modify(|e| e.union_inplace(&sids))
                              .or_insert(sids);
                      }
                      if !d2.is_empty() {
                          new_children.insert(ek, d2);
                      }
                  }
                  node.children = new_children;
              }
          }
      }
