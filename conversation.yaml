      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::sync::{Arc};

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct GSSNode<T> {
          pub value: T,
          predecessors: Vec<Arc<GSSNode<T>>>,
      }

      impl<T> GSSNode<T> {
          pub fn new(value: T) -> Self {
              Self {
                  value,
                  predecessors: Vec::new(),
              }
          }
          pub fn new_with_predecessors(value: T, predecessors: Vec<Arc<GSSNode<T>>>) -> Self {
              Self {
                  value,
                  predecessors: predecessors.into_iter().collect(),
              }
          }

          pub fn from_iter<I>(iter: I) -> Self
          where
              I: IntoIterator<Item = T>,
          {
              let mut iter = iter.into_iter();
              let mut root = Self::new(iter.next().unwrap());
              for value in iter {
                  root = root.push(value);
              }
              root
          }

          pub fn push(self, value: T) -> Self {
              let mut new_node = Self::new(value);
              new_node.predecessors.push(Arc::new(self));
              new_node
          }

          pub fn pop(&self) -> Vec<Arc<Self>> {
              self.predecessors.clone()
          }

          pub fn popn(&self, n: usize) -> Vec<Arc<Self>>
          where
              T: Clone,
          {
              if n == 0 {
                  return vec![Arc::new(self.clone())];
              }

              let mut result = Vec::new();
              let mut seen: HashSet<*const GSSNode<T>> = HashSet::new();

              // recurse on predecessors and collect, skipping duplicates
              for predecessor in &self.predecessors {
                  for node in predecessor.popn(n - 1) {
                      let ptr = Arc::as_ptr(&node);
                      if seen.insert(ptr) {
                          result.push(node);
                      }
                  }
              }

              result
          }

          pub fn peek(&self) -> &T {
              &self.value
          }

          pub fn value_mut(&mut self) -> &mut T {
              &mut self.value
          }

          pub fn flatten(&self) -> Vec<Vec<T>>
          where
              T: Clone,
          {
              let mut result = Vec::new();
              let mut stack = Vec::new();
              stack.push((self, Vec::new()));
              while let Some((node, mut path)) = stack.pop() {
                  path.push(node.value.clone());
                  if node.predecessors.is_empty() {
                      result.push(path);
                  } else {
                      for predecessor in &node.predecessors {
                          stack.push((predecessor, path.clone()));
                      }
                  }
              }
              result
          }

          pub fn flatten_bulk(nodes: &[Self]) -> Vec<Vec<T>>
          where
              T: Clone,
          {
              nodes.iter().flat_map(|node| node.flatten()).collect()
          }

          pub fn merge(&mut self, mut other: Self)
          where
              T: PartialEq,
          {
              assert!(self.value == other.value);
              self.predecessors.append(&mut other.predecessors);
          }

          pub fn merge_unchecked(&mut self, mut other: Self)
          where
              T: PartialEq,
          {
              self.predecessors.append(&mut other.predecessors);
          }

          pub fn map<F, U>(&self, f: F) -> GSSNode<U>
          where
              F: Copy + Fn(&T) -> U,
          {
              GSSNode {
                  value: f(&self.value),
                  predecessors: self.predecessors.clone().into_iter()
                      .map(|node| Arc::new(node.map(f)))
                      .collect(),
              }
          }
      }

      impl<T> Drop for GSSNode<T> {
          fn drop(&mut self) {
              let mut cur_nodes = std::mem::take(&mut self.predecessors);
              while let Some(node) = cur_nodes.pop() {
                  if let Ok(mut inner_node) = Arc::try_unwrap(node) {
                      cur_nodes.append(&mut inner_node.predecessors);
                  }
              }
          }
      }

      pub trait GSSTrait<T: Clone> {
          type Peek<'a> where T: 'a, Self: 'a;
          fn peek(&self) -> Self::Peek<'_>;
          fn push(&self, value: T) -> GSSNode<T>;
          fn pop(&self) -> Vec<Arc<GSSNode<T>>>;
          fn popn(&self, n: usize) -> Vec<Arc<GSSNode<T>>>;
      }

      impl<T: Clone> GSSTrait<T> for GSSNode<T> {
          type Peek<'a> = &'a T where T: 'a;

          fn peek(&self) -> Self::Peek<'_> {
              &self.value
          }

          fn push(&self, value: T) -> GSSNode<T> {
              let mut new_node = GSSNode::new(value);
              new_node.predecessors.push(Arc::new(self.clone()));
              new_node
          }

          fn pop(&self) -> Vec<Arc<GSSNode<T>>> {
              self.predecessors.clone()
          }

          fn popn(&self, n: usize) -> Vec<Arc<GSSNode<T>>> {
              // Delegate to the inherent, de-duplicating implementation above
              GSSNode::popn(self, n)
          }
      }

      impl<T: Clone> GSSTrait<T> for Arc<GSSNode<T>> {
          type Peek<'a> = &'a T where T: 'a;

          fn peek(&self) -> Self::Peek<'_> {
              &self.value
          }

          fn push(&self, value: T) -> GSSNode<T> {
              let mut new_node = GSSNode::new(value);
              new_node.predecessors.push(self.clone());
              new_node
          }

          fn pop(&self) -> Vec<Arc<GSSNode<T>>> {
              self.predecessors.clone()
          }

          fn popn(&self, n: usize) -> Vec<Arc<GSSNode<T>>> {
              // Re-use the implementation on the underlying node, which already de-duplicates.
              self.as_ref().popn(n)
          }
      }

      impl<T: Clone> GSSTrait<T> for Option<Arc<GSSNode<T>>> {
          type Peek<'a> = Option<&'a T> where T: 'a;

          fn peek(&self) -> Self::Peek<'_> {
              self.as_ref().map(|node| node.peek())
          }

          fn push(&self, value: T) -> GSSNode<T> {
              self.clone().map(|node| node.push(value.clone())).unwrap_or_else(|| GSSNode::new(value))
          }

          fn pop(&self) -> Vec<Arc<GSSNode<T>>> {
              self.as_ref().map(|node| node.pop()).unwrap_or_default()
          }

          fn popn(&self, n: usize) -> Vec<Arc<GSSNode<T>>> {
              self.as_ref().map(|node| node.popn(n)).unwrap_or_default()
          }
      }

      impl<T: Clone> GSSTrait<T> for Option<GSSNode<T>> {
          type Peek<'a> = Option<&'a T> where T: 'a;

          fn peek(&self) -> Self::Peek<'_> {
              self.as_ref().map(|node| node.peek())
          }

          fn push(&self, value: T) -> GSSNode<T> {
              self.clone().map(|node| node.push(value.clone())).unwrap_or_else(|| GSSNode::new(value))
          }

          fn pop(&self) -> Vec<Arc<GSSNode<T>>> {
              self.as_ref().map(|node| node.pop()).unwrap_or_default()
          }

          fn popn(&self, n: usize) -> Vec<Arc<GSSNode<T>>> {
              self.as_ref().map(|node| node.popn(n)).unwrap_or_default()
          }
      }

      pub trait BulkMerge<T> {
          fn bulk_merge(&mut self);
      }

      impl<T: Clone + Ord> BulkMerge<T> for Vec<Arc<GSSNode<T>>> {
          fn bulk_merge(&mut self) {
              // todo: should be possible to avoid cloning T in some cases by using &T in this map,
              //  but we need to be careful about lifetimes. If we use `node.as_ref().value`, then node
              //  will go out of bounds while the reference to its value is still inside `groups`.
              let mut groups: BTreeMap<T, HashMap<_, Arc<GSSNode<T>>>> = BTreeMap::new();
              for node in self.drain(..) {
                  groups.entry(node.value.clone()).or_default().entry(Arc::as_ptr(&node)).or_insert(node);
              }
              for mut group in groups.into_values() {
                  let mut group = group.into_values().collect::<Vec<_>>();
                  let mut first = group.pop().unwrap();
                  if group.is_empty() {
                      self.push(first);
                  } else {
                      let mut predecessors_set: BTreeMap<_, _> = BTreeMap::new();
                      for sibling in group {
                          for predecessor in &sibling.predecessors {
                              predecessors_set.insert(Arc::as_ptr(predecessor), predecessor.clone());
                          }
                      }
                      let first_mut_ref = Arc::make_mut(&mut first);
                      first_mut_ref.predecessors = predecessors_set.into_values().collect();
                      self.push(first);
                  }
              }
          }
      }


      // Helper function for prune_and_transform_roots
      pub fn prune_and_transform_recursive<T: Clone>(
          node_arc: &Arc<GSSNode<T>>,
          closure: &impl Fn(&T) -> Option<(T, bool)>, // Returns Option<(NewValue, ContinueRecursion)>
          memo: &mut HashMap<*const GSSNode<T>, Option<Arc<GSSNode<T>>>>,
      ) -> Option<Arc<GSSNode<T>>> {
          // TODO: clean up
          let node_ptr = Arc::as_ptr(node_arc);
          if let Some(cached_result) = memo.get(&node_ptr) {
              return cached_result.clone();
          }

          match closure(&node_arc.value) {
              None => {
                  // Prune this node
                  memo.insert(node_ptr, None);
                  None
              }
              Some((new_value, continue_recursion)) => {
                  let new_node_arc = if !continue_recursion {
                      // Stop recursion, create new node with original predecessors but new value
                      let mut transformed_predecessors = Vec::new();
                      for pred_arc in &node_arc.predecessors {
                           // Check memo for already transformed predecessor
                          if let Some(existing_transformed) = memo.get(&Arc::as_ptr(pred_arc)) {
                              if let Some(transformed_pred) = existing_transformed {
                                  transformed_predecessors.push(transformed_pred.clone());
                              }
                              // If existing_transformed is None, the predecessor was pruned, so skip.
                              println!("Skipping pruned predecessor");
                          } else {
                              // This case *shouldn't* happen if traversal order is correct (parents processed after children),
                              // but as a fallback, keep the original if not found in memo. Or perhaps panic?
                              // Let's assume the caller manages the order or this closure handles cycles/shared nodes correctly.
                              // For simplicity now, let's just clone original predecessors if we stop early.
                              // A more robust solution might involve ensuring all nodes are visited before finalizing.
                              // Revisit required: This might lead to incorrect sharing if predecessors weren't processed.
                              // A better approach for early stop might be needed, maybe marking nodes instead.
                              // For now, let's stick to the logic: if we stop, we keep original pointers below.
                               transformed_predecessors = node_arc.predecessors.clone(); // Keep original predecessors - CAUTION
                               crate::debug!(3, "Keeping {} original predecessors", transformed_predecessors.len());
                               break; // Exit loop once we decide to keep originals
                          }
                      }

                      Arc::new(GSSNode::new_with_predecessors(new_value, transformed_predecessors))
                  } else {
                      // Continue recursion for predecessors
                      let mut new_predecessors = Vec::new();
                      for pred_arc in &node_arc.predecessors {
                          if let Some(new_pred) = prune_and_transform_recursive(pred_arc, closure, memo) {
                              new_predecessors.push(new_pred);
                          }
                      }

                      // Only create a node if it has predecessors OR it's an original root (how to check?).
                      // If new_predecessors is empty AND the original node had predecessors, it means all paths were pruned.
                      if new_predecessors.is_empty() && !node_arc.predecessors.is_empty() {
                           memo.insert(node_ptr, None); // Mark as pruned
                           return None; // Return None, pruning this node
                      } else {
                           Arc::new(GSSNode::new_with_predecessors(new_value, new_predecessors))
                      }
                  };
                  memo.insert(node_ptr, Some(new_node_arc.clone()));
                  Some(new_node_arc)
              }
          }
      }

      /// Traverses the GSS forest defined by `roots`, applying `closure` to each node's value.
      /// Handles shared nodes using memoization. Prunes branches where `closure` returns `None`.
      /// Stops recursion down a path if `closure` returns `(_, false)`.
      /// Returns a Vec of `Option<Arc<GSSNode<T>>>` corresponding to the input `roots`.
      pub fn prune_and_transform_roots<T: Clone>(
          roots: &[Arc<GSSNode<T>>],
          closure: &impl Fn(&T) -> Option<(T, bool)>, // Returns Option<(NewValue, ContinueRecursion)>
      ) -> Vec<Option<Arc<GSSNode<T>>>> {
          // We need a processing order that ensures children are processed before parents
          // if we want the early-stop optimization (`continue_recursion = false`) to work reliably
          // with shared nodes. A simple recursive approach might process shared children multiple times
          // or incorrectly reuse non-transformed predecessors.
          // For now, let's proceed with the simple recursive approach + memoization, acknowledging the
          // potential issue with the early-stop logic accuracy for shared nodes below the stop point.
          // A full topological sort or iterative approach might be needed for perfect early-stop.

          let mut memo = HashMap::new();
          roots
              .iter()
              .map(|root| prune_and_transform_recursive(root, closure, &mut memo))
              .collect()
      }


      /// Statistics about the structure of a GSS forest.
      #[derive(Debug, Clone, Default)]
      pub struct GSSStats {
          /// Number of root nodes provided.
          pub num_roots: usize,
          /// Total number of unique nodes reachable from the roots.
          pub unique_nodes: usize,
          /// Maximum depth encountered (distance from a root node).
          pub max_depth: usize,
          /// Average depth of nodes (distance from a root node).
          pub average_depth: f64,
          /// Number of nodes with more than one predecessor (merge points).
          pub merge_points: usize,
          /// Maximum number of predecessors for any single node.
          pub max_predecessors: usize,
          /// Average number of predecessors per node.
          pub average_predecessors: f64,
      }

      /// Gathers statistics about the GSS forest defined by the given roots.
      /// Traverses the graph using BFS to calculate depths from roots.
      pub fn gather_gss_stats<T: Clone>(roots: &[Arc<GSSNode<T>>]) -> GSSStats {
          let mut stats = GSSStats::default();
          stats.num_roots = roots.len();

          let mut visited: HashSet<*const GSSNode<T>> = HashSet::new();
          let mut queue: VecDeque<(Arc<GSSNode<T>>, usize)> = VecDeque::new(); // (node, depth)

          let mut total_depth_sum: u64 = 0;
          let mut total_predecessors_sum: u64 = 0;

          for root_arc in roots {
              let root_ptr = Arc::as_ptr(root_arc);
              if visited.insert(root_ptr) {
                  queue.push_back((root_arc.clone(), 0));
              }
          }

          while let Some((current_node_arc, current_depth)) = queue.pop_front() {
              let current_node = current_node_arc.as_ref(); // Borrow the content
              stats.unique_nodes += 1;
              stats.max_depth = stats.max_depth.max(current_depth);
              total_depth_sum += current_depth as u64;

              let num_predecessors = current_node.predecessors.len();
              stats.max_predecessors = stats.max_predecessors.max(num_predecessors);
              total_predecessors_sum += num_predecessors as u64;
              if num_predecessors > 1 {
                  stats.merge_points += 1;
              }

              for pred_arc in &current_node.predecessors {
                  let pred_ptr = Arc::as_ptr(pred_arc);
                  if visited.insert(pred_ptr) {
                      queue.push_back((pred_arc.clone(), current_depth + 1));
                  }
              }
          }

          if stats.unique_nodes > 0 {
              stats.average_depth = total_depth_sum as f64 / stats.unique_nodes as f64;
              stats.average_predecessors = total_predecessors_sum as f64 / stats.unique_nodes as f64;
          }

          stats
      }
    src/glr/parser.rs: |-
      use crate::datastructures::gss::{BulkMerge, gather_gss_stats};
      use crate::glr::grammar::{NonTerminal, Production, Symbol, Terminal};
      use crate::glr::items::Item;
      use crate::glr::table::{
          NonTerminalID, ProductionID, Stage7ShiftsAndReduces, Stage7Table, StateID, TerminalID,
      };
      use crate::datastructures::gss::{GSSNode, GSSTrait, GSSStats};

      use bimap::BiBTreeMap;
      use std::collections::{BTreeMap, BTreeSet};
      use std::fmt::{Debug, Display, Formatter};
      use std::hash::Hash;
      use std::sync::Arc;
      use crate::debug;

      pub trait MergeAndIntersect: Sized + Clone + Debug + Eq + PartialEq + Ord + PartialOrd + Hash {
          /// Merges the information represented by `self` and `other`.
          fn merge(&self, other: &Self) -> Self;
          /// Intersects the information represented by `self` and `other`.
          fn intersect(&self, other: &Self) -> Self;
      }

      impl MergeAndIntersect for () {
          fn merge(&self, _: &Self) -> Self { () }
          fn intersect(&self, _: &Self) -> Self { () }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateNodeContent<T: MergeAndIntersect> {
          pub state_id: StateID,
          pub t: T,
      }
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseState<T: MergeAndIntersect> {
          pub stack: Arc<GSSNode<ParseStateNodeContent<T>>>,
              // self.merge_active_states();
          }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub enum StopReason {
          ActionNotFound,
          GotoNotFound,
      }


      // TODO: should this *really* derive `Clone`? Users probably shouldn't clone this, should they?
      #[derive(Clone)]
      pub struct GLRParser {
          pub stage_7_table: Stage7Table,
          pub productions: Vec<Production>,
          pub terminal_map: BiBTreeMap<Terminal, TerminalID>,
          pub non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
          pub item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
          pub start_state_id: StateID,
      }

      impl GLRParser {
          pub fn new(
              stage_7_table: Stage7Table,
              productions: Vec<Production>,
              terminal_map: BiBTreeMap<Terminal, TerminalID>,
              non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
              item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
              start_state_id: StateID,
          ) -> Self {
              Self {
                  stage_7_table,
                  productions,
                  terminal_map,
                  non_terminal_map,
                  item_set_map,
                  start_state_id,
              }
          }

          pub fn init_glr_parser<T: MergeAndIntersect + Default>(&self) -> GLRParserState<T> {
              self.init_glr_parser_with_t(T::default())
          }

          pub fn init_glr_parser_with_t<T: MergeAndIntersect>(&self, t: T) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: vec![self.init_parse_state_with_t(t)],
                  action_not_found_states: Vec::new(),
              }
          }
          pub fn init_glr_parser_from_parse_state<T: MergeAndIntersect>(&self, parse_state: ParseState<T>) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: vec![parse_state],
                  action_not_found_states: Vec::new(),
              }
          }

          pub fn init_glr_parser_from_parse_states<T: MergeAndIntersect>(
              &self,
              parse_states: Vec<ParseState<T>>,
          ) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: parse_states,
                  action_not_found_states: Vec::new(),
              }
          }

          pub fn init_parse_state<T: MergeAndIntersect + Default>(&self) -> ParseState<T> {
              self.init_parse_state_with_t(T::default())
          }

          pub fn init_parse_state_with_t<T: MergeAndIntersect>(&self, t: T) -> ParseState<T> {
              let initial_content = ParseStateNodeContent {
                  state_id: self.start_state_id,
                  t,
              };
              ParseState {
                  stack: Arc::new(GSSNode::new(initial_content)),
              }
          }

          pub fn parse<T: MergeAndIntersect + Default>(&self, input: &[TerminalID]) -> GLRParserState<T> {
              let mut state = self.init_glr_parser();
              state.parse(input);
              state
          }
      }

      impl Debug for GLRParser {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              write!(f, "{}", self)
          }
      }

      impl Display for GLRParser {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              let stage_7_table = &self.stage_7_table;
              let terminal_map = &self.terminal_map;
              let non_terminal_map = &self.non_terminal_map;
              let item_set_map = &self.item_set_map;

              writeln!(f, "Parse Table:")?;
              writeln!(f, "  Start State: {}", self.start_state_id.0)?;
              for (&state_id, row) in stage_7_table.iter().collect::<BTreeMap<_, _>>() {
                  writeln!(f, "  State {}:", state_id.0)?;

                  writeln!(f, "    Items:")?;
                  let item_set = item_set_map.get_by_right(&state_id).unwrap();
                  for item in item_set {
                      write!(f, "      - {} ->", item.production.lhs.0)?;
                      for (i, symbol) in item.production.rhs.iter().enumerate() {
                          if i == item.dot_position {
                              write!(f, " •")?;
                          }
                          match symbol {
                              Symbol::Terminal(terminal) => write!(f, " {:?}", terminal.0)?,
                              Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0)?,
                          }
                      }
                      if item.dot_position == item.production.rhs.len() {
                          write!(f, " •")?;
                      }
                      writeln!(f)?;
                  }

                  writeln!(f, "    Actions:")?;
                  for (&terminal_id, action) in &row.shifts_and_reduces {
                      let terminal = terminal_map.get_by_right(&terminal_id).unwrap();
                      match action {
                          Stage7ShiftsAndReduces::Shift(next_state_id) => {
                              writeln!(f, "      - {:?} -> Shift {}", terminal.0, next_state_id.0)?;
                          }
                          Stage7ShiftsAndReduces::Reduce { production_id, nonterminal_id: nonterminal, len } => {
                              let nt = non_terminal_map.get_by_right(nonterminal).unwrap();
                              writeln!(f, "      - {:?} -> Reduce {} (len {})", terminal.0, nt.0, len)?;
                          }
                          Stage7ShiftsAndReduces::Split { shift, reduces } => {
                              writeln!(f, "      - {:?} -> Conflict:", terminal.0)?;
                              if let Some(shift_state) = shift {
                                  writeln!(f, "        - Shift {}", shift_state.0)?;
                              }
                              for (len, nt_id_to_prod_ids) in reduces {
                                  writeln!(f, "        - Reduce (len {}):", len)?;
                                  for (nt_id, prod_ids) in nt_id_to_prod_ids {
                                      let nt = non_terminal_map.get_by_right(nt_id).unwrap();
                                      for prod_id in prod_ids {
                                          let prod = self.productions.get(prod_id.0).unwrap();
                                          writeln!(f, "          - {} -> {}", nt.0, prod.lhs.0)?;
                                      }
                                  }

                              }
                          }
                      }
                  }

                  writeln!(f, "    Gotos:")?;
                  for (&non_terminal_id, &next_state_id) in &row.gotos {
                      let non_terminal = non_terminal_map.get_by_right(&non_terminal_id).unwrap();
                      writeln!(f, "      - {} -> {}", non_terminal.0, next_state_id.0)?;
                  }
              }

              writeln!(f, "\nTerminal Map (name to terminal ID):")?;
              for (terminal, terminal_id) in terminal_map {
                  writeln!(f, "  {} -> {}", terminal.0, terminal_id.0)?;
              }

              writeln!(f, "\nNon-Terminal Map:")?;
              for (non_terminal, non_terminal_id) in non_terminal_map {
                  writeln!(f, "  {} -> {}", non_terminal.0, non_terminal_id.0)?;
              }

              Ok(())
          }
      }

      #[derive(Debug, Clone)]
      pub struct GLRParserState<'a, T: MergeAndIntersect> {
          pub parser: &'a GLRParser,
          pub active_states: Vec<ParseState<T>>,
          pub action_not_found_states: Vec<ParseState<T>>,
      }

      impl<'a, T: MergeAndIntersect> GLRParserState<'a, T> {
          pub fn parse(&mut self, input: &[TerminalID]) {
              self.parse_part(input);
          }

          pub fn parse_part(&mut self, input: &[TerminalID]) {
              for &token_id in input {
                  self.step(token_id);
              }
          }

          pub fn and_step(mut self, token_id: TerminalID) -> Self {
              self.step(token_id);
              self
          }

          pub fn and_parse(mut self, input: &[TerminalID]) -> Self {
              self.parse(input);
              self
          }

          pub fn step(&mut self, token_id: TerminalID) {
              // Gather and log GSS stats before processing the step
              let root_nodes: Vec<_> = self.active_states.iter().map(|s| s.stack.clone()).collect();
              let stats = gather_gss_stats(&root_nodes);
              crate::debug!(3, "Step Start (Token {:?}): Active States: {}, GSS Stats: {:?}", token_id, self.active_states.len(), stats);
              let mut next_active_states = Vec::new();
              // This will store states where the current token_id leads to no action.
              let mut current_action_not_found_states = Vec::new();

              while let Some(state) = self.active_states.pop() {
                  let stack = state.stack; // Arc<GSSNode<ParseStateNodeContent<T>>>
                  let current_content = stack.peek(); // &ParseStateNodeContent<T>
                  let current_state_id = current_content.state_id;
                  let current_t = &current_content.t;

                  let row = self.parser.stage_7_table.get(&current_state_id).unwrap();

                  if let Some(action) = row.shifts_and_reduces.get(&token_id) {
                      match action {
                          Stage7ShiftsAndReduces::Shift(next_state_id) => {
                              debug!(5, "State {} -> {}: Shifting", current_state_id.0, next_state_id.0);
                              let new_content = ParseStateNodeContent { state_id: *next_state_id, t: current_t.clone() };
                              let new_stack = stack.push(new_content);
                              next_active_states.push(ParseState {
                                  // stack: Arc::new(new_stack), // GSSNode::push now returns Arc
                                  stack: Arc::new(new_stack),
                              });
                          }
                          Stage7ShiftsAndReduces::Reduce { production_id, nonterminal_id: nonterminal, len } => {
                              let nt_name = self.parser.non_terminal_map.get_by_right(nonterminal).unwrap();
                              let node_ptr = Arc::as_ptr(&stack);
                              debug!(5, "State {}, Node {:?}: Reducing by production {} ({}) with len {}", current_state_id.0, node_ptr, production_id.0, nt_name.0, len);
                              let mut popped_stack_nodes = stack.popn(*len);
                              let gt = popped_stack_nodes.len() > 1;
                              if gt { crate::debug!(4, "Popped {} times to reveal {} stack nodes (1)", len, popped_stack_nodes.len()); }
                              popped_stack_nodes.bulk_merge();
                              if gt { crate::debug!(4, "Merged into {} stack nodes (1)", popped_stack_nodes.len()); }
                              let mut new_stacks = Vec::new();
                              for stack_node in popped_stack_nodes {
                                  // stack_node is Arc<GSSNode<ParseStateNodeContent<T>>>
                                  let revealed_content = stack_node.peek(); // &ParseStateNodeContent<T>
                                  let revealed_state_id = revealed_content.state_id;
                                  let revealed_t = &revealed_content.t;
                                  let goto_state = self.parser.stage_7_table[&revealed_state_id].gotos[nonterminal];

                                  let node_ptr = Arc::as_ptr(&stack_node);
                                  debug!(5, "  Node {:?}: Revealed state {}, going to state {} for NonTerminal {}", node_ptr, revealed_state_id.0, goto_state.0, nt_name.0);
                                  let combined_t = revealed_t.intersect(current_t);
                                  let new_content = ParseStateNodeContent { state_id: goto_state, t: combined_t };
                                  let new_stack = stack_node.push(new_content);
                                  new_stacks.push(Arc::new(new_stack));
                              }
                              new_stacks.bulk_merge();
                              for stack in new_stacks {
                                  self.active_states.push(ParseState {
                                      stack,
                                  });
                              }
                          }
                          Stage7ShiftsAndReduces::Split { shift, reduces } => {
                              debug!(4, "Split");
                              let mut new_stacks = Vec::new();
                              if let Some(shift_state) = shift {
                                  // Shift part (same as above)
                                  let new_content = ParseStateNodeContent { state_id: *shift_state, t: current_t.clone() };
                                  let new_stack = stack.push(new_content);
                                  new_stacks.push(Arc::new(new_stack));
                              }

                              crate::debug!(4, "Reduces: {}", reduces.len());
                              for (len, nt_ids) in reduces {
                                  let mut popped_stack_nodes = stack.popn(*len);
                                  popped_stack_nodes.bulk_merge();
                                  crate::debug!(4, "Popped {} times to reveal {} stack nodes", len, popped_stack_nodes.len());
                                  crate::debug!(4, "nt_ids.len(): {}", nt_ids.len());
                                  for (nt_id, _prod_ids) in nt_ids { // Iterate over NonTerminalIDs in the split reduce
                                      let nt_name = self.parser.non_terminal_map.get_by_right(nt_id).unwrap();
                                      debug!(5, "  - Reducing for NonTerminal {} ({})", nt_name.0, nt_id.0);
                                      for stack_node in &popped_stack_nodes {
                                          // Reduce part (same as above)
                                          let revealed_content = stack_node.peek();
                                          let revealed_state_id = revealed_content.state_id;
                                          let revealed_t = &revealed_content.t;
                                          let goto_state = self.parser.stage_7_table[&revealed_state_id].gotos[nt_id]; // Use the current nt_id for goto lookup

                                          let combined_t = revealed_t.intersect(current_t);
                                          let new_content = ParseStateNodeContent { state_id: goto_state, t: combined_t };
                                          let new_stack = stack_node.push(new_content);
                                          new_stacks.push(Arc::new(new_stack));
                                      }
                                  }
                              }
                              new_stacks.bulk_merge();
                              for stack in new_stacks {
                                  self.active_states.push(ParseState {
                                      stack,
                                  });
                              }
                          }
                      }
                  } else {
                      // No action found for this token in this state
                      current_action_not_found_states.push(ParseState {
                          stack,
                      });
                  }
              }
              self.active_states = next_active_states;
              self.action_not_found_states = current_action_not_found_states; // Replace previous not-found states

              let end_root_nodes: Vec<_> = self.active_states.iter().map(|s| s.stack.clone()).collect();
              let end_stats = gather_gss_stats(&end_root_nodes);
              crate::debug!(3, "Step End (Token {:?}): Active States: {}, Action Not Found: {}, GSS Stats: {:?}", token_id, self.active_states.len(), self.action_not_found_states.len(), end_stats);

              // TODO: decide whether to keep action_not_found_states or not
              self.action_not_found_states.clear();
          }

          // TODO: Review merge logic, especially interaction with GSSNode::merge and ParseState::merge
          pub fn merge_active_states(&mut self) {
              let mut active_state_map: BTreeMap<ParseStateKey, ParseState<T>> = BTreeMap::new();
              let num_active_states = self.active_states.len();

              for state in std::mem::take(&mut self.active_states) {
                  let key = state.key();
                  active_state_map.insert_with(key, state, |existing, new_state| {
                      existing.merge(new_state);
                  });
              }

              crate::debug!(3, "Merged {} active states into {} active states", num_active_states, active_state_map.len());
              self.active_states = active_state_map.into_values().collect();
          }

          pub fn merge_with(&mut self, other: GLRParserState<T>) {
              assert!(std::ptr::eq(self.parser, other.parser));
              self.active_states.extend(other.active_states);
              self.action_not_found_states.extend(other.action_not_found_states);
              // Consider merging active states here if performance becomes an issue
              // self.merge_active_states();
          }

          pub fn is_ok(&self) -> bool {
              !self.active_states.is_empty()
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
          stack_state_id: StateID,
          // Removed action_stack
      }

      impl<T: MergeAndIntersect> ParseState<T> {
          pub fn key(&self) -> ParseStateKey {
              ParseStateKey {
                  stack_state_id: self.stack.peek().state_id,
              }
          }

          /// Merges `other` into `self`. Assumes `self.key() == other.key()`.
          /// Merges the GSS structures and combines the `t` value at the top node using `MergeAndIntersect::merge`.
          pub fn merge(&mut self, other: ParseState<T>) {
              assert_eq!(self.key(), other.key());

              // Combine 't' values at the top node using 'or'
              let self_content = self.stack.peek();
              let other_content = other.stack.peek();
              let combined_t = self_content.t.merge(&other_content.t);

              // Get mutable access to self.stack, potentially cloning if shared (Arc > 1)
              let mut mutable_stack = Arc::make_mut(&mut self.stack);

              // Update the 't' value in the mutable top node's content
              mutable_stack.value.t = combined_t;

              // Merge the parent structures using GSSNode's merge
              mutable_stack.merge_unchecked(Arc::unwrap_or_clone(other.stack));
          }
      }

      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }

      impl<K, V> InsertWith<K, V> for BTreeMap<K, V> where K: Eq + Ord {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F) {
              match self.entry(k) {
                  std::collections::btree_map::Entry::Occupied(mut occupied) => {
                      let value = occupied.get_mut();
                      combine(value, v);
                  }
                  std::collections::btree_map::Entry::Vacant(vacant) => {
                      vacant.insert(v);
                  }
              }
          }
      }
