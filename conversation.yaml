                          terminal_map,
                          non_terminal_map,
                          item_set_map,
                          start_state_id,
                          ignore_terminal_id,
                      })
                  }
                  _ => Err("Expected JSONNode::Object for GLRParser".to_string()),
              }
          }
      }

