      # Step-by-Step Instructions

      Looking at the optimization statistics, we see **zero sharing** between templates despite having 29,371 nodes across 80 templates. This suggests the current optimization is too conservative or not finding equivalent subgraphs effectively.

      ## Analysis of the Problem

      The current `structural_merge_nodes_in_subgraph` function uses color refinement with several conservative restrictions:
      1. **Post-Pop pinning**: All nodes that are targets of Pop edges are pinned, preventing them from being merged
      2. **Reachability antichain**: Only merges nodes that aren't reachable from each other
      3. **Limited iterations**: Only 3 passes in the global optimizer

      ## Proposed Solution

