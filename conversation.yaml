                              .entry(lbl)
                              .or_default()
                              .push((to_new, w.clone()));
                      }
                  }
              }

              (new_start, remap)
          }
      }

      impl Index<NWAStateID> for NWAStates {
          type Output = NWAState;

          fn index(&self, index: NWAStateID) -> &Self::Output {
