              assert!(u8set_a.contains(b'a'));
              assert_eq!(u8set_a.iter().collect::<Vec<u8>>(), vec![b'a']);

              let u8set_b = group_id_to_u8set.get(&1).unwrap();
              assert!(u8set_b.contains(b'b'));
              assert_eq!(u8set_b.iter().collect::<Vec<u8>>(), vec![b'b']);
          }

