      #[test]
      fn test_determinize_hypercube_catastrophe() {
          const N: usize = 4;
          let alphabet: Vec<i16> = (0..N as i16).map(|i| i + 'a' as i16).collect();
          let atoms: Vec<Weight> = (0..N).map(Weight::from_item).collect();

          let mut nwa = NWA::new();
