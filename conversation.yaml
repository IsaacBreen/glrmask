      Step-by-step instructions

      1. Why the node count oscillates so much
         - The largest spikes in node/edge counts happen immediately after eliminating pop=0 edges (our epsilon-like transitions). Eliminating pop=0 edges composes every predecessor A of a pop0-source B with B’s outgoing edges to C, emitting A→C edges with LLM masks and state intersections. This “fan-out composition” can multiply edges combinatorially (A×out(B)) across many nodes, creating many leaves and parallel structures.
         - Later passes (pruning, merging) do reduce the blow-up, but currently we do not run a strong merge phase immediately after pop=0 elimination. That is why the stats swing: eliminate (explosion) → prune/merge (compression) → eliminate again (explosion) → …

      2. Core idea: coarsest stable quotient immediately after pop=0 elimination
         - Mathematically, once pop=0 edges are removed (except allowed root ones), the resulting structure is easier to minimize. We can compute (and we already have implementations of) the coarsest forward-stable partition (a.k.a. the largest bisimulation) using our “structural” and “exact” merge passes.
         - If we always run a full “post-pop0-elim minimization block” right after elimination, we collapse many freshly-duplicated nodes and edges immediately, preventing blow-up from persisting to subsequent passes.

      3. What we change
         - Add a new “post-pop0-elim cleanup” block directly after eliminate_pop0_edges_except_roots_trie3:
           1) prune dead paths,
           2) GC,
           3) merge structurally,
           4) compress edges + unary chains,
           5) merge exactly,
           6) prune nodes not reaching end,
           7) compress edges + unary chains again,
           8) optionally refine token atoms (fast, then exact).
