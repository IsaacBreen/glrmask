      3) Fast-path when compiling groups with ALL weight
      - Idea: compiled_group_for(key=(mask, w)) computes a new StepVec by intersecting each mask entry with w. If w is ALL, the compiled group is identical to mask. We can return the mask immediately and cache the result without recomputation or allocation.
      - Implementation:
        - In compiled_group_for, if key.w.is_all_fast(), return key.mask directly.

      4) Bound unbounded caches to prevent memory blow-ups
      - Idea: compiled_group_cache and stepvec_union_cache keep growing without bound. On very large inputs this can exhaust memory. Clear these caches when they exceed a reasonable size. This trades (small) recomputation for keeping memory bounded.
      - Implementation:
        - Add simple size limits and clear caches when they exceed thresholds (constants inside determinization).

      5) Per-subset label pattern grouping
      - Idea: For a given subset (DWA state under construction), many labels induce exactly the same “pattern” across the subset: which entries use explicit edges and, for each, which StepGroupKey (mask+weight) they use. Instead of recomputing ex_add_map and def_sub_map per label, compute them once per label-class (pattern) and then apply to all labels in that class. This leverages the common tokenizer structure (large default, small sets of explicit char classes) to reduce determinization work by orders of magnitude.

      - Correctness:
        - For a fixed subset S, a label l’s effect is completely determined by:
          - the set of subset indices that have an explicit transition on l, and
          - the StepGroupKey (mask, weight) used by each explicit transition.
        - If two labels share this entire assignment, then the resulting target subset and edge weight are identical. Thus, we can compute the target once and add transitions for all labels in that label-class.

      - Implementation:
        - Build label_to_indices (as before), then group labels into classes keyed by a LabelPatternKey: a sorted vector of (subset-index, StepGroupKey) pairs.
        - For each class:
          - Compute ex_groups (StepGroupKey -> union of incoming subset weights) once and compile to a single ex_add_map (target -> weight).
          - Compute def_sub_map once by aggregating compiled default groups of the explicit indices (we cache compiled default per index lazily).
          - Merge with the already-computed default target (def_sv) to get the final target StepVec and edge weight once; then add one exception transition per label in the class.

      6) Micro-optimizations in target building
      - Avoid rebuilding a HashMap for the default vector on every label; instead:
        - Reuse the sorted def_sv (Arc<Vec<...>>). For modified targets only, compute (def - sub) | add and merge with def_sv by a linear merge: copy entries from def_sv unless overridden, and then append remaining modified entries. This reduces cloning and heavy map allocations further.

      7) Why this should help dramatically on your data
      - You mentioned:
        - most weights are ALL (intra-SCC), and
        - non-ALL weights appear mostly between components.
      - Steps (1)-(3) will make many more edges ALL (specifically, default and epsilon edges), increasing cache hits and enabling SCC collapsing.
      - Step (2) substantially shrinks closures since zeros are removed.
      - Step (5) collapses processing of many labels into a single computation per class, which fits tokenizer-style automata where labels come from a small number of character classes. Even if total labels are large, the number of classes per subset tends to be small.

