              let god = TestGod::new();
              let a = new_node(&god);
              let b = new_node(&god);
              let c = new_node(&god);

              add_edge(&god, a, b, TestEK::new(2, Some(0)));
              add_edge(&god, b, c, TestEK::new(1, Some(1)));

