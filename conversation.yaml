                                  }
                              }
                              // Insert U --(p1+p2, llm2)--> C with sids2
                              let key_new = (p1 + p2, llm2);
                              let dest_map = w.children_mut().entry(key_new).or_default();
                              dest_map.entry(c)
                                  .and_modify(|s| *s |= &sids2)
                                  .or_insert(sids2);
                          }
                      }
                  }

