              .into_iter()
              .collect();
              assert_eq!(union.iter().collect::<BTreeSet<_>>(), expected_union);

              // Symmetric Difference (XOR)
              let xor = &set1 ^ &set2;
              let expected_xor: BTreeSet<(usize, usize)> = vec![
                  (10, 100),
                  (10, 101),
                  (11, 101),
                  (11, 102),
                  (30, 300),
              ]
              .into_iter()
              .collect();
              assert_eq!(xor.iter().collect::<BTreeSet<_>>(), expected_xor);
          }

