        - `action_selector` becomes simple closures reading from the base table:

          - Phase 1 (no default): use `row.shifts_and_reduces_without_default_reduce.get(&token_id)`.
          - Phase 2 (with default): use `row.shifts_and_reduces_full.get(&token_id)` and, for rows with no per‑token action, the row’s `default_reduce`.

        - All branches for synthetic rows, hallucinated state, and combined state are removed.

      **Why it’s safe**

      - All merging and handling of parallel parse branches is still done via `work_map` (depth‑ordered).
      - Removing filters and special synthetic/hallucinated behavior only discards optimization / special substring features. For ordinary parsing from the start state, the same set of reductions and shifts are explored.

      **Proof sketch (correctness wrt original semantics for standard parsing)**

      Each iteration of `process_action_queue`:

      - Picks a `(state_id, GSS)` combination.
      - Enumerates all actions attached to this `(state_id, token)` or `(state_id)` (for phase 3).
      - For each action, it:
        - Spawns shifted states (`Shift`).
        - Spawns reduced+goto states (`Reduce` and `Split::reduces`).
        - Correctly enqueues them back into `work_map` to be processed in the same token’s phase.

      The removed features (filters, synthetic states, caches) only refine *which origins* a particular action applies to, or add precomputed GSS shapes, but they do not change the *set of possible LR stack sequences*; in fact, when removed, we simply let each branch be processed individually, which is the usual GLR semantics.

      ---

      #### 7. Replace `reduce_and_goto` with a simple LR reduce+goto

      **What to do**

      Replace the huge `reduce_and_goto` with:

      - A trivial pop + goto implementation:

        ```rust
        #[time_it("GLRParserState::reduce_and_goto")]
        fn reduce_and_goto(
            &mut self,
            peek: &GSSPeek,
            nt: NonTerminalID,
            len: usize,
            config: &ProcessTokenAdvancedConfig,
        ) -> (Arc<GSSNode>, Arc<GSSNode>) {
            let popper: GSSPopper = timeit!(peek.popn(len));
            let mut out: Vec<Arc<GSSNode>> = Vec::new();
            let mut accepted_out: Vec<Arc<GSSNode>> = Vec::new();

            if !popper.below_bottom().is_empty() {
                match config.below_bottom_mode {
                    BelowBottomReductionMode::Panic => panic!("Reduction popped below bottom of stack"),
                    _ => crate::debug!(5, "Popped below bottom for NT {:?}, discarding paths.", nt),
                }
            }

            for pop_item in popper.iter() {
                for peek2 in pop_item.peek_iter() {
                    let pred_sid = peek2.edge_value().state_id;
                    let parent = peek2.isolated_parent();
                    if let Some(row) = self.parser.table.get(&pred_sid) {
                        if let Some(goto) = row.gotos.get(&nt) {
                            if goto.accept { accepted_out.push(parent.clone()); }
                            if let Some(target_sid) = goto.state_id {
                                out.push(Arc::new(parent.push(ParseStateEdgeContent { state_id: target_sid })));
                            }
                        }
                    }
                }
            }

            let new_active = GSSNode::merge_many_with_depth(MAX_MERGE_DEPTH, out);
            let new_accepted = GSSNode::merge_many_with_depth(MAX_MERGE_DEPTH, accepted_out);
            (new_active, new_accepted)
        }
        ```

      - Note: No unit‑reduction chains, no hallucinated/combined gotos, no caching.

      **Why it’s safe**

      - **Correctness argument:**  
        For each predecessor state `p` where the stack popped `len` edges:

        - We look up `goto(p, nt)`. If it exists, we push that state on top of the predecessor’s stack: this is exactly the LR reduce+goto step.
        - In the original code, any further unit reductions (length‑1) were eagerly chased inside `reduce_and_goto` using `action_selector`. But the GLR algorithm already re‑enqueues the new `(state, stack)` pair into the work map. Later iterations of `process_action_queue` will pick up that state and apply any further reduce actions. Hence, eager chaining is an optimization, not required for soundness or completeness.

      - **Below‑bottom behavior:**  
        In a valid run starting from the start state with an LR(0)/LALR(1) table, we never pop more items than the stack depth. Therefore, `popper.below_bottom()` is empty on all “real” parsing steps. When it is non‑empty, it signals an inconsistent configuration; either:
        - we drop those paths (Fail/Continue modes), or
        - panic (Panic mode).  
        For ordinary parsing, none of these branches are taken, so behavior is unchanged.

      ---

      #### 8. Simplify default reductions handling

      **What to do**

      In `handle_default_action`:

      - Remove the generic parameter `F` and `action_selector`.
      - Use the simplified `reduce_and_goto` directly.
      - Keep the behavior:

        - If `default_reduce.clone_and_merge` is true, clone the current state into `shifted_states_todo`.
        - If there is a default reduce, apply it via `reduce_and_goto`, enqueue new reduce states and accepted states accordingly.

      **Why it’s safe**

      - This is exactly what the old code did, minus the optional unit‑chain optimization on default reduces. As argued earlier, chaining is not required for correctness because the work map will repeatedly apply default reductions until fixpoint (`process_default_reductions_advanced` runs until no states remain).

      ---

      #### 9. Simplify token processing and default reductions

      **What to do**

      - In `process_token_advanced`:

        - Remove all references to `below_bottom_cache` and `runtime_below_bottom_cache`.
        - `config.reset_cache` becomes a no‑op; we leave it in the type for API compatibility.

      - In `process_default_reductions_advanced`:

        - Leave the overall control structure intact.
        - Use the simplified `process_action_queue` with an `action_selector` that always returns a single `Action::Default(&row.default_reduce)` per state.

      **Why it’s safe**

      - The only difference from the original is the absence of cache resets (for caches that we removed altogether).
      - The fixpoint behavior of default reductions remains: states are repeatedly processed until no new states are enqueued.

      ---

      #### 10. Simplify `has_action_for`, `allows_terminal`, and immediate terminal queries

      **What to do**

      - `has_action_for(&self, token_id)`:

        - For LR1 / LALR_EX_SHIFT_STATES, we iterate over top‑of‑stack states and:

          - If `phase == ReadyForToken`: check `row.shifts_and_reduces_without_default_reduce.contains_key(&token_id)`.
          - If `phase == ReadyForDefaultReductions`: check per‑token action or default reduction (`row.shifts_and_reduces_full.contains_key(&token_id)` or a non‑empty default).

        - If a state has an action, union its `peek.resolved_llm_tokens_union()` into the result bitset.

        - No special handling for combined/hallucinated/synthetic states.

      - `allows_terminal(&self, token_id)`:

        - Keep only the simple, already‑present logic:

          ```rust
          let mut clone = self.clone();
          clone.step(token_id);
          clone.is_ok()
          ```

        - Remove the unreachable alternative branch reading synthetic/hallucinated/combined states.

      - `has_immediate_action_for_terminal`, `immediate_shift_terminals`, `immediate_reduce_terminals`:

        - Use only the base table rows (and, in the reduce case, the `default_reduce` where appropriate).
        - No synthetic/hallucinated/combined logic.

      **Why it’s safe**

      - All of these methods are purely *introspective*: they do not affect parsing, only report whether actions exist. Stripping hallucinated/combined branches means they now only consider the “real” table states, matching our simplified design.
      - `allows_terminal` based on simulating `step` is the most straightforward and robust definition; it matches what the parser will actually do.

      ---

      #### 11. Simplify `format_state_details` and `Display` for `GLRParser`

      **What to do**

      - Rewrite `format_state_details` so it:

        - Prints items from `item_set_map` if present, otherwise a simple “not found” message.
        - Prints actions using `row.shifts_and_reduces_full` (for full view) via the existing `format_actions` helper.
        - Prints default reduce (if any) and the clone‑and‑merge flag.
        - Prints `gotos` in sorted order by nonterminal.

      - Remove special branches:

        - “Hallucinated state”
        - “Combined state”
        - Hallucinated/combined actions and gotos.

      - `Display for GLRParser`:

        - Print only base table states (no combined/hallucinated).
        - Then print terminal and non‑terminal maps.

      **Why it’s safe**

      - The actual base LR table hasn’t changed.
      - Explanations now map directly to the underlying LR automaton without additional “virtual” states.

      ---

      #### 12. Simplify analysis helpers

      **What to do**

      - `GLRParser::build_one_step_back_map`:

        - Only consider `self.table` (shifts and gotos) when building the predecessor map.
        - Remove combined/hallucinated contributions.

      - Remove the stored‑cache analysis function:

        - `print_stored_cache_stats`
        - `transfer_stored_cache_to_god`

      These relied on `stored_below_bottom_cache` and `stored_trie_god`, which we removed.

      **Why it’s safe**

      - Predecessor analysis over the base LR automaton remains correct and complete.
      - Stored caches are never populated anymore; analyzing them is meaningless, so removing those functions is conceptually cleaner.

      ---

      ### C. Files not changed: `src/datastructures/gss_leveled_adapter.rs`

      No changes are required here for correctness:

      - All interfaces used by the simplified parser (e.g., `GSSNode`, `GSSPopper`, `gather_gss_stats`, `print_gss_forest`) remain intact.
      - The functions related to precompute‑tries and “simple GSS” caching are left in place; they may still be useful to other parts of the codebase.

