      6) src/glr/automaton.rs: Make compute_closure fast when lalr_mode is true
      - Replace the body of compute_closure with a two-branch implementation:
        - LALR branch: expand items by nonterminals ignoring lookaheads; at the end, only attach lookaheads to reduce items using FOLLOW sets.
        - LR(1) branch: keep the existing algorithm; just switch to reusing Arc<Production> (no Production clones).

      Use the following body (keep imports as-is; Arc is already imported here):

      ```rust
      pub fn compute_closure(
          items: &BTreeSet<Item>,
          prods_by_lhs: &BTreeMap<NonTerminal, Vec<Arc<Production>>>,
          first_sets: &BTreeMap<NonTerminal, BTreeSet<Terminal>>,
          nullable_nonterminals: &BTreeSet<NonTerminal>,
          follow_sets: &BTreeMap<NonTerminal, BTreeSet<Option<Terminal>>>,
          lalr_mode: bool,
      ) -> BTreeSet<Item> {
          if lalr_mode {
              // LALR-optimized closure:
              // - Ignore lookaheads for expansions (non-reduce items carry lookahead=None).
              // - Only reduce items carry lookaheads, taken from FOLLOW(LHS).
              let mut closure: BTreeSet<Item> = items.iter().map(|it| {
                  let mut it2 = it.clone();
                  if !it2.dot_at_end() {
                      it2.lookahead = None;
                  }
                  it2
              }).collect();

              let mut worklist: VecDeque<Item> = closure.iter().cloned().collect();

              while let Some(item) = worklist.pop_front() {
                  if let Some((Symbol::NonTerminal(nt), _)) = item.next() {
                      if let Some(prods_for_nt) = prods_by_lhs.get(&nt) {
                          for prod_arc in prods_for_nt {
                              let new_item = Item {
                                  production: prod_arc.clone(),
                                  dot_position: 0,
                                  lookahead: None,
                              };
                              if closure.insert(new_item.clone()) {
                                  worklist.push_back(new_item);
                              }
                          }
                      }
                  }
              }

              // Now attach lookaheads only to reduce items using FOLLOW sets.
              let mut lalr_closure = BTreeSet::new();
              for item in closure {
                  if item.dot_at_end() {
                      if let Some(follows) = follow_sets.get(&item.production.lhs) {
                          for lookahead in follows {
                              lalr_closure.insert(Item {
                                  production: item.production.clone(),
                                  dot_position: item.dot_position,
                                  lookahead: lookahead.clone(),
                              });
                          }
                      } else {
                          // No FOLLOW data; keep the reduce with whatever it had (likely None).
                          lalr_closure.insert(item);
                      }
                  } else {
                      // Non-reduce items keep lookahead=None (important for kernel normalization).
                      lalr_closure.insert(item);
                  }
              }
              lalr_closure
          } else {
              // Keep the LR(1) implementation, but reuse Arc<Production> instead of cloning Productions.
              let mut closure = items.clone();
              let mut worklist: VecDeque<Item> = items.iter().cloned().collect();
              let mut first_set_cache: BTreeMap<Item, BTreeSet<Option<Terminal>>> = BTreeMap::new();

              while let Some(item) = worklist.pop_front() {
                  if let Some((Symbol::NonTerminal(nt), next_item)) = item.next() {
                      if let Some(prods_for_nt) = prods_by_lhs.get(&nt) {
                          let lookaheads = super::compute_first_set_for_item(
                              &next_item, first_sets, nullable_nonterminals, &mut first_set_cache
                          );
                          for prod_arc in prods_for_nt {
                              for lookahead in lookaheads.iter().cloned() {
                                  let new_item = Item {
                                      production: prod_arc.clone(),
                                      dot_position: 0,
                                      lookahead,
                                  };
                                  if closure.insert(new_item.clone()) {
                                      worklist.push_back(new_item);
                                  }
                              }
                          }
                      }
                  }
              }
              closure
          }
      }
      ```

      Notes:
      - This preserves LRMode::LALR_EX_SHIFT_STATES behavior because stage_1 still decides lalr_mode per kernel before calling compute_closure.
      - We intentionally do not run the old “replace reduce lookaheads with FOLLOW sets” post-pass, because we’ve already attached FOLLOW lookaheads to reduce items in the LALR branch.

      7) src/glr/table.rs: Make stage_1 call the new compute_closure signature
      - The call already changed in step 3 to pass prods_by_lhs with Arc<Production>. No additional changes needed here beyond ensuring you used the new map created in step 2.

      8) (Optional but recommended) Remove or keep EVERYTHING hidden path unchanged
      - The EVERYTHING path is currently false. If you ever turn it on, normalize the “everything” set to kernels before inserting into visited_kernels and worklist, similarly to the initial kernel. Since it’s off by default, you can skip this now to keep the diff minimal.

      Why this is fast

      - Kernels only: By normalizing state identity to kernel (prod, dot) and ignoring lookaheads for state discovery, the number of states in stage_1 collapses to LALR count. This avoids the LR(1) exponential blow-up where each core is duplicated across many lookaheads.
      - Cheap closure: In LALR mode, closure no longer uses FIRST recursion for each item. It simply:
        - Adds items for nonterminals after the dot, ignoring lookaheads.
        - Attaches FOLLOW lookaheads only to reduce items at the end. This is linear in the number of productions/symbols and typically very small.
      - No Production clones: All items reuse the same Arc<Production>, avoiding repeated allocation, string comparison, and deep copies. Set comparisons become dramatically cheaper.

      If you still need more speed (usually not necessary after the above):
      - Replace BTreeSet<Item> with a small, ordered Vec<Item> for temporary closure/worklist operations, then collect into BTreeSet only when needed at API boundaries.
      - Move to integer IDs earlier (ProductionID, NonTerminalID, TerminalID) and store those in Items for kernel identity and comparisons. This eliminates string comparisons in Ord for Item entirely. The minimal version above avoids a large refactor while delivering a big win.
