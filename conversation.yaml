              nwa.add_transition(8, 10, 7, w0.clone());
              nwa.add_default_transition(9, 10, wall.clone());
              nwa.add_transition(10, 10, 7, w0.clone());

              nwa.add_transition(11, 10, 7, w1.clone());
              nwa.add_transition(12, 10, 7, w2.clone());
