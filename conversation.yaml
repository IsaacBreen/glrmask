      The analysis script compares the measured performance of an implementation against the *ideal* scaling behavior of a highly efficient GSS. The key idea is that for an efficient GSS, the cost of operations like `push`, `pop`, and `merge` should depend only on the *surface* of the GSS (the active stack tops), not on the shared history or "hidden depth."

      Here's how to read the output:

      *   **`slope`**: This is the measured performance exponent. If `time = C * (axis_value)^b`, the slope is `b`.
          *   A slope near `0.0` means the operation's time is *independent* of the axis (e.g., `pop` time doesn't increase as `prefix_depth` grows). This is the ideal for many operations.
          *   A slope near `1.0` means linear scaling (e.g., doubling the `prefix_depth` doubles the `build` time).
          *   A high slope (`> 1.0`) indicates poor scaling.
      *   **`ideal`**: This is the theoretical slope for a perfectly optimized GSS.
      *   **`status`**:
          *   `OK`: The measured slope is close to the ideal.
          *   `DRIFT`: The measured slope significantly deviates from the ideal, indicating a performance bottleneck.

