      impl<'a> GLRParserState<'a> { // No longer generic
          fn push_state(
              &self,
              stack: &Arc<GSSNode>, 
              new_content: ParseStateEdgeContent,
          ) -> ParseState {
              let new_gss_node_instance = stack.push_with_acc(new_content, stack.acc2().clone());
