          proptest! {
              #[test]
              fn test_proptest_weight_convert_keeps_symts(mut fst in any::<VectorFst::<TropicalWeight>>()) {
                  let symt = Arc::new(SymbolTable::new());
                  fst.set_input_symbols(Arc::clone(&symt));
