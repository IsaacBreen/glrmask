              prod("E", vec![nt("T")]),
              prod("T", vec![nt("T"), t("*"), nt("F")]),
              prod("T", vec![nt("F")]),
              prod("F", vec![t("("), nt("E"), t(")")]),
              prod("F", vec![t("i")]),
          ];
          generate_glr_parser(&productions, 0)
      }

      fn tokenize(parser: &GLRParser, input: &str) -> Vec<TerminalID> {
          input
              .chars()
              .filter_map(|c| {
                  parser
                      .terminal_map
                      .get_by_left(&Terminal(c.to_string()))
                      .copied()
              })
              .collect()
      }

