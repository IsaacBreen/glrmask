    src/constraint_special_precompute.md: |-
      **Internal edges**
      `HashSet<(Some(NonTerminalID), StateID, TerminalID, (usize, NonTerminalID))>`
      *We've reduced by this nonterminal, now this is a possible revealed state. We keep parsing with this terminal ID and eventually we reduce below the bottom by this amount with this nonterminal.*

      **Escape edges**
      `HashSet<(NonTerminalID, StateID, TerminalID, StateID, StateID)>`
      *We've reduced by this nonterminal, now this is a possible revealed state and goto state. We keep parsing with this terminal ID and eventually we find a shift to this other state.*

      **Start reduce edges**
      `HashSet<(None(NonTerminalID), StateID, TerminalID, (usize, NonTerminalID))>`
      *We start in this state with this terminal. We keep parsing until eventually we reduce below the bottom by this amount with this nonterminal.*

      **Start shift edges**
      `HashSet<(StateID, TerminalID, StateID)>`
      *We start in this state with this terminal. We immediately shift to this state.*


      Can unify internal edges and start reduce edges.
      `HashSet<(Option<NonTerminalID>, StateID, TerminalID, (usize, NonTerminalID))>`
      Can also unify escape and start shift edges as
      `HashSet<(Option<NonTerminalID>, StateID, TerminalID, Vec<StateID>)>`
      Can unify both as
      `HashSet<(Option<NonTerminalID>, StateID, TerminalID, (usize, NonTerminalID) | Vec<StateID>)>`


      There is one start/end node (combiend). For each nonterminal, there is internal node.
      Node IDs can then just be `Option<NonTerminalID>`, with the start/end node ID being `None`.


      **Super edges**
      `HashSet<(Option<NonTerminalID>, TerminalID, (usize, NonTerminalID), LLMTokenBV, PrecomputeNodeIndex1, PrecomputeNodeIndex1)>`
      If `None`, it's the start node.

      Initial nodes and values.
      Values are
      `HashSet<(Vec<StateID>, LLMTokenBV, PrecomputeNodeIndex1)>`

      Initial value for tokenizer ID/precompute1 node: empty state vec, all LLM tokens, precompute1 node.

      Map from tokenizer state ID to precompute1 node index.


      There's two parts to computing this.
      **First stage**
      The first stage is this. It doesn't use the precompute1 tree.
      - Loop through (nonterminal, terminal, state)
          - Initialize a stack with the state
          - Perform a goto for the nonterminal.
          - Continue parsing as normal.
          - Once we pop below bottom of stack, note the nonterminal R2 we are reducing by and the pop number n *below the stack*.
          - Add an edge to node R2 with (terminal, state, n)

      In implementing the parser, don't be fancy. Use a rudimentary approach. Just a queue of stacks, and when we hit a split we literally copy the stacks and put them into the queue.
      Process one queue item at a time.
      Once we pop below zero, we add an edge to the set.

      What about shift?
      Once we hit a shift, what should we do?
      Shift to the stack. Stack size can either be 2 or 3.
      Shifts can be characterized by nonterminal, terminal, state, shift state, and optional middle state.
      By 'state' here I mean 'state used to initialize stack'.
      `HashSet<(Option<NonTerminalID>, StateID, TerminalID, Vec<StateID>)>`


      **Second stage**
      Here's the second stage. It's basically for 'super' edges.
      Now suppose we do special map over precompute1 tree. Edge processing like this.
      The special map values are `HashSet<(Vec<StateID>, LLMTokenBV, PrecomputeNode1Index)>`
      - We have a terminal and a LLM bv for this precompute1 edge, and we know pci1'
      - Loop through our state vec/LLM bv/pci1
          - start at the start node.
          - process start reduce edges
              - initialize a queue of `(Option<NonTerminalID>, Vec<StateID>, LLMTokenBV)`
              - Initialize with None, this state vec, this bv
              - Process the queue. Pop an item.
                  - Look for all reduce edges whose nonterminal/terminal matches and state ID matches top of state vec. Pop the number from the stack.
                      - If there's still anything left on the stack, add to the queue the remainder and the start reduce edge's dest nonterminal ID.
                      - If the stack is empty, add a super edge from the src nt ID to the dst, with this terminal, the remainder of the pop n (could be zero), the same LLM bv, pci1 as the first index, and the dest is pci1'
                  - Look for all escape edges whose nonterminal/terminal/state match.
                      - Add to the output set. Push the edge's final state ID vec to the current state vec (ie extend). Intersect the LLM token bv. Keep pci1 the same.

      The precompute merge fn simply merges the hashsets.

      ...

      Now let's look at get_mask4. It'll use this tree. Its output should be identical to get_mask3.
      Obviously it won't use trie's special map. It'll manage its own queue.
      In the initial nodes and values, the values will include the current precompute1 index. It'll also include optional nonterminals - ie node indices in this new tree. Specifically, it'll be `HashSet<(PrecomputeNode1Index, Option<NonTerminalID>, LLMTokenBV)>`.
      We traverse all compatible edges, normal and super.
      If super, it's only compatible if the first pci1 index matches the current index. If it does, the current pci1 index gets replaced by the edge's second one.
    src/constraint_special_precompute.rs: |
      use std::cell::RefCell;
      use std::collections::{BTreeMap, BTreeSet, HashMap, HashSet, VecDeque};
      use crate::datastructures::trie::Trie;
      use std::sync::Arc;

      use crate::constraint::{
          GrammarConstraint, GrammarConstraintState, LLMTokenBV, PrecomputeNode1Index, Trie1GodWrapper,
      };
      use crate::glr::parser::{GLRParser, GLRParserState, ParseStateEdgeContent};
      use crate::glr::table::{Goto, NonTerminalID, Stage7ShiftsAndReducesLookaheadValue, StateID};
      use crate::datastructures::gss_leveled_adapter::{allow_only_llm_tokens_and_prune_arc, GSSNode};
      use crate::types::TerminalID;

      // Types for special precomputation
      #[derive(Debug, Clone, PartialEq, Eq, Hash, PartialOrd, Ord)]
      pub enum SpecialPrecomputeDest {
          Reduce { pop: usize, dest_nt: NonTerminalID },
          Escape { push_states: Vec<StateID> },
      }

      // (Option<NonTerminalID>, StateID, TerminalID, SpecialPrecomputeDest)
      pub type SpecialPrecomputeNormalEdge = (
          Option<NonTerminalID>,
          StateID,
          TerminalID,
          SpecialPrecomputeDest,
      );

      // (Option<NonTerminalID>, TerminalID, (usize, NonTerminalID), LLMTokenBV, PrecomputeNode1Index, PrecomputeNode1Index)
      pub type SpecialPrecomputeSuperEdge = (
          Option<NonTerminalID>,
          TerminalID,
          (usize, NonTerminalID),
          LLMTokenBV,
          PrecomputeNode1Index,
          PrecomputeNode1Index,
      );

      #[derive(Debug, Clone, Default, PartialEq, Eq)]
      pub struct SpecialPrecomputation {
          pub normal_edges: HashSet<SpecialPrecomputeNormalEdge>,
          pub super_edges: HashSet<SpecialPrecomputeSuperEdge>,
      }

      // Helper to get actions for a state and terminal
      fn get_actions<'a>(
          parser: &'a GLRParser,
          state_id: StateID,
          terminal_id: TerminalID,
      ) -> Vec<&'a Stage7ShiftsAndReducesLookaheadValue> {
          let mut actions = Vec::new();
          if let Some(row) = parser.table.get(&state_id) {
              if let Some(action) = row.shifts_and_reduces_full.get(&terminal_id) {
                  actions.push(action);
              }
          }
          actions
      }

      // Helper to get gotos for a state and non-terminal
      fn get_gotos<'a>(parser: &'a GLRParser, state_id: StateID, nt_id: NonTerminalID) -> Vec<&'a Goto> {
          if let Some(row) = parser.table.get(&state_id) {
              row.gotos.get(&nt_id).map(|g| vec![g]).unwrap_or_default()
          } else {
              vec![]
          }
      }

      pub fn precompute_special(gc: &GrammarConstraint) -> SpecialPrecomputation {
          let mut normal_edges = HashSet::new();
          let super_edges = RefCell::new(HashSet::new());
          let parser = &gc.parser;

          let mut non_terminals: Vec<Option<NonTerminalID>> = parser
              .non_terminal_map
              .right_values()
              .copied()
              .map(Some)
              .collect();
          non_terminals.push(None);

          let terminals: Vec<TerminalID> = parser.terminal_map.right_values().copied().collect();

          let mut states: Vec<StateID> = parser.table.keys().copied().collect();
          states.sort();
          states.dedup();

          for src_nt in &non_terminals {
              for &initial_state in &states {
                  for &terminal in &terminals {
                      let mut q: VecDeque<(Vec<StateID>, Vec<StateID>)> = VecDeque::new(); // (stack, pushed_path)
                      let mut visited_stacks = HashSet::new();

                      let initial_stacks = if let Some(nt) = src_nt {
                          let gotos = get_gotos(parser, initial_state, *nt);
                          let mut stacks = vec![];
                          for goto in gotos {
                              if let Some(goto_state) = goto.state_id {
                                  stacks.push((vec![initial_state, goto_state], vec![goto_state]));
                              }
                          }
                          stacks
                      } else {
                          vec![(vec![initial_state], vec![])]
                      };

                      for (stack, path) in initial_stacks {
                          if visited_stacks.insert(stack.clone()) {
                              q.push_back((stack, path));
                          }
                      }

                      while let Some((stack, pushed_path)) = q.pop_front() {
                          let top_state = *stack.last().unwrap();
                          let actions = get_actions(parser, top_state, terminal);

                          for action in actions {
                              let mut handle_reduce =
                                  |normal_edges: &mut HashSet<SpecialPrecomputeNormalEdge>,
                                   len: usize,
                                   reduce_nt: NonTerminalID| {
                                      if stack.len() <= len {
                                          let pop_below = len - stack.len();
                                          let dest = SpecialPrecomputeDest::Reduce {
                                              pop: pop_below,
                                              dest_nt: reduce_nt,
                                          };
                                          normal_edges.insert((*src_nt, initial_state, terminal, dest));
                                      } else {
                                          let mut new_stack = stack.clone();
                                          new_stack.truncate(new_stack.len() - len);
                                          let new_top_state = *new_stack.last().unwrap();
                                          let gotos = get_gotos(parser, new_top_state, reduce_nt);
                                          for goto in gotos {
                                              if let Some(goto_state) = goto.state_id {
                                                  let mut stack_after_goto = new_stack.clone();
                                                  stack_after_goto.push(goto_state);
                                                  let mut path_after_goto = pushed_path.clone();
                                                  path_after_goto.push(goto_state);
                                                  if visited_stacks.insert(stack_after_goto.clone()) {
                                                      q.push_back((stack_after_goto, path_after_goto));
                                                  }
                                              }
                                          }
                                      }
                                  };

                              match action {
                                  Stage7ShiftsAndReducesLookaheadValue::Shift(next_state) => {
                                      let mut new_pushed = pushed_path.clone();
                                      new_pushed.push(*next_state);
                                      let dest = SpecialPrecomputeDest::Escape {
                                          push_states: new_pushed,
                                      };
                                      normal_edges.insert((*src_nt, initial_state, terminal, dest));
                                  }
                                  Stage7ShiftsAndReducesLookaheadValue::Reduce {
                                      nonterminal_id,
                                      len,
                                      ..
                                  } => {
                                      handle_reduce(&mut normal_edges, *len, *nonterminal_id);
                                  }
                                  Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } => {
                                      if let Some(next_state) = shift {
                                          let mut new_pushed = pushed_path.clone();
                                          new_pushed.push(*next_state);
                                          let dest = SpecialPrecomputeDest::Escape {
                                              push_states: new_pushed,
                                          };
                                          normal_edges.insert((*src_nt, initial_state, terminal, dest));
                                      }
                                      for (len, nts) in reduces {
                                          for (nt, _) in nts {
                                              handle_reduce(&mut normal_edges, *len, *nt);
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }

          // Stage 2: Super Edges
          let trie1_god = &gc.trie1_god;
          let trie1_roots: Vec<_> = gc.precomputed1.values().cloned().collect();
          if trie1_roots.is_empty() {
              return SpecialPrecomputation {
                  normal_edges,
                  super_edges: super_edges.into_inner(),
              };
          }

          // The value type for special_map
          type SpecialMapValue = HashSet<(Vec<StateID>, LLMTokenBV, PrecomputeNode1Index)>;

          // Initial values for the traversal
          let mut initial_values_map: BTreeMap<PrecomputeNode1Index, SpecialMapValue> = BTreeMap::new();
          for pci1_root in trie1_roots.iter().cloned() {
              let initial_set = initial_values_map.entry(pci1_root).or_default();
              initial_set.insert((
                  vec![parser.start_state_id],
                  gc.all_internal_llm_tokens_bitset_precompute1(),
                  pci1_root,
              ));
          }
          let initial_values: Vec<_> = initial_values_map.into_iter().collect();

          // We need to group normal_edges for efficient lookup.
          let mut normal_edges_map: HashMap<
              (Option<NonTerminalID>, StateID, TerminalID),
              Vec<&SpecialPrecomputeDest>,
          > = HashMap::new();
          for edge in &normal_edges {
              normal_edges_map
                  .entry((edge.0, edge.1, edge.2))
                  .or_default()
                  .push(&edge.3);
          }

          let traversal_data = Trie::compute_traversal_data(trie1_god, &trie1_roots).unwrap();

          Trie::special_map_grouped(
              trie1_god,
              &traversal_data,
              initial_values,
              // step
              |current_set, terminal_opt, dest_map| {
                  let mut results_for_dests: HashMap<PrecomputeNode1Index, SpecialMapValue> =
                      HashMap::new();
                  let terminal = match terminal_opt {
                      Some(t) => *t,
                      None => return vec![], // No grammar token on edge, no grammar actions to take.
                  };

                  for (stack, llm_bv, pci1_start) in current_set {
                      for (pci1_dest, edge_llm_bv) in dest_map.iter() {
                          let intersected_bv = llm_bv & edge_llm_bv;
                          if intersected_bv.is_empty() {
                              continue;
                          }

                          let mut q: VecDeque<(Option<NonTerminalID>, Vec<StateID>, LLMTokenBV)> =
                              VecDeque::new();
                          q.push_back((None, stack.clone(), intersected_bv.clone()));

                          let mut visited_q_states = HashSet::new();

                          while let Some((src_nt, current_stack, current_bv)) = q.pop_front() {
                              if !visited_q_states.insert((src_nt, current_stack.clone())) {
                                  continue;
                              }

                              if current_stack.is_empty() {
                                  continue;
                              }
                              let top_state = *current_stack.last().unwrap();

                              if let Some(dests) = normal_edges_map.get(&(src_nt, top_state, terminal))
                              {
                                  for dest in dests {
                                      match dest {
                                          SpecialPrecomputeDest::Reduce { pop, dest_nt } => {
                                              if current_stack.len() <= *pop {
                                                  let pop_remainder = pop - current_stack.len();
                                                  let super_edge = (
                                                      src_nt,
                                                      terminal,
                                                      (pop_remainder, *dest_nt),
                                                      current_bv.clone(),
                                                      *pci1_start,
                                                      *pci1_dest,
                                                  );
                                                  super_edges.borrow_mut().insert(super_edge);
                                              } else {
                                                  let mut new_stack = current_stack.clone();
                                                  new_stack.truncate(new_stack.len() - *pop);
                                                  q.push_back((
                                                      Some(*dest_nt),
                                                      new_stack,
                                                      current_bv.clone(),
                                                  ));
                                              }
                                          }
                                          SpecialPrecomputeDest::Escape { push_states } => {
                                              let mut new_stack = current_stack.clone();
                                              new_stack.extend(push_states);
                                              results_for_dests
                                                  .entry(*pci1_dest)
                                                  .or_default()
                                                  .insert((
                                                      new_stack,
                                                      current_bv.clone(),
                                                      *pci1_start,
                                                  ));
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
                  results_for_dests.into_iter().collect::<Vec<_>>()
              },
              // merge
              |set1, set2| {
                  set1.extend(set2.into_iter());
              },
              // process
              |_, _| true,
          );

          SpecialPrecomputation {
              normal_edges,
              super_edges: super_edges.into_inner(),
          }
      }

      pub fn get_mask4(gcs: &GrammarConstraintState) -> LLMTokenBV {
          let sp = &gcs.parent.special_precomputation;
          let final_mask = RefCell::new(LLMTokenBV::zeros());

          let mut q: VecDeque<(GLRParserState, PrecomputeNode1Index, Option<NonTerminalID>)> =
              VecDeque::new();
          let mut visited: HashSet<(
              Arc<GSSNode>,
              PrecomputeNode1Index,
              Option<NonTerminalID>,
          )> = HashSet::new();

          // Initial states
          for (tokenizer_id, glr_state) in &gcs.state {
              if let Some(pci1_root) = gcs.parent.precomputed1.get(tokenizer_id) {
                  let key = (glr_state.active_state.stack.clone(), *pci1_root, None);
                  if visited.insert(key) {
                      q.push_back((glr_state.clone(), *pci1_root, None));
                  }
              }
          }

          while let Some((glr_state, pci1_idx, src_nt)) = q.pop_front() {
              if !glr_state.is_ok() {
                  continue;
              }

              let guard = pci1_idx.read(&gcs.parent.trie1_god).unwrap();
              if guard.value.end {
                  *final_mask.borrow_mut() |= &glr_state.active_state.stack.allowed_llm_tokens();
              }

              // Follow super edges
              // ... (This part is complex and requires careful GSS manipulation, omitted for now)

              // Follow normal precompute1 edges using normal_edges (Escape)
              // ... (This part is also complex, omitted for now)
          }

          gcs.parent.internal_bv_to_original_precompute1(&final_mask.into_inner())
      }

      pub fn dump_precomputed_special(gc: &GrammarConstraint) {
          let sp = &gc.special_precomputation;
          let parser = &gc.parser;

          println!("--- Special Precomputation Dump ---");

          // For resolving NT IDs to names
          let get_nt_name = |nt_id: &NonTerminalID| -> String {
              parser
                  .non_terminal_map
                  .get_by_right(nt_id)
                  .map(|nt| nt.to_string())
                  .unwrap_or_else(|| format!("NT({})", nt_id.0))
          };
          let get_opt_nt_name = |opt_nt_id: &Option<NonTerminalID>| -> String {
              opt_nt_id
                  .as_ref()
                  .map(get_nt_name)
                  .unwrap_or_else(|| "None".to_string())
          };

          // For resolving Terminal IDs to names
          let get_term_name = |term_id: &TerminalID| -> String {
              parser
                  .terminal_map
                  .get_by_right(term_id)
                  .map(|t| t.to_string())
                  .unwrap_or_else(|| format!("T({})", term_id.0))
          };

          println!("\nNormal Edges ({}):", sp.normal_edges.len());
          println!("{:-<125}", "");
          println!(
              "{:<20} | {:<15} | {:<20} | {:<60}",
              "Source NT", "Initial State", "Terminal", "Destination"
          );
          println!("{:-<125}", "");

          let mut sorted_normal_edges: Vec<_> = sp.normal_edges.iter().collect();
          sorted_normal_edges.sort_unstable();

          for (src_nt, initial_state, terminal, dest) in sorted_normal_edges {
              let dest_str = match dest {
                  SpecialPrecomputeDest::Reduce { pop, dest_nt } => {
                      format!("Reduce(pop={}, dest_nt={})", pop, get_nt_name(dest_nt))
                  }
                  SpecialPrecomputeDest::Escape { push_states } => {
                      let states_str: Vec<_> = push_states.iter().map(|s| s.0.to_string()).collect();
                      format!("Escape(push=[{}])", states_str.join(", "))
                  }
              };

              println!(
                  "{:<20} | S{:<13} | {:<20} | {}",
                  get_opt_nt_name(src_nt),
                  initial_state.0,
                  get_term_name(terminal),
                  dest_str
              );
          }

          println!("\nSuper Edges ({}):", sp.super_edges.len());
          println!("{:-<150}", "");
          println!(
              "{:<20} | {:<20} | {:<30} | {:<15} | {:<15} | {:<20}",
              "Source NT", "Terminal", "Destination", "PCI1 Start", "PCI1 End", "LLM Tokens"
          );
          println!("{:-<150}", "");

          let mut sorted_super_edges: Vec<_> = sp.super_edges.iter().collect();
          sorted_super_edges.sort_unstable();

          for (src_nt, terminal, (pop, dest_nt), edge_bv, pci1_start, pci1_end) in sorted_super_edges {
              let dest_str = format!("Reduce(pop={}, dest_nt={})", pop, get_nt_name(dest_nt));
              let bv_str = if edge_bv.is_all() {
                  "ALL".to_string()
              } else {
                  format!("{} tokens", edge_bv.len())
              };

              println!(
                  "{:<20} | {:<20} | {:<30} | {:<15} | {:<15} | {:<20}",
                  get_opt_nt_name(src_nt),
                  get_term_name(terminal),
                  dest_str,
                  pci1_start.as_usize(),
                  pci1_end.as_usize(),
                  bv_str
              );
          }

          println!("\n--- End Special Precomputation Dump ---");
      }
