              """
              stats = {
                  "groups_before": 0,
                  "groups_after": 0,
                  "edges_before": self._count_edges(),
                  "edges_after": 0,
              }
              for node in self.arena.values():
                  children = node.children
                  stats["groups_before"] += len(children)
                  if not children:
                      node.llm_bv_union = RangeSet.empty()
