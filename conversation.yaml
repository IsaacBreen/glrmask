          pub root: VocabPrefixTreeNode,
          /// Flag indicating if the empty string `""` was explicitly provided as a token.
          max_token_id: usize,
          /// The maximum token ID encountered during build, used for BitVec sizing.
          has_empty_string_token: bool,
      }

