          #[new]
          fn new(constraint: PyGrammarConstraint) -> PyResult<Self> {
              Ok(PyGrammarConstraintState {
                  inner: PyGrammarConstraintStateWrapperTryBuilder {
                      constraint,
                      inner_builder: |c: &PyGrammarConstraint| {
