          def get_mask(self) -> RangeSet:
              state_map: Dict[int, GSS] = self.state
              all_ones: Optional[ffi.Bitset] = self.all_internal_llm_tokens_bitset
              final_mask: ffi.Bitset = ffi.Bitset.zeros()

