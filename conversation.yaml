              let mut initial_values_for_map: Vec<(PrecomputeNode3Index, (GLRParserState<'a>, LLMTokenBV))> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  if glr_state.active_state.stack.is_empty() {
                      continue;
