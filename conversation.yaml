      ## Enums

      ### `TerminalAllowanceCheckMode`

      Specifies the strictness of checking whether a GLR state can accept any future grammar terminals after a token is committed. This check is performed at the end of the `commit` operation.

      ```rust
      #[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]
      pub enum TerminalAllowanceCheckMode {
          None,
          ImmediateSets,
          ImmediateProbe,
          #[default]
          StepProbe,
      }
      ```

      **Variants:**

      *   `None`: No check is performed.
      *   `ImmediateSets`: A fast but potentially over-approximating check. It computes the union of terminals that can be immediately shifted or reduced upon and checks if this set intersects with the terminals the tokenizer can produce.
      *   `ImmediateProbe`: A more precise check than `ImmediateSets`. It probes whether the GLR state has an immediate action (shift or reduce) for any of the terminals the tokenizer can produce.
      *   `StepProbe` (Default): The most precise but slowest check. It simulates a full step for each possible terminal the tokenizer can produce to see if any of them lead to a valid (non-error) state.

      ### `IntermediateTrie3EdgeKey`

      Represents the operations encoded on the edges of the intermediate Trie3 structure during precomputation. This trie is later transformed into the final `PrecomputeNode3` format.

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub enum IntermediateTrie3EdgeKey {
          Pop(usize, StateIDBV),
          Push(StateIDBV),
          CheckLLM(LLMTokenBV),
          NoOp,
      }
      ```

      **Variants:**

      *   `Pop(usize, StateIDBV)`: Represents popping `usize` states from the GLR stack and then checking if the new top-of-stack state is within the `StateIDBV` bitset.
      *   `Push(StateIDBV)`: Represents a check against the top of the GLR stack. This is used during template construction to encode stack states.
      *   `CheckLLM(LLMTokenBV)`: Represents a check against the allowed LLM tokens. This edge is only traversable if the current set of allowed LLM tokens intersects with the `LLMTokenBV` bitset.
      *   `NoOp`: A no-operation edge, used for structural purposes like merging paths.

