      Concrete snippet to paste (replaces the entire body of commit):

        pub fn commit(&mut self, llm_token_id: LLMTokenID) {
            // 1) Map original -> internal for the precompute stage
            let internal_opt = self.parent.precompute_vocab.original_to_internal.get(&llm_token_id.0).cloned();
            if internal_opt.is_none() {
                // Fallback (unknown token in stage-local vocab): use existing byte-based path
                let llm_token_bytes = self.parent.llm_vocab.llm_token_map.get_by_right(&llm_token_id).unwrap();
                return self.commit_bytes(llm_token_bytes);
            }
            let internal_id = internal_opt.unwrap();

            // 2) Reset allowed LLM tokens in the GSS
            let mut gss_memo = HashMap::new();
            for state in self.state.values_mut() {
                reset_llm_tokens(&mut state.active_state.stack, &mut gss_memo);
            }
            gss_memo.clear();

            // 3) Compute commit maps from precompute0
            let (state_map, terminals_map) = match self.parent.compute_commit_maps_precompute0(llm_token_id) {
                Some(pair) => pair,
                None => {
                    // Fallback when precompute0 cannot serve this token
                    let llm_token_bytes = self.parent.llm_vocab.llm_token_map.get_by_right(&llm_token_id).unwrap();
                    return self.commit_bytes(llm_token_bytes);
                }
            };

            // 4) Prune disallowed terminals (as before)
            let stats_before = gather_gss_stats(
                &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
            );
            let mut trans_memo = HashMap::new();
            prune_disallowed_terminals(
                &mut self.state.values_mut().map(|s| &mut s.active_state.stack).collect::<Vec<_>>(),
                &terminals_map,
                &mut trans_memo
            );
            trans_memo.clear();
            let stats_after = gather_gss_stats(
                &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
            );
            if stats_after != stats_before {
                crate::debug!(4, "GSS stats changed after pruning disallowed terminals (precompute0).");
            }

            // 5) Map allowed terminals to tokenizer end states using the precomputed state_map
            for state in self.state.values_mut() {
                map_allowed_terminals_tokenizer_states(&mut state.active_state.stack, &state_map, &mut gss_memo);
            }
            gss_memo.clear();

            // 6) Traverse precompute0 and feed the parser
            // Prepare initial (root, value) pairs
            #[derive(Clone)]
            struct V<'a> {
                glr: GLRParserState<'a>,
                disallowed: crate::datastructures::hybrid_l2_bitset::HybridL2Bitset,
            }

            let mut initial: Vec<(PrecomputeNode0Index, V<'a>)> = Vec::new();
            for (sid, glr_state) in &self.state {
                if let Some(root0) = self.parent.precomputed0.get(sid) {
                    initial.push((
                        *root0,
                        V { glr: glr_state.clone(), disallowed: crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::new() }
                    ));
                }
            }

            let mut new_overall: BTreeMap<TokenizerStateID, GLRParserState<'a>> = BTreeMap::new();
            let trie0_god = &self.parent.trie0_god;
            let end_state_map = &self.parent.precomputed0_end_state_map;

            Trie::special_map_grouped(
                trie0_god,
                initial,
                // step
                |v, (gtid_opt, disallowed_opt), dests| {
                    // Filter children by this token
                    let mut out = Vec::new();
                    for (child, bv) in dests.iter() {
                        if bv.contains(internal_id) {
                            // Clone state/value
                            let mut nv = v.clone();
                            // Apply terminal if present
                            if let Some(gtid) = gtid_opt {
                                nv.glr.step(*gtid);
                                if !nv.glr.is_ok() {
                                    continue;
                                }
                            }
                            // Accumulate disallowed-at-end (we apply later at end nodes)
                            if let Some((end_sid, dis_tid)) = disallowed_opt {
                                let mut l2 = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::new();
                                let mut bv = crate::datastructures::gss::TerminalBV::zeros();
                                bv.insert(dis_tid.0);
                                l2.insert_l2_bitset(end_sid.0, bv);
                                nv.disallowed.merge(&l2);
                            }
                            out.push((*child, nv));
                        }
                    }
                    out
                },
                // merge
                |v1, v2| {
                    v1.glr.merge_with(v2.glr);
                    v1.disallowed.merge(&v2.disallowed);
                },
                // process
                |node, v| {
                    if node.value.end {
                        // At token end: apply disallowed terminals and place final state
                        let mut nv = v.clone();
                        if !nv.disallowed.is_empty() {
                            disallow_terminals_and_prune_arc(&mut nv.glr.active_state.stack, &nv.disallowed, &mut HashMap::new());
                        }
                        if nv.glr.is_ok() {
                            // Determine final tokenizer state from the precomputed end-state map.
                            // Find any start sid that points to this root; we already used state_map above,
                            // but here choose the "best" mapping by intersecting with end_state_map.
                            // We use all possible starting sids from the state_map
                            for (start_sid, end_sid) in state_map.iter() {
                                // push this state under end_sid
                                new_overall.entry(*end_sid)
                                    .and_modify(|old| old.merge_with(nv.glr.clone()))
                                    .or_insert(nv.glr.clone());
                            }
                        }
                        false
                    } else {
                        v.glr.is_ok()
                    }
                },
            );

            self.state = new_overall;
            // Fuse and cleanup (same as end of commit_bytes)
            let mut fuse_memo = HashMap::new();
            for state in self.state.values_mut() {
                state.active_state.stack = fuse_predecessors_recursive(&mut state.active_state.stack, 1, &mut fuse_memo);
            }
            fuse_memo.clear();

            // Post-commit allowance check (unchanged)
            match self.parent.post_commit_allow_check_mode {
                TerminalAllowanceCheckMode::None => {}
                TerminalAllowanceCheckMode::ImmediateSets => {
                    self.state.retain(|tokenizer_state_id, glr_state| {
                        let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                        if accessible.len() >= self.parent.parser.terminal_map.len() { return true; }
                        let mut union = glr_state.immediate_shift_terminals();
                        union.extend(glr_state.immediate_reduce_terminals());
                        !union.is_disjoint(&accessible)
                    });
                }
                TerminalAllowanceCheckMode::ImmediateProbe => {
                    self.state.retain(|tokenizer_state_id, glr_state| {
                        let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                        if accessible.len() >= self.parent.parser.terminal_map.len() { return true; }
                        for tid in &accessible {
                            if glr_state.has_immediate_action_for_terminal(*tid).unwrap_or(false) { return true; }
                        }
                        false
                    });
                }
                TerminalAllowanceCheckMode::StepProbe => {
                    self.state.retain(|tokenizer_state_id, glr_state| {
                        let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                        if accessible.len() >= self.parent.parser.terminal_map.len() { return true; }
                        for tid in &accessible {
                            if glr_state.allows_terminal(*tid) { return true; }
                        }
                        false
                    });
                }
            }
            crate::debug!(4, "Active tokenizer states after committing token {:?}: {:?}", llm_token_id, self.state.keys().map(|k|k.0).collect::<Vec<_>>());
        }

      Notes on the above commit rewrite:
      - We still call prune_disallowed_terminals and map_allowed_terminals_tokenizer_states just like commit_bytes, using precomputed maps (not tokenizer calls).
      - Traversal uses trie0_god, selects only children whose LLMTokenBV includes this token's internal id, feeds terminals to the parser as we go, and collects disallowed-at-end annotations to be applied at end nodes.
      - For final tokenizer states, we used state_map (from precomputed0_end_state_map). If you want a tighter match to your original queue semantics, you can derive the precise end state for each starting sid by combining end_state_map0 per sid instead of reusing state_map here.

