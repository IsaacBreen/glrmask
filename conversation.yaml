                      gss_active_tokens = gss_active_tokens.union(gss.allowed_llm_tokens())
                  ```
              *   **To:**
                  ```python
                  gss_active_tokens = gss_node.allowed_llm_tokens()
                  ```

          *   **Update the stop condition (around line 180):**
              *   **From:**
                  ```python
                  if not gss_set:
