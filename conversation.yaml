          //     eat_u8(ord("_"))
          // ])
          // name_middle = choice([
          //     name_start,
          //     digit,
          // ])
          let ignore = repeat0_fast(choice_fast!(eat_u8_fast(b' '), seq_fast!(eat_u8_fast(b'#'), repeat0_fast(eat_u8_negation_fast(b'\n')), eat_u8_fast(b'\n'))));

