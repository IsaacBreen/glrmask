              prod("S", vec![nt("A")]),
              prod("A", vec![nt("B")]),
              prod("B", vec![nt("C")]),
              prod("C", vec![nt("A")]),
              prod("A", vec![t("x")]),
          ];
          let result_3 = analyze::validate(&productions_3);
