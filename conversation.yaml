      use crate::profiler::PROGRESS_BAR_ENABLED;
      use std::time::Instant;

      // --- Part 1: SimpleBitset ---

      const STOCHASTIC_DEBUG: bool = false; // Set to false by default to avoid heavy stochastic validation on large automata

      thread_local! {
          static IN_SIMPLIFY_CHECK: Cell<bool> = Cell::new(false);
      }

      // SimpleBitset: a RangeSetBlaze with cached fingerprint and fast "is_all" flag.
      // - fp is a content fingerprint used only for hashing; Eq remains content-based via rsb.
      // - is_all tracks whether it is the universe (0..=usize::MAX), enabling fast short-circuits.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Default)]
      pub struct SimpleBitset {
          pub(crate) rsb: RangeSetBlaze<usize>,
          fp: u64,
          is_all: bool,
      }

      // Fingerprint utilities
      const FP_ZERO: u64 = 0x9E37_79B9_7F4A_7C15;
      const FP_ALL: u64 = 0xD6E8_FEB8_6659_FD93;
      const FP_K1: u64 = 0xC2B2_AE3D_27D4_EB4F;
      const FP_K2: u64 = 0x1656_67B1_F3E1_5A6D;
      const FP_K3: u64 = 0x9E37_79B1_1F37_9B97;

      #[inline]
      fn mix3(a: u64, b: u64, c: u64) -> u64 {
          let mut x = a ^ b.wrapping_mul(FP_K1);
          x = x.rotate_left(27) ^ c.wrapping_mul(FP_K2);
          x ^= x >> 33;
          x = x.wrapping_mul(FP_K3);
          x ^ (x >> 29)
      }

      #[inline]
      fn calc_is_all_and_fp(rsb: &RangeSetBlaze<usize>) -> (bool, u64) {
          let mut it = rsb.ranges();
          if let Some(first) = it.next() {
              if *first.start() == 0 && *first.end() == usize::MAX && it.next().is_none() {
                  return (true, FP_ALL);
              }
              let mut fp = mix3(
                  FP_ZERO,
                  *first.start() as u64,
                  (*first.end() as u64).wrapping_mul(FP_K1),
              );
              for r in it {
                  let s = *r.start() as u64;
                  let e = *r.end() as u64;
                  fp = mix3(fp, s.wrapping_mul(FP_K2), e.wrapping_mul(FP_K3));
              }
              (false, fp)
          } else {
              (false, FP_ZERO)
          }
      }

      #[inline]
      fn universe_rsb() -> RangeSetBlaze<usize> {
          RangeSetBlaze::from_iter([0usize..=usize::MAX])
      }

      impl SimpleBitset {
          #[inline]
          fn from_rsb_inner(rsb: RangeSetBlaze<usize>) -> Self {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }

          #[inline]
          fn update_cached(&mut self) {
              let (is_all, fp) = calc_is_all_and_fp(&self.rsb);
              self.is_all = is_all;
              self.fp = fp;
          }

          pub fn zeros() -> Self {
              SimpleBitset { rsb: RangeSetBlaze::new(), fp: FP_ZERO, is_all: false }
          }
          pub fn all() -> Self {
              SimpleBitset { rsb: universe_rsb(), fp: FP_ALL, is_all: true }
          }
          pub fn from_item(item: usize) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter([item]))
          }
          pub fn from_rsb(rsb: RangeSetBlaze<usize>) -> Self {
              SimpleBitset::from_rsb_inner(rsb)
          }
          pub fn len(&self) -> usize {
              self.rsb.len().try_into().unwrap_or(usize::MAX)
          }
          pub fn is_empty(&self) -> bool {
              self.rsb.is_empty()
          }
          pub fn contains(&self, index: usize) -> bool {
              self.rsb.contains(index)
          }
          /// Iterate over items, truncated by `max` to prevent accidental ALL iteration.
          pub fn iter_up_to(&self, max: usize) -> impl Iterator<Item = usize> {
              (&self.rsb & &RangeSetBlaze::from_iter([0..=max])).into_iter()
          }
          #[inline]
          fn with_new_rsb_and_op(_lhs: &SimpleBitset, _rhs: &SimpleBitset, rsb: RangeSetBlaze<usize>, _op_tag: u64) -> SimpleBitset {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }
          #[inline]
          fn with_new_rsb_unary(_src: &SimpleBitset, rsb: RangeSetBlaze<usize>, _op_tag: u64) -> SimpleBitset {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }
          #[inline]
          fn is_all_fast(&self) -> bool { self.is_all }

          #[inline]
          pub fn is_subset_of(&self, rhs: &SimpleBitset) -> bool {
              (self & rhs) == *self
          }
      }

      impl Hash for SimpleBitset {
          fn hash<H: Hasher>(&self, state: &mut H) {
              state.write_u64(self.fp);
          }
      }

      impl Debug for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  write!(f, "SimpleBitset(ALL)")
              } else {
                  Debug::fmt(&self.rsb, f)
              }
          }
      }

      impl Display for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  return write!(f, "ALL");
              }
              write!(f, "[")?;
              let mut ranges = self.rsb.ranges().peekable();
              while let Some(range) = ranges.next() {
                  if range.start() == range.end() {
                      write!(f, "{}", range.start())?;
                  } else {
                      write!(f, "{}..={}", range.start(), range.end())?;
                  }
                  if ranges.peek().is_some() {
                      write!(f, ", ")?;
                  }
              }
              write!(f, "]")
          }
      }

      impl FromIterator<usize> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = usize>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      impl FromIterator<std::ops::RangeInclusive<usize>> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = std::ops::RangeInclusive<usize>>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      // Borrowed bit-ops
      impl<'a> BitAnd<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() {
                  return SimpleBitset::zeros();
              }
              if self.is_all_fast() { return rhs.clone(); }
              if rhs.is_all_fast() { return self.clone(); }
              let rsb = &self.rsb & &rhs.rsb;
              SimpleBitset::with_new_rsb_and_op(self, rhs, rsb, 0xA1)
          }
      }
      impl<'a> BitOr<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_all_fast() || rhs.is_all_fast() {
                  return SimpleBitset::all();
              }
              if self.is_empty() { return rhs.clone(); }
              if rhs.is_empty() { return self.clone(); }
              let rsb = &self.rsb | &rhs.rsb;
              SimpleBitset::with_new_rsb_and_op(self, rhs, rsb, 0xB1)
          }
      }

      // Assign ops (borrowed RHS)
      impl BitAndAssign<&SimpleBitset> for SimpleBitset {
          fn bitand_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() { return; }
              if rhs.is_empty() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              if rhs.is_all_fast() { return; }
              if self.is_all_fast() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb = &self.rsb & &rhs.rsb;
              self.update_cached();
          }
      }
      impl BitOrAssign<&SimpleBitset> for SimpleBitset {
          fn bitor_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_all_fast() || rhs.is_all_fast() {
                  *self = SimpleBitset::all();
                  return;
              }
              if rhs.is_empty() { return; }
              if self.is_empty() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb |= &rhs.rsb;
              self.update_cached();
          }
      }

      // Owned fallbacks via borrowed ops
      impl BitAnd<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output {
              (&self) & (&rhs)
          }
      }
      impl BitOr<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output {
              (&self) | (&rhs)
          }
      }
      impl<'a> BitAnd<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output {
              (&self) & rhs
          }
      }
      impl<'a> BitOr<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output {
              (&self) | rhs
          }
      }
      impl<'a> BitAnd<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output {
              self & (&rhs)
          }
      }
      impl<'a> BitOr<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output {
              self | (&rhs)
          }
      }

      impl SubAssign<&SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() || rhs.is_empty() { return; }
              if self.is_all_fast() && rhs.is_all_fast() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              self.rsb = &self.rsb - &rhs.rsb;
              self.update_cached();
          }
      }
      impl SubAssign<SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: SimpleBitset) {
              *self -= &rhs
          }
      }
      impl Sub<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: SimpleBitset) -> Self::Output {
              (&self) - (&rhs)
          }
      }
      impl<'a> Sub<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() { return self.clone(); }
              if self.is_all_fast() && rhs.is_all_fast() { return SimpleBitset::zeros(); }
              let rsb = &self.rsb - &rhs.rsb;
              SimpleBitset::with_new_rsb_and_op(self, rhs, rsb, 0xC1)
          }
      }

      impl Not for SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() { return SimpleBitset::all(); }
              if self.is_all_fast() { return SimpleBitset::zeros(); }
              let rsb = &universe_rsb() - &self.rsb;
              SimpleBitset::with_new_rsb_unary(&self, rsb, 0xD1)
          }
      }
      impl Not for &SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() { return SimpleBitset::all(); }
              if self.is_all_fast() { return SimpleBitset::zeros(); }
              let rsb = &universe_rsb() - &self.rsb;
              SimpleBitset::with_new_rsb_unary(self, rsb, 0xD2)
          }
      }

      // --- Part 2: I16Map ---

      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Hash, Debug, Default)]
      pub struct I16Map<T> {
          pub exceptions: BTreeMap<i16, T>,
          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      // --- Part 3: Automata Definitions (DWA only) ---

      pub type StateID = usize;
      pub type Weight = SimpleBitset;

      // --- Deterministic Weighted Automaton (DWA) ---

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum DWABuildError {
          TransitionAlreadyExists { from: StateID, on: i16 },
          DefaultTransitionAlreadyExists { from: StateID },
          StateOutOfBounds { state: StateID },
      }

      impl Display for DWABuildError {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              match self {
                  DWABuildError::TransitionAlreadyExists { from, on } => {
                      write!(f, "Transition from state {} on code {} already exists", from, on)
                  }
                  DWABuildError::DefaultTransitionAlreadyExists { from } => {
                      write!(f, "Default transition from state {} already exists", from)
                  }
                  DWABuildError::StateOutOfBounds { state } => write!(f, "State {} is out of bounds", state),
              }
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAState {
          pub transitions: I16Map<StateID>,
          pub final_weight: Option<Weight>,
          pub trans_weight_default: Option<Weight>,
          pub trans_weights_exceptions: BTreeMap<i16, Weight>,
          /// Optional state-entry weight (intersected upon entering the state).
          pub state_weight: Option<Weight>,
      }

      impl DWAState {
          pub fn get_weight(&self, ch: i16) -> Option<&Weight> {
              self.trans_weights_exceptions.get(&ch).or(self.trans_weight_default.as_ref())
          }

          /// Intersects all weights in this state with the given weight.
          pub fn apply_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw &= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw &= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd &= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w &= weight;
              }
          }

          /// Subtracts a weight from all weights in this state.
          pub fn exclude_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw -= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw -= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd -= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w -= weight;
              }
          }

          /// Iterator over all outgoing edges:
          /// - Default edge appears as (None, target, weight)
          /// - Exception edges appear as (Some(label), target, weight)
          #[inline]
          pub fn iter_edges(&self) -> impl Iterator<Item = (Option<i16>, StateID, &Weight)> {
              let def_iter = self
                  .transitions
                  .default
                  .and_then(|to| self.trans_weight_default.as_ref().map(move |w| (to, w)))
                  .into_iter()
                  .map(|(to, w)| (None, to, w));
              let ex_iter = self
                  .transitions
                  .exceptions
                  .iter()
                  .filter_map(|(ch, to)| self.trans_weights_exceptions.get(ch).map(|w| (Some(*ch), *to, w)));
              def_iter.chain(ex_iter)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAStates(pub Vec<DWAState>);

      impl Index<usize> for DWAStates {
          type Output = DWAState;
          fn index(&self, index: usize) -> &Self::Output {
              &self.0[index]
          }
      }
      impl IndexMut<usize> for DWAStates {
          fn index_mut(&mut self, index: usize) -> &mut Self::Output {
              &mut self.0[index]
          }
      }
      impl Deref for DWAStates {
          type Target = [DWAState];
          fn deref(&self) -> &Self::Target {
              &self.0
          }
      }
      impl DWAStates {
          pub fn len(&self) -> usize {
              self.0.len()
          }
          pub fn add_state(&mut self) -> StateID {
              let id = self.0.len();
              self.0.push(DWAState::default());
              id
          }

          /// Adds a pre-existing DWAState to the collection and returns its new ID.
          pub fn add_existing_state(&mut self, state: DWAState) -> StateID {
              let id = self.0.len();
              self.0.push(state);
              id
          }

          pub fn copy_state(&mut self, state_id: StateID) -> StateID {
              assert!(state_id < self.len(), "state_id out of bounds");
              let state = self[state_id].clone();
              self.add_existing_state(state)
          }

          pub fn apply_weight(&mut self, state_id: StateID, weight: &Weight) {
              assert!(state_id < self.len(), "state_id out of bounds");
              self[state_id].apply_weight(weight);
          }

          pub fn copy_subgraph(&mut self, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= self.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(self[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = self[old_id].clone();

                  // Remap default transition
                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  // Remap exception transitions
                  let mut new_exceptions = BTreeMap::new();
                  for (ch, &old_target) in &old_state_clone.transitions.exceptions {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      new_exceptions.insert(*ch, new_target_id);
                  }
                  self[new_id].transitions.exceptions = new_exceptions;
              }
              (new_start_id, remap)
          }

          pub fn copy_subgraph_from(&mut self, other_states: &DWAStates, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= other_states.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(other_states[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = other_states[old_id].clone();

                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  self[new_id].transitions.exceptions = old_state_clone.transitions.exceptions.iter().map(|(ch, &old_target)| {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      (*ch, new_target_id)
                  }).collect();
              }
              (new_start_id, remap)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWABody {
          pub start_state: StateID,
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWA {
          pub states: DWAStates,
          pub body: DWABody,
      }

      impl DWA {
          pub fn new() -> Self {
              let mut states = DWAStates::default();
              let start = states.add_state();
              DWA { states, body: DWABody { start_state: start } }
          }

          pub fn add_state(&mut self) -> StateID {
              self.states.add_state()
          }

          pub fn set_state_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].state_weight = Some(weight);
              Ok(())
          }

          pub fn set_final_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].final_weight = Some(weight);
              Ok(())
          }

          pub fn add_transition(
              &mut self,
              from: StateID,
              on: i16,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.exceptions.contains_key(&on) {
                  return Err(DWABuildError::TransitionAlreadyExists { from, on });
              }
              from_state.transitions.exceptions.insert(on, to);
              from_state.trans_weights_exceptions.insert(on, weight);
              Ok(())
          }

          pub fn set_default_transition(
              &mut self,
              from: StateID,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.default.is_some() {
                  return Err(DWABuildError::DefaultTransitionAlreadyExists { from });
              }
              from_state.transitions.default = Some(to);
              from_state.trans_weight_default = Some(weight);
              Ok(())
          }

          pub fn simplify(&mut self) {
              let is_checking = IN_SIMPLIFY_CHECK.with(|c| c.get());
              let before_simplify = if !is_checking && STOCHASTIC_DEBUG { Some(self.clone()) } else { None };

              Self::simplify_components(&mut self.states, &mut self.body);

              if let Some(before) = before_simplify {
                  IN_SIMPLIFY_CHECK.with(|c| c.set(true));
                  test_weighted_automata::assert_dwa_equivalent(before, self.clone());
                  IN_SIMPLIFY_CHECK.with(|c| c.set(false));
              }
          }

          pub fn simplify_components(states: &mut DWAStates, body: &mut DWABody) {
              let now = Instant::now();
              let initial_len = states.len();
              if states.0.is_empty() {
                  return;
              }

              Self::normalize_edges_inplace(states);
              Self::prune_unreachable(states, body);

              let mut changed_any = true;
              let mut passes = 0usize;
              while changed_any && passes < 10 {
                  passes += 1;
                  changed_any = false;
                  if Self::normalize_edges_inplace(states) {
                      changed_any = true;
                  }
                  if Self::propagate_and_constrain_weights(states, body) {
                      changed_any = true;
                  }
                  if Self::propagate_future_weights(states) {
                      changed_any = true;
                  }
                  if Self::minimize_partition_refinement(states, body) {
                      changed_any = true;
                  }
                  if Self::normalize_edges_inplace(states) {
                      changed_any = true;
                  }
                  if Self::prune_unreachable(states, body) {
                      changed_any = true;
                  }
              }
              crate::debug!(3, "DWA::simplify_components ({} states -> {} states) took: {:?}", initial_len, states.len(), now.elapsed());
          }

          pub fn propagate_and_constrain_weights(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              let mut reachable_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();

              if body.start_state >= n {
                  return false;
              }
              reachable_weights[body.start_state] = Weight::all();
              worklist.push_back(body.start_state);

              while let Some(u) = worklist.pop_front() {
                  let u_rw = reachable_weights[u].clone();
                  if u_rw.is_empty() {
                      continue;
                  }
                  let u_state = &states[u];

                  // State entry weight gates outgoing paths too
                  let gated_u_rw = if let Some(sw) = &u_state.state_weight {
                      &u_rw & sw
                  } else {
                      u_rw
                  };

                  for (_lbl, v, edge_w) in u_state.iter_edges() {
                      if v >= n { continue; }
                      let new_v_rw = &gated_u_rw & edge_w;
                      let old_v_rw = &reachable_weights[v];

                      if !new_v_rw.is_subset_of(old_v_rw) {
                          reachable_weights[v] |= &new_v_rw;
                          worklist.push_back(v);
                      }
                  }
              }

              // Now apply constraints
              let mut changed = false;
              for i in 0..n {
                  let old_fw = states[i].final_weight.clone();
                  if let Some(fw) = states[i].final_weight.as_mut() {
                      *fw &= &reachable_weights[i];
                      if fw.is_empty() {
                          states[i].final_weight = None;
                      }
                  }
                  if states[i].final_weight != old_fw {
                      changed = true;
                  }
              }
              changed
          }

          pub fn propagate_future_weights(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              // Reverse adjacency (unique preds)
              let mut rev_adj: Vec<Vec<StateID>> = vec![vec![]; n];
              for i in 0..n {
                  for (_lbl, v, _w) in states[i].iter_edges() {
                      if v < n { rev_adj[v].push(i); }
                  }
              }
              for preds in rev_adj.iter_mut() {
                  preds.sort_unstable();
                  preds.dedup();
              }

              let mut future_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();
              for i in 0..n {
                  if let Some(fw) = &states[i].final_weight {
                      if !fw.is_empty() {
                          future_weights[i] = fw.clone();
                          for &pred in &rev_adj[i] {
                              worklist.push_back(pred);
                          }
                      }
                  }
              }

              while let Some(u) = worklist.pop_front() {
                  let mut u_new_fw = states[u].final_weight.clone().unwrap_or_else(Weight::zeros);

                  if let Some(sw) = &states[u].state_weight {
                      u_new_fw |= sw;
                  }

                  for (_lbl, v, edge_w) in states[u].iter_edges() {
                      if v < n {
                          u_new_fw |= &(edge_w & &future_weights[v]);
                      }
                  }

                  if u_new_fw != future_weights[u] {
                      future_weights[u] = u_new_fw;
                      for &pred in &rev_adj[u] {
                          worklist.push_back(pred);
                      }
                  }
              }

              // Precompute complements to avoid recomputing !future_weights[v] many times
              let not_future: Vec<Weight> = future_weights.iter().map(|w| !w).collect();

              // 2. Update edge weights. An edge weight W can be relaxed to W | !future_weight(target)
              // because any bits not in future_weight(target) would be filtered out anyway.
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  // Default
                  if let Some(v) = st.transitions.default {
                      if v < n {
                          if let Some(w) = st.trans_weight_default.as_mut() {
                              let new_w = &*w | &not_future[v];
                              if new_w != *w {
                                  *w = new_w;
                                  any_weight_changed = true;
                              }
                          }
                      }
                  }
                  // Exceptions
                  let keys: Vec<i16> = st.transitions.exceptions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.exceptions.get(&ch) {
                          if v < n {
                              if let Some(w) = st.trans_weights_exceptions.get_mut(&ch) {
                                  let new_w = &*w | &not_future[v];
                                  if new_w != *w {
                                      *w = new_w;
                                      any_weight_changed = true;
                                  }
                              }
                          }
                      }
                  }
              }

              any_weight_changed
          }

          pub fn normalize_edges_inplace(states: &mut DWAStates) -> bool {
              let mut changed = false;
              for st in &mut states.0 {
                  let before = st.transitions.exceptions.len();
                  if let Some(def) = st.transitions.default {
                      st.transitions.exceptions.retain(|_, &mut tgt| tgt != def);
                  }
                  changed |= st.transitions.exceptions.len() != before;

                  let before_w = st.trans_weights_exceptions.len();
                  st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  changed |= st.trans_weights_exceptions.len() != before_w;
              }
              changed
          }

          pub fn minimize_partition_refinement(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.0.len();
              if n <= 1 {
                  return false;
              }
              let sink_pid: usize = n;

              // Initial partition by outputs (state_weight, final_weight).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<(Option<Weight>, Option<Weight>), usize> = HashMap::new();
              for i in 0..n {
                  let key = (states[i].state_weight.clone(), states[i].final_weight.clone());
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Refine until stable
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<(Option<Weight>, Option<Weight>, usize, Vec<(i16, usize)>), usize> = HashMap::new();

                  for i in 0..n {
                      let st = &states[i];
                      let def_cls = st.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);
                      let mut ex: Vec<(i16, usize)> = Vec::with_capacity(st.transitions.exceptions.len());
                      for (ch, tgt) in &st.transitions.exceptions {
                          let cls = part[*tgt];
                          if cls != def_cls {
                              ex.push((*ch, cls));
                          }
                      }
                      let sig = (st.state_weight.clone(), st.final_weight.clone(), def_cls, ex);
                      let next_pid = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(next_pid);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Early exit if nothing to merge
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Build representatives
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<DWAState> = Vec::with_capacity(groups.len());
              for (pid, members) in &groups {
                  let rep = members[0];
                  let rep_state = &states[rep];
                  let def_cls = rep_state.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);

                  let mut st = DWAState::default();
                  st.state_weight = rep_state.state_weight.clone();
                  st.final_weight = rep_state.final_weight.clone();
                  st.transitions.default = if def_cls == sink_pid { None } else { Some(0) };
                  for (ch, tgt) in &rep_state.transitions.exceptions {
                      let cls = part[*tgt];
                      if cls != def_cls {
                          st.transitions.exceptions.insert(*ch, 0);
                      }
                  }

                  // Aggregate per-edge weights across members (join).
                  if st.transitions.default.is_some() {
                      let mut agg_def: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weight_default.as_ref() {
                              if let Some(ref mut a) = agg_def {
                                  *a |= w;
                              } else {
                                  agg_def = Some(w.clone());
                              }
                          }
                      }
                      st.trans_weight_default = agg_def;
                  }
                  let ex_keys: Vec<i16> = st.transitions.exceptions.keys().cloned().collect();
                  for ch in ex_keys {
                      let mut agg: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weights_exceptions.get(&ch) {
                              if let Some(ref mut a) = agg {
                                  *a |= w;
                              } else {
                                  agg = Some(w.clone());
                              }
                          }
                      }
                      if let Some(w) = agg {
                          st.trans_weights_exceptions.insert(ch, w);
                      }
                  }

                  let new_id = new_states.len();
                  pid_to_new.insert(*pid, new_id);
                  new_states.push(st);
              }

              // Fix transition targets
              for (pid, members) in &groups {
                  let new_id = *pid_to_new.get(pid).unwrap();
                  let rep = members[0];
                  let rep_state = &states[rep];

                  let def_cls = rep_state.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);
                  if let Some(ref mut d) = new_states[new_id].transitions.default {
                      *d = *pid_to_new.get(&def_cls).unwrap();
                  }
                  let ex_old = new_states[new_id].transitions.exceptions.clone();
                  new_states[new_id].transitions.exceptions.clear();
                  for (ch, _) in ex_old {
                      let cls = part[*rep_state.transitions.exceptions.get(&ch).unwrap()];
                      new_states[new_id].transitions.exceptions.insert(ch, *pid_to_new.get(&cls).unwrap());
                  }
              }

              states.0 = new_states;
              Self::normalize_edges_inplace(states);
              let start_pid = part[body.start_state];
              body.start_state = *pid_to_new.get(&start_pid).unwrap();

              true
          }

          pub fn prune_unreachable(states: &mut DWAStates, body: &mut DWABody) -> bool {
              if states.0.is_empty() {
                  return false;
              }
              let n = states.0.len();

              // 1. Backward reachability from final states to find "live" states.
              let mut live = vec![false; n];
              let mut q_live: VecDeque<usize> = VecDeque::new();
              let mut rev_adj: Vec<Vec<usize>> = vec![vec![]; n];
              for i in 0..n {
                  if states[i].final_weight.as_ref().map_or(false, |w| !w.is_empty()) {
                      live[i] = true;
                      q_live.push_back(i);
                  }
                  for (_lbl, v, _w) in states[i].iter_edges() {
                      if v < n {
                          rev_adj[v].push(i);
                      }
                  }
              }
              while let Some(u) = q_live.pop_front() {
                  for &v in &rev_adj[u] {
                      if !live[v] { live[v] = true; q_live.push_back(v); }
                  }
              }

              // 2. Remove transitions to non-live states.
              let mut changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  if let Some(d) = st.transitions.default {
                      if !live[d] {
                          st.transitions.default = None;
                          st.trans_weight_default = None;
                          changed = true;
                      }
                  }
                  let before = st.transitions.exceptions.len();
                  st.transitions.exceptions.retain(|_, tgt| live[*tgt]);
                  if st.transitions.exceptions.len() != before {
                      changed = true;
                      st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  }
              }

              // 3. Forward reachability from start_state to find actually reachable states.
              let mut visited = vec![false; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              if body.start_state < n {
                  visited[body.start_state] = true;
                  q.push_back(body.start_state);
              }
              while let Some(u) = q.pop_front() {
                  for (_lbl, v, _w) in states[u].iter_edges() {
                      if v < n && !visited[v] { visited[v] = true; q.push_back(v); }
                  }
              }

              if visited.iter().all(|&b| b) && !changed {
                  return false;
              }

              // 4. Remap kept states.
              let mut map = vec![usize::MAX; n];
              let mut next_id = 0usize;
              for i in 0..n { if visited[i] { map[i] = next_id; next_id += 1; } }

              if next_id == n && !changed { return false; }

              let mut new_states: Vec<DWAState> = Vec::with_capacity(next_id);
              for old in 0..n {
                  if !visited[old] { continue; }
                  let mut st = states[old].clone();
                  if let Some(d) = st.transitions.default { st.transitions.default = Some(map[d]); }
                  let ex = st.transitions.exceptions.clone();
                  st.transitions.exceptions.clear();
                  for (ch, tgt) in ex { st.transitions.exceptions.insert(ch, map[tgt]); }
                  new_states.push(st);
              }
              states.0 = new_states;
              if next_id > 0 {
                  body.start_state = map[body.start_state];
              } else if n > 0 {
                  states.0.clear();
                  body.start_state = states.add_state();
              }
              true
          }

          // --- Evaluation and sampling helpers ---
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let mut result_dwa = union_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let mut result_dwa = concat_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      // --- Display Implementations for Debugging ---
      pub fn format_pos_code(code: i16) -> String {
          let u = code as u16;
          if let Some(c) = char::from_u32(u as u32) {
              if c.is_ascii_graphic() || c == ' ' {
                  format!("'{}'", c)
              } else {
                  format!("{}", u)
              }
          } else {
              format!("{}", u)
          }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
      impl Display for DWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "DWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(sw) = &state.state_weight {
                      writeln!(f, "    state_weight: {}", sw)?;
                  }
                  if let Some(to) = &state.transitions.default {
                      if let Some(w) = &state.trans_weight_default {
                          writeln!(f, "    * -> {} (trans_weight: {})", to, w)?;
                      } else {
                          writeln!(f, "    * -> {}", to)?;
                      }
                  }
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  for (on, to) in &state.transitions.exceptions {
                      let char_repr = if *on >= 0 {
                          format_pos_code(*on)
                      } else {
                          let decoded_id = on.wrapping_sub(i16::MIN);
                          format!("neg({})", decoded_id)
                      };
                      if let Some(w) = state.trans_weights_exceptions.get(on) {
                          writeln!(f, "    {} -> {} (trans_weight: {})", char_repr, to, w)?;
                      } else {
                          writeln!(f, "    {} -> {}", char_repr, to)?;
                      }
                  }
              }
              Ok(())
          }
      }

      // --- JSON ---

      impl JSONConvertible for SimpleBitset {
          fn to_json(&self) -> JSONNode {
              let ranges_vec: Vec<Vec<usize>> = self.rsb.ranges().map(|ri| vec![*ri.start(), *ri.end()]).collect();
              ranges_vec.to_json()
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let ranges_vec: Vec<Vec<usize>> = Vec::from_json(node)?;
              let mut ranges = Vec::new();
              for mut v in ranges_vec {
                  if v.len() != 2 {
                      return Err(format!("Expected 2-element array for SimpleBitset range, got {:?}", v));
                  }
                  let end = v.pop().unwrap();
                  let start = v.pop().unwrap();
                  ranges.push(start..=end);
              }
              Ok(SimpleBitset::from_rsb(RangeSetBlaze::from_iter(ranges)))
          }
      }

      impl<T: JSONConvertible> JSONConvertible for I16Map<T> {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("exceptions".to_string(), self.exceptions.to_json());
              obj.insert("default".to_string(), self.default.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let exceptions =
                  BTreeMap::<i16, T>::from_json(obj.remove("exceptions").ok_or("Missing 'exceptions' field")?)?;
              let default = Option::<T>::from_json(obj.remove("default").ok_or("Missing 'default' field")?)?;
              Ok(I16Map { exceptions, default })
          }
      }

      impl JSONConvertible for DWAState {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("transitions".to_string(), self.transitions.to_json());
              obj.insert("final_weight".to_string(), self.final_weight.to_json());
              obj.insert("trans_weight_default".to_string(), self.trans_weight_default.to_json());
              obj.insert("trans_weights_exceptions".to_string(), self.trans_weights_exceptions.to_json());
              obj.insert("state_weight".to_string(), self.state_weight.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let transitions =
                  I16Map::<StateID>::from_json(obj.remove("transitions").ok_or("Missing 'transitions' field")?)?;
              let final_weight =
                  Option::<Weight>::from_json(obj.remove("final_weight").ok_or("Missing 'final_weight' field")?)?;
              let trans_weight_default = Option::<Weight>::from_json(
                  obj.remove("trans_weight_default").ok_or("Missing 'trans_weight_default' field")?,
              )?;
              let trans_weights_exceptions = BTreeMap::<i16, Weight>::from_json(
                  obj.remove("trans_weights_exceptions").ok_or("Missing 'trans_weights_exceptions' field")?,
              )?;
              let state_weight =
                  Option::<Weight>::from_json(obj.remove("state_weight").ok_or("Missing 'state_weight' field")?)?;
              Ok(DWAState { transitions, final_weight, trans_weight_default, trans_weights_exceptions, state_weight })
          }
      }

      impl JSONConvertible for DWA {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("states".to_string(), self.states.0.to_json());
              obj.insert("start_state".to_string(), self.body.start_state.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let states = Vec::<DWAState>::from_json(obj.remove("states").ok_or("Missing 'states' field")?)?;
              let start_state = StateID::from_json(obj.remove("start_state").ok_or("Missing 'start_state' field")?)?;
              Ok(DWA { states: DWAStates(states), body: DWABody { start_state } })
          }
      }

      pub type NWAStateID = usize;

      /// - Non-epsilon transitions: unique target per input symbol.
      /// - Each transition carries a weight (Weight), which is intersected along the path; final states
      ///   carry a final weight that is intersected at acceptance; multiple alternative paths union their weights.
      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct NWAState {
          pub final_weight: Option<Weight>,
          /// Non-epsilon transitions: unique target per input symbol.
          /// Map: label -> (target, weight)
          pub transitions: BTreeMap<i16, (NWAStateID, Weight)>,
          /// Epsilon transitions: list of (target, weight).
          pub epsilons: Vec<(NWAStateID, Weight)>,
          /// Default transition: used when a labeled transition for a symbol is absent.
          /// Semantics: for any symbol not present as a labeled transition, this edge applies.
          pub default: Option<(NWAStateID, Weight)>,
      }

      #[derive(Clone, Debug, Default)]
      pub struct NWAStates(pub Vec<NWAState>);

      impl NWAState {
          pub fn get_transition(&self, on: i16) -> Option<&(NWAStateID, Weight)> {
              self.transitions.get(&on).or_else(|| {
                  if let Some(result) = &self.default {
                      Some(result)
                  } else {
                      None
                  }
              })
          }
      }

      impl NWAStates {
          pub fn len(&self) -> usize { self.0.len() }

          pub fn add_state(&mut self) -> NWAStateID {
              let id = self.0.len();
              self.0.push(NWAState::default());
              id
          }

          pub fn copy_state(&mut self, state_id: NWAStateID) -> NWAStateID {
              assert!(state_id < self.len(), "copy_state: state_id out of bounds");
              let new_id = self.add_state();
              self.0[new_id] = self.0[state_id].clone();
              new_id
          }

          pub fn add_epsilon(&mut self, from: NWAStateID, to: NWAStateID, w: Weight) {
              assert!(from < self.len() && to < self.len(), "add_epsilon: state id out of bounds");
              self.0[from].epsilons.push((to, w));
          }

          /// Add a labeled transition; if an existing transition on the same label exists,
          /// we merge weights if the target is the same, otherwise we assert (as per restricted NWA).
          pub fn add_transition(&mut self, from: NWAStateID, on: i16, to: NWAStateID, w: Weight) {
              assert!(from < self.len() && to < self.len(), "add_transition: state id out of bounds");
              if let Some((old_to, old_w)) = self.0[from].transitions.get_mut(&on) {
                  assert_eq!(*old_to, to, "NWA restricted: only one target per (state, symbol)");
                  *old_w |= &w;
              } else {
                  self.0[from].transitions.insert(on, (to, w));
              }
          }

          /// Deep-copy a subgraph starting at 'start_id' from another NWAStates arena into self.
          /// Returns (new_start_id, remap_old_to_new)
          pub fn copy_subgraph_from(&mut self, other: &NWAStates, start_id: NWAStateID) -> (NWAStateID, HashMap<NWAStateID, NWAStateID>) {
              let mut remap: HashMap<NWAStateID, NWAStateID> = HashMap::new();
              if start_id >= other.len() {
                  let new_start = self.add_state();
                  return (new_start, remap);
              }
              let new_start = self.add_state();
              self.0[new_start] = other.0[start_id].clone();
              remap.insert(start_id, new_start);

              let mut q = VecDeque::new();
              q.push_back((start_id, new_start));

              while let Some((old, new)) = q.pop_front() {
                  // Epsilon edges
                  let eps = other.0[old].epsilons.clone();
                  self.0[new].epsilons.clear();
                  for (to_old, w) in eps {
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].epsilons.push((to_new, w.clone()));
                  }
                  // Labeled edges
                  let trans = other.0[old].transitions.clone();
                  self.0[new].transitions.clear();
                  for (lbl, (to_old, w)) in trans {
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].transitions.insert(lbl, (to_new, w.clone()));
                  }
                  // Default edge
                  let def_old = other.0[old].default.clone();
                  self.0[new].default = None;
                  if let Some((to_old, w)) = def_old {
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].default = Some((to_new, w));
                  }
              }

              (new_start, remap)
          }
      }

      impl std::ops::Index<NWAStateID> for NWAStates {
          type Output = NWAState;
          fn index(&self, index: NWAStateID) -> &Self::Output { &self.0[index] }
      }
      impl std::ops::IndexMut<NWAStateID> for NWAStates {
          fn index_mut(&mut self, index: NWAStateID) -> &mut Self::Output { &mut self.0[index] }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct NWABody {
          pub start_state: NWAStateID,
      }

      #[derive(Clone, Debug, Default)]
      pub struct NWA {
          pub states: NWAStates,
          pub body: NWABody,
      }

      // A compact grouping key used during determinization for lazy step application:
      // - mask: an interned epsilon-closure mask (Arc<Vec<(state, weight)>>).
      //         We key by pointer identity to avoid scanning; these masks are already interned.
      // - w:    the edge weight to apply on top of the mask; fingerprint used for hashing, full Eq for correctness.
      #[derive(Clone)]
      struct StepGroupKey {
          mask: Arc<Vec<(NWAStateID, Weight)>>,
          w: Weight,
          fp: u64,
      }

      impl PartialEq for StepGroupKey {
          fn eq(&self, other: &Self) -> bool {
              if !Arc::ptr_eq(&self.mask, &other.mask) {
                  return false;
              }
              if self.fp != other.fp {
                  return false;
              }
              self.w == other.w
          }
      }
      impl Eq for StepGroupKey {}
      impl std::hash::Hash for StepGroupKey {
          fn hash<H: std::hash::Hasher>(&self, state: &mut H) { state.write_usize(Arc::as_ptr(&self.mask) as usize); state.write_u64(self.fp); }
      }

      impl NWA {
          pub fn new() -> Self {
              let mut states = NWAStates::default();
              let start = states.add_state();
              Self { states, body: NWABody { start_state: start } }
          }

          /// Compute per-state future acceptance masks F[s]:
          /// F[s] = final[s] ∪ ⋃_{ε s->t}(wε ∧ F[t]) ∪ ⋃_{lbl s->t}(wlbl ∧ F[t]) ∪ (if def s->t) (wdef ∧ F[t])
          /// This is a standard monotone least fixpoint computed by reverse propagation.
          pub fn compute_future_weights(&self) -> Vec<Weight> {
              let n = self.states.len();
              let mut fut: Vec<Weight> = vec![Weight::zeros(); n];
              let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

              // Build reverse adjacency aggregating all edge types with their weights.
              for p in 0..n {
                  // Epsilon
                  for &(t, ref w) in &self.states[p].epsilons {
                      if t < n { rev[t].push((p, w.clone())); }
                  }
                  // Labeled
                  for (_, (t, w)) in &self.states[p].transitions {
                      if *t < n { rev[*t].push((p, w.clone())); }
                  }
                  // Default
                  if let Some((t, w)) = &self.states[p].default {
                      if *t < n { rev[*t].push((p, w.clone())); }
                  }
              }

              // Initialize with final weights
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              for s in 0..n {
                  if let Some(fw) = &self.states[s].final_weight {
                      if !fw.is_empty() {
                          fut[s] = fw.clone();
                          q.push_back(s);
                      }
                  }
              }

              // Reverse propagation: when fut[v] grows, update predecessors p using edge weight wpv.
              while let Some(v) = q.pop_front() {
                  let fv = fut[v].clone();
                  if fv.is_empty() { continue; }
                  for &(p, ref w_pv) in &rev[v] {
                      let add = &fv & w_pv;
                      if add.is_empty() { continue; }
                      let old = &fut[p];
                      if (&add & old) != add {
                          fut[p] |= &add;
                          q.push_back(p);
                      }
                  }
              }
              fut
          }

          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      if let Some(w) = &st.trans_weight_default {
                          nwa.states.0[i].default = Some((to, w.clone()));
                      }
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      if let Some(w) = st.trans_weights_exceptions.get(lbl) {
                          nwa.states.add_transition(i, *lbl, *to, w.clone());
                      }
                  }
              }
              nwa
          }

          pub fn simplify(&mut self) -> bool {
              let initial_n = self.states.len();
              let mut changed = true;
              let mut passes = 0;
              while changed && passes < 5 {
                  passes += 1;
                  changed = false;
                  if self.prune_unreachable() { changed = true; }
                  if self.prune_dead_ends() { changed = true; }
                  if self.collapse_all_weight_epsilon_sccs() { changed = true; }
              }
              self.states.len() != initial_n
          }

          fn prune_unreachable(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut reachable = vec![false; n];
              let mut q = VecDeque::new();

              if self.body.start_state < n {
                  reachable[self.body.start_state] = true;
                  q.push_back(self.body.start_state);
              } else {
                  let changed = n > 0;
                  if changed {
                      self.states.0.clear();
                      self.body.start_state = self.states.add_state();
                  }
                  return changed;
              }

              while let Some(u) = q.pop_front() {
                  let st = &self.states[u];
                  for (v, _) in &st.epsilons {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
                  for (_, (v, _)) in &st.transitions {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
                  if let Some((v, _)) = &st.default {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
              }

              let num_reachable = reachable.iter().filter(|&&b| b).count();
              if num_reachable == n { return false; }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_reachable);
              for i in 0..n {
                  if reachable[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);
                  st.transitions.values_mut().for_each(|(v, _)| *v = remap[*v]);
                  if let Some((v, _)) = &mut st.default {
                      *v = remap[*v];
                  }
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

          fn prune_dead_ends(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let fut = self.compute_future_weights();
              let live: Vec<bool> = fut.iter().map(|w| !w.is_empty()).collect();

              if self.body.start_state >= n || !live[self.body.start_state] {
                  let changed = n > 0;
                  self.states.0.clear();
                  self.body.start_state = self.states.add_state();
                  return changed;
              }

              let num_live = live.iter().filter(|&&b| b).count();
              if num_live == n { return false; }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_live);
              for i in 0..n {
                  if live[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.retain(|(v, _)| live[*v]);
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);

                  st.transitions.retain(|_, (v, _)| live[*v]);
                  st.transitions.values_mut().for_each(|(v, _)| *v = remap[*v]);

                  if let Some((v, _)) = &st.default {
                      if !live[*v] {
                          st.default = None;
                      } else {
                          st.default.as_mut().unwrap().0 = remap[*v];
                      }
                  }
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

          /// Determinize the subgraph reachable from 'start' to a DWA via weighted subset construction.
          /// Representation invariant:
          /// - A D-state is a mapping M: NWAStateID -> Weight capturing epsilon-closure weights.
          /// - For each label c, we compute T0 by distributing M over c-labeled edges, then epsilon-closure T.
          /// - The deterministic edge weight is union of weights in T; the target D-state is canonicalized T.
          /// - Final weight of the D-state is union over s in M of (M[s] & final_weight[s]).
          pub fn determinize_to_dwa(&self) -> DWA {
              let mut nwa_clone = self.clone();
              nwa_clone.simplify();
              nwa_clone.internal_determinize_to_dwa()
          }

          fn internal_determinize_to_dwa(&self) -> DWA {
              let fut: Vec<Weight> = self.compute_future_weights();
              let n = self.states.len();

              // 0a) Compute epsilon SCCs (ignoring weights), and mark "epsilon-pure" SCCs:
              // a component is epsilon-pure if every epsilon edge inside it has weight ALL.
              let (comp_of, comps, pure_comp) = {
                  let mut index = 0usize;
                  let mut indices = vec![usize::MAX; n];
                  let mut lowlink = vec![0usize; n];
                  let mut onstack = vec![false; n];
                  let mut stack: Vec<usize> = Vec::new();
                  let mut comp_of = vec![usize::MAX; n];
                  let mut comps: Vec<Vec<usize>> = Vec::new();
                  fn strongconnect(
                      v: usize,
                      index: &mut usize,
                      indices: &mut [usize],
                      lowlink: &mut [usize],
                      onstack: &mut [bool],
                      stack: &mut Vec<usize>,
                      comp_of: &mut [usize],
                      comps: &mut Vec<Vec<usize>>,
                      states: &NWAStates,
                  ) {
                      indices[v] = *index;
                      lowlink[v] = *index;
                      *index += 1;
                      stack.push(v);
                      onstack[v] = true;

                      for &(w, _) in &states[v].epsilons {
                          if indices[w] == usize::MAX {
                              strongconnect(w, index, indices, lowlink, onstack, stack, comp_of, comps, states);
                              if lowlink[w] < lowlink[v] { lowlink[v] = lowlink[w]; }
                          } else if onstack[w] {
                              if indices[w] < lowlink[v] { lowlink[v] = indices[w]; }
                          }
                      }
                      if lowlink[v] == indices[v] {
                          let mut comp = Vec::new();
                          loop {
                              let w = stack.pop().unwrap();
                              onstack[w] = false;
                              comp_of[w] = comps.len();
                              comp.push(w);
                              if w == v { break; }
                          }
                          comps.push(comp);
                      }
                  }
                  for v in 0..n {
                      if indices[v] == usize::MAX {
                          strongconnect(v, &mut index, &mut indices, &mut lowlink, &mut onstack, &mut stack, &mut comp_of, &mut comps, &self.states);
                      }
                  }
                  let mut pure = vec![true; comps.len()];
                  for u in 0..n {
                      for &(v, ref w) in &self.states[u].epsilons {
                          if comp_of[u] == comp_of[v] && !w.is_all_fast() {
                              pure[comp_of[u]] = false;
                          }
                      }
                  }
                  (comp_of, comps, pure)
              };

              type StepVec = Arc<Vec<(NWAStateID, Weight)>>;
              #[derive(Clone)]
              struct StepKeyArc {
                  entries: StepVec,
                  fp: u64,
              }
              impl StepKeyArc {
                  fn new(entries: StepVec) -> Self {
                      let mut fp = FP_ZERO;
                      for (sid, w) in entries.iter() {
                          fp = mix3(fp, (*sid as u64).wrapping_mul(FP_K1), w.fp.wrapping_mul(FP_K2));
                      }
                      StepKeyArc { entries, fp }
                  }
              }
              impl PartialEq for StepKeyArc {
                  fn eq(&self, other: &Self) -> bool {
                      if self.fp != other.fp {
                          return false;
                      }
                      Arc::ptr_eq(&self.entries, &other.entries) || *self.entries == *other.entries
                  }
              }
              impl Eq for StepKeyArc {}
              impl Hash for StepKeyArc {
                  fn hash<H: Hasher>(&self, state: &mut H) {
                      state.write_u64(self.fp);
                  }
              }

              // Interner for any Vec<(sid, weight)> we build (epsilon masks, step vectors, subset vectors).
              let mut step_intern: HashMap<StepKeyArc, StepVec> = HashMap::new();

              // Helper: intern a computed step/subset vector to share identical vectors across states (Arc-based).
              fn intern_step_vec(
                  v: Vec<(NWAStateID, Weight)>,
                  intern: &mut HashMap<StepKeyArc, StepVec>
              ) -> StepVec {
                  let arc = Arc::new(v);
                  let key = StepKeyArc::new(arc.clone());
                  match intern.entry(key) {
                      Entry::Occupied(o) => o.get().clone(),
                      Entry::Vacant(vac) => {
                          vac.insert(arc.clone());
                          arc
                      }
                  }
              }

              // Cache for compiled group distributions:
              let mut compiled_group_cache: HashMap<StepGroupKey, StepVec> = HashMap::new();
              // Cache for union-of-weights over a StepVec (used to compute edge weights quickly).
              let mut stepvec_union_cache: HashMap<StepKeyArc, Weight> = HashMap::new();

              // Compile a group (mask, w) to a compact target map, interned.
              fn compiled_group_for(
                  key: &StepGroupKey,
                  intern: &mut HashMap<StepKeyArc, StepVec>,
                  cache: &mut HashMap<StepGroupKey, StepVec>,
              ) -> StepVec {
                  if let Some(sv) = cache.get(key) {
                      return sv.clone();
                  }
                  // Accumulate base contributions: base[t] = ⋃ (m & w)
                  let mut base: HashMap<NWAStateID, Weight> = HashMap::new();
                  let w = &key.w;
                  for (t, m) in key.mask.iter() {
                      let mw = m & w;
                      if mw.is_empty() { continue; }
                      if let Some(old) = base.get_mut(t) {
                          *old |= &mw;
                      } else {
                          base.insert(*t, mw);
                      }
                  }
                  if base.is_empty() {
                      let arc = intern_step_vec(Vec::new(), intern);
                      cache.insert(key.clone(), arc.clone());
                      return arc;
                  }
                  let mut vec_pairs: Vec<(NWAStateID, Weight)> = base.into_iter().collect();
                  vec_pairs.sort_by_key(|(k, _)| *k);
                  let arc = intern_step_vec(vec_pairs, intern);
                  cache.insert(key.clone(), arc.clone());
                  arc
              }

              // Apply a compiled group to an accumulator with a group-weight gw:
              fn accumulate_compiled_group(
                  compiled: &StepVec,
                  gw: &Weight,
                  acc: &mut HashMap<NWAStateID, Weight>,
              ) {
                  let gw_all = gw.is_all_fast();
                  for (t, base) in compiled.iter() {
                      if gw_all {
                          if let Some(old) = acc.get_mut(t) { *old |= base; } else { acc.insert(*t, base.clone()); }
                      } else {
                          let contrib = base & gw;
                          if contrib.is_empty() { continue; }
                          if let Some(old) = acc.get_mut(t) { *old |= &contrib; } else { acc.insert(*t, contrib); }
                      }
                  }
              }

              // Compute and cache the union of all weights inside a StepVec.
              fn union_weight_of_sv(
                  sv: &StepVec,
                  cache: &mut HashMap<StepKeyArc, Weight>,
              ) -> Weight {
                  let key = StepKeyArc::new(sv.clone());
                  if let Some(w) = cache.get(&key) {
                      return w.clone();
                  }
                  let mut acc_opt: Option<Weight> = None;
                  for (_, w) in sv.iter() {
                      if let Some(ref mut acc) = acc_opt {
                          *acc |= w;
                      } else {
                          acc_opt = Some(w.clone());
                      }
                  }
                  let res = acc_opt.unwrap_or_else(Weight::zeros);
                  cache.insert(key, res.clone());
                  res
              }

              // 1) Epsilon closures with future gating: shared per epsilon-pure SCC, or per state otherwise.
              let mut eps_cache_state: HashMap<NWAStateID, StepVec> = HashMap::new();
              let mut eps_cache_comp: HashMap<usize, StepVec> = HashMap::new();

              fn compute_eps_mask_from_sources(
                  sources: &[NWAStateID],
                  states: &NWAStates,
                  fut: &[Weight],
              ) -> Vec<(NWAStateID, Weight)> {
                  let mut res: HashMap<NWAStateID, Weight> = HashMap::new();
                  let mut q: VecDeque<NWAStateID> = VecDeque::new();
                  for &s in sources {
                      res.insert(s, fut[s].clone());
                      q.push_back(s);
                  }
                  while let Some(u) = q.pop_front() {
                      let u_w = res.get(&u).cloned().unwrap_or_else(Weight::zeros);
                      if u_w.is_empty() { continue; }
                      for &(v, ref eps_w) in &states[u].epsilons {
                          let mut prop = &u_w & eps_w;
                          if prop.is_empty() { continue; }
                          prop &= &fut[v];
                          if prop.is_empty() { continue; }
                          match res.entry(v) {
                              Entry::Occupied(mut e) => {
                                  let old = e.get_mut();
                                  let new_union = &*old | &prop;
                                  if new_union != *old {
                                      *old = new_union;
                                      q.push_back(v);
                                  }
                              }
                              Entry::Vacant(e) => {
                                  e.insert(prop);
                                  q.push_back(v);
                              }
                          }
                      }
                  }
                  let mut vec_pairs: Vec<(NWAStateID, Weight)> = res.into_iter().collect();
                  vec_pairs.sort_by_key(|(k, _)| *k);
                  vec_pairs
              }

              fn get_eps_mask(
                  sid: NWAStateID,
                  states: &NWAStates,
                  fut: &[Weight],
                  comp_of: &[usize],
                  pure_comp: &[bool],
                  comps: &Vec<Vec<NWAStateID>>,
                  eps_cache_state: &mut HashMap<NWAStateID, StepVec>,
                  eps_cache_comp: &mut HashMap<usize, StepVec>,
                  intern: &mut HashMap<StepKeyArc, StepVec>,
              ) -> StepVec {
                  let cid = comp_of[sid];
                  if pure_comp[cid] {
                      if let Some(mask) = eps_cache_comp.get(&cid) {
                          return mask.clone();
                      }
                      let vec_pairs = compute_eps_mask_from_sources(&comps[cid], states, fut);
                      let arc = intern_step_vec(vec_pairs, intern);
                      eps_cache_comp.insert(cid, arc.clone());
                      arc
                  } else {
                      if let Some(mask) = eps_cache_state.get(&sid) {
                          return mask.clone();
                      }
                      let vec_pairs = compute_eps_mask_from_sources(std::slice::from_ref(&sid), states, fut);
                      let arc = intern_step_vec(vec_pairs, intern);
                      eps_cache_state.insert(sid, arc.clone());
                      arc
                  }
              }

              // Build initial subset: epsilon-closure from start; already future-gated and interned.
              let init_sv: StepVec = get_eps_mask(
                  self.body.start_state,
                  &self.states,
                  &fut,
                  &comp_of,
                  &pure_comp,
                  &comps,
                  &mut eps_cache_state,
                  &mut eps_cache_comp,
                  &mut step_intern,
              );

              let mut dwa = DWA::new();
              dwa.states.0.clear();
              let start_d_id = dwa.states.add_state();
              dwa.body.start_state = start_d_id;

              // Use interned subset vectors as keys to avoid duplicating massive vectors.
              let mut subset_to_d_id: HashMap<StepKeyArc, StateID> = HashMap::new();
              let mut worklist: VecDeque<StepKeyArc> = VecDeque::new();

              let init_key = StepKeyArc::new(init_sv.clone());
              subset_to_d_id.insert(init_key.clone(), start_d_id);
              worklist.push_back(init_key);

              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(subset_to_d_id.len() as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinizing DWA: {elapsed_precise}] \
                                     [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta})")
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };

              let mut processed_states = 0;

              while let Some(subset_key) = worklist.pop_front() {
                  processed_states += 1;
                  if let Some(p) = &pb { p.set_position(processed_states as u64); }

                  let d_id = *subset_to_d_id.get(&subset_key).unwrap();
                  let subset_vec: &[(NWAStateID, Weight)] = &subset_key.entries;

                  // Compute final weight
                  let mut d_final: Option<Weight> = None;
                  for (sid, w_in) in subset_vec.iter() {
                      if let Some(fw) = &self.states[*sid].final_weight {
                          let contrib = w_in & fw;
                          if !contrib.is_empty() {
                              if let Some(ref mut acc) = d_final {
                                  *acc |= &contrib;
                              } else {
                                  d_final = Some(contrib);
                              }
                          }
                      }
                  }
                  dwa.states[d_id].final_weight = d_final;

                  // Precompute default grouping: group states by their default step-vectors (by target+weight).
                  let mut def_groups_all: HashMap<StepGroupKey, Weight> = HashMap::with_capacity(subset_vec.len());
                  for (sid, w_in) in subset_vec.iter() {
                      if let Some((to, wdef)) = &self.states[*sid].default {
                          // Group by (mask, wdef)
                          let mask = get_eps_mask(*to, &self.states, &fut, &comp_of, &pure_comp, &comps, &mut eps_cache_state, &mut eps_cache_comp, &mut step_intern);
                          let key = StepGroupKey { mask, w: wdef.clone(), fp: wdef.fp };
                          if let Some(acc_w) = def_groups_all.get_mut(&key) {
                              *acc_w |= w_in;
                          } else {
                              def_groups_all.insert(key, w_in.clone());
                          }
                      }
                  }
                  // Distribute default groups to targets.
                  let mut def_acc: HashMap<NWAStateID, Weight> = HashMap::with_capacity(def_groups_all.len() * 2 + 1);
                  for (key, group_w) in def_groups_all.iter() {
                      let compiled = compiled_group_for(key, &mut step_intern, &mut compiled_group_cache);
                      accumulate_compiled_group(&compiled, group_w, &mut def_acc);
                  }
                  // Establish default edge (if any)
                  let mut def_edge_target: Option<StateID> = None;
                  let mut def_edge_weight: Option<Weight> = None;
                  let mut def_target_subset_sv: Option<StepVec> = None;
                  if !def_acc.is_empty() {
                      let mut def_vec: Vec<(NWAStateID, Weight)> = def_acc.iter().map(|(k,v)| (*k, v.clone())).collect();
                      def_vec.sort_by_key(|(k, _)| *k);
                      let def_sv = intern_step_vec(def_vec, &mut step_intern);
                      let def_key = StepKeyArc::new(def_sv.clone());
                      let def_target = if let Some(id) = subset_to_d_id.get(&def_key) {
                          *id
                      } else {
                          let nid = dwa.states.add_state();
                          subset_to_d_id.insert(def_key.clone(), nid);
                          worklist.push_back(def_key);
                          if let Some(p) = &pb { p.set_length(subset_to_d_id.len() as u64); }
                          nid
                      };
                      // Edge weight = union of weights in def_sv (cached)
                      let def_w = union_weight_of_sv(&def_sv, &mut stepvec_union_cache);
                      dwa.set_default_transition(d_id, def_target, def_w.clone()).expect("DWA default insertion should not fail");
                      def_edge_target = Some(def_target);
                      def_edge_weight = Some(def_w);
                      def_target_subset_sv = Some(def_sv);
                  }

                  // Build a map label -> indices of subset entries that have explicit transitions on that label.
                  let mut label_to_indices: HashMap<i16, Vec<usize>> = HashMap::new();
                  for (idx, (sid, _)) in subset_vec.iter().enumerate() {
                      for lbl in self.states[*sid].transitions.keys() {
                          label_to_indices.entry(*lbl).or_default().push(idx);
                      }
                  }
                  let mut labels: Vec<i16> = label_to_indices.keys().copied().collect();
                  labels.sort_unstable();

                  // For merging per-label results efficiently, retain default result in both vector (sorted) and map forms.
                  let def_vec_sorted: Vec<(NWAStateID, Weight)> = def_target_subset_sv
                      .as_ref().map(|sv| sv.iter().cloned().collect()).unwrap_or_default();
                  let def_map: HashMap<NWAStateID, Weight> = def_vec_sorted.iter().cloned().collect();

                  for lbl in labels {
                      // Group explicit states for this label by their explicit step-vectors; also accumulate their default groups (to subtract).
                      let idxs = label_to_indices.get(&lbl).unwrap();
                      if idxs.is_empty() { continue; }

                      let mut ex_groups: HashMap<StepGroupKey, Weight> = HashMap::with_capacity(idxs.len());
                      let mut def_groups_for_explicit: HashMap<StepGroupKey, Weight> = HashMap::with_capacity(idxs.len());
                      for &idx in idxs {
                          let (sid, w_in) = &subset_vec[idx];
                          if let Some((to, wlbl)) = self.states[*sid].transitions.get(&lbl) {
                              let mask = get_eps_mask(*to, &self.states, &fut, &comp_of, &pure_comp, &comps, &mut eps_cache_state, &mut eps_cache_comp, &mut step_intern);
                              let key = StepGroupKey { mask, w: wlbl.clone(), fp: wlbl.fp };
                              if let Some(acc) = ex_groups.get_mut(&key) {
                                  *acc |= w_in;
                              } else {
                                  ex_groups.insert(key, w_in.clone());
                              }
                          }
                          if let Some((to, wdef)) = &self.states[*sid].default {
                              let mask = get_eps_mask(*to, &self.states, &fut, &comp_of, &pure_comp, &comps, &mut eps_cache_state, &mut eps_cache_comp, &mut step_intern);
                              let key = StepGroupKey { mask, w: wdef.clone(), fp: wdef.fp };
                              if let Some(acc) = def_groups_for_explicit.get_mut(&key) {
                                  *acc |= w_in;
                              } else {
                                  def_groups_for_explicit.insert(key, w_in.clone());
                              }
                          }
                      }

                      // Compute ex_add_map: contributions via explicit steps (target -> weight)
                      let mut ex_add_map: HashMap<NWAStateID, Weight> = HashMap::with_capacity(ex_groups.len() * 2 + 1);
                      for (key, group_w) in ex_groups.into_iter() {
                          let compiled = compiled_group_for(&key, &mut step_intern, &mut compiled_group_cache);
                          accumulate_compiled_group(&compiled, &group_w, &mut ex_add_map);
                      }

                      // Compute def_sub_map: contributions via default from the explicit states (to be removed)
                      let mut def_sub_map: HashMap<NWAStateID, Weight> = HashMap::with_capacity(def_groups_for_explicit.len() * 2 + 1);
                      for (key, group_w) in def_groups_for_explicit.into_iter() {
                          let compiled = compiled_group_for(&key, &mut step_intern, &mut compiled_group_cache);
                          accumulate_compiled_group(&compiled, &group_w, &mut def_sub_map);
                      }

                      if ex_add_map.is_empty() && def_sub_map.is_empty() {
                          // No difference from default; skip creating an exception.
                          continue;
                      }

                      // Build the set of modified targets.
                      let mut modified_targets: BTreeSet<NWAStateID> = BTreeSet::new();
                      for t in ex_add_map.keys() { modified_targets.insert(*t); }
                      for t in def_sub_map.keys() { modified_targets.insert(*t); }

                      // Compute new weights for modified targets: (def - sub) | add
                      let mut modified_vec: Vec<(NWAStateID, Weight)> = Vec::with_capacity(modified_targets.len());
                      for t in modified_targets.iter() {
                          let base = def_map.get(t).cloned().unwrap_or_else(Weight::zeros);
                          let sub = def_sub_map.get(t).cloned().unwrap_or_else(Weight::zeros);
                          let add = ex_add_map.get(t).cloned().unwrap_or_else(Weight::zeros);
                          let after_sub = &base - &sub;
                          let new_w = &after_sub | &add;
                          if !new_w.is_empty() {
                              modified_vec.push((*t, new_w));
                          }
                      }
                      modified_vec.sort_by_key(|(t, _)| *t);

                      // Merge unchanged default targets with modified ones into target_vec (sorted).
                      let mut target_vec: Vec<(NWAStateID, Weight)> = Vec::with_capacity(def_vec_sorted.len());
                      for (t_def, w_def) in &def_vec_sorted {
                          if !modified_targets.contains(t_def) {
                              target_vec.push((*t_def, w_def.clone()));
                          }
                      }
                      target_vec.extend(modified_vec);
                      target_vec.sort_by_key(|(t, _)| *t);

                      if target_vec.is_empty() {
                          continue;
                      }

                      let target_sv = intern_step_vec(target_vec, &mut step_intern);
                      let target_key = StepKeyArc::new(target_sv.clone());
                      let target_d_id = if let Some(id) = subset_to_d_id.get(&target_key) {
                          *id
                      } else {
                          let nid = dwa.states.add_state();
                          subset_to_d_id.insert(target_key.clone(), nid);
                          worklist.push_back(target_key.clone());
                          if let Some(p) = &pb { p.set_length(subset_to_d_id.len() as u64); }
                          nid
                      };

                      // Edge weight = union of all weights in accumulated target_sv (cached)
                      let edge_w = union_weight_of_sv(&target_sv, &mut stepvec_union_cache);
                      if let (Some(def_t), Some(ref def_w)) = (def_edge_target, def_edge_weight.as_ref()) {
                          if def_t == target_d_id && **def_w == edge_w {
                              continue;
                          }
                      }
                      dwa.add_transition(d_id, lbl, target_d_id, edge_w).expect("DWA insertion should not fail");
                  }
              }

              if let Some(p) = &pb {
                  p.finish_with_message(format!("Determinized to {} states", subset_to_d_id.len()));
              }

              dwa
          }

          fn collapse_all_weight_epsilon_sccs(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut index = 0;
              let mut indices = vec![usize::MAX; n];
              let mut lowlink = vec![0; n];
              let mut on_stack = vec![false; n];
              let mut stack = Vec::new();
              let mut comp_of = vec![0; n];
              let mut comps: Vec<Vec<NWAStateID>> = Vec::new();

              for i in 0..n {
                  if indices[i] == usize::MAX {
                      self.strongconnect(i, &mut index, &mut indices, &mut lowlink, &mut on_stack, &mut stack, &mut comp_of, &mut comps);
                  }
              }

              if comps.len() == n { return false; }

              let mut new_states_vec = Vec::with_capacity(comps.len());
              for (cid, comp) in comps.iter().enumerate() {
                  let mut new_state = NWAState::default();

                  let mut final_weight: Option<Weight> = None;
                  for &sid in comp {
                      if let Some(fw) = &self.states[sid].final_weight {
                          if let Some(acc) = &mut final_weight {
                              *acc |= fw;
                          } else {
                              final_weight = Some(fw.clone());
                          }
                      }
                  }
                  new_state.final_weight = final_weight;

                  for &sid in comp {
                      for (&lbl, &(to, ref w)) in &self.states[sid].transitions {
                          let to_comp = comp_of[to];
                          Self::add_transition_to_state(&mut new_state, lbl, to_comp, w.clone());
                      }
                      if let Some((to, w)) = &self.states[sid].default {
                          if new_state.default.is_none() {
                              new_state.default = Some((comp_of[*to], w.clone()));
                          }
                      }
                      for &(to, ref w) in &self.states[sid].epsilons {
                          let to_comp = comp_of[to];
                          if cid != to_comp || !w.is_all_fast() {
                              new_state.epsilons.push((to_comp, w.clone()));
                          }
                      }
                  }
                  new_states_vec.push(new_state);
              }

              for st in &mut new_states_vec {
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = comp_of[*v]);
                  st.transitions.values_mut().for_each(|(v, _)| *v = comp_of[*v]);
                  if let Some((v, _)) = &mut st.default {
                      *v = comp_of[*v];
                  }
              }

              self.states.0 = new_states_vec;
              self.body.start_state = comp_of[self.body.start_state];

              true
          }

          fn strongconnect(&self, v: NWAStateID, index: &mut usize, indices: &mut [usize], lowlink: &mut [usize], on_stack: &mut [bool], stack: &mut Vec<NWAStateID>, comp_of: &mut [usize], comps: &mut Vec<Vec<NWAStateID>>) {
              indices[v] = *index;
              lowlink[v] = *index;
              *index += 1;
              stack.push(v);
              on_stack[v] = true;

              for (w, weight) in &self.states[v].epsilons {
                  if weight.is_all_fast() {
                      if indices[*w] == usize::MAX {
                          self.strongconnect(*w, index, indices, lowlink, on_stack, stack, comp_of, comps);
                          lowlink[v] = lowlink[v].min(lowlink[*w]);
                      } else if on_stack[*w] {
                          lowlink[v] = lowlink[v].min(indices[*w]);
                      }
                  }
              }

              if lowlink[v] == indices[v] {
                  let mut comp = Vec::new();
                  loop {
                      let w = stack.pop().unwrap();
                      on_stack[w] = false;
                      comp_of[w] = comps.len();
                      comp.push(w);
                      if w == v { break; }
                  }
                  comps.push(comp);
              }
          }

          fn add_transition_to_state(state: &mut NWAState, on: i16, to: NWAStateID, w: Weight) {
              if let Some((old_to, old_w)) = state.transitions.get_mut(&on) {
                  assert_eq!(*old_to, to, "NWA restricted: cannot merge states with same-label transitions to different components");
                  *old_w |= &w;
              } else {
                  state.transitions.insert(on, (to, w));
              }
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, (v, _)) in states[u].transitions.iter() {
                      if *v < states.len() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }

      impl Display for NWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "NWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  if let Some((to, w)) = &state.default {
                      writeln!(f, "    * -> {} (weight: {})", to, w)?;
                  }
                  for (on, (to, w)) in &state.transitions {
                      let char_repr = format_i16_char(*on);
                      writeln!(f, "    {} -> {} (weight: {})", char_repr, to, w)?;
                  }
                  for (to, w) in &state.epsilons {
                      writeln!(f, "    ε -> {} (weight: {})", to, w)?;
                  }
              }
              Ok(())
          }
      }

