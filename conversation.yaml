    src/precompute4/weighted_automata/bitset.rs: |
      // src/precompute4/weighted_automata/bitset.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use range_set_blaze::RangeSetBlaze;
      use serde::{Deserialize, Deserializer, Serialize, Serializer};
      use std::fmt::{Debug, Display, Formatter};
      use std::hash::{Hash, Hasher};
      use std::iter::FromIterator;
      use std::ops::{BitAnd, BitAndAssign, BitOr, BitOrAssign, Not, Sub, SubAssign};

      /// Thin wrapper around `RangeSetBlaze<usize>` with cached fingerprint and `is_all` flag.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Default)]
      pub struct SimpleBitset {
          pub(crate) rsb: RangeSetBlaze<usize>,
          pub(crate) fp: u64,
          is_all: bool,
      }

      pub(crate) const FP_ZERO: u64 = 0x9E37_79B9_7F4A_7C15;
      const FP_ALL: u64 = 0xD6E8_FEB8_6659_FD93;
      pub(crate) const FP_K1: u64 = 0xC2B2_AE3D_27D4_EB4F;
      pub(crate) const FP_K2: u64 = 0x1656_67B1_F3E1_5A6D;
      const FP_K3: u64 = 0x9E37_79B1_1F37_9B97;

      #[inline]
      pub(crate) fn mix3(a: u64, b: u64, c: u64) -> u64 {
          let mut x = a ^ b.wrapping_mul(FP_K1);
          x = x.rotate_left(27) ^ c.wrapping_mul(FP_K2);
          x ^= x >> 33;
          x = x.wrapping_mul(FP_K3);
          x ^ (x >> 29)
      }

      #[inline]
      fn calc_is_all_and_fp(rsb: &RangeSetBlaze<usize>) -> (bool, u64) {
          let mut it = rsb.ranges();
          if let Some(first) = it.next() {
              if *first.start() == 0 && *first.end() == usize::MAX && it.next().is_none() {
                  return (true, FP_ALL);
              }
              let mut fp = mix3(FP_ZERO, *first.start() as u64, (*first.end() as u64).wrapping_mul(FP_K1));
              for r in it {
                  let s = *r.start() as u64;
                  let e = *r.end() as u64;
                  fp = mix3(fp, s.wrapping_mul(FP_K2), e.wrapping_mul(FP_K3));
              }
              (false, fp)
          } else {
              (false, FP_ZERO)
          }
      }

      #[inline]
      fn universe_rsb() -> RangeSetBlaze<usize> { RangeSetBlaze::from_iter([0usize..=usize::MAX]) }

      #[inline]
      fn complement_rsb(rsb: &RangeSetBlaze<usize>) -> RangeSetBlaze<usize> { &universe_rsb() - rsb }

      impl SimpleBitset {
          #[inline]
          fn from_rsb_inner(rsb: RangeSetBlaze<usize>) -> Self {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }

          #[inline]
          fn update_cached(&mut self) {
              let (is_all, fp) = calc_is_all_and_fp(&self.rsb);
              self.is_all = is_all;
              self.fp = fp;
          }

          pub fn zeros() -> Self {
              SimpleBitset { rsb: RangeSetBlaze::new(), fp: FP_ZERO, is_all: false }
          }

          pub fn all() -> Self {
              SimpleBitset { rsb: universe_rsb(), fp: FP_ALL, is_all: true }
          }

          pub fn from_item(item: usize) -> Self { SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter([item])) }

          pub fn from_ranges(ranges: &[(usize, usize)]) -> Self {
              let rsb = RangeSetBlaze::from_iter(ranges.iter().map(|&(s, e)| s..=e));
              SimpleBitset::from_rsb_inner(rsb)
          }

          pub fn from_rsb(rsb: RangeSetBlaze<usize>) -> Self { SimpleBitset::from_rsb_inner(rsb) }

          pub fn len(&self) -> usize { self.rsb.len().try_into().unwrap_or(usize::MAX) }

          pub fn is_empty(&self) -> bool { self.rsb.is_empty() }

          #[inline]
          pub fn is_all_fast(&self) -> bool { self.is_all }

          pub fn is_disjoint(&self, other: &SimpleBitset) -> bool {
              if self.is_empty() || other.is_empty() {
                  return true;
              }
              if self.is_all_fast() || other.is_all_fast() {
                  return false;
              }
              (&self.rsb & &other.rsb).is_empty()
          }

          pub fn contains(&self, index: usize) -> bool { self.rsb.contains(index) }

          pub fn max_item(&self) -> Option<usize> { self.rsb.iter().last() }

          pub fn iter_up_to(&self, max: usize) -> impl Iterator<Item = usize> {
              (&self.rsb & &RangeSetBlaze::from_iter([0..=max])).into_iter()
          }

          #[inline]
          pub fn is_subset_of(&self, rhs: &SimpleBitset) -> bool { (self & rhs) == *self }

          pub fn complement(&self) -> SimpleBitset {
              if self.is_empty() {
                  return SimpleBitset::all();
              }
              if self.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              let rsb = complement_rsb(&self.rsb);
              SimpleBitset::from_rsb_inner(rsb)
          }

          pub fn insert(&mut self, item: usize) {
              if self.is_all_fast() {
                  return;
              }
              self.rsb.insert(item);
              self.update_cached();
          }

          pub fn add(&mut self, item: usize) { self.insert(item); }

          pub fn remove(&mut self, item: usize) {
              if self.is_empty() {
                  return;
              }
              if self.is_all_fast() {
                  self.rsb = universe_rsb();
              }
              self.rsb.remove(item);
              self.update_cached();
          }

          pub fn set(&mut self, item: usize, value: bool) {
              if value {
                  self.insert(item);
              } else {
                  self.remove(item);
              }
          }

          pub fn clear(&mut self) {
              self.rsb.clear();
              self.fp = FP_ZERO;
              self.is_all = false;
          }

          pub fn clip_to_range(&mut self, min: usize, max: usize) {
              if self.is_empty() {
                  return;
              }
              if self.is_all_fast() {
                  self.rsb = universe_rsb();
              }
              let clip_rsb = RangeSetBlaze::from_iter([min..=max]);
              self.rsb = &self.rsb & &clip_rsb;
              self.update_cached();
          }

          pub fn clip_min(&mut self, min: usize) { self.clip_to_range(min, usize::MAX); }

          pub fn clip_max(&mut self, max: usize) { self.clip_to_range(0, max); }
      }

      impl Hash for SimpleBitset {
          fn hash<H: Hasher>(&self, state: &mut H) { state.write_u64(self.fp); }
      }

      impl Debug for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  write!(f, "SimpleBitset(ALL)")
              } else {
                  Debug::fmt(&self.rsb, f)
              }
          }
      }

      impl Display for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  return write!(f, "ALL");
              }
              write!(f, "[")?;
              let mut ranges = self.rsb.ranges().peekable();
              while let Some(range) = ranges.next() {
                  if range.start() == range.end() {
                      write!(f, "{}", range.start())?;
                  } else {
                      write!(f, "{}..={}", range.start(), range.end())?;
                  }
                  if ranges.peek().is_some() {
                      write!(f, ", ")?;
                  }
              }
              write!(f, "]")
          }
      }

      impl FromIterator<usize> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = usize>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      impl FromIterator<std::ops::RangeInclusive<usize>> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = std::ops::RangeInclusive<usize>>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      impl<'a> BitAnd<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() {
                  return SimpleBitset::zeros();
              }
              if self.is_all_fast() {
                  return rhs.clone();
              }
              if rhs.is_all_fast() {
                  return self.clone();
              }
              SimpleBitset::from_rsb_inner(&self.rsb & &rhs.rsb)
          }
      }

      impl<'a> BitOr<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_all_fast() || rhs.is_all_fast() {
                  return SimpleBitset::all();
              }
              if self.is_empty() {
                  return rhs.clone();
              }
              if rhs.is_empty() {
                  return self.clone();
              }
              SimpleBitset::from_rsb_inner(&self.rsb | &rhs.rsb)
          }
      }

      impl BitAndAssign<&SimpleBitset> for SimpleBitset {
          fn bitand_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() {
                  return;
              }
              if rhs.is_empty() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              if rhs.is_all_fast() {
                  return;
              }
              if self.is_all_fast() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb = &self.rsb & &rhs.rsb;
              self.update_cached();
          }
      }

      impl BitOrAssign<&SimpleBitset> for SimpleBitset {
          fn bitor_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_all_fast() || rhs.is_all_fast() {
                  *self = SimpleBitset::all();
                  return;
              }
              if rhs.is_empty() {
                  return;
              }
              if self.is_empty() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb |= &rhs.rsb;
              self.update_cached();
          }
      }

      impl BitAnd<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output { (&self) & (&rhs) }
      }

      impl BitOr<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output { (&self) | (&rhs) }
      }

      impl<'a> BitAnd<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output { (&self) & rhs }
      }

      impl<'a> BitOr<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output { (&self) | rhs }
      }

      impl<'a> BitAnd<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output { self & (&rhs) }
      }

      impl<'a> BitOr<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output { self | (&rhs) }
      }

      impl SubAssign<&SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() || rhs.is_empty() {
                  return;
              }
              if self.is_all_fast() && rhs.is_all_fast() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              self.rsb = &self.rsb - &rhs.rsb;
              self.update_cached();
          }
      }

      impl SubAssign<SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: SimpleBitset) { *self -= &rhs }
      }

      impl Sub<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: SimpleBitset) -> Self::Output { (&self) - (&rhs) }
      }

      impl<'a> Sub<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() {
                  return self.clone();
              }
              if self.is_all_fast() && rhs.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              SimpleBitset::from_rsb_inner(&self.rsb - &rhs.rsb)
          }
      }

      impl Not for SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() {
                  return SimpleBitset::all();
              }
              if self.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              SimpleBitset::from_rsb_inner(complement_rsb(&self.rsb))
          }
      }

      impl Not for &SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() {
                  return SimpleBitset::all();
              }
              if self.is_all_fast() {
                  return SimpleBitset::zeros();
              }
              SimpleBitset::from_rsb_inner(complement_rsb(&self.rsb))
          }
      }

      impl Serialize for SimpleBitset {
          fn serialize<S>(&self, serializer: S) -> Result<S::Ok, S::Error>
          where S: Serializer {
              #[derive(Serialize)]
              #[serde(untagged)]
              enum Repr<'a> {
                  All(&'a str),
                  Ranges(Vec<RangeRepr>),
              }

              #[derive(Serialize)]
              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
              }

              if self.is_all {
                  Repr::All("ALL").serialize(serializer)
              } else {
                  let ranges: Vec<RangeRepr> = self
                      .rsb
                      .ranges()
                      .map(|r| {
                          if r.start() == r.end() {
                              RangeRepr::Single(*r.start())
                          } else {
                              RangeRepr::Range((*r.start(), *r.end()))
                          }
                      })
                      .collect();
                  Repr::Ranges(ranges).serialize(serializer)
              }
          }
      }

      impl<'de> Deserialize<'de> for SimpleBitset {
          fn deserialize<D>(deserializer: D) -> Result<Self, D::Error>
          where D: Deserializer<'de> {
              use serde::de;

              #[derive(Deserialize)]
              #[serde(untagged)]
              enum Repr {
                  All(String),
                  Ranges(Vec<RangeRepr>),
              }

              #[derive(Deserialize)]
              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
              }

              match Repr::deserialize(deserializer)? {
                  Repr::All(s) => {
                      if s == "ALL" {
                          Ok(SimpleBitset::all())
                      } else {
                          Err(de::Error::custom("expected string 'ALL' for all-bitset"))
                      }
                  }
                  Repr::Ranges(ranges) => {
                      let rsb = RangeSetBlaze::from_iter(ranges.into_iter().map(|rr| match rr {
                          RangeRepr::Single(i) => i..=i,
                          RangeRepr::Range((s, e)) => s..=e,
                      }));
                      Ok(SimpleBitset::from_rsb_inner(rsb))
                  }
              }
          }
      }
    src/precompute4/weighted_automata/common.rs: |
      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset;

      pub(crate) const STOCHASTIC_DEBUG: bool = false;
      pub(crate) const DETERMINIZE_DEBUG: bool = false;

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String { code.to_string() }

      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }

      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/determinization_rustfst.rs: |-
      // src/precompute4/weighted_automata/determinization_rustfst.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight};
      use super::dwa::DWA;
      use super::nwa::NWA;
      use crate::precompute4::weighted_automata::NWAStateID;
      use anyhow::Result;
      use nom::IResult;
      use once_cell::sync::Lazy;
      use range_set_blaze::RangeSetBlaze;
      use rustfst::algorithms::determinize::{determinize_with_config, DeterminizeConfig, DeterminizeType};
      use rustfst::algorithms::rm_epsilon::rm_epsilon;
      use rustfst::fst_properties::FstProperties;
      use rustfst::prelude::*;
      use rustfst::semirings::{
          DivideType, ReverseBack, SemiringProperties, SerializableSemiring, WeaklyDivisibleSemiring, WeightQuantize,
      };
      use rustfst::NomCustomError;
      use std::borrow::Borrow;
      use std::collections::{HashMap, HashSet};
      use std::io::Write;
      use std::sync::{Arc, Mutex};

      static WEIGHT_INTERNER: Lazy<Mutex<HashSet<Arc<Weight>>>> =
          Lazy::new(|| Mutex::new(HashSet::new()));

      fn intern_weight(weight: Weight) -> Arc<Weight> {
          let mut interner = WEIGHT_INTERNER.lock().unwrap();
          if let Some(w) = interner.get(&weight) {
              return w.clone();
          }
          let arc_weight = Arc::new(weight);
          interner.insert(arc_weight.clone());
          arc_weight
      }

      /// Semiring over bitset weights: plus = union, times = intersection.
      #[derive(Clone, Debug, PartialOrd, Default, Eq, Hash)]
      pub struct BitsetWeight(pub Arc<Weight>);

      impl PartialEq for BitsetWeight {
          fn eq(&self, other: &Self) -> bool { Arc::ptr_eq(&self.0, &other.0) || *self.0 == *other.0 }
      }

      impl Semiring for BitsetWeight {
          type Type = Weight;
          type ReverseWeight = BitsetWeight;

          fn zero() -> Self { BitsetWeight(intern_weight(Weight::zeros())) }
          fn one() -> Self { BitsetWeight(intern_weight(Weight::all())) }
          fn new(value: Self::Type) -> Self { BitsetWeight(intern_weight(value)) }

          fn plus_assign<P: Borrow<Self>>(&mut self, rhs: P) -> Result<()> {
              let new_weight = &*self.0 | &*rhs.borrow().0;
              self.0 = intern_weight(new_weight);
              Ok(())
          }

          fn times_assign<P: Borrow<Self>>(&mut self, rhs: P) -> Result<()> {
              let new_weight = &*self.0 & &*rhs.borrow().0;
              self.0 = intern_weight(new_weight);
              Ok(())
          }

          fn approx_equal<P: Borrow<Self>>(&self, rhs: P, _delta: f32) -> bool { *self.0 == *rhs.borrow().0 }
          fn value(&self) -> &Self::Type { &self.0 }
          fn take_value(self) -> Self::Type { Arc::try_unwrap(self.0).unwrap_or_else(|arc| (*arc).clone()) }
          fn set_value(&mut self, value: Self::Type) { self.0 = intern_weight(value); }
          fn reverse(&self) -> Result<Self::ReverseWeight> { Ok(self.clone()) }

          fn properties() -> SemiringProperties {
              SemiringProperties::LEFT_SEMIRING
                  | SemiringProperties::RIGHT_SEMIRING
                  | SemiringProperties::COMMUTATIVE
                  | SemiringProperties::IDEMPOTENT
                  | SemiringProperties::PATH
          }
      }

      impl ReverseBack<BitsetWeight> for BitsetWeight {
          fn reverse_back(&self) -> Result<BitsetWeight> { Ok(self.clone()) }
      }

      impl WeaklyDivisibleSemiring for BitsetWeight {
          fn divide_assign(&mut self, rhs: &Self, _divide_type: DivideType) -> Result<()> {
              let new_weight = &*self.0 | &!&*rhs.0;
              self.0 = intern_weight(new_weight);
              Ok(())
          }
      }

      impl WeightQuantize for BitsetWeight {
          fn quantize_assign(&mut self, _delta: f32) -> Result<()> { Ok(()) }
      }

      impl SerializableSemiring for BitsetWeight {
          fn weight_type() -> String { "bitset".to_string() }

          fn parse_binary(i: &[u8]) -> IResult<&[u8], Self, NomCustomError<&[u8]>> {
              use nom::number::complete::le_u64;

              let (mut i, num_ranges) = le_u64(i)?;
              let mut ranges = Vec::with_capacity(num_ranges as usize);
              for _ in 0..num_ranges {
                  let (next_i, start) = le_u64(i)?;
                  let (next_i, end) = le_u64(next_i)?;
                  ranges.push(start as usize..=end as usize);
                  i = next_i;
              }
              let rsb = RangeSetBlaze::from_iter(ranges);
              Ok((i, BitsetWeight(intern_weight(Weight::from_rsb(rsb)))))
          }

          fn write_binary<F: Write>(&self, file: &mut F) -> Result<()> {
              let ranges: Vec<_> = self.0.rsb.ranges().collect();
              file.write_all(&(ranges.len() as u64).to_le_bytes())?;
              for range in ranges {
                  file.write_all(&(*range.start() as u64).to_le_bytes())?;
                  file.write_all(&(*range.end() as u64).to_le_bytes())?;
              }
              Ok(())
          }

          fn parse_text(i: &str) -> IResult<&str, Self> {
              use nom::combinator::map_res;
              map_res(nom::combinator::rest, |s: &str| -> Result<BitsetWeight, _> {
                  serde_json::from_str::<Weight>(s)
                      .map(|w| BitsetWeight(intern_weight(w)))
                      .map_err(|e| e.to_string())
              })(i)
          }
      }

      impl std::fmt::Display for BitsetWeight {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              write!(f, "{}", serde_json::to_string(self.0.as_ref()).unwrap_or_else(|_| "err".to_string()))
          }
      }

      pub fn nwa_to_vector_fst(nwa: &NWA) -> VectorFst<BitsetWeight> {
          let mut fst = VectorFst::<BitsetWeight>::new();
          let mut state_map = HashMap::<NWAStateID, StateId>::new();

          for i in 0..nwa.states.len() {
              let s = fst.add_state();
              state_map.insert(i, s);
          }

          if !nwa.states.0.is_empty() {
              fst.set_start(state_map[&nwa.body.start_state]).unwrap();
          }

          for (i, nwa_state) in nwa.states.0.iter().enumerate() {
              let fst_state_id = state_map[&i];

              if let Some(w) = &nwa_state.final_weight {
                  if !w.is_empty() {
                      fst.set_final(fst_state_id, BitsetWeight::new(w.clone())).unwrap();
                  }
              }

              for (label, targets) in &nwa_state.transitions {
                  for (target, weight) in targets {
                      if !weight.is_empty() {
                          fst.add_tr(
                              fst_state_id,
                              Tr::new(
                                  (*label as u32) + 1,
                                  (*label as u32) + 1,
                                  BitsetWeight::new(weight.clone()),
                                  state_map[target],
                              ),
                          )
                          .unwrap();
                      }
                  }
              }

              for (target, weight) in &nwa_state.epsilons {
                  if !weight.is_empty() {
                      fst.add_tr(fst_state_id, Tr::new(EPS_LABEL, EPS_LABEL, BitsetWeight::new(weight.clone()), state_map[target]))
                          .unwrap();
                  }
              }
          }

          crate::debug!(5, "NWA to FST conversion done:\n{}", fst);
          fst
      }

      pub fn vector_fst_to_dwa(fst: &VectorFst<BitsetWeight>) -> DWA {
          let fst_start = match fst.start() {
              Some(s) => s,
              None => return DWA::new(),
          };

          let mut dwa = DWA::new();
          dwa.states.0.clear();
          let mut state_map = HashMap::<StateId, StateID>::new();

          for i in 0..fst.num_states() {
              let s = dwa.add_state();
              state_map.insert(i as StateId, s);
          }
          dwa.body.start_state = state_map[&fst_start];

          for i in 0..fst.num_states() {
              let fst_state_id = i as StateId;
              if !state_map.contains_key(&fst_state_id) {
                  continue;
              }
              let dwa_state_id = state_map[&fst_state_id];

              if let Some(w) = fst.final_weight(fst_state_id).unwrap() {
                  if !w.0.is_empty() {
                      dwa.set_final_weight(dwa_state_id, w.value().clone()).unwrap();
                  }
              }

              for tr in fst.get_trs(fst_state_id).unwrap().trs() {
                  if !tr.weight.0.is_empty() {
                      if !state_map.contains_key(&tr.nextstate) {
                          continue;
                      }
                      let res = dwa.add_transition(
                          dwa_state_id,
                          ((tr.ilabel - 1) as u16) as i16,
                          state_map[&tr.nextstate],
                          tr.weight.value().clone(),
                      );
                      if let Err(e) = res {
                          panic!(
                              "Error converting VectorFst to DWA: transition already exists. This indicates non-determinism. Error: {:?}",
                              e
                          );
                      }
                  }
              }
          }

          dwa
      }

      pub fn vector_fst_to_nwa(fst: &VectorFst<BitsetWeight>) -> NWA {
          if fst.num_states() == 0 {
              return NWA::new();
          }

          let mut nwa = NWA::new();
          nwa.states.0.clear();
          let mut state_map = HashMap::<StateId, NWAStateID>::new();

          for i in 0..fst.num_states() {
              let s = nwa.states.add_state();
              state_map.insert(i as StateId, s);
          }

          if let Some(fst_start) = fst.start() {
              nwa.body.start_state = state_map[&fst_start];
          } else {
              nwa.body.start_state = 0;
          }

          for i in 0..fst.num_states() {
              let fst_state_id = i as StateId;
              let nwa_state_id = state_map[&fst_state_id];

              if let Some(w) = fst.final_weight(fst_state_id).unwrap() {
                  if !w.0.is_empty() {
                      nwa.states[nwa_state_id].final_weight = Some(w.value().clone());
                  }
              }

              for tr in fst.get_trs(fst_state_id).unwrap().trs() {
                  if !tr.weight.0.is_empty() {
                      let target_nwa_id = state_map[&tr.nextstate];
                      let weight = tr.weight.value().clone();

                      if tr.ilabel == EPS_LABEL {
                          nwa.states.add_epsilon(nwa_state_id, target_nwa_id, weight);
                      } else {
                          let label = ((tr.ilabel - 1) as u16) as i16;
                          nwa.states.add_transition(nwa_state_id, label, target_nwa_id, weight).unwrap();
                      }
                  }
              }
          }

          nwa
      }

      pub fn determinize_nwa_to_dwa(nwa: &NWA) -> DWA {
          let mut fst = nwa_to_vector_fst(nwa);
          fst.compute_and_update_properties_all().unwrap();
          assert!(fst.properties().contains(FstProperties::ACCEPTOR), "FST should be an acceptor before determinization");

          let det_config = DeterminizeConfig::default().with_det_type(DeterminizeType::DeterminizeFunctional);
          let det_fst: VectorFst<BitsetWeight> = determinize_with_config(&fst, det_config).unwrap();

          vector_fst_to_dwa(&det_fst)
      }

      impl DWA {
          pub fn to_rustfst(&self) -> VectorFst<BitsetWeight> {
              nwa_to_vector_fst(&NWA::from_dwa(self))
          }

          pub fn from_rustfst(fst: &VectorFst<BitsetWeight>) -> DWA {
              vector_fst_to_dwa(fst)
          }
      }

      impl NWA {
          pub fn to_rustfst(&self) -> VectorFst<BitsetWeight> {
              nwa_to_vector_fst(self)
          }

          pub fn from_rustfst(fst: &VectorFst<BitsetWeight>) -> NWA {
              vector_fst_to_nwa(fst)
          }
      }
