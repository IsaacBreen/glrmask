      use pyo3::basic::CompareOp;
      use pyo3::prelude::*;
      use pyo3::types::{PyDict, PyList, PySet, PyTuple, PyType};

      use std::collections::HashSet;
      use std::hash::{Hash, Hasher};

      use crate::core::{LeveledGSS as CoreLeveledGSS, Merge};

      mod core;

