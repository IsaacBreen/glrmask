          fn num_trs(&self, s: StateId) -> Result<usize>;

          /// Number of trs leaving a specific state in the wFST.
          ///
          /// # Safety
          ///
          /// Unsafe behaviour if `state` is not present in Fst.
          ///
          unsafe fn num_trs_unchecked(&self, state: StateId) -> usize;

