          use crate::algorithms::weight_converters::SimpleWeightConverter;
          use crate::fst_traits::Fst;
          use crate::prelude::{TropicalWeight, VectorFst};
          use crate::SymbolTable;
          use proptest::prelude::any;
          use proptest::proptest;
