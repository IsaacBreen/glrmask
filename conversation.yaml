          ),
          param_presets=_default_presets(
              tiny={"depth": 2, "branching": 8, "pairs": 20, "measure_counts": False},
              small={"depth": 3, "branching": 8, "pairs": 40, "measure_counts": False},
              medium={"depth": 4, "branching": 10, "pairs": 100, "measure_counts": False},
