      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWADefaultTransition, NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use std::collections::{BTreeSet, VecDeque};

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let mut result_dwa = union_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let mut result_dwa = concat_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      impl NWA {
          /// Compute per-state future acceptance masks F[s]:
          /// F[s] = final[s] ∪ ⋃_{ε s->t}(wε ∧ F[t]) ∪ ⋃_{lbl s->t}(wlbl ∧ F[t]) ∪ (if def s->t) (wdef ∧ F[t])
          /// This is a standard monotone least fixpoint computed by reverse propagation.
          pub fn compute_future_weights(&self) -> Vec<Weight> {
              let n = self.states.len();
              let mut fut: Vec<Weight> = vec![Weight::zeros(); n];
              let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

              // Build reverse adjacency aggregating all edge types with their weights.
              for p in 0..n {
                  // Epsilon
                  for &(t, ref w) in &self.states[p].epsilons {
                      if t < n { rev[t].push((p, w.clone())); }
                  }
                  // Labeled
                  for (_, targets) in &self.states[p].transitions {
                      for (t, w) in targets {
                          if *t < n { rev[*t].push((p, w.clone())); }
                      }
                  }
                  // Default
                  for def in &self.states[p].default {
                      if def.target < n {
                          rev[def.target].push((p, def.weight.clone()));
                      }
                  }
              }

              // Initialize with final weights
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              for s in 0..n {
                  if let Some(fw) = &self.states[s].final_weight {
                      if !fw.is_empty() {
                          fut[s] = fw.clone();
                          q.push_back(s);
                      }
                  }
              }

              // Reverse propagation: when fut[v] grows, update predecessors p using edge weight wpv.
              while let Some(v) = q.pop_front() {
                  let fv = fut[v].clone();
                  if fv.is_empty() { continue; }
                  for &(p, ref w_pv) in &rev[v] {
                      let add = &fv & w_pv;
                      if add.is_empty() { continue; }
                      let old = &fut[p];
                      if (&add & old) != add {
                          fut[p] |= &add;
                          q.push_back(p);
                      }
                  }
              }
              fut
          }

          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      // Assume ALL if weight is missing, though this should not happen with current DWA builders.
                      let w = st.trans_weight_default.as_ref().cloned().unwrap_or_else(Weight::all);
                      let exceptions = st.transitions.exceptions.keys().copied().collect();
                      nwa.states.0[i].default.push(NWADefaultTransition {
                          target: to,
                          weight: w,
                          exceptions,
                      });
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      let w = st.trans_weights_exceptions.get(lbl).cloned().unwrap_or_else(Weight::all);
                      nwa.states.add_transition(i, *lbl, *to, w).unwrap();
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  let mut result_dwa = union_nwa.determinize_to_dwa();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, targets) in states[u].transitions.iter() {
                      for (v, _) in targets {
                          if *v < states.len() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                          }
                      }
                  }
                  for def in &states[u].default {
                      if def.target < states.len() && !visited[def.target] {
                          visited[def.target] = true;
                          q.push_back(def.target);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }
          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  let mut result_dwa = concat_nwa.determinize_to_dwa();


                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              Self::internal_concatenate_components(states, left, right, eps_weight)
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/weighted_automata/determinization.rs: |
      use super::bitset::{mix3, FP_K1, FP_K2, FP_ZERO};
      use super::common::Weight;
      use super::dwa::DWA;
      use super::nwa::{NWAStates, NWA};
      use crate::precompute4::weighted_automata::{NWADefaultTransition, NWAStateID};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};

      use std::collections::hash_map::Entry;
      use std::collections::{BTreeMap, HashMap, VecDeque};
      use std::hash::{Hash, Hasher};
      use std::time::Instant;

      impl NWA {
          pub fn determinize_to_dwa(&self) -> DWA {
              let now = Instant::now();

              let mut nwa = self.clone();
              nwa.simplify();

              crate::debug!(4, "NWA::determinize_to_dwa stats after simplify:\n{}", nwa.stats());

              let result = nwa.det_fixpoint();

              crate::debug!(4, "NWA::determinize_to_dwa result DWA stats:\n{}", result.stats());

              crate::debug!(4, "NWA::determinize_to_dwa took: {:?}", now.elapsed());
              result
          }

          fn det_fixpoint(&self) -> DWA {
              let fut = self.compute_future_weights();
              let n = self.states.len();
              if n == 0 {
                  return DWA::new();
              }

              fn eps_closure_masked(
                  sources: &[NWAStateID],
                  states: &NWAStates,
                  fut: &[Weight],
              ) -> Vec<(NWAStateID, Weight)> {
                  let mut out: HashMap<NWAStateID, Weight> = HashMap::new();
                  let mut q: VecDeque<NWAStateID> = VecDeque::new();
                  for &s in sources {
                      if s >= states.len() {
                          continue;
                      }
                      let f = fut[s].clone();
                      if !f.is_empty() {
                          out.insert(s, f);
                          q.push_back(s);
                      }
                  }
                  while let Some(u) = q.pop_front() {
                      let base = out.get(&u).cloned().unwrap_or_else(Weight::zeros);
                      if base.is_empty() {
                          continue;
                      }
                      for &(v, ref w_eps) in &states[u].epsilons {
                          if v >= states.len() {
                              continue;
                          }
                          let mut prop = &base & w_eps;
                          if prop.is_empty() {
                              continue;
                          }
                          prop &= &fut[v];
                          if prop.is_empty() {
                              continue;
                          }
                          match out.entry(v) {
                              Entry::Occupied(mut e) => {
                                  let old = e.get_mut();
                                  let nu = &*old | &prop;
                                  if nu != *old {
                                      *old = nu;
                                      q.push_back(v);
                                  }
                              }
                              Entry::Vacant(e) => {
                                  e.insert(prop);
                                  q.push_back(v);
                              }
                          }
                      }
                  }
                  let mut v: Vec<(NWAStateID, Weight)> = out.into_iter().collect();
                  v.sort_by_key(|(sid, _)| *sid);
                  v
              }

              fn apply_weight_to_pairs(base: &[(NWAStateID, Weight)], w: &Weight) -> Vec<(NWAStateID, Weight)> {
                  if w.is_all_fast() {
                      return base.to_vec();
                  }
                  base.iter()
                      .map(|(sid, wt)| (*sid, wt & w))
                      .filter(|(_, x)| !x.is_empty())
                      .collect()
              }

              struct StepPool {
                  raw: Vec<Vec<(NWAStateID, Weight)>>,
                  map: HashMap<u64, Vec<usize>>,
              }

              impl StepPool {
                  fn new() -> Self {
                      Self { raw: Vec::new(), map: HashMap::new() }
                  }
                  fn fingerprint(pairs: &[(NWAStateID, Weight)]) -> u64 {
                      pairs
                          .iter()
                          .fold(FP_ZERO, |fp, (sid, w)| mix3(fp, (*sid as u64).wrapping_mul(FP_K1), w.fp.wrapping_mul(FP_K2)))
                  }
                  fn intern(&mut self, mut pairs: Vec<(NWAStateID, Weight)>) -> usize {
                      pairs.retain(|(_, w)| !w.is_empty());
                      let fp = Self::fingerprint(&pairs);
                      if let Some(cands) = self.map.get(&fp) {
                          for &id in cands {
                              if self.raw[id] == pairs {
                                  return id;
                              }
                          }
                      }
                      let id = self.raw.len();
                      self.raw.push(pairs);
                      self.map.entry(fp).or_default().push(id);
                      id
                  }
              }

              #[derive(Clone)]
              struct CompiledStep {
                  by_sig: Vec<(usize, Weight)>,
                  mask: Weight,
              }
              #[derive(Clone)]
              struct MacroSig {
                  final_w: Option<Weight>,
                  def: Vec<usize>,
                  ex: BTreeMap<i16, Vec<usize>>,
              }
              #[derive(Clone, Hash, Eq, PartialEq)]
              struct MacroSigKey {
                  final_fp: u64,
                  def: Vec<usize>,
                  ex: Vec<(i16, Vec<usize>)>,
              }

              let pb_eps = if PROGRESS_BAR_ENABLED {
                  Some(ProgressBar::new(n as u64).with_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (ε-closures)")
                          .unwrap(),
                  ))
              } else {
                  None
              };
              let mut eps_cache: Vec<Vec<(NWAStateID, Weight)>> = vec![Vec::new(); n];
              for s in 0..n {
                  eps_cache[s] = eps_closure_masked(std::slice::from_ref(&s), &self.states, &fut);
                  if let Some(p) = &pb_eps {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_eps {
                  p.finish_with_message("ε-closures done");
              }

              let mut step_pool = StepPool::new();
              let mut sigs: Vec<MacroSig> = Vec::with_capacity(n);
              let mut state_to_sig_id: Vec<usize> = vec![0; n];
              let mut sig_intern: HashMap<MacroSigKey, usize> = HashMap::new();
              let pb_sigs = if PROGRESS_BAR_ENABLED {
                  Some(ProgressBar::new(n as u64).with_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Macro signatures)")
                          .unwrap(),
                  ))
              } else {
                  None
              };
              for s in 0..n {
                  let final_acc = eps_cache[s].iter().fold(Weight::zeros(), |mut acc, (t, w)| {
                      if let Some(fw) = &self.states[*t].final_weight {
                          acc |= &(w & fw);
                      }
                      acc
                  });
                  let final_acc = if final_acc.is_empty() { None } else { Some(final_acc) };

                  // Compute default step; skip if out-of-bounds or effect is empty after weighting + ε-closure.
                  let def_steps: Vec<usize> = self.states[s].default.iter().filter_map(|default| {
                      let NWADefaultTransition { target: to, weight: wdef, .. } = default;
                      if *to < n {
                          let pairs_def = apply_weight_to_pairs(&eps_cache[*to], wdef);
                          if pairs_def.is_empty() { None } else { Some(step_pool.intern(pairs_def)) }
                      } else { None }
                  }).collect();

                  // Compute exceptions; drop those that are empty or identical to the default step effect.
                  let mut ex: BTreeMap<i16, Vec<usize>> = BTreeMap::new();
                  for (lbl, targets) in self.states[s].transitions.iter() {
                      let mut step_exs: Vec<usize> = Vec::new();
                      for (to, wlbl) in targets {
                          if *to >= n {
                              continue;
                          }
                          let pairs_ex = apply_weight_to_pairs(&eps_cache[*to], wlbl);
                          if pairs_ex.is_empty() {
                              continue;
                          }
                          step_exs.push(step_pool.intern(pairs_ex));
                      }

                      if !step_exs.is_empty() {
                          step_exs.sort_unstable();
                          let mut sorted_def_steps = def_steps.clone();
                          sorted_def_steps.sort_unstable();
                          if step_exs == sorted_def_steps {
                              continue;
                          }
                          ex.insert(*lbl, step_exs);
                      }
                  }

                  crate::debug!(5, "NWA state {}: final_w: {:?}, def_steps: {:?}, ex_steps: {:?}", s, final_acc, def_steps, ex);

                  let mut sorted_def_steps = def_steps.clone();
                  sorted_def_steps.sort_unstable();
                  let key = MacroSigKey {
                      final_fp: final_acc.as_ref().map(|w| w.fp).unwrap_or(FP_ZERO),
                      def: sorted_def_steps,
                      ex: ex.iter().map(|(k, v)| (*k, v.clone())).collect(),
                  };
                  let sig_id = *sig_intern.entry(key).or_insert_with(|| {
                      let id = sigs.len();
                      sigs.push(MacroSig { final_w: final_acc, def: def_steps, ex });
                      id
                  });
                  state_to_sig_id[s] = sig_id;
                  if let Some(p) = &pb_sigs {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_sigs {
                  p.finish_with_message("Macro signatures done");
              }

              let pb_compile = if PROGRESS_BAR_ENABLED {
                  Some(ProgressBar::new(step_pool.raw.len() as u64).with_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Compile steps)")
                          .unwrap(),
                  ))
              } else {
                  None
              };
              let mut compiled_steps: Vec<CompiledStep> = Vec::with_capacity(step_pool.raw.len());
              for pairs in &step_pool.raw {
                  let mut acc: HashMap<usize, Weight> = HashMap::new();
                  for (t, w) in pairs.iter() {
                      *acc.entry(state_to_sig_id[*t]).or_default() |= w;
                  }
                  let mut by_sig: Vec<(usize, Weight)> = acc.into_iter().collect();
                  by_sig.sort_by_key(|(sid, _)| *sid);
                  let mask = by_sig.iter().fold(Weight::zeros(), |mut acc, (_, w)| {
                      acc |= w;
                      acc
                  });
                  compiled_steps.push(CompiledStep { by_sig, mask });
                  if let Some(p) = &pb_compile {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_compile {
                  p.finish_with_message("Compile steps done");
              }

              #[derive(Clone, Eq, PartialEq, Hash, Ord, PartialOrd)]
              struct MembersKey(Vec<usize>);

              struct CompositionNode {
                  final_weight: Option<Weight>,
                  default_target_idx: Option<usize>,
                  default_mask: Option<Weight>,
                  exception_targets: BTreeMap<i16, usize>,
                  exception_masks: BTreeMap<i16, Weight>,
                  gates: HashMap<usize, Weight>,
              }

              fn accumulate(dst: &mut HashMap<usize, Weight>, compiled: &[(usize, Weight)], gate: &Weight) {
                  for (sid, w) in compiled.iter() {
                      let x = w & gate;
                      if !x.is_empty() {
                          *dst.entry(*sid).or_default() |= &x;
                      }
                  }
              }

              let mut nodes: Vec<CompositionNode> = Vec::new();
              let mut key_to_idx: HashMap<MembersKey, usize> = HashMap::new();
              let mut work: VecDeque<usize> = VecDeque::new();

              let pb_discover = if PROGRESS_BAR_ENABLED {
                  Some(
                      ProgressBar::new(0).with_style(
                          ProgressStyle::default_bar()
                              .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Discovering states)")
                              .unwrap(),
                      ),
                  )
              } else {
                  None
              };

              let mut init_map: HashMap<usize, Weight> = HashMap::new();
              for (t, w) in eps_cache[self.body.start_state].iter() {
                  *init_map.entry(state_to_sig_id[*t]).or_default() |= w;
              }
              let mut init_keys: Vec<_> = init_map.keys().copied().collect();
              init_keys.sort_unstable();
              let init_key = MembersKey(init_keys);
              let start_idx = 0;
              key_to_idx.insert(init_key, start_idx);
              nodes.push(CompositionNode {
                  final_weight: None,
                  default_target_idx: None,
                  default_mask: None,
                  exception_targets: BTreeMap::new(),
                  exception_masks: BTreeMap::new(),
                  gates: init_map,
              });
              let mut in_queue = vec![false; 1];
              in_queue[start_idx] = true;
              work.push_back(start_idx);

              while let Some(idx) = work.pop_front() {
                  in_queue[idx] = false;
                  if let Some(p) = &pb_discover {
                      p.inc(1);
                  }
                  let node_gates = nodes[idx].gates.clone();

                  crate::debug!(5, "\nProcessing composition node {}: gates: {:?}", idx, node_gates);

                  let mut def_groups: HashMap<usize, Weight> = HashMap::new();
                  let mut ex_groups_by_label: BTreeMap<i16, HashMap<usize, Weight>> = BTreeMap::new();
                  let mut def_exers_by_label: BTreeMap<i16, HashMap<usize, Weight>> = BTreeMap::new();

                  for (sig_id, gate) in &node_gates {
                      for def_id in &sigs[*sig_id].def {
                          *def_groups.entry(*def_id).or_default() |= gate;
                      }
                      for (lbl, ex_steps) in &sigs[*sig_id].ex {
                          for ex_step in ex_steps {
                              *ex_groups_by_label.entry(*lbl).or_default().entry(*ex_step).or_default() |= gate;
                          }
                          if !sigs[*sig_id].def.is_empty() {
                              for def_id in &sigs[*sig_id].def {
                                  *def_exers_by_label.entry(*lbl).or_default().entry(*def_id).or_default() |= gate;
                              }
                          }
                      }
                  }

                  crate::debug!(5, "  - def_groups: {:?}", def_groups);
                  crate::debug!(5, "  - ex_groups_by_label: {:?}", ex_groups_by_label);
                  crate::debug!(5, "  - def_exers_by_label: {:?}", def_exers_by_label);

                  let mut target_maps: BTreeMap<Option<i16>, HashMap<usize, Weight>> = BTreeMap::new();
                  let mut def_target_map: HashMap<usize, Weight> = HashMap::new();
                  for (def_step, g) in &def_groups {
                      accumulate(&mut def_target_map, &compiled_steps[*def_step].by_sig, g);
                  }
                  if !def_target_map.is_empty() {
                      target_maps.insert(None, def_target_map);
                  }

                  for (lbl, ex_groups) in &ex_groups_by_label {
                      let mut map = HashMap::new();
                      let def_exers = def_exers_by_label.get(lbl);
                      for (def_step, total_g) in &def_groups {
                          let g_exers = def_exers.and_then(|de| de.get(def_step));
                          let mut g_nonex = total_g.clone();
                          if let Some(g_exers) = g_exers {
                              g_nonex -= g_exers;
                          }
                          if !g_nonex.is_empty() {
                              accumulate(&mut map, &compiled_steps[*def_step].by_sig, &g_nonex);
                          }
                      }
                      for (ex_step, g_ex) in ex_groups {
                          accumulate(&mut map, &compiled_steps[*ex_step].by_sig, g_ex);
                      }
                      if !map.is_empty() {
                          target_maps.insert(Some(*lbl), map);
                      }
                  }

                  crate::debug!(5, "  - computed target_maps:");
                  for (label, map) in &target_maps {
                      let mut keys: Vec<_> = map.keys().copied().collect();
                      keys.sort_unstable();
                      let total_weight = map.values().fold(Weight::zeros(), |mut a, b| { a |= b; a });
                      crate::debug!(5, "    - label {:?}: target_sigs={:?}, total_weight={}", label, keys, total_weight);
                  }

                  let mut resolved_transitions: BTreeMap<Option<i16>, (usize, Weight)> = BTreeMap::new();
                  for (label, map) in target_maps {
                      let mut keys: Vec<_> = map.keys().copied().collect();
                      keys.sort_unstable();
                      let key = MembersKey(keys);
                      let target_idx = *key_to_idx.entry(key).or_insert_with(|| {
                          let new_idx = nodes.len();
                          nodes.push(CompositionNode {
                              final_weight: None,
                              default_target_idx: None,
                              default_mask: None,
                              exception_targets: BTreeMap::new(),
                              exception_masks: BTreeMap::new(),
                              gates: HashMap::new(),
                          });
                          if new_idx >= in_queue.len() {
                              in_queue.resize(new_idx + 1, false);
                          }
                          new_idx
                      });

                      let mut any_change = false;
                      for (sig_id, weight) in &map {
                          let entry = nodes[target_idx].gates.entry(*sig_id).or_default();
                          let new_w = &*entry | weight;
                          if new_w != *entry {
                              *entry = new_w;
                              any_change = true;
                          }
                      }
                      if any_change && !in_queue[target_idx] {
                          in_queue[target_idx] = true;
                          work.push_back(target_idx);
                      }
                      resolved_transitions.insert(label, (target_idx, map.values().fold(Weight::zeros(), |mut a, b| { a |= b; a })));
                  }

                  let node = &mut nodes[idx];
                  if let Some((target_idx, mask)) = resolved_transitions.remove(&None) {
                      node.default_target_idx = Some(target_idx);
                      node.default_mask = Some(mask);
                  }
                  for (label, (target_idx, mask)) in resolved_transitions {
                      if let Some(lbl) = label {
                          node.exception_targets.insert(lbl, target_idx);
                          node.exception_masks.insert(lbl, mask);
                      }
                  }

                  crate::debug!(5, "  - Resolved transitions for node {}:", idx);
                  if let (Some(target), Some(mask)) = (node.default_target_idx, &node.default_mask) {
                      crate::debug!(5, "    - default -> {} (mask: {})", target, mask);
                  }
                  for (lbl, target) in &node.exception_targets {
                      if let Some(mask) = node.exception_masks.get(lbl) {
                          crate::debug!(5, "    - on {}: -> {} (mask: {})", lbl, target, mask);
                      }
                  }

                  node.final_weight = Into::into(node_gates.iter().fold(Weight::zeros(), |mut acc, (sig_id, gate)| {
                      if let Some(fw) = &sigs[*sig_id].final_w {
                          acc |= &(gate & fw);
                      }
                      acc
                  }));

                  if let Some(p) = &pb_discover {
                      p.set_length(nodes.len() as u64);
                  }
              }
              if let Some(p) = pb_discover {
                  p.finish_with_message(format!("Discovered {} compositions", nodes.len()));
              }

              let mut dwa = DWA::new();
              if nodes.is_empty() {
                  return dwa;
              }
              dwa.states.0.resize(nodes.len(), Default::default());
              dwa.body.start_state = start_idx;

              for (i, node) in nodes.iter().enumerate() {
                  dwa.states[i].final_weight = node.final_weight.clone();
                  if let (Some(target_idx), Some(mask)) = (node.default_target_idx, &node.default_mask) {
                      if !mask.is_empty() {
                          dwa.set_default_transition(i, target_idx, mask.clone()).unwrap();
                      }
                  }
                  for (lbl, &target_idx) in &node.exception_targets {
                      if let Some(mask) = node.exception_masks.get(lbl) {
                          if !mask.is_empty() {
                              dwa.add_transition(i, *lbl, target_idx, mask.clone()).unwrap();
                          }
                      }
                  }
              }
              dwa
          }
      }
