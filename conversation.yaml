              let alph_lower = Expr::U8Class(U8Set::from_range(b'a', b'z'));
              let alph_upper = Expr::U8Class(U8Set::from_range(b'A', b'Z'));
              let name_start = choice![alph_lower.clone(), alph_upper.clone(), eat_u8(b'_')];
