      **Explanation of Added Tests:**

      1.  **`test_ambiguous_dangling_else`**: Uses the classic "dangling else" problem. This grammar has a shift/reduce conflict. An LR parser would fail or require precedence rules. GLR resolves this by splitting the parser state, effectively exploring both attachments of the `else`. The test verifies the parser *accepts* the input, demonstrating its ability to handle this ambiguity.
      2.  **`test_ambiguous_arithmetic`**: Uses a simple but highly ambiguous expression grammar (`E -> E + E | E * E | id`). This creates both shift/reduce and potentially reduce/reduce conflicts depending on the state. GLR should accept inputs like `id + id * id` which have multiple valid parse trees.
      3.  **`test_reduce_reduce_conflict`**: Creates an explicit reduce/reduce conflict (`A -> x`, `B -> x`). When the parser sees `x`, it could reduce using either rule. GLR handles this by performing both reductions (leading to splits or merges in the GSS). The test verifies acceptance.
      4.  **`test_epsilon_rules_ambiguity`**: Shows ambiguity arising from nullable rules. The input `x` can be parsed in two ways depending on which non-terminal (`A` or `B`) produces `x` and which produces epsilon. GLR should accept this.
      5.  **`test_highly_ambiguous_potentially_slow`**: Uses the `S -> S S | a` grammar, which has a number of parses related to Catalan numbers. While it should parse correctly for small inputs, this highlights a grammar type where GLR's performance *could* become a limitation on larger inputs due to the potentially exponential number of parse paths represented in the GSS.

      These tests demonstrate that the GLR implementation correctly handles ambiguous grammars and conflicts, which are limitations for simpler parsing techniques. They also implicitly touch upon the potential complexity (GSS growth) involved. The notes at the end explicitly mention limitations that aren't easily shown with the current `T = ()` test setup (semantic ambiguity details, performance benchmarks).
