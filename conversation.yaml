      ### 1.4. Proof sketch for Hypothesis C (early termination)

      Old code (inside `RegexState::execute`):

      ```rust
      let matched: BTreeSet<GroupID> = self.matches.keys().cloned().collect();
      let excluded: BTreeSet<GroupID> = matched
          .intersection(&dfa.non_greedy_finalizers)
          .cloned()
          .collect();
      let should_terminate = dfa.states[self.current_state]
          .possible_future_group_ids
          .difference(&excluded)
          .next()
          .is_none();
      ```

      Let:

      - \( M \) = `matched` (set of all matched group IDs),
      - \( N \) = `dfa.non_greedy_finalizers`,
      - \( F \) = `possible_future_group_ids` for current state.

      Then:

      - \( \text{excluded} = M \cap N \).
      - `should_terminate` is `true` iff:
        \[
        F \setminus \text{excluded} = \emptyset.
        \]

      By set algebra:

      \[
      F \setminus (M \cap N) = \emptyset
      \quad\iff\quad
      \forall g \in F, g \in M \cap N.
      \]

      Equivalently:

      > For every future group \( g \), \( g \) is non-greedy (since \( g \in N \)) **and** already matched (since \( g \in M \)).

      This is exactly what the new helper checks:

      ```rust
      fn should_terminate_early(
          possible_future_group_ids: &BTreeSet<GroupID>,
          non_greedy_finalizers: &BTreeSet<GroupID>,
          matched_groups: &BTreeSet<GroupID>,
      ) -> bool {
          for group_id in possible_future_group_ids {
              if non_greedy_finalizers.contains(group_id) {
                  if !matched_groups.contains(group_id) {
                      // Non-greedy group not yet matched; keep running.
                      return false;
                  }
              } else {
                  // Greedy group still possible; keep running.
                  return false;
              }
          }
          true
      }
      ```

      So Hypothesis C holds.

