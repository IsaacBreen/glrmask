          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();
          d.set_default_transition(d.body.start_state, s1, Weight::from_iter(vec![1, 2, 3]))
              .unwrap();
          d.add_transition(d.body.start_state, 'x' as i16, s2, Weight::from_item(99))
              .unwrap();
