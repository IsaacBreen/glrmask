          ) {
              let node_arc = Arc::new(self.clone());
              if let Some(new_node_arc) = prune_and_transform_recursive(&node_arc, closure, memo) {
                  *self = new_node_arc.as_ref().clone();
              } else {
                  *self = GSSNode::new(self.acc2().clone());
