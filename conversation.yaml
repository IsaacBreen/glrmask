  - user: |-
      ### 1. Introduction

      This report details the performance profile of the `det_fixpoint` algorithm for converting a Non-deterministic Weighted Automaton (NWA) to a Deterministic Weighted Automaton (DWA). Analysis of execution on representative workloads reveals a significant increase in computational time and memory consumption during the algorithm's fixpoint propagation phase. The objective of this document is to provide a systematic analysis of the underlying causes and to present a spectrum of potential strategies for managing this complexity.

      ### 2. Performance Profile Analysis

      The determinization process can be divided into two main stages: pre-computation and fixpoint iteration.

      *   **Pre-computation:** This stage, which includes ε-closure calculation and macro-signature generation, scales linearly with the number of NWA states and completes efficiently.
      *   **Fixpoint Iteration:** This stage constructs the DWA state graph. Execution data shows that both the number of DWA states and the size of the worklist queue can grow by orders of magnitude relative to the input NWA size. This leads to a super-linear increase in processing time and is the primary performance bottleneck.

      The core observation is that the algorithm is encountering a **combinatorial state space expansion**. This is not an implementation defect but a fundamental property of the powerset construction method when applied to NWAs with certain structural characteristics.

      ### 3. Causal Factors

      The observed state space expansion is driven by the interplay of the algorithm's design and the nature of the input automata.

      **3.1. State Representation and Identity**
      A determinized state is defined by its `MembersKey`: a unique set of NWA macro-signature IDs. A new DWA state is created for every unique combination of signatures that is reachable. The size of the resulting DWA is therefore related to the size of the reachable subset of the powerset of all macro-signatures.

      **3.2. Transition Dynamics**
      The transition function for the DWA computes the target state by taking the **union** of the transition targets of all members in the source state. This union operation is the primary engine of state creation. NWAs with the following properties are susceptible to this expansion:
      *   **High Signature Diversity:** A large number of unique macro-signatures serves as a large alphabet for the powerset construction.
      *   **Divergent Transition Paths:** When different member signatures within a DWA state transition to sets of signatures with low mutual overlap, their union results in a new, larger, and more complex `MembersKey`.

      **3.3. Algorithmic Overhead**
      Within the fixpoint loop, certain operations contribute to the computational cost per iteration. The calculation of exception transitions currently involves a "clone-and-modify" pattern on a `HashMap` representing the default transition's target. For states with many exception labels, this pattern results in significant overhead from repeated memory allocation and data manipulation.

      ### 4. Strategic Options for Managing Complexity

      The following strategies address the observed complexity from different perspectives, ranging from direct optimization to fundamental changes in the determinization model. They are presented for evaluation based on their respective trade-offs.

      #### Category A: Correctness-Preserving Strategies

      These approaches aim to produce the exact same minimal DWA but with greater efficiency.

      *   **A.1. On-the-Fly Minimization:** This strategy redefines state identity from its structural composition (`MembersKey`) to its observable behavior (`BehavioralKey`). A `BehavioralKey` would be derived from a state's final weight and the canonical IDs of its target states. By mapping multiple structural compositions to a single behavioral key, this method effectively computes the minimal bisimulation quotient during construction, merging behaviorally identical states as they are discovered and preventing redundant state creation.

      *   **A.2. Brzozowski's Algorithm:** This offers an alternative mathematical construction for determinization and minimization: `DFA = det(rev(det(rev(NFA))))`. This method explores the state space in a fundamentally different order. Depending on the structural properties of the input NWA, the intermediate automaton produced by this method may be significantly smaller, potentially avoiding the state space expansion seen in the direct powerset construction.

      *   **A.3. Local Algorithmic Refinement:** This involves optimizing the implementation of the current fixpoint loop. Specifically, the calculation of exception transitions can be refactored to avoid repeated cloning of the `baseline` map, thereby reducing the computational cost of each iteration.

      #### Category B: Approximation and Abstraction Strategies

      These approaches manage complexity by relaxing the requirement of exact semantic equivalence, trading some degree of precision for guaranteed performance bounds.

      *   **B.1. State Space Bounding:** This strategy imposes an explicit upper limit on the number of DWA states. Once the budget is reached, newly generated states are merged into one or more existing states according to a defined policy (e.g., merging into a single "summary" sink state, or merging into an existing state with the highest structural similarity). This provides a hard guarantee on the output size.

      *   **B.2. Abstraction of NWA Structure (Signature Clustering):** This strategy reduces the complexity of the input to the powerset construction. Before determinization, "similar" macro-signatures are clustered and merged into a single representative signature. The similarity metric and merging rules (e.g., union of weights and transitions) determine the nature of the over-approximation. This reduces the size of the alphabet over which the powerset is constructed.

      *   **B.3. Abstraction of Weight Semantics (Semiring Morphism):** This strategy formally simplifies the algebraic structure of the problem. The `SimpleBitset` semiring is mapped to a simpler, finite abstract semiring (e.g., the Boolean semiring) via a structure-preserving morphism. The determinization is then performed in this less expressive abstract domain, which inherently limits state differentiation and controls the explosion. The result is a DWA that preserves certain properties (like reachability) while abstracting away detailed weight information.

      ---

      ### Section 1: The Foundational Algorithm and its Limits (Mohri, 1997)

      **Paper:** Mohri, M. (1997). *Finite-state transducers in language and speech processing*. Computational Linguistics, 23(2). (And related works by the author).

      **Relevance to Our Project:** This paper is the cornerstone of our current approach. Our `det_fixpoint` function is a direct implementation of the general weighted determinization algorithm described in this work. Understanding this paper is critical as it both validates our current implementation and precisely defines its inherent limitations, explaining the state space explosion we are observing.

      #### 1.1. The Weighted Subset Construction

      The algorithm presented by Mohri is a generalization of the classical powerset construction used for unweighted finite automata (NFAs). The key challenge in the weighted case is that simply tracking the set of reachable NWA states is insufficient; the algorithm must also track the accumulated weights of the paths leading to those states.

      *   **Core Concept: Weighted Subsets:** A state in the output DWA does not correspond to a simple set of NWA states `{q₁, q₂, ...}`. Instead, it corresponds to a **weighted subset** of the form `{(q₁, w₁), (q₂, w₂), ...}`.
          *   In our implementation, a `DetState` represents this weighted subset. The `members` field holds the set of NWA macro-signatures (which are abstractions of NWA states), and the `gates` vector holds their corresponding weights.

      *   **Residual Weights (Our "Gates"):** The weight `wᵢ` associated with an NWA state `qᵢ` in a weighted subset is termed the **residual weight**. It represents the "cost difference" between the single cheapest path found so far to reach the DWA state and the cheapest path to reach the specific NWA state `qᵢ`. The algorithm "pushes forward" these residual weights during transitions.

      *   **Transition Logic:** The paper's pseudocode (Figure 26) details the transition logic. For an input symbol `x`, the algorithm computes:
          1.  **The total weight of the new transition (`w'`):** This is the sum (or `⊕` operation) of all possible paths from the current weighted subset. In the tropical semiring, this is a `min` operation.
          2.  **The new weighted subset (`q'`):** This is the set of all reachable NWA states. The new residual weight for each target state is calculated by taking its old path weight, subtracting the total transition weight `w'`, and summing the results.

          This is precisely what our algorithm does. Our "gate" propagation and the unioning of weights in `ensure_state` are the equivalent operations for our `(SimpleBitset, ∨, ∧)` semiring. The core principle of factoring out a common path cost and propagating the residuals is identical.

      #### 1.2. The Problem of Non-Termination and State Explosion

      This is the most critical part of the paper for understanding our current issue. Mohri states explicitly that, unlike the unweighted case, **weighted determinization does not terminate for all input automata**.

      *   **Cause of Non-Termination:** The algorithm terminates if and only if it generates a finite number of unique weighted subsets. However, if the residual weights can grow or change in an unbounded fashion, the algorithm will generate an infinite sequence of distinct weighted subsets, and thus never halt.
      *   **Practical Implication:** In a finite-memory environment, this theoretical non-termination manifests as the state space explosion we are observing. Our algorithm is generating a vast but finite number of states because the diversity of the `gates` (residual weights) is forcing the creation of many unique `DetState`s that share the same set of `members` but differ in their weight configurations.

      #### 1.3. The Diagnostic Condition: The Twins Property

      The paper provides a powerful formal tool to diagnose *why* an automaton is not determinizable by this method.

      *   **Definition:** The **twins property** is a condition on the states of the input NWA.
          1.  **Siblings:** Two states, `q` and `q'`, are *siblings* if they can both be reached from an initial state via paths labeled with the same input string `u`.
          2.  **Twins:** Two sibling states are *twins* if, for any input string `y` that labels a cycle at both `q` and `q'`, the weight of the cycle at `q` is identical to the weight of the cycle at `q'`.
          3.  An automaton has the twins property if every pair of its sibling states are twins.

      *   **The Main Theorem:** Mohri proves that for trim and unambiguous WFAs over the tropical semiring, the automaton is determinizable (i.e., the algorithm terminates) **if and only if** it has the twins property.

      *   **Implication for Our Project:** The state space explosion we are experiencing is a definitive symptom that our input NWAs are violating the twins property. There must exist at least two states reachable by a common path that have cycles on a common string but with different weights. This difference in cycle weights causes the residual weights (our `gates`) to diverge indefinitely as the cycle is traversed, forcing the creation of a new DWA state at each step.

      #### 1.4. Summary and Actionable Insights from Mohri (1997)

      *   **Validation:** Our current algorithm is a faithful implementation of the standard, academically recognized method for WFA determinization.
      *   **Diagnosis:** The observed state explosion is not a bug but a predictable, theoretically explained outcome. The root cause is that our input NWAs violate the twins property.
      *   **Limitation:** This paper provides the crucial diagnostic tool (the twins property) but does not offer a solution for how to determinize an automaton that fails this test. It defines the boundary of what is possible with this specific algorithm.

      This analysis provides a clear, formal foundation for our problem. The immediate conclusion is that continuing to apply our current algorithm to these problematic NWAs will not succeed. The next logical step is to investigate methods that can handle automata that do not satisfy the twins property. Subsequent research, which will be covered in the next sections of this report, builds directly on this foundation to provide such solutions.

      ---

      ### Section 2: Constructive Solutions for Non-Determinizable Automata

      The work of Mohri (1997) provides the diagnosis for why our determinization algorithm fails: the input NWA violates the twins property. The papers in this section provide the cure, presenting algorithms to transform a non-determinizable automaton into one that is determinizable, either exactly or via a formal approximation.

      #### 2.1. Pre-Determinization: An Optimal Algorithm for Exact Transformation

      **Paper:** Allauzen, C., & Mohri, M. (2004). *An Optimal Pre-Determinization Algorithm for Weighted Transducers*.

      **Relevance to Our Project:** This paper is the direct successor to Mohri (1997) and addresses its primary open question: what can be done if an automaton is *not* determinizable? It provides a concrete, optimal algorithm to modify the NWA so that it acquires the twins property, thereby guaranteeing that the standard determinization algorithm will terminate.

      *   **Core Idea:** The algorithm's goal is to "disconnect" the paths that cause the twins property to be violated. If two sibling states `q` and `q'` have different-weight cycles on a string `y`, the algorithm ensures that `q` and `q'` can no longer be reached by a common input string, breaking the "sibling" condition.

      *   **The `T ◦ (-T⁻¹)` Construction:** The diagnostic tool is the composition of the transducer `T` with its negative inverse.
          *   A state in this composed machine is a pair of states `(q₁, q₂)` from the original machine.
          *   A path in this machine from an initial state `(i₁, i₂)` to a "diagonal" state `(q, q)` corresponds to two paths in the original machine that start at initial states and end at the same state `q`.
          *   Crucially, a cycle on a diagonal state `(q, q)` in the composed machine corresponds to two cycles at state `q` in the original machine. The weight of this composed cycle is the *difference* in weights of the original cycles.
          *   **Therefore, a cycle with a non-zero weight in `T ◦ (-T⁻¹)` is a direct witness of a twins property violation.**

      *   **The Algorithm:**
          1.  **Test:** Construct `S = T ◦ (-T⁻¹)` and find all cycles with non-zero weight. Mark the transitions that participate in these violating cycles.
          2.  **Disconnect:** For each violating path found, insert a new transition labeled with a unique "special symbol" (e.g., `#1`, `#2`) into one of the original paths in `T`. This insertion prevents the two paths from matching during composition, effectively "disconnecting" the violating path in `S`.
          3.  **Optimality:** The paper's main contribution is an optimal method for choosing *where* to insert the special symbol. It uses a single-source shortest-path algorithm over the min-max semiring to find the position that will maximize the benefit for the subsequent determinization step (by allowing the longest possible paths to be merged).
          4.  **Determinize:** The modified transducer `T'` now has the twins property and can be successfully determinized. The special symbols can then be treated as ε-transitions in the final DWA.

      *   **Implication for Our Project:** This provides a powerful, correctness-preserving pre-processing step. Before running `det_fixpoint`, we could run this pre-determinization algorithm. This would handle the problematic NWAs by transforming them into equivalent (but slightly larger) NWAs that are guaranteed to be determinizable, preventing the state explosion.

      #### 2.2. Approximated Determinization: A Rigorous Framework

      **Paper:** Aminof, B., Kupferman, O., & Lampert, R. (2010). *Rigorous Approximated Determinization of Weighted Automata*.

      **Relevance to Our Project:** This paper provides the formal basis for approximation when exact determinization is either impossible or computationally too expensive. It generalizes the twins property and develops a corresponding determinization algorithm that is guaranteed to terminate and produce a result with a bounded error factor.

      *   **Core Idea: The `t`-Twins Property:** This is a relaxation of the strict twins property. Instead of requiring the weights of sibling cycles to be equal (`w(c) = w(c')`), it requires their ratio to be bounded by an approximation factor `t`. For the tropical semiring, this is `w(c) ≤ w(c') + t` or `w(c) - w(c') ≤ t`. For our semiring, this would correspond to some form of bounded set difference.

      *   **The `tDet` Algorithm:** The paper presents a determinization algorithm, `tDet`, designed for automata that satisfy the `t`-twins property.
          *   **Residual Ranges:** The key innovation is that a DWA state does not track a single residual weight (our "gate") for each NWA member. Instead, it tracks a **residual range** `[l, u]` (a lower and upper bound).
          *   **State Collapsing (Merging):** This is the crucial mechanism for controlling the state space. A newly generated DWA state `p'` is not added to the state set if an existing state `p` "refines" it. Refinement means they correspond to the same set of NWA states, and for every NWA state `q`, the residual range `[l', u']` in `p'` is contained within the range `[l, u]` in `p`.
          *   **Guaranteed Termination:** The paper proves that if an automaton has the `t`-twins property (and rational weights), the `tDet` algorithm is guaranteed to terminate. The bounded ratio between cycle weights prevents the residual ranges from growing infinitely and ensures that the number of non-refinable states is finite.

      *   **Implication for Our Project:** This work provides a blueprint for a principled approximation strategy.
          1.  It validates the idea of **state merging** as a sound technique.
          2.  It suggests a concrete merging criterion: **range inclusion**. This is more sophisticated than a simple distance metric and is formally tied to the approximation factor `t`.
          3.  It shows that by relaxing our correctness goal from exact equivalence to bounded approximation, we can guarantee termination for a much larger class of automata. We could adapt our `ensure_state` function to implement this state-collapsing mechanism.

      ### 2.3. Summary and Actionable Insights

      *   **A Clear Choice of Strategies:** The literature presents two distinct but complementary paths forward for handling non-determinizable automata:
          1.  **Exact Transformation (Pre-Determinization):** Modify the NWA to satisfy the strict twins property, then use our existing determinization algorithm. This preserves correctness.
          2.  **Bounded Approximation (`t`-Determinization):** Modify the determinization algorithm itself to merge states based on residual ranges, guaranteeing termination at the cost of a controlled loss of precision.

      *   **Implementation Guidance:** Both papers provide sufficient detail to guide an implementation. The `T ◦ (-T⁻¹)` construction is a standard product of automata. The `tDet` algorithm's state-collapsing logic can be integrated directly into our `ensure_state` function by modifying the definition of a `DetState` to include weight ranges and adding the refinement check.

      This analysis shows that our performance issues are not novel and that well-understood, powerful solutions exist. The choice between the exact and approximate methods depends on whether the application can tolerate a bounded error in the final DWA weights.

