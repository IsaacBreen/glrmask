              """
              Merge the accumulators across all active stacks into a single Acc.
              Returns None if there are no active stacks.
              """
              if self.is_empty():
                  return None
              it = iter(self.acc_trees.keys())
              try:
                  acc = next(it)
              except StopIteration:
                  return None
              for a in it:
                  acc = acc.merge(a)  # type: ignore[assignment]
              return acc
