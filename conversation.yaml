          pub fn simplify_gss_forest<T: Clone + Ord + Hash + Debug>( // T needs Ord + Hash for the new memo key
              roots: &[Arc<GSSNode<T>>],
          ) -> Vec<Arc<GSSNode<T>>> {
              let mut original_ptr_memo: HashMap<*const GSSNode<T>, Arc<GSSNode<T>>> = HashMap::new();
