          fn get_first_path_lower(
              node: &Arc<Lower<T>>,
              path: &mut Vec<T>,
              acc: &A,
          ) -> Option<(Vec<T>, A)> {
              if node.empty {
                  let mut p = path.clone();
                  p.reverse();
                  return Some((p, acc.clone()));
              }
              for (v, children) in &node.children {
                  for child in children.values() {
                      path.push(v.clone());
                      if let Some(res) = Self::get_first_path_lower(child, path, acc) {
                          return Some(res);
                      }
                      path.pop();
                  }
              }
              None
          }

