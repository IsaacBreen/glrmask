                  .map_err(|e| PyErr::new::<pyo3::exceptions::PyIOError, _>(
                      format!("Failed to load or parse EBNF file '{}': {}", path, e)))?;
              Ok(PyGrammarDefinition { inner: grammar_def })
          }

