              self.end_flags: Dict[int, bool] = {}
              self.children: Dict[int, List[Tuple[Tuple[int, ffi.Bitset], List[Tuple[int, ffi.Bitset]]]]] = {}
              self.pop_index_by_node: Dict[int, Dict[int, PopIndex]] = {}

              bs_from_json = ffi.Bitset.from_json_string
              dumps = json.dumps

