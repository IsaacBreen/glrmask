      During the epsilon-removal construction, it may happen quite often in practice that several transitions from the same state $p$ to the same state $q$, with the same input and output label, need to be constructed in the resulting transducer $T'$. To avoid this redundancy, the weights of these transitions are $\oplus$-summed to maintain at any time a single transition instead.

      Note that epsilon-removal admits a natural on-demand computation since the outgoing transitions of state $q$ of the output automaton can be computed directly using the $\epsilon$-closure of $q$. However, the reverse topological order described in the case of an acyclic $T_\epsilon$ requires examining all states of $T_\epsilon$ and thus that version of the algorithm cannot be viewed as a natural on-demand construction. In practice, both versions of the algorithm can be useful.

      When epsilon-removal is to be followed immediately by the application of determinization, the integration of these two operations often results in much more efficient overall computation. This is because the $\epsilon$-closure of a subset of states created by determinization can be computed by a single shortest-distance algorithm with all states of the subset serving as sources, rather than a distinct one for each state of the subset. Since some states can be reached by several elements of the subset, the first method provides more sharing. This integration of determinization and epsilon-removal can be extended to the weighted case where the weighted determinization [38] presented in the next section is used.[^10]

      Epsilon-removal can be straightforwardly modified to remove transitions with input label $a$ and output label $b$, with $(a, b) \neq (\epsilon, \epsilon)$. This can be done for example by relabeling $\epsilon$-transitions with a new label and replacing $(a, b)$ by $(\epsilon, \epsilon)$, applying epsilon-removal, and then restoring original $\epsilon$s. The resulting transducer is equivalent to the original if $(a, b)$ is assigned the semantics of $(\epsilon, \epsilon)$.

      Figure 10 illustrates the epsilon-removal algorithm. Figure 10(c) shows the transducer $T'$ resulting from the transducer $T$ of Figure 10(a) by application of epsilon-removal. Note that only three of the original states remain in $T'$. As already discussed, since state 2 and 3 admit only incoming $\epsilon$-transitions (and only outgoing $\epsilon$-transitions in the case of state 3), after removal of $\epsilon$-transitions they become inaccessible and can thus be removed. Figure 10(b) indicates all non-$\overline{0}$ shortest-distances between states in $T_\epsilon$, which summarizes the closure information. These distances are used to determine the weight of the new transitions added.

      Instead of removing an $\epsilon$-transition from $p$ to $q$ by adding to state $p$ all non-$\epsilon$-transitions leaving $q$, one can equivalently proceed by adding to $q$ all non-$\epsilon$-transitions entering $p$. This is equivalent to applying epsilon-removal in the same way as before but to the reverse of $T$. We will thus refer to *reverse epsilon-removal* as the algorithm that consists of the following sequence of operations: reversal, epsilon-removal, reversal. Figure 10(d) shows $T''$ the result of the application of reverse epsilon-removal to $T$. $T''$ is equivalent to $T$ and $T'$ and has the same number of states as $T$, but in this case has more transitions than $T'$. Which algorithm epsilon-removal or reverse epsilon-removal, produces the smallest transducer depends on the number of outgoing transitions of the states $q$ reached by an $\epsilon$-path in the epsilon-removal case, or the number of incoming transitions of the states $p$ with incoming $\epsilon$s in the reverse epsilon-removal case. The decision of the direction of epsilon-removal can be made in fact for each pair of states $(p,q)$ based upon these quantities.

      ## 6.2 Determinization

      This section describes a general determinization algorithm for weighted automata and transducers [38] which generalizes the standard powerset construction for unweighted finite automata. The presentation will focus on the case of weighted automata, the weighted transducer case can be treated in a similar way or as a special case of the general algorithm we present [38].

      A weighted automaton is said to be *deterministic* or *subsequential* if it has a unique initial state and if no two transitions leaving any state share the same input label. There exists a natural extension of the classical subset construction to the case of weighted automata called *determinization*. Weighted determinization requires some technical conditions on the semiring or the weighted automaton which we will first introduce. These conditions hold in most cases in practice.

      Weighted determinization is a generic algorithm: it works with any *weakly divisible semiring*. A semiring is said to be *divisible* if all non-$\overline{0}$ elements admit an inverse, that is if $S - \{\overline{0}\}$ is a group. $(S, \oplus, \otimes, \overline{0}, \overline{1})$ is said to be *weakly divisible* if for any $x$ and $y$ in $S$ such that $x \oplus y \neq \overline{0}$, there exists at least one $z$ such that $x = (x \oplus y) \otimes z$. The $\oplus$-operation is *cancellative* if $z$ is unique and we can write: $z = (x \oplus y)^{-1} \otimes x$. When $z$ is not unique, we can still assume that we have an algorithm to find one of the possible $z$ and call it $(x \oplus y)^{-1}x$. Furthermore, we will assume that $z$ can be found in a consistent way, that is: $((u \otimes x) \oplus (u \otimes y))^{-1}(u \otimes x) = (x \oplus y)^{-1}x$ for any $x, y, u \in S$ such that $u \neq \overline{0}$. A semiring is *zero-sum-free* if for any $x$ and $y$ in $S$, $x \oplus y = \overline{0}$ implies $x = y = \overline{0}$.

      Additionally, we assume that for any string $x \in \Sigma^*$, the sum of the weights of the paths labeled with $x$ and starting at an initial state is non-$\overline{0}$: $w[P(I,x, Q)] \neq \overline{0}$. This condition is always satisfied with trim weighted automata over the tropical semiring or any zero-sum-free semiring.

      The pseudocode of the algorithm is given below with $Q'$, $I'$, $F'$, and $E'$ all initialized to the empty set.

      A *weighted subset* $p'$ of $Q$ is a set of pairs $(q, x) \in Q \times S$. We will denote by $Q[p']$ the set of states $q$ of the weighted subset $p'$. $E[Q[p']]$ represents the set of transitions leaving these states, and $i[E[Q[p']]]$ the set of input labels of these transitions.

      **Algorithm 3:** WEIGHTED-DETERMINIZATION($A$)
      ```
      1.  i' ← {(i, λ(i)) : i ∈ I}
      2.  λ'(i') ← overline{1}
      3.  Q_queue ← {i'}
      4.  While Q_queue ≠ ∅
      5.      p' ← HEAD(Q_queue)
      6.      DEQUEUE(Q_queue)
      7.      For each x ∈ i[E[Q[p']]]
      8.          w' ← bigoplus {v ⊗ w : (p, v) ∈ p', (p, x, w, q) ∈ E}
      9.          q' ← {(q, bigoplus {w'⁻¹ ⊗ (v ⊗ w) : (p, v) ∈ p', (p, x, w, q) ∈ E}) : q = n[e], i[e] = x, e ∈ E[Q[p']]}
      10.         E' ← E' ∪ {(p', x, w', q')}
      11.         If q' ∉ Q'
      12.             Q' ← Q' ∪ {q'}
      13.             If Q[q'] ∩ F ≠ ∅
      14.                 F' ← F' ∪ {q'}
      15.                 ρ'(q') ← bigoplus {v ⊗ ρ(q) : (q, v) ∈ q', q ∈ F}
      16.             EndIf
      17.             ENQUEUE(Q_queue, q')
      18.         EndIf
      19.     EndFor
      20. EndWhile
      21. return T'
      ```

      The states of the output automaton can be identified with (weighted) subsets of the states of the original automaton. A state $r$ of the output automaton that can be reached from the start state by a path $\pi$ is identified with the set of pairs $(q, x) \in Q \times S$ such that $q$ can be reached from an initial state of the original machine by a path $\sigma$ with $i[\sigma] = i[\pi]$ and $\lambda(p[\sigma]) \otimes w[\sigma] = \lambda(p[\pi]) \otimes w[\pi] \otimes x$. Thus, $x$ can be viewed as the *residual weight* at state $q$.

      Determinization does not terminate for all weighted automata. As we shall see, not all weighted automata are *determinizable* by the algorithm just described. When it terminates, the algorithm returns a subsequential weighted automaton $A' = (\Sigma, Q', I', F', E', \lambda', \rho')$, equivalent to the input $A = (\Sigma, Q, I, F, E, \lambda, \rho)$.

      The algorithm uses a queue $\mathcal{Q}$ containing the set of states of the resulting automaton $A'$, yet to be examined. The queue discipline of $\mathcal{Q}$ can be arbitrarily chosen and does not affect the termination of the algorithm. $A'$ admits a unique initial state, $i'$, defined as the set of initial states of $A$ augmented with their respective initial weights. Its input weight is $\overline{1}$ (lines 1-2). $\mathcal{Q}$ originally contains only the subset $i'$ (line 3). At each execution of the loop of lines 4-16, a new subset $p'$ is extracted from $\mathcal{Q}$ (lines 5-6). For each $x$ labeling at least one of the transitions leaving a state $p$ of the subset $p'$, a new transition with input label $x$ is constructed. The weight $w'$ associated to that transition is the sum of the weights of all transitions in $E[Q[p']]$ labeled with $x$ pre-$\otimes$-multiplied by the residual weight $v$ at each state $p$ (line 8). The destination state of the transition is the subset containing all the states $q$ reached by transitions in $E[Q[p']]$ labeled with $x$. The weight of each state $q$ of the subset is obtained by taking the $\oplus$-sum of the residual weights of the states $p$ $\otimes$-times the weight of the transition from $p$ leading to $q$ and by dividing that by $w'$. The new subset $q'$ is inserted in the queue $\mathcal{Q}$ when it is a new state (line 15). If any of the states in the subset $q'$ is final, $q'$ is made a final state and its final weight is obtained by summing the final weights of all the final states in $q'$, pre-$\otimes$-multiplied by their residual weight $v$ (line 14).

