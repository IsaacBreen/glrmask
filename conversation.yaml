      ## Structs

      ### `GrammarConstraint`

      The main struct that holds the precomputed data structures for enforcing grammar constraints on an LLM. It combines a tokenizer, a GLR parser, and several stages of precomputed tries that accelerate the process of determining valid next tokens.

      ```rust
      #[derive(Debug, Clone)]
      pub struct GrammarConstraint {
          pub tokenizer: Regex,
          pub parser: GLRParser,
          pub precomputed2: Precomputed2,
          pub precomputed3: Precomputed3,
          pub llm_vocab: Arc<LLMVocab>,
          pub possible_matches: BTreeMap<TokenizerStateID, BTreeMap<TerminalID, LLMTokenBV>>,
          pub state_map_by_llm: DedupValueMap<LLMTokenID, BTreeMap<TokenizerStateID, TokenizerStateID>>,
          pub terminal_map_by_llm: DedupValueMap<LLMTokenID, BTreeMap<TokenizerStateID, TerminalBV>>,
          pub trie2_god: Trie2GodWrapper,
          pub trie3_god: Trie3GodWrapper,
          pub post_commit_allow_check_mode: TerminalAllowanceCheckMode,
          pub precompute0_vocab: StageVocab,
          pub precompute_vocab1: StageVocab,
          pub precompute2_vocab: StageVocab,
          pub precompute3_vocab: StageVocab,
      }
      ```

      **Public Fields:**

      *   `tokenizer: Regex`: The tokenizer used to break byte sequences into grammar terminals.
      *   `parser: GLRParser`: The GLR parser that understands the grammar's structure.
      *   `precomputed2: Precomputed2`: The root nodes of the Trie2 structures, indexed by tokenizer state ID.
      *   `precomputed3: Precomputed3`: The root nodes of the Trie3 structures, indexed by tokenizer state ID.
      *   `llm_vocab: Arc<LLMVocab>`: A shared reference to the LLM's vocabulary.
      *   `possible_matches: BTreeMap<...>`: A map from a tokenizer state and a grammar terminal to the set of LLM tokens that can produce that terminal from that state.
      *   `state_map_by_llm: DedupValueMap<...>`: A deduplicated map from an LLM token to a map that describes how each tokenizer state transitions after consuming that token.
      *   `terminal_map_by_llm: DedupValueMap<...>`: A deduplicated map from an LLM token to a map that describes which grammar terminals are produced from each tokenizer state when that token is consumed.
      *   `trie2_god: Trie2GodWrapper`: The arena ("God object") that owns all nodes for all Trie2 structures.
      *   `trie3_god: Trie3GodWrapper`: The arena that owns all nodes for all Trie3 structures.
      *   `post_commit_allow_check_mode: TerminalAllowanceCheckMode`: The configured mode for post-commit validation.
      *   `precompute0_vocab`, `precompute_vocab1`, `precompute2_vocab`, `precompute3_vocab`: `StageVocab` instances that manage the mapping between original and internal LLM token IDs for each precomputation stage.

      **Associated Functions and Methods:**

      *   `pub fn from_compiled_grammar(...) -> Self`: Creates a `GrammarConstraint` from a `CompiledGrammar` with a default configuration.
      *   `pub fn from_compiled_grammar_with_config(...) -> Self`: Creates a `GrammarConstraint` from a `CompiledGrammar` with a specified `GrammarConstraintConfig`.
      *   `pub fn new(...) -> Self`: Creates a `GrammarConstraint` from its core components (tokenizer, parser, vocab) with a default configuration.
      *   `pub fn new_with_config(...) -> Self`: Creates a `GrammarConstraint` with a specified `GrammarConstraintConfig`.
      *   `pub fn new_with_config_and_precompute0_cache(...) -> Self`: Creates a `GrammarConstraint`, potentially reusing a cached Trie0 structure to speed up initialization.
      *   `pub fn export_precompute0_cache(&self) -> Precompute0Cache`: Exports the Trie0 and related vocabulary information into a cacheable object.
      *   `pub fn precompute0(...) -> (BTreeMap<...>, Trie0GodWrapper)`: Runs the first stage of precomputation, building a trie that maps byte sequences to grammar terminals.
      *   `pub fn precompute1(...) -> (BTreeMap<...>, Trie1GodWrapper)`: Runs the second stage, simplifying the Trie0 structure.
      *   `pub fn precompute2(...) -> (Precomputed2, Trie2GodWrapper)`: Runs the third stage, further optimizing the trie by encoding stack operations.
      *   `pub fn precompute3(...) -> (Precomputed3, Trie3GodWrapper)`: Runs the final stage of precomputation, creating a highly optimized trie for mask calculation.
