                  Ok(s) if !s.is_empty() && !s.contains('[') && !s.contains(']') && !s.contains('\"') => {
                      let s = format!("\"{}\"", s.escape_debug().to_string());
                      if !all_names.contains(&s) {
                          all_names.insert(s.clone());
                          s
