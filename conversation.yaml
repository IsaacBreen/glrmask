      // src/precompute4/weighted_automata/common.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset;
      use std::collections::BTreeMap;

      pub(crate) const STOCHASTIC_DEBUG: bool = true; // Set to false by default to avoid heavy stochastic validation on large automata

      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Hash, Debug, Default)]
      pub struct I16Map<T> {
          pub exceptions: BTreeMap<i16, T>,
          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String {
          let u = code as u16;
          if let Some(c) = char::from_u32(u as u32) {
              if c.is_ascii_graphic() || c == ' ' {
                  format!("'{}'", c)
              } else {
                  format!("{}", u)
              }
          } else {
              format!("{}", u)
          }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/ops.rs: |
      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use std::collections::VecDeque;

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let mut result_dwa = union_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let mut result_dwa = concat_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      impl NWA {
          /// Compute per-state future acceptance masks F[s]:
          /// F[s] = final[s] ∪ ⋃_{ε s->t}(wε ∧ F[t]) ∪ ⋃_{lbl s->t}(wlbl ∧ F[t]) ∪ (if def s->t) (wdef ∧ F[t])
          /// This is a standard monotone least fixpoint computed by reverse propagation.
          pub fn compute_future_weights(&self) -> Vec<Weight> {
              let n = self.states.len();
              let mut fut: Vec<Weight> = vec![Weight::zeros(); n];
              let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

              // Build reverse adjacency aggregating all edge types with their weights.
              for p in 0..n {
                  // Epsilon
                  for &(t, ref w) in &self.states[p].epsilons {
                      if t < n { rev[t].push((p, w.clone())); }
                  }
                  // Labeled
                  for (_, (t, w)) in &self.states[p].transitions {
                      if *t < n { rev[*t].push((p, w.clone())); }
                  }
                  // Default
                  if let Some((t, w)) = &self.states[p].default {
                      if *t < n { rev[*t].push((p, w.clone())); }
                  }
              }

              // Initialize with final weights
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              for s in 0..n {
                  if let Some(fw) = &self.states[s].final_weight {
                      if !fw.is_empty() {
                          fut[s] = fw.clone();
                          q.push_back(s);
                      }
                  }
              }

              // Reverse propagation: when fut[v] grows, update predecessors p using edge weight wpv.
              while let Some(v) = q.pop_front() {
                  let fv = fut[v].clone();
                  if fv.is_empty() { continue; }
                  for &(p, ref w_pv) in &rev[v] {
                      let add = &fv & w_pv;
                      if add.is_empty() { continue; }
                      let old = &fut[p];
                      if (&add & old) != add {
                          fut[p] |= &add;
                          q.push_back(p);
                      }
                  }
              }
              fut
          }

          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      if let Some(w) = &st.trans_weight_default {
                          nwa.states.0[i].default = Some((to, w.clone()));
                      }
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      if let Some(w) = st.trans_weights_exceptions.get(lbl) {
                          nwa.states.add_transition(i, *lbl, *to, w.clone());
                      }
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  dwa1.simplify();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  dwa2.simplify();
                  let mut result_dwa = union_nwa.determinize_to_dwa();
                  result_dwa.simplify();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, (v, _)) in states[u].transitions.iter() {
                      if *v < states.len() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                      }
                  }
                  if let Some((v, _)) = &states[u].default {
                      if *v < states.len() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }
          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              println!("Concatenating NWAs with eps_weight={:?}", eps_weight);
              println!("LEFT:\n{}\nRIGHT:\n{}\nSTATES BEFORE CONCAT:\n{}", left, right, states);
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  println!("RESULT:\n{}\nSTATES AFTER CONCAT:\n{}", concat_body, states_after_concat);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  dwa1.simplify();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  dwa2.simplify();
                  let mut result_dwa = concat_nwa.determinize_to_dwa();
                  result_dwa.simplify();


                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              Self::internal_concatenate_components(states, left, right, eps_weight)
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/full_dwa.rs: |
      use crate::constraint::{PrecomputeNode1Index, Trie1GodWrapper};
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::glr::parser::{ExpectElse, GLRParser};
      use crate::glr::table::{NonTerminalID, StateID as ParserStateID, TerminalID};
      use crate::precompute4::characterize::{compute_all_characterizations, BelowBottomCharacterization};
      use crate::precompute4::resolve_negatives::resolve_negative_codes_in_nwa;
      use crate::precompute4::utils;
      use crate::precompute4::weighted_automata::{DWA, DWABody, DWAState, DWAStates, NWA, NWAStates, NWABody, StateID, Weight};
      use crate::constraint::LLMTokenBV;
      use range_set_blaze::RangeSetBlaze;
      use std::cell::RefCell;
      use std::collections::{BTreeMap, BTreeSet};
      use std::time::Instant;

      pub type Precomputed4 = DWA;
      use crate::tokenizer::TokenizerStateID;

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum FullDWABuildError {
          ParserStateIdOutOfRange { state_id: ParserStateID },
      }

      fn build_template_dwa_from_characterization(
          bb: &BelowBottomCharacterization,
      ) -> Result<DWA, FullDWABuildError> {
          let mut dwa = DWA::new();
          let w_all = Weight::all();

          // Create a node for each non-terminal, similar to the NWA construction.
          let mut nt_nodes: BTreeMap<NonTerminalID, StateID> = BTreeMap::new();
          for &nt in &bb.all_nts {
              let id = dwa.add_state();
              nt_nodes.insert(nt, id);
          }

          let start = dwa.body.start_state;

          // --- Initial Actions from Start State ---

          for &(initial_state, shift_state) in &bb.initial_shifts {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let neg_initial = utils::encode_negative_i16(initial_state)?;
              let neg_shift = utils::encode_negative_i16(shift_state)?;

              // start --(+initial)--> s1 --(-initial)--> s2 --(-shift)--> s3 (final)
              let s1_candidate = dwa.add_state();
              let s1 = dwa.add_transition_if_missing(start, pos_initial, s1_candidate, w_all.clone()).unwrap();

              let s2_candidate = dwa.add_state();
              let s2 = dwa.add_transition_if_missing(s1, neg_initial, s2_candidate, w_all.clone()).unwrap();

              let s3_candidate = dwa.add_state();
              let s3 =
                  dwa.add_transition_if_missing(s2, neg_shift, s3_candidate, w_all.clone()).unwrap();

              dwa.set_final_weight(s3, w_all.clone()).unwrap();
          }

          for &(initial_state, len, nt) in &bb.initial_reduces {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let target_nt_state = *nt_nodes.get(&nt).expect("nt_node must exist for initial_reduce");

              // Create a chain of default transitions for the pops.
              // start --(+initial)--> s1 --(default)*len--> target_nt_state
              let next_state_candidate = if len == 0 { target_nt_state } else { dwa.add_state() };
              let mut from =
                  dwa.add_transition_if_missing(start, pos_initial, next_state_candidate, w_all.clone())
                      .unwrap();

              if from == next_state_candidate && len > 0 {
                  for i in 0..len {
                      let to = if i == len - 1 { target_nt_state } else { dwa.add_state() };
                      dwa.set_default_transition(from, to, w_all.clone()).unwrap();
                      from = to;
                  }
              }
          }

          // --- Actions from Non-Terminal States ---

          for (nt, rc) in &bb.reduce_characterizations {
              let src_nt_state = *nt_nodes.get(nt).expect("nt_node must exist for reduce_char");

              for &(revealed_state, len, reduce_nt) in &rc.reveal_and_rereduces {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let dst_nt_state = *nt_nodes.get(&reduce_nt).expect("dst nt_node must exist");

                  // src --(+revealed)--> s1 --(default)*len--> dst
                  let next_state_candidate = if len == 0 { dst_nt_state } else { dwa.add_state() };
                  let mut from = dwa
                      .add_transition_if_missing(src_nt_state, pos_revealed, next_state_candidate, w_all.clone())
                      .unwrap();

                  if from == next_state_candidate && len > 0 {
                      for i in 0..len {
                          let to = if i == len - 1 { dst_nt_state } else { dwa.add_state() };
                          dwa.set_default_transition(from, to, w_all.clone()).unwrap();
                          from = to;
                      }
                  }
              }

              for &(revealed_state, goto_state, shift_state) in &rc.reveal_goto_shift_escapes {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let neg_revealed = utils::encode_negative_i16(revealed_state)?;
                  let neg_goto = utils::encode_negative_i16(goto_state)?;
                  let neg_shift = utils::encode_negative_i16(shift_state)?;

                  // src --(+revealed)--> s1 --(-revealed)--> s2 --(-goto)--> s3 --(-shift)--> s4 (final)
                  let s1_candidate = dwa.add_state();
                  let s1 = dwa
                      .add_transition_if_missing(src_nt_state, pos_revealed, s1_candidate, w_all.clone())
                      .unwrap();

                  let s2_candidate = dwa.add_state();
                  let s2 =
                      dwa.add_transition_if_missing(s1, neg_revealed, s2_candidate, w_all.clone()).unwrap();

                  let s3_candidate = dwa.add_state();
                  let s3 = dwa.add_transition_if_missing(s2, neg_goto, s3_candidate, w_all.clone()).unwrap();

                  let s4_candidate = dwa.add_state();
                  let s4 =
                      dwa.add_transition_if_missing(s3, neg_shift, s4_candidate, w_all.clone()).unwrap();
                  dwa.set_final_weight(s4, w_all.clone()).unwrap();
              }
          }

          dwa.simplify();

          Ok(dwa)
      }

      fn build_template_dwas(
          parser: &GLRParser,
      ) -> Result<BTreeMap<TerminalID, DWA>, FullDWABuildError> {
          let all = compute_all_characterizations(parser);
          let mut out = BTreeMap::new();
          for (term, bb) in all {
              let dwa = build_template_dwa_from_characterization(&bb)?;
              crate::debug!(5, "Built template DWA for terminal {:?}:", term);
              crate::debug!(5, "{}", dwa);
              out.insert(term, dwa);
          }
          Ok(out)
      }

      fn build_ignore_terminal_dwa() -> DWA {
          // Identity DWA: start is final, no transitions.
          let mut dwa = DWA::new();
          dwa.set_final_weight(dwa.body.start_state, Weight::all()).unwrap();
          dwa
      }

      // Helper: collect final states of a DWA
      fn collect_final_states(dwa: &DWA) -> BTreeSet<usize> {
          let mut finals = BTreeSet::new();
          for (i, st) in dwa.states.0.iter().enumerate() {
              if st.final_weight.is_some() {
                  finals.insert(i);
              }
          }
          finals
      }

      // Helper: join_map for concatenation: map each left final to the right's start.
      fn join_map_final_to_start(left: &DWA, right: &DWA) -> BTreeMap<usize, BTreeSet<usize>> {
          let left_final_states = collect_final_states(left);
          let right_start = right.body.start_state;
          let mut join_map: BTreeMap<usize, BTreeSet<usize>> = BTreeMap::new();
          for lf in left_final_states {
              join_map.insert(lf, BTreeSet::from([right_start]));
          }
          join_map
      }

      // Public API: precompute4 using NWA-first approach, determinize at the end.
      pub fn precompute4(parser: &GLRParser, precomputed1: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>, trie1_god: &Trie1GodWrapper) -> DWA {
          let now_total = Instant::now();
          let now = Instant::now();
          crate::debug!(5, "Starting precompute4...");
          // 1. Build template DWAs for all terminals.
          let template_dwas = match build_template_dwas(parser) {
              Ok(m) => m,
              Err(e) => panic!("Failed to build template DWAs: {:?}", e),
          };
          let ignore_dwa = build_ignore_terminal_dwa();
          crate::debug!(4, "Built {} template DWAs in {:?}", template_dwas.len(), now.elapsed());

          // 2. Set up shared NWA state arena.
          let states_arena = RefCell::new(NWAStates::default());

          // 3. Reverse the precompute1 trie.
          let trie1_roots: Vec<_> = precomputed1.values().cloned().collect();

          let all_nodes = Trie::all_nodes(trie1_god, &trie1_roots);

          let leaf_node = all_nodes.iter().find_map(|&idx| {
              idx.read(trie1_god).and_then(|g| if g.value.end { Some(idx) } else { None })
          }).expect("Precompute1 trie must have a single leaf node.");

          let reversed_trie1_god = Trie::reverse(trie1_god, &trie1_roots);
          let reversed_trie_root = leaf_node;

          // 4. Traverse the reversed trie with NWA bodies.
          let initial_nwa_body = {
              let mut states = states_arena.borrow_mut();
              let start = states.add_state();
              states[start].final_weight = Some(Weight::all());
              NWABody { start_state: start }
          };
          let initial_tokens = LLMTokenBV::max_ones();
          let initial_values: Vec<(Trie2Index, (NWABody, LLMTokenBV))> = vec![(reversed_trie_root, (initial_nwa_body, initial_tokens))];
          let traversal_data = Trie::compute_traversal_data(&reversed_trie1_god, &[reversed_trie_root]).expect("Failed to compute traversal data for reversed trie1");
          let mut original_trie1_roots_map: BTreeMap<PrecomputeNode1Index, Vec<TokenizerStateID>> = BTreeMap::new();
          for (k, v) in precomputed1.iter() {
              original_trie1_roots_map.entry(v.clone()).or_default().push(*k);
          }

          let options = crate::datastructures::trie::PrettyPrintOptions::default()
              .omit_nodes()
              .omit_depth()
              ;
          crate::debug!(5, "Trie:\n{}", Trie::pretty_print_with_options(&trie1_god, &trie1_roots, &options));
          crate::debug!(5, "Reversed trie:\n{}", Trie::pretty_print_with_options(&reversed_trie1_god, &[reversed_trie_root], &options));

          let mut final_bodies: BTreeMap<TokenizerStateID, NWABody> = BTreeMap::new();

          let now = Instant::now();
          Trie::special_map_grouped(
              &reversed_trie1_god,
              &traversal_data,
              initial_values,
              // step function
              |current_val: &(NWABody, LLMTokenBV), edge_terminal_opt, dest_map| {
                  let (current_nwa_body, current_tokens) = current_val;
                  let template_dwa: &DWA = if edge_terminal_opt.is_some() && *edge_terminal_opt != parser.ignore_terminal_id {
                      let terminal_id = edge_terminal_opt.unwrap();
                      template_dwas.get(&terminal_id).expect_else(|| format!("No template DWA for terminal {:?}", terminal_id))
                  } else {
                      &ignore_dwa
                  };

                  let mut results: Vec<(PrecomputeNode1Index, (NWABody, LLMTokenBV))> = Vec::new();
                  for (dest_idx, llm_token_bv) in dest_map.iter() {
                      let next_tokens = current_tokens & llm_token_bv;
                      if next_tokens.is_empty() {
                          continue;
                      }

                      let mut states = states_arena.borrow_mut();

                      // Convert template DWA to NWA and copy it into the arena
                      let template_nwa = NWA::from_dwa(template_dwa);
                      crate::debug!(5, "Applying template NWA for terminal {:?} with epsilon gate weight {:?}...", edge_terminal_opt, llm_token_bv);
                      let (template_start_in_arena, _) = states.copy_subgraph_from(&template_nwa.states, template_nwa.body.start_state);
                      crate::debug!(5, "Template NWA copied into arena. Current arena size: {} states.", states.0.len());
                      let left_body = NWABody { start_state: template_start_in_arena };

                      // Concatenate: left then current (right) via epsilon with weight = llm_token_bv
                      crate::debug!(5, "Starting NWA::concatenate_components: left_start={} right_start={}...", left_body.start_state, current_nwa_body.start_state);
                      let eps_weight = Weight::from_rsb(llm_token_bv.inner.as_ref().clone());
                      let composed_body = NWA::concatenate_components(&mut states, &left_body, current_nwa_body, &eps_weight);
                      crate::debug!(5, "NWA::concatenate_components finished. New start state: {}.", composed_body.start_state);

                      results.push((*dest_idx, (composed_body, next_tokens)));
                  }
                  results
              },
              // merge function: union them via epsilon
              |val1, val2| {
                  let (body1, tokens1) = val1;
                  let (body2, tokens2) = val2;
                  let mut states = states_arena.borrow_mut();
                  crate::debug!(5, "Starting NWA::union_components: body1_start={} body2_start={}...", body1.start_state, body2.start_state);
                  *body1 = NWA::union_components(&mut states, body1, &body2);
                  *tokens1 |= &tokens2;
                  crate::debug!(5, "NWA::union_components finished. New start state: {}.", body1.start_state);
              },
              // process function: capture at original roots
              |_node_data, node_idx, val| {
                  let (nwa_body, tokens) = val;
                  if !tokens.is_empty() {
                      if let Some(tokenizer_state_ids) = original_trie1_roots_map.get(&node_idx) {
                          for tokenizer_state_id in tokenizer_state_ids {
                              final_bodies.insert(*tokenizer_state_id, nwa_body.clone());
                          }
                      }
                      Some((nwa_body, tokens)) // continue traversal
                  } else {
                      None
                  }
              },
          );
          crate::debug!(4, "Reversed trie traversal (special_map_grouped) took: {:?}", now.elapsed());

          // Combine all final NWA bodies into a single NWA
          let mut combined_nwa_states = states_arena.into_inner();
          let combined_start_state = combined_nwa_states.add_state();

          for (tok_id, body) in final_bodies {
              // Add a transition from the new combined start state to the start of the NWA for this tokenizer state.
              // The label is the tokenizer state ID.
              let label = tok_id.0 as i16;
              combined_nwa_states.add_transition(combined_start_state, label, body.start_state, Weight::all());
          }

          let mut combined_nwa = NWA {
              states: combined_nwa_states,
              body: NWABody { start_state: combined_start_state },
          };
          crate::debug!(5, "Resolving negative codes in combined NWA: {}", combined_nwa);
          crate::debug!(4, "Combined NWA has {} states.", combined_nwa.states.len());

          let now = Instant::now();
          crate::debug!(5, "Starting resolve_negative_codes_in_nwa...");
          resolve_negative_codes_in_nwa(&mut combined_nwa);
          crate::debug!(4, "resolve_negative_codes_in_nwa took: {:?}. NWA now has {} states.", now.elapsed(), combined_nwa.states.len());

          let now = Instant::now();
          // Determinize the single combined NWA
          crate::debug!(5, "Determinizing final combined NWA...");
          let mut final_dwa = combined_nwa.determinize_to_dwa();
          final_dwa.simplify();
          crate::debug!(4, "Final determinize & simplify took: {:?}. Final DWA has {} states.", now.elapsed(), final_dwa.states.len());

          crate::debug!(3, "Total precompute4 time: {:?}", now_total.elapsed());
          final_dwa
      }
