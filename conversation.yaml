                  if r is None:
                      continue
                  r = int(r)
                  if r in values:
                      values[r] = (values[r][0].merge(gss), all_ones)
                  else:
                      values[r] = (gss, all_ones)
                  d: int = max_depth[r]
                  b: Optional[Set[int]] = todo.get(d)
                  if b is None:
