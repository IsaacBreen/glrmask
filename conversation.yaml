      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWAStates, NWA};
      use std::collections::VecDeque;

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights,
          /// optional state-entry weights, and the final state's weight.
          /// Returns `zeros` if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some((t, w)) = st.get_transition(ch) {
                      acc &= w;
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() {
                              return Weight::zeros();
                          }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() {
                          Weight::zeros()
                      } else {
                          res
                      }
                  }
                  None => Weight::zeros(),
              }
          }

          /// Union of two DWAs via NWA union + determinization.
          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) =
                  combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) =
                  combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA {
                  states: combined_states,
                  body: union_body,
              };
              let result_dwa = union_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(self, other, &result_dwa);
              }

              result_dwa
          }

          /// Concatenation of two DWAs via NWA concatenation + determinization.
          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) =
                  combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) =
                  combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition.
              let concat_body =
                  NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA {
                  states: combined_states,
                  body: concat_body,
              };
              let result_dwa = concat_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          /// Apply a gating weight by adding a new start state with intersected weights.
          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }

          /// Apply a gating weight in-place to the existing start state.
          pub fn apply_weight_inplace(&mut self, weight: &Weight) {
              let start_state = self.states.0.get_mut(self.body.start_state).unwrap();
              if let Some(sw) = &start_state.state_weight {
                  start_state.state_weight = Some(sw & weight);
              } else {
                  start_state.state_weight = Some(weight.clone());
              }
              if let Some(sw) = &start_state.final_weight {
                  start_state.final_weight = Some(sw & weight);
              }
              for (_, tw) in start_state.trans_weights.iter_mut() {
                  *tw &= weight;
              }
          }
      }

      impl NWA {
          /// Convert a DWA to an NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - Final weights preserved.
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() {
                  nwa.states.add_state();
              }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  for (lbl, to) in &st.transitions {
                      let w = st
                          .trans_weights
                          .get(lbl)
                          .cloned()
                          .unwrap_or_else(Weight::all);
                      nwa.states.add_transition(i, *lbl, *to, w).unwrap();
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(
              states: &mut NWAStates,
              body1: &NWABody,
              body2: &NWABody,
          ) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody {
                  start_state: new_start,
              }
          }

          pub fn union_components(
              states: &mut NWAStates,
              body1: &NWABody,
              body2: &NWABody,
          ) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA {
                      states: states.clone(),
                      body: body1.clone(),
                  };
                  let nwa2 = NWA {
                      states: states.clone(),
                      body: body2.clone(),
                  };

                  let mut states_after_union = states.clone();
                  let union_body =
                      Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA {
                      states: states_after_union,
                      body: union_body,
                  };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = union_nwa.determinize_to_dwa();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(
              states: &mut NWAStates,
              left: &NWABody,
              right: &NWABody,
              eps_weight: &Weight,
          ) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, targets) in states[u].transitions.iter() {
                      for (v, _) in targets {
                          if *v < states.len() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                          }
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] {
                      continue;
                  }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody {
                  start_state: left.start_state,
              }
          }

          /// Concatenate `left` then `right`:
          /// - For each final state `s` reachable from `left.start` that has final_weight `F`,
          ///   add an epsilon `s --eps-> right.start` with weight `F & eps_weight`.
          /// - Set `s.final_weight = None` (standard concatenation semantics).
          /// Return body with start = `left.start`.
          pub fn concatenate_components(
              states: &mut NWAStates,
              left: &NWABody,
              right: &NWABody,
              eps_weight: &Weight,
          ) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA {
                      states: states.clone(),
                      body: left.clone(),
                  };
                  let nwa2 = NWA {
                      states: states.clone(),
                      body: right.clone(),
                  };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(
                      &mut states_after_concat,
                      left,
                      right,
                      eps_weight,
                  );
                  let concat_nwa = NWA {
                      states: states_after_concat,
                      body: concat_body,
                  };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = concat_nwa.determinize_to_dwa();

                  DWA::stochastic_validate_concatenate(
                      &dwa1,
                      &dwa2,
                      &result_dwa,
                      eps_weight,
                  );
              }
              let new_left = states.copy_subgraph_in_place_and_return_body(*left);
              Self::internal_concatenate_components(states, &new_left, right, eps_weight)
          }

          /// Determinize subgraph reachable from `body.start_state` into a `DWA`.
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA {
                  states: states.clone(),
                  body: body.clone(),
              };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/weighted_automata/simplification.rs: |
      #![allow(dead_code)]

      use super::common::{StateID, Weight, NWAStateID};
      use super::dwa::{DWAState, DWAStates, DWA};
      use super::nwa::{NWAState, NWAStates, NWA};
      use std::cmp::Ordering;
      use std::collections::{hash_map::DefaultHasher, BTreeMap, BTreeSet, HashMap, VecDeque};
      use std::hash::{Hash, Hasher};

      /// Partition of states into equivalence classes.
      #[derive(Clone, Debug)]
      struct Partition {
          /// Class id of each state (by index).
          classes: Vec<usize>,
          /// Number of distinct classes.
          num_classes: usize,
      }

      impl Partition {
          fn new(num_states: usize) -> Self {
              Self {
                  classes: vec![0; num_states],
                  num_classes: if num_states == 0 { 0 } else { 1 },
              }
          }

          fn num_classes(&self) -> usize {
              self.num_classes
          }
      }

      /// Helper: hash any Hash + Eq type into a u64.
      fn hash_value<T: Hash>(value: &T) -> u64 {
          let mut h = DefaultHasher::new();
          value.hash(&mut h);
          h.finish()
      }

      // ============================================================================
      // DWA MINIMIZATION
      // ============================================================================

      #[derive(Clone, Debug, PartialEq, Eq, Hash)]
      struct DwaTransitionSig {
          label: i16,
          dest_class: usize,
          weight: Weight,
      }

      #[derive(Clone, Debug, PartialEq, Eq, Hash)]
      struct DwaStateSignature {
          state_weight: Option<Weight>,
          final_weight: Option<Weight>,
          outgoing: Vec<DwaTransitionSig>,
      }

      impl DwaStateSignature {
          fn from_state(state_id: StateID, states: &DWAStates, classes: &[usize]) -> Self {
              let st = &states[state_id];

              // Use a BTreeMap to get a deterministic ordering by label.
              let mut temp: BTreeMap<i16, (usize, Weight)> = BTreeMap::new();
              for (&label, &dest) in &st.transitions {
                  let w = st
                      .trans_weights
                      .get(&label)
                      .cloned()
                      .unwrap_or_else(Weight::all);
                  let dest_class = classes[dest];
                  // Determinism: at most one dest per label; if multiple appear,
                  // we union weights and assert same dest_class.
                  match temp.get_mut(&label) {
                      None => {
                          temp.insert(label, (dest_class, w));
                      }
                      Some((existing_dest_class, existing_w)) => {
                          debug_assert_eq!(
                              *existing_dest_class, dest_class,
                              "DWA determinism violated: multiple destinations for label {}",
                              label
                          );
                          *existing_w |= &w;
                      }
                  }
              }

              let mut outgoing = Vec::with_capacity(temp.len());
              for (label, (dest_class, weight)) in temp {
                  outgoing.push(DwaTransitionSig {
                      label,
                      dest_class,
                      weight,
                  });
              }

              DwaStateSignature {
                  state_weight: st.state_weight.clone(),
                  final_weight: st.final_weight.clone(),
                  outgoing,
              }
          }
      }

      /// Compute a forward-bisimulation style partition for a DWA.
      fn minimize_dwa_partition(states: &DWAStates) -> Partition {
          let n = states.len();
          if n == 0 {
              return Partition {
                  classes: vec![],
                  num_classes: 0,
              };
          }

          let mut partition = Partition::new(n);

          loop {
              let mut sig_to_class: HashMap<DwaStateSignature, usize> = HashMap::new();
              let mut new_classes = vec![0; n];
              let mut next_class = 0;

              for s in 0..n {
                  let sig = DwaStateSignature::from_state(s, states, &partition.classes);
                  let entry = sig_to_class.entry(sig).or_insert_with(|| {
                      let id = next_class;
                      next_class += 1;
                      id
                  });
                  new_classes[s] = *entry;
              }

              if new_classes == partition.classes {
                  partition.num_classes = next_class;
                  return partition;
              }

              partition.classes = new_classes;
              partition.num_classes = next_class;
          }
      }

      #[derive(Clone, Debug, Default)]
      struct DwaStateBuilder {
          state_weight: Option<Weight>,
          final_weight: Option<Weight>,
          // label -> (dest_new, weight)
          trans: BTreeMap<i16, (StateID, Weight)>,
      }

      impl DWA {
          /// Simplify the DWA in-place by:
          /// 1. Pruning unreachable and dead-end states.
          /// 2. Computing a forward-bisimulation partition over weighted states.
          /// 3. Building the quotient automaton by merging equivalent states.
          /// 4. Pruning again.
          pub fn simplify(&mut self) {
              let _ = self.simplify_internal();
          }

          fn simplify_internal(&mut self) -> bool {
              let mut changed = self.prune_unreachable();
              changed |= self.prune_dead_ends();

              let n = self.states.len();
              if n <= 1 {
                  return changed;
              }

              let partition = minimize_dwa_partition(&self.states);
              if partition.num_classes() >= n {
                  // No merges.
                  return changed;
              }

              self.rebuild_from_partition(partition);
              changed = true;

              // Final cleanup.
              changed |= self.prune_unreachable();
              changed |= self.prune_dead_ends();
              changed
          }

          fn rebuild_from_partition(&mut self, partition: Partition) {
              let n = self.states.len();
              if n == 0 {
                  return;
              }

              // Map each class to a new state id (0..num_classes-1).
              let mut class_to_new: HashMap<usize, StateID> = HashMap::new();
              let mut builders: Vec<DwaStateBuilder> = Vec::new();

              for s in 0..n {
                  let c = partition.classes[s];
                  class_to_new.entry(c).or_insert_with(|| {
                      let id = builders.len();
                      builders.push(DwaStateBuilder::default());
                      id
                  });
              }

              // Aggregate information from all states in each class.
              for old_s in 0..n {
                  let c = partition.classes[old_s];
                  let new_id = class_to_new[&c];
                  let builder = &mut builders[new_id];
                  let st = &self.states[old_s];

                  if let Some(ref sw) = st.state_weight {
                      if !sw.is_empty() {
                          match &mut builder.state_weight {
                              Some(existing) => *existing |= sw,
                              None => builder.state_weight = Some(sw.clone()),
                          }
                      }
                  }

                  if let Some(ref fw) = st.final_weight {
                      if !fw.is_empty() {
                          match &mut builder.final_weight {
                              Some(existing) => *existing |= fw,
                              None => builder.final_weight = Some(fw.clone()),
                          }
                      }
                  }

                  for (&label, &dest) in &st.transitions {
                      let w = st
                          .trans_weights
                          .get(&label)
                          .cloned()
                          .unwrap_or_else(Weight::all);
                      if w.is_empty() {
                          continue;
                      }
                      let dest_class = partition.classes[dest];
                      let dest_new = class_to_new[&dest_class];

                      use std::collections::btree_map::Entry;
                      match builder.trans.entry(label) {
                          Entry::Vacant(e) => {
                              e.insert((dest_new, w));
                          }
                          Entry::Occupied(mut e) => {
                              let (existing_dest, existing_w) = e.get_mut();
                              debug_assert_eq!(
                                  *existing_dest, dest_new,
                                  "DWA determinism violated while rebuilding: multiple destinations for label {}",
                                  label
                              );
                              *existing_w |= &w;
                          }
                      }
                  }
              }

              // Construct new states vector.
              let mut new_states = DWAStates::default();
              for _ in 0..builders.len() {
                  new_states.add_state();
              }

              for (new_id, builder) in builders.into_iter().enumerate() {
                  let st = &mut new_states[new_id];
                  st.state_weight = builder.state_weight;
                  st.final_weight = builder.final_weight;
                  st.transitions.clear();
                  st.trans_weights.clear();
                  for (label, (dest_new, weight)) in builder.trans {
                      st.transitions.insert(label, dest_new);
                      st.trans_weights.insert(label, weight);
                  }
              }

              let start_class = partition.classes[self.body.start_state];
              let new_start = class_to_new[&start_class];

              self.states = new_states;
              self.body.start_state = new_start;
          }

          /// Remove states that are not reachable from the start state.
          fn prune_unreachable(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }

              if self.body.start_state >= n {
                  // Invalid start; reset to a singleton empty DWA.
                  let changed = n > 0;
                  if changed {
                      self.states = DWAStates::default();
                      let start = self.states.add_state();
                      self.body.start_state = start;
                  }
                  return changed;
              }

              let mut visited = vec![false; n];
              let mut q: VecDeque<StateID> = VecDeque::new();
              visited[self.body.start_state] = true;
              q.push_back(self.body.start_state);

              while let Some(u) = q.pop_front() {
                  let st = &self.states[u];
                  for &v in st.transitions.values() {
                      if v < n && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
              }

              if visited.iter().all(|&b| b) {
                  return false;
              }

              let mut map = vec![usize::MAX; n];
              let mut new_states = DWAStates::default();

              for i in 0..n {
                  if visited[i] {
                      let new_id = new_states.add_state();
                      map[i] = new_id;
                      new_states[new_id] = self.states[i].clone();
                  }
              }

              for st in &mut new_states.0 {
                  let mut new_transitions: BTreeMap<i16, StateID> = BTreeMap::new();
                  let mut new_trans_weights: BTreeMap<i16, Weight> = BTreeMap::new();
                  for (&label, &old_dest) in &st.transitions {
                      let new_dest = map[old_dest];
                      new_transitions.insert(label, new_dest);
                      if let Some(w) = st.trans_weights.get(&label) {
                          new_trans_weights.insert(label, w.clone());
                      }
                  }
                  st.transitions = new_transitions;
                  st.trans_weights = new_trans_weights;
              }

              self.body.start_state = map[self.body.start_state];
              self.states = new_states;
              true
          }

          /// Remove states that cannot reach any state with a non-empty final weight.
          fn prune_dead_ends(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }

              let mut live = vec![false; n];
              let mut q: VecDeque<StateID> = VecDeque::new();
              let mut rev: Vec<Vec<StateID>> = vec![vec![]; n];

              for u in 0..n {
                  let st = &self.states[u];
                  for (&label, &v) in &st.transitions {
                      if v >= n {
                          continue;
                      }
                      let w = st
                          .trans_weights
                          .get(&label)
                          .cloned()
                          .unwrap_or_else(Weight::all);
                      if !w.is_empty() {
                          rev[v].push(u);
                      }
                  }
              }

              // Any state with non-empty final weight is live.
              for s in 0..n {
                  if self.states[s]
                      .final_weight
                      .as_ref()
                      .map_or(false, |w| !w.is_empty())
                  {
                      live[s] = true;
                      q.push_back(s);
                  }
              }

              while let Some(v) = q.pop_front() {
                  for &u in &rev[v] {
                      if !live[u] {
                          live[u] = true;
                          q.push_back(u);
                      }
                  }
              }

              // If start state is not live, the language is empty.
              if self.body.start_state >= n || !live[self.body.start_state] {
                  let changed = n > 0;
                  if changed {
                      self.states = DWAStates::default();
                      let start = self.states.add_state();
                      self.body.start_state = start;
                  }
                  return changed;
              }

              if live.iter().all(|&b| b) {
                  return false;
              }

              let mut map = vec![usize::MAX; n];
              let mut new_states = DWAStates::default();

              for i in 0..n {
                  if live[i] {
                      let new_id = new_states.add_state();
                      map[i] = new_id;
                      new_states[new_id] = self.states[i].clone();
                  }
              }

              for st in &mut new_states.0 {
                  let mut new_transitions: BTreeMap<i16, StateID> = BTreeMap::new();
                  let mut new_trans_weights: BTreeMap<i16, Weight> = BTreeMap::new();
                  for (&label, &old_dest) in &st.transitions {
                      if live[old_dest] {
                          let new_dest = map[old_dest];
                          new_transitions.insert(label, new_dest);
                          if let Some(w) = st.trans_weights.get(&label) {
                              new_trans_weights.insert(label, w.clone());
                          }
                      }
                  }
                  st.transitions = new_transitions;
                  st.trans_weights = new_trans_weights;
              }

              self.body.start_state = map[self.body.start_state];
              self.states = new_states;
              true
          }
      }

      // ============================================================================
      // NWA MINIMIZATION
      // ============================================================================

      #[derive(Clone, Copy, Debug, PartialEq, Eq, Hash)]
      enum ArcLabel {
          Eps,
          Label(i16),
      }

      #[derive(Clone, Debug, PartialEq, Eq, Hash)]
      struct NwaTransitionSig {
          label: ArcLabel,
          weight: Weight,
          // Sorted list of destination classes.
          dest_classes: Vec<usize>,
      }

      impl NwaTransitionSig {
          fn sort_key(&self) -> (u8, i16, u64, u64) {
              let label_tag = match self.label {
                  ArcLabel::Eps => 0,
                  ArcLabel::Label(_) => 1,
              };
              let label_val = match self.label {
                  ArcLabel::Eps => 0,
                  ArcLabel::Label(v) => v,
              };
              let w_hash = hash_value(&self.weight);
              let dest_hash = hash_value(&self.dest_classes);
              (label_tag, label_val, w_hash, dest_hash)
          }
      }

      #[derive(Clone, Debug, PartialEq, Eq, Hash)]
      struct NwaStateSignature {
          final_weight: Option<Weight>,
          outgoing: Vec<NwaTransitionSig>,
      }

      impl NwaStateSignature {
          fn from_state(state_id: NWAStateID, states: &NWAStates, classes: &[usize]) -> Self {
              let st = &states[state_id];

              // Map (ArcLabel, weight) -> set of destination classes.
              let mut temp: HashMap<(ArcLabel, Weight), BTreeSet<usize>> = HashMap::new();

              // Epsilon transitions.
              for &(dest, ref w) in &st.epsilons {
                  if w.is_empty() {
                      continue;
                  }
                  let key = (ArcLabel::Eps, w.clone());
                  temp.entry(key)
                      .or_insert_with(BTreeSet::new)
                      .insert(classes[dest]);
              }

              // Labeled transitions.
              for (&lbl, targets) in &st.transitions {
                  let label = ArcLabel::Label(lbl);
                  for &(dest, ref w) in targets {
                      if w.is_empty() {
                          continue;
                      }
                      let key = (label, w.clone());
                      temp.entry(key)
                          .or_insert_with(BTreeSet::new)
                          .insert(classes[dest]);
                  }
              }

              let mut outgoing = Vec::with_capacity(temp.len());
              for ((label, weight), dest_set) in temp {
                  let dest_classes: Vec<usize> = dest_set.into_iter().collect();
                  outgoing.push(NwaTransitionSig {
                      label,
                      weight,
                      dest_classes,
                  });
              }

              outgoing.sort_by_key(|t| t.sort_key());

              NwaStateSignature {
                  final_weight: st.final_weight.clone(),
                  outgoing,
              }
          }
      }

      /// Compute a forward-bisimulation style partition for an NWA.
      fn minimize_nwa_partition(states: &NWAStates) -> Partition {
          let n = states.len();
          if n == 0 {
              return Partition {
                  classes: vec![],
                  num_classes: 0,
              };
          }

          let mut partition = Partition::new(n);

          loop {
              let mut sig_to_class: HashMap<NwaStateSignature, usize> = HashMap::new();
              let mut new_classes = vec![0; n];
              let mut next_class = 0;

              for s in 0..n {
                  let sig = NwaStateSignature::from_state(s, states, &partition.classes);
                  let entry = sig_to_class.entry(sig).or_insert_with(|| {
                      let id = next_class;
                      next_class += 1;
                      id
                  });
                  new_classes[s] = *entry;
              }

              if new_classes == partition.classes {
                  partition.num_classes = next_class;
                  return partition;
              }

              partition.classes = new_classes;
              partition.num_classes = next_class;
          }
      }

      #[derive(Clone, Debug, Default)]
      struct NwaStateBuilder {
          final_weight: Option<Weight>,
          // eps: dest_new -> weight
          eps: BTreeMap<NWAStateID, Weight>,
          // trans: label -> (dest_new -> weight)
          trans: BTreeMap<i16, BTreeMap<NWAStateID, Weight>>,
      }

      impl NWA {
          /// Simplify the NWA in-place:
          /// 1. Prune unreachable and dead-end states.
          /// 2. Compute a weighted forward-bisimulation partition.
          /// 3. Build the quotient NWA by merging equivalent states.
          /// 4. Prune again.
          ///
          /// Returns `true` if the automaton changed structurally.
          pub fn simplify(&mut self) -> bool {
              let mut changed = self.prune_unreachable();
              changed |= self.prune_dead_ends();

              let n = self.states.len();
              if n <= 1 {
                  return changed;
              }

              let partition = minimize_nwa_partition(&self.states);
              if partition.num_classes() >= n {
                  // No merges.
                  return changed;
              }

              self.rebuild_from_partition(partition);
              changed = true;

              // Final cleanup.
              changed |= self.prune_unreachable();
              changed |= self.prune_dead_ends();
              changed
          }

          fn rebuild_from_partition(&mut self, partition: Partition) {
              let n = self.states.len();
              if n == 0 {
                  return;
              }

              // Map each class to a new state id.
              let mut class_to_new: HashMap<usize, NWAStateID> = HashMap::new();
              let mut builders: Vec<NwaStateBuilder> = Vec::new();

              for s in 0..n {
                  let c = partition.classes[s];
                  class_to_new.entry(c).or_insert_with(|| {
                      let id = builders.len();
                      builders.push(NwaStateBuilder::default());
                      id
                  });
              }

              // Aggregate information from states in the same class.
              for old_s in 0..n {
                  let c = partition.classes[old_s];
                  let new_id = class_to_new[&c];
                  let builder = &mut builders[new_id];
                  let st = &self.states[old_s];

                  if let Some(ref fw) = st.final_weight {
                      if !fw.is_empty() {
                          match &mut builder.final_weight {
                              Some(existing) => *existing |= fw,
                              None => builder.final_weight = Some(fw.clone()),
                          }
                      }
                  }

                  for &(dest, ref w) in &st.epsilons {
                      if w.is_empty() {
                          continue;
                      }
                      let dest_class = partition.classes[dest];
                      let new_dest = class_to_new[&dest_class];
                      let entry = builder.eps.entry(new_dest).or_insert_with(Weight::zeros);
                      *entry |= w;
                  }

                  for (&lbl, targets) in &st.transitions {
                      for &(dest, ref w) in targets {
                          if w.is_empty() {
                              continue;
                          }
                          let dest_class = partition.classes[dest];
                          let new_dest = class_to_new[&dest_class];
                          let per_label = builder.trans.entry(lbl).or_insert_with(BTreeMap::new);
                          let entry = per_label.entry(new_dest).or_insert_with(Weight::zeros);
                          *entry |= w;
                      }
                  }
              }

              // Build the new NWAStates.
              let mut new_states = NWAStates::default();
              for _ in 0..builders.len() {
                  new_states.add_state();
              }

              for (new_id, builder) in builders.into_iter().enumerate() {
                  let st = &mut new_states[new_id];
                  st.final_weight = builder.final_weight;

                  st.epsilons.clear();
                  for (dest_new, w) in builder.eps {
                      if !w.is_empty() {
                          st.epsilons.push((dest_new, w));
                      }
                  }

                  st.transitions.clear();
                  for (lbl, dests_map) in builder.trans {
                      let mut dests_vec: Vec<(NWAStateID, Weight)> = Vec::new();
                      for (dest_new, w) in dests_map {
                          if !w.is_empty() {
                              dests_vec.push((dest_new, w));
                          }
                      }
                      if !dests_vec.is_empty() {
                          st.transitions.insert(lbl, dests_vec);
                      }
                  }
              }

              let start_class = partition.classes[self.body.start_state];
              let new_start = class_to_new[&start_class];

              self.states = new_states;
              self.body.start_state = new_start;
          }

          /// Remove states not reachable from the start state.
          fn prune_unreachable(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }

              if self.body.start_state >= n {
                  let changed = n > 0;
                  if changed {
                      self.states = NWAStates::default();
                      let start = self.states.add_state();
                      self.body.start_state = start;
                  }
                  return changed;
              }

              let mut reachable = vec![false; n];
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              reachable[self.body.start_state] = true;
              q.push_back(self.body.start_state);

              while let Some(u) = q.pop_front() {
                  let st = &self.states[u];

                  for &(v, ref w) in &st.epsilons {
                      if v < n && !reachable[v] && !w.is_empty() {
                          reachable[v] = true;
                          q.push_back(v);
                      }
                  }

                  for (_, targets) in &st.transitions {
                      for &(v, ref w) in targets {
                          if v < n && !reachable[v] && !w.is_empty() {
                              reachable[v] = true;
                              q.push_back(v);
                          }
                      }
                  }
              }

              if reachable.iter().all(|&b| b) {
                  return false;
              }

              let mut map = vec![usize::MAX; n];
              let mut new_states = NWAStates::default();

              for i in 0..n {
                  if reachable[i] {
                      let new_id = new_states.add_state();
                      map[i] = new_id;
                      new_states[new_id] = self.states[i].clone();
                  }
              }

              for st in &mut new_states.0 {
                  st.epsilons.retain(|(v, w)| *v < n && !w.is_empty());
                  for (v, _) in &mut st.epsilons {
                      *v = map[*v];
                  }

                  let mut new_transitions: BTreeMap<i16, Vec<(NWAStateID, Weight)>> = BTreeMap::new();
                  for (&lbl, targets) in &st.transitions {
                      let mut new_targets = Vec::new();
                      for &(v, ref w) in targets {
                          if v < n && !w.is_empty() && reachable[v] {
                              new_targets.push((map[v], w.clone()));
                          }
                      }
                      if !new_targets.is_empty() {
                          new_transitions.insert(lbl, new_targets);
                      }
                  }
                  st.transitions = new_transitions;
              }

              self.body.start_state = map[self.body.start_state];
              self.states = new_states;
              true
          }

          /// Remove states that cannot reach any state with non-empty final weight.
          fn prune_dead_ends(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }

              let mut live = vec![false; n];
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              let mut rev: Vec<Vec<NWAStateID>> = vec![vec![]; n];

              for p in 0..n {
                  let st = &self.states[p];
                  for &(t, ref w) in &st.epsilons {
                      if t < n && !w.is_empty() {
                          rev[t].push(p);
                      }
                  }
                  for (_, targets) in &st.transitions {
                      for &(t, ref w) in targets {
                          if t < n && !w.is_empty() {
                              rev[t].push(p);
                          }
                      }
                  }
              }

              for s in 0..n {
                  if self.states[s]
                      .final_weight
                      .as_ref()
                      .map_or(false, |w| !w.is_empty())
                  {
                      if !live[s] {
                          live[s] = true;
                          q.push_back(s);
                      }
                  }
              }

              while let Some(v) = q.pop_front() {
                  for &p in &rev[v] {
                      if !live[p] {
                          live[p] = true;
                          q.push_back(p);
                      }
                  }
              }

              // If the start state is not live, the language is empty.
              if self.body.start_state >= n || !live[self.body.start_state] {
                  let changed = n > 0;
                  if changed {
                      self.states = NWAStates::default();
                      let start = self.states.add_state();
                      self.body.start_state = start;
                  }
                  return changed;
              }

              if live.iter().all(|&b| b) {
                  return false;
              }

              let mut map = vec![usize::MAX; n];
              let mut new_states = NWAStates::default();

              for i in 0..n {
                  if live[i] {
                      let new_id = new_states.add_state();
                      map[i] = new_id;
                      new_states[new_id] = self.states[i].clone();
                  }
              }

              for st in &mut new_states.0 {
                  st.epsilons.retain(|(v, w)| *v < n && !w.is_empty() && live[*v]);
                  for (v, _) in &mut st.epsilons {
                      *v = map[*v];
                  }

                  let mut new_transitions: BTreeMap<i16, Vec<(NWAStateID, Weight)>> = BTreeMap::new();
                  for (&lbl, targets) in &st.transitions {
                      let mut new_targets = Vec::new();
                      for &(v, ref w) in targets {
                          if v < n && !w.is_empty() && live[v] {
                              new_targets.push((map[v], w.clone()));
                          }
                      }
                      if !new_targets.is_empty() {
                          new_transitions.insert(lbl, new_targets);
                      }
                  }
                  st.transitions = new_transitions;
              }

              self.body.start_state = map[self.body.start_state];
              self.states = new_states;
              true
          }
      }
