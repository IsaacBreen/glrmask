      ```
      sep1/
      ├── Cargo.toml
      ├── src/
      │   ├── json_serialization.rs
      │   └── main.rs  (or lib.rs, ensure `mod json_serialization;` is in it)
      └── json_convertible_derive/  <-- New directory
