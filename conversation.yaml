      impl Display for NWAStates {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "NWAStates ({} states):", self.0.len())?;
              for (id, state) in self.0.iter().enumerate() {
