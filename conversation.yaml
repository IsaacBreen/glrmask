              // Regex: "ab" or "ac"
              let expr = groups![
                  seq![eat_u8(b'a'), eat_u8(b'b')], // Group 0
                  seq![eat_u8(b'a'), eat_u8(b'c')], // Group 1
              ];
              let regex = expr.build();

