          /// Helper function to create a DFA from an expression with multiple groups.
          fn build_dfa_with_groups(exprs: Vec<Expr>) -> Regex {
              let expr_groups = ExprGroups {
                  groups: exprs.into_iter().map(ExprGroup::from).collect(),
              };
              expr_groups.build()
          }

          #[test]
