          assert!(compare_prods(&prods5, &expected5), "Test 5 failed. Got: {:?}", prods5);

          // --- Test Case 6: Multiple Recursive Choices ---
          let mut prods6 = vec![
              prod("S", vec![t("a"), nt("S")]),
              prod("S", vec![t("b"), nt("S")]),
