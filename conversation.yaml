                          if not reduced_child or reduced_child.is_empty():
                              continue

                          d: NodeID = int(dest_idx)
                          if d in values:
                              print(f"        - MERGING into node {d}")
                              print(f"          - Existing GSS: {values[d].to_reference_impl()}")
                              values[d] = values[d].merge(child_gss)
