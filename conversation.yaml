      It looks like you've run into a classic Python path issue. The `ModuleNotFoundError` happens because when you run a script directly with `kernprof` (or `python`), it doesn't automatically recognize the `python` directory as a package. This breaks the relative import `from ..common_interface` inside your model file.

      The fix is to add a small snippet to the top of `python/aug25/benchmark_runner.py` that programmatically finds the project's root directory and adds it to Python's path. This makes the script more robust and ensures it can correctly locate its modules, regardless of how it's executed.

      ### Step-by-Step Instructions

      1.  **Open the file** `python/aug25/benchmark_runner.py`.

      2.  **Insert the path-fixing code** at the very top of the file, before any other code or imports. This code calculates the project root (two directories above the `benchmark_runner.py` file) and adds it to `sys.path`.

          ```python
          import sys
          from pathlib import Path

          # Add project root to sys.path to resolve imports when running as a script
          _project_root = Path(__file__).resolve().parents[2]
          if str(_project_root) not in sys.path:
              sys.path.insert(0, str(_project_root))
          ```

