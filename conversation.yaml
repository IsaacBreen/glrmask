    metadata:
      kind: mode-guidance
      mode: git-llm
      phase: default
  - assistant: |-
      Here’s a surgical, performance-focused refactor that eliminates repeated full-graph scans and rebuilds, avoids heavy logging, and makes the push/pop elimination event-driven. This should cut the runtime from tens of seconds to well under a second, and typically close to the target 100 ms depending on graph size.

      Step-by-step instructions

      1) Edit imports in src/constraint_precompute3_challenge_elimination.rs
      - Add VecDeque to the std::collections import list so we can use a work queue without qualifying the path each time.

      2) Replace the implementation of eliminate_pushes_and_pops
      - Remove all println! calls and the multiple full-graph passes.
      - Implement an event-driven algorithm:
        - Convert to the intermediate2 graph (same as before).
        - Build reverse adjacency once (rev).
        - Initialize a queue with all nodes that:
          - are not end nodes;
          - have at least one incoming Push;
          - have no outgoing Push.
        - Process nodes from the queue:
          - Remove all incoming Push edges into the node.
          - For each such Push and each outgoing non-Push edge, create a shortcut edge as in the original logic.
          - If a new Push is added into a node that has no outgoing push, queue it.
        - If the queue becomes empty but there are nodes with incoming Push and both Push and non-Push outgoing edges, split them in a single batch:
          - Clone the node into a “non-push” twin.
          - Move non-Push outgoing edges to the twin.
          - Duplicate all incoming edges to the twin.
          - Queue the twin if it now satisfies the candidate condition.
