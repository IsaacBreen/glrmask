                  let mut disallowed = HybridBitset::zeros();
                  disallowed.insert(2);
                  let expected_intersection = HybridBitset::max_ones() - disallowed;
                  assert_eq!(acc_below_200.llm_tokens_union, expected_intersection);
              }
          }

