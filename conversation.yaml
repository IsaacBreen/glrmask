                      new_bv = current_bv.intersection(edge_bv_rs)
                      if new_bv.is_empty():
                          continue

                      if state_id_opt is not None:
                          # Advance only if this edge completes the current (k, sid) segment
                          if new_k == target_k and state_id_opt == target_sid:
