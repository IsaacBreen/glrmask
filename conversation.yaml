      Hello! As an AI assistant, I'm here to help you with your code. Based on my analysis of the performance issue, I've identified a key area for optimization. Here are the step-by-step instructions to address the exponential slowdown, followed by the corresponding git diff.

      ### Analysis

      The benchmark results clearly show an exponential increase in processing time and the number of unique stacks in the Graph-Structured Stack (GSS) when parsing nested `if` statements. The root cause is the ambiguity inherent in such structures (like the "dangling else" problem), which forces the GLR parser to maintain an exponentially growing number of parallel parse states.

      While the `StackNode` implementation already helps by sharing common stack prefixes, the `_process_token` function still performs redundant work. Specifically, during a `Reduce` operation, the code pops `n` states from the top of *every single stack* being considered. The profiling data shows that many stacks share long prefixes, meaning we are repeatedly calculating the result of popping from the same prefix nodes.

      The solution is to memoize the results of these pop operations within a single `_process_token` call. By caching the result of `pop(node, n)`, we can avoid re-traversing the stack for every head that shares the same prefix, converting a costly operation into a quick dictionary lookup. This should effectively combat the exponential complexity introduced by the grammar's ambiguity.

      ### Step-by-step Instructions

      1.  **Open the file**: `python/aug25/models/precompute3_model_pure_python.py`.

      2.  **Navigate to the `_process_token` method**: Find the `_process_token` method inside the `Model` class.

      3.  **Introduce a cache for pop operations**: Immediately after the line `c_gotos = 0`, insert the following code block. This adds a dictionary `pop_cache` to store the results of pop operations and a helper function `pop_node_cached` that uses this cache.

          ```python
                  pop_cache: Dict[Tuple[StackNode, int], StackNode] = {}
          
                  def pop_node_cached(node: StackNode, n: int) -> StackNode:
                      if n <= 0:
                          return node
                      key = (node, n)
                      cached = pop_cache.get(key)
                      if cached is not None:
                          return cached
                      
                      p = node
                      steps = n
                      while steps > 0 and p.state is not None:
                          p = p.prev
                          steps -= 1
                      pop_cache[key] = p
                      return p
          ```

