              if not heap:
                  return RangeSet.from_ranges(final_mask.to_ranges())

              # Access to precompiled adjacency and helpers
              children_grouped = self._children_grouped
              is_end = self.is_end

              while heap:
                  _, node = heapq.heappop(heap)
                  in_queue.discard(node)

                  item = agg.get(node)
                  if not item:
