      Implement `resolve_negative_codes_for_all` and `resolve_negative_codes_in_dwa`. It should work like this.

      Two distinct stages: one to remove internal negatives, then one to remove negatives at end.

      Removing negatives at end just takes off negatives that lead to an end node. Imagine replacing them with an epsilon edge (ie don't nullify them). That's it.

      Removing internal negatives is a little more complex.

      Consider a simple case
      a -(1)-> b -(-2)-> c  -(2)-> d -(3)-> e
      -2 appears before 2, so they cancel and we're left with
      a -(1)-> b -(3)-> e

      On the other hand if we had
      a -(1)-> b -(2)-> c  -(-2)-> d -(3)-> e
      -2 appears *after* 2, so that doesn't count. What counts is that it appears *before* 3. -2 and 3 don't match, so this edge is NULLIFIED.
      i.e. the
      a
      as in this doesn't match any string - it's invalid.

      Another case
      a -(1)-> b -(-2)-> c
      This can't be simplified. It remains as-is.


      Now, how can we generalize this?
      Consider any negative edge A -(-x)-> B and positive edge B -(x)-> C.
      Merge C into A. But make sure to apply the weights along the path A -(-x)-> B -(x)-> C to C before doing so.
      Keep A -(-x)-> B and B -(x)-> C in place - don't remove them.

      Just keep doing this until we can't do it any more, or there are no changes. Then we're done.
      There will still be those internal negative edges, of course. Just invalidate them.
      Keep negative edges that go to end states.

      What about negative edges that go to end states that *also* have outgoing transitions? This is a problem. They're neither internal negative edges nor end negative edges.
      With careful treatment, this will be fine.
      Create a new end state for the negative edge *without* those outgoing transitions. That's it! Point the transition to that state instead, and remove it from the original.


      Implement this in full. Focus on correctness over performance.
