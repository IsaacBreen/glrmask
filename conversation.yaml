      with:

      ```rust
      impl NwaTransitionSig {
          fn sort_key(&self) -> (u8, i16, u32, u64) {
              let label_tag = match self.label {
                  ArcLabel::Eps => 0,
                  ArcLabel::Label(_) => 1,
              };
              let label_val = match self.label {
                  ArcLabel::Eps => 0,
                  ArcLabel::Label(v) => v,
              };
              let dest_hash = hash_value(&self.dest_classes);
              (label_tag, label_val, self.weight_id, dest_hash)
