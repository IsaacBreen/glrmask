      type Stage1Result = Stage1Table;
      type Stage2Result = Stage2Table;
      type Stage3Result = Stage3Table;
      type Stage4Result = Stage4Table;
      type Stage5Result = Stage5Table;
      type Stage6Result = Stage6Table;
      type Stage7Result = (
          Stage7Table,
          BiBTreeMap<BTreeSet<Item>, StateID>,
          StateID,
      );

      fn stage_1(productions: &[Production], start_production_id: usize) -> Stage1Result {
          let initial_item = Item {
              production: productions[start_production_id].clone(),
              dot_position: 0,
          };
          let initial_closure = BTreeSet::from([initial_item]);
          let mut worklist = VecDeque::from([initial_closure.clone()]);

          let mut transitions: BTreeMap<BTreeSet<Item>, BTreeMap<Option<Symbol>, BTreeSet<Item>>> = BTreeMap::new();

          while let Some(items) = worklist.pop_front() {
              if transitions.contains_key(&items) {
                  continue;
              }

              let closure = compute_closure(&items, productions);
              let splits = split_on_dot(&closure);
              let mut row = BTreeMap::new();

              for (symbol, items) in splits {
                  if symbol.is_none() {
                      continue;
                  }
                  let goto_set = compute_goto(&items);
                  row.insert(symbol.clone(), goto_set.clone());
                  worklist.push_back(goto_set);
              }

              transitions.insert(items.clone(), row);
          }

          transitions
      }

      fn stage_2(stage_1_table: Stage1Table, productions: &[Production]) -> Stage2Result {
          let mut stage_2_table = BTreeMap::new();
          for (item_set, transitions) in stage_1_table {
              let mut shifts = BTreeMap::new();
              let mut gotos = BTreeMap::new();
              let mut reduces = BTreeSet::new();

              for item in &item_set {
                  if item.dot_position >= item.production.rhs.len() {
                      reduces.insert(item.clone());
                  }
              }

              for (symbol_opt, next_item_set) in &transitions {
                  if let Some(symbol) = symbol_opt {
                      match symbol {
                          Symbol::Terminal(t) => {
                              shifts.insert(t.clone(), next_item_set.clone());
                          }
                          Symbol::NonTerminal(nt) => {
                              gotos.insert(nt.clone(), next_item_set.clone());
                          }
                      }
                  }
              }

              stage_2_table.insert(
                  item_set,
                  Stage2Row {
                      shifts,
                      gotos,
                      reduces,
                  },
              );
          }
          stage_2_table
      }

      fn stage_3(stage_2_table: Stage2Table, productions: &[Production]) -> Stage3Result {
          let follow_sets = compute_follow_sets(productions);

          let mut stage_3_table = BTreeMap::new();

          for (item_set, row) in stage_2_table {
              let mut reduces: BTreeMap<Terminal, BTreeSet<Item>> = BTreeMap::new();

              for item in &row.reduces {
                  let lhs = &item.production.lhs;
                  let lookaheads = follow_sets.get(lhs).unwrap();

                  for terminal in lookaheads {
                      reduces
                          .entry(terminal.clone())
                          .or_default()
                          .insert(item.clone());
                  }
              }

              stage_3_table.insert(
                  item_set,
                  Stage3Row {
                      shifts: row.shifts,
                      gotos: row.gotos,
                      reduces,
                  },
              );
          }

          stage_3_table
      }

      fn stage_4(stage_3_table: Stage3Table, productions: &[Production]) -> Stage4Result {
          let production_ids: BTreeMap<Production, ProductionID> = productions
              .iter()
              .enumerate()
              .map(|(i, p)| (p.clone(), ProductionID(i)))
              .collect();

          let mut stage_4_table = BTreeMap::new();

          for (item_set, row) in stage_3_table {
              let mut reduces = BTreeMap::new();

              for (terminal, items) in row.reduces {
                  let mut prod_ids = BTreeSet::new();
                  for item in items {
                      let prod_id = production_ids.get(&item.production).unwrap();
                      prod_ids.insert(*prod_id);
                  }
                  reduces.insert(terminal.clone(), prod_ids);
              }

              stage_4_table.insert(
                  item_set,
                  Stage4Row {
                      shifts: row.shifts,
                      gotos: row.gotos,
                      reduces,
                  },
              );
          }

          stage_4_table
      }

      fn stage_5(stage_4_table: Stage4Table, productions: &[Production]) -> Stage5Result {
          // todo: remove this
          stage_4_table
      }

      fn stage_6(stage_5_table: Stage5Table) -> Stage6Result {
          let mut stage_6_table = BTreeMap::new();

          for (item_set, row) in stage_5_table {
              let mut shifts_and_reduces = BTreeMap::new();

              for (terminal, next_item_set) in row.shifts {
                  shifts_and_reduces.insert(terminal, Stage6ShiftsAndReduces::Shift(next_item_set));
              }

              for (terminal, mut production_ids) in row.reduces {
                  if let Some(mut existing) = shifts_and_reduces.remove(&terminal) {
                      match existing {
                          Stage6ShiftsAndReduces::Shift(shift_set) => {
                              shifts_and_reduces.insert(terminal, Stage6ShiftsAndReduces::Split {
                                  shift: Some(shift_set.clone()),
                                  reduces: production_ids.clone(),
                              });
                          }
                          Stage6ShiftsAndReduces::Reduce(existing_production_id) => {
                              production_ids.insert(existing_production_id);
                              shifts_and_reduces.insert(terminal, Stage6ShiftsAndReduces::Split {
                                  shift: None,
                                  reduces: production_ids,
                              });
                          }
                          Stage6ShiftsAndReduces::Split { shift, mut reduces } => {
                              reduces.extend(production_ids.into_iter());
                              shifts_and_reduces.insert(terminal, Stage6ShiftsAndReduces::Split { shift, reduces });
                          }
                      }
                  } else {
                      // If there's only one production ID, we can optimize by storing it directly
                      if production_ids.len() == 1 {
                          shifts_and_reduces.insert(terminal, Stage6ShiftsAndReduces::Reduce(production_ids.iter().next().unwrap().clone()));
                      } else {
                          shifts_and_reduces.insert(terminal, Stage6ShiftsAndReduces::Split { shift: None, reduces: production_ids });
                      }
                  }
              }

              stage_6_table.insert(
                  item_set,
                  Stage6Row {
                      shifts_and_reduces,
                      gotos: row.gotos,
                  },
              );
          }

          stage_6_table
      }

      fn stage_7(stage_6_table: Stage6Table, productions: &[Production], start_production_id: usize, terminal_map: &BiBTreeMap<Terminal, TerminalID>, non_terminal_map: &BiBTreeMap<NonTerminal, NonTerminalID>) -> Stage7Result {
          let mut item_set_map = BiBTreeMap::new();
          let mut next_state_id = 0;

          let mut terminals = BTreeSet::new();
          let mut non_terminals = BTreeSet::new();

          for (item_set, row) in &stage_6_table {
              item_set_map.insert(item_set.clone(), StateID(next_state_id));
              next_state_id += 1;

              for t in row.shifts_and_reduces.keys() {
                  terminals.insert(t.clone());
              }

              for nt in row.gotos.keys() {
                  non_terminals.insert(nt.clone());
              }
          }

          let mut stage_7_table = BTreeMap::new();

          for (item_set, row) in stage_6_table {
              let state_id = *item_set_map.get_by_left(&item_set).unwrap();
              let mut shifts_and_reduces = BTreeMap::new();
              let mut gotos = BTreeMap::new();

              // Determine if this state is an accepting state
              let is_accepting_state = item_set.iter().any(|item| {
                  item.production == productions[start_production_id] && item.dot_position == item.production.rhs.len()
              });



              for (terminal, action) in row.shifts_and_reduces {
                  let terminal_id = *terminal_map.get_by_left(&terminal).expect(format!("{:?} not found in terminal map {:?}", terminal, terminal_map.left_values().map(|t| t.0.clone()).collect::<Vec<String>>()).as_str());
                  let converted_action = match action {
                      Stage6ShiftsAndReduces::Shift(next_item_set) => {
                          let next_state_id = *item_set_map.get_by_left(&next_item_set).unwrap();
                          Stage7ShiftsAndReduces::Shift(next_state_id)
                      }
                      Stage6ShiftsAndReduces::Reduce(production_id) => {
                          let production = productions.get(production_id.0).unwrap();
                          let nonterminal_id = *non_terminal_map.get_by_left(&production.lhs).unwrap();
                          let len = production.rhs.len();
                          Stage7ShiftsAndReduces::Reduce { production_id, nonterminal_id, len }
                      }
                      Stage6ShiftsAndReduces::Split { shift, reduces } => {
                          let shift_state_id = shift.as_ref().map(|set| *item_set_map.get_by_left(set).unwrap());
                          let mut len_to_nt_to_production_id: BTreeMap<usize, BTreeMap<NonTerminalID, BTreeSet<ProductionID>>> = BTreeMap::new();
                          for production_id in reduces {
                              let production = productions.get(production_id.0).unwrap();
                              let nonterminal_id = *non_terminal_map.get_by_left(&production.lhs).unwrap();
                              let len = production.rhs.len();
                              len_to_nt_to_production_id.entry(len).or_default().entry(nonterminal_id).or_default().insert(production_id);
                          }
                          Stage7ShiftsAndReduces::Split { shift: shift_state_id, reduces: len_to_nt_to_production_id }
                      }
                  };
                  shifts_and_reduces.insert(terminal_id, converted_action);
              }

              for (nonterminal, next_item_set) in row.gotos {
                  let non_terminal_id = *non_terminal_map.get_by_left(&nonterminal).unwrap();
                  let next_state_id = *item_set_map.get_by_left(&next_item_set).unwrap();
                  gotos.insert(non_terminal_id, next_state_id);
              }

              stage_7_table.insert(state_id, Stage7Row { shifts_and_reduces, gotos, accept: is_accepting_state });
          }

          let start_item = Item {
              production: productions[start_production_id].clone(),
              dot_position: 0,
          };
          let start_state_id = *item_set_map.get_by_left(&BTreeSet::from([start_item])).unwrap();

          (stage_7_table, item_set_map, start_state_id)
      }

      pub fn generate_glr_parser_with_maps(productions: &[Production], start_production_id: usize, mut terminal_map: BiBTreeMap<Terminal, TerminalID>, non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>) -> GLRParser {
          crate::debug!(2, "Validating");
          validate(productions).expect("Validation error");

          crate::debug!(2, "Stage 1");
          let stage_1_table = stage_1(productions, start_production_id);
          crate::debug!(2, &stage_1_table);
          crate::debug!(2, "Stage 2");
          let stage_2_table = stage_2(stage_1_table, productions);
          crate::debug!(2, &stage_2_table);
          crate::debug!(2, "Stage 3");
          let stage_3_table = stage_3(stage_2_table, productions);
          crate::debug!(2, &stage_3_table);
          crate::debug!(2, "Stage 4");
          let stage_4_table = stage_4(stage_3_table, productions);
          crate::debug!(2, &stage_4_table);
          crate::debug!(2, "Stage 5");
          let stage_5_table = stage_5(stage_4_table, productions);
          crate::debug!(2, &stage_5_table);
          crate::debug!(2, "Stage 6");
          let stage_6_table = stage_6(stage_5_table);
          crate::debug!(2, &stage_6_table);
          crate::debug!(2, "Stage 7");
          let (stage_7_table, item_set_map, start_state_id) = stage_7(stage_6_table, productions, start_production_id, &terminal_map, &non_terminal_map);
          crate::debug!(2, &stage_7_table);
          crate::debug!(2, "Done generating GLR parser");

          GLRParser::new(stage_7_table, productions.to_vec(), terminal_map, non_terminal_map, item_set_map, start_state_id)
      }

      pub fn generate_glr_parser(productions: &[Production], start_production_id: usize) -> GLRParser {
          let terminal_map = assign_terminal_ids(productions);
          let non_terminal_map = assign_non_terminal_ids(productions);
          generate_glr_parser_with_maps(productions, start_production_id, terminal_map, non_terminal_map)
      }

      pub fn generate_glr_parser_with_terminal_map(productions: &[Production], start_production_id: usize, terminal_map: BiBTreeMap<Terminal, TerminalID>) -> GLRParser {
          let non_terminal_map = assign_non_terminal_ids(productions);
          generate_glr_parser_with_maps(productions, start_production_id, terminal_map, non_terminal_map)
      }

      pub fn assign_terminal_ids(productions: &[Production]) -> BiBTreeMap<Terminal, TerminalID> {
          let mut terminal_map = BiBTreeMap::new();
          let mut next_terminal_id = 0;

          for p in productions {
              for symbol in &p.rhs {
                  if let Symbol::Terminal(t) = symbol {
                      if !terminal_map.contains_left(t) {
                          terminal_map.insert(t.clone(), TerminalID(next_terminal_id));
                          next_terminal_id += 1;
                      }
                  }
              }
          }

          terminal_map
      }

      pub fn assign_non_terminal_ids(productions: &[Production]) -> BiBTreeMap<NonTerminal, NonTerminalID> {
          let mut non_terminal_map = BiBTreeMap::new();
          let mut next_non_terminal_id = 0;

          for p in productions {
              if !non_terminal_map.contains_left(&p.lhs) {
                  non_terminal_map.insert(p.lhs.clone(), NonTerminalID(next_non_terminal_id));
                  next_non_terminal_id += 1;
              }
          }
          non_terminal_map
      }

    src/glr/parser.rs: |-
      use crate::datastructures::gss::BulkMerge;
      use crate::glr::grammar::{NonTerminal, Production, Symbol, Terminal};
      use crate::glr::items::Item;
      use crate::glr::table::{
          NonTerminalID, ProductionID, Stage7ShiftsAndReduces, Stage7Table, StateID, TerminalID,
      };
      use crate::datastructures::gss::{GSSNode, GSSTrait};

      use bimap::BiBTreeMap;
      use std::collections::{BTreeMap, BTreeSet};
      use std::fmt::{Debug, Display, Formatter};
      use std::hash::Hash;
      use std::sync::Arc;
      use crate::debug;

      pub trait AndAndOr: Sized + Clone + Debug + Eq + PartialEq + Ord + PartialOrd + Hash {
          fn and(&self, other: &Self) -> Self;
          fn or(&self, other: &Self) -> Self;
      }

      impl AndAndOr for () {
          fn and(&self, _: &Self) -> Self { () }
          fn or(&self, _: &Self) -> Self { () }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateNodeContent<T: AndAndOr> {
          pub state_id: StateID,
          pub t: T,
      }
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseState<T: AndAndOr> {
          pub stack: Arc<GSSNode<ParseStateNodeContent<T>>>,
          // Removed status field
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub enum StopReason {
          ActionNotFound,
          GotoNotFound,
      }


      // TODO: should this *really* derive `Clone`? Users probably shouldn't clone this, should they?
      #[derive(Clone)]
      pub struct GLRParser {
          pub stage_7_table: Stage7Table,
          pub productions: Vec<Production>,
          pub terminal_map: BiBTreeMap<Terminal, TerminalID>,
          pub non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
          pub item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
          pub start_state_id: StateID,
      }

      impl GLRParser {
          pub fn new(
              stage_7_table: Stage7Table,
              productions: Vec<Production>,
              terminal_map: BiBTreeMap<Terminal, TerminalID>,
              non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
              item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
              start_state_id: StateID,
          ) -> Self {
              Self {
                  stage_7_table,
                  productions,
                  terminal_map,
                  non_terminal_map,
                  item_set_map,
                  start_state_id,
              }
          }

          pub fn init_glr_parser<T: AndAndOr + Default>(&self) -> GLRParserState<T> {
              self.init_glr_parser_with_t(T::default())
          }

          pub fn init_glr_parser_with_t<T: AndAndOr>(&self, t: T) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: vec![self.init_parse_state_with_t(t)],
                  action_not_found_states: Vec::new(),
              }
          }

          pub fn init_glr_parser_from_parse_state<T: AndAndOr>(&self, parse_state: ParseState<T>) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: vec![parse_state],
                  action_not_found_states: Vec::new(),
              }
          }

          pub fn init_glr_parser_from_parse_states<T: AndAndOr>(
              &self,
              parse_states: Vec<ParseState<T>>,
          ) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: parse_states,
                  action_not_found_states: Vec::new(),
              }
          }

          pub fn init_parse_state<T: AndAndOr + Default>(&self) -> ParseState<T> {
              self.init_parse_state_with_t(T::default())
          }

          pub fn init_parse_state_with_t<T: AndAndOr>(&self, t: T) -> ParseState<T> {
              let initial_content = ParseStateNodeContent {
                  state_id: self.start_state_id,
                  t,
              };
              ParseState {
                  stack: Arc::new(GSSNode::new(initial_content)),
              }
          }

          pub fn parse<T: AndAndOr + Default>(&self, input: &[TerminalID]) -> GLRParserState<T> {
              let mut state = self.init_glr_parser();
              state.parse(input);
              state
          }
      }

      impl Debug for GLRParser {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              write!(f, "{}", self)
          }
      }

      impl Display for GLRParser {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              let stage_7_table = &self.stage_7_table;
              let terminal_map = &self.terminal_map;
              let non_terminal_map = &self.non_terminal_map;
              let item_set_map = &self.item_set_map;

              writeln!(f, "Parse Table:")?;
              writeln!(f, "  Start State: {}", self.start_state_id.0)?;
              for (&state_id, row) in stage_7_table.iter().collect::<BTreeMap<_, _>>() {
                  writeln!(f, "  State {}:", state_id.0)?;

                  writeln!(f, "    Items:")?;
                  let item_set = item_set_map.get_by_right(&state_id).unwrap();
                  for item in item_set {
                      write!(f, "      - {} ->", item.production.lhs.0)?;
                      for (i, symbol) in item.production.rhs.iter().enumerate() {
                          if i == item.dot_position {
                              write!(f, " •")?;
                          }
                          match symbol {
                              Symbol::Terminal(terminal) => write!(f, " {:?}", terminal.0)?,
                              Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0)?,
                          }
                      }
                      if item.dot_position == item.production.rhs.len() {
                          write!(f, " •")?;
                      }
                      writeln!(f)?;
                  }

                  writeln!(f, "    Actions:")?;
                  for (&terminal_id, action) in &row.shifts_and_reduces {
                      let terminal = terminal_map.get_by_right(&terminal_id).unwrap();
                      match action {
                          Stage7ShiftsAndReduces::Shift(next_state_id) => {
                              writeln!(f, "      - {:?} -> Shift {}", terminal.0, next_state_id.0)?;
                          }
                          Stage7ShiftsAndReduces::Reduce { production_id, nonterminal_id: nonterminal, len } => {
                              let nt = non_terminal_map.get_by_right(nonterminal).unwrap();
                              writeln!(f, "      - {:?} -> Reduce {} (len {})", terminal.0, nt.0, len)?;
                          }
                          Stage7ShiftsAndReduces::Split { shift, reduces } => {
                              writeln!(f, "      - {:?} -> Conflict:", terminal.0)?;
                              if let Some(shift_state) = shift {
                                  writeln!(f, "        - Shift {}", shift_state.0)?;
                              }
                              for (len, nt_id_to_prod_ids) in reduces {
                                  writeln!(f, "        - Reduce (len {}):", len)?;
                                  for (nt_id, prod_ids) in nt_id_to_prod_ids {
                                      let nt = non_terminal_map.get_by_right(nt_id).unwrap();
                                      for prod_id in prod_ids {
                                          let prod = self.productions.get(prod_id.0).unwrap();
                                          writeln!(f, "          - {} -> {}", nt.0, prod.lhs.0)?;
                                      }
                                  }

                              }
                          }
                      }
                  }

                  writeln!(f, "    Gotos:")?;
                  for (&non_terminal_id, &next_state_id) in &row.gotos {
                      let non_terminal = non_terminal_map.get_by_right(&non_terminal_id).unwrap();
                      writeln!(f, "      - {} -> {}", non_terminal.0, next_state_id.0)?;
                  }
              }

              writeln!(f, "\nTerminal Map (name to terminal ID):")?;
              for (terminal, terminal_id) in terminal_map {
                  writeln!(f, "  {} -> {}", terminal.0, terminal_id.0)?;
              }

              writeln!(f, "\nNon-Terminal Map:")?;
              for (non_terminal, non_terminal_id) in non_terminal_map {
                  writeln!(f, "  {} -> {}", non_terminal.0, non_terminal_id.0)?;
              }

              Ok(())
          }
      }

      #[derive(Debug, Clone)]
      pub struct GLRParserState<'a, T: AndAndOr> {
          pub parser: &'a GLRParser,
          pub active_states: Vec<ParseState<T>>,
          pub action_not_found_states: Vec<ParseState<T>>,
      }

      impl<'a, T: AndAndOr> GLRParserState<'a, T> {
          pub fn parse(&mut self, input: &[TerminalID]) {
              self.parse_part(input);
          }

          pub fn parse_part(&mut self, input: &[TerminalID]) {
              for &token_id in input {
                  self.step(token_id);
              }
          }

          pub fn and_step(mut self, token_id: TerminalID) -> Self {
              self.step(token_id);
              self
          }

          pub fn and_parse(mut self, input: &[TerminalID]) -> Self {
              self.parse(input);
              self
          }

          pub fn step(&mut self, token_id: TerminalID) {
              let mut next_active_states = Vec::new();
              // This will store states where the current token_id leads to no action.
              let mut current_action_not_found_states = Vec::new();

              while let Some(state) = self.active_states.pop() {
                  let stack = state.stack; // Arc<GSSNode<ParseStateNodeContent<T>>>
                  let current_content = stack.peek(); // &ParseStateNodeContent<T>
                  let current_state_id = current_content.state_id;
                  let current_t = &current_content.t;

                  let row = self.parser.stage_7_table.get(&current_state_id).unwrap();

                  if let Some(action) = row.shifts_and_reduces.get(&token_id) {
                      match action {
                          Stage7ShiftsAndReduces::Shift(next_state_id) => {
                              debug!(3, "Shifting");
                              let new_content = ParseStateNodeContent { state_id: *next_state_id, t: current_t.clone() };
                              let new_stack = stack.push(new_content);
                              next_active_states.push(ParseState {
                                  // stack: Arc::new(new_stack), // GSSNode::push now returns Arc
                                  stack: Arc::new(new_stack),
                              });
                          }
                          Stage7ShiftsAndReduces::Reduce { production_id, nonterminal_id: nonterminal, len } => {
                              debug!(3, "Reducing by production {:?} with len {}", production_id, len);
                              let mut popped_stack_nodes = stack.popn(*len);
                              popped_stack_nodes.bulk_merge();
                              for stack_node in popped_stack_nodes {
                                  // stack_node is Arc<GSSNode<ParseStateNodeContent<T>>>
                                  let revealed_content = stack_node.peek(); // &ParseStateNodeContent<T>
                                  let revealed_state_id = revealed_content.state_id;
                                  let revealed_t = &revealed_content.t;
                                  let goto_state = self.parser.stage_7_table[&revealed_state_id].gotos[nonterminal];

                                  debug!(3, "Going to state {:?}", goto_state);
                                  let combined_t = revealed_t.and(current_t);
                                  let new_content = ParseStateNodeContent { state_id: goto_state, t: combined_t };
                                  let new_stack = stack_node.push(new_content);
                                  self.active_states.push(ParseState {
                                      stack: Arc::new(new_stack),
                                  });
                              }
                          }
                          Stage7ShiftsAndReduces::Split { shift, reduces } => {
                              debug!(3, "Split");
                              if let Some(shift_state) = shift {
                                  // Shift part (same as above)
                                  let new_content = ParseStateNodeContent { state_id: *shift_state, t: current_t.clone() };
                                  let new_stack = stack.push(new_content);
                                  next_active_states.push(ParseState {
                                      stack: Arc::new(new_stack),
                                  });
                              }

                              for (len, nt_ids) in reduces {
                                  let mut popped_stack_nodes = stack.popn(*len);
                                  popped_stack_nodes.bulk_merge();
                                  for nt_id in nt_ids.keys() {
                                      for stack_node in &popped_stack_nodes {
                                          // Reduce part (same as above)
                                          let revealed_content = stack_node.peek();
                                          let revealed_state_id = revealed_content.state_id;
                                          let revealed_t = &revealed_content.t;
                                          let goto_state = self.parser.stage_7_table[&revealed_state_id].gotos[nt_id];

                                          let combined_t = revealed_t.and(current_t);
                                          let new_content = ParseStateNodeContent { state_id: goto_state, t: combined_t };
                                          let new_stack = stack_node.push(new_content);
                                          self.active_states.push(ParseState {
                                              stack: Arc::new(new_stack),
                                          });
                                      }
                                  }
                              }
                          }
                      }
                  } else {
                      // No action found for this token in this state
                      current_action_not_found_states.push(ParseState {
                          stack,
                      });
                  }
              }
              self.active_states = next_active_states;
              self.action_not_found_states = current_action_not_found_states; // Replace previous not-found states
          }

          // TODO: Review merge logic, especially interaction with GSSNode::merge and ParseState::merge
          pub fn merge_active_states(&mut self) {
              let mut active_state_map: BTreeMap<ParseStateKey, ParseState<T>> = BTreeMap::new();

              for state in std::mem::take(&mut self.active_states) {
                  let key = state.key();
                  active_state_map.insert_with(key, state, |existing, new_state| {
                      existing.merge(new_state);
                  });
              }

              self.active_states = active_state_map.into_values().collect();
          }

          pub fn merge_with(&mut self, other: GLRParserState<T>) {
              assert!(std::ptr::eq(self.parser, other.parser));
              self.active_states.extend(other.active_states);
              self.action_not_found_states.extend(other.action_not_found_states);
              // Consider merging active states here if performance becomes an issue
              // self.merge_active_states();
          }

          pub fn fully_matches(&self) -> bool {
              self.active_states.iter().any(|state| {
                  let content = state.stack.peek();
                  self.parser.stage_7_table
                      .get(&content.state_id)
                      .map_or(false, |row| row.accept)
              })
              // Also check action_not_found_states? No, acceptance is defined by active states reaching an accept row.
          }

          pub fn can_match(&self) -> bool {
              !self.active_states.is_empty()
          }

          pub fn matches_or_can_match(&self) -> bool {
              self.can_match() || self.fully_matches() // A state can be both active and accepting
          }

          pub fn is_ok(&self) -> bool {
              self.matches_or_can_match()
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
          stack_state_id: StateID,
          // Removed action_stack
      }

      impl<T: AndAndOr> ParseState<T> {
          pub fn key(&self) -> ParseStateKey {
              ParseStateKey {
                  stack_state_id: self.stack.peek().state_id,
              }
          }

          /// Merges `other` into `self`. Assumes `self.key() == other.key()`.
          /// Merges the GSS structures and combines the `t` value at the top node using `AndAndOr::or`.
          pub fn merge(&mut self, other: ParseState<T>) {
              assert_eq!(self.key(), other.key());

              // Combine 't' values at the top node using 'or'
              let self_content = self.stack.peek();
              let other_content = other.stack.peek();
              let combined_t = self_content.t.or(&other_content.t);

              // Get mutable access to self.stack, potentially cloning if shared (Arc > 1)
              let mut mutable_stack = Arc::make_mut(&mut self.stack);

              // Update the 't' value in the mutable top node's content
              mutable_stack.value.t = combined_t;

              // Merge the parent structures using GSSNode's merge
              mutable_stack.merge_unchecked(Arc::unwrap_or_clone(other.stack));
          }
      }

      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }

      impl<K, V> InsertWith<K, V> for BTreeMap<K, V> where K: Eq + Ord {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F) {
              match self.entry(k) {
                  std::collections::btree_map::Entry::Occupied(mut occupied) => {
                      let value = occupied.get_mut();
                      combine(value, v);
                  }
                  std::collections::btree_map::Entry::Vacant(vacant) => {
                      vacant.insert(v);
                  }
              }
          }
      }
    src/glr/tests.rs: |-
      use crate::glr::grammar::{nt, prod, t, Terminal};
      use crate::glr::parser::{GLRParser, GLRParserState};
      use crate::glr::table::{generate_glr_parser, TerminalID};

      fn create_simple_parser() -> GLRParser {
          let productions = vec![
              prod("S", vec![nt("A")]),
              prod("A", vec![nt("A"), t("a")]),
              prod("A", vec![t("b")]),
          ];

          generate_glr_parser(&productions, 0)
      }

      fn create_expression_parser() -> GLRParser {
          let productions = vec![
              prod("S", vec![nt("E")]),
              prod("E", vec![nt("E"), t("+"), nt("T")]),
              prod("E", vec![nt("T")]),
              prod("T", vec![nt("T"), t("*"), nt("F")]),
              prod("T", vec![nt("F")]),
              prod("F", vec![t("("), nt("E"), t(")")]),
              prod("F", vec![t("i")]),
          ];

          generate_glr_parser(&productions, 0)
      }

      fn tokenize(parser: &GLRParser, input: &str) -> Vec<TerminalID> {
          input.chars()
              .filter_map(|c| parser.terminal_map.get_by_left(&Terminal(c.to_string())).copied())
              .collect()
      }

      #[test]
      fn test_simple_parse_table() {
          let parser = create_simple_parser();
          dbg!(&parser);
          
          let test_cases = [
              ("b", true),
              ("ba", true),
              ("baa", true),
              ("a", false),
              ("bb", false),
          ];

          for (input, expected_match) in test_cases {
              let result: GLRParserState<'_, ()> = parser.parse(&tokenize(&parser, input));
              assert_eq!(
                  result.fully_matches(), 
                  expected_match, 
                  "Failed for input: {}", input
              );
          }
      }

      #[test]
      fn test_parse_simple_expression() {
          let parser = create_expression_parser();
          dbg!(&parser);
          
          let test_cases = [
              ("i", true),
              ("i+i*i", true),
              ("i+i", true),
              ("i*i", true),
              ("(i+i)*i", true),
              ("i+", false),
              ("i++i", false),
              ("", false),
              (")", false),
          ];

          for (input, expected_match) in test_cases {
              let result: GLRParserState<'_, ()> = parser.parse(&tokenize(&parser, input));
              assert_eq!(
                  result.fully_matches(), 
                  expected_match, 
                  "Failed for input: {}", input
              );
          }
      }
