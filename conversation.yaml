              let n0 = Trie2Index::from(arena.insert(Trie::new("node0".to_string())));
              let n1 = Trie2Index::from(arena.insert(Trie::new("node1".to_string())));
              let n2 = Trie2Index::from(arena.insert(Trie::new("node2".to_string())));

