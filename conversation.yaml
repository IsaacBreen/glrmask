    src/js.ebnf: |
      // Instruct the parser to ignore Whitespace and Comments between tokens.
      #![ignore(IGNORE)]

      program ::= statement_list? EOF;
      EOF ::= '<|EOF|>';

      // Lexical Grammar: Whitespace and Comments
      IGNORE ::= ( WS | COMMENT )+ ;
      WS ::= ( ' ' | '\t' | '\n' | '\r' )+ ;
      COMMENT ::= SINGLE_LINE_COMMENT | MULTI_LINE_COMMENT ;
      SINGLE_LINE_COMMENT ::= '//' ( [^\n\r] )* ; // Non-greedy match
      MULTI_LINE_COMMENT ::= '/*' ( [^*] | '*' [^/] )* '*/' ; // Non-greedy match

      // Statements
      statement_list ::= statement+ ;

      statement ::=
          block
        | declaration_statement
        | if_statement
        | iteration_statement
        | switch_statement
        | with_statement
        | try_statement
        | function_declaration
        | return_statement
        | break_statement
        | continue_statement
        | throw_statement
        | debugger_statement
        | labeled_statement
        | class_declaration
        | import_statement
        | export_statement
        | expression_statement
        ;

      // Note: Semicolon is optional to simulate Automatic Semicolon Insertion (ASI).
      // A real parser has complex rules for this.
      expression_statement ::= expression ';'? ;

      block ::= '{' statement_list? '}' ;

      labeled_statement ::= IDENTIFIER ':' statement ;

      declaration_statement ::= ( 'var' | 'let' | 'const' ) variable_declaration_list ';'? ;

      variable_declaration_list ::= variable_declaration ( ',' variable_declaration )* ;

      variable_declaration ::= binding_pattern ( '=' expression )? ;

      if_statement ::= 'if' '(' expression ')' statement ( 'else' statement )? ;

      iteration_statement ::=
          'while' '(' expression ')' statement
        | 'do' statement 'while' '(' expression ')' ';'
        | 'for' '(' ( ( 'var' | 'let' | 'const' ) variable_declaration_list )? ';' expression? ';' expression? ')' statement
        | 'for' '(' ( 'var' | 'let' | 'const' )? binding_pattern ( 'in' | 'of' ) expression ')' statement
        | 'for' '(' expression? ';' expression? ';' expression? ')' statement
        ;

      switch_statement ::= 'switch' '(' expression ')' '{' case_clauses? ( default_clause case_clauses? )? '}' ;
      case_clauses ::= case_clause+ ;
      case_clause ::= 'case' expression ':' statement_list? ;
      default_clause ::= 'default' ':' statement_list? ;

      with_statement ::= 'with' '(' expression ')' statement ;

      try_statement ::= 'try' block ( catch_clause finally_clause? | finally_clause ) ;
      catch_clause ::= 'catch' ( '(' binding_pattern ')' )? block ;
      finally_clause ::= 'finally' block ;

      function_declaration ::= 'async'? 'function' '*'? IDENTIFIER? '(' parameter_list? ')' block ;

      parameter_list ::= formal_parameter ( ',' formal_parameter )* ( ','? '...' binding_pattern )? ;

      formal_parameter ::= binding_pattern ( '=' expression )? ;

      return_statement ::= 'return' expression? ';'? ;
      break_statement ::= 'break' IDENTIFIER? ';'? ;
      continue_statement ::= 'continue' IDENTIFIER? ';'? ;
      throw_statement ::= 'throw' expression ';'? ;
      debugger_statement ::= 'debugger' ';'? ;

      // Binding Patterns (for destructuring)
      binding_pattern ::= IDENTIFIER | object_binding_pattern | array_binding_pattern ;
      object_binding_pattern ::= '{' ( property_binding ( ',' property_binding )* )? ( ','? '...' IDENTIFIER )? ','? '}' ;
      property_binding ::= (IDENTIFIER ('=' expression)?) | (property_name ':' binding_pattern ('=' expression)?) ;
      array_binding_pattern ::= '[' ( ELISION? binding_element )? ( ',' ELISION? binding_element )* (','? '...' binding_pattern)? ','? ELISION? ']' ;
      binding_element ::= binding_pattern ('=' expression)? ;

      // ES6 Modules
      import_statement ::= 'import' ( import_clause 'from' STRING_LITERAL | STRING_LITERAL ) ';'? ;
      import_clause ::= default_import | named_imports | namespace_import | default_import ',' ( named_imports | namespace_import ) ;
      default_import ::= IDENTIFIER ;
      named_imports ::= '{' ( import_specifier ( ',' import_specifier )* )? ','? '}' ;
      namespace_import ::= '*' 'as' IDENTIFIER ;
      import_specifier ::= IDENTIFIER ( 'as' IDENTIFIER )? ;

      export_statement ::= 'export' ( 'default' ( function_declaration | class_declaration | expression ) | '*' ( 'from' STRING_LITERAL )? | named_exports ( 'from' STRING_LITERAL )? | declaration_statement | class_declaration ) ';'? ;
      named_exports ::= '{' ( export_specifier ( ',' export_specifier )* )? ','? '}' ;
      export_specifier ::= IDENTIFIER ( 'as' IDENTIFIER )? ;

      // Expressions (Precedence from lowest to highest)
      expression ::= assignment_expression ;

      assignment_expression ::=
          yield_expression
        | arrow_function
        | conditional_expression
        | left_hand_side_expression ( '=' | '+=' | '-=' | '*=' | '/=' | '%=' | '<<=' | '>>=' | '>>>=' | '&=' | '^=' | '|=' | '**=' ) assignment_expression
        ;

      arrow_function ::= arrow_parameters '=>' ( block | expression ) ;
      arrow_parameters ::= IDENTIFIER | '(' parameter_list? ')' ;

      conditional_expression ::=
          coalesce_expression ( '?' assignment_expression ':' assignment_expression )?
        ;

      coalesce_expression ::= logical_or_expression ( '??' logical_or_expression )* ;

      logical_or_expression ::= logical_and_expression ( '||' logical_and_expression )* ;

      logical_and_expression ::= bitwise_or_expression ( '&&' bitwise_or_expression )* ;

      bitwise_or_expression ::= bitwise_xor_expression ( '|' bitwise_xor_expression )* ;

      bitwise_xor_expression ::= bitwise_and_expression ( '^' bitwise_and_expression )* ;

      bitwise_and_expression ::= equality_expression ( '&' equality_expression )* ;

      equality_expression ::= relational_expression ( ( '==' | '!=' | '===' | '!==' ) relational_expression )* ;

      relational_expression ::= shift_expression ( ( '<' | '>' | '<=' | '>=' | 'instanceof' | 'in' ) shift_expression )* ;

      shift_expression ::= additive_expression ( ( '<<' | '>>' | '>>>' ) additive_expression )* ;

      additive_expression ::= multiplicative_expression ( ( '+' | '-' ) multiplicative_expression )* ;

      multiplicative_expression ::= exponentiation_expression ( ( '*' | '/' | '%' ) exponentiation_expression )* ;

      exponentiation_expression ::= unary_expression ( '**' exponentiation_expression )? ;

      unary_expression ::=
          postfix_expression
        | ( 'delete' | 'void' | 'typeof' | '++' | '--' | '+' | '-' | '~' | '!' | 'await' ) unary_expression
        ;

      postfix_expression ::=
          left_hand_side_expression ( '++' | '--' )?
        ;

      left_hand_side_expression ::=
          new_expression
        | call_expression
        ;

      new_expression ::=
          member_expression
        | 'new' new_expression
        ;

      call_expression ::=
          member_expression arguments
        | 'super' arguments
        | call_expression arguments
        | call_expression '?.' arguments
        | call_expression '[' expression ']'
        | call_expression '?.' '[' expression ']'
        | call_expression '.' IDENTIFIER
        | call_expression '?.' IDENTIFIER
        | call_expression '.' private_identifier
        | call_expression '?.' private_identifier
        | call_expression template_literal
        ;

      arguments ::= '(' ( assignment_expression ( ',' assignment_expression )* )? ')' ;

      member_expression ::=
          primary_expression
        | member_expression '[' expression ']'
        | member_expression '?.' '[' expression ']'
        | member_expression '.' IDENTIFIER
        | member_expression '?.' IDENTIFIER
        | member_expression '.' private_identifier
        | member_expression '?.' private_identifier
        | 'new' member_expression arguments
        | member_expression template_literal
        ;

      primary_expression ::=
          'this'
        | 'super'
        | IDENTIFIER
        | literal
        | array_literal
        | object_literal
        | function_expression
        | '(' expression ')'
        ;

      function_expression ::= 'async'? 'function' '*'? IDENTIFIER? '(' parameter_list? ')' block ;

      yield_expression ::= 'yield' '*'? expression? ;

      array_literal ::= '[' ( ELISION? assignment_expression )? ( ',' ELISION? assignment_expression )* ','? ELISION? ']' ;
      ELISION ::= ','+ ;

      object_literal ::= '{' ( property_assignment ( ',' property_assignment )* )? ','? '}' ;
      property_assignment ::=
          'async'? '*'? property_name '(' parameter_list? ')' block // Method Definition
        | 'get' property_name '(' ')' block
        | 'set' property_name '(' IDENTIFIER ')' block
        | property_name ':' assignment_expression
        | '...' assignment_expression
        | IDENTIFIER // Shorthand property
        ;
      property_name ::= IDENTIFIER | STRING_LITERAL | NUMERIC_LITERAL | '[' expression ']' ;

      class_declaration ::= 'class' IDENTIFIER? ( 'extends' expression )? class_body ;
      class_body ::= '{' class_member* '}' ;
      class_member ::= (method_definition | field_definition) ';'? | ';' ;
      field_definition ::= ('static')? class_property_name ('=' expression)? ;
      method_definition ::= ('static')? ('get'|'set')? ('async'|'*')? class_property_name '(' parameter_list? ')' block ;
      class_property_name ::= property_name | private_identifier ;
      private_identifier ::= '#' IDENTIFIER ;

      // Literals
      literal ::=
          NULL_LITERAL
        | BOOLEAN_LITERAL
        | NUMERIC_LITERAL
        | BIGINT_LITERAL
        | STRING_LITERAL
        | REGULAR_EXPRESSION_LITERAL
        | template_literal
        ;

      NULL_LITERAL ::= 'null' ;
      BOOLEAN_LITERAL ::= 'true' | 'false' ;

      NUMERIC_LITERAL ::= HEX_LITERAL | BINARY_LITERAL | OCTAL_LITERAL | DECIMAL_LITERAL ;
      DECIMAL_LITERAL ::= DECIMAL_INTEGER_LITERAL '.' DECIMAL_DIGITS? EXPONENT_PART? | '.' DECIMAL_DIGITS EXPONENT_PART? | DECIMAL_INTEGER_LITERAL EXPONENT_PART? ;
      DECIMAL_INTEGER_LITERAL ::= '0' | NON_ZERO_DIGIT DECIMAL_DIGITS? ;
      DECIMAL_DIGITS ::= DECIMAL_DIGIT+ ;
      DECIMAL_DIGIT ::= [0-9] ;
      NON_ZERO_DIGIT ::= [1-9] ;
      EXPONENT_PART ::= ('e'|'E') ('+'|'-')? DECIMAL_DIGITS ;
      HEX_LITERAL ::= '0' ('x'|'X') HEX_DIGIT+ ;
      BINARY_LITERAL ::= '0' ('b'|'B') ('0'|'1')+ ;
      OCTAL_LITERAL ::= '0' ('o'|'O') ('0'|'1'|'2'|'3'|'4'|'5'|'6'|'7')+ ;
      BIGINT_LITERAL ::= (DECIMAL_INTEGER_LITERAL | HEX_LITERAL | BINARY_LITERAL | OCTAL_LITERAL) 'n' ;

      STRING_LITERAL ::= '"' ( [^"\\] | ESCAPE_SEQUENCE )* '"' | '\'' ( [^'\\] | ESCAPE_SEQUENCE )* '\'' ;
      ESCAPE_SEQUENCE ::= '\\' ( [\'"\\bfnrtv] | 'x' HEX_DIGIT HEX_DIGIT | 'u' HEX_DIGIT HEX_DIGIT HEX_DIGIT HEX_DIGIT ) ;

      REGULAR_EXPRESSION_LITERAL ::= '/' REGEX_BODY '/' REGEX_FLAGS? ;
      REGEX_BODY ::= ( [^/\n\r\\] | '\\' . )+ ; // Any char except /, newline, or backslash, or any escaped char.
      REGEX_FLAGS ::= IDENTIFIER_PART+ ;

      //template_literal ::= '`' ( TEMPLATE_CHARS | template_substitution )* '`' ;
      //TEMPLATE_CHARS ::= TEMPLATE_CHAR+ ;
      //TEMPLATE_CHAR ::= [^`\\] | '\\' . ;
      //template_substitution ::= '${' expression '}' ;

      //template_literal ::= TEMPLATE_START template_middle* TEMPLATE_END ;
      //TEMPLATE_START ::= '`' ;
      //TEMPLATE_END ::= TEMPLATE_FILL '$'? '`' ;
      //TEMPLATE_MIDDLE ::= TEMPLATE_FILL '$' '{' ;
      //template_middle ::= TEMPLATE_MIDDLE expression '}' ;
      //TEMPLATE_FILL ::= (
      //    [^`$\\]
      //  | '\\' .
      //  | '$' (
      //      [^`\\]
      //    | '\\' .
      //    )
      //)* ;

      //template_literal ::= '';
      //template_literal ::= '`' 'asdfasdfasdfasdf' '`';

      //template_literal ::= TEMPLATE_LITERAL ;
      //TEMPLATE_LITERAL ::= '`' TEMPLATE_CHAR+ '`' ;
      //TEMPLATE_CHAR ::= [^`\\] | '\\' . ;

      //template_literal ::= TEMPLATE_LITERAL ;
      //TEMPLATE_LITERAL ::= '`' TEMPLATE_CHARS '`' ;
      //template_literal ::= '`' TEMPLATE_CHARS '`' ;
      //TEMPLATE_CHARS ::= TEMPLATE_CHAR+ ;
      //TEMPLATE_CHAR ::= [^`\\] | '\\' . ;

      //template_literal ::= TEMPLATE_LITERAL ;
      //TEMPLATE_LITERAL ::= '`' TEMPLATE_CHARS '`' ;
      template_literal ::= '`' TEMPLATE_CHARS '`' ;
      TEMPLATE_CHARS ::= TEMPLATE_CHAR+ ;
      TEMPLATE_CHAR ::= [^`\\] | '\\' . ;

      //template_literal ::= 'asdfasdfasdfasdfasdfsaf' ;

      // Identifiers
      IDENTIFIER ::= IDENTIFIER_START IDENTIFIER_PART* ;
      IDENTIFIER_START ::= [a-zA-Z] | '$' | '_' ;
      IDENTIFIER_PART ::= IDENTIFIER_START | DECIMAL_DIGIT ;
      HEX_DIGIT ::= [0-9a-fA-F] ;
    src/test_precompute2_optimizations.rs: |
      use crate::constraint::{
          are_precompute2_trees_equivalent, clone_trie2_graph, context_aware_merge_trie2, GrammarConstraint, Precomputed2,
      };
      use crate::json_serialization::JSONConvertible;
      use crate::interface::{CompiledGrammar, GrammarDefinition};
      use crate::tokenizer::{LLMTokenID, LLMTokenMap};
      use std::collections::{BTreeMap, BTreeSet};
      use std::fs::{self, File};
      use std::io::{BufReader, BufWriter, Read, Write};
      use std::path::Path;
      use std::sync::Arc;
      use reqwest::blocking;
      use std::hash::{Hash, Hasher};
      use std::collections::hash_map::DefaultHasher;
      use std::error::Error;

      // Helper function copied from test_constraint_js.rs
      fn load_or_download_gpt2_vocab(
          cache_dir: &Path,
          file_name: &str,
          url: &str,
      ) -> Result<Vec<String>, Box<dyn std::error::Error>> {
          fs::create_dir_all(cache_dir)?;
          let cache_path = cache_dir.join(file_name);

          let vocab_map: BTreeMap<String, u32> = if cache_path.exists() {
              println!("Loading GPT-2 vocab from cache: {:?}", cache_path);
              let file = File::open(cache_path)?;
              let reader = BufReader::new(file);
              serde_json::from_reader(reader)?
          } else {
              println!("Downloading GPT-2 vocab from: {}", url);
              let response = blocking::get(url)?.error_for_status()?;
              let content = response.text()?;

              let mut file = File::create(&cache_path)?;
              file.write_all(content.as_bytes())?;
              println!("Saved GPT-2 vocab to cache: {:?}", cache_path);

              serde_json::from_str(&content)?
          };
          Ok(vocab_map.into_keys().collect())
      }

      #[cfg(not(rustrover))]
      #[test]
      fn test_precompute2_optimizations_are_equivalent() -> Result<(), Box<dyn std::error::Error>> {
          // --- Setup Phase ---
          println!("--- Setting up for Precompute2 Optimization Equivalence Test ---");

          const FORCE_RECOMPUTE: bool = false;
          const SAVE_TO_CACHE: bool = false;
          use flate2::read::GzDecoder;
          use flate2::write::GzEncoder;
          use flate2::Compression;
          use crate::json_serialization;
          let cache_dir = Path::new(".cache/test_precompute2");
          fs::create_dir_all(cache_dir)?;
          let precomputed2_cache_path = cache_dir.join("precomputed2_js_gpt2_small.json.gz");

          // 1. Load and compile the JavaScript grammar.
          let grammar_path = "src/js.ebnf";
          let grammar_definition = GrammarDefinition::from_ebnf_file(grammar_path)?;
          println!("Compiling GrammarDefinition into CompiledGrammar...");
          let compiled_grammar = CompiledGrammar::from_definition(Arc::new(grammar_definition));
          println!("Successfully compiled GrammarDefinition.");

          // 2. Load a small, representative vocabulary.
          println!("\nLoading GPT-2 vocabulary...");
          let vocab_cache_dir = Path::new(".cache/test_vocabs");
          let vocab_url = "https://huggingface.co/openai-community/gpt2/raw/main/vocab.json";
          let vocab_file_name = "gpt2_vocab.json";
          let mut gpt2_raw_vocab = load_or_download_gpt2_vocab(vocab_cache_dir, vocab_file_name, vocab_url)?;
          // Keep a smaller subset to speed up the test
          gpt2_raw_vocab.retain(|s| s.len() < 5);
          println!("Using a subset of {} tokens for the test.", gpt2_raw_vocab.len());

          let mut llm_token_map = LLMTokenMap::new();
          let mut max_original_llm_token_id_val: usize = 0;
          for (i, token_str) in gpt2_raw_vocab.iter().enumerate() {
              let id_val = i;
              let processed_token_str = token_str.replace("Ġ", " ").replace("ą", "\n").replace("Ċ", "\n");
              let token_bytes = processed_token_str.as_bytes().to_vec();
              llm_token_map.insert(token_bytes, LLMTokenID(id_val));
              max_original_llm_token_id_val = max_original_llm_token_id_val.max(id_val);
          }

          // 3. Construct the GrammarConstraint to get the baseline precomputed2 tree.
          let original_precomputed2: Precomputed2;

          if !FORCE_RECOMPUTE && precomputed2_cache_path.exists() {
              println!("\nLoading Precomputed2 from cache: {:?}", precomputed2_cache_path);
              let file = File::open(&precomputed2_cache_path)?;
              let decompressor = GzDecoder::new(BufReader::new(file));
              // Reading is not fully streamed to avoid complexity, but this avoids storing the huge uncompressed file on disk.
              original_precomputed2 = Precomputed2::from_json_reader(decompressor)?;
              println!("Successfully loaded Precomputed2 from cache.");
          } else {
              println!("\nConstructing GrammarConstraint (will generate Precomputed2)...");
              let grammar_constraint = GrammarConstraint::from_compiled_grammar(
                  compiled_grammar.clone(),
                  llm_token_map.clone(),
                  LLMTokenID(0), // dummy_eof_placeholder
                  max_original_llm_token_id_val,
              );
              println!("GrammarConstraint constructed successfully.");
              original_precomputed2 = grammar_constraint.precomputed2;

              println!("\nSerializing and saving Precomputed2 to cache: {:?}", precomputed2_cache_path);
              if SAVE_TO_CACHE {
                  let file = File::create(&precomputed2_cache_path)?;
                  let writer = BufWriter::new(file);
                  let mut encoder = GzEncoder::new(writer, Compression::default());
                  json_serialization::write_precomputed2_to_stream(&original_precomputed2, &mut encoder)?;
              }
              println!("Successfully saved Precomputed2 to cache.");
          }

          // 4. Deep-clone the original precomputed2 tree.
          println!("\nCloning the original precomputed2 tree...");
          let mut optimized_precomputed2: Precomputed2 = BTreeMap::new();
          for (sid, root_arc) in original_precomputed2.iter() {
              let (cloned_root, _map) = clone_trie2_graph(root_arc);
              optimized_precomputed2.insert(*sid, cloned_root);
          }
          println!("Cloning complete.");

          // 5. Apply optimization passes to the cloned tree.
          println!("\nApplying optimization passes to the cloned tree...");
          context_aware_merge_trie2(&mut optimized_precomputed2);
          println!("Optimization passes applied.");

          // 6. Compare the original and optimized trees for semantic equivalence.
          println!("\nComparing original and optimized trees for equivalence...");
          assert_eq!(original_precomputed2.len(), optimized_precomputed2.len(), "Number of tokenizer states with trees differs.");

          for sid in original_precomputed2.keys() {
              let original_root = original_precomputed2.get(sid).unwrap();
              let optimized_root = optimized_precomputed2.get(sid).unwrap();

              assert!(are_precompute2_trees_equivalent(original_root, optimized_root), "Mismatch found for tokenizer state ID: {}", sid.0);
              println!("  - OK for tokenizer state ID: {}", sid.0);
          }

          println!("\nEquivalence test passed: All trees are semantically equivalent after optimization.");

          Ok(())
      }
