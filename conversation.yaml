              assert!(matches!(intersection.inner, BitsetRepr::Sparse(_)));
              assert!(matches!(union.inner, BitsetRepr::Sparse(_)));
              assert!(matches!(difference.inner, BitsetRepr::Sparse(_)));
              assert!(matches!(sym_diff.inner, BitsetRepr::Sparse(_)));
          }

