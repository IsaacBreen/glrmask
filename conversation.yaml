              let leaf = Arc::new(GSSNode::new(empty_acc())); // Node 2
              let intermediate = Arc::new(leaf.push(mock_edge(0))); // Node 1
              let mut root_arc = Arc::new(intermediate.push(mock_edge(2))); // Root 0

