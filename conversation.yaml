      - Determinization terminates when the algorithm visits only finitely many distinct canonical states. Over our bitset semiring (finite distributive lattice), the set of ε-closures is finite: each closure is a map Q → 2^K (finite), hence |Closures| ≤ (2^K)^|Q|.
