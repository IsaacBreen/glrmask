      The procedure for negative resolution was originally something like this:

      > We consider processing one state at a time until no further changes are possible.
      >
      > - Consider a state.
      > - Loop through negative edges A -> B
      >   - Copy B.
      >   - If the dst has final weight, take (remove) it (from the copy), intersect with the edge's weight, and put it in A.
      >   - If there is a positive edge B -> C that matches the negative edge A -> B, get a copy of C. Apply the weight of the edge to it. Then merge it into (the copy of) B. If there isn't such a positive edge, do nothing.
      >   - Discard all positive edges B -> C from the copy.
      >   - Replace A -> B in A so it points to the new copy of B.

      This original algorithm was far too slow. I've refined it to make it simpler and faster. BUT unfourtunately there's a problem, as `test_resolve_negatives_from_large_nwa_log` reveals.
      It seems to work fine when run on the determinized WA, but run directly on the NWA reveals issues.
      (The other tests pass.)
      Needless to say, the result for resolving negatives on a NWA and then determinizing should be equivalent to determinizing and then resolving negatives on the DWA.
      Fix it.

      Think mathematically and deeply. Hypothesise. State your hypotheses. Rigorously prove them and the validity of your output.
