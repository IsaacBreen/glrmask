                                                .and_then(|n| BTreeMap::<TokenizerStateID, BTreeMap<TerminalID, LLMTokenBV>>::from_json(n))?;
                      let trie0_god = obj.remove("trie0_god").ok_or_else(|| "Missing field trie0_god".to_string())
