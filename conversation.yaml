      use std::collections::BTreeMap;
      use std::time::Instant;

      use crate::constraint::{PrecomputeNode3Index, StageVocab, Trie3GodWrapper};
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::trie3_opt::coordinator::{run_pipeline_on_precompute3, CoordinatorConfig};
      use crate::trie3_opt::Trie3Config;

      /// High-level size optimizer for precompute3 tries. This is a legacy API that wraps the
      /// new MiniTrie-based optimization pipeline.
      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &Trie3Config,
          max_state_id: usize,
          max_llm_token_id: usize,
          stage_vocab: &mut StageVocab,
          parser: &GLRParser,
      ) {
          crate::debug!(2, "Optimizing Trie 3 size (using new pipeline)...");
          let start = Instant::now();

          // Map legacy Trie3Config to new CoordinatorConfig
          let coordinator_config = CoordinatorConfig {
              num_passes: config.num_passes,
              prune_dead_paths: config.prune_dead_paths,
              prune_unproductive_paths: config.prune_unproductive_paths,
              canonicalize_end_nodes: config.canonicalize_end_nodes, // Always good practice
              compress_edges: config.compress_edges,
              compress_unary_chains: config.compress_edges,
              factor_common_destinations: config.factor_common_destinations,
              factor_common_destinations_min_incoming: config.factor_common_destinations_min_incoming,
              merge_structural: config.merge_structural,
              merge_structural_max_iters: config.merge_structural_max_iters,
              merge_bisimulation: config.merge_bisimulation,
              merge_bisimulation_max_iters: config.merge_bisimulation_max_iters,
              merge_global_atoms: config.merge_global_atoms,
              merge_global_atoms_max_iters: config.merge_global_atoms_max_iters,
              merge_global_atoms_max_atoms_per_pop: config.merge_global_atoms_max_atoms_per_pop,
              eliminate_pop0_except_roots: config.eliminate_pop0_except_roots,
              merge_equivalent_llm_tokens: config.merge_equivalent_llm_tokens,
              reorder_llm_tokens: config.reorder_llm_tokens,
              generalize_sids: config.generalize_sids,
              nwa_dwa_roundtrip: config.nwa_dwa_roundtrip,
              assert_no_pop0_except_roots: config.assert_no_pop0_except_roots,
          };

          run_pipeline_on_precompute3(
              roots,
              trie3_god,
              max_llm_token_id,
              max_state_id,
              coordinator_config,
              Some(stage_vocab),
              Some(parser),
          );

          crate::debug!(2, "Finished optimizing Trie 3 size in {:?}", start.elapsed());
      }

    src/trie3_opt/passes/canonicalize_end_nodes.rs: |
      use std::collections::{BTreeMap, BTreeSet};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;
      use crate::trie3_opt::SortedSet;

      /// Canonicalize all end nodes to a single representative and rewire edges to it.
      /// The canonical end node keeps no outgoing edges. This preserves semantics and
      /// maximizes sharing downstream.
      pub struct CanonicalizeEndNodesPass;

      impl OptimizationPass for CanonicalizeEndNodesPass {
          fn name(&self) -> &'static str {
              "CanonicalizeEndNodes"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              // Collect end nodes
              let mut ends: Vec<NodeId> = trie
                  .nodes()
                  .filter(|n| n.is_end())
                  .map(|n| n.id())
                  .collect();
              if ends.len() <= 1 {
                  return;
              }
              ends.sort_unstable();
              let canonical = ends[0];
              let other_ends: BTreeSet<NodeId> = ends.iter().skip(1).cloned().collect();

              // Ensure canonical has no outgoing edges and is an end node.
              trie.clear_children(canonical);
              trie.set_end(canonical, true);

              // Decommission other end nodes. They will be garbage collected if unreferenced.
              for &end_node_id in &other_ends {
                  trie.set_end(end_node_id, false);
                  trie.clear_children(end_node_id);
              }

              // Rewire all edges that target any end node to target the canonical one.
              let end_set: BTreeSet<NodeId> = ends.into_iter().collect();
              let node_ids: Vec<_> = trie.node_ids().collect();

              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (ek, dm) in node.children().clone() {
                      let mut dm2: BTreeMap<NodeId, _> = BTreeMap::new();
                      for (dst, sids) in dm {
                          let new_dst = if end_set.contains(&dst) { canonical } else { dst };
                          dm2.entry(new_dst)
                              .and_modify(|e: &mut SortedSet| e.union_inplace(&sids))
                              .or_insert(sids);
                      }
                      if !dm2.is_empty() {
                          new_children.insert(ek, dm2);
                      }
                  }
                  trie.set_children(node_id, new_children);
              }

              // Remap roots if any of them were end nodes that are not the canonical one.
              let mut new_roots = Vec::with_capacity(trie.root_ids.len());
              for root_id in &trie.root_ids {
                  let new_root = if other_ends.contains(root_id) {
                      canonical
                  } else {
                      *root_id
                  };
                  new_roots.push(new_root);
              }
              trie.root_ids = new_roots;
          }
      }
    src/trie3_opt/passes/compress_edges.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Group identical destination-maps under the same pop by unioning token masks.
      /// This reduces the number of edge-keys by ensuring that, for a fixed pop,
      /// edges with identical destination semantics share a single token-set.
      pub struct CompressEdgesPass;

      impl OptimizationPass for CompressEdgesPass {
          fn name(&self) -> &'static str {
              "CompressEdges"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let n = trie.get_node(node_id).unwrap();
                  if n.children().is_empty() {
                      continue;
                  }

                  let old_children = n.children().clone();
                  // Cost metric: sum of token set sizes and destination map sizes.
                  let old_cost: usize = old_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  // Stage 1: Group by (pop, canonicalized dest-map), unioning token sets.
                  let mut by_pop: BTreeMap<isize, HashMap<Vec<(u32, SortedSet)>, SortedSet>> =
                      BTreeMap::new();
                  for (ek, dm) in &old_children {
                      if ek.tokens.is_empty() || dm.is_empty() {
                          continue;
                      }
                      let mut dest_vec: Vec<(u32, SortedSet)> =
                          dm.iter().map(|(&dst, sids)| (dst, sids.clone())).collect();
                      dest_vec.sort_unstable_by_key(|k| k.0);
                      by_pop
                          .entry(ek.pop)
                          .or_default()
                          .entry(dest_vec)
                          .or_default()
                          .union_inplace(&ek.tokens);
                  }

                  // Stage 2: For each pop, combine groups that yield identical final token sets
                  // by unioning their destination maps.
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<u32, SortedSet>> = BTreeMap::new();
                  for (pop, groups) in by_pop {
                      // tokens -> aggregated destination map
                      let mut out_by_tokens: BTreeMap<SortedSet, BTreeMap<u32, SortedSet>> =
                          BTreeMap::new();

                      for (dest_vec, tokens) in groups {
                          if tokens.is_empty() {
                              continue;
                          }
                          let dest_out = out_by_tokens.entry(tokens).or_default();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dest_out.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                      }

                      // Emit final edges for this pop
                      for (tokens, dm) in out_by_tokens {
                          if !tokens.is_empty() && !dm.is_empty() {
                              new_children.insert(EdgeKey::new(pop, tokens), dm);
                          }
                      }
                  }

                  let new_cost: usize = new_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  if new_cost < old_cost {
                      trie.set_children(node_id, new_children);
                  }
              }
          }
      }
    src/trie3_opt/passes/compress_unary_chains.rs: |
      use std::collections::{BTreeSet, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct CompressUnaryChainsPass;

      impl OptimizationPass for CompressUnaryChainsPass {
          fn name(&self) -> &'static str {
              "CompressUnaryChains"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let roots_set: BTreeSet<NodeId> = trie.root_ids.iter().cloned().collect();
              let max_iters = 8;
              for _ in 0..max_iters {
                  let mut indegree: HashMap<NodeId, usize> = HashMap::new();
                  let mut unique_parent: HashMap<NodeId, (NodeId, EdgeKey)> = HashMap::new();
                  let mut out_info: HashMap<NodeId, (EdgeKey, NodeId, crate::trie3_opt::core::SortedSet)> =
                      HashMap::new();

                  for node in trie.nodes() {
                      let node_id = node.id();
                      for (ek, dm) in node.children() {
                          for (dst, _) in dm {
                              let count = indegree.entry(*dst).or_default();
                              *count += 1;
                              if *count == 1 {
                                  unique_parent.insert(*dst, (node.id(), ek.clone()));
                              } else {
                                  unique_parent.remove(dst);
                              }
                          }
                      }
                      if node.is_end() {
                          continue;
                      }
                      let mut total_dests = 0;
                      let mut only_edge = None;
                      for (ek, dm) in node.children() {
                          for (dst, sids) in dm {
                              total_dests += 1;
                              if total_dests == 1 {
                                  only_edge = Some((ek.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                      if total_dests == 1 {
                          let (ek, dst, sids) = only_edge.unwrap();
                          out_info.insert(node_id, (ek, dst, sids));
                      }
                  }

                  let mut rewrites = vec![];
                  for u_id in trie.node_ids() {
                      if roots_set.contains(&u_id) {
                          continue;
                      }
                      if let (Some((out_key, v_id, s_uv)), Some((p_id, in_key))) =
                          (out_info.get(&u_id), unique_parent.get(&u_id))
                      {
                          if p_id != &u_id && in_key.pop == out_key.pop && in_key.tokens == out_key.tokens
                          {
                              rewrites.push((*p_id, u_id, *v_id, in_key.clone(), s_uv.clone()));
                          }
                      }
                  }

                  if rewrites.is_empty() {
                      break;
                  }

                  for (p_id, u_id, v_id, key, s_uv) in rewrites {
                      if let Some(s_pu) = trie.remove_edge_dest(p_id, &key, u_id) {
                          let s_comp = s_pu.intersect(&s_uv);
                          if !s_comp.is_empty() {
                              trie.add_edge(p_id, key, v_id, s_comp);
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/eliminate_pop0.rs: |+
      use std::collections::{BTreeMap, BTreeSet};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct EliminatePop0ExceptRootsPass;

      impl OptimizationPass for EliminatePop0ExceptRootsPass {
          fn name(&self) -> &'static str {
              "EliminatePop0ExceptRoots"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              // This pass eliminates pop=0 edges on non-root nodes by merging them into predecessors.
              // After this loop, only root nodes may have pop=0 edges.
              let mut changed = true;
              while changed {
                  changed = false;
                  let node_ids: Vec<_> = trie.node_ids().collect();
                  let root_set: BTreeSet<_> = trie.root_ids.iter().copied().collect();

                  for b_id in node_ids {
                      if root_set.contains(&b_id) {
                          continue;
                      }

                      // Must clone, as we will be modifying the trie.
                      let b_node = if let Some(n) = trie.get_node(b_id) {
                          n.clone()
                      } else {
                          continue;
                      };

                      let mut pop0_edges = BTreeMap::new();
                      let mut non_pop0_edges = BTreeMap::new();

                      for (ek, dm) in b_node.children() {
                          if ek.pop == 0 {
                              pop0_edges.insert(ek.clone(), dm.clone());
                          } else {
                              non_pop0_edges.insert(ek.clone(), dm.clone());
                          }
                      }

                      if pop0_edges.is_empty() {
                          continue;
                      }

                      changed = true;
                      let parents_of_b = b_node.parents().clone();

                      for (pop0_ek, pop0_dm) in &pop0_edges {
                          for (c_id, sids_bc) in pop0_dm {
                              for (a_id, edges_from_a_to_b) in &parents_of_b {
                                  for (ek_ab, sids_ab) in edges_from_a_to_b {
                                      let new_tokens = ek_ab.tokens.intersect(&pop0_ek.tokens);
                                      if new_tokens.is_empty() { continue; }
                                      let new_sids = sids_ab.intersect(sids_bc);
                                      if new_sids.is_empty() { continue; }
                                      let new_ek = EdgeKey::new(ek_ab.pop, new_tokens);
                                      trie.add_edge(*a_id, new_ek, *c_id, new_sids);
                                  }
                              }
                          }
                      }
                      trie.set_children(b_id, non_pop0_edges);
                  }
              }
          }
      }

    src/trie3_opt/passes/factor_common_destinations.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct FactorCommonDestinationsPass {
          min_incoming: usize,
      }

      impl FactorCommonDestinationsPass {
          pub fn new(min_incoming: usize) -> Self {
              Self { min_incoming }
          }
      }

      impl OptimizationPass for FactorCommonDestinationsPass {
          fn name(&self) -> &'static str {
              "FactorCommonDestinations"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              if self.min_incoming == 0 {
                  return;
              }

              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              // Map: dest -> { (pop, tokens) -> { states -> [sources] } }
              let mut incoming_map: HashMap<NodeId, HashMap<EdgeKey, HashMap<SortedSet, Vec<NodeId>>>> =
                  HashMap::new();

              for src_node in trie.nodes() {
                  for (edge_key, dest_map) in src_node.children() {
                      for (dest_id, sids) in dest_map {
                          incoming_map
                              .entry(*dest_id)
                              .or_default()
                              .entry(edge_key.clone())
                              .or_default()
                              .entry(sids.clone())
                              .or_default()
                              .push(src_node.id());
                      }
                  }
              }

              for (dest_id, edges_by_key) in incoming_map {
                  for (edge_key, sources_by_sids) in edges_by_key {
                      for (sids, sources) in sources_by_sids {
                          if sources.len() >= self.min_incoming {
                              // Create intermediate node
                              let intermediate_id = trie.add_node(false);

                              // Add edge from intermediate to original destination
                              trie.add_edge(intermediate_id, edge_key.clone(), dest_id, sids.clone());

                              // Reroute sources to point to intermediate node
                              for src_id in &sources {
                                  trie.remove_edge_dest(*src_id, &edge_key, dest_id);

                                  // Add new edge to intermediate node. Use the same token-set as the factored key
                                  // instead of "all tokens" to avoid massive token-universe expansions in the MiniTrie.
                                  // This preserves exact semantics: the original (pop, tokens)->dest is now
                                  // source --(0, tokens)--> intermediate --(pop, tokens)--> dest.
                                  let none_like_edge_key = EdgeKey::new(0, edge_key.tokens.clone());
                                  trie.add_edge(
                                      *src_id,
                                      none_like_edge_key,
                                      intermediate_id,
                                      all_states.clone(),
                                  );
                              }
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/generalize_sids.rs: |
      use std::collections::{BTreeMap, HashMap, VecDeque};

      use crate::glr::{parser::GLRParser, table::StateID};
      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct GeneralizeSidsPass;

      impl OptimizationPass for GeneralizeSidsPass {
          fn name(&self) -> &'static str {
              "GeneralizeSids"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let parser = if let Some(p) = &ctx.parser {
                  p.borrow()
              } else {
                  return;
              };

              let one_step_back_map = parser.build_one_step_back_map();
              let mut max_pop = 0;
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if ek.pop > 0 {
                          max_pop = max_pop.max(ek.pop as usize);
                      }
                  }
              }
              if max_pop == 0 {
                  return;
              }

              let num_levels = (max_pop as f64).log2().ceil() as usize + 1;
              let mut two_power_back_maps: Vec<BTreeMap<StateID, SortedSet>> =
                  Vec::with_capacity(num_levels);
              two_power_back_maps.push(
                  one_step_back_map
                      .into_iter()
                      .map(|(k, v)| (k, SortedSet::from_iter(v.iter())))
                      .collect(),
              );

              for i in 1..num_levels {
                  let prev_map = &two_power_back_maps[i - 1];
                  let mut next_map: BTreeMap<StateID, SortedSet> = BTreeMap::new();
                  for (&state_id, preds1) in prev_map {
                      let mut preds2 = SortedSet::new();
                      for pred1_val in preds1.iter() {
                          let sid = StateID(pred1_val);
                          if let Some(preds_of_pred) = prev_map.get(&sid) {
                              preds2.union_inplace(preds_of_pred);
                          }
                      }
                      if !preds2.is_empty() {
                          next_map.insert(state_id, preds2);
                      }
                  }
                  two_power_back_maps.push(next_map);
              }

              let apply_n_step_back = |s: &SortedSet, n: usize| -> SortedSet {
                  let mut current_s = s.clone();
                  for k in 0..two_power_back_maps.len() {
                      if (n >> k) & 1 == 1 {
                          let map_k = &two_power_back_maps[k];
                          let mut next_s = SortedSet::new();
                          for state_id_val in current_s.iter() {
                              let state_id = StateID(state_id_val);
                              if let Some(preds) = map_k.get(&state_id) {
                                  next_s.union_inplace(preds);
                              }
                          }
                          current_s = next_s;
                      }
                  }
                  current_s
              };

              let mut possible_states: HashMap<NodeId, SortedSet> = HashMap::new();
              let mut worklist: VecDeque<NodeId> = VecDeque::new();
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              for root_id in &trie.root_ids {
                  possible_states.insert(*root_id, all_states.clone());
                  worklist.push_back(*root_id);
              }

              while let Some(u_id) = worklist.pop_front() {
                  let s_u = possible_states.get(&u_id).cloned().unwrap_or_default();
                  if s_u.is_empty() {
                      continue;
                  }
                  let u_node = trie.get_node(u_id).unwrap();
                  for (ek, dm) in u_node.children() {
                      let s_u_popped = if ek.pop > 0 {
                          apply_n_step_back(&s_u, ek.pop as usize)
                      } else {
                          s_u.clone()
                      };
                      if s_u_popped.is_empty() {
                          continue;
                      }
                      for (v_id, sids_uv) in dm {
                          let s_transmitted = s_u_popped.intersect(sids_uv);
                          if s_transmitted.is_empty() {
                              continue;
                          }
                          let s_v_old = possible_states.entry(*v_id).or_default();
                          let old_len = s_v_old.len();
                          s_v_old.union_inplace(&s_transmitted);
                          if s_v_old.len() > old_len {
                              worklist.push_back(*v_id);
                          }
                      }
                  }
              }

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = node.children().clone();

                  for (_ek, dm) in &mut new_children {
                      dm.retain(|v_id, sids| {
                          if let Some(s_v) = possible_states.get(v_id) {
                              let intersection = sids.intersect(s_v);
                              if !intersection.is_empty() {
                                  *sids = intersection;
                                  true
                              } else {
                                  false
                              }
                          } else {
                              // v is not reachable with any valid state, so this edge is dead.
                              false
                          }
                      });
                  }
                  new_children.retain(|_, dm| !dm.is_empty());
                  trie.set_children(node_id, new_children);
              }
          }
      }
    src/trie3_opt/passes/merge_bisimulation.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct MergeBisimulationPass {
          max_iters: usize,
      }

      impl MergeBisimulationPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeBisimulationPass {
          fn name(&self) -> &'static str {
              "MergeBisimulation"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let id_to_idx: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              let mut prev_class: Vec<usize> = vec![0; n];
              for (i, id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*id).unwrap();
                  prev_class[i] = if node.is_end() { 1 } else { 0 };
              }

              for _ in 0..self.max_iters {
                  type AggregatedEdge = ((isize, SortedSet, usize), SortedSet);
                  type Signature = (bool, Vec<AggregatedEdge>);
                  let mut sig_to_id: HashMap<Signature, usize> = HashMap::new();
                  let mut new_class = vec![0; n];
                  let mut next_id = 0;
                  let mut changes = 0;

                  for (u_idx, u_id) in node_ids.iter().enumerate() {
                      let u_node = trie.get_node(*u_id).unwrap();
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in u_node.children() {
                          for (v_id, sids) in dm {
                              let dest_class = prev_class[id_to_idx[v_id]];
                              let key = (ek.pop, ek.tokens.clone(), dest_class);
                              aggr.entry(key).or_default().union_inplace(sids);
                          }
                      }
                      let sig = (u_node.is_end(), aggr.into_iter().collect());
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let id = next_id;
                          next_id += 1;
                          id
                      });
                      new_class[u_idx] = cid;
                      if new_class[u_idx] != prev_class[u_idx] {
                          changes += 1;
                      }
                  }
                  prev_class = new_class;
                  if changes == 0 {
                      break;
                  }
              }

              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  if representatives[class_id].is_none() {
                      representatives[class_id] = Some(node_ids[u_idx]);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  node_to_rep.insert(node_ids[u_idx], representatives[class_id].unwrap());
              }

              for (class_id, rep_id_opt) in representatives.iter().enumerate() {
                  if let Some(rep_id) = rep_id_opt {
                      let exemplar_idx = prev_class.iter().position(|&c| c == class_id).unwrap();
                      let exemplar_node = trie.get_node(node_ids[exemplar_idx]).unwrap().clone();

                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          for (v_id, sids) in dm {
                              let v_class = prev_class[id_to_idx[v_id]];
                              aggr.entry((ek.pop, ek.tokens.clone(), v_class))
                                  .or_default()
                                  .union_inplace(sids);
                          }
                      }

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for ((pop, tokens, dest_class), sids) in aggr {
                          if let Some(dest_rep) = representatives[dest_class] {
                              let key = EdgeKey::new(pop, tokens);
                              new_children.entry(key).or_default().insert(dest_rep, sids);
                          }
                      }
                      trie.set_children(*rep_id, new_children);
                  }
              }

              let rep_set: std::collections::HashSet<NodeId> =
                  representatives.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false);
                  }
              }

              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
    src/trie3_opt/passes/merge_equivalent_llm_tokens.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet};

      use crate::trie3_opt::{context::OptimizationContext, core::{MiniTrie, SortedSet}, passes::OptimizationPass, NodeId};

      pub struct MergeEquivalentLLMTokensPass;

      impl OptimizationPass for MergeEquivalentLLMTokensPass {
          fn name(&self) -> &'static str {
              "MergeEquivalentLLMTokens"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let sv_rc = if let Some(sv_rc) = &ctx.stage_vocab {
                  sv_rc
              } else {
                  return;
              };

              let mut all_bvs = HashSet::new();
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if !ek.tokens.is_empty() {
                          all_bvs.insert(ek.tokens.clone());
                      }
                  }
              }
              if all_bvs.is_empty() {
                  return;
              }

              let max_tok = ctx.max_llm_token_id;
              let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
              let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
              class_to_tokens.insert(0, (0..=max_tok).collect());
              let mut num_classes = 1;

              for splitter_bv in all_bvs {
                  let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
                  for token in splitter_bv.iter() {
                      if token <= max_tok {
                          let class_id = token_to_class[token];
                          members_in_splitter_by_class.entry(class_id).or_default().push(token);
                      }
                  }

                  for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                      let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                      if old_class_size > 0 && !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                          let new_class_id = num_classes;
                          num_classes += 1;
                          for &token in &tokens_for_new_class {
                              token_to_class[token] = new_class_id;
                          }
                          let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                          let moved_tokens_set: HashSet<_> = tokens_for_new_class.iter().cloned().collect();
                          old_class_tokens.retain(|t| !moved_tokens_set.contains(t));
                          class_to_tokens.insert(new_class_id, tokens_for_new_class);
                      }
                  }
              }

              let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
              for group in class_to_tokens.values() {
                  if group.len() > 1 {
                      let rep = *group.iter().min().unwrap();
                      for &t in group {
                          if t != rep {
                              old_to_new.insert(t, rep);
                          }
                      }
                  }
              }

              if old_to_new.is_empty() {
                  return;
              }

              let remap_sorted_set = |s: &SortedSet| -> SortedSet {
                  let mut new_elems = Vec::with_capacity(s.len());
                  for elem in s.iter() {
                      new_elems.push(old_to_new.get(&elem).copied().unwrap_or(elem));
                  }
                  SortedSet::from_iter(new_elems)
              };

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = BTreeMap::new();
                  for (mut ek, dm) in node.children().clone() {
                      ek.tokens = remap_sorted_set(&ek.tokens);
                      let entry: &mut BTreeMap<NodeId, SortedSet> = new_children.entry(ek).or_default();
                      for (dst, sids) in dm {
                          entry.entry(dst).or_default().union_inplace(&sids);
                      }
                  }
                  trie.set_children(node_id, new_children);
              }

              let mut sv_ref = sv_rc.borrow_mut();
              let sv = &mut **sv_ref;
              for (old, rep) in old_to_new {
                  if let Some(moved) = sv.internal_to_original.remove(&old) {
                      let entry = sv.internal_to_original.entry(rep).or_default();
                      *entry |= &moved;
                      for o in moved.iter() {
                          sv.original_to_internal.insert(o, rep);
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/merge_global_atoms.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::collections::hash_map::Entry;

      use kdam::{BarExt, tqdm};
      use crate::profiler::PROGRESS_BAR_ENABLED;

      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{EdgeKey, MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct MergeGlobalAtomsPass {
          max_iters: usize,
          max_atoms_per_pop: usize,
      }

      impl MergeGlobalAtomsPass {
          pub fn new(max_iters: usize, max_atoms_per_pop: usize) -> Self {
              Self { max_iters, max_atoms_per_pop }
          }
      }

      impl OptimizationPass for MergeGlobalAtomsPass {
          fn name(&self) -> &'static str {
              "MergeGlobalAtoms"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let id_to_idx: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              let mut by_pop_masks: BTreeMap<isize, HashSet<SortedSet>> = BTreeMap::new();
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if !ek.tokens.is_empty() {
                          by_pop_masks.entry(ek.pop).or_default().insert(ek.tokens.clone());
                      }
                  }
              }

              // Build a per-pop union of all tokens that actually appear at that pop.
              // This dramatically reduces the universe size versus 0..=max_llm_token_id.
              let mut union_by_pop: BTreeMap<isize, SortedSet> = BTreeMap::new();
              for (pop, masks) in &by_pop_masks {
                  let mut acc: HashSet<usize> = HashSet::new();
                  for m in masks {
                      for t in m.iter() {
                          acc.insert(t);
                      }
                  }
                  union_by_pop.insert(*pop, SortedSet::from_iter(acc.into_iter()));
              }

              let mut atoms_by_pop: BTreeMap<isize, Vec<SortedSet>> = BTreeMap::new();
              let mut aborted_any_pop = false;
              for (pop, masks) in &by_pop_masks {
                  let universe = union_by_pop.get(pop).cloned().unwrap_or_else(SortedSet::new);
                  let mut blocks = if universe.is_empty() { Vec::new() } else { vec![universe.clone()] };
                  let mut aborted = false;
                  #[cfg(not(rustrover))]
                  let it_masks = tqdm!(
                      masks.iter(),
                      desc = &format!("MergeGlobalAtoms: BuildAtoms(pop={})", pop),
                      total = masks.len(),
                      disable = !PROGRESS_BAR_ENABLED,
                      leave = false
                  );
                  #[cfg(rustrover)]
                  let it_masks = masks.iter();

                  for m in it_masks {
                      if blocks.is_empty() {
                          break;
                      }
                      let mut next_blocks = Vec::with_capacity(blocks.len().saturating_mul(2));
                      let mut any_split = false;
                      for b in &blocks {
                          // If no overlap, forward the block unchanged to avoid allocations.
                          if !b.intersects(&m) {
                              next_blocks.push(b.clone());
                              continue;
                          }
                          // Split: intersection and difference
                          let inter = b.intersect(&m);
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff = b.difference(&m);
                          if !diff.is_empty() {
                              next_blocks.push(diff);
                          }
                          any_split = true;
                      }
                      if self.max_atoms_per_pop > 0 && next_blocks.len() > self.max_atoms_per_pop {
                          aborted = true;
                          aborted_any_pop = true;
                          break;
                      }
                      if !any_split {
                          // No change for this mask; keep current blocks.
                          continue;
                      }
                      blocks = next_blocks;
                  }
                  atoms_by_pop.insert(
                      *pop,
                      if aborted { 
                          // We do NOT fall back to a coarse "universe" atom because that is unsound.
                          // We record the abort and return early below (no changes).
                          blocks 
                      } else { 
                          blocks 
                      }
                  );
              }

              // If atom construction was aborted for any pop, we cannot safely proceed without
              // risking unsound merges. Abort the pass with no changes.
              if aborted_any_pop {
                  return;
              }

              // Create dense IDs for all unique token sets for faster lookups.
              let mut unique_token_sets: HashMap<SortedSet, usize> = HashMap::new();
              let mut next_token_set_id = 0;
              for masks in by_pop_masks.values() {
                  for mask in masks {
                      match unique_token_sets.entry(mask.clone()) {
                          Entry::Vacant(e) => {
                              e.insert(next_token_set_id);
                              next_token_set_id += 1;
                          }
                          Entry::Occupied(_) => {}
                      };
                  }
              }

              // Precompute atom overlaps for each unique token set ID.
              // Map: pop -> Vec<Vec<usize>> where outer vec is indexed by token_set_id
              let mut atom_idxs_by_pop_token_set_id: BTreeMap<isize, Vec<Vec<usize>>> = BTreeMap::new();
              for (pop, atoms) in &atoms_by_pop {
                  if let Some(masks) = by_pop_masks.get(pop) {
                      let pop_map = atom_idxs_by_pop_token_set_id.entry(*pop).or_insert_with(Vec::new);
                      pop_map.resize(next_token_set_id, Vec::new());
                      for mask in masks {
                          let token_set_id = *unique_token_sets.get(mask).unwrap();
                          let mut idxs = Vec::new();
                          for (i, atom) in atoms.iter().enumerate() {
                              if mask.intersects(atom) {
                                  idxs.push(i);
                              }
                          }
                          pop_map[token_set_id] = idxs;
                      }
                  }
              }
              // Compute pop=0 distance for initial partitioning.
              let mut pop0_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_rev_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_out_degree = vec![0; n];
              for u_node in trie.nodes() {
                  let u_idx = id_to_idx[&u_node.id()];
                  for (ek, dm) in u_node.children() {
                      if ek.pop == 0 {
                          for v_id in dm.keys() {
                              pop0_adj[u_idx].push(*v_id);
                              pop0_rev_adj[id_to_idx[v_id]].push(u_node.id());
                              pop0_out_degree[u_idx] += 1;
                          }
                      }
                  }
              }

              let mut dist = vec![0; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              for i in 0..n {
                  if pop0_out_degree[i] == 0 {
                      q.push_back(i);
                  }
              }

              let mut processed_count = 0;
              while let Some(v_idx) = q.pop_front() {
                  processed_count += 1;
                  for u_id in &pop0_rev_adj[v_idx] {
                      let u_idx = id_to_idx[u_id];
                      dist[u_idx] = dist[u_idx].max(1 + dist[v_idx]);
                      pop0_out_degree[u_idx] -= 1;
                      if pop0_out_degree[u_idx] == 0 {
                          q.push_back(u_idx);
                      }
                  }
              }

              if processed_count < n {
                  let max_dist = n + 1;
                  for i in 0..n {
                      if pop0_out_degree[i] > 0 {
                          q.push_back(i);
                      }
                  }
                  while let Some(v_idx) = q.pop_front() {
                      if dist[v_idx] != max_dist {
                          dist[v_idx] = max_dist;
                          for u_id in &pop0_rev_adj[v_idx] {
                              q.push_back(id_to_idx[u_id]);
                          }
                      }
                  }
              }

              // Partition refinement.
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class_id = 0;
              for (i, id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*id).unwrap();
                  let key = (node.is_end(), dist[id_to_idx[id]]);
                  let class_id = *class_map.entry(key).or_insert_with(|| {
                      let id = next_class_id;
                      next_class_id += 1;
                      id
                  });
                  prev_class[i] = class_id;
              }

              // Refine until convergence. If max_iters > 0 and we do not converge within
              // the budget, abort to preserve semantics.
              let mut iter_num = 0usize;
              loop {
                  type InternedEdgeSig = Vec<(usize, usize)>; // (dest_class, sset_id)
                  type InternedNodeSig = (bool, Vec<((isize, usize), InternedEdgeSig)>); // (is_end, [((pop, atom_idx), edge_sig)])

                  let mut sset_interner: HashMap<SortedSet, usize> = HashMap::new();
                  let mut next_sset_id = 0;

                  let mut sig_to_id: HashMap<InternedNodeSig, usize> = HashMap::new();
                  let mut next_id = 0;
                  let mut new_class = vec![0; n];
                  let mut changes = 0;

                  #[cfg(not(rustrover))]
                  let it_nodes = tqdm!(
                      node_ids.iter().enumerate(),
                      desc = &format!("MergeGlobalAtoms: Refine iter {}", iter_num + 1),
                      total = node_ids.len(),
                      disable = !PROGRESS_BAR_ENABLED,
                      leave = false
                  );
                  #[cfg(rustrover)]
                  let it_nodes = node_ids.iter().enumerate();

                  for (u_idx, u_id) in it_nodes {
                      let u_node = trie.get_node(*u_id).unwrap();
                      let mut per_atom_aggr: BTreeMap<(isize, usize), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in u_node.children() {
                          if let Some(pop_map) = atom_idxs_by_pop_token_set_id.get(&ek.pop) {
                              if let Some(token_set_id) = unique_token_sets.get(&ek.tokens) {
                                  if let Some(atom_idxs) = pop_map.get(*token_set_id) {
                                      for &atom_idx in atom_idxs {
                                          let entry = per_atom_aggr.entry((ek.pop, atom_idx)).or_default();
                                          for (v_id, sids) in dm {
                                              let dest_class = prev_class[id_to_idx[v_id]];
                                              entry.entry(dest_class).or_default().union_inplace(sids);
                                          }
                                      }
                                  }
                              }
                          }
                      }
                      let mut sig_entries_interned: Vec<((isize, usize), InternedEdgeSig)> = Vec::with_capacity(per_atom_aggr.len());
                      for ((pop, atom_idx), dm) in per_atom_aggr {
                          let mut dest_vec: InternedEdgeSig = Vec::with_capacity(dm.len());
                          for (dest_class, sids) in dm {
                              let sset_id = *sset_interner.entry(sids).or_insert_with(|| { let id = next_sset_id; next_sset_id += 1; id });
                              dest_vec.push((dest_class, sset_id));
                          }
                          sig_entries_interned.push(((pop, atom_idx), dest_vec));
                      }

                      let sig: InternedNodeSig = (u_node.is_end(), sig_entries_interned);
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| { let id = next_id; next_id += 1; id });
                      new_class[u_idx] = cid;
                      if new_class[u_idx] != prev_class[u_idx] { changes += 1; }
                  }
                  prev_class = new_class;
                  if changes == 0 { 
                      break; 
                  }

                  iter_num += 1;
                  if self.max_iters > 0 && iter_num >= self.max_iters {
                      // Not converged within budget: abort without changing the trie.
                      return;
                  }
              }

              // Rewire and rebuild.
              let final_partition = &prev_class;
              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  if representatives[class_id].is_none() {
                      representatives[class_id] = Some(node_ids[u_idx]);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  node_to_rep.insert(node_ids[u_idx], representatives[class_id].unwrap());
              }

              // Rebuild representative edges.
              for class_id in 0..num_classes {
                  if let Some(rep_id) = representatives[class_id] {
                      let exemplar_idx = final_partition.iter().position(|&c| c == class_id).unwrap();
                      let exemplar_id = node_ids[exemplar_idx];
                      let exemplar_node = trie.get_node(exemplar_id).unwrap().clone();

                      // Aggregate by (pop, tokens, dest_class) -> union of sids
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          for (v_id, sids) in dm {
                              let v_class = final_partition[id_to_idx[v_id]];
                              aggr.entry((ek.pop, ek.tokens.clone(), v_class))
                                  .or_default()
                                  .union_inplace(sids);
                          }
                      }

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for ((pop, tokens, dest_class), sids) in aggr {
                          if let Some(dest_rep) = representatives[dest_class] {
                              let key = EdgeKey::new(pop, tokens);
                              new_children.entry(key).or_default().insert(dest_rep, sids);
                          }
                      }
                      trie.set_children(rep_id, new_children);
                  }
              }

              // Clear children of non-representatives.
              let rep_set: HashSet<NodeId> = representatives.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false); // Non-reps are effectively deleted.
                  }
              }

              // Remap roots.
              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
