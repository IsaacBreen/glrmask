  - user: |-
      Instead of always merging into one precompute node, keep it as a btreeset of precompute nodes, and loop over them to do the push-related stuff. ie repeat the node-specific code for each node in the set.
      This saves us creating unnecessary merges.
      Only merge when there are more than 10 nodes in the set.
      When merging, use EdgeInserter and try to merge into an existing node with edge value None before creating one.

      In all cases when merging, share the newly created node between edges in the set. Don't create a different node for each edge in the set.
      Create the node outside the loop.
