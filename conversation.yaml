          for prod in productions {
              let lhs = &prod.lhs;
              let rhs = &prod.rhs;

              let mut first_non_nullable_symbol: Option<&Symbol> = None;
              let mut first_non_nullable_idx: Option<usize> = None;

              // Find the first non-nullable symbol and its index
