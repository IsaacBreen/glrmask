          fn get_id_to_token_map(&self, py: Python) -> PyResult<PyObject> {
              let dict = PyDict::new_bound(py);
              for (token_bytes, token_id) in self.inner.llm_vocab.llm_token_map.iter() {
                  dict.set_item(token_id.0, token_bytes.as_slice())?;
