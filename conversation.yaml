          pub fn copy_subgraph_in_place(&mut self, start_id: NWAStateID) -> (NWAStateID, HashMap<NWAStateID, NWAStateID>) {
              let mut remap: HashMap<NWAStateID, NWAStateID> = HashMap::new();
              if start_id >= self.len() {
