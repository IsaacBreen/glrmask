              let c = new_node(&god);
              add_edge(&god, a, b, TestEK::new(3, Some(0)));
              add_edge(&god, b, c, TestEK::new(-2, Some(2)));
              let roots = vec![a];
              run_test(&god, &roots)
          }

          #[test]
