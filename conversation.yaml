          /// Returns a new `GSSNode` representing the destination node.
          /// In the simplified design, `Acc` is only at roots; this just returns the node.
          #[allow(dead_code)] pub(crate) fn resolved_node(&self) -> Arc<GSSNode> {
              self.node.clone()
