      	fn internal_bv_to_original_with_map(
      		&self,
      		internal_bv: &LLMTokenBV,
      		internal_to_original: &BTreeMap<usize, LLMTokenBV>,
      		_internal_max_llm_token: usize,
      	) -> LLMTokenBV {
      		let mut original_bv = HybridBitset::zeros();
      		if internal_bv.is_all() {
      			// Fast path for "all tokens"
      			for bv in internal_to_original.values() {
      				original_bv |= bv;
      			}
      		} else {
      			for i in internal_bv.iter() {
      				if let Some(bv) = internal_to_original.get(&i) {
      					original_bv |= bv;
      				}
      			}
      		}
      		original_bv
      	}

          fn original_bv_to_internal_with_map(
              &self,
              original_bv: &LLMTokenBV,
              original_to_internal: &BTreeMap<usize, usize>,
              _original_max_llm_token: usize,
          ) -> LLMTokenBV {
              let mut internal_bv = HybridBitset::zeros();
              if original_bv.is_all() {
                  // Fast path for "all tokens"
                  for &internal_id in original_to_internal.values() {
                      internal_bv.insert(internal_id);
                  }
              } else {
                  for i in original_bv.iter() {
                      if let Some(&internal_id) = original_to_internal.get(&i) {
                          internal_bv.insert(internal_id);
                      }
                  }
              }
              internal_bv
          }

          fn compute_possible_matches_for_vocab_node(
              tokenizer: &Regex,
              vocab_node: &VocabPrefixTreeNode,
              tokenizer_state_id: TokenizerStateID,
              cache: &mut HashMap<(*const VocabPrefixTreeNode, TokenizerStateID), BTreeMap<GrammarTokenID, LLMTokenBV>>,
          ) -> BTreeMap<GrammarTokenID, LLMTokenBV> {
              let cache_key = (vocab_node as *const VocabPrefixTreeNode, tokenizer_state_id);
              if let Some(cached_result) = cache.get(&cache_key) {
                  return cached_result.clone();
              }

              let mut result_map: BTreeMap<GrammarTokenID, LLMTokenBV> = BTreeMap::new();

              for (segment_bytes, child_vocab_arc) in vocab_node.iter_children() {
                  let child_vocab_node_ref = child_vocab_arc; // Get &VocabPrefixTreeNode
                  let exec_result = tokenizer.execute_from_state(&segment_bytes, tokenizer_state_id);

                  for token_match in &exec_result.matches {
                      let grammar_token_id = GrammarTokenID(token_match.id);
                      // LLM tokens reachable under child_vocab_node_ref are those that start with segment_bytes
                      let applicable_tokens_rangeset = child_vocab_node_ref.reachable_token_ids();
                      result_map.entry(grammar_token_id).or_insert_with(LLMTokenBV::zeros)
                          .extend(applicable_tokens_rangeset.iter());
                  }

                  if let Some(final_state_val) = exec_result.end_state {
                      let final_tokenizer_state_id = TokenizerStateID(final_state_val);

                      let matches_possible_from_new_tokenizer_state: BTreeSet<_> = tokenizer
                          .tokens_accessible_from_state(final_tokenizer_state_id)
                          .into_iter()
                          .collect();

                      let matches_from_current_segment: BTreeSet<_> = exec_result
                          .matches
                          .iter()
                          .map(|m| GrammarTokenID(m.id))
                          .collect();

                      let new_grammar_tokens_to_look_for = &matches_possible_from_new_tokenizer_state - &matches_from_current_segment;

                      if !new_grammar_tokens_to_look_for.is_empty() {
                          let next_results = Self::compute_possible_matches_for_vocab_node(
                              tokenizer,
                              child_vocab_node_ref, // Recurse with the child node
                              final_tokenizer_state_id,
                              cache,
                          );
                          for (token, bv) in next_results {
                              *result_map.entry(token).or_insert_with(LLMTokenBV::zeros) |= bv;
                          }
                      }
                  }
              }
              cache.insert(cache_key, result_map.clone());
              result_map
          }

          pub fn print_gss_nodes(&self, roots: &Vec<Arc<GSSNode>>, labels: Option<&[String]>) {
              let config = GSSPrintConfig {
                  labels,
                  max_edges: 500,
                  original_internal_bimap: None,
                  llm_token_map: Some(&self.llm_vocab.llm_token_map),
                  verbose: false,
              };

              let (gss_str, state_ids) = print_gss_forest(roots, &self.parser.terminal_map, &config);
              println!("{}", gss_str);
          }
      }

      pub(crate) struct Precomputer0<'r> {
          pub(crate) tokenizer:        &'r Regex,
          pub(crate) parser:           Option<&'r GLRParser>,
          pub(crate) llm_vocab:        Option<Arc<LLMVocab>>,
          pub(crate) vocab:            VocabPrefixTree,
          pub(crate) roots:            BTreeMap<TokenizerStateID, PrecomputeNode0Index>,
          pub(crate) possible_matches: RefCell<BTreeMap<*const VocabPrefixTreeNode, BTreeMap<TokenizerStateID, BTreeMap<GrammarTokenID, LLMTokenBV>>>>,
          pub(crate) all_llm_tokens:   HybridBitset,
          pub(crate) merge_threshold:  usize,
          pub(crate) pb:               ProgressBar,
          pub(crate) stats:            PrecomputeStats,
          pub(crate) terminal_follow_map: &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          pub(crate) ignore_terminal_id: Option<TerminalID>,
          pub(crate) token_name_map:   &'r BiBTreeMap<Terminal, usize>,
          // One end node per final tokenizer state.
          pub(crate) end_nodes:        BTreeMap<TokenizerStateID, PrecomputeNode0Index>,
          pub(crate) trie0_god:        Trie0GodWrapper,
      }

      pub(crate) struct Precomputer1<'r> {
          pub(crate) tokenizer:        &'r Regex,
          pub(crate) parser:           Option<&'r GLRParser>,
          pub(crate) llm_vocab:        Option<Arc<LLMVocab>>,
          pub(crate) vocab:            VocabPrefixTree, // This will be moved out during dfs
          pub(crate) roots:            BTreeMap<TokenizerStateID, TempPrecomputeNode1Index>,
          pub(crate) possible_matches: RefCell<BTreeMap<*const VocabPrefixTreeNode, BTreeMap<TokenizerStateID, BTreeMap<GrammarTokenID, LLMTokenBV>>>>,
          pub(crate) all_llm_tokens:   RangeSetBlaze<usize>,
          pub(crate) merge_threshold:  usize,
          pub(crate) pb:               ProgressBar,
          pub(crate) stats:            PrecomputeStats,
          pub(crate) terminal_follow_map: &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          pub(crate) ignore_terminal_id: Option<TerminalID>,
          pub(crate) token_name_map:   &'r BiBTreeMap<Terminal, usize>,
          pub(crate) leaf_node:        TempPrecomputeNode1Index,
          pub(crate) dfs_stats:        DfsStats,
          pub(crate) trie1_god:        TempTrie1GodWrapper,
      }

      impl<'r> Precomputer0<'r> {}
      impl<'r> Precomputer1<'r> {
          fn new(
              tokenizer:        &'r Regex,
              parser:           Option<&'r GLRParser>,
              llm_vocab:        Option<Arc<LLMVocab>>,
              internal_llm_token_map: &BiBTreeMap<Vec<u8>, LLMTokenID>,
              internal_max_llm_token: usize,
              merge_threshold:  usize,
              terminal_follow_map: &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
              ignore_terminal_id: Option<TerminalID>,
              token_name_map: &'r BiBTreeMap<Terminal, usize>,
          ) -> Self {
              let tokens: Vec<(usize, Vec<u8>)> = internal_llm_token_map
                  .iter()
                  .map(|(bytes, id)| (id.0 as usize, bytes.clone()))
                  .collect();

              crate::debug!(2, "Building vocab prefix tree");
              let vocab = VocabPrefixTree::build(&tokens);
              crate::debug!(2, "Done building vocab prefix tree");

              let mut roots = BTreeMap::new();
              let trie1_god = TempTrie1GodWrapper::new();
              for sid in tokenizer.iter_states() {
                  roots.insert(
                      sid,
                      TempPrecomputeNode1Index::new(trie1_god.insert(TempPrecomputeNode1::new(TempPrecomputedNodeContents::root(internal_max_llm_token)))),
                  );
              }
              crate::debug!(2, "Created trie1 roots for {} tokenizer states", tokenizer.iter_states().count());

              crate::debug!(2, "Counting vocab nodes for progress bar...");
              let total_nodes = count_vocab_nodes(&vocab.root);
              crate::debug!(2, "Counted {} vocab nodes", total_nodes);
              let pb = ProgressBar::new(total_nodes);
              pb.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [{elapsed_precise}] \
                                 [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta})")
                      .expect("progress-bar"),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb.set_draw_target(ProgressDrawTarget::hidden());
              }

              let leaf_node = TempPrecomputeNode1Index::new(trie1_god.insert(TempPrecomputeNode1::new(TempPrecomputedNodeContents::leaf())));
              crate::debug!(2, "Created trie1 leaf node");

              Self {
                  tokenizer,
                  parser,
                  llm_vocab,
                  vocab,
                  roots,
                  possible_matches: RefCell::new(BTreeMap::new()), // This is for grammar tokens, not LLM tokens
                  all_llm_tokens: RangeSetBlaze::from_iter(0..=internal_max_llm_token),
                  merge_threshold,
                  pb,
                  stats: PrecomputeStats::default(),
                  terminal_follow_map,
                  ignore_terminal_id,
                  token_name_map,
                  leaf_node,
                  dfs_stats: DfsStats::default(),
                  trie1_god,
              }
          }

          fn get_leaf_node(&self) -> TempPrecomputeNode1Index {
              self.leaf_node.clone()
          }

          fn finish(self) -> (BTreeMap<TokenizerStateID, PrecomputeNode1Index>, Trie1GodWrapper) {
              let final_trie1_god = Trie1GodWrapper::new();
              let mut final_roots = BTreeMap::new();
              let mut node_map: HashMap<TempPrecomputeNode1Index, PrecomputeNode1Index> = HashMap::new();

              for (sid, temp_root) in self.roots {
                  let final_root = Self::convert_trie1_recursive(
                      temp_root,
                      &self.trie1_god,
                      &final_trie1_god,
                      &mut node_map,
                  );
                  final_roots.insert(sid, final_root);
              }

              (final_roots, final_trie1_god)
          }

          fn convert_trie1_recursive(
              temp_idx: TempPrecomputeNode1Index,
              temp_god: &TempTrie1GodWrapper,
              final_god: &Trie1GodWrapper,
              node_map: &mut HashMap<TempPrecomputeNode1Index, PrecomputeNode1Index>,
          ) -> PrecomputeNode1Index {
              if let Some(final_idx) = node_map.get(&temp_idx) {
                  return *final_idx;
              }

              let temp_guard = temp_idx.read(temp_god).unwrap();
              let final_node_contents = PrecomputedNodeContents {
                  end: temp_guard.value.end,
                  live_tokens: HybridBitset { inner: crate::datastructures::cache::intern_l1(temp_guard.value.live_tokens.clone()) },
              };
              let new_node = PrecomputeNode1::new(final_node_contents);
              let final_idx = PrecomputeNode1Index::new(final_god.insert(new_node));
              node_map.insert(temp_idx, final_idx);

              let children_to_copy = temp_guard.children().clone();
              drop(temp_guard);

              for (ek, dest_map) in children_to_copy {
                  for (temp_child_idx, rs_blaze) in dest_map {
                      let final_child_idx = Self::convert_trie1_recursive(temp_child_idx, temp_god, final_god, node_map);
                      let hybrid_bitset = HybridBitset { inner: crate::datastructures::cache::intern_l1(rs_blaze) };
                      final_god.insert_edge_simple(final_idx, final_child_idx, ek.clone(), hybrid_bitset);
                  }
              }

              final_idx
          }


          fn possible_matches(&self, vocab_node: &VocabPrefixTreeNode, tokenizer_state_id: TokenizerStateID) -> BTreeMap<GrammarTokenID, LLMTokenBV> {
              let cache_key_ptr = vocab_node as *const VocabPrefixTreeNode;

              if let Some(cached_for_vocab_node) = self.possible_matches.borrow().get(&cache_key_ptr) {
                  if let Some(cached_result) = cached_for_vocab_node.get(&tokenizer_state_id) {
                      return cached_result.clone();
                  }
              }

              let mut result_map: BTreeMap<GrammarTokenID, LLMTokenBV> = BTreeMap::new();

              for (segment_bytes, child_vocab_node) in vocab_node.iter_children() {
                  let exec_result = self.tokenizer.execute_from_state(&segment_bytes, tokenizer_state_id);
                  for token in &exec_result.matches {
                      let grammar_token_id = GrammarTokenID(token.id);
                      let applicable_tokens = child_vocab_node.reachable_token_ids();
                      *result_map.entry(grammar_token_id).or_insert_with(LLMTokenBV::zeros) |= HybridBitset::from(applicable_tokens);
                  }
                  if let Some(final_state_val) = exec_result.end_state {
                      let matches_possible_from_tokenizer_state: BTreeSet<_> = self.tokenizer.tokens_accessible_from_state(TokenizerStateID(final_state_val)).into_iter().collect();
                      let matches_here: BTreeSet<_> = exec_result.matches.iter().map(|m| GrammarTokenID(m.id)).collect();
                      let possible_new_matches = &matches_possible_from_tokenizer_state - &matches_here;
                      if !possible_new_matches.is_empty() {
                          let next_results = self.possible_matches(child_vocab_node, TokenizerStateID(final_state_val));
                          for (token, bv) in next_results {
                              *result_map.entry(token).or_insert_with(LLMTokenBV::zeros) |= bv;
                          }
                      }
                  }
              }

              self.possible_matches.borrow_mut().entry(cache_key_ptr).or_default().insert(tokenizer_state_id, result_map.clone());

              result_map
          }

          fn run_dfs(&mut self) {
              let mut assoc: BTreeMap<
                  TokenizerStateID,
                  HashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>>,
              > = BTreeMap::new();

              for (sid, arc) in &self.roots {
                  assoc
                      .entry(*sid)
                      .or_default()
                      .insert(arc.clone(), self.all_llm_tokens.clone());
              }

              crate::debug!(2, "Starting precompute DFS");
              crate::debug!(6, "Roots for each tokenizer state:");
              for (sid, root) in &self.roots {
                  crate::debug!(6, "  {}: {}", sid.0, root);
              }
              crate::profiler::reset();
              // Temporarily move vocab out of self to satisfy the borrow checker.
              let vocab = std::mem::replace(&mut self.vocab, VocabPrefixTree::new());
              self.dfs(&vocab.root, assoc);
              self.vocab = vocab; // Move it back.
              self.dfs_stats.print();
              crate::debug!(2, "Finished precompute DFS");
              self.pb.finish();
              crate::profiler::print_summary();
              crate::debug!(2, "Precomputation complete");
          }

          fn dfs(
              &mut self,
              vocab_node: &VocabPrefixTreeNode,
              assoc_by_state: BTreeMap<TokenizerStateID, HashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>>>,
          ) {
              self.pb.inc(1);
              for (segment_bytes, child_vocab_node) in vocab_node.iter_children() {
                  let mut work_queue: BTreeMap<
                      usize,
                      BTreeMap<TokenizerStateID, HashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>>>,
                  > = BTreeMap::new();
                  work_queue.insert(0, assoc_by_state.clone());

                  let mut next_level_assoc: BTreeMap<_, HashMap<_, _>> = BTreeMap::new();

                  // === OPTIMIZATION 1: Cache node data to avoid repeated lock acquisitions ===
                  let mut node_cache: HashMap<TempPrecomputeNode1Index, (RangeSetBlaze<usize>, bool)> = HashMap::new();
                  let get_node_data = |cache: &mut HashMap<_, _>, idx: TempPrecomputeNode1Index, god: &TempTrie1GodWrapper| {
                      cache.entry(idx).or_insert_with(|| {
                          let guard = idx.read(god).unwrap();
                          (guard.value.live_tokens.clone(), guard.value.end)
                      }).clone()
                  };

                  // === OPTIMIZATION 2: Batch all edge insertions and updates ===
                  let mut pending_edges: Vec<(TempPrecomputeNode1Index, TempPrecomputeNode1Index, Option<GrammarTokenID>, RangeSetBlaze<usize>)> = Vec::new();
                  let mut pending_live_token_updates: HashMap<TempPrecomputeNode1Index, RangeSetBlaze<usize>> = HashMap::new();

                  // === OPTIMIZATION 3: Pre-compute child_vocab reachable tokens (used frequently) ===
                  let child_reachable = child_vocab_node.reachable_token_ids();
                  let child_token_id = child_vocab_node.token_id();

                  // === OPTIMIZATION 4: Pre-compute possible_matches_at_end for all states we might need ===
                  let mut possible_matches_cache: HashMap<TokenizerStateID, BTreeMap<GrammarTokenID, LLMTokenBV>> = HashMap::new();

                  while let Some((pos, states_at_pos)) = work_queue.pop_first() {
                      if pos == segment_bytes.len() {
                          for (tokenizer_state_id, nodes_with_tokens) in states_at_pos {
                              let entry = next_level_assoc.entry(tokenizer_state_id).or_default();
                              for (node, tokens) in nodes_with_tokens {
                                  entry
                                      .entry(node)
                                      .or_insert_with(RangeSetBlaze::new)
                                      .bitor_assign(&tokens);
                              }
                          }
                          continue;
                      }

                      for (tokenizer_state_id, precompute_nodes_with_tokens) in states_at_pos {
                          let exec_result = self.tokenizer.execute_from_state(&segment_bytes[pos..], tokenizer_state_id);

                          let possible_matches_at_end = if let Some(end_state_val) = exec_result.end_state {
                              let ts = TokenizerStateID(end_state_val);
                              possible_matches_cache.entry(ts).or_insert_with(|| {
                                  self.possible_matches(child_vocab_node, ts)
                              })
                          } else {
                              &BTreeMap::new()
                          };

                          for match_info in &exec_result.matches {
                              let terminal_id = GrammarTokenID(match_info.id);
                              let next_pos = pos + match_info.width;

                              for (src_node_wrapper, src_contextual_tokens) in &precompute_nodes_with_tokens {
                                  let src_node_idx = *src_node_wrapper;

                                  // Use cache instead of repeated reads
                                  let (src_live_tokens, _) = get_node_data(&mut node_cache, src_node_idx, &self.trie1_god);

                                  // Handle exact end-of-segment match
                                  if next_pos == segment_bytes.len() {
                                      let mut edge_bv = RangeSetBlaze::new();
                                      edge_bv.insert(child_token_id);
                                      let final_edge_bv = &(&edge_bv & src_contextual_tokens) & &src_live_tokens;

                                      if !final_edge_bv.is_empty() {
                                          let end_idx = self.get_leaf_node();
                                          pending_edges.push((src_node_idx, end_idx, Some(terminal_id), final_edge_bv.clone()));
                                          pending_live_token_updates.entry(end_idx)
                                              .or_insert_with(RangeSetBlaze::new)
                                              .bitor_assign(&final_edge_bv);
                                      }
                                  }

                                  // Compute edge_bv once
                                  let mut edge_bv = child_reachable.clone();
                                  if next_pos == segment_bytes.len() {
                                      edge_bv.remove(child_token_id);
                                  }
                                  if let Some(matches_for_terminal) = possible_matches_at_end.get(&terminal_id) {
                                      edge_bv = &edge_bv - matches_for_terminal.inner.as_ref();
                                  }

                                  let edge_bv_for_inserter = &(&edge_bv & src_contextual_tokens) & &src_live_tokens;
                                  if edge_bv_for_inserter.is_empty() { continue; }

                                  let next_tokenizer_state = self.tokenizer.initial_state_id();
                                  let dest_nodes_in_queue = work_queue.entry(next_pos)
                                      .or_default()
                                      .entry(next_tokenizer_state)
                                      .or_default();

                                  // Find or create destination node
                                  let mut dest_node_opt = dest_nodes_in_queue.iter()
                                      .filter_map(|(dest_node, dest_contextual_tokens)| {
                                          let (dest_live_tokens, is_end) = get_node_data(&mut node_cache, *dest_node, &self.trie1_god);
                                          if is_end { return None; }

                                          let risky_tokens = &edge_bv_for_inserter - dest_contextual_tokens;
                                          if risky_tokens.is_empty() || (&risky_tokens & &dest_live_tokens).is_empty() {
                                              Some(*dest_node)
                                          } else {
                                              None
                                          }
                                      }).next();

                                  if dest_node_opt.is_none() {
                                      // Check existing children - read once
                                      let children_of_src: Vec<TempPrecomputeNode1Index> = {
                                          let guard = src_node_idx.read(&self.trie1_god).unwrap();
                                          guard.children().values().flat_map(|m| m.keys().cloned()).collect()
                                      };

                                      dest_node_opt = children_of_src.iter()
                                          .filter(|child_arc| {
                                              let (child_live_tokens, is_end) = get_node_data(&mut node_cache, **child_arc, &self.trie1_god);
                                              !is_end && (&child_live_tokens & &edge_bv_for_inserter).is_empty()
                                          }).copied().next();
                                  }

                                  let result_node = dest_node_opt.unwrap_or_else(|| {
                                       let new_node = TempPrecomputeNode1::new(TempPrecomputedNodeContents::internal());
                                       let idx = TempPrecomputeNode1Index::new(self.trie1_god.insert(new_node));
                                       node_cache.insert(idx, (RangeSetBlaze::new(), false));
                                       idx
                                  });

                                  pending_edges.push((src_node_idx, result_node, Some(terminal_id), edge_bv_for_inserter.clone()));
                                  pending_live_token_updates.entry(result_node)
                                      .or_insert_with(RangeSetBlaze::new)
                                      .bitor_assign(&edge_bv_for_inserter);

                                  // Update cache
                                  node_cache.entry(result_node)
                                      .and_modify(|(live, _)| *live |= &edge_bv_for_inserter);

                                  dest_nodes_in_queue.entry(result_node)
                                      .or_insert_with(RangeSetBlaze::new)
                                      .bitor_assign(&edge_bv_for_inserter);
                              }
                          }

                          // Handle continuation state
                          if let Some(end_state_val) = exec_result.end_state {
                              let final_tokenizer_state = TokenizerStateID(end_state_val);
                              let accessible_terminals = self.tokenizer.tokens_accessible_from_state(final_tokenizer_state);

                              for (src_node_wrapper, src_contextual_tokens) in &precompute_nodes_with_tokens {
                                  let mut edge_bv = RangeSetBlaze::new();
                                  edge_bv.insert(child_token_id);
                                  let edge_bv_for_inserter = &edge_bv & src_contextual_tokens;
                                  if edge_bv_for_inserter.is_empty() { continue; }

                                  let src_node_idx = *src_node_wrapper;
                                  let (src_live_tokens, _) = get_node_data(&mut node_cache, src_node_idx, &self.trie1_god);
                                  let final_edge_bv = &edge_bv_for_inserter & &src_live_tokens;

                                  if !final_edge_bv.is_empty() {
                                      let end_idx = self.get_leaf_node();
                                      for terminal_id in &accessible_terminals {
                                          pending_edges.push((src_node_idx, end_idx, Some(*terminal_id), final_edge_bv.clone()));
                                          pending_live_token_updates.entry(end_idx)
                                              .or_insert_with(RangeSetBlaze::new)
                                              .bitor_assign(&final_edge_bv);
                                      }
                                  }
                              }

                              let entry = next_level_assoc.entry(final_tokenizer_state).or_default();
                              for (node, tokens) in precompute_nodes_with_tokens {
                                  entry.entry(node).or_default().bitor_assign(&tokens);
                              }
                          }
                      }
                  }

                  // === OPTIMIZATION 5: Batch write all edges and updates ===
                  for (src, dst, key, bv) in pending_edges {
                      self.trie1_god.insert_edge_simple(src, dst, key, bv);
                  }

                  for (node_idx, live_tokens) in pending_live_token_updates {
                      if let Some(mut guard) = node_idx.write(&self.trie1_god) {
                          guard.value.live_tokens |= &live_tokens;
                      }
                  }

                  if !next_level_assoc.is_empty() {
                      self.dfs(child_vocab_node, next_level_assoc);
                  }
              }
          }
      }

      fn count_vocab_nodes(node: &VocabPrefixTreeNode) -> u64 {
          1 + node
              .children()
              .values()
              .map(|c| count_vocab_nodes(c))
              .sum::<u64>()
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
          stack_state_id: StateID,
      }

      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }

      impl<K, V> InsertWith<K, V> for BTreeMap<K, V> where K: Eq + Ord {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F) {
              match self.entry(k) {
                  std::collections::btree_map::Entry::Occupied(mut occupied) => {
                      let value = occupied.get_mut();
                      combine(value, v);
                  }
                  std::collections::btree_map::Entry::Vacant(vacant) => {
                      vacant.insert(v);
                  }
              }
          }
      }

      fn format_bv(bv: &LLMTokenBV) -> String {
          if bv.is_empty() {
              "[]".to_string()
          } else if *bv == HybridBitset::max_ones() {
              "[ALL]".to_string()
          } else {
              format!("[len={}]", bv.len())
          }
      }

      #[derive(Debug, Clone)]
      pub struct GrammarConstraintState<'a> {
          pub parent: &'a GrammarConstraint,
          pub state:  BTreeMap<TokenizerStateID, GLRParserState<'a>>,
      }

      #[derive(Default, Clone)]
      struct TokenAcc {
          small: Vec<usize>,
          big: Vec<RangeSetBlaze<usize>>,
      }

      impl TokenAcc {
          fn add_token(&mut self, token: usize) {
              self.small.push(token);
          }

          fn add_bitset(&mut self, bitset: RangeSetBlaze<usize>) {
              if bitset.is_empty() {
                  return;
              }
              if bitset.len() == 1 {
                  self.small.push(bitset.iter().next().unwrap());
              } else {
                  self.big.push(bitset);
              }
          }

          fn len(&self) -> usize {
              self.small.len() + self.big.len()
          }
      }

      pub type Trie0GodWrapper = GodWrapper<Option<(TerminalID, Option<TokenizerStateID>)>, HybridBitset, PrecomputedNodeContents0>;
      pub type Trie0God = God<Option<(TerminalID, Option<TokenizerStateID>)>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie1GodWrapper = GodWrapper<Option<TerminalID>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie1God = God<Option<TerminalID>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie2GodWrapper = GodWrapper<(usize, Option<StateID>), HybridBitset, PrecomputedNodeContents>;
      pub type Trie2God = God<(usize, Option<StateID>), HybridBitset, PrecomputedNodeContents>;
      pub type Trie3GodWrapper = GodWrapper<(isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents>;
      pub type Trie3God = God<(isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents>;

      impl<'a> PartialEq for GrammarConstraintState<'a> {
          fn eq(&self, other: &Self) -> bool {
              // Compare parent by pointer to ensure they originate from the same constraint object.
              std::ptr::eq(self.parent, other.parent) && self.state == other.state
          }
      }

      impl<'a> Eq for GrammarConstraintState<'a> {}

      impl<'a> Display for GrammarConstraintState<'a> {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "GrammarConstraintState ({} active tokenizer states):", self.state.len())?;
              if self.state.is_empty() {
                  return Ok(());
              }

              let mut gss_roots = Vec::new();
              let mut tokenizer_state_info = Vec::new();

              for (tokenizer_state_id, glr_state) in &self.state {
                  if !glr_state.active_state.stack.is_empty() {
                      gss_roots.push(glr_state.active_state.stack.clone());
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: GSS Root ({} predecessors)",
                          tokenizer_state_id.0,
                          glr_state.active_state.stack.num_predecessors()
                      ));
                  } else {
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: (Empty GSS)",
                          tokenizer_state_id.0
                      ));
                  }
              }

              for info in tokenizer_state_info {
                  writeln!(f, "{}", info)?;
              }

              if !gss_roots.is_empty() {
                  writeln!(f, "\nCombined GSS Forest (showing up to 50 nodes):")?;
              let config = GSSPrintConfig {
                  labels: None,
                  max_edges: 50,
                  original_internal_bimap: None,
                  llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                  verbose: false,
              };
                  let (gss_str, _) = print_gss_forest(&gss_roots, &self.parent.parser.terminal_map, &config);
                  write!(f, "{}", gss_str)?;
              }

              Ok(())
          }
      }

      impl<'a> GrammarConstraintState<'a> {
          fn transform_gss_stacks<M, F>(&mut self, mut f: F)
          where
              M: Default,
              F: FnMut(&mut Arc<GSSNode>, &mut M),
          {
              let mut memo = M::default();
              for s in self.state.values_mut() {
                  f(&mut s.active_state.stack, &mut memo);
              }
          }

          fn map_gss_stacks<M, F>(&mut self, mut f: F)
          where
              M: Default,
              F: FnMut(&mut Arc<GSSNode>, &mut M) -> Arc<GSSNode>,
          {
              let mut memo = M::default();
              for s in self.state.values_mut() {
                  s.active_state.stack = f(&mut s.active_state.stack, &mut memo);
              }
          }

          pub fn compute_commit_maps(&self, llm_token_bytes: &[u8]) -> (BTreeMap<TokenizerStateID, TokenizerStateID>, BTreeMap<TokenizerStateID, TerminalBV>) {
              let mut state_map: BTreeMap<TokenizerStateID, TokenizerStateID> = BTreeMap::new();
              let mut terminals_map: BTreeMap<TokenizerStateID, TerminalBV> = BTreeMap::new();
              for (tokenizer_state_id, _state) in self.state.iter() {
                  let exec_result = self.parent.tokenizer.execute_from_state(
                      &llm_token_bytes,
                      *tokenizer_state_id,
                  );
                  if let Some(new_state) = exec_result.end_state {
                      state_map.insert(*tokenizer_state_id, TokenizerStateID(new_state));
                  }
                  let mut terminals = TerminalBV::zeros();
                  for token in exec_result.matches {
                      terminals.insert(token.id);
                  }
                  terminals_map.insert(*tokenizer_state_id, terminals);
              }
              (state_map, terminals_map)
          }

          pub fn get_mask(&self) -> LLMTokenBV {
              // return HybridBitset::ones(self.parent.llm_vocab.max_original_llm_token_id + 1); // TEMP
              // self.get_mask1()
              // self.get_mask2()
              self.get_mask3()
          }

          #[time_it]
          pub fn get_mask1(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(3, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot( // TODO: fix this
                      &roots_with_labels,
                      Some(&self.parent.precompute_vocab1.original_to_internal),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());

              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              #[derive(Default, Clone, Copy, Debug)]
              struct StepCount {
                  total: usize,
                  successful: usize,
              }

              let step_counts = Arc::new(RwLock::new(BTreeMap::<TerminalID, StepCount>::new()));

              let mut initial_values_for_map: Vec<(PrecomputeNode1Index, GLRParserState<'a>)> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  // crate::debug!(4, "Initializing GSS for state {}", tokenizer_state_id.0);
                  // Ensure the GLR state's GSS stack is not empty before proceeding
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed1.get(tokenizer_state_id) {
                      let mut glr_state = glr_state.clone();
                      prune_llm_tokens_by_disallowed_terminals(
                          &mut glr_state.active_state.stack,
                          &self.parent.possible_matches,
                          &mut HashMap::new(),
                      );
                      initial_values_for_map.push((precomputed_trie_root_arc.clone(), glr_state));
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              if initial_values_for_map.is_empty() {
                   // This can happen if all GLR states had empty GSS stacks or no corresponding precomputed tries.
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original_precompute1(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));
              }

              let step_counts_clone1 = Arc::clone(&step_counts);
              let step_counts_clone2 = Arc::clone(&step_counts);

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie1_god,
                  initial_values_for_map,
                  // step_fn: (current_glr_state, edge_grammar_token_opt, destinations_map)
                  |glr_s, grammar_token_opt, dest_map| {
                      if true {
                          timeit!("get_mask try to avoid step for no additional llm tokens", {
                          let mut all_edge_llm_tokens = HybridBitset::zeros();
                          for edge_llm_tokens_bv in dest_map.values() {
                              all_edge_llm_tokens |= edge_llm_tokens_bv;
                          }
                          let glr_s_llm_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                          let potential_additional_llm_tokens = &glr_s_llm_tokens & &all_edge_llm_tokens;
                          if potential_additional_llm_tokens.is_subset(&final_mask_internal.borrow()) {
                              // If the potential additional tokens are already in the final mask, skip stepping.
                              crate::debug!(4, "Skipping step for grammar token {:?} as all edge LLM tokens are already in final mask.", grammar_token_opt);
                              return Vec::new();
                          }
                          });
                      }

                      // let mut glr_s = glr_s.clone();
                      // disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());

                      // Count num end nodes vs non end nodes
                      let mut num_end = 0;
                      let mut num_non_end = 0;
                      for child_node_trie_data in dest_map.keys() {
                          if child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                              num_end += 1;
                          } else {
                              num_non_end += 1;
                          }
                      }
                      timeit!(format!("get_mask step_fn - end only? {}", num_end > 0 && num_non_end == 0), {
                          if num_non_end == 0 {
                              if let Some(gtid) = grammar_token_opt {
                                  // let stats = gather_gss_stats(&[glr_s.active_state.stack.as_ref()]);
                                  // crate::debug!(3, "Step for grammar token {:?} with only end nodes, GSS stats: {:#?}", gtid, stats);
                                  // Perhaps we can avoid stepping by calling `has_action_for`
                                  match glr_s.has_action_for(*gtid) {
                                      Some(glr_s_llm_tokens) => {
                                          timeit!(format!("get_mask step_fn - has_action_for"), {
                                              // This token will succeed
                                              crate::debug!(4, "Step with grammar token {:?} ({}) has action, but all children are end nodes, so we can skip stepping and update final mask directly.", gtid, self.parent.parser.terminal_map.get_by_right(gtid).map_or("UNKNOWN_TERMINAL".to_string(), |s| s.to_string()));
                                              let mut edge_llm_tokens = HybridBitset::zeros();
                                              for edge_llm_tokens_bv in dest_map.values() {
                                                  edge_llm_tokens |= edge_llm_tokens_bv;
                                              }
                                              let llm_tokens = &glr_s_llm_tokens & &edge_llm_tokens;
                                              crate::debug!(4, "Adding active tokens {:?} to final mask", llm_tokens);
                                              *final_mask_internal.borrow_mut() |= llm_tokens;
                                              crate::debug!(4, "Final mask after adding tokens: {:?}", final_mask_internal.borrow());
                                              return Vec::new();
                                          });
                                      },
                                      None => {
                                          timeit!(format!("get_mask step_fn - has_action_for - inconclusive"), {
                                              // Inconclusive
                                              crate::debug!(4, "Inconclusive step for grammar token {:?}, no action found.", gtid);
                                          });
                                      },
                                  }
                              }
                          }

                          let mut glr_s = glr_s.clone();

                          if let Some(gtid) = grammar_token_opt {
                              let mut counts_guard = step_counts_clone1.write().unwrap();
                              let entry = counts_guard.entry(*gtid).or_default();
                              entry.total += 1;

                              let terminal_name = self.parent.parser.terminal_map.get_by_right(gtid)
                                  .map(|s| s.to_string())
                                  .unwrap_or("UNKNOWN_TERMINAL".to_string());
                              // timeit!(format!("get_mask step for terminal '{}'", terminal_name), {
                              glr_s.process_token(*gtid);
                              // });

                              crate::debug!(4, "glr_s.is_ok()_after_process_token: {}", glr_s.is_ok());

                              if glr_s.is_ok() {
                                  entry.successful += 1;
                              } else {
                                  return Vec::new();

                              }
                          }

                          // glr_s.log_gss("After stepping", grammar_token_opt.unwrap_or(TerminalID(0)));
                          // disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());

                          let mut results = Vec::new();

                          crate::debug!(4, "Processing edge: {:?}", grammar_token_opt);
                          for (child_node_trie_data, edge_llm_tokens_bv) in dest_map.iter() {
                              let mut glr_s = glr_s.clone();
                              allow_only_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &edge_llm_tokens_bv, &mut HashMap::new());
                              crate::debug!(4, "Stepping with grammar_token_opt: {:?}", grammar_token_opt);
                              glr_s.log_gss("Stepping with grammar_token_opt", grammar_token_opt.unwrap_or(TerminalID(0)), false, false);
                              crate::debug!(4, "Active LLM tokens: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                              crate::debug!(4, "Edge LLM tokens: {:?}", edge_llm_tokens_bv);
                              // crate::debug!(4, "Intersecting with edge_llm_tokens_bv: {:?}", edge_llm_tokens_bv);
                              // subtract_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());
                              // glr_s.log_gss("After intersecting", grammar_token_opt.unwrap_or(TerminalID(0)));

                              if !glr_s.is_ok() {
                                  crate::debug!(4, "GLR state is not alive after step, skipping.");
                                  continue;
                              }

                              if child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                                  let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                                  crate::debug!(4, "Adding active tokens {:?} to final mask", glr_active_tokens);
                                  // timeit!("get_mask final_mask update", {
                                  *final_mask_internal.borrow_mut() |= glr_active_tokens;
                                  // });
                                  crate::debug!(4, "Final mask after adding end node tokens: {:?}", final_mask_internal.borrow());
                              }

                              results.push((child_node_trie_data.clone(), glr_s));
                          }
                          crate::debug!(4, "Step function results len: {}", results.len());
                          results
                      })
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      timeit!("get_mask merge_fn", {
                          crate::debug!(4, "Active LLM tokens in glr_s1 before merge: {:?}", glr_s1.active_state.stack.allowed_llm_tokens());
                          crate::debug!(4, "Active LLM tokens in glr_s2 before merge: {:?}", glr_s2.active_state.stack.allowed_llm_tokens());
                          glr_s1.merge_with(glr_s2);
                          crate::debug!(4, "Active LLM tokens in glr_s1 after merge: {:?}", glr_s1.active_state.stack.allowed_llm_tokens());
                      })
                  },
                  // process_fn: (precomputed_node_data, final_glr_s_for_this_path)
                  |precomputed_node_data, glr_s| {
                      timeit!("get_mask process_fn", {
                          crate::debug!(4, "Processing precomputed node data: {:?}", precomputed_node_data);
                          if precomputed_node_data.value.end {
                              let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                              crate::debug!(4, "Precomputed node data is an end node, adding active tokens {:?} to final mask", glr_active_tokens);
                              *final_mask_internal.borrow_mut() |= glr_active_tokens;
                              crate::debug!(4, "Final mask after adding end node tokens: {:?}", final_mask_internal.borrow());
                              false
                          } else {
                              let mut num_outgoing_edges_that_lead_to_non_end_nodes = 0;
                              for (edge_terminal_opt, dest_map) in precomputed_node_data.children().iter() {
                                  if edge_terminal_opt.is_none() {
                                      num_outgoing_edges_that_lead_to_non_end_nodes += 1
                                  } else {
                                      for (child_node_trie_data, _edge_llm_tokens_bv) in dest_map.iter() {
                                          if !child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                                              num_outgoing_edges_that_lead_to_non_end_nodes += 1;
                                              break;
                                          }
                                      }
                                  }
                                  if num_outgoing_edges_that_lead_to_non_end_nodes >= 2 {
                                      break; // No need to check further, we have at least two non-end nodes.
                                  }
                              }
                              // Print GSS stats
                              disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());
                              Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                              let stats = gather_gss_stats(&[glr_s.active_state.stack.as_ref()]);
                              // crate::debug!(3, "GSS stats for precomputed node data: {:#?}", stats);
                              let mut do_phase3 = false;
                              do_phase3 |= num_outgoing_edges_that_lead_to_non_end_nodes >= 2;
                              do_phase3 |= match LR_MODE {
                                  LRMode::LR1 | LRMode::LALR_EX_SHIFT_STATES => false,
                                  LRMode::LALR => true,
                              };
                              // do_phase3 |= true;
                              if do_phase3 {
                                  // There will be a split.
                                  // Let's do some work ahead of time to avoid redundant computations due to the upcoming split.
                                  crate::debug!(4, "Processing non-end precomputed node data");
                                  crate::debug!(4, "Active LLM tokens before phase 3: {:?}", glr_s.active_state.stack.allowed_llm_tokens());

                                  let mut allowed_terminals = TerminalBV::zeros();
                                  for gtid_opt in precomputed_node_data.children().keys() {
                                      if let Some(gtid) = gtid_opt {
                                          allowed_terminals.insert(gtid.0);
                                      }
                                  }
                                  let disallowed_terminals_bv = allowed_terminals.inverted();
                                  if !disallowed_terminals_bv.is_empty() {
                                      let disallowed_l2 = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::from_iter(
                                          std::iter::once((0..=usize::MAX, disallowed_terminals_bv))
                                      );
                                      disallow_terminals_and_prune_arc(&mut glr_s.active_state.stack, &disallowed_l2, &mut HashMap::new());
                                  }

                                  glr_s.process_default_reductions();
                                  crate::debug!(4, "After phase 3, active stack.stack.is_empty(): {}", glr_s.active_state.stack.is_empty());
                                  Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                                  crate::debug!(4, "Active LLM tokens after phase 3: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                                  crate::debug!(4, "Disallowing LLM tokens and pruning arc for precomputed node data: {:?}", final_mask_internal.borrow());
                                  Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                              }
                              crate::debug!(4, "After processing precomputed node data, active stack.stack.is_empty(): {}", glr_s.active_state.stack.is_empty());
                              crate::debug!(4, "Final active LLM tokens: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                              !glr_s.active_state.stack.is_empty()
                          }
                      })
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));
              }

              crate::profiler::print_summary_flat();

              let counts = step_counts.read().unwrap();
              if !counts.is_empty() {
                  let mut sorted_counts: Vec<_> = counts.iter().collect();
                  sorted_counts.sort_by_key(|&(_, count)| std::cmp::Reverse(count.total));

                  let mut log_msg = String::from("get_mask step() counts:");
                  for (terminal_id, count) in sorted_counts {
                      let terminal_name = self.parent.parser.terminal_map.get_by_right(terminal_id)
                          .map(|s| s.to_string())
                          .unwrap_or("UNKNOWN_TERMINAL".to_string());
                      log_msg.push_str(&format!("\n  - '{}': {}/{} successful", terminal_name, count.successful, count.total));
                  }
                  crate::debug!(3, "{}", log_msg);
              }

              crate::profiler::print_summary();
              crate::profiler::reset();

              // Log the GSSs
              if GSS_LOGGING_ENABLED {
                  crate::debug!(3, "Final GSS states after get_mask:");
                  let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
                  let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
                  let config = GSSPrintConfig {
                      labels: Some(&labels),
                      max_edges: 300,
                      original_internal_bimap: None,
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  print!("{}", print_gss_forest(&roots, &self.parent.parser.terminal_map, &config).0);
              }

              let final_mask_mapped = self.parent.internal_bv_to_original_precompute1(&final_mask_internal.into_inner());

              let t_end = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("get_mask took: {:>15?}", t_end.duration_since(t0));
              }

              final_mask_mapped
          }

          pub fn get_mask2(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(2, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot( // TODO: fix this
                      &roots_with_labels,
                      Some(&self.parent.precompute_vocab1.original_to_internal),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());

              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              #[derive(Default, Clone, Copy, Debug)]
              struct StepCount {
                  total: usize,
                  successful: usize,
              }

              let step_counts = Arc::new(RwLock::new(BTreeMap::<TerminalID, StepCount>::new()));

              let mut initial_values_for_map: Vec<(Trie2Index, GLRParserState<'a>)> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  // crate::debug!(4, "Initializing GSS for state {}", tokenizer_state_id.0);
                  // Ensure the GLR state's GSS stack is not empty before proceeding
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed2.get(tokenizer_state_id) {
                      let mut glr_state = glr_state.clone();
                      prune_llm_tokens_by_disallowed_terminals(
                          &mut glr_state.active_state.stack,
                          &self.parent.possible_matches,
                          &mut HashMap::new(),
                      );
                      initial_values_for_map.push((precomputed_trie_root_arc.clone(), glr_state));
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              if initial_values_for_map.is_empty() {
                   // This can happen if all GLR states had empty GSS stacks or no corresponding precomputed tries.
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original_precompute2(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));
              }

              let step_counts_clone1 = Arc::clone(&step_counts);
              let step_counts_clone2 = Arc::clone(&step_counts);

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie2_god,
                  initial_values_for_map,
                  // step_fn: (current_glr_state, (k, option state ID), destinations_map)
                  |glr_s, (k, expected_state_id_opt ), dest_map| {
                      // if !glr_s.is_ok() {
                      //     crate::debug!(4, "GLR state is not alive before popping, skipping.");
                      //     return Vec::new();
                      // }
                      crate::debug!(4, "Processing step for k: {:?}, expected_state_id_opt: {:?}", k, expected_state_id_opt);
                      // glr_s.log_gss("Before popping", TerminalID(0), false, false);
                      let mut out_gsss = Vec::new();
                      let popped = glr_s.active_state.stack.popn(*k);
                      for popper_item in popped.iter() {
                          for peek in popper_item.peek_iter() {
                              let ok = if let Some(expected_state_id) = expected_state_id_opt {
                                  expected_state_id == &peek.edge_value().state_id
                              } else {
                                  true
                              };
                              if ok {
                                  out_gsss.push(peek.isolated_parent());
                              }
                          }
                      }
                      if out_gsss.is_empty() {
                          crate::debug!(4, "No valid GSS nodes after popping, skipping.");
                          return Vec::new();
                      }
                      let out_gss = GSSNode::merge_many_with_depth(1, out_gsss);
                      crate::debug!(4, "After popping {} from GSS: {}", k, print_gss_forest(&[out_gss.clone()], &self.parent.parser.terminal_map, &GSSPrintConfig::default()).0);
                      // if !out_gss.is_alive() {
                      //     crate::debug!(4, "GLR state is not alive after popping, skipping.");
                      //     return Vec::new();
                      // }
                      let mut out = Vec::new();
                      for (dst_node_wrapper, edge_bv) in dest_map.iter() {
                          let mut out_gss_filtered = out_gss.clone();
                          crate::debug!(5, "Filtering GSS for edge LLM tokens: {:?}", edge_bv);
                          allow_only_llm_tokens_and_prune_arc(&mut out_gss_filtered, edge_bv, &mut HashMap::new());
                          let mut out_glr_s = glr_s.clone();
                          out_glr_s.active_state.stack = out_gss_filtered;
                          crate::debug!(4, "Allowed LLM tokens in out_gss_filtered: {:?}", out_glr_s.active_state.stack.allowed_llm_tokens());
                          // out_glr_s.log_gss("After filtering for edge LLM tokens", TerminalID(0), false, false);
                          // if out_glr_s.is_ok() {
                              out.push((dst_node_wrapper.clone(), out_glr_s));
                          }
                      // }
                      out
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      crate::debug!(4, "Merging two GLR states");
                      glr_s1.merge_with(glr_s2);
                  },
                  // process_fn: (precomputed_node_data, final_glr_s_for_this_path)
                  |precomputed_node_data, glr_s| {
                      crate::debug!(4, "Processing node {:p}", precomputed_node_data);
                      // glr_s.log_gss("At process_fn", TerminalID(0), false, false);
                      let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                      // let keep_going = !glr_active_tokens.is_empty();
                      let keep_going = glr_s.is_ok();
                      if precomputed_node_data.value.end {
                          crate::debug!(4, "Precomputed node data is an end node, adding active tokens {:?} to final mask", glr_active_tokens);
                          *final_mask_internal.borrow_mut() |= glr_active_tokens;
                      } else {
                          crate::debug!(4, "Precomputed node data is not an end node, active tokens: {:?}", glr_active_tokens);
                      }
                      keep_going
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));
              }

              crate::profiler::print_summary_flat();

              let counts = step_counts.read().unwrap();
              if !counts.is_empty() {
                  let mut sorted_counts: Vec<_> = counts.iter().collect();
                  sorted_counts.sort_by_key(|&(_, count)| std::cmp::Reverse(count.total));

                  let mut log_msg = String::from("get_mask step() counts:");
                  for (terminal_id, count) in sorted_counts {
                      let terminal_name = self.parent.parser.terminal_map.get_by_right(terminal_id)
                          .map(|s| s.to_string())
                          .unwrap_or("UNKNOWN_TERMINAL".to_string());
                      log_msg.push_str(&format!("\n  - '{}': {}/{} successful", terminal_name, count.successful, count.total));
                  }
                  crate::debug!(3, "{}", log_msg);
              }

              crate::profiler::print_summary();
              crate::profiler::reset();

              // Log the GSSs
              if GSS_LOGGING_ENABLED {
                  crate::debug!(3, "Final GSS states after get_mask:");
                  let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
                  let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
                  let config = GSSPrintConfig {
                      labels: Some(&labels),
                      max_edges: 300,
                      original_internal_bimap: None,
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  print!("{}", print_gss_forest(&roots, &self.parent.parser.terminal_map, &config).0);
              }

              crate::debug!(4, "Final mask internal: {:?}", final_mask_internal.borrow());
              let final_mask_mapped = self.parent.internal_bv_to_original_precompute2(&final_mask_internal.into_inner());
              crate::debug!(4, "Final mask mapped: {:?}", final_mask_mapped);

              let t_end = std::time::Instant::now();
              println!("get_mask took: {:>15?}", t_end.duration_since(t0));

              final_mask_mapped
          }

          pub fn print_gss_stats(&self) {
              println!("GrammarConstraintState Stats:");
              println!("  - Active tokenizer states: {}", self.state.len());
              if self.state.is_empty() {
                  println!("  - GSS is empty.");
                  return;
              }
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              println!("  - GSS Stats: {:#?}", stats);
          }

          pub fn print_gss(&self) {
              let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
              if roots.is_empty() {
                  println!("GSS is empty.");
                  return;
              }
              let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
              self.parent.print_gss_nodes(&roots, Some(&labels));
          }

          pub fn explain_stack(&self) {
              for (state_id, state) in &self.state {
                  println!("\n--- State {} ---", state_id.0);
                  // Sample and print a bunch of stacks
                  let mut seen = BTreeSet::new();
                  let num_to_sample = 10;
                  for i in 0..1000 {
                      if let Some(sampled_path_edges) = sample_path(&[&state.active_state.stack], i) {
                          let mut sampled_stack: Vec<usize> = sampled_path_edges.iter()
                              .map(|edge| edge.state_id.0)
                              .collect();
                          sampled_stack.reverse();
                          if seen.contains(&sampled_stack) {
                              continue;
                          }
                          seen.insert(sampled_stack);
                          if seen.len() >= num_to_sample {
                              break;
                          }
                      };
                  }
                  for sampled_stack in seen {
                      println!("  Sampled stack: {:?}", sampled_stack);
                  }
                  // Sample a stack
                  if let Some(sampled_path_edges) = sample_path(&[&state.active_state.stack], 1) {
                      let mut sampled_stack: Vec<StateID> = sampled_path_edges.iter()
                          .map(|edge| edge.state_id)
                          .collect();
                      sampled_stack.reverse();
                      let explanation = self.parent.parser.explain_stack(&sampled_stack);
                      // Indent the explanation for readability
                      for line in explanation.lines() {
                          println!("      {}", line);
                      }
                  };
              }
          }

          pub fn num_unique_nodes(&self) -> usize {
              gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              ).unique_nodes()
          }

          pub fn get_mask3(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(10, "\n--- get_mask3 START ---");
              crate::debug!(10, "GSS at start of get_mask3:");
              crate::debug!(3, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(10, "Initial GSS stats: {:#?}", stats);
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot( // TODO: fix this
                      &roots_with_labels,
                      Some(&self.parent.precompute_vocab1.original_to_internal),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());
              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original_precompute3(&final_mask_internal.into_inner());
              }
              let mut initial_values_by_trie_node: BTreeMap<PrecomputeNode3Index, GLRParserState<'a>> = BTreeMap::new();
              crate::debug!(10, "\n--- Seeding work queue ---");
              for (&tokenizer_state_id, glr_state) in &self.state {
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  let mut glr_state = glr_state.clone();
                  prune_llm_tokens_by_disallowed_terminals(
                      &mut glr_state.active_state.stack,
                      &self.parent.possible_matches,
                      &mut HashMap::new(),
                  );

                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed3.get(&tokenizer_state_id) {
                      crate::debug!(10, "  SEED: sid={}, root_idx={}, gss_ptr={:p}", tokenizer_state_id.0, precomputed_trie_root_arc, glr_state.active_state.stack);
                      
                      initial_values_by_trie_node.entry(precomputed_trie_root_arc.clone())
                          .and_modify(|existing_glr| {
                              existing_glr.merge_with(glr_state.clone());
                          })
                          .or_insert(glr_state.clone());
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              let initial_values_for_map: Vec<_> = initial_values_by_trie_node.into_iter().collect();

              if initial_values_for_map.is_empty() {
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));
              }

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie3_god,
                  initial_values_for_map,
                  // step_fn: (current_state, (pop, llm_token_bv), destinations_map)
                  |glr_s, (pop, llm_token_bv_from_edge), dest_map| {
                      crate::debug!(10, "  - STEP: gss_ptr={:p}, edge=(pop={}, llm_bv={})", glr_s.active_state.stack, pop, format_bv(llm_token_bv_from_edge));
                      let popped = glr_s.active_state.stack.popn(*pop as usize);
                      let num_peeks: usize = popped.iter().map(|p| p.peek_iter().count()).sum();
                      if num_peeks > 0 {
                          crate::debug!(10, "      - Popped GSS has {} peeks", num_peeks);
                      }
                      let mut results = Vec::new();

                      for (dest_idx, state_id_bv) in dest_map.iter() {
                          let mut valid_gss_nodes = Vec::new();
                          for popper_item in popped.iter() {
                              for peek in popper_item.peek_iter() {
                                  if state_id_bv.contains(peek.edge_value().state_id.0) {
                                      valid_gss_nodes.push(peek.isolated_parent());
                                  }
                              }
                          }

                          if valid_gss_nodes.is_empty() {
                              continue;
                          }

                          let merged_gss = GSSNode::merge_many_with_depth(1, valid_gss_nodes.clone());
                          let mut new_glr_s = glr_s.clone();
                          new_glr_s.active_state.stack = merged_gss;

                          allow_only_llm_tokens_and_prune_arc(&mut new_glr_s.active_state.stack, llm_token_bv_from_edge, &mut HashMap::new());

                          if new_glr_s.is_ok() {
                              crate::debug!(10, "      - Dest: idx={}, state_bv={}, matched={}, new_gss_ptr={:p}", dest_idx, format_bv(state_id_bv), valid_gss_nodes.len(), new_glr_s.active_state.stack);
                              results.push((dest_idx.clone(), new_glr_s));
                          }
                      }
                      results
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      crate::debug!(10, "    - MERGE: gss1(ptr={:p}) WITH gss2(ptr={:p})", glr_s1.active_state.stack, glr_s2.active_state.stack);
                      glr_s1.merge_with(glr_s2);
                  },
                  // process_fn: (precomputed_node_data, final_state_for_this_path)
                  |precomputed_node_data, glr_s| {
                      crate::debug!(10, "  - PROCESS: node_ptr={:p}, gss_ptr={:p}", precomputed_node_data as *const _, glr_s.active_state.stack);
                      let mut glr_s_copy = glr_s.clone();
                      let glr_active_tokens = glr_s_copy.active_state.stack.allowed_llm_tokens();
                      let keep_going = glr_s_copy.is_ok();
                      if precomputed_node_data.value.end {
                          if !glr_active_tokens.is_empty() {
                              let before = final_mask_internal.borrow().len();
                              *final_mask_internal.borrow_mut() |= &glr_active_tokens;
                              let after = final_mask_internal.borrow().len();
                              if after > before {
                                  crate::debug!(10, "    - END NODE. final_mask len: {} -> {} (+{}) with tokens {}", before, after, after - before, format_bv(&glr_active_tokens));
                              }
                          }
                      }
                      keep_going
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));
              }

              crate::profiler::print_summary_flat();
              crate::profiler::print_summary();
              crate::profiler::reset();

              crate::debug!(10, "\n--- get_mask3 END ---");
              crate::debug!(10, "Final mask internal: {}", format_bv(&final_mask_internal.borrow()));
              crate::debug!(4, "Final mask internal: {}", format_bv(&final_mask_internal.borrow()));
              let final_mask_mapped = self.parent.internal_bv_to_original_precompute3(&final_mask_internal.into_inner());
              crate::debug!(10, "Final mask mapped: {}", format_bv(&final_mask_mapped));
              crate::debug!(4, "Final mask mapped: {}", format_bv(&final_mask_mapped));

              let t_end = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("get_mask took: {:>15?}", t_end.duration_since(t0));
              }

              final_mask_mapped
          }

          pub fn commit(&mut self, llm_token_id: LLMTokenID) { // original ID
              return self.commit_bytes(&self.parent.llm_vocab.llm_token_map.get_by_right(&llm_token_id).unwrap().clone());
          }

          #[time_it]
          pub fn commit_bytes(&mut self, llm_token_bytes: &[u8]) { // llm_token_id is original
              if llm_token_bytes.is_empty() {
                  return;
              }

              crate::debug!(3, "Committing bytes: {:?}", String::from_utf8_lossy(llm_token_bytes));

              // for (state_id, state) in &self.state {
              //     crate::debug!(3, "State {} before commit:", state_id.0);
              //     state.log_gss("Before commit", TerminalID(0), false, false);
              // }

              self.transform_gss_stacks(|stack, memo| reset_llm_tokens(stack, memo));

              // Handle allowed terminals
              let (state_map, terminals_map) = self.compute_commit_maps(llm_token_bytes);

              let gss_stats_before_pruning = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(5, "Terminals map: {:?}", terminals_map);
              self.transform_gss_stacks(|stack, memo| prune_disallowed_terminals(stack, &terminals_map, memo));
              let gss_stats_after_pruning = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(4, "GSS stats before pruning disallowed terminals: {:#?}", gss_stats_before_pruning);
              if gss_stats_after_pruning != gss_stats_before_pruning {
                  crate::debug!(4, "GSS stats after pruning disallowed terminals: {:#?}", gss_stats_after_pruning);
                  crate::debug!(4, "GSS stats changed after pruning disallowed terminals.");
              } else {
                  crate::debug!(4, "GSS stats did not change after pruning disallowed terminals.");
              }

              self.transform_gss_stacks(|stack, memo| map_allowed_terminals_tokenizer_states(stack, &state_map, memo));
              // println!("State after preparation: {}", self);

              let mut new_overall_state: BTreeMap<TokenizerStateID, GLRParserState<'a>> = BTreeMap::new();

              let mut processing_queue: BTreeMap<usize, BTreeMap<TokenizerStateID, GLRParserState<'a>>> = BTreeMap::new();
              processing_queue.insert(0, std::mem::take(&mut self.state));

              while let Some((offset, states_to_process)) = processing_queue.pop_first() {
                  crate::debug!(3, "Processing offset {} with states {:?}.", offset, states_to_process.keys().map(|k| k.0).collect::<Vec<_>>());
                  for (tokenizer_s_id_at_offset, glr_s_at_offset) in states_to_process {
                      assert!(offset < llm_token_bytes.len());

                      let exec_result = self.parent.tokenizer.execute_from_state(
                          &llm_token_bytes[offset..],
                          tokenizer_s_id_at_offset,
                      );

                      for match_info in &exec_result.matches {
                          let mut cloned_glr_s = glr_s_at_offset.clone();

                          cloned_glr_s.process_token(TerminalID(match_info.id));
                          // cloned_glr_s.do_phase3();

                          if cloned_glr_s.is_ok() {
                              let new_offset = offset + match_info.width;
                              // After a grammar token is consumed, the tokenizer resets for the next segment of the LLM token.
                              let next_tokenizer_id_for_segment = self.parent.tokenizer.initial_state_id();

                              if let Some(end_state_id) = exec_result.end_state {
                                  let terminals_accessible_from_end_state = self.parent.tokenizer.tokens_accessible_from_state(TokenizerStateID(end_state_id));
                                  if terminals_accessible_from_end_state.contains(&TerminalID(match_info.id)) {
                                      let mut disallowed_terminals = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::new();
                                      let mut disallowed_terminals_for_end_state = TerminalBV::zeros();
                                      // Disallow this token from being matched again immediately.
                                      disallowed_terminals_for_end_state.insert(match_info.id);
                                      disallowed_terminals.insert_l2_bitset(end_state_id, disallowed_terminals_for_end_state);
                                      disallow_terminals_and_prune_arc(&mut cloned_glr_s.active_state.stack, &disallowed_terminals, &mut HashMap::new());
                                  }
                              }
                              // cloned_glr_s.log_gss(format!("Before disallowing terminals {:?} after committing bytes {:?}", &disallowed_terminals, &llm_token_bytes[offset..new_offset]).as_str(), TerminalID(match_info.id), false, false);
                              // cloned_glr_s.log_gss(format!("After disallowing terminals {:?} after committing bytes {:?}", &disallowed_terminals, &llm_token_bytes[offset..new_offset]).as_str(), TerminalID(match_info.id), false, false);

                              if new_offset == llm_token_bytes.len() {
                                  // reset_allowed_terminals(&mut cloned_glr_s.active_state.stack);
                                  new_overall_state.entry(next_tokenizer_id_for_segment).and_modify(|existing| existing.merge_with(cloned_glr_s.clone())).or_insert(cloned_glr_s);
                              } else {
                                  processing_queue.entry(new_offset).or_default().entry(next_tokenizer_id_for_segment).and_modify(|existing| existing.merge_with(cloned_glr_s.clone())).or_insert(cloned_glr_s);
                              }
                          }
                      }

                      if let Some(final_tokenizer_s_id_for_llm_token_segment) = exec_result.end_state {
                          // The rest of llm_token_bytes (from offset) was consumed, tokenizer ended in this state.
                          // The glr_s_at_offset is carried over. This is a state *after* the current LLM token.
                          let final_tokenizer_state = TokenizerStateID(final_tokenizer_s_id_for_llm_token_segment);
                          new_overall_state.entry(final_tokenizer_state).and_modify(|existing| existing.merge_with(glr_s_at_offset.clone())).or_insert(glr_s_at_offset.clone());
                      }
                  }
              }

              self.state = new_overall_state.clone();
              for glr_parser_state in self.state.values_mut() {
                  // glr_parser_state.process_default_reductions();
              }

              // TODO: this shouldn't be necessary, but due to some order-dependent LLM token BV weirdness in GSS, it is necessary to ensure commit order invariance.
              self.transform_gss_stacks(|stack, memo| reset_llm_tokens(stack, memo));
              self.map_gss_stacks(|stack, memo| fuse_predecessors_recursive(stack, 1, memo));
              self.state.retain(|_, glr_parser_state| glr_parser_state.is_ok());


              // Post-commit allowance check: ensure each surviving state allows at least one
              // token the tokenizer can produce from its current tokenizer state.
              // Mode is controlled by self.parent.post_commit_allow_check_mode.
              match self.parent.post_commit_allow_check_mode {
                  TerminalAllowanceCheckMode::None => {
                      // no-op
                  }
                  TerminalAllowanceCheckMode::ImmediateSets => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          // Fast auto-pass if tokenizer can produce all grammar terminals.
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }

                          let mut union = glr_state.immediate_shift_terminals();
                          union.extend(glr_state.immediate_reduce_terminals());
                          !union.is_disjoint(&accessible)
                      });
                  }
                  TerminalAllowanceCheckMode::ImmediateProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.has_immediate_action_for_terminal(*tid).unwrap_or(false) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
                  TerminalAllowanceCheckMode::StepProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.allows_terminal(*tid) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
              }

              // let mut roots: BTreeMap<TokenizerStateID, Arc<GSSNode>> = BTreeMap::new();
              // for (tokenizer_state_id, glr_state) in &self.state {
              //     roots.insert(*tokenizer_state_id, glr_state.active_state.stack.clone());
              // }
              // simplify(&mut roots);
              // for (tokenizer_state_id, glr_state) in &mut self.state {
              //     glr_state.active_state.stack = roots.get(tokenizer_state_id).unwrap().clone();
              // }

              // let mut roots_to_simplify_arcs = Vec::new();
              // for glr_parser_state in self.state.values_mut() {
              //     if !glr_parser_state.active_state.stack.is_empty() {
              //         roots_to_simplify_arcs.push(&mut glr_parser_state.active_state.stack);
              //     }
              // }
              //
              // if !roots_to_simplify_arcs.is_empty() {
              //     GSSNode::simplify_together(&mut roots_to_simplify_arcs);
              // }

              crate::debug!(4, "Active tokenizer states after committing text (bytes {:?}): {:?}", llm_token_bytes, self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              for (tokenizer_id, glr_state) in &self.state {
                  if !glr_state.active_state.stack.is_empty() { // Log only for non-empty GSS
                      // glr_state.log_gss("After commit", TerminalID(0), false, false);
                  }
              }
          }

          pub fn is_active(&self) -> bool {
              !self.state.is_empty()
          }

          pub fn state(&self) -> &BTreeMap<TokenizerStateID, GLRParserState<'a>> {
              &self.state
          }
      }

      pub(crate) type LLMTokenBV = HybridBitset;
      pub(crate) type TerminalBV = HybridBitset;
      /// A 2D bitset where L1 is tokenizer state and L2 is terminal ID.
      pub type TerminalInfo = HybridL2Bitset;
    src/constraint_precompute1_utils.rs: |
      use crate::constraint::LLMTokenBV;
      use crate::constraint::{PrecomputeNode0Index, PrecomputeNode1, PrecomputedNodeContents, Trie0GodWrapper};
      use crate::constraint::{PrecomputeNode1Index, StageVocab, Trie1GodWrapper};
      use crate::constraint_extra::PrecomputeStats;
      use crate::datastructures::hybrid_bitset::HybridBitset;
      use crate::datastructures::ordered_hash_map::Retain;
      use crate::datastructures::trie::Trie;
      use crate::datastructures::EntryApi;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use crate::tokenizer::TokenizerStateID;
      use crate::types::{TerminalID as GrammarTokenID, TerminalID};
      use bitvec::macros::internal::funty::Fundamental;
      use deterministic_hash::DeterministicHasher;
      use kdam::tqdm;
      use ordered_hash_map::OrderedHashMap;
      use range_set_blaze::RangeSetBlaze;
      use std::cmp::Reverse;
      use std::collections::{BTreeMap, BTreeSet, HashMap, HashSet, VecDeque};
      use std::hash::{DefaultHasher, Hash, Hasher};
      use std::ops::BitOrAssign;
      use std::sync::Arc;

      #[derive(Debug, Clone)]

      pub struct Trie1Config {
          pub enabled: bool,
          pub early_flatten_epsilon: bool,
          pub minimize_by_signature: bool,
          pub merge_equivalent_llm_tokens: bool,
          pub reorder_llm_tokens: bool,
          pub prune_on_no_terminal_follow: bool,
          pub prune_nodes_not_reaching_end: bool,
          pub prune_dead_paths: bool,
          pub gc: bool,
      }

      impl Default for Trie1Config {
          fn default() -> Self {
              Self {
                  enabled: true,
                  early_flatten_epsilon: true,
                  minimize_by_signature: true,
                  merge_equivalent_llm_tokens: true,
                  reorder_llm_tokens: true,
                  prune_on_no_terminal_follow: false,
                  prune_nodes_not_reaching_end: true,
                  prune_dead_paths: true,
                  gc: true,
              }
          }
      }

      impl Trie1Config {
          pub fn off() -> Self {
              Self {
                  enabled: false,
                  early_flatten_epsilon: false,
                  minimize_by_signature: false,
                  merge_equivalent_llm_tokens: false,
                  reorder_llm_tokens: false,
                  prune_on_no_terminal_follow: false,
                  prune_nodes_not_reaching_end: false,
                  prune_dead_paths: false,
                  gc: false,
              }
          }
      }

      fn constrain_bitvecs_trie1(
          trie1_god: &Trie1GodWrapper,
          roots: &[PrecomputeNode1Index],
          max_llm_token_id: usize,
      ) {
          crate::debug!(3, "Trie1: constraining LLM token bitvectors and removing empty edges...");
          let all_nodes = Trie::all_nodes(trie1_god, roots);
          for n in all_nodes {
              let mut w = n.write(trie1_god).expect("write");
              let old_children = std::mem::take(w.children_mut());
              let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dest_map) in old_children {
                  let mut new_dest_map = OrderedHashMap::new();
                  for (dst, mut bv) in dest_map {
                      bv.constrain(max_llm_token_id);
                      if !bv.is_empty() {
                          new_dest_map.insert(dst, bv);
                      }
                  }
                  if !new_dest_map.is_empty() {
                      new_children.insert(ek, new_dest_map);
                  }
              }
              *w.children_mut() = new_children;
          }
      }

      // Flatten None-key (epsilon-like) chains when safe:
      // U --(None, B1)--> V, and V is non-end with exactly one outgoing edge (None, B2) -> W (and no other edges)
      // becomes U --(None, B1 ∩ B2)--> W
      // This is exact because None edges do not perform grammar steps (in get_mask1),
      // and we do not bypass any 'end' union points (we forbid compressing through end nodes).
      fn shortcut_none_chains_trie1(
          trie1_god: &Trie1GodWrapper,
          roots: &[PrecomputeNode1Index],
      ) {
          crate::debug!(3, "Trie1: shortcutting (flattening) None-key chains where safe...");
          let nodes = Trie::all_nodes(trie1_god, roots);
          if nodes.is_empty() { return; }

          type DestList = Vec<(PrecomputeNode1Index, LLMTokenBV)>;
          type EdgeList = Vec<(Option<GrammarTokenID>, DestList)>;

          // Build summary snapshot
          let mut summary: HashMap<PrecomputeNode1Index, (bool, EdgeList)> = HashMap::new();
          for u in &nodes {
              let g = u.read(trie1_god).expect("read");
              let edges: EdgeList = g.children()
                  .iter()
                  .map(|(ek, dm)| {
                      let dests = dm.iter().map(|(d, bv)| (*d, bv.clone())).collect::<DestList>();
                      (*ek, dests)
                  })
                  .collect();
              summary.insert(*u, (g.value.end, edges));
          }

          #[derive(Clone)]
          struct ChainRes {
              last: PrecomputeNode1Index,
              llm: LLMTokenBV,
          }

          // Follow a chain of (None, B) with single outgoing None edge and non-end middle nodes.
          fn follow_none_chain(
              v: PrecomputeNode1Index,
              trie1_god: &Trie1GodWrapper,
              summary: &HashMap<PrecomputeNode1Index, (bool, EdgeList)>,
              memo: &mut HashMap<PrecomputeNode1Index, Option<ChainRes>>,
          ) -> Option<ChainRes> {
              if let Some(cached) = memo.get(&v) {
                  return cached.clone();
              }
              let (is_end, edges) = match summary.get(&v) {
                  Some(x) => x,
                  None => {
                      memo.insert(v, None);
                      return None;
                  }
              };
              if *is_end { memo.insert(v, None); return None; }

              // Count only None edges
              let mut none_edges = edges.iter().filter(|(k, _)| k.is_none());
              let next = match none_edges.next() {
                  Some(x) => x,
                  None => {
                      memo.insert(v, None);
                      return None;
                  }
              };
              // Must be the only outgoing edge and have exactly one destination.
              if edges.len() != 1 || next.1.len() != 1 {
                  memo.insert(v, None);
                  return None;
              }
              let (dst, bv2) = &next.1[0];

              let res = if let Some(tail) = follow_none_chain(*dst, trie1_god, summary, memo) {
                  Some(ChainRes { last: tail.last, llm: bv2 & &tail.llm })
              } else {
                  Some(ChainRes { last: *dst, llm: bv2.clone() })
              };
              memo.insert(v, res.clone());
              res
          }

          let mut memo: HashMap<PrecomputeNode1Index, Option<ChainRes>> = HashMap::new();

          for u in &nodes {
              // Snapshot current None edges for this node
              let none_edges_snapshot: Vec<(PrecomputeNode1Index, LLMTokenBV)> = {
                  let g = u.read(trie1_god).expect("read");
                  match g.children().get(&None) {
                      Some(dm) => dm.iter().map(|(d, bv)| (*d, bv.clone())).collect(),
                      None => Vec::new(),
                  }
              };
              if none_edges_snapshot.is_empty() { continue; }

              let mut w = u.write(trie1_god).expect("write");
              for (v, b1) in none_edges_snapshot {
                  if let Some(chain) = follow_none_chain(v, trie1_god, &summary, &mut memo) {
                      // Remove U --(None)--> V
                      if let Some(dm) = w.children_mut().get_mut(&None) {
                          dm.remove(&v);
                      }
                      // Add U --(None)--> chain.last with intersected BV
                      let new_bv = b1 & &chain.llm;
                      if !new_bv.is_empty() {
                          w.children_mut()
                              .entry(None)
                              .or_default()
                              .entry(chain.last)
                              .and_modify(|e| *e |= &new_bv)
                              .or_insert(new_bv);
                      }
                  }
              }
          }
      }

      // Backward liveness pruning for Trie1:
      // - Seed end nodes with ALL internal tokens (conservative upper bound).
      // - Propagate back along edges with intersection & edge BV.
      // - Remove edges with empty propagated BVs; set node.value.live_tokens to the liveness result.
      fn prune_dead_paths_trie1(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          max_llm_token_id: usize,
      ) {
          crate::debug!(3, "Trie1: pruning dead paths (conservative, token-only)...");
          let all_nodes = Trie::all_nodes(trie1_god, &roots.values().cloned().collect::<Vec<_>>());
          if all_nodes.is_empty() { return; }

          let all_tokens = LLMTokenBV::ones(max_llm_token_id + 1);
          let mut live: HashMap<PrecomputeNode1Index, LLMTokenBV> = HashMap::new();
          let mut preds: HashMap<PrecomputeNode1Index, Vec<(PrecomputeNode1Index, Option<GrammarTokenID>, LLMTokenBV)>> = HashMap::new();
          let mut worklist: VecDeque<PrecomputeNode1Index> = VecDeque::new();

          // Initialize live sets and predecessors
          for u in &all_nodes {
              live.insert(*u, LLMTokenBV::zeros());
              let g = u.read(trie1_god).expect("read");
              if g.value.end {
                  live.insert(*u, all_tokens.clone()); // conservative seed
                  worklist.push_back(*u);
              }
              for (ek, dm) in g.children() {
                  for (v, bv) in dm {
                      preds.entry(*v).or_default().push((*u, *ek, bv.clone()));
                  }
              }
          }

          // Backward propagation
          while let Some(v) = worklist.pop_front() {
              let live_v = live.get(&v).unwrap().clone();
              if let Some(in_edges) = preds.get(&v) {
                  for (u, _ek, edge_bv) in in_edges {
                      let add = &live_v & edge_bv;
                      if add.is_empty() { continue; }
                      let entry = live.get_mut(u).unwrap();
                      let before = entry.len();
                      *entry |= &add;
                      if entry.len() > before {
                          worklist.push_back(*u);
                      }
                  }
              }
          }

          // Prune edges based on liveness intersections and write node live_tokens
          for u in &all_nodes {
              let mut w = u.write(trie1_god).expect("write");
              let old_children = std::mem::take(w.children_mut());
              let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in old_children {
                  let mut new_dm = OrderedHashMap::new();
                  for (v, edge_bv) in dm {
                      let live_v = live.get(&v).unwrap();
                      let pass = &edge_bv & live_v;
                      if !pass.is_empty() {
                          new_dm.insert(v, pass);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek, new_dm);
                  }
              }
              *w.children_mut() = new_children;
              // Update node live tokens for diagnostics/consumers
              if let Some(l) = live.get(u) {
                  w.value.live_tokens = l.clone();
              }
          }
      }

      // Exact signature-based DAG minimization for Trie1:
      // Two nodes are equivalent iff:
      //   - their end flags match
      //   - for each edge key and destination class, the aggregated LLMTokenBV is identical
      // We reconstruct representative nodes and redirect all references to them.
      fn merge_nodes_trie1(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(3, "Trie1: merging identical subgraphs by signature (partition refinement)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          // Dense indexing
          let mut dense_of: HashMap<PrecomputeNode1Index, usize> = HashMap::new();
          let mut old_of: Vec<PrecomputeNode1Index> = Vec::with_capacity(all_nodes.len());
          for (i, idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*idx, i);
              old_of.push(*idx);
          }
          let n = old_of.len();

          let mut ends: Vec<bool> = vec![false; n];
          type RawEdge1 = (Option<GrammarTokenID>, LLMTokenBV, usize);
          let mut raw_edges: Vec<Vec<RawEdge1>> = vec![Vec::new(); n];

          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let g = u_idx.read(trie1_god).expect("read");
              ends[u_dense] = g.value.end;
              for (ek, dm) in g.children() {
                  for (v_idx, bv) in dm {
                      if let Some(&v_dense) = dense_of.get(v_idx) {
                          raw_edges[u_dense].push((*ek, bv.clone(), v_dense));
                      }
                  }
              }
          }

          // Initial partition by end flag
          let mut prev_class: Vec<usize> = (0..n).map(|i| if ends[i] { 1 } else { 0 }).collect();

          const MAX_ITERS: usize = 40;
          for it in 0..MAX_ITERS {
              type SigEdgeKey = (Option<GrammarTokenID>, usize);

              let mut h_of: Vec<u64> = vec![0; n];

              #[cfg(not(rustrover))]
              let its = tqdm!(0..n, desc = format!("Trie1 Merge Hash Iter {}", it + 1), total = n, disable = !PROGRESS_BAR_ENABLED, leave = true);
              #[cfg(rustrover)]
              let its = 0..n;

              for u in its {
                  let mut aggr: BTreeMap<SigEdgeKey, LLMTokenBV> = BTreeMap::new();
                  for (ek, llm_bv, v_dense) in &raw_edges[u] {
                      let dest_class = prev_class[*v_dense];
                      let key = (*ek, dest_class);
                      aggr.entry(key)
                          .and_modify(|e| *e |= llm_bv)
                          .or_insert_with(|| llm_bv.clone());
                  }
                  let agg_vec: Vec<(SigEdgeKey, LLMTokenBV)> = aggr.into_iter().collect();

                  let mut hasher = DefaultHasher::new();
                  ends[u].hash(&mut hasher);
                  agg_vec.hash(&mut hasher);
                  h_of[u] = hasher.finish();
              }

              let mut map: HashMap<u64, usize> = HashMap::with_capacity(n.checked_div(2).unwrap_or(1024));
              let mut new_class = vec![0; n];
              let mut next_id = 0;
              let mut changes = 0;

              for u in 0..n {
                  let cid = *map.entry(h_of[u]).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });
                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1
                  }
              }

              crate::debug!(3, "Trie1 merge iter {}: classes={}, changes={}", it + 1, map.len(), changes);
              prev_class = new_class;
              if changes == 0 { break; }
          }

          // Representatives per class
          let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
          let mut rep_of_class: Vec<Option<PrecomputeNode1Index>> = vec![None; num_classes];
          for (u_dense, &cid) in prev_class.iter().enumerate() {
              if rep_of_class[cid].is_none() {
                  rep_of_class[cid] = Some(old_of[u_dense]);
              }
          }

          let mut node_to_rep: HashMap<PrecomputeNode1Index, PrecomputeNode1Index> = HashMap::new();
          for (u_dense, &cid) in prev_class.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], rep_of_class[cid].unwrap());
          }

          // Rebuild edges of representatives from aggregated signatures
          for cid in 0..num_classes {
              if let Some(rep_idx) = rep_of_class[cid] {
                  let sample_dense = prev_class.iter().position(|&c| c == cid).unwrap();
                  // Aggregate edges by (edge_key, dest_class)
                  let mut aggr: BTreeMap<(Option<GrammarTokenID>, usize), LLMTokenBV> = BTreeMap::new();
                  for (ek, llm_bv, v_dense) in &raw_edges[sample_dense] {
                      let dst_c = prev_class[*v_dense];
                      aggr.entry((*ek, dst_c))
                          .and_modify(|e| *e |= llm_bv)
                          .or_insert(llm_bv.clone());
                  }

                  let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
                  for ((ek, dest_class), llm_bv) in aggr {
                      if llm_bv.is_empty() { continue; }
                      let dest_rep = rep_of_class[dest_class].unwrap();
                      new_children.entry(ek)
                          .or_default()
                          .entry(dest_rep)
                          .and_modify(|e| *e |= &llm_bv)
                          .or_insert(llm_bv);
                  }

                  let mut new_live_tokens = LLMTokenBV::zeros();
                  for dm in new_children.values() {
                      for bv in dm.values() {
                          new_live_tokens |= bv;
                      }
                  }

                  for (i, &c) in prev_class.iter().enumerate() {
                      if c == cid {
                          new_live_tokens |= &old_of[i].read(trie1_god).unwrap().value.live_tokens;
                      }
                  }

                  let mut w = rep_idx.write(trie1_god).expect("write");
                  *w.children_mut() = new_children;
                  w.value.live_tokens = new_live_tokens;
              }
          }

          // Redirect roots to representatives
          for r in roots.values_mut() {
              if let Some(rep) = node_to_rep.get(r) {
                  *r = *rep;
              }
          }

          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);
      }

      pub fn optimize_trie1_size(
          precomputed1: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          trie0_god: &Trie0GodWrapper,
          node0_to_node1_map: &HashMap<PrecomputeNode0Index, PrecomputeNode1Index>,
          ignore_terminal_id: Option<TerminalID>,
          internal_max_llm_token: usize,
          terminal_follow_map: &BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          config: &Trie1Config,
          stage_vocab: &mut StageVocab,
          token_name_map: &bimap::BiBTreeMap<crate::glr::grammar::Terminal, usize>,
      ) {
          if !config.enabled {
              return;
          }
          crate::debug!(2, "Starting Trie1 size optimization...");

          crate::debug!(2, "Initial Trie1 stats:");
          let mut stats = PrecomputeStats::default();
          crate::constraint_extra::calculate_final_stats1(precomputed1, &mut stats, trie1_god);
          crate::constraint_extra::print_precompute_stats1(&stats, token_name_map, trie1_god);

          // === Pass 1: Initial Simplification and Pruning ===
          simplify_none_edges_to_former_end_nodes_trie1(precomputed1, trie1_god, trie0_god, node0_to_node1_map);
          replace_ignore_token_edges_with_none_edges_trie1(precomputed1, trie1_god, ignore_terminal_id);
          if config.early_flatten_epsilon {
              flatten_all_none_edges_trie1(precomputed1, trie1_god);
          } else {
              shortcut_none_chains_trie1(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
          }
          constrain_bitvecs_trie1(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>(), internal_max_llm_token);
          reduce_some_edges_via_post_none_dominance_trie1(precomputed1, trie1_god);
          if config.prune_on_no_terminal_follow {
              prune_on_no_terminal_follow_trie1(precomputed1, trie1_god, terminal_follow_map, ignore_terminal_id);
          }
          if config.prune_nodes_not_reaching_end {
              prune_nodes_not_reaching_end_trie1(precomputed1, trie1_god);
          }
          if config.prune_dead_paths {
              prune_dead_paths_trie1(precomputed1, trie1_god, internal_max_llm_token);
          }

          // === Pass 2: Minimization and further cleanup ===
          if config.minimize_by_signature {
              merge_nodes_trie1(precomputed1, trie1_god);
          }
          if !config.early_flatten_epsilon {
              flatten_all_none_edges_trie1(precomputed1, trie1_god);
          }
          // Trim keyed edges again after potential expansion
          reduce_some_edges_via_post_none_dominance_trie1(precomputed1, trie1_god);
          if config.prune_nodes_not_reaching_end {
              prune_nodes_not_reaching_end_trie1(precomputed1, trie1_god);
          }
          if config.prune_dead_paths {
              prune_dead_paths_trie1(precomputed1, trie1_god, internal_max_llm_token);
          }

          // === Pass 3: Token-level optimizations ===
          if config.merge_equivalent_llm_tokens {
              merge_equivalent_llm_tokens_trie1(precomputed1, trie1_god, stage_vocab);
          }
          if config.reorder_llm_tokens {
              reorder_llm_tokens_for_range_minimization_trie1(precomputed1, trie1_god, stage_vocab);
          }

          // === Pass 4: Final Minimization and GC ===
          if config.minimize_by_signature {
              merge_nodes_trie1(precomputed1, trie1_god);
          }
          // Final aggressive Some-edge reduction after struct-level merging
          reduce_some_edges_via_post_none_dominance_trie1(precomputed1, trie1_god);
          if config.prune_nodes_not_reaching_end {
              prune_nodes_not_reaching_end_trie1(precomputed1, trie1_god);
          }
          if config.prune_dead_paths {
              prune_dead_paths_trie1(precomputed1, trie1_god, internal_max_llm_token);
          }
          if config.gc {
              Trie::gc(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
          }
          Trie::recompute_all_max_depths(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());

          crate::debug!(2, "Final Trie1 stats:");
          let mut stats = PrecomputeStats::default();
          crate::constraint_extra::calculate_final_stats1(precomputed1, &mut stats, trie1_god);
          crate::constraint_extra::print_precompute_stats1(&stats, token_name_map, trie1_god);
      }

      fn simplify_none_edges_to_former_end_nodes_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          trie0_god: &Trie0GodWrapper,
          node0_to_node1_map: &HashMap<PrecomputeNode0Index, PrecomputeNode1Index>,
      ) {
          crate::debug!(2, "Simplifying None edges to former end nodes in Trie1...");

          let mut former_end_nodes1: HashSet<PrecomputeNode1Index> = HashSet::new();
          for (node0_idx, node1_idx) in node0_to_node1_map {
              let node0_guard = node0_idx.read(trie0_god).unwrap();
              if node0_guard.value.final_tokenizer_state.is_some() {
                  former_end_nodes1.insert(*node1_idx);
              }
          }

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          let mut nodes_to_make_end: HashSet<PrecomputeNode1Index> = HashSet::new();
          for a_arc in all_nodes {
              let mut edges_to_add = Vec::new();
              let mut none_edges_to_b_to_remove = Vec::new();

              { // read lock scope
                  let a_guard = a_arc.read(trie1_god).unwrap();
                  if let Some(none_dest_map) = a_guard.children().get(&None) {
                      for (b_arc_wrapper, bv_ab) in none_dest_map {
                          if former_end_nodes1.contains(b_arc_wrapper) {
                              let b_arc = b_arc_wrapper.as_arc();
                              let b_guard = b_arc.read(trie1_god).unwrap();

                              if !b_guard.children().is_empty() {
                                  // This is a candidate for simplification: A -(None)-> B, where B has children.
                                  none_edges_to_b_to_remove.push(b_arc_wrapper.clone());

                                  // B's children are the edges to add to A.
                                  for (term_opt, c_dest_map) in b_guard.children() {
                                      for (c_arc_wrapper, _bv_bc) in c_dest_map {
                                          // New edge: A -(term_opt)-> C
                                          // New BV is bv_ab, since bv_bc is all_tokens.
                                          let new_bv = bv_ab.clone();
                                          if !new_bv.is_empty() {
                                              edges_to_add.push((term_opt.clone(), c_arc_wrapper.clone(), new_bv));
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              } // end read lock

              if !none_edges_to_b_to_remove.is_empty() {
                  let mut a_guard = a_arc.write(trie1_god).unwrap();

                  // Remove the None edges that point to former end nodes that we are shortcutting.
                  if let Some(none_dest_map) = a_guard.children_mut().get_mut(&None) {
                      for b_to_remove in none_edges_to_b_to_remove {
                          none_dest_map.remove(&b_to_remove);
                      }
                  }

                  // If the None edge map is now empty, remove it.
                  if a_guard.children().get(&None).map_or(false, |m| m.is_empty()) {
                      a_guard.children_mut().remove(&None);
                  }

                  // Add the new shortcut edges.
                  for (term_opt, c_arc_wrapper, new_bv) in edges_to_add {
                      let dest_map = a_guard.children_mut().entry(term_opt).or_default();
                      dest_map.entry(c_arc_wrapper).or_insert_with(LLMTokenBV::zeros).bitor_assign(&new_bv);
                  }
              }
          }

          crate::debug!(2, "Done simplifying None edges to former end nodes in Trie1.");
      }

      fn replace_ignore_token_edges_with_none_edges_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          ignore_terminal_id: Option<TerminalID>,
      ) {
          let ignore_tid = if let Some(id) = ignore_terminal_id {
              id
          } else {
              return;
          };

          crate::debug!(2, "Replacing ignore token edges with None edges in Trie1...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);

          for node_arc in all_nodes {
              let mut node_guard = node_arc.write(trie1_god).expect("poison");
              if let Some(dest_map_to_move) = node_guard.children_mut().remove(&Some(ignore_tid)) {
                  let dest_map_for_new_key = node_guard.children_mut().entry(None).or_default();
                  for (dest_wrapper, edge_bv) in dest_map_to_move {
                      if let Some(existing_bv) = dest_map_for_new_key.get_mut(&dest_wrapper) {
                          *existing_bv |= &edge_bv;
                      } else {
                          dest_map_for_new_key.insert(dest_wrapper, edge_bv);
                      }
                  }
              }
          }
          crate::debug!(2, "Done replacing ignore token edges in Trie1.");
      }

      /// Helper: check if bitvector a is a subset of bitvector b (a ⊆ b).
      fn llm_subset_of(a: &LLMTokenBV, b: &LLMTokenBV) -> bool {
          if a.is_empty() { return true; }
          if *b == LLMTokenBV::max_ones() { return true; }
          if b.is_empty() { return a.is_empty(); }
          let mut u = b.clone();
          u |= a;
          u == *b
      }

      /// Compute the None-only closure (epsilon-closure) from a given start node.
      /// Returns a map: reachable_node -> tokens that can reach it through some None-only path.
      /// Semantics: along a path, token masks are intersected, and across multiple paths we take union.
      /// Includes start itself with mask = max_ones() (zero-length path).
      fn none_closure_for_node<'a>(
          trie1_god: &'a Trie1GodWrapper,
          start: PrecomputeNode1Index,
          cache: &'a mut HashMap<PrecomputeNode1Index, BTreeMap<PrecomputeNode1Index, LLMTokenBV>>,
      ) -> &'a BTreeMap<PrecomputeNode1Index, LLMTokenBV> {
          if !cache.contains_key(&start) {
              let mut reach: BTreeMap<PrecomputeNode1Index, LLMTokenBV> = BTreeMap::new();
              // zero-length path: all tokens
              reach.insert(start, LLMTokenBV::max_ones());
              let mut q: VecDeque<PrecomputeNode1Index> = VecDeque::new();
              q.push_back(start);
              while let Some(u) = q.pop_front() {
                  let mask_u = reach.get(&u).cloned().unwrap_or_else(LLMTokenBV::zeros);
                  if mask_u.is_empty() { continue; }
                  let g = u.read(trie1_god).expect("read");
                  if let Some(dm) = g.children().get(&None) {
                      for (v, edge_bv) in dm {
                          if edge_bv.is_empty() { continue; }
                          let mut m = mask_u.clone();
                          m &= edge_bv;
                          if m.is_empty() { continue; }
                          let entry = reach.entry(*v).or_insert_with(LLMTokenBV::zeros);
                          let before = entry.len();
                          *entry |= &m;
                          if entry.len() > before {
                              q.push_back(*v);
                          }
                      }
                  }
              }
              cache.insert(start, reach);
          }
          cache.get(&start).unwrap()
      }

      /// Aggressively minimize the number of Some-edges (terminal-keyed edges) by removing those
      /// that are fully covered via other kept Some-edges followed by None-only paths.
      ///
      /// For a fixed node U and terminal t:
      /// - Let E = {(dst_i, bv_i)} be the set of outgoing Some(t) edges.
      /// - We greedily keep a subset K ⊆ E. For each kept edge (dst_i, bv_i), it contributes coverage
      ///   to every destination dst_j reachable via None-only paths from dst_i with mask (bv_i & clos(dst_i->dst_j)).
      /// - Any edge (dst_j, bv_j) is redundant if bv_j ⊆ coverage[dst_j] provided by previously kept edges.
      /// - We process edges in descending "coverage power" to minimize the number kept.
      ///
      /// This pass is local to each node and terminal key, so it's safe: we only remove edges
      /// that are covered by edges we keep in the same node.
      fn reduce_some_edges_via_post_none_dominance_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Trie1: reducing Some-edges using post-key epsilon coverage (local greedy)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          // Cache for None-closures from arbitrary nodes
          let mut clos_cache: HashMap<PrecomputeNode1Index, BTreeMap<PrecomputeNode1Index, LLMTokenBV>> = HashMap::new();

          // We'll accumulate all writes after per-node decisions.
          for u in &all_nodes {
              // Snapshot keyed edges: t -> Vec<(dst, bv)>
              let keyed_snapshot: BTreeMap<GrammarTokenID, Vec<(PrecomputeNode1Index, LLMTokenBV)>> = {
                  let r = u.read(trie1_god).expect("read");
                  let mut map: BTreeMap<GrammarTokenID, Vec<(PrecomputeNode1Index, LLMTokenBV)>> = BTreeMap::new();
                  for (ek, dm) in r.children() {
                      if let Some(tid) = ek {
                          let mut v: Vec<(PrecomputeNode1Index, LLMTokenBV)> = Vec::with_capacity(dm.len());
                          for (dst, bv) in dm {
                              if !bv.is_empty() {
                                  v.push((*dst, bv.clone()));
                              }
                          }
                          if !v.is_empty() {
                              map.insert(*tid, v);
                          }
                      }
                  }
                  map
              };

              if keyed_snapshot.is_empty() { continue; }

              // Per terminal key, decide which edges to keep.
              let mut keep_for_term: HashMap<GrammarTokenID, BTreeSet<PrecomputeNode1Index>> = HashMap::new();

              for (tid, edges) in &keyed_snapshot {
                  if edges.len() <= 1 {
                      // Keep as-is (no chance to reduce for this terminal)
                      if let Some((dst, _)) = edges.first() {
                          keep_for_term.entry(*tid).or_default().insert(*dst);
                      }
                      continue;
                  }

                  // Build index set and precompute closures only for relevant destinations
                  let dests: Vec<PrecomputeNode1Index> = edges.iter().map(|(d, _)| *d).collect();

                  // Compute coverage power per edge: sum of |(bv_i & clos(dst_i->dst_j))| over all j.
                  let mut scored_indices: Vec<usize> = (0..edges.len()).collect();
                  scored_indices.sort_by_key(|&i| {
                      let (dst_i, ref bvi) = edges[i];
                      let clos_i = none_closure_for_node(trie1_god, dst_i, &mut clos_cache);
                      let mut total: usize = 0;
                      for dst_j in &dests {
                          if let Some(m_ij) = clos_i.get(dst_j) {
                              let mut c = m_ij.clone();
                              c &= bvi;
                              total = total.saturating_add(c.len());
                          }
                      }
                      // Sort by descending total, then by id stable
                      (std::cmp::Reverse(total), i)
                  });

                  // Greedy keep
                  let mut coverage: HashMap<PrecomputeNode1Index, LLMTokenBV> = HashMap::new();
                  let mut keep: BTreeSet<PrecomputeNode1Index> = BTreeSet::new();
                  for &idx in &scored_indices {
                      let (dst_i, ref bvi) = edges[idx];
                      // Check if already covered at its own dest
                      let cov_at_i = coverage.get(&dst_i).cloned().unwrap_or_else(LLMTokenBV::zeros);
                      if llm_subset_of(bvi, &cov_at_i) {
                          // Redundant, skip (remove later)
                          continue;
                      }
                      // Keep this edge
                      keep.insert(dst_i);
                      // Spread its coverage to all reachable dests via None
                      let clos_i = none_closure_for_node(trie1_god, dst_i, &mut clos_cache);
                      for (dst_j, m_ij) in clos_i {
                          // Only consider coverage for destinations belonging to this terminal key set
                          if !dests.contains(dst_j) { continue; }
                          let mut contrib = m_ij.clone();
                          contrib &= bvi;
                          if contrib.is_empty() { continue; }
                          let entry = coverage.entry(*dst_j).or_insert_with(LLMTokenBV::zeros);
                          *entry |= &contrib;
                      }
                  }

                  keep_for_term.insert(*tid, keep);
              }

              // Apply reductions
              {
                  let mut w = u.write(trie1_god).expect("write");
                  let old_children = std::mem::take(w.children_mut());
                  let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();

                  for (ek, dm) in old_children {
                      match ek {
                          Some(tid) => {
                              // Retain only kept destinations for this terminal
                              if let Some(keep_set) = keep_for_term.get(&tid) {
                                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                                  for (dst, bv) in dm {
                                      if keep_set.contains(&dst) {
                                          if !bv.is_empty() {
                                              new_dm.insert(dst, bv);
                                          }
                                      }
                                  }
                                  if !new_dm.is_empty() {
                                      new_children.insert(Some(tid), new_dm);
                                  }
                              } else {
                                  // No reductions known; keep as-is
                                  if !dm.is_empty() {
                                      new_children.insert(Some(tid), dm);
                                  }
                              }
                          }
                          None => {
                              // Keep None-edges untouched
                              if !dm.is_empty() {
                                  new_children.insert(None, dm);
                              }
                          }
                      }
                  }

                  *w.children_mut() = new_children;
                  // Recompute live_tokens as union of all edge masks
                  let mut lt = LLMTokenBV::zeros();
                  for dm in w.children().values() {
                      for bv in dm.values() {
                          lt |= bv;
                      }
                  }
                  w.value.live_tokens = lt;
              }
          }

          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);
      }

      fn count_total_ranges_trie1(
          all_nodes: &[PrecomputeNode1Index],
          trie1_god: &Trie1GodWrapper,
      ) -> usize {
          let mut count = 0;
          for n in all_nodes {
              let g = n.read(trie1_god).expect("read");
              count += g.value.live_tokens.inner().ranges_len();
              for (_ek, dm) in g.children() {
                  for (_dst, bv) in dm {
                      count += bv.inner().ranges_len();
                  }
              }
          }
          count
      }

      fn remap_llm_bv_many_to_one(bv: &LLMTokenBV, map_old_to_new: &BTreeMap<usize, usize>, max_token_id: usize) -> LLMTokenBV {
          if bv.is_empty() { return LLMTokenBV::zeros(); }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          let process_range = |range: std::ops::RangeInclusive<usize>,
                               ranges_to_add: &mut Vec<_>,
                               elements_to_add: &mut Vec<_>| {
              let (mut current, end) = (*range.start(), *range.end());
              for (&k, &v) in map_old_to_new.range(current..=end) {
                  if current < k {
                      ranges_to_add.push(current..=k - 1);
                  }
                  elements_to_add.push(v);
                  current = k + 1;
              }
              if current <= end {
                  ranges_to_add.push(current..=end);
              }
          };

          if *bv == LLMTokenBV::max_ones() {
              process_range(0..=max_token_id, &mut ranges_to_add, &mut elements_to_add);
          } else {
              for range in bv.inner().ranges() {
                  process_range(*range.start()..=*range.end(), &mut ranges_to_add, &mut elements_to_add);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV { inner: crate::datastructures::cache::intern_l1(new_set) }
      }

      fn remap_llm_bv_permutation(bv: &LLMTokenBV, map_old_to_new: &BTreeMap<usize, usize>, _max_token_id: usize) -> LLMTokenBV {
          // Fast‑paths for empty or full‑universe bitvectors.
          if bv.is_empty() { return LLMTokenBV::zeros(); }
          if *bv == LLMTokenBV::max_ones() { return LLMTokenBV::max_ones(); }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          for range in bv.inner().ranges() {
              let (mut current, end) = (*range.start(), *range.end());

              for (&k, &v) in map_old_to_new.range(current..=end) {
                  if current < k {
                      // Identity mapping for elements not in map_old_to_new
                      ranges_to_add.push(current..=k - 1);
                  }
                  elements_to_add.push(v);
                  current = k + 1;
              }

              if current <= end {
                  // Identity mapping for the rest of the range
                  ranges_to_add.push(current..=end);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV { inner: crate::datastructures::cache::intern_l1(new_set) }
      }

      /// Merge equivalent internal LLM token ids in Trie1:
      /// Two tokens are equivalent if they appear together in every occurrence across:
      /// - node.value.live_tokens
      /// - every edge's LLMTokenBV
      ///
      /// Applies a many-to-one id mapping and merges masks accordingly.
      pub fn merge_equivalent_llm_tokens_trie1(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          stage_vocab: &mut StageVocab,
      ) {
          crate::debug!(2, "Merging equivalent LLM tokens in Trie1...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          // 1) Collect all unique bitsets to use as splitters.
          let mut all_bvs = HashSet::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Merge Tokens (Collect BVs)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let g = n.read(trie1_god).expect("read");
              if !g.value.live_tokens.is_empty() {
                  all_bvs.insert(g.value.live_tokens.clone());
              }
              for (_ek, dm) in g.children() {
                  for (_dst, bv) in dm {
                      if !bv.is_empty() {
                          all_bvs.insert(bv.clone());
                      }
                  }
              }
          }
          if all_bvs.is_empty() { return; }

          // 2) Partition refinement.
          let max_tok = stage_vocab.internal_max_llm_token;
          let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
          let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
          class_to_tokens.insert(0, (0..=max_tok).collect());
          let mut num_classes = 1;

          #[cfg(not(rustrover))]
          let it = tqdm!(all_bvs.iter(), desc = "Trie1 Merge Tokens (Refine)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_bvs.iter();
          for splitter_bv in it {
              if *splitter_bv == LLMTokenBV::max_ones() { continue; }

              let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
              for token in splitter_bv.iter() {
                  if token <= max_tok {
                      let class_id = token_to_class[token];
                      members_in_splitter_by_class.entry(class_id).or_default().push(token);
                  }
              }

              for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                  let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                  if old_class_size == 0 { continue; }

                  if !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                      let new_class_id = num_classes;
                      num_classes += 1;

                      for &token in &tokens_for_new_class {
                          token_to_class[token] = new_class_id;
                      }

                      let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                      let moved_tokens_set: HashSet<_> = tokens_for_new_class.iter().cloned().collect();
                      old_class_tokens.retain(|t| !moved_tokens_set.contains(t));
                      
                      class_to_tokens.insert(new_class_id, tokens_for_new_class);
                  }
              }
          }

          // 3) Build many-to-one mapping from the final partition.
          let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
          let mut merged_count = 0;
          for (_class_id, group) in &class_to_tokens {
              if group.len() <= 1 { continue; }
              let rep = *group.iter().min().unwrap();
              for &t in group {
                  if t != rep {
                      old_to_new.insert(t, rep);
                      merged_count += 1;
                  }
              }
          }
          let tokens_before = max_tok + 1;
          let tokens_after = num_classes;
          crate::debug!(2, "Trie1: merged LLM tokens. Before: {}, After: {}. ({} merged)", tokens_before, tokens_after, merged_count);
          if merged_count == 0 { return; }

          // Memoization cache for remapping.
          let mut memo: HashMap<LLMTokenBV, LLMTokenBV> = HashMap::new();

          // Precompute the mapped universal set once (used when a set equals max_ones())
          let mut mapped_universe = LLMTokenBV::zeros();
          for t in 0..=max_tok {
              let rep = old_to_new.get(&t).copied().unwrap_or(t);
              mapped_universe.insert(rep);
          }

          // Identify which concrete bitvectors are affected (by Arc pointer identity)
          let mut affected_ptrs: HashSet<*const RangeSetBlaze<usize>> = HashSet::new();
          for splitter in all_bvs {
              affected_ptrs.insert(Arc::as_ptr(&splitter.inner));
          }

          // 4) Apply mapping to trie in‑place, only where needed
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Merge (Remap In‑Place)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              // Quick check: does this node reference any affected bitvector?
              let needs_update = {
                  let r = n.read(trie1_god).expect("read");
                  let lv_ptr = Arc::as_ptr(&r.value.live_tokens.inner);
                  if affected_ptrs.contains(&lv_ptr) {
                      true
                  } else {
                      let mut touched = false;
                      for (_ek, dm) in r.children() {
                          for (_dst, bv) in dm {
                              let bv_ptr = Arc::as_ptr(&bv.inner);
                              if affected_ptrs.contains(&bv_ptr) {
                                  touched = true;
                                  break;
                              }
                          }
                          if touched { break; }
                      }
                      touched
                  }
              };
              if !needs_update { continue; }

              let mut w = n.write(trie1_god).expect("write");

              // Remap live_tokens if needed
              if !w.value.live_tokens.is_empty() {
                  if w.value.live_tokens == LLMTokenBV::max_ones() {
                      w.value.live_tokens = mapped_universe.clone();
                  } else {
                      let lv_ptr = Arc::as_ptr(&w.value.live_tokens.inner);
                      if affected_ptrs.contains(&lv_ptr) {
                          let original_bv = w.value.live_tokens.clone();
                          w.value.live_tokens = memo.entry(original_bv)
                              .or_insert_with_key(|bv| remap_llm_bv_many_to_one(bv, &old_to_new, max_tok))
                              .clone();
                      }
                  }
              }

              // Remap children edge masks
              let old_children = std::mem::take(w.children_mut());
              let mut new_children: BTreeMap<Option<crate::types::TerminalID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in old_children {
                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                  for (dst, bv) in dm {
                      let bv_ptr = Arc::as_ptr(&bv.inner);
                      let mapped = if bv.is_empty() {
                          LLMTokenBV::zeros()
                      } else if bv == LLMTokenBV::max_ones() {
                          mapped_universe.clone()
                      } else if affected_ptrs.contains(&bv_ptr) {
                          memo.entry(bv.clone())
                              .or_insert_with_key(|bv| remap_llm_bv_many_to_one(bv, &old_to_new, max_tok))
                              .clone()
                      } else {
                          bv.clone()
                      };
                      if !mapped.is_empty() {
                          new_dm.entry(dst)
                              .and_modify(|e| *e |= &mapped)
                              .or_insert(mapped);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek, new_dm);
                  }
              }
              *w.children_mut() = new_children;
      	}
      	// 5) Update stage vocab
      	// Merge internal_to_original for tokens mapped into representatives
      	#[cfg(not(rustrover))]
      	let it = tqdm!(old_to_new.iter(), desc = "Trie1 Merge (Update Vocab)", total = old_to_new.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
      	#[cfg(rustrover)]
      	let it = old_to_new.iter();
      	for (old, new_rep) in it {
      		if old == new_rep { continue; }
      		if let Some(moved) = stage_vocab.internal_to_original.remove(old) {
      			let entry = stage_vocab.internal_to_original.entry(*new_rep).or_default();
      			*entry |= &moved;
      			for o in moved.iter() {
      				stage_vocab.original_to_internal.insert(o, *new_rep);
      			}
      		}
      	}
      	// internal_max_llm_token stays the same here (holes may appear). A later reorder can compact.
      }

      /// Reorder internal LLM tokens (permutation) to reduce ranges in masks by clustering co-occurring tokens.
      /// Conservative heuristic: sort by (descending frequency, then by id).
      pub fn reorder_llm_tokens_for_range_minimization_trie1(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          stage_vocab: &mut StageVocab,
      ) {
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() { return; }
          let ranges_before = count_total_ranges_trie1(&all_nodes, trie1_god);

          let max_tok = stage_vocab.internal_max_llm_token;

          // 1. Collect unique BV counts to optimize frequency calculation.
          let mut bv_counts: HashMap<LLMTokenBV, usize> = HashMap::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Reorder (Collect BVs)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let g = n.read(trie1_god).expect("read");
              if !g.value.live_tokens.is_empty() {
                  *bv_counts.entry(g.value.live_tokens.clone()).or_default() += 1;
              }
              for (_ek, dm) in g.children() {
                  for (_dst, bv) in dm {
                      if !bv.is_empty() {
                          *bv_counts.entry(bv.clone()).or_default() += 1;
                      }
                  }
              }
          }

          // 2. Compute token frequencies from unique BV counts.
          let mut freq: Vec<usize> = vec![0; max_tok + 1];
          #[cfg(not(rustrover))]
          let it = tqdm!(bv_counts.iter(), desc = "Trie1 Reorder (Count Frequencies)", total = bv_counts.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = bv_counts.iter();
          for (bv, &count) in it {
              if bv.is_all() {
                  for t in 0..=max_tok {
                      freq[t] += count;
                  }
              } else {
                  for t in bv.iter() {
                      if t <= max_tok {
                          freq[t] += count;
                      }
                  }
              }
          }
          crate::debug!(2, "Done computing frequencies.");

          // Build ordering: tokens present at least once, sorted by (freq desc, id asc)
          let mut present: Vec<usize> = (0..=max_tok).filter(|t| freq[*t] > 0).collect();
          if present.is_empty() { return; }
          present.sort_by_key(|&t| (std::cmp::Reverse(freq[t]), t));

          // Build permutation
          let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
          for (new_id, old_id) in present.iter().enumerate() {
              old_to_new.insert(*old_id, new_id);
          }

          // Memoization cache
          let mut memo: HashMap<LLMTokenBV, LLMTokenBV> = HashMap::new();

          // Apply mapping to trie
          let mut new_states = Vec::with_capacity(all_nodes.len());
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Reorder (Remap Read)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let r = n.read(trie1_god).expect("read");
              let new_live_tokens = if r.value.live_tokens.is_empty() {
                  r.value.live_tokens.clone()
              } else {
                  memo.entry(r.value.live_tokens.clone())
                      .or_insert_with_key(|bv| remap_llm_bv_permutation(bv, &old_to_new, max_tok))
                      .clone()
              };
              let mut new_children: BTreeMap<Option<crate::types::TerminalID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in r.children() {
                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                  for (dst, bv) in dm {
                      let mapped = memo.entry(bv.clone())
                          .or_insert_with_key(|bv| remap_llm_bv_permutation(bv, &old_to_new, max_tok))
                          .clone();
                      if !mapped.is_empty() {
                          new_dm.insert(dst.clone(), mapped);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek.clone(), new_dm);
                  }
              }
              new_states.push((new_live_tokens, new_children));
          }
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter().enumerate(), desc = "Trie1 Reorder (Remap Write)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter().enumerate();
          for (i, n) in it {
              let mut w = n.write(trie1_god).expect("write");
              let (live_tokens, children) = &new_states[i];
              w.value.live_tokens = live_tokens.clone();
              *w.children_mut() = children.clone();
          }
      	let ranges_after = count_total_ranges_trie1(&all_nodes, trie1_god);

      	// Update stage vocab (pure permutation)
      	let mut new_internal_to_original: BTreeMap<usize, LLMTokenBV> = BTreeMap::new();
      	#[cfg(not(rustrover))]
      	let it = tqdm!(stage_vocab.internal_to_original.clone().into_iter(), desc = "Trie1 Reorder (Vocab 1)", disable = !PROGRESS_BAR_ENABLED, leave = true);
      	#[cfg(rustrover)]
      	let it = stage_vocab.internal_to_original.clone().into_iter();
      	for (old_id, setv) in it {
      		if let Some(new_id) = old_to_new.get(&old_id) {
      			new_internal_to_original.insert(*new_id, setv);
              }
          }
          stage_vocab.internal_to_original = new_internal_to_original;
          let mut new_original_to_internal: BTreeMap<usize, usize> = BTreeMap::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(stage_vocab.original_to_internal.clone().into_iter(), desc = "Trie1 Reorder (Vocab 2)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = stage_vocab.original_to_internal.clone().into_iter();
          for (orig, old_internal) in it {
              if let Some(new_internal) = old_to_new.get(&old_internal) {
                  new_original_to_internal.insert(orig, *new_internal);
              }
          }
          stage_vocab.original_to_internal = new_original_to_internal;
          stage_vocab.internal_max_llm_token = present.len().saturating_sub(1);
          crate::debug!(2, "Trie1 reordering complete. Ranges reduced from {} to {}. New max internal token ID: {}", ranges_before, ranges_after, stage_vocab.internal_max_llm_token);
      }

      /// Remove edges to nodes that cannot reach any end node, then GC unreachable nodes.
      /// This is an exact pruning that preserves correctness: nodes that cannot reach an end
      /// can never contribute tokens to the final mask in get_mask1, so their edges are dead.
      fn prune_nodes_not_reaching_end_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      )
      {
          crate::debug!(2, "Pruning Trie1 nodes that cannot reach any end node (reverse reachability)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          if roots_vec.is_empty() {
              return;
          }

          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Build reverse adjacency: dest -> sources having an edge to dest (for any key)
          let mut incoming: HashMap<PrecomputeNode1Index, Vec<PrecomputeNode1Index>> = HashMap::new();
          for src in &all_nodes {
              let g = src.read(trie1_god).expect("read");
              for (_ek, dm) in g.children() {
                  for (dst, _bv) in dm {
                      incoming.entry(*dst).or_default().push(*src);
                  }
              }
          }

          // Initialize worklist with all end nodes
          let mut productive: HashSet<PrecomputeNode1Index> = HashSet::new();
          let mut q: VecDeque<PrecomputeNode1Index> = VecDeque::new();
          let mut end_nodes_count = 0usize;
          for n in &all_nodes {
              let r = n.read(trie1_god).expect("read");
              if r.value.end {
                  end_nodes_count += 1;
                  if productive.insert(*n) {
                      q.push_back(*n);
                  }
              }
          }
          if end_nodes_count == 0 {
              // No end nodes present: nothing to prune under this criterion.
              crate::debug!(2, "No end nodes found in Trie1; skipping end-reachability pruning.");
              return;
          }

          // Reverse BFS: mark all nodes that can reach some end node
          while let Some(d) = q.pop_front() {
              if let Some(srcs) = incoming.get(&d) {
                  for s in srcs {
                      if productive.insert(*s) {
                          q.push_back(*s);
                      }
                  }
              }
          }

          let total_nodes = all_nodes.len();
          let productive_nodes = productive.len();
          let prunable = total_nodes.saturating_sub(productive_nodes);
          crate::debug!(2, "Trie1 end-reachability: total={}, productive={}, prunable={}", total_nodes, productive_nodes, prunable);
          if prunable == 0 {
              return;
          }

          // Remove any edge to a non-productive destination, recompute node live_tokens
          for n in &all_nodes {
              let mut w = n.write(trie1_god).expect("write");
              let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in w.children().clone() {
                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                  for (dst, bv) in dm {
                      if productive.contains(&dst) {
                          new_dm.insert(dst, bv);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek, new_dm);
                  }
              }
              *w.children_mut() = new_children;
              // Recompute live_tokens = union of outgoing edge masks
              let mut lt = LLMTokenBV::zeros();
              for dm in w.children().values() {
                  for bv in dm.values() {
                      lt |= bv;
                  }
              }
              w.value.live_tokens = lt;
          }

          // GC everything now unreachable from roots and recompute depths
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie1_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);

          crate::debug!(2, "Finished end-reachability pruning in Trie1.");
      }

      fn prune_on_no_terminal_follow_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          terminal_follow_map: &BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          ignore_terminal_id: Option<TerminalID>,
      ) {
          crate::debug!(2, "Pruning Trie1 based on terminal follow sets.");

          let initial_nodes_and_values: Vec<_> = roots.values()
              .map(|root_arc| (root_arc.clone(), None))
              .collect();

          type NodePtr = *const PrecomputeNode1;
          let mut edges_to_keep: HashMap<NodePtr, BTreeSet<Option<GrammarTokenID>>> = HashMap::new();

          Trie::special_map(
              trie1_god,
              initial_nodes_and_values,
              |predecessors: &Option<BTreeSet<GrammarTokenID>>, edge_key: &Option<GrammarTokenID>, _edge_bv, _child_node| {
                  match edge_key {
                      Some(t) if Some(*t) == ignore_terminal_id => Some(predecessors.clone()),
                      Some(t) => Some(Some(BTreeSet::from([*t]))),
                      None => Some(predecessors.clone()),
                  }
              },
              |existing_set, new_set| {
                  match (existing_set, new_set) {
                      (None, _) => {},
                      (existing_set @ _, None) => *existing_set = None,
                      (Some(existing), Some(new)) => existing.extend(new),
                  }
              },
              |node, maybe_all_immediate_predecessors| {
                  if maybe_all_immediate_predecessors.is_none() {
                      return true;
                  }

                  let mut allowed_follow_terminals = BTreeSet::new();
                  if let Some(all_immediate_predecessors) = &*maybe_all_immediate_predecessors {
                      for preceding_terminal in all_immediate_predecessors {
                          if let Some(follow_set) = terminal_follow_map.get(preceding_terminal) {
                              allowed_follow_terminals.extend(follow_set.iter().cloned());
                          }
                      }
                  }

                  let keys_to_keep: BTreeSet<_> = node.children().keys().filter(|edge_key| {
                      match edge_key {
                          Some(edge_terminal) => allowed_follow_terminals.contains(edge_terminal) || Some(*edge_terminal) == ignore_terminal_id,
                          None => true,
                      }
                  }).cloned().collect();

                  let node_ptr: NodePtr = node;
                  edges_to_keep.insert(node_ptr, keys_to_keep);
                  true
              },
          );

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          for node_arc in all_nodes {
              let node_ptr: NodePtr = {
                  let guard = node_arc.read(trie1_god).expect("poison");
                  &*guard as *const _
              };
              if let Some(keys_to_keep) = edges_to_keep.get(&node_ptr) {
                  let mut node_guard = node_arc.write(trie1_god).unwrap();
                  node_guard.children_mut().retain(|k, _| keys_to_keep.contains(k));
              }
          }

          crate::debug!(2, "Finished pruning Trie1 based on terminal follow sets.");
      }

      /// Flattens None edges (epsilon-closure) by computing a per-node closure and rewriting
      /// outgoing edges. Keyed edges from None-children are composed (bv_intersection) and pushed
      /// up to the current node. Additionally, we preserve only those None edges that are required
      /// to maintain reachability to end nodes via None-only paths.
      ///
      /// For a node A:
      /// - Start from A's existing keyed edges (Some(t) -> {dst -> bv}).
      /// - For each None-edge A -(None, bv1)-> B, compose B's already-flattened keyed edges
      ///   with bv1 via intersection: bv_final = bv1 & bv_child_edge, and union into A's map.
      /// - Preserve the None-edge A -(None)-> B if B can (via a None-only path) reach an end node.
      ///   This avoids dropping necessary epsilon paths to end/leaf nodes.
      /// - Replace A's children with this new map (keyed edges plus the preserved None edges),
      ///   and recompute live_tokens.
      ///
      /// Notes:
      /// - We never turn A into an end node via None-closure. That would be unsound for partial masks.
      ///   End detection remains tied to explicit keyed paths to leaf/end nodes, and epsilon paths preserved explicitly.
      /// - We process nodes in descending max_depth so children are processed (flattened) before parents.
      fn flatten_all_none_edges_trie1(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Flattening None edges in Trie1 via epsilon-closure (keyed-only rewrite)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec);

          let mut all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          // Sort by descending depth so that children are processed (flattened) first.
          all_nodes.sort_by_key(|idx| {
              idx.read(trie1_god).expect("read").max_depth
          });
          all_nodes.reverse();

          // Cache of flattened edges per node (primarily keyed edges; we may also keep
          // some None edges if necessary to preserve reachability to end).
          // Key: node index -> map: Some(terminal) -> OrderedHashMap<dst, bv>
          let mut flat_cache: HashMap<
              PrecomputeNode1Index,
              BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>>
          > = HashMap::new();

          // Bottom-up memo: whether a node can reach an end node using only None edges (or is itself end).
          let mut none_reaches_end: HashMap<PrecomputeNode1Index, bool> = HashMap::new();

          // Work backwards from deepest leaves
          for node_idx in &all_nodes {
              // Snapshot current children to avoid lock re-entrancy
              let (children_snapshot, node_is_end) = {
                  let g = node_idx.read(trie1_god).expect("read");
                  (g.children().clone(), g.value.end)
              };

              let mut has_none_path_to_end_from_children = false;

              // Start with direct keyed edges
              let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in &children_snapshot {
                  if ek.is_some() {
                      let dest_map = new_children.entry(ek.clone()).or_default();
                      for (dst, bv) in dm {
                          dest_map.entry(*dst)
                              .and_modify(|e| *e |= bv)
                              .or_insert(bv.clone());
                      }
                  }
              }

              // Compose None edges with child's flattened keyed edges (if any)
              if let Some(none_dest_map) = children_snapshot.get(&None) {
                  for (child_idx, bv_none_edge) in none_dest_map {
                      if bv_none_edge.is_empty() { continue; }

                      // Check if child has a None-path to an end node.
                      // Since we process bottom-up, this should be in the memo.
                      let child_none_to_end = *none_reaches_end.get(child_idx).unwrap_or(&false);
                      has_none_path_to_end_from_children |= child_none_to_end;

                      // If it does, preserve the None edge.
                      if child_none_to_end {
                          let dest_map_none = new_children.entry(None).or_default();
                          dest_map_none
                              .entry(*child_idx)
                              .and_modify(|e| *e |= bv_none_edge)
                              .or_insert(bv_none_edge.clone());
                      }

                      // Now, compose its keyed edges, regardless of whether we preserved the None edge.
                      let child_keyed_edges_to_compose = if let Some(child_flat) = flat_cache.get(child_idx) {
                          child_flat.clone()
                      } else {
                          // Fallback: use child's immediate keyed edges.
                          let child_children_snapshot: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = {
                              let cg = child_idx.read(trie1_god).expect("read");
                              cg.children().clone()
                          };
                          child_children_snapshot
                      };

                      for (ek2, dm2) in child_keyed_edges_to_compose {
                          if ek2.is_none() { continue; } // Only compose keyed edges
                          let dest_map = new_children.entry(ek2.clone()).or_default();
                          for (dst2, bv_child) in dm2 {
                              let mut composed = bv_none_edge.clone();
                              composed &= &bv_child;
                              if composed.is_empty() { continue; }
                              dest_map.entry(dst2)
                                  .and_modify(|e| *e |= &composed)
                                  .or_insert(composed);
                          }
                      }
                  }
              }

              // Finalize the memo for this node: it can reach an end via None-only path if it's an end
              // or if any of its None-children could reach an end via None-only paths.
              let this_none_reaches_end = node_is_end || has_none_path_to_end_from_children;
              none_reaches_end.insert(*node_idx, this_none_reaches_end);

              // Write back: replace children with new map and recompute live_tokens
              {
                  let mut w = node_idx.write(trie1_god).expect("write");
                  *w.children_mut() = new_children.clone();
                  // Recompute live_tokens as union of all edge masks
                  let mut lt = LLMTokenBV::zeros();
                  for dm in w.children().values() {
                      for bv in dm.values() {
                          lt |= bv;
                      }
                  }
                  w.value.live_tokens = lt;
                  // Do NOT change w.value.end here. End detection remains via keyed paths and preserved None paths.
              }

              flat_cache.insert(*node_idx, new_children);
          }

          // Cleanup: recompute depths and GC to drop eliminated intermediates
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);
          Trie::gc(trie1_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);

          crate::debug!(2, "Done flattening None edges in Trie1.");
      }
    src/constraint_precompute3_intermediate_utils.rs: |
      // src/constraint_precompute3_intermediate_utils.rs
      use crate::{
          constraint::{
              IntermediatePrecomputeNode3, IntermediatePrecomputeNode3Index, IntermediateTrie3EdgeKey,
              IntermediateTrie3GodWrapper, LLMTokenBV,
          },
          datastructures::trie::Trie,
      };
      use ordered_hash_map::OrderedHashMap;
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};

      const DEBUG_LOG: bool = cfg!(debug_assertions);

      /// Normalizes a path for comparison purposes.
      /// - Removes NoOp edges.
      /// - Collects all CheckLLM bitvectors, intersects them, and prepends a single CheckLLM.
      pub(crate) fn normalize_path(path: Vec<IntermediateTrie3EdgeKey>) -> Vec<IntermediateTrie3EdgeKey> {
          let mut combined_llm_bv = LLMTokenBV::max_ones();
          let mut has_llm_check = false;

          let mut other_ops: Vec<_> = path
              .into_iter()
              .filter_map(|ek| match ek {
                  IntermediateTrie3EdgeKey::CheckLLM(bv) => {
                      combined_llm_bv &= bv;
                      has_llm_check = true;
                      None
                  }
                  IntermediateTrie3EdgeKey::NoOp => None,
                  IntermediateTrie3EdgeKey::Push(_) | IntermediateTrie3EdgeKey::Pop(_, _) => Some(ek),
              })
              .collect();

          if has_llm_check {
              other_ops.insert(0, IntermediateTrie3EdgeKey::CheckLLM(combined_llm_bv));
          }

          other_ops
      }

      /// Compares two Intermediate Trie3 graphs for equivalence by comparing their sets of normalized paths.
      /// This is a strong equivalence check, suitable for testing optimization passes.
      pub fn are_intermediate_trie3_graphs_equal<F>(
          roots_a: &[IntermediatePrecomputeNode3Index],
          god_a: &IntermediateTrie3GodWrapper,
          roots_b: &[IntermediatePrecomputeNode3Index],
          god_b: &IntermediateTrie3GodWrapper,
          is_end: &F,
          max_path_length: usize,
      ) -> bool
      where
          F: Fn(IntermediatePrecomputeNode3Index, &IntermediatePrecomputeNode3) -> bool,
      {
          // Only Pop and Push operations count towards path length for cycle detection.
          let is_path_edge: fn(&IntermediateTrie3EdgeKey, &(), IntermediatePrecomputeNode3Index) -> bool =
              |ek, _, _| {
                  matches!(ek, IntermediateTrie3EdgeKey::Pop(_, _) | IntermediateTrie3EdgeKey::Push(_) | IntermediateTrie3EdgeKey::CheckLLM(_))
              };

          let get_normalized_paths = |god, roots| {
              Trie::get_all_paths_with_cycles(god, roots, is_end, is_path_edge, max_path_length)
                  .into_iter()
                  .map(|(_, path)| normalize_path(path.into_iter().map(|(ek, ..)| ek).collect()))
                  .collect::<HashSet<_>>()
          };

          get_normalized_paths(god_a, roots_a) == get_normalized_paths(god_b, roots_b)
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      struct NodeSignature {
          end: bool,
          // For each edge key, store the sorted list of child colors.
          edges: Vec<(IntermediateTrie3EdgeKey, Vec<usize>)>,
      }

      // Retained for reference; not used in the fast WL path.
      fn build_node_signature(
          idx: IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
          color_map: &BTreeMap<IntermediatePrecomputeNode3Index, usize>,
      ) -> NodeSignature {
          let guard = idx.read(god).expect("Invalid index during signature build");
          let end = guard.value.end;

          // Collect children grouped by edge key, mapped to their current colors.
          let mut edges: Vec<(IntermediateTrie3EdgeKey, Vec<usize>)> = Vec::new();
          for (ek, dsts) in guard.children().iter() {
              let mut cols: Vec<usize> = dsts
                  .keys()
                  .map(|d| *color_map.get(d).unwrap_or(&0usize))
                  .collect();
              cols.sort_unstable();
              edges.push((ek.clone(), cols));
          }
          edges.sort(); // ensure deterministic order

          NodeSignature { end, edges }
      }

      #[derive(Debug, Clone, PartialEq, Eq, Hash)]
      struct WLNodeSignature {
          end: bool,
          // edges: in BTreeMap edge-key order already, so no need to re-sort keys here.
          // Each entry is (interned_edge_key_id, sorted [(child_color, count)]).
          edges: Vec<(u32, Vec<(usize, u32)>)>,
      }

      fn build_node_signature_fast(
          idx: IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
          color_map: &BTreeMap<IntermediatePrecomputeNode3Index, usize>,
          key_ids: &BTreeMap<IntermediateTrie3EdgeKey, u32>,
      ) -> WLNodeSignature {
          let guard = idx.read(god).expect("Invalid index during signature build");
          let end = guard.value.end;

          let mut edges: Vec<(u32, Vec<(usize, u32)>)> = Vec::new();
          for (ek, dsts) in guard.children().iter() {
              let key_id = *key_ids
                  .get(ek)
                  .expect("edge key missing from interning map");

              // Aggregate child colors to counts instead of sorting many duplicates.
              let mut counts: HashMap<usize, u32> = HashMap::new();
              for (d, _ev) in dsts.iter() {
                  let c = *color_map.get(d).expect("color missing for reachable node");
                  *counts.entry(c).or_insert(0) += 1;
              }
              let mut vec_counts: Vec<(usize, u32)> = counts.into_iter().collect();
              // Deterministic order: sort by color id.
              vec_counts.sort_unstable_by_key(|(c, _)| *c);
              edges.push((key_id, vec_counts));
          }
          // No need to sort 'edges': guard.children() is already a BTreeMap in key order.
          WLNodeSignature { end, edges }
      }

      /// Compute in-degree for all nodes reachable from roots.
      fn compute_in_degrees(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
      ) -> HashMap<IntermediatePrecomputeNode3Index, usize> {
          let nodes = Trie::all_nodes(god, roots);
          let mut indeg: HashMap<IntermediatePrecomputeNode3Index, usize> = HashMap::new();
          for n in &nodes {
              indeg.entry(*n).or_insert(0);
          }
          for n in &nodes {
              if let Some(r) = n.read(god) {
                  for (_ek, dm) in r.children() {
                      for (dst, _ev) in dm {
                          *indeg.entry(*dst).or_insert(0) += 1;
                      }
                  }
              }
          }
          indeg
      }

      /// Normalize CheckLLM edges on a single node:
      /// 1) Aggregate the union of bitvectors per destination (merges duplicate/subsumed edges).
      /// 2) Regroup by the aggregated bitvector so that a single CheckLLM(BV) key maps to a set of destinations.
      ///    This yields a canonical representation independent of original partitioning.
      fn normalize_checkllm_edges_on_node(
          idx: IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let mut changed = false;
          let mut w = if let Some(w) = idx.write(god) { w } else { return false };

          // Take children out to rebuild.
          let old_children = std::mem::take(w.children_mut());

          // Gather old stats for "did we change?"
          let mut old_ck_keys = 0usize;
          let mut old_ck_edges = 0usize;
          for (ek, dm) in old_children.iter() {
              if matches!(ek, IntermediateTrie3EdgeKey::CheckLLM(_)) {
                  old_ck_keys += 1;
                  old_ck_edges += dm.len();
              }
          }

          // Step 1: union BV per destination across all CheckLLM entries.
          let mut union_per_dest: BTreeMap<IntermediatePrecomputeNode3Index, LLMTokenBV> = BTreeMap::new();
          let mut other_edges: BTreeMap<IntermediateTrie3EdgeKey, OrderedHashMap<IntermediatePrecomputeNode3Index, ()>> = BTreeMap::new();
          for (ek, dm) in old_children.into_iter() {
              match ek {
                  IntermediateTrie3EdgeKey::CheckLLM(bv) => {
                      for (dst, _ev) in dm.into_iter() {
                          union_per_dest
                              .entry(dst)
                              .and_modify(|acc| *acc |= bv.clone())
                              .or_insert(bv.clone());
                      }
                  }
                  _ => {
                      other_edges.insert(ek, dm);
                  }
              }
          }

          // Step 2: group destinations by their aggregated bitvector.
          let mut grouped: BTreeMap<LLMTokenBV, Vec<IntermediatePrecomputeNode3Index>> = BTreeMap::new();
          for (dst, bv) in union_per_dest.into_iter() {
              grouped.entry(bv).or_default().push(dst);
          }
          let mut new_ck_keys = 0usize;
          let mut new_ck_edges = 0usize;

          // Rebuild children.
          for (ek, dm) in other_edges.into_iter() {
              w.children_mut().insert(ek, dm);
          }
          for (bv, mut dests) in grouped.into_iter() {
              dests.sort_unstable();
              let ek = IntermediateTrie3EdgeKey::CheckLLM(bv);
              let mut dm: OrderedHashMap<IntermediatePrecomputeNode3Index, ()> = OrderedHashMap::new();
              for d in dests {
                  dm.insert(d, ());
                  new_ck_edges += 1;
              }
              w.children_mut().insert(ek, dm);
              new_ck_keys += 1;
          }

          if old_ck_keys != new_ck_keys || old_ck_edges != new_ck_edges {
              changed = true;
          }
          changed
      }

      /// Apply CheckLLM normalization to all reachable nodes. Returns true if any change occurred.
      fn normalize_checkllm_edges_for_all(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let nodes = Trie::all_nodes(god, roots);
          let mut changed_any = false;
          for n in nodes {
              if normalize_checkllm_edges_on_node(n, god) {
                  changed_any = true;
              }
          }
          changed_any
      }

      #[derive(Debug, Clone)]
      struct CheckLLMChainTask {
          src: IntermediatePrecomputeNode3Index,
          src_ek: IntermediateTrie3EdgeKey, // CheckLLM(bv1)
          mid: IntermediatePrecomputeNode3Index,
          new_bv: LLMTokenBV,               // bv1 & bv2
          dst: IntermediatePrecomputeNode3Index,
      }

      /// Contract simple linear chains of consecutive CheckLLM checks:
      ///   src --[CheckLLM(bv1)]--> mid --[CheckLLM(bv2)]--> dst
      /// with constraints:
      ///   - mid has in-degree == 1,
      ///   - mid is not an end node,
      ///   - each step has a single destination (no branching along this chain).
      /// Then replace the first edge with CheckLLM(bv1 & bv2) directly to dst.
      fn contract_checkllm_chains(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let reachable = Trie::all_nodes(god, roots);
          if reachable.is_empty() {
              return false;
          }
          let mut indeg = compute_in_degrees(roots, god);
          let mut tasks: Vec<CheckLLMChainTask> = Vec::new();

          for src in &reachable {
              let Some(rsrc) = src.read(god) else { continue };
              for (ek1, dm1) in rsrc.children().iter() {
                  let bv1 = if let IntermediateTrie3EdgeKey::CheckLLM(bv) = ek1 {
                      bv.clone()
                  } else {
                      continue;
                  };
                  if dm1.len() != 1 {
                      continue;
                  }
                  let (&mid, _) = dm1.iter().next().unwrap();
                  if indeg.get(&mid).copied().unwrap_or(0) != 1 {
                      continue;
                  }
                  let Some(rmid) = mid.read(god) else { continue };
                  if rmid.value.end {
                      continue; // cannot bypass acceptance point
                  }
                  if rmid.children().len() != 1 {
                      continue;
                  }
                  let (ek2, dm2) = rmid.children().iter().next().unwrap();
                  let bv2 = if let IntermediateTrie3EdgeKey::CheckLLM(bv) = ek2 {
                      bv.clone()
                  } else {
                      continue;
                  };
                  if dm2.len() != 1 {
                      continue;
                  }
                  let (&dst, _) = dm2.iter().next().unwrap();
                  let mut new_bv = bv1.clone();
                  new_bv &= bv2.clone();
                  tasks.push(CheckLLMChainTask {
                      src: *src,
                      src_ek: ek1.clone(),
                      mid,
                      new_bv,
                      dst,
                  });
              }
          }

          if tasks.is_empty() {
              return false;
          }

          // Apply rewiring tasks.
          let mut changed = false;
          for t in tasks {
              if let Some(mut wsrc) = t.src.write(god) {
                  if let Some(dm) = wsrc.get_mut(&t.src_ek) {
                      if dm.remove(&t.mid).is_some() {
                          changed = true;
                      }
                      if dm.is_empty() {
                          wsrc.children_mut().remove(&t.src_ek);
                      }
                  }
                  let new_ek = IntermediateTrie3EdgeKey::CheckLLM(t.new_bv);
                  wsrc.children_mut().entry(new_ek).or_default().insert(t.dst, ());
              }
              // Update in-degree snapshot for subsequent rewires in the same pass.
              if let Some(v) = indeg.get_mut(&t.mid) {
                  *v = v.saturating_sub(1);
              }
              *indeg.entry(t.dst).or_insert(0) += 1;
          }
          changed
      }

      fn contract_noop_chains(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let mut changed_anything = false;
          let all_nodes = Trie::all_nodes(god, roots);
          if all_nodes.is_empty() {
              return false;
          }

          // Phase 1: Identify all nodes that are part of a simple NoOp chain.
          // A node is a candidate if it's not an end node and has a single outgoing NoOp edge
          // to a single destination.
          let mut bypass_target: HashMap<IntermediatePrecomputeNode3Index, IntermediatePrecomputeNode3Index> =
              HashMap::new();
          for idx in &all_nodes {
              let guard = idx.read(god).expect("read");
              if guard.value.end {
                  continue;
              }

              if guard.children().len() == 1 {
                  if let Some((key, dests)) = guard.children().iter().next() {
                      if matches!(key, IntermediateTrie3EdgeKey::NoOp) && dests.len() == 1 {
                          let dest_idx = *dests.keys().next().unwrap();
                          bypass_target.insert(*idx, dest_idx);
                      }
                  }
              }
          }

          if bypass_target.is_empty() {
              return false;
          }

          // Phase 2: Resolve bypass chains. e.g., if A->B and B->C, update map to A->C.
          // This makes rewiring direct to the end of the chain.
          for node_idx in bypass_target.keys().copied().collect::<Vec<_>>() {
              let mut target = bypass_target[&node_idx];
              let mut visited = HashSet::from([node_idx]);
              while let Some(next_target) = bypass_target.get(&target) {
                  if !visited.insert(target) {
                      // Cycle of NoOp nodes detected. This is a "true cycle" and should have been caught.
                      // Break to prevent an infinite loop.
                      break;
                  }
                  target = *next_target;
              }
              bypass_target.insert(node_idx, target);
          }

          // Phase 3: Rewire the graph.
          // For each node, check if any of its children should be bypassed.
          for idx in &all_nodes {
              if bypass_target.contains_key(idx) {
                  continue;
              }

              let mut write_guard = idx.write(god).expect("write");
              let old_children = std::mem::take(write_guard.children_mut());
              let mut local_change = false;

              for (key, dests) in old_children {
                  let mut new_dests = OrderedHashMap::new();
                  for (dest_idx, ev) in dests {
                      let final_dest = bypass_target.get(&dest_idx).copied().unwrap_or(dest_idx);
                      if final_dest != dest_idx {
                          local_change = true;
                      }
                      new_dests.insert(final_dest, ev);
                  }
                  if !new_dests.is_empty() {
                      // It's possible for multiple old (key, dests) to now have the same key.
                      // We must merge them correctly.
                      let entry = write_guard.children_mut().entry(key).or_default();
                      for (dest, ev) in new_dests {
                          entry.insert(dest, ev);
                      }
                  }
              }
              if local_change {
                  changed_anything = true;
              }
          }

          changed_anything
      }

      fn wl_color_refine(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
      ) -> (BTreeMap<IntermediatePrecomputeNode3Index, usize>, usize, usize, usize) {
          // Restrict to reachable nodes to keep work bounded.
          let mut reachable = Trie::all_nodes(god, roots);
          reachable.sort_unstable();
          reachable.dedup();

          // Compute an edge count for progress reporting and intern edge keys once.
          let mut edge_count: usize = 0;
          let mut key_ids: BTreeMap<IntermediateTrie3EdgeKey, u32> = BTreeMap::new();
          let mut next_key_id: u32 = 0;
          for idx in &reachable {
              if let Some(g) = idx.read(god) {
                  for (_ek, dsts) in g.children().iter() {
                      edge_count += dsts.len();
                  }
                  for (ek, _dsts) in g.children().iter() {
                      if !key_ids.contains_key(ek) {
                          key_ids.insert(ek.clone(), next_key_id);
                          next_key_id += 1;
                      }
                  }
              }
          }
          if DEBUG_LOG {
              println!(
                  "[optimize_intermediate_trie3] Reachable nodes: {}, edges: {}, unique edge-keys: {}",
                  reachable.len(),
                  edge_count,
                  key_ids.len()
              );
          }

          // Initial colors: based on 'end' flag and out-degree for faster convergence.
          let mut colors: BTreeMap<IntermediatePrecomputeNode3Index, usize> = BTreeMap::new();
          let mut initial_color_map: BTreeMap<(bool, usize), usize> = BTreeMap::new();
          let mut next_initial_color = 0;
          for idx in &reachable {
              let g = idx.read(god).expect("read");
              let end = g.value.end;
              let out_degree = g.children().values().map(|dests| dests.len()).sum();
              let key = (end, out_degree);
              let color = *initial_color_map.entry(key).or_insert_with(|| {
                  let c = next_initial_color;
                  next_initial_color += 1;
                  c
              });
              colors.insert(*idx, color);
          }

          if DEBUG_LOG {
              println!(
                  "[optimize_intermediate_trie3] Initial classes: {}",
                  next_initial_color
              );
          }

          // Iteratively refine until stable.
          let mut iter = 0usize;
          loop {
              iter += 1;
              let mut sigs: Vec<(IntermediatePrecomputeNode3Index, WLNodeSignature)> =
                  Vec::with_capacity(reachable.len());
              for idx in &reachable {
                  let sig = build_node_signature_fast(*idx, god, &colors, &key_ids);
                  sigs.push((*idx, sig));
              }

              // Intern signatures to compact color IDs.
              let mut intern: HashMap<WLNodeSignature, usize> = HashMap::with_capacity(sigs.len() * 2);
              let mut next_color_id: usize = 0;
              let mut new_colors: BTreeMap<IntermediatePrecomputeNode3Index, usize> = BTreeMap::new();

              for (idx, sig) in sigs {
                  let cid = if let Some(c) = intern.get(&sig) { *c } else {
                      let c = next_color_id;
                      intern.insert(sig, c);
                      next_color_id += 1;
                      c
                  };
                  new_colors.insert(idx, cid);
              }

              // Compare with old colors to check for stability.
              let mut changed = 0usize;
              for (idx, new_c) in &new_colors {
                  if colors.get(idx).copied().unwrap_or(usize::MAX) != *new_c {
                      changed += 1;
                  }
              }

              if DEBUG_LOG {
                  println!(
                      "[optimize_intermediate_trie3] WL iteration {}: classes={}, changed={}",
                      iter,
                      new_colors.values().copied().collect::<HashSet<_>>().len(),
                      changed
                  );
              }

              colors = new_colors;
              if changed == 0 {
                  break;
              }
          }

          // Count classes and returns stats.
          let classes = colors.values().copied().collect::<HashSet<_>>().len();
          (colors, iter, classes, reachable.len())
      }

      fn rewire_to_canonical(
          colors: &BTreeMap<IntermediatePrecomputeNode3Index, usize>,
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
          node_map: &mut BTreeMap<IntermediatePrecomputeNode3Index, IntermediatePrecomputeNode3Index>,
      ) -> (usize, usize) {
          // Compute reachable again to scope work.
          let mut reachable = Trie::all_nodes(god, roots);
          reachable.sort_unstable();
          reachable.dedup();

          // Build canonical representative per color (pick minimum index).
          let mut canon_by_color: HashMap<usize, IntermediatePrecomputeNode3Index> = HashMap::new();
          for idx in &reachable {
              let c = colors[idx];
              match canon_by_color.get(&c) {
                  Some(existing) => {
                      if idx.as_usize() < existing.as_usize() {
                          canon_by_color.insert(c, *idx);
                      }
                  }
                  None => {
                      canon_by_color.insert(c, *idx);
                  }
              }
          }

          // Build node->canonical map (only store changed ones into node_map)
          let mut merges = 0usize;
          for idx in &reachable {
              let c = colors[idx];
              let canon = *canon_by_color.get(&c).expect("canonical missing");
              if *idx != canon {
                  merges += 1;
                  node_map.insert(*idx, canon);
              }
          }
          if DEBUG_LOG {
              println!(
                  "[optimize_intermediate_trie3] Canonicalization: classes={}, merges={}",
                  canon_by_color.len(),
                  merges
              );
          }

          // Prepare rewiring plan: for each src and edge key, move edges to canonical destination.
          let mut plan: BTreeMap<
              IntermediatePrecomputeNode3Index,
              BTreeMap<IntermediateTrie3EdgeKey, Vec<(IntermediatePrecomputeNode3Index, IntermediatePrecomputeNode3Index)>>
          > = BTreeMap::new();

          for src in &reachable {
              if let Some(r) = src.read(god) {
                  for (ek, dsts) in r.children().iter() {
                      for (dst, _ev) in dsts.iter() {
                          let c = colors[dst];
                          let canon_dst = *canon_by_color.get(&c).unwrap();
                          if canon_dst != *dst {
                              plan.entry(*src)
                                  .or_default()
                                  .entry(ek.clone())
                                  .or_default()
                                  .push((*dst, canon_dst));
                          }
                      }
                  }
              }
          }

          // Apply rewiring plan.
          let mut edges_rewired = 0usize;
          for (src, by_key) in plan {
              if let Some(mut w) = src.write(god) {
                  for (ek, mods) in by_key {
                      if let Some(map) = w.get_mut(&ek) {
                          for (old_dst, new_dst) in mods {
                              if old_dst == new_dst {
                                  continue;
                              }
                              if let Some(ev) = map.remove(&old_dst) {
                                  // Insert the new edge. This correctly handles cases where multiple children
                                  // are remapped to the same canonical destination.
                                  map.insert(new_dst, ev);
                                  edges_rewired += 1;
                              }
                          }
                      }
                  }
              }
          }

          (merges, edges_rewired)
      }

      fn prune_unproductive_paths_intermediate_trie3(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
      ) {
          if DEBUG_LOG { println!("[optimize_intermediate_trie3] Pruning nodes that cannot reach an end node..."); }
          if roots.is_empty() {
              return;
          }

          let all_nodes = Trie::all_nodes(god, roots);
          if all_nodes.is_empty() {
              return;
          }

          // 1. Build reverse adjacency list: dest -> sources
          let mut incoming: HashMap<IntermediatePrecomputeNode3Index, Vec<IntermediatePrecomputeNode3Index>> = HashMap::new();
          for src in &all_nodes {
              let g = src.read(god).expect("read");
              for (_ek, dm) in g.children() {
                  for (dst, _ev) in dm {
                      incoming.entry(*dst).or_default().push(*src);
                  }
              }
          }

          // 2. Initialize worklist with all end nodes
          let mut productive: HashSet<IntermediatePrecomputeNode3Index> = HashSet::new();
          let mut q: VecDeque<IntermediatePrecomputeNode3Index> = VecDeque::new();
          let mut end_nodes_count = 0usize;
          for n in &all_nodes {
              let r = n.read(god).expect("read");
              if r.value.end {
                  end_nodes_count += 1;
                  if productive.insert(*n) {
                      q.push_back(*n);
                  }
              }
          }

          if end_nodes_count == 0 {
              if DEBUG_LOG { println!("[optimize_intermediate_trie3] No end nodes found; skipping pruning."); }
              return;
          }

          // 3. Reverse BFS to find all productive nodes
          while let Some(d) = q.pop_front() {
              if let Some(srcs) = incoming.get(&d) {
                  for s in srcs {
                      if productive.insert(*s) {
                          q.push_back(*s);
                      }
                  }
              }
          }

          let total_nodes = all_nodes.len();
          let productive_nodes = productive.len();
          let prunable = total_nodes.saturating_sub(productive_nodes);
          println!(
              "[optimize_intermediate_trie3] End-reachability: total={}, productive={}, prunable={}",
              total_nodes, productive_nodes, prunable
          );
          if prunable == 0 {
              return;
          }

          // 4. Remove any edge to a non-productive destination
          if DEBUG_LOG {
              // Log only summary above; the per-node pruning happens below.
          }
          for n in &all_nodes {
              let mut w = n.write(god).expect("write");
              let old_children = std::mem::take(w.children_mut());
              for (ek, dm) in old_children {
                  let mut new_dm = ordered_hash_map::OrderedHashMap::new();
                  for (dst, ev) in dm {
                      if productive.contains(&dst) {
                          new_dm.insert(dst, ev);
                      }
                  }
                  if !new_dm.is_empty() {
                      w.children_mut().insert(ek, new_dm);
                  }
              }
          }

          // 5. Recompute all max depths
          Trie::recompute_all_max_depths(god, roots);

          if DEBUG_LOG { println!("[optimize_intermediate_trie3] Finished end-reachability pruning."); }
      }

      fn gc_preserving_ends(
          god: &IntermediateTrie3GodWrapper,
          roots: &[IntermediatePrecomputeNode3Index],
      ) {
          let mut effective_roots = roots.to_vec();

          // Arena::to_vec() is expensive, but it's the way to get all items.
          // We need to preserve all end nodes, even if they become disconnected.
          let all_entries = god.to_vec();
          for (idx, trie) in all_entries {
              if trie.value.end {
                  effective_roots.push(IntermediatePrecomputeNode3Index::new(idx));
              }
          }
          effective_roots.sort();
          effective_roots.dedup();
          Trie::gc(god, &effective_roots);
      }

      pub fn optimize_intermediate_trie3(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
          is_end: impl Fn(IntermediatePrecomputeNode3Index, &IntermediatePrecomputeNode3) -> bool,
      ) -> BTreeMap<IntermediatePrecomputeNode3Index, IntermediatePrecomputeNode3Index> {
          let original_roots = roots.to_vec();

          if DEBUG_LOG { has_true_cycle_intermediate_trie3(god, roots); }

          prune_unproductive_paths_intermediate_trie3(roots, god);

          // Pass A: aggressively remove simple NoOp chains (epsilon-like edges).
          if DEBUG_LOG { println!("[optimize_intermediate_trie3] Contracting NoOp chains..."); }
          let mut passes = 0;
          while contract_noop_chains(roots, god) {
              passes += 1;
              if DEBUG_LOG { println!("[optimize_intermediate_trie3] NoOp chain contraction pass {} complete.", passes); }
              if passes > 10 {
                   if DEBUG_LOG { println!("[optimize_intermediate_trie3] WARN: NoOp chain contraction took too many passes, breaking."); }
                   break;
              }
          }
          if passes > 0 {
              if DEBUG_LOG { println!("[optimize_intermediate_trie3] NoOp chains contracted. Running GC."); }
              gc_preserving_ends(god, roots);
          } else {
              if DEBUG_LOG { println!("[optimize_intermediate_trie3] NoOp chains contracted."); }
          }
          if DEBUG_LOG { has_true_cycle_intermediate_trie3(god, roots); }

          // Pass B: normalize CheckLLM partitions, then contract linear CheckLLM chains.
          if DEBUG_LOG { println!("[optimize_intermediate_trie3] Normalizing CheckLLM edges..."); }
          let mut changed_any = normalize_checkllm_edges_for_all(roots, god);
          if DEBUG_LOG { println!("[optimize_intermediate_trie3] Contracting CheckLLM chains..."); }
          let mut chain_passes = 0usize;
          while contract_checkllm_chains(roots, god) {
              chain_passes += 1;
              changed_any = true;
              if chain_passes > 10 {
                  if DEBUG_LOG { println!("[optimize_intermediate_trie3] WARN: CheckLLM chain contraction took too many passes, breaking."); }
                  break;
              }
          }
          if changed_any {
              if DEBUG_LOG { println!("[optimize_intermediate_trie3] CheckLLM normalization/chain contraction made changes. Running GC."); }
              gc_preserving_ends(god, roots);
          }
          if DEBUG_LOG { has_true_cycle_intermediate_trie3(god, roots); }

          let node_map: BTreeMap<IntermediatePrecomputeNode3Index, IntermediatePrecomputeNode3Index> =
              BTreeMap::default();

          // Pass 1: color-refinement-based structural deduplication with progress reporting.
          if DEBUG_LOG { println!("[optimize_intermediate_trie3] Starting structural deduplication (WL color refinement)..."); }
          let (colors, iters, classes, total_nodes) = wl_color_refine(roots, god);
          if DEBUG_LOG {
              println!(
                  "[optimize_intermediate_trie3] Refinement complete: iterations={}, classes={}, nodes={}",
                  iters, classes, total_nodes
              );
          }

          // Normalize again before canonical rewiring to maximize equality exposure.
          if normalize_checkllm_edges_for_all(roots, god) {
              if DEBUG_LOG { println!("[optimize_intermediate_trie3] Normalization revealed new opportunities pre-canonicalization."); }
          }

          let mut node_map = node_map; // make mutable for update
          let (merges, edges_rewired) = rewire_to_canonical(&colors, roots, god, &mut node_map);
          if DEBUG_LOG {
              println!(
                  "[optimize_intermediate_trie3] Rewiring done: merges={}, edges_rewired={}",
                  merges, edges_rewired
              );
          }

          // Quick polish pass: normalization + WL + canonicalization can sometimes collapse further.
          let mut polish_changed = false;
          if normalize_checkllm_edges_for_all(roots, god) {
              polish_changed = true;
          }
          if polish_changed {
              if DEBUG_LOG { println!("[optimize_intermediate_trie3] Polishing: rerunning WL refinement after normalization..."); }
              let (colors2, iters2, classes2, total_nodes2) = wl_color_refine(roots, god);
              if DEBUG_LOG {
                  println!(
                      "[optimize_intermediate_trie3] Polish refinement complete: iterations={}, classes={}, nodes={}",
                      iters2, classes2, total_nodes2
                  );
              }
              let (merges2, edges_rewired2) = rewire_to_canonical(&colors2, roots, god, &mut node_map);
              if DEBUG_LOG {
                  println!(
                      "[optimize_intermediate_trie3] Polish rewiring done: merges={}, edges_rewired={}",
                      merges2, edges_rewired2
                  );
              }
          }
          // Check equivalence after optimization (currently no-op)
          let new_roots: Vec<_> = original_roots
              .iter()
              .map(|r| *node_map.get(r).unwrap_or(r))
              .collect();

          if DEBUG_LOG { println!("[optimize_intermediate_trie3] Running final GC."); }
          gc_preserving_ends(god, &new_roots);

          // assert!(
          //     are_intermediate_trie3_graphs_equal(&original_roots, &original_god, &new_roots, god, &is_end, 25),
          //     "Optimization failed to preserve graph equivalence for all roots"
          // );

          if DEBUG_LOG { has_true_cycle_intermediate_trie3(god, &new_roots); }

          node_map
      }

      type CycleReportIntermediate3 = Vec<(IntermediatePrecomputeNode3Index, Option<IntermediateTrie3EdgeKey>)>;

      fn detect_true_cycle_recursive_intermediate_trie3(
          node_idx: IntermediatePrecomputeNode3Index,
          edge_key_opt: Option<IntermediateTrie3EdgeKey>,
          god: &IntermediateTrie3GodWrapper,
          recursion_stack: &mut HashMap<IntermediatePrecomputeNode3Index, usize>,
          visited: &mut HashSet<IntermediatePrecomputeNode3Index>,
          path: &mut Vec<(IntermediatePrecomputeNode3Index, Option<IntermediateTrie3EdgeKey>)>,
      ) -> Option<CycleReportIntermediate3> {
          path.push((node_idx, edge_key_opt));

          if let Some(&path_start_idx) = recursion_stack.get(&node_idx) {
              let cycle_path = path[path_start_idx..].to_vec();
              path.pop();
              return Some(cycle_path);
          }

          if visited.contains(&node_idx) {
              path.pop();
              return None;
          }

          recursion_stack.insert(node_idx, path.len() - 1);

          // Avoid cloning the entire children map; just collect the next nodes to traverse.
          let mut nexts: Vec<(IntermediateTrie3EdgeKey, IntermediatePrecomputeNode3Index)> = Vec::new();
          if let Some(guard) = node_idx.read(god) {
              for (edge_key, dest_map) in guard.children().iter() {
                  match edge_key {
                      IntermediateTrie3EdgeKey::CheckLLM(_) | IntermediateTrie3EdgeKey::NoOp => {
                          for (child_idx, _) in dest_map.iter() {
                              nexts.push((edge_key.clone(), *child_idx));
                          }
                      }
                      IntermediateTrie3EdgeKey::Pop(_, _) | IntermediateTrie3EdgeKey::Push(_) => {
                          // These edges break "true" cycles, so we don't traverse them.
                      }
                  }
              }
          } else {
              recursion_stack.remove(&node_idx);
              path.pop();
              return None;
          }

          for (ek, child_idx) in nexts {
              if let Some(report) = detect_true_cycle_recursive_intermediate_trie3(
                  child_idx,
                  Some(ek),
                  god,
                  recursion_stack,
                  visited,
                  path,
              ) {
                  return Some(report);
              }
          }

          recursion_stack.remove(&node_idx);
          visited.insert(node_idx);
          path.pop();
          None
      }

      pub fn has_true_cycle_intermediate_trie3(
          god: &IntermediateTrie3GodWrapper,
          roots: &[IntermediatePrecomputeNode3Index],
      ) {
          let mut visited: HashSet<IntermediatePrecomputeNode3Index> = HashSet::new();
          for &root in roots {
              if visited.contains(&root) {
                  continue;
              }
              if let Some(cycle_path) = detect_true_cycle_recursive_intermediate_trie3(
                  root,
                  None,
                  god,
                  &mut HashMap::new(),
                  &mut visited,
                  &mut Vec::new(),
              ) {
                  let mut report = format!(
                      "Stack-neutral cycle detected in intermediate precompute3 trie.\nCycle path:\n"
                  );
                  for i in 0..cycle_path.len() {
                      let (node_idx, _) = &cycle_path[i];
                      let next_i = (i + 1) % cycle_path.len();
                      let (next_node_idx, edge_to_next_opt) = &cycle_path[next_i];
                      let edge_str = edge_to_next_opt.as_ref().map_or_else(
                          || " (root edge)".to_string(),
                          |ek| format!("{}", ek),
                      );
                      report.push_str(&format!("  {} --[{}]--> {}\n", node_idx, edge_str, next_node_idx));
                  }
                  panic!("{}", report);
              }
          }
      }
