      - Recomputing edge metadata on every GSS operation, which is unnecessarily expensive and not used in the runtime flow.
      - Using object identity for BFS dedup in commit, which fails to deduplicate semantically identical GSS states and explodes work.
      - Redoing identical reductions and isolates repeatedly within _process_token.
      - Merging many single-state isolates when traversing the trie in get_mask.

      The edits below:
      - Disable expensive edge metadata recomputation by default (still available when needed).
      - Use semantic (hash/eq) GSS dedup in commit.
      - Cache popn per reduction length, group reductions by goto states, and isolate once per group.
      - Cache popn in get_mask and isolate by a set of allowed states in one go.

      Step-by-step instructions

      1) File: python/gss_tester/leveled_impl.py

      - Make edge metadata tracking optional (disabled by default) to avoid recomputation each time a new GSS instance is created. Add a track_edges flag to the constructor and gate the recomputation.
      - Remove the earlier duplicate _clone_with (there are two definitions in the file). Keep the one in the “Override core mutators” section and update it to carry the track_edges flag.
      - Add a popn(n) method for efficient multi-pop without chaining n calls to pop.
      - Add isolate_values(allowed_values: Set[T]) to filter heads matching any of the allowed top values in one pass, avoiding repeated isolate+merge patterns.

