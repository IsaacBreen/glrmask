              print("\n--- get_mask START ---")
              print("GSS at start of get_mask:")
              state_map = self.state

              expected_state_map = {sid: convert_rust_gss_to_python_gss(rust_gss) for sid, rust_gss in self.constraint_state.get_state_map().items()}

