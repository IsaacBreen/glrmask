              // The Debug impl for GrammarDefinition is quite verbose.
              // Consider a more Python-friendly summary or selective printing.
              println!("{}", self.inner);
          }

          fn to_json_string(&self) -> PyResult<String> {
              Ok(self.inner.to_json().to_json_string())
