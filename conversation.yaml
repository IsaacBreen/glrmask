                      seq![rep1(digit.clone()), eat_u8(b'.'), rep(digit.clone())], // Float with digits before .
                      seq![eat_u8(b'.'), rep1(digit.clone())], // Float starting with .
                      // Simplified: Not including hex, oct, bin, complex for this test focus
                  ]),
                  ("STRING", choice![
