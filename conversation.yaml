      6) Insert helper: redirect all incoming edges for a node to a new node
      - Add this helper:

      ```rust
      fn redirect_incoming_to(
          from: IntermediatePrecomputeNode3Index,
          to: IntermediatePrecomputeNode3Index,
          incoming: &mut HashMap<IntermediatePrecomputeNode3Index, Vec<IntermediatePrecomputeNode3Index>>,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          if from == to {
              return false;
          }
          let mut any = false;

          let sources: Vec<IntermediatePrecomputeNode3Index> = incoming.get(&from).cloned().unwrap_or_default();
          for src in sources {
              // First collect which keys to update to avoid borrow conflicts
              let keys_to_update: Vec<IntermediateTrie3EdgeKey> = {
                  let sg = match src.read(god) {
                      Some(g) => g,
                      None => continue,
                  };
                  sg.children()
                      .iter()
                      .filter_map(|(ek, dm)| if dm.contains_key(&from) { Some(ek.clone()) } else { None })
                      .collect()
              };

              if keys_to_update.is_empty() {
                  continue;
              }

              if let Some(mut sw) = src.write(god) {
                  for ek in keys_to_update {
                      if let Some(dm) = sw.children_mut().get_mut(&ek) {
                          if dm.remove(&from).is_some() {
                              dm.insert(to, ());
                              any = true;
                          }
                      }
                  }
                  // Clean up any empty key entries
                  sw.children_mut().retain(|_ek, dm| !dm.is_empty());
              }

              // Update incoming map bookkeeping
              if let Some(v) = incoming.get_mut(&from) {
                  v.retain(|p| *p != src);
              }
              incoming.entry(to).or_default().push(src);
          }

          any
      }
      ```

      7) Insert helper pass: flatten NoOp edges (preserving connectivity to end_node)
      - This removes NoOp layers by splicing child edges up into the parent. It never removes NoOp edges that target the template’s end_node, so end_node remains reachable as required.

      ```rust
      fn compress_noop_edges(
          start_nodes: &[IntermediatePrecomputeNode3Index],
          end_node: &IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let (nodes, _incoming, _child_sets) = collect_subgraph_nodes_and_incoming(start_nodes, god);
          if nodes.is_empty() {
              return false;
          }

          let mut changed = false;

          // Iterate nodes; for each NoOp edge (except ones going to end_node), splice child's edges into the parent.
          for n in &nodes {
              // Snapshot NoOp targets first
              let noop_targets: Vec<IntermediatePrecomputeNode3Index> = {
                  let g = match n.read(god) {
                      Some(guard) => guard,
                      None => continue,
                  };
                  let mut targets = Vec::new();
                  if let Some(dm) = g.children().get(&IntermediateTrie3EdgeKey::NoOp) {
                      for (dst, _) in dm.iter() {
                          if dst != end_node {
                              targets.push(*dst);
                          }
                      }
                  }
                  targets
              };

              if noop_targets.is_empty() {
                  continue;
              }

              // Gather all edges from the NoOp targets
              let mut edges_to_add: Vec<(IntermediateTrie3EdgeKey, IntermediatePrecomputeNode3Index)> = Vec::new();
              for t in &noop_targets {
                  if let Some(tg) = t.read(god) {
                      for (ek2, dm2) in tg.children() {
                          for (dst2, _) in dm2 {
                              edges_to_add.push((ek2.clone(), *dst2));
                          }
                      }
                  }
              }

              // Apply: remove those NoOp targets and add collected edges
              if let Some(mut w) = n.write(god) {
                  if let Some(dm) = w.children_mut().get_mut(&IntermediateTrie3EdgeKey::NoOp) {
                      for t in &noop_targets {
                          if dm.remove(t).is_some() {
                              changed = true;
                          }
                      }
                      if dm.is_empty() {
                          w.children_mut().remove(&IntermediateTrie3EdgeKey::NoOp);
                      }
                  }

                  for (ek2, dst2) in edges_to_add {
                      let dest_map = w.children_mut().entry(ek2).or_default();
                      if !dest_map.contains_key(&dst2) {
                          dest_map.insert(dst2, ());
                          changed = true;
                      }
                  }
              }
          }

          changed
      }
      ```

      8) Insert helper pass: structural deduplication with global sharing
      - This performs bottom-up hash-consing within the template and uses a global interner to share identical subgraphs across different templates. It preserves the end_node as the canonical sink for this template by forcing the signature mapping for end_node to point to the template’s end_node.

      ```rust
      fn dedup_structurally_and_share(
          start_nodes: &[IntermediatePrecomputeNode3Index],
          end_node: &IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          // Collect subgraph info
          let (nodes, mut incoming, child_sets) = collect_subgraph_nodes_and_incoming(start_nodes, god);
          if nodes.is_empty() {
              return false;
          }

          let order = topo_postorder_by_unique_children(&nodes, &incoming, &child_sets);
          let mut fingerprints: HashMap<IntermediatePrecomputeNode3Index, u64> = HashMap::new();
          compute_structural_fingerprints(&order, god, &mut fingerprints);

          let mut changed = false;
          let mut local_canonical: HashMap<u64, IntermediatePrecomputeNode3Index> = HashMap::new();

          // Use one pass; sinks -> roots
          let mut gi = global_intern().lock().unwrap();

          for n in &order {
              let sig = match fingerprints.get(n) {
                  Some(s) => *s,
                  None => continue,
              };

              // Special-case: make this template's end_node the canonical sink for its signature
              if n == end_node {
                  gi.by_fingerprint.insert(sig, *n);
                  local_canonical.insert(sig, *n);
                  continue;
              }

              // Avoid trying to "merge" the template root pointer itself (identity must remain), but there are no incoming edges to redirect anyway.
              let is_start = start_nodes.iter().any(|s| s == n);

              // Prefer local canonical in this subgraph, then global
              let mut canonical = if let Some(c) = local_canonical.get(&sig) {
                  *c
              } else if let Some(c) = gi.by_fingerprint.get(&sig) {
                  *c
              } else {
                  // First time seeing this shape globally; claim it
                  gi.by_fingerprint.insert(sig, *n);
                  gi.total_inserted += 1;
                  local_canonical.insert(sig, *n);
                  *n
              };

              // If global canonical exists but we also have a local one (other than n), prefer local (keeps sharing within this template tighter).
              if let Some(local_c) = local_canonical.get(&sig) {
                  canonical = *local_c;
              }

              if canonical != *n && !is_start {
                  // Redirect all incoming edges to canonical
                  let rewired = redirect_incoming_to(*n, canonical, &mut incoming, god);
                  if rewired {
                      gi.total_merged += 1;
                      changed = true;
                  } else {
                      // Even if there were no sources inside this subgraph (rare), we still mark as reused.
                      gi.total_reused += 1;
                  }
              } else {
                  // This node becomes the local canonical
                  local_canonical.insert(sig, *n);
              }
          }

          changed
      }
      ```

