              -   Shift: `self.push_state(&stack, *to, top.t.clone())` becomes `self.push_state(&stack_top, *to, top_edge_val.clone())`.
              -   Reduce: `self.pop_and_goto(&stack, *len, *nt, &top.t)` becomes `self.pop_and_goto(&stack_top, *len, *nt, top_edge_val)`.
