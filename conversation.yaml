      +        .iter()
      +        .map(|r| *canon.get(r).unwrap_or(r))
      +        .collect();
      +    // GC unreachable nodes after rewiring to canonical subgraphs
      +    IntermediatePrecomputeNode3::gc(god, &new_roots);
      +    new_roots
      +}
