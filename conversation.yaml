      `eliminate_pushes_and_pops` is meant to be an efficient trie-based alternative implementation of the stack-based `eliminate_pushes_and_pops_path_based`. It should be able to work on a trie directly, efficiently transforming it without blowing up its size, even for large and complex tries with lots of node sharing, and **even cycles**. And it should be equivalent to the stack-based version (insofar as it matters, see `normalize_path`). Right now, it doesn't match the expected behaviour. (Note that it's not meant to produce the normalized path directly. It's just meant to produce paths that's equivalent *when normalized*. Requiring the paths to equal the normalized paths would result in trie transformations that are way too invasive. We want to keep the transformations minimal.)
      Note on cycles:
      The trie can be really complex. It can have nasty cycles. We don't get a lot of guarantees. One guarantee we *do* get is that push edges are not part of any such cycle. That is, once we traverse a push edge, it's not possible to traverse it again (without going backwards, which we can't do). Actually, the same is true of check edges (although they're less of a problem anyway). It's really no-op and pop edges that cause cycles.
      I don't know how or if this is useful. But there you go.
      Use a progress bar.
      If it's possible, it'd be good to detect an infinite loop (ie that the program will not terminate.) But I dunno if this is possible.
      Think deeply about how to implement this correctly.
      Make the implementation concise.
      Crucially, make sure the implementation is correct and **complete**. **It must eliminate all push operations it possibly can. It must not exit early. That would cause it to mismatch with the stack-based version.**
