      - In debug builds, you can validate postconditions for Precompute0 that there are no cycles reachable from roots (you already have has_llm_compatible_cycle for stage 0/1). Self-loop is the simplest cycle, so that would catch it too.

      Summary
      - The panic is a self-loop caused by reusing the current source node as a destination through dest_nodes_in_queue.
      - The quickest and safest fix: filter out the source node from reuse candidates and add an early-return in EdgeInserter::try_destination if destination == source_idx. Also guard the end-of-segment branch.
      - The “z, zabm, zabn” story is a good intuition pump; the concrete place this happens is when work_queue[next_pos][initial_state] already contains the node you’re currently processing, and you choose it again as a destination.
