          fi
      done
      if [ ! -f "$CONSTRAINT_FILE" ]; then
          echo "Error: Constraint file not found: $CONSTRAINT_FILE"
          exit 1
      fi
      if [ ! -f "$CODE_FILE" ]; then
          echo "Error: Code file not found: $CODE_FILE"
          exit 1
      fi


