      mod tests {
          use super::*;
          use crate::finite_automata::eat_u8;
          use crate::interface::tokenizer_combinators::{eat_u8_fast, eat_u8_negation_fast, eat_u8_range_fast, repeat0_fast};
          use crate::{choice_fast, groups, seq_fast};
          use bitvec::prelude::*;
