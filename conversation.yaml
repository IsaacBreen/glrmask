          let eof = *parser.terminal_map.get_by_left(&Terminal("$".to_string())).unwrap();

          let test_cases = [
              ("b", true),    // S -> b
              ("ab", true),   // S -> a S B -> a b B -> a b e
              ("aab", true),  // S -> a S B -> a (a S B) B -> a a b B B -> a a b e e
              ("aaab", true),
              ("a", false),   // Needs a 'b'
              ("ba", false),  // Cannot start with 'b' then 'a'
