      fn transform_all(root_arc: &mut Arc<GSSNode>, f: impl FnMut(&Acc) -> Option<Acc>) {
          let new_inner = root_arc.inner.apply_and_prune(f);
          *root_arc = Arc::new(GSSNode { inner: new_inner });
