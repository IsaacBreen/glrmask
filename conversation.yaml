          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let lhs = obj.remove("lhs").ok_or_else(|| "Missing field lhs for Production".to_string())
                                       .and_then(NonTerminal::from_json)?;
