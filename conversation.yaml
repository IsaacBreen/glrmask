      // src/constraint.rs
      #![allow(clippy::too_many_arguments)]

      use std::cmp::Ordering;
      use std::collections::{BTreeMap, BTreeSet, HashMap, HashSet};
      use std::hash::{Hash, Hasher};
      use std::ops::BitOr;
      use std::sync::{Arc, Mutex};
