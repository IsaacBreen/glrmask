      #[pymethods]
      impl PyHybridBitset {
          #[new]
          fn new() -> Self {
              Self { inner: RustHybridBitset::zeros() }
          }

          #[staticmethod]
          fn zeros() -> Self {
              Self { inner: RustHybridBitset::zeros() }
          }

