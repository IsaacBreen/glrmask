          - `Action::Normal(Reduce { nonterminal_id, len, .. })`: call the simplified `reduce_and_goto`, enqueue the resulting states (in `work_map` or `reduce_map`), and enqueue accepted stacks.
          - `Action::Normal(Split { shift, reduces })`: same, but handling both shift and multiple reduces.
          - `Action::Default(default_reduce)`: delegate to a simplified `handle_default_action`.

