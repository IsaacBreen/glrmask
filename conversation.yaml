                      let first = iter.next().unwrap();
                      let mut merged = first.as_ref().clone();
                      for other in iter {
                          merged._merge(&other, merge_depth - 1);
                      }
                      let mut merged = Arc::new(merged);
                      if merged == first {
                          merged = first;
                      }
                      *target_preds_vec = vec![merged];
                  }
              }
          }
