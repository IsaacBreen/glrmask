          pub optimize_trie3_constrain_bitvecs: bool,
      }

      impl Default for GrammarConstraintConfig {
          fn default() -> Self {
              // Self {
              //     optimize_trie2_prune_dead_paths: true,
              //     optimize_trie2_merge_nodes: true,
              //     optimize_trie2_factor_common_destinations: false,
