                  inner: self.inner | &rhs.inner,
              }
          }
      }

      impl<'a> Sub<&'a HybridBitset> for HybridBitset {
          type Output = HybridBitset;
          fn sub(self, rhs: &'a HybridBitset) -> Self::Output {
