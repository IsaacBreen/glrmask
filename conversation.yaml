      Note: Besides a source and a destination, an edge has these things:
      - LLM token mask
      - popn
      - state mask
      In the below analysis, we ignore the LLM token mask. ie imagine edges only have:
      - popn
      - state mask
      We can imagine that the LLM token mask is a way for us to define lots of graphs - one for each LLM token - where an edge in a graph for a particular LLM token is only activated if the LLM mask contains that token.
      So, conceptually, describing the behaviour without LLM tokens is perfectly fine.
      However, algorithms may need to carefully consider how to incorporate LLM token sets in order achieve acceptable efficiency.


      A graph together with a reverse state map describes how a state set propogates throughout the graph.

      The graph itself is a potentially-cyclic graph.
      An edge has a popn and a state mask.
      A node just has one piece of data: a boolean to indicate an end node.

      The reverse state map is a map from state ID to a set of state IDs. It tells us which LR states can appear below a given LR state in a parse stack.
      It is computed by looking at each state x, each of state x's shift(y) or goto(y) actions, and adding state x to the set for state y in the reverse state map.
      Applying the reverse state map to a state of sets simply means mapping each state to its set under the reverse state map, and taking the union over them.

      A state set can traverse any outgoing edges. In doing so, it gets transformed.
      To traverse an edge, first apply the reverse state map to the state set n times for popn.
      Then, apply the state mask. (Take the intersection.)

      A state at a node is said to be *terminal* iff it (or one of its transformed descendants) eventually reaches an end node.
          Similarly, a state on an edge mask is terminal iff it is terminal at the destination node.


      For some states on edge masks, it doesn't matter if they're there or not.
      To be precise: as long as a state on an edge mask is non-terminal, we are free to add or remove it as we please.
      It won't affect the 'behaviour' of the graph - most importantly it won't affect the output of `get_mask` - so it's allowed.

      There are a number of optimization-related reasons we might want to add states to edge masks. I won't go into them, but basically when we use an interval set to represent the state mask, the time/memory complexity is proportional to the number of intervals in it.
      Suppose we have a set with two intervals. If we can 'fill in' the space between those intervals, we can convert it to a one-interval set, which is more efficient.


      Define a useful value: the *alive state sets* for the graph are obtained by starting with the set of all states at each root node and propogating them through the graph.
      Depending on what we're doing, these sets may be useful.


      Goal 1:
      Our goal is to write an algorithm that optimizes the graph by (initially) modifying the state masks to meet these goals, in order of priority (highest to lowest).
      I have a number of alternatives.
      Alt 1:
      - minimize the number of intervals in each set
      - minimize interior gaps
      - maximize exterior span (make the outer bounds as long as possible - up to the max length, which is (0, num states))
      Notes:
      - The full span (0, num states) is always the best outcome
      - The goal 'minimize the number of intervals in each set' is kind of already served by goal of minimizing gaps
      Alt 2:
      - minimize the number of intervals in each set
      - maximize interior gaps
      - maximize exterior span
      Alt 3:
      - minimize the number of intervals in each set
      - maximize interior gaps
      - minimize exterior span
      Alt 4:
      - minimize the number of intervals in each set
      - minimize interior gaps
      - minimize exterior span
      Alt 5:
      - minimize the number of unique intervals *across all range sets*
          - ie suppose we gather all state masks across all edges, and then iterate through their intervals `(start, end)`, and gather them into a set. Our goal is to minimize the size of that set.
      Alt 6:
      - make as many total (0, num states) masks as possible
      Alt 7:
      - add as many states as possible from the source node's alive state set
      ~~Alt 5 *might* be the best performing/most useful.~~
      **Let's go with Alt 6.**


      Goal 2:
      Now, what's the point, besides improving range set performance? There *is* another purpose.
      Basically it helps us optimize the graph.

      There are two alternative goals for optimizing the graph:
      Alt 1:
      - reduce the number of nodes
      Alt 2:
      - reduce the number of edges
      Alt 3:
      - reduce the average minimum distance to an end node
      **Let's go with alt 2: reduce the number of edges.**

      Suppose we have a sequence of two edges like this:
      A --(popn: n, state mask: x)--> B --(popn: m, state mask: y)--> C
      As long as B isn't an end node, there are some conditions under which we can replace these two edges with one edge.

      Replacement 1:
      - Take the alive state set for node A. Transform it by applying the reverse state map n times.
      - If state mask x is a superset (or equal to) the transformed alive state set (and B isn't an end node), then we can replace B -> C with:
      - A --(popn: n+m, state mask: y)--> C
      Replacement 2:
      - If m == 0, we can replace the B -> C with:
      - A --(popn: n, state mask: intersection(x, y))--> C

      Note that since we're using goal 1 alt 6, it is convenient to use this instead for replacement rule 1:
      - If state mask x is (0, num states), then we can replace the two edges with:
      - A --(popn: n+m, state mask: y)--> C
      Hence, we don't need to calculate alive states, which can be a pain to keep updated as we progress (although perhaps if we iterate from bottom up then we wouldn't need to recalculate it anyway).

      If there are no more edges from B, then we can also remove edge A -> B, as well as node B itself.
      But if there *is* another edge from node B, then we can't.
      Note that if we can't actually remove node B then replacing edge B -> C doesn't actually help us in the goal of reducing the number of edges.

      So, if that is our goal, Replacement 1 is only good if we can actually remove node B from the graph entirely. And, in fact, if it fails to remove B from the graph, Replacement 1 can actually be *harmful*.
      The reason is that the computational cost in get_mask of pop n followed by pop m is approximately n + m. So, if we have
      - A --(popn: n, state mask: x)--> B --(popn: m, state mask: y)--> C
      and we shortcut it to
      - A --(popn: n+m, state mask: y)--> C
      There still exists A -> B, so the actual edges we have now are
      - A --(popn: n, state mask: x)--> B
      - A --(popn: n+m, state mask: y)--> C
      And when we traverse this in get_mask, the computational costs will be approx
      - $n + (n+m) = 2n+m.$
      If we look at the original edges
      - A --(popn: n, state mask: x)--> B --(popn: m, state mask: y)--> C
      the cost was approx
      - $n + m$
      so we incur an extra cost $n$ by applying replacement 1. Not good.

      In fact, a similar argument applies for replacement 2, and again we can incur extra cost $n$ by applying it if there's another edge from node B that prevents the removal of node B (and edge A -> B).


      So, optimization has two steps:
      1. transform state masks
      2. replace edges

      Transforming state masks:
      In principle, we can process state masks in any order.
      But different orders might give us different results.
      For deterministic ordering, we have basically two choices: bottom-up or top-down.
      Let's go with bottom-up.


      Implement this in full.
      Run the optimization method after `_reorder_llm_tokens_for_range_minimization` so we're dealing with fewer LLM tokens.
