  - user: |-
      In get_mask, we have a way of suspending and resuming the processing of a node, and a way of enqueueing with some notion of 'priority'.
      Without compromising performance, I want to generalise this. My aim is to test lots of different ways of scheduling, with various different precomputed data, maybe per-edge, maybe per-node.
      I want to make it really general.
      At the most basic level, we can imagine processing a single internal node. We iterate through that node's edges, do some stuff. Maybe enqueue some of the destinations.
      Crucially, we never update the final mask while processing an internal node. That's only done on a leaf node.

      So, let's maybe imagine internal node processing as a generator function.
      In the main loop, we pop an item from a queue, and split based on whether the node is internal or leaf. If it's leaf, we process it ourselves. If it's internal, it should be an already-initialized generator. We generate from it.
      What do we generate?
      Well, surely we should generate new queue items. That's one thing. Dests.
      Another thing we might generate is something that says 'stop processing this node for now, put me back in the queue'. This is something a generator might do if it wants to gracefully give another generator with higher priority a chance. This instruction should also specify the priority with which it should be re-enqueued.

      Let's not do zombie avoidance check inside the generator. We'll do it in the main loop. That way, the generator can be blissfully unaware of the final mask. It doesn't need to read the final mask, and it doesn't need to write to the final mask (remember, generators are only made for internal nodes, not end nodes).

      Actually, I've just realized the node types allow for a node to be both an end and to have children. But that's ok. We can just do end node processing if the node is an end node, and do internal node processing unconditionally.

      The performance should be just as good as the existing implementation.

      Implement this. Put it in python/aug25/models/precompute3_model_pure_python_opt4.py.
