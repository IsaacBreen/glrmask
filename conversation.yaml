  - assistant: |-
      Below is the plan, reasoning, and then the concrete edits.

      ---

      ## 1. What’s going wrong? High‑level diagnosis

      You currently have one algorithm for “negative resolution” implemented at NWA level:

      - `resolve_negative_codes_in_nwa`  
        → `apply_cancellations` (via `compute_cancellations`)  
        → `apply_finality_fixpoint`  
        → `remove_negative_transitions`  

      This same NWA-level algorithm is used in two different contexts:

      1. **DWA path**:  
         `resolve_negative_codes_in_dwa` does  
         `DWA  → NWA (from_dwa) → resolve_negative_codes_in_nwa → determinize_to_dwa → simplify`.

      2. **NWA path**:  
         Code (and tests) call `resolve_negative_codes_in_nwa` directly on an arbitrary NWA, then later determinize it.

      Empirically:

      - On **NWA = from_dwa(some DWA)** (deterministic, no epsilons), the algorithm behaves correctly.
      - On a **general NWA** with epsilons and nondeterminism, you get a counterexample:  
        `test_resolve_negatives_from_large_nwa_log` — after resolving negatives on the NWA and determinizing, the resulting DWA no longer accepts `[0, 422]` with weight `[1]`, even though the determinized DWA with negatives did.

      Therefore:

      > The NWA-level algorithm (`compute_cancellations` + `compute_finality_fixpoint`) is **only sound under extra invariants** (essentially those satisfied by `NWA::from_dwa`), and is **unsound on arbitrary NWAs**.

      ---

      ## 2. Mathematically, what semantics do we want?

      Let:

      - The alphabet be positive codes (`c ≥ 0`), a default symbol `* = DEFAULT_TRANSITION_SYMBOL`, and negative codes `neg(c) = i16::MIN + c`.
      - The **real input** only uses nonnegative codes and default. Negative codes are compilation artifacts that must be eliminated.

      Let `[[A]] : Σ⁺ → Weight` denote the semantic mapping of an automaton `A` from words over positive/default symbols to weights. Negative resolution must satisfy:

      > For every DWA or NWA `A`, after negative resolution `A'`, and for every word `w` over nonnegative/default symbols:  
      > `[[A']](w) = [[A]]*(w)`  
      > where `[[A]]*` is the semantics of `A` when negative codes are interpreted with their cancellation semantics.

      Moreover, we want:

      > For any NWA `N`, if `D = determinize(N)` and `D' = resolve_negatives(D)`, and `N' = resolve_negatives(N)` then  
      > `determinize(N')` is equivalent to `D'`.

      The test `test_resolve_negatives_from_large_nwa_log` is exactly checking this: NWA → determinize → resolve vs. NWA → resolve → determinize.

      ---

      ## 3. Key hypothesis and proof sketch

      ### Hypothesis 1

      The implementation of `resolve_negative_codes_in_dwa` (i.e., the pipeline

      `DWA → NWA::from_dwa → apply_cancellations + finality_fixpoint + remove_negative_transitions → determinize_to_dwa → simplify`)

      is **semantics-preserving on DWAs** under the intended negative-code semantics.

      Evidence:

      - All DWA-based tests (including nontrivial ones with long cancellation chains and defaults) pass.
      - `NWA::from_dwa` produces a deterministic NWA with **no epsilons** and at most one outgoing edge per label per state, which is precisely the regime in which your global fixpoint cancellation algorithm was designed.

      From here on, call this transformation `F_DWA(D)`.

      ### Hypothesis 2

      `resolve_negative_codes_in_nwa` applied directly to an arbitrary NWA `N` is **not semantics-preserving in general**. The failing test is a concrete counterexample: `[[determinize(resolve(N))]]([0,422]) = 0` whereas `[[resolve(determinize(N))]]([0,422]) = [1]`.

      So:

      - `F_NWA_old(N) = apply_cancellations + finality_fixpoint + remove_negative_transitions`  
        is not sound for arbitrary NWAs.

      ### Definition of a correct NWA-level transformation

      We know that determinization is semantics-preserving:

      - Let `Det(N)` be `N.determinize_to_dwa()`. Then `[[Det(N)]] = [[N]]` (standard subset construction generalized to your weights).

      We also know that `NWA::from_dwa` is semantics-preserving:

      - Let `NWA_from(D)` be `NWA::from_dwa(&D)`. Then `[[NWA_from(D)]] = [[D]]` because it is just a structural re-encoding (no ε, same transitions and weights).

      Given `F_DWA` is semantics-correct on DWAs, we can *define* a semantics-correct NWA-level transformation as:

      - `F_NWA_new(N) := NWA_from(F_DWA(Det(N)))`.

      Then for any NWA `N` and any positive/default word `w`:

      1. `[[Det(N)]](w) = [[N]](w)` (determinization).
      2. `[[F_DWA(Det(N))]](w) = [[Det(N)]]*(w)` (negative-resolution semantics on DWA).
      3. `[[NWA_from(F_DWA(Det(N)))]](w) = [[F_DWA(Det(N))]](w)`.

      Thus `[[F_NWA_new(N)]](w) = [[N]]*(w)` — i.e., negative semantics are correctly eliminated.

      Moreover:

      - If you start from `N`, compute `N' = F_NWA_new(N)`, and then determinize to get `D2 = Det(N')`, then
        `[[D2]] = [[N']] = [[F_DWA(Det(N))]]`.  
        So `D2` is equivalent to `F_DWA(Det(N))`. This exactly gives the property you want:

      > Resolving negatives on NWA then determinizing is equivalent (up to automaton isomorphism) to determinizing then resolving negatives on DWA.

      This is *by construction*, not a heuristic.

      ---

      ## 4. Design decision

      Given the above, the simplest, mathematically clean, and practically robust fix is:

      - **Do not** run the cancellation algorithm directly on arbitrary NWAs.
      - Instead, **define** NWA-level negative resolution as:
        - determinize the NWA to a DWA,
        - run the (already tested) DWA-level negative resolution,
        - convert the resulting DWA back to an NWA (structural).

      Implementation-wise:

      - Keep the NWA-level cancellation primitives (`apply_cancellations`, `compute_cancellations`, `apply_finality_fixpoint`) **unchanged**, but use them only in the DWA pipeline (i.e., after `NWA::from_dwa`).
      - Introduce a small, private helper `resolve_negative_codes_in_nwa_internal` that runs those primitives.
      - Make `resolve_negative_codes_in_dwa` call that internal helper (instead of the public `resolve_negative_codes_in_nwa`).
      - Redefine `pub fn resolve_negative_codes_in_nwa` to be:

        ```rust
        let mut dwa = nwa.determinize_to_dwa();
        resolve_negative_codes_in_dwa(&mut dwa);
        *nwa = NWA::from_dwa(&dwa);
        ```

      This ensures:

      - DWA path semantics are unchanged.
      - NWA path is *by definition* equivalent to DWA path.
      - The algorithm is conceptually simple: “canonicalize to DWA, resolve, convert back.”
      - Performance: we pay one determinization whenever we resolve negatives on an arbitrary NWA. In your typical pipeline, you will eventually determinize these NWAs anyway; doing it once earlier is usually acceptable. The heavy logic (cancellations) is still on a deterministic, ε-free structure, where it is efficient.

      ---

      ## 5. Concrete step-by-step edits

      All changes are in `src/precompute4/resolve_negatives.rs`.

      ### Step 1: Add an internal helper for NWA cancellations

      Right after `progress_step` (or before the current `resolve_negative_codes_in_nwa`), add a private helper that performs the old NWA-level logic without progress bars:

      ```rust
      fn resolve_negative_codes_in_nwa_internal(nwa: &mut NWA) {
          apply_cancellations(nwa);
          apply_finality_fixpoint(nwa);
          remove_negative_transitions(nwa);
          crate::debug!(4, "Applied changes to NWA.");
      }
      ```

      This is exactly the old body of `resolve_negative_codes_in_nwa`, minus the progress bar scaffolding.

      ### Step 2: Replace the public `resolve_negative_codes_in_nwa` with determinize–DWA–back pipeline

      Replace the entire existing definition of `pub fn resolve_negative_codes_in_nwa` with:

      ```rust
      pub fn resolve_negative_codes_in_nwa(nwa: &mut NWA) {
          // Define negative resolution on arbitrary NWAs via determinization
          // and the already-tested DWA pipeline.
          let mut dwa = nwa.determinize_to_dwa();
          resolve_negative_codes_in_dwa(&mut dwa);
          *nwa = NWA::from_dwa(&dwa);
      }
      ```

      This ensures:

      - When you call `resolve_negative_codes_in_nwa` on an arbitrary NWA, you get exactly: NWA → DWA → (DWA negative resolution) → DWA → NWA.

      Note that we do **not** call `simplify` on the resulting NWA; you can do that separately if needed. The DWA version already calls `simplify` on the DWA.

      ### Step 3: Make `resolve_negative_codes_in_dwa` use the internal helper

      In `resolve_negative_codes_in_dwa`, change the line:

      ```rust
      progress_step(&pb, 2, "Resolve negatives in NWA");
      resolve_negative_codes_in_nwa(&mut nwa);
      ```

      to:

      ```rust
      progress_step(&pb, 2, "Resolve negatives in NWA");
      resolve_negative_codes_in_nwa_internal(&mut nwa);
      ```

      This ensures there is no recursion:

      - `resolve_negative_codes_in_dwa` → internal NWA helper (pure NWA rewrite).
      - `resolve_negative_codes_in_nwa` (public) → determinize → `resolve_negative_codes_in_dwa` (full DWA pipeline) → back to NWA.

      ### Step 4: Leave the helper functions and tests as-is

      - `apply_cancellations`, `apply_finality_fixpoint`, `remove_negative_transitions`, and the `compute_*` functions remain unchanged.
      - The existing tests that call `resolve_negative_codes_in_dwa` are unaffected.
      - `test_resolve_negatives_from_large_nwa_log` calls:
        - `resolve_negative_codes_in_nwa` on `nwa2 = NWA::from_dwa(&d)`.  
          Under the new definition, this performs determinization → DWA pipeline → NWA, which is equal (up to isomorphism) to running the DWA pipeline directly on `d`. The subsequent extra calls to `apply_finality_fixpoint` and `remove_negative_transitions` see an NWA with no negative transitions and no epsilons (from `NWA::from_dwa`), so they are effectively no-ops.
        - `resolve_negative_codes_in_nwa` on the original `nwa`.  
          This now determinizes `nwa` first, so by construction the later determinized result matches the DWA pipeline’s result.

      Thus the failing assertion in `test_resolve_negatives_from_large_nwa_log` is resolved: both paths now go through the same canonical DWA-based semantics.

      ---

