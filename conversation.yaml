      Add methods and_step, and_parse, and and_parse_prefix_of that each return itself, allowing for call chains.

      ~~Replace GotoNotFound with AcceptPart, which indicates part of the input was accepted.~~

      ---

      Actually nah. Let's get rid of the field for partial acceptances. And so get rid of parse_any_prefix_of etc. as well.
      If the user wants to accumulate acceptancing states along the way, they can do so themselves.
