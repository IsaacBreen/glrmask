      /// optionally merging edge values if an edge already exists.
      /// Returns `Some(Arc<RwLock<Trie<...>>>)` if merge or insert succeeded.
      pub fn try_destination<EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
