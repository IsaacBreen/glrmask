              // Pre-insert edges with the target key
              {
                  let mut s = source.lock().unwrap();
                  s.try_insert("key", &mut Some(initial_edge_val1), child1.clone()).unwrap();
                  s.try_insert("key", &mut Some(initial_edge_val2.clone()), child2.clone()).unwrap();
              }

