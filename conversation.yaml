              assert!(Arc::ptr_eq(node_ptr.as_arc(), &child1));
              assert_eq!(*ev, new_edge_val);

              // Ensure the value for the skipped else_create was not used
              assert_ne!(result_node.read().unwrap().value, new_node_val_if_created);
          }

