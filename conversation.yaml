         - Create a stable dense ID for each node in the subgraph.
         - Compute exact signatures (end flag + for each edge key a sorted list of child dense IDs).
         - Group nodes by exact signatures and, per group, pick a canonical node (prefer pinned if present).
         - Redirect all incoming edges of non-pinned, non-canonical group members to the canonical node under the same edge key.

      4) Leave the calls commented/uncommented as you wish; with this change, enabling structural merging (both locally and globally) will no longer break semantics.

