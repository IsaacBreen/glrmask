          // Don’t add an edge from a node to itself.
          continue;
      }
      let actual_dst = inserter.try_destination(end_idx.as_arc().clone()).expect(...);

      These two changes make the algorithm robust even if future refactors introduce a similar path.

      Optional: explain why this is safe
      - Precompute0 builds a DAG (it’s a trie-like DAG with shared subtrees). Self-loops do not make sense semantically for the precomputation. Skipping a self-loop is always correct; if the only “candidate” was the source itself, we’ll fall back to creating a new node (or we simply skip that candidate completely), which is fine.

      Optional: a tiny mental tokenizer model for your case
      If you want a concrete mental model without writing extra code:
      - Tokenizer states: just 0 (initial) and 1.
      - execute_from_state("ab", 0) returns matches = {'a'(width 1)}, end_state = Some(1) (whole “ab” can end in 1).
      - execute_from_state("b", 0) returns matches = {'b'(width 1)}, end_state = Some(1).
      - execute_from_state("m", 0) and ("n", 0) similarly match 'm' and 'n'.

      Now:
      - dfs at segment “z” finishes and recurses into “ab” with assoc_by_state[0] = {A}, assoc_by_state[1] = {A}.
      - pos 0:
        - process state 0, source A:
          - match 'a' -> next_pos=1. Create or reuse destination B, insert B into work_queue[1][0].
        - process state 1, source A:
          - match 'a' -> next_pos=1. Reuse B from work_queue[1][0].
      - pos 1:
        - process B for both states 0 and 1 etc.

      The problematic variant happens if one of the entries at pos 0 uses source B (because of the shared structure in assoc_by_state) and work_queue[next_pos] already contains B; the code tries to reuse B as destination and we get the self-loop.

      Adding the guards above prevents this.

      Extra hardening you may want
