          import _sep1 as ffi
          print(f"\n--- Statistics for {model_name} ---")

          if not hasattr(model, 'arena') or not model.arena:
              print("  - Model has no arena or is empty. Cannot compute stats.")
              return

          num_nodes = len(model.arena)
          num_roots = len(model.roots_map)
