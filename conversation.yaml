      Okay, I understand. You want to optimize the grammar generation so that if a rule is defined directly as a `Choice`, like `Rule -> Choice(A | B | C)`, it gets translated into multiple productions (`Rule -> A`, `Rule -> B`, `Rule -> C`) instead of creating an intermediate non-terminal like `Rule -> __Choice0` and `__Choice0 -> A | B | C`.

      Here's the diff for `src/interface/interface.rs` to implement this change:

      ```diff
      --- a/src/interface/interface.rs
      +++ b/src/interface/interface.rs
      @@ -140,6 +140,7 @@
                   terminal_expr_to_group_id: &mut BiBTreeMap<Expr, usize>,
                   next_terminal_id: &mut usize,
               ) -> Vec<Symbol> {
      +            // TODO: Pre-collect all user-defined non-terminal names to ensure generated names are unique.
                   // TODO: define a function that makes us a unique name for an internal rule, with an appropriate prefix.
                   //  e.g. Option0, Repeat0, etc. Make sure there's no existing rule with that name (and there won't be one later either).
                   //  i.e. collect all nonterminals in the grammar upfront and pass it to convert_expr.
      @@ -236,20 +237,35 @@
               let mut next_non_terminal_id = 0;
               let mut tokens = BTreeMap::new();
       
      +        // Process each rule definition
               for (name, expr) in tqdm!(exprs.iter()) {
      -            let rhs = convert_expr(
      -                expr,
      -                &mut productions,
      -                &mut non_terminal_map,
      -                &mut next_non_terminal_id,
      -                &mut literal_map,
      -                &mut tokens,
      -                &mut terminal_name_to_group_id,
      -                &mut terminal_expr_to_group_id,
      -                &mut next_terminal_id,
      -            );
      -            productions.push(Production {
      -                lhs: NonTerminal(name.clone()),
      -                rhs,
      -            });
      +            let lhs = NonTerminal(name.clone());
      +            // Optimization: If the top-level expression is a Choice, create multiple productions directly.
      +            if let GrammarExpr::Choice(choices) = expr {
      +                for choice_expr in choices {
      +                    let rhs = convert_expr(
      +                        choice_expr,
      +                        &mut productions,
      +                        &mut non_terminal_map,
      +                        &mut next_non_terminal_id,
      +                        &mut literal_map,
      +                        &mut tokens,
      +                        &mut terminal_name_to_group_id,
      +                        &mut terminal_expr_to_group_id,
      +                        &mut next_terminal_id,
      +                    );
      +                    productions.push(Production { lhs: lhs.clone(), rhs });
      +                }
      +            } else {
      +                // Otherwise, convert the expression as usual and create a single production.
      +                let rhs = convert_expr(
      +                    expr,
      +                    &mut productions,
      +                    &mut non_terminal_map,
      +                    &mut next_non_terminal_id,
      +                    &mut literal_map,
      +                    &mut tokens,
      +                    &mut terminal_name_to_group_id,
      +                    &mut terminal_expr_to_group_id,
      +                    &mut next_terminal_id,
      +                );
      +                productions.push(Production { lhs, rhs });
      +            }
               }
       
               let tokenizer_exprs_vec: Vec<ExprGroup> = tokens

      ```

      **Explanation:**

      1.  The main loop in `Grammar::from_exprs` now checks if the `expr` for the current rule (`name`) is a `GrammarExpr::Choice`.
      2.  If it is a `Choice`, it iterates through each `choice_expr` within that `Choice`. For each `choice_expr`, it calls `convert_expr` and creates a `Production` using the original rule's `name` as the `lhs`. This effectively expands `Rule -> Choice(A | B)` into `Rule -> A` and `Rule -> B`.
      3.  If the top-level `expr` is *not* a `Choice`, it proceeds as before: calls `convert_expr` on the entire `expr` and creates a single `Production` for that rule.
      4.  The `convert_expr` function itself remains unchanged. It still handles nested `Choice` expressions (or choices within sequences, repeats, etc.) by creating intermediate non-terminals (like `__ChoiceN`), which is necessary in those contexts.

      This change directly addresses the optimization request for top-level choices without altering how nested structures are handled.
