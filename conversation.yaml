      ## 2. Access Guards

      These structs provide safe, scoped access to `Trie` nodes within an `Arena`, mimicking the behavior of `RwLock` guards.

      ### struct `Trie2ReadGuard<'a, EK, EV, T>`

      A read guard that provides immutable access to a `Trie` node. It holds a read lock on the `Arena` for its lifetime.

      ```rust
      pub struct Trie2ReadGuard<'a, EK: Ord, EV, T> {
          // fields are private
      }
      ```

      *   **`impl<'a, EK: Ord, EV, T> Deref for Trie2ReadGuard<'a, EK, EV, T>`**
          Allows the guard to be dereferenced to `&Trie<EK, EV, T>`.

      ### struct `Trie2WriteGuard<'a, EK, EV, T>`

      A write guard that provides mutable access to a `Trie` node. It holds a write lock on the `Arena` for its lifetime.

      ```rust
      pub struct Trie2WriteGuard<'a, EK: Ord, EV, T> {
          // fields are private
      }
      ```

      *   **`impl<'a, EK: Ord, EV, T> Deref for Trie2WriteGuard<'a, EK, EV, T>`**
          Allows the guard to be dereferenced to `&Trie<EK, EV, T>`.
      *   **`impl<'a, EK: Ord, EV, T> DerefMut for Trie2WriteGuard<'a, EK, EV, T>`**
          Allows the guard to be mutably dereferenced to `&mut Trie<EK, EV, T>`.

