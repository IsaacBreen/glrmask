      type Composition = BTreeMap<usize, Weight>;
      type Behavior = BTreeMap<Option<i16>, Composition>;

      fn apply_weight_to_pairs(base: &[(NWAStateID, Weight)], w: &Weight) -> Vec<(NWAStateID, Weight)> {
          if w.is_all_fast() {
              return base.to_vec();
          }
          base.iter()
              .map(|(sid, wt)| (*sid, wt & w))
              .filter(|(_, x)| !x.is_empty())
