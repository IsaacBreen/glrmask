      - a nonterminal A
      Look under state y, nonterminal A for a goto action. Let's say it's a goto to z.
      We add to the big set of gotos an element x->z.


      As you can imagine, the resulting sets become states of their own. And eventually we'll give each of these states, currently represented by their origin set, their own state ID.

      So, we now have a bunch of new states. We just keep going until there's no more to process.
      Let's suppose we're done.
      We have a bunch of new states, each containing big shift, reduce, goto maps. Now we want to convert them to states proper.
      BUT it won't be just any state. **Each action will be associated with a state ID set - the set of origin states for which that action applies.**
      You can imagine how this is computed. A shift in the big set is a set of x->y pairs. We form a single shift from this, and that shift's state ID set will be all the x values over the pairs.


