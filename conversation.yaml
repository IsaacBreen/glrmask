      We'll need to be able to process an input symbol stack with a NWA. This should produce a vector of (new position within the stack, new NWA state, weight). The weight is the accumulated weights encountered along the path. New position within stack will be at the end if either the input finished early or it finished the same time as a final NWA state was reached.

      Then, we need to define a way to combine two augmented NWAs.
      The method will be non-commutative. It'll take a left and a right item.
      Loop through the end map on the left, through each left end NWA state and stack.
      - Process the stack with the NWA on the right, producing vec of (pos (ignored), right stop NWA state, weight). Loop over this vec.
          - (Here, I use 'stop' as distinct from 'end', with 'stop' referring to the state where the NWA stopped traversing (either because the input ran out or a final NWA state was reached, or both), whereas 'end' refers to NWA states that in the end map, or those with 'final' weights.)
          - Create an epsilon transition transition from the left end state to the right stop NWA state with the given weight.
          - Find all right end NWA states reachable from the right stop NWA state. Loop through them.
              - For each stack in the end map (for a NWA state reachable from the right stop NWA state), prepend the remainder of the left stack (from the position onwards) to the right stack.
          - Since these are two different NWAs, we need to copy the subtree from the right stop NWA state into the left NWA.
          - Actually, might be better to copy the entire right NWA into the left NWA once before this loop. Cleaner. Yes, do that.

      Add this to `src/weighted_automata.rs` and `src/precompute4/augmented_nwa.rs`.
