                      out.insert(tokenizer_state_id.0, PyGSSNode { inner: glr_state.active_state.stack.clone() });
                  }
              });
              Ok(out)
          }

          fn set_state_map(&mut self, new_state: BTreeMap<usize, PyGSSNode>) -> PyResult<()> {
              self.inner.with_inner_mut(|state| {
