                      pop_val = int(pop_val)

                      llm_bv = bs_from_json(dumps(llm_bv_json))
                      # Convention: None means "no restriction" (all tokens allowed)
                      llm_mask: Optional[ffi.Bitset] = None if llm_bv.is_empty() else llm_bv

                      entry = pop_acc.get(pop_val)
