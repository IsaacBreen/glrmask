                      node_val.clone(),
                      merge_ev_append,
                      merge_nv_append_if_flag,
                  )
              };
              assert!(returned_node_res.is_ok());
              let returned_node = returned_node_res.unwrap();

              // Check that a new node was created
              assert_eq!(returned_node.lock().unwrap().value, node_val);
