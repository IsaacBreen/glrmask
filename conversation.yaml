                      let tuple: &PyTuple = item.downcast()?;
                      let gss_item: PyRef<LeveledGSS> = tuple.get_item(0)?.extract()?;
                      let value: PyObject = tuple.get_item(1)?.to_object(py);
                      let pushed = gss_item.push(value)?;
                      dest = dest.merge(&pushed)?;
                  }
                  Ok(dest)
