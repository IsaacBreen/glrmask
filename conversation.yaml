                          dests: List[int] = []
                          masks: List[Optional[ffi.Bitset]] = []
                          for d, bv in dest_map.items():
                              dests.append(int(d))
                              masks.append(bv)
                          sid_to_arcs[int(sid_val)] = _ArcBundle(dests=dests, masks=masks)

                      # Epsilon arcs to ArcBundle
                      if eps_map:
                          eps_dests: List[int] = []
                          eps_masks: List[Optional[ffi.Bitset]] = []
                          for d, bv in eps_map.items():
