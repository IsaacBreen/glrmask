      type Stage1Table = BTreeMap<BTreeSet<Item>, Stage1Row>;
      type Stage2Table = BTreeMap<BTreeSet<Item>, Stage2Row>;
      type Stage3Table = BTreeMap<BTreeSet<Item>, Stage3Row>;
