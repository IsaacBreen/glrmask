              let data = vec![10, 20, 10, 30, 20];
              let set: HybridBitset = data.into_iter().collect();

              let expected: BTreeSet<usize> = vec![10, 20, 30].into_iter().collect();
              assert_eq!(set.iter().collect::<BTreeSet<_>>(), expected);
