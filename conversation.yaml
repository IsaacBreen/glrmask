              assert!(regex.definitely_fully_matches(b"aced"));
              assert!(regex.definitely_fully_matches(b"bacde"));
              assert!(regex.could_match(b"a"));
              assert!(!regex.definitely_matches(b"a"));
              assert!(!regex.definitely_matches(b"b"));
