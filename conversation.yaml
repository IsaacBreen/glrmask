          err_msg = "Error Composing FSTs"
          check_ffi_error(ret_code, err_msg)

          return VectorFst(ptr=composition)


      def compose_with_config(
          fst: VectorFst, other_fst: VectorFst, config: ComposeConfig
      ) -> VectorFst:
