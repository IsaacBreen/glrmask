          /// but not incorrect for traversal.
          ///
          /// Uses a topological order (Kahn's algorithm). Assumes the graph is acyclic.
          pub fn recompute_all_max_depths(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: &[Trie2Index],
          ) {
              let all_nodes = Self::all_nodes(arena, roots);
