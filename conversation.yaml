    gss_tests/reference.py: |
      from typing import Callable, Dict, List, Set, Tuple


      class GSS:
          def __init__(self, stacks: List[Tuple[List[int], int]] = None):
              self.stacks = stacks if stacks is not None else [([], 0)]

          def push(self, inputs: List[Tuple['GSS', int]]) -> 'GSS':
              new_stacks = []
              for gss, token in inputs:
                  for stack, acc in gss.stacks:
                      new_stack = (stack + [token], acc)
                      new_stacks.append(new_stack)
              return GSS(new_stacks)

          def pop(self, count: int, token: int) -> 'GSS':
              filtered_stacks = [
                  (stack, acc) for stack, acc in self.stacks
                  if stack and stack[-1] == token
              ]
              return GSS(filtered_stacks)

          def mutate(self, func: Callable[[int], int]) -> None:
              self.stacks = [
                  (stack, func(acc)) for stack, acc in self.stacks
              ]

          def get_stacks(self) -> Dict[Tuple[int, ...], int]:
              return {tuple(stack): acc for stack, acc in self.stacks}

          def peek(self) -> Set[int]:
              return {stack[-1] for stack, _ in self.stacks if stack}

          def merge(self, other: 'GSS', merge_func: Callable[[int, int], int]) -> 'GSS':
              merged_dict: Dict[Tuple[int, ...], int] = {}
              
              for stack, acc in self.stacks:
                  key = tuple(stack)
                  merged_dict[key] = acc
              
              for stack, acc in other.stacks:
                  key = tuple(stack)
                  if key in merged_dict:
                      merged_dict[key] = merge_func(merged_dict[key], acc)
                  else:
                      merged_dict[key] = acc
                      
              merged_stacks = [
                  (list(stack), acc) for stack, acc in merged_dict.items()
              ]
              return GSS(merged_stacks)
    gss_tests/test_spec.py: |
      import inspect
      from typing import Generator, Tuple, Any
      from .reference import GSS


      def run_tests() -> Generator[Tuple[dict, int], None, None]:
          # Initial state
          gss = GSS()
          yield gss.get_stacks(), inspect.currentframe().f_lineno

          # Basic push
          gss = gss.push([(gss, 5)])
          yield gss.get_stacks(), inspect.currentframe().f_lineno

          # Multiple pushes
          gss = gss.push([(gss, 10), (gss, 15)])
          yield gss.get_stacks(), inspect.currentframe().f_lineno

          # Pop operation
          gss = gss.pop(1, 15)
          yield gss.get_stacks(), inspect.currentframe().f_lineno

          # Mutate accumulators
          gss.mutate(lambda x: x * 2)
          yield gss.get_stacks(), inspect.currentframe().f_lineno

          # Merge two GSS instances
          other = GSS([([5, 10], 100)])
          merged = gss.merge(other, lambda a, b: a + b)
          yield merged.get_stacks(), inspect.currentframe().f_lineno

          # Peek operation
          _ = merged.peek()
          yield merged.get_stacks(), inspect.currentframe().f_lineno

          # Empty GSS tests
          empty_gss = GSS([])
          yield empty_gss.get_stacks(), inspect.currentframe().f_lineno

          # Pop from empty
          empty_popped = empty_gss.pop(1, 5)
          yield empty_popped.get_stacks(), inspect.currentframe().f_lineno

          # Push with empty inputs
          empty_pushed = empty_gss.push([])
          yield empty_pushed.get_stacks(), inspect.currentframe().f_lineno

          # Mutate empty
          empty_gss.mutate(lambda x: x + 1)
          yield empty_gss.get_stacks(), inspect.currentframe().f_lineno

          # Complex merge scenario
          gss1 = GSS([([1, 2], 10), ([3, 4], 20)])
          gss2 = GSS([([1, 2], 5), ([5, 6], 15)])
          complex_merged = gss1.merge(gss2, lambda a, b: max(a, b))
          yield complex_merged.get_stacks(), inspect.currentframe().f_lineno

          # Push with nested GSS
          nested_gss = GSS([([7], 50)])
          nested_push = gss1.push([(nested_gss, 99)])
          yield nested_push.get_stacks(), inspect.currentframe().f_lineno

          # Final state
          yield nested_push.get_stacks(), inspect.currentframe().f_lineno
    gss_tests/runner.py: |
      import json
      from test_spec import run_tests


      def main():
          results = []
          for state, line_number in run_tests():
              results.append({"gss": state, "line_number": line_number})
          
          print(json.dumps(results, indent=2))

      if __name__ == "__main__":
          main()
