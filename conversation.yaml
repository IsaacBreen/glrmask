      ```text '/Users/isaacbreen/Projects2/obsidian/grammars25/public interface of trie.rs.md'
      ## Table of Contents

      1.  [Core Data Structures](#core-data-structures)
          *   [struct `Trie<EK, EV, T>`](#struct-trieek-ev-t)
          *   [struct `Trie2Index`](#struct-trie2index)
