      use crate::finite_automata::{Expr, ExprGroup, ExprGroups, GroupID, Regex};
      use serde::Deserialize;
      use std::collections::BTreeMap;
      use std::error::Error;
      use std::fs::File;
      use std::io::BufReader;

      #[derive(Deserialize, Debug)]
      struct AddedToken {
          id: GroupID,
          content: String,
          // other fields omitted for brevity
      }

      #[derive(Deserialize, Debug)]
      struct Model {
