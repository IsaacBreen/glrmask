          // - If an unconditional pop is followed by any other pop, they are merged.
          // - Remove unconditional no-ops (pop == 0, check == None).
          fn compress_stack(stack: Vec<TestEK>) -> Vec<TestEK> {
              let mut out: Vec<TestEK> = Vec::new();
              for ek in stack {
