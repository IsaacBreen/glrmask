              let mut processed_vals = Vec::new();
              let mut computed_vals = Vec::new();

              Trie::special_map(
                  vec![(root.clone(), 100)], // Start at root
                  |p, _ek, _ev, _n| Some(p + 1), // Step: increment // MODIFIED: Return Some
                  |cur, new| *cur = (*cur).max(new), // Merge: max
