          if workload_result["wall_time_ns"] / 1e9 > cfg.max_seconds:
              workload_result["outcome"] = "aborted"
              workload_result["notes"].append(f"Exceeded max_seconds={cfg.max_seconds}")

          return workload_result


      def workload_apply_prune(factory: GSSFactory, cfg: WorkloadConfig) -> JsonDict:
          """
          Build a balanced fanout and then apply and prune to stress accumulator transforms.
          Params:
            - depth: int
            - branching: int
            - apply_amount: int
            - prune_threshold: int
          """
          params = cfg.params
          depth = int(params.get("depth", 6))
          branching = int(params.get("branching", 2))
          apply_amount = int(params.get("apply_amount", 5))
          prune_threshold = int(params.get("prune_threshold", 10))

          recorder = factory.recorder
          workload_result: JsonDict = {
              "workload": "apply_prune",
              "params": params,
              "phases": [],
              "outcome": "ok",
              "notes": [],
              "derived": {},
          }

          tracemalloc.start()
          t_workload_start = time.perf_counter_ns()
          try:
              recorder.start_phase("build")
              g = build_balanced_fanout(factory, depth=depth, branching=branching)
              recorder.end_phase()

              recorder.start_phase("apply")
              g2 = g.apply(lambda acc, amt=apply_amount: acc + amt)
              recorder.end_phase()

              recorder.start_phase("prune")
              g3 = g2.prune(lambda acc, thr=prune_threshold: acc.real > thr)
              recorder.end_phase()

              recorder.start_phase("postcheck")
              _ = g3.peek()
              _ = g3.reduce_acc()
              recorder.end_phase()
          except Exception as e:
              workload_result["outcome"] = "error"
              workload_result["error"] = f"{e.__class__.__name__}: {e}"
              workload_result["traceback"] = traceback.format_exc()
          finally:
              t_workload_end = time.perf_counter_ns()
              current, peak = tracemalloc.get_traced_memory()
              tracemalloc.stop()
              workload_result["wall_time_ns"] = t_workload_end - t_workload_start
              workload_result["memory"] = {"current_bytes": current, "peak_bytes": peak}
              workload_result["phases"] = [p.to_json() for p in recorder.phases]
              workload_result["methods"] = recorder.to_json()["overall_methods"]

          try:
              workload_result["derived"]["theoretical_leaves"] = branching ** depth
              workload_result["derived"]["theoretical_nodes"] = (branching ** (depth + 1) - 1) // (branching - 1) if branching > 1 else depth + 1
          except Exception:
              pass

          if workload_result["wall_time_ns"] / 1e9 > cfg.max_seconds:
              workload_result["outcome"] = "aborted"
              workload_result["notes"].append(f"Exceeded max_seconds={cfg.max_seconds}")

          return workload_result


      def workload_fuzz(factory: GSSFactory, cfg: WorkloadConfig) -> JsonDict:
          """
          A short, deterministic fuzz run to capture general behavior and per-method mix.
          Params:
            - seed: int
            - steps: int
            - max_gss_states: int
          """
          from ..tests.fuzzer import run_fuzz_test

          params = cfg.params
          seed = int(params.get("seed", 42))
          steps = int(params.get("steps", 200))
          max_states = int(params.get("max_gss_states", 10))

          recorder = factory.recorder
          workload_result: JsonDict = {
              "workload": "fuzz",
              "params": params,
              "phases": [],
              "outcome": "ok",
              "notes": [],
              "derived": {},
          }

          tracemalloc.start()
          t_workload_start = time.perf_counter_ns()
          try:
              recorder.start_phase("fuzz")
              # Note: fuzzer expects a class; we wrap states ourselves via GSSFactory
              # Seed run: we build states using the concrete class, not the wrapper.
              # For measurement, we rebuild/wrap the yielded states into TimedGSS by reconstructing from stacks.
              gss_class = factory.gss_class

              # Start with an initial wrapped GSS
              _ = factory.from_stacks([([], MergeableInt(0))])

              for state in run_fuzz_test(
                  gss_class=gss_class,
                  seed=seed,
                  num_steps=steps,
                  max_gss_states=max_states,
                  value_pool=None
              ):
                  # Convert state to wrapped instance by round-tripping through to_stacks; keep modest steps for tiny/small
                  try:
                      stacks = state.to_stacks()
                  except Exception as e:
                      recorder.record_error("to_stacks", f"error during fuzz: {e}")
                      continue
                  _ = factory.from_stacks(stacks)
              recorder.end_phase()

              recorder.start_phase("postcheck")
              recorder.end_phase()
          except Exception as e:
              workload_result["outcome"] = "error"
              workload_result["error"] = f"{e.__class__.__name__}: {e}"
              workload_result["traceback"] = traceback.format_exc()
          finally:
              t_workload_end = time.perf_counter_ns()
              current, peak = tracemalloc.get_traced_memory()
              tracemalloc.stop()
              workload_result["wall_time_ns"] = t_workload_end - t_workload_start
              workload_result["memory"] = {"current_bytes": current, "peak_bytes": peak}
              workload_result["phases"] = [p.to_json() for p in recorder.phases]
              workload_result["methods"] = recorder.to_json()["overall_methods"]

          if workload_result["wall_time_ns"] / 1e9 > cfg.max_seconds:
              workload_result["outcome"] = "aborted"
              workload_result["notes"].append(f"Exceeded max_seconds={cfg.max_seconds}")

          return workload_result


      # ----------------------------
      # Presets and registry
      # ----------------------------

      def tiny_preset() -> List[WorkloadConfig]:
          # Target sizes that run quickly even on ReferenceGSS.
          return [
              WorkloadConfig("merge_surface_changes", {"depth": 4, "branching": 2, "clones": 4, "mutation": "push"}, max_seconds=5.0),
              WorkloadConfig("push_scaling", {"prefix_depth": 50, "surface_width": 32}, max_seconds=3.0),
              WorkloadConfig("merge_after_prefix_mutations", {"prefix_depth": 75, "surface_width": 32, "clones": 6, "pop_n": 1, "push_n": 2}, max_seconds=5.0),
              WorkloadConfig("pop_common_parent", {"siblings": 64, "parent_prefix_depth": 50}, max_seconds=3.0),
              WorkloadConfig("apply_prune", {"depth": 4, "branching": 2, "apply_amount": 5, "prune_threshold": 3}, max_seconds=5.0),
              WorkloadConfig("fuzz", {"seed": 7, "steps": 100, "max_gss_states": 10}, max_seconds=5.0),
          ]


      def small_preset() -> List[WorkloadConfig]:
          # Still safe for ReferenceGSS but a bit larger.
          return [
              WorkloadConfig("merge_surface_changes", {"depth": 5, "branching": 3, "clones": 6, "mutation": "push"}, max_seconds=12.0),
              WorkloadConfig("push_scaling", {"prefix_depth": 150, "surface_width": 64}, max_seconds=10.0),
              WorkloadConfig("merge_after_prefix_mutations", {"prefix_depth": 200, "surface_width": 64, "clones": 8, "pop_n": 2, "push_n": 3}, max_seconds=15.0),
              WorkloadConfig("pop_common_parent", {"siblings": 128, "parent_prefix_depth": 150}, max_seconds=10.0),
              WorkloadConfig("apply_prune", {"depth": 5, "branching": 3, "apply_amount": 7, "prune_threshold": 10}, max_seconds=12.0),
              WorkloadConfig("fuzz", {"seed": 42, "steps": 200, "max_gss_states": 10}, max_seconds=10.0),
          ]


      def medium_preset() -> List[WorkloadConfig]:
          # Designed for more efficient GSS implementations; reference may struggle.
          return [
              WorkloadConfig("merge_surface_changes", {"depth": 7, "branching": 3, "clones": 12, "mutation": "push"}, max_seconds=20.0),
              WorkloadConfig("push_scaling", {"prefix_depth": 500, "surface_width": 128}, max_seconds=20.0),
              WorkloadConfig("merge_after_prefix_mutations", {"prefix_depth": 800, "surface_width": 128, "clones": 16, "pop_n": 3, "push_n": 4}, max_seconds=25.0),
              WorkloadConfig("pop_common_parent", {"siblings": 256, "parent_prefix_depth": 500}, max_seconds=20.0),
              WorkloadConfig("apply_prune", {"depth": 6, "branching": 4, "apply_amount": 10, "prune_threshold": 20}, max_seconds=20.0),
              WorkloadConfig("fuzz", {"seed": 1337, "steps": 500, "max_gss_states": 15}, max_seconds=20.0),
          ]


      def large_preset() -> List[WorkloadConfig]:
          # Stressful for advanced implementations; large hidden complexity and surface sizes.
          return [
              WorkloadConfig("merge_surface_changes", {"depth": 8, "branching": 4, "clones": 20, "mutation": "push"}, max_seconds=45.0),
              WorkloadConfig("push_scaling", {"prefix_depth": 2000, "surface_width": 256}, max_seconds=45.0),
              WorkloadConfig("merge_after_prefix_mutations", {"prefix_depth": 3000, "surface_width": 256, "clones": 24, "pop_n": 4, "push_n": 5}, max_seconds=60.0),
              WorkloadConfig("pop_common_parent", {"siblings": 512, "parent_prefix_depth": 2000}, max_seconds=45.0),
              WorkloadConfig("apply_prune", {"depth": 7, "branching": 5, "apply_amount": 20, "prune_threshold": 40}, max_seconds=45.0),
              WorkloadConfig("fuzz", {"seed": 2024, "steps": 1000, "max_gss_states": 20}, max_seconds=40.0),
          ]


      PRESETS: Dict[str, Callable[[], List[WorkloadConfig]]] = {
          "tiny": tiny_preset,
          "small": small_preset,
          "medium": medium_preset,
          "large": large_preset,
      }


      WORKLOAD_FUNCS: Dict[str, Callable[[GSSFactory, WorkloadConfig], JsonDict]] = {
          "merge_surface_changes": workload_merge_surface_changes,
          "push_scaling": workload_push_scaling,
          "merge_after_prefix_mutations": workload_merge_after_prefix_mutations,
          "pop_common_parent": workload_pop_common_parent,
          "apply_prune": workload_apply_prune,
          "fuzz": workload_fuzz,
      }

      # ----------------------------
      # Sweep Presets
      # ----------------------------

      @dataclass
      class SweepConfig:
          workload: str
          axis: str
          values: List[Any] = field(default_factory=list)


      SWEEP_PRESETS: Dict[str, List[SweepConfig]] = {
          "tiny": [
              SweepConfig("push_scaling", "prefix_depth", [10, 25, 50, 75]),
              SweepConfig("pop_common_parent", "parent_prefix_depth", [10, 25, 50, 75]),
          ],
          "small": [
              SweepConfig("push_scaling", "prefix_depth", [20, 50, 100, 150]),
              SweepConfig("pop_common_parent", "parent_prefix_depth", [20, 50, 100, 150]),
              SweepConfig("merge_after_prefix_mutations", "prefix_depth", [20, 50, 100, 150]),
          ],
          "medium": [
              SweepConfig("push_scaling", "prefix_depth", [100, 250, 500, 800]),
              SweepConfig("pop_common_parent", "parent_prefix_depth", [100, 250, 500, 800]),
              SweepConfig("merge_after_prefix_mutations", "prefix_depth", [100, 250, 500, 800]),
              SweepConfig("merge_surface_changes", "depth", [4, 5, 6, 7]),
          ],
          "large": [
              SweepConfig("push_scaling", "prefix_depth", [500, 1000, 2000, 3000]),
              SweepConfig("pop_common_parent", "parent_prefix_depth", [500, 1000, 2000, 3000]),
              SweepConfig("merge_after_prefix_mutations", "prefix_depth", [500, 1000, 2000, 3000]),
              SweepConfig("merge_surface_changes", "depth", [5, 6, 7, 8]),
          ],
      }

      def get_preset_sweeps(preset: str) -> List[SweepConfig]:
          """Returns the list of predefined SweepConfigs for a given preset name."""
          return SWEEP_PRESETS.get(preset, [])


      # ---------------------------------------------------------------------------
      # Ideal scaling expectations registry
      # ---------------------------------------------------------------------------
      # This registry maps: workload -> axis -> phase_name -> ideal exponent
      # Exponent interpretation: time ~ O(axis_value^exponent) if other params fixed.
      # For "surface-only" efficient GSS implementations, the key phases should be
      # independent (exponent ~ 0) of the hidden complexity axis.
      #
      # Notes:
      # - build phases often scale with hidden size; we generally expect exponent > 0.
      # - apply_prune and fuzz are left unspecified as "ideal" behavior depends on
      #   semantics; analyzer will simply measure them without ideal comparison.
      SCALING_EXPECTATIONS: Dict[str, Dict[str, Dict[str, float]]] = {
          # A long hidden prefix, fixed surface width; a single push should be
          # independent of hidden prefix depth in an ideal GSS (exponent ~ 0).
          "push_scaling": {
              "prefix_depth": {
                  "build": 1.0,   # building grows with hidden prefix
                  "push": 0.0,    # should not depend on hidden prefix
                  "postcheck": 0.0,
              }
          },
          # Clone-and-merge after pushing unique tags at the surface;
          # merge should be independent of hidden prefix depth.
          "merge_after_prefix_mutations": {
              "prefix_depth": {
                  "build": 1.0,
                  "mutate_clones": 0.0,
                  "merge": 0.0,
                  "postcheck": 0.0,
              }
          },
          # Pop siblings back to a common parent; pop should be independent of
          # the hidden prefix depth.
          "pop_common_parent": {
              "parent_prefix_depth": {
                  "build": 1.0,
                  "pop": 0.0,
                  "postcheck": 0.0,
              }
          },
          # Balanced fanout DAG clones, mutate the surface, then merge.
          # We check independence from depth (hidden size). Even though hidden grows
          # exponentially with depth, ideal merge should be ~ constant vs depth.
          "merge_surface_changes": {
              "depth": {
                  "build": 1.0,   # grows with depth (proxy)
                  "clone_and_mutate": 0.0,
                  "merge": 0.0,
                  "postcheck": 0.0,
              }
          },
      }

      def get_scaling_expectations() -> Dict[str, Dict[str, Dict[str, float]]]:
          return SCALING_EXPECTATIONS
    python/gss_tester/run_tests.sh: |
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_tests.sh
      #
      # A script to automate running the GSS test specification against multiple
      # implementations, generating JSON results, and analyzing them for consistency.
      #
      # This script should be run from the `python` directory.
      #
      # Usage:
      #   ./gss_tester/run_tests.sh <reference_impl> <impl1> [impl2 ...]
      #
      # Example:
      #   ./gss_tester/run_tests.sh gss_tester.reference_impl.ReferenceGSS gss_tester.fast_impl.FastGSS
      #
      # Each implementation is specified as 'path.to.module.ClassName'.
      # ==============================================================================

      # --- Setup PYTHONPATH to find gss_tester ---
      # The script is in 'python/gss_tester', so the python source root is one level up.
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      PYTHON_SRC_ROOT="${SCRIPT_DIR}/.."
      export PYTHONPATH="${PYTHON_SRC_ROOT}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage: $0 <reference_impl> <impl1> [impl2 ...]"
          echo "Error: At least one implementation is required. The first is treated as the reference."
          exit 1
      fi

      REFERENCE_IMPL="$1"
      shift
      COMPETITORS=("$@")

      ALL_IMPLS=("$REFERENCE_IMPL" "${COMPETITORS[@]}")

      # --- Setup ---
      # Create a unique directory for this test run's results.
      RESULTS_DIR="gss_test_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Test results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Reference Implementation: $REFERENCE_IMPL"
      if [ "${#COMPETITORS[@]}" -gt 0 ]; then
        echo "Other Implementations: ${COMPETITORS[*]}"
      else
        echo "Other Implementations: (none)"
      fi
      echo "---"

      # --- Run Tests ---
      echo "Starting test runs..."
      REFERENCE_IMPL_CANONICAL="" # Will be set to the canonical name of the reference impl
      for full_impl_path in "${ALL_IMPLS[@]}"; do
          echo
          echo ">>> Running test spec for: $full_impl_path"

          # --- Convert file path to module and class names ---
          # This logic handles both module paths (e.g., gss_tester.ref.RefGSS) and
          # file paths (e.g., python/gss_tester/reference_impl.py).
          if [[ "$full_impl_path" == *.py ]]; then
              # Handle file path: derive module and class name by convention.
              # Module name: strip path up to 'python/', remove '.py' suffix(es), replace '/' with '.'
              module_name=$(echo "$full_impl_path" | sed -e 's#^.*python/##' -e 's#\(\.py\)*$##' -e 's#/#.#g')
              # Class name: e.g., 'reference_impl' -> 'ReferenceGSS'
              # Use sed to robustly strip one or more '.py' suffixes.
              base_name=$(basename "$full_impl_path" | sed 's#\(\.py\)*$##')
              class_name_base=$(echo "$base_name" | sed 's/_impl$//')
              class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
              full_impl_name="${module_name}.${class_name}"
          else
              # Handle module.ClassName format
              full_impl_name="$full_impl_path"
              module_name="${full_impl_name%.*}"
              class_name="${full_impl_name##*.}"
          fi

          # The first implementation is the reference; capture its canonical name.
          if [ -z "$REFERENCE_IMPL_CANONICAL" ]; then
              REFERENCE_IMPL_CANONICAL="$full_impl_name"
          fi

          output_file="${RESULTS_DIR}/${full_impl_name}.json"

          cmd=(python -m gss_tester.tests.runner
              "$module_name"
              "$class_name"
              --output "$output_file")
          echo "${cmd[*]}"
          if "${cmd[@]}"; then
              echo ">>> Finished test spec for: $full_impl_path"
          else
              exit_code=$?
              # Exit code 130 is from SIGINT (Ctrl+C)
              if [ $exit_code -eq 130 ]; then
                  echo
                  echo ">>> Test for $full_impl_path interrupted. Skipping."
              else
                  echo
                  echo ">>> Test for $full_impl_path failed with exit code $exit_code. Skipping."
              fi
          fi
      done
      echo
      echo "All test runs completed."
      echo "---"

      # --- Analyze Results ---
      echo "Analyzing results for consistency..."
      REFERENCE_RESULT_FILE="${RESULTS_DIR}/${REFERENCE_IMPL_CANONICAL}.json"

      # Check if the reference file was actually created
      if [ ! -f "$REFERENCE_RESULT_FILE" ]; then
          echo "Error: Reference result file was not generated: $REFERENCE_RESULT_FILE"
          echo "Skipping analysis."
          exit 1
      fi

      cmd=(python -m gss_tester.tests.analyzer
          "${RESULTS_DIR}"/*.json
          --reference "$REFERENCE_RESULT_FILE")
      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Consistency analysis complete."
      echo "Reference: $REFERENCE_IMPL"
      echo "Summary printed above."
      echo "Full JSON results are in: $RESULTS_DIR"
    python/gss_tester/run_benches.sh: |
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benches.sh
      #
      # Orchestrates running GSS benchmark workloads across one or more implementations,
      # saving JSON results, and producing comparative analyses and plots.
      #
      # Usage (Preset Mode):
      #   ./gss_tester/run_benches.sh <preset> <impl1> [impl2 ...] [-- [runner_args]]
      #
      # Usage (Sweep Mode for scaling analysis):
      #   ./gss_tester/run_benches.sh <preset> <impl> -- --sweep-workload <name> ...
      #
      # Notes:
      #   - Each implementation is specified as 'module.ClassName' or a .py path.
      #   - All arguments after the implementation list (or after a '--') are passed
      #     directly to the benchmark runner script.
      #
      # Examples:
      #   # Run 'small' preset workloads AND all predefined 'small' sweeps
      #   ./gss_tester/run_benches.sh small gss_tester.implementations.reference_impl.ReferenceGSS gss_tester.fast_impl.FastGSS
      #
      #   # Run only the 'push_scaling' workload from the 'tiny' preset
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --include push_scaling
      #
      #   # Run a single manual scaling sweep (does not run other preset workloads/sweeps)
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --sweep-workload push_scaling --sweep-axis prefix_depth --sweep-values 10 50 100 200
      # ==============================================================================

      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      PYTHON_SRC_ROOT="${SCRIPT_DIR}/.."
      export PYTHONPATH="${PYTHON_SRC_ROOT}:${PYTHONPATH:-}"

      if [ "$#" -lt 2 ]; then
        echo "Usage: $0 <preset> <impl1> [impl2 ...] [-- runner_args...]"
        exit 1
      fi

      PRESET="$1"
      shift

      # Collect implementations until we see a flag starting with '--' or we run out.
      IMPLS=()
      EXTRA_ARGS=()
      while (( "$#" )); do
        if [[ "$1" == --* ]]; then
          EXTRA_ARGS=("$@")
          break
        else
          IMPLS+=("$1")
        fi
        shift
      done

      if [ "${#IMPLS[@]}" -eq 0 ]; then
        echo "Error: No implementations provided."
        exit 1
      fi

      # Check if the user is asking for a manual sweep.
      is_manual_sweep=false
      for arg in "${EXTRA_ARGS[@]}"; do
        if [[ "$arg" == "--sweep-workload" ]]; then
          is_manual_sweep=true
          break
        fi
      done

      RESULTS_DIR="gss_bench_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Preset: $PRESET"
      echo "Implementations: ${IMPLS[*]}"
      if [ "${#EXTRA_ARGS[@]}" -gt 0 ]; then
        echo "Extra args to runner: ${EXTRA_ARGS[*]}"
      fi
      echo "---"

      for full_impl_path in "${IMPLS[@]}"; do
        if [[ "$full_impl_path" == *.py ]]; then
          module_name=$(echo "$full_impl_path" | sed -e 's#^.*python/##' -e 's#\(\.py\)*$##' -e 's#/#.#g')
          base_name=$(basename "$full_impl_path" | sed 's#\(\.py\)*$##')
          class_name_base=$(echo "$base_name" | sed 's/_impl$//')
          class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
          full_impl_name="${module_name}.${class_name}"
        else
          full_impl_name="$full_impl_path"
          module_name="${full_impl_name%.*}"
          class_name="${full_impl_name##*.}"
        fi

        if $is_manual_sweep; then
          # --- Run Manual Sweep ---
          echo
          echo ">>> Running manual sweep for: $full_impl_path"
          output_file="${RESULTS_DIR}/${full_impl_name}.manual_sweep.json"
          cmd=(python -m gss_tester.benchmarks.runner
              "$module_name" "$class_name" --preset "$PRESET" --output "$output_file" "${EXTRA_ARGS[@]}")
          echo "${cmd[*]}"
          if "${cmd[@]}"; then
              echo ">>> Finished manual sweep for: $full_impl_path"
          else
              exit_code=$?
              [ $exit_code -eq 130 ] && echo ">>> Sweep for $full_impl_path interrupted." || echo ">>> Sweep for $full_impl_path failed."
          fi
        else
          # --- Run Preset Workloads ---
          echo
          echo ">>> Running preset workloads for: $full_impl_path"
          output_file_preset="${RESULTS_DIR}/${full_impl_name}.preset.json"
          preset_cmd=(python -m gss_tester.benchmarks.runner
              "$module_name" "$class_name" --preset "$PRESET" --output "$output_file_preset" "${EXTRA_ARGS[@]}")
          echo "${preset_cmd[*]}"
          if "${preset_cmd[@]}"; then
              echo ">>> Finished preset workloads for: $full_impl_path"
          else
              exit_code=$?
              [ $exit_code -eq 130 ] && echo ">>> Preset run for $full_impl_path interrupted." || echo ">>> Preset run for $full_impl_path failed."
          fi

          # --- Run Preset Sweeps ---
          echo
          echo ">>> Checking for preset sweeps for preset '$PRESET'..."
          sweeps_to_run=$(python -m gss_tester.benchmarks.runner --preset "$PRESET" --list-sweeps)

          if [ -z "$sweeps_to_run" ]; then
            echo "No predefined sweeps for preset '$PRESET'."
          else
            # Use a while loop to read line by line (in case of multiple sweeps)
            while IFS=';' read -r workload axis values; do
              echo
              echo ">>> Running preset sweep for '$workload' on axis '$axis'"
              output_file_sweep="${RESULTS_DIR}/${full_impl_name}.sweep.${workload}.${axis}.json"

              sweep_cmd=(python -m gss_tester.benchmarks.runner
                  "$module_name"
                  "$class_name"
                  --preset "$PRESET"
                  --output "$output_file_sweep"
                  --sweep-workload "$workload"
                  --sweep-axis "$axis"
                  --sweep-values $values # No quotes to allow word splitting
              )
              echo "${sweep_cmd[*]}"
              if "${sweep_cmd[@]}"; then
                  echo ">>> Finished sweep for: $workload"
              else
                  exit_code=$?
                  [ $exit_code -eq 130 ] && echo ">>> Sweep for $workload interrupted." || echo ">>> Sweep for $workload failed."
              fi
            done <<< "$sweeps_to_run"
          fi
        fi
      done

      echo
      echo "All benchmark runs completed."
      echo "---"

      # Analyze and plot
      echo "Analyzing results..."

      # Check if any result files were created before analyzing
      if [ -z "$(find "$RESULTS_DIR" -maxdepth 1 -name '*.json' -print -quit)" ]; then
          echo "No result files were generated. Skipping analysis."
      else
          cmd=(python -m gss_tester.benchmarks.analyzer
              "${RESULTS_DIR}"/*.json
              --outdir "${RESULTS_DIR}/analysis")
          echo "${cmd[*]}"
          "${cmd[@]}"

          echo
          echo "---"
          echo "Benchmark analysis complete."
          echo "Summary printed above. Plots saved to: ${RESULTS_DIR}/analysis/plots"
          echo "Full JSON results are in: $RESULTS_DIR"
      fi
