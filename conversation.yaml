      I've refactored the function to be much more efficient. The key changes are:

      1.  **Efficient Data Structure**: Instead of working with a flat `Vec<Production>`, the function now converts the grammar into a `BTreeMap<NonTerminal, Vec<Vec<Symbol>>>`. This groups all rules by their left-hand side non-terminal, allowing for fast lookups and modifications without iterating through the entire grammar.
