              assert_eq!(state2.weight, SimpleBitset::from_iter(vec![2, 5]));
              assert_eq!(state2.final_weight, Some(SimpleBitset::from_iter(vec![2, 5]) & SimpleBitset::from_iter(vec![2, 20])));
