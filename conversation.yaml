              let mut allowed_tokens = LLMTokenBV::zeros();
              allowed_tokens.insert(0);
              let mut memo = HashMap::new();
              allow_only_llm_tokens_and_prune_arc(&mut root_arc, &allowed_tokens, &mut memo);

