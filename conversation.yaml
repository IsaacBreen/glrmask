      +
      +// --- GSS Transformation ---
      +
      +/// Recursively transforms a GSS starting from a single node, using memoization.
      +///
      +/// Args:
      +/// * `node_arc`: The current node `Arc` to process.
      +/// * `closure`: A function that takes the current node's value (`&T`) and returns:
      +///   - `Some(new_value)`: To keep the node and replace its value with `new_value`.
      +///   - `None`: To prune this node (it will not be included in the predecessors of its parents).
      +/// * `cache`: A mutable HashMap used for memoization (`Ptr -> Result`).
      +///
      +/// Returns:
      +/// * `Some(Arc<GSSNode<T>>)`: If the node (or a transformed version) should be kept.
      +/// * `None`: If the node was pruned by the closure.
      +fn transform_recursive<T: Clone>(
      +    node_arc: &Arc<GSSNode<T>>,
      +    closure: &impl Fn(&T) -> Option<T>,
      +    cache: &mut HashMap<*const GSSNode<T>, Option<Arc<GSSNode<T>>>>,
      +) -> Option<Arc<GSSNode<T>>> {
      +    let node_ptr = Arc::as_ptr(node_arc);
      +    if let Some(cached_result) = cache.get(&node_ptr) {
      +        return cached_result.clone();
      +    }
      +
      +    match closure(&node_arc.value) {
      +        None => {
      +            // Prune this node
      +            cache.insert(node_ptr, None);
      +            None
      +        }
      +        Some(new_value) => {
      +            let mut new_predecessors = Vec::new();
      +            // Always recurse on predecessors
      +            for predecessor_arc in &node_arc.predecessors {
      +                if let Some(new_predecessor) =
      +                    transform_recursive(predecessor_arc, closure, cache)
      +                {
      +                    new_predecessors.push(new_predecessor);
      +                }
      +                // If transform_recursive returns None, the predecessor is pruned and not added.
      +            }
      +
      +            // Create the new node with the transformed value and filtered/transformed predecessors
      +            let new_node = Arc::new(GSSNode {
      +                value: new_value,
      +                predecessors: new_predecessors,
      +            });
      +            cache.insert(node_ptr, Some(new_node.clone()));
      +            Some(new_node)
      +        }
      +    }
      +}
      +
      +/// Transforms a forest of GSSs (represented by their roots) using a closure.
      +/// Handles shared nodes correctly via memoization.
      +pub fn transform_gss_roots<T: Clone>(
      +    roots: &[Arc<GSSNode<T>>],
      +    closure: &impl Fn(&T) -> Option<T>,
      +) -> Vec<Option<Arc<GSSNode<T>>>> {
      +    let mut cache: HashMap<*const GSSNode<T>, Option<Arc<GSSNode<T>>>> = HashMap::new();
      +    let mut results = Vec::with_capacity(roots.len());
      +
      +    for root in roots {
      +        // Each call to transform_recursive populates the shared cache
      +        results.push(transform_recursive(root, closure, &mut cache));
      +    }
      +
      +    results
      +}
      ```

