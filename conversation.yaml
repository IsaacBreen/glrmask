      use crate::datastructures::u8set::U8Set;
      use crate::json_serialization::{JSONConvertible, JSONNode};
      use std::ops::{Index, IndexMut};
      // Added
      use std::collections::BTreeMap as StdMap;
      use std::fmt::{self, Debug, Formatter};
      // Added for derive macro pattern


      const CHARMAP_SIZE: usize = 256;

      #[derive(Clone, Eq, PartialEq, PartialOrd, Ord)]
      pub struct TrieMap<T> {
          data: [Option<Box<T>>; CHARMAP_SIZE],
          // TODO: what's the point of `children`? Is it for nondeterminism? If so, let's remove it.
          children: [Vec<usize>; CHARMAP_SIZE], // This field is problematic for general JSON serialization if its meaning is tied to specific graph structures.
                                         // For now, we'll serialize it as is, but it might need context-specific handling.
          u8set: U8Set,
      }

      // Helper function to format u8 keys.
      // It displays printable ASCII characters as char literals (e.g., 'A'),
      // and other byte values as numbers.
      fn format_u8_key(val: u8, f: &mut Formatter<'_>) -> fmt::Result {
          if val >= 0x20 && val <= 0x7E { // Standard printable ASCII range
              // Use char's Debug impl, which handles escapes like '\'' correctly
              Debug::fmt(&(val as char), f)
          } else {
              // Fall back to u8's Debug impl (numeric) for non-printable characters
              Debug::fmt(&val, f)
          }
      }

      // Helper enum to represent single keys or ranges for Debug output.
      // This allows formatting like 'A' or 'A'..'Z'.
      enum KeyDisplay {
          Single(u8),
          Range(u8, u8),
      }

      impl Debug for KeyDisplay {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              match *self {
                  KeyDisplay::Single(k) => format_u8_key(k, f),
                  KeyDisplay::Range(start, end) => {
                      format_u8_key(start, f)?;
                      f.write_str("..")?;
                      format_u8_key(end, f)
                  }
              }
          }
      }

      impl<T: Debug> Debug for TrieMap<T> {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              let mut ds = f.debug_struct("TrieMap");

              // Helper struct for formatting entries with range compression.
              // Generic V is used to avoid conflict with the outer T.
              struct Entries<'a, V: Debug>(&'a TrieMap<V>);
              impl<'a, V: Debug> Debug for Entries<'a, V> {
                  fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
                      let mut map_formatter = f.debug_map();
                      let trie_map = self.0; // This is &'a TrieMap<V>

                      let mut i = 0;
                      while i < CHARMAP_SIZE {
                          // Check data[i] for a value
                          if let Some(current_val_box) = &trie_map.data[i] {
                              let start_key = i as u8;
                              let current_val_ref = current_val_box.as_ref(); // This is &V

                              // Scan forward to find the end of the run with the same value.
                              // "Same value" is determined by pointer equality (std::ptr::eq).
                              let mut end_key = start_key;
                              let mut j = i + 1;
                              while j < CHARMAP_SIZE {
                                  if let Some(next_val_box) = &trie_map.data[j] {
                                      let next_val_ref = next_val_box.as_ref(); // This is &V
                                      if std::ptr::eq(current_val_ref, next_val_ref) {
                                          end_key = j as u8;
                                      } else {
                                          // Value changed (or different Box for same logical value)
                                          break;
                                      }
                                  } else {
                                      // Gap (None), run ends
                                      break;
                                  }
                                  j += 1;
                              }

                              // Format the key as a single key or a range
                              let key_display = if start_key == end_key {
                                  KeyDisplay::Single(start_key)
                              } else {
                                  KeyDisplay::Range(start_key, end_key)
                              };
                              map_formatter.entry(&key_display, current_val_ref);

                              // Advance i to the position after the processed range
                              i = (end_key as usize) + 1;
                          } else {
                              // No value at data[i], advance to the next key
                              i += 1;
                          }
                      }
                      map_formatter.finish()
                  }
              }

              // Helper for formatting transitions (keys also use KeyDisplay for consistency).
              struct Transitions<'a>(&'a [Vec<usize>]);
              impl<'a> Debug for Transitions<'a> {
                  fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
                      let mut map_formatter = f.debug_map();
                      for (idx, list) in self.0.iter().enumerate() {
                          if !list.is_empty() {
                              // idx is uaranteed to be 0..CHARMAP_SIZE-1
                              map_formatter.entry(&KeyDisplay::Single(idx as u8), list);
                          }
                      }
                      map_formatter.finish()
                  }
              }

              ds.field("len", &self.len())
                .field("entries", &Entries(self));

              // Only show transitions if there actually are some.
              if self.children.iter().any(|v| !v.is_empty()) {
                  ds.field("transitions", &Transitions(&self.children));
              }

              ds.finish()
          }
      }

      impl<T: JSONConvertible> JSONConvertible for TrieMap<T> {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();

              // Serialize non-None data entries as a map from u8 to T's JSON
              let mut data_map_json = StdMap::new();
              for (i, opt_boxed_t) in self.data.iter().enumerate() {
                  if let Some(boxed_t) = opt_boxed_t {
                      data_map_json.insert((i as u8).to_string(), boxed_t.as_ref().to_json());
                  }
              }
              // Only insert data map if it's not empty
              if !data_map_json.is_empty() {
                  obj.insert("data".to_string(), JSONNode::Object(data_map_json));
              }


              // Serialize non-empty children vectors sparsely under the "transitions" key
              let mut transitions_map_json = StdMap::new();
              for (i, vec_usize) in self.children.iter().enumerate() {
                  if !vec_usize.is_empty() {
                      // Assuming Vec<usize> implements JSONConvertible and its to_json() returns JSONNode
                      transitions_map_json.insert((i as u8).to_string(), vec_usize.to_json());
                  }
              }
              // Only insert transitions map if it's not empty
              if !transitions_map_json.is_empty() {
                  obj.insert("transitions".to_string(), JSONNode::Object(transitions_map_json));
              }

              // u8set is always included to reflect the keys with data
              obj.insert("u8set".to_string(), self.u8set.to_json());

              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let mut data_arr: [Option<Box<T>>; CHARMAP_SIZE] = std::array::from_fn(|_| None);
                      if let Some(data_node) = obj.remove("data") { // "data" field is now optional
                          match data_node {
                              JSONNode::Object(json_obj) => {
                                  for (key_str, val_node) in json_obj {
                                      let index = key_str.parse::<u8>().map_err(|e| format!("Invalid u8 key in TrieMap data: {}, err: {}", key_str, e))? as usize;
                                      if index < CHARMAP_SIZE {
                                          data_arr[index] = Some(Box::new(T::from_json(val_node)?));
                                      } else {
                                          return Err(format!("Index {} out of bounds for TrieMap data: {}", index, key_str));
                                      }
                                  }
                              }
                              _ => return Err("TrieMap 'data' field must be a JSON object if present".to_string()),
                          }
                      } // If "data" field is not present, data_arr remains all None, which is correct.


                      let mut children_arr: [Vec<usize>; CHARMAP_SIZE] = std::array::from_fn(|_| Vec::new());

                      // Explicitly check for and reject the old "children_vectors" key
                      if obj.contains_key("children_vectors") {
                          return Err("Found old 'children_vectors' field; use 'transitions' with sparse object format instead.".to_string());
                      }

                      if let Some(transitions_node) = obj.remove("transitions") { // "transitions" field is optional
                          match transitions_node {
                              JSONNode::Object(json_obj) => {
                                  for (key_str, val_node) in json_obj {
                                      let index = key_str.parse::<u8>().map_err(|e| format!("Invalid u8 key in TrieMap transitions: {}, err: {}", key_str, e))? as usize;
                                      if index < CHARMAP_SIZE {
                                          // Assuming Vec<usize> implements JSONConvertible and its from_json expects a JSONNode
                                          children_arr[index] = Vec::<usize>::from_json(val_node)
                                              .map_err(|e| format!("Failed to parse transitions for key {}: {}", key_str, e))?;
                                      } else {
                                          return Err(format!("Index {} out of bounds for TrieMap transitions: {}", index, key_str));
                                      }
                                  }
                              }
                              _ => return Err("TrieMap 'transitions' field must be a JSON object if present".to_string()),
                          }
                      } // If "transitions" field is not present, children_arr remains all Vec::new(), which is correct.

                      let deserialized_u8set = obj.remove("u8set").ok_or_else(|| "Missing field 'u8set' for TrieMap".to_string())
                                           .and_then(U8Set::from_json)?;

                      // Validate that deserialized_u8set matches the keys in data_arr
                      let mut calculated_u8set_from_data = U8Set::none();
                      for i in 0..CHARMAP_SIZE {
                          if data_arr[i].is_some() {
                              calculated_u8set_from_data.insert(i as u8);
                          }
                      }

                      if deserialized_u8set != calculated_u8set_from_data {
                          // Assuming U8Set implements Debug for nice printing
                          return Err(format!(
                              "Mismatch between 'u8set' and keys in 'data'. Expected u8set based on data: {:?}, found in JSON: {:?}",
                              calculated_u8set_from_data, deserialized_u8set
                          ));
                      }

                      // Check for any remaining, unexpected fields
                      if !obj.is_empty() {
                          return Err(format!("Unexpected fields in TrieMap JSON: {:?}", obj.keys().collect::<Vec<_>>()));
                      }


                      Ok(TrieMap {
                          data: data_arr,
                          children: children_arr,
                          u8set: deserialized_u8set, // Use the deserialized (and validated) u8set
                      })
                  }
                  _ => Err("Expected JSONNode::Object for TrieMap".to_string()),
              }
          }
      }


      impl<T> TrieMap<T> {
          pub fn new() -> Self {
              Self {
                  data: std::array::from_fn(|_| None),
                  children: std::array::from_fn(|_| Vec::new()),
                  u8set: U8Set::none(),
              }
          }

          pub fn insert(&mut self, key: u8, value: T) -> Option<T> {
              let index = key as usize;
              let old_value = self.data[index].take();
              self.data[index] = Some(Box::new(value));
              self.u8set.insert(key);
              old_value.map(|v| *v)
          }

          pub fn get(&self, key: u8) -> Option<&T> {
              let index = key as usize;
              self.data[index].as_ref().map(|v| v.as_ref())
          }

          pub fn get_mut(&mut self, key: u8) -> Option<&mut T> {
              let index = key as usize;
              self.data[index].as_mut().map(|v| v.as_mut())
          }

          pub fn remove(&mut self, key: u8) -> Option<T> {
              let index = key as usize;
              let old_value = self.data[index].take();
              if old_value.is_some() {
                  self.u8set.remove(key);
              }
              old_value.map(|v| *v)
          }

          pub fn contains_key(&self, key: u8) -> bool {
              let index = key as usize;
              self.data[index].is_some()
          }

          pub fn clear(&mut self) {
              for element in self.data.iter_mut() {
                  *element = None;
              }
              self.u8set.clear();
          }

          pub fn drain(&mut self) -> impl Iterator<Item = (u8, T)> + '_ {
              self.u8set.clear();
              self.data.iter_mut().enumerate().filter_map(|(i, option)| {
                  option.take().map(|boxed| (i as u8, *boxed))
              })
          }

          pub fn retain<F>(&mut self, mut f: F)
          where
              F: FnMut(u8, &mut T) -> bool,
          {
              for (i, value) in self.data.iter_mut().enumerate() {
                  if let Some(v) = value {
                      let key = i as u8;
                      if !f(key, v.as_mut()) {
                          *value = None;
                          self.u8set.remove(key);
                      }
                  }
              }
          }

          pub fn capacity(&self) -> usize {
              CHARMAP_SIZE
          }

          pub fn len(&self) -> usize {
              self.u8set.len()
          }

          pub fn is_empty(&self) -> bool {
              self.u8set.is_empty()
          }

          pub fn iter(&self) -> impl Iterator<Item = (u8, &T)> {
