              original_mask: ffi.Bitset = ffi.Bitset.zeros()
              itomap = self.internal_to_original_map
              for i in final_mask.to_indices():
                  oi = itomap.get(int(i))
                  if oi is not None:
                      original_mask.insert(int(oi))

              return RangeSet.from_ranges(original_mask.to_ranges())
