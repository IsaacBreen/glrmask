      For intersection, merge does AND, but intersect does NOT do OR - intersect just returns the original value. This means it's NOT symmetrical.
      Why? Intersection represents the intersection of all LLM token bitsets of all children of this node. That doesn't change unless the children's LLM token bitsets change (which they don't).

