                      } else {
                          match edge_key2 {
                              Intermediate2Trie3EdgeKey::NoOp => {
                                  god1.insert_edge_simple(
                                      idx1,
                                      child1_idx,
                                      IntermediateTrie3EdgeKey::CheckLLM(edge_value2.clone()),
                                      (),
                                  );
