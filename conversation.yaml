      pub struct Precompute0Cache {
          pub tokenizer: Regex,
          pub llm_token_map: BiBTreeMap<Vec<u8>, LLMTokenID>,
          pub max_original_llm_token_id: usize,
          pub precompute0_vocab: StageVocab,
