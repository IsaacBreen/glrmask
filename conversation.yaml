      Figures 13(a)-(c) illustrate the minimization of an automaton defined over the probability semiring. Unlike the unweighted case, a minimal weighted automaton is not unique, but all minimal weighted automata have the same graph topology, they only differ by the way the weights are distributed along each path. The weighted automata $B'$ and $C'$ are both minimal and equivalent to $A'$. $B'$ is obtained from $A'$ using the algorithm described above in the probability semiring and it is thus a stochastic weighted automaton in the probability semiring.

      For a deterministic weighted automaton, the first operation of the semiring can be arbitrarily chosen without affecting the definition of the function it realizes. This is because, by definition, a deterministic weighted automaton admits at most one path labeled with any given string. Thus, in the algorithm described in Theorem 8, the weight pushing step can be executed in any semiring $S'$ whose multiplicative operation matches that of $S$. The minimal weighted automaton obtained by pushing the weights in $S'$ is also minimal in $S$ since it can be interpreted as a (deterministic) weighted automaton over $S$.

      In particular, $A'$ can be interpreted as a weighted automaton over the semiring $(\mathbb{R}_+, \max, \times, 0, 1)$. The application of the weighted minimization algorithm to $A'$ in this semiring leads to the minimal weighted automaton $C'$ of Figure 13(c). $C'$ is also a *stochastic* weighted automaton in the sense that, at any state, the maximum weight of all outgoing transitions is one.

      This fact leads to several interesting observations. One is related to the complexity of the algorithms. Indeed, we can choose a semiring $S'$ in which the complexity of weight pushing is better than in $S$. The resulting automaton is still minimal in $S$ and has the additional property of being stochastic in $S'$. It only differs from the weighted automaton obtained by pushing weights in $S$ in the way weights are distributed along the paths. They can be obtained from each other by application of weight pushing in the appropriate semiring. In the particular case of a weighted automaton over the probability semiring, it may be preferable to use weight pushing in the $(\max, \times)$-semiring since the complexity of the algorithm is then equivalent to that of classical single-source shortest-paths algorithms. The corresponding algorithm is a special instance of the generic shortest-distance algorithm for k-closed semirings presented earlier in the chapter.

      Another important point is that the weight pushing algorithm may not be defined in $S$ because the machine is not zero-sum-free or for other reasons. But an alternative semiring $S'$ can sometimes be used to minimize the input weighted automaton.

      The results just presented were all related to the minimization of the number of states of a deterministic weighted automaton. The following simple proposition shows that minimizing the number of states coincides with minimizing the number of transitions.

      > **Proposition 6.6.** Let $A$ be a minimal deterministic weighted automaton, then $A$ has the minimal number of transitions.

      > **Proof.** Let $A$ be a deterministic weighted automaton with the minimal number of transitions. If two distinct states of $A$ were equivalent, they could be merged, thereby strictly reducing the number of its transitions. Thus, $A$ must be a minimal deterministic automaton. Since, minimal deterministic automata have the same topology, in particular the same number of states and transitions, this proves the proposition.

      ## 6.5 Synchronization

      The weight pushing algorithm normalizes the way the weights are distributed along the paths. The algorithm presented in this section, *synchronization of weighted transducers*, normalizes instead the way the input and output labels are shifted with respect to each other along the paths. Roughly speaking, the objective of the algorithm is to synchronize the consumption of non-$\epsilon$ symbols by the input and output tapes of a transducer, to the extent that is possible.

      The following concept helps analyze and describe the domain of application of the algorithm.

      > **Definition 6.7.** The *delay* of a path $\pi$ is defined as the difference of length between its output and input labels:
      > $$
      > d[\pi] = |o[\pi]| - |i[\pi]|.
      > $$
      > The delay of a path is thus simply the sum of the delays of its constituent transitions. A trim transducer $T$ is said to have *bounded delays* if the delay along all paths of $T$ is bounded. We then denote by $d[T] > 0$ the maximum delay in absolute value of a path in $T$. The following lemma gives a straightforward characterization of transducers with bounded delays.

      > **Lemma 6.8.** A transducer $T$ has bounded delays iff the delay of any cycle in $T$ is zero.

      > **Proof.** If $T$ admits a cycle $\pi$ with non-zero delay, then $d[T] \ge |d[\pi^n]| = n|d[\pi]|$ is not bounded. Conversely, if all cycles have zero delay, then the maximum delay in $T$ is that of the simple paths which are of finite number.

      We define the *string delay* of a path $\pi$ as the string $\sigma[\pi]$ defined by:
      $$
      \sigma[\pi] = \begin{cases} \text{suffix of } o[\pi] \text{ of length } |d[\pi]| & \text{if } d[\pi] \ge 0, \\ \text{suffix of } i[\pi] \text{ of length } |d[\pi]| & \text{otherwise}. \end{cases}
      $$
      For any state $q \in Q$, the *string delay* at state $q$, $s[q]$, is defined by the set of string delays of the paths from an initial state to $q$:
      $$
      s[q] = \{\sigma[\pi] : \pi \in P(I,q)\}.
      $$

      > **Lemma 6.9.** If $T$ has bounded delays then the set $s[q]$ is finite for any $q \in Q$.

      > **Proof.** The lemma follows immediately the fact that the elements of $s[q]$ are all of length less than $d[T]$.

      A weighted transducer $T$ is said to be *synchronized* if along any successful path of $T$ the delay is zero or varies strictly monotonically. An algorithm that takes as input a transducer $T$ and computes an equivalent synchronized transducer $T'$ is called a *synchronization algorithm*. The synchronization algorithm described here [42] applies to all weighted transducers with bounded delays. The following is the pseudocode of the algorithm.

      To simplify the presentation of the algorithm, we augment $Q$ and $F$ with a new state $f$ and set: $\rho(f) = \overline{1}$ and $E[f] = \emptyset$. We denote by car($x$) the first symbol of a string $x$ if $x$ is not empty, $\epsilon$ otherwise, and denote by cdr($x$) the suffix of $x$ such that $x = \text{car}(x) \text{cdr}(x)$.

      Each state of the resulting transducer $T'$ corresponds to a triplet $(q, x, y)$ where $q \in Q$ is a state of the original machine $T$ and where $x \in \Sigma^*$ and $y \in \Delta^*$ are strings over the input and output alphabet of $T$.

      The algorithm maintains a queue $\mathcal{Q}$ that contains at any time the set of states of $T'$ to examine. At each execution of the loop of lines 3-19, a new state $p' = (q, x, y)$ is extracted from $\mathcal{Q}$ (line 4) and its outgoing transitions are computed and added to $E'$. The state $p'$ is final iff $q$ is final and $x = y = \epsilon$ and in that case the final weight at $p'$ is simply the final weight at the original state $q$ (lines 5-6). If $q$ is final but the string $x$ and $y$ are not both empty, then the algorithm constructs a sequence of transitions from $p'$ to $(f, \epsilon, \epsilon)$ to consume the remaining input and output strings $x$ and $y$ (lines 7-11).

      For each transition $e$ of $q$, an outgoing transition $e'$ is created for $p'$ with weight $w[e]$. The input and output labels of $e'$ are both $\epsilon$ if $x \circ i[e]$ or $y \circ o[e]$ is the empty string, the first symbol of these strings otherwise. The remaining suffixes of these strings are stored in the destination state $q'$ (lines 12-19). Note that in all cases, the transitions created by the steps of the algorithm described in lines 14-17 have zero delay. The state $q'$ is inserted in $\mathcal{Q}$ if it has never been found before (line 18-19). Figures 14(a)-(b) illustrate the synchronization algorithm just presented.

      **Algorithm 4:** SYNCHRONIZATION($T$)
      ```
      1.  F' ← Q' ← E' ← ∅
      2.  Q_queue ← i' ← {(i, ε, ε) : i ∈ I}
      3.  While Q_queue ≠ ∅
      4.      p' = (q, x, y) ← HEAD(Q_queue)
      5.      DEQUEUE(Q_queue)
      6.      If (q ∈ F and |x| + |y| = 0)
      7.          F' ← F' ∪ {p'}; ρ'(p') ← ρ(q)
      8.      ElseIf (q ∈ F and |x| + |y| > 0)
      9.          q' ← (f, cdr(x), cdr(y))
      10.         E' ← E' ⊎ {(p', car(x), car(y), ρ(q), q')}
      11.         If (q' ∉ Q')
      12.             Q' ← Q' ∪ {q'}; ENQUEUE(Q_queue, q')
      13.         EndIf
      14.     EndIf
      15.     For each e ∈ E[q]
      16.         If (|x ∘ i[e]| > 0 and |y ∘ o[e]| > 0)
      17.             q' ← (n[e], cdr(x ∘ i[e]), cdr(y ∘ o[e]))
      18.             E' ← E' ⊎ {(p', car(x ∘ i[e]), car(y ∘ o[e]), w[e], q')}
      19.         Else
      20.             q' ← (n[e], x ∘ i[e], y ∘ o[e])
      21.             E' ← E' ⊎ {(p', ε, ε, w[e], q')}
      22.         EndIf
      23.         If (q' ∉ Q')
      24.             Q' ← Q' ∪ {q'}; ENQUEUE(Q_queue, q')
      25.         EndIf
      26.     EndFor
      27. EndWhile
      28. return T'
      ```

      > **Theorem 6.10** ([42]). Let $T$ be a weighted transducer with bounded delays. Then, if we run the synchronization algorithm just described with input $T$, the algorithm terminates and returns a synchronized transducer $T'$ equivalent to $T$.

      The algorithm creates a distinct state $(q, x, \epsilon)$ or $(q, \epsilon, y)$ for each string delay $x, y \in s[q]$ at state $q \neq f$. The paths from a state $(q, x, \epsilon)$ or $(q, \epsilon, y)$, $q \in F$, to $(f, \epsilon, \epsilon)$ are of length $|x|$ or $|y|$. The length of a string delay is bounded by $d[T]$. Thus, there are at most $|\Sigma|^{\le d[T]} + |\Delta|^{\le d[T]} = O(|\Sigma|^{d[T]} + |\Delta|^{d[T]})$ distinct string delays at each state. Thus, in the worst case, the size of the resulting transducer $T'$ is:
      $$
      O((|Q|+|E|)(|\Sigma|^{d[T]} + |\Delta|^{d[T]})).
      $$
      The string delays can be represented in a compact and efficient way using a suffix tree. Indeed, let $U$ be a tree representing all the input and output labels of the paths in $T$ found in a depth-first search of $T$. The size of $U$ is linear in that of $T$ and a suffix tree $V$ of $U$ can be built in time proportional to the number of nodes of $U$ times the size of the alphabet [27], that is in $O((|\Sigma| + |\Delta|)(|Q| + |E|))$. Since each string delay $x$ is a suffix of a string represented by $U$, it can be represented by two nodes $n_1$ and $n_2$ of $V$ and a position in the string labeling the edge from $n_1$ to $n_2$. The operations performed by the algorithm to construct a new transition require either computing $xa$ or $a^{-1}x$ where $a$ is a symbol of the input or output alphabet. Clearly, these operations can be performed in constant time: $xa$ is obtained by going down one position in the suffix tree, and $a^{-1}x$ by using the suffix link at node $n_1$. Thus, using this representation, the operations performed for the construction of each new transition can be done in constant time. This includes the cost of comparison of a newly created state $(q', x', \epsilon)$ with an existing state $(q, x, \epsilon)$, since the comparison of the string delays $x$ and $x'$ can be done in constant time. Thus, the worst case space and time complexity of the algorithm is:
      $$
      O((|Q| + |E|)(|\Sigma|^{d[T]} + |\Delta|^{d[T]})).
      $$
      This is not a tight evaluation of the complexity since it is not clear if the worst case previously described can ever occur, but the algorithm can indeed produce an exponentially larger transducer in some cases.

      **Figure 14:** (a) Weighted transducer $T_1$ over the tropical semiring. (b) Equivalent synchronized transducer $T_2$. (c) Synchronized weighted transducer $T_3$ equivalent to $T_1$ and $T_2$ obtained by $\epsilon$-removal from $T_2$.

