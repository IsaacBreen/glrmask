                                      llm_bv = masks[i]

                                      # Child mask
                                      if llm_bv is None:
                                          child_mask = inter_cache[None]
                                      else:
                                          key = id(llm_bv)
                                          child_mask = inter_cache.get(key)
                                          if child_mask is None:
                                              child_mask = llm_mask.intersection(llm_bv)
                                              inter_cache[key] = child_mask

                                      # Merge parents
                                      s = next_gss.get(dest_idx)
                                      if s is None:
