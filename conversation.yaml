                              if not llm_bv.is_empty():
                                  memo: Dict[PyAcc, Optional[PyAcc]] = {}
                                  def intersect_and_prune(acc: PyAcc) -> Optional[PyAcc]:
                                      if memo.get(acc) is not None:
