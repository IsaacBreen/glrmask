              let expected_and =
                  (DENSE_TO_SPARSE_THRESHOLD / 2..DENSE_TO_SPARSE_THRESHOLD).collect::<BTreeSet<_>>();
              let mut set3 = set3_orig.clone();
              set3 &= set4.clone();
