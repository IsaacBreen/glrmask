          let minimized_productions = vec![
              prod("start'", vec![nt("IGNORE[0]"), t("\"return\""), nt("simple_stmts[0]"), t("\";\"")]), // P0
              prod("simple_stmts[0]", vec![t("\";\""), nt("IGNORE[0]"), t("\"return\"")]), // P1
              prod("simple_stmts[0]", vec![]), // P2
