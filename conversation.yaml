                  new_children = {}
                  for pop, state_map in node.children.items():
                      new_state_map = {}
                      for state_id, dest_map in state_map.items():
                          sorted_dests = sorted(
                              dest_map.items(),
                              key=lambda item: md.get(int(item[0]), 0),
                              reverse=True
                          )
