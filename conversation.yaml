                              time_prune += time.time() - t1
                              if not child_gss.is_ok():
                                  continue

                              d = int(dest_idx)
                              t1 = time.time()
                              if d in values:
                                  combined = ffi.gss_merge_many_with_depth([values[d], child_gss], 1)
                                  # Only re-enqueue if effectively changed
                                  if combined.ptr() == values[d].ptr():
                                      continue
                                  values[d] = combined
                              else:
