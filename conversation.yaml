      ## Enums

      ### `TerminalAllowanceCheckMode`

      Specifies the strictness of checking whether a GLR state can accept any future grammar terminals after a token is committed. This check is performed at the end of the `commit` operation.

      ```rust
      #[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]
      pub enum TerminalAllowanceCheckMode {
          None,
          ImmediateSets,
          ImmediateProbe,
          #[default]
          StepProbe,
      }
      ```

      **Variants:**

      *   `None`: No check is performed.
      *   `ImmediateSets`: A fast but potentially over-approximating check. It computes the union of terminals that can be immediately shifted or reduced upon and checks if this set intersects with the terminals the tokenizer can produce.
      *   `ImmediateProbe`: A more precise check than `ImmediateSets`. It probes whether the GLR state has an immediate action (shift or reduce) for any of the terminals the tokenizer can produce.
      *   `StepProbe` (Default): The most precise but slowest check. It simulates a full step for each possible terminal the tokenizer can produce to see if any of them lead to a valid (non-error) state.

      ### `IntermediateTrie3EdgeKey`

      Represents the operations encoded on the edges of the intermediate Trie3 structure during precomputation. This trie is later transformed into the final `PrecomputeNode3` format.

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub enum IntermediateTrie3EdgeKey {
          Pop(usize, StateIDBV),
          Push(StateIDBV),
          CheckLLM(LLMTokenBV),
          NoOp,
      }
      ```

      **Variants:**

      *   `Pop(usize, StateIDBV)`: Represents popping `usize` states from the GLR stack and then checking if the new top-of-stack state is within the `StateIDBV` bitset.
      *   `Push(StateIDBV)`: Represents a check against the top of the GLR stack. This is used during template construction to encode stack states.
      *   `CheckLLM(LLMTokenBV)`: Represents a check against the allowed LLM tokens. This edge is only traversable if the current set of allowed LLM tokens intersects with the `LLMTokenBV` bitset.
      *   `NoOp`: A no-operation edge, used for structural purposes like merging paths.

      ---

      ## Structs

      ### `GrammarConstraint`

      The main struct that holds the precomputed data structures for enforcing grammar constraints on an LLM. It combines a tokenizer, a GLR parser, and several stages of precomputed tries that accelerate the process of determining valid next tokens.

      ```rust
      #[derive(Debug, Clone)]
      pub struct GrammarConstraint {
          pub tokenizer: Regex,
          pub parser: GLRParser,
          pub precomputed2: Precomputed2,
          pub precomputed3: Precomputed3,
          pub llm_vocab: Arc<LLMVocab>,
          pub possible_matches: BTreeMap<TokenizerStateID, BTreeMap<TerminalID, LLMTokenBV>>,
          pub state_map_by_llm: DedupValueMap<LLMTokenID, BTreeMap<TokenizerStateID, TokenizerStateID>>,
          pub terminal_map_by_llm: DedupValueMap<LLMTokenID, BTreeMap<TokenizerStateID, TerminalBV>>,
          pub trie2_god: Trie2GodWrapper,
          pub trie3_god: Trie3GodWrapper,
          pub post_commit_allow_check_mode: TerminalAllowanceCheckMode,
          pub precompute0_vocab: StageVocab,
          pub precompute_vocab1: StageVocab,
          pub precompute2_vocab: StageVocab,
          pub precompute3_vocab: StageVocab,
      }
      ```

      **Public Fields:**

      *   `tokenizer: Regex`: The tokenizer used to break byte sequences into grammar terminals.
      *   `parser: GLRParser`: The GLR parser that understands the grammar's structure.
      *   `precomputed2: Precomputed2`: The root nodes of the Trie2 structures, indexed by tokenizer state ID.
      *   `precomputed3: Precomputed3`: The root nodes of the Trie3 structures, indexed by tokenizer state ID.
      *   `llm_vocab: Arc<LLMVocab>`: A shared reference to the LLM's vocabulary.
      *   `possible_matches: BTreeMap<...>`: A map from a tokenizer state and a grammar terminal to the set of LLM tokens that can produce that terminal from that state.
      *   `state_map_by_llm: DedupValueMap<...>`: A deduplicated map from an LLM token to a map that describes how each tokenizer state transitions after consuming that token.
      *   `terminal_map_by_llm: DedupValueMap<...>`: A deduplicated map from an LLM token to a map that describes which grammar terminals are produced from each tokenizer state when that token is consumed.
      *   `trie2_god: Trie2GodWrapper`: The arena ("God object") that owns all nodes for all Trie2 structures.
      *   `trie3_god: Trie3GodWrapper`: The arena that owns all nodes for all Trie3 structures.
      *   `post_commit_allow_check_mode: TerminalAllowanceCheckMode`: The configured mode for post-commit validation.
      *   `precompute0_vocab`, `precompute_vocab1`, `precompute2_vocab`, `precompute3_vocab`: `StageVocab` instances that manage the mapping between original and internal LLM token IDs for each precomputation stage.

      **Associated Functions and Methods:**

      *   `pub fn from_compiled_grammar(...) -> Self`: Creates a `GrammarConstraint` from a `CompiledGrammar` with a default configuration.
      *   `pub fn from_compiled_grammar_with_config(...) -> Self`: Creates a `GrammarConstraint` from a `CompiledGrammar` with a specified `GrammarConstraintConfig`.
      *   `pub fn new(...) -> Self`: Creates a `GrammarConstraint` from its core components (tokenizer, parser, vocab) with a default configuration.
      *   `pub fn new_with_config(...) -> Self`: Creates a `GrammarConstraint` with a specified `GrammarConstraintConfig`.
      *   `pub fn new_with_config_and_precompute0_cache(...) -> Self`: Creates a `GrammarConstraint`, potentially reusing a cached Trie0 structure to speed up initialization.
      *   `pub fn export_precompute0_cache(&self) -> Precompute0Cache`: Exports the Trie0 and related vocabulary information into a cacheable object.
      *   `pub fn precompute0(...) -> (BTreeMap<...>, Trie0GodWrapper)`: Runs the first stage of precomputation, building a trie that maps byte sequences to grammar terminals.
      *   `pub fn precompute1(...) -> (BTreeMap<...>, Trie1GodWrapper)`: Runs the second stage, simplifying the Trie0 structure.
      *   `pub fn precompute2(...) -> (Precomputed2, Trie2GodWrapper)`: Runs the third stage, further optimizing the trie by encoding stack operations.
      *   `pub fn precompute3(...) -> (Precomputed3, Trie3GodWrapper)`: Runs the final stage of precomputation, creating a highly optimized trie for mask calculation.
      *   `pub fn build_terminal_trie3_templates(...)`: A helper for `precompute3` that builds reusable trie subgraphs ("templates") for each grammar terminal.
      *   `pub fn build_trie3_template_for_terminal(...)`: A helper that builds a single terminal template.
      *   `pub fn init(&self) -> GrammarConstraintState<'a>`: Initializes a new `GrammarConstraintState` to begin processing.
      *   `pub fn internal_bv_to_original_precompute[0-3](&self, internal_bv: &LLMTokenBV) -> LLMTokenBV`: Converts a bitset of internal LLM token IDs to a bitset of original LLM token IDs, using the vocabulary mapping for the specified precomputation stage.
      *   `pub fn original_bv_to_internal_precompute[0-3](&self, original_bv: &LLMTokenBV) -> LLMTokenBV`: Converts a bitset of original LLM token IDs to a bitset of internal IDs for the specified stage.
      *   `pub fn print_gss_nodes(&self, roots: &Vec<Arc<GSSNode>>, labels: Option<&[String]>)`: Prints a textual representation of a GSS forest for debugging.

      ### `GrammarConstraintConfig`

      Configuration for the `GrammarConstraint` precomputation process.

      ```rust
      #[derive(Debug, Clone)]
      pub struct GrammarConstraintConfig {
          pub skip_precomputation: bool,
          pub precompute0_only: bool,
          pub trie0: Trie0Config,
          pub trie1: Trie1Config,
          pub trie2: Trie2Config,
          pub trie3: Trie3Config,
      }
      ```

      **Public Fields:**

      *   `skip_precomputation: bool`: If true, skips all precomputation stages.
      *   `precompute0_only: bool`: If true, only performs the first stage of precomputation (Trie0).
      *   `trie0: Trie0Config`, `trie1: Trie1Config`, `trie2: Trie2Config`, `trie3: Trie3Config`: Stage-specific configuration objects that control optimizations.

      **Associated Functions:**

      *   `pub fn off() -> Self`: Returns a configuration with all optimizations disabled.

      ### `GrammarConstraintState<'a>`

      Represents the active state of the grammar constraint at a specific point in generation. It holds a collection of GLR parser states, one for each active tokenizer state.

      ```rust
      #[derive(Debug, Clone)]
      pub struct GrammarConstraintState<'a> {
          pub parent: &'a GrammarConstraint,
          pub state: BTreeMap<TokenizerStateID, GLRParserState<'a>>,
      }
      ```

      **Public Fields:**

      *   `parent: &'a GrammarConstraint`: A reference to the parent `GrammarConstraint` object containing the precomputed data.
      *   `state: BTreeMap<TokenizerStateID, GLRParserState<'a>>`: The core state, mapping each active tokenizer state ID to its corresponding GLR parser state.

      **Methods:**

      *   `pub fn get_mask(&self) -> LLMTokenBV`: Computes and returns the bitmask of allowed original LLM token IDs from the current state. This is the primary function for constraining generation. It currently calls `get_mask3`.
      *   `pub fn get_mask1(&self) -> LLMTokenBV`: Computes the mask using the Trie1 precomputation.
      *   `pub fn get_mask2(&self) -> LLMTokenBV`: Computes the mask using the Trie2 precomputation.
      *   `pub fn get_mask3(&self) -> LLMTokenBV`: Computes the mask using the Trie3 precomputation.
      *   `pub fn commit(&mut self, llm_token_id: LLMTokenID)`: Updates the state by consuming a given LLM token (specified by its original ID).
      *   `pub fn commit_bytes(&mut self, llm_token_bytes: &[u8])`: Updates the state by consuming a given LLM token (specified by its byte representation).
      *   `pub fn is_active(&self) -> bool`: Returns `true` if the constraint state is not empty (i.e., if generation has not reached a dead end).
      *   `pub fn state(&self) -> &BTreeMap<TokenizerStateID, GLRParserState<'a>>`: Returns a reference to the internal state map.
      *   `pub fn print_gss_stats(&self)`: Prints statistics about the current GSS (Graph-Structured Stack) forest.
      *   `pub fn print_gss(&self)`: Prints a textual representation of the current GSS forest.
      *   `pub fn explain_stack(&self)`: Prints a detailed, human-readable explanation of a sample path through the GSS for each active state.
      *   `pub fn num_unique_nodes(&self) -> usize`: Returns the total number of unique nodes across all GSS instances in the current state.

      ### `LLMVocab`

      Holds the LLM's vocabulary mapping and metadata.

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct LLMVocab {
          pub llm_token_map: BiBTreeMap<Vec<u8>, LLMTokenID>,
          pub max_original_llm_token_id: usize,
      }
      ```

      **Public Fields:**

      *   `llm_token_map: BiBTreeMap<Vec<u8>, LLMTokenID>`: A bidirectional map between token byte sequences and their original `LLMTokenID`.
      *   `max_original_llm_token_id: usize`: The highest original token ID in the vocabulary.

      ### `StageVocab`

      Manages the mapping between original and internal LLM token IDs for a specific precomputation stage. This is necessary because optimizations can merge tokens, creating a smaller, internal vocabulary.

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct StageVocab {
      	pub original_to_internal: BTreeMap<usize, usize>,
      	pub internal_to_original: BTreeMap<usize, LLMTokenBV>,
      	pub internal_max_llm_token: usize,
      }
      ```

      **Public Fields:**

      *   `original_to_internal: BTreeMap<usize, usize>`: Maps an original token ID to its internal ID for this stage.
      *   `internal_to_original: BTreeMap<usize, LLMTokenBV>`: Maps an internal token ID back to a bitset of one or more original token IDs.
      *   `internal_max_llm_token: usize`: The highest internal token ID for this stage.

      ### `Precompute0Cache`

      A serializable struct for caching the results of the Trie0 precomputation stage, which is often the most time-consuming part of initialization.

      ```rust
      #[derive(Debug, Clone)]
      pub struct Precompute0Cache {
          pub tokenizer: Regex,
          pub llm_token_map: BiBTreeMap<Vec<u8>, LLMTokenID>,
          pub max_original_llm_token_id: usize,
          pub precompute0_vocab: StageVocab,
          pub precomputed0: Precomputed0,
          pub trie0_god: Trie0GodWrapper,
      }
      ```

      **Public Fields:**

      *   `tokenizer: Regex`: The tokenizer used for this cache.
      *   `llm_token_map: BiBTreeMap<...>`: The LLM vocabulary used.
      *   `max_original_llm_token_id: usize`: The max token ID of the vocabulary.
      *   `precompute0_vocab: StageVocab`: The stage-specific vocabulary for Trie0.
      *   `precomputed0: Precomputed0`: The precomputed Trie0 roots.
      *   `trie0_god: Trie0GodWrapper`: The arena containing all Trie0 nodes.

      **Methods:**

      *   `pub fn is_compatible(&self, ...) -> bool`: Checks if the cache is compatible with the current configuration (tokenizer, vocab, etc.) and can be safely reused.

      ### `DedupValueMap<K, V>`

      A memory-efficient map where multiple keys can share the same value without duplicating it in memory. It behaves like a `BTreeMap<K, V>` for common operations.

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct DedupValueMap<K, V>
      where
          K: Ord + Clone + Eq,
          V: Clone + Eq + std::hash::Hash,
      ```

      **Methods:**

      *   `pub fn new() -> Self`: Creates a new, empty map.
      *   `pub fn len(&self) -> usize`: Returns the number of key-value pairs in the map.
      *   `pub fn is_empty(&self) -> bool`: Returns `true` if the map is empty.
      *   `pub fn contains_key<Q>(&self, k: &Q) -> bool`: Checks if the map contains a given key.
      *   `pub fn insert(&mut self, key: K, value: V) -> Option<V>`: Inserts a key-value pair. The value is interned to save memory.
      *   `pub fn get<Q>(&self, key: &Q) -> Option<&V>`: Retrieves a reference to the value associated with a key.
      *   `pub fn iter(&self) -> impl Iterator<Item = (&K, &V)>`: Returns an iterator over the key-value pairs.

      ### `PrecomputedNodeContents`

      The content stored within a node of a precomputed trie (stages 1, 2, and 3).

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct PrecomputedNodeContents {
          // Fields are pub(crate)
      }
      ```

      This struct has no public fields. Its internal state is managed by the precomputation logic.

      ### `PrecomputedNodeContents0`

      The content stored within a node of a Trie0 precomputed trie.

