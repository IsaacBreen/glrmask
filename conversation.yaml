              let invalid_json_uint_too_large = JSONNode::Array(vec![JSONNode::UInt(256)]);
              assert!(Vec::<u8>::from_json(invalid_json_uint_too_large).is_err());

              let invalid_json_int_too_large = JSONNode::Array(vec![JSONNode::Int(256)]);
