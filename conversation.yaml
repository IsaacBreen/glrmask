      This will involve:
      1.  Creating a new proc-macro crate named `json_convertible_derive`.
      2.  Implementing the derive macro logic within this new crate.
      3.  Updating your main crate (`sep1`) to use this derive macro.

      Here are the full contents of the new and modified files:

