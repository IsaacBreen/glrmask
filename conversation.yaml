      Right now, the way templates are handled is that one DWA per terminal is computed and they're stored separately. Templates themselves don't have weights; they could really just be DFAs.
      Then, in the special map process function, they're joined. `union_left_bodies` is used to join efficiently in a pairwise binary-tree-like fashion. Each join is a union followed by a determinize and a simplify. This is necessary because if we tried to union them all at once and then simplify/determinize, it (either determinize and simplify - whichever we run first) hangs due to state explosion. So, it's necessary to minimize as we go in a pairwise fashion.

      A lot of the program's time is spent handling combining those individual template DWA, e.g. in `union_left_bodies`, which is called in the special map process fn for all incoming 'bundles' of terminals. A bundle might be like `BTreeMap<Option<TerminalID>, Weight>`; we have to resolve each bundle into a single DWA, which we do with the help of `union_left_bodies`
      Basically, I want to improve this.

      Instead of dealing with individual DWA for each terminal, let's join them all into one 'super' DWA before we even start special map. When we want to resolve a bundle into a DWA, we take this 'super' DWA and specialize it for just the bundle we're interested in.
      To do that, it's helpful to identify which parts of the DWA correspond to which terminal. A clean way to do this is to use the weights (which, as I mentioned earlier, are unused for templates).
      Weights in our DWA are bitsets. So, each terminal can become its own bit. (Although the precompute1 trie edges are actually `Option<TerminalID>`, so give `None` an ID as well.)
      Before unioning all our template DWAs into a single NWA and determinizing/simplifying it, apply the weight corresponding to each terminal to its template.
      Then, in the special map process fn process fn, when we're ready to resolve a bundle `BTreeMap<Option<TerminalID>, Weight>`, look at each weight in the super DWA (both transition weights and final weights). We're going replace each weight. Initialize an empty replacement. Look at each set bit in that weight (up to the max terminal ID - be careful not to try to read up to `usize::MAX`). Look up the weight in the bundle. Union the weight in the bundle into the replacement weight.
      ...That's it! Do this for all transition weights and final weights in the super DWA. Then simplify it.
      To make this faster, locally cache this transformation so that if we encounter the same weight twice we don't have to do the computation again.

