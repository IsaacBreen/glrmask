                  bucket: Optional[Set[int]] = todo.get(d)
                  if bucket is None:
                      todo[d] = {r}
                      hp(depth_heap, d)
                  else:
                      bucket.add(r)

              def enqueue(d: int, n: int) -> None:
                  bucket: Optional[Set[int]] = todo.get(d)
                  if bucket is None:
                      todo[d] = {n}
                      hp(depth_heap, d)
                  else:
                      bucket.add(n)

