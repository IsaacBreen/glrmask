  - user: |-
      Add a new optimization for the precompute3 tree.
      The goal is to reduce the number of edges in the tree.
      There are various ways to do this. Here are some examples of valid ways to transform edges.


      If we have something like this:

      A --(pop x, all state IDs, all LLM tokens)--> B
      B --(pop y, all state IDs, all LLM tokens)--> C

      we can replace it with

      A --(pop x + y, all state IDs, all LLM tokens)--> C


      If we have

      A --(pop 1, all state IDs, all LLM tokens)--> D
      B --(pop 3, all state IDs, all LLM tokens)--> D
      C --(pop 7, all state IDs, all LLM tokens)--> D

      it's more efficient to do this:

      A --(pop 1, all state IDs, all LLM tokens)--> B
      B --(pop 2, all state IDs, all LLM tokens)--> C
      C --(pop 4, all state IDs, all LLM tokens)--> D

      ie incrementally popping. Each pop level does a certain amount of 'work'. If we pop k, it takes time proportional (for illustration) to k. If we pop k and then pop k+1, we've spent k + k+1 time, when we could have spent k+1 time by popping k and then 1.


      If we have

      A --(pop 0, state IDs {1,2,3}, all LLM tokens)--> B
      B --(pop 0, state IDs {2,3,4}, all LLM tokens)--> C

      we can replace with

      A --(pop 0, state IDs {2,3}, all LLM tokens)--> C

      and similarly if we have

      A --(pop x, all state IDs, LLM tokens {1,2,3})--> B
      B --(pop 0, all state IDs, LLM tokens {2,3,4})--> C

      we can replace with

      A --(pop 0, all state IDs, LLM tokens {2,3})--> C

      ie we can take the unions of consecutive (pop-0-separated) edges.
      pops are done before state ID filters, so the pop on the first edge can be anything.
      Any numbers of edges can be consecutive as long as those *after* the first have pop 0 length.


      However, we must be careful. For example, suppose we have this arrangement:

      A --(pop 0, all state IDs, all LLM tokens)--> B
      A --(pop 1, all state IDs, all LLM tokens)--> B
      A --(pop 2, all state IDs, all LLM tokens)--> B
      B --(pop 0, state ID 0, all LLM tokens)--> C
      B --(pop 0, state ID 1, all LLM tokens)--> C
      B --(pop 0, state ID 2, all LLM tokens)--> C

      We *could* shortcut through the node B like this:

      A --(pop 0, state ID 0, all LLM tokens)--> C
      A --(pop 1, state ID 0, all LLM tokens)--> C
      A --(pop 2, state ID 0, all LLM tokens)--> C
      A --(pop 0, state ID 1, all LLM tokens)--> C
      A --(pop 1, state ID 1, all LLM tokens)--> C
      A --(pop 2, state ID 1, all LLM tokens)--> C
      A --(pop 0, state ID 2, all LLM tokens)--> C
      A --(pop 1, state ID 2, all LLM tokens)--> C
      A --(pop 2, state ID 2, all LLM tokens)--> C

      BUT now we've gone from 6 edges to 9 - not a good trade.

      Implement it in `compress_trie3_edges`.
