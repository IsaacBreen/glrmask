      +                        if let Some(original) = original_tokens_on_stack { recursion_stack.insert(node_idx, original); } else { recursion_stack.remove(&node_idx); }
      +                        return true;
      +                    }
      +                }
      +            }
      +        }
      +
      +        // Backtrack: remove from recursion stack.
      +        if let Some(original) = original_tokens_on_stack { recursion_stack.insert(node_idx, original); } else { recursion_stack.remove(&node_idx); }
      +
      +        false
      +    }
