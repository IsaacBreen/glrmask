                  print(f"avg_llm_bv_cardinality       : {avg_llm_bv_len:8.4f}")
              print(f"values_map_peak_size         : {int(stats.get('values_peak', 0))}")
              print(f"depth_heap_peak_size         : {int(stats.get('depth_heap_peak', 0))}")
              print("-------------------------------\n")

              # Histograms
              print("--- get_mask distributions ---")
