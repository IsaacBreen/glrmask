          Modify `push_state` signature and implementation:
          ```rust
          fn push_state(
              &self,
              stack: &Arc<GSSNode>,
              next_state_id: StateID,
              acc_for_new_node: LLMTokenInfo,
              user_data_for_edge: UserData, // Added
