          def is_empty(self) -> bool:
              """Return True if no indices are present."""
              return not self.intervals

          def contains(self, x: int) -> bool:
              """Return True if x is contained in the set."""
              for s, e in self.intervals:
                  if s <= x <= e:
                      return True
                  if x < s:
                      return False
              return False

