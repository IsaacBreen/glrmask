      # A large sentinel value for "unreachable" distance to any end node.
      INF_DIST = 1 << 30

      def _compute_end_distance_from_intermediate(
          intermediate_arena: Dict[NodeID, IntermediateArenaNode]
      ) -> Dict[NodeID, int]:
          rev_adj: Dict[NodeID, Set[NodeID]] = collections.defaultdict(set)
          nodes: Set[NodeID] = set(intermediate_arena.keys())
          for uid, node in intermediate_arena.items():
              for edge in node.children:
                  v = int(edge.dests.dest_idx)
                  rev_adj[v].add(uid)
                  nodes.add(v)
          dist = {n: INF_DIST for n in nodes}
          q = collections.deque()
          for uid, node in intermediate_arena.items():
              if node.clean_end:
                  dist[uid] = 0
                  q.append(uid)
          while q:
              u = q.popleft()
              nd = dist[u] + 1
              for p in rev_adj.get(u, ()):
                  if dist[p] > nd:
                      dist[p] = nd
                      q.append(p)
          return dist

      def _acc_memoize(use_value_cache: bool = True):
          """Per-invocation memoization for PyAcc transformers."""
          def decorator(fn):
              id_memo = {}
              val_memo = {}
              def wrapper(acc):
                  acc_id = id(acc)
                  if acc_id in id_memo:
                      return id_memo[acc_id]

                  if use_value_cache:
                      cached = val_memo.get(acc)
                      if cached is not None:
                          id_memo[acc_id] = cached
                          return cached

                  result = fn(acc)
                  id_memo[acc_id] = result
                  if use_value_cache and result is not None:
                      val_memo[acc] = result
                  return result
              return wrapper
          return decorator

      @dataclass(frozen=True)
      class DFAState:
