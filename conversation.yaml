      +/// if true {
      +///     hit!("some_condition was true");
      +/// }
      +///
      +/// print_summary();
      +/// ```
      +#[macro_export]
      +macro_rules! hit {
      +    ($name:expr) => {
      +        $crate::profiler::hit($name)
      +    };
      +}

