              # This is not the most efficient way, but it's correct.
              # It leverages the logic from other implementations.
              indices = list(self._rb)
              if not indices:
                  return tuple()
              
              intervals: List[Tuple[int, int]] = []
              start = indices[0]
              prev = start
              for i in indices[1:]:
                  if i == prev + 1:
                      prev = i
                  else:
                      intervals.append((start, prev))
                      start = i
                      prev = i
              intervals.append((start, prev))
              return tuple(intervals)

