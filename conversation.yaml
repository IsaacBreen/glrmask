      // --- JSONNode Enum ---
      #[derive(Debug, Clone, PartialEq)]
      pub enum JSONNode {
          Null,
          Bool(bool),
          Int(i128),
          UInt(u128),
          Float(f64),
          String(String),
          Array(Vec<JSONNode>),
          Object(BTreeMap<String, JSONNode>), // BTreeMap for sorted keys
