          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let state_id = obj
                          .remove("state_id")
                          .ok_or_else(|| "Missing field state_id for ParseStateEdgeContent".to_string())
                          .and_then(StateID::from_json)?;
                      Ok(ParseStateEdgeContent { state_id })
