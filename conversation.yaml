                      let token_name = self
                          .parent
                          .token_name_map
                          .get_by_right(&gtid.0)
                          .map(|s| s.as_str())
                          .unwrap_or("<Unknown Name>");
                      println!("  Token {} (ID: {}): {} calls", token_name, gtid.0, count);
                  }
                  println!("--------------------------------------------------------------------------");
              } else {
                  println!("--- GLRParserState::step was not called in this GrammarConstraintState::step ---");
              }
          }

          pub fn is_active(&self) -> bool {
              !self.state.is_empty()
          }
