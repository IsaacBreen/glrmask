          /// exception labels too (they must be separated from OTHER).
          fn from_nwa_with_future(nwa: &NWA, fut: &Vec<Weight>) -> Self {
              let mut set = BTreeSet::new();
              for (_s, st) in nwa.states.0.iter().enumerate() {
