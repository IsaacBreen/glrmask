              // Now below_bottom has an empty map at depth 0
              assert_eq!(popper.below_bottom.len(), 1);
              assert!(popper.below_bottom.get(&0).unwrap().is_empty());
              // Pop once; it shifts down since no edges are present
              popper.popn(1);
