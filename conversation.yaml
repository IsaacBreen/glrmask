              for (&u, neighbors) in &adj_graph {
                  for (&v, &weight) in neighbors {
                      if u < v { // Add each edge only once
                          edges.push((u, v, weight));
                      }
                  }
              }
              edges.sort_unstable_by_key(|&(_, _, weight)| std::cmp::Reverse(weight));

