              impl PatchKey {
                  fn new(mut ov: Vec<(usize, Weight)>, mut ex: Vec<(usize, Weight)>) -> Self {
                      ov.sort_by_key(|(p, _)| *p);
                      ex.sort_by_key(|(p, _)| *p);
