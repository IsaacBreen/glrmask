          #[test]
          fn test_dwa_builder() {
              let mut dwa = DWA::new();
              assert_eq!(dwa.states.len(), 1);
              assert_eq!(dwa.body.start_state, 0);

              let s1 = dwa.add_state();
              assert_eq!(s1, 1);
              assert_eq!(dwa.states.len(), 2);

              dwa.set_state_weight(0, SimpleBitset::from_item(10)).unwrap();
              dwa.set_final_weight(1, SimpleBitset::from_item(20)).unwrap();

              assert_eq!(dwa.states[0].weight, SimpleBitset::from_item(10));
              assert_eq!(dwa.states[1].final_weight, Some(SimpleBitset::from_item(20)));

              dwa.add_transition(0, b'a' as u16, 1, SimpleBitset::from_item(30)).unwrap();
              assert_eq!(*dwa.states[0].transitions.get(b'a' as u16).unwrap(), 1);
              assert_eq!(*dwa.states[0].trans_weights_exceptions.get(&(b'a' as u16)).unwrap(), SimpleBitset::from_item(30));

              // Test error cases
              let res = dwa.add_transition(0, b'a' as u16, 1, SimpleBitset::zeros());
              assert!(matches!(res, Err(DWABuildError::TransitionAlreadyExists { from: 0, on: 97 })));

              dwa.set_default_transition(0, 0, SimpleBitset::from_item(40)).unwrap();
              assert_eq!(dwa.states[0].transitions.default, Some(0));
              assert_eq!(dwa.states[0].trans_weight_default, Some(SimpleBitset::from_item(40)));

              let res = dwa.set_default_transition(0, 0, SimpleBitset::zeros());
              assert!(matches!(res, Err(DWABuildError::DefaultTransitionAlreadyExists { from: 0 })));

              let res = dwa.set_final_weight(10, SimpleBitset::zeros());
              assert!(matches!(res, Err(DWABuildError::StateOutOfBounds { state: 10 })));
          }

          #[test]
          fn test_nwa_concatenate_with_join_map() {
              // NWA1: s0 --a/all--> s1 (final)
              let mut nwa1 = NWA::new();
              let s1 = nwa1.add_state();
              nwa1.add_transition(0, b'a' as u16, s1, SimpleBitset::all());
              nwa1.set_final_weight(s1, SimpleBitset::from_item(1));

              // NWA2: s0 --b/all--> s1 (final)
              let mut nwa2 = NWA::new();
              let s3 = nwa2.add_state();
              nwa2.add_transition(0, b'b' as u16, s3, SimpleBitset::all());
              nwa2.set_final_weight(s3, SimpleBitset::from_item(2));

              // Join state s1 of nwa1 to start state (0) of nwa2.
              let join_map = BTreeMap::from([(s1, BTreeSet::from([0]))]);
              let (nwa_concat, _) = nwa1.concatenate(&nwa2, &join_map);

              // Expected states in new NWA (compositions):
              // 0: (0, {}) - start
              // 1: (1, {0}) - after 'a'
              // 2: (1, {1}) - after 'b' from state 1

              assert_eq!(nwa_concat.states.len(), 3);

              // Start state is (0, {})
              assert_eq!(nwa_concat.body.start_states.len(), 1);
              let start_id = *nwa_concat.body.start_states.iter().next().unwrap();

              // Transition on 'a' from start
              let trans_a = nwa_concat.states[start_id].transitions.get(b'a' as u16).unwrap();
              assert_eq!(trans_a.len(), 1);
              let (target_a_id, weight_a) = &trans_a[0];
              assert_eq!(*weight_a, SimpleBitset::all());

              // Target state is (1, {0})
              let state_after_a = &nwa_concat.states[*target_a_id];
              assert_eq!(state_after_a.final_weight, Some(SimpleBitset::from_item(1)));

              // The DWA::concatenate logic is asymmetric, driven by the left automaton.
              // The NWA version should behave similarly.
              // From state (1, {0}), there are no transitions from nwa1's state 1.
              // So no character transitions are expected.
              assert!(state_after_a.transitions.default.is_none());
              assert!(state_after_a.transitions.exceptions.is_empty());
          }

          #[test]
          fn test_nwa_union() {
              // NWA1: accepts "a"
              let mut nwa1 = NWA::new();
              let s1_final = nwa1.add_state();
              nwa1.add_transition(0, b'a' as u16, s1_final, SimpleBitset::from_item(1));
              nwa1.set_final_weight(s1_final, SimpleBitset::from_item(10));

              // NWA2: accepts "b"
              let mut nwa2 = NWA::new();
              let s2_final = nwa2.add_state();
              nwa2.add_transition(0, b'b' as u16, s2_final, SimpleBitset::from_item(2));
              nwa2.set_final_weight(s2_final, SimpleBitset::from_item(20));

              let (nwa_union, _) = nwa1.union(&nwa2);

              // The union NWA should have a new start state with epsilon transitions
              // to the old start states.
              // Total states: 1 (new start) + 2 (from nwa1) + 2 (from nwa2) = 5
              assert_eq!(nwa_union.states.len(), 5);
              assert_eq!(nwa_union.body.start_states.len(), 1);
              let start_id = *nwa_union.body.start_states.iter().next().unwrap();
              assert_eq!(start_id, 4); // 0,1 from nwa1, 2,3 from nwa2, 4 is new start

              let start_state = &nwa_union.states[start_id];
              assert_eq!(start_state.epsilon_transitions.len(), 2);

              // Check processing
              let res_a = nwa_union.process_stack_u16(&[b'a' as u16]);
              assert_eq!(res_a.len(), 1);
              let (_, stop_state_a, weight_a) = &res_a[0];
              assert_eq!(nwa_union.states[*stop_state_a].final_weight, Some(SimpleBitset::from_item(10)));
              assert_eq!(*weight_a, SimpleBitset::from_item(1));

              let res_b = nwa_union.process_stack_u16(&[b'b' as u16]);
              assert_eq!(res_b.len(), 1);
              let (_, stop_state_b, weight_b) = &res_b[0];
              assert_eq!(nwa_union.states[*stop_state_b].final_weight, Some(SimpleBitset::from_item(20)));
              assert_eq!(*weight_b, SimpleBitset::from_item(2));

              let res_c = nwa_union.process_stack_u16(&[b'c' as u16]);
              assert!(res_c.is_empty());
          }
      }
    src/precompute4/augmented_nwa.rs: |
      use crate::glr::grammar::regex_name;
      use crate::glr::parser::GLRParser;
      use crate::glr::table::{NonTerminalID, StateID as ParserStateID, TerminalID};
      use crate::precompute4::characterize::{
          compute_all_characterizations, compute_below_bottom_characterization, BelowBottomCharacterization,
      };
      use crate::weighted_automata::{
          DWA, NWA as WaNWA, NWABody as WaNWABody, NWAStates as WaNWAStates, StateID as WaStateID, Weight as WaWeight,
      };
      use std::collections::{BTreeMap, BTreeSet};
      use std::fmt::{Display, Formatter};
      use std::time::Instant;

      /// Error while building an AugmentedNwa.
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum AugmentedNwaBuildError {
          ParserStateIdOutOfRange { state_id: ParserStateID },
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct AugmentedNwaBody {
          pub nwa: WaNWABody,
          pub nt_nodes: BTreeMap<NonTerminalID, WaStateID>,
          pub end_map: BTreeMap<WaStateID, BTreeSet<Vec<ParserStateID>>>,
      }

      impl Display for AugmentedNwaBody {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "  Starts: {:?}", self.nwa.start_states)?;
              if !self.nt_nodes.is_empty() {
                  writeln!(f, "  Nonterminal Nodes:")?;
                  for (nt, state) in &self.nt_nodes {
                      writeln!(f, "    - NT {}: State {}", nt.0, state)?;
                  }
              }
              if !self.end_map.is_empty() {
                  writeln!(f, "  End Map:")?;
                  for (state, stacks) in &self.end_map {
                      writeln!(f, "    - State {}:", state)?;
                      for stack in stacks {
                          let stack_str: Vec<String> = stack.iter().map(|s| s.0.to_string()).collect();
                          writeln!(f, "      - [{}]", stack_str.join(", "))?;
                      }
                  }
              }
              Ok(())
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct AugmentedNwa {
          pub states: WaNWAStates,
          pub body: AugmentedNwaBody,
      }

      fn encode_symbol(id: ParserStateID) -> Result<u16, AugmentedNwaBuildError> {
          u16::try_from(id.0).map_err(|_| AugmentedNwaBuildError::ParserStateIdOutOfRange { state_id: id })
      }

      pub fn build_augmented_nwa_for_terminal(
          parser: &GLRParser,
          terminal_id: TerminalID,
      ) -> Result<AugmentedNwa, AugmentedNwaBuildError> {
          let bb = compute_below_bottom_characterization(parser, terminal_id);
          build_augmented_nwa_from_characterization(parser, &bb)
      }

      /// Identity NWA for ignore terminals: passes through any stack unchanged.
      pub fn build_augmented_nwa_for_ignore_terminal() -> AugmentedNwa {
          let mut states = WaNWAStates::default();
          let start_state = states.add_state();
          let mut end_map = BTreeMap::new();
          end_map.insert(start_state, BTreeSet::from([vec![]]));

          AugmentedNwa {
              states,
              body: AugmentedNwaBody {
                  nwa: WaNWABody { start_states: BTreeSet::from([start_state]) },
                  nt_nodes: BTreeMap::new(),
                  end_map,
              },
          }
      }

      pub fn build_augmented_nwas(
          parser: &GLRParser,
      ) -> Result<BTreeMap<TerminalID, AugmentedNwa>, AugmentedNwaBuildError> {
          let all = compute_all_characterizations(parser);

          crate::debug!(5, "\n--- Terminal Characterizations ---");
          for (terminal_id, bb) in &all {
              let terminal = parser.terminal_map.get_by_right(terminal_id).cloned().unwrap_or(regex_name("UNKNOWN"));
              crate::debug!(5, "Terminal {} ({}) Characterization:\n{}", terminal_id.0, terminal, bb);
          }
          crate::debug!(5, "--- End Terminal Characterizations ---\n");

          let mut out = BTreeMap::new();
          for (term, bb) in all {
              let aug = build_augmented_nwa_from_characterization(parser, &bb)?;
              out.insert(term, aug);
          }
          Ok(out)
      }

      /// Core builder: turns a BelowBottomCharacterization into an AugmentedNwa.
      ///
      /// Construction rules:
      /// - Create one initial start node, one unique `end_state`, and one node per nonterminal.
      /// - Initial shifts: start --(initial_state)--> end_state; record [initial_state, shift_state].
      /// - Initial reduces (initial_state, len, nt): first step on initial_state, then len default steps to nt.
      /// - Per-nonterminal reduces:
      ///   - Reveal-and-rereduces (revealed_state, len, reduce_nt): first on revealed_state, then len default steps to reduce_nt.
      ///   - Reveal-goto-shift escapes: from nt node, on revealed_state go to end_state; record [revealed_state, goto_state, shift_state].
      pub fn build_augmented_nwa_from_characterization(
          parser: &GLRParser,
          bb: &BelowBottomCharacterization,
      ) -> Result<AugmentedNwa, AugmentedNwaBuildError> {
          let mut states = WaNWAStates::default();
          let start = states.add_state();
          let mut body = AugmentedNwaBody {
              nwa: WaNWABody { start_states: BTreeSet::from([start]) },
              nt_nodes: BTreeMap::new(),
              end_map: BTreeMap::new(),
          };

          // One end node per (Option<NonTerminalID>, revealed_state) combination.
          // For initial shifts, NonTerminalID is None.
          let mut escape_end_nodes: BTreeMap<(Option<NonTerminalID>, ParserStateID), WaStateID> = BTreeMap::new();

          for &nt in parser.non_terminal_map.right_values() {
              let id = states.add_state();
              body.nt_nodes.insert(nt, id);
          }

          let w_all = WaWeight::all();

          for &(initial_state, shift_state) in &bb.initial_shifts {
              let ch = encode_symbol(initial_state)?;
              let end_state = *escape_end_nodes.entry((None, initial_state)).or_insert_with(|| states.add_state());
              states.add_transition(start, ch, end_state, w_all.clone());
              body.end_map.entry(end_state).or_default().insert(vec![initial_state, shift_state]);
          }

          for &(initial_state, len, nt) in &bb.initial_reduces {
              let ch = encode_symbol(initial_state)?;
              let target_nt = *body.nt_nodes.get(&nt).expect("nonterminal node must exist");
              let mut from = start;

              let next_state = if len == 0 { target_nt } else { states.add_state() };
              states.add_transition(from, ch, next_state, w_all.clone());
              from = next_state;

              for i in 0..len {
                  let to = if i == len - 1 { target_nt } else { states.add_state() };
                  states.add_default_transition(from, to, w_all.clone());
                  from = to;
              }
          }

          for (nt, rc) in &bb.reduce_characterizations {
              let src_nt = *body.nt_nodes.get(nt).expect("reduce_characterizations nt must exist");

              for &(revealed_state, len, reduce_nt) in &rc.reveal_and_rereduces {
                  let ch = encode_symbol(revealed_state)?;
                  let dst_nt = *body.nt_nodes.get(&reduce_nt).expect("reduce target nonterminal must exist");
                  let mut from = src_nt;

                  let next_state = if len == 0 { dst_nt } else { states.add_state() };
                  states.add_transition(from, ch, next_state, w_all.clone());
                  from = next_state;

                  for i in 0..len {
                      let to = if i == len - 1 { dst_nt } else { states.add_state() };
                      states.add_default_transition(from, to, w_all.clone());
                      from = to;
                  }
              }

              for &(revealed_state, goto_state, shift_state) in &rc.reveal_goto_shift_escapes {
                  let ch = encode_symbol(revealed_state)?;
                  let end_state =
                      *escape_end_nodes.entry((Some(*nt), revealed_state)).or_insert_with(|| states.add_state());
                  states.add_transition(src_nt, ch, end_state, w_all.clone());
                  body.end_map.entry(end_state).or_default().insert(vec![revealed_state, goto_state, shift_state]);
              }
          }

          Ok(AugmentedNwa { states, body })
      }

      impl AugmentedNwaBody {
          pub fn remap_states(&mut self, mapping: &[WaStateID]) {
              self.nwa.start_states = self.nwa.start_states.iter().map(|&s| mapping[s]).collect();
              for v in self.nt_nodes.values_mut() {
                  *v = mapping[*v];
              }
              self.end_map = std::mem::take(&mut self.end_map).into_iter().map(|(k, v)| (mapping[k], v)).collect();
          }

          pub fn process_stack(
              &self,
              states: &WaNWAStates,
              stack: &[ParserStateID],
          ) -> Result<Vec<(WaStateID, WaStateID, WaWeight)>, AugmentedNwaBuildError> {
              let encoded: Vec<u16> =
                  stack.iter().map(|&s| encode_symbol(s)).collect::<Result<_, _>>()?;
              Ok(states.process_stack_u16_from_starts(&self.nwa.start_states, &encoded))
          }

          pub fn concatenate_right_into_on_shared(
              states: &mut WaNWAStates,
              left: &mut AugmentedNwaBody,
              right: &AugmentedNwaBody,
              weight: &WaWeight,
          ) -> Result<(), AugmentedNwaBuildError> {
              crate::debug!(6, "--- concatenate_right_into_on_shared ---");
              crate::debug!(6, "--- WEIGHT: {} ---", weight);
              crate::debug!(6, "LEFT AugmentedNWA:\n{}", left);
              crate::debug!(6, "RIGHT AugmentedNWA:\n{}", right);
              crate::debug!(6, "States before concatenate:\n{}", states);

              let now = Instant::now();
              let left_end_snapshot = left.end_map.clone();
              let mut new_end_map: BTreeMap<WaStateID, BTreeSet<Vec<ParserStateID>>> = BTreeMap::new();

              let mut total_stacks = 0;
              let mut unique_stacks = BTreeSet::new();
              let mut total_stack_len = 0;
              let mut max_stack_len = 0;
              for stacks in left_end_snapshot.values() {
                  total_stacks += stacks.len();
                  for stack in stacks {
                      unique_stacks.insert(stack.clone());
                      let len = stack.len();
                      total_stack_len += len;
                      if len > max_stack_len {
                          max_stack_len = len;
                      }
                  }
              }
              let avg_stack_len = if total_stacks > 0 { total_stack_len as f64 / total_stacks as f64 } else { 0.0 };

              let mut total_process_stack_time = std::time::Duration::new(0, 0);
              let mut total_reachable_time = std::time::Duration::new(0, 0);
              let mut total_end_map_build_time = std::time::Duration::new(0, 0);
              let mut stops_count = 0;
              let mut reachable_count = 0;
       
              for (left_end_state, stacks) in &left_end_snapshot {
                  for left_stack in stacks {
                      let encoded: Vec<u16> =
                          left_stack.iter().rev().map(|&s| encode_symbol(s)).collect::<Result<_, _>>()?;

                      let process_now = Instant::now();
                      let stops = states.process_stack_u16_from_starts(&right.nwa.start_states, &encoded);
                      crate::debug!(6, "  Concatenating left end state {} with stack {:?} into right stops: {:?}", left_end_state, left_stack, stops);
                      stops_count += stops.len();
                      total_process_stack_time += process_now.elapsed();

                      for (pos, right_stop_state, path_weight) in stops {
                          let combined_weight = &path_weight & weight;
                          states.add_epsilon_transition(*left_end_state, right_stop_state, combined_weight);

                          if right.end_map.values().all(|stacks| stacks.is_empty()) {
                              continue;
                          }

                          let reachable_now = Instant::now();
                          let reachable = states.reachable_states_ignoring_labels(right_stop_state);
                          reachable_count += reachable.len();
                          total_reachable_time += reachable_now.elapsed();

                          let end_map_build_now = Instant::now();
                          for r_state in reachable {
                              if let Some(r_stacks) = right.end_map.get(&r_state) {
                                  for r_stack in r_stacks {
                                      let keep_len = left_stack.len().saturating_sub(pos);
                                      let mut combined: Vec<ParserStateID> = left_stack[..keep_len].to_vec();
                                      combined.extend(r_stack.iter().cloned());
                                      new_end_map.entry(r_state).or_default().insert(combined);
                                  }
                              }
                          }
                          total_end_map_build_time += end_map_build_now.elapsed();
                      }
                  }
              }
              left.end_map = new_end_map;

              crate::debug!(6, "RESULT AugmentedNWA:\n{}\n{}", left, states);
              crate::debug!(6, "--- end concatenate_right_into_on_shared ---");

              println!(
                  "    concatenate_right_into_on_shared took: {:?}, process_stack: {:?} ({} stops), reachable: {:?} ({} states), end_map_build: {:?}",
                  now.elapsed(),
                  total_process_stack_time,
                  stops_count,
                  total_reachable_time,
                  reachable_count,
                  total_end_map_build_time
              );
              println!(
                  "      left_end_snapshot stats: end_states={}, total_stacks={}, unique_stacks={}, max_stack_len={}, avg_stack_len={:.2}",
                  left_end_snapshot.len(),
                  total_stacks,
                  unique_stacks.len(),
                  max_stack_len,
                  avg_stack_len
              );
              Ok(())
          }

          pub fn union_with_on_shared(
              _states: &mut WaNWAStates,
              left: &mut AugmentedNwaBody,
              right: &AugmentedNwaBody,
          ) {
              for (other_end_state, stacks) in &right.end_map {
                  left.end_map.entry(*other_end_state).or_default().extend(stacks.clone());
              }
              for &start in &right.nwa.start_states {
                  left.nwa.start_states.insert(start);
              }
          }

          pub fn simplify_to_level_on_shared(&mut self, states: &mut WaNWAStates, level: usize) {
              let merged_from = states.simplify_to_level(&mut self.nwa, level);
              let old_end_map = self.end_map.clone();

              for (new_state, origin_states) in merged_from {
                  let mut stacks_for_new_state = BTreeSet::new();
                  for origin_state in &origin_states {
                      if let Some(stacks) = old_end_map.get(origin_state) {
                          stacks_for_new_state.extend(stacks.clone());
                      }
                  }
                  if !stacks_for_new_state.is_empty() {
                      self.end_map.insert(new_state, stacks_for_new_state);
                  }
              }
          }
      }

      impl AugmentedNwa {
          /// Implementation note: rebase the right's states/body into `self` first, then concatenate on shared states.
          pub fn concatenate_right_into(
              &mut self,
              right: &AugmentedNwa,
              weight: &WaWeight,
          ) -> Result<(), AugmentedNwaBuildError> {
              let mapping = self.states.append_copy_from(&right.states);
              let mut mapped_right_body = right.body.clone();
              mapped_right_body.remap_states(&mapping);
              AugmentedNwaBody::concatenate_right_into_on_shared(
                  &mut self.states,
                  &mut self.body,
                  &mapped_right_body,
                  weight,
              )
          }

          /// Union of two augmented NWAs into self.
          pub fn union_with(&mut self, other: &AugmentedNwa) {
              let mapping = self.states.append_copy_from(&other.states);
              let mut other_body = other.body.clone();
              other_body.remap_states(&mapping);
              AugmentedNwaBody::union_with_on_shared(&mut self.states, &mut self.body, &other_body);
          }

          pub fn simplify_to_level(&mut self, level: usize) {
              self.body.simplify_to_level_on_shared(&mut self.states, level);
          }


          /// Determinize to DWA using combined NWA separation.
          pub fn determinize(&self) -> DWA {
              WaNWA::determinize_components(&self.states, &self.body.nwa)
          }
      }


      impl Display for AugmentedNwa {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "Augmented NWA")?;
              write!(f, "{}", self.body)?;
              writeln!(f, "  Underlying NWA states:")?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "    State {}:", id)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "      final_weight: {}", w)?;
                  }
                  for (to, weight) in &state.epsilon_transitions {
                      writeln!(f, "      ε -> {} (weight: {})", to, weight)?;
                  }
                  if let Some(default) = &state.transitions.default {
                      for (to, weight) in default {
                          writeln!(f, "      * -> {} (weight: {})", to, weight)?;
                      }
                  }
                  for (on, transitions) in &state.transitions.exceptions {
                      for (to, weight) in transitions {
                          let char_repr = if let Some(c) = char::from_u32(*on as u32) {
                              if c.is_ascii_graphic() || c == ' ' {
                                  format!("'{}'", c)
                              } else {
                                  format!("{}", *on)
                              }
                          } else {
                              format!("{}", *on)
                          };
                          writeln!(f, "      {} -> {} (weight: {})", char_repr, to, weight)?;
                      }
                  }
              }
              Ok(())
          }
      }

