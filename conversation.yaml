      ## 1. High-level reasoning, hypotheses, and proofs

      ### 1.1. Where the time goes

      The current equivalence analysis has three main cost centers:

      1. **Suffix deduplication (`SuffixDeduper`)**
         - For every `(string, offset)` pair, it computes a 128-bit hash by scanning the **entire suffix** `&strings[str_idx][offset..]`.
         - For a string of length `L`, this is:
           - `L + 1` suffixes,
           - each hash costs `O(L - offset)`,
           - total cost per string: `O(L^2)`.
         - Over many strings, the hashing alone becomes **quadratic in token length**, which dominates runtime for moderately long tokens.

      2. **Regex execution on each unique suffix**
         - For each unique suffix, we call `Regex::execute_from_state2`, which:
           - allocates a `RegexState`,
           - runs the DFA with non-trivial early-termination logic,
           - constructs sets/maps repeatedly.

      3. **Per-suffix canonical signature construction**
         - For each suffix, we collect matches and remainder signatures, using `SmallVec` and sorting/deduping small vectors.

      Empirically, (1) and (2) are the heavy parts. We can significantly speed up both without changing semantics.

      ---

      ### 1.2. Hypotheses

      1. **Hypothesis A (hashing):**  
         If we precompute a hash for every suffix of every string *once* (using a linear-time right-to-left recurrence that depends only on the suffix’s bytes), and then use those precomputed hashes in `SuffixDeduper`, the set of canonical suffix nodes created by `SuffixDeduper` and the equality checks will be unchanged. Runtime will drop from roughly `O(Σ L_i^2)` to `O(Σ L_i)` for hashing (plus the regex executions).

      2. **Hypothesis B (fast execution):**  
         We can replace the internal implementation of `Regex::execute_from_state2` by a specialized, allocation-light implementation that:
         - Does **not** use `RegexState` or its `matches` map,
         - Uses only:
           - the DFA transitions and finalizer sets,
           - the global `non_greedy_finalizers`,
           - the per-state `possible_future_group_ids`,
         - But still produces **exactly the same** `ExecutionResult` as the previous implementation.

      3. **Hypothesis C (early termination):**  
         The early termination condition currently in `RegexState::execute`:
         \[
         \text{future} \setminus (\text{matched} \cap \text{non\_greedy}) = \emptyset
         \]
         is equivalent to:
         > “For every group ID in `future`, that group is non-greedy **and** already matched.”

         So we can implement early termination by a single loop without constructing intermediate sets.

      ---

      ### 1.3. Proof sketch for Hypothesis A (hashing)

      **Old design:**

      - `SuffixDeduper::get_or_intern(str_idx, offset)`:
        1. Computes `bytes = &strings[str_idx][offset..]`.
        2. Computes `h = hash128(bytes)`, where `hash128` loops over every byte in the slice.
        3. Uses `h` as a bucket key in `buckets: HashMap<u128, Vec<node_id>>`.
        4. For each candidate node in that bucket:
           - Fetches its representative slice `rep_bytes`,
           - Compares `rep_bytes == bytes`.
        5. On equality, reuses that node; otherwise creates a new node.

      **New design:**

      - Before building the deduper, we precompute per-string arrays:
        - For each string `s`, allocate `suffix_hashes_s: Vec<u128>` of length `s.len() + 1`.
        - Fill them from right to left:
          - `suffix_hashes_s[len]` is a fixed constant hash for the empty suffix.
          - For `i = len-1` down to `0`, we set:
            \[
            h_i = F(b_i, h_{i+1})
            \]
            where `F` is a mixing function depending only on `b_i` and `h_{i+1}`.
        - Thus, by construction, `suffix_hashes_s[i]` is a pure function of the suffix `s[i..]`.

      - `SuffixDeduper::get_or_intern(str_idx, offset)`:
        1. Computes `bytes = &strings[str_idx][offset..]`.
        2. Uses the **precomputed** `h = suffix_hashes[str_idx][offset]`.
        3. Uses `h` as the bucket key.
        4. Checks equality `rep_bytes == bytes` on collisions, exactly as before.

      **Correctness argument:**

      - For any pair `(str_idx, offset)` and `(str_idx', offset')`:
        - If the suffixes are identical (`strings[str_idx][offset..] == strings[str_idx’][offset’..]`):
          - The byte sequences passed into the recurrence from right to left are identical,
          - Therefore the computed hashes `h` are equal.
        - If the suffixes differ, the recurrence (which depends on each byte and mixes uniquely) will almost surely produce different hashes; even if a collision occurs, equality is still checked by comparing slices.

      - The deduper’s logic for deciding whether two suffixes are the same is:
        1. They land in the same bucket (hash equal),
        2. Their byte slices compare equal.

        Since the **byte equality check is unchanged**, and the hash is now a deterministic function of the same bytes, the set of suffixes that end up merged into a single canonical node is **exactly the same**.

      - Complexity:
        - Precomputation: For each string of length `L`, we do `O(L)` operations.
        - `get_or_intern` itself becomes `O(1)` average-time hashing plus at most a few equality checks.
        - Old version: For each suffix, `hash128(bytes)` was `O(|bytes|)`, giving `O(Σ L_i^2)` overall; the new version yields `O(Σ L_i)` hashing cost plus unchanged costs for equality checks and regex runs.

      Thus, Hypothesis A holds: results are unchanged, but hashing becomes linear in the total length of all strings.

