              let mut llm_token_map: BiBTreeMap<Vec<u8>, LLMTokenID> = BiBTreeMap::new();
              for (key, value) in token_to_id.iter() {
                  let token = key.extract::<&[u8]>()?;
                  let id = value.extract::<usize>()?;
