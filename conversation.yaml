      // src/precompute4/weighted_automata/common.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset;
      use std::collections::BTreeMap;

      pub(crate) const STOCHASTIC_DEBUG: bool = false; // Set to false by default to avoid heavy stochastic validation on large automata

      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Hash, Debug, Default)]
      pub struct I16Map<T> {
          pub exceptions: BTreeMap<i16, T>,
          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String {
          let u = code as u16;
          if let Some(c) = char::from_u32(u as u32) {
              if c.is_ascii_graphic() || c == ' ' {
                  format!("'{}'", c)
              } else {
                  format!("{}", u)
              }
          } else {
              format!("{}", u)
          }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/ops.rs: |
      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use std::collections::VecDeque;

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let mut result_dwa = union_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let mut result_dwa = concat_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      impl NWA {
          /// Compute per-state future acceptance masks F[s]:
          /// F[s] = final[s] ∪ ⋃_{ε s->t}(wε ∧ F[t]) ∪ ⋃_{lbl s->t}(wlbl ∧ F[t]) ∪ (if def s->t) (wdef ∧ F[t])
          /// This is a standard monotone least fixpoint computed by reverse propagation.
          pub fn compute_future_weights(&self) -> Vec<Weight> {
              let n = self.states.len();
              let mut fut: Vec<Weight> = vec![Weight::zeros(); n];
              let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

              // Build reverse adjacency aggregating all edge types with their weights.
              for p in 0..n {
                  // Epsilon
                  for &(t, ref w) in &self.states[p].epsilons {
                      if t < n { rev[t].push((p, w.clone())); }
                  }
                  // Labeled
                  for (_, (t, w)) in &self.states[p].transitions {
                      if *t < n { rev[*t].push((p, w.clone())); }
                  }
                  // Default
                  if let Some((t, w)) = &self.states[p].default {
                      if *t < n { rev[*t].push((p, w.clone())); }
                  }
              }

              // Initialize with final weights
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              for s in 0..n {
                  if let Some(fw) = &self.states[s].final_weight {
                      if !fw.is_empty() {
                          fut[s] = fw.clone();
                          q.push_back(s);
                      }
                  }
              }

              // Reverse propagation: when fut[v] grows, update predecessors p using edge weight wpv.
              while let Some(v) = q.pop_front() {
                  let fv = fut[v].clone();
                  if fv.is_empty() { continue; }
                  for &(p, ref w_pv) in &rev[v] {
                      let add = &fv & w_pv;
                      if add.is_empty() { continue; }
                      let old = &fut[p];
                      if (&add & old) != add {
                          fut[p] |= &add;
                          q.push_back(p);
                      }
                  }
              }
              fut
          }

          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      if let Some(w) = &st.trans_weight_default {
                          nwa.states.0[i].default = Some((to, w.clone()));
                      }
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      if let Some(w) = st.trans_weights_exceptions.get(lbl) {
                          nwa.states.add_transition(i, *lbl, *to, w.clone()).unwrap();
                      }
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  dwa1.simplify();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  dwa2.simplify();
                  let mut result_dwa = union_nwa.determinize_to_dwa();
                  result_dwa.simplify();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, (v, _)) in states[u].transitions.iter() {
                      if *v < states.len() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                      }
                  }
                  if let Some((v, _)) = &states[u].default {
                      if *v < states.len() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }
          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  dwa1.simplify();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  dwa2.simplify();
                  let mut result_dwa = concat_nwa.determinize_to_dwa();
                  result_dwa.simplify();


                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              Self::internal_concatenate_components(states, left, right, eps_weight)
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/weighted_automata/determinization.rs: |-
      // src/precompute4/weighted_automata/determinization.rs
      //
      // New determinization strategy: per-bit-plane decomposition.
      // The weight on edges is a bitset (SimpleBitset). The automaton semantics
      // (intersection on path, union over choices) are bitwise operations. This means
      // we can decompose the weighted automaton problem into N independent unweighted
      // automaton problems, one for each bit in the bitset.
      //
      // The algorithm is as follows:
      // 1. For each bit `i` in the `Weight` bitset, construct an NFA (`NFA_i`) where
      //    an edge exists if and only if the `i`-th bit is set in the corresponding
      //    weight in the original NWA.
      // 2. Many of these `NFA_i` might be structurally identical. We hash them to find
      //    the set of unique NFAs.
      // 3. Each unique NFA is determinized to a DFA using standard subset construction.
      //    This is an unweighted determinization, which is much simpler and faster
      //    than weighted determinization.
      // 4. The final DWA is constructed as a product of all the unique DFAs. A state
      //    in the final DWA corresponds to a tuple of states, one from each unique DFA.
      //    We only build the reachable states of this product automaton.
      // 5. Transitions in the final DWA have weight `Weight::all()`. The logic is
      //    encoded in the structure of the automaton.
      // 6. The final weight of a state in the DWA is a bitset where bit `i` is set
      //    if the corresponding component DFA state (for bit `i`) is an accepting state.
      //
      // This approach is effective because the structure of the NWA (few SCCs with
      // mostly `Weight::all()` internally) leads to many identical or simple bit-plane
      // NFAs, making the DFAs and their product manageable in size.

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::Weight;
      use super::dwa::DWA;
      use super::nwa::{NWAStates, NWA};
      use crate::precompute4::weighted_automata::{StateID, NWAStateID};

      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};
      use std::hash::{Hash, Hasher};

      impl NWA {
          pub fn determinize_to_dwa(&self) -> DWA {
              let mut nwa = self.clone();
              nwa.simplify();
              if nwa.states.len() == 0 {
                  return DWA::new();
              }
              nwa.determinize_by_bits()
          }

          fn determinize_by_bits(&self) -> DWA {
              let num_bits = Weight::all().len();
              if num_bits == 0 {
                  return DWA::new();
              }

              // 1. Create NFAs for each bit plane, identifying unique ones.
              let mut bit_to_dfa_idx = vec![0; num_bits];
              let mut unique_dfas = Vec::<DFA>::new();
              let mut nfa_to_dfa_idx = HashMap::<NFA, usize>::new();

              for i in 0..num_bits {
                  let nfa = NFA::from_nwa(self, i);
                  if let Some(&dfa_idx) = nfa_to_dfa_idx.get(&nfa) {
                      bit_to_dfa_idx[i] = dfa_idx;
                  } else {
                      let dfa = nfa.determinize();
                      let dfa_idx = unique_dfas.len();
                      unique_dfas.push(dfa);
                      nfa_to_dfa_idx.insert(nfa, dfa_idx);
                      bit_to_dfa_idx[i] = dfa_idx;
                  }
              }

              // 2. Product construction of unique DFAs.
              let mut dwa = DWA::new();
              dwa.states.0.clear();

              let mut product_map = HashMap::<Vec<StateID>, StateID>::new();
              let mut worklist = VecDeque::<StateID>::new();
              let mut dwa_id_to_product_state = Vec::<Vec<StateID>>::new();

              let get_or_create_dwa_state = |product_state: Vec<StateID>,
                                             dwa: &mut DWA,
                                             product_map: &mut HashMap<Vec<StateID>, StateID>,
                                             worklist: &mut VecDeque<StateID>,
                                             dwa_id_to_product_state: &mut Vec<Vec<StateID>>|
               -> StateID {
                  *product_map.entry(product_state.clone()).or_insert_with(|| {
                      let new_id = dwa.add_state();
                      worklist.push_back(new_id);
                      dwa_id_to_product_state.push(product_state);
                      new_id
                  })
              };

              let start_product_state: Vec<StateID> =
                  unique_dfas.iter().map(|dfa| dfa.start_state).collect();
              dwa.body.start_state = get_or_create_dwa_state(
                  start_product_state,
                  &mut dwa,
                  &mut product_map,
                  &mut worklist,
                  &mut dwa_id_to_product_state,
              );

              while let Some(dwa_id) = worklist.pop_front() {
                  let product_state = dwa_id_to_product_state[dwa_id].clone();

                  // Collect all exception labels from all component DFA states.
                  let mut labels = BTreeSet::new();
                  for (dfa_idx, &dfa_state_id) in product_state.iter().enumerate() {
                      for &label in unique_dfas[dfa_idx].states[dfa_state_id].transitions.keys() {
                          labels.insert(label);
                      }
                  }

                  // Default transition
                  let default_target_prod: Vec<StateID> = product_state
                      .iter()
                      .enumerate()
                      .map(|(dfa_idx, &dfa_state_id)| unique_dfas[dfa_idx].get_next_state(dfa_state_id, None))
                      .collect();
                  let default_dwa_target = get_or_create_dwa_state(
                      default_target_prod.clone(),
                      &mut dwa,
                      &mut product_map,
                      &mut worklist,
                      &mut dwa_id_to_product_state,
                  );
                  dwa.set_default_transition(dwa_id, default_dwa_target, Weight::all()).unwrap();

                  // Exception transitions
                  for label in labels {
                      let target_prod: Vec<StateID> = product_state
                          .iter()
                          .enumerate()
                          .map(|(dfa_idx, &dfa_state_id)| {
                              unique_dfas[dfa_idx].get_next_state(dfa_state_id, Some(label))
                          })
                          .collect();

                      // Only add an exception if it's different from the default.
                      if target_prod != default_target_prod {
                          let dwa_target = get_or_create_dwa_state(
                              target_prod,
                              &mut dwa,
                              &mut product_map,
                              &mut worklist,
                              &mut dwa_id_to_product_state,
                          );
                          dwa.add_transition(dwa_id, label, dwa_target, Weight::all()).unwrap();
                      }
                  }
              }

              // 3. Set final weights.
              for dwa_id in 0..dwa.states.len() {
                  let product_state = &dwa_id_to_product_state[dwa_id];
                  let mut final_weight = Weight::zeros();
                  for bit in 0..num_bits {
                      let dfa_idx = bit_to_dfa_idx[bit];
                      let dfa_state_id = product_state[dfa_idx];
                      if unique_dfas[dfa_idx].states[dfa_state_id].is_final {
                          final_weight.insert(bit);
                      }
                  }
                  if !final_weight.is_empty() {
                      dwa.set_final_weight(dwa_id, final_weight).unwrap();
                  }
              }

              dwa
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq, Hash)]
      struct NFAState {
          transitions: BTreeMap<i16, Vec<NWAStateID>>,
          epsilon: Vec<NWAStateID>,
          default: Vec<NWAStateID>,
          is_final: bool,
      }

      #[derive(Debug, Default, PartialEq, Eq, Hash)]
      struct NFA {
          states: Vec<NFAState>,
          start_state: NWAStateID,
      }

      impl NFA {
          fn from_nwa(nwa: &NWA, bit: usize) -> Self {
              let mut states = vec![NFAState::default(); nwa.states.len()];
              for (id, nwa_state) in nwa.states.0.iter().enumerate() {
                  if let Some(w) = &nwa_state.final_weight {
                      if w.contains(bit) {
                          states[id].is_final = true;
                      }
                  }
                  for (on, (to, w)) in &nwa_state.transitions {
                      if w.contains(bit) {
                          states[id].transitions.entry(*on).or_default().push(*to);
                      }
                  }
                  for (to, w) in &nwa_state.epsilons {
                      if w.contains(bit) {
                          states[id].epsilon.push(*to);
                      }
                  }
                  if let Some((to, w)) = &nwa_state.default {
                      if w.contains(bit) {
                          states[id].default.push(*to);
                      }
                  }
              }
              Self { states, start_state: nwa.body.start_state }
          }

          fn epsilon_closure(&self, initial_states: &BTreeSet<NWAStateID>) -> BTreeSet<NWAStateID> {
              let mut closure = initial_states.clone();
              let mut queue: VecDeque<_> = initial_states.iter().copied().collect();
              let mut visited = initial_states.clone();

              while let Some(u) = queue.pop_front() {
                  for &v in &self.states[u].epsilon {
                      if v < self.states.len() && !visited.contains(&v) {
                          closure.insert(v);
                          visited.insert(v);
                          queue.push_back(v);
                      }
                  }
              }
              closure
          }

          fn determinize(&self) -> DFA {
              let mut dfa = DFA::default();
              let mut worklist = VecDeque::new();
              let mut subset_map = HashMap::new();

              let start_subset = self.epsilon_closure(&BTreeSet::from([self.start_state]));
              dfa.start_state = dfa.get_or_create_state(&start_subset, self, &mut subset_map, &mut worklist);

              while let Some(subset) = worklist.pop_front() {
                  let from_dfa_id = *subset_map.get(&subset).unwrap();

                  let mut labels = BTreeSet::new();
                  for &nfa_id in &subset {
                      if nfa_id < self.states.len() {
                          for &label in self.states[nfa_id].transitions.keys() {
                              labels.insert(label);
                          }
                      }
                  }

                  // Default transition
                  let mut default_next = BTreeSet::new();
                  for &nfa_id in &subset {
                      if nfa_id < self.states.len() {
                          default_next.extend(&self.states[nfa_id].default);
                      }
                  }
                  let default_subset = self.epsilon_closure(&default_next);
                  let to_dfa_id = dfa.get_or_create_state(&default_subset, self, &mut subset_map, &mut worklist);
                  dfa.states[from_dfa_id].default = Some(to_dfa_id);

                  // Exception transitions
                  for label in labels {
                      let mut next_states = BTreeSet::new();
                      for &nfa_id in &subset {
                          if nfa_id < self.states.len() {
                              if let Some(targets) = self.states[nfa_id].transitions.get(&label) {
                                  next_states.extend(targets);
                              } else {
                                  next_states.extend(&self.states[nfa_id].default);
                              }
                          }
                      }
                      let next_subset = self.epsilon_closure(&next_states);
                      let to_dfa_id = dfa.get_or_create_state(&next_subset, self, &mut subset_map, &mut worklist);
                      dfa.states[from_dfa_id].transitions.insert(label, to_dfa_id);
                  }
              }
              dfa
          }
      }

      #[derive(Debug, Default)]
      struct DFAState {
          transitions: BTreeMap<i16, StateID>,
          default: Option<StateID>,
          is_final: bool,
      }

      #[derive(Debug, Default)]
      struct DFA {
          states: Vec<DFAState>,
          start_state: StateID,
      }

      impl DFA {
          fn get_or_create_state(
              &mut self,
              subset: &BTreeSet<NWAStateID>,
              nfa: &NFA,
              subset_map: &mut HashMap<BTreeSet<NWAStateID>, StateID>,
              worklist: &mut VecDeque<BTreeSet<NWAStateID>>,
          ) -> StateID {
              if let Some(&id) = subset_map.get(subset) {
                  return id;
              }
              let new_id = self.states.len();
              let is_final = subset.iter().any(|&id| id < nfa.states.len() && nfa.states[id].is_final);
              self.states.push(DFAState { is_final, ..Default::default() });
              subset_map.insert(subset.clone(), new_id);
              if !subset.is_empty() {
                  worklist.push_back(subset.clone());
              }
              new_id
          }

          fn get_next_state(&self, from_state_id: StateID, on: Option<i16>) -> StateID {
              let state = &self.states[from_state_id];
              if let Some(on_char) = on {
                  if let Some(&to) = state.transitions.get(&on_char) {
                      return to;
                  }
              }
              state.default.expect("DFA state should have a default transition")
          }
      }
