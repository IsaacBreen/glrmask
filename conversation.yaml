  - assistant: |-
      Yes, you've found a bug. The error message `unrecognized arguments: -- --only merge_after_prefix_mutations` shows that the `run_benches.sh` script is incorrectly passing the `--` separator to the Python benchmark runner, which causes the argument parser to fail.

      The script correctly identifies that `--only merge_after_prefix_mutations` should be passed to the runner, but it also includes the `--` used to separate the arguments, which confuses the Python script.

      The fix is to adjust the argument parsing logic in `run_benches.sh` to consume the `--` separator instead of passing it along. Here are the steps to fix it.

      ### Step-by-step Instructions

      #### 1. Modify `python/gss_tester/run_benches.sh`

      We need to update the loop that separates implementation names from the extra arguments for the runner.

      1.  **Locate the argument parsing loop:**
          Open `python/gss_tester/run_benches.sh` and find this block of code:
          ```bash
          # Collect implementations until we see a flag starting with '--' or we run out.
          IMPLS=()
          EXTRA_ARGS=()
          while (( "$#" )); do
            if [[ "$1" == --* ]]; then
              EXTRA_ARGS=("$@")
              break
            else
              IMPLS+=("$1")
            fi
            shift
          done
          ```

      2.  **Replace the loop:**
          Replace the entire loop with the following corrected version. This new logic specifically checks for `--` and consumes it, while still correctly handling cases where extra arguments are passed without `--`.
          ```bash
          # Collect implementations until we see a flag starting with '--' or we run out.
          IMPLS=()
          EXTRA_ARGS=()
          while (( "$#" )); do
            if [[ "$1" == "--" ]]; then
              shift # Consume the '--'
              EXTRA_ARGS=("$@")
              break
            elif [[ "$1" == --* ]]; then
              EXTRA_ARGS=("$@")
              break
            else
              IMPLS+=("$1")
            fi
            shift
          done
          ```

      After applying this change, the script will correctly handle the `--` separator, and your command should run as expected.

      ### Git Diff

      Here is the corresponding git diff for the change.

      ```diff
      diff --git a/python/gss_tester/run_benches.sh b/python/gss_tester/run_benches.sh
      index a083320..6355883 100755
      --- a/python/gss_tester/run_benches.sh
      +++ b/python/gss_tester/run_benches.sh
      @@ -39,9 +39,14 @@
       IMPLS=()
       EXTRA_ARGS=()
       while (( "$#" )); do
      -  if [[ "$1" == --* ]]; then
      +  if [[ "$1" == "--" ]]; then
      +    shift # Consume the '--'
      +    EXTRA_ARGS=("$@")
      +    break
      +  elif [[ "$1" == --* ]]; then
           EXTRA_ARGS=("$@")
           break
         else
           IMPLS+=("$1")
         fi

      ```
