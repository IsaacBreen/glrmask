      #[pymethods]
      impl PyGSSNode {
          #[new]
          fn new() -> Self {
              PyGSSNode { inner: std::sync::Arc::new(RustGSSNode::new_fresh()) }
          }

          fn push(&self, value: usize) -> PyGSSNode {
              let edge = sep1::glr::parser::ParseStateEdgeContent { state_id: StateID(value) };
              let new_node = self.inner.as_ref().push(edge);
