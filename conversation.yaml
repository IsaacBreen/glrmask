      use std::collections::{HashMap, VecDeque};

      pub fn eliminate_negative_pops<EK, EV, T, FGet, FReplace, FNeutral, FMerge>(
          god: &GodWrapper<EK, EV, T>,
          roots: &[Trie2Index],
          mut get_pop: FGet,
