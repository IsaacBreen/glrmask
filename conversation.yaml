                  ("SLASH", eat_u8(b'/')),
                  ("VBAR", eat_u8(b'|')),
                  ("AMPER", eat_u8(b'&')),
                  ("LESS", eat_u8(b'<')),
                  ("GREATER", eat_u8(b'>')),
