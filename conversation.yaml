          /// Read-locks the Arena and returns a guard that derefs to &Trie at this index.
          /// Returns None if the index does not exist.
          pub fn read<'a, EK: Ord, EV, T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
          ) -> Option<Trie2ReadGuard<'a, EK, EV, T>> {
