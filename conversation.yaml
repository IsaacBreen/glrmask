              let fused_pred_arc = root
                  .predecessors()
                  .values()
                  .next()
                  .unwrap()
                  .values()
                  .next()
                  .unwrap()[0]
                  .clone();

              assert_eq!(fused_pred_arc.acc().llm_tokens_union, HybridBitset::max_ones());
              assert_eq!(fused_pred_arc.num_predecessors(), 2);
          }

