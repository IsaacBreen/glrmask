              assert!(arena.get(root).is_leaf());

              let mut processed = false;
              arena.special_map(
                  vec![(root, 100)],
                  |_p, _ek, _ev, _n| panic!("Step should not be called for leaf"),
                  |_cur, _new| {},
                  |node, v| {
