      My hypothesis is twofold:
      1.  **Explicit Lookahead Set Explosion:** The primary issue is the materialization of full lookahead sets for reduce actions. When a reduction is permitted on end-of-input (EOF), the current implementation expands this to mean "any terminal not otherwise specified". With 50,000 terminals, this creates enormous data structures (`BTreeMap<Terminal, ...>`) in each state, leading to excessive memory usage and computation time.
      2.  **Inefficient Data Structures:** Several performance-critical analysis functions, like `compute_nonterminal_nullability` and `compute_follow_sets`, use `BTreeMap` with `NonTerminal` (a string-backed struct) as keys. For iterative, worklist-based algorithms, the overhead of string comparisons in map lookups becomes substantial.

      My solution rigorously addresses these points:

      1.  **Default Reductions:** I will modify the table generation to not expand EOF-based lookaheads. Instead, I'll introduce the concept of a "default action" in each parser state. If an incoming terminal does not match any specific `shift` or `reduce` action, the parser will use this default action (which will always be a reduce or a set of reduces). This keeps the parse table compact, representing the huge lookahead sets implicitly. This is a standard technique in industrial-strength parser generators like Bison.

      2.  **Integer-Based Analysis:** I will refactor the core grammar analysis functions (`compute_nonterminal_nullability`, `compute_follow_sets_for_nonterminals`) to operate on integer IDs assigned to non-terminals, rather than on the non-terminals directly. This replaces expensive string operations with fast integer indexing into `Vec`s, dramatically speeding up these critical pre-computation steps.

