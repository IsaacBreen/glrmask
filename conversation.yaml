          let mut constraint_state = grammar_constraint.init();
          // constraint_state.commit_bytes(full_text_to_tokenize.as_bytes());
          // assert!(
          //     constraint_state.is_active(),
          //     "Constraint state should be active after committing the full text."
          // );
