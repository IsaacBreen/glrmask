  initial_file_contents:
    src/js.ebnf: |
      // Instruct the parser to ignore Whitespace and Comments between tokens.
      !ignore IGNORE;

      program ::= statement_list? ;

      // Lexical Grammar: Whitespace and Comments
      IGNORE ::= WS | COMMENT ;
      WS ::= ( ' ' | '\t' | '\n' | '\r' )+ ;
      COMMENT ::= SINGLE_LINE_COMMENT | MULTI_LINE_COMMENT ;
      SINGLE_LINE_COMMENT ::= '//' ( [^\n\r] )* ; // Non-greedy match
      MULTI_LINE_COMMENT ::= '/*' ( [^*] | '*' [^/] )* '*/' ; // Non-greedy match

      // Statements
      statement_list ::= statement+ ;

      statement ::=
          block
        | declaration_statement
        | if_statement
        | iteration_statement
        | switch_statement
        | with_statement
        | try_statement
        | function_declaration
        | return_statement
        | break_statement
        | continue_statement
        | throw_statement
        | debugger_statement
        | labeled_statement
        | class_declaration
        | import_statement
        | export_statement
        | expression_statement
        ;

      // Note: Semicolon is optional to simulate Automatic Semicolon Insertion (ASI).
      // A real parser has complex rules for this.
      expression_statement ::= expression ';'? ;

      block ::= '{' statement_list? '}' ;

      labeled_statement ::= IDENTIFIER ':' statement ;

      declaration_statement ::= ( 'var' | 'let' | 'const' ) variable_declaration_list ';'? ;

      variable_declaration_list ::= variable_declaration ( ',' variable_declaration )* ;

      variable_declaration ::= binding_pattern ( '=' expression )? ;

      if_statement ::= 'if' '(' expression ')' statement ( 'else' statement )? ;

      iteration_statement ::=
          'while' '(' expression ')' statement
        | 'do' statement 'while' '(' expression ')' ';'
        | 'for' '(' ( ( 'var' | 'let' | 'const' ) variable_declaration_list )? ';' expression? ';' expression? ')' statement
        | 'for' '(' ( 'var' | 'let' | 'const' )? binding_pattern ( 'in' | 'of' ) expression ')' statement
        | 'for' '(' expression? ';' expression? ';' expression? ')' statement
        ;

      switch_statement ::= 'switch' '(' expression ')' '{' case_clauses? ( default_clause case_clauses? )? '}' ;
      case_clauses ::= case_clause+ ;
      case_clause ::= 'case' expression ':' statement_list? ;
      default_clause ::= 'default' ':' statement_list? ;

      with_statement ::= 'with' '(' expression ')' statement ;

      try_statement ::= 'try' block ( catch_clause finally_clause? | finally_clause ) ;
      catch_clause ::= 'catch' ( '(' binding_pattern ')' )? block ;
      finally_clause ::= 'finally' block ;

      function_declaration ::= 'async'? 'function' '*'? IDENTIFIER? '(' parameter_list? ')' block ;

      parameter_list ::= formal_parameter ( ',' formal_parameter )* ( ','? '...' binding_pattern )? ;

      formal_parameter ::= binding_pattern ( '=' expression )? ;

      return_statement ::= 'return' expression? ';'? ;
      break_statement ::= 'break' IDENTIFIER? ';'? ;
      continue_statement ::= 'continue' IDENTIFIER? ';'? ;
      throw_statement ::= 'throw' expression ';'? ;
      debugger_statement ::= 'debugger' ';'? ;

      // Binding Patterns (for destructuring)
      binding_pattern ::= IDENTIFIER | object_binding_pattern | array_binding_pattern ;
      object_binding_pattern ::= '{' ( property_binding ( ',' property_binding )* )? ( ','? '...' IDENTIFIER )? ','? '}' ;
      property_binding ::= (IDENTIFIER ('=' expression)?) | (property_name ':' binding_pattern ('=' expression)?) ;
      array_binding_pattern ::= '[' ( ELISION? binding_element )? ( ',' ELISION? binding_element )* (','? '...' binding_pattern)? ','? ELISION? ']' ;
      binding_element ::= binding_pattern ('=' expression)? ;

      // ES6 Modules
      import_statement ::= 'import' ( import_clause 'from' STRING_LITERAL | STRING_LITERAL ) ';'? ;
      import_clause ::= default_import | named_imports | namespace_import | default_import ',' ( named_imports | namespace_import ) ;
      default_import ::= IDENTIFIER ;
      named_imports ::= '{' ( import_specifier ( ',' import_specifier )* )? ','? '}' ;
      namespace_import ::= '*' 'as' IDENTIFIER ;
      import_specifier ::= IDENTIFIER ( 'as' IDENTIFIER )? ;

      export_statement ::= 'export' ( 'default' ( function_declaration | class_declaration | expression ) | '*' ( 'from' STRING_LITERAL )? | named_exports ( 'from' STRING_LITERAL )? | declaration_statement | class_declaration ) ';'? ;
      named_exports ::= '{' ( export_specifier ( ',' export_specifier )* )? ','? '}' ;
      export_specifier ::= IDENTIFIER ( 'as' IDENTIFIER )? ;

      // Expressions (Precedence from lowest to highest)
      expression ::= assignment_expression ;

      assignment_expression ::=
          yield_expression
        | arrow_function
        | conditional_expression
        | left_hand_side_expression ( '=' | '+=' | '-=' | '*=' | '/=' | '%=' | '<<=' | '>>=' | '>>>=' | '&=' | '^=' | '|=' | '**=' ) assignment_expression
        ;

      arrow_function ::= arrow_parameters '=>' ( block | expression ) ;
      arrow_parameters ::= IDENTIFIER | '(' parameter_list? ')' ;

      conditional_expression ::=
          coalesce_expression ( '?' assignment_expression ':' assignment_expression )?
        ;

      coalesce_expression ::= logical_or_expression ( '??' logical_or_expression )* ;

      logical_or_expression ::= logical_and_expression ( '||' logical_and_expression )* ;

      logical_and_expression ::= bitwise_or_expression ( '&&' bitwise_or_expression )* ;

      bitwise_or_expression ::= bitwise_xor_expression ( '|' bitwise_xor_expression )* ;

      bitwise_xor_expression ::= bitwise_and_expression ( '^' bitwise_and_expression )* ;

      bitwise_and_expression ::= equality_expression ( '&' equality_expression )* ;

      equality_expression ::= relational_expression ( ( '==' | '!=' | '===' | '!==' ) relational_expression )* ;

      relational_expression ::= shift_expression ( ( '<' | '>' | '<=' | '>=' | 'instanceof' | 'in' ) shift_expression )* ;

      shift_expression ::= additive_expression ( ( '<<' | '>>' | '>>>' ) additive_expression )* ;

      additive_expression ::= multiplicative_expression ( ( '+' | '-' ) multiplicative_expression )* ;

      multiplicative_expression ::= exponentiation_expression ( ( '*' | '/' | '%' ) exponentiation_expression )* ;

      exponentiation_expression ::= unary_expression ( '**' exponentiation_expression )? ;

      unary_expression ::=
          postfix_expression
        | ( 'delete' | 'void' | 'typeof' | '++' | '--' | '+' | '-' | '~' | '!' | 'await' ) unary_expression
        ;

      postfix_expression ::=
          left_hand_side_expression ( '++' | '--' )?
        ;

      left_hand_side_expression ::=
          new_expression
        | call_expression
        ;

      new_expression ::=
          member_expression
        | 'new' new_expression
        ;

      call_expression ::=
          member_expression arguments
        | 'super' arguments
        | call_expression arguments
        | call_expression '?.' arguments
        | call_expression '[' expression ']'
        | call_expression '?.' '[' expression ']'
        | call_expression '.' IDENTIFIER
        | call_expression '?.' '.' IDENTIFIER
        | call_expression template_literal
        ;

      arguments ::= '(' ( assignment_expression ( ',' assignment_expression )* )? ')' ;

      member_expression ::=
          primary_expression
        | member_expression '[' expression ']'
        | member_expression '?.' '[' expression ']'
        | member_expression '.' IDENTIFIER
        | member_expression '?.' '.' IDENTIFIER
        | member_expression private_identifier
        | 'new' member_expression arguments
        | member_expression template_literal
        ;

      primary_expression ::=
          'this'
        | 'super'
        | IDENTIFIER
        | literal
        | array_literal
        | object_literal
        | function_expression
        | '(' expression ')'
        ;

      function_expression ::= 'async'? 'function' '*'? IDENTIFIER? '(' parameter_list? ')' block ;

      yield_expression ::= 'yield' '*'? expression? ;

      array_literal ::= '[' ( ELISION? assignment_expression )? ( ',' ELISION? assignment_expression )* ','? ELISION? ']' ;
      ELISION ::= ','+ ;

      object_literal ::= '{' ( property_assignment ( ',' property_assignment )* )? ','? '}' ;
      property_assignment ::=
          'async'? '*'? property_name '(' parameter_list? ')' block // Method Definition
        | 'get' property_name '(' ')' block
        | 'set' property_name '(' IDENTIFIER ')' block
        | property_name ':' assignment_expression
        | '...' assignment_expression
        | IDENTIFIER // Shorthand property
        ;
      property_name ::= IDENTIFIER | STRING_LITERAL | NUMERIC_LITERAL | '[' expression ']' ;

      class_declaration ::= 'class' IDENTIFIER? ( 'extends' expression )? class_body ;
      class_body ::= '{' class_member* '}' ;
      class_member ::= (method_definition | field_definition) ';'? | ';' ;
      field_definition ::= ('static')? class_property_name ('=' expression)? ;
      method_definition ::= ('static')? ('get'|'set')? ('async'|'*')? class_property_name '(' parameter_list? ')' block ;
      class_property_name ::= property_name | private_identifier ;
      private_identifier ::= '#' IDENTIFIER ;

      // Literals
      literal ::=
          NULL_LITERAL
        | BOOLEAN_LITERAL
        | NUMERIC_LITERAL
        | BIGINT_LITERAL
        | STRING_LITERAL
        | REGULAR_EXPRESSION_LITERAL
        | template_literal
        ;

      NULL_LITERAL ::= 'null' ;
      BOOLEAN_LITERAL ::= 'true' | 'false' ;

      NUMERIC_LITERAL ::= HEX_LITERAL | BINARY_LITERAL | OCTAL_LITERAL | DECIMAL_LITERAL ;
      DECIMAL_LITERAL ::= DECIMAL_INTEGER_LITERAL '.' DECIMAL_DIGITS? EXPONENT_PART? | '.' DECIMAL_DIGITS EXPONENT_PART? | DECIMAL_INTEGER_LITERAL EXPONENT_PART? ;
      DECIMAL_INTEGER_LITERAL ::= '0' | NON_ZERO_DIGIT DECIMAL_DIGITS? ;
      DECIMAL_DIGITS ::= DECIMAL_DIGIT+ ;
      DECIMAL_DIGIT ::= [0-9] ;
      NON_ZERO_DIGIT ::= [1-9] ;
      EXPONENT_PART ::= ('e'|'E') ('+'|'-')? DECIMAL_DIGITS ;
      HEX_LITERAL ::= '0' ('x'|'X') HEX_DIGIT+ ;
      BINARY_LITERAL ::= '0' ('b'|'B') ('0'|'1')+ ;
      OCTAL_LITERAL ::= '0' ('o'|'O') ('0'|'1'|'2'|'3'|'4'|'5'|'6'|'7')+ ;
      BIGINT_LITERAL ::= (DECIMAL_INTEGER_LITERAL | HEX_LITERAL | BINARY_LITERAL | OCTAL_LITERAL) 'n' ;

      STRING_LITERAL ::= '"' ( [^"\\] | ESCAPE_SEQUENCE )* '"' | '\'' ( [^'\\] | ESCAPE_SEQUENCE )* '\'' ;
      ESCAPE_SEQUENCE ::= '\\' ( [\'"\\bfnrtv] | 'x' HEX_DIGIT HEX_DIGIT | 'u' HEX_DIGIT HEX_DIGIT HEX_DIGIT HEX_DIGIT ) ;

      REGULAR_EXPRESSION_LITERAL ::= '/' REGEX_BODY '/' REGEX_FLAGS? ;
      REGEX_BODY ::= ( [^/\n\r\\] | '\\' . )+ ; // Any char except /, newline, or backslash, or any escaped char.
      REGEX_FLAGS ::= IDENTIFIER_PART+ ;

      template_literal ::= '`' ( TEMPLATE_CHAR | template_substitution )* '`' ;
      TEMPLATE_CHAR ::= [^`\\] | '\\' . ; // Any char except backtick or backslash, or any escaped char.
      template_substitution ::= '${' expression '}' ;

      // Identifiers
      IDENTIFIER ::= IDENTIFIER_START IDENTIFIER_PART* ;
      IDENTIFIER_START ::= [a-zA-Z] | '$' | '_' ;
      IDENTIFIER_PART ::= IDENTIFIER_START | DECIMAL_DIGIT ;
      HEX_DIGIT ::= [0-9a-fA-F] ;
    src/example_code2.js: |
      aaaaa;
      //=========
      // <></>

      // =================================================================
      //  JavaScript Parser Test Suite - "The Kitchen Sink"
      //  This file contains a wide variety of JS syntax constructs
      //  to test the robustness and completeness of a parser.
      // =================================================================


      // --- 1. Basic Declarations and Primitives ---

      // Variable declarations
      var a = 1;
      let b = "hello";
      const c = true;

      // Reassignment
      a = 2;
      b = 'world';
      // const c = false; // This should be a syntax error if your parser handles const correctly

      // Primitive types
      let myNumber = 123.45;
      let myBigInt = 9007199254740991n;
      let myStringSingle = 'This is a string.';
      let myStringDouble = "This is also a string.";
      let myBoolean = false;
      let myNull = null;
      let myUndefined = undefined;
      let mySymbol = Symbol('description');

      // Scientific and other numeric notations
      let scientific = 5e3;
      let scientificNegative = 1.23e-2;
      let hex = 0xff;
      let octal = 0o77;
      let binary = 0b11;


      // --- 2. Objects and Arrays ---

      // Array literal with various types and a trailing comma
      const myArray = [
          1,
          "text",
          null,
          { key: 'value' },
          [1, 2, 3],
      ];

      // Object literal
      const myObject = {
          stringKey: "value",
          "key-with-hyphen": 123,
          unquotedKey: true,
          123: "numeric key", // Numeric keys
          // Computed property name
          [mySymbol]: "symbol key value",
          // Trailing comma
      };

      // Array destructuring
      let [x, y, ...rest] = myArray;
      let [ , , z] = myArray; // Skipping elements

      // Object destructuring
      let { stringKey, unquotedKey: newName, nonExistent = 'default' } = myObject;


      // --- 3. Operators ---

      let num = 10;

      // Arithmetic
      let add = num + 5;
      let sub = num - 5;
      let mul = num * 5;
      let div = num / 5;
      let mod = num % 3;
      let exp = num ** 2;

      // Unary, Increment/Decrement
      let preIncrement = ++num;
      let postIncrement = num++;
      let preDecrement = --num;
      let postDecrement = num--;
      let unaryPlus = + "10";
      let unaryNegation = -num;

      // Comparison
      let eq = (5 == '5');
      let strictEq = (5 === '5');
      let notEq = (5 != 5);
      let strictNotEq = (5 !== '5');
      let gt = 10 > 5;
      let lt = 10 < 5;
      let gte = 10 >= 10;
      let lte = 10 <= 5;

      // Logical
      let and = true && false;
      let or = true || false;
      let not = !true;

      // Bitwise
      let bitAnd = 5 & 1;
      let bitOr = 5 | 1;
      let bitXor = 5 ^ 1;
      let bitNot = ~5;
      let leftShift = 5 << 1;
      let rightShift = 5 >> 1;
      let zeroFillRightShift = -5 >>> 1;

      // Ternary
      let ternary = (num > 10) ? "greater" : "less or equal";

      // Other operators
      let type = typeof num;
      let isInstance = myArray instanceof Array;
      delete myObject.stringKey;
      let hasKey = "unquotedKey" in myObject;


      // --- 4. Control Flow ---

      // if / else if / else
      if (a === 1) {
          console.log('one');
      } else if (a === 2) {
          console.log('two');
      } else {
          console.log('other');
      }

      // switch statement with fall-through
      switch (a) {
          case 1:
              console.log('fall-through');
          case 2:
              console.log('is two');
              break;
          default:
              console.log('default case');
      }

      // for loop
      for (let i = 0; i < 5; i++) {
          if (i === 3) continue; // test continue
          if (i === 4) break;    // test break
      }

      // while loop
      let j = 0;
      while (j < 3) {
          j++;
      }

      // do-while loop
      let k = 0;
      do {
          k++;
      } while (k < 3);

      // for...in (for object keys)
      for (const key in myObject) {
          console.log(key);
      }

      // for...of (for iterable values)
      for (const value of myArray) {
          console.log(value);
      }

      // try / catch / finally
      try {
          throw new Error("Test error");
      } catch (e) {
          console.error(e.message);
      } finally {
          console.log("This always runs.");
      }

      // Labeled statements
      outer_loop:
      for (let i = 0; i < 3; i++) {
          for (let j = 0; j < 3; j++) {
              if (i === 1 && j === 1) {
                  break outer_loop;
              }
          }
      }


      // --- 5. Functions and `this` ---

      // Function declaration (hoisted)
      function declaredFunction(p1, p2 = 'default') {
          return p1 + p2;
      }

      // Function expression (anonymous)
      const exprFunction = function(a, b) {
          return a * b;
      };

      // Function expression (named)
      const namedExprFunction = function innerName(a, b) {
          return a - b;
      };

      // Arrow functions
      const arrow1 = () => "hello";
      const arrow2 = x => x * x;
      const arrow3 = (x, y) => {
          const sum = x + y;
          return sum;
      };

      // IIFE (Immediately Invoked Function Expression)
      (function() {
          console.log('IIFE executed!');
      })();

      // `this` keyword context
      const thisTest = {
          prop: 42,
          func: function() {
              // `this` refers to thisTest
              return this.prop;
          },
          arrowFunc: () => {
              // `this` is lexically scoped (will be window/global or undefined in strict mode)
              return this.prop;
          }
      };

      // Generator function
      function* idMaker() {
          let index = 0;
          while (true) {
              yield index++;
          }
      }
      const gen = idMaker();
      console.log(gen.next().value);

      // Async/await
      async function fetchData() {
          try {
              const response = await Promise.resolve('data');
              return response;
          } catch (err) {
              console.error(err);
          }
      }


      // --- 6. Classes and Prototypes ---

      // ES6 Class
      class Animal {
          #privateField = "secret"; // Private class field

          constructor(name) {
              this.name = name;
          }

          speak() {
              console.log(`${this.name} makes a noise. Secret is ${this.#privateField}`);
          }

          static info() {
              return "This is an Animal class.";
          }
      }

      class Dog extends Animal {
          constructor(name, breed) {
              super(name); // Call to super()
              this.breed = breed;
          }

          // Overriding method
          speak() {
              super.speak(); // Call to super method
              console.log(`${this.name} barks.`);
          }

          // Getter
          get description() {
              return `${this.name} is a ${this.breed}.`;
          }

          // Setter
          set nickname(nick) {
              this._nickname = nick;
          }
      }

      const d = new Dog('Milo', 'Golden Retriever');
      d.speak();
      console.log(Dog.info());


      // --- 7. Modern ES6+ and Edge Cases ---

      // Template literals
      const personName = "Tester";
      const template = `Hello, ${personName}! The result is ${10 + 5}.`;

      // Tagged template literals
      function myTag(strings, ...values) {
          return strings[0] + values[0] + strings[1];
      }
      const taggedResult = myTag`The value is ${100} dollars.`;

      // Optional Chaining and Nullish Coalescing
      const deepObject = { user: { address: { street: '123 Main St' } } };
      const street = deepObject?.user?.address?.street;
      const zip = deepObject?.user?.address?.zip ?? '00000';

      // Regular Expressions
      const regexLiteral = /ab+c/gi;
      const regexConstructor = new RegExp('^\\d+$', 'u');
      // A tricky case for a lexer: a division operator vs. a regex literal
      let result = 10 / 2; // This is division
      let regex = /foo/g;  // This is a regex

      // Automatic Semicolon Insertion (ASI) - Tricky cases
      let x_asi = 1
      let y_asi = 2
      // The above should parse as two separate statements.

      let z_asi = x_asi
      (y_asi).toString()
      // The above should parse as `x_asi(y_asi).toString()`, a function call,
      // which will cause a runtime error but is syntactically valid.

      // `with` statement (deprecated, but must be parsed)
      with (myObject) {
          console.log(unquotedKey);
      }

      // Comments in weird places
      const weirdComment = [1, /* a comment */ 2, 3];
      function weirdCommentFunc(/* arg1 */ p1, p2 /* arg2 */) {
          return p1; // single line
      }

      // --- 8. ES Modules (Special Case) ---
      // NOTE: The following lines are syntactically valid ONLY in a module context.
      // A robust parser should be able to handle this, often via a "sourceType: 'module'" flag.
      // They are commented out here to allow this file to run as a standard script.

      /*
      import defaultExport from "module-name";
      import * as name from "module-name";
      import { export1, export2 as alias2 } from "module-name";
      import("dynamic-module").then(mod => console.log(mod));

      export const myExportedVar = 123;
      export default function() {
          console.log('default export');
      }
      */

      // --- 9. Deeply Nested Statements ---
      // To test parser recursion depth and handling of complex block structures.
      function deeplyNestedTest(depth) {
          if (depth > 0) {
              for (let i = 0; i < 1; i++) {
                  while (i < 1) {
                      try {
                          switch (i) {
                              case 0:
                                  if (true) {
                                      let a = 1;
                                      {
                                          {
                                              {
                                                  deeplyNestedTest(depth - 1);
                                              }
                                          }
                                      }
                                  }
                                  break;
                          }
                      } catch (e) { /* ignore */ }
                  }
              }
          }
      }
