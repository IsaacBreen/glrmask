              return "fstarcsort"

          @classmethod
          def rustfst_subcommand(cls):
              return "arcsort"

          def get_openfst_bench_cli(self):
              if self.sort_olabel:
                  return "bench_arcsort", ["1"]
              else:
                  return "bench_arcsort", ["0"]

          def get_rustfst_cli_args(self):
              if self.sort_olabel:
                  return "--sort_type=olabel"
              else:
                  return "--sort_type=ilabel"

          def get_openfst_cli_args(self):
              return self.get_rustfst_cli_args()

          @classmethod
