      #[test]
      fn test_precompute_a_plus_tokenizer() {
          // Tokenizer for `a+`
          let tokenizer_expr = groups![repeat1_fast(eat_u8(b'a'))];
          let tokenizer = tokenizer_expr.build();

          // LLM tokens "a" and "aa"
          let mut llm_token_map = LLMTokenMap::new();
          llm_token_map.insert(b"a".to_vec(), LLMTokenID(0));
