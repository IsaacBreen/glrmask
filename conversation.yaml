      Think about the ways it diverges. Try to correct it.
      Oh, and don't have this `_NodeFactory` type or `_StackNode` type.
      The main type we deal with should be `LeveledGSS`. But this itself should be a union of three variants: containing A and Acc, mapping to other Bs, or being empty. And A should also be a union of variants: one that represents being a root node, one for an internal node that maps to other type As.

      The 'suck up' logic, in terms of types A and B etc, means this:
      - Suppose we have a node of type B of the variant that that maps to other nodes of type B.
      - Suppose all of those children are nodes of type B of the other variant -- the one that that contains a node of type A and an Acc.
      - Suppose the Accs in these children are all equal.
      - Then we can suck up the Acc into the parent.
      - The parent becomes a node (still of type B) of the variant that contains a node of type A and Acc.
      - The Acc it contains is the one on the children.
      - The node of type A it contains is a new node of the type A variant that maps to other type A nodes.
      - Its children are each of the type A nodes inside the type B children of the original parent. They carry the same Ts.
