              let mut ranges = self.inner.ranges().peekable();
              while let Some(range) = ranges.next() {
                  let start = *range.start();
                  let end = *range.end();

                  if start == end {
                      write!(f, "{}", start)?;
                  } else {
                      write!(f, "{}..{}", start, end)?;
                  }

                  if ranges.peek().is_some() {
