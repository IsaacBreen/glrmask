      from __future__ import annotations

      import json
      import heapq
      import collections
      from dataclasses import dataclass, field
      from functools import reduce
      from itertools import chain
      from typing import (
          Callable,
          Dict,
          Generic,
          List,
          Optional,
          Set,
          Tuple,
          Any,
          Generator,
          TypeVar,
          Iterator,
          Iterable,
          Union,
          Protocol,
      )
      from collections import defaultdict

