                  delta:
              """
              if delta is None:
                  delta = KDELTA

              config = ctypes.pointer(ctypes.c_void_p())
              ret_code = lib.fst_determinize_config_new(
                  ctypes.c_float(delta),
                  ctypes.c_size_t(det_type.value),
                  ctypes.byref(config),
              )
              err_msg = "Error creating DeterminizeConfig"
              check_ffi_error(ret_code, err_msg)
              self.ptr = config


