                      for dest_idx, state_bv in dests:
                          if state_bv.is_empty():  # Epsilon on GSS stack
                              yield (int(pop), None, int(dest_idx))
                          else:
                              for start, end in state_bv.to_ranges():
                                  for sid in range(start, end):
                                      yield (int(pop), sid, int(dest_idx))

