              // --- Strategy 2: Try removing chunks of symbols ---
              let mut all_symbol_locations: Vec<(usize, usize)> = Vec::new();
              for (prod_idx, prod) in current_productions.iter().enumerate() {
                  for symbol_idx in 0..prod.rhs.len() {
