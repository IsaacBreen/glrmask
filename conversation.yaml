      For `merge`, it'll be a bit trickier. Define a helper for recursion. We'll merge from bottom to top. At each step, check if the two nodes we're merging are the same using `is`.
      Now we have to consider all possible combinations.

      For lower, do is_leaf=is_leaf | is_leaf and merge children.

      For upper, if both are interfaces, check their acc. If they're equal, just zip through children and merge them, and merge empty.

      If one is interface, convert it into upper branch.

      To convert into upper branch: Empty stays the same. Each child on the upper branch will be an interface, each with the acc in the prior interface, and each with empty equaling that acc as well.
      Then we just need to deal with combining two upper branches.

      To combine two upper branches, combine their empties, then zip through their children and combine those.

      Now, if we just combined two uppers, we've certainly ended up with an upper. But if it's an upper branch, we can try to promote it to an interface.
      Check all the upper branch's children. If any one of them is itself an upper branch, we can't convert it. But if they're all interfaces, we might be able to.
      Gather all the child interface's accs. Gather all their empties that aren't None. If there's only one unique value between them, we can promote this upper to an interface.
      The new interface's empty will be the old upper branch's empty. Its children will be all the old children, but converted into lower nodes.
      Since all the accs returned here will be the same, any of them can be put in as the new interface's acc.

      An interface can be converted into a lower node if its acc equals its empty, or its empty is None. Conversion returns a Lower and an acc. The lower's children will be the same as the interface's. The empty will be true iff the empty is not None. The acc the converter returns is the acc in the interface.

