      // src/precompute4/weighted_automata/determinization.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::{mix3, FP_K1, FP_K2, FP_ZERO};
      use super::common::{StateID, Weight};
      use super::dwa::DWA;
      use super::nwa::{NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use std::collections::hash_map::Entry;
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};
      use std::hash::{Hash, Hasher};
      use std::sync::Arc;

      impl NWA {
          /// Determinize the subgraph reachable from 'start' to a DWA via a radically simplified, high-performance construction:
          ///
          /// Design:
          /// - Precompute epsilon-closures once per NWA state, gated by future-acceptance masks to prune useless paths.
          /// - For each state and each outgoing (default or labeled) edge, precompute a "macro step-vector":
          ///     step_s(lbl): Vec<(target_state, weight)>, where weight already includes post-epsilon closure of the target.
          /// - Intern these step-vectors and group states by identical macro signatures (final macro weight + default macro + labeled macro set).
          ///   Determinization then operates on antichains of signature-IDs rather than raw states, collapsing many states at once.
          /// - At each determinized state, compute a single default edge and a set of exception edges; no "default subtraction" is needed,
          ///   since the DWA runtime semantics prefer exceptions over default on matching labels.
          ///
          /// Correctness sketch:
          /// - Closure correctness follows from semiring (∨, ∧) algebra: union across epsilon paths with ∧ along edges equals weighted ε-closure.
          /// - Macro steps include pre- and post-ε closures, thus matching the standard ε-removal construction.
          /// - Grouping by identical macro signatures preserves right languages: if signatures are equal, their residuals are identical for all words.
          /// - Determinization merges contributions by union; default vs exception precedence matches the NWA semantics because exceptions
          ///   use only explicit sources; default edge contains all sources (both with/without explicit), but at runtime default is ignored where exceptions exist.
          pub fn determinize_to_dwa(&self) -> DWA {
              let mut nwa_clone = self.clone();
              // Aggressive but safe simplification before determinization
              nwa_clone.simplify();
              nwa_clone.internal_determinize_to_dwa_fast()
          }

          fn internal_determinize_to_dwa_fast(&self) -> DWA {
              type StepVec = Arc<Vec<(NWAStateID, Weight)>>;

              #[derive(Clone)]
              struct StepVecKey {
                  entries: StepVec,
                  fp: u64,
              }
              impl StepVecKey {
                  fn new(entries: StepVec) -> Self {
                      // robust fingerprint mix across (state, weight.fp)
                      let mut fp = FP_ZERO;
                      for (sid, w) in entries.iter() {
                          fp = mix3(fp, (*sid as u64).wrapping_mul(FP_K1), w.fp.wrapping_mul(FP_K2));
                      }
                      StepVecKey { entries, fp }
                  }
              }
              impl PartialEq for StepVecKey {
                  fn eq(&self, other: &Self) -> bool {
                      if self.fp != other.fp {
                          return false;
                      }
                      Arc::ptr_eq(&self.entries, &other.entries) || *self.entries == *other.entries
                  }
              }
              impl Eq for StepVecKey {}
              impl Hash for StepVecKey {
                  fn hash<H: Hasher>(&self, state: &mut H) {
                      state.write_u64(self.fp);
                  }
              }

              // Interner for any Vec<(sid, weight)>
              fn intern_step_vec(
                  v: Vec<(NWAStateID, Weight)>,
                  intern: &mut HashMap<StepVecKey, StepVec>
              ) -> StepVec {
                  let arc = Arc::new(v);
                  let key = StepVecKey::new(arc.clone());
                  match intern.entry(key) {
                      Entry::Occupied(o) => o.get().clone(),
                      Entry::Vacant(vac) => {
                          vac.insert(arc.clone());
                          arc
                      }
                  }
              }

              // Compute future masks to gate epsilon closures
              let fut: Vec<Weight> = self.compute_future_weights();
              let n = self.states.len();
              if n == 0 {
                  return DWA::new();
              }

              // Weighted epsilon-closure from a set of sources (used for per-state closure)
              fn compute_eps_mask_from_sources(
                  sources: &[NWAStateID],
                  states: &NWAStates,
                  fut: &[Weight],
              ) -> Vec<(NWAStateID, Weight)> {
                  let mut res: HashMap<NWAStateID, Weight> = HashMap::new();
                  let mut q: VecDeque<NWAStateID> = VecDeque::new();
                  for &s in sources {
                      let f = fut[s].clone();
                      if !f.is_empty() {
                          res.insert(s, f);
                          q.push_back(s);
                      }
                  }
                  while let Some(u) = q.pop_front() {
                      let u_w = res.get(&u).cloned().unwrap_or_else(Weight::zeros);
                      if u_w.is_empty() { continue; }
                      for &(v, ref eps_w) in &states[u].epsilons {
                          let mut prop = &u_w & eps_w;
                          if prop.is_empty() { continue; }
                          prop &= &fut[v];
                          if prop.is_empty() { continue; }
                          match res.entry(v) {
                              Entry::Occupied(mut e) => {
                                  let old = e.get_mut();
                                  let new_union = &*old | &prop;
                                  if new_union != *old {
                                      *old = new_union;
                                      q.push_back(v);
                                  }
                              }
                              Entry::Vacant(e) => {
                                  e.insert(prop);
                                  q.push_back(v);
                              }
                          }
                      }
                  }
                  let mut vec_pairs: Vec<(NWAStateID, Weight)> = res.into_iter().collect();
                  vec_pairs.sort_by_key(|(k, _)| *k);
                  vec_pairs
              }

              // Precompute per-state epsilon-closure masks (gated by future weights)
              let mut step_intern: HashMap<StepVecKey, StepVec> = HashMap::new();
              let mut eps_mask: Vec<StepVec> = Vec::with_capacity(n);
              for s in 0..n {
                  let pairs = compute_eps_mask_from_sources(std::slice::from_ref(&s), &self.states, &fut);
                  let sv = intern_step_vec(pairs, &mut step_intern);
                  eps_mask.push(sv);
              }

              // Utility: apply an additional weight w across a step-vector (intersect each entry)
              // Return the original arc if w is ALL, otherwise return an interned new arc without empties.
              fn apply_weight_to_stepvec(
                  sv: &StepVec,
                  w: &Weight,
                  intern: &mut HashMap<StepVecKey, StepVec>,
              ) -> StepVec {
                  if w.is_all_fast() {
                      return sv.clone();
                  }
                  let mut out: Vec<(NWAStateID, Weight)> = Vec::with_capacity(sv.len());
                  for (t, wt) in sv.iter() {
                      let x = wt & w;
                      if !x.is_empty() {
                          out.push((*t, x));
                      }
                  }
                  intern_step_vec(out, intern)
              }

              // Precompute final macro weight F_macro[s] = ⋃_{t in eps-closure(s)} (closure_weight(s->*t) ∧ final[t])
              let mut f_macro: Vec<Option<Weight>> = vec![None; n];
              for s in 0..n {
                  let mut acc: Option<Weight> = None;
                  for (t, w) in eps_mask[s].iter() {
                      if let Some(fw) = &self.states[*t].final_weight {
                          let c = w & fw;
                          if !c.is_empty() {
                              if let Some(a) = &mut acc {
                                  *a |= &c;
                              } else {
                                  acc = Some(c);
                              }
                          }
                      }
                  }
                  f_macro[s] = acc;
              }

              // Precompute macro step-vectors for default and labeled edges
              let mut default_macro: Vec<Option<StepVec>> = vec![None; n];
              let mut labeled_macro: Vec<BTreeMap<i16, StepVec>> = vec![BTreeMap::new(); n];

              for s in 0..n {
                  // Default
                  if let Some((to, wdef)) = &self.states[s].default {
                      if *to < n {
                          let base = &eps_mask[*to];
                          let def_sv = apply_weight_to_stepvec(base, wdef, &mut step_intern);
                          default_macro[s] = Some(def_sv);
                      }
                  }
                  // Labeled
                  for (lbl, (to, wlbl)) in &self.states[s].transitions {
                      if *to < n {
                          let base = &eps_mask[*to];
                          let ex_sv = apply_weight_to_stepvec(base, wlbl, &mut step_intern);
                          labeled_macro[s].insert(*lbl, ex_sv);
                      }
                  }
              }

              // Build macro signatures and intern them.
              // A signature is defined by: final macro weight, default macro stepvec pointer, and all labeled macro pairs (label -> stepvec pointer)
              #[derive(Clone)]
              struct MacroSig {
                  final_w: Option<Weight>,
                  def: Option<StepVec>,
                  labeled: BTreeMap<i16, StepVec>,
              }
              #[derive(Clone)]
              struct MacroSigKey {
                  final_w: Option<Weight>,
                  def_ptr: Option<usize>,
                  labeled: Vec<(i16, usize)>,
                  // Lightweight hash precomputation
                  fp: u64,
              }
              impl MacroSigKey {
                  fn from_sig_components(final_w: &Option<Weight>, def: &Option<StepVec>, labeled: &BTreeMap<i16, StepVec>) -> Self {
                      let mut lvec: Vec<(i16, usize)> = Vec::with_capacity(labeled.len());
                      for (k, v) in labeled {
                          lvec.push((*k, Arc::as_ptr(v) as usize));
                      }
                      let def_ptr = def.as_ref().map(|a| Arc::as_ptr(a) as usize);
                      let mut fp = FP_ZERO;
                      fp = mix3(fp, final_w.as_ref().map(|w| w.fp).unwrap_or(FP_ZERO), 0xA55A_A55A_A55A_A55A);
                      fp = mix3(fp, def_ptr.unwrap_or(0) as u64, 0x77);
                      for (lbl, ptr) in &lvec {
                          fp = mix3(fp, (*lbl as u64).wrapping_mul(FP_K1), (*ptr as u64).wrapping_mul(FP_K2));
                      }
                      MacroSigKey { final_w: final_w.clone(), def_ptr, labeled: lvec, fp }
                  }
              }
              impl PartialEq for MacroSigKey {
                  fn eq(&self, other: &Self) -> bool {
                      self.fp == other.fp
                          && self.final_w == other.final_w
                          && self.def_ptr == other.def_ptr
                          && self.labeled == other.labeled
                  }
              }
              impl Eq for MacroSigKey {}
              impl Hash for MacroSigKey {
                  fn hash<H: Hasher>(&self, h: &mut H) {
                      h.write_u64(self.fp);
                  }
              }

              let mut sig_intern: HashMap<MacroSigKey, usize> = HashMap::new();
              let mut sig_arena: Vec<Arc<MacroSig>> = Vec::new();
              let mut state_to_sig_id: Vec<usize> = vec![0; n];

              for s in 0..n {
                  let final_w = f_macro[s].clone();
                  let def = default_macro[s].clone();
                  let labeled = labeled_macro[s].clone();
                  let key = MacroSigKey::from_sig_components(&final_w, &def, &labeled);
                  let id = match sig_intern.entry(key) {
                      Entry::Occupied(o) => *o.get(),
                      Entry::Vacant(v) => {
                          let idx = sig_arena.len();
                          let sig = MacroSig { final_w, def, labeled };
                          sig_arena.push(Arc::new(sig));
                          v.insert(idx);
                          idx
                      }
                  };
                  state_to_sig_id[s] = id;
              }

              // Precompile each StepVec into "by-signature" grouping to avoid per-target state lookups during determinization.
              type CompiledBySig = Arc<Vec<(usize, Weight)>>; // (sig_id, weight)
              let mut unique_stepvecs: BTreeSet<usize> = BTreeSet::new();
              for s in 0..n {
                  if let Some(ref d) = default_macro[s] {
                      unique_stepvecs.insert(Arc::as_ptr(d) as usize);
                  }
                  for (_, sv) in &labeled_macro[s] {
                      unique_stepvecs.insert(Arc::as_ptr(sv) as usize);
                  }
              }
              let mut stepvec_ptr_to_compiled: HashMap<usize, CompiledBySig> = HashMap::with_capacity(unique_stepvecs.len() * 2 + 1);

              fn compile_stepvec_by_sig(
                  sv: &StepVec,
                  state_to_sig_id: &[usize],
              ) -> CompiledBySig {
                  let mut acc: HashMap<usize, Weight> = HashMap::new();
                  for (t, w) in sv.iter() {
                      let sig = state_to_sig_id[*t];
                      if let Some(old) = acc.get_mut(&sig) {
                          *old |= w;
                      } else {
                          acc.insert(sig, w.clone());
                      }
                  }
                  let mut v: Vec<(usize, Weight)> = acc.into_iter().collect();
                  v.sort_by_key(|(k, _)| *k);
                  Arc::new(v)
              }

              for s in 0..n {
                  if let Some(ref d) = default_macro[s] {
                      let key = Arc::as_ptr(d) as usize;
                      if !stepvec_ptr_to_compiled.contains_key(&key) {
                          stepvec_ptr_to_compiled.insert(key, compile_stepvec_by_sig(d, &state_to_sig_id));
                      }
                  }
                  for (_, sv) in &labeled_macro[s] {
                      let key = Arc::as_ptr(sv) as usize;
                      if !stepvec_ptr_to_compiled.contains_key(&key) {
                          stepvec_ptr_to_compiled.insert(key, compile_stepvec_by_sig(sv, &state_to_sig_id));
                      }
                  }
              }

              // Determinization over signatures:
              // Subset representation: Vec<(sig_id, gate_weight)>, sorted and Interned.
              #[derive(Clone)]
              struct SigSubsetKey {
                  entries: Arc<Vec<(usize, Weight)>>,
                  fp: u64,
              }
              impl SigSubsetKey {
                  fn new(entries: Arc<Vec<(usize, Weight)>>) -> Self {
                      let mut fp = FP_ZERO;
                      for (sid, w) in entries.iter() {
                          fp = mix3(fp, (*sid as u64).wrapping_mul(FP_K1), w.fp.wrapping_mul(FP_K2));
                      }
                      SigSubsetKey { entries, fp }
                  }
              }
              impl PartialEq for SigSubsetKey {
                  fn eq(&self, other: &Self) -> bool {
                      if self.fp != other.fp {
                          return false;
                      }
                      Arc::ptr_eq(&self.entries, &other.entries) || *self.entries == *other.entries
                  }
              }
              impl Eq for SigSubsetKey {}
              impl Hash for SigSubsetKey {
                  fn hash<H: Hasher>(&self, state: &mut H) {
                      state.write_u64(self.fp);
                  }
              }
              fn intern_sig_subset(
                  mut items: Vec<(usize, Weight)>,
                  intern: &mut HashMap<SigSubsetKey, Arc<Vec<(usize, Weight)>>>,
              ) -> Arc<Vec<(usize, Weight)>> {
                  // Normalize: merge duplicates, drop empties, sort by sig_id
                  items.sort_by_key(|(sid, _)| *sid);
                  let mut norm: Vec<(usize, Weight)> = Vec::with_capacity(items.len());
                  for (sid, w) in items.into_iter() {
                      if w.is_empty() { continue; }
                      if let Some((last_sid, ref mut last_w)) = norm.last_mut() {
                          if *last_sid == sid {
                              *last_w |= &w;
                              continue;
                          }
                      }
                      norm.push((sid, w));
                  }
                  let arc = Arc::new(norm);
                  let key = SigSubsetKey::new(arc.clone());
                  match intern.entry(key) {
                      Entry::Occupied(o) => o.get().clone(),
                      Entry::Vacant(v) => { v.insert(arc.clone()); arc }
                  }
              }

              // Build initial subset as the start state's epsilon-closure grouped by macro signatures.
              let mut init_map: HashMap<usize, Weight> = HashMap::new();
              for (t, w) in eps_mask[self.body.start_state].iter() {
                  let sig = state_to_sig_id[*t];
                  if let Some(old) = init_map.get_mut(&sig) {
                      *old |= w;
                  } else {
                      init_map.insert(sig, w.clone());
                  }
              }
              let mut init_items: Vec<(usize, Weight)> = init_map.into_iter().collect();
              init_items.sort_by_key(|(k, _)| *k);

              let mut subset_intern: HashMap<SigSubsetKey, Arc<Vec<(usize, Weight)>>> = HashMap::new();
              let init_subset = intern_sig_subset(init_items, &mut subset_intern);

              // DWA construction
              let mut dwa = DWA::new();
              dwa.states.0.clear();
              let start_d_id = dwa.states.add_state();
              dwa.body.start_state = start_d_id;

              // Map subset -> DWA state id
              let mut subset_to_d_id: HashMap<SigSubsetKey, StateID> = HashMap::new();
              subset_to_d_id.insert(SigSubsetKey::new(init_subset.clone()), start_d_id);

              let mut worklist: VecDeque<SigSubsetKey> = VecDeque::new();
              worklist.push_back(SigSubsetKey::new(init_subset.clone()));

              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(1);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinizing DWA (fast): {elapsed_precise}] \
                                     [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta})")
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else { None };

              let mut processed = 0usize;

              while let Some(subset_key) = worklist.pop_front() {
                  processed += 1;
                  if let Some(p) = &pb {
                      p.set_position(processed as u64);
                      p.set_length(subset_to_d_id.len() as u64);
                  }

                  let d_id = *subset_to_d_id.get(&subset_key).unwrap();
                  let subset: &[(usize, Weight)] = &subset_key.entries;

                  // Compute final weight of D-state: ⋃ gate ∧ final_macro[sig]
                  let mut d_final: Option<Weight> = None;
                  for (sig_id, gate) in subset.iter() {
                      let fin = &sig_arena[*sig_id].final_w;
                      if let Some(fw) = fin {
                          let c = gate & fw;
                          if !c.is_empty() {
                              if let Some(a) = &mut d_final {
                                  *a |= &c;
                              } else {
                                  d_final = Some(c);
                              }
                          }
                      }
                  }
                  dwa.states[d_id].final_weight = d_final;

                  // Default edge: accumulate contributions across all signatures that have a default macro.
                  let mut def_acc: HashMap<usize, Weight> = HashMap::new();
                  for (sig_id, gate) in subset.iter() {
                      if let Some(ref def_sv) = sig_arena[*sig_id].def {
                          let comp = stepvec_ptr_to_compiled[&(Arc::as_ptr(def_sv) as usize)].clone();
                          if gate.is_all_fast() {
                              for (t_sig, w) in comp.iter() {
                                  if let Some(old) = def_acc.get_mut(t_sig) { *old |= w; } else { def_acc.insert(*t_sig, w.clone()); }
                              }
                          } else {
                              for (t_sig, w) in comp.iter() {
                                  let x = w & gate;
                                  if x.is_empty() { continue; }
                                  if let Some(old) = def_acc.get_mut(t_sig) { *old |= &x; } else { def_acc.insert(*t_sig, x); }
                              }
                          }
                      }
                  }
                  // Install default edge if any
                  let mut def_target_id_opt: Option<StateID> = None;
                  if !def_acc.is_empty() {
                      let mut def_items: Vec<(usize, Weight)> = def_acc.into_iter().collect();
                      def_items.sort_by_key(|(k, _)| *k);
                      let def_subset_arc = intern_sig_subset(def_items, &mut subset_intern);
                      let def_key = SigSubsetKey::new(def_subset_arc.clone());
                      let def_target_id = if let Some(id) = subset_to_d_id.get(&def_key) {
                          *id
                      } else {
                          let nid = dwa.states.add_state();
                          subset_to_d_id.insert(def_key.clone(), nid);
                          worklist.push_back(def_key);
                          nid
                      };
                      // Edge weight: union of contributions across target signatures (values)
                      let mut edge_w: Option<Weight> = None;
                      for (_, w) in def_subset_arc.iter() {
                          if let Some(a) = &mut edge_w {
                              *a |= w;
                          } else {
                              edge_w = Some(w.clone());
                          }
                      }
                      if let Some(w) = edge_w {
                          dwa.set_default_transition(d_id, def_target_id, w).expect("set_default_transition");
                          def_target_id_opt = Some(def_target_id);
                      }
                  }

                  // Exception labels: union across labels present in any signature within the subset
                  let mut labels: BTreeSet<i16> = BTreeSet::new();
                  for (sig_id, _) in subset.iter() {
                      for k in sig_arena[*sig_id].labeled.keys() {
                          labels.insert(*k);
                      }
                  }
                  for lbl in labels {
                      // Accumulate across signatures that have this explicit label
                      let mut acc: HashMap<usize, Weight> = HashMap::new();
                      for (sig_id, gate) in subset.iter() {
                          if let Some(ref sv) = sig_arena[*sig_id].labeled.get(&lbl) {
                              let comp = stepvec_ptr_to_compiled[&(Arc::as_ptr(sv) as usize)].clone();
                              if gate.is_all_fast() {
                                  for (t_sig, w) in comp.iter() {
                                      if let Some(old) = acc.get_mut(t_sig) { *old |= w; } else { acc.insert(*t_sig, w.clone()); }
                                  }
                              } else {
                                  for (t_sig, w) in comp.iter() {
                                      let x = w & gate;
                                      if x.is_empty() { continue; }
                                      if let Some(old) = acc.get_mut(t_sig) { *old |= &x; } else { acc.insert(*t_sig, x); }
                                  }
                              }
                          }
                      }
                      if acc.is_empty() {
                          continue;
                      }
                      let mut items: Vec<(usize, Weight)> = acc.into_iter().collect();
                      items.sort_by_key(|(k, _)| *k);
                      let target_subset_arc = intern_sig_subset(items, &mut subset_intern);
                      let target_key = SigSubsetKey::new(target_subset_arc.clone());
                      let target_id = if let Some(id) = subset_to_d_id.get(&target_key) {
                          *id
                      } else {
                          let nid = dwa.states.add_state();
                          subset_to_d_id.insert(target_key.clone(), nid);
                          worklist.push_back(target_key.clone());
                          nid
                      };
                      // Edge weight: union across contributions in target subset
                      let mut edge_w: Option<Weight> = None;
                      for (_, w) in target_subset_arc.iter() {
                          if let Some(a) = &mut edge_w {
                              *a |= w;
                          } else {
                              edge_w = Some(w.clone());
                          }
                      }
                      if let Some(w) = edge_w {
                          // If matches default target and weight, skipping is optional; keeping explicit edge is fine.
                          let _ = dwa.add_transition(d_id, lbl, target_id, w);
                      }
                  }
              }

              if let Some(p) = &pb {
                  p.finish_with_message(format!("Determinized to {} states", subset_to_d_id.len()));
              }

              dwa
          }
      }
    src/precompute4/test_resolve_negatives.rs: |-
      use crate::precompute4::resolve_negatives::resolve_negative_codes_in_dwa;
      use crate::precompute4::test_weighted_automata::assert_dwa_equivalent;
      use crate::precompute4::weighted_automata::{Weight, DWA};

      #[test]
      fn test_resolve_negatives_simple_cancellation() {
          // Corresponds to a sequence like `a, neg(a)`.
          // The DWA should resolve to an automaton that accepts `a` and is final.
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();

          let code_a = 7;
          let neg_code_a = i16::MIN + code_a;

          // 0 --a--> 1
          d.add_transition(d.body.start_state, code_a, s1, Weight::from_item(2)).unwrap();
          // 1 --neg(a)--> 2
          d.add_transition(s1, neg_code_a, s2, Weight::all()).unwrap();
          // 2 is final
          d.set_final_weight(s2, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          // Expected: 0 --a--> final_state
          let mut expected = DWA::new();
          let s_final = expected.add_state();
          expected.add_transition(expected.body.start_state, code_a, s_final, Weight::from_item(2)).unwrap();
          expected.set_final_weight(s_final, Weight::from_item(2)).unwrap();

          assert_dwa_equivalent(d, expected);
      }

      #[test]
      fn test_resolve_negatives_long_cancellation_chain() {
          // The path is: 0 --7--> 5 --neg(7)--> 10 --neg(3)--> 13 --3--> 15 --7--> 22 --neg(7)--> 27 --neg(1)--> 29 --neg(2)--> 30(final)
          let mut d = DWA::new();
          let s5 = d.add_state();
          let s10 = d.add_state();
          let s13 = d.add_state();
          let s15 = d.add_state();
          let s22 = d.add_state();
          let s27 = d.add_state();
          let s29 = d.add_state();
          let s30 = d.add_state();

          let code7 = 7;
          let neg_code7 = i16::MIN + code7;
          let code3 = 3;
          let neg_code3 = i16::MIN + code3;
          let code1 = 1;
          let neg_code1 = i16::MIN + code1;
          let code2 = 2;
          let neg_code2 = i16::MIN + code2;

          d.add_transition(d.body.start_state, code7, s5, Weight::all()).unwrap();
          d.add_transition(s5, neg_code7, s10, Weight::all()).unwrap();
          d.add_transition(s10, neg_code3, s13, Weight::all()).unwrap();
          d.add_transition(s13, code3, s15, Weight::all()).unwrap();
          d.add_transition(s15, code7, s22, Weight::all()).unwrap();
          d.add_transition(s22, neg_code7, s27, Weight::all()).unwrap();
          d.add_transition(s27, neg_code1, s29, Weight::all()).unwrap();
          d.add_transition(s29, neg_code2, s30, Weight::all()).unwrap();
          d.set_final_weight(s30, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          let s_final = expected.add_state();
          expected.add_transition(expected.body.start_state, code7, s_final, Weight::all()).unwrap();
          expected.set_final_weight(s_final, Weight::all()).unwrap();

          assert_dwa_equivalent(d, expected);
      }

      #[test]
      fn test_resolve_negatives_from_debug_log() {
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();
          let s3 = d.add_state();
          let s4 = d.add_state();
          let s5 = d.add_state();
          let s6 = d.add_state();

          let code0 = 0;
          let neg_code0 = i16::MIN + code0;
          let neg_code1 = i16::MIN + 1;
          let code2 = 2;
          let neg_code2 = i16::MIN + code2;

          d.add_transition(d.body.start_state, code0, s1, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, code2, s2, Weight::all()).unwrap();
          d.add_transition(s1, neg_code0, s3, Weight::all()).unwrap();
          d.add_transition(s2, neg_code2, s4, Weight::all()).unwrap();
          d.add_transition(s3, neg_code1, s5, Weight::all()).unwrap();
          d.add_transition(s4, neg_code0, s6, Weight::all()).unwrap();
          d.set_final_weight(s5, Weight::from_item(1)).unwrap();
          d.set_final_weight(s6, Weight::from_item(0)).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          let s_final1 = expected.add_state();
          let s_final2 = expected.add_state();
          expected.add_transition(expected.body.start_state, code0, s_final1, Weight::all()).unwrap();
          expected.set_final_weight(s_final1, Weight::from_item(1)).unwrap();
          expected.add_transition(expected.body.start_state, code2, s_final2, Weight::all()).unwrap();
          expected.set_final_weight(s_final2, Weight::from_item(0)).unwrap();

          assert_dwa_equivalent(d, expected);
      }

      #[test]
      fn test_resolve_negatives_from_intermediate_debug_log() {
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();
          let s3 = d.add_state();
          let s4 = d.add_state();
          let s5 = d.add_state();
          let s6 = d.add_state();
          let s7 = d.add_state();

          let neg_code1 = i16::MIN + 1;
          let neg_code7 = i16::MIN + 7;

          // State 0 (start)
          d.add_transition(d.body.start_state, 1, s1, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, 3, s2, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, 4, s3, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, 7, s4, Weight::all()).unwrap();

          // State 1
          d.add_transition(s1, neg_code1, s5, Weight::all()).unwrap();
          d.add_transition(s1, 7, s4, Weight::all()).unwrap();

          // State 2
          d.add_transition(s2, 7, s6, Weight::all()).unwrap();

          // State 3
          d.set_default_transition(s3, s2, Weight::all()).unwrap();

          // State 4
          d.set_final_weight(s4, Weight::from_item(2)).unwrap();

          // State 5
          d.set_default_transition(s5, s7, Weight::all()).unwrap();

          // State 6
          d.set_final_weight(s6, Weight::from_item(2)).unwrap();
          d.add_transition(s6, neg_code7, s1, Weight::all()).unwrap();

          // State 7
          d.add_transition(s7, 7, s4, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          let exp_s1 = expected.add_state();
          let exp_s2 = expected.add_state();
          let exp_s3 = expected.add_state();
          let exp_s_after_4 = expected.add_state();
          let exp_s_final = expected.add_state();

          expected.set_final_weight(exp_s_final, Weight::from_item(2)).unwrap();

          // Paths leading to final state
          expected.add_transition(expected.body.start_state, 7, exp_s_final, Weight::all()).unwrap();

          expected.add_transition(expected.body.start_state, 1, exp_s1, Weight::all()).unwrap();
          expected.add_transition(exp_s1, 7, exp_s_final, Weight::all()).unwrap();

          expected.add_transition(expected.body.start_state, 3, exp_s2, Weight::all()).unwrap();
          expected.add_transition(exp_s2, 7, exp_s_final, Weight::all()).unwrap();

          expected.add_transition(expected.body.start_state, 4, exp_s3, Weight::all()).unwrap();
          expected.set_default_transition(exp_s3, exp_s_after_4, Weight::all()).unwrap();
          expected.add_transition(exp_s_after_4, 7, exp_s_final, Weight::all()).unwrap();

          assert_dwa_equivalent(d, expected);
      }

      #[test]
      fn test_resolve_negatives_minimal_loop_with_default() {
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();

          let neg_code1 = i16::MIN + 1;

          // 0 --neg(1)--> 1
          d.add_transition(d.body.start_state, neg_code1, s1, Weight::all()).unwrap();
          // 1 --*--> 2 (default)
          d.set_default_transition(s1, s2, Weight::all()).unwrap();
          // 2 is final
          d.set_final_weight(s2, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          expected.set_final_weight(expected.body.start_state, Weight::all()).unwrap();

          assert_dwa_equivalent(d, expected);
      }
    src/precompute4/resolve_negatives.rs: |
      use crate::precompute4::weighted_automata::{DWA, NWA, NWAStateID, NWAStates, Weight};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use std::collections::{HashMap, VecDeque};

      /// Resolve negative codes in a DWA by a single, high-performance, semantics-preserving NWA rewrite.
      /// This function implements the delicately crafted semantics of negative codes, which represent a stack-like
      /// cancellation mechanism. The transformation ensures the final DWA is free of negative codes and
      /// correctly represents the language defined by these complex interactions.
      ///
      /// The process is as follows:
      /// 1.  **Convert to NWA**: The DWA is first converted to an NWA to allow for flexible graph manipulations,
      ///     such as adding epsilon transitions.
      /// 2.  **Resolve Cancellations**: The algorithm identifies all `A --neg(c)--> B --c--> C` sequences.
      ///     Each such "cancellation" is resolved by adding a new epsilon transition `A --eps--> C`, which acts as a shortcut.
      ///     The weights are combined along the path.
      /// 3.  **Propagate Finality**: Finality is propagated backward across all `neg(c)` and epsilon transitions (both
      ///     original and newly created ones). If a state `A` can reach a final state `F` through a path of such
      ///     transitions, `A` inherits finality from `F`. This is computed using a standard least fixpoint algorithm.
      /// 4.  **Apply Changes & Cleanup**: The newly computed final weights are applied to the NWA states. Then, all
      ///     negative-code transitions are removed from the graph, as their semantic effects have been fully resolved.
      /// 5.  **Determinize**: The resulting NWA, now free of negative codes, is determinized and simplified back into a
      ///     DWA, which is the final result.
      pub fn resolve_negative_codes_in_dwa(dwa: &mut DWA) {
          let pb = if PROGRESS_BAR_ENABLED {
              let p = ProgressBar::new(5);
              p.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [Resolving negative codes: {elapsed_precise}] [{wide_bar:.cyan/blue}] step {pos}/{len} ({msg})")
                      .expect("progress-bar"),
              );
              Some(p)
          } else {
              None
          };

          if let Some(p) = &pb { p.set_message("DWA -> NWA"); p.set_position(1); }
          let mut nwa = NWA::from_dwa(dwa);

          if let Some(p) = &pb { p.set_message("Compute cancellations"); p.set_position(2); }
          let epsilons_to_add = compute_cancellations(&nwa.states);

          if let Some(p) = &pb { p.set_message("Propagate finality"); p.set_position(3); }
          let final_fix = compute_final_fixpoint(&nwa.states, &epsilons_to_add);

          if let Some(p) = &pb { p.set_message("Apply changes & remove negatives"); p.set_position(4); }
          // Add new epsilons
          for (from, to, w) in epsilons_to_add {
              nwa.states.add_epsilon(from, to, w);
          }
          // Add propagated final weights
          for sid in 0..nwa.states.len() {
              if !final_fix[sid].is_empty() {
                  let st = &mut nwa.states.0[sid];
                  if let Some(fw) = &mut st.final_weight {
                      *fw |= &final_fix[sid];
                  } else {
                      st.final_weight = Some(final_fix[sid].clone());
                  }
              }
          }
          // Remove all negative transitions
          for st in &mut nwa.states.0 {
              st.transitions.retain(|k, _| *k >= 0);
          }

          if let Some(p) = &pb { p.set_message("Determinize & simplify"); p.set_position(5); }
          let mut result = nwa.determinize_to_dwa();
          result.simplify();
          *dwa = result;

          if let Some(p) = &pb { p.finish_with_message("Done"); }
      }

      /// Helper to compute the weighted epsilon closure of a state.
      fn compute_eps_closure(
          states: &NWAStates,
          start_node: NWAStateID,
          extra_epsilons: &HashMap<NWAStateID, Vec<(NWAStateID, Weight)>>,
      ) -> HashMap<NWAStateID, Weight> {
          let mut closure: HashMap<NWAStateID, Weight> = HashMap::new();
          let mut q = VecDeque::new();

          closure.insert(start_node, Weight::all());
          q.push_back(start_node);

          while let Some(u) = q.pop_front() {
              let u_w = closure.get(&u).unwrap().clone();

              // Original epsilons
              for (v, w) in &states[u].epsilons {
                  let new_w = &u_w & w;
                  if new_w.is_empty() { continue; }
                  let entry = closure.entry(*v).or_insert_with(Weight::zeros);
                  let old_w = entry.clone();
                  *entry |= &new_w;
                  if *entry != old_w {
                      q.push_back(*v);
                  }
              }
              // Extra epsilons found during cancellation fixpoint
              if let Some(edges) = extra_epsilons.get(&u) {
                  for (v, w) in edges {
                      let new_w = &u_w & w;
                      if new_w.is_empty() { continue; }
                      let entry = closure.entry(*v).or_insert_with(Weight::zeros);
                      let old_w = entry.clone();
                      *entry |= &new_w;
                      if *entry != old_w {
                          q.push_back(*v);
                      }
                  }
              }
          }
          closure
      }

      /// Finds all `A --neg(c)--> B --c--> C` patterns, including those chained via epsilon transitions,
      /// by iteratively finding new cancellation shortcuts until a fixpoint is reached.
      fn compute_cancellations(states: &NWAStates) -> Vec<(NWAStateID, NWAStateID, Weight)> {
          let mut all_new_epsilons: HashMap<NWAStateID, Vec<(NWAStateID, Weight)>> = HashMap::new();
          loop {
              let mut changed_in_pass = false;
              let mut pass_epsilons = Vec::new();

              for a in 0..states.len() {
                  let state_a = &states[a];
                  for (neg_label, (b, w_ab)) in &state_a.transitions {
                      if *neg_label >= 0 { continue; }
                      let c = neg_label.wrapping_sub(i16::MIN);

                      if *b >= states.len() { continue; }

                      let eps_closure_of_b = compute_eps_closure(states, *b, &all_new_epsilons);

                      for (b_reachable, w_b_br) in eps_closure_of_b {
                          if b_reachable >= states.len() { continue; }
                          if let Some((c_target, w_br_c)) = states[b_reachable].get_transition(c) {
                              let new_w = w_ab & &w_b_br & w_br_c;
                              if !new_w.is_empty() {
                                  pass_epsilons.push((a, *c_target, new_w));
                              }
                          }
                      }
                  }
              }

              for (from, to, w) in pass_epsilons {
                  let edges = all_new_epsilons.entry(from).or_default();
                  if let Some((_, existing_w)) = edges.iter_mut().find(|(t, _)| *t == to) {
                      let old_w = existing_w.clone();
                      *existing_w |= &w;
                      if *existing_w != old_w {
                          changed_in_pass = true;
                      }
                  } else {
                      edges.push((to, w));
                      changed_in_pass = true;
                  }
              }

              if !changed_in_pass {
                  break;
              }
          }

          all_new_epsilons
              .into_iter()
              .flat_map(|(from, edges)| {
                  edges.into_iter().map(move |(to, w)| (from, to, w))
              })
              .collect()
      }

      /// Compute the least fixpoint of final weights propagated backward along all epsilon edges
      /// (original and new) and all negative-labeled edges.
      fn compute_final_fixpoint(states: &NWAStates, new_epsilons: &[(NWAStateID, NWAStateID, Weight)]) -> Vec<Weight> {
          let n = states.len();
          let mut fut: Vec<Weight> = vec![Weight::zeros(); n];
          let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

          // Build reverse graph for propagation
          for u in 0..n {
              // Original epsilons
              for &(v, ref w) in &states[u].epsilons {
                  if v < n { rev[v].push((u, w.clone())); }
              }
              // Negative edges
              for (label, (v, w)) in &states[u].transitions {
                  if *label < 0 {
                      if *v < n { rev[*v].push((u, w.clone())); }
                  }
              }
          }
          // New epsilons from cancellations
          for (u, v, w) in new_epsilons {
              if *v < n { rev[*v].push((*u, w.clone())); }
          }

          let mut q: VecDeque<NWAStateID> = VecDeque::new();
          for s in 0..n {
              if let Some(ref fw) = states[s].final_weight {
                  if !fw.is_empty() {
                      fut[s] = fw.clone();
                      q.push_back(s);
                  }
              }
          }

          while let Some(v) = q.pop_front() {
              let fv = fut[v].clone();
              if fv.is_empty() { continue; }
              for &(u, ref w_uv) in &rev[v] {
                  let add = &fv & w_uv;
                  if add.is_empty() { continue; }
                  let old = &fut[u];
                  if (&add & old) != add {
                      fut[u] |= &add;
                      q.push_back(u);
                  }
              }
          }
          fut
      }
