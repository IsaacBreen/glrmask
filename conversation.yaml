      from __future__ import annotations

      import argparse
      import importlib
      import json
      import os
      import platform
      import sys
      import time
      from datetime import datetime, timezone
      from pathlib import Path
      from typing import Any, Dict, List, Optional, Tuple, Type

      from .workloads import resolve_workloads, list_workloads, WorkloadResult, WORKLOADS, BenchmarkContext, create_timed_gss_class
      from ..interface import GSS


      def _load_impl(module_name: str, class_name: str) -> Type[GSS]:
          module = importlib.import_module(module_name)
          gss_class = getattr(module, class_name)
          return gss_class


      def _parse_workload_filters(only: Optional[str], exclude: Optional[str]) -> Tuple[Optional[List[str]], Optional[List[str]]]:
          incl = [s for s in only.split(",")] if only else None
          excl = [s for s in exclude.split(",")] if exclude else None
          if incl:
              incl = [s.strip() for s in incl if s.strip()]
          if excl:
              excl = [s.strip() for s in excl if s.strip()]
          return incl, excl


      def _env_metadata() -> Dict[str, Any]:
          return {
              "python_version": sys.version.replace("\n", " "),
              "platform": platform.platform(),
              "implementation": platform.python_implementation(),
              "machine": platform.machine(),
              "processor": platform.processor(),
              "time": datetime.now(timezone.utc).isoformat(),
          }


      def _run_for_impl(
          gss_class: Type[GSS],
          impl_name: str,
          preset: str,
          workloads_to_run: List[str],
          seed: int,
          mem: bool,
          repeat: int,
      ) -> Dict[str, Any]:
          results: List[WorkloadResult] = []

          for wname in workloads_to_run:
              w = WORKLOADS[wname]
              params = dict(w.param_presets[preset])
              # repeat each workload and capture all repeats
              for rep in range(repeat):
                  # Variation of seed per repeat for deterministic variety
                  rep_seed = seed + rep
                  
                  context = BenchmarkContext(mem)
                  timed_gss_class = create_timed_gss_class(gss_class, context.collector)
                  
                  res = w.runner(timed_gss_class, params, preset, rep_seed, context)
                  results.append(res)

          # Summarize totals by workload name (averaging across repeats)
          summary = {}
          tmp_agg: Dict[Tuple[str, str], List[WorkloadResult]] = {}
          for r in results:
              tmp_agg.setdefault((r.name, r.preset), []).append(r)

          for (wname, preset_name), runs in tmp_agg.items():
              # Aggregate totals
              totals_list = [r.totals for r in runs]
              keys = set().union(*(d.keys() for d in totals_list))
              agg: Dict[str, Any] = {"count": len(totals_list)}
              for k in keys:
                  vals = [d[k] for d in totals_list if k in d and isinstance(d[k], (int, float))]
                  if vals:
                      agg[k + "_mean"] = sum(vals) / len(vals)
                      agg[k + "_min"] = min(vals)
                      agg[k + "_max"] = max(vals)
              
              # Aggregate phases by name, assuming order is consistent for a given workload
              phases_by_name: Dict[str, List[Dict[str, Any]]] = {}
              for r in runs:
                  for p in r.phases:
                      phases_by_name.setdefault(p['phase'], []).append(p)

              avg_phases = []
              # Use the phase order from the first run as the canonical order
              phase_order = [p['phase'] for p in runs[0].phases]

              for phase_name in phase_order:
                  phase_runs = phases_by_name.get(phase_name)
                  if not phase_runs:
                      continue

                  avg_phase_data = {'phase': phase_name}
                  
                  # Average 'ms'
                  ms_vals = [p['ms'] for p in phase_runs if 'ms' in p]
                  if ms_vals:
                      avg_phase_data['ms_mean'] = sum(ms_vals) / len(ms_vals)

                  # Aggregate and average method stats
                  method_stats_agg: Dict[str, List[Dict[str, Any]]] = {}
                  for p in phase_runs:
                      if 'method_stats' in p:
                          for method, stats in p['method_stats'].items():
                              method_stats_agg.setdefault(method, []).append(stats)
                  
                  avg_method_stats = {}
                  for method, stats_list in method_stats_agg.items():
                      calls = [s['calls'] for s in stats_list]
                      total_ms = [s['total_ms'] for s in stats_list]
                      avg_method_stats[method] = {
                          'calls_mean': sum(calls) / len(calls),
                          'total_ms_mean': sum(total_ms) / len(total_ms),
                      }
                  if avg_method_stats:
                      avg_phase_data['method_stats_mean'] = avg_method_stats
                  
                  avg_phases.append(avg_phase_data)

              agg['phases_mean'] = avg_phases
              summary[wname] = agg


          # Construct JSON data
          json_results = []
          # Convert WorkloadResult objects to plain dicts
          for r in results:
              json_results.append({
                  "name": r.name,
                  "preset": r.preset,
                  "params": r.params,
                  "phases": r.phases,
                  "totals": r.totals,
                  "error": r.error,
                  "timed_out": r.timed_out,
              })

          return {
              "implementation": impl_name,
              "preset": preset,
              "metadata": _env_metadata(),
              "runner_config": {
                  "seed": seed,
                  "memory_profiled": mem,
                  "repeat": repeat,
                  "workloads": workloads_to_run,
              },
              "results": json_results,
              "summary": summary,
              "version": "1.1.0", # Version bump for new structure
          }


      def main():
          parser = argparse.ArgumentParser(description="Run GSS benchmarks against an implementation.")
          parser.add_argument("implementation_module", help="Python module path for the GSS implementation (e.g., 'gss_tester.implementations.reference_impl').")
          parser.add_argument("implementation_class", help="Class name of the GSS implementation (e.g., 'ReferenceGSS').")
          parser.add_argument("-o", "--output", type=Path, required=True, help="Output JSON file path.")
          parser.add_argument("-p", "--preset", choices=["tiny", "small", "medium", "large"], default="tiny", help="Size preset.")
          parser.add_argument("--only", type=str, default=None, help="Comma-separated list of workload names to include.")
          parser.add_argument("--exclude", type=str, default=None, help="Comma-separated list of workload names to exclude.")
          parser.add_argument("--list-workloads", action="store_true", help="List available workloads and exit.")
