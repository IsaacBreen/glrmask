          fn possible_matches(&self, py: Python) -> PyResult<PyObject> {
              let dict = PyDict::new_bound(py);
              for (tokenizer_state_id, terminal_map) in &self.inner.possible_matches {
                  let terminal_dict = PyDict::new_bound(py);
