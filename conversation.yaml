              width: 2,
          });
          let results = compiled_grammar.tokenizer.execute_from_state(text, TokenizerStateID(0));
          // TODO: uncomment this
          // assert_eq!(results.matches.iter().collect::<BTreeSet<_>>(), expected_matches.iter().collect::<BTreeSet<_>>());

