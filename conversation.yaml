    src/trie3_opt/passes/prune_dead_paths.rs: |
      use std::collections::BTreeMap;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Remove edges that provably cannot lead to an end node by reverse reachability.
      /// Nodes are not deleted in the mini-trie (to keep NodeId stability), but edges to
      /// non-productive nodes are pruned.
      pub struct PruneDeadPathsPass;

      impl OptimizationPass for PruneDeadPathsPass {
          fn name(&self) -> &'static str {
              "PruneDeadPaths"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let universe = SortedSet::from_iter(0..=ctx.max_llm_token_id);
              let productive_tokens = trie.productive_tokens_at_nodes(&universe);

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();
                  for (ek, dm) in node.children() {
                      for (dst, sids) in dm {
                          let productive_from_child = productive_tokens.get(dst).unwrap();
                          let productive_on_edge = ek.tokens.intersect(productive_from_child);

                          if !productive_on_edge.is_empty() {
                              let new_ek = EdgeKey::new(ek.pop, productive_on_edge);
                              new_children
                                  .entry(new_ek)
                                  .or_default()
                                  .entry(*dst)
                                  .and_modify(|e: &mut SortedSet| e.union_inplace(sids))
                                  .or_insert(sids.clone());
                          }
                      }
                  }
                  trie.set_children(node_id, new_children);
              }
          }
      }
    src/trie3_opt/metrics.rs: |+
      use crate::trie3_opt::core::MiniTrie;
      use std::collections::BTreeMap;
      use std::fmt::Write;
      use kdam::{tqdm, BarExt};
      use crate::profiler::PROGRESS_BAR_ENABLED;

      /// A helper for collecting numeric data and computing summary statistics.
      #[derive(Debug, Clone, Default)]
      pub struct NumericStats {
          values: Vec<f64>,
      }

      impl NumericStats {
          pub fn new() -> Self {
              Self::default()
          }

          pub fn from_samples<T: Into<f64> + Copy>(samples: &[T]) -> Self {
              Self {
                  values: samples.iter().map(|&v| v.into()).collect(),
              }
          }

          pub fn push<T: Into<f64>>(&mut self, value: T) {
              self.values.push(value.into());
          }

          pub fn to_pretty_string(&self) -> String {
              if self.values.is_empty() {
                  return "{ count: 0 }".to_string();
              }

              // Fast O(N) pass for sum/mean/stdev/min/max (no full sort).
              let count = self.values.len();
              let mut sum = 0.0;
              let mut min = f64::INFINITY;
              let mut max = f64::NEG_INFINITY;
              for &v in &self.values {
                  sum += v;
                  if v < min { min = v; }
                  if v > max { max = v; }
              }
              let mean = sum / count as f64;
              let mut m2 = 0.0;
              for &v in &self.values {
                  let diff = v - mean;
                  m2 += diff * diff;
              }
              let variance = m2 / count as f64;
              let stdev = variance.sqrt();

              // Approximate quantiles from a bounded sample to avoid O(N log N) sort.
              // Adjust MAX_SAMPLE if needed for speed/accuracy tradeoff.
              const MAX_SAMPLE: usize = 100_000;
              let target = MAX_SAMPLE.min(count);
              let mut sample: Vec<f64> = Vec::with_capacity(target);
              if count <= MAX_SAMPLE {
                  // Small enough: use exact quantiles.
                  sample.extend_from_slice(&self.values);
              } else {
                  // Deterministic uniform sampling with a stride.
                  // This avoids storing or sorting the entire dataset.
                  let stride = (count + target - 1) / target; // ceil(count/target)
                  let offset = stride / 2;
                  let mut i = offset;
                  while i < count {
                      sample.push(self.values[i]);
                      i += stride;
                  }
                  if sample.is_empty() {
                      sample.push(self.values[0]);
                      sample.push(self.values[count - 1]);
                  }
              }
              sample.sort_by(|a, b| a.partial_cmp(b).unwrap());
              let slen = sample.len();
              let q_index = |p: f64| -> usize {
                  // Clamp index to valid range.
                  ((p * (slen as f64 - 1.0)).floor() as usize).min(slen - 1)
              };
              let p25 = sample[q_index(0.25)];
              let median = sample[q_index(0.50)];
              let p75 = sample[q_index(0.75)];
              let p95 = sample[q_index(0.95)];

              format!(
                  "{{ count: {}, sum: {:.2}, mean: {:.2}, stdev: {:.2}, min: {:.2}, p25: {:.2}, median: {:.2}, p75: {:.2}, p95: {:.2}, max: {:.2} }}",
                  count, sum, mean, stdev, min, p25, median, p75, p95, max
              )
          }
      }

      /// A trait for a modular metric that can be computed on a MiniTrie.
      pub trait Metric {
          /// The name of the metric.
          fn name(&self) -> &'static str;
          /// Computes the metric and returns a formatted string.
          fn compute(&self, trie: &MiniTrie) -> String;
      }

      // --- Concrete Metric Implementations ---

      pub struct NumNodesMetric;
      impl Metric for NumNodesMetric {
          fn name(&self) -> &'static str { "num_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.num_nodes().to_string() }
      }

      pub struct NumEdgesMetric;
      impl Metric for NumEdgesMetric {
          fn name(&self) -> &'static str { "num_edges" }
          fn compute(&self, trie: &MiniTrie) -> String {
              trie.nodes().map(|n| n.out_degree()).sum::<usize>().to_string()
          }
      }

      pub struct NumRootsMetric;
      impl Metric for NumRootsMetric {
          fn name(&self) -> &'static str { "num_roots" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.root_ids.len().to_string() }
      }

      pub struct NumEndNodesMetric;
      impl Metric for NumEndNodesMetric {
          fn name(&self) -> &'static str { "num_end_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String {
              trie.nodes().filter(|n| n.is_end()).count().to_string()
          }
      }

      pub struct NumReachableNodesMetric;
      impl Metric for NumReachableNodesMetric {
          fn name(&self) -> &'static str { "num_reachable_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.reachable_from_roots().len().to_string() }
      }

      pub struct NumProductiveNodesMetric;
      impl Metric for NumProductiveNodesMetric {
          fn name(&self) -> &'static str { "num_productive_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.can_reach_end().len().to_string() }
      }

      pub struct RootFanoutMetric;
      impl Metric for RootFanoutMetric {
          fn name(&self) -> &'static str { "root_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let fanouts: Vec<f64> = trie
                  .nodes()
                  .filter(|n| trie.root_ids.contains(&n.id()))
                  .map(|n| n.out_degree() as f64)
                  .collect();
              NumericStats::from_samples(&fanouts).to_pretty_string()
          }
      }

      pub struct NonRootFanoutMetric;
      impl Metric for NonRootFanoutMetric {
          fn name(&self) -> &'static str { "non_root_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let fanouts: Vec<f64> = trie
                  .nodes()
                  .filter(|n| !trie.root_ids.contains(&n.id()))
                  .map(|n| n.out_degree() as f64)
                  .collect();
              NumericStats::from_samples(&fanouts).to_pretty_string()
          }
      }

      pub struct AllFanoutMetric;
      impl Metric for AllFanoutMetric {
          fn name(&self) -> &'static str { "all_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let fanouts: Vec<f64> = trie
                  .nodes()
                  .map(|n| n.out_degree() as f64)
                  .collect();
              NumericStats::from_samples(&fanouts).to_pretty_string()
          }
      }

      /// Helper to compute edge overlap score for a single node.
      fn compute_edge_overlap_for_node(node: &crate::trie3_opt::core::Node) -> f64 {
          use crate::trie3_opt::core::{NodeId, SortedSet};
          use std::collections::BTreeMap;

          let mut node_score = 0.0;

          // Group destination maps by pop
          let mut by_pop: BTreeMap<isize, Vec<&BTreeMap<NodeId, SortedSet>>> = BTreeMap::new();
          for (ek, dm) in node.children() {
              by_pop.entry(ek.pop).or_default().push(dm);
          }

          for (_pop, dms) in by_pop {
              if dms.len() < 2 {
                  continue;
              }
              for i in 0..dms.len() {
                  for j in (i + 1)..dms.len() {
                      let dm1 = dms[i];
                      let dm2 = dms[j];

                      let mut common_dests_with_overlap = 0;
                      for (d, sids1) in dm1 {
                          if let Some(sids2) = dm2.get(d) {
                              if !sids1.intersect(sids2).is_empty() {
                                  common_dests_with_overlap += 1;
                              }
                          }
                      }
                      node_score += common_dests_with_overlap as f64;
                  }
              }
          }
          node_score
      }

      pub struct EdgeOverlapMetric;
      impl Metric for EdgeOverlapMetric {
          fn name(&self) -> &'static str { "edge_overlap" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut scores: Vec<f64> = Vec::new();
              #[cfg(not(rustrover))]
              let it = tqdm!(
                  trie.nodes(),
                  desc = "Metric: EdgeOverlap",
                  total = trie.num_nodes(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = trie.nodes();

              for node in it {
                  let node_score = compute_edge_overlap_for_node(node);
                  if node_score > 0.0 {
                      scores.push(node_score);
                  }
              }
              NumericStats::from_samples(&scores).to_pretty_string()
          }
      }

      pub struct RootEdgeOverlapMetric;
      impl Metric for RootEdgeOverlapMetric {
          fn name(&self) -> &'static str { "root_edge_overlap" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut scores: Vec<f64> = Vec::new();
              let root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  root_nodes.iter(),
                  desc = "Metric: RootEdgeOverlap",
                  total = root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = root_nodes.iter();

              for node in it {
                  let node_score = compute_edge_overlap_for_node(node);
                  if node_score > 0.0 {
                      scores.push(node_score);
                  }
              }
              NumericStats::from_samples(&scores).to_pretty_string()
          }
      }

      pub struct NonRootEdgeOverlapMetric;
      impl Metric for NonRootEdgeOverlapMetric {
          fn name(&self) -> &'static str { "non_root_edge_overlap" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut scores: Vec<f64> = Vec::new();
              let non_root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| !trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  non_root_nodes.iter(),
                  desc = "Metric: NonRootEdgeOverlap",
                  total = non_root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = non_root_nodes.iter();

              for node in it {
                  let node_score = compute_edge_overlap_for_node(node);
                  if node_score > 0.0 {
                      scores.push(node_score);
                  }
              }
              NumericStats::from_samples(&scores).to_pretty_string()
          }
      }

      /// Helper to compute state fanout values for a single node and append them to stats.
      /// This avoids per-node Vec allocations and uses HashMap for faster aggregation.
      fn compute_state_fanout_for_node_into(
          node: &crate::trie3_opt::core::Node,
          stats: &mut NumericStats,
      ) {
          use std::collections::HashMap;

          // For this node, build: pop -> (state_id -> count of outgoing transitions)
          let mut by_pop: HashMap<isize, HashMap<usize, usize>> = HashMap::new();

          for (edge_key, dest_map) in node.children() {
              let pop = edge_key.pop;
              let state_counts = by_pop.entry(pop).or_default();
              for (_dest, state_set) in dest_map {
                  for state_id in state_set.iter() {
                      *state_counts.entry(state_id).or_default() += 1;
                  }
              }
          }

          // Append counts for this node into the shared stats accumulator.
          for inner in by_pop.values() {
              for &count in inner.values() {
                  stats.push(count as f64);
              }
          }
      }

      pub struct StateFanoutMetric;
      impl Metric for StateFanoutMetric {
          fn name(&self) -> &'static str { "state_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut stats = NumericStats::new();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  trie.nodes(),
                  desc = "Metric: StateFanout",
                  total = trie.num_nodes(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = trie.nodes();

              for node in it {
                  compute_state_fanout_for_node_into(node, &mut stats);
              }

              stats.to_pretty_string()
          }
      }

      pub struct RootStateFanoutMetric;
      impl Metric for RootStateFanoutMetric {
          fn name(&self) -> &'static str { "root_state_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut stats = NumericStats::new();
              let root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  root_nodes.iter(),
                  desc = "Metric: RootStateFanout",
                  total = root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = root_nodes.iter();

              for node in it {
                  compute_state_fanout_for_node_into(node, &mut stats);
              }
              stats.to_pretty_string()
          }
      }

      pub struct NonRootStateFanoutMetric;
      impl Metric for NonRootStateFanoutMetric {
          fn name(&self) -> &'static str { "non_root_state_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut stats = NumericStats::new();
              let non_root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| !trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  non_root_nodes.iter(),
                  desc = "Metric: NonRootStateFanout",
                  total = non_root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = non_root_nodes.iter();

              for node in it {
                  compute_state_fanout_for_node_into(node, &mut stats);
              }
              stats.to_pretty_string()
          }
      }

      /// Instantiates and runs all standard metrics on a given trie.
      pub fn run_all_metrics(trie: &MiniTrie) -> BTreeMap<String, String> {
          let metrics: Vec<Box<dyn Metric>> = vec![
              Box::new(NumNodesMetric),
              Box::new(NumEdgesMetric),
              Box::new(NumRootsMetric),
              Box::new(NumEndNodesMetric),
              Box::new(NumReachableNodesMetric),
              Box::new(NumProductiveNodesMetric),
              Box::new(AllFanoutMetric),
              Box::new(RootFanoutMetric),
              Box::new(NonRootFanoutMetric),
              Box::new(EdgeOverlapMetric),
              Box::new(RootEdgeOverlapMetric),
              Box::new(NonRootEdgeOverlapMetric),
              Box::new(StateFanoutMetric),
              Box::new(RootStateFanoutMetric),
              Box::new(NonRootStateFanoutMetric),
          ];

          let mut results = BTreeMap::new();
          for metric in metrics {
              crate::debug!(3, "  Computing metric: {}", metric.name());
              results.insert(metric.name().to_string(), metric.compute(trie));
          }
          results
      }

      /// Formats a map of metrics into a pretty, indented string.
      pub fn pretty_print_metrics_map(metrics: &BTreeMap<String, String>) -> String {
          let mut buf = String::new();
          buf.push_str("{\n");
          let mut first = true;
          for (k, v) in metrics {
              if !first {
                  buf.push_str(",\n");
              }
              first = false;
              write!(buf, "  \"{}\": {}", k, v).unwrap();
          }
          buf.push_str("\n}");
          buf
      }

    src/trie3_opt/passes/merge_equivalent_llm_tokens.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet};

      use crate::trie3_opt::{context::OptimizationContext, core::{MiniTrie, SortedSet}, passes::OptimizationPass, NodeId};

      pub struct MergeEquivalentLLMTokensPass;

      impl OptimizationPass for MergeEquivalentLLMTokensPass {
          fn name(&self) -> &'static str {
              "MergeEquivalentLLMTokens"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let sv_rc = if let Some(sv_rc) = &ctx.stage_vocab {
                  sv_rc
              } else {
                  return;
              };

              let mut all_bvs = HashSet::new();
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if !ek.tokens.is_empty() {
                          all_bvs.insert(ek.tokens.clone());
                      }
                  }
              }
              if all_bvs.is_empty() {
                  return;
              }

              let max_tok = ctx.max_llm_token_id;
              let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
              let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
              class_to_tokens.insert(0, (0..=max_tok).collect());
              let mut num_classes = 1;

              for splitter_bv in all_bvs {
                  let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
                  for token in splitter_bv.iter() {
                      if token <= max_tok {
                          let class_id = token_to_class[token];
                          members_in_splitter_by_class.entry(class_id).or_default().push(token);
                      }
                  }

                  for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                      let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                      if old_class_size > 0 && !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                          let new_class_id = num_classes;
                          num_classes += 1;
                          for &token in &tokens_for_new_class {
                              token_to_class[token] = new_class_id;
                          }
                          let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                          let moved_tokens_set: HashSet<_> = tokens_for_new_class.iter().cloned().collect();
                          old_class_tokens.retain(|t| !moved_tokens_set.contains(t));
                          class_to_tokens.insert(new_class_id, tokens_for_new_class);
                      }
                  }
              }

              let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
              for group in class_to_tokens.values() {
                  if group.len() > 1 {
                      let rep = *group.iter().min().unwrap();
                      for &t in group {
                          if t != rep {
                              old_to_new.insert(t, rep);
                          }
                      }
                  }
              }

              if old_to_new.is_empty() {
                  return;
              }

              let remap_sorted_set = |s: &SortedSet| -> SortedSet {
                  let mut new_elems = Vec::with_capacity(s.len());
                  for elem in s.iter() {
                      new_elems.push(old_to_new.get(&elem).copied().unwrap_or(elem));
                  }
                  SortedSet::from_iter(new_elems)
              };

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = BTreeMap::new();
                  for (mut ek, dm) in node.children().clone() {
                      ek.tokens = remap_sorted_set(&ek.tokens);
                      let entry: &mut BTreeMap<NodeId, SortedSet> = new_children.entry(ek).or_default();
                      for (dst, sids) in dm {
                          entry.entry(dst).or_default().union_inplace(&sids);
                      }
                  }
                  trie.set_children(node_id, new_children);
              }

              let mut sv_ref = sv_rc.borrow_mut();
              let sv = &mut **sv_ref;
              for (old, rep) in old_to_new {
                  if let Some(moved) = sv.internal_to_original.remove(&old) {
                      let entry = sv.internal_to_original.entry(rep).or_default();
                      *entry |= &moved;
                      for o in moved.iter() {
                          sv.original_to_internal.insert(o, rep);
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/merge_global_atoms.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::collections::hash_map::Entry;

      use kdam::{BarExt, tqdm};
      use crate::profiler::PROGRESS_BAR_ENABLED;

      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{EdgeKey, MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct MergeGlobalAtomsPass {
          max_iters: usize,
          max_atoms_per_pop: usize,
      }

      impl MergeGlobalAtomsPass {
          pub fn new(max_iters: usize, max_atoms_per_pop: usize) -> Self {
              Self { max_iters, max_atoms_per_pop }
          }
      }

      impl OptimizationPass for MergeGlobalAtomsPass {
          fn name(&self) -> &'static str {
              "MergeGlobalAtoms"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let id_to_idx: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              let mut by_pop_masks: BTreeMap<isize, HashSet<SortedSet>> = BTreeMap::new();
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if !ek.tokens.is_empty() {
                          by_pop_masks.entry(ek.pop).or_default().insert(ek.tokens.clone());
                      }
                  }
              }

              // Build a per-pop union of all tokens that actually appear at that pop.
              // This dramatically reduces the universe size versus 0..=max_llm_token_id.
              let mut union_by_pop: BTreeMap<isize, SortedSet> = BTreeMap::new();
              for (pop, masks) in &by_pop_masks {
                  let mut acc: HashSet<usize> = HashSet::new();
                  for m in masks {
                      for t in m.iter() {
                          acc.insert(t);
                      }
                  }
                  union_by_pop.insert(*pop, SortedSet::from_iter(acc.into_iter()));
              }

              let mut atoms_by_pop: BTreeMap<isize, Vec<SortedSet>> = BTreeMap::new();
              let mut aborted_any_pop = false;
              for (pop, masks) in &by_pop_masks {
                  let universe = union_by_pop.get(pop).cloned().unwrap_or_else(SortedSet::new);
                  let mut blocks = if universe.is_empty() { Vec::new() } else { vec![universe.clone()] };
                  let mut aborted = false;
                  #[cfg(not(rustrover))]
                  let it_masks = tqdm!(
                      masks.iter(),
                      desc = &format!("MergeGlobalAtoms: BuildAtoms(pop={})", pop),
                      total = masks.len(),
                      disable = !PROGRESS_BAR_ENABLED,
                      leave = false
                  );
                  #[cfg(rustrover)]
                  let it_masks = masks.iter();

                  for m in it_masks {
                      if blocks.is_empty() {
                          break;
                      }
                      let mut next_blocks = Vec::with_capacity(blocks.len().saturating_mul(2));
                      let mut any_split = false;
                      for b in &blocks {
                          // If no overlap, forward the block unchanged to avoid allocations.
                          if !b.intersects(&m) {
                              next_blocks.push(b.clone());
                              continue;
                          }
                          // Split: intersection and difference
                          let inter = b.intersect(&m);
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff = b.difference(&m);
                          if !diff.is_empty() {
                              next_blocks.push(diff);
                          }
                          any_split = true;
                      }
                      if self.max_atoms_per_pop > 0 && next_blocks.len() > self.max_atoms_per_pop {
                          aborted = true;
                          aborted_any_pop = true;
                          break;
                      }
                      if !any_split {
                          // No change for this mask; keep current blocks.
                          continue;
                      }
                      blocks = next_blocks;
                  }
                  atoms_by_pop.insert(
                      *pop,
                      if aborted { 
                          // We do NOT fall back to a coarse "universe" atom because that is unsound.
                          // We record the abort and return early below (no changes).
                          blocks 
                      } else { 
                          blocks 
                      }
                  );
              }

              // If atom construction was aborted for any pop, we cannot safely proceed without
              // risking unsound merges. Abort the pass with no changes.
              if aborted_any_pop {
                  return;
              }

              // Create dense IDs for all unique token sets for faster lookups.
              let mut unique_token_sets: HashMap<SortedSet, usize> = HashMap::new();
              let mut next_token_set_id = 0;
              for masks in by_pop_masks.values() {
                  for mask in masks {
                      match unique_token_sets.entry(mask.clone()) {
                          Entry::Vacant(e) => {
                              e.insert(next_token_set_id);
                              next_token_set_id += 1;
                          }
                          Entry::Occupied(_) => {}
                      };
                  }
              }

              // Precompute atom overlaps for each unique token set ID.
              // Map: pop -> Vec<Vec<usize>> where outer vec is indexed by token_set_id
              let mut atom_idxs_by_pop_token_set_id: BTreeMap<isize, Vec<Vec<usize>>> = BTreeMap::new();
              for (pop, atoms) in &atoms_by_pop {
                  if let Some(masks) = by_pop_masks.get(pop) {
                      let pop_map = atom_idxs_by_pop_token_set_id.entry(*pop).or_insert_with(Vec::new);
                      pop_map.resize(next_token_set_id, Vec::new());
                      for mask in masks {
                          let token_set_id = *unique_token_sets.get(mask).unwrap();
                          let mut idxs = Vec::new();
                          for (i, atom) in atoms.iter().enumerate() {
                              if mask.intersects(atom) {
                                  idxs.push(i);
                              }
                          }
                          pop_map[token_set_id] = idxs;
                      }
                  }
              }
              // Compute pop=0 distance for initial partitioning.
              let mut pop0_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_rev_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_out_degree = vec![0; n];
              for u_node in trie.nodes() {
                  let u_idx = id_to_idx[&u_node.id()];
                  for (ek, dm) in u_node.children() {
                      if ek.pop == 0 {
                          for v_id in dm.keys() {
                              pop0_adj[u_idx].push(*v_id);
                              pop0_rev_adj[id_to_idx[v_id]].push(u_node.id());
                              pop0_out_degree[u_idx] += 1;
                          }
                      }
                  }
              }

              let mut dist = vec![0; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              for i in 0..n {
                  if pop0_out_degree[i] == 0 {
                      q.push_back(i);
                  }
              }

              let mut processed_count = 0;
              while let Some(v_idx) = q.pop_front() {
                  processed_count += 1;
                  for u_id in &pop0_rev_adj[v_idx] {
                      let u_idx = id_to_idx[u_id];
                      dist[u_idx] = dist[u_idx].max(1 + dist[v_idx]);
                      pop0_out_degree[u_idx] -= 1;
                      if pop0_out_degree[u_idx] == 0 {
                          q.push_back(u_idx);
                      }
                  }
              }

              if processed_count < n {
                  let max_dist = n + 1;
                  for i in 0..n {
                      if pop0_out_degree[i] > 0 {
                          q.push_back(i);
                      }
                  }
                  while let Some(v_idx) = q.pop_front() {
                      if dist[v_idx] != max_dist {
                          dist[v_idx] = max_dist;
                          for u_id in &pop0_rev_adj[v_idx] {
                              q.push_back(id_to_idx[u_id]);
                          }
                      }
                  }
              }

              // Partition refinement.
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class_id = 0;
              for (i, id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*id).unwrap();
                  let key = (node.is_end(), dist[id_to_idx[id]]);
                  let class_id = *class_map.entry(key).or_insert_with(|| {
                      let id = next_class_id;
                      next_class_id += 1;
                      id
                  });
                  prev_class[i] = class_id;
              }

              // Refine until convergence. If max_iters > 0 and we do not converge within
              // the budget, abort to preserve semantics.
              let mut iter_num = 0usize;
              loop {
                  type InternedEdgeSig = Vec<(usize, usize)>; // (dest_class, sset_id)
                  type InternedNodeSig = (bool, Vec<((isize, usize), InternedEdgeSig)>); // (is_end, [((pop, atom_idx), edge_sig)])

                  let mut sset_interner: HashMap<SortedSet, usize> = HashMap::new();
                  let mut next_sset_id = 0;

                  let mut sig_to_id: HashMap<InternedNodeSig, usize> = HashMap::new();
                  let mut next_id = 0;
                  let mut new_class = vec![0; n];
                  let mut changes = 0;

                  #[cfg(not(rustrover))]
                  let it_nodes = tqdm!(
                      node_ids.iter().enumerate(),
                      desc = &format!("MergeGlobalAtoms: Refine iter {}", iter_num + 1),
                      total = node_ids.len(),
                      disable = !PROGRESS_BAR_ENABLED,
                      leave = false
                  );
                  #[cfg(rustrover)]
                  let it_nodes = node_ids.iter().enumerate();

                  for (u_idx, u_id) in it_nodes {
                      let u_node = trie.get_node(*u_id).unwrap();
                      let mut per_atom_aggr: BTreeMap<(isize, usize), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in u_node.children() {
                          if let Some(pop_map) = atom_idxs_by_pop_token_set_id.get(&ek.pop) {
                              if let Some(token_set_id) = unique_token_sets.get(&ek.tokens) {
                                  if let Some(atom_idxs) = pop_map.get(*token_set_id) {
                                      for &atom_idx in atom_idxs {
                                          let entry = per_atom_aggr.entry((ek.pop, atom_idx)).or_default();
                                          for (v_id, sids) in dm {
                                              let dest_class = prev_class[id_to_idx[v_id]];
                                              entry.entry(dest_class).or_default().union_inplace(sids);
                                          }
                                      }
                                  }
                              }
                          }
                      }
                      let mut sig_entries_interned: Vec<((isize, usize), InternedEdgeSig)> = Vec::with_capacity(per_atom_aggr.len());
                      for ((pop, atom_idx), dm) in per_atom_aggr {
                          let mut dest_vec: InternedEdgeSig = Vec::with_capacity(dm.len());
                          for (dest_class, sids) in dm {
                              let sset_id = *sset_interner.entry(sids).or_insert_with(|| { let id = next_sset_id; next_sset_id += 1; id });
                              dest_vec.push((dest_class, sset_id));
                          }
                          sig_entries_interned.push(((pop, atom_idx), dest_vec));
                      }

                      let sig: InternedNodeSig = (u_node.is_end(), sig_entries_interned);
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| { let id = next_id; next_id += 1; id });
                      new_class[u_idx] = cid;
                      if new_class[u_idx] != prev_class[u_idx] { changes += 1; }
                  }
                  prev_class = new_class;
                  if changes == 0 { 
                      break; 
                  }

                  iter_num += 1;
                  if self.max_iters > 0 && iter_num >= self.max_iters {
                      // Not converged within budget: abort without changing the trie.
                      return;
                  }
              }

              // Rewire and rebuild.
              let final_partition = &prev_class;
              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  if representatives[class_id].is_none() {
                      representatives[class_id] = Some(node_ids[u_idx]);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  node_to_rep.insert(node_ids[u_idx], representatives[class_id].unwrap());
              }

              // Rebuild representative edges.
              for class_id in 0..num_classes {
                  if let Some(rep_id) = representatives[class_id] {
                      let exemplar_idx = final_partition.iter().position(|&c| c == class_id).unwrap();
                      let exemplar_id = node_ids[exemplar_idx];
                      let exemplar_node = trie.get_node(exemplar_id).unwrap().clone();

                      // Aggregate by (pop, tokens, dest_class) -> union of sids
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          for (v_id, sids) in dm {
                              let v_class = final_partition[id_to_idx[v_id]];
                              aggr.entry((ek.pop, ek.tokens.clone(), v_class))
                                  .or_default()
                                  .union_inplace(sids);
                          }
                      }

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for ((pop, tokens, dest_class), sids) in aggr {
                          if let Some(dest_rep) = representatives[dest_class] {
                              let key = EdgeKey::new(pop, tokens);
                              new_children.entry(key).or_default().insert(dest_rep, sids);
                          }
                      }
                      trie.set_children(rep_id, new_children);
                  }
              }

              // Clear children of non-representatives.
              let rep_set: HashSet<NodeId> = representatives.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false); // Non-reps are effectively deleted.
                  }
              }

              // Remap roots.
              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
    src/trie3_opt/passes/generalize_sids.rs: |
      use std::collections::{BTreeMap, HashMap, VecDeque};

      use crate::glr::{parser::GLRParser, table::StateID};
      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct GeneralizeSidsPass;

      impl OptimizationPass for GeneralizeSidsPass {
          fn name(&self) -> &'static str {
              "GeneralizeSids"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let parser = if let Some(p) = &ctx.parser {
                  p.borrow()
              } else {
                  return;
              };

              let one_step_back_map = parser.build_one_step_back_map();
              let mut max_pop = 0;
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if ek.pop > 0 {
                          max_pop = max_pop.max(ek.pop as usize);
                      }
                  }
              }
              if max_pop == 0 {
                  return;
              }

              let num_levels = (max_pop as f64).log2().ceil() as usize + 1;
              let mut two_power_back_maps: Vec<BTreeMap<StateID, SortedSet>> =
                  Vec::with_capacity(num_levels);
              two_power_back_maps.push(
                  one_step_back_map
                      .into_iter()
                      .map(|(k, v)| (k, SortedSet::from_iter(v.iter())))
                      .collect(),
              );

              for i in 1..num_levels {
                  let prev_map = &two_power_back_maps[i - 1];
                  let mut next_map: BTreeMap<StateID, SortedSet> = BTreeMap::new();
                  for (&state_id, preds1) in prev_map {
                      let mut preds2 = SortedSet::new();
                      for pred1_val in preds1.iter() {
                          let sid = StateID(pred1_val);
                          if let Some(preds_of_pred) = prev_map.get(&sid) {
                              preds2.union_inplace(preds_of_pred);
                          }
                      }
                      if !preds2.is_empty() {
                          next_map.insert(state_id, preds2);
                      }
                  }
                  two_power_back_maps.push(next_map);
              }

              let apply_n_step_back = |s: &SortedSet, n: usize| -> SortedSet {
                  let mut current_s = s.clone();
                  for k in 0..two_power_back_maps.len() {
                      if (n >> k) & 1 == 1 {
                          let map_k = &two_power_back_maps[k];
                          let mut next_s = SortedSet::new();
                          for state_id_val in current_s.iter() {
                              let state_id = StateID(state_id_val);
                              if let Some(preds) = map_k.get(&state_id) {
                                  next_s.union_inplace(preds);
                              }
                          }
                          current_s = next_s;
                      }
                  }
                  current_s
              };

              let mut possible_states: HashMap<NodeId, SortedSet> = HashMap::new();
              let mut worklist: VecDeque<NodeId> = VecDeque::new();
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              for root_id in &trie.root_ids {
                  possible_states.insert(*root_id, all_states.clone());
                  worklist.push_back(*root_id);
              }

              while let Some(u_id) = worklist.pop_front() {
                  let s_u = possible_states.get(&u_id).cloned().unwrap_or_default();
                  if s_u.is_empty() {
                      continue;
                  }
                  let u_node = trie.get_node(u_id).unwrap();
                  for (ek, dm) in u_node.children() {
                      let s_u_popped = if ek.pop > 0 {
                          apply_n_step_back(&s_u, ek.pop as usize)
                      } else {
                          s_u.clone()
                      };
                      if s_u_popped.is_empty() {
                          continue;
                      }
                      for (v_id, sids_uv) in dm {
                          let s_transmitted = s_u_popped.intersect(sids_uv);
                          if s_transmitted.is_empty() {
                              continue;
                          }
                          let s_v_old = possible_states.entry(*v_id).or_default();
                          let old_len = s_v_old.len();
                          s_v_old.union_inplace(&s_transmitted);
                          if s_v_old.len() > old_len {
                              worklist.push_back(*v_id);
                          }
                      }
                  }
              }

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = node.children().clone();

                  for (_ek, dm) in &mut new_children {
                      dm.retain(|v_id, sids| {
                          if let Some(s_v) = possible_states.get(v_id) {
                              let intersection = sids.intersect(s_v);
                              if !intersection.is_empty() {
                                  *sids = intersection;
                                  true
                              } else {
                                  false
                              }
                          } else {
                              // v is not reachable with any valid state, so this edge is dead.
                              false
                          }
                      });
                  }
                  new_children.retain(|_, dm| !dm.is_empty());
                  trie.set_children(node_id, new_children);
              }
          }
      }
    src/trie3_opt/optimizer.rs: |
      use std::collections::BTreeMap;
      use std::time::Instant;

      use crate::constraint::{PrecomputeNode3Index, StageVocab, Trie3GodWrapper};
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::trie3_opt::coordinator::{run_pipeline_on_precompute3, CoordinatorConfig};
      use crate::trie3_opt::Trie3Config;

      /// High-level size optimizer for precompute3 tries. This is a legacy API that wraps the
      /// new MiniTrie-based optimization pipeline.
      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &Trie3Config,
          max_state_id: usize,
          max_llm_token_id: usize,
          stage_vocab: &mut StageVocab,
          parser: &GLRParser,
      ) {
          crate::debug!(2, "Optimizing Trie 3 size (using new pipeline)...");
          let start = Instant::now();

          // Map legacy Trie3Config to new CoordinatorConfig
          let coordinator_config = CoordinatorConfig {
              num_passes: config.num_passes,
              prune_dead_paths: config.prune_dead_paths,
              prune_unproductive_paths: config.prune_unproductive_paths,
              canonicalize_end_nodes: true, // Always good practice
              compress_edges: config.compress_edges,
              compress_unary_chains: config.compress_edges,
              factor_common_destinations: config.factor_common_destinations,
              factor_common_destinations_min_incoming: config.factor_common_destinations_min_incoming,
              merge_structural: config.merge_structural,
              merge_structural_max_iters: config.merge_structural_max_iters,
              merge_bisimulation: config.merge_bisimulation,
              merge_bisimulation_max_iters: config.merge_bisimulation_max_iters,
              merge_global_atoms: config.merge_global_atoms,
              merge_global_atoms_max_iters: config.merge_global_atoms_max_iters,
              merge_global_atoms_max_atoms_per_pop: config.merge_global_atoms_max_atoms_per_pop,
              eliminate_pop0_except_roots: config.eliminate_pop0_except_roots,
              merge_equivalent_llm_tokens: config.merge_equivalent_llm_tokens,
              reorder_llm_tokens: config.reorder_llm_tokens,
              generalize_sids: config.generalize_sids,
          };

          run_pipeline_on_precompute3(
              roots,
              trie3_god,
              max_llm_token_id,
              max_state_id,
              coordinator_config,
              Some(stage_vocab),
              Some(parser),
          );

          crate::debug!(2, "Finished optimizing Trie 3 size in {:?}", start.elapsed());
      }
    src/trie3_opt/passes/compress_edges.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Group identical destination-maps under the same pop by unioning token masks.
      /// This reduces the number of edge-keys by ensuring that, for a fixed pop,
      /// edges with identical destination semantics share a single token-set.
      pub struct CompressEdgesPass;

      impl OptimizationPass for CompressEdgesPass {
          fn name(&self) -> &'static str {
              "CompressEdges"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let n = trie.get_node(node_id).unwrap();
                  if n.children().is_empty() {
                      continue;
                  }

                  let old_children = n.children().clone();
                  // Cost metric: sum of token set sizes and destination map sizes.
                  let old_cost: usize = old_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  // Stage 1: Group by (pop, canonicalized dest-map), unioning token sets.
                  let mut by_pop: BTreeMap<isize, HashMap<Vec<(u32, SortedSet)>, SortedSet>> =
                      BTreeMap::new();
                  for (ek, dm) in &old_children {
                      if ek.tokens.is_empty() || dm.is_empty() {
                          continue;
                      }
                      let mut dest_vec: Vec<(u32, SortedSet)> =
                          dm.iter().map(|(&dst, sids)| (dst, sids.clone())).collect();
                      dest_vec.sort_unstable_by_key(|k| k.0);
                      by_pop
                          .entry(ek.pop)
                          .or_default()
                          .entry(dest_vec)
                          .or_default()
                          .union_inplace(&ek.tokens);
                  }

                  // Stage 2: For each pop, combine groups that yield identical final token sets
                  // by unioning their destination maps.
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<u32, SortedSet>> = BTreeMap::new();
                  for (pop, groups) in by_pop {
                      // tokens -> aggregated destination map
                      let mut out_by_tokens: BTreeMap<SortedSet, BTreeMap<u32, SortedSet>> =
                          BTreeMap::new();

                      for (dest_vec, tokens) in groups {
                          if tokens.is_empty() {
                              continue;
                          }
                          let dest_out = out_by_tokens.entry(tokens).or_default();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dest_out.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                      }

                      // Emit final edges for this pop
                      for (tokens, dm) in out_by_tokens {
                          if !tokens.is_empty() && !dm.is_empty() {
                              new_children.insert(EdgeKey::new(pop, tokens), dm);
                          }
                      }
                  }

                  let new_cost: usize = new_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  if new_cost < old_cost {
                      trie.set_children(node_id, new_children);
                  }
              }
          }
      }
    src/trie3_opt/passes/eliminate_pop0.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;
      use crate::glr::table::StateID;

      /// Eliminate pop=0 edges whose source is not a root by composing predecessors:
      /// For each B --(0, L_bc, S_bc)--> C and each A --(p_ab, L_ab, S_ab)--> B,
      /// add A --(p_ab, L_ab∧L_bc, S_ab∧pre^{p_ab}(S_bc))--> C and remove the B->C entry.
      /// Here pre^{p}(S) is the p-step state preimage under parser "pop" transitions.
      /// Iterate to a fixed point. This is semantics-preserving under the model where a path's
      /// token set is the intersection across edges, and the admissible source states for a path
      /// are the intersection across edges of preimages of the edge state-sets by the cumulative pop.
      pub struct EliminatePop0ExceptRootsPass;

      impl OptimizationPass for EliminatePop0ExceptRootsPass {
          fn name(&self) -> &'static str {
              "EliminatePop0ExceptRoots"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let root_set = trie.root_ids.clone();
              let n = trie.num_nodes();
              if n == 0 {
                  return;
              }

              // Precompute the full universe of states once for quick equality checks.
              let all_states_universe = SortedSet::from_iter(0..=ctx.max_state_id);

              // Compute the maximum pop seen. If > 0, we need the parser to compute state preimages.
              let mut max_pop = 0usize;
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if ek.pop > 0 {
                          max_pop = max_pop.max(ek.pop as usize);
                      }
                  }
              }

              // Build 2^k preimage tables (as in GeneralizeSidsPass) if needed.
              let mut two_power_back_maps: Vec<BTreeMap<StateID, SortedSet>> = Vec::new();
              if max_pop > 0 {
                  let parser_ref = if let Some(p) = &ctx.parser {
                      p.borrow()
                  } else {
                      // Without a parser we cannot correctly compose states when p_ab > 0.
                      // To avoid unsound rewrites, skip the pass.
                      return;
                  };
                  let one_step_back_map = parser_ref.build_one_step_back_map();
                  let num_levels = (max_pop as f64).log2().ceil() as usize + 1;
                  two_power_back_maps.push(
                      one_step_back_map
                          .into_iter()
                          .map(|(k, v)| (k, SortedSet::from_iter(v.iter())))
                          .collect(),
                  );
                  for i in 1..num_levels {
                      let prev_map = &two_power_back_maps[i - 1];
                      let mut next_map: BTreeMap<StateID, SortedSet> = BTreeMap::new();
                      for (&state_id, preds1) in prev_map {
                          let mut preds2 = SortedSet::new();
                          for pred1_val in preds1.iter() {
                              let sid = StateID(pred1_val);
                              if let Some(preds_of_pred) = prev_map.get(&sid) {
                                  preds2.union_inplace(preds_of_pred);
                              }
                          }
                          if !preds2.is_empty() {
                              next_map.insert(state_id, preds2);
                          }
                      }
                      two_power_back_maps.push(next_map);
                  }
              }

              // Closure to apply n-step preimage. If n == 0 (or we have no tables), it's identity.
              let apply_n_step_back = |s: &SortedSet, n_steps: usize| -> SortedSet {
                  if n_steps == 0 || two_power_back_maps.is_empty() {
                      return s.clone();
                  }
                  let mut current_s = s.clone();
                  for k in 0..two_power_back_maps.len() {
                      if ((n_steps >> k) & 1) == 1 {
                          let map_k = &two_power_back_maps[k];
                          let mut next_s = SortedSet::new();
                          for state_id_val in current_s.iter() {
                              let sid = StateID(state_id_val);
                              if let Some(preds) = map_k.get(&sid) {
                                  next_s.union_inplace(preds);
                              }
                          }
                          current_s = next_s;
                      }
                  }
                  current_s
              };

              // Helper: true if s == {0,1,2,...,max_state_id}.
              let is_universe = |s: &SortedSet| -> bool {
                  if s.len() != ctx.max_state_id + 1 {
                      return false;
                  }
                  // Exact equality with 0..=max_state_id
                  s.iter().enumerate().all(|(i, v)| v == i)
              };

              loop {
                  // Collect pop=0 edges by cloning to avoid borrow issues.
                  let mut zero_edges: Vec<(NodeId, SortedSet, NodeId, SortedSet)> = Vec::new();

                  for node in trie.nodes() {
                      for (ek, dm) in node.children() {
                          if ek.pop == 0 {
                              for (dst, sids) in dm {
                                  zero_edges.push((node.id(), ek.tokens.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                  }

                  if zero_edges.is_empty() { break; }

                  let mut removed_this_iter = 0usize;

                  for (b, llm_bc, c, s_bc) in zero_edges {
                      if root_set.contains(&b) { continue; }

                      if let Some(b_node) = trie.get_node(b) {
                          let preds = b_node.parents().clone(); // clone to avoid borrow issues
                          for (a, edges_from_a) in &preds {
                              for (key_ab, s_ab) in edges_from_a {
                                  let p_ab = key_ab.pop;
                                  let llm_ab = &key_ab.tokens;
                                  let new_tokens = llm_ab.intersect(&llm_bc);
                                  if new_tokens.is_empty() { continue; }
                                  let p_usize = if p_ab <= 0 { 0usize } else { p_ab as usize };
                                  // Compose states with the correct p-step preimage.
                                  // new_sids = S_ab ∩ pre^{p_ab}(S_bc)
                                  //
                                  // IMPORTANT: if S_bc is the full universe (no constraint on the 0-pop edge),
                                  // then the correct neutral behavior is to impose no additional restriction
                                  // beyond S_ab, i.e., pre^{p_ab}(U) should act as U under this path semantics.
                                  // Using the raw preimage of U (domain-of-pop) would over-restrict and cause
                                  // mismatches when FactorCommonDestinations (or others) introduced U on 0-edges.
                                  let s_bc_pre = if p_usize == 0 {
                                      // No preimage needed.
                                      s_bc.clone()
                                  } else if is_universe(&s_bc) {
                                      // Treat pre^{p_ab}(U) as U here to preserve exact path semantics.
                                      all_states_universe.clone()
                                  } else {
                                      apply_n_step_back(&s_bc, p_usize)
                                  };
                                  let new_sids = s_ab.intersect(&s_bc_pre);
                                  if new_sids.is_empty() { continue; }

                                  let key = crate::trie3_opt::core::EdgeKey::new(p_ab, new_tokens.clone());
                                  trie.add_edge(*a, key, c, new_sids);
                              }
                          }
                      }

                      // Remove B -> C under (0, llm_bc)
                      let key = crate::trie3_opt::core::EdgeKey::new(0, llm_bc.clone());
                      if trie.remove_edge_dest(b, &key, c).is_some() {
                          removed_this_iter += 1;
                      }
                  }

                  if removed_this_iter == 0 {
                      break;
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_common_destinations.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct FactorCommonDestinationsPass {
          min_incoming: usize,
      }

      impl FactorCommonDestinationsPass {
          pub fn new(min_incoming: usize) -> Self {
              Self { min_incoming }
          }
      }

      impl OptimizationPass for FactorCommonDestinationsPass {
          fn name(&self) -> &'static str {
              "FactorCommonDestinations"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              if self.min_incoming == 0 {
                  return;
              }

              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              // Map: dest -> { (pop, tokens) -> { states -> [sources] } }
              let mut incoming_map: HashMap<NodeId, HashMap<EdgeKey, HashMap<SortedSet, Vec<NodeId>>>> =
                  HashMap::new();

              for src_node in trie.nodes() {
                  for (edge_key, dest_map) in src_node.children() {
                      for (dest_id, sids) in dest_map {
                          incoming_map
                              .entry(*dest_id)
                              .or_default()
                              .entry(edge_key.clone())
                              .or_default()
                              .entry(sids.clone())
                              .or_default()
                              .push(src_node.id());
                      }
                  }
              }

              for (dest_id, edges_by_key) in incoming_map {
                  for (edge_key, sources_by_sids) in edges_by_key {
                      for (sids, sources) in sources_by_sids {
                          if sources.len() >= self.min_incoming {
                              // Create intermediate node
                              let intermediate_id = trie.add_node(false);

                              // Add edge from intermediate to original destination
                              trie.add_edge(intermediate_id, edge_key.clone(), dest_id, sids.clone());

                              // Reroute sources to point to intermediate node
                              for src_id in &sources {
                                  trie.remove_edge_dest(*src_id, &edge_key, dest_id);

                                  // Add new edge to intermediate node. Use the same token-set as the factored key
                                  // instead of "all tokens" to avoid massive token-universe expansions in the MiniTrie.
                                  // This preserves exact semantics: the original (pop, tokens)->dest is now
                                  // source --(0, tokens)--> intermediate --(pop, tokens)--> dest.
                                  let none_like_edge_key = EdgeKey::new(0, edge_key.tokens.clone());
                                  trie.add_edge(
                                      *src_id,
                                      none_like_edge_key,
                                      intermediate_id,
                                      all_states.clone(),
                                  );
                              }
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/reorder_llm_tokens.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::{context::OptimizationContext, core::{MiniTrie, SortedSet}, passes::OptimizationPass, NodeId};

      pub struct ReorderLLMTokensPass;

      impl OptimizationPass for ReorderLLMTokensPass {
          fn name(&self) -> &'static str {
              "ReorderLLMTokens"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let sv_rc = if let Some(sv_rc) = &ctx.stage_vocab {
                  sv_rc
              } else {
                  return;
              };

              let max_tok = ctx.max_llm_token_id;
              let mut freq: Vec<usize> = vec![0; max_tok + 1];
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      for t in ek.tokens.iter() {
                          if t <= max_tok {
                              freq[t] += 1;
                          }
                      }
                  }
              }

              let mut present: Vec<usize> = (0..=max_tok).filter(|&t| freq[t] > 0).collect();
              if present.is_empty() {
                  return;
              }
              present.sort_by_key(|&t| (std::cmp::Reverse(freq[t]), t));

              let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
              for (new_id, old_id) in present.iter().enumerate() {
                  old_to_new.insert(*old_id, new_id);
              }

              let remap_sorted_set = |s: &SortedSet| -> SortedSet {
                  let mut new_elems = Vec::with_capacity(s.len());
                  for elem in s.iter() {
                      new_elems.push(old_to_new.get(&elem).copied().unwrap_or(elem));
                  }
                  SortedSet::from_iter(new_elems)
              };

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = BTreeMap::new();
                  for (mut ek, dm) in node.children().clone() {
                      ek.tokens = remap_sorted_set(&ek.tokens);
                      let entry: &mut BTreeMap<NodeId, SortedSet> = new_children.entry(ek).or_default();
                      for (dst, sids) in dm {
                          entry.entry(dst).or_default().union_inplace(&sids);
                      }
                  }
                  trie.set_children(node_id, new_children);
              }

              let mut sv_ref = sv_rc.borrow_mut();
              let sv = &mut **sv_ref;

              let mut new_internal_to_original = BTreeMap::new();
              for (old_id, setv) in sv.internal_to_original.clone() {
                  if let Some(new_id) = old_to_new.get(&old_id) {
                      new_internal_to_original.insert(*new_id, setv);
                  }
              }
              sv.internal_to_original = new_internal_to_original;

              let mut new_original_to_internal = BTreeMap::new();
              for (orig, old_internal) in sv.original_to_internal.clone() {
                  if let Some(new_internal) = old_to_new.get(&old_internal) {
                      new_original_to_internal.insert(orig, *new_internal);
                  }
              }
              sv.original_to_internal = new_original_to_internal;
              sv.internal_max_llm_token = present.len().saturating_sub(1);
              ctx.max_llm_token_id = sv.internal_max_llm_token;
          }
      }
    src/trie3_opt/context.rs: |
      use std::cell::RefCell;
      use std::collections::BTreeMap;
      use std::fmt;
      use std::rc::Rc;

      use crate::constraint::StageVocab;
      use crate::glr::parser::GLRParser;

      /// Shared, immutable and mutable context passed to every optimization pass.
      /// Keeps global bounds and simple telemetry.
      #[derive(Clone)]
      pub struct OptimizationContext<'a> {
          pub max_llm_token_id: usize,
          pub max_state_id: usize,
          pub iteration_budget: usize,
          pub debug_level: u8,
          pub metrics_before: BTreeMap<String, String>,
          pub metrics_after: BTreeMap<String, String>,
          // New fields for advanced passes
          pub stage_vocab: Option<Rc<RefCell<&'a mut StageVocab>>>,
          pub parser: Option<Rc<RefCell<&'a GLRParser>>>,
      }

      impl<'a> OptimizationContext<'a> {
          pub fn new(max_llm_token_id: usize, max_state_id: usize) -> Self {
              Self {
                  max_llm_token_id,
                  max_state_id,
                  iteration_budget: 1_000_000,
                  debug_level: 1,
                  metrics_before: BTreeMap::new(),
                  metrics_after: BTreeMap::new(),
                  stage_vocab: None,
                  parser: None,
              }
          }
      }

      impl<'a> fmt::Debug for OptimizationContext<'a> {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              f.debug_struct("OptimizationContext")
                  .field("max_llm_token_id", &self.max_llm_token_id)
                  .field("max_state_id", &self.max_state_id)
                  .field("iteration_budget", &self.iteration_budget)
                  .field("debug_level", &self.debug_level)
                  .field("metrics_before", &self.metrics_before)
                  .field("metrics_after", &self.metrics_after)
                  .field("stage_vocab_present", &self.stage_vocab.is_some())
                  .field("parser_present", &self.parser.is_some())
                  .finish()
          }
      }
    src/trie3_opt/coordinator.rs: |
      use std::cell::RefCell;
      use std::collections::{BTreeMap, HashMap};
      use std::rc::Rc;
      use std::env;

      use ordered_hash_map::OrderedHashMap;
      use kdam::BarExt;
      use once_cell::sync::Lazy;
      use serde::Deserialize;

      use crate::profiler::PROGRESS_BAR_ENABLED;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::metrics::run_all_metrics;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::*;

      use crate::constraint::{
          PrecomputeNode3Index, PrecomputedNodeContents, Trie3GodWrapper, LLMTokenBV, StateIDBV,
      };
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::constraint::StageVocab;
      use crate::trie3_opt::merge_global_atoms::MergeGlobalAtomsPass;

      /// Configuration for the coordinator: which passes to run and their key parameters.
      #[derive(Clone, Debug, Deserialize)]
      pub struct CoordinatorConfig {
          pub num_passes: usize,
          pub prune_dead_paths: bool,
          pub prune_unproductive_paths: bool,
          pub canonicalize_end_nodes: bool,
          pub compress_edges: bool,
          pub compress_unary_chains: bool,
          pub factor_common_destinations: bool,
          pub factor_common_destinations_min_incoming: usize,
          pub merge_structural: bool,
          pub merge_structural_max_iters: usize,
          pub merge_bisimulation: bool,
          pub merge_bisimulation_max_iters: usize,
          pub merge_global_atoms: bool,
          pub merge_global_atoms_max_iters: usize,
          pub merge_global_atoms_max_atoms_per_pop: usize,
          pub eliminate_pop0_except_roots: bool,
          pub merge_equivalent_llm_tokens: bool,
          pub reorder_llm_tokens: bool,
          pub generalize_sids: bool,
      }

      fn get_default_config_impl() -> CoordinatorConfig {
          CoordinatorConfig {
              num_passes: 3,
              prune_dead_paths: true,
              prune_unproductive_paths: true,
              canonicalize_end_nodes: true,
              compress_edges: true,
              compress_unary_chains: true,
              factor_common_destinations: true,
              factor_common_destinations_min_incoming: 12,
              merge_structural: true,
              merge_structural_max_iters: 4,
              merge_bisimulation: true,
              merge_bisimulation_max_iters: 1000,
              merge_global_atoms: true,
              merge_global_atoms_max_iters: 2,
              merge_global_atoms_max_atoms_per_pop: 4096,
              eliminate_pop0_except_roots: true,
              merge_equivalent_llm_tokens: true,
              reorder_llm_tokens: true,
              generalize_sids: true,
          }
      }

      static EFFECTIVE_CONFIG: Lazy<CoordinatorConfig> = Lazy::new(|| {
          let mut config = get_default_config_impl();
          if let Ok(json_str) = env::var("AICI_TRIE3_CONFIG") {
              if json_str.is_empty() {
                  return config;
              }
              match serde_json::from_str::<serde_json::Value>(&json_str) {
                  Ok(val) => {
                      if let serde_json::Value::Object(map) = val {
                          macro_rules! override_field {
                              ($field:ident, $type:ty, $as_fn:ident) => {
                                  if let Some(v) = map.get(stringify!($field)).and_then(|v| v.$as_fn()) {
                                      config.$field = v as $type;
                                  }
                              };
                              ($field:ident, $as_fn:ident) => {
                                  if let Some(v) = map.get(stringify!($field)).and_then(|v| v.$as_fn()) {
                                      config.$field = v;
                                  }
                              };
                          }
                          override_field!(num_passes, usize, as_u64);
                          override_field!(prune_dead_paths, as_bool);
                          override_field!(prune_unproductive_paths, as_bool);
                          override_field!(canonicalize_end_nodes, as_bool);
                          override_field!(compress_edges, as_bool);
                          override_field!(compress_unary_chains, as_bool);
                          override_field!(factor_common_destinations, as_bool);
                          override_field!(factor_common_destinations_min_incoming, usize, as_u64);
                          override_field!(merge_structural, as_bool);
                          override_field!(merge_structural_max_iters, usize, as_u64);
                          override_field!(merge_bisimulation, as_bool);
                          override_field!(merge_bisimulation_max_iters, usize, as_u64);
                          override_field!(merge_global_atoms, as_bool);
                          override_field!(merge_global_atoms_max_iters, usize, as_u64);
                          override_field!(merge_global_atoms_max_atoms_per_pop, usize, as_u64);
                          override_field!(eliminate_pop0_except_roots, as_bool);
                          override_field!(merge_equivalent_llm_tokens, as_bool);
                          override_field!(reorder_llm_tokens, as_bool);
                          override_field!(generalize_sids, as_bool);
                      } else {
                          eprintln!("[Trie3 Opt] WARNING: AICI_TRIE3_CONFIG is not a JSON object. Using default config.");
                      }
                  }
                  Err(e) => {
                      eprintln!("[Trie3 Opt] WARNING: Failed to parse AICI_TRIE3_CONFIG: {}. Using default config.", e);
                  }
              }
          }
          config
      });

      impl Default for CoordinatorConfig {
          fn default() -> Self {
              EFFECTIVE_CONFIG.clone()
          }
      }

      impl CoordinatorConfig {
          pub fn off() -> Self {
              Self {
                  num_passes: 0,
                  prune_dead_paths: false,
                  prune_unproductive_paths: false,
                  canonicalize_end_nodes: false,
                  compress_edges: false,
                  compress_unary_chains: false,
                  factor_common_destinations: false,
                  factor_common_destinations_min_incoming: 0,
                  merge_structural: false,
                  merge_structural_max_iters: 0,
                  merge_bisimulation: false,
                  merge_bisimulation_max_iters: 0,
                  merge_global_atoms: false,
                  merge_global_atoms_max_iters: 0,
                  merge_global_atoms_max_atoms_per_pop: 0,
                  eliminate_pop0_except_roots: false,
                  merge_equivalent_llm_tokens: false,
                  reorder_llm_tokens: false,
                  generalize_sids: false,
              }
          }
      }

      /// Build a default sequence of passes from config.
      fn build_pipeline(config: &CoordinatorConfig) -> Vec<Box<dyn OptimizationPass>> {
          let mut pipeline: Vec<Box<dyn OptimizationPass>> = Vec::new();

          // The pipeline is structured to run in super-passes.
          for pass_num in 0..config.num_passes {
              // Phase 1: Pruning and initial cleanup
              if config.prune_dead_paths {
                  pipeline.push(Box::new(PruneDeadPathsPass));
              }
              if config.prune_unproductive_paths {
                  pipeline.push(Box::new(PruneUnproductivePathsPass));
              }
              if config.canonicalize_end_nodes {
                  pipeline.push(Box::new(CanonicalizeEndNodesPass));
              }

              // Phase 2: Vocabulary and State ID optimization
              if config.merge_equivalent_llm_tokens {
                  pipeline.push(Box::new(MergeEquivalentLLMTokensPass));
              }
              if config.reorder_llm_tokens {
                  pipeline.push(Box::new(ReorderLLMTokensPass));
              }
              if config.generalize_sids {
                  pipeline.push(Box::new(GeneralizeSidsPass));
              }

              // Phase 3: Factoring and structural simplification
              if config.factor_common_destinations {
                  pipeline.push(Box::new(FactorCommonDestinationsPass::new(config.factor_common_destinations_min_incoming)));
              }

              // Phase 4: Edge compression and chain contraction
              if config.compress_edges {
                  pipeline.push(Box::new(CompressEdgesPass));
              }
              if config.compress_unary_chains {
                  pipeline.push(Box::new(CompressUnaryChainsPass));
              }

              // Phase 5: Heavy-duty merging passes
              if config.merge_global_atoms && config.merge_global_atoms_max_iters > 0 {
                  pipeline.push(Box::new(MergeGlobalAtomsPass::new(
                      config.merge_global_atoms_max_iters,
                      config.merge_global_atoms_max_atoms_per_pop,
                  )));
              }
              if config.merge_structural && config.merge_structural_max_iters > 0 {
                  pipeline.push(Box::new(MergeStructuralPass::new(config.merge_structural_max_iters)));
              }
              if pass_num == config.num_passes - 1 && config.merge_bisimulation && config.merge_bisimulation_max_iters > 0 {
                   pipeline.push(Box::new(MergeBisimulationPass::new(config.merge_bisimulation_max_iters)));
              }

              // Phase 6: Final cleanup within the loop
              if config.eliminate_pop0_except_roots {
                  pipeline.push(Box::new(EliminatePop0ExceptRootsPass));
              }
              if config.compress_edges { // Re-compress after merges and pop0 elim
                  pipeline.push(Box::new(CompressEdgesPass));
              }
          }

          // Final polish outside the main loop
          if config.canonicalize_end_nodes {
              pipeline.push(Box::new(CanonicalizeEndNodesPass));
          }

          pipeline
      }

      /// Convert the given precompute3 trie into a MiniTrie along with a stable list of root keys.
      pub(crate) fn export_to_mini(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) -> (MiniTrie, Vec<TokenizerStateID>, HashMap<PrecomputeNode3Index, NodeId>) {
          let mut mini = MiniTrie::new();
          let mut map_old_to_new: HashMap<PrecomputeNode3Index, NodeId> = HashMap::new();

          let all_nodes = Trie::all_nodes(trie3_god, &roots.values().cloned().collect::<Vec<_>>());

          // First, create all nodes in MiniTrie and map old to new
          #[cfg(not(rustrover))]
          let it_create = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (create nodes)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_create = all_nodes.iter();
          for old_idx in it_create {
              let end = old_idx.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
              let id = mini.add_node(end);
              map_old_to_new.insert(*old_idx, id);
          }

          // Mark roots in MiniTrie
          for r_idx in roots.values() {
              if let Some(&id) = map_old_to_new.get(r_idx) {
                  mini.add_root(id);
              }
          }

          // Second, add all edges
          #[cfg(not(rustrover))]
          let it_edges = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (add edges)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_edges = all_nodes.iter();
          for old_idx in it_edges {
              let new_id = *map_old_to_new.get(&old_idx).unwrap();
              let r = if let Some(g) = old_idx.read(trie3_god) { g } else { continue };

              for (ek, dm) in r.children() {
                  // Build token set
                  let mut toks = SortedSet::new();
                  if ek.1.is_all() {
                      toks = SortedSet::from_iter(0..=max_llm_token_id);
                  } else {
                      for t in ek.1.iter() {
                          toks.insert(t);
                      }
                  }
                  if toks.is_empty() {
                      continue;
                  }
                  let key = crate::trie3_opt::core::EdgeKey::new(ek.0, toks.clone());
                  for (dst, sids) in dm {
                      let dst_id = *map_old_to_new.get(dst).unwrap();
                      // Build state set
                      let mut st = SortedSet::new();
                      if sids.is_all() {
                          st = SortedSet::from_iter(0..=max_state_id);
                      } else {
                          for s in sids.iter() {
                              st.insert(s);
                          }
                      }
                      if !st.is_empty() {
                          mini.add_edge(new_id, key.clone(), dst_id, st);
                      }
                  }
              }
          }

          let root_keys = roots.keys().cloned().collect();
          (mini, root_keys, map_old_to_new)
      }

      /// Import a MiniTrie back into the precompute3 arena by constructing a fresh graph.
      /// - All new nodes are inserted; roots remapped to these.
      /// - Old nodes become unreachable and are GC'd.
      /// - live_tokens are recomputed from outgoing edges.
      /// - end flags are set from the mini-trie.
      pub(crate) fn import_from_mini(
          mini: &MiniTrie,
          root_keys: &[TokenizerStateID],
          trie3_god: &Trie3GodWrapper,
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          ctx: &OptimizationContext,
      ) {
          // Create all nodes first, and map MiniTrie NodeId to new PrecomputeNode3Index
          let mut id_map: BTreeMap<NodeId, PrecomputeNode3Index> = BTreeMap::new();
          for node_id in mini.node_ids() {
              let idx = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())));
              id_map.insert(node_id, idx);
          }

          // Fill end flags and edges
          for node in mini.nodes() {
              let idx = *id_map.get(&node.id()).unwrap();
              if let Some(mut w) = idx.write(trie3_god) {
                  w.value.end = node.is_end();

                  let mut children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTreeMap::new();

                  for (ek, dm) in node.children().iter() {
                      // Build LLMTokenBV from tokens set
                      let mut bv = LLMTokenBV::zeros();
                      for t in ek.tokens.iter() {
                          if t <= ctx.max_llm_token_id {
                              bv.insert(t);
                          }
                      }
                      if bv.is_empty() {
                          continue;
                      }

                      let entry = children.entry((ek.pop, bv)).or_insert_with(OrderedHashMap::new);
                      for (dst, sset) in dm {
                          let mut sbv = StateIDBV::zeros();
                          for s in sset.iter() {
                              if s <= ctx.max_state_id {
                                  sbv.insert(s);
                              }
                          }
                          if sbv.is_empty() {
                              continue;
                          }
                          let dst_idx = *id_map.get(dst).unwrap();
                          entry.entry(dst_idx)
                              .and_modify(|e| *e |= &sbv)
                              .or_insert(sbv);
                      }
                  }

                  // Recompute live tokens from children
                  let mut live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &children {
                      live |= llm_bv;
                  }
                  w.value.live_tokens = live;
                  *w.children_mut() = children;
              }
          }

          // Remap roots to new nodes
          roots.clear();
          for (key, nid) in root_keys.iter().zip(mini.root_ids.iter()) {
              if let Some(idx) = id_map.get(nid) {
                  roots.insert(*key, *idx);
              }
          }

          // GC and recompute depths
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec);
      }

      /// High-level entry point: export -> run passes on mini -> import.
      /// The coordinator isolates optimization authors from the full system types: they only need
      /// to implement passes over MiniTrie and add them to the pipeline here.
      pub fn run_pipeline_on_precompute3<'a>(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          config: CoordinatorConfig,
          stage_vocab: Option<&'a mut StageVocab>,
          parser: Option<&'a GLRParser>,
      ) {
          // Export the current graph into a minimal structure
          let (mut mini, root_keys, _old_mapping) =
              export_to_mini(roots, trie3_god, max_llm_token_id, max_state_id);

          // Build a fresh pass pipeline and context
          let mut ctx = OptimizationContext::new(max_llm_token_id, max_state_id);
          if let Some(sv) = stage_vocab {
              ctx.stage_vocab = Some(Rc::new(RefCell::new(sv)));
          }
          if let Some(p) = parser {
              ctx.parser = Some(Rc::new(RefCell::new(p)));
          }
          ctx.debug_level = 1;

          // Run initial metrics
          ctx.metrics_before = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(
                  1,
                  "[Trie3 Opt] Metrics before optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_before)
              );
          }

          let pipeline = build_pipeline(&config);

          // Run passes
          for pass in pipeline.iter() {
              if ctx.debug_level > 0 {
                  crate::debug!(1, "[Trie3 Opt] Running pass: {}", pass.name());
              }
              pass.run(&mut mini, &mut ctx);

              // After certain passes that are known to create garbage, run GC.
              let pass_name = pass.name();
              if pass_name == "PruneDeadPaths"
                  || pass_name == "PruneUnproductivePaths"
                  || pass_name == "MergeStructural"
                  || pass_name == "MergeBisimulation"
                  || pass_name == "MergeGlobalAtoms"
                  || pass_name == "EliminatePop0ExceptRoots"
                  || pass_name == "CompressUnaryChains"
              {
                  let before = mini.num_nodes();
                  mini.gc();
                  let after = mini.num_nodes();
                  if before != after && ctx.debug_level > 0 {
                      crate::debug!(
                          1,
                          "[Trie3 Opt] GC after '{}': nodes {} -> {}",
                          pass.name(),
                          before,
                          after
                      );
                  }
              }

              if ctx.debug_level > 0 {
                  let metrics = run_all_metrics(&mini);
                  crate::debug!(
                      1,
                      "[Trie3 Opt] Metrics after '{}': {}",
                      pass.name(),
                      crate::trie3_opt::metrics::pretty_print_metrics_map(&metrics)
                  );
              }
          }

          // Run final metrics
          ctx.metrics_after = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(1, "[Trie3 Opt] Metrics after optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_after)
              );
          }

          // Import the result back and finalize
          import_from_mini(&mini, &root_keys, trie3_god, roots, &ctx);
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::constraint::{LLMTokenBV, StateIDBV};
          use crate::datastructures::trie::Trie;
          use ordered_hash_map::OrderedHashMap;

          // A very basic roundtrip sanity test on a trivial graph.
          #[test]
          fn roundtrip_basic() {
              // Build a tiny God/arena with 2 nodes and one edge
              let arena = Trie3GodWrapper::new();

              let a_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));
              let b_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));

              {
                  let mut aw = a_idx.write(&arena).unwrap();
                  aw.value.end = false;

                  let mut bv = LLMTokenBV::zeros();
                  bv.insert(1);
                  bv.insert(3);

                  let mut sids = StateIDBV::zeros();
                  sids.insert(2);
                  sids.insert(4);

                  let mut dm = OrderedHashMap::new();
                  dm.insert(b_idx, sids);

                  aw.children_mut().insert((0isize, bv), dm);

                  // live tokens is derived but we'll set for completeness
                  let mut live = LLMTokenBV::zeros();
                  for ((_, l), _) in aw.children() {
                      live |= l;
                  }
                  aw.value.live_tokens = live;
              }
              {
                  let mut bw = b_idx.write(&arena).unwrap();
                  bw.value.end = true;
              }

              let mut roots = BTreeMap::new();
              roots.insert(TokenizerStateID(0), a_idx);

              let cfg = CoordinatorConfig::default();

              run_pipeline_on_precompute3(
                  &mut roots,
                  &arena,
                  10, // max token id
                  10, // max state id
                  cfg,
                  None,
                  None,
              );

              // After running, ensure roots still exist and points to some node.
              assert!(roots.get(&TokenizerStateID(0)).is_some());
          }
      }
    src/trie3_opt/passes/compress_unary_chains.rs: |
      use std::collections::{BTreeSet, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct CompressUnaryChainsPass;

      impl OptimizationPass for CompressUnaryChainsPass {
          fn name(&self) -> &'static str {
              "CompressUnaryChains"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let roots_set: BTreeSet<NodeId> = trie.root_ids.iter().cloned().collect();
              let max_iters = 8;
              for _ in 0..max_iters {
                  let mut indegree: HashMap<NodeId, usize> = HashMap::new();
                  let mut unique_parent: HashMap<NodeId, (NodeId, EdgeKey)> = HashMap::new();
                  let mut out_info: HashMap<NodeId, (EdgeKey, NodeId, crate::trie3_opt::core::SortedSet)> =
                      HashMap::new();

                  for node in trie.nodes() {
                      let node_id = node.id();
                      for (ek, dm) in node.children() {
                          for (dst, _) in dm {
                              let count = indegree.entry(*dst).or_default();
                              *count += 1;
                              if *count == 1 {
                                  unique_parent.insert(*dst, (node.id(), ek.clone()));
                              } else {
                                  unique_parent.remove(dst);
                              }
                          }
                      }
                      if node.is_end() {
                          continue;
                      }
                      let mut total_dests = 0;
                      let mut only_edge = None;
                      for (ek, dm) in node.children() {
                          for (dst, sids) in dm {
                              total_dests += 1;
                              if total_dests == 1 {
                                  only_edge = Some((ek.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                      if total_dests == 1 {
                          let (ek, dst, sids) = only_edge.unwrap();
                          out_info.insert(node_id, (ek, dst, sids));
                      }
                  }

                  let mut rewrites = vec![];
                  for u_id in trie.node_ids() {
                      if roots_set.contains(&u_id) {
                          continue;
                      }
                      if let (Some((out_key, v_id, s_uv)), Some((p_id, in_key))) =
                          (out_info.get(&u_id), unique_parent.get(&u_id))
                      {
                          if p_id != &u_id && in_key.pop == out_key.pop && in_key.tokens == out_key.tokens
                          {
                              rewrites.push((*p_id, u_id, *v_id, in_key.clone(), s_uv.clone()));
                          }
                      }
                  }

                  if rewrites.is_empty() {
                      break;
                  }

                  for (p_id, u_id, v_id, key, s_uv) in rewrites {
                      if let Some(s_pu) = trie.remove_edge_dest(p_id, &key, u_id) {
                          let s_comp = s_pu.intersect(&s_uv);
                          if !s_comp.is_empty() {
                              trie.add_edge(p_id, key, v_id, s_comp);
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/merge_structural.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Merge nodes with identical structure via iterative refinement. Signature includes:
      /// - End flag
      /// - For each edge-key: (pop, tokens) and destination-class aggregated states.
      /// This is a simplified variant of the structural merge in the large pipeline, implemented
      /// purely over the MiniTrie.
      pub struct MergeStructuralPass {
          pub max_iters: usize,
      }

      impl MergeStructuralPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeStructuralPass {
          fn name(&self) -> &'static str {
              "MergeStructural"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let dense_of: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              // Initial classes by end flag and out-degree
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class = 0usize;
              for (i, node_id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*node_id).unwrap();
                  let key = (node.is_end(), node.out_degree());
                  let cid = *class_map.entry(key).or_insert_with(|| {
                      let v = next_class;
                      next_class += 1;
                      v
                  });
                  prev_class[i] = cid;
              }

              // Refine until convergence. If a max_iters budget is provided and we do not
              // converge within that budget, abort without changing the trie to preserve semantics.
              let mut iter_count = 0usize;
              loop {
                  // Build signature per node
                  // Build signature per node
                  #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug, Hash)]
                  struct EdgeSig {
                      pop: isize,
                      tokens: SortedSet,
                      dest: Vec<(usize, SortedSet)>, // dest_class, states
                  }
                  type NodeSig = (bool, Vec<EdgeSig>);

                  let mut new_class: Vec<usize> = vec![0; n];
                  let mut next = 0usize;
                  let mut changes = 0usize;

                  for (i, node_id) in node_ids.iter().enumerate() {
                      let node = trie.get_node(*node_id).unwrap();
                      // Aggregate by (pop, tokens) -> dest_class -> union of states
                      let mut sig_to_id: HashMap<NodeSig, usize> = HashMap::new();

                      let mut per_key: BTreeMap<(isize, SortedSet), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in node.children() {
                          let inner = per_key.entry((ek.pop, ek.tokens.clone())).or_default();
                          for (dst, sids) in dm.iter() {
                              let d_dense = *dense_of.get(dst).unwrap();
                              let d_class = prev_class[d_dense];
                              let entry = inner.entry(d_class).or_default();
                              entry.union_inplace(sids);
                          }
                      }

                      // Build canonical signature vector
                      let mut esigs: Vec<EdgeSig> = Vec::with_capacity(per_key.len());
                      for ((pop, toks), dm_class) in per_key.into_iter() {
                          let mut dest_vec: Vec<(usize, SortedSet)> = dm_class.into_iter().collect();
                          dest_vec.sort_unstable_by(|a, b| {
                              let c = a.0.cmp(&b.0);
                              if c != std::cmp::Ordering::Equal {
                                  return c;
                              }
                              a.1.cmp(&b.1)
                          });
                          esigs.push(EdgeSig {
                              pop,
                              tokens: toks,
                              dest: dest_vec,
                          });
                      }
                      let sig: NodeSig = (node.is_end(), esigs);

                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let v = next;
                          next += 1;
                          v
                      });
                      new_class[i] = cid;
                      if new_class[i] != prev_class[i] {
                          changes += 1;
                      }
                  }
                  // If no change, we've reached a fixed point and can proceed to merge.
                  if changes == 0 {
                      prev_class = new_class;
                      break;
                  }
                  prev_class = new_class;

                  iter_count += 1;
                  if self.max_iters > 0 && iter_count >= self.max_iters {
                      // Did not converge within the configured budget; to preserve semantics,
                      // abort this pass without modifying the trie.
                      return;
                  }
              }

              // Build representative mapping
              let num_classes = prev_class.iter().max().map(|x| *x + 1).unwrap_or(0);
              let mut rep_of_class: Vec<Option<NodeId>> = vec![None; num_classes];
              for (i, &cid) in prev_class.iter().enumerate() {
                  if rep_of_class[cid].is_none() {
                      rep_of_class[cid] = Some(node_ids[i]);
                  }
              }
              let mut rep_of_node: HashMap<NodeId, NodeId> = HashMap::with_capacity(n);
              for (i, node_id) in node_ids.iter().enumerate() {
                  let cid = prev_class[i];
                  rep_of_node.insert(*node_id, rep_of_class[cid].unwrap());
              }

              for (cid, rep_id_opt) in rep_of_class.iter().enumerate() {
                  if let Some(rep_id) = rep_id_opt {
                      let exemplar_idx = prev_class.iter().position(|&c| c == cid).unwrap();
                      let exemplar_node = trie.get_node(node_ids[exemplar_idx]).unwrap().clone();

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          let mut new_dm: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                          for (dst, sids) in dm {
                              let rep = *rep_of_node.get(dst).unwrap();
                              new_dm.entry(rep).or_default().union_inplace(sids);
                          }
                          if !new_dm.is_empty() {
                              new_children.insert(ek.clone(), new_dm);
                          }
                      }
                      trie.set_children(*rep_id, new_children);
                  }
              }

              let rep_set: std::collections::HashSet<NodeId> =
                  rep_of_class.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false);
                  }
              }

              trie.root_ids = trie
                  .root_ids
                  .iter()
                  .map(|r| *rep_of_node.get(r).unwrap())
                  .collect();
          }
      }
