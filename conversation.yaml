              }
          }

          pub(crate) fn internal() -> Self {
              Self {
                  live_tokens: LLMTokenBV::zeros(),
                  final_tokenizer_state: None,
              }
          }

          pub(crate) fn leaf(final_sid: TokenizerStateID) -> Self {
              Self { live_tokens: LLMTokenBV::zeros(), final_tokenizer_state: Some(final_sid) }
          }
      }

