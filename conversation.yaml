              expr = pegen_to_sep1_regex(item.node, memo)
              sep = pegen_to_sep1_regex(item.separator, memo)
              return ge.sequence([expr, ge.repeat(ge.sequence([sep, expr]))])
          elif isinstance(item, pegen.grammar.Repeat0):
