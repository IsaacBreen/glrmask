      Here was my original prompt for creating the GSS code:

      > Create a new implementation of GSS.
      > 
      > This impl should be a graph. Edges will carry T. But also max depth.
      > a map from a parent to its children could be a map T -> max depth -> node
      > This should reduce unnecessary merges in some cases. e.g. imagine we have these stacks (same acc - doesn't matter):
      > - [1,2,3,4]
      > - [1,2,4]
      > Could be this
      > A <-1- B <-2- C <-3- D <-4- E
      > C <-4- E
      > this'd be an efficient representation. But it requires us to have 2 edges to different nodes on E with T=4. So we'd be required to merge more eagerly.
      > having max depth solves this.
      > 
      > I want Accs in this implementation to existing only at one 'level', if that makes sense.
      > ie either all of a node's children have Accs, or none of them do. And if the parent has an acc then none of its children do.
      > And it should be maintained such that if all the children's accs are equal, the accs are sucked up into the parent. ie they aren't at the children any more.
      > So, if the children of a node have accs, then there must be at least one inequality between them.
      > 
      > We can enforce that Accs can only exist at one level by defining different types of node: type A that can be either root or an internal node that maps to other type As, and type B that can either contain type A and an Acc OR that maps to other type Bs. 'Contain' here means just contains one - wraps. Maps means contains a node map.
      > If we were working in Rust, these'd both be enums.
      > 
      > Oh except that type B can also be a variant that represents 'empty' or having 'no stacks'. Having 'no stack' is different from having 'an empty stack'.
      > 
      > When I say accs only exist at one 'level', I don't mean they necessarily exist all at the same depth. But rather that if we drew the GSS on a page top to bottom, and drew a dot where each acc exists, then drew a line through the accs, the line would go up and down but would always go right, or left, on the page. ie each x-value in the line has exactly one y-value. (But not that it'd be a straight line.)
      > 
      > These are just the invariants I want. How you achieve them is up to you. Do it as elegantly as possible.
      > 
      > It should behave equivalently to reference_impl.py (with the caveat that reduce_acc is only guaranteed to output the same value between impls as long as the reduce closure is order-independent.)

      The main type we deal with should be `LeveledGSS`. But this itself should be a union of three variants: containing A and Acc, mapping to other Bs, or being empty. And A should also be a union of variants: one that represents being a root node, one for an internal node that maps to other type As.

      The 'suck up' logic, in terms of types A and B etc, means this:
      - Suppose we have a node of type B of the variant that that maps to other nodes of type B.
      - Suppose all of those children are nodes of type B of the other variant -- the one that that contains a node of type A and an Acc.
      - Suppose the Accs in these children are all equal.
      - Then we can suck up the Acc into the parent.
      - The parent becomes a node (still of type B) of the variant that contains a node of type A and Acc.
      - The Acc it contains is the one on the children.
      - The node of type A it contains is a new node of the type A variant that maps to other type A nodes.
      - Its children are each of the type A nodes inside the type B children of the original parent. They carry the same Ts.
      ie we go from a type B node pointing to other type B nodes, to a type B node containing a type A node (and an Acc) that points to other type A nodes. And those child type A nodes are all those type B nodes that the original parent pointed to.

      It's crucial to use memoization in `apply` to ensure that shared nodes remain shared.


      Here's the node types in Rust, to show you what I mean:

      ```rust
      use std::collections::HashMap;
      use std::rc::Rc;

      #[derive(Debug, Clone)]
      pub enum LeveledGSS<T, Acc> {
          WithAcc {
              node: LeveledGSSInner<T>,
              acc: Acc,
          },
          Internal(HashMap<T, HashMap<usize, Rc<LeveledGSS<T, Acc>>>>),
          Empty,
      }

      #[derive(Debug, Clone)]
      pub enum LeveledGSSInner<T> {
          Root,
          Internal(HashMap<T, HashMap<usize, Rc<LeveledGSSInner<T>>>>),
      }
      ```
