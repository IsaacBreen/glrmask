      *   `pub fn all_nodes(arena: &Arena<Trie<EK, EV, T>>, roots: &[Trie2Index]) -> Vec<Trie2Index>`: Collects all unique nodes reachable from the given roots via BFS.
      *   `pub fn gc(arena: &Arena<Self>, roots: &[Trie2Index])`: Performs garbage collection, keeping only nodes reachable from `roots`.
      *   `pub fn recompute_all_max_depths(arena: &Arena<Trie<EK, EV, T>>, roots: &[Trie2Index])`: Recomputes `max_depth` for all nodes reachable from `roots` using a topological sort.
      *   `pub fn recompute_max_depth(&mut self, arena: &Arena<Trie<EK, EV, T>>) -> bool`: Recomputes the `max_depth` of this node based on its children's depths.
      *   `pub fn has_cycle(arena: &Arena<Trie<EK, EV, T>>, roots: impl IntoIterator<Item = Trie2Index>) -> bool`: Detects if there are any cycles in the graph reachable from the given roots.
      *   `pub fn stats(arena: &Arena<Self>, roots: &[Trie2Index]) -> TrieStats`: Computes statistics for the graph reachable from the given roots.
      *   `pub fn are_graphs_equal(arena_a: &Arena<Trie<EK, EV, T>>, a_idx: Trie2Index, arena_b: &Arena<Trie<EK, EV, T>>, b_idx: Trie2Index) -> bool`: Recursively compares two graphs for deep equality.
      *   `pub fn get_all_paths<F>(arena: &Arena<Self>, roots: &[Trie2Index], is_end: F) -> Vec<(T, Vec<(EK, EV, T)>)>`: Traverses the graph and returns all paths ending in a node that satisfies a predicate.
      *   `pub fn pretty_print(arena: &Arena<Self>, roots: &[Trie2Index]) -> String`: Pretty-prints the trie structure starting from the given roots.
      *   `pub fn pretty_print_arena(arena: &Arena<Self>) -> String`: Pretty-prints the entire trie structure in the arena, identifying roots automatically.
      *   `pub fn deep_copy_subtrees(source_arena: &Arena<Self>, roots: &[Trie2Index]) -> (Arena<Self>, Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`: Deep copies subtrees from a source arena into a new arena.
      *   `pub fn deep_copy_subtrees_into(source_arena: &Arena<Self>, dest_arena: &Arena<Self>, roots: &[Trie2Index]) -> (Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`: Deep copies subtrees from a source arena into an existing destination arena.
      *   `pub fn special_map<V: Clone>(...)`: Performs a specialized breadth-first traversal for propagation, processing nodes and edges individually.
      *   `pub fn special_map_grouped<V, S, I>(...)`: A more efficient version of `special_map` that groups children by edge key before processing.

