      Let's do this instead:

      Consider what we do when we traverse an edge (in the closure in get_mask).
      We feed apply the edge mask to the parser state, and feed the grammar token into the parser state.
      We return the resulting parse state.
      special_map merges if multiple parse states arrive at a trie node.

      Now, imagine the destination node is an 'end' node.
      The parser state at the end node is irrelevant (assuming it's valid of course). The simple fact that we've reached the end node means that any LLM tokens active here are valid and should be added to the mask. No further grammar tokens will be fed into it, and nothing more is needed from it. The parser state has served its purpose.
      Hence, any call to the 'merge' closure (to merge parser states that arrive at this node) is a waste if it doesn't change the active LLM tokens (and only if it doesn't change them).

      We can use this fact to avoid calling `step` unnecessarily, which is great because `step` is expensive, under these circumstances:
      - the destination node is an end node
      - the intersection of the allowed LLM tokens on the edge and the active LLM tokens in the parser state is a subset of the current mask
          - this is equivalent to saying 'if `step` were to succeed (that is, it doesn't make the parser state invalid), then it wouldn't have any effect on the output mask anyway'

