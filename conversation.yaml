      - File: src/constraint_precompute3_challenge_elimination.rs
      - Change the constant DEBUG_MISMATCHES from true to false.
      - Add a helper function debug_mismatches_enabled that reads an environment variable to turn debugging back on when needed.
      - Replace the direct use of DEBUG_MISMATCHES in eliminate_pushes_and_pops with a call to debug_mismatches_enabled().

      Why: The debug mode runs both implementations, possibly multiple times with deep copies and refinement. Turning it off reduces duplication and avoids heavy slowdowns during normal builds. You can still enable it on demand via env var.

      2) Memoize elimination results to avoid repeated BFS from the same (dst, push_bv)
      - File: src/constraint_precompute3_challenge_elimination.rs
      - In run_trie_based_elimination, add a per-round cache: exit_cache: BTreeMap<(usize, StateIDBV), Vec<Exit>>.
      - Before calling compute_push_elim_exits, check the cache and reuse results when (dst, push_bv) repeats.

      Why: Many push edges share the same destination and push bitset. This change reuses the BFS results, dramatically reducing repeated work.

      3) Stop materializing new Push edges for “BlockedPush” exits
      - File: src/constraint_precompute3_challenge_elimination.rs
      - In run_trie_based_elimination, when handling an Exit::BlockedPush:
