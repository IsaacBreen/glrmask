          fn eat_u8_choice(s: &str) -> Expr {
              Expr::U8Class(U8Set::from_bytes(s.as_bytes()))
          }

          // Helper function to create Expr::U8Class for any byte except the given one
          fn eat_u8_negation_class(byte: u8) -> Expr {
              let mut set = U8Set::all();
              set.remove(byte);
              Expr::U8Class(set)
          }

