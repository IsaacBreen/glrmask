      // src/constraint_precompute3_intermediate_utils.rs
      use crate::constraint::{
          IntermediatePrecomputeNode3, IntermediatePrecomputeNode3Index, IntermediateTrie3EdgeKey,
          IntermediateTrie3GodWrapper, LLMTokenBV,
      };
      use crate::datastructures::ordered_hash_map::Retain;
      use crate::datastructures::trie::Trie;
      use crate::r#macro::is_debug_level_enabled;
      use std::collections::{BTreeSet, HashMap, HashSet, VecDeque};

      /// Normalizes a path for comparison purposes.
      /// - Removes NoOp edges.
      /// - Collects all CheckLLM bitvectors, intersects them, and prepends a single CheckLLM.
      pub(crate) fn normalize_path(path: Vec<IntermediateTrie3EdgeKey>) -> Vec<IntermediateTrie3EdgeKey> {
          let mut combined_llm_bv = LLMTokenBV::max_ones();
          let mut has_llm_check = false;

          let mut other_ops: Vec<IntermediateTrie3EdgeKey> = path
              .into_iter()
              .filter(|ek| {
                  if let IntermediateTrie3EdgeKey::CheckLLM(bv) = ek {
                      combined_llm_bv &= bv;
                      has_llm_check = true;
                      false // remove from path
                  } else {
                      !matches!(ek, IntermediateTrie3EdgeKey::NoOp)
                  }
              })
              .collect();

          if has_llm_check {
              other_ops.insert(0, IntermediateTrie3EdgeKey::CheckLLM(combined_llm_bv));
          }

          other_ops
      }

      pub fn optimize_intermediate_trie3_template(
          start_node: &IntermediatePrecomputeNode3Index,
          end_node: &IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
      ) {
          let mut pinned: HashSet<IntermediatePrecomputeNode3Index> = HashSet::new();
          pinned.insert(*start_node);
          pinned.insert(*end_node);

          for _ in 0..3 {
              let mut changed = false;
              changed |= prune_unproductive_nodes(&[*start_node], end_node, god);
              changed |= compress_noop_only_nodes(&[*start_node], &pinned, god);
              changed |= structural_merge_nodes_in_subgraph(&[*start_node], &pinned, god);
              changed |= prune_unproductive_nodes(&[*start_node], end_node, god);
              if !changed {
                  break;
              }
          }
      }

      pub fn optimize_intermediate_trie3(
          roots: &[IntermediatePrecomputeNode3Index],
          end_node: &IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
      ) {
          if is_debug_level_enabled(2) {
              let mut stats = crate::constraint_extra::PrecomputeStats::default();
              crate::constraint_extra::calculate_intermediate_stats3(roots, &mut stats, god);
              crate::constraint_extra::print_intermediate_stats3(&stats, god);
          }
          for _ in 0..2 {
              let changed = prune_unproductive_nodes(roots, end_node, god);
              if !changed {
                  break;
              }
          }
      }

      /// Prunes nodes in a graph that cannot reach the specified `end_node`.
      /// Returns true if any edges were pruned.
      fn prune_unproductive_nodes(
          start_nodes: &[IntermediatePrecomputeNode3Index],
          end_node: &IntermediatePrecomputeNode3Index,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let all_nodes_vec = Trie::all_nodes(god, start_nodes);
          if all_nodes_vec.is_empty() {
              return false;
          }
          let all_nodes_in_subgraph: HashSet<_> = all_nodes_vec.into_iter().collect();

          // Build reverse adjacency map for the subgraph
          let mut incoming: HashMap<IntermediatePrecomputeNode3Index, Vec<IntermediatePrecomputeNode3Index>> =
              HashMap::new();
          for src in &all_nodes_in_subgraph {
              if let Some(g) = src.read(god) {
                  for (_ek, dm) in g.children() {
                      for (dst, _) in dm {
                          // Only consider edges within the subgraph
                          if all_nodes_in_subgraph.contains(dst) {
                              incoming.entry(*dst).or_default().push(*src);
                          }
                      }
                  }
              }
          }

          // Reverse BFS from end_node to find all productive nodes
          let mut productive: HashSet<IntermediatePrecomputeNode3Index> = HashSet::new();
          let mut q: VecDeque<IntermediatePrecomputeNode3Index> = VecDeque::new();

          if all_nodes_in_subgraph.contains(end_node) {
              productive.insert(*end_node);
              q.push_back(*end_node);
          }

          while let Some(d) = q.pop_front() {
              if let Some(srcs) = incoming.get(&d) {
                  for s in srcs {
                      if productive.insert(*s) {
                          q.push_back(*s);
                      }
                  }
              }
          }

          if all_nodes_in_subgraph.len() == productive.len() {
              return false;
          }

          let mut changed = false;
          // Remove any edge pointing to a non-productive destination
          for n in &all_nodes_in_subgraph {
              if !productive.contains(n) {
                  continue; // This node will be GC'd anyway, no need to edit its edges.
              }
              if let Some(mut w) = n.write(god) {
                  let original_edge_count: usize = w.children().values().map(|dm| dm.len()).sum();
                  w.children_mut().retain(|_ek, dm| {
                      dm.retain(|dst, _| productive.contains(dst));
                      !dm.is_empty()
                  });
                  let new_edge_count: usize = w.children().values().map(|dm| dm.len()).sum();
                  if new_edge_count < original_edge_count {
                      changed = true;
                  }
              }
          }

          changed
      }

      /// Compresses nodes whose outgoing edges are all NoOp by bypassing them.
      /// Pinned nodes are never removed (e.g., template start/end).
      fn compress_noop_only_nodes(
          start_nodes: &[IntermediatePrecomputeNode3Index],
          pinned: &HashSet<IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let all_nodes_vec = Trie::all_nodes(god, start_nodes);
          if all_nodes_vec.is_empty() {
              return false;
          }
          let all_nodes_in_subgraph: HashSet<_> = all_nodes_vec.into_iter().collect();

          // Build incoming map with edge keys
          let mut incoming: HashMap<
              IntermediatePrecomputeNode3Index,
              Vec<(
                  IntermediatePrecomputeNode3Index,
                  crate::constraint::IntermediateTrie3EdgeKey,
              )>,
          > = HashMap::new();

          for src in &all_nodes_in_subgraph {
              if let Some(g) = src.read(god) {
                  for (ek, dm) in g.children() {
                      for (dst, _) in dm {
                          if all_nodes_in_subgraph.contains(dst) {
                              incoming
                                  .entry(*dst)
                                  .or_default()
                                  .push((*src, ek.clone()));
                          }
                      }
                  }
              }
          }

          // Identify compressible nodes: non-pinned, non-end, and all outgoing edges are NoOp
          let mut compressible: Vec<IntermediatePrecomputeNode3Index> = Vec::new();
          for n in &all_nodes_in_subgraph {
              if pinned.contains(n) {
                  continue;
              }
              if let Some(g) = n.read(god) {
                  if g.value.end {
                      continue;
                  }
                  let mut has_edges = false;
                  let mut only_noop = true;
                  for (ek, dm) in g.children() {
                      if !dm.is_empty() {
                          has_edges = true;
                      }
                      if !matches!(ek, crate::constraint::IntermediateTrie3EdgeKey::NoOp) {
                          only_noop = false;
                          break;
                      }
                  }
                  if has_edges && only_noop {
                      compressible.push(*n);
                  }
              }
          }

          if compressible.is_empty() {
              return false;
          }

          let mut changed = false;

          // For each compressible node, redirect all incoming edges to its NoOp destinations
          for n in compressible {
              // Snapshot NoOp destinations
              let noop_dests: Vec<IntermediatePrecomputeNode3Index> = if let Some(g) = n.read(god) {
                  g.children()
                      .get(&crate::constraint::IntermediateTrie3EdgeKey::NoOp)
                      .map(|dm| dm.keys().cloned().collect())
                      .unwrap_or_default()
              } else {
                  Vec::new()
              };

              if noop_dests.is_empty() {
                  continue;
              }

              if let Some(preds) = incoming.get(&n) {
                  for (pred, ek) in preds {
                      if let Some(mut w) = pred.write(god) {
                          let dest_map = w.children_mut().entry(ek.clone()).or_default();
                          // Remove pred -> n under this key
                          dest_map.remove(&n);
                          // Add pred -> each NoOp destination under the same key
                          for d in &noop_dests {
                              dest_map.insert(*d, ());
                          }
                          changed = true;
                      }
                  }
              }
          }

          changed
      }

      #[derive(Clone, PartialEq, Eq, Hash)]
      struct NodeSignature {
          end: bool,
          // For determinism: edge keys sorted; each has sorted child-colors
          edges: Vec<(crate::constraint::IntermediateTrie3EdgeKey, Vec<u64>)>,
      }

      /// Merges structurally equivalent nodes within the reachable subgraph, except pinned nodes.
      /// Works across multiple roots if provided.
      pub(crate) fn structural_merge_nodes_in_subgraph(
          start_nodes: &[IntermediatePrecomputeNode3Index],
          pinned: &HashSet<IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          let all_nodes_vec = Trie::all_nodes(god, start_nodes);
          if all_nodes_vec.is_empty() {
              return false;
          }
          let all_nodes_in_subgraph: HashSet<_> = all_nodes_vec.into_iter().collect();

          // Snapshot outgoing children for each node within the subgraph for stable iteration
          let mut outgoing: HashMap<
              IntermediatePrecomputeNode3Index,
              Vec<(
                  crate::constraint::IntermediateTrie3EdgeKey,
                  Vec<IntermediatePrecomputeNode3Index>,
              )>,
          > = HashMap::new();

          for n in &all_nodes_in_subgraph {
              if let Some(g) = n.read(god) {
                  let mut edges: Vec<(
                      crate::constraint::IntermediateTrie3EdgeKey,
                      Vec<IntermediatePrecomputeNode3Index>,
                  )> = Vec::new();
                  for (ek, dm) in g.children() {
                      let mut kids: Vec<_> = dm
                          .keys()
                          .cloned()
                          .filter(|k| all_nodes_in_subgraph.contains(k))
                          .collect();
                      kids.sort(); // ensure deterministic order of children
                      edges.push((ek.clone(), kids));
                  }
                  edges.sort_by(|a, b| a.0.cmp(&b.0)); // deterministic by edge key
                  outgoing.insert(*n, edges);
              }
          }

          // Build incoming (pred, edge_key) list for rewrites
          let mut incoming: HashMap<
              IntermediatePrecomputeNode3Index,
              Vec<(
                  IntermediatePrecomputeNode3Index,
                  crate::constraint::IntermediateTrie3EdgeKey,
              )>,
          > = HashMap::new();
          for (src, edges) in &outgoing {
              for (ek, kids) in edges {
                  for k in kids {
                      incoming
                          .entry(*k)
                          .or_default()
                          .push((*src, ek.clone()));
                  }
              }
          }

          // Use pinned set as-is for global cross-template optimization
          let pinned_ext = pinned.clone();

          // Iterative color refinement on DAG-like structure (robust even if cycles appear).
          let mut color: HashMap<IntermediatePrecomputeNode3Index, u64> = HashMap::new();
          let mut next_color: HashMap<NodeSignature, u64> = HashMap::new();

          // Seed: base color by end flag and out-degree patterns only (ignore incoming context).
          for n in &all_nodes_in_subgraph {
              let end_flag = if let Some(g) = n.read(god) {
                  g.value.end
              } else {
                  false
              };
              let out_deg_summary: Vec<(crate::constraint::IntermediateTrie3EdgeKey, usize)> = outgoing
                  .get(n)
                  .map(|v| v.iter().map(|(ek, kids)| (ek.clone(), kids.len())).collect())
                  .unwrap_or_default();
              let mut out_sig_part: Vec<_> = out_deg_summary
                  .into_iter()
                  .map(|(ek, cnt)| (ek, vec![cnt as u64]))
                  .collect();
              out_sig_part.sort_by(|a, b| a.0.cmp(&b.0));

              let sig = NodeSignature {
                  end: end_flag,
                  edges: out_sig_part,
              };
              let len = next_color.len();
              let id = *next_color.entry(sig).or_insert(len as u64 + 1);
              color.insert(*n, id);
          }

          // Refine up to a bounded number of iterations or until convergence
          for _ in 0..16 {
              let mut changed = false;
              let mut interner: HashMap<NodeSignature, u64> = HashMap::new();
              let mut new_color: HashMap<IntermediatePrecomputeNode3Index, u64> = HashMap::new();

              for n in &all_nodes_in_subgraph {
                  let end_flag = if let Some(g) = n.read(god) {
                      g.value.end
                  } else {
                      false
                  };
                  let mut edges_sig: Vec<(crate::constraint::IntermediateTrie3EdgeKey, Vec<u64>)> =
                      Vec::new();
                  if let Some(edges) = outgoing.get(n) {
                      for (ek, kids) in edges {
                          let mut kid_colors: Vec<u64> =
                              kids.iter().map(|k| *color.get(k).unwrap_or(&0)).collect();
                          kid_colors.sort_unstable();
                          edges_sig.push((ek.clone(), kid_colors));
                      }
                      edges_sig.sort_by(|a, b| a.0.cmp(&b.0));
                  }

                  // Ignore incoming context for equivalence; only outgoing structure + end flag matters.
                  let sig = NodeSignature {
                      end: end_flag,
                      edges: edges_sig,
                  };
                  let len = interner.len();
                  let id = *interner.entry(sig).or_insert(len as u64 + 1);
                  if color.get(n).copied().unwrap_or(0) != id {
                      changed = true;
                  }
                  new_color.insert(*n, id);
              }

              color = new_color;
              if !changed {
                  break;
              }
          }

          // Group nodes by final color
          let mut groups: HashMap<u64, Vec<IntermediatePrecomputeNode3Index>> = HashMap::new();
          for (n, c) in &color {
              groups.entry(*c).or_default().push(*n);
          }

          let mut any_changed = false;

          // Helper: reachability check within the current subgraph snapshot, memoized.
          let mut reach_memo: HashMap<
              (
                  IntermediatePrecomputeNode3Index,
                  IntermediatePrecomputeNode3Index,
              ),
              bool,
          > = HashMap::new();
          let mut is_reachable =
              |src: IntermediatePrecomputeNode3Index, dst: IntermediatePrecomputeNode3Index| -> bool {
                  if src == dst {
                      return true;
                  }
                  if let Some(&cached) = reach_memo.get(&(src, dst)) {
                      return cached;
                  }
                  let mut found = false;
                  let mut visited: HashSet<IntermediatePrecomputeNode3Index> = HashSet::new();
                  let mut q: VecDeque<IntermediatePrecomputeNode3Index> = VecDeque::new();
                  visited.insert(src);
                  q.push_back(src);
                  while let Some(n) = q.pop_front() {
                      if let Some(edges) = outgoing.get(&n) {
                          'edge_loop: for (_ek, kids) in edges {
                              for k in kids {
                                  if *k == dst {
                                      found = true;
                                      break 'edge_loop;
                                  }
                                  if visited.insert(*k) {
                                      q.push_back(*k);
                                  }
                              }
                          }
                      }
                      if found {
                          break;
                      }
                  }
                  reach_memo.insert((src, dst), found);
                  found
              };

          // Build representative map that respects pinned nodes and avoids merging nodes
          // that are reachable from one another (in either direction).
          // - All pinned nodes map to themselves (never merged).
          // - Non-pinned nodes: greedily merge into a canonical only if they are pairwise
          //   non-reachable with that canonical (prevents creating self-loops and losing paths).
          let mut rep: HashMap<IntermediatePrecomputeNode3Index, IntermediatePrecomputeNode3Index> =
              HashMap::new();
          let mut victims: Vec<IntermediatePrecomputeNode3Index> = Vec::new();
          for (_c, nodes) in groups {
              // Partition by pinned status
              let mut non_pinned: Vec<_> = nodes
                  .iter()
                  .cloned()
                  .filter(|n| !pinned_ext.contains(n))
                  .collect();
              let mut pinned_nodes: Vec<_> = nodes
                  .iter()
                  .cloned()
                  .filter(|n| pinned_ext.contains(n))
                  .collect();
              non_pinned.sort(); // deterministic order
              pinned_nodes.sort(); // deterministic order

              // Pinned nodes are always their own representative
              for p in pinned_nodes {
                  rep.insert(p, p);
              }
              // Greedy antichain among non-pinned nodes
              let mut canonicals: Vec<IntermediatePrecomputeNode3Index> = Vec::new();
              for v in non_pinned {
                  let mut merged = false;
                  for &c in &canonicals {
                      if !is_reachable(v, c) && !is_reachable(c, v) {
                          rep.insert(v, c);
                          victims.push(v);
                          merged = true;
                          break;
                      }
                  }
                  if !merged {
                      rep.insert(v, v);
                      canonicals.push(v);
                  }
              }
          }

          // Union outgoing edges from all nodes into their representative, mapping destinations to representatives.
          // Do this only for edges within the reachable subgraph snapshot.
          let mut to_add: HashMap<
              (
                  IntermediatePrecomputeNode3Index,
                  crate::constraint::IntermediateTrie3EdgeKey,
              ),
              HashSet<IntermediatePrecomputeNode3Index>,
          > = HashMap::new();
          for (src, edges) in &outgoing {
              let rep_src = rep.get(src).copied().unwrap_or(*src);
              for (ek, kids) in edges {
                  for dst in kids {
                      let rep_dst = rep.get(dst).copied().unwrap_or(*dst);
                      if all_nodes_in_subgraph.contains(&rep_src)
                          && all_nodes_in_subgraph.contains(&rep_dst)
                      {
                          to_add
                              .entry((rep_src, ek.clone()))
                              .or_default()
                              .insert(rep_dst);
                      }
                  }
              }
          }
          for ((src_rep, ek), dests) in to_add {
              if let Some(mut w) = src_rep.write(god) {
                  let dest_map = w.children_mut().entry(ek).or_default();
                  for d in dests {
                      if dest_map.get(&d).is_none() {
                          dest_map.insert(d, ());
                          any_changed = true;
                      }
                  }
              }
          }

          // Retarget representative nodes' existing edges to point to representatives (within subgraph).
          let canonicals_set: HashSet<IntermediatePrecomputeNode3Index> =
              rep.values().copied().collect();
          for src_rep in canonicals_set {
              if let Some(g) = src_rep.read(god) {
                  let mut moves: HashMap<
                      crate::constraint::IntermediateTrie3EdgeKey,
                      Vec<(
                          IntermediatePrecomputeNode3Index,
                          IntermediatePrecomputeNode3Index,
                      )>,
                  > = HashMap::new();
                  for (ek, dm) in g.children() {
                      for (dst, _) in dm {
                          if all_nodes_in_subgraph.contains(dst) {
                              let rep_dst = rep.get(dst).copied().unwrap_or(*dst);
                              if rep_dst != *dst {
                                  moves.entry(ek.clone()).or_default().push((*dst, rep_dst));
                              }
                          }
                      }
                  }
                  drop(g);
                  if let Some(mut w) = src_rep.write(god) {
                      for (ek, pairs) in moves {
                          let dest_map = w.children_mut().entry(ek).or_default();
                          for (old, new) in pairs {
                              let mut local_changed = false;
                              if dest_map.remove(&old).is_some() {
                                  local_changed = true;
                              }
                              if dest_map.get(&new).is_none() {
                                  dest_map.insert(new, ());
                                  local_changed = true;
                              }
                              if local_changed {
                                  any_changed = true;
                              }
                          }
                      }
                  }
              }
          }

          // Finally, redirect predecessors of non-representative (victim) nodes to their representative.
          for victim in victims {
              if let Some(target) = rep.get(&victim).copied() {
                  if let Some(preds) = incoming.get(&victim) {
                      for (pred, ek) in preds {
                          if let Some(mut w) = pred.write(god) {
                              let dest_map = w.children_mut().entry(ek.clone()).or_default();
                              if dest_map.remove(&victim).is_some() {
                                  dest_map.insert(target, ());
                                  any_changed = true;
                              }
                          }
                      }
                  }
              }
          }

          any_changed
      }

      /// Hash-consing based structural merge. 
      /// Computes a structural hash for each node bottom-up and merges nodes with identical hashes.
      /// This is more aggressive than color refinement and can find more sharing across templates.
      fn hash_cons_structural_merge(
          start_nodes: &[IntermediatePrecomputeNode3Index],
          pinned: &HashSet<IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) -> bool {
          use std::collections::hash_map::DefaultHasher;
          use std::hash::{Hash, Hasher};
          
          let all_nodes: Vec<_> = Trie::all_nodes(god, start_nodes);
          if all_nodes.is_empty() {
              return false;
          }
          let node_set: HashSet<_> = all_nodes.iter().copied().collect();
          
          // Build outgoing/incoming adjacency within subgraph
          let mut outgoing: HashMap<
              IntermediatePrecomputeNode3Index, 
              Vec<(IntermediateTrie3EdgeKey, Vec<IntermediatePrecomputeNode3Index>)>
          > = HashMap::new();
          let mut incoming: HashMap<
              IntermediatePrecomputeNode3Index, 
              Vec<(IntermediatePrecomputeNode3Index, IntermediateTrie3EdgeKey)>
          > = HashMap::new();
          
          for &n in &node_set {
              if let Some(g) = n.read(god) {
                  for (ek, dm) in g.children() {
                      let mut kids: Vec<_> = dm.keys().filter(|k| node_set.contains(k)).copied().collect();
                      kids.sort();
                      if !kids.is_empty() {
                          outgoing.entry(n).or_default().push((ek.clone(), kids.clone()));
                          for kid in kids {
                              incoming.entry(kid).or_default().push((n, ek.clone()));
                          }
                      }
                  }
              }
          }
          
          // Sort outgoing edges for determinism
          for edges in outgoing.values_mut() {
              edges.sort_by(|a, b| a.0.cmp(&b.0));
          }
          
          // Compute levels (distance from leaves) to process bottom-up
          let mut level: HashMap<IntermediatePrecomputeNode3Index, usize> = HashMap::new();
          for _ in 0..100 {
              let mut changed = false;
              for &n in &node_set {
                  let child_level = outgoing.get(&n)
                      .map(|edges| {
                          edges.iter()
                              .flat_map(|(_, kids)| kids.iter())
                              .filter_map(|k| level.get(k).copied())
                              .max()
                              .unwrap_or(0)
                      })
                      .unwrap_or(0);
                  let new_level = if outgoing.contains_key(&n) { child_level + 1 } else { 0 };
                  if level.get(&n).copied().unwrap_or(usize::MAX) != new_level {
                      level.insert(n, new_level);
                      changed = true;
                  }
              }
              if !changed {
                  break;
              }
          }
          
          let max_level = level.values().copied().max().unwrap_or(0);
          
          // Bottom-up hash computation and merging
          let mut node_hash: HashMap<IntermediatePrecomputeNode3Index, u64> = HashMap::new();
          let mut hash_to_nodes: HashMap<u64, Vec<IntermediatePrecomputeNode3Index>> = HashMap::new();
          
          // Process level by level (leaves first)
          for lv in 0..=max_level {
              let mut nodes_at_level: Vec<_> = node_set.iter()
                  .filter(|n| level.get(n).copied().unwrap_or(0) == lv)
                  .copied()
                  .collect();
              nodes_at_level.sort();
              
              for n in nodes_at_level {
                  let mut hasher = DefaultHasher::new();
                  
                  // Hash end flag
                  if let Some(g) = n.read(god) {
                      g.value.end.hash(&mut hasher);
                  }
                  
                  // Hash outgoing structure (edge keys and child hashes)
                  if let Some(edges) = outgoing.get(&n) {
                      for (ek, kids) in edges {
                          ek.hash(&mut hasher);
                          for kid in kids {
                              node_hash.get(kid).unwrap_or(&0).hash(&mut hasher);
                          }
                      }
                  }
                  
                  let h = hasher.finish();
                  node_hash.insert(n, h);
                  hash_to_nodes.entry(h).or_default().push(n);
              }
          }
          
          // Build representative mapping (merge nodes with same hash)
          let mut rep: HashMap<IntermediatePrecomputeNode3Index, IntermediatePrecomputeNode3Index> = HashMap::new();
          let mut merge_count = 0;
          
          for (h, nodes) in &hash_to_nodes {
              if nodes.len() <= 1 {
                  continue;
              }
              
              // Find canonical: prefer pinned nodes, then lowest index for determinism
              let canonical = nodes.iter()
                  .min_by_key(|n| (!pinned.contains(n), n.0))
                  .copied()
                  .unwrap();
              
              for &n in nodes {
                  rep.insert(n, canonical);
                  if n != canonical {
                      merge_count += 1;
                  }
              }
              
              if is_debug_level_enabled(3) && nodes.len() > 1 {
                  println!("  Hash {:016x}: merging {} nodes into {:?}", h, nodes.len(), canonical);
              }
          }
          
          if merge_count == 0 {
              return false;
          }
          
          if is_debug_level_enabled(3) {
              println!("Hash-cons merge: {} nodes merged", merge_count);
          }
          
          // Redirect all edges to use canonical representatives
          
          // Collect all edges to add to canonical nodes
          let mut edges_to_add: HashMap<
              (IntermediatePrecomputeNode3Index, IntermediateTrie3EdgeKey), 
              HashSet<IntermediatePrecomputeNode3Index>
          > = HashMap::new();
          
          for (src, edges) in &outgoing {
              let rep_src = rep.get(src).copied().unwrap_or(*src);
              for (ek, kids) in edges {
                  for kid in kids {
                      let rep_kid = rep.get(kid).copied().unwrap_or(*kid);
                      edges_to_add.entry((rep_src, ek.clone())).or_default().insert(rep_kid);
                  }
              }
          }
          
          // Apply edge updates
          for ((src, ek), dests) in edges_to_add {
              if let Some(mut w) = src.write(god) {
                  let dest_map = w.children_mut().entry(ek).or_default();
                  for d in dests {
                      dest_map.insert(d, ());
                  }
              }
          }
          
          // Redirect incoming edges from merged nodes to their representatives
          for (node, node_rep) in &rep {
              if node != node_rep {
                  if let Some(preds) = incoming.get(node) {
                      for (pred, ek) in preds {
                          let rep_pred = rep.get(pred).copied().unwrap_or(*pred);
                          if let Some(mut w) = rep_pred.write(god) {
                              let dest_map = w.children_mut().entry(ek.clone()).or_default();
                              dest_map.remove(node);
                              dest_map.insert(*node_rep, ());
                          }
                      }
                  }
              }
          }
          
          true
      }

      fn compute_and_print_template_stats(
          templates: &[(
              IntermediatePrecomputeNode3Index,
              IntermediatePrecomputeNode3Index,
          )],
          god: &IntermediateTrie3GodWrapper,
          phase: &str,
      ) {
          if !is_debug_level_enabled(2) {
              return;
          }

          let mut total_nodes_sum = 0; // Sum of nodes in each template if treated separately
          let mut union_nodes: HashSet<IntermediatePrecomputeNode3Index> = HashSet::new();
          let mut node_coverage: HashMap<IntermediatePrecomputeNode3Index, usize> = HashMap::new();

          for (start_node, _end_node) in templates {
              let nodes_in_template = Trie::all_nodes(god, &[*start_node]);
              total_nodes_sum += nodes_in_template.len();
              for node in nodes_in_template {
                  union_nodes.insert(node);
                  *node_coverage.entry(node).or_insert(0) += 1;
              }
          }

          let shared_nodes_count = node_coverage.values().filter(|&&count| count > 1).count();
          let unique_nodes_count = union_nodes.len();
          let sharing_factor = if total_nodes_sum > 0 {
              (total_nodes_sum as f64) / (unique_nodes_count as f64)
          } else {
              1.0
          };
          let shared_pct = if unique_nodes_count > 0 {
              (shared_nodes_count as f64) * 100.0 / (unique_nodes_count as f64)
          } else {
              0.0
          };

          let mut total_edges = 0;
          for node in &union_nodes {
              if let Some(g) = node.read(god) {
                  for (_ek, dm) in g.children() {
                      total_edges += dm.len();
                  }
              }
          }

          println!("\n--- Global Template Stats ({}) ---", phase);
          println!("  Total templates: {}", templates.len());
          println!("  Sum of nodes (if unshared): {}", total_nodes_sum);
          println!(
              "  Unique nodes across all templates: {}",
              unique_nodes_count
          );
          println!("  Total edges across all templates: {}", total_edges);
          println!(
              "  Nodes shared by >= 2 templates: {} ({:.1}%)",
              shared_nodes_count, shared_pct
          );
          println!(
              "  Sharing factor (sum_nodes / unique_nodes): {:.2}x",
              sharing_factor
          );
          println!("--------------------------------------------");
      }

      /// Runs a global optimization across all per-terminal templates.
      /// Pins all (start,end) nodes to keep external references valid.
      pub fn optimize_intermediate_trie3_templates_global(
          templates: &[(
              IntermediatePrecomputeNode3Index,
              IntermediatePrecomputeNode3Index,
          )],
          god: &IntermediateTrie3GodWrapper,
      ) {
          if templates.is_empty() {
              return;
          }

          compute_and_print_template_stats(templates, god, "Before Optimization");

          let start_nodes: Vec<_> = templates.iter().map(|(s, _)| *s).collect();
          let mut pinned: HashSet<IntermediatePrecomputeNode3Index> = HashSet::new();
          for (s, e) in templates {
              pinned.insert(*s);
              pinned.insert(*e);
          }

          // Multiple global passes with different strategies:
          // 1. Hash-consing merge (aggressive, finds identical substructures)
          // 2. Structural merge (color refinement based)
          // 3. NoOp compression
          // 4. Per-template pruning
          for iteration in 0..7 {
              let mut changed = false;
              
              if is_debug_level_enabled(3) {
                  println!("\n=== Optimization iteration {} ===", iteration);
              }
              
              changed |= hash_cons_structural_merge(&start_nodes, &pinned, god);
              changed |= compress_noop_only_nodes(&start_nodes, &pinned, god);
              changed |= structural_merge_nodes_in_subgraph(&start_nodes, &pinned, god);
              
              for (s, e) in templates {
                  changed |= prune_unproductive_nodes(&[*s], e, god);
              }
              
              if !changed {
                  if is_debug_level_enabled(3) {
                      println!("Converged after {} iterations", iteration + 1);
                  }
                  break;
              }
          }

          compute_and_print_template_stats(templates, god, "After Optimization");
      }

