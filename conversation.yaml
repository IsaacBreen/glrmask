      pub fn compute_null_nonterminals(productions: &[Production]) -> BTreeSet<NonTerminal> {
          compute_nonterminal_nullability(productions)
              .into_iter()
              .filter_map(|(nt, status)| (status == Nullability::Null).then_some(nt))
              .collect()
