      **Associated Functions:**

      *   `pub fn leaf() -> Self`: Creates contents for a leaf node (`end: true`).
      *   `pub fn internal() -> Self`: Creates contents for an internal node (`end: false`).
      *   `pub fn root() -> Self`: Creates contents for a root node (`end: false`).

      ### `ParseStateKey`

