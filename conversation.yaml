              changed |= compress_noop_only_nodes(&[*start_node], &pinned, god);
              changed |= structural_merge_nodes_in_subgraph(&[*start_node], &pinned, god);
              changed |= prune_unproductive_nodes(&[*start_node], end_node, god);
              if !changed {
