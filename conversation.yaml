              assert!(set.insert(10));
              assert!(!set.insert(10)); // Already present
              assert!(set.insert(20));
              assert_eq!(set.len(), 2);
              assert!(set.contains(10));
              assert!(set.contains(20));
              assert!(!set.contains(5));
          }

          #[test]
