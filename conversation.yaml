              Returns:
                  A new `SymbolTable`.
              """
              symt = cls()

              for symbol in symbols:
                  symt.add_symbol(symbol)

              return symt

          def __del__(self):
              lib.symt_destroy(self.ptr)


      class SymbolTableIterator:
