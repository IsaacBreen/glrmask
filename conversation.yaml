                      for pop_val, group in nd.groups.items():
                          print(f"    - Edge group: pop={pop_val}")
                          # Collect all parents from GSS after popping 'pop_val'
                          peeks = gss_node.popn_fast(pop_val)
                          print(f"      - Found {len(peeks)} peeks from GSS")
                          if not peeks:
