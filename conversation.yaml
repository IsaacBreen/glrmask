      Based on the test results, there's a bug in the `LeveledGSS` implementation that causes it to miss some stacks when converting back to a list representation. The divergence occurs when an `Interface` node represents both a terminal stack (a stack ending at that point) and has children representing longer stacks. The current logic incorrectly skips processing the children in this case.

      Here are the steps to fix the bug:

      ### Step-by-step Instructions

      1.  **Open the file `python/gss_tester/implementations/leveled_impl.py`**.

      2.  **Navigate to the `to_stacks` method**. Inside this method, you will find a nested function called `dfs_upper`.

      3.  **Modify the logic for `Interface` nodes in `dfs_upper`**. The current implementation has a flawed `if/elif/else` structure that prevents children from being processed if the `Interface` node itself is terminal. You need to replace this block to handle the terminal case and the children-processing case independently.

          Replace this code block:
          ```python
                      # The interface's `empty` flag indicates an explicit stack ending at `pref` with `acc`.
                      if u.empty:
                          res.append((list(reversed(pref)), u.acc))
                      elif not u.children:
                          # No children and no explicit empty: implicit terminal represented by acc.
                          res.append((list(reversed(pref)), u.acc))
                      else:
                          # The interface's `children` are for stacks extending `pref`.
                          # All these stacks share accumulator `u.acc`.
                          for v, kids in u.children.items():
                              for child in kids.values():
                                  dfs_lower(child, pref + [v], u.acc)
          ```

          with this corrected version:
          ```python
                      # An Interface can represent a terminal stack, and also have children.
                      # It's terminal if `empty` is true, or if it has no children (implicit terminal).
                      if u.empty or not u.children:
                          res.append((list(reversed(pref)), u.acc))

                      # The interface's `children` are for stacks extending `pref`.
                      # All these stacks share accumulator `u.acc`.
                      for v, kids in u.children.items():
                          for child in kids.values():
                              dfs_lower(child, pref + [v], u.acc)
          ```

      This change ensures that if an `Interface` node represents a terminal stack, it is correctly added to the results, and then its children are *always* processed to find all stacks that extend from it.

