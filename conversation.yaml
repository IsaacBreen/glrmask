      #### `pub struct EdgeInserter<'a, ...>`
      A helper struct for inserting an edge into a `Trie` using a fluent, chainable interface.

      ##### Public Fields
      *   `pub edge_value: Option<EV>`: The value for the edge to be inserted.

      ##### Public Methods
      *   `pub fn new(...) -> Self`: Creates a new `EdgeInserter`.
      *   `pub fn try_destination(mut self, destination: Trie2Index) -> Self`: Tries to add or merge an edge to a specific destination.
      *   `pub fn try_destinations(mut self, destinations: &[Trie2Index]) -> Self`: Tries a slice of potential destinations in order.
      *   `pub fn try_destinations_iter(mut self, destinations: impl Iterator<Item = Trie2Index>) -> Self`: Tries an iterator of potential destinations in order.
      *   `pub fn try_destinations_iter_with<F, R>(mut self, destinations: F) -> Self`: Tries an iterator of potential destinations from a closure.
      *   `pub fn try_children(mut self) -> Self`: Tries to merge with existing children that share the same edge key.
      *   `pub fn else_create_destination_with_value(mut self, value: T) -> Self`: If no destination was found, creates a new node with the given value and connects to it.
      *   `pub fn else_create_destination_with(self, value_fn: impl FnOnce() -> T) -> Self`: Lazily creates a new destination node using a closure if needed.
      *   `pub fn else_create_destination(self) -> Self`: Creates a new destination node with a default value if needed.
      *   `pub fn into_option(self) -> Option<Trie2Index>`: Consumes the inserter and returns the resulting destination index, if any.
      *   `pub fn is_some(&self) -> bool`: Checks if a destination has been found.
      *   `pub fn clone_into_option(&self) -> Option<Trie2Index>`: Returns the resulting destination index without consuming the inserter.
      *   `pub fn unwrap(self) -> Trie2Index`: Consumes the inserter and returns the resulting destination index, panicking on failure.
      *   `pub fn expect(self, msg: &str) -> Trie2Index`: Consumes the inserter and returns the resulting destination index, panicking with a message on failure.

      ---

      #### `pub struct Index`
      A simple wrapper around `usize` for arena indices.

      ##### Public Methods
      *   `pub fn as_usize(self) -> usize`: Converts the index to a `usize`.

      ##### Trait Implementations
      *   `impl Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash for Index`
      *   `impl From<usize> for Index`
      *   `impl From<Index> for usize`

      ---

      #### `pub struct Arena<T>`
      A thread-safe, reference-counted arena for storing values of type `T`.

      ##### Public Methods
      *   `pub fn new() -> Self`: Creates a new, empty `Arena`.
      *   `pub fn insert(&self, value: T) -> Index`: Inserts a value into the arena and returns its new `Index`.
      *   `pub fn insert_at(&self, index: Index, value: T) -> Option<T>`: Inserts or replaces a value at a specific index.
      *   `pub fn remove(&self, index: Index) -> Option<T>`: Removes a value at a given index.
      *   `pub fn contains(&self, index: Index) -> bool`: Checks if a value exists at the given index.
      *   `pub fn get(&self, index: Index) -> Option<T>`: Clones and returns the value at a given index.
      *   `pub fn with<R>(&self, index: Index, f: impl FnOnce(&T) -> R) -> Option<R>`: Provides scoped, immutable access to a value without cloning.
      *   `pub fn with_mut<R>(&self, index: Index, f: impl FnOnce(&mut T) -> R) -> Option<R>`: Provides scoped, mutable access to a value.
      *   `pub fn len(&self) -> usize`: Returns the number of items currently in the arena.
      *   `pub fn is_empty(&self) -> bool`: Returns `true` if the arena contains no items.
      *   `pub fn clear(&self)`: Removes all items from the arena.
      *   `pub fn indices(&self) -> Vec<Index>`: Returns a vector of all valid indices in the arena.
      *   `pub fn to_vec(&self) -> Vec<(Index, T)>`: Returns a vector of (Index, T) pairs for all items in the arena.

      ##### Trait Implementations
      *   `impl<T> Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash for Arena<T>`
      *   `impl<T> JSONConvertible for Arena<T>`

      ##### Inherent `impl` for `Arena<Trie<...>>`
      *   `pub fn insert_edge_simple(&self, src: Trie2Index, dst: Trie2Index, edge_key: EK, edge_value: EV)`: A simplified method to insert or merge an edge between two nodes.

      ---

      ### Public Free Functions

      *   `pub fn try_destination<'a, ...>(...) -> Option<Trie2Index>`: A free-function shorthand for creating an `EdgeInserter` and calling `try_destination`.
      *   `pub fn try_destination_with<'a, ...>(...) -> Option<Trie2Index>`: A free-function shorthand for creating an `EdgeInserter` and calling `try_destinations`.

