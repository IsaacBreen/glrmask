              let inner = RustHybridBitset::from_json(sep1::json_serialization::JSONNode::Array(
                  json_ranges.into_iter().map(|p| sep1::json_serialization::JSONNode::Array(vec![p[0].to_json(), p[1].to_json()])).collect()
