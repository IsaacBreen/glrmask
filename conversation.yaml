      use profiler_macro::time_it;
      use crate::datastructures::EntryApi;

      /// Represents statistics about a Trie graph reachable from a set of roots.
      #[derive(Debug, Clone, PartialEq)]
      pub struct TrieStats {
          pub num_reachable_nodes: usize,
          pub num_reachable_edges: usize,
          pub max_depth: usize,
          pub num_roots: usize,
          pub num_leaves: usize,
          pub max_in_degree: usize,
          pub avg_in_degree: f64,
          pub max_out_degree: usize,
          pub avg_out_degree: f64,
      }

      /// Represents a node in a Trie–like structure (allowing shared subtrees and DAGs).
      /// Multiple children can exist for the same edge key. Each edge instance has a value.
      ///
      /// EK: type of the edge key (must be Ord).
      /// EV: type of the edge value.
      /// T: type of the value stored within the node.
      ///
      /// NOTE: This node no longer stores Arc/RwLock pointers to other nodes. Instead,
      /// children reference other nodes by their index (Trie2Index) in an Arena. Any access
      /// to nodes (read/write of value, children traversal, depth recomputation, etc.) now
      /// requires passing a reference to the Arena that owns the nodes.
      #[derive(Debug, Clone)]
      pub struct Trie<EK: Ord, EV, T> {
          pub value: T,
          /// Stores a map from EdgeKey to a map of destination node indices and edge values.
          children: BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>,
          /// The “longest distance” from some source node (as computed by recompute_all_max_depths).
          /// Defaults to usize::MAX and is only updated when the user calls recompute_all_max_depths.
          pub max_depth: usize,
      }

      /// An index into the Arena for a Trie node.
      /// This is the light-weight replacement for Arc<RwLock<Trie<...>>> in external code.
      ///
      /// It provides `read(&arena)` and `write(&arena)` methods that mimic RwLock's API:
      /// both return Option<Guard>. In most code you'll immediately call `.expect(...)` or `.unwrap()`.
      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct Trie2Index {
          index: Index,
      }

      impl Display for Trie2Index {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              write!(f, "Trie2Index({})", self.index.as_usize())
          }
      }

      impl Trie2Index {
          pub(crate) fn as_arc(&self) -> &Self {
              self
          }

          pub fn new(index: Index) -> Self {
              Trie2Index { index }
          }

          pub fn as_usize(self) -> usize {
              self.index.as_usize()
          }

          pub fn as_index(self) -> Index {
              self.index
          }

          /// Read-locks the Arena and returns a guard that derefs to &Trie at this index.
          /// Returns None if the index does not exist.
          pub fn read<'a, EK: Ord, EV, T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
          ) -> Option<Trie2ReadGuard<'a, EK, EV, T>> {
              let guard = arena.inner.read().ok()?;
              if guard.values.get(self.index.as_usize())?.is_none() {
                  return None;
              }
              Some(Trie2ReadGuard {
                  guard,
                  index: self.index.as_usize(),
              })
          }

          /// Write-locks the Arena and returns a guard that derefs to &mut Trie at this index.
          /// Returns None if the index does not exist.
          pub fn write<'a, EK: Ord, EV, T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
          ) -> Option<Trie2WriteGuard<'a, EK, EV, T>> {
              let guard = arena.inner.write().ok()?;
              if guard.values.get(self.index.as_usize())?.is_none() {
                  return None;
              }
              Some(Trie2WriteGuard {
                  guard,
                  index: self.index.as_usize(),
              })
          }

          /// Convenience constructor from usize.
          pub fn from_usize(i: usize) -> Self {
              Trie2Index { index: Index::from(i) }
          }
      }

      impl From<Index> for Trie2Index {
          fn from(i: Index) -> Self {
              Trie2Index { index: i }
          }
      }

      impl From<Trie2Index> for Index {
          fn from(ti: Trie2Index) -> Self {
              ti.index
          }
      }

      impl From<usize> for Trie2Index {
          fn from(u: usize) -> Self {
              Trie2Index { index: Index::from(u) }
          }
      }

      impl From<Trie2Index> for usize {
          fn from(ti: Trie2Index) -> usize {
              ti.index.as_usize()
          }
      }

      /// A read guard that keeps the Arena's internal RwLockReadGuard alive and provides
      /// immutable access to a Trie node at a given index via Deref.
      pub struct Trie2ReadGuard<'a, EK: Ord, EV, T> {
          guard: RwLockReadGuard<'a, ArenaInner<Trie<EK, EV, T>>>,
          index: usize,
      }

      impl<'a, EK: Ord, EV, T> Deref for Trie2ReadGuard<'a, EK, EV, T> {
          type Target = Trie<EK, EV, T>;
          fn deref(&self) -> &Self::Target {
              self.guard.values[self.index]
                  .as_ref()
                  .expect("Trie2ReadGuard: index not found in arena map")
          }
      }

      /// A write guard that keeps the Arena's internal RwLockWriteGuard alive and provides
      /// mutable access to a Trie node at a given index via Deref/DerefMut.
      pub struct Trie2WriteGuard<'a, EK: Ord, EV, T> {
          guard: RwLockWriteGuard<'a, ArenaInner<Trie<EK, EV, T>>>,
          index: usize,
      }

      impl<'a, EK: Ord, EV, T> Deref for Trie2WriteGuard<'a, EK, EV, T> {
          type Target = Trie<EK, EV, T>;
          fn deref(&self) -> &Self::Target {
              self.guard.values[self.index]
                  .as_ref()
                  .expect("Trie2WriteGuard: index not found in arena map")
          }
      }

      impl<'a, EK: Ord, EV, T> DerefMut for Trie2WriteGuard<'a, EK, EV, T> {
          fn deref_mut(&mut self) -> &mut Self::Target {
              self.guard.values[self.index]
                  .as_mut()
                  .expect("Trie2WriteGuard: index not found in arena map")
          }
      }

      impl<EK, EV, T> JSONConvertible for Trie<EK, EV, T>
      where
          EK: Ord + Clone + JSONConvertible + Debug,
          EV: Clone + JSONConvertible,
          T: Clone + JSONConvertible,
      {
          /// Note: With the index-based design, we only serialize this node's local data:
          /// - value
          /// - max_depth
          /// - children: encoded as [EK_json, [[child_index, EV_json], ...]]
          ///
          /// We do NOT expand into a "nodes" array (no BFS). This format is concise and avoids
          /// requiring access to the Arena during serialization.
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("value".to_string(), self.value.to_json());
              obj.insert("max_depth".to_string(), self.max_depth.to_json());

              let children_json: Vec<JSONNode> = self.children.iter().map(|(ek, dest_map)| {
                  let ek_json = ek.to_json();
                  let dests_json: Vec<JSONNode> = dest_map.iter().map(|(idx, ev)| {
                      JSONNode::Array(vec![
                          (idx.as_usize()).to_json(),
                          ev.to_json(),
                      ])
                  }).collect();
                  JSONNode::Array(vec![ek_json, JSONNode::Array(dests_json)])
              }).collect();

              obj.insert("children".to_string(), JSONNode::Array(children_json));

              JSONNode::Object(obj)
          }

          /// Parses the local-node JSON format produced by to_json above.
          /// This reconstructs a Trie node that references children by indices only.
          /// The Arena is not created/returned here; the caller is expected to manage
          /// nodes in an Arena externally.
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;

              let value = T::from_json(obj.remove("value").ok_or("Missing 'value' field")?)?;
              let max_depth = usize::from_json(obj.remove("max_depth").ok_or("Missing 'max_depth' field")?)?;

              let children_node = obj.remove("children").ok_or("Missing 'children' field")?;
              let children_arr = match children_node {
                  JSONNode::Array(arr) => arr,
                  _ => return Err("'children' field must be an array".to_string()),
              };

              let mut children = BTreeMap::new();
              for child_entry_node in children_arr {
                  let mut child_entry_arr = match child_entry_node {
                      JSONNode::Array(arr) if arr.len() == 2 => arr,
                      _ => return Err("Child entry must be a 2-element array [ek, dests]".to_string()),
                  };
                  let dests_node = child_entry_arr.pop().unwrap();
                  let ek_node = child_entry_arr.pop().unwrap();

                  let ek = EK::from_json(ek_node)?;

                  let dests_arr = match dests_node {
                      JSONNode::Array(arr) => arr,
                      _ => return Err("Destinations list must be an array".to_string()),
                  };

                  let mut dest_map = OrderedHashMap::new();
                  for dest_pair_node in dests_arr {
                      let mut dest_pair_arr = match dest_pair_node {
                          JSONNode::Array(arr) if arr.len() == 2 => arr,
                          _ => return Err("Destination pair must be a 2-element array [idx, ev]".to_string()),
                      };
                      let ev_node = dest_pair_arr.pop().unwrap();
                      let idx_node = dest_pair_arr.pop().unwrap();

                      let idx_usize = usize::from_json(idx_node)?;
                      let idx = Trie2Index::from_usize(idx_usize);
                      let ev = EV::from_json(ev_node)?;

                      dest_map.insert(idx, ev);
                  }
                  children.insert(ek, dest_map);
              }

              Ok(Trie {
                  value,
                  children,
                  max_depth,
              })
          }
      }

      impl JSONConvertible for Trie2Index {
          fn to_json(&self) -> JSONNode {
              self.as_usize().to_json()
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let u = usize::from_json(node)?;
              Ok(Trie2Index::from_usize(u))
          }
      }

      // Implementation block for core Trie functionality
      // Added Clone bound for EK needed in insertion and others
      impl<EK: Ord + Clone, EV, T> Trie<EK, EV, T> {
          /// Creates a new trie node with the given value and no children.
          /// The max_depth is initialized to usize::MAX and will be updated later
          /// when recompute_all_max_depths is called.
          pub fn new(value: T) -> Self {
              Trie {
                  value,
                  children: BTreeMap::new(),
                  max_depth: usize::MAX,
              }
          }

          /// Create a new destination node in the arena and insert an edge to it.
          /// Returns the index of the newly created node.
          pub fn force_insert_to_new_node(
              &mut self,
              arena: &Arena<Trie<EK, EV, T>>,
              edge_key: EK,
              edge_value: EV,
              value: T,
          ) -> Trie2Index {
              let new_index = Trie2Index::new(arena.insert(Trie::new(value)));
              self.children
                  .entry(edge_key)
                  .or_default()
                  .insert(new_index, edge_value);
              new_index
          }

          /// Insert an edge to an existing destination node index.
          pub fn force_insert_to_node(&mut self, edge_key: EK, edge_value: EV, dst: Trie2Index) {
              self.children.entry(edge_key).or_default().insert(dst, edge_value);
          }

          pub fn already_has_dst(&self, edge_key: EK, dst: Trie2Index) -> bool {
              self.children
                  .get(&edge_key)
                  .map_or(false, |dest_map| dest_map.contains_key(&dst))
          }

          pub fn already_has_dst_for_any_key(&self, dst: Trie2Index) -> bool {
              self.children.values().any(|dest_map| dest_map.contains_key(&dst))
          }

          pub fn get_edge_value(&self, edge_key: EK, dst: Trie2Index) -> Option<&EV> {
              self.children.get(&edge_key).and_then(|dest_map| dest_map.get(&dst))
          }

          pub fn get_edge_value_mut(&mut self, edge_key: EK, dst: &Trie2Index) -> Option<&mut EV> {
              self.children.get_mut(&edge_key).and_then(|dest_map| dest_map.get_mut(&dst))
          }

          /// Inserts an edge (no cycle checks).
          /// Depths can be recomputed later by calling `recompute_all_max_depths`.
          #[time_it]
          pub fn try_insert(
              &mut self,
              edge_key: EK,
              edge_value: &mut Option<EV>,
              child: Trie2Index,
          ) {
              self.try_insert_unchecked(edge_key, edge_value, child)
          }

          /// Inserts an edge without any checks or automatic depth updates.
          #[time_it]
          pub fn try_insert_unchecked(
              &mut self,
              edge_key: EK,
              edge_value: &mut Option<EV>,
              child: Trie2Index,
          ) {
              self.children
                  .entry(edge_key)
                  .or_default()
                  .insert(child, edge_value.take().expect("edge_value must be Some when inserting"));
          }

          pub fn get(
              &self,
              edge_key: &EK,
          ) -> Option<&OrderedHashMap<Trie2Index, EV>>
          {
              self.children.get(edge_key)
          }

          pub fn get_mut(
              &mut self,
              edge_key: &EK,
          ) -> Option<&mut OrderedHashMap<Trie2Index, EV>>
          {
              self.children.get_mut(edge_key)
          }

          pub fn children(&self) -> &BTreeMap<EK, OrderedHashMap<Trie2Index, EV>> {
              &self.children
          }

          pub fn children_mut(&mut self) -> &mut BTreeMap<EK, OrderedHashMap<Trie2Index, EV>> {
              &mut self.children
          }

          pub fn is_leaf(&self) -> bool {
              self.children.is_empty()
          }

          /// Collects all unique nodes (by index) reachable from the given roots (BFS).
          pub fn all_nodes(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: &[Trie2Index],
          ) -> Vec<Trie2Index> {
              let mut visited: HashSet<usize> = HashSet::new();
              let mut result = Vec::new();
              let mut queue = VecDeque::new();

              for &root in roots {
                  if visited.insert(root.as_usize()) {
                      queue.push_back(root);
                  }
              }

              while let Some(node_idx) = queue.pop_front() {
                  result.push(node_idx);

                  if let Some(guard) = node_idx.read(arena) {
                      for children_map in guard.children.values() {
                          for (child_idx, _) in children_map.iter() {
                              let c_u = child_idx.as_usize();
                              if visited.insert(c_u) {
                                  queue.push_back(*child_idx);
                              }
                          }
                      }
                  } else {
                      panic!("Trie::all_nodes: node index {} not found in arena", node_idx.as_usize());
                  }
              }
              result
          }

          /// Performs garbage collection on the arena, keeping only nodes reachable from `roots`.
          pub fn gc(arena: &Arena<Self>, roots: &[Trie2Index]) {
              let live_nodes_vec = Self::all_nodes(arena, roots);
              let live_nodes_set: HashSet<usize> = live_nodes_vec.into_iter().map(|idx| idx.as_usize()).collect();
              let mut inner_guard = arena.inner.write().expect("Arena write lock poisoned during GC");
              for i in 0..inner_guard.values.len() {
                  if !live_nodes_set.contains(&i) {
                      inner_guard.values[i] = None;
                  }
              }
          }

          /// Recomputes `max_depth` for all nodes reachable from the given roots.
          /// Call this once after you finish building the trie graph. Before calling,
          /// nodes may have max_depth == usize::MAX which is suboptimal for scheduling
          /// but not incorrect for traversal.
          ///
          /// Uses a topological order (Kahn's algorithm). Assumes the graph is acyclic.
          pub fn recompute_all_max_depths(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: &[Trie2Index],
          ) {
              let all_nodes = Self::all_nodes(arena, roots);
              if all_nodes.is_empty() {
                  return;
              }

              let mut in_degree: HashMap<usize, usize> = HashMap::new();
              let mut adj: HashMap<usize, Vec<usize>> = HashMap::new();

              for node_idx in &all_nodes {
                  let u = node_idx.as_usize();
                  in_degree.entry(u).or_insert(0);
                  adj.entry(u).or_default();

                  let guard = node_idx
                      .read(arena)
                      .expect("Arena read failed during recompute_all_max_depths");
                  for child_idx in guard
                      .children
                      .values()
                      .flat_map(|m| m.keys().cloned())
                  {
                      let v = child_idx.as_usize();
                      adj.entry(u).or_default().push(v);
                      *in_degree.entry(v).or_default() += 1;
                  }
              }

              // Initialize depths to 0 for all nodes; sources will be processed first.
              let mut queue = VecDeque::new();
              for node_idx in &all_nodes {
                  let u = node_idx.as_usize();
                  if in_degree.get(&u).cloned().unwrap_or(0) == 0 {
                      queue.push_back(u);
                  }
                  let mut w = node_idx
                      .write(arena)
                      .expect("Arena write failed when initializing depths");
                  w.max_depth = 0;
              }

              while let Some(u) = queue.pop_front() {
                  let u_depth = {
                      let g = Trie2Index::from(u).read(arena).expect("read");
                      g.max_depth
                  };

                  if let Some(children) = adj.get(&u) {
                      for &v in children {
                          {
                              let mut vg = Trie2Index::from(v).write(arena).expect("write");
                              vg.max_depth = vg.max_depth.max(u_depth + 1);
                          }

                          let deg = in_degree.get_mut(&v).unwrap();
                          *deg -= 1;
                          if *deg == 0 {
                              queue.push_back(v);
                          }
                      }
                  }
              }
          }

          /// Recomputes the max_depth of this node based on its children's depths.
          /// Returns true if the depth changed.
          /// This does NOT propagate changes.
          pub fn recompute_max_depth(&mut self, arena: &Arena<Trie<EK, EV, T>>) -> bool {
              let new_max_depth = self
                  .children
                  .values()
                  .flat_map(|dest_map| dest_map.keys().cloned())
                  .map(|child_idx| {
                      let g = child_idx.read(arena).expect("Arena read failed in recompute_max_depth");
                      g.max_depth + 1
                  })
                  .max()
                  .unwrap_or(0);

              if new_max_depth != self.max_depth {
                  self.max_depth = new_max_depth;
                  true
              } else {
                  false
              }
          }

          /// Detects if there are any cycles in the graph reachable from the given roots.
          /// This uses a depth-first search approach.
          pub fn has_cycle(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: impl IntoIterator<Item = Trie2Index>,
          ) -> bool {
              let mut visiting = HashSet::new(); // Gray set: nodes currently in the recursion stack.
              let mut visited = HashSet::new();  // Black set: nodes that have been fully explored.

              for root in roots {
                  if !visited.contains(&root.as_usize()) {
                      if Self::detect_cycle_recursive(root, arena, &mut visiting, &mut visited) {
                          return true;
                      }
                  }
              }
              false
          }

          /// Recursive helper for cycle detection.
          fn detect_cycle_recursive(
              node_idx: Trie2Index,
              arena: &Arena<Trie<EK, EV, T>>,
              visiting: &mut HashSet<usize>,
              visited: &mut HashSet<usize>,
          ) -> bool {
              let u = node_idx.as_usize();
              visiting.insert(u);

              let children_indices: Vec<Trie2Index> = if let Some(guard) = node_idx.read(arena) {
                  guard.children.values().flat_map(|m| m.keys().cloned()).collect()
              } else {
                  Vec::new()
              };

              for child_idx in children_indices {
                  let v = child_idx.as_usize();
                  if visiting.contains(&v) {
                      return true; // Cycle detected: found a back edge to a node in the current recursion stack.
                  }
                  if !visited.contains(&v) {
                      if Self::detect_cycle_recursive(child_idx, arena, visiting, visited) {
                          return true;
                      }
                  }
              }

              visiting.remove(&u);
              visited.insert(u);
              false
          }

          /// Computes statistics for the graph reachable from the given roots.
          pub fn stats(arena: &Arena<Self>, roots: &[Trie2Index]) -> TrieStats {
              if roots.is_empty() {
                  return TrieStats {
                      num_reachable_nodes: 0,
                      num_reachable_edges: 0,
                      max_depth: 0,
                      num_roots: 0,
                      num_leaves: 0,
                      max_in_degree: 0,
                      avg_in_degree: 0.0,
                      max_out_degree: 0,
                      avg_out_degree: 0.0,
                  };
              }

              let unique_roots: HashSet<_> = roots.iter().cloned().collect();
              let num_unique_roots = unique_roots.len();

              let reachable_nodes = Self::all_nodes(arena, roots);
              let num_reachable_nodes = reachable_nodes.len();

              if num_reachable_nodes == 0 {
                  return TrieStats {
                      num_reachable_nodes: 0,
                      num_reachable_edges: 0,
                      max_depth: 0,
                      num_roots: num_unique_roots,
                      num_leaves: 0,
                      max_in_degree: 0,
                      avg_in_degree: 0.0,
                      max_out_degree: 0,
                      avg_out_degree: 0.0,
                  };
              }

              let mut num_reachable_edges = 0;
              let mut max_depth = 0;
              let mut num_leaves = 0;
              let mut total_out_degree = 0;
              let mut max_out_degree = 0;
              let mut in_degrees: HashMap<usize, usize> = HashMap::new();

              for node_idx in &reachable_nodes {
                  let guard = node_idx
                      .read(arena)
                      .expect("Node not found during stats calculation");

                  max_depth = max_depth.max(guard.max_depth);

                  let mut out_degree = 0;
                  for children_map in guard.children.values() {
                      for (child_idx, _) in children_map.iter() {
                          out_degree += 1;
                          let v = child_idx.as_usize();
                          *in_degrees.entry(v).or_insert(0) += 1;
                      }
                  }

                  if out_degree == 0 {
                      num_leaves += 1;
                  }
                  num_reachable_edges += out_degree;
                  total_out_degree += out_degree;
                  max_out_degree = max_out_degree.max(out_degree);
              }

              let max_in_degree = in_degrees.values().cloned().max().unwrap_or(0);
              let total_in_degree: usize = in_degrees.values().sum();

              let avg_in_degree = total_in_degree as f64 / num_reachable_nodes as f64;
              let avg_out_degree = total_out_degree as f64 / num_reachable_nodes as f64;

              TrieStats {
                  num_reachable_nodes,
                  num_reachable_edges,
                  max_depth,
                  num_roots: num_unique_roots,
                  num_leaves,
                  max_in_degree,
                  avg_in_degree,
                  max_out_degree,
                  avg_out_degree,
              }
          }
      }

      // Add this impl block for the recursive comparison helper (index-based)
      impl<EK, EV, T> Trie<EK, EV, T>
      where
          EK: Ord + Clone,
          EV: PartialEq + Clone,
          T: PartialEq,
      {
          pub fn are_graphs_equal(
              arena_a: &Arena<Trie<EK, EV, T>>,
              a_idx: Trie2Index,
              arena_b: &Arena<Trie<EK, EV, T>>,
              b_idx: Trie2Index,
          ) -> bool {
              let mut cache = HashMap::new();
              Self::compare_indexes_recursive(arena_a, a_idx, arena_b, b_idx, &mut cache)
          }

          /// Recursively compares two Trie nodes referenced by indices for equality across an Arena.
          ///
          /// - `a_idx`, `b_idx`: The indices pointing to the Trie nodes to compare.
          /// - `comparison_cache`: Tracks pairs of (a_usize, b_usize) and their comparison result (bool).
          fn compare_indexes_recursive(
              arena_a: &Arena<Trie<EK, EV, T>>,
              a_idx: Trie2Index,
              arena_b: &Arena<Trie<EK, EV, T>>,
              b_idx: Trie2Index,
              comparison_cache: &mut HashMap<(usize, usize), bool>,
          ) -> bool {
              let a_u = a_idx.as_usize();
              let b_u = b_idx.as_usize();

              if Arc::ptr_eq(&arena_a.inner, &arena_b.inner) && a_u == b_u {
                  return true;
              }

              let (k1, k2) = if a_u < b_u { (a_u, b_u) } else { (b_u, a_u) };

              if let Some(&cached) = comparison_cache.get(&(k1, k2)) {
                  return cached;
              }

              // Optimistically assume true; update to false on mismatch.
              comparison_cache.insert((k1, k2), true);

              let a_guard = match a_idx.read(arena_a) {
                  Some(g) => g,
                  None => {
                      comparison_cache.insert((k1, k2), false);
                      return false;
                  }
              };
              let b_guard = match b_idx.read(arena_b) {
                  Some(g) => g,
                  None => {
                      comparison_cache.insert((k1, k2), false);
                      return false;
                  }
              };

              // 1. Compare non-recursive fields: value and max_depth.
              if a_guard.value != b_guard.value || a_guard.max_depth != b_guard.max_depth {
                  comparison_cache.insert((k1, k2), false);
                  return false;
              }

              // 2. Compare children structure (number of distinct edge keys).
              if a_guard.children.len() != b_guard.children.len() {
                  comparison_cache.insert((k1, k2), false);
                  return false;
              }

              // 3. Compare children for each edge key.
              for (a_ek, a_dest_map) in &a_guard.children {
                  match b_guard.children.get(a_ek) {
                      None => {
                          comparison_cache.insert((k1, k2), false);
                          return false;
                      }
                      Some(b_dest_map) => {
                          if a_dest_map.len() != b_dest_map.len() {
                              comparison_cache.insert((k1, k2), false);
                              return false;
                          }

                          let a_child_pairs: Vec<(Trie2Index, EV)> = a_dest_map
                              .iter()
                              .map(|(idx, ev)| (*idx, ev.clone()))
                              .collect();

                          let mut b_child_pairs: Vec<(Trie2Index, EV)> = b_dest_map
                              .iter()
                              .map(|(idx, ev)| (*idx, ev.clone()))
                              .collect();

                          'outer: for (a_child, a_ev) in &a_child_pairs {
                              let mut found = false;
                              for i in 0..b_child_pairs.len() {
                                  if &b_child_pairs[i].1 == a_ev {
                                      let b_child = b_child_pairs[i].0;
                                      if Trie::compare_indexes_recursive(arena_a, *a_child, arena_b, b_child, comparison_cache) {
                                          b_child_pairs.remove(i);
                                          found = true;
                                          break;
                                      }
                                  }
                              }
                              if !found {
                                  comparison_cache.insert((k1, k2), false);
                                  return false;
                              }
                          }
                      }
                  }
              }

              true
          }

          /// TEST UTILITY: Traverses the graph from the given roots and returns all
          /// possible paths that end in a node satisfying the `is_end` predicate.
          ///
          /// A "path" is a tuple containing the value of the root node and a vector of
          /// (edge key, edge value, destination node value) tuples. This function
          /// correctly handles DAGs and cycles.
          pub fn get_all_paths<F>(
              arena: &Arena<Self>,
              roots: &[Trie2Index],
              is_end: F,
          ) -> Vec<(T, Vec<(EK, EV, T)>)>
          where
              F: Fn(&Trie<EK, EV, T>) -> bool,
              T: Clone,
              EV: Clone,
          {
              let mut all_paths = Vec::new();

              for &root in roots {
                  let mut visiting = std::collections::HashSet::new();
                  if let Some(root_guard) = root.read(arena) {
                      let root_value = root_guard.value.clone();
                      Self::get_all_paths_recursive(
                          arena,
                          root,
                          vec![],
                          &mut all_paths,
                          &mut visiting,
                          &is_end,
                          root_value,
                      );
                  }
              }
              all_paths
          }

          fn get_all_paths_recursive<F>(
              arena: &Arena<Self>,
              node_idx: Trie2Index,
              current_path: Vec<(EK, EV, T)>,
              all_paths: &mut Vec<(T, Vec<(EK, EV, T)>)>,
              visiting: &mut std::collections::HashSet<Trie2Index>,
              is_end: &F,
              root_value: T,
          ) where
              F: Fn(&Trie<EK, EV, T>) -> bool,
              T: Clone,
              EV: Clone,
          {
              if !visiting.insert(node_idx) {
                  // Cycle detected, stop this path.
                  return;
              }

              if let Some(guard) = node_idx.read(arena) {
                  if is_end(&guard) {
                      all_paths.push((root_value, current_path));
                  } else {
                      for (edge_key, dest_map) in guard.children() {
                          for (child_idx, edge_value) in dest_map.iter() {
                              if let Some(child_guard) = child_idx.read(arena) {
                                  let mut new_path = current_path.clone();
                                  let child_value = child_guard.value.clone();
                                  new_path.push((edge_key.clone(), edge_value.clone(), child_value));
                                  Self::get_all_paths_recursive(
                                      arena,
                                      *child_idx,
                                      new_path,
                                      all_paths,
                                      visiting,
                                      is_end,
                                      root_value.clone(),
                                  );
                              }
                          }
                      }
                  }
              }

              visiting.remove(&node_idx);
          }
      }

      // Add this impl block for pretty-printing functionality
      impl<EK, EV, T> Trie<EK, EV, T>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Debug,
      {
          /// Pretty-prints the trie structure starting from the given roots into a String.
          /// Handles shared subtrees and cycles to avoid infinite loops and redundant output.
          pub fn pretty_print(arena: &Arena<Self>, roots: &[Trie2Index]) -> String {
              let mut output = String::new();
              let mut printed_nodes = HashSet::new();

              for (i, &root) in roots.iter().enumerate() {
                  if i > 0 {
                      output.push_str("\n");
                  }
                  output.push_str(&format!("[Root {}]\n", i));
                  let mut visiting = HashSet::new();
                  Self::pretty_print_recursive(root, arena, "", true, &mut visiting, &mut printed_nodes, &mut output);
              }
              output
          }

          /// Pretty-prints the entire trie structure in the arena.
          /// It automatically identifies root nodes (those with an in-degree of 0)
          /// and prints from there. If no roots are found (e.g., a graph of only cycles),
          /// it will print from all nodes.
          pub fn pretty_print_arena(arena: &Arena<Self>) -> String {
              let all_node_indices: Vec<Trie2Index> =
                  arena.indices().into_iter().map(Trie2Index::from).collect();
              if all_node_indices.is_empty() {
                  return "[Arena is empty]\n".to_string();
              }

              let mut in_degrees: std::collections::HashMap<Trie2Index, usize> =
                  all_node_indices.iter().map(|&idx| (idx, 0)).collect();

              for &node_idx in &all_node_indices {
                  if let Some(guard) = node_idx.read(arena) {
                      for dest_map in guard.children.values() {
                          for &child_idx in dest_map.keys() {
                              if let Some(degree) = in_degrees.get_mut(&child_idx) {
                                  *degree += 1;
                              }
                          }
                      }
                  }
              }

              let mut roots: Vec<Trie2Index> = in_degrees
                  .iter()
                  .filter(|(_, &degree)| degree == 0)
                  .map(|(&idx, _)| idx)
                  .collect();

              roots.sort();

              if roots.is_empty() {
                  // This case handles graphs with no nodes of in-degree 0 (e.g., all nodes are in cycles).
                  let mut output = String::from("[Warning: No nodes with in-degree 0 found. Graph may contain only cycles.]\n[Printing from all nodes as roots.]\n\n");
                  let mut sorted_nodes = all_node_indices;
                  sorted_nodes.sort(); // Sort for deterministic output
                  output.push_str(&Self::pretty_print(arena, &sorted_nodes));
                  return output;
              }

              Self::pretty_print(arena, &roots)
          }

          fn pretty_print_recursive(
              node_idx: Trie2Index,
              arena: &Arena<Self>,
              prefix: &str,
              is_last: bool,
              visiting: &mut HashSet<usize>,
              printed_nodes: &mut HashSet<usize>,
              output: &mut String,
          ) {
              let node_guard = match node_idx.read(arena) {
                  Some(guard) => guard,
                  None => {
                      let connector = if is_last { "└── " } else { "├── " };
                      output.push_str(&format!("{}{}[Invalid Node Index: {}]\n", prefix, connector, node_idx.as_usize()));
                      return;
                  }
              };

              let connector = if is_last { "└── " } else { "├── " };
              output.push_str(&format!(
                  "{}{}[Node {}] (max_depth: {}, value: {:?})",
                  prefix,
                  connector,
                  node_idx.as_usize(),
                  node_guard.max_depth,
                  &node_guard.value
              ));

              if visiting.contains(&node_idx.as_usize()) {
                  output.push_str(" (Cycle detected)\n");
                  return;
              }

              if printed_nodes.contains(&node_idx.as_usize()) {
                  output.push_str(" (Shared, already shown)\n");
                  return;
              }
              output.push_str("\n");

              visiting.insert(node_idx.as_usize());
              printed_nodes.insert(node_idx.as_usize());

              let new_prefix = format!("{}{}", prefix, if is_last { "    " } else { "│   " });

              let children_edges: Vec<_> = node_guard.children.iter().flat_map(|(ek, dest_map)| dest_map.iter().map(move |(child_idx, ev)| (ek, ev, *child_idx))).collect();

              let num_children = children_edges.len();
              for (i, (ek, ev, child_idx)) in children_edges.iter().enumerate() {
                  let is_last_child = i == num_children - 1;
                  let child_connector = if is_last_child { "└── " } else { "├── " };
                  output.push_str(&format!("{}{}Edge: {:?} (value: {:?})\n", &new_prefix, child_connector, ek, ev));
                  let recursive_prefix = format!("{}{}", &new_prefix, if is_last_child { "    " } else { "│   " });
                  Self::pretty_print_recursive(*child_idx, arena, &recursive_prefix, true, visiting, printed_nodes, output);
              }

              visiting.remove(&node_idx.as_usize());
          }
      }

      // Implementation block for special_map and related functionality
      // Requires T: Clone, EK: Ord + Clone, EV: Clone
      impl<T: Clone, EK: Ord + Clone, EV: Clone> Trie<EK, EV, T> {
          /// Deep copies the subtrees rooted at `roots` from `source_arena` into a new `Arena`.
          ///
          /// This function performs a full traversal from the given roots and duplicates all
          /// reachable nodes and edges into a new `Arena`. It correctly handles shared subtrees
          /// (copying them only once) and cycles.
          ///
          /// # Arguments
          /// * `source_arena`: The arena containing the original graph.
          /// * `roots`: A slice of `Trie2Index` pointing to the root nodes of the subtrees to copy.
          ///
          /// # Returns
          /// A tuple containing:
          /// - A new `Arena<Trie<EK, EV, T>>` with the copied subtrees.
          /// - A `Vec<Trie2Index>` containing the indices of the new roots in the new arena, in the
          ///   same order as the input `roots`.
          /// - A `HashMap<Trie2Index, Trie2Index>` mapping old node indices to new node indices.
          pub fn deep_copy_subtrees(
              source_arena: &Arena<Self>,
              roots: &[Trie2Index],
          ) -> (Arena<Self>, Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>) {
              let new_arena = Arena::new();
              let mut old_to_new_map: HashMap<Trie2Index, Trie2Index> = HashMap::new();
              let mut new_roots = Vec::with_capacity(roots.len());

              for &root in roots {
                  let new_root =
                      Self::deep_copy_recursive(root, source_arena, &new_arena, &mut old_to_new_map);
                  new_roots.push(new_root);
              }

              (new_arena, new_roots, old_to_new_map)
          }

          /// Deep copies the subtrees rooted at `roots` from `source_arena` into `dest_arena`.
          ///
          /// This function performs a full traversal from the given roots and duplicates all
          /// reachable nodes and edges from `source_arena` into `dest_arena`. It correctly
          /// handles shared subtrees (copying them only once) and cycles.
          ///
          /// # Arguments
          /// * `source_arena`: The arena containing the original graph.
          /// * `dest_arena`: The arena to copy the subtrees into.
          /// * `roots`: A slice of `Trie2Index` pointing to the root nodes of the subtrees to copy.
          ///
          /// # Returns
          /// A tuple containing:
          /// - A `Vec<Trie2Index>` containing the indices of the new roots in the `dest_arena`,
          ///   in the same order as the input `roots`.
          /// - A `HashMap<Trie2Index, Trie2Index>` mapping old node indices to new node indices.
          pub fn deep_copy_subtrees_into(
              source_arena: &Arena<Self>,
              dest_arena: &Arena<Self>,
              roots: &[Trie2Index],
          ) -> (Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>) {
              let mut old_to_new_map: HashMap<Trie2Index, Trie2Index> = HashMap::new();
              let mut new_roots = Vec::with_capacity(roots.len());

              for &root in roots {
                  let new_root =
                      Self::deep_copy_recursive(root, source_arena, dest_arena, &mut old_to_new_map);
                  new_roots.push(new_root);
              }

              (new_roots, old_to_new_map)
          }

          /// Recursive helper for `deep_copy_subtrees`.
          fn deep_copy_recursive(
              old_idx: Trie2Index,
              source_arena: &Arena<Self>,
              new_arena: &Arena<Self>,
              old_to_new_map: &mut HashMap<Trie2Index, Trie2Index>,
          ) -> Trie2Index {
              if let Some(&new_idx) = old_to_new_map.get(&old_idx) {
                  return new_idx;
              }

              let old_node_guard = old_idx
                  .read(source_arena)
                  .expect("Source node not found during deep copy");

              // Create a new node with copied value and max_depth, but no children yet.
              let new_node = Trie {
                  value: old_node_guard.value.clone(),
                  children: BTreeMap::new(), // Children will be added after recursive calls.
                  max_depth: old_node_guard.max_depth,
              };
              let new_idx = Trie2Index::from(new_arena.insert(new_node));

              // Insert the mapping *before* recursing to handle cycles correctly.
              old_to_new_map.insert(old_idx, new_idx);

              // Now, collect children info to avoid holding the read guard during recursive calls.
              let children_to_copy: Vec<(EK, OrderedHashMap<Trie2Index, EV>)> = old_node_guard
                  .children
                  .iter()
                  .map(|(ek, dest_map)| (ek.clone(), dest_map.clone()))
                  .collect();

              // Drop the read guard on the old node.
              drop(old_node_guard);

              // Recurse for all children and build up the new children map.
              let mut new_children = BTreeMap::new();
              for (ek, dest_map) in children_to_copy {
                  let mut new_dest_map = OrderedHashMap::with_capacity(dest_map.len());
                  for (old_child_idx, ev) in dest_map {
                      let new_child_idx =
                          Self::deep_copy_recursive(old_child_idx, source_arena, new_arena, old_to_new_map);
                      new_dest_map.insert(new_child_idx, ev.clone());
                  }
                  new_children.insert(ek, new_dest_map);
              }

              // Now, get a write lock on the new node to insert the copied children.
              let mut new_node_guard = new_idx
                  .write(new_arena)
                  .expect("Newly created node not found during deep copy");
              new_node_guard.children = new_children;

              new_idx
          }

          fn count_all_edges(
              arena: &Arena<Trie<EK, EV, T>>,
              root_nodes: &[Trie2Index],
          ) -> usize {
              let mut visited: HashSet<usize> = HashSet::new();
              let mut queue: VecDeque<Trie2Index> = VecDeque::new();
              let mut total_edges = 0;

              for &root in root_nodes {
                  if visited.insert(root.as_usize()) {
                      queue.push_back(root);
                  }
              }

              while let Some(node_idx) = queue.pop_front() {
                  let guard = node_idx.read(arena).expect("RwLock poisoned during edge count");
                  for children_map in guard.children.values() {
                      for (child_idx, _) in children_map.iter() {
                          total_edges += 1;
                          let c_u = child_idx.as_usize();
                          if visited.insert(c_u) {
                              queue.push_back(*child_idx);
                          }
                      }
                  }
              }
              total_edges
          }

          /// Performs a specialized breadth-first traversal for propagation/scheduling.
          ///
          /// Traverses all edges and allows callers to:
          /// - process a node (process)
          /// - compute new values for children based on an edge (step)
          /// - merge multiple incoming values for the same child (merge)
          ///
          /// Scheduling uses node.max_depth; if not recomputed yet it may be usize::MAX,
          /// which is suboptimal but not incorrect.
          #[time_it]
          pub fn special_map<V: Clone>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: impl FnMut(&V, &EK, &EV, &Trie<EK, EV, T>) -> Option<V>,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          ) {
              // ------------------------------------------------------------------
              //  Simple depth-driven scheduler.
              // ------------------------------------------------------------------
              let mut values: HashMap<usize, V> = HashMap::new();
              let mut stopped_nodes: HashSet<usize> = HashSet::new();
              let mut todo: BTreeMap<usize, OrderedHashSet<Trie2Index>> = BTreeMap::new();

              let initial_nodes: Vec<_> = initial_nodes_and_values.iter().map(|(n, _)| *n).collect();
              let total_edges = Self::count_all_edges(arena, &initial_nodes);
              if PROGRESS_BAR_ENABLED {
                  println!("Progress bar enabled");
              } else {
                  println!("Progress bar disabled")
              }
              let mut pb = tqdm!(total = total_edges, desc = "Traversing edges", disable = !PROGRESS_BAR_ENABLED, leave=false);

              // Seed with the user-supplied starting set
              for (node_idx, v0) in initial_nodes_and_values {
                  let ptr = node_idx.as_usize();
                  values
                      .entry(ptr)
                      .and_modify(|old| merge(old, v0.clone()))
                      .or_insert(v0);
                  let depth = node_idx.read(arena).expect("poison").max_depth;
                  todo.entry(depth).or_default().insert(node_idx);
              }

              // Main loop ---------------------------------------------------------
              while let Some((_depth, node_indices)) = todo.pop_first() {
                  for node_idx in &node_indices {
                      let ptr = node_idx.as_usize();
                      if stopped_nodes.contains(&ptr) {
                          continue;
                      }

                      let mut agg_v = match values.remove(&ptr) {
                          Some(v) => v,
                          None => continue,
                      };

                      // ---------- user ‘process’ callback ----------
                      let proceed = {
                          let guard = node_idx.read(arena).expect("poison");
                          process(&guard, &mut agg_v)
                      };

                      if !proceed {
                          stopped_nodes.insert(ptr);
                          continue;
                      }

                      // ---------- propagate to children -------------
                      let edges: Vec<(EK, EV, Trie2Index)> = {
                          let guard = node_idx.read(arena).expect("poison");
                          guard
                              .children
                              .iter()
                              .flat_map(|(ek, dst_map)| {
                                  let ekc = ek.clone();
                                  dst_map
                                      .iter()
                                      .map(move |(child_idx, ev)| (ekc.clone(), ev.clone(), *child_idx))
                              })
                              .collect()
                      };

                      for (ek, ev, child_idx) in edges {
                          let _ = pb.update(1);
                          let child_ptr = child_idx.as_usize();

                          if stopped_nodes.contains(&child_ptr) {
                              continue;
                          }

                          let maybe_v = {
                              let child_guard = child_idx.read(arena).expect("poison");
                              step(&agg_v, &ek, &ev, &child_guard)
                          };
                          if let Some(new_v) = maybe_v {
                              values
                                  .entry(child_ptr)
                                  .and_modify(|old| merge(old, new_v.clone()))
                                  .or_insert(new_v);

                              let child_depth = child_idx.read(arena).expect("poison").max_depth;
                              todo.entry(child_depth).or_default().insert(child_idx);
                          }
                      }
                  }
              }
          }

          /// Performs a specialized breadth-first traversal, grouping children by edge key.
          /// This is more efficient than `special_map` when many edges share the same key,
          /// as the `step` function is called once per key, not once per edge.
          ///
          /// Scheduling uses node.max_depth; if not recomputed yet it may be usize::MAX,
          /// which is suboptimal but not incorrect.
          #[time_it]
          pub fn special_map_grouped<V, S, I>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: S,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          )
          where
              V: Clone,
              S: FnMut(
                  &V, &EK, &OrderedHashMap<Trie2Index, EV>
              ) -> I,
              I: IntoIterator<Item = (Trie2Index, V)>,
          {
              // ------------------------------------------------------------------
              //  Simple depth-driven scheduler. (Same as special_map)
              // ------------------------------------------------------------------
              let mut values: HashMap<usize, V> = HashMap::new();
              let mut stopped_nodes: HashSet<usize> = HashSet::new();
              let mut todo: BTreeMap<usize, OrderedHashSet<Trie2Index>> = BTreeMap::new();

              let initial_nodes: Vec<_> = initial_nodes_and_values.iter().map(|(n, _)| *n).collect();
              let total_edges = Self::count_all_edges(arena, &initial_nodes);
              let mut pb = tqdm!(total = total_edges, desc = "Traversing edges", disable = !PROGRESS_BAR_ENABLED, leave=false);

              // Seed with the user-supplied starting set
              for (node_idx, v0) in initial_nodes_and_values {
                  let ptr = node_idx.as_usize();
                  values
                      .entry(ptr)
                      .and_modify(|old| merge(old, v0.clone()))
                      .or_insert(v0);
                  let depth = node_idx.read(arena).expect("poison").max_depth;
                  todo.entry(depth).or_default().insert(node_idx);
              }

              // Main loop ---------------------------------------------------------
              while let Some((_depth, node_indices)) = todo.pop_first() {
                  for node_idx in &node_indices {
                      let ptr = node_idx.as_usize();
                      if stopped_nodes.contains(&ptr) { continue; }

                      let mut agg_v = match values.remove(&ptr) {
                          Some(v) => v,
                          None => continue,
                      };

                      let proceed = {
                          let guard = node_idx.read(arena).expect("poison");
                          process(&guard, &mut agg_v)
                      };

                      if !proceed {
                          stopped_nodes.insert(ptr);
                          continue;
                      }

                      // ---------- propagate to children (grouped by edge key) -------------
                      let children_by_ek: Vec<(EK, OrderedHashMap<Trie2Index, EV>)> = {
                          let guard = node_idx.read(arena).expect("poison");
                          guard.children.iter()
                              .map(|(ek, dst_map)| (ek.clone(), dst_map.clone()))
                              .collect()
                      };

                      for (ek, dest_map) in children_by_ek {
                          let valid_edges_count = dest_map.len();
                          if valid_edges_count > 0 {
                              let _ = pb.update(valid_edges_count);
                          }

                          let new_values_for_children = step(&agg_v, &ek, &dest_map);

                          for (child_idx, new_v) in new_values_for_children {
                              let child_ptr = child_idx.as_usize();

                              if stopped_nodes.contains(&child_ptr) {
                                  continue;
                              }

                              values.entry(child_ptr)
                                  .and_modify(|old| merge(old, new_v.clone()))
                                  .or_insert(new_v);

                              let child_depth = child_idx.read(arena).expect("poison").max_depth;
                              todo.entry(child_depth).or_default().insert(child_idx);
                          }
                      }
                  }
              }
          }
      }

      // Implement PartialEq for Trie (shallow: compares value, max_depth, and immediate children lists)
      impl<EK, EV, T> PartialEq for Trie<EK, EV, T>
      where
          EK: Ord + PartialEq,
          EV: PartialEq,
          T: PartialEq,
      {
          fn eq(&self, other: &Self) -> bool {
              if self.value != other.value || self.max_depth != other.max_depth {
                  return false;
              }
              if self.children.len() != other.children.len() {
                  return false;
              }
              for (ek, self_map) in &self.children {
                  match other.children.get(ek) {
                      None => return false,
                      Some(other_map) => {
                          if self_map.len() != other_map.len() {
                              return false;
                          }
                          // OrderedHashMap preserves insertion order; but we only need equality as sets of (idx, ev)
                          for (idx, ev) in self_map {
                              match other_map.get(idx) {
                                  Some(o_ev) if o_ev == ev => {}
                                  _ => return false,
                              }
                          }
                      }
                  }
              }
              true
          }
      }

      // Implement Eq for Trie
      impl<EK, EV, T> Eq for Trie<EK, EV, T>
      where
          EK: Ord + Eq,
          EV: Eq + Clone,
          T: Eq,
      {
      }

      // Implement PartialOrd for Trie
      impl<EK, EV, T> PartialOrd for Trie<EK, EV, T>
      where
          EK: Ord,
          EV: Ord + Clone,
          T: Ord,
      {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              Some(self.cmp(other))
          }
      }

      // Implement Ord for Trie
      impl<EK, EV, T> Ord for Trie<EK, EV, T>
      where
          EK: Ord,
          EV: Ord + Clone,
          T: Ord,
      {
          fn cmp(&self, other: &Self) -> Ordering {
              self.value.cmp(&other.value)
                  .then_with(|| self.max_depth.cmp(&other.max_depth))
                  .then_with(|| self.children.len().cmp(&other.children.len()))
                  .then_with(|| {
                      for ((sk, sv), (ok, ov)) in self.children.iter().zip(other.children.iter()) {
                          match sk.cmp(ok) {
                              Ordering::Equal => (),
                              non_eq => return non_eq,
                          }
                          match sv.len().cmp(&ov.len()) {
                              Ordering::Equal => (),
                              non_eq => return non_eq,
                          }
                          for ((s_idx, s_ev), (o_idx, o_ev)) in sv.iter().zip(ov.iter()) {
                              match s_idx.cmp(o_idx) {
                                  Ordering::Equal => (),
                                  non_eq => return non_eq,
                              }
                              match s_ev.cmp(o_ev) {
                                  Ordering::Equal => (),
                                  non_eq => return non_eq,
                              }
                          }
                      }
                      Ordering::Equal
                  })
          }
      }

      // Implement Hash for Trie (shallow: value, max_depth, and immediate children lists)
      impl<EK, EV, T> Hash for Trie<EK, EV, T>
      where
          EK: Ord + Hash,
          EV: PartialEq + Clone + Hash,
          T: PartialEq + Hash,
      {
          fn hash<H: Hasher>(&self, state: &mut H) {
              self.value.hash(state);
              self.max_depth.hash(state);

              self.children.len().hash(state);
              for (ek, dest_map) in &self.children {
                  ek.hash(state);
                  dest_map.len().hash(state);

                  // To be order-independent with respect to child order, hash pairs and then sort.
                  let mut pair_hashes = Vec::with_capacity(dest_map.len());
                  for (child_idx, ev) in dest_map {
                      let mut pair_hasher = DeterministicHasher::new(DefaultHasher::new());
                      child_idx.as_usize().hash(&mut pair_hasher);
                      ev.hash(&mut pair_hasher);
                      pair_hashes.push(pair_hasher.finish());
                  }
                  pair_hashes.sort_unstable();
                  for h in pair_hashes {
                      h.hash(state);
                  }
              }
          }
      }

      /// A helper struct to facilitate inserting an edge into a Trie,
      /// trying multiple potential destinations and optionally creating a new node.
      /// Provides a chainable interface.
      ///
      /// This index-based version stores a reference to the Arena and a source Trie2Index.
      pub struct EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
      where
          EK: Ord + Clone,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          arena: &'a Arena<Trie<EK, EV, T>>,
          source_idx: Trie2Index,                      // The source node for the edge
          edge_key: EK,                                // The key for the edge to be inserted
          pub edge_value: Option<EV>,                      // The value for the edge to be inserted
          merge_edge_value: FMergeEV,                  // The function to merge edge values
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
          result: Option<Trie2Index>,                  // Stores the successful destination node
      }

      impl<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
          EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          /// Creates a new `EdgeInserter`.
          ///
          /// # Arguments
          ///
          /// * `arena`: The arena holding Trie nodes.
          /// * `source_idx`: The source node where the edge originates.
          /// * `edge_key`: The key for the new edge.
          /// * `edge_value`: The value for the new edge.
          /// * `merge_edge_value`: A closure that merges the existing edge value with the new edge value.
          pub fn new(
              arena: &'a Arena<Trie<EK, EV, T>>,
              source_idx: Trie2Index,
              edge_key: EK,
              edge_value: EV,
              merge_edge_value: FMergeEV,
              update_node_value: FUpdateT,
              mut merge_edge_value_and_source_node_value: FMergeEV_T,
          ) -> Self {
              // Avoid unused-parameter warnings
              let mut edge_value = edge_value;
              {
                  let source_guard = source_idx
                      .read(arena)
                      .expect("Arena read poisoned while reading source node value for edge value merge");
                  merge_edge_value_and_source_node_value(&mut edge_value, &source_guard.value);
              }

              EdgeInserter {
                  arena,
                  source_idx,
                  edge_key,
                  edge_value: Some(edge_value),
                  merge_edge_value,
                  update_node_value,
                  merge_edge_value_and_source_node_value,
                  result: None,
              }
          }

          /// Tries to establish an edge to the given `destination` index.
          ///
          /// If an edge with the same `edge_key` already exists pointing to `destination`,
          /// it merges the `edge_value` using the `merge_edge_value` closure.
          /// If no such edge exists, it inserts a new edge.
          ///
          /// Returns `self` to allow chaining.
          #[time_it]
          pub fn try_destination(mut self, destination: Trie2Index) -> Self {
              if self.result.is_some() {
                  return self; // Already found a destination
              }

              let mut update_info: Option<(Trie2Index, EV)> = None;

              { // Scope for source_guard
                  let mut source_guard = self.source_idx
                      .write(self.arena)
                      .expect("Arena write poisoned while locking source in try_destination");

                  if let Some(existing_ev_mut) = source_guard
                      .children
                      .get_mut(&self.edge_key)
                      .and_then(|dest_map| dest_map.get_mut(&destination))
                  {
                      let new_ev = self.edge_value.take().unwrap();
                      crate::debug!(7, "Merging edge value {:?} into existing edge value {:?} for edge {:?} to node {}", new_ev, existing_ev_mut, self.edge_key, destination.as_usize());
                      (self.merge_edge_value)(existing_ev_mut, new_ev);
                      let updated_ev = existing_ev_mut.clone();
                      self.result = Some(destination);
                      update_info = Some((destination, updated_ev));
                  } else {
                      let edge_val_clone = self.edge_value.as_ref().unwrap().clone();
                      crate::debug!(7, "Inserting edge {:?} with value {:?} to node {}", self.edge_key, edge_val_clone, destination.as_usize());
                      source_guard.try_insert(self.edge_key.clone(), &mut self.edge_value, destination);
                      self.result = Some(destination);
                      update_info = Some((destination, edge_val_clone));
                  }
              }

              if let Some((dest_idx, ev)) = update_info {
                  crate::debug!(7, "Updating node value for destination {} with edge value {:?}. self.edge_value: {:?}", dest_idx.as_usize(), ev, self.edge_value);
                  let mut dest_w = dest_idx.write(self.arena).expect("Arena write");
                  (self.update_node_value)(&mut dest_w.value, &ev);
              }

              self
          }

          /// Tries to establish an edge to any destination in the provided slice.
          /// Iterates through `destinations` and calls `try_destination` for each until one succeeds.
          /// Returns `self` to allow chaining.
          #[time_it]
          pub fn try_destinations(mut self, destinations: &[Trie2Index]) -> Self {
              for &destination in destinations {
                  if self.result.is_some() {
                      break; // Stop trying once a destination is found
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          #[time_it]
          pub fn try_destinations_iter(mut self, destinations: impl Iterator<Item = Trie2Index>) -> Self {
              for destination in destinations {
                  if self.result.is_some() {
                      break; // Stop trying once a destination is found
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          #[time_it]
          pub fn try_destinations_iter_with<F, R>(mut self, destinations: F) -> Self
          where
              F: Fn() -> R,
              R: Iterator<Item = Trie2Index>,
          {
              for destination in destinations() {
                  if self.result.is_some() {
                      break;
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          /// Merges the edge with existing children under `self.edge_key` (if any).
          /// Returns `self` to allow chaining.
          pub fn try_children(mut self) -> Self {
              if self.result.is_some() {
                  return self;
              }

              let children_for_this_key: Vec<Trie2Index> = {
                  let source_guard = self.source_idx
                      .read(self.arena)
                      .expect("Arena read poisoned while locking source in try_children");
                  if let Some(dest_map) = source_guard.children.get(&self.edge_key) {
                      dest_map.keys().cloned().collect()
                  } else {
                      Vec::new()
                  }
              };

              if !children_for_this_key.is_empty() {
                  self = self.try_destinations(&children_for_this_key);
              }
              self
          }

          /// If no destination has been found yet, creates a new node with the given `value`,
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Returns `self` to allow chaining.
          pub fn else_create_destination_with_value(mut self, value: T) -> Self {
              if self.result.is_some() {
                  return self;
              }

              let new_node_idx = Trie2Index::new(self.arena.insert(Trie::new(value)));
              let edge_val_clone = self.edge_value.as_ref().unwrap().clone();

              { // Scope for source_guard
                  let mut source_guard = self.source_idx
                      .write(self.arena)
                      .expect("Arena write poisoned while locking source in else_create_with_value");
                  source_guard.try_insert(self.edge_key.clone(), &mut self.edge_value, new_node_idx);
                  self.result = Some(new_node_idx);
              }

              if let Some(dest_idx) = self.result {
                  let mut dest_w = dest_idx.write(self.arena).expect("Arena write");
                  (self.update_node_value)(&mut dest_w.value, &edge_val_clone);
              }

              self
          }

          /// If no destination has been found yet, creates a new node by calling `value_fn`,
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Returns `self` to allow chaining.
          pub fn else_create_destination_with(self, value_fn: impl FnOnce() -> T) -> Self {
              if self.result.is_some() {
                  return self;
              }
              self.else_create_destination_with_value(value_fn())
          }

          /// If no destination has been found yet, creates a new node with the default value (`T::default()`),
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Requires `T: Default`.
          /// Returns `self` to allow chaining.
          pub fn else_create_destination(self) -> Self
          where
              T: Default,
          {
              if self.result.is_some() {
                  return self;
              }
              self.else_create_destination_with_value(T::default())
          }

          /// Returns the resulting destination node index, if one was found or created.
          pub fn into_option(self) -> Option<Trie2Index> {
              self.result
          }

          pub fn is_some(&self) -> bool {
              self.result.is_some()
          }

          pub fn clone_into_option(&self) -> Option<Trie2Index> {
              self.result
          }

          /// Returns the resulting destination node index, panicking if none was found or created.
          pub fn unwrap(self) -> Trie2Index {
              self.result.expect("EdgeInserter::unwrap() called but no destination was found or created")
          }

          /// Returns the resulting destination node index, panicking with the given message if none was found or created.
          pub fn expect(self, msg: &str) -> Trie2Index {
              self.result.expect(msg)
          }
      }

      // Optional: Add a convenience method to Trie2Index to create an EdgeInserter easily.
      impl Trie2Index {
          /// Creates an `EdgeInserter` to help add an edge starting from this node index.
          ///
          /// # Example (after migration)
          ///
          /// ```ignore
          /// let root_idx: Trie2Index = ...;
          /// let arena: Arena<Trie<String, i32, NodeValue>> = ...;
          /// let god = /* obtain GodWrapper */ unimplemented!();
          /// let new_or_existing_node_idx = root_idx
          ///     .insert_edge(
          ///         &arena, &god, "key".to_string(), 1,
          ///         |ev_old, ev_new| *ev_old += ev_new,        // merge edge value
          ///         |_node_value, _ev| {},                     // update node value from edge value
          ///         |_edge_value, _source_node_value| {},      // merge edge value with source node value
          ///     )
          ///     .try_children()
          ///     .else_create_destination()
          ///     .unwrap();
          /// ```
          pub fn insert_edge<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
              edge_key: EK,
              edge_value: EV,
              merge_edge_value: FMergeEV,
              update_node_value: FUpdateT,
              merge_edge_value_and_source_node_value: FMergeEV_T,
          ) -> EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
          where
              EK: Ord + Clone + Debug,
              EV: Clone + Debug,
              T: Clone,
              FMergeEV: FnMut(&mut EV, EV),
              FUpdateT: FnMut(&mut T, &EV),
              FMergeEV_T: FnMut(&mut EV, &T),
          {
              EdgeInserter::new(
                  arena,
                  self,
                  edge_key,
                  edge_value,
                  merge_edge_value,
                  update_node_value,
                  merge_edge_value_and_source_node_value,
              )
          }
      }

      /// Attempts to establish an edge from `source` to a single `destination`,
      /// optionally merging edge values if an edge already exists.
      /// Returns `Some(Trie2Index)` if merge or insert succeeded.
      pub fn try_destination<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
          arena: &'a Arena<Trie<EK, EV, T>>,
          source: Trie2Index,
          edge_key: EK,
          edge_value: EV,
          destination: Trie2Index,
          merge_edge_value: FMergeEV,
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
      ) -> Option<Trie2Index>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          EdgeInserter::new(
              arena,
              source,
              edge_key,
              edge_value,
              merge_edge_value,
              update_node_value,
              merge_edge_value_and_source_node_value,
          )
          .try_destination(destination)
          .into_option()
      }

      /// Attempts to establish an edge from `source` to any of the provided `destinations`,
      /// returning the first successful one (merge or insert), or `None` if none matched.
      pub fn try_destination_with<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
          arena: &'a Arena<Trie<EK, EV, T>>,
          source: Trie2Index,
          edge_key: EK,
          edge_value: EV,
          destinations: &[Trie2Index],
          merge_edge_value: FMergeEV,
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
      ) -> Option<Trie2Index>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          EdgeInserter::new(
              arena,
              source,
              edge_key,
              edge_value,
              merge_edge_value,
              update_node_value,
              merge_edge_value_and_source_node_value,
          )
          .try_destinations(destinations)
          .into_option()
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct Index {
          index: usize,
      }

      impl From<usize> for Index {
          fn from(index: usize) -> Self {
              Index { index }
          }
      }

      impl From<Index> for usize {
          fn from(idx: Index) -> usize {
              idx.index
          }
      }

      impl Index {
          pub fn as_usize(self) -> usize {
              self.index
          }
      }

      #[derive(Debug, Clone)]
      pub struct ArenaInner<T> {
          values: Vec<Option<T>>,
          counter: usize,
      }

      impl<T: PartialEq> PartialEq for ArenaInner<T> {
          fn eq(&self, other: &Self) -> bool {
              self.counter == other.counter && self.values == other.values
          }
      }
      impl<T: Eq> Eq for ArenaInner<T> {}

      impl<T: PartialOrd> PartialOrd for ArenaInner<T> {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              match self.counter.partial_cmp(&other.counter) {
                  Some(Ordering::Equal) => self.values.partial_cmp(&other.values),
                  other => other,
              }
          }
      }

      impl<T: Ord> Ord for ArenaInner<T> {
          fn cmp(&self, other: &Self) -> Ordering {
              self.counter.cmp(&other.counter)
                  .then_with(|| self.values.cmp(&other.values))
          }
      }

      #[derive(Debug, Clone)]
      pub struct Arena<T> {
          pub(crate) inner: Arc<RwLock<ArenaInner<T>>>,
      }
      impl<T> PartialEq for Arena<T>
      where
          T: PartialEq,
      {
          fn eq(&self, other: &Self) -> bool {
              Arc::ptr_eq(&self.inner, &other.inner)
                  || PartialEq::eq(
                      &*self.inner.read().unwrap(),
                      &*other.inner.read().unwrap(),
                  )
          }
      }
      impl<T> Eq for Arena<T> where T: Eq {}

      impl<T> PartialOrd for Arena<T>
      where
          T: PartialOrd,
      {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              if Arc::ptr_eq(&self.inner, &other.inner) {
                  return Some(Ordering::Equal);
              }
              PartialOrd::partial_cmp(
                  &*self.inner.read().unwrap(),
                  &*other.inner.read().unwrap(),
              )
          }
      }

      impl<T> Ord for Arena<T>
      where
          T: Ord,
      {
          fn cmp(&self, other: &Self) -> Ordering {
              if Arc::ptr_eq(&self.inner, &other.inner) {
                  return Ordering::Equal;
              }
              Ord::cmp(
                  &*self.inner.read().unwrap(),
                  &*other.inner.read().unwrap(),
              )
          }
      }

      // Note: hashing only the pointer means two Arenas with equal content but different Arcs
      // will not hash equal even though `eq` may return true. If you need Eq/Hash consistency,
      // hash the map contents instead.
      impl<T> Hash for Arena<T>
      where
          T: Hash,
      {
          fn hash<H: Hasher>(&self, state: &mut H) {
              Hash::hash(&Arc::as_ptr(&self.inner), state);
          }
      }

      impl<T> Arena<T> {
          pub fn new() -> Self {
              Arena {
                  inner: Arc::new(RwLock::new(ArenaInner {
                      values: Vec::new(),
                      counter: 0,
                  })),
              }
          }

          // Inserts `value` at the next free index and returns the Index.
          pub fn insert(&self, value: T) -> Index {
              let mut inner = self.inner.write().unwrap();
              let next = inner.counter;
              inner.counter = inner.counter.checked_add(1).expect("Arena index overflow");

              if next >= inner.values.len() {
                  inner.values.resize_with(next + 1, || None);
              }

              let old = inner.values[next].replace(value);
              debug_assert!(old.is_none());
              Index { index: next }
          }

          // Replace or set a value at a specific index. Returns the old value if any.
          pub fn insert_at(&self, index: Index, value: T) -> Option<T> {
              let mut inner = self.inner.write().unwrap();
              let idx = index.index;
              if idx >= inner.values.len() {
                  inner.values.resize_with(idx + 1, || None);
              }
              if idx >= inner.counter {
                  inner.counter = idx + 1;
              }
              inner.values[idx].replace(value)
          }

          // Remove a value at index, returning it if present.
          pub fn remove(&self, index: Index) -> Option<T> {
              let mut inner = self.inner.write().unwrap();
              let idx = index.index;
              if idx < inner.values.len() {
                  inner.values[idx].take()
              } else {
                  None
              }
          }

          // Returns true if the index exists in the arena.
          pub fn contains(&self, index: Index) -> bool {
              let inner = self.inner.read().unwrap();
              inner.values.get(index.index).map_or(false, |v| v.is_some())
          }

          // Returns a clone of the value at index (requires T: Clone).
          pub fn get(&self, index: Index) -> Option<T>
          where
              T: Clone,
          {
              self.inner.read().unwrap().values.get(index.index).and_then(|v| v.as_ref()).cloned()
          }

          // Read access via a closure (no Clone bound required).
          pub fn with<R>(&self, index: Index, f: impl FnOnce(&T) -> R) -> Option<R> {
              let guard = self.inner.read().unwrap();
              guard.values.get(index.index).and_then(|opt| opt.as_ref()).map(f)
          }

          // Mutable access via a closure (no Clone bound required).
          pub fn with_mut<R>(&self, index: Index, f: impl FnOnce(&mut T) -> R) -> Option<R> {
              let mut guard = self.inner.write().unwrap();
              guard.values.get_mut(index.index).and_then(|opt| opt.as_mut()).map(f)
          }

          pub fn len(&self) -> usize {
              self.inner.read().unwrap().values.iter().filter(|v| v.is_some()).count()
          }

          pub fn is_empty(&self) -> bool {
              self.inner.read().unwrap().values.iter().all(|v| v.is_none())
          }

          pub fn clear(&self) {
              let mut inner = self.inner.write().unwrap();
              inner.values.clear();
              inner.counter = 0;
          }

          // Snapshot of all indices.
          pub fn indices(&self) -> Vec<Index> {
              self.inner
                  .read()
                  .unwrap()
                  .values
                  .iter()
                  .enumerate()
                  .filter_map(|(i, v)| if v.is_some() { Some(Index::from(i)) } else { None })
                  .collect()
          }

          // Snapshot of all entries as (Index, T) pairs (requires T: Clone).
          pub fn to_vec(&self) -> Vec<(Index, T)>
          where
              T: Clone,
          {
              self.inner
                  .read()
                  .unwrap()
                  .values
                  .iter()
                  .enumerate()
                  .filter_map(|(i, v)| v.as_ref().map(|val| (Index::from(i), val.clone())))
                  .collect()
          }
      }

      impl<T> JSONConvertible for Arena<T>
      where
          T: JSONConvertible,
      {
          fn to_json(&self) -> JSONNode {
              let guard = self.inner.read().unwrap();
              let mut obj = BTreeMap::new();
              obj.insert("counter".to_string(), guard.counter.to_json());
              let items: Vec<JSONNode> = guard.values.iter().enumerate().filter_map(|(k, v)| {
                  v.as_ref().map(|val| {
                      JSONNode::Array(vec![
                          k.to_json(),
                          val.to_json(),
                      ])
                  })
              }).collect();
              obj.insert("values".to_string(), JSONNode::Array(items));
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let counter = usize::from_json(obj.remove("counter").ok_or("Missing 'counter' field")?)?;
              let values_node = obj.remove("values").ok_or("Missing 'values' field")?;
              let arr = match values_node {
                  JSONNode::Array(arr) => arr,
                  _ => return Err("Expected JSONNode::Array for Arena values".to_string()),
              };

              let mut values = Vec::new();
              for item_node in arr {
                  let mut pair = match item_node {
                      JSONNode::Array(pair) if pair.len() == 2 => pair,
                      _ => return Err("Expected 2-element array for Arena entry".to_string()),
                  };
                  let value_node = pair.pop().unwrap();
                  let key_node = pair.pop().unwrap();

                  let key = usize::from_json(key_node)?;
                  let value = T::from_json(value_node)?;

                  if key >= values.len() {
                      values.resize_with(key + 1, || None);
                  }
                  values[key] = Some(value);
              }

              Ok(Arena {
                  inner: Arc::new(RwLock::new(ArenaInner {
                      values,
                      counter,
                  })),
              })
          }
      }

      /// A trait for edge values that can be merged.
      pub trait MergeableEdgeValue: Sized {
          /// Merges another value into this one.
          fn merge(&mut self, other: Self);
      }

      impl MergeableEdgeValue for () {
          fn merge(&mut self, _other: Self) {
              // Nothing to do for unit type.
          }
      }

      impl<EK, EV, T> Arena<Trie<EK, EV, T>>
      where
          EK: Ord + Clone,
          EV: Clone + MergeableEdgeValue,
      {
          /// Inserts an edge from `src` to `dst` with the given `edge_key` and `edge_value`.
          /// If an edge with the same key to the same destination already exists, the new
          /// `edge_value` is merged into the existing one using the `MergeableEdgeValue` trait.
          pub fn insert_edge_simple(
              &self,
              src: Trie2Index,
              dst: Trie2Index,
              edge_key: EK,
              edge_value: EV,
          ) {
              if let Some(mut src_guard) = src.write(self) {
                  src_guard.children.entry(edge_key).or_default()
                      .entry(dst)
                      .and_modify(|ev| ev.merge(edge_value.clone()))
                      .or_insert(edge_value);
              }
          }
      }

      pub type GodWrapper<EK, EV, T> = Arena<Trie<EK, EV, T>>;
      pub type God<EK, EV, T> = Arena<Trie<EK, EV, T>>;

    src/constraint_precompute3_challenge_elimination.rs: |
      // src/constraint_precompute3_challenge_elimination.rs
      use std::collections::{BTreeMap, BTreeSet, VecDeque};
      use std::time::Instant;
      use crate::constraint::{IntermediatePrecomputeNode3, IntermediatePrecomputeNode3Index, IntermediateTrie3EdgeKey, IntermediateTrie3GodWrapper, LLMTokenBV, StateIDBV};
      use crate::constraint::IntermediatePrecomputedNodeContents3;
      use crate::datastructures::trie::Trie;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use crate::r#macro::is_debug_level_enabled;
      use crate::tokenizer::TokenizerStateID;
      use indicatif::{ProgressBar, ProgressDrawTarget, ProgressStyle};
      use rand::Rng;
      use crate::datastructures::ordered_hash_map::Pop;

      /// If true, runs both trie-based and path-based elimination, compares them,
      /// and if a mismatch is found, attempts to find a minimal failing input graph.
      /// This adds significant overhead and should only be used for debugging the
      /// elimination logic itself.
      const DEBUG_MISMATCHES: bool = true;

      /// Maximum stack depth during trie-based elimination. Prevents infinite loops
      /// on graphs with cycles that contain unbalanced Push operations.
      const MAX_STACK_DEPTH: usize = 64;
      const MAX_ELIMINATION_PASSES: usize = 16;

      /// Mark nodes hot early by visit count; lower is safer to avoid blow-ups.
      const HOT_NODE_VISIT_THRESHOLD: u64 = 2048;
      /// If a node accumulates too many distinct pending stacks, mark it hot.
      /// This is counted when a new (source, stack) pair is first seen.
      const UNIQUE_STACKS_PER_NODE_THRESHOLD: usize = 256;
      /// Global hard cap on distinct product states. Once exceeded, force immediate push emission globally.
      /// This preserves correctness (we just stop deferring pushes everywhere).
      const PAIR_CACHE_HARD_LIMIT: usize = 1_000_000;

      /// Normalizes a path for comparison purposes.
      /// - Removes NoOp edges.
      /// - Collects all CheckLLM bitvectors, intersects them, and prepends a single CheckLLM.
      fn normalize_path(path: Vec<IntermediateTrie3EdgeKey>) -> Vec<IntermediateTrie3EdgeKey> {
          let mut combined_llm_bv = LLMTokenBV::max_ones();
          let mut has_llm_check = false;

          let mut other_ops: Vec<IntermediateTrie3EdgeKey> = path
              .into_iter()
              .filter(|ek| {
                  if let IntermediateTrie3EdgeKey::CheckLLM(bv) = ek {
                      combined_llm_bv &= bv;
                      has_llm_check = true;
                      false // remove from path
                  } else {
                      !matches!(ek, IntermediateTrie3EdgeKey::NoOp)
                  }
              })
              .collect();

          if has_llm_check {
              other_ops.insert(0, IntermediateTrie3EdgeKey::CheckLLM(combined_llm_bv));
          }

          other_ops
      }
      /// Eliminates adjacent Push/Pop pairs from a stack of intermediate trie edge keys.
      /// Additionally, Pop(0, B) constraints are folded into the preceding Push via intersection.
      /// This is a core part of simplifying the precompute3 graph.
      ///
      /// Pairing rules applied when a Push(A) looks to the nearest Pop(n, B) to its right
      /// (stopping if another Push is encountered first):
      /// - n == 0: If A intersects B, remove Pop(0, B) and keep Push(A). If disjoint, the stack is invalid (None).
      /// - n == 1: If A intersects B, both cancel (epsilon). If disjoint, the stack is invalid (None).
      /// - n > 1: Remove Push(A) and replace Pop with Pop(n - 1, B) unconditionally (no intersection check).
      /// The scan repeats until no more changes can be made.
      fn simplify_path(
          stack: Vec<IntermediateTrie3EdgeKey>,
      ) -> Option<Vec<IntermediateTrie3EdgeKey>> {
          let mut stack = stack;
          loop {
              let mut changed_in_pass = false;
              let mut i = 0;
              while i < stack.len() {
                  if let IntermediateTrie3EdgeKey::Push(push_states) = &stack[i] {
                      let push_states = push_states.clone();
                      // Find nearest pop to the right, not blocked by another push
                      let mut pop_j = None;
                      for j in (i + 1)..stack.len() {
                          if matches!(stack[j], IntermediateTrie3EdgeKey::Push(_)) {
                              break; // Blocked
                          }
                          if matches!(stack[j], IntermediateTrie3EdgeKey::Pop(_, _)) {
                              pop_j = Some(j);
                              break;
                          }
                      }

                      if let Some(j) = pop_j {
                          // Found a pair to cancel
                          let pop_op = stack.remove(j);
                          let _push_op = stack.remove(i); // push is at i

                          if let IntermediateTrie3EdgeKey::Pop(n, pop_states) = pop_op {
                              match n {
                                  0 => {
                                      if push_states.is_disjoint(&pop_states) {
                                          return None; // Mismatch on state check
                                      }
                                      // Fold Pop(0, B) constraint into preceding Push(A) as A := A ∩ B.
                                      // This preserves semantics and reduces the state space.
                                      let mut new_push_bv = push_states.clone();
                                      new_push_bv &= pop_states;
                                      // If intersection is empty we'd have returned None above.
                                      stack.insert(i, IntermediateTrie3EdgeKey::Push(new_push_bv));
                                  }
                                  1 => {
                                      if push_states.is_disjoint(&pop_states) {
                                          return None; // Mismatch on single-pop check
                                      }
                                      // Intersection: both cancel -> epsilon (nothing to insert).
                                  }
                                  _ => {
                                      // n > 1: remove Push unconditionally and decrement Pop.
                                      stack.insert(i, IntermediateTrie3EdgeKey::Pop(n - 1, pop_states));
                                  }
                              }
                          }
                          changed_in_pass = true;
                          // Restart scan from beginning of modified stack
                          i = 0;
                          continue;
                      }
                  }
                  i += 1;
              }
              if !changed_in_pass {
                  break;
              }
          }
          Some(stack)
      }

      pub fn eliminate_pushes_and_pops_path_based(
          roots: &mut BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) {
          // 1. Get all paths from the original graph.
          let all_root_indices: Vec<_> = roots.values().cloned().collect();
          if all_root_indices.is_empty() {
              return;
          }
          let all_paths = IntermediatePrecomputeNode3::get_all_paths(god, &all_root_indices, |n| n.value.end);

          // 2. Simplify them.
          let mut simplified_paths = BTreeSet::new();
          for (_root_value, path_edges) in all_paths {
              let edge_keys: Vec<_> = path_edges.into_iter().map(|(ek, _, _)| ek).collect();
              if let Some(new_path) = simplify_path(edge_keys) {
                  simplified_paths.insert(new_path);
              }
          }

          // 3. Clear the graph and rebuild a single trie from all simplified paths.
          god.clear();

          if simplified_paths.is_empty() {
              // If all paths were eliminated, clear the roots.
              roots.clear();
              return;
          }

          // Create a single root for the new trie.
          let has_only_empty_path = simplified_paths.len() == 1 && simplified_paths.iter().next().unwrap().is_empty();
          let root_content = if has_only_empty_path {
              IntermediatePrecomputedNodeContents3::leaf()
          } else {
              IntermediatePrecomputedNodeContents3::internal()
          };
          let new_root = god.insert(Trie::new(root_content)).into();

          let mut node_cache: BTreeMap<Vec<IntermediateTrie3EdgeKey>, IntermediatePrecomputeNode3Index> = BTreeMap::new();
          node_cache.insert(vec![], new_root);

          for path in simplified_paths {
              if path.is_empty() {
                  continue; // Handled by root node creation
              }
              let mut current_node_idx = new_root;
              for i in 0..path.len() {
                  let edge = &path[i];
                  let prefix = &path[0..=i];

                  let next_node_idx = *node_cache.entry(prefix.to_vec()).or_insert_with(|| {
                      let is_leaf = i == path.len() - 1;
                      let content = if is_leaf { IntermediatePrecomputedNodeContents3::leaf() } else { IntermediatePrecomputedNodeContents3::internal() };
                      god.insert(Trie::new(content)).into()
                  });

                  god.insert_edge_simple(current_node_idx, next_node_idx, edge.clone(), ());
                  current_node_idx = next_node_idx;
              }
          }

          // 4. Update all roots to point to the new single root.
          for (_, root_idx) in roots.iter_mut() {
              *root_idx = new_root;
          }
      }

      pub fn eliminate_pushes_and_pops(
          roots: &mut BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) {
          if !DEBUG_MISMATCHES {
              run_trie_based_elimination(roots, god);
              return;
          }

          // --- DEBUG MODE ---
          // 1. Snapshot original graph
          let old_root_vec: Vec<_> = roots.values().cloned().collect();
          if old_root_vec.is_empty() {
              run_trie_based_elimination(roots, god); // Handle empty case, should do nothing.
              return;
          }

          // Check for cycles. The path-based comparison is only valid for acyclic graphs,
          // as get_all_paths would not terminate on a cyclic graph.
          if Trie::has_cycle(god, old_root_vec.clone()) {
              if is_debug_level_enabled(3) {
                  println!("[Push/Pop Elimination] Skipping debug comparison for cyclic graph.");
              }
              run_trie_based_elimination(roots, god);
              return;
          }

          let (source_god, source_roots_vec, _) = Trie::deep_copy_subtrees(god, &old_root_vec);
          let mut source_roots_map = BTreeMap::new();
          for (sid, r_idx) in roots.keys().zip(source_roots_vec.iter()) {
              source_roots_map.insert(*sid, *r_idx);
          }

          // 2. Compare both implementations
          if check_mismatch(&source_god, &source_roots_map) {
              println!("!!! MISMATCH DETECTED BETWEEN TRIE-BASED AND PATH-BASED ELIMINATION !!!");
              println!("Starting refinement of failing input graph...");

              let (minimal_god, minimal_roots_map) = refine_mismatch(&source_god, &source_roots_map);

              // Rerun on minimal failing input to get the differing outputs for printing
              let (min_trie_paths, min_trie_god, _) = {
                  let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(&minimal_god, &minimal_roots_map.values().cloned().collect::<Vec<_>>());
                  let mut roots_map_copy = BTreeMap::new();
                  for (sid, r_idx) in minimal_roots_map.keys().zip(roots_vec_copy.iter()) {
                      roots_map_copy.insert(*sid, *r_idx);
                  }
                  run_trie_based_elimination(&mut roots_map_copy, &god_copy);
                  let paths = get_normalized_paths(&roots_map_copy, &god_copy);
                  (paths, god_copy, roots_map_copy)
              };

              let (min_path_paths, min_path_god, _) = {
                  let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(&minimal_god, &minimal_roots_map.values().cloned().collect::<Vec<_>>());
                  let mut roots_map_copy = BTreeMap::new();
                  for (sid, r_idx) in minimal_roots_map.keys().zip(roots_vec_copy.iter()) {
                      roots_map_copy.insert(*sid, *r_idx);
                  }
                  eliminate_pushes_and_pops_path_based(&mut roots_map_copy, &god_copy);
                  let paths = get_normalized_paths(&roots_map_copy, &god_copy);
                  (paths, god_copy, roots_map_copy)
              };

              let minimal_input_paths = get_normalized_paths(&minimal_roots_map, &minimal_god);
              println!("\n--- MINIMAL FAILING INPUT ({} paths) ---", minimal_input_paths.len());
              for (i, path) in minimal_input_paths.iter().enumerate() {
                  println!("  Path {}: {:?}", i, path);
              }

              println!("\n--- TRIE-BASED OUTPUT ({} paths) ---", min_trie_paths.len());
              for (i, path) in min_trie_paths.iter().enumerate() {
                  println!("  Path {}: {:?}", i, path);
              }
              println!("\n--- PATH-BASED OUTPUT ({} paths) ---", min_path_paths.len());
              for (i, path) in min_path_paths.iter().enumerate() {
                  println!("  Path {}: {:?}", i, path);
              }

              panic!("Push/Pop elimination mismatch detected. See logs for details.");
          }

          // 5. If no mismatch, run the trie-based version on the actual input `god` to modify it.
          run_trie_based_elimination(roots, god);
      }

      /// Runs both elimination algorithms on a graph and returns true if their outputs differ.
      fn check_mismatch(
          god: &IntermediateTrie3GodWrapper,
          roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
      ) -> bool {
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          if roots_vec.is_empty() { return false; }

          let (trie_paths, _, _) = {
              let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(god, &roots_vec);
              let mut roots_map_copy = BTreeMap::new();
              for (sid, r_idx) in roots.keys().zip(roots_vec_copy.iter()) {
                  roots_map_copy.insert(*sid, *r_idx);
              }
              run_trie_based_elimination(&mut roots_map_copy, &god_copy);
              (get_normalized_paths(&roots_map_copy, &god_copy), god_copy, roots_map_copy)
          };

          let (path_paths, _, _) = {
              let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(god, &roots_vec);
              let mut roots_map_copy = BTreeMap::new();
              for (sid, r_idx) in roots.keys().zip(roots_vec_copy.iter()) {
                  roots_map_copy.insert(*sid, *r_idx);
              }
              eliminate_pushes_and_pops_path_based(&mut roots_map_copy, &god_copy);
              (get_normalized_paths(&roots_map_copy, &god_copy), god_copy, roots_map_copy)
          };

          trie_paths != path_paths
      }

      /// Given a failing graph, randomly removes edges to find a smaller subgraph that still fails.
      fn refine_mismatch(
          initial_god: &IntermediateTrie3GodWrapper,
          initial_roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
      ) -> (IntermediateTrie3GodWrapper, BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>) {
          let (mut minimal_god, minimal_roots_vec, old_to_new) = Trie::deep_copy_subtrees(initial_god, &initial_roots.values().cloned().collect::<Vec<_>>());
          let mut minimal_roots = BTreeMap::new();
          for (sid, old_root) in initial_roots {
              minimal_roots.insert(*sid, *old_to_new.get(old_root).unwrap());
          }

          let mut changed_in_pass = true;
          while changed_in_pass {
              changed_in_pass = false;

              // --- Pass 1: Try to remove edge groups systematically ---
              let current_roots_vec: Vec<_> = minimal_roots.values().cloned().collect();
              let all_nodes = Trie::all_nodes(&minimal_god, &current_roots_vec);

              let mut all_edge_groups = Vec::new();
              for node_idx in all_nodes {
                  if let Some(node_r) = node_idx.read(&minimal_god) {
                      for ek in node_r.children().keys() {
                          all_edge_groups.push((node_idx, ek.clone()));
                      }
                  }
              }

              for (source_idx, edge_key) in all_edge_groups {
                  let (mut candidate_god, candidate_roots_vec, old_to_new) = Trie::deep_copy_subtrees(&minimal_god, &current_roots_vec);
                  let mut candidate_roots = BTreeMap::new();
                  for (sid, old_root) in &minimal_roots {
                      candidate_roots.insert(*sid, *old_to_new.get(old_root).unwrap());
                  }
                  
                  let mapped_source_idx = *old_to_new.get(&source_idx).unwrap();

                  if let Some(mut node_w) = mapped_source_idx.write(&candidate_god) {
                      node_w.children_mut().remove(&edge_key);
                  }

                  Trie::gc(&candidate_god, &candidate_roots_vec);

                  if check_mismatch(&candidate_god, &candidate_roots) {
                      minimal_god = candidate_god;
                      minimal_roots = candidate_roots;
                      changed_in_pass = true;
                      let new_size = Trie::all_nodes(&minimal_god, &minimal_roots.values().cloned().collect::<Vec<_>>()).len();
                      println!("... Refined mismatch by removing edge group. New size: {} nodes.", new_size);
                      break; // Restart the whole process with the smaller graph
                  }
              }

              if changed_in_pass {
                  continue; // Restart the while loop
              }

              // --- Pass 2: Try to remove roots (if more than one) ---
              if minimal_roots.len() > 1 {
                  let root_sids_to_try: Vec<_> = minimal_roots.keys().cloned().collect();
                  for sid_to_remove in root_sids_to_try {
                      let mut candidate_roots = minimal_roots.clone();
                      candidate_roots.remove(&sid_to_remove);

                      if candidate_roots.is_empty() { continue; }

                      if check_mismatch(&minimal_god, &candidate_roots) {
                          minimal_roots = candidate_roots;
                          changed_in_pass = true;
                          println!("... Refined mismatch by removing a root. New root count: {}.", minimal_roots.len());
                          break; // Restart the while loop
                      }
                  }
              }
          }

          (minimal_god, minimal_roots)
      }

      /// Compute nodes that lie in SCCs (subgraph without Pop(0)/Pop(1)) that contain at least one Push edge internally.
      /// Deferring Push in such SCCs can cause unbounded growth of the pending stack. We will therefore not defer Push
      /// at those nodes – instead we emit Push edges immediately.
      fn compute_push_cycle_nodes(
          source: &IntermediateTrie3GodWrapper,
          source_roots: &[IntermediatePrecomputeNode3Index],
      ) -> BTreeSet<IntermediatePrecomputeNode3Index> {
          let nodes = Trie::all_nodes(source, source_roots);
          if nodes.is_empty() {
              return BTreeSet::new();
          }
          let mut id_of: BTreeMap<IntermediatePrecomputeNode3Index, usize> = BTreeMap::new();
          for (i, ni) in nodes.iter().enumerate() {
              id_of.insert(*ni, i);
          }

          // Build adjacency for the FULL subgraph (include all edges).
          let n = nodes.len();
          let mut adj: Vec<Vec<usize>> = vec![Vec::new(); n];
          for (i, node_idx) in nodes.iter().enumerate() {
              if let Some(node_r) = node_idx.read(source) {
                  for (ek, dests) in node_r.children().iter() {
                      for (dst_idx, _) in dests.iter() {
                          if let Some(&j) = id_of.get(dst_idx) {
                              adj[i].push(j);
                          }
                      }
                  }
              }
          }

          // Tarjan's SCC
          let mut index: usize = 0;
          let mut indices: Vec<Option<usize>> = vec![None; n];
          let mut lowlink: Vec<usize> = vec![0; n];
          let mut on_stack: Vec<bool> = vec![false; n];
          let mut stack: Vec<usize> = Vec::new();
          let mut scc_id: Vec<usize> = vec![usize::MAX; n];
          let mut scc_count: usize = 0;

          fn strongconnect(
              v: usize,
              index: &mut usize,
              indices: &mut [Option<usize>],
              lowlink: &mut [usize],
              on_stack: &mut [bool],
              stack: &mut Vec<usize>,
              scc_id: &mut [usize],
              scc_count: &mut usize,
              adj: &Vec<Vec<usize>>,
          ) {
              indices[v] = Some(*index);
              lowlink[v] = *index;
              *index += 1;
              stack.push(v);
              on_stack[v] = true;

              for &w in &adj[v] {
                  if indices[w].is_none() {
                      strongconnect(
                          w, index, indices, lowlink, on_stack, stack, scc_id, scc_count, adj,
                      );
                      lowlink[v] = lowlink[v].min(lowlink[w]);
                  } else if on_stack[w] {
                      lowlink[v] = lowlink[v].min(indices[w].unwrap());
                  }
              }

              if Some(lowlink[v]) == indices[v] {
                  loop {
                      let w = stack.pop().expect("stack not empty");
                      on_stack[w] = false;
                      scc_id[w] = *scc_count;
                      if w == v {
                          break;
                      }
                  }
                  *scc_count += 1;
              }
          }

          for v in 0..n {
              if indices[v].is_none() {
                  strongconnect(
                      v,
                      &mut index,
                      &mut indices,
                      &mut lowlink,
                      &mut on_stack,
                      &mut stack,
                      &mut scc_id,
                      &mut scc_count,
                      &adj,
                  );
              }
          }

          // For each SCC, check if there's an internal Push edge (source and destination both in SCC).
          let mut scc_has_internal_push: Vec<bool> = vec![false; scc_count.max(1)];
          for (i, node_idx) in nodes.iter().enumerate() {
              if let Some(node_r) = node_idx.read(source) {
                  for (ek, dests) in node_r.children().iter() {
                      if matches!(ek, IntermediateTrie3EdgeKey::Push(_)) {
                          for (dst_idx, _) in dests.iter() {
                              if let (Some(&from), Some(&to)) = (id_of.get(node_idx), id_of.get(dst_idx))
                              {
                                  if scc_id[from] == scc_id[to] {
                                      scc_has_internal_push[scc_id[from]] = true;
                                  }
                              }
                          }
                      }
                  }
              }
          }

          let mut result = BTreeSet::new();
          for (i, node_idx) in nodes.iter().enumerate() {
              if scc_id[i] != usize::MAX && scc_has_internal_push[scc_id[i]] {
                  result.insert(*node_idx);
              }
          }
          result
      }

      /// Cheap signature of the reachable graph, used to detect fixpoint across passes.
      fn compute_graph_signature(
          god: &IntermediateTrie3GodWrapper,
          roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
      ) -> (u64, u64, u64, u64, u64, u64) {
          let root_indices: Vec<_> = roots.values().cloned().collect();
          if root_indices.is_empty() {
              return (0, 0, 0, 0, 0, 0);
          }
          let nodes = Trie::all_nodes(god, &root_indices);
          let mut pushes = 0u64;
          let mut pop0 = 0u64;
          let mut pop1 = 0u64;
          let mut popgt = 0u64;
          let mut popgt_sum_n = 0u64;
          let mut others = 0u64;
          for idx in nodes {
              if let Some(nr) = idx.read(god) {
                  for (ek, dests) in nr.children().iter() {
                      let multiplicity = dests.len() as u64;
                      match ek {
                          IntermediateTrie3EdgeKey::Push(_) => pushes += multiplicity,
                          IntermediateTrie3EdgeKey::Pop(n, _) => {
                              if *n == 0 {
                                  pop0 += multiplicity;
                              } else if *n == 1 {
                                  pop1 += multiplicity;
                              } else {
                                  popgt += multiplicity;
                                  popgt_sum_n += (*n as u64) * multiplicity;
                              }
                          }
                          _ => others += multiplicity,
                      }
                  }
              }
          }
          (pushes, pop0, pop1, popgt, popgt_sum_n, others)
      }

      /// Persistent, interned stack representation for pending StateIDBV pushes.
      /// This replaces cloning large Vec<StateIDBV> everywhere.
      #[derive(Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash, Debug)]
      struct StackID(usize);

      #[derive(Clone)]
      struct StackNode {
          prev: Option<StackID>,
          top: StateIDBV,
          depth: usize,
      }

      struct StackInterner {
          nodes: Vec<StackNode>,
          // Intern map: (prev_stack_id, top_item) -> new_stack_id
          // Use BTreeMap to avoid requiring Hash on StateIDBV (it should implement Ord already,
          // since it participates in ordered keys via IntermediateTrie3EdgeKey).
          map: BTreeMap<(StackID, StateIDBV), StackID>,
      }

      impl StackInterner {
          fn new() -> Self {
              // Index 0 is the empty stack sentinel.
              let mut nodes = Vec::new();
              nodes.push(StackNode {
                  prev: None,
                  top: StateIDBV::zeros(), // unused for sentinel
                  depth: 0,
              });
              Self {
                  nodes,
                  map: BTreeMap::new(),
              }
          }

          #[inline]
          fn empty(&self) -> StackID {
              StackID(0)
          }

          #[inline]
          fn is_empty(&self, id: StackID) -> bool {
              id.0 == 0
          }

          #[inline]
          fn depth(&self, id: StackID) -> usize {
              self.nodes[id.0].depth
          }

          #[inline]
          fn top(&self, id: StackID) -> Option<&StateIDBV> {
              if id.0 == 0 { None } else { Some(&self.nodes[id.0].top) }
          }

          #[inline]
          fn pop(&self, id: StackID) -> Option<StackID> {
              if id.0 == 0 { None } else { self.nodes[id.0].prev }
          }

          fn push(&mut self, id: StackID, bv: StateIDBV) -> StackID {
              if let Some(&existing) = self.map.get(&(id, bv.clone())) {
                  return existing;
              }
              let new_id = StackID(self.nodes.len());
              let depth = self.nodes[id.0].depth + 1;
              self.nodes.push(StackNode { prev: Some(id), top: bv.clone(), depth });
              self.map.insert((id, bv), new_id);
              new_id
          }

          fn to_vec_bottom_up(&self, mut id: StackID) -> Vec<StateIDBV> {
              let mut rev: Vec<StateIDBV> = Vec::with_capacity(self.depth(id));
              while id.0 != 0 {
                  rev.push(self.nodes[id.0].top.clone());
                  id = self.nodes[id.0].prev.expect("non-empty must have prev");
              }
              rev.reverse();
              rev
          }

          fn from_bottom_slice(&mut self, slice: &[StateIDBV]) -> StackID {
              let mut id = self.empty();
              for bv in slice {
                  id = self.push(id, bv.clone());
              }
              id
          }

          fn to_string(&self, mut id: StackID) -> String {
              if self.is_empty(id) {
                  return "[]".to_string();
              }
              let mut items = Vec::new();
              while id.0 != 0 {
                  items.push(format!("{:?}", self.nodes[id.0].top));
                  id = self.nodes[id.0].prev.expect("non-empty must have prev");
              }
              items.reverse();
              format!("[{}]", items.join(", "))
          }
      }

      fn run_trie_based_elimination(
          roots: &mut BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) {
          // Outer fixpoint loop: iterate passes to converge even when we avoid deferring pushes in “push-cycling” SCCs.
          for pass in 0..MAX_ELIMINATION_PASSES {
              // Snapshot the reachable subgraph from the provided roots.
              let mut sids: Vec<TokenizerStateID> = Vec::with_capacity(roots.len());
              let mut old_root_vec: Vec<IntermediatePrecomputeNode3Index> = Vec::with_capacity(roots.len());
              for (sid, idx) in roots.iter() {
                  sids.push(*sid);
                  old_root_vec.push(*idx);
              }
              let before_sig = compute_graph_signature(god, roots);
              let (source, source_roots, _map) = Trie::deep_copy_subtrees(god, &old_root_vec);

              // Precompute push-cycling nodes to avoid unbounded pending stacks in SCCs that can keep pushing without encountering Pop(0/1).
              let push_cycle_nodes: BTreeSet<IntermediatePrecomputeNode3Index> =
                  compute_push_cycle_nodes(&source, &source_roots);


              // Diagnostic and safety limits
              const MAX_BFS_ITERATIONS: u64 = 75_000_000; // Failsafe to prevent hangs

              // Prepare destination arena (clear existing graph).
              god.clear();

              // Setup progress bar (spinner, no moving denominator).
              let pb = ProgressBar::new(0);
              pb.set_style(
                  ProgressStyle::default_spinner()
                      .template("{spinner:.green} [{elapsed_precise}] states={pos} {msg}")
                      .expect("progress-bar"),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb.set_draw_target(ProgressDrawTarget::hidden());
              }
              pb.set_message("Eliminating push/pop pairs");

              // Memoization: (source_idx, pending_stack) -> dest_idx
              // Memoization: (source_idx, pending_stack) -> dest_idx
              let mut stack_interner = StackInterner::new();
              let mut pair_cache: BTreeMap<(IntermediatePrecomputeNode3Index, StackID), IntermediatePrecomputeNode3Index> = BTreeMap::new();
              let mut hot_nodes = BTreeSet::new();
              let mut visit_counts: BTreeMap<IntermediatePrecomputeNode3Index, u64> = BTreeMap::new();
              // Share "push chains" to empty-stack destination across all origins for the same (src_idx, stack suffix).
              // Keyed by (source node in source graph, bottom-to-top push-sequence), returns the canonical
              // destination node reached after the first push in that sequence. That node has the remainder
              // of the chain already wired behind it towards the final empty-stack pair node.
              let mut chain_cache: BTreeMap<(IntermediatePrecomputeNode3Index, Vec<StateIDBV>), IntermediatePrecomputeNode3Index> = BTreeMap::new();

              // Build or reuse the chain nodes for a given bottom-to-top push-sequence:
              // Returns the node that should be the destination of the first Push(items[0]) edge.
              // The returned node already contains the rest of the chain (Push(items[1]), Push(items[2]), ...)
              // towards final_dest_idx. For a single-item sequence, the head destination is final_dest_idx.
              let mut get_chain_destination = |src_node: IntermediatePrecomputeNode3Index,
                                               final_dest_idx: IntermediatePrecomputeNode3Index,
                                               items: &[StateIDBV]|
                                               -> IntermediatePrecomputeNode3Index {
                  if items.is_empty() { return final_dest_idx; }
                  // Build from tail to head and cache each suffix.
                  let mut dest = final_dest_idx;
                  for start in (0..items.len()).rev() {
                      let slice = &items[start..];
                      let key = (src_node, slice.to_vec());
                      if let Some(&mapped) = chain_cache.get(&key) {
                          dest = mapped;
                          continue;
                      }
                      let head = if slice.len() == 1 {
                          final_dest_idx
                      } else {
                          let head_idx = IntermediatePrecomputeNode3Index::new(god.insert(Trie::new(IntermediatePrecomputedNodeContents3::internal())));
                          god.insert_edge_simple(head_idx, dest, IntermediateTrie3EdgeKey::Push(slice[1].clone()), ());
                          head_idx
                      };
                      chain_cache.insert(key, head);
                      dest = head;
                  }
                  dest
              };
              // Track how many unique stacks were interned per source node; if it crosses a threshold, mark node hot.
              let mut unique_stack_count_by_node: BTreeMap<IntermediatePrecomputeNode3Index, usize> = BTreeMap::new();
              // If we exceed a global hard limit on product states, stop deferring pushes globally.
              let mut force_immediate_push_globally = false;
              let mut announced_force_immediate = false;
              let mut work: VecDeque<(IntermediatePrecomputeNode3Index, StackID)> = VecDeque::new();


              macro_rules! get_or_create {
                  ($src_idx:expr, $stack:expr) => {
                      {
                          let key = ($src_idx, $stack);
                          if let Some(&existing) = pair_cache.get(&key) {
                              existing
                          } else {
                              let src_guard = key.0.read(&source).expect("source read");
                              let is_end = src_guard.value.end && stack_interner.is_empty(key.1);
                              drop(src_guard);
                              let node_val = if is_end {
                                  IntermediatePrecomputedNodeContents3::leaf()
                              } else {
                                  IntermediatePrecomputedNodeContents3::internal()
                              };
                              let dest_idx = IntermediatePrecomputeNode3Index::new(god.insert(Trie::new(node_val)));
                              pair_cache.insert(key, dest_idx);
                              work.push_back(($src_idx, $stack));

                              // Count unique stacks per source node, mark node hot if it explodes.
                              let cnt = unique_stack_count_by_node.entry($src_idx).and_modify(|c| *c += 1).or_insert(1);
                              if !hot_nodes.contains(&$src_idx) && *cnt > UNIQUE_STACKS_PER_NODE_THRESHOLD {
                                  if is_debug_level_enabled(1) {
                                      println!(
                                          "[Push/Pop Elimination] Node {:?} exceeded unique-stack threshold ({}). Forcing immediate push at this node.",
                                          $src_idx, UNIQUE_STACKS_PER_NODE_THRESHOLD
                                      );
                                  }
                                  hot_nodes.insert($src_idx);
                              }

                              // Flip global immediate-push mode if the product state space grows too large.
                              if !force_immediate_push_globally && pair_cache.len() > PAIR_CACHE_HARD_LIMIT {
                                  force_immediate_push_globally = true;
                                  if !announced_force_immediate && is_debug_level_enabled(1) {
                                      println!("[Push/Pop Elimination] Product-state space exceeded {} states. Forcing immediate push globally to ensure termination with full processing.", PAIR_CACHE_HARD_LIMIT);
                                  }
                                  announced_force_immediate = true;
                              }

                              dest_idx
                          }
                      }
                  };
              }

              // Create new roots at (source_root, empty stack)
              let mut new_roots: BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index> = BTreeMap::new();
              for (sid, src_root) in sids.into_iter().zip(source_roots.into_iter()) {
                  let new_root = get_or_create!(src_root, stack_interner.empty());
                  new_roots.insert(sid, new_root);
              }

              // BFS over product states
              let mut processed: u64 = 0;
              while let Some((src_idx, stack_id)) = work.pop_front() {
                  processed += 1;

                  // --- Diagnostics and Safeguards ---
                  if processed > MAX_BFS_ITERATIONS {
                      panic!(
                          "Push/Pop elimination exceeded maximum BFS iterations ({}). This indicates a likely infinite loop or state explosion. Last processed node: {:?}, stack depth: {}, stack: {}. Queue size: {}.",
                          MAX_BFS_ITERATIONS, src_idx, stack_interner.depth(stack_id), stack_interner.to_string(stack_id), work.len(),
                      );
                  }
                  let count = visit_counts.entry(src_idx).or_insert(0);
                  *count += 1;
                  if !hot_nodes.contains(&src_idx) && *count > HOT_NODE_VISIT_THRESHOLD {
                      if is_debug_level_enabled(1) {
                          println!("[WARN] Push/Pop elimination: Node {:?} became hot (visited > {} times). Flushing stacks on subsequent visits to prevent state explosion.", src_idx, HOT_NODE_VISIT_THRESHOLD);
                      }
                      hot_nodes.insert(src_idx);
                  }

                  pb.set_position(processed);
                  if processed & 0xfff == 0 {
                      pb.set_message(format!("queue={}", work.len()));
                  }
                  let dest_idx = *pair_cache.get(&(src_idx, stack_id)).expect("dest exists");

                  // --- Hot Node Stack Flushing Heuristic ---
                  if hot_nodes.contains(&src_idx) && !stack_interner.is_empty(stack_id) {
                      // This node is hot and has a pending stack. Flush the stack into the graph using a shared chain
                      // and then let the (src_idx, empty_stack) product state handle propagation.
                      let empty_stack_id = stack_interner.empty();
                      let final_dest_idx = get_or_create!(src_idx, empty_stack_id);

                      let items = stack_interner.to_vec_bottom_up(stack_id);
                      if !items.is_empty() {
                          // Reuse a canonical chain head for (src_idx, items) towards final_dest_idx.
                          let head_dest = get_chain_destination(src_idx, final_dest_idx, &items);
                          // Connect the first push from this origin to the shared chain head.
                          god.insert_edge_simple(
                              dest_idx, head_dest,
                              IntermediateTrie3EdgeKey::Push(items[0].clone()), ()
                          );
                      }

                      continue; // Stop processing this complex state; the empty-stack version will take over.
                  }

                  let src_guard = src_idx.read(&source).expect("source read");

                  // If this source node is an end, flush the entire pending stack in order.
                  // Note: pending stack bitvectors may already have been narrowed by Pop(0) constraints.
                  if src_guard.value.end && !stack_interner.is_empty(stack_id) {
                      let items = stack_interner.to_vec_bottom_up(stack_id);
                      if !items.is_empty() {
                          // Ensure the final empty-stack pair exists and will be scheduled for propagation.
                          let final_dest_idx = get_or_create!(src_idx, stack_interner.empty());
                          // Reuse a canonical chain leading to final_dest_idx.
                          let head_dest = get_chain_destination(src_idx, final_dest_idx, &items);
                          // Connect a single Push(items[0]) from the current node to the shared chain head.
                          god.insert_edge_simple(
                              dest_idx, head_dest,
                              IntermediateTrie3EdgeKey::Push(items[0].clone()), ()
                          );
                      }
                  }

                  for (ek, dests) in src_guard.children().iter() {
                      match ek {
                          IntermediateTrie3EdgeKey::Push(bv_new) => {
                              let is_hot = hot_nodes.contains(&src_idx) || force_immediate_push_globally;
                              // Heuristic: If a source node is part of a pre-calculated "push cycle" OR
                              // if it has become dynamically "hot" (visited too many times), we stop
                              // or if global force_immediate is on, we stop
                              // deferring its pushes. Instead, we emit them directly into the graph.
                              // This prevents combinatorial explosion of stack states from complex cycles.
                              if push_cycle_nodes.contains(&src_idx) || is_hot {
                                  if is_hot && !push_cycle_nodes.contains(&src_idx) && is_debug_level_enabled(3) {
                                      println!("[Push/Pop Elimination] Dynamically forcing immediate push for hot source {:?}.", src_idx);
                                  }

                                  for (dst_src_idx, _) in dests.iter() {
                                      let next_state = get_or_create!(*dst_src_idx, stack_id);
                                      god.insert_edge_simple(dest_idx, next_state, IntermediateTrie3EdgeKey::Push(bv_new.clone()), ());
                                  }
                              } else {
                                  // Default: defer emission by pushing onto the stack and carrying via NoOp.
                                  let new_stack_id = stack_interner.push(stack_id, bv_new.clone());
                                  if stack_interner.depth(new_stack_id) > MAX_STACK_DEPTH {
                                      if is_debug_level_enabled(1) {
                                          println!(
                                              "[WARN] Push/Pop elimination: stack depth > {} exceeded. Path dropped.",
                                              MAX_STACK_DEPTH
                                          );
                                      }
                                      continue;
                                  }

                                  for (dst_src_idx, _) in dests.iter() {
                                      let next_state = get_or_create!(*dst_src_idx, new_stack_id);
                                      god.insert_edge_simple(dest_idx, next_state, IntermediateTrie3EdgeKey::NoOp, ());
                                  }
                              }
                          }
                          IntermediateTrie3EdgeKey::Pop(n, pop_bv) => {
                              if stack_interner.is_empty(stack_id) {
                                  // No pending: forward Pop as-is.
                                  for (dst_src_idx, _) in dests.iter() {
                                      let next_state = get_or_create!(*dst_src_idx, stack_interner.empty());
                                      god.insert_edge_simple(dest_idx, next_state, IntermediateTrie3EdgeKey::Pop(*n, pop_bv.clone()), ());
                                  }
                              } else {
                                  if *n == 0 {
                                      let top = stack_interner.top(stack_id).expect("non-empty");
                                      if top.is_disjoint(pop_bv) {
                                          // Invalid path; drop this branch (no edge emitted).
                                          continue;
                                      }
                                      // Intersect: fold Pop(0, B) into the top-of-stack A := A ∩ B (non-consuming).
                                      // Replace the top-of-stack with the narrowed bitvector.
                                      let mut narrowed = top.clone();
                                      narrowed &= pop_bv.clone();
                                      // If intersection is empty we'd have continued above.
                                      let suffix = stack_interner.pop(stack_id).expect("non-empty");
                                      let new_stack_id = stack_interner.push(suffix, narrowed);

                                      for (dst_src_idx, _) in dests.iter() {
                                          let next_state = get_or_create!(*dst_src_idx, new_stack_id);
                                          god.insert_edge_simple(dest_idx, next_state, IntermediateTrie3EdgeKey::NoOp, ());
                                      }
                                  } else {
                                      // Consume as many pops as possible immediately.
                                      // For k > 1, we can pop unconditionally; for the final k == 1,
                                      // we must check intersection against the current top.
                                      let mut k = *n;
                                      let mut sid2 = stack_id;

                                      // Unconditional pops for k > 1 while we have a stack.
                                      while k > 1 && !stack_interner.is_empty(sid2) {
                                          sid2 = stack_interner.pop(sid2).expect("non-empty");
                                          k -= 1;
                                      }

                                      if k == 1 {
                                          if let Some(top2) = stack_interner.top(sid2) {
                                              if top2.is_disjoint(pop_bv) {
                                                  // Invalid path; drop this branch.
                                                  continue;
                                              }
                                              // Intersection: pop the remaining top and emit NoOp.
                                              let final_sid = stack_interner.pop(sid2).expect("non-empty");
                                              for (dst_src_idx, _) in dests.iter() {
                                                  let next_state = get_or_create!(*dst_src_idx, final_sid);
                                                  god.insert_edge_simple(dest_idx, next_state, IntermediateTrie3EdgeKey::NoOp, ());
                                              }
                                          } else {
                                              // No pushes left to match k == 1; forward Pop(1, ...) as-is.
                                              for (dst_src_idx, _) in dests.iter() {
                                                  let next_state = get_or_create!(*dst_src_idx, sid2);
                                                  god.insert_edge_simple(
                                                      dest_idx,
                                                      next_state,
                                                      IntermediateTrie3EdgeKey::Pop(1, pop_bv.clone()),
                                                      (),
                                                  );
                                              }
                                          }
                                      } else {
                                          // k > 1 and stack is empty: forward the remaining Pop(k, ...) as-is.
                                          for (dst_src_idx, _) in dests.iter() {
                                              let next_state = get_or_create!(*dst_src_idx, sid2);
                                              god.insert_edge_simple(
                                                  dest_idx,
                                                  next_state,
                                                  IntermediateTrie3EdgeKey::Pop(k, pop_bv.clone()),
                                                  (),
                                              );
                                          }
                                      }
                                  }
                              }
                          }
                          // Non-push/pop edges (e.g., CheckLLM, NoOp) just forward; pending unchanged.
                          other => {
                              for (dst_src_idx, _) in dests.iter() {
                                  let next_state = get_or_create!(*dst_src_idx, stack_id);
                                  god.insert_edge_simple(dest_idx, next_state, other.clone(), ());
                              }
                          }
                      }
                  }
              }

              pb.finish_with_message("Done eliminating push/pop pairs");

              // Replace input roots with new roots (pending_stack is empty).
              *roots = new_roots;

              // Fixpoint check: if the signature did not change, we converged.
              let after_sig = compute_graph_signature(god, roots);
              if after_sig == before_sig {
                  if is_debug_level_enabled(2) {
                      println!("[Push/Pop Elimination] Converged after {} pass(es).", pass + 1);
                  }
                  break;
              } else if is_debug_level_enabled(3) {
                  println!(
                      "[Push/Pop Elimination] Pass {} changed signature: before={:?} after={:?}",
                      pass + 1,
                      before_sig,
                      after_sig
                  );
              }
          }
      }

      fn get_normalized_paths(
          roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) -> BTreeSet<Vec<IntermediateTrie3EdgeKey>> {
          let root_indices: Vec<_> = roots.values().cloned().collect();
          IntermediatePrecomputeNode3::get_all_paths(god, &root_indices, |n| n.value.end)
              .into_iter()
              .map(|(_r, p)| normalize_path(p.into_iter().map(|(ek, _, _)| ek).collect()))
              .collect()
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::datastructures::trie::Trie2Index;

          fn run_test(
              input_god: &IntermediateTrie3GodWrapper,
              input_roots: &[IntermediatePrecomputeNode3Index],
          ) {
              // NOTE: This test harness works by comparing the set of all paths from root to leaf
              // before and after simplification. The `get_all_paths` helper function stops traversing
              // when it detects a cycle to avoid infinite loops. Therefore, this harness cannot
              // validate simplifications that occur *within* a cycle. A true trie-based
              // elimination algorithm would need a different testing strategy for cyclic graphs.

              // 1. Run new trie-based elimination (which currently calls the path-based one)
              let (eliminated_god, eliminated_roots, _) = Trie::deep_copy_subtrees(input_god, input_roots);
              let mut eliminated_roots_map = BTreeMap::new();
              for (i, r) in eliminated_roots.iter().enumerate() {
                  eliminated_roots_map.insert(TokenizerStateID(i), *r); // Use dummy TokenizerStateID
              }
              eliminate_pushes_and_pops(&mut eliminated_roots_map, &eliminated_god);

              // 2. Flatten result to paths
              let final_roots_from_trie_elim: Vec<_> = eliminated_roots_map.values().cloned().collect();
              let paths_from_trie_elim: BTreeSet<_> = IntermediatePrecomputeNode3::get_all_paths(&eliminated_god, &final_roots_from_trie_elim, |n| n.value.end)
                  .into_iter()
                  .map(|(_r, p)| normalize_path(p.into_iter().map(|(ek, _, _)| ek).collect()))
                  .collect();

              // 3. Run old path-based elimination directly
              let initial_paths = IntermediatePrecomputeNode3::get_all_paths(input_god, input_roots, |node| node.value.end);
              let mut paths_from_path_elim = BTreeSet::new();
              for (_root_value, path_edges) in initial_paths {
                  let edge_keys: Vec<_> = path_edges.into_iter().map(|(ek, _, _)| ek).collect();
                  if let Some(new_path) = simplify_path(edge_keys) {
                      paths_from_path_elim.insert(normalize_path(new_path));
                  }
              }

              // 4. Compare
              assert_eq!(paths_from_trie_elim, paths_from_path_elim);
          }

