              arena.try_insert(root, "r2", &mut Some("e2"), child2).unwrap();
              arena.try_insert(child1, "c1", &mut Some("e3"), grandchild).unwrap();
              arena.try_insert(child2, "c2", &mut Some("e4"), grandchild).unwrap();

              let all_nodes = arena.all_nodes(&[root]);
