      - Computes a union of incoming LLM-token bitsets for each node.
      - Uses a mask M = incoming_union(A) ∩ incoming_union(B) to compare the masked shapes of A and B.
      - If masked-shapes are equal under M, it rewires only the safe incoming edges to B, moving the M-portion of their tokens to point to A (keeping strong/weak kinds), and leaves the leftover tokens on B.
