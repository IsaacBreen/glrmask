              colors: Dict[int, int] = {nid: sig_intern[init_sigs[nid]] for nid in node_ids}
              sig_by_node = init_sigs

              # Refinement
              for _round in range(max(1, int(max_rounds))):
                  new_sig_by_node: Dict[int, Tuple] = {}
                  interner: Dict[Tuple, int] = {}
