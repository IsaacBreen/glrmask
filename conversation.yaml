          pub(crate) fn setup_llm_token_mappings(
              original_llm_token_map: &LLMTokenMap,
          ) -> BiBTreeMap<usize, usize>
          {
              // // TODO: delete this
              // let mut original_to_internal_id_bimap = BiBTreeMap::new();
