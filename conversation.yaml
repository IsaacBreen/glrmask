              Acc {
                  llm_tokens_union: &lhs.llm_tokens_union | &rhs.llm_tokens_union,
                  terminals_union: &lhs.terminals_union | &rhs.terminals_union,
                  stored_trie_nodes: &lhs.stored_trie_nodes | &rhs.stored_trie_nodes,
