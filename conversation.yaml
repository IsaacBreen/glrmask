      Below is a precise fix and rationale, followed by concrete steps and the patch.

      Root cause and proof sketch:
      - Semantics: In a DWA, a default transition is taken only when no labeled (exception) transition exists for the consumed symbol. Therefore, the mere presence of a labeled transition must block the default, regardless of whether that labeled transition can eventually reach acceptance or whether its effect is identical to the default’s effect.
      - Current determinization bug: During macro-signature construction, exceptions are omitted if their determinized effect is empty or equal to the default’s step set. This omission allows the default to fire for those labels, which violates DWA semantics and leads to accepting paths that should be rejected (exactly what the failing test shows).
      - Correct solution: Ensure that a label’s presence as a labeled transition or as an explicit exception on a default transition blocks the default for that label. Practically:
        - Always record labels with labeled transitions in the exception map, even if their determinized effect is empty or identical to default.
        - Also record labels explicitly listed in NWADefaultTransition.exceptions as blockers of default, even if there is no explicit labeled edge.
      - This preserves the invariant: “default is used iff the label is not an exception,” which is required by DWA semantics. Consequently, the determinized automaton will not incorrectly accept paths where an exception exists but leads to a dead end.

      Step-by-step instructions:
      1. Open src/precompute4/weighted_automata/determinization.rs.
      2. In NWA::det_fixpoint, inside the loop that builds macro signatures for each NWA state s, locate the block labeled “Compute exceptions; drop those that are empty or identical to the default step effect.”
      3. Replace that entire block with logic that:
         - Always records labels that have any labeled transition in the exception map, even if the computed effect (step set) is empty or identical to default. Sort and deduplicate step IDs.
         - Additionally, for each NWADefaultTransition on the state, insert its exception labels into the map (with an empty vector if needed), ensuring the default is blocked for those labels even if there is no explicit labeled transition.
      4. No other files or code need to be changed.

      Patch:
      ```diff
