                      sid_to_bundle: Dict[int, _ArcBundle] = {}
                      for sid_val, dest_map in sid_map.items():
                          # Build canonical key
                          items: List[Tuple[int, Optional[str]]] = []
                          for d, bv in dest_map.items():
