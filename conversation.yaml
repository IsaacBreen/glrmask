      type Stage1Result = Stage1Table;
      type Stage2Result = Stage2Table;
      type Stage3Result = Stage3Table;
      type Stage4Result = Stage4Table;
      type Stage5Result = Stage5Table;
      type Stage6Result = Stage6Table;
      type Stage7Result = (
          Stage7Table,
          BiBTreeMap<BTreeSet<Item>, StateID>,
          StateID,
          StateID,
      );

      fn stage_1_row(worklist: &mut VecDeque<BTreeSet<Item>>, visited_kernels: &mut BTreeSet<BTreeSet<Item>>, splits: BTreeMap<Option<Symbol>, BTreeSet<Item>>) -> BTreeMap<Option<Symbol>, BTreeSet<Item>> {
          let mut row = BTreeMap::new();
          for (symbol, items_in_split) in &splits {
              row.insert(symbol.clone(), items_in_split.clone());
              if symbol.is_some() {
                  let goto_set = compute_goto(items_in_split);
                  if visited_kernels.insert(goto_set.clone()) {
                      worklist.push_back(goto_set);
                  }
              }
          }
          row
      }

      #[time_it]
      fn stage_1(productions: &[Production]) -> Stage1Result {
          assert!(
              matches!(LR_MODE, LRMode::LALR | LRMode::LR0),
              "Only LALR and LR0 modes are supported by the table builder"
          );
          let start_production_id = 0;
          let initial_item = Item {
              production: Arc::new(productions[start_production_id].clone()),
              dot_position: 0,
          };
          let initial_item_set = BTreeSet::from([initial_item.clone()]); // Clone initial_item here

          // Pre-computation for compute_closure: group productions by their LHS non-terminal.
          let mut prods_by_lhs: BTreeMap<NonTerminal, Vec<&Production>> = BTreeMap::new();
          for p in productions {
              prods_by_lhs.entry(p.lhs.clone()).or_default().push(p);
          }

          let mut worklist = VecDeque::from([initial_item_set.clone()]);
          let mut transitions: Stage1Table = BTreeMap::new();
          let mut visited_kernels = BTreeSet::from([initial_item_set.clone()]);

          // --- Create the 'everything' item set ---
          if EVERYTHING {
              let mut everything_item_set = BTreeSet::new();
              for prod in productions {
                  for dot_position in 0..=prod.rhs.len() {
                      let item = Item {
                          production: Arc::new(prod.clone()),
                          dot_position,
                      };
                      everything_item_set.insert(item);
                  }
              }
              // Add the everything set to the worklist if it's not already there
              if visited_kernels.insert(everything_item_set.clone()) {
                  worklist.push_back(everything_item_set);
              }
          }

          while let Some(item_set) = worklist.pop_front() {
              assert!(
                  matches!(LR_MODE, LRMode::LALR | LRMode::LR0),
                  "Only LALR and LR0 modes are supported by the table builder"
              );
              let closure = compute_closure(&item_set, &prods_by_lhs);
              let splits = split_on_dot(&closure);
              let row = stage_1_row(&mut worklist, &mut visited_kernels, splits);
              transitions.insert(item_set, row);
          }

          transitions
      }

      fn stage_2(stage_1_table: Stage1Table, productions: &[Production]) -> Stage2Result {
          let mut stage_2_table = BTreeMap::new();
          for (item_set, transitions) in stage_1_table {
              let mut shifts = BTreeMap::new();
              let mut gotos = BTreeMap::new();
              let mut reduces = BTreeSet::new();

              for (symbol_opt, item_set) in &transitions {
                  match symbol_opt {
                      Some(Symbol::Terminal(t)) => {
                          shifts.insert(t.clone(), compute_goto(item_set));
                      }
                      Some(Symbol::NonTerminal(nt)) => {
                          gotos.insert(nt.clone(), compute_goto(item_set));
                      }
                      None => {
                          for item in item_set {
                              assert_eq!(item.dot_position, item.production.rhs.len());
                              reduces.insert(item.clone());
                          }
                      }
                  }
              }

              stage_2_table.insert(
                  item_set,
                  Stage2Row {
                      shifts,
                      gotos,
                      reduces,
                  },
              );
          }
          stage_2_table
      }

      fn stage_3(stage_2_table: Stage2Table, productions: &[Production]) -> Stage3Result {
          let mut stage_3_table = BTreeMap::new();

          match LR_MODE {
              LRMode::LR0 => {
                  let all_terminals: BTreeSet<Terminal> = productions
                      .iter()
                      .flat_map(|p| {
                          p.rhs.iter().filter_map(|s| match s {
                              Symbol::Terminal(t) => Some(t.clone()),
                              _ => None,
                          })
                      })
                      .collect();

                  for (item_set, row) in stage_2_table {
                      let mut reduces: BTreeMap<Option<Terminal>, BTreeSet<Item>> = BTreeMap::new();
                      if !row.reduces.is_empty() {
                          // For LR(0), a reduce item means reduce on ANY lookahead.
                          for terminal in &all_terminals {
                              reduces.entry(Some(terminal.clone())).or_default().extend(row.reduces.iter().cloned());
                          }
                          // Also for EOF (represented as None)
                          reduces.entry(None).or_default().extend(row.reduces.iter().cloned());
                      }
                      stage_3_table.insert(item_set, Stage3Row { shifts: row.shifts, gotos: row.gotos, reduces });
                  }
              }
              LRMode::LALR | LRMode::LALR_EX_SHIFT_STATES | LRMode::LR1 => {
                  // Compute FOLLOW sets (including EOF as None) for LALR
                  let first_sets = compute_first_sets_for_nonterminals(productions);
                  let nullable_nonterminals = compute_nullable_nonterminals(productions);
                  let follow_sets = compute_follow_sets_for_nonterminals(productions, &first_sets, &nullable_nonterminals);

                  for (item_set, row) in stage_2_table {
                      let mut reduces: BTreeMap<Option<Terminal>, BTreeSet<Item>> = BTreeMap::new();

                      for item in &row.reduces {
                          let lhs = &item.production.lhs;
                          if let Some(follows) = follow_sets.get(lhs) {
                              for look in follows {
                                  reduces.entry(look.clone()).or_default().insert(item.clone());
                              }
                          }
                      }
                      stage_3_table.insert(item_set, Stage3Row { shifts: row.shifts, gotos: row.gotos, reduces });
                  }
              }
          }
          stage_3_table
      }

      fn stage_4(stage_3_table: Stage3Table, productions: &[Production]) -> Stage4Result {
          let production_ids: BTreeMap<Production, ProductionID> = productions
              .iter()
              .enumerate()
              .map(|(i, p)| (p.clone(), ProductionID(i)))
              .collect();

          let mut stage_4_table = BTreeMap::new();

          for (item_set, row) in stage_3_table {
              let mut reduces = BTreeMap::new();

              for (terminal, item_set) in row.reduces {
                  let mut prod_ids = BTreeSet::new();
                  for item in item_set {
                      let prod_id = production_ids.get(&*item.production).unwrap();
                      prod_ids.insert(*prod_id);
                  }
                  reduces.insert(terminal.clone(), prod_ids);
              }

              stage_4_table.insert(
                  item_set,
                  Stage4Row {
                      shifts: row.shifts,
                      gotos: row.gotos,
                      reduces,
                  },
              );
          }

          stage_4_table
      }

      fn stage_5(stage_4_table: Stage4Table, productions: &[Production], terminal_map: &BiBTreeMap<Terminal, TerminalID>) -> Stage5Result {
          let mut stage_5_table = BTreeMap::new();

          match LR_MODE {
              LRMode::LR0 => {
                  for (item_set, row) in stage_4_table {
                      let Stage4Row { shifts, gotos, reduces } = row;
                      // For LR(0), stage_3 has already populated reduces for all terminals.
                      // We just need to convert the map key from Option<Terminal> to Terminal,
                      // dropping the None (EOF) key.
                      let new_reduces = reduces
                          .into_iter()
                          .filter_map(|(opt_term, pids)| opt_term.map(|term| (term, pids)))
                          .collect();

                      stage_5_table.insert(
                          item_set,
                          Stage5Row {
                              shifts,
                              gotos,
                              reduces: new_reduces,
                          },
                      );
                  }
              }
              LRMode::LALR | LRMode::LALR_EX_SHIFT_STATES | LRMode::LR1 => {
                  // Original LALR logic for handling EOF lookahead.
                  let all_terminals: BTreeSet<Terminal> = terminal_map.left_values().cloned().collect();
                  for (item_set, row) in stage_4_table {
                      let Stage4Row { shifts, gotos, reduces } = row;
                      let mut new_reduces: BTreeMap<Terminal, BTreeSet<ProductionID>> = BTreeMap::new();

                      for (opt_term, prod_ids) in reduces {
                          if let Some(term) = opt_term {
                              new_reduces
                                  .entry(term)
                                  .or_default()
                                  .extend(prod_ids.into_iter());
                          } else {
                              // For None entries, copy the production IDs to all terminals.
                              for terminal in &all_terminals {
                                  new_reduces
                                      .entry(terminal.clone())
                                      .or_default()
                                      .extend(prod_ids.iter().cloned());
                              }
                          }
                      }
                      stage_5_table.insert(
                          item_set,
                          Stage5Row {
                              shifts,
                              gotos,
                              reduces: new_reduces,
                          },
                      );
                  }
              }
          }
          stage_5_table
      }

      fn stage_6(stage_5_table: Stage5Table) -> Stage6Result {
          let mut stage_6_table = BTreeMap::new();

          for (item_set, row) in stage_5_table {
              let mut shifts_and_reduces = BTreeMap::new();

              // Get all terminals that appear in either shifts or reduces
              let all_terminals: BTreeSet<_> = row.shifts.keys()
                  .chain(row.reduces.keys())
                  .cloned()
                  .collect();

              for terminal in all_terminals {
                  let shift = row.shifts.get(&terminal).cloned();
                  let reduces = row.reduces.get(&terminal).cloned().unwrap_or_default();

                  let action = Stage6ShiftsAndReduces {
                      shift,
                      reduces,
                  };
                  shifts_and_reduces.insert(terminal, action);
              }

              stage_6_table.insert(
                  item_set,
                  Stage6Row {
                      shifts_and_reduces,
                      gotos: row.gotos,
                  },
              );
          }

          stage_6_table
      }

      fn stage_7(stage_6_table: Stage6Table, productions: &[Production], terminal_map: &BiBTreeMap<Terminal, TerminalID>, non_terminal_map: &BiBTreeMap<NonTerminal, NonTerminalID>) -> Stage7Result {
          let start_production_id = 0;
          let mut item_set_map = BiBTreeMap::new();
          let mut next_state_id = 0;

          for item_set in stage_6_table.keys() {
              item_set_map.insert(item_set.clone(), StateID(next_state_id));
              next_state_id += 1;
          }

          let mut stage_7_table = BTreeMap::new();

          for (item_set, row) in stage_6_table {
              let state_id = *item_set_map.get_by_left(&item_set).unwrap();

              // Phase 2 map contains all possible actions for a state.
              let mut shifts_and_reduces_full: ShiftsAndReducesFull = BTreeMap::new();

              for (terminal, action) in &row.shifts_and_reduces {
                  let terminal_id = *terminal_map.get_by_left(terminal).expect_else(|| format!("Terminal {} not found in terminal map", terminal));

                  // 1. Get the potential shift action.
                  let maybe_shift: Option<StateID> = action.shift.as_ref().map(|shift_item_set| {
                      *item_set_map.get_by_left(shift_item_set).unwrap()
                  });

                  // 2. Group all reduce actions.
                  let mut reduces: BTreeMap<usize, BTreeMap<NonTerminalID, BTreeSet<ProductionID>>> = BTreeMap::new();
                  for &production_id in &action.reduces {
                      let production = &productions[production_id.0];
                      let len = production.rhs.len();
                      let nonterminal_id = *non_terminal_map.get_by_left(&production.lhs).unwrap();
                      reduces
                          .entry(len)
                          .or_default()
                          .entry(nonterminal_id)
                          .or_default()
                          .insert(production_id);
                  }

                  // 3. Create a combined action and simplify it.
                  if maybe_shift.is_none() && reduces.is_empty() {
                      // This should not happen because we iterate over terminals that have actions from stage 6.
                      // panic!("Action without shift or reduce for terminal {:?}", terminal);
                      continue;
                  }

                  let mut final_action = Stage7ShiftsAndReducesLookaheadValue::Split {
                      shift: maybe_shift,
                      reduces,
                  };
                  final_action.simplify();
                  shifts_and_reduces_full.insert(terminal_id, final_action);
              }

              let mut gotos = BTreeMap::new();
              for (nonterminal, next_item_set) in row.gotos {
                  let non_terminal_id = *non_terminal_map.get_by_left(&nonterminal).expect(&format!("Non-terminal '{}' not found in map", nonterminal));
                  let goto = Goto {
                      state_id: Some(*item_set_map.get_by_left(&next_item_set).unwrap()),
                      accept: false,
                  };
                  gotos.insert(non_terminal_id, goto);
              }

              stage_7_table.insert(state_id, Stage7Row {
                  shifts_and_reduces_full,
                  gotos,
              });
          }

          let initial_item = Item {
              production: Arc::new(productions[start_production_id].clone()),
              dot_position: 0,
          };
          let initial_item_set = BTreeSet::from([initial_item]);
          let start_state_id = *item_set_map.get_by_left(&initial_item_set).unwrap();

          // Goto for initial production
          let start_non_terminal_id = *non_terminal_map.get_by_left(&productions[start_production_id].lhs).unwrap();
          stage_7_table.get_mut(&start_state_id).unwrap().gotos.entry(start_non_terminal_id).or_default().accept = true;

          // --- Find and configure the 'everything' state ---
          let everything_state_id;
          if EVERYTHING {
              let mut everything_item_set = BTreeSet::new();
              for prod in productions {
                  for dot_position in 0..=prod.rhs.len() {
                      let item = Item {
                          production: Arc::new(prod.clone()),
                          dot_position,
                      };
                      everything_item_set.insert(item);
                  }
              }
              everything_state_id = *item_set_map.get_by_left(&everything_item_set).expect("Everything item set not found in state map");
              stage_7_table.get_mut(&everything_state_id).unwrap().gotos.entry(start_non_terminal_id).or_default().accept = true;
          } else {
              everything_state_id = start_state_id; // Dummy value, won't be used
          }

          (stage_7_table, item_set_map, start_state_id, everything_state_id)
      }

      fn stage_8(stage_7_table: Stage7Table) -> Stage8Table {
          let mut stage_8_table = BTreeMap::new();

          for (state_id, row) in stage_7_table {
              let Stage7Row { shifts_and_reduces_full, gotos } = row;

              // --- Promotion Logic ---
              let mut reduce_counts: BTreeMap<(NonTerminalID, usize), (usize, BTreeSet<ProductionID>)> = BTreeMap::new();
              for action in shifts_and_reduces_full.values() {
                  let mut process_reduces = |reduces: &BTreeMap<usize, BTreeMap<NonTerminalID, BTreeSet<ProductionID>>>| {
                      for (&len, nts) in reduces {
                          for (&nt_id, pids) in nts {
                              let entry = reduce_counts.entry((nt_id, len)).or_default();
                              entry.0 += 1; // Count how many terminals trigger this kind of reduce
                              entry.1.extend(pids.iter().cloned());
                          }
                      }
                  };
                  match action {
                      Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id: action_nt_id, len: action_len, production_ids } => {
                          let entry = reduce_counts.entry((*action_nt_id, *action_len)).or_default();
                          entry.0 += 1;
                          entry.1.extend(production_ids.iter().cloned());
                      },
                      Stage7ShiftsAndReducesLookaheadValue::Split { reduces, .. } => process_reduces(reduces),
                      _ => {}
                  }
              }

              // First, check for a reduction of the initial production (ID 0). If it exists, it's always promoted.
              let promoted_reduce_key = reduce_counts.iter().find_map(|(key, (_, pids))| {
                  if pids.contains(&ProductionID(0)) {
                      Some(*key)
                  } else {
                      None
                  }
              }).or_else(|| {
                  // Otherwise, use the original logic: promote the most common reduction.
                  reduce_counts.iter().max_by_key(|(_, (count, _))| *count).map(|(key, _)| *key)
              });

              let (shifts_and_reduces_without_default_reduce, default_reduce) = if let Some((nonterminal_id, len)) = promoted_reduce_key {
                  let (_, production_ids) = reduce_counts.remove(&(nonterminal_id, len)).unwrap();
                  
                  // NEW: Find all terminals that trigger this reduction.
                  let mut eligible_terminals = TerminalBV::zeros();
                  for (&tid, action) in &shifts_and_reduces_full {
                      let is_eligible = match action {
                          Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id: action_nt_id, len: action_len, .. } => {
                              *action_nt_id == nonterminal_id && *action_len == len
                          },
                          Stage7ShiftsAndReducesLookaheadValue::Split { reduces, .. } => {
                              reduces.get(&len).map_or(false, |nts| nts.contains_key(&nonterminal_id))
                          },
                          _ => false,
                      };
                      if is_eligible {
                          eligible_terminals.insert(tid.0);
                      }
                  }

                  let shifts_and_reduces_without_default = shifts_and_reduces_full.iter().filter_map(|(&tid, action)| {
                      let mut new_action = action.clone();
                      let mut was_modified = false;

                      match &mut new_action {
                          Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id: action_nt_id, len: action_len, .. }
                              if *action_nt_id == nonterminal_id && *action_len == len => {
                              // This whole action is the promoted one, so we remove it from phase1.
                              return None;
                          }
                          Stage7ShiftsAndReducesLookaheadValue::Split { reduces, .. } => {
                              // Check if the promoted reduce is part of this split.
                              if let Some(nts) = reduces.get_mut(&len) {
                                  if nts.remove(&nonterminal_id).is_some() {
                                      was_modified = true;
                                      // If this was the last NT for this length, remove the length entry.
                                      if nts.is_empty() {
                                          reduces.remove(&len);
                                      }
                                  }
                              }
                          }
                          _ => {} // Shift or non-matching Reduce, keep as is.
                      }

                      if was_modified {
                          // We modified a Split, now simplify it.
                          new_action.simplify();
                      }
                      Some((tid, new_action))
                  }).collect::<ShiftsAndReducesWithoutDefaultReduce>();

                  let default_reduce = DefaultReduce {
                      clone_and_merge: !shifts_and_reduces_without_default.is_empty(),
                      reduce: Some((Reduce { nonterminal_id, len, production_ids }, eligible_terminals)),
                  };
                  (shifts_and_reduces_without_default, default_reduce)
              } else {
                  let shifts_and_reduces_without_default = shifts_and_reduces_full.clone();
                  let default_reduce = DefaultReduce {
                      clone_and_merge: true,
                      reduce: None,
                  };
                  (shifts_and_reduces_without_default, default_reduce)
              };

              stage_8_table.insert(state_id, Row {
                  shifts_and_reduces_without_default_reduce,
                  shifts_and_reduces_full,
                  default_reduce,
                  gotos,
              });
          }
          stage_8_table
      }

      /// Pre-computes the complex GOTO logic for substring parsing reductions that pop below the stack.
      ///
      /// This function calculates, for each (NonTerminal, Lookahead) pair, what the resulting
      /// states would be if a reduction for that non-terminal occurred, and we could start
      /// from *any* state in the automaton (as is the case for substring parsing).
      ///
      /// This avoids a very expensive runtime loop over all table states.
      pub fn stage_9(
          table: &Table,
          non_terminal_map: &BiBTreeMap<NonTerminal, NonTerminalID>,
      ) -> BTreeMap<NonTerminalID, SubstringGoto> {
          let mut substring_gotos = BTreeMap::new();

          let all_nt_ids: Vec<_> = non_terminal_map.right_values().copied().collect();

          for &nt_id in &all_nt_ids {
              let mut accepting_sources = BTreeSet::new();
              let mut gotos: BTreeMap<StateID, BTreeSet<StateID>> = BTreeMap::new();

              for (&source_state_id, row) in table {
                  if let Some(goto) = row.gotos.get(&nt_id) {
                      if goto.accept {
                          accepting_sources.insert(source_state_id);
                      }
                      if let Some(goto_state_id) = goto.state_id {
                          gotos.entry(goto_state_id).or_default().insert(source_state_id);
                      }
                  }
              }

              if !accepting_sources.is_empty() || !gotos.is_empty() {
                  substring_gotos.insert(nt_id, SubstringGoto {
                      accepting_sources,
                      gotos,
                  });
              }
          }

          substring_gotos
      }

      /// Pre-computes a map from (reduce non-terminal, goto state) to the set of states
      /// that perform that goto. This is an inverted index of the GOTO table.
      pub fn stage_10(
          table: &Table,
      ) -> BTreeMap<NonTerminalID, BTreeMap<StateID, StateIDBV>> {
          let mut reduce_goto_map: BTreeMap<NonTerminalID, BTreeMap<StateID, StateIDBV>> = BTreeMap::new();

          for (&source_state_id, row) in table {
              for (&nt_id, goto) in &row.gotos {
                  if let Some(goto_state_id) = goto.state_id {
                      reduce_goto_map
                          .entry(nt_id)
                          .or_default()
                          .entry(goto_state_id)
                          .or_default()
                          .insert(source_state_id.0);
                  }
              }
          }
          reduce_goto_map
      }

      pub fn stage_11_create_hallucinated_row(table: &Table) -> HallucinatedRow {
          let mut shifts_and_reduces: BTreeMap<TerminalID, BTreeMap<Stage7ShiftsAndReducesLookaheadValue, StateIDBV>> = BTreeMap::new();
          let mut gotos: BTreeMap<NonTerminalID, BTreeMap<Goto, StateIDBV>> = BTreeMap::new();

          for (&state_id, row) in table {
              // Aggregate shifts and reduces
              for (&terminal_id, action) in &row.shifts_and_reduces_full {
                  shifts_and_reduces
                      .entry(terminal_id)
                      .or_default()
                      .entry(action.clone())
                      .or_default()
                      .insert(state_id.0);
              }

              // Aggregate gotos
              for (&nonterminal_id, goto) in &row.gotos {
                  gotos
                      .entry(nonterminal_id)
                      .or_default()
                      .entry(*goto)
                      .or_default()
                      .insert(state_id.0);
              }
          }

          // Convert the intermediate maps to the final Vec format
          let final_shifts_and_reduces = shifts_and_reduces
              .into_iter()
              .map(|(tid, actions)| (tid, actions.into_iter().collect()))
              .collect();

          let final_gotos = gotos
              .into_iter()
              .map(|(ntid, gotos_map)| (ntid, gotos_map.into_iter().collect()))
              .collect();

          HallucinatedRow {
              shifts_and_reduces: final_shifts_and_reduces,
              gotos: final_gotos,
              default_reduce: DefaultReduce { clone_and_merge: true, reduce: None },
          }
      }

      // Internal key for grouping equivalent reduce actions while building combined states.
      // Two reduce actions are considered the "same" if they share the same reduced non-terminal,
      // length, and the exact same set of production IDs.
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      struct CombinedReduceKey {
          nt: NonTerminalID,
          len: usize,
          production_ids: BTreeSet<ProductionID>,
      }

      pub fn stage_12_build_combined_states(
          table: &Table,
      ) -> (BTreeMap<StateID, CombinedRow>, StateID) {
          // A "combined" state is represented by an origin set:
          // a set of pairs (x -> y), where x is the original "origin" state,
          // and y is the current original state we are at (for that origin) in the base automaton.
          //
          // We create a graph whose nodes are such origin sets. Edges are induced by:
          // - Shifts on terminals: for each terminal T, build a new origin set using the original table's shifts.
          // - Gotos on non-terminals: for each non-terminal A, build a new origin set using the original table's gotos.
          //
          // Each combined state's row is represented using the same structure as HallucinatedRow:
          // per terminal: a vector of (action, mask-of-origins), and
          // per non-terminal: a vector of (goto, mask-of-origins).
          // The masks indicate for which origin states the action/goto applies.

          type OriginSet = BTreeSet<(StateID, StateID)>;

          // 1) Seed combined-state space with the initial origin set: { s -> s | for all original states s }.
          let mut initial_origin_set: OriginSet = BTreeSet::new();
          for &sid in table.keys() {
              initial_origin_set.insert((sid, sid));
          }

          let mut originset_to_id: BiBTreeMap<OriginSet, StateID> = BiBTreeMap::new();
          let mut next_combined_id = table.keys().max().unwrap().0 + 1;
          originset_to_id.insert(initial_origin_set.clone(), StateID(next_combined_id));
          next_combined_id += 1;
          let combined_start_state_id = *originset_to_id.get_by_left(&initial_origin_set).unwrap();

          let mut worklist: VecDeque<OriginSet> = VecDeque::new();
          worklist.push_back(initial_origin_set);

          let mut combined_rows: BTreeMap<StateID, CombinedRow> = BTreeMap::new();

          while let Some(origin_set) = worklist.pop_front() {
              let this_cid = *originset_to_id.get_by_left(&origin_set).unwrap();

              // Collect all terminals/non-terminals that are relevant in any current state.
              let mut all_terminals: BTreeSet<TerminalID> = BTreeSet::new();
              let mut all_nonterminals: BTreeSet<NonTerminalID> = BTreeSet::new();
              for &(_origin, current) in &origin_set {
                  if let Some(row) = table.get(&current) {
                      for &tid in row.shifts_and_reduces_full.keys() {
                          all_terminals.insert(tid);
                      }
                      for &ntid in row.gotos.keys() {
                          all_nonterminals.insert(ntid);
                      }
                  }
              }

              // --- Build per-terminal actions: Shift and Reduce(Split flattened) with origin masks.
              let mut shifts_and_reduces: BTreeMap<TerminalID, Vec<(Stage7ShiftsAndReducesLookaheadValue, StateIDBV)>> = BTreeMap::new();

              for tid in all_terminals {
                  // Gather:
                  // - shift_pairs: the resulting origin set for shifting on `tid`
                  // - shift_mask: which origins actually perform a shift
                  // - reduce_masks: map from "equivalent reduce actions" to origin masks
                  let mut shift_pairs: OriginSet = BTreeSet::new();
                  let mut shift_mask = StateIDBV::zeros();

                  let mut reduce_masks: BTreeMap<CombinedReduceKey, StateIDBV> = BTreeMap::new();

                  for &(origin, current) in &origin_set {
                      let row = &table[&current];
                      if let Some(action) = row.shifts_and_reduces_full.get(&tid) {
                          match action {
                              Stage7ShiftsAndReducesLookaheadValue::Shift(next_state) => {
                                  // Only a shift.
                                  shift_pairs.insert((origin, *next_state));
                                  shift_mask.insert(origin.0);
                              }
                              Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id, len, production_ids } => {
                                  // Only reduces (single).
                                  let key = CombinedReduceKey {
                                      nt: *nonterminal_id,
                                      len: *len,
                                      production_ids: production_ids.clone(),
                                  };
                                  reduce_masks.entry(key).or_insert_with(StateIDBV::zeros).insert(origin.0);
                              }
                              Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } => {
                                  // Handle the shift part (if any) by adding shift_pairs/mask,
                                  // and also flatten all reduces into individual Reduce entries keyed by (nt,len,pids).
                                  if let Some(next_state) = shift {
                                      shift_pairs.insert((origin, *next_state));
                                      shift_mask.insert(origin.0);
                                  }
                                  for (&len, nts) in reduces {
                                      for (&ntid, pids) in nts {
                                          let key = CombinedReduceKey {
                                              nt: ntid,
                                              len,
                                              production_ids: pids.clone(),
                                          };
                                          reduce_masks.entry(key).or_insert_with(StateIDBV::zeros).insert(origin.0);
                                      }
                                  }
                              }
                          }
                      }
                  }

                  // Produce a single shift action to the next combined state (if any shift exists).
                  if !shift_pairs.is_empty() {
                      let next_cid = {
                          let mut now_states = shift_pairs.iter().map(|(_, now)| *now);
                          let first_now_state = now_states.next().unwrap(); // Not empty, so safe.
                          if now_states.all(|s| s == first_now_state) {
                              // Optimization: all 'now' states are the same, transition to that original state.
                              first_now_state
                          } else {
                              // Otherwise, it's a true combined state.
                              if let Some(existing) = originset_to_id.get_by_left(&shift_pairs).copied() {
                                  existing
                              } else {
                                  let sid = StateID(next_combined_id);
                                  next_combined_id += 1;
                                  originset_to_id.insert(shift_pairs.clone(), sid);
                                  worklist.push_back(shift_pairs);
                                  sid
                              }
                          }
                      };
                      shifts_and_reduces
                          .entry(tid)
                          .or_default()
                          .push((Stage7ShiftsAndReducesLookaheadValue::Shift(next_cid), shift_mask));
                  }

                  // Produce reduce actions (flattened).
                  for (key, mask) in reduce_masks {
                      let action = Stage7ShiftsAndReducesLookaheadValue::Reduce {
                          nonterminal_id: key.nt,
                          len: key.len,
                          production_ids: key.production_ids,
                      };
                      shifts_and_reduces.entry(tid).or_default().push((action, mask));
                  }
              }

              // --- Build per-nonterminal gotos with origin masks:
              // We split them into two entries if necessary (accept=false vs accept=true).
              let mut gotos: BTreeMap<NonTerminalID, Vec<(Goto, StateIDBV)>> = BTreeMap::new();

              for ntid in all_nonterminals {
                  let mut goto_pairs: OriginSet = BTreeSet::new();
                  let mut accept_mask = StateIDBV::zeros();
                  let mut non_accept_mask = StateIDBV::zeros();
                  let mut saw_accept = false;
                  let mut saw_non_accept = false;

                  for &(origin, current) in &origin_set {
                      let row = &table[&current];
                      if let Some(goto) = row.gotos.get(&ntid) {
                          if let Some(next_state) = goto.state_id {
                              goto_pairs.insert((origin, next_state));
                              if goto.accept {
                                  accept_mask.insert(origin.0);
                                  saw_accept = true;
                              } else {
                                  non_accept_mask.insert(origin.0);
                                  saw_non_accept = true;
                              }
                          }
                      }
                  }

                  if !goto_pairs.is_empty() {
                      let next_cid = {
                          let mut now_states = goto_pairs.iter().map(|(_, now)| *now);
                          let first_now_state = now_states.next().unwrap(); // Not empty, so safe.
                          if now_states.all(|s| s == first_now_state) {
                              // Optimization: all 'now' states are the same, transition to that original state.
                              first_now_state
                          } else {
                              // Otherwise, it's a true combined state.
                              if let Some(existing) = originset_to_id.get_by_left(&goto_pairs).copied() {
                                  existing
                              } else {
                                  let sid = StateID(next_combined_id);
                                  next_combined_id += 1;
                                  originset_to_id.insert(goto_pairs.clone(), sid);
                                  worklist.push_back(goto_pairs);
                                  sid
                              }
                          }
                      };

                      if saw_non_accept {
                          gotos
                              .entry(ntid)
                              .or_default()
                              .push((
                                  Goto { state_id: Some(next_cid), accept: false },
                                  non_accept_mask,
                              ));
                      }
                      if saw_accept {
                          gotos
                              .entry(ntid)
                              .or_default()
                              .push((
                                  Goto { state_id: Some(next_cid), accept: true },
                                  accept_mask,
                              ));
                      }
                  }
              }

              // Build the final combined row. We don't attempt "default reduce" promotion here.
              let row = CombinedRow {
                  shifts_and_reduces,
                  gotos,
                  default_reduce: DefaultReduce { clone_and_merge: true, reduce: None },
              };
              combined_rows.insert(this_cid, row);
          }

          if !combined_rows.is_empty() {
              println!("\n--- Combined States Statistics ---");
              println!("Total combined states: {}", combined_rows.len());

              let mut sole_shift_counts = Vec::new();
              let mut sole_reduce_counts = Vec::new();
              let mut split_counts = Vec::new();
              let mut goto_counts = Vec::new();

              for row in combined_rows.values() {
                  let mut num_sole_shifts = 0;
                  let mut num_sole_reduces = 0;
                  let mut num_splits = 0;
                  for actions in row.shifts_and_reduces.values() {
                      for (action, _) in actions {
                          match action {
                              Stage7ShiftsAndReducesLookaheadValue::Shift(_) => num_sole_shifts += 1,
                              Stage7ShiftsAndReducesLookaheadValue::Reduce { .. } => num_sole_reduces += 1,
                              Stage7ShiftsAndReducesLookaheadValue::Split { .. } => num_splits += 1,
                          }
                      }
                  }
                  sole_shift_counts.push(num_sole_shifts);
                  sole_reduce_counts.push(num_sole_reduces);
                  split_counts.push(num_splits);

                  let num_gotos = row.gotos.values().map(|v| v.len()).sum();
                  goto_counts.push(num_gotos);
              }

              fn print_stats(name: &str, counts: &[usize]) {
                  if counts.is_empty() {
                      println!("{}: N/A (no data)", name);
                      return;
                  }
                  let total_states = counts.len();
                  let total_actions: usize = counts.iter().sum();
                  let min = *counts.iter().min().unwrap();
                  let max = *counts.iter().max().unwrap();
                  let avg = total_actions as f64 / total_states as f64;

                  println!(
                      "{}: Total: {}, Min/Max per state: {}/{}, Avg per state: {:.2}",
                      name, total_actions, min, max, avg
                  );

                  let mut distribution = BTreeMap::new();
                  for &count in counts {
                      *distribution.entry(count).or_insert(0) += 1;
                  }

                  print!("  Distribution (count -> #states): ");
                  let mut first = true;
                  for (count, num_states) in distribution {
                      if !first {
                          print!(", ");
                      }
                      print!("{}: {}", count, num_states);
                      first = false;
                  }
                  println!();
              }

              print_stats("Sole Shift actions", &sole_shift_counts);
              print_stats("Sole Reduce actions", &sole_reduce_counts);
              print_stats("Split actions", &split_counts);
              print_stats("Goto actions", &goto_counts);
              println!("------------------------------------");
          }

          // // Print it all
          // println!("\n--- Combined States Table ---");
          // for (cid, row) in &combined_rows {
          //     println!("Combined State ID: {}", cid.0);
          //     println!("  Shifts and Reduces:");
          //     for (tid, actions) in &row.shifts_and_reduces {
          //         for (action, mask) in actions {
          //             println!("    Terminal {}: {:?} with origins {:?}", tid.0, action, mask);
          //         }
          //     }
          //     println!("  Gotos:");
          //     for (ntid, gotos) in &row.gotos {
          //         for (goto, mask) in gotos {
          //             println!("    NonTerminal {}: {:?} with origins {:?}", ntid.0, goto, mask);
          //         }
          //     }
          //     println!();
          // }

          (combined_rows, combined_start_state_id)
      }

      /// Helper for `stage_9`: Traces a chain of unit reductions from a given starting state and non-terminal.
      fn compute_unit_reduction_chain<'a, F>(
          table: &'a Table,
          source_state_id: StateID,
          initial_nt: NonTerminalID,
          token_id: TerminalID,
          action_selector: F,
      ) -> (BTreeSet<StateID>, bool)
      where
          F: Fn(StateID) -> &'a BTreeMap<TerminalID, Stage7ShiftsAndReducesLookaheadValue>,
      {
          let mut final_goto_state_ids_for_source = BTreeSet::new();
          let mut accepted = false;
          let mut current_nt_local = initial_nt;
          let row = &table[&source_state_id];

          loop {
              if let Some(goto) = row.gotos.get(&current_nt_local) {
                  if goto.accept {
                      accepted = true;
                  }
                  if let Some(goto_state_id) = goto.state_id {
                      if let Some(Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id: next_nt, len: 1, .. }) = action_selector(goto_state_id).get(&token_id) {
                          current_nt_local = *next_nt;
                          continue; // Follow the unit-reduction chain.
                      }
                      // Not a unit reduction, this is a final state for this chain.
                      final_goto_state_ids_for_source.insert(goto_state_id);
                  }
              }
              // End of chain (no GOTO, no further state, or not a unit reduction).
              break;
          }
          (final_goto_state_ids_for_source, accepted)
      }

      /// Merges compatible states in a parse table to reduce its size (LALR(1) optimization).
      ///
      /// This function takes a table and a list of compatible state pairs. It merges these
      /// pairs and transitively merges states. For example, if (s1, s2) and (s2, s3) are
      /// compatible, all three states will be merged into one.
      ///
      /// The process involves:
      /// 1.  Finding the canonical representative for each state using a disjoint-set union (DSU) approach.
      /// 2.  Creating a new, smaller parse table where each row corresponds to a representative state.
      /// 3.  Merging the goto maps of the merged states.
      /// 4.  Updating all StateID references (in shifts and gotos) throughout the new table to point
      ///     to the new representative state IDs.
      ///
      /// # Arguments
      /// * `table` - The `Stage7Table` to be compacted.
      /// * `item_set_map` - The mapping from item sets to their `StateID`s.
      /// * `start_state_id` - The initial state ID of the parser.
      /// * `compatible_pairs` - A list of state pairs that have been identified as compatible for merging.
      ///
      /// # Returns
      /// A tuple containing:
      /// * The new, compacted `Stage7Table`.
      /// * The new `BiBTreeMap` mapping merged item sets to the new `StateID`s.
      /// * The new start state ID.
      fn merge_compatible_states(
          table: &Table,
          item_set_map: &BiBTreeMap<BTreeSet<Item>, StateID>,
          start_state_id: StateID,
          compatible_pairs: &[(StateID, StateID)],
      ) -> (Table, BiBTreeMap<BTreeSet<Item>, StateID>, StateID) {
          if compatible_pairs.is_empty() {
              return (table.clone(), item_set_map.clone(), start_state_id);
          }

          crate::debug!(2, "Merging {} compatible state pairs.", compatible_pairs.len());

          // 1. DSU structure to manage state merging.
          let mut parent: BTreeMap<StateID, StateID> = table.keys().map(|&id| (id, id)).collect();
          fn find_set(parent: &mut BTreeMap<StateID, StateID>, i: StateID) -> StateID {
              if parent[&i] == i {
                  i
              } else {
                  let root = find_set(parent, parent[&i]);
                  parent.insert(i, root); // Path compression
                  root
              }
          }
          fn unite_sets(parent: &mut BTreeMap<StateID, StateID>, mut a: StateID, mut b: StateID) {
              a = find_set(parent, a);
              b = find_set(parent, b);
              if a != b {
