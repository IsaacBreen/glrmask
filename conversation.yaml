                              end = min(int(end), max_state_id + 1)
                              for sid_val in range(int(start), end):
                                  by_dest = sid_map.get(sid_val)
                                  if by_dest is None:
                                      by_dest = {}
                                      sid_map[sid_val] = by_dest
                                  prev = by_dest.get(dest_idx)
                                  if prev is None:
