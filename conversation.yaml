                  if bucket is None:
                      todo[depth] = {node_idx}
                      heappush(depth_heap, depth)
                  else:
                      bucket.add(node_idx)

              heappop = heapq.heappop
              arena = self.arena
              is_end = self.is_end

              # print"\n--- Main loop ---")
              iter_count = 0
