      "${cmd[@]}"

      echo
      echo "---"
      echo "Benchmark analysis complete."
      echo "Baseline: $BASELINE_KEY"
      echo "Summary printed above. Plots are saved in: $PLOTS_DIR"
      echo "Full JSON results are in: $RESULTS_DIR"
