                                  else:
                                      next_mask[dest_idx] = m.union(child_mask)

                          # Flush to values and enqueue
                          for d, parent_list in next_gss.items():
                              print(f"      - Dest: idx={d}")
                              print(f"        - Matched {len(parent_list)} parent GSS nodes")
                              if not parent_list:
