          pub precompute0_vocab: StageVocab,
          pub precomputed0: Precomputed0,
          pub trie0_god: Trie0GodWrapper,
      }
      ```

      **Public Fields:**

      *   `tokenizer: Regex`: The tokenizer used for this cache.
      *   `llm_token_map: BiBTreeMap<...>`: The LLM vocabulary used.
      *   `max_original_llm_token_id: usize`: The max token ID of the vocabulary.
      *   `precompute0_vocab: StageVocab`: The stage-specific vocabulary for Trie0.
      *   `precomputed0: Precomputed0`: The precomputed Trie0 roots.
      *   `trie0_god: Trie0GodWrapper`: The arena containing all Trie0 nodes.

      **Methods:**

      *   `pub fn is_compatible(&self, ...) -> bool`: Checks if the cache is compatible with the current configuration (tokenizer, vocab, etc.) and can be safely reused.

      ### `DedupValueMap<K, V>`

      A memory-efficient map where multiple keys can share the same value without duplicating it in memory. It behaves like a `BTreeMap<K, V>` for common operations.

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct DedupValueMap<K, V>
      where
          K: Ord + Clone + Eq,
          V: Clone + Eq + std::hash::Hash,
      ```

      **Methods:**

      *   `pub fn new() -> Self`: Creates a new, empty map.
      *   `pub fn len(&self) -> usize`: Returns the number of key-value pairs in the map.
      *   `pub fn is_empty(&self) -> bool`: Returns `true` if the map is empty.
      *   `pub fn contains_key<Q>(&self, k: &Q) -> bool`: Checks if the map contains a given key.
      *   `pub fn insert(&mut self, key: K, value: V) -> Option<V>`: Inserts a key-value pair. The value is interned to save memory.
      *   `pub fn get<Q>(&self, key: &Q) -> Option<&V>`: Retrieves a reference to the value associated with a key.
      *   `pub fn iter(&self) -> impl Iterator<Item = (&K, &V)>`: Returns an iterator over the key-value pairs.

