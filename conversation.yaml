                  groups: List[Tuple[int, List[Tuple[int, ffi.Bitset]], List[Tuple[int, ffi.Bitset, ffi.Bitset]]]] = []
                  for pop, (eps_list, state_list) in groups_by_pop.items():
                      groups.append((pop, eps_list, state_list))

