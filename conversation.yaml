          if args.print_stats:
              print_model_statistics(competitor_model, args.competitor.name)

          # 5. Equivalence Check / Reference Model Setup
          reference_model = None
          if is_builtin_ref:
              print("Using 'builtin' reference (GrammarConstraintState) for mask verification.")
