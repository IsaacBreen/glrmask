      Short version
      That assert_ne! fires because we are about to insert an edge from a node to itself (a self-loop). The code path that chooses a “destination to reuse” (via dest_nodes_in_queue and try_destinations_iter) doesn’t exclude the source node. Under certain ordering of work within a segment, the source node ends up in the reuse set and we try to reuse it as the destination, leading to actual_dst == src_node_wrapper.

      The simplest fix is twofold:
      - Filter out the source node before calling try_destination/try_destinations_iter.
      - As a belt-and-suspenders guard, make EdgeInserter::try_destination early-return when destination == self.source_idx.

      Why this happens
      Focus on Precomputer0::dfs. For a given vocab child segment (segment_bytes), we do:

      - Initialize work_queue as a map: pos -> (tokenizer_state -> set of trie nodes).
      - Seed work_queue[0] with assoc_by_state, which is “the nodes we’ve already constructed for this vocab path.”

      Then we loop over positions (pos) within segment_bytes. For each (tokenizer_state_id, precompute_nodes) at that pos, for each terminal match at that pos:

      - We compute an edge_bv (set of LLM token IDs to attach to the edge).
      - We try to reuse an existing destination via:
        - dest_nodes_in_queue = work_queue[next_pos][next_tokenizer_state] (this is per-pos, per-tokenizer-state and shared across all sources being processed at pos).
        - Optionally also check “eligible children” of the current source (a heuristic to reuse existing children).
      - If we still didn’t pick a destination, we create a new node and remember it in dest_nodes_in_queue for next_pos.

      The bug
      - dest_nodes_in_queue is shared across all sources that match at this pos for all tokenizer states (note that next_tokenizer_state is always tokenizer.initial_state_id() in this code).
      - There is no filter to skip the current source node (src_node_wrapper) when iterating dest_nodes_in_queue as reuse candidates.
      - Therefore, if the current source node appears in dest_nodes_in_queue for next_pos (e.g. because another source processed earlier at the same pos reused or created that same node and inserted it in dest_nodes_in_queue), we’ll attempt to reuse it and create an edge from the node to itself.

      Your “z, zabm, zabn” scenario (concretized)
      Let’s make it concrete but keep it intuitive and minimal:

      - LLM tokens: "z", "zabm", "zabn"
      - Vocab prefix tree:
        - N0 -(“z”)-> N1
        - N1 -(“ab”)-> N2
        - N2 -(“m”)-> N3
        - N2 -(“n”)-> N4

      We run dfs(root=N0). Eventually we recurse to N1 (after segment “z”), then we process its child “ab”. At N1 we call dfs(child=N2, assoc_by_state), where assoc_by_state holds, for each tokenizer state, the set of current trie nodes on this path. For simplicity assume we have two tokenizer states (0 and 1). assoc_by_state could look like:
      - state 0: {A}
      - state 1: {A}          (same trie node A is reachable for both states; this happens commonly due to sharing)

      Inside dfs for “ab”:
      - work_queue starts with: work_queue[0][state0] = {A}, work_queue[0][state1] = {A}.
      - Process pos = 0.
        - Take state0 first:
          - From A at pos 0, match 'a' (width 1). next_pos = 1. next_tokenizer_state = initial (say 0).
          - dest_nodes_in_queue = work_queue[1][state0]. Initially empty.
          - No eligible child reuse matches, so we create a new node B for this (edge ('a', {'zabm','zabn'}) from A to B).
          - Insert B into dest_nodes_in_queue (work_queue[1][state0] now contains {B}).
        - Still pos = 0, now process state1:
          - The source is again A (same pointer A is reachable for state1 too). We build an inserter for A and try to reuse from dest_nodes_in_queue = work_queue[1][state0], which already contains B from the previous step.
          - That reuse is fine: A -> (a, ...) -> B.
      - Now pop pos = 1:
        - process B for state0 and B for state1; etc.

      Where does the self-loop come in?
      The minimal bad case is when the current source node equals some node already present in the dest_nodes_in_queue for next_pos. That can happen with slightly different shared structures as you described (e.g., A already has a child B, and because work_queue is keyed by next_tokenizer_state = initial, its per-pos sets can be shared across states). Then when we process B as a source (for a different entry), we will look at dest_nodes_in_queue (which already contains B) and try to reuse B as the destination. That attempts to create B --(...)--> B, triggering the assert.

      Even if you add a content-based filter for “eligible children” (you already filter those by live_tokens intersection), that filter is not used for dest_nodes_in_queue; so the source can still sneak in via dest_nodes_in_queue.

      And there is a second self-loop risk in the “end-of-segment” branch:
      - In the block if let Some(final_state) = exec_result.end_state { ... inserter.try_destination(end_idx) ... } we’re always trying to add an edge to an end node.
