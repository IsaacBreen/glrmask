              let b1_orig = Arc::new(MockGSSNode::new_with_predecessors(
                  NodeSet::from([(c1_orig.clone(), 20)])
              ));

              let a1_orig = Arc::new(MockGSSNode::new_with_predecessors(NodeSet::from([
                  (b1_orig.clone(), 10),
                  (d2_orig.clone(), 10)
              ])));

