              //    - `neg_map` has `g` at position 2. `pos_map` has `h` at position 2.
              //    - Checks for `g` ([6]) and `h` ([7]) do not intersect.
              //    - This is a mismatch, so the entire stack is eliminated.
              let input = vec![
                  ek(2, Some(&[0]), None), // a
                  ek(1, Some(&[1]), None), // b
                  // Pair 1
                  ek(-3, Some(&[2]), None), // c
                  ek(-1, Some(&[3]), None), // d
                  ek(2, Some(&[2]), None),  // c
                  // Pair 2 (neg part merges with leftover from Pair 1)
                  ek(-2, None, None),       // e (unconstrained)
                  ek(5, Some(&[4]), None),  // e
                  ek(1, Some(&[5]), None),  // f
                  // Pair 3 (mismatch)
                  ek(-1, Some(&[6]), None), // g
                  ek(-1, Some(&[7]), None), // h
                  ek(2, Some(&[7]), None),  // h
                  // Trailing
                  ek(-4, Some(&[8]), None), // i
                  ek(-1, Some(&[9]), None), // j
              ];
