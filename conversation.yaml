              symbols_len = ctypes.c_size_t(len(symbols))
              ret_code = lib.fst_remove_input_symbols(self.ptr, symbols_ptr, symbols_len)
              err_msg = "Error during remove_input_symbols"
              check_ffi_error(ret_code, err_msg)

