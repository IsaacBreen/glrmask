      *   `pub fn commit(&mut self, llm_token_id: LLMTokenID)`: Updates the state by consuming a given LLM token (specified by its original ID).
      *   `pub fn commit_bytes(&mut self, llm_token_bytes: &[u8])`: Updates the state by consuming a given LLM token (specified by its byte representation).
      *   `pub fn is_active(&self) -> bool`: Returns `true` if the constraint state is not empty (i.e., if generation has not reached a dead end).
