      #### `pub struct EdgeInserter<'a, ...>`
      A helper struct for inserting an edge into a `Trie` using a fluent, chainable interface.

      ##### Public Fields
      *   `pub edge_value: Option<EV>`: The value for the edge to be inserted.

      ##### Public Methods
      *   `pub fn new(...) -> Self`: Creates a new `EdgeInserter`.
      *   `pub fn try_destination(mut self, destination: Trie2Index) -> Self`: Tries to add or merge an edge to a specific destination.
      *   `pub fn try_destinations(mut self, destinations: &[Trie2Index]) -> Self`: Tries a slice of potential destinations in order.
      *   `pub fn try_destinations_iter(mut self, destinations: impl Iterator<Item = Trie2Index>) -> Self`: Tries an iterator of potential destinations in order.
      *   `pub fn try_destinations_iter_with<F, R>(mut self, destinations: F) -> Self`: Tries an iterator of potential destinations from a closure.
      *   `pub fn try_children(mut self) -> Self`: Tries to merge with existing children that share the same edge key.
      *   `pub fn else_create_destination_with_value(mut self, value: T) -> Self`: If no destination was found, creates a new node with the given value and connects to it.
      *   `pub fn else_create_destination_with(self, value_fn: impl FnOnce() -> T) -> Self`: Lazily creates a new destination node using a closure if needed.
      *   `pub fn else_create_destination(self) -> Self`: Creates a new destination node with a default value if needed.
      *   `pub fn into_option(self) -> Option<Trie2Index>`: Consumes the inserter and returns the resulting destination index, if any.
      *   `pub fn is_some(&self) -> bool`: Checks if a destination has been found.
      *   `pub fn clone_into_option(&self) -> Option<Trie2Index>`: Returns the resulting destination index without consuming the inserter.
      *   `pub fn unwrap(self) -> Trie2Index`: Consumes the inserter and returns the resulting destination index, panicking on failure.
      *   `pub fn expect(self, msg: &str) -> Trie2Index`: Consumes the inserter and returns the resulting destination index, panicking with a message on failure.

