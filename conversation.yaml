                  elif isinstance(self.inner, Interface):
                      empty_acc = self.inner.empty

                  if empty_acc is not None:
                      return LeveledGSS(UpperBranch(children={}, empty=empty_acc))
                  return LeveledGSS(empty_gss_inner)

