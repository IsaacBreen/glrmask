      - H2 (string-key fragility): The current “key” is produced via format!("{}", weight). If the Display of Weight ever changes non-canonically (e.g., by including non-deterministic detail), different string keys can be produced for equal weights. This would further defeat deduplication and exacerbate the non-termination symptoms. While we can’t change Weight here, we can reduce the risk by using the closure as the canonical descriptor, which dramatically reduces the number of distinct keys and eliminates duplicates due to different seeds with the same closure.

