      impl VocabPrefixTreeNode {
          /// Creates a new node representing a token endpoint.
          fn new(token_id: usize, prefix: Vec<u8>) -> Self {
              let prefix_length = prefix.len();
              VocabPrefixTreeNode {
                  token_id,
