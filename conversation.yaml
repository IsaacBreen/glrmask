              self.arena = arena
              self.max_depth: Dict[int, int] = {}
              # Convert precompute3 graph structure to precompute2-like structure
              for uid, n in tqdm(self.arena.items(), desc="Converting precompute3->precompute2", total=len(self.arena)):
