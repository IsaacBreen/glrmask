                  dot_lines.append(f'  "{trunc_node_id}" [label="... ({num_omitted} more edges)", shape="plaintext"];')
                  dot_lines.append(f'  "{node_id}" -> "{trunc_node_id}" [style="dotted", arrowhead="none"];')
          
