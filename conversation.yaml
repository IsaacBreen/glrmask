          // 5. Convert back to the required BTreeMap format for deterministic output.
          let res = all_nts
              .into_iter()
              .map(|nt| {
                  let id = *nt_map.get_by_left(&nt).unwrap();
                  let set = first_sets_by_id[id].iter().cloned().collect();
                  (nt, set)
