              children_it = iter(intermediate_node.children)
              first = next(children_it)
              edge_dests = []
              prev_pop = first.pop
              prev_llm_bv = first.llm_bv
              edge_dests.append(ArenaEdgeDest(first.dests.dest_idx, first.dests.state_bv))
