              match values_arr {
                  JSONNode::Array(a) => {
                      for n in a {
                          let mut pair = match n {
                              JSONNode::Array(p) if p.len() == 2 => p,
                              _ => return Err("DedupValueMap: values entry must be [id, value]".to_string()),
