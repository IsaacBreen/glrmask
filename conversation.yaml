              let bitset = self.inner.with_inner_mut(|state| state.get_mask());
              let bools: Vec<bool> = bitset.iter_bools().map(|bit_ref| bit_ref).collect();
              let array = bools.into_pyarray_bound(py);
              Ok(array)
