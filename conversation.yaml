      Define a `JSONNode` enum.
      Make a trait `JSONConvertible` for converting AND from this. Implement it for the obvious primitive types, and basic collections.
      One caveat: JSON obj keys must be strings, but in Rust's btreemap and hashmap they can be anything. Let's go for ease-of-use here and convert all btreemaps and hashmaps to vectors of tuples instead, even if the key is a string.
