              //    A cycle exists iff `self` is reachable from `child`.
              // ------------------------------------------------------------------
              let self_ptr = self as *const Trie<EK, EV, T>;
              if !self.already_has_dst_for_any_key(&child) &&
                  Self::detect_cycle(self_ptr, &child) {
