              };

              let (gss_str, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &config);
              println!("{}", gss_str);

              if !state_ids.is_empty() {
                  println!("\n--- GSS State Explanations ---");
                  for state_id in state_ids {
