                          # Helper to get matched parents for this sid group
                          def matched_for_sid_opt(sid_opt_val: Optional[int]) -> List[ffi.GSSNode]:
                              if sid_opt_val is None:
                                  return all_parents
                              lst = sid_to_parents.get(int(sid_opt_val))
                              return lst if lst else []

