              let mut roots = Vec::new();
              for (_tokenizer_state_id, glr_state) in self.state.iter() { // Renamed tokenizer_state_id
                  for active_state in glr_state.active_states.values() {
                      let root = active_state.stack.clone();
                      roots.push(root);
