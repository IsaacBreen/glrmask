          // Initial mask should allow "a"
          let mask1 = state.get_mask();
          assert_eq!(mask1, HybridBitset::from_iter(vec![0]));

          // Commit "a"
          state.commit(LLMTokenID(0));
          assert!(state.is_active());

          // Mask should now allow "$"
          let mask2 = state.get_mask();
