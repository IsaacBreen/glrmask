      The fix is to make `timeit!` *always* expand to an expression.
      *   If the block you pass to it has a return value, `timeit!` will return that value.
      *   If the block contains only statements (like in your failing example), `timeit!` will expand to an expression of type `()` (unit type).

      This makes its behavior consistent and predictable for the compiler. The other behavior you wanted—injecting statements into the current scope so variables are accessible afterwards—is exactly what the `timeitblock!` macro is for.

