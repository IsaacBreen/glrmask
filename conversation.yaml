          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      // --- Part 3: Automata Definitions (DWA only) ---

      pub type StateID = usize;
      pub type Weight = SimpleBitset;

      // --- Deterministic Weighted Automaton (DWA) ---

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum DWABuildError {
          TransitionAlreadyExists { from: StateID, on: i16 },
          DefaultTransitionAlreadyExists { from: StateID },
          StateOutOfBounds { state: StateID },
      }

      impl Display for DWABuildError {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              match self {
                  DWABuildError::TransitionAlreadyExists { from, on } => {
                      write!(f, "Transition from state {} on code {} already exists", from, on)
                  }
                  DWABuildError::DefaultTransitionAlreadyExists { from } => {
                      write!(f, "Default transition from state {} already exists", from)
                  }
                  DWABuildError::StateOutOfBounds { state } => write!(f, "State {} is out of bounds", state),
              }
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAState {
          pub transitions: I16Map<StateID>,
          pub final_weight: Option<Weight>,
          pub trans_weight_default: Option<Weight>,
          pub trans_weights_exceptions: BTreeMap<i16, Weight>,
          /// Optional state-entry weight (intersected upon entering the state).
          /// Currently unused in determinization, but supported for future extensions.
          pub state_weight: Option<Weight>,
      }

      impl DWAState {
          pub fn get_weight(&self, ch: i16) -> Option<&Weight> {
              self.trans_weights_exceptions.get(&ch).or(self.trans_weight_default.as_ref())
          }

          /// Intersects all weights in this state with the given weight.
          pub fn apply_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw &= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw &= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd &= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w &= weight;
              }
          }

          /// Subtracts a weight from all weights in this state.
          pub fn exclude_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw -= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw -= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd -= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w -= weight;
              }
          }
      }

      #[derive(Clone, Debug, Default)]
      pub struct DWAStates(pub Vec<DWAState>);

      impl Index<usize> for DWAStates {
          type Output = DWAState;
          fn index(&self, index: usize) -> &Self::Output {
              &self.0[index]
          }
      }
      impl IndexMut<usize> for DWAStates {
          fn index_mut(&mut self, index: usize) -> &mut Self::Output {
              &mut self.0[index]
          }
      }
      impl Deref for DWAStates {
          type Target = [DWAState];
          fn deref(&self) -> &Self::Target {
              &self.0
          }
      }
      impl DWAStates {
          pub fn len(&self) -> usize {
              self.0.len()
          }
          pub fn add_state(&mut self) -> StateID {
              let id = self.0.len();
              self.0.push(DWAState::default());
              id
          }

          /// Adds a pre-existing DWAState to the collection and returns its new ID.
          pub fn add_existing_state(&mut self, state: DWAState) -> StateID {
              let id = self.0.len();
              self.0.push(state);
              id
          }

          pub fn copy_state(&mut self, state_id: StateID) -> StateID {
              assert!(state_id < self.len(), "state_id out of bounds");
              let state = self[state_id].clone();
              self.add_existing_state(state)
          }

          pub fn apply_weight(&mut self, state_id: StateID, weight: &Weight) {
              assert!(state_id < self.len(), "state_id out of bounds");
              self[state_id].apply_weight(weight);
          }

          pub fn copy_subgraph(&mut self, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= self.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(self[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = self[old_id].clone();

                  // Remap default transition
                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  // Remap exception transitions
                  let mut new_exceptions = BTreeMap::new();
                  for (ch, &old_target) in &old_state_clone.transitions.exceptions {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      new_exceptions.insert(*ch, new_target_id);
                  }
                  self[new_id].transitions.exceptions = new_exceptions;
              }
              (new_start_id, remap)
          }

          pub fn copy_subgraph_from(&mut self, other_states: &DWAStates, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= other_states.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(other_states[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = other_states[old_id].clone();

                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  self[new_id].transitions.exceptions = old_state_clone.transitions.exceptions.iter().map(|(ch, &old_target)| {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      (*ch, new_target_id)
                  }).collect();
              }
              (new_start_id, remap)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWABody {
          pub start_state: StateID,
      }

      #[derive(Clone, Debug, Default)]
      pub struct DWA {
          pub states: DWAStates,
          pub body: DWABody,
      }

      impl DWA {
          pub fn new() -> Self {
              let mut states = DWAStates::default();
              let start = states.add_state();
              DWA { states, body: DWABody { start_state: start } }
          }

          pub fn add_state(&mut self) -> StateID {
              self.states.add_state()
          }

          pub fn set_state_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].state_weight = Some(weight);
              Ok(())
          }

          pub fn set_final_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].final_weight = Some(weight);
              Ok(())
          }

          pub fn add_transition(
              &mut self,
              from: StateID,
              on: i16,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.exceptions.contains_key(&on) {
                  return Err(DWABuildError::TransitionAlreadyExists { from, on });
              }
              from_state.transitions.exceptions.insert(on, to);
              from_state.trans_weights_exceptions.insert(on, weight);
              Ok(())
          }

          pub fn set_default_transition(
              &mut self,
              from: StateID,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.default.is_some() {
                  return Err(DWABuildError::DefaultTransitionAlreadyExists { from });
              }
              from_state.transitions.default = Some(to);
              from_state.trans_weight_default = Some(weight);
              Ok(())
          }

          pub fn simplify(&mut self) {
              let before_simplify = if STOCHASTIC_DEBUG { Some(self.clone()) } else { None };

              Self::simplify_components(&mut self.states, &mut self.body);

              if STOCHASTIC_DEBUG {
                  if let Some(before) = before_simplify {
                      // Note: assert_dwa_equivalent simplifies both, so this checks language equivalence.
                      test_weighted_automata::assert_dwa_equivalent(before, self.clone());
                  }
              }
          }

          pub fn simplify_components(states: &mut DWAStates, body: &mut DWABody) {
              let now = Instant::now();
              let initial_len = states.len();
              if states.0.is_empty() {
                  return;
              }

              Self::normalize_edges_inplace(states);
              Self::prune_unreachable(states, body);

              let mut changed_any = true;
              let mut passes = 0usize;
              while changed_any && passes < 10 {
                  passes += 1;
                  changed_any = false;
                  if Self::normalize_edges_inplace(states) {
                      changed_any = true;
                  }
                  if Self::propagate_and_constrain_weights(states, body) {
                      changed_any = true;
                  }
                  if Self::propagate_future_weights(states) {
                      changed_any = true;
                  }
                  if Self::minimize_partition_refinement(states, body) {
                      changed_any = true;
                  }
                  if Self::normalize_edges_inplace(states) {
                      changed_any = true;
                  }
                  if Self::prune_unreachable(states, body) {
                      changed_any = true;
                  }
              }
              crate::debug!(3, "DWA::simplify_components ({} states -> {} states) took: {:?}", initial_len, states.len(), now.elapsed());
          }

          pub fn propagate_and_constrain_weights(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              let mut reachable_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();

              if body.start_state >= n {
                  return false; // No start state, nothing to do.
              }
              reachable_weights[body.start_state] = Weight::all();
              worklist.push_back(body.start_state);

              while let Some(u) = worklist.pop_front() {
                  let u_rw = reachable_weights[u].clone();
                  if u_rw.is_empty() {
                      continue;
                  }
                  let u_state = &states[u];

                  // State entry weight gates outgoing paths too
                  let gated_u_rw = if let Some(sw) = &u_state.state_weight {
                      &u_rw & sw
                  } else {
                      u_rw
                  };

                  // Default transition
                  if let Some(v) = u_state.transitions.default {
                      if v < n {
                          if let Some(edge_w) = u_state.trans_weight_default.as_ref() {
                              let new_v_rw = &gated_u_rw & edge_w;

                              let old_v_rw = &reachable_weights[v];
                              if (&new_v_rw & old_v_rw) != new_v_rw {
                                  // if new_v_rw is not a subset of old_v_rw
                                  reachable_weights[v] |= &new_v_rw;
                                  worklist.push_back(v);
                              }
                          }
                      }
                  }

                  // Exception transitions
                  for (&ch, &v) in &u_state.transitions.exceptions {
                      if v < n {
                          if let Some(edge_w) = u_state.trans_weights_exceptions.get(&ch) {
                              let new_v_rw = &gated_u_rw & edge_w;

                              let old_v_rw = &reachable_weights[v];
                              if (&new_v_rw & old_v_rw) != new_v_rw {
                                  // if new_v_rw is not a subset of old_v_rw
                                  reachable_weights[v] |= &new_v_rw;
                                  worklist.push_back(v);
                              }
                          }
                      }
                  }
              }

              // Now apply constraints
              let mut changed = false;
              for i in 0..n {
                  let old_fw = states[i].final_weight.clone();
                  if let Some(fw) = states[i].final_weight.as_mut() {
                      *fw &= &reachable_weights[i];
                      if fw.is_empty() {
                          states[i].final_weight = None;
                      }
                  }
                  if states[i].final_weight != old_fw {
                      changed = true;
                  }
              }
              changed
          }

          pub fn propagate_future_weights(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              // 1. Compute future weights via backward analysis.
              // future_weights[i] = union of weights of all accepting paths starting from i.
              let mut rev_adj: Vec<Vec<StateID>> = vec![vec![]; n];
              for i in 0..n {
                  if let Some(d) = states[i].transitions.default {
                      if d < n {
                          rev_adj[d].push(i);
                      }
                  }
                  for &v in states[i].transitions.exceptions.values() {
                      if v < n {
                          rev_adj[v].push(i);
                      }
                  }
              }
              for preds in rev_adj.iter_mut() {
                  preds.sort_unstable();
                  preds.dedup();
              }

              let mut future_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();
              for i in 0..n {
                  if let Some(fw) = &states[i].final_weight {
                      if !fw.is_empty() {
                          future_weights[i] = fw.clone();
                          for &pred in &rev_adj[i] {
                              worklist.push_back(pred);
                          }
                      }
                  }
              }

              while let Some(u) = worklist.pop_front() {
                  let mut u_new_fw = states[u].final_weight.clone().unwrap_or_else(Weight::zeros);

                  // Include state entry weight to possible future gating
                  if let Some(sw) = &states[u].state_weight {
                      u_new_fw |= sw;
                  }

                  let u_state = &states[u];

                  // Default transition
                  if let Some(v) = u_state.transitions.default {
                      if v < n {
                          if let Some(edge_w) = u_state.trans_weight_default.as_ref() {
                              u_new_fw |= &(edge_w & &future_weights[v]);
                          }
                      }
                  }

                  // Exception transitions
                  for (&ch, &v) in &u_state.transitions.exceptions {
                      if v < n {
                          if let Some(edge_w) = u_state.trans_weights_exceptions.get(&ch) {
                              u_new_fw |= &(edge_w & &future_weights[v]);
                          }
                      }
                  }

                  if u_new_fw != future_weights[u] {
                      future_weights[u] = u_new_fw;
                      for &pred in &rev_adj[u] {
                          worklist.push_back(pred);
                      }
                  }
              }

              // 2. Update edge weights. An edge weight W can be relaxed to W | !future_weight(target)
              // because any bits not in future_weight(target) would be filtered out anyway.
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  // Default
                  if let Some(v) = st.transitions.default {
                      if v < n {
                          if let Some(w) = st.trans_weight_default.as_mut() {
                              let not_future_v = !&future_weights[v];
                              let new_w = &*w | &not_future_v;
                              if new_w != *w {
                                  *w = new_w;
                                  any_weight_changed = true;
                              }
                          }
                      }
                  }
                  // Exceptions
                  let keys: Vec<i16> = st.transitions.exceptions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.exceptions.get(&ch) {
                          if v < n {
                              if let Some(w) = st.trans_weights_exceptions.get_mut(&ch) {
                                  let not_future_v = !&future_weights[v];
                                  let new_w = &*w | &not_future_v;
                                  if new_w != *w {
                                      *w = new_w;
                                      any_weight_changed = true;
                                  }
                              }
                          }
                      }
                  }
              }

              any_weight_changed
          }

          pub fn normalize_edges_inplace(states: &mut DWAStates) -> bool {
              let mut changed = false;
              for st in &mut states.0 {
                  let before = st.transitions.exceptions.len();
                  if let Some(def) = st.transitions.default {
                      st.transitions.exceptions.retain(|_, &mut tgt| tgt != def);
                  }
                  changed |= st.transitions.exceptions.len() != before;

                  let before_w = st.trans_weights_exceptions.len();
                  st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  changed |= st.trans_weights_exceptions.len() != before_w;
              }
              changed
          }

          pub fn minimize_partition_refinement(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.0.len();
              if n <= 1 {
                  return false;
              }
              let sink_pid: usize = n;

              // Initial partition by outputs (state_weight, final_weight).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<(Option<Weight>, Option<Weight>), usize> = HashMap::new();
              for i in 0..n {
                  let key = (states[i].state_weight.clone(), states[i].final_weight.clone());
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Refine until stable
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<(Option<Weight>, Option<Weight>, usize, Vec<(i16, usize)>), usize> = HashMap::new();

                  for i in 0..n {
                      let st = &states[i];
                      let def_cls = st.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);
                      let mut ex: Vec<(i16, usize)> = Vec::with_capacity(st.transitions.exceptions.len());
                      for (ch, tgt) in &st.transitions.exceptions {
                          let cls = part[*tgt];
                          if cls != def_cls {
                              ex.push((*ch, cls));
                          }
                      }
                      let sig = (st.state_weight.clone(), st.final_weight.clone(), def_cls, ex);
                      let next_pid = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(next_pid);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Early exit if nothing to merge
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Build representatives
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<DWAState> = Vec::with_capacity(groups.len());
              for (pid, members) in &groups {
                  let rep = members[0];
                  let rep_state = &states[rep];
                  let def_cls = rep_state.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);

                  let mut st = DWAState::default();
                  st.state_weight = rep_state.state_weight.clone();
                  st.final_weight = rep_state.final_weight.clone();
                  st.transitions.default = if def_cls == sink_pid { None } else { Some(0) };
                  for (ch, tgt) in &rep_state.transitions.exceptions {
                      let cls = part[*tgt];
                      if cls != def_cls {
                          st.transitions.exceptions.insert(*ch, 0);
                      }
                  }

                  // Aggregate per-edge weights across members (join).
                  if st.transitions.default.is_some() {
                      let mut agg_def: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weight_default.as_ref() {
                              if let Some(ref mut a) = agg_def {
                                  *a |= w;
                              } else {
                                  agg_def = Some(w.clone());
                              }
                          }
                      }
                      st.trans_weight_default = agg_def;
                  }
                  let ex_keys: Vec<i16> = st.transitions.exceptions.keys().cloned().collect();
                  for ch in ex_keys {
                      let mut agg: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weights_exceptions.get(&ch) {
                              if let Some(ref mut a) = agg {
                                  *a |= w;
                              } else {
                                  agg = Some(w.clone());
                              }
                          }
                      }
                      if let Some(w) = agg {
                          st.trans_weights_exceptions.insert(ch, w);
                      }
                  }

                  let new_id = new_states.len();
                  pid_to_new.insert(*pid, new_id);
                  new_states.push(st);
              }

              // Fix transition targets
              for (pid, members) in &groups {
                  let new_id = *pid_to_new.get(pid).unwrap();
                  let rep = members[0];
                  let rep_state = &states[rep];

                  let def_cls = rep_state.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);
                  if let Some(ref mut d) = new_states[new_id].transitions.default {
                      *d = *pid_to_new.get(&def_cls).unwrap();
                  }
                  let ex_old = new_states[new_id].transitions.exceptions.clone();
                  new_states[new_id].transitions.exceptions.clear();
                  for (ch, _) in ex_old {
                      let cls = part[*rep_state.transitions.exceptions.get(&ch).unwrap()];
                      new_states[new_id].transitions.exceptions.insert(ch, *pid_to_new.get(&cls).unwrap());
                  }
              }

              states.0 = new_states;
              Self::normalize_edges_inplace(states);
              let start_pid = part[body.start_state];
              body.start_state = *pid_to_new.get(&start_pid).unwrap();

              true
          }

          pub fn prune_unreachable(states: &mut DWAStates, body: &mut DWABody) -> bool {
              if states.0.is_empty() {
                  return false;
              }
              let n = states.0.len();

              // 1. Backward reachability from final states to find "live" states.
              let mut live = vec![false; n];
              let mut q_live: VecDeque<usize> = VecDeque::new();
              let mut rev_adj: Vec<Vec<usize>> = vec![vec![]; n];
              for i in 0..n {
                  if states[i].final_weight.as_ref().map_or(false, |w| !w.is_empty()) {
                      live[i] = true;
                      q_live.push_back(i);
                  }
                  if let Some(d) = states[i].transitions.default { if d < n { rev_adj[d].push(i); } }
                  for &v in states[i].transitions.exceptions.values() { if v < n { rev_adj[v].push(i); } }
              }
              while let Some(u) = q_live.pop_front() {
                  for &v in &rev_adj[u] {
                      if !live[v] { live[v] = true; q_live.push_back(v); }
                  }
              }

              // 2. Remove transitions to non-live states.
              let mut changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  if let Some(d) = st.transitions.default {
                      if !live[d] {
                          st.transitions.default = None;
                          st.trans_weight_default = None;
                          changed = true;
                      }
                  }
                  let before = st.transitions.exceptions.len();
                  st.transitions.exceptions.retain(|_, tgt| live[*tgt]);
                  if st.transitions.exceptions.len() != before {
                      changed = true;
                      st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  }
              }

              // 3. Forward reachability from start_state to find actually reachable states.
              let mut visited = vec![false; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              if body.start_state < n {
                  visited[body.start_state] = true;
                  q.push_back(body.start_state);
              }
              while let Some(u) = q.pop_front() {
                  if let Some(d) = states[u].transitions.default { if d < n && !visited[d] { visited[d] = true; q.push_back(d); } }
                  for &v in states[u].transitions.exceptions.values() { if v < n && !visited[v] { visited[v] = true; q.push_back(v); } }
              }

              if visited.iter().all(|&b| b) && !changed {
                  return false;
              }

              // 4. Remap kept states.
              let mut map = vec![usize::MAX; n];
              let mut next_id = 0usize;
              for i in 0..n { if visited[i] { map[i] = next_id; next_id += 1; } }

              if next_id == n && !changed { return false; }

              let mut new_states: Vec<DWAState> = Vec::with_capacity(next_id);
              for old in 0..n {
                  if !visited[old] { continue; }
                  let mut st = states[old].clone();
                  if let Some(d) = st.transitions.default { st.transitions.default = Some(map[d]); }
                  let ex = st.transitions.exceptions.clone();
                  st.transitions.exceptions.clear();
                  for (ch, tgt) in ex { st.transitions.exceptions.insert(ch, map[tgt]); }
                  new_states.push(st);
              }
              states.0 = new_states;
              if next_id > 0 {
                  body.start_state = map[body.start_state];
              } else if n > 0 {
                  states.0.clear();
                  body.start_state = states.add_state();
              }
              true
          }

          // --- Evaluation and sampling helpers ---
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let mut result_dwa = union_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let mut result_dwa = concat_nwa.determinize_to_dwa();
              result_dwa.simplify();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      // --- Display Implementations for Debugging ---
      pub fn format_pos_code(code: i16) -> String {
          let u = code as u16;
          if let Some(c) = char::from_u32(u as u32) {
              if c.is_ascii_graphic() || c == ' ' {
                  format!("'{}'", c)
              } else {
                  format!("{}", u)
              }
          } else {
              format!("{}", u)
          }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
      impl Display for DWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "DWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(sw) = &state.state_weight {
                      writeln!(f, "    state_weight: {}", sw)?;
                  }
                  if let Some(to) = &state.transitions.default {
                      if let Some(w) = &state.trans_weight_default {
                          writeln!(f, "    * -> {} (trans_weight: {})", to, w)?;
                      } else {
                          writeln!(f, "    * -> {}", to)?;
                      }
                  }
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  for (on, to) in &state.transitions.exceptions {
                      // Represent positive codes as char if ASCII; negatives as '-char' or '-num'
                      let char_repr = if *on >= 0 {
                          let u = *on as u16;
                          format_pos_code(*on)
                      } else {
                          let decoded_id = on.wrapping_sub(i16::MIN);
                          format!("neg({})", decoded_id)
                      };
                      if let Some(w) = state.trans_weights_exceptions.get(on) {
                          writeln!(f, "    {} -> {} (trans_weight: {})", char_repr, to, w)?;
                      } else {
                          writeln!(f, "    {} -> {}", char_repr, to)?;
                      }
                  }
              }
              Ok(())
          }
      }

      // --- JSON ---

      impl JSONConvertible for SimpleBitset {
          fn to_json(&self) -> JSONNode {
              let ranges_vec: Vec<Vec<usize>> = self.0.ranges().map(|ri| vec![*ri.start(), *ri.end()]).collect();
              ranges_vec.to_json()
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let ranges_vec: Vec<Vec<usize>> = Vec::from_json(node)?;
              let mut ranges = Vec::new();
              for mut v in ranges_vec {
                  if v.len() != 2 {
                      return Err(format!("Expected 2-element array for SimpleBitset range, got {:?}", v));
                  }
                  let end = v.pop().unwrap();
                  let start = v.pop().unwrap();
                  ranges.push(start..=end);
              }
              Ok(SimpleBitset(RangeSetBlaze::from_iter(ranges)))
          }
      }

      impl<T: JSONConvertible> JSONConvertible for I16Map<T> {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("exceptions".to_string(), self.exceptions.to_json());
              obj.insert("default".to_string(), self.default.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let exceptions =
                  BTreeMap::<i16, T>::from_json(obj.remove("exceptions").ok_or("Missing 'exceptions' field")?)?;
              let default = Option::<T>::from_json(obj.remove("default").ok_or("Missing 'default' field")?)?;
              Ok(I16Map { exceptions, default })
          }
      }

      impl JSONConvertible for DWAState {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("transitions".to_string(), self.transitions.to_json());
              obj.insert("final_weight".to_string(), self.final_weight.to_json());
              obj.insert("trans_weight_default".to_string(), self.trans_weight_default.to_json());
              obj.insert("trans_weights_exceptions".to_string(), self.trans_weights_exceptions.to_json());
              obj.insert("state_weight".to_string(), self.state_weight.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let transitions =
                  I16Map::<StateID>::from_json(obj.remove("transitions").ok_or("Missing 'transitions' field")?)?;
              let final_weight =
                  Option::<Weight>::from_json(obj.remove("final_weight").ok_or("Missing 'final_weight' field")?)?;
              let trans_weight_default = Option::<Weight>::from_json(
                  obj.remove("trans_weight_default").ok_or("Missing 'trans_weight_default' field")?,
              )?;
              let trans_weights_exceptions = BTreeMap::<i16, Weight>::from_json(
                  obj.remove("trans_weights_exceptions").ok_or("Missing 'trans_weights_exceptions' field")?,
              )?;
              let state_weight =
                  Option::<Weight>::from_json(obj.remove("state_weight").ok_or("Missing 'state_weight' field")?)?;
              Ok(DWAState { transitions, final_weight, trans_weight_default, trans_weights_exceptions, state_weight })
          }
      }

      impl JSONConvertible for DWA {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("states".to_string(), self.states.0.to_json());
              obj.insert("start_state".to_string(), self.body.start_state.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let states = Vec::<DWAState>::from_json(obj.remove("states").ok_or("Missing 'states' field")?)?;
              let start_state = StateID::from_json(obj.remove("start_state").ok_or("Missing 'start_state' field")?)?;
              Ok(DWA { states: DWAStates(states), body: DWABody { start_state } })
          }
      }

      pub type NWAStateID = usize;

      /// - Non-epsilon transitions: unique target per input symbol.
      /// - Each transition carries a weight (Weight), which is intersected along the path; final states
      ///   carry a final weight that is intersected at acceptance; multiple alternative paths union their weights.
      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct NWAState {
          pub final_weight: Option<Weight>,
          /// Non-epsilon transitions: unique target per input symbol.
          /// Map: label -> (target, weight)
          pub transitions: BTreeMap<i16, (NWAStateID, Weight)>,
          /// Epsilon transitions: list of (target, weight).
          pub epsilons: Vec<(NWAStateID, Weight)>,
          /// Default transition: used when a labeled transition for a symbol is absent.
          /// Semantics: for any symbol not present as a labeled transition, this edge applies.
          pub default: Option<(NWAStateID, Weight)>,
      }

      #[derive(Clone, Debug, Default)]
      pub struct NWAStates(pub Vec<NWAState>);

      impl NWAStates {
          pub fn len(&self) -> usize { self.0.len() }

          pub fn add_state(&mut self) -> NWAStateID {
              let id = self.0.len();
              self.0.push(NWAState::default());
              id
          }

          pub fn copy_state(&mut self, state_id: NWAStateID) -> NWAStateID {
              assert!(state_id < self.len(), "copy_state: state_id out of bounds");
              let new_id = self.add_state();
              self.0[new_id] = self.0[state_id].clone();
              new_id
          }

          pub fn add_epsilon(&mut self, from: NWAStateID, to: NWAStateID, w: Weight) {
              assert!(from < self.len() && to < self.len(), "add_epsilon: state id out of bounds");
              self.0[from].epsilons.push((to, w));
          }

          /// Add a labeled transition; if an existing transition on the same label exists,
          /// we merge weights if the target is the same, otherwise we assert (as per restricted NWA).
          pub fn add_transition(&mut self, from: NWAStateID, on: i16, to: NWAStateID, w: Weight) {
              assert!(from < self.len() && to < self.len(), "add_transition: state id out of bounds");
              if let Some((old_to, old_w)) = self.0[from].transitions.get_mut(&on) {
                  assert_eq!(*old_to, to, "NWA restricted: only one target per (state, symbol)");
                  *old_w |= &w;
              } else {
                  self.0[from].transitions.insert(on, (to, w));
              }
          }

          /// Deep-copy a subgraph starting at 'start_id' from another NWAStates arena into self.
          /// Returns (new_start_id, remap_old_to_new)
          pub fn copy_subgraph_from(&mut self, other: &NWAStates, start_id: NWAStateID) -> (NWAStateID, HashMap<NWAStateID, NWAStateID>) {
              let mut remap: HashMap<NWAStateID, NWAStateID> = HashMap::new();
              if start_id >= other.len() {
                  let new_start = self.add_state();
                  return (new_start, remap);
              }
              let new_start = self.add_state();
              self.0[new_start] = other.0[start_id].clone();
              remap.insert(start_id, new_start);

              let mut q = VecDeque::new();
              q.push_back((start_id, new_start));

              while let Some((old, new)) = q.pop_front() {
                  // Epsilon edges
                  let eps = other.0[old].epsilons.clone();
                  self.0[new].epsilons.clear();
                  for (to_old, w) in eps {
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].epsilons.push((to_new, w.clone()));
                  }
                  // Labeled edges
                  let trans = other.0[old].transitions.clone();
                  self.0[new].transitions.clear();
                  for (lbl, (to_old, w)) in trans {
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].transitions.insert(lbl, (to_new, w.clone()));
                  }
                  // Default edge
                  let def_old = other.0[old].default.clone();
                  self.0[new].default = None;
                  if let Some((to_old, w)) = def_old {
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].default = Some((to_new, w));
                  }
              }

              (new_start, remap)
          }
      }

      impl std::ops::Index<NWAStateID> for NWAStates {
          type Output = NWAState;
          fn index(&self, index: NWAStateID) -> &Self::Output { &self.0[index] }
      }
      impl std::ops::IndexMut<NWAStateID> for NWAStates {
          fn index_mut(&mut self, index: NWAStateID) -> &mut Self::Output { &mut self.0[index] }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct NWABody {
          pub start_state: NWAStateID,
      }

      #[derive(Clone, Debug, Default)]
      pub struct NWA {
          pub states: NWAStates,
          pub body: NWABody,
      }

      impl NWA {
          pub fn new() -> Self {
              let mut states = NWAStates::default();
              let start = states.add_state();
              Self { states, body: NWABody { start_state: start } }
          }

          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      if let Some(w) = &st.trans_weight_default {
                          nwa.states.0[i].default = Some((to, w.clone()));
                      }
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      if let Some(w) = st.trans_weights_exceptions.get(lbl) {
                          nwa.states.add_transition(i, *lbl, *to, w.clone());
                      }
                  }
              }
              nwa
          }

          /// Determinize the subgraph reachable from 'start' to a DWA via weighted subset construction.
          /// Representation invariant:
          /// - A D-state is a mapping M: NWAStateID -> Weight capturing epsilon-closure weights.
          /// - For each label c, we compute T0 by distributing M over c-labeled edges, then epsilon-closure T.
          /// - The deterministic edge weight is union of weights in T; the target D-state is canonicalized T.
          /// - Final weight of the D-state is union over s in M of (M[s] & final_weight[s]).
          pub fn determinize_to_dwa(&self) -> DWA {
              fn epsilon_closure(states: &NWAStates, initial: &BTreeMap<NWAStateID, Weight>) -> BTreeMap<NWAStateID, Weight> {
                  // Worklist algorithm: propagate union of weights along epsilons.
                  let mut result: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  let mut queue: VecDeque<NWAStateID> = VecDeque::new();

                  // Initialize
                  for (&sid, w) in initial {
                      if !w.is_empty() {
                          result.insert(sid, w.clone());
                          queue.push_back(sid);
                      }
                  }

                  while let Some(u) = queue.pop_front() {
                      let u_weight = result.get(&u).cloned().unwrap_or_else(Weight::zeros);
                      for &(v, ref eps_w) in &states[u].epsilons {
                          let propagated = &u_weight & eps_w;
                          if propagated.is_empty() { continue; }
                          if let Some(old) = result.get_mut(&v) {
                              let new_union = &*old | &propagated;
                              if &new_union != old {
                                  *old = new_union;
                                  queue.push_back(v);
                              }
                          } else {
                              result.insert(v, propagated);
                              queue.push_back(v);
                          }
                      }
                  }

                  // Drop zero weights mappings just in case.
                  result.retain(|_, w| !w.is_empty());
                  result
              }

              // Collect all explicit labels present anywhere in the NWA.
              let mut global_labels: BTreeSet<i16> = BTreeSet::new();
              for st in &self.states.0 {
                  global_labels.extend(st.transitions.keys());
              }

              // Canonicalization key type
              #[derive(Clone, Debug, PartialEq, Eq, Hash)]
              struct SubsetKey(Vec<(NWAStateID, Weight)>);

              fn make_key(map: &BTreeMap<NWAStateID, Weight>) -> SubsetKey {
                  let mut v: Vec<(NWAStateID, Weight)> = map.iter().map(|(k, w)| (*k, w.clone())).collect();
                  // Already sorted by BTreeMap iteration order; ensure consistent
                  SubsetKey(v)
              }

              // Build initial subset: epsilon-closure from start with Weight::all
              let mut init_map: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
              init_map.insert(self.body.start_state, Weight::all());
              let init_closure = epsilon_closure(&self.states, &init_map);

              let mut dwa = DWA::new();
              dwa.states.0.clear();
              let start_d_id = dwa.states.add_state();
              dwa.body.start_state = start_d_id;

              let mut subset_to_d_id: HashMap<SubsetKey, StateID> = HashMap::new();
              let mut worklist: VecDeque<SubsetKey> = VecDeque::new();

              let init_key = make_key(&init_closure);
              subset_to_d_id.insert(init_key.clone(), start_d_id);
              worklist.push_back(init_key);

              // Ensure enough DWA states vector capacity as we go; transitions/weights filled dynamically
              while let Some(subset_key) = worklist.pop_front() {
                  let d_id = *subset_to_d_id.get(&subset_key).unwrap();
                  let subset_map: BTreeMap<NWAStateID, Weight> = subset_key.0.iter().map(|(k,w)| (*k, w.clone())).collect();

                  // Compute final weight
                  let mut d_final: Option<Weight> = None;
                  for (sid, w_in) in &subset_map {
                      if let Some(fw) = &self.states[*sid].final_weight {
                          let contrib = w_in & fw;
                          if !contrib.is_empty() {
                              if let Some(ref mut acc) = d_final {
                                  *acc |= &contrib;
                              } else {
                                  d_final = Some(contrib);
                              }
                          }
                      }
                  }
                  dwa.states[d_id].final_weight = d_final;

                  // Compute default (rest-of-alphabet) transition by following only default edges.
                  let mut def_t0: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  for (sid, w_in) in &subset_map {
                      if let Some((to, w_def)) = &self.states[*sid].default {
                          let contrib = w_in & w_def;
                          if !contrib.is_empty() {
                              if let Some(old) = def_t0.get_mut(to) {
                                  *old |= &contrib;
                              } else {
                                  def_t0.insert(*to, contrib);
                              }
                          }
                      }
                  }
                  if !def_t0.is_empty() {
                      let def_cl = epsilon_closure(&self.states, &def_t0);
                      if !def_cl.is_empty() {
                          let def_key = make_key(&def_cl);
                          let def_target = if let Some(id) = subset_to_d_id.get(&def_key) {
                              *id
                          } else {
                              let nid = dwa.states.add_state();
                              subset_to_d_id.insert(def_key.clone(), nid);
                              worklist.push_back(def_key);
                              nid
                          };
                          let mut def_w_opt: Option<Weight> = None;
                          for (_, w) in &def_cl {
                              if let Some(ref mut acc) = def_w_opt { *acc |= w; } else { def_w_opt = Some(w.clone()); }
                          }
                          if let Some(def_w) = def_w_opt {
                              dwa.set_default_transition(d_id, def_target, def_w).expect("DWA default insertion should not fail");
                          }
                      }
                  }

                  // Collect labels present in this subset
                  let labels = &global_labels;

                  for &lbl in labels {
                      // Build T0
                      let mut t0: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                      for (sid, w_in) in &subset_map {
                          if let Some((to, w_edge)) = self.states[*sid].transitions.get(&lbl) {
                              let contrib = w_in & w_edge;
                              if contrib.is_empty() { continue; }
                              if let Some(old) = t0.get_mut(to) {
                                  *old |= &contrib;
                              } else {
                                  t0.insert(*to, contrib);
                              }
                          } else if let Some((to, w_def)) = &self.states[*sid].default {
                              let contrib = w_in & w_def;
                              if contrib.is_empty() { continue; }
                              if let Some(old) = t0.get_mut(to) {
                                  *old |= &contrib;
                              } else {
                                  t0.insert(*to, contrib);
                              }
                          }
                      }
                      if t0.is_empty() { continue; }

                      // Epsilon-closure
                      let t_cl = epsilon_closure(&self.states, &t0);
                      if t_cl.is_empty() { continue; }

                      let target_key = make_key(&t_cl);
                      let target_d_id = if let Some(id) = subset_to_d_id.get(&target_key) {
                          *id
                      } else {
                          let nid = dwa.states.add_state();
                          subset_to_d_id.insert(target_key.clone(), nid);
                          worklist.push_back(target_key.clone());
                          nid
                      };

                      // Edge weight = union of all weights in t_cl
                      let mut edge_w_opt: Option<Weight> = None;
                      for (_, w) in &t_cl {
                          if let Some(ref mut acc) = edge_w_opt {
                              *acc |= w;
                          } else {
                              edge_w_opt = Some(w.clone());
                          }
                      }
                      if let Some(edge_w) = edge_w_opt {
                          // DWA supports one transition per label per state; add exception
                          dwa.add_transition(d_id, lbl, target_d_id, edge_w).expect("DWA insertion should not fail");
                      }
                  }
              }

              dwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, (v, _)) in states[u].transitions.iter() {
                      if *v < states.len() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      // Reset final weight (standard concatenation)
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }

      impl Display for NWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "NWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  if let Some((to, w)) = &state.default {
                      writeln!(f, "    * -> {} (weight: {})", to, w)?;
                  }
                  for (on, (to, w)) in &state.transitions {
                      let char_repr = format_i16_char(*on);
                      writeln!(f, "    {} -> {} (weight: {})", char_repr, to, w)?;
                  }
                  for (to, w) in &state.epsilons {
                      writeln!(f, "    ε -> {} (weight: {})", to, w)?;
                  }
              }
              Ok(())
          }
      }

