              if not isinstance(other, RangeSet):
                  raise TypeError("other must be a RangeSet")

              if isinstance(other, RoaringRangeSet):
                  self._rb |= other._rb
              else:
                  # Generic path
                  other_rb = RoaringBitmap()
                  for start, end in other.intervals:
                      if start < 0:
