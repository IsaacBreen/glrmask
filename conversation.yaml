  - user: |-
      I want to make get_mask much much faster.
      A crucial innovation in getting it to the current levels of performance was realizing the importance of zombie avoidance.
      In a nutshell, the faster we can get to an end node, the sooner we can start populating `final_mask`, and the sooner we can trigger zombie avoidance, which avoids paths that won't contribute to `final_mask` and hence avoids a lot of (expensive) traversal.
      Rearranging the edges was an important part of this. The order of traversal matters.
      However, I feel like there's a lot of performance left on the table.

