      impl Grammar {
          // fn mangle_literal(literal: &str, tokens: &BTreeMap<String, Expr>) -> String {
          //     let mut mangled_name = literal.to_string();
          //     let mut i = 0;
          //     while tokens.contains_key(&mangled_name) {
