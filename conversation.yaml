                  let root_node_arc = Arc::new(Mutex::new(root_node_trie.clone()));

                  let mut visited: HashSet<*const PrecomputeNode> = HashSet::new();
                  dump_precompute_trie_recursive(&root_node_arc, "".to_string(), &mut visited);
              }
              println!("\n===================================");
              println!("Dump Complete.");
          }
      }

