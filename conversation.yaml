          """Patched version of RangeSet.union that increments a stats counter."""
          stats = Stats.get()
          stats.inc('bitset.union.calls')
          stats.start('bitset.union.time')
          result = _original_rangeset_union(self, other)
          stats.stop('bitset.union.time')
