          #[test]
          fn test_normalize_removes_redundant_exceptions() {
              let mut d = DWA::new();
              let s1 = d.add_state();
              // Different state weight to avoid accidental merging
              d.set_state_weight(s1, Weight::from_item(99)).unwrap();
              // Default goes to s1
              d.set_default_transition(d.body.start_state, s1, Weight::from_item(50)).unwrap();
              // Redundant exceptions also go to s1
              d.add_transition(d.body.start_state, 'x' as i16, s1, Weight::from_item(60)).unwrap();
              d.add_transition(d.body.start_state, 'y' as i16, s1, Weight::from_item(61)).unwrap();

              // Sanity: exceptions exist pre-simplify
              assert_eq!(d.states[d.body.start_state].transitions.exceptions.len(), 2);
              assert_eq!(d.states[d.body.start_state].trans_weights_exceptions.len(), 2);

              d.simplify();
              let start = d.body.start_state;

              // normalize_edges_inplace should remove exceptions equal to the default target,
              // and their weights as well.
              assert!(d.states[start].transitions.exceptions.is_empty(), "Exceptions equal to default should be removed");
              assert!(d.states[start].trans_weights_exceptions.is_empty(), "Weights for removed exceptions should also be removed");
              assert!(d.states[start].transitions.default.is_some(), "Default should remain");
          }

          #[test]
          fn test_partition_refinement_aggregates_weights() {
              // Build two states that are behaviorally equivalent (same outputs/transitions),
              // differing only in their per-edge/default weights. They should be merged,
              // and the merged state's per-edge/default weights should be the union.
              let mut d = DWA::new();
              let s2 = d.add_state();
              let s3 = d.add_state();
              let sF = d.add_state();
              d.set_state_weight(sF, Weight::from_item(999)).unwrap(); // make sF distinct

              // Reachability
              d.add_transition(d.body.start_state, 'a' as i16, s2, Weight::all()).unwrap();
              d.add_transition(d.body.start_state, 'b' as i16, s3, Weight::all()).unwrap();

              // Self default loops with different weights
              d.set_default_transition(s2, s2, Weight::from_item(200)).unwrap();
              d.set_default_transition(s3, s3, Weight::from_item(201)).unwrap();
              // Same structural exception 'z' to sF, but different per-edge weights
              d.add_transition(s2, 'z' as i16, sF, Weight::from_item(100)).unwrap();
              d.add_transition(s3, 'z' as i16, sF, Weight::from_item(101)).unwrap();

              assert_eq!(d.states.len(), 4);
              d.simplify();
              // s2 and s3 should merge into one state.
              assert_eq!(d.states.len(), 3);

              // Find the merged middle state (it will be the only one with a 'z' exception).
              let mut z_owner: Option<StateID> = None;
              for (id, st) in d.states.0.iter().enumerate() {
                  if st.transitions.exceptions.contains_key(&('z' as i16)) {
                      z_owner = Some(id);
                      break;
                  }
              }
              let mid = z_owner.expect("Merged state with 'z' transition not found");
              assert_eq!(
                  d.states[mid].trans_weights_exceptions.get(&('z' as i16)),
                  Some(&Weight::from_iter(vec![100, 101]))
              );
              assert_eq!(
                  d.states[mid].trans_weight_default,
                  Some(Weight::from_iter(vec![200, 201]))
              );
          }

          #[test]
          fn test_union_transition_weight_union() {
              fn build(ch: char, ew: usize, fw: usize) -> DWA {
                  dwa_with_char_and_weights(ch, Weight::from_item(ew), Weight::from_item(fw))
              }
              let d1 = build('x', 10, 1);
              let d2 = build('x', 20, 2);
              let u = d1.union(&d2);

              // Expected automaton with unioned transition and final weights on 'x'.
              let mut expected = DWA::new();
              let s = expected.add_state();
              expected
                  .add_transition(0, 'x' as i16, s, Weight::from_iter(vec![10, 20]))
                  .unwrap();
              expected
                  .set_final_weight(s, Weight::from_iter(vec![1, 2]))
                  .unwrap();

              assert_dwa_equivalent(u, expected);
          }

          #[test]
          fn test_concatenate_weight_aggregation() {
              // Left automaton with weight {10} on start; mark it final so right is activated immediately.
              let mut left = DWA::new();
              left.set_state_weight(left.body.start_state, Weight::from_item(10)).unwrap();
              left.set_final_weight(left.body.start_state, Weight::from_item(1)).unwrap();

              // Right automaton with two states having weights {20} and {30}
              let mut right = DWA::new();
              right
                  .set_state_weight(right.body.start_state, Weight::from_item(20))
                  .unwrap();
              let r2 = right.add_state();
              right.set_state_weight(r2, Weight::from_item(30)).unwrap();

              let c = left.concatenate(&right);

              // The composed start state's weight should be the union of left.start and right.start weights.
              let w_start = &c.states[c.body.start_state].weight;
              assert_eq!(*w_start, Weight::from_iter(vec![10, 20]));
          }

          #[test]
          fn test_json_roundtrip_complex() {
              use crate::json_serialization::JSONConvertible;

              let mut d = DWA::new();
              d.set_state_weight(d.body.start_state, Weight::all()).unwrap();
              let s1 = d.add_state();
              let s2 = d.add_state();
              d.set_default_transition(d.body.start_state, s1, Weight::from_iter(vec![1, 2, 3]))
                  .unwrap();
              d.add_transition(d.body.start_state, 'x' as i16, s2, Weight::from_item(99))
                  .unwrap();
              d.set_final_weight(s2, Weight::from_iter(vec![5, 7])).unwrap();

              let node = d.to_json();
              let d2 = DWA::from_json(node.clone()).expect("from_json should succeed");
              assert_eq!(node, d2.to_json(), "Roundtrip JSON should be stable");
          }

          #[test]
          fn test_add_transition_out_of_bounds() {
              let mut d = DWA::new();
              let res = d.add_transition(5, 'a' as i16, 0, Weight::zeros());
              assert!(matches!(res, Err(DWABuildError::StateOutOfBounds { state: 5 })));

              let res2 = d.add_transition(0, 'a' as i16, 99, Weight::zeros());
              assert!(matches!(res2, Err(DWABuildError::StateOutOfBounds { state: 99 })));
          }

          #[test]
          fn test_prune_unreachable_with_default_chain() {
              let mut d = DWA::new();
              let s1 = d.add_state();
              let _s2 = d.add_state(); // Unused, unreachable
              d.set_default_transition(d.body.start_state, s1, Weight::all())
                  .unwrap();
              d.add_transition(s1, 'x' as i16, s1, Weight::all()).unwrap();

              // Completely unreachable component
              let s_unreach = d.add_state();
              d.add_transition(s_unreach, 'z' as i16, s_unreach, Weight::all())
                  .unwrap();

              let before = d.states.len();
              d.simplify();
              let after = d.states.len();
              assert!(after < before, "Unreachable states should be pruned");
              assert_eq!(after, 2, "Only start and s1 should remain reachable");
          }
      }
    src/precompute4/resolve_negatives.rs: |
      use crate::precompute4::full_dwa::Precomputed4;
      use crate::precompute4::weighted_automata::{DWA, DWAState, StateID, Weight};
      use std::collections::{BTreeMap, BTreeSet, VecDeque};

      pub fn resolve_negative_codes_for_all(precomputed4: &mut Precomputed4) {
          for (_sid, dwa) in precomputed4.iter_mut() {
              resolve_negative_codes_in_dwa(dwa);
          }
      }

      fn resolve_negative_codes_in_dwa(dwa: &mut DWA) {
          // Stage 1: Isolate final states targeted by negative transitions to simplify later logic.
          isolate_mixed_final_states(dwa);

          // Stage 2: Iteratively resolve A -(-x)-> B -(x)-> C patterns by merging C's behavior into A.
          propagate_cancellations(dwa);

          // Stage 3: Remove remaining internal negative transitions that don't lead to a final state.
          remove_internal_negatives(dwa);

          // Finally, simplify the automaton to merge equivalent states and remove unreachable ones.
          dwa.simplify();
      }

      /// If a negative transition `A -(-x)-> B` exists where B is final but also has outgoing
      /// transitions, this is ambiguous. We resolve this by creating a new, "pure" final state `B'`
      /// with B's final properties but no outgoing transitions, and retargeting the edge to `A -(-x)-> B'`.
      fn isolate_mixed_final_states(dwa: &mut DWA) {
          let mut updates = Vec::new(); // (from_state, neg_code, new_target)

          for from_id in 0..dwa.states.len() {
              let from_state = dwa.states[from_id].clone();
              for (&neg_code, &target_id) in &from_state.transitions.exceptions {
                  if neg_code >= 0 {
                      continue;
                  }

                  let target_state = &dwa.states[target_id];
                  let is_final = target_state.final_weight.is_some();
                  let has_outgoing = target_state.transitions.default.is_some() || !target_state.transitions.exceptions.is_empty();

                  if is_final && has_outgoing {
                      let new_state = DWAState {
                          weight: target_state.weight.clone(),
                          final_weight: target_state.final_weight.clone(),
                          ..DWAState::default()
                      };
                      let new_id = dwa.states.add_state();
                      dwa.states[new_id] = new_state;
                      updates.push((from_id, neg_code, new_id));
                  }
              }
          }

          for (from_id, neg_code, new_target_id) in updates {
              let from_state = &mut dwa.states[from_id];
              from_state.transitions.exceptions.insert(neg_code, new_target_id);
          }
      }

      /// Iteratively processes `A -(-x)-> B -(x)-> C` patterns. This is interpreted as an
      /// effective epsilon-transition from A to C. We realize this by merging C's behaviors
      /// (weights, finality, transitions) into A, gated by the weight of the `A -> B -> C` path.
      /// This process is repeated until no more changes occur.
      fn propagate_cancellations(dwa: &mut DWA) {
          let mut changed = true;
          while changed {
              changed = false;

              let mut weight_updates: BTreeMap<StateID, Weight> = BTreeMap::new();
              let mut final_weight_updates: BTreeMap<StateID, Weight> = BTreeMap::new();
              let mut transition_additions = Vec::new();

              for a_id in 0..dwa.states.len() {
                  let a_state = dwa.states[a_id].clone();
                  for (&neg_code, &b_id) in &a_state.transitions.exceptions {
                      if neg_code >= 0 {
                          continue;
                      }
                      let pos_code = -neg_code;

                      if let Some(&c_id) = dwa.states[b_id].transitions.get(pos_code) {
                          let w_ab = a_state.trans_weights_exceptions.get(&neg_code).unwrap();
                          let w_bc = dwa.states[b_id]
                              .trans_weights_exceptions
                              .get(&pos_code)
                              .or(dwa.states[b_id].trans_weight_default.as_ref())
                              .unwrap();
                          let path_weight = w_ab & w_bc;

                          let c_state = dwa.states[c_id].clone();

                          // Aggregate weight updates
                          let weight_to_add = &path_weight & &c_state.weight;
                          if !weight_to_add.is_empty() {
                              weight_updates.entry(a_id).or_default() |= &weight_to_add;
                          }

                          if let Some(fw) = &c_state.final_weight {
                              let final_weight_to_add = &path_weight & fw;
                              if !final_weight_to_add.is_empty() {
                                  final_weight_updates.entry(a_id).or_default() |= &final_weight_to_add;
                              }
                          }

                          // Aggregate transition updates
                          if let Some(def_target) = c_state.transitions.default {
                              let w = c_state.trans_weight_default.as_ref().unwrap();
                              transition_additions.push((a_id, None, def_target, &path_weight & w));
                          }
                          for (&on, &target) in &c_state.transitions.exceptions {
                              let w = c_state.trans_weights_exceptions.get(&on).unwrap();
                              transition_additions.push((a_id, Some(on), target, &path_weight & w));
                          }
                      }
                  }
              }

              // Apply updates
              for (id, w) in weight_updates {
                  let old_len = dwa.states[id].weight.len();
                  dwa.states[id].weight |= &w;
                  if dwa.states[id].weight.len() != old_len {
                      changed = true;
                  }
              }
              for (id, fw) in final_weight_updates {
                  let state = &mut dwa.states[id];
                  let old_len = state.final_weight.as_ref().map_or(0, |w| w.len());
                  if let Some(existing_fw) = &mut state.final_weight {
                      *existing_fw |= &fw;
                  } else {
                      state.final_weight = Some(fw);
                  }
                  let new_len = state.final_weight.as_ref().map_or(0, |w| w.len());
                  if old_len != new_len {
                      changed = true;
                  }
              }

              if !transition_additions.is_empty() {
                  changed = true;
              }
          }
      }

      /// After propagation, any remaining negative transitions that do not point to a final state
      /// are considered invalid paths and are removed.
      fn remove_internal_negatives(dwa: &mut DWA) {
          for state in &mut dwa.states.0 {
              let to_remove: Vec<i16> = state
                  .transitions
                  .exceptions
                  .iter()
                  .filter(|(&k, &v)| k < 0 && dwa.states[v].final_weight.is_none())
                  .map(|(k, _)| *k)
                  .collect();

              for k in to_remove {
                  state.transitions.exceptions.remove(&k);
                  state.trans_weights_exceptions.remove(&k);
              }
          }
      }
