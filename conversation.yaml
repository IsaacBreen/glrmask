          #[test]
          fn test_ei_chaining_try_then_else() {
              let source: TestNodeEI = Arc::new(Mutex::new(TestTrieEI::new("source".to_string())));
              let dest1: TestNodeEI = Arc::new(Mutex::new(TestTrieEI::new("dest1".to_string())));

