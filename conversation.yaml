              let mut i = 0;
              let simplified_roots = simplify_gss_forest(&roots);
              for (tokenizer_state_id, glr_state) in self.state.iter_mut() {
                  for active_state in glr_state.active_states.values_mut() {
                      active_state.stack = simplified_roots[i].clone();
                      i += 1;
                  }
              }

