               if let BitsetRepr::Dense { lower_bound_count, upper_bound_count, .. } = &set.inner {
                   assert_eq!(*lower_bound_count, SPARSE_TO_DENSE_THRESHOLD);
                   assert_eq!(*upper_bound_count, SPARSE_TO_DENSE_THRESHOLD);
               }
          }

