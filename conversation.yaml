          // This is ambiguous: (id + id) * id or id + (id * id)
          // GLR should accept this.
           let productions = vec![
              prod("S'", vec![nt("E"), t("$")]), // Start
              prod("E", vec![nt("E"), t("+"), nt("E")]),
              prod("E", vec![nt("E"), t("*"), nt("E")]),
