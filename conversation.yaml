                              None
                          } else if !keep_acc && keep_empty {
                              let new_b = new_branch(IHashMap::new(), new_empty_opt);
                              Some(try_promote(&new_b))
                          } else {
                              let new_i = new_interface(i.children.clone(), new_acc_opt.unwrap(), new_empty_opt);
                              Some(try_promote(&new_i))
                          }
                      }
