      #[derive(Clone, Debug, PartialEq, Eq)]
      pub struct RegexState<'a> {
          pub regex: &'a Regex,
          pub position: usize,
          pub current_state: usize,
          pub matches: BTreeMap<GroupID, usize>, // Publicly accessible matches (GroupID to position)
          pub done: bool,
