      // --- Boolean Iterator ---
      pub struct BoolIter<'a> {
          bitset: &'a HybridBitset,
          current_idx: usize,
          max_idx_to_iterate: usize, // Inclusive
      }

      impl<'a> Iterator for BoolIter<'a> {
          type Item = bool;

          fn next(&mut self) -> Option<Self::Item> {
              if self.current_idx > self.max_idx_to_iterate {
