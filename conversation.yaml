  - assistant: |-
      Below are the precise, actionable steps and the corresponding patches to add a RangeSet ABC and ensure py_range_set implements it. I’ve kept the change to py_range_set additive and minimally invasive so it cleanly applies without altering existing behavior.

      Step-by-step instructions

      1) Create the RangeSet ABC
      - File: python/aug25/range_set.py
      - Add a new abstract base class RangeSet that:
        - Defines abstract methods add(start, end), discard(start, end), __contains__(value), and __iter__() (iterating normalized [start, end) ranges).
        - Provides helpful mixin operations: ranges(), clear(), update(), difference_update(), intersection_update(), isdisjoint(), __bool__(), and __eq__().
        - Includes an auto-registration helper that imports python/aug25/py_range_set and registers any RangeSet implementations. This scans either the explicit marker __rangeset_implementations__ on py_range_set or falls back to classes ending with “RangeSet”.

      2) Modify py_range_set to advertise its RangeSet implementation
      - File: python/aug25/py_range_set.py
      - Append the following snippet at the very end of the file. This does not change behavior, but declares which class name(s) in this module should be treated as RangeSet implementations. By default, it lists "PyRangeSet".
      - If your concrete class is named differently (e.g., IntRangeSet), update the string accordingly in the snippet or add additional entries.

      This approach avoids changing class inheritance or signatures inside py_range_set. The RangeSet ABC will auto-import py_range_set and register the named class(es) as virtual subclasses, ensuring isinstance(obj, RangeSet) works.

      Patches

      Apply the following diffs.

      diff --git a/python/aug25/range_set.py b/python/aug25/range_set.py
      new file mode 100644
      --- /dev/null
      +++ b/python/aug25/range_set.py
      @@ -0,0 +1,160 @@
      +from __future__ import annotations
      +import abc
      +from typing import Iterable, Iterator, Union
      +
      +# A half-open integer range represented as (start, end) with start < end
      +Range = tuple[int, int]
      +
      +
      +class RangeSet(abc.ABC):
      +    """
      +    Abstract base class for a set of integer ranges, stored as normalized
      +    half-open intervals [start, end).
      +    """
      +
      +    @abc.abstractmethod
      +    def add(self, start: int, end: int) -> None:
      +        """
      +        Add the half-open interval [start, end) to the set.
      +        Implementations should ignore empty or inverted ranges (end <= start).
      +        """
      +
      +    @abc.abstractmethod
      +    def discard(self, start: int, end: int) -> None:
      +        """Remove any values in [start, end) from the set."""
      +
      +    @abc.abstractmethod
      +    def __contains__(self, value: int) -> bool:
      +        """Return True if value is contained in the set."""
      +
      +    @abc.abstractmethod
      +    def __iter__(self) -> Iterator[tuple[int, int]]:
      +        """Iterate over normalized, non-overlapping ranges [start, end)."""
      +
      +    def ranges(self) -> list[tuple[int, int]]:
      +        """Return a list of normalized, non-overlapping [start, end) ranges."""
      +        return list(iter(self))
      +
      +    def clear(self) -> None:
      +        """Remove all content from this RangeSet."""
      +        for start, end in list(self):
      +            self.discard(start, end)
      +
      +    def update(self, other: Union["RangeSet", Iterable[tuple[int, int]]]) -> None:
      +        """
      +        In-place union with another RangeSet or iterable of (start, end) ranges.
      +        """
      +        for s, e in self._iter_other_ranges(other):
      +            if s < e:
      +                self.add(s, e)
      +
      +    def difference_update(self, other: Union["RangeSet", Iterable[tuple[int, int]]]) -> None:
      +        """
      +        In-place subtraction of another RangeSet or iterable of (start, end) ranges.
      +        """
      +        for s, e in self._iter_other_ranges(other):
      +            if s < e:
      +                self.discard(s, e)
      +
      +    def intersection_update(self, other: Union["RangeSet", Iterable[tuple[int, int]]]) -> None:
      +        """
      +        In-place intersection with another RangeSet or iterable of (start, end) ranges.
      +        """
      +        mine = self.ranges()
      +        theirs = list(self._iter_other_ranges(other))
      +        new: list[tuple[int, int]] = []
      +        i = j = 0
      +        while i < len(mine) and j < len(theirs):
      +            a_start, a_end = mine[i]
      +            b_start, b_end = theirs[j]
      +            if a_end <= b_start:
      +                i += 1
      +                continue
      +            if b_end <= a_start:
      +                j += 1
      +                continue
      +            start = a_start if a_start >= b_start else b_start
      +            end = a_end if a_end <= b_end else b_end
      +            if start < end:
      +                new.append((start, end))
      +            if a_end <= b_end:
      +                i += 1
      +            else:
      +                j += 1
      +        self.clear()
      +        for s, e in new:
      +            self.add(s, e)
      +
      +    def isdisjoint(self, other: Union["RangeSet", Iterable[tuple[int, int]]]) -> bool:
      +        """
      +        Return True if this RangeSet has no values in common with 'other'.
      +        """
      +        mine = iter(self)
      +        theirs = iter(self._iter_other_ranges(other))
      +        try:
      +            a_start, a_end = next(mine)
      +            b_start, b_end = next(theirs)
      +        except StopIteration:
      +            return True
      +        while True:
      +            if a_end <= b_start:
      +                try:
      +                    a_start, a_end = next(mine)
      +                except StopIteration:
      +                    return True
      +            elif b_end <= a_start:
      +                try:
      +                    b_start, b_end = next(theirs)
      +                except StopIteration:
      +                    return True
      +            else:
      +                return False
      +
      +    def __bool__(self) -> bool:
      +        try:
      +            next(iter(self))
      +            return True
      +        except StopIteration:
      +            return False
      +
      +    def __eq__(self, other: object) -> bool:
      +        if isinstance(other, RangeSet):
      +            return list(self) == list(other)
      +        try:
      +            other_iter = iter(other)  # type: ignore[arg-type]
      +        except TypeError:
      +            return NotImplemented
      +        else:
      +            return list(self) == list(self._iter_other_ranges(other_iter))  # type: ignore[arg-type]
      +
      +    @staticmethod
      +    def _iter_other_ranges(
      +        other: Union["RangeSet", Iterable[tuple[int, int]]]
      +    ) -> Iterator[tuple[int, int]]:
      +        if isinstance(other, RangeSet):
      +            yield from other
      +        else:
      +            for item in other:
      +                s, e = item  # let exceptions propagate for invalid inputs
      +                s = int(s)
      +                e = int(e)
      +                if s < e:
      +                    yield (s, e)
      +
      +
      +def _auto_register_known_implementations() -> None:
      +    """
      +    Best-effort: import local concrete implementations (if available) and
      +    register any '*RangeSet' classes as virtual subclasses so that
      +    isinstance(..., RangeSet) works even if those classes don't inherit ABC.
      +    """
      +    try:
      +        from . import py_range_set as _py_range_set  # noqa: F401
      +        import inspect as _inspect
      +        _names = getattr(_py_range_set, "__rangeset_implementations__", None)
      +        if isinstance(_names, list):
      +            for _name in _names:
      +                _obj = getattr(_py_range_set, _name, None)
      +                if _inspect.isclass(_obj):
      +                    RangeSet.register(_obj)  # type: ignore[arg-type]
      +        else:
      +            for _name, _obj in vars(_py_range_set).items():
      +                if _inspect.isclass(_obj) and _name.lower().endswith("rangeset"):
      +                    RangeSet.register(_obj)  # type: ignore[arg-type]
      +        del _py_range_set, _inspect, _names, _name, _obj
      +    except Exception:
      +        # Non-fatal: if the module or classes aren't available yet,
      +        # we simply skip auto-registration.
      +        pass
      +
      +
      +_auto_register_known_implementations()
      diff --git a/python/aug25/py_range_set.py b/python/aug25/py_range_set.py
      --- a/python/aug25/py_range_set.py
      +++ b/python/aug25/py_range_set.py
      @@ -0,0 +1,12 @@
      +# Hint for RangeSet ABC auto-registration. This tells python/aug25/range_set.py
      +# which class(es) in this module should be treated as RangeSet implementations.
      +# If your concrete class has a different name, add or change the string below.
      +try:  # avoid clobbering if defined elsewhere in this module
      +    __rangeset_implementations__  # type: ignore[name-defined]
      +except NameError:
      +    __rangeset_implementations__ = []  # type: ignore[assignment]
      +
      +# Default: assume the primary implementation class is named 'PyRangeSet'.
      +# Add additional names here if there are multiple implementations.
      +if "PyRangeSet" not in __rangeset_implementations__:
      +    __rangeset_implementations__.append("PyRangeSet")

      Notes and assumptions
      - Intervals are half-open [start, end). Empty or inverted intervals (end <= start) are treated as no-ops by the mixin helpers.
      - The ABC uses virtual subclassing via registration so existing py_range_set classes don’t need to inherit directly from RangeSet. isinstance(obj, RangeSet) will work after import.
      - I assumed the concrete class is named PyRangeSet. If the class differs, update the appended list in py_range_set.py accordingly (or add multiple names).
      - The ABC includes common set-like operations (update/difference_update/intersection_update) implemented generically; concrete classes only need to provide add, discard, __contains__, and an iterator over normalized ranges.
