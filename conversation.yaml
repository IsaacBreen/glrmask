                                  non_pop.push((ek.clone(), *c_idx, ev.clone()));
                              } else if !matches!(ek, Intermediate2Trie3EdgeKey::Push(_)) {
                                  splittable.push((ek.clone(), *c_idx, ev.clone()));
                              }
                          }
