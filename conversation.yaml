      Things to do:
      - parse table -> per-terminal below zero charactarization
      - per-terminal below zero parsing charactarization -> per-terminal augmented NWA (no weights yet)
      - per-terminal NWA + precompute1 terminal trie -> full NWA (straight to DWA)
      - full NWA -> precompute3 trie
      I'm going to implement this in steps.

      ---

      **parse table -> per-terminal below zero charactarization**

      **Structs:**
      Reduce charactarization: charactarizes the behaviour of the parser after reducing by a given nonterminal
      - terminal
      - nonterminal
      - vec (state ID, pop n, nonterminal) of reveal-and-rereduces
          - 'reveal' refers to the state 'revealed' by the reduce
          - represents revealing a given state, and reducing with pop n by the given nonterminal
          - The reduce doesn't occur from the revealed state. The revealed state doesn't do shift/reduce, it does goto. So, we can reduce from the subsequent goto state. But we don't care what the goto state actually *is*. Only that *some* goto eventually leads to a reduce. And we don't care about the reduce's actual pop n, but rather the distance below the revealed state that it popped.
          - In theory, since there are no 0-reductions in the grammar, this should always be n-2 for a reduce of pop n. Also, we must eventually must either reduce below the revealed state or must shift from the state above it. Which explains the next field...
      - vec (state ID, state ID, state ID) of reveal-goto-shift escapes
          - represents revealing the given state, going to the given state, and shifting to the given state
          - 'escape' refers to the fact that this terminates the parser *step*. To parse further, we'd want to know the next terminal.
          - As explained above, we can't shift straight from the revealed state; the revealed state represents the state revealed after a reduce, and we can't shift straight after reduce -- we must first perform a goto.

      Below-bottom charactarization:
      - terminal
      - vec (state ID, state ID) of initial shifts
          - if the given state ID is this, perform an immediate shift
      - vec (state ID, pop n, nonterminal) of initial reduces
          - if the given state ID is this, perform an immediate reduce
      - vec of reduce charactarizations


      **Computing it:**
      Choose a terminal. Create a below-bottom charactarization for each.
      Choose an initial state.
      Loop over the actions in that initial state - optional shift and zero or more reduces. Computing the initial actions is simple (and fairly obvious):
      - If there's a shift, add an initial shift from the initial state to the shift state to the below-bottom charactarization.
      - For each reduce, add a reduce from the initial state by the reduce's pop n-1 with the reduce's nonterminal.
          - Minus one to account for popping the revealed state -- see below. (Although this kind of contradicts the usual 'reduce by n' meaning in LR theory...)

      Now for the vec of reduce charactarizations.
      Choose a nonterminal. Create a reduce charactarization for it.
      Choose an initial 'revealed' state. It can be any state that has a goto for this nonterminal.
      Create a queue of goto states to process.
      To initialize the queue, use the goto state for chosen nonterminal under the revealed state.
      (Implementation node: no need to build an actual stack; just hold the revealed state in one variable and the goto state in another.)
      Look at the goto state for shift/reduce actions.
      - If there's a shift, add an escape for the revealed state, the goto state, and the shift state.
      - For each reduce
          - if the reduce's pop n = 1, look for a goto under the revealed state for the reduce's nonterminal and add it to the queue.
          - if the reduce's pop n > 1, add a reveal-and-rereduce with the revealed state ID, the reduce's pop n-2 , and 
              - Why n-2 and not just n? To account for the revealed and goto states that sit on top of the stack at the time the reduce from the goto state happens. The reduce immediately pops through the goto and revealed states, thus the remaining number to pop is two less than the reduce action's stated pop n.
              - So, the pop n in a reduce-and-rereduce entry refers to the *additional* amount to pop starting from *underneath* the revealed state, i.e. kind of we take it as a given that we pop the revealed state, and then potentialy pop further.
              - This reflects the philosophy of the below-bottom charactarization design; it describes what actions occur when, with as little extra fluff as possible. We don't care what the goto states are, what happens on top of the revealed state. There may be lots of reduce-goto stuff. We only care about when we eventually *exit* from a reduce-goto loop into a shift, or when we *exit* into another reduce below the bottom of the stack.

      That's it!
      Write this in full. Add it to a separate script in `src/precompute4/`.
      ```bash
      chatllm send --init --code-completion-model cp --attach src/glr/*.rs --apply git-llm --model cp --paste
      ```
      ...Done!

      ---

      **per-terminal below zero charactarization -> per-terminal augmented NWA**

      Convert each below zero charactarization into a NWA.
      This could just be a NDA, since we don't acutally use weights at this point. But we'll need to use weights eventually anyway.

      **Structs:**
      Augmented NWA:
      - terminal
      - nwa
      - map NWA state -> set of vecs of parser state IDs: an end map


      Create an initial NWA state.
      Create an end NWA state.
      Create one NWA state per nonterminal.

      For transitions from the initial NWA state, look at the inital shifts/reduces.
      - For each initial shift, create a transition (from the initial NWA state) on the initial shift's initial (parser) state to the end NWA state. Add to the end map a stack with the initial shift's initial state and the shift state (like a parser stack would be if we started in the initial state and shifted).
      - For each initial reduce, create a sequence of transitions on the initial reduce's revealed state to newly-created intermediate NWA states, one for each pop n. The final transition goes to the NWA state for the initial reduce's nonterminal. (If pop n=0, it just goes straight there, no intermediate transitions.)
          - We could minimize the number of intermediate states required by sharing somehow... But don't bother yet. Want to keep the initial implementation as simple as possible.

      For transitions from the nonterminal NWA states, look at the reduce charactarizations.
      - For each reveal-and-rereduce, create a sequence of transitions just like we did for each initial reduce.
      - For each reveal-goto-shift, create a transition to the end NWA state just like we did for the initial shifts. The only difference is that for the stack we add to the end map, there'll be *three* items, not two: the revealed state, the goto state, and the shift state. Again, stacked like they would be in a parser stack after performing a goto from the revealed state and then shifting.


      That's it!
      Implement this step in full.
      Add it to a separate script in `src/precompute4`.
