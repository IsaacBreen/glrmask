              Self { end: false, live_tokens: LLMTokenBV::ones(internal_max_llm_token_id + 1) }
          }

          pub(crate) fn internal() -> Self {
              timeit!("PrecomputedNodeContents::internal", {});
              Self { end: false, live_tokens: LLMTokenBV::zeros() }
          }

