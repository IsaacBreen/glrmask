                  .filter_map(|symbol| {
                      if let Symbol::NonTerminal(nt) = symbol {
                          Some(nt)
                      } else {
                          None
                      }
                  })
                  .collect();
              nt_reachables.insert(&prod.lhs, rhs_nonterms);
          }

          loop {
              let mut changed = false;
              for (nt, reachables) in nt_reachables.clone() {
                  let old_len = nt_reachables[nt].len();
