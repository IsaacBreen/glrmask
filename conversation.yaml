                          .and_then(|n| BTreeMap::<GroupID, usize>::from_json(n))?;
                      Ok(FinalStateReport { position, matches })
                  }
                  _ => Err("Expected JSONNode::Object for FinalStateReport".to_string()),
              }
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct ExecutionResult {
