                          } else {
                              format!("{}..={}", start, end)
                          }
                      })
                      .collect();

                  if total_ranges > MAX_RANGES_TO_SHOW {
                      parts.push(format!("... ({} more ranges)", total_ranges - MAX_RANGES_TO_SHOW));
