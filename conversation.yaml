          }

          LeveledGSS apply_and_prune(
              const std::function<std::shared_ptr<Acc>(const std::shared_ptr<Acc>&)>& mutator,
              std::unordered_map<std::uintptr_t, std::shared_ptr<Acc>>* acc_cache_ptr = nullptr
