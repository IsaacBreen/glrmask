                          if v >= states.len() { continue; }
                          let mut prop = &base & w_eps;
                          if prop.is_empty() { continue; }
                          prop &= &fut[v];
                          if prop.is_empty() { continue; }
                          match out.entry(v) {
                              Entry::Occupied(mut e) => {
                                  let old = e.get_mut();
                                  let nu = &*old | &prop;
                                  if nu != *old {
