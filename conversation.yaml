              let stored_trie_god = StoredTrieGodWrapper::new();
              let stored_trie_node1 = StoredPrecomputeNodeIndex::new(stored_trie_god.insert(StoredPrecomputeNode::new(PrecomputedNodeContents::internal())));
              let mut acc1 = empty_acc();
