                          # Build 'all' parents and mapping sid -> [parents]
                          all_parents = [p for _, p in peeks]
                          if not all_parents:
                              continue
                          sid_to_parents: DefaultDict[int, List[ffi.GSSNode]] = defaultdict(list)
                          for sid_val, parent_node in peeks:
