          ExprGroup {
              expr: expr.into(),
              is_non_greedy: false,
          }
      }

      pub fn eps() -> Expr {
          Expr::Epsilon
      }

      pub fn _seq(exprs: Vec<Expr>) -> Expr {
          Expr::Seq(exprs)
      }

      pub fn _choice(exprs: Vec<Expr>) -> Expr {
          Expr::Choice(exprs)
      }

      #[macro_export]
      macro_rules! choice {
          ($($expr:expr),* $(,)?) => {
              $crate::finite_automata::Expr::Choice(vec![$($expr.into()),*])
          };
      }

      #[macro_export]
      macro_rules! seq {
          ($($expr:expr),* $(,)?) => {
              $crate::finite_automata::Expr::Seq(vec![$($expr.into()),*])
          };
      }

      #[macro_export]
      macro_rules! groups {
          ($($expr:expr),* $(,)?) => {
              $crate::finite_automata::groups(vec![$($expr.into()),*])
          };
      }

      pub fn groups(groups: Vec<ExprGroup>) -> ExprGroups {
          ExprGroups { groups }
      }

      pub fn greedy_group<T: Into<ExprGroup>>(expr: T) -> ExprGroup {
          expr.into()
      }

      pub fn non_greedy_group<T: Into<ExprGroup>>(expr: T) -> ExprGroup {
          let mut group = expr.into();
          group.is_non_greedy = true;
          group
      }

      impl Display for NFA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              f.write_str("Regex State NFA:\n")?;

              for (state_index, state) in self.states.iter().enumerate() {
                  f.write_str(&format!("State {}:\n", state_index))?;

                  for &(transition_u8, next_state) in &state.transitions {
                      f.write_str(&format!(
                          "  - '{}': {}\n",
                          transition_u8 as char, next_state
                      ))?;
                  }

                  for next_state in &state.epsilon_transitions {
                      f.write_str(&format!("  - Epsilon: {}\n", next_state))?;
                  }

                  if !state.finalizers.is_empty() {
                      f.write_str(&format!("  - Finalizers: {:?}\n", state.finalizers))?;
                  }

                  if !state.non_greedy_finalizers.is_empty() {
                      f.write_str(&format!(
                          "  - Non-Greedy Finalizers: {:?}\n",
                          state.non_greedy_finalizers
                      ))?;
                  }
              }

              Ok(())
          }
      }

      impl Display for DFA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              f.write_str("Regex State DFA:\n")?;

              for (state_index, state) in self.states.iter().enumerate() {
                  f.write_str(&format!("State {}:\n", state_index))?;

                  for (transition_u8, next_state) in &state.transitions {
                      f.write_str(&format!(
                          "  - {} ({:?}): {}\n",
                          transition_u8, transition_u8 as char, next_state
                      ))?;
                  }

                  if !state.finalizers.is_empty() {
                      f.write_str(&format!("  - Finalizers: {:?}\n", state.finalizers))?;
                  }

                  if !state.possible_future_group_ids.is_empty() {
                      f.write_str(&format!(
                          "  - Possible Future Group IDs: {:?}\n",
                          state.possible_future_group_ids
                      ))?;
                  }

                  if !state.group_id_to_u8set.is_empty() {
                      f.write_str("  - Group ID to U8Set:\n")?;
                      for (group_id, u8set) in &state.group_id_to_u8set {
                          f.write_str(&format!("    - Group {}: {}\n", group_id, u8set))?;
                      }
                  }
              }

              Ok(())
          }
      }

      impl Display for Regex {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              write!(f, "{}", self.dfa)
          }
      }

      impl NFAState {
          pub fn new() -> NFAState {
              NFAState {
                  transitions: Vec::new(),
                  epsilon_transitions: Vec::new(),
                  finalizers: BTreeSet::new(),
                  non_greedy_finalizers: BTreeSet::new(),
              }
          }
      }

      fn print_memory_usage(label: &str) {
          if let Some(usage) = memory_stats() {
              let physical_mem_mb = usage.physical_mem / 1024 / 1024;
              crate::debug!(2, "Memory usage at '{}': Physical: {} MB", label, physical_mem_mb);
          } else {
              crate::debug!(2, "Couldn't get memory usage at '{}'", label);
          }
      }

      impl ExprGroups {
          pub fn build(self) -> Regex {
              print_memory_usage("Start of Regex build");
              crate::debug!(2, "Building NFA...");
              let start = std::time::Instant::now();
              let nfa = self.build_nfa();
              crate::debug!(2, "Built NFA in {:.2?}", start.elapsed());
              print_memory_usage("After NFA build");
              crate::debug!(2, "Converting NFA to DFA...");
              let start = std::time::Instant::now();
              let mut dfa = nfa.to_dfa();
              crate::debug!(2, "Converted NFA to DFA in {:.2?}", start.elapsed());
              print_memory_usage("After NFA to DFA conversion");
              crate::debug!(2, "Minimizing DFA...");
              let start = std::time::Instant::now();
              dfa.minimize();
              crate::debug!(2, "Minimized DFA in {:.2?}", start.elapsed());
              print_memory_usage("After DFA minimization");
              crate::debug!(2, "Done!");
              Regex { dfa }
          }

          fn build_nfa(self) -> NFA {
              let mut nfa = NFA {
                  states: vec![NFAState::new()],
                  start_state: 0,
              };

              let mut cache: HashMap<usize, (usize, usize)> = HashMap::new();
              for (group, ExprGroup { expr, is_non_greedy }) in self.groups.into_iter().enumerate() {
                  let group_start_state = nfa.add_state();
                  nfa.add_epsilon_transition(nfa.start_state, group_start_state);
                  let end_state =
                      Expr::handle_expr_cached(expr, &mut nfa, group_start_state, &mut cache);
                  if is_non_greedy {
                      nfa.states[end_state].finalizers.insert(group);
                      // Additionally, track that this finalizer is non-greedy
                      nfa.states[end_state]
                          .non_greedy_finalizers
                          .insert(group);
                  } else {
                      nfa.states[end_state].finalizers.insert(group);
                  }
              }

              nfa
          }
      }

      impl Expr {
          pub fn build(self) -> Regex {
              ExprGroups {
                  groups: vec![ExprGroup {
                      expr: self,
                      is_non_greedy: false,
                  }],
              }
              .build()
          }

          fn handle_expr_cached(
              expr: Expr,
              nfa: &mut NFA,
              mut current_state: usize,
              cache: &mut HashMap<usize, (usize, usize)>,
          ) -> usize {
              match expr {
                  Expr::U8Seq(u8s) => {
                      let mut next_state = current_state;
                      for c in u8s {
                          let new_state = nfa.add_state();
                          nfa.add_transition(next_state, c, new_state);
                          next_state = new_state;
                      }
                      next_state
                  }
                  Expr::U8Class(u8s) => {
                      let new_state = nfa.add_state();
                      for ch in u8s.iter() {
                          nfa.add_transition(current_state, ch, new_state);
                      }
                      new_state
                  }
                  Expr::Shared(inner) => {
                      let key = Arc::as_ptr(&inner) as usize;
                      if let Some(&(entry, end)) = cache.get(&key) {
                          // Reuse compiled subgraph by epsilon to entry
                          nfa.add_epsilon_transition(current_state, entry);
                          end
                      } else {
                          // Create a dedicated entry for this shared fragment
                          let entry = nfa.add_state();
                          let end = Self::handle_expr_cached((*inner).clone(), nfa, entry, cache);
                          cache.insert(key, (entry, end));
                          nfa.add_epsilon_transition(current_state, entry);
                          end
                      }
                  }
                  Expr::Quantifier(expr, quantifier_type) => match quantifier_type {
                      QuantifierType::ZeroOrMore => {
                          let entry_state = nfa.add_state();
                          nfa.add_epsilon_transition(current_state, entry_state);
                          let body_end_state = Self::handle_expr_cached(*expr, nfa, entry_state, cache);
                          let exit_state = nfa.add_state();
                          nfa.add_epsilon_transition(entry_state, exit_state); // 0 times
                          nfa.add_epsilon_transition(body_end_state, entry_state); // loop
                          nfa.add_epsilon_transition(body_end_state, exit_state); // exit loop
                          exit_state
                      }
                      QuantifierType::OneOrMore => {
                          let entry_state = current_state;
                          let body_end_state = Self::handle_expr_cached(*expr, nfa, entry_state, cache);
                          let exit_state = nfa.add_state();
                          nfa.add_epsilon_transition(body_end_state, entry_state); // loop
                          nfa.add_epsilon_transition(body_end_state, exit_state); // exit loop
                          exit_state
                      }
                      QuantifierType::ZeroOrOne => {
                          let body_end_state =
                              Self::handle_expr_cached(*expr, nfa, current_state, cache);
                          let exit_state = nfa.add_state();
                          nfa.add_epsilon_transition(current_state, exit_state); // skip
                          nfa.add_epsilon_transition(body_end_state, exit_state); // take
                          exit_state
                      }
                  },
                  Expr::Choice(exprs) => {
                      // New end state for choice
                      let choice_end_state = nfa.add_state();

                      for expr in exprs {
                          // Process the expr and get its end state
                          let expr_end_state = Self::handle_expr_cached(expr, nfa, current_state, cache);

                          // Connect the end state of the expr to the end state of the choice
                          nfa.add_epsilon_transition(expr_end_state, choice_end_state);
                      }

                      // The end state of the choice becomes the new current state
                      choice_end_state
                  }
                  Expr::Seq(exprs) => {
                      for expr in exprs {
                          current_state = Self::handle_expr_cached(expr, nfa, current_state, cache);
                      }
                      current_state
                  }
                  Expr::Epsilon => current_state,
              }
          }

          fn handle_expr(expr: Expr, nfa: &mut NFA, mut current_state: usize) -> usize {
              let mut cache: HashMap<usize, (usize, usize)> = HashMap::new();
              Self::handle_expr_cached(expr, nfa, current_state, &mut cache)
          }
      }

      impl NFA {
          pub fn add_state(&mut self) -> usize {
              let new_index = self.states.len();
              self.states.push(NFAState::new());
              new_index
          }

          pub fn add_transition(&mut self, from: usize, on_u8: u8, to: usize) {
              self.states[from].transitions.push((on_u8, to));
          }

          pub fn add_epsilon_transition(&mut self, from: usize, to: usize) {
              self.states[from].epsilon_transitions.push(to);
          }

          /// Epsilon-closure of a set of NFA states.
          fn epsilon_closure_set<I>(&self, states: I) -> BTreeSet<usize>
          where
              I: IntoIterator<Item = usize>,
          {
              let mut closure = BTreeSet::new();
              let mut stack = Vec::new();

              for s in states {
                  if closure.insert(s) {
                      stack.push(s);
                  }
              }

              while let Some(state) = stack.pop() {
                  for &next in &self.states[state].epsilon_transitions {
                      if closure.insert(next) {
                          stack.push(next);
                      }
                  }
              }

              closure
          }

          fn epsilon_closure(&self, state: usize) -> BTreeSet<usize> {
              self.epsilon_closure_set(std::iter::once(state))
          }

          fn compute_epsilon_closures(&self) -> Vec<BTreeSet<usize>> {
              (0..self.states.len())
                  .map(|state| self.epsilon_closure(state))
                  .collect()
          }

          pub fn to_dfa(self) -> DFA {
              let mut dfa_states: Vec<DFAState> = Vec::new();
              let mut dfa_state_map: BTreeMap<FrozenSet<usize>, usize> = BTreeMap::new();
              let mut worklist: Vec<FrozenSet<usize>> = Vec::new();

              // Compute epsilon-closure of the NFA start state and use it as the DFA start state.
              let start_closure = self.epsilon_closure_set(std::iter::once(self.start_state));
              let start_state_set = FrozenSet::from_iter(start_closure.iter().cloned());
              worklist.push(start_state_set.clone());
              dfa_state_map.insert(start_state_set.clone(), 0);

              // Initialize the first DFA state.
              let mut finalizers = BTreeSet::new();
              let mut non_greedy_finalizers = BTreeSet::new();
              for &state in start_state_set.iter() {
                  finalizers.extend(self.states[state].finalizers.iter().cloned());
                  non_greedy_finalizers.extend(self.states[state].non_greedy_finalizers.iter().cloned());
              }

              dfa_states.push(DFAState {
                  transitions: CharTransitions::new(),
                  finalizers,
                  possible_future_group_ids: BTreeSet::new(), // Will be computed later
                  group_id_to_u8set: BTreeMap::new(),         // Will be computed later
              });

              while let Some(current_set) = worklist.pop() {
                  let current_dfa_state = *dfa_state_map
                      .get(&current_set)
                      .expect("DFA state set not found in map");
                  let mut transition_map: BTreeMap<u8, BTreeSet<usize>> = BTreeMap::new();

                  // For each NFA state in the current DFA state, collect outgoing transitions.
                  for &state in current_set.iter() {
                      for &(input, next_state) in &self.states[state].transitions {
                          transition_map
                              .entry(input)
                              .or_insert_with(BTreeSet::new)
                              .insert(next_state);
                      }
                  }

                  // For each input symbol, compute the epsilon-closure of the resulting state set.
                  for (&input_u8, next_states) in &transition_map {
                      if next_states.is_empty() {
                          continue;
                      }

                      // epsilon-closure(move(S, input_u8))
                      let closure = self.epsilon_closure_set(next_states.iter().cloned());
                      let frozen_closure = FrozenSet::from_iter(closure.iter().cloned());

                      // If this set of states is new, add it as a new DFA state.
                      let next_dfa_state = if let Some(&existing_state) = dfa_state_map.get(&frozen_closure)
                      {
                          existing_state
                      } else {
                          let new_state_index = dfa_states.len();
                          dfa_state_map.insert(frozen_closure.clone(), new_state_index);
                          worklist.push(frozen_closure.clone());

                          // Compute finalizers for the new DFA state
                          let mut new_finalizers = BTreeSet::new();
                          let mut new_non_greedy_finalizers = BTreeSet::new();
                          for &state in frozen_closure.iter() {
                              new_finalizers.extend(self.states[state].finalizers.iter().cloned());
                              new_non_greedy_finalizers
                                  .extend(self.states[state].non_greedy_finalizers.iter().cloned());
                          }

                          dfa_states.push(DFAState {
                              transitions: CharTransitions::new(),
                              finalizers: new_finalizers,
                              possible_future_group_ids: BTreeSet::new(), // Will be computed later
                              group_id_to_u8set: BTreeMap::new(), // Will be computed later
                          });

                          new_state_index
                      };

                      // Insert the transition into the DFA state
                      dfa_states[current_dfa_state]
                          .transitions
                          .insert(input_u8, next_dfa_state);
                  }
              }

              let mut dfa = DFA {
                  states: dfa_states,
                  start_state: 0,
                  non_greedy_finalizers: BTreeSet::new(),
              };

              for state in &self.states {
                  dfa.non_greedy_finalizers
                      .extend(state.non_greedy_finalizers.iter().cloned());
              }

              dfa.compute_possible_future_group_ids();
              dfa.compute_group_id_to_u8set();

              dfa
          }
      }

      impl DFA {
          pub fn compute_possible_future_group_ids(&mut self) {
              // Initialize possible_future_group_ids as empty. We only want to include
              // group IDs reachable via *future* transitions.
              for state in &mut self.states {
                  state.possible_future_group_ids = BTreeSet::new();
              }

              loop {
                  let mut changed = false;
                  for state_index in 0..self.states.len() {
                      let state = self.states[state_index].clone(); // Clone to avoid borrow checker issues
                      for (_input, &next_state_index) in &state.transitions {
                          let next_possible_future_groups =
                              self.states[next_state_index].possible_future_group_ids.clone();
                          let next_finalizers = self.states[next_state_index].finalizers.clone();
                          let state_possible_future_groups =
                              &mut self.states[state_index].possible_future_group_ids;

                          let old_len = state_possible_future_groups.len();
                          state_possible_future_groups.extend(next_finalizers.iter()); // Add finalizers of the *next* state
                          state_possible_future_groups.extend(next_possible_future_groups.iter());

                          if state_possible_future_groups.len() > old_len {
                              changed = true;
                          }
                      }
                  }
                  if !changed {
                      break;
                  }
              }
          }

          pub fn compute_group_id_to_u8set(&mut self) {
              // Create the vector of possible future group IDs within a block scope, cloning the data
              let possible_current_or_future_group_ids: Vec<BTreeSet<GroupID>> = {
                  self.states
                      .iter()
                      .map(|state| &state.possible_future_group_ids | &state.finalizers)
                      .collect()
              };

              // Now that the block has ended, there are no borrows of self.states
              for state in self.states.iter_mut() {
                  let mut group_id_to_u8set: BTreeMap<GroupID, U8Set> = BTreeMap::new();

                  for (input_u8, &next_state_index) in &state.transitions {
                      let next_possible_current_or_future_group_ids =
                          &possible_current_or_future_group_ids[next_state_index];

                      for &group_id in next_possible_current_or_future_group_ids {
                          group_id_to_u8set
                              .entry(group_id)
                              .or_insert_with(U8Set::none)
                              .insert(input_u8);
                      }
                  }

                  state.group_id_to_u8set = group_id_to_u8set;
              }
          }

          fn remove_unreachable_states(&mut self) {
              // Find reachable states using BFS
              let mut reachable = vec![false; self.states.len()];
              let mut queue = vec![self.start_state];
              reachable[self.start_state] = true;

              while let Some(state) = queue.pop() {
                  for &next_state in self.states[state].transitions.values() {
                      if !reachable[next_state] {
                          reachable[next_state] = true;
                          queue.push(next_state);
                      }
                  }
              }

              // Create mapping from old indices to new indices
              let mut state_mapping = vec![0; self.states.len()];
              let mut new_index = 0;
              for (old_index, &is_reachable) in reachable.iter().enumerate() {
                  if is_reachable {
                      state_mapping[old_index] = new_index;
                      new_index += 1;
                  }
              }

              // Keep only reachable states and update transitions
              let mut new_states = Vec::new();
              for (old_index, state) in self.states.iter().enumerate() {
                  if reachable[old_index] {
                      let mut new_state = state.clone();
                      // Update transitions to use new state indices
                      new_state.transitions = new_state
                          .transitions
                          .iter()
                          .map(|(u8, &next)| (u8, state_mapping[next]))
                          .collect();
                      new_states.push(new_state);
                  }
              }

              // Update the DFA
              self.states = new_states;
              // Start state remains at 0 since it's always reachable
              self.start_state = 0;
          }

          fn minimize(&mut self) {
              if self.states.is_empty() {
                  return;
              }

              // DFA minimization via partition refinement is roughly O(n^2 * |Σ|).
              // For very large DFAs (e.g. tens of millions of states from huge literal
              // strings), running it is infeasible and would exhaust memory. In that
              // regime, skipping minimization is a semantics-preserving optimization.
              const MAX_MINIMIZATION_STATES: usize = 100_000;
              if self.states.len() > MAX_MINIMIZATION_STATES {
                  return;
              }

              self.remove_unreachable_states();

              // Step 1: Initial partition based on finalizers.
              let mut partitions_map: BTreeMap<BTreeSet<GroupID>, BTreeSet<usize>> = BTreeMap::new();
              for (state_idx, state) in self.states.iter().enumerate() {
                  partitions_map
                      .entry(state.finalizers.clone())
                      .or_default()
                      .insert(state_idx);
              }
              let mut partition_list: Vec<BTreeSet<usize>> = partitions_map.into_values().collect();

              // state_to_partition map for O(1) lookups.
              let mut state_to_partition = vec![0; self.states.len()];
              for (part_idx, partition) in partition_list.iter().enumerate() {
                  for &state_idx in partition {
                      state_to_partition[state_idx] = part_idx;
                  }
              }

              // Step 2: Refine partitions until a fixed point is reached.
              loop {
                  let mut changed = false;
                  let mut new_partition_list: Vec<BTreeSet<usize>> = Vec::new();

                  for partition in &partition_list {
                      if partition.len() <= 1 {
                          new_partition_list.push(partition.clone());
                          continue;
                      }

                      // Split this partition based on transition signatures.
                      // A signature maps a character to the partition index of the target state.
                      let mut refined_partitions: BTreeMap<BTreeMap<u8, usize>, BTreeSet<usize>> =
                          BTreeMap::new();
                      for &state_idx in partition {
                          let signature: BTreeMap<u8, usize> = self.states[state_idx]
                              .transitions
                              .iter()
                              .map(|(input, &next_state)| (input, state_to_partition[next_state]))
                              .collect();
                          refined_partitions.entry(signature).or_default().insert(state_idx);
                      }

                      if refined_partitions.len() > 1 {
                          changed = true;
                      }
                      new_partition_list.extend(refined_partitions.into_values());
                  }

                  partition_list = new_partition_list;

                  if !changed {
                      break;
                  }

                  // Rebuild state_to_partition map for the next iteration.
                  for (part_idx, partition) in partition_list.iter().enumerate() {
                      for &state_idx in partition {
                          state_to_partition[state_idx] = part_idx;
                      }
                  }
              }

              // Step 3: Build the minimized DFA from the final partitions.
              let (state_mapping, new_states) = self.rebuild_from_partitions(partition_list);

              self.states = new_states;
              self.start_state = state_mapping[self.start_state];

              // Recompute metadata as the structure has changed.
              self.compute_possible_future_group_ids();
              self.compute_group_id_to_u8set();
          }

          fn rebuild_from_partitions(
              &self,
              mut partition_list: Vec<BTreeSet<usize>>,
          ) -> (Vec<usize>, Vec<DFAState>) {
              let mut state_mapping = vec![0; self.states.len()];

              // Ensure the start state's partition is at index 0.
              if let Some(start_part_idx) = partition_list
                  .iter()
                  .position(|p| p.contains(&self.start_state))
              {
                  partition_list.swap(0, start_part_idx);
              }

              // Build the mapping from old state index to new state index (which is the partition index).
              for (new_idx, partition) in partition_list.iter().enumerate() {
                  for &old_idx in partition {
                      state_mapping[old_idx] = new_idx;
                  }
              }

              let mut new_states = Vec::with_capacity(partition_list.len());
              for partition in &partition_list {
                  // All states in a partition are equivalent, so we can pick any one as a representative.
                  let representative_old_idx = *partition.iter().next().unwrap();
                  let mut new_state = self.states[representative_old_idx].clone();

                  // Update transitions to point to the new partition indices.
                  new_state.transitions = new_state
                      .transitions
                      .iter()
                      .map(|(u8, &old_next_idx)| (u8, state_mapping[old_next_idx]))
                      .collect();

                  new_states.push(new_state);
              }

              (state_mapping, new_states)
          }
      }

      /// Early termination condition used by both `RegexState::execute` and the
      /// fast `Regex::execute_from_state_fast`.
      ///
      /// Returns true iff every group ID in `possible_future_group_ids` is a
      /// non-greedy group that has already been matched.
      fn should_terminate_early(
          possible_future_group_ids: &BTreeSet<GroupID>,
          non_greedy_finalizers: &BTreeSet<GroupID>,
          matched_groups: &BTreeSet<GroupID>,
      ) -> bool {
          for group_id in possible_future_group_ids {
              if non_greedy_finalizers.contains(group_id) {
                  if !matched_groups.contains(group_id) {
                      // Non-greedy group not yet matched; keep running.
                      return false;
                  }
              } else {
                  // Greedy group still possible; keep running.
                  return false;
              }
          }
          true
      }

      impl RegexState<'_> {
          pub fn execute(&mut self, text: &[u8]) -> Vec<Match> {
              let mut all_matches = Vec::new();
              if self.done {
                  self.position += text.len();
                  return all_matches;
              }
              let dfa = &self.regex.dfa;
              let mut local_position = 0;
              while local_position < text.len() {
                  let state_data = &dfa.states[self.current_state];
                  let next_u8 = text[local_position];
                  if let Some(&next_state) = state_data.transitions.get(next_u8) {
                      self.current_state = next_state;
                      local_position += 1;
                      // Handle greedy finalizers and collect all matches
                      for &group_id in &dfa.states[self.current_state].finalizers {
                          all_matches.push(Match {
                              group_id,
                              position: self.position + local_position,
                          });

                          if dfa.non_greedy_finalizers.contains(&group_id) {
                              self.matches
                                  .entry(group_id)
                                  .or_insert(self.position + local_position);
                          } else {
                              // Overwrite existing match for greedy groups
                              self.matches
                                  .insert(group_id, self.position + local_position);
                          }
                      }

                      // Check for early termination. Only continue if it's possible to match either:
                      // - a greedy group, or
                      // - a non-greedy group that has not been matched yet
                      let matched: BTreeSet<GroupID> = self.matches.keys().cloned().collect();
                      let should_terminate = should_terminate_early(
                          &dfa.states[self.current_state].possible_future_group_ids,
                          &dfa.non_greedy_finalizers,
                          &matched,
                      );

                      if should_terminate {
                          self.position += text.len();
                          self.done = true;
                          return all_matches;
                      }
                  } else {
                      // No matching transition, we're done
                      self.position += text.len();
                      self.done = true;
                      return all_matches;
                  }
              }
              // Reached the end of input, mark as done if no further transitions
              self.position += text.len();
              if dfa.states[self.current_state].transitions.is_empty() {
                  self.done = true;
              }
              all_matches
          }

          pub fn end(&mut self) {
              self.done = true;
          }

          pub fn ended(&self) -> bool {
              self.done
          }

          pub fn reset(&mut self) {
              self.current_state = self.regex.dfa.start_state;
              self.matches.clear();
              self.position = 0;
              self.done = false;
          }

          /// Matches repeatedly, resolving ambiguity in the following way:
          /// 1. If it's still possible to match something, stop. Don't return a result for the final match, since we can't rule out the possibility of a longer match.
          /// 2. Otherwise, if there is more than one match, return the longest match.
          /// 3. If there is more than one match of this length, return the one with the lowest group ID.
          pub fn greedy_find_all(&mut self, text: &[u8], terminate: bool) -> Vec<Match> {
              let mut matches: Vec<Match> = Vec::new();
              let start_position = self.position;
              let mut local_position = 0;
              self.position = 0;
              loop {
                  self.execute(&text[local_position..]);
                  if self.ended() {
                      if let Some(m) = self.get_greedy_match() {
                          // Advance the local position to the end of the match.
                          local_position += m.position;

                          // Add the match to the list of successful matches.
                          matches.push(m);

                          // Reset the state and advance the internal position.
                          self.reset();
                      } else {
                          // Ended but no match. This indicates a tokenization error.
                          // Return the successful matches.
                          self.position = start_position + local_position;
                          return matches;
                      }
                  } else {
                      // Didn't end. We must have run out of input.
                      // If we're supposed to terminate, add the final match (if any) and terminate.
                      if terminate {
                          if let Some(m) = self.get_greedy_match() {
                              // Add the final match to the list of successful matches.
                              matches.push(m);
                          }
                          self.end();
                          return matches;
                      }
                      // Return the successful matches.
                      self.position = start_position + local_position;
                      return matches;
                  }
              }
          }

          /// Returns a single match as follows:
          ///
          /// 1. If there is more than one match, return the longest match.
          /// 2. If there is more than one match of this length, return the one with the lowest group ID.
          ///
          /// If there is no match, returns None.
          pub fn get_greedy_match(&self) -> Option<Match> {
              self.matches
                  .iter()
                  .filter(|(_, &pos)| pos > 0) // Tokenizers must consume input to avoid infinite loops.
                  .max_by(|(&g1, &p1), (&g2, &p2)| p1
                      .cmp(&p2)
                      .then_with(|| g2.cmp(&g1))) // Longest match (p1 vs p2), then smallest group_id (g2 vs g1).
                  .map(|(&group_id, &position)| Match { group_id, position })
          }

          pub fn final_state_report(&self) -> FinalStateReport {
              FinalStateReport {
                  position: self.position,
                  matches: self.matches.clone(),
              }
          }

          pub fn get_u8set(&self) -> U8Set {
              let dfa = &self.regex.dfa;
              let state_data = &dfa.states[self.current_state];
              // Get all possible u8s that can match next
              state_data.transitions.keys_as_u8set()
          }

          pub fn get_terminal_u8set(&self) -> U8Set {
              // Get u8s that could take the regex to a terminal state (a state with a finalizer)
              let mut u8set = U8Set::none();
              let dfa = &self.regex.dfa;
              let state_data = &dfa.states[self.current_state];
              for (value, &i_next_state) in &state_data.transitions {
                  if !dfa.states[i_next_state].finalizers.is_empty() {
                      u8set.insert(value);
                  }
              }
              u8set
          }

          pub fn matches(&self) -> Option<bool> {
              if !self.matches.is_empty() {
                  Some(true)
              } else if self.done {
                  Some(false)
              } else {
                  None
              }
          }

          pub fn definitely_matches(&self) -> bool {
              self.matches().unwrap_or(false)
          }

          pub fn could_match(&self) -> bool {
              self.matches().unwrap_or(true)
          }

          pub fn fully_matches(&self) -> Option<bool> {
              if let Some(max_position) = self.matches.values().max() {
                  Some(*max_position == self.position)
              } else {
                  if self.done {
                      Some(false)
                  } else {
                      None
                  }
              }
          }

          pub fn definitely_fully_matches(&self) -> bool {
              self.fully_matches().unwrap_or(false)
          }

          pub fn could_fully_match(&self) -> bool {
              self.fully_matches().unwrap_or(true)
          }

          pub fn fully_matches_here(&self) -> bool {
              self.definitely_fully_matches()
          }

          pub fn done(&self) -> bool {
              // Returns true if the regex has matched and cannot possibly match anymore
              self.done
          }

          pub fn failed(&self) -> bool {
              // Returns true if the regex has failed to match and cannot possibly match
              !self.could_match()
          }

          pub fn clear_matches(&mut self) {
              self.matches.clear();
          }

          pub fn possible_future_group_ids(&self) -> BTreeSet<GroupID> {
              let state = &self.regex.dfa.states[self.current_state];
              state.possible_future_group_ids.clone()
          }

          pub fn get_u8set_for_group(&self, group_id: GroupID) -> U8Set {
              let state = &self.regex.dfa.states[self.current_state];
              state
                  .group_id_to_u8set
                  .get(&group_id)
                  .cloned()
                  .unwrap_or_else(U8Set::none)
          }
      }

      impl Regex {
          pub fn num_groups(&self) -> usize {
              let mut max_gid: Option<GroupID> = None;
              for s in &self.dfa.states {
                  if let Some(m) = s.finalizers.iter().max() {
                      max_gid = Some(max_gid.map_or(*m, |cur| cur.max(*m)));
                  }
              }
              max_gid.map(|m| m + 1).unwrap_or(0)
          }

          pub fn execute_from_state2(&self, text: &[u8], state: usize) -> ExecutionResult {
              // For backward compatibility, this is a thin wrapper around the optimized fast path.
              self.execute_from_state_fast(text, state)
          }

          /// Optimized execution from an arbitrary DFA state.
          ///
          /// This is functionally equivalent to `execute_from_state2`'s previous
          /// implementation (which used `RegexState`), but avoids allocating a full
          /// `RegexState` and repeatedly rebuilding set operations during the run.
          pub fn execute_from_state_fast(&self, text: &[u8], state: usize) -> ExecutionResult {
              let dfa = &self.dfa;
              let mut all_matches: Vec<Match> = Vec::new();

              let mut current_state = state;
              let mut matched_groups: BTreeSet<GroupID> = dfa.states[state].finalizers.clone();

              // Match behavior of RegexState::execute when starting from a "done" state:
              // if there are no outgoing transitions, we cannot consume input.
              if dfa.states[state].transitions.is_empty() {
                  return ExecutionResult {
                      matches: all_matches,
                      end_state: None,
                  };
              }

              let text_len = text.len();
              let mut local_position = 0usize;

              while local_position < text_len {
                  let state_data = &dfa.states[current_state];
                  let next_byte = text[local_position];

                  let Some(&next_state) = state_data.transitions.get(next_byte) else {
                      // No matching transition: the engine would mark itself as done
                      // and stop immediately.
                      return ExecutionResult {
                          matches: all_matches,
                          end_state: None,
                      };
                  };

                  current_state = next_state;
                  local_position += 1;

                  let state_data = &dfa.states[current_state];

                  // Collect matches at this position.
                  if !state_data.finalizers.is_empty() {
                      for &group_id in &state_data.finalizers {
                          all_matches.push(Match {
                              group_id,
                              position: local_position,
                          });
                          matched_groups.insert(group_id);
                      }
                  }

                  // Early termination: only continue while there exists either
                  // - a greedy group that could still be matched, or
                  // - a non-greedy group that has not yet been matched.
                  if should_terminate_early(
                      &state_data.possible_future_group_ids,
                      &dfa.non_greedy_finalizers,
                      &matched_groups,
                  ) {
                      return ExecutionResult {
                          matches: all_matches,
                          end_state: None,
                      };
                  }
              }

              // End of input: return a continuation state only if further transitions are possible.
              let end_state = if dfa.states[current_state].transitions.is_empty() {
                  None
              } else {
                  Some(current_state)
              };

              ExecutionResult {
                  matches: all_matches,
                  end_state,
              }
          }

          pub fn init_to_state(&self, state: usize) -> RegexState {
              let done = self.dfa.states[state].transitions.is_empty();
              let matches = self.dfa.states[state]
                  .finalizers
                  .iter()
                  .map(|&group_id| (group_id, 0))
                  .collect();
              RegexState {
                  regex: self,
                  position: 0,
                  current_state: state,
                  matches,
                  done,
              }
          }

          pub fn init(&self) -> RegexState {
              self.init_to_state(self.dfa.start_state)
          }

          pub fn get_next_state(&self, current_state: usize, byte: u8) -> Option<usize> {
              self.dfa.states[current_state]
                  .transitions
                  .get(byte)
                  .copied()
          }

          pub fn find(&self, text: &[u8]) -> Option<(GroupID, usize)> {
              let mut regex_state = self.init();
              regex_state.execute(text);
              regex_state
                  .matches
                  .iter()
                  .next()
                  .map(|(&group_id, &position)| (group_id, position))
          }

          pub fn matches(&self, text: &[u8]) -> Option<bool> {
              let mut regex_state = self.init();
              regex_state.execute(text);
              regex_state.matches()
          }

          pub fn definitely_matches(&self, text: &[u8]) -> bool {
              self.matches(text).unwrap_or(false)
          }

          pub fn could_match(&self, text: &[u8]) -> bool {
              self.matches(text).unwrap_or(true)
          }

          pub fn fully_matches(&self, text: &[u8]) -> Option<bool> {
              let mut regex_state = self.init();
              regex_state.execute(text);
              regex_state.fully_matches()
          }

          pub fn definitely_fully_matches(&self, text: &[u8]) -> bool {
              self.fully_matches(text).unwrap_or(false)
          }

          pub fn could_fully_match(&self, text: &[u8]) -> bool {
              self.fully_matches(text).unwrap_or(true)
          }
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::{choice, seq};

          #[test]
          fn test_literal() {
              let expr: Expr = eat_u8(b'a');
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"a"));
              assert!(!regex.could_match(b"b"));

              assert!(!regex.definitely_matches(b"")); // Incomplete match not allowed
              assert!(regex.could_match(b"")); // Incomplete match allowed
              assert!(regex.definitely_matches(b"ab")); // Prefix match allowed
              assert!(regex.definitely_matches(b"aa")); // Prefix match allowed
          }

          #[test]
          fn test_quantifier() {
              let expr = rep(eat_u8(b'a'));
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b""));
              assert!(regex.definitely_fully_matches(b"a"));
              assert!(regex.definitely_fully_matches(b"aaaa"));
              assert!(regex.could_match(b"b"));

              let mut state = regex.init();
              state.execute(b"aa");
              assert_eq!(state.matches, BTreeMap::from([(0, 2)]));
              assert!(!state.done()); // Could match more 'a's
          }

          #[test]
          fn test_choice() {
              let expr = choice![eat_u8(b'a'), eat_u8(b'b')];
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"a"));
              assert!(regex.definitely_fully_matches(b"b"));
              assert!(!regex.could_match(b"c"));
          }

          #[test]
          fn test_seq() {
              let expr = seq![eat_u8(b'a'), eat_u8(b'b')];
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.could_match(b"a"));
              assert!(!regex.definitely_matches(b"a"));
              assert!(!regex.could_match(b"b"));
              assert!(regex.definitely_matches(b"ab"));
              assert!(regex.definitely_matches(b"abab"));
              assert!(!regex.could_match(b"c"));
          }

          #[test]
          fn test_opt() {
              let expr = opt(eat_u8(b'a'));
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"")); // Optional 'a' can be absent
              assert!(regex.definitely_fully_matches(b"a")); // Optional 'a' can be present
              assert!(!regex.could_fully_match(b"aa")); // Should not match more than one 'a'
              assert!(regex.could_match(b"b")); // Can still match the empty string in "b"
          }

          #[test]
          fn test_0() {
              let expr = eat_u8(0);
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"\0"));
              assert!(!regex.could_match(b"1"));
          }

          #[test]
          fn test_epsilon() {
              let expr = eps();
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b""));
              assert!(regex.definitely_matches(b"a")); // Epsilon matches the empty string at the beginning
              assert!(!regex.definitely_fully_matches(b"a"));
          }

          #[test]
          fn test_u8seq() {
              let expr = Expr::U8Seq(vec![b'a', b'b']);
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"ab"));
              assert!(regex.could_match(b"a"));
              assert!(!regex.could_match(b"b"));
              assert!(!regex.could_match(b"ba"));
          }
      }

      #[cfg(test)]
      mod complex_tests {
          use super::*;

          #[test]
          fn test_nested_quantifiers() {
              let expr = rep1(rep(eat_u8(b'a')));
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"a"));
              assert!(regex.definitely_fully_matches(b"aa"));
              assert!(regex.definitely_fully_matches(b"aaa"));
              assert!(regex.definitely_fully_matches(b""));
          }

          #[test]
          fn test_complex_choice() {
              let expr = choice![
                  seq![eat_u8(b'a'), rep1(eat_u8(b'b'))],
                  eat_u8(b'c'),
              ];
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"ab"));
              assert!(regex.definitely_fully_matches(b"abb"));
              assert!(regex.definitely_fully_matches(b"c"));
              assert!(regex.could_match(b"a"));
              assert!(!regex.definitely_matches(b"a"));
              assert!(!regex.could_match(b"b"));
              assert!(regex.definitely_matches(b"cc"));
              assert_eq!(regex.fully_matches(b"cc"), Some(false));
          }

          #[test]
          fn test_complex_seq_with_quantifiers() {
              let expr = seq![
                  rep(eat_u8(b'a')),
                  eat_u8(b'b'),
                  rep1(eat_u8(b'c')),
              ];
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"bc"));
              assert!(regex.definitely_fully_matches(b"bcc"));
              assert!(regex.definitely_fully_matches(b"abcc"));
              assert!(regex.definitely_fully_matches(b"aaabccc"));
              assert!(regex.could_match(b"a"));
              assert!(regex.could_match(b"b"));
              assert!(!regex.could_match(b"c"));
          }

          #[test]
          fn test_complex_pattern() {
              let expr = seq![
                  rep(choice![eat_u8(b'a'), eat_u8(b'b')]),
                  eat_u8(b'c'),
                  rep1(choice![eat_u8(b'd'), eat_u8(b'e')]),
              ];
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"cd"));
              assert!(regex.definitely_fully_matches(b"ce"));
