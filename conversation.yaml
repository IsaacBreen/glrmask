      *   `pub fn print_gss_stats(&self)`: Prints statistics about the current GSS (Graph-Structured Stack) forest.
      *   `pub fn print_gss(&self)`: Prints a textual representation of the current GSS forest.
      *   `pub fn explain_stack(&self)`: Prints a detailed, human-readable explanation of a sample path through the GSS for each active state.
      *   `pub fn num_unique_nodes(&self) -> usize`: Returns the total number of unique nodes across all GSS instances in the current state.

