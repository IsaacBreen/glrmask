              Some((None, continue_recursion)) // Keep node, continue recursion
          };
          let mut memo = HashMap::new();
          if let Some(new_root) = prune_and_transform_recursive(root_arc, &closure, &mut memo) {
              *root_arc = new_root;
          } else {
