          pub fn precompute<'a>(
              tokenizer: &Regex,
              llm_token_map: &BiBTreeMap<Vec<u8>, LLMTokenID>,
              token_name_map: &std::collections::BTreeMap<GrammarTokenID, String>,
              max_llm_token_id: usize,
          ) -> Precomputed {
