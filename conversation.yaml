                          node_ptr(child_wrapper_arc.as_arc()) // Use as_arc() to get the Arc
                      );
                      // Recurse
                      dump_precompute_trie_recursive(child_wrapper_arc.as_arc(), new_indent.clone(), visited, original_internal_bimap); // Pass original_internal_bimap
                  }
              }
          }
      }

