      impl Display for Intermediate2Trie3EdgeKey {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              fn format_bv(bv: &StateIDBV) -> String {
                  if bv.is_empty() {
                      return "[]".to_string();
                  }
                  if bv.is_all() {
                      return "[ALL]".to_string();
                  }

                  const MAX_RANGES_TO_SHOW: usize = 10;
