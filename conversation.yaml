              for uid, node in self.arena.items():
                  uid_int = int(uid)
                  self.max_depth[uid_int] = int(node.get("max_depth", 0) or 0)

                  children = node.get("children") or []
                  if not children:
                      node["children"] = []
                      node["llm_bv_union"] = LLMTokenSet.empty()
                      continue

                  new_children = []
                  llm_bv_union: LLMTokenSet = LLMTokenSet.empty()
