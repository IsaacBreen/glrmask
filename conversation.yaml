  - user: |-
      Add an optimization pass in full_dwa.rs and run it before final determinization. It goes like this.

      Look at the parse table.
      Construct a map from state ID to a set of state IDs like this:
      - Look at each shift action.
          - Let's say we have an action `shift y`, and that action exists for the parse table row for state `x`.
          - Add to the set in the map under key `y` the element `x`.
      - Look at each goto action.
          - Let's say we have an action `goto y`, and that action exists for the parse table row for state `x`.
          - Add to the set in the map under key `y` the element `x`.
      - (Ignore reduces.)
      From now on, I'll refer to these parser states as 'labels' to distinguish them from our NWA states. I'll refer to this map as 'label follow map'.

      Traverse the NWA. Traverse all the initial edges unconditionally (since at this point they represent tokenizer state IDs). This takes us to a set of 'initial states'.
      Our goal is to figure out which 'next' labels can live at each state, but using the label follow map to refine them.
      At each state, we'll have a map from label ID to weight.
      At each state, look at all outgoing labels. Initialize a map at that state that maps each outgoing label to an empty weight (zeros).
      The weights propogate across edges. So if label a has weight wa at s1, and we have s1 -(a, w12)-> s2, then we propogate weight (wa & w12) to s2, but we file it in s2 under the labels obtained via the label follow map (all of them).
      For the initial states, set the weights for all of them (which should be all outgoing labels) to the union of incoming weights (regardless of incoming label).

      Then propogate until convergence.
      Or think of a cleverer way to compute it. I don't mind.
      What matters is the end product.

      Once we have that, we can use it to prune weights and potentially transitions. The map tells us which next transitions are valid.

      Note that we'll have to treat default transitions as a special case. They'll basically behave as *any* label.

      Implement this.
