              impl PartialEq for MacroSigKey {
                  fn eq(&self, other: &Self) -> bool {
                      self.fp == other.fp
                          && self.final_fp == other.final_fp
                          && self.def_id == other.def_id
                          && self.label_ids == other.label_ids
