                                  if len(existing_gss_set) != old_len:
                                      enqueue(self.max_depth.get(d, 0), d)
                              else:
                                  values[d] = (parent_set, next_mask[d])
                                  enqueue(self.max_depth.get(d, 0), d)

              return RangeSet.from_ranges(final_mask.to_ranges())
