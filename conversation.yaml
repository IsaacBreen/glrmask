          fn test_incremental_parser_simple() {
              // Grammar: S -> 'a' 'b' | 'a' 'c'
              let terminals = vec![
                  ("a".to_string(), eat_u8(b'a')),
                  ("b".to_string(), eat_u8(b'b')),
                  ("c".to_string(), eat_u8(b'c')),
