      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::MiniTrie;

      /// Trait implemented by each independent optimization pass over the MiniTrie.
      pub trait OptimizationPass {
          fn name(&self) -> &'static str;
          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext);
      }

      pub mod prune_dead_paths;
      pub mod compress_edges;
      pub mod merge_structural;
      pub mod eliminate_pop0;
      pub mod canonicalize_end_nodes;
      pub mod full;

      pub use prune_dead_paths::PruneDeadPathsPass;
      pub use compress_edges::CompressEdgesPass;
      pub use merge_structural::MergeStructuralPass;
      pub use eliminate_pop0::EliminatePop0ExceptRootsPass;
      pub use canonicalize_end_nodes::CanonicalizeEndNodesPass;
    src/trie3_opt/passes/prune_dead_paths.rs: |
      use std::collections::{BTreeMap, BTreeSet};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Remove edges that provably cannot lead to an end node by reverse reachability.
      /// Nodes are not deleted in the mini-trie (to keep NodeId stability), but edges to
      /// non-productive nodes are pruned.
      pub struct PruneDeadPathsPass;

      impl OptimizationPass for PruneDeadPathsPass {
          fn name(&self) -> &'static str {
              "PruneDeadPaths"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let productive: BTreeSet<NodeId> = trie.can_reach_end();
              if productive.is_empty() {
                  return;
              }
              for n in trie.nodes.iter_mut() {
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (ek, dm) in n.children.clone() {
                      let mut dm2: BTreeMap<_, _> = BTreeMap::new();
                      for (dst, sids) in dm {
                          if productive.contains(&dst) {
                              dm2.insert(dst, sids);
                          }
                      }
                      if !dm2.is_empty() {
                          new_children.insert(ek, dm2);
                      }
                  }
                  n.children = new_children;
              }
          }
      }
    src/trie3_opt/coordinator.rs: |
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};

      use ordered_hash_map::OrderedHashMap;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::{
          CanonicalizeEndNodesPass, CompressEdgesPass, EliminatePop0ExceptRootsPass, MergeStructuralPass,
          OptimizationPass, PruneDeadPathsPass,
      };

      use crate::constraint::{
          PrecomputeNode3Index, PrecomputedNodeContents, Trie3GodWrapper, LLMTokenBV, StateIDBV,
      };
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;
      use crate::tokenizer::TokenizerStateID;

      /// Configuration for the coordinator: which passes to run and their key parameters.
      #[derive(Clone, Debug)]
      pub struct CoordinatorConfig {
          pub enable_prune_dead_paths: bool,
          pub enable_compress_edges: bool,
          pub enable_merge_structural: bool,
          pub merge_structural_max_iters: usize,
          pub enable_eliminate_pop0_except_roots: bool,
          pub enable_canonicalize_end_nodes: bool,
      }

      impl Default for CoordinatorConfig {
          fn default() -> Self {
              Self {
                  enable_prune_dead_paths: true,
                  enable_compress_edges: true,
                  enable_merge_structural: true,
                  merge_structural_max_iters: 4,
                  enable_eliminate_pop0_except_roots: true,
                  enable_canonicalize_end_nodes: true,
              }
          }
      }

      impl CoordinatorConfig {
          pub fn off() -> Self {
              Self {
                  enable_prune_dead_paths: false,
                  enable_compress_edges: false,
                  enable_merge_structural: false,
                  merge_structural_max_iters: 0,
                  enable_eliminate_pop0_except_roots: false,
                  enable_canonicalize_end_nodes: false,
              }
          }
      }

      /// Build a default sequence of passes from config.
      fn build_pipeline(config: &CoordinatorConfig) -> Vec<Box<dyn OptimizationPass>> {
          let mut pipeline: Vec<Box<dyn OptimizationPass>> = Vec::new();

          if config.enable_prune_dead_paths {
              pipeline.push(Box::new(PruneDeadPathsPass));
          }
          if config.enable_canonicalize_end_nodes {
              pipeline.push(Box::new(CanonicalizeEndNodesPass));
          }
          if config.enable_compress_edges {
              pipeline.push(Box::new(CompressEdgesPass));
          }
          if config.enable_merge_structural {
              pipeline.push(Box::new(MergeStructuralPass::new(
                  config.merge_structural_max_iters,
              )));
          }
          if config.enable_eliminate_pop0_except_roots {
              pipeline.push(Box::new(EliminatePop0ExceptRootsPass));
          }
          // Final compression after potential rewires
          if config.enable_compress_edges {
              pipeline.push(Box::new(CompressEdgesPass));
          }

          pipeline
      }

      /// Convert the given precompute3 trie into a MiniTrie along with a stable list of root keys.
      fn export_to_mini(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) -> (MiniTrie, Vec<(TokenizerStateID, NodeId)>, HashMap<PrecomputeNode3Index, NodeId>) {
          let mut mini = MiniTrie::new();

          // BFS from roots to collect reachable nodes and assign NodeId
          let mut map_old_to_new: HashMap<PrecomputeNode3Index, NodeId> = HashMap::new();
          let mut q: VecDeque<PrecomputeNode3Index> = VecDeque::new();

          for (_k, r) in roots {
              if !map_old_to_new.contains_key(r) {
                  let end = r.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
                  let id = mini.add_node(end);
                  map_old_to_new.insert(*r, id);
                  q.push_back(*r);
                  mini.add_root(id);
              }
          }

          while let Some(old_idx) = q.pop_front() {
              let new_id = *map_old_to_new.get(&old_idx).unwrap();
              let r = if let Some(g) = old_idx.read(trie3_god) { g } else { continue };

              for (ek, dm) in r.children() {
                  // Build token set
                  let mut toks = SortedSet::new();
                  for t in ek.1.iter() {
                      toks.insert(t);
                  }
                  if toks.is_empty() {
                      continue;
                  }
                  let key = crate::trie3_opt::core::EdgeKey::new(ek.0, toks.clone());
                  for (dst, sids) in dm {
                      // Ensure dst is mapped
                      let dst_id = if let Some(id) = map_old_to_new.get(dst) {
                          *id
                      } else {
                          let end = dst.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
                          let id = mini.add_node(end);
                          map_old_to_new.insert(*dst, id);
                          q.push_back(*dst);
                          id
                      };
                      // Build state set
                      let mut st = SortedSet::new();
                      for s in sids.iter() {
                          st.insert(s);
                      }
                      if !st.is_empty() {
                          mini.add_edge(new_id, key.clone(), dst_id, st);
                      }
                  }
              }
          }

          // Stable root list preserving the original key ordering
          let mut root_pairs: Vec<(TokenizerStateID, NodeId)> = Vec::new();
          for (k, r) in roots {
              if let Some(id) = map_old_to_new.get(r).cloned() {
                  root_pairs.push((*k, id));
              }
          }

          (mini, root_pairs, map_old_to_new)
      }

      /// Import a MiniTrie back into the precompute3 arena by constructing a fresh graph.
      /// - All new nodes are inserted; roots remapped to these.
      /// - Old nodes become unreachable and are GC'd.
      /// - live_tokens are recomputed from outgoing edges.
      /// - end flags are set from the mini-trie.
      fn import_from_mini(
          mini: &MiniTrie,
          root_pairs: &[(TokenizerStateID, NodeId)],
          trie3_god: &Trie3GodWrapper,
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          ctx: &OptimizationContext,
      ) {
          // Create all nodes first
          let mut new_nodes: Vec<PrecomputeNode3Index> = Vec::with_capacity(mini.nodes.len());
          for _ in 0..mini.nodes.len() {
              let idx = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())));
              new_nodes.push(idx);
          }

          // Fill end flags and edges
          for node in &mini.nodes {
              let idx = new_nodes[node.id as usize];
              if let Some(mut w) = idx.write(trie3_god) {
                  w.value.end = node.end;

                  let mut children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTreeMap::new();

                  for (ek, dm) in node.children.iter() {
                      // Build LLMTokenBV from tokens set
                      let mut bv = LLMTokenBV::zeros();
                      for t in ek.tokens.iter() {
                          if t <= ctx.max_llm_token_id {
                              bv.insert(t);
                          }
                      }
                      if bv.is_empty() {
                          continue;
                      }

                      let entry = children.entry((ek.pop, bv.clone())).or_insert_with(OrderedHashMap::new);
                      for (dst, sset) in dm {
                          let mut sbv = StateIDBV::zeros();
                          for s in sset.iter() {
                              if s <= ctx.max_state_id {
                                  sbv.insert(s);
                              }
                          }
                          if sbv.is_empty() {
                              continue;
                          }
                          let dst_idx = new_nodes[*dst as usize];
                          entry.entry(dst_idx)
                              .and_modify(|e| *e |= &sbv)
                              .or_insert(sbv);
                      }
                  }

                  // Recompute live tokens from children
                  let mut live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &children {
                      live |= llm_bv;
                  }
                  w.value.live_tokens = live;
                  *w.children_mut() = children;
              }
          }

          // Remap roots to new nodes
          roots.clear();
          for (key, nid) in root_pairs {
              let idx = new_nodes[*nid as usize];
              roots.insert(*key, idx);
          }

          // GC and recompute depths
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec);
      }

      /// High-level entry point: export -> run passes on mini -> import.
      /// The coordinator isolates optimization authors from the full system types: they only need
      /// to implement passes over MiniTrie and add them to the pipeline here.
      pub fn run_pipeline_on_precompute3(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          config: CoordinatorConfig,
      ) {
          // Export the current graph into a minimal structure
          let (mut mini, root_pairs, _old_mapping) = export_to_mini(roots, trie3_god);

          // Build a fresh pass pipeline and context
          let mut ctx = OptimizationContext {
              max_llm_token_id,
              max_state_id,
              iteration_budget: 1_000_000,
              debug_level: 1,
          };
          let pipeline = build_pipeline(&config);

          // Run passes
          for pass in pipeline.iter() {
              // Simple progress trace
              #[allow(unused)]
              {
                  if ctx.debug_level > 0 {
                      // eprintln!("[Trie3 Opt] Running pass: {}", pass.name());
                  }
              }
              pass.run(&mut mini, &mut ctx);
          }

          // Import the result back and finalize
          import_from_mini(&mini, &root_pairs, trie3_god, roots, &ctx);
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::constraint::{LLMTokenBV, StateIDBV};
          use crate::datastructures::trie::Trie;
          use ordered_hash_map::OrderedHashMap;

          // A very basic roundtrip sanity test on a trivial graph.
          #[test]
          fn roundtrip_basic() {
              // Build a tiny God/arena with 2 nodes and one edge
              let arena = Trie3GodWrapper::new();

              let a_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));
              let b_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));

              {
                  let mut aw = a_idx.write(&arena).unwrap();
                  aw.value.end = false;

                  let mut bv = LLMTokenBV::zeros();
                  bv.insert(1);
                  bv.insert(3);

                  let mut sids = StateIDBV::zeros();
                  sids.insert(2);
                  sids.insert(4);

                  let mut dm = OrderedHashMap::new();
                  dm.insert(b_idx, sids);

                  aw.children_mut().insert((0isize, bv), dm);

                  // live tokens is derived but we'll set for completeness
                  let mut live = LLMTokenBV::zeros();
                  for ((_, l), _) in aw.children() {
                      live |= l;
                  }
                  aw.value.live_tokens = live;
              }
              {
                  let mut bw = b_idx.write(&arena).unwrap();
                  bw.value.end = true;
              }

              let mut roots = BTreeMap::new();
              roots.insert(TokenizerStateID(0), a_idx);

              let cfg = CoordinatorConfig::default();

              run_pipeline_on_precompute3(
                  &mut roots,
                  &arena,
                  10, // max token id
                  10, // max state id
                  cfg,
              );

              // After running, ensure roots still exist and points to some node.
              assert!(roots.get(&TokenizerStateID(0)).is_some());
          }
      }
    src/trie3_opt/passes/full/pop0.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet, BTreeSet, VecDeque};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::{Trie, Trie2Index};

      #[inline]
      pub fn pop_is_zero(ek: &(isize, LLMTokenBV)) -> bool {
          ek.0 == 0
      }

      /// Assert that:
      /// - no pop=0 edges exist from non-root nodes, and
      /// - all remaining pop=0 edges (if any) are from root nodes directly to end nodes.
      /// When enabled in config, this runs after eliminating/rewiring pop0 edges.
      pub fn assert_no_pop0_nonroot_edges_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          let roots_set: HashSet<PrecomputeNode3Index> = roots.values().cloned().collect();
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          for n in all_nodes {
              let is_root = roots_set.contains(&n);
              let r = n.read(trie3_god).expect("read");
              for ((pop, _llm_bv), dm) in r.children() {
                  if *pop == 0 {
                      if !is_root {
                          panic!(
                              "Invariant violated: found pop=0 edge originating from non-root node {}",
                              n
                          );
                      } else {
                          for (dst, _sids) in dm {
                              let dst_is_end = dst.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
                              if !dst_is_end {
                                  panic!(
                                      "Invariant violated: found pop=0 edge from root {} to non-end node {}",
                                      n, dst
                                  );
                              }
                          }
                      }
                  }
              }
          }
      }

      /// Remove all pop=0 edges whose source is not a root.
      /// For each 0-pop edge B --(0, L_bc, S_bc)--> C and each incoming edge
      /// A --(p_ab, L_ab, S_ab)--> B, add/update A --(p_ab, L_ab∧L_bc, S_ab∧S_bc)--> C.
      /// Then remove the original B->C (0, L_bc) mapping. Iterate until no such edges remain.
      /// Additionally, rewire any remaining root-origin pop=0 edges so they target end nodes only:
      /// For each root R and each R --(0, L0, S0)--> C where C is not end, perform a forward closure
      /// along 0-pop edges from C, emitting:
      ///   - R --(0, L0∧...∧Lk, S0∧...∧Sk)--> E for each end E reachable via only 0-pop edges, and
      ///   - R --(p, L0∧...∧Lk∧L, S0∧...∧Sk∧S)--> X for each nonzero-pop edge (p, L, S) encountered
      ///     after some 0-pop chain.
      /// Then remove the original R -> C (0, L0) mapping for that destination.
      pub fn eliminate_pop0_edges_except_roots_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(
              2,
              "Eliminating pop=0 edges from non-root nodes in Trie3..."
          );

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          if roots_vec.is_empty() {
              return;
          }
          let roots_set: HashSet<PrecomputeNode3Index> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let mut total_removed = 0usize;
          let mut iter = 0usize;

          loop {
              iter += 1;

              // Snapshot incoming edges and current pop=0 edges.
              let mut incoming: HashMap<
                  PrecomputeNode3Index,
                  Vec<(PrecomputeNode3Index, (isize, LLMTokenBV), StateIDBV)>,
              > = HashMap::new();
              let mut pop0_edges: Vec<(
                  PrecomputeNode3Index,
                  LLMTokenBV,
                  PrecomputeNode3Index,
                  StateIDBV,
              )> = Vec::new();

              for src in &all_nodes {
                  if let Some(r) = src.read(trie3_god) {
                      for (ek, dm) in r.children() {
                          for (dst, sids) in dm {
                              incoming
                                  .entry(*dst)
                                  .or_default()
                                  .push((*src, (ek.0, ek.1.clone()), sids.clone()));
                              if pop_is_zero(ek) {
                                  pop0_edges.push((*src, ek.1.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                  }
              }

              // Early exit if there isn't any 0-pop edge at all.
              if pop0_edges.is_empty() {
                  break;
              }

              let mut removed_this_iter = 0usize;

              for (b, llm_bc, c, s_bc) in pop0_edges {
                  if roots_set.contains(&b) {
                      // pop=0 edge from a root is allowed by design, keep it
                      continue;
                  }
                  if let Some(preds) = incoming.get(&b) {
                      for (a, (p_ab, llm_ab), s_ab) in preds {
                          // Compose constraints at the same position (pop=0 does not advance position)
                          let new_llm = llm_ab & &llm_bc;
                          if new_llm.is_empty() {
                              continue;
                          }
                          let new_sids = s_ab & &s_bc;
                          if new_sids.is_empty() {
                              continue;
                          }
                          // Create/update A -> C with (p_ab, new_llm) and SIDs = intersection
                          if let Some(mut aw) = a.write(trie3_god) {
                              let key_llm = new_llm.clone();
                              let entry =
                                  aw.children_mut().entry((*p_ab, key_llm.clone())).or_default();
                              entry
                                  .entry(c)
                                  .and_modify(|e| *e |= &new_sids)
                                  .or_insert(new_sids.clone());
                              // keep live_tokens conservative; we'll recompute exactly later anyway
                              aw.value.live_tokens |= &key_llm;
                          }
                      }
                  }

                  // Remove specific B -> C mapping under (0, llm_bc).
                  if let Some(mut bw) = b.write(trie3_god) {
                      let key = (0isize, llm_bc.clone());
                      let mut removed_one = false;
                      if let Some(dm) = bw.children_mut().get_mut(&key) {
                          if dm.remove(&c).is_some() {
                              removed_one = true;
                          }
                          if dm.is_empty() {
                              bw.children_mut().remove(&key);
                          }
                      }
                      if removed_one {
                          removed_this_iter += 1;
                          // Recompute live tokens conservatively for B; exact recomputation follows post-loop
                          let mut new_live = LLMTokenBV::zeros();
                          for ((_, llm_bv), _) in bw.children() {
                              new_live |= llm_bv;
                          }
                          bw.value.live_tokens = new_live;
                      }
              }
          }

          total_removed += removed_this_iter;
          crate::debug!(
                  3,
                  "Pop0-elim iter {}: removed {} pop=0 edges.",
                  iter,
                  removed_this_iter
              );
              if removed_this_iter == 0 {
                  break;
              }
          }

          // Rewire remaining root-origin pop=0 edges so that they target only END nodes.
          // For each root R and each R --(0, L0, S0)--> C with C not end:
          // - traverse 0-pop closure from C, composing constraints (∧) and states (∧),
          // - emit root edges:
          //     * (0, L', S') to every end reached via 0-pop,
          //     * (p, L', S') to every nonzero-pop outgoing edge encountered after some 0-pop path,
          // - remove the original R->C under (0, L0).
          let mut root_nonend_pop0_edges: Vec<(
              PrecomputeNode3Index,
              LLMTokenBV,
              PrecomputeNode3Index,
              StateIDBV,
          )> = Vec::new();
          for r in &roots_vec {
              if let Some(rr) = r.read(trie3_god) {
                  for (ek, dm) in rr.children() {
                      if pop_is_zero(ek) {
                          for (dst, sids) in dm {
                              let is_end = dst.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
                              if !is_end {
                                  root_nonend_pop0_edges
                                      .push((*r, ek.1.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                  }
              }
          }

          for (root_idx, llm_rc, c_idx, s_rc) in root_nonend_pop0_edges {
              // BFS along 0-pop closure starting at c_idx with accumulated constraints/states.
              let mut q: VecDeque<(PrecomputeNode3Index, LLMTokenBV, StateIDBV)> = VecDeque::new();
              q.push_back((c_idx, llm_rc.clone(), s_rc.clone()));
              // Track visited triples to avoid cycles; intersections only shrink, so finiteness holds.
              let mut visited: BTreeSet<(PrecomputeNode3Index, LLMTokenBV, StateIDBV)> = BTreeSet::new();

              while let Some((u, l_acc, s_acc)) = q.pop_front() {
                  if !visited.insert((u, l_acc.clone(), s_acc.clone())) {
                      continue;
                  }
                  if let Some(ur) = u.read(trie3_god) {
                      for ((p, llm_bv), dm) in ur.children() {
                          for (v, sids_uv) in dm {
                              let new_llm = l_acc.clone() & llm_bv;
                              if new_llm.is_empty() {
                                  continue;
                              }
                              let new_sids = s_acc.clone() & sids_uv;
                              if new_sids.is_empty() {
                                  continue;
                              }
                              if *p == 0 {
                                  let v_is_end =
                                      v.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
                                  if v_is_end {
                                      if let Some(mut rw) = root_idx.write(trie3_god) {
                                          let entry = rw
                                              .children_mut()
                                              .entry((0isize, new_llm.clone()))
                                              .or_default();
                                          entry
                                              .entry(*v)
                                              .and_modify(|e| *e |= &new_sids)
                                              .or_insert(new_sids.clone());
                                          // Conservative update; exact recomputation happens after.
                                          rw.value.live_tokens |= &new_llm;
                                      }
                                  } else {
                                      q.push_back((*v, new_llm, new_sids));
                                  }
                              } else {
                                  if let Some(mut rw) = root_idx.write(trie3_god) {
                                      let entry = rw
                                          .children_mut()
                                          .entry((*p, new_llm.clone()))
                                          .or_default();
                                      entry
                                          .entry(*v)
                                          .and_modify(|e| *e |= &new_sids)
                                          .or_insert(new_sids.clone());
                                      rw.value.live_tokens |= &new_llm;
                                  }
                              }
                          }
                      }
                  }
              }

              // Remove the original specific R -> C mapping under (0, llm_rc).
              if let Some(mut rw) = root_idx.write(trie3_god) {
                  let key = (0isize, llm_rc.clone());
                  if let Some(dm) = rw.children_mut().get_mut(&key) {
                      dm.remove(&c_idx);
                      if dm.is_empty() {
                          rw.children_mut().remove(&key);
                      }
                  }
              }
          }

          // Final recomputation of live_tokens for all nodes.
          for n in &all_nodes {
              if let Some(mut w) = n.write(trie3_god) {
                  let mut new_live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in w.children() {
                      new_live |= llm_bv;
                  }
                  w.value.live_tokens = new_live;
              }
          }

          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie3_god, &roots_vec2);
          crate::debug!(
              2,
              "Eliminated {} pop=0 edges from non-root nodes.",
              total_removed
          );
      }
