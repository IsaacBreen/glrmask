              arena: &Arena<Self>,
              roots: &[Trie2Index],
              is_end: F,
              is_path_edge: G,
              max_path_length: usize,
          ) -> Vec<(T, Vec<(EK, EV, T)>)>
          where
              F: Fn(Trie2Index, &Trie<EK, EV, T>) -> bool,
              G: Fn(&EK, &EV, Trie2Index) -> bool,
              T: Clone,
              EV: Clone,
          ```

