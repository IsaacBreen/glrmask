      Here are the step-by-step instructions to refactor the `MiniTrie` structure for better performance and easier implementation of bidirectional optimization passes.

      ### Step-by-step Instructions

      #### 1. Update `src/trie3_opt/core.rs`

      This is the core of the change. We will modify `Node` to include parent pointers and `MiniTrie` to use a map for storing nodes, which allows for efficient removal and non-contiguous `NodeId`s.

      1.  In `struct Node`, add a `parents` field to store incoming edges. This makes reverse traversal efficient.
      2.  Update `Node::new` to initialize the new `parents` field.
      3.  Add an `in_degree` method to `Node` for symmetry with `out_degree`.
      4.  In `struct MiniTrie`, change `nodes` from `Vec<Node>` to `BTreeMap<NodeId, Node>`. This allows for efficient node lookups and removals.
      5.  Add a `next_node_id` field to `MiniTrie` to generate unique node IDs.
      6.  Update `MiniTrie::new` to reflect the struct changes.
      7.  Update `MiniTrie::add_node` to use `next_node_id` and insert into the `BTreeMap`.
      8.  Update `MiniTrie::add_edge` to maintain the `parents` map on the destination node, ensuring the graph is consistent.
      9.  In `MiniTrie::reachable_from_roots`, update node access from vector indexing to map lookups and iterate over map values.
      10. Rewrite `MiniTrie::can_reach_end` to use the new `parents` map for a much more efficient and cleaner implementation of reverse reachability.

      #### 2. Update `src/trie3_opt/coordinator.rs`

      The `import_from_mini` function assumed `NodeId`s were dense and could be used as vector indices. This needs to be fixed to work with the new `BTreeMap`-based node storage.

      1.  In `import_from_mini`, replace the `Vec`-based mapping from `NodeId` to `PrecomputeNode3Index` with a `BTreeMap`.
      2.  Update the loops that create and fill nodes to iterate over the `MiniTrie`'s nodes via `keys()` and `values()` and use the new map for lookups.
      3.  Adjust the root remapping logic to use the new map.

      #### 3. Update `src/trie3_opt/metrics.rs`

      The metrics calculations iterated over `trie.nodes`. This needs to be updated to iterate over the values of the new `nodes` map.

      1.  In all metric implementations (`NumEdgesMetric`, `NumEndNodesMetric`, `RootFanoutMetric`, etc.), change `trie.nodes.iter()` to `trie.nodes.values()`.
      2.  For metrics that collect nodes into a `Vec` before iterating (e.g., `RootEdgeOverlapMetric`), update the initial filtering to use `trie.nodes.values()`.

      #### 4. Update Optimization Passes

      Many passes need minor adjustments to work with the new `MiniTrie` structure. Some, like `eliminate_pop0` and `prune_dead_paths`, can be significantly simplified.

      -   **For all passes in `src/trie3_opt/passes/`**:
          -   Replace `trie.nodes.iter()` with `trie.nodes.values()`.
          -   Replace `trie.nodes.iter_mut()` with `trie.nodes.values_mut()`.
          -   Replace `&trie.nodes[id as usize]` with `trie.nodes.get(&id).unwrap()`.
          -   Replace `&mut trie.nodes[id as usize]` with `trie.nodes.get_mut(&id).unwrap()`.

      -   **`passes/eliminate_pop0.rs`**: Rewrite the pass to use the new `parents` map on nodes instead of building a local `incoming` map. This simplifies the code and improves performance.

      -   **`passes/prune_dead_paths.rs`**: Rewrite the pass to use the `parents` map instead of building a `predecessors` map.

      -   **`passes/merge_bisimulation.rs`, `passes/merge_global_atoms.rs`, `passes/merge_structural.rs`**: These passes relied on `enumerate()` over the nodes vector to get dense indices. Update them to create an explicit mapping from `NodeId` to a dense index at the beginning of the `run` method.

