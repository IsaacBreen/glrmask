              let mut i = 0usize;
              let mut j = 0usize;
              while i < self.elems.len() && j < other.elems.len() {
                  let a = self.elems[i];
                  let b = other.elems[j];
                  if a < b {
                      out.push(a);
                      i += 1;
                  } else if a > b {
                      out.push(b);
                      j += 1;
                  } else {
                      out.push(a);
                      i += 1;
                      j += 1;
