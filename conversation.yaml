                  print(f"--- Phase 3 finished. Size: {n3} nodes, {c3} children, {d3} dests. Took {time.time()-start:.1f}s ---")

              # Phase 4: Delete LLM tokens from edges (delta-debug)
              if time.time() < time_budget_deadline:
