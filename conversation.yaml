              list_of_numbers: Vec::<u32>,
              byte_buffer: Vec::<u8>,
          }

          // Example generic struct using the derive
          #[derive(Debug, Clone, PartialEq, JSONConvertible)]
          struct GenericStruct<T: JSONConvertible, U: JSONConvertible> {
              item_t: T,
