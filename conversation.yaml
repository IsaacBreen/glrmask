                  &GSSPrintConfig::default(),
              );
              println!("GSS Forest:\n{}", s);

              let popper = parent.popn(1);
              assert!(popper.paths.is_empty());
              let by_edge = popper.below_bottom.get(&1).expect("depth 1 entry missing");
              assert_eq!(by_edge.len(), 2);

              // Edge 100 (root1)
