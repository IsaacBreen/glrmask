              all_ones: Optional[RangeSet] = self.all_internal_llm_tokens_bitset
              final_mask: RangeSet = RangeSet.empty()

              # We carry only GSS per node; the per-path LLM mask lives inside PyAcc.llm_mask
              values: Dict[int, GSS] = {}
              todo: Dict[int, Set[int]] = {}
              depth_heap: List[int] = []

