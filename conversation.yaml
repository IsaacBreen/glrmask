    src/trie3_opt/passes/full/constrain.rs: |
      use std::collections::BTreeMap;

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{LLMTokenBV, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::{Trie, Trie2Index};

      /// Constrain bitvectors for tokens and states to given bounds; drop empties and merge duplicates.
      pub fn constrain_bitvecs_trie3(
          trie3_god: &Trie3GodWrapper,
          roots_vec: &[crate::constraint::PrecomputeNode3Index],
          max_state_id: usize,
          max_llm_token_id: usize,
      ) {
          crate::debug!(2, "Constraining bitvectors in Trie 3...");
          let all_nodes = Trie::all_nodes(trie3_god, roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          for node_arc in all_nodes {
              let mut guard = node_arc.write(trie3_god).unwrap();

              // Constrain live_tokens on the node value
              guard.value.live_tokens.constrain(max_llm_token_id);

              let old_children = std::mem::take(guard.children_mut());
              let mut new_children = BTreeMap::new();

              for ((pop, mut llm_bv), dest_map) in old_children {
                  llm_bv.constrain(max_llm_token_id);

                  let mut new_dest_map = OrderedHashMap::new();
                  for (dest_wrapper, mut sids_bv) in dest_map {
                      sids_bv.constrain(max_state_id);
                      if !sids_bv.is_empty() {
                          new_dest_map.insert(dest_wrapper, sids_bv);
                      }
                  }

                  if !llm_bv.is_empty() && !new_dest_map.is_empty() {
                      // Need to merge if the key (with constrained llm_bv) already exists
                      let entry = new_children
                          .entry((pop, llm_bv))
                          .or_insert_with(OrderedHashMap::new);
                      for (dest, sids) in new_dest_map {
                          entry
                              .entry(dest)
                              .and_modify(|existing_sids| *existing_sids |= &sids)
                              .or_insert(sids);
                      }
                  }
              }
              *guard.children_mut() = new_children;
          }
          crate::debug!(2, "Finished constraining bitvectors.");
      }
    src/trie3_opt/passes/full/cycles.rs: |
      use std::collections::{BTreeMap, BTreeSet, HashMap, HashSet, VecDeque};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{
          LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper,
      };
      use crate::datastructures::trie::{PathComparison, Trie};
      use crate::datastructures::EntryApi;

      /// Detect and assert absence of true cycles over pop=0 edges (token-and-state compatible).
      pub fn has_true_cycle_trie3(arena: &Trie3GodWrapper, roots: &[PrecomputeNode3Index]) {
          let all_nodes = Trie::all_nodes(arena, roots);
          if all_nodes.is_empty() {
              return;
          }

          const UNVISITED: u8 = 0;
          const VISITING: u8 = 1;
          const VISITED: u8 = 2;

          let mut states: HashMap<PrecomputeNode3Index, u8> =
              all_nodes.iter().map(|&idx| (idx, UNVISITED)).collect();

          let mut path: Vec<PrecomputeNode3Index> = Vec::new();

          for node_idx in all_nodes {
              if states.get(&node_idx) == Some(&UNVISITED) {
                  if let Some(report) =
                      detect_true_cycle_recursive_trie3_new(node_idx, arena, &mut states, &mut path)
                  {
                      panic!("{}", report);
                  }
              }
          }
      }

      fn detect_true_cycle_recursive_trie3_new(
          node_idx: PrecomputeNode3Index,
          arena: &Trie3GodWrapper,
          states: &mut HashMap<PrecomputeNode3Index, u8>,
          path: &mut Vec<PrecomputeNode3Index>,
      ) -> Option<String> {
          const UNVISITED: u8 = 0;
          const VISITING: u8 = 1;
          const VISITED: u8 = 2;

          states.insert(node_idx, VISITING);
          path.push(node_idx);

          let children_to_visit = if let Some(guard) = node_idx.read(arena) {
              guard
                  .children()
                  .iter()
                  .filter(|((pop, _), _)| *pop == 0)
                  .map(|(_ek, dm)| dm.clone())
                  .collect::<Vec<_>>()
          } else {
              Vec::new()
          };

          for dest_map in children_to_visit {
              for child_idx in dest_map.keys() {
                  match states.get(child_idx).copied().unwrap_or(UNVISITED) {
                      VISITING => {
                          if let Some(cycle_start_index) = path.iter().position(|&p| p == *child_idx) {
                              let cycle_nodes = &path[cycle_start_index..];

                              let mut llm_intersection = LLMTokenBV::max_ones();
                              let mut sids_intersection = StateIDBV::max_ones();

                              for i in 0..cycle_nodes.len() {
                                  let u = cycle_nodes[i];
                                  let v = if i + 1 < cycle_nodes.len() {
                                      cycle_nodes[i + 1]
                                  } else {
                                      *child_idx
                                  };

                                  let u_guard = u.read(arena).unwrap();
                                  let mut edge_llm_union = LLMTokenBV::zeros();
                                  let mut edge_sids_union = StateIDBV::zeros();

                                  for ((pop, llm_bv), dm) in u_guard.children() {
                                      if *pop == 0 {
                                          if let Some(sids) = dm.get(&v) {
                                              edge_llm_union |= llm_bv;
                                              edge_sids_union |= sids;
                                          }
                                      }
                                  }

                                  llm_intersection &= &edge_llm_union;
                                  sids_intersection &= &edge_sids_union;
                              }

                              if !llm_intersection.is_empty() && !sids_intersection.is_empty() {
                                  let first_violating_token = llm_intersection.iter().next().unwrap();
                                  let first_violating_state = sids_intersection.iter().next().unwrap();

                                  let mut report = format!(
                                      "LLM-compatible cycle with pop=0 detected in precompute3 trie. Example violation: internal LLM token ID {} and state ID {}.\nCycle path:\n",
                                      first_violating_token, first_violating_state
                                  );
                                  for i in 0..cycle_nodes.len() {
                                      let u = cycle_nodes[i];
                                      let v = if i + 1 < cycle_nodes.len() {
                                          cycle_nodes[i + 1]
                                      } else {
                                          *child_idx
                                      };
                                      report.push_str(&format!("  {} --> {}\n", u, v));
                                  }
                                  return Some(report);
                              }
                          }
                      }
                      UNVISITED => {
                          if let Some(report) = detect_true_cycle_recursive_trie3_new(
                              *child_idx,
                              arena,
                              states,
                              path,
                          ) {
                              return Some(report);
                          }
                      }
                      _ => {}
                  }
              }
          }

          path.pop();
          states.insert(node_idx, VISITED);
          None
      }

      pub type CycleReport3 =
          (Vec<(PrecomputeNode3Index, Option<(isize, LLMTokenBV)>)>, usize);

      pub fn has_true_cycle_trie3_llm_only(
          arena: &Trie3GodWrapper,
          roots: &[PrecomputeNode3Index],
          internal_max_llm_token: usize,
      ) {
          // We check for each token individually. This is slow but thorough.
          for llm_token_id in 0..=internal_max_llm_token {
              let mut visited: HashSet<PrecomputeNode3Index> = HashSet::new();
              for &root in roots {
                  if visited.contains(&root) {
                      continue;
                  }
                  if let Some((cycle_path, _)) = detect_true_cycle_recursive_trie3_llm_only(
                      root,
                      None,
                      llm_token_id,
                      arena,
                      &mut HashMap::new(),
                      &mut visited,
                      &mut Vec::new(),
                  ) {
                      let mut report = format!(
                          "LLM-compatible cycle with pop=0 detected in precompute3 trie for internal LLM token ID {}.\nCycle path:\n",
                          llm_token_id
                      );
                      for i in 0..cycle_path.len() {
                          let (node_idx, _) = cycle_path[i];
                          let next_i = (i + 1) % cycle_path.len();
                          let (next_node_idx, edge_to_next_opt) = &cycle_path[next_i];
                          let edge_str = edge_to_next_opt.as_ref().map_or_else(
                              || " (root edge)".to_string(),
                              |ek| format!("pop={}, llm_bv=[...]", ek.0),
                          );
                          report.push_str(&format!(
                              "  {} --[{}]--> {}\n",
                              node_idx, edge_str, next_node_idx
                          ));
                      }
                      panic!("{}", report);
                  }
              }
          }
      }

      fn detect_true_cycle_recursive_trie3_llm_only(
          node_idx: PrecomputeNode3Index,
          edge_key_opt: Option<(isize, LLMTokenBV)>,
          llm_token_id: usize,
          arena: &Trie3GodWrapper,
          recursion_stack: &mut HashMap<PrecomputeNode3Index, usize>,
          visited: &mut HashSet<PrecomputeNode3Index>,
          path: &mut Vec<(PrecomputeNode3Index, Option<(isize, LLMTokenBV)>)>,
      ) -> Option<CycleReport3> {
          path.push((node_idx, edge_key_opt));

          const UNVISITED: i8 = -1;

          if let Some(&path_start_idx) = recursion_stack.get(&node_idx) {
              let cycle_path = path[path_start_idx..].to_vec();
              path.pop();
              return Some((cycle_path, llm_token_id));
          }

          if visited.contains(&node_idx) {
              path.pop();
              return None;
          }

          recursion_stack.insert(node_idx, path.len() - 1);

          let children_to_visit = if let Some(guard) = node_idx.read(arena) {
              guard.children().clone()
          } else {
              recursion_stack.remove(&node_idx);
              path.pop();
              return None;
          };

          for (edge_key, dest_map) in children_to_visit.iter() {
              let (pop, llm_bv) = edge_key;
              if *pop == 0 && llm_bv.contains(llm_token_id) {
                  for child_idx in dest_map.keys() {
                      if let Some(report) = detect_true_cycle_recursive_trie3_llm_only(
                          *child_idx,
                          Some(edge_key.clone()),
                          llm_token_id,
                          arena,
                          recursion_stack,
                          visited,
                          path,
                      ) {
                          return Some(report);
                      }
                  }
              }
          }

          recursion_stack.remove(&node_idx);
          visited.insert(node_idx);
          path.pop();
          None
      }

      /// Extra assert: ensure pop=0 paths to end are short or redundant.
      pub fn assert_pop0_paths_to_end_are_short(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Asserting that all pop=0 paths to an end node are of length <= 1, or are redundant.");

          for root_node in roots.values() {
              // 1. Find all short pop=0 paths from this root and collect their semantics.
              let mut short_path_semantics: Vec<(LLMTokenBV, StateIDBV)> = Vec::new();
              let r = root_node.read(trie3_god).expect("root must exist");
              for ((pop, llm_bv), dm) in r.children() {
                  if *pop == 0 {
                      for (dest, sids_bv) in dm {
                          if dest.read(trie3_god).expect("dest must exist").value.end {
                              short_path_semantics.push((llm_bv.clone(), sids_bv.clone()));
                          }
                      }
                  }
              }

              // 2. Find all long pop=0 paths and check if they are covered.
              // A long path starts with a pop=0 edge from the root to a non-end node.
              for ((pop, llm_bv1), dm) in r.children() {
                  if *pop == 0 {
                      for (dest, sids_bv1) in dm {
                          if dest.read(trie3_god).expect("dest must exist").value.end {
                              continue; // This is a short path, which is fine.
                          }

                          // This is the start of a potential long path from root -> dest.
                          // Find all pop=0 paths from `dest` to any end node.
                          let mut q: VecDeque<(
                              PrecomputeNode3Index,
                              LLMTokenBV,
                              StateIDBV,
                              Vec<PrecomputeNode3Index>,
                          )> = VecDeque::new();

                          q.push_back((
                              *dest,
                              llm_bv1.clone(),
                              sids_bv1.clone(),
                              vec![*root_node, *dest],
                          ));

                          while let Some((curr, path_llm, path_sids, path_nodes)) = q.pop_front() {
                              let curr_guard = curr.read(trie3_god).expect("node must exist");

                              if curr_guard.value.end {
                                  // We found a long path. Check if it's covered.
                                  let long_llm = path_llm;
                                  let long_sids = path_sids;

                                  if long_llm.is_empty() || long_sids.is_empty() {
                                      continue; // Path is not actually traversable.
                                  }

                                  // Check coverage for every token in long_llm
                                  for t in long_llm.iter() {
                                      let mut sids_covered_for_t = StateIDBV::zeros();
                                      for (short_llm, short_sids) in &short_path_semantics {
                                          if short_llm.contains(t) {
                                              sids_covered_for_t |= short_sids;
                                          }
                                      }

                                      if !long_sids.is_subset(&sids_covered_for_t) {
                                          let violating_sids = &long_sids - &sids_covered_for_t;
                                          let first_violating_sid =
                                              violating_sids.iter().next().unwrap();
                                          let path_str = path_nodes
                                              .iter()
                                              .map(|n| n.to_string())
                                              .collect::<Vec<_>>()
                                              .join(" -> ");
                                          panic!(
                                              "Found a non-redundant pop=0 path of length > 1 to an end node.\n\
                                              Path: {}\n\
                                              The pair (llm_token={}, state_id={}) is accepted by this long path, \
                                              but not by any short (length=1) pop=0 path from the same root.",
                                              path_str, t, first_violating_sid
                                          );
                                      }
                                  }
                                  // This long path is covered. Don't traverse further from an end node.
                                  continue;
                              }

                              // Continue traversal
                              for ((pop2, llm_bv2), dm2) in curr_guard.children() {
                                  if *pop2 == 0 {
                                      for (next, sids_bv2) in dm2 {
                                          let next_path_llm = &path_llm & llm_bv2;
                                          let next_path_sids = &path_sids & sids_bv2;

                                          if !next_path_llm.is_empty() && !next_path_sids.is_empty() {
                                              // Simple cycle check on the current path being explored.
                                              if path_nodes.contains(next) {
                                                  continue;
                                              }
                                              let mut next_path_nodes = path_nodes.clone();
                                              next_path_nodes.push(*next);
                                              q.push_back((
                                                  *next,
                                                  next_path_llm,
                                                  next_path_sids,
                                                  next_path_nodes,
                                              ));
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/full/factor_root.rs: |
      use std::collections::{BTreeMap as OrderedBTreeMap, BTreeMap};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{
          LLMTokenBV, PrecomputeNode3Index, PrecomputedNodeContents, StateIDBV, Trie3GodWrapper,
      };
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;

      /// Root fanout factoring (super-pass).
      /// For each root r and pop p>0, we:
      ///  - Build token-atoms B_1..B_k that partition the union of all masks at that pop
      ///    (with a configurable cap; fallback to a single block if exceeded).
      ///  - For each atom B_j, aggregate D_j(dest) = ⋃_{edges i: B_j∩L_i≠∅} D_i(dest).
      ///  - Create an intermediate node A_j with a single outgoing key (p, B_j) and dest-map D_j.
      ///  - Add a single edge root -> A_j with (0, B_j) and SIDs = all-states.
      /// Pop=0 edges out of the root are left unchanged. This preserves semantics exactly and
      /// reduces root out-degree from “sum of dest entries across p>0 edges” to “#atoms per pop”.
      pub fn factor_root_fanout_via_atoms(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          max_atoms_per_pop: usize,
      ) {
          crate::debug!(
              2,
              "Factoring root fanout via token atoms (p>0 only, cap={} atoms/pop)...",
              max_atoms_per_pop
          );
          if roots.is_empty() {
              return;
          }

          let all_states_bv = StateIDBV::ones(max_state_id + 1);

          // Iterate over roots one-by-one; roots are few so cloning their children is cheap.
          for root_idx in roots.values() {
              // Snapshot original children to allow safe fallback.
              let original_children = if let Some(r) = root_idx.read(trie3_god) {
                  r.children().clone()
              } else {
                  continue;
              };
              if original_children.is_empty() {
                  continue;
              }

              use std::collections::BTreeMap as BTM;
              // Separate pop=0 edges (kept as-is) and pop>0 edges (to be factored).
              let mut keep_children: BTM<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> =
                  BTM::new();
              let mut by_pop: BTM<
                  isize,
                  Vec<(
                      LLMTokenBV,
                      OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
                  )>,
              > = BTM::new();
              let mut any_p_gt_0 = false;

              for ((pop, llm_bv), dm) in original_children {
                  if pop <= 0 {
                      keep_children.insert((pop, llm_bv), dm);
                  } else {
                      any_p_gt_0 = true;
                      // Constrain bitsets for safety and drop empties.
                      let mut l = llm_bv.clone();
                      l.constrain(max_llm_token_id);
                      if l.is_empty() {
                          continue;
                      }
                      let mut dm2: OrderedHashMap<PrecomputeNode3Index, StateIDBV> =
                          OrderedHashMap::new();
                      for (dst, mut sids) in dm {
                          sids.constrain(max_state_id);
                          if !sids.is_empty() {
                              dm2.insert(dst, sids);
                          }
                      }
                      if dm2.is_empty() {
                          continue;
                      }
                      by_pop.entry(pop).or_default().push((l, dm2));
                  }
              }

              if !any_p_gt_0 {
                  // Nothing to factor for this root.
                  continue;
              }

              let mut new_children = keep_children;
              let mut made_progress = false;

              for (pop, entries) in by_pop {
                  if entries.is_empty() {
                      continue;
                  }
                  // Compute the union of all masks at this pop.
                  let mut universe = LLMTokenBV::zeros();
                  for (l, _) in &entries {
                      universe |= l;
                  }
                  universe.constrain(max_llm_token_id);
                  if universe.is_empty() {
                      continue;
                  }

                  // Compute token-atoms with a cap; fallback to a single block if exceeded.
                  let mut blocks: Vec<LLMTokenBV> = vec![universe.clone()];
                  let mut aborted = false;
                  for (l, _) in &entries {
                      let mut next_blocks: Vec<LLMTokenBV> =
                          Vec::with_capacity(blocks.len().saturating_mul(2));
                      for b in blocks.iter() {
                          let inter = b & l;
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff = b - l;
                          if !diff.is_empty() {
                              next_blocks.push(diff);
                          }
                      }
                      if next_blocks.len() > max_atoms_per_pop && max_atoms_per_pop > 0 {
                          aborted = true;
                          break;
                      }
                      blocks = next_blocks;
                      if blocks.is_empty() {
                          break;
                      }
                  }
                  if aborted || blocks.is_empty() {
                      blocks = vec![universe.clone()];
                  }

                  // For each atom, aggregate destination maps and build an intermediate node.
                  for b in blocks {
                      let mut dest_agg: BTM<PrecomputeNode3Index, StateIDBV> = BTM::new();
                      for (l, dm) in &entries {
                          if (&b & l).is_empty() {
                              continue;
                          }
                          for (dst, sids) in dm {
                              dest_agg
                                  .entry(*dst)
                                  .and_modify(|e| *e |= sids)
                                  .or_insert_with(|| sids.clone());
                          }
                      }
                      if dest_agg.is_empty() {
                          continue;
                      }

                      // Create an intermediate node with a single outgoing key (pop, b).
                      let mid = PrecomputeNode3Index::new(
                          trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())),
                      );
                      {
                          let mut mw = mid.write(trie3_god).expect("write");
                          let mut dm_out: OrderedHashMap<PrecomputeNode3Index, StateIDBV> =
                              OrderedHashMap::new();
                          for (dst, sids) in dest_agg {
                              dm_out.insert(dst, sids);
                          }
                          mw.children_mut().insert((pop, b.clone()), dm_out);
                          mw.value.live_tokens = b.clone();
                      }
                      // Root -> mid uses (0, b) and SIDs = all states.
                      new_children
                          .entry((0, b.clone()))
                          .or_insert_with(OrderedHashMap::new)
                          .insert(mid, all_states_bv.clone());
                      made_progress = true;
                  }
              }

              if made_progress {
                  if let Some(mut rw) = root_idx.write(trie3_god) {
                      // Recompute live tokens as the union of outgoing LLM masks.
                      let mut live = LLMTokenBV::zeros();
                      for ((_, l), _) in &new_children {
                          live |= l;
                      }
                      rw.value.live_tokens = live;
                      *rw.children_mut() = new_children;
                  }
              }
          }
      }
    src/trie3_opt/passes/full/factoring.rs: |
      use std::collections::{BTreeMap, HashMap};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{
          LLMTokenBV, PrecomputeNode3Index, PrecomputedNodeContents, StateIDBV, Trie3GodWrapper,
      };
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;

      /// Reduces state fanout by factoring edges. For each node, it groups outgoing edges
      /// by (pop, destination). For each group, it merges the edges by unioning their
      /// token sets and state ID sets. This can reduce the number of distinct edges
      /// a single (pop, state_id) transition can take, thus lowering state fanout.
      pub fn factor_state_fanout_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Factoring state fanout in Trie3...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          for node_idx in &all_nodes {
              if let Some(mut w) = node_idx.write(trie3_god) {
                  if w.children().is_empty() {
                      continue;
                  }

                  let old_children = std::mem::take(w.children_mut());

                  // Step 1: Deconstruct children into a per-destination view.
                  // Map from (pop, dest) -> list of (tokens, states)
                  let mut per_dest: BTreeMap<(isize, PrecomputeNode3Index), Vec<(LLMTokenBV, StateIDBV)>> =
                      BTreeMap::new();

                  for ((pop, tokens), dm) in &old_children {
                      for (dest, states) in dm {
                          per_dest
                              .entry((*pop, *dest))
                              .or_default()
                              .push((tokens.clone(), states.clone()));
                      }
                  }

                  // Step 2: For each (pop, dest), merge edges with identical state sets by unioning token sets.
                  let mut merged_per_dest: BTreeMap<
                      (isize, PrecomputeNode3Index),
                      Vec<(LLMTokenBV, StateIDBV)>,
                  > = BTreeMap::new();
                  for ((pop, dest), edges) in per_dest {
                      // Group by state set
                      let mut by_states: BTreeMap<StateIDBV, LLMTokenBV> = BTreeMap::new();
                      for (tokens, states) in edges {
                          let entry = by_states.entry(states).or_default();
                          *entry |= &tokens;
                      }

                      let new_edges: Vec<(LLMTokenBV, StateIDBV)> =
                          by_states.into_iter().map(|(s, t)| (t, s)).collect();
                      merged_per_dest.insert((pop, dest), new_edges);
                  }

                  // Step 3: Reconstruct node.children from the per-destination merged edges.
                  let mut new_children: BTreeMap<
                      (isize, LLMTokenBV),
                      OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
                  > = BTreeMap::new();
                  for ((pop, dest), edges) in merged_per_dest {
                      for (tokens, states) in edges {
                          if tokens.is_empty() || states.is_empty() {
                              continue;
                          }
                          new_children
                              .entry((pop, tokens))
                              .or_default()
                              .insert(dest, states);
                      }
                  }

                  // Recompute live tokens and update children
                  let mut new_live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &new_children {
                      new_live |= llm_bv;
                  }
                  w.value.live_tokens = new_live;
                  *w.children_mut() = new_children;
              }
          }
      }

      /// Factor out common destinations: create intermediates when many sources share the same dest map.
      pub fn factor_common_destinations_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          min_incoming: usize,
      ) {
          crate::debug!(2, "Factoring out common destinations in Trie3.");
          // use dynamic threshold provided by config via min_incoming
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let all_llm_bv = LLMTokenBV::ones(max_llm_token_id + 1);
          let all_sids_bv = StateIDBV::ones(max_state_id + 1);

          // Map: dest -> { (pop, llm_bv) -> { state_id_bv -> [sources] } }
          let mut incoming_map: HashMap<
              PrecomputeNode3Index,
              HashMap<(isize, LLMTokenBV), HashMap<StateIDBV, Vec<PrecomputeNode3Index>>>,
          > = HashMap::new();

          for src_idx in &all_nodes {
              let guard = src_idx.read(trie3_god).expect("read");
              for (edge_key, dest_map) in guard.children() {
                  for (dest_idx, sids_bv) in dest_map {
                      incoming_map
                          .entry(*dest_idx)
                          .or_default()
                          .entry(edge_key.clone())
                          .or_default()
                          .entry(sids_bv.clone())
                          .or_default()
                          .push(*src_idx);
                  }
              }
          }

          for (dest_idx, edges_by_key) in incoming_map {
              for (edge_key, sources_by_sids) in edges_by_key {
                  for (sids_bv, sources) in sources_by_sids {
                      if sources.len() >= min_incoming {
                          // Create intermediate node
                          let intermediate_node = PrecomputeNode3Index::new(
                              trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())),
                          );

                          // Add edge from intermediate to original destination
                          {
                              let mut intermediate_guard =
                                  intermediate_node.write(trie3_god).expect("write");
                              let dest_map = intermediate_guard.children_mut().entry(edge_key.clone()).or_default();
                              dest_map.insert(dest_idx, sids_bv.clone());
                              intermediate_guard.value.live_tokens |= &edge_key.1;
                          }

                          // Reroute sources to point to intermediate node
                          for src_idx in &sources {
                              let mut src_guard = src_idx.write(trie3_god).expect("write");

                              // Remove old edge
                              if let Some(dest_map_for_key) = src_guard.children_mut().get_mut(&edge_key) {
                                  dest_map_for_key.remove(&dest_idx);
                                  if dest_map_for_key.is_empty() {
                                      src_guard.children_mut().remove(&edge_key);
                                  }
                              }

                              // Add new edge to intermediate node. This is a "None-like" edge.
                              // pop=0, all llm tokens, all state ids.
                              let none_like_edge_key = (0, all_llm_bv.clone());
                              let dest_map =
                                  src_guard.children_mut().entry(none_like_edge_key).or_default();
                              dest_map.insert(intermediate_node, all_sids_bv.clone());
                              // Recompute live tokens from scratch after modifying edges.
                              let mut new_live = LLMTokenBV::zeros();
                              for ((_, llm_bv), _) in src_guard.children() {
                                  new_live |= llm_bv;
                              }
                              src_guard.value.live_tokens = new_live;
                          }
                      }
                  }
              }
          }
          crate::debug!(2, "Finished factoring common destinations in Trie3.");
      }
    src/trie3_opt/passes/full/generalize.rs: |
      use std::collections::{BTreeMap, HashMap, VecDeque};

      use crate::constraint::{PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;
      use crate::glr::parser::GLRParser;
      use crate::glr::table::StateID;
      use crate::tokenizer::TokenizerStateID;

      /// Propagate possible parser states across the trie (respecting pop deltas)
      /// and generalize edge StateID bitvectors accordingly.
      ///
      /// This implementation computes a conservative "possible states" set per node by
      /// seeding all roots with all states, pushing forward along edges while applying
      /// n-step predecessors for pop>0 edges. It currently computes the fixed-point but
      /// does not modify the trie with the results. It is safe and provides a basis for
      /// downstream passes that may choose to use the propagated sets.
      pub fn propagate_and_generalize_sids_trie3(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          parser: &GLRParser,
          max_state_id: usize,
      ) {
          crate::debug!(2, "Propagating possible states to generalize StateIDBVs in Trie3...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Part A: Pre-computation
          let one_step_back_map = parser.build_one_step_back_map();

          let mut max_pop = 0;
          for node_idx in &all_nodes {
              let r = node_idx.read(trie3_god).expect("read");
              for ((pop, _), _) in r.children() {
                  if *pop > 0 {
                      max_pop = max_pop.max(*pop as usize);
                  }
              }
          }

          if max_pop == 0 {
              crate::debug!(2, "No pop > 0 edges found, skipping SID generalization.");
              return;
          }

          // Precompute T_{2^k} maps using repeated composition up to ceil(log2(max_pop))
          let num_levels = (max_pop as f64).log2().ceil() as usize + 1;
          let mut two_power_back_maps: Vec<BTreeMap<StateID, StateIDBV>> = Vec::with_capacity(num_levels);
          two_power_back_maps.push(one_step_back_map);

          for i in 1..num_levels {
              let prev_map = &two_power_back_maps[i - 1];
              let mut next_map: BTreeMap<StateID, StateIDBV> = BTreeMap::new();
              for (&state_id, preds1) in prev_map {
                  let mut preds2 = StateIDBV::zeros();
                  for pred1_val in preds1.iter() {
                      let sid = StateID(pred1_val);
                      if let Some(preds_of_pred) = prev_map.get(&sid) {
                          preds2 |= preds_of_pred;
                      }
                  }
                  if !preds2.is_empty() {
                      next_map.insert(state_id, preds2);
                  }
              }
              two_power_back_maps.push(next_map);
          }

          // Helper for T_n(S): apply the predecessor relation n times using the cached powers-of-two
          let apply_n_step_back = |s: &StateIDBV, n: usize| -> StateIDBV {
              let mut current_s = s.clone();
              for k in 0..two_power_back_maps.len() {
                  if (n >> k) & 1 == 1 {
                      let map_k = &two_power_back_maps[k];
                      let mut next_s = StateIDBV::zeros();
                      for state_id_val in current_s.iter() {
                          let state_id = StateID(state_id_val);
                          if let Some(preds) = map_k.get(&state_id) {
                              next_s |= preds;
                          }
                      }
                      current_s = next_s;
                  }
              }
              current_s
          };

          // Part B: Worklist propagation of possible states along trie edges.
          let mut possible_states: HashMap<PrecomputeNode3Index, StateIDBV> = HashMap::new();
          let mut worklist: VecDeque<PrecomputeNode3Index> = VecDeque::new();

          let all_states_bv = StateIDBV::ones(max_state_id + 1);
          for root_idx in roots.values() {
              possible_states.insert(*root_idx, all_states_bv.clone());
              worklist.push_back(*root_idx);
          }

          while let Some(u_idx) = worklist.pop_front() {
              let s_u = possible_states
                  .get(&u_idx)
                  .cloned()
                  .unwrap_or_else(StateIDBV::zeros);
              if s_u.is_empty() {
                  continue;
              }

              let u_guard = u_idx.read(trie3_god).expect("read");
              for ((pop, _), dest_map) in u_guard.children() {
                  let s_u_popped = if *pop > 0 {
                      apply_n_step_back(&s_u, *pop as usize)
                  } else {
                      s_u.clone()
                  };

                  if s_u_popped.is_empty() {
                      continue;
                  }

                  for (v_idx, sids_uv) in dest_map {
                      let s_transmitted = &s_u_popped & sids_uv;
                      if s_transmitted.is_empty() {
                          continue;
                      }

                      let s_v_old = possible_states.entry(*v_idx).or_default();
                      let old_len = s_v_old.len();
                      *s_v_old |= &s_transmitted;
                      if s_v_old.len() > old_len {
                          worklist.push_back(*v_idx);
                      }
                  }
              }
          }

          // Note: We currently compute 'possible_states' but do not update edges in-place.
          // If you want to use this information to shrink SIDs per edge safely, you can
          // intersect edge SIDs with the destination's 'possible_states' or the appropriate
          // preimage projection considering pops. Left as a safe no-op for the split pipeline.
      }
