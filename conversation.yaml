              crate::debug!(6, "--- combine_right_into_on_shared ---");
              crate::debug!(6, "--- WEIGHT: {} ---", weight);
              crate::debug!(6, "States before combine:\n{}", states);
              crate::debug!(6, "LEFT AugmentedNWA:\n{}", left);
              crate::debug!(6, "RIGHT AugmentedNWA:\n{}", right);

