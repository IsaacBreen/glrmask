          );

          // Initial state and step
          let mut state = constraint.init();
          let mask = state.get_mask();
          // Expect LLM tokens that can start an expression: i (0), '(' (1), "(i" (3)
          assert_eq!(mask, HybridBitset::from_iter(vec![0, 1, 3]));

