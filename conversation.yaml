          def __init__(self, roots_map: List[Tuple[int, int]], arena: Dict[int, dict]):
              self.roots_map: Dict[int, int] = {int(s): int(r) for s, r in roots_map}
              self.arena: Dict[int, dict] = arena
              self.id_to_token: Dict[int, bytes] = {}
