      +// --- Action History Path Formatting ---
      +
      +/// Gets the sequence of actions leading to this node.
      +pub fn get_action_path(leaf: &Arc<ActionHistoryNode>) -> Vec<Action> {
      +    let mut path = Vec::new();
      +    let mut current = Some(leaf.clone());
      +    while let Some(node_arc) = current {
      +        let node_ref = node_arc.as_ref(); // Borrow node_arc
      +        path.push(node_ref.action.clone());
      +        current = node_ref.parent.clone(); // Clone the Option<Arc>
      +    }
      +    path.reverse(); // Reverse to get chronological order (Start -> ... -> leaf)
      +    path
      +}
      +
      +/// Finds the longest action path among a set of leaf nodes.
      +pub fn find_longest_action_path(leaves: &[Arc<ActionHistoryNode>]) -> Vec<Action> {
      +    leaves.iter()
      +        .map(get_action_path)
      +        .max_by_key(|path| path.len())
      +        .unwrap_or_default()
       }
       
