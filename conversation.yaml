      }
      #[derive(Debug)]
      struct Stage3Row {
          shifts: BTreeMap<Terminal, BTreeSet<Item>>,
          gotos: BTreeMap<NonTerminal, BTreeSet<Item>>,
          reduces: BTreeMap<Terminal, BTreeSet<Item>>,
      }
      #[derive(Debug)]
      struct Stage4Row {
          shifts: BTreeMap<Terminal, BTreeSet<Item>>,
          gotos: BTreeMap<NonTerminal, BTreeSet<Item>>,
