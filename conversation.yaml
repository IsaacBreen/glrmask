              // A --(5, c0)--> B --(-2, c2)--> C --(0, None)--> T
              // A --(4, c1)--> B --(1, c7)--> D --(0, None)--> T2
              let god = TestGod::new();
              let a = new_node(&god);
              let b = new_node(&god);
              let c = new_node(&god);
              let d = new_node(&god);
              let t = new_node(&god);
              let t2 = new_node(&god);

              add_edge(&god, a, b, TestEK::new(5, Some(0)));
              add_edge(&god, a, b, TestEK::new(4, Some(1)));
