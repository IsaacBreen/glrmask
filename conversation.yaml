          fn internal_determinize_to_dwa_fast(&self) -> DWA {
              type StepVec = Arc<Vec<(NWAStateID, Weight)>>;

              #[derive(Clone)]
              struct StepVecKey {
                  entries: StepVec,
                  fp: u64,
              }
              impl StepVecKey {
                  fn new(entries: StepVec) -> Self {
                      // robust fingerprint mix across (state, weight.fp)
                      let mut fp = FP_ZERO;
