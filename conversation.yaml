                              print(f"{prefix}└── Edge (pop: {pop}, tokens: {llm_bv_str}): states {state_bv_str} -> Node Trie2Index({dest_idx}) (MaxDepth: {max_depth.get(dest_idx, 0)}){dest_end_marker}")

