              if !visited.insert(idx1) { continue; }

              let idx2 = *node_map.get(&idx1).unwrap();
              let guard1 = idx1.read(god1).unwrap();

              for (edge_key1, dest_map1) in guard1.children() {
                  for (child1_idx, _) in dest_map1 {
