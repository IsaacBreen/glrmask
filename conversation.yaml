                          disallowed_terminals_l2 = get_disallowed_terminals_py(gss_node)
                          possible_matches = self.possible_matches_cache

                          for (start, end), disallowed_bv in disallowed_terminals_l2.range_values():
                              if disallowed_bv.is_empty():
