                                          inter_cache[key] = child_mask
                                      # print(f"        - Edge: dest={dest_idx}, llm_bv={'None' if llm_bv is None else llm_bv.to_ranges()}")
                                      # print(f"          - Child mask: {child_mask.to_ranges()}")

