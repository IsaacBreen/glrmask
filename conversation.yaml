          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let tokenizer = obj.remove("tokenizer").ok_or_else(|| "Missing field tokenizer".to_string())
                                         .and_then(Regex::from_json)?;
