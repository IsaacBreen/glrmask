    src/trie3_opt/context.rs: |
      use std::cell::RefCell;
      use std::collections::BTreeMap;
      use std::fmt;
      use std::rc::Rc;

      use crate::constraint::StageVocab;
      use crate::glr::parser::GLRParser;

      /// Shared, immutable and mutable context passed to every optimization pass.
      /// Keeps global bounds and simple telemetry.
      #[derive(Clone)]
      pub struct OptimizationContext<'a> {
          pub max_llm_token_id: usize,
          pub max_state_id: usize,
          pub iteration_budget: usize,
          pub debug_level: u8,
          pub metrics_before: BTreeMap<String, String>,
          pub metrics_after: BTreeMap<String, String>,
          // New fields for advanced passes
          pub stage_vocab: Option<Rc<RefCell<&'a mut StageVocab>>>,
          pub parser: Option<Rc<RefCell<&'a GLRParser>>>,
      }

      impl<'a> OptimizationContext<'a> {
          pub fn new(max_llm_token_id: usize, max_state_id: usize) -> Self {
              Self {
                  max_llm_token_id,
                  max_state_id,
                  iteration_budget: 1_000_000,
                  debug_level: 1,
                  metrics_before: BTreeMap::new(),
                  metrics_after: BTreeMap::new(),
                  stage_vocab: None,
                  parser: None,
              }
          }
      }

      impl<'a> fmt::Debug for OptimizationContext<'a> {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              f.debug_struct("OptimizationContext")
                  .field("max_llm_token_id", &self.max_llm_token_id)
                  .field("max_state_id", &self.max_state_id)
                  .field("iteration_budget", &self.iteration_budget)
                  .field("debug_level", &self.debug_level)
                  .field("metrics_before", &self.metrics_before)
                  .field("metrics_after", &self.metrics_after)
                  .field("stage_vocab_present", &self.stage_vocab.is_some())
                  .field("parser_present", &self.parser.is_some())
                  .finish()
          }
      }
    src/trie3_opt/coordinator.rs: |
      use std::cell::RefCell;
      use std::collections::{BTreeMap, HashMap};
      use std::rc::Rc;

      use ordered_hash_map::OrderedHashMap;
      use kdam::BarExt;

      use crate::profiler::PROGRESS_BAR_ENABLED;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::metrics::run_all_metrics;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::*;

      use crate::constraint::{
          PrecomputeNode3Index, PrecomputedNodeContents, Trie3GodWrapper, LLMTokenBV, StateIDBV,
      };
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::constraint::StageVocab;

      /// Configuration for the coordinator: which passes to run and their key parameters.
      #[derive(Clone, Debug)]
      pub struct CoordinatorConfig {
          pub num_passes: usize,
          pub prune_dead_paths: bool,
          pub prune_unproductive_paths: bool,
          pub canonicalize_end_nodes: bool,
          pub compress_edges: bool,
          pub compress_unary_chains: bool,
          pub factor_state_fanout: bool,
          pub factor_common_destinations: bool,
          pub factor_common_destinations_min_incoming: usize,
          pub factor_root_fanout: bool,
          pub factor_root_fanout_max_atoms_per_pop: usize,
          pub merge_structural_max_iters: usize,
          pub merge_bisimulation_max_iters: usize,
          pub merge_global_atoms: bool,
          pub merge_global_atoms_max_iters: usize,
          pub merge_global_atoms_max_atoms_per_pop: usize,
          pub eliminate_pop0_except_roots: bool,
          pub merge_equivalent_llm_tokens: bool,
          pub reorder_llm_tokens: bool,
          pub generalize_sids: bool,
      }

      impl Default for CoordinatorConfig {
          fn default() -> Self {
              Self {
                  num_passes: 3,
                  prune_dead_paths: true,
                  prune_unproductive_paths: true,
                  canonicalize_end_nodes: true,
                  compress_edges: true,
                  compress_unary_chains: true,
                  factor_state_fanout: true,
                  factor_common_destinations: true,
                  factor_common_destinations_min_incoming: 12,
                  factor_root_fanout: true,
                  factor_root_fanout_max_atoms_per_pop: 512,
                  merge_structural_max_iters: 4,
                  merge_bisimulation_max_iters: 1000,
                  merge_global_atoms: true,
                  merge_global_atoms_max_iters: 2,
                  merge_global_atoms_max_atoms_per_pop: 4096,
                  eliminate_pop0_except_roots: true,
                  merge_equivalent_llm_tokens: true,
                  reorder_llm_tokens: true,
                  generalize_sids: true,
              }
          }
      }

      impl CoordinatorConfig {
          pub fn off() -> Self {
              Self {
                  num_passes: 0,
                  prune_dead_paths: false,
                  prune_unproductive_paths: false,
                  canonicalize_end_nodes: false,
                  compress_edges: false,
                  compress_unary_chains: false,
                  factor_state_fanout: false,
                  factor_common_destinations: false,
                  factor_common_destinations_min_incoming: 0,
                  factor_root_fanout: false,
                  factor_root_fanout_max_atoms_per_pop: 0,
                  merge_structural_max_iters: 0,
                  merge_bisimulation_max_iters: 0,
                  merge_global_atoms: false,
                  merge_global_atoms_max_iters: 0,
                  merge_global_atoms_max_atoms_per_pop: 0,
                  eliminate_pop0_except_roots: false,
                  merge_equivalent_llm_tokens: false,
                  reorder_llm_tokens: false,
                  generalize_sids: false,
              }
          }
      }

      /// Build a default sequence of passes from config.
      fn build_pipeline(config: &CoordinatorConfig) -> Vec<Box<dyn OptimizationPass>> {
          let mut pipeline: Vec<Box<dyn OptimizationPass>> = Vec::new();

          // The pipeline is structured to run in super-passes.
          for pass_num in 0..config.num_passes {
              // Phase 1: Pruning and initial cleanup
              if config.prune_dead_paths {
                  pipeline.push(Box::new(PruneDeadPathsPass));
              }
              if config.prune_unproductive_paths {
                  pipeline.push(Box::new(PruneUnproductivePathsPass));
              }
              if config.canonicalize_end_nodes {
                  pipeline.push(Box::new(CanonicalizeEndNodesPass));
              }

              // Phase 2: Vocabulary and State ID optimization
              if config.merge_equivalent_llm_tokens {
                  pipeline.push(Box::new(MergeEquivalentLLMTokensPass));
              }
              if config.reorder_llm_tokens {
                  pipeline.push(Box::new(ReorderLLMTokensPass));
              }
              if config.generalize_sids {
                  pipeline.push(Box::new(GeneralizeSidsPass));
              }

              // Phase 3: Factoring and structural simplification
              if config.factor_root_fanout {
                  pipeline.push(Box::new(FactorRootFanoutPass::new(config.factor_root_fanout_max_atoms_per_pop)));
              }
              if config.factor_state_fanout {
                  pipeline.push(Box::new(FactorStateFanoutPass));
              }
              if config.factor_common_destinations {
                  pipeline.push(Box::new(FactorCommonDestinationsPass::new(config.factor_common_destinations_min_incoming)));
              }

              // Phase 4: Edge compression and chain contraction
              if config.compress_edges {
                  pipeline.push(Box::new(CompressEdgesPass));
              }
              if config.compress_unary_chains {
                  pipeline.push(Box::new(CompressUnaryChainsPass));
              }

              // Phase 5: Heavy-duty merging passes
              if config.merge_global_atoms && config.merge_global_atoms_max_iters > 0 {
                  pipeline.push(Box::new(MergeGlobalAtomsPass::new(
                      config.merge_global_atoms_max_iters,
                      config.merge_global_atoms_max_atoms_per_pop,
                  )));
              }
              if config.merge_structural_max_iters > 0 {
                  pipeline.push(Box::new(MergeStructuralPass::new(config.merge_structural_max_iters)));
              }
              if pass_num == config.num_passes - 1 && config.merge_bisimulation_max_iters > 0 {
                   pipeline.push(Box::new(MergeBisimulationPass::new(config.merge_bisimulation_max_iters)));
              }

              // Phase 6: Final cleanup within the loop
              if config.eliminate_pop0_except_roots {
                  pipeline.push(Box::new(EliminatePop0ExceptRootsPass));
              }
              if config.compress_edges { // Re-compress after merges and pop0 elim
                  pipeline.push(Box::new(CompressEdgesPass));
              }
          }

          // Final polish outside the main loop
          if config.canonicalize_end_nodes {
              pipeline.push(Box::new(CanonicalizeEndNodesPass));
          }

          pipeline
      }

      /// Convert the given precompute3 trie into a MiniTrie along with a stable list of root keys.
      pub(crate) fn export_to_mini(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) -> (MiniTrie, Vec<(TokenizerStateID, NodeId)>, HashMap<PrecomputeNode3Index, NodeId>) {
          let mut mini = MiniTrie::new();
          let mut map_old_to_new: HashMap<PrecomputeNode3Index, NodeId> = HashMap::new();

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);

          // First, create all nodes in MiniTrie and map old to new
          #[cfg(not(rustrover))]
          let it_create = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (create nodes)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_create = all_nodes.iter();
          for old_idx in it_create {
              let end = old_idx.read(trie3_god).map(|g| g.value.end).unwrap_or(false);
              let id = mini.add_node(end);
              map_old_to_new.insert(*old_idx, id);
          }

          // Mark roots in MiniTrie
          for r_idx in &roots_vec {
              if let Some(&id) = map_old_to_new.get(r_idx) {
                  mini.add_root(id);
              }
          }

          // Second, add all edges
          #[cfg(not(rustrover))]
          let it_edges = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Export (add edges)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it_edges = all_nodes.iter();
          for old_idx in it_edges {
              let new_id = *map_old_to_new.get(&old_idx).unwrap();
              let r = if let Some(g) = old_idx.read(trie3_god) { g } else { continue };

              for (ek, dm) in r.children() {
                  // Build token set
                  let mut toks = SortedSet::new();
                  if ek.1.is_all() {
                      toks = SortedSet::from_iter(0..=max_llm_token_id);
                  } else {
                      for t in ek.1.iter() {
                          toks.insert(t);
                      }
                  }
                  if toks.is_empty() {
                      continue;
                  }
                  let key = crate::trie3_opt::core::EdgeKey::new(ek.0, toks.clone());
                  for (dst, sids) in dm {
                      let dst_id = *map_old_to_new.get(dst).unwrap();
                      // Build state set
                      let mut st = SortedSet::new();
                      if sids.is_all() {
                          st = SortedSet::from_iter(0..=max_state_id);
                      } else {
                          for s in sids.iter() {
                              st.insert(s);
                          }
                      }
                      if !st.is_empty() {
                          mini.add_edge(new_id, key.clone(), dst_id, st);
                      }
                  }
              }
          }

          // Stable root list preserving the original key ordering
          let mut root_pairs: Vec<(TokenizerStateID, NodeId)> = Vec::new();
          for (k, r) in roots {
              if let Some(id) = map_old_to_new.get(r).cloned() {
                  root_pairs.push((*k, id));
              }
          }

          (mini, root_pairs, map_old_to_new)
      }

      /// Import a MiniTrie back into the precompute3 arena by constructing a fresh graph.
      /// - All new nodes are inserted; roots remapped to these.
      /// - Old nodes become unreachable and are GC'd.
      /// - live_tokens are recomputed from outgoing edges.
      /// - end flags are set from the mini-trie.
      pub(crate) fn import_from_mini(
          mini: &MiniTrie,
          root_pairs: &[(TokenizerStateID, NodeId)],
          trie3_god: &Trie3GodWrapper,
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          ctx: &OptimizationContext,
      ) {
          // Create all nodes first
          let mut new_nodes: Vec<PrecomputeNode3Index> = Vec::with_capacity(mini.nodes.len());
          for _ in 0..mini.nodes.len() {
              let idx = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(PrecomputedNodeContents::internal())));
              new_nodes.push(idx);
          }

          // Fill end flags and edges
          for node in &mini.nodes {
              let idx = new_nodes[node.id as usize];
              if let Some(mut w) = idx.write(trie3_god) {
                  w.value.end = node.end;

                  let mut children: BTreeMap<(isize, LLMTokenBV), OrderedHashMap<PrecomputeNode3Index, StateIDBV>> = BTreeMap::new();

                  for (ek, dm) in node.children.iter() {
                      // Build LLMTokenBV from tokens set
                      let mut bv = LLMTokenBV::zeros();
                      for t in ek.tokens.iter() {
                          if t <= ctx.max_llm_token_id {
                              bv.insert(t);
                          }
                      }
                      if bv.is_empty() {
                          continue;
                      }

                      let entry = children.entry((ek.pop, bv.clone())).or_insert_with(OrderedHashMap::new);
                      for (dst, sset) in dm {
                          let mut sbv = StateIDBV::zeros();
                          for s in sset.iter() {
                              if s <= ctx.max_state_id {
                                  sbv.insert(s);
                              }
                          }
                          if sbv.is_empty() {
                              continue;
                          }
                          let dst_idx = new_nodes[*dst as usize];
                          entry.entry(dst_idx)
                              .and_modify(|e| *e |= &sbv)
                              .or_insert(sbv);
                      }
                  }

                  // Recompute live tokens from children
                  let mut live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &children {
                      live |= llm_bv;
                  }
                  w.value.live_tokens = live;
                  *w.children_mut() = children;
              }
          }

          // Remap roots to new nodes
          roots.clear();
          for (key, nid) in root_pairs {
              let idx = new_nodes[*nid as usize];
              roots.insert(*key, idx);
          }

          // GC and recompute depths
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie3_god, &roots_vec);
          Trie::recompute_all_max_depths(trie3_god, &roots_vec);
      }

      /// High-level entry point: export -> run passes on mini -> import.
      /// The coordinator isolates optimization authors from the full system types: they only need
      /// to implement passes over MiniTrie and add them to the pipeline here.
      pub fn run_pipeline_on_precompute3<'a>(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          config: CoordinatorConfig,
          stage_vocab: Option<&'a mut StageVocab>,
          parser: Option<&'a GLRParser>,
      ) {
          // Export the current graph into a minimal structure
          let (mut mini, root_pairs, _old_mapping) =
              export_to_mini(roots, trie3_god, max_llm_token_id, max_state_id);

          // Build a fresh pass pipeline and context
          let mut ctx = OptimizationContext::new(max_llm_token_id, max_state_id);
          if let Some(sv) = stage_vocab {
              ctx.stage_vocab = Some(Rc::new(RefCell::new(sv)));
          }
          if let Some(p) = parser {
              ctx.parser = Some(Rc::new(RefCell::new(p)));
          }
          ctx.debug_level = 1;

          // Run initial metrics
          ctx.metrics_before = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(
                  1,
                  "[Trie3 Opt] Metrics before optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_before)
              );
          }

          let pipeline = build_pipeline(&config);

          // Run passes
          for pass in pipeline.iter() {
              if ctx.debug_level > 0 {
                  crate::debug!(1, "[Trie3 Opt] Running pass: {}", pass.name());
              }
              pass.run(&mut mini, &mut ctx);
              if ctx.debug_level > 0 {
                  let metrics = run_all_metrics(&mini);
                  crate::debug!(
                      1,
                      "[Trie3 Opt] Metrics after '{}': {}",
                      pass.name(),
                      crate::trie3_opt::metrics::pretty_print_metrics_map(&metrics)
                  );
              }
          }

          // Run final metrics
          ctx.metrics_after = run_all_metrics(&mini);
          if ctx.debug_level > 0 {
              crate::debug!(1, "[Trie3 Opt] Metrics after optimization: {}",
                  crate::trie3_opt::metrics::pretty_print_metrics_map(&ctx.metrics_after)
              );
          }

          // Import the result back and finalize
          import_from_mini(&mini, &root_pairs, trie3_god, roots, &ctx);
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::constraint::{LLMTokenBV, StateIDBV};
          use crate::datastructures::trie::Trie;
          use ordered_hash_map::OrderedHashMap;

          // A very basic roundtrip sanity test on a trivial graph.
          #[test]
          fn roundtrip_basic() {
              // Build a tiny God/arena with 2 nodes and one edge
              let arena = Trie3GodWrapper::new();

              let a_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));
              let b_idx = PrecomputeNode3Index::new(arena.insert(Trie::new(PrecomputedNodeContents::internal())));

              {
                  let mut aw = a_idx.write(&arena).unwrap();
                  aw.value.end = false;

                  let mut bv = LLMTokenBV::zeros();
                  bv.insert(1);
                  bv.insert(3);

                  let mut sids = StateIDBV::zeros();
                  sids.insert(2);
                  sids.insert(4);

                  let mut dm = OrderedHashMap::new();
                  dm.insert(b_idx, sids);

                  aw.children_mut().insert((0isize, bv), dm);

                  // live tokens is derived but we'll set for completeness
                  let mut live = LLMTokenBV::zeros();
                  for ((_, l), _) in aw.children() {
                      live |= l;
                  }
                  aw.value.live_tokens = live;
              }
              {
                  let mut bw = b_idx.write(&arena).unwrap();
                  bw.value.end = true;
              }

              let mut roots = BTreeMap::new();
              roots.insert(TokenizerStateID(0), a_idx);

              let cfg = CoordinatorConfig::default();

              run_pipeline_on_precompute3(
                  &mut roots,
                  &arena,
                  10, // max token id
                  10, // max state id
                  cfg,
                  None,
                  None,
              );

              // After running, ensure roots still exist and points to some node.
              assert!(roots.get(&TokenizerStateID(0)).is_some());
          }
      }
    src/trie3_opt/core.rs: |
      use std::collections::{BTreeMap, BTreeSet, VecDeque};

      /// Compact node id for the mini trie.
      pub type NodeId = u32;

      /// A compact sorted set of usize indices with deterministic ordering.
      /// Backed by Vec<usize> kept sorted and deduplicated.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug, Default, Hash)]
      pub struct SortedSet {
          pub elems: Vec<usize>,
      }

      impl SortedSet {
          pub fn new() -> Self {
              Self { elems: Vec::new() }
          }
          pub fn from_iter<I: IntoIterator<Item = usize>>(it: I) -> Self {
              let mut v: Vec<usize> = it.into_iter().collect();
              v.sort_unstable();
              v.dedup();
              Self { elems: v }
          }
          pub fn insert(&mut self, x: usize) {
              match self.elems.binary_search(&x) {
                  Ok(_) => {}
                  Err(pos) => self.elems.insert(pos, x),
              }
          }
          pub fn union_inplace(&mut self, other: &SortedSet) {
              if other.elems.is_empty() {
                  return;
              }
              let mut out = Vec::with_capacity(self.elems.len() + other.elems.len());
              let mut i = 0usize;
              let mut j = 0usize;
              while i < self.elems.len() && j < other.elems.len() {
                  let a = self.elems[i];
                  let b = other.elems[j];
                  if a < b {
                      out.push(a);
                      i += 1;
                  } else if a > b {
                      out.push(b);
                      j += 1;
                  } else {
                      out.push(a);
                      i += 1;
                      j += 1;
                  }
              }
              while i < self.elems.len() {
                  out.push(self.elems[i]);
                  i += 1;
              }
              while j < other.elems.len() {
                  out.push(other.elems[j]);
                  j += 1;
              }
              self.elems = out;
          }
          pub fn intersect(&self, other: &SortedSet) -> SortedSet {
              let mut out = Vec::new();
              let mut i = 0usize;
              let mut j = 0usize;
              while i < self.elems.len() && j < other.elems.len() {
                  let a = self.elems[i];
                  let b = other.elems[j];
                  if a < b {
                      i += 1;
                  } else if a > b {
                      j += 1;
                  } else {
                      out.push(a);
                      i += 1;
                      j += 1;
                  }
              }
              SortedSet { elems: out }
          }
          pub fn is_empty(&self) -> bool {
              self.elems.is_empty()
          }
          pub fn len(&self) -> usize {
              self.elems.len()
          }
          pub fn iter(&self) -> impl Iterator<Item = usize> + '_ {
              self.elems.iter().cloned()
          }
      }

      /// Edge key for the mini trie: pop delta and a token set.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug)]
      #[derive(Hash)]
      pub struct EdgeKey {
          pub pop: isize,
          pub tokens: SortedSet,
      }

      impl EdgeKey {
          pub fn new(pop: isize, tokens: SortedSet) -> Self {
              Self { pop, tokens }
          }
      }

      /// A node in the mini trie.
      #[derive(Clone, Debug)]
      pub struct Node {
          pub id: NodeId,
          pub end: bool,
          // key: (pop, tokens) -> dest map: dest node -> state-set
          pub children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>>,
      }

      impl Node {
          pub fn new(id: NodeId, end: bool) -> Self {
              Self {
                  id,
                  end,
                  children: BTreeMap::new(),
              }
          }
          pub fn out_degree(&self) -> usize {
              self.children.values().map(|m| m.len()).sum()
          }
      }

      /// A compact, no-generics mini trie for precompute3 optimization.
      #[derive(Clone, Debug)]
      pub struct MiniTrie {
          pub nodes: Vec<Node>,
          pub root_ids: BTreeSet<NodeId>,
      }

      impl MiniTrie {
          pub fn new() -> Self {
              Self {
                  nodes: Vec::new(),
                  root_ids: BTreeSet::new(),
              }
          }
          pub fn add_node(&mut self, end: bool) -> NodeId {
              let id = self.nodes.len() as u32;
              self.nodes.push(Node::new(id, end));
              id
          }
          pub fn add_edge(
              &mut self,
              src: NodeId,
              key: EdgeKey,
              dst: NodeId,
              states: SortedSet,
          ) {
              let n = &mut self.nodes[src as usize];
              let dm = n.children.entry(key).or_insert_with(BTreeMap::new);
              dm.entry(dst)
                  .and_modify(|e| e.union_inplace(&states))
                  .or_insert(states);
          }
          pub fn add_root(&mut self, id: NodeId) {
              self.root_ids.insert(id);
          }

          /// Compute set of nodes reachable from any root.
          pub fn reachable_from_roots(&self) -> BTreeSet<NodeId> {
              let mut seen: BTreeSet<NodeId> = BTreeSet::new();
              let mut q: VecDeque<NodeId> = self.root_ids.iter().cloned().collect();
              while let Some(u) = q.pop_front() {
                  if !seen.insert(u) {
                      continue;
                  }
                  let node = &self.nodes[u as usize];
                  for (_ek, dm) in node.children.iter() {
                      for (v, _s) in dm.iter() {
                          if !seen.contains(v) {
                              q.push_back(*v);
                          }
                      }
                  }
              }
              seen
          }

          /// Compute set of nodes that can reach an end node (reverse reachability).
          pub fn can_reach_end(&self) -> BTreeSet<NodeId> {
              let mut incoming: BTreeMap<NodeId, Vec<NodeId>> = BTreeMap::new();
              for n in &self.nodes {
                  for (_ek, dm) in &n.children {
                      for (dst, _s) in dm {
                          incoming.entry(*dst).or_default().push(n.id);
                      }
                  }
              }
              let mut productive: BTreeSet<NodeId> = BTreeSet::new();
              let mut q: VecDeque<NodeId> = VecDeque::new();
              for n in &self.nodes {
                  if n.end {
                      productive.insert(n.id);
                      q.push_back(n.id);
                  }
              }
              while let Some(v) = q.pop_front() {
                  if let Some(srcs) = incoming.get(&v) {
                      for &u in srcs {
                          if productive.insert(u) {
                              q.push_back(u);
                          }
                      }
                  }
              }
              productive
          }
      }
