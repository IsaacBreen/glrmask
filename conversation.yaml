              let (wrapper_arc, ev) = children_map.iter().next().unwrap();
              assert_eq!(*ev, edge_val);
              assert!(Arc::ptr_eq(wrapper_arc.as_arc(), &dest));
              assert_eq!(dest.read().unwrap().max_depth, 1); // Depth updated by try_insert
          }

