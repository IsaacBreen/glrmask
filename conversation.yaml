                                             .and_then(|n| BiBTreeMap::<Vec<u8>, LLMTokenID>::from_json(n))?;
                      let token_name_map = obj.remove("token_name_map").ok_or_else(|| "Missing field token_name_map".to_string())
                                              .and_then(|n| BiBTreeMap::<String, usize>::from_json(n))?;
