              let mut init_map: HashMap<usize, Weight> = HashMap::new();
              for (t, w) in eps_mask[self.body.start_state].iter() {
                  let sig = state_to_sig_id[*t];
                  if let Some(old) = init_map.get_mut(&sig) {
                      *old |= w;
                  } else {
                      init_map.insert(sig, w.clone());
                  }
