          pub fn state_from_gss_map(&self, gss_map: &BTreeMap<TokenizerStateID, GSSNode>) -> GrammarConstraintState {
              let mut state = BTreeMap::new();
              for (i, node) in gss_map.iter() {
                  state.insert(
                      *i,
                      self.parser.init_parse_state_with_gss(node.clone()),
