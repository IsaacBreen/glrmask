                      variant = action_data['variant']
                      if variant == 'Shift':
                          py_row.actions[term_id] = action_data['state_id']
                      elif variant == 'Reduce':
                          pids = tuple(sorted(action_data['production_ids']))
                          py_row.actions[term_id] = Reduce(action_data['nonterminal_id'], action_data['len'], pids)
                      elif variant == 'Split':
