      - Both changes avoid mutating already-shared subgraphs:
        - combine_right_into_on_shared still only appends epsilon edges from the left end state into the freshly-copied right copy and uses a per-call precomputed end-reach map on the right.
        - The k=3 simplification builds an additional small overlay in the shared_states arena and repoints only the body’s start_states to the new overlay. It doesn’t touch other bodies.

      5) Why the exponential slowdown happened (rigorous reasoning)
      - Let G be the shared NWA arena after t steps. Each combine_right_into_on_shared for a new edge copies a fresh template (with O(n) nodes) and then, for each stop produced by process_stack, ran reachable_states_ignoring_labels starting from right_stop_state. That BFS is O(|G| + |E_G|), but |G| grows linearly in the number of edges processed so far since each edge adds O(n) nodes. With many stops per combine and many edges, this becomes O(edges × stops × |G|), which behaves exponentially in trie depth due to repeated appends (not in the alphabet size, but in the size of the arena over traversal steps).
      - The fix: We replace the per-stop BFS over G by a single precomputation over the freshly-copied right subgraph (whose size is O(n) and independent of cumulative |G|). Because all outgoing labeled/epsilon/default edges from the right component point only inside the newly-copied right subgraph, the reachability set that matters is a property of that subgraph alone. Running k (typically 1) reverse BFSs restricted to that subgraph gives, for every state, exactly the end-map targets reachable ignoring labels. Each stop is then handled in O(#targets_for_state) time.

      6) Mathematical guarantee on correctness
      - The end-reach precomputation is just a memoized form of the exact relation used by the original BFS call; it preserves equivalence because:
        - For any state s in the fresh right component, the BFS restricted to the fresh right subgraph (ignoring labels) explores exactly the set of states reachable from s in the full graph. This is because the only new cross-component edge added at combine time is left_end_state → right_stop_state; there are no edges from the right into the left. Hence no additional paths from s to right.end_map states exist via the rest of G. Therefore, the restricted precomputation yields exactly the same set as the original BFS for any stop s.
      - The k-step simplification builds an epsilon-free front-end that is semantically exact:
        - By epsilon-closing on every step and aggregating per-character/default transitions using meet along edges and join across alternatives, it produces the same weighted behaviors for prefixes up to length k (meet distributes over join).
        - The boundary epsilon edges back to the original underlying states ensure that for any path longer than k, the continuation semantics are identical to the original automaton. Hence the transformation is language- and weight-preserving.

