      # 5. Fundamental binary operations

      In this section, the semiring $S$ is assumed to be commutative.

      ## 5.1 Composition

      Composition is a general operation for combining two or more weighted transducers [22, 54, 36, 35]. It is a powerful tool used in a variety of applications to create a complex weighted transducer from simpler ones representing statistical models or discriminative models.

      The algorithm for the composition of weighted transducers is a generalization of the standard composition algorithm for unweighted finite-state transducers. However, as we shall see later, the weighted case requires a more subtle technique to deal with $\epsilon$-path multiplicity issues [50, 46]. The algorithm takes as input two weighted transducers $T_1 = (\Sigma^*, \Delta^*, Q_1, I_1, F_1, E_1, \lambda_1, \rho_1)$ and $T_2 = (\Delta^*, \Omega^*, Q_2, I_2, F_2, E_2, \lambda_2, \rho_2)$ such that the input alphabet of $T_2$, $\Delta$, coincides with the output alphabet of $T_1$, outputs a weighted transducer $T = (\Sigma^*, \Omega^*, Q, I, F, E, \lambda, \rho)$ realizing the composition of $T_1$ and $T_2$.

      Let $T_1$ and $T_2$ be two weighted transducers defined over $S$ such that the input alphabet of $T_2$ coincides with the output alphabet of $T_1$. Assume that the infinite sum $\bigoplus_{z \in \Delta^*} T_1(x, z) \otimes T_2(z, y)$ is defined and in $S$ for all $(x, y) \in \Sigma^* \times \Omega^*$. This condition holds for all transducers defined over a complete semiring such as the Boolean semiring, the tropical semiring, the probability semiring and the log semiring, and for all acyclic transducers defined over an arbitrary semiring. Then, the result of the composition of $T_1$ and $T_2$ is a weighted transducer denoted by $T_1 \circ T_2$ and defined for all $x, y$ by:
      $$
      (T_1 \circ T_2)(x,y) = \bigoplus_{z \in \Delta^*} T_1(x, z) \otimes T_2(z, y).
      $$
      The sum runs over all strings $z$ labeling a path of $T_1$ on the output side and a path of $T_2$ on input label $z$. The matrix notation we have used emphasizes the connection of composition with matrix multiplication.[^7]

      There exists a general and efficient algorithm to compute the composition of two weighted transducers. In the absence of $\epsilon$s on the input side of $T_1$ or the output side of $T_2$, the states of $T_1 \circ T_2$ can be identified with pairs of a state of $T_1$ and a state of $T_2$, $Q \subseteq Q_1 \times Q_2$. Initial states are those obtained by pairing initial states of the original transducers, $I = I_1 \times I_2$, and similarly final states are defined by $F = Q \cap (F_1 \times F_2)$. Transitions are obtained by matching a transition of $T_1$ with one of $T_2$ from appropriate transitions of $T_1$ and $T_2$:
      $$
      E = \biguplus_{\substack{(q_1,a,b,w_1,q'_1) \in E_1 \\ (q_2,b,c,w_2,q'_2) \in E_2}} \{((q_1, q_2), a, c, w_1 \otimes w_2, (q'_1, q'_2))\}
      $$
      The following is the pseudocode of the algorithm in the $\epsilon$-free case.

