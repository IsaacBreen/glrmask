      Key points:

      * No `for u in 0..n` loops.
      * The only dependence on `n = states.len()` is to **bound** state indices, as in the existing code (`if target < n`).
      * Epsilon edges are traversed from any state we reach (as before).
      * Negative edges are traversed only from states in `source_states_filter` (as before).
      * Every triple `(s, a, w_as)` is only re-enqueued when the weight grows (`|=` increases the set), ensuring termination and efficiency.

      ---

      #### 3. Mathematical correctness argument

      Here is a more rigorous argument that the new algorithm is semantically equivalent to the old one for all states in `source_states_filter`.

      ##### 3.1. Common notation and hypotheses

      Let:

      * `V = {0, …, n-1}` be the set of states.
      * `Final(v)` be the final weight of `v` (`states[v].final_weight.unwrap_or(zeros)`).
      * `E_eps` be the set of epsilon edges: `(u, v, w)` whenever `states[u].epsilons` contains `(v, w)` and `v < n`.
      * `E_neg_filt` be the set of negative edges considered:
        * `(u, v, w)` whenever:
          * `u ∈ source_states_filter`,
          * there is a transition from `u` with a label `label` such that `is_negative_symbol(label)` and it has target `(v, w)`,
          * and `v < n`.
      * `E = E_eps ∪ E_neg_filt`.

      We assume the following about `Weight` (consistent with how it is used elsewhere):

      * `|` is a commutative, associative, idempotent “union-like” operation.
      * `&` is a commutative, associative, idempotent “intersection-like” or “meet-like” operation.
      * `Weight::zeros()` is the additive identity: `zeros | x = x`, `zeros & x = zeros`.
      * `is_empty()` detects the “zero” element.

      These are exactly the properties that make the original fixpoint algorithm well-defined and terminating; they are also implicit in checks like `if (&add & old) != add` and `fw.is_empty()`.

      ##### 3.2. Semantics of the old algorithm

      The original `compute_finality_fixpoint` constructs a vector `future_final: V → Weight` that is the least fixpoint of:

      ```text
      future_final(v) = Final(v) ∪ ⋃_{(v→u, w) ∈ E} (future_final(u) & w)
      ```

      This is obtained by:

      *Initializing*

      * `future_final[v] = Final(v)` for all `v`.
      * A work queue seeded with all `v` such that `Final(v) ≠ zeros`.

      *Iterating*

      * For each dequeued `v`, propagate `future_final[v]` to its predecessors `u` via edges `(u→v, w)` in `E` by:
        * `add = future_final[v] & w`
        * If `add` contains anything new for `u`, update `future_final[u] |= add` and enqueue `u`.

      Classic fixpoint theory for such monotone equations says:

      *Define path semantics*:

      For a path `P = v0 → v1 → … → vk` (with edges in `E`) where `vk` is final, define:

      ```text
      w(P) = Final(vk) & w(v_{k-1}→vk) & … & w(v0→v1)
      ```

      For a path of length 0 (k = 0, v0 = vk = v), define `w(P) = Final(v)`.

      Then the least fixpoint `future_final` is exactly:

      ```text
      future_final(v) = ⋃_{paths P starting at v and ending at some final state} w(P)
      ```

      In other words:

      * `future_final(v)` is the union of all weights accumulated along all epsilon/negative paths from `v` to any final state.

      This follows from standard “unfolding” arguments: each application of the equation adds contributions from paths one edge longer, and the least fixpoint is the union over all finite path lengths.

      Note: The original implementation **computes this for all `v ∈ V`**, but only `future_final[sid]` for `sid ∈ source_states_filter` is actually used by `apply_finality_fixpoint`.

      ##### 3.3. Semantics of the new algorithm

      The new algorithm views the problem from the opposite direction:

      For each origin `a ∈ source_states_filter`, we consider all paths

      ```text
      P: a = v0 → v1 → … → vk
      ```

      in `E`, where `vk` is final, and compute:

      ```text
      w(P) = Final(vk) & w(v_{k-1}→vk) & … & w(a→v1)
      ```

      We then set:

      ```text
      future_final[a] = ⋃_{such paths P starting at a} w(P)
      ```

      Algorithmically:

      1. For each `a ∈ source_states_filter`:
         * Seed `future_final[a]` with `Final(a)` (the length-0 path).
      2. For each `a`, seed `queries_at_state[s][a]` with one-step paths `a → s` along epsilon and negative edges, with weight equal to the edge weight.
      3. Using a worklist over `(s, a, w_as)`:
         * Interpret `w_as` as the union of weights over all paths from `a` to `s`.
         * When we pop `(s, a, w_as)`:
           * If `s` is final, we add `w_as & Final(s)` to `future_final[a]`.
           * For each outgoing epsilon edge `s → t` with weight `w_st`, we propagate:
             * `new_w = w_as & w_st` to `(t, a)`.
           * For each negative edge `s → t` (only if `s ∈ source_states_filter`), we do the same.

      An invariant of the propagation:

      * At any point,
        * `queries_at_state[s][a]` equals the union of path edge-weights (`w(v0→v1) & … & w(v_{k-1}→vk)`) over all known paths from `a` to `s`.
      * We never **lose** contributions, because each time we discover a path with weight `w_new` to `(s, a)`, we do `queries_at_state[s][a] |= w_new`.
      * We only re-enqueue `(s, a)` when `queries_at_state[s][a]` strictly grows; since `Weight` is finite and `&` and `|` are monotone, this terminates and reaches the least fixpoint.

      At termination:

      * For each `a ∈ source_states_filter` and each state `s`, `queries_at_state[s][a]` equals the union (over all paths from `a` to `s`) of the edge-weight products.
      * For any final state `t`, we have added `queries_at_state[t][a] & Final(t)` to `future_final[a]`.
      * So:

      ```text
      future_final[a] = Final(a) ∪ ⋃_{paths P: a→…→t, t final} w(P)
      ```

      which is exactly the same path semantics as in §3.2, but restricted to the starting state `a`.

      ##### 3.4. Equivalence for states in `source_states_filter`

      Let `F_old(v)` denote the vector produced by the old algorithm, and `F_new(a)` the map produced by the new algorithm.

      From §3.2:

      ```text
      F_old(v) = ⋃_{paths P starting at v, ending at final t} w(P).
      ```

      From §3.3:

      ```text
      F_new(a) = ⋃_{paths P starting at a, ending at final t} w(P).
      ```

      Thus, for every `a ∈ source_states_filter`:

      ```text
      F_new(a) = F_old(a).
      ```

      Note:

      * Both algorithms use the **same edge set** `E`:
        * Epsilon edges everywhere.
        * Negative edges only from states in `source_states_filter`.
      * Both ignore edges to `v ≥ n` in exactly the same way.
      * Both count all finite paths (including ones that pass through states outside `source_states_filter`).

      Therefore, the new `compute_finality_fixpoint` yields exactly the same weights for all states that `apply_finality_fixpoint` ever uses.

      ##### 3.5. Behaviour of `apply_finality_fixpoint`

      Originally:

      ```rust
      for &sid in source_states_filter {
          let st = &mut states.0[sid];
          if let Some(fw) = &mut st.final_weight {
              *fw |= &future_final[sid];
          } else {
              st.final_weight = Some(future_final[sid].clone());
          }
      }
      ```

      With `future_final[sid] = F_old(sid)`.

      Now:

      ```rust
      for &sid in source_states_filter {
          if let Some(add) = final_fix.get(&sid) {
              let st = &mut states.0[sid];
              if let Some(fw) = &mut st.final_weight {
                  *fw |= add;
              } else {
                  st.final_weight = Some(add.clone());
              }
          }
      }
      ```

      with `add = F_new(sid) = F_old(sid)` if present.

      For states where `F_old(sid) = zeros`, the old code was effectively a no-op (since `fw |= zeros` is identity). The new code simply omits those states entirely. Hence, for all `sid`:

      *If `F_old(sid) != zeros`, the updated `final_weight[sid]` is the same.*  
      *If `F_old(sid) = zeros`, both old and new code leave `final_weight[sid]` unchanged.*

      This proves the functional equivalence of the entire `apply_finality_fixpoint` + `compute_finality_fixpoint` pair.

      ---

      #### 4. Double-check of the rest of the file with respect to filters

      Quick scan of the remaining functions in `src/precompute4/resolve_negatives.rs`:

      * `resolve_negative_codes_in_nwa`:
        * Intentionally processes the full NWA and explicitly constructs `all_states = (0..nwa.states.len()).collect()`.
        * This is the entry point for “do it for the whole automaton”; O(`states.len()`) is expected here.
      * `apply_cancellations`:
        * Calls `compute_cancellations(states, source_states_filter)` where the only loop over states is `for &a in source_states_filter`. There is no `0..states.len()` iteration; exploration is restricted to the subgraph reachable from those sources.
      * `compute_cancellations`:
        * Uses `let n = states.len()` only as an upper bound for valid state indices.
        * The seeding loop iterates `for &a in source_states_filter`.
        * Subsequent propagation is via a worklist over reachable states, not all states. Complexity is proportional to the reachable subgraph, not `states.len()`.
      * `remove_negative_transitions`:
        * Loops only over `for &sid in source_states_filter`.

      After the change to `compute_finality_fixpoint`, **no function that accepts `source_states_filter` performs any work proportional to `states.len()`**. The only `0..states.len()` loop left is in `resolve_negative_codes_in_nwa`, which is explicitly the whole-automaton case.

