          expected_fst.add_tr(s1, tr_4)

          tr_5 = Tr(1, 2, 1.0, s5)
          expected_fst.add_tr(s4, tr_5)

          tr_6 = Tr(3, 4, 2.5, s5)
          expected_fst.add_tr(s5, tr_6)

          union_fst = fst1.union(fst2)

