          token_name_map_for_stats.insert(regex_name("DEF_T"), 0);

          // 6. Create the GrammarConstraint
          let constraint = GrammarConstraint::new(
              tokenizer,
              parser,
              llm_token_map.clone(), // Original LLMTokenID map
