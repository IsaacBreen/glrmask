      This document specifies the full public interface of the provided Rust script, which defines an arena-allocated, directed acyclic graph (DAG) structure (`Trie`) and associated utilities.

      ### High-Level Summary

      The core components of the public interface are:
      *   **`Arena<T>`**: A thread-safe, arena allocator that owns all graph nodes.
      *   **`Trie<EK, EV, T>`**: The node structure for the graph, containing a value, children, and metadata. It does not own other nodes directly.
      *   **`Trie2Index`**: A lightweight, copyable handle used to reference nodes within the `Arena`. It replaces traditional `Arc<RwLock<...>>` pointers and provides a safe API for reading and writing node data.
      *   **`EdgeInserter`**: A builder-pattern helper for robustly adding edges to the graph.
      *   **Graph Algorithms**: A suite of methods on `Trie` for traversal, analysis (`stats`, `has_cycle`), manipulation (`gc`, `deep_copy`), and specialized mapping (`special_map`).

      ---

      ### Structs and Their Interfaces

      #### `pub struct TrieStats`
      Represents statistics about a Trie graph reachable from a set of roots.

      ##### Public Fields
      *   `pub num_reachable_nodes: usize`
      *   `pub num_reachable_edges: usize`
      *   `pub max_depth: usize`
      *   `pub num_roots: usize`
      *   `pub num_leaves: usize`
      *   `pub max_in_degree: usize`
      *   `pub avg_in_degree: f64`
      *   `pub max_out_degree: usize`
      *   `pub avg_out_degree: f64`

      ##### Trait Implementations
      *   `impl Debug, Clone, PartialEq for TrieStats`

      ---

      #### `pub struct Trie<EK: Ord, EV, T>`
      Represents a node in the graph. `EK` is the edge key type, `EV` is the edge value type, and `T` is the node's internal value type.

      ##### Public Fields
      *   `pub value: T`: The value stored within the node.
      *   `pub max_depth: usize`: The longest distance from a source node, computed by `recompute_all_max_depths`.

      ##### Public Methods
      *   `pub fn new(value: T) -> Self`: Creates a new trie node with a given value and no children.
      *   `pub fn force_insert_to_new_node(&mut self, arena: &Arena<Trie<EK, EV, T>>, edge_key: EK, edge_value: EV, value: T) -> Trie2Index`: Creates a new destination node in the arena and inserts an edge to it.
      *   `pub fn force_insert_to_node(&mut self, edge_key: EK, edge_value: EV, dst: Trie2Index)`: Inserts an edge to an existing destination node index.
      *   `pub fn already_has_dst(&self, edge_key: EK, dst: Trie2Index) -> bool`: Checks if an edge with a specific key and destination already exists.
      *   `pub fn already_has_dst_for_any_key(&self, dst: Trie2Index) -> bool`: Checks if any edge points to the given destination.
      *   `pub fn get_edge_value(&self, edge_key: EK, dst: Trie2Index) -> Option<&EV>`: Retrieves the value of a specific edge.
      *   `pub fn get_edge_value_mut(&mut self, edge_key: EK, dst: &Trie2Index) -> Option<&mut EV>`: Retrieves a mutable reference to the value of a specific edge.
      *   `pub fn try_insert(&mut self, edge_key: EK, edge_value: &mut Option<EV>, child: Trie2Index)`: Inserts an edge.
      *   `pub fn try_insert_unchecked(&mut self, edge_key: EK, edge_value: &mut Option<EV>, child: Trie2Index)`: Inserts an edge without any checks.
      *   `pub fn get(&self, edge_key: &EK) -> Option<&OrderedHashMap<Trie2Index, EV>>`: Gets all destinations for a given edge key.
      *   `pub fn get_mut(&mut self, edge_key: &EK) -> Option<&mut OrderedHashMap<Trie2Index, EV>>`: Gets a mutable reference to all destinations for a given edge key.
      *   `pub fn children(&self) -> &BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>`: Returns an immutable reference to the node's children.
      *   `pub fn children_mut(&mut self) -> &mut BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>`: Returns a mutable reference to the node's children.
      *   `pub fn is_leaf(&self) -> bool`: Returns `true` if the node has no children.
      *   `pub fn all_nodes(arena: &Arena<Trie<EK, EV, T>>, roots: &[Trie2Index]) -> Vec<Trie2Index>`: Collects all unique nodes reachable from the given roots via BFS.
      *   `pub fn gc(arena: &Arena<Self>, roots: &[Trie2Index])`: Performs garbage collection, keeping only nodes reachable from `roots`.
      *   `pub fn recompute_all_max_depths(arena: &Arena<Trie<EK, EV, T>>, roots: &[Trie2Index])`: Recomputes `max_depth` for all nodes reachable from `roots` using a topological sort.
      *   `pub fn recompute_max_depth(&mut self, arena: &Arena<Trie<EK, EV, T>>) -> bool`: Recomputes the `max_depth` of this node based on its children's depths.
      *   `pub fn has_cycle(arena: &Arena<Trie<EK, EV, T>>, roots: impl IntoIterator<Item = Trie2Index>) -> bool`: Detects if there are any cycles in the graph reachable from the given roots.
      *   `pub fn stats(arena: &Arena<Self>, roots: &[Trie2Index]) -> TrieStats`: Computes statistics for the graph reachable from the given roots.
      *   `pub fn are_graphs_equal(arena_a: &Arena<Trie<EK, EV, T>>, a_idx: Trie2Index, arena_b: &Arena<Trie<EK, EV, T>>, b_idx: Trie2Index) -> bool`: Recursively compares two graphs for deep equality.
      *   `pub fn get_all_paths<F>(arena: &Arena<Self>, roots: &[Trie2Index], is_end: F) -> Vec<(T, Vec<(EK, EV, T)>)>`: Traverses the graph and returns all paths ending in a node that satisfies a predicate.
      *   `pub fn pretty_print(arena: &Arena<Self>, roots: &[Trie2Index]) -> String`: Pretty-prints the trie structure starting from the given roots.
      *   `pub fn pretty_print_arena(arena: &Arena<Self>) -> String`: Pretty-prints the entire trie structure in the arena, identifying roots automatically.
      *   `pub fn deep_copy_subtrees(source_arena: &Arena<Self>, roots: &[Trie2Index]) -> (Arena<Self>, Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`: Deep copies subtrees from a source arena into a new arena.
      *   `pub fn deep_copy_subtrees_into(source_arena: &Arena<Self>, dest_arena: &Arena<Self>, roots: &[Trie2Index]) -> (Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`: Deep copies subtrees from a source arena into an existing destination arena.
      *   `pub fn special_map<V: Clone>(...)`: Performs a specialized breadth-first traversal for propagation, processing nodes and edges individually.
      *   `pub fn special_map_grouped<V, S, I>(...)`: A more efficient version of `special_map` that groups children by edge key before processing.

      ##### Trait Implementations
      *   `impl<...> Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash for Trie<...>`
      *   `impl<...> JSONConvertible for Trie<...>`

