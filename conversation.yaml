              //    `out` is now `[+2 a, +1 b, +1 e, +1 f]`.
              // 5. Pair 3: `[-1 g, -1 h]` vs `[+2 h]`. Checks are compatible. Cancels perfectly.
              // 6. Trailing negatives `[-4 i, -1 j]` are appended.
