                      children = node_data.get("children") or []
                      # if not children:
                      #     print(f"    - No children for node {node_idx}")
                      for (pop, llm_bv), dests in children:
                          print(f"    - Edge: pop={pop}, llm_bv={llm_bv.to_ranges()}")
