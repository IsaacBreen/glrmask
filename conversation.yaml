                  root_label: Label for self
                  fst_list: Other FSTs
                  epsilon_on_replace:

              Returns:
                  The resulting Fst.

              """
              from rustfst.algorithms.replace import replace

              complete_fst_list = [(root_label, self)] + fst_list
              return replace(root_label, complete_fst_list, epsilon_on_replace)

