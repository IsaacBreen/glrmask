      +// Interns weights to compact keys for memoization (e.g., gating memo).
      +// This drastically reduces hashing/comparison overhead for (StateID, Weight) pairs.
      +#[derive(Default)]
      +struct WeightInterner {
      +    map: HashMap<Weight, usize>,
