          message: String,
          span: Span,
      }

      #[derive(Debug, Clone, PartialEq)]
      enum EbnfTokenKind {
          Ident(String),
          Literal(String),
          CharClass(String),
          Op(String),
      }
      #[derive(Debug, Clone, PartialEq)]
      struct EbnfToken {
          kind: EbnfTokenKind,
          span: Span,
      }

      fn get_token_regex() -> &'static Regex {
          static TOKEN_REGEX: OnceLock<Regex> = OnceLock::new();
          TOKEN_REGEX.get_or_init(|| {
