              // Check node2 (index 1) state
              let edge2_info = &children[1];
              assert!(Arc::ptr_eq(&edge2_info.1, &node2));
              assert_eq!(edge2_info.0, Vec::<i32>::new()); // Unchanged (edge merge failed for this edge in Pass 1)
