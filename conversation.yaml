      /// A trait to provide a lazily-evaluated `expect`.
      pub trait ExpectElse<T> {
          /// Unwraps an option, panicking with a message from a closure on `None`.
          fn expect_else<F>(self, f: F) -> T
          where
              F: FnOnce() -> String;
      }

      impl<T> ExpectElse<T> for Option<T> {
          #[inline]
          #[track_caller]
          fn expect_else<F>(self, f: F) -> T
