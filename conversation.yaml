              run_test(groups![eat_u8(b'a'), eat_u8(b'b')], BTreeSet::from([0, 1]));
              run_test(seq![eat_u8(b'a'), eat_u8(b'b')], BTreeSet::from([0]));
              run_test(rep(eat_u8(b'a')), BTreeSet::from([0]));
              run_test(groups![
                  choice![opt(eat_u8(b'a')), rep(eat_u8(b'b')), eat_u8(b'c')],
                  eat_u8(b'a'),
              ], BTreeSet::from([0, 1]));
              run_test(groups![
