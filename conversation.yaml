      def eat(s: bytes) -> Regex:
          if len(s) == 1:
              return Regex.eat_u8(ord(s[0]))
          else:
              return Regex.seq([Regex.eat_u8(ord(c)) for c in s])

      def rule_name_is_valid(name: str) -> bool:
