      // --- Fast Hasher & BitSet ---

      pub struct FxHasher {
          hash: usize,
      }

      impl Default for FxHasher {
          fn default() -> Self {
              Self { hash: 0 }
          }
      }

      impl Hasher for FxHasher {
          fn write(&mut self, bytes: &[u8]) {
              // Simple FxHash-like implementation
              for &byte in bytes {
                  self.hash = (self.hash.rotate_left(5) ^ (byte as usize)).wrapping_mul(0x517cc1b727220a95);
              }
          }

          fn write_usize(&mut self, i: usize) {
              self.hash = (self.hash.rotate_left(5) ^ i).wrapping_mul(0x517cc1b727220a95);
          }

          fn finish(&self) -> u64 {
              self.hash as u64
          }
      }

      type FxBuildHasher = BuildHasherDefault<FxHasher>;

      #[derive(Clone)]
      struct BitSet {
          data: Vec<u64>,
          size: usize,
      }

      impl BitSet {
          fn new(size: usize) -> Self {
              let words = (size + 63) / 64;
              Self {
                  data: vec![0; words],
                  size,
              }
          }

          #[inline]
          fn insert(&mut self, idx: usize) -> bool {
              if idx >= self.size { return false; }
              let word = idx / 64;
              let bit = idx % 64;
              let mask = 1 << bit;
              if (self.data[word] & mask) == 0 {
                  self.data[word] |= mask;
                  true
              } else {
                  false
              }
          }

          #[inline]
          fn contains(&self, idx: usize) -> bool {
              if idx >= self.size { return false; }
              let word = idx / 64;
              let bit = idx % 64;
              (self.data[word] & (1 << bit)) != 0
          }

          fn clear(&mut self) {
              self.data.fill(0);
          }

          fn is_empty(&self) -> bool {
              self.data.iter().all(|&x| x == 0)
          }

          fn union_with(&mut self, other: &BitSet) {
              for (w1, w2) in self.data.iter_mut().zip(&other.data) {
                  *w1 |= *w2;
              }
          }

          fn iter(&self) -> BitSetIter {
              BitSetIter {
                  data: &self.data,
                  word_idx: 0,
                  current_word: if self.data.is_empty() { 0 } else { self.data[0] },
              }
          }
      }

      struct BitSetIter<'a> {
          data: &'a [u64],
          word_idx: usize,
          current_word: u64,
      }

      impl<'a> Iterator for BitSetIter<'a> {
          type Item = usize;

          fn next(&mut self) -> Option<Self::Item> {
              loop {
                  if self.current_word != 0 {
                      let trailing = self.current_word.trailing_zeros();
                      self.current_word &= !(1 << trailing);
                      return Some(self.word_idx * 64 + trailing as usize);
                  }
                  
                  self.word_idx += 1;
                  if self.word_idx >= self.data.len() {
                      return None;
                  }
                  self.current_word = self.data[self.word_idx];
              }
          }
      }

