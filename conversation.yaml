                  for i in range(limit):
                      new_bitset[i] &= ~other._bitset[i]
                      
                  res = BitsetRangeSet()
                  res._bitset = new_bitset
                  res._len = sum(BIT_COUNTS[byte] for byte in new_bitset)
                  return res
              else:
                  py_self = PyRangeSet(self.intervals)
                  differenced = py_self.difference(other)
