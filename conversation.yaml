      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Hash, Debug, Default)]
      pub struct I16Map<T> {
          pub exceptions: BTreeMap<i16, T>,
          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String {
          format!("{}", code)
          // let u = code as u16;
          // if let Some(c) = char::from_u32(u as u32) {
          //     if c.is_ascii_graphic() || c == ' ' {
          //         format!("'{}'", c)
          //     } else {
          //         format!("{}", u)
          //     }
          // } else {
          //     format!("{}", u)
          // }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/ops.rs: |
      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWADefaultTransition, NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use std::collections::{BTreeSet, VecDeque};

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let result_dwa = union_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let result_dwa = concat_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      impl NWA {
          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      // Assume ALL if weight is missing, though this should not happen with current DWA builders.
                      let w = st.trans_weight_default.as_ref().cloned().unwrap_or_else(Weight::all);
                      let exceptions = st.transitions.exceptions.keys().copied().collect();
                      nwa.states.0[i].default.push(NWADefaultTransition {
                          target: to,
                          weight: w,
                          exceptions,
                      });
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      let w = st.trans_weights_exceptions.get(lbl).cloned().unwrap_or_else(Weight::all);
                      nwa.states.add_transition(i, *lbl, *to, w).unwrap();
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = union_nwa.determinize_to_dwa();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, targets) in states[u].transitions.iter() {
                      for (v, _) in targets {
                          if *v < states.len() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                          }
                      }
                  }
                  for def in &states[u].default {
                      if def.target < states.len() && !visited[def.target] {
                          visited[def.target] = true;
                          q.push_back(def.target);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }
          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let dwa1 = nwa1.determinize_to_dwa();
                  let dwa2 = nwa2.determinize_to_dwa();
                  let result_dwa = concat_nwa.determinize_to_dwa();


                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              Self::internal_concatenate_components(states, left, right, eps_weight)
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/weighted_automata/determinization.rs: |-
      // src/precompute4/weighted_automata/determinization.rs
      //
      // Determinization of NWA -> DWA specialized to the Weight bitset semiring,
      // with an aggressively minimized construction following Mohri's insights:
      //   - General case: weighted-subset determinization with ε-closure integration,
      //     default/exception compression of labels, and compact state-entry/final weights.
      //   - Special optimized case (fast-path): if the NWA is a union of singleton-loop
      //     components reachable by ε from the start, whose per-component base weights
      //     are pairwise disjoint (the "hypercube" class), then we compile directly a
      //     1-state DWA. In that case, the entire "history" is tracked in the accumulating
      //     weight, not in the state space, avoiding 2^N blowup.
      //
      // Correctness sketch for the fast-path (bitset semiring):
      //   Let components C = {q}. Each q is a single state with self-loops only and no ε-out,
      //   and has a base weight B_q (start ε weight ∧ final weight at q). For each symbol a,
      //   let W_a = ⋁_{q allows a} (B_q ∧ w(q,a)) where w(q,a) is the (union of) loop weights at q.
      //   Then the 1-state DWA uses per-letter self-loops on a with weight W_a, and final weight
      //   F = ⋁_q B_q. For any input word x = a1...ak, the DWA assigns
      //       (W_a1 ∧ W_a2 ∧ ... ∧ W_ak) ∧ F
      //   The bitset semiring (∧ distributes over ⋁) and pairwise disjointness of the B_q guarantees
      //   this equals
      //       ⋁_q ( B_q ∧ w(q,a1) ∧ ... ∧ w(q,ak) )
      //   which is exactly the NWA semantics for this class (each q "reads" the sequence in-place).

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use chrono::Local;
      use indicatif::{MultiProgress, ProgressBar, ProgressStyle};
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};

      use super::common::{NWAStateID, Weight};
      use super::dwa::{DWA, DWABuildError};
      use super::nwa::{NWA, NWAStates};

      // Weighted subset and ε-closure maps
      type WeightedSubset = BTreeMap<NWAStateID, Weight>;
      type ClosureMap = BTreeMap<NWAStateID, Weight>;

      // Helper ops on Weight
      fn weight_union(mut a: Weight, b: &Weight) -> Weight {
          a | b.clone()
      }
      fn weight_union_in_place(dst: &mut Weight, src: &Weight) {
          *dst = dst.clone() | src.clone();
      }
      fn weight_intersection(a: &Weight, b: &Weight) -> Weight {
          a & b
      }
      fn is_zero(w: &Weight) -> bool {
          w.is_empty()
      }

      // Epsilon-closure from a weighted subset:
      // Input: initial weighted subset 'seed' mapping NWA states to input weights (bitsets).
      // Output: closure map mapping every reachable state via ε-paths to the union of all
      // weights of those ε-paths (seed_weight ∧ ε-edges ∧ ...).
      fn epsilon_closure(nwa_states: &NWAStates, seed: &WeightedSubset) -> ClosureMap {
          let mut closure: ClosureMap = ClosureMap::new();
          let mut queue: VecDeque<NWAStateID> = VecDeque::new();

          for (sid, w) in seed {
              if !is_zero(w) {
                  let prev = closure.get(sid).cloned().unwrap_or_else(Weight::zeros);
                  let neww = weight_union(prev.clone(), w);
                  if neww != prev {
                      closure.insert(*sid, neww.clone());
                      queue.push_back(*sid);
                  }
              }
          }

          while let Some(u) = queue.pop_front() {
              let uw = closure.get(&u).cloned().unwrap_or_else(Weight::zeros);
              if is_zero(&uw) {
                  continue;
              }
              for (v, w_eps) in &nwa_states[u].epsilons {
                  let cand = weight_intersection(&uw, w_eps);
                  if is_zero(&cand) {
                      continue;
                  }
                  let prev = closure.get(v).cloned().unwrap_or_else(Weight::zeros);
                  let merged = weight_union(prev.clone(), &cand);
                  if merged != prev {
                      closure.insert(*v, merged.clone());
                      queue.push_back(*v);
                  }
              }
          }

          closure
      }

      // Compute S_total: explicit labels and default exceptions in this ε-closure
      fn collect_exception_labels(nwa_states: &NWAStates, closure: &ClosureMap) -> BTreeSet<i16> {
          let mut labels: BTreeSet<i16> = BTreeSet::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              for (lbl, _) in nwa_states[*sid].transitions.iter() {
                  labels.insert(*lbl);
              }
              for def in &nwa_states[*sid].default {
                  for ex in &def.exceptions {
                      labels.insert(*ex);
                  }
              }
          }
          labels
      }

      // Next subset for "others" labels not in S_total: use all defaults
      fn next_subset_for_others(nwa_states: &NWAStates, closure: &ClosureMap) -> WeightedSubset {
          let mut next: WeightedSubset = WeightedSubset::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              let st = &nwa_states[*sid];
              for def in &st.default {
                  let cand = weight_intersection(cw, &def.weight);
                  if is_zero(&cand) {
                      continue;
                  }
                  next.entry(def.target)
                      .and_modify(|w| weight_union_in_place(w, &cand))
                      .or_insert(cand);
              }
          }
          next.retain(|_, w| !is_zero(w));
          next
      }

      // Next subset for a specific label ch
      fn next_subset_for_label(
          nwa_states: &NWAStates,
          closure: &ClosureMap,
          ch: i16,
      ) -> WeightedSubset {
          let mut next: WeightedSubset = WeightedSubset::new();
          for (sid, cw) in closure {
              if is_zero(cw) {
                  continue;
              }
              let st = &nwa_states[*sid];
              if let Some(targets) = st.transitions.get(&ch) {
                  for (to, w_edge) in targets {
                      let cand = weight_intersection(cw, w_edge);
                      if is_zero(&cand) {
                          continue;
                      }
                      next.entry(*to)
                          .and_modify(|w| weight_union_in_place(w, &cand))
                          .or_insert(cand);
                  }
              } else {
                  for def in &st.default {
                      if !def.exceptions.contains(&ch) {
                          let cand = weight_intersection(cw, &def.weight);
                          if is_zero(&cand) {
                              continue;
                          }
                          next.entry(def.target)
                              .and_modify(|w| weight_union_in_place(w, &cand))
                              .or_insert(cand);
                      }
                  }
              }
          }
          next.retain(|_, w| !is_zero(w));
          next
      }

      // Union over values (for edge/default weights)
      fn union_over_values(map: &WeightedSubset) -> Weight {
          let mut acc = Weight::zeros();
          for w in map.values() {
              acc = acc | w.clone();
          }
          acc
      }

      // Compute DWA state-entry and final weights from ε-closure
      fn compute_state_and_final_weights(
          nwa: &NWA,
          closure: &ClosureMap,
      ) -> (Option<Weight>, Option<Weight>) {
          // State-entry weights are not part of Mohri's determinization algorithm.
          let entry_opt = None;
          let mut finalw = Weight::zeros();
          for (sid, cw) in closure {
              if let Some(fw) = &nwa.states[*sid].final_weight {
                  let cand = cw & fw;
                  if !is_zero(&cand) {
                      finalw = finalw | cand;
                  }
              }
          }
          let final_opt = if finalw.is_empty() { None } else { Some(finalw) };
          (entry_opt, final_opt)
      }

      // Determinizer

      struct Determinizer<'a> {
          nwa: &'a NWA,
          seen: HashMap<ClosureMap, usize>,
          subsets: Vec<WeightedSubset>,
          closures: Vec<ClosureMap>,
          queue: VecDeque<usize>,
          dwa: DWA,
          mp: Option<MultiProgress>,
      }

      impl<'a> Determinizer<'a> {
          fn new(nwa: &'a NWA, mp: Option<MultiProgress>) -> Self {
              let mut dwa = DWA::new();
              dwa.states.0.clear();
              dwa.body.start_state = 0;
              Determinizer {
                  nwa,
                  seen: HashMap::new(),
                  subsets: Vec::new(),
                  closures: Vec::new(),
                  queue: VecDeque::new(),
                  dwa,
                  mp,
              }
          }

          fn register_state(&mut self, subset: WeightedSubset) -> usize {
              // 1) Canonicalize incoming seed by dropping empty weights.
              let mut subset_clean: WeightedSubset = WeightedSubset::new();
              for (sid, w) in subset {
                  if !is_zero(&w) { subset_clean.insert(sid, w); }
              }
              // 2) Compute ε-closure; determinized state identity depends on closure.
              let closure = epsilon_closure(&self.nwa.states, &subset_clean);

              // Use the closure object itself as the key.
              if let Some(&id) = self.seen.get(&closure) {
                  return id;
              }

              // 3) Create brand-new DWA state for this closure.
              let id = self.dwa.add_state();

              // 4) Install final weight from closure.
              let (_entry_opt, final_opt) = compute_state_and_final_weights(self.nwa, &closure);
              if let Some(w) = final_opt { let _ = self.dwa.set_final_weight(id, w); }

              self.seen.insert(closure.clone(), id);
              self.subsets.push(subset_clean);
              self.closures.push(closure);
              self.queue.push_back(id);
              id
          }

          fn expand_state(&mut self, sid: usize) {
              let closure = &self.closures[sid];
              if closure.is_empty() {
                  return;
              }

              let labels_pb = if let Some(mp) = &self.mp {
                  let pb = mp.add(ProgressBar::new(0));
                  pb.set_style(
                      ProgressStyle::default_bar()
                          .template("  {spinner:.green} [{elapsed_precise}] Labels: [{bar:40.cyan/blue}] {pos}/{len} {msg}")
                          .unwrap()
                          .progress_chars("#>-"),
                  );
                  pb.set_message(format!("State {}", sid));
                  Some(pb)
              } else {
                  None
              };

              let exception_labels = collect_exception_labels(&self.nwa.states, closure);

              if let Some(pb) = &labels_pb {
                  pb.set_length(exception_labels.len() as u64);
              }

              let others_subset = next_subset_for_others(&self.nwa.states, closure);
              let others_weight = union_over_values(&others_subset);

              let mut exception_data: BTreeMap<i16, (WeightedSubset, Weight)> = BTreeMap::new();
              for ch in &exception_labels {
                  let sub_ch = next_subset_for_label(&self.nwa.states, closure, *ch);
                  let w_ch = union_over_values(&sub_ch);
                  if !sub_ch.is_empty() && !is_zero(&w_ch) {
                      exception_data.insert(*ch, (sub_ch, w_ch));
                  }
                  if let Some(pb) = &labels_pb {
                      pb.inc(1);
                  }
              }

              if let Some(pb) = &labels_pb {
                  pb.set_message(format!("State {}: installing transitions", sid));
                  pb.set_length(exception_data.len() as u64);
                  pb.set_position(0);
              }

              let mut default_target_id: Option<usize> = None;
              if !others_subset.is_empty() && !is_zero(&others_weight) {
                  let to_id = self.register_state(others_subset);
                  default_target_id = Some(to_id);
                  let _ = self
                      .dwa
                      .set_default_transition(sid, to_id, others_weight.clone())
                      .map_err(|_e: DWABuildError| ())
                      .ok();
              }

              for (ch, (sub_ch, w_ch)) in exception_data {
                  let to_ch_id = self.register_state(sub_ch);
                  let need_exception = match default_target_id {
                      None => true,
                      Some(def_id) => def_id != to_ch_id || w_ch != others_weight,
                  };
                  if need_exception {
                      let _ = self
                          .dwa
                          .add_transition(sid, ch, to_ch_id, w_ch.clone())
                          .map_err(|_e: DWABuildError| ())
                          .ok();
                  }
                  if let Some(pb) = &labels_pb {
                      pb.inc(1);
                  }
              }

              if let Some(pb) = labels_pb {
                  pb.finish_and_clear();
              }
          }
      }

      // Fast-path: try to build a 1-state DWA for a union of singleton-loop components.
      fn try_build_singleton_loop_union(nwa: &NWA) -> Option<DWA> {
          if nwa.states.0.is_empty() || nwa.body.start_state >= nwa.states.len() {
              return None;
          }

          let start = nwa.body.start_state;
          if !nwa.states[start].transitions.is_empty() || !nwa.states[start].default.is_empty() {
              return None;
          }

          let mut seed: WeightedSubset = WeightedSubset::new();
          seed.insert(start, Weight::all());
          let start_closure = epsilon_closure(&nwa.states, &seed);

          let mut comps: Vec<(NWAStateID, Weight)> = Vec::new();
          for (sid, cw) in start_closure.iter() {
              if *sid == start || is_zero(cw) {
                  continue;
              }
              let st = &nwa.states[*sid];

              if !st.epsilons.is_empty() || !st.default.is_empty() {
                  return None;
              }
              for (_lbl, vec_targets) in st.transitions.iter() {
                  for (to, _w) in vec_targets {
                      if *to != *sid {
                          return None;
                      }
                  }
              }

              if let Some(fw) = &st.final_weight {
                  let base = cw & fw;
                  if !base.is_empty() {
                      comps.push((*sid, base));
                  }
              }
          }

          if comps.is_empty() {
              return None;
          }

          for i in 0..comps.len() {
              for j in (i + 1)..comps.len() {
                  if !(comps[i].1.clone() & comps[j].1.clone()).is_empty() {
                      return None;
                  }
              }
          }

          let mut label_to_weight: BTreeMap<i16, Weight> = BTreeMap::new();
          for (sid, base) in &comps {
              let st = &nwa.states[*sid];
              for (lbl, vec_targets) in st.transitions.iter() {
                  let mut w_union = Weight::zeros();
                  for (_to, w) in vec_targets {
                      w_union = w_union | w.clone();
                  }
                  if !w_union.is_empty() {
                      let contrib = base.clone() & w_union;
                      if !contrib.is_empty() {
                          let prev = label_to_weight.get(lbl).cloned().unwrap_or_else(Weight::zeros);
                          label_to_weight.insert(*lbl, prev | contrib);
                      }
                  }
              }
          }

          let mut final_union = Weight::zeros();
          for (_sid, base) in &comps {
              final_union = final_union | base.clone();
          }

          let mut dwa = DWA::new();
          let s0 = dwa.body.start_state;
          if !final_union.is_empty() {
              let _ = dwa.set_final_weight(s0, final_union);
          }
          for (lbl, w) in label_to_weight {
              if !w.is_empty() {
                  let _ = dwa.add_transition(s0, lbl, s0, w);
              }
          }

          Some(dwa)
      }

      impl NWA {
          /// Determinize the subgraph reachable from `self.body.start_state` into a DWA.
          pub fn determinize_to_dwa(&self) -> DWA {
              if let Some(dwa) = try_build_singleton_loop_union(self) {
                  return dwa;
              }

              const STATE_LIMIT: usize = 100000;

              eprintln!(
                  "[DEBUG] Determinization: Using general-purpose subset construction (fast-path not taken)."
              );
              if self.states.0.is_empty() || self.body.start_state >= self.states.len() {
                  return DWA::new();
              }

              let mp = MultiProgress::new();
              let main_pb = mp.add(ProgressBar::new(1));
              main_pb.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [{elapsed_precise}] States: [{bar:40.cyan/blue}] {pos}/{len} ({eta}) {msg}")
                      .unwrap()
                      .progress_chars("#>-"),
              );
              main_pb.set_message("Determinizing NWA");

              let mut det = Determinizer::new(self, Some(mp));

              let mut start_subset: WeightedSubset = WeightedSubset::new();
              start_subset.insert(self.body.start_state, Weight::all());
              let start_id = det.register_state(start_subset);
              det.dwa.body.start_state = start_id;

              let mut processed_count = 0;
              while let Some(sid) = det.queue.pop_front() {
                  if det.seen.len() > STATE_LIMIT {
                      let timestamp = Local::now().format("%Y%m%d-%H%M%S");
                      let filename = format!("nwa_dump_{}.json", timestamp);
                      eprintln!("Determinization state limit ({}) exceeded. Dumping NWA to {} and panicking.", STATE_LIMIT, filename);
                      let f = std::fs::File::create(&filename).expect("Unable to create dump file");
                      serde_json::to_writer(f, self).expect("Unable to write NWA to file");
                      panic!("Determinization aborted after reaching {} states.", STATE_LIMIT);
                  }

                  let total_states = det.seen.len();
                  main_pb.set_length(total_states as u64);
                  main_pb.set_position(processed_count as u64);
                  main_pb.set_message(format!("Expanding state {}/{}", processed_count + 1, total_states));

                  det.expand_state(sid);
                  processed_count += 1;
              }
              main_pb.finish_with_message("Determinization complete");

              det.dwa
          }
      }
    scripts/analyze_nwa.py: |
      # scripts/analyze_nwa.py
      import json
      import sys
      import os
      import glob
      from collections import defaultdict
      from dataclasses import dataclass
      from typing import Any, Optional, List, Dict, Tuple

      # Type aliases for clarity based on Rust types
      Weight = Any
      NWAStateID = int
      Symbol = int  # i16 in Rust

      @dataclass
      class NWADefaultTransition:
          """Represents a default transition in an NWA."""
          target: NWAStateID
          weight: Weight
          exceptions: List[Symbol]

      @dataclass
      class NWAState:
          """Represents a single state in an NWA."""
          final_weight: Optional[Weight]
          # In JSON, the keys of the transitions map are strings.
          transitions: Dict[str, List[Tuple[NWAStateID, Weight]]]
          epsilons: List[Tuple[NWAStateID, Weight]]
          default: List[NWADefaultTransition]

      @dataclass
      class NWABody:
          """Represents the body of an NWA, containing the start state."""
          start_state: NWAStateID

      @dataclass
      class NWA:
          """
          Represents a Non-deterministic Weighted Automaton (NWA), loaded from a JSON dump.
          """
          body: NWABody
          states: List[NWAState]

          @staticmethod
          def from_dict(data: dict) -> 'NWA':
              """Creates an NWA instance from a dictionary (parsed from JSON)."""
              body = NWABody(**data['body'])
              # The `NWAStates` newtype in Rust serializes transparently as its inner Vec,
              # so `data['states']` is the list of state objects.
              states_data = data['states']
              states = []
              for s_data in states_data:
                  default_trans = [NWADefaultTransition(**d) for d in s_data.get('default', [])]
                  state = NWAState(
                      final_weight=s_data.get('final_weight'),
                      transitions=s_data.get('transitions', {}),
                      epsilons=[tuple(e) for e in s_data.get('epsilons', [])],
                      default=default_trans
                  )
                  states.append(state)
              return NWA(body=body, states=states)

          def num_states(self) -> int:
              return len(self.states)

      def analyze_weight(weight: Weight, weight_stats: dict):
          """Updates weight statistics based on a given weight object."""
          if weight == "ALL":
              weight_stats['all_count'] += 1
          elif isinstance(weight, list) and not weight:
              weight_stats['empty_count'] += 1
          else:
              weight_stats['complex_count'] += 1

      def get_nwa_stats(nwa: NWA) -> dict:
          """
          Computes various statistics about the NWA.
          """
          stats = {
              'num_states': nwa.num_states(),
              'start_state': nwa.body.start_state,
              'num_final_states': 0,
              'num_epsilon_transitions': 0,
              'num_labeled_transitions': 0,
              'num_default_transitions': 0,
              'labeled_transitions_per_state': defaultdict(int),
              'epsilon_transitions_per_state': defaultdict(int),
              'default_transitions_per_state': defaultdict(int),
              'outgoing_degree_per_state': defaultdict(int),
              'incoming_degree_per_state': defaultdict(int),
              'weight_stats': {
                  'all_count': 0,
                  'empty_count': 0,
                  'complex_count': 0,
              }
          }

          for i, state in enumerate(nwa.states):
              if state.final_weight is not None:
                  stats['num_final_states'] += 1
                  analyze_weight(state.final_weight, stats['weight_stats'])

              # Epsilon transitions
              eps_count = len(state.epsilons)
              stats['num_epsilon_transitions'] += eps_count
              stats['epsilon_transitions_per_state'][i] = eps_count
              stats['outgoing_degree_per_state'][i] += eps_count
              for target, weight in state.epsilons:
                  stats['incoming_degree_per_state'][target] += 1
                  analyze_weight(weight, stats['weight_stats'])

              # Labeled transitions
              labeled_count = 0
              for _label, targets in state.transitions.items():
                  labeled_count += len(targets)
                  for target, weight in targets:
                      stats['incoming_degree_per_state'][target] += 1
                      analyze_weight(weight, stats['weight_stats'])
              stats['num_labeled_transitions'] += labeled_count
              stats['labeled_transitions_per_state'][i] = labeled_count
              stats['outgoing_degree_per_state'][i] += labeled_count

              # Default transitions
              default_count = len(state.default)
              stats['num_default_transitions'] += default_count
              stats['default_transitions_per_state'][i] = default_count
              stats['outgoing_degree_per_state'][i] += default_count
              for default_trans in state.default:
                  target = default_trans.target
                  weight = default_trans.weight
                  stats['incoming_degree_per_state'][target] += 1
                  analyze_weight(weight, stats['weight_stats'])

          return stats

      def print_nwa_stats(stats: dict):
          """
          Prints a summary of the NWA statistics to the console.
          """
          print("--- NWA Statistics ---")
          print(f"Number of states: {stats['num_states']}")
          print(f"Start state: {stats['start_state']}")
          print(f"Number of final states: {stats['num_final_states']}")
          print("\n--- Transitions ---")
          print(f"Total epsilon transitions: {stats['num_epsilon_transitions']}")
          print(f"Total labeled transitions: {stats['num_labeled_transitions']}")
          print(f"Total default transitions: {stats['num_default_transitions']}")
          
          total_transitions = stats['num_epsilon_transitions'] + stats['num_labeled_transitions'] + stats['num_default_transitions']
          print(f"Total transitions: {total_transitions}")
          if stats['num_states'] > 0:
              print(f"Average outgoing degree: {total_transitions / stats['num_states']:.2f}")

          print("\n--- Weight Statistics ---")
          print(f"  'ALL' weights: {stats['weight_stats']['all_count']}")
          print(f"  Empty weights: {stats['weight_stats']['empty_count']}")
          print(f"  Complex weights: {stats['weight_stats']['complex_count']}")

      def load_nwa(filepath: str) -> NWA:
          """
          Loads an NWA from a JSON file.
          """
          with open(filepath, 'r') as f:
              data = json.load(f)
          return NWA.from_dict(data)

      if __name__ == "__main__":
          filepath = None
          if len(sys.argv) > 2:
              print(f"Usage: python {sys.argv[0]} [<path_to_nwa_dump.json>]")
              sys.exit(1)
          
          if len(sys.argv) == 2:
              filepath = sys.argv[1]
          else: # len(sys.argv) == 1
              try:
                  # Search for dump files in the current directory and parent directory
                  # to handle being run from project root or from scripts/
                  search_paths = ['./nwa_dump_*.json', '../nwa_dump_*.json']
                  dump_files = []
                  for path in search_paths:
                      dump_files.extend(glob.glob(path))

                  if not dump_files:
                      print("No NWA dump file provided and no 'nwa_dump_*.json' files found in current or parent directory.")
                      sys.exit(1)
                  
                  filepath = max(dump_files, key=os.path.getmtime)
                  print(f"No path provided. Using most recent dump file: {filepath}")
              except Exception as e:
                  print(f"Error finding most recent dump file: {e}", file=sys.stderr)
                  sys.exit(1)

          try:
              nwa = load_nwa(filepath)
              stats = get_nwa_stats(nwa)
              print_nwa_stats(stats)
          except FileNotFoundError:
              print(f"Error: File not found at {filepath}", file=sys.stderr)
              sys.exit(1)
          except json.JSONDecodeError:
              print(f"Error: Could not decode JSON from {filepath}", file=sys.stderr)
              sys.exit(1)
