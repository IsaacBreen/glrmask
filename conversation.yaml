                  if bucket is None:
                      todo[depth] = {node_idx}
                      heappush(depth_heap, depth)
                  else:
                      bucket.add(node_idx)

              heappop = heapq.heappop
              arena = self.arena
              is_end = self.is_end

              # print("\n--- Main loop ---")
              iter_count = 0
              while True:
                  iter_count += 1
                  # Pop the smallest depth bucket (skip stale heap entries)
                  node_indices: Optional[set[int]] = None
                  current_depth = -1
                  while depth_heap:
                      current_depth = heappop(depth_heap)
