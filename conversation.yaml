      // #[time_it]
      fn process_predecessors(incoming: &NodeSet) -> NodeMap {
          let mut grouped: BTreeMap<(ParseStateEdgeContent, DestKey), Vec<Arc<GSSNode>>> =
              BTreeMap::new();

          for (pred_arc, edge_val) in incoming {
