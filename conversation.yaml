          Internal(HashMap<T, HashMap<usize, Rc<LeveledGSS<T, Acc>>>>),
          Empty,
      }

      #[derive(Debug, Clone)]
      pub enum LeveledGSSInner<T> {
          Root,
          InternalInner(HashMap<T, HashMap<usize, Rc<LeveledGSSInner<T>>>>),
      }
      ```


      Write a function that validates the invariants I've specified for the GSS. In particular, we need to ensure that Acc is always 'sucked up' when it can be.

      `prune` and `apply` should not unnecessarily create new nodes. Shared nodes are the cornerstone of performance in this code. If we go around creating multiple equal nodes at different places in memory, it hurts performance greatly.

      Note that in leveled_impl Acc should only ever exist at the type B node variant that contains a (single) type A node and an Acc. It should never exist in a type A node, nor should it exist in either of the other type B variants: the empty variant and the variant that maps to other type B nodes.


