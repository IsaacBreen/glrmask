           Then, within `commit_bytes`, apply these to each `glr_state.stack`.

         - **Main worklist:**

           Replace the current GLRParserState‑based worklist with a GSS‑based one mirroring Python:

           ```rust
           let mut new_overall_state: BTreeMap<TokenizerStateID, GLRParserState<'a>> = BTreeMap::new();

           let mut processing_queue: BTreeMap<
               usize,
               BTreeMap<TokenizerStateID, GLRParserState<'a>>,
           > = BTreeMap::new();
           processing_queue.insert(0, std::mem::take(&mut self.state));

           while let Some((offset, states_to_process)) = processing_queue.pop_first() {
               for (tokenizer_s_id_at_offset, glr_s_at_offset) in states_to_process {
                   let exec_result = self.parent.tokenizer.execute_from_state(
                       &llm_token_bytes[offset..],
                       tokenizer_s_id_at_offset,
                   );

                   // end_state, matches
                   let end_state = exec_result.end_state;
                   let matches = exec_result.matches;

                   for match_info in &matches {
                       let mut gss = glr_s_at_offset.stack.clone();
                       let term_id = TerminalID(match_info.id);

                       if let Some(dummy_id) = self.parent.original_to_dummy_map.get(&term_id) {
                           gss = self.parent.parser.process_token_gss(&gss, *dummy_id);
                       }
                       gss = self.parent.parser.process_token_gss(&gss, term_id);

                       if let Some(end_state_id) = end_state {
                           if self.parent
                               .tokenizer
                               .tokens_accessible_from_state(TokenizerStateID(end_state_id))
                               .contains(&term_id)
                           {
                               // Equivalent of _disallow_terminal_in_state:
                               let disallowed = {
                                   let mut bv = TerminalBV::zeros();
                                   bv.insert(match_info.id);
                                   let mut l2 = HybridL2Bitset::new();
                                   l2.insert_l2_bitset(end_state_id, bv);
                                   l2
                               };
                               gss = gss.apply_and_prune(|acc| {
                                   let mut na = acc.clone();
                                   na.terminals_union -= &disallowed;
                                   if na.llm_tokens_union.is_empty() {
                                       None
                                   } else {
                                       Some(na)
                                   }
                               });
                           }
                       }

                       if !gss.is_empty() {
                           let new_offset = offset + match_info.width;
                           let next_tsid = self.parent.tokenizer.initial_state_id();
                           if new_offset == llm_token_bytes.len() {
                               new_overall_state
                                   .entry(next_tsid)
                                   .and_modify(|existing| {
                                       existing.stack = existing.stack.merge(&gss);
                                   })
                                   .or_insert(GLRParserState { parser: self.parent.parser, stack: gss });
                           } else {
                               processing_queue
                                   .entry(new_offset)
                                   .or_default()
                                   .entry(next_tsid)
                                   .and_modify(|existing| {
                                       existing.stack = existing.stack.merge(&gss);
                                   })
                                   .or_insert(GLRParserState { parser: self.parent.parser, stack: gss });
                           }
                       }
                   }

                   if let Some(end_state_id) = end_state {
                       let final_tokenizer_state = TokenizerStateID(end_state_id);
                       new_overall_state
                           .entry(final_tokenizer_state)
                           .and_modify(|existing| {
                               existing.stack = existing.stack.merge(&glr_s_at_offset.stack);
                           })
                           .or_insert(glr_s_at_offset);
                   }
               }
           }

           self.state = new_overall_state;
           ```

           This is the Rust analogue of Python’s `commit` worklist, but using `GLRParser::process_token_gss`.

