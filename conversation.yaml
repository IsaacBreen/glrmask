              let constraint = GrammarConstraint::from_json(json_node)
                  .map_err(|e| PyErr::new::<pyo3::exceptions::PyValueError, _>(format!("Failed to deserialize GrammarConstraint from JSONNode: {}", e)))?;
              Ok(Self { inner: Arc::new(constraint) })
