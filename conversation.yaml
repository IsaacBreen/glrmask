                          if not pm:
                              continue
                          for terminal_id_key, llm_tokens in pm.items():
                              if bv.contains(int(terminal_id_key)):
                                  allowed_mask = allowed_mask.union(llm_tokens)
                  return PyAcc(
                      terminals_union=ffi.HybridL2Bitset.all(),  # consume
                      llm_mask=allowed_mask
                  )

