      }
      pub trait DynHash {
          fn dyn_hash(&self, state: &mut dyn std::hash::Hasher);
      }
      impl DynEq for () {
          fn dyn_eq(&self, _other: &dyn Any) -> bool { true }
      }
      impl DynOrd for () {
          fn dyn_cmp(&self, _other: &dyn Any) -> std::cmp::Ordering { std::cmp::Ordering::Equal }
      }
      impl DynHash for () {
