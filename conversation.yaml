      Add an optimisation to the precomputed tree in constraint.rs.
      Some terminals never appear consecutively in the grammar. So, there's no point in having them consecutively in the precompute tree.
      We can therefore prune edges like this:
      - compute a map from terminal to a set of terminals that can follow it (add a function for this in src/glr/analyze.rs)
      - consider a node in the precompute trie
      - construct a set of allowed follow terminals for this node. Initialize it as empty.
      - consider the node's incoming edges. Each edge has a terminal. Look that terminal up in the map to get the set of terminals that can follow it.
