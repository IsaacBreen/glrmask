              let mut c1_s0: BTreeMap<usize, usize> = BTreeMap::new();
              c1_s0.insert(1, 1);
              let mut c1_s1: BTreeMap<usize, usize> = BTreeMap::new();
              c1_s1.insert(1, 1);
