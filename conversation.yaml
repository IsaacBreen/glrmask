  - user: |-
      For commit, need to be selective wrt internal values, ie check internal nodes' t values for the llm_token_id, and prune if not compatible.  
      To keep this efficient, we probably need to have a way of traversing the gss but stopping early when all nested llm token bvs are compatible.  
      Perhaps maintain a llm token bv that's the intersection of all its children's?
      Yes, store both the LLM token union and the LLM token intersection in each node.
      Create a struct to store both, and put it in ParseStateNodeContent as t.
      And should we add a method to the GSSNode that lets us easily traverse and prune nodes? Or can we do it using existing tools provided by gss?

      How should we implement MergeAndIntersect for the new struct containing both union and intersection?
      Union works as before, merge does OR and intersect does AND.
      For intersection, merge does AND, but intersect does NOT do OR - intersect just returns the original value. This means it's NOT symmetrical.
      Why? Intersection represents the intersection of all LLM token bitsets of all children of this node. That doesn't change unless the children's LLM token bitsets change (which they don't).

      Let's give them better names. The 'union' llm bitset can be the 'active' llm tokens, and the intersection can be something else appropriate.

      Now, let's say we're doing a commit and the active parse state we're considering does indeed have the llm token we're committing.
      Right now, that's enough for us and we move on. But this is wrong.
      We need to go through the subtree of GSS nodes and prune any that don't have this LLM token in their active llm token bitset.
      We could check a node's intersection. If the llm token bit is set in the intersection, then it must be set in all childrens' active LLM bitsets. Thus, we don't need to look at its children, we can stop early here.
      That's the purpose of maintaining an intersection.

      Now, commit will prune nodes that don't have the given llm token, but it'll also replace active llm tokens of all nodes (and do any necessary update for the intersections) with a full bitset of 'true' values.

      How are we gonna prune a GSS? Tricky esp given we have multiple roots (each parse state effectively contains a root) and subtrees can be shared.
      We can't mutate a GSS node - it doesn't have a mutex and we don't want to add a mutex.
      We can easily create a queue of nodes, but we don't want to process a node until all of its parents have been processed.
      We can probs do it by adding a field max depth or something to GSSNode and popping in that order. A parent's max depth will always be at least 1 greater than its childrens'.
      Yes, good.
      So, we have a method on GSSNode that takes a vector of nodes and a function that takes a node and returns an optional node (None if we want to delete this node), and returns a vec of optional nodes of the same length, where entries are None if that root node has itself been removed.
      But, crucially, it processes them in such a way that if two parents share the same child, then they'll still share that same child in the new tree.
      And actually let's have that closure passed to the function return an enum that can either contain the new node, or be a flag that indicates to delete this node, or contain a new node *and* be a flag that indicates to not process this node's children (early stop).
      Or simpler: return an optional (node, flag) tuple where the flag indicates to not process this node's children (unless ofc those children happen to be reachable via another node that *does* want them processed) and if the option is None then we delete this node (don't include it in its parent's children) (and obv don't process this node's children either).

      Anyway, so we get our vec of optional nodes in commit. What'd we pass? We gather all nodes in all glr parser states for all tokenizer states in the grammar constraint state. We get a vec of optional nodes, and where the option is None we omit those nodes. But we put all of them back into GrammarConstraintState::state under the TokenizerStateID for its corresponding node passed into the function.


