          Truncates the string if it exceeds max_len.
          """
          if not ranges:
              return "{}"

          parts = []
          for start, end in ranges:
              if start == end:
                  parts.append(str(start))
              else:
                  parts.append(f"{start}..{end}")

          result = ", ".join(parts)
          if len(result) > max_len:
              return result[:max_len - 3] + "..."
          return result


