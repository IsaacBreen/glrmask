      impl<'a> PartialEq for GrammarConstraintState<'a> {
          fn eq(&self, other: &Self) -> bool {
              // Compare parent by pointer to ensure they originate from the same constraint object.
              std::ptr::eq(self.parent, other.parent) && self.state == other.state
          }
      }

      impl<'a> Eq for GrammarConstraintState<'a> {}

      impl<'a> Display for GrammarConstraintState<'a> {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "GrammarConstraintState ({} active tokenizer states):", self.state.len())?;
              if self.state.is_empty() {
                  return Ok(());
              }

              let mut gss_roots = Vec::new();
              let mut tokenizer_state_info = Vec::new();

              for (tokenizer_state_id, glr_state) in &self.state {
                  if !glr_state.active_state.stack.is_empty() {
                      gss_roots.push(glr_state.active_state.stack.clone());
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: GSS Root ({} predecessors)",
                          tokenizer_state_id.0,
                          glr_state.active_state.stack.num_predecessors()
                      ));
                  } else {
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: (Empty GSS)",
                          tokenizer_state_id.0
                      ));
                  }
              }

              for info in tokenizer_state_info {
                  writeln!(f, "{}", info)?;
              }

              if !gss_roots.is_empty() {
                  writeln!(f, "\nCombined GSS Forest (showing up to 50 nodes):")?;
                  let config = GSSPrintConfig {
                      labels: None,
                      max_edges: 50,
                      original_internal_bimap: Some(&self.parent.llm_vocab.original_to_internal_id_bimap),
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  let (gss_str, _) =
                      crate::datastructures::gss::print_gss_forest(&gss_roots, &self.parent.parser.terminal_map, &config);
                  write!(f, "{}", gss_str)?;
              }

              Ok(())
          }
      }

      impl<'a> GrammarConstraintState<'a> {
          pub fn get_mask(&self) -> LLMTokenBV {
              // return HybridBitset::ones(self.parent.llm_vocab.max_original_llm_token_id + 1); // TEMP
              // self.get_mask1()
              // self.get_mask2()
              self.get_mask3()
          }

          #[time_it]
          pub fn get_mask1(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(2, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot(
                      &roots_with_labels,
                      Some(&self.parent.llm_vocab.original_to_internal_id_bimap),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());

              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              #[derive(Default, Clone, Copy, Debug)]
              struct StepCount {
                  total: usize,
                  successful: usize,
              }

              let step_counts = Arc::new(RwLock::new(BTreeMap::<TerminalID, StepCount>::new()));

              let mut initial_values_for_map: Vec<(PrecomputeNodeIndex, GLRParserState<'a>)> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  // crate::debug!(4, "Initializing GSS for state {}", tokenizer_state_id.0);
                  // Ensure the GLR state's GSS stack is not empty before proceeding
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed.get(tokenizer_state_id) {
                      let mut forbidden_llm_tokens = LLMTokenBV::zeros();
                      let disallowed_terminals_l2 = glr_state.active_state.stack.disallowed_terminals();

                      // Iterate over ranges of tokenizer states that have the same set of disallowed terminals.
                      for (tokenizer_state_range, disallowed_terminals_for_range) in disallowed_terminals_l2.range_values() {
                          if disallowed_terminals_for_range.is_empty() {
                              continue;
                          }

                          // Get a sub-view of possible_matches that covers this range of tokenizer states.
                          let relevant_possible_matches = self.parent.possible_matches.range(TokenizerStateID(*tokenizer_state_range.start())..=TokenizerStateID(*tokenizer_state_range.end()));

                          for (_tokenizer_state_id, possible_matches_for_state) in relevant_possible_matches {
                              for (terminal_id, llm_tokens_that_match_this_terminal) in possible_matches_for_state {
                                  if disallowed_terminals_for_range.contains(terminal_id.0) {
                                      forbidden_llm_tokens |= llm_tokens_that_match_this_terminal;
                                  }
                              }
                          }
                      }
                      let mut glr_state = glr_state.clone();
                      if !forbidden_llm_tokens.is_empty() {
                          // glr_state.log_gss(format!("Subtracting forbidden LLM tokens: {:?}", forbidden_llm_tokens).as_str(), TerminalID(0));
                          disallow_llm_tokens_and_prune_arc(&mut glr_state.active_state.stack, &forbidden_llm_tokens, &mut HashMap::new());
                          // glr_state.log_gss("Done subtracting forbidden LLM tokens.", TerminalID(0));
                      }
                      initial_values_for_map.push((precomputed_trie_root_arc.clone(), glr_state));
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              if initial_values_for_map.is_empty() {
                   // This can happen if all GLR states had empty GSS stacks or no corresponding precomputed tries.
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));

              let step_counts_clone1 = Arc::clone(&step_counts);
              let step_counts_clone2 = Arc::clone(&step_counts);

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie1_god,
                  initial_values_for_map,
                  // step_fn: (current_glr_state, edge_grammar_token_opt, destinations_map)
                  |glr_s, grammar_token_opt, dest_map| {
                      if true {
                          timeit!("get_mask try to avoid step for no additional llm tokens", {
                          let mut all_edge_llm_tokens = HybridBitset::zeros();
                          for edge_llm_tokens_bv in dest_map.values() {
                              all_edge_llm_tokens |= edge_llm_tokens_bv;
                          }
                          let glr_s_llm_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                          let potential_additional_llm_tokens = &glr_s_llm_tokens & &all_edge_llm_tokens;
                          if potential_additional_llm_tokens.is_subset(&final_mask_internal.borrow()) {
                              // If the potential additional tokens are already in the final mask, skip stepping.
                              crate::debug!(4, "Skipping step for grammar token {:?} as all edge LLM tokens are already in final mask.", grammar_token_opt);
                              return Vec::new();
                          }
                          });
                      }

                      // let mut glr_s = glr_s.clone();
                      // disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());

                      // Count num end nodes vs non end nodes
                      let mut num_end = 0;
                      let mut num_non_end = 0;
                      for child_node_trie_data in dest_map.keys() {
                          if child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                              num_end += 1;
                          } else {
                              num_non_end += 1;
                          }
                      }
                      timeit!(format!("get_mask step_fn - end only? {}", num_end > 0 && num_non_end == 0), {
                          if num_non_end == 0 {
                              if let Some(gtid) = grammar_token_opt {
                                  // let stats = gather_gss_stats(&[glr_s.active_state.stack.as_ref()]);
                                  // crate::debug!(3, "Step for grammar token {:?} with only end nodes, GSS stats: {:#?}", gtid, stats);
                                  // Perhaps we can avoid stepping by calling `has_action_for`
                                  match glr_s.has_action_for(*gtid) {
                                      Some(glr_s_llm_tokens) => {
                                          timeit!(format!("get_mask step_fn - has_action_for"), {
                                              // This token will succeed
                                              crate::debug!(4, "Step with grammar token {:?} ({}) has action, but all children are end nodes, so we can skip stepping and update final mask directly.", gtid, self.parent.parser.terminal_map.get_by_right(gtid).map_or("UNKNOWN_TERMINAL".to_string(), |s| s.to_string()));
                                              let mut edge_llm_tokens = HybridBitset::zeros();
                                              for edge_llm_tokens_bv in dest_map.values() {
                                                  edge_llm_tokens |= edge_llm_tokens_bv;
                                              }
                                              let llm_tokens = &glr_s_llm_tokens & &edge_llm_tokens;
                                              crate::debug!(4, "Adding active tokens {:?} to final mask", llm_tokens);
                                              *final_mask_internal.borrow_mut() |= llm_tokens;
                                              crate::debug!(4, "Final mask after adding tokens: {:?}", final_mask_internal.borrow());
                                              return Vec::new();
                                          });
                                      },
                                      None => {
                                          timeit!(format!("get_mask step_fn - has_action_for - inconclusive"), {
                                              // Inconclusive
                                              crate::debug!(4, "Inconclusive step for grammar token {:?}, no action found.", gtid);
                                          });
                                      },
                                  }
                              }
                          }

                          let mut glr_s = glr_s.clone();

                          if let Some(gtid) = grammar_token_opt {
                              let mut counts_guard = step_counts_clone1.write().unwrap();
                              let entry = counts_guard.entry(*gtid).or_default();
                              entry.total += 1;

                              let terminal_name = self.parent.parser.terminal_map.get_by_right(gtid)
                                  .map(|s| s.to_string())
                                  .unwrap_or("UNKNOWN_TERMINAL".to_string());
                              // timeit!(format!("get_mask step for terminal '{}'", terminal_name), {
                              glr_s.process_token(*gtid);
                              // });

                              crate::debug!(4, "glr_s.is_ok()_after_process_token: {}", glr_s.is_ok());

                              if glr_s.is_ok() {
                                  entry.successful += 1;
                              } else {
                                  return Vec::new();

                              }
                          }

                          // glr_s.log_gss("After stepping", grammar_token_opt.unwrap_or(TerminalID(0)));
                          // disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());

                          let mut results = Vec::new();

                          crate::debug!(4, "Processing edge: {:?}", grammar_token_opt);
                          for (child_node_trie_data, edge_llm_tokens_bv) in dest_map.iter() {
                              let mut glr_s = glr_s.clone();
                              allow_only_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &edge_llm_tokens_bv, &mut HashMap::new());
                              crate::debug!(4, "Stepping with grammar_token_opt: {:?}", grammar_token_opt);
                              glr_s.log_gss("Stepping with grammar_token_opt", grammar_token_opt.unwrap_or(TerminalID(0)), false, false);
                              crate::debug!(4, "Active LLM tokens: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                              crate::debug!(4, "Edge LLM tokens: {:?}", edge_llm_tokens_bv);
                              // crate::debug!(4, "Intersecting with edge_llm_tokens_bv: {:?}", edge_llm_tokens_bv);
                              // subtract_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());
                              // glr_s.log_gss("After intersecting", grammar_token_opt.unwrap_or(TerminalID(0)));

                              if !glr_s.is_ok() {
                                  crate::debug!(4, "GLR state is not alive after step, skipping.");
                                  continue;
                              }

                              if child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                                  let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                                  crate::debug!(4, "Adding active tokens {:?} to final mask", glr_active_tokens);
                                  // timeit!("get_mask final_mask update", {
                                  *final_mask_internal.borrow_mut() |= glr_active_tokens;
                                  // });
                                  crate::debug!(4, "Final mask after adding end node tokens: {:?}", final_mask_internal.borrow());
                              }

                              results.push((child_node_trie_data.clone(), glr_s));
                          }
                          crate::debug!(4, "Step function results len: {}", results.len());
                          results
                      })
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      timeit!("get_mask merge_fn", {
                          crate::debug!(4, "Active LLM tokens in glr_s1 before merge: {:?}", glr_s1.active_state.stack.allowed_llm_tokens());
                          crate::debug!(4, "Active LLM tokens in glr_s2 before merge: {:?}", glr_s2.active_state.stack.allowed_llm_tokens());
                          glr_s1.merge_with(glr_s2);
                          crate::debug!(4, "Active LLM tokens in glr_s1 after merge: {:?}", glr_s1.active_state.stack.allowed_llm_tokens());
                      })
                  },
                  // process_fn: (precomputed_node_data, final_glr_s_for_this_path)
                  |precomputed_node_data, glr_s| {
                      timeit!("get_mask process_fn", {
                          crate::debug!(4, "Processing precomputed node data: {:?}", precomputed_node_data);
                          if precomputed_node_data.value.end {
                              let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                              crate::debug!(4, "Precomputed node data is an end node, adding active tokens {:?} to final mask", glr_active_tokens);
                              *final_mask_internal.borrow_mut() |= glr_active_tokens;
                              crate::debug!(4, "Final mask after adding end node tokens: {:?}", final_mask_internal.borrow());
                              false
                          } else {
                              let mut num_outgoing_edges_that_lead_to_non_end_nodes = 0;
                              for (edge_terminal_opt, dest_map) in precomputed_node_data.children().iter() {
                                  if edge_terminal_opt.is_none() {
                                      num_outgoing_edges_that_lead_to_non_end_nodes += 1
                                  } else {
                                      for (child_node_trie_data, _edge_llm_tokens_bv) in dest_map.iter() {
                                          if !child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                                              num_outgoing_edges_that_lead_to_non_end_nodes += 1;
                                              break;
                                          }
                                      }
                                  }
                                  if num_outgoing_edges_that_lead_to_non_end_nodes >= 2 {
                                      break; // No need to check further, we have at least two non-end nodes.
                                  }
                              }
                              // Print GSS stats
                              disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());
                              Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                              let stats = gather_gss_stats(&[glr_s.active_state.stack.as_ref()]);
                              // crate::debug!(3, "GSS stats for precomputed node data: {:#?}", stats);
                              let mut do_phase3 = false;
                              do_phase3 |= num_outgoing_edges_that_lead_to_non_end_nodes >= 2;
                              do_phase3 |= match LR_MODE {
                                  LRMode::LR1 | LRMode::LALR_EX_SHIFT_STATES => false,
                                  LRMode::LALR => true,
                              };
                              // do_phase3 |= true;
                              if do_phase3 {
                                  // There will be a split.
                                  // Let's do some work ahead of time to avoid redundant computations due to the upcoming split.
                                  crate::debug!(4, "Processing non-end precomputed node data");
                                  crate::debug!(4, "Active LLM tokens before phase 3: {:?}", glr_s.active_state.stack.allowed_llm_tokens());

                                  let mut allowed_terminals = TerminalBV::zeros();
                                  for gtid_opt in precomputed_node_data.children().keys() {
                                      if let Some(gtid) = gtid_opt {
                                          allowed_terminals.insert(gtid.0);
                                      }
                                  }
                                  let disallowed_terminals_bv = allowed_terminals.inverted();
                                  if !disallowed_terminals_bv.is_empty() {
                                      let disallowed_l2 = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::from_iter(
                                          std::iter::once((0..=usize::MAX, disallowed_terminals_bv))
                                      );
                                      disallow_terminals_and_prune_arc(&mut glr_s.active_state.stack, &disallowed_l2, &mut HashMap::new());
                                  }

                                  glr_s.process_default_reductions();
                                  crate::debug!(4, "After phase 3, active stack.stack.is_empty(): {}", glr_s.active_state.stack.is_empty());
                                  Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                                  crate::debug!(4, "Active LLM tokens after phase 3: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                                  crate::debug!(4, "Disallowing LLM tokens and pruning arc for precomputed node data: {:?}", final_mask_internal.borrow());
                                  Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                              }
                              crate::debug!(4, "After processing precomputed node data, active stack.stack.is_empty(): {}", glr_s.active_state.stack.is_empty());
                              crate::debug!(4, "Final active LLM tokens: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                              !glr_s.active_state.stack.is_empty()
                          }
                      })
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));

              crate::profiler::print_summary_flat();

              let counts = step_counts.read().unwrap();
              if !counts.is_empty() {
                  let mut sorted_counts: Vec<_> = counts.iter().collect();
                  sorted_counts.sort_by_key(|&(_, count)| std::cmp::Reverse(count.total));

                  let mut log_msg = String::from("get_mask step() counts:");
                  for (terminal_id, count) in sorted_counts {
                      let terminal_name = self.parent.parser.terminal_map.get_by_right(terminal_id)
                          .map(|s| s.to_string())
                          .unwrap_or("UNKNOWN_TERMINAL".to_string());
                      log_msg.push_str(&format!("\n  - '{}': {}/{} successful", terminal_name, count.successful, count.total));
                  }
                  crate::debug!(3, "{}", log_msg);
              }

              crate::profiler::print_summary();
              crate::profiler::reset();

              // Log the GSSs
              if GSS_LOGGING_ENABLED {
                  crate::debug!(3, "Final GSS states after get_mask:");
                  let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
                  let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
                  let config = GSSPrintConfig {
                      labels: Some(&labels),
                      max_edges: 300,
                      original_internal_bimap: Some(&self.parent.llm_vocab.original_to_internal_id_bimap),
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  print!("{}", print_gss_forest(&roots, &self.parent.parser.terminal_map, &config).0);
              }

              let final_mask_mapped = self.parent.internal_bv_to_original(&final_mask_internal.into_inner());

              let t_end = std::time::Instant::now();
              println!("get_mask took: {:>15?}", t_end.duration_since(t0));

              final_mask_mapped
          }

          pub fn get_mask2(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(2, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot(
                      &roots_with_labels,
                      Some(&self.parent.llm_vocab.original_to_internal_id_bimap),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());

              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              #[derive(Default, Clone, Copy, Debug)]
              struct StepCount {
                  total: usize,
                  successful: usize,
              }

              let step_counts = Arc::new(RwLock::new(BTreeMap::<TerminalID, StepCount>::new()));

              let mut initial_values_for_map: Vec<(Trie2Index, GLRParserState<'a>)> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  // crate::debug!(4, "Initializing GSS for state {}", tokenizer_state_id.0);
                  // Ensure the GLR state's GSS stack is not empty before proceeding
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed2.get(tokenizer_state_id) {
                      let mut forbidden_llm_tokens = LLMTokenBV::zeros();
                      let disallowed_terminals_l2 = glr_state.active_state.stack.disallowed_terminals();

                      // Iterate over ranges of tokenizer states that have the same set of disallowed terminals.
                      for (tokenizer_state_range, disallowed_terminals_for_range) in disallowed_terminals_l2.range_values() {
                          if disallowed_terminals_for_range.is_empty() {
                              continue;
                          }

                          // Get a sub-view of possible_matches that covers this range of tokenizer states.
                          let relevant_possible_matches = self.parent.possible_matches.range(TokenizerStateID(*tokenizer_state_range.start())..=TokenizerStateID(*tokenizer_state_range.end()));

                          for (_tokenizer_state_id, possible_matches_for_state) in relevant_possible_matches {
                              for (terminal_id, llm_tokens_that_match_this_terminal) in possible_matches_for_state {
                                  if disallowed_terminals_for_range.contains(terminal_id.0) {
                                      forbidden_llm_tokens |= llm_tokens_that_match_this_terminal;
                                  }
                              }
                          }
                      }
                      let mut glr_state = glr_state.clone();
                      if !forbidden_llm_tokens.is_empty() {
                          // glr_state.log_gss(format!("Subtracting forbidden LLM tokens: {:?}", forbidden_llm_tokens).as_str(), TerminalID(0));
                          disallow_llm_tokens_and_prune_arc(&mut glr_state.active_state.stack, &forbidden_llm_tokens, &mut HashMap::new());
                          // glr_state.log_gss("Done subtracting forbidden LLM tokens.", TerminalID(0));
                      }
                      initial_values_for_map.push((precomputed_trie_root_arc.clone(), glr_state));
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              if initial_values_for_map.is_empty() {
                   // This can happen if all GLR states had empty GSS stacks or no corresponding precomputed tries.
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));

              let step_counts_clone1 = Arc::clone(&step_counts);
              let step_counts_clone2 = Arc::clone(&step_counts);

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie2_god,
                  initial_values_for_map,
                  // step_fn: (current_glr_state, (k, option state ID), destinations_map)
                  |glr_s, (k, expected_state_id_opt ), dest_map| {
                      // if !glr_s.is_ok() {
                      //     crate::debug!(4, "GLR state is not alive before popping, skipping.");
                      //     return Vec::new();
                      // }
                      crate::debug!(4, "Processing step for k: {:?}, expected_state_id_opt: {:?}", k, expected_state_id_opt);
                      // glr_s.log_gss("Before popping", TerminalID(0), false, false);
                      let mut out_gsss = Vec::new();
                      let popped = glr_s.active_state.stack.popn(*k);
                      for popper_item in popped.iter() {
                          for peek in popper_item.peek_iter() {
                              let ok = if let Some(expected_state_id) = expected_state_id_opt {
                                  expected_state_id == &peek.edge_value().state_id
                              } else {
                                  true
                              };
                              if ok {
                                  out_gsss.push(peek.isolated_parent());
                              }
                          }
                      }
                      if out_gsss.is_empty() {
                          crate::debug!(4, "No valid GSS nodes after popping, skipping.");
                          return Vec::new();
                      }
                      let out_gss = GSSNode::merge_many_with_depth(1, out_gsss);
                      crate::debug!(4, "After popping {} from GSS: {}", k, print_gss_forest(&[out_gss.clone()], &self.parent.parser.terminal_map, &GSSPrintConfig::default()).0);
                      // if !out_gss.is_alive() {
                      //     crate::debug!(4, "GLR state is not alive after popping, skipping.");
                      //     return Vec::new();
                      // }
                      let mut out = Vec::new();
                      for (dst_node_wrapper, edge_bv) in dest_map.iter() {
                          let mut out_gss_filtered = out_gss.clone();
                          crate::debug!(5, "Filtering GSS for edge LLM tokens: {:?}", edge_bv);
                          allow_only_llm_tokens_and_prune_arc(&mut out_gss_filtered, edge_bv, &mut HashMap::new());
                          let mut out_glr_s = glr_s.clone();
                          out_glr_s.active_state.stack = out_gss_filtered;
                          crate::debug!(4, "Allowed LLM tokens in out_gss_filtered: {:?}", out_glr_s.active_state.stack.allowed_llm_tokens());
                          // out_glr_s.log_gss("After filtering for edge LLM tokens", TerminalID(0), false, false);
                          // if out_glr_s.is_ok() {
                              out.push((dst_node_wrapper.clone(), out_glr_s));
                          }
                      // }
                      out
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      crate::debug!(4, "Merging two GLR states");
                      glr_s1.merge_with(glr_s2);
                  },
                  // process_fn: (precomputed_node_data, final_glr_s_for_this_path)
                  |precomputed_node_data, glr_s| {
                      crate::debug!(4, "Processing node {:p}", precomputed_node_data);
                      // glr_s.log_gss("At process_fn", TerminalID(0), false, false);
                      let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                      // let keep_going = !glr_active_tokens.is_empty();
                      let keep_going = glr_s.is_ok();
                      if precomputed_node_data.value.end {
                          crate::debug!(4, "Precomputed node data is an end node, adding active tokens {:?} to final mask", glr_active_tokens);
                          *final_mask_internal.borrow_mut() |= glr_active_tokens;
                      } else {
                          crate::debug!(4, "Precomputed node data is not an end node, active tokens: {:?}", glr_active_tokens);
                      }
                      keep_going
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));

              crate::profiler::print_summary_flat();

              let counts = step_counts.read().unwrap();
              if !counts.is_empty() {
                  let mut sorted_counts: Vec<_> = counts.iter().collect();
                  sorted_counts.sort_by_key(|&(_, count)| std::cmp::Reverse(count.total));

                  let mut log_msg = String::from("get_mask step() counts:");
                  for (terminal_id, count) in sorted_counts {
                      let terminal_name = self.parent.parser.terminal_map.get_by_right(terminal_id)
                          .map(|s| s.to_string())
                          .unwrap_or("UNKNOWN_TERMINAL".to_string());
                      log_msg.push_str(&format!("\n  - '{}': {}/{} successful", terminal_name, count.successful, count.total));
                  }
                  crate::debug!(3, "{}", log_msg);
              }

              crate::profiler::print_summary();
              crate::profiler::reset();

              // Log the GSSs
              if GSS_LOGGING_ENABLED {
                  crate::debug!(3, "Final GSS states after get_mask:");
                  let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
                  let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
                  let config = GSSPrintConfig {
                      labels: Some(&labels),
                      max_edges: 300,
                      original_internal_bimap: Some(&self.parent.llm_vocab.original_to_internal_id_bimap),
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  print!("{}", print_gss_forest(&roots, &self.parent.parser.terminal_map, &config).0);
              }

              crate::debug!(4, "Final mask internal: {:?}", final_mask_internal.borrow());
              let final_mask_mapped = self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              crate::debug!(4, "Final mask mapped: {:?}", final_mask_mapped);

              let t_end = std::time::Instant::now();
              println!("get_mask took: {:>15?}", t_end.duration_since(t0));

              final_mask_mapped
          }

          pub fn print_gss_stats(&self) {
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(2, "GSS stats: {:#?}", stats);
          }

          pub fn print_gss(&self) {
              let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
              if roots.is_empty() {
                  println!("GSS is empty.");
                  return;
              }

              let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();

              let config = GSSPrintConfig {
                  labels: Some(&labels),
                  max_edges: 500,
                  original_internal_bimap: Some(&self.parent.llm_vocab.original_to_internal_id_bimap),
                  llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                  verbose: false,
              };

              let (gss_str, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &config);
              println!("{}", gss_str);
          }

          pub fn explain_stack(&self) {
              for (state_id, state) in &self.state {
                  println!("\n--- State {} ---", state_id.0);
                  // Sample and print a bunch of stacks
                  let mut seen = BTreeSet::new();
                  let num_to_sample = 10;
                  for i in 0..1000 {
                      if let Some(sampled_path_edges) = sample_path(&[&state.active_state.stack], i) {
                          let mut sampled_stack: Vec<usize> = sampled_path_edges.iter()
                              .map(|edge| edge.state_id.0)
                              .collect();
                          sampled_stack.reverse();
                          if seen.contains(&sampled_stack) {
                              continue;
                          }
                          seen.insert(sampled_stack);
                          if seen.len() >= num_to_sample {
                              break;
                          }
                      };
                  }
                  for sampled_stack in seen {
                      println!("  Sampled stack: {:?}", sampled_stack);
                  }
                  // Sample a stack
                  if let Some(sampled_path_edges) = sample_path(&[&state.active_state.stack], 1) {
                      let mut sampled_stack: Vec<StateID> = sampled_path_edges.iter()
                          .map(|edge| edge.state_id)
                          .collect();
                      sampled_stack.reverse();
                      let explanation = self.parent.parser.explain_stack(&sampled_stack);
                      // Indent the explanation for readability
                      for line in explanation.lines() {
                          println!("      {}", line);
                      }
                  };
              }
          }

          pub fn get_mask3(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(2, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot(
                      &roots_with_labels,
                      Some(&self.parent.llm_vocab.original_to_internal_id_bimap),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());

              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              let mut initial_values_for_map: Vec<(PrecomputeNode3Index, (GLRParserState<'a>, LLMTokenBV))> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed3.get(tokenizer_state_id) {
                      let mut forbidden_llm_tokens = LLMTokenBV::zeros();
                      let disallowed_terminals_l2 = glr_state.active_state.stack.disallowed_terminals();

                      for (tokenizer_state_range, disallowed_terminals_for_range) in disallowed_terminals_l2.range_values() {
                          if disallowed_terminals_for_range.is_empty() {
                              continue;
                          }

                          let relevant_possible_matches = self.parent.possible_matches.range(TokenizerStateID(*tokenizer_state_range.start())..=TokenizerStateID(*tokenizer_state_range.end()));

                          for (_tokenizer_state_id, possible_matches_for_state) in relevant_possible_matches {
                              for (terminal_id, llm_tokens_that_match_this_terminal) in possible_matches_for_state {
                                  if disallowed_terminals_for_range.contains(terminal_id.0) {
                                      forbidden_llm_tokens |= llm_tokens_that_match_this_terminal;
                                  }
                              }
                          }
                      }
                      let glr_state = glr_state.clone();
                      let mut allowed_bv = self.parent.all_internal_llm_tokens_bitset();
                      if !forbidden_llm_tokens.is_empty() {
                          allowed_bv -= &forbidden_llm_tokens;
                      }
                      initial_values_for_map.push((precomputed_trie_root_arc.clone(), (glr_state, allowed_bv)));
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              if initial_values_for_map.is_empty() {
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie3_god,
                  initial_values_for_map,
                  // step_fn: (current_state, (pop, llm_token_bv), destinations_map)
                  |state, (pop, llm_token_bv_from_edge), dest_map| {
                      let (glr_s, allowed_bv) = state;
                      let popped = glr_s.active_state.stack.popn(*pop);
                      let mut results = Vec::new();

                      for (dest_idx, state_id_bv) in dest_map.iter() {
                          let mut valid_gss_nodes = Vec::new();
                          for popper_item in popped.iter() {
                              for peek in popper_item.peek_iter() {
                                  if state_id_bv.contains(peek.edge_value().state_id.0) {
                                      valid_gss_nodes.push(peek.isolated_parent());
                                  }
                              }
                          }

                          if valid_gss_nodes.is_empty() {
                              continue;
                          }

                          let merged_gss = GSSNode::merge_many_with_depth(1, valid_gss_nodes);
                          let mut new_glr_s = glr_s.clone();
                          new_glr_s.active_state.stack = merged_gss;

                          let new_allowed_bv = allowed_bv & llm_token_bv_from_edge;

                          if new_glr_s.is_ok() && !new_allowed_bv.is_empty() {
                              results.push((dest_idx.clone(), (new_glr_s, new_allowed_bv)));
                          }
                      }
                      results
                  },
                  // merge_fn
                  |state1, state2| {
                      let (glr_s1, allowed_bv1) = state1;
                      let (glr_s2, allowed_bv2) = state2;
                      glr_s1.merge_with(glr_s2);
                      *allowed_bv1 |= allowed_bv2;
                  },
                  // process_fn: (precomputed_node_data, final_state_for_this_path)
                  |precomputed_node_data, state| {
                      let (glr_s, allowed_bv) = state;
                      let glr_active_tokens = &glr_s.active_state.stack.allowed_llm_tokens() & allowed_bv;
                      let keep_going = glr_s.is_ok() && !allowed_bv.is_empty();
                      if precomputed_node_data.value.end {
                          *final_mask_internal.borrow_mut() |= glr_active_tokens;
                      }
                      keep_going
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));

              crate::profiler::print_summary_flat();
              crate::profiler::print_summary();
              crate::profiler::reset();

              crate::debug!(4, "Final mask internal: {:?}", final_mask_internal.borrow());
              let final_mask_mapped = self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              crate::debug!(4, "Final mask mapped: {:?}", final_mask_mapped);

              let t_end = std::time::Instant::now();
              println!("get_mask took: {:>15?}", t_end.duration_since(t0));

              final_mask_mapped
          }

          pub fn commit(&mut self, llm_token_id: LLMTokenID) { // llm_token_id is original
              let llm_token_bytes = self.parent.llm_vocab.llm_token_map.get_by_right(&llm_token_id).unwrap();
              self.commit_bytes(llm_token_bytes);
          }

          #[time_it]
          pub fn commit_bytes(&mut self, llm_token_bytes: &[u8]) { // llm_token_id is original
              if llm_token_bytes.is_empty() {
                  return;
              }

              crate::debug!(3, "Committing bytes: {:?}", String::from_utf8_lossy(llm_token_bytes));

              // for (state_id, state) in &self.state {
              //     crate::debug!(3, "State {} before commit:", state_id.0);
              //     state.log_gss("Before commit", TerminalID(0), false, false);
              // }

              let mut gss_transformation_memo = HashMap::new();

              for state in self.state.values_mut() {
                  reset_llm_tokens(&mut state.active_state.stack, &mut gss_transformation_memo);
              }
              gss_transformation_memo.clear();

              // Handle allowed terminals
              let mut state_map: BTreeMap<TokenizerStateID, TokenizerStateID> = BTreeMap::new();
              let mut terminals_map: BTreeMap<TokenizerStateID, TerminalBV> = BTreeMap::new();
              for (tokenizer_state_id, _state) in self.state.iter() {
                  let exec_result = self.parent.tokenizer.execute_from_state(
                      &llm_token_bytes,
                      *tokenizer_state_id,
                  );
                  if let Some(new_state) = exec_result.end_state {
                      state_map.insert(*tokenizer_state_id, TokenizerStateID(new_state));
                  }
                  let mut terminals = TerminalBV::zeros();
                  for token in exec_result.matches {
                      terminals.insert(token.id);
                  }
                  terminals_map.insert(*tokenizer_state_id, terminals);
              }

              let gss_stats_before_pruning = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(5, "Terminals map: {:?}", terminals_map);
              for state in self.state.values_mut() {
                  prune_disallowed_terminals(&mut state.active_state.stack, &terminals_map, &mut gss_transformation_memo);
              }
              gss_transformation_memo.clear();
              let gss_stats_after_pruning = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats before pruning disallowed terminals: {:#?}", gss_stats_before_pruning);
              if gss_stats_after_pruning != gss_stats_before_pruning {
                  crate::debug!(3, "GSS stats after pruning disallowed terminals: {:#?}", gss_stats_after_pruning);
                  crate::debug!(3, "GSS stats changed after pruning disallowed terminals.");
                  // if GSS_LOGGING_ENABLED {
                  //     self.print_gss();
                  // }
              } else {
                  crate::debug!(3, "GSS stats did not change after pruning disallowed terminals.");
              }

              for state in self.state.values_mut() {
                  map_allowed_terminals_tokenizer_states(&mut state.active_state.stack, &state_map, &mut gss_transformation_memo);
              }
              gss_transformation_memo.clear();
              // println!("State after preparation: {}", self);

              let mut new_overall_state: BTreeMap<TokenizerStateID, GLRParserState<'a>> = BTreeMap::new();

              let mut processing_queue: BTreeMap<usize, BTreeMap<TokenizerStateID, GLRParserState<'a>>> = BTreeMap::new();
              processing_queue.insert(0, std::mem::take(&mut self.state));

              while let Some((offset, states_to_process)) = processing_queue.pop_first() {
                  crate::debug!(3, "Processing offset {} with states {:?}.", offset, states_to_process.keys().map(|k| k.0).collect::<Vec<_>>());
                  for (tokenizer_s_id_at_offset, glr_s_at_offset) in states_to_process {
                      assert!(offset < llm_token_bytes.len());

                      let exec_result = self.parent.tokenizer.execute_from_state(
                          &llm_token_bytes[offset..],
                          tokenizer_s_id_at_offset,
                      );

                      for match_info in &exec_result.matches {
                          let mut cloned_glr_s = glr_s_at_offset.clone();

                          cloned_glr_s.step(TerminalID(match_info.id));
                          // cloned_glr_s.do_phase3();

                          if cloned_glr_s.is_ok() {
                              let new_offset = offset + match_info.width;
                              // After a grammar token is consumed, the tokenizer resets for the next segment of the LLM token.
                              let next_tokenizer_id_for_segment = self.parent.tokenizer.initial_state_id();

                              let mut disallowed_terminals = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::new();
                              if let Some(end_state_id) = exec_result.end_state {
                                  let terminals_accessible_from_end_state = self.parent.tokenizer.tokens_accessible_from_state(TokenizerStateID(end_state_id));
                                  if terminals_accessible_from_end_state.contains(&TerminalID(match_info.id)) {
                                      let mut disallowed_terminals_for_end_state = TerminalBV::zeros();
                                      // Disallow this token from being matched again immediately.
                                      disallowed_terminals_for_end_state.insert(match_info.id);
                                      disallowed_terminals.insert_l2_bitset(end_state_id, disallowed_terminals_for_end_state);
                                  }
                              }
                              // cloned_glr_s.log_gss(format!("Before disallowing terminals {:?} after committing bytes {:?}", &disallowed_terminals, &llm_token_bytes[offset..new_offset]).as_str(), TerminalID(match_info.id), false, false);
                              disallow_terminals_and_prune_arc(&mut cloned_glr_s.active_state.stack, &disallowed_terminals, &mut HashMap::new());
                              // cloned_glr_s.log_gss(format!("After disallowing terminals {:?} after committing bytes {:?}", &disallowed_terminals, &llm_token_bytes[offset..new_offset]).as_str(), TerminalID(match_info.id), false, false);

                              if new_offset == llm_token_bytes.len() {
                                  // reset_allowed_terminals(&mut cloned_glr_s.active_state.stack);
                                  new_overall_state.entry(next_tokenizer_id_for_segment).and_modify(|existing| existing.merge_with(cloned_glr_s.clone())).or_insert(cloned_glr_s);
                              } else {
                                  processing_queue.entry(new_offset).or_default().entry(next_tokenizer_id_for_segment).and_modify(|existing| existing.merge_with(cloned_glr_s.clone())).or_insert(cloned_glr_s);
                              }
                          }
                      }

                      if let Some(final_tokenizer_s_id_for_llm_token_segment) = exec_result.end_state {
                          // The rest of llm_token_bytes (from offset) was consumed, tokenizer ended in this state.
                          // The glr_s_at_offset is carried over. This is a state *after* the current LLM token.
                          let final_tokenizer_state = TokenizerStateID(final_tokenizer_s_id_for_llm_token_segment);
                          new_overall_state.entry(final_tokenizer_state).and_modify(|existing| existing.merge_with(glr_s_at_offset.clone())).or_insert(glr_s_at_offset.clone());
                      }
                  }
              }

              self.state = new_overall_state.clone();
              for glr_parser_state in self.state.values_mut() {
                  // glr_parser_state.process_default_reductions();
              }

              // TODO: this shouldn't be necessary, but due to some order-dependent LLM token BV weirdness in GSS, it is necessary to ensure commit order invariance.
              for state in self.state.values_mut() {
                  reset_llm_tokens(&mut state.active_state.stack, &mut gss_transformation_memo);
              }
              gss_transformation_memo.clear();

              self.state.retain(|_, glr_parser_state| glr_parser_state.is_ok());

              let mut fuse_memo = HashMap::new();
              for state in self.state.values_mut() {
                  state.active_state.stack = fuse_predecessors_recursive(&mut state.active_state.stack, 1, &mut fuse_memo);
              }
              fuse_memo.clear();

              // Post-commit allowance check: ensure each surviving state allows at least one
              // token the tokenizer can produce from its current tokenizer state.
              // Mode is controlled by self.parent.post_commit_allow_check_mode.
              match self.parent.post_commit_allow_check_mode {
                  TerminalAllowanceCheckMode::None => {
                      // no-op
                  }
                  TerminalAllowanceCheckMode::ImmediateSets => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          // Fast auto-pass if tokenizer can produce all grammar terminals.
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }

                          let mut union = glr_state.immediate_shift_terminals();
                          union.extend(glr_state.immediate_reduce_terminals());
                          !union.is_disjoint(&accessible)
                      });
                  }
                  TerminalAllowanceCheckMode::ImmediateProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.has_immediate_action_for_terminal(*tid).unwrap_or(false) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
                  TerminalAllowanceCheckMode::StepProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.allows_terminal(*tid) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
              }

              let mut roots: BTreeMap<TokenizerStateID, Arc<GSSNode>> = BTreeMap::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  roots.insert(*tokenizer_state_id, glr_state.active_state.stack.clone());
              }
              println!("Simplifying GSS after commit...");
              // simplify(&mut roots);
              println!("Done simplifying GSS after commit.");
              for (tokenizer_state_id, glr_state) in &mut self.state {
                  glr_state.active_state.stack = roots.get(tokenizer_state_id).unwrap().clone();
              }

              // let mut roots_to_simplify_arcs = Vec::new();
              // for glr_parser_state in self.state.values_mut() {
              //     if !glr_parser_state.active_state.stack.is_empty() {
              //         roots_to_simplify_arcs.push(&mut glr_parser_state.active_state.stack);
              //     }
              // }
              //
              // if !roots_to_simplify_arcs.is_empty() {
              //     GSSNode::simplify_together(&mut roots_to_simplify_arcs);
              // }

              crate::debug!(4, "Active tokenizer states after committing text (bytes {:?}): {:?}", llm_token_bytes, self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              for (tokenizer_id, glr_state) in &self.state {
                  if !glr_state.active_state.stack.is_empty() { // Log only for non-empty GSS
                      // glr_state.log_gss("After commit", TerminalID(0), false, false);
                  }
              }
          }

          pub fn is_active(&self) -> bool {
              !self.state.is_empty()
          }

          pub fn state(&self) -> &BTreeMap<TokenizerStateID, GLRParserState<'a>> {
              &self.state
          }
      }
    src/constraint_precompute3_utils.rs: |-
      use std::collections::{BTreeMap, HashMap, VecDeque};
      use ordered_hash_map::OrderedHashMap;
      use crate::constraint::{GrammarConstraintConfig, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::gss::LLMTokenBV;
      use crate::datastructures::trie::{EdgeInserter, Trie, Trie2Index};
      use crate::tokenizer::TokenizerStateID;

      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &GrammarConstraintConfig,
      ) {
          crate::debug!(2, "Optimizing Trie 3 size...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let _all_nodes_pinner = Trie::all_nodes(&trie3_god, &roots_vec);

          if config.optimize_trie2_prune_dead_paths { // Reusing config flags from trie2
              prune_dead_paths_trie3(roots, &trie3_god);
          }
          if config.optimize_trie2_merge_nodes {
              merge_nodes_trie3(roots, &trie3_god);
          }
          if config.optimize_trie2_compress_edges {
              compress_trie3_edges(roots, &trie3_god);
          }
          if config.optimize_trie2_prune_dead_paths {
              prune_dead_paths_trie3(roots, &trie3_god);
          }
          if config.optimize_trie2_merge_nodes {
              merge_nodes_trie3(roots, &trie3_god);
          }
          if config.optimize_trie2_gc {
              Trie::gc(&trie3_god, &roots.values().cloned().collect::<Vec<_>>());
          }
          Trie::recompute_all_max_depths(&trie3_god, &roots.values().cloned().collect::<Vec<_>>());
      }

      pub fn prune_dead_paths_trie3(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper) {
          crate::debug!(2, "Pruning dead paths from precomputed trie 3.");

          let all_nodes = Trie::all_nodes(trie3_god, &roots.values().cloned().collect::<Vec<_>>());
          if all_nodes.is_empty() { return; }

          let mut predecessors: HashMap<PrecomputeNode3Index, Vec<(PrecomputeNode3Index, (usize, LLMTokenBV))>> = HashMap::new();
          let mut worklist = VecDeque::new();
          let mut live: HashMap<PrecomputeNode3Index, LLMTokenBV> = HashMap::new();

          // 1. Initialize live sets and build predecessor map.
          for node_arc in &all_nodes {
              let node_ptr = *node_arc;
              live.insert(node_ptr, LLMTokenBV::zeros());

              let guard = node_arc.read(trie3_god).unwrap();
              if guard.value.end {
                  let initial_live = guard.value.live_tokens.clone();
                  if !initial_live.is_empty() {
                      live.insert(node_ptr, initial_live);
                      worklist.push_back(node_ptr);
                  }
              }

              for (edge_key, dest_map) in guard.children() {
                  for child_wrap in dest_map.keys() {
                      let child_arc = child_wrap.as_arc().clone();
                      let child_ptr = child_arc;
                      predecessors.entry(child_ptr).or_default().push((node_ptr, edge_key.clone()));
                  }
              }
          }

          // 2. Propagate liveness until a fixed point is reached.
          while let Some(node_ptr) = worklist.pop_front() {
              let live_at_node = live.get(&node_ptr).unwrap().clone();
              if let Some(preds) = predecessors.get(&node_ptr) {
                  for (pred_ptr, edge_key) in preds {
                      let live_from_edge = &live_at_node & &edge_key.1;
                      if live_from_edge.is_empty() {
                          continue;
                      }

                      let pred_live = live.get_mut(pred_ptr).unwrap();
                      let old_len = pred_live.len();
                      *pred_live |= &live_from_edge;
                      if pred_live.len() > old_len {
                          worklist.push_back(*pred_ptr);
                      }
                  }
              }
          }

          // 3. Prune the graph based on the computed live sets.
          for node_arc in &all_nodes {
              let mut guard = node_arc.write(trie3_god).unwrap();
              let mut new_children: BTreeMap<(usize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> = BTreeMap::new();

              for (edge_key, dest_map) in guard.children() {
                  for (child_wrapper, edge_value_sids) in dest_map {
                      let child_arc = child_wrapper.as_arc().clone();
                      let child_ptr = child_arc;
                      let live_from_child = live.get(&child_ptr).unwrap();

                      let live_on_edge = &edge_key.1 & live_from_child;

                      if !live_on_edge.is_empty() {
                          let new_edge_key = (edge_key.0, live_on_edge);
                          let new_dest_map_for_key = new_children.entry(new_edge_key).or_default();
                          new_dest_map_for_key.entry(*child_wrapper)
                              .and_modify(|v| *v |= edge_value_sids)
                              .or_insert_with(|| edge_value_sids.clone());
                      }
                  }
              }
              *guard.children_mut() = new_children;

              // Update the node's own live_tokens field with the final computed value.
              let node_ptr = *node_arc;
              guard.value.live_tokens = live.get(&node_ptr).unwrap().clone();
          }
          crate::debug!(2, "Finished pruning dead paths from trie 3.");
      }

      pub fn merge_nodes_trie3(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper) {
          crate::debug!(2, "Merging identical subtrees in precomputed trie 3.");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          let mut dense_of: HashMap<Trie2Index, usize> = HashMap::new();
          let mut old_of: Vec<Trie2Index> = Vec::with_capacity(all_nodes.len());
          for (i, node_idx) in all_nodes.iter().enumerate() {
              dense_of.insert(*node_idx, i);
              old_of.push(*node_idx);
          }
          let n = all_nodes.len();

          let mut ends: Vec<bool> = vec![false; n];
          type RawEdge3 = (usize, LLMTokenBV, usize, StateIDBV);
          let mut raw_edges: Vec<Vec<RawEdge3>> = vec![Vec::new(); n];

          for (u_dense, u_idx) in old_of.iter().enumerate() {
              let guard = u_idx.read(trie3_god).unwrap();
              ends[u_dense] = guard.value.end;
              for (ek, dest_map) in guard.children() {
                  for (v_idx, bv) in dest_map {
                      if let Some(&v_dense) = dense_of.get(v_idx) {
                          raw_edges[u_dense].push((ek.0, ek.1.clone(), v_dense, bv.clone()));
                      }
                  }
              }
          }

          let mut prev_class: Vec<usize> = (0..n).map(|i| if ends[i] { 1 } else { 0 }).collect();

          const MAX_ITERS: usize = 40;
          for it in 0..MAX_ITERS {
              type AggregatedEdge3 = ((usize, LLMTokenBV, usize), StateIDBV);
              type Signature3 = (bool, Vec<AggregatedEdge3>);

              let mut sig_to_id: HashMap<Signature3, usize> = HashMap::new();
              let mut new_class = vec![0; n];
              let mut next_id = 0;
              let mut changes = 0;

              for u in 0..n {
                  let mut aggr: BTreeMap<(usize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u] {
                      let dest_class = prev_class[*v_dense];
                      let key = (*p, bv_key.clone(), dest_class);
                      aggr.entry(key).and_modify(|e| *e |= sids).or_insert_with(|| sids.clone());
                  }
                  let agg_edges: Vec<AggregatedEdge3> = aggr.into_iter().collect();

                  let sig: Signature3 = (ends[u], agg_edges);

                  let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });

                  new_class[u] = cid;
                  if new_class[u] != prev_class[u] {
                      changes += 1;
                  }
              }

              crate::debug!(3, "Trie3 merge iter {}: classes={}, changes={}", it + 1, next_id, changes);
              prev_class = new_class;
              if changes == 0 { break; }
          }

          let final_partition = prev_class;
          let num_classes = final_partition.iter().max().map_or(0, |m| m + 1);

          let mut representatives: Vec<Option<Trie2Index>> = vec![None; num_classes];
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              if representatives[class_id].is_none() {
                  representatives[class_id] = Some(old_of[u_dense]);
              }
          }

          let mut node_to_rep: HashMap<Trie2Index, Trie2Index> = HashMap::new();
          for (u_dense, &class_id) in final_partition.iter().enumerate() {
              node_to_rep.insert(old_of[u_dense], representatives[class_id].unwrap());
          }

          for class_id in 0..num_classes {
              if let Some(rep_idx) = representatives[class_id] {
                  let u_dense = final_partition.iter().position(|&c| c == class_id).unwrap();

                  let mut aggr: BTreeMap<(usize, LLMTokenBV, usize), StateIDBV> = BTreeMap::new();
                  for (p, bv_key, v_dense, sids) in &raw_edges[u_dense] {
                      let dest_class = final_partition[*v_dense];
                      aggr.entry((*p, bv_key.clone(), dest_class)).and_modify(|e| *e |= sids).or_insert_with(|| sids.clone());
                  }

                  let mut new_children = BTreeMap::new();
                  let mut new_live_tokens = LLMTokenBV::zeros();
                  for ((p, bv_key, dest_class), sids) in aggr {
                      if let Some(dest_rep_idx) = representatives[dest_class] {
                          new_children.entry((p, bv_key.clone())).or_insert_with(OrderedHashMap::new).insert(dest_rep_idx, sids);
                          new_live_tokens |= &bv_key;
                      }
                  }

                  for (i, &c) in final_partition.iter().enumerate() {
                      if c == class_id {
                          new_live_tokens |= &old_of[i].read(trie3_god).unwrap().value.live_tokens;
                      }
                  }

                  let mut guard = rep_idx.write(trie3_god).unwrap();
                  *guard.children_mut() = new_children;
                  guard.value.live_tokens = new_live_tokens;
              }
          }

          for root_idx in roots.values_mut() {
              *root_idx = *node_to_rep.get(root_idx).unwrap();
          }

          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie3_god, &final_roots_vec);
      }

      pub fn compress_trie3_edges(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>, trie3_god: &Trie3GodWrapper) {
          todo!()
      }
    src/datastructures/trie.rs: |-
      use std::cmp::Ordering;
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::fmt::{Debug, Display};
      use std::hash::{DefaultHasher, Hash, Hasher};
      use std::ops::{Deref, DerefMut};
      use std::sync::{Arc, RwLock, RwLockReadGuard, RwLockWriteGuard};

      use crate::json_serialization::{JSONConvertible, JSONNode};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use deterministic_hash::DeterministicHasher;
      use kdam::{tqdm, BarExt};
      use ordered_hash_map::{OrderedHashMap, OrderedHashSet};
      use profiler_macro::time_it;

      /// Represents a node in a Trie–like structure (allowing shared subtrees and DAGs).
      /// Multiple children can exist for the same edge key. Each edge instance has a value.
      ///
      /// EK: type of the edge key (must be Ord).
      /// EV: type of the edge value.
      /// T: type of the value stored within the node.
      ///
      /// NOTE: This node no longer stores Arc/RwLock pointers to other nodes. Instead,
      /// children reference other nodes by their index (Trie2Index) in an Arena. Any access
      /// to nodes (read/write of value, children traversal, depth recomputation, etc.) now
      /// requires passing a reference to the Arena that owns the nodes.
      #[derive(Debug, Clone)]
      pub struct Trie<EK: Ord, EV, T> {
          pub value: T,
          /// Stores a map from EdgeKey to a map of destination node indices and edge values.
          children: BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>,
          /// The “longest distance” from some source node (as computed by recompute_all_max_depths).
          /// Defaults to usize::MAX and is only updated when the user calls recompute_all_max_depths.
          pub max_depth: usize,
      }

      /// An index into the Arena for a Trie node.
      /// This is the light-weight replacement for Arc<RwLock<Trie<...>>> in external code.
      ///
      /// It provides `read(&arena)` and `write(&arena)` methods that mimic RwLock's API:
      /// both return Option<Guard>. In most code you'll immediately call `.expect(...)` or `.unwrap()`.
      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct Trie2Index {
          index: Index,
      }

      impl Display for Trie2Index {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              write!(f, "Trie2Index({})", self.index.as_usize())
          }
      }

      impl Trie2Index {
          pub(crate) fn as_arc(&self) -> &Self {
              self
          }

          pub fn new(index: Index) -> Self {
              Trie2Index { index }
          }

          pub fn as_usize(self) -> usize {
              self.index.as_usize()
          }

          pub fn as_index(self) -> Index {
              self.index
          }

          /// Read-locks the Arena and returns a guard that derefs to &Trie at this index.
          /// Returns None if the index does not exist.
          pub fn read<'a, EK: Ord, EV, T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
          ) -> Option<Trie2ReadGuard<'a, EK, EV, T>> {
              let guard = arena.inner.read().ok()?;
              if guard.values.get(self.index.as_usize())?.is_none() {
                  return None;
              }
              Some(Trie2ReadGuard {
                  guard,
                  index: self.index.as_usize(),
              })
          }

          /// Write-locks the Arena and returns a guard that derefs to &mut Trie at this index.
          /// Returns None if the index does not exist.
          pub fn write<'a, EK: Ord, EV, T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
          ) -> Option<Trie2WriteGuard<'a, EK, EV, T>> {
              let guard = arena.inner.write().ok()?;
              if guard.values.get(self.index.as_usize())?.is_none() {
                  return None;
              }
              Some(Trie2WriteGuard {
                  guard,
                  index: self.index.as_usize(),
              })
          }

          /// Convenience constructor from usize.
          pub fn from_usize(i: usize) -> Self {
              Trie2Index { index: Index::from(i) }
          }
      }

      impl From<Index> for Trie2Index {
          fn from(i: Index) -> Self {
              Trie2Index { index: i }
          }
      }

      impl From<Trie2Index> for Index {
          fn from(ti: Trie2Index) -> Self {
              ti.index
          }
      }

      impl From<usize> for Trie2Index {
          fn from(u: usize) -> Self {
              Trie2Index { index: Index::from(u) }
          }
      }

      impl From<Trie2Index> for usize {
          fn from(ti: Trie2Index) -> usize {
              ti.index.as_usize()
          }
      }

      /// A read guard that keeps the Arena's internal RwLockReadGuard alive and provides
      /// immutable access to a Trie node at a given index via Deref.
      pub struct Trie2ReadGuard<'a, EK: Ord, EV, T> {
          guard: RwLockReadGuard<'a, ArenaInner<Trie<EK, EV, T>>>,
          index: usize,
      }

      impl<'a, EK: Ord, EV, T> Deref for Trie2ReadGuard<'a, EK, EV, T> {
          type Target = Trie<EK, EV, T>;
          fn deref(&self) -> &Self::Target {
              self.guard.values[self.index]
                  .as_ref()
                  .expect("Trie2ReadGuard: index not found in arena map")
          }
      }

      /// A write guard that keeps the Arena's internal RwLockWriteGuard alive and provides
      /// mutable access to a Trie node at a given index via Deref/DerefMut.
      pub struct Trie2WriteGuard<'a, EK: Ord, EV, T> {
          guard: RwLockWriteGuard<'a, ArenaInner<Trie<EK, EV, T>>>,
          index: usize,
      }

      impl<'a, EK: Ord, EV, T> Deref for Trie2WriteGuard<'a, EK, EV, T> {
          type Target = Trie<EK, EV, T>;
          fn deref(&self) -> &Self::Target {
              self.guard.values[self.index]
                  .as_ref()
                  .expect("Trie2WriteGuard: index not found in arena map")
          }
      }

      impl<'a, EK: Ord, EV, T> DerefMut for Trie2WriteGuard<'a, EK, EV, T> {
          fn deref_mut(&mut self) -> &mut Self::Target {
              self.guard.values[self.index]
                  .as_mut()
                  .expect("Trie2WriteGuard: index not found in arena map")
          }
      }

      impl<EK, EV, T> JSONConvertible for Trie<EK, EV, T>
      where
          EK: Ord + Clone + JSONConvertible + Debug,
          EV: Clone + JSONConvertible,
          T: Clone + JSONConvertible,
      {
          /// Note: With the index-based design, we only serialize this node's local data:
          /// - value
          /// - max_depth
          /// - children: encoded as [EK_json, [[child_index, EV_json], ...]]
          ///
          /// We do NOT expand into a "nodes" array (no BFS). This format is concise and avoids
          /// requiring access to the Arena during serialization.
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("value".to_string(), self.value.to_json());
              obj.insert("max_depth".to_string(), self.max_depth.to_json());

              let children_json: Vec<JSONNode> = self.children.iter().map(|(ek, dest_map)| {
                  let ek_json = ek.to_json();
                  let dests_json: Vec<JSONNode> = dest_map.iter().map(|(idx, ev)| {
                      JSONNode::Array(vec![
                          (idx.as_usize()).to_json(),
                          ev.to_json(),
                      ])
                  }).collect();
                  JSONNode::Array(vec![ek_json, JSONNode::Array(dests_json)])
              }).collect();

              obj.insert("children".to_string(), JSONNode::Array(children_json));

              JSONNode::Object(obj)
          }

          /// Parses the local-node JSON format produced by to_json above.
          /// This reconstructs a Trie node that references children by indices only.
          /// The Arena is not created/returned here; the caller is expected to manage
          /// nodes in an Arena externally.
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;

              let value = T::from_json(obj.remove("value").ok_or("Missing 'value' field")?)?;
              let max_depth = usize::from_json(obj.remove("max_depth").ok_or("Missing 'max_depth' field")?)?;

              let children_node = obj.remove("children").ok_or("Missing 'children' field")?;
              let children_arr = match children_node {
                  JSONNode::Array(arr) => arr,
                  _ => return Err("'children' field must be an array".to_string()),
              };

              let mut children = BTreeMap::new();
              for child_entry_node in children_arr {
                  let mut child_entry_arr = match child_entry_node {
                      JSONNode::Array(arr) if arr.len() == 2 => arr,
                      _ => return Err("Child entry must be a 2-element array [ek, dests]".to_string()),
                  };
                  let dests_node = child_entry_arr.pop().unwrap();
                  let ek_node = child_entry_arr.pop().unwrap();

                  let ek = EK::from_json(ek_node)?;

                  let dests_arr = match dests_node {
                      JSONNode::Array(arr) => arr,
                      _ => return Err("Destinations list must be an array".to_string()),
                  };

                  let mut dest_map = OrderedHashMap::new();
                  for dest_pair_node in dests_arr {
                      let mut dest_pair_arr = match dest_pair_node {
                          JSONNode::Array(arr) if arr.len() == 2 => arr,
                          _ => return Err("Destination pair must be a 2-element array [idx, ev]".to_string()),
                      };
                      let ev_node = dest_pair_arr.pop().unwrap();
                      let idx_node = dest_pair_arr.pop().unwrap();

                      let idx_usize = usize::from_json(idx_node)?;
                      let idx = Trie2Index::from_usize(idx_usize);
                      let ev = EV::from_json(ev_node)?;

                      dest_map.insert(idx, ev);
                  }
                  children.insert(ek, dest_map);
              }

              Ok(Trie {
                  value,
                  children,
                  max_depth,
              })
          }
      }

      impl JSONConvertible for Trie2Index {
          fn to_json(&self) -> JSONNode {
              self.as_usize().to_json()
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let u = usize::from_json(node)?;
              Ok(Trie2Index::from_usize(u))
          }
      }

      // Implementation block for core Trie functionality
      // Added Clone bound for EK needed in insertion and others
      impl<EK: Ord + Clone, EV, T> Trie<EK, EV, T> {
          /// Creates a new trie node with the given value and no children.
          /// The max_depth is initialized to usize::MAX and will be updated later
          /// when recompute_all_max_depths is called.
          pub fn new(value: T) -> Self {
              Trie {
                  value,
                  children: BTreeMap::new(),
                  max_depth: usize::MAX,
              }
          }

          /// Create a new destination node in the arena and insert an edge to it.
          /// Returns the index of the newly created node.
          pub fn force_insert_to_new_node(
              &mut self,
              arena: &Arena<Trie<EK, EV, T>>,
              edge_key: EK,
              edge_value: EV,
              value: T,
          ) -> Trie2Index {
              let new_index = Trie2Index::new(arena.insert(Trie::new(value)));
              self.children
                  .entry(edge_key)
                  .or_default()
                  .insert(new_index, edge_value);
              new_index
          }

          /// Insert an edge to an existing destination node index.
          pub fn force_insert_to_node(&mut self, edge_key: EK, edge_value: EV, dst: Trie2Index) {
              self.children.entry(edge_key).or_default().insert(dst, edge_value);
          }

          pub fn already_has_dst(&self, edge_key: EK, dst: Trie2Index) -> bool {
              self.children
                  .get(&edge_key)
                  .map_or(false, |dest_map| dest_map.contains_key(&dst))
          }

          pub fn already_has_dst_for_any_key(&self, dst: Trie2Index) -> bool {
              self.children.values().any(|dest_map| dest_map.contains_key(&dst))
          }

          pub fn get_edge_value(&self, edge_key: EK, dst: Trie2Index) -> Option<&EV> {
              self.children.get(&edge_key).and_then(|dest_map| dest_map.get(&dst))
          }

          pub fn get_edge_value_mut(&mut self, edge_key: EK, dst: &Trie2Index) -> Option<&mut EV> {
              self.children.get_mut(&edge_key).and_then(|dest_map| dest_map.get_mut(&dst))
          }

          /// Inserts an edge (no cycle checks).
          /// Depths can be recomputed later by calling `recompute_all_max_depths`.
          #[time_it]
          pub fn try_insert(
              &mut self,
              edge_key: EK,
              edge_value: &mut Option<EV>,
              child: Trie2Index,
          ) {
              self.try_insert_unchecked(edge_key, edge_value, child)
          }

          /// Inserts an edge without any checks or automatic depth updates.
          #[time_it]
          pub fn try_insert_unchecked(
              &mut self,
              edge_key: EK,
              edge_value: &mut Option<EV>,
              child: Trie2Index,
          ) {
              self.children
                  .entry(edge_key)
                  .or_default()
                  .insert(child, edge_value.take().expect("edge_value must be Some when inserting"));
          }

          pub fn get(
              &self,
              edge_key: &EK,
          ) -> Option<&OrderedHashMap<Trie2Index, EV>>
          {
              self.children.get(edge_key)
          }

          pub fn get_mut(
              &mut self,
              edge_key: &EK,
          ) -> Option<&mut OrderedHashMap<Trie2Index, EV>>
          {
              self.children.get_mut(edge_key)
          }

          pub fn children(&self) -> &BTreeMap<EK, OrderedHashMap<Trie2Index, EV>> {
              &self.children
          }

          pub fn children_mut(&mut self) -> &mut BTreeMap<EK, OrderedHashMap<Trie2Index, EV>> {
              &mut self.children
          }

          pub fn is_leaf(&self) -> bool {
              self.children.is_empty()
          }

          /// Collects all unique nodes (by index) reachable from the given roots (BFS).
          pub fn all_nodes(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: &[Trie2Index],
          ) -> Vec<Trie2Index> {
              let mut visited: HashSet<usize> = HashSet::new();
              let mut result = Vec::new();
              let mut queue = VecDeque::new();

              for &root in roots {
                  if visited.insert(root.as_usize()) {
                      queue.push_back(root);
                  }
              }

              while let Some(node_idx) = queue.pop_front() {
                  result.push(node_idx);

                  if let Some(guard) = node_idx.read(arena) {
                      for children_map in guard.children.values() {
                          for (child_idx, _) in children_map.iter() {
                              let c_u = child_idx.as_usize();
                              if visited.insert(c_u) {
                                  queue.push_back(*child_idx);
                              }
                          }
                      }
                  } else {
                      panic!("Trie::all_nodes: node index {} not found in arena", node_idx.as_usize());
                  }
              }
              result
          }

          /// Performs garbage collection on the arena, keeping only nodes reachable from `roots`.
          pub fn gc(arena: &Arena<Self>, roots: &[Trie2Index]) {
              let live_nodes_vec = Self::all_nodes(arena, roots);
              let live_nodes_set: HashSet<usize> = live_nodes_vec.into_iter().map(|idx| idx.as_usize()).collect();
              let mut inner_guard = arena.inner.write().expect("Arena write lock poisoned during GC");
              for i in 0..inner_guard.values.len() {
                  if !live_nodes_set.contains(&i) {
                      inner_guard.values[i] = None;
                  }
              }
          }

          /// Recomputes `max_depth` for all nodes reachable from the given roots.
          /// Call this once after you finish building the trie graph. Before calling,
          /// nodes may have max_depth == usize::MAX which is suboptimal for scheduling
          /// but not incorrect for traversal.
          ///
          /// Uses a topological order (Kahn's algorithm). Assumes the graph is acyclic.
          pub fn recompute_all_max_depths(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: &[Trie2Index],
          ) {
              let all_nodes = Self::all_nodes(arena, roots);
              if all_nodes.is_empty() {
                  return;
              }

              let mut in_degree: HashMap<usize, usize> = HashMap::new();
              let mut adj: HashMap<usize, Vec<usize>> = HashMap::new();

              for node_idx in &all_nodes {
                  let u = node_idx.as_usize();
                  in_degree.entry(u).or_insert(0);
                  adj.entry(u).or_default();

                  let guard = node_idx
                      .read(arena)
                      .expect("Arena read failed during recompute_all_max_depths");
                  for child_idx in guard
                      .children
                      .values()
                      .flat_map(|m| m.keys().cloned())
                  {
                      let v = child_idx.as_usize();
                      adj.entry(u).or_default().push(v);
                      *in_degree.entry(v).or_default() += 1;
                  }
              }

              // Initialize depths to 0 for all nodes; sources will be processed first.
              let mut queue = VecDeque::new();
              for node_idx in &all_nodes {
                  let u = node_idx.as_usize();
                  if in_degree.get(&u).cloned().unwrap_or(0) == 0 {
                      queue.push_back(u);
                  }
                  let mut w = node_idx
                      .write(arena)
                      .expect("Arena write failed when initializing depths");
                  w.max_depth = 0;
              }

              while let Some(u) = queue.pop_front() {
                  let u_depth = {
                      let g = Trie2Index::from(u).read(arena).expect("read");
                      g.max_depth
                  };

                  if let Some(children) = adj.get(&u) {
                      for &v in children {
                          {
                              let mut vg = Trie2Index::from(v).write(arena).expect("write");
                              vg.max_depth = vg.max_depth.max(u_depth + 1);
                          }

                          let deg = in_degree.get_mut(&v).unwrap();
                          *deg -= 1;
                          if *deg == 0 {
                              queue.push_back(v);
                          }
                      }
                  }
              }
          }

          /// Recomputes the max_depth of this node based on its children's depths.
          /// Returns true if the depth changed.
          /// This does NOT propagate changes.
          pub fn recompute_max_depth(&mut self, arena: &Arena<Trie<EK, EV, T>>) -> bool {
              let new_max_depth = self
                  .children
                  .values()
                  .flat_map(|dest_map| dest_map.keys().cloned())
                  .map(|child_idx| {
                      let g = child_idx.read(arena).expect("Arena read failed in recompute_max_depth");
                      g.max_depth + 1
                  })
                  .max()
                  .unwrap_or(0);

              if new_max_depth != self.max_depth {
                  self.max_depth = new_max_depth;
                  true
              } else {
                  false
              }
          }
      }

      // Add this impl block for the recursive comparison helper (index-based)
      impl<EK, EV, T> Trie<EK, EV, T>
      where
          EK: Ord + Clone,
          EV: PartialEq + Clone,
          T: PartialEq,
      {
          pub fn are_graphs_equal(
              arena_a: &Arena<Trie<EK, EV, T>>,
              a_idx: Trie2Index,
              arena_b: &Arena<Trie<EK, EV, T>>,
              b_idx: Trie2Index,
          ) -> bool {
              let mut cache = HashMap::new();
              Self::compare_indexes_recursive(arena_a, a_idx, arena_b, b_idx, &mut cache)
          }

          /// Recursively compares two Trie nodes referenced by indices for equality across an Arena.
          ///
          /// - `a_idx`, `b_idx`: The indices pointing to the Trie nodes to compare.
          /// - `comparison_cache`: Tracks pairs of (a_usize, b_usize) and their comparison result (bool).
          fn compare_indexes_recursive(
              arena_a: &Arena<Trie<EK, EV, T>>,
              a_idx: Trie2Index,
              arena_b: &Arena<Trie<EK, EV, T>>,
              b_idx: Trie2Index,
              comparison_cache: &mut HashMap<(usize, usize), bool>,
          ) -> bool {
              let a_u = a_idx.as_usize();
              let b_u = b_idx.as_usize();

              if Arc::ptr_eq(&arena_a.inner, &arena_b.inner) && a_u == b_u {
                  return true;
              }

              let (k1, k2) = if a_u < b_u { (a_u, b_u) } else { (b_u, a_u) };

              if let Some(&cached) = comparison_cache.get(&(k1, k2)) {
                  return cached;
              }

              // Optimistically assume true; update to false on mismatch.
              comparison_cache.insert((k1, k2), true);

              let a_guard = match a_idx.read(arena_a) {
                  Some(g) => g,
                  None => {
                      comparison_cache.insert((k1, k2), false);
                      return false;
                  }
              };
              let b_guard = match b_idx.read(arena_b) {
                  Some(g) => g,
                  None => {
                      comparison_cache.insert((k1, k2), false);
                      return false;
                  }
              };

              // 1. Compare non-recursive fields: value and max_depth.
              if a_guard.value != b_guard.value || a_guard.max_depth != b_guard.max_depth {
                  comparison_cache.insert((k1, k2), false);
                  return false;
              }

              // 2. Compare children structure (number of distinct edge keys).
              if a_guard.children.len() != b_guard.children.len() {
                  comparison_cache.insert((k1, k2), false);
                  return false;
              }

              // 3. Compare children for each edge key.
              for (a_ek, a_dest_map) in &a_guard.children {
                  match b_guard.children.get(a_ek) {
                      None => {
                          comparison_cache.insert((k1, k2), false);
                          return false;
                      }
                      Some(b_dest_map) => {
                          if a_dest_map.len() != b_dest_map.len() {
                              comparison_cache.insert((k1, k2), false);
                              return false;
                          }

                          let a_child_pairs: Vec<(Trie2Index, EV)> = a_dest_map
                              .iter()
                              .map(|(idx, ev)| (*idx, ev.clone()))
                              .collect();

                          let mut b_child_pairs: Vec<(Trie2Index, EV)> = b_dest_map
                              .iter()
                              .map(|(idx, ev)| (*idx, ev.clone()))
                              .collect();

                          'outer: for (a_child, a_ev) in &a_child_pairs {
                              let mut found = false;
                              for i in 0..b_child_pairs.len() {
                                  if &b_child_pairs[i].1 == a_ev {
                                      let b_child = b_child_pairs[i].0;
                                      if Trie::compare_indexes_recursive(arena_a, *a_child, arena_b, b_child, comparison_cache) {
                                          b_child_pairs.remove(i);
                                          found = true;
                                          break;
                                      }
                                  }
                              }
                              if !found {
                                  comparison_cache.insert((k1, k2), false);
                                  return false;
                              }
                          }
                      }
                  }
              }

              true
          }
      }

      // Implementation block for special_map and related functionality
      // Requires T: Clone, EK: Ord + Clone, EV: Clone
      impl<T: Clone, EK: Ord + Clone, EV: Clone> Trie<EK, EV, T> {
          fn count_all_edges(
              arena: &Arena<Trie<EK, EV, T>>,
              root_nodes: &[Trie2Index],
          ) -> usize {
              let mut visited: HashSet<usize> = HashSet::new();
              let mut queue: VecDeque<Trie2Index> = VecDeque::new();
              let mut total_edges = 0;

              for &root in root_nodes {
                  if visited.insert(root.as_usize()) {
                      queue.push_back(root);
                  }
              }

              while let Some(node_idx) = queue.pop_front() {
                  let guard = node_idx.read(arena).expect("RwLock poisoned during edge count");
                  for children_map in guard.children.values() {
                      for (child_idx, _) in children_map.iter() {
                          total_edges += 1;
                          let c_u = child_idx.as_usize();
                          if visited.insert(c_u) {
                              queue.push_back(*child_idx);
                          }
                      }
                  }
              }
              total_edges
          }

          /// Performs a specialized breadth-first traversal for propagation/scheduling.
          ///
          /// Traverses all edges and allows callers to:
          /// - process a node (process)
          /// - compute new values for children based on an edge (step)
          /// - merge multiple incoming values for the same child (merge)
          ///
          /// Scheduling uses node.max_depth; if not recomputed yet it may be usize::MAX,
          /// which is suboptimal but not incorrect.
          #[time_it]
          pub fn special_map<V: Clone>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: impl FnMut(&V, &EK, &EV, &Trie<EK, EV, T>) -> Option<V>,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          ) {
              // ------------------------------------------------------------------
              //  Simple depth-driven scheduler.
              // ------------------------------------------------------------------
              let mut values: HashMap<usize, V> = HashMap::new();
              let mut stopped_nodes: HashSet<usize> = HashSet::new();
              let mut todo: BTreeMap<usize, OrderedHashSet<Trie2Index>> = BTreeMap::new();

              let initial_nodes: Vec<_> = initial_nodes_and_values.iter().map(|(n, _)| *n).collect();
              let total_edges = Self::count_all_edges(arena, &initial_nodes);
              if PROGRESS_BAR_ENABLED {
                  println!("Progress bar enabled");
              } else {
                  println!("Progress bar disabled")
              }
              let mut pb = tqdm!(total = total_edges, desc = "Traversing edges", disable = !PROGRESS_BAR_ENABLED, leave=false);

              // Seed with the user-supplied starting set
              for (node_idx, v0) in initial_nodes_and_values {
                  let ptr = node_idx.as_usize();
                  values
                      .entry(ptr)
                      .and_modify(|old| merge(old, v0.clone()))
                      .or_insert(v0);
                  let depth = node_idx.read(arena).expect("poison").max_depth;
                  todo.entry(depth).or_default().insert(node_idx);
              }

              // Main loop ---------------------------------------------------------
              while let Some((_depth, node_indices)) = todo.pop_first() {
                  for node_idx in &node_indices {
                      let ptr = node_idx.as_usize();
                      if stopped_nodes.contains(&ptr) {
                          continue;
                      }

                      let mut agg_v = match values.remove(&ptr) {
                          Some(v) => v,
                          None => continue,
                      };

                      // ---------- user ‘process’ callback ----------
                      let proceed = {
                          let guard = node_idx.read(arena).expect("poison");
                          process(&guard, &mut agg_v)
                      };

                      if !proceed {
                          stopped_nodes.insert(ptr);
                          continue;
                      }

                      // ---------- propagate to children -------------
                      let edges: Vec<(EK, EV, Trie2Index)> = {
                          let guard = node_idx.read(arena).expect("poison");
                          guard
                              .children
                              .iter()
                              .flat_map(|(ek, dst_map)| {
                                  let ekc = ek.clone();
                                  dst_map
                                      .iter()
                                      .map(move |(child_idx, ev)| (ekc.clone(), ev.clone(), *child_idx))
                              })
                              .collect()
                      };

                      for (ek, ev, child_idx) in edges {
                          let _ = pb.update(1);
                          let child_ptr = child_idx.as_usize();

                          if stopped_nodes.contains(&child_ptr) {
                              continue;
                          }

                          let maybe_v = {
                              let child_guard = child_idx.read(arena).expect("poison");
                              step(&agg_v, &ek, &ev, &child_guard)
                          };
                          if let Some(new_v) = maybe_v {
                              values
                                  .entry(child_ptr)
                                  .and_modify(|old| merge(old, new_v.clone()))
                                  .or_insert(new_v);

                              let child_depth = child_idx.read(arena).expect("poison").max_depth;
                              todo.entry(child_depth).or_default().insert(child_idx);
                          }
                      }
                  }
              }
          }

          /// Performs a specialized breadth-first traversal, grouping children by edge key.
          /// This is more efficient than `special_map` when many edges share the same key,
          /// as the `step` function is called once per key, not once per edge.
          ///
          /// Scheduling uses node.max_depth; if not recomputed yet it may be usize::MAX,
          /// which is suboptimal but not incorrect.
          #[time_it]
          pub fn special_map_grouped<V, S, I>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: S,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          )
          where
              V: Clone,
              S: FnMut(
                  &V, &EK, &OrderedHashMap<Trie2Index, EV>
              ) -> I,
              I: IntoIterator<Item = (Trie2Index, V)>,
          {
              // ------------------------------------------------------------------
              //  Simple depth-driven scheduler. (Same as special_map)
              // ------------------------------------------------------------------
              let mut values: HashMap<usize, V> = HashMap::new();
              let mut stopped_nodes: HashSet<usize> = HashSet::new();
              let mut todo: BTreeMap<usize, OrderedHashSet<Trie2Index>> = BTreeMap::new();

              let initial_nodes: Vec<_> = initial_nodes_and_values.iter().map(|(n, _)| *n).collect();
              let total_edges = Self::count_all_edges(arena, &initial_nodes);
              let mut pb = tqdm!(total = total_edges, desc = "Traversing edges", disable = !PROGRESS_BAR_ENABLED, leave=false);

              // Seed with the user-supplied starting set
              for (node_idx, v0) in initial_nodes_and_values {
                  let ptr = node_idx.as_usize();
                  values
                      .entry(ptr)
                      .and_modify(|old| merge(old, v0.clone()))
                      .or_insert(v0);
                  let depth = node_idx.read(arena).expect("poison").max_depth;
                  todo.entry(depth).or_default().insert(node_idx);
              }

              // Main loop ---------------------------------------------------------
              while let Some((_depth, node_indices)) = todo.pop_first() {
                  for node_idx in &node_indices {
                      let ptr = node_idx.as_usize();
                      if stopped_nodes.contains(&ptr) { continue; }

                      let mut agg_v = match values.remove(&ptr) {
                          Some(v) => v,
                          None => continue,
                      };

                      let proceed = {
                          let guard = node_idx.read(arena).expect("poison");
                          process(&guard, &mut agg_v)
                      };

                      if !proceed {
                          stopped_nodes.insert(ptr);
                          continue;
                      }

                      // ---------- propagate to children (grouped by edge key) -------------
                      let children_by_ek: Vec<(EK, OrderedHashMap<Trie2Index, EV>)> = {
                          let guard = node_idx.read(arena).expect("poison");
                          guard.children.iter()
                              .map(|(ek, dst_map)| (ek.clone(), dst_map.clone()))
                              .collect()
                      };

                      for (ek, dest_map) in children_by_ek {
                          let valid_edges_count = dest_map.len();
                          if valid_edges_count > 0 {
                              let _ = pb.update(valid_edges_count);
                          }

                          let new_values_for_children = step(&agg_v, &ek, &dest_map);

                          for (child_idx, new_v) in new_values_for_children {
                              let child_ptr = child_idx.as_usize();

                              if stopped_nodes.contains(&child_ptr) {
                                  continue;
                              }

                              values.entry(child_ptr)
                                  .and_modify(|old| merge(old, new_v.clone()))
                                  .or_insert(new_v);

                              let child_depth = child_idx.read(arena).expect("poison").max_depth;
                              todo.entry(child_depth).or_default().insert(child_idx);
                          }
                      }
                  }
              }
          }
      }

      // Implement PartialEq for Trie (shallow: compares value, max_depth, and immediate children lists)
      impl<EK, EV, T> PartialEq for Trie<EK, EV, T>
      where
          EK: Ord + PartialEq,
          EV: PartialEq,
          T: PartialEq,
      {
          fn eq(&self, other: &Self) -> bool {
              if self.value != other.value || self.max_depth != other.max_depth {
                  return false;
              }
              if self.children.len() != other.children.len() {
                  return false;
              }
              for (ek, self_map) in &self.children {
                  match other.children.get(ek) {
                      None => return false,
                      Some(other_map) => {
                          if self_map.len() != other_map.len() {
                              return false;
                          }
                          // OrderedHashMap preserves insertion order; but we only need equality as sets of (idx, ev)
                          for (idx, ev) in self_map {
                              match other_map.get(idx) {
                                  Some(o_ev) if o_ev == ev => {}
                                  _ => return false,
                              }
                          }
                      }
                  }
              }
              true
          }
      }

      // Implement Eq for Trie
      impl<EK, EV, T> Eq for Trie<EK, EV, T>
      where
          EK: Ord + Eq,
          EV: Eq + Clone,
          T: Eq,
      {
      }

      // Implement PartialOrd for Trie
      impl<EK, EV, T> PartialOrd for Trie<EK, EV, T>
      where
          EK: Ord,
          EV: Ord + Clone,
          T: Ord,
      {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              Some(self.cmp(other))
          }
      }

      // Implement Ord for Trie
      impl<EK, EV, T> Ord for Trie<EK, EV, T>
      where
          EK: Ord,
          EV: Ord + Clone,
          T: Ord,
      {
          fn cmp(&self, other: &Self) -> Ordering {
              self.value.cmp(&other.value)
                  .then_with(|| self.max_depth.cmp(&other.max_depth))
                  .then_with(|| self.children.len().cmp(&other.children.len()))
                  .then_with(|| {
                      for ((sk, sv), (ok, ov)) in self.children.iter().zip(other.children.iter()) {
                          match sk.cmp(ok) {
                              Ordering::Equal => (),
                              non_eq => return non_eq,
                          }
                          match sv.len().cmp(&ov.len()) {
                              Ordering::Equal => (),
                              non_eq => return non_eq,
                          }
                          for ((s_idx, s_ev), (o_idx, o_ev)) in sv.iter().zip(ov.iter()) {
                              match s_idx.cmp(o_idx) {
                                  Ordering::Equal => (),
                                  non_eq => return non_eq,
                              }
                              match s_ev.cmp(o_ev) {
                                  Ordering::Equal => (),
                                  non_eq => return non_eq,
                              }
                          }
                      }
                      Ordering::Equal
                  })
          }
      }

      // Implement Hash for Trie (shallow: value, max_depth, and immediate children lists)
      impl<EK, EV, T> Hash for Trie<EK, EV, T>
      where
          EK: Ord + Hash,
          EV: PartialEq + Clone + Hash,
          T: PartialEq + Hash,
      {
          fn hash<H: Hasher>(&self, state: &mut H) {
              self.value.hash(state);
              self.max_depth.hash(state);

              self.children.len().hash(state);
              for (ek, dest_map) in &self.children {
                  ek.hash(state);
                  dest_map.len().hash(state);

                  // To be order-independent with respect to child order, hash pairs and then sort.
                  let mut pair_hashes = Vec::with_capacity(dest_map.len());
                  for (child_idx, ev) in dest_map {
                      let mut pair_hasher = DeterministicHasher::new(DefaultHasher::new());
                      child_idx.as_usize().hash(&mut pair_hasher);
                      ev.hash(&mut pair_hasher);
                      pair_hashes.push(pair_hasher.finish());
                  }
                  pair_hashes.sort_unstable();
                  for h in pair_hashes {
                      h.hash(state);
                  }
              }
          }
      }

      /// A helper struct to facilitate inserting an edge into a Trie,
      /// trying multiple potential destinations and optionally creating a new node.
      /// Provides a chainable interface.
      ///
      /// This index-based version stores a reference to the Arena and a source Trie2Index.
      pub struct EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
      where
          EK: Ord + Clone,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          arena: &'a Arena<Trie<EK, EV, T>>,
          source_idx: Trie2Index,                      // The source node for the edge
          edge_key: EK,                                // The key for the edge to be inserted
          edge_value: Option<EV>,                      // The value for the edge to be inserted
          merge_edge_value: FMergeEV,                  // The function to merge edge values
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
          result: Option<Trie2Index>,                  // Stores the successful destination node
      }

      impl<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
          EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          /// Creates a new `EdgeInserter`.
          ///
          /// # Arguments
          ///
          /// * `arena`: The arena holding Trie nodes.
          /// * `source_idx`: The source node where the edge originates.
          /// * `edge_key`: The key for the new edge.
          /// * `edge_value`: The value for the new edge.
          /// * `merge_edge_value`: A closure that merges the existing edge value with the new edge value.
          pub fn new(
              arena: &'a Arena<Trie<EK, EV, T>>,
              source_idx: Trie2Index,
              edge_key: EK,
              edge_value: EV,
              merge_edge_value: FMergeEV,
              update_node_value: FUpdateT,
              mut merge_edge_value_and_source_node_value: FMergeEV_T,
          ) -> Self {
              // Avoid unused-parameter warnings
              let mut edge_value = edge_value;
              {
                  let source_guard = source_idx
                      .read(arena)
                      .expect("Arena read poisoned while reading source node value for edge value merge");
                  merge_edge_value_and_source_node_value(&mut edge_value, &source_guard.value);
              }

              EdgeInserter {
                  arena,
                  source_idx,
                  edge_key,
                  edge_value: Some(edge_value),
                  merge_edge_value,
                  update_node_value,
                  merge_edge_value_and_source_node_value,
                  result: None,
              }
          }

          /// Tries to establish an edge to the given `destination` index.
          ///
          /// If an edge with the same `edge_key` already exists pointing to `destination`,
          /// it merges the `edge_value` using the `merge_edge_value` closure.
          /// If no such edge exists, it inserts a new edge.
          ///
          /// Returns `self` to allow chaining.
          #[time_it]
          pub fn try_destination(mut self, destination: Trie2Index) -> Self {
              if self.result.is_some() {
                  return self; // Already found a destination
              }

              let mut update_info: Option<(Trie2Index, EV)> = None;

              { // Scope for source_guard
                  let mut source_guard = self.source_idx
                      .write(self.arena)
                      .expect("Arena write poisoned while locking source in try_destination");

                  if let Some(existing_ev_mut) = source_guard
                      .children
                      .get_mut(&self.edge_key)
                      .and_then(|dest_map| dest_map.get_mut(&destination))
                  {
                      let new_ev = self.edge_value.take().unwrap();
                      crate::debug!(7, "Merging edge value {:?} into existing edge value {:?} for edge {:?} to node {}", new_ev, existing_ev_mut, self.edge_key, destination.as_usize());
                      (self.merge_edge_value)(existing_ev_mut, new_ev);
                      let updated_ev = existing_ev_mut.clone();
                      self.result = Some(destination);
                      update_info = Some((destination, updated_ev));
                  } else {
                      let edge_val_clone = self.edge_value.as_ref().unwrap().clone();
                      crate::debug!(7, "Inserting edge {:?} with value {:?} to node {}", self.edge_key, edge_val_clone, destination.as_usize());
                      source_guard.try_insert(self.edge_key.clone(), &mut self.edge_value, destination);
                      self.result = Some(destination);
                      update_info = Some((destination, edge_val_clone));
                  }
              }

              if let Some((dest_idx, ev)) = update_info {
                  crate::debug!(7, "Updating node value for destination {} with edge value {:?}. self.edge_value: {:?}", dest_idx.as_usize(), ev, self.edge_value);
                  let mut dest_w = dest_idx.write(self.arena).expect("Arena write");
                  (self.update_node_value)(&mut dest_w.value, &ev);
              }

              self
          }

          /// Tries to establish an edge to any destination in the provided slice.
          /// Iterates through `destinations` and calls `try_destination` for each until one succeeds.
          /// Returns `self` to allow chaining.
          #[time_it]
          pub fn try_destinations(mut self, destinations: &[Trie2Index]) -> Self {
              for &destination in destinations {
                  if self.result.is_some() {
                      break; // Stop trying once a destination is found
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          #[time_it]
          pub fn try_destinations_iter(mut self, destinations: impl Iterator<Item = Trie2Index>) -> Self {
              for destination in destinations {
                  if self.result.is_some() {
                      break; // Stop trying once a destination is found
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          #[time_it]
          pub fn try_destinations_iter_with<F, R>(mut self, destinations: F) -> Self
          where
              F: Fn() -> R,
              R: Iterator<Item = Trie2Index>,
          {
              for destination in destinations() {
                  if self.result.is_some() {
                      break;
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          /// Merges the edge with existing children under `self.edge_key` (if any).
          /// Returns `self` to allow chaining.
          pub fn try_children(mut self) -> Self {
              if self.result.is_some() {
                  return self;
              }

              let children_for_this_key: Vec<Trie2Index> = {
                  let source_guard = self.source_idx
                      .read(self.arena)
                      .expect("Arena read poisoned while locking source in try_children");
                  if let Some(dest_map) = source_guard.children.get(&self.edge_key) {
                      dest_map.keys().cloned().collect()
                  } else {
                      Vec::new()
                  }
              };

              if !children_for_this_key.is_empty() {
                  self = self.try_destinations(&children_for_this_key);
              }
              self
          }

          /// If no destination has been found yet, creates a new node with the given `value`,
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Returns `self` to allow chaining.
          pub fn else_create_destination_with_value(mut self, value: T) -> Self {
              if self.result.is_some() {
                  return self;
              }

              let new_node_idx = Trie2Index::new(self.arena.insert(Trie::new(value)));
              let edge_val_clone = self.edge_value.as_ref().unwrap().clone();

              { // Scope for source_guard
                  let mut source_guard = self.source_idx
                      .write(self.arena)
                      .expect("Arena write poisoned while locking source in else_create_with_value");
                  source_guard.try_insert(self.edge_key.clone(), &mut self.edge_value, new_node_idx);
                  self.result = Some(new_node_idx);
              }

              if let Some(dest_idx) = self.result {
                  let mut dest_w = dest_idx.write(self.arena).expect("Arena write");
                  (self.update_node_value)(&mut dest_w.value, &edge_val_clone);
              }

              self
          }

          /// If no destination has been found yet, creates a new node by calling `value_fn`,
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Returns `self` to allow chaining.
          pub fn else_create_destination_with(self, value_fn: impl FnOnce() -> T) -> Self {
              if self.result.is_some() {
                  return self;
              }
              self.else_create_destination_with_value(value_fn())
          }

          /// If no destination has been found yet, creates a new node with the default value (`T::default()`),
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Requires `T: Default`.
          /// Returns `self` to allow chaining.
          pub fn else_create_destination(self) -> Self
          where
              T: Default,
          {
              if self.result.is_some() {
                  return self;
              }
              self.else_create_destination_with_value(T::default())
          }

          /// Returns the resulting destination node index, if one was found or created.
          pub fn into_option(self) -> Option<Trie2Index> {
              self.result
          }

          pub fn is_some(&self) -> bool {
              self.result.is_some()
          }

          pub fn clone_into_option(&self) -> Option<Trie2Index> {
              self.result
          }

          /// Returns the resulting destination node index, panicking if none was found or created.
          pub fn unwrap(self) -> Trie2Index {
              self.result.expect("EdgeInserter::unwrap() called but no destination was found or created")
          }

          /// Returns the resulting destination node index, panicking with the given message if none was found or created.
          pub fn expect(self, msg: &str) -> Trie2Index {
              self.result.expect(msg)
          }
      }

      // Optional: Add a convenience method to Trie2Index to create an EdgeInserter easily.
      impl Trie2Index {
          /// Creates an `EdgeInserter` to help add an edge starting from this node index.
          ///
          /// # Example (after migration)
          ///
          /// ```ignore
          /// let root_idx: Trie2Index = ...;
          /// let arena: Arena<Trie<String, i32, NodeValue>> = ...;
          /// let god = /* obtain GodWrapper */ unimplemented!();
          /// let new_or_existing_node_idx = root_idx
          ///     .insert_edge(
          ///         &arena, &god, "key".to_string(), 1,
          ///         |ev_old, ev_new| *ev_old += ev_new,        // merge edge value
          ///         |_node_value, _ev| {},                     // update node value from edge value
          ///         |_edge_value, _source_node_value| {},      // merge edge value with source node value
          ///     )
          ///     .try_children()
          ///     .else_create_destination()
          ///     .unwrap();
          /// ```
          pub fn insert_edge<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
              edge_key: EK,
              edge_value: EV,
              merge_edge_value: FMergeEV,
              update_node_value: FUpdateT,
              merge_edge_value_and_source_node_value: FMergeEV_T,
          ) -> EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
          where
              EK: Ord + Clone + Debug,
              EV: Clone + Debug,
              T: Clone,
              FMergeEV: FnMut(&mut EV, EV),
              FUpdateT: FnMut(&mut T, &EV),
              FMergeEV_T: FnMut(&mut EV, &T),
          {
              EdgeInserter::new(
                  arena,
                  self,
                  edge_key,
                  edge_value,
                  merge_edge_value,
                  update_node_value,
                  merge_edge_value_and_source_node_value,
              )
          }
      }

      /// Attempts to establish an edge from `source` to a single `destination`,
      /// optionally merging edge values if an edge already exists.
      /// Returns `Some(Trie2Index)` if merge or insert succeeded.
      pub fn try_destination<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
          arena: &'a Arena<Trie<EK, EV, T>>,
          source: Trie2Index,
          edge_key: EK,
          edge_value: EV,
          destination: Trie2Index,
          merge_edge_value: FMergeEV,
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
      ) -> Option<Trie2Index>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          EdgeInserter::new(
              arena,
              source,
              edge_key,
              edge_value,
              merge_edge_value,
              update_node_value,
              merge_edge_value_and_source_node_value,
          )
          .try_destination(destination)
          .into_option()
      }

      /// Attempts to establish an edge from `source` to any of the provided `destinations`,
      /// returning the first successful one (merge or insert), or `None` if none matched.
      pub fn try_destination_with<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
          arena: &'a Arena<Trie<EK, EV, T>>,
          source: Trie2Index,
          edge_key: EK,
          edge_value: EV,
          destinations: &[Trie2Index],
          merge_edge_value: FMergeEV,
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
      ) -> Option<Trie2Index>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          EdgeInserter::new(
              arena,
              source,
              edge_key,
              edge_value,
              merge_edge_value,
              update_node_value,
              merge_edge_value_and_source_node_value,
          )
          .try_destinations(destinations)
          .into_option()
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct Index {
          index: usize,
      }

      impl From<usize> for Index {
          fn from(index: usize) -> Self {
              Index { index }
          }
      }

      impl From<Index> for usize {
          fn from(idx: Index) -> usize {
              idx.index
          }
      }

      impl Index {
          pub fn as_usize(self) -> usize {
              self.index
          }
      }

      #[derive(Debug, Clone)]
      pub struct ArenaInner<T> {
          values: Vec<Option<T>>,
          counter: usize,
      }

      impl<T: PartialEq> PartialEq for ArenaInner<T> {
          fn eq(&self, other: &Self) -> bool {
              self.counter == other.counter && self.values == other.values
          }
      }
      impl<T: Eq> Eq for ArenaInner<T> {}

      impl<T: PartialOrd> PartialOrd for ArenaInner<T> {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              match self.counter.partial_cmp(&other.counter) {
                  Some(Ordering::Equal) => self.values.partial_cmp(&other.values),
                  other => other,
              }
          }
      }

      impl<T: Ord> Ord for ArenaInner<T> {
          fn cmp(&self, other: &Self) -> Ordering {
              self.counter.cmp(&other.counter)
                  .then_with(|| self.values.cmp(&other.values))
          }
      }

      #[derive(Debug, Clone)]
      pub struct Arena<T> {
          pub(crate) inner: Arc<RwLock<ArenaInner<T>>>,
      }
      impl<T> PartialEq for Arena<T>
      where
          T: PartialEq,
      {
          fn eq(&self, other: &Self) -> bool {
              Arc::ptr_eq(&self.inner, &other.inner)
                  || PartialEq::eq(
                      &*self.inner.read().unwrap(),
                      &*other.inner.read().unwrap(),
                  )
          }
      }
      impl<T> Eq for Arena<T> where T: Eq {}

      impl<T> PartialOrd for Arena<T>
      where
          T: PartialOrd,
      {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              if Arc::ptr_eq(&self.inner, &other.inner) {
                  return Some(Ordering::Equal);
              }
              PartialOrd::partial_cmp(
                  &*self.inner.read().unwrap(),
                  &*other.inner.read().unwrap(),
              )
          }
      }

      impl<T> Ord for Arena<T>
      where
          T: Ord,
      {
          fn cmp(&self, other: &Self) -> Ordering {
              if Arc::ptr_eq(&self.inner, &other.inner) {
                  return Ordering::Equal;
              }
              Ord::cmp(
                  &*self.inner.read().unwrap(),
                  &*other.inner.read().unwrap(),
              )
          }
      }

      // Note: hashing only the pointer means two Arenas with equal content but different Arcs
      // will not hash equal even though `eq` may return true. If you need Eq/Hash consistency,
      // hash the map contents instead.
      impl<T> Hash for Arena<T>
      where
          T: Hash,
      {
          fn hash<H: Hasher>(&self, state: &mut H) {
              Hash::hash(&Arc::as_ptr(&self.inner), state);
          }
      }

      impl<T> Arena<T> {
          pub fn new() -> Self {
              Arena {
                  inner: Arc::new(RwLock::new(ArenaInner {
                      values: Vec::new(),
                      counter: 0,
                  })),
              }
          }

          // Inserts `value` at the next free index and returns the Index.
          pub fn insert(&self, value: T) -> Index {
              let mut inner = self.inner.write().unwrap();
              let next = inner.counter;
              inner.counter = inner.counter.checked_add(1).expect("Arena index overflow");

              if next >= inner.values.len() {
                  inner.values.resize_with(next + 1, || None);
              }

              let old = inner.values[next].replace(value);
              debug_assert!(old.is_none());
              Index { index: next }
          }

          // Replace or set a value at a specific index. Returns the old value if any.
          pub fn insert_at(&self, index: Index, value: T) -> Option<T> {
              let mut inner = self.inner.write().unwrap();
              let idx = index.index;
              if idx >= inner.values.len() {
                  inner.values.resize_with(idx + 1, || None);
              }
              if idx >= inner.counter {
                  inner.counter = idx + 1;
              }
              inner.values[idx].replace(value)
          }

          // Remove a value at index, returning it if present.
          pub fn remove(&self, index: Index) -> Option<T> {
              let mut inner = self.inner.write().unwrap();
              let idx = index.index;
              if idx < inner.values.len() {
                  inner.values[idx].take()
              } else {
                  None
              }
          }

          // Returns true if the index exists in the arena.
          pub fn contains(&self, index: Index) -> bool {
              let inner = self.inner.read().unwrap();
              inner.values.get(index.index).map_or(false, |v| v.is_some())
          }

          // Returns a clone of the value at index (requires T: Clone).
          pub fn get(&self, index: Index) -> Option<T>
          where
              T: Clone,
          {
              self.inner.read().unwrap().values.get(index.index).and_then(|v| v.as_ref()).cloned()
          }

          // Read access via a closure (no Clone bound required).
          pub fn with<R>(&self, index: Index, f: impl FnOnce(&T) -> R) -> Option<R> {
              let guard = self.inner.read().unwrap();
              guard.values.get(index.index).and_then(|opt| opt.as_ref()).map(f)
          }

          // Mutable access via a closure (no Clone bound required).
          pub fn with_mut<R>(&self, index: Index, f: impl FnOnce(&mut T) -> R) -> Option<R> {
              let mut guard = self.inner.write().unwrap();
              guard.values.get_mut(index.index).and_then(|opt| opt.as_mut()).map(f)
          }

          pub fn len(&self) -> usize {
              self.inner.read().unwrap().values.iter().filter(|v| v.is_some()).count()
          }

          pub fn is_empty(&self) -> bool {
              self.inner.read().unwrap().values.iter().all(|v| v.is_none())
          }

          pub fn clear(&self) {
              let mut inner = self.inner.write().unwrap();
              inner.values.clear();
              inner.counter = 0;
          }

          // Snapshot of all indices.
          pub fn indices(&self) -> Vec<Index> {
              self.inner
                  .read()
                  .unwrap()
                  .values
                  .iter()
                  .enumerate()
                  .filter_map(|(i, v)| if v.is_some() { Some(Index::from(i)) } else { None })
                  .collect()
          }

          // Snapshot of all entries as (Index, T) pairs (requires T: Clone).
          pub fn to_vec(&self) -> Vec<(Index, T)>
          where
              T: Clone,
          {
              self.inner
                  .read()
                  .unwrap()
                  .values
                  .iter()
                  .enumerate()
                  .filter_map(|(i, v)| v.as_ref().map(|val| (Index::from(i), val.clone())))
                  .collect()
          }
      }

      impl<T> JSONConvertible for Arena<T>
      where
          T: JSONConvertible,
      {
          fn to_json(&self) -> JSONNode {
              let guard = self.inner.read().unwrap();
              let mut obj = BTreeMap::new();
              obj.insert("counter".to_string(), guard.counter.to_json());
              let items: Vec<JSONNode> = guard.values.iter().enumerate().filter_map(|(k, v)| {
                  v.as_ref().map(|val| {
                      JSONNode::Array(vec![
                          k.to_json(),
                          val.to_json(),
                      ])
                  })
              }).collect();
              obj.insert("values".to_string(), JSONNode::Array(items));
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let counter = usize::from_json(obj.remove("counter").ok_or("Missing 'counter' field")?)?;
              let values_node = obj.remove("values").ok_or("Missing 'values' field")?;
              let arr = match values_node {
                  JSONNode::Array(arr) => arr,
                  _ => return Err("Expected JSONNode::Array for Arena values".to_string()),
              };

              let mut values = Vec::new();
              for item_node in arr {
                  let mut pair = match item_node {
                      JSONNode::Array(pair) if pair.len() == 2 => pair,
                      _ => return Err("Expected 2-element array for Arena entry".to_string()),
                  };
                  let value_node = pair.pop().unwrap();
                  let key_node = pair.pop().unwrap();

                  let key = usize::from_json(key_node)?;
                  let value = T::from_json(value_node)?;

                  if key >= values.len() {
                      values.resize_with(key + 1, || None);
                  }
                  values[key] = Some(value);
              }

              Ok(Arena {
                  inner: Arc::new(RwLock::new(ArenaInner {
                      values,
                      counter,
                  })),
              })
          }
      }

      pub type GodWrapper<EK, EV, T> = Arena<Trie<EK, EV, T>>;
      pub type God<EK, EV, T> = Arena<Trie<EK, EV, T>>;
