      +    Given a list of [start, end] integer ranges, remove a single token.
      +    This may result in a range being split. Ranges are not merged.
      +    """
      +    new_ranges = []
      +    for start, end in ranges:
      +        if token < start or token > end:
      +            new_ranges.append([start, end])
