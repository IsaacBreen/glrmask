      Acceptance won't be handled by step and won't be tracked in the parser state.
      Instead, fully_matches will loop through parser states and check if they're in glr table states with accept field true.

      ~~Replace parse with parse_completely~~ actually leave parse the same. Except make it clear the accepting state field before starting.
      replace parse_part with parse_any_prefix_of. Each time this is called, clear the past accept states. Reinitialize it with the current accepting states. After each step, extend it with the current accepting states.
