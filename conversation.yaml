              def initialize_acc(acc: PyAcc) -> PyAcc:
                  # Compute allowed LLM tokens from disallowed terminals for this accumulator
                  disallowed_llm_mask = ffi.Bitset.zeros()
                  disallowed_map = dict(acc.terminals_union)

