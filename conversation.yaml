          @staticmethod
          def _enqueue_helper(todo: Dict[int, set], depth_heap: List[int]):
              heappush = heapq.heappush

              def enqueue(depth: int, node_idx: int) -> None:
                  bucket = todo.get(depth)
                  if bucket is None:
                      todo[depth] = {node_idx}
                      heappush(depth_heap, depth)
                  else:
                      bucket.add(node_idx)

              return enqueue

