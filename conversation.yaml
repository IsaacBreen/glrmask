                  JSONNode::Object(mut obj) => Ok(Goto {
                      state_id: obj
                          .remove("state_id")
                          .ok_or_else(|| "Missing field 'state_id' for Goto".to_string())
                          .and_then(Option::<StateID>::from_json)?,
                      accept: obj
                          .remove("accept")
                          .ok_or_else(|| "Missing field 'accept' for Goto".to_string())
