      ///
      /// print_summary();
      /// reset();
      /// ```
      #[macro_export]
      macro_rules! time {
          ($name:expr, $block:expr) => {{
              let __profiler_name = ($name).into();
              let _guard = $crate::profiler::TimedBlockGuard::new(__profiler_name);
              $block
