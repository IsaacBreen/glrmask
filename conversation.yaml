              _start_b -> q0b;
              q0b -> q1b [label="a/.2", headport=w, tailport=e];
              q0b -> q0b [label="a/.1", headport=n, tailport=n, minlen=2];
              q1b -> q2b [label="b/.4", headport=w, tailport=e];
              q1b -> q0b [label="b/.3", headport=e, tailport=w];
              q2b -> q1b [label="ε/.7"];
              q2b -> q3b [label="ε/.5"];
          }
      }
      ```

      > **Definition 1.1.** A weighted transducer $T$ over a semiring $(S, \oplus, \otimes, \overline{0}, \overline{1})$ is an 8-tuple $T = (\Sigma, \Delta, Q, I, F, E, \lambda, \rho)$ where $\Sigma$ is a finite input alphabet, $\Delta$ a finite output alphabet, $Q$ is a finite set of states, $I \subseteq Q$ the set of initial states, $F \subseteq Q$ the set of final states, $E$ a finite multiset[^1] of transitions, which are elements of $Q \times (\Sigma \cup \{\epsilon\}) \times (\Delta \cup \{\epsilon\}) \times S \times Q$, $\lambda: I \to S$ an initial weight function, and $\rho: F \to S$ a final weight function mapping $F$ to $S$.

      For a state $q \in Q$, we will denote by $E[q]$ the outgoing transitions of $q$ and more generally by $E[Q']$, the outgoing transitions of all states $q$ in a subset of states $Q' \subseteq Q$. An $\epsilon$-transition is a transition with both input and output label equal to $\epsilon$.

      A *path* $\pi$ of a transducer is an element of $E^*$ with consecutive transitions. We denote by $p[\pi]$ its origin or previous state and by $n[\pi]$ its destination or next state. A *cycle* is a path with $p[\pi] = n[\pi]$. An $\epsilon$-cycle is a cycle with both input and output label equal to $\epsilon$. We also denote by
      - $P(Q_1, Q_2)$, the set of all paths from a subset $Q_1 \subseteq Q$ to a subset $Q_2 \subseteq Q$.
      - $P(Q_1, x, Q_2)$ the subset of all paths of $P(Q_1, Q_2)$ with input label $x$.
      - $P(Q_1, x, y, Q_2)$ the subset of all paths of $P(Q_1, x, Q_2)$ with output label $y$.

      A path in $P(I, F)$ is said to be *accepting* or *successful*. The weight of a path $\pi$ obtained by $\otimes$-multiplying the weights of its constituent transitions is denoted by $w[\pi]$. For any transducer $T$, we denote by $T^{-1}$ its *inverse*, that is the transducer obtained from $T$ by swapping the input and output label of each transition.

      A transducer $T$ is said to be *regulated* if the output weight associated by $T$ to any pair of strings $(x, y) \in \Sigma^* \times \Delta^*$ defined as:
      $$
      T(x,y) = \bigoplus_{\pi \in P(I,x,y,F)} \lambda(p[\pi]) \otimes w[\pi] \otimes \rho(n[\pi])
      $$
      is an element of $S$ and its definition does not depend on the order of the terms in the $\oplus$-sum. $T(x, y)$ is defined to be $\overline{0}$ when $P(I, x, y, F) = \emptyset$.[^2] Note that in the absence of $\epsilon$-cycles, the set of accepting paths $P(I, x, y, F)$ is finite for any $(x,y) \in \Sigma^* \times \Delta^*$ and thus $T$ is regulated. Also, as we shall see later, in some semirings, such as the four semirings of Table 1, all weighted transducers are regulated. The weighted transducers we will be considering in this chapter will be regulated. Figure 1(a) shows an example of a weighted transducer.

      While our definition allows for multiple initial states with initial weights, in all our examples there will be a unique initial state with initial weight $\overline{1}$ and thus that weight is not indicated in figures. Since any weighted transducer can be represented by an equivalent one with this property, this does not represent a real limitation.

      A state $q \in Q$ is said to be *non-accessible* (*non-coaccessible*) when there is no path from $I$ to $q$ (resp. from $q$ to $F$). Non-accessible and non-coaccessible states are called *useless states*. They can be removed using a connection (or trimming) algorithm in linear time without affecting the weight $T$ associates to any pair. A transducer with no useless state is said to be *trim*.

      A transducer is said to be *unambiguous* if for any string $x \in \Sigma^*$ it admits at most one accepting path with input label $x$. It is said to be *deterministic* or *sequential* if it has at most one initial state and at any state no two outgoing transitions share the same input label.

      A *weighted automaton* $A$ can be defined as a weighted transducer with identical input and output labels, for any transition. Thus, only string pairs of the form $(x, x)$ can have a non-zero weight by $A$, which is why the weight associated by $A$ to $(x,x)$ is abusively denoted by $A(x)$ and identified with the weight associated by $A$ to $x$. Similarly, in the graph representation of weighted automata, the output (or input) label is omitted. Figure 1(b) shows an example of a weighted automaton. The language accepted by $A$ is the one accepted by the unweighted automaton obtained by ignoring its weights and is denoted by $L(A)$.

      Note that (unweighted) finite automata [51] can be viewed as weighted automata over the Boolean semiring and, similarly, (unweighted) finite-state transducers [22, 54, 12, 36] as weighted transducers defined over the Boolean semiring.

      # 2. Shortest-distance algorithms

      Shortest-paths problems are familiar problems in computer science and mathematics. In these problems, edge weights may represent distances, costs, or any other real-valued quantity that can be added along a path, and that one may wish to minimize. Thus, edge weights are real numbers and the specific operations used are addition to compute the weight of a path and minimum to select the best path weight.

      This section introduces a generalization of this problem to the case where the operations are those of a semiring. These problems turn out to be crucial in the design of several algorithms such as $\epsilon$-removal or pushing and in many other contexts. Different algorithmic solutions will be presented depending on the semiring properties.

      We will consider directed graphs $G = (Q, E, w)$ over a semiring $S$, where $Q$ is a set of vertices, $E$ a set of edges, and $w: E \to S$ the edge weight function which we can extend to any path $\pi = e_1 \dots e_k$ by $w[\pi] = \bigotimes_{i=1}^k w[e_i]$.

      ## 2.1 All-Pairs Shortest-Distance Problems

      The general all-pairs shortest-distance algorithm described in this section is defined for any *complete semiring*.[^3]

      #### Complete Semirings
      A semiring $(S, \oplus, \otimes, \overline{0}, \overline{1})$ is said to be *complete* if for any index set $I$ and any family $(a_i)_{i \in I}$ of elements of $S$, $\bigoplus_{i \in I} a_i$ is an element of $S$ whose definition does not depend on the order of the terms in the $\oplus$-sum and that has the following properties [22, 20]:
      $$
      \begin{align}
      \bigoplus_{i \in I} a_i &= \overline{0} & \text{if card}(I) = 0 \\
      \bigoplus_{i \in I} a_i &= a_i & \text{if card}(I) = 1 \\
      \bigoplus_{i \in I} a_i &= \bigoplus_{j \in J} \left( \bigoplus_{i \in I_j} a_i \right) & \text{for any disjoint partition } I = \bigcup_{j \in J} I_j \\
      a \otimes \left( \bigoplus_{i \in I} a_i \right) &= \bigoplus_{i \in I} (a \otimes a_i) & \text{for any } a \in S \\
      \left( \bigoplus_{i \in I} a_i \right) \otimes a &= \bigoplus_{i \in I} (a_i \otimes a) & \text{for any } a \in S.
      \end{align}
      $$
      A straightforward consequence of these axioms is that in a complete semiring the identity $(\bigoplus_{i \in I} a_i) \otimes (\bigoplus_{j \in J} b_j) = \bigoplus_{(i,j) \in I \times J} (a_i \otimes b_j)$ holds for any two families $(a_i)_{i \in I}$ and $(b_j)_{j \in J}$ of elements of $S$. Note that in a complete semiring all weighted transducers are regulated since all infinite sums are elements of $S$.

      A complete semiring $S$ is a *starsemiring* [20], that is a semiring that can be augmented with an internal unary *closure* operation $^*$ defined by $a^* = \bigoplus_{n=0}^\infty a^n$ for any $a \in S$.[^4] Furthermore, associativity, commutativity, and distributivity apply to these infinite sums.

      The *Boolean semiring* $(\{0,1\}, \lor, \land, 0, 1)$ with $a^* = 1$ for $a \in \{0,1\}$, and the *tropical semiring* $(\mathbb{R}_+ \cup \{+\infty\}, \min, +, +\infty, 0)$, with $a^* = 0$ for all $a \in \mathbb{R}_+ \cup \{+\infty\}$, implicitly used in shortest-paths problems, are familiar examples of complete semirings. The more general tropical semiring $(\mathbb{R} \cup \{-\infty, +\infty\}, \min, +, +\infty, 0)$ with
      $$
      a^* = \begin{cases} 0 & \text{if } a \in \mathbb{R}_+; \\ -\infty & \text{otherwise}, \end{cases}
      $$
      and $(+\infty) + (-\infty) = (-\infty) + (+\infty) = +\infty$, also defines a complete semiring. Note that the family of complete semirings includes non-idempotent semirings such as the *probability semiring* $(\mathbb{R}_+ \cup \{+\infty\}, +, \times, 0, 1)$ with the closure operation defined by
      $$
      a^* = \begin{cases} \frac{1}{1-a} & \text{if } 0 \le a < 1; \\ +\infty & \text{otherwise}. \end{cases}
      $$
      The *log semiring* $(\mathbb{R} \cup \{-\infty, +\infty\}, \oplus_{\mathrm{log}}, +, +\infty, 0)$ which is isomorphic to the probability semiring is also a non-idempotent complete semiring with
      $$
      a^* = \begin{cases} -\log(1-e^{-a}) & \text{if } a > 0; \\ +\infty & \text{otherwise}. \end{cases}
      $$
      The *lattice semiring* $(L, \lor, \land, \bot, \top)$ where $L$ is a complete and distributive lattice with infimum $\bot$ and supremum $\top$ is a complete semiring with $a^* = \top$ for all $a \in L$, when it verifies properties (5) and (6) [20]. Thus, all weighted transducers are regulated in the semirings just examined.

      #### All-Pairs Shortest-Distance Algorithm
      For a complete semiring, we can define the *distance* or *shortest-distance* from vertex $p$ to vertex $q$ in $G = (Q, E, w)$ by
      $$
      d[p, q] = \bigoplus_{\pi \in P(p,q)} w[\pi],
      $$
      where the $\oplus$-sum runs over the set of all paths from $p$ to $q$. This definition coincides with the classical definition of shortest-distance where the weights are summed along the path and where the shortest path is sought for the tropical semiring $(\mathbb{R}_+ \cup \{+\infty\}, \min, +, +\infty, 0)$. The general all-pair shortest-distance problem is that of computing the shortest distances $d[p, q]$ for all pairs $(p,q)$ with $p, q \in Q$.

      This problem can be solved by computing the closure of the matrix $M = (M_{pq}) \in S^{|Q|\times|Q|}$ defined by $M_{pq} = \bigoplus_{e \in E \cap P(p,q)} w[e]$ for all $p,q \in Q$. Indeed, using the semiring operations in matrix multiplication [20], for $n \in \mathbb{N}$, the coefficient $M^n_{pq}$ of $M^n$ gives the $\oplus$-sum of the weights of all paths of length at most $n$ from $p$ to $q$. For idempotent semirings such as the tropical semiring for which $\overline{1} \oplus x = \overline{1}$ for all $x \in S$, only simple paths (paths with no cycle) need to be considered in the computation of the shortest distances and thus $M^* = M^{|Q|-1}$. Using the standard repeated squaring technique [17], $M^{|Q|-1}$ can be computed in time $\Theta(|Q|^3(T_\oplus + T_\otimes)\log|Q|)$, where $T_\oplus$ denotes the computational cost of the $\oplus$ operation, and $T_\otimes$ that of the $\otimes$ operation. There exists however a more efficient method for computing all-pairs shortest-distances for all complete semirings based on a generalization of the Floyd-Warshall algorithm.[^5]

      The Floyd-Warshall algorithm [25, 57] originally designed for the Boolean semiring can be generalized to compute all-pair shortest-distances in all complete semirings. Figure 2 gives the pseudocode of an in-place implementation of the algorithm where $d[i, j]$ corresponds to the tentative shortest distance from vertex $i$ to vertex $j$. Lines 1-3 initialize each distance $d[i, j]$ to the sum of the weights of the transitions between $i$ and $j$. By convention, the $\oplus$-sum is $\overline{0}$ if $i$ and $j$ are not adjacent. The loops of lines 4-11 update the tentative shortest-distances in a way that is similar to the steps of the standard Floyd-Warshall algorithm but using operations of an arbitrary complete semiring.

      Let $T_*$ denote the cost of the closure operation.

      > **Theorem 2.1.** Let $G = (Q,E,w)$ be a weighted directed graph over a complete semiring $S$. Then, the algorithm `GEN-ALL-PAIRS` computes the shortest-distances $d[i, j]$ between all pairs of vertices $(i, j)$ of $G$ in time $\Theta(|Q|^3(T_\oplus + T_\otimes + T_*))$ and space $\Theta(|Q|^2)$.

      > **Proof.** Let $P_k(i, j)$ denote the set of paths from $i$ to $j$ with all intermediate vertices within $\{1, \dots, k\}$. For any $i, j \in Q, k \in \{0\} \cup Q$, let $d_{ij}^k$ be the sum of all paths from $i$ to $j$ with all intermediate vertices within $\{1, \dots, k\}$: $d_{ij}^k = \bigoplus_{\pi \in P_k(i,j)} w[\pi]$. Since the semiring is complete, $d_{ij}^k$ is well-defined and in $S$.

      **Figure 2:** Generic all-pairs shortest-distance algorithm.
      ```
      1. Procedure GEN-ALL-PAIRS(G)
      2.     For i ← 1 to |Q|
      3.         For j ← 1 to |Q|
      4.             d[i, j] ← bigoplus_{e ∈ E ∩ P(i,j)} w[e]
      5.         EndFor
      6.     EndFor
      7.     For k ← 1 to |Q|
      8.         For i ← 1 to |Q|, i ≠ k
      9.             For j ← 1 to |Q|, j ≠ k
      10.                d[i, j] ← d[i, j] ⊕ (d[i, k] ⊗ d[k, k]* ⊗ d[k, j])
      11.            EndFor
      12.        EndFor
      13.        For i ← 1 to |Q|, i ≠ k
      14.            d[k, i] ← d[k, k]* ⊗ d[k, i]
      15.            d[i, k] ← d[i, k] ⊗ d[k, k]*
      16.        EndFor
      17.        d[k, k] ← d[k, k]*
      18.    EndFor
      19. EndProcedure
      ```

      Let $\pi$ be a path in $P_k(i, j)$. It is either a path from $i$ to $j$ with all intermediate vertices within $\{1, \dots, k-1\}$ or it can be decomposed into a path from $i$ to $k$ with all intermediate vertices within $\{1, \dots, k-1\}$, followed by any number of cycles at $k$ with all intermediate vertices in $\{1, \dots, k-1\}$, followed by a path from $k$ to $j$ with all intermediate vertices within $\{1, \dots, k-1\}$. Thus, for all $i, j, k \in Q$,
      $$
      P_k(i, j) = P_{k-1}(i, j) \cup (P_{k-1}(i, k)(P_{k-1}(k,k))^*P_{k-1}(k, j)).
      $$
      By definition, a path in $P_{k-1}(i, j)$ does not go through $k$, thus:
      $$
      P_{k-1}(i, j) \cap (P_{k-1}(i, k)(P_{k-1}(k,k))^*P_{k-1}(k, j)) = \emptyset.
      $$
      Thus, even if $S$ is not idempotent, $d_{ij}^k$ can be decomposed, for all $i, j, k \in Q$, as
      $$
      d_{ij}^k = d_{ij}^{k-1} \oplus (d_{ik}^{k-1} \otimes (d_{kk}^{k-1})^* \otimes d_{kj}^{k-1}).
      $$
      This identity leads directly to an algorithm for computing all-pairs shortest distances using a triple-indexed array. An in-place implementation of the algorithm limits the space used to that of a single $|Q| \times |Q|$-matrix (Figure 2) and thus the space complexity of the algorithm to $O(|Q|^2)$. The cubic-time complexity follows directly the definition of the algorithm. ∎

      The efficiency of the algorithm can be improved for graphs $G$ with relatively small strongly connected components (SCCs) by decomposing $G$ into its SCCs, which can be done in linear time, then running `GEN-ALL-PAIRS` on each SCC. The `GEN-ALL-PAIRS` algorithm is useful in a variety of applications. With the Boolean semiring, it can be used to compute the transitive closure of any vertex of a graph and then coincides with the classical Floyd-Warshall algorithm [25, 57]. With the tropical semiring, the algorithm can compute the all-pairs shortest distances in the classical case including for graphs with negative cycles using the general topical semiring $(\mathbb{R} \cup \{-\infty, +\infty\}, \min, +, +\infty, 0)$. The algorithm of [28] based on Dijkstra's algorithm and that of Bellman-Ford has a better time complexity for graphs with real-valued weights, $O(|Q|^2 \log|Q| + |Q||E|)$, but it cannot be used with graphs that have a negative cycle. `GEN-ALL-PAIRS` can also be used to compute the minimum spanning tree of a directed graph using the complete semiring $(\mathbb{R} \cup \{-\infty, \infty\}, \min, \max, \infty, -\infty)$ [17]. Finally, it is also useful for computing the epsilon-removal of a weighted automaton in the general case of complete semirings [40] where Johnson's algorithm does not apply, which is the main motivation for our presentation of the algorithm.

      `GEN-ALL-PAIRS` can be used of course to compute single-source shortest distances in graphs $G$ weighted over a complete semiring. The complexity of the `GEN-ALL-PAIRS` algorithm in this case, $\Theta(|Q|^3)$, makes it impractical for large graphs. The next section describes a single-source shortest-distance algorithm which can be significantly more efficient in many cases.

      ## 2.2 Single-Source Shortest-Distance Problems

      The general single-source shortest-distance algorithm described in this section is defined for any *k-closed semiring* [41, 20].[^6]

      #### k-Closed Semirings
      Let $k \ge 0$ be an integer. A semiring $(S, \oplus, \otimes, \overline{0}, \overline{1})$ is said to be *k-closed* if
      $$
      \forall a \in S, \bigoplus_{n=0}^{k+1} a^n = \bigoplus_{n=0}^k a^n.
      $$
      A k-closed semiring is thus a starsemiring with $a^* = \bigoplus_{n=0}^k a^n$ for all $a \in S$ (as defined in [20]). The Boolean semiring, the tropical semiring $(\mathbb{R}_+ \cup \{+\infty\}, \min, +, +\infty, 0)$, or $(\mathbb{R} \cup \{-\infty, \infty\}, \min, \max, \infty, -\infty)$ are examples of k-closed semirings with $k=0$.

      #### General single-source shortest-distance Algorithm
      The shortest-distance $d[i, j]$ from any vertex $i$ to any vertex $j$ is well-defined in a k-closed semiring $S$. Given a source vertex $s \in Q$, the general single-source shortest-distance problem consists of computing all distances $d[s, q]$, $q \in Q$.

      Figure 3 gives the pseudocode of an algorithm computing the single-source shortest-distances for any k-closed semiring [41]. The algorithm is based on a generalization of the relaxation technique to the k-closed semirings.

      The algorithm maintains two arrays $d[q]$ and $r[q]$ indexed with vertices. $d[q]$ denotes the tentative shortest distance from the source $s$ to $q$. $r[q]$ keeps track of the sum of the weights $\otimes$-added to $d[q]$ since the last queue extraction of $q$. The attribute $r$ is needed for the shortest-distance algorithm to work in non-idempotent cases. The algorithm uses a queue $\mathcal{Q}$ to store the set of states to consider for the relaxation steps of lines 11-15 [41]. Any queue discipline, e.g., FIFO, shortest-first, topological (in the acyclic case), can be used.

      **Figure 3:** Generic single-source shortest-distance algorithm.
      ```
      1. Procedure GEN-SINGLE-SOURCE(G, s)
      2.     For i ← 1 to |Q|
      3.         d[i] ← r[i] ← overline{0}
      4.     EndFor
      5.     d[s] ← r[s] ← overline{1}
      6.     Q ← {s}
      7.     While Q ≠ ∅
      8.         q ← HEAD(Q)
      9.         DEQUEUE(Q)
      10.        r' ← r[q]
      11.        r[q] ← overline{0}
      12.        For each e ∈ E[q]
      13.            If d[n[e]] ≠ d[n[e]] ⊕ (r' ⊗ w[e])
      14.                d[n[e]] ← d[n[e]] ⊕ (r' ⊗ w[e])
      15.                r[n[e]] ← r[n[e]] ⊕ (r' ⊗ w[e])
      16.                If n[e] ∉ Q
      17.                    ENQUEUE(Q, n[e])
      18.                EndIf
      19.            EndIf
      20.        EndFor
      21.    EndWhile
      22. EndProcedure
      ```

      Different queue disciplines yield different running times for our algorithm. The choice of the best queue discipline to use depends on the semiring and the graph structure.

      If the graph is acyclic, then using the topological order queue discipline gives a linear-time algorithm: $O(|Q| + (T_\oplus + T_\otimes)|E|)$. For the tropical semiring $(\mathbb{R}_+ \cup \{+\infty\}, \min, +, +\infty, 0)$ and the best-first queue discipline, the algorithm coincides with Dijkstra's algorithm and its complexity is $O(|E| + |Q|\log|Q|)$ using Fibonacci heaps. In the presence of negative weights but no negative cycles, using a FIFO queue discipline, the algorithm coincides with the Bellman-Ford algorithm.

      The initialization step of the algorithm (lines 1-3) takes $O(|Q|)$ time, each relaxation (lines 11-13) takes $O(T_\oplus + T_\otimes + C(A))$ time. There are exactly $N(q)|E[q]|$ relaxations at $q$. The total cost of the relaxations is thus: $O((T_\oplus + T_\otimes + C(A))|E| \max_{q \in Q} N(q))$. Since each vertex $q$ is inserted in $\mathcal{Q}$ $N(q)$ times (line 15), it is also extracted from $\mathcal{Q}$ $N(q)$ times (lines 6-7), and the general expression of the complexity is
      $$
      O(|Q| + (T_\oplus + T_\otimes + C(A))|E| \max_{q \in Q} N(q) + (C(I) + C(E)) \sum_{q \in Q} N(q)),
      $$
      where $C(E)$ is the worst cost of removing a vertex $q$ from the queue $\mathcal{Q}$, $C(I)$ that of inserting $q$ in $\mathcal{Q}$, and $C(A)$ that of an assignment, including the possible necessary cost of reorganizing the queue.

      > **Theorem 2.2.** Let $G = (Q,E,w)$ be a weighted directed graph over a k-closed commutative semiring $S$ and let $s \in Q$ be a distinguished source vertex. Then, the algorithm `GEN-SINGLE-SOURCE` computes the single-source shortest-distances $d[s,q]$ to all vertices $q \in Q$ regardless of the queue discipline used for $\mathcal{Q}$.

      The proof of theorem is given in [41].

      # 3. Rational Operations

      Regulated weighted transducers are closed under the following three standard operations called *rational operations*:
      - The *sum* (or *union*) of two weighted transducers $T_1$ and $T_2$ is defined by
        $$
        \forall (x, y) \in \Sigma^* \times \Delta^*, (T_1 \oplus T_2)(x, y) = T_1(x, y) \oplus T_2(x, y).
        $$
      - The *product* (or *concatenation*) of two weighted transducers $T_1$ and $T_2$ by
        $$
        \forall (x, y) \in \Sigma^* \times \Delta^*, (T_1 \otimes T_2)(x, y) = \bigoplus_{\substack{x=x_1x_2 \\ y=y_1y_2}} T_1(x_1, y_1) \otimes T_2(x_2, y_2).
        $$
        The sum runs over all possible ways of decomposing $x$ into a prefix $x_1 \in \Sigma^*$ and a suffix $x_2 \in \Sigma^*$ and similarly $y \in \Delta^*$ into a prefix $y_1 \in \Delta^*$ and a suffix $y_2$. The product of $n > 0$ instances of $T$, $T \otimes \dots \otimes T$, is denoted by $T^n$, and by convention $T^0 = \mathcal{E}$, where $\mathcal{E}$ is the transducer defined by
        $$
        \mathcal{E}(x, y) = \begin{cases} \overline{1} & \text{if } (x, y) = (\epsilon, \epsilon); \\ \overline{0} & \text{otherwise}. \end{cases}
        $$
      - The *closure* (or *Kleene-closure*) of a weighted transducer $T$ is defined by
        $$
        \forall (x, y) \in \Sigma^* \times \Delta^*, T^*(x, y) = \bigoplus_{n=0}^{+\infty} T^n(x, y),
        $$
        when $\bigoplus_{n=0}^{+\infty} T^n(x, y)$ is an element of $S$ for all $(x,y) \in \Sigma^* \times \Delta^*$. Note that in the absence of accepting $\epsilon$-paths, that is when $P(I, \epsilon, \epsilon, F) = \emptyset$, $T^n(x, y) = \overline{0}$ for $n > |x| + |y|$, thus $T^*(x, y)$ is defined by a finite sum and is always an element of $S$. In complete semirings, the closure operation is defined for all weighted transducers.

