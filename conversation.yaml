                      _ => {
                          let (rhs_symbols, new_productions_for_rhs) = Self::convert_grammar_expr_to_symbols(
                              expr,
                              current_rule_name_for_naming_children,
                              &mut terminal_name_to_group_id,
                              &mut terminal_expr_to_group_id,
                              &mut next_terminal_group_id,
