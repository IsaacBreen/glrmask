                          disallow_llm_tokens_and_prune_arc(&mut glr_state.active_state.stack, &forbidden_llm_tokens, &mut HashMap::new());
                          // glr_state.log_gss("Done subtracting forbidden LLM tokens.", TerminalID(0));
                      }
