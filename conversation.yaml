      Ok so token boundaries are a problem.
      To come up with a minimal example, think about LLM tokens "a" and "b" and grammar with just regexes:
      - a+. (grammar token 0)
      - a+|b+ (grammar token 1)
      The tokenizer would have two states.
      Now think about stepping with all LLM tokens. We'd end up with an entries in the grammar constraint state for both tokenizer states, and the active LLM token at the initial tokenizer state would be for LLM token "a", while for the other tokenizer state it'd be both LLM tokens "a" and "b".
      Now suppose we commit LLM token "a". We keep both entries in the grammar constraint state, since both have that LLM token active.
      Now step with all LLM tokens...
      Imagine starting the step. For the parser state under the initial tokenizer state in the grammar constraint state, we'd traverse an edge for grammar token 0, and that edge would allow LLM token "a".
      BUT that doesn't make sense. That'd imply we've seen two grammar token 0 in this parse state.
      BUT we've just seen LLM token "a", and we could be about to see "a". Putting these together, the full input could be "aa".
      Via greediness, "aa" can't be grammar-tokenized as two grammar token 0s - it must be a single grammar token 0.
      That's the issue.

      (This example could probably be simplified. Can we remove LLM token "b" and grammar token 1? Yeah.)

      Ok so that said, there's probably a solution.
      We need to give up on being able to step with all LLM tokens.
      Or, rather, we shouldn't step with all LLM tokens and then commit and hope we don't get the above problem.
      We need to do a commit by starting from the constraint state *before* stepping with all LLM tokens, then stepping with *just* the LLM token we're committing, AND we need to be careful in deciding which *next* LLM tokens to allow (given the need to apply greediness).
      It might be best to remove stepping with *all* LLM tokens altogether - while it's elegant, it doesn't have a practical use.
      We'll just have a function to compute the mask (which won't mutate the constraint state), and a function to commit a single LLM token, which will mutate the constraint state, like `step` currently does. The `step` function will kind of be no more. Well... let's keep it but make it private.
      The commit function will now make sure the reinitialized LLM token bitsets take into account the greediness stuff.
      ...

      Now...

      How will this new `commit` function work? It'll basically be what `step` is now, as if stepping with a bitset consisting of just the token we're committing, except that it'll *also* do what `commit` does now and reset the LLM token info, AND it'll exclude from that reset LLM token info any LLM tokens that...
      Actually let's not make `commit` like `step` is now....

      Modify `commit`.
      Let's get the actual bytes for the token we're committing and tokenize them using the tokenizer ourselves.
      First, fully reset the LLM token info for all states.
      Maintain a map from position (in this LLM token) to a map from tokenizer state to a tuple LLM token bitset.
      Maintain a final map from tokenizer state to a tuple LLM token bitset.
      Initialize it at position 0 and the data stored in the constraint state.
      Pop an item off.
      If there's a end state in the result, `possible_matches` with the root vocab node (*not* the vocab node representing the token we're committing now) and the end state for the match. This gives a map from grammar token to LLM token bitset that tell us 'for which *next* LLM tokens will we match this grammar token'. We need to exclude these LLM tokens when processing each match.
      Also, if there's an end state, push to the final map under the end tokenizer state, merging with any existing parser state.
      Loop through the matches.
      Clone the parser.
      Get the LLM token bitset from the map we got from `possible_matches`. Invert it and intersect with the LLM token info for the parser.
      Feed the matched terminal into the parser.
      If the result is ok, compute the offset position. If it is before the end of the LLM token, push to the queue under the offset position and the initial tokenizer state, merging with any existing parser state.
      If the position is at the end, push to a final map (again, merging if necessary).
      That's it!

      ...

      Next, we need to move the `step` logic to `get_mask`.
      It'll be slightly different, though. We're not aiming to take the constraint to a new state. We're just aiming to generate the mask directly.
      So, most of the logic will remain the same, but basically those parts that modify `self.state` will be gone or replaced with something that modifies a LLM token bitset (the mask). The valid LLM tokens of a final state (either clean or unclean) will just be the set in the token info for that state. (Actually, the bitset of the stack head for the parse state).

      ...

      These changes also mean that `LLMTokenInfo` can be reduced to just its `active` field (ie `LLMTokenInfo` can be removed and we can just use `HybridBitset` directly).

      Impelement the changes in full based on my notes. That is, modify `commit`, remove `step`, and modify `get_mask`.
