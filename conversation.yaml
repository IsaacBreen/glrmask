      ### Step-by-step Instructions

      1.  **Modify `determinize_to_dwa` to Simplify its Output:**
          The `determinize_to_dwa` function currently produces a correct but potentially bloated DWA. We'll add a call to `simplify()` on the resulting DWA before returning it. This will help reduce the state space.

          In `src/precompute4/weighted_automata/determinization.rs`, update `NWA::determinize_to_dwa`:

          ```rust
          // src/precompute4/weighted_automata/determinization.rs

          // ... inside impl NWA
          pub fn determinize_to_dwa(&self) -> DWA {
              let now = Instant::now();

