          /// assert_eq!(fst.final_weight(s1)?, Some(ProbabilityWeight::new(1.2)));
          /// let weight = unsafe {fst.take_final_weight_unchecked(s1)};
          /// assert_eq!(weight, Some(ProbabilityWeight::new(1.2)));
          /// assert_eq!(fst.final_weight(s1)?, None);
