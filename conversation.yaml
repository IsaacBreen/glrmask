          EV: Clone + Ord,
          T: Clone + Ord + PartialEq,
          FGet: FnMut(&EK, &EV) -> isize,
          FReplace: FnMut(&EK, &EV, isize) -> (EK, EV),
          FIntersect: FnMut(&EK, &EV, &EK, &EV) -> bool,
          FCanRemove: FnMut(&EK, &EV) -> bool,
