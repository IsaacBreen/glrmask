              );

              let empty_set_from_non_empty = HybridBitset::from_iter(vec![5]);
              let _ = empty_set_from_non_empty.inner.last(); // just to use it
              let mut empty_set_cleared = HybridBitset::from_iter(vec![5]);
              empty_set_cleared.clear();
              assert_eq!(
