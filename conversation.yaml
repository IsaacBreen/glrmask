              if id(self) in _memo:
                  return _memo[id(self)]

              if self._kind == "EMPTY":
                  result = self
              elif self._kind == "GROUP":
                  new_acc = func(cast(Acc, self._acc))
                  if new_acc is self._acc:
                      result = self
                  else:
                      result = self._group(cast(_A[T], self._node), new_acc)
