              // let MIN_COMPRESSION_RATIO = 2.0;
              // if self_compression_ratio < MIN_COMPRESSION_RATIO && self_ranges_len > MAX_RANGES_LEN || rhs_compression_ratio < MIN_COMPRESSION_RATIO && rhs_ranges_len > MAX_RANGES_LEN {
