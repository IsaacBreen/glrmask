              .iter()
              .filter(move |cand| cand.as_usize() != src_idx)
              .map(|w| w.as_arc().clone())
              .filter(|w| w.read(&self.trie0_god).unwrap().value.final_tokenizer_state.is_none())
      );

      And also guard “eligible children” the same way (even though your current filter usually excludes self via live_tokens, make it explicit):

      let eligible_children = children_of_src
          .into_iter()
          .filter(|child_idx| child_idx.as_usize() != src_idx)
          .map(|child_idx| child_idx.as_arc().clone())
          .filter(|child_arc| {
              let g = child_arc.read(&self.trie0_god).unwrap();
              (g.value.live_tokens.clone() & &edge_bv).is_empty() && g.value.final_tokenizer_state.is_none()
          });

      2) Make EdgeInserter refuse self-loops
      Inside EdgeInserter::try_destination add an early return:

      pub fn try_destination(mut self, destination: Trie2Index) -> Self {
          if self.result.is_some() {
              return self;
          }
          if destination == self.source_idx {
