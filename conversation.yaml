                      other_rb.add_range(start, end + 1)
                  return self._rb.issubset(other_rb)

          def isdisjoint(self, other: RangeSet[int]) -> bool:
              """Return True if self has no elements in common with other."""
              if not isinstance(other, RangeSet):
