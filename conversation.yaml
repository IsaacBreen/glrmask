                  assert_eq!(obj.get("optional_field"), Some(&JSONNode::Bool(true)));
                  if let Some(JSONNode::Array(arr)) = obj.get("list_of_numbers") {
                       assert_eq!(arr, &vec![JSONNode::UInt(1), JSONNode::UInt(2), JSONNode::UInt(3)]);
