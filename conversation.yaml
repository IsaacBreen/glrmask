          let parser = generate_glr_parser(&productions, 0);
          let eof = *parser.terminal_map.get_by_left(&Terminal("$".to_string())).unwrap();
          let tokens = vec![
              *parser.terminal_map.get_by_left(&Terminal("id".to_string())).unwrap(),
