              // Check edge info captured by step
              assert_eq!(edge_info_at_step.len(), 2); // 2 edges traversed from root
              assert!(edge_info_at_step.contains(&("edge", "val1")));
              assert!(edge_info_at_step.contains(&("edge", "val2")));
          }


