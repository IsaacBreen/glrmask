                  // Compound Operators
                  ("DOUBLESTAR", Expr::U8Seq(b"**".to_vec())),
                  ("DOUBLESLASH", Expr::U8Seq(b"//".to_vec())),
                  ("LEFTSHIFT", Expr::U8Seq(b"<<".to_vec())),
