      use std::cmp::Ordering;
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::fmt::{Debug, Display};
      use std::hash::{DefaultHasher, Hash, Hasher};
      use std::ops::{Deref, DerefMut};
      use std::sync::{Arc, RwLock, RwLockReadGuard, RwLockWriteGuard};

      use crate::json_serialization::{JSONConvertible, JSONNode};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use deterministic_hash::DeterministicHasher;
      use kdam::{tqdm, BarExt};
      use ordered_hash_map::{OrderedHashMap, OrderedHashSet};
      use profiler_macro::time_it;

      /// Represents a node in a Trie–like structure (allowing shared subtrees and DAGs).
      /// Multiple children can exist for the same edge key. Each edge instance has a value.
      ///
      /// EK: type of the edge key (must be Ord).
      /// EV: type of the edge value.
      /// T: type of the value stored within the node.
      ///
      /// NOTE: This node no longer stores Arc/RwLock pointers to other nodes. Instead,
      /// children reference other nodes by their index (Trie2Index) in an Arena. Any access
      /// to nodes (read/write of value, children traversal, depth recomputation, etc.) now
      /// requires passing a reference to the Arena that owns the nodes.
      #[derive(Debug, Clone)]
      pub struct Trie<EK: Ord, EV, T> {
          pub value: T,
          /// Stores a map from EdgeKey to a map of destination node indices and edge values.
          children: BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>,
          /// The “longest distance” from some source node (as computed by recompute_all_max_depths).
          /// Defaults to usize::MAX and is only updated when the user calls recompute_all_max_depths.
          pub max_depth: usize,
      }

      /// An index into the Arena for a Trie node.
      /// This is the light-weight replacement for Arc<RwLock<Trie<...>>> in external code.
      ///
      /// It provides `read(&arena)` and `write(&arena)` methods that mimic RwLock's API:
      /// both return Option<Guard>. In most code you'll immediately call `.expect(...)` or `.unwrap()`.
      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct Trie2Index {
          index: Index,
      }

      impl Display for Trie2Index {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              write!(f, "Trie2Index({})", self.index.as_usize())
          }
      }

      impl Trie2Index {
          pub(crate) fn as_arc(&self) -> &Self {
              self
          }

          pub fn new(index: Index) -> Self {
              Trie2Index { index }
          }

          pub fn as_usize(self) -> usize {
              self.index.as_usize()
          }

          pub fn as_index(self) -> Index {
              self.index
          }

          /// Read-locks the Arena and returns a guard that derefs to &Trie at this index.
          /// Returns None if the index does not exist.
          pub fn read<'a, EK: Ord, EV, T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
          ) -> Option<Trie2ReadGuard<'a, EK, EV, T>> {
              let guard = arena.inner.read().ok()?;
              if guard.values.get(self.index.as_usize())?.is_none() {
                  return None;
              }
              Some(Trie2ReadGuard {
                  guard,
                  index: self.index.as_usize(),
              })
          }

          /// Write-locks the Arena and returns a guard that derefs to &mut Trie at this index.
          /// Returns None if the index does not exist.
          pub fn write<'a, EK: Ord, EV, T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
          ) -> Option<Trie2WriteGuard<'a, EK, EV, T>> {
              let guard = arena.inner.write().ok()?;
              if guard.values.get(self.index.as_usize())?.is_none() {
                  return None;
              }
              Some(Trie2WriteGuard {
                  guard,
                  index: self.index.as_usize(),
              })
          }

          /// Convenience constructor from usize.
          pub fn from_usize(i: usize) -> Self {
              Trie2Index { index: Index::from(i) }
          }
      }

      impl From<Index> for Trie2Index {
          fn from(i: Index) -> Self {
              Trie2Index { index: i }
          }
      }

      impl From<Trie2Index> for Index {
          fn from(ti: Trie2Index) -> Self {
              ti.index
          }
      }

      impl From<usize> for Trie2Index {
          fn from(u: usize) -> Self {
              Trie2Index { index: Index::from(u) }
          }
      }

      impl From<Trie2Index> for usize {
          fn from(ti: Trie2Index) -> usize {
              ti.index.as_usize()
          }
      }

      /// A read guard that keeps the Arena's internal RwLockReadGuard alive and provides
      /// immutable access to a Trie node at a given index via Deref.
      pub struct Trie2ReadGuard<'a, EK: Ord, EV, T> {
          guard: RwLockReadGuard<'a, ArenaInner<Trie<EK, EV, T>>>,
          index: usize,
      }

      impl<'a, EK: Ord, EV, T> Deref for Trie2ReadGuard<'a, EK, EV, T> {
          type Target = Trie<EK, EV, T>;
          fn deref(&self) -> &Self::Target {
              self.guard.values[self.index]
                  .as_ref()
                  .expect("Trie2ReadGuard: index not found in arena map")
          }
      }

      /// A write guard that keeps the Arena's internal RwLockWriteGuard alive and provides
      /// mutable access to a Trie node at a given index via Deref/DerefMut.
      pub struct Trie2WriteGuard<'a, EK: Ord, EV, T> {
          guard: RwLockWriteGuard<'a, ArenaInner<Trie<EK, EV, T>>>,
          index: usize,
      }

      impl<'a, EK: Ord, EV, T> Deref for Trie2WriteGuard<'a, EK, EV, T> {
          type Target = Trie<EK, EV, T>;
          fn deref(&self) -> &Self::Target {
              self.guard.values[self.index]
                  .as_ref()
                  .expect("Trie2WriteGuard: index not found in arena map")
          }
      }

      impl<'a, EK: Ord, EV, T> DerefMut for Trie2WriteGuard<'a, EK, EV, T> {
          fn deref_mut(&mut self) -> &mut Self::Target {
              self.guard.values[self.index]
                  .as_mut()
                  .expect("Trie2WriteGuard: index not found in arena map")
          }
      }

      impl<EK, EV, T> JSONConvertible for Trie<EK, EV, T>
      where
          EK: Ord + Clone + JSONConvertible + Debug,
          EV: Clone + JSONConvertible,
          T: Clone + JSONConvertible,
      {
          /// Note: With the index-based design, we only serialize this node's local data:
          /// - value
          /// - max_depth
          /// - children: encoded as [EK_json, [[child_index, EV_json], ...]]
          ///
          /// We do NOT expand into a "nodes" array (no BFS). This format is concise and avoids
          /// requiring access to the Arena during serialization.
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("value".to_string(), self.value.to_json());
              obj.insert("max_depth".to_string(), self.max_depth.to_json());

              let children_json: Vec<JSONNode> = self.children.iter().map(|(ek, dest_map)| {
                  let ek_json = ek.to_json();
                  let dests_json: Vec<JSONNode> = dest_map.iter().map(|(idx, ev)| {
                      JSONNode::Array(vec![
                          (idx.as_usize()).to_json(),
                          ev.to_json(),
                      ])
                  }).collect();
                  JSONNode::Array(vec![ek_json, JSONNode::Array(dests_json)])
              }).collect();

              obj.insert("children".to_string(), JSONNode::Array(children_json));

              JSONNode::Object(obj)
          }

          /// Parses the local-node JSON format produced by to_json above.
          /// This reconstructs a Trie node that references children by indices only.
          /// The Arena is not created/returned here; the caller is expected to manage
          /// nodes in an Arena externally.
          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;

              let value = T::from_json(obj.remove("value").ok_or("Missing 'value' field")?)?;
              let max_depth = usize::from_json(obj.remove("max_depth").ok_or("Missing 'max_depth' field")?)?;

              let children_node = obj.remove("children").ok_or("Missing 'children' field")?;
              let children_arr = match children_node {
                  JSONNode::Array(arr) => arr,
                  _ => return Err("'children' field must be an array".to_string()),
              };

              let mut children = BTreeMap::new();
              for child_entry_node in children_arr {
                  let mut child_entry_arr = match child_entry_node {
                      JSONNode::Array(arr) if arr.len() == 2 => arr,
                      _ => return Err("Child entry must be a 2-element array [ek, dests]".to_string()),
                  };
                  let dests_node = child_entry_arr.pop().unwrap();
                  let ek_node = child_entry_arr.pop().unwrap();

                  let ek = EK::from_json(ek_node)?;

                  let dests_arr = match dests_node {
                      JSONNode::Array(arr) => arr,
                      _ => return Err("Destinations list must be an array".to_string()),
                  };

                  let mut dest_map = OrderedHashMap::new();
                  for dest_pair_node in dests_arr {
                      let mut dest_pair_arr = match dest_pair_node {
                          JSONNode::Array(arr) if arr.len() == 2 => arr,
                          _ => return Err("Destination pair must be a 2-element array [idx, ev]".to_string()),
                      };
                      let ev_node = dest_pair_arr.pop().unwrap();
                      let idx_node = dest_pair_arr.pop().unwrap();

                      let idx_usize = usize::from_json(idx_node)?;
                      let idx = Trie2Index::from_usize(idx_usize);
                      let ev = EV::from_json(ev_node)?;

                      dest_map.insert(idx, ev);
                  }
                  children.insert(ek, dest_map);
              }

              Ok(Trie {
                  value,
                  children,
                  max_depth,
              })
          }
      }

      impl JSONConvertible for Trie2Index {
          fn to_json(&self) -> JSONNode {
              self.as_usize().to_json()
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let u = usize::from_json(node)?;
              Ok(Trie2Index::from_usize(u))
          }
      }

      // Implementation block for core Trie functionality
      // Added Clone bound for EK needed in insertion and others
      impl<EK: Ord + Clone, EV, T> Trie<EK, EV, T> {
          /// Creates a new trie node with the given value and no children.
          /// The max_depth is initialized to usize::MAX and will be updated later
          /// when recompute_all_max_depths is called.
          pub fn new(value: T) -> Self {
              Trie {
                  value,
                  children: BTreeMap::new(),
                  max_depth: usize::MAX,
              }
          }

          /// Create a new destination node in the arena and insert an edge to it.
          /// Returns the index of the newly created node.
          pub fn force_insert_to_new_node(
              &mut self,
              arena: &Arena<Trie<EK, EV, T>>,
              edge_key: EK,
              edge_value: EV,
              value: T,
          ) -> Trie2Index {
              let new_index = Trie2Index::new(arena.insert(Trie::new(value)));
              self.children
                  .entry(edge_key)
                  .or_default()
                  .insert(new_index, edge_value);
              new_index
          }

          /// Insert an edge to an existing destination node index.
          pub fn force_insert_to_node(&mut self, edge_key: EK, edge_value: EV, dst: Trie2Index) {
              self.children.entry(edge_key).or_default().insert(dst, edge_value);
          }

          pub fn already_has_dst(&self, edge_key: EK, dst: Trie2Index) -> bool {
              self.children
                  .get(&edge_key)
                  .map_or(false, |dest_map| dest_map.contains_key(&dst))
          }

          pub fn already_has_dst_for_any_key(&self, dst: Trie2Index) -> bool {
              self.children.values().any(|dest_map| dest_map.contains_key(&dst))
          }

          pub fn get_edge_value(&self, edge_key: EK, dst: Trie2Index) -> Option<&EV> {
              self.children.get(&edge_key).and_then(|dest_map| dest_map.get(&dst))
          }

          pub fn get_edge_value_mut(&mut self, edge_key: EK, dst: &Trie2Index) -> Option<&mut EV> {
              self.children.get_mut(&edge_key).and_then(|dest_map| dest_map.get_mut(&dst))
          }

          /// Inserts an edge (no cycle checks).
          /// Depths can be recomputed later by calling `recompute_all_max_depths`.
          #[time_it]
          pub fn try_insert(
              &mut self,
              edge_key: EK,
              edge_value: &mut Option<EV>,
              child: Trie2Index,
          ) {
              self.try_insert_unchecked(edge_key, edge_value, child)
          }

          /// Inserts an edge without any checks or automatic depth updates.
          #[time_it]
          pub fn try_insert_unchecked(
              &mut self,
              edge_key: EK,
              edge_value: &mut Option<EV>,
              child: Trie2Index,
          ) {
              self.children
                  .entry(edge_key)
                  .or_default()
                  .insert(child, edge_value.take().expect("edge_value must be Some when inserting"));
          }

          pub fn get(
              &self,
              edge_key: &EK,
          ) -> Option<&OrderedHashMap<Trie2Index, EV>>
          {
              self.children.get(edge_key)
          }

          pub fn get_mut(
              &mut self,
              edge_key: &EK,
          ) -> Option<&mut OrderedHashMap<Trie2Index, EV>>
          {
              self.children.get_mut(edge_key)
          }

          pub fn children(&self) -> &BTreeMap<EK, OrderedHashMap<Trie2Index, EV>> {
              &self.children
          }

          pub fn children_mut(&mut self) -> &mut BTreeMap<EK, OrderedHashMap<Trie2Index, EV>> {
              &mut self.children
          }

          pub fn is_leaf(&self) -> bool {
              self.children.is_empty()
          }

          /// Collects all unique nodes (by index) reachable from the given roots (BFS).
          pub fn all_nodes(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: &[Trie2Index],
          ) -> Vec<Trie2Index> {
              let mut visited: HashSet<usize> = HashSet::new();
              let mut result = Vec::new();
              let mut queue = VecDeque::new();

              for &root in roots {
                  if visited.insert(root.as_usize()) {
                      queue.push_back(root);
                  }
              }

              while let Some(node_idx) = queue.pop_front() {
                  result.push(node_idx);

                  if let Some(guard) = node_idx.read(arena) {
                      for children_map in guard.children.values() {
                          for (child_idx, _) in children_map.iter() {
                              let c_u = child_idx.as_usize();
                              if visited.insert(c_u) {
                                  queue.push_back(*child_idx);
                              }
                          }
                      }
                  } else {
                      panic!("Trie::all_nodes: node index {} not found in arena", node_idx.as_usize());
                  }
              }
              result
          }

          /// Performs garbage collection on the arena, keeping only nodes reachable from `roots`.
          pub fn gc(arena: &Arena<Self>, roots: &[Trie2Index]) {
              let live_nodes_vec = Self::all_nodes(arena, roots);
              let live_nodes_set: HashSet<usize> = live_nodes_vec.into_iter().map(|idx| idx.as_usize()).collect();
              let mut inner_guard = arena.inner.write().expect("Arena write lock poisoned during GC");
              for i in 0..inner_guard.values.len() {
                  if !live_nodes_set.contains(&i) {
                      inner_guard.values[i] = None;
                  }
              }
          }

          /// Recomputes `max_depth` for all nodes reachable from the given roots.
          /// Call this once after you finish building the trie graph. Before calling,
          /// nodes may have max_depth == usize::MAX which is suboptimal for scheduling
          /// but not incorrect for traversal.
          ///
          /// Uses a topological order (Kahn's algorithm). Assumes the graph is acyclic.
          pub fn recompute_all_max_depths(
              arena: &Arena<Trie<EK, EV, T>>,
              roots: &[Trie2Index],
          ) {
              let all_nodes = Self::all_nodes(arena, roots);
              if all_nodes.is_empty() {
                  return;
              }

              let mut in_degree: HashMap<usize, usize> = HashMap::new();
              let mut adj: HashMap<usize, Vec<usize>> = HashMap::new();

              for node_idx in &all_nodes {
                  let u = node_idx.as_usize();
                  in_degree.entry(u).or_insert(0);
                  adj.entry(u).or_default();

                  let guard = node_idx
                      .read(arena)
                      .expect("Arena read failed during recompute_all_max_depths");
                  for child_idx in guard
                      .children
                      .values()
                      .flat_map(|m| m.keys().cloned())
                  {
                      let v = child_idx.as_usize();
                      adj.entry(u).or_default().push(v);
                      *in_degree.entry(v).or_default() += 1;
                  }
              }

              // Initialize depths to 0 for all nodes; sources will be processed first.
              let mut queue = VecDeque::new();
              for node_idx in &all_nodes {
                  let u = node_idx.as_usize();
                  if in_degree.get(&u).cloned().unwrap_or(0) == 0 {
                      queue.push_back(u);
                  }
                  let mut w = node_idx
                      .write(arena)
                      .expect("Arena write failed when initializing depths");
                  w.max_depth = 0;
              }

              while let Some(u) = queue.pop_front() {
                  let u_depth = {
                      let g = Trie2Index::from(u).read(arena).expect("read");
                      g.max_depth
                  };

                  if let Some(children) = adj.get(&u) {
                      for &v in children {
                          {
                              let mut vg = Trie2Index::from(v).write(arena).expect("write");
                              vg.max_depth = vg.max_depth.max(u_depth + 1);
                          }

                          let deg = in_degree.get_mut(&v).unwrap();
                          *deg -= 1;
                          if *deg == 0 {
                              queue.push_back(v);
                          }
                      }
                  }
              }
          }

          /// Recomputes the max_depth of this node based on its children's depths.
          /// Returns true if the depth changed.
          /// This does NOT propagate changes.
          pub fn recompute_max_depth(&mut self, arena: &Arena<Trie<EK, EV, T>>) -> bool {
              let new_max_depth = self
                  .children
                  .values()
                  .flat_map(|dest_map| dest_map.keys().cloned())
                  .map(|child_idx| {
                      let g = child_idx.read(arena).expect("Arena read failed in recompute_max_depth");
                      g.max_depth + 1
                  })
                  .max()
                  .unwrap_or(0);

              if new_max_depth != self.max_depth {
                  self.max_depth = new_max_depth;
                  true
              } else {
                  false
              }
          }
      }

      // Add this impl block for the recursive comparison helper (index-based)
      impl<EK, EV, T> Trie<EK, EV, T>
      where
          EK: Ord + Clone,
          EV: PartialEq + Clone,
          T: PartialEq,
      {
          pub fn are_graphs_equal(
              arena_a: &Arena<Trie<EK, EV, T>>,
              a_idx: Trie2Index,
              arena_b: &Arena<Trie<EK, EV, T>>,
              b_idx: Trie2Index,
          ) -> bool {
              let mut cache = HashMap::new();
              Self::compare_indexes_recursive(arena_a, a_idx, arena_b, b_idx, &mut cache)
          }

          /// Recursively compares two Trie nodes referenced by indices for equality across an Arena.
          ///
          /// - `a_idx`, `b_idx`: The indices pointing to the Trie nodes to compare.
          /// - `comparison_cache`: Tracks pairs of (a_usize, b_usize) and their comparison result (bool).
          fn compare_indexes_recursive(
              arena_a: &Arena<Trie<EK, EV, T>>,
              a_idx: Trie2Index,
              arena_b: &Arena<Trie<EK, EV, T>>,
              b_idx: Trie2Index,
              comparison_cache: &mut HashMap<(usize, usize), bool>,
          ) -> bool {
              let a_u = a_idx.as_usize();
              let b_u = b_idx.as_usize();

              if Arc::ptr_eq(&arena_a.inner, &arena_b.inner) && a_u == b_u {
                  return true;
              }

              let (k1, k2) = if a_u < b_u { (a_u, b_u) } else { (b_u, a_u) };

              if let Some(&cached) = comparison_cache.get(&(k1, k2)) {
                  return cached;
              }

              // Optimistically assume true; update to false on mismatch.
              comparison_cache.insert((k1, k2), true);

              let a_guard = match a_idx.read(arena_a) {
                  Some(g) => g,
                  None => {
                      comparison_cache.insert((k1, k2), false);
                      return false;
                  }
              };
              let b_guard = match b_idx.read(arena_b) {
                  Some(g) => g,
                  None => {
                      comparison_cache.insert((k1, k2), false);
                      return false;
                  }
              };

              // 1. Compare non-recursive fields: value and max_depth.
              if a_guard.value != b_guard.value || a_guard.max_depth != b_guard.max_depth {
                  comparison_cache.insert((k1, k2), false);
                  return false;
              }

              // 2. Compare children structure (number of distinct edge keys).
              if a_guard.children.len() != b_guard.children.len() {
                  comparison_cache.insert((k1, k2), false);
                  return false;
              }

              // 3. Compare children for each edge key.
              for (a_ek, a_dest_map) in &a_guard.children {
                  match b_guard.children.get(a_ek) {
                      None => {
                          comparison_cache.insert((k1, k2), false);
                          return false;
                      }
                      Some(b_dest_map) => {
                          if a_dest_map.len() != b_dest_map.len() {
                              comparison_cache.insert((k1, k2), false);
                              return false;
                          }

                          let a_child_pairs: Vec<(Trie2Index, EV)> = a_dest_map
                              .iter()
                              .map(|(idx, ev)| (*idx, ev.clone()))
                              .collect();

                          let mut b_child_pairs: Vec<(Trie2Index, EV)> = b_dest_map
                              .iter()
                              .map(|(idx, ev)| (*idx, ev.clone()))
                              .collect();

                          'outer: for (a_child, a_ev) in &a_child_pairs {
                              let mut found = false;
                              for i in 0..b_child_pairs.len() {
                                  if &b_child_pairs[i].1 == a_ev {
                                      let b_child = b_child_pairs[i].0;
                                      if Trie::compare_indexes_recursive(arena_a, *a_child, arena_b, b_child, comparison_cache) {
                                          b_child_pairs.remove(i);
                                          found = true;
                                          break;
                                      }
                                  }
                              }
                              if !found {
                                  comparison_cache.insert((k1, k2), false);
                                  return false;
                              }
                          }
                      }
                  }
              }

              true
          }
      }

      // Implementation block for special_map and related functionality
      // Requires T: Clone, EK: Ord + Clone, EV: Clone
      impl<T: Clone, EK: Ord + Clone, EV: Clone> Trie<EK, EV, T> {
          fn count_all_edges(
              arena: &Arena<Trie<EK, EV, T>>,
              root_nodes: &[Trie2Index],
          ) -> usize {
              let mut visited: HashSet<usize> = HashSet::new();
              let mut queue: VecDeque<Trie2Index> = VecDeque::new();
              let mut total_edges = 0;

              for &root in root_nodes {
                  if visited.insert(root.as_usize()) {
                      queue.push_back(root);
                  }
              }

              while let Some(node_idx) = queue.pop_front() {
                  let guard = node_idx.read(arena).expect("RwLock poisoned during edge count");
                  for children_map in guard.children.values() {
                      for (child_idx, _) in children_map.iter() {
                          total_edges += 1;
                          let c_u = child_idx.as_usize();
                          if visited.insert(c_u) {
                              queue.push_back(*child_idx);
                          }
                      }
                  }
              }
              total_edges
          }

          /// Performs a specialized breadth-first traversal for propagation/scheduling.
          ///
          /// Traverses all edges and allows callers to:
          /// - process a node (process)
          /// - compute new values for children based on an edge (step)
          /// - merge multiple incoming values for the same child (merge)
          ///
          /// Scheduling uses node.max_depth; if not recomputed yet it may be usize::MAX,
          /// which is suboptimal but not incorrect.
          #[time_it]
          pub fn special_map<V: Clone>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: impl FnMut(&V, &EK, &EV, &Trie<EK, EV, T>) -> Option<V>,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          ) {
              // ------------------------------------------------------------------
              //  Simple depth-driven scheduler.
              // ------------------------------------------------------------------
              let mut values: HashMap<usize, V> = HashMap::new();
              let mut stopped_nodes: HashSet<usize> = HashSet::new();
              let mut todo: BTreeMap<usize, OrderedHashSet<Trie2Index>> = BTreeMap::new();

              let initial_nodes: Vec<_> = initial_nodes_and_values.iter().map(|(n, _)| *n).collect();
              let total_edges = Self::count_all_edges(arena, &initial_nodes);
              if PROGRESS_BAR_ENABLED {
                  println!("Progress bar enabled");
              } else {
                  println!("Progress bar disabled")
              }
              let mut pb = tqdm!(total = total_edges, desc = "Traversing edges", disable = !PROGRESS_BAR_ENABLED, leave=false);

              // Seed with the user-supplied starting set
              for (node_idx, v0) in initial_nodes_and_values {
                  let ptr = node_idx.as_usize();
                  values
                      .entry(ptr)
                      .and_modify(|old| merge(old, v0.clone()))
                      .or_insert(v0);
                  let depth = node_idx.read(arena).expect("poison").max_depth;
                  todo.entry(depth).or_default().insert(node_idx);
              }

              // Main loop ---------------------------------------------------------
              while let Some((_depth, node_indices)) = todo.pop_first() {
                  for node_idx in &node_indices {
                      let ptr = node_idx.as_usize();
                      if stopped_nodes.contains(&ptr) {
                          continue;
                      }

                      let mut agg_v = match values.remove(&ptr) {
                          Some(v) => v,
                          None => continue,
                      };

                      // ---------- user ‘process’ callback ----------
                      let proceed = {
                          let guard = node_idx.read(arena).expect("poison");
                          process(&guard, &mut agg_v)
                      };

                      if !proceed {
                          stopped_nodes.insert(ptr);
                          continue;
                      }

                      // ---------- propagate to children -------------
                      let edges: Vec<(EK, EV, Trie2Index)> = {
                          let guard = node_idx.read(arena).expect("poison");
                          guard
                              .children
                              .iter()
                              .flat_map(|(ek, dst_map)| {
                                  let ekc = ek.clone();
                                  dst_map
                                      .iter()
                                      .map(move |(child_idx, ev)| (ekc.clone(), ev.clone(), *child_idx))
                              })
                              .collect()
                      };

                      for (ek, ev, child_idx) in edges {
                          let _ = pb.update(1);
                          let child_ptr = child_idx.as_usize();

                          if stopped_nodes.contains(&child_ptr) {
                              continue;
                          }

                          let maybe_v = {
                              let child_guard = child_idx.read(arena).expect("poison");
                              step(&agg_v, &ek, &ev, &child_guard)
                          };
                          if let Some(new_v) = maybe_v {
                              values
                                  .entry(child_ptr)
                                  .and_modify(|old| merge(old, new_v.clone()))
                                  .or_insert(new_v);

                              let child_depth = child_idx.read(arena).expect("poison").max_depth;
                              todo.entry(child_depth).or_default().insert(child_idx);
                          }
                      }
                  }
              }
          }

          /// Performs a specialized breadth-first traversal, grouping children by edge key.
          /// This is more efficient than `special_map` when many edges share the same key,
          /// as the `step` function is called once per key, not once per edge.
          ///
          /// Scheduling uses node.max_depth; if not recomputed yet it may be usize::MAX,
          /// which is suboptimal but not incorrect.
          #[time_it]
          pub fn special_map_grouped<V, S, I>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: S,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          )
          where
              V: Clone,
              S: FnMut(
                  &V, &EK, &OrderedHashMap<Trie2Index, EV>
              ) -> I,
              I: IntoIterator<Item = (Trie2Index, V)>,
          {
              // ------------------------------------------------------------------
              //  Simple depth-driven scheduler. (Same as special_map)
              // ------------------------------------------------------------------
              let mut values: HashMap<usize, V> = HashMap::new();
              let mut stopped_nodes: HashSet<usize> = HashSet::new();
              let mut todo: BTreeMap<usize, OrderedHashSet<Trie2Index>> = BTreeMap::new();

              let initial_nodes: Vec<_> = initial_nodes_and_values.iter().map(|(n, _)| *n).collect();
              let total_edges = Self::count_all_edges(arena, &initial_nodes);
              let mut pb = tqdm!(total = total_edges, desc = "Traversing edges", disable = !PROGRESS_BAR_ENABLED, leave=false);

              // Seed with the user-supplied starting set
              for (node_idx, v0) in initial_nodes_and_values {
                  let ptr = node_idx.as_usize();
                  values
                      .entry(ptr)
                      .and_modify(|old| merge(old, v0.clone()))
                      .or_insert(v0);
                  let depth = node_idx.read(arena).expect("poison").max_depth;
                  todo.entry(depth).or_default().insert(node_idx);
              }

              // Main loop ---------------------------------------------------------
              while let Some((_depth, node_indices)) = todo.pop_first() {
                  for node_idx in &node_indices {
                      let ptr = node_idx.as_usize();
                      if stopped_nodes.contains(&ptr) { continue; }

                      let mut agg_v = match values.remove(&ptr) {
                          Some(v) => v,
                          None => continue,
                      };

                      let proceed = {
                          let guard = node_idx.read(arena).expect("poison");
                          process(&guard, &mut agg_v)
                      };

                      if !proceed {
                          stopped_nodes.insert(ptr);
                          continue;
                      }

                      // ---------- propagate to children (grouped by edge key) -------------
                      let children_by_ek: Vec<(EK, OrderedHashMap<Trie2Index, EV>)> = {
                          let guard = node_idx.read(arena).expect("poison");
                          guard.children.iter()
                              .map(|(ek, dst_map)| (ek.clone(), dst_map.clone()))
                              .collect()
                      };

                      for (ek, dest_map) in children_by_ek {
                          let valid_edges_count = dest_map.len();
                          if valid_edges_count > 0 {
                              let _ = pb.update(valid_edges_count);
                          }

                          let new_values_for_children = step(&agg_v, &ek, &dest_map);

                          for (child_idx, new_v) in new_values_for_children {
                              let child_ptr = child_idx.as_usize();

                              if stopped_nodes.contains(&child_ptr) {
                                  continue;
                              }

                              values.entry(child_ptr)
                                  .and_modify(|old| merge(old, new_v.clone()))
                                  .or_insert(new_v);

                              let child_depth = child_idx.read(arena).expect("poison").max_depth;
                              todo.entry(child_depth).or_default().insert(child_idx);
                          }
                      }
                  }
              }
          }
      }

      // Implement PartialEq for Trie (shallow: compares value, max_depth, and immediate children lists)
      impl<EK, EV, T> PartialEq for Trie<EK, EV, T>
      where
          EK: Ord + PartialEq,
          EV: PartialEq,
          T: PartialEq,
      {
          fn eq(&self, other: &Self) -> bool {
              if self.value != other.value || self.max_depth != other.max_depth {
                  return false;
              }
              if self.children.len() != other.children.len() {
                  return false;
              }
              for (ek, self_map) in &self.children {
                  match other.children.get(ek) {
                      None => return false,
                      Some(other_map) => {
                          if self_map.len() != other_map.len() {
                              return false;
                          }
                          // OrderedHashMap preserves insertion order; but we only need equality as sets of (idx, ev)
                          for (idx, ev) in self_map {
                              match other_map.get(idx) {
                                  Some(o_ev) if o_ev == ev => {}
                                  _ => return false,
                              }
                          }
                      }
                  }
              }
              true
          }
      }

      // Implement Eq for Trie
      impl<EK, EV, T> Eq for Trie<EK, EV, T>
      where
          EK: Ord + Eq,
          EV: Eq + Clone,
          T: Eq,
      {
      }

      // Implement PartialOrd for Trie
      impl<EK, EV, T> PartialOrd for Trie<EK, EV, T>
      where
          EK: Ord,
          EV: Ord + Clone,
          T: Ord,
      {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              Some(self.cmp(other))
          }
      }

      // Implement Ord for Trie
      impl<EK, EV, T> Ord for Trie<EK, EV, T>
      where
          EK: Ord,
          EV: Ord + Clone,
          T: Ord,
      {
          fn cmp(&self, other: &Self) -> Ordering {
              self.value.cmp(&other.value)
                  .then_with(|| self.max_depth.cmp(&other.max_depth))
                  .then_with(|| self.children.len().cmp(&other.children.len()))
                  .then_with(|| {
                      for ((sk, sv), (ok, ov)) in self.children.iter().zip(other.children.iter()) {
                          match sk.cmp(ok) {
                              Ordering::Equal => (),
                              non_eq => return non_eq,
                          }
                          match sv.len().cmp(&ov.len()) {
                              Ordering::Equal => (),
                              non_eq => return non_eq,
                          }
                          for ((s_idx, s_ev), (o_idx, o_ev)) in sv.iter().zip(ov.iter()) {
                              match s_idx.cmp(o_idx) {
                                  Ordering::Equal => (),
                                  non_eq => return non_eq,
                              }
                              match s_ev.cmp(o_ev) {
                                  Ordering::Equal => (),
                                  non_eq => return non_eq,
                              }
                          }
                      }
                      Ordering::Equal
                  })
          }
      }

      // Implement Hash for Trie (shallow: value, max_depth, and immediate children lists)
      impl<EK, EV, T> Hash for Trie<EK, EV, T>
      where
          EK: Ord + Hash,
          EV: PartialEq + Clone + Hash,
          T: PartialEq + Hash,
      {
          fn hash<H: Hasher>(&self, state: &mut H) {
              self.value.hash(state);
              self.max_depth.hash(state);

              self.children.len().hash(state);
              for (ek, dest_map) in &self.children {
                  ek.hash(state);
                  dest_map.len().hash(state);

                  // To be order-independent with respect to child order, hash pairs and then sort.
                  let mut pair_hashes = Vec::with_capacity(dest_map.len());
                  for (child_idx, ev) in dest_map {
                      let mut pair_hasher = DeterministicHasher::new(DefaultHasher::new());
                      child_idx.as_usize().hash(&mut pair_hasher);
                      ev.hash(&mut pair_hasher);
                      pair_hashes.push(pair_hasher.finish());
                  }
                  pair_hashes.sort_unstable();
                  for h in pair_hashes {
                      h.hash(state);
                  }
              }
          }
      }

      /// A helper struct to facilitate inserting an edge into a Trie,
      /// trying multiple potential destinations and optionally creating a new node.
      /// Provides a chainable interface.
      ///
      /// This index-based version stores a reference to the Arena and a source Trie2Index.
      pub struct EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
      where
          EK: Ord + Clone,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          arena: &'a Arena<Trie<EK, EV, T>>,
          source_idx: Trie2Index,                      // The source node for the edge
          edge_key: EK,                                // The key for the edge to be inserted
          edge_value: Option<EV>,                      // The value for the edge to be inserted
          merge_edge_value: FMergeEV,                  // The function to merge edge values
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
          result: Option<Trie2Index>,                  // Stores the successful destination node
      }

      impl<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
          EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          /// Creates a new `EdgeInserter`.
          ///
          /// # Arguments
          ///
          /// * `arena`: The arena holding Trie nodes.
          /// * `source_idx`: The source node where the edge originates.
          /// * `edge_key`: The key for the new edge.
          /// * `edge_value`: The value for the new edge.
          /// * `merge_edge_value`: A closure that merges the existing edge value with the new edge value.
          pub fn new(
              arena: &'a Arena<Trie<EK, EV, T>>,
              source_idx: Trie2Index,
              edge_key: EK,
              edge_value: EV,
              merge_edge_value: FMergeEV,
              update_node_value: FUpdateT,
              mut merge_edge_value_and_source_node_value: FMergeEV_T,
          ) -> Self {
              // Avoid unused-parameter warnings
              let mut edge_value = edge_value;
              {
                  let source_guard = source_idx
                      .read(arena)
                      .expect("Arena read poisoned while reading source node value for edge value merge");
                  merge_edge_value_and_source_node_value(&mut edge_value, &source_guard.value);
              }

              EdgeInserter {
                  arena,
                  source_idx,
                  edge_key,
                  edge_value: Some(edge_value),
                  merge_edge_value,
                  update_node_value,
                  merge_edge_value_and_source_node_value,
                  result: None,
              }
          }

          /// Tries to establish an edge to the given `destination` index.
          ///
          /// If an edge with the same `edge_key` already exists pointing to `destination`,
          /// it merges the `edge_value` using the `merge_edge_value` closure.
          /// If no such edge exists, it inserts a new edge.
          ///
          /// Returns `self` to allow chaining.
          #[time_it]
          pub fn try_destination(mut self, destination: Trie2Index) -> Self {
              if self.result.is_some() {
                  return self; // Already found a destination
              }

              let mut update_info: Option<(Trie2Index, EV)> = None;

              { // Scope for source_guard
                  let mut source_guard = self.source_idx
                      .write(self.arena)
                      .expect("Arena write poisoned while locking source in try_destination");

                  if let Some(existing_ev_mut) = source_guard
                      .children
                      .get_mut(&self.edge_key)
                      .and_then(|dest_map| dest_map.get_mut(&destination))
                  {
                      let new_ev = self.edge_value.take().unwrap();
                      crate::debug!(7, "Merging edge value {:?} into existing edge value {:?} for edge {:?} to node {}", new_ev, existing_ev_mut, self.edge_key, destination.as_usize());
                      (self.merge_edge_value)(existing_ev_mut, new_ev);
                      let updated_ev = existing_ev_mut.clone();
                      self.result = Some(destination);
                      update_info = Some((destination, updated_ev));
                  } else {
                      let edge_val_clone = self.edge_value.as_ref().unwrap().clone();
                      crate::debug!(7, "Inserting edge {:?} with value {:?} to node {}", self.edge_key, edge_val_clone, destination.as_usize());
                      source_guard.try_insert(self.edge_key.clone(), &mut self.edge_value, destination);
                      self.result = Some(destination);
                      update_info = Some((destination, edge_val_clone));
                  }
              }

              if let Some((dest_idx, ev)) = update_info {
                  crate::debug!(7, "Updating node value for destination {} with edge value {:?}. self.edge_value: {:?}", dest_idx.as_usize(), ev, self.edge_value);
                  let mut dest_w = dest_idx.write(self.arena).expect("Arena write");
                  (self.update_node_value)(&mut dest_w.value, &ev);
              }

              self
          }

          /// Tries to establish an edge to any destination in the provided slice.
          /// Iterates through `destinations` and calls `try_destination` for each until one succeeds.
          /// Returns `self` to allow chaining.
          #[time_it]
          pub fn try_destinations(mut self, destinations: &[Trie2Index]) -> Self {
              for &destination in destinations {
                  if self.result.is_some() {
                      break; // Stop trying once a destination is found
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          #[time_it]
          pub fn try_destinations_iter(mut self, destinations: impl Iterator<Item = Trie2Index>) -> Self {
              for destination in destinations {
                  if self.result.is_some() {
                      break; // Stop trying once a destination is found
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          #[time_it]
          pub fn try_destinations_iter_with<F, R>(mut self, destinations: F) -> Self
          where
              F: Fn() -> R,
              R: Iterator<Item = Trie2Index>,
          {
              for destination in destinations() {
                  if self.result.is_some() {
                      break;
                  }
                  self = self.try_destination(destination);
              }
              self
          }

          /// Merges the edge with existing children under `self.edge_key` (if any).
          /// Returns `self` to allow chaining.
          pub fn try_children(mut self) -> Self {
              if self.result.is_some() {
                  return self;
              }

              let children_for_this_key: Vec<Trie2Index> = {
                  let source_guard = self.source_idx
                      .read(self.arena)
                      .expect("Arena read poisoned while locking source in try_children");
                  if let Some(dest_map) = source_guard.children.get(&self.edge_key) {
                      dest_map.keys().cloned().collect()
                  } else {
                      Vec::new()
                  }
              };

              if !children_for_this_key.is_empty() {
                  self = self.try_destinations(&children_for_this_key);
              }
              self
          }

          /// If no destination has been found yet, creates a new node with the given `value`,
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Returns `self` to allow chaining.
          pub fn else_create_destination_with_value(mut self, value: T) -> Self {
              if self.result.is_some() {
                  return self;
              }

              let new_node_idx = Trie2Index::new(self.arena.insert(Trie::new(value)));
              let edge_val_clone = self.edge_value.as_ref().unwrap().clone();

              { // Scope for source_guard
                  let mut source_guard = self.source_idx
                      .write(self.arena)
                      .expect("Arena write poisoned while locking source in else_create_with_value");
                  source_guard.try_insert(self.edge_key.clone(), &mut self.edge_value, new_node_idx);
                  self.result = Some(new_node_idx);
              }

              if let Some(dest_idx) = self.result {
                  let mut dest_w = dest_idx.write(self.arena).expect("Arena write");
                  (self.update_node_value)(&mut dest_w.value, &edge_val_clone);
              }

              self
          }

          /// If no destination has been found yet, creates a new node by calling `value_fn`,
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Returns `self` to allow chaining.
          pub fn else_create_destination_with(self, value_fn: impl FnOnce() -> T) -> Self {
              if self.result.is_some() {
                  return self;
              }
              self.else_create_destination_with_value(value_fn())
          }

          /// If no destination has been found yet, creates a new node with the default value (`T::default()`),
          /// inserts an edge to it from the source, and sets it as the result.
          ///
          /// Requires `T: Default`.
          /// Returns `self` to allow chaining.
          pub fn else_create_destination(self) -> Self
          where
              T: Default,
          {
              if self.result.is_some() {
                  return self;
              }
              self.else_create_destination_with_value(T::default())
          }

          /// Returns the resulting destination node index, if one was found or created.
          pub fn into_option(self) -> Option<Trie2Index> {
              self.result
          }

          pub fn is_some(&self) -> bool {
              self.result.is_some()
          }

          pub fn clone_into_option(&self) -> Option<Trie2Index> {
              self.result
          }

          /// Returns the resulting destination node index, panicking if none was found or created.
          pub fn unwrap(self) -> Trie2Index {
              self.result.expect("EdgeInserter::unwrap() called but no destination was found or created")
          }

          /// Returns the resulting destination node index, panicking with the given message if none was found or created.
          pub fn expect(self, msg: &str) -> Trie2Index {
              self.result.expect(msg)
          }
      }

      // Optional: Add a convenience method to Trie2Index to create an EdgeInserter easily.
      impl Trie2Index {
          /// Creates an `EdgeInserter` to help add an edge starting from this node index.
          ///
          /// # Example (after migration)
          ///
          /// ```ignore
          /// let root_idx: Trie2Index = ...;
          /// let arena: Arena<Trie<String, i32, NodeValue>> = ...;
          /// let god = /* obtain GodWrapper */ unimplemented!();
          /// let new_or_existing_node_idx = root_idx
          ///     .insert_edge(
          ///         &arena, &god, "key".to_string(), 1,
          ///         |ev_old, ev_new| *ev_old += ev_new,        // merge edge value
          ///         |_node_value, _ev| {},                     // update node value from edge value
          ///         |_edge_value, _source_node_value| {},      // merge edge value with source node value
          ///     )
          ///     .try_children()
          ///     .else_create_destination()
          ///     .unwrap();
          /// ```
          pub fn insert_edge<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
              self,
              arena: &'a Arena<Trie<EK, EV, T>>,
              edge_key: EK,
              edge_value: EV,
              merge_edge_value: FMergeEV,
              update_node_value: FUpdateT,
              merge_edge_value_and_source_node_value: FMergeEV_T,
          ) -> EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
          where
              EK: Ord + Clone + Debug,
              EV: Clone + Debug,
              T: Clone,
              FMergeEV: FnMut(&mut EV, EV),
              FUpdateT: FnMut(&mut T, &EV),
              FMergeEV_T: FnMut(&mut EV, &T),
          {
              EdgeInserter::new(
                  arena,
                  self,
                  edge_key,
                  edge_value,
                  merge_edge_value,
                  update_node_value,
                  merge_edge_value_and_source_node_value,
              )
          }
      }

      /// Attempts to establish an edge from `source` to a single `destination`,
      /// optionally merging edge values if an edge already exists.
      /// Returns `Some(Trie2Index)` if merge or insert succeeded.
      pub fn try_destination<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
          arena: &'a Arena<Trie<EK, EV, T>>,
          source: Trie2Index,
          edge_key: EK,
          edge_value: EV,
          destination: Trie2Index,
          merge_edge_value: FMergeEV,
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
      ) -> Option<Trie2Index>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          EdgeInserter::new(
              arena,
              source,
              edge_key,
              edge_value,
              merge_edge_value,
              update_node_value,
              merge_edge_value_and_source_node_value,
          )
          .try_destination(destination)
          .into_option()
      }

      /// Attempts to establish an edge from `source` to any of the provided `destinations`,
      /// returning the first successful one (merge or insert), or `None` if none matched.
      pub fn try_destination_with<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>(
          arena: &'a Arena<Trie<EK, EV, T>>,
          source: Trie2Index,
          edge_key: EK,
          edge_value: EV,
          destinations: &[Trie2Index],
          merge_edge_value: FMergeEV,
          update_node_value: FUpdateT,
          merge_edge_value_and_source_node_value: FMergeEV_T,
      ) -> Option<Trie2Index>
      where
          EK: Ord + Clone + Debug,
          EV: Clone + Debug,
          T: Clone,
          FMergeEV: FnMut(&mut EV, EV),
          FUpdateT: FnMut(&mut T, &EV),
          FMergeEV_T: FnMut(&mut EV, &T),
      {
          EdgeInserter::new(
              arena,
              source,
              edge_key,
              edge_value,
              merge_edge_value,
              update_node_value,
              merge_edge_value_and_source_node_value,
          )
          .try_destinations(destinations)
          .into_option()
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct Index {
          index: usize,
      }

      impl From<usize> for Index {
          fn from(index: usize) -> Self {
              Index { index }
          }
      }

      impl From<Index> for usize {
          fn from(idx: Index) -> usize {
              idx.index
          }
      }

      impl Index {
          pub fn as_usize(self) -> usize {
              self.index
          }
      }

      #[derive(Debug, Clone)]
      pub struct ArenaInner<T> {
          values: Vec<Option<T>>,
          counter: usize,
      }

      impl<T: PartialEq> PartialEq for ArenaInner<T> {
          fn eq(&self, other: &Self) -> bool {
              self.counter == other.counter && self.values == other.values
          }
      }
      impl<T: Eq> Eq for ArenaInner<T> {}

      impl<T: PartialOrd> PartialOrd for ArenaInner<T> {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              match self.counter.partial_cmp(&other.counter) {
                  Some(Ordering::Equal) => self.values.partial_cmp(&other.values),
                  other => other,
              }
          }
      }

      impl<T: Ord> Ord for ArenaInner<T> {
          fn cmp(&self, other: &Self) -> Ordering {
              self.counter.cmp(&other.counter)
                  .then_with(|| self.values.cmp(&other.values))
          }
      }

      #[derive(Debug, Clone)]
      pub struct Arena<T> {
          pub(crate) inner: Arc<RwLock<ArenaInner<T>>>,
      }
      impl<T> PartialEq for Arena<T>
      where
          T: PartialEq,
      {
          fn eq(&self, other: &Self) -> bool {
              Arc::ptr_eq(&self.inner, &other.inner)
                  || PartialEq::eq(
                      &*self.inner.read().unwrap(),
                      &*other.inner.read().unwrap(),
                  )
          }
      }
      impl<T> Eq for Arena<T> where T: Eq {}

      impl<T> PartialOrd for Arena<T>
      where
          T: PartialOrd,
      {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              if Arc::ptr_eq(&self.inner, &other.inner) {
                  return Some(Ordering::Equal);
              }
              PartialOrd::partial_cmp(
                  &*self.inner.read().unwrap(),
                  &*other.inner.read().unwrap(),
              )
          }
      }

      impl<T> Ord for Arena<T>
      where
          T: Ord,
      {
          fn cmp(&self, other: &Self) -> Ordering {
              if Arc::ptr_eq(&self.inner, &other.inner) {
                  return Ordering::Equal;
              }
              Ord::cmp(
                  &*self.inner.read().unwrap(),
                  &*other.inner.read().unwrap(),
              )
          }
      }

      // Note: hashing only the pointer means two Arenas with equal content but different Arcs
      // will not hash equal even though `eq` may return true. If you need Eq/Hash consistency,
      // hash the map contents instead.
      impl<T> Hash for Arena<T>
      where
          T: Hash,
      {
          fn hash<H: Hasher>(&self, state: &mut H) {
              Hash::hash(&Arc::as_ptr(&self.inner), state);
          }
      }

      impl<T> Arena<T> {
          pub fn new() -> Self {
              Arena {
                  inner: Arc::new(RwLock::new(ArenaInner {
                      values: Vec::new(),
                      counter: 0,
                  })),
              }
          }

          // Inserts `value` at the next free index and returns the Index.
          pub fn insert(&self, value: T) -> Index {
              let mut inner = self.inner.write().unwrap();
              let next = inner.counter;
              inner.counter = inner.counter.checked_add(1).expect("Arena index overflow");

              if next >= inner.values.len() {
                  inner.values.resize_with(next + 1, || None);
              }

              let old = inner.values[next].replace(value);
              debug_assert!(old.is_none());
              Index { index: next }
          }

          // Replace or set a value at a specific index. Returns the old value if any.
          pub fn insert_at(&self, index: Index, value: T) -> Option<T> {
              let mut inner = self.inner.write().unwrap();
              let idx = index.index;
              if idx >= inner.values.len() {
                  inner.values.resize_with(idx + 1, || None);
              }
              if idx >= inner.counter {
                  inner.counter = idx + 1;
              }
              inner.values[idx].replace(value)
          }

          // Remove a value at index, returning it if present.
          pub fn remove(&self, index: Index) -> Option<T> {
              let mut inner = self.inner.write().unwrap();
              let idx = index.index;
              if idx < inner.values.len() {
                  inner.values[idx].take()
              } else {
                  None
              }
          }

          // Returns true if the index exists in the arena.
          pub fn contains(&self, index: Index) -> bool {
              let inner = self.inner.read().unwrap();
              inner.values.get(index.index).map_or(false, |v| v.is_some())
          }

          // Returns a clone of the value at index (requires T: Clone).
          pub fn get(&self, index: Index) -> Option<T>
          where
              T: Clone,
          {
              self.inner.read().unwrap().values.get(index.index).and_then(|v| v.as_ref()).cloned()
          }

          // Read access via a closure (no Clone bound required).
          pub fn with<R>(&self, index: Index, f: impl FnOnce(&T) -> R) -> Option<R> {
              let guard = self.inner.read().unwrap();
              guard.values.get(index.index).and_then(|opt| opt.as_ref()).map(f)
          }

          // Mutable access via a closure (no Clone bound required).
          pub fn with_mut<R>(&self, index: Index, f: impl FnOnce(&mut T) -> R) -> Option<R> {
              let mut guard = self.inner.write().unwrap();
              guard.values.get_mut(index.index).and_then(|opt| opt.as_mut()).map(f)
          }

          pub fn len(&self) -> usize {
              self.inner.read().unwrap().values.iter().filter(|v| v.is_some()).count()
          }

          pub fn is_empty(&self) -> bool {
              self.inner.read().unwrap().values.iter().all(|v| v.is_none())
          }

          pub fn clear(&self) {
              let mut inner = self.inner.write().unwrap();
              inner.values.clear();
              inner.counter = 0;
          }

          // Snapshot of all indices.
          pub fn indices(&self) -> Vec<Index> {
              self.inner
                  .read()
                  .unwrap()
                  .values
                  .iter()
                  .enumerate()
                  .filter_map(|(i, v)| if v.is_some() { Some(Index::from(i)) } else { None })
                  .collect()
          }

          // Snapshot of all entries as (Index, T) pairs (requires T: Clone).
          pub fn to_vec(&self) -> Vec<(Index, T)>
          where
              T: Clone,
          {
              self.inner
                  .read()
                  .unwrap()
                  .values
                  .iter()
                  .enumerate()
                  .filter_map(|(i, v)| v.as_ref().map(|val| (Index::from(i), val.clone())))
                  .collect()
          }
      }

      impl<T> JSONConvertible for Arena<T>
      where
          T: JSONConvertible,
      {
          fn to_json(&self) -> JSONNode {
              let guard = self.inner.read().unwrap();
              let mut obj = BTreeMap::new();
              obj.insert("counter".to_string(), guard.counter.to_json());
              let items: Vec<JSONNode> = guard.values.iter().enumerate().filter_map(|(k, v)| {
                  v.as_ref().map(|val| {
                      JSONNode::Array(vec![
                          k.to_json(),
                          val.to_json(),
                      ])
                  })
              }).collect();
              obj.insert("values".to_string(), JSONNode::Array(items));
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let counter = usize::from_json(obj.remove("counter").ok_or("Missing 'counter' field")?)?;
              let values_node = obj.remove("values").ok_or("Missing 'values' field")?;
              let arr = match values_node {
                  JSONNode::Array(arr) => arr,
                  _ => return Err("Expected JSONNode::Array for Arena values".to_string()),
              };

              let mut values = Vec::new();
              for item_node in arr {
                  let mut pair = match item_node {
                      JSONNode::Array(pair) if pair.len() == 2 => pair,
                      _ => return Err("Expected 2-element array for Arena entry".to_string()),
                  };
                  let value_node = pair.pop().unwrap();
                  let key_node = pair.pop().unwrap();

                  let key = usize::from_json(key_node)?;
                  let value = T::from_json(value_node)?;

                  if key >= values.len() {
                      values.resize_with(key + 1, || None);
                  }
                  values[key] = Some(value);
              }

              Ok(Arena {
                  inner: Arc::new(RwLock::new(ArenaInner {
                      values,
                      counter,
                  })),
              })
          }
      }

      pub type GodWrapper<EK, EV, T> = Arena<Trie<EK, EV, T>>;
      pub type God<EK, EV, T> = Arena<Trie<EK, EV, T>>;
    src/constraint_precompute1_utils.rs: |
      use std::collections::{BTreeMap, BTreeSet, HashMap, HashSet, VecDeque};
      use std::hash::{Hash, Hasher, DefaultHasher};
      use std::cmp::Reverse;
      use std::ops::BitOrAssign;
      use std::sync::Arc;
      use bitvec::macros::internal::funty::Fundamental;
      use range_set_blaze::RangeSetBlaze;
      use ordered_hash_map::OrderedHashMap;
      use kdam::tqdm;
      use crate::constraint::{GrammarConstraintConfig, PrecomputeNode0Index, PrecomputeNode1, PrecomputedNodeContents, Trie0GodWrapper};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use crate::constraint::{StageVocab, PrecomputeNode1Index, Trie1GodWrapper};
      use crate::constraint_extra::PrecomputeStats;
      use deterministic_hash::DeterministicHasher;
      use crate::datastructures::EntryApi;
      use crate::datastructures::gss::LLMTokenBV;
      use crate::datastructures::trie::Trie;
      use crate::types::{TerminalID as GrammarTokenID, TerminalID};
      use crate::tokenizer::TokenizerStateID;
      use crate::datastructures::hybrid_bitset::HybridBitset;
      use crate::datastructures::ordered_hash_map::Retain;

      #[derive(PartialEq, Eq, Clone, Debug)]
      struct MergeKey {
          end: bool,
          children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>>,
      }

      impl Hash for MergeKey {
          fn hash<H: Hasher>(&self, state: &mut H) {
              self.end.hash(state);
              for (ek, dm) in &self.children {
                  ek.hash(state);
                  for (dst, bv) in dm {
                      dst.hash(state);
                      bv.hash(state);
                  }
              }
          }
      }

      fn aggressive_deduplicate_recursive_trie1(
          node_arc: PrecomputeNode1Index,
          canonical_nodes: &mut HashMap<MergeKey, PrecomputeNode1Index>,
          visited: &mut HashMap<PrecomputeNode1Index, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) -> PrecomputeNode1Index {
          if let Some(canonical_arc) = visited.get(&node_arc) {
              return canonical_arc.clone();
          }

          // Recurse on children first to canonicalize them.
          let (is_end, children_snapshot) = {
              let g = node_arc.read(trie1_god).unwrap();
              (g.value.end, g.children().clone())
          };

          let mut new_children_map = BTreeMap::new();
          let mut children_changed = false;
          for (edge_key, entries) in children_snapshot {
              let mut new_dest_map = OrderedHashMap::new();
              for (child_arc, edge_val) in entries {
                  let canonical_child_arc = aggressive_deduplicate_recursive_trie1(
                      child_arc,
                      canonical_nodes,
                      visited,
                      trie1_god,
                  );
                  if child_arc != canonical_child_arc {
                      children_changed = true;
                  }
                  // Coalesce if the same canonical child appears multiple times for one edge key
                  new_dest_map.entry(canonical_child_arc)
                      .and_modify(|ev: &mut LLMTokenBV| *ev |= &edge_val)
                      .or_insert(edge_val);
              }
              if !new_dest_map.is_empty() {
                  new_children_map.insert(edge_key, new_dest_map);
              }
          }

          let key = MergeKey {
              end: is_end,
              children: new_children_map.clone(),
          };

          if let Some(canonical_arc) = canonical_nodes.get(&key) {
              // Found a canonical node. Merge self into it.
              let live_tokens_to_merge = {
                  // No need to re-read if children haven't changed, but this is safer
                  let g = node_arc.read(trie1_god).unwrap();
                  g.value.live_tokens.clone()
              };
              if !live_tokens_to_merge.is_empty() {
                  let mut canonical_g = canonical_arc.write(trie1_god).unwrap();
                  canonical_g.value.live_tokens |= &live_tokens_to_merge;
              }
              visited.insert(node_arc, canonical_arc.clone());
              canonical_arc.clone()
          } else {
              // This node becomes the canonical representative for this key.
              if children_changed {
                  let mut g = node_arc.write(trie1_god).unwrap();
                  *g.children_mut() = new_children_map;
              }
              
              // We might not need to re-read here if we are careful. But let's be safe.
              // The key was built with canonicalized children. If we updated the node, its children are now canonical.
              // So the key is correct.
              canonical_nodes.insert(key, node_arc.clone());
              visited.insert(node_arc, node_arc.clone());
              node_arc.clone()
          }
      }

      fn aggressive_merge_nodes_trie1(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Aggressively merging identical subtrees in Trie1.");
          let mut canonical_nodes: HashMap<MergeKey, PrecomputeNode1Index> = HashMap::new();
          let mut visited: HashMap<PrecomputeNode1Index, PrecomputeNode1Index> = HashMap::new();

          let mut new_roots = BTreeMap::new();
          for (sid, root_arc) in roots.iter() {
              let canonical_root = aggressive_deduplicate_recursive_trie1(
                  root_arc.clone(),
                  &mut canonical_nodes,
                  &mut visited,
                  trie1_god,
              );
              new_roots.insert(*sid, canonical_root);
          }
          *roots = new_roots;
          crate::debug!(2, "Finished aggressively merging subtrees in Trie1. Canonical nodes: {}", canonical_nodes.len());
      }

      /// Returns true iff two nodes are structurally equal for our purposes:
      /// - end flags must match
      /// - keyed edges (Some(t)) must match by:
      ///     for each t: same multiset of (canonical_child_index, LLMTokenBV)
      /// - None edges are treated just like keyed edges if present (though usually flattened).
      /// - live_tokens are ignored (they are derived).
      fn nodes_equivalent_ignoring_live_tokens_using_canonical_children(
          a: PrecomputeNode1Index,
          b: PrecomputeNode1Index,
          trie1_god: &Trie1GodWrapper,
          canonical_child: &HashMap<PrecomputeNode1Index, PrecomputeNode1Index>,
      ) -> bool {
          let ag = a.read(trie1_god).expect("read");
          let bg = b.read(trie1_god).expect("read");
          if ag.value.end != bg.value.end {
              return false;
          }

          if ag.children().len() != bg.children().len() {
              return false;
          }

          for (ek, a_dm) in ag.children() {
              let b_dm = match bg.children().get(ek) {
                  Some(x) => x,
                  None => return false,
              };
              if a_dm.len() != b_dm.len() {
                  return false;
              }

              // Compare as bags of (canonical_child, bv)
              let mut a_vec: Vec<(usize, &LLMTokenBV)> = a_dm.iter().map(|(dst, bv)| {
                  let d = *canonical_child.get(dst).unwrap_or(dst);
                  (usize::from(d.as_index()), bv)
              }).collect();
              let mut b_vec: Vec<(usize, &LLMTokenBV)> = b_dm.iter().map(|(dst, bv)| {
                  let d = *canonical_child.get(dst).unwrap_or(dst);
                  (usize::from(d.as_index()), bv)
              }).collect();

              // Sort by (dst, bv_hash)
              let mut hash_bv = |bv: &LLMTokenBV| {
                  let mut h = DeterministicHasher::new(DefaultHasher::new());
                  bv.hash(&mut h);
                  h.finish()
              };
              a_vec.sort_unstable_by_key(|(d, bv)| (*d, hash_bv(bv)));
              b_vec.sort_unstable_by_key(|(d, bv)| (*d, hash_bv(bv)));

              for ((da, bva), (db, bvb)) in a_vec.iter().zip(b_vec.iter()) {
                  if da != db { return false; }
                  if *bva != *bvb { return false; }
              }
          }
          true
      }

      /// Bottom-up signature-based minimization for Trie1.
      /// 1) Computes canonical representatives based on a structural digest:
      ///    - includes end flag
      ///    - for each edge key, the multiset of (canonical_child_index, LLMTokenBV)
      ///    - ignores live_tokens (derived)
      /// 2) Rewrites all edges to canonical children and coalesces duplicates (unioning masks).
      /// 3) Remaps roots, GC unreachable, recomputes depths.
      fn minimize_by_signature_trie1(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Minimizing Trie1 by structural signature...");
          if roots.is_empty() { return; }
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec);

          let mut all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          // Process children before parents: leaves have depth 0
          all_nodes.sort_by_key(|idx| idx.read(trie1_god).expect("read").max_depth);

          // Map: node -> canonical node
          let mut canonical: HashMap<PrecomputeNode1Index, PrecomputeNode1Index> = HashMap::new();
          // Group by digest for candidate equal nodes
          let mut buckets: HashMap<u64, Vec<PrecomputeNode1Index>> = HashMap::new();

          // Produce a stable digest that depends on:
          //  - end flag
          //  - per edge-key (sorted): key id, count, and for each child: (canonical_id, bv hash)
          let digest_for = |node: PrecomputeNode1Index, canonical: &HashMap<PrecomputeNode1Index, PrecomputeNode1Index>| -> u64 {
              let g = node.read(trie1_god).expect("read");
              let mut hasher = DeterministicHasher::new(DefaultHasher::new());
              // end flag
              g.value.end.hash(&mut hasher);
              // keyed edges
              g.children().len().hash(&mut hasher);
              for (ek, dm) in g.children() {
                  ek.hash(&mut hasher);
                  dm.len().hash(&mut hasher);
                  // materialize as (canonical child, bv)
                  let mut entries: Vec<(usize, u64)> = Vec::with_capacity(dm.len());
                  for (dst, bv) in dm {
                      let d = *canonical.get(dst).unwrap_or(dst);
                      let mut hbv = DeterministicHasher::new(DefaultHasher::new());
                      bv.hash(&mut hbv);
                      entries.push((usize::from(d.as_index()), hbv.finish()));
                  }
                  entries.sort_unstable();
                  for (cd, hbv) in entries {
                      cd.hash(&mut hasher);
                      hbv.hash(&mut hasher);
                  }
              }
              hasher.finish()
          };

          // Bottom-up: compute canonical id per node
          for n in &all_nodes {
              let d = digest_for(*n, &canonical);
              let entry = buckets.entry(d).or_default();
              let mut rep: Option<PrecomputeNode1Index> = None;
              for &candidate in entry.iter() {
                  if nodes_equivalent_ignoring_live_tokens_using_canonical_children(
                      *n,
                      candidate,
                      trie1_god,
                      &canonical,
                  ) {
                      rep = Some(candidate);
                      break;
                  }
              }
              match rep {
                  Some(r) => {
                      canonical.insert(*n, r);
                  }
                  None => {
                      entry.push(*n);
                      canonical.insert(*n, *n);
                  }
              }
          }

          // Rewrite edges to canonical children and coalesce duplicates
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Signature Minimize (Rewrite)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let children_snapshot: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = {
                  let r = n.read(trie1_god).expect("read");
                  r.children().clone()
              };
              let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in children_snapshot {
                  let dest_map = new_children.entry(ek).or_default();
                  for (dst, bv) in dm {
                      let cdst = *canonical.get(&dst).unwrap_or(&dst);
                      dest_map.entry(cdst)
                          .and_modify(|e| *e |= &bv)
                          .or_insert(bv.clone());
                  }
              }
              // Write back + recompute live_tokens
              {
                  let mut w = n.write(trie1_god).expect("write");
                  *w.children_mut() = new_children;
                  let mut lt = LLMTokenBV::zeros();
                  for dm in w.children().values() {
                      for bv in dm.values() {
                          lt |= bv;
                      }
                  }
                  w.value.live_tokens = lt;
              }
          }

          // Remap roots to canonical
          let mut new_roots = BTreeMap::new();
          for (sid, root) in roots.iter() {
              let c = *canonical.get(root).unwrap_or(root);
              new_roots.insert(*sid, c);
          }
          *roots = new_roots;

          // Cleanup
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);
          Trie::gc(trie1_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);
          crate::debug!(2, "Done minimizing Trie1 by structural signature.");
      }

      pub fn optimize_trie1_size(
          precomputed1: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          trie0_god: &Trie0GodWrapper,
          node0_to_node1_map: &HashMap<PrecomputeNode0Index, PrecomputeNode1Index>,
          ignore_terminal_id: Option<TerminalID>,
          internal_max_llm_token: usize,
          terminal_follow_map: &BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          config: &GrammarConstraintConfig,
          stage_vocab: &mut StageVocab,
          token_name_map: &bimap::BiBTreeMap<crate::glr::grammar::Terminal, usize>,
      ) {
          crate::debug!(2, "Starting Trie1 size optimization...");

          crate::debug!(2, "Initial Trie1 stats:");
          let mut stats = PrecomputeStats::default();
          crate::constraint_extra::calculate_final_stats1(precomputed1, &mut stats, trie1_god);
          crate::constraint_extra::print_precompute_stats1(&stats, token_name_map, trie1_god);

          // Pre-simplifications of None edges.
          simplify_none_edges_to_former_end_nodes_trie1(
              precomputed1,
              trie1_god,
              trie0_god,
              node0_to_node1_map,
          );
          replace_ignore_token_edges_with_none_edges_trie1(precomputed1, trie1_god, ignore_terminal_id);
          simplify_none_edges_trie1(precomputed1, trie1_god);
          if config.optimize_trie1_early_flatten_epsilon {
              // Flatten epsilon early to reduce structural variation before pruning/merging.
              flatten_all_none_edges_trie1(precomputed1, trie1_god);
              Trie::recompute_all_max_depths(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
          }

          prune_dead_paths_trie1(precomputed1, trie1_god, internal_max_llm_token);
          prune_on_no_terminal_follow_trie1(precomputed1, trie1_god, terminal_follow_map, ignore_terminal_id);
          prune_dead_paths_trie1(precomputed1, trie1_god, internal_max_llm_token);
          // New: prune nodes that cannot reach any end node (exact, aggressive).
          prune_nodes_not_reaching_end_trie1(precomputed1, trie1_god);

          Trie::recompute_all_max_depths(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
          factor_common_destinations_trie1(precomputed1, trie1_god);
          aggressive_merge_nodes_trie1(precomputed1, trie1_god);
          if config.optimize_trie1_minimize_by_signature {
              minimize_by_signature_trie1(precomputed1, trie1_god);
          }

          // Aggressively remove all None edges via full epsilon-closure flattening.
          // This collapses intermediate "factored" nodes and any other epsilon bridges,
          // keeping correctness by intersecting masks along None chains and pushing
          // only keyed edges up to the current node.
          flatten_all_none_edges_trie1(precomputed1, trie1_god);

          // Normalize/coalesce immediately, then recompute and aggressively merge again.
          optimize_state_masks_and_edges_trie1(precomputed1, trie1_god);
          Trie::recompute_all_max_depths(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
          aggressive_merge_nodes_trie1(precomputed1, trie1_god);
          if config.optimize_trie1_minimize_by_signature {
              minimize_by_signature_trie1(precomputed1, trie1_god);
          }
          prune_dead_paths_trie1(precomputed1, trie1_god, internal_max_llm_token);
          Trie::gc(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
          Trie::recompute_all_max_depths(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());

          if config.optimize_trie1_merge_equivalent_llm_tokens {
              merge_equivalent_llm_tokens_trie1(precomputed1, trie1_god, stage_vocab);
          }
          if config.optimize_trie1_reorder_llm_tokens {
              reorder_llm_tokens_for_range_minimization_trie1(precomputed1, trie1_god, stage_vocab);
          }

          // Rerun token optimizations at the end.
          if config.optimize_trie1_merge_equivalent_llm_tokens {
              merge_equivalent_llm_tokens_trie1(precomputed1, trie1_god, stage_vocab);
          }
          if config.optimize_trie1_minimize_by_signature {
              minimize_by_signature_trie1(precomputed1, trie1_god);
              prune_dead_paths_trie1(precomputed1, trie1_god, internal_max_llm_token);
              // New: prune unproductive nodes again after latest merges/token remaps, then GC.
              prune_nodes_not_reaching_end_trie1(precomputed1, trie1_god);
              Trie::gc(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
              Trie::recompute_all_max_depths(trie1_god, &precomputed1.values().cloned().collect::<Vec<_>>());
          }


          crate::debug!(2, "Final Trie1 stats:");
          let mut stats = PrecomputeStats::default();
          crate::constraint_extra::calculate_final_stats1(precomputed1, &mut stats, trie1_god);
          crate::constraint_extra::print_precompute_stats1(&stats, token_name_map, trie1_god);
      }

      fn simplify_none_edges_to_former_end_nodes_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          trie0_god: &Trie0GodWrapper,
          node0_to_node1_map: &HashMap<PrecomputeNode0Index, PrecomputeNode1Index>,
      ) {
          crate::debug!(2, "Simplifying None edges to former end nodes in Trie1...");

          let mut former_end_nodes1: HashSet<PrecomputeNode1Index> = HashSet::new();
          for (node0_idx, node1_idx) in node0_to_node1_map {
              let node0_guard = node0_idx.read(trie0_god).unwrap();
              if node0_guard.value.final_tokenizer_state.is_some() {
                  former_end_nodes1.insert(*node1_idx);
              }
          }

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          let mut nodes_to_make_end: HashSet<PrecomputeNode1Index> = HashSet::new();

          for a_arc in all_nodes {
              let mut edges_to_add = Vec::new();
              let mut none_edges_to_b_to_remove = Vec::new();

              { // read lock scope
                  let a_guard = a_arc.read(trie1_god).unwrap();
                  if let Some(none_dest_map) = a_guard.children().get(&None) {
                      for (b_arc_wrapper, bv_ab) in none_dest_map {
                          if former_end_nodes1.contains(b_arc_wrapper) {
                              let b_arc = b_arc_wrapper.as_arc();
                              let b_guard = b_arc.read(trie1_god).unwrap();

                              if b_guard.children().is_empty() {
                                  // This former end node has no successors, so it's a valid end point.
                                  // Mark it to become a true end node. The edge is preserved.
                                  nodes_to_make_end.insert(b_arc_wrapper.clone());
                              } else {
                                  // This is a candidate for simplification: A -(None)-> B, where B has children.
                                  none_edges_to_b_to_remove.push(b_arc_wrapper.clone());

                                  // B's children are the edges to add to A.
                                  for (term_opt, c_dest_map) in b_guard.children() {
                                      for (c_arc_wrapper, _bv_bc) in c_dest_map {
                                          // New edge: A -(term_opt)-> C
                                          // New BV is bv_ab, since bv_bc is all_tokens.
                                          let new_bv = bv_ab.clone();
                                          if !new_bv.is_empty() {
                                              edges_to_add.push((term_opt.clone(), c_arc_wrapper.clone(), new_bv));
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              } // end read lock

              if !none_edges_to_b_to_remove.is_empty() {
                  let mut a_guard = a_arc.write(trie1_god).unwrap();

                  // Remove the None edges that point to former end nodes that we are shortcutting.
                  if let Some(none_dest_map) = a_guard.children_mut().get_mut(&None) {
                      for b_to_remove in none_edges_to_b_to_remove {
                          none_dest_map.remove(&b_to_remove);
                      }
                  }

                  // If the None edge map is now empty, remove it.
                  if a_guard.children().get(&None).map_or(false, |m| m.is_empty()) {
                      a_guard.children_mut().remove(&None);
                  }

                  // Add the new shortcut edges.
                  for (term_opt, c_arc_wrapper, new_bv) in edges_to_add {
                      let dest_map = a_guard.children_mut().entry(term_opt).or_default();
                      dest_map.entry(c_arc_wrapper).or_insert_with(LLMTokenBV::zeros).bitor_assign(&new_bv);
                  }
              }
          }

          for node_to_make_end in nodes_to_make_end {
              let mut guard = node_to_make_end.write(trie1_god).unwrap();
              guard.value.end = true;
          }

          crate::debug!(2, "Done simplifying None edges to former end nodes in Trie1.");
      }

      fn replace_ignore_token_edges_with_none_edges_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          ignore_terminal_id: Option<TerminalID>,
      ) {
          let ignore_tid = if let Some(id) = ignore_terminal_id {
              id
          } else {
              return;
          };

          crate::debug!(2, "Replacing ignore token edges with None edges in Trie1...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);

          for node_arc in all_nodes {
              let mut node_guard = node_arc.write(trie1_god).expect("poison");
              if let Some(dest_map_to_move) = node_guard.children_mut().remove(&Some(ignore_tid)) {
                  let dest_map_for_new_key = node_guard.children_mut().entry(None).or_default();
                  for (dest_wrapper, edge_bv) in dest_map_to_move {
                      if let Some(existing_bv) = dest_map_for_new_key.get_mut(&dest_wrapper) {
                          *existing_bv |= &edge_bv;
                      } else {
                          dest_map_for_new_key.insert(dest_wrapper, edge_bv);
                      }
                  }
              }
          }
          crate::debug!(2, "Done replacing ignore token edges in Trie1.");
      }

      fn simplify_none_edges_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Simplifying None edges in Trie1...");
          let root_node_ptrs: HashSet<PrecomputeNode1Index> = roots.values().cloned().collect();
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          let mut arc_by_ptr: HashMap<PrecomputeNode1Index, PrecomputeNode1Index> = HashMap::new();
          for n in &all_nodes {
              arc_by_ptr.insert(*n, n.clone());
          }

          let mut incoming: HashMap<
              PrecomputeNode1Index,
              Vec<(PrecomputeNode1Index, Option<GrammarTokenID>, LLMTokenBV)>,
          > = HashMap::new();
          let mut none_edges_from: HashMap<
              PrecomputeNode1Index,
              Vec<(PrecomputeNode1Index, LLMTokenBV)>,
          > = HashMap::new();
          let mut none_union: HashMap<PrecomputeNode1Index, LLMTokenBV> = HashMap::new();

          for src_arc in &all_nodes {
              let src_ptr = src_arc;
              let guard = src_arc.read(trie1_god).expect("poison");
              for (ek, dest_map) in guard.children().iter() {
                  for (child_wrap, ev_bv) in dest_map.iter() {
                      let child_arc = child_wrap.as_arc().clone();
                      let child_ptr = child_arc;
                      incoming.entry(child_ptr)
                          .or_default()
                          .push((src_arc.clone(), ek.clone(), ev_bv.clone()));
                  }
              }
              if let Some(dest_map) = guard.children().get(&None) {
                  let list = none_edges_from.entry(*src_ptr).or_default();
                  for (child_wrap, ev_bv) in dest_map.iter() {
                      list.push((child_wrap.as_arc().clone(), ev_bv.clone()));
                      let entry = none_union.entry(*src_ptr).or_insert_with(LLMTokenBV::zeros);
                      *entry |= ev_bv;
                  }
              }
          }

          for (b_ptr, none_edges) in none_edges_from.into_iter() {
              let union_mask = match none_union.get(&b_ptr) {
                  Some(bv) if !bv.is_empty() => bv.clone(),
                  _ => continue,
              };
              let in_edges = match incoming.get(&b_ptr) {
                  Some(v) if !v.is_empty() => v.clone(),
                  _ => {
                      if root_node_ptrs.contains(&b_ptr) {
                          continue;
                      }
                      if let Some(b_arc) = arc_by_ptr.get(&b_ptr).cloned() {
                          let mut b_guard = b_arc.write(trie1_god).expect("poison");
                          b_guard.children_mut().remove(&None);
                      }
                      continue;
                  }
              };

              let b_arc = arc_by_ptr.get(&b_ptr).unwrap().clone();
              let b_key = b_arc.clone();

              for (a_arc, edge_key, bv1_original) in in_edges.into_iter() {
                  if edge_key.is_none() { continue; }

                  let mut total_to_move = bv1_original.clone();
                  total_to_move &= &union_mask;
                  if total_to_move.is_empty() {
                      continue;
                  }

                  let mut a_guard = a_arc.write(trie1_god).expect("poison");
                  let dest_map = a_guard.children_mut().entry(edge_key.clone()).or_default();

                  for (c_arc, bv2) in &none_edges {
                      let mut to_move_for_c = bv1_original.clone();
                      to_move_for_c &= bv2;
                      if to_move_for_c.is_empty() {
                          continue;
                      }
                      let c_key = c_arc.clone();
                      if let Some(existing_ev) = dest_map.get_mut(&c_key) {
                          *existing_ev |= &to_move_for_c;
                      } else {
                          dest_map.insert(c_key, to_move_for_c);
                      }
                  }

                  let mut remove_b_edge = false;
                  if let Some(ev_ab) = dest_map.get_mut(&b_key) {
                      *ev_ab -= &total_to_move;
                      remove_b_edge = ev_ab.is_empty();
                  }
                  if remove_b_edge {
                      dest_map.remove(&b_key);
                  }
              }

              {
                  let mut b_guard = b_arc.write(trie1_god).expect("poison");
                  b_guard.children_mut().remove(&None);
              }
          }
          crate::debug!(2, "Done simplifying None edges in Trie1.");
      }

      fn count_total_ranges_trie1(
          all_nodes: &[PrecomputeNode1Index],
          trie1_god: &Trie1GodWrapper,
      ) -> usize {
          let mut count = 0;
          for n in all_nodes {
              let g = n.read(trie1_god).expect("read");
              count += g.value.live_tokens.inner().ranges_len();
              for (_ek, dm) in g.children() {
                  for (_dst, bv) in dm {
                      count += bv.inner().ranges_len();
                  }
              }
          }
          count
      }

      fn remap_llm_bv_many_to_one(bv: &LLMTokenBV, map_old_to_new: &BTreeMap<usize, usize>, max_token_id: usize) -> LLMTokenBV {
          if bv.is_empty() { return LLMTokenBV::zeros(); }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          let process_range = |range: std::ops::RangeInclusive<usize>,
                               ranges_to_add: &mut Vec<_>,
                               elements_to_add: &mut Vec<_>| {
              let (mut current, end) = (*range.start(), *range.end());
              for (&k, &v) in map_old_to_new.range(current..=end) {
                  if current < k {
                      ranges_to_add.push(current..=k - 1);
                  }
                  elements_to_add.push(v);
                  current = k + 1;
              }
              if current <= end {
                  ranges_to_add.push(current..=end);
              }
          };

          if *bv == LLMTokenBV::max_ones() {
              process_range(0..=max_token_id, &mut ranges_to_add, &mut elements_to_add);
          } else {
              for range in bv.inner().ranges() {
                  process_range(*range.start()..=*range.end(), &mut ranges_to_add, &mut elements_to_add);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV { inner: crate::datastructures::cache::intern_l1(new_set) }
      }

      fn remap_llm_bv_permutation(bv: &LLMTokenBV, map_old_to_new: &BTreeMap<usize, usize>, _max_token_id: usize) -> LLMTokenBV {
          // Fast‑paths for empty or full‑universe bitvectors.
          if bv.is_empty() { return LLMTokenBV::zeros(); }
          if *bv == LLMTokenBV::max_ones() { return LLMTokenBV::max_ones(); }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          for range in bv.inner().ranges() {
              let (mut current, end) = (*range.start(), *range.end());

              for (&k, &v) in map_old_to_new.range(current..=end) {
                  if current < k {
                      // Identity mapping for elements not in map_old_to_new
                      ranges_to_add.push(current..=k - 1);
                  }
                  elements_to_add.push(v);
                  current = k + 1;
              }

              if current <= end {
                  // Identity mapping for the rest of the range
                  ranges_to_add.push(current..=end);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV { inner: crate::datastructures::cache::intern_l1(new_set) }
      }

      /// Merge equivalent internal LLM token ids in Trie1:
      /// Two tokens are equivalent if they appear together in every occurrence across:
      /// - node.value.live_tokens
      /// - every edge's LLMTokenBV
      ///
      /// Applies a many-to-one id mapping and merges masks accordingly.
      pub fn merge_equivalent_llm_tokens_trie1(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          stage_vocab: &mut StageVocab,
      ) {
          crate::debug!(2, "Merging equivalent LLM tokens in Trie1...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() { return; }

          // 1) Collect all unique bitsets to use as splitters.
          let mut all_bvs = HashSet::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Merge Tokens (Collect BVs)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let g = n.read(trie1_god).expect("read");
              if !g.value.live_tokens.is_empty() {
                  all_bvs.insert(g.value.live_tokens.clone());
              }
              for (_ek, dm) in g.children() {
                  for (_dst, bv) in dm {
                      if !bv.is_empty() {
                          all_bvs.insert(bv.clone());
                      }
                  }
              }
          }
          if all_bvs.is_empty() { return; }

          // 2) Partition refinement.
          let max_tok = stage_vocab.internal_max_llm_token;
          let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
          let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
          class_to_tokens.insert(0, (0..=max_tok).collect());
          let mut num_classes = 1;

          #[cfg(not(rustrover))]
          let it = tqdm!(all_bvs.iter(), desc = "Trie1 Merge Tokens (Refine)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_bvs.iter();
          for splitter_bv in it {
              if *splitter_bv == LLMTokenBV::max_ones() { continue; }

              let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
              for token in splitter_bv.iter() {
                  if token <= max_tok {
                      let class_id = token_to_class[token];
                      members_in_splitter_by_class.entry(class_id).or_default().push(token);
                  }
              }

              for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                  let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                  if old_class_size == 0 { continue; }

                  if !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                      let new_class_id = num_classes;
                      num_classes += 1;

                      for &token in &tokens_for_new_class {
                          token_to_class[token] = new_class_id;
                      }

                      let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                      let moved_tokens_set: HashSet<_> = tokens_for_new_class.iter().cloned().collect();
                      old_class_tokens.retain(|t| !moved_tokens_set.contains(t));
                      
                      class_to_tokens.insert(new_class_id, tokens_for_new_class);
                  }
              }
          }

          // 3) Build many-to-one mapping from the final partition.
          let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
          let mut merged_count = 0;
          for (_class_id, group) in &class_to_tokens {
              if group.len() <= 1 { continue; }
              let rep = *group.iter().min().unwrap();
              for &t in group {
                  if t != rep {
                      old_to_new.insert(t, rep);
                      merged_count += 1;
                  }
              }
          }
          let tokens_before = max_tok + 1;
          let tokens_after = num_classes;
          crate::debug!(2, "Trie1: merged LLM tokens. Before: {}, After: {}. ({} merged)", tokens_before, tokens_after, merged_count);
          if merged_count == 0 { return; }

          // Memoization cache for remapping.
          let mut memo: HashMap<LLMTokenBV, LLMTokenBV> = HashMap::new();

          // Precompute the mapped universal set once (used when a set equals max_ones())
          let mut mapped_universe = LLMTokenBV::zeros();
          for t in 0..=max_tok {
              let rep = old_to_new.get(&t).copied().unwrap_or(t);
              mapped_universe.insert(rep);
          }

          // Identify which concrete bitvectors are affected (by Arc pointer identity)
          let mut affected_ptrs: HashSet<*const RangeSetBlaze<usize>> = HashSet::new();
          for splitter in all_bvs {
              affected_ptrs.insert(Arc::as_ptr(&splitter.inner));
          }

          // 4) Apply mapping to trie in‑place, only where needed
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Merge (Remap In‑Place)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              // Quick check: does this node reference any affected bitvector?
              let needs_update = {
                  let r = n.read(trie1_god).expect("read");
                  let lv_ptr = Arc::as_ptr(&r.value.live_tokens.inner);
                  if affected_ptrs.contains(&lv_ptr) {
                      true
                  } else {
                      let mut touched = false;
                      for (_ek, dm) in r.children() {
                          for (_dst, bv) in dm {
                              let bv_ptr = Arc::as_ptr(&bv.inner);
                              if affected_ptrs.contains(&bv_ptr) {
                                  touched = true;
                                  break;
                              }
                          }
                          if touched { break; }
                      }
                      touched
                  }
              };
              if !needs_update { continue; }

              let mut w = n.write(trie1_god).expect("write");

              // Remap live_tokens if needed
              if !w.value.live_tokens.is_empty() {
                  if w.value.live_tokens == LLMTokenBV::max_ones() {
                      w.value.live_tokens = mapped_universe.clone();
                  } else {
                      let lv_ptr = Arc::as_ptr(&w.value.live_tokens.inner);
                      if affected_ptrs.contains(&lv_ptr) {
                          let original_bv = w.value.live_tokens.clone();
                          w.value.live_tokens = memo.entry(original_bv)
                              .or_insert_with_key(|bv| remap_llm_bv_many_to_one(bv, &old_to_new, max_tok))
                              .clone();
                      }
                  }
              }

              // Remap children edge masks
              let old_children = std::mem::take(w.children_mut());
              let mut new_children: BTreeMap<Option<crate::types::TerminalID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in old_children {
                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                  for (dst, bv) in dm {
                      let bv_ptr = Arc::as_ptr(&bv.inner);
                      let mapped = if bv.is_empty() {
                          LLMTokenBV::zeros()
                      } else if bv == LLMTokenBV::max_ones() {
                          mapped_universe.clone()
                      } else if affected_ptrs.contains(&bv_ptr) {
                          memo.entry(bv.clone())
                              .or_insert_with_key(|bv| remap_llm_bv_many_to_one(bv, &old_to_new, max_tok))
                              .clone()
                      } else {
                          bv.clone()
                      };
                      if !mapped.is_empty() {
                          new_dm.entry(dst)
                              .and_modify(|e| *e |= &mapped)
                              .or_insert(mapped);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek, new_dm);
                  }
              }
              *w.children_mut() = new_children;
      	}
      	// 5) Update stage vocab
      	// Merge internal_to_original for tokens mapped into representatives
      	#[cfg(not(rustrover))]
      	let it = tqdm!(old_to_new.iter(), desc = "Trie1 Merge (Update Vocab)", total = old_to_new.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
      	#[cfg(rustrover)]
      	let it = old_to_new.iter();
      	for (old, new_rep) in it {
      		if old == new_rep { continue; }
      		if let Some(moved) = stage_vocab.internal_to_original.remove(old) {
      			let entry = stage_vocab.internal_to_original.entry(*new_rep).or_default();
      			*entry |= &moved;
      			for o in moved.iter() {
      				stage_vocab.original_to_internal.insert(o, *new_rep);
      			}
      		}
      	}
      	// internal_max_llm_token stays the same here (holes may appear). A later reorder can compact.
      }

      /// Reorder internal LLM tokens (permutation) to reduce ranges in masks by clustering co-occurring tokens.
      /// Conservative heuristic: sort by (descending frequency, then by id).
      pub fn reorder_llm_tokens_for_range_minimization_trie1(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          stage_vocab: &mut StageVocab,
      ) {
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() { return; }
          let ranges_before = count_total_ranges_trie1(&all_nodes, trie1_god);

          let max_tok = stage_vocab.internal_max_llm_token;

          // Count frequencies directly to avoid slow HashMap<LLMTokenBV, ...>
          let mut freq: Vec<usize> = vec![0; max_tok + 1];
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Reorder (Count Frequencies)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let g = n.read(trie1_god).expect("read");
              let live_tokens = &g.value.live_tokens;
              if !live_tokens.is_empty() {
                  if live_tokens.is_all() {
                      for t in 0..=max_tok { freq[t] += 1; }
                  } else {
                      for t in live_tokens.iter() {
                          if t <= max_tok { freq[t] += 1; }
                      }
                  }
              }
              for (_ek, dm) in g.children() {
                  for (_dst, bv) in dm {
                      if !bv.is_empty() {
                          if bv.is_all() {
                              for t in 0..=max_tok { freq[t] += 1; }
                          } else {
                              for t in bv.iter() {
                                  if t <= max_tok { freq[t] += 1; }
                              }
                          }
                      }
                  }
              }
          }
          crate::debug!(2, "Done computing frequencies.");

          // Build ordering: tokens present at least once, sorted by (freq desc, id asc)
          let mut present: Vec<usize> = (0..=max_tok).filter(|t| freq[*t] > 0).collect();
          if present.is_empty() { return; }
          present.sort_by_key(|&t| (std::cmp::Reverse(freq[t]), t));

          // Build permutation
          let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
          for (new_id, old_id) in present.iter().enumerate() {
              old_to_new.insert(*old_id, new_id);
          }

          // Memoization cache
          let mut memo: HashMap<LLMTokenBV, LLMTokenBV> = HashMap::new();

          // Apply mapping to trie
          let mut new_states = Vec::with_capacity(all_nodes.len());
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter(), desc = "Trie1 Reorder (Remap Read)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let r = n.read(trie1_god).expect("read");
              let new_live_tokens = if r.value.live_tokens.is_empty() {
                  r.value.live_tokens.clone()
              } else {
                  memo.entry(r.value.live_tokens.clone())
                      .or_insert_with_key(|bv| remap_llm_bv_permutation(bv, &old_to_new, max_tok))
                      .clone()
              };
              let mut new_children: BTreeMap<Option<crate::types::TerminalID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in r.children() {
                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                  for (dst, bv) in dm {
                      let mapped = memo.entry(bv.clone())
                          .or_insert_with_key(|bv| remap_llm_bv_permutation(bv, &old_to_new, max_tok))
                          .clone();
                      if !mapped.is_empty() {
                          new_dm.insert(dst.clone(), mapped);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek.clone(), new_dm);
                  }
              }
              new_states.push((new_live_tokens, new_children));
          }
          #[cfg(not(rustrover))]
          let it = tqdm!(all_nodes.iter().enumerate(), desc = "Trie1 Reorder (Remap Write)", total = all_nodes.len(), disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = all_nodes.iter().enumerate();
          for (i, n) in it {
              let mut w = n.write(trie1_god).expect("write");
              let (live_tokens, children) = &new_states[i];
              w.value.live_tokens = live_tokens.clone();
              *w.children_mut() = children.clone();
          }
      	let ranges_after = count_total_ranges_trie1(&all_nodes, trie1_god);

      	// Update stage vocab (pure permutation)
      	let mut new_internal_to_original: BTreeMap<usize, LLMTokenBV> = BTreeMap::new();
      	#[cfg(not(rustrover))]
      	let it = tqdm!(stage_vocab.internal_to_original.clone().into_iter(), desc = "Trie1 Reorder (Vocab 1)", disable = !PROGRESS_BAR_ENABLED, leave = true);
      	#[cfg(rustrover)]
      	let it = stage_vocab.internal_to_original.clone().into_iter();
      	for (old_id, setv) in it {
      		if let Some(new_id) = old_to_new.get(&old_id) {
      			new_internal_to_original.insert(*new_id, setv);
              }
          }
          stage_vocab.internal_to_original = new_internal_to_original;
          let mut new_original_to_internal: BTreeMap<usize, usize> = BTreeMap::new();
          #[cfg(not(rustrover))]
          let it = tqdm!(stage_vocab.original_to_internal.clone().into_iter(), desc = "Trie1 Reorder (Vocab 2)", disable = !PROGRESS_BAR_ENABLED, leave = true);
          #[cfg(rustrover)]
          let it = stage_vocab.original_to_internal.clone().into_iter();
          for (orig, old_internal) in it {
              if let Some(new_internal) = old_to_new.get(&old_internal) {
                  new_original_to_internal.insert(orig, *new_internal);
              }
          }
          stage_vocab.original_to_internal = new_original_to_internal;
          stage_vocab.internal_max_llm_token = present.len().saturating_sub(1);
          crate::debug!(2, "Trie1 reordering complete. Ranges reduced from {} to {}. New max internal token ID: {}", ranges_before, ranges_after, stage_vocab.internal_max_llm_token);
      }

      /// Conservative normalization pass for Trie1:
      /// - Coalesce duplicate destination entries (union LLMBV) for same child under a terminal key.
      /// - Remove empty masks.
      pub fn optimize_state_masks_and_edges_trie1(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          for n in &all_nodes {
              let mut w = n.write(trie1_god).expect("write");
              let mut new_children: BTreeMap<Option<crate::types::TerminalID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in w.children().clone() {
                  // Union masks for same dst
                  let mut coalesced: HashMap<PrecomputeNode1Index, LLMTokenBV> = HashMap::new();
                  for (dst, bv) in dm {
                      let entry = coalesced.entry(dst).or_insert_with(LLMTokenBV::zeros);
                      *entry |= &bv;
                  }
                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                  for (dst, bv) in coalesced {
                      if !bv.is_empty() {
                          new_dm.insert(dst, bv);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek, new_dm);
                  }
              }
              *w.children_mut() = new_children;
          }
      }

      fn prune_dead_paths_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          internal_max_llm_token: usize,
      ) {
          crate::debug!(2, "Pruning dead paths from Trie1.");
          let mut live_tokens_cache: HashMap<PrecomputeNode1Index, LLMTokenBV> = HashMap::new();
          let all_llm_tokens = HybridBitset::ones(internal_max_llm_token + 1);
          for root_arc in roots.values() {
              get_live_tokens_and_prune_trie1(root_arc.clone(), &mut live_tokens_cache, trie1_god, &all_llm_tokens);
          }
          crate::debug!(2, "Finished pruning dead paths from Trie1.");
      }

      fn get_live_tokens_and_prune_trie1(
          node_wrapper: PrecomputeNode1Index,
          live_tokens_cache: &mut HashMap<PrecomputeNode1Index, LLMTokenBV>,
          trie1_god: &Trie1GodWrapper,
          all_llm_tokens: &LLMTokenBV,
      ) -> LLMTokenBV {
          if let Some(cached_bv) = live_tokens_cache.get(&node_wrapper) {
              return cached_bv.clone();
          }
          live_tokens_cache.insert(node_wrapper.clone(), LLMTokenBV::zeros());

          let node_arc = node_wrapper.as_arc().clone();

          let children_to_check: Vec<PrecomputeNode1Index> = {
              let node_guard = node_arc.read(trie1_god).unwrap();
              node_guard.children().values().flat_map(|dest_map| dest_map.keys().cloned()).collect()
          };

          for child_wrapper in children_to_check {
              get_live_tokens_and_prune_trie1(child_wrapper, live_tokens_cache, trie1_god, all_llm_tokens);
          }

          let mut node_guard = node_arc.write(trie1_god).unwrap();

          node_guard.children_mut().retain(|_edge_key, dest_map| {
              dest_map.retain(|child_wrapper, edge_value_bv| {
                  let live_tokens_from_child = live_tokens_cache.get(child_wrapper)
                      .expect("Child not found in live_tokens_cache. Logic error.");
                  let live_tokens_for_this_edge = &*edge_value_bv & live_tokens_from_child;
                  if live_tokens_for_this_edge.is_empty() {
                      false
                  } else {
                      *edge_value_bv = live_tokens_for_this_edge;
                      true
                  }
              });
              !dest_map.is_empty()
          });

          let mut current_node_live_tokens = LLMTokenBV::zeros();
          for dest_map in node_guard.children().values() {
              for edge_bv in dest_map.values() {
                  current_node_live_tokens |= edge_bv;
              }
          }
          node_guard.value.live_tokens = current_node_live_tokens.clone();

          let is_end_node = node_guard.value.end;
          drop(node_guard);

          let returned_live_tokens = if is_end_node {
              all_llm_tokens.clone()
          } else {
              current_node_live_tokens
          };

          live_tokens_cache.insert(node_wrapper, returned_live_tokens.clone());
          returned_live_tokens
      }

      /// Remove edges to nodes that cannot reach any end node, then GC unreachable nodes.
      /// This is an exact pruning that preserves correctness: nodes that cannot reach an end
      /// can never contribute tokens to the final mask in get_mask1, so their edges are dead.
      fn prune_nodes_not_reaching_end_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      )
      {
          crate::debug!(2, "Pruning Trie1 nodes that cannot reach any end node (reverse reachability)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          if roots_vec.is_empty() {
              return;
          }

          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Build reverse adjacency: dest -> sources having an edge to dest (for any key)
          let mut incoming: HashMap<PrecomputeNode1Index, Vec<PrecomputeNode1Index>> = HashMap::new();
          for src in &all_nodes {
              let g = src.read(trie1_god).expect("read");
              for (_ek, dm) in g.children() {
                  for (dst, _bv) in dm {
                      incoming.entry(*dst).or_default().push(*src);
                  }
              }
          }

          // Initialize worklist with all end nodes
          let mut productive: HashSet<PrecomputeNode1Index> = HashSet::new();
          let mut q: VecDeque<PrecomputeNode1Index> = VecDeque::new();
          let mut end_nodes_count = 0usize;
          for n in &all_nodes {
              let r = n.read(trie1_god).expect("read");
              if r.value.end {
                  end_nodes_count += 1;
                  if productive.insert(*n) {
                      q.push_back(*n);
                  }
              }
          }
          if end_nodes_count == 0 {
              // No end nodes present: nothing to prune under this criterion.
              crate::debug!(2, "No end nodes found in Trie1; skipping end-reachability pruning.");
              return;
          }

          // Reverse BFS: mark all nodes that can reach some end node
          while let Some(d) = q.pop_front() {
              if let Some(srcs) = incoming.get(&d) {
                  for s in srcs {
                      if productive.insert(*s) {
                          q.push_back(*s);
                      }
                  }
              }
          }

          let total_nodes = all_nodes.len();
          let productive_nodes = productive.len();
          let prunable = total_nodes.saturating_sub(productive_nodes);
          crate::debug!(2, "Trie1 end-reachability: total={}, productive={}, prunable={}", total_nodes, productive_nodes, prunable);
          if prunable == 0 {
              return;
          }

          // Remove any edge to a non-productive destination, recompute node live_tokens
          for n in &all_nodes {
              let mut w = n.write(trie1_god).expect("write");
              let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in w.children().clone() {
                  let mut new_dm: OrderedHashMap<PrecomputeNode1Index, LLMTokenBV> = OrderedHashMap::new();
                  for (dst, bv) in dm {
                      if productive.contains(&dst) {
                          new_dm.insert(dst, bv);
                      }
                  }
                  if !new_dm.is_empty() {
                      new_children.insert(ek, new_dm);
                  }
              }
              *w.children_mut() = new_children;
              // Recompute live_tokens = union of outgoing edge masks
              let mut lt = LLMTokenBV::zeros();
              for dm in w.children().values() {
                  for bv in dm.values() {
                      lt |= bv;
                  }
              }
              w.value.live_tokens = lt;
          }

          // GC everything now unreachable from roots and recompute depths
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::gc(trie1_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);

          crate::debug!(2, "Finished end-reachability pruning in Trie1.");
      }

      fn prune_on_no_terminal_follow_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
          terminal_follow_map: &BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          ignore_terminal_id: Option<TerminalID>,
      ) {
          crate::debug!(2, "Pruning Trie1 based on terminal follow sets.");

          let initial_nodes_and_values: Vec<_> = roots.values()
              .map(|root_arc| (root_arc.clone(), None))
              .collect();

          type NodePtr = *const PrecomputeNode1;
          let mut edges_to_keep: HashMap<NodePtr, BTreeSet<Option<GrammarTokenID>>> = HashMap::new();

          Trie::special_map(
              trie1_god,
              initial_nodes_and_values,
              |predecessors: &Option<BTreeSet<GrammarTokenID>>, edge_key: &Option<GrammarTokenID>, _edge_bv, _child_node| {
                  match edge_key {
                      Some(t) if Some(*t) == ignore_terminal_id => Some(predecessors.clone()),
                      Some(t) => Some(Some(BTreeSet::from([*t]))),
                      None => Some(predecessors.clone()),
                  }
              },
              |existing_set, new_set| {
                  match (existing_set, new_set) {
                      (None, _) => {},
                      (existing_set @ _, None) => *existing_set = None,
                      (Some(existing), Some(new)) => existing.extend(new),
                  }
              },
              |node, maybe_all_immediate_predecessors| {
                  if maybe_all_immediate_predecessors.is_none() {
                      return true;
                  }

                  let mut allowed_follow_terminals = BTreeSet::new();
                  if let Some(all_immediate_predecessors) = &*maybe_all_immediate_predecessors {
                      for preceding_terminal in all_immediate_predecessors {
                          if let Some(follow_set) = terminal_follow_map.get(preceding_terminal) {
                              allowed_follow_terminals.extend(follow_set.iter().cloned());
                          }
                      }
                  }

                  let keys_to_keep: BTreeSet<_> = node.children().keys().filter(|edge_key| {
                      match edge_key {
                          Some(edge_terminal) => allowed_follow_terminals.contains(edge_terminal) || Some(*edge_terminal) == ignore_terminal_id,
                          None => true,
                      }
                  }).cloned().collect();

                  let node_ptr: NodePtr = node;
                  edges_to_keep.insert(node_ptr, keys_to_keep);
                  true
              },
          );

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          for node_arc in all_nodes {
              let node_ptr: NodePtr = {
                  let guard = node_arc.read(trie1_god).expect("poison");
                  &*guard as *const _
              };
              if let Some(keys_to_keep) = edges_to_keep.get(&node_ptr) {
                  let mut node_guard = node_arc.write(trie1_god).unwrap();
                  node_guard.children_mut().retain(|k, _| keys_to_keep.contains(k));
              }
          }

          crate::debug!(2, "Finished pruning Trie1 based on terminal follow sets.");
      }

      fn factor_common_destinations_trie1(
          roots: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Factoring out common destinations in Trie1.");
          const MIN_INCOMING_EDGES_FOR_FACTORING: usize = 3;

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          let arc_map: HashMap<_, _> = all_nodes.iter().map(|n| (n, n.clone())).collect();

          let mut incoming_map: HashMap<
              PrecomputeNode1Index,
              HashMap<
                  Option<GrammarTokenID>,
                  Vec<(PrecomputeNode1Index, LLMTokenBV)>,
              >,
          > = HashMap::new();

          for src_arc in &all_nodes {
              let src_ptr = src_arc;
              let guard = src_arc.read(trie1_god).expect("poison");
              for (edge_key, dest_map) in guard.children() {
                  if edge_key.is_some() {
                      for (dest_wrapper, bv) in dest_map {
                          let dest_arc = dest_wrapper.as_arc();
                          let dest_ptr = dest_arc;
                          incoming_map.entry(*dest_ptr).or_default().entry(edge_key.clone()).or_default().push((*src_ptr, bv.clone()));
                      }
                  }
              }
          }

          for (dest_ptr, edges_by_key) in incoming_map {
              for (edge_key, sources) in edges_by_key {
                  if sources.len() >= MIN_INCOMING_EDGES_FOR_FACTORING {
                      let dest_arc = arc_map.get(&dest_ptr).unwrap().clone();
                      let intermediate_node = PrecomputeNode1Index::new(trie1_god.insert(PrecomputeNode1::new(PrecomputedNodeContents::internal())));

                      let mut union_bv = LLMTokenBV::zeros();
                      for (_, bv) in &sources {
                          union_bv |= bv;
                      }

                      {
                          let mut intermediate_guard = intermediate_node.write(trie1_god).expect("poison");
                          let mut edge_val_opt = Some(union_bv.clone());
                          intermediate_guard.try_insert_unchecked(edge_key.clone(), &mut edge_val_opt, dest_arc.clone());
                          intermediate_guard.value.live_tokens |= &union_bv;
                      }

                      for (src_ptr, bv) in &sources {
                          let src_arc = arc_map.get(src_ptr).unwrap();
                          let mut src_guard = src_arc.write(trie1_god).expect("poison");

                          if let Some(dest_map_for_key) = src_guard.children_mut().get_mut(&edge_key) {
                              dest_map_for_key.remove(&dest_arc.clone());
                              if dest_map_for_key.is_empty() {
                                  src_guard.children_mut().remove(&edge_key);
                              }
                          }

                          let mut edge_val_opt = Some(bv.clone());
                          src_guard.try_insert_unchecked(None, &mut edge_val_opt, intermediate_node.clone());
                          src_guard.value.live_tokens |= bv;
                      }
                  }
              }
          }
          crate::debug!(2, "Finished factoring common destinations in Trie1.");
      }

      /// Fully flattens all None edges (epsilon edges) by computing a per-node epsilon-closure
      /// and replacing every node's outgoing edges with keyed edges only.
      ///
      /// For a node A:
      /// - Start from A's existing keyed edges (Some(t) -> {dst -> bv}).
      /// - For each None-edge A -(None, bv1)-> B, compose B's already-flattened keyed edges
      ///   with bv1 via intersection: bv_final = bv1 & bv_child_edge, and union into A's map.
      /// - Replace A's children with this new keyed-only map, recompute live_tokens.
      ///
      /// Notes:
      /// - We never turn A into an end node via None-closure. That would be unsound for partial masks.
      ///   End detection remains tied to explicit keyed paths to leaf/end nodes, which is how get_mask1 uses it.
      /// - We process nodes in descending max_depth so children are flattened before parents.
      fn flatten_all_none_edges_trie1(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Flattening None edges in Trie1 via epsilon-closure (keyed-only rewrite)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec);

          let mut all_nodes = Trie::all_nodes(trie1_god, &roots_vec);
          // Sort by descending depth so that children are processed (flattened) first.
          all_nodes.sort_by_key(|idx| {
              idx.read(trie1_god).expect("read").max_depth
          });
          all_nodes.reverse();

          // Cache of flattened keyed edges per node (None edges removed).
          // Key: node index -> map: Some(terminal) -> OrderedHashMap<dst, bv>
          let mut flat_cache: HashMap<
              PrecomputeNode1Index,
              BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>>
          > = HashMap::new();

          // Work backwards from deepest leaves
          for node_idx in &all_nodes {
              // Snapshot current children to avoid lock re-entrancy
              let children_snapshot: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = {
                  let g = node_idx.read(trie1_god).expect("read");
                  g.children().clone()
              };

              // Start with direct keyed edges
              let mut new_children: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = BTreeMap::new();
              for (ek, dm) in &children_snapshot {
                  if ek.is_some() {
                      let dest_map = new_children.entry(ek.clone()).or_default();
                      for (dst, bv) in dm {
                          dest_map.entry(*dst)
                              .and_modify(|e| *e |= bv)
                              .or_insert(bv.clone());
                      }
                  }
              }

              // Compose None edges with child's flattened keyed edges (if any)
              if let Some(none_dest_map) = children_snapshot.get(&None) {
                  for (child_idx, bv_none_edge) in none_dest_map {
                      if bv_none_edge.is_empty() { continue; }

                      // Child should have been flattened already given descending order
                      if let Some(child_flat) = flat_cache.get(child_idx) {
                          for (ek2, dm2) in child_flat {
                              // Only keyed edges should exist in child_flat, but guard anyway.
                              if ek2.is_none() { continue; }
                              let dest_map = new_children.entry(ek2.clone()).or_default();
                              for (dst2, bv_child) in dm2 {
                                  let mut composed = bv_none_edge.clone();
                                  composed &= bv_child;
                                  if composed.is_empty() { continue; }
                                  dest_map.entry(*dst2)
                                      .and_modify(|e| *e |= &composed)
                                      .or_insert(composed);
                              }
                          }
                      } else {
                          // In well-ordered DAG, this should not happen. Fall back to using child's immediate keyed edges (unflattened).
                          let child_children_snapshot: BTreeMap<Option<GrammarTokenID>, OrderedHashMap<PrecomputeNode1Index, LLMTokenBV>> = {
                              let cg = child_idx.read(trie1_god).expect("read");
                              cg.children().clone()
                          };
                          for (ek2, dm2) in child_children_snapshot {
                              if ek2.is_none() { continue; }
                              let dest_map = new_children.entry(ek2.clone()).or_default();
                              for (dst2, bv_child) in dm2 {
                                  let mut composed = bv_none_edge.clone();
                                  composed &= &bv_child;
                                  if composed.is_empty() { continue; }
                                  dest_map.entry(dst2)
                                      .and_modify(|e| *e |= &composed)
                                      .or_insert(composed);
                              }
                          }
                      }
                  }
              }

              // Write back: replace children with keyed-only map and recompute live_tokens
              {
                  let mut w = node_idx.write(trie1_god).expect("write");
                  *w.children_mut() = new_children.clone();
                  // Recompute live_tokens as union of all edge masks
                  let mut lt = LLMTokenBV::zeros();
                  for dm in w.children().values() {
                      for bv in dm.values() {
                          lt |= bv;
                      }
                  }
                  w.value.live_tokens = lt;
                  // Do NOT change w.value.end here. End detection remains via keyed paths.
              }

              flat_cache.insert(*node_idx, new_children);
          }

          // Cleanup: recompute depths and GC to drop eliminated intermediates
          let roots_vec2: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);
          Trie::gc(trie1_god, &roots_vec2);
          Trie::recompute_all_max_depths(trie1_god, &roots_vec2);

          crate::debug!(2, "Done flattening None edges in Trie1.");
      }

      fn merge_nodes_trie1(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) {
          crate::debug!(2, "Merging identical subtrees in Trie1.");
          let mut canonical_nodes: HashMap<PrecomputeNode1, PrecomputeNode1Index> = HashMap::new();
          let mut visited: HashMap<PrecomputeNode1Index, PrecomputeNode1Index> = HashMap::new();

          let mut new_roots = BTreeMap::new();
          for (sid, root_arc) in roots.iter() {
              let canonical_root = deduplicate_recursive_trie1(root_arc.clone(), &mut canonical_nodes, &mut visited, trie1_god);
              new_roots.insert(*sid, canonical_root);
          }
          *roots = new_roots;
          crate::debug!(2, "Finished merging subtrees in Trie1. Canonical nodes: {}", canonical_nodes.len());
      }

      fn deduplicate_recursive_trie1(
          node_arc: PrecomputeNode1Index,
          canonical_nodes: &mut HashMap<PrecomputeNode1, PrecomputeNode1Index>,
          visited: &mut HashMap<PrecomputeNode1Index, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) -> PrecomputeNode1Index {
          let node_ptr = node_arc;
          if let Some(canonical_arc) = visited.get(&node_ptr) {
              return canonical_arc.clone();
          }

          // Mark as visited early to break potential cycles.
          visited.insert(node_ptr, node_arc.clone());

          // Snapshot children under a short-lived read lock, then drop it before recursing.
          let children_snapshot: Vec<(
              Option<GrammarTokenID>,
              Vec<(PrecomputeNode1Index, LLMTokenBV)>,
          )> = {
              let g = node_arc.read(trie1_god).unwrap();
              g.children()
                  .iter()
                  .map(|(ek, dest_map)| {
                      let entries = dest_map
                          .iter()
                          .map(|(node_ptr, ev)| (node_ptr.clone(), ev.clone()))
                          .collect::<Vec<_>>();
                      (ek.clone(), entries)
                  })
                  .collect()
          };

          // Rebuild children map with canonicalized children (no locks held on the current node).
          let mut new_children_map = BTreeMap::new();
          let mut children_changed = false;
          for (edge_key, entries) in children_snapshot {
              let mut new_dest_map = OrderedHashMap::new();
              for (child_arc, edge_val) in entries {
                  let canonical_child_arc = deduplicate_recursive_trie1(
                      child_arc.clone(),
                      canonical_nodes,
                      visited,
                      trie1_god,
                  );
                  if child_arc != canonical_child_arc {
                      children_changed = true;
                  }
                  new_dest_map.insert(canonical_child_arc, edge_val);
              }
              if !new_dest_map.is_empty() {
                  new_children_map.insert(edge_key, new_dest_map);
              }
          }

          // Write back updated children; avoid recompute_max_depth here to prevent lock re-entrancy.
          if children_changed {
              let mut g = node_arc.write(trie1_god).unwrap();
              *g.children_mut() = new_children_map;
              // Depths are recomputed globally after merging:
              // Trie::recompute_all_max_depths(...) is invoked by the caller.
          }

          // Canonicalize the current node by content after potential child rewrites.
          let canonical_arc = {
              let g = node_arc.read(trie1_god).unwrap();
              let node_content = (*g).clone();
              canonical_nodes
                  .entry(node_content)
                  .or_insert_with(|| node_arc.clone())
                  .clone()
          };

          visited.insert(node_ptr, canonical_arc.clone());
          canonical_arc
      }
