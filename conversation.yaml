                      // ---- single REDUCE ----------------------------------------------
                      Some(Stage7ShiftsAndReduces::Reduce { nonterminal_id, len, .. }) => {
                          let new_stacks = self.perform_reduction(stack, *len, *nonterminal_id, cur_t);
