          fn popn_fast(&self, n: usize) -> Vec<(usize, PyGSSNode)> {
              let pairs = popn_collect_fast(&self.inner, n);
              pairs.into_iter()
                  .map(|(sid, arc)| (sid.0, PyGSSNode { inner: arc }))
                  .collect()
          }

          fn print_stats(&self) {
