              node_a.lock().unwrap().force_insert_to_node("a->b", "e8", &node_b);
              node_b.lock().unwrap().force_insert_to_node("b->c", "e9", &node_c);
              node_c.lock().unwrap().force_insert_to_node("c->a", "e10", &node_a); // Cycle C -> A
