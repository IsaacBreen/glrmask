                          # Collect all parents from GSS after popping 'pop_val'
                          peeks: List[Tuple[int, ffi.GSSNode]] = []
                          for g in gss_set:
                              peeks.extend(g.popn_fast(pop_val))
                          if not peeks:
                              continue

                          sid_to_parents: Dict[int, List[ffi.GSSNode]] = {}
                          eps_parents: Optional[Set[ffi.GSSNode]] = None

