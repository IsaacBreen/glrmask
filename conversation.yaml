          if roots.is_empty() {
              return "GSS Forest: (No roots)".to_string();
          }

          writeln!(&mut output, "GSS Forest Roots (Max Nodes: {}):", max_nodes).unwrap();

          for (i, root_arc) in roots.iter().enumerate() {
