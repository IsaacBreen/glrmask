      pub fn merge_and_build_automaton(
          start_tuple: ProductTuple,
          components: &[Vec<BTreeMap<usize, usize>>],
          alphabet_size: usize,
      ) -> (Vec<ProductTuple>, HashMap<ProductTuple, usize>) {
          let inst = Instance {
              start: start_tuple,
              components: components.to_vec(),
              alphabet_size,
          };
          let sol = synthesize_greedy(&inst);
          (sol.reps, sol.image)
      }

