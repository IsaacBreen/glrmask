              }
          }

          /// A bitset is simple if it has a small number of ranges, making operations fast
          /// enough that caching overhead is not worthwhile.
          pub fn is_simple(&self) -> bool {
              self.inner.ranges_len() < cache::SIMPLE_BITSET_THRESHOLD
          }

