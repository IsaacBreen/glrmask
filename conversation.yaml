              let result_node_chain = arena
                  .insert_edge(source_chain, edge_key_chain, new_ev_chain.clone(), merge_bitset_union, |_, _| {}, |_, _| {})
                  .try_children()
                  .else_create_destination_with_value(created_val.clone())
