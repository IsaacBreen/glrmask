      // --- Part 1: SimpleBitset ---

      const STOCHASTIC_DEBUG: bool = true; // Set to true to enable expensive stochastic validation

      thread_local! {
          static IN_SIMPLIFY_CHECK: Cell<bool> = Cell::new(false);
