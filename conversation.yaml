        mkdir -p "${PROJECT_ROOT}/.build"

        if [ ! -d "$BOOST_DIR" ]; then
          BOOST_TGZ="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
