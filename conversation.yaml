              // Worklist empty. Final R = [(0,0), (1,1)]. Size 2. This is minimal.
              assert_eq!(sol.reps.len(), 2);
              assert_eq!(sol.reps[0], vec![Some(0), Some(0)]);
              assert_eq!(sol.reps[1], vec![Some(1), Some(1)]);
