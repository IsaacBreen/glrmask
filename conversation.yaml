              val_memo = {}
              def wrapper(acc):
                  acc_id = id(acc)
                  if acc_id in id_memo:
                      if stats_prefix:
                          Stats.get().inc(f'{stats_prefix}.memo_hits')
                      return id_memo[acc_id]

