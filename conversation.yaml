              if phase_budgets[5] > 0:
                  print(f"\n--- Phase 5: Sweeping unreachable tokens (forward/backward reachability) (budget: {phase_budgets[5]}s) ---")
                  time_budget_deadline = time.time() + phase_budgets[5]
