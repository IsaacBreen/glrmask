              let max_original_llm_token_id = if next_llm_id_val == 0 { 0 } else { next_llm_id_val - 1 };

              // Define a conceptual EOF token ID (not in llm_token_map for precomputation)
              let eof_llm_token_id = LLMTokenID(next_llm_id_val);


