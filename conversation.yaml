         - The elimination still creates a transient blow-up (it is unavoidable in general), but the immediate follow-up minimization collapses redundant copies right away, dramatically reducing the peak retained size. Practically this also stabilizes and lowers the totals at the end of each super-pass and especially at the end of the run (the last super-pass previously ended with an elimination but no merge).
