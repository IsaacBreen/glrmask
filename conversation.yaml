      use std::cell::RefCell;
      use std::collections::{BTreeMap, VecDeque};
      use std::env;
      use std::time::Instant;

      use chrono::Local;

      use crate::constraint::{LLMTokenBV, PrecomputeNode1Index, Trie1GodWrapper};
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::glr::parser::{ExpectElse, GLRParser};
      use crate::json_serialization::JSONConvertible;
      use crate::precompute4::nwa_optimizations::{
          prune_continuations_from_final_states, simplify_default_transitions,
      };
      use crate::precompute4::resolve_negatives::{
          apply_cancellations, apply_finality_fixpoint, remove_negative_transitions,
      };
      use crate::precompute4::template_nwa::{
          build_epsilon_dwa, build_ignore_terminal_dwa, build_template_dwas,
      };
      use crate::precompute4::weighted_automata::{DWA, NWA, NWAStates, NWABody, Weight};
      use crate::r#macro::is_debug_level_enabled;
      use crate::tokenizer::TokenizerStateID;



      struct SimplifyRustfstConfig {
          rm_epsilon: bool,
          determinize: bool,
      }

      impl SimplifyRustfstConfig {
          fn default() -> Self {
              Self {
                  rm_epsilon: false,
                  determinize: false,
              }
          }

          fn with_rm_epsilon(mut self, val: bool) -> Self {
              self.rm_epsilon = val;
              self
          }

          fn with_determinize(mut self, val: bool) -> Self {
              self.determinize = val;
              self
          }
      }

      impl NWA {
          pub fn determinize_to_dwa_with_rustfst(&self) -> DWA {
              self.determinize_to_dwa()
          }

          pub fn simplify_rustfst(&mut self) {
              self.simplify();
          }

          pub fn simplify_rustfst_with_config(&mut self, config: SimplifyRustfstConfig) {
              self.simplify();
          }
      }


      // Re-export for backward compatibility: `FullDWABuildError` used to be defined here.
      pub use crate::precompute4::template_nwa::FullDWABuildError;

      pub type Precomputed4 = DWA;

      /// Public API: precompute4 using an NWA-first approach, determinizing at the end.
      pub fn precompute4(
          parser: &GLRParser,
          precomputed1: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>,
          trie1_god: &Trie1GodWrapper,
      ) -> DWA {
          let now_total = Instant::now();
          let now = Instant::now();
          crate::debug!(5, "Starting precompute4...");

          // 1. Build template DWAs for all terminals.
          let template_dwas = match build_template_dwas(parser) {
              Ok(m) => m,
              Err(e) => panic!("Failed to build template DWAs: {:?}", e),
          };
          let ignore_dwa = build_ignore_terminal_dwa();
          crate::debug!(
              4,
              "Built {} template DWAs in {:?}",
              template_dwas.len(),
              now.elapsed()
          );
          if is_debug_level_enabled(5) {
              for (term, dwa) in template_dwas.iter().take(5) {
                  crate::debug!(5, "Stats for template DWA for terminal {:?}:\n{}", term, dwa.stats());
              }
          }

          // 2. Set up shared NWA state arena.
          let states_arena = RefCell::new(NWAStates::default());

          // 3. Reverse the precompute1 trie.
          let trie1_roots: Vec<_> = precomputed1.values().cloned().collect();

          let all_nodes = Trie::all_nodes(trie1_god, &trie1_roots);

          let leaf_node = all_nodes
              .iter()
              .find_map(|&idx| {
                  idx.read(trie1_god)
                      .and_then(|g| if g.value.end { Some(idx) } else { None })
              })
              .expect("Precompute1 trie must have a single leaf node.");

          let reversed_trie1_god = Trie::reverse(trie1_god, &trie1_roots);
          let reversed_trie_root = leaf_node;

          // 4. Traverse the reversed trie with NWA bodies.
          let initial_nwa_body = {
              let mut states = states_arena.borrow_mut();
              let start = states.add_state();
              states[start].final_weight = Some(Weight::all());
              NWABody { start_state: start }
          };
          let initial_tokens = LLMTokenBV::max_ones();
          let initial_values: Vec<(
              Trie2Index,
              (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV),
          )> = vec![(
              reversed_trie_root,
              (
                  BTreeMap::from([(initial_nwa_body, vec![initial_nwa_body])]),
                  initial_tokens,
              ),
          )];
          let traversal_data = Trie::compute_traversal_data(&reversed_trie1_god, &[reversed_trie_root])
              .expect("Failed to compute traversal data for reversed trie1");
          let mut original_trie1_roots_map: BTreeMap<PrecomputeNode1Index, Vec<TokenizerStateID>> =
              BTreeMap::new();
          for (k, v) in precomputed1.iter() {
              original_trie1_roots_map
                  .entry(*v)
                  .or_default()
                  .push(*k);
          }

          let options = crate::datastructures::trie::PrettyPrintOptions::default()
              .omit_nodes()
              .omit_depth();
          crate::debug!(
              5,
              "Trie:\n{}",
              Trie::pretty_print_with_options(&trie1_god, &trie1_roots, &options)
          );
          crate::debug!(
              5,
              "Reversed trie:\n{}",
              Trie::pretty_print_with_options(&reversed_trie1_god, &[reversed_trie_root], &options)
          );

          let mut final_bodies: BTreeMap<TokenizerStateID, NWABody> = BTreeMap::new();

          let now = Instant::now();
          Trie::special_map_grouped(
              &reversed_trie1_god,
              &traversal_data,
              initial_values,
              // step function
              |current_val: &(NWABody, LLMTokenBV), edge_terminal_opt, dest_map| {
                  let (current_nwa_body, current_tokens) = current_val;
                  let template_dwa: &DWA = match edge_terminal_opt {
                      Some(terminal_id) if Some(*terminal_id) != parser.ignore_terminal_id => template_dwas
                          .get(&terminal_id)
                          .expect_else(|| format!("No template DWA for terminal {:?}", terminal_id)),
                      _ => &ignore_dwa,
                  };

                  let mut results: Vec<(
                      PrecomputeNode1Index,
                      (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV),
                  )> = Vec::new();
                  for (dest_idx, llm_token_bv) in dest_map.iter() {
                      let next_tokens = current_tokens & llm_token_bv;
                      if next_tokens.is_empty() {
                          continue;
                      }

                      let left_body = instantiate_template_nwa(
                          &states_arena,
                          template_dwa,
                          &edge_terminal_opt,
                          llm_token_bv,
                      );

                      results.push((
                          *dest_idx,
                          (BTreeMap::from([(*current_nwa_body, vec![left_body])]), next_tokens),
                      ));
                  }
                  results
              },
              // merge function: union them via epsilon
              |val1: &mut (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV),
               val2: (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV)| {
                  let (bodies1, tokens1) = val1;
                  let (bodies2, tokens2) = val2;
                  for (right_body, left_bodies) in bodies2 {
                      bodies1
                          .entry(right_body)
                          .or_default()
                          .extend(left_bodies);
                  }
                  *tokens1 |= &tokens2;
              },
              // process function: capture at original roots
              |_node_data, node_idx, val: (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV)| {
                  let (nwa_bodies_map, tokens) = val;
                  // Combine all left bodies into a single NWA body via union (epsilon)
                  let mut nwa_body = {
                      let mut states = states_arena.borrow_mut();
                      let start = states.add_state();
                      NWABody { start_state: start }
                  };
                  crate::debug!(6, "NWA states:\n{}", states_arena.borrow());
                  crate::debug!(6, "{:?}", nwa_bodies_map);
                  for (right_body, left_bodies) in nwa_bodies_map {
                      if left_bodies.is_empty() {
                          continue;
                      }

                      let left_bodies_union = union_left_bodies(&states_arena, left_bodies);
                      let mut states = states_arena.borrow_mut();
                      let composed_body = NWA::concatenate_components(
                          &mut states,
                          &left_bodies_union,
                          &right_body,
                          &Weight::all(),
                      );
                      nwa_body = NWA::union_components(&mut states, &nwa_body, &composed_body);
                  }

                  crate::debug!(
                      6,
                      "At trie node {:?}, obtained NWA body with start state {} and {} states.",
                      node_idx,
                      nwa_body.start_state,
                      states_arena.borrow().len()
                  );
                  crate::debug!(6, "NWA body:\n{}", nwa_body);
                  crate::debug!(6, "NWA states:\n{}", states_arena.borrow());

                  if !tokens.is_empty() {
                      if let Some(tokenizer_state_ids) = original_trie1_roots_map.get(&node_idx) {
                          for tokenizer_state_id in tokenizer_state_ids {
                              final_bodies.insert(*tokenizer_state_id, nwa_body.clone());
                          }
                      }
                      Some((nwa_body, tokens)) // continue traversal
                  } else {
                      None
                  }
              },
          );
          crate::debug!(
              4,
              "Reversed trie traversal (special_map_grouped) took: {:?}",
              now.elapsed()
          );

          // Combine all final NWA bodies into a single NWA
          let mut combined_nwa_states = states_arena.into_inner();
          let combined_start_state = combined_nwa_states.add_state();

          for (tok_id, body) in final_bodies {
              // Add a transition from the new combined start state to the start of the NWA for this tokenizer state.
              // The label is the tokenizer state ID.
              let label = tok_id.0 as i16;
              combined_nwa_states
                  .add_transition(combined_start_state, label, body.start_state, Weight::all())
                  .unwrap();
          }

          let combined_nwa = NWA {
              states: combined_nwa_states,
              body: NWABody {
                  start_state: combined_start_state,
              },
          };

          let final_dwa = optimize_and_determinize(parser, combined_nwa);
          crate::debug!(3, "Total precompute4 time: {:?}", now_total.elapsed());
          final_dwa
      }

      fn optimize_and_determinize(parser: &GLRParser, mut combined_nwa: NWA) -> DWA {
          combined_nwa.simplify_rustfst();
          crate::debug!(
              5,
              "Resolving negative codes in combined NWA: {}",
              combined_nwa
          );
          crate::debug!(
              4,
              "Combined NWA has {} states.",
              combined_nwa.states.len()
          );
          crate::debug!(
              4,
              "Stats for combined NWA before negative resolution:\n{}",
              combined_nwa.stats()
          );

          let now = Instant::now();
          crate::debug!(4, "Starting negative code resolution...");
          apply_cancellations(&mut combined_nwa);
          apply_finality_fixpoint(&mut combined_nwa);
          remove_negative_transitions(&mut combined_nwa);
          combined_nwa.simplify_rustfst();
          crate::debug!(
              4,
              "Negative code resolution took: {:?}. NWA now has {} states.",
              now.elapsed(),
              combined_nwa.states.len()
          );
          crate::debug!(
              4,
              "Stats for combined NWA after negative resolution:\n{}",
              combined_nwa.stats()
          );

          let now = Instant::now();
          crate::debug!(4, "Pruning continuations from final states...");
          prune_continuations_from_final_states(&mut combined_nwa);
          simplify_remove_epsilon(&mut combined_nwa);
