                  new_dest_map.entry(canonical_child_arc)
                      .and_modify(|ev: &mut LLMTokenBV| *ev |= &edge_val)
                      .or_insert(edge_val);
              }
              if !new_dest_map.is_empty() {
                  new_children_map.insert(edge_key, new_dest_map);
              }
          }

          let key = MergeKey {
              end: is_end,
              children: new_children_map.clone(),
