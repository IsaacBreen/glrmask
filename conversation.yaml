              ("b", true),
              ("ba", true),
              ("baa", true),
              ("a", false), // Cannot start with 'a'
              ("bb", false), // Cannot have two 'b's
          ];

          for (input, expected_match) in test_cases {
              let tokens = tokenize(&parser, input);
              let mut state: GLRParserState<'_, ()> = parser.init_glr_parser();
