    src/precompute4/weighted_automata/dwa.rs: |
      // src/precompute4/weighted_automata/dwa.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{format_pos_code, I16Map, StateID, Weight};
      use std::collections::{BTreeMap, HashMap, VecDeque};
      use std::fmt::{self, Display, Formatter};
      use std::ops::{Deref, Index, IndexMut};

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum DWABuildError {
          TransitionAlreadyExists { from: StateID, on: i16 },
          DefaultTransitionAlreadyExists { from: StateID },
          StateOutOfBounds { state: StateID },
      }

      impl Display for DWABuildError {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              match self {
                  DWABuildError::TransitionAlreadyExists { from, on } => {
                      write!(f, "Transition from state {} on code {} already exists", from, on)
                  }
                  DWABuildError::DefaultTransitionAlreadyExists { from } => {
                      write!(f, "Default transition from state {} already exists", from)
                  }
                  DWABuildError::StateOutOfBounds { state } => write!(f, "State {} is out of bounds", state),
              }
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAState {
          pub transitions: I16Map<StateID>,
          pub final_weight: Option<Weight>,
          pub trans_weight_default: Option<Weight>,
          pub trans_weights_exceptions: BTreeMap<i16, Weight>,
          /// Optional state-entry weight (intersected upon entering the state).
          pub state_weight: Option<Weight>,
      }

      impl DWAState {
          pub fn get_weight(&self, ch: i16) -> Option<&Weight> {
              self.trans_weights_exceptions.get(&ch).or(self.trans_weight_default.as_ref())
          }

          /// Intersects all weights in this state with the given weight.
          pub fn apply_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw &= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw &= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd &= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w &= weight;
              }
          }

          /// Subtracts a weight from all weights in this state.
          pub fn exclude_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw -= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw -= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd -= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w -= weight;
              }
          }

          /// Iterator over all outgoing edges:
          /// - Default edge appears as (None, target, weight)
          /// - Exception edges appear as (Some(label), target, weight)
          #[inline]
          pub fn iter_edges(&self) -> impl Iterator<Item = (Option<i16>, StateID, &Weight)> {
              let def_iter = self
                  .transitions
                  .default
                  .and_then(|to| self.trans_weight_default.as_ref().map(move |w| (to, w)))
                  .into_iter()
                  .map(|(to, w)| (None, to, w));
              let ex_iter = self
                  .transitions
                  .exceptions
                  .iter()
                  .filter_map(|(ch, to)| self.trans_weights_exceptions.get(ch).map(|w| (Some(*ch), *to, w)));
              def_iter.chain(ex_iter)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAStates(pub Vec<DWAState>);

      impl Index<usize> for DWAStates {
          type Output = DWAState;
          fn index(&self, index: usize) -> &Self::Output {
              &self.0[index]
          }
      }
      impl IndexMut<usize> for DWAStates {
          fn index_mut(&mut self, index: usize) -> &mut Self::Output {
              &mut self.0[index]
          }
      }
      impl Deref for DWAStates {
          type Target = [DWAState];
          fn deref(&self) -> &Self::Target {
              &self.0
          }
      }
      impl DWAStates {
          pub fn len(&self) -> usize {
              self.0.len()
          }
          pub fn add_state(&mut self) -> StateID {
              let id = self.0.len();
              self.0.push(DWAState::default());
              id
          }

          /// Adds a pre-existing DWAState to the collection and returns its new ID.
          pub fn add_existing_state(&mut self, state: DWAState) -> StateID {
              let id = self.0.len();
              self.0.push(state);
              id
          }

          pub fn copy_state(&mut self, state_id: StateID) -> StateID {
              assert!(state_id < self.len(), "state_id out of bounds");
              let state = self[state_id].clone();
              self.add_existing_state(state)
          }

          pub fn apply_weight(&mut self, state_id: StateID, weight: &Weight) {
              assert!(state_id < self.len(), "state_id out of bounds");
              self[state_id].apply_weight(weight);
          }

          pub fn copy_subgraph(&mut self, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= self.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(self[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = self[old_id].clone();

                  // Remap default transition
                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  // Remap exception transitions
                  let mut new_exceptions = BTreeMap::new();
                  for (ch, &old_target) in &old_state_clone.transitions.exceptions {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      new_exceptions.insert(*ch, new_target_id);
                  }
                  self[new_id].transitions.exceptions = new_exceptions;
              }
              (new_start_id, remap)
          }

          pub fn copy_subgraph_from(&mut self, other_states: &DWAStates, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= other_states.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(other_states[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = other_states[old_id].clone();

                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  self[new_id].transitions.exceptions = old_state_clone.transitions.exceptions.iter().map(|(ch, &old_target)| {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      (*ch, new_target_id)
                  }).collect();
              }
              (new_start_id, remap)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWABody {
          pub start_state: StateID,
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWA {
          pub states: DWAStates,
          pub body: DWABody,
      }

      impl DWA {
          pub fn new() -> Self {
              let mut states = DWAStates::default();
              let start = states.add_state();
              DWA { states, body: DWABody { start_state: start } }
          }

          pub fn add_state(&mut self) -> StateID {
              self.states.add_state()
          }

          pub fn set_state_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].state_weight = Some(weight);
              Ok(())
          }

          pub fn set_final_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].final_weight = Some(weight);
              Ok(())
          }

          pub fn add_transition(
              &mut self,
              from: StateID,
              on: i16,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.exceptions.contains_key(&on) {
                  return Err(DWABuildError::TransitionAlreadyExists { from, on });
              }
              from_state.transitions.exceptions.insert(on, to);
              from_state.trans_weights_exceptions.insert(on, weight);
              Ok(())
          }

          pub fn set_default_transition(
              &mut self,
              from: StateID,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.default.is_some() {
                  return Err(DWABuildError::DefaultTransitionAlreadyExists { from });
              }
              from_state.transitions.default = Some(to);
              from_state.trans_weight_default = Some(weight);
              Ok(())
          }
      }

      #[derive(Debug, Clone)]
      pub struct DWAStats {
          pub num_states: usize,
          pub num_transitions: usize,
          pub num_final_states: usize,
          pub num_default_transitions: usize,
          pub avg_exceptions_per_state: f64,
      }

      impl Display for DWAStats {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "DWA Stats:")?;
              writeln!(f, "  - States: {}", self.num_states)?;
              writeln!(f, "  - Transitions: {}", self.num_transitions)?;
              writeln!(f, "  - Final States: {}", self.num_final_states)?;
              writeln!(f, "  - States with Default: {}", self.num_default_transitions)?;
              writeln!(f, "  - Avg Exceptions/State: {:.2}", self.avg_exceptions_per_state)
          }
      }

      impl DWA {
          pub fn stats(&self) -> DWAStats {
              let num_states = self.states.len();
              if num_states == 0 {
                  return DWAStats {
                      num_states: 0,
                      num_transitions: 0,
                      num_final_states: 0,
                      num_default_transitions: 0,
                      avg_exceptions_per_state: 0.0,
                  };
              }

              let mut num_exceptions = 0;
              let mut num_final_states = 0;
              let mut num_default_transitions = 0;

              for state in &self.states.0 {
                  num_exceptions += state.transitions.exceptions.len();
                  if state.final_weight.is_some() {
                      num_final_states += 1;
                  }
                  if state.transitions.default.is_some() {
                      num_default_transitions += 1;
                  }
              }

              let num_transitions = num_exceptions + num_default_transitions;
              let avg_exceptions_per_state = num_exceptions as f64 / num_states as f64;

              DWAStats {
                  num_states,
                  num_transitions,
                  num_final_states,
                  num_default_transitions,
                  avg_exceptions_per_state,
              }
          }
      }

      impl Display for DWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "DWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(sw) = &state.state_weight {
                      writeln!(f, "    state_weight: {}", sw)?;
                  }
                  if let Some(to) = &state.transitions.default {
                      if let Some(w) = &state.trans_weight_default {
                          writeln!(f, "    * -> {} (trans_weight: {})", to, w)?;
                      } else {
                          writeln!(f, "    * -> {}", to)?;
                      }
                  }
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  for (on, to) in &state.transitions.exceptions {
                      let char_repr = if *on >= 0 {
                          format_pos_code(*on)
                      } else {
                          let decoded_id = on.wrapping_sub(i16::MIN);
                          format!("neg({})", decoded_id)
                      };
                      if let Some(w) = state.trans_weights_exceptions.get(on) {
                          writeln!(f, "    {} -> {} (trans_weight: {})", char_repr, to, w)?;
                      } else {
                          writeln!(f, "    {} -> {}", char_repr, to)?;
                      }
                  }
              }
              Ok(())
          }
      }
    src/precompute4/weighted_automata/nwa.rs: |
      // src/precompute4/weighted_automata/nwa.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{format_i16_char, NWAStateID, Weight};
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};
      use std::fmt::{self, Display, Formatter};
      use std::ops::{Index, IndexMut};

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum NWABuildError {
          StateOutOfBounds { state: NWAStateID },
      }

      impl Display for NWABuildError {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              match self {
                  NWABuildError::StateOutOfBounds { state } => write!(f, "State {} is out of bounds", state),
              }
          }
      }

      /// A default transition in an NWA. It is taken for any symbol that is NOT in its `exceptions` set.
      #[derive(Clone, Debug, PartialEq, Eq, Default)]
      pub struct NWADefaultTransition {
          pub target: NWAStateID,
          pub weight: Weight,
          pub exceptions: BTreeSet<i16>,
      }
      /// - Non-epsilon transitions: unique target per input symbol.
      /// - Each transition carries a weight (Weight), which is intersected along the path; final states
      ///   carry a final weight that is intersected at acceptance; multiple alternative paths union their weights.
      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct NWAState {
          pub final_weight: Option<Weight>,
          /// Non-epsilon transitions: multiple targets per input symbol are allowed.
          /// Map: label -> Vec<(target, weight)>
          pub transitions: BTreeMap<i16, Vec<(NWAStateID, Weight)>>,
          /// Epsilon transitions: list of (target, weight).
          pub epsilons: Vec<(NWAStateID, Weight)>,
          /// Default transitions: used when a labeled transition for a symbol is absent.
          pub default: Vec<NWADefaultTransition>,
      }

      #[derive(Clone, Debug, Default)]
      pub struct NWAStates(pub Vec<NWAState>);

      impl NWAStates {
          pub fn len(&self) -> usize { self.0.len() }

          pub fn add_state(&mut self) -> NWAStateID {
              let id = self.0.len();
              self.0.push(NWAState::default());
              id
          }

          pub fn copy_state(&mut self, state_id: NWAStateID) -> NWAStateID {
              assert!(state_id < self.len(), "copy_state: state_id out of bounds");
              let new_id = self.add_state();
              self.0[new_id] = self.0[state_id].clone();
              new_id
          }

          pub fn add_epsilon(&mut self, from: NWAStateID, to: NWAStateID, w: Weight) {
              assert!(from < self.len() && to < self.len(), "add_epsilon: state id out of bounds");
              self.0[from].epsilons.push((to, w));
          }

          /// Add a labeled transition. Multiple transitions on the same label are allowed.
          pub fn add_transition(&mut self, from: NWAStateID, on: i16, to: NWAStateID, w: Weight) -> Result<(), NWABuildError> {
              if from >= self.len() {
                  return Err(NWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.len() {
                  return Err(NWABuildError::StateOutOfBounds { state: to });
              }
              self.0[from].transitions.entry(on).or_default().push((to, w));
              Ok(())
          }

          pub fn add_default_transition(&mut self, from: NWAStateID, to: NWAStateID, w: Weight, exceptions: BTreeSet<i16>) -> Result<(), NWABuildError> {
              if from >= self.len() {
                  return Err(NWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.len() {
                  return Err(NWABuildError::StateOutOfBounds { state: to });
              }
              self.0[from].default.push(NWADefaultTransition {
                  target: to,
                  weight: w,
                  exceptions,
              });
              Ok(())
          }

          /// Deep-copy a subgraph starting at 'start_id' from another NWAStates arena into self.
          /// Returns (new_start_id, remap_old_to_new)
          pub fn copy_subgraph_from(&mut self, other: &NWAStates, start_id: NWAStateID) -> (NWAStateID, HashMap<NWAStateID, NWAStateID>) {
              let mut remap: HashMap<NWAStateID, NWAStateID> = HashMap::new();
              if start_id >= other.len() {
                  let new_start = self.add_state();
                  return (new_start, remap);
              }
              let new_start = self.add_state();
              self.0[new_start] = other.0[start_id].clone();
              remap.insert(start_id, new_start);

              let mut q = VecDeque::new();
              q.push_back((start_id, new_start));

              while let Some((old, new)) = q.pop_front() {
                  // Epsilon edges
                  let eps = other.0[old].epsilons.clone();
                  self.0[new].epsilons.clear();
                  for (to_old, w) in eps {
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].epsilons.push((to_new, w.clone()));
                  }
                  // Labeled edges
                  let trans = other.0[old].transitions.clone();
                  self.0[new].transitions.clear();
                  for (lbl, targets) in trans {
                      for (to_old, w) in targets {
                          let to_new = *remap.entry(to_old).or_insert_with(|| {
                              let n = self.add_state();
                              self.0[n] = other.0[to_old].clone();
                              q.push_back((to_old, n));
                              n
                          });
                          self.0[new].transitions.entry(lbl).or_default().push((to_new, w.clone()));
                      }
                  }
                  // Default edge
                  let def_old = other.0[old].default.clone();
                  self.0[new].default.clear();
                  for def in def_old {
                      let to_old = def.target;
                      let to_new = *remap.entry(to_old).or_insert_with(|| {
                          let n = self.add_state();
                          self.0[n] = other.0[to_old].clone();
                          q.push_back((to_old, n));
                          n
                      });
                      self.0[new].default.push(NWADefaultTransition {
                          target: to_new,
                          weight: def.weight,
                          exceptions: def.exceptions,
                      });
                  }
              }

              (new_start, remap)
          }
      }

      impl Index<NWAStateID> for NWAStates {
          type Output = NWAState;
          fn index(&self, index: NWAStateID) -> &Self::Output { &self.0[index] }
      }
      impl IndexMut<NWAStateID> for NWAStates {
          fn index_mut(&mut self, index: NWAStateID) -> &mut Self::Output { &mut self.0[index] }
      }

      impl Display for NWAStates {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "NWAStates ({} states):", self.0.len())?;
              for (id, state) in self.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  if !state.default.is_empty() {
                      for def in &state.default {
                          if def.exceptions.is_empty() {
                              writeln!(f, "    * -> {} (weight: {})", def.target, def.weight)?;
                          } else {
                              writeln!(f, "    * -> {} (weight: {}, except for {:?})", def.target, def.weight, def.exceptions)?;
                          }
                      }
                  }
                  for (on, targets) in &state.transitions {
                      for (to, w) in targets {
                          let char_repr = format_i16_char(*on);
                          writeln!(f, "    {} -> {} (weight: {})", char_repr, to, w)?;
                      }
                  }
                  for (to, w) in &state.epsilons {
                      writeln!(f, "    ε -> {} (weight: {})", to, w)?;
                  }
              }
              Ok(())
          }
      }

      #[derive(Debug, Clone)]
      pub struct NWAStats {
          pub num_states: usize,
          pub num_final_states: usize,
          pub total_epsilon_transitions: usize,
          pub total_labeled_transitions: usize,
          pub total_default_transitions: usize,
          pub avg_epsilon_per_state: f64,
          pub avg_labeled_per_state: f64,
      }

      impl Display for NWAStats {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "NWA Stats:")?;
              writeln!(f, "  - States: {}", self.num_states)?;
              writeln!(f, "  - Final States: {}", self.num_final_states)?;
              writeln!(f, "  - Epsilon Transitions: {}", self.total_epsilon_transitions)?;
              writeln!(f, "  - Labeled Transitions: {}", self.total_labeled_transitions)?;
              writeln!(f, "  - Default Transitions: {}", self.total_default_transitions)?;
              writeln!(f, "  - Avg Epsilon/State: {:.2}", self.avg_epsilon_per_state)?;
              writeln!(f, "  - Avg Labeled/State: {:.2}", self.avg_labeled_per_state)
          }
      }

      impl NWA {
          pub fn stats(&self) -> NWAStats {
              let num_states = self.states.len();
              if num_states == 0 {
                  return NWAStats {
                      num_states: 0,
                      num_final_states: 0,
                      total_epsilon_transitions: 0,
                      total_labeled_transitions: 0,
                      total_default_transitions: 0,
                      avg_epsilon_per_state: 0.0,
                      avg_labeled_per_state: 0.0,
                  };
              }

              let mut num_final_states = 0;
              let mut total_epsilon_transitions = 0;
              let mut total_labeled_transitions = 0;
              let mut total_default_transitions = 0;

              for state in &self.states.0 {
                  if state.final_weight.is_some() {
                      num_final_states += 1;
                  }
                  total_epsilon_transitions += state.epsilons.len();
                  total_labeled_transitions += state.transitions.values().map(|v| v.len()).sum::<usize>();
                  total_default_transitions += state.default.len();
              }

              let avg_epsilon_per_state = total_epsilon_transitions as f64 / num_states as f64;
              let avg_labeled_per_state = total_labeled_transitions as f64 / num_states as f64;

              NWAStats {
                  num_states,
                  num_final_states,
                  total_epsilon_transitions,
                  total_labeled_transitions,
                  total_default_transitions,
                  avg_epsilon_per_state,
                  avg_labeled_per_state,
              }
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct NWABody {
          pub start_state: NWAStateID,
      }

      impl Display for NWABody {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              write!(f, "NWABody (start: {})", self.start_state)
          }
      }

      #[derive(Clone, Debug, Default)]
      pub struct NWA {
          pub states: NWAStates,
          pub body: NWABody,
      }

      impl NWA {
          pub fn new() -> Self {
              let mut states = NWAStates::default();
              let start = states.add_state();
              Self { states, body: NWABody { start_state: start } }
          }

          pub fn add_transition(&mut self, from: NWAStateID, on: i16, to: NWAStateID, w: Weight) -> Result<(), NWABuildError> {
              self.states.add_transition(from, on, to, w)
          }

          pub fn add_default_transition(&mut self, from: NWAStateID, to: NWAStateID, w: Weight, exceptions: BTreeSet<i16>) -> Result<(), NWABuildError> {
              self.states.add_default_transition(from, to, w, exceptions)
          }

          pub fn add_epsilon(&mut self, from: NWAStateID, to: NWAStateID, w: Weight) {
              self.states.add_epsilon(from, to, w);
          }
      }

      impl Display for NWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "NWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  if !state.default.is_empty() {
                      for def in &state.default {
                          if def.exceptions.is_empty() {
                              writeln!(f, "    * -> {} (weight: {})", def.target, def.weight)?;
                          } else {
                              writeln!(f, "    * -> {} (weight: {}, except for {:?})", def.target, def.weight, def.exceptions)?;
                          }
                      }
                  }
                  for (on, targets) in &state.transitions {
                      for (to, w) in targets {
                          let char_repr = format_i16_char(*on);
                          writeln!(f, "    {} -> {} (weight: {})", char_repr, to, w)?;
                      }
                  }
                  for (to, w) in &state.epsilons {
                      writeln!(f, "    ε -> {} (weight: {})", to, w)?;
                  }
              }
              Ok(())
          }
      }
    src/precompute4/weighted_automata/common.rs: |
      // src/precompute4/weighted_automata/common.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset;
      use std::collections::BTreeMap;

      pub(crate) const STOCHASTIC_DEBUG: bool = false; // Set to false by default to avoid heavy stochastic validation on large automata

      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Hash, Debug, Default)]
      pub struct I16Map<T> {
          pub exceptions: BTreeMap<i16, T>,
          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String {
          format!("{}", code)
          // let u = code as u16;
          // if let Some(c) = char::from_u32(u as u32) {
          //     if c.is_ascii_graphic() || c == ' ' {
          //         format!("'{}'", c)
          //     } else {
          //         format!("{}", u)
          //     }
          // } else {
          //     format!("{}", u)
          // }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/ops.rs: |
      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWADefaultTransition, NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use std::collections::{BTreeSet, VecDeque};

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let mut result_dwa = union_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let mut result_dwa = concat_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      impl NWA {
          /// Compute per-state future acceptance masks F[s]:
          /// F[s] = final[s] ∪ ⋃_{ε s->t}(wε ∧ F[t]) ∪ ⋃_{lbl s->t}(wlbl ∧ F[t]) ∪ (if def s->t) (wdef ∧ F[t])
          /// This is a standard monotone least fixpoint computed by reverse propagation.
          pub fn compute_future_weights(&self) -> Vec<Weight> {
              let n = self.states.len();
              let mut fut: Vec<Weight> = vec![Weight::zeros(); n];
              let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

              // Build reverse adjacency aggregating all edge types with their weights.
              for p in 0..n {
                  // Epsilon
                  for &(t, ref w) in &self.states[p].epsilons {
                      if t < n { rev[t].push((p, w.clone())); }
                  }
                  // Labeled
                  for (_, targets) in &self.states[p].transitions {
                      for (t, w) in targets {
                          if *t < n { rev[*t].push((p, w.clone())); }
                      }
                  }
                  // Default
                  for def in &self.states[p].default {
                      if def.target < n {
                          rev[def.target].push((p, def.weight.clone()));
                      }
                  }
              }

              // Initialize with final weights
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              for s in 0..n {
                  if let Some(fw) = &self.states[s].final_weight {
                      if !fw.is_empty() {
                          fut[s] = fw.clone();
                          q.push_back(s);
                      }
                  }
              }

              // Reverse propagation: when fut[v] grows, update predecessors p using edge weight wpv.
              while let Some(v) = q.pop_front() {
                  let fv = fut[v].clone();
                  if fv.is_empty() { continue; }
                  for &(p, ref w_pv) in &rev[v] {
                      let add = &fv & w_pv;
                      if add.is_empty() { continue; }
                      let old = &fut[p];
                      if (&add & old) != add {
                          fut[p] |= &add;
                          q.push_back(p);
                      }
                  }
              }
              fut
          }

          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      // Assume ALL if weight is missing, though this should not happen with current DWA builders.
                      let w = st.trans_weight_default.as_ref().cloned().unwrap_or_else(Weight::all);
                      let exceptions = st.transitions.exceptions.keys().copied().collect();
                      nwa.states.0[i].default.push(NWADefaultTransition {
                          target: to,
                          weight: w,
                          exceptions,
                      });
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      let w = st.trans_weights_exceptions.get(lbl).cloned().unwrap_or_else(Weight::all);
                      nwa.states.add_transition(i, *lbl, *to, w).unwrap();
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  let mut result_dwa = union_nwa.determinize_to_dwa();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, targets) in states[u].transitions.iter() {
                      for (v, _) in targets {
                          if *v < states.len() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                          }
                      }
                  }
                  for def in &states[u].default {
                      if def.target < states.len() && !visited[def.target] {
                          visited[def.target] = true;
                          q.push_back(def.target);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }
          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  let mut result_dwa = concat_nwa.determinize_to_dwa();


                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              Self::internal_concatenate_components(states, left, right, eps_weight)
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/weighted_automata/determinization.rs: |
      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      /*
      A new determinization algorithm that avoids the exponential blow-up of the
      "per-atom product DFA" by explicitly leveraging DWA's ability to place
      weights on edges and final states.

      High-level idea (control-then-weights):
      - Build a single "control DFA" from the NWA by ignoring weights. This DFA
        determinizes the structural nondeterminism induced by labeled, default,
        and epsilon transitions (epsilon considered in the subset construction).
        The alphabet is Sigma' = all labels mentioned anywhere in the NWA plus
        the OTHER symbol (which triggers defaults).
      - Then, for each control DFA state U and symbol a:
          Edge weight(U --a--> V) = the union (over all paths that read exactly
          one symbol a with epsilons before/after) of the intersection of all
          edge weights along that one-letter+epsilon path. Intuitively, it is
          the set of atoms that can traverse U -a-> V in the original NWA with
          some epsilon-pre/post path.
        For final weights at a control DFA state U:
          Final(U) = the union (over epsilon paths from U to any NWA final state f)
                     of the intersection of epsilon weights and the final weight at f.

      These two annotations (edge weights and final weights) are sufficient for
      a deterministic weighted automaton (DWA) to evaluate any word w to the same
      weight set as the NWA: at each step, the DWA applies the edge's weight (which
      absorbs epsilon weights too), and at the end, it intersects the accumulated
      weight with final_weight at the reached control state.

      Crucially, this construction's state-space depends only on the structural
      nondeterminism of the NWA (ignoring weights) and the size of Sigma', and
      not on the number of atoms K in the weight partition, avoiding the product
      explosion that arises when K is large.
      */

      use super::bitset::SimpleBitset as Weight;
      use super::dwa::{DWAState, DWAStates, DWA, DWABody};
      use super::nwa::{NWA, NWAStates};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};

      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};

      fn debug_log(level: usize, msg: impl FnOnce() -> String) {
          crate::debug!(level, "{}", msg());
      }

      /// Alphabet = all labels that appear as exceptions, plus a special OTHER symbol.
      /// OTHER means: take defaults (subject to exceptions when we are using concrete labels).
      #[derive(Clone, Debug)]
      struct Alphabet {
          labels: Vec<i16>, // sorted unique exception labels
          other_index: usize,
      }
      impl Alphabet {
          fn from_nwa(nwa: &NWA) -> Self {
              let mut set = BTreeSet::new();
              for st in &nwa.states.0 {
                  for (&lbl, _) in &st.transitions {
                      set.insert(lbl);
                  }
                  for def in &st.default {
                      for &lbl in &def.exceptions {
                          set.insert(lbl);
                      }
                  }
              }
              let labels: Vec<i16> = set.into_iter().collect();
              let other_index = labels.len(); // last slot is OTHER
              Alphabet { labels, other_index }
          }
          #[inline]
          fn size(&self) -> usize {
              self.labels.len() + 1
          }
          #[inline]
          fn index_of_label(&self, l: i16) -> Option<usize> {
              self.labels.binary_search(&l).ok()
          }
          #[inline]
          fn is_other(&self, sym: usize) -> bool {
              sym == self.other_index
          }
          #[inline]
          fn label_at(&self, sym: usize) -> Option<i16> {
              if sym < self.labels.len() {
                  Some(self.labels[sym])
              } else {
                  None
              }
          }
      }

      /* ------------------------------
         Control DFA (weights ignored)
         ------------------------------ */

      #[derive(Clone, Debug)]
      struct ControlDFA {
          n_states: usize,
          start: usize,
          /// transitions[state][symbol] -> next_state
          trans: Vec<Vec<usize>>,
          /// For inspection/weight computation: the underlying NWA-state set for each DFA state
          subsets: Vec<Vec<usize>>,
      }

      impl ControlDFA {
          fn from_nwa(nwa: &NWA, sigma: &Alphabet) -> Self {
              let n = nwa.states.len();
              // Precompute epsilon closures per single state (weights ignored)
              let per_eps = eps_closure_per_state_ignoring_weights(&nwa.states);

              // Helper to compute closure for a set
              let eps_closure_set = |base: &[usize]| -> Vec<usize> {
                  let mut mark = vec![false; n];
                  let mut out = Vec::new();
                  for &s in base {
                      if s >= n {
                          continue;
                      }
                      for &u in &per_eps[s] {
                          if !mark[u] {
                              mark[u] = true;
                              out.push(u);
                          }
                      }
                  }
                  out.sort_unstable();
                  out
              };

              // Start subset = eps-closure({start})
              let start_subset = eps_closure_set(&[nwa.body.start_state]);

              // Subset construction over Sigma' (labels plus OTHER)
              let mut map: HashMap<Vec<usize>, usize> = HashMap::new();
              let mut subsets: Vec<Vec<usize>> = Vec::new();
              let mut trans: Vec<Vec<usize>> = Vec::new();

              let mut intern = |subset: Vec<usize>,
                                subsets: &mut Vec<Vec<usize>>,
                                trans: &mut Vec<Vec<usize>>,
                                map: &mut HashMap<Vec<usize>, usize>| {
                  if let Some(&id) = map.get(&subset) {
                      return id;
                  }
                  let id = subsets.len();
                  subsets.push(subset.clone());
                  trans.push(vec![0usize; sigma.size()]);
                  map.insert(subset, id);
                  id
              };

              let start = intern(start_subset, &mut subsets, &mut trans, &mut map);

              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new_spinner();
                  p.set_style(
                      ProgressStyle::default_spinner()
                          .template("{spinner:.green} [Determinize/Control: {elapsed_precise}] States: {pos}")
                          .unwrap(),
                  );
                  p.set_position(subsets.len() as u64);
                  Some(p)
              } else {
                  None
              };

              let mut q = VecDeque::new();
              q.push_back(start);

              while let Some(u) = q.pop_front() {
                  let subset = subsets[u].clone();

                  for sym in 0..sigma.size() {
                      let mut next_raw: Vec<usize> = Vec::new();
                      match sigma.label_at(sym) {
                          Some(lbl) => {
                              // Label 'lbl': from each s in subset, take explicit lbl transitions and defaults that allow lbl
                              for &s in &subset {
                                  // explicit
                                  if let Some(targets) = nwa.states[s].transitions.get(&lbl) {
                                      for (to, _) in targets {
                                          if *to < n {
                                              next_raw.push(*to);
                                          }
                                      }
                                  }
                                  // defaults that allow lbl
                                  for def in &nwa.states[s].default {
                                      if !def.exceptions.contains(&lbl) {
                                          if def.target < n {
                                              next_raw.push(def.target);
                                          }
                                      }
                                  }
                              }
                          }
                          None => {
                              // OTHER: take all defaults from subset
                              for &s in &subset {
                                  for def in &nwa.states[s].default {
                                      if def.target < n {
                                          next_raw.push(def.target);
                                      }
                                  }
                              }
                          }
                      }
                      next_raw.sort_unstable();
                      next_raw.dedup();
                      let next_subset = eps_closure_set(&next_raw);
                      let v = intern(next_subset, &mut subsets, &mut trans, &mut map);
                      trans[u][sym] = v;
                      if v == subsets.len() - 1 && Some(&(v as u64)) != pb.as_ref().map(|p| p.position()) {
                          if let Some(p) = &pb {
                              p.set_position(subsets.len() as u64);
                          }
                          q.push_back(v);
                      }
                  }
              }

              if let Some(p) = pb {
                  p.finish_with_message(format!("Control DFA built with {} states", subsets.len()));
              }

              ControlDFA {
                  n_states: subsets.len(),
                  start,
                  trans,
                  subsets,
              }
          }
      }

      /* ------------------------------
         Epsilon utilities (weights/no)
         ------------------------------ */

      /// Epsilon closure per state (ignoring weights)
      fn eps_closure_per_state_ignoring_weights(states: &NWAStates) -> Vec<Vec<usize>> {
          let n = states.len();
          let mut out = vec![Vec::<usize>::new(); n];
          for s in 0..n {
              let mut visited = vec![false; n];
              let mut stack = vec![s];
              visited[s] = true;
              let mut closure = Vec::new();
              while let Some(u) = stack.pop() {
                  closure.push(u);
                  for &(v, _) in &states[u].epsilons {
                      if v < n && !visited[v] {
                          visited[v] = true;
                          stack.push(v);
                      }
                  }
              }
              closure.sort_unstable();
              out[s] = closure;
          }
          out
      }

      /// From a set of sources, compute for each state the union-of-weights of epsilon paths
      /// from any source to that state. Start weight at each source is ALL.
      fn eps_forward_masks_from_sources(states: &NWAStates, sources: &[usize]) -> Vec<Weight> {
          let n = states.len();
          let mut mask: Vec<Weight> = vec![Weight::zeros(); n];
          let mut inq = vec![false; n];
          let mut q = VecDeque::new();

          for &s in sources {
              if s >= n {
                  continue;
              }
              // Add ALL at the source itself
              if (&Weight::all() & &mask[s]) != Weight::all() {
                  mask[s] |= &Weight::all();
                  if !inq[s] {
                      inq[s] = true;
                      q.push_back(s);
                  }
              }
          }

          while let Some(u) = q.pop_front() {
              inq[u] = false;
              let mu = mask[u].clone();
              if mu.is_empty() {
                  continue;
              }
              for &(v, ref w) in &states[u].epsilons {
                  if v >= n {
                      continue;
                  }
                  let m2 = &mu & w;
                  if m2.is_empty() {
                      continue;
                  }
                  if (&m2 & &mask[v]) != m2 {
                      mask[v] |= &m2;
                      if !inq[v] {
                          inq[v] = true;
                          q.push_back(v);
                      }
                  }
              }
          }

          mask
      }

      /// Given initial per-node seeds (weights located at nodes), propagate along epsilon edges.
      /// Returns the fixpoint vector of weights at each node.
      ///
      /// seeds[u] contributes to v via each epsilon u -> v with AND by edge weight; multiple paths
      /// OR their weights together. Standard monotone propagation over the semiring (∨, ∧).
      fn eps_propagate_from_seeds(states: &NWAStates, seeds: &[Weight]) -> Vec<Weight> {
          let n = states.len();
          let mut mask: Vec<Weight> = seeds.to_vec();
          let mut inq = vec![false; n];
          let mut q = VecDeque::new();

          for u in 0..n {
              if !mask[u].is_empty() {
                  inq[u] = true;
                  q.push_back(u);
              }
          }

          while let Some(u) = q.pop_front() {
              inq[u] = false;
              let mu = mask[u].clone();
              if mu.is_empty() {
                  continue;
              }
              for &(v, ref w) in &states[u].epsilons {
                  if v >= n {
                      continue;
                  }
                  let m2 = &mu & w;
                  if m2.is_empty() {
                      continue;
                  }
                  if (&m2 & &mask[v]) != m2 {
                      mask[v] |= &m2;
                      if !inq[v] {
                          inq[v] = true;
                          q.push_back(v);
                      }
                  }
              }
          }

          mask
      }

      /* ------------------------------
         Symbol propagation with weights
         ------------------------------ */

      /// Given pre-masks (weights at nodes after epsilon-closure from U), compute the one-symbol
      /// propagation followed by epsilon-closure. Returns a vector 'out' of weights per node after
      /// reading symbol 'sym' (Some(lbl) or None for OTHER) starting from U.
      fn one_symbol_propagate(states: &NWAStates, pre_masks: &[Weight], sym: Option<i16>) -> Vec<Weight> {
          let n = states.len();
          let mut seeds: Vec<Weight> = vec![Weight::zeros(); n];

          // For each node 's' with pre_masks[s] ≠ ∅, accumulate labeled/default contributions.
          for s in 0..n {
              let ms = &pre_masks[s];
              if ms.is_empty() {
                  continue;
              }
              match sym {
                  Some(lbl) => {
                      // explicit on lbl
                      if let Some(targets) = states[s].transitions.get(&lbl) {
                          for (to, w) in targets {
                              if *to < n {
                                  let add = ms & w;
                                  if add.is_empty() {
                                      continue;
                                  }
                                  if (&add & &seeds[*to]) != add {
                                      seeds[*to] |= &add;
                                  }
                              }
                          }
                      }
                      // defaults that allow lbl
                      for def in &states[s].default {
                          if !def.exceptions.contains(&lbl) {
                              let to = def.target;
                              if to < n {
                                  let add = ms & &def.weight;
                                  if add.is_empty() {
                                      continue;
                                  }
                                  if (&add & &seeds[to]) != add {
                                      seeds[to] |= &add;
                                  }
                              }
                          }
                      }
                  }
                  None => {
                      // OTHER: take all defaults
                      for def in &states[s].default {
                          let to = def.target;
                          if to < n {
                              let add = ms & &def.weight;
                              if add.is_empty() {
                                  continue;
                              }
                              if (&add & &seeds[to]) != add {
                                  seeds[to] |= &add;
                              }
                          }
                      }
                  }
              }
          }

          // Epsilon-closure propagation after consuming the symbol
          eps_propagate_from_seeds(states, &seeds)
      }

      /* ------------------------------
         NWA -> DWA determinization
         ------------------------------ */

      impl NWA {
          /// Determinize the NWA into a DWA using the "control-then-weights" construction.
          ///
          /// - Build the control DFA (ignoring weights) over Sigma' (labels + OTHER).
          /// - For each control state U and symbol a, compute the edge weight W(U,a) by
          ///   existential a-step reachability with epsilon pre/post (weights ANDed along each path).
          /// - For each control state U, compute final weight Final(U) via epsilon reachability to finals.
          /// - Emit a DWA with one state per control DFA state, start mapped directly; exceptions for
          ///   each explicit label, and a single default edge for OTHER.
          pub fn determinize_to_dwa(&self) -> DWA {
              debug_log(3, || format!("Starting efficient determinization for NWA with {} states", self.states.len()));

              let sigma = Alphabet::from_nwa(self);
              debug_log(4, || format!("Alphabet size: {} ({} labels + OTHER)", sigma.size(), sigma.labels.len()));

              // 1) Control DFA (weights ignored)
              let ctrl = ControlDFA::from_nwa(self, &sigma);

              // 2) Prepare DWA with the same number of states; direct start mapping.
              let mut dwa_states = DWAStates::default();
              for _ in 0..ctrl.n_states {
                  dwa_states.add_state();
              }
              let mut dwa = DWA { states: dwa_states, body: DWABody { start_state: ctrl.start } };

              // Convenience alias
              let n_ctrl = ctrl.n_states;

              // Precompute epsilon-forward masks for each control state once
              let pb_pre = if PROGRESS_BAR_ENABLED {
                  Some(
                      ProgressBar::new(n_ctrl as u64).with_style(
                          ProgressStyle::default_bar()
                              .template(
                                  "{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Precompute epsilon masks)",
                              )
                              .unwrap(),
                      ),
                  )
              } else {
                  None
              };

              let mut pre_masks: Vec<Vec<Weight>> = Vec::with_capacity(n_ctrl);
              for sid in 0..n_ctrl {
                  let sources = &ctrl.subsets[sid];
                  let masks = eps_forward_masks_from_sources(&self.states, sources);
                  pre_masks.push(masks);
                  if let Some(p) = &pb_pre {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_pre {
                  p.finish_with_message("Epsilon masks ready");
              }

              // 3) Final weights per control state
              let pb_final = if PROGRESS_BAR_ENABLED {
                  Some(
                      ProgressBar::new(n_ctrl as u64).with_style(
                          ProgressStyle::default_bar()
                              .template(
                                  "{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Compute final weights)",
                              )
                              .unwrap(),
                      ),
                  )
              } else {
                  None
              };

              for sid in 0..n_ctrl {
                  let masks = &pre_masks[sid];
                  let mut w_final = Weight::zeros();
                  for (u, m) in masks.iter().enumerate() {
                      if m.is_empty() {
                          continue;
                      }
                      if let Some(fw) = &self.states[u].final_weight {
                          let add = m & fw;
                          if !add.is_empty() {
                              w_final |= &add;
                          }
                      }
                  }
                  if !w_final.is_empty() {
                      let _ = dwa.set_final_weight(sid, w_final);
                  }
                  if let Some(p) = &pb_final {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_final {
                  p.finish_with_message("Final weights computed");
              }

              // 4) Edges (default OTHER and labeled exceptions)
              let total_edges = (n_ctrl as u64) * (sigma.size() as u64);
              let pb_edges = if PROGRESS_BAR_ENABLED {
                  Some(
                      ProgressBar::new(total_edges).with_style(
                          ProgressStyle::default_bar()
                              .template(
                                  "{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Attach DWA edges)",
                              )
                              .unwrap(),
                      ),
                  )
              } else {
                  None
              };

              for sid in 0..n_ctrl {
                  // For each symbol, compute edge weight by one-symbol propagation + epsilon
                  for sym in 0..sigma.size() {
                      let lbl_opt = sigma.label_at(sym);
                      let post_masks = one_symbol_propagate(&self.states, &pre_masks[sid], lbl_opt);

                      let dst = ctrl.trans[sid][sym];
                      let dst_subset = &ctrl.subsets[dst];

                      // Union weights only over the destination control subset
                      let mut w_edge = Weight::zeros();
                      for &u in dst_subset {
                          let add = &post_masks[u];
                          if !add.is_empty() {
                              w_edge |= add;
                          }
                      }

                      if sigma.is_other(sym) {
                          let _ = dwa.set_default_transition(sid, dst, w_edge);
                      } else {
                          let lbl = lbl_opt.unwrap();
                          let _ = dwa.add_transition(sid, lbl, dst, w_edge);
                      }

                      if let Some(p) = &pb_edges {
                          p.inc(1);
                      }
                  }
              }
              if let Some(p) = pb_edges {
                  p.finish_with_message("DWA edges attached");
              }

              debug_log(3, || format!("Efficient NWA::determinize_to_dwa: produced {} states", dwa.states.len()));
              dwa
          }
      }
  diffs_applied_this_send: true
  core_guidance_inserted: true
