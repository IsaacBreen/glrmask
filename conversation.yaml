              """
              symt = ctypes.pointer(ctypes.c_void_p())
              ret_code = lib.symt_from_path(
                  ctypes.byref(symt), str(filename).encode("utf-8"), ctypes.c_size_t(1)
              )

              err_msg = f"Read failed for bin file : {filename}"
              check_ffi_error(ret_code, err_msg)

