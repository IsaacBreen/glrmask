          yield from _yield_state(gss_s1)

          gss_s_pop0 = gss_s1.popn(0) # Should be a no-op
          yield from _yield_state(gss_s_pop0)

          gss_s_pop1 = gss_s1.popn(1)
          yield from _yield_state(gss_s_pop1)

          # --- Test 15: Operations on Empty GSS ---
