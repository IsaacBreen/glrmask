              assert_eq!(set_ones_large.len(), SPARSE_TO_DENSE_THRESHOLD + 6);
              for i in 0..=(SPARSE_TO_DENSE_THRESHOLD + 5) {
                  assert!(set_ones_large.contains(i));
              }
              assert!(!set_ones_large.contains(SPARSE_TO_DENSE_THRESHOLD + 6));

