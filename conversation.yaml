      LR parser frameworks often optimise performance by augmenting the parser in a number of ways.
      One of these is by using 'default' reductions.
      Hypothetically, any (and all) reductions in a state can be made default reductions. All this means is that we allow the reduction to take place regardless of the lookahead.

      This can be a big help for us. It means we can perform these reductions in `step` *before* we see the next token. It means we can do extra work *after* shifting (whereas currently we stop working once we see a shift).

      Reductions that are replaced with default reductions should be identifable as such. ie we should be able to look at a reduction in the table and see if it has an equivalent default reduction.

      Let's call non-default reductions 'lookahead reductions'.
      And actually let's split these into defaultable lookahead reductions and non-defaultable lookahead reductions. So we have four kinds of reductions:
      - defaultable lookahead reductions, which have an equivalent default
      - non-defaultable lookahead reductions, which don't have an equivalent default
      - default reductions

      (So, lookahead reductions are identifiable as either defaultable or non-defaultable.)

      Obviously, we need to be careful not to double-apply default reductions.
      Divide `step` into three 'phases': beginning, middle, end.
      Each phase has its own 'todo' list, but there's only one `next` parse state.

      The middle phase is closest to what we have now. Default reductions aren't considered, but shifts and lookahead reductions (both defaultable and non-defaultable) are.

      Once a 'shift' is seen, we enter the end phase. In the end phase, only default reductions are applied. (Obviously we couldn't apply lookahead reductions even if we wanted to, because we just shifted the current token and we don't yet have the next token.)
      The actual mechanics look kind of like they do in the main loop right now. Currently, we merge the parse state into `next` as soon as we process a 'shift'. Until a shift is seen, we re-queue the parse state into 'todo'. Once it's seen, it gets merged into `next` and isn't re-queued into 'todo'. (`next` eventually becomes `active_state`.)
      One difference (in addition to the fact that we don't process shifts or lookahead reductions) is that rather that merging into `next` once we process a shift, we instead merge into `next` whenever the parse state has a shift or a lookahead reduce in it that **doesn't also have an equivalent default lookahead**. Also, once this condition *is* satisfied and we merge into `next`, we *still* add the state back to the 'todo'. We *only* stop once there are no more default reductions to process.

      Now, I haven't actually convered the start phase yet.
      The reason we need a start phase is that parse states merged into `next` in the end phase of the last step might have default reductions on them, and those default reductions would already have been processed in the end phase of the last step. We don't want to process these again.
      The start phase is exactly like the middle phase except that
      1. we ignore defaultable lookahead reductions
      2. we move a state to the next (middle) phase as soon as a non-defaultable lookahead reduction is seen/processed
      3. we move to the next phase (middle) as soon as a shift is *seen* (we don't need to process it - the middle phase will)

      Now, how do we actually choose which reductions to default? Use this criteria
      - there should be at most one default reduction
      - choose the most common reduction, ie the one that occurs under multiple lookaheads in the state most frequently. If there are two equally common ones, choose either.

