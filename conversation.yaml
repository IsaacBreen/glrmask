                      let old_rep = reps[j].clone();
                      let unified = unify_tuples(&old_rep, &x).unwrap(); // Must be Some, as j was a valid candidate

                      if unified != old_rep {
                          reps[j] = unified;
                          if work_set.insert(j) { // Add to set and queue if not already present
                              work_queue.push_back(j);
                          }
                      }
                      j
