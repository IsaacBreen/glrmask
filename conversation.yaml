                  max_widths['key'] = unified_width
                  max_widths['member'] = unified_width

              # --- Printing Phase ---
              # This phase prints all the tables using the pre-calculated widths.

              print("\n═══ Performance Stats ═══")

              if stats_rows:
                  print("\n▶ All Stats")
