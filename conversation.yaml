      Here’s what’s going wrong and how to fix it:

      Root cause
      - The WL color refinement signature does not include the node’s own previous color. That means distinctions encoded at initialization (like whether a node is a root or some other “label” we care about) get lost in the first refinement step. This can cause structurally similar but semantically different nodes to collapse into the same color and be merged incorrectly.
      - Canonical rewiring picks the minimum-index node per color as canonical, even if that node is a root. That allows non-root nodes to be rewired to a root node (as in your example where CheckLLM(0) edges got rewired to Root Node 15), which violates the common invariant that root nodes are entry points and should not acquire incoming edges.

      The mismatch in your example occurs exactly because of the second point: WL let these nodes live in the same color class (due to the first bug), and canonicalization then chose a root as canonical and rewired non-root edges to that root.

      What we’ll change
      - WL refinement: include the node’s previous color in the refinement signature so initial labels are preserved through iterations.
      - Initialization: include “is_root” in the initial color key so roots and non-roots start distinct. With the previous-color-in-signature fix, this distinction is preserved in later iterations.
      - Canonicalization: do not allow non-root nodes to choose a root as their canonical representative. Roots stay canonical to themselves; non-roots canonicalize to a non-root representative of their color. This stabilizes graphs and prevents edges from being rewired into root nodes while still deduplicating structurally identical non-roots.

      Step-by-step edits
      1) Add the node’s previous color to the WL signature
      - File: src/constraint_precompute3_intermediate_utils.rs
      - Update the WLNodeSignature struct to include a prev_color field.
      - Update build_node_signature_fast to capture the node’s own previous color and include it in the signature.

      2) Seed WL with an “is_root” label and preserve it
      - File: src/constraint_precompute3_intermediate_utils.rs
      - In wl_color_refine, build a HashSet of the roots for quick membership checks.
      - Include is_root in the initial color key (end, out_degree, is_root). With step (1), this label will persist through refinements.

      3) Make canonicalization root-aware and per-node, not just per-color
      - File: src/constraint_precompute3_intermediate_utils.rs
      - In rewire_to_canonical:
        - Build a root_set from the roots slice.
        - Group nodes by color.
        - For each color class:
          - If there are non-roots, choose the minimum-index non-root as canonical and map all non-roots to it.
          - Keep each root as canonical to itself (never map a non-root to a root).
        - Use this node_to_canon map for rewiring instead of color->canonical.

      4) Keep logs intact and ensure order-preserving rewiring remains unchanged
      - All rewiring still keeps the insertion order of child destinations per edge key and deduplicates only exact duplicates resulting from canonicalization.

      After applying these changes, the “Structural Deduplication (Rewire)” pass will no longer rewire CheckLLM(0) to Root Node 15. Instead, it will pick a non-root canonical (e.g., Node 24/30 depending on indices), eliminating the mismatch while still deduplicating.

