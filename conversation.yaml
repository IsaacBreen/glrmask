                      let terminal_map_by_llm = match obj.remove("terminal_map_by_llm") {
                          Some(n) => DedupValueMap::<LLMTokenID, BTreeMap<TokenizerStateID, TerminalBV>>::from_json(n)?,
                          None => DedupValueMap::new(),
                      };
                      // Stage vocabs (optional)
