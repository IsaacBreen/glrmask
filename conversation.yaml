      // src/precompute4/weighted_automata/simplification.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::{DWABody, DWAState, DWAStates, DWA};
      use super::nwa::{NWAState, NWAStates, NWA};
      use crate::precompute4::test_weighted_automata;
      use crate::precompute4::weighted_automata::NWAStateID;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use std::cell::Cell;
      use std::collections::{BTreeMap, HashMap, VecDeque};
      use std::cmp::Ordering;
      use std::time::{Instant};

      /// For very large DWAs, we skip heavy fixpoint/minimization passes to guarantee fast simplification.
      /// This is semantics-preserving; it only reduces the amount of compression performed.
      const LARGE_AUTOMATON_THRESHOLD: usize = 200_000;

      thread_local! {
          static IN_SIMPLIFY_CHECK: Cell<bool> = Cell::new(false);
      }

      impl DWA {
          pub fn simplify(&mut self) {
              let is_checking = IN_SIMPLIFY_CHECK.with(|c| c.get());
              let before_simplify = if !is_checking && STOCHASTIC_DEBUG { Some(self.clone()) } else { None };

              Self::simplify_components(&mut self.states, &mut self.body);

              if let Some(before) = before_simplify {
                  IN_SIMPLIFY_CHECK.with(|c| c.set(true));
                  test_weighted_automata::assert_dwa_equivalent(before, self.clone());
                  IN_SIMPLIFY_CHECK.with(|c| c.set(false));
              }
          }

          pub fn simplify_components(states: &mut DWAStates, body: &mut DWABody) {
              let now = Instant::now();
              let initial_len = states.len();
              if states.0.is_empty() {
                  return;
              }
              if states.len() > LARGE_AUTOMATON_THRESHOLD {
                  Self::simplify_large(states, body);
              } else {
                  Self::simplify_small(states, body);
              }
              crate::debug!(3, "DWA::simplify_components ({} states -> {} states) took: {:?}", initial_len, states.len(), now.elapsed());
          }

          fn run_pass(
              pb: &Option<ProgressBar>,
              msg: &str,
              changed_any: &mut bool,
              mut pass: impl FnMut() -> bool,
          ) {
              if let Some(p) = pb {
                  p.set_message(msg.to_string());
              }
              if pass() {
                  *changed_any = true;
              }
          }

          fn simplify_small(states: &mut DWAStates, body: &mut DWABody) {
              let max_passes: usize = 50;
              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(max_passes as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Simplifying DWA (small): {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} passes ({msg})")
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };
              if let Some(p) = &pb { p.set_message("Initial normalize/prune"); }
              Self::normalize_edges_inplace(states);
              Self::prune_unreachable(states, body);
              let mut changed_any = true;
              let mut passes = 0usize;
              while changed_any && passes < max_passes {
                  passes += 1;
                  if let Some(p) = &pb { p.inc(1); }
                  changed_any = false;
                  Self::run_pass(&pb, "normalize", &mut changed_any, || Self::normalize_edges_inplace(states));
                  // Self::run_pass(&pb, "propagate constraints", &mut changed_any, || Self::propagate_and_constrain_weights(states, body));
                  // Self::run_pass(&pb, "propagate future", &mut changed_any, || Self::propagate_future_weights(states));
                  Self::run_pass(&pb, "minimize", &mut changed_any, || Self::minimize_partition_refinement(states, body));
                  Self::run_pass(&pb, "normalize", &mut changed_any, || Self::normalize_edges_inplace(states));
                  Self::run_pass(&pb, "prune", &mut changed_any, || Self::prune_unreachable(states, body));
              }
              if let Some(p) = &pb {
                  p.finish_with_message(format!("Simplified to {} states", states.len()));
              }
          }

          fn simplify_large(states: &mut DWAStates, body: &mut DWABody) {
              let max_passes: usize = 2;
              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(max_passes as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Simplifying DWA (large): {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} passes ({msg})")
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };
              if let Some(p) = &pb { p.set_message("Initial normalize/prune"); }
              Self::normalize_edges_inplace(states);
              Self::prune_unreachable(states, body);
              let mut changed_any = true;
              let mut passes = 0usize;
              while changed_any && passes < max_passes {
                  passes += 1;
                  if let Some(p) = &pb { p.inc(1); }
                  changed_any = false;
                  Self::run_pass(&pb, "normalize", &mut changed_any, || Self::normalize_edges_inplace(states));
                  Self::run_pass(&pb, "relax local future", &mut changed_any, || Self::relax_weights_by_local_future(states));
                  Self::run_pass(&pb, "normalize", &mut changed_any, || Self::normalize_edges_inplace(states));
                  Self::run_pass(&pb, "prune", &mut changed_any, || Self::prune_unreachable(states, body));
              }
              if let Some(p) = &pb {
                  p.finish_with_message(format!("Simplified to {} states", states.len()));
              }
          }
          pub fn propagate_and_constrain_weights(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              let mut reachable_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();

              if body.start_state >= n {
                  return false;
              }
              reachable_weights[body.start_state] = Weight::all();
              worklist.push_back(body.start_state);

              while let Some(u) = worklist.pop_front() {
                  let u_rw = reachable_weights[u].clone();
                  if u_rw.is_empty() {
                      continue;
                  }
                  let u_state = &states[u];

                  // State entry weight gates outgoing paths too
                  let gated_u_rw = if let Some(sw) = &u_state.state_weight {
                      &u_rw & sw
                  } else {
                      u_rw
                  };

                  for (_lbl, v, edge_w) in u_state.iter_edges() {
                      if v >= n { continue; }
                      let new_v_rw = &gated_u_rw & edge_w;
                      let old_v_rw = &reachable_weights[v];

                      if !new_v_rw.is_subset_of(old_v_rw) {
                          reachable_weights[v] |= &new_v_rw;
                          worklist.push_back(v);
                      }
                  }
              }

              // Now apply constraints
              let mut changed = false;
              for i in 0..n {
                  let old_fw = states[i].final_weight.clone();
                  if let Some(fw) = states[i].final_weight.as_mut() {
                      *fw &= &reachable_weights[i];
                      if fw.is_empty() {
                          states[i].final_weight = None;
                      }
                  }
                  if states[i].final_weight != old_fw {
                      changed = true;
                  }
              }
              changed
          }

          pub fn propagate_future_weights(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              // Reverse adjacency (unique preds)
              let mut rev_adj: Vec<Vec<StateID>> = vec![vec![]; n];
              for i in 0..n {
                  for (_lbl, v, _w) in states[i].iter_edges() {
                      if v < n { rev_adj[v].push(i); }
                  }
              }
              for preds in rev_adj.iter_mut() {
                  preds.sort_unstable();
                  preds.dedup();
              }

              let mut future_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();
              for i in 0..n {
                  if let Some(fw) = &states[i].final_weight {
                      if !fw.is_empty() {
                          future_weights[i] = fw.clone();
                          for &pred in &rev_adj[i] {
                              worklist.push_back(pred);
                          }
                      }
                  }
              }

              while let Some(u) = worklist.pop_front() {
                  let mut u_new_fw = states[u].final_weight.clone().unwrap_or_else(Weight::zeros);

                  if let Some(sw) = &states[u].state_weight {
                      u_new_fw |= sw;
                  }

                  for (_lbl, v, edge_w) in states[u].iter_edges() {
                      if v < n {
                          u_new_fw |= &(edge_w & &future_weights[v]);
                      }
                  }

                  if u_new_fw != future_weights[u] {
                      future_weights[u] = u_new_fw;
                      for &pred in &rev_adj[u] {
                          worklist.push_back(pred);
                      }
                  }
              }

              // Precompute complements to avoid recomputing !future_weights[v] many times
              let not_future: Vec<Weight> = future_weights.iter().map(|w| !w).collect();

              // 2. Update edge weights. An edge weight W can be relaxed to W | !future_weight(target)
              // because any bits not in future_weight(target) would be filtered out anyway.
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  // Default
                  if let Some(v) = st.transitions.default {
                      if v < n {
                          if let Some(w) = st.trans_weight_default.as_mut() {
                              let new_w = &*w | &not_future[v];
                              if new_w != *w {
                                  *w = new_w;
                                  any_weight_changed = true;
                              }
                          }
                      }
                  }
                  // Exceptions
                  let keys: Vec<i16> = st.transitions.exceptions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.exceptions.get(&ch) {
                          if v < n {
                              if let Some(w) = st.trans_weights_exceptions.get_mut(&ch) {
                                  let new_w = &*w | &not_future[v];
                                  if new_w != *w {
                                      *w = new_w;
                                      any_weight_changed = true;
                                  }
                              }
                          }
                      }
                  }
              }

              any_weight_changed
          }

          /// Fast, single-pass local relaxation:
          /// For each state v, compute an upper bound U[v] on future acceptance:
          ///     U[v] = (state_weight[v] if present else ALL) ∧ (final_weight[v] ∪ default_weight[v] ∪ ⋃ exception_weights[v])
          /// Then S[v] = ¬U[v] ⊆ ¬F[v], so for each edge u→v we can safely set weight(u→v) := weight(u→v) ∪ S[v].
          /// This preserves semantics and is O(E) per pass.
          pub fn relax_weights_by_local_future(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }
              // 1) Compute U[v] for all v
              let mut upper: Vec<Weight> = Vec::with_capacity(n);
              for i in 0..n {
                  // Start with final weight (or zeros)
                  let mut u = states[i].final_weight.clone().unwrap_or_else(Weight::zeros);
                  // Include default outgoing weight if present
                  if let Some(w) = states[i].trans_weight_default.as_ref() {
                      u |= w;
                  }
                  // Include all exception outgoing weights
                  for w in states[i].trans_weights_exceptions.values() {
                      u |= w;
                  }
                  // Gate by state-weight (applied on state entry)
                  if let Some(sw) = states[i].state_weight.as_ref() {
                      u &= sw;
                  }
                  upper.push(u);
              }
              // 2) Precompute complements S[v] = ¬U[v]
              let not_upper: Vec<Weight> = upper.iter().map(|w| !w).collect();
              // 3) Relax all edges using S[target]
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  // Default
                  if let Some(v) = st.transitions.default {
                      if let Some(w) = st.trans_weight_default.as_mut() {
                          let new_w = &*w | &not_upper[v];
                          if new_w != *w {
                              *w = new_w;
                              any_weight_changed = true;
                          }
                      }
                  }
                  // Exceptions
                  let keys: Vec<i16> = st.transitions.exceptions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.exceptions.get(&ch) {
                          if let Some(w) = st.trans_weights_exceptions.get_mut(&ch) {
                              let new_w = &*w | &not_upper[v];
                              if new_w != *w {
                                  *w = new_w;
                                  any_weight_changed = true;
                              }
                          }
                      }
                  }
              }
              any_weight_changed
          }

          pub fn normalize_edges_inplace(states: &mut DWAStates) -> bool {
              let mut changed = false;
              for st in &mut states.0 {
                  let before = st.transitions.exceptions.len();
                  if let Some(def) = st.transitions.default {
                      st.transitions.exceptions.retain(|_, &mut tgt| tgt != def);
                  }
                  changed |= st.transitions.exceptions.len() != before;

                  let before_w = st.trans_weights_exceptions.len();
                  st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  changed |= st.trans_weights_exceptions.len() != before_w;
              }
              changed
          }

          pub fn minimize_partition_refinement(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.0.len();
              if n <= 1 {
                  return false;
              }
              let sink_pid: usize = n;

              // Initial partition by outputs (state_weight, final_weight).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<(Option<Weight>, Option<Weight>), usize> = HashMap::new();
              for i in 0..n {
                  let key = (states[i].state_weight.clone(), states[i].final_weight.clone());
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Refine until stable
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<(Option<Weight>, Option<Weight>, usize, Vec<(i16, usize)>), usize> = HashMap::new();

                  for i in 0..n {
                      let st = &states[i];
                      let def_cls = st.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);
                      let mut ex: Vec<(i16, usize)> = Vec::with_capacity(st.transitions.exceptions.len());
                      for (ch, tgt) in &st.transitions.exceptions {
                          let cls = part[*tgt];
                          if cls != def_cls {
                              ex.push((*ch, cls));
                          }
                      }
                      let sig = (st.state_weight.clone(), st.final_weight.clone(), def_cls, ex);
                      let next_pid = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(next_pid);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Early exit if nothing to merge
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Build representatives
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<DWAState> = Vec::with_capacity(groups.len());
              for (pid, members) in &groups {
                  let rep = members[0];
                  let rep_state = &states[rep];
                  let def_cls = rep_state.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);

                  let mut st = DWAState::default();
                  st.state_weight = rep_state.state_weight.clone();
                  st.final_weight = rep_state.final_weight.clone();
                  st.transitions.default = if def_cls == sink_pid { None } else { Some(0) };
                  for (ch, tgt) in &rep_state.transitions.exceptions {
                      let cls = part[*tgt];
                      if cls != def_cls {
                          st.transitions.exceptions.insert(*ch, 0);
                      }
                  }

                  // Aggregate per-edge weights across members (join).
                  if st.transitions.default.is_some() {
                      let mut agg_def: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weight_default.as_ref() {
                              if let Some(ref mut a) = agg_def {
                                  *a |= w;
                              } else {
                                  agg_def = Some(w.clone());
                              }
                          }
                      }
                      st.trans_weight_default = agg_def;
                  }
                  let ex_keys: Vec<i16> = st.transitions.exceptions.keys().cloned().collect();
                  for ch in ex_keys {
                      let mut agg: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weights_exceptions.get(&ch) {
                              if let Some(ref mut a) = agg {
                                  *a |= w;
                              } else {
                                  agg = Some(w.clone());
                              }
                          }
                      }
                      if let Some(w) = agg {
                          st.trans_weights_exceptions.insert(ch, w);
                      }
                  }

                  let new_id = new_states.len();
                  pid_to_new.insert(*pid, new_id);
                  new_states.push(st);
              }

              // Fix transition targets
              for (pid, members) in &groups {
                  let new_id = *pid_to_new.get(pid).unwrap();
                  let rep = members[0];
                  let rep_state = &states[rep];

                  let def_cls = rep_state.transitions.default.map(|d| part[d]).unwrap_or(sink_pid);
                  if let Some(ref mut d) = new_states[new_id].transitions.default {
                      *d = *pid_to_new.get(&def_cls).unwrap();
                  }
                  let ex_old = new_states[new_id].transitions.exceptions.clone();
                  new_states[new_id].transitions.exceptions.clear();
                  for (ch, _) in ex_old {
                      let cls = part[*rep_state.transitions.exceptions.get(&ch).unwrap()];
                      new_states[new_id].transitions.exceptions.insert(ch, *pid_to_new.get(&cls).unwrap());
                  }
              }

              states.0 = new_states;
              Self::normalize_edges_inplace(states);
              let start_pid = part[body.start_state];
              body.start_state = *pid_to_new.get(&start_pid).unwrap();

              true
          }

          pub fn prune_unreachable(states: &mut DWAStates, body: &mut DWABody) -> bool {
              if states.0.is_empty() {
                  return false;
              }
              let n = states.0.len();

              // 1. Backward reachability from final states to find "live" states.
              let mut live = vec![false; n];
              let mut q_live: VecDeque<usize> = VecDeque::new();
              let mut rev_adj: Vec<Vec<usize>> = vec![vec![]; n];
              for i in 0..n {
                  if states[i].final_weight.as_ref().map_or(false, |w| !w.is_empty()) {
                      live[i] = true;
                      q_live.push_back(i);
                  }
                  for (_lbl, v, _w) in states[i].iter_edges() {
                      if v < n {
                          rev_adj[v].push(i);
                      }
                  }
              }
              while let Some(u) = q_live.pop_front() {
                  for &v in &rev_adj[u] {
                      if !live[v] { live[v] = true; q_live.push_back(v); }
                  }
              }

              // 2. Remove transitions to non-live states.
              let mut changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  if let Some(d) = st.transitions.default {
                      if !live[d] {
                          st.transitions.default = None;
                          st.trans_weight_default = None;
                          changed = true;
                      }
                  }
                  let before = st.transitions.exceptions.len();
                  st.transitions.exceptions.retain(|_, tgt| live[*tgt]);
                  if st.transitions.exceptions.len() != before {
                      changed = true;
                      st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  }
              }

              // 3. Forward reachability from start_state to find actually reachable states.
              let mut visited = vec![false; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              if body.start_state < n {
                  visited[body.start_state] = true;
                  q.push_back(body.start_state);
              }
              while let Some(u) = q.pop_front() {
                  for (_lbl, v, _w) in states[u].iter_edges() {
                      if v < n && !visited[v] { visited[v] = true; q.push_back(v); }
                  }
              }

              if visited.iter().all(|&b| b) && !changed {
                  return false;
              }

              // 4. Remap kept states.
              let mut map = vec![usize::MAX; n];
              let mut next_id = 0usize;
              for i in 0..n { if visited[i] { map[i] = next_id; next_id += 1; } }

              if next_id == n && !changed { return false; }

              let mut new_states: Vec<DWAState> = Vec::with_capacity(next_id);
              for old in 0..n {
                  if !visited[old] { continue; }
                  let mut st = states[old].clone();
                  if let Some(d) = st.transitions.default { st.transitions.default = Some(map[d]); }
                  let ex = st.transitions.exceptions.clone();
                  st.transitions.exceptions.clear();
                  for (ch, tgt) in ex { st.transitions.exceptions.insert(ch, map[tgt]); }
                  new_states.push(st);
              }
              states.0 = new_states;
              if next_id > 0 {
                  body.start_state = map[body.start_state];
              } else if n > 0 {
                  states.0.clear();
                  body.start_state = states.add_state();
              }
              true
          }
      }

      impl NWA {
          fn run_pass(
              pb: &Option<ProgressBar>,
              msg: &str,
              changed_any: &mut bool,
              mut pass: impl FnMut() -> bool,
          ) {
              if let Some(p) = pb {
                  p.set_message(msg.to_string());
              }
              if pass() {
                  *changed_any = true;
              }
          }

          pub fn simplify(&mut self) -> bool {
              let now = Instant::now();
              let initial_n = self.states.len();
              let max_passes = 12;
              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(max_passes as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Simplifying NWA: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} passes ({msg})")
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };

              let mut changed = true;
              let mut passes = 0;
              while changed && passes < max_passes {
                  passes += 1;
                  if let Some(p) = &pb {
                      p.inc(1);
                  }
                  changed = false;
                  Self::run_pass(&pb, "normalize", &mut changed, || self.normalize_edges_inplace());
                  Self::run_pass(&pb, "dedup epsilons", &mut changed, || self.dedup_epsilon_edges());
                  Self::run_pass(&pb, "bypass ε-chains", &mut changed, || self.bypass_trivial_epsilon_chains());
                  Self::run_pass(&pb, "collapse SCCs", &mut changed, || self.collapse_all_weight_epsilon_sccs());
                  Self::run_pass(&pb, "prune unreachable", &mut changed, || self.prune_unreachable());
                  Self::run_pass(&pb, "prune dead ends", &mut changed, || self.prune_dead_ends());
                  Self::run_pass(&pb, "merge equivalent", &mut changed, || self.merge_equivalent_states_partition());
                  Self::run_pass(&pb, "normalize", &mut changed, || self.normalize_edges_inplace());
              }
              if let Some(p) = &pb {
                  p.finish_with_message(format!("Simplified to {} states", self.states.len()));
              }
              crate::debug!(3, "NWA::simplify ({} states -> {} states) took: {:?}", initial_n, self.states.len(), now.elapsed());
              self.states.len() != initial_n
          }

          fn prune_unreachable(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut reachable = vec![false; n];
              let mut q = VecDeque::new();

              if self.body.start_state < n {
                  reachable[self.body.start_state] = true;
                  q.push_back(self.body.start_state);
              } else {
                  let changed = n > 0;
                  if changed {
                      self.states.0.clear();
                      self.body.start_state = self.states.add_state();
                  }
                  return changed;
              }

              while let Some(u) = q.pop_front() {
                  let st = &self.states[u];
                  for (v, _) in &st.epsilons {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
                  for (_, (v, _)) in &st.transitions {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
                  if let Some((v, _)) = &st.default {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
              }

              let num_reachable = reachable.iter().filter(|&&b| b).count();
              if num_reachable == n { return false; }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_reachable);
              for i in 0..n {
                  if reachable[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);
                  st.transitions.values_mut().for_each(|(v, _)| *v = remap[*v]);
                  if let Some((v, _)) = &mut st.default {
                      *v = remap[*v];
                  }
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

          fn prune_dead_ends(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let fut = self.compute_future_weights();
              let live: Vec<bool> = fut.iter().map(|w| !w.is_empty()).collect();

              if self.body.start_state >= n || !live[self.body.start_state] {
                  let changed = n > 0;
                  self.states.0.clear();
                  self.body.start_state = self.states.add_state();
                  return changed;
              }

              // Relax edge weights using future weights.
              // This is semantically correct because any path from a state `v` will have its weight
              // intersected with `fut[v]`. So, for an edge `u -> v` with weight `w`, we can relax `w`
              // to `w | !fut[v]` without changing the language, because
              // `(w | !fut[v]) & fut[v] == w & fut[v]`.
              // This relaxation can turn some weights into `Weight::all()`, enabling more
              // `collapse_all_weight_epsilon_sccs` in subsequent passes.
              let not_fut: Vec<Weight> = fut.iter().map(|w| !w).collect();
              let mut changed_weights = false;
              for i in 0..n {
                  let st = &mut self.states[i];
                  for (v, w) in &mut st.epsilons {
                      let new_w = &*w | &not_fut[*v];
                      if new_w != *w {
                          *w = new_w;
                          changed_weights = true;
                      }
                  }
                  for (_, (v, w)) in &mut st.transitions {
                      let new_w = &*w | &not_fut[*v];
                      if new_w != *w {
                          *w = new_w;
                          changed_weights = true;
                      }
                  }
                  if let Some((v, w)) = &mut st.default {
                      let new_w = &*w | &not_fut[*v];
                      if new_w != *w {
                          *w = new_w;
                          changed_weights = true;
                      }
                  }
              }

              let num_live = live.iter().filter(|&&b| b).count();
              if num_live == n {
                  return changed_weights;
              }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_live);
              for i in 0..n {
                  if live[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.retain(|(v, _)| live[*v]);
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);

                  st.transitions.retain(|_, (v, _)| live[*v]);
                  st.transitions.values_mut().for_each(|(v, _)| *v = remap[*v]);

                  if let Some((v, _)) = &st.default {
                      if !live[*v] {
                          st.default = None;
                      } else {
                          st.default.as_mut().unwrap().0 = remap[*v];
                      }
                  }
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

          fn collapse_all_weight_epsilon_sccs(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut index = 0;
              let mut indices = vec![usize::MAX; n];
              let mut lowlink = vec![0; n];
              let mut on_stack = vec![false; n];
              let mut stack = Vec::new();
              let mut comp_of = vec![0; n];
              let mut comps: Vec<Vec<NWAStateID>> = Vec::new();

              for i in 0..n {
                  if indices[i] == usize::MAX {
                      self.strongconnect(i, &mut index, &mut indices, &mut lowlink, &mut on_stack, &mut stack, &mut comp_of, &mut comps);
                  }
              }

              if comps.len() == n { return false; }

              let mut new_states_vec = Vec::with_capacity(comps.len());
              for (cid, comp) in comps.iter().enumerate() {
                  let mut new_state = NWAState::default();

                  let mut final_weight: Option<Weight> = None;
                  for &sid in comp {
                      if let Some(fw) = &self.states[sid].final_weight {
                          if let Some(acc) = &mut final_weight {
                              *acc |= fw;
                          } else {
                              final_weight = Some(fw.clone());
                          }
                      }
                  }
                  new_state.final_weight = final_weight;

                  for &sid in comp {
                      for (&lbl, &(to, ref w)) in &self.states[sid].transitions {
                          let to_comp = comp_of[to];
                          Self::add_transition_to_state(&mut new_state, lbl, to_comp, w.clone());
                      }
                      if let Some((to, w)) = &self.states[sid].default {
                          if new_state.default.is_none() {
                              new_state.default = Some((comp_of[*to], w.clone()));
                          }
                      }
                      for &(to, ref w) in &self.states[sid].epsilons {
                          let to_comp = comp_of[to];
                          if cid != to_comp || !w.is_all_fast() {
                              new_state.epsilons.push((to_comp, w.clone()));
                          }
                      }
                  }
                  new_states_vec.push(new_state);
              }

              for st in &mut new_states_vec {
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = comp_of[*v]);
                  st.transitions.values_mut().for_each(|(v, _)| *v = comp_of[*v]);
                  if let Some((v, _)) = &mut st.default {
                      *v = comp_of[*v];
                  }
              }

              self.states.0 = new_states_vec;
              self.body.start_state = comp_of[self.body.start_state];

              true
          }

          fn strongconnect(&self, v: NWAStateID, index: &mut usize, indices: &mut [usize], lowlink: &mut [usize], on_stack: &mut [bool], stack: &mut Vec<NWAStateID>, comp_of: &mut [usize], comps: &mut Vec<Vec<NWAStateID>>) {
              indices[v] = *index;
              lowlink[v] = *index;
              *index += 1;
              stack.push(v);
              on_stack[v] = true;

              for (w, weight) in &self.states[v].epsilons {
                  if weight.is_all_fast() {
                      if indices[*w] == usize::MAX {
                          self.strongconnect(*w, index, indices, lowlink, on_stack, stack, comp_of, comps);
                          lowlink[v] = lowlink[v].min(lowlink[*w]);
                      } else if on_stack[*w] {
                          lowlink[v] = lowlink[v].min(indices[*w]);
                      }
                  }
              }

              if lowlink[v] == indices[v] {
                  let mut comp = Vec::new();
                  loop {
                      let w = stack.pop().unwrap();
                      on_stack[w] = false;
                      comp_of[w] = comps.len();
                      comp.push(w);
                      if w == v { break; }
                  }
                  comps.push(comp);
              }
          }

          fn add_transition_to_state(state: &mut NWAState, on: i16, to: NWAStateID, w: Weight) {
              if let Some((old_to, old_w)) = state.transitions.get_mut(&on) {
                  assert_eq!(*old_to, to, "NWA restricted: cannot merge states with same-label transitions to different components");
                  *old_w |= &w;
              } else {
                  state.transitions.insert(on, (to, w));
              }
          }
      }

      impl NWA {
          /// Normalize in-place:
          /// - Remove empty-weight edges (ε, labeled, and default)
          /// - Drop labeled transitions that are identical to the default (same target and weight)
          fn normalize_edges_inplace(&mut self) -> bool {
              let mut changed = false;
              for st in &mut self.states.0 {
                  // Remove empty-weight epsilons
                  let before_eps = st.epsilons.len();
                  st.epsilons.retain(|(_, w)| !w.is_empty());
                  if st.epsilons.len() != before_eps {
                      changed = true;
                  }

                  // Remove empty-weight labeled transitions
                  let before_lbl = st.transitions.len();
                  st.transitions.retain(|_, (_, w)| !w.is_empty());
                  if st.transitions.len() != before_lbl {
                      changed = true;
                  }

                  // Remove empty-weight default
                  if let Some((_, w)) = &st.default {
                      if w.is_empty() {
                          st.default = None;
                          changed = true;
                      }
                  }

                  // Remove labeled transitions that are identical to default (same target, same weight)
                  if let Some((def_to, def_w)) = &st.default {
                      let def_to = *def_to;
                      let def_w = def_w.clone();
                      let before = st.transitions.len();
                      st.transitions.retain(|_, (to, w)| !(*to == def_to && *w == def_w));
                      if st.transitions.len() != before {
                          changed = true;
                      }
                  }
              }
              changed
          }

          /// Deduplicate epsilon edges to the same target by unioning their weights.
          fn dedup_epsilon_edges(&mut self) -> bool {
              let mut changed = false;
              for st in &mut self.states.0 {
                  if st.epsilons.len() <= 1 {
                      continue;
                  }
                  let mut acc: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  for (to, w) in &st.epsilons {
                      let e = acc.entry(*to).or_insert_with(Weight::zeros);
                      *e |= w;
                  }
                  let new_eps: Vec<(NWAStateID, Weight)> = acc.into_iter().collect();
                  if new_eps != st.epsilons {
                      st.epsilons = new_eps;
                      changed = true;
                  }
              }
              changed
          }

          /// Bypass trivial ε-chains: if a state s
          /// - has no labeled transitions
          /// - has no default
          /// - has no final weight
          /// - has exactly one ε edge with ALL weight to t (t != s)
          /// then redirect all incoming edges targeting s to t and (after a prune) drop s.
          fn bypass_trivial_epsilon_chains(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }
              let mut bypass: Vec<Option<NWAStateID>> = vec![None; n];
              for s in 0..n {
                  let st = &self.states[s];
                  if st.final_weight.is_some() {
                      continue;
                  }
                  if !st.transitions.is_empty() {
                      continue;
                  }
                  if st.default.is_some() {
                      continue;
                  }
                  if st.epsilons.len() != 1 {
                      continue;
                  }
                  let (t, w) = &st.epsilons[0];
                  if !w.is_all_fast() {
                      continue;
                  }
                  if *t == s {
                      continue;
                  }
                  bypass[s] = Some(*t);
              }
              if bypass.iter().all(|o| o.is_none()) {
                  return false;
              }

              // Compute ultimate mapping along bypass chains (path compression-like).
              let mut ultimate: Vec<NWAStateID> = (0..n).collect();
              for i in 0..n {
                  let mut v = i;
                  while let Some(t) = bypass[v] {
                      if t == v {
                          break;
                      }
                      v = t;
                  }
                  ultimate[i] = v;
              }

              let mut changed = false;
              for st in &mut self.states.0 {
                  for (v, _) in &mut st.epsilons {
                      let nv = ultimate[*v];
                      if nv != *v {
                          *v = nv;
                          changed = true;
                      }
                  }
                  for (_, (v, _)) in &mut st.transitions {
                      let nv = ultimate[*v];
                      if nv != *v {
                          *v = nv;
                          changed = true;
                      }
                  }
                  if let Some((ref mut dv, _)) = &mut st.default {
                      let nv = ultimate[*dv];
                      if nv != *dv {
                          *dv = nv;
                          changed = true;
                      }
                  }
              }
              let new_start = ultimate[self.body.start_state];
              if new_start != self.body.start_state {
                  self.body.start_state = new_start;
                  changed = true;
              }
              if changed {
                  // Drop states that became unreachable due to bypassing.
                  changed |= self.prune_unreachable();
              }
              changed
          }

          /// Merge equivalent NWA states by partition refinement.
          /// Signature per state includes:
          ///  - final_weight
          ///  - default: Option<(class(target), weight)>
          ///  - epsilons: vector of (class(target), UNION(weight to that class)), sorted by class
          ///  - labeled transitions: vector of (label, class(target), weight), sorted by label
          fn merge_equivalent_states_partition(&mut self) -> bool {
              let n = self.states.len();
              if n <= 1 {
                  return false;
              }
              // Initial partition by final_weight only (coarse).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<Option<Weight>, usize> = HashMap::new();
              for i in 0..n {
                  let key = self.states[i].final_weight.clone();
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Iteratively refine using structural signatures keyed by current partitions.
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<
                      (Option<Weight>, Option<(usize, Weight)>, Vec<(usize, Weight)>, Vec<(i16, (usize, Weight))>),
                      usize,
                  > = HashMap::new();

                  for i in 0..n {
                      let st = &self.states[i];
                      let def_sig = st.default.as_ref().map(|(to, w)| (part[*to], w.clone()));

                      // Aggregate epsilons by target class (union weights)
                      let mut eps_map: BTreeMap<usize, Weight> = BTreeMap::new();
                      for (to, w) in &st.epsilons {
                          let cls = part[*to];
                          let e = eps_map.entry(cls).or_insert_with(Weight::zeros);
                          *e |= w;
                      }
                      let eps_sig: Vec<(usize, Weight)> = eps_map.into_iter().collect();

                      // Labeled transitions in label order (BTreeMap already ordered by label)
                      let mut lbl_sig: Vec<(i16, (usize, Weight))> = Vec::with_capacity(st.transitions.len());
                      for (lbl, (to, w)) in &st.transitions {
                          lbl_sig.push((*lbl, (part[*to], w.clone())));
                      }

                      let sig = (st.final_weight.clone(), def_sig, eps_sig, lbl_sig);
                      let pid_next = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(pid_next);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Group states by final partition id
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Map partition id -> new state id
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<NWAState> = Vec::with_capacity(groups.len());
              for (pid, members) in &groups {
                  let rep = members[0];
                  let mut st = self.states[rep].clone();

                  // Fix targets to new partition ids
                  // Default
                  if let Some((to, w)) = st.default.clone() {
                      let cls = part[to];
                      st.default = Some((*pid_to_new.entry(cls).or_insert_with(|| {
                          // Assign sequentially; we only need the mapping - fill later after all groups known.
                          groups.keys().position(|k| *k == cls).unwrap()
                      }), w));
                  }
                  // Labeled transitions
                  let trans = st.transitions.clone();
                  st.transitions.clear();
                  for (lbl, (to, w)) in trans {
                      let cls = part[to];
                      // We'll reinsert; weight stays the same
                      st.transitions.insert(lbl, (cls, w));
                  }
                  // Epsilons (aggregate after class remap)
                  let eps = st.epsilons.clone();
                  st.epsilons.clear();
                  for (to, w) in eps {
                      let cls = part[to];
                      st.epsilons.push((cls, w));
                  }

                  // Temporarily push; we'll rewrite class ids to new ids next.
                  pid_to_new.insert(*pid, new_states.len());
                  new_states.push(st);
              }

              // Rewrite class ids in edges to actual new state ids and deduplicate ε-edges
              for st in &mut new_states {
                  // Default
                  if let Some((cls, w)) = &st.default.clone() {
                      st.default = Some((*pid_to_new.get(cls).expect("missing class"), w.clone()));
                  }
                  // Labeled
                  let trans = st.transitions.clone();
                  st.transitions.clear();
                  for (lbl, (cls, w)) in trans {
                      let to_new = *pid_to_new.get(&cls).expect("missing class");
                      st.transitions.insert(lbl, (to_new, w));
                  }
                  // Epsilons
                  let eps = st.epsilons.clone();
                  st.epsilons.clear();
                  let mut acc: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  for (cls, w) in eps {
                      let to_new = *pid_to_new.get(&cls).expect("missing class");
                      let e = acc.entry(to_new).or_insert_with(Weight::zeros);
                      *e |= &w;
                  }
                  st.epsilons = acc.into_iter().collect();
              }

              self.states.0 = new_states;
              self.body.start_state = *pid_to_new.get(&part[self.body.start_state]).expect("missing start class");
              // Final normalization for maximal effect
              let _ = self.normalize_edges_inplace();
              let _ = self.dedup_epsilon_edges();

              true
          }
      }

    src/precompute4/weighted_automata/determinization.rs: |
      // src/precompute4/weighted_automata/determinization.rs
      //
      // A new determinization that avoids state explosion by:
      // - Defining determinized states only by the set of contributing macro-signatures (structure),
      //   not by the current gating weights (which are monotone and propagated to a fixpoint).
      // - Propagating weights to those structural states until convergence (worklist), thus merging
      //   all runs that reach the same structural subset instead of creating duplicate states.
      // - Exploiting default transitions: compute a per-state default baseline once, then patch per-label
      //   using only the differences (overrides and exceptions), avoiding per-label recomputation.
      // - Precomputing ε-closures and compiling transition step-vectors once, heavily reusing them.
      //
      // This completely replaces the previous determinization and is designed to avoid building
      // hundreds of thousands of redundant states. It also avoids per-edge mutation during fixpoint;
      // we build the final DWA only after all weights converge.
      //
      // Semantics preserved for bitset weights with ∧ on path and ∨ over choices.

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::{mix3, FP_K1, FP_K2, FP_ZERO};
      use super::common::Weight;
      use super::dwa::DWA;
      use super::nwa::{NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;

      use std::cmp::Ordering;
      use std::collections::hash_map::Entry;
      use std::collections::{BTreeMap, BinaryHeap, HashMap, VecDeque};
      use std::hash::{Hash, Hasher};
      use std::time::Instant;

      impl NWA {
          pub fn determinize_to_dwa(&self) -> DWA {
              let now = Instant::now();

              let mut nwa = self.clone();
              // Keep as-is; NWA::simplify may reduce epsilon chains, exceptions, etc.
              nwa.simplify();

              let result = nwa.determinize_fixpoint_structural();

              crate::debug!(4, "NWA::determinize_to_dwa took: {:?}", now.elapsed());
              result
          }

          /// Determinize using structural subset states + weight fixpoint propagation.
          fn determinize_fixpoint_structural(&self) -> DWA {
              let fut = self.compute_future_weights();
              let n = self.states.len();
              if n == 0 {
                  return DWA::new();
              }

              // Weighted ε-closure from a set of sources, pruned by fut[]
              fn eps_closure_masked(
                  sources: &[NWAStateID],
                  states: &NWAStates,
                  fut: &[Weight],
              ) -> Vec<(NWAStateID, Weight)> {
                  let mut out: HashMap<NWAStateID, Weight> = HashMap::new();
                  let mut q: VecDeque<NWAStateID> = VecDeque::new();
                  for &s in sources {
                      if s >= states.len() { continue; }
                      let f = fut[s].clone();
                      if !f.is_empty() {
                          out.insert(s, f);
                          q.push_back(s);
                      }
                  }
                  while let Some(u) = q.pop_front() {
                      let base = out.get(&u).cloned().unwrap_or_else(Weight::zeros);
                      if base.is_empty() { continue; }
                      for &(v, ref w_eps) in &states[u].epsilons {
                          if v >= states.len() { continue; }
                          let mut prop = &base & w_eps;
                          if prop.is_empty() { continue; }
                          prop &= &fut[v];
                          if prop.is_empty() { continue; }
                          match out.entry(v) {
                              Entry::Occupied(mut e) => {
                                  let old = e.get_mut();
                                  let nu = &*old | &prop;
                                  if nu != *old {
                                      *old = nu;
                                      q.push_back(v);
                                  }
                              }
                              Entry::Vacant(e) => {
                                  e.insert(prop);
                                  q.push_back(v);
                              }
                          }
                      }
                  }
                  let mut v: Vec<(NWAStateID, Weight)> = out.into_iter().collect();
                  v.sort_by_key(|(sid, _)| *sid);
                  v
              }

              type StepVecPairs = Vec<(NWAStateID, Weight)>;

              #[derive(Clone)]
              struct StepVecData {
                  pairs: StepVecPairs,              // sorted by NWAStateID
                  compiled_by_sig: Vec<(usize, Weight)>, // (macro_sig_id, weight)
                  total_mask: Weight,
              }

              struct StepVecPool {
                  data: Vec<StepVecData>,
                  map: HashMap<u64, Vec<usize>>, // fp -> candidates
              }
              impl StepVecPool {
                  fn new() -> Self { Self { data: Vec::new(), map: HashMap::new() } }
                  fn fingerprint(pairs: &[(NWAStateID, Weight)]) -> u64 {
                      let mut fp = FP_ZERO;
                      for (sid, w) in pairs.iter() {
                          fp = mix3(fp, (*sid as u64).wrapping_mul(FP_K1), w.fp.wrapping_mul(FP_K2));
                      }
                      fp
                  }
                  fn intern(&mut self, mut pairs: StepVecPairs) -> usize {
                      pairs.retain(|(_, w)| !w.is_empty());
                      let fp = Self::fingerprint(&pairs);
                      if let Some(list) = self.map.get(&fp) {
                          for &id in list {
                              if self.data[id].pairs.len() == pairs.len() && self.data[id].pairs == pairs {
                                  return id;
                              }
                          }
                      }
                      let id = self.data.len();
                      self.data.push(StepVecData {
                          pairs,
                          compiled_by_sig: Vec::new(),
                          total_mask: Weight::zeros(),
                      });
                      self.map.entry(fp).or_insert_with(Vec::new).push(id);
                      id
                  }
                  fn len(&self) -> usize { self.data.len() }
              }

              // Apply additional weight to closure pairs, dropping empties
              fn apply_weight_to_pairs(base: &[(NWAStateID, Weight)], w: &Weight) -> StepVecPairs {
                  if w.is_all_fast() {
                      return base.to_vec();
                  }
                  let mut out: StepVecPairs = Vec::with_capacity(base.len());
                  for (sid, wt) in base.iter() {
                      let x = wt & w;
                      if !x.is_empty() {
                          out.push((*sid, x));
                      }
                  }
                  out
              }

              // Macro signatures describe determinization-relevant behavior per NWA state
              #[derive(Clone)]
              struct MacroSig {
                  final_w: Option<Weight>,
                  def: Option<usize>,          // stepvec id
                  ex: BTreeMap<i16, usize>,    // label -> stepvec id
              }

              // Build closures, step-vectors, macro signatures
              let mut step_pool = StepVecPool::new();
              let mut eps_cache: Vec<StepVecPairs> = vec![Vec::new(); n];
              for s in 0..n {
                  eps_cache[s] = eps_closure_masked(std::slice::from_ref(&s), &self.states, &fut);
              }

              let mut sig_arena: Vec<MacroSig> = Vec::with_capacity(n);
              let mut state_to_sig_id: Vec<usize> = vec![0; n];

              // We also intern macro signatures structurally (without weights gates), but
              // we expect fewer unique macro signatures than raw states after simplify.
              #[derive(Clone)]
              struct MacroSigKey {
                  fp: u64,
                  final_fp: u64,
                  def_id: Option<usize>,
                  label_ids: Vec<(i16, usize)>,
              }
              impl MacroSigKey {
                  fn from(sig: &MacroSig) -> Self {
                      let final_fp = sig.final_w.as_ref().map(|w| w.fp).unwrap_or(FP_ZERO);
                      let mut label_ids: Vec<(i16, usize)> = sig.ex.iter().map(|(k, &v)| (*k, v)).collect();
                      // BTreeMap iter is sorted already
                      let mut fp = FP_ZERO;
                      fp = mix3(fp, final_fp, 0xA55A_A55A_A55A_A55A);
                      fp = mix3(fp, sig.def.map(|x| x as u64).unwrap_or(0), 0x5D_u64);
                      for (lbl, sv) in &label_ids {
                          fp = mix3(fp, (*lbl as u64).wrapping_mul(FP_K1), (*sv as u64).wrapping_mul(FP_K2));
                      }
                      Self { fp, final_fp, def_id: sig.def, label_ids }
                  }
              }
              impl PartialEq for MacroSigKey {
                  fn eq(&self, o: &Self) -> bool {
                      self.fp == o.fp && self.final_fp == o.final_fp && self.def_id == o.def_id && self.label_ids == o.label_ids
                  }
              }
              impl Eq for MacroSigKey {}
              impl Hash for MacroSigKey {
                  fn hash<H: Hasher>(&self, h: &mut H) { h.write_u64(self.fp); }
              }

              let mut sig_intern: HashMap<MacroSigKey, usize> = HashMap::new();

              for s in 0..n {
                  // final after ε-closure from s
                  let mut final_acc: Option<Weight> = None;
                  for (t, w) in eps_cache[s].iter() {
                      if let Some(fw) = &self.states[*t].final_weight {
                          let c = w & fw;
                          if !c.is_empty() {
                              if let Some(ref mut a) = final_acc { *a |= &c; } else { final_acc = Some(c); }
                          }
                      }
                  }
                  // default stepvec
                  let mut def_id = None;
                  if let Some((to, wdef)) = &self.states[s].default {
                      if *to < n {
                          let pairs = apply_weight_to_pairs(&eps_cache[*to], wdef);
                          def_id = Some(step_pool.intern(pairs));
                      }
                  }
                  // exception stepvecs
                  let mut ex_map: BTreeMap<i16, usize> = BTreeMap::new();
                  for (lbl, (to, wlbl)) in &self.states[s].transitions {
                      if *to >= n { continue; }
                      let pairs = apply_weight_to_pairs(&eps_cache[*to], wlbl);
                      let id = step_pool.intern(pairs);
                      ex_map.insert(*lbl, id);
                  }
                  let sig = MacroSig { final_w: final_acc, def: def_id, ex: ex_map };
                  let key = MacroSigKey::from(&sig);
                  let sig_id = match sig_intern.entry(key) {
                      Entry::Occupied(o) => *o.get(),
                      Entry::Vacant(v) => {
                          let id = sig_arena.len();
                          sig_arena.push(sig);
                          v.insert(id);
                          id
                      }
                  };
                  state_to_sig_id[s] = sig_id;
              }

              // Compile step-vectors by signature
              let num_sigs = sig_arena.len();
              for id in 0..step_pool.len() {
                  let pairs = &step_pool.data[id].pairs;
                  let mut acc: HashMap<usize, Weight> = HashMap::new();
                  for (t, w) in pairs.iter() {
                      let sid = state_to_sig_id[*t];
                      match acc.entry(sid) {
                          Entry::Occupied(mut e) => {
                              let x = e.get_mut(); *x |= w;
                          }
                          Entry::Vacant(e) => { e.insert(w.clone()); }
                      }
                  }
                  let mut compiled: Vec<(usize, Weight)> = acc.into_iter().collect();
                  compiled.sort_by_key(|(sid, _)| *sid);
                  let mut total = Weight::zeros();
                  for (_, w) in compiled.iter() { total |= w; }
                  step_pool.data[id].compiled_by_sig = compiled;
                  step_pool.data[id].total_mask = total;
              }

              // Determinization with structural states + weight fixpoint

              // Determinized state: members (macro_sig ids) and current gates per member (union across all runs reached)
              #[derive(Clone)]
              struct DetState {
                  members: Vec<usize>,              // sorted unique macro_sig ids
                  pos: HashMap<usize, usize>,       // member sig_id -> index in vectors
                  gates: Vec<Weight>,               // gates per member
              }

              // Key: members only (no weights)
              #[derive(Clone)]
              struct MembersKey {
                  items: Vec<usize>,
                  fp: u64,
              }
              impl MembersKey {
                  fn new(items: Vec<usize>) -> Self {
                      let mut v = items;
                      v.sort_unstable();
                      v.dedup();
                      let mut fp = FP_ZERO;
                      for sid in &v {
                          fp = mix3(fp, (*sid as u64).wrapping_mul(FP_K1), 0xBEEF_CAFE_1234_5678);
                      }
                      MembersKey { items: v, fp }
                  }
              }
              impl PartialEq for MembersKey {
                  fn eq(&self, o: &Self) -> bool { self.fp == o.fp && self.items == o.items }
              }
              impl Eq for MembersKey {}
              impl Hash for MembersKey {
                  fn hash<H: Hasher>(&self, h: &mut H) { h.write_u64(self.fp); }
              }

              struct Builder {
                  sigs: Vec<MacroSig>,
                  step_pool: StepVecPool,
              }
              let builder = Builder { sigs: sig_arena.clone(), step_pool };

              // Utility: accumulate compiled step-vector into map (sig_id -> weight) gated by 'gate'
              fn accumulate_compiled(
                  acc: &mut HashMap<usize, Weight>,
                  compiled: &[(usize, Weight)],
                  gate: &Weight,
              ) {
                  if gate.is_all_fast() {
                      for (sig, w) in compiled.iter() {
                          match acc.entry(*sig) {
                              Entry::Occupied(mut e) => {
                                  let x = e.get_mut(); *x |= w;
                              }
                              Entry::Vacant(e) => { e.insert(w.clone()); }
                          }
                      }
                  } else {
                      for (sig, w) in compiled.iter() {
                          let x = w & gate;
                          if x.is_empty() { continue; }
                          match acc.entry(*sig) {
                              Entry::Occupied(mut e) => {
                                  let y = e.get_mut(); *y |= &x;
                              }
                              Entry::Vacant(e) => { e.insert(x); }
                          }
                      }
                  }
              }

              // Multiway-merge cursor across exception maps
              struct ExCursor<'a> {
                  lbl_iter: std::collections::btree_map::Iter<'a, i16, usize>,
                  current: Option<(i16, usize)>,
                  gate: Weight,                // gate for the owning signature
                  def_ptr: Option<usize>,      // default stepvec id for the owning signature
              }
              // Min-heap by label using Reverse in Ord
              #[derive(Eq)]
              struct HeapItem { lbl: i16, idx: usize }
              impl PartialEq for HeapItem {
                  fn eq(&self, o: &Self) -> bool { self.lbl == o.lbl && self.idx == o.idx }
              }
              impl Ord for HeapItem {
                  fn cmp(&self, o: &Self) -> Ordering {
                      o.lbl.cmp(&self.lbl).then_with(|| o.idx.cmp(&self.idx))
                  }
              }
              impl PartialOrd for HeapItem {
                  fn partial_cmp(&self, o: &Self) -> Option<Ordering> { Some(self.cmp(o)) }
              }

              // States and mapping
              let mut states: Vec<DetState> = Vec::new();
              let mut key_to_state: HashMap<MembersKey, usize> = HashMap::new();
              let mut work: VecDeque<usize> = VecDeque::new();

              // Create or get structural state (with zero gates); if initial_gates provided, OR them in.
              fn ensure_state(
                  members: Vec<usize>,
                  initial_gates: Option<HashMap<usize, Weight>>,
                  states: &mut Vec<DetState>,
                  key_to_state: &mut HashMap<MembersKey, usize>,
                  work: &mut VecDeque<usize>,
              ) -> usize {
                  let key = MembersKey::new(members);
                  if let Some(id) = key_to_state.get(&key).copied() {
                      // Merge initial_gates into the existing state
                      if let Some(init) = initial_gates {
                          let st = &mut states[id];
                          let mut changed = false;
                          for (sid, w) in init.into_iter() {
                              if let Some(&pos) = st.pos.get(&sid) {
                                  let before = st.gates[pos].clone();
                                  st.gates[pos] |= &w;
                                  if st.gates[pos] != before { changed = true; }
                              }
                          }
                          if changed { work.push_back(id); }
                      }
                      return id;
                  }
                  let items = key.items.clone();
                  let mut pos = HashMap::with_capacity(items.len());
                  for (i, sid) in items.iter().enumerate() {
                      pos.insert(*sid, i);
                  }
                  let mut gates = vec![Weight::zeros(); items.len()];
                  if let Some(init) = initial_gates {
                      for (sid, w) in init.into_iter() {
                          if let Some(&idx) = pos.get(&sid) {
                              gates[idx] |= &w;
                          }
                      }
                  }
                  let id = states.len();
                  states.push(DetState { members: items, pos, gates });
                  key_to_state.insert(key, id);
                  work.push_back(id);
                  id
              }

              // Initial state: ε-closure(start) grouped by signature with gates
              let mut init_map: HashMap<usize, Weight> = HashMap::new();
              for (t, w) in eps_cache[self.body.start_state].iter() {
                  let sid = state_to_sig_id[*t];
                  match init_map.entry(sid) {
                      Entry::Occupied(mut e) => {
                          let x = e.get_mut(); *x |= w;
                      }
                      Entry::Vacant(e) => { e.insert(w.clone()); }
                  }
              }
              let init_members: Vec<usize> = {
                  let mut keys: Vec<usize> = init_map.keys().copied().collect();
                  keys.sort_unstable();
                  keys
              };
              let _start_id = ensure_state(init_members, Some(init_map), &mut states, &mut key_to_state, &mut work);

              // Worklist: propagate weights to a fixpoint
              while let Some(sid) = work.pop_front() {
                  let st_members = states[sid].members.clone();
                  let st_gates = states[sid].gates.clone();

                  // Precompute default baseline for this state: sum gates per def_ptr over members
                  let mut def_ptr_total_gate: HashMap<usize, Weight> = HashMap::new();
                  for (i, sig_id) in st_members.iter().enumerate() {
                      if let Some(def_ptr) = builder.sigs[*sig_id].def {
                          match def_ptr_total_gate.entry(def_ptr) {
                              Entry::Occupied(mut e) => {
                                  let x = e.get_mut(); *x |= &st_gates[i];
                              }
                              Entry::Vacant(e) => { e.insert(st_gates[i].clone()); }
                          }
                      }
                  }

                  // Default target contributions: accumulate compiled step-vectors
                  let mut def_target_map: HashMap<usize, Weight> = HashMap::new();
                  for (ptr, gate) in def_ptr_total_gate.iter() {
                      let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                      accumulate_compiled(&mut def_target_map, comp, gate);
                  }
                  // Propagate default contributions
                  if !def_target_map.is_empty() {
                      let mut def_members: Vec<usize> = def_target_map.keys().copied().collect();
                      def_members.sort_unstable();
                      let def_init = def_target_map; // move
                      let _ = ensure_state(def_members, Some(def_init), &mut states, &mut key_to_state, &mut work);
                  }

                  // Exceptions per label via multiway-merge
                  let mut cursors: Vec<ExCursor> = Vec::new();
                  for (i, sig_id) in st_members.iter().enumerate() {
                      if builder.sigs[*sig_id].ex.is_empty() { continue; }
                      let mut it = builder.sigs[*sig_id].ex.iter();
                      let first = it.next().map(|(k, v)| (*k, *v));
                      let cur = ExCursor {
                          lbl_iter: it,
                          current: first,
                          gate: st_gates[i].clone(),
                          def_ptr: builder.sigs[*sig_id].def,
                      };
                      if cur.current.is_some() {
                          cursors.push(cur);
                      }
                  }
                  if cursors.is_empty() {
                      continue;
                  }
                  let mut heap: BinaryHeap<HeapItem> = BinaryHeap::new();
                  for (idx, c) in cursors.iter().enumerate() {
                      if let Some((lbl, _)) = c.current {
                          heap.push(HeapItem { lbl, idx });
                      }
                  }

                  while let Some(HeapItem { lbl, idx }) = heap.pop() {
                      // Collect all cursors at this label
                      let mut idxs = vec![idx];
                      while let Some(top) = heap.peek() {
                          if top.lbl == lbl { idxs.push(heap.pop().unwrap().idx); } else { break; }
                      }

                      // Aggregate ex_ptr gates and def_ptr overrides for this label
                      let mut ex_map: HashMap<usize, Weight> = HashMap::new(); // ex_ptr -> gate
                      let mut ov_map: HashMap<usize, Weight> = HashMap::new(); // def_ptr -> gate
                      for i in idxs.iter().copied() {
                          if let Some((_l, ex_ptr)) = cursors[i].current {
                              match ex_map.entry(ex_ptr) {
                                  Entry::Occupied(mut e) => { let v = e.get_mut(); *v |= &cursors[i].gate; }
                                  Entry::Vacant(e) => { e.insert(cursors[i].gate.clone()); }
                              }
                              if let Some(def_ptr) = cursors[i].def_ptr {
                                  match ov_map.entry(def_ptr) {
                                      Entry::Occupied(mut e) => { let v = e.get_mut(); *v |= &cursors[i].gate; }
                                      Entry::Vacant(e) => { e.insert(cursors[i].gate.clone()); }
                                  }
                              }
                          }
                      }

                      // Build rem_map and add_map
                      let mut rem_map: HashMap<usize, Weight> = HashMap::new();
                      for (ptr, gate) in ov_map.iter() {
                          let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                          accumulate_compiled(&mut rem_map, comp, gate);
                      }
                      let mut add_map: HashMap<usize, Weight> = HashMap::new();
                      for (ptr, gate) in ex_map.iter() {
                          let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                          accumulate_compiled(&mut add_map, comp, gate);
                      }

                      // Compose: label_target_map = def_target_map - rem_map + add_map
                      // We don't have def_target_map here anymore (moved). Recompute it minimally for keys we need:
                      // Instead of recomputing fully, we recompute full baseline again (costly but acceptable
                      // because number of def_ptr per state is typically small). For performance, we just reuse our
                      // precomputed 'def_ptr_total_gate' here.
                      let mut base_map: HashMap<usize, Weight> = HashMap::new();
                      for (ptr, gate) in def_ptr_total_gate.iter() {
                          let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                          accumulate_compiled(&mut base_map, comp, gate);
                      }

                      // Apply removal
                      for (sig, rw) in rem_map.iter() {
                          if let Some(old) = base_map.get_mut(sig) {
                              *old -= rw;
                              if old.is_empty() {
                                  base_map.remove(sig);
                              }
                          }
                      }
                      // Apply additions
                      for (sig, aw) in add_map.iter() {
                          match base_map.entry(*sig) {
                              Entry::Occupied(mut e) => {
                                  let v = e.get_mut(); *v |= aw;
                              }
                              Entry::Vacant(e) => { e.insert(aw.clone()); }
                          }
                      }

                      if !base_map.is_empty() {
                          let mut mem: Vec<usize> = base_map.keys().copied().collect();
                          mem.sort_unstable();
                          let _ = ensure_state(mem, Some(base_map), &mut states, &mut key_to_state, &mut work);
                      }

                      // Advance cursors
                      for i in idxs.into_iter() {
                          if let Some((_l, _)) = cursors[i].current {
                              if let Some((k, v)) = cursors[i].lbl_iter.next() {
                                  cursors[i].current = Some((*k, *v));
                                  heap.push(HeapItem { lbl: *k, idx: i });
                              } else {
                                  cursors[i].current = None;
                              }
                          }
                      }
                  }
              }

              // Build the final DWA after fixpoint propagation of gates
              let mut dwa = DWA::new();
              dwa.states.0.clear();
              for _ in 0..states.len() { dwa.states.add_state(); }

              // Map: MembersKey -> state id already computed above; keep start id
              // Find start id
              let mut start_key_items: Vec<usize> = Vec::new();
              { // rebuild start key from start state's members
                  let start_state_id = 0usize; // The first ensure_state call created start state and pushed it into states[0], but we didn't save id.
                  // Find by scanning: the state whose gates were initialized from init_map equals earliest inserted.
                  // Conservative: rebuild the key from eps closure and lookup.
                  start_key_items = {
                      let mut v: Vec<usize> = eps_cache[self.body.start_state].iter().map(|(t, _)| state_to_sig_id[*t]).collect();
                      v.sort_unstable(); v.dedup(); v
                  };
              }
              let key_start = MembersKey::new(start_key_items.clone());
              let start_id = *key_to_state.get(&key_start).unwrap_or(&0usize);
              dwa.body.start_state = start_id;

              // Helper to compute final weight for a structural state
              let compute_final = |st: &DetState, sigs: &Vec<MacroSig>| -> Option<Weight> {
                  let mut acc: Option<Weight> = None;
                  for (i, sig_id) in st.members.iter().enumerate() {
                      if let Some(fw) = &sigs[*sig_id].final_w {
                          let c = &st.gates[i] & fw;
                          if !c.is_empty() {
                              if let Some(ref mut a) = acc { *a |= &c; } else { acc = Some(c); }
                          }
                      }
                  }
                  acc
              };

              // Add edges and finals
              for sid in 0..states.len() {
                  let st_members = states[sid].members.clone();
                  let st_gates = states[sid].gates.clone();

                  // Final weight
                  dwa.states[sid].final_weight = compute_final(&states[sid], &builder.sigs);

                  // Precompute default baseline for this state
                  let mut def_ptr_total_gate: HashMap<usize, Weight> = HashMap::new();
                  for (i, sig_id) in st_members.iter().enumerate() {
                      if let Some(def_ptr) = builder.sigs[*sig_id].def {
                          match def_ptr_total_gate.entry(def_ptr) {
                              Entry::Occupied(mut e) => { let x = e.get_mut(); *x |= &st_gates[i]; }
                              Entry::Vacant(e) => { e.insert(st_gates[i].clone()); }
                          }
                      }
                  }

                  let mut def_target_map: HashMap<usize, Weight> = HashMap::new();
                  let mut def_edge_w = Weight::zeros();
                  for (ptr, gate) in def_ptr_total_gate.iter() {
                      let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                      accumulate_compiled(&mut def_target_map, comp, gate);
                      let m = &builder.step_pool.data[*ptr].total_mask;
                      let x = gate & m;
                      def_edge_w |= &x;
                  }
                  if !def_target_map.is_empty() && !def_edge_w.is_empty() {
                      let mut mem: Vec<usize> = def_target_map.keys().copied().collect();
                      mem.sort_unstable();
                      let def_key = MembersKey::new(mem);
                      if let Some(&to_id) = key_to_state.get(&def_key) {
                          let _ = dwa.set_default_transition(sid, to_id, def_edge_w);
                      }
                  }

                  // Exceptions: multiway-merge
                  let mut cursors: Vec<ExCursor> = Vec::new();
                  for (i, sig_id) in st_members.iter().enumerate() {
                      if builder.sigs[*sig_id].ex.is_empty() { continue; }
                      let mut it = builder.sigs[*sig_id].ex.iter();
                      let first = it.next().map(|(k, v)| (*k, *v));
                      let cur = ExCursor {
                          lbl_iter: it,
                          current: first,
                          gate: st_gates[i].clone(),
                          def_ptr: builder.sigs[*sig_id].def,
                      };
                      if cur.current.is_some() { cursors.push(cur); }
                  }
                  if cursors.is_empty() { continue; }
                  let mut heap: BinaryHeap<HeapItem> = BinaryHeap::new();
                  for (idx, c) in cursors.iter().enumerate() {
                      if let Some((lbl, _)) = c.current {
                          heap.push(HeapItem { lbl, idx });
                      }
                  }

                  while let Some(HeapItem { lbl, idx }) = heap.pop() {
                      let mut idxs = vec![idx];
                      while let Some(top) = heap.peek() {
                          if top.lbl == lbl { idxs.push(heap.pop().unwrap().idx); } else { break; }
                      }

                      let mut ex_map: HashMap<usize, Weight> = HashMap::new();
                      let mut ov_map: HashMap<usize, Weight> = HashMap::new();
                      for i in idxs.iter().copied() {
                          if let Some((_l, ex_ptr)) = cursors[i].current {
                              match ex_map.entry(ex_ptr) {
                                  Entry::Occupied(mut e) => { let v = e.get_mut(); *v |= &cursors[i].gate; }
                                  Entry::Vacant(e) => { e.insert(cursors[i].gate.clone()); }
                              }
                              if let Some(def_ptr) = cursors[i].def_ptr {
                                  match ov_map.entry(def_ptr) {
                                      Entry::Occupied(mut e) => { let v = e.get_mut(); *v |= &cursors[i].gate; }
                                      Entry::Vacant(e) => { e.insert(cursors[i].gate.clone()); }
                                  }
                              }
                          }
                      }

                      // Build base map (default baseline) and edge mask baseline
                      let mut base_map: HashMap<usize, Weight> = HashMap::new();
                      let mut base_edge_w = Weight::zeros();
                      for (ptr, gate) in def_ptr_total_gate.iter() {
                          let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                          accumulate_compiled(&mut base_map, comp, gate);
                          let m = &builder.step_pool.data[*ptr].total_mask;
                          let x = gate & m;
                          base_edge_w |= &x;
                      }

                      // Removals
                      let mut rem_map: HashMap<usize, Weight> = HashMap::new();
                      let mut rem_edge_w = Weight::zeros();
                      for (ptr, gate) in ov_map.iter() {
                          let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                          accumulate_compiled(&mut rem_map, comp, gate);
                          let m = &builder.step_pool.data[*ptr].total_mask;
                          let x = gate & m;
                          rem_edge_w |= &x;
                      }
                      for (sig, rw) in rem_map.iter() {
                          if let Some(old) = base_map.get_mut(sig) {
                              *old -= rw;
                              if old.is_empty() { base_map.remove(sig); }
                          }
                      }
                      let mut edge_w = base_edge_w;
                      edge_w -= &rem_edge_w;

                      // Additions
                      let mut add_map: HashMap<usize, Weight> = HashMap::new();
                      let mut add_edge_w = Weight::zeros();
                      for (ptr, gate) in ex_map.iter() {
                          let comp = &builder.step_pool.data[*ptr].compiled_by_sig;
                          accumulate_compiled(&mut add_map, comp, gate);
                          let m = &builder.step_pool.data[*ptr].total_mask;
                          let x = gate & m;
                          add_edge_w |= &x;
                      }
                      for (sig, aw) in add_map.into_iter() {
                          match base_map.entry(sig) {
                              Entry::Occupied(mut e) => { let v = e.get_mut(); *v |= &aw; }
                              Entry::Vacant(e) => { e.insert(aw); }
                          }
                      }
                      edge_w |= &add_edge_w;

                      if edge_w.is_empty() || base_map.is_empty() {
                          // No effective labeled edge
                      } else {
                          let mut mem: Vec<usize> = base_map.keys().copied().collect();
                          mem.sort_unstable();
                          let ex_key = MembersKey::new(mem);
                          if let Some(&to_id) = key_to_state.get(&ex_key) {
                              let _ = dwa.add_transition(sid, lbl, to_id, edge_w);
                          }
                      }

                      // Advance cursors
                      for i in idxs.into_iter() {
                          if let Some((_l, _)) = cursors[i].current {
                              if let Some((k, v)) = cursors[i].lbl_iter.next() {
                                  cursors[i].current = Some((*k, *v));
                                  heap.push(HeapItem { lbl: *k, idx: i });
                              } else {
                                  cursors[i].current = None;
                              }
                          }
                      }
                  }
              }

              dwa
          }
      }
