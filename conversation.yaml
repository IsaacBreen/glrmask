      #### `pub struct Trie2ReadGuard<'a, EK: Ord, EV, T>`
      A read guard that provides immutable access to a `Trie` node.

      ##### Trait Implementations
      *   `impl<'a, ...> Deref<Target = Trie<EK, EV, T>> for Trie2ReadGuard<'a, ...>`

