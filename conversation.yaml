                  res._len = sum(BIT_COUNTS[byte] for byte in new_bitset)
                  return res
              else:
                  # Generic path
                  py_self = PyRangeSet(self.intervals)
                  intersected = py_self.intersection(other)
                  return BitsetRangeSet(intersected.intervals)

