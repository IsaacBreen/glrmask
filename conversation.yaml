  - user: |-
      Modify GSS so it takes two generic types, one for `T` as it does now, and one `A` for 'active' or 'accumulated' or something (not sure what exactly to call it).
      Basically, `A` will take the place of any type in `T` that implements `MergeAndIntersect` - right now, that's `LLMTokenInfo`.
      `A` will represent some data - in the specific case of the parser, it'll be a bitset representing the active tokens.
      `A` will have to implement a trait that's basically `MergeAndIntersect`, with a method to merge and one to intersect.
      `A` is always computed automatically on a node by merging its predecessors' `A` values.
      When a node is popped from, the `A` value for each revealed node should be intersected with the `A` value of the node that it was popped from. If there are multiple nodes it was popped from (i.e. that revealed node had mutliple parents), then the itersection is just taken multiple times.

      Each node should store the current `t: T`, the current `a: A` - which is initialized to the union of all predecessor's `a` values - and the intersection of all predecessor's `a` values.
      The current `a: A` can be modified in a restricted way: it can be intersected with another value `A`. Ensure this is the only way it can be changed.

      Just to elaborate on popping: consider first just doing a single pop from a set of nodes. Create a map from raw pointer `*const GSSNode<T>` to `(Arc<GSSNode<T>>, A)`. Loop through the nodes to pop. Loop through each one's predecessors. If there isn't an entry in the map, make one, and copy SOURCE node's (NOT the predecessor node's) current `a: A` value into the entry. If there is an entry, update `A` by taking the union with *this* source node's `a: A`.
      Finally, construct the final nodes to return. Loop over each `(Arc<GSSNode<T>>, A)`. Make `Arc<GSSNode<T>>` mutable using `Arc::make_mut`. Modify the node's `a: A` as the intersection of itself and the `A` alongside this node in the tuple `(Arc<GSSNode<T>>, A)`.

      What does `A` represent? I guess it's information that qualifies a path through the GSS, distinguishes it.
      In a GSS, any path from the current node back down to the root is a valid stack.
      Merging is the power of a GSS. It lets us operate much more efficiently.
      But sometimes there is additional info attached to a state that we don't want to interfere with the merge.
      Example is a bitset of external values for which the stack is valid. We still want to be able to merge GSSs for which this this bitset is unequal (but the stored `T` value is equal). And we want to merge the bitsets in this case: the merged state is valid for all bitsets that were merged into it.
      But when we pop back out of this merge and get the separate child states, we want to be able to tell for which bitsets those child states were valid. That's where we need `A`.
