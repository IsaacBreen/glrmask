                      let mut set = U8Set::none();
                      for item_node in arr {
                          match item_node {
                              JSONNode::Int(n) => {
                                  if n <= u8::MAX as i128 {
                                      set.insert(n as u8);
                                  } else {
                                      return Err(format!("Number {} is too large for u8", n));
                                  }
