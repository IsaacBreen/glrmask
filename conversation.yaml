      To improve the performance of the GLR parser table generation, I will optimize the two main bottlenecks: `stage_1` (LR(0) automaton construction) and `compute_final_table`.

      ### Plan

      1.  **Optimize `stage_1`**:
          *   Replace the `HashMap<usize, Vec<Item>>` used for collecting transitions with a flat `Vec<(usize, Item)>` buffer. This avoids repeated allocations and hashing in the inner loop.
          *   Precompute closure data as a flat, sorted list of transitions to allow efficient merging via `extend_from_slice`.
          *   Use sorting and grouping on the flat buffer to identify next states, which is significantly faster than hash map lookups for dense sets.

      2.  **Optimize `compute_final_table`**:
          *   Replace the "gather" approach (iterating terminals and checking if they trigger reductions) with a "scatter" approach.
          *   Iterate over the reduction items in a state, look up the `Follow` set (which is a `BitSet`), and directly register the reduction for those terminals.
          *   Use a reusable `row_builder` vector and a `dirty_terminals` list to avoid re-allocating structures for every state.

      These changes reduce the complexity of `compute_final_table` from roughly $O(\text{States} \times \text{Terminals} \times \text{Reductions})$ to $O(\text{States} \times \text{Reductions} \times \text{FollowSetSize})$, and significantly reduce memory allocator pressure in `stage_1`.

