                  ("red".to_string(), eat_u8_seq(b"red".to_vec())),
                  ("happy".to_string(), eat_u8_seq(b"happy".to_vec())),
                  (".".to_string(), eat_u8(b'.')),
                  ("and".to_string(), eat_u8_seq(b"and".to_vec())),
              ];

