      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benchmarks.sh
      #
      # A script to automate running benchmarks for multiple grammar constraint models,
      # generating JSON results and analysis plots. This script runs each model once
      # (no in-process reference/baseline). The analyzer is later told which result
      # is the baseline to perform mask comparisons.
      #
      # This script should be run from the project root directory.
      #
      # Usage:
      #   ./run_benchmarks.sh <baseline_model.py> <model1.py> [model2.py ...]
      #
      # Example:
      #   ./run_benchmarks.sh aug25/precompute2_model.py aug25/precompute3_model.py
      #
      # Environment Variables:
      #   CONSTRAINT_FILE: Path to the pre-compiled .json.gz constraint file.
      #                    (Default: ./.cache/test_vocabs/js_grammar_constraint.json.gz)
      #   CODE_FILE:    Path to the code file to use as input.
      #                 (Default: ./src/example_code.js)
      #   REPEAT:       Number of times to run each benchmark. (Default: 1)
      #   AGG_METHOD:   Aggregation method for analyzer (mean, median, min, max).
      #                 If unset, runs are plotted individually. (Default: "")
      # ==============================================================================

      # --- Configuration ---
      # Use environment variables if set, otherwise use defaults.
      : "${CONSTRAINT_FILE:="./.cache/test_vocabs/js_grammar_constraint.json.gz"}"
      : "${CODE_FILE:="./src/example_code.js"}"
      : "${SKIP_CPP_BUILD:=0}" # Set to 1 to disable C++ compilation
      : "${REPEAT:=1}"
      : "${AGG_METHOD:=""}"

      # --- PYTHONPATH setup ---
      # The script is run from the project root. The python modules are in the 'python' directory.
      # We add the 'python' directory to PYTHONPATH so that compiled extension modules (like leveled_gss_cpp)
      # can be found via top-level imports.
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      export PYTHONPATH="${SCRIPT_DIR}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage: $0 <baseline_model.py> <model1.py> [model2.py ...]"
          echo "Error: At least one model argument is required. The first is treated as the baseline."
          exit 1
      fi

      BASELINE_MODEL="$1"
      shift
      COMPETITORS=("$@")

      ALL_MODELS=("$BASELINE_MODEL" "${COMPETITORS[@]}")

      # Check that all provided files exist
      for file in "${ALL_MODELS[@]}"; do
          if [ ! -f "$file" ]; then
              echo "Error: Model file not found: $file"
              exit 1
          fi
      done
      if [ ! -f "$CONSTRAINT_FILE" ]; then
          echo "Error: Constraint file not found: $CONSTRAINT_FILE"
          exit 1
      fi
      if [ ! -f "$CODE_FILE" ]; then
          echo "Error: Code file not found: $CODE_FILE"
          exit 1
      fi


      # --- Setup ---
      # Create a unique directory for this benchmark run's results.
      RESULTS_DIR="benchmark_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Baseline Model: $BASELINE_MODEL"
      if [ "${#COMPETITORS[@]}" -gt 0 ]; then
        echo "Other Models: ${COMPETITORS[*]}"
      else
        echo "Other Models: (none)"
      fi
      echo "Constraint File: $CONSTRAINT_FILE"
      echo "Code: $CODE_FILE"
      echo "Repeat count: $REPEAT"
      if [[ -n "$AGG_METHOD" ]]; then
        echo "Aggregation: $AGG_METHOD"
      fi
      echo "---"


      if [[ "${SKIP_CPP_BUILD}" != "1" ]]; then
        # --- Automated C++ Build Process ---
        echo "Ensuring C++ extensions are built..."

        # Determine project root, assuming this script is in the 'python' directory.
        SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
        PROJECT_ROOT=$(dirname "$SCRIPT_DIR")

        # 1) Setup: download Boost headers locally and install pybind11
        BOOST_VERSION="1.83.0"
        BOOST_VER_UNDERSCORES="1_83_0"
        BOOST_DIR="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}"
        mkdir -p "${PROJECT_ROOT}/.build"

        if [ ! -d "$BOOST_DIR" ]; then
          BOOST_TGZ="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Downloading Boost ${BOOST_VERSION} headers..."
          curl -L -o "$BOOST_TGZ" "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Extracting Boost..."
          tar -C "${PROJECT_ROOT}/.build" -xzf "$BOOST_TGZ"
        fi

        echo "Installing pybind11..."
        python3 -m pip install --quiet pybind11

        # 2) Build the C++ extensions in place
        echo "Building C++ extensions..."

        # Compute extension suffix and includes via pybind11
        EXT_SUFFIX="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("EXT_SUFFIX") or ".so")')"
        PYBIND_INCLUDES="$(python3 -m pybind11 --includes)"
        CXX="${CXX:-c++}"
        CXXFLAGS="-O3 -DNDEBUG -march=native -flto -std=c++17 -shared -fPIC"
        LDFLAGS="-flto"
        if [[ "$(uname)" == "Darwin" ]]; then
          LDFLAGS="${LDFLAGS} -undefined dynamic_lookup"
        fi

        # Optional ASan (opt-in via SANITIZE=1 env var)
        if [[ "${SANITIZE:-0}" == "1" ]]; then
          echo "Building with AddressSanitizer (SANITIZE=1)"
          CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -std=c++17 -shared -fPIC"
          LDFLAGS="${LDFLAGS} -fsanitize=address"
        fi

        # Control C++ stats collection. Default to enabled.
        : "${ENABLE_CPP_STATS:=1}"
        if [[ "${ENABLE_CPP_STATS}" == "1" ]]; then
          echo "Building C++ with stats enabled (ENABLE_CPP_STATS=1)"
          CXXFLAGS="${CXXFLAGS} -DENABLE_STATS"
        else
          echo "Building C++ with stats disabled (ENABLE_CPP_STATS=0)"
        fi

        # Change to python directory to run build commands with relative paths
        ORIGINAL_CWD=$(pwd)
        cd "$SCRIPT_DIR"

        # Compile extensions. Paths are relative to the 'python' directory.
        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/icl_rangeset.cpp" -o "aug25/models/icl_rangeset${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/leveled_gss_py.cpp" -o "leveled_gss_cpp${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/precompute3_engine.cpp" -o "aug25/models/precompute3_engine${EXT_SUFFIX}" ${LDFLAGS}

        # Change back to original directory
        cd "$ORIGINAL_CWD"

        echo "Build complete."
        echo "---"
      else
        echo "Skipping C++ extension build (SKIP_CPP_BUILD=1)."
        echo "---"
      fi

      # --- Run Benchmarks ---
      echo "Starting benchmark runs..."
      # Define the ASAN library path at the top of the loop for clarity
      ASAN_LIB="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/17/lib/darwin/libclang_rt.asan_osx_dynamic.dylib"

      for model_to_benchmark in "${ALL_MODELS[@]}"; do
          echo
          echo ">>> Running benchmark for: $(basename "$model_to_benchmark")"
          cmd=(python -m python.aug25.benchmark_runner
              --code "$CODE_FILE"
              --constraint-file "$CONSTRAINT_FILE"
              --model "$model_to_benchmark"
              --output "$RESULTS_DIR"
              --repeat "$REPEAT")
          echo "${cmd[*]}"
          # Prepend the environment variable ONLY for the C++ model
          if [[ "$model_to_benchmark" == *"precompute3_model_cpp.py"* ]]; then
              echo ">>> Running with AddressSanitizer..."
              if DYLD_INSERT_LIBRARIES="$ASAN_LIB" "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$model_to_benchmark")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$model_to_benchmark") failed with exit code $exit_code. Skipping."
              fi
          else
              if "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$model_to_benchmark")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$model_to_benchmark") failed with exit code $exit_code. Skipping."
              fi
          fi
      done
      echo
      echo "All benchmark runs completed."
      echo "---"


      # --- Analyze Results ---
      echo "Analyzing results and generating plots..."
      PLOTS_DIR="${RESULTS_DIR}/analysis"
      BASELINE_STEM="$(basename "$BASELINE_MODEL" .py)"
      cmd=(python -m python.aug25.benchmark_analyzer
          "${RESULTS_DIR}"/*.json
          --baseline "$BASELINE_STEM"
          --output-dir "$PLOTS_DIR")

      if [[ -n "$AGG_METHOD" ]]; then
        cmd+=(--agg-method "$AGG_METHOD")
      fi

      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Benchmark analysis complete."
      echo "Baseline: $BASELINE_STEM"
      echo "Summary printed above. Plots are saved in: $PLOTS_DIR"
      echo "Full JSON results are in: $RESULTS_DIR"
    python/aug25/benchmark_runner.py: |
      import sys
      from pathlib import Path

      # Add project root to sys.path to resolve imports when running as a script
      _project_root = Path(__file__).resolve().parents[2]
      if str(_project_root) not in sys.path:
          sys.path.insert(0, str(_project_root))

      import argparse
      import json
      import gzip
      import gc
      import os
      import time
      import importlib.util
      from datetime import datetime, timezone
      import numpy as np
      from tqdm import tqdm

      # --- Helper Functions (from former example_js.py) ---

      def load_or_download_gpt2_vocab(cache_dir, file_name, url):
          cache_dir = Path(cache_dir)
          cache_dir.mkdir(parents=True, exist_ok=True)
          cache_path = cache_dir / file_name
          if not cache_path.exists():
              import requests
              print(f"Downloading GPT-2 vocab from: {url}")
              response = requests.get(url)
              response.raise_for_status()
              with open(cache_path, 'w', encoding='utf-8') as f:
                  f.write(response.text)

          vocab_map = json.loads(cache_path.read_text(encoding='utf-8'))

          # Exclude tokens longer than 5
          vocab_map = {k: v for k, v in vocab_map.items() if len(k.encode('utf-8')) <= 5}

          return vocab_map

      def greedy_tokenizer(text_bytes, id_to_token):
          # Build a Trie for fast prefix matching.
          # The key '<ID>' stores the token ID for a complete token.
          trie_root = {}
          for token_id, token_bytes in id_to_token.items():
              node = trie_root
              for byte_val in token_bytes:
                  node = node.setdefault(byte_val, {})
              node['<ID>'] = token_id

          token_ids = []
          pos = 0
          while pos < len(text_bytes):
              # Find the longest possible token match starting at the current position.
              node = trie_root
              longest_match_id = -1
              longest_match_len = 0
              
              # Traverse the Trie with bytes from the current position.
              for i in range(len(text_bytes) - pos):
                  current_byte = text_bytes[pos + i]
                  if current_byte in node:
                      node = node[current_byte]
                      if '<ID>' in node:
                          # Found a valid token, record it and keep searching for a longer one.
                          longest_match_id = node['<ID>']
                          longest_match_len = i + 1
                  else:
                      # No further matches possible from this prefix.
                      break
              
              if longest_match_len > 0:
                  token_ids.append(longest_match_id)
                  pos += longest_match_len
              else:
                  raise ValueError(f"Failed to tokenize. No token found for prefix: {text_bytes[pos:pos+20]!r}")
          return token_ids

      def load_model_class(model_path: Path):
          """Dynamically loads the 'Model' class from a Python file."""
          # To support relative imports within the model file, we must construct
          # a module name that reflects its package structure relative to the project root.
          module_path_for_name = model_path
          if module_path_for_name.is_absolute():
              try:
                  # Try to make it relative to the project root.
                  module_path_for_name = module_path_for_name.relative_to(_project_root)
              except ValueError:
                  # Path is not within the project root. The original absolute path's parts
                  # will be used, which is unlikely to work for relative imports but is the
                  # best we can do.
                  pass

          module_name = ".".join(module_path_for_name.with_suffix('').parts)

          # The file location for importlib must be the original path.
          spec = importlib.util.spec_from_file_location(module_name, model_path)
          if spec is None or spec.loader is None:
              raise ImportError(f"Could not load spec for module at {model_path}")
          module = importlib.util.module_from_spec(spec)
          sys.modules[module_name] = module
          spec.loader.exec_module(module)
          
          if not hasattr(module, 'Model'):
              raise AttributeError(f"Model script {model_path} must define a 'Model' class.")
          
          return getattr(module, 'Model')

      def print_model_statistics(model, model_name: str):
          """Analyzes and prints statistics about the loaded graph model."""
          print("Decrecated")
          return
          from aug25.common_interface import RangeSet  # local import to avoid cycles
          import _sep1 as ffi
          print(f"\n--- Statistics for {model_name} ---")

          if not hasattr(model, 'arena') or not model.arena:
              print("  - Model has no arena or is empty. Cannot compute stats.")
              return

          num_nodes = len(model.arena)
          num_roots = len(model.roots_map)
          num_end_nodes = sum(1 for i in model.arena if model.is_end(i))

          print(f"  - Roots: {num_roots}")
          print(f"  - Nodes: {num_nodes}")
          print(f"  - End nodes: {num_end_nodes} ({num_end_nodes/num_nodes:.2%} of total)")

          # Detect model type by inspecting the first child edge of the first node with children
          is_precompute3 = False
          for node_data in model.arena.values():
              children = node_data.get("children")
              if children:
                  edge_key, _ = children[0]
                  # precompute3 has (pop, RangeSet) as key, precompute2 has (pop, int | None)
                  if isinstance(edge_key[1], ffi.Bitset):
                       is_precompute3 = True
                  break
          
          model_type = "Precompute3" if is_precompute3 else "Precompute2"
          print(f"  - Detected Model Type: {model_type}")

          pops = []
          fan_outs = []
          llm_rs_sizes = []
          state_rs_sizes = [] # precompute3 only

          if is_precompute3:
              total_edge_groups = 0
              total_dest_edges = 0
              for node_data in model.arena.values():
                  children = node_data.get("children", [])
                  fan_outs.append(len(children))
                  total_edge_groups += len(children)
                  for (pop, llm_bv), dests in children:
                      pops.append(pop)
                      if not llm_bv.is_empty():
                          llm_rs_sizes.append(llm_bv.len())
                      total_dest_edges += len(dests)
                      for _, state_bv in dests:
                          if not state_bv.is_empty():
                              state_rs_sizes.append(state_bv.len())
              print(f"  - Edge Groups (pop, llm_bv): {total_edge_groups}")
              print(f"  - Destination Edges (dest, state_bv): {total_dest_edges}")

          else: # Precompute2
              total_edge_groups = 0
              total_dest_edges = 0
              for node_data in model.arena.values():
                  children = node_data.get("children", [])
                  fan_outs.append(len(children))
                  total_edge_groups += len(children)
                  for (pop, _), dests in children:
                      pops.append(pop)
                      total_dest_edges += len(dests)
                      for _, llm_rs in dests:
                          if llm_rs.intervals:
                              llm_rs_sizes.append(sum(e - s + 1 for s, e in llm_rs.intervals))
              print(f"  - Edge Groups (pop, sid): {total_edge_groups}")
              print(f"  - Destination Edges (dest, llm_rs): {total_dest_edges}")

          def print_dist(name, data):
              if not data:
                  print(f"  - {name} Distribution: N/A (no data)")
                  return
              import numpy as np
              arr = np.array(data)
              p = np.percentile(arr, [0, 25, 50, 75, 90, 99, 100])
              print(f"  - {name} Distribution:\n    - Mean: {arr.mean():.2f}, Std: {arr.std():.2f}\n    - Min: {p[0]:.0f}, 25%: {p[1]:.0f}, Med: {p[2]:.0f}, 75%: {p[3]:.0f}, 90%: {p[4]:.0f}, 99%: {p[5]:.0f}, Max: {p[6]:.0f}")

          print_dist("Pop counts", pops)
          print_dist("Node fan-out", fan_outs)
          print_dist("LLM Bitset sizes", llm_rs_sizes)
          if is_precompute3:
              print_dist("State Bitset sizes", state_rs_sizes)
          print("-" * 20)

      def run_benchmark(args, run_index: int = 0):
          """Main benchmark logic (single model; no baseline/reference in-process)."""
          print("--- Setting up benchmark environment ---")

          # 1. Load pre-compiled GrammarConstraint
          print(f"Loading pre-compiled grammar constraint from: {args.constraint_file}")
          p = str(args.constraint_file)
          if p.endswith('.gz'):
              with gzip.open(p, 'rt', encoding='utf-8') as f:
                  constraint_json_str = f.read()
          else:
              constraint_json_str = args.constraint_file.read_text(encoding='utf-8')

          # 2. Extract vocabulary for tokenizer
          constraint_json = json.loads(constraint_json_str)
          # The vocabulary maps token strings to integer IDs. We need ID -> token bytes.
          llm_token_map: tuple[list[int], int] = constraint_json['llm_token_map']
          id_to_token: dict[int, bytes] = {}
          for token_bytes, token_id in llm_token_map:
              id_to_token[token_id] = bytes(token_bytes)

          # 3. Load model
          print(f"Loading model from: {args.model}")
          ModelClass = load_model_class(args.model)
          
          t_start_load = time.perf_counter()
          model = ModelClass.from_json_string(constraint_json_str)
          load_time = time.perf_counter() - t_start_load
          print(f"Model loaded in {load_time:.4f} seconds.")

          if args.print_stats:
              print_model_statistics(model, args.model.name)

          # 4. Tokenize input code
          print(f"Loading and tokenizing code from: {args.code}")
          code_bytes = args.code.read_bytes()
          token_ids = greedy_tokenizer(code_bytes, id_to_token)
          print(f"Tokenized into {len(token_ids)} tokens.")

          get_mask_timings: list[float] = []
          commit_timings: list[float] = []
          masks_ranges: list[list[list[int]]] = []  # list of [[s,e], ...] per step

          # 5. Run benchmark loop

          print(f"\n--- Running benchmark ({len(token_ids)} steps) ---")
          progress_bar = tqdm(enumerate(token_ids), total=len(token_ids), desc="Benchmarking steps", disable=os.environ.get("DISABLE_TQDM") == "1")
          for i, token_id in progress_bar:
              if not os.environ.get("NO_GET_MASK") == '1':
                  gc.disable()
                  t_start_mask = time.perf_counter()
                  mask_rs = model.get_mask()
                  t_end_mask = time.perf_counter()
                  gc.enable()
                  get_mask_timings.append(t_end_mask - t_start_mask)
                  # Export the mask for later cross-model comparison during analysis
                  masks_ranges.append(mask_rs.to_ranges())

              # Advance the state
              gc.disable()
              t_start_commit = time.perf_counter()
              model.commit(token_id)
              t_end_commit = time.perf_counter()
              gc.enable()
              commit_timings.append(t_end_commit - t_start_commit)

          print("--- Benchmark finished ---")

          # Finalize model if it has a finalize method (e.g., for printing stats)
          if hasattr(model, 'finalize'):
              print("--- Finalizing model ---")
              model.finalize()

          # 6. Compile and save results
          if get_mask_timings:
              pcts = np.percentile(get_mask_timings, [50, 90, 99])
              summary_stats = {
                  "count": len(get_mask_timings),
                  "mean": float(np.mean(get_mask_timings)),
                  "stddev": float(np.std(get_mask_timings)),
                  "min": float(np.min(get_mask_timings)),
                  "max": float(np.max(get_mask_timings)),
                  "p50": float(pcts[0]),
                  "p90": float(pcts[1]),
                  "p99": float(pcts[2]),
              }
          else:
              summary_stats = {}

          output_data = {
              "model_script": str(args.model),
              "run_timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "inputs": {
                  "grammar_file": str(args.constraint_file),
                  "code_file": str(args.code),
              },
              "results": {
                  "load_time_seconds": load_time,
                  "get_mask_timings_seconds": get_mask_timings,
                  "commit_timings_seconds": commit_timings,
                  "masks_ranges": masks_ranges,
                  "summary_stats": summary_stats,
              }
          }

          # Determine output path
          if args.output:
              output_path = Path(args.output)
              if output_path.is_dir():
                  base_name = f"{args.model.stem}_results.json"
                  if args.repeat > 1:
                      base_name = f"{args.model.stem}_run{run_index + 1}_results.json"
                  output_path = output_path / base_name
              else:  # It's a file path
                  if args.repeat > 1:
                      output_path = output_path.with_name(f"{output_path.stem}_run{run_index + 1}{output_path.suffix}")
          else:
              base_name = f"{args.model.stem}_results.json"
              if args.repeat > 1:
                  base_name = f"{args.model.stem}_run{run_index + 1}_results.json"
              output_path = Path(base_name)
          
          output_path.parent.mkdir(parents=True, exist_ok=True)
          with open(output_path, 'w') as f:
              json.dump(output_data, f, indent=2)
          
          print(f"\nBenchmark results saved to: {output_path}")


      def main():
          parser = argparse.ArgumentParser(description="Benchmark a grammar constraint model implementation (single model, masks exported).")
          parser.add_argument("-f", "--constraint-file", type=Path, required=True, help="Path to the pre-compiled .json.gz grammar constraint file.")
          parser.add_argument("-c", "--code", type=Path, required=True, help="Path to the code file to use as input.")
          parser.add_argument("-m", "--model", type=Path, required=True, help="Path to the model .py file.")
          parser.add_argument("-o", "--output", type=Path, help="Output JSON file or directory.")
          parser.add_argument('--print-stats', action='store_true', help="Print detailed statistics about the loaded models before running the benchmark.")
          parser.add_argument('--repeat', type=int, default=1, help="Number of times to repeat the benchmark run.")

          args = parser.parse_args()

          for p in [args.constraint_file, args.code, args.model]:
              if not p.exists():
                  parser.error(f"File not found: {p}")

          for i in range(args.repeat):
              if args.repeat > 1:
                  print(f"\n--- Running benchmark: Run {i + 1}/{args.repeat} for {args.model.name} ---")
              run_benchmark(args, run_index=i)


      if __name__ == "__main__":
          main()
