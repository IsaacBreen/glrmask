    src/precompute4/weighted_automata/bitset.rs: |
      // src/precompute4/weighted_automata/bitset.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use range_set_blaze::RangeSetBlaze;
      use serde::{Deserialize, Deserializer, Serialize, Serializer};
      use std::fmt::{Debug, Display, Formatter};
      use std::hash::{Hash, Hasher};
      use std::iter::FromIterator;
      use std::ops::{
          BitAnd, BitAndAssign, BitOr, BitOrAssign, Not, Sub, SubAssign,
      };

      // SimpleBitset: a RangeSetBlaze with cached fingerprint and fast "is_all" flag.
      // - fp is a content fingerprint used only for hashing; Eq remains content-based via rsb.
      // - is_all tracks whether it is the universe (0..=usize::MAX), enabling fast short-circuits.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Default)]
      pub struct SimpleBitset {
          pub(crate) rsb: RangeSetBlaze<usize>,
          pub(crate) fp: u64,
          is_all: bool,
      }

      // Fingerprint utilities
      pub(crate) const FP_ZERO: u64 = 0x9E37_79B9_7F4A_7C15;
      const FP_ALL: u64 = 0xD6E8_FEB8_6659_FD93;
      pub(crate) const FP_K1: u64 = 0xC2B2_AE3D_27D4_EB4F;
      pub(crate) const FP_K2: u64 = 0x1656_67B1_F3E1_5A6D;
      const FP_K3: u64 = 0x9E37_79B1_1F37_9B97;

      #[inline]
      pub(crate) fn mix3(a: u64, b: u64, c: u64) -> u64 {
          let mut x = a ^ b.wrapping_mul(FP_K1);
          x = x.rotate_left(27) ^ c.wrapping_mul(FP_K2);
          x ^= x >> 33;
          x = x.wrapping_mul(FP_K3);
          x ^ (x >> 29)
      }

      #[inline]
      fn calc_is_all_and_fp(rsb: &RangeSetBlaze<usize>) -> (bool, u64) {
          let mut it = rsb.ranges();
          if let Some(first) = it.next() {
              if *first.start() == 0 && *first.end() == usize::MAX && it.next().is_none() {
                  return (true, FP_ALL);
              }
              let mut fp = mix3(
                  FP_ZERO,
                  *first.start() as u64,
                  (*first.end() as u64).wrapping_mul(FP_K1),
              );
              for r in it {
                  let s = *r.start() as u64;
                  let e = *r.end() as u64;
                  fp = mix3(fp, s.wrapping_mul(FP_K2), e.wrapping_mul(FP_K3));
              }
              (false, fp)
          } else {
              (false, FP_ZERO)
          }
      }

      #[inline]
      fn universe_rsb() -> RangeSetBlaze<usize> {
          RangeSetBlaze::from_iter([0usize..=usize::MAX])
      }

      impl SimpleBitset {
          #[inline]
          fn from_rsb_inner(rsb: RangeSetBlaze<usize>) -> Self {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }

          #[inline]
          fn update_cached(&mut self) {
              let (is_all, fp) = calc_is_all_and_fp(&self.rsb);
              self.is_all = is_all;
              self.fp = fp;
          }

          pub fn zeros() -> Self {
              SimpleBitset { rsb: RangeSetBlaze::new(), fp: FP_ZERO, is_all: false }
          }
          pub fn all() -> Self {
              SimpleBitset { rsb: universe_rsb(), fp: FP_ALL, is_all: true }
          }
          pub fn from_item(item: usize) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter([item]))
          }
          pub fn from_rsb(rsb: RangeSetBlaze<usize>) -> Self {
              SimpleBitset::from_rsb_inner(rsb)
          }
          pub fn len(&self) -> usize {
              self.rsb.len().try_into().unwrap_or(usize::MAX)
          }
          pub fn is_empty(&self) -> bool {
              self.rsb.is_empty()
          }
          pub fn is_disjoint(&self, other: &SimpleBitset) -> bool {
              if self.is_empty() || other.is_empty() {
                  return true;
              }
              if self.is_all_fast() || other.is_all_fast() {
                  return false;
              }
              (&self.rsb & &other.rsb).is_empty()
          }
          pub fn contains(&self, index: usize) -> bool {
              self.rsb.contains(index)
          }
          pub fn max_item(&self) -> Option<usize> {
              self.rsb.iter().last()
          }
          /// Iterate over items, truncated by `max` to prevent accidental ALL iteration.
          pub fn iter_up_to(&self, max: usize) -> impl Iterator<Item = usize> {
              (&self.rsb & &RangeSetBlaze::from_iter([0..=max])).into_iter()
          }
          #[inline]
          fn with_new_rsb_and_op(_lhs: &SimpleBitset, _rhs: &SimpleBitset, rsb: RangeSetBlaze<usize>, _op_tag: u64) -> SimpleBitset {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }
          #[inline]
          fn with_new_rsb_unary(_src: &SimpleBitset, rsb: RangeSetBlaze<usize>, _op_tag: u64) -> SimpleBitset {
              let (is_all, fp) = calc_is_all_and_fp(&rsb);
              SimpleBitset { rsb, fp, is_all }
          }
          #[inline]
          pub fn is_all_fast(&self) -> bool { self.is_all }

          #[inline]
          pub fn is_subset_of(&self, rhs: &SimpleBitset) -> bool {
              (self & rhs) == *self
          }

          pub fn complement(&self) -> SimpleBitset {
              if self.is_empty() { return SimpleBitset::all(); }
              if self.is_all_fast() { return SimpleBitset::zeros(); }
              let rsb = &universe_rsb() - &self.rsb;
              SimpleBitset::with_new_rsb_unary(self, rsb, 0xD3)
          }

          pub fn insert(&mut self, item: usize) {
              if self.is_all_fast() { return; }
              self.rsb.insert(item);
              self.update_cached();
          }

          pub fn add(&mut self, item: usize) {
              self.insert(item);
          }

          pub fn remove(&mut self, item: usize) {
              if self.is_empty() { return; }
              if self.is_all_fast() {
                  self.rsb = universe_rsb();
              }
              self.rsb.remove(item);
              self.update_cached();
          }

          pub fn set(&mut self, item: usize, value: bool) {
              if value {
                  self.insert(item);
              } else {
                  self.remove(item);
              }
          }

          pub fn clear(&mut self) {
              self.rsb.clear();
              self.fp = FP_ZERO;
              self.is_all = false;
          }

          pub fn clip_to_range(&mut self, min: usize, max: usize) {
              if self.is_empty() { return; }
              if self.is_all_fast() {
                  self.rsb = universe_rsb();
              }
              let clip_rsb = RangeSetBlaze::from_iter([min..=max]);
              self.rsb = &self.rsb & &clip_rsb;
              self.update_cached();
          }

          pub fn clip_min(&mut self, min: usize) {
              self.clip_to_range(min, usize::MAX);
          }

          pub fn clip_max(&mut self, max: usize) {
              self.clip_to_range(0, max);
          }
      }

      impl Hash for SimpleBitset {
          fn hash<H: Hasher>(&self, state: &mut H) {
              state.write_u64(self.fp);
          }
      }

      impl Debug for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  write!(f, "SimpleBitset(ALL)")
              } else {
                  Debug::fmt(&self.rsb, f)
              }
          }
      }

      impl Display for SimpleBitset {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              if self.is_all_fast() {
                  return write!(f, "ALL");
              }
              write!(f, "[")?;
              let mut ranges = self.rsb.ranges().peekable();
              while let Some(range) = ranges.next() {
                  if range.start() == range.end() {
                      write!(f, "{}", range.start())?;
                  } else {
                      write!(f, "{}..={}", range.start(), range.end())?;
                  }
                  if ranges.peek().is_some() {
                      write!(f, ", ")?;
                  }
              }
              write!(f, "]")
          }
      }

      impl FromIterator<usize> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = usize>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      impl FromIterator<std::ops::RangeInclusive<usize>> for SimpleBitset {
          fn from_iter<T: IntoIterator<Item = std::ops::RangeInclusive<usize>>>(iter: T) -> Self {
              SimpleBitset::from_rsb_inner(RangeSetBlaze::from_iter(iter))
          }
      }

      // Borrowed bit-ops
      impl<'a> BitAnd<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() {
                  return SimpleBitset::zeros();
              }
              if self.is_all_fast() { return rhs.clone(); }
              if rhs.is_all_fast() { return self.clone(); }
              let rsb = &self.rsb & &rhs.rsb;
              SimpleBitset::with_new_rsb_and_op(self, rhs, rsb, 0xA1)
          }
      }
      impl<'a> BitOr<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_all_fast() || rhs.is_all_fast() {
                  return SimpleBitset::all();
              }
              if self.is_empty() { return rhs.clone(); }
              if rhs.is_empty() { return self.clone(); }
              let rsb = &self.rsb | &rhs.rsb;
              SimpleBitset::with_new_rsb_and_op(self, rhs, rsb, 0xB1)
          }
      }

      // Assign ops (borrowed RHS)
      impl BitAndAssign<&SimpleBitset> for SimpleBitset {
          fn bitand_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() { return; }
              if rhs.is_empty() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              if rhs.is_all_fast() { return; }
              if self.is_all_fast() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb = &self.rsb & &rhs.rsb;
              self.update_cached();
          }
      }
      impl BitOrAssign<&SimpleBitset> for SimpleBitset {
          fn bitor_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_all_fast() || rhs.is_all_fast() {
                  *self = SimpleBitset::all();
                  return;
              }
              if rhs.is_empty() { return; }
              if self.is_empty() {
                  *self = rhs.clone();
                  return;
              }
              self.rsb |= &rhs.rsb;
              self.update_cached();
          }
      }

      // Owned fallbacks via borrowed ops
      impl BitAnd<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output {
              (&self) & (&rhs)
          }
      }
      impl BitOr<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output {
              (&self) | (&rhs)
          }
      }
      impl<'a> BitAnd<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: &'a SimpleBitset) -> Self::Output {
              (&self) & rhs
          }
      }
      impl<'a> BitOr<&'a SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: &'a SimpleBitset) -> Self::Output {
              (&self) | rhs
          }
      }
      impl<'a> BitAnd<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitand(self, rhs: SimpleBitset) -> Self::Output {
              self & (&rhs)
          }
      }
      impl<'a> BitOr<SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn bitor(self, rhs: SimpleBitset) -> Self::Output {
              self | (&rhs)
          }
      }

      impl SubAssign<&SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: &SimpleBitset) {
              if self.is_empty() || rhs.is_empty() { return; }
              if self.is_all_fast() && rhs.is_all_fast() {
                  *self = SimpleBitset::zeros();
                  return;
              }
              self.rsb = &self.rsb - &rhs.rsb;
              self.update_cached();
          }
      }
      impl SubAssign<SimpleBitset> for SimpleBitset {
          fn sub_assign(&mut self, rhs: SimpleBitset) {
              *self -= &rhs
          }
      }
      impl Sub<SimpleBitset> for SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: SimpleBitset) -> Self::Output {
              (&self) - (&rhs)
          }
      }
      impl<'a> Sub<&'a SimpleBitset> for &'a SimpleBitset {
          type Output = SimpleBitset;
          fn sub(self, rhs: &'a SimpleBitset) -> Self::Output {
              if self.is_empty() || rhs.is_empty() { return self.clone(); }
              if self.is_all_fast() && rhs.is_all_fast() { return SimpleBitset::zeros(); }
              let rsb = &self.rsb - &rhs.rsb;
              SimpleBitset::with_new_rsb_and_op(self, rhs, rsb, 0xC1)
          }
      }

      impl Not for SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() { return SimpleBitset::all(); }
              if self.is_all_fast() { return SimpleBitset::zeros(); }
              let rsb = &universe_rsb() - &self.rsb;
              SimpleBitset::with_new_rsb_unary(&self, rsb, 0xD1)
          }
      }
      impl Not for &SimpleBitset {
          type Output = SimpleBitset;
          fn not(self) -> Self::Output {
              if self.is_empty() { return SimpleBitset::all(); }
              if self.is_all_fast() { return SimpleBitset::zeros(); }
              let rsb = &universe_rsb() - &self.rsb;
              SimpleBitset::with_new_rsb_unary(self, rsb, 0xD2)
          }
      }

      impl Serialize for SimpleBitset {
          fn serialize<S>(&self, serializer: S) -> Result<S::Ok, S::Error>
      where
              S: Serializer,
          {
              #[derive(Serialize)]
              #[serde(untagged)]
              enum Repr<'a> {
                  All(&'a str),
                  Ranges(Vec<RangeRepr>),
              }

              #[derive(Serialize)]
              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
              }

              if self.is_all {
                  Repr::All("ALL").serialize(serializer)
              } else {
                  let ranges: Vec<RangeRepr> = self.rsb.ranges().map(|r| {
                      if r.start() == r.end() {
                          RangeRepr::Single(*r.start())
                      } else {
                          RangeRepr::Range((*r.start(), *r.end()))
                      }
                  }).collect();
                  Repr::Ranges(ranges).serialize(serializer)
              }
          }
      }

      impl<'de> Deserialize<'de> for SimpleBitset {
          fn deserialize<D>(deserializer: D) -> Result<Self, D::Error>
          where
              D: Deserializer<'de>,
          {
              use serde::de;

              #[derive(Deserialize)]
              #[serde(untagged)]
              enum Repr {
                  All(String),
                  Ranges(Vec<RangeRepr>),
              }

              #[derive(Deserialize)]
              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
              }

              match Repr::deserialize(deserializer)? {
                  Repr::All(s) => {
                      if s == "ALL" {
                          Ok(SimpleBitset::all())
                      } else {
                          Err(de::Error::custom("expected string 'ALL' for all-bitset"))
                      }
                  }
                  Repr::Ranges(ranges) => {
                      let rsb = RangeSetBlaze::from_iter(ranges.into_iter().map(|rr| match rr {
                          RangeRepr::Single(i) => i..=i,
                          RangeRepr::Range((s, e)) => s..=e,
                      }));
                      Ok(SimpleBitset::from_rsb_inner(rsb))
                  }
              }
          }
      }
    src/precompute4/weighted_automata/dwa.rs: |
      // src/precompute4/weighted_automata/dwa.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{format_pos_code, I16Map, StateID, Weight};
      use std::collections::{BTreeMap, HashMap, VecDeque};
      use std::fmt::{self, Display, Formatter};
      use std::ops::{Deref, Index, IndexMut};

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum DWABuildError {
          TransitionAlreadyExists { from: StateID, on: i16 },
          DefaultTransitionAlreadyExists { from: StateID },
          StateOutOfBounds { state: StateID },
      }

      impl Display for DWABuildError {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              match self {
                  DWABuildError::TransitionAlreadyExists { from, on } => {
                      write!(f, "Transition from state {} on code {} already exists", from, on)
                  }
                  DWABuildError::DefaultTransitionAlreadyExists { from } => {
                      write!(f, "Default transition from state {} already exists", from)
                  }
                  DWABuildError::StateOutOfBounds { state } => write!(f, "State {} is out of bounds", state),
              }
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAState {
          pub transitions: I16Map<StateID>,
          pub final_weight: Option<Weight>,
          pub trans_weight_default: Option<Weight>,
          pub trans_weights_exceptions: BTreeMap<i16, Weight>,
          /// Optional state-entry weight (intersected upon entering the state).
          pub state_weight: Option<Weight>,
      }

      impl DWAState {
          pub fn get_weight(&self, ch: i16) -> Option<&Weight> {
              self.trans_weights_exceptions.get(&ch).or(self.trans_weight_default.as_ref())
          }

          /// Intersects all weights in this state with the given weight.
          pub fn apply_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw &= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw &= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd &= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w &= weight;
              }
          }

          /// Subtracts a weight from all weights in this state.
          pub fn exclude_weight(&mut self, weight: &Weight) {
              if let Some(sw) = &mut self.state_weight {
                  *sw -= weight;
                  if sw.is_empty() {
                      self.state_weight = None;
                  }
              }

              if let Some(fw) = &mut self.final_weight {
                  *fw -= weight;
                  if fw.is_empty() {
                      self.final_weight = None;
                  }
              }

              if let Some(twd) = &mut self.trans_weight_default {
                  *twd -= weight;
              }

              for w in self.trans_weights_exceptions.values_mut() {
                  *w -= weight;
              }
          }

          /// Iterator over all outgoing edges:
          /// - Default edge appears as (None, target, weight)
          /// - Exception edges appear as (Some(label), target, weight)
          #[inline]
          pub fn iter_edges(&self) -> impl Iterator<Item = (Option<i16>, StateID, &Weight)> {
              let def_iter = self
                  .transitions
                  .default
                  .and_then(|to| self.trans_weight_default.as_ref().map(move |w| (to, w)))
                  .into_iter()
                  .map(|(to, w)| (None, to, w));
              let ex_iter = self
                  .transitions
                  .exceptions
                  .iter()
                  .filter_map(|(ch, to)| self.trans_weights_exceptions.get(ch).map(|w| (Some(*ch), *to, w)));
              def_iter.chain(ex_iter)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWAStates(pub Vec<DWAState>);

      impl Index<usize> for DWAStates {
          type Output = DWAState;
          fn index(&self, index: usize) -> &Self::Output {
              &self.0[index]
          }
      }
      impl IndexMut<usize> for DWAStates {
          fn index_mut(&mut self, index: usize) -> &mut Self::Output {
              &mut self.0[index]
          }
      }
      impl Deref for DWAStates {
          type Target = [DWAState];
          fn deref(&self) -> &Self::Target {
              &self.0
          }
      }
      impl DWAStates {
          pub fn len(&self) -> usize {
              self.0.len()
          }
          pub fn add_state(&mut self) -> StateID {
              let id = self.0.len();
              self.0.push(DWAState::default());
              id
          }

          /// Adds a pre-existing DWAState to the collection and returns its new ID.
          pub fn add_existing_state(&mut self, state: DWAState) -> StateID {
              let id = self.0.len();
              self.0.push(state);
              id
          }

          pub fn copy_state(&mut self, state_id: StateID) -> StateID {
              assert!(state_id < self.len(), "state_id out of bounds");
              let state = self[state_id].clone();
              self.add_existing_state(state)
          }

          pub fn apply_weight(&mut self, state_id: StateID, weight: &Weight) {
              assert!(state_id < self.len(), "state_id out of bounds");
              self[state_id].apply_weight(weight);
          }

          pub fn copy_subgraph(&mut self, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= self.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(self[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = self[old_id].clone();

                  // Remap default transition
                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  // Remap exception transitions
                  let mut new_exceptions = BTreeMap::new();
                  for (ch, &old_target) in &old_state_clone.transitions.exceptions {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(self[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      new_exceptions.insert(*ch, new_target_id);
                  }
                  self[new_id].transitions.exceptions = new_exceptions;
              }
              (new_start_id, remap)
          }

          pub fn copy_subgraph_from(&mut self, other_states: &DWAStates, start_id: StateID) -> (StateID, HashMap<StateID, StateID>) {
              let mut remap = HashMap::new();
              let mut q = VecDeque::new();

              if start_id >= other_states.len() {
                  let new_start_id = self.add_state();
                  return (new_start_id, remap);
              }

              let new_start_id = self.add_existing_state(other_states[start_id].clone());
              remap.insert(start_id, new_start_id);
              q.push_back((start_id, new_start_id));

              while let Some((old_id, new_id)) = q.pop_front() {
                  let old_state_clone = other_states[old_id].clone();

                  if let Some(old_target) = old_state_clone.transitions.default {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      self[new_id].transitions.default = Some(new_target_id);
                  }

                  self[new_id].transitions.exceptions = old_state_clone.transitions.exceptions.iter().map(|(ch, &old_target)| {
                      let new_target_id = *remap.entry(old_target).or_insert_with(|| {
                          let new_id = self.add_existing_state(other_states[old_target].clone());
                          q.push_back((old_target, new_id));
                          new_id
                      });
                      (*ch, new_target_id)
                  }).collect();
              }
              (new_start_id, remap)
          }
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWABody {
          pub start_state: StateID,
      }

      #[derive(Clone, Debug, Default, PartialEq, Eq)]
      pub struct DWA {
          pub states: DWAStates,
          pub body: DWABody,
      }

      impl DWA {
          pub fn new() -> Self {
              let mut states = DWAStates::default();
              let start = states.add_state();
              DWA { states, body: DWABody { start_state: start } }
          }

          pub fn add_state(&mut self) -> StateID {
              self.states.add_state()
          }

          pub fn set_state_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].state_weight = Some(weight);
              Ok(())
          }

          pub fn set_final_weight(&mut self, state: StateID, weight: Weight) -> Result<(), DWABuildError> {
              if state >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state });
              }
              self.states[state].final_weight = Some(weight);
              Ok(())
          }

          pub fn add_transition(
              &mut self,
              from: StateID,
              on: i16,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.exceptions.contains_key(&on) {
                  return Err(DWABuildError::TransitionAlreadyExists { from, on });
              }
              from_state.transitions.exceptions.insert(on, to);
              from_state.trans_weights_exceptions.insert(on, weight);
              Ok(())
          }

          pub fn set_default_transition(
              &mut self,
              from: StateID,
              to: StateID,
              weight: Weight,
          ) -> Result<(), DWABuildError> {
              if from >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: from });
              }
              if to >= self.states.len() {
                  return Err(DWABuildError::StateOutOfBounds { state: to });
              }
              let from_state = &mut self.states[from];
              if from_state.transitions.default.is_some() {
                  return Err(DWABuildError::DefaultTransitionAlreadyExists { from });
              }
              from_state.transitions.default = Some(to);
              from_state.trans_weight_default = Some(weight);
              Ok(())
          }
      }

      #[derive(Debug, Clone)]
      pub struct DWAStats {
          pub num_states: usize,
          pub num_transitions: usize,
          pub num_final_states: usize,
          pub num_default_transitions: usize,
          pub avg_exceptions_per_state: f64,
      }

      impl Display for DWAStats {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "DWA Stats:")?;
              writeln!(f, "  - States: {}", self.num_states)?;
              writeln!(f, "  - Transitions: {}", self.num_transitions)?;
              writeln!(f, "  - Final States: {}", self.num_final_states)?;
              writeln!(f, "  - States with Default: {}", self.num_default_transitions)?;
              writeln!(f, "  - Avg Exceptions/State: {:.2}", self.avg_exceptions_per_state)
          }
      }

      impl DWA {
          pub fn stats(&self) -> DWAStats {
              let num_states = self.states.len();
              if num_states == 0 {
                  return DWAStats {
                      num_states: 0,
                      num_transitions: 0,
                      num_final_states: 0,
                      num_default_transitions: 0,
                      avg_exceptions_per_state: 0.0,
                  };
              }

              let mut num_exceptions = 0;
              let mut num_final_states = 0;
              let mut num_default_transitions = 0;

              for state in &self.states.0 {
                  num_exceptions += state.transitions.exceptions.len();
                  if state.final_weight.is_some() {
                      num_final_states += 1;
                  }
                  if state.transitions.default.is_some() {
                      num_default_transitions += 1;
                  }
              }

              let num_transitions = num_exceptions + num_default_transitions;
              let avg_exceptions_per_state = num_exceptions as f64 / num_states as f64;

              DWAStats {
                  num_states,
                  num_transitions,
                  num_final_states,
                  num_default_transitions,
                  avg_exceptions_per_state,
              }
          }
      }

      impl Display for DWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "DWA (start: {})", self.body.start_state)?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(sw) = &state.state_weight {
                      writeln!(f, "    state_weight: {}", sw)?;
                  }
                  if let Some(to) = &state.transitions.default {
                      if let Some(w) = &state.trans_weight_default {
                          writeln!(f, "    * -> {} (trans_weight: {})", to, w)?;
                      } else {
                          writeln!(f, "    * -> {}", to)?;
                      }
                  }
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  for (on, to) in &state.transitions.exceptions {
                      let char_repr = if *on >= 0 {
                          format_pos_code(*on)
                      } else {
                          let decoded_id = on.wrapping_sub(i16::MIN);
                          format!("neg({})", decoded_id)
                      };
                      if let Some(w) = state.trans_weights_exceptions.get(on) {
                          writeln!(f, "    {} -> {} (trans_weight: {})", char_repr, to, w)?;
                      } else {
                          writeln!(f, "    {} -> {}", char_repr, to)?;
                      }
                  }
              }
              Ok(())
          }
      }
