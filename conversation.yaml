                      println!("  - Equivalent Terminals: {{{}}}", terminal_names.join(", "));
                  }
              }
              if !found_any {
                  println!("  No equivalent terminals found.");
              }
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
