        EXT_SUFFIX="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("EXT_SUFFIX") or ".so")')"
        PYBIND_INCLUDES="$(python3 -m pybind11 --includes)"
        CXX="${CXX:-c++}"
        CXXFLAGS="-O3 -DNDEBUG -march=native -flto -std=c++17 -shared -fPIC"
