  - user: |-
      Create a new implementation of GSS. Make it as fast as possible.

      I want Accs in this implementation to existing only at one 'level', if that makes sense.
      ie either all of a node's children have Accs, or none of them do. And if the parent has an acc then none of its children do.
      And it should be maintained such that if all the children's accs are equal, the accs are sucked up into the parent. ie they aren't at the children any more.
      So, if the children of a node have accs, then there must be at least one inequality between them.

      We can enforce that Accs can only exist at one level by defining different types of node: type A that can be either root or an internal node that maps to other type As, and type B that can either contain type A and an Acc OR that maps to other type Bs. 'Contain' here means just contains one - wraps. Maps means contains a node map.
      If we were working in Rust, these'd both be enums.

      When I say accs only exist at one 'level', I don't mean they necessarily exist all at the same depth. But rather that if we drew the GSS on a page top to bottom, and drew a dot where each acc exists, then drew a line through the accs, the line would go up and down but would always go right, or left, on the page. ie each x-value in the line has exactly one y-value. (But not that it'd be a straight line.)

      These are just the invariants I want. How you achieve them is up to you. Do it as elegantly as possible.

      It should behave equivalently to leveled_impl.py (with the caveat that reduce_acc is only guaranteed to output the same value between impls as long as the reduce closure is order-independent.)
