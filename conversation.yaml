          `prune_and_transform_recursive` signature:
          `fn prune_and_transform_recursive<T: Ord + Clone + Debug + Hash>(node_arc: &Arc<GSSNode<T>>, edge_to_node_value: &T, closure: &impl Fn(&(StateID, &T)) -> Option<((StateID, T), bool)>, memo: &mut HashMap<(*const GSSNode<T>, T), Option<(Arc<GSSNode<T>>, T)>> ) -> Option<(Arc<GSSNode<T>>, T)>`
