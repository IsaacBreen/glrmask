      use std::collections::BTreeMap;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, Trie3GodWrapper};
      use crate::constraint_extra::{calculate_final_stats3, print_precompute_stats3, PrecomputeStats};
      use crate::datastructures::trie::Trie;

      /// Count total number of ranges across all live_tokens and edge masks for a set of nodes.
      pub fn count_total_ranges_trie3(
          all_nodes: &[PrecomputeNode3Index],
          trie3_god: &Trie3GodWrapper,
      ) -> usize {
          let mut count = 0;
          for n in all_nodes {
              let g = n.read(trie3_god).expect("read");
              count += g.value.live_tokens.inner().ranges_len();
              for ((_pop, llm_bv), _dm) in g.children() {
                  count += llm_bv.inner().ranges_len();
              }
          }
          count
      }

      /// Compute and print high-level stats for a trie3 set of roots.
      pub fn compute_and_print_precompute_stats3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) {
          let mut stats = PrecomputeStats::default();
          calculate_final_stats3(roots, &mut stats, trie3_god);
          print_precompute_stats3(&stats, trie3_god);

          // Also print new MiniTrie-based metrics
          let (mini, _, _) = crate::trie3_opt::coordinator::export_to_mini(
              roots,
              trie3_god,
              max_llm_token_id,
              max_state_id,
          );
          let metrics = crate::trie3_opt::metrics::run_all_metrics(&mini);
          println!("  MiniTrie Metrics: {}", crate::trie3_opt::metrics::pretty_print_metrics_map(&metrics));
      }

      /// Debug utility to remove all edges with pop>0, preserving pop<=0 edges.
      pub fn debug_remove_pop_gt_0_edges_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "DEBUG: Removing all edges with pop > 0 from Trie3.");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          for node_idx in all_nodes {
              let mut w = node_idx.write(trie3_god).expect("write");

              let old_children = std::mem::take(w.children_mut());
              let mut new_children = BTreeMap::new();

              for ((pop, llm_bv), dest_map) in old_children {
                  if pop <= 0 {
                      new_children.insert((pop, llm_bv), dest_map);
                  }
              }

              let mut new_live = LLMTokenBV::zeros();
              for ((_, llm_bv), _) in &new_children {
                  new_live |= llm_bv;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = new_children;
          }
      }
    src/trie3_opt/passes/full/tokens.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet};

      use ordered_hash_map::OrderedHashMap;
      use range_set_blaze::RangeSetBlaze;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StageVocab, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::Trie;
      use crate::profiler::PROGRESS_BAR_ENABLED;

      /// Remap helper: many-to-one mapping of internal LLM tokens by merging equivalent tokens.
      /// This remaps bitvectors to representative token ids, respecting max_token_id universe.
      pub fn remap_llm_bv_many_to_one(
          bv: &LLMTokenBV,
          map_old_to_new: &BTreeMap<usize, usize>,
          max_token_id: usize,
      ) -> LLMTokenBV {
          if bv.is_empty() {
              return LLMTokenBV::zeros();
          }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          let process_range =
              |range: std::ops::RangeInclusive<usize>,
               ranges_to_add: &mut Vec<_>,
               elements_to_add: &mut Vec<_>| {
                  let (mut current, end) = (*range.start(), *range.end());
                  for (&k, &v) in map_old_to_new.range(current..=end) {
                      if current < k {
                          ranges_to_add.push(current..=k - 1);
                      }
                      elements_to_add.push(v);
                      current = k + 1;
                  }
                  if current <= end {
                      ranges_to_add.push(current..=end);
                  }
              };

          if *bv == LLMTokenBV::max_ones() {
              process_range(0..=max_token_id, &mut ranges_to_add, &mut elements_to_add);
          } else {
              for range in bv.inner().ranges() {
                  process_range(*range.start()..=*range.end(), &mut ranges_to_add, &mut elements_to_add);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV {
              inner: crate::datastructures::cache::intern_l1(new_set),
          }
      }

      /// Remap helper under a permutation mapping (one-to-one). Unseen tokens stay as identity.
      pub fn remap_llm_bv_permutation(
          bv: &LLMTokenBV,
          map_old_to_new: &BTreeMap<usize, usize>,
          _max_token_id: usize,
      ) -> LLMTokenBV {
          // Fast‑paths for empty or full‑universe bitvectors.
          if bv.is_empty() {
              return LLMTokenBV::zeros();
          }
          if *bv == LLMTokenBV::max_ones() {
              return LLMTokenBV::max_ones();
          }

          let mut ranges_to_add = Vec::new();
          let mut elements_to_add = Vec::new();

          for range in bv.inner().ranges() {
              let (mut current, end) = (*range.start(), *range.end());

              for (&k, &v) in map_old_to_new.range(current..=end) {
                  if current < k {
                      // Identity mapping for elements not in map_old_to_new
                      ranges_to_add.push(current..=k - 1);
                  }
                  elements_to_add.push(v);
                  current = k + 1;
              }

              if current <= end {
                  // Identity mapping for the rest of the range
                  ranges_to_add.push(current..=end);
              }
          }

          let mut new_set = RangeSetBlaze::from_iter(ranges_to_add);
          new_set.extend(elements_to_add);

          LLMTokenBV {
              inner: crate::datastructures::cache::intern_l1(new_set),
          }
      }

      /// Merge equivalent internal LLM token ids in Trie3:
      /// Two tokens are equivalent if they occur together in every LLMTokenBV occurrence across:
      /// - node.value.live_tokens
      /// - each edge key's (pop, LLMTokenBV) mask
      ///
      /// Applies many-to-one mapping into representative ids, remapping node/edge masks,
      /// and updates the provided StageVocab.
      pub fn merge_equivalent_llm_tokens_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          stage_vocab: &mut StageVocab,
      ) {
          crate::debug!(2, "Merging equivalent LLM tokens in Trie3...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // 1) Collect all unique bitsets to use as splitters.
          let mut all_bvs = HashSet::new();
          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Merge Tokens (Collect BVs)",
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              let g = n.read(trie3_god).expect("read");
              for ((_, llm_bv), _dm) in g.children() {
                  if !llm_bv.is_empty() {
                      all_bvs.insert(llm_bv.clone());
                  }
              }
          }
          if all_bvs.is_empty() {
              return;
          }

          // 2) Partition refinement.
          let max_tok = stage_vocab.internal_max_llm_token;
          let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
          let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
          class_to_tokens.insert(0, (0..=max_tok).collect());
          let mut num_classes = 1;

          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              all_bvs.iter(),
              desc = "Trie3 Merge Tokens (Refine)",
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = all_bvs.iter();
          for splitter_bv in it {
              if *splitter_bv == LLMTokenBV::max_ones() {
                  continue;
              }

              let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
              for token in splitter_bv.iter() {
                  if token <= max_tok {
                      let class_id = token_to_class[token];
                      members_in_splitter_by_class
                          .entry(class_id)
                          .or_default()
                          .push(token);
                  }
              }

              for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                  let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                  if old_class_size == 0 {
                      continue;
                  }

                  if !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                      let new_class_id = num_classes;
                      num_classes += 1;

                      for &token in &tokens_for_new_class {
                          token_to_class[token] = new_class_id;
                      }

                      let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                      let moved_tokens_set: HashSet<_> =
                          tokens_for_new_class.iter().cloned().collect();
                      old_class_tokens.retain(|t| !moved_tokens_set.contains(t));

                      class_to_tokens.insert(new_class_id, tokens_for_new_class);
                  }
              }
          }

          // 3) Build many-to-one mapping from the final partition.
          let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
          let mut merged_count = 0;
          for (_class_id, group) in &class_to_tokens {
              if group.len() <= 1 {
                  continue;
              }
              let rep = *group.iter().min().unwrap();
              for &t in group {
                  if t != rep {
                      old_to_new.insert(t, rep);
                      merged_count += 1;
                  }
              }
          }
          let tokens_before = max_tok + 1;
          let tokens_after = num_classes;
          crate::debug!(
              2,
              "Trie3: merged LLM tokens. Before: {}, After: {}. ({} merged)",
              tokens_before,
              tokens_after,
              merged_count
          );
          if merged_count == 0 {
              return;
          }

          // Memoization cache for remapping.
          let mut memo: HashMap<LLMTokenBV, LLMTokenBV> = HashMap::new();

          // Precompute the mapped universal set once (used when a set equals max_ones())
          let mut mapped_universe = LLMTokenBV::zeros();
          for t in 0..=max_tok {
              let rep = old_to_new.get(&t).copied().unwrap_or(t);
              mapped_universe.insert(rep);
          }

          // Identify affected bitvector instances (by Arc pointer identity)
          let mut affected_ptrs: HashSet<*const RangeSetBlaze<usize>> = HashSet::new();
          for splitter in all_bvs {
              affected_ptrs.insert(std::sync::Arc::as_ptr(&splitter.inner));
          }

          // 4) Remap trie in‑place, only where needed
          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Merge (Remap In‑Place)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for n in it {
              // Quick check whether this node references any affected bitvector.
              let needs_update = {
                  let r = n.read(trie3_god).expect("read");
                  let lv_ptr = std::sync::Arc::as_ptr(&r.value.live_tokens.inner);
                  if affected_ptrs.contains(&lv_ptr) {
                      true
                  } else {
                      let mut touched = false;
                      for ((_, llm_bv), _dm) in r.children() {
                          let key_ptr = std::sync::Arc::as_ptr(&llm_bv.inner);
                          if affected_ptrs.contains(&key_ptr) {
                              touched = true;
                              break;
                          }
                      }
                      touched
                  }
              };
              if !needs_update {
                  continue;
              }

              let mut w = n.write(trie3_god).expect("write");

              // Remap edge keys (pop, LLMTokenBV)
              let old_children = std::mem::take(w.children_mut());
              let mut new_children: BTreeMap<
                  (isize, LLMTokenBV),
                  OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
              > = BTreeMap::new();
              for ((pop, llm_bv), dm) in old_children {
                  let mapped_key_bv = if llm_bv.is_empty() {
                      LLMTokenBV::zeros()
                  } else if llm_bv == LLMTokenBV::max_ones() {
                      mapped_universe.clone()
                  } else {
                      let key_ptr = std::sync::Arc::as_ptr(&llm_bv.inner);
                      if affected_ptrs.contains(&key_ptr) {
                          memo.entry(llm_bv)
                              .or_insert_with_key(|bv| remap_llm_bv_many_to_one(bv, &old_to_new, max_tok))
                              .clone()
                      } else {
                          llm_bv
                      }
                  };
                  if mapped_key_bv.is_empty() {
                      continue;
                  }
                  let entry = new_children
                      .entry((pop, mapped_key_bv))
                      .or_insert_with(OrderedHashMap::new);
                  for (dst, sid_bv) in dm {
                      entry
                          .entry(dst)
                          .and_modify(|e| *e |= &sid_bv)
                          .or_insert(sid_bv);
                  }
              }
              *w.children_mut() = new_children;

              // Recompute live tokens from the new children
              let mut new_live = LLMTokenBV::zeros();
              for ((_, llm_bv), _) in w.children() {
                  new_live |= llm_bv;
              }
              w.value.live_tokens = new_live;
          }
          // 5) Update StageVocab
          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              old_to_new.iter(),
              desc = "Trie3 Merge (Update Vocab)",
              total = old_to_new.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = old_to_new.iter();
          for (old, rep) in it {
              if old == rep {
                  continue;
              }
              if let Some(moved) = stage_vocab.internal_to_original.remove(old) {
                  let entry = stage_vocab.internal_to_original.entry(*rep).or_default();
                  *entry |= &moved;
                  for o in moved.iter() {
                      stage_vocab.original_to_internal.insert(o, *rep);
                  }
              }
          }
      }
    src/trie3_opt/passes/merge_structural.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Merge nodes with identical structure via iterative refinement. Signature includes:
      /// - End flag
      /// - For each edge-key: (pop, tokens) and destination-class aggregated states.
      /// This is a simplified variant of the structural merge in the large pipeline, implemented
      /// purely over the MiniTrie.
      pub struct MergeStructuralPass {
          pub max_iters: usize,
      }

      impl MergeStructuralPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeStructuralPass {
          fn name(&self) -> &'static str {
              "MergeStructural"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let n = trie.nodes.len();
              if n == 0 {
                  return;
              }

              // Map node id -> dense index
              let mut dense_of: HashMap<NodeId, usize> = HashMap::with_capacity(n);
              let mut old_of: Vec<NodeId> = Vec::with_capacity(n);
              for (i, node) in trie.nodes.iter().enumerate() {
                  dense_of.insert(node.id, i);
                  old_of.push(node.id);
              }

              // Initial classes by end flag and out-degree
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class = 0usize;
              for (i, node) in trie.nodes.iter().enumerate() {
                  let key = (node.end, node.out_degree());
                  let cid = *class_map.entry(key).or_insert_with(|| {
                      let v = next_class;
                      next_class += 1;
                      v
                  });
                  prev_class[i] = cid;
              }

              for _ in 0..self.max_iters.max(1) {
                  // Build signature per node
                  #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug)]
                  #[derive(Hash)]
      struct EdgeSig {
                      pop: isize,
                      tokens: SortedSet,
                      dest: Vec<(usize, SortedSet)>, // dest_class, states
                  }
                  type NodeSig = (bool, Vec<EdgeSig>);

                  let mut sig_to_id: HashMap<NodeSig, usize> = HashMap::new();
                  let mut new_class: Vec<usize> = vec![0; n];
                  let mut next = 0usize;
                  let mut changes = 0usize;

                  for (i, node) in trie.nodes.iter().enumerate() {
                      // Aggregate by (pop, tokens) -> dest_class -> union of states
                      let mut per_key: BTreeMap<(isize, SortedSet), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in &node.children {
                          let mut inner = per_key.entry((ek.pop, ek.tokens.clone())).or_insert_with(BTreeMap::new);
                          for (dst, sids) in dm.iter() {
                              let d_dense = *dense_of.get(dst).unwrap();
                              let d_class = prev_class[d_dense];
                              let entry = inner.entry(d_class).or_insert_with(SortedSet::new);
                              entry.union_inplace(sids);
                          }
                      }

                      // Build canonical signature vector
                      let mut esigs: Vec<EdgeSig> = Vec::with_capacity(per_key.len());
                      for ((pop, toks), dm_class) in per_key.into_iter() {
                          let mut dest_vec: Vec<(usize, SortedSet)> = dm_class.into_iter().collect();
                          dest_vec.sort_unstable_by(|a, b| {
                              let c = a.0.cmp(&b.0);
                              if c != std::cmp::Ordering::Equal {
                                  return c;
                              }
                              a.1.cmp(&b.1)
                          });
                          esigs.push(EdgeSig {
                              pop,
                              tokens: toks,
                              dest: dest_vec,
                          });
                      }
                      let sig: NodeSig = (node.end, esigs);

                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let v = next;
                          next += 1;
                          v
                      });
                      new_class[i] = cid;
                      if new_class[i] != prev_class[i] {
                          changes += 1;
                      }
                  }
                  prev_class = new_class;
                  if changes == 0 {
                      break;
                  }
              }

              // Build representative mapping
              let num_classes = prev_class.iter().max().map(|x| *x + 1).unwrap_or(0);
              let mut rep_of_class: Vec<Option<NodeId>> = vec![None; num_classes];
              for (i, &cid) in prev_class.iter().enumerate() {
                  if rep_of_class[cid].is_none() {
                      rep_of_class[cid] = Some(old_of[i]);
                  }
              }
              let mut rep_of_node: HashMap<NodeId, NodeId> = HashMap::with_capacity(n);
              for (i, node_id) in old_of.iter().enumerate() {
                  let cid = prev_class[i];
                  rep_of_node.insert(*node_id, rep_of_class[cid].unwrap());
              }

              // Rewire edges to representatives and union state-sets
              for node in trie.nodes.iter_mut() {
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (ek, dm) in node.children.clone() {
                      let mut d2: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                      for (dst, sids) in dm {
                          let rep = *rep_of_node.get(&dst).unwrap_or(&dst);
                          d2.entry(rep)
                              .and_modify(|e| e.union_inplace(&sids))
                              .or_insert(sids);
                      }
                      if !d2.is_empty() {
                          new_children.insert(ek, d2);
                      }
                  }
                  node.children = new_children;
              }
          }
      }
