              final_mask = ffi.Bitset.zeros()

              # values[node_idx] = (aggregated_gss, allowed_bv)
              values: Dict[int, Tuple[ffi.GSSNode, ffi.Bitset]] = {}

              # Nodes that determined to stop (no need to revisit)
              stopped: set[int] = set()

