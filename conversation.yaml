          pub(crate) fn is_merge_neutral(&self) -> bool {
              self.llm_tokens_union == HybridBitset::max_ones()
                  && self.terminals_union == HybridL2Bitset::all()
                  && self.stored_trie_nodes.is_empty()
          }

