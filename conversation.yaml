          let s12 = d.add_state();
          let s13 = d.add_state();

          let w_all = Weight::all(); // Corresponds to [0..=2] in the dump
          let w_1_2 = Weight::from_iter(1..=2);

          // State 0 (start)
          d.add_transition(d.body.start_state, 0, s1, w_all.clone()).unwrap();
          d.add_transition(d.body.start_state, 1, s2, w_all.clone()).unwrap();

