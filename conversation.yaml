      use crate::json_serialization::{JSONConvertible, JSONNode};
      use std::collections::BTreeMap as StdMap;
      use std::fmt::{Display, Formatter};
      // Added for derive macro pattern

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      #[derive(Hash)]
      pub struct NonTerminal(pub String);

      impl JSONConvertible for NonTerminal {
          fn to_json(&self) -> JSONNode { self.0.to_json() }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              String::from_json(node).map(NonTerminal)
          }
      }

      impl Display for NonTerminal {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              write!(f, "{}", self.0)
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, Hash, PartialOrd, Ord)]
      pub enum Terminal {
          RegexName(String),
          Literal(Vec<u8>),
      }

      impl JSONConvertible for Terminal {
          fn to_json(&self) -> JSONNode {
              match self {
                  Terminal::RegexName(name) => JSONNode::Object({
                      let mut obj = StdMap::new();
                      obj.insert("type".to_string(), JSONNode::String("Regex".to_string()));
                      obj.insert("value".to_string(), JSONNode::String(name.clone()));
                      obj
                  }),
                  Terminal::Literal(bytes) => JSONNode::Object({
                      let mut obj = StdMap::new();
                      obj.insert("type".to_string(), JSONNode::String("Literal".to_string()));
                      obj.insert("value".to_string(), JSONNode::String(String::from_utf8_lossy(bytes).to_string()));
                      obj
                  }),
              }
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let type_field = obj.remove("type").ok_or_else(|| "Missing field type for Terminal".to_string())?;
                      let value_field = obj.remove("value").ok_or_else(|| "Missing field value for Terminal".to_string())?;

                      match String::from_json(type_field)?.as_str() {
                          "Regex" => Ok(Terminal::RegexName(String::from_json(value_field)?)),
                          "Literal" => Ok(Terminal::Literal(Vec::from_json(value_field)?)),
                          _ => Err("Unknown type for Terminal".to_string()),
                      }
                  }
                  _ => Err("Expected JSONNode::Object for Terminal".to_string()),
              }
          }
      }

      impl Display for Terminal {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              match self {
                  Terminal::RegexName(name) => {
                      // Check if the name is a valid EBNF identifier. If not, quote it.
                      let mut chars = name.chars();
                      let is_ident = if let Some(first) = chars.next() {
                          (first.is_ascii_alphabetic() || first == '_') && chars.all(|c| c.is_ascii_alphanumeric() || c == '_')
                      } else {
                          false
                      };

                      if is_ident {
                          write!(f, "{}", name)
                      } else {
                          write!(f, "'{}'", name.replace('\\', "\\\\").replace('\'', "\\'"))
                      }
                  },
                  Terminal::Literal(bytes) => {
                      let s = String::from_utf8_lossy(bytes);
                      write!(f, "'{}'", s.replace('\\', "\\\\").replace('\'', "\\'"))
                  },
              }
          }
      }

      pub fn regex_name(name: &str) -> Terminal {
          Terminal::RegexName(name.to_string())
      }

      pub fn literal(bytes: &[u8]) -> Terminal {
          Terminal::Literal(bytes.to_vec())
      }

      impl Terminal {
          pub fn terminal(name: &str) -> Self {
              Terminal::RegexName(name.to_string())
          }

          pub fn literal(bytes: Vec<u8>) -> Self {
              Terminal::Literal(bytes)
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub enum Symbol {
          Terminal(Terminal),
          NonTerminal(NonTerminal),
      }

      impl JSONConvertible for Symbol {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              match self {
                  Symbol::Terminal(t) => {
                      obj.insert("variant".to_string(), JSONNode::String("Terminal".to_string()));
                      obj.insert("value".to_string(), t.to_json());
                  }
                  Symbol::NonTerminal(nt) => {
                      obj.insert("variant".to_string(), JSONNode::String("NonTerminal".to_string()));
                      obj.insert("value".to_string(), nt.to_json());
                  }
              }
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let variant = obj.remove("variant").ok_or_else(|| "Missing field variant for Symbol".to_string())
                                         .and_then(String::from_json)?;
                      let value_node = obj.remove("value").ok_or_else(|| "Missing field value for Symbol".to_string())?;
                      match variant.as_str() {
                          "Terminal" => Terminal::from_json(value_node).map(Symbol::Terminal),
                          "NonTerminal" => NonTerminal::from_json(value_node).map(Symbol::NonTerminal),
                          _ => Err(format!("Unknown variant {} for Symbol", variant)),
                      }
                  }
                  _ => Err("Expected JSONNode::Object for Symbol".to_string()),
              }
          }
      }


      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct Production {
          pub lhs: NonTerminal,
          pub rhs: Vec<Symbol>,
      }

      // Manual impl for Production (could be derived)
      impl JSONConvertible for Production {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("lhs".to_string(), self.lhs.to_json());
              obj.insert("rhs".to_string(), self.rhs.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let lhs = obj.remove("lhs").ok_or_else(|| "Missing field lhs for Production".to_string())
                                       .and_then(NonTerminal::from_json)?;
                      let rhs = obj.remove("rhs").ok_or_else(|| "Missing field rhs for Production".to_string())
                                       .and_then(Vec::<Symbol>::from_json)?;
                      Ok(Production { lhs, rhs })
                  }
                  _ => Err("Expected JSONNode::Object for Production".to_string()),
              }
          }
      }

      impl Display for Production {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              write!(f, "{} ->", self.lhs.0)?;
              for symbol in &self.rhs {
                  match symbol {
                      Symbol::Terminal(terminal) => write!(f, " {}", terminal)?,
                      Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0)?,
                  }
              }
              Ok(())
          }
      }

      pub fn nt(name: &str) -> Symbol {
          Symbol::NonTerminal(NonTerminal(name.to_string()))
      }

      pub fn t(name: &str) -> Symbol {
          Symbol::Terminal(regex_name(name))
      }

      pub fn prod(name: &str, rhs: Vec<Symbol>) -> Production {
          Production {
              lhs: NonTerminal(name.to_string()),
              rhs,
          }
      }
    src/glr/items.rs: |
      use crate::glr::grammar::{NonTerminal, Production, Symbol, Terminal};
      use crate::json_serialization::{JSONConvertible, JSONNode};
      use std::collections::BTreeMap as StdMap;
      use std::fmt::{Display, Formatter};
      use std::sync::Arc;
      // Added for derive macro pattern


      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct Item {
          pub production: Arc<Production>,
          pub dot_position: usize,
          pub lookahead: Option<Terminal>,
      }

      // Manual impl for Item (could be derived)
      impl JSONConvertible for Item {
          fn to_json(&self) -> JSONNode {
              let mut obj = StdMap::new();
              obj.insert("production".to_string(), self.production.to_json());
              obj.insert("dot_position".to_string(), self.dot_position.to_json());
              obj.insert("lookahead".to_string(), self.lookahead.to_json());
              JSONNode::Object(obj)
          }
          fn from_json(node: JSONNode) -> Result<Self, String> {
              match node {
                  JSONNode::Object(mut obj) => {
                      let production: Production = obj.remove("production").ok_or_else(|| "Missing field production for Item".to_string())
                                          .and_then(Production::from_json)?;
                      let dot_position = obj.remove("dot_position").ok_or_else(|| "Missing field dot_position for Item".to_string())
                                            .and_then(usize::from_json)?;
                      let lookahead = obj.remove("lookahead").ok_or_else(|| "Missing field lookahead for Item".to_string())
                                            .and_then(Option::<Terminal>::from_json)?;
                      Ok(Item { production: Arc::new(production), dot_position, lookahead })
                  }
                  _ => Err("Expected JSONNode::Object for Item".to_string()),
              }
          }
      }

      impl Display for Item {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              // Display the production and dot position
              write!(f, "[{} ->", self.production.lhs.0)?;
              for (i, symbol) in self.production.rhs.iter().enumerate() {
                  if i == self.dot_position {
                      write!(f, " •")?;
                  }
                  match symbol {
                      Symbol::Terminal(terminal) => write!(f, " {}", terminal)?,
                      Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0)?,
                  }
              }
              if self.dot_position == self.production.rhs.len() {
                  write!(f, " •")?;
              }
              write!(f, ", ")?;
              // Display the lookahead
              if let Some(lookahead) = &self.lookahead {
                  write!(f, "{}", lookahead)?;
              } else {
                  write!(f, "ε")?; // Epsilon for no lookahead
              }
              write!(f, "]")?;
              Ok(())
          }
      }

      impl Item {
          pub fn dot_at_end(&self) -> bool {
              self.dot_position == self.production.rhs.len()
          }

          pub fn next(&self) -> Option<(Symbol, Self)> {
              if let Some(symbol) = self.production.rhs.get(self.dot_position) {
                  Some((
                      symbol.clone(),
                      Item {
                          production: self.production.clone(),
                          dot_position: self.dot_position + 1,
                          lookahead: self.lookahead.clone(),
                      },
                  ))
              } else {
                  None
              }
          }

          pub fn prev(&self) -> Option<(Symbol, Self)> {
              if self.dot_position > 0 {
                  let symbol = self.production.rhs[self.dot_position - 1].clone();
                  Some((
                      symbol,
                      Item {
                          production: self.production.clone(),
                          dot_position: self.dot_position - 1,
                          lookahead: self.lookahead.clone(),
                      },
                  ))
              } else {
                  None
              }
          }
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq)]
      pub enum LRMode {
          LALR,
          LALR_EX_SHIFT_STATES,
          LR1,
      }

      pub const LR_MODE: LRMode = LRMode::LALR;
      // pub const LR_MODE: LRMode = LRMode::LALR_EX_GOTO;
      // pub const LR_MODE: LRMode = LRMode::LR1;
    src/glr/automaton.rs: |
      use crate::glr::grammar::{NonTerminal, Production, Symbol, Terminal};
      use crate::glr::items::{Item, LRMode, LR_MODE};
      use std::collections::{BTreeMap, BTreeSet, VecDeque};
      use std::sync::Arc;
      use profiler_macro::time_it;

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord)]
      pub enum Nullability {
          /// Can only derive strings containing terminals; cannot derive ε.
          NotNull,
          /// Can derive ε, and can also derive strings containing terminals.
          Nullable,
          /// Can only derive ε (or other non-terminals that are themselves Null).
          /// Cannot derive any string containing a terminal.
          Null,
      }

      pub fn compute_nonterminal_nullability(productions: &[Production]) -> BTreeMap<NonTerminal, Nullability> {
          if productions.is_empty() {
              return BTreeMap::new();
          }

          // 1. Collect all non-terminals from the grammar.
          let mut all_nonterminals = BTreeSet::new();
          for p in productions {
              all_nonterminals.insert(p.lhs.clone());
              for s in &p.rhs {
                  if let Symbol::NonTerminal(nt) = s {
                      all_nonterminals.insert(nt.clone());
                  }
              }
          }

          // Pass 1: Determine which non-terminals can derive ε.
          let mut can_derive_epsilon = BTreeSet::new();
          let mut changed = true;
          while changed {
              changed = false;
              for p in productions {
                  if !can_derive_epsilon.contains(&p.lhs) {
                      let rhs_is_nullable = p.rhs.iter().all(|symbol| match symbol {
                          Symbol::Terminal(_) => false,
                          Symbol::NonTerminal(nt) => can_derive_epsilon.contains(nt),
                      });
                      if rhs_is_nullable {
                          can_derive_epsilon.insert(p.lhs.clone());
                          changed = true;
                      }
                  }
              }
          }

          // Pass 2: Determine which non-terminals are productive (can derive a terminal string).
          let mut can_derive_terminal = BTreeSet::new();
          changed = true;
          while changed {
              changed = false;
              for p in productions {
                  if !can_derive_terminal.contains(&p.lhs) {
                      let rhs_is_productive = p.rhs.iter().any(|symbol| match symbol {
                          Symbol::Terminal(_) => true,
                          Symbol::NonTerminal(nt) => can_derive_terminal.contains(nt),
                      });
                      if rhs_is_productive {
                          can_derive_terminal.insert(p.lhs.clone());
                          changed = true;
                      }
                  }
              }
          }

          // Combine results.
          all_nonterminals.into_iter().map(|nt| {
              let is_nullable = can_derive_epsilon.contains(&nt);
              let is_productive = can_derive_terminal.contains(&nt);

              let status = match (is_nullable, is_productive) {
                  (true, false) => Nullability::Null,
                  (true, true) => Nullability::Nullable,
                  (false, true) => Nullability::NotNull,
                  // A non-productive non-terminal that cannot derive ε is just a dead end.
                  // It doesn't fit neatly, but NotNull is the safest classification.
                  (false, false) => Nullability::NotNull,
              };
              (nt, status)
          }).collect()
      }

      pub fn compute_null_nonterminals(productions: &[Production]) -> BTreeSet<NonTerminal> {
          compute_nonterminal_nullability(productions)
              .into_iter()
              .filter_map(|(nt, status)| (status == Nullability::Null).then_some(nt))
              .collect()
      }

      pub fn compute_nullable_nonterminals(productions: &[Production]) -> BTreeSet<NonTerminal> {
          crate::debug!(3, "Computing nullable non-terminals");
          compute_nonterminal_nullability(productions)
              .into_iter()
              .filter_map(|(nt, status)| (status == Nullability::Nullable || status == Nullability::Null).then_some(nt))
              .collect()
      }

      pub fn compute_first_sets_for_nonterminals(productions: &[Production]) -> BTreeMap<NonTerminal, BTreeSet<Terminal>> {
          // TODO: should this account for EOF? Return `BTreeMap<NonTerminal, BTreeSet<Option<Terminal>>>`?
          crate::debug!(3, "Computing first sets for non-terminals");
          let nullable_nonterminals = compute_nullable_nonterminals(productions);
          let mut first_sets: BTreeMap<NonTerminal, BTreeSet<Terminal>> = BTreeMap::new();

          // Initialize for all non-terminals to avoid panics and handle non-terminals that only appear on RHS.
          for p in productions {
              first_sets.entry(p.lhs.clone()).or_default();
              for s in &p.rhs {
                  if let Symbol::NonTerminal(nt) = s {
                      first_sets.entry(nt.clone()).or_default();
                  }
              }
          }

          let mut changed = true;
          while changed {
              changed = false;

              for production in productions {
                  let lhs = &production.lhs;
                  let rhs = &production.rhs;

                  let old_size = first_sets.get(lhs).unwrap().len();

                  for symbol in rhs {
                      if let Symbol::NonTerminal(nt) = symbol {
                          let first_nt = first_sets.get(nt).cloned().unwrap_or_default(); // Handle case where nt might not be in first_sets yet
                          first_sets.get_mut(lhs).unwrap().extend(first_nt);

                          if !nullable_nonterminals.contains(nt) {
                              break;
                          }
                      } else if let Symbol::Terminal(t) = symbol { // Added this case
                          first_sets.get_mut(lhs).unwrap().insert(t.clone());
                          break;
                      }
                  }

                  if first_sets.get(lhs).unwrap().len() != old_size {
                      changed = true;
                  }
              }
          }

          first_sets
      }

      pub fn compute_follow_sets_for_nonterminals(
          productions: &[Production],
          first_sets: &BTreeMap<NonTerminal, BTreeSet<Terminal>>,
          nullable_nonterminals: &BTreeSet<NonTerminal>,
      ) -> BTreeMap<NonTerminal, BTreeSet<Option<Terminal>>> {
          crate::debug!(3, "Computing follow sets for non-terminals");
          let mut follow_sets: BTreeMap<NonTerminal, BTreeSet<Option<Terminal>>> = BTreeMap::new();

          // Initialize for all non-terminals
          for production in productions {
              follow_sets.entry(production.lhs.clone()).or_default();
              for symbol in &production.rhs { // Ensure all non-terminals in RHS are in follow_sets
                  if let Symbol::NonTerminal(nt) = symbol {
                      follow_sets.entry(nt.clone()).or_default();
                  }
              }
          }

          // Rule 1: Place EOF (None) in FOLLOW(S) where S is the start symbol.
          if !productions.is_empty() {
              let start_nt = &productions[0].lhs;
              follow_sets.entry(start_nt.clone()).or_default().insert(None);
          }

          let mut changed = true;
          while changed {
              changed = false;

              for production in productions {
                  let lhs = &production.lhs;
                  let rhs = &production.rhs;

                  for (i, symbol) in rhs.iter().enumerate() {
                      if let Symbol::NonTerminal(nt) = symbol {
                          let old_len = follow_sets.get(nt).unwrap().len();

                          let mut suffix_is_nullable = true;
                          for next_symbol in &rhs[i + 1..] {
                              match next_symbol {
                                  Symbol::Terminal(t_next) => {
                                      follow_sets.get_mut(nt).unwrap().insert(Some(t_next.clone()));
                                      suffix_is_nullable = false;
                                      break;
                                  }
                                  Symbol::NonTerminal(nt_next) => {
                                      let first_next = first_sets.get(nt_next).cloned().unwrap_or_default();
                                      follow_sets.get_mut(nt).unwrap().extend(first_next.iter().cloned().map(Some));

                                      if !nullable_nonterminals.contains(nt_next) {
                                          suffix_is_nullable = false;
                                          break;
                                      }
                                  }
                              }
                          }

                          if suffix_is_nullable {
                              let follow_lhs = follow_sets.get(lhs).unwrap().clone();
                              follow_sets.get_mut(nt).unwrap().extend(follow_lhs);
                          }

                          if follow_sets.get(nt).unwrap().len() != old_len {
                              changed = true;
                          }
                      }
                  }
              }
          }

          follow_sets
      }

      #[time_it]
      fn compute_first_set_for_item(
          item: &Item,
          first_sets: &BTreeMap<NonTerminal, BTreeSet<Terminal>>,
          nullable_nonterminals: &BTreeSet<NonTerminal>,
          cache: &mut BTreeMap<Item, BTreeSet<Option<Terminal>>>,
      ) -> BTreeSet<Option<Terminal>> {
          _compute_first_set_for_item(
              item,
              first_sets,
              nullable_nonterminals,
              cache,
          )
      }

      fn _compute_first_set_for_item(
          item: &Item,
          first_sets: &BTreeMap<NonTerminal, BTreeSet<Terminal>>,
          nullable_nonterminals: &BTreeSet<NonTerminal>,
          cache: &mut BTreeMap<Item, BTreeSet<Option<Terminal>>>,
      ) -> BTreeSet<Option<Terminal>> {
          if let Some(cached) = cache.get(item) {
              return cached.clone();
          }

          let result = if let Some((symbol, next_item)) = item.next() {
              match symbol {
                  Symbol::Terminal(t) => {
                      // If the next symbol is a terminal, the first is just that terminal
                      BTreeSet::from([Some(t)])
                  }
                  Symbol::NonTerminal(nt) => {
                      let mut first_set: BTreeSet<_> = first_sets.get(&nt).cloned().unwrap_or_default()
                          .into_iter()
                          .map(Some)
                          .collect();

                      if nullable_nonterminals.contains(&nt) {
                          // If the non-terminal is nullable, we also need to include the firsts for the next item
                          let next_firsts = _compute_first_set_for_item(
                              &next_item,
                              first_sets,
                              nullable_nonterminals,
                              cache,
                          );
                          first_set.extend(next_firsts);
                      }
                      first_set
                  }
              }
          } else {
              // The dot is at the end. The first is the lookahead.
              BTreeSet::from([item.lookahead.clone()])
          };

          cache.insert(item.clone(), result.clone());
          result
      }

      #[time_it]
      pub fn compute_closure<'a>(
          items: &BTreeSet<Item>,
          prods_by_lhs: &BTreeMap<NonTerminal, Vec<&'a Production>>,
          first_sets: &BTreeMap<NonTerminal, BTreeSet<Terminal>>,
          nullable_nonterminals: &BTreeSet<NonTerminal>,
          follow_sets: &BTreeMap<NonTerminal, BTreeSet<Option<Terminal>>>,
          lalr_mode: bool,
      ) -> BTreeSet<Item> {
          // crate::debug!(3, "Computing closure");
          let mut closure = items.clone();
          let mut worklist: VecDeque<Item> = items.iter().cloned().collect();
          let mut first_set_cache: BTreeMap<Item, BTreeSet<Option<Terminal>>> = BTreeMap::new();

          while let Some(item) = worklist.pop_front() {
              if let Some((Symbol::NonTerminal(nt), next_item)) = item.next() {
                  if let Some(prods_for_nt) = prods_by_lhs.get(&nt) {
                      let lookaheads = compute_first_set_for_item(&next_item, &first_sets, &nullable_nonterminals, &mut first_set_cache);
                      for &prod in prods_for_nt {
                          for lookahead in lookaheads.iter().cloned() {
                              let new_item = Item {
                                  production: Arc::new(prod.clone()),
                                  dot_position: 0,
                                  lookahead,
                              };
                              if closure.insert(new_item.clone()) {
                                  worklist.push_back(new_item);
                              }
                          }
                      }
                  }
              }
          }

          if lalr_mode {
              crate::debug!(4, "Computing LALR closure.");
              let mut lalr_closure = BTreeSet::new();
              let mut reduce_item_cores: BTreeMap<(Production, usize), BTreeSet<Option<Terminal>>> = BTreeMap::new();

              // Separate reduce and non-reduce items, and group reduce items by core
              for item in closure {
                  reduce_item_cores.entry(((*item.production).clone(), item.dot_position)).or_default().insert(item.lookahead);
              }

              // Process reduce items by replacing their specific lookaheads with the full FOLLOW set.
              for ((prod, dot_pos), existing_lookaheads) in reduce_item_cores {
                  if let Some(follows) = follow_sets.get(&prod.lhs) {
                      for lookahead in follows {
                          if lookahead == &None && !existing_lookaheads.contains(&None) {
                              continue;
                          }
                          lalr_closure.insert(Item { production: Arc::new(prod.clone()), dot_position: dot_pos, lookahead: lookahead.clone() });
                      }
                  }
              }
              lalr_closure
          } else {
              closure
          }
      }

      pub fn compute_goto(items: &BTreeSet<Item>) -> BTreeSet<Item> {
          items.iter()
              .filter_map(|item| item.next())
              .map(|(_, next_item)| next_item)
              .collect()
      }

      pub fn split_on_dot(items: &BTreeSet<Item>) -> BTreeMap<Option<Symbol>, BTreeSet<Item>> {
          let mut result: BTreeMap<Option<Symbol>, BTreeSet<Item>> = BTreeMap::new();
          for item in items {
              result
                  .entry(item.production.rhs.get(item.dot_position).cloned())
                  .or_default()
                  .insert(item.clone());
          }
          result
      }
