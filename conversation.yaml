      It looks like the `run_benchmarks.sh` script is passing file paths directly to the Python benchmark runner, which expects Python module paths in the format `module:Class` or `module.Class`. The `run_tests.sh` script has logic to handle this conversion, but `run_benchmarks.sh` does not.

