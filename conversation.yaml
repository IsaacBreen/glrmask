                  "load_time_seconds": load_time,
                  "get_mask_timings_seconds": get_mask_timings,
                  "commit_timings_seconds": commit_timings,
                  "masks_ranges": masks_ranges,
                  "token_positions": token_positions,
                  "summary_stats": summary_stats,
