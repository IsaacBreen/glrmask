      pub struct Iter<'a> {
          iter_inner: range_set_blaze::Iter<usize, range_set_blaze::RangesIter<'a, usize>>,
          remaining: usize,
      }

      impl<'a> Iterator for Iter<'a> {
          type Item = usize;

          fn next(&mut self) -> Option<Self::Item> {
              match self.iter_inner.next() {
                  Some(item) => {
                      self.remaining -= 1;
                      Some(item)
                  }
                  None => None,
              }
          }

          fn size_hint(&self) -> (usize, Option<usize>) {
