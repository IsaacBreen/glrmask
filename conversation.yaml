          let a_id = llm_token_map.get_by_left(&b"a"[..]).unwrap().0;
          for i in 0..10 {
              println!("{}. Stepping with LLM token ID {}", i, a_id);
              constraint_state.step_with_all_llm_tokens();
              constraint_state.commit(LLMTokenID(a_id));
          }

          Ok(())
      }

