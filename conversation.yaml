                              "groups": groups,  # { id(state_bv): (state_bv, [dest_idx, ...]) }
                          }
                      )

                  self.nodes[node_idx] = {
                      "end": is_end,
                      "max_depth": max_depth,
                      "pops": dict(pops),
                  }

