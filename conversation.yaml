                  gss_initialized: GSS = gss.apply(initialize_acc)
                  stats.stop('get_mask.seeding.gss.apply')

                  if r in values:
                      stats.start('get_mask.seeding.gss.merge')
                      values[r] = values[r].merge(gss_initialized)
                      stats.stop('get_mask.seeding.gss.merge')
                  else:
