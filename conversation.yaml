                                          in_queue.add(d)
                              else:
                                  values[d] = child_gss
                                  if d not in in_queue:
                                      heapq.heappush(heap, (int(depths.get(d, 0)), d))
                                      in_queue.add(d)

              return RangeSet.from_ranges(final_mask.to_ranges())

