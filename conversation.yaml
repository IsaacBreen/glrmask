              {
                  py::list ranges_py = all_internal_llm_tokens_bitset_.attr("to_ranges")();
                  std::vector<std::pair<unsigned long long, unsigned long long>> ranges_cpp;
                  ranges_cpp.reserve(py::len(ranges_py));
