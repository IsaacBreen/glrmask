      // src/precompute4/weighted_automata/common.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset;
      use std::collections::BTreeMap;

      pub(crate) const STOCHASTIC_DEBUG: bool = false; // Set to false by default to avoid heavy stochastic validation on large automata

      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Hash, Debug, Default)]
      pub struct I16Map<T> {
          pub exceptions: BTreeMap<i16, T>,
          pub default: Option<T>,
      }

      impl<T> I16Map<T> {
          pub fn new() -> Self {
              Self { exceptions: BTreeMap::new(), default: None }
          }
          pub fn with_default(default_value: T) -> Self {
              Self { exceptions: BTreeMap::new(), default: Some(default_value) }
          }
          pub fn get(&self, key: i16) -> Option<&T> {
              self.exceptions.get(&key).or(self.default.as_ref())
          }
          pub fn iter_exceptions(&self) -> impl Iterator<Item = (&i16, &T)> {
              self.exceptions.iter()
          }
          pub fn get_default(&self) -> Option<&T> {
              self.default.as_ref()
          }
      }

      pub type StateID = usize;
      pub type Weight = SimpleBitset;
      pub type NWAStateID = usize;

      pub fn format_pos_code(code: i16) -> String {
          format!("{}", code)
          // let u = code as u16;
          // if let Some(c) = char::from_u32(u as u32) {
          //     if c.is_ascii_graphic() || c == ' ' {
          //         format!("'{}'", c)
          //     } else {
          //         format!("{}", u)
          //     }
          // } else {
          //     format!("{}", u)
          // }
      }
      pub fn format_i16_char(code: i16) -> String {
          if code >= 0 {
              format_pos_code(code)
          } else {
              format!("neg({})", code.wrapping_sub(i16::MIN))
          }
      }
      pub fn format_word(word: &[i16]) -> String {
          let parts: Vec<String> = word.iter().map(|&c| format_i16_char(c)).collect();
          format!("[{}]", parts.join(", "))
      }
    src/precompute4/weighted_automata/ops.rs: |
      // src/precompute4/weighted_automata/ops.rs

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::DWA;
      use super::nwa::{NWABody, NWADefaultTransition, NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use std::collections::{BTreeSet, VecDeque};

      impl DWA {
          /// Evaluate a word's weight in this DWA by intersecting per-edge weights, optional state-entry weights, and the final state's weight.
          /// Returns zeros if the word is not accepted or any transition is missing.
          pub fn eval_word_weight(&self, word: &[i16]) -> Weight {
              if self.states.0.is_empty() {
                  return Weight::zeros();
              }
              let mut s = self.body.start_state;
              let mut acc = Weight::all();

              // Apply state-entry weight at start, if any.
              if s < self.states.len() {
                  if let Some(sw) = &self.states[s].state_weight {
                      acc &= sw;
                      if acc.is_empty() { return Weight::zeros(); }
                  }
              } else {
                  return Weight::zeros();
              }

              for &ch in word {
                  if s >= self.states.len() {
                      return Weight::zeros();
                  }
                  let st = &self.states[s];
                  if let Some(&t) = st.transitions.get(ch) {
                      if let Some(w) = st.get_weight(ch) {
                          acc &= w;
                      } else {
                          return Weight::zeros();
                      }
                      if acc.is_empty() {
                          return Weight::zeros();
                      }
                      s = t;

                      // Apply state-entry weight at new state.
                      if let Some(sw) = &self.states[s].state_weight {
                          acc &= sw;
                          if acc.is_empty() { return Weight::zeros(); }
                      }
                  } else {
                      return Weight::zeros();
                  }
              }
              if s >= self.states.len() {
                  return Weight::zeros();
              }
              match &self.states[s].final_weight {
                  Some(fw) => {
                      let res = &acc & fw;
                      if res.is_empty() { Weight::zeros() } else { res }
                  }
                  None => Weight::zeros(),
              }
          }

          pub fn union(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              let union_body = NWA::union_components(&mut combined_states, &body1, &body2);

              let union_nwa = NWA { states: combined_states, body: union_body };
              let mut result_dwa = union_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_union(&self, other, &result_dwa);
              }

              result_dwa
          }

          pub fn concatenate(&self, other: &DWA) -> DWA {
              let nwa1 = NWA::from_dwa(self);
              let nwa2 = NWA::from_dwa(other);

              let mut combined_states = NWAStates::default();
              let (start1, _) = combined_states.copy_subgraph_from(&nwa1.states, nwa1.body.start_state);
              let (start2, _) = combined_states.copy_subgraph_from(&nwa2.states, nwa2.body.start_state);

              let body1 = NWABody { start_state: start1 };
              let body2 = NWABody { start_state: start2 };

              // Concatenate with an ALL weight epsilon transition
              let concat_body = NWA::concatenate_components(&mut combined_states, &body1, &body2, &Weight::all());

              let concat_nwa = NWA { states: combined_states, body: concat_body };
              let mut result_dwa = concat_nwa.determinize_to_dwa();

              if STOCHASTIC_DEBUG {
                  DWA::stochastic_validate_concatenate(&self, other, &result_dwa, &Weight::all());
              }

              result_dwa
          }

          pub fn apply_weight(&mut self, weight: &Weight) -> StateID {
              // Create a new start state that is a copy of the old one.
              let old_start_id = self.body.start_state;
              let new_start_id = self.states.copy_state(old_start_id);

              // Apply the weight to the new start state.
              self.states.apply_weight(new_start_id, weight);

              // Update the DWA's start state.
              self.body.start_state = new_start_id;
              new_start_id
          }
      }

      impl NWA {
          /// Compute per-state future acceptance masks F[s]:
          /// F[s] = final[s] ∪ ⋃_{ε s->t}(wε ∧ F[t]) ∪ ⋃_{lbl s->t}(wlbl ∧ F[t]) ∪ (if def s->t) (wdef ∧ F[t])
          /// This is a standard monotone least fixpoint computed by reverse propagation.
          pub fn compute_future_weights(&self) -> Vec<Weight> {
              let n = self.states.len();
              let mut fut: Vec<Weight> = vec![Weight::zeros(); n];
              let mut rev: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

              // Build reverse adjacency aggregating all edge types with their weights.
              for p in 0..n {
                  // Epsilon
                  for &(t, ref w) in &self.states[p].epsilons {
                      if t < n { rev[t].push((p, w.clone())); }
                  }
                  // Labeled
                  for (_, targets) in &self.states[p].transitions {
                      for (t, w) in targets {
                          if *t < n { rev[*t].push((p, w.clone())); }
                      }
                  }
                  // Default
                  for def in &self.states[p].default {
                      if def.target < n {
                          rev[def.target].push((p, def.weight.clone()));
                      }
                  }
              }

              // Initialize with final weights
              let mut q: VecDeque<NWAStateID> = VecDeque::new();
              for s in 0..n {
                  if let Some(fw) = &self.states[s].final_weight {
                      if !fw.is_empty() {
                          fut[s] = fw.clone();
                          q.push_back(s);
                      }
                  }
              }

              // Reverse propagation: when fut[v] grows, update predecessors p using edge weight wpv.
              while let Some(v) = q.pop_front() {
                  let fv = fut[v].clone();
                  if fv.is_empty() { continue; }
                  for &(p, ref w_pv) in &rev[v] {
                      let add = &fv & w_pv;
                      if add.is_empty() { continue; }
                      let old = &fut[p];
                      if (&add & old) != add {
                          fut[p] |= &add;
                          q.push_back(p);
                      }
                  }
              }
              fut
          }

          /// Convert a DWA to a NWA:
          /// - DWA labeled transitions -> NWA labeled transitions (same label, same weight)
          /// - DWA default transitions -> NWA default transitions (weight of default)
          /// - Final weights preserved
          pub fn from_dwa(dwa: &DWA) -> Self {
              let mut nwa = NWA::new();
              nwa.states.0.clear();
              for _ in 0..dwa.states.len() { nwa.states.add_state(); }
              nwa.body.start_state = dwa.body.start_state;

              for (i, st) in dwa.states.0.iter().enumerate() {
                  nwa.states[i].final_weight = st.final_weight.clone();
                  // Default -> NWA default
                  if let Some(to) = st.transitions.default {
                      // Assume ALL if weight is missing, though this should not happen with current DWA builders.
                      let w = st.trans_weight_default.as_ref().cloned().unwrap_or_else(Weight::all);
                      let exceptions = st.transitions.exceptions.keys().copied().collect();
                      nwa.states.0[i].default.push(NWADefaultTransition {
                          target: to,
                          weight: w,
                          exceptions,
                      });
                  }
                  // Labeled
                  for (lbl, to) in &st.transitions.exceptions {
                      let w = st.trans_weights_exceptions.get(lbl).cloned().unwrap_or_else(Weight::all);
                      nwa.states.add_transition(i, *lbl, *to, w).unwrap();
                  }
              }
              nwa
          }

          /// Union of two NWAs (component-level within shared arena):
          /// Construct a new start with epsilon transitions (weight=ALL) to both operands' starts.
          /// Return a body whose start is the new start.
          fn internal_union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              let new_start = states.add_state();
              states.add_epsilon(new_start, body1.start_state, Weight::all());
              states.add_epsilon(new_start, body2.start_state, Weight::all());
              NWABody { start_state: new_start }
          }

          pub fn union_components(states: &mut NWAStates, body1: &NWABody, body2: &NWABody) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: body1.clone() };
                  let nwa2 = NWA { states: states.clone(), body: body2.clone() };

                  let mut states_after_union = states.clone();
                  let union_body = Self::internal_union_components(&mut states_after_union, body1, body2);
                  let union_nwa = NWA { states: states_after_union, body: union_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  let mut result_dwa = union_nwa.determinize_to_dwa();

                  DWA::stochastic_validate_union(&dwa1, &dwa2, &result_dwa);
              }
              Self::internal_union_components(states, body1, body2)
          }

          fn internal_concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              // 1) Collect reachable states from left.start
              let mut visited = vec![false; states.len()];
              let mut q = VecDeque::new();
              if left.start_state < states.len() {
                  visited[left.start_state] = true;
                  q.push_back(left.start_state);
              }
              while let Some(u) = q.pop_front() {
                  // eps
                  for &(v, _) in &states[u].epsilons {
                      if v < states.len() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
                  // labeled
                  for (_, targets) in states[u].transitions.iter() {
                      for (v, _) in targets {
                          if *v < states.len() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                          }
                      }
                  }
                  for def in &states[u].default {
                      if def.target < states.len() && !visited[def.target] {
                          visited[def.target] = true;
                          q.push_back(def.target);
                      }
                  }
              }

              // 2) For each visited final, add epsilon and clear final.
              for sid in 0..states.len() {
                  if !visited[sid] { continue; }
                  if let Some(fw) = states[sid].final_weight.clone() {
                      let w = &fw & eps_weight;
                      if !w.is_empty() {
                          states.add_epsilon(sid, right.start_state, w);
                      }
                      states[sid].final_weight = None;
                  }
              }

              NWABody { start_state: left.start_state }
          }
          /// Concatenate left then right:
          /// - For each final state s reachable from left.start that has final_weight F,
          ///   add an epsilon s --eps-> right.start with weight (F & eps_weight).
          /// - Set s.final_weight = None (standard concatenation semantics).
          /// Return body with start = left.start.
          pub fn concatenate_components(states: &mut NWAStates, left: &NWABody, right: &NWABody, eps_weight: &Weight) -> NWABody {
              if STOCHASTIC_DEBUG {
                  let nwa1 = NWA { states: states.clone(), body: left.clone() };
                  let nwa2 = NWA { states: states.clone(), body: right.clone() };

                  let mut states_after_concat = states.clone();
                  let concat_body = Self::internal_concatenate_components(&mut states_after_concat, left, right, eps_weight);
                  let concat_nwa = NWA { states: states_after_concat, body: concat_body };

                  let mut dwa1 = nwa1.determinize_to_dwa();
                  let mut dwa2 = nwa2.determinize_to_dwa();
                  let mut result_dwa = concat_nwa.determinize_to_dwa();


                  DWA::stochastic_validate_concatenate(&dwa1, &dwa2, &result_dwa, eps_weight);
              }
              Self::internal_concatenate_components(states, left, right, eps_weight)
          }

          /// Determinize subgraph reachable from body.start_state to DWA
          pub fn determinize_components(states: &NWAStates, body: &NWABody) -> DWA {
              let tmp = NWA { states: states.clone(), body: body.clone() };
              tmp.determinize_to_dwa()
          }
      }
    src/precompute4/weighted_automata/test_determinization.rs: |-
      #![cfg(test)]

      use super::*;

      #[test]
      fn test_determinize_simple_divergence() {
          let mut nwa = NWA::new(); // new() creates a start state 0
          nwa.states.0.clear(); // but we'll manage states manually for clarity

          // NWA for "ac" with weight A1 (0)
          let s0 = nwa.states.add_state();
          let s1 = nwa.states.add_state();
          let s2 = nwa.states.add_state();
          nwa.add_transition(s0, 'a' as i16, s1, Weight::all()).unwrap();
          nwa.add_transition(s1, 'c' as i16, s2, Weight::all()).unwrap();
          nwa.states[s2].final_weight = Some(Weight::from_item(0));

          // NWA for "bc" with weight A2 (1)
          let s3 = nwa.states.add_state();
          let s4 = nwa.states.add_state();
          let s5 = nwa.states.add_state();
          nwa.add_transition(s3, 'b' as i16, s4, Weight::all()).unwrap();
          nwa.add_transition(s4, 'c' as i16, s5, Weight::all()).unwrap();
          nwa.states[s5].final_weight = Some(Weight::from_item(1));

          // Union them with a new start state
          let start = nwa.states.add_state();
          nwa.add_epsilon(start, s0, Weight::all());
          nwa.add_epsilon(start, s3, Weight::all());
          nwa.body.start_state = start;

          let dwa = nwa.determinize_to_dwa();

          // Check accepted words and their weights.
          assert_eq!(
              dwa.eval_word_weight(&['a' as i16, 'c' as i16]),
              Weight::from_item(0)
          );
          assert_eq!(
              dwa.eval_word_weight(&['b' as i16, 'c' as i16]),
              Weight::from_item(1)
          );
          assert!(dwa.eval_word_weight(&['a' as i16, 'b' as i16]).is_empty());
          assert!(dwa.eval_word_weight(&['c' as i16]).is_empty());
          assert!(dwa.eval_word_weight(&[]).is_empty());

          // An efficient DWA should merge states with similar future behavior,
          // resulting in a small automaton.
          // Allowing for a sink state, we assert a small number.
          assert!(
              dwa.states.len() <= 4,
              "Expected a small number of states for simple divergence, got {}",
              dwa.states.len()
          );
      }

      #[test]
      fn test_determinize_hypercube_catastrophe() {
          const N: usize = 4;
          let alphabet: Vec<i16> = (0..N as i16).map(|i| i + 'a' as i16).collect();
          let atoms: Vec<Weight> = (0..N).map(Weight::from_item).collect();

          let mut nwa = NWA::new();
          nwa.states.0.clear();

          let mut component_starts = vec![];

          for i in 0..N {
              // L_i = words without alphabet[i]
              let s = nwa.states.add_state();
              component_starts.push(s);
              nwa.states[s].final_weight = Some(atoms[i].clone());

              for j in 0..N {
                  if i == j {
                      continue;
                  }
                  nwa.add_transition(s, alphabet[j], s, Weight::all()).unwrap();
              }
          }

          let start = nwa.states.add_state();
          for &s_comp in &component_starts {
              nwa.add_epsilon(start, s_comp, Weight::all());
          }
          nwa.body.start_state = start;

          let dwa = nwa.determinize_to_dwa();

          // An efficient DWA construction should avoid the 2^N state explosion by
          // encoding the history of seen characters within the accumulated weight,
          // not in the state space.
          assert!(
              dwa.states.len() <= 2,
              "Expected a very small DWA (1-2 states) for hypercube, but got {} states. State explosion was not avoided.",
              dwa.states.len()
          );

          // Test some words
          // word "ac" (chars 0 and 2) -> should not contain 1 or 3 ('b' or 'd'). Belongs to L1 and L3.
          // Weight should be A1 | A3.
          let word_ac = vec![alphabet[0], alphabet[2]];
          let expected_weight_ac = &atoms[1] | &atoms[3];
          assert_eq!(dwa.eval_word_weight(&word_ac), expected_weight_ac);

          // word "abcd" -> contains all symbols. Should be rejected by all components.
          let word_all = alphabet.clone();
          assert!(dwa.eval_word_weight(&word_all).is_empty());

          // empty word -> belongs to all languages.
          let empty_word = vec![];
          let mut expected_weight_empty = Weight::zeros();
          for atom in &atoms {
              expected_weight_empty |= atom;
          }
          assert_eq!(dwa.eval_word_weight(&empty_word), expected_weight_empty);
      }
    src/precompute4/weighted_automata/determinization.rs: |
      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::bitset::SimpleBitset as Weight;
      use super::dwa::{DWAState, DWAStates, DWA, DWABody};
      use super::nwa::{NWA, NWAStates};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};

      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque, HashSet};
      use std::ops::RangeInclusive;
      use std::time::Instant;

      impl NWA {
          pub fn determinize_to_dwa(&self) -> DWA {
              let now_total = Instant::now();

              let mut nwa = self.clone();
              debug_log(3, || format!("Starting determinization for NWA with {} states", nwa.states.len()));

              let fut = nwa.compute_future_weights();

              let now_atoms = Instant::now();
              let atoms = WeightPartition::from_nwa(&nwa);
              debug_log(4, || {
                  format!("Built weight partition with {} atoms in {:?}", atoms.intervals.len(), now_atoms.elapsed())
              });

              let now_sigma = Instant::now();
              let sigma = Alphabet::from_nwa_with_future(&nwa, &fut);
              debug_log(4, || {
                  format!("Built alphabet with {} labels in {:?}", sigma.labels.len(), now_sigma.elapsed())
              });

              let pb_atoms = if PROGRESS_BAR_ENABLED {
                  Some(
                      ProgressBar::new(atoms.intervals.len() as u64).with_style(
                          ProgressStyle::default_bar()
                              .template(
                                  "{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (per-atom DFAs)",
                              )
                              .unwrap(),
                      ),
                  )
              } else {
                  None
              };

              let mut comp_dfas: Vec<DetDFA> = Vec::with_capacity(atoms.intervals.len());
              for (i, atom) in atoms.intervals.iter().enumerate() {
                  let nfa = PerAtomNFA::from_nwa(&nwa.states, nwa.body.start_state, &sigma, atom, &fut);
                  let mut dfa = nfa.determinize(&sigma);
                  dfa.minimize(&sigma);
                  crate::debug!(4, "Atom {}: interval={:?}, DFA states={}", i, atom, dfa.n_states);
                  comp_dfas.push(dfa);
                  if let Some(p) = &pb_atoms {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_atoms {
                  p.finish_with_message("Per-atom DFAs built & minimized");
              }

              if atoms.intervals.is_empty() {
                  let mut dwa = DWA::new();
                  return dwa;
              }

              let now_product = Instant::now();
              let product = ProductDFA::from_components(&comp_dfas, &sigma, &atoms);
              debug_log(4, || {
                  format!(
                      "Product DFA: states={}, alphabet_size={}, time={:?}",
                      product.n_states, sigma.size(), now_product.elapsed()
                  )
              });

              let now_convert = Instant::now();
              let dwa = product.to_dwa(&sigma, &atoms, &comp_dfas);
              debug_log(4, || {
                  format!("Product->DWA conversion took {:?}", now_convert.elapsed())
              });

              let dwa = dwa;

              debug_log(3, || {
                  format!("NWA::determinize_to_dwa total time: {:?}", now_total.elapsed())
              });

              dwa
          }
      }

      fn debug_log(level: usize, msg: impl FnOnce() -> String) {
          crate::debug!(level, "{}", msg());
      }

      #[derive(Clone, Debug)]
      struct Alphabet {
          labels: Vec<i16>,
          other_index: usize,
      }

      impl Alphabet {
          fn from_nwa_with_future(nwa: &NWA, fut: &Vec<Weight>) -> Self {
              let mut set = BTreeSet::new();
              for (s, st) in nwa.states.0.iter().enumerate() {
                  for (&lbl, targets) in &st.transitions {
                      let mut relevant = false;
                      for (t, w) in targets {
                          if !(&fut[*t] & w).is_empty() {
                              relevant = true;
                              break;
                          }
                      }
                      if relevant {
                          set.insert(lbl);
                      }
                  }
                  for def in &st.default {
                      if !(&fut[def.target] & &def.weight).is_empty() {
                          for &lbl in &def.exceptions {
                              set.insert(lbl);
                          }
                      }
                  }
              }
              let labels: Vec<i16> = set.into_iter().collect();
              let other_index = labels.len();
              Alphabet { labels, other_index }
          }
          
          #[inline]
          fn size(&self) -> usize {
              self.labels.len() + 1
          }
          
          #[inline]
          fn index_of_label(&self, l: i16) -> Option<usize> {
              self.labels.binary_search(&l).ok()
          }
          
          #[inline]
          fn is_other(&self, sym: usize) -> bool {
              sym == self.other_index
          }
          
          #[inline]
          fn label_at(&self, sym: usize) -> Option<i16> {
              if sym < self.labels.len() {
                  Some(self.labels[sym])
              } else {
                  None
              }
          }
      }

      #[derive(Clone, Debug)]
      struct WeightPartition {
          intervals: Vec<RangeInclusive<usize>>,
          atoms: Vec<Weight>,
      }

      impl WeightPartition {
          fn from_nwa(nwa: &NWA) -> Self {
              let mut starts: BTreeSet<usize> = BTreeSet::new();
              let mut ends_plus: BTreeSet<usize> = BTreeSet::new();
              let mut has_tail_to_max = false;

              let mut feed_weight = |w: &Weight| {
                  let mut it = w.rsb.ranges();
                  while let Some(r) = it.next() {
                      let s = *r.start();
                      let e = *r.end();
                      starts.insert(s);
                      if e == usize::MAX {
                          has_tail_to_max = true;
                      } else {
                          ends_plus.insert(e.saturating_add(1));
                      }
                  }
              };

              for st in &nwa.states.0 {
                  if let Some(w) = &st.final_weight {
                      if !w.is_empty() {
                          feed_weight(w);
                      }
                  }
                  for (_, w) in &st.epsilons {
                      if !w.is_empty() {
                          feed_weight(w);
                      }
                  }
                  for def in &st.default {
                      if !def.weight.is_empty() {
                          feed_weight(&def.weight);
                      }
                  }
                  for (_, targets) in &st.transitions {
                      for (_, w) in targets {
                          if !w.is_empty() {
                              feed_weight(w);
                          }
                      }
                  }
              }

              if starts.is_empty() && ends_plus.is_empty() && !has_tail_to_max {
                  return WeightPartition { intervals: vec![], atoms: vec![] };
              }

              let mut breaks: Vec<usize> = starts.union(&ends_plus).copied().collect();
              breaks.sort_unstable();
              breaks.dedup();
              
              if breaks.is_empty() {
                  let singleton = 0usize..=usize::MAX;
                  let atom_w: Weight = std::iter::once(singleton.clone()).collect();
                  return WeightPartition { intervals: vec![singleton], atoms: vec![atom_w] };
              }

              let mut intervals: Vec<RangeInclusive<usize>> = Vec::new();
              for i in 0..breaks.len().saturating_sub(1) {
                  let a = breaks[i];
                  let b_excl = breaks[i + 1];
                  if a < b_excl {
                      let b = b_excl - 1;
                      intervals.push(a..=b);
                  }
              }
              if has_tail_to_max {
                  if let Some(&last) = breaks.last() {
                      if last <= usize::MAX {
                          intervals.push(last..=usize::MAX);
                      }
                  }
              }

              let atoms: Vec<Weight> = intervals
                  .iter()
                  .map(|r| {
                      let r2: RangeInclusive<usize> = (*r.start())..=(*r.end());
                      std::iter::once(r2).collect()
                  })
                  .collect();

              WeightPartition { intervals, atoms }
          }
      }

      #[derive(Clone, Debug)]
      struct PerAtomNFA {
          n: usize,
          start: usize,
          finals: Vec<bool>,
          ex_by_state: Vec<BTreeMap<i16, Vec<usize>>>,
          def_by_state: Vec<Vec<(usize, BTreeSet<i16>)>>,
          eps_by_state: Vec<Vec<usize>>,
      }

      impl PerAtomNFA {
          fn from_nwa(states: &NWAStates, start: usize, _sigma: &Alphabet, atom: &RangeInclusive<usize>, fut: &[Weight]) -> Self {
              let n_total = states.len();
              let atom_w: Weight = std::iter::once((*atom.start())..=(*atom.end())).collect();

              let mut live = vec![false; n_total];
              for s in 0..n_total {
                  if !(&fut[s] & &atom_w).is_empty() {
                      live[s] = true;
                  }
              }

              if start >= n_total || !live[start] {
                  return PerAtomNFA {
                      n: 1,
                      start: 0,
                      finals: vec![false],
                      ex_by_state: vec![BTreeMap::new()],
                      def_by_state: vec![Vec::new()],
                      eps_by_state: vec![Vec::new()],
                  };
              }

              let mut visited = vec![false; n_total];
              let mut order: Vec<usize> = Vec::new();
              let mut q = VecDeque::new();
              visited[start] = true;
              q.push_back(start);
              order.push(start);

              while let Some(u) = q.pop_front() {
                  for (v, w) in &states[u].epsilons {
                      if *v < n_total && live[*v] && !(&atom_w & w).is_empty() && !visited[*v] {
                          visited[*v] = true;
                          q.push_back(*v);
                          order.push(*v);
                      }
                  }
                  for (_lbl, targets) in &states[u].transitions {
                      for (v, w) in targets {
                          if *v < n_total && live[*v] && !(&atom_w & w).is_empty() && !visited[*v] {
                              visited[*v] = true;
                              q.push_back(*v);
                              order.push(*v);
                          }
                      }
                  }
                  for def in &states[u].default {
                      let v = def.target;
                      if v < n_total && live[v] && !(&atom_w & &def.weight).is_empty() && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                          order.push(v);
                      }
                  }
              }

              let m = order.len();
              let mut id_of = vec![usize::MAX; n_total];
              for (i, &old) in order.iter().enumerate() {
                  id_of[old] = i;
              }

              let mut finals = vec![false; m];
              let mut ex_by_state: Vec<BTreeMap<i16, Vec<usize>>> = vec![BTreeMap::new(); m];
              let mut def_by_state: Vec<Vec<(usize, BTreeSet<i16>)>> = vec![Vec::new(); m];
              let mut eps_by_state: Vec<Vec<usize>> = vec![Vec::new(); m];

              for (new_s, &old_s) in order.iter().enumerate() {
                  if let Some(w) = &states[old_s].final_weight {
                      if !(&atom_w & w).is_empty() {
                          finals[new_s] = true;
                      }
                  }
                  
                  let mut local_ex: BTreeMap<i16, Vec<usize>> = BTreeMap::new();
                  for (&lbl, targets) in &states[old_s].transitions {
                      let mut kept: Vec<usize> = Vec::new();
                      for (to_old, w) in targets {
                          if *to_old < n_total && live[*to_old] && !(&atom_w & w).is_empty() {
                              let to_new = id_of[*to_old];
                              if to_new != usize::MAX {
                                  kept.push(to_new);
                              }
                          }
                      }
                      if !kept.is_empty() {
                          kept.sort_unstable();
                          kept.dedup();
                          local_ex.insert(lbl, kept);
                      }
                  }
                  ex_by_state[new_s] = local_ex.clone();

                  let ex_for_def: BTreeSet<i16> = local_ex.keys().copied().collect();
                  for def in &states[old_s].default {
                      let to_old = def.target;
                      if to_old < n_total && live[to_old] && !(&atom_w & &def.weight).is_empty() {
                          let to_new = id_of[to_old];
                          if to_new != usize::MAX {
                              def_by_state[new_s].push((to_new, ex_for_def.clone()));
                          }
                      }
                  }

                  for (to_old, w) in &states[old_s].epsilons {
                      if *to_old < n_total && live[*to_old] && !(&atom_w & w).is_empty() {
                          let to_new = id_of[*to_old];
                          if to_new != usize::MAX {
                              eps_by_state[new_s].push(to_new);
                          }
                      }
                  }
              }

              let new_start = id_of[start];
              debug_assert!(new_start != usize::MAX, "start must be visited when live[start] is true");
              Self { n: m, start: new_start, finals, ex_by_state, def_by_state, eps_by_state }
          }

          fn eps_closure_per_state(&self) -> Vec<Vec<usize>> {
              let mut out = vec![Vec::<usize>::new(); self.n];
              for s in 0..self.n {
                  let mut visited = vec![false; self.n];
                  let mut stack = vec![s];
                  visited[s] = true;
                  let mut closure = Vec::new();
                  while let Some(u) = stack.pop() {
                      closure.push(u);
                      for &v in &self.eps_by_state[u] {
                          if v < self.n && !visited[v] {
                              visited[v] = true;
                              stack.push(v);
                          }
                      }
                  }
                  closure.sort_unstable();
                  out[s] = closure;
              }
              out
          }

          fn eps_closure_set(&self, base: &[usize], per: &Vec<Vec<usize>>) -> Vec<usize> {
              let mut mark = vec![false; self.n];
              let mut result = Vec::new();
              for &s in base {
                  if s >= self.n {
                      continue;
                  }
                  for &u in &per[s] {
                      if !mark[u] {
                          mark[u] = true;
                          result.push(u);
                      }
                  }
              }
              result.sort_unstable();
              result
          }

          fn determinize(&self, sigma: &Alphabet) -> DetDFA {
              let per = self.eps_closure_per_state();
              let start_set = self.eps_closure_set(&[self.start], &per);

              let mut map: HashMap<Vec<usize>, usize> = HashMap::new();
              let mut states: Vec<Vec<usize>> = Vec::new();
              let mut finals: Vec<bool> = Vec::new();
              let mut trans: Vec<Vec<Option<usize>>> = Vec::new();

              let pb_subset = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new_spinner();
                  p.set_style(
                      ProgressStyle::default_spinner()
                          .template("{spinner:.green} [Determinize/Subset: {elapsed_precise}] States found: {pos}")
                          .unwrap(),
                  );
                  Some(p)
              } else {
                  None
              };

              let mut push_state = |subset: Vec<usize>,
                                    states: &mut Vec<Vec<usize>>,
                                    finals: &mut Vec<bool>,
                                    trans: &mut Vec<Vec<Option<usize>>>,
                                    map: &mut HashMap<Vec<usize>, usize>| {
                  if let Some(&id) = map.get(&subset) {
                      return id;
                  }
                  let id = states.len();
                  let is_final = subset.iter().any(|&s| self.finals[s]);
                  states.push(subset);
                  finals.push(is_final);
                  trans.push(vec![None; sigma.size()]);
                  map.insert(states[id].clone(), id);
                  id
              };

              let start_id = push_state(start_set, &mut states, &mut finals, &mut trans, &mut map);
              if let Some(p) = &pb_subset {
                  p.set_position(states.len() as u64);
              }

              let mut q = VecDeque::new();
              q.push_back(start_id);

              while let Some(u) = q.pop_front() {
                  let subset = states[u].clone();

                  for sym in 0..sigma.size() {
                      let mut next_raw: Vec<usize> = Vec::new();

                      match sigma.label_at(sym) {
                          Some(lbl) => {
                              for &s in &subset {
                                  if let Some(ts) = self.ex_by_state[s].get(&lbl) {
                                      next_raw.extend_from_slice(ts);
                                  }
                                  for (target, exceptions) in &self.def_by_state[s] {
                                      if !exceptions.contains(&lbl) {
                                          next_raw.push(*target);
                                      }
                                  }
                              }
                          }
                          None => {
                              for &s in &subset {
                                  for (target, _) in &self.def_by_state[s] {
                                      next_raw.push(*target);
                                  }
                              }
                          }
                      }

                      if next_raw.is_empty() {
                          continue;
                      }

                      next_raw.sort_unstable();
                      next_raw.dedup();

                      let next = self.eps_closure_set(&next_raw, &per);
                      if next.is_empty() {
                          continue;
                      }

                      let v = if let Some(&id) = map.get(&next) {
                          id
                      } else {
                          let id = states.len();
                          let is_final = next.iter().any(|&s| self.finals[s]);
                          states.push(next.clone());
                          finals.push(is_final);
                          trans.push(vec![None; sigma.size()]);
                          map.insert(next, id);
                          if let Some(p) = &pb_subset {
                              p.set_position(states.len() as u64);
                          }
                          q.push_back(id);
                          id
                      };

                      trans[u][sym] = Some(v);
                  }
              }

              if let Some(p) = pb_subset {
                  p.finish_with_message(format!("Subset construction done, {} states", states.len()));
              }

              DetDFA {
                  n_states: states.len(),
                  start: start_id,
                  finals,
                  trans,
              }
          }
      }

      #[derive(Clone, Debug)]
      struct DetDFA {
          n_states: usize,
          start: usize,
          finals: Vec<bool>,
          trans: Vec<Vec<Option<usize>>>,
      }

      impl DetDFA {
          fn minimize(&mut self, sigma: &Alphabet) { // TODO: This is complex, check if it's correct
              debug_log(4, || format!("Minimizing DFA with {} states", self.n_states));
              
              let reachable = {
                  let mut visited = vec![false; self.n_states];
                  let mut q = VecDeque::new();
                  visited[self.start] = true;
                  q.push_back(self.start);
                  while let Some(u) = q.pop_front() {
                      for &v_opt in &self.trans[u] {
                          if v_opt.is_none() { continue; }
                          let v = v_opt.unwrap();
                          if !visited[v] {
                              visited[v] = true;
                              q.push_back(v);
                          }
                      }
                  }
                  visited
              };

              let mut map = vec![usize::MAX; self.n_states];
              let mut new_states = 0usize;
              for i in 0..self.n_states {
                  if reachable[i] {
                      map[i] = new_states;
                      new_states += 1;
                  }
              }

              if new_states == 0 {
                  self.n_states = 1;
                  self.start = 0;
                  self.finals = vec![false];
                  self.trans = vec![vec![Some(0); sigma.size()]];
                  return;
              }

              let mut finals = vec![false; new_states];
              let mut trans: Vec<Vec<Option<usize>>> = vec![vec![None; sigma.size()]; new_states];

              for i in 0..self.n_states {
                  if !reachable[i] {
                      continue;
                  }
                  let ni = map[i];
                  finals[ni] = self.finals[i];
                  for a in 0..sigma.size() {
                      if let Some(v) = self.trans[i][a] {
                          trans[ni][a] = Some(map[v]);
                      }
                      // None remains None
                  }
              }

              self.n_states = new_states;
              self.start = map[self.start];
              self.finals = finals;
              self.trans = trans;

              if self.n_states <= 1 {
                  return;
              }

              // Hopcroft requires a complete DFA. We add a temporary sink state.
              let has_none = self.trans.iter().any(|row| row.iter().any(|x| x.is_none()));
              let (mut n, sink_id) = if has_none {
                  (self.n_states + 1, Some(self.n_states))
              } else {
                  (self.n_states, None)
              };

              let mut trans_complete = vec![vec![0; sigma.size()]; n];
              for i in 0..self.n_states {
                  for j in 0..sigma.size() {
                      trans_complete[i][j] = self.trans[i][j].unwrap_or(sink_id.unwrap());
                  }
              }
              if let Some(sid) = sink_id {
                  for j in 0..sigma.size() {
                      trans_complete[sid][j] = sid;
                  }
              }

              let mut finals_complete = self.finals.clone();
              if sink_id.is_some() {
                  finals_complete.push(false);
              }

              let a = sigma.size();

              let mut part_id = vec![0usize; n];
              let mut blocks: Vec<Vec<usize>> = Vec::new();
              let (accepting_block, non_accepting_block): (Vec<_>, Vec<_>) = (0..n).partition(|&s| finals_complete[s]);

              if accepting_block.is_empty() || non_accepting_block.is_empty() {
                  return;
              }
              blocks.push(accepting_block);
              blocks.push(non_accepting_block);
              for (pid, block) in blocks.iter().enumerate() { 
                  for &s in block { 
                      part_id[s] = pid; 
                  } 
              }

              let mut inv: Vec<Vec<Vec<usize>>> = vec![vec![Vec::new(); n]; a];
              for s in 0..n { 
                  for sym in 0..a {
                      let v = trans_complete[s][sym];
                      inv[sym][v].push(s); 
                  } 
              }

              let mut worklist: BTreeSet<(usize, usize)> = BTreeSet::new();
              let smaller_initial_set = if blocks[0].len() <= blocks[1].len() { 0 } else { 1 };
              for sym in 0..a {
                  worklist.insert((smaller_initial_set, sym));
              }

              let pb_hopcroft = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new_spinner();
                  p.set_style(
                      ProgressStyle::default_spinner()
                          .template(
                              "{spinner:.green} [Determinize/Minimize: {elapsed_precise}] Pass {pos}, worklist size: {msg}",
                          )
                          .unwrap(),
                  );
                  Some(p)
              } else {
                  None
              };
              let mut passes = 0u64;

              while let Some(&(b, sym)) = worklist.iter().next() {
                  worklist.remove(&(b, sym));

                  if let Some(p) = &pb_hopcroft {
                      passes += 1;
                      p.set_position(passes);
                      p.set_message(format!("{}", worklist.len()));
                  }

                  let mut pre: Vec<usize> = Vec::new();
                  for &v in &blocks[b] { 
                      pre.extend_from_slice(&inv[sym][v]); 
                  }
                  if pre.is_empty() {
                      continue;
                  }
                  pre.sort_unstable();
                  pre.dedup();

                  let mut affected: HashMap<usize, (Vec<usize>, Vec<usize>)> = HashMap::new();
                  for &s in &pre { 
                      let pid = part_id[s]; 
                      affected.entry(pid).or_default().0.push(s); 
                  }
                  for (pid, (ref mut in_pre, ref mut not_in_pre)) in affected.iter_mut() {
                      for &s in &blocks[*pid] { 
                          if !in_pre.binary_search(&s).is_ok() { 
                              not_in_pre.push(s); 
                          } 
                      }
                  }

                  let mut to_replace: Vec<(usize, Vec<usize>, Vec<usize>)> = Vec::new();

                  for (pid, (in_pre, not_in_pre)) in affected.into_iter() {
                      if in_pre.is_empty() || not_in_pre.is_empty() {
                          continue;
                      }
                      to_replace.push((pid, in_pre, not_in_pre));
                  }

                  if to_replace.is_empty() {
                      continue;
                  }

                  for (pid, mut in_pre, mut not_in_pre) in to_replace {
                      in_pre.sort_unstable();
                      not_in_pre.sort_unstable();

                      let pid2 = blocks.len();
                      blocks.push(not_in_pre);
                      blocks[pid] = in_pre;

                      for &s in &blocks[pid] { 
                          part_id[s] = pid; 
                      }
                      for &s in &blocks[pid2] { 
                          part_id[s] = pid2; 
                      }

                      for sym2 in 0..a {
                          if worklist.remove(&(pid, sym2)) {
                              worklist.insert((pid, sym2));
                              worklist.insert((pid2, sym2));
                          } else {
                              let (smaller_pid, _) = if blocks[pid].len() <= blocks[pid2].len() { 
                                  (pid, pid2) 
                              } else { 
                                  (pid2, pid) 
                              };
                              worklist.insert((smaller_pid, sym2));
                          }
                      }
                  }
              }

              if let Some(p) = pb_hopcroft {
                  p.finish_with_message(format!("Hopcroft done, {} partitions", blocks.len()));
              }

              let num_parts = blocks.len();
              let mut repr: Vec<usize> = vec![0; num_parts];
              for (pid, block) in blocks.iter().enumerate() { 
                  repr[pid] = block[0]; 
              }

              let start_part = part_id[self.start];
              let sink_part = sink_id.map(|sid| part_id[sid]);

              let mut finals2 = vec![false; num_parts];
              for pid in 0..num_parts {
                  finals2[pid] = finals_complete[repr[pid]];
              }

              let mut trans2 = vec![vec![None; a]; num_parts];
              for pid in 0..num_parts {
                  let s = repr[pid];
                  for sym in 0..a {
                      let v_part = part_id[trans_complete[s][sym]];
                      if Some(v_part) == sink_part {
                          trans2[pid][sym] = None;
                      } else {
                          trans2[pid][sym] = Some(v_part);
                      }
                  }
              }

              self.n_states = num_parts;
              self.start = start_part;
              self.finals = finals2;
              self.trans = trans2;
          }
      }

      type ProductDFAStateTuple = Vec<Option<usize>>;

      #[derive(Clone, Debug, PartialEq, Eq, PartialOrd, Ord)]
      struct ProductDFAState {
          final_weight: Option<Weight>,
          trans: BTreeMap<i16, ProductDFAStateTuple>,
          default_trans_tuple: ProductDFAStateTuple,
          representative_tuple: ProductDFAStateTuple,
          all_tuples: BTreeSet<ProductDFAStateTuple>,
      }

      #[derive(Clone, Debug)]
      struct ProductDFA {
          states: Vec<ProductDFAState>,
          start: usize,
          n_states: usize,
      }

      impl ProductDFA {
          fn from_components(comps: &[DetDFA], sigma: &Alphabet, atoms: &WeightPartition) -> Self {
              let k = comps.len();

              let pb_product = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new_spinner();
                  p.set_style(
                      ProgressStyle::default_spinner()
                          .template("{spinner:.green} [Determinize: {elapsed_precise}] Building product DFA... Tuples found: {pos}")
                          .unwrap(),
                  );
                  Some(p)
              } else {
                  None
              };

              // Step 1: Collect all reachable tuples
              let start_tuple: ProductDFAStateTuple = comps.iter().map(|c| Some(c.start)).collect();
              let mut visited: HashSet<ProductDFAStateTuple> = HashSet::new();
              let mut queue: VecDeque<ProductDFAStateTuple> = VecDeque::new();

              visited.insert(start_tuple.clone());
              queue.push_back(start_tuple.clone());

              while let Some(current) = queue.pop_front() {
                  for sym in 0..sigma.size() {
                      let next_tuple: ProductDFAStateTuple = (0..k)
                          .map(|i| current[i].and_then(|s| comps[i].trans[s][sym]))
                          .collect();
                      if visited.insert(next_tuple.clone()) {
                          queue.push_back(next_tuple);
                          if let Some(p) = &pb_product {
                              p.set_position(visited.len() as u64);
                          }
                      }
                  }
              }

              let all_tuples: Vec<ProductDFAStateTuple> = visited.into_iter().collect();
              let n = all_tuples.len();

              if let Some(p) = &pb_product {
                  p.set_message(format!("Collected {} tuples, now merging...", n));
              }

              // Step 2: Group tuples into equivalence classes.
              let group_ids = Self::group_product_states(&all_tuples);
              let num_groups = group_ids.iter().max().map_or(0, |&max| max + 1);
              let mut classes: Vec<Vec<usize>> = vec![vec![]; num_groups];
              for (tuple_idx, group_id) in group_ids.iter().enumerate() {
                  classes[*group_id].push(tuple_idx);
              }

              // Step 3: Create ProductDFAState for each class.
              let mut product_states = Vec::new();
              for members_indices in classes.into_iter() {
                  if members_indices.is_empty() {
                      continue;
                  }

                  let current_all_tuples: BTreeSet<ProductDFAStateTuple> =
                      members_indices.iter().map(|&idx| all_tuples[idx].clone()).collect();

                  let best_idx = members_indices
                      .iter()
                      .min_by_key(|&&idx| all_tuples[idx].iter().filter(|s| s.is_none()).count())
                      .unwrap();
                  let representative_tuple = all_tuples[*best_idx].clone();

                  // Final weight calculation
                  let mut final_weight_calc = Weight::zeros();
                  let mut is_final = false;
                  for (i, atom) in atoms.atoms.iter().enumerate() {
                      if current_all_tuples.iter().any(|t| t[i].map_or(false, |s| comps[i].finals[s])) {
                          final_weight_calc |= atom;
                          is_final = true;
                      }
                  }
                  let final_weight = if is_final { Some(final_weight_calc) } else { None };

                  // Transitions from representative
                  let mut trans = BTreeMap::new();
                  for (sym, &lbl) in sigma.labels.iter().enumerate() {
                      let next_tuple: ProductDFAStateTuple = (0..k)
                          .map(|i| representative_tuple[i].and_then(|s| comps[i].trans[s][sym]))
                          .collect();
                      trans.insert(lbl, next_tuple);
                  }
                  let default_trans_tuple: ProductDFAStateTuple = (0..k)
                      .map(|i| representative_tuple[i].and_then(|s| comps[i].trans[s][sigma.other_index]))
                      .collect();

                  let p_state = ProductDFAState {
                      final_weight,
                      trans,
                      default_trans_tuple,
                      representative_tuple,
                      all_tuples: current_all_tuples,
                  };
                  product_states.push(p_state);
              }

              // Sort states by representative tuple to have a canonical order.
              product_states.sort_by(|a, b| a.representative_tuple.cmp(&b.representative_tuple));

              let start_id = product_states
                  .binary_search_by(|s| s.representative_tuple.cmp(&start_tuple))
                  .expect("Start tuple must have a corresponding state");

              let n_states = product_states.len();
              if let Some(p) = pb_product {
                  p.finish_with_message(format!(
                      "Product DFA built with {} states (merged from {} tuples)",
                      n_states, n
                  ));
              }

              ProductDFA { states: product_states, start: start_id, n_states }
          }

          fn to_dwa(&self, sigma: &Alphabet, atoms: &WeightPartition, _comps: &[DetDFA]) -> DWA {
              let mut dwa_states = DWAStates::default();
              for _ in 0..self.n_states {
                  dwa_states.add_state();
              }
              let mut dwa = DWA {
                  states: dwa_states,
                  body: DWABody { start_state: self.start },
              };

              let pb_convert = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(self.n_states as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template(
                              "{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Attaching DWA weights)",
                          )
                          .unwrap(),
                  );
                  Some(p)
              } else {
                  None
              };

              // 1. Create map from any tuple to its representative tuple.
              let mut tuple_to_repr: HashMap<ProductDFAStateTuple, ProductDFAStateTuple> = HashMap::new();
              for p_state in &self.states {
                  for t in &p_state.all_tuples {
                      tuple_to_repr.insert(t.clone(), p_state.representative_tuple.clone());
                  }
              }

              // 2. Create map from representative tuple to its DWA state ID.
              let mut repr_to_id: HashMap<ProductDFAStateTuple, usize> = HashMap::new();
              for (id, p_state) in self.states.iter().enumerate() {
                  repr_to_id.insert(p_state.representative_tuple.clone(), id);
              }

              // 3. Populate DWA states
              for (sid, p_state) in self.states.iter().enumerate() {
                  if let Some(p) = &pb_convert {
                      p.inc(1);
                  }

                  // Final weights
                  if let Some(fw) = &p_state.final_weight {
                      if !fw.is_empty() {
                          let _ = dwa.set_final_weight(sid, fw.clone());
                      }
                  }

                  // Default transition
                  let dest_tuple_def = &p_state.default_trans_tuple;
                  let repr_def = tuple_to_repr
                      .get(dest_tuple_def)
                      .expect("Destination tuple must have a representative");
                  let dest_id_def = *repr_to_id
                      .get(repr_def)
                      .expect("Representative tuple must have a state ID");

                  let mut weight_def = Weight::zeros();
                  for (i, s_opt) in dest_tuple_def.iter().enumerate() {
                      if s_opt.is_some() {
                          weight_def |= &atoms.atoms[i];
                      }
                  }
                  if sid < dwa.states.len() && dest_id_def < dwa.states.len() {
                      let _ = dwa.set_default_transition(sid, dest_id_def, weight_def);
                  }

                  // Exception transitions
                  for (&lbl, dest_tuple) in &p_state.trans {
                      let repr = tuple_to_repr
                          .get(dest_tuple)
                          .expect("Destination tuple must have a representative");
                      let dest_id = *repr_to_id
                          .get(repr)
                          .expect("Representative tuple must have a state ID");

                      let mut weight = Weight::zeros();
                      for (i, s_opt) in dest_tuple.iter().enumerate() {
                          if s_opt.is_some() {
                              weight |= &atoms.atoms[i];
                          }
                      }

                      if sid < dwa.states.len() && dest_id < dwa.states.len() {
                          let _ = dwa.add_transition(sid, lbl, dest_id, weight);
                      }
                  }
              }

              if let Some(p) = pb_convert {
                  p.finish_with_message("Attached DWA weights");
              }
              dwa
          }

          /// Groups product state tuples into equivalence classes.
          /// Returns a vector where `result[i]` is the group ID for `all_tuples[i]`.
          fn group_product_states(all_tuples: &[Vec<Option<usize>>]) -> Vec<usize> {
              // This is a greedy, order-dependent implementation for clique partitioning.
              // Two tuples can be in the same group if for any component, their states are
              // either the same, or one of them is a sink (None).
              let n = all_tuples.len();
              let mut group_ids = vec![usize::MAX; n];
              // Each group is represented by its canonical "core", which is the superposition of the cores of its members.
              let mut group_cores: Vec<BTreeMap<usize, usize>> = Vec::new();
              let mut next_group_id = 0;

              for (i, tuple) in all_tuples.iter().enumerate() {
                  let core: BTreeMap<usize, usize> = tuple
                      .iter()
                      .enumerate()
                      .filter_map(|(comp_idx, s_opt)| s_opt.map(|s| (comp_idx, s)))
                      .collect();

                  let mut assigned_gid = None;
                  // Find the first existing group that this tuple is compatible with.
                  for (gid, g_core) in group_cores.iter_mut().enumerate() {
                      let compatible = core.iter().all(|(k, v)| g_core.get(k).map_or(true, |v2| v == v2))
                          && g_core.iter().all(|(k, v)| core.get(k).map_or(true, |v2| v == v2));

                      if compatible {
                          // Add to this group and update the group's canonical core.
                          g_core.extend(core.clone());
                          assigned_gid = Some(gid);
                          break;
                      }
                  }

                  let gid = assigned_gid.unwrap_or_else(|| {
                      // No compatible group found, create a new one.
                      let new_gid = next_group_id;
                      next_group_id += 1;
                      group_cores.push(core);
                      new_gid
                  });
                  group_ids[i] = gid;
              }
              group_ids
          }
      }
