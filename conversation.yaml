                  r.try_insert("r->c2", &mut Some("e2"), child2.clone()).unwrap();
              }
              {
                  let mut c1 = child1.write().unwrap();
                  c1.try_insert("c1->gc", &mut Some("e3"), grandchild.clone()).unwrap();
