      ...

      This isolates the issue to the grammar/parser. But often what I'll do is I'll modify the grammar itself until I have the simplest version that still reproduces the behaviour I'm interested in.
      After that, I'll want to create a minimal equivalent test by progressively simplifying/reducing/distilling the grammar down as much as possible, in phases (different *kinds* of simplifications/reductions).
      If I apply some simplification and it no longer reproduces the error, then I know I've gone too far.
      Note that 'reproducing' here doesn't just mean *reproducing **a** bug*; it means reproducing **the** bug we're interested in.
      For that to be the case, the grammar needs to be such that it *should still match the input*.
      We can always simplify the grammar down to a null grammar that always mismatches any input, and this'll fail on our test input. But that's not useful. We want it to fail on an input that we know it *should **succeed** on*.

      For those simplifications...
      - for one, we could invalidate tokens that don't appear in the test input, ie remove productions containing those tokens from the grammar.
      - Another thing we can do is substitute in nonterminals with just one production.
      - And we can eliminate productions for nonterminals that aren't reachable from the start production (which'll take care of the leftovers from the substitutions in the previous one!).
      - And, of course, we can eliminate productions with nonterminals that don't themselves have any productions.
      And we want to print the simplified grammar of course.
      Group the simplifications together into perhaps a module or something.

