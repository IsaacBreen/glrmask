      use crate::glr::parser::GLRParser;
      use crate::glr::table::{NonTerminalID, Stage7ShiftsAndReducesLookaheadValue, StateID, TerminalID};
      use std::fmt::{Display, Formatter};
      use std::collections::{BTreeMap, BTreeSet, VecDeque};

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct ReduceCharacterization {
          pub terminal: TerminalID,
          pub nonterminal: NonTerminalID,
          // (revealed_state, len, nonterminal)
          pub reveal_and_rereduces: BTreeSet<(StateID, usize, NonTerminalID)>,
          // (revealed_state, goto_state, shift_state)
          pub reveal_goto_shift_escapes: BTreeSet<(StateID, StateID, StateID)>,
      }

      impl Display for ReduceCharacterization {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "    Reduce Char for NT {}:", self.nonterminal.0)?;
              if !self.reveal_and_rereduces.is_empty() {
                  writeln!(f, "      Reveal-and-rereduces:")?;
                  for (revealed, len, nt) in &self.reveal_and_rereduces {
                      writeln!(f, "        - revealed: {}, len: {}, reduce_nt: {}", revealed.0, len, nt.0)?;
                  }
              }
              if !self.reveal_goto_shift_escapes.is_empty() {
                  writeln!(f, "      Reveal-goto-shift escapes:")?;
                  for (revealed, goto, shift) in &self.reveal_goto_shift_escapes {
                      writeln!(f, "        - revealed: {}, goto: {}, shift: {}", revealed.0, goto.0, shift.0)?;
                  }
              }
              Ok(())
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct BelowBottomCharacterization {
          pub terminal: TerminalID,
          // (initial_state, shift_state)
          pub initial_shifts: BTreeSet<(StateID, StateID)>,
          // (initial_state, len, nonterminal)
          pub initial_reduces: BTreeSet<(StateID, usize, NonTerminalID)>,
          pub reduce_characterizations: BTreeMap<NonTerminalID, ReduceCharacterization>,
          pub all_nts: BTreeSet<NonTerminalID>,
      }

      impl Display for BelowBottomCharacterization {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "Characterization for Terminal {}:", self.terminal.0)?;
              if !self.initial_shifts.is_empty() {
                  writeln!(f, "  Initial Shifts:")?;
                  for (initial, shift) in &self.initial_shifts {
                      writeln!(f, "    - initial: {}, shift: {}", initial.0, shift.0)?;
                  }
              }
              if !self.initial_reduces.is_empty() {
                  writeln!(f, "  Initial Reduces:")?;
                  for (initial, len, nt) in &self.initial_reduces {
                      writeln!(f, "    - initial: {}, len: {}, nt: {}", initial.0, len, nt.0)?;
                  }
              }
              if !self.reduce_characterizations.is_empty() {
                  writeln!(f, "  Reduce Characterizations:")?;
                  for rc in self.reduce_characterizations.values() {
                      write!(f, "{}", rc)?;
                  }
              }
              Ok(())
          }
      }

      pub fn compute_all_characterizations(parser: &GLRParser) -> BTreeMap<TerminalID, BelowBottomCharacterization> {
          let mut all_chars = BTreeMap::new();
          for &terminal_id in parser.terminal_map.right_values() {
              all_chars.insert(terminal_id, compute_below_bottom_characterization(parser, terminal_id));
          }
          all_chars
      }

      pub fn compute_below_bottom_characterization(parser: &GLRParser, terminal_id: TerminalID) -> BelowBottomCharacterization {
          let all_nts = parser.non_terminal_map.right_values().cloned().collect();
          let mut char = BelowBottomCharacterization {
              terminal: terminal_id,
              initial_shifts: BTreeSet::new(),
              initial_reduces: BTreeSet::new(),
              reduce_characterizations: BTreeMap::new(),
              all_nts,
          };

          // --- 1. Compute initial actions ---
          for (&initial_state, row) in &parser.table {
              if let Some(action) = row.shifts_and_reduces_full.get(&terminal_id) {
                  match action {
                      Stage7ShiftsAndReducesLookaheadValue::Shift(shift_state) => {
                          char.initial_shifts.insert((initial_state, *shift_state));
                      }
                      Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id, len, .. } => {
                          if *len > 0 {
                              char.initial_reduces.insert((initial_state, *len - 1, *nonterminal_id));
                          }
                      }
                      Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } => {
                          if let Some(shift_state) = shift {
                              char.initial_shifts.insert((initial_state, *shift_state));
                          }
                          for (len, nts) in reduces {
                              if *len > 0 {
                                  for (nt_id, _) in nts {
                                      char.initial_reduces.insert((initial_state, *len - 1, *nt_id));
                                  }
                              }
                          }
                      }
                  }
              }
          }

          // --- 2. Compute reduce characterizations ---
          for &nt_id in parser.non_terminal_map.right_values() {
              let mut reduce_char = ReduceCharacterization {
                  terminal: terminal_id,
                  nonterminal: nt_id,
                  reveal_and_rereduces: BTreeSet::new(),
                  reveal_goto_shift_escapes: BTreeSet::new(),
              };

              // Iterate over all possible revealed states
              for (&revealed_state, row) in &parser.table {
                  // Check if this state has a GOTO for our non-terminal
                  if let Some(goto) = row.gotos.get(&nt_id) {
                      if let Some(goto_state) = goto.state_id {
                          // This is a valid starting point for a chain.
                          let mut worklist: VecDeque<StateID> = VecDeque::new();
                          worklist.push_back(goto_state);
                          let mut visited: BTreeSet<StateID> = BTreeSet::new();
                          visited.insert(goto_state);

                          while let Some(current_state) = worklist.pop_front() {
                              if let Some(action) = parser.table.get(&current_state).and_then(|r| r.shifts_and_reduces_full.get(&terminal_id)) {
                                  match action {
                                      Stage7ShiftsAndReducesLookaheadValue::Shift(shift_state) => {
                                          reduce_char.reveal_goto_shift_escapes.insert((revealed_state, current_state, *shift_state));
                                      }
                                      Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id: reduce_nt, len, .. } => {
                                          if *len == 1 {
                                              // Unit reduction chain
                                              if let Some(next_goto) = parser.table.get(&revealed_state).and_then(|r| r.gotos.get(reduce_nt)) {
                                                  if let Some(next_goto_state) = next_goto.state_id {
                                                      if visited.insert(next_goto_state) {
                                                          worklist.push_back(next_goto_state);
                                                      }
                                                  }
                                              }
                                          } else if *len > 1 {
                                              // Pop below revealed state
                                              reduce_char.reveal_and_rereduces.insert((revealed_state, *len - 2, *reduce_nt));
                                          }
                                      }
                                      Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } => {
                                          if let Some(shift_state) = shift {
                                              reduce_char.reveal_goto_shift_escapes.insert((revealed_state, current_state, *shift_state));
                                          }
                                          for (len, nts) in reduces {
                                              for (reduce_nt, _) in nts {
                                                  if *len == 1 {
                                                      if let Some(next_goto) = parser.table.get(&revealed_state).and_then(|r| r.gotos.get(reduce_nt)) {
                                                          if let Some(next_goto_state) = next_goto.state_id {
                                                              if visited.insert(next_goto_state) {
                                                                  worklist.push_back(next_goto_state);
                                                              }
                                                          }
                                                      }
                                                  } else if *len > 1 {
                                                      reduce_char.reveal_and_rereduces.insert((revealed_state, *len - 2, *reduce_nt));
                                                  }
                                              }
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }

              if !reduce_char.reveal_and_rereduces.is_empty() || !reduce_char.reveal_goto_shift_escapes.is_empty() {
                  char.reduce_characterizations.insert(nt_id, reduce_char);
              }
          }

          char
      }
    src/precompute4/augmented_nwa.rs: |
      use crate::glr::grammar::regex_name;
      use crate::glr::parser::GLRParser;
      use crate::glr::table::{NonTerminalID, StateID as ParserStateID, TerminalID};
      use crate::precompute4::characterize::{
          compute_all_characterizations, compute_below_bottom_characterization, BelowBottomCharacterization,
      };
      use crate::precompute4::weighted_automata::{
          DWA, DWABody, DWAState, DWAStates, NWA, NWABody, NWAStates, StateID, Weight,
      };
      use std::collections::{BTreeMap, BTreeSet};
      use std::fmt::{Display, Formatter};
      use std::time::Instant;

      /// Error while building an AugmentedNwa.
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum AugmentedNwaBuildError {
          ParserStateIdOutOfRange { state_id: ParserStateID },
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct AugmentedNwaBody {
          pub nwa: NWABody,
          pub nt_nodes: BTreeMap<NonTerminalID, StateID>,
          pub end_map: BTreeMap<StateID, BTreeSet<Vec<ParserStateID>>>,
      }

      impl Display for AugmentedNwaBody {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "  Starts: {:?}", self.nwa.start_states)?;
              if !self.nt_nodes.is_empty() {
                  writeln!(f, "  Nonterminal Nodes:")?;
                  for (nt, state) in &self.nt_nodes {
                      writeln!(f, "    - NT {}: State {}", nt.0, state)?;
                  }
              }
              if !self.end_map.is_empty() {
                  writeln!(f, "  End Map:")?;
                  for (state, stacks) in &self.end_map {
                      writeln!(f, "    - State {}:", state)?;
                      for stack in stacks {
                          let stack_str: Vec<String> = stack.iter().map(|s| s.0.to_string()).collect();
                          writeln!(f, "      - [{}]", stack_str.join(", "))?;
                      }
                  }
              }
              Ok(())
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct AugmentedNwa {
          pub states: NWAStates,
          pub body: AugmentedNwaBody,
      }

      fn encode_symbol(id: ParserStateID) -> Result<u16, AugmentedNwaBuildError> {
          u16::try_from(id.0).map_err(|_| AugmentedNwaBuildError::ParserStateIdOutOfRange { state_id: id })
      }

      fn build_augmented_nwa_for_terminal(
          parser: &GLRParser,
          terminal_id: TerminalID,
      ) -> Result<AugmentedNwa, AugmentedNwaBuildError> {
          let bb = compute_below_bottom_characterization(parser, terminal_id);
          build_augmented_nwa_from_characterization(&bb)
      }

      /// Identity NWA for ignore terminals: passes through any stack unchanged.
      pub fn build_augmented_nwa_for_ignore_terminal() -> AugmentedNwa {
          let mut states = NWAStates::default();
          let start_state = states.add_state();
          let mut end_map = BTreeMap::new();
          end_map.insert(start_state, BTreeSet::from([vec![]]));

          AugmentedNwa {
              states,
              body: AugmentedNwaBody {
                  nwa: NWABody { start_states: BTreeSet::from([start_state]) },
                  nt_nodes: BTreeMap::new(),
                  end_map,
              },
          }
      }

      pub fn build_augmented_dwa_for_ignore_terminal() -> AugmentedDwa {
          let nwa = build_augmented_nwa_for_ignore_terminal();
          nwa.determinize()
      }

      pub fn build_augmented_dwa_for_terminal(
          parser: &GLRParser,
          terminal_id: TerminalID,
      ) -> Result<AugmentedDwa, AugmentedNwaBuildError> {
          let nwa = build_augmented_nwa_for_terminal(parser, terminal_id)?;
          Ok(nwa.determinize())
      }

      pub fn build_augmented_nwas(
          parser: &GLRParser,
      ) -> Result<BTreeMap<TerminalID, AugmentedNwa>, AugmentedNwaBuildError> {
          let all = compute_all_characterizations(parser);

          crate::debug!(5, "\n--- Terminal Characterizations ---");
          for (terminal_id, bb) in &all {
              let terminal = parser.terminal_map.get_by_right(terminal_id).cloned().unwrap_or(regex_name("UNKNOWN"));
              crate::debug!(5, "Terminal {} ({}) Characterization:\n{}", terminal_id.0, terminal, bb);
          }
          crate::debug!(5, "--- End Terminal Characterizations ---\n");

          let mut out = BTreeMap::new();
          for (term, bb) in all {
              let aug = build_augmented_nwa_from_characterization(&bb)?;
              out.insert(term, aug);
          }
          Ok(out)
      }

      pub fn build_augmented_dwas(
          parser: &GLRParser,
      ) -> Result<BTreeMap<TerminalID, AugmentedDwa>, AugmentedNwaBuildError> {
          let all_nwas = build_augmented_nwas(parser)?;
          let mut dwas = BTreeMap::new();
          for (term, nwa) in all_nwas {
              dwas.insert(term, nwa.determinize());
          }
          Ok(dwas)
      }

      /// Core builder: turns a BelowBottomCharacterization into an AugmentedNwa.
      ///
      /// Construction rules:
      /// - Create one initial start node, one unique `end_state`, and one node per nonterminal.
      /// - Initial shifts: start --(initial_state)--> end_state; record [initial_state, shift_state].
      /// - Initial reduces (initial_state, len, nt): first step on initial_state, then len default steps to nt.
      /// - Per-nonterminal reduces:
      ///   - Reveal-and-rereduces (revealed_state, len, reduce_nt): first on revealed_state, then len default steps to reduce_nt.
      ///   - Reveal-goto-shift escapes: from nt node, on revealed_state go to end_state; record [revealed_state, goto_state, shift_state].
      fn build_augmented_nwa_from_characterization(
          bb: &BelowBottomCharacterization,
      ) -> Result<AugmentedNwa, AugmentedNwaBuildError> {
          let mut states = NWAStates::default();
          let start = states.add_state();
          let mut body = AugmentedNwaBody {
              nwa: NWABody { start_states: BTreeSet::from([start]) },
              nt_nodes: BTreeMap::new(),
              end_map: BTreeMap::new(),
          };

          // One end node per (Option<NonTerminalID>, revealed_state) combination.
          // For initial shifts, NonTerminalID is None.
          let mut escape_end_nodes: BTreeMap<(Option<NonTerminalID>, ParserStateID), StateID> = BTreeMap::new();

          for &nt in &bb.all_nts {
              let id = states.add_state();
              body.nt_nodes.insert(nt, id);
          }
          let w_all = Weight::all();

          for &(initial_state, shift_state) in &bb.initial_shifts {
              let ch = encode_symbol(initial_state)?;
              let end_state = *escape_end_nodes.entry((None, initial_state)).or_insert_with(|| states.add_state());
              states.add_transition(start, ch, end_state, w_all.clone());
              body.end_map.entry(end_state).or_default().insert(vec![initial_state, shift_state]);
          }

          for &(initial_state, len, nt) in &bb.initial_reduces {
              let ch = encode_symbol(initial_state)?;
              let target_nt = *body.nt_nodes.get(&nt).expect("nonterminal node must exist");
              let mut from = start;

              let next_state = if len == 0 { target_nt } else { states.add_state() };
              states.add_transition(from, ch, next_state, w_all.clone());
              from = next_state;

              for i in 0..len {
                  let to = if i == len - 1 { target_nt } else { states.add_state() };
                  states.add_default_transition(from, to, w_all.clone());
                  from = to;
              }
          }

          for (nt, rc) in &bb.reduce_characterizations {
              let src_nt = *body.nt_nodes.get(nt).expect("reduce_characterizations nt must exist");

              for &(revealed_state, len, reduce_nt) in &rc.reveal_and_rereduces {
                  let ch = encode_symbol(revealed_state)?;
                  let dst_nt = *body.nt_nodes.get(&reduce_nt).expect("reduce target nonterminal must exist");
                  let mut from = src_nt;

                  let next_state = if len == 0 { dst_nt } else { states.add_state() };
                  states.add_transition(from, ch, next_state, w_all.clone());
                  from = next_state;

                  for i in 0..len {
                      let to = if i == len - 1 { dst_nt } else { states.add_state() };
                      states.add_default_transition(from, to, w_all.clone());
                      from = to;
                  }
              }

              for &(revealed_state, goto_state, shift_state) in &rc.reveal_goto_shift_escapes {
                  let ch = encode_symbol(revealed_state)?;
                  let end_state =
                      *escape_end_nodes.entry((Some(*nt), revealed_state)).or_insert_with(|| states.add_state());
                  states.add_transition(src_nt, ch, end_state, w_all.clone());
                  body.end_map.entry(end_state).or_default().insert(vec![revealed_state, goto_state, shift_state]);
              }
          }

          Ok(AugmentedNwa { states, body })
      }

      #[derive(Debug, Clone)]
      pub struct AugmentedDwa {
          pub states: DWAStates,
          pub body: AugmentedDwaBody,
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct AugmentedDwaBody {
          pub dwa: DWABody,
          pub nt_nodes: BTreeMap<NonTerminalID, StateID>,
          pub end_map: BTreeMap<StateID, BTreeSet<Vec<ParserStateID>>>,
      }

      impl AugmentedNwa {
          pub fn determinize(&self) -> AugmentedDwa {
              let (dwa, composition_map) = NWA::determinize_components_with_composition(&self.states, &self.body.nwa);

              let mut new_nt_nodes = BTreeMap::new();
              let mut new_end_map = BTreeMap::new();

              let nwa_state_to_nt: BTreeMap<StateID, NonTerminalID> =
                  self.body.nt_nodes.iter().map(|(k, v)| (*v, *k)).collect();

              for (dwa_id, composition) in &composition_map {
                  let mut end_stacks_for_dwa_state = BTreeSet::new();
                  for (nwa_id, _weight) in composition {
                      if let Some(nt_id) = nwa_state_to_nt.get(nwa_id) {
                          // Assumption: an NT is represented by a unique state in the NWA,
                          // and compositions for DWA states will not merge two distinct NT representative states.
                          // So we can just insert. If the key already exists, it should be for the same DWA state.
                          new_nt_nodes.insert(*nt_id, *dwa_id);
                      }
                      if let Some(stacks) = self.body.end_map.get(nwa_id) {
                          end_stacks_for_dwa_state.extend(stacks.clone());
                      }
                  }
                  if !end_stacks_for_dwa_state.is_empty() {
                      new_end_map.insert(*dwa_id, end_stacks_for_dwa_state);
                  }
              }

              AugmentedDwa {
                  states: dwa.states,
                  body: AugmentedDwaBody {
                      dwa: dwa.body,
                      nt_nodes: new_nt_nodes,
                      end_map: new_end_map,
                  },
              }
          }
      }

      impl AugmentedNwaBody {
          pub fn remap_states(&mut self, mapping: &[StateID]) {
              self.nwa.start_states = self.nwa.start_states.iter().map(|&s| mapping[s]).collect();
              for v in self.nt_nodes.values_mut() {
                  *v = mapping[*v];
              }
              self.end_map = std::mem::take(&mut self.end_map).into_iter().map(|(k, v)| (mapping[k], v)).collect();
          }

          pub fn process_stack(
              &self,
              states: &NWAStates,
              stack: &[ParserStateID],
          ) -> Result<Vec<(StateID, StateID, Weight)>, AugmentedNwaBuildError> {
              let encoded: Vec<u16> =
                  stack.iter().map(|&s| encode_symbol(s)).collect::<Result<_, _>>()?;
              Ok(states.process_stack_u16_from_starts(&self.nwa.start_states, &encoded))
          }

          pub fn concatenate_right_into_on_shared(
              states: &mut NWAStates,
              left: &mut AugmentedNwaBody,
              right: &AugmentedNwaBody,
              weight: &Weight,
          ) -> Result<(), AugmentedNwaBuildError> {
              let left_end_snapshot = left.end_map.clone();
              let mut new_end_map: BTreeMap<StateID, BTreeSet<Vec<ParserStateID>>> = BTreeMap::new();

              for (left_end_state, stacks) in &left_end_snapshot {
                  for left_stack in stacks {
                      let encoded: Vec<u16> =
                          left_stack.iter().rev().map(|&s| encode_symbol(s)).collect::<Result<_, _>>()?;

                      let stops = states.process_stack_u16_from_starts(&right.nwa.start_states, &encoded);

                      for (pos, right_stop_state, path_weight) in stops {
                          let combined_weight = &path_weight & weight;
                          states.add_epsilon_transition(*left_end_state, right_stop_state, combined_weight);

                          if !right.end_map.is_empty() {
                              let reachable = states.reachable_states_ignoring_labels(right_stop_state);
                              for r_state in reachable {
                                  if let Some(r_stacks) = right.end_map.get(&r_state) {
                                      for r_stack in r_stacks {
                                          let keep_len = left_stack.len().saturating_sub(pos);
                                          let mut combined: Vec<ParserStateID> = left_stack[..keep_len].to_vec();
                                          combined.extend(r_stack.iter().cloned());
                                          new_end_map.entry(r_state).or_default().insert(combined);
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
              left.end_map = new_end_map;
              Ok(())
          }

          pub fn concatenate_dwa_right_into_on_shared(
              states: &mut DWAStates,
              left: &mut AugmentedNwaBody,
              right: &AugmentedNwaBody,
              weight: &Weight,
          ) -> Result<(), AugmentedNwaBuildError> {
              let now = Instant::now();
              crate::debug!(6, "--- concatenate_dwa_right_into_on_shared ---");

              let mut right_body_to_use = right.clone();

              if !weight.is_empty() && weight != &Weight::all() {
                  let mut new_right_starts = BTreeSet::new();
                  for &start_state in &right.nwa.start_states {
                      let original_start_state = states[start_state].clone();
                      let proxy_start_id = states.add_state();
                      new_right_starts.insert(proxy_start_id);

                      let mut proxy_state = DWAState::default();

                      proxy_state.weight = original_start_state.weight.clone();
                      proxy_state.final_weight = original_start_state.final_weight.clone();
                      proxy_state.transitions = original_start_state.transitions.clone();

                      if let Some(w) = &original_start_state.trans_weight_default {
                          proxy_state.trans_weight_default = Some(w & weight);
                      }
                      for (ch, w) in &original_start_state.trans_weights_exceptions {
                          proxy_state.trans_weights_exceptions.insert(*ch, w & weight);
                      }

                      states[proxy_start_id] = proxy_state;
                  }
                  right_body_to_use.nwa.start_states = new_right_starts;
              }

              // Join end states of left DWA to start states of right DWA.
              let mut join_map: BTreeMap<StateID, BTreeSet<StateID>> = BTreeMap::new();
              for &end_state in left.end_map.keys() {
                  join_map.insert(end_state, right_body_to_use.nwa.start_states.clone());
              }

              let old_left_nt_nodes = left.nt_nodes.clone();
              let mapping = DWA::concatenate_components(states, left, &right_body_to_use, &join_map);

              // Update end_map and nt_nodes for the new composite DWA.
              let mut new_end_map: BTreeMap<StateID, BTreeSet<Vec<ParserStateID>>> = BTreeMap::new();
              let mut new_nt_nodes: BTreeMap<NonTerminalID, StateID> = BTreeMap::new();

              for (new_id, old_ids) in &mapping {
                  for &(automaton_idx, old_id) in old_ids {
                      if automaton_idx == 0 { // From left automaton
                          if let Some(nt_id) = old_left_nt_nodes.iter().find(|(_, &v)| v == old_id).map(|(k, _)| *k) {
                              new_nt_nodes.insert(nt_id, *new_id);
                          }
                      } else { // From right automaton
                          if let Some(stacks) = right.end_map.get(&old_id) {
                              new_end_map.entry(*new_id).or_default().extend(stacks.clone());
                          }
                      }
                  }
              }

              left.end_map = new_end_map;
              left.nt_nodes = new_nt_nodes;

              println!("    concatenate_dwa_right_into_on_shared took: {:?}", now.elapsed());
              Ok(())
          }

          pub fn union_with_on_shared(
              _states: &mut NWAStates,
              left: &mut AugmentedNwaBody,
              right: &AugmentedNwaBody,
          ) {
              for (other_end_state, stacks) in &right.end_map {
                  left.end_map.entry(*other_end_state).or_default().extend(stacks.clone());
              }
              for &start in &right.nwa.start_states {
                  left.nwa.start_states.insert(start);
              }
          }

          pub fn simplify_to_level_on_shared(&mut self, states: &mut NWAStates, level: usize) {
              let merged_from = states.simplify_to_level(&mut self.nwa, level);
              let old_end_map = self.end_map.clone();

              for (new_state, origin_states) in merged_from {
                  let mut stacks_for_new_state = BTreeSet::new();
                  for origin_state in &origin_states {
                      if let Some(stacks) = old_end_map.get(origin_state) {
                          stacks_for_new_state.extend(stacks.clone());
                      }
                  }
                  if !stacks_for_new_state.is_empty() {
                      self.end_map.insert(new_state, stacks_for_new_state);
                  }
              }
          }
      }

      impl AugmentedNwa {
          /// Implementation note: rebase the right's states/body into `self` first, then concatenate on shared states.
          pub fn concatenate_right_into(
              &mut self,
              right: &AugmentedNwa,
              weight: &Weight,
          ) -> Result<(), AugmentedNwaBuildError> {
              let mapping = self.states.append_copy_from(&right.states);
              let mut mapped_right_body = right.body.clone();
              mapped_right_body.remap_states(&mapping);
              AugmentedNwaBody::concatenate_right_into_on_shared(
                  &mut self.states,
                  &mut self.body,
                  &mapped_right_body,
                  weight,
              )
          }

          /// Union of two augmented NWAs into self.
          pub fn union_with(&mut self, other: &AugmentedNwa) {
              let mapping = self.states.append_copy_from(&other.states);
              let mut other_body = other.body.clone();
              other_body.remap_states(&mapping);
              AugmentedNwaBody::union_with_on_shared(&mut self.states, &mut self.body, &other_body);
          }

          pub fn simplify_to_level(&mut self, level: usize) {
              self.body.simplify_to_level_on_shared(&mut self.states, level);
          }
      }


      impl Display for AugmentedNwa {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "Augmented NWA")?;
              write!(f, "{}", self.body)?;
              writeln!(f, "  Underlying NWA states:")?;
              for (id, state) in self.states.0.iter().enumerate() {
                  writeln!(f, "    State {}:", id)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "      final_weight: {}", w)?;
                  }
                  for (to, weight) in &state.epsilon_transitions {
                      writeln!(f, "      ε -> {} (weight: {})", to, weight)?;
                  }
                  if let Some(default) = &state.transitions.default {
                      for (to, weight) in default {
                          writeln!(f, "      * -> {} (weight: {})", to, weight)?;
                      }
                  }
                  for (on, transitions) in &state.transitions.exceptions {
                      for (to, weight) in transitions {
                          let char_repr = if let Some(c) = char::from_u32(*on as u32) {
                              if c.is_ascii_graphic() || c == ' ' {
                                  format!("'{}'", c)
                              } else {
                                  format!("{}", *on)
                              }
                          } else {
                              format!("{}", *on)
                          };
                          writeln!(f, "      {} -> {} (weight: {})", char_repr, to, weight)?;
                      }
                  }
              }
              Ok(())
          }
      }

