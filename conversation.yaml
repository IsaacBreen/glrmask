      python_grammar.py contains a minimal example showing a problem with the grammar constraint. It basically defines a grammar `NUM '+' NUM '+' NUM`, where `NUM` is a repetition of digits, and LLM tokens '0', '1', ..., '9' and '+'. Then it forms "123+456+" from the LLM tokens and feeds one in at a time.
      Note that PyGrammarConstraintState::commit is different from GrammarConstraintState::commit in that it runs GrammarConstraintState::commit and then GrammarConstraintState::step_with_all_llm_tokens, so you'll have to do that in your code.
      Note also that in python_grammar.py there's a lot of extra junk that we *don't* want to replicate (e.g. the actual Python grammar).

      Write a test in Rust that reproduces this minimal example.
