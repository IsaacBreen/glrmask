              &mut _get_pop,
              &mut _set_pop_like,
              &mut _extract_check,
              &mut _build_key_from,
              &mut _intersect_checks,
              &mut _merge_ev,
          );

          // Stage 2: remove trailing negative pops that cannot be paired.
          remove_trailing_negative_pops(
              god,
              roots,
              &mut _get_pop,
              &mut _set_pop_like,
              &mut _extract_check,
              &mut _build_key_from,
