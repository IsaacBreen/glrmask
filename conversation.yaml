      	fn internal_bv_to_original_with_map(
      		&self,
      		internal_bv: &LLMTokenBV,
      		internal_to_original: &BTreeMap<usize, LLMTokenBV>,
      		_internal_max_llm_token: usize,
      	) -> LLMTokenBV {
      		let mut original_bv = HybridBitset::zeros();
      		if internal_bv.is_all() {
      			// Fast path for "all tokens"
      			for bv in internal_to_original.values() {
      				original_bv |= bv;
      			}
      		} else {
      			for i in internal_bv.iter() {
      				if let Some(bv) = internal_to_original.get(&i) {
      					original_bv |= bv;
      				}
      			}
      		}
      		original_bv
      	}

          fn original_bv_to_internal_with_map(
              &self,
              original_bv: &LLMTokenBV,
              original_to_internal: &BTreeMap<usize, usize>,
              _original_max_llm_token: usize,
          ) -> LLMTokenBV {
              let mut internal_bv = HybridBitset::zeros();
              if original_bv.is_all() {
                  // Fast path for "all tokens"
                  for &internal_id in original_to_internal.values() {
                      internal_bv.insert(internal_id);
                  }
              } else {
                  for i in original_bv.iter() {
                      if let Some(&internal_id) = original_to_internal.get(&i) {
                          internal_bv.insert(internal_id);
                      }
                  }
              }
              internal_bv
          }

          fn compute_possible_matches_for_vocab_node(
              tokenizer: &Regex,
              vocab_node: &VocabPrefixTreeNode,
              tokenizer_state_id: TokenizerStateID,
              cache: &mut HashMap<(*const VocabPrefixTreeNode, TokenizerStateID), BTreeMap<GrammarTokenID, LLMTokenBV>>,
          ) -> BTreeMap<GrammarTokenID, LLMTokenBV> {
              let cache_key = (vocab_node as *const VocabPrefixTreeNode, tokenizer_state_id);
              if let Some(cached_result) = cache.get(&cache_key) {
                  return cached_result.clone();
              }

              let mut result_map: BTreeMap<GrammarTokenID, LLMTokenBV> = BTreeMap::new();

              for (segment_bytes, child_vocab_arc) in vocab_node.iter_children() {
                  let child_vocab_node_ref = child_vocab_arc; // Get &VocabPrefixTreeNode
                  let exec_result = tokenizer.execute_from_state(&segment_bytes, tokenizer_state_id);

                  for token_match in &exec_result.matches {
                      let grammar_token_id = GrammarTokenID(token_match.id);
                      // LLM tokens reachable under child_vocab_node_ref are those that start with segment_bytes
                      let applicable_tokens = child_vocab_node_ref.reachable_token_ids();
                      *result_map.entry(grammar_token_id).or_insert_with(LLMTokenBV::zeros) |= applicable_tokens;
                  }

                  if let Some(final_state_val) = exec_result.end_state {
                      let final_tokenizer_state_id = TokenizerStateID(final_state_val);

                      let matches_possible_from_new_tokenizer_state: BTreeSet<_> = tokenizer
                          .tokens_accessible_from_state(final_tokenizer_state_id)
                          .into_iter()
                          .collect();

                      let matches_from_current_segment: BTreeSet<_> = exec_result
                          .matches
                          .iter()
                          .map(|m| GrammarTokenID(m.id))
                          .collect();

                      let new_grammar_tokens_to_look_for = &matches_possible_from_new_tokenizer_state - &matches_from_current_segment;

                      if !new_grammar_tokens_to_look_for.is_empty() {
                          let next_results = Self::compute_possible_matches_for_vocab_node(
                              tokenizer,
                              child_vocab_node_ref, // Recurse with the child node
                              final_tokenizer_state_id,
                              cache,
                          );
                          for (token, bv) in next_results {
                              *result_map.entry(token).or_insert_with(LLMTokenBV::zeros) |= bv;
                          }
                      }
                  }
              }
              cache.insert(cache_key, result_map.clone());
              result_map
          }

          pub fn print_gss_nodes(&self, roots: &Vec<Arc<GSSNode>>, labels: Option<&[String]>) {
              let config = GSSPrintConfig {
                  labels,
                  max_edges: 500,
                  original_internal_bimap: None,
                  llm_token_map: Some(&self.llm_vocab.llm_token_map),
                  verbose: false,
              };

              let (gss_str, state_ids) = print_gss_forest(roots, &self.parser.terminal_map, &config);
              println!("{}", gss_str);
          }
      }

      pub(crate) struct Precomputer0<'r> {
          pub(crate) tokenizer:        &'r Regex,
          pub(crate) parser:           Option<&'r GLRParser>,
          pub(crate) llm_vocab:        Option<Arc<LLMVocab>>,
          pub(crate) vocab:            VocabPrefixTree,
          pub(crate) roots:            BTreeMap<TokenizerStateID, PrecomputeNode0Index>,
          pub(crate) possible_matches: RefCell<BTreeMap<*const VocabPrefixTreeNode, BTreeMap<TokenizerStateID, BTreeMap<GrammarTokenID, LLMTokenBV>>>>,
          pub(crate) all_llm_tokens:   HybridBitset,
          pub(crate) merge_threshold:  usize,
          pub(crate) pb:               ProgressBar,
          pub(crate) stats:            PrecomputeStats,
          pub(crate) terminal_follow_map: &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
          pub(crate) ignore_terminal_id: Option<TerminalID>,
          pub(crate) token_name_map:   &'r BiBTreeMap<Terminal, usize>,
          // One end node per final tokenizer state.
          pub(crate) end_nodes:        BTreeMap<TokenizerStateID, PrecomputeNode0Index>,
          pub(crate) trie0_god:        Trie0GodWrapper,
      }

      impl<'r> Precomputer0<'r> {
          fn new(
              tokenizer:        &'r Regex,
              parser:           Option<&'r GLRParser>,
              llm_vocab:        Option<Arc<LLMVocab>>,
              internal_llm_token_map: &BiBTreeMap<Vec<u8>, LLMTokenID>,
              internal_max_llm_token: usize,
              merge_threshold:  usize,
              terminal_follow_map: &'r BTreeMap<GrammarTokenID, BTreeSet<GrammarTokenID>>,
              ignore_terminal_id: Option<TerminalID>,
              token_name_map: &'r BiBTreeMap<Terminal, usize>,
          ) -> Self {
              let tokens: Vec<(usize, Vec<u8>)> = internal_llm_token_map
                  .iter()
                  .map(|(bytes, id)| (id.0 as usize, bytes.clone()))
                  .collect();

              crate::debug!(2, "Building vocab prefix tree");
              let vocab = VocabPrefixTree::build(&tokens);
              crate::debug!(2, "Done building vocab prefix tree");

              let mut roots = BTreeMap::new();
              let trie0_god = Trie0GodWrapper::new();
              for sid in tokenizer.iter_states() {
                  roots.insert(
                      sid,
                      PrecomputeNode0Index::new(trie0_god.insert(PrecomputeNode0::new(PrecomputedNodeContents0::root(internal_max_llm_token)))),
                  );
              }
              crate::debug!(2, "Created trie0 roots for {} tokenizer states", tokenizer.iter_states().count());

              crate::debug!(2, "Counting vocab nodes for progress bar...");
              let total_nodes = count_vocab_nodes(&vocab.root);
              crate::debug!(2, "Counted {} vocab nodes", total_nodes);
              let pb = ProgressBar::new(total_nodes);
              pb.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [{elapsed_precise}] \
                                 [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta})")
                      .expect("progress-bar"),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb.set_draw_target(ProgressDrawTarget::hidden());
              }

              let end_nodes = tokenizer.iter_states()
                  .map(|tsid| (tsid, PrecomputeNode0Index::new(trie0_god.insert(PrecomputeNode0::new(PrecomputedNodeContents0::leaf(tsid))))))
                  .collect();
              crate::debug!(2, "Created trie0 end nodes for {} tokenizer states", tokenizer.iter_states().count());

              Self {
                  tokenizer,
                  parser,
                  llm_vocab,
                  vocab,
                  roots,
                  possible_matches: RefCell::new(BTreeMap::new()),
                  all_llm_tokens: HybridBitset::ones(internal_max_llm_token + 1),
                  merge_threshold,
                  pb,
                  stats: PrecomputeStats::default(),
                  terminal_follow_map,
                  ignore_terminal_id,
                  token_name_map,
                  end_nodes,
                  trie0_god,
              }
          }

          fn get_end_node(&self, final_sid: TokenizerStateID) -> PrecomputeNode0Index {
              self.end_nodes[&final_sid].clone()
          }

          fn finish(
              self,
          ) -> (BTreeMap<TokenizerStateID, PrecomputeNode0Index>, Trie0GodWrapper) {
              (self.roots, self.trie0_god)
          }

          fn possible_matches(&self, vocab_node: &VocabPrefixTreeNode, tokenizer_state_id: TokenizerStateID) -> BTreeMap<GrammarTokenID, LLMTokenBV> {
              let cache_key_ptr = vocab_node as *const VocabPrefixTreeNode;

              if let Some(cached_for_vocab_node) = self.possible_matches.borrow().get(&cache_key_ptr) {
                  if let Some(cached_result) = cached_for_vocab_node.get(&tokenizer_state_id) {
                      return cached_result.clone();
                  }
              }

              let mut result_map: BTreeMap<GrammarTokenID, LLMTokenBV> = BTreeMap::new();

              for (segment_bytes, child_vocab_node) in vocab_node.iter_children() {
                  let exec_result = self.tokenizer.execute_from_state(&segment_bytes, tokenizer_state_id);
                  for token in &exec_result.matches {
                      let grammar_token_id = GrammarTokenID(token.id);
                      let applicable_tokens = child_vocab_node.reachable_token_ids();
                      *result_map.entry(grammar_token_id).or_insert_with(LLMTokenBV::zeros) |= applicable_tokens;
                  }
                  if let Some(final_state_val) = exec_result.end_state {
                      let matches_possible_from_tokenizer_state: BTreeSet<_> = self.tokenizer.tokens_accessible_from_state(TokenizerStateID(final_state_val)).into_iter().collect();
                      let matches_here: BTreeSet<_> = exec_result.matches.iter().map(|m| GrammarTokenID(m.id)).collect();
                      let possible_new_matches = &matches_possible_from_tokenizer_state - &matches_here;
                      if !possible_new_matches.is_empty() {
                          let next_results = self.possible_matches(child_vocab_node, TokenizerStateID(final_state_val));
                          for (token, bv) in next_results {
                              *result_map.entry(token).or_insert_with(LLMTokenBV::zeros) |= bv;
                          }
                      }
                  }
              }

              self.possible_matches.borrow_mut().entry(cache_key_ptr).or_default().insert(tokenizer_state_id, result_map.clone());

              result_map
          }

          fn run_dfs(&mut self) {
              let mut assoc: BTreeMap<
                  TokenizerStateID,
                  OrderedHashMap<PrecomputeNode0Index, LLMTokenBV>,
              > = BTreeMap::new();

              for (sid, arc) in &self.roots {
                  assoc
                      .entry(*sid)
                      .or_default()
                      .insert(arc.clone(), self.all_llm_tokens.clone());
              }

              crate::debug!(2, "Starting precompute DFS");
              crate::debug!(6, "Roots for each tokenizer state:");
              for (sid, root) in &self.roots {
                  crate::debug!(6, "  {}: {}", sid.0, root);
              }
              self.dfs(&self.vocab.root, assoc);
              crate::debug!(2, "Finished precompute DFS");
              self.pb.finish();
              crate::debug!(2, "Precomputation complete");
          }

          fn dfs(
              &self,
              vocab_node: &VocabPrefixTreeNode,
              assoc_by_state: BTreeMap<TokenizerStateID, OrderedHashMap<PrecomputeNode0Index, LLMTokenBV>>,
          ) {
              self.pb.inc(1);

              for (segment_bytes, child_vocab_node) in vocab_node.iter_children() {
                  let mut work_queue: BTreeMap<
                      usize,
                      BTreeMap<TokenizerStateID, OrderedHashMap<PrecomputeNode0Index, LLMTokenBV>>,
                  > = BTreeMap::new();
                  work_queue.insert(0, assoc_by_state.clone());

                  let mut next_level_assoc: BTreeMap<_, OrderedHashMap<_, _>> = BTreeMap::new();

                  while let Some((pos, states_at_pos)) = work_queue.pop_first() {
                      if pos == segment_bytes.len() {
                          for (tokenizer_state_id, nodes_with_tokens) in states_at_pos {
                              let entry = next_level_assoc.entry(tokenizer_state_id).or_default();
                              for (node, tokens) in nodes_with_tokens {
                                  entry
                                      .entry(node)
                                      .or_insert_with(LLMTokenBV::zeros)
                                      .bitor_assign(&tokens);
                              }
                          }
                          continue;
                      }

                      for (tokenizer_state_id, precompute_nodes_with_tokens) in states_at_pos {
                          let exec_result = self.tokenizer.execute_from_state(&segment_bytes[pos..], tokenizer_state_id);

                          let possible_matches_at_end = if let Some(end_state_val) = exec_result.end_state {
                              self.possible_matches(child_vocab_node, TokenizerStateID(end_state_val))
                          } else {
                              BTreeMap::new()
                          };

                          for match_info in &exec_result.matches {
                              let terminal_id = GrammarTokenID(match_info.id);
                              let next_pos = pos + match_info.width;

                              let mut disallowed_tokenizer_state_info = None;
                              // if let Some(end_state_val) = exec_result.end_state {
                              //     let end_tokenizer_state_id = TokenizerStateID(end_state_val);
                              //     let terminals_accessible = self.tokenizer.tokens_accessible_from_state(end_tokenizer_state_id);
                              //     if terminals_accessible.contains(&terminal_id) {
                              //         disallowed_tokenizer_state_info = Some(end_tokenizer_state_id);
                              //     }
                              // }

                              for (src_node_wrapper, src_contextual_tokens) in &precompute_nodes_with_tokens {
                                  if next_pos == segment_bytes.len() {
                                      // Exact end-of-segment terminal match: finishing LLM token here goes to tokenizer initial state.
                                      let llm_token_id = child_vocab_node.token_id();
                                      let mut edge_bv = HybridBitset::zeros();
                                      edge_bv.insert(llm_token_id);
                                      let edge_key = Some((terminal_id, disallowed_tokenizer_state_info));
                                      let mut inserter = EdgeInserter::new(
                                          &self.trie0_god,
                                          src_node_wrapper.as_arc().clone(),
                                          edge_key,
                                          &edge_bv & src_contextual_tokens,
                                          |e, n| *e |= n,
                                          |node_value, edge_value| node_value.live_tokens |= edge_value,
                                          |ev, t| *ev &= &t.live_tokens,
                                      );
                                      let end_idx = {
                                          let s0 = self.tokenizer.initial_state_id();
                                          self.get_end_node(s0)
                                      };
                                      let actual_dst = inserter.try_destination(end_idx.as_arc().clone()).expect("Failed to insert end node for terminal at end of segment");
                                      assert_ne!(&actual_dst, src_node_wrapper);
                                  }

                                  let mut edge_bv = child_vocab_node.reachable_token_ids().clone();
                                  if next_pos == segment_bytes.len() {
                                      edge_bv.set(child_vocab_node.token_id(), false);
                                  }
                                  if let Some(matches_for_terminal) = possible_matches_at_end.get(&terminal_id) {
                                      edge_bv -= matches_for_terminal;
                                  }

                                  let edge_bv_for_inserter = &edge_bv & src_contextual_tokens;
                                  if edge_bv_for_inserter.is_empty() { continue; }

                                  // NOTE: It is likely wrong to just use disallowed_tokenizer_state_info as-is here.
                                  //  The actual disallowed state can vary by LLM token. But we don't capture that here.
                                  //  We're doing it in a way that's local to the segment. This is wrong.
                                  let edge_key = Some((terminal_id, None));
                                  let mut inserter = EdgeInserter::new(
                                      &self.trie0_god,
                                      src_node_wrapper.as_arc().clone(),
                                      edge_key,
                                      edge_bv_for_inserter.clone(),
                                      |e, n| *e |= n,
                                      |node_value, edge_value| node_value.live_tokens |= edge_value,
                                      |ev, t| *ev &= &t.live_tokens,
                                  );

                                  let next_tokenizer_state = self.tokenizer.initial_state_id();
                                  let dest_nodes_in_queue = work_queue.entry(next_pos).or_default().entry(next_tokenizer_state).or_default();

                                  let eligible_destinations_from_queue = dest_nodes_in_queue.iter().filter_map(|(dest_node, dest_contextual_tokens)| {
                                      if dest_node.read(&self.trie0_god).unwrap().value.final_tokenizer_state.is_some() {
                                          return None;
                                      }
                                      let risky_tokens = &edge_bv_for_inserter - dest_contextual_tokens;
                                      if risky_tokens.is_empty() {
                                          return Some(dest_node.clone());
                                      }
                                      let dest_live_tokens = &dest_node.read(&self.trie0_god).unwrap().value.live_tokens;
                                      if (&risky_tokens & dest_live_tokens).is_empty() {
                                          Some(dest_node.clone())
                                      } else {
                                          None
                                      }
                                  }).collect::<Vec<_>>();
                                  inserter = inserter.try_destinations_iter(eligible_destinations_from_queue.into_iter());

                                  if !inserter.is_some() {
                                      let children_of_src: Vec<_> = src_node_wrapper.as_arc().read(&self.trie0_god).unwrap().children().values().flat_map(|m| m.keys().cloned()).collect();
                                      let eligible_children = children_of_src.iter().filter(|child_arc| {
                                          let guard = child_arc.read(&self.trie0_god).unwrap();
                                          if guard.value.final_tokenizer_state.is_some() {
                                              return false;
                                          }
                                          (&guard.value.live_tokens & &edge_bv_for_inserter).is_empty()
                                      }).cloned();
                                      inserter = inserter.try_destinations_iter(eligible_children);
                                  }

                                  let result_node = inserter.else_create_destination_with_value(PrecomputedNodeContents0::internal()).unwrap();
                                  assert_ne!(&result_node, src_node_wrapper);
                                  dest_nodes_in_queue.entry(result_node.clone()).or_insert_with(LLMTokenBV::zeros).bitor_assign(&edge_bv_for_inserter);
                              }
                          }

                          if let Some(end_state_val) = exec_result.end_state {
                              for (src_node_wrapper, src_contextual_tokens) in &precompute_nodes_with_tokens {
                                  let llm_token_id = child_vocab_node.token_id();
                                  let mut edge_bv = HybridBitset::zeros();
                                  edge_bv.insert(llm_token_id);
                                  let edge_key = None;
                                  let mut inserter = EdgeInserter::new(
                                      &self.trie0_god,
                                      src_node_wrapper.as_arc().clone(),
                                      edge_key,
                                      &edge_bv & src_contextual_tokens,
                                      |e, n| *e |= n,
                                      |node_value, edge_value| node_value.live_tokens |= edge_value,
                                      |ev, t| *ev &= &t.live_tokens,
                                  );
                                  let end_idx = self.get_end_node(TokenizerStateID(end_state_val));
                                  let actual_dst = inserter.try_destination(end_idx.as_arc().clone()).expect("Failed to insert end node for terminal at end of segment");
                                  assert_ne!(&actual_dst, src_node_wrapper);
                              }
                              let entry = next_level_assoc.entry(TokenizerStateID(end_state_val)).or_default();
                              for (node, tokens) in precompute_nodes_with_tokens {
                                  entry
                                      .entry(node.clone())
                                      .or_insert_with(LLMTokenBV::zeros)
                                      .bitor_assign(&tokens);
                              }
                          }
                      }
                  }

                  if !next_level_assoc.is_empty() {
                      self.dfs(child_vocab_node, next_level_assoc);
                  }
              }
          }
      }

      fn count_vocab_nodes(node: &VocabPrefixTreeNode) -> u64 {
          1 + node
              .children()
              .values()
              .map(|c| count_vocab_nodes(c))
              .sum::<u64>()
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
          stack_state_id: StateID,
      }

      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }

      impl<K, V> InsertWith<K, V> for BTreeMap<K, V> where K: Eq + Ord {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F) {
              match self.entry(k) {
                  std::collections::btree_map::Entry::Occupied(mut occupied) => {
                      let value = occupied.get_mut();
                      combine(value, v);
                  }
                  std::collections::btree_map::Entry::Vacant(vacant) => {
                      vacant.insert(v);
                  }
              }
          }
      }

      fn format_bv(bv: &LLMTokenBV) -> String {
          if bv.is_empty() {
              "[]".to_string()
          } else if *bv == HybridBitset::max_ones() {
              "[ALL]".to_string()
          } else {
              format!("[len={}]", bv.len())
          }
      }

      #[derive(Debug, Clone)]
      pub struct GrammarConstraintState<'a> {
          pub parent: &'a GrammarConstraint,
          pub state:  BTreeMap<TokenizerStateID, GLRParserState<'a>>,
      }

      pub type Trie0GodWrapper = GodWrapper<Option<(TerminalID, Option<TokenizerStateID>)>, HybridBitset, PrecomputedNodeContents0>;
      pub type Trie0God = God<Option<(TerminalID, Option<TokenizerStateID>)>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie1GodWrapper = GodWrapper<Option<TerminalID>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie1God = God<Option<TerminalID>, HybridBitset, PrecomputedNodeContents>;
      pub type Trie2GodWrapper = GodWrapper<(usize, Option<StateID>), HybridBitset, PrecomputedNodeContents>;
      pub type Trie2God = God<(usize, Option<StateID>), HybridBitset, PrecomputedNodeContents>;
      pub type Trie3GodWrapper = GodWrapper<(isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents>;
      pub type Trie3God = God<(isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents>;

      impl<'a> PartialEq for GrammarConstraintState<'a> {
          fn eq(&self, other: &Self) -> bool {
              // Compare parent by pointer to ensure they originate from the same constraint object.
              std::ptr::eq(self.parent, other.parent) && self.state == other.state
          }
      }

      impl<'a> Eq for GrammarConstraintState<'a> {}

      impl<'a> Display for GrammarConstraintState<'a> {
          fn fmt(&self, f: &mut Formatter<'_>) -> fmt::Result {
              writeln!(f, "GrammarConstraintState ({} active tokenizer states):", self.state.len())?;
              if self.state.is_empty() {
                  return Ok(());
              }

              let mut gss_roots = Vec::new();
              let mut tokenizer_state_info = Vec::new();

              for (tokenizer_state_id, glr_state) in &self.state {
                  if !glr_state.active_state.stack.is_empty() {
                      gss_roots.push(glr_state.active_state.stack.clone());
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: GSS Root ({} predecessors)",
                          tokenizer_state_id.0,
                          glr_state.active_state.stack.num_predecessors()
                      ));
                  } else {
                      tokenizer_state_info.push(format!(
                          "  - Tokenizer State {:>3}: (Empty GSS)",
                          tokenizer_state_id.0
                      ));
                  }
              }

              for info in tokenizer_state_info {
                  writeln!(f, "{}", info)?;
              }

              if !gss_roots.is_empty() {
                  writeln!(f, "\nCombined GSS Forest (showing up to 50 nodes):")?;
              let config = GSSPrintConfig {
                  labels: None,
                  max_edges: 50,
                  original_internal_bimap: None,
                  llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                  verbose: false,
              };
                  let (gss_str, _) = print_gss_forest(&gss_roots, &self.parent.parser.terminal_map, &config);
                  write!(f, "{}", gss_str)?;
              }

              Ok(())
          }
      }

      impl<'a> GrammarConstraintState<'a> {
          fn transform_gss_stacks<M, F>(&mut self, mut f: F)
          where
              M: Default,
              F: FnMut(&mut Arc<GSSNode>, &mut M),
          {
              let mut memo = M::default();
              for s in self.state.values_mut() {
                  f(&mut s.active_state.stack, &mut memo);
              }
          }

          fn map_gss_stacks<M, F>(&mut self, mut f: F)
          where
              M: Default,
              F: FnMut(&mut Arc<GSSNode>, &mut M) -> Arc<GSSNode>,
          {
              let mut memo = M::default();
              for s in self.state.values_mut() {
                  s.active_state.stack = f(&mut s.active_state.stack, &mut memo);
              }
          }

          pub fn compute_commit_maps(&self, llm_token_bytes: &[u8]) -> (BTreeMap<TokenizerStateID, TokenizerStateID>, BTreeMap<TokenizerStateID, TerminalBV>) {
              let mut state_map: BTreeMap<TokenizerStateID, TokenizerStateID> = BTreeMap::new();
              let mut terminals_map: BTreeMap<TokenizerStateID, TerminalBV> = BTreeMap::new();
              for (tokenizer_state_id, _state) in self.state.iter() {
                  let exec_result = self.parent.tokenizer.execute_from_state(
                      &llm_token_bytes,
                      *tokenizer_state_id,
                  );
                  if let Some(new_state) = exec_result.end_state {
                      state_map.insert(*tokenizer_state_id, TokenizerStateID(new_state));
                  }
                  let mut terminals = TerminalBV::zeros();
                  for token in exec_result.matches {
                      terminals.insert(token.id);
                  }
                  terminals_map.insert(*tokenizer_state_id, terminals);
              }
              (state_map, terminals_map)
          }

          pub fn get_mask(&self) -> LLMTokenBV {
              // return HybridBitset::ones(self.parent.llm_vocab.max_original_llm_token_id + 1); // TEMP
              // self.get_mask1()
              // self.get_mask2()
              self.get_mask3()
          }

          #[time_it]
          pub fn get_mask1(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(3, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot( // TODO: fix this
                      &roots_with_labels,
                      Some(&self.parent.precompute_vocab1.original_to_internal),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());

              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              #[derive(Default, Clone, Copy, Debug)]
              struct StepCount {
                  total: usize,
                  successful: usize,
              }

              let step_counts = Arc::new(RwLock::new(BTreeMap::<TerminalID, StepCount>::new()));

              let mut initial_values_for_map: Vec<(PrecomputeNode1Index, GLRParserState<'a>)> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  // crate::debug!(4, "Initializing GSS for state {}", tokenizer_state_id.0);
                  // Ensure the GLR state's GSS stack is not empty before proceeding
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed1.get(tokenizer_state_id) {
                      let mut glr_state = glr_state.clone();
                      prune_llm_tokens_by_disallowed_terminals(
                          &mut glr_state.active_state.stack,
                          &self.parent.possible_matches,
                          &mut HashMap::new(),
                      );
                      initial_values_for_map.push((precomputed_trie_root_arc.clone(), glr_state));
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              if initial_values_for_map.is_empty() {
                   // This can happen if all GLR states had empty GSS stacks or no corresponding precomputed tries.
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original_precompute1(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));
              }

              let step_counts_clone1 = Arc::clone(&step_counts);
              let step_counts_clone2 = Arc::clone(&step_counts);

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie1_god,
                  initial_values_for_map,
                  // step_fn: (current_glr_state, edge_grammar_token_opt, destinations_map)
                  |glr_s, grammar_token_opt, dest_map| {
                      if true {
                          timeit!("get_mask try to avoid step for no additional llm tokens", {
                          let mut all_edge_llm_tokens = HybridBitset::zeros();
                          for edge_llm_tokens_bv in dest_map.values() {
                              all_edge_llm_tokens |= edge_llm_tokens_bv;
                          }
                          let glr_s_llm_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                          let potential_additional_llm_tokens = &glr_s_llm_tokens & &all_edge_llm_tokens;
                          if potential_additional_llm_tokens.is_subset(&final_mask_internal.borrow()) {
                              // If the potential additional tokens are already in the final mask, skip stepping.
                              crate::debug!(4, "Skipping step for grammar token {:?} as all edge LLM tokens are already in final mask.", grammar_token_opt);
                              return Vec::new();
                          }
                          });
                      }

                      // let mut glr_s = glr_s.clone();
                      // disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());

                      // Count num end nodes vs non end nodes
                      let mut num_end = 0;
                      let mut num_non_end = 0;
                      for child_node_trie_data in dest_map.keys() {
                          if child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                              num_end += 1;
                          } else {
                              num_non_end += 1;
                          }
                      }
                      timeit!(format!("get_mask step_fn - end only? {}", num_end > 0 && num_non_end == 0), {
                          if num_non_end == 0 {
                              if let Some(gtid) = grammar_token_opt {
                                  // let stats = gather_gss_stats(&[glr_s.active_state.stack.as_ref()]);
                                  // crate::debug!(3, "Step for grammar token {:?} with only end nodes, GSS stats: {:#?}", gtid, stats);
                                  // Perhaps we can avoid stepping by calling `has_action_for`
                                  match glr_s.has_action_for(*gtid) {
                                      Some(glr_s_llm_tokens) => {
                                          timeit!(format!("get_mask step_fn - has_action_for"), {
                                              // This token will succeed
                                              crate::debug!(4, "Step with grammar token {:?} ({}) has action, but all children are end nodes, so we can skip stepping and update final mask directly.", gtid, self.parent.parser.terminal_map.get_by_right(gtid).map_or("UNKNOWN_TERMINAL".to_string(), |s| s.to_string()));
                                              let mut edge_llm_tokens = HybridBitset::zeros();
                                              for edge_llm_tokens_bv in dest_map.values() {
                                                  edge_llm_tokens |= edge_llm_tokens_bv;
                                              }
                                              let llm_tokens = &glr_s_llm_tokens & &edge_llm_tokens;
                                              crate::debug!(4, "Adding active tokens {:?} to final mask", llm_tokens);
                                              *final_mask_internal.borrow_mut() |= llm_tokens;
                                              crate::debug!(4, "Final mask after adding tokens: {:?}", final_mask_internal.borrow());
                                              return Vec::new();
                                          });
                                      },
                                      None => {
                                          timeit!(format!("get_mask step_fn - has_action_for - inconclusive"), {
                                              // Inconclusive
                                              crate::debug!(4, "Inconclusive step for grammar token {:?}, no action found.", gtid);
                                          });
                                      },
                                  }
                              }
                          }

                          let mut glr_s = glr_s.clone();

                          if let Some(gtid) = grammar_token_opt {
                              let mut counts_guard = step_counts_clone1.write().unwrap();
                              let entry = counts_guard.entry(*gtid).or_default();
                              entry.total += 1;

                              let terminal_name = self.parent.parser.terminal_map.get_by_right(gtid)
                                  .map(|s| s.to_string())
                                  .unwrap_or("UNKNOWN_TERMINAL".to_string());
                              // timeit!(format!("get_mask step for terminal '{}'", terminal_name), {
                              glr_s.process_token(*gtid);
                              // });

                              crate::debug!(4, "glr_s.is_ok()_after_process_token: {}", glr_s.is_ok());

                              if glr_s.is_ok() {
                                  entry.successful += 1;
                              } else {
                                  return Vec::new();

                              }
                          }

                          // glr_s.log_gss("After stepping", grammar_token_opt.unwrap_or(TerminalID(0)));
                          // disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());

                          let mut results = Vec::new();

                          crate::debug!(4, "Processing edge: {:?}", grammar_token_opt);
                          for (child_node_trie_data, edge_llm_tokens_bv) in dest_map.iter() {
                              let mut glr_s = glr_s.clone();
                              allow_only_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &edge_llm_tokens_bv, &mut HashMap::new());
                              crate::debug!(4, "Stepping with grammar_token_opt: {:?}", grammar_token_opt);
                              glr_s.log_gss("Stepping with grammar_token_opt", grammar_token_opt.unwrap_or(TerminalID(0)), false, false);
                              crate::debug!(4, "Active LLM tokens: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                              crate::debug!(4, "Edge LLM tokens: {:?}", edge_llm_tokens_bv);
                              // crate::debug!(4, "Intersecting with edge_llm_tokens_bv: {:?}", edge_llm_tokens_bv);
                              // subtract_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());
                              // glr_s.log_gss("After intersecting", grammar_token_opt.unwrap_or(TerminalID(0)));

                              if !glr_s.is_ok() {
                                  crate::debug!(4, "GLR state is not alive after step, skipping.");
                                  continue;
                              }

                              if child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                                  let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                                  crate::debug!(4, "Adding active tokens {:?} to final mask", glr_active_tokens);
                                  // timeit!("get_mask final_mask update", {
                                  *final_mask_internal.borrow_mut() |= glr_active_tokens;
                                  // });
                                  crate::debug!(4, "Final mask after adding end node tokens: {:?}", final_mask_internal.borrow());
                              }

                              results.push((child_node_trie_data.clone(), glr_s));
                          }
                          crate::debug!(4, "Step function results len: {}", results.len());
                          results
                      })
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      timeit!("get_mask merge_fn", {
                          crate::debug!(4, "Active LLM tokens in glr_s1 before merge: {:?}", glr_s1.active_state.stack.allowed_llm_tokens());
                          crate::debug!(4, "Active LLM tokens in glr_s2 before merge: {:?}", glr_s2.active_state.stack.allowed_llm_tokens());
                          glr_s1.merge_with(glr_s2);
                          crate::debug!(4, "Active LLM tokens in glr_s1 after merge: {:?}", glr_s1.active_state.stack.allowed_llm_tokens());
                      })
                  },
                  // process_fn: (precomputed_node_data, final_glr_s_for_this_path)
                  |precomputed_node_data, glr_s| {
                      timeit!("get_mask process_fn", {
                          crate::debug!(4, "Processing precomputed node data: {:?}", precomputed_node_data);
                          if precomputed_node_data.value.end {
                              let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                              crate::debug!(4, "Precomputed node data is an end node, adding active tokens {:?} to final mask", glr_active_tokens);
                              *final_mask_internal.borrow_mut() |= glr_active_tokens;
                              crate::debug!(4, "Final mask after adding end node tokens: {:?}", final_mask_internal.borrow());
                              false
                          } else {
                              let mut num_outgoing_edges_that_lead_to_non_end_nodes = 0;
                              for (edge_terminal_opt, dest_map) in precomputed_node_data.children().iter() {
                                  if edge_terminal_opt.is_none() {
                                      num_outgoing_edges_that_lead_to_non_end_nodes += 1
                                  } else {
                                      for (child_node_trie_data, _edge_llm_tokens_bv) in dest_map.iter() {
                                          if !child_node_trie_data.as_arc().read(&self.parent.trie1_god).unwrap().value.end {
                                              num_outgoing_edges_that_lead_to_non_end_nodes += 1;
                                              break;
                                          }
                                      }
                                  }
                                  if num_outgoing_edges_that_lead_to_non_end_nodes >= 2 {
                                      break; // No need to check further, we have at least two non-end nodes.
                                  }
                              }
                              // Print GSS stats
                              disallow_llm_tokens_and_prune_arc(&mut glr_s.active_state.stack, &final_mask_internal.borrow(), &mut HashMap::new());
                              Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                              let stats = gather_gss_stats(&[glr_s.active_state.stack.as_ref()]);
                              // crate::debug!(3, "GSS stats for precomputed node data: {:#?}", stats);
                              let mut do_phase3 = false;
                              do_phase3 |= num_outgoing_edges_that_lead_to_non_end_nodes >= 2;
                              do_phase3 |= match LR_MODE {
                                  LRMode::LR1 | LRMode::LALR_EX_SHIFT_STATES => false,
                                  LRMode::LALR => true,
                              };
                              // do_phase3 |= true;
                              if do_phase3 {
                                  // There will be a split.
                                  // Let's do some work ahead of time to avoid redundant computations due to the upcoming split.
                                  crate::debug!(4, "Processing non-end precomputed node data");
                                  crate::debug!(4, "Active LLM tokens before phase 3: {:?}", glr_s.active_state.stack.allowed_llm_tokens());

                                  let mut allowed_terminals = TerminalBV::zeros();
                                  for gtid_opt in precomputed_node_data.children().keys() {
                                      if let Some(gtid) = gtid_opt {
                                          allowed_terminals.insert(gtid.0);
                                      }
                                  }
                                  let disallowed_terminals_bv = allowed_terminals.inverted();
                                  if !disallowed_terminals_bv.is_empty() {
                                      let disallowed_l2 = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::from_iter(
                                          std::iter::once((0..=usize::MAX, disallowed_terminals_bv))
                                      );
                                      disallow_terminals_and_prune_arc(&mut glr_s.active_state.stack, &disallowed_l2, &mut HashMap::new());
                                  }

                                  glr_s.process_default_reductions();
                                  crate::debug!(4, "After phase 3, active stack.stack.is_empty(): {}", glr_s.active_state.stack.is_empty());
                                  Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                                  crate::debug!(4, "Active LLM tokens after phase 3: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                                  crate::debug!(4, "Disallowing LLM tokens and pruning arc for precomputed node data: {:?}", final_mask_internal.borrow());
                                  Arc::make_mut(&mut glr_s.active_state.stack).fuse_predecessors(1);
                              }
                              crate::debug!(4, "After processing precomputed node data, active stack.stack.is_empty(): {}", glr_s.active_state.stack.is_empty());
                              crate::debug!(4, "Final active LLM tokens: {:?}", glr_s.active_state.stack.allowed_llm_tokens());
                              !glr_s.active_state.stack.is_empty()
                          }
                      })
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));
              }

              crate::profiler::print_summary_flat();

              let counts = step_counts.read().unwrap();
              if !counts.is_empty() {
                  let mut sorted_counts: Vec<_> = counts.iter().collect();
                  sorted_counts.sort_by_key(|&(_, count)| std::cmp::Reverse(count.total));

                  let mut log_msg = String::from("get_mask step() counts:");
                  for (terminal_id, count) in sorted_counts {
                      let terminal_name = self.parent.parser.terminal_map.get_by_right(terminal_id)
                          .map(|s| s.to_string())
                          .unwrap_or("UNKNOWN_TERMINAL".to_string());
                      log_msg.push_str(&format!("\n  - '{}': {}/{} successful", terminal_name, count.successful, count.total));
                  }
                  crate::debug!(3, "{}", log_msg);
              }

              crate::profiler::print_summary();
              crate::profiler::reset();

              // Log the GSSs
              if GSS_LOGGING_ENABLED {
                  crate::debug!(3, "Final GSS states after get_mask:");
                  let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
                  let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
                  let config = GSSPrintConfig {
                      labels: Some(&labels),
                      max_edges: 300,
                      original_internal_bimap: None,
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  print!("{}", print_gss_forest(&roots, &self.parent.parser.terminal_map, &config).0);
              }

              let final_mask_mapped = self.parent.internal_bv_to_original_precompute1(&final_mask_internal.into_inner());

              let t_end = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("get_mask took: {:>15?}", t_end.duration_since(t0));
              }

              final_mask_mapped
          }

          pub fn get_mask2(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(2, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot( // TODO: fix this
                      &roots_with_labels,
                      Some(&self.parent.precompute_vocab1.original_to_internal),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());

              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              #[derive(Default, Clone, Copy, Debug)]
              struct StepCount {
                  total: usize,
                  successful: usize,
              }

              let step_counts = Arc::new(RwLock::new(BTreeMap::<TerminalID, StepCount>::new()));

              let mut initial_values_for_map: Vec<(Trie2Index, GLRParserState<'a>)> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  // crate::debug!(4, "Initializing GSS for state {}", tokenizer_state_id.0);
                  // Ensure the GLR state's GSS stack is not empty before proceeding
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed2.get(tokenizer_state_id) {
                      let mut glr_state = glr_state.clone();
                      prune_llm_tokens_by_disallowed_terminals(
                          &mut glr_state.active_state.stack,
                          &self.parent.possible_matches,
                          &mut HashMap::new(),
                      );
                      initial_values_for_map.push((precomputed_trie_root_arc.clone(), glr_state));
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              if initial_values_for_map.is_empty() {
                   // This can happen if all GLR states had empty GSS stacks or no corresponding precomputed tries.
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original_precompute2(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));
              }

              let step_counts_clone1 = Arc::clone(&step_counts);
              let step_counts_clone2 = Arc::clone(&step_counts);

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie2_god,
                  initial_values_for_map,
                  // step_fn: (current_glr_state, (k, option state ID), destinations_map)
                  |glr_s, (k, expected_state_id_opt ), dest_map| {
                      // if !glr_s.is_ok() {
                      //     crate::debug!(4, "GLR state is not alive before popping, skipping.");
                      //     return Vec::new();
                      // }
                      crate::debug!(4, "Processing step for k: {:?}, expected_state_id_opt: {:?}", k, expected_state_id_opt);
                      // glr_s.log_gss("Before popping", TerminalID(0), false, false);
                      let mut out_gsss = Vec::new();
                      let popped = glr_s.active_state.stack.popn(*k);
                      for popper_item in popped.iter() {
                          for peek in popper_item.peek_iter() {
                              let ok = if let Some(expected_state_id) = expected_state_id_opt {
                                  expected_state_id == &peek.edge_value().state_id
                              } else {
                                  true
                              };
                              if ok {
                                  out_gsss.push(peek.isolated_parent());
                              }
                          }
                      }
                      if out_gsss.is_empty() {
                          crate::debug!(4, "No valid GSS nodes after popping, skipping.");
                          return Vec::new();
                      }
                      let out_gss = GSSNode::merge_many_with_depth(1, out_gsss);
                      crate::debug!(4, "After popping {} from GSS: {}", k, print_gss_forest(&[out_gss.clone()], &self.parent.parser.terminal_map, &GSSPrintConfig::default()).0);
                      // if !out_gss.is_alive() {
                      //     crate::debug!(4, "GLR state is not alive after popping, skipping.");
                      //     return Vec::new();
                      // }
                      let mut out = Vec::new();
                      for (dst_node_wrapper, edge_bv) in dest_map.iter() {
                          let mut out_gss_filtered = out_gss.clone();
                          crate::debug!(5, "Filtering GSS for edge LLM tokens: {:?}", edge_bv);
                          allow_only_llm_tokens_and_prune_arc(&mut out_gss_filtered, edge_bv, &mut HashMap::new());
                          let mut out_glr_s = glr_s.clone();
                          out_glr_s.active_state.stack = out_gss_filtered;
                          crate::debug!(4, "Allowed LLM tokens in out_gss_filtered: {:?}", out_glr_s.active_state.stack.allowed_llm_tokens());
                          // out_glr_s.log_gss("After filtering for edge LLM tokens", TerminalID(0), false, false);
                          // if out_glr_s.is_ok() {
                              out.push((dst_node_wrapper.clone(), out_glr_s));
                          }
                      // }
                      out
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      crate::debug!(4, "Merging two GLR states");
                      glr_s1.merge_with(glr_s2);
                  },
                  // process_fn: (precomputed_node_data, final_glr_s_for_this_path)
                  |precomputed_node_data, glr_s| {
                      crate::debug!(4, "Processing node {:p}", precomputed_node_data);
                      // glr_s.log_gss("At process_fn", TerminalID(0), false, false);
                      let glr_active_tokens = glr_s.active_state.stack.allowed_llm_tokens();
                      // let keep_going = !glr_active_tokens.is_empty();
                      let keep_going = glr_s.is_ok();
                      if precomputed_node_data.value.end {
                          crate::debug!(4, "Precomputed node data is an end node, adding active tokens {:?} to final mask", glr_active_tokens);
                          *final_mask_internal.borrow_mut() |= glr_active_tokens;
                      } else {
                          crate::debug!(4, "Precomputed node data is not an end node, active tokens: {:?}", glr_active_tokens);
                      }
                      keep_going
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));
              }

              crate::profiler::print_summary_flat();

              let counts = step_counts.read().unwrap();
              if !counts.is_empty() {
                  let mut sorted_counts: Vec<_> = counts.iter().collect();
                  sorted_counts.sort_by_key(|&(_, count)| std::cmp::Reverse(count.total));

                  let mut log_msg = String::from("get_mask step() counts:");
                  for (terminal_id, count) in sorted_counts {
                      let terminal_name = self.parent.parser.terminal_map.get_by_right(terminal_id)
                          .map(|s| s.to_string())
                          .unwrap_or("UNKNOWN_TERMINAL".to_string());
                      log_msg.push_str(&format!("\n  - '{}': {}/{} successful", terminal_name, count.successful, count.total));
                  }
                  crate::debug!(3, "{}", log_msg);
              }

              crate::profiler::print_summary();
              crate::profiler::reset();

              // Log the GSSs
              if GSS_LOGGING_ENABLED {
                  crate::debug!(3, "Final GSS states after get_mask:");
                  let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
                  let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
                  let config = GSSPrintConfig {
                      labels: Some(&labels),
                      max_edges: 300,
                      original_internal_bimap: None,
                      llm_token_map: Some(&self.parent.llm_vocab.llm_token_map),
                      verbose: false,
                  };
                  print!("{}", print_gss_forest(&roots, &self.parent.parser.terminal_map, &config).0);
              }

              crate::debug!(4, "Final mask internal: {:?}", final_mask_internal.borrow());
              let final_mask_mapped = self.parent.internal_bv_to_original_precompute2(&final_mask_internal.into_inner());
              crate::debug!(4, "Final mask mapped: {:?}", final_mask_mapped);

              let t_end = std::time::Instant::now();
              println!("get_mask took: {:>15?}", t_end.duration_since(t0));

              final_mask_mapped
          }

          pub fn print_gss_stats(&self) {
              println!("GrammarConstraintState Stats:");
              println!("  - Active tokenizer states: {}", self.state.len());
              if self.state.is_empty() {
                  println!("  - GSS is empty.");
                  return;
              }
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              println!("  - GSS Stats: {:#?}", stats);
          }

          pub fn print_gss(&self) {
              let roots: Vec<_> = self.state.values().map(|s| s.active_state.stack.clone()).collect();
              if roots.is_empty() {
                  println!("GSS is empty.");
                  return;
              }
              let labels: Vec<_> = self.state.keys().map(|k| format!("Tokenizer State {}", k.0)).collect();
              self.parent.print_gss_nodes(&roots, Some(&labels));
          }

          pub fn explain_stack(&self) {
              for (state_id, state) in &self.state {
                  println!("\n--- State {} ---", state_id.0);
                  // Sample and print a bunch of stacks
                  let mut seen = BTreeSet::new();
                  let num_to_sample = 10;
                  for i in 0..1000 {
                      if let Some(sampled_path_edges) = sample_path(&[&state.active_state.stack], i) {
                          let mut sampled_stack: Vec<usize> = sampled_path_edges.iter()
                              .map(|edge| edge.state_id.0)
                              .collect();
                          sampled_stack.reverse();
                          if seen.contains(&sampled_stack) {
                              continue;
                          }
                          seen.insert(sampled_stack);
                          if seen.len() >= num_to_sample {
                              break;
                          }
                      };
                  }
                  for sampled_stack in seen {
                      println!("  Sampled stack: {:?}", sampled_stack);
                  }
                  // Sample a stack
                  if let Some(sampled_path_edges) = sample_path(&[&state.active_state.stack], 1) {
                      let mut sampled_stack: Vec<StateID> = sampled_path_edges.iter()
                          .map(|edge| edge.state_id)
                          .collect();
                      sampled_stack.reverse();
                      let explanation = self.parent.parser.explain_stack(&sampled_stack);
                      // Indent the explanation for readability
                      for line in explanation.lines() {
                          println!("      {}", line);
                      }
                  };
              }
          }

          pub fn num_unique_nodes(&self) -> usize {
              gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              ).unique_nodes()
          }

          pub fn get_mask3(&self) -> LLMTokenBV {
              let t0 = std::time::Instant::now();
              crate::debug!(10, "\n--- get_mask3 START ---");
              crate::debug!(10, "GSS at start of get_mask3:");
              crate::debug!(3, "Getting mask {} states: {:?}", self.state.len(), self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              let stats = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(10, "Initial GSS stats: {:#?}", stats);
              crate::debug!(3, "GSS stats: {:#?}", stats);
              let roots = self.state.values().map(|s| s.active_state.stack.clone()).collect::<Vec<_>>();
              if GSS_LOGGING_ENABLED {
                  let (s, state_ids) = print_gss_forest(&roots, &self.parent.parser.terminal_map, &GSSPrintConfig::default());
                  println!("{}", s);
                  println!("\n\n--- GSS State Explanations ---\n");
                  for state_id in state_ids {
                      let mut explanation = String::new();
                      println!("\n--- State {} ---", state_id.0);
                      self.parent.parser.format_state_details(&mut explanation, state_id, "  ").unwrap();
                      println!("{}", explanation);
                  }

                  println!("\n\n--- Begin GSS Graphviz ---");
                  let labels: Vec<String> = self.state.keys().map(|k| format!("State {}", k.0)).collect();
                  let roots_with_labels: Vec<(&str, &GSSNode)> = labels.iter()
                      .map(|s| s.as_str())
                      .zip(self.state.values().map(|s| s.active_state.stack.as_ref()))
                      .collect();
                  println!("{}", self.parent.parser.gss_forest_to_dot( // TODO: fix this
                      &roots_with_labels,
                      Some(&self.parent.precompute_vocab1.original_to_internal),
                      Some(&self.parent.llm_vocab.llm_token_map),
                  ));
                  println!("\n\n--- End GSS Graphviz ---");
              }

              for (state_id, state) in self.state.iter() {
                  crate::debug!(3, "State {}:", state_id.0);
              }

              let final_mask_internal = RefCell::new(HybridBitset::zeros());
              if self.state.is_empty() {
                  return self.parent.internal_bv_to_original_precompute3(&final_mask_internal.into_inner());
              }
              let mut initial_values_by_trie_node: BTreeMap<PrecomputeNode3Index, GLRParserState<'a>> = BTreeMap::new();
              crate::debug!(10, "\n--- Seeding work queue ---");
              for (&tokenizer_state_id, glr_state) in &self.state {
                  if glr_state.active_state.stack.is_empty() {
                      continue;
                  }
                  let mut glr_state = glr_state.clone();
                  prune_llm_tokens_by_disallowed_terminals(
                      &mut glr_state.active_state.stack,
                      &self.parent.possible_matches,
                      &mut HashMap::new(),
                  );

                  if let Some(precomputed_trie_root_arc) = self.parent.precomputed3.get(&tokenizer_state_id) {
                      crate::debug!(10, "  SEED: sid={}, root_idx={}, gss_ptr={:p}", tokenizer_state_id.0, precomputed_trie_root_arc, glr_state.active_state.stack);
                      
                      initial_values_by_trie_node.entry(precomputed_trie_root_arc.clone())
                          .and_modify(|existing_glr| {
                              existing_glr.merge_with(glr_state.clone());
                          })
                          .or_insert(glr_state.clone());
                  } else {
                      panic!("No precomputed trie found for tokenizer state {:?}.", tokenizer_state_id);
                  }
              }

              let initial_values_for_map: Vec<_> = initial_values_by_trie_node.into_iter().collect();

              if initial_values_for_map.is_empty() {
                   crate::debug!(2, "No valid initial states for get_mask's special_map traversal.");
                   return self.parent.internal_bv_to_original(&final_mask_internal.into_inner());
              }

              let t1 = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after initial_values_for_map: {:>15?}", t1.duration_since(t0));
              }

              crate::profiler::reset();

              Trie::special_map_grouped(
                  &self.parent.trie3_god,
                  initial_values_for_map,
                  // step_fn: (current_state, (pop, llm_token_bv), destinations_map)
                  |glr_s, (pop, llm_token_bv_from_edge), dest_map| {
                      crate::debug!(10, "  - STEP: gss_ptr={:p}, edge=(pop={}, llm_bv={})", glr_s.active_state.stack, pop, format_bv(llm_token_bv_from_edge));
                      let popped = glr_s.active_state.stack.popn(*pop as usize);
                      let num_peeks: usize = popped.iter().map(|p| p.peek_iter().count()).sum();
                      if num_peeks > 0 {
                          crate::debug!(10, "      - Popped GSS has {} peeks", num_peeks);
                      }
                      let mut results = Vec::new();

                      for (dest_idx, state_id_bv) in dest_map.iter() {
                          let mut valid_gss_nodes = Vec::new();
                          for popper_item in popped.iter() {
                              for peek in popper_item.peek_iter() {
                                  if state_id_bv.contains(peek.edge_value().state_id.0) {
                                      valid_gss_nodes.push(peek.isolated_parent());
                                  }
                              }
                          }

                          if valid_gss_nodes.is_empty() {
                              continue;
                          }

                          let merged_gss = GSSNode::merge_many_with_depth(1, valid_gss_nodes.clone());
                          let mut new_glr_s = glr_s.clone();
                          new_glr_s.active_state.stack = merged_gss;

                          allow_only_llm_tokens_and_prune_arc(&mut new_glr_s.active_state.stack, llm_token_bv_from_edge, &mut HashMap::new());

                          if new_glr_s.is_ok() {
                              crate::debug!(10, "      - Dest: idx={}, state_bv={}, matched={}, new_gss_ptr={:p}", dest_idx, format_bv(state_id_bv), valid_gss_nodes.len(), new_glr_s.active_state.stack);
                              results.push((dest_idx.clone(), new_glr_s));
                          }
                      }
                      results
                  },
                  // merge_fn
                  |glr_s1, glr_s2| {
                      crate::debug!(10, "    - MERGE: gss1(ptr={:p}) WITH gss2(ptr={:p})", glr_s1.active_state.stack, glr_s2.active_state.stack);
                      glr_s1.merge_with(glr_s2);
                  },
                  // process_fn: (precomputed_node_data, final_state_for_this_path)
                  |precomputed_node_data, glr_s| {
                      crate::debug!(10, "  - PROCESS: node_ptr={:p}, gss_ptr={:p}", precomputed_node_data as *const _, glr_s.active_state.stack);
                      let mut glr_s_copy = glr_s.clone();
                      let glr_active_tokens = glr_s_copy.active_state.stack.allowed_llm_tokens();
                      let keep_going = glr_s_copy.is_ok();
                      if precomputed_node_data.value.end {
                          if !glr_active_tokens.is_empty() {
                              let before = final_mask_internal.borrow().len();
                              *final_mask_internal.borrow_mut() |= &glr_active_tokens;
                              let after = final_mask_internal.borrow().len();
                              if after > before {
                                  crate::debug!(10, "    - END NODE. final_mask len: {} -> {} (+{}) with tokens {}", before, after, after - before, format_bv(&glr_active_tokens));
                              }
                          }
                      }
                      keep_going
                  },
              );

              let t_after_special_map = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("after special_map: {:>15?}", t_after_special_map.duration_since(t0));
              }

              crate::profiler::print_summary_flat();
              crate::profiler::print_summary();
              crate::profiler::reset();

              crate::debug!(10, "\n--- get_mask3 END ---");
              crate::debug!(10, "Final mask internal: {}", format_bv(&final_mask_internal.borrow()));
              crate::debug!(4, "Final mask internal: {}", format_bv(&final_mask_internal.borrow()));
              let final_mask_mapped = self.parent.internal_bv_to_original_precompute3(&final_mask_internal.into_inner());
              crate::debug!(10, "Final mask mapped: {}", format_bv(&final_mask_mapped));
              crate::debug!(4, "Final mask mapped: {}", format_bv(&final_mask_mapped));

              let t_end = std::time::Instant::now();
              if env::var("RUST_LOG_MASK_TIMING").is_ok() {
                  println!("get_mask took: {:>15?}", t_end.duration_since(t0));
              }

              final_mask_mapped
          }

          pub fn commit(&mut self, llm_token_id: LLMTokenID) { // original ID
              return self.commit_bytes(&self.parent.llm_vocab.llm_token_map.get_by_right(&llm_token_id).unwrap().clone());

              // NOTE: The precompute0 trie is likely incorrect, and it's likely the below is incorrect as well.
              let mut self_clone = self.clone();
              self_clone.commit_bytes(&self_clone.parent.llm_vocab.llm_token_map.get_by_right(&llm_token_id)
                  .unwrap_or_else(|| panic!("LLM token ID {:?} not found in LLM token map during commit.", llm_token_id))
                  .clone());

              // Convert to internal id; if not present or no precomputed entry, fall back.
              let internal_id = self.parent.original_id_to_internal_stage0(llm_token_id)
                  .unwrap_or_else(|| panic!("LLM token ID {:?} not found in internal mapping during commit.", llm_token_id));

              // let terminals_map_by_state = self.parent.terminal_map_by_llm.get(&internal_id)
              //     .unwrap_or_else(|| panic!("No terminal map found for internal LLM token ID {:?} during commit.", internal_id));
              // let state_map = self.parent.state_map_by_llm.get(&internal_id)
              //     .unwrap_or_else(|| panic!("No tokenizer state map found for internal LLM token ID {:?} during commit.", internal_id));
              let llm_token_bytes = self.parent.llm_vocab.llm_token_map.get_by_right(&llm_token_id).unwrap().clone();
              let (_state_map, terminals_map_by_state) = self.compute_commit_maps(&llm_token_bytes);
              let state_map = &_state_map;

              if self.state.is_empty() {
                  return;
              }

              // 1) Reset LLM tokens on current stacks.
              self.transform_gss_stacks(|stack, memo| reset_llm_tokens(stack, memo));

              // 2) Prune disallowed terminals using the per-token precomputed terminal sets.
              self.transform_gss_stacks(|stack, memo| prune_disallowed_terminals(stack, &terminals_map_by_state, memo));

              // 3) Map tokenizer states
              self.transform_gss_stacks(|stack, memo| map_allowed_terminals_tokenizer_states(stack, state_map, memo));

              // 3) Traverse the precomputed Trie 0 specialized to this token, stepping the GLR state.
              //    We only follow edges whose LLMTokenBV contains this token's internal ID.
              //    We also apply any per-edge "disallowed" terminal constraints as encoded in the edge key.
              if self.state.is_empty() {
                  return;
              }

              // Seed the traversal with one entry per active tokenizer state.
              // Carry the GLRParserState directly; we’ll assign final tokenizer state at end nodes.
              let mut initial_values_for_map: Vec<(PrecomputeNode0Index, GLRParserState<'a>)> = Vec::new();
              for (tokenizer_state_id, glr_state) in &self.state {
                  let root_idx = self.parent.precomputed0.get(tokenizer_state_id)
                      .unwrap_or_else(|| panic!("No precomputed trie root for tokenizer state {:?} during commit.", tokenizer_state_id));
                  initial_values_for_map.push((*root_idx, glr_state.clone()));
              }

              let internal_id_val = internal_id.0;
              let mut new_overall_state: BTreeMap<TokenizerStateID, GLRParserState<'a>> = BTreeMap::new();

              Trie::special_map_grouped(
                  &self.parent.trie0_god,
                  initial_values_for_map,
                  // step: for a given edge key, propagate only along children whose edge BV contains the token.
                  |glr_s0: &GLRParserState<'a>,
                   edge_key: &Option<(GrammarTokenID, Option<TokenizerStateID>)>,
                   dest_map: &OrderedHashMap<Trie2Index, LLMTokenBV>| {
                      let mut out = Vec::new();

                      for (child_idx, edge_bv) in dest_map.iter() {
                          // Only propagate to children compatible with the chosen token.
                          if !edge_bv.contains(internal_id_val) {
                              continue;
                          }

                          let mut glr_s = glr_s0.clone();

                          if let Some((gtid, disallowed_opt)) = edge_key {
                              // Step the GLR state on this grammar token (if any).
                              glr_s.process_token(*gtid);
                              if !glr_s.is_ok() {
                                  continue;
                              }

                              // Apply "disallow" rule for immediate repetition at segment boundary if needed.
                              if let Some(end_state) = disallowed_opt {
                                  let mut disallowed = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::new();
                                  let mut tbv = TerminalBV::zeros();
                                  tbv.insert(gtid.0);
                                  disallowed.insert_l2_bitset(end_state.0, tbv);
                                  disallow_terminals_and_prune_arc(
                                      &mut glr_s.active_state.stack,
                                      &disallowed,
                                      &mut HashMap::new(),
                                  );
                                  if !glr_s.is_ok() {
                                      continue;
                                  }
                              }
                          }

                          out.push((*child_idx, glr_s));
                      }

                      out
                  },
                  // merge: merge per-final-tokenizer-state maps, merging GLR states per key.
                  |dst: &mut GLRParserState<'a>, src: GLRParserState<'a>| {
                      dst.merge_with(src);
                  },
                  // process: if at end node, accumulate results to new_overall_state and stop; otherwise continue if any GLR state is alive.
                  |node, glr_s: &mut GLRParserState<'a>| {
                      if !glr_s.is_ok() { return false; }
                      if node.value.final_tokenizer_state.is_some() {
                          // Use the final tokenizer state encoded by the end node.
                          let final_tid = node.value.final_tokenizer_state
                              .expect("Trie0 end node must carry a final_tokenizer_state");
                          new_overall_state
                              .entry(final_tid)
                              .and_modify(|g| g.merge_with(glr_s.clone()))
                              .or_insert(glr_s.clone());
                          false
                      } else {
                          true
                      }
                  },
              );

              // Replace with the newly computed per-final-tokenizer-state GLR states.
              self.state = new_overall_state;

              // 5) Cleanup: reset llm tokens to ensure order invariance; fuse; filter dead states.
              self.transform_gss_stacks(|stack, memo| reset_llm_tokens(stack, memo));
              self.map_gss_stacks(|stack, memo| fuse_predecessors_recursive(stack, 1, memo));
              self.state.retain(|_, glr| glr.is_ok());

              match self.parent.post_commit_allow_check_mode {
                  TerminalAllowanceCheckMode::None => {
                      // no-op
                  }
                  TerminalAllowanceCheckMode::ImmediateSets => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          // Fast auto-pass if tokenizer can produce all grammar terminals.
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }

                          let mut union = glr_state.immediate_shift_terminals();
                          union.extend(glr_state.immediate_reduce_terminals());
                          !union.is_disjoint(&accessible)
                      });
                  }
                  TerminalAllowanceCheckMode::ImmediateProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.has_immediate_action_for_terminal(*tid).unwrap_or(false) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
                  TerminalAllowanceCheckMode::StepProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.allows_terminal(*tid) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
              }

              assert!(*self == self_clone);
          }

          #[time_it]
          pub fn commit_bytes(&mut self, llm_token_bytes: &[u8]) { // llm_token_id is original
              if llm_token_bytes.is_empty() {
                  return;
              }

              crate::debug!(3, "Committing bytes: {:?}", String::from_utf8_lossy(llm_token_bytes));

              // for (state_id, state) in &self.state {
              //     crate::debug!(3, "State {} before commit:", state_id.0);
              //     state.log_gss("Before commit", TerminalID(0), false, false);
              // }

              self.transform_gss_stacks(|stack, memo| reset_llm_tokens(stack, memo));

              // Handle allowed terminals
              let (state_map, terminals_map) = self.compute_commit_maps(llm_token_bytes);

              let gss_stats_before_pruning = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(5, "Terminals map: {:?}", terminals_map);
              self.transform_gss_stacks(|stack, memo| prune_disallowed_terminals(stack, &terminals_map, memo));
              let gss_stats_after_pruning = gather_gss_stats(
                  &self.state.values().map(|s| s.active_state.stack.as_ref()).collect::<Vec<_>>(),
              );
              crate::debug!(4, "GSS stats before pruning disallowed terminals: {:#?}", gss_stats_before_pruning);
              if gss_stats_after_pruning != gss_stats_before_pruning {
                  crate::debug!(4, "GSS stats after pruning disallowed terminals: {:#?}", gss_stats_after_pruning);
                  crate::debug!(4, "GSS stats changed after pruning disallowed terminals.");
              } else {
                  crate::debug!(4, "GSS stats did not change after pruning disallowed terminals.");
              }

              self.transform_gss_stacks(|stack, memo| map_allowed_terminals_tokenizer_states(stack, &state_map, memo));
              // println!("State after preparation: {}", self);

              let mut new_overall_state: BTreeMap<TokenizerStateID, GLRParserState<'a>> = BTreeMap::new();

              let mut processing_queue: BTreeMap<usize, BTreeMap<TokenizerStateID, GLRParserState<'a>>> = BTreeMap::new();
              processing_queue.insert(0, std::mem::take(&mut self.state));

              while let Some((offset, states_to_process)) = processing_queue.pop_first() {
                  crate::debug!(3, "Processing offset {} with states {:?}.", offset, states_to_process.keys().map(|k| k.0).collect::<Vec<_>>());
                  for (tokenizer_s_id_at_offset, glr_s_at_offset) in states_to_process {
                      assert!(offset < llm_token_bytes.len());

                      let exec_result = self.parent.tokenizer.execute_from_state(
                          &llm_token_bytes[offset..],
                          tokenizer_s_id_at_offset,
                      );

                      for match_info in &exec_result.matches {
                          let mut cloned_glr_s = glr_s_at_offset.clone();

                          cloned_glr_s.process_token(TerminalID(match_info.id));
                          // cloned_glr_s.do_phase3();

                          if cloned_glr_s.is_ok() {
                              let new_offset = offset + match_info.width;
                              // After a grammar token is consumed, the tokenizer resets for the next segment of the LLM token.
                              let next_tokenizer_id_for_segment = self.parent.tokenizer.initial_state_id();

                              if let Some(end_state_id) = exec_result.end_state {
                                  let terminals_accessible_from_end_state = self.parent.tokenizer.tokens_accessible_from_state(TokenizerStateID(end_state_id));
                                  if terminals_accessible_from_end_state.contains(&TerminalID(match_info.id)) {
                                      let mut disallowed_terminals = crate::datastructures::hybrid_l2_bitset::HybridL2Bitset::new();
                                      let mut disallowed_terminals_for_end_state = TerminalBV::zeros();
                                      // Disallow this token from being matched again immediately.
                                      disallowed_terminals_for_end_state.insert(match_info.id);
                                      disallowed_terminals.insert_l2_bitset(end_state_id, disallowed_terminals_for_end_state);
                                      disallow_terminals_and_prune_arc(&mut cloned_glr_s.active_state.stack, &disallowed_terminals, &mut HashMap::new());
                                  }
                              }
                              // cloned_glr_s.log_gss(format!("Before disallowing terminals {:?} after committing bytes {:?}", &disallowed_terminals, &llm_token_bytes[offset..new_offset]).as_str(), TerminalID(match_info.id), false, false);
                              // cloned_glr_s.log_gss(format!("After disallowing terminals {:?} after committing bytes {:?}", &disallowed_terminals, &llm_token_bytes[offset..new_offset]).as_str(), TerminalID(match_info.id), false, false);

                              if new_offset == llm_token_bytes.len() {
                                  // reset_allowed_terminals(&mut cloned_glr_s.active_state.stack);
                                  new_overall_state.entry(next_tokenizer_id_for_segment).and_modify(|existing| existing.merge_with(cloned_glr_s.clone())).or_insert(cloned_glr_s);
                              } else {
                                  processing_queue.entry(new_offset).or_default().entry(next_tokenizer_id_for_segment).and_modify(|existing| existing.merge_with(cloned_glr_s.clone())).or_insert(cloned_glr_s);
                              }
                          }
                      }

                      if let Some(final_tokenizer_s_id_for_llm_token_segment) = exec_result.end_state {
                          // The rest of llm_token_bytes (from offset) was consumed, tokenizer ended in this state.
                          // The glr_s_at_offset is carried over. This is a state *after* the current LLM token.
                          let final_tokenizer_state = TokenizerStateID(final_tokenizer_s_id_for_llm_token_segment);
                          new_overall_state.entry(final_tokenizer_state).and_modify(|existing| existing.merge_with(glr_s_at_offset.clone())).or_insert(glr_s_at_offset.clone());
                      }
                  }
              }

              self.state = new_overall_state.clone();
              for glr_parser_state in self.state.values_mut() {
                  // glr_parser_state.process_default_reductions();
              }

              // TODO: this shouldn't be necessary, but due to some order-dependent LLM token BV weirdness in GSS, it is necessary to ensure commit order invariance.
              self.transform_gss_stacks(|stack, memo| reset_llm_tokens(stack, memo));
              self.map_gss_stacks(|stack, memo| fuse_predecessors_recursive(stack, 1, memo));
              self.state.retain(|_, glr_parser_state| glr_parser_state.is_ok());


              // Post-commit allowance check: ensure each surviving state allows at least one
              // token the tokenizer can produce from its current tokenizer state.
              // Mode is controlled by self.parent.post_commit_allow_check_mode.
              match self.parent.post_commit_allow_check_mode {
                  TerminalAllowanceCheckMode::None => {
                      // no-op
                  }
                  TerminalAllowanceCheckMode::ImmediateSets => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          // Fast auto-pass if tokenizer can produce all grammar terminals.
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }

                          let mut union = glr_state.immediate_shift_terminals();
                          union.extend(glr_state.immediate_reduce_terminals());
                          !union.is_disjoint(&accessible)
                      });
                  }
                  TerminalAllowanceCheckMode::ImmediateProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.has_immediate_action_for_terminal(*tid).unwrap_or(false) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
                  TerminalAllowanceCheckMode::StepProbe => {
                      self.state.retain(|tokenizer_state_id, glr_state| {
                          let accessible = self.parent.tokenizer.tokens_accessible_from_state(*tokenizer_state_id);
                          if accessible.len() >= self.parent.parser.terminal_map.len() {
                              return true;
                          }
                          for tid in &accessible {
                              if glr_state.allows_terminal(*tid) {
                                  return true;
                              }
                          }
                          false
                      });
                  }
              }

              // let mut roots: BTreeMap<TokenizerStateID, Arc<GSSNode>> = BTreeMap::new();
              // for (tokenizer_state_id, glr_state) in &self.state {
              //     roots.insert(*tokenizer_state_id, glr_state.active_state.stack.clone());
              // }
              // simplify(&mut roots);
              // for (tokenizer_state_id, glr_state) in &mut self.state {
              //     glr_state.active_state.stack = roots.get(tokenizer_state_id).unwrap().clone();
              // }

              // let mut roots_to_simplify_arcs = Vec::new();
              // for glr_parser_state in self.state.values_mut() {
              //     if !glr_parser_state.active_state.stack.is_empty() {
              //         roots_to_simplify_arcs.push(&mut glr_parser_state.active_state.stack);
              //     }
              // }
              //
              // if !roots_to_simplify_arcs.is_empty() {
              //     GSSNode::simplify_together(&mut roots_to_simplify_arcs);
              // }

              crate::debug!(4, "Active tokenizer states after committing text (bytes {:?}): {:?}", llm_token_bytes, self.state.keys().map(|k|k.0).collect::<Vec<_>>());
              for (tokenizer_id, glr_state) in &self.state {
                  if !glr_state.active_state.stack.is_empty() { // Log only for non-empty GSS
                      // glr_state.log_gss("After commit", TerminalID(0), false, false);
                  }
              }
          }

          pub fn is_active(&self) -> bool {
              !self.state.is_empty()
          }

          pub fn state(&self) -> &BTreeMap<TokenizerStateID, GLRParserState<'a>> {
              &self.state
          }
      }

      pub(crate) type LLMTokenBV = HybridBitset;
      pub(crate) type TerminalBV = HybridBitset;
      /// A 2D bitset where L1 is tokenizer state and L2 is terminal ID.
      pub type TerminalInfo = HybridL2Bitset;
    src/constraint_precompute3_challenge_elimination.rs: |
      // src/constraint_precompute3_challenge_elimination.rs
      use crate::constraint::IntermediatePrecomputedNodeContents3;
      use crate::constraint::{
          IntermediatePrecomputeNode3, IntermediatePrecomputeNode3Index, IntermediateTrie3EdgeKey,
          IntermediateTrie3GodWrapper, LLMTokenBV, StateIDBV,
      };
      use crate::datastructures::trie::Trie;
      use crate::r#macro::is_debug_level_enabled;
      use crate::tokenizer::TokenizerStateID;
      use std::collections::{BTreeMap, BTreeSet};

      use std::collections::VecDeque;
      use std::collections::btree_map::Entry;

      /// If true, runs both trie-based and path-based elimination, compares them,
      /// and if a mismatch is found, attempts to find a minimal failing input graph.
      /// This adds significant overhead and should only be used for debugging the
      /// elimination logic itself.
      const DEBUG_MISMATCHES: bool = true; // Keep true for robust testing
      const MAX_PATH_LEN: usize = 100; // Increased for complex test cases

      fn debug_mismatches_enabled() -> bool {
          if DEBUG_MISMATCHES {
              return true;
          }
          match std::env::var("GRAMMARS_DEBUG_MISMATCHES").or_else(|_| std::env::var("DEBUG_MISMATCHES")) {
              Ok(v) => {
                  let v = v.to_ascii_lowercase();
                  v == "1" || v == "true" || v == "yes" || v == "on"
              }
              Err(_) => false,
          }
      }

      /// Normalizes a path for comparison purposes.
      /// - Removes NoOp edges.
      /// - Collects all CheckLLM bitvectors, intersects them, and prepends a single CheckLLM.
      pub(crate) fn normalize_path(path: Vec<IntermediateTrie3EdgeKey>) -> Vec<IntermediateTrie3EdgeKey> {
          // IMPORTANT: DO NOT MODIFY THIS FUNCTION.
          let mut combined_llm_bv = LLMTokenBV::max_ones();
          let mut has_llm_check = false;

          let mut other_ops: Vec<IntermediateTrie3EdgeKey> = path
              .into_iter()
              .filter(|ek| {
                  if let IntermediateTrie3EdgeKey::CheckLLM(bv) = ek {
                      combined_llm_bv &= bv;
                      has_llm_check = true;
                      false // remove from path
                  } else {
                      !matches!(ek, IntermediateTrie3EdgeKey::NoOp)
                  }
              })
              .collect();

          if has_llm_check {
              other_ops.insert(0, IntermediateTrie3EdgeKey::CheckLLM(combined_llm_bv));
          }

          other_ops
      }
      /// Simplifies a path by repeatedly eliminating Push/Pop pairs.
      /// This function finds the innermost Push/Pop pairs and simplifies them according
      /// to stack machine rules, repeating until no more simplifications can be made.
      ///
      /// A Push operation at index `i` is paired with the first Pop operation at index `j > i`
      /// such that there are no other Push operations between `i` and `j`.
      ///
      /// Rules for a `Push(A)` paired with a `Pop(k, B)`:
      /// - k = 0: The push is updated to `Push(A ∩ B)` and the pop is removed. If the
      ///   intersection is empty, the path is invalid (`None`).
      /// - k = 1: If `A` and `B` have a non-empty intersection, both the push and pop are
      ///   removed. Otherwise, the path is invalid (`None`).
      /// - k > 1: The push is removed, and the pop is updated to `Pop(k - 1, B)`. This
      ///   newly modified pop may then pair with a push further to its left in a
      ///   subsequent pass.
      fn simplify_path(
          stack: Vec<IntermediateTrie3EdgeKey>,
      ) -> Option<Vec<IntermediateTrie3EdgeKey>> {
          // IMPORTANT: DO NOT MODIFY THIS FUNCTION. It is the 'ground truth' for eliminating Push/Pop pairs.
          // If you are worried about this thing not behaving well with a 'stack' or something, you're probably misunderstanding the purpose of this code.
          // There is no 'stack' we're popping/pushing onto. I won't go into the details of what we're actually doing, but in the past people have
          // modified this function to try and make it more stack-like or something, and 'check for stack underflow', and this is WRONG. Don't do this.
          // DO NOT MODIFY THIS FUNCTION.
          // This function is the reference implementation. If there's a mismatch between this and the trie-based elimination, it's the trie-based elimination that is wrong. This one is the ground truth.
          let mut ops = stack;

          loop {
              let mut changed = false;

              // Find an innermost Push-Pop pair. This is a push that is followed by a pop
              // with no other pushes in between.
              let mut push_idx = None;
              let mut pop_idx = None;
              for i in 0..ops.len() {
                  if matches!(ops[i], IntermediateTrie3EdgeKey::Push(_)) {
                      push_idx = Some(i);
                  } else if let IntermediateTrie3EdgeKey::Pop(_, _) = ops[i] {
                      if push_idx.is_some() {
                          pop_idx = Some(i);
                          break;
                      }
                  }
              }

              if let (Some(p_idx), Some(o_idx)) = (push_idx, pop_idx) {
                  let push_op = ops[p_idx].clone();
                  let pop_op = ops[o_idx].clone();

                  if let (IntermediateTrie3EdgeKey::Push(push_bv), IntermediateTrie3EdgeKey::Pop(k, pop_bv)) = (push_op, pop_op) {
                      match k {
                          0 => {
                              let mut new_push_bv = push_bv;
                              new_push_bv &= pop_bv;
                              if new_push_bv.is_empty() {
                                  return None;
                              }
                              // Modify push, remove pop.
                              ops[p_idx] = IntermediateTrie3EdgeKey::Push(new_push_bv);
                              ops.remove(o_idx);
                              changed = true;
                          }
                          1 => {
                              if push_bv.is_disjoint(&pop_bv) {
                                  return None;
                              }
                              // Remove both. Pop is at a higher index.
                              ops.remove(o_idx);
                              ops.remove(p_idx);
                              changed = true;
                          }
                          _ => { // k > 1
                              // Remove push, decrement pop.
                              ops.remove(p_idx);
                              // The pop is now at index o_idx - 1.
                              ops[o_idx - 1] = IntermediateTrie3EdgeKey::Pop(k - 1, pop_bv);
                              changed = true;
                          }
                      }
                  }
              }

              if !changed {
                  break;
              }
          }
          Some(ops)
      }

      /// Compute the set of nodes that are part of any directed cycle in the subgraph induced by `nodes`.
      /// Uses Kahn's algorithm (iterative topological pruning) to identify nodes not removed => in cycles.
      pub(crate) fn nodes_in_cycles_subgraph(
          god: &IntermediateTrie3GodWrapper,
          nodes: &[IntermediatePrecomputeNode3Index],
      ) -> BTreeSet<usize> {
          // Build a set for quick membership checks.
          let node_set: BTreeSet<usize> = nodes.iter().map(|n| n.as_usize()).collect();

          // Build adjacency and in-degree within the induced subgraph.
          let mut indeg: BTreeMap<usize, usize> = BTreeMap::new();
          let mut adj: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
          for u in &node_set {
              indeg.entry(*u).or_insert(0);
              adj.entry(*u).or_insert_with(Vec::new);
          }

          for src_idx in nodes {
              let u = src_idx.as_usize();
              if let Some(read_guard) = src_idx.read(god) {
                  for (_ek, dsts) in read_guard.children().iter() {
                      for (dst_idx, _ev) in dsts.iter() {
                          let v = dst_idx.as_usize();
                          if node_set.contains(&v) {
                              // u -> v is an edge in the induced subgraph
                              adj.get_mut(&u).unwrap().push(v);
                              *indeg.entry(v).or_insert(0) += 1;
                          }
                      }
                  }
              }
          }

          // Kahn's algorithm: remove all nodes with indegree 0 iteratively.
          let mut q: VecDeque<usize> = VecDeque::new();
          for (&u, &d) in indeg.iter() {
              if d == 0 {
                  q.push_back(u);
              }
          }

          while let Some(u) = q.pop_front() {
              if let Some(nei) = adj.get_mut(&u) {
                  for &v in nei.iter() {
                      if let Some(d) = indeg.get_mut(&v) {
                          *d -= 1;
                          if *d == 0 {
                              q.push_back(v);
                          }
                      }
                  }
                  nei.clear();
              }
              indeg.remove(&u);
          }

          // Nodes left in indeg are part of (at least one) cycle.
          indeg.keys().cloned().collect()
      }

      pub fn eliminate_pushes_and_pops_path_based(
          roots: &mut BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) {
          // 1. Get all paths from the original graph.
          let all_root_indices: Vec<_> = roots.values().cloned().collect();
          if all_root_indices.is_empty() {
              return;
          }
          let all_paths = IntermediatePrecomputeNode3::get_all_paths_with_cycles(
              god,
              &all_root_indices,
              |_idx, n| n.value.end,
              |ek, _, _| !matches!(ek, IntermediateTrie3EdgeKey::NoOp | IntermediateTrie3EdgeKey::CheckLLM(_)),
              MAX_PATH_LEN,
          );

          // 2. Simplify them.
          let mut simplified_paths = BTreeSet::new();
          for (_root_value, path_edges) in all_paths {
              let edge_keys: Vec<_> = path_edges.into_iter().map(|(ek, _, _)| ek).collect();
              if let Some(new_path) = simplify_path(edge_keys) {
                  simplified_paths.insert(new_path);
              }
          }

          // 3. Clear the graph and rebuild a single trie from all simplified paths.
          god.clear();

          if simplified_paths.is_empty() {
              // If all paths were eliminated, clear the roots.
              roots.clear();
              return;
          }

          // Create a single root for the new trie.
          let has_empty_path = simplified_paths.iter().any(|p| p.is_empty());
          let has_only_empty_path = simplified_paths.len() == 1 && has_empty_path;
          let root_content = if has_only_empty_path {
              IntermediatePrecomputedNodeContents3::leaf()
          } else {
              IntermediatePrecomputedNodeContents3::internal()
          };
          let new_root: IntermediatePrecomputeNode3Index = god.insert(Trie::new(root_content)).into();

          // Preserve the empty path if it exists alongside other non-empty paths by
          // marking the root as an end node as well. Nodes can be both end and have children.
          if has_empty_path {
              if let Some(mut root_w) = new_root.write(god) {
                  root_w.value.end = true;
              }
          }

          let mut node_cache: BTreeMap<Vec<IntermediateTrie3EdgeKey>, IntermediatePrecomputeNode3Index> =
              BTreeMap::new();
          node_cache.insert(vec![], new_root);

          for path in simplified_paths {
              if path.is_empty() {
                  continue; // Handled by root node creation
              }
              let mut current_node_idx = new_root;
              for i in 0..path.len() {
                  let edge = &path[i];
                  let prefix = &path[0..=i];

                  let next_node_idx = *node_cache.entry(prefix.to_vec()).or_insert_with(|| {
                      let is_leaf = i == path.len() - 1;
                      let content = if is_leaf {
                          IntermediatePrecomputedNodeContents3::leaf()
                      } else {
                          IntermediatePrecomputedNodeContents3::internal()
                      };
                      god.insert(Trie::new(content)).into()
                  });

                  god.insert_edge_simple(current_node_idx, next_node_idx, edge.clone(), ());
                  current_node_idx = next_node_idx;
              }
          }

          // 4. Update all roots to point to the new single root.
          for (_, root_idx) in roots.iter_mut() {
              *root_idx = new_root;
          }
      }

      fn assert_no_push_then_pop(
          god: &IntermediateTrie3GodWrapper,
          roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
      ) {
          let all_root_indices: Vec<_> = roots.values().cloned().collect();
          if all_root_indices.is_empty() {
              return;
          }

          let all_nodes = Trie::all_nodes(god, &all_root_indices);

          // Find all nodes that are destinations of a Push edge.
          let mut push_destinations = BTreeSet::new();
          for node_idx in &all_nodes {
              if let Some(guard) = node_idx.read(god) {
                  for (ek, dest_map) in guard.children() {
                      if matches!(ek, IntermediateTrie3EdgeKey::Push(_)) {
                          for (dest_idx, _) in dest_map.iter() {
                              push_destinations.insert(*dest_idx);
                          }
                      }
                  }
              }
          }

          if push_destinations.is_empty() {
              return; // No pushes, so condition holds.
          }

          // Traverse from each push destination and assert no pops are found.
          let mut q: VecDeque<IntermediatePrecomputeNode3Index> = push_destinations.into_iter().collect();
          let mut visited: BTreeSet<IntermediatePrecomputeNode3Index> = q.iter().cloned().collect();

          while let Some(node_idx) = q.pop_front() {
              if let Some(guard) = node_idx.read(god) {
                  for (ek, dest_map) in guard.children() {
                      if matches!(ek, IntermediateTrie3EdgeKey::Pop(_, _)) {
                          // Found a Pop after a Push. This is an error.
                          let final_graph = Trie::pretty_print_arena(god);
                          panic!(
                              "Assertion failed: Found a Pop edge reachable from a Push edge.\n\
                               Node {} has a Pop edge: {:?}.\n\
                               Final graph state:\n{}",
                              node_idx, ek, final_graph
                          );
                      }

                      for (dest_idx, _) in dest_map.iter() {
                          if visited.insert(*dest_idx) {
                              q.push_back(*dest_idx);
                          }
                      }
                  }
              }
          }
      }

      pub fn eliminate_pushes_and_pops(
          roots: &mut BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) {
          if !debug_mismatches_enabled() {
              run_trie_based_elimination(roots, god);
              return;
          }

          // --- DEBUG MODE ---
          // 1. Snapshot original graph
          let old_root_vec: Vec<_> = roots.values().cloned().collect();
          if old_root_vec.is_empty() {
              run_trie_based_elimination(roots, god); // Handle empty case, should do nothing.
              return;
          }

          let (source_god, source_roots_vec, _) = Trie::deep_copy_subtrees(god, &old_root_vec);
          let mut source_roots_map = BTreeMap::new();
          for (sid, r_idx) in roots.keys().zip(source_roots_vec.iter()) {
              source_roots_map.insert(*sid, *r_idx);
          }

          // 2. Compare both implementations
          if check_mismatch(&source_god, &source_roots_map) {
              println!("!!! MISMATCH DETECTED BETWEEN TRIE-BASED AND PATH-BASED ELIMINATION !!!");
              println!("Starting refinement of failing input graph...");

              let (minimal_god, minimal_roots_map) = refine_mismatch(&source_god, &source_roots_map);

              // Rerun on minimal failing input to get the differing outputs for printing
              let (min_trie_paths, _, _) = {
                  let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(
                      &minimal_god,
                      &minimal_roots_map.values().cloned().collect::<Vec<_>>(),
                  );
                  let mut roots_map_copy = BTreeMap::new();
                  for (sid, r_idx) in minimal_roots_map.keys().zip(roots_vec_copy.iter()) {
                      roots_map_copy.insert(*sid, *r_idx);
                  }
                  run_trie_based_elimination(&mut roots_map_copy, &god_copy);
                  (
                      get_normalized_paths(&roots_map_copy, &god_copy),
                      god_copy,
                      roots_map_copy,
                  )
              };

              let (min_path_paths, _, _) = {
                  let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(
                      &minimal_god,
                      &minimal_roots_map.values().cloned().collect::<Vec<_>>(),
                  );
                  let mut roots_map_copy = BTreeMap::new();
                  for (sid, r_idx) in minimal_roots_map.keys().zip(roots_vec_copy.iter()) {
                      roots_map_copy.insert(*sid, *r_idx);
                  }
                  eliminate_pushes_and_pops_path_based(&mut roots_map_copy, &god_copy);
                  (
                      get_normalized_paths(&roots_map_copy, &god_copy),
                      god_copy,
                      roots_map_copy,
                  )
              };

              println!(
                  "\n--- MINIMAL FAILING INPUT (graph) ---\n{}",
                  Trie::pretty_print(&minimal_god, &minimal_roots_map.values().cloned().collect::<Vec<_>>())
              );
              let minimal_input_paths = get_normalized_paths(&minimal_roots_map, &minimal_god);
              println!(
                  "\n--- MINIMAL FAILING INPUT ({} paths) ---",
                  minimal_input_paths.len()
              );
              for (i, path) in minimal_input_paths.iter().enumerate() {
                  println!("  Path {}: {:?}", i, path);
              }

              println!(
                  "\n--- TRIE-BASED OUTPUT ({} paths) ---",
                  min_trie_paths.len()
              );
              for (i, path) in min_trie_paths.iter().enumerate() {
                  println!("  Path {}: {:?}", i, path);
              }
              println!(
                  "\n--- PATH-BASED OUTPUT ({} paths) ---",
                  min_path_paths.len()
              );
              for (i, path) in min_path_paths.iter().enumerate() {
                  println!("  Path {}: {:?}", i, path);
              }

              panic!("Push/Pop elimination mismatch detected. See logs for details.");
          }

          // 5. If no mismatch, run the trie-based version on the actual input `god` to modify it.
          run_trie_based_elimination(roots, god);
      }

      /// Compute the final set of normalized paths from a graph, for comparison.
      fn get_normalized_paths(
          roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) -> BTreeSet<Vec<IntermediateTrie3EdgeKey>> {
          let root_indices: Vec<_> = roots.values().cloned().collect();
          get_normalized_paths_for_vec(&root_indices, god)
      }

      pub(crate) fn get_normalized_paths_for_vec(
          roots: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
      ) -> BTreeSet<Vec<IntermediateTrie3EdgeKey>> {
          IntermediatePrecomputeNode3::get_all_paths_with_cycles(
              god,
              &roots,
              |_idx, n| n.value.end,
              |ek, _, _| !matches!(ek, IntermediateTrie3EdgeKey::NoOp | IntermediateTrie3EdgeKey::CheckLLM(_)),
              MAX_PATH_LEN,
          )
              .into_iter()
              .map(|(_r, p)| normalize_path(p.into_iter().map(|(ek, _, _)| ek).collect()))
              .collect()
      }

      /// Runs both elimination algorithms on a graph and returns true if their outputs differ.
      fn check_mismatch(
          god: &IntermediateTrie3GodWrapper,
          roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
      ) -> bool {
          eprintln!("Checking for mismatch...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          if roots_vec.is_empty() {
              return false;
          }

          let (trie_paths, _, _) = {
              let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(god, &roots_vec);
              let mut roots_map_copy = BTreeMap::new();
              for (sid, r_idx) in roots.keys().zip(roots_vec_copy.iter()) {
                  roots_map_copy.insert(*sid, *r_idx);
              }
              run_trie_based_elimination(&mut roots_map_copy, &god_copy);
              (
                  get_normalized_paths(&roots_map_copy, &god_copy),
                  god_copy,
                  roots_map_copy,
              )
          };

          let (path_paths, _, _) = {
              let (god_copy, roots_vec_copy, _) = Trie::deep_copy_subtrees(god, &roots_vec);
              let mut roots_map_copy = BTreeMap::new();
              for (sid, r_idx) in roots.keys().zip(roots_vec_copy.iter()) {
                  roots_map_copy.insert(*sid, *r_idx);
              }
              eliminate_pushes_and_pops_path_based(&mut roots_map_copy, &god_copy);
              (
                  get_normalized_paths(&roots_map_copy, &god_copy),
                  god_copy,
                  roots_map_copy,
              )
          };

          trie_paths != path_paths
      }

      /// Given a failing graph, iteratively removes edges and roots to find a smaller subgraph that still fails.
      fn refine_mismatch(
          initial_god: &IntermediateTrie3GodWrapper,
          initial_roots: &BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
      ) -> (
          IntermediateTrie3GodWrapper,
          BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
      ) {
          let (mut minimal_god, minimal_roots_vec, old_to_new) = Trie::deep_copy_subtrees(
              initial_god,
              &initial_roots.values().cloned().collect::<Vec<_>>(),
          );
          let mut minimal_roots = BTreeMap::new();
          for (sid, old_root) in initial_roots {
              minimal_roots.insert(*sid, *old_to_new.get(old_root).unwrap());
          }

          let mut changed_in_pass = true;
          while changed_in_pass {
              changed_in_pass = false;

              // --- Pass 1: Try to remove edge groups systematically ---
              let current_roots_vec: Vec<_> = minimal_roots.values().cloned().collect();
              let all_nodes = Trie::all_nodes(&minimal_god, &current_roots_vec);

              let mut all_edge_groups = Vec::new();
              for node_idx in all_nodes {
                  if let Some(node_r) = node_idx.read(&minimal_god) {
                      for ek in node_r.children().keys() {
                          all_edge_groups.push((node_idx, ek.clone()));
                      }
                  }
              }

              for (source_idx, edge_key) in all_edge_groups {
                  let (candidate_god, candidate_roots_vec, old_to_new) =
                      Trie::deep_copy_subtrees(&minimal_god, &current_roots_vec);
                  let mut candidate_roots = BTreeMap::new();
                  for (sid, old_root) in &minimal_roots {
                      candidate_roots.insert(*sid, *old_to_new.get(old_root).unwrap());
                  }

                  let mapped_source_idx = *old_to_new.get(&source_idx).unwrap();

                  if let Some(mut node_w) = mapped_source_idx.write(&candidate_god) {
                      node_w.children_mut().remove(&edge_key);
                  }

                  Trie::gc(&candidate_god, &candidate_roots_vec);

                  if check_mismatch(&candidate_god, &candidate_roots) {
                      minimal_god = candidate_god;
                      minimal_roots = candidate_roots;
                      changed_in_pass = true;
                      let new_size = Trie::all_nodes(
                          &minimal_god,
                          &minimal_roots.values().cloned().collect::<Vec<_>>(),
                      )
                      .len();
                      println!(
                          "... Refined mismatch by removing edge group. New size: {} nodes.",
                          new_size
                      );
                      break; // Restart the whole process with the smaller graph
                  }
              }

              if changed_in_pass {
                  continue; // Restart the while loop
              }

              // --- Pass 2: Try to remove roots (if more than one) ---
              if minimal_roots.len() > 1 {
                  let root_sids_to_try: Vec<_> = minimal_roots.keys().cloned().collect();
                  for sid_to_remove in root_sids_to_try {
                      let mut candidate_roots = minimal_roots.clone();
                      candidate_roots.remove(&sid_to_remove);

                      if candidate_roots.is_empty() {
                          continue;
                      }

                      if check_mismatch(&minimal_god, &candidate_roots) {
                          minimal_roots = candidate_roots;
                          changed_in_pass = true;
                          println!(
                              "... Refined mismatch by removing a root. New root count: {}.",
                              minimal_roots.len()
                          );
                          break; // Restart the while loop
                      }
                  }
              }
          }

          (minimal_god, minimal_roots)
      }

      #[derive(Clone, Debug)]
      enum Exit {
          // Both cancel -> epsilon; we attach a NoOp from the aggregator node to dst.
          Cancel {
              llm: LLMTokenBV,
              dst: IntermediatePrecomputeNode3Index,
          },
          // Remove Push unconditionally and decrement Pop(n>1) -> Pop(n-1).
          DegradePop {
              llm: LLMTokenBV,
              new_n: usize,
              pop_bv: StateIDBV,
              dst: IntermediatePrecomputeNode3Index,
          },
          // Elimination is blocked by a nested Push, or by reaching a leaf with no Pop(n>=1).
          // We must keep the Push with the possibly-restricted bitset.
          BlockedPush {
              llm: LLMTokenBV,
              push_bv: StateIDBV,
              dst: IntermediatePrecomputeNode3Index,
              on_cycle: bool,
          },
      }

      #[derive(Clone, Debug)]
      struct BFSState {
          node: IntermediatePrecomputeNode3Index,
          push_bv: StateIDBV,
          llm_bv: LLMTokenBV,
      }

      fn get_or_create_aggregator_node(
          src: IntermediatePrecomputeNode3Index,
          llm: &LLMTokenBV,
          god: &IntermediateTrie3GodWrapper,
          cache: &mut BTreeMap<LLMTokenBV, IntermediatePrecomputeNode3Index>,
      ) -> IntermediatePrecomputeNode3Index {
          // If no checks to aggregate, the aggregator node is just the source itself.
          if *llm == LLMTokenBV::max_ones() {
              return src;
          }
          if let Some(idx) = cache.get(llm) {
              return *idx;
          }
          let new_node = god
              .insert(Trie::new(IntermediatePrecomputedNodeContents3::internal()))
              .into();
          god.insert_edge_simple(
              src,
              new_node,
              IntermediateTrie3EdgeKey::CheckLLM(llm.clone()),
              (),
          );
          cache.insert(llm.clone(), new_node);
          new_node
      }

      fn compute_push_elim_exits(
          start: IntermediatePrecomputeNode3Index,
          initial_push_bv: &StateIDBV,
          god: &IntermediateTrie3GodWrapper,
          nodes_on_cycle: &BTreeSet<usize>,
      ) -> Vec<Exit> {
          crate::debug!(5,
              "[challenge_elim]   - compute_push_elim_exits(start: {}, initial_push_bv: {:?})",
              start, initial_push_bv
          );
          let mut exits: Vec<Exit> = Vec::new();
          let mut q: VecDeque<BFSState> = VecDeque::new();
          q.push_back(BFSState {
              node: start,
              push_bv: initial_push_bv.clone(),
              llm_bv: LLMTokenBV::max_ones(),
          });

          // We include node, push_bv, llm_bv in visited to avoid infinite exploration across cycles.
          // This is finite because push_bv and llm_bv only ever intersect with finitely many constants.
          let mut visited: BTreeSet<(usize, StateIDBV, LLMTokenBV)> = BTreeSet::new();
          // Safety guard (should not normally trigger thanks to visited)
          let mut steps: usize = 0;
          let max_steps: usize = 1_000_000;

          while let Some(state) = q.pop_front() {
              steps += 1;
              if steps % 10_000 == 0 {
                  crate::debug!(5,
                      "[challenge_elim]   - BFS progress: {} states explored (q_len: {}, visited: {}, exits: {}), guard {}",
                      steps, q.len(), visited.len(), exits.len(), max_steps
                  );
              }
              if steps > max_steps {
                  crate::debug!(5, "[challenge_elim] Warning: BFS step guard hit while eliminating a Push; breaking exploration to avoid non-termination.");
                  break;
              }

              let key = (state.node.as_usize(), state.push_bv.clone(), state.llm_bv.clone());
              if !visited.insert(key) {
                  if steps < 100 { // Log first few skips
                       crate::debug!(5, "[challenge_elim]     - BFS skip visited state: node {}, push_bv {:?}, llm_bv {:?}", state.node, state.push_bv, state.llm_bv);
                  }
                  continue;
              }
              if steps < 100 { // Log first few processed
                  crate::debug!(5, "[challenge_elim]     - BFS processing state: node {}, push_bv {:?}, llm_bv {:?}", state.node, state.push_bv, state.llm_bv);
              }

              // If this node is an end, then along this branch we can only preserve the Push (blocked).
              if let Some(read_guard) = state.node.read(god) {
                  if read_guard.value.end {
                      if steps < 100 {
                          crate::debug!(5, "[challenge_elim]       - Found end node, creating BlockedPush exit.");
                      }
                      exits.push(Exit::BlockedPush {
                          llm: state.llm_bv.clone(),
                          push_bv: state.push_bv.clone(),
                          dst: state.node,
                          on_cycle: nodes_on_cycle.contains(&state.node.as_usize()),
                      });
                      // Do not explore past an end marker; treat as terminal for this branch
                      continue;
                  }
                  // Explore outgoing edges
                  for (ek, dsts) in read_guard.children().iter() {
                      if steps < 100 {
                          crate::debug!(5, "[challenge_elim]       - Exploring edge {:?} to {} dests", ek, dsts.len());
                      }
                      match ek {
                          IntermediateTrie3EdgeKey::NoOp => {
                              for (dst_idx, _ev) in dsts.iter() {
                                  if steps < 100 {
                                      crate::debug!(5, "[challenge_elim]         - Enqueueing NoOp -> {}", dst_idx);
                                  }
                                  q.push_back(BFSState {
                                      node: *dst_idx,
                                      push_bv: state.push_bv.clone(),
                                      llm_bv: state.llm_bv.clone(),
                                  });
                              }
                          }
                          IntermediateTrie3EdgeKey::CheckLLM(llm2) => {
                              let mut next_llm = state.llm_bv.clone();
                              // Aggregate checks by intersection; do not prune on emptiness:
                              // normalize_path keeps empty intersections too.
                              next_llm &= llm2.clone();
                              for (dst_idx, _ev) in dsts.iter() {
                                  if steps < 100 {
                                      crate::debug!(5, "[challenge_elim]         - Enqueueing CheckLLM -> {} with new llm_bv", dst_idx);
                                  }
                                  q.push_back(BFSState {
                                      node: *dst_idx,
                                      push_bv: state.push_bv.clone(),
                                      llm_bv: next_llm.clone(),
                                  });
                              }
                          }
                          IntermediateTrie3EdgeKey::Push(_nested) => {
                              // Blocked by a nested push: keep our (possibly intersected) push
                              // anchored at the current node (after any aggregated CheckLLM),
                              // and do not traverse past the nested push for this elimination.
                              //
                              // Important: We DO NOT move the push forward to the nested push's
                              // destination. That would violate the stack semantics used by the
                              // path-based simplifier (which blocks when encountering another push).
                              if steps < 100 {
                                  crate::debug!(5, "[challenge_elim]       - Blocked by nested push. Creating BlockedPush exit.");
                              }
                              exits.push(Exit::BlockedPush {
                                  llm: state.llm_bv.clone(),
                                  push_bv: state.push_bv.clone(),
                                  dst: state.node,
                                  on_cycle: nodes_on_cycle.contains(&state.node.as_usize()),
                              });
                              // Do not traverse past a nested push for this elimination.
                          }
                          IntermediateTrie3EdgeKey::Pop(n, pop_bv) => {
                              let n_val = *n;
                              for (dst_idx, _ev) in dsts.iter() {
                                  match n_val {
                                      0 => {
                                          // Fold into push: A := A ∩ B; prune branch if disjoint.
                                          if state.push_bv.is_disjoint(pop_bv) {
                                              if steps < 100 {
                                                  crate::debug!(5, "[challenge_elim]         - Pruning Pop(0) branch due to disjoint BVs.");
                                              }
                                              // Invalid on this branch
                                              continue;
                                          }
                                          let mut next_push = state.push_bv.clone();
                                          next_push &= pop_bv.clone();
                                          if steps < 100 {
                                              crate::debug!(5, "[challenge_elim]         - Enqueueing Pop(0) -> {} with restricted push_bv", dst_idx);
                                          }
                                          q.push_back(BFSState {
                                              node: *dst_idx,
                                              push_bv: next_push,
                                              llm_bv: state.llm_bv.clone(),
                                          });
                                      }
                                      1 => {
                                          // Cancel if intersect; else branch invalid
                                          if state.push_bv.is_disjoint(pop_bv) {
                                              if steps < 100 {
                                                  crate::debug!(5, "[challenge_elim]         - Pruning Pop(1) branch due to disjoint BVs.");
                                              }
                                              continue;
                                          }
                                          if steps < 100 {
                                              crate::debug!(5, "[challenge_elim]       - Found Pop(1). Creating Cancel exit to {}.", dst_idx);
                                          }
                                          exits.push(Exit::Cancel {
                                              llm: state.llm_bv.clone(),
                                              dst: *dst_idx,
                                          });
                                          // Do not explore past a Pop(1) for this elimination.
                                      }
                                      _ => {
                                          // Remove Push and decrement Pop.
                                          if steps < 100 {
                                              crate::debug!(5, "[challenge_elim]       - Found Pop(>1). Creating DegradePop exit to {}.", dst_idx);
                                          }
                                          exits.push(Exit::DegradePop {
                                              llm: state.llm_bv.clone(),
                                              new_n: n_val - 1,
                                              pop_bv: pop_bv.clone(),
                                              dst: *dst_idx,
                                          });
                                          // Do not explore past a Pop(n>1) for this elimination.
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }

          exits
      }

      fn remove_specific_edge(
          god: &IntermediateTrie3GodWrapper,
          src: IntermediatePrecomputeNode3Index,
          key: IntermediateTrie3EdgeKey,
          dst: IntermediatePrecomputeNode3Index,
      ) -> bool {
          if let Some(mut guard) = src.write(god) {
              let children = guard.children_mut();
              match children.entry(key) {
                  Entry::Occupied(mut occ) => {
                      let map = occ.get_mut();
                      let removed = map.remove(&dst).is_some();
                      if map.is_empty() {
                          occ.remove();
                      }
                      return removed;
                  }
                  Entry::Vacant(_) => {}
              }
          }
          false
      }

      /// Returns true if `node` has an immediate Pop(1, B) edge such that B intersects `push_bv`.
      /// In such a case, keeping a BlockedPush rewiring to `node` would leave a Pop reachable
      /// from a Push, which violates the post-elimination invariant. We must favor Cancel instead.
      fn node_has_immediate_matching_pop(
          god: &IntermediateTrie3GodWrapper,
          node: IntermediatePrecomputeNode3Index,
          push_bv: &StateIDBV,
      ) -> bool {
          if let Some(r) = node.read(god) {
              for (ek, _dsts) in r.children() {
                  if let IntermediateTrie3EdgeKey::Pop(n, pop_bv) = ek {
                      if *n == 1 && !push_bv.is_disjoint(pop_bv) { return true; }
                  }
              }
          }
          false
      }
      /// Traverses the graph from the roots along non-Push edges and removes any Pop edges found.
      /// Such pops would occur on an empty stack and are therefore invalid. Returns the number of
      /// individual edges removed.
      fn prune_leading_pops(
          god: &IntermediateTrie3GodWrapper,
          roots: &[IntermediatePrecomputeNode3Index],
      ) -> usize {
          let mut q: VecDeque<IntermediatePrecomputeNode3Index> = roots.iter().cloned().collect();
          let mut visited: BTreeSet<IntermediatePrecomputeNode3Index> = roots.iter().cloned().collect();
          let mut edges_to_remove = vec![];

          let mut head = 0;
          while head < q.len() {
              let u = q[head];
              head += 1;

              if let Some(guard) = u.read(god) {
                  for (ek, dsts) in guard.children() {
                      if let IntermediateTrie3EdgeKey::Pop(_, _) = ek {
                          for (v, _) in dsts {
                              edges_to_remove.push((u, ek.clone(), *v));
                          }
                      } else if !matches!(ek, IntermediateTrie3EdgeKey::Push(_)) {
                          for (v, _) in dsts {
                              if visited.insert(*v) {
                                  q.push_back(*v);
                              }
                          }
                      }
                  }
              }
          }

          let mut num_removed = 0;
          for (u, ek, v) in edges_to_remove {
              if remove_specific_edge(god, u, ek, v) {
                  num_removed += 1;
              }
          }
          num_removed
      }

      fn run_trie_based_elimination(
          roots: &mut BTreeMap<TokenizerStateID, IntermediatePrecomputeNode3Index>,
          god: &IntermediateTrie3GodWrapper,
      ) {
          // Fixpoint elimination. We never exit early; we iterate until a whole round removes none.
          let root_indices: Vec<_> = roots.values().cloned().collect();
          if root_indices.is_empty() {
              return;
          }

          // Track all gate nodes we create to avoid reprocessing already-gated pushes in later rounds.
          let mut cyclic_gate_nodes: BTreeSet<usize> = BTreeSet::new();

          let mut round: usize = 0;
          loop {
              round += 1;
              // Collect all reachable nodes for this round.
              let nodes = Trie::all_nodes(god, &root_indices);
              let nodes_on_cycle = nodes_in_cycles_subgraph(god, &nodes);
              // Collect all push edges in the current snapshot.
              let mut push_edges: Vec<(IntermediatePrecomputeNode3Index, StateIDBV, IntermediatePrecomputeNode3Index)> =
                  Vec::new();
              for src in &nodes {
                  if let Some(read_guard) = src.read(god) {
                      for (ek, dsts) in read_guard.children().iter() {
                          if let IntermediateTrie3EdgeKey::Push(bv) = ek {
                              for (dst_idx, _ev) in dsts.iter() {
                                  // Skip pushes that already point to a gate node; those are "stable"
                                  // under our gate compression and should not be reprocessed.
                                  if !cyclic_gate_nodes.contains(&dst_idx.as_usize()) {
                                      push_edges.push((*src, bv.clone(), *dst_idx));
                                  }
                              }
                          }
                      }
                  }
              }

              eprintln!(
                  "[challenge_elim] Round {}: attempting to eliminate {} push edge(s).",
                  round,
                  push_edges.len()
              );
              // Simple progress bar: print at 10% increments
              let total = push_edges.len().max(1);
              let mut processed = 0usize;
              let mut next_mark = 10usize;

              // For each src, memoize aggregator nodes by LLM BV to avoid node blowup.
              let mut per_src_agg_cache: BTreeMap<
                  IntermediatePrecomputeNode3Index,
                  BTreeMap<LLMTokenBV, IntermediatePrecomputeNode3Index>,
              > = BTreeMap::new();

              // For cyclic blocked exits, compress many push fanouts into a single push to a "gate" node,
              // then from the gate emit NoOps to each blocked node. This drastically reduces the number
              // of new Push edges without changing path semantics.
              let mut per_src_cyclic_gate_cache: BTreeMap<
                  IntermediatePrecomputeNode3Index,
                  BTreeMap<(LLMTokenBV, StateIDBV, usize), IntermediatePrecomputeNode3Index>,
              > = BTreeMap::new();

              // Cache exits per (dst, push_bv) to avoid repeated BFS work in this round.
              let mut exit_cache: BTreeMap<(usize, StateIDBV), Vec<Exit>> = BTreeMap::new();

              let mut pushes_rewired_this_round: usize = 0;

              for (src, push_bv, dst) in push_edges {
                  // Safety: if this push already points to a known gate, skip it entirely.
                  // Gate pushes are intentionally terminal (compressed) and should not be reprocessed,
                  // otherwise we risk oscillation or infinite rounds.
                  if cyclic_gate_nodes.contains(&dst.as_usize()) {
                      continue;
                  }

                  processed += 1;
                  let pct = (processed * 100) / total;
                  if pct >= next_mark {
                      eprintln!(
                          "[challenge_elim] Round {} progress: {}/{} ({}%)",
                          round, processed, total, pct
                      );
                      next_mark += 10;
                  }
                  crate::debug!(5, "[challenge_elim]  - Processing push edge {} --Push({:?})--> {}", src, push_bv, dst);

                  // Compute or reuse exits for this (dst, push_bv)
                  let exits = match exit_cache.get(&(dst.as_usize(), push_bv.clone())) {
                      Some(v) => {
                          crate::debug!(5, "[challenge_elim]    - Reusing {} exits from cache for (dst {}, push_bv {:?})", v.len(), dst, push_bv);
                          v.clone()
                      },
                      None => {
                          crate::debug!(5, "[challenge_elim]    - Computing exits for (dst {}, push_bv {:?})", dst, push_bv);
                          // BFS exploration to compute exits for (dst, push_bv)
                          // Results are memoized per round to avoid repetition.
                          let e = compute_push_elim_exits(dst, &push_bv, god, &nodes_on_cycle);
                          crate::debug!(5, "[challenge_elim]    - Found {} exits.", e.len());
                          exit_cache.insert((dst.as_usize(), push_bv.clone()), e.clone());
                          e
                      }
                  };
                  // Deduplicate exits and detect any blocked branches.
                  if exits.is_empty() {
                      crate::debug!(5, "[challenge_elim]    - No exits found. Removing original push edge.");
                      // No viable continuations were found for this push under the stack semantics
                      // (e.g., every branch mismatched). This path is dead; remove the original push.
                      if remove_specific_edge(
                          god,
                          src,
                          IntermediateTrie3EdgeKey::Push(push_bv.clone()),
                          dst,
                      ) {
                          pushes_rewired_this_round += 1;
                      }
                      continue;
                  }

                  // Check for stability. A push is stable if all its exits are BlockedPush and they
                  // represent no-op transformations (i.e., same destination, same push bitvector, no LLM checks).
                  let mut is_stable = true;
                  for ex in &exits {
                      if let Exit::BlockedPush { llm, push_bv: exit_push_bv, dst: exit_dst, .. } = ex {
                          if *llm != LLMTokenBV::max_ones() || *exit_dst != dst || *exit_push_bv != push_bv {
                              is_stable = false;
                              break;
                          }
                      } else {
                          is_stable = false;
                          break;
                      }
                  }

                  if is_stable {
                      crate::debug!(5, "[challenge_elim]    - Push edge is stable, no changes made.");
                      continue;
                  }

                  // If not stable, rewire all exits and remove the original edge.
                  // Policy:
                  // - Always rewire Cancel/Degrade.
                  // - Partition BlockedPush into acyclic vs cyclic, but rewire BOTH kinds to ensure
                  //   no Pop edges remain reachable from any Push (even through cycles).
                  let llm_agg_cache = per_src_agg_cache
                      .entry(src)
                      .or_insert_with(BTreeMap::new);

                  // Deduplicate exits before wiring.
                  let mut cancel_set = BTreeSet::new();
                  let mut degrade_set = BTreeSet::new();
                  let mut blocked_acyclic_set = BTreeSet::new();
                  let mut blocked_cyclic_set = BTreeSet::new();
                  for ex in exits.iter() {
                      match ex {
                          Exit::Cancel { llm, dst } => {
                              cancel_set.insert((llm.clone(), *dst));
                          }
                          Exit::DegradePop { llm, new_n, pop_bv, dst } => {
                              degrade_set.insert((llm.clone(), *new_n, pop_bv.clone(), *dst));
                          }
                          Exit::BlockedPush { llm, push_bv: exit_push_bv, dst, on_cycle } => {
                              if *on_cycle {
                                  blocked_cyclic_set.insert((llm.clone(), exit_push_bv.clone(), *dst));
                              } else {
                                  blocked_acyclic_set.insert((llm.clone(), exit_push_bv.clone(), *dst));
                              }
                          }
                      }
                  }

                  // Suppress BlockedPush exits that would wire a Push to a node which can immediately
                  // cancel it via Pop(1, B) with intersecting bitsets. Keeping such a push would leave
                  // a Pop reachable from a Push, violating the invariant.
                  let blocked_acyclic_set: BTreeSet<_> = blocked_acyclic_set
                      .into_iter()
                      .filter(|(_llm, exit_push_bv, exit_dst)| !node_has_immediate_matching_pop(god, *exit_dst, exit_push_bv))
                      .collect();
                  let blocked_cyclic_set: BTreeSet<_> = blocked_cyclic_set
                      .into_iter()
                      .filter(|(_llm, exit_push_bv, exit_dst)| !node_has_immediate_matching_pop(god, *exit_dst, exit_push_bv))
                      .collect();

                  for (llm, cancel_dst) in cancel_set {
                      crate::debug!(5, "[challenge_elim]    - Applying Cancel exit to {} via LLM {:?}", cancel_dst, llm);
                      let agg = get_or_create_aggregator_node(src, &llm, god, llm_agg_cache);
                      god.insert_edge_simple(agg, cancel_dst, IntermediateTrie3EdgeKey::NoOp, ());
                  }
                  for (llm, new_n, pop_bv, degrade_dst) in degrade_set {
                      crate::debug!(5, "[challenge_elim]    - Applying DegradePop exit to {} via LLM {:?}", degrade_dst, llm);
                      let agg = get_or_create_aggregator_node(src, &llm, god, llm_agg_cache);
                      god.insert_edge_simple(
                          agg,
                          degrade_dst,
                          IntermediateTrie3EdgeKey::Pop(new_n, pop_bv),
                          (),
                      );
                  }

                  // Rewire BlockedPush exits:
                  // - Acyclic: keep as before (direct Push to each exit).
                  // - Cyclic: compress many exits into a single Push to a "gate" node,
                  //           with NoOp edges from the gate to each exit.
                  //
                  // This avoids exploding the number of Push edges in cycles while preserving
                  // exact path semantics (gate -> NoOp -> exit normalizes to the original rewiring).
                  for (llm, exit_push_bv, exit_dst) in blocked_acyclic_set {
                      crate::debug!(5,
                          "[challenge_elim]      - Rewiring BlockedPush (acyclic) to {}, push_bv: {:?}, llm: {:?}",
                          exit_dst, exit_push_bv, llm
                      );
                      let agg = get_or_create_aggregator_node(src, &llm, god, llm_agg_cache);
                      god.insert_edge_simple(
                          agg,
                          exit_dst,
                          IntermediateTrie3EdgeKey::Push(exit_push_bv.clone()),
                          (),
                      );
                  }
                  if !blocked_cyclic_set.is_empty() {
                      // Group cyclic blocked exits by (llm, push_bv) to create exactly one Push per group.
                      use std::collections::BTreeMap as BBTreeMap;
                      let mut grouped: BBTreeMap<(LLMTokenBV, StateIDBV), Vec<IntermediatePrecomputeNode3Index>> = BBTreeMap::new();
                      for (llm, exit_push_bv, exit_dst) in blocked_cyclic_set {
                          grouped.entry((llm.clone(), exit_push_bv.clone()))
                              .or_insert_with(Vec::new)
                              .push(exit_dst);
                      }
                      for ((llm, exit_push_bv), exits) in grouped {
                          crate::debug!(5,
                              "[challenge_elim]      - Rewiring BlockedPush (cyclic, grouped) for llm: {:?}, push_bv: {:?} with {} exits",
                              llm, exit_push_bv, exits.len()
                          );
                          let agg = get_or_create_aggregator_node(src, &llm, god, llm_agg_cache);

                          // Get or create a gate node per (src, llm, push_bv, original-dst).
                          // original-dst is the 'dst' variable from the push edge we are processing.
                          let gate_cache = per_src_cyclic_gate_cache
                              .entry(src)
                              .or_insert_with(BTreeMap::new);
                          let gate_key = (llm.clone(), exit_push_bv.clone(), dst.as_usize());
                          let gate = match gate_cache.get(&gate_key) {
                              Some(idx) => *idx,
                              None => {
                                  let g: IntermediatePrecomputeNode3Index = god
                                      .insert(Trie::new(IntermediatePrecomputedNodeContents3::internal()))
                                      // Gate node: record it so we never reprocess pushes to it.
                                      .into();
                                  gate_cache.insert(gate_key.clone(), g);
                                  g
                              }
                          };

                          // Ensure the Push from aggregator to the gate exists (single Push per group).
                          // Also ensure the gate is recorded globally for future rounds.
                          cyclic_gate_nodes.insert(gate.as_usize());

                          god.insert_edge_simple(
                              agg,
                              gate,
                              IntermediateTrie3EdgeKey::Push(exit_push_bv.clone()),
                              (),
                          );

                          // From the gate, add NoOp fanout to each blocked cyclic exit.
                          // normalize_path will remove these NoOps; this is purely structural.
                          for exit_dst in exits {
                              god.insert_edge_simple(
                                  gate,
                                  exit_dst,
                                  IntermediateTrie3EdgeKey::NoOp,
                                  (),
                              );
                          }
                      }
                  }
                  // Remove the original push edge; rewriting is complete.
                  crate::debug!(5,
                      "[challenge_elim]    - Decision: Rewiring complete. Removing original edge {} --Push({:?})--> {}",
                      src, push_bv.clone(), dst
                  );
                  if remove_specific_edge(
                      god,
                      src,
                      IntermediateTrie3EdgeKey::Push(push_bv.clone()),
                      dst,
                  ) {
                      pushes_rewired_this_round += 1;
                  }
              }

              // After rewiring pushes, prune any newly-exposed invalid pops.
              // NOTE: Disabled because leading pops are NOT invalid according to the ground truth
              // simplify_path. Despite the naming, these Push/Pop operations are not traditional
              // stack operations, and a Pop without a preceding Push is allowed.
              let pops_pruned_this_round = 0; // prune_leading_pops(god, &root_indices);
              
              let removed_this_round = pushes_rewired_this_round + pops_pruned_this_round;

              eprintln!(
                  "[challenge_elim] Round {}: rewired {} push edge(s), pruned {} pop edge(s).",
                  round, pushes_rewired_this_round, pops_pruned_this_round
              );

              Trie::gc(god, &root_indices);

              if removed_this_round == 0 {
                  // Fixpoint reached: no more eliminations possible.
                  break;
              }
          }

          // Optional: recompute depths for diagnostics or downstream heuristics.
          Trie::recompute_all_max_depths(god, &root_indices);

          assert_no_push_then_pop(god, roots);
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::datastructures::trie::Trie2Index;

          fn run_test(
              input_god: &IntermediateTrie3GodWrapper,
              input_roots: &[IntermediatePrecomputeNode3Index],
          ) {
              // NOTE: This test harness works by comparing the set of all paths from root to leaf
              // before and after simplification. The `get_all_paths` helper function stops traversing
              // when it detects a cycle to avoid infinite loops. Therefore, this harness cannot
              // validate simplifications that occur *within* a cycle. A true trie-based
              // elimination algorithm would need a different testing strategy for cyclic graphs.

              // 1. Run new trie-based elimination (which currently calls the path-based one)
              let (eliminated_god, eliminated_roots, _) =
                  Trie::deep_copy_subtrees(input_god, input_roots);
              let mut eliminated_roots_map = BTreeMap::new();
              for (i, r) in eliminated_roots.iter().enumerate() {
                  eliminated_roots_map.insert(TokenizerStateID(i), *r); // Use dummy TokenizerStateID
              }
              eliminate_pushes_and_pops(&mut eliminated_roots_map, &eliminated_god);

              // 2. Flatten result to paths
              let final_roots_from_trie_elim: Vec<_> = eliminated_roots_map.values().cloned().collect();
              let paths_from_trie_elim: BTreeSet<_> = IntermediatePrecomputeNode3::get_all_paths_with_cycles(
                  &eliminated_god,
                  &final_roots_from_trie_elim,
                  |_idx, n| n.value.end,
                  |ek, _, _| !matches!(ek, IntermediateTrie3EdgeKey::NoOp | IntermediateTrie3EdgeKey::CheckLLM(_)),
                  MAX_PATH_LEN,
              )
              .into_iter()
              .map(|(_r, p)| normalize_path(p.into_iter().map(|(ek, _, _)| ek).collect()))
              .collect();

              // 3. Run old path-based elimination directly
              let initial_paths = IntermediatePrecomputeNode3::get_all_paths_with_cycles(
                  input_god,
                  input_roots,
                  |_idx, node| node.value.end,
                  |ek, _, _| !matches!(ek, IntermediateTrie3EdgeKey::NoOp | IntermediateTrie3EdgeKey::CheckLLM(_)),
                  MAX_PATH_LEN,
              );
              let mut paths_from_path_elim = BTreeSet::new();
              for (_root_value, path_edges) in initial_paths {
                  let edge_keys: Vec<_> = path_edges.into_iter().map(|(ek, _, _)| ek).collect();
                  if let Some(new_path) = simplify_path(edge_keys) {
                      paths_from_path_elim.insert(normalize_path(new_path));
                  }
              }

              // 4. Compare
              if paths_from_trie_elim != paths_from_path_elim {
                  eprintln!("\n--- MISMATCH DETECTED IN TEST ---");
                  eprintln!("EXPECTED (path-based):");
                  for path in &paths_from_path_elim {
                      eprintln!("  {:?}", path);
                  }
                  eprintln!("\nACTUAL (trie-based):");
                  for path in &paths_from_trie_elim {
                      eprintln!("  {:?}", path);
                  }
                  eprintln!("---------------------------------\n");
              }
              assert_eq!(paths_from_trie_elim, paths_from_path_elim);
          }

          #[test]
          fn test_simple_cancel() {
              let god = IntermediateTrie3GodWrapper::new();
              let root =
                  Trie2Index::from(god.insert(Trie::new(IntermediatePrecomputedNodeContents3::internal())));
              let v1 =
                  Trie2Index::from(god.insert(Trie::new(IntermediatePrecomputedNodeContents3::internal())));
              let end =
                  Trie2Index::from(god.insert(Trie::new(IntermediatePrecomputedNodeContents3::leaf())));

              let mut bv = StateIDBV::zeros();
              bv.insert(1);

              root.write(&god)
                  .unwrap()
                  .force_insert_to_node(IntermediateTrie3EdgeKey::Push(bv.clone()), (), v1);
              v1.write(&god)
                  .unwrap()
                  .force_insert_to_node(IntermediateTrie3EdgeKey::Pop(1, bv), (), end);

              run_test(&god, &[root]);
          }

          #[test]
          fn test_mismatch_invalidates_path() {
