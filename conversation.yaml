              }
          }
          pub fn new_with_predecessors(value: T, predecessors: Vec<Arc<GSSNode<T>>>) -> Self {
              Self {
                  value,
                  predecessors: predecessors.into_iter().map(ArcPtrWrapper::new).collect(),
