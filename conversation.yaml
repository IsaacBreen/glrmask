              let source_nm: TestNodeEI = Arc::new(Mutex::new(TestTrieEI::new("source_nm".to_string())));
              let child1_nm: TestNodeEI = Arc::new(Mutex::new(TestTrieEI::new("child1_nm".to_string())));
