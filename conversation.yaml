  - user: |-
      A trie is an abstract way of representing a set of stacks.
      We can convert a trie into a set of raw stacks (a set of vectors of the edge items) using `Trie::get_all_paths`.
      Tries can be a very efficient representation.

      Often, when we want to apply a transformation to a trie, that transformation is much easier to think about when we're thinking in terms of raw stacks.
      A single operation applied to one stack, applied independently to all stacks.
      But often we want a trie-native version of such a transformation; while we could convert to raw stacks, apply the operation, and convert back again, this would be extremely inefficient.


      This code has a testing framework for that lets us take an operation that works on a trie, and a reference version that works on a single stack, and an input trie, and ensures that the trie version of the operation is functionally the same as the reference version in that it produces the same set of stacks when the result is flattened.
      I want to generalize this framework. I'll be developing other transformations, and I want to be able to test them succinctly.

      Write it to `src/trie_test_framework.rs`.
