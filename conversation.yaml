              while let Some(node) = q.pop_front() {
                  if !visited.insert(Arc::as_ptr(&node)) { continue; }
                  if node.is_root() { leaves.push(node.clone()); }
                  for p in node.predecessors().values().flat_map(|m| m.values()).flatten() {
