      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benchmarks.sh
      #
      # A script to automate running benchmarks for multiple grammar constraint models,
      # comparing them against a reference implementation, and generating analysis plots.
      #
      # This script should be run from the `python` directory.
      #
      # Usage:
      #   ./run_benchmarks.sh <reference_model.py> <competitor1.py> [competitor2.py ...]
      #
      # Example:
      #   ./run_benchmarks.sh aug25/precompute2_model.py aug25/precompute3_model.py
      #
      # Environment Variables:
      #   CONSTRAINT_FILE: Path to the pre-compiled .json.gz constraint file.
      #                    (Default: ../.cache/test_vocabs/js_grammar_constraint.json.gz)
      #   CODE_FILE:    Path to the code file to use as input.
      #                 (Default: ../src/example_code.js)
      # ==============================================================================

      # --- Configuration ---
      # Use environment variables if set, otherwise use defaults.
      : "${CONSTRAINT_FILE:="../.cache/test_vocabs/js_grammar_constraint.json.gz"}"
      : "${CODE_FILE:="../src/example_code.js"}"

      # --- Argument Validation ---
      if [ "$#" -lt 2 ]; then
          echo "Usage: $0 <reference_model.py> <competitor1.py> [competitor2.py ...]"
          echo "Error: At least two arguments are required: a reference model and one competitor model."
          exit 1
      fi

      REFERENCE_MODEL="$1"
      shift
      COMPETITORS=("$@")

      # Check that all provided files exist
      for file in "$REFERENCE_MODEL" "${COMPETITORS[@]}"; do
          if [ ! -f "$file" ]; then
              echo "Error: Model file not found: $file"
              exit 1
          fi
      done
      if [ ! -f "$CONSTRAINT_FILE" ]; then
          echo "Error: Constraint file not found: $CONSTRAINT_FILE"
          exit 1
      fi
      if [ ! -f "$CODE_FILE" ]; then
          echo "Error: Code file not found: $CODE_FILE"
          exit 1
      fi


      # --- Setup ---
      # Create a unique directory for this benchmark run's results.
      RESULTS_DIR="benchmark_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Reference Model: $REFERENCE_MODEL"
      echo "Competitors: ${COMPETITORS[*]}"
      echo "Constraint File: $CONSTRAINT_FILE"
      echo "Code: $CODE_FILE"
      echo "---"


      # --- Run Benchmarks ---
      echo "Starting benchmark runs..."
      for competitor in "${COMPETITORS[@]}"; do
          echo
          echo ">>> Running benchmark for: $(basename "$competitor")"
          python -m aug25.benchmark_runner \
              --code "$CODE_FILE" \
              --constraint-file "$CONSTRAINT_FILE" \
              --reference "$REFERENCE_MODEL" \
              --competitor "$competitor" \
              --output "$RESULTS_DIR"
          echo ">>> Finished benchmark for: $(basename "$competitor")"
      done
      echo
      echo "All benchmark runs completed."
      echo "---"


      # --- Analyze Results ---
      echo "Analyzing results and generating plots..."
      PLOTS_DIR="${RESULTS_DIR}/analysis"
      python -m aug25.benchmark_analyzer \
          "${RESULTS_DIR}"/*.json \
          --output-dir "$PLOTS_DIR"

      echo
      echo "---"
      echo "Benchmark analysis complete."
      echo "Summary printed above. Plots are saved in: $PLOTS_DIR"
      echo "Full JSON results are in: $RESULTS_DIR"
    python/sitecustomize.py: |
      """
      sitecustomize.py

      Compatibility shims for environments where GrammarConstraint lacks
      from_json_file_gz (and/or from_json_file). We implement these as thin wrappers
      around from_json_string, reading the file (gzipped or plain) into a string.

      Python auto-imports 'sitecustomize' on startup if it's importable from sys.path.
      Since the benchmarks run from the 'python' directory, this file will be picked up.
      """
      from __future__ import annotations

      import builtins as _builtins
      import gzip as _gzip
      import sys as _sys
      from typing import Any


      def _gc_from_json_file_gz(cls: type, path: str):
          """Fallback implementation: load gzipped JSON and delegate to from_json_string."""
          with _gzip.open(path, "rt", encoding="utf-8") as f:
              s = f.read()
          return cls.from_json_string(s)


      def _gc_from_json_file(cls: type, path: str):
          """Fallback implementation: load plain JSON and delegate to from_json_string."""
          with open(path, "rt", encoding="utf-8") as f:
              s = f.read()
          return cls.from_json_string(s)


      def _patch_gc_if_present() -> Any:
          """
          If builtins.GrammarConstraint is present and missing expected helpers,
          add them by delegating to from_json_string.
          """
          GC = getattr(_builtins, "GrammarConstraint", None)
          if GC is not None and isinstance(GC, type):
              if hasattr(GC, "from_json_string"):
                  if not hasattr(GC, "from_json_file_gz"):
                      GC.from_json_file_gz = classmethod(_gc_from_json_file_gz)  # type: ignore[attr-defined]
                  if not hasattr(GC, "from_json_file"):
                      GC.from_json_file = classmethod(_gc_from_json_file)  # type: ignore[attr-defined]
          return GC


      def _patch_in_module(mod: Any) -> None:
          """
          If a module exposes a class named GrammarConstraint, patch it similarly.
          This helps if the type isn't placed in builtins but is available via some module.
          """
          try:
              GC = getattr(mod, "GrammarConstraint", None)
          except Exception:
              GC = None
          if isinstance(GC, type) and hasattr(GC, "from_json_string"):
              if not hasattr(GC, "from_json_file_gz"):
                  GC.from_json_file_gz = classmethod(_gc_from_json_file_gz)  # type: ignore[attr-defined]
              if not hasattr(GC, "from_json_file"):
                  GC.from_json_file = classmethod(_gc_from_json_file)  # type: ignore[attr-defined]


      # Attempt to patch immediately in case GrammarConstraint is already present.
      _patch_gc_if_present()


      # Wrap __import__ so that if GrammarConstraint appears later during imports,
      # we patch it seamlessly without altering user code.
      _orig_import = _builtins.__import__


      def _patched_import(name, globals=None, locals=None, fromlist=(), level=0):
          mod = _orig_import(name, globals, locals, fromlist, level)
          try:
              # Try patching a builtins-exposed GC (if it appears later).
              _patch_gc_if_present()

              # Patch GC if exposed by the returned module.
              _patch_in_module(mod)

              # If 'from x import y' was used, also patch those attributes if modules/classes.
              if fromlist:
                  for sub in fromlist:
                      try:
                          attr = getattr(mod, sub, None)
                      except Exception:
                          attr = None
                      if attr is not None:
                          _patch_in_module(attr)
          except Exception:
              # Never disrupt import process on failure.
              pass
          return mod


      if not getattr(_builtins, "_gc_import_patched", False):
          _builtins.__import__ = _patched_import
          _builtins._gc_import_patched = True
