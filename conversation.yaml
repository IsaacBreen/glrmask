      # --- Argument Validation ---
      if [ ! -f "$MODEL_FILE" ]; then
          echo "Error: Model file not found: $MODEL_FILE"
          exit 1
      fi
      if [ ! -f "$CONSTRAINT_FILE" ]; then
          echo "Error: Constraint file not found: $CONSTRAINT_FILE"
          exit 1
