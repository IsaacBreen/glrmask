             ```rust
             fn prune_disallowed_terminals_gss(
                 gss: &LeveledGSS<ParseStateEdgeContent, Acc>,
                 matched_terminals: &BTreeMap<TokenizerStateID, TerminalBV>,
             ) -> LeveledGSS<ParseStateEdgeContent, Acc> {
                 gss.apply_and_prune(|acc| {
                     for (sid, bv) in matched_terminals {
                         let allowed = acc.terminals_union.get_l2_bitset(sid.0)
                             .unwrap_or(&HybridBitset::max_ones());
                         if !bv.is_subset(allowed) {
                             return None;
                         }
                     }
                     Some(acc.clone())
                 })
             }
