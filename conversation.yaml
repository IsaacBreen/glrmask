      +type Stage5Table = BTreeMap<StateID, Stage5Row>;
      +pub(crate) type Stage6Table = BTreeMap<StateID, Stage6Row>;
       type Stage7Table = BTreeMap<StateID, Stage7Row>;
       type Stage8Table = BTreeMap<StateID, Row>;
