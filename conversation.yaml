              for child in map1.values():
                  depth_buckets.setdefault(child._max_depth, []).append(child)
              for child in map2.values():
                  depth_buckets.setdefault(child._max_depth, []).append(child)

              v_out: Dict[int, Node] = {}
              for _, nodes in depth_buckets.items():
                  merged_node = nodes[0]
                  for n in nodes[1:]:
