      impl Display for NWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "NWA (start: {})", self.start_state)?;
              for (id, state) in self.states.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  for (to, weight) in &state.epsilon_transitions {
                      writeln!(f, "    ε -> {} (weight: {})", to, weight)?;
                  }
                  if let Some(default) = &state.transitions.default {
                      for (to, weight) in default {
                          writeln!(f, "    * -> {} (weight: {})", to, weight)?;
                      }
                  }
                  for (on, transitions) in &state.transitions.exceptions {
                      for (to, weight) in transitions {
                          let char_repr = if let Some(c) = char::from_u32(*on as u32) {
                              if c.is_ascii_graphic() || c == ' ' {
                                  format!("'{}'", c)
                              } else {
                                  format!("{}", *on)
                              }
                          } else {
                              format!("{}", *on)
                          };
                          writeln!(f, "    {} -> {} (weight: {})", char_repr, to, weight)?;
                      }
                  }
              }
              Ok(())
          }
      }

      impl Display for DWA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "DWA (start: {})", self.start_state)?;
              for (id, state) in self.states.iter().enumerate() {
                  writeln!(f, "  State {}:", id)?;
                  writeln!(f, "    weight: {}", state.weight)?;
                  if let Some(w) = &state.final_weight {
                      writeln!(f, "    final_weight: {}", w)?;
                  }
                  if let Some(to) = &state.transitions.default {
                      if let Some(w) = &state.trans_weight_default {
                          writeln!(f, "    * -> {} (trans_weight: {})", to, w)?;
                      } else {
                          writeln!(f, "    * -> {}", to)?;
                      }
                  }
                  for (on, to) in &state.transitions.exceptions {
                      let char_repr = if let Some(c) = char::from_u32(*on as u32) {
                          if c.is_ascii_graphic() || c == ' ' {
                              format!("'{}'", c)
                          } else {
                              format!("{}", *on)
                          }
                      } else {
                          format!("{}", *on)
                      };
                      if let Some(w) = state.trans_weights_exceptions.get(on) {
                          writeln!(f, "    {} -> {} (trans_weight: {})", char_repr, to, w)?;
                      } else {
                          writeln!(f, "    {} -> {}", char_repr, to)?;
                      }
                  }
              }
              Ok(())
          }
      }

      impl JSONConvertible for SimpleBitset {
          fn to_json(&self) -> JSONNode {
              // Serialize as an array of [start, end] inclusive ranges
              let ranges_vec: Vec<Vec<usize>> = self
                  .0
                  .ranges()
                  .map(|range_inclusive| vec![*range_inclusive.start(), *range_inclusive.end()])
                  .collect();
              ranges_vec.to_json()
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let ranges_vec: Vec<Vec<usize>> = Vec::from_json(node)?;
              let mut ranges = Vec::new();
              for mut range_vec in ranges_vec {
                  if range_vec.len() != 2 {
                      return Err(format!(
                          "Expected 2-element array for SimpleBitset range, got {:?}",
                          range_vec
                      ));
                  }
                  let end = range_vec.pop().unwrap();
                  let start = range_vec.pop().unwrap();
                  ranges.push(start..=end);
              }
              Ok(SimpleBitset(RangeSetBlaze::from_iter(ranges)))
          }
      }

      impl<T: JSONConvertible> JSONConvertible for U16Map<T> {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("exceptions".to_string(), self.exceptions.to_json());
              obj.insert("default".to_string(), self.default.to_json());
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let exceptions = BTreeMap::<u16, T>::from_json(obj.remove("exceptions").ok_or("Missing 'exceptions' field")?)?;
              let default = Option::<T>::from_json(obj.remove("default").ok_or("Missing 'default' field")?)?;
              Ok(U16Map { exceptions, default })
          }
      }

      impl JSONConvertible for DWAState {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("transitions".to_string(), self.transitions.to_json());
              obj.insert("weight".to_string(), self.weight.to_json());
              obj.insert("final_weight".to_string(), self.final_weight.to_json());
              obj.insert("trans_weight_default".to_string(), self.trans_weight_default.to_json());
              obj.insert("trans_weights_exceptions".to_string(), self.trans_weights_exceptions.to_json());
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let transitions = U16Map::<StateID>::from_json(obj.remove("transitions").ok_or("Missing 'transitions' field")?)?;
              let weight = Weight::from_json(obj.remove("weight").ok_or("Missing 'weight' field")?)?;
              let final_weight = Option::<Weight>::from_json(obj.remove("final_weight").ok_or("Missing 'final_weight' field")?)?;
              let trans_weight_default = Option::<Weight>::from_json(obj.remove("trans_weight_default").ok_or("Missing 'trans_weight_default' field")?)?;
              let trans_weights_exceptions = BTreeMap::<u16, Weight>::from_json(obj.remove("trans_weights_exceptions").ok_or("Missing 'trans_weights_exceptions' field")?)?;
              Ok(DWAState {
                  transitions,
                  weight,
                  final_weight,
                  trans_weight_default,
                  trans_weights_exceptions,
              })
          }
      }

      impl JSONConvertible for DWA {
          fn to_json(&self) -> JSONNode {
              let mut obj = BTreeMap::new();
              obj.insert("states".to_string(), self.states.to_json());
              obj.insert("start_state".to_string(), self.start_state.to_json());
              JSONNode::Object(obj)
          }

          fn from_json(node: JSONNode) -> Result<Self, String> {
              let mut obj = node.into_object()?;
              let states = Vec::<DWAState>::from_json(obj.remove("states").ok_or("Missing 'states' field")?)?;
              let start_state = StateID::from_json(obj.remove("start_state").ok_or("Missing 'start_state' field")?)?;
              Ok(DWA { states, start_state })
          }
      }


      // --- Tests ---
      #[cfg(test)]
      mod tests {
          use super::*;

          fn build_complex_nwa() -> NWA {
              let mut nwa = NWA::default();
              // Add 20 states (0 to 19)
              for _ in 0..20 {
                  nwa.add_state();
              }
              nwa.start_state = 1;

              let w0 = SimpleBitset::from_item(0);
              let w1 = SimpleBitset::from_item(1);
              let w2 = SimpleBitset::from_item(2);
              let w3 = SimpleBitset::from_item(3);
              let w123 = SimpleBitset::from_iter(1..=3);
              let wall = SimpleBitset::all();

              // State 7 is final
              nwa.set_final_weight(7, wall.clone());

              // Transitions from s1 (1)
              nwa.add_transition(1, 1, 2, w0.clone());
              nwa.add_transition(1, 2, 7, w1.clone());
              nwa.add_transition(1, 2, 7, w2.clone());
              nwa.add_transition(1, 2, 3, w3.clone());
              nwa.add_transition(1, 4, 4, w0.clone());
              nwa.add_transition(1, 5, 5, w123.clone());
              nwa.add_transition(1, 6, 6, w123.clone());
              nwa.add_transition(1, 7, 7, w0.clone());
              nwa.add_transition(1, 10, 7, w1.clone());
              nwa.add_transition(1, 10, 7, w2.clone());
              nwa.add_transition(1, 10, 7, w3.clone());

              // Transitions from s2 (2)
              nwa.add_default_transition(2, 8, wall.clone());

              // Transitions from s3 (3)
              nwa.add_transition(3, 10, 7, w3.clone());

              // Transitions from s4 (4)
              nwa.add_default_transition(4, 9, wall.clone());

              // Transitions from s5 (5)
              nwa.add_default_transition(5, 11, wall.clone());
              nwa.add_default_transition(5, 12, wall.clone());
              nwa.add_default_transition(5, 13, wall.clone());

              // Transitions from s6 (6)
              nwa.add_default_transition(6, 14, wall.clone());
              nwa.add_default_transition(6, 16, wall.clone());
              nwa.add_default_transition(6, 18, wall.clone());

              // Transitions from s8 (8)
              nwa.add_transition(8, 10, 7, w0.clone());

              // Transitions from s9 (9)
              nwa.add_default_transition(9, 10, wall.clone());

              // Transitions from s10 (10)
              nwa.add_transition(10, 10, 7, w0.clone());

              // The rest of the transitions (11-19) are simple and follow the pattern
              nwa.add_transition(11, 10, 7, w1.clone());
              nwa.add_transition(12, 10, 7, w2.clone());
              nwa.add_transition(13, 10, 7, w3.clone());
              nwa.add_default_transition(14, 15, wall.clone());
              nwa.add_transition(15, 10, 7, w1.clone());
              nwa.add_default_transition(16, 17, wall.clone());
              nwa.add_transition(17, 10, 7, w2.clone());
              nwa.add_default_transition(18, 19, wall.clone());
              nwa.add_transition(19, 10, 7, w3.clone());

              nwa
          }

          #[test]
          fn test_simple_bitset_ops() {
              let set1 = SimpleBitset::from_iter(vec![1, 2, 5]);
              let set2 = SimpleBitset::from_iter(vec![2, 3, 5, 6]);
              let all = SimpleBitset::all();
              let zeros = SimpleBitset::zeros();

              assert_eq!((&set1 & &set2).iter_up_to(10).collect::<Vec<_>>(), vec![2, 5]);
              assert_eq!((&set1 | &set2).iter_up_to(10).collect::<Vec<_>>(), vec![1, 2, 3, 5, 6]);
              assert!((&set1 & &all).contains(1));
              assert!((&set1 | &zeros).contains(1));
              assert_eq!((&set1 | &zeros).len(), 3);
              assert!((&set1 & &zeros).is_empty());
          }

          #[test]
          fn test_u16_map() {
              let mut map = U16Map::with_default(100);
              map.exceptions.insert(b'a' as u16, 10);
              map.exceptions.insert(b'b' as u16, 20);

              assert_eq!(map.get(b'a' as u16), Some(&10));
              assert_eq!(map.get(b'c' as u16), Some(&100)); // default
              assert_eq!(map.get(b'b' as u16), Some(&20));
          }

          #[test]
          fn test_determinize_simple_nwa() {
              // NWA for "ab"
              // 0 --a, {1}--> 1 --b, {2}--> 2 (final, {3})
              let mut nwa = NWA::new();
              let s1 = nwa.add_state();
              let s2 = nwa.add_state();
              nwa.add_transition(0, b'a' as u16, s1, SimpleBitset::from_iter(vec![1, 4]));
              nwa.add_transition(s1, b'b' as u16, s2, SimpleBitset::from_iter(vec![1, 5]));
              nwa.set_final_weight(s2, SimpleBitset::from_iter(vec![1, 6]));

              let dwa = nwa.determinize();
              println!("NWA:\n{}", nwa);
              println!("DWA:\n{}", dwa);
              // Expected DWA:
              // S0 (start): weight=ALL
              //   'a' -> S1
              // S1: weight={1}
              //   'b' -> S2
              // S2: weight={1,4}&{1,5}={1}, final_weight=({1})&{1,6}={1}
              assert_eq!(dwa.states.len(), 3);
              let start_state = &dwa.states[dwa.start_state];
              assert_eq!(start_state.weight, SimpleBitset::all());
              assert!(start_state.final_weight.is_none());

              let s1_id = *start_state.transitions.get(b'a' as u16).unwrap();
              let state1 = &dwa.states[s1_id];
              assert_eq!(state1.weight, SimpleBitset::from_iter(vec![1, 4]));
              assert!(state1.final_weight.is_none());

              let s2_id = *state1.transitions.get(b'b' as u16).unwrap();
              let state2 = &dwa.states[s2_id];
              let expected_s2_weight = SimpleBitset::from_iter(vec![1, 4]) & SimpleBitset::from_iter(vec![1, 5]);
              assert_eq!(state2.weight, expected_s2_weight);
              let expected_final_weight = &expected_s2_weight & &SimpleBitset::from_iter(vec![1, 6]);
              assert_eq!(state2.final_weight, Some(expected_final_weight));
          }

          #[test]
          fn test_determinize_with_epsilon() {
              // NWA for "a?"
              // 0 --ε, {1}--> 1 --a, {2}--> 2 (final, {3})
              // 0 is also final with weight {4}
              let mut nwa = NWA::new();
              let s1 = nwa.add_state();
              let s2 = nwa.add_state();
              nwa.add_epsilon_transition(0, s1, SimpleBitset::from_iter(vec![1, 5]));
              nwa.add_transition(s1, b'a' as u16, s2, SimpleBitset::from_iter(vec![1, 6]));
              nwa.set_final_weight(0, SimpleBitset::from_item(4));
              nwa.set_final_weight(s2, SimpleBitset::from_iter(vec![1, 7]));

              let dwa = nwa.determinize();
              // Expected DWA:
              // S0 (start): composition={0:ALL, 1:{1}}. weight=ALL|{1}. final_weight={4}
              //   'a' -> S1
              // S1: composition={2:{1}&{2}}. weight={1}&{2}. final_weight=({1}&{2})&{3}
              assert_eq!(dwa.states.len(), 2);

              let start_state = &dwa.states[dwa.start_state];
              assert_eq!(start_state.weight, SimpleBitset::from_iter(vec![1, 5]) | SimpleBitset::all());
              assert_eq!(start_state.final_weight, Some(SimpleBitset::from_item(4)));

              let s1_id = *start_state.transitions.get(b'a' as u16).unwrap();
              let state1 = &dwa.states[s1_id];
              let expected_s1_weight = &SimpleBitset::from_iter(vec![1, 5]) & &SimpleBitset::from_iter(vec![1, 6]);
              assert_eq!(state1.weight, expected_s1_weight);
              let expected_final = &expected_s1_weight & &SimpleBitset::from_iter(vec![1, 7]);
              assert_eq!(state1.final_weight, Some(expected_final));
          }

          #[test]
          fn test_determinize_with_default() {
              // NWA:
              // 0 --'a', {1}--> 1 (final, {10})
              // 0 --*, {2}--> 2 (final, {20})
              let mut nwa = NWA::new();
              let s1 = nwa.add_state();
              let s2 = nwa.add_state();
              nwa.add_transition(0, b'a' as u16, s1, SimpleBitset::from_iter(vec![1, 5]));
              nwa.add_default_transition(0, s2, SimpleBitset::from_iter(vec![2, 5]));
              nwa.set_final_weight(s1, SimpleBitset::from_iter(vec![1, 10]));
              nwa.set_final_weight(s2, SimpleBitset::from_iter(vec![2, 20]));

              let dwa = nwa.determinize();
              // Expected DWA:
              // S0 (start): weight=ALL
              //   'a' -> S1 (exception)
              //   * -> S2 (default)
              // S1: weight={1}, final_weight={1}&{10}
              // S2: weight={2}, final_weight={2}&{20}
              assert_eq!(dwa.states.len(), 3);

              let start_state = &dwa.states[dwa.start_state];
              let s1_id = *start_state.transitions.exceptions.get(&(b'a' as u16)).unwrap();
              let s2_id = start_state.transitions.default.unwrap();
              assert_ne!(s1_id, s2_id);

              let state1 = &dwa.states[s1_id];
              assert_eq!(state1.weight, SimpleBitset::from_iter(vec![1, 5]));
              assert_eq!(state1.final_weight, Some(SimpleBitset::from_iter(vec![1, 5]) & SimpleBitset::from_iter(vec![1, 10])));

              let state2 = &dwa.states[s2_id];
              assert_eq!(state2.weight, SimpleBitset::from_iter(vec![2, 5]));
              assert_eq!(state2.final_weight, Some(SimpleBitset::from_iter(vec![2, 5]) & SimpleBitset::from_iter(vec![2, 20])));
          }

          #[test]
          fn test_determinize_nondeterministic_choice() {
              // NWA for "a" | "a"
              // 0 --a, {1}--> 1 (final, {10})
              // 0 --a, {2}--> 2 (final, {20})
              let mut nwa = NWA::new();
              let s1 = nwa.add_state();
              let s2 = nwa.add_state();
              nwa.add_transition(0, b'a' as u16, s1, SimpleBitset::from_iter(vec![1, 5]));
              nwa.add_transition(0, b'a' as u16, s2, SimpleBitset::from_iter(vec![2, 5]));
              nwa.set_final_weight(s1, SimpleBitset::from_iter(vec![1, 10]));
              nwa.set_final_weight(s2, SimpleBitset::from_iter(vec![2, 20]));

              let dwa = nwa.determinize();
              // Expected DWA:
              // S0 (start): weight=ALL
              //   'a' -> S1
              // S1: composition={1:{1}, 2:{2}}. weight={1}|{2}. final_weight=({1}&{10})|({2}&{20})
              assert_eq!(dwa.states.len(), 2);

              let start_state = &dwa.states[dwa.start_state];
              let s1_id = *start_state.transitions.get(b'a' as u16).unwrap();
              let state1 = &dwa.states[s1_id];

              let expected_weight = SimpleBitset::from_iter(vec![1, 5]) | SimpleBitset::from_iter(vec![2, 5]);
              assert_eq!(state1.weight, expected_weight);

              let final1 = SimpleBitset::from_iter(vec![1, 5]) & SimpleBitset::from_iter(vec![1, 10]);
              let final2 = SimpleBitset::from_iter(vec![2, 5]) & SimpleBitset::from_iter(vec![2, 20]);
              let expected_final = final1 | &final2;
              assert_eq!(state1.final_weight, Some(expected_final));
          }

          #[test]
          fn test_determinize_complex_nondeterminism() {
              // NWA from the user input:
              // Start state: 1. Final state: 3 (weight: ALL).
              // s1 transitions:
              // 1 --0, [0..=1]--> 2
              // 1 --1, [0]--> 3
              // 1 --1, [0..=1]--> 2 (Nondeterminism)
              // 1 --2, [0..=1]--> 2
              // 1 --3, [0..=1]--> 2
              // 1 --4, [0..=1]--> 2
              // 1 --4, [1]--> 3 (Nondeterminism)
              // 1 --5, [0..=1]--> 2
              let mut nwa = NWA::default();
              let s0 = nwa.add_state(); // 0
              let s1 = nwa.add_state(); // 1 (Start)
              let s2 = nwa.add_state(); // 2
              let s3 = nwa.add_state(); // 3 (Final)
              nwa.start_state = s1;

              let w01 = SimpleBitset::from_iter(0..=1);
              let w0 = SimpleBitset::from_item(0);
              let w1 = SimpleBitset::from_item(1);
              nwa.set_final_weight(s3, SimpleBitset::all());

              // Transitions from s1 (1)
              nwa.add_transition(s1, 0, s2, w01.clone());
              nwa.add_transition(s1, 1, s3, w0.clone());
              nwa.add_transition(s1, 1, s2, w01.clone());
              nwa.add_transition(s1, 2, s2, w01.clone());
              nwa.add_transition(s1, 3, s2, w01.clone());
              nwa.add_transition(s1, 4, s2, w01.clone());
              nwa.add_transition(s1, 4, s3, w1.clone());
              nwa.add_transition(s1, 5, s2, w01.clone());

              let dwa = nwa.determinize();
              println!("{}", nwa);
              println!("{}", dwa);

              // Expected DWA: 4 states (S0, S1, S2, S3)
              assert_eq!(dwa.states.len(), 4);
              let s0_dwa = &dwa.states[dwa.start_state]; // S0: {1:ALL}
              let w01_expected = SimpleBitset::from_iter(0..=1);

              // S0 checks
              assert_eq!(s0_dwa.weight, SimpleBitset::all());
              assert!(s0_dwa.final_weight.is_none());

              // S1: {2:[0..=1]}. Target for '0', '2', '3', '5'.
              let s1_dwa_id = *s0_dwa.transitions.get(0).unwrap();
              let s1_dwa = &dwa.states[s1_dwa_id];
              assert_eq!(s1_dwa.weight, w01_expected);
              assert!(s1_dwa.final_weight.is_none());

              // S2: {3:[0], 2:[0..=1]}. Target for '1'.
              let s2_dwa_id = *s0_dwa.transitions.get(1).unwrap();
              let s2_dwa = &dwa.states[s2_dwa_id];
              assert_eq!(s2_dwa.weight, w01_expected);
              assert_eq!(s2_dwa.final_weight, Some(w0)); // [0] & ALL = [0]

              // S3: {2:[0..=1], 3:[1]}. Target for '4'.
              let s3_dwa_id = *s0_dwa.transitions.get(4).unwrap();
              let s3_dwa = &dwa.states[s3_dwa_id];
              assert_eq!(s3_dwa.weight, w01_expected);
              assert_eq!(s3_dwa.final_weight, Some(w1)); // [1] & ALL = [1]

              // Check that '2', '3', '5' also go to S1
              assert_eq!(*s0_dwa.transitions.get(2).unwrap(), s1_dwa_id);
              assert_eq!(*s0_dwa.transitions.get(3).unwrap(), s1_dwa_id);
              assert_eq!(*s0_dwa.transitions.get(5).unwrap(), s1_dwa_id);
          }

          #[test]
          fn test_determinize_complex_nwa_from_input() {
              let nwa = build_complex_nwa();
              let dwa = nwa.determinize();

              // Expected DWA states: 15 (0 to 14)
              assert_eq!(dwa.states.len(), 15);

              let w0 = SimpleBitset::from_item(0);
              let w1 = SimpleBitset::from_item(1);
              let w2 = SimpleBitset::from_item(2);
              let w3 = SimpleBitset::from_item(3);
              let w12 = SimpleBitset::from_iter(1..=2);
              let w123 = SimpleBitset::from_iter(1..=3);
              let wall = SimpleBitset::all();

              // S0 (ID 0): {1:ALL} - Start state
              let s0 = &dwa.states[dwa.start_state];
              assert_eq!(s0.weight, wall);
              assert!(s0.final_weight.is_none());

              // S1 (ID 1): Target of '1' from S0. Composition: {2:[0]}
              let s1_id = *s0.transitions.get(1).unwrap();
              assert_eq!(s1_id, 1);
              let s1 = &dwa.states[s1_id];
              assert_eq!(s1.weight, w0.clone());
              assert!(s1.final_weight.is_none());

              // S2 (ID 2): Target of '2' from S0. Composition: {7:[1..=2], 3:[3]}
              let s2_id = *s0.transitions.get(2).unwrap();
              assert_eq!(s2_id, 2);
              let s2 = &dwa.states[s2_id];
              assert_eq!(s2.weight, w123.clone());
              // Final weight: ([1..=2] & ALL) | ([3] & None) = [1..=2]
              assert_eq!(s2.final_weight, Some(w12.clone()));

              // S7 (ID 7): Target of '10' from S0. Composition: {7:[1..=3]}
              let s7_id = *s0.transitions.get(10).unwrap();
              assert_eq!(s7_id, 7);
              let s7 = &dwa.states[s7_id];
              assert_eq!(s7.weight, w123.clone());
              // Final weight: [1..=3] & ALL = [1..=3]
              assert_eq!(s7.final_weight, Some(w123.clone()));

              // S9 (ID 9): Target of '10' from S2. Composition: {7:[3]}
              let s9_id = *s2.transitions.get(10).unwrap();
              assert_eq!(s9_id, 9);
              let s9 = &dwa.states[s9_id];
              assert_eq!(s9.weight, w3.clone());
              // Final weight: [3] & ALL = [3]
              assert_eq!(s9.final_weight, Some(w3.clone()));

              // Check S6 (ID 6) and S8 (ID 8) properties and transitions
              let s6_id = *s0.transitions.get(7).unwrap(); // Target of '7' from S0. Composition: {7:[0]}
              assert_eq!(s6_id, 6);
              let s6 = &dwa.states[s6_id];
              assert_eq!(s6.weight, w0.clone());
              assert_eq!(s6.final_weight, Some(w0.clone()));

              let s8_id = s1.transitions.default.unwrap(); // Target of '*' from S1. Composition: {8:[0]}
              assert_eq!(s8_id, 8);
              let s8 = &dwa.states[s8_id];
              assert_eq!(s8.weight, w0.clone());
              assert!(s8.final_weight.is_none());
              
              // Check a transition to a known state (S8 -> '10' -> S6)
              assert_eq!(*s8.transitions.get(10).unwrap(), s6_id);

              // Check a transition to a known state (S7 is a sink)
              assert!(s7.transitions.exceptions.is_empty());
              assert!(s7.transitions.default.is_none());
          }
      }
    src/precompute4/augmented_nwa.rs: |
      use std::collections::{BTreeMap, BTreeSet};
      use std::fmt::{Display, Formatter};
      use crate::glr::grammar::regex_name;
      use crate::glr::parser::GLRParser;
      use crate::glr::table::{NonTerminalID, StateID as ParserStateID, TerminalID};
      use crate::precompute4::characterize::{
          compute_all_characterizations, compute_below_bottom_characterization, BelowBottomCharacterization,
      };
      use crate::weighted_automata::{NWA as WaNWA, StateID as WaStateID, Weight as WaWeight, StateID};

      /// Error that can occur while building an AugmentedNwa.
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum AugmentedNwaBuildError {
          /// A parser StateID could not be represented as a u16 alphabet symbol.
          ParserStateIdOutOfRange { state_id: ParserStateID },
      }

      /// Per-terminal augmented NWA bundle:
      /// - `nwa` is the constructed automaton.
      /// - `end_state` is the unique end node where we accumulate “escape” stacks.
      /// - `nt_nodes` maps each nonterminal to its dedicated node in the NWA.
      /// - `end_map` accumulates example stacks that reach the `end_state`.
      ///
      /// Alphabet: parser StateID values encoded as u16 (fails if any StateID > u16::MAX).
      #[derive(Debug, Clone)]
      pub struct AugmentedNwa {
          pub nwa: WaNWA,
          pub end_state: WaStateID,
          pub nt_nodes: BTreeMap<NonTerminalID, WaStateID>,
          /// Map from NWA state id (currently only the end_state is used) to sets of parser stacks.
          /// Each parser stack is represented as a Vec<ParserStateID>.
          pub end_map: BTreeMap<WaStateID, BTreeSet<Vec<ParserStateID>>>,
      }

      fn encode_symbol(id: ParserStateID) -> Result<u16, AugmentedNwaBuildError> {
          u16::try_from(id.0).map_err(|_| AugmentedNwaBuildError::ParserStateIdOutOfRange { state_id: id })
      }

      /// Build an augmented NWA for a single terminal by first computing its
      /// BelowBottomCharacterization, then materializing the NWA.
      pub fn build_augmented_nwa_for_terminal(
          parser: &GLRParser,
          terminal_id: TerminalID,
      ) -> Result<AugmentedNwa, AugmentedNwaBuildError> {
          let bb = compute_below_bottom_characterization(parser, terminal_id);
          build_augmented_nwa_from_characterization(parser, &bb)
      }

      /// This NWA acts as an identity for stack transformations, simply passing through any stack it is combined with.
      pub fn build_augmented_nwa_for_ignore_terminal() -> AugmentedNwa {
          let mut nwa = WaNWA::new();
          let start_state = nwa.start_state;
          nwa.set_final_weight(start_state, WaWeight::all());

          // For an ignore terminal, the stack is passed through. The end_map should
          // contain an empty stack at the end_state, which is also the start_state.
          // When this NWA is on the left in a `combine_right_into` operation, the
          // empty stack from its end_map results in the right-hand-side NWA's stacks
          // being preserved.
          let mut end_map = BTreeMap::new();
          end_map.insert(start_state, BTreeSet::from([vec![]]));

          AugmentedNwa {
              nwa,
              end_state: start_state,
              nt_nodes: BTreeMap::new(),
              end_map,
          }
      }

      /// Build augmented NWAs for all terminals.
      pub fn build_augmented_nwas(
          parser: &GLRParser,
      ) -> Result<BTreeMap<TerminalID, AugmentedNwa>, AugmentedNwaBuildError> {
          let all = compute_all_characterizations(parser);

          println!("\n--- Terminal Characterizations ---");
          for (terminal_id, bb) in &all {
              let terminal = parser.terminal_map.get_by_right(terminal_id).cloned().unwrap_or(regex_name("UNKNOWN"));
              println!("Terminal {} ({}) Characterization:\n{}", terminal_id.0, terminal, bb);
          }
          println!("--- End Terminal Characterizations ---\n");

          let mut out = BTreeMap::new();
          for (term, bb) in all {
              let aug = build_augmented_nwa_from_characterization(parser, &bb)?;
              out.insert(term, aug);
          }
          Ok(out)
      }

      /// Core builder: turns a BelowBottomCharacterization into an AugmentedNwa.
      ///
      /// Construction rules:
      /// - Create:
      ///   - one initial NWA start node (provided by WaNWA::new()),
      ///   - one unique `end_state`,
      ///   - one node per nonterminal.
      /// - For initial shifts:
      ///   - from start, on symbol (initial_state), go to end_state; add
      ///     [initial_state, shift_state] into end_map[end_state].
      /// - For initial reduces (initial_state, len, nt):
      ///   - create a chain of (len - 1) edges labeled (initial_state) ending at the `nt` node.
      ///     If len == 1, go directly to the `nt` node.
      /// - For each nonterminal’s reduce characterization:
      ///   - For reveal-and-rereduces (revealed_state, pop_n, reduce_nt):
      ///     create a chain of pop_n edges labeled (revealed_state) from the `nt` node to `reduce_nt` node.
      ///     If pop_n == 0, connect directly.
      ///   - For reveal-goto-shift escapes (revealed_state, goto_state, shift_state):
      ///     from the `nt` node, on symbol (revealed_state) go to end_state; add
      ///     [revealed_state, goto_state, shift_state] into end_map[end_state].
      pub fn build_augmented_nwa_from_characterization(
          parser: &GLRParser,
          bb: &BelowBottomCharacterization,
      ) -> Result<AugmentedNwa, AugmentedNwaBuildError> {
          let mut nwa = WaNWA::new(); // adds start state 0
          let start = nwa.start_state;
          let end_state = nwa.add_state();

          // One node per nonterminal in the grammar.
          let mut nt_nodes: BTreeMap<NonTerminalID, WaStateID> = BTreeMap::new();
          for &nt in parser.non_terminal_map.right_values() {
              let id = nwa.add_state();
              nt_nodes.insert(nt, id);
          }

          let mut end_map: BTreeMap<WaStateID, BTreeSet<Vec<ParserStateID>>> = BTreeMap::new();
          let w_all = WaWeight::all();

          // Initial shifts: start --(initial_state)--> end_state
          for &(initial_state, shift_state) in &bb.initial_shifts {
              let ch = encode_symbol(initial_state)?;
              nwa.add_transition(start, ch, end_state, w_all.clone());
              end_map.entry(end_state).or_default().insert(vec![initial_state, shift_state]);
          }

          // Initial reduces: chain of (len - 1) edges labeled by the initial_state, ending at the nt node.
          for &(initial_state, len, nt) in &bb.initial_reduces {
              let ch = encode_symbol(initial_state)?;
              let target_nt = *nt_nodes
                  .get(&nt)
                  .expect("nonterminal node must exist (created from parser.non_terminal_map)");
              // Defensive: if len == 0 (should not happen), treat as zero-length chain.
              let pops = if len == 0 { 0 } else { len.saturating_sub(1) };
              if pops == 0 {
                  // Straight edge to the NT node.
                  nwa.add_transition(start, ch, target_nt, w_all.clone());
              } else {
                  let mut from = start;
                  for i in 0..pops {
                      let to = if i + 1 == pops {
                          target_nt
                      } else {
                          nwa.add_state()
                      };
                      nwa.add_transition(from, ch, to, w_all.clone());
                      from = to;
                  }
              }
          }

          // Reduce characterizations per nonterminal.
          for (nt, rc) in &bb.reduce_characterizations {
              let src_nt = *nt_nodes
                  .get(nt)
                  .expect("reduce_characterizations only contains existing nonterminals");

              // Reveal-and-rereduces: chain of `pop_n` edges from `src_nt` to the node for `reduce_nt`,
              // all labeled with `revealed_state`.
              for &(revealed_state, pop_n, reduce_nt) in &rc.reveal_and_rereduces {
                  let ch = encode_symbol(revealed_state)?;
                  let dst_nt = *nt_nodes
                      .get(&reduce_nt)
                      .expect("reduce target nonterminal must exist");
                  if pop_n == 0 {
                      // Direct link if no extra pops below the revealed state.
                      nwa.add_transition(src_nt, ch, dst_nt, w_all.clone());
                  } else {
                      let mut from = src_nt;
                      for i in 0..pop_n {
                          let to = if i + 1 == pop_n {
                              dst_nt
                          } else {
                              nwa.add_state()
                          };
                          nwa.add_transition(from, ch, to, w_all.clone());
                          from = to;
                      }
                  }
              }

              // Reveal-goto-shift escapes: a single step to end_state; record the example stack.
              for &(revealed_state, goto_state, shift_state) in &rc.reveal_goto_shift_escapes {
                  let ch = encode_symbol(revealed_state)?;
                  nwa.add_transition(src_nt, ch, end_state, w_all.clone());
                  end_map
                      .entry(end_state)
                      .or_default()
                      .insert(vec![revealed_state, goto_state, shift_state]);
              }
          }

          Ok(AugmentedNwa {
              nwa,
              end_state,
              nt_nodes,
              end_map,
          })
      }

      impl AugmentedNwa {
          /// Process a parser-state stack through this augmented NWA.
          ///
          /// The stack is interpreted in order (0..n) as the sequence to be consumed.
          /// Returns a vector of (pos, stop_state, path_weight) where:
          /// - pos is how many items were consumed from `stack`,
          /// - stop_state is the NWA state reached (final or because input exhausted),
          /// - path_weight is the accumulated weight along the taken path.
          pub fn process_stack(
              &self,
              stack: &[ParserStateID],
          ) -> Result<Vec<(WaStateID, WaStateID, WaWeight)>, AugmentedNwaBuildError> {
              let mut encoded: Vec<u16> = Vec::with_capacity(stack.len());
              for &s in stack {
                  encoded.push(encode_symbol(s)?);
              }
              Ok(self.nwa.process_stack_u16(&encoded))
          }

          /// Non-commutative combination: fold `right` into `self` (left).
          ///
          /// Algorithm summary:
          /// - Snapshot the current left end-map.
          /// - Append-copy the entire `right` NWA into `self`, capturing a state-id mapping.
          /// - For each (left_end_state, left_stack) in the snapshot:
          ///   - Run `right`’s NWA on `left_stack` to get multiple (pos, right_stop, path_weight).
          ///   - Add an epsilon transition from `left_end_state` to the mapped `right_stop` with `path_weight`.
          ///   - From `right_stop`, find all `right` end states reachable (ignoring labels).
          ///     For each such end state and each stack in `right.end_map[end_state]`:
          ///       - prepend `left_stack[pos..]` to that right stack and insert it into `self.end_map`
          ///         under the mapped end-state id.
          pub fn combine_right_into(
              &mut self,
              right: &AugmentedNwa,
              weight: &WaWeight,
          ) -> Result<(), AugmentedNwaBuildError> {
              // Snapshot the original left end_map so we only iterate over "left" entries.
              let left_end_snapshot: BTreeMap<WaStateID, BTreeSet<Vec<ParserStateID>>> =
                  self.end_map.clone();

              let mut new_end_map: BTreeMap<StateID, BTreeSet<Vec<ParserStateID>>> = BTreeMap::new();

              // Append-copy the right NWA into the left.
              let right_to_left: Vec<WaStateID> = self.nwa.append_copy(&right.nwa);

              // Walk all (left end state, stacks) pairs.
              for (left_end_state, stacks) in left_end_snapshot {
                  for left_stack in stacks {
                      // 1) Process the left stack through the right NWA.
                      let mut encoded: Vec<u16> = Vec::with_capacity(left_stack.len());
                      for &s in &left_stack {
                          encoded.push(encode_symbol(s)?);
                      }
                      let stops = right.nwa.process_stack_u16(&encoded);

                      // 2) For each stop: add epsilon edge and propagate end_map stacks.
                      for (pos, right_stop_state, path_weight) in stops {
                          // Map the right stop state into the left's id space.
                          let mapped_stop = right_to_left[right_stop_state];
                          // Combine the path weight with the provided weight.
                          let combined_weight = &path_weight & weight;
                          // Epsilon from the left end state to the mapped right stop state.
                          self.nwa
                              .add_epsilon_transition(left_end_state, mapped_stop, combined_weight);
       
                          // Reachable right end states from this right stop, ignoring labels.
                          let reachable = right
                              .nwa
                              .reachable_states_ignoring_labels(right_stop_state);
                          for r_state in reachable {
                              if let Some(r_stacks) = right.end_map.get(&r_state) {
                                  let mapped_end = right_to_left[r_state];
                                  for r_stack in r_stacks {
                                      // Prepend the remainder of the left stack to the right stack.
                                      let mut combined: Vec<ParserStateID> =
                                          left_stack[pos..].to_vec();
                                      combined.extend(r_stack.iter().cloned());
                                      new_end_map
                                          .entry(mapped_end)
                                          .or_default()
                                          .insert(combined);
                                  }
                              }
                          }
                      }
                  }
              }
              self.end_map = new_end_map;
              Ok(())
          }

          /// Union of two augmented NWAs. `self` is modified to become the union.
          pub fn union_with(&mut self, other: &AugmentedNwa) {
              let mapping = self.nwa.append_copy(&other.nwa);

              // Merge end_maps
              for (other_end_state, stacks) in &other.end_map {
                  let mapped_end_state = mapping[*other_end_state];
                  self.end_map
                      .entry(mapped_end_state)
                      .or_default()
                      .extend(stacks.clone());
              }

              // Create new start state with epsilon transitions to old start states
              let new_start = self.nwa.add_state();
              let old_self_start = self.nwa.start_state;
              let old_other_start_mapped = mapping[other.nwa.start_state];

              self.nwa
                  .add_epsilon_transition(new_start, old_self_start, WaWeight::all());
              self.nwa
                  .add_epsilon_transition(new_start, old_other_start_mapped, WaWeight::all());

              self.nwa.start_state = new_start;
              self.end_state = usize::MAX; // Invalidate single end_state
          }
      }

      impl Display for AugmentedNwa {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "Augmented NWA")?;
              writeln!(f, "  End State: {}", self.end_state)?;
              writeln!(f, "  Nonterminal Nodes:")?;
              for (nt, state) in &self.nt_nodes {
                  writeln!(f, "    - NT {}: State {}", nt.0, state)?;
              }
              if !self.end_map.is_empty() {
                  writeln!(f, "  End Map:")?;
                  for (state, stacks) in &self.end_map {
                      writeln!(f, "    - State {}:", state)?;
                      for stack in stacks {
                          let stack_str: Vec<String> = stack.iter().map(|s| s.0.to_string()).collect();
                          writeln!(f, "      - [{}]", stack_str.join(", "))?;
                      }
                  }
              }
              writeln!(f, "  Underlying NWA:")?;
              for line in self.nwa.to_string().lines() {
                  writeln!(f, "    {}", line)?;
              }
              Ok(())
          }
      }

      #[cfg(test)]
      mod tests {
          use super::*;

          // These are structural smoke tests that only validate basic invariants of the builder.
          // Full integration with a real GLRParser instance lives elsewhere in the pipeline.

          // Provide a tiny, synthetic parser stub when feature-testing here would be too heavyweight.
          // If GLRParser isn't trivially constructible in your environment, consider adding
          // integration tests in a higher layer instead.
          struct FakeMaps {
              nts: BTreeSet<NonTerminalID>,
              terms: BTreeSet<TerminalID>,
          }

          #[test]
          fn encode_symbol_fails_on_large_state_ids() {
              // Simulate an overflow: usize that doesn't fit into u16
              #[cfg(target_pointer_width = "64")]
              {
                  let big: ParserStateID = ParserStateID(u32::MAX as usize + 10usize);
                  let err = encode_symbol(big).unwrap_err();
                  match err {
                      AugmentedNwaBuildError::ParserStateIdOutOfRange { state_id } => assert_eq!(state_id, big),
                  }
              }
          }

          // Helper to create a simple AugmentedNwa for testing.
          // NWA: 0 --(100)--> 1 (end)
          // End map: {1: {[100, 101]}}
          fn build_simple_aug_nwa() -> AugmentedNwa {
              let mut nwa = WaNWA::new();
              let start = nwa.start_state;
              let end = nwa.add_state();
              nwa.add_transition(start, 100, end, WaWeight::all());

              let mut end_map = BTreeMap::new();
              end_map.insert(
                  end,
                  BTreeSet::from([vec![ParserStateID(100), ParserStateID(101)]]),
              );

              AugmentedNwa {
                  nwa,
                  end_state: end,
                  nt_nodes: BTreeMap::new(),
                  end_map,
              }
          }

          #[test]
          fn test_combine_with_ignore_on_left() {
              let mut lhs = build_augmented_nwa_for_ignore_terminal();
              let rhs = build_simple_aug_nwa();
              let weight = WaWeight::all();

              lhs.combine_right_into(&rhs, &weight).unwrap();

              // Expected structure:
              // Original ignore NWA (state 0) has an epsilon transition to the start of the copied RHS NWA (state 1).
              // The end_map of the combined NWA should be the RHS's end_map, but with keys remapped.
              // Original RHS end_state was 1. It gets copied to state 2.
              // So the new end_map should have key 2.

              assert_eq!(lhs.nwa.states.len(), 3); // 0 (ignore) + 1,2 (copied rhs)
              assert_eq!(lhs.nwa.start_state, 0);

              // Check for epsilon transition 0 -> 1
              let start_state = &lhs.nwa.states[0];
              assert_eq!(start_state.epsilon_transitions.len(), 1);
              assert_eq!(start_state.epsilon_transitions[0], (1, WaWeight::all()));

              // Check copied RHS structure
              let copied_rhs_start = &lhs.nwa.states[1];
              let transitions = copied_rhs_start.transitions.exceptions.get(&100).unwrap();
              assert_eq!(transitions.len(), 1);
              assert_eq!(transitions[0], (2, WaWeight::all())); // 0->1 in rhs becomes 1->2

              // Check the final end_map
              let expected_end_map = BTreeMap::from([(
                  2, // original end_state 1 is mapped to 2
                  BTreeSet::from([vec![ParserStateID(100), ParserStateID(101)]]),
              )]);
              assert_eq!(lhs.end_map, expected_end_map);
          }

          #[test]
          fn test_combine_with_ignore_on_right() {
              let mut lhs = build_simple_aug_nwa();
              let rhs = build_augmented_nwa_for_ignore_terminal();
              let weight = WaWeight::all();

              let original_end_map = lhs.end_map.clone();
              let original_state_count = lhs.nwa.states.len();
              let original_end_state_id = lhs.end_state;

              lhs.combine_right_into(&rhs, &weight).unwrap();

              // Expected structure:
              // The original LHS NWA is preserved.
              // The ignore NWA (1 state) is copied into LHS.
              // An epsilon transition is added from the original LHS end state to the copied ignore NWA's start state.
              // The new end_map contains the original LHS stack, but now associated with the copied ignore NWA's end state.

              assert_eq!(lhs.nwa.states.len(), original_state_count + 1); // 2 + 1 = 3
              let copied_rhs_start_id = original_state_count; // state 2

              // Check original LHS structure is preserved
              let lhs_start_state = &lhs.nwa.states[0];
              let transitions = lhs_start_state.transitions.exceptions.get(&100).unwrap();
              assert_eq!(transitions.len(), 1);
              assert_eq!(
                  transitions[0],
                  (original_end_state_id, WaWeight::all())
              );

              // Check for epsilon transition from original end state to new state
              let lhs_original_end_state = &lhs.nwa.states[original_end_state_id];
              assert_eq!(lhs_original_end_state.epsilon_transitions.len(), 1);
              assert_eq!(
                  lhs_original_end_state.epsilon_transitions[0],
                  (copied_rhs_start_id, WaWeight::all())
              );

              // Check the final end_map
              let expected_end_map = BTreeMap::from([(
                  copied_rhs_start_id,
                  original_end_map.get(&original_end_state_id).unwrap().clone(),
              )]);
              assert_eq!(lhs.end_map, expected_end_map);
          }
      }
