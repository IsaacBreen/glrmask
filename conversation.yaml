              print_summary();
              reset();
              assert!(glr_state.is_ok(), "Parser state became invalid after terminal {} ({:?})", i, terminals[i]);
          }

          println!("\n--- Finished parsing terminal sequence ---");
          assert!(glr_state.is_ok(), "Final parser state is not OK.");

