                  let mut parts: Vec<String> = bv
                      .iter_ranges()
                      .take(MAX_RANGES_TO_SHOW)
                      .map(|(start, end)| {
                          if start == end {
                              format!("{}", start)
                          } else if end == usize::MAX {
