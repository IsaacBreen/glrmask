      Don't touch anything outside those methods.

      For `push`, it's relatively easy. Take the existing `inner` in `LeveledGSS`. Create a new `UpperBranch` that has this as its only child, with the edge carrying the passed value, and `empty` as `None` (which makes sense - pushing onto the empty stack gives a non-empty stack).

