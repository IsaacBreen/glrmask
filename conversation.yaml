              state = ctypes.c_size_t(state)
              weight = ctypes.c_float()

              ret_code = lib.fst_final_weight(self.ptr, state, ctypes.byref(weight))
              err_msg = "Error getting final weight"
              check_ffi_error(ret_code, err_msg)

