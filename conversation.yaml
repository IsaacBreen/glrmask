              """
              self._symt = symbol_table
              self._idx = 0
              self._len = self._symt.num_symbols()

          def __next__(self) -> Tuple[int, str]:
              """
              Iterator over the symbols in the `SymbolTable`.
              Returns:
                  A pair label (int) and symbol (str).
