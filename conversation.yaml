      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct Match {
          pub group_id: GroupID,
          pub position: usize,
      }

      // Manual impl for Match
      impl JSONConvertible for Match {
          fn to_json(&self) -> JSONNode {
