                              ends = dest.ends
                              matched: List[ffi.GSSNode] = []

                              # Efficiently collect parents in ranges
                              # Using bisect on sid_vals for each interval [a, b]
                              for a, b in zip(starts, ends):
                                  lo = bisect_left(sid_vals, a)
                                  if lo >= len(sid_vals):
