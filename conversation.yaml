                      # Convert to RangeSet for ffi-free operations in commit/get_mask
                      llm_bv: LLMTokenSet = RangeSet.from_ranges(llm_bv_bitset.to_ranges())
                      llm_bv_union |= llm_bv
                      new_dest_map = []
