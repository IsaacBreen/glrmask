          type TestGSSNode = GSSNode; // GSSNode is now concrete

          fn mock_llm_token_info(active_val: usize, intersection_val: usize) -> LLMTokenInfo {
              let mut active = LLMTokenBV::new();
              active.insert(active_val);
              Some(active)
          }
          
