                  print(f"\n[{iter_count}] Processing depth={current_depth}, nodes={node_indices}")


                  for node_idx in list(node_indices):
                      if node_idx in stopped:
                          print(f"  - Node {node_idx}: SKIPPING (already stopped)")
                          continue

