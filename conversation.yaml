      #[derive(Debug, Clone, Eq, Ord, PartialEq, PartialOrd)]
      pub enum Stage7ShiftsAndReducesLookaheadValue {
          Shift(StateID),
          Reduce {
              nonterminal_id: NonTerminalID,
              len: usize,
              production_ids: BTreeSet<ProductionID>,
          },
          Split {
              shift: Option<StateID>,
