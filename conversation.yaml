          fn expect_else<F>(self, f: F) -> T
          where
              F: FnOnce() -> String;
      }

      impl<T> ExpectElse<T> for Option<T> {
          #[inline]
          #[track_caller]
          fn expect_else<F>(self, f: F) -> T
