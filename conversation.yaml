          // let mut sim = NFASimulator::new(&self.nfa, initial_nfa_states_from_dfa);

          // Replace with or modify to include the NFA's global initial state:
          let mut effective_initial_nfa_states = initial_nfa_states_from_dfa; // Or .clone() if needed
          effective_initial_nfa_states.insert(self.nfa.initial_state); 
          let mut sim = NFASimulator::new(&self.nfa, effective_initial_nfa_states);
