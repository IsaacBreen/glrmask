          // -----------------------------
          // Test EK type and helpers
          // -----------------------------
          #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord)]
          struct TestEK {
              pop: isize,
              check: Option<usize>,
          }

          impl TestEK {
              fn new(pop: isize, check: Option<usize>) -> Self {
