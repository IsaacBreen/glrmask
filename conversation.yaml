              res: List[Tuple[int, int]] = []
              j = 0
              for s1, e1 in a:
                  curr = s1
                  while j < len(b) and b[j][1] < curr:
                      j += 1
                  k = j
                  while k < len(b) and b[k][0] <= e1:
