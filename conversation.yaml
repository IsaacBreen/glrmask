          pub fn simplify(&mut self) {
              if let Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } = self {
                  if reduces.is_empty() {
                      if let Some(shift_id) = *shift {
                          *self = Stage7ShiftsAndReducesLookaheadValue::Shift(shift_id);
