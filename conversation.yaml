              let roots_multi = get_roots(vec![&root, b.as_ref()]);
              let mut expected_multi = BTreeSet::new();
              let path_acc_b_l1 = Arc::new(Acc::narrow(&acc_b, &acc1));
              expected_multi.insert(RootItem { node: leaf1.as_ref(), path_acc: path_acc_b_l1 });
