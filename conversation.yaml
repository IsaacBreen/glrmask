              );

              let diff2 = &set2_conceptually_dense - &set1_conceptually_sparse;
              let mut diff2_expected: BTreeSet<usize> = (0..SPARSE_TO_DENSE_THRESHOLD + 5).collect();
              diff2_expected.remove(&1);
