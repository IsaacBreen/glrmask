                      sid_to_arcs = {
                          sid: [(dest, None if bv.is_empty() else bv) for dest, bv in dest_map.items()]
                          for sid, dest_map in agg["sid_map"].items()
                      }
                      # Convert eps_map
                      eps_arcs = [(dest, None if bv.is_empty() else bv) for dest, bv in agg["eps_map"].items()]
                      
