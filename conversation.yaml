                  }
                  py::tuple result = cached_res;

                  py::object end_state_obj = result[0];
                  py::object matches_obj = result[1];

                  bool has_end_state = !end_state_obj.is_none();
                  int end_state = has_end_state ? py::cast<int>(end_state_obj) : -1;

