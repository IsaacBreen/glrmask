      impl GSSInternal {
          pub(crate) fn predecessors(&self) -> &NodeMap { &self.predecessors }
          pub(crate) fn max_depth(&self) -> MaxDepth { self.max_depth }
          pub(crate) fn acc(&self) -> &Arc<Acc> { &self.acc }
