              let accessible = self
                  .inner
                  .tokens_accessible_from_state(sep1::tokenizer::TokenizerStateID(state_id));
              let out: Vec<usize> = accessible.into_iter().map(|tid| tid.0).collect();
              Ok(out)
          }

