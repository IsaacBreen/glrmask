      2.  Implemented a loop to tokenize `full_text_to_tokenize` using this tree, ensuring it matches the known sequence of token strings (`test_token_sequence_strs`).
      3.  Asserted that the IDs obtained from this tokenization match the IDs obtained by direct lookup (the original `test_token_sequence_ids`).
      4.  Used these dynamically generated (and verified) token IDs to step through the `GrammarConstraintState`.

