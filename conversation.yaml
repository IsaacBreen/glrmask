                                          terminals_union=acc.terminals_union,
                                          llm_mask=new_mask
                                      )
                                  acc_memo[acc] = result
                                  return result

                              child_gss = child_gss.apply_and_prune(intersect_and_prune)
                              if child_gss.is_empty():
