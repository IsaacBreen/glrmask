local_system:
  attached_files:
    - python/gss_tester/run_tests.sh
    - python/gss_tester/run_benches.sh
    - python/run_benchmarks.sh
    - python/run_variations.sh
  conversation_file:
  compile_command:
  initial_file_contents:
    python/gss_tester/run_tests.sh: |-
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_tests.sh
      #
      # A script to automate running the GSS test specification against multiple
      # implementations, generating JSON results, and analyzing them for consistency.
      #
      # This script can be run from the `python` directory or the project root.
      # It also automates the C++ build process for pybind11 modules.
      #
      # Usage:
      #   # From project root:
      #   ./python/gss_tester/run_tests.sh <reference_impl> <impl1> [impl2 ...]
      #
      #   # From python/ directory:
      #   ./gss_tester/run_tests.sh <reference_impl> <impl1> [impl2 ...]
      #
      # Each implementation is specified as 'path.to.module.ClassName' or a .py path.
      # ==============================================================================

      # --- Setup PYTHONPATH to find gss_tester ---
      # SCRIPT_DIR will be the absolute path to the directory containing this script.
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )

      # PYTHON_SRC_ROOT should be the absolute path to the 'python' directory.
      # If SCRIPT_DIR is /path/to/project/python/gss_tester, then PYTHON_SRC_ROOT is /path/to/project/python
      PYTHON_SRC_ROOT=$(dirname "$SCRIPT_DIR")
      export PYTHONPATH="${PYTHON_SRC_ROOT}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage: $0 <reference_impl> <impl1> [impl2 ...]"
          echo "Error: At least one implementation is required. The first is treated as the reference."
          exit 1
      fi

      REFERENCE_IMPL="$1"
      shift
      COMPETITORS=("$@")

      ALL_IMPLS=("$REFERENCE_IMPL" "${COMPETITORS[@]}")

      # --- Setup ---
      # Create a unique directory for this test run's results.
      RESULTS_DIR="$PYTHON_SRC_ROOT/gss_test_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Test results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Reference Implementation: $REFERENCE_IMPL"
      if [ "${#COMPETITORS[@]}" -gt 0 ]; then
        echo "Other Implementations: ${COMPETITORS[*]}"
      else
        echo "Other Implementations: (none)"
      fi
      echo "---"

      # --- Automated C++ Build Process ---
      if [ "${SKIP_CPP:-0}" == "1" ]; then
        echo "SKIP_CPP is set. Skipping C++ module build."
        echo "---"
      else
        echo "Automating C++ module build..."
        C_PLUS_PLUS_MODULES_DIR="$PYTHON_SRC_ROOT/aug25/models"
        C_PLUS_PLUS_BUILD_DIR="$C_PLUS_PLUS_MODULES_DIR/build"
        C_PLUS_PLUS_OUTPUT_DIR="$PYTHON_SRC_ROOT" # Compiled .so files go directly into python/

        # 1. Clean previous build artifacts
        echo "  Cleaning previous C++ build artifacts..."
        rm -rf "$C_PLUS_PLUS_BUILD_DIR"

        # 2. Configure the build using CMake
        echo "  Configuring C++ build with CMake..."
        cmake -S "$C_PLUS_PLUS_MODULES_DIR" -B "$C_PLUS_PLUS_BUILD_DIR"

        # 3. Build the C++ modules
        echo "  Building C++ modules..."
        cmake --build "$C_PLUS_PLUS_BUILD_DIR"

        # 4. Copy the compiled module to a location where Python can find it
        echo "  Copying compiled C++ modules to Python path..."
        # Find the exact name of the compiled shared library (e.g., leveled_gss_cpp.cpython-312-darwin.so)
        # and copy it to the PYTHON_SRC_ROOT.
        find "$C_PLUS_PLUS_BUILD_DIR" -name "leveled_gss_cpp.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        find "$C_PLUS_PLUS_BUILD_DIR" -name "precompute3_engine.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        echo "C++ module build complete."
        echo "---"
      fi

      # --- Automated Rust Build Process ---
      if [ "${SKIP_RUST:-0}" == "1" ]; then
        echo "SKIP_RUST is set. Skipping Rust module build."
        echo "---"
      else
        echo "Automating Rust module build..."
        RUST_PROJECT_DIR="$PYTHON_SRC_ROOT/leveled_rs"
        if [ -d "$RUST_PROJECT_DIR" ]; then
          echo "  Building Rust modules with maturin..."
          # Assuming maturin is installed in the environment. 'maturin develop' builds and installs the wheel in the current venv.
          (cd "$RUST_PROJECT_DIR" && maturin develop)
          echo "Rust module build complete."
        else
          echo "Rust project directory not found at $RUST_PROJECT_DIR. Skipping build."
        fi
        echo "---"
      fi

      # --- Run Tests ---
      echo "Starting test runs..."
      REFERENCE_IMPL_CANONICAL="" # Will be set to the canonical name of the reference impl
      for full_impl_path in "${ALL_IMPLS[@]}"; do
          echo
          echo ">>> Running test spec for: $full_impl_path"

          # --- Convert file path to module and class names ---
          # This logic handles both module paths (e.g., gss_tester.ref.RefGSS) and
          # file paths (e.g., python/gss_tester/reference_impl.py).
          if [[ "$full_impl_path" == *.py ]]; then
              # Handle file path: derive module and class name by convention.
              # Module name: strip path up to 'python/', remove '.py' suffix(es), replace '/' with '.'
              # The sed command needs to strip the PYTHON_SRC_ROOT prefix if present.
              local_path="${full_impl_path#$PYTHON_SRC_ROOT/}" # Remove PYTHON_SRC_ROOT prefix if it exists
              module_name=$(echo "$local_path" | sed -e 's#\(\.py\)*$##' -e 's#/#.#g')
              # Class name: e.g., 'reference_impl' -> 'ReferenceGSS'
              base_name=$(basename "$full_impl_path" | sed 's#\(\.py\)*$##')
              class_name_base=$(echo "$base_name" | sed 's/_impl$//')
              class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
              full_impl_name="${module_name}.${class_name}"
          else
              # Handle module.ClassName format
              full_impl_name="$full_impl_path"
              module_name="${full_impl_name%.*}"
              class_name="${full_impl_name##*.}"
          fi

          # The first implementation is the reference; capture its canonical name.
          if [ -z "$REFERENCE_IMPL_CANONICAL" ]; then
              REFERENCE_IMPL_CANONICAL="$full_impl_name"
          fi

          output_file="${RESULTS_DIR}/${full_impl_name}.json"

          cmd=(python -m gss_tester.tests.runner
              "$module_name"
              "$class_name"
              --output "$output_file")
          echo "${cmd[*]}"
          if "${cmd[@]}"; then
              echo ">>> Finished test spec for: $full_impl_path"
          else
              exit_code=$?
              # Exit code 130 is from SIGINT (Ctrl+C)
              if [ $exit_code -eq 130 ]; then
                  echo
                  echo ">>> Test for $full_impl_path interrupted. Skipping."
              else
                  echo
                  echo ">>> Test for $full_impl_path failed with exit code $exit_code. Skipping."
              fi
          fi
      done
      echo
      echo "All test runs completed."
      echo "---"

      # --- Analyze Results ---
      echo "Analyzing results for consistency..."
      REFERENCE_RESULT_FILE="${RESULTS_DIR}/${REFERENCE_IMPL_CANONICAL}.json"

      # Check if the reference file was actually created
      if [ ! -f "$REFERENCE_RESULT_FILE" ]; then
          echo "Error: Reference result file was not generated: $REFERENCE_RESULT_FILE"
          echo "Skipping analysis."
          exit 1
      fi

      # Collect all generated JSON files for analysis
      ALL_RESULT_FILES=()
      while IFS= read -r -d $'\0' file; do
          ALL_RESULT_FILES+=("$file")
      done < <(find "$RESULTS_DIR" -maxdepth 1 -name '*.json' -print0)

      if [ ${#ALL_RESULT_FILES[@]} -eq 0 ]; then
          echo "No result files found for analysis. Skipping."
          exit 1
      fi

      cmd=(python -m gss_tester.tests.analyzer
          "${ALL_RESULT_FILES[@]}"
          --reference "$REFERENCE_RESULT_FILE")
      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Consistency analysis complete."
      echo "Reference: $REFERENCE_IMPL"
      echo "Summary printed above."
      echo "Full JSON results are in: $RESULTS_DIR"
    python/gss_tester/run_benches.sh: |
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benches.sh
      #
      # Orchestrates running GSS benchmark workloads across one or more implementations,
      # saving JSON results, and producing comparative analyses and plots.
      #
      # This script can be run from the `python` directory or the project root.
      # It also automates the C++ build process for pybind11 modules.
      #
      # Usage (Preset Mode):
      #   ./gss_tester/run_benches.sh <preset> <impl1> [impl2 ...] [-- [runner_args]]
      #
      # Usage (Sweep Mode for scaling analysis):
      #   ./gss_tester/run_benches.sh <preset> <impl> -- --sweep-workload <name> ...
      #
      # Notes:
      #   - Each implementation is specified as 'module.ClassName' or a .py path.
      #   - All arguments after the implementation list (or after a '--') are passed
      #     directly to the benchmark runner script.
      #
      # Examples:
      #   # Run 'small' preset workloads AND all predefined 'small' sweeps
      #   ./gss_tester/run_benches.sh small gss_tester.implementations.reference_impl.ReferenceGSS gss_tester.fast_impl.FastGSS
      #
      #   # Run workloads with 'push_scaling' in their name (substring match)
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --include push_scaling
      #
      #   # Run only the workload named exactly 'push_scaling'
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --only push_scaling
      #
      #   # Run a single manual scaling sweep (does not run other preset workloads/sweeps)
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --sweep-workload push_scaling --sweep-axis prefix_depth --sweep-values 10 50 100 200
      # ==============================================================================

      # --- Setup PYTHONPATH to find gss_tester ---
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      PYTHON_SRC_ROOT=$(dirname "$SCRIPT_DIR")
      export PYTHONPATH="${PYTHON_SRC_ROOT}:${PYTHONPATH:-}"

      if [ "$#" -lt 2 ]; then
        echo "Usage: $0 <preset> <impl1> [impl2 ...] [-- runner_args...]"
        exit 1
      fi

      PRESET="$1"
      shift

      # Collect implementations until we see a flag starting with '--' or we run out.
      IMPLS=()
      EXTRA_ARGS=()
      while (( "$#" )); do
        if [[ "$1" == "--" ]]; then
          shift # Consume the '--'
          EXTRA_ARGS=("$@")
          break
        elif [[ "$1" == --* ]]; then
          EXTRA_ARGS=("$@")
          break
        else
          IMPLS+=("$1")
        fi
        shift
      done

      if [ "${#IMPLS[@]}" -eq 0 ]; then
        echo "Error: No implementations provided."
        exit 1
      fi

      # Check if the user is asking for a manual sweep or providing workload filters.
      is_manual_sweep=false
      has_filtering_args=false
      for arg in "${EXTRA_ARGS[@]}"; do
        if [[ "$arg" == "--sweep-workload" ]]; then
          is_manual_sweep=true
        fi
        if [[ "$arg" == "--only" || "$arg" == "--include" || "$arg" == "--exclude" ]]; then
          has_filtering_args=true
        fi
      done

      RESULTS_DIR="$PYTHON_SRC_ROOT/gss_bench_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Preset: $PRESET"
      echo "Implementations: ${IMPLS[*]}"
      if [ "${#EXTRA_ARGS[@]}" -gt 0 ]; then
        echo "Extra args to runner: ${EXTRA_ARGS[*]}"
      fi
      echo "---"

      # --- Automated C++ Build Process ---
      if [ "${SKIP_CPP:-0}" == "1" ]; then
        echo "SKIP_CPP is set. Skipping C++ module build."
        echo "---"
      else
        echo "Automating C++ module build..."
        C_PLUS_PLUS_MODULES_DIR="$PYTHON_SRC_ROOT/aug25/models"
        C_PLUS_PLUS_BUILD_DIR="$C_PLUS_PLUS_MODULES_DIR/build"
        C_PLUS_PLUS_OUTPUT_DIR="$PYTHON_SRC_ROOT" # Compiled .so files go directly into python/

        echo "  Cleaning previous C++ build artifacts..."
        rm -rf "$C_PLUS_PLUS_BUILD_DIR"
        echo "  Configuring C++ build with CMake..."
        cmake -S "$C_PLUS_PLUS_MODULES_DIR" -B "$C_PLUS_PLUS_BUILD_DIR"
        echo "  Building C++ modules..."
        cmake --build "$C_PLUS_PLUS_BUILD_DIR"
        echo "  Copying compiled C++ modules to Python path..."
        find "$C_PLUS_PLUS_BUILD_DIR" -name "leveled_gss_cpp.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        find "$C_PLUS_PLUS_BUILD_DIR" -name "precompute3_engine.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        echo "C++ module build complete."
        echo "---"
      fi

      # --- Automated Rust Build Process ---
      if [ "${SKIP_RUST:-0}" == "1" ]; then
        echo "SKIP_RUST is set. Skipping Rust module build."
        echo "---"
      else
        echo "Automating Rust module build..."
        RUST_PROJECT_DIR="$PYTHON_SRC_ROOT/leveled_rs"
        if [ -d "$RUST_PROJECT_DIR" ]; then
          echo "  Building Rust modules with maturin..."
          # Assuming maturin is installed in the environment. 'maturin develop' builds and installs the wheel in the current venv.
          (cd "$RUST_PROJECT_DIR" && maturin develop)
          echo "Rust module build complete."
        else
          echo "Rust project directory not found at $RUST_PROJECT_DIR. Skipping build."
        fi
        echo "---"
      fi

      for full_impl_path in "${IMPLS[@]}"; do
        if [[ "$full_impl_path" == *.py ]]; then
          local_path="${full_impl_path#$PYTHON_SRC_ROOT/}" # Remove PYTHON_SRC_ROOT prefix if it exists
          module_name=$(echo "$local_path" | sed -e 's#\(\.py\)*$##' -e 's#/#.#g')
          base_name=$(basename "$full_impl_path" | sed 's#\(\.py\)*$##')
          class_name_base=$(echo "$base_name" | sed 's/_impl$//')
          class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
          full_impl_name="${module_name}.${class_name}"
        else
          full_impl_name="$full_impl_path"
          module_name="${full_impl_name%.*}"
          class_name="${full_impl_name##*.}"
        fi

        if $is_manual_sweep; then
          # --- Run Manual Sweep ---
          echo
          echo ">>> Running manual sweep for: $full_impl_path"
          output_file="${RESULTS_DIR}/${full_impl_name}.manual_sweep.json"
          cmd=(python -m gss_tester.benchmarks.runner
              "$module_name" "$class_name" --preset "$PRESET" --output "$output_file" "${EXTRA_ARGS[@]}")
          echo "${cmd[*]}"
          if "${cmd[@]}"; then
              echo ">>> Finished manual sweep for: $full_impl_path"
          else
              exit_code=$?
              [ $exit_code -eq 130 ] && echo ">>> Sweep for $full_impl_path interrupted." || echo ">>> Sweep for $full_impl_path failed."
          fi
        else
          # --- Run Preset Workloads ---
          echo
          echo ">>> Running preset workloads for: $full_impl_path"
          output_file_preset="${RESULTS_DIR}/${full_impl_name}.preset.json"
          preset_cmd=(python -m gss_tester.benchmarks.runner
              "$module_name" "$class_name" --preset "$PRESET" --output "$output_file_preset" "${EXTRA_ARGS[@]}")
          echo "${preset_cmd[*]}"
          if "${preset_cmd[@]}"; then
              echo ">>> Finished preset workloads for: $full_impl_path"
          else
              exit_code=$?
              [ $exit_code -eq 130 ] && echo ">>> Preset run for $full_impl_path interrupted." || echo ">>> Preset run for $full_impl_path failed."
          fi

          # --- Run Preset Sweeps (only if no filtering args are present) ---
          if $has_filtering_args; then
              echo
              echo ">>> Skipping preset sweeps due to filtering arguments (--only, --include, or --exclude)."
          else
              echo
              echo ">>> Checking for preset sweeps for preset '$PRESET'..."
              sweeps_to_run=$(python -m gss_tester.benchmarks.runner --preset "$PRESET" --list-sweeps)

              if [ -z "$sweeps_to_run" ]; then
              echo "No predefined sweeps for preset '$PRESET'."
              else
              # Use a while loop to read line by line (in case of multiple sweeps)
              while IFS=';' read -r workload axis values; do
                  echo
                  echo ">>> Running preset sweep for '$workload' on axis '$axis'"
                  output_file_sweep="${RESULTS_DIR}/${full_impl_name}.sweep.${workload}.${axis}.json"

                  sweep_cmd=(python -m gss_tester.benchmarks.runner
                      "$module_name"
                      "$class_name"
                      --preset "$PRESET"
                      --output "$output_file_sweep"
                      --sweep-workload "$workload"
                      --sweep-axis "$axis"
                      --sweep-values $values # No quotes to allow word splitting
                  )
                  echo "${sweep_cmd[*]}"
                  if "${sweep_cmd[@]}"; then
                      echo ">>> Finished sweep for: $workload"
                  else
                      exit_code=$?
                      [ $exit_code -eq 130 ] && echo ">>> Sweep for $workload interrupted." || echo ">>> Sweep for $workload failed."
                  fi
              done <<< "$sweeps_to_run"
              fi
          fi
        fi
      done

      echo
      echo "All benchmark runs completed."
      echo "---"

      # Analyze and plot
      echo "Analyzing results..."

      # Check if any result files were created before analyzing
      if [ -z "$(find "$RESULTS_DIR" -maxdepth 1 -name '*.json' -print -quit)" ]; then
          echo "No result files were generated. Skipping analysis."
      else
          cmd=(python -m gss_tester.benchmarks.analyzer
              "${RESULTS_DIR}"/*.json
              --outdir "${RESULTS_DIR}/analysis")
          echo "${cmd[*]}"
          "${cmd[@]}"

          if command -v realpath &> /dev/null; then
              RELATIVE_RESULTS_DIR=$(realpath --relative-to=. "$RESULTS_DIR")
          else
              RELATIVE_RESULTS_DIR="$RESULTS_DIR"
          fi

          echo
          echo "---"
          echo "Benchmark analysis complete."
          echo "Summary printed above. Plots and analysis are in: ${RELATIVE_RESULTS_DIR}/analysis"
          echo "Full JSON results are in: $RELATIVE_RESULTS_DIR"
      fi
    python/run_benchmarks.sh: |-
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benchmarks.sh
      #
      # A script to automate running benchmarks for multiple grammar constraint models,
      # generating JSON results and analysis plots. This script runs each model once
      # (no in-process reference/baseline). The analyzer is later told which result
      # is the baseline to perform mask comparisons.
      #
      # This script should be run from the project root directory.
      #
      # Usage:
      #   ./run_benchmarks.sh <baseline_model.py> <model1.py> [model2.py ...]
      #
      # Example:
      #   ./run_benchmarks.sh aug25/precompute2_model.py aug25/precompute3_model.py
      #
      # Environment Variables:
      #   CONSTRAINT_FILE: Path to the pre-compiled .json.gz constraint file.
      #                    (Default: ./.cache/test_vocabs/js_grammar_constraint.json.gz)
      #   CODE_FILE:    Path to the code file to use as input.
      #                 (Default: ./src/example_code.js)
      #   REPEAT:       Number of times to run each benchmark. (Default: 1)
      #   AGG_METHOD:   Aggregation method for analyzer (mean, median, min, max).
      #                 If unset, runs are plotted individually. (Default: "")
      # ==============================================================================

      # --- Configuration ---
      # Use environment variables if set, otherwise use defaults.
      : "${CONSTRAINT_FILE:="./.cache/test_vocabs/js_grammar_constraint.json.gz"}"
      : "${CODE_FILE:="./src/example_code.js"}"
      : "${SKIP_CPP_BUILD:=0}" # Set to 1 to disable C++ compilation
      : "${REPEAT:=1}"
      : "${AGG_METHOD:=""}"

      # --- PYTHONPATH setup ---
      # The script is run from the project root. The python modules are in the 'python' directory.
      # We add the 'python' directory to PYTHONPATH so that compiled extension modules (like leveled_gss_cpp)
      # can be found via top-level imports.
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      export PYTHONPATH="${SCRIPT_DIR}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage: $0 <baseline_model.py> <model1.py> [model2.py ...]"
          echo "Error: At least one model argument is required. The first is treated as the baseline."
          exit 1
      fi

      BASELINE_MODEL="$1"
      shift
      COMPETITORS=("$@")

      ALL_MODELS=("$BASELINE_MODEL" "${COMPETITORS[@]}")

      # Check that all provided files exist
      for file in "${ALL_MODELS[@]}"; do
          if [ ! -f "$file" ]; then
              echo "Error: Model file not found: $file"
              exit 1
          fi
      done
      if [ ! -f "$CONSTRAINT_FILE" ]; then
          echo "Error: Constraint file not found: $CONSTRAINT_FILE"
          exit 1
      fi
      if [ ! -f "$CODE_FILE" ]; then
          echo "Error: Code file not found: $CODE_FILE"
          exit 1
      fi


      # --- Setup ---
      # Create a unique directory for this benchmark run's results.
      RESULTS_DIR="benchmark_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Baseline Model: $BASELINE_MODEL"
      if [ "${#COMPETITORS[@]}" -gt 0 ]; then
        echo "Other Models: ${COMPETITORS[*]}"
      else
        echo "Other Models: (none)"
      fi
      echo "Constraint File: $CONSTRAINT_FILE"
      echo "Code: $CODE_FILE"
      echo "Repeat count: $REPEAT"
      if [[ -n "$AGG_METHOD" ]]; then
        echo "Aggregation: $AGG_METHOD"
      fi
      echo "---"


      if [[ "${SKIP_CPP_BUILD}" != "1" ]]; then
        # --- Automated C++ Build Process ---
        echo "Ensuring C++ extensions are built..."

        # Determine project root, assuming this script is in the 'python' directory.
        SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
        PROJECT_ROOT=$(dirname "$SCRIPT_DIR")

        # 1) Setup: download Boost headers locally and install pybind11
        BOOST_VERSION="1.83.0"
        BOOST_VER_UNDERSCORES="1_83_0"
        BOOST_DIR="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}"
        mkdir -p "${PROJECT_ROOT}/.build"

        if [ ! -d "$BOOST_DIR" ]; then
          BOOST_TGZ="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Downloading Boost ${BOOST_VERSION} headers..."
          curl -L -o "$BOOST_TGZ" "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Extracting Boost..."
          tar -C "${PROJECT_ROOT}/.build" -xzf "$BOOST_TGZ"
        fi

        echo "Installing pybind11..."
        python3 -m pip install --quiet pybind11

        # 2) Build the C++ extensions in place
        echo "Building C++ extensions..."

        # Compute extension suffix and includes via pybind11
        EXT_SUFFIX="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("EXT_SUFFIX") or ".so")')"
        PYBIND_INCLUDES="$(python3 -m pybind11 --includes)"
        CXX="${CXX:-c++}"
        CXXFLAGS="-O3 -DNDEBUG -march=native -flto -std=c++17 -shared -fPIC"
        LDFLAGS="-flto"
        if [[ "$(uname)" == "Darwin" ]]; then
          LDFLAGS="${LDFLAGS} -undefined dynamic_lookup"
        fi

        # Optional ASan (opt-in via SANITIZE=1 env var)
        if [[ "${SANITIZE:-0}" == "1" ]]; then
          echo "Building with AddressSanitizer (SANITIZE=1)"
          CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -std=c++17 -shared -fPIC"
          LDFLAGS="${LDFLAGS} -fsanitize=address"
        fi

        # Control C++ stats collection. Default to enabled.
        : "${ENABLE_CPP_STATS:=1}"
        if [[ "${ENABLE_CPP_STATS}" == "1" ]]; then
          echo "Building C++ with stats enabled (ENABLE_CPP_STATS=1)"
          CXXFLAGS="${CXXFLAGS} -DENABLE_STATS"
        else
          echo "Building C++ with stats disabled (ENABLE_CPP_STATS=0)"
        fi

        # Change to python directory to run build commands with relative paths
        ORIGINAL_CWD=$(pwd)
        cd "$SCRIPT_DIR"

        # Compile extensions. Paths are relative to the 'python' directory.
        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/icl_rangeset.cpp" -o "aug25/models/icl_rangeset${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/leveled_gss_py.cpp" -o "leveled_gss_cpp${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/precompute3_engine.cpp" -o "aug25/models/precompute3_engine${EXT_SUFFIX}" ${LDFLAGS}

        # Change back to original directory
        cd "$ORIGINAL_CWD"

        echo "Build complete."
        echo "---"
      else
        echo "Skipping C++ extension build (SKIP_CPP_BUILD=1)."
        echo "---"
      fi

      # --- Run Benchmarks ---
      echo "Starting benchmark runs..."
      # Define the ASAN library path at the top of the loop for clarity
      ASAN_LIB="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/17/lib/darwin/libclang_rt.asan_osx_dynamic.dylib"

      for model_to_benchmark in "${ALL_MODELS[@]}"; do
          echo
          echo ">>> Running benchmark for: $(basename "$model_to_benchmark")"
          cmd=(python -m python.aug25.benchmark_runner
              --code "$CODE_FILE"
              --constraint-file "$CONSTRAINT_FILE"
              --model "$model_to_benchmark"
              --output "$RESULTS_DIR"
              --repeat "$REPEAT")
          echo "${cmd[*]}"
          # Prepend the environment variable ONLY for the C++ model
          if [[ "$model_to_benchmark" == *"precompute3_model_cpp.py"* ]]; then
              echo ">>> Running with AddressSanitizer..."
              if DYLD_INSERT_LIBRARIES="$ASAN_LIB" "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$model_to_benchmark")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$model_to_benchmark") failed with exit code $exit_code. Skipping."
              fi
          else
              if "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$model_to_benchmark")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$model_to_benchmark") failed with exit code $exit_code. Skipping."
              fi
          fi
      done
      echo
      echo "All benchmark runs completed."
      echo "---"


      # --- Analyze Results ---
      echo "Analyzing results and generating plots..."
      PLOTS_DIR="${RESULTS_DIR}/analysis"
      BASELINE_STEM="$(basename "$BASELINE_MODEL" .py)"
      cmd=(python -m python.aug25.benchmark_analyzer
          "${RESULTS_DIR}"/*.json
          --baseline "$BASELINE_STEM"
          --output-dir "$PLOTS_DIR")

      if [[ -n "$AGG_METHOD" ]]; then
        cmd+=(--agg-method "$AGG_METHOD")
      fi

      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Benchmark analysis complete."
      echo "Baseline: $BASELINE_STEM"
      echo "Summary printed above. Plots are saved in: $PLOTS_DIR"
      echo "Full JSON results are in: $RESULTS_DIR"
    python/run_variations.sh: |
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_variations.sh
      #
      # A script to identify hot get_mask steps and evaluate model variations against
      # that hot point. It reuses the same build logic as run_benchmarks.sh and runs
      # a single model file with an internal list of variations.
      #
      # Usage:
      #   ./run_variations.sh <model.py>
      #
      # Example:
      #   ./run_variations.sh python/aug25/models/precompute3_model_pure_python_opt3.py
      #
      # Environment Variables:
      #   CONSTRAINT_FILE: Path to the pre-compiled .json.gz constraint file.
      #                    (Default: ./.cache/test_vocabs/js_grammar_constraint.json.gz)
      #   CODE_FILE:       Path to the code file to use as input. (Default: ./src/example_code.js)
      #   SKIP_CPP_BUILD:  Set to 1 to disable C++ compilation (Default: 0)
      #   DETECT_REPEAT:   Number of input passes to select hot step. (Default: 3)
      #   EVAL_REPEAT:     Number of repeated get_mask runs for evaluation. (Default: 10)
      #   AGG_METHOD:      Aggregation method (min, mean, median, max). (Default: max)
      #   METRIC:          Metric to optimize (edges_traversed | main_loop_ms). (Default: edges_traversed)
      #   HOT_STEPS:       Number of steps to consider hot (currently only the first is evaluated). (Default: 1)
      # ==============================================================================

      # --- Configuration ---
      : "${CONSTRAINT_FILE:="./.cache/test_vocabs/js_grammar_constraint.json.gz"}"
      : "${CODE_FILE:="./src/example_code.js"}"
      : "${SKIP_CPP_BUILD:=0}"
      : "${DETECT_REPEAT:=3}"
      : "${EVAL_REPEAT:=10}"
      : "${AGG_METHOD:=max}"
      : "${METRIC:=edges_traversed}"
      : "${HOT_STEPS:=1}"

      # --- PYTHONPATH setup ---
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      export PYTHONPATH="${SCRIPT_DIR}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage: $0 <model.py>"
          exit 1
      fi

      MODEL_FILE="$1"

      if [ ! -f "$MODEL_FILE" ]; then
          echo "Error: Model file not found: $MODEL_FILE"
          exit 1
      fi
      if [ ! -f "$CONSTRAINT_FILE" ]; then
          echo "Error: Constraint file not found: $CONSTRAINT_FILE"
          exit 1
      fi
      if [ ! -f "$CODE_FILE" ]; then
          echo "Error: Code file not found: $CODE_FILE"
          exit 1
      fi

      echo "Optimization coordinator"
      echo "---"
      echo "Model: $MODEL_FILE"
      echo "Constraint File: $CONSTRAINT_FILE"
      echo "Code: $CODE_FILE"
      echo "Detect repeats: $DETECT_REPEAT"
      echo "Eval repeats: $EVAL_REPEAT"
      echo "Agg method: $AGG_METHOD"
      echo "Metric: $METRIC"
      echo "Hot steps: $HOT_STEPS"
      echo "---"

      if [[ "${SKIP_CPP_BUILD}" != "1" ]]; then
        # --- Automated C++ Build Process ---
        echo "Ensuring C++ extensions are built..."

        # Determine project root, assuming this script is in the 'python' directory.
        SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
        PROJECT_ROOT=$(dirname "$SCRIPT_DIR")

        # 1) Setup: download Boost headers locally and install pybind11
        BOOST_VERSION="1.83.0"
        BOOST_VER_UNDERSCORES="1_83_0"
        BOOST_DIR="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}"
        mkdir -p "${PROJECT_ROOT}/.build"

        if [ ! -d "$BOOST_DIR" ]; then
          BOOST_TGZ="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Downloading Boost ${BOOST_VERSION} headers..."
          curl -L -o "$BOOST_TGZ" "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Extracting Boost..."
          tar -C "${PROJECT_ROOT}/.build" -xzf "$BOOST_TGZ"
        fi

        echo "Installing pybind11..."
        python3 -m pip install --quiet pybind11

        # 2) Build the C++ extensions in place
        echo "Building C++ extensions..."

        # Compute extension suffix and includes via pybind11
        EXT_SUFFIX="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("EXT_SUFFIX") or ".so")')"
        PYBIND_INCLUDES="$(python3 -m pybind11 --includes)"
        CXX="${CXX:-c++}"
        CXXFLAGS="-O3 -DNDEBUG -march=native -flto -std=c++17 -shared -fPIC"
        LDFLAGS="-flto"
        if [[ "$(uname)" == "Darwin" ]]; then
          LDFLAGS="${LDFLAGS} -undefined dynamic_lookup"
        fi

        # Optional ASan (opt-in via SANITIZE=1 env var)
        if [[ "${SANITIZE:-0}" == "1" ]]; then
          echo "Building with AddressSanitizer (SANITIZE=1)"
          CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -std=c++17 -shared -fPIC"
          LDFLAGS="${LDFLAGS} -fsanitize=address"
        fi

        # Control C++ stats collection. Default to enabled.
        : "${ENABLE_CPP_STATS:=1}"
        if [[ "${ENABLE_CPP_STATS}" == "1" ]]; then
          echo "Building C++ with stats enabled (ENABLE_CPP_STATS=1)"
          CXXFLAGS="${CXXFLAGS} -DENABLE_STATS"
        else
          echo "Building C++ with stats disabled (ENABLE_CPP_STATS=0)"
        fi

        # Change to python directory to run build commands with relative paths
        ORIGINAL_CWD=$(pwd)
        cd "$SCRIPT_DIR"

        # Compile extensions. Paths are relative to the 'python' directory.
        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/icl_rangeset.cpp" -o "aug25/models/icl_rangeset${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/leveled_gss_py.cpp" -o "leveled_gss_cpp${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/precompute3_engine.cpp" -o "aug25/models/precompute3_engine${EXT_SUFFIX}" ${LDFLAGS}

        # Change back to original directory
        cd "$ORIGINAL_CWD"

        echo "Build complete."
        echo "---"
      else
        echo "Skipping C++ extension build (SKIP_CPP_BUILD=1)."
        echo "---"
      fi

      echo "Starting optimization coordination..."
      RESULTS_DIR="variations_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      cmd=(python -m python.aug25.optimization_coordinator
          --constraint-file "$CONSTRAINT_FILE"
          --code "$CODE_FILE"
          --model "$MODEL_FILE"
          --detect-repeat "$DETECT_REPEAT"
          --eval-repeat "$EVAL_REPEAT"
          --agg-method "$AGG_METHOD"
          --metric "$METRIC"
          --hot-steps "$HOT_STEPS"
          --output "$RESULTS_DIR")
      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Optimization coordination complete. Results in: $RESULTS_DIR"
  prev_file_contents:
    python/gss_tester/run_tests.sh: |-
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_tests.sh
      #
      # A script to automate running the GSS test specification against multiple
      # implementations, generating JSON results, and analyzing them for consistency.
      #
      # This script can be run from the `python` directory or the project root.
      # It also automates the C++ build process for pybind11 modules.
      #
      # Usage:
      #   # From project root:
      #   ./python/gss_tester/run_tests.sh <reference_impl> <impl1> [impl2 ...]
      #
      #   # From python/ directory:
      #   ./gss_tester/run_tests.sh <reference_impl> <impl1> [impl2 ...]
      #
      # Each implementation is specified as 'path.to.module.ClassName' or a .py path.
      # ==============================================================================

      # --- Setup PYTHONPATH to find gss_tester ---
      # SCRIPT_DIR will be the absolute path to the directory containing this script.
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )

      # PYTHON_SRC_ROOT should be the absolute path to the 'python' directory.
      # If SCRIPT_DIR is /path/to/project/python/gss_tester, then PYTHON_SRC_ROOT is /path/to/project/python
      PYTHON_SRC_ROOT=$(dirname "$SCRIPT_DIR")
      export PYTHONPATH="${PYTHON_SRC_ROOT}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage: $0 <reference_impl> <impl1> [impl2 ...]"
          echo "Error: At least one implementation is required. The first is treated as the reference."
          exit 1
      fi

      REFERENCE_IMPL="$1"
      shift
      COMPETITORS=("$@")

      ALL_IMPLS=("$REFERENCE_IMPL" "${COMPETITORS[@]}")

      # --- Setup ---
      # Create a unique directory for this test run's results.
      RESULTS_DIR="$PYTHON_SRC_ROOT/gss_test_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Test results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Reference Implementation: $REFERENCE_IMPL"
      if [ "${#COMPETITORS[@]}" -gt 0 ]; then
        echo "Other Implementations: ${COMPETITORS[*]}"
      else
        echo "Other Implementations: (none)"
      fi
      echo "---"

      # --- Automated C++ Build Process ---
      if [ "${SKIP_CPP:-0}" == "1" ]; then
        echo "SKIP_CPP is set. Skipping C++ module build."
        echo "---"
      else
        echo "Automating C++ module build..."
        C_PLUS_PLUS_MODULES_DIR="$PYTHON_SRC_ROOT/aug25/models"
        C_PLUS_PLUS_BUILD_DIR="$C_PLUS_PLUS_MODULES_DIR/build"
        C_PLUS_PLUS_OUTPUT_DIR="$PYTHON_SRC_ROOT" # Compiled .so files go directly into python/

        # 1. Clean previous build artifacts
        echo "  Cleaning previous C++ build artifacts..."
        rm -rf "$C_PLUS_PLUS_BUILD_DIR"

        # 2. Configure the build using CMake
        echo "  Configuring C++ build with CMake..."
        cmake -S "$C_PLUS_PLUS_MODULES_DIR" -B "$C_PLUS_PLUS_BUILD_DIR"

        # 3. Build the C++ modules
        echo "  Building C++ modules..."
        cmake --build "$C_PLUS_PLUS_BUILD_DIR"

        # 4. Copy the compiled module to a location where Python can find it
        echo "  Copying compiled C++ modules to Python path..."
        # Find the exact name of the compiled shared library (e.g., leveled_gss_cpp.cpython-312-darwin.so)
        # and copy it to the PYTHON_SRC_ROOT.
        find "$C_PLUS_PLUS_BUILD_DIR" -name "leveled_gss_cpp.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        find "$C_PLUS_PLUS_BUILD_DIR" -name "precompute3_engine.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        echo "C++ module build complete."
        echo "---"
      fi

      # --- Automated Rust Build Process ---
      if [ "${SKIP_RUST:-0}" == "1" ]; then
        echo "SKIP_RUST is set. Skipping Rust module build."
        echo "---"
      else
        echo "Automating Rust module build..."
        RUST_PROJECT_DIR="$PYTHON_SRC_ROOT/leveled_rs"
        if [ -d "$RUST_PROJECT_DIR" ]; then
          echo "  Building Rust modules with maturin..."
          # Assuming maturin is installed in the environment. 'maturin develop' builds and installs the wheel in the current venv.
          (cd "$RUST_PROJECT_DIR" && maturin develop)
          echo "Rust module build complete."
        else
          echo "Rust project directory not found at $RUST_PROJECT_DIR. Skipping build."
        fi
        echo "---"
      fi

      # --- Run Tests ---
      echo "Starting test runs..."
      REFERENCE_IMPL_CANONICAL="" # Will be set to the canonical name of the reference impl
      for full_impl_path in "${ALL_IMPLS[@]}"; do
          echo
          echo ">>> Running test spec for: $full_impl_path"

          # --- Convert file path to module and class names ---
          # This logic handles both module paths (e.g., gss_tester.ref.RefGSS) and
          # file paths (e.g., python/gss_tester/reference_impl.py).
          if [[ "$full_impl_path" == *.py ]]; then
              # Handle file path: derive module and class name by convention.
              # Module name: strip path up to 'python/', remove '.py' suffix(es), replace '/' with '.'
              # The sed command needs to strip the PYTHON_SRC_ROOT prefix if present.
              local_path="${full_impl_path#$PYTHON_SRC_ROOT/}" # Remove PYTHON_SRC_ROOT prefix if it exists
              module_name=$(echo "$local_path" | sed -e 's#\(\.py\)*$##' -e 's#/#.#g')
              # Class name: e.g., 'reference_impl' -> 'ReferenceGSS'
              base_name=$(basename "$full_impl_path" | sed 's#\(\.py\)*$##')
              class_name_base=$(echo "$base_name" | sed 's/_impl$//')
              class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
              full_impl_name="${module_name}.${class_name}"
          else
              # Handle module.ClassName format
              full_impl_name="$full_impl_path"
              module_name="${full_impl_name%.*}"
              class_name="${full_impl_name##*.}"
          fi

          # The first implementation is the reference; capture its canonical name.
          if [ -z "$REFERENCE_IMPL_CANONICAL" ]; then
              REFERENCE_IMPL_CANONICAL="$full_impl_name"
          fi

          output_file="${RESULTS_DIR}/${full_impl_name}.json"

          cmd=(python -m gss_tester.tests.runner
              "$module_name"
              "$class_name"
              --output "$output_file")
          echo "${cmd[*]}"
          if "${cmd[@]}"; then
              echo ">>> Finished test spec for: $full_impl_path"
          else
              exit_code=$?
              # Exit code 130 is from SIGINT (Ctrl+C)
              if [ $exit_code -eq 130 ]; then
                  echo
                  echo ">>> Test for $full_impl_path interrupted. Skipping."
              else
                  echo
                  echo ">>> Test for $full_impl_path failed with exit code $exit_code. Skipping."
              fi
          fi
      done
      echo
      echo "All test runs completed."
      echo "---"

      # --- Analyze Results ---
      echo "Analyzing results for consistency..."
      REFERENCE_RESULT_FILE="${RESULTS_DIR}/${REFERENCE_IMPL_CANONICAL}.json"

      # Check if the reference file was actually created
      if [ ! -f "$REFERENCE_RESULT_FILE" ]; then
          echo "Error: Reference result file was not generated: $REFERENCE_RESULT_FILE"
          echo "Skipping analysis."
          exit 1
      fi

      # Collect all generated JSON files for analysis
      ALL_RESULT_FILES=()
      while IFS= read -r -d $'\0' file; do
          ALL_RESULT_FILES+=("$file")
      done < <(find "$RESULTS_DIR" -maxdepth 1 -name '*.json' -print0)

      if [ ${#ALL_RESULT_FILES[@]} -eq 0 ]; then
          echo "No result files found for analysis. Skipping."
          exit 1
      fi

      cmd=(python -m gss_tester.tests.analyzer
          "${ALL_RESULT_FILES[@]}"
          --reference "$REFERENCE_RESULT_FILE")
      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Consistency analysis complete."
      echo "Reference: $REFERENCE_IMPL"
      echo "Summary printed above."
      echo "Full JSON results are in: $RESULTS_DIR"
    python/gss_tester/run_benches.sh: |
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benches.sh
      #
      # Orchestrates running GSS benchmark workloads across one or more implementations,
      # saving JSON results, and producing comparative analyses and plots.
      #
      # This script can be run from the `python` directory or the project root.
      # It also automates the C++ build process for pybind11 modules.
      #
      # Usage (Preset Mode):
      #   ./gss_tester/run_benches.sh <preset> <impl1> [impl2 ...] [-- [runner_args]]
      #
      # Usage (Sweep Mode for scaling analysis):
      #   ./gss_tester/run_benches.sh <preset> <impl> -- --sweep-workload <name> ...
      #
      # Notes:
      #   - Each implementation is specified as 'module.ClassName' or a .py path.
      #   - All arguments after the implementation list (or after a '--') are passed
      #     directly to the benchmark runner script.
      #
      # Examples:
      #   # Run 'small' preset workloads AND all predefined 'small' sweeps
      #   ./gss_tester/run_benches.sh small gss_tester.implementations.reference_impl.ReferenceGSS gss_tester.fast_impl.FastGSS
      #
      #   # Run workloads with 'push_scaling' in their name (substring match)
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --include push_scaling
      #
      #   # Run only the workload named exactly 'push_scaling'
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --only push_scaling
      #
      #   # Run a single manual scaling sweep (does not run other preset workloads/sweeps)
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS -- --sweep-workload push_scaling --sweep-axis prefix_depth --sweep-values 10 50 100 200
      # ==============================================================================

      # --- Setup PYTHONPATH to find gss_tester ---
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      PYTHON_SRC_ROOT=$(dirname "$SCRIPT_DIR")
      export PYTHONPATH="${PYTHON_SRC_ROOT}:${PYTHONPATH:-}"

      if [ "$#" -lt 2 ]; then
        echo "Usage: $0 <preset> <impl1> [impl2 ...] [-- runner_args...]"
        exit 1
      fi

      PRESET="$1"
      shift

      # Collect implementations until we see a flag starting with '--' or we run out.
      IMPLS=()
      EXTRA_ARGS=()
      while (( "$#" )); do
        if [[ "$1" == "--" ]]; then
          shift # Consume the '--'
          EXTRA_ARGS=("$@")
          break
        elif [[ "$1" == --* ]]; then
          EXTRA_ARGS=("$@")
          break
        else
          IMPLS+=("$1")
        fi
        shift
      done

      if [ "${#IMPLS[@]}" -eq 0 ]; then
        echo "Error: No implementations provided."
        exit 1
      fi

      # Check if the user is asking for a manual sweep or providing workload filters.
      is_manual_sweep=false
      has_filtering_args=false
      for arg in "${EXTRA_ARGS[@]}"; do
        if [[ "$arg" == "--sweep-workload" ]]; then
          is_manual_sweep=true
        fi
        if [[ "$arg" == "--only" || "$arg" == "--include" || "$arg" == "--exclude" ]]; then
          has_filtering_args=true
        fi
      done

      RESULTS_DIR="$PYTHON_SRC_ROOT/gss_bench_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Preset: $PRESET"
      echo "Implementations: ${IMPLS[*]}"
      if [ "${#EXTRA_ARGS[@]}" -gt 0 ]; then
        echo "Extra args to runner: ${EXTRA_ARGS[*]}"
      fi
      echo "---"

      # --- Automated C++ Build Process ---
      if [ "${SKIP_CPP:-0}" == "1" ]; then
        echo "SKIP_CPP is set. Skipping C++ module build."
        echo "---"
      else
        echo "Automating C++ module build..."
        C_PLUS_PLUS_MODULES_DIR="$PYTHON_SRC_ROOT/aug25/models"
        C_PLUS_PLUS_BUILD_DIR="$C_PLUS_PLUS_MODULES_DIR/build"
        C_PLUS_PLUS_OUTPUT_DIR="$PYTHON_SRC_ROOT" # Compiled .so files go directly into python/

        echo "  Cleaning previous C++ build artifacts..."
        rm -rf "$C_PLUS_PLUS_BUILD_DIR"
        echo "  Configuring C++ build with CMake..."
        cmake -S "$C_PLUS_PLUS_MODULES_DIR" -B "$C_PLUS_PLUS_BUILD_DIR"
        echo "  Building C++ modules..."
        cmake --build "$C_PLUS_PLUS_BUILD_DIR"
        echo "  Copying compiled C++ modules to Python path..."
        find "$C_PLUS_PLUS_BUILD_DIR" -name "leveled_gss_cpp.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        find "$C_PLUS_PLUS_BUILD_DIR" -name "precompute3_engine.*.so" -exec cp {} "$C_PLUS_PLUS_OUTPUT_DIR" \;
        echo "C++ module build complete."
        echo "---"
      fi

      # --- Automated Rust Build Process ---
      if [ "${SKIP_RUST:-0}" == "1" ]; then
        echo "SKIP_RUST is set. Skipping Rust module build."
        echo "---"
      else
        echo "Automating Rust module build..."
        RUST_PROJECT_DIR="$PYTHON_SRC_ROOT/leveled_rs"
        if [ -d "$RUST_PROJECT_DIR" ]; then
          echo "  Building Rust modules with maturin..."
          # Assuming maturin is installed in the environment. 'maturin develop' builds and installs the wheel in the current venv.
          (cd "$RUST_PROJECT_DIR" && maturin develop)
          echo "Rust module build complete."
        else
          echo "Rust project directory not found at $RUST_PROJECT_DIR. Skipping build."
        fi
        echo "---"
      fi

      for full_impl_path in "${IMPLS[@]}"; do
        if [[ "$full_impl_path" == *.py ]]; then
          local_path="${full_impl_path#$PYTHON_SRC_ROOT/}" # Remove PYTHON_SRC_ROOT prefix if it exists
          module_name=$(echo "$local_path" | sed -e 's#\(\.py\)*$##' -e 's#/#.#g')
          base_name=$(basename "$full_impl_path" | sed 's#\(\.py\)*$##')
          class_name_base=$(echo "$base_name" | sed 's/_impl$//')
          class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
          full_impl_name="${module_name}.${class_name}"
        else
          full_impl_name="$full_impl_path"
          module_name="${full_impl_name%.*}"
          class_name="${full_impl_name##*.}"
        fi

        if $is_manual_sweep; then
          # --- Run Manual Sweep ---
          echo
          echo ">>> Running manual sweep for: $full_impl_path"
          output_file="${RESULTS_DIR}/${full_impl_name}.manual_sweep.json"
          cmd=(python -m gss_tester.benchmarks.runner
              "$module_name" "$class_name" --preset "$PRESET" --output "$output_file" "${EXTRA_ARGS[@]}")
          echo "${cmd[*]}"
          if "${cmd[@]}"; then
              echo ">>> Finished manual sweep for: $full_impl_path"
          else
              exit_code=$?
              [ $exit_code -eq 130 ] && echo ">>> Sweep for $full_impl_path interrupted." || echo ">>> Sweep for $full_impl_path failed."
          fi
        else
          # --- Run Preset Workloads ---
          echo
          echo ">>> Running preset workloads for: $full_impl_path"
          output_file_preset="${RESULTS_DIR}/${full_impl_name}.preset.json"
          preset_cmd=(python -m gss_tester.benchmarks.runner
              "$module_name" "$class_name" --preset "$PRESET" --output "$output_file_preset" "${EXTRA_ARGS[@]}")
          echo "${preset_cmd[*]}"
          if "${preset_cmd[@]}"; then
              echo ">>> Finished preset workloads for: $full_impl_path"
          else
              exit_code=$?
              [ $exit_code -eq 130 ] && echo ">>> Preset run for $full_impl_path interrupted." || echo ">>> Preset run for $full_impl_path failed."
          fi

          # --- Run Preset Sweeps (only if no filtering args are present) ---
          if $has_filtering_args; then
              echo
              echo ">>> Skipping preset sweeps due to filtering arguments (--only, --include, or --exclude)."
          else
              echo
              echo ">>> Checking for preset sweeps for preset '$PRESET'..."
              sweeps_to_run=$(python -m gss_tester.benchmarks.runner --preset "$PRESET" --list-sweeps)

              if [ -z "$sweeps_to_run" ]; then
              echo "No predefined sweeps for preset '$PRESET'."
              else
              # Use a while loop to read line by line (in case of multiple sweeps)
              while IFS=';' read -r workload axis values; do
                  echo
                  echo ">>> Running preset sweep for '$workload' on axis '$axis'"
                  output_file_sweep="${RESULTS_DIR}/${full_impl_name}.sweep.${workload}.${axis}.json"

                  sweep_cmd=(python -m gss_tester.benchmarks.runner
                      "$module_name"
                      "$class_name"
                      --preset "$PRESET"
                      --output "$output_file_sweep"
                      --sweep-workload "$workload"
                      --sweep-axis "$axis"
                      --sweep-values $values # No quotes to allow word splitting
                  )
                  echo "${sweep_cmd[*]}"
                  if "${sweep_cmd[@]}"; then
                      echo ">>> Finished sweep for: $workload"
                  else
                      exit_code=$?
                      [ $exit_code -eq 130 ] && echo ">>> Sweep for $workload interrupted." || echo ">>> Sweep for $workload failed."
                  fi
              done <<< "$sweeps_to_run"
              fi
          fi
        fi
      done

      echo
      echo "All benchmark runs completed."
      echo "---"

      # Analyze and plot
      echo "Analyzing results..."

      # Check if any result files were created before analyzing
      if [ -z "$(find "$RESULTS_DIR" -maxdepth 1 -name '*.json' -print -quit)" ]; then
          echo "No result files were generated. Skipping analysis."
      else
          cmd=(python -m gss_tester.benchmarks.analyzer
              "${RESULTS_DIR}"/*.json
              --outdir "${RESULTS_DIR}/analysis")
          echo "${cmd[*]}"
          "${cmd[@]}"

          if command -v realpath &> /dev/null; then
              RELATIVE_RESULTS_DIR=$(realpath --relative-to=. "$RESULTS_DIR")
          else
              RELATIVE_RESULTS_DIR="$RESULTS_DIR"
          fi

          echo
          echo "---"
          echo "Benchmark analysis complete."
          echo "Summary printed above. Plots and analysis are in: ${RELATIVE_RESULTS_DIR}/analysis"
          echo "Full JSON results are in: $RELATIVE_RESULTS_DIR"
      fi
    python/run_benchmarks.sh: |-
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benchmarks.sh
      #
      # A script to automate running benchmarks for multiple grammar constraint models,
      # generating JSON results and analysis plots. This script runs each model once
      # (no in-process reference/baseline). The analyzer is later told which result
      # is the baseline to perform mask comparisons.
      #
      # This script should be run from the project root directory.
      #
      # Usage:
      #   ./run_benchmarks.sh <baseline_model.py> <model1.py> [model2.py ...]
      #
      # Example:
      #   ./run_benchmarks.sh aug25/precompute2_model.py aug25/precompute3_model.py
      #
      # Environment Variables:
      #   CONSTRAINT_FILE: Path to the pre-compiled .json.gz constraint file.
      #                    (Default: ./.cache/test_vocabs/js_grammar_constraint.json.gz)
      #   CODE_FILE:    Path to the code file to use as input.
      #                 (Default: ./src/example_code.js)
      #   REPEAT:       Number of times to run each benchmark. (Default: 1)
      #   AGG_METHOD:   Aggregation method for analyzer (mean, median, min, max).
      #                 If unset, runs are plotted individually. (Default: "")
      # ==============================================================================

      # --- Configuration ---
      # Use environment variables if set, otherwise use defaults.
      : "${CONSTRAINT_FILE:="./.cache/test_vocabs/js_grammar_constraint.json.gz"}"
      : "${CODE_FILE:="./src/example_code.js"}"
      : "${SKIP_CPP_BUILD:=0}" # Set to 1 to disable C++ compilation
      : "${SKIP_RUST:=0}" # Set to 1 to disable Rust compilation
      : "${REPEAT:=1}"
      : "${AGG_METHOD:=""}"

      # --- PYTHONPATH setup ---
      # The script is run from the project root. The python modules are in the 'python' directory.
      # We add the 'python' directory to PYTHONPATH so that compiled extension modules (like leveled_gss_cpp)
      # can be found via top-level imports.
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      export PYTHONPATH="${SCRIPT_DIR}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage: $0 <baseline_model.py> <model1.py> [model2.py ...]"
          echo "Error: At least one model argument is required. The first is treated as the baseline."
          exit 1
      fi

      BASELINE_MODEL="$1"
      shift
      COMPETITORS=("$@")

      ALL_MODELS=("$BASELINE_MODEL" "${COMPETITORS[@]}")

      # Check that all provided files exist
      for file in "${ALL_MODELS[@]}"; do
          if [ ! -f "$file" ]; then
              echo "Error: Model file not found: $file"
              exit 1
          fi
      done
      if [ ! -f "$CONSTRAINT_FILE" ]; then
          echo "Error: Constraint file not found: $CONSTRAINT_FILE"
          exit 1
      fi
      if [ ! -f "$CODE_FILE" ]; then
          echo "Error: Code file not found: $CODE_FILE"
          exit 1
      fi


      # --- Setup ---
      # Create a unique directory for this benchmark run's results.
      RESULTS_DIR="benchmark_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Baseline Model: $BASELINE_MODEL"
      if [ "${#COMPETITORS[@]}" -gt 0 ]; then
        echo "Other Models: ${COMPETITORS[*]}"
      else
        echo "Other Models: (none)"
      fi
      echo "Constraint File: $CONSTRAINT_FILE"
      echo "Code: $CODE_FILE"
      echo "Repeat count: $REPEAT"
      if [[ -n "$AGG_METHOD" ]]; then
        echo "Aggregation: $AGG_METHOD"
      fi
      echo "---"


      if [[ "${SKIP_CPP_BUILD}" != "1" ]]; then
        # --- Automated C++ Build Process ---
        echo "Ensuring C++ extensions are built..."

        # Determine project root, assuming this script is in the 'python' directory.
        SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
        PROJECT_ROOT=$(dirname "$SCRIPT_DIR")

        # 1) Setup: download Boost headers locally and install pybind11
        BOOST_VERSION="1.83.0"
        BOOST_VER_UNDERSCORES="1_83_0"
        BOOST_DIR="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}"
        mkdir -p "${PROJECT_ROOT}/.build"

        if [ ! -d "$BOOST_DIR" ]; then
          BOOST_TGZ="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Downloading Boost ${BOOST_VERSION} headers..."
          curl -L -o "$BOOST_TGZ" "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Extracting Boost..."
          tar -C "${PROJECT_ROOT}/.build" -xzf "$BOOST_TGZ"
        fi

        echo "Installing pybind11..."
        python3 -m pip install --quiet pybind11

        # 2) Build the C++ extensions in place
        echo "Building C++ extensions..."

        # Compute extension suffix and includes via pybind11
        EXT_SUFFIX="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("EXT_SUFFIX") or ".so")')"
        PYBIND_INCLUDES="$(python3 -m pybind11 --includes)"
        CXX="${CXX:-c++}"
        CXXFLAGS="-O3 -DNDEBUG -march=native -flto -std=c++17 -shared -fPIC"
        LDFLAGS="-flto"
        if [[ "$(uname)" == "Darwin" ]]; then
          LDFLAGS="${LDFLAGS} -undefined dynamic_lookup"
        fi

        # Optional ASan (opt-in via SANITIZE=1 env var)
        if [[ "${SANITIZE:-0}" == "1" ]]; then
          echo "Building with AddressSanitizer (SANITIZE=1)"
          CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -std=c++17 -shared -fPIC"
          LDFLAGS="${LDFLAGS} -fsanitize=address"
        fi

        # Control C++ stats collection. Default to enabled.
        : "${ENABLE_CPP_STATS:=1}"
        if [[ "${ENABLE_CPP_STATS}" == "1" ]]; then
          echo "Building C++ with stats enabled (ENABLE_CPP_STATS=1)"
          CXXFLAGS="${CXXFLAGS} -DENABLE_STATS"
        else
          echo "Building C++ with stats disabled (ENABLE_CPP_STATS=0)"
        fi

        # Change to python directory to run build commands with relative paths
        ORIGINAL_CWD=$(pwd)
        cd "$SCRIPT_DIR"

        # Compile extensions. Paths are relative to the 'python' directory.
        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/icl_rangeset.cpp" -o "aug25/models/icl_rangeset${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/leveled_gss_py.cpp" -o "leveled_gss_cpp${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/precompute3_engine.cpp" -o "aug25/models/precompute3_engine${EXT_SUFFIX}" ${LDFLAGS}

        # Change back to original directory
        cd "$ORIGINAL_CWD"

        echo "Build complete."
        echo "---"
      else
        echo "Skipping C++ extension build (SKIP_CPP_BUILD=1)."
        echo "---"
      fi

      # --- Automated Rust Build Process ---
      if [ "${SKIP_RUST:-0}" == "1" ]; then
        echo "SKIP_RUST is set. Skipping Rust module build."
        echo "---"
      else
        echo "Automating Rust module build..."
        RUST_PROJECT_DIR="$SCRIPT_DIR/leveled_rs"
        if [ -d "$RUST_PROJECT_DIR" ]; then
          echo "  Building Rust modules with maturin..."
          # Assuming maturin is installed in the environment. 'maturin develop' builds and installs the wheel in the current venv.
          (cd "$RUST_PROJECT_DIR" && maturin develop)
          echo "Rust module build complete."
        else
          echo "Rust project directory not found at $RUST_PROJECT_DIR. Skipping build."
        fi
        echo "---"
      fi

      # --- Run Benchmarks ---
      echo "Starting benchmark runs..."
      # Define the ASAN library path at the top of the loop for clarity
      ASAN_LIB="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/17/lib/darwin/libclang_rt.asan_osx_dynamic.dylib"

      for model_to_benchmark in "${ALL_MODELS[@]}"; do
          echo
          echo ">>> Running benchmark for: $(basename "$model_to_benchmark")"
          cmd=(python -m python.aug25.benchmark_runner
              --code "$CODE_FILE"
              --constraint-file "$CONSTRAINT_FILE"
              --model "$model_to_benchmark"
              --output "$RESULTS_DIR"
              --repeat "$REPEAT")
          echo "${cmd[*]}"
          # Prepend the environment variable ONLY for the C++ model
          if [[ "$model_to_benchmark" == *"precompute3_model_cpp.py"* ]]; then
              echo ">>> Running with AddressSanitizer..."
              if DYLD_INSERT_LIBRARIES="$ASAN_LIB" "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$model_to_benchmark")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$model_to_benchmark") failed with exit code $exit_code. Skipping."
              fi
          else
              if "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$model_to_benchmark")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$model_to_benchmark") failed with exit code $exit_code. Skipping."
              fi
          fi
      done
      echo
      echo "All benchmark runs completed."
      echo "---"


      # --- Analyze Results ---
      echo "Analyzing results and generating plots..."
      PLOTS_DIR="${RESULTS_DIR}/analysis"
      BASELINE_STEM="$(basename "$BASELINE_MODEL" .py)"
      cmd=(python -m python.aug25.benchmark_analyzer
          "${RESULTS_DIR}"/*.json
          --baseline "$BASELINE_STEM"
          --output-dir "$PLOTS_DIR")

      if [[ -n "$AGG_METHOD" ]]; then
        cmd+=(--agg-method "$AGG_METHOD")
      fi

      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Benchmark analysis complete."
      echo "Baseline: $BASELINE_STEM"
      echo "Summary printed above. Plots are saved in: $PLOTS_DIR"
      echo "Full JSON results are in: $RESULTS_DIR"
    python/run_variations.sh: |
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_variations.sh
      #
      # A script to identify hot get_mask steps and evaluate model variations against
      # that hot point. It reuses the same build logic as run_benchmarks.sh and runs
      # a single model file with an internal list of variations.
      #
      # Usage:
      #   ./run_variations.sh <model.py>
      #
      # Example:
      #   ./run_variations.sh python/aug25/models/precompute3_model_pure_python_opt3.py
      #
      # Environment Variables:
      #   CONSTRAINT_FILE: Path to the pre-compiled .json.gz constraint file.
      #                    (Default: ./.cache/test_vocabs/js_grammar_constraint.json.gz)
      #   CODE_FILE:       Path to the code file to use as input. (Default: ./src/example_code.js)
      #   SKIP_CPP_BUILD:  Set to 1 to disable C++ compilation (Default: 0)
      #   SKIP_RUST:       Set to 1 to disable Rust compilation (Default: 0)
      #   DETECT_REPEAT:   Number of input passes to select hot step. (Default: 3)
      #   EVAL_REPEAT:     Number of repeated get_mask runs for evaluation. (Default: 10)
      #   AGG_METHOD:      Aggregation method (min, mean, median, max). (Default: max)
      #   METRIC:          Metric to optimize (edges_traversed | main_loop_ms). (Default: edges_traversed)
      #   HOT_STEPS:       Number of steps to consider hot (currently only the first is evaluated). (Default: 1)
      # ==============================================================================

      # --- Configuration ---
      : "${CONSTRAINT_FILE:="./.cache/test_vocabs/js_grammar_constraint.json.gz"}"
      : "${CODE_FILE:="./src/example_code.js"}"
      : "${SKIP_CPP_BUILD:=0}"
      : "${SKIP_RUST:=0}"
      : "${DETECT_REPEAT:=3}"
      : "${EVAL_REPEAT:=10}"
