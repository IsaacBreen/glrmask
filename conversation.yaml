      def lower_to_upper(l: Lower[T], acc: Acc) -> Upper[T, Acc]:
          # Convert a Lower subtree to an Upper subtree; the accumulator for all stacks is 'acc'.
          children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
          for v, kids in l.children.items():
