      We will:

      1. Intern all `Weight` values into small integer IDs (`u32`), using a collision-safe hash-bucket scheme.
      2. For each state, group its outgoing transitions once by `(ArcLabel, weight_id)`. This produces per-state "edge groups" of the form:

         - label: `ArcLabel`
         - weight_id: `u32`
         - dests: `Vec<NWAStateID>`

      3. In each refinement iteration, for each state, we:
         - Convert each group’s `dests` to class IDs using the current `partition.classes`.
         - Sort and deduplicate those class IDs (matching the old `BTreeSet`).
         - Build `NwaTransitionSig` from these, sort them, and build `NwaStateSignature`.
         - Use `NwaStateSignature` as before to refine the partition.

      Mathematically, this is equivalent to the current implementation, because the state signature is still the same function of:

      - The state’s final weight, and
      - For each `(label, weight)` pair, the set of destination classes.

      We only change *how* that function is computed (more efficiently), not *what* it returns.

      ### 2. Change `NwaTransitionSig` to use a compact `weight_id` instead of `Weight`

      In `simplification.rs`, locate the NWA minimization section:

      ```rust
