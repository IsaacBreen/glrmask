          FExtractCheck: FnMut(&EK) -> Option<()>,
          FBuildKey: FnMut(isize, Option<()>) -> EK,
          FIntersect: FnMut(Option<()>, Option<()>) -> Option<()>,
          FMergeEV: FnMut(&mut EV, EV),
      {
