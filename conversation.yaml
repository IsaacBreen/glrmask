      def _env_flag(name: str, default: bool = False) -> bool:
          v = os.environ.get(name)
          if v is None:
              return default
          return v not in ("", "0", "false", "False", "no", "NO")


      def _env_float(name: str, default: float) -> float:
          v = os.environ.get(name)
          try:
              return float(v) if v is not None else default
          except Exception:
              return default


      @dataclass
      class GSSStats:
          heads: int
          empty_stacks: int
          unique_stacks: int
          accs: int
          depth_min: int
          depth_max: int
          depth_mean: float

          def brief(self) -> str:
