              let none_edges_snapshot: Vec<(PrecomputeNode1Index, LLMTokenBV)> = {
                  let g = u.read(trie1_god).expect("read");
                  match g.children().get(&None) {
                      Some(dm) => dm.iter().map(|(d, bv)| (*d, bv.clone())).collect(),
