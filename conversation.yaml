      pub struct DedupValueMap<K, V>
      where
          K: Ord + Clone + Eq,
          V: Clone + Eq + std::hash::Hash,
      {
          key_to_id: BTreeMap<K, usize>,
          id_to_value: BTreeMap<usize, V>,
