              let simplified_leaves = simplify_gss_forest(&[l1_v1, l1_v2, l2_v1, l2_v2]);
              assert!(Arc::ptr_eq(&s_l1_from_n, &simplified_leaves[0]));
              assert!(Arc::ptr_eq(&s_l1_from_n, &simplified_leaves[1]));
              assert!(Arc::ptr_eq(&s_l2_from_n, &simplified_leaves[2]));
