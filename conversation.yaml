      filename: src/constraint.rs
  - user: |-
      We need to rethink the way we decide what are eligible destination nodes in `dfs`.
      For the two cases where we're making edges to end nodes, we don't need to worry, really. End nodes can't be part of a cycle.
      It's the case in-between that's risky. There, we try two sets of nodes:
      - children
      - nodes in queue
      and then resort to a new node if no eligible destination is found.
      The conditions under which children and nodes in queue are eligible is the critical part.
      Too loose and we risk creating a cycle. Too narrow and we'll bloat the tree.
      And we need the conditions to be performant, as well. No point having exhaustive conditions that slow `dfs` down to the point where it's unusable.

      What are those conditions?
      Right now, we require that neither destination is an end node. For the nodes in queue, that's it. For children, there's an additional requirements that the destination's alive LLM tokens is disjoint from the LLM tokens on the edge we're adding.
      I've realized now these conditions are inadequate. They're too narrow. They can create cycles.

      Here's some new conditions. I'll put performance aside somewhat here, so we can establish theoretical aims.

      One of the key issues with the current conditions is that **alive LLM tokens on a node is a union over *incoming* edges, not *outgoing* edges**.
      It is actually possible to have a LLM token on an outgoing edge that isn't in any of the incoming edges (and therefore isn't in the node's alive LLM tokens). Think about it. `possible_matches` plays a role here.

      What we want, basically, is for alive LLM tokens at a node to represent tokens that are *actually reachable* from one of the root nodes of the tree.
      Reachable from a root means that there's a path along edges where every one of those edges has that LLM token on it.
      In a sense, LLM tokens 'propogate' across edges - conditionally on the LLM token being in the edge's LLM token mask.

      We want to ensure these propogations always take place and are live and up-to-date.

      If we were being really pedantic, we might define a map from LLM token to a set of positions, and enforce a rule that the set of positions for any one LLM token cannot exceed size 1. But actually isn't necessary or desirable. (Too slow.)
      Instead, we just enforce that we can't make an edge that'd carry a LLM token to a destination node, unless that LLM token is effectively in the same position on that destination node.
      What does it means to be *at the same position*? In the dfs context, it means we're at the same vocab node, processing the same segment, and are at the same position in that segment.
      If this is the case, then we don't need to check the alive tokens. Indeed, that's the setup we have right now. We don't check live tokens when trying existing destinations in the work queue.

      So what *is* the difference, then? Well, propogation, basically.
      We need to ensure that alive LLM tokens are always propogated across the tree.

      In fact... as LLM tokens propogate, we could get further classes.
      eg imagine an LLM token propogates to a node where that token is *already* alive.
      At any such point, we need to ensure that the already-alive LLM token is in the same position as the one we're adding.
      How can we do this?
      Well, we can track, for each node, a map from tokenizer state ID to position to LLM token bitvec that tells us which LLM tokens are alive at that node in that tokenizer state ID at that position.
      (Tokenizer state ID will probably always be the initial state, but leave it in there for now.)
      And we'll define this map in the same place as the work queue. ie it's tied to a particular segment processing.

      If the LLM token already exists in the map at that tsid and pos, then it's ok, the existing alive LLM token really does match the one we're propogating.
      If there's no entry in the map for the tsid/pos, or if there is an entry but it doesn't include that LLM token, then it's not the exact same LLM token state/pos as the one we're propogating. Hence, we can't add this edge.
      We must make sure no propogation changes are made until we're sure the edge addition is valid. Or that any that are made are undone. Whichever is easier.

      As long as we propogate like this, and do these checks, everything else should just work. ie the children dest condition remains the same (sort of - with propogation).
      The condition for trying already-queued items as destinations will need to change. It'll be the same, essentially, as the condition for children.


      ...

      Or, alternative...
      What if we just require narrowing of edge bitvec with source node's bitvec.
      Actually, that's what we do now, right? ie with `merge_edge_value_and_source_node_value` passed as `|ev, t| *ev &= &t.live_tokens`.
      So we can't have this nasty situation where there's an outgoing edge with a LLM token that has no incoming edge.

      OK I'VE GOT IT
      Scrap everything I said previously.
      This is what we're going to do:

      Each work queue item is going to be valid only for specific LLM tokens. NOT just the alive LLM tokens at that node. It'll actually be a subset of them.
      Each time we make an edge to a work queue item, we add that edge's LLM tokens to the work queue item's LLM tokens.
      ~~When filtering existing work queue items for potential destination tries, take the three-way intersection of the edge LLM tokens, the alive LLM tokens at the potential dest, and the work queue item's LLM tokens. Actually, since the work queue item's LLM tokens is a subset of the node's alive LLM tokens, we can just take the intersection of the edge LLM tokens and the work queue item's LLM tokens.~~
      Wait no, scratch that.
      When filtering existing work queue items for potential destination tries, take the edge LLM tokens and subtact the work queue item's LLM tokens. These are the risky LLM tokens. If any of these are also in the dest's alive LLM tokens, then we may have a problem. These tokens are alive at the node, but we don't know how they got there. Don't proceed. Otherwise, it's ok, and we can try this dest.

      ...

      I want to try keep trie.rs generic, not too specific.

      Implement this. Ensure it's correct.
