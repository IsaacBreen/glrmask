              let final_mask_mapped = self.parent.internal_bv_to_original(&final_mask_internal.into_inner());

              crate::debug!(2, "Done computing mask");
              let t1 = std::time::Instant::now();
              println!("get_mask took: {:>15?}", t1.duration_since(t0));

