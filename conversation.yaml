      use std::cmp::Ordering;
      use crate::datastructures::trie::Trie;
      use crate::finite_automata::Regex;
      use crate::glr::parser::ParseStateNodeContent;
      use crate::glr::parser::{MergeAndIntersect, GLRParser, GLRParserState, ParseState, ParseStateKey};
      use crate::tokenizer::{LLMTokenID, LLMTokenMap, TokenizerStateID};
      use bimap::BiBTreeMap;
      use bitvec::prelude::BitVec;
      use bitvec::prelude::*;
      use std::collections::{BTreeMap, BTreeSet, HashMap};
      use std::ops::BitOr;
      use std::sync::{Arc, Mutex, MutexGuard};
      use bitvec::macros::internal::funty::Fundamental;
      use keyed_priority_queue::KeyedPriorityQueue;
      use crate::constraint_extra::print_finalizer;
      use crate::datastructures::charmap::TrieMap;
      use crate::datastructures::gss::prune_and_transform_recursive;
      use crate::datastructures::vocab_prefix_tree::{VocabPrefixTree, VocabPrefixTreeNode};
      use crate::types::{TerminalID as GrammarTokenID, TerminalID};

      pub type LLMTokenBV = BitVec;
      pub type GrammarTokenBV = BitVec;

      #[derive(Default, Debug, Clone)]
      pub struct PrecomputedFinalizer {
          pub(crate) content: BTreeMap<TokenizerStateID, LLMTokenBV>,
      }

      impl PrecomputedFinalizer {
          pub(crate) fn new(compatible_llm_tokens: LLMTokenBV, tokenizer_state_id: TokenizerStateID) -> Self {
              let content = BTreeMap::from([(tokenizer_state_id, compatible_llm_tokens)]);
              Self { content }
          }
      }

      #[derive(Default, Debug, Clone)]
      pub(crate) struct PrecomputedNodeContents {
          finalizers: BTreeMap<GrammarTokenID, PrecomputedFinalizer>,
          pub(crate) clean_end: Option<LLMTokenBV>,
      }

      pub(crate) type PrecomputeNode = Trie<Option<GrammarTokenID>, LLMTokenBV, PrecomputedNodeContents>;
      pub(crate) type Precomputed = BTreeMap<TokenizerStateID, PrecomputeNode>;

      /// Holds the set of active LLM tokens and the intersection of tokens
      /// guaranteed to be possible in all paths *below* this GSS node.
      #[derive(Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct LLMTokenInfo {
          /// Union of possible LLM tokens allowed by paths reaching this node.
          pub active: LLMTokenBV,
          /// Intersection of LLM tokens guaranteed by *all* paths descending from this node.
          /// Used for optimization during commit.
          pub intersection: LLMTokenBV,
      }

      impl Default for LLMTokenInfo {
          fn default() -> Self {
              Self { active: Default::default(), intersection: Default::default() }
          }
      }

      impl std::fmt::Debug for LLMTokenInfo {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              const MAX_ITEMS: usize = 10;

              let format_bv = |bv: &LLMTokenBV| -> String {
                  let ids: Vec<_> = bv.iter_ones().collect();
                  if ids.len() > MAX_ITEMS {
                      format!("[{:?}... ({} total)]", &ids[..MAX_ITEMS], ids.len())
                  } else {
                      format!("{:?}", ids)
                  }
              };

              f.debug_struct("LLMTokenInfo")
                  .field("active", &format_args!("{}", format_bv(&self.active)))
                  .field(
                      "intersection",
                      &format_args!("{}", format_bv(&self.intersection)),
                  )
                  .finish()
          }
      }


      #[derive(Debug, Clone)] // Removed pub(crate) as it's likely used externally
      pub struct GrammarConstraint {
          pub(crate) tokenizer: Regex,
          pub(crate) parser: GLRParser,
          pub(crate) precomputed: Precomputed,
          pub(crate) llm_token_map: BiBTreeMap<Vec<u8>, LLMTokenID>,
          pub(crate) max_llm_token_id: usize,
      }

      #[derive(Debug, Clone)]
      pub struct GrammarConstraintState<'a> {
          pub(crate) parent: &'a GrammarConstraint,
          pub(crate) state: BTreeMap<TokenizerStateID, GLRParserState<'a, LLMTokenInfo>>,
      }

      impl MergeAndIntersect for LLMTokenInfo {
          fn merge(&self, other: &Self) -> Self {
              // Merge: Active tokens are unioned, Intersection tokens are intersected.
              Self {
                  active: self.active.clone() | other.active.clone(),
                  intersection: self.intersection.clone() & other.intersection.clone(),
              }
          }
          fn intersect(&self, other: &Self) -> Self {
              // Intersect: Active tokens are intersected, Intersection is also intersected.
              Self {
                  active: self.active.clone() & other.active.clone(),
                  intersection: self.intersection.clone() & other.intersection.clone(),
              }
          }
      }

      impl PrecomputedNodeContents {
          pub(crate) fn finalizers(&self) -> &BTreeMap<GrammarTokenID, PrecomputedFinalizer> { &self.finalizers }

          /// Adds information about a final state reachable via a specific grammar token.
          /// If an entry for the grammar token already exists, it merges the information.
          pub fn push_finalizer_info(&mut self, possible_final_grammar_token: GrammarTokenID, llm_token_id: LLMTokenID, tokenizer_state_id: TokenizerStateID, max_llm_token_id: usize) {
              let mut current_compatible_llm_tokens = LLMTokenBV::repeat(false, max_llm_token_id + 1);
              current_compatible_llm_tokens.set(llm_token_id.0, true);

              self.finalizers.entry(possible_final_grammar_token)
                  .and_modify(|existing_finalizer| {
                      existing_finalizer.content.entry(tokenizer_state_id).and_modify(|existing_llm_tokens| {
                          *existing_llm_tokens |= &current_compatible_llm_tokens;
                      }).or_insert(current_compatible_llm_tokens.clone());
                  })
                  .or_insert_with(|| PrecomputedFinalizer::new(current_compatible_llm_tokens, tokenizer_state_id));
          }
      }

      impl GrammarConstraint {
          pub fn new(
              tokenizer: Regex,
              parser: GLRParser,
              llm_token_map: LLMTokenMap,
              max_llm_token_id: usize
          ) -> Self {
              let precomputed = GrammarConstraint::precompute(&tokenizer, &llm_token_map, max_llm_token_id);
              Self {
                  tokenizer,
                  parser,
                  precomputed,
                  llm_token_map,
                  max_llm_token_id,
              }
          }

          pub fn precompute<'a>(
              tokenizer: &Regex,
              llm_token_map: &BiBTreeMap<Vec<u8>, LLMTokenID>,
              max_llm_token_id: usize,
          ) -> Precomputed {
              #[derive(Debug, Copy, Clone, Eq, PartialEq)]
              struct DottedVocabNode<'a> {
                  src: &'a VocabPrefixTreeNode,
                  dst: &'a VocabPrefixTreeNode,
                  bytes: &'a [u8],
                  offset: usize,
              }
              impl<'a> Ord for DottedVocabNode<'a> {
                  fn cmp(&self, other: &Self) -> Ordering {
                      let self_primary_key = self.src.prefix_length() + self.offset;
                      let other_primary_key = other.src.prefix_length() + other.offset;
                      (self_primary_key, self.src, self.bytes).cmp(&(other_primary_key, other.src, other.bytes))
                  }
              }
              impl<'a> PartialOrd for DottedVocabNode<'a> {
                  fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
                      Some(self.cmp(other))
                  }
              }

              // ----  Ord-capable handle for `Arc<Mutex<PrecomputeNode>>` --------------------------
              // `Arc<Mutex<PrecomputeNode>>` cannot live in a `BTreeSet` because `Mutex<T>` lacks
              // an `Ord` implementation.  We wrap it and order by the (stable) pointer address.
              #[derive(Clone)]
              struct NodeHandle(Arc<Mutex<PrecomputeNode>>);

              use std::ops::Deref;
              impl Deref for NodeHandle {
                  type Target = Arc<Mutex<PrecomputeNode>>;
                  fn deref(&self) -> &Self::Target {
                      &self.0
                  }
              }
              impl PartialEq for NodeHandle {
                  fn eq(&self, other: &Self) -> bool {
                      Arc::ptr_eq(&self.0, &other.0)
                  }
              }
              impl Eq for NodeHandle {}
              impl PartialOrd for NodeHandle {
                  fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
                      Some(self.cmp(other))
                  }
              }
              impl Ord for NodeHandle {
                  fn cmp(&self, other: &Self) -> Ordering {
                      (Arc::as_ptr(&self.0) as usize).cmp(&(Arc::as_ptr(&other.0) as usize))
                  }
              }
              // ------------------------------------------------------------------------------------

              // Create the vocab prefix tree.
              let mut tokens_for_vocab_prefix_tree_builder: Vec<(usize, Vec<u8>)> = vec![];
              for (content, id) in llm_token_map {
                  tokens_for_vocab_prefix_tree_builder.push((id.0, content.clone()));
              }
              crate::debug!(2, "Building vocab prefix tree");
              let vocab_prefix_tree = VocabPrefixTree::build(&tokens_for_vocab_prefix_tree_builder);
              crate::debug!(2, "Done building vocab prefix tree");

              // Create the roots.
              let mut precomputed_roots: BTreeMap<TokenizerStateID, Arc<Mutex<PrecomputeNode>>> = BTreeMap::new();
              for tokenizer_state_id in 0..tokenizer.max_state() {
                  let precompute_node = Arc::new(Mutex::new(PrecomputeNode::new(PrecomputedNodeContents::default())));
                  precomputed_roots.insert(TokenizerStateID(tokenizer_state_id), precompute_node);
              }

              // Queue keyed by vocab node and tokenizer state ID.
              let mut queue: BTreeMap<(DottedVocabNode, TokenizerStateID), BTreeSet<NodeHandle>> = BTreeMap::new();

              // Initialize the queue with the roots.
              for (tokenizer_state_id, precompute_node) in &precomputed_roots {
                  for (bytes, new_vocab_node) in vocab_prefix_tree.root.iter_children() {
                      let dotted_new_vocab_node = DottedVocabNode { src: &vocab_prefix_tree.root, dst: new_vocab_node, bytes, offset: 0 };
                      queue.insert(
                          (dotted_new_vocab_node, *tokenizer_state_id),
                          BTreeSet::from([NodeHandle(precompute_node.clone())]),
                      );
                  }
              }

              let mut merge_map: BTreeMap<BTreeSet<NodeHandle>, Arc<Mutex<PrecomputeNode>>> = BTreeMap::new();

              crate::debug!(2, "precompute main loop");
              while let Some((((dotted_vocab_node, initial_tokenizer_state_id)), mut precomputed_nodes)) = queue.pop_first() {
                  crate::debug!(3, "Popped from queue. Tokenizer state: {}, Queue size: {}, Precomputed nodes: {}, Prefix length: {}, Offset: {}, Total length (prefix + offset): {}, Prefix: {}, Bytes: {}",
                      initial_tokenizer_state_id.0,
                      queue.len(),
                      precomputed_nodes.len(),
                      dotted_vocab_node.src.prefix_length(),
                      dotted_vocab_node.offset,
                      dotted_vocab_node.src.prefix_length() + dotted_vocab_node.offset,
                      String::from_utf8_lossy(dotted_vocab_node.src.prefix()),
                      String::from_utf8_lossy(dotted_vocab_node.bytes),
                  );
                  let DottedVocabNode { src, dst, offset, bytes } = dotted_vocab_node;

                  if precomputed_nodes.len() > 3 {
                      // Merge the nodes
                      if let Some(existing) = merge_map.get(&precomputed_nodes) {
                          crate::debug!(3, "Merging {} nodes. Found existing merge", precomputed_nodes.len());
                          precomputed_nodes = BTreeSet::from([NodeHandle(existing.clone())]);
                      } else {
                          crate::debug!(3, "Merging {} nodes. No existing merge", precomputed_nodes.len());
                          let mut new_precomputed_node = Arc::new(Mutex::new(PrecomputeNode::new(PrecomputedNodeContents::default())));
                          let all_llm_tokens = LLMTokenBV::repeat(true, max_llm_token_id + 1);
                          for precomputed_node in precomputed_nodes.iter() {
                              new_precomputed_node.lock().unwrap().force_insert_to_node(None, all_llm_tokens.clone(), precomputed_node);
                          }
                          merge_map.insert(precomputed_nodes.clone(), new_precomputed_node.clone());
                          precomputed_nodes = BTreeSet::from([NodeHandle(new_precomputed_node.clone())]);
                      }
                  }

                  let results = tokenizer.execute_from_state(&bytes[offset..], initial_tokenizer_state_id);

                  fn link_next_precompute_node<'a>(queue: &mut BTreeMap<(DottedVocabNode<'a>, TokenizerStateID), BTreeSet<NodeHandle>>, new_queue_key: (DottedVocabNode<'a>, TokenizerStateID), precompute_node: &mut MutexGuard<PrecomputeNode>, matched_token_id: Option<TerminalID>) -> Option<Arc<Mutex<Trie<Option<GrammarTokenID>, LLMTokenBV, PrecomputedNodeContents>>>> {
                      let llm_tokens = new_queue_key.0.dst.reachable_token_ids().clone();

                      if let Some(existing_precompute_nodes) = queue.get(&new_queue_key) {
                          // Check whether there's already an edge from this node to a node in the queue.
                          crate::debug!(4, "Trying to push to existing precompute node");
                          for existing_precompute_node in existing_precompute_nodes {
                              if let Some(existing_edge_llm_tokens) = precompute_node.get_edge_value_mut(matched_token_id, existing_precompute_node) {
                                  // Merge into the edge value.
                                  crate::debug!(4, "Success! Merging into existing edge value");
                                  *existing_edge_llm_tokens |= llm_tokens;
                                  return None;
                              }
                          }

                          // Try to push to an existing precompute node in the queue if it's possible to do so without creating a cycle.
                          crate::debug!(4, "Trying to insert to existing precompute node");
                          for existing_precompute_node in existing_precompute_nodes {
                              if let Ok(_) = precompute_node.try_insert(
                                  matched_token_id,
                                  llm_tokens.clone(),
                                  Arc::clone(&*existing_precompute_node),
                              ) {
                                  crate::debug!(4, "Success! Inserting into existing precompute node");
                                  return None;
                              }
                          }
                      }

                      // Use any existing edge on the src node.
                      crate::debug!(4, "Trying to find existing edge value");
                      if let Some(existing_edges) = precompute_node.get_mut(&matched_token_id) {
                          if let Some((existing_edge_llm_tokens, existing_precomputed_node)) = existing_edges.iter_mut().next() {
                              // Merge into the edge value.
                              crate::debug!(4, "Success! Found existing edge value");
                              *existing_edge_llm_tokens |= llm_tokens.clone();
                              return Some(existing_precomputed_node.clone());
                          }
                      }

                      // Create a new node.
                      crate::debug!(4, "Creating new precompute node");
                      let mut new_precomputed_node = precompute_node.force_insert_to_new_node(matched_token_id, llm_tokens.clone(), PrecomputedNodeContents::default());
                      return Some(new_precomputed_node.clone());
                  }

                  for result in results.matches {
                      let matched_token_id = GrammarTokenID(result.id);
                      let new_offset = offset + result.width;
                      // There's still more input to process. Insert trie edge(s) and update the queue.
                      for precompute_node in &precomputed_nodes {
                          let mut precompute_node = precompute_node.lock().unwrap();
                          if new_offset == bytes.len() {
                              let new_dotted_node = DottedVocabNode { src, dst, offset: new_offset, bytes };
                              let new_queue_key = (new_dotted_node, TokenizerStateID(0));
                              let next_src = dst;
                              if let Some(mut next_precompute_node) = link_next_precompute_node(&mut queue, new_queue_key, &mut precompute_node, Some(matched_token_id)) {
                                  next_precompute_node.lock().unwrap().value.clean_end.get_or_insert_with(|| LLMTokenBV::repeat(false, max_llm_token_id + 1)).set(dst.token_id(), true);
                              }
                              // Reached the end of the input, so this is a clean match.
                              crate::debug!(4, "Reached the end of the input, so this is a clean match.");
                              for (next_bytes, next_dst) in next_src.iter_children() {
                                  let new_dotted_node = DottedVocabNode { src: next_src, dst: next_dst, bytes: next_bytes, offset: 0 };
                                  let new_queue_key = (new_dotted_node, TokenizerStateID(0));
                                  if let Some(mut next_precompute_node) = link_next_precompute_node(&mut queue, new_queue_key, &mut precompute_node, Some(matched_token_id)) {
                                      next_precompute_node.lock().unwrap().value.clean_end.get_or_insert_with(|| LLMTokenBV::repeat(false, max_llm_token_id + 1)).set(dst.token_id(), true);
                                      queue.entry(new_queue_key).or_default().insert(NodeHandle(next_precompute_node.clone()));
                                  }
                              }
                          } else if new_offset < bytes.len() {
                              let new_dotted_node = DottedVocabNode { src, dst, offset: new_offset, bytes };
                              let new_queue_key = (new_dotted_node, TokenizerStateID(0));
                              if let Some(mut next_precompute_node) = link_next_precompute_node(&mut queue, new_queue_key, &mut precompute_node, Some(matched_token_id)) {
                                  crate::debug!(4, "Didn't reach end of input, so this is not a clean match");
                                  queue.entry(new_queue_key).or_default().insert(NodeHandle(next_precompute_node.clone()));
                              }
                          } else { unreachable!(); }
                      }
                  }
                  // Handle partial matches (end state reached before end of vocab node bytes)
                  if let Some(end_state) = results.end_state {
                      crate::debug!(4, "Tokenizer is still active. Expecting more input.");
                      let possible_final_grammar_tokens: BTreeSet<_> = tokenizer.tokens_accessible_from_state(TokenizerStateID(end_state)).into_iter().map(|token_id| GrammarTokenID(token_id.0)).collect();
                      for possible_final_grammar_token in possible_final_grammar_tokens {
                          for precompute_node in &precomputed_nodes {
                              precompute_node.lock().unwrap().value.push_finalizer_info(possible_final_grammar_token, LLMTokenID(dst.token_id()), TokenizerStateID(end_state), max_llm_token_id);
                          }
                      }
                      let next_src = dst;
                      for (next_bytes, next_dst) in next_src.iter_children() {
                          let new_dotted_node = DottedVocabNode { src: next_src, dst: next_dst, bytes: next_bytes, offset: 0 };
                          let new_queue_key = (new_dotted_node, TokenizerStateID(end_state));
                          queue.entry(new_queue_key).or_default().extend(precomputed_nodes.clone());
                      }
                  }
              }

              // Pull the roots out of their Arc<Mutex<_>>
              let precomputed_roots = precomputed_roots.into_iter().map(|(tokenizer_state_id, node)| (tokenizer_state_id, node.lock().unwrap().clone())).collect();
              crate::debug!(2, "Done precomputing");
              precomputed_roots
          }

          pub fn init(&self) -> GrammarConstraintState<'_> {
              let initial_token_info = LLMTokenInfo {
                  active: LLMTokenBV::repeat(true, self.max_llm_token_id + 1),
                  // Initially, the intersection must also be all true, as no constraints have been applied.
                  intersection: LLMTokenBV::repeat(true, self.max_llm_token_id + 1),
              };
              let mut state = BTreeMap::new();
              let initial_glr_parser_state: GLRParserState<'_, LLMTokenInfo> = self.parser.init_glr_parser_with_t(initial_token_info);
              state.insert(self.tokenizer.initial_state_id(), initial_glr_parser_state);

              GrammarConstraintState {
                  parent: self,
                  state,
              }
          }
      }

      impl<'a> GrammarConstraintState<'a> {
          pub fn get_mask(&mut self) -> LLMTokenBV {
              let mut mask = LLMTokenBV::repeat(false, self.parent.max_llm_token_id + 1);
              for (_, state) in &self.state {
                  for active_state in &state.active_states {
                      mask |= active_state.stack.peek().t.active.clone();
                  }
              }
              mask
          }

          pub fn step_with_all_llm_tokens(&mut self) {
              let all_llm_tokens = LLMTokenBV::repeat(true, self.parent.max_llm_token_id + 1);
              self.step(&all_llm_tokens);
          }

          pub fn step_with_llm_token(&mut self, llm_token_id: LLMTokenID) {
              let mut llm_tokens = LLMTokenBV::repeat(false, self.parent.max_llm_token_id + 1);
              llm_tokens.set(llm_token_id.0, true);
              self.step(&llm_tokens);
          }

          /// Prunes the GSS based on the committed token and resets the active token sets.
          pub fn commit(&mut self, llm_token_id: LLMTokenID) {
              let all_true_token_info = LLMTokenInfo {
                  active: LLMTokenBV::repeat(true, self.parent.max_llm_token_id + 1),
                  intersection: LLMTokenBV::repeat(true, self.parent.max_llm_token_id + 1),
              };

              // Closure for GSS transformation:
              // - Prune if token not present in 'active'.
              // - If token present:
              //   - Reset 't' to 'all_true_token_info'.
              //   - Stop recursion if token is present in 'intersection' (optimization).
              let closure = |content: &ParseStateNodeContent<LLMTokenInfo>| -> Option<(ParseStateNodeContent<LLMTokenInfo>, bool)> {
                  if content.t.active[llm_token_id.0] {
                      // If the intersection already guarantees this token, we can stop early.
                      if content.t.intersection.all() {
                           Some((ParseStateNodeContent { state_id: content.state_id, t: all_true_token_info.clone() }, false)) // Stop recursion
                      } else {
                           Some((ParseStateNodeContent { state_id: content.state_id, t: all_true_token_info.clone() }, true)) // Continue recursion
                      }
                  } else {
                      None // Prune this path
                  }
              };

              let mut memo = HashMap::new();
              self.state.retain(|tokenizer_state_id, glr_state| {
                  glr_state.active_states.retain_mut(|parse_state| {
                      let maybe_new_node = prune_and_transform_recursive(&parse_state.stack, &closure, &mut memo);
                      if let Some(new_node) = maybe_new_node {
                          parse_state.stack = new_node;
                          true
                      } else {
                          false
                      }
                  });
                  !glr_state.active_states.is_empty()
              });
          }

          pub fn step_and_commit(&mut self, llm_token_id: LLMTokenID) {
              self.step_with_llm_token(llm_token_id);
              self.commit(llm_token_id);
          }

          pub fn commit_and_step_many(&mut self, llm_token_ids: &[LLMTokenID]) {
              for &llm_token_id in llm_token_ids {
                  self.step_with_llm_token(llm_token_id);
              }
          }

          fn prepare_initial_nodes_and_values_for_special_map(&mut self, llm_tokens: &LLMTokenBV) -> Vec<(Arc<Mutex<PrecomputeNode>>, GLRParserState<'a, LLMTokenInfo>)> {
              let mut initial_nodes_and_values: Vec<(Arc<Mutex<PrecomputeNode>>, GLRParserState<'_, LLMTokenInfo>)> = Vec::new();
              let mut tokenizer_state_id_to_parse_states: BTreeMap<TokenizerStateID, GLRParserState<'_, LLMTokenInfo>> = BTreeMap::new();

              for (tokenizer_state_id, state) in &self.state {
                  let mut state = state.clone();
                  for parse_state in state.active_states.iter_mut() {
                      // Only update the *active* tokens at the *top* of the stack.
                      // The intersection remains unchanged, and deeper nodes are untouched.
                      // The special_map logic will handle intersecting with edge_llm_tokens.
                      Arc::make_mut(&mut parse_state.stack).value.t.active &= llm_tokens;
                      // Intersection is NOT modified here. It reflects the guarantee from *below*.
                  }
                  tokenizer_state_id_to_parse_states.insert(*tokenizer_state_id, state);
              }

              for (tokenizer_state_id, state) in tokenizer_state_id_to_parse_states {
                  let token_trie = self.parent.precomputed[&tokenizer_state_id].clone();
                  let token_trie = Arc::new(Mutex::new(token_trie));
                  initial_nodes_and_values.push((token_trie, state));
              }
              initial_nodes_and_values
          }

          pub fn step(&mut self, llm_tokens: &LLMTokenBV) {
              let initial_nodes_and_values = self.prepare_initial_nodes_and_values_for_special_map(llm_tokens);

              self.state = BTreeMap::new();

              Trie::special_map(
                  // Input: Vec<(Arc<Mutex<PrecomputeNode>>, GLRParserState<'_, LLMTokenInfo>)>
                  initial_nodes_and_values,
                  // step
                  // Input: &GLRParserState<'_, LLMTokenInfo>, GrammarTokenID, &LLMTokenBV, &Arc<Mutex<PrecomputeNode>>
                  // Output: Option<GLRParserState<'_, LLMTokenInfo>>
                  |glr_parse_state, grammar_token_id, edge_llm_tokens, child_node| {
                      let node_ptr = std::ptr::addr_of!(*child_node) as usize;
                      crate::debug!(3, "Processing grammar node {} token {:?} with {} active states", node_ptr, grammar_token_id.map(|grammar_token_id| grammar_token_id.0), glr_parse_state.active_states.len());
                      let mut glr_parse_state = glr_parse_state.clone();
                      glr_parse_state.active_states.retain_mut(|parse_state| {
                          // Intersect the *active* tokens with the edge tokens. Intersection inherits current active tokens.
                          let current_active_tokens = parse_state.stack.value.t.active.clone();
                          Arc::make_mut(&mut parse_state.stack).value.t.intersection &= current_active_tokens;
                          Arc::make_mut(&mut parse_state.stack).value.t.active &= edge_llm_tokens;
                          !parse_state.stack.value.t.active.is_empty() // Check if any active paths remain
                      });
                      grammar_token_id.map(|grammar_token_id| glr_parse_state.step(grammar_token_id));
                      if glr_parse_state.active_states.is_empty() {
                          crate::debug!(3, "No active states after processing grammar token {:?}", grammar_token_id.map(|grammar_token_id| grammar_token_id.0));
                          return None;
                      } else {
                          crate::debug!(3, "Processed grammar token {:?}, {} active states.", grammar_token_id.map(|grammar_token_id| grammar_token_id.0), glr_parse_state.active_states.len());
                          Some(glr_parse_state)
                      }
                  },
                  // merge
                  // Input: &mut GLRParserState<'_, LLMTokenInfo>, GLRParserState<'_, LLMTokenInfo>
                  |managed_parse_state1, managed_parse_state2| {
                      managed_parse_state1.merge_with(managed_parse_state2);
                  },
                  // process
                  // Input: &PrecomputeNode, &GLRParserState<'_, LLMTokenInfo>
                  // Output: bool (continue?)
                  |node, glr_parse_state| {
                      glr_parse_state.merge_active_states();
                      let mut active_llm_tokens = LLMTokenBV::repeat(false, self.parent.max_llm_token_id + 1);
                      for parse_state in &glr_parse_state.active_states {
                          active_llm_tokens |= parse_state.stack.value.t.active.clone();
                      }
                      crate::debug!(3, "Processing node with {} active states, {} LLM tokens, {} finalizers", glr_parse_state.active_states.len(), active_llm_tokens.count_ones(), node.value.finalizers.len());
                      // Handle clean end
                      if let Some(clean_end) = &node.value.clean_end {
                          let mut final_glr_parse_state = glr_parse_state.clone();
                          final_glr_parse_state.active_states.retain_mut(|parse_state| {
                              // Intersect the *active* tokens with the clean_end tokens. Intersection retains current active tokens.
                              let current_active_tokens = parse_state.stack.value.t.active.clone();
                              Arc::make_mut(&mut parse_state.stack).value.t.intersection &= current_active_tokens;
                              Arc::make_mut(&mut parse_state.stack).value.t.active &= clean_end;
                              // Check if any active paths remain
                              !parse_state.stack.value.t.active.is_empty()
                          });
                          if final_glr_parse_state.is_ok() {
                              if let Some(existing) = self.state.get_mut(&TokenizerStateID(0)) {
                                  existing.merge_with(final_glr_parse_state.clone());
                              } else {
                                  self.state.insert(TokenizerStateID(0), final_glr_parse_state.clone());
                              }
                          }
                      }

                      // Handle finalizers
                      for (possible_final_grammar_token, precomputed_finalizer) in &node.value.finalizers {
                          // Ensure the final tokens parses
                          let mut semi_final_glr_parse_state = glr_parse_state.clone();
                          semi_final_glr_parse_state.step(*possible_final_grammar_token);
                          if semi_final_glr_parse_state.is_ok() {
                              for (tokenizer_state_id, llm_tokens) in &precomputed_finalizer.content {
                                  // Intersect *active* tokens with the finalizer's allowed tokens.
                                  let mut semi_final_glr_parse_state = semi_final_glr_parse_state.clone();
                                  semi_final_glr_parse_state.active_states.retain_mut(|parse_state| {
                                      // Intersect the *active* tokens with the finalizer's allowed tokens. Intersection retains current active tokens.
                                      let current_active_tokens = parse_state.stack.value.t.active.clone();
                                      Arc::make_mut(&mut parse_state.stack).value.t.intersection &= current_active_tokens;
                                      Arc::make_mut(&mut parse_state.stack).value.t.active &= llm_tokens;
                                      // Check if any active paths remain
                                      !parse_state.stack.value.t.active.is_empty()
                                  });
                                  if semi_final_glr_parse_state.is_ok() {
                                      if let Some(existing) = self.state.get_mut(tokenizer_state_id) {
                                          existing.merge_with(semi_final_glr_parse_state.clone());
                                      } else {
                                          self.state.insert(*tokenizer_state_id, semi_final_glr_parse_state.clone());
                                      }
                                  }
                              }
                          }
                      }

                      // Check if the current GLR state still has valid paths before continuing traversal
                      // (This check might be redundant if the retain calls above handle it)
                      !glr_parse_state.active_states.is_empty()
                  },
              );
          }
      }

      #[cfg(test)]
      mod tests {
          use crate::finite_automata::eat_u8;
          use crate::{choice, groups, seq};
          use crate::glr::grammar::{nt, prod, t, NonTerminal, Terminal};
          use crate::glr::table::{generate_glr_parser, generate_glr_parser_with_maps, generate_glr_parser_with_terminal_map};
          use super::*;

          #[test]
          fn test_constraint_simple() {
              // LLM tokens: "ab", "ac", "$"
              // Grammar tokens: "a", "ab", "b|c", "$" (EOF)
              // Grammar: S -> X $ ; X -> "a" ("b|c") ("b|c") | "ab"
              let expr = groups![
                  eat_u8(b'a'),
                  seq![eat_u8(b'a'), eat_u8(b'b')],
                  choice![eat_u8(b'b'), eat_u8(b'c')], // ID 2
                  eat_u8(b'$'),
              ];
              let tokenizer = expr.build();

              let mut llm_token_map = LLMTokenMap::new();
              llm_token_map.insert(b"ab".to_vec(), LLMTokenID(0));
              llm_token_map.insert(b"ac".to_vec(), LLMTokenID(1));
              llm_token_map.insert(b"$".to_vec(), LLMTokenID(2));

              // Grammar Terminals mapped to Tokenizer IDs
              let mut grammar_token_map: BiBTreeMap<Terminal, TerminalID> = BiBTreeMap::new();
              grammar_token_map.insert(Terminal("A".to_string()), TerminalID(0)); // Corresponds to eat_u8(b'a')
              grammar_token_map.insert(Terminal("AB".to_string()), TerminalID(1)); // Corresponds to seq![eat_u8(b'a'), eat_u8(b'b')]
              grammar_token_map.insert(Terminal("B_OR_C".to_string()), TerminalID(2)); // Corresponds to choice![eat_u8(b'b'), eat_u8(b'c')]
              grammar_token_map.insert(Terminal("EOF".to_string()), TerminalID(3)); // Corresponds to eat_u8(b'$')

              let productions = vec![
                  prod("S", vec![nt("X"), t("EOF")]), // S -> X $
                  prod("X", vec![t("A"), t("B_OR_C")]), // X -> a (b|c)
                  prod("X", vec![t("AB")]),             // X -> ab
              ];

              let parser = generate_glr_parser_with_terminal_map(&productions, 0, grammar_token_map);
              dbg!(&parser);

              let constraint = GrammarConstraint::new(tokenizer, parser, llm_token_map, 2);
              constraint.dump_precomputed();

              let mut constraint_state = constraint.init();

              constraint_state.step_with_all_llm_tokens();

              // Initially, we can match "a" (part of "ab" or "ac") or "ab".
              // "a" leads to expecting "b" or "c".
              // "ab" leads to expecting "$".
              let mask = constraint_state.get_mask();
              assert_eq!(mask, LLMTokenBV::from_iter([true, true, false])); // Expect "ab" or "ac"

              // Commit "ab" (LLMTokenID 0)
              constraint_state.commit(LLMTokenID(0));
              constraint_state.step_with_all_llm_tokens();
              let mask = constraint_state.get_mask();
              assert_eq!(mask, LLMTokenBV::from_iter([false, false, true])); // Expect "$" (EOF)
          }

          #[test]
          fn test_constraint_expression() {
              // Example grammar: E -> E '+' T | T; T -> T '*' F | F; F -> '(' E ')' | 'i'
              // LLM token vocabulary: i, +, *, (, ), (i, +i
              let mut llm_token_map = LLMTokenMap::new();
              llm_token_map.insert(b"i".to_vec(), LLMTokenID(0));
              llm_token_map.insert(b"+".to_vec(), LLMTokenID(1));
              llm_token_map.insert(b"*".to_vec(), LLMTokenID(2));
              llm_token_map.insert(b"(".to_vec(), LLMTokenID(3));
              llm_token_map.insert(b")".to_vec(), LLMTokenID(4));
              llm_token_map.insert(b"(i".to_vec(), LLMTokenID(5));
              llm_token_map.insert(b"+i".to_vec(), LLMTokenID(6));

              // Tokenizer regex for grammar tokens '+' '*' '(' ')' 'i'
              let expr = groups![
                  eat_u8(b'+'),
                  eat_u8(b'*'),
                  eat_u8(b'('),
                  eat_u8(b')'),
                  eat_u8(b'i'),
              ];
              let tokenizer = expr.build();

              // Grammar productions
              let productions = vec![
                  prod("S", vec![nt("E"), t("EOF")]), // Start production
                  prod("E", vec![nt("E"), t("PLUS"), nt("T")]),
                  prod("E", vec![nt("T")]),
                  prod("T", vec![nt("T"), t("TIMES"), nt("F")]),
                  prod("T", vec![nt("F")]),
                  prod("F", vec![t("LPAREN"), nt("E"), t("RPAREN")]),
                  prod("F", vec![t("I")]),
              ];
              // Map grammar terminals to IDs matching regex order
              let mut grammar_token_map: BiBTreeMap<Terminal, TerminalID> = BiBTreeMap::new();
              grammar_token_map.insert(Terminal("PLUS".to_string()), TerminalID(0));
              grammar_token_map.insert(Terminal("TIMES".to_string()), TerminalID(1));
              grammar_token_map.insert(Terminal("LPAREN".to_string()), TerminalID(2));
              grammar_token_map.insert(Terminal("RPAREN".to_string()), TerminalID(3));
              grammar_token_map.insert(Terminal("I".to_string()), TerminalID(4));
              grammar_token_map.insert(Terminal("EOF".to_string()), TerminalID(5));

              let parser = generate_glr_parser_with_terminal_map(&productions, 0, grammar_token_map); // Start production is index 6
              dbg!(&parser);
              let constraint = GrammarConstraint::new(tokenizer, parser, llm_token_map, 6);
              constraint.dump_precomputed();

              // Initial state and step
              let mut state = constraint.init();
              state.step_with_all_llm_tokens();
              let mask = state.get_mask();
              // Expect LLM tokens that can start an expression: i (0), '(' (3), "(i" (5)
              assert_eq!(mask, LLMTokenBV::from_iter([true, false, false, true, false, true, false]));

              // Commit "(i"
              state.commit(LLMTokenID(5));
              state.step_with_all_llm_tokens();
              let mask = state.get_mask();
              // Now expect '+', '*', ')', '+i' => IDs 1,2,4,6
              assert_eq!(mask, LLMTokenBV::from_iter([false, true, true, false, true, false, true]));

              // // Commit "(i"
              // state.commit(LLMTokenID(5));
              // state.step_with_all_llm_tokens();
              // let mask = state.get_mask();
              // assert_eq!(mask, LLMTokenBV::from_iter([false, false, false, false, false, false, false]));
          }
      }
    src/tokenizer.rs: |-
      use crate::finite_automata::{GroupID, Regex};
      use crate::types::{TerminalID as GrammarTokenID};
      use bimap::BiBTreeMap;

      pub type LLMToken = Vec<u8>;
      pub type LLMTokenMap = BiBTreeMap<Vec<u8>, LLMTokenID>;

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct LLMTokenID(pub usize);
      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct TokenizerStateID(pub usize);

      #[derive(Clone, Debug, PartialEq, Eq, PartialOrd, Ord)]
      pub struct Token {
          pub id: GroupID,
          pub width: usize,
      }

      pub struct ExecuteResult {
          pub matches: Vec<Token>,
          pub end_state: Option<usize>,
      }

      impl Regex {
          pub(crate) fn initial_state_id(&self) -> TokenizerStateID {
              TokenizerStateID(0)
          }

          pub(crate) fn execute_from_state(&self, text: &[u8], state: TokenizerStateID) -> ExecuteResult {
              let mut regex_state = self.init_to_state(state.0);
              regex_state.execute(text);

              let matches: Vec<_> = regex_state.matches.iter().map(|(&id, &width)| Token { id, width })
                  // Filter out zero-width tokens
                  .filter(|token| token.width != 0).collect();

              let new_state = if regex_state.done { None } else { Some(regex_state.current_state) };

              ExecuteResult { matches, end_state: new_state }
          }

          pub(crate) fn tokens_accessible_from_state(&self, state: TokenizerStateID) -> Vec<GrammarTokenID> {
              let regex_state = self.init_to_state(state.0);
              regex_state.possible_future_group_ids().iter().cloned().map(|id| GrammarTokenID(id)).collect()
          }

          pub(crate) fn max_state(&self) -> usize {
              self.dfa.states.len()
          }
      }
    src/glr/parser.rs: |
      use crate::datastructures::gss::{print_gss_forest, BulkMerge, gather_gss_stats, find_longest_path};
      use crate::glr::grammar::{NonTerminal, Production, Symbol, Terminal};
      use crate::glr::items::Item;
      use crate::glr::table::{
          NonTerminalID, ProductionID, Stage7ShiftsAndReduces, Stage7Table, StateID, TerminalID,
      };
      use crate::datastructures::gss::{GSSNode, GSSTrait, GSSStats};

      use bimap::BiBTreeMap;
      use std::collections::{BTreeMap, BTreeSet};
      use std::fmt::{Debug, Display, Formatter};
      use std::hash::Hash;
      use std::sync::Arc;
      use crate::debug;

      pub trait MergeAndIntersect: Sized + Clone + Debug + Eq + PartialEq + Ord + PartialOrd + Hash {
          /// Merges the information represented by `self` and `other`.
          fn merge(&self, other: &Self) -> Self;
          /// Intersects the information represented by `self` and `other`.
          fn intersect(&self, other: &Self) -> Self;
      }

      impl MergeAndIntersect for () {
          fn merge(&self, _: &Self) -> Self { () }
          fn intersect(&self, _: &Self) -> Self { () }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateNodeContent<T: MergeAndIntersect> {
          pub state_id: StateID,
          pub t: T,
      }
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseState<T: MergeAndIntersect> {
          pub stack: Arc<GSSNode<ParseStateNodeContent<T>>>,
      }

      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub enum StopReason {
          ActionNotFound,
          GotoNotFound,
      }


      // TODO: should this *really* derive `Clone`? Users probably shouldn't clone this, should they?
      #[derive(Clone)]
      pub struct GLRParser {
          pub stage_7_table: Stage7Table,
          pub productions: Vec<Production>,
          pub terminal_map: BiBTreeMap<Terminal, TerminalID>,
          pub non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
          pub item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
          pub start_state_id: StateID,
      }

      impl GLRParser {
          pub fn new(
              stage_7_table: Stage7Table,
              productions: Vec<Production>,
              terminal_map: BiBTreeMap<Terminal, TerminalID>,
              non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
              item_set_map: BiBTreeMap<BTreeSet<Item>, StateID>,
              start_state_id: StateID,
          ) -> Self {
              Self {
                  stage_7_table,
                  productions,
                  terminal_map,
                  non_terminal_map,
                  item_set_map,
                  start_state_id,
              }
          }

          pub fn init_glr_parser<T: MergeAndIntersect + Default>(&self) -> GLRParserState<T> {
              self.init_glr_parser_with_t(T::default())
          }

          pub fn init_glr_parser_with_t<T: MergeAndIntersect>(&self, t: T) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: vec![self.init_parse_state_with_t(t)],
                  action_not_found_states: Vec::new(),
              }
          }
          pub fn init_glr_parser_from_parse_state<T: MergeAndIntersect>(&self, parse_state: ParseState<T>) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: vec![parse_state],
                  action_not_found_states: Vec::new(),
              }
          }

          pub fn init_glr_parser_from_parse_states<T: MergeAndIntersect>(
              &self,
              parse_states: Vec<ParseState<T>>,
          ) -> GLRParserState<T> {
              GLRParserState {
                  parser: self,
                  active_states: parse_states,
                  action_not_found_states: Vec::new(),
              }
          }

          pub fn init_parse_state<T: MergeAndIntersect + Default>(&self) -> ParseState<T> {
              self.init_parse_state_with_t(T::default())
          }

          pub fn init_parse_state_with_t<T: MergeAndIntersect>(&self, t: T) -> ParseState<T> {
              let initial_content = ParseStateNodeContent {
                  state_id: self.start_state_id,
                  t,
              };
              ParseState {
                  stack: Arc::new(GSSNode::new(initial_content)),
              }
          }

          pub fn parse<T: MergeAndIntersect + Default>(&self, input: &[TerminalID]) -> GLRParserState<T> {
              let mut state = self.init_glr_parser();
              state.parse(input);
              state
          }
      }

      impl Debug for GLRParser {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              write!(f, "{}", self)
          }
      }

      impl Display for GLRParser {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              let stage_7_table = &self.stage_7_table;
              let terminal_map = &self.terminal_map;
              let non_terminal_map = &self.non_terminal_map;
              let item_set_map = &self.item_set_map;

              // Import necessary items for closure computation
              use crate::glr::items::{compute_closure, Item};
              use std::collections::BTreeSet;

              writeln!(f, "Parse Table:")?;
              writeln!(f, "  Start State: {}", self.start_state_id.0)?;
              for (&state_id, row) in stage_7_table.iter().collect::<BTreeMap<_, _>>() {
                  writeln!(f, "  State {}:", state_id.0)?;

                  // Get the core items that define this state
                  let core_item_set = item_set_map.get_by_right(&state_id).unwrap();
                  // Compute the full closure based on the core items
                  let full_closure = compute_closure(core_item_set, &self.productions);

                  // Print Core Items
                  writeln!(f, "    Core Items:")?;
                  for item in core_item_set {
                      write!(f, "      - {} ->", item.production.lhs.0)?;
                      for (i, symbol) in item.production.rhs.iter().enumerate() {
                          if i == item.dot_position {
                              write!(f, " •")?;
                          }
                          match symbol {
                              Symbol::Terminal(terminal) => write!(f, " {:?}", terminal.0),
                              Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0),
                          }?;
                      }
                      if item.dot_position == item.production.rhs.len() {
                          write!(f, " •")?;
                      }
                      writeln!(f)?;
                  }

                  // Print Closure Items (items in full_closure but not in core_item_set)
                  let closure_only_items: BTreeSet<_> = full_closure.difference(core_item_set).cloned().collect();
                  if !closure_only_items.is_empty() {
                      writeln!(f, "    Closure Items:")?;
                      for item in &closure_only_items {
                          write!(f, "      - {} ->", item.production.lhs.0)?;
                          for (i, symbol) in item.production.rhs.iter().enumerate() {
                              if i == item.dot_position {
                                  write!(f, " •")?;
                              }
                              match symbol {
                                  Symbol::Terminal(terminal) => write!(f, " {:?}", terminal.0),
                                  Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0),
                              }?;
                          }
                          if item.dot_position == item.production.rhs.len() {
                              write!(f, " •")?;
                          }
                          writeln!(f)?;
                      }
                  }

                  // --- Rest of the state information ---
                  writeln!(f, "    Actions:")?;
                  for (&terminal_id, action) in &row.shifts_and_reduces {
                      let terminal = terminal_map.get_by_right(&terminal_id).unwrap();
                      match action {
                          Stage7ShiftsAndReduces::Shift(next_state_id) => {
                              writeln!(f, "      - {:?} -> Shift {}", terminal.0, next_state_id.0)?;
                          }
                          Stage7ShiftsAndReduces::Reduce { production_id, nonterminal_id: nonterminal, len } => {
                              let nt_name = non_terminal_map.get_by_right(nonterminal).unwrap();
                              writeln!(f, "      - {:?} -> Reduce {} (len {})", terminal.0, nt_name.0, len)?;
                          }
                          Stage7ShiftsAndReduces::Split { shift, reduces } => {
                              writeln!(f, "      - {:?} -> Conflict:", terminal.0)?;
                              if let Some(shift_state) = shift {
                                  writeln!(f, "        - Shift {}", shift_state.0)?;
                              }
                              for (len, nt_id_to_prod_ids) in reduces {
                                  writeln!(f, "        - Reduce (len {}):", len)?;
                                  for (nt_id, prod_ids) in nt_id_to_prod_ids {
                                      let nt = non_terminal_map.get_by_right(nt_id).unwrap();
                                      for prod_id in prod_ids {
                                          let prod = self.productions.get(prod_id.0).unwrap();
                                          writeln!(f, "          - {} -> {}", nt.0, prod.lhs.0)?;
                                      }
                                  }

                              }
                          }
                      }
                  }

                  writeln!(f, "    Gotos:")?;
                  for (&non_terminal_id, &next_state_id) in &row.gotos {
                      let non_terminal = non_terminal_map.get_by_right(&non_terminal_id).unwrap();
                      writeln!(f, "      - {} -> {}", non_terminal.0, next_state_id.0)?;
                  }
              }

              writeln!(f, "\nTerminal Map (name to terminal ID):")?;
              for (terminal, terminal_id) in terminal_map {
                  writeln!(f, "  {} -> {}", terminal.0, terminal_id.0)?;
              }

              writeln!(f, "\nNon-Terminal Map:")?;
              for (non_terminal, non_terminal_id) in non_terminal_map {
                  writeln!(f, "  {} -> {}", non_terminal.0, non_terminal_id.0)?;
              }

              Ok(())
          }
      }

      #[derive(Debug, Clone)]
      pub struct GLRParserState<'a, T: MergeAndIntersect> {
          pub parser: &'a GLRParser,
          pub active_states: Vec<ParseState<T>>,
          pub action_not_found_states: Vec<ParseState<T>>,
      }

      impl<'a, T: MergeAndIntersect + Debug> GLRParserState<'a, T> {
          /* -------------------------------------------------
           * Helper utilities to make `step` compact and clear
           * ------------------------------------------------- */

          /// Push a new state on `stack` and wrap it in a `ParseState`.
          fn push_state(
              &self,
              stack: &Arc<GSSNode<ParseStateNodeContent<T>>>,
              next_state: StateID,
              t: T,
          ) -> ParseState<T> {
              let new_content = ParseStateNodeContent { state_id: next_state, t };
              ParseState { stack: Arc::new(stack.push(new_content)) }
          }

          /// Pop `len` nodes, follow the goto on `nt`, and return the resulting stacks.
          fn pop_and_goto(
              &self,
              stack: &Arc<GSSNode<ParseStateNodeContent<T>>>,
              len: usize,
              nt: NonTerminalID,
              cur_t: &T,
          ) -> Vec<Arc<GSSNode<ParseStateNodeContent<T>>>> {
              let mut parents = stack.popn(len);        // 1. pop
              let mut out = Vec::new();

              for parent in parents {
                  let top = parent.peek();
                  let goto = self.parser.stage_7_table[&top.state_id].gotos[&nt];
                  let merged_t = top.t.intersect(cur_t);
                  out.push(Arc::new(parent.push(ParseStateNodeContent {
                      state_id: goto,
                      t: merged_t,
                  })));
              }
              out
          }

          /// Debug helper so the main `step` body stays short.
          fn log_gss(&self, phase: &str, token: TerminalID) {
              const MAX: usize = 30;
              let roots: Vec<_> = self.active_states.iter().map(|s| s.stack.clone()).collect();
              let stats = gather_gss_stats(&roots);
              crate::debug!(3, "{} (token {:?}) – active: {}, nodes: {:?}",
                            phase, token, self.active_states.len(), stats);

              debug!(4, "{}", {
                  if stats.unique_nodes <= MAX {
                      format!("GSS ({} nodes):\n{}", stats.unique_nodes,
                              print_gss_forest(&roots, MAX))
                  } else {
                      // fall back to longest path printing
                      match find_longest_path(&roots) {
                          Some(p) => format!("GSS too big ({} nodes). Longest path ({}): {}",
                                             stats.unique_nodes,
                                             p.len(),
                                             p.iter().map(|n| n.value.state_id.0)
                                                  .map(|id| id.to_string())
                                                  .collect::<Vec<_>>()
                                                  .join(" → ")),
                          None => format!("GSS too big ({} nodes) – path not found", stats.unique_nodes),
                      }
                  }
              });
          }

          pub fn parse(&mut self, input: &[TerminalID]) {
              self.parse_part(input);
          }

          pub fn parse_part(&mut self, input: &[TerminalID]) {
              for &token_id in input {
                  self.step(token_id);
              }
          }

          pub fn and_step(mut self, token_id: TerminalID) -> Self {
              self.step(token_id);
              self
          }

          pub fn and_parse(mut self, input: &[TerminalID]) -> Self {
              self.parse(input);
              self
          }

          pub fn step(&mut self, token_id: TerminalID) {
              /* ---------- logging & preparation ---------- */
              self.log_gss("Step-start", token_id);

              let mut todo = std::mem::take(&mut self.active_states);
              let mut next = Vec::<ParseState<T>>::new();
              let mut not_found = Vec::<ParseState<T>>::new();

              /* ---------- core loop ---------- */
              while let Some(state) = todo.pop() {
                  let stack   = state.stack;
                  let top     = stack.peek();
                  let row     = &self.parser.stage_7_table[&top.state_id];

                  match row.shifts_and_reduces.get(&token_id) {
                      /* ------ 1. plain shift ------ */
                      Some(Stage7ShiftsAndReduces::Shift(to)) => {
                          next.push(self.push_state(&stack, *to, top.t.clone()));
                      }

                      /* ------ 2. single reduce ------ */
                      Some(Stage7ShiftsAndReduces::Reduce{ nonterminal_id: nt,
                                                           len, .. }) => {
                          for s in self.pop_and_goto(&stack, *len, *nt, &top.t) {
                              todo.push(ParseState { stack: s });
                          }
                      }

                      /* ------ 3. shift / reduce split ------ */
                      Some(Stage7ShiftsAndReduces::Split { shift, reduces }) => {
                          // optional shift part
                          if let Some(to) = shift {
                              next.push(self.push_state(&stack, *to, top.t.clone()));
                          }
                          // every reduce alternative
                          for (len, nts) in reduces {
                              for (nt, _prod_ids) in nts {        // we ignore prod-ids here
                                  for s in self.pop_and_goto(&stack, *len, *nt, &top.t) {
                                      todo.push(ParseState { stack: s });
                                  }
                              }
                          }
                      }

                      /* ------ 4. no action ------ */
                      None => not_found.push(ParseState { stack }),
                  }
              }

              /* ---------- finish up ---------- */
              self.active_states            = next;
              self.action_not_found_states  = not_found;   // keep for caller if wanted

              self.log_gss("Step-end", token_id);
              self.action_not_found_states.clear();        // current design: we drop them
          }

          // TODO: Review merge logic, especially interaction with GSSNode::merge and ParseState::merge
          pub fn merge_active_states(&mut self) {
              let mut active_state_map: BTreeMap<ParseStateKey, ParseState<T>> = BTreeMap::new();
              let num_active_states = self.active_states.len();

              for state in std::mem::take(&mut self.active_states) {
                  let key = state.key();
                  active_state_map.insert_with(key, state, |existing, new_state| {
                      existing.merge(new_state);
                  });
              }

              crate::debug!(3, "Merged {} active states into {} active states", num_active_states, active_state_map.len());
              self.active_states = active_state_map.into_values().collect();
          }

          pub fn merge_with(&mut self, other: GLRParserState<T>) {
              assert!(std::ptr::eq(self.parser, other.parser));
              self.active_states.extend(other.active_states);
              self.action_not_found_states.extend(other.action_not_found_states);
              // Consider merging active states here if performance becomes an issue
              // self.merge_active_states();
          }

          pub fn is_ok(&self) -> bool {
              !self.active_states.is_empty()
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct ParseStateKey {
          stack_state_id: StateID,
          // Removed action_stack
      }

      impl<T: MergeAndIntersect> ParseState<T> {
          pub fn key(&self) -> ParseStateKey {
              ParseStateKey {
                  stack_state_id: self.stack.peek().state_id,
              }
          }

          /// Merges `other` into `self`. Assumes `self.key() == other.key()`.
          /// Merges the GSS structures and combines the `t` value at the top node using `MergeAndIntersect::merge`.
          pub fn merge(&mut self, other: ParseState<T>) {
              assert_eq!(self.key(), other.key());

              // Combine 't' values at the top node using 'or'
              let self_content = self.stack.peek();
              let other_content = other.stack.peek();
              let combined_t = self_content.t.merge(&other_content.t);

              // Get mutable access to self.stack, potentially cloning if shared (Arc > 1)
              let mut mutable_stack = Arc::make_mut(&mut self.stack);

              // Update the 't' value in the mutable top node's content
              mutable_stack.value.t = combined_t;

              // Merge the parent structures using GSSNode's merge
              mutable_stack.merge_unchecked(Arc::unwrap_or_clone(other.stack));
          }
      }

      pub trait InsertWith<K, V> {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F);
      }

      impl<K, V> InsertWith<K, V> for BTreeMap<K, V> where K: Eq + Ord {
          fn insert_with<F: FnOnce(&mut V, V)>(&mut self, k: K, v: V, combine: F) {
              match self.entry(k) {
                  std::collections::btree_map::Entry::Occupied(mut occupied) => {
                      let value = occupied.get_mut();
                      combine(value, v);
                  }
                  std::collections::btree_map::Entry::Vacant(vacant) => {
                      vacant.insert(v);
                  }
              }
          }
      }
