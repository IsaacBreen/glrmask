          llm_token_map.insert(b"a".to_vec(), llm_a);
          llm_token_map.insert(b"#aa".to_vec(), llm_hash_aa);

          let max_original_llm_token_id = 2;

          let mut token_name_map_for_constraint = BiBTreeMap::new();
