      Of course. The performance issue in `synthesize_greedy` stems from a nested loop structure where for every new successor tuple, the algorithm iterates through all existing representatives to find the best one to merge with. As the number of representatives grows, this search becomes quadratically slow.

      To address this, we will replace the linear scan with a much faster, targeted search using an inverted index. This index will map `(coordinate, local_state)` pairs to the set of representatives that have that specific state at that coordinate. This allows us to quickly find a small set of candidate representatives that are likely to be good merge targets, drastically reducing the search space.

      Here are the step-by-step instructions to apply this optimization:

      ### Step-by-step Instructions

      1.  **File:** `src/precompute4/weighted_automata/tuple_merger.rs`

      2.  **Import `BTreeSet`:** Add `BTreeSet` to the `use` statement at the top of the file.
          ```rust
          use std::collections::{BTreeMap, HashMap, HashSet, VecDeque, BTreeSet};
          ```

      3.  **Replace `synthesize_greedy` function:** The entire body of the `synthesize_greedy` function will be replaced with a more performant version. This new version will:
          *   Maintain an inverted index (`inv_idx`) to track which representatives have specific values at each coordinate.
          *   Keep a cached vector of specificities (`reps_spec`) for each representative to avoid recalculation.
          *   Instead of scanning all representatives, it will query the index to find candidates that overlap with the new tuple on at least one coordinate.
          *   It will then find the best compatible candidate from this much smaller set.
          *   If no overlapping compatible candidate is found, it will create a new representative as a fallback.
          *   The logic for updating representatives is updated to also maintain the index and specificity cache.
          *   Excessive logging has been removed to reduce I/O overhead.

