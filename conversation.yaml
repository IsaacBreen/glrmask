              let input = vec![
                  TestEK::new(1, Some(2)),
                  TestEK::new(2, None),
                  TestEK::new(3, Some(0)),
                  TestEK::new(4, None),
                  TestEK::new(-1, None),
              ];
              // Unconditional pops are merged with subsequent pops.
              let expected = vec![
                  TestEK::new(1, Some(2)),
                  TestEK::new(5, Some(0)), // (2, None) + (3, Some(0))
                  TestEK::new(3, None),    // (4, None) + (-1, None)
              ];
              let got = compress_stack(input);
              assert_eq!(got, expected);
          }

