      Implement `bubble_up_negative_pops_stack`.
      The basic principle is simple. We want any and all negative pops to occur at the end of the stack.
      We can change the stack any way we like as long as the realized actions are unchanged.
      The realized actions are a map from position to value computed like this.
      - initialize an empty map
      - initialize position to 0
      - loop through items in the stack
          - position += item.pop
          - if let Some(check) = item.check
              - assert position not in map (shouldn't be otherwise input stack is invalid)
              - map[position] = item
      - return the map

