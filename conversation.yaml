          fn internal_bv_to_original(&self, bv: &PyHybridBitset) -> PyHybridBitset {
              PyHybridBitset::from(self.inner.internal_bv_to_original(&bv.inner))
          }

          fn original_bv_to_internal(&self, bv: &PyHybridBitset) -> PyHybridBitset {
