          ```rust
          let mut node_to_process = None;
          ```
      3.  You will replace this logic to collect *all* candidate nodes at once. Change `node_to_process` to a `Vec` named `nodes_to_process`.
          ```rust
          let mut nodes_to_process = Vec::new();
          ```
      4.  In the loop that follows (`for &b_idx in &all_nodes`), remove the `break;` statement and instead add the candidate `b_idx` to your new `nodes_to_process` vector.
