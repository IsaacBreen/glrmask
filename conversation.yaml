      ### Step-by-step instructions

      Below are concrete edits to `src/precompute4/resolve_negatives.rs` that:

      * Remove all `0..states.len()` loops from the finality fixpoint computation.
      * Make `compute_finality_fixpoint` cost proportional to the size of `source_states_filter` and the subgraph it touches, not to `states.len()`.
      * Preserve semantics for all states in `source_states_filter`.

      I’ll also explain why the new algorithm is mathematically equivalent to the old one.

      ---

      #### 1. Change `apply_finality_fixpoint` to consume a sparse map instead of a dense `Vec`

      **File:** `src/precompute4/resolve_negatives.rs`  
      **Old code (for context):**
      ```rust
      pub fn apply_finality_fixpoint(states: &mut NWAStates, source_states_filter: &HashSet<NWAStateID>) {
          let final_fix = compute_finality_fixpoint(states, source_states_filter);
          for &sid in source_states_filter {
              let st = &mut states.0[sid];
              if let Some(fw) = &mut st.final_weight {
                  *fw |= &final_fix[sid];
              } else {
                  st.final_weight = Some(final_fix[sid].clone());
              }
          }
      }
      ```

      **Edit:**

      1. Change the function signature to be multi-line (purely stylistic).
      2. Treat `compute_finality_fixpoint`’s result as a `HashMap<NWAStateID, Weight>` instead of a `Vec<Weight>`.
      3. Only update a state if there is a non-zero entry for that state in the map.

      **New code:**
      ```rust
      pub fn apply_finality_fixpoint(
          states: &mut NWAStates,
          source_states_filter: &HashSet<NWAStateID>,
      ) {
          let final_fix = compute_finality_fixpoint(states, source_states_filter);
          for &sid in source_states_filter {
              if let Some(add) = final_fix.get(&sid) {
                  let st = &mut states.0[sid];
                  if let Some(fw) = &mut st.final_weight {
                      *fw |= add;
                  } else {
                      st.final_weight = Some(add.clone());
                  }
              }
          }
      }
      ```

      **Why this is safe:**

      * Previously `compute_finality_fixpoint` returned a `Vec<Weight>` with `Weight::zeros()` for states that had no future-final contribution. Applying `*fw |= zeros` is a no-op.
      * Now we simply omit entries with zero weight from the `HashMap`. Skipping states not present in the map is semantically identical to adding a zero weight.

      ---

      #### 2. Replace `compute_finality_fixpoint` with a filter-local, forward fixpoint

      **File:** `src/precompute4/resolve_negatives.rs`  
      **Old function (for reference):**
      ```rust
      fn compute_finality_fixpoint(states: &NWAStates, source_states_filter: &HashSet<NWAStateID>) -> Vec<Weight> {
          let n = states.len();
          let mut future_final: Vec<Weight> = vec![Weight::zeros(); n];
          let mut predecessors: HashMap<NWAStateID, Vec<(NWAStateID, Weight)>> = HashMap::new();

          for u in 0..n {
              for &(v, ref w) in &states[u].epsilons {
                  if v < n {
                      predecessors.entry(v).or_default().push((u, w.clone()));
                  }
              }
          }
          for &u in source_states_filter {
              for (&label, targets) in &states[u].transitions {
                  if !is_negative_symbol(label) {
                      continue;
                  }
                  for (v, w) in targets {
                      if *v < n {
                          predecessors.entry(*v).or_default().push((u, w.clone()));
                      }
                  }
              }
          }

          let mut queue: VecDeque<NWAStateID> = VecDeque::new();
          for s in 0..n {
              if let Some(ref fw) = states[s].final_weight {
                  if !fw.is_empty() {
                      future_final[s] = fw.clone();
                      queue.push_back(s);
                  }
              }
          }

          while let Some(v) = queue.pop_front() {
              let fv = future_final[v].clone();
              if fv.is_empty() {
                  continue;
              }
              if let Some(preds) = predecessors.get(&v) {
                  for &(u, ref w_uv) in preds {
                      let add = &fv & w_uv;
                      if add.is_empty() {
                          continue;
                      }
                      let old = &future_final[u];
                      if (&add & old) != add {
                          future_final[u] |= &add;
                          queue.push_back(u);
                      }
                  }
              }
          }

          future_final
      }
      ```

      **Core issues with the old implementation:**

      * It allocates a `Vec<Weight>` of length `states.len()` and iterates `0..n` twice (building `predecessors` and seeding `queue`), even if `source_states_filter` has size 100 and `states.len()` is 100M.
      * It builds a full predecessor graph for epsilon edges across all states, regardless of whether they are relevant to the filtered states.
      * This makes the cost inherently proportional to `states.len()`, which violates your requirement.

      ---

      ##### 2.1. New high-level algorithm

      We rewrite `compute_finality_fixpoint` as a **forward** propagation from the filtered states instead of a **backward** propagation from all final states:

      * Graph edges considered:
        * Epsilon edges `(u -> v, w)` for all states `u`.
        * Negative transitions `(u -> v, w)` **only if** `u ∈ source_states_filter` (same restriction as before).
      * For each origin `a ∈ source_states_filter`, we want:
        * `future_final[a] =` union over all paths `P` from `a` to any final state `t` of  
          `final_weight[t] & (∧ over all edge weights along P)`.
        * Paths may traverse epsilon edges anywhere, and negative edges only from states in `source_states_filter`.
      * Instead of:
        * “Start from all finals and propagate backwards to everyone along predecessors,”
        * we do:
          * “Start from each `a ∈ source_states_filter` and propagate forward along allowed edges, keeping track of accumulated path weights; whenever we reach a final state, we add its contribution to `future_final[a]`.”

      Data structures:

      * `future_final: HashMap<NWAStateID, Weight>`  
        Aggregates the final-weight contributions for each origin `a ∈ source_states_filter`.

      * `queries_at_state: HashMap<NWAStateID, HashMap<NWAStateID, Weight>>`  
        For each current location `s`, and origin `a`, stores the union of weights of all (epsilon/negative) paths from `a` to `s`.

      * `worklist: VecDeque<(NWAStateID /* current */, NWAStateID /* origin */, Weight /* path weight */)>`  
        Worklist for fixpoint iteration. We re-enqueue a triple only when its weight strictly grows.

      Complexity:

      * Outer loops are over `source_states_filter`, not `0..states.len()`.
      * We only visit states reachable from `source_states_filter` via epsilon and allowed negative edges.
      * No `Vec` of length `states.len()` is allocated; only `HashMap`s whose size is proportional to the reachable subgraph.

      ---

      ##### 2.2. New implementation of `compute_finality_fixpoint`

      Replace the old function with:

      ```rust
      fn compute_finality_fixpoint(
          states: &NWAStates,
          source_states_filter: &HashSet<NWAStateID>,
      ) -> HashMap<NWAStateID, Weight> {
          let n = states.len();

          // future_final[a] = summary of all epsilon/negative paths from `a` to any final state.
          // We only need entries for a ∈ source_states_filter.
          let mut future_final: HashMap<NWAStateID, Weight> = HashMap::new();

          // queries_at_state[s][a] = aggregated weight of all epsilon/negative paths
          // from `a` (where a ∈ source_states_filter) to `s`.
          let mut queries_at_state: HashMap<NWAStateID, HashMap<NWAStateID, Weight>> = HashMap::new();
          let mut worklist: VecDeque<(NWAStateID, NWAStateID, Weight)> = VecDeque::new();

          // Seed zero-length paths: if `a` is already final, include its own final weight.
          for &a in source_states_filter {
              if a >= n {
                  continue;
              }
              if let Some(ref fw) = states[a].final_weight {
                  if !fw.is_empty() {
                      let entry = future_final.entry(a).or_insert_with(Weight::zeros);
                      *entry |= fw;
                  }
              }
          }

          // Seed one-step paths from each source in the filter.
          for &a in source_states_filter {
              if a >= n {
                  continue;
              }

              // Epsilon edges from `a`.
              for &(target, ref w) in &states[a].epsilons {
                  if target >= n || w.is_empty() {
                      continue;
                  }
                  let entry = queries_at_state
                      .entry(target)
                      .or_default()
                      .entry(a)
                      .or_insert_with(Weight::zeros);
                  let old = entry.clone();
                  *entry |= w;
                  if *entry != old {
                      worklist.push_back((target, a, entry.clone()));
                  }
              }

              // Negative transitions from `a`.
              for (&label, targets) in &states[a].transitions {
                  if !is_negative_symbol(label) {
                      continue;
                  }
                  for (target, w) in targets {
                      if *target >= n || w.is_empty() {
                          continue;
                      }
                      let entry = queries_at_state
                          .entry(*target)
                          .or_default()
                          .entry(a)
                          .or_insert_with(Weight::zeros);
                      let old = entry.clone();
                      *entry |= w;
                      if *entry != old {
                          worklist.push_back((*target, a, entry.clone()));
                      }
                  }
              }
          }

          // Propagate paths forward until a fixpoint is reached.
          while let Some((s, a, w_as)) = worklist.pop_front() {
              if w_as.is_empty() {
                  continue;
              }

              // If `s` is final, accumulate its contribution to `a`.
              if let Some(ref fw) = states[s].final_weight {
                  if !fw.is_empty() {
                      let add = &w_as & fw;
                      if !add.is_empty() {
                          let entry = future_final.entry(a).or_insert_with(Weight::zeros);
                          let old = entry.clone();
                          *entry |= &add;
                          if *entry != old {
                              // `future_final` is only an output accumulator; it does not
                              // affect further propagation, so we do not enqueue anything.
                          }
                      }
                  }
              }

              // Propagate along epsilon transitions from `s`.
              for &(target, ref w_st) in &states[s].epsilons {
                  if target >= n || w_st.is_empty() {
                      continue;
                  }
                  let new_w = &w_as & w_st;
                  if new_w.is_empty() {
                      continue;
                  }
                  let entry = queries_at_state
                      .entry(target)
                      .or_default()
                      .entry(a)
                      .or_insert_with(Weight::zeros);
                  let old = entry.clone();
                  *entry |= &new_w;
                  if *entry != old {
                      worklist.push_back((target, a, entry.clone()));
                  }
              }

              // Propagate along negative transitions from `s` only if `s` is in the filter.
              if source_states_filter.contains(&s) {
                  for (&label, targets) in &states[s].transitions {
                      if !is_negative_symbol(label) {
                          continue;
                      }
                      for (target, w_st) in targets {
                          if *target >= n || w_st.is_empty() {
                              continue;
                          }
                          let new_w = &w_as & w_st;
                          if new_w.is_empty() {
                              continue;
                          }
                          let entry = queries_at_state
                              .entry(*target)
                              .or_default()
                              .entry(a)
                              .or_insert_with(Weight::zeros);
                          let old = entry.clone();
                          *entry |= &new_w;
                          if *entry != old {
                              worklist.push_back((*target, a, entry.clone()));
