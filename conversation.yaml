      use std::collections::HashSet;
      use std::iter::Peekable;
      use std::sync::OnceLock;
      use std::vec::IntoIter;

      #[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]
      struct Span {
          start: usize,
          end: usize,
      }

      #[derive(Debug, Clone, PartialEq)]
