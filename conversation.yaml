      ```
      Template for terminal 'EOF' (2):
        [Pop(0, 0), Pop(1, [ALL]), Pop(0, 1), Pop(0, 1), Pop(1, [ALL]), Pop(0, [1, 4]), Pop(0, 4), Push(8), Push(6)]
        [Pop(0, 2), Pop(2, [ALL]), Pop(0, 1), Pop(0, [1, 4]), Pop(0, 4), Push(8), Push(6)]
