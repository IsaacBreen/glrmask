      fn test_precompute_with_gpt2_vocab() -> Result<(), Box<dyn std::error::Error>> {
          // 1. Define tokenizer: matches anything
          // The tokenizer will have one group (ID 0)
          let tokenizer_expr = groups![
              // tokens["FSTRING_MIDDLE"] = rep(choice([
              //     eat_u8_negation(ord("{")),
              //     eat("{{"),
