              let expr = groups![
                  non_greedy_group(rep(eat_u8(b'a'))), // Group 0: non-greedy
                  eat_u8(b'a'),                         // Group 1: greedy
              ];

              let regex = expr.build();

              // Input: "aaa"
              let mut regex_state = regex.init();
              regex_state.execute(b"aaa");

              // Expected:
              // Group 0 (non-greedy) should match "" (empty string)
