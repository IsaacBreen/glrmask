          fn bitvec_with_capacity_and_values(capacity: usize, values: Vec<usize>) -> HybridBitset {
              let mut bitvec = BitVec::new();
              bitvec.resize(capacity, false);
              for value in values {
                  bitvec.set(value, true);
              }
              bitvec.into()
          }

          #[ignore]
          #[test]
          fn test_grammar_from_exprs() {
              let exprs = vec![
                  (
                      "E".to_string(),
                      choice(vec![
                          sequence(vec![
                              r#ref("E"),
                              regex(eat_u8(b'+')),
                              r#ref("T"),
                          ]),
