              self._pop_index: Dict[int, Dict[int, Model._StateEntries]] = {}

              for uid, node in tqdm(
                  self.arena.items(),
                  desc="Normalizing gpt-5-7 arena and building pop index",
                  total=len(self.arena),
              ):
