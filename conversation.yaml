      fn gss_popn_collect(node: &PyGSSNode, n: usize) -> Vec<(usize, PyGSSNode)> {
          let pairs = rust_popn_collect(&node.inner, n);
          pairs.into_iter()
              .map(|(sid, arc)| (sid.0, PyGSSNode { inner: arc }))
              .collect()
      }

