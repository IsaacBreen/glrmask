              let mut dwa_a = DWA::new();
              let mut current = dwa_a.body.start_state;
              for &ch in &word_a {
                  let next = dwa_a.add_state();
                  dwa_a.add_transition(current, ch, next, Weight::all()).unwrap();
                  current = next;
