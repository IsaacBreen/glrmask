      The issue seems to be in the `process_default_reductions` method. The worklist was being processed deepest-first (`pop_last`), which can be inefficient for grammars with long chains of single-step reductions. By switching to a shallowest-first (`pop_first`) strategy, we process the reduction graph in a breadth-first manner. This is generally more stable, explores the state space more systematically, and can take better advantage of GSS node merging, preventing the parser from getting lost in deep reduction chains.

      Here are the patches for the fix and a new, minimal test case that specifically reproduces the issue you were seeing.

