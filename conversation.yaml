          }

          fn symmetric_difference(&self, other: &PyHybridBitset) -> PyHybridBitset {
              PyHybridBitset { inner: &self.inner ^ &other.inner }
          }

          fn to_json_string(&self) -> String {
              self.inner.to_json().to_json_string()
          }

