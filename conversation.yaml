              stats.stop('get_mask')

              if stats.times['get_mask.main_loop']*1000 > 1:
                  stats.report()
              stats.reset()

              return original_indices

          def finalize(self):
              """Called at the end of a benchmark run to perform any final actions, like printing stats."""
              print("\n--- Final Stats Report from Model ---")
