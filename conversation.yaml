                  else:
                      values[root_idx] = (gss_clone, new_mask)

                  depth = max_depth[root_idx]
                  bucket = todo.get(depth)
                  if bucket is None:
                      todo[depth] = {root_idx}
                      heappush(depth_heap, depth)
                  else:
                      bucket.add(root_idx)

              # Main scheduler

              # Helper to enqueue a node at a given depth
              def enqueue(depth: int, node_idx: int) -> None:
                  bucket = todo.get(depth)
                  if bucket is None:
                      todo[depth] = {node_idx}
                      heappush(depth_heap, depth)
                  else:
                      bucket.add(node_idx)

