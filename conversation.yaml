              for sid, gss in state_map.items():
                  new_mask = all_ones_mask
                  root_idx = roots_map.get(int(sid))
                  if root_idx is None:
                      continue
                  root_idx = int(root_idx)
                  
                  # printf"  SEED: sid={sid}, root_idx={root_idx}, gss_ptr={gss.ptr()}, mask={new_mask.to_ranges()}")

