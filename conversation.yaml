      for full_impl_path in "${ALL_IMPLS[@]}"; do
          echo
          echo ">>> Running test spec for: $full_impl_path"

          # --- Convert file path to module and class names ---
          # This logic handles both module paths (e.g., gss_tester.ref.RefGSS) and
