              let mut obj = StdMap::new();
              obj.insert("tokenizer".to_string(), self.tokenizer.to_json());
              obj.insert("parser".to_string(), self.parser.to_json());
              obj.insert("precomputed".to_string(), self.precomputed.to_json());
