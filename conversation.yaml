              #[derive(Clone)]
              struct StepVecData {
                  pairs: StepVecPairs, // sorted by NWAStateID
                  compiled_by_sig: Vec<(usize, Weight)>, // to be filled post-intern by using state_to_sig_id
                  total_mask: Weight,
