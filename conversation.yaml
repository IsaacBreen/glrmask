                                      values[node] = (gss_node, edge_idx, dest_idx)
                                      heapq.heappush(depth_heap, (self.node_min_dist.get(node, max_depth.get(node, 0)), node))
                              else:
                                  # No more edges; done with this node
                                  if node in values:
                                      del values[node]
