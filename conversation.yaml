      Step-by-step instructions

      1) Reuse “push-chain” nodes instead of re-creating them every time
      - In run_trie_based_elimination, add a chain cache:
        - chain_cache: BTreeMap<(IntermediatePrecomputeNode3Index, Vec<StateIDBV>), IntermediatePrecomputeNode3Index>
          - Key: (source node in the source arena, remaining “push sequence” bottom-to-top)
          - Value: the shared destination node in the output arena that is the target after performing the first push in that sequence; it already has the rest of the chain built behind it.
      - Add a helper closure get_chain_destination(src_idx, final_dest_idx, items) that:
        - Builds and caches the shared chain nodes from tail to head.
        - Returns the node that should be the destination of the first Push(items[0]) edge, with the rest of the pushes already wired to final_dest_idx using shared chain nodes.
        - For a 1-item sequence, it returns final_dest_idx (no extra node).

      2) Change the “Hot Node Stack Flushing” to use the chain cache
      - Previously, the code allocated a fresh linear chain for every hot product state, causing massive duplication.
      - Replace that with a shared chain:
        - Compute head_dest = get_chain_destination(src_idx, final_dest_idx, &items)
        - Insert a single edge Push(items[0]) from dest_idx to head_dest
        - Do not create intermediate nodes anew; they are shared via the cache.

      3) Change the “end-of-path stack flush” to use the chain cache and avoid creating intermediate pair states
      - Instead of creating pair-cache states for each suffix of the stack (which explodes the number of product states), just:
        - Ensure the empty-stack pair exists via get_or_create!(src_idx, empty)
        - Compute head_dest via the chain cache
        - Insert a single Push(items[0]) edge to head_dest
      - This keeps the output graph correct (it still reaches the empty-stack pair state), but avoids creating pair states for every suffix, resulting in a dramatic reduction of node count.

      4) Keep the previously added heuristics from the last step
      - These were already applied:
        - HOT_NODE_VISIT_THRESHOLD
        - UNIQUE_STACKS_PER_NODE_THRESHOLD
        - PAIR_CACHE_HARD_LIMIT
        - Full-graph SCCs for push-cycle detection
      - They remain fully compatible with this change and will help bound product-state growth, while the new chain sharing eliminates most redundant nodes created during flush.

