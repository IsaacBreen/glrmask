          let test_cases = [
              ("i", true),
              ("i+i*i", true),
              ("i+i", true),
              ("i*i", true),
              ("(i+i)*i", true),
              ("i+", false),   // Incomplete expression
              ("i++i", false), // Invalid syntax
              ("", false),     // Empty input
              (")", false),    // Unmatched parenthesis
              ("(i", false),   // Unmatched parenthesis
          ];

          for (input, expected_match) in test_cases {
