      /// A node in the Graph-Structured Stack (GSS).
      /// Simplified design: only root nodes carry Acc; internal nodes carry only predecessors.
      #[derive(Debug, Clone)]
      pub enum GSSNode {
          Root(GSSRoot),
          Internal(GSSInternal),
