          #[test]
          fn test_concatenate_simple() {
              let d1 = dwa_accepts_char('a', Weight::from_item(1)); // Final state is 1
              let d2 = dwa_accepts_char('b', Weight::from_item(2));
              let c = d1.concatenate(&d2);
