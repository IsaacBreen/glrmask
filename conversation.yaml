              children = self.arena.get(node, {}).get("children") or []
              for (pop, llm_bv_json), dests in children:
                  # Convert llm_bv_json to a RangeSet once for membership check
                  bv = ffi.Bitset.from_json_string(json.dumps(llm_bv_json))
