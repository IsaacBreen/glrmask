      1.  Open the file `src/finite_automata/regex_impl.rs`.
      2.  Find the method `pub fn execute_from_state(&self, input_bytes: &[u8], state_id: TokenizerStateID) -> ExecuteResult`.
      3.  Within this method, locate the line where `NFASimulator::new(...)` is called. It will be using a set of NFA states derived from the `state_id` parameter (e.g., `initial_nfa_states_from_dfa` in the example above).
