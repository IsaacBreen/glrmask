      use crate::glr::parser::GLRParser;
      use crate::glr::table::{NonTerminalID, Stage7ShiftsAndReducesLookaheadValue, StateID, TerminalID};
      use std::fmt::{Display, Formatter};
      use std::collections::{BTreeMap, BTreeSet, VecDeque};

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct ReduceCharacterization {
          pub terminal: TerminalID,
          pub nonterminal: NonTerminalID,
          // (revealed_state, pop_n, nonterminal)
          pub reveal_and_rereduces: BTreeSet<(StateID, usize, NonTerminalID)>,
          // (revealed_state, goto_state, shift_state)
          pub reveal_goto_shift_escapes: BTreeSet<(StateID, StateID, StateID)>,
      }

      impl Display for ReduceCharacterization {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "    Reduce Char for NT {}:", self.nonterminal.0)?;
              if !self.reveal_and_rereduces.is_empty() {
                  writeln!(f, "      Reveal-and-rereduces:")?;
                  for (revealed, pop, nt) in &self.reveal_and_rereduces {
                      writeln!(f, "        - revealed: {}, pop: {}, reduce_nt: {}", revealed.0, pop, nt.0)?;
                  }
              }
              if !self.reveal_goto_shift_escapes.is_empty() {
                  writeln!(f, "      Reveal-goto-shift escapes:")?;
                  for (revealed, goto, shift) in &self.reveal_goto_shift_escapes {
                      writeln!(f, "        - revealed: {}, goto: {}, shift: {}", revealed.0, goto.0, shift.0)?;
                  }
              }
              Ok(())
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct BelowBottomCharacterization {
          pub terminal: TerminalID,
          // (initial_state, shift_state)
          pub initial_shifts: BTreeSet<(StateID, StateID)>,
          // (initial_state, pop_n, nonterminal)
          pub initial_reduces: BTreeSet<(StateID, usize, NonTerminalID)>,
          pub reduce_characterizations: BTreeMap<NonTerminalID, ReduceCharacterization>,
      }

      impl Display for BelowBottomCharacterization {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              writeln!(f, "Characterization for Terminal {}:", self.terminal.0)?;
              if !self.initial_shifts.is_empty() {
                  writeln!(f, "  Initial Shifts:")?;
                  for (initial, shift) in &self.initial_shifts {
                      writeln!(f, "    - initial: {}, shift: {}", initial.0, shift.0)?;
                  }
              }
              if !self.initial_reduces.is_empty() {
                  writeln!(f, "  Initial Reduces:")?;
                  for (initial, len, nt) in &self.initial_reduces {
                      writeln!(f, "    - initial: {}, len: {}, nt: {}", initial.0, len, nt.0)?;
                  }
              }
              if !self.reduce_characterizations.is_empty() {
                  writeln!(f, "  Reduce Characterizations:")?;
                  for rc in self.reduce_characterizations.values() {
                      write!(f, "{}", rc)?;
                  }
              }
              Ok(())
          }
      }

      pub fn compute_all_characterizations(parser: &GLRParser) -> BTreeMap<TerminalID, BelowBottomCharacterization> {
          let mut all_chars = BTreeMap::new();
          for &terminal_id in parser.terminal_map.right_values() {
              if parser.ignore_terminal_id == Some(terminal_id) {
                  continue;
              }
              all_chars.insert(terminal_id, compute_below_bottom_characterization(parser, terminal_id));
          }
          all_chars
      }

      pub fn compute_below_bottom_characterization(parser: &GLRParser, terminal_id: TerminalID) -> BelowBottomCharacterization {
          let mut char = BelowBottomCharacterization {
              terminal: terminal_id,
              initial_shifts: BTreeSet::new(),
              initial_reduces: BTreeSet::new(),
              reduce_characterizations: BTreeMap::new(),
          };

          // --- 1. Compute initial actions ---
          for (&initial_state, row) in &parser.table {
              if let Some(action) = row.shifts_and_reduces_full.get(&terminal_id) {
                  match action {
                      Stage7ShiftsAndReducesLookaheadValue::Shift(shift_state) => {
                          char.initial_shifts.insert((initial_state, *shift_state));
                      }
                      Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id, len, .. } => {
                          char.initial_reduces.insert((initial_state, *len, *nonterminal_id));
                      }
                      Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } => {
                          if let Some(shift_state) = shift {
                              char.initial_shifts.insert((initial_state, *shift_state));
                          }
                          for (len, nts) in reduces {
                              for (nt_id, _) in nts {
                                  char.initial_reduces.insert((initial_state, *len, *nt_id));
                              }
                          }
                      }
                  }
              }
          }

          // --- 2. Compute reduce characterizations ---
          for &nt_id in parser.non_terminal_map.right_values() {
              let mut reduce_char = ReduceCharacterization {
                  terminal: terminal_id,
                  nonterminal: nt_id,
                  reveal_and_rereduces: BTreeSet::new(),
                  reveal_goto_shift_escapes: BTreeSet::new(),
              };

              // Iterate over all possible revealed states
              for (&revealed_state, row) in &parser.table {
                  // Check if this state has a GOTO for our non-terminal
                  if let Some(goto) = row.gotos.get(&nt_id) {
                      if let Some(goto_state) = goto.state_id {
                          // This is a valid starting point for a chain.
                          let mut worklist: VecDeque<StateID> = VecDeque::new();
                          worklist.push_back(goto_state);
                          let mut visited: BTreeSet<StateID> = BTreeSet::new();
                          visited.insert(goto_state);

                          while let Some(current_state) = worklist.pop_front() {
                              if let Some(action) = parser.table.get(&current_state).and_then(|r| r.shifts_and_reduces_full.get(&terminal_id)) {
                                  match action {
                                      Stage7ShiftsAndReducesLookaheadValue::Shift(shift_state) => {
                                          reduce_char.reveal_goto_shift_escapes.insert((revealed_state, current_state, *shift_state));
                                      }
                                      Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id: reduce_nt, len, .. } => {
                                          if *len == 1 {
                                              // Unit reduction chain
                                              if let Some(next_goto) = parser.table.get(&revealed_state).and_then(|r| r.gotos.get(reduce_nt)) {
                                                  if let Some(next_goto_state) = next_goto.state_id {
                                                      if visited.insert(next_goto_state) {
                                                          worklist.push_back(next_goto_state);
                                                      }
                                                  }
                                              }
                                          } else if *len > 1 {
                                              // Pop below revealed state
                                              reduce_char.reveal_and_rereduces.insert((revealed_state, *len - 2, *reduce_nt));
                                          }
                                      }
                                      Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces } => {
                                          if let Some(shift_state) = shift {
                                              reduce_char.reveal_goto_shift_escapes.insert((revealed_state, current_state, *shift_state));
                                          }
                                          for (len, nts) in reduces {
                                              for (reduce_nt, _) in nts {
                                                  if *len == 1 {
                                                      if let Some(next_goto) = parser.table.get(&revealed_state).and_then(|r| r.gotos.get(reduce_nt)) {
                                                          if let Some(next_goto_state) = next_goto.state_id {
                                                              if visited.insert(next_goto_state) {
                                                                  worklist.push_back(next_goto_state);
                                                              }
                                                          }
                                                      }
                                                  } else if *len > 1 {
                                                      reduce_char.reveal_and_rereduces.insert((revealed_state, *len - 2, *reduce_nt));
                                                  }
                                              }
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }

              if !reduce_char.reveal_and_rereduces.is_empty() || !reduce_char.reveal_goto_shift_escapes.is_empty() {
                  char.reduce_characterizations.insert(nt_id, reduce_char);
              }
          }

          char
      }
    src/precompute4/conversion.rs: |
      // src/precompute4/conversion.rs
      use crate::constraint::{PrecomputeNode3, PrecomputeNode3Index, PrecomputedNodeContents, StateIDBV, Trie3GodWrapper, LLMTokenBV};
      use crate::datastructures::trie::Trie;
      use crate::weighted_automata::{DWA, StateID as WaStateID, Weight as WaWeight};
      use std::collections::BTreeMap;

      pub fn dwa_to_precompute3(
          dwa: &DWA,
          trie3_god: &Trie3GodWrapper,
          _internal_max_llm_token: usize,
          max_parser_state_id: usize,
      ) -> PrecomputeNode3Index {
          let mut dwa_state_to_trie_node: BTreeMap<WaStateID, PrecomputeNode3Index> = BTreeMap::new();
          let all_parser_states = StateIDBV::ones(max_parser_state_id + 1);

          // Create all nodes first
          for (dwa_id, dwa_state) in dwa.states.iter().enumerate() {
              let live_tokens = LLMTokenBV::from(dwa_state.weight.0.clone());
              // All nodes from DWA states are internal; a shared 'end_node' will represent final states.
              let contents = PrecomputedNodeContents { end: false, live_tokens };
              let trie_node = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(contents)));
              dwa_state_to_trie_node.insert(dwa_id, trie_node);
          }

          let end_node = PrecomputeNode3Index::new(trie3_god.insert(Trie::new(PrecomputedNodeContents::leaf())));

          // Create edges
          for (dwa_id, dwa_state) in dwa.states.iter().enumerate() {
              let src_trie_node = *dwa_state_to_trie_node.get(&dwa_id).unwrap();

              // Edge to the shared end node for final states
              if let Some(final_weight) = &dwa_state.final_weight {
                  let final_weight_bv = LLMTokenBV::from(final_weight.0.clone());
                  if !final_weight_bv.is_empty() {
                      let edge_key = (0, final_weight_bv); // pop 0
                      let edge_val = all_parser_states.clone();
                      trie3_god.insert_edge_simple(src_trie_node, end_node, edge_key, edge_val);
                  }
              }

              let mut handled_exceptions = StateIDBV::zeros();

              // Exception transitions
              for (&char_code, &target_dwa_id) in &dwa_state.transitions.exceptions {
                  let target_trie_node = *dwa_state_to_trie_node.get(&target_dwa_id).unwrap();
                  let parser_state_id = char_code as usize;
                  handled_exceptions.insert(parser_state_id);

                  let trans_weight = dwa_state.trans_weights_exceptions.get(&char_code).cloned().unwrap_or_else(WaWeight::zeros);
                  let trans_weight_bv = LLMTokenBV::from(trans_weight.0.clone());

                  if !trans_weight_bv.is_empty() {
                      let edge_key = (1, trans_weight_bv); // pop 1
                      let mut edge_val = StateIDBV::zeros();
                      edge_val.insert(parser_state_id);
                      trie3_god.insert_edge_simple(src_trie_node, target_trie_node, edge_key, edge_val);
                  }
              }

              // Default transition
              if let Some(target_dwa_id) = dwa_state.transitions.default {
                  let target_trie_node = *dwa_state_to_trie_node.get(&target_dwa_id).unwrap();
                  let trans_weight = dwa_state.trans_weight_default.as_ref().cloned().unwrap_or_else(WaWeight::zeros);
                  let trans_weight_bv = LLMTokenBV::from(trans_weight.0.clone());

                  if !trans_weight_bv.is_empty() {
                      let edge_key = (1, trans_weight_bv); // pop 1
                      let edge_val = &all_parser_states - &handled_exceptions;
                      if !edge_val.is_empty() {
                          trie3_god.insert_edge_simple(src_trie_node, target_trie_node, edge_key, edge_val);
                      }
                  }
              }
          }

          *dwa_state_to_trie_node.get(&dwa.start_state).unwrap()
      }
    src/precompute4/full_nwa.rs: |
      use crate::constraint::{PrecomputeNode1Index, Trie1GodWrapper};
      use crate::glr::parser::{ExpectElse, GLRParser};
      use crate::tokenizer::TokenizerStateID;
      use crate::weighted_automata::{DWA, NWA as WaNWA, Weight as WaWeight};
      use std::collections::{BTreeMap, BTreeSet};
      use crate::datastructures::trie::Trie;
      use crate::precompute4::augmented_nwa::AugmentedNwa;
      use crate::glr::table::TerminalID;

      pub type Precomputed4 = BTreeMap<TokenizerStateID, DWA>;

      pub fn precompute4(parser: &GLRParser, precomputed1: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>, trie1_god: &Trie1GodWrapper) -> Precomputed4 {
          // 1. Build augmented NWAs for all terminals.
          let augmented_nwas = match crate::precompute4::augmented_nwa::build_augmented_nwas(parser) {
              Ok(nwas) => nwas,
              Err(e) => panic!("Failed to build augmented NWAs: {:?}", e),
          };

          println!("\n--- Augmented NWA Generation ---");
          for aug_nwa in augmented_nwas.values() {
              println!("{}", aug_nwa);
          }
          println!("--- End Augmented NWA Generation ---\n");

          // 2. Reverse the precompute1 trie.
          let trie1_roots: Vec<_> = precomputed1.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie1_god, &trie1_roots);

          let leaf_node = all_nodes.iter().find_map(|&idx| {
              idx.read(trie1_god).and_then(|g| if g.value.end { Some(idx) } else { None })
          }).expect("Precompute1 trie must have a single leaf node.");

          let reversed_trie1_god = Trie::reverse(trie1_god, &trie1_roots);
          let reversed_trie_root = leaf_node;

          // 3. Traverse the reversed trie.
          let traversal_data = Trie::compute_traversal_data(&reversed_trie1_god, &[reversed_trie_root])
              .expect("Failed to compute traversal data for reversed trie1");

          let mut initial_nwa = WaNWA::new();
          let initial_state = initial_nwa.start_state;
          initial_nwa.set_final_weight(initial_state, WaWeight::all());
          let initial_aug_nwa = AugmentedNwa {
              terminal: TerminalID(usize::MAX),
              nwa: initial_nwa,
              end_state: initial_state,
              nt_nodes: BTreeMap::new(),
              end_map: BTreeMap::from([(initial_state, BTreeSet::from([vec![]]))]),
          };

          let initial_values = vec![(reversed_trie_root, initial_aug_nwa)];

          let mut final_nwas: BTreeMap<TokenizerStateID, AugmentedNwa> = BTreeMap::new();
          let original_trie1_roots_map: BTreeMap<_,_> = precomputed1.iter().map(|(k,v)|(v.clone(), *k)).collect();

          Trie::special_map_grouped(
              &reversed_trie1_god,
              &traversal_data,
              initial_values,
              // step function
              |current_aug_nwa, edge_terminal_opt, dest_map| {
                  let mut results: Vec<(PrecomputeNode1Index, AugmentedNwa)> = Vec::new();

                  if edge_terminal_opt.is_some() && *edge_terminal_opt != parser.ignore_terminal_id {
                      let terminal_id = edge_terminal_opt.unwrap();
                      let terminal_aug_nwa = augmented_nwas.get(&terminal_id).expect_else(|| format!("No augmented NWA for terminal {:?}", terminal_id));
                      for (dest_idx, llm_token_bv) in dest_map.iter() {
                          let mut new_aug_nwa = terminal_aug_nwa.clone();
                          let weight: WaWeight = WaWeight::from_rsb(llm_token_bv.inner.as_ref().clone());
                          new_aug_nwa.combine_right_into(current_aug_nwa, &weight)
                              .expect("Combine failed");
                          results.push((*dest_idx, new_aug_nwa));
                      }
                  } else {
                      // Epsilon-like edge in grammar trie. Just propagate the current NWA.
                      for (dest_idx, _llm_token_bv) in dest_map.iter() {
                          results.push((*dest_idx, current_aug_nwa.clone()));
                      }
                  }
                  results
              },
              // merge function
              |aug_nwa1, aug_nwa2| {
                  aug_nwa1.union_with(&aug_nwa2);
              },
              // process function
              |node_data, node_idx, aug_nwa| {
                  if let Some(tokenizer_state_id) = original_trie1_roots_map.get(&node_idx) {
                      final_nwas.insert(*tokenizer_state_id, aug_nwa.clone());
                  }
                  true // continue traversal
              },
          );

          // 4. Convert final NWAs to DWAs and simplify.
          let mut precomputed4: Precomputed4 = BTreeMap::new();
          for (sid, aug_nwa) in final_nwas {
              let mut dwa = aug_nwa.nwa.determinize();
              dwa.simplify();
              precomputed4.insert(sid, dwa);
          }

          precomputed4
      }
