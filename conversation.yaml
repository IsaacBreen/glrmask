    src/trie3_opt/optimizer.rs: |
      use std::collections::{BTreeMap, BTreeSet};
      use std::time::Instant;

      use crate::constraint::{PrecomputeNode3Index, LLMTokenBV, StateIDBV, Trie3GodWrapper, PrecomputedNodeContents};
      use crate::constraint_extra::{PrecomputeStats, calculate_final_stats3, print_precompute_stats3};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::{PathComparison, Trie};
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::trie3_opt::passes::full::config::Trie3Config;
      use crate::trie3_opt::passes::full::{
          atoms::{refine_edges_to_token_atoms_trie3, refine_edges_to_token_atoms_trie3_exact},
          canonicalize::canonicalize_end_nodes_trie3,
          compress::compress_trie3_edges,
          compress_chains::compress_unary_chains_trie3,
          constrain::constrain_bitvecs_trie3,
          cycles::{
              assert_pop0_paths_to_end_are_short, has_true_cycle_trie3, has_true_cycle_trie3_llm_only,
          },
          factoring::factor_common_destinations_trie3,
          factor_root::factor_root_fanout_via_atoms,
          global_atoms_merge::merge_nodes_trie3_global_atoms,
          merges::{merge_nodes_trie3, merge_nodes_trie3_structural, merge_nodes_trie3_ultrafast},
          normalize::normalize_live_tokens_trie3,
          pop0::{assert_no_pop0_nonroot_edges_trie3, eliminate_pop0_edges_except_roots_trie3},
          prune::prune_dead_paths_trie3,
          prune_end_reach::prune_nodes_not_reaching_end_trie3,
          reorder::reorder_llm_tokens_for_range_minimization_trie3,
          simplify::simplify_llm_token_bvs_trie3,
          generalize::propagate_and_generalize_sids_trie3,
          stats::{compute_and_print_precompute_stats3, debug_remove_pop_gt_0_edges_trie3},
          tokens::merge_equivalent_llm_tokens_trie3,
      };
      use crate::trie3_opt::passes::full::config::Trie3MergeConfig;
      use crate::constraint::StageVocab;
      use rand::prelude::*;

      /// High-level size optimizer for precompute3 tries, migrated from passes::constraint_precompute3_utils.
      /// This function retains the exact signature and behavior, orchestrating the pipeline of heavy passes.
      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &Trie3Config,
          max_state_id: usize,
          mut max_llm_token_id: usize,
          stage_vocab: &mut StageVocab,
          parser: &GLRParser,
      ) {
          has_true_cycle_trie3(trie3_god, &roots.values().cloned().collect::<Vec<_>>());
          has_true_cycle_trie3_llm_only(
              trie3_god,
              &roots.values().cloned().collect::<Vec<_>>(),
              stage_vocab.internal_max_llm_token,
          );

          if !config.enabled {
              return;
          }

          let (original_arena, original_roots) = if config.stochastic_equivalence_check {
              crate::debug!(2, "Stochastic equivalence check enabled. Cloning initial trie.");
              let initial_roots_map_sorted: Vec<_> = roots.iter().collect();
              let initial_roots_vec: Vec<_> =
                  initial_roots_map_sorted.iter().map(|(_, &idx)| idx).collect();
              let (cloned_arena, cloned_roots_vec, _) =
                  Trie::deep_copy_subtrees(trie3_god, &initial_roots_vec);
              let cloned_roots_map: BTreeMap<_, _> = initial_roots_map_sorted
                  .into_iter()
                  .map(|(k, _)| *k)
                  .zip(cloned_roots_vec)
                  .collect();
              (Some(cloned_arena), Some(cloned_roots_map))
          } else {
              (None, None)
          };

          crate::debug!(2, "Optimizing Trie 3 size...");

          // First normalize any stale derived fields so they don't affect downstream reasoning.
          crate::debug!(2, "Initial stats:");
          compute_and_print_precompute_stats3(roots, trie3_god, max_llm_token_id, max_state_id);

          let mut step_counter = 1;
          macro_rules! run_pass {
              ($name:expr, $code:block) => {
                  crate::debug!(2, "Running optimization pass {}: {}...", step_counter, $name);
                  let start = Instant::now();
                  $code
                  let duration = start.elapsed();
                  crate::debug!(
                      2,
                      "Pass {} ('{}') finished in {:?}",
                      step_counter,
                      $name,
                      duration
                  );
                  crate::debug!(2, "Stats after pass {}:", step_counter);
                  compute_and_print_precompute_stats3(roots, trie3_god, max_llm_token_id, max_state_id);
                  step_counter += 1;
              };
          }
          // Normalize live_tokens right at the beginning of optimization passes to ensure it remains derived.
          run_pass!("Normalizing derived live_tokens", {
              normalize_live_tokens_trie3(roots, trie3_god);
          });

          for pass_num in 0..config.num_passes {
              if config.num_passes > 1 {
                  crate::debug!(
                      2,
                      "--- Starting optimization super-pass {}/{} ---",
                      pass_num + 1,
                      config.num_passes
                  );
              }

              if config.debug_remove_pop_gt_0 {
                  run_pass!("DEBUG: Removing pop > 0 edges", {
                      debug_remove_pop_gt_0_edges_trie3(roots, trie3_god);
                  });
              }

              // --- Phase 1: Initial Pruning & Vocab Reduction ---
              // These passes are expensive but have a huge impact on the initial massive graph.
              // They are essential to run first to make subsequent passes feasible.
              if config.merge_nodes_ultrafast {
                  run_pass!("Merging nodes (fast pre-pass)", {
                      merge_nodes_trie3_ultrafast(roots, trie3_god);
                      merge_nodes_trie3(roots, trie3_god, 40);
                  });
              }

              if config.prune_dead_paths {
                  run_pass!("Pruning dead paths", {
                      prune_dead_paths_trie3(roots, &trie3_god);
                  });
              }

              if config.prune_nodes_not_reaching_end {
                  run_pass!("Pruning nodes that do not reach end", {
                      prune_nodes_not_reaching_end_trie3(roots, &trie3_god);
                  });
              }

              // New: Collapse all END nodes early to maximize downstream sharing.
              run_pass!("Canonicalizing END nodes (pre-merge)", {
                  canonicalize_end_nodes_trie3(roots, trie3_god);
              });

              if config.merge_equivalent_llm_tokens {
                  run_pass!("Merging equivalent LLM tokens", {
                      merge_equivalent_llm_tokens_trie3(roots, trie3_god, stage_vocab);
                  });
              }

              if config.reorder_llm_tokens {
                  run_pass!("Reordering LLM tokens for range minimization", {
                      reorder_llm_tokens_for_range_minimization_trie3(roots, trie3_god, stage_vocab);
                      max_llm_token_id = stage_vocab.internal_max_llm_token;
                  });
              }

              if config.constrain_bitvecs {
                  let roots_vec: Vec<_> = roots.values().cloned().collect();
                  let _all_nodes_pinner = Trie::all_nodes(&trie3_god, &roots_vec);
                  run_pass!("Constraining bitvectors", {
                      constrain_bitvecs_trie3(trie3_god, &roots_vec, max_state_id, max_llm_token_id);
                  });
              }

              if config.generalize_sids {
                  run_pass!("Generalizing StateID bitvectors", {
                      propagate_and_generalize_sids_trie3(
                          roots, trie3_god, parser, max_state_id,
                      );
                  });
              }

              // Root fanout factoring (p>0 only): dramatically reduces root out-degree
              // by routing tokens through atom-specific intermediates with aggregated dest maps.
              if config.factor_root_fanout && config.factor_root_fanout_max_atoms_per_pop > 0 {
                  run_pass!("Root fanout factoring (token atoms, p>0 only)", {
                      factor_root_fanout_via_atoms(
                          roots,
                          trie3_god,
                          max_llm_token_id,
                          max_state_id,
                          config.factor_root_fanout_max_atoms_per_pop,
                      );
                  });
              }

              if config.simplify_llm_token_bvs {
                  run_pass!("Simplifying LLM token bitsets", {
                      simplify_llm_token_bvs_trie3(roots, &trie3_god, max_llm_token_id);
                  });
              }

              if config.factor_common_destinations {
                  run_pass!("Factoring common destinations", {
                      factor_common_destinations_trie3(
                          roots,
                          trie3_god,
                          max_llm_token_id,
                          max_state_id,
                          config.factor_common_destinations_min_incoming,
                      );
                  });
              }

              if config.compress_edges {
                  run_pass!("Compressing edges + unary chains", {
                      compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                      // Contract simple linear chains where (pop, tokens) are identical across the hop.
                      compress_unary_chains_trie3(roots, &trie3_god);
                  });
              }

              // Refine token-sets to semantic atoms per node/pop to maximally coalesce behaviorally identical tokens.
              if config.refine_token_atoms {
                  run_pass!("Refining token-set atoms", {
                      refine_edges_to_token_atoms_trie3(
                          roots,
                          &trie3_god,
                          max_llm_token_id,
                          max_state_id,
                          config.refine_token_atoms_max_blocks,
                      );
                  });
              }

              // NEW: Global-atoms bisimulation merge. This aligns token semantics across nodes globally (per pop)
              // and merges nodes whose behavior is identical for each global token-atom and pop, even when their
              // local edge partitions differ.
              if config.merge_nodes_global_atoms && config.merge_nodes_global_atoms_max_iters > 0 {
                  run_pass!("Merging nodes (global-atoms bisimulation)", {
                      merge_nodes_trie3_global_atoms(
                          roots,
                          &trie3_god,
                          max_llm_token_id,
                          config.merge_nodes_global_atoms_max_iters,
                          config.merge_nodes_global_atoms_max_atoms_per_pop,
                      );
                  });
              }

              // After compression, prune and GC before the expensive merge.
              if config.prune_dead_paths {
                  run_pass!("Pruning dead paths (post-compress)", {
                      prune_dead_paths_trie3(roots, &trie3_god);
                  });
              }
              if config.gc {
                  run_pass!("Garbage collection (pre-merge)", {
                      Trie::gc(
                          &trie3_god,
                          &roots.values().cloned().collect::<Vec<_>>(),
                      );
                  });
              }

              if config.merge_nodes_structural {
                  run_pass!("Merging nodes (structural)", {
                      merge_nodes_trie3_structural(
                          roots,
                          &trie3_god,
                          config.merge_nodes_exact.exact_max_iters,
                      );
                  });
                  // Structural merge can create parallel edges (same dest/pop/sids, diff tokens).
                  // Compress them immediately.
                  if config.compress_edges {
                      run_pass!("Compressing edges + unary chains (post-structural)", {
                          compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                          // Re-run chain contraction now that structure may have simplified.
                          compress_unary_chains_trie3(roots, &trie3_god);
                      });
                  }
              }

              if config.merge_nodes_exact.enabled {
                  run_pass!("Merging nodes", {
                      merge_nodes_trie3(
                          roots,
                          &trie3_god,
                          config.merge_nodes_exact.exact_max_iters,
                      );
                  });
              }

              // --- Phase 3: Iterative Refinement ---
              // A few rounds of compression and merging on the now much smaller graph.

              if config.prune_nodes_not_reaching_end {
                  run_pass!("Pruning nodes that do not reach end (post-merge)", {
                      prune_nodes_not_reaching_end_trie3(roots, &trie3_god);
                  });
              }

              if config.compress_edges {
                  run_pass!("Compressing edges + unary chains (post-merge)", {
                      compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                      // Final contraction pass to remove any last unary runs.
                      compress_unary_chains_trie3(roots, &trie3_god);
                  });
              }
              if config.refine_token_atoms {
                  run_pass!("Refining token-set atoms (post-merge)", {
                      refine_edges_to_token_atoms_trie3(
                          roots,
                          &trie3_god,
                          max_llm_token_id,
                          max_state_id,
                          config.refine_token_atoms_max_blocks,
                      );
                  });
              }

              if config.merge_nodes_exact.enabled {
                  run_pass!("Merging nodes (post-compress)", {
                      merge_nodes_trie3(
                          roots,
                          &trie3_god,
                          config.merge_nodes_exact.exact_max_iters,
                      );
                  });
              }

              // --- Phase 4: Final Cleanup and Polish ---

              if config.prune_dead_paths {
                  run_pass!("Pruning dead paths (final)", {
                      prune_dead_paths_trie3(roots, &trie3_god);
                  });
              }

              if config.gc {
                  run_pass!("Garbage collection (final)", {
                      Trie::gc(
                          &trie3_god,
                          &roots.values().cloned().collect::<Vec<_>>(),
                      );
                  });
              }

              if config.merge_equivalent_llm_tokens {
                  run_pass!("Merging equivalent LLM tokens (final pass)", {
                      merge_equivalent_llm_tokens_trie3(roots, trie3_god, stage_vocab);
                  });
              }
              if config.reorder_llm_tokens {
                  run_pass!("Reordering LLM tokens (final pass)", {
                      reorder_llm_tokens_for_range_minimization_trie3(
                          roots,
                          trie3_god,
                          stage_vocab,
                      );
                  });
              }

              // New pass: eliminate pop=0 edges originating from non-root nodes.
              if config.eliminate_pop0_edges {
                  run_pass!("Eliminating pop=0 edges (non-roots)", {
                      eliminate_pop0_edges_except_roots_trie3(roots, trie3_god);
                      if config.assert_no_pop0_nonroot_edges {
                          assert_no_pop0_nonroot_edges_trie3(roots, trie3_god);
                      }
                  });
                  // Optional compaction right after: merge identical dest maps and shrink live tokens.
                  if config.compress_edges {
                      run_pass!("Compressing edges + unary chains (post-pop0-elim)", {
                          // Use current maxes as we have the latest vocab and state bounds
                          compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                          compress_unary_chains_trie3(roots, &trie3_god);
                      });
                  }
                  if config.refine_token_atoms {
                      run_pass!("Refining token-set atoms (post-structural)", {
                          refine_edges_to_token_atoms_trie3(
                              roots,
                              &trie3_god,
                              max_llm_token_id,
                              max_state_id,
                              config.refine_token_atoms_max_blocks,
                          );
                      });
                  }
                  if config.refine_token_atoms_exact {
                      run_pass!("Refining token-set atoms (exact, post-pop0-elim)", {
                          refine_edges_to_token_atoms_trie3_exact(
                              roots,
                              &trie3_god,
                              max_llm_token_id,
                              max_state_id,
                          );
                      });
                  }
                  // NEW: Immediately minimize after pop0 elimination to collapse the explosion.
                  if config.prune_dead_paths {
                      run_pass!("Pruning dead paths (post-pop0-elim)", {
                          prune_dead_paths_trie3(roots, &trie3_god);
                      });
                  }
                  if config.gc {
                      run_pass!("Garbage collection (post-pop0-elim)", {
                          Trie::gc(
                              &trie3_god,
                              &roots.values().cloned().collect::<Vec<_>>(),
                          );
                      });
                  }
                  if config.merge_nodes_structural {
                      run_pass!("Merging nodes (structural, post-pop0-elim)", {
                          merge_nodes_trie3_structural(
                              roots,
                              &trie3_god,
                              config.merge_nodes_exact.exact_max_iters,
                          );
                      });
                      if config.compress_edges {
                          run_pass!("Compressing edges + unary chains (post-pop0-struct-merge)", {
                              compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                              compress_unary_chains_trie3(roots, &trie3_god);
                          });
                      }
                      // Defensive: immediately refine token atoms to allow reversing any local structure
                      // that the compression step couldn't improve under the global cost metric.
                      // This gives the pipeline a way to re-split token sets when that reduces local cost.
                      if config.refine_token_atoms {
                          run_pass!("Refining token-set atoms (defensive, post-compress)", {
                              refine_edges_to_token_atoms_trie3(
                                  roots,
                                  &trie3_god,
                                  max_llm_token_id,
                                  max_state_id,
                                  config.refine_token_atoms_max_blocks,
                              );
                          });
                      }
                  }
                  if config.merge_nodes_exact.enabled {
                      run_pass!("Merging nodes (exact, post-pop0-elim)", {
                          merge_nodes_trie3(
                              roots,
                              &trie3_god,
                              config.merge_nodes_exact.exact_max_iters,
                          );
                      });
                  }
                  if config.prune_nodes_not_reaching_end {
                      run_pass!("Pruning nodes that do not reach end (post-pop0-elim)", {
                          prune_nodes_not_reaching_end_trie3(roots, &trie3_god);
                      });
                  }
                  if config.compress_edges {
                      run_pass!("Compressing edges + unary chains (post-pop0-elim-merge)", {
                          compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                          compress_unary_chains_trie3(roots, &trie3_god);
                      });
                  }
                  if config.refine_token_atoms {
                      run_pass!("Refining token-set atoms (post-pop0-elim-merge)", {
                          refine_edges_to_token_atoms_trie3(
                              roots,
                              &trie3_god,
                              max_llm_token_id,
                              max_state_id,
                              config.refine_token_atoms_max_blocks,
                          );
                      });
                  }
                  if config.refine_token_atoms_exact {
                      run_pass!("Refining token-set atoms (exact, post-pop0-elim-merge)", {
                          refine_edges_to_token_atoms_trie3_exact(
                              roots,
                              &trie3_god,
                              max_llm_token_id,
                              max_state_id,
                          );
                      });
                  }
              }
          }

          crate::debug!(2, "Recomputing max depths...");
          Trie::recompute_all_max_depths(&trie3_god, &roots.values().cloned().collect::<Vec<_>>());

          has_true_cycle_trie3(trie3_god, &roots.values().cloned().collect::<Vec<_>>());
          has_true_cycle_trie3_llm_only(
              trie3_god,
              &roots.values().cloned().collect::<Vec<_>>(),
              stage_vocab.internal_max_llm_token,
          );

          // Optional final exact atom refinement as a polish step
          if config.refine_token_atoms_exact {
              run_pass!("Refining token-set atoms (exact, final)", {
                  refine_edges_to_token_atoms_trie3_exact(
                      roots,
                      &trie3_god,
                      max_llm_token_id,
                      max_state_id,
                  );
              });
          }

          // Final pop=0 elimination pass to be sure.
          if config.eliminate_pop0_edges {
              run_pass!("Eliminating pop=0 edges (final cleanup)", {
                  eliminate_pop0_edges_except_roots_trie3(roots, trie3_god);
                  if config.assert_no_pop0_nonroot_edges {
                      assert_no_pop0_nonroot_edges_trie3(roots, trie3_god);
                  }
              });
              if config.compress_edges {
                  run_pass!("Compressing edges (post-final-pop0-elim)", {
                      compress_trie3_edges(roots, &trie3_god, max_llm_token_id, max_state_id);
                      compress_unary_chains_trie3(roots, &trie3_god);
                  });
              }
              if config.merge_nodes_exact.enabled {
                  run_pass!("Merging nodes (post-final-pop0-elim)", {
                      merge_nodes_trie3(
                          roots,
                          &trie3_god,
                          config.merge_nodes_exact.exact_max_iters,
                      );
                  });
              }
          }

          // Enforce single END node invariant as a final polish step.
          // This guarantees we never leave the pipeline with more than one END node,
          // even if earlier passes already canonicalized them.
          run_pass!("Canonicalizing END nodes (final polish)", {
              canonicalize_end_nodes_trie3(roots, trie3_god);
          });

          if let (Some(original_arena), Some(original_roots)) = (original_arena, original_roots) {
              crate::debug!(2, "Running stochastic equivalence check...");

              type PrecomputeTrie3Path = (
                  PrecomputedNodeContents,
                  Vec<((isize, LLMTokenBV), StateIDBV, PrecomputedNodeContents)>,
              );

              fn pretty_print_path(path: &PrecomputeTrie3Path) -> String {
                  let (root_contents, edges) = path;
                  let mut s = String::new();
                  s.push_str(&format!(
                      "[Root] end: {}, live_tokens: {:?}\n",
                      root_contents.end, root_contents.live_tokens
                  ));

                  for (i, (edge_key, state_bv, dest_contents)) in edges.iter().enumerate() {
                      let (pop, llm_bv) = edge_key;
                      s.push_str("  |\n");
                      s.push_str(&format!(
                          "  +-- Edge(pop={}): llm_tokens={:?}, state_ids={:?}\n",
                          pop, llm_bv, state_bv
                      ));
                      s.push_str("  |\n");
                      s.push_str("  V\n");
                      s.push_str(&format!(
                          "[Node {}] end: {}, live_tokens: {:?}\n",
                          i + 1,
                          dest_contents.end,
                          dest_contents.live_tokens
                      ));
                  }
                  s
              }

              fn get_path_summary(
                  path: &PrecomputeTrie3Path,
              ) -> (LLMTokenBV, BTreeMap<isize, StateIDBV>) {
                  let (root_contents, edges) = path;
                  let mut llm_intersection = LLMTokenBV::max_ones();
                  let mut state_checks = BTreeMap::<isize, StateIDBV>::new();
                  let mut current_pos: isize = 0;

                  let mut current_node_live_tokens = &root_contents.live_tokens;

                  for ((pop, llm_bv), state_bv, next_node_contents) in edges {
                      llm_intersection &= current_node_live_tokens;
                      llm_intersection &= llm_bv;

                      current_pos += *pop;
                      state_checks
                          .entry(current_pos)
                          .and_modify(|e| *e &= state_bv)
                          .or_insert_with(|| state_bv.clone());

                      current_node_live_tokens = &next_node_contents.live_tokens;
                  }

                  (llm_intersection, state_checks)
              }

              let compare = |p1: &PrecomputeTrie3Path, p2: &PrecomputeTrie3Path| -> PathComparison {
                  // Ignore 'live_tokens' in node contents; only 'end' must match at each node.
                  if p1.0.end != p2.0.end {
                      return PathComparison::Different;
                  }

                  if p1.1.len() > p2.1.len() {
                      return PathComparison::Different;
                  }
                  // We only need to compare the prefix of p2 that has the same length as p1.
                  let p2_prefix_path = (p2.0.clone(), p2.1[..p1.1.len()].to_vec());

                  let (llm1, states1) = get_path_summary(p1);
                  let (llm2_prefix, states2_prefix) = get_path_summary(&p2_prefix_path);

                  if !llm2_prefix.is_subset(&llm1) {
                      return PathComparison::Different;
                  }

                  let all_positions: BTreeSet<_> =
                      states1.keys().chain(states2_prefix.keys()).copied().collect();
                  for pos in all_positions {
                      let s1 = states1
                          .get(&pos)
                          .cloned()
                          .unwrap_or_else(StateIDBV::max_ones);
                      let s2_prefix = states2_prefix
                          .get(&pos)
                          .cloned()
                          .unwrap_or_else(StateIDBV::max_ones);
                      if !s2_prefix.is_subset(&s1) {
                          return PathComparison::Different;
                      }
                  }

                  if p1.1.len() == p2.1.len() {
                      PathComparison::Equal
                  } else {
                      PathComparison::Prefix
                  }
              };

              // Note: get_path_summary now ignores 'live_tokens' completely (uses only edge masks).
              let mut rng = rand::thread_rng();
              let num_samples = 1000;
              let max_path_len = 50;

              let original_roots_vec: Vec<_> = original_roots.values().cloned().collect();
              let optimized_roots_vec: Vec<_> = roots.values().cloned().collect();

              let mut failing_path: Option<PrecomputeTrie3Path> = None;
              let mut a_is_original = true;

              // Check paths from original in optimized
              for _ in 0..num_samples {
                  if let Some(path) =
                      Trie::sample_path(&original_arena, &original_roots_vec, max_path_len, &mut rng)
                  {
                      if get_path_summary(&path).0.is_empty() {
                          continue; // Path is semantically invalid due to inconsistent live_tokens.
                      }
                      if !Trie::path_exists(trie3_god, &optimized_roots_vec, &path, compare) {
                          failing_path = Some(path);
                          a_is_original = true;
                          break;
                      }
                  }
              }

              if failing_path.is_none() {
                  // Check paths from optimized in original
                  for _ in 0..num_samples {
                      if let Some(path) =
                          Trie::sample_path(trie3_god, &optimized_roots_vec, max_path_len, &mut rng)
                      {
                          if get_path_summary(&path).0.is_empty() {
                              continue; // Path is semantically invalid
                          }
                          if !Trie::path_exists(&original_arena, &original_roots_vec, &path, compare) {
                              failing_path = Some(path);
                              a_is_original = false;
                              break;
                          }
                      }
                  }
              }

              if let Some(path) = failing_path {
                  println!("Stochastic equivalence check FAILED!");
                  let (trie_a_name, trie_b_name) = if a_is_original {
                      ("original", "optimized")
                  } else {
                      ("optimized", "original")
                  };
                  println!(
                      "Found path in {} that does not exist in {}.",
                      trie_a_name, trie_b_name
                  );

                  let (llm, states) = get_path_summary(&path);
                  println!("--- Failing Path Summary ---");
                  println!("Valid for LLM tokens: {:?}", llm);
                  println!("State checks per position:");
                  for (pos, sids) in &states {
                      println!("  pos {}: {:?}", pos, sids);
                  }
                  println!("\n--- Failing Path (Formatted) ---");
                  println!("{}", pretty_print_path(&path));

                  // Minimize the example
                  let (mut arena_a, mut roots_a_vec) = if a_is_original {
                      (original_arena.deep_clone(), original_roots_vec.clone())
                  } else {
                      (trie3_god.deep_clone(), optimized_roots_vec.clone())
                  };
                  let (mut arena_b, mut roots_b_vec) = if a_is_original {
                      (trie3_god.deep_clone(), optimized_roots_vec)
                  } else {
                      (original_arena.deep_clone(), original_roots_vec)
                  };

                  println!("Attempting to minimize failing example by trimming...");
                  for i in 0..100 {
                      let (trimmed_a, trimmed_roots_a) =
                          Trie::trim_randomly(&arena_a, &roots_a_vec, 0.1, &mut rng);
                      if Trie::path_exists(&trimmed_a, &trimmed_roots_a, &path, compare) {
                          arena_a = trimmed_a;
                          roots_a_vec = trimmed_roots_a;
                      }
                      let (trimmed_b, trimmed_roots_b) =
                          Trie::trim_randomly(&arena_b, &roots_b_vec, 0.1, &mut rng);
                      if !Trie::path_exists(&trimmed_b, &trimmed_roots_b, &path, compare) {
                          arena_b = trimmed_b;
                          roots_b_vec = trimmed_roots_b;
                      }
                      if (i + 1) % 10 == 0 {
                          println!("Trimming iteration {}...", i + 1);
                      }
                  }

                  println!("--- MINIMIZED FAILING EXAMPLE ---");
                  println!("--- Failing Path Summary ---");
                  let (llm, states) = get_path_summary(&path);
                  println!("Valid for LLM tokens (edge-derived only): {:?}", llm);
                  println!("State checks per position:");
                  for (pos, sids) in &states {
                      println!("  pos {}: {:?}", pos, sids);
                  }
                  println!("\n--- Failing Path (Formatted) ---");
                  println!("{}", pretty_print_path(&path));
                  println!("\n--- Trie A (path SHOULD exist here) ---");
                  println!("{}", Trie::pretty_print(&arena_a, &roots_a_vec));
                  println!("\n--- Trie B (path should NOT exist here) ---");
                  println!("{}", Trie::pretty_print(&arena_b, &roots_b_vec));

                  panic!("Stochastic equivalence check failed. See minimized example above.");
              } else {
                  crate::debug!(2, "Stochastic equivalence check passed.");
              }
          }

          if config.assert_pop0_paths_to_end_are_short {
              assert_pop0_paths_to_end_are_short(roots, trie3_god);
          }

          crate::debug!(2, "Finished optimizing Trie 3 size.");
      }
    src/trie3_opt/passes/canonicalize_end_nodes.rs: |
      use std::collections::BTreeMap;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;
      use crate::trie3_opt::SortedSet;

      /// Canonicalize all end nodes to a single representative and rewire edges to it.
      /// The canonical end node keeps no outgoing edges. This preserves semantics and
      /// maximizes sharing downstream.
      pub struct CanonicalizeEndNodesPass;

      impl OptimizationPass for CanonicalizeEndNodesPass {
          fn name(&self) -> &'static str {
              "CanonicalizeEndNodes"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              // Collect end nodes
              let mut ends: Vec<NodeId> = trie.nodes.iter().filter(|n| n.end).map(|n| n.id).collect();
              if ends.len() <= 1 {
                  return;
              }
              ends.sort_unstable();
              let canonical = ends[0];

              // Ensure canonical has no outgoing edges
              {
                  let cnode = &mut trie.nodes[canonical as usize];
                  cnode.children.clear();
                  cnode.end = true;
              }

              // Rewire all edges to target canonical if they target any end
              let end_set: std::collections::BTreeSet<NodeId> = ends.into_iter().collect();

              for node in trie.nodes.iter_mut() {
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (ek, dm) in node.children.clone() {
                      let mut dm2: BTreeMap<NodeId, _> = BTreeMap::new();
                      for (dst, sids) in dm {
                          let new_dst = if end_set.contains(&dst) { canonical } else { dst };
                          dm2.entry(new_dst)
                              .and_modify(|e: &mut SortedSet| e.union_inplace(&sids))
                              .or_insert(sids);
                      }
                      if !dm2.is_empty() {
                          new_children.insert(ek, dm2);
                      }
                  }
                  node.children = new_children;
              }
          }
      }
    src/trie3_opt/passes/compress_edges.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Group identical destination-maps under the same pop by unioning token masks.
      /// This reduces the number of edge-keys by ensuring that, for a fixed pop,
      /// edges with identical destination semantics share a single token-set.
      pub struct CompressEdgesPass;

      impl OptimizationPass for CompressEdgesPass {
          fn name(&self) -> &'static str {
              "CompressEdges"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              for n in trie.nodes.iter_mut() {
                  // First group by pop and canonical destination map
                  let mut by_pop: BTreeMap<isize, HashMap<Vec<(u32, SortedSet)>, SortedSet>> = BTreeMap::new();
                  for (ek, dm) in n.children.iter() {
                      // Canonical dest vector sorted by node id with unioned states if multiple entries
                      let mut dest_vec: Vec<(u32, SortedSet)> = Vec::with_capacity(dm.len());
                      for (dst, sids) in dm.iter() {
                          dest_vec.push((*dst, sids.clone()));
                      }
                      // Already in BTreeMap => sorted ordering by key, but ensure canonical anyway
                      // by sorting on (dst, lexicographic sids)
                      dest_vec.sort_unstable_by(|a, b| {
                          let c = a.0.cmp(&b.0);
                          if c != std::cmp::Ordering::Equal {
                              return c;
                          }
                          a.1.cmp(&b.1)
                      });
                      let entry = by_pop.entry(ek.pop).or_default();
                      entry
                          .entry(dest_vec)
                          .and_modify(|tok| tok.union_inplace(&ek.tokens))
                          .or_insert(ek.tokens.clone());
                  }

                  // Rebuild children
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (pop, groups) in by_pop {
                      for (dest_vec, tokens) in groups {
                          if tokens.is_empty() {
                              continue;
                          }
                          let mut dm = BTreeMap::new();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dm.insert(dst, sids);
                              }
                          }
                          if !dm.is_empty() {
                              new_children.insert(super::super::core::EdgeKey::new(pop, tokens), dm);
                          }
                      }
                  }
                  n.children = new_children;
              }
          }
      }
    src/trie3_opt/passes/eliminate_pop0.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Eliminate pop=0 edges whose source is not a root by composing predecessors:
      /// For each B --(0, L_bc, S_bc)--> C and each A --(p_ab, L_ab, S_ab)--> B,
      /// add A --(p_ab, L_ab∧L_bc, S_ab∧S_bc)--> C and remove the B->C entry.
      /// Iterate to a fixed point.
      pub struct EliminatePop0ExceptRootsPass;

      impl OptimizationPass for EliminatePop0ExceptRootsPass {
          fn name(&self) -> &'static str {
              "EliminatePop0ExceptRoots"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let root_set = trie.root_ids.clone();
              let n = trie.nodes.len();
              if n == 0 {
                  return;
              }

              loop {
                  // Build incoming map and collect pop=0 edges
                  let mut incoming: HashMap<NodeId, Vec<(NodeId, isize, SortedSet, SortedSet)>> = HashMap::new();
                  let mut zero_edges: Vec<(NodeId, SortedSet, NodeId, SortedSet)> = Vec::new();

                  for node in &trie.nodes {
                      for (ek, dm) in &node.children {
                          for (dst, sids) in dm {
                              incoming.entry(*dst).or_default().push((node.id, ek.pop, ek.tokens.clone(), sids.clone()));
                              if ek.pop == 0 {
                                  zero_edges.push((node.id, ek.tokens.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                  }

                  if zero_edges.is_empty() {
                      break;
                  }

                  let mut removed_this_iter = 0usize;

                  for (b, llm_bc, c, s_bc) in zero_edges {
                      if root_set.contains(&b) {
                          // pop=0 from root is allowed; skip
                          continue;
                      }
                      if let Some(preds) = incoming.get(&b) {
                          for (a, p_ab, llm_ab, s_ab) in preds {
                              let new_tokens = llm_ab.intersect(&llm_bc);
                              if new_tokens.is_empty() {
                                  continue;
                              }
                              let new_sids = s_ab.intersect(&s_bc);
                              if new_sids.is_empty() {
                                  continue;
                              }
                              // Add/update A -> C with (p_ab, new_tokens) and SIDs = intersection
                              let a_node = &mut trie.nodes[*a as usize];
                              let key = crate::trie3_opt::core::EdgeKey::new(*p_ab, new_tokens.clone());
                              let dm = a_node.children.entry(key).or_insert_with(BTreeMap::new);
                              dm.entry(c)
                                  .and_modify(|e| e.union_inplace(&new_sids))
                                  .or_insert(new_sids);
                          }
                      }

                      // Remove B -> C under (0, llm_bc)
                      let bnode = &mut trie.nodes[b as usize];
                      let key = crate::trie3_opt::core::EdgeKey::new(0, llm_bc.clone());
                      if let Some(dm) = bnode.children.get_mut(&key) {
                          if dm.remove(&c).is_some() {
                              removed_this_iter += 1;
                          }
                          if dm.is_empty() {
                              bnode.children.remove(&key);
                          }
                      }
                  }

                  if removed_this_iter == 0 {
                      break;
                  }
              }
          }
      }
    src/trie3_opt/passes/full/atoms.rs: |
      use std::collections::{BTreeMap, HashMap};

      use ordered_hash_map::OrderedHashMap;
      use range_set_blaze::RangeSetBlaze;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::trie::Trie;
      use crate::datastructures::EntryApi;

      /// Helper: Build a global set of token "atoms" per 'pop' by splitting the universe with every
      /// LLMTokenBV mask used by any edge at that pop. Caps the number of atoms per pop to avoid
      /// blowups; if exceeded, falls back to a single-universe atom at that pop.
      pub fn build_global_token_atoms_by_pop(
          trie3_god: &Trie3GodWrapper,
          nodes: &[PrecomputeNode3Index],
          max_llm_token_id: usize,
          max_atoms_per_pop: usize,
      ) -> BTreeMap<isize, Vec<LLMTokenBV>> {
          let mut by_pop_masks: BTreeMap<isize, Vec<LLMTokenBV>> = BTreeMap::new();
          for n in nodes {
              let g = n.read(trie3_god).expect("read");
              for ((pop, llm_bv), _dm) in g.children() {
                  if !llm_bv.is_empty() {
                      by_pop_masks.entry(*pop).or_default().push(llm_bv.clone());
                  }
              }
          }
          let universe = LLMTokenBV::ones(max_llm_token_id + 1);
          let mut atoms_by_pop: BTreeMap<isize, Vec<LLMTokenBV>> = BTreeMap::new();
          for (pop, masks) in by_pop_masks {
              // Start with a single block, split iteratively by every mask.
              let mut blocks = vec![universe.clone()];
              let mut aborted = false;
              for m in masks {
                  let mut next_blocks: Vec<LLMTokenBV> = Vec::with_capacity(blocks.len().saturating_mul(2));
                  for b in blocks.iter() {
                      let inter = b & &m;
                      if !inter.is_empty() {
                          next_blocks.push(inter);
                      }
                      let diff = b - &m;
                      if !diff.is_empty() {
                          next_blocks.push(diff);
                      }
                  }
                  if next_blocks.len() > max_atoms_per_pop {
                      aborted = true;
                      break;
                  }
                  blocks = next_blocks;
                  if blocks.is_empty() {
                      break;
                  }
              }
              atoms_by_pop.insert(
                  pop,
                  if aborted || blocks.is_empty() {
                      vec![universe.clone()]
                  } else {
                      blocks
                  },
              );
          }
          atoms_by_pop
      }

      /// Behaviorally minimize per-node/per-pop edges by refining tokens into "semantic atoms".
      /// For each node U and each pop P, consider the family of LLM masks {L_i} attached to the
      /// outgoing edges and the corresponding destination maps D_i (dest -> SIDs). For a token t,
      /// the one-step behavior is F_t(dest) = union over i: t ∈ L_i of D_i(dest). We:
      ///  - Partition the token universe U = ⋃_i L_i into atoms by iteratively splitting by each L_i.
      ///  - For each atom B, compute F_B(dest) = ⋃_{i: B ∩ L_i ≠ ∅} D_i(dest).
      ///  - Merge atoms with identical F_B (canonical dest->SIDs vector) and union their token-sets.
      ///  - Emit the resulting minimal set of edges for pop P.
      /// We only rewrite when it improves a local size metric (sum of LLM range-counts + dest entries).
      pub fn refine_edges_to_token_atoms_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
          max_blocks: usize,
      ) {
          crate::debug!(
              2,
              "Refining token-sets to semantic atoms in Trie3 (cap = {} blocks)...",
              max_blocks
          );
          if max_blocks == 0 {
              crate::debug!(3, "Refinement disabled due to max_blocks=0.");
              return;
          }
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          // Helper: compute range-count for a mask (bounded and constrained for safety).
          #[inline]
          fn ranges_len_bounded(m: &LLMTokenBV, max_id: usize) -> usize {
              let mut c = m.clone();
              c.constrain(max_id);
              c.inner().ranges_len()
          }

          let mut nodes_changed = 0usize;
          let mut total_improvement = 0isize;

          for node_idx in &all_nodes {
              let mut w = if let Some(guard) = node_idx.write(trie3_god) {
                  guard
              } else {
                  continue;
              };
              if w.children().is_empty() {
                  continue;
              }

              // Take ownership of children for processing.
              let old_children = std::mem::take(w.children_mut());

              // Group by pop.
              use std::collections::BTreeMap as BTM;
              let mut by_pop: BTM<
                  isize,
                  Vec<(
                      LLMTokenBV,
                      OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
                  )>,
              > = BTM::new();
              for ((pop, llm_bv), dm) in old_children {
                  // Constrain to avoid spurious universe bits; drop empty.
                  let mut l = llm_bv.clone();
                  l.constrain(max_llm_token_id);
                  if l.is_empty() {
                      continue;
                  }
                  // Constrain SIDs in the map and drop empties
                  let mut dm2: OrderedHashMap<PrecomputeNode3Index, StateIDBV> = OrderedHashMap::new();
                  for (dst, mut sids) in dm {
                      sids.constrain(max_state_id);
                      if !sids.is_empty() {
                          dm2.insert(dst, sids);
                      }
                  }
                  if dm2.is_empty() {
                      continue;
                  }
                  by_pop.entry(pop).or_default().push((l, dm2));
              }

              // Build new children here
              let mut new_children: BTM<
                  (isize, LLMTokenBV),
                  OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
              > = BTM::new();
              let mut changed_locally = false;
              let mut local_improvement = 0isize;

              for (pop, mut entries) in by_pop {
                  if entries.is_empty() {
                      continue;
                  }
                  if entries.len() == 1 {
                      // Nothing to refine; forward as is.
                      let (l, dm) = entries.pop().unwrap();
                      new_children.insert((pop, l), dm);
                      continue;
                  }

                  // Universe U
                  let mut universe = LLMTokenBV::zeros();
                  for (l, _) in &entries {
                      universe |= l;
                  }
                  universe.constrain(max_llm_token_id);
                  if universe.is_empty() {
                      continue;
                  }

                  // Atomization: iteratively split by each L_i
                  let mut blocks: Vec<LLMTokenBV> = vec![universe.clone()];
                  let mut aborted = false;
                  for (l, _) in &entries {
                      let mut next_blocks: Vec<LLMTokenBV> =
                          Vec::with_capacity(blocks.len().saturating_mul(2));
                      for b in blocks.iter() {
                          let inter = b & l;
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff = b - l;
                          if !diff.is_empty() {
                              next_blocks.push(diff);
                          }
                      }
                      if next_blocks.len() > max_blocks {
                          aborted = true;
                          break;
                      }
                      blocks = next_blocks;
                      if blocks.is_empty() {
                          break;
                      }
                  }

                  // Local size metric before:
                  let mut old_cost_ranges = 0usize;
                  let mut old_cost_dests = 0usize;
                  for (l, dm) in &entries {
                      old_cost_ranges += ranges_len_bounded(l, max_llm_token_id);
                      old_cost_dests += dm.len();
                  }
                  let old_cost = (old_cost_ranges + old_cost_dests) as isize;

                  if aborted || blocks.is_empty() {
                      // Fallback: keep original entries
                      for (l, dm) in entries {
                          new_children.insert((pop, l), dm);
                      }
                      continue;
                  }

                  // For each block, compute unioned dest->SIDs, then group by identical canonical dest-vector.
                  use std::collections::HashMap as HM;
                  let mut grouped: HM<Vec<(PrecomputeNode3Index, StateIDBV)>, LLMTokenBV> = HM::new();

                  for b in blocks.iter() {
                      let mut dest_agg: BTM<PrecomputeNode3Index, StateIDBV> = BTM::new();
                      for (l, dm) in &entries {
                          if (b & l).is_empty() {
                              continue;
                          }
                          for (dst, sids) in dm {
                              dest_agg
                                  .entry(*dst)
                                  .and_modify(|e| *e |= sids)
                                  .or_insert_with(|| sids.clone());
                          }
                      }
                      if dest_agg.is_empty() {
                          continue;
                      }
                      let dest_vec: Vec<(PrecomputeNode3Index, StateIDBV)> = dest_agg.into_iter().collect();
                      let entry = grouped.entry(dest_vec).or_insert_with(LLMTokenBV::zeros);
                      *entry |= b;
                  }

                  // Compute new cost
                  let mut new_cost_ranges = 0usize;
                  let mut new_cost_dests = 0usize;
                  for (dest_vec, lnew) in &grouped {
                      let mut ln = lnew.clone();
                      ln.constrain(max_llm_token_id);
                      if ln.is_empty() {
                          continue;
                      }
                      new_cost_ranges += ranges_len_bounded(&ln, max_llm_token_id);
                      new_cost_dests += dest_vec.len();
                  }
                  let new_cost = (new_cost_ranges + new_cost_dests) as isize;

                  if new_cost < old_cost {
                      changed_locally = true;
                      local_improvement += old_cost - new_cost;
                      // Emit refined edges
                      for (dest_vec, lnew) in grouped {
                          let mut ln = lnew.clone();
                          ln.constrain(max_llm_token_id);
                          if ln.is_empty() {
                              continue;
                          }
                          let mut dm_out: OrderedHashMap<PrecomputeNode3Index, StateIDBV> =
                              OrderedHashMap::new();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dm_out.insert(dst, sids);
                              }
                          }
                          if !dm_out.is_empty() {
                              new_children.insert((pop, ln), dm_out);
                          }
                      }
                  } else {
                      // Keep originals (no improvement)
                      for (l, dm) in entries {
                          new_children.insert((pop, l), dm);
                      }
                  }
              }

              // Recompute live tokens as union of all outgoing LLM masks at this node.
              let mut new_live = LLMTokenBV::zeros();
              for ((_, l), _) in &new_children {
                  new_live |= l;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = new_children;

              if changed_locally {
                  nodes_changed += 1;
                  total_improvement += local_improvement;
              }
          }

          crate::debug!(
              2,
              "Refine token-atoms: nodes_changed={}, total_improvement(metric)={}",
              nodes_changed,
              total_improvement
          );
      }

      /// Exact token-atom refinement (per node and per pop) using the Boolean algebra of the outgoing
      /// LLMTokenBV masks. This constructs atoms by iteratively splitting with each L_i and groups
      /// atoms by identical one-step semantics F_B (dest -> union SIDs). The candidate result is adopted
      /// only if it strictly decreases a local cost metric:
      ///   cost = sum over edges of (llm_bv.ranges_len + number_of_dest_entries).
      /// This guarantees no blow-up while ensuring semantic minimality when adopted.
      pub fn refine_edges_to_token_atoms_trie3_exact(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) {
          crate::debug!(2, "Refining token-sets to semantic atoms in Trie3 (exact)...");
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          #[inline]
          fn ranges_len_bounded(m: &LLMTokenBV, max_id: usize) -> usize {
              let mut c = m.clone();
              c.constrain(max_id);
              c.inner().ranges_len()
          }

          for node_idx in &all_nodes {
              let mut w = if let Some(guard) = node_idx.write(trie3_god) {
                  guard
              } else {
                  continue;
              };
              if w.children().is_empty() {
                  continue;
              }

              // Take old children and canonicalize inputs
              let old_children = std::mem::take(w.children_mut());
              use std::collections::BTreeMap as BTM;
              let mut by_pop: BTM<
                  isize,
                  Vec<(
                      LLMTokenBV,
                      OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
                  )>,
              > = BTM::new();

              for ((pop, mut llm_bv), dm) in old_children {
                  llm_bv.constrain(max_llm_token_id);
                  if llm_bv.is_empty() {
                      continue;
                  }
                  let mut dm2: OrderedHashMap<PrecomputeNode3Index, StateIDBV> = OrderedHashMap::new();
                  for (dst, mut sids) in dm {
                      sids.constrain(max_state_id);
                      if !sids.is_empty() {
                          dm2.insert(dst, sids);
                      }
                  }
                  if dm2.is_empty() {
                      continue;
                  }
                  by_pop.entry(pop).or_default().push((llm_bv, dm2));
              }

              // Build a reconstruction of the old children (for cost comparison or fallback)
              let mut old_as_children: BTM<
                  (isize, LLMTokenBV),
                  OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
              > = BTM::new();
              for (pop, entries) in &by_pop {
                  for (l, dm) in entries {
                      old_as_children.insert((*pop, l.clone()), dm.clone());
                  }
              }
              let mut old_cost_ranges = 0usize;
              let mut old_cost_dests = 0usize;
              for ((_, l), dm) in &old_as_children {
                  old_cost_ranges += ranges_len_bounded(l, max_llm_token_id);
                  old_cost_dests += dm.len();
              }
              let old_cost = (old_cost_ranges + old_cost_dests) as isize;

              // Candidate exact representation
              let mut new_children: BTM<
                  (isize, LLMTokenBV),
                  OrderedHashMap<PrecomputeNode3Index, StateIDBV>,
              > = BTM::new();

              for (pop, entries) in by_pop {
                  if entries.is_empty() {
                      continue;
                  }
                  if entries.len() == 1 {
                      let (l, dm) = entries.into_iter().next().unwrap();
                      new_children.insert((pop, l), dm);
                      continue;
                  }

                  // Universe of tokens for this (node,pop)
                  let mut universe = LLMTokenBV::zeros();
                  for (l, _) in &entries {
                      universe |= l;
                  }
                  universe.constrain(max_llm_token_id);
                  if universe.is_empty() {
                      continue;
                  }

                  // Build atoms by iterative splitting
                  let mut blocks: Vec<LLMTokenBV> = vec![universe];
                  for (l, _) in &entries {
                      let mut next_blocks: Vec<LLMTokenBV> =
                          Vec::with_capacity(blocks.len().saturating_mul(2));
                      for b in blocks.into_iter() {
                          let inter = &b & l;
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff = &b - l;
                          if !diff.is_empty() {
                              next_blocks.push(diff);
                          }
                      }
                      blocks = next_blocks;
                      if blocks.is_empty() {
                          break;
                      }
                  }
                  if blocks.is_empty() {
                      continue;
                  }

                  // Group atoms by their semantic effect (canonical dest->SIDs vector)
                  use std::collections::HashMap as HM;
                  let mut grouped: HM<Vec<(PrecomputeNode3Index, StateIDBV)>, LLMTokenBV> = HM::new();
                  for b in blocks.into_iter() {
                      let mut dest_agg: BTM<PrecomputeNode3Index, StateIDBV> = BTM::new();
                      for (l, dm) in &entries {
                          if (&b & l).is_empty() {
                              continue;
                          }
                          for (dst, sids) in dm {
                              dest_agg
                                  .entry(*dst)
                                  .and_modify(|e| *e |= sids)
                                  .or_insert_with(|| sids.clone());
                          }
                      }
                      if dest_agg.is_empty() {
                          continue;
                      }
                      let dest_vec: Vec<(PrecomputeNode3Index, StateIDBV)> = dest_agg.into_iter().collect();
                      if let Some(acc) = grouped.get_mut(&dest_vec) {
                          *acc |= &b;
                      } else {
                          grouped.insert(dest_vec, b.clone());
                      }
                  }

                  // Emit grouped atoms as candidate edges
                  for (dest_vec, mut ln) in grouped {
                      ln.constrain(max_llm_token_id);
                      if ln.is_empty() {
                          continue;
                      }
                      let mut dm_out: OrderedHashMap<PrecomputeNode3Index, StateIDBV> =
                          OrderedHashMap::new();
                      for (dst, sids) in dest_vec {
                          if !sids.is_empty() {
                              dm_out.insert(dst, sids);
                          }
                      }
                      if !dm_out.is_empty() {
                          new_children.insert((pop, ln), dm_out);
                      }
                  }
              }

              // Compare costs
              let mut new_cost_ranges = 0usize;
              let mut new_cost_dests = 0usize;
              for ((_, l), dm) in &new_children {
                  new_cost_ranges += ranges_len_bounded(l, max_llm_token_id);
                  new_cost_dests += dm.len();
              }
              let new_cost = (new_cost_ranges + new_cost_dests) as isize;

              // Adopt only if strictly better; otherwise restore original
              let chosen_children = if new_cost < old_cost {
                  &new_children
              } else {
                  &old_as_children
              };

              // Recompute live tokens and commit
              let mut new_live = LLMTokenBV::zeros();
              for ((_, l), _) in chosen_children {
                  new_live |= l;
              }
              w.value.live_tokens = new_live;
              *w.children_mut() = chosen_children.clone();
          }
          crate::debug!(2, "Finished exact token-atom refinement.");
      }
