          // GLR parsers should handle this correctly.
          let productions = vec![
              prod("S'", vec![nt("S"), t("$")]), // Start
              prod("S", vec![t("a"), nt("S"), nt("B")]),
              prod("S", vec![t("b")]),
              prod("B", vec![]), // Epsilon
          ];

