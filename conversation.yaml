              let node_a: TestNodeBasic = Arc::new(RwLock::new(TestTrieBasic::new(21)));
              let node_b: TestNodeBasic = Arc::new(RwLock::new(TestTrieBasic::new(22)));
              let node_c: TestNodeBasic = Arc::new(RwLock::new(TestTrieBasic::new(23)));
