              let mut acc2 = empty_acc();
              acc2.trie2_nodes.insert(ArcPtrWrapper::new(trie2_node2.clone()));
              let leaf2 = Arc::new(GSSNode::new(acc2)); // This is "Node 2" with trie ...560

              // --- GSS A ---
