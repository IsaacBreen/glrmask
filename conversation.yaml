      use std::collections::BTreeMap;
      use std::time::Instant;

      use crate::constraint::{PrecomputeNode3Index, StageVocab, Trie3GodWrapper};
      use crate::glr::parser::GLRParser;
      use crate::tokenizer::TokenizerStateID;
      use crate::trie3_opt::coordinator::{run_pipeline_on_precompute3, CoordinatorConfig};
      use crate::trie3_opt::Trie3Config;

      /// High-level size optimizer for precompute3 tries. This is a legacy API that wraps the
      /// new MiniTrie-based optimization pipeline.
      pub fn optimize_trie3_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          config: &Trie3Config,
          max_state_id: usize,
          max_llm_token_id: usize,
          stage_vocab: &mut StageVocab,
          parser: &GLRParser,
      ) {
          crate::debug!(2, "Optimizing Trie 3 size (using new pipeline)...");
          let start = Instant::now();

          // Map legacy Trie3Config to new CoordinatorConfig
          let coordinator_config = CoordinatorConfig {
              num_passes: config.num_passes,
              prune_dead_paths: config.prune_dead_paths,
              prune_unproductive_paths: config.prune_unproductive_paths,
              canonicalize_end_nodes: true, // Always good practice
              compress_edges: config.compress_edges,
              compress_unary_chains: config.compress_edges,
              factor_state_dest_sets: config.factor_state_dest_sets,
              factor_state_dest_sets_max_depth_from_roots: config.factor_state_dest_sets_max_depth_from_roots,
              factor_state_dest_sets_max_intermediates_per_pop: config.factor_state_dest_sets_max_intermediates_per_pop,
              factor_state_dest_sets_min_out_degree: config.factor_state_dest_sets_min_out_degree,
              factor_state_dest_equivalence: config.factor_state_dest_equivalence,
              factor_state_dest_equivalence_max_depth_from_roots: config.factor_state_dest_equivalence_max_depth_from_roots,
              factor_state_dest_equivalence_max_atoms_per_pop: config.factor_state_dest_equivalence_max_atoms_per_pop,
              factor_state_dest_equivalence_min_gain_edges: config.factor_state_dest_equivalence_min_gain_edges,
              factor_state_dest_equivalence_min_out_degree: config.factor_state_dest_equivalence_min_out_degree,
              factor_state_fanout: config.factor_state_fanout,
              factor_common_destinations: config.factor_common_destinations,
              factor_common_destinations_min_incoming: config.factor_common_destinations_min_incoming,
              factor_root_fanout: config.factor_root_fanout,
              factor_root_fanout_max_atoms_per_pop: config.factor_root_fanout_max_atoms_per_pop,
              merge_structural_max_iters: config.merge_structural_max_iters,
              merge_bisimulation_max_iters: config.merge_bisimulation_max_iters,
              merge_global_atoms: config.merge_global_atoms,
              merge_global_atoms_max_iters: config.merge_global_atoms_max_iters,
              merge_global_atoms_max_atoms_per_pop: config.merge_global_atoms_max_atoms_per_pop,
              merge_state_agnostic: config.merge_state_agnostic,
              merge_state_agnostic_max_iters: config.merge_state_agnostic_max_iters,
              eliminate_pop0_except_roots: config.eliminate_pop0_except_roots,
              merge_equivalent_llm_tokens: config.merge_equivalent_llm_tokens,
              reorder_llm_tokens: config.reorder_llm_tokens,
              generalize_sids: config.generalize_sids,
          };

          run_pipeline_on_precompute3(
              roots,
              trie3_god,
              max_llm_token_id,
              max_state_id,
              coordinator_config,
              Some(stage_vocab),
              Some(parser),
          );

          crate::debug!(2, "Finished optimizing Trie 3 size in {:?}", start.elapsed());
      }
    src/trie3_opt/passes/canonicalize_end_nodes.rs: |
      use std::collections::{BTreeMap, BTreeSet};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;
      use crate::trie3_opt::SortedSet;

      /// Canonicalize all end nodes to a single representative and rewire edges to it.
      /// The canonical end node keeps no outgoing edges. This preserves semantics and
      /// maximizes sharing downstream.
      pub struct CanonicalizeEndNodesPass;

      impl OptimizationPass for CanonicalizeEndNodesPass {
          fn name(&self) -> &'static str {
              "CanonicalizeEndNodes"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              // Collect end nodes
              let mut ends: Vec<NodeId> = trie
                  .nodes()
                  .filter(|n| n.is_end())
                  .map(|n| n.id())
                  .collect();
              if ends.len() <= 1 {
                  return;
              }
              ends.sort_unstable();
              let canonical = ends[0];
              let other_ends: BTreeSet<NodeId> = ends.iter().skip(1).cloned().collect();

              // Ensure canonical has no outgoing edges and is an end node.
              trie.clear_children(canonical);
              trie.set_end(canonical, true);

              // Decommission other end nodes. They will be garbage collected if unreferenced.
              for &end_node_id in &other_ends {
                  trie.set_end(end_node_id, false);
                  trie.clear_children(end_node_id);
              }

              // Rewire all edges that target any end node to target the canonical one.
              let end_set: BTreeSet<NodeId> = ends.into_iter().collect();
              let node_ids: Vec<_> = trie.node_ids().collect();

              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children: BTreeMap<_, _> = BTreeMap::new();
                  for (ek, dm) in node.children().clone() {
                      let mut dm2: BTreeMap<NodeId, _> = BTreeMap::new();
                      for (dst, sids) in dm {
                          let new_dst = if end_set.contains(&dst) { canonical } else { dst };
                          dm2.entry(new_dst)
                              .and_modify(|e: &mut SortedSet| e.union_inplace(&sids))
                              .or_insert(sids);
                      }
                      if !dm2.is_empty() {
                          new_children.insert(ek, dm2);
                      }
                  }
                  trie.set_children(node_id, new_children);
              }

              // Remap roots if any of them were end nodes that are not the canonical one.
              let mut new_roots = Vec::with_capacity(trie.root_ids.len());
              let mut root_set = BTreeSet::new();
              for root_id in &trie.root_ids {
                  let new_root = if other_ends.contains(root_id) {
                      canonical
                  } else {
                      *root_id
                  };
                  if root_set.insert(new_root) {
                      new_roots.push(new_root);
                  }
              }
              trie.root_ids = new_roots;
          }
      }
    src/trie3_opt/passes/compress_edges.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Group identical destination-maps under the same pop by unioning token masks.
      /// This reduces the number of edge-keys by ensuring that, for a fixed pop,
      /// edges with identical destination semantics share a single token-set.
      pub struct CompressEdgesPass;

      impl OptimizationPass for CompressEdgesPass {
          fn name(&self) -> &'static str {
              "CompressEdges"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let n = trie.get_node(node_id).unwrap();
                  if n.children().is_empty() {
                      continue;
                  }

                  let old_children = n.children().clone();
                  // Cost metric: sum of token set sizes and destination map sizes.
                  let old_cost: usize = old_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  // Stage 1: Group by (pop, canonicalized dest-map), unioning token sets.
                  let mut by_pop: BTreeMap<isize, HashMap<Vec<(u32, SortedSet)>, SortedSet>> =
                      BTreeMap::new();
                  for (ek, dm) in &old_children {
                      if ek.tokens.is_empty() || dm.is_empty() {
                          continue;
                      }
                      let mut dest_vec: Vec<(u32, SortedSet)> =
                          dm.iter().map(|(&dst, sids)| (dst, sids.clone())).collect();
                      dest_vec.sort_unstable_by_key(|k| k.0);
                      by_pop
                          .entry(ek.pop)
                          .or_default()
                          .entry(dest_vec)
                          .or_default()
                          .union_inplace(&ek.tokens);
                  }

                  // Stage 2: For each pop, combine groups that yield identical final token sets
                  // by unioning their destination maps.
                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<u32, SortedSet>> = BTreeMap::new();
                  for (pop, groups) in by_pop {
                      // tokens -> aggregated destination map
                      let mut out_by_tokens: BTreeMap<SortedSet, BTreeMap<u32, SortedSet>> =
                          BTreeMap::new();

                      for (dest_vec, tokens) in groups {
                          if tokens.is_empty() {
                              continue;
                          }
                          let dest_out = out_by_tokens.entry(tokens).or_default();
                          for (dst, sids) in dest_vec {
                              if !sids.is_empty() {
                                  dest_out.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                      }

                      // Emit final edges for this pop
                      for (tokens, dm) in out_by_tokens {
                          if !tokens.is_empty() && !dm.is_empty() {
                              new_children.insert(EdgeKey::new(pop, tokens), dm);
                          }
                      }
                  }

                  let new_cost: usize = new_children
                      .iter()
                      .map(|(ek, dm)| ek.tokens.len() + dm.len())
                      .sum();

                  if new_cost < old_cost {
                      trie.set_children(node_id, new_children);
                  }
              }
          }
      }
    src/trie3_opt/passes/compress_unary_chains.rs: |
      use std::collections::{BTreeSet, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct CompressUnaryChainsPass;

      impl OptimizationPass for CompressUnaryChainsPass {
          fn name(&self) -> &'static str {
              "CompressUnaryChains"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let roots_set: BTreeSet<NodeId> = trie.root_ids.iter().cloned().collect();
              let max_iters = 8;
              for _ in 0..max_iters {
                  let mut indegree: HashMap<NodeId, usize> = HashMap::new();
                  let mut unique_parent: HashMap<NodeId, (NodeId, EdgeKey)> = HashMap::new();
                  let mut out_info: HashMap<NodeId, (EdgeKey, NodeId, crate::trie3_opt::core::SortedSet)> =
                      HashMap::new();

                  for node in trie.nodes() {
                      let node_id = node.id();
                      for (ek, dm) in node.children() {
                          for (dst, _) in dm {
                              let count = indegree.entry(*dst).or_default();
                              *count += 1;
                              if *count == 1 {
                                  unique_parent.insert(*dst, (node.id(), ek.clone()));
                              } else {
                                  unique_parent.remove(dst);
                              }
                          }
                      }
                      if node.is_end() {
                          continue;
                      }
                      let mut total_dests = 0;
                      let mut only_edge = None;
                      for (ek, dm) in node.children() {
                          for (dst, sids) in dm {
                              total_dests += 1;
                              if total_dests == 1 {
                                  only_edge = Some((ek.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                      if total_dests == 1 {
                          let (ek, dst, sids) = only_edge.unwrap();
                          out_info.insert(node_id, (ek, dst, sids));
                      }
                  }

                  let mut rewrites = vec![];
                  for u_id in trie.node_ids() {
                      if roots_set.contains(&u_id) {
                          continue;
                      }
                      if let (Some((out_key, v_id, s_uv)), Some((p_id, in_key))) =
                          (out_info.get(&u_id), unique_parent.get(&u_id))
                      {
                          if p_id != &u_id && in_key.pop == out_key.pop && in_key.tokens == out_key.tokens
                          {
                              rewrites.push((*p_id, u_id, *v_id, in_key.clone(), s_uv.clone()));
                          }
                      }
                  }

                  if rewrites.is_empty() {
                      break;
                  }

                  for (p_id, u_id, v_id, key, s_uv) in rewrites {
                      if let Some(s_pu) = trie.remove_edge_dest(p_id, &key, u_id) {
                          let s_comp = s_pu.intersect(&s_uv);
                          if !s_comp.is_empty() {
                              trie.add_edge(p_id, key, v_id, s_comp);
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/eliminate_pop0.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Eliminate pop=0 edges whose source is not a root by composing predecessors:
      /// For each B --(0, L_bc, S_bc)--> C and each A --(p_ab, L_ab, S_ab)--> B,
      /// add A --(p_ab, L_ab∧L_bc, S_ab∧S_bc)--> C and remove the B->C entry.
      /// Iterate to a fixed point.
      pub struct EliminatePop0ExceptRootsPass;

      impl OptimizationPass for EliminatePop0ExceptRootsPass {
          fn name(&self) -> &'static str {
              "EliminatePop0ExceptRoots"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let root_set = trie.root_ids.clone();
              let n = trie.num_nodes();
              if n == 0 {
                  return;
              }

              loop {
                  // Collect pop=0 edges by cloning to avoid borrow issues.
                  let mut zero_edges: Vec<(NodeId, SortedSet, NodeId, SortedSet)> = Vec::new();

                  for node in trie.nodes() {
                      for (ek, dm) in node.children() {
                          if ek.pop == 0 {
                              for (dst, sids) in dm {
                                  zero_edges.push((node.id(), ek.tokens.clone(), *dst, sids.clone()));
                              }
                          }
                      }
                  }

                  if zero_edges.is_empty() { break; }

                  let mut removed_this_iter = 0usize;

                  for (b, llm_bc, c, s_bc) in zero_edges {
                      if root_set.contains(&b) { continue; }

                      if let Some(b_node) = trie.get_node(b) {
                          let preds = b_node.parents().clone(); // clone to avoid borrow issues
                          for (a, edges_from_a) in &preds {
                              for (key_ab, s_ab) in edges_from_a {
                                  let p_ab = key_ab.pop;
                                  let llm_ab = &key_ab.tokens;
                                  let new_tokens = llm_ab.intersect(&llm_bc);
                                  if new_tokens.is_empty() { continue; }
                                  let new_sids = s_ab.intersect(&s_bc);
                                  if new_sids.is_empty() { continue; }

                                  let key = crate::trie3_opt::core::EdgeKey::new(p_ab, new_tokens.clone());
                                  trie.add_edge(*a, key, c, new_sids);
                              }
                          }
                      }

                      // Remove B -> C under (0, llm_bc)
                      let key = crate::trie3_opt::core::EdgeKey::new(0, llm_bc.clone());
                      if trie.remove_edge_dest(b, &key, c).is_some() {
                          removed_this_iter += 1;
                      }
                  }

                  if removed_this_iter == 0 {
                      break;
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_common_destinations.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct FactorCommonDestinationsPass {
          min_incoming: usize,
      }

      impl FactorCommonDestinationsPass {
          pub fn new(min_incoming: usize) -> Self {
              Self { min_incoming }
          }
      }

      impl OptimizationPass for FactorCommonDestinationsPass {
          fn name(&self) -> &'static str {
              "FactorCommonDestinations"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              if self.min_incoming == 0 {
                  return;
              }

              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              // Map: dest -> { (pop, tokens) -> { states -> [sources] } }
              let mut incoming_map: HashMap<NodeId, HashMap<EdgeKey, HashMap<SortedSet, Vec<NodeId>>>> =
                  HashMap::new();

              for src_node in trie.nodes() {
                  for (edge_key, dest_map) in src_node.children() {
                      for (dest_id, sids) in dest_map {
                          incoming_map
                              .entry(*dest_id)
                              .or_default()
                              .entry(edge_key.clone())
                              .or_default()
                              .entry(sids.clone())
                              .or_default()
                              .push(src_node.id());
                      }
                  }
              }

              for (dest_id, edges_by_key) in incoming_map {
                  for (edge_key, sources_by_sids) in edges_by_key {
                      for (sids, sources) in sources_by_sids {
                          if sources.len() >= self.min_incoming {
                              // Create intermediate node
                              let intermediate_id = trie.add_node(false);

                              // Add edge from intermediate to original destination
                              trie.add_edge(intermediate_id, edge_key.clone(), dest_id, sids.clone());

                              // Reroute sources to point to intermediate node
                              for src_id in &sources {
                                  trie.remove_edge_dest(*src_id, &edge_key, dest_id);

                                  // Add new edge to intermediate node. Use the same token-set as the factored key
                                  // instead of "all tokens" to avoid massive token-universe expansions in the MiniTrie.
                                  // This preserves exact semantics: the original (pop, tokens)->dest is now
                                  // source --(0, tokens)--> intermediate --(pop, tokens)--> dest.
                                  let none_like_edge_key = EdgeKey::new(0, edge_key.tokens.clone());
                                  trie.add_edge(
                                      *src_id,
                                      none_like_edge_key,
                                      intermediate_id,
                                      all_states.clone(),
                                  );
                              }
                          }
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_dest_equivalence.rs: |
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Destination-equivalence factoring:
      /// For a node u and fixed pop p>0:
      ///   - Build token atoms so every original token mask is a union of atoms.
      ///   - For each atom a, aggregate dest->states by unioning across all edges covering a.
      ///   - Define the signature of a destination v as the vector of (atom_idx, states_at_atom).
      ///     Destinations with identical signatures are equivalent. This is the coarsest partition
      ///     ensuring every (state, token) destination set is representable as a union of classes.
      ///   - Replace u's edges at pop p by:
      ///       u --(0, T_group)--> mid_C [states = grouped by identical tokens]
      ///       mid_C --(p, union_tokens_for_C)--> v [for all v in class C, all_states]
      ///   - Only apply if the reduction exceeds a configured threshold.
      pub struct FactorStateDestEquivalencePass {
          pub max_depth_from_roots: usize,
          pub max_atoms_per_pop: usize,
          pub min_gain_edges: usize,
          pub min_out_degree: usize,
      }

      impl FactorStateDestEquivalencePass {
          pub fn new(
              max_depth_from_roots: usize,
              max_atoms_per_pop: usize,
              min_gain_edges: usize,
              min_out_degree: usize,
          ) -> Self {
              Self {
                  max_depth_from_roots,
                  max_atoms_per_pop,
                  min_gain_edges,
                  min_out_degree,
              }
          }

          fn collect_targets(&self, trie: &MiniTrie) -> Vec<NodeId> {
              if self.max_depth_from_roots == 0 {
                  return trie.root_ids.iter().cloned().collect();
              }
              let mut targets = Vec::new();
              let mut seen: BTreeSet<NodeId> = BTreeSet::new();
              let mut q: VecDeque<(NodeId, usize)> = trie.root_ids.iter().map(|&r| (r, 0usize)).collect();
              while let Some((u, d)) = q.pop_front() {
                  if !seen.insert(u) {
                      continue;
                  }
                  if d <= self.max_depth_from_roots {
                      targets.push(u);
                  }
                  if d < self.max_depth_from_roots {
                      if let Some(node) = trie.get_node(u) {
                          for (_ek, dm) in node.children() {
                              for (v, _) in dm {
                                  q.push_back((*v, d + 1));
                              }
                          }
                      }
                  }
              }
              targets
          }

          fn build_token_atoms_for_pop(
              &self,
              edges: &[(EdgeKey, BTreeMap<NodeId, SortedSet>)],
          ) -> Vec<SortedSet> {
              let mut universe = SortedSet::new();
              for (ek, _) in edges {
                  universe.union_inplace(&ek.tokens);
              }
              if universe.is_empty() {
                  return Vec::new();
              }
              let mut atoms: Vec<SortedSet> = vec![universe.clone()];
              let mut aborted = false;
              for (ek, _) in edges {
                  let toks = &ek.tokens;
                  if toks.is_empty() {
                      continue;
                  }
                  let mut next_atoms = Vec::with_capacity(atoms.len().saturating_mul(2));
                  for b in &atoms {
                      if !b.intersects(toks) {
                          next_atoms.push(b.clone());
                          continue;
                      }
                      let inter = b.intersect(toks);
                      if !inter.is_empty() {
                          next_atoms.push(inter);
                      }
                      let diff = b.difference(toks);
                      if !diff.is_empty() {
                          next_atoms.push(diff);
                      }
                  }
                  if self.max_atoms_per_pop > 0 && next_atoms.len() > self.max_atoms_per_pop {
                      aborted = true;
                      break;
                  }
                  atoms = next_atoms;
              }
              if aborted {
                  vec![universe]
              } else {
                  atoms
              }
          }

          fn factor_one_node_pop(
              &self,
              trie: &mut MiniTrie,
              node_id: NodeId,
              pop: isize,
              edges_for_pop: &[(EdgeKey, BTreeMap<NodeId, SortedSet>)],
              all_states: &SortedSet,
          ) -> Option<BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>>> {
              // Build token-atoms.
              let atoms = self.build_token_atoms_for_pop(edges_for_pop);
              if atoms.is_empty() {
                  return None;
              }

              // Aggregate per-atom dest -> states (union across edges covering the atom).
              let mut per_atom_dm: Vec<BTreeMap<NodeId, SortedSet>> = vec![BTreeMap::new(); atoms.len()];
              // Precompute for each edge the atom indices it covers.
              let mut atom_idxs_per_edge: Vec<Vec<usize>> = Vec::with_capacity(edges_for_pop.len());
              for (ek, _) in edges_for_pop {
                  let mut idxs = Vec::new();
                  for (i, a) in atoms.iter().enumerate() {
                      if ek.tokens.intersects(a) {
                          idxs.push(i);
                      }
                  }
                  atom_idxs_per_edge.push(idxs);
              }
              for ((ek, dm), idxs) in edges_for_pop.iter().zip(atom_idxs_per_edge.iter()) {
                  if idxs.is_empty() {
                      continue;
                  }
                  for &i in idxs {
                      let out = &mut per_atom_dm[i];
                      for (dst, sids) in dm {
                          out.entry(*dst).or_default().union_inplace(sids);
                      }
                  }
              }

              // Build destination signatures: dest -> Vec<(atom_idx, states)>
              let mut dest_sig: HashMap<NodeId, Vec<(usize, SortedSet)>> = HashMap::new();
              let mut all_dests: BTreeSet<NodeId> = BTreeSet::new();
              for (i, dm) in per_atom_dm.iter().enumerate() {
                  for (dst, sids) in dm {
                      all_dests.insert(*dst);
                      dest_sig.entry(*dst).or_default().push((i, sids.clone()));
                  }
              }
              if all_dests.is_empty() {
                  return None;
              }
              for sig in dest_sig.values_mut() {
                  sig.sort_unstable_by_key(|(i, _)| *i);
              }

              // Group destinations by identical signatures (equivalence classes).
              let mut class_map: HashMap<Vec<(usize, SortedSet)>, Vec<NodeId>> = HashMap::new();
              for (dst, sig) in dest_sig.into_iter() {
                  class_map.entry(sig).or_default().push(dst);
              }

              // If nothing merges (all classes size 1), skip.
              let any_merge = class_map.values().any(|v| v.len() >= 2);
              if !any_merge {
                  return None;
              }

              // Compute gain threshold: compare old per-state edge count on multi-dest classes
              // vs new per-state edge count after factoring.
              // old_count_multi = sum over atoms (sum_{dst in multi-classes} |states_i(dst)|)
              let mut is_multi_class_dest: BTreeSet<NodeId> = BTreeSet::new();
              for v in class_map.values() {
                  if v.len() >= 2 {
                      for &d in v {
                          is_multi_class_dest.insert(d);
                      }
                  }
              }
              let mut old_count_multi: usize = 0;
              for dm in &per_atom_dm {
                  for (dst, sids) in dm {
                      if is_multi_class_dest.contains(dst) {
                          old_count_multi += sids.len();
                      }
                  }
              }

              // new_count_multi = sum over multi-classes C of |union over atoms of states(C, atom)|
              let mut new_count_multi: usize = 0;
              // We also cache tokens per state for actual edge emission later.
              // For each class we will compute: tokens_by_state (state -> tokens), tokens_union_for_class.
              let mut class_computed: Vec<(
                  Vec<NodeId>,                               // members
                  BTreeMap<usize, SortedSet>,                // tokens_by_state
                  SortedSet,                                 // tokens_union_for_class
              )> = Vec::new();

              for (sig, members) in class_map.iter() {
                  if members.len() < 2 {
                      continue;
                  }
                  let mut states_union = SortedSet::new();
                  let mut tokens_by_state: BTreeMap<usize, SortedSet> = BTreeMap::new();
                  let mut tokens_union_for_class = SortedSet::new();
                  for (atom_idx, sids) in sig {
                      if !sids.is_empty() {
                          // Contribute to per-state tokens
                          let atom_tokens = &atoms[*atom_idx];
                          tokens_union_for_class.union_inplace(atom_tokens);
                          for s in sids.iter() {
                              tokens_by_state.entry(s).or_default().union_inplace(atom_tokens);
                          }
                          states_union.union_inplace(sids);
                      }
                  }
                  new_count_multi += states_union.len();
                  class_computed.push((members.clone(), tokens_by_state, tokens_union_for_class));
              }

              // If the gain is too small, skip factoring for this pop.
              if old_count_multi <= new_count_multi || (old_count_multi - new_count_multi) < self.min_gain_edges {
                  return None;
              }

              // Build the rewritten children for this pop:
              //  - Keep direct edges for single-dest classes by copying from original edges.
              //  - Use intermediates for multi-dest classes.
              let mut new_children_for_pop: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();

              // Keep direct edges for singletons by copying original edges that point to those dests.
              let mut singleton_dests: BTreeSet<NodeId> = BTreeSet::new();
              for v in class_map.values() {
                  if v.len() == 1 {
                      singleton_dests.insert(v[0]);
                  }
              }
              if !singleton_dests.is_empty() {
                  for (ek, dm) in edges_for_pop {
                      // ek.pop == pop by construction
                      let mut dm2: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                      for (dst, sids) in dm {
                          if singleton_dests.contains(dst) && !sids.is_empty() {
                              dm2.entry(*dst).or_default().union_inplace(sids);
                          }
                      }
                      if !dm2.is_empty() {
                          new_children_for_pop
                              .entry(EdgeKey::new(pop, ek.tokens.clone()))
                              .or_default()
                              .extend(dm2.into_iter());
                      }
                  }
              }

              // Emit intermediates for multi-dest classes.
              for (members, tokens_by_state, tokens_union_for_class) in class_computed {
                  if members.len() < 2 {
                      continue;
                  }
                  if tokens_union_for_class.is_empty() {
                      continue;
                  }
                  let mid_id = trie.add_node(false);

                  // Group states by identical token sets to reduce number of source->mid edges.
                  let mut tokens_to_states: BTreeMap<SortedSet, SortedSet> = BTreeMap::new();
                  for (s, toks) in tokens_by_state {
                      if toks.is_empty() {
                          continue;
                      }
                      tokens_to_states.entry(toks).or_default().insert(s);
                  }
                  for (toks, states) in tokens_to_states {
                      if toks.is_empty() || states.is_empty() {
                          continue;
                      }
                      let key = EdgeKey::new(0, toks);
                      new_children_for_pop
                          .entry(key)
                          .or_default()
                          .entry(mid_id)
                          .or_default()
                          .union_inplace(&states);
                  }

                  // mid -> destinations at pop=p with all_states; tokens are the union across class.
                  for &d in &members {
                      trie.add_edge(
                          mid_id,
                          EdgeKey::new(pop, tokens_union_for_class.clone()),
                          d,
                          all_states.clone(),
                      );
                  }
              }

              if new_children_for_pop.is_empty() {
                  None
              } else {
                  Some(new_children_for_pop)
              }
          }
      }

      impl OptimizationPass for FactorStateDestEquivalencePass {
          fn name(&self) -> &'static str {
              "FactorStateDestEquivalence"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let targets = self.collect_targets(trie);
              if targets.is_empty() {
                  return;
              }
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              for node_id in targets {
                  let node = if let Some(n) = trie.get_node(node_id) { n } else { continue };
                  if node.out_degree() < self.min_out_degree {
                      continue;
                  }
                  if node.children().is_empty() {
                      continue;
                  }

                  // Group current edges by pop and clone to avoid borrow conflicts.
                  let mut by_pop: BTreeMap<isize, Vec<(EdgeKey, BTreeMap<NodeId, SortedSet>)>> = BTreeMap::new();
                  for (ek, dm) in node.children() {
                      by_pop.entry(ek.pop).or_default().push((ek.clone(), dm.clone()));
                  }

                  // Rebuild children: keep pop<=0 as-is; replace pop>0 where beneficial.
                  let mut new_children_total: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();

                  // Keep pop<=0 original edges.
                  for (ek, dm) in node.children() {
                      if ek.pop <= 0 {
                          let entry = new_children_total.entry(ek.clone()).or_default();
                          for (dst, sids) in dm {
                              entry.entry(*dst).or_default().union_inplace(sids);
                          }
                      }
                  }

                  let mut any_change = false;
                  for (pop, edges_for_pop) in by_pop.into_iter() {
                      if pop <= 0 {
                          continue;
                      }
                      if let Some(new_for_pop) = self.factor_one_node_pop(
                          trie,
                          node_id,
                          pop,
                          &edges_for_pop,
                          &all_states,
                      ) {
                          // Use rewritten edges for this pop
                          for (ek, dm) in new_for_pop {
                              let entry = new_children_total.entry(ek).or_default();
                              for (dst, sids) in dm {
                                  entry.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                          any_change = true;
                      } else {
                          // Keep original edges for this pop if no change
                          for (ek, dm) in edges_for_pop {
                              let entry = new_children_total.entry(ek).or_default();
                              for (dst, sids) in dm {
                                  entry.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                      }
                  }

                  if any_change {
                      trie.set_children(node_id, new_children_total);
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_root_fanout.rs: |
      use std::collections::BTreeMap;

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct FactorRootFanoutPass {
          max_atoms_per_pop: usize,
      }

      impl FactorRootFanoutPass {
          pub fn new(max_atoms_per_pop: usize) -> Self {
              Self { max_atoms_per_pop }
          }
      }

      impl OptimizationPass for FactorRootFanoutPass {
          fn name(&self) -> &'static str {
              "FactorRootFanout"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);
              let root_ids: Vec<_> = trie.root_ids.iter().cloned().collect();

              for root_id in root_ids {
                  let root_node = trie.get_node(root_id).unwrap();
                  if root_node.children().is_empty() {
                      continue;
                  }

                  let mut keep_children = BTreeMap::new();
                  let mut by_pop: BTreeMap<isize, Vec<(SortedSet, BTreeMap<NodeId, SortedSet>)>> =
                      BTreeMap::new();
                  let mut any_p_gt_0 = false;
                  for (ek, dm) in root_node.children().clone() {
                      if ek.pop <= 0 {
                          keep_children.insert(ek, dm);
                      } else {
                          any_p_gt_0 = true;
                          by_pop.entry(ek.pop).or_default().push((ek.tokens, dm));
                      }
                  }

                  if !any_p_gt_0 {
                      continue;
                  }

                  let mut new_children = keep_children;
                  let mut made_progress = false;

                  for (pop, entries) in by_pop {
                      let mut universe = SortedSet::new();
                      for (tokens, _) in &entries {
                          universe.union_inplace(tokens);
                      }
                      if universe.is_empty() {
                          continue;
                      }

                      let mut blocks = vec![universe.clone()];
                      let mut aborted = false;
                      for (tokens, _) in &entries {
                          let mut next_blocks = Vec::new();
                          for b in &blocks {
                              let inter = b.intersect(tokens);
                              if !inter.is_empty() {
                                  next_blocks.push(inter);
                              }
                              let diff_elems: Vec<_> =
                                  b.iter().filter(|t| !tokens.elems.binary_search(t).is_ok()).collect();
                              if !diff_elems.is_empty() {
                                  next_blocks.push(SortedSet::from_iter(diff_elems));
                              }
                          }
                          if self.max_atoms_per_pop > 0 && next_blocks.len() > self.max_atoms_per_pop {
                              aborted = true;
                              break;
                          }
                          blocks = next_blocks;
                      }
                      if aborted || blocks.is_empty() {
                          blocks = vec![universe];
                      }

                      for b in blocks {
                          let mut dest_agg: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                          for (tokens, dm) in &entries {
                              if b.intersect(tokens).is_empty() {
                                  continue;
                              }
                              for (dst, sids) in dm {
                                  dest_agg.entry(*dst).or_default().union_inplace(sids);
                              }
                          }
                          if dest_agg.is_empty() {
                              continue;
                          }

                          let mid_id = trie.add_node(false);
                          let edge_key = EdgeKey::new(pop, b.clone());
                          for (dst, sids) in dest_agg {
                              trie.add_edge(mid_id, edge_key.clone(), dst, sids);
                          }
                          new_children
                              .entry(EdgeKey::new(0, b))
                              .or_default()
                              .insert(mid_id, all_states.clone());
                          made_progress = true;
                      }
                  }

                  if made_progress {
                      trie.set_children(root_id, new_children);
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_state_dest_sets.rs: |
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Factor by clustering identical destination sets per (state, token) at a node.
      /// For each node u and each pop > 0:
      ///   - For every token t that appears at pop, we aggregate its dest->states map DM_t(t).
      ///   - For each state s, compute D_u,s(t) = {dest | s ∈ DM_t(t)[dest]}.
      ///   - Group tokens by identical D_u,s(·). For |D|=1 keep direct edges; for |D|>=2 introduce
      ///     one intermediate per dest-set D and route u --(0,T)--> I_D with sids, then
      ///     I_D --(p, union_T_over_states)--> d for all d ∈ D with sids = all_states.
      ///
      /// This reduces per-state fanout at u to:
      ///   - 1 (via the intermediate) for multi-destination patterns, and
      ///   - 1 (direct) for single-destination patterns after token merging.
      pub struct FactorStateDestSetsPass {
          pub max_intermediates_per_pop: usize,
          pub max_depth_from_roots: usize,
          pub min_out_degree: usize,
      }

      impl FactorStateDestSetsPass {
          pub fn new(max_intermediates_per_pop: usize, max_depth_from_roots: usize, min_out_degree: usize) -> Self {
              Self {
                  max_intermediates_per_pop,
                  max_depth_from_roots,
                  min_out_degree,
              }
          }

          fn collect_targets(&self, trie: &MiniTrie) -> Vec<NodeId> {
              if self.max_depth_from_roots == 0 {
                  return trie.root_ids.iter().cloned().collect();
              }
              let mut targets = Vec::new();
              let mut seen: BTreeSet<NodeId> = BTreeSet::new();
              let mut q: VecDeque<(NodeId, usize)> = trie.root_ids.iter().map(|&r| (r, 0usize)).collect();
              while let Some((u, d)) = q.pop_front() {
                  if !seen.insert(u) {
                      continue;
                  }
                  if d <= self.max_depth_from_roots {
                      targets.push(u);
                  }
                  if d < self.max_depth_from_roots {
                      if let Some(node) = trie.get_node(u) {
                          for (_ek, dm) in node.children() {
                              for (v, _) in dm {
                                  q.push_back((*v, d + 1));
                              }
                          }
                      }
                  }
              }
              targets
          }

          fn factor_one_node_pop(
              &self,
              trie: &mut MiniTrie,
              node_id: NodeId,
              pop: isize,
              edges: &[(EdgeKey, BTreeMap<NodeId, SortedSet>)],
              all_states: &SortedSet,
          ) -> Option<BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>>> {
              // Aggregate per-token dest->states for this pop
              let mut dm_by_token: HashMap<usize, BTreeMap<NodeId, SortedSet>> = HashMap::new();
              for (ek, dm) in edges {
                  debug_assert_eq!(ek.pop, pop);
                  if ek.tokens.is_empty() {
                      continue;
                  }
                  for t in ek.tokens.iter() {
                      let entry = dm_by_token.entry(t).or_default();
                      for (dst, sids) in dm.iter() {
                          entry.entry(*dst).or_default().union_inplace(sids);
                      }
                  }
              }
              if dm_by_token.is_empty() {
                  return None;
              }

              // For each token, build per-state destination sets.
              // per_state_groups: state -> { destset(Vec<NodeId>) -> tokens(SortedSet) }
              let mut per_state_groups: HashMap<usize, HashMap<Vec<NodeId>, SortedSet>> = HashMap::new();
              for (t, dm_t) in dm_by_token.into_iter() {
                  // Temporary: state -> Vec<dest>
                  let mut dests_by_state: HashMap<usize, Vec<NodeId>> = HashMap::new();
                  for (dst, sids) in dm_t.into_iter() {
                      for s in sids.iter() {
                          dests_by_state.entry(s).or_default().push(dst);
                      }
                  }
                  for (s, mut v) in dests_by_state {
                      v.sort_unstable();
                      v.dedup();
                      if v.is_empty() {
                          continue;
                      }
                      per_state_groups
                          .entry(s)
                          .or_default()
                          .entry(v)
                          .or_default()
                          .insert(t);
                  }
              }
              if per_state_groups.is_empty() {
                  return None;
              }

              // Invert: destset -> { tokens -> states }
              let mut destset_to_tokens_to_states: HashMap<Vec<NodeId>, BTreeMap<SortedSet, SortedSet>> =
                  HashMap::new();
              for (s, groups) in per_state_groups.into_iter() {
                  for (destset, toks) in groups.into_iter() {
                      destset_to_tokens_to_states
                          .entry(destset)
                          .or_default()
                          .entry(toks)
                          .or_default()
                          .insert(s);
                  }
              }
              if destset_to_tokens_to_states.is_empty() {
                  return None;
              }

              // Cap intermediates if necessary to avoid blow-ups.
              let multi_count = destset_to_tokens_to_states
                  .keys()
                  .filter(|ds| ds.len() >= 2)
                  .count();
              if self.max_intermediates_per_pop > 0 && multi_count > self.max_intermediates_per_pop {
                  // Skip factoring for this pop if it would explode.
                  return None;
              }

              let mut new_children_for_pop: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();
              let mut made_change = false;

              for (destset, tokens_to_states) in destset_to_tokens_to_states.into_iter() {
                  if destset.is_empty() {
                      continue;
                  }
                  if destset.len() == 1 {
                      // Keep direct edges, merging tokens across identical (state groups).
                      let d = destset[0];
                      for (toks, states) in tokens_to_states.into_iter() {
                          if toks.is_empty() || states.is_empty() {
                              continue;
                          }
                          let key = EdgeKey::new(pop, toks);
                          new_children_for_pop
                              .entry(key)
                              .or_default()
                              .entry(d)
                              .or_default()
                              .union_inplace(&states);
                          made_change = true;
                      }
                  } else {
                      // Create an intermediate specific to this dest-set.
                      // Tokens for mid->dest are the union across all states for this dest-set.
                      let mut toks_union = SortedSet::new();
                      for (toks, _states) in tokens_to_states.iter() {
                          toks_union.union_inplace(toks);
                      }
                      if toks_union.is_empty() {
                          continue;
                      }
                      let mid_id = trie.add_node(false);

                      // Source -> mid (pop=0), grouped by (tokens -> states).
                      for (toks, states) in tokens_to_states.into_iter() {
                          if toks.is_empty() || states.is_empty() {
                              continue;
                          }
                          let key = EdgeKey::new(0, toks);
                          new_children_for_pop
                              .entry(key)
                              .or_default()
                              .entry(mid_id)
                              .or_default()
                              .union_inplace(&states);
                      }

                      // Mid -> destinations (pop=p) with all_states; tokens are toks_union.
                      for &d in destset.iter() {
                          trie.add_edge(mid_id, EdgeKey::new(pop, toks_union.clone()), d, all_states.clone());
                      }
                      made_change = true;
                  }
              }

              if made_change {
                  Some(new_children_for_pop)
              } else {
                  None
              }
          }
      }

      impl OptimizationPass for FactorStateDestSetsPass {
          fn name(&self) -> &'static str {
              "FactorStateDestSets"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let targets = self.collect_targets(trie);
              if targets.is_empty() {
                  return;
              }
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              for node_id in targets {
                  let node = if let Some(n) = trie.get_node(node_id) { n } else { continue };
                  if node.out_degree() < self.min_out_degree {
                      continue;
                  }
                  if node.children().is_empty() {
                      continue;
                  }

                  // Group current edges by pop and clone them to work off-borrow.
                  let mut by_pop: BTreeMap<isize, Vec<(EdgeKey, BTreeMap<NodeId, SortedSet>)>> = BTreeMap::new();
                  for (ek, dm) in node.children() {
                      by_pop.entry(ek.pop).or_default().push((ek.clone(), dm.clone()));
                  }

                  // Build new children map, keeping pop<=0 as-is and replacing pop>0 where factoring made changes.
                  let mut new_children_total: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();
                  // Keep pop<=0 original edges.
                  for (ek, dm) in node.children() {
                      if ek.pop <= 0 {
                          let entry = new_children_total.entry(ek.clone()).or_default();
                          for (dst, sids) in dm {
                              entry.entry(*dst).or_default().union_inplace(sids);
                          }
                      }
                  }

                  let mut any_change = false;
                  for (pop, edges) in by_pop.into_iter() {
                      if pop <= 0 {
                          continue; // already kept
                      }
                      if let Some(new_for_pop) =
                          self.factor_one_node_pop(trie, node_id, pop, &edges, &all_states)
                      {
                          // Use rewritten edges for this pop
                          for (ek, dm) in new_for_pop {
                              let entry = new_children_total.entry(ek).or_default();
                              for (dst, sids) in dm {
                                  entry.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                          any_change = true;
                      } else {
                          // Keep original edges for this pop if no change
                          for (ek, dm) in edges {
                              let entry = new_children_total.entry(ek).or_default();
                              for (dst, sids) in dm {
                                  entry.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                      }
                  }

                  if any_change {
                      trie.set_children(node_id, new_children_total);
                  }
              }
          }
      }
    src/trie3_opt/passes/factor_state_fanout.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::EdgeKey;
      use crate::trie3_opt::passes::OptimizationPass;

      /// State-aware factoring via token atoms and intermediates.
      ///
      /// For each node and each pop > 0:
      ///   1) Build token-atoms from the outgoing (pop, tokens) sets so that, within an atom T,
      ///      membership of each original token-set is uniform (either T ⊆ tokens or disjoint).
      ///   2) For each atom T, compute a destination map dest -> union(states) over original edges
      ///      that cover T. Then for each state s appearing at T, compute D(s, T) (the set of dests).
      ///   3) Group states by identical D(s, T). Accumulate token unions across atoms for identical
      ///      (dest-set, state-set) groups.
      ///   4) For a dest-set of size:
      ///      - 0: nothing to emit.
      ///      - 1: keep a direct edge (p, unioned_tokens) to that single dest for its state-set.
      ///      - >=2: create (or reuse) a per-dest-set intermediate I; add one source --(0, tokens)--> I
      ///        for the state-set; and add I --(p, unioned_tokens_over_all_states_for_this_destset)--> v
      ///        for each v in the dest-set with sids = all_states.
      ///
      /// This strictly reduces per-state fanout at the source from |D(s, T)| to 1 for atoms where
      /// |D(s, T)| >= 2 and merges tokens across atoms wherever (D(s, T)) is identical.
      pub struct FactorStateFanoutPass;

      impl OptimizationPass for FactorStateFanoutPass {
          fn name(&self) -> &'static str {
              "FactorStateFanout"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              const MAX_ATOMS_PER_POP: usize = 4096;
              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = if let Some(n) = trie.get_node(node_id) { n } else { continue };
                  if node.children().is_empty() {
                      continue;
                  }

                  // Group existing edges by pop so we can completely rebuild per-pop.
                  let mut by_pop: BTreeMap<isize, Vec<(EdgeKey, BTreeMap<NodeId, SortedSet>)>> =
                      BTreeMap::new();
                  for (ek, dm) in node.children() {
                      by_pop.entry(ek.pop).or_default().push((ek.clone(), dm.clone()));
                  }

                  let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();
                  let all_states = SortedSet::from_iter(0..= _ctx.max_state_id);

                  for (pop, edges) in by_pop {
                      // We only factor for pop > 0; keep pop<=0 as-is.
                      if pop <= 0 {
                          for (ek, dm) in edges {
                              let entry = new_children.entry(ek).or_default();
                              for (dst, sids) in dm {
                                  entry.entry(dst).or_default().union_inplace(&sids);
                              }
                          }
                          continue;
                      }

                      // Build token universe and atoms for these edges.
                      let mut universe = SortedSet::new();
                      for (ek, _) in &edges {
                          universe.union_inplace(&ek.tokens);
                      }
                      if universe.is_empty() {
                          // No tokens for this pop; nothing to do.
                          continue;
                      }

                      let mut atoms: Vec<SortedSet> = vec![universe.clone()];
                      let mut aborted = false;
                      for (ek, _) in &edges {
                          let toks = &ek.tokens;
                          if toks.is_empty() {
                              continue;
                          }
                          let mut next_atoms = Vec::with_capacity(atoms.len().saturating_mul(2));
                          for b in &atoms {
                              if !b.intersects(toks) {
                                  next_atoms.push(b.clone());
                                  continue;
                              }
                              let inter = b.intersect(toks);
                              if !inter.is_empty() {
                                  next_atoms.push(inter);
                              }
                              let diff = b.difference(toks);
                              if !diff.is_empty() {
                                  next_atoms.push(diff);
                              }
                          }
                          if next_atoms.len() > MAX_ATOMS_PER_POP {
                              aborted = true;
                              break;
                          }
                          atoms = next_atoms;
                      }
                      if aborted {
                          atoms = vec![universe];
                      }

                      // Accumulators:
                      // - For destset size >=2: per-destset intermediate and edges.
                      let mut mid_for_destset: HashMap<Vec<NodeId>, NodeId> = HashMap::new();
                      let mut tokens_for_destset_union: HashMap<Vec<NodeId>, SortedSet> = HashMap::new();
                      let mut destset_states_to_tokens: HashMap<Vec<NodeId>, HashMap<SortedSet, SortedSet>> =
                          HashMap::new();
                      // - For destset size == 1: keep direct edges; union tokens across atoms.
                      let mut direct_edges: HashMap<NodeId, HashMap<SortedSet, SortedSet>> = HashMap::new();

                      for tset in atoms {
                          // Build dest -> union(states) map for this atom tset.
                          let mut dest_map: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                          for (ek, dm) in &edges {
                              if !tset.intersects(&ek.tokens) {
                                  continue;
                              }
                              for (dst, sids) in dm {
                                  dest_map.entry(*dst).or_default().union_inplace(sids);
                              }
                          }
                          if dest_map.is_empty() {
                              continue;
                          }

                          // For this atom, compute D(s, atom) per state s.
                          // Use a sparse mapping only for states that appear.
                          let mut state_to_dests: HashMap<usize, Vec<NodeId>> = HashMap::new();
                          for (dst, sids) in &dest_map {
                              for s in sids.iter() {
                                  state_to_dests.entry(s).or_default().push(*dst);
                              }
                          }

                          // Group states by identical dest-set for this atom.
                          let mut local_dset_to_states: HashMap<Vec<NodeId>, SortedSet> = HashMap::new();
                          for (s, mut v) in state_to_dests {
                              v.sort_unstable();
                              v.dedup();
                              if v.is_empty() {
                                  continue;
                              }
                              local_dset_to_states.entry(v).or_default().insert(s);
                          }

                          // Accumulate across atoms:
                          for (dset, states) in local_dset_to_states {
                              if dset.len() == 1 {
                                  // Single destination: keep direct edge (pop, tokens) -> that dest, for these states.
                                  let dst = dset[0];
                                  direct_edges
                                      .entry(dst)
                                      .or_default()
                                      .entry(states.clone())
                                      .or_default()
                                      .union_inplace(&tset);
                              } else {
                                  // Multi-destination set: go via an intermediate for this dest-set.
                                  tokens_for_destset_union
                                      .entry(dset.clone())
                                      .or_default()
                                      .union_inplace(&tset);
                                  destset_states_to_tokens
                                      .entry(dset)
                                      .or_default()
                                      .entry(states)
                                      .or_default()
                                      .union_inplace(&tset);
                              }
                          }
                      }

                      // Emit direct edges for single-destination groups (merged across atoms).
                      for (dst, states_to_tokens) in direct_edges {
                          for (states, toks) in states_to_tokens {
                              if toks.is_empty() || states.is_empty() {
                                  continue;
                              }
                              let key = EdgeKey::new(pop, toks);
                              new_children
                                  .entry(key)
                                  .or_default()
                                  .entry(dst)
                                  .or_default()
                                  .union_inplace(&states);
                          }
                      }

                      // Emit intermediates and their edges for multi-destination sets.
                      for (dset, states_to_tokens) in destset_states_to_tokens {
                          // Create/reuse intermediate for this dest-set
                          let mid_id = *mid_for_destset
                              .entry(dset.clone())
                              .or_insert_with(|| trie.add_node(false));

                          // Source -> intermediate (pop=0) for each state-group; tokens merged across atoms.
                          for (states, toks) in states_to_tokens {
                              if toks.is_empty() || states.is_empty() {
                                  continue;
                              }
                              let key = EdgeKey::new(0, toks);
                              new_children
                                  .entry(key)
                                  .or_default()
                                  .entry(mid_id)
                                  .or_default()
                                  .union_inplace(&states);
                          }

                          // Intermediate -> destinations (pop=p), state-agnostic, tokens = union across all states for this dest-set.
                          let toks_mid = tokens_for_destset_union
                              .get(&dset)
                              .cloned()
                              .unwrap_or_else(SortedSet::new);
                          if !toks_mid.is_empty() {
                              for dst in dset {
                                  trie.add_edge(mid_id, EdgeKey::new(pop, toks_mid.clone()), dst, all_states.clone());
                              }
                          }
                      }
                  }

                  trie.set_children(node_id, new_children);
              }
          }
      }
    src/trie3_opt/passes/generalize_sids.rs: |
      use std::collections::{BTreeMap, HashMap, VecDeque};

      use crate::glr::{parser::GLRParser, table::StateID};
      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct GeneralizeSidsPass;

      impl OptimizationPass for GeneralizeSidsPass {
          fn name(&self) -> &'static str {
              "GeneralizeSids"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let parser = if let Some(p) = &ctx.parser {
                  p.borrow()
              } else {
                  return;
              };

              let one_step_back_map = parser.build_one_step_back_map();
              let mut max_pop = 0;
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if ek.pop > 0 {
                          max_pop = max_pop.max(ek.pop as usize);
                      }
                  }
              }
              if max_pop == 0 {
                  return;
              }

              let num_levels = (max_pop as f64).log2().ceil() as usize + 1;
              let mut two_power_back_maps: Vec<BTreeMap<StateID, SortedSet>> =
                  Vec::with_capacity(num_levels);
              two_power_back_maps.push(
                  one_step_back_map
                      .into_iter()
                      .map(|(k, v)| (k, SortedSet::from_iter(v.iter())))
                      .collect(),
              );

              for i in 1..num_levels {
                  let prev_map = &two_power_back_maps[i - 1];
                  let mut next_map: BTreeMap<StateID, SortedSet> = BTreeMap::new();
                  for (&state_id, preds1) in prev_map {
                      let mut preds2 = SortedSet::new();
                      for pred1_val in preds1.iter() {
                          let sid = StateID(pred1_val);
                          if let Some(preds_of_pred) = prev_map.get(&sid) {
                              preds2.union_inplace(preds_of_pred);
                          }
                      }
                      if !preds2.is_empty() {
                          next_map.insert(state_id, preds2);
                      }
                  }
                  two_power_back_maps.push(next_map);
              }

              let apply_n_step_back = |s: &SortedSet, n: usize| -> SortedSet {
                  let mut current_s = s.clone();
                  for k in 0..two_power_back_maps.len() {
                      if (n >> k) & 1 == 1 {
                          let map_k = &two_power_back_maps[k];
                          let mut next_s = SortedSet::new();
                          for state_id_val in current_s.iter() {
                              let state_id = StateID(state_id_val);
                              if let Some(preds) = map_k.get(&state_id) {
                                  next_s.union_inplace(preds);
                              }
                          }
                          current_s = next_s;
                      }
                  }
                  current_s
              };

              let mut possible_states: HashMap<NodeId, SortedSet> = HashMap::new();
              let mut worklist: VecDeque<NodeId> = VecDeque::new();
              let all_states = SortedSet::from_iter(0..=ctx.max_state_id);

              for root_id in &trie.root_ids {
                  possible_states.insert(*root_id, all_states.clone());
                  worklist.push_back(*root_id);
              }

              while let Some(u_id) = worklist.pop_front() {
                  let s_u = possible_states.get(&u_id).cloned().unwrap_or_default();
                  if s_u.is_empty() {
                      continue;
                  }
                  let u_node = trie.get_node(u_id).unwrap();
                  for (ek, dm) in u_node.children() {
                      let s_u_popped = if ek.pop > 0 {
                          apply_n_step_back(&s_u, ek.pop as usize)
                      } else {
                          s_u.clone()
                      };
                      if s_u_popped.is_empty() {
                          continue;
                      }
                      for (v_id, sids_uv) in dm {
                          let s_transmitted = s_u_popped.intersect(sids_uv);
                          if s_transmitted.is_empty() {
                              continue;
                          }
                          let s_v_old = possible_states.entry(*v_id).or_default();
                          let old_len = s_v_old.len();
                          s_v_old.union_inplace(&s_transmitted);
                          if s_v_old.len() > old_len {
                              worklist.push_back(*v_id);
                          }
                      }
                  }
              }

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = node.children().clone();

                  for (_ek, dm) in &mut new_children {
                      dm.retain(|v_id, sids| {
                          if let Some(s_v) = possible_states.get(v_id) {
                              let intersection = sids.intersect(s_v);
                              if !intersection.is_empty() {
                                  *sids = intersection;
                                  true
                              } else {
                                  false
                              }
                          } else {
                              // v is not reachable with any valid state, so this edge is dead.
                              false
                          }
                      });
                  }
                  new_children.retain(|_, dm| !dm.is_empty());
                  trie.set_children(node_id, new_children);
              }
          }
      }
    src/trie3_opt/passes/merge_bisimulation.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      pub struct MergeBisimulationPass {
          max_iters: usize,
      }

      impl MergeBisimulationPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeBisimulationPass {
          fn name(&self) -> &'static str {
              "MergeBisimulation"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let id_to_idx: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              let mut prev_class: Vec<usize> = vec![0; n];
              for (i, id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*id).unwrap();
                  prev_class[i] = if node.is_end() { 1 } else { 0 };
              }

              for _ in 0..self.max_iters {
                  type AggregatedEdge = ((isize, SortedSet, usize), SortedSet);
                  type Signature = (bool, Vec<AggregatedEdge>);
                  let mut sig_to_id: HashMap<Signature, usize> = HashMap::new();
                  let mut new_class = vec![0; n];
                  let mut next_id = 0;
                  let mut changes = 0;

                  for (u_idx, u_id) in node_ids.iter().enumerate() {
                      let u_node = trie.get_node(*u_id).unwrap();
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in u_node.children() {
                          for (v_id, sids) in dm {
                              let dest_class = prev_class[id_to_idx[v_id]];
                              let key = (ek.pop, ek.tokens.clone(), dest_class);
                              aggr.entry(key).or_default().union_inplace(sids);
                          }
                      }
                      let sig = (u_node.is_end(), aggr.into_iter().collect());
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let id = next_id;
                          next_id += 1;
                          id
                      });
                      new_class[u_idx] = cid;
                      if new_class[u_idx] != prev_class[u_idx] {
                          changes += 1;
                      }
                  }
                  prev_class = new_class;
                  if changes == 0 {
                      break;
                  }
              }

              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  if representatives[class_id].is_none() {
                      representatives[class_id] = Some(node_ids[u_idx]);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  node_to_rep.insert(node_ids[u_idx], representatives[class_id].unwrap());
              }

              for (class_id, rep_id_opt) in representatives.iter().enumerate() {
                  if let Some(rep_id) = rep_id_opt {
                      let exemplar_idx = prev_class.iter().position(|&c| c == class_id).unwrap();
                      let exemplar_node = trie.get_node(node_ids[exemplar_idx]).unwrap().clone();

                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          for (v_id, sids) in dm {
                              let v_class = prev_class[id_to_idx[v_id]];
                              aggr.entry((ek.pop, ek.tokens.clone(), v_class))
                                  .or_default()
                                  .union_inplace(sids);
                          }
                      }

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for ((pop, tokens, dest_class), sids) in aggr {
                          if let Some(dest_rep) = representatives[dest_class] {
                              let key = EdgeKey::new(pop, tokens);
                              new_children.entry(key).or_default().insert(dest_rep, sids);
                          }
                      }
                      trie.set_children(*rep_id, new_children);
                  }
              }

              let rep_set: std::collections::HashSet<NodeId> =
                  representatives.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false);
                  }
              }

              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
    src/trie3_opt/passes/merge_equivalent_llm_tokens.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet};

      use crate::trie3_opt::{context::OptimizationContext, core::{MiniTrie, SortedSet}, passes::OptimizationPass, NodeId};

      pub struct MergeEquivalentLLMTokensPass;

      impl OptimizationPass for MergeEquivalentLLMTokensPass {
          fn name(&self) -> &'static str {
              "MergeEquivalentLLMTokens"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let sv_rc = if let Some(sv_rc) = &ctx.stage_vocab {
                  sv_rc
              } else {
                  return;
              };

              let mut all_bvs = HashSet::new();
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if !ek.tokens.is_empty() {
                          all_bvs.insert(ek.tokens.clone());
                      }
                  }
              }
              if all_bvs.is_empty() {
                  return;
              }

              let max_tok = ctx.max_llm_token_id;
              let mut token_to_class: Vec<usize> = vec![0; max_tok + 1];
              let mut class_to_tokens: HashMap<usize, Vec<usize>> = HashMap::new();
              class_to_tokens.insert(0, (0..=max_tok).collect());
              let mut num_classes = 1;

              for splitter_bv in all_bvs {
                  let mut members_in_splitter_by_class: HashMap<usize, Vec<usize>> = HashMap::new();
                  for token in splitter_bv.iter() {
                      if token <= max_tok {
                          let class_id = token_to_class[token];
                          members_in_splitter_by_class.entry(class_id).or_default().push(token);
                      }
                  }

                  for (old_class_id, tokens_for_new_class) in members_in_splitter_by_class {
                      let old_class_size = class_to_tokens.get(&old_class_id).map_or(0, |v| v.len());
                      if old_class_size > 0 && !tokens_for_new_class.is_empty() && tokens_for_new_class.len() < old_class_size {
                          let new_class_id = num_classes;
                          num_classes += 1;
                          for &token in &tokens_for_new_class {
                              token_to_class[token] = new_class_id;
                          }
                          let old_class_tokens = class_to_tokens.get_mut(&old_class_id).unwrap();
                          let moved_tokens_set: HashSet<_> = tokens_for_new_class.iter().cloned().collect();
                          old_class_tokens.retain(|t| !moved_tokens_set.contains(t));
                          class_to_tokens.insert(new_class_id, tokens_for_new_class);
                      }
                  }
              }

              let mut old_to_new: BTreeMap<usize, usize> = BTreeMap::new();
              for group in class_to_tokens.values() {
                  if group.len() > 1 {
                      let rep = *group.iter().min().unwrap();
                      for &t in group {
                          if t != rep {
                              old_to_new.insert(t, rep);
                          }
                      }
                  }
              }

              if old_to_new.is_empty() {
                  return;
              }

              let remap_sorted_set = |s: &SortedSet| -> SortedSet {
                  let mut new_elems = Vec::with_capacity(s.len());
                  for elem in s.iter() {
                      new_elems.push(old_to_new.get(&elem).copied().unwrap_or(elem));
                  }
                  SortedSet::from_iter(new_elems)
              };

              let node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in node_ids {
                  let node = trie.get_node(node_id).unwrap();
                  let mut new_children = BTreeMap::new();
                  for (mut ek, dm) in node.children().clone() {
                      ek.tokens = remap_sorted_set(&ek.tokens);
                      let entry: &mut BTreeMap<NodeId, SortedSet> = new_children.entry(ek).or_default();
                      for (dst, sids) in dm {
                          entry.entry(dst).or_default().union_inplace(&sids);
                      }
                  }
                  trie.set_children(node_id, new_children);
              }

              let mut sv_ref = sv_rc.borrow_mut();
              let sv = &mut **sv_ref;
              for (old, rep) in old_to_new {
                  if let Some(moved) = sv.internal_to_original.remove(&old) {
                      let entry = sv.internal_to_original.entry(rep).or_default();
                      *entry |= &moved;
                      for o in moved.iter() {
                          sv.original_to_internal.insert(o, rep);
                      }
                  }
              }
          }
      }
    src/trie3_opt/passes/merge_global_atoms.rs: |
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::collections::hash_map::Entry;

      use kdam::{BarExt, tqdm};
      use crate::profiler::PROGRESS_BAR_ENABLED;

      use crate::trie3_opt::{
          context::OptimizationContext,
          core::{EdgeKey, MiniTrie, NodeId, SortedSet},
          passes::OptimizationPass,
      };

      pub struct MergeGlobalAtomsPass {
          max_iters: usize,
          max_atoms_per_pop: usize,
      }

      impl MergeGlobalAtomsPass {
          pub fn new(max_iters: usize, max_atoms_per_pop: usize) -> Self {
              Self { max_iters, max_atoms_per_pop }
          }
      }

      impl OptimizationPass for MergeGlobalAtomsPass {
          fn name(&self) -> &'static str {
              "MergeGlobalAtoms"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let id_to_idx: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              let mut by_pop_masks: BTreeMap<isize, HashSet<SortedSet>> = BTreeMap::new();
              for node in trie.nodes() {
                  for (ek, _) in node.children() {
                      if !ek.tokens.is_empty() {
                          by_pop_masks.entry(ek.pop).or_default().insert(ek.tokens.clone());
                      }
                  }
              }

              // Build a per-pop union of all tokens that actually appear at that pop.
              // This dramatically reduces the universe size versus 0..=max_llm_token_id.
              let mut union_by_pop: BTreeMap<isize, SortedSet> = BTreeMap::new();
              for (pop, masks) in &by_pop_masks {
                  let mut acc: HashSet<usize> = HashSet::new();
                  for m in masks {
                      for t in m.iter() {
                          acc.insert(t);
                      }
                  }
                  union_by_pop.insert(*pop, SortedSet::from_iter(acc.into_iter()));
              }

              let mut atoms_by_pop: BTreeMap<isize, Vec<SortedSet>> = BTreeMap::new();
              for (pop, masks) in &by_pop_masks {
                  let universe = union_by_pop.get(pop).cloned().unwrap_or_else(SortedSet::new);
                  let mut blocks = if universe.is_empty() { Vec::new() } else { vec![universe.clone()] };
                  let mut aborted = false;
                  #[cfg(not(rustrover))]
                  let it_masks = tqdm!(
                      masks.iter(),
                      desc = &format!("MergeGlobalAtoms: BuildAtoms(pop={})", pop),
                      total = masks.len(),
                      disable = !PROGRESS_BAR_ENABLED,
                      leave = false
                  );
                  #[cfg(rustrover)]
                  let it_masks = masks.iter();

                  for m in it_masks {
                      if blocks.is_empty() {
                          break;
                      }
                      let mut next_blocks = Vec::with_capacity(blocks.len().saturating_mul(2));
                      let mut any_split = false;
                      for b in &blocks {
                          // If no overlap, forward the block unchanged to avoid allocations.
                          if !b.intersects(&m) {
                              next_blocks.push(b.clone());
                              continue;
                          }
                          // Split: intersection and difference
                          let inter = b.intersect(&m);
                          if !inter.is_empty() {
                              next_blocks.push(inter);
                          }
                          let diff = b.difference(&m);
                          if !diff.is_empty() {
                              next_blocks.push(diff);
                          }
                          any_split = true;
                      }
                      if self.max_atoms_per_pop > 0 && next_blocks.len() > self.max_atoms_per_pop {
                          aborted = true;
                          break;
                      }
                      if !any_split {
                          // No change for this mask; keep current blocks.
                          continue;
                      }
                      blocks = next_blocks;
                  }
                  atoms_by_pop.insert(
                      *pop,
                      if aborted {
                          if universe.is_empty() { vec![] } else { vec![universe.clone()] }
                      } else {
                          blocks
                      },
                  );
              }

              // Create dense IDs for all unique token sets for faster lookups.
              let mut unique_token_sets: HashMap<SortedSet, usize> = HashMap::new();
              let mut next_token_set_id = 0;
              for masks in by_pop_masks.values() {
                  for mask in masks {
                      match unique_token_sets.entry(mask.clone()) {
                          Entry::Vacant(e) => {
                              e.insert(next_token_set_id);
                              next_token_set_id += 1;
                          }
                          Entry::Occupied(_) => {}
                      };
                  }
              }

              // Precompute atom overlaps for each unique token set ID.
              // Map: pop -> Vec<Vec<usize>> where outer vec is indexed by token_set_id
              let mut atom_idxs_by_pop_token_set_id: BTreeMap<isize, Vec<Vec<usize>>> = BTreeMap::new();
              for (pop, atoms) in &atoms_by_pop {
                  if let Some(masks) = by_pop_masks.get(pop) {
                      let pop_map = atom_idxs_by_pop_token_set_id.entry(*pop).or_insert_with(Vec::new);
                      pop_map.resize(next_token_set_id, Vec::new());
                      for mask in masks {
                          let token_set_id = *unique_token_sets.get(mask).unwrap();
                          let mut idxs = Vec::new();
                          for (i, atom) in atoms.iter().enumerate() {
                              if mask.intersects(atom) {
                                  idxs.push(i);
                              }
                          }
                          pop_map[token_set_id] = idxs;
                      }
                  }
              }
              // Compute pop=0 distance for initial partitioning.
              let mut pop0_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_rev_adj: Vec<Vec<NodeId>> = vec![vec![]; n];
              let mut pop0_out_degree = vec![0; n];
              for u_node in trie.nodes() {
                  let u_idx = id_to_idx[&u_node.id()];
                  for (ek, dm) in u_node.children() {
                      if ek.pop == 0 {
                          for v_id in dm.keys() {
                              pop0_adj[u_idx].push(*v_id);
                              pop0_rev_adj[id_to_idx[v_id]].push(u_node.id());
                              pop0_out_degree[u_idx] += 1;
                          }
                      }
                  }
              }

              let mut dist = vec![0; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              for i in 0..n {
                  if pop0_out_degree[i] == 0 {
                      q.push_back(i);
                  }
              }

              let mut processed_count = 0;
              while let Some(v_idx) = q.pop_front() {
                  processed_count += 1;
                  for u_id in &pop0_rev_adj[v_idx] {
                      let u_idx = id_to_idx[u_id];
                      dist[u_idx] = dist[u_idx].max(1 + dist[v_idx]);
                      pop0_out_degree[u_idx] -= 1;
                      if pop0_out_degree[u_idx] == 0 {
                          q.push_back(u_idx);
                      }
                  }
              }

              if processed_count < n {
                  let max_dist = n + 1;
                  for i in 0..n {
                      if pop0_out_degree[i] > 0 {
                          q.push_back(i);
                      }
                  }
                  while let Some(v_idx) = q.pop_front() {
                      if dist[v_idx] != max_dist {
                          dist[v_idx] = max_dist;
                          for u_id in &pop0_rev_adj[v_idx] {
                              q.push_back(id_to_idx[u_id]);
                          }
                      }
                  }
              }

              // Partition refinement.
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class_id = 0;
              for (i, id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*id).unwrap();
                  let key = (node.is_end(), dist[id_to_idx[id]]);
                  let class_id = *class_map.entry(key).or_insert_with(|| {
                      let id = next_class_id;
                      next_class_id += 1;
                      id
                  });
                  prev_class[i] = class_id;
              }

              for iter_num in 0..self.max_iters {
                  type InternedEdgeSig = Vec<(usize, usize)>; // (dest_class, sset_id)
                  type InternedNodeSig = (bool, Vec<((isize, usize), InternedEdgeSig)>); // (is_end, [((pop, atom_idx), edge_sig)])

                  let mut sset_interner: HashMap<SortedSet, usize> = HashMap::new();
                  let mut next_sset_id = 0;

                  let mut sig_to_id: HashMap<InternedNodeSig, usize> = HashMap::new();
                  let mut next_id = 0;
                  let mut new_class = vec![0; n];
                  let mut changes = 0;

                  #[cfg(not(rustrover))]
                  let it_nodes = tqdm!(
                      node_ids.iter().enumerate(),
                      desc = &format!("MergeGlobalAtoms: Refine iter {}", iter_num + 1),
                      total = node_ids.len(),
                      disable = !PROGRESS_BAR_ENABLED,
                      leave = false
                  );
                  #[cfg(rustrover)]
                  let it_nodes = node_ids.iter().enumerate();

                  for (u_idx, u_id) in it_nodes {
                      let u_node = trie.get_node(*u_id).unwrap();
                      let mut per_atom_aggr: BTreeMap<(isize, usize), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in u_node.children() {
                          if let Some(pop_map) = atom_idxs_by_pop_token_set_id.get(&ek.pop) {
                              if let Some(token_set_id) = unique_token_sets.get(&ek.tokens) {
                                  if let Some(atom_idxs) = pop_map.get(*token_set_id) {
                                      for &atom_idx in atom_idxs {
                                          let entry = per_atom_aggr.entry((ek.pop, atom_idx)).or_default();
                                          for (v_id, sids) in dm {
                                              let dest_class = prev_class[id_to_idx[v_id]];
                                              entry.entry(dest_class).or_default().union_inplace(sids);
                                          }
                                      }
                                  }
                              }
                          }
                      }
                      let mut sig_entries_interned: Vec<((isize, usize), InternedEdgeSig)> = Vec::with_capacity(per_atom_aggr.len());
                      for ((pop, atom_idx), dm) in per_atom_aggr {
                          let mut dest_vec: InternedEdgeSig = Vec::with_capacity(dm.len());
                          for (dest_class, sids) in dm {
                              let sset_id = *sset_interner.entry(sids).or_insert_with(|| { let id = next_sset_id; next_sset_id += 1; id });
                              dest_vec.push((dest_class, sset_id));
                          }
                          sig_entries_interned.push(((pop, atom_idx), dest_vec));
                      }

                      let sig: InternedNodeSig = (u_node.is_end(), sig_entries_interned);
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| { let id = next_id; next_id += 1; id });
                      new_class[u_idx] = cid;
                      if new_class[u_idx] != prev_class[u_idx] { changes += 1; }
                  }
                  prev_class = new_class;
                  if changes == 0 { break; }
              }

              // Rewire and rebuild.
              let final_partition = &prev_class;
              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  if representatives[class_id].is_none() {
                      representatives[class_id] = Some(node_ids[u_idx]);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (u_idx, &class_id) in prev_class.iter().enumerate() {
                  node_to_rep.insert(node_ids[u_idx], representatives[class_id].unwrap());
              }

              // Rebuild representative edges.
              for class_id in 0..num_classes {
                  if let Some(rep_id) = representatives[class_id] {
                      let exemplar_idx = final_partition.iter().position(|&c| c == class_id).unwrap();
                      let exemplar_id = node_ids[exemplar_idx];
                      let exemplar_node = trie.get_node(exemplar_id).unwrap().clone();

                      // Aggregate by (pop, tokens, dest_class) -> union of sids
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          for (v_id, sids) in dm {
                              let v_class = final_partition[id_to_idx[v_id]];
                              aggr.entry((ek.pop, ek.tokens.clone(), v_class))
                                  .or_default()
                                  .union_inplace(sids);
                          }
                      }

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for ((pop, tokens, dest_class), sids) in aggr {
                          if let Some(dest_rep) = representatives[dest_class] {
                              let key = EdgeKey::new(pop, tokens);
                              new_children.entry(key).or_default().insert(dest_rep, sids);
                          }
                      }
                      trie.set_children(rep_id, new_children);
                  }
              }

              // Clear children of non-representatives.
              let rep_set: HashSet<NodeId> = representatives.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false); // Non-reps are effectively deleted.
                  }
              }

              // Remap roots.
              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
    src/trie3_opt/passes/merge_state_agnostic.rs: |
      use std::collections::{BTreeMap, BTreeSet, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Merge nodes by a state-agnostic bisimulation and then aggregate state sets safely.
      /// Two nodes are equivalent if they:
      ///   - have the same `end` flag, and
      ///   - for every (pop, tokens) key, the set of destination equivalence classes is identical.
      ///
      /// After convergence, we collapse each class to a representative:
      ///   - For each ((pop, tokens), dest_class) triple across the class, we union all state-sets
      ///     into a single edge to the representative of dest_class.
      ///   - Non-representatives are cleared (children removed, end=false), and roots are remapped.
      ///
      /// This preserves all token-labeled languages exactly and remains sound for state constraints
      /// (we only take supersets of state bitsets when merging).
      pub struct MergeStateAgnosticPass {
          max_iters: usize,
      }

      impl MergeStateAgnosticPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeStateAgnosticPass {
          fn name(&self) -> &'static str {
              "MergeStateAgnostic"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }
              let id_to_idx: HashMap<NodeId, usize> = node_ids
                  .iter()
                  .enumerate()
                  .map(|(i, id)| (*id, i))
                  .collect();

              // Initial coarse partition by (end flag, out-degree of key groups).
              // We consider "key groups" as unique EdgeKey (pop, tokens) ignoring destinations.
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut init_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_cid = 0usize;
              for (i, id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*id).unwrap();
                  let out_keys = node.children().len();
                  let key = (node.is_end(), out_keys);
                  let cid = *init_map.entry(key).or_insert_with(|| {
                      let v = next_cid;
                      next_cid += 1;
                      v
                  });
                  prev_class[i] = cid;
              }

              // Iterative refinement of the partition while ignoring state sets.
              for _ in 0..self.max_iters.max(1) {
                  // Node signature type:
                  //   (is_end, Vec<((pop, tokens), Vec<dest_class>)>)
                  // where dest_class vectors are sorted and unique, and the outer vector is sorted
                  // by (pop, tokens).
                  type NodeSig = (bool, Vec<((isize, SortedSet), Vec<usize>)>);

                  let mut sig_to_id: HashMap<NodeSig, usize> = HashMap::new();
                  let mut new_class: Vec<usize> = vec![0; n];
                  let mut next = 0usize;
                  let mut changes = 0usize;

                  for (i, id) in node_ids.iter().enumerate() {
                      let node = trie.get_node(*id).unwrap();
                      // Aggregate for this node: (pop, tokens) -> set of dest classes
                      let mut per_key: BTreeMap<(isize, SortedSet), BTreeSet<usize>> = BTreeMap::new();
                      for (ek, dm) in node.children() {
                          let entry = per_key.entry((ek.pop, ek.tokens.clone())).or_default();
                          for (dst, _sids) in dm {
                              let d_idx = id_to_idx[dst];
                              let d_class = prev_class[d_idx];
                              entry.insert(d_class);
                          }
                      }
                      // Canonicalize into sorted vectors
                      let mut vec_sig: Vec<((isize, SortedSet), Vec<usize>)> = Vec::with_capacity(per_key.len());
                      for (k, class_set) in per_key.into_iter() {
                          let mut dcs: Vec<usize> = class_set.into_iter().collect();
                          // Already sorted because BTreeSet yields in-order; keep explicitness
                          // and ensure deterministic ordering.
                          dcs.sort_unstable();
                          vec_sig.push((k, dcs));
                      }
                      let sig: NodeSig = (node.is_end(), vec_sig);
                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let v = next;
                          next += 1;
                          v
                      });
                      new_class[i] = cid;
                      if new_class[i] != prev_class[i] {
                          changes += 1;
                      }
                  }
                  prev_class = new_class;
                  if changes == 0 {
                      break;
                  }
              }

              // Build representative mapping.
              let num_classes = prev_class.iter().max().map_or(0, |m| m + 1);
              let mut representatives: Vec<Option<NodeId>> = vec![None; num_classes];
              for (i, &cid) in prev_class.iter().enumerate() {
                  if representatives[cid].is_none() {
                      representatives[cid] = Some(node_ids[i]);
                  }
              }
              let mut node_to_rep: HashMap<NodeId, NodeId> = HashMap::new();
              for (i, id) in node_ids.iter().enumerate() {
                  let cid = prev_class[i];
                  node_to_rep.insert(*id, representatives[cid].unwrap());
              }

              // Rebuild edges for each representative:
              // Aggregate by (pop, tokens, dest_class) -> union(state sets)
              for class_id in 0..num_classes {
                  if let Some(rep_id) = representatives[class_id] {
                      let mut aggr: BTreeMap<(isize, SortedSet, usize), SortedSet> = BTreeMap::new();

                      for (i, id) in node_ids.iter().enumerate() {
                          if prev_class[i] != class_id {
                              continue;
                          }
                          let node = trie.get_node(*id).unwrap();
                          for (ek, dm) in node.children() {
                              for (dst, sids) in dm {
                                  let d_class = prev_class[id_to_idx[dst]];
                                  aggr.entry((ek.pop, ek.tokens.clone(), d_class))
                                      .or_default()
                                      .union_inplace(sids);
                              }
                          }
                      }

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> = BTreeMap::new();
                      for ((pop, tokens, d_class), sids) in aggr {
                          if let Some(dest_rep) = representatives[d_class] {
                              if !sids.is_empty() {
                                  let key = EdgeKey::new(pop, tokens);
                                  new_children.entry(key).or_default().insert(dest_rep, sids);
                              }
                          }
                      }
                      trie.set_children(rep_id, new_children);
                  }
              }

              // Clear children of non-representatives and normalize end flags.
              let rep_set: BTreeSet<NodeId> = representatives.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false);
                  }
              }

              // Remap roots to representatives.
              trie.root_ids = trie.root_ids.iter().map(|r| *node_to_rep.get(r).unwrap()).collect();
          }
      }
    src/trie3_opt/passes/merge_structural.rs: |
      use std::collections::{BTreeMap, HashMap};

      use crate::trie3_opt::context::OptimizationContext;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;

      /// Merge nodes with identical structure via iterative refinement. Signature includes:
      /// - End flag
      /// - For each edge-key: (pop, tokens) and destination-class aggregated states.
      /// This is a simplified variant of the structural merge in the large pipeline, implemented
      /// purely over the MiniTrie.
      pub struct MergeStructuralPass {
          pub max_iters: usize,
      }

      impl MergeStructuralPass {
          pub fn new(max_iters: usize) -> Self {
              Self { max_iters }
          }
      }

      impl OptimizationPass for MergeStructuralPass {
          fn name(&self) -> &'static str {
              "MergeStructural"
          }

          fn run(&self, trie: &mut MiniTrie, _ctx: &mut OptimizationContext) {
              let node_ids: Vec<_> = trie.node_ids().collect();
              let dense_of: HashMap<_, _> = node_ids.iter().enumerate().map(|(i, id)| (*id, i)).collect();
              let n = node_ids.len();
              if n == 0 {
                  return;
              }

              // Initial classes by end flag and out-degree
              let mut prev_class: Vec<usize> = vec![0; n];
              let mut class_map: HashMap<(bool, usize), usize> = HashMap::new();
              let mut next_class = 0usize;
              for (i, node_id) in node_ids.iter().enumerate() {
                  let node = trie.get_node(*node_id).unwrap();
                  let key = (node.is_end(), node.out_degree());
                  let cid = *class_map.entry(key).or_insert_with(|| {
                      let v = next_class;
                      next_class += 1;
                      v
                  });
                  prev_class[i] = cid;
              }

              for _ in 0..self.max_iters.max(1) {
                  // Build signature per node
                  #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug, Hash)]
                  struct EdgeSig {
                      pop: isize,
                      tokens: SortedSet,
                      dest: Vec<(usize, SortedSet)>, // dest_class, states
                  }
                  type NodeSig = (bool, Vec<EdgeSig>);

                  let mut sig_to_id: HashMap<NodeSig, usize> = HashMap::new();
                  let mut new_class: Vec<usize> = vec![0; n];
                  let mut next = 0usize;
                  let mut changes = 0usize;

                  for (i, node_id) in node_ids.iter().enumerate() {
                      let node = trie.get_node(*node_id).unwrap();
                      // Aggregate by (pop, tokens) -> dest_class -> union of states
                      let mut per_key: BTreeMap<(isize, SortedSet), BTreeMap<usize, SortedSet>> = BTreeMap::new();
                      for (ek, dm) in node.children() {
                          let inner = per_key.entry((ek.pop, ek.tokens.clone())).or_default();
                          for (dst, sids) in dm.iter() {
                              let d_dense = *dense_of.get(dst).unwrap();
                              let d_class = prev_class[d_dense];
                              let entry = inner.entry(d_class).or_default();
                              entry.union_inplace(sids);
                          }
                      }

                      // Build canonical signature vector
                      let mut esigs: Vec<EdgeSig> = Vec::with_capacity(per_key.len());
                      for ((pop, toks), dm_class) in per_key.into_iter() {
                          let mut dest_vec: Vec<(usize, SortedSet)> = dm_class.into_iter().collect();
                          dest_vec.sort_unstable_by(|a, b| {
                              let c = a.0.cmp(&b.0);
                              if c != std::cmp::Ordering::Equal {
                                  return c;
                              }
                              a.1.cmp(&b.1)
                          });
                          esigs.push(EdgeSig {
                              pop,
                              tokens: toks,
                              dest: dest_vec,
                          });
                      }
                      let sig: NodeSig = (node.is_end(), esigs);

                      let cid = *sig_to_id.entry(sig).or_insert_with(|| {
                          let v = next;
                          next += 1;
                          v
                      });
                      new_class[i] = cid;
                      if new_class[i] != prev_class[i] {
                          changes += 1;
                      }
                  }
                  prev_class = new_class;
                  if changes == 0 {
                      break;
                  }
              }

              // Build representative mapping
              let num_classes = prev_class.iter().max().map(|x| *x + 1).unwrap_or(0);
              let mut rep_of_class: Vec<Option<NodeId>> = vec![None; num_classes];
              for (i, &cid) in prev_class.iter().enumerate() {
                  if rep_of_class[cid].is_none() {
                      rep_of_class[cid] = Some(node_ids[i]);
                  }
              }
              let mut rep_of_node: HashMap<NodeId, NodeId> = HashMap::with_capacity(n);
              for (i, node_id) in node_ids.iter().enumerate() {
                  let cid = prev_class[i];
                  rep_of_node.insert(*node_id, rep_of_class[cid].unwrap());
              }

              for (cid, rep_id_opt) in rep_of_class.iter().enumerate() {
                  if let Some(rep_id) = rep_id_opt {
                      let exemplar_idx = prev_class.iter().position(|&c| c == cid).unwrap();
                      let exemplar_node = trie.get_node(node_ids[exemplar_idx]).unwrap().clone();

                      let mut new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> =
                          BTreeMap::new();
                      for (ek, dm) in exemplar_node.children() {
                          let mut new_dm: BTreeMap<NodeId, SortedSet> = BTreeMap::new();
                          for (dst, sids) in dm {
                              let rep = *rep_of_node.get(dst).unwrap();
                              new_dm.entry(rep).or_default().union_inplace(sids);
                          }
                          if !new_dm.is_empty() {
                              new_children.insert(ek.clone(), new_dm);
                          }
                      }
                      trie.set_children(*rep_id, new_children);
                  }
              }

              let rep_set: std::collections::HashSet<NodeId> =
                  rep_of_class.iter().filter_map(|&x| x).collect();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  if !rep_set.contains(&node_id) {
                      trie.clear_children(node_id);
                      trie.set_end(node_id, false);
                  }
              }

              trie.root_ids = trie
                  .root_ids
                  .iter()
                  .map(|r| *rep_of_node.get(r).unwrap())
                  .collect();
          }
      }
