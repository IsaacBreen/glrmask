         #[time_it]
         pub fn gather_gss_stats(roots: &[&GSSNode]) -> LeveledGSSStats<ParseStateEdgeContent, Acc> {
             let active_roots: Vec<_> = roots.iter().copied().filter(|r| !r.is_empty()).collect();
