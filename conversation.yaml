                                      mask_contribution_from_this_path |= &(final_gss_arc.acc().active & clean_tokens);
                                  }

                                  for (gtid, finalizer) in precompute_node_val.finalizers() {
                                      for (_finalizer_tokenizer_id, llm_tokens_from_finalizer) in &finalizer.content {
