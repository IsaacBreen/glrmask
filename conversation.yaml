                  let x = successor_tuple(&rep, a, &inst.components);

                  if image.contains_key(&x) {
                      continue;
                  }

                  let mut best_candidate_id: Option<usize> = None;
                  let mut best_specificity_increase: usize = usize::MAX; // Use usize::MAX for "infinity"

