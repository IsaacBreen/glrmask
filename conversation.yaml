      What changed and how to use:

      - timeit! macro
        - If you pass a block as the second argument, the macro now unwraps the block and injects its statements directly into the surrounding scope, and explicitly drops the guard right after your statements. This fixes the original issue where variables declared in the block went out of scope.
        - Examples:
          - Unnamed expression (unchanged behavior):
            timeit!(some_call());
          - Named expression (returns value):
            let v = timeit!("do calc", compute_value());
          - Named block (now unwrapped, variables remain in scope):
            timeit!("setup", { let x = 123; });
            dbg!(&x);

      - timeitblock! macro
        - New macro to time a block of code without adding an extra scope.
        - Supported call forms on stable Rust:
          - With description:
            timeitblock!("some description", { 
                let x = 123;
            });
            dbg!(&x);
          - Without description:
            timeitblock!({
                let y = 123;
            });
            dbg!(&y);
          - Or using curly braces as the macro delimiter:
            timeitblock! {
                let y = 123;
            }
