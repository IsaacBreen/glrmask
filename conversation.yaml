              # Process by depth (but using pre-computed buckets)
              for depth in self.sorted_depths:
                  has_active = False

                  # Check if any nodes at this depth are active
                  for idx in self.depth_buckets[depth]:
                      if node_active[idx]:
                          has_active = True
