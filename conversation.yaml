      ```python "python/gss_tester/interface.py"
      from __future__ import annotations
      from abc import ABC, abstractmethod
      from functools import reduce
      from typing import TypeVar, Generic, List, Tuple, Callable, Set, Iterable, Optional, Protocol, Type


      class Mergeable(Protocol):
          """Protocol for accumulator types that can be merged."""
          @abstractmethod
          def merge(self, other: 'Mergeable') -> 'Mergeable':
              ...

      class MergeableInt(int):
          """
          An integer that is mergeable (for testing `Acc` typevars) and
          returns itself from arithmetic operations to satisfy `Callable[[Acc], Acc]`.
          """
          def merge(self, other: 'MergeableInt') -> 'MergeableInt':
              return MergeableInt(super().__add__(other))

          def __add__(self, other: int) -> 'MergeableInt':
              if isinstance(other, int):
                  return MergeableInt(super().__add__(other))
              return NotImplemented

      T = TypeVar('T')  # Stack item type
      Acc = TypeVar('Acc', bound=Mergeable) # Accumulator type
      GSSType = TypeVar("GSSType", bound="GSS[Any, Any]")

      class GSS(ABC, Generic[T, Acc]):
          """Abstract Base Class for a Graph-Structured Stack (GSS)."""

          @classmethod
          @abstractmethod
          def from_stacks(cls: Type[GSSType], stacks: List[Tuple[List[T], Acc]]) -> GSSType:
              """Creates a GSS from a list of explicit stacks."""
              pass

          @abstractmethod
          def to_stacks(self) -> List[Tuple[List[T], Acc]]:
              """
              Converts the GSS to its canonical representation as a sorted list of stacks.
              This involves merging accumulators for identical stacks and sorting.
              """
              pass

          @abstractmethod
          def push(self: GSSType, value: T) -> GSSType:
              """Pushes a value onto all active stack heads, returning a new GSS state."""
              pass

          @abstractmethod
          def pop(self: GSSType) -> GSSType:
              """
              For all active stacks, creates new stacks by removing the top value.
              Returns a new GSS state containing the popped stacks.
              """
              pass

          def popn(self: GSSType, n: int) -> GSSType:
              """
              For all active stacks, creates new stacks by removing the top `n` values.
              Returns a new GSS state containing the popped stacks.
              """
              gss = self
              for _ in range(n):
                  gss = gss.pop()
              return gss

          @abstractmethod
          def is_empty(self) -> bool:
              """Checks if the GSS contains no active stacks."""
              pass

          @abstractmethod
          def isolate(self: GSSType, value: Optional[T]) -> GSSType:
              """
              Keeps only the stacks that have `value` at the top.
              If `value` is None, it keeps only the empty stacks.
              Returns a new GSS state containing only these stacks.
              """
              pass

          @abstractmethod
          def apply(self: GSSType, func: Callable[[Acc], Acc]) -> GSSType:
              """Applies a function to each accumulator, returning a new GSS state."""
              pass

          @abstractmethod
          def prune(self: GSSType, predicate: Callable[[Acc], bool]) -> GSSType:
              """
              Removes stacks from the GSS based on a predicate on their accumulator.
              If `predicate(acc)` returns False, the stack is removed.
              """
              pass

          @abstractmethod
          def merge(self: GSSType, other: GSSType) -> GSSType:
              """Merges this GSS with another, combining accumulators for identical stacks."""
              pass

          @classmethod
          def merge_many(cls: Type[GSSType], gss_list: Iterable[GSSType]) -> GSSType:
              """
              Merges multiple GSS instances into one.
              This default implementation uses functools.reduce with the instance `merge` method.
              """
              # Start with an empty GSS of the target class `cls` to ensure the correct
              # return type and to handle an empty gss_list.
              initial = cls.from_stacks([])
              return reduce(lambda acc_gss, next_gss: acc_gss.merge(next_gss), gss_list, initial)

          @abstractmethod
          def peek(self) -> Set[T]:
              """Returns the set of all values at the top of any stack."""
              pass

          @abstractmethod
          def reduce_acc(self) -> Optional[Acc]:
              """
              Merges the accumulators of all active stacks into a single optional value.
              Returns None if there are no active stacks.
              """
              pass

          def to_reference_impl(self) -> 'GSS[T, Acc]':
              """
              Converts the GSS to its canonical ReferenceGSS representation.
              This involves merging accumulators for identical stacks.
              """
              from .reference_impl import ReferenceGSS
              return ReferenceGSS.from_stacks(self.to_stacks())

          def __str__(self) -> str:
              """Provides a human-readable string representation for debugging."""
              return f"{self.__class__.__name__}({self.to_stacks()})"

          def __repr__(self) -> str:
              """Provides an unambiguous string representation of the GSS."""
              return f"{self.__class__.__name__}({self.to_stacks()!r})"
      ```

      ```python "python/gss_tester/leveled_impl.py"
      from __future__ import annotations

      from dataclasses import dataclass
      from typing import Callable, Dict, Generic, List, Optional, Set, Tuple, Any
      from collections import defaultdict

      from .interface import GSS, T, Acc


      # ------------------------------
      # Internal node classes
      # ------------------------------

      @dataclass(frozen=True, eq=True)
      class Upper(Generic[T, Acc]):
          inner: UpperBranch[T, Acc] | Interface[T, Acc]


      @dataclass(frozen=True, eq=True)
      class UpperBranch(Generic[T, Acc]):
          children: Dict[T, Dict[int, Upper[T, Acc]]]


      @dataclass(frozen=True, eq=True)
      class Interface(Generic[T, Acc]):
          node: Lower[T]
          acc: Acc


      @dataclass(frozen=True, eq=True)
      class Lower(Generic[T]):
          inner: LowerBranch[T] | Leaf


      @dataclass(frozen=True, eq=True)
      class LowerBranch(Generic[T]):
          children: Dict[T, Dict[int, Lower[T]]]


      @dataclass(frozen=True, eq=True)
      class Leaf:
          pass


      # A shared, canonical leaf node
      _LOWER_LEAF = Lower(Leaf())


      @dataclass(frozen=True, eq=True)
      class LeveledGSS(GSS[T, Acc], Generic[T, Acc]):
          inner: Upper[T, Acc]
          empty: Optional[Acc]

          @classmethod
          def from_stacks(cls, stacks: List[Tuple[List[T], Acc]]) -> LeveledGSS[T, Acc]:
              # Canonicalize first using the reference implementation
              from .reference_impl import ReferenceGSS
              merged = ReferenceGSS(stacks).to_stacks()

              empty_acc: Optional[Acc] = None
              # A simple trie: { val: { "i": [acc, ...], "b": <subtrie> } }
              trie: Dict[T, Dict[str, Any]] = {}

              for vals, acc in merged:
                  if not vals:
                      empty_acc = acc
                      continue
                  node = trie
                  for i, v in enumerate(vals):
                      entry = node.setdefault(v, {"i": [], "b": {}})
                      if i == len(vals) - 1:
                          entry["i"].append(acc)
                      else:
                          node = entry["b"]

              def build(d: Dict[T, Dict[str, Any]]) -> Upper[T, Acc]:
                  children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
                  for v, e in d.items():
                      nodes: List[Upper[T, Acc]] = [Upper(Interface(_LOWER_LEAF, a)) for a in e["i"]]
                      # Always add a branch node (empty or not) to keep structure uniform and avoid edge invariants.
                      branch_child = build(e["b"]) if e["b"] else Upper(UpperBranch({}))
                      nodes.append(branch_child)
                      children[v] = {i: n for i, n in enumerate(nodes)}
                  return Upper(UpperBranch(children))

              return LeveledGSS(build(trie), empty_acc)

          def to_stacks(self) -> List[Tuple[List[T], Acc]]:
              res: List[Tuple[List[T], Acc]] = []
              if self.empty is not None:
                  res.append(([], self.empty))

              def dfs(u: Upper[T, Acc], pref: List[T]) -> None:
                  if isinstance(u.inner, Interface):
                      res.append((pref, u.inner.acc))
                      return
                  for v, kids in u.inner.children.items():
                      for child in kids.values():
                          dfs(child, pref + [v])

              dfs(self.inner, [])
              from .reference_impl import ReferenceGSS
              return ReferenceGSS(res).to_stacks()

          def push(self, value: T) -> LeveledGSS[T, Acc]:
              return LeveledGSS.from_stacks(self.to_reference_impl().push(value).to_stacks())
          def pop(self) -> LeveledGSS[T, Acc]:
              return LeveledGSS.from_stacks(self.to_reference_impl().pop().to_stacks())
          def is_empty(self) -> bool:
              return self.to_reference_impl().is_empty()
          def isolate(self, value: Optional[T]) -> LeveledGSS[T, Acc]:
              return LeveledGSS.from_stacks(self.to_reference_impl().isolate(value).to_stacks())
          def apply(self, func: Callable[[Acc], Acc]) -> LeveledGSS[T, Acc]:
              return LeveledGSS.from_stacks(self.to_reference_impl().apply(func).to_stacks())
          def prune(self, predicate: Callable[[Acc], bool]) -> LeveledGSS[T, Acc]:
              return LeveledGSS.from_stacks(self.to_reference_impl().prune(predicate).to_stacks())
          def merge(self, other: LeveledGSS[T, Acc]) -> LeveledGSS[T, Acc]:
              return LeveledGSS.from_stacks(self.to_reference_impl().merge(other.to_reference_impl()).to_stacks())
          def peek(self) -> Set[T]:
              return self.to_reference_impl().peek()
          def reduce_acc(self) -> Optional[Acc]:
              return self.to_reference_impl().reduce_acc()


      def _get_upper_children(branch: UpperBranch[T, Acc]) -> List[Upper[T, Acc]]:
          """Helper to get all children from an UpperBranch."""
          return [child for children_by_val in branch.children.values() for child in children_by_val.values()]


      def validate_invariants(gss: LeveledGSS[T, Acc]) -> None:
          """
          Checks internal invariants of the LeveledGSS structure.
          Raises AssertionError if an invariant is violated.
          """
          def _validate_upper(node: Upper[T, Acc]):
              """Recursively validates invariants on Upper nodes."""
              if not isinstance(node.inner, UpperBranch):
                  return  # Base case: node is an Interface.
              all_children = _get_upper_children(node.inner)
              # Invariant 1: If all children are interfaces, there must be more than one unique acc.
              if all_children and all(isinstance(child.inner, Interface) for child in all_children):
                  if len({child.inner.acc for child in all_children}) > 1:
                      raise AssertionError("Invariant violated: UpperBranch has children that are all Interfaces with duplicate accs.")
              # Recurse into children
              for child in all_children:
                  _validate_upper(child)
          _validate_upper(gss.inner)
          # Invariant 2: If inner is an interface and empty exists, their accs must differ.
          if isinstance(gss.inner, Interface) and gss.empty is not None and gss.inner.acc == gss.empty:
              raise AssertionError("Invariant violated: LeveledGSS.inner (Interface) and LeveledGSS.empty have the same accumulator.")
      ```

      ```python "python/gss_tester/reference_impl.py"
      from __future__ import annotations
      import json
      from dataclasses import dataclass
      from functools import reduce
      from typing import List, Tuple, Callable, Set, Any, Type, Optional, Dict

      from .interface import GSS, T, Acc


      @dataclass(eq=False)
      class ReferenceGSS(GSS[T, Acc]):
          """
          A simple, 'dumb' reference implementation of the GSS interface using a list of explicit stacks.
          Each stack is represented as a pair: (list_of_values, accumulator).

          This implementation ensures that for any given stack content, there is at most
          one entry, with accumulators merged. This canonical form is enforced on
          creation and after any operation that could produce duplicate stacks (like pop).

          Notes on semantics (aligned with GSS interface):
          - from_stacks: constructs a new GSS from explicit stacks.
          - push(value): pushes `value` onto all active stack heads; returns a new GSS.
          - pop(): for all non-empty stacks, pops the top element. Empty stacks are discarded.
                   Returns a new GSS with the resulting stacks.
          - isolate(value): keeps only stacks whose top value equals `value` (does not modify the stacks).
          - apply(func): transforms each accumulator independently; returns a new GSS.
          - prune(predicate): removes stacks whose accumulator does not satisfy predicate.
          - peek(): returns the set of top values across all stacks (ignores empty stacks).
          - reduce_acc(merge_func): reduces/merges all accumulators into one using `merge_func`, or None
                                    if there are no active stacks.
          - merge(gss_list, merge_func): merges multiple GSS instances into one, combining accumulators for
                                         identical stacks using `merge_func`.
          - is_empty(): True iff there are no active stacks.
          """

          _stacks: List[Tuple[List[T], Acc]]

          def __post_init__(self):
              # On creation, merge any stacks with identical values by merging their accumulators.
              # This ensures the GSS is always in a canonical form.
              merged: Dict[Tuple[T, ...], Acc] = {}
              for vals, acc in self._stacks:
                  key = tuple(vals)
                  if key in merged:
                      merged[key] = merged[key].merge(acc)
                  else:
                      merged[key] = acc
              self._stacks = [(list(key), acc) for key, acc in merged.items()]

          @classmethod
          def from_stacks(cls: Type['ReferenceGSS'], stacks: List[Tuple[List[T], Acc]]) -> 'ReferenceGSS[T, Acc]':
              # The dataclass __init__ will be called, and __post_init__ will handle copying.
              return cls(stacks)

          def to_stacks(self) -> List[Tuple[List[T], Acc]]:
              """Returns a canonical, sorted list of stacks."""
              return self._get_canonical_sorted_stacks()

          def push(self, value: T) -> 'ReferenceGSS[T, Acc]':
              # Push `value` onto all stacks (copy each list to avoid mutating original)
              new_stacks: List[Tuple[List[T], Acc]] = []
              for vals, acc in self._stacks:
                  new_vals = list(vals)
                  new_vals.append(value)
                  new_stacks.append((new_vals, acc))
              return ReferenceGSS(new_stacks)

          def pop(self) -> 'ReferenceGSS[T, Acc]':
              # Pop from all non-empty stacks. Empty stacks are discarded.
              # If multiple stacks become identical, they are merged by the constructor.
              new_stacks: List[Tuple[List[T], Acc]] = []
              for vals, acc in self._stacks:
                  if vals:
                      new_stacks.append((vals[:-1], acc))
              return ReferenceGSS(new_stacks)

          def isolate(self, value: Optional[T]) -> 'ReferenceGSS[T, Acc]':
              # Keep only stacks whose top equals `value`, or empty stacks if `value` is None.
              filtered: List[Tuple[List[T], Acc]] = []
              for vals, acc in self._stacks:
                  if value is None:
                      if not vals:
                          filtered.append((list(vals), acc))
                  else:
                      if vals and vals[-1] == value:
                          filtered.append((list(vals), acc))
              return ReferenceGSS(filtered)

          def apply(self, func: Callable[[Acc], Acc]) -> 'ReferenceGSS[T, Acc]':
              # Apply func to each accumulator independently
              transformed: List[Tuple[List[T], Acc]] = []
              for vals, acc in self._stacks:
                  transformed.append((list(vals), func(acc)))
              return ReferenceGSS(transformed)

          def prune(self, predicate: Callable[[Acc], bool]) -> 'ReferenceGSS[T, Acc]':
              # Keep only stacks where predicate(acc) is True
              kept: List[Tuple[List[T], Acc]] = []
              for vals, acc in self._stacks:
                  if predicate(acc):
                      kept.append((list(vals), acc))
              return ReferenceGSS(kept)

          def merge(self, other: ReferenceGSS[T, Acc]) -> ReferenceGSS[T, Acc]:
              # The __post_init__ of ReferenceGSS handles merging of duplicate stacks.
              return ReferenceGSS(self._stacks + other._stacks)

          def peek(self) -> Set[T]:
              # Return all top values across non-empty stacks
              tops: Set[T] = set()
              for vals, _ in self._stacks:
                  if vals:
                      tops.add(vals[-1])
              return tops

          def reduce_acc(self) -> Optional[Acc]:
              # Reduce all accumulators into a single Acc (or None if no stacks)
              if not self._stacks:
                  return None
              accs = [acc for _, acc in self._stacks]
              return reduce(lambda a, b: a.merge(b), accs)

          def to_reference_impl(self) -> 'ReferenceGSS[T, Acc]':
              """Returns a canonical ReferenceGSS. Since this implementation is always canonical, this returns a copy."""
              return ReferenceGSS(self._stacks)

          def _get_canonical_sorted_stacks(self) -> List[Tuple[List[T], Acc]]:
              """Helper to sort stacks for deterministic representations."""
              # With __post_init__ merging, self is always canonical. We just need to
              # sort for deterministic output.
              items = self._stacks[:] # Create a shallow copy to sort in-place

              def _encode_for_sort(obj: Any) -> str:
                  try:
                      return json.dumps(obj, sort_keys=True, default=repr, separators=(",", ":"))
                  except Exception:
                      return repr(obj)

              items.sort(key=lambda pair: (_encode_for_sort(pair[0]), _encode_for_sort(pair[1])))
              return items

          def __str__(self) -> str:
              """Provides a human-readable, deterministic string representation."""
              items = self.to_stacks()
              if not items:
                  return f"{self.__class__.__name__}(empty)"

              lines = [f"{self.__class__.__name__}:"]
              for vals, acc in items:
                  lines.append(f"  - Stack: {vals}, Acc: {acc!r}")
              return "\n".join(lines)

          def __repr__(self) -> str:
              """Provides an unambiguous, deterministic string representation."""
              items = self.to_stacks()
              return f"{self.__class__.__name__}(_stacks={items!r})"

          def is_empty(self) -> bool:
              # True iff there are no active stacks.
              return not self._stacks

          def __eq__(self, other: object) -> bool:
              if not isinstance(other, ReferenceGSS):
                  return NotImplemented
              # Sort stacks to ensure comparison is order-independent.
              return self._get_canonical_sorted_stacks() == other._get_canonical_sorted_stacks()
      ```

