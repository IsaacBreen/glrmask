      ```python "python/gss_tester/benchmarks/runner.py"
      import argparse
      import importlib
      import json
      import sys
      from pathlib import Path
      from typing import Any, Dict, List
      from datetime import datetime
      import platform
      import socket

      from .instrumentation import TimingRecorder, GSSFactory
      from .workloads import PRESETS, WORKLOAD_FUNCS, WorkloadConfig


      def _filter_workloads(configs: List[WorkloadConfig], include: List[str], exclude: List[str]) -> List[WorkloadConfig]:
          if include:
              configs = [c for c in configs if any(p.lower() in c.name.lower() for p in include)]
          if exclude:
              configs = [c for c in configs if all(p.lower() not in c.name.lower() for p in exclude)]
          return configs


      def main():
          parser = argparse.ArgumentParser(description="Run GSS benchmark workloads for a given implementation.")
          parser.add_argument("implementation_module", help="Python module containing the GSS class (e.g., gss_tester.implementations.reference_impl)")
          parser.add_argument("implementation_class", help="Class name of the GSS implementation (e.g., ReferenceGSS)")
          parser.add_argument("-o", "--output", type=Path, required=True, help="Path to output JSON file for results.")
          parser.add_argument("--preset", choices=list(PRESETS.keys()), default="small", help="Workload size preset.")
          parser.add_argument("--include", nargs="*", default=[], help="Only run workloads whose names contain one of these substrings.")
          parser.add_argument("--exclude", nargs="*", default=[], help="Exclude workloads whose names contain one of these substrings.")
          parser.add_argument("--list", action="store_true", help="List workloads for the selected preset and exit.")
          args = parser.parse_args()

          # Load implementation
          try:
              module = importlib.import_module(args.implementation_module)
              gss_class = getattr(module, args.implementation_class)
          except (ImportError, AttributeError) as e:
              print(f"Error: Could not load GSS implementation. {e}", file=sys.stderr)
              sys.exit(1)

          # Build workload list based on preset
          preset_func = PRESETS[args.preset]
          workloads = preset_func()
          workloads = _filter_workloads(workloads, args.include, args.exclude)

          if args.list:
              print(f"Preset '{args.preset}' workloads ({len(workloads)}):")
              for cfg in workloads:
                  print(f"  - {cfg.name}: {cfg.params} (max_seconds={cfg.max_seconds})")
              return

          # Prepare output structure
          header = {
              "benchmark_version": 1,
              "timestamp": datetime.utcnow().isoformat() + "Z",
              "implementation": f"{args.implementation_module}.{args.implementation_class}",
              "preset": args.preset,
              "platform": {
                  "python": sys.version,
                  "system": platform.system(),
                  "release": platform.release(),
                  "machine": platform.machine(),
                  "hostname": socket.gethostname(),
              },
              "workloads": [],
          }

          # Run workloads sequentially; errors are captured per workload.
          for cfg in workloads:
              print(f">>> Running workload '{cfg.name}' with params {cfg.params} (max {cfg.max_seconds}s)")
              # Fresh recorder per workload to get clean per-phase stats
              recorder = TimingRecorder()
              factory = GSSFactory(gss_class=gss_class, recorder=recorder)
              func = WORKLOAD_FUNCS.get(cfg.name)
              if func is None:
                  print(f"Warning: Unknown workload '{cfg.name}', skipping.")
                  continue

              try:
                  result = func(factory, cfg)
              except Exception as e:
                  # Shouldn't reach here; workloads already catch errors. But be resilient.
                  result = {
                      "workload": cfg.name,
                      "params": cfg.params,
                      "outcome": "error",
                      "error": f"{e.__class__.__name__}: {e}",
                  }
              header["workloads"].append(result)
              print(f"<<< Finished workload '{cfg.name}' outcome={result.get('outcome','ok')} in {result.get('wall_time_ns',0)/1e9:.3f}s")

          # Write JSON
          args.output.parent.mkdir(parents=True, exist_ok=True)
          with open(args.output, "w") as f:
              json.dump(header, f, indent=2)
          print(f"Benchmark results saved to {args.output}")


      if __name__ == "__main__":
          main()
      ```

      ```python "python/gss_tester/benchmarks/analyzer.py"
      import argparse
      import json
      from pathlib import Path
      from typing import Any, Dict, List, Tuple, Optional, DefaultDict
      from collections import defaultdict

      def load_results(files: List[Path]) -> List[Dict[str, Any]]:
          results = []
          for p in files:
              try:
                  data = json.loads(p.read_text())
                  # Basic validation
                  if "implementation" in data and "workloads" in data:
                      data["_source_file"] = str(p)
                      results.append(data)
                  else:
                      print(f"Warning: Skipping {p} (missing required keys).")
              except Exception as e:
                  print(f"Warning: Could not read {p}: {e}")
          return results


      def summarize(results: List[Dict[str, Any]], out_dir: Path, make_plots: bool = True):
          if not results:
              print("No results to analyze.")
              return

          # Group by workload name and implementation
          grouped: DefaultDict[str, Dict[str, List[Dict[str, Any]]]] = defaultdict(lambda: defaultdict(list))
          impls: set[str] = set()
          for doc in results:
              impl_name = doc["implementation"]
              impls.add(impl_name)
              for w in doc["workloads"]:
                  grouped[w["workload"]][impl_name].append(w)

          print("--- Benchmark Summary ---")
          print(f"Loaded {len(results)} result file(s) across {len(impls)} implementation(s).")
          for workload, impl_map in grouped.items():
              print(f"\nWorkload: {workload}")
              for impl, runs in impl_map.items():
                  ok = sum(1 for r in runs if r.get("outcome") == "ok")
                  aborted = sum(1 for r in runs if r.get("outcome") == "aborted")
                  errored = sum(1 for r in runs if r.get("outcome") == "error")
                  times = [r.get("wall_time_ns", 0)/1e9 for r in runs if r.get("outcome") in ("ok", "aborted")]
                  if times:
                      print(f"  - {impl}: {len(runs)} run(s), ok={ok}, aborted={aborted}, error={errored}, time range: {min(times):.3f}s..{max(times):.3f}s")
                  else:
                      print(f"  - {impl}: {len(runs)} run(s), ok={ok}, aborted={aborted}, error={errored}")

          # Try to plot scaling curves if matplotlib is available
          plots_dir = out_dir / "plots"
          plots_dir.mkdir(parents=True, exist_ok=True)
          try:
              import matplotlib.pyplot as plt
              import math

              # Helper to extract x (complexity) and y (phase times)
              def extract_xy(runs: List[Dict[str, Any]], workload: str) -> Tuple[List[float], Dict[str, List[float]]]:
                  xs: List[float] = []
                  phase_times: Dict[str, List[float]] = defaultdict(list)
                  for r in runs:
                      # Pick a heuristic complexity axis depending on workload
                      if workload in ("merge_surface_changes", "apply_prune"):
                          derived = r.get("derived", {})
                          x = float(derived.get("theoretical_nodes", 0))
                          if x <= 0:
                              x = float(derived.get("theoretical_leaves", 0))
                      elif workload in ("push_scaling", "merge_after_prefix_mutations", "pop_common_parent"):
                          derived = r.get("derived", {})
                          x = float(derived.get("hidden_prefix_depth", 0))
                          if x <= 0:
                              x = float(derived.get("siblings", 0))
                      else:
                          x = float(r.get("wall_time_ns", 0))
                      xs.append(x)
                      for phase in r.get("phases", []):
                          phase_times[phase["name"]].append(phase.get("elapsed_ns", 0)/1e9)
                  return xs, phase_times

              # For each workload, produce per-impl scaling plots
              for workload, impl_map in grouped.items():
                  plt.figure(figsize=(8, 5))
                  for impl, runs in impl_map.items():
                      xs, phase_times = extract_xy(runs, workload)
                      if not xs:
                          continue
                      # Sort by x
                      paired = list(zip(xs, *phase_times.values()))
                      paired.sort(key=lambda t: t[0])
                      xs_sorted = [t[0] for t in paired]
                      # Sum phases to get total per run
                      totals = [sum(t[1:]) for t in paired]
                      plt.plot(xs_sorted, totals, marker='o', label=impl.split(".")[-1])
                  plt.xlabel("Complexity (heuristic)")
                  plt.ylabel("Total time (s) [sum of phases]")
                  plt.title(f"Scaling: {workload}")
                  plt.legend()
                  plt.grid(True, alpha=0.3)
                  plt.tight_layout()
                  out_path = plots_dir / f"{workload}_scaling.png"
                  plt.savefig(out_path)
                  plt.close()
                  print(f"Saved plot: {out_path}")

                  # Per-phase stacked bars for the last run of each impl
                  plt.figure(figsize=(9, 5))
                  labels = []
                  bottoms = None
                  phases_order: List[str] = []
                  # Determine a union of phase names
                  union_phases = set()
                  for impl, runs in impl_map.items():
                      if not runs:
                          continue
                      for ph in runs[-1].get("phases", []):
                          union_phases.add(ph["name"])
                  phases_order = sorted(union_phases)
                  values_by_phase: Dict[str, List[float]] = {p: [] for p in phases_order}
                  for impl, runs in impl_map.items():
                      if not runs:
                          continue
                      labels.append(impl.split(".")[-1])
                      last = runs[-1]
                      phmap = {ph["name"]: ph.get("elapsed_ns", 0)/1e9 for ph in last.get("phases", [])}
                      for p in phases_order:
                          values_by_phase[p].append(phmap.get(p, 0.0))
                  import numpy as np
                  x = np.arange(len(labels))
                  width = 0.65
                  bottoms = np.zeros(len(labels))
                  for p in phases_order:
                      data = np.array(values_by_phase[p])
                      plt.bar(x, data, width, bottom=bottoms, label=p)
                      bottoms += data
                  plt.xticks(x, labels, rotation=45, ha="right")
                  plt.ylabel("Time (s)")
                  plt.title(f"Phase breakdown (last run): {workload}")
                  plt.legend()
                  plt.tight_layout()
                  out_path = plots_dir / f"{workload}_phase_breakdown.png"
                  plt.savefig(out_path)
                  plt.close()
                  print(f"Saved plot: {out_path}")

          except Exception as e:
              print(f"Note: Plotting skipped or failed ({e}). You can install matplotlib and numpy for plots.")


      def main():
          parser = argparse.ArgumentParser(description="Analyze benchmark JSON files and produce summaries/plots.")
          parser.add_argument("result_files", nargs="+", type=Path, help="Paths to benchmark JSON files.")
          parser.add_argument("-o", "--outdir", type=Path, default=Path("bench_analysis"), help="Output directory for analyses and plots.")
          args = parser.parse_args()

          args.outdir.mkdir(parents=True, exist_ok=True)
          docs = load_results(args.result_files)
          summarize(docs, args.outdir, make_plots=True)


      if __name__ == "__main__":
          main()
      ```

      ```shell "python/gss_tester/run_benches.sh"
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benches.sh
      #
      # Orchestrates running GSS benchmark workloads across one or more implementations,
      # saving JSON results, and producing comparative analyses and plots.
      #
      # Usage:
      #   ./gss_tester/run_benches.sh <preset> <impl1> [impl2 ...] [-- include/exclude args...]
      #
      # Examples:
      #   ./gss_tester/run_benches.sh tiny gss_tester.implementations.reference_impl.ReferenceGSS
      #   ./gss_tester/run_benches.sh small gss_tester.implementations.reference_impl.ReferenceGSS gss_tester.fast_impl.FastGSS
      #
      # Notes:
      #   - Each implementation is specified as 'module.ClassName' or a .py path.
      #   - You can pass additional args after implementations to filter workloads:
      #       --include push_scaling merge_surface_changes
      #       --exclude fuzz
      # ==============================================================================

      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      PYTHON_SRC_ROOT="${SCRIPT_DIR}/.."
      export PYTHONPATH="${PYTHON_SRC_ROOT}:${PYTHONPATH:-}"

      if [ "$#" -lt 2 ]; then
        echo "Usage: $0 <preset:{tiny|small|medium|large}> <impl1> [impl2 ...] [-- include/exclude args...]"
        exit 1
      fi

      PRESET="$1"
      shift

      # Collect implementations until we see a flag starting with '--' or we run out.
      IMPLS=()
      EXTRA_ARGS=()
      while (( "$#" )); do
        if [[ "$1" == --* ]]; then
          EXTRA_ARGS=("$@")
          break
        else
          IMPLS+=("$1")
        fi
        shift
      done

      if [ "${#IMPLS[@]}" -eq 0 ]; then
        echo "Error: No implementations provided."
        exit 1
      fi

      RESULTS_DIR="gss_bench_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "---"
      echo "Preset: $PRESET"
      echo "Implementations: ${IMPLS[*]}"
      if [ "${#EXTRA_ARGS[@]}" -gt 0 ]; then
        echo "Extra args to runner: ${EXTRA_ARGS[*]}"
      fi
      echo "---"

      for full_impl_path in "${IMPLS[@]}"; do
        echo
        echo ">>> Running benches for: $full_impl_path"

        if [[ "$full_impl_path" == *.py ]]; then
          module_name=$(echo "$full_impl_path" | sed -e 's#^.*python/##' -e 's#\(\.py\)*$##' -e 's#/#.#g')
          base_name=$(basename "$full_impl_path" | sed 's#\(\.py\)*$##')
          class_name_base=$(echo "$base_name" | sed 's/_impl$//')
          class_name="$(tr '[:lower:]' '[:upper:]' <<< "${class_name_base:0:1}")${class_name_base:1}GSS"
          full_impl_name="${module_name}.${class_name}"
        else
          full_impl_name="$full_impl_path"
          module_name="${full_impl_name%.*}"
          class_name="${full_impl_name##*.}"
        fi

        output_file="${RESULTS_DIR}/${full_impl_name}.json"
        cmd=(python -m gss_tester.benchmarks.runner
            "$module_name"
            "$class_name"
            --preset "$PRESET"
            --output "$output_file"
            "${EXTRA_ARGS[@]}"
        )
        echo "${cmd[*]}"
        if "${cmd[@]}"; then
            echo ">>> Finished benches for: $full_impl_path"
        else
            exit_code=$?
            if [ $exit_code -eq 130 ]; then
                echo
                echo ">>> Bench for $full_impl_path interrupted. Skipping."
            else
                echo
                echo ">>> Bench for $full_impl_path failed with exit code $exit_code. Skipping."
            fi
        fi
      done

      echo
      echo "All benchmark runs completed."
      echo "---"

      # Analyze and plot
      echo "Analyzing results..."
      cmd=(python -m gss_tester.benchmarks.analyzer
          "${RESULTS_DIR}"/*.json
          --outdir "${RESULTS_DIR}/analysis")
      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Benchmark analysis complete."
      echo "Summary printed above. Plots saved to: ${RESULTS_DIR}/analysis/plots"
      echo "Full JSON results are in: $RESULTS_DIR"
