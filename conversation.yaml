          -   In the `LabelShapeKey` struct, remove the `final_fp` field and change the types of `exceptions` and `defaults` to not include `step_id`s. The key should only reflect the abstract structure.
          -   Update the `label_shape_for_keys` function to populate this new, coarser key.

      2.  **Refactor the transition discovery loop:**
          -   Inside the `while let Some(idx) = work.pop_front()` loop, replace the entire block of logic for computing transitions (from the definition of `def_groups` to the end of the `for (label, map) in target_maps` loop).
