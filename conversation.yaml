              Self { inner: greedy_group(expr.inner) }
          }

          #[staticmethod]
          fn non_greedy_group(expr: PyRegexExpr) -> Self {
              Self { inner: non_greedy_group(expr.inner) }
          }
      }

      #[pyclass]
