              all_internal_llm_tokens_bitset = RangeSet.from_ranges(all_internal.to_ranges())

              # print(possible_matches_cache)

              model = Model(
                  arena=arena,
                  roots_map=roots_map,
                  max_depth=max_depth,
                  parser_table=parser_table,
                  glr_parser=glr_parser,
                  reverse_state_map=reverse_state_map,
