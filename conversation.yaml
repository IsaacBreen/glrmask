              for uid, node in arena.items():
                  node_idx = int(uid)
                  value = node.get("value") or {}
                  is_end = bool(value.get("end", False))
                  max_depth = int(node.get("max_depth", 0) or 0)
                  self.max_depth[node_idx] = max_depth

                  pops: Dict[int, List[dict]] = defaultdict(list)

