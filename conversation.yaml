              let bv = HybridBitset::from_iter(0..10); // internal IDs 0-9
              let mut bimap = BiBTreeMap::new();
              let mut llm_map = BiBTreeMap::new();
              for i in 0..10 {
                  bimap.insert(100 + i, i);
