      | Composition     | $O(\|T_1\|\|T_2\|)$                                   | +         |
      | Intersection    | $O(\|A_1\|\|A_2\|)$                                   | +         |
      | Completion      | $O(\|A\| + \|\Sigma\|)$                               | +         |
