                              d: int = int(dest_idx)
                              if d in values:
                                  existing_gss = values[d]
                                  new_gss = child_gss
                                  merged_gss = existing_gss.merge(new_gss)
                                  values[d] = merged_gss
                              else:
                                  values[d] = child_gss
                              enqueue(max_depth[d], d)

