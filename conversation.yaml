        [Pop(0, 3), Pop(1, [ALL]), Pop(0, 4), Pop(0, [1, 4]), Pop(0, 4), Push(8), Push(6)]
        [Pop(0, 5), Push(6)]
      ```
      There SHOULD be something like
      ```
        [Pop(0, 3), Pop(1, [ALL]), Pop(0, 1), Pop(1, [ALL]), Pop(0, 4), Push(8), Push(6)]
      ```
      or
      ```
        [Pop(0, 3), Pop(1, 1), Pop(1, 4), Push(8), Push(6)]
