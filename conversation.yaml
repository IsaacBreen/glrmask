      Note that the algorithm does not depend on the queue discipline used for $\mathcal{Q}$ and that the construction of the transitions leaving a state $p' = (q, x, y)$ of $T'$ only depends on $p'$ and not on the states and transitions previously constructed. Thus, the transitions of $T'$ can be naturally computed on-demand. Note also that the additive and multiplicative operations of the semiring are not used in the definition of the algorithm. Only $\overline{1}$, the identity element of $\otimes$, was used for the definition of the final weight of $f$. Thus, to a large extent, the algorithm is independent of the semiring $S$. In particular, the behavior of the algorithm is identical for two semirings having the same identity elements, such as for example the tropical and log semirings.

      The result of the synchronization algorithm may contain $\epsilon$-transitions even if the input contains none. An equivalent weighted transducer with no $\epsilon$-transitions can be computed from $T'$ using the general epsilon-removal algorithm described in a previous section [40]. Figure 14(c) illustrates the result of that algorithm when applied to the synchronized transducer of Figure 14(b). Since epsilon-removal does not shift input and output labels with respect to each other, the result of its application to $T'$ is also a synchronized transducer.

      Note that the synchronization algorithm does not produce any $\epsilon$-cycle if the original machine $T$ does not contain any. Thus, in that case, the computation of the $\epsilon$-closures in $T$ can be done in linear time [40] and the total time complexity of epsilon-removal is $O(|Q'|^2 + (T_\oplus + T_\otimes)|Q'||E'|)$. Also, on-demand synchronization can be combined with on-demand epsilon-removal to directly create synchronized transducers with no $\epsilon$-transition on-the-fly.

      A transducer $T$ is said to be *double-tape unambiguous*, if, when the input and output labels of a transition are treated as single pair label (input label, output label), no two accepting paths have the same label. A by-product of synchronization followed by epsilon-removal is that the resulting transducer is double-tape unambiguous. Note that the definition does not entail any requirement on the weights.

      > **Proposition 6.11.** Let $T$ be a synchronized transducer and assume that $T$ has no $\epsilon$-transition. Then, $T$ is double-tape unambiguous.

      # 7. Conclusion

      Table 2 summarizes some of the essential properties of the algorithms described in this chapter. There are of course many other algorithms related to weighted automata and transducers. But, those presented here constitute some of the core algorithms. Many other algorithms related to weighted automata can be derived either directly from these algorithms or as a combination.

      These algorithms are useful in a variety of applications including statistical language modeling [7], parsing [45, 44, 8], phonological rule compilation [29, 30, 49], speech recognition [38, 43, 48], speech synthesis [56, 6], image processing [2], bioinformatics [21, 9], sequence modeling and prediction [18], optical character recognition [14], and more generally any problem related to sequences and probabilistic models defined over sequences [33, 43]. An efficient implementation of these algorithms and several others, including an on-demand implementation when possible, is available from the FSM library (executables only) [47] and the OpenFst library (source and executables) [10].

      **Table 2:** Properties of several transducer algorithms. The second column indicates the time or space complexity of each algorithm, the third whether or not it admits a natural on-demand computation.

      | ALGORITHM       | COMPLEXITY                                           | ON-DEMAND |
      | :-------------- | :--------------------------------------------------- | :-------- |
      | Sum             | $O(\|T_1\| + \|T_2\|)$                               | +         |
      | Product         | $O(\|T_1\| + \|T_2\| + \|F_1\|\|I_2\|)$               | +         |
      | Closure         | $O(\|T\|)$                                           | +         |
      | Reversal        | $O(\|T\|)$                                           | -         |
      | Inversion       | $O(\|T\|)$                                           | +         |
      | Projection      | $O(\|T\|)$                                           | +         |
      | Composition     | $O(\|T_1\|\|T_2\|)$                                   | +         |
      | Intersection    | $O(\|A_1\|\|A_2\|)$                                   | +         |
      | Completion      | $O(\|A\| + \|\Sigma\|)$                               | +         |
      | Complementation$^a$ | $O(\|A\|)$                                           | +         |
      | Difference      | $O(\|A_1\|\|A_2\|)$                                   | +         |
      | Epsilon-removal$^b$ | $O(\|Q\|^2 + \|Q\|\|E\|)$                             | +         |
      | Determinization | exponential                                          | +         |
      | Minimization$^b$    | $O(\|E\|\log\|Q\|)$                                   | -         |
      | Synchronization$^c$ | $O((\|Q\|+\|E\|)(\|\Sigma\|^{d[T]} + \|\Delta\|^{d[T]}))$ | +         |
      <br>
      $^a$ For $A$ deterministic.
      <br>
      $^b$ For the tropical semiring.
      <br>
      $^c$ $d(T)$ denotes the maximum delay in an accepting path of $T$.

      ---
      [^1]: Thus, there can be two transitions from state $p$ to state $q$ with the same input and output label, and even the same weight. In practice, this is avoided by keeping only one such transition whose weight is the $\oplus$-sum of the weights of the original redundant transitions. We will denote by $\uplus$ the standard join operation of multisets as in $\{1,2\} \uplus \{1,3\} = \{1,1,2,3\}$.
      [^2]: Our definition of *regulated transducers* is more general that the standard one which assumes that transducers do not have cycles with input or output $\epsilon$ [54, 36, 52]. The usual definition leads to a simpler presentation but it rules out weighted transducers that are crucial in applications or that can be obtained as a a result of application of various algorithms.
      [^3]: The algorithm applies in fact more generally to any *closed semiring* as defined in [41], which, unlike the definition given by [17], does not require idempotence. Note that the earlier definition of closed semirings given by Aho et al. [1] is not axiomatically correct (see [37, 26]). Any complete semiring is a closed semiring.
      [^4]: Thus, with the terminology of [20], it is a *complete starsemiring*. All complete starsemirings are Conway semirings [20].
      [^5]: Ésik and Kuich also gave a cubic-time algorithm for computing $M^*$ for all Conway semirings (see [20] for the definition), which include complete semirings [23].
      [^6]: See also [24, 20] for the related definition of *locally closed semirings*.
      [^7]: Our choice of a matrix notation as opposed to a functional notation is motivated by its convenience in applications.
      [^8]: Of course, when negation is defined, $A_1 \oplus (\ominus A_2)$ defined by $\forall x \in \Sigma^*, A_1 \oplus (\ominus A_2) = A_1(x) \oplus \ominus A_2(x)$ can be computed by applying the sum algorithm to $A_1$ and $\ominus A_2$. The semantics of the difference operation considered here is different.
      [^9]: The results presented also hold in the case of closed semirings.
      [^10]: It is however limited to the cases where the result of epsilon-removal is determinizable, that is cases where the determinization algorithm terminates, which, as we shall see later, does not always hold in the weighted case.
      [^11]: The notion of twins property was originally introduced for unweighted finite-state transducers by [15, 16] and was shown to be decidable. Polynomial-time algorithms were later given to test this property for functional transducers in time $O(|Q|(|Q|^2 + |E|^2)|\Delta|)$ by [58], $O(|Q|^4(|Q|^2 + |E|^2))$ by [11], and $O(|Q|^2(|Q|^2 + |E|^2))$ by [3], where $Q$ is the set of states of the input transducer, $E$ the set of its transitions and $\Delta$ the output alphabet.
      [^12]: An automaton is cycle-unambiguous if for any state $q$ and any string $x$ there exists at most one cycle at $q$ labeled with $x$.

