          @classmethod
          def merge_many(cls: Type["LeveledPerAccGSS[T, Acc]"], gss_list: Iterable["LeveledPerAccGSS[T, Acc]"]) -> "LeveledPerAccGSS[T, Acc]":
              result: Dict[Acc, LeveledGSS[T, _UnitAcc]] = {}
              for g in gss_list:
