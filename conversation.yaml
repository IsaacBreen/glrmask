                  bucket = todo.get(depth_val)
                  if bucket is None:
                      todo[depth_val] = {node_idx}
                      heappush(depth_heap, depth_val)
                  else:
                      bucket.add(node_idx)

              while True:
                  # Pop the smallest depth bucket (skip stale heap entries)
                  node_indices: Optional[Set[int]] = None
                  while depth_heap:
