          *   `to_json()`: Will iterate through the sorted `u8` values in the set, identify contiguous ranges, and serialize them as `JSONNode::Array(vec![JSONNode::UInt(start), JSONNode::UInt(end)])`. Single, non-contiguous numbers will be serialized as `JSONNode::UInt(value)`. The result will be a `JSONNode::Array` containing these mixed types.
          *   `from_json()`: Will expect a `JSONNode::Array`. It will iterate through its elements. If an element is a `JSONNode::UInt`, it's treated as a single `u8` value. If an element is a `JSONNode::Array` of two `JSONNode::UInt`s, it's treated as a `[start, end]` range.

