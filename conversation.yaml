      Divide a stack into runs of negative/positive pops.
      To eliminate negative pops, consider one negative/positive run pair at a time. Negative on the left, positive on the right, always.
      Positive pops and checks basically correspond to checking a stack, whereas negative pops and check correspond to pushing items *onto* the stack.
      Basically, we try to 'cancel out' the negative and positive pops.
      I'll explain by example. I'll try to cover all important cases.

      Suppose we have a run like this:
      - pop -1 check b
      - pop -1 check c
      - pop 1 check c
      - pop 1 check b
      - pop 1 check a
      We look at the interface. Here's that's
      - pop -1 check c
      - pop 1 check c
      These match, so they cancel out. Now we have
      - pop -1 check b
      - pop 1 check b
      - pop 1 check a
      We do the same with the check b items. Now we have just
      - pop 1 check a
      And that's it for this run!

      Suppose we have a run like this:
      - pop -1 check b
      - pop -1 check c
      - pop 1 check c
      This simplifies to
      - pop -1 check b
      That's a negative pop. So, this run will get tacked onto the subsequent negative pop run.

      Suppose we have a run like this:
      - pop -1 check c
      - pop 1 check c
      This simplifies to an empty stack

      Suppose we have a run like this:
      - pop -3 check b
      - pop 1 check c
      This simplifies to
      - pop -2 check b
      Which gets tacked on, again. Note the -2. We pop -3 then pop 1, so the remainder is -2.

      Similarly...
      Suppose we have a run like this:
      - pop -1 check a
      - pop -3 check b
      - pop 1 check c
      This simplifies to
      - pop -1 check a
      - pop -2 check b

      Suppose we have a run like this:
      - pop -1 check a
      - pop -1 check b
      - pop -1 check c
      - pop 2 check b
      This simplifies down to
      - pop -1 check a
      The gap here - that c isn't checked - is the **positive** stack saying 'whatever you had here, it matches, do don't worry about it, I don't care'.

      Suppose we have a run like this:
      - pop -2 check b
      - pop 1 check c
      - pop 1 check b
      - pop 1 check a
      This simplifies down to
      - pop 1 check a
      The gap here - that c isn't checked - is the **negative** stack saying 'whatever you had here, it matches, do don't worry about it, I don't care'.

      Suppose we have a run like this:
      - pop -1 check b
      - pop 1 check c
      This is a mismatch. **This stack gets eliminated entirely.**
      Not just the run pair - the whole stack.


      A consequence of this is that negative pops at the end of the stack can't be eliminated. That's ok.
      Have two functions: one that eliminates internal pops, and one that just removes those pops at the end. `eliminate_negative_pops` can call them both.


      In fact, the logic is similar to `realized_actions`.


      I guess you could characterize the logic like this:
      - Separate the negative and positive run stacks.
      - Convert the negative run pop numbers into positive ones.
      - Form the realized actions for each stack. Flip one of the stacks (the negative one, I think?) before realizing.
      - Check for mismatches. If any, eliminate the whole parent stack (not just this run pair).
      - Take the maximum pop number for each run stack individually (positive and negative).
      - Take the minimum of the two maximums.
      - Subtract this from every pop in both stacks.
      - Eliminate any items with negative pops. And any with pop zero.
      - These are the remaining actions. Either one is empty or the other or both.
      - Insert the remainder back into the parent.


      The positive stack says 'this is what we need to have'.
      The negative stack says 'this is what we have'.


      In reality, we don't just a single value is equal. What we *actually* do is *intersections*.
      ie the user will pass an intersection closure, and that'll be used to merge items.
      The intersection closure can return `None` to indicate a null intersection - equivalent to an inequality above, or a total mismatch.


      How do we rewrite the logic with this in mind?
      - Separate the negative and positive run stacks.
      - Convert the negative run pop numbers into positive ones.
      - Form the realized actions for each stack. Flip one of the stacks (the negative one, I think?) before realizing.
      - Check for mismatches by taking pairwise intersections. If any, eliminate the whole parent stack (not just this run pair).
          - The new check values beceome the intersection.
      - Take the maximum pop number for each run stack individually (positive and negative).
      - Take the minimum of the two maximums.
      - Subtract this from every pop in both stacks.
      - Eliminate any items with negative pops. And any with pop zero.
      - These are the remaining actions. Either one is empty or the other or both.
      - Insert the remainder back into the parent.
