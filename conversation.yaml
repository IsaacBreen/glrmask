                  let symt = Arc::new(SymbolTable::new());
                  fst.set_input_symbols(Arc::clone(&symt));
                  fst.set_output_symbols(Arc::clone(&symt));

                  optimize(&mut fst).unwrap();

                  assert!(fst.input_symbols().is_some());
                  assert!(fst.output_symbols().is_some());
              }
          }
