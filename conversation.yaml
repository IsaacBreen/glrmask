              assert_eq!(&d1 & &d3, d1); // Empty & NonEmpty = Empty
              assert_eq!(&d3 & &d1, d1);
              assert_eq!(&d1 | &d3, d3); // Empty | NonEmpty = NonEmpty
              assert_eq!(&d3 | &d1, d3);
              assert_eq!(&d1 ^ &d3, d3); // Empty ^ NonEmpty = NonEmpty
              assert_eq!(&d3 ^ &d1, d3);
              assert_eq!(&d1 - &d3, d1); // Empty - NonEmpty = Empty
              assert_eq!(&d3 - &d1, d3); // NonEmpty - Empty = NonEmpty

