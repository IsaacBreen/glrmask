              if node.empty is not None:
                  accs.add(node.empty)
              for child in all_children:
                  ic: Interface[T, Acc] = child  # type: ignore[assignment]
                  accs.add(ic.acc)
                  if ic.empty is not None:
                      accs.add(ic.empty)

