          #[test]
          fn test_grammar_from_exprs_very_simple() {
              let exprs = vec![
                  (
                      "E".to_string(),
                      regex(eat_u8(b'a')),
                  ),
              ];

              let grammar = Grammar::from_exprs(exprs.clone());
              dbg!(&grammar);

