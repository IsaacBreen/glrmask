              let diff = &set_a - &set_b;
              let diff_with_inverted = &set_a & &set_b.inverted();

              let expected_diff = HybridBitset::from_iter(vec![1, 10]);

              assert_eq!(diff, expected_diff);
              assert_eq!(diff_with_inverted, expected_diff);
          }
      }

