                  *bv -= llm_tokens;
              } else {
                  new_acc = Some(LLMTokenBV::max_ones() - llm_tokens.clone());
              }
              if new_acc.as_ref().is_none_or(|bv| !bv.is_empty()) {
                  Some((new_acc, true)) // Keep node, continue recursion
              } else {
                  None // Prune this node
              }
          };
