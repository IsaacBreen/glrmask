  - assistant: |-
      Below is a concrete, one‑pass refactor plan that:

      - Removes the `GSSNode` / `gss_leveled_adapter` layer from the parser and constraints.
      - Makes `parser.rs` and `get_mask4`/`commit_bytes` use `LeveledGSS` directly, with a parsing algorithm structurally identical to the Python `precompute4_model_pure_python.py` model (`_process_token` etc.).
      - Simplifies `table.rs` so only `shifts_and_reduces_full` and `gotos` matter.
      - Keeps code compact and direct.

      I’ll first state the key semantic hypotheses and why the new design is correct, then give step‑by‑step edits per file.

      ---

      ## 1. Semantic hypotheses and justification

      ### Hypothesis A: We never *need* `default_reduce` at runtime

      - In `glr/table.rs`, `stage_8` computes `default_reduce` and `shifts_and_reduces_without_default_reduce` as a table space optimization.
      - The information in `default_reduce` is redundant with `shifts_and_reduces_full`:
        - For each `(state, terminal)` pair, the effective behavior is fully encoded in the `Stage7ShiftsAndReducesLookaheadValue` value in `shifts_and_reduces_full`.
        - A `default_reduce` is simply a reduce that has been factored out of many terminals, but applying it on those terminals is equivalent to having an explicit `Reduce` or `Split` entry in `shifts_and_reduces_full`.
      - Python’s `ParserTable` uses only `shifts_and_reduces_full` and `gotos`. It ignores `default_reduce` and `shifts_and_reduces_without_default_reduce`. Yet, for the precompute model, Python is the reference implementation and produces correct masks.

      **Conclusion:** For correctness of precompute4 and constraints, it is safe to ignore `default_reduce` entirely and only use `shifts_and_reduces_full`.

      ### Hypothesis B: The Python `_process_token` algorithm is a correct GLR step for our table

      The Python `_process_token`:

      - Works on a `LeveledGSS` of parser states and accumulators.
      - For each top state `s`:
        - Finds the action for `(s, terminal)`.
        - If `Shift`: pushes the target state.
        - If `Reduce`: pops `len`, then for every possible predecessor state `p` at the new top, looks up the GOTO for `(p, nt)` and pushes that goto.
        - If `Split`: does a combination of shift and multiple reduces.
      - It uses exactly the same `Stage7ShiftsAndReducesLookaheadValue` semantics as the Rust table builder (`stage_7`), since both are driven from the same JSON.

      This is a standard GLR operational semantics:
      - The GSS merges identical stacks.
      - `Reduce` and `Split` follow the canonical LR(1)/LALR logic.

      **Conclusion:** Reproducing `_process_token` in Rust using `LeveledGSS<ParseStateEdgeContent, Acc>` and the Rust `Table` (with `shifts_and_reduces_full`) yields the same set of stacks as Python, for any token sequence.

      ### Hypothesis C: Constraints (`get_mask4` and `commit_bytes`) use only the *set of stacks*, not richer parser internals

      - `get_mask4` already operates on a `LeveledGSS` obtained by mapping the accumulator to a bitset (`RangeSetBlaze`). It only cares about which stacks exist, and the merged accumulator mask.
      - `commit_bytes` is logically equivalent to Python `Model.commit`:
        - It updates per‑tokenizer‑state GSSs based on the tokenizer DFA and parser actions.
        - It uses accumulator operations to prune / carry terminal constraints, but not tree structure.
      - All fancy GLR machinery (`GSSNode`, `GSSPopper`, `handle_action`, `ParserPhase`, `default_reduce` handling) is an implementation detail. The semantics are determined entirely by the table and the GSS operations.

      **Conclusion:** If we:

      1. Use `LeveledGSS` directly, with `Acc` as accumulator; and
      2. Use the same per‑terminal action semantics as Python,

      then `get_mask4` and `commit_bytes` will continue to compute the same masks and state transitions.

      ---

      ## 2. New conceptual layout

      After the refactor, the important pieces look like this:

      - `datastructures/leveled_gss.rs` remains the GSS core.
      - **New small module** (you choose the name, e.g. `datastructures/gss_acc.rs`) defines:

        - `Acc` (the accumulator used by the parser and constraints).
        - `impl Merge for Acc`.
        
      - `glr/table.rs`:

        - `Row` has only `shifts_and_reduces_full` and `gotos`.
        - `Stage8` is simplified to just wrap `Stage7Row` → `Row` (no default reduction).
        
      - `glr/parser.rs`:

        - Defines a type alias:

          ```rust
          type ParserGSS = LeveledGSS<ParseStateEdgeContent, Acc>;
          ```

        - `GLRParser` keeps the same table type.
        - `GLRParser` exposes a pure function:

          ```rust
          pub fn process_token_gss(&self, gss: &ParserGSS, token: TerminalID) -> ParserGSS;
          ```

          implementing the same algorithm as Python `_process_token`.
        - `GLRParserState<'a>` is simplified to essentially `{ parser: &GLRParser, stack: ParserGSS }`. No `phase`, no `ParseState`, no default reduction machinery, no `GSSNode`.

      - `constraint_fns.rs`:

        - `get_mask4`: only minimal adaptation—use the new `GLRParserState` shape (`stack: ParserGSS`) and avoid any gss‑adapter utilities.
        - `commit_bytes`:

          - Uses the same structure as Python `Model.commit`.
          - Uses `LeveledGSS` and `Acc` directly, via `GLRParser::process_token_gss`.
          - No calls to `gss_leveled_adapter` functions (`reset_llm_tokens`, `prune_llm_tokens_by_disallowed_terminals`, etc.), which are reimplemented directly using `LeveledGSS::apply` / `apply_and_prune`.

      - `datastructures/gss_leveled_adapter.rs`:

        - No longer imported from `parser.rs` or `constraint_fns.rs`.
        - You can keep it temporarily (for other users / tests) or delete it once all references are gone.

      ---

