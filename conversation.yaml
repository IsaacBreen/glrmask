      use std::collections::{BTreeMap, HashMap, HashSet};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::{Trie, Trie2Index};

      /// Contract unary chains where a node U has exactly one incoming edge and one outgoing edge,
      /// both under the same (pop, LLMTokenBV) key, U is not an end node or a root, and the outgoing
      /// edge maps to exactly one destination. The rewrite composes SIDs as intersection and rewires
      /// the predecessor P to the child V, deleting the P->U entry. This preserves semantics and is
      /// cycle-safe (may reduce multi-node cycles to a self-loop with intersected SIDs).
      pub fn compress_unary_chains_trie3(
          roots: &BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
      ) {
          crate::debug!(2, "Contracting unary chains in Trie3...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          let roots_set: HashSet<PrecomputeNode3Index> = roots.values().cloned().collect();

          // Iterate a few times until no more rewrites are possible.
          let mut total_rewired = 0usize;
          let max_outer_iters = 8usize;
          for _iter in 0..max_outer_iters {
              // Build indegree counts and track unique predecessor + edge-key for nodes with indegree == 1.
              let mut indegree: HashMap<PrecomputeNode3Index, usize> = HashMap::new();
              let mut unique_parent: HashMap<
                  PrecomputeNode3Index,
                  (PrecomputeNode3Index, (isize, LLMTokenBV)),
              > = HashMap::new();

              for src in &all_nodes {
                  if let Some(g) = src.read(trie3_god) {
                      for (ek, dm) in g.children() {
                          for (dst, _sid) in dm {
                              let cnt = indegree.entry(*dst).or_insert(0);
                              *cnt += 1;
                              if *cnt == 1 {
                                  unique_parent.insert(*dst, (*src, ek.clone()));
                              } else {
                                  // More than one distinct incoming, not a unique-predecessor case.
                                  unique_parent.remove(dst);
                              }
                          }
                      }
                  }
              }

              // For outdegree, record nodes that have exactly one outgoing destination overall
              // (across all keys combined) and are not end nodes; also capture that single edge.
              let mut out_info: HashMap<
                  PrecomputeNode3Index,
                  ((isize, LLMTokenBV), PrecomputeNode3Index, StateIDBV),
              > = HashMap::new();

              for u in &all_nodes {
                  if let Some(g) = u.read(trie3_god) {
                      if g.value.end {
                          continue; // Don't contract through accept nodes.
                      }
                      let mut total_dests = 0usize;
                      let mut only_key: Option<(isize, LLMTokenBV)> = None;
                      let mut only_dst: Option<PrecomputeNode3Index> = None;
                      let mut only_sid: Option<StateIDBV> = None;

                      for (ek, dm) in g.children() {
                          for (dst, sid) in dm {
                              total_dests += 1;
                              if total_dests == 1 {
                                  only_key = Some(ek.clone());
                                  only_dst = Some(*dst);
                                  only_sid = Some(sid.clone());
                              }
                          }
                      }
                      if total_dests == 1 {
                          out_info.insert(*u, (only_key.unwrap(), only_dst.unwrap(), only_sid.unwrap()));
                      }
                  }
              }

              // Find candidates: nodes with indegree==1, outdegree==1, not roots, and matching keys on both sides.
              let mut rewired_this_iter = 0usize;
              for u in &all_nodes {
                  let u_idx = *u;
                  if roots_set.contains(&u_idx) {
                      continue; // Never rewire through a root.
                  }
                  let Some((out_key, v_idx, s_uv)) = out_info.get(&u_idx).cloned() else { continue };
                  let Some((p_idx, in_key)) = unique_parent.get(&u_idx).cloned() else { continue };
                  if p_idx == u_idx {
                      continue; // Avoid attempting to rewire a pure self-loop through itself.
                  }
                  // Only contract if the incoming and outgoing (pop, LLMTokenBV) keys match exactly.
                  if in_key != out_key {
                      continue;
                  }

                  // Perform the rewrite: in parent P, remove the U mapping under in_key,
                  // and add/union V mapping with SIDs intersection S(P->U) ∧ S(U->V).
                  if let Some(mut pw) = p_idx.write(trie3_god) {
                      let (pop, llm) = in_key.clone();
                      if let Some(dm) = pw.children_mut().get_mut(&(pop, llm.clone())) {
                          if let Some(s_pu_actual) = dm.remove(&u_idx) {
                              let s_comp = &s_pu_actual & &s_uv;
                              if !s_comp.is_empty() {
                                  dm.entry(v_idx)
                                      .and_modify(|e| *e |= &s_comp)
                                      .or_insert(s_comp);
                              }
                              if dm.is_empty() {
                                  pw.children_mut().remove(&(pop, llm.clone()));
                              }
                              // Recompute live tokens as union of outgoing LLM masks for robustness.
                              let mut new_live = LLMTokenBV::zeros();
                              for ((_, llm_bv), _) in pw.children() {
                                  new_live |= llm_bv;
                              }
                              pw.value.live_tokens = new_live;
                              rewired_this_iter += 1;
                          }
                      }
                  }
              }

              total_rewired += rewired_this_iter;
              if rewired_this_iter == 0 {
                  break;
              }
          }

          crate::debug!(2, "Unary-chain contraction rewired {} edges.", total_rewired);
      }
    src/trie3_opt/passes/full/compress.rs: |
      use std::collections::{BTreeMap, HashMap};

      use ordered_hash_map::OrderedHashMap;

      use crate::constraint::{LLMTokenBV, PrecomputeNode3Index, StateIDBV, Trie3GodWrapper};
      use crate::datastructures::EntryApi;
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::profiler::PROGRESS_BAR_ENABLED;

      /// Compress edges by grouping identical destination maps (for a given pop) and unioning token masks.
      /// Adopt the rewrite only if a local cost metric improves.
      pub fn compress_trie3_edges(
          roots: &mut BTreeMap<crate::tokenizer::TokenizerStateID, PrecomputeNode3Index>,
          trie3_god: &Trie3GodWrapper,
          max_llm_token_id: usize,
          max_state_id: usize,
      ) {
          crate::debug!(2, "Compressing Trie3 edges (group identical dest-maps and union token masks)...");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie3_god, &roots_vec);
          if all_nodes.is_empty() {
              return;
          }

          #[cfg(not(rustrover))]
          let it = kdam::tqdm!(
              all_nodes.iter(),
              desc = "Trie3 Compress Edges (cost-aware)",
              total = all_nodes.len(),
              disable = !PROGRESS_BAR_ENABLED,
              leave = true
          );
          #[cfg(rustrover)]
          let it = all_nodes.iter();
          for node_idx in it {
              let mut w = node_idx.write(trie3_god).expect("write");
              if w.children().is_empty() {
                  continue;
              }

              // Work from a snapshot so we can compute both old/new costs and adopt only if better.
              let old_snapshot = w.children().clone();

              // Local helpers for bounded range-count and cost metric
              #[inline]
              fn ranges_len_bounded(m: &LLMTokenBV, max_id: usize) -> usize {
                  let mut c = m.clone();
                  c.constrain(max_id);
                  c.inner().ranges_len()
              }
              use std::collections::BTreeMap as BTM;
              #[inline]
              fn children_cost(
                  children: &BTM<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>>,
                  max_llm_token_id: usize,
              ) -> (usize, usize, usize) {
                  let mut ranges_sum = 0usize;
                  let mut dests_sum = 0usize;
                  for ((_, l), dm) in children {
                      ranges_sum += ranges_len_bounded(l, max_llm_token_id);
                      dests_sum += dm.len();
                  }
                  (ranges_sum + dests_sum, ranges_sum, dests_sum)
              }

              // Compute old cost
              let old_cost = children_cost(&old_snapshot, max_llm_token_id).0;

              // First stage: group by (pop, canonicalized dest-map), unioning L masks for identical dest-maps.
              use std::collections::HashMap as HM;
              let mut by_pop: BTM<isize, HM<Vec<(Trie2Index, StateIDBV)>, LLMTokenBV>> = BTM::new();
              for ((pop, llm_bv_orig), dest_map_orig) in &old_snapshot {
                  // Constrain token bitset to bound and skip empties.
                  let mut llm_bv = llm_bv_orig.clone();
                  llm_bv.constrain(max_llm_token_id);
                  if llm_bv.is_empty() {
                      continue;
                  }

                  // Aggregate destinations by unioning SIDs and removing empties.
                  let mut dest_agg: BTM<Trie2Index, StateIDBV> = BTM::new();
                  for (dst, sids0) in dest_map_orig {
                      let mut sids = sids0.clone();
                      sids.constrain(max_state_id);
                      if sids.is_empty() {
                          continue;
                      }
                      dest_agg
                          .entry(*dst)
                          .and_modify(|e| *e |= &sids)
                          .or_insert(sids);
                  }
                  if dest_agg.is_empty() {
                      continue;
                  }

                  // Canonical destination vector (sorted by dst) for use as a key.
                  let dest_vec: Vec<(Trie2Index, StateIDBV)> = dest_agg.into_iter().collect();

                  // Merge edges that have the same pop and identical destination map by unioning their LLM masks.
                  let entry = by_pop
                      .entry(*pop)
                      .or_default()
                      .entry(dest_vec)
                      .or_insert_with(LLMTokenBV::zeros);
                  *entry |= &llm_bv;
              }

              // Second stage: for each pop, combine groups that yield identical final L masks
              // by unioning their destination maps (one entry per (pop, llm_bv)).
              let mut new_children: BTM<(isize, LLMTokenBV), OrderedHashMap<Trie2Index, StateIDBV>> =
                  BTM::new();
              for (pop, groups) in by_pop {
                  // llm_bv -> aggregated destination map (as BTreeMap for determinism)
                  let mut out_by_llm: BTM<LLMTokenBV, BTM<Trie2Index, StateIDBV>> = BTM::new();

                  for (dest_vec, llm_bv) in groups {
                      if llm_bv.is_empty() {
                          continue;
                      }
                      let dest_out = out_by_llm.entry(llm_bv).or_insert_with(BTM::new);
                      for (dst, sids) in dest_vec {
                          dest_out
                              .entry(dst)
                              .and_modify(|e| *e |= &sids)
                              .or_insert(sids);
                      }
                  }

                  // Emit final edges: (pop, llm_bv) -> OrderedHashMap<dst, StateIDBV>
                  for (llm_bv, dest_btree) in out_by_llm {
                      if llm_bv.is_empty() {
                          continue;
                      }
                      let mut ordered_dm: OrderedHashMap<Trie2Index, StateIDBV> =
                          OrderedHashMap::new();
                      for (dst, sids) in dest_btree {
                          if !sids.is_empty() {
                              ordered_dm.insert(dst, sids);
                          }
                      }
                      if !ordered_dm.is_empty() {
                          let entry = new_children
                              .entry((pop, llm_bv))
                              .or_insert_with(OrderedHashMap::new);
                          for (dst, sids) in ordered_dm {
                              entry
                                  .entry(dst)
                                  .and_modify(|e| *e |= &sids)
                                  .or_insert(sids);
                          }
                      }
                  }
              }

              // Compare costs and adopt only if better.
              let new_cost = children_cost(&new_children, max_llm_token_id).0;
              if new_cost < old_cost {
                  let mut new_live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &new_children {
                      new_live |= llm_bv;
                  }
                  w.value.live_tokens = new_live;
                  *w.children_mut() = new_children;
              } else {
                  // Keep old structure; normalize live_tokens from old children.
                  let mut live = LLMTokenBV::zeros();
                  for ((_, llm_bv), _) in &old_snapshot {
                      live |= llm_bv;
                  }
                  w.value.live_tokens = live;
                  // w.children() already equals old_snapshot
              }
          }

          crate::debug!(2, "Finished compressing Trie3 edges.");
      }
