              assert_eq!(s_a1.acc, expected_merged_acc);

              assert_eq!(merged_pred.predecessors.len(), 2);
              assert!(merged_pred.predecessors.contains_key(&20));
              assert!(merged_pred.predecessors.contains_key(&40));
