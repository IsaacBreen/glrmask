         1. Iterates over all `TerminalID`s using `parser.terminal_map.right_values().cloned()`.
         2. For each terminal `t`, calls `compute_below_bottom_characterization(parser, t)`.
         3. Collects the results into a `BTreeMap<TerminalID, BelowBottomCharacterization>`.

      2. `collect_initial_actions`  
         This function is unchanged, both structurally and semantically. For each table row `(q0, row)`:

         1. If `A(q0, t) = Shift(q1)`, it inserts `(q0, q1)` into `initial_shifts`.
         2. If `A(q0, t) = Reduce{nonterminal_id = X, len = L, …}` with `L > 0`, it inserts `(q0, L-1, X)` into `initial_reduces`.
         3. If `A(q0, t) = Split{shift, reduces}`, it:
            1. If `shift = Some(q1)`, inserts `(q0, q1)` into `initial_shifts`.
            2. For each `(L, nts)` with `L > 0`, and each `(X, _) ∈ nts`, inserts `(q0, L-1, X)` into `initial_reduces`.

         The important detail: epsilon reductions (`len == 0`) are ignored, as before.

      3. `handle_reduce`  
         The helper `handle_reduce` is unchanged in logic:

         1. If `len == 1`:
            1. It looks up `G(q_revealed, reduce_nt)`.
            2. If `G(q_revealed, reduce_nt) = Some(q_next)`, and `q_next` is not in `visited`, it marks `q_next` visited and enqueues it in `worklist`.
         2. If `len > 1`:
            1. It records `(q_revealed, len - 2, reduce_nt)` in `reveal_and_rereduces`.
         3. If `len == 0`:
            1. It does nothing.

         This exactly matches the original behavior.

      4. `compute_below_bottom_characterization` except for how it obtains `reduce_characterizations`:
         1. It still computes `all_nts` from `parser.non_terminal_map.right_values().cloned().collect()`.
         2. It still calls `collect_initial_actions` to get `initial_shifts` and `initial_reduces`.
         3. It now calls our optimized `collect_reduce_characterizations` instead of the original version, but uses its result in the same way.
         4. It still logs the same debug string via `crate::debug!` with `result`’s `Display` output.

      The only semantic point to check is that the new `collect_reduce_characterizations` yields exactly the same mapping as the old version.


      #### 4. Old vs new `collect_reduce_characterizations`

      Let `T` be our fixed terminal ID.

      Define the set:

      \[
      G = \{ (q_{\text{revealed}}, X, q_{\text{goto}}) \mid 
             \text{for state } q_{\text{revealed}} \text{ and nonterminal } X, 
             G(q_{\text{revealed}}, X) = \text{Some}(q_{\text{goto}})\}.
      \]

      This is the set of all “goto edges” labeled by a nonterminal, with a defined target.

      ##### 4.1 Original algorithm

      Original `collect_reduce_characterizations` (paraphrased):

      1. For every nonterminal `X` in `all_nts`:
         1. Initialize `reduce_char_X` as an empty `ReduceCharacterization`.
         2. For every state `q_revealed` in `parser.table`:
            1. Look up `row.gotos.get(&X)`.
            2. If it returns a `goto` with `goto.state_id = Some(q_goto)`:
               1. Call `explore_from_goto(parser, T, q_revealed, q_goto, &mut reduce_char_X)`.
         3. If `reduce_char_X` is not empty, insert `X ↦ reduce_char_X` into `result`.

      Consequences:

      1. For each triple `(q_revealed, X, q_goto) ∈ G`, it calls `explore_from_goto(P, T, q_revealed, q_goto, reduce_char_X)`.
      2. For each triple not in `G`, it calls nothing.
      3. `reduce_char_X` is the union over all such calls of the sets added by `explore_from_goto`.
      4. If no calls were made (i.e., `X` is not in the domain of `G` or all gotos for `X` had `state_id = None`), `reduce_char_X` stays empty and is not inserted into the map.

      ##### 4.2 New algorithm

      New `collect_reduce_characterizations`:

      1. Initialize an empty map `result: BTreeMap<NonTerminalID, ReduceCharacterization>`.
      2. For each `(q_revealed, row)` in `parser.table`:
         1. For each `(&X, goto)` in `row.gotos`:
            1. If `goto.state_id = Some(q_goto)`:
               1. Get or insert `reduce_char_X = result.entry(X).or_insert_with(|| ReduceCharacterization::new(T, X))`.
               2. Call `explore_from_goto(parser, T, q_revealed, q_goto, reduce_char_X)`.
      3. After the loop, call `result.retain(|_, rc| !rc.is_empty())`.

      Consequences:

      1. For each triple `(q_revealed, X, q_goto) ∈ G`, there is exactly one corresponding iteration where `goto.state_id = Some(q_goto)`, and in that iteration we call `explore_from_goto(P, T, q_revealed, q_goto, reduce_char_X)`, with the same parameters as in the original version.
      2. Therefore the set of `explore_from_goto` calls is exactly the same multiset as before, just with nested loops reversed (first over states, then over gotos instead of first over nonterminals, then over states).
      3. Because `ReduceCharacterization` only stores results in `BTreeSet`s (set union is commutative and idempotent), the final content of each `reduce_char_X` depends only on the set of arguments passed to `explore_from_goto`, not on the order in which they are processed or interleaved.
      4. The `retain` call removes entries where `rc.is_empty()` is true. In the original version, such entries were never inserted. Thus in both versions, the domain of the resulting map is:
         1. exactly those nonterminals `X` for which there exists at least one `(q_revealed, X, q_goto) ∈ G` that yields at least one recorded shift or reduce via `explore_from_goto`.

      Therefore the new `collect_reduce_characterizations` produces a map that is mathematically identical to the original, but it does so in `O(|G|)` time instead of `O(|all_nts| · |Q|)`: it iterates only over existing goto edges.

      #### 5. Inlining `process_reduce_action` into `explore_from_goto`

      Original `explore_from_goto` (simplified):

      1. Initialize
         1. `visited = { start_state }`.
         2. `worklist = [ start_state ]`.
      2. While `worklist` is not empty:
         1. Pop `current_state`.
         2. Compute:
            1. `row = parser.table.get(&current_state)`.
            2. `action_opt = row.and_then(|r| r.shifts_and_reduces_full.get(&T))`.
         3. If `action_opt = Some(action)`:
            1. Call `process_reduce_action(parser, q_revealed, current_state, action, reduce_char, visited, worklist)`.

      `process_reduce_action` then pattern-matches on `action`:

      1. If `action = Shift(shift_state)`, insert `(q_revealed, current_state, shift_state)` into `reveal_goto_shift_escapes`.
      2. If `action = Reduce{nonterminal_id = Y, len = L, …}`, call `handle_reduce(parser, q_revealed, L, Y, visited, worklist, reduce_char)`.
      3. If `action = Split{shift, reduces}`:
         1. If `shift = Some(shift_state)`, record `(q_revealed, current_state, shift_state)` as above.
         2. For each `(L, nts)` and each `(Y, _) ∈ nts`, call `handle_reduce(parser, q_revealed, L, Y, visited, worklist, reduce_char)`.

      The new `explore_from_goto` simply moves that match directly into the body of the loop, using the same pattern and the same call to `handle_reduce`. The calls to `handle_reduce` and the insertion into `reveal_goto_shift_escapes` are byte-for-byte the same; thus, for any fixed worklist traversal, the observable side-effects on:

      1. `reveal_goto_shift_escapes`,
      2. `reveal_and_rereduces`,
      3. `visited` and `worklist`

      are identical.

      The only other tiny change is syntactic sugar:

      1. Instead of:

         ```rust
         let action_opt = parser
             .table
             .get(&current_state)
             .and_then(|row| row.shifts_and_reduces_full.get(&terminal_id));

         if let Some(action) = action_opt {
             // ...
         }
         ```

      2. We use Rust’s `let-else`:

         ```rust
         let Some(row) = parser.table.get(&current_state) else {
             continue;
         };
         let Some(action) = row.shifts_and_reduces_full.get(&terminal_id) else {
             continue;
         };
         ```

      Logical equivalence:

      1. If `parser.table.get(&current_state)` returns `None`, both versions do nothing for this `current_state` and continue to the next loop iteration.
      2. If it returns `Some(row)` but `row.shifts_and_reduces_full.get(&terminal_id)` returns `None`, both versions again skip.
      3. If both lookups succeed, we bind the same `action` and perform the same match.

      Thus the BFS traversal and the sets it computes are unchanged.

      #### 6. Displays and debug output

      The `Display` implementations for `ReduceCharacterization` and `BelowBottomCharacterization` are preserved, except for one tiny stylistic tweak:

      1. Where it previously used `write!(f, "{}", rc)?;`, it now uses `write!(f, "{rc}")?;`. This uses the same `Display` implementation for `rc` and is therefore identical in output.

      All printed text and field order remain the same, so any logs or debug output that relied on them remain consistent.


