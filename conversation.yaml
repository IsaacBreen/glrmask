      // src/precompute4/weighted_automata/simplification.rs
      //
      // Simplified structure with the same core passes and behavior:
      // - One core simplification loop parameterized for small/large DWAs.
      // - Helpers to normalize edges, prune unreachable, relax edge weights, and minimize via partition refinement.
      // - NWA simplification kept feature-complete with light refactoring for clarity.

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::{DWABody, DWAState, DWAStates, DWA};
      use super::nwa::{NWAState, NWAStates, NWA};
      use crate::precompute4::test_weighted_automata;
      use crate::precompute4::weighted_automata::NWAStateID;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use std::cell::Cell;
      use std::collections::{BTreeMap, HashMap, VecDeque};
      use std::time::Instant;

      /// For very large DWAs, we skip heavy fixpoint/minimization passes to guarantee fast simplification.
      /// This is semantics-preserving; it only reduces the amount of compression performed.
      const LARGE_AUTOMATON_THRESHOLD: usize = 20_000_000;

      thread_local! {
          static IN_SIMPLIFY_CHECK: Cell<bool> = Cell::new(false);
      }

      impl DWA {
          pub fn simplify(&mut self) {
              let is_checking = IN_SIMPLIFY_CHECK.with(|c| c.get());
              let before_simplify = if !is_checking && STOCHASTIC_DEBUG { Some(self.clone()) } else { None };

              Self::simplify_components(&mut self.states, &mut self.body);

              if let Some(before) = before_simplify {
                  IN_SIMPLIFY_CHECK.with(|c| c.set(true));
                  test_weighted_automata::stochastic_equivalence_test(before, self.clone());
                  IN_SIMPLIFY_CHECK.with(|c| c.set(false));
              }
          }

          pub fn simplify_components(states: &mut DWAStates, body: &mut DWABody) {
              let now = Instant::now();
              let initial_len = states.len();
              if states.0.is_empty() {
                  return;
              }
              let large = states.len() > LARGE_AUTOMATON_THRESHOLD;
              Self::simplify_core(states, body, large);
              crate::debug!(3, "DWA::simplify_components ({} states -> {} states) took: {:?}", initial_len, states.len(), now.elapsed());
          }

          fn simplify_core(states: &mut DWAStates, body: &mut DWABody, large: bool) {
              let max_passes: usize = if large { 2 } else { 50 };
              let pb = if PROGRESS_BAR_ENABLED {
                  let title = if large { "Simplifying DWA (large)" } else { "Simplifying DWA (small)" };
                  let p = ProgressBar::new(max_passes as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template(&("{spinner:.green} [".to_owned() + title + ": {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} passes ({msg})"))
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };

              // Initial normalize + prune
              if let Some(p) = &pb { p.set_message("normalize/prune".to_string()); }
              let _ = Self::normalize_edges_inplace(states);
              let _ = Self::prune_unreachable(states, body);

              let mut changed_any = true;
              let mut passes = 0usize;
              while changed_any && passes < max_passes {
                  passes += 1;
                  if let Some(p) = &pb { p.inc(1); }
                  changed_any = false;

                  if let Some(p) = &pb { p.set_message("normalize".to_string()); }
                  changed_any |= Self::normalize_edges_inplace(states);

                  if let Some(p) = &pb { p.set_message("absorb sink finals".to_string()); }
                  changed_any |= Self::absorb_sink_finals_into_incoming(states);

                  // Always relax first: this safely enlarges edge weights with ¬future(target),
                  // exposing more structural equality opportunities for minimization.
                  if let Some(p) = &pb { p.set_message("relax local future".to_string()); }
                  changed_any |= Self::relax_weights_by_local_future(states);

                  // For small automata, follow relaxation with a proper minimization pass.
                  if !large {
                      if let Some(p) = &pb { p.set_message("minimize".to_string()); }
                      changed_any |= Self::minimize_partition_refinement(states, body);
                  }

                  if let Some(p) = &pb { p.set_message("normalize".to_string()); }
                  changed_any |= Self::normalize_edges_inplace(states);

                  if let Some(p) = &pb { p.set_message("prune".to_string()); }
                  changed_any |= Self::prune_unreachable(states, body);
              }

              if let Some(p) = &pb {
                  p.finish_with_message(format!("Simplified to {} states", states.len()));
              }
          }

          pub fn propagate_and_constrain_weights(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              let mut reachable_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();

              if body.start_state >= n {
                  return false;
              }
              reachable_weights[body.start_state] = Weight::all();
              worklist.push_back(body.start_state);

              while let Some(u) = worklist.pop_front() {
                  let u_rw = reachable_weights[u].clone();
                  if u_rw.is_empty() {
                      continue;
                  }
                  let u_state = &states[u];

                  // State entry weight gates outgoing paths too
                  let gated_u_rw = if let Some(sw) = &u_state.state_weight {
                      &u_rw & sw
                  } else {
                      u_rw
                  };

                  for (_lbl, v, edge_w) in u_state.iter_edges() {
                      if v >= n { continue; }
                      let new_v_rw = &gated_u_rw & edge_w;
                      let old_v_rw = &reachable_weights[v];

                      if !new_v_rw.is_subset_of(old_v_rw) {
                          reachable_weights[v] |= &new_v_rw;
                          worklist.push_back(v);
                      }
                  }
              }

              // Now apply constraints
              let mut changed = false;
              for i in 0..n {
                  let old_fw = states[i].final_weight.clone();
                  if let Some(fw) = states[i].final_weight.as_mut() {
                      *fw &= &reachable_weights[i];
                      if fw.is_empty() {
                          states[i].final_weight = None;
                      }
                  }
                  if states[i].final_weight != old_fw {
                      changed = true;
                  }
              }
              changed
          }

          pub fn propagate_future_weights(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              // Reverse adjacency (unique preds)
              let mut rev_adj: Vec<Vec<StateID>> = vec![vec![]; n];
              for i in 0..n {
                  for (_lbl, v, _w) in states[i].iter_edges() {
                      if v < n { rev_adj[v].push(i); }
                  }
              }
              for preds in rev_adj.iter_mut() {
                  preds.sort_unstable();
                  preds.dedup();
              }

              let mut future_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();
              for i in 0..n {
                  if let Some(fw) = &states[i].final_weight {
                      if !fw.is_empty() {
                          future_weights[i] = fw.clone();
                          for &pred in &rev_adj[i] {
                              worklist.push_back(pred);
                          }
                      }
                  }
              }

              while let Some(u) = worklist.pop_front() {
                  let mut u_new_fw = states[u].final_weight.clone().unwrap_or_else(Weight::zeros);

                  if let Some(sw) = &states[u].state_weight {
                      u_new_fw |= sw;
                  }

                  for (_lbl, v, edge_w) in states[u].iter_edges() {
                      if v < n {
                          u_new_fw |= &(edge_w & &future_weights[v]);
                      }
                  }

                  if u_new_fw != future_weights[u] {
                      future_weights[u] = u_new_fw;
                      for &pred in &rev_adj[u] {
                          worklist.push_back(pred);
                      }
                  }
              }

              // Precompute complements to avoid recomputing !future_weights[v] many times
              let not_future: Vec<Weight> = future_weights.iter().map(|w| !w).collect();

              // 2. Update edge weights. An edge weight W can be relaxed to W | !future_weight(target)
              // because any bits not in future_weight(target) would be filtered out anyway.
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  // Default
                  if let Some(v) = st.transitions.default {
                      if v < n {
                          if let Some(w) = st.trans_weight_default.as_mut() {
                              let new_w = &*w | &not_future[v];
                              if new_w != *w {
                                  *w = new_w;
                                  any_weight_changed = true;
                              }
                          }
                      }
                  }
                  // Exceptions
                  let keys: Vec<i16> = st.transitions.exceptions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.exceptions.get(&ch) {
                          if v < n {
                              if let Some(w) = st.trans_weights_exceptions.get_mut(&ch) {
                                  let new_w = &*w | &not_future[v];
                                  if new_w != *w {
                                      *w = new_w;
                                      any_weight_changed = true;
                                  }
                              }
                          }
                      }
                  }
              }

              any_weight_changed
          }

          /// Fast, single-pass local relaxation:
          /// For each state v, compute an upper bound U[v] on future acceptance:
          ///     U[v] = (state_weight[v] if present else ALL) ∧ (final_weight[v] ∪ default_weight[v] ∪ ⋃ exception_weights[v])
          /// Then S[v] = ¬U[v] ⊆ ¬F[v], so for each edge u→v we can safely set weight(u→v) := weight(u→v) ∪ S[v].
          /// This preserves semantics and is O(E) per pass.
          pub fn relax_weights_by_local_future(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }
              // 1) Compute U[v] for all v
              let mut upper: Vec<Weight> = Vec::with_capacity(n);
              for i in 0..n {
                  let mut u = states[i].final_weight.clone().unwrap_or_else(Weight::zeros);
                  if let Some(w) = states[i].trans_weight_default.as_ref() {
                      u |= w;
                  }
                  for w in states[i].trans_weights_exceptions.values() {
                      u |= w;
                  }
                  if let Some(sw) = states[i].state_weight.as_ref() {
                      u &= sw;
                  }
                  upper.push(u);
              }
              // 2) Precompute complements S[v] = ¬U[v]
              let not_upper: Vec<Weight> = upper.iter().map(|w| !w).collect();
              // 3) Relax all edges using S[target]
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  if let Some(v) = st.transitions.default {
                      if let Some(w) = st.trans_weight_default.as_mut() {
                          let new_w = &*w | &not_upper[v];
                          if new_w != *w {
                              *w = new_w;
                              any_weight_changed = true;
                          }
                      }
                  }
                  let keys: Vec<i16> = st.transitions.exceptions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.exceptions.get(&ch) {
                          if let Some(w) = st.trans_weights_exceptions.get_mut(&ch) {
                              let new_w = &*w | &not_upper[v];
                              if new_w != *w {
                                  *w = new_w;
                                  any_weight_changed = true;
                              }
                          }
                      }
                  }
              }
              any_weight_changed
          }

          /// Absorb final weights of sink states (no outgoing edges) into incoming edges.
          /// For each sink v with final_weight F (non-empty, not ALL):
          ///   - For every incoming edge e: u -> v, set weight(e) := weight(e) ∧ F.
          ///   - Set final_weight[v] := ALL.
          /// This preserves semantics (any accepted word ending in v has its weight gated by F either way)
          /// and enables merging of multiple structurally identical sinks that previously differed only by final_weight.
          pub fn absorb_sink_finals_into_incoming(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }
              // Build reverse adjacency: for each target v, collect predecessors
              let mut def_preds: Vec<Vec<StateID>> = vec![Vec::new(); n];
              let mut ex_preds: Vec<Vec<(StateID, i16)>> = vec![Vec::new(); n];
              for p in 0..n {
                  if let Some(d) = states[p].transitions.default {
                      if d < n {
                          def_preds[d].push(p);
                      }
                  }
                  for (ch, &tgt) in states[p].transitions.exceptions.iter() {
                      if tgt < n {
                          ex_preds[tgt].push((p, *ch));
                      }
                  }
              }

              let mut changed = false;
              for v in 0..n {
                  // Sink = no outgoing edges (no default and no exceptions)
                  if states[v].transitions.default.is_some() || !states[v].transitions.exceptions.is_empty() {
                      continue;
                  }

                  // The effective weight is the intersection of final_weight and state_weight.
                  let mut effective_weight = Weight::all();
                  let mut has_restriction = false;

                  if let Some(fw) = &states[v].final_weight {
                      if !fw.is_all_fast() {
                          effective_weight &= fw;
                          has_restriction = true;
                      }
                  }
                  if let Some(sw) = &states[v].state_weight {
                      if !sw.is_all_fast() {
                          effective_weight &= sw;
                          has_restriction = true;
                      }
                  }

                  if !has_restriction {
                      continue;
                  }

                  // This transformation is only valid if there are incoming edges to absorb the weight.
                  if def_preds[v].is_empty() && ex_preds[v].is_empty() {
                      continue;
                  }

                  // Intersect incoming default edges
                  for &p in &def_preds[v] {
                      if let Some(w) = states[p].trans_weight_default.as_mut() {
                          let old_w = w.clone();
                          *w &= &effective_weight;
                          if *w != old_w {
                              changed = true;
                          }
                      }
                  }
                  // Intersect incoming exception edges
                  for &(p, ch) in &ex_preds[v] {
                      if let Some(w) = states[p].trans_weights_exceptions.get_mut(&ch) {
                          let old_w = w.clone();
                          *w &= &effective_weight;
                          if *w != old_w {
                              changed = true;
                          }
                      }
                  }
                  // Make the sink final weight ALL and clear state weight to enable merging
                  if states[v].final_weight.as_ref().map_or(false, |w| !w.is_all_fast()) {
                      states[v].final_weight = Some(Weight::all());
                      changed = true;
                  }
                  if states[v].state_weight.is_some() {
                      states[v].state_weight = None;
                      changed = true;
                  }
              }
              changed
          }

          pub fn normalize_edges_inplace(states: &mut DWAStates) -> bool {
              let mut changed = false;
              for st in &mut states.0 {
                  let before = st.transitions.exceptions.len();
                  if let Some(def) = st.transitions.default {
                      st.transitions.exceptions.retain(|_, &mut tgt| tgt != def);
                  }
                  changed |= st.transitions.exceptions.len() != before;

                  let before_w = st.trans_weights_exceptions.len();
                  st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  changed |= st.trans_weights_exceptions.len() != before_w;
              }
              changed
          }

          /// Partition-refinement minimization (structure-only), aggregating weights by union.
          pub fn minimize_partition_refinement(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.0.len();
              if n <= 1 {
                  return false;
              }

              // Initial partition by outputs (state_weight, final_weight).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<(Option<Weight>, Option<Weight>), usize> = HashMap::new();
              for i in 0..n {
                  let key = (states[i].state_weight.clone(), states[i].final_weight.clone());
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Refine until stable
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<(
                      Option<Weight>,
                      Option<Weight>,
                      Option<(usize, Weight)>,
                      Vec<(i16, (usize, Weight))>,
                  ), usize> = HashMap::new();

                  for i in 0..n {
                      let st = &states[i];
                      let def_sig = st.transitions.default.map(|d| {
                          (part[d], st.trans_weight_default.as_ref().cloned().unwrap_or_else(Weight::all))
                      });
                      let ex_sig: Vec<_> = st.transitions.exceptions.iter()
                          .map(|(ch, &tgt)| (*ch, (part[tgt], st.trans_weights_exceptions.get(ch).cloned().unwrap_or_else(Weight::all))))
                          .filter(|(_, (cls, w))| def_sig.as_ref().map_or(true, |(dc, dw)| *dc != *cls || dw != w))
                          .collect();
                      let sig = (st.state_weight.clone(), st.final_weight.clone(), def_sig, ex_sig);
                      let next_pid = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(next_pid);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Build groups
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Map partition id -> new state id
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<DWAState> = Vec::with_capacity(groups.len());

              for (pid, members) in &groups {
                  let rep = members[0];
                  let rep_state = &states[rep];
                  let def_cls = rep_state.transitions.default.map(|d| part[d]);

                  let mut st = DWAState::default();
                  st.state_weight = rep_state.state_weight.clone();
                  st.final_weight = rep_state.final_weight.clone();

                  // Structure: keep default if present, and exceptions that differ from default class
                  st.transitions.default = def_cls.map(|_| Some(0)).flatten();
                  for (ch, tgt) in &rep_state.transitions.exceptions {
                      let cls = part[*tgt];
                      if def_cls.map_or(true, |dc| dc != cls) {
                          st.transitions.exceptions.insert(*ch, 0);
                      }
                  }

                  // Aggregate weights (union) across members: default and per-label exceptions
                  if st.transitions.default.is_some() {
                      let mut agg_def: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weight_default.as_ref() {
                              if let Some(ref mut a) = agg_def { *a |= w; } else { agg_def = Some(w.clone()); }
                          }
                      }
                      st.trans_weight_default = agg_def;
                  }
                  for ch in st.transitions.exceptions.keys().cloned().collect::<Vec<_>>() {
                      let mut agg: Option<Weight> = None;
                      for &old in members {
                          if let Some(w) = states[old].trans_weights_exceptions.get(&ch) {
                              if let Some(ref mut a) = agg { *a |= w; } else { agg = Some(w.clone()); }
                          }
                      }
                      if let Some(w) = agg {
                          st.trans_weights_exceptions.insert(ch, w);
                      }
                  }

                  let new_id = new_states.len();
                  pid_to_new.insert(*pid, new_id);
                  new_states.push(st);
              }

              // Fix transition targets
              for (pid, members) in &groups {
                  let new_id = *pid_to_new.get(pid).unwrap();
                  let rep = members[0];
                  let rep_state = &states[rep];

                  if let Some(d) = rep_state.transitions.default {
                      let cls = part[d];
                      new_states[new_id].transitions.default = Some(*pid_to_new.get(&cls).unwrap());
                  }

                  let ex_old = new_states[new_id].transitions.exceptions.clone();
                  new_states[new_id].transitions.exceptions.clear();
                  for (ch, _) in ex_old {
                      let cls = part[*rep_state.transitions.exceptions.get(&ch).unwrap()];
                      new_states[new_id].transitions.exceptions.insert(ch, *pid_to_new.get(&cls).unwrap());
                  }
              }

              states.0 = new_states;
              let _ = Self::normalize_edges_inplace(states);
              let start_pid = part[body.start_state];
              body.start_state = *pid_to_new.get(&start_pid).unwrap();

              true
          }

          pub fn prune_unreachable(states: &mut DWAStates, body: &mut DWABody) -> bool {
              if states.0.is_empty() {
                  return false;
              }
              let n = states.0.len();

              // 1. Backward reachability from final states to find "live" states.
              let mut live = vec![false; n];
              let mut q_live: VecDeque<usize> = VecDeque::new();
              let mut rev_adj: Vec<Vec<usize>> = vec![vec![]; n];
              for i in 0..n {
                  if states[i].final_weight.as_ref().map_or(false, |w| !w.is_empty()) {
                      live[i] = true;
                      q_live.push_back(i);
                  }
                  for (_lbl, v, _w) in states[i].iter_edges() {
                      if v < n {
                          rev_adj[v].push(i);
                      }
                  }
              }
              while let Some(u) = q_live.pop_front() {
                  for &v in &rev_adj[u] {
                      if !live[v] { live[v] = true; q_live.push_back(v); }
                  }
              }

              // 2. Remove transitions to non-live states.
              let mut changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  if let Some(d) = st.transitions.default {
                      if !live[d] {
                          st.transitions.default = None;
                          st.trans_weight_default = None;
                          changed = true;
                      }
                  }
                  let before = st.transitions.exceptions.len();
                  st.transitions.exceptions.retain(|_, tgt| live[*tgt]);
                  if st.transitions.exceptions.len() != before {
                      changed = true;
                      st.trans_weights_exceptions.retain(|ch, _| st.transitions.exceptions.contains_key(ch));
                  }
              }

              // 3. Forward reachability from start_state to find actually reachable states.
              let mut visited = vec![false; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              if body.start_state < n {
                  visited[body.start_state] = true;
                  q.push_back(body.start_state);
              }
              while let Some(u) = q.pop_front() {
                  for (_lbl, v, _w) in states[u].iter_edges() {
                      if v < n && !visited[v] { visited[v] = true; q.push_back(v); }
                  }
              }

              if visited.iter().all(|&b| b) && !changed {
                  return false;
              }

              // 4. Remap kept states.
              let mut map = vec![usize::MAX; n];
              let mut next_id = 0usize;
              for i in 0..n { if visited[i] { map[i] = next_id; next_id += 1; } }

              if next_id == n && !changed { return false; }

              let mut new_states: Vec<DWAState> = Vec::with_capacity(next_id);
              for old in 0..n {
                  if !visited[old] { continue; }
                  let mut st = states[old].clone();
                  if let Some(d) = st.transitions.default { st.transitions.default = Some(map[d]); }
                  let ex = st.transitions.exceptions.clone();
                  st.transitions.exceptions.clear();
                  for (ch, tgt) in ex { st.transitions.exceptions.insert(ch, map[tgt]); }
                  new_states.push(st);
              }
              states.0 = new_states;
              if next_id > 0 {
                  body.start_state = map[body.start_state];
              } else if n > 0 {
                  states.0.clear();
                  body.start_state = states.add_state();
              }
              true
          }
      }

      impl NWA {
          fn run_pass(
              pb: &Option<ProgressBar>,
              msg: &str,
              changed_any: &mut bool,
              mut pass: impl FnMut() -> bool,
          ) {
              if let Some(p) = pb {
                  p.set_message(msg.to_string());
              }
              if pass() {
                  *changed_any = true;
              }
          }

          pub fn simplify(&mut self) -> bool {
              let now = Instant::now();
              let initial_n = self.states.len();
              let max_passes = 12;
              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(max_passes as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Simplifying NWA: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} passes ({msg})")
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };

              let mut changed = true;
              let mut passes = 0;
              while changed && passes < max_passes {
                  passes += 1;
                  if let Some(p) = &pb { p.inc(1); }
                  changed = false;
                  Self::run_pass(&pb, "normalize", &mut changed, || self.normalize_edges_inplace());
                  Self::run_pass(&pb, "unify final states", &mut changed, || self.unify_final_states());
                  Self::run_pass(&pb, "dedup epsilons", &mut changed, || self.dedup_epsilon_edges());
                  Self::run_pass(&pb, "bypass ε-chains", &mut changed, || self.bypass_trivial_epsilon_chains());
                  Self::run_pass(&pb, "collapse SCCs", &mut changed, || self.collapse_all_weight_epsilon_sccs());
                  Self::run_pass(&pb, "prune unreachable", &mut changed, || self.prune_unreachable());
                  Self::run_pass(&pb, "prune dead ends", &mut changed, || self.prune_dead_ends());
                  Self::run_pass(&pb, "merge equivalent", &mut changed, || self.merge_equivalent_states_partition());
                  Self::run_pass(&pb, "normalize", &mut changed, || self.normalize_edges_inplace());
              }
              if let Some(p) = &pb { p.finish_with_message(format!("Simplified to {} states", self.states.len())); }
              crate::debug!(3, "NWA::simplify ({} states -> {} states) took: {:?}", initial_n, self.states.len(), now.elapsed());
              self.states.len() != initial_n
          }

          fn prune_unreachable(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut reachable = vec![false; n];
              let mut q = VecDeque::new();

              if self.body.start_state < n {
                  reachable[self.body.start_state] = true;
                  q.push_back(self.body.start_state);
              } else {
                  let changed = n > 0;
                  if changed {
                      self.states.0.clear();
                      self.body.start_state = self.states.add_state();
                  }
                  return changed;
              }

              while let Some(u) = q.pop_front() {
                  let st = &self.states[u];
                  for (v, _) in &st.epsilons {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
                  for (_, targets) in &st.transitions {
                      for (v, _) in targets {
                          if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                      }
                  }
                  for (v, _) in &st.default {
                      if *v < n && !reachable[*v] {
                          reachable[*v] = true; q.push_back(*v);
                      }
                  }
              }

              let num_reachable = reachable.iter().filter(|&&b| b).count();
              if num_reachable == n { return false; }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_reachable);
              for i in 0..n {
                  if reachable[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);
                  st.transitions.values_mut().for_each(|targets| {
                      for (v, _) in targets {
                          *v = remap[*v];
                      }
                  });
                  for (v, _) in &mut st.default {
                      *v = remap[*v]
                  }
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

          fn prune_dead_ends(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let fut = self.compute_future_weights();
              let live: Vec<bool> = fut.iter().map(|w| !w.is_empty()).collect();

              if self.body.start_state >= n || !live[self.body.start_state] {
                  let changed = n > 0;
                  self.states.0.clear();
                  self.body.start_state = self.states.add_state();
                  return changed;
              }

              // Relax edges using future weights (sound: (w | !F[v]) & F[v] == w & F[v])
              let not_fut: Vec<Weight> = fut.iter().map(|w| !w).collect();
              let mut changed_weights = false;
              for i in 0..n {
                  let st = &mut self.states[i];
                  for (v, w) in &mut st.epsilons {
                      let new_w = &*w | &not_fut[*v];
                      if new_w != *w { *w = new_w; changed_weights = true; }
                  }
                  for (_, targets) in &mut st.transitions {
                      for (v, w) in targets {
                          let new_w = &*w | &not_fut[*v];
                          if new_w != *w { *w = new_w; changed_weights = true; }
                      }
                  }
                  for (v, w) in &mut st.default {
                      let new_w = &*w | &not_fut[*v];
                      if new_w != *w { *w = new_w; changed_weights = true; }
                  }
              }

              let num_live = live.iter().filter(|&&b| b).count();
              if num_live == n {
                  return changed_weights;
              }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_live);
              for i in 0..n {
                  if live[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.retain(|(v, _)| live[*v]);
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);

                  st.transitions.values_mut().for_each(|targets| {
                      targets.retain(|(v, _)| live[*v]);
                      targets.iter_mut().for_each(|(v, _)| *v = remap[*v]);
                  });
                  st.transitions.retain(|_, targets| !targets.is_empty());

                  st.default.retain(|(v, _)| live[*v]);
                  st.default.iter_mut().for_each(|(v, _)| *v = remap[*v]);
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

          fn collapse_all_weight_epsilon_sccs(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut index = 0;
              let mut indices = vec![usize::MAX; n];
              let mut lowlink = vec![0; n];
              let mut on_stack = vec![false; n];
              let mut stack = Vec::new();
              let mut comp_of = vec![0; n];
              let mut comps: Vec<Vec<NWAStateID>> = Vec::new();

              for i in 0..n {
                  if indices[i] == usize::MAX {
                      self.strongconnect(i, &mut index, &mut indices, &mut lowlink, &mut on_stack, &mut stack, &mut comp_of, &mut comps);
                  }
              }

              if comps.len() == n { return false; }

              let mut new_states_vec = Vec::with_capacity(comps.len());
              for (cid, comp) in comps.iter().enumerate() {
                  let mut new_state = NWAState::default();

                  let mut final_weight: Option<Weight> = None;
                  for &sid in comp {
                      if let Some(fw) = &self.states[sid].final_weight {
                          if let Some(acc) = &mut final_weight { *acc |= fw; } else { final_weight = Some(fw.clone()); }
                      }
                  }
                  new_state.final_weight = final_weight;

                  for &sid in comp {
                      for (&lbl, targets) in &self.states[sid].transitions {
                          for &(to, ref w) in targets {
                              let to_comp = comp_of[to];
                              Self::add_transition_to_state(&mut new_state, lbl, to_comp, w.clone());
                          }
                      }
                      for (to, w) in &self.states[sid].default {
                          Self::add_default_transition_to_state(&mut new_state, comp_of[*to], w.clone());
                      }
                      for &(to, ref w) in &self.states[sid].epsilons {
                          let to_comp = comp_of[to];
                          if cid != to_comp || !w.is_all_fast() {
                              new_state.epsilons.push((to_comp, w.clone()));
                          }
                      }
                  }
                  new_states_vec.push(new_state);
              }

              for st in &mut new_states_vec {
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = comp_of[*v]);
                  st.transitions.values_mut().for_each(|targets| {
                      targets.iter_mut().for_each(|(v, _)| *v = comp_of[*v]);
                  });
                  st.default.iter_mut().for_each(|(v, _)| {
                      *v = comp_of[*v];
                  });
              }

              self.states.0 = new_states_vec;
              self.body.start_state = comp_of[self.body.start_state];

              true
          }

          fn strongconnect(&self, v: NWAStateID, index: &mut usize, indices: &mut [usize], lowlink: &mut [usize], on_stack: &mut [bool], stack: &mut Vec<NWAStateID>, comp_of: &mut [usize], comps: &mut Vec<Vec<NWAStateID>>) {
              indices[v] = *index;
              lowlink[v] = *index;
              *index += 1;
              stack.push(v);
              on_stack[v] = true;

              for (w, weight) in &self.states[v].epsilons {
                  if weight.is_all_fast() {
                      if indices[*w] == usize::MAX {
                          self.strongconnect(*w, index, indices, lowlink, on_stack, stack, comp_of, comps);
                          lowlink[v] = lowlink[v].min(lowlink[*w]);
                      } else if on_stack[*w] {
                          lowlink[v] = lowlink[v].min(indices[*w]);
                      }
                  }
              }

              if lowlink[v] == indices[v] {
                  let mut comp = Vec::new();
                  loop {
                      let w = stack.pop().unwrap();
                      on_stack[w] = false;
                      comp_of[w] = comps.len();
                      comp.push(w);
                      if w == v { break; }
                  }
                  comps.push(comp);
              }
          }

          fn add_transition_to_state(state: &mut NWAState, on: i16, to: NWAStateID, w: Weight) {
              let targets = state.transitions.entry(on).or_default();
              if let Some((_, existing_w)) = targets.iter_mut().find(|(t, _)| *t == to) {
                  *existing_w |= &w;
              } else {
                  targets.push((to, w));
              }
          }

          fn add_default_transition_to_state(state: &mut NWAState, to: NWAStateID, w: Weight) {
              if let Some((_, old_w)) = state.default.iter_mut().find(|(t, _)| *t == to) {
                  *old_w |= &w;
              } else {
                  state.default.push((to, w));
              }
          }
      }

      impl NWA {
          /// Normalize in-place:
          /// - Remove empty-weight edges (ε, labeled, and default)
          /// - Drop labeled transitions that are identical to the default (same target and weight)
          fn normalize_edges_inplace(&mut self) -> bool {
              let mut changed = false;
              for st in &mut self.states.0 {
                  // Remove empty-weight epsilons
                  let before_eps = st.epsilons.len();
                  st.epsilons.retain(|(_, w)| !w.is_empty());
                  if st.epsilons.len() != before_eps { changed = true; }

                  // Remove empty-weight labeled transitions
                  let before_lbl = st.transitions.len();
                  st.transitions.values_mut().for_each(|targets| targets.retain(|(_, w)| !w.is_empty()));
                  st.transitions.retain(|_, targets| !targets.is_empty());
                  if st.transitions.len() != before_lbl { changed = true; }

                  // Remove empty-weight default
                  let before_def = st.default.len();
                  st.default.retain(|(_, w)| !w.is_empty());
                  if st.default.len() != before_def { changed = true; }

                  // Remove labeled transitions that are identical to default (same target, same weight)
                  if !st.default.is_empty() {
                      let mut sorted_default = st.default.clone();
                      sorted_default.sort_unstable();
                      let before = st.transitions.len();
                      st.transitions.retain(|_, targets| {
                          let mut sorted_targets = targets.clone();
                          sorted_targets.sort_unstable();
                          sorted_targets != sorted_default
                      });
                      if st.transitions.len() != before { changed = true; }
                  }
              }
              changed
          }

          /// Deduplicate epsilon edges to the same target by unioning their weights.
          fn dedup_epsilon_edges(&mut self) -> bool {
              let mut changed = false;
              for st in &mut self.states.0 {
                  if st.epsilons.len() <= 1 {
                      continue;
                  }
                  let mut acc: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  for (to, w) in &st.epsilons {
                      let e = acc.entry(*to).or_insert_with(Weight::zeros);
                      *e |= w;
                  }
                  let new_eps: Vec<(NWAStateID, Weight)> = acc.into_iter().collect();
                  if new_eps != st.epsilons {
                      st.epsilons = new_eps;
                      changed = true;
                  }
              }
              changed
          }

          /// Consolidate all final states into a single new final state.
          /// For each state `s` with `final_weight` `w`, add an ε-transition from `s` to a new
          /// final state `F` with weight `w`, and then clear `s.final_weight`. `F` will have
          /// `final_weight = ALL`.
          fn unify_final_states(&mut self) -> bool {
              let final_states: Vec<(NWAStateID, Weight)> = self
                  .states
                  .0
                  .iter()
                  .enumerate()
                  .filter_map(|(i, s)| s.final_weight.clone().map(|w| (i, w)))
                  .collect();

              if final_states.len() <= 1 {
                  return false;
              }

              let new_final_id = self.states.add_state();
              self.states[new_final_id].final_weight = Some(Weight::all());

              for (sid, weight) in final_states {
                  if !weight.is_empty() {
                      self.states.add_epsilon(sid, new_final_id, weight);
                  }
                  self.states[sid].final_weight = None;
              }

              true
          }

          /// Bypass trivial ε-chains: if a state s
          /// - has no labeled transitions
          /// - has no default
          /// - has no final weight
          /// - has exactly one ε edge with ALL weight to t (t != s)
          /// then redirect all incoming edges targeting s to t and (after a prune) drop s.
          fn bypass_trivial_epsilon_chains(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }
              let mut bypass: Vec<Option<NWAStateID>> = vec![None; n];
              for s in 0..n {
                  let st = &self.states[s];
                  if st.final_weight.is_some() { continue; }
                  if !st.transitions.is_empty() { continue; }
                  if !st.default.is_empty() { continue; }
                  if st.epsilons.len() != 1 { continue; }
                  let (t, w) = &st.epsilons[0];
                  if !w.is_all_fast() { continue; }
                  if *t == s { continue; }
                  bypass[s] = Some(*t);
              }
              if bypass.iter().all(|o| o.is_none()) {
                  return false;
              }

              // Compute ultimate mapping along bypass chains (path compression-like).
              let mut ultimate: Vec<NWAStateID> = (0..n).collect();
              for i in 0..n {
                  let mut v = i;
                  while let Some(t) = bypass[v] {
                      if t == v { break; }
                      v = t;
                  }
                  ultimate[i] = v;
              }

              let mut changed = false;
              for st in &mut self.states.0 {
                  for (v, _) in &mut st.epsilons {
                      let nv = ultimate[*v];
                      if nv != *v { *v = nv; changed = true; }
                  }
                  for (_, targets) in &mut st.transitions {
                      for (v, _) in targets {
                          let nv = ultimate[*v];
                          if nv != *v { *v = nv; changed = true; }
                      }
                  }
                  for (v, _) in &mut st.default {
                      let nv = ultimate[*v];
                      if nv != *v { *v = nv; changed = true; }
                  }
              }
              let new_start = ultimate[self.body.start_state];
              if new_start != self.body.start_state {
                  self.body.start_state = new_start;
                  changed = true;
              }
              if changed {
                  changed |= self.prune_unreachable();
              }
              changed
          }

          /// Merge equivalent NWA states by partition refinement.
          /// Signature per state includes:
          ///  - final_weight
          ///  - default: Option<(class(target), weight)>
          ///  - epsilons: vector of (class(target), UNION(weight to that class)), sorted by class
          ///  - labeled transitions: vector of (label, class(target), weight), sorted by label
          fn merge_equivalent_states_partition(&mut self) -> bool {
              let n = self.states.len();
              if n <= 1 {
                  return false;
              }
              // Initial partition by final_weight only (coarse).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<Option<Weight>, usize> = HashMap::new();
              for i in 0..n {
                  let key = self.states[i].final_weight.clone();
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Iteratively refine using structural signatures keyed by current partitions.
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<
                      (Option<Weight>, Vec<(usize, Weight)>, Vec<(usize, Weight)>, Vec<(i16, Vec<(usize, Weight)>)>),
                      usize,
                  > = HashMap::new();

                  for i in 0..n {
                      let st = &self.states[i];
                      let mut def_sig = st.default.iter().map(|(to, w)| (part[*to], w.clone())).collect::<Vec<_>>();
                      def_sig.sort_unstable();

                      let eps_sig = st.epsilons.iter()
                          .fold(BTreeMap::new(), |mut acc, (to, w)| {
                              *acc.entry(part[*to]).or_insert_with(Weight::zeros) |= w;
                              acc
                          })
                          .into_iter().collect::<Vec<_>>();

                      let lbl_sig = st.transitions.iter()
                          .map(|(lbl, targets)| {
                              let mut target_sigs = targets.iter()
                                  .map(|(to, w)| (part[*to], w.clone()))
                                  .collect::<Vec<_>>();
                              target_sigs.sort_unstable();
                              (*lbl, target_sigs)
                          })
                          .collect::<Vec<_>>();

                      let sig = (st.final_weight.clone(), def_sig, eps_sig, lbl_sig);
                      let pid_next = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(pid_next);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Group states by final partition id
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Map partition id -> new state id
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<NWAState> = Vec::with_capacity(groups.len());
              for (pid, members) in &groups {
                  let rep = members[0];
                  let mut st = self.states[rep].clone();

                  // Fix targets to new partition ids
                  // Default
                  let mut new_default = Vec::new();
                  for (to, w) in st.default {
                      let cls = part[to];
                      new_default.push((cls, w));
                  }
                  st.default = new_default;
                  // Labeled transitions
                  let trans = st.transitions.clone();
                  st.transitions.clear();
                  for (lbl, targets) in trans {
                      let mut new_targets = Vec::new();
                      for (to, w) in targets {
                          let cls = part[to];
                          new_targets.push((cls, w));
                      }
                      st.transitions.insert(lbl, new_targets);
                  }
                  // Epsilons (aggregate after class remap)
                  let eps = st.epsilons.clone();
                  st.epsilons.clear();
                  for (to, w) in eps {
                      let cls = part[to];
                      st.epsilons.push((cls, w));
                  }

                  pid_to_new.insert(*pid, new_states.len());
                  new_states.push(st);
              }

              // Rewrite class ids in edges to actual new state ids and deduplicate ε-edges
              for st in &mut new_states {
                  // Default
                  let mut new_default = Vec::new();
                  for (cls, w) in &st.default {
                      new_default.push((*pid_to_new.get(cls).expect("missing class"), w.clone()));
                  }
                  st.default = new_default;
                  // Labeled
                  let trans = st.transitions.clone();
                  st.transitions.clear();
                  for (lbl, targets) in trans {
                      let mut new_targets = Vec::new();
                      for (cls, w) in targets {
                          let to_new = *pid_to_new.get(&cls).expect("missing class");
                          new_targets.push((to_new, w));
                      }
                      st.transitions.insert(lbl, new_targets);
                  }
                  // Epsilons
                  let eps = st.epsilons.clone();
                  st.epsilons.clear();
                  let mut acc: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  for (cls, w) in eps {
                      let to_new = *pid_to_new.get(&cls).expect("missing class");
                      let e = acc.entry(to_new).or_insert_with(Weight::zeros);
                      *e |= &w;
                  }
                  st.epsilons = acc.into_iter().collect();
              }

              self.states.0 = new_states;
              self.body.start_state = *pid_to_new.get(&part[self.body.start_state]).expect("missing start class");
              let _ = self.normalize_edges_inplace();
              let _ = self.dedup_epsilon_edges();

              true
          }
      }
    src/precompute4/weighted_automata/determinization.rs: |
      use super::bitset::{mix3, FP_K1, FP_K2, FP_ZERO};
      use super::common::Weight;
      use super::dwa::DWA;
      use super::nwa::{NWAStates, NWA};
      use crate::precompute4::weighted_automata::NWAStateID;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};

      use std::collections::hash_map::Entry;
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque};
      use std::hash::{Hash, Hasher};
      use std::time::Instant;

      impl NWA {
          pub fn determinize_to_dwa(&self) -> DWA {
              let now = Instant::now();

              let mut nwa = self.clone();
              nwa.simplify();

              crate::debug!(4, "NWA::determinize_to_dwa stats after simplify:\n{}", nwa.stats());

              let result = nwa.det_fixpoint();

              crate::debug!(4, "NWA::determinize_to_dwa result DWA stats:\n{}", result.stats());

              crate::debug!(4, "NWA::determinize_to_dwa took: {:?}", now.elapsed());
              result
          }

          fn det_fixpoint(&self) -> DWA {
              let fut = self.compute_future_weights();
              let n = self.states.len();
              if n == 0 {
                  return DWA::new();
              }

              fn eps_closure_masked(
                  sources: &[NWAStateID],
                  states: &NWAStates,
                  fut: &[Weight],
              ) -> Vec<(NWAStateID, Weight)> {
                  let mut out: HashMap<NWAStateID, Weight> = HashMap::new();
                  let mut q: VecDeque<NWAStateID> = VecDeque::new();
                  for &s in sources {
                      if s >= states.len() {
                          continue;
                      }
                      let f = fut[s].clone();
                      if !f.is_empty() {
                          out.insert(s, f);
                          q.push_back(s);
                      }
                  }
                  while let Some(u) = q.pop_front() {
                      let base = out.get(&u).cloned().unwrap_or_else(Weight::zeros);
                      if base.is_empty() {
                          continue;
                      }
                      for &(v, ref w_eps) in &states[u].epsilons {
                          if v >= states.len() {
                              continue;
                          }
                          let mut prop = &base & w_eps;
                          if prop.is_empty() {
                              continue;
                          }
                          prop &= &fut[v];
                          if prop.is_empty() {
                              continue;
                          }
                          match out.entry(v) {
                              Entry::Occupied(mut e) => {
                                  let old = e.get_mut();
                                  let nu = &*old | &prop;
                                  if nu != *old {
                                      *old = nu;
                                      q.push_back(v);
                                  }
                              }
                              Entry::Vacant(e) => {
                                  e.insert(prop);
                                  q.push_back(v);
                              }
                          }
                      }
                  }
                  let mut v: Vec<(NWAStateID, Weight)> = out.into_iter().collect();
                  v.sort_by_key(|(sid, _)| *sid);
                  v
              }

              fn apply_weight_to_pairs(base: &[(NWAStateID, Weight)], w: &Weight) -> Vec<(NWAStateID, Weight)> {
                  if w.is_all_fast() {
                      return base.to_vec();
                  }
                  base.iter()
                      .map(|(sid, wt)| (*sid, wt & w))
                      .filter(|(_, x)| !x.is_empty())
                      .collect()
              }

              struct StepPool {
                  raw: Vec<Vec<(NWAStateID, Weight)>>,
                  map: HashMap<u64, Vec<usize>>,
              }

              impl StepPool {
                  fn new() -> Self {
                      Self {
                          raw: Vec::new(),
                          map: HashMap::new(),
                      }
                  }
                  fn fingerprint(pairs: &[(NWAStateID, Weight)]) -> u64 {
                      pairs.iter().fold(FP_ZERO, |fp, (sid, w)| {
                          mix3(fp, (*sid as u64).wrapping_mul(FP_K1), w.fp.wrapping_mul(FP_K2))
                      })
                  }
                  fn intern(&mut self, mut pairs: Vec<(NWAStateID, Weight)>) -> usize {
                      pairs.retain(|(_, w)| !w.is_empty());
                      let fp = Self::fingerprint(&pairs);
                      if let Some(cands) = self.map.get(&fp) {
                          for &id in cands {
                              if self.raw[id] == pairs {
                                  return id;
                              }
                          }
                      }
                      let id = self.raw.len();
                      self.raw.push(pairs);
                      self.map.entry(fp).or_default().push(id);
                      id
                  }
              }

              #[derive(Clone)]
              struct CompiledStep {
                  by_sig: Vec<(usize, Weight)>,
                  mask: Weight,
              }

              #[derive(Clone)]
              struct MacroSig {
                  final_w: Option<Weight>,
                  def: Vec<usize>,
                  ex: BTreeMap<i16, Vec<usize>>,
              }

              #[derive(Clone, Hash, Eq, PartialEq)]
              struct MacroSigKey {
                  final_fp: u64,
                  def: Vec<usize>,
                  ex: Vec<(i16, Vec<usize>)>,
              }

              // 1) Precompute ε-closures from each NWA state (masked by future weight)
              let pb_eps = if PROGRESS_BAR_ENABLED {
                  Some(ProgressBar::new(n as u64).with_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (ε-closures)")
                          .unwrap(),
                  ))
              } else {
                  None
              };
              let mut eps_cache: Vec<Vec<(NWAStateID, Weight)>> = vec![Vec::new(); n];
              for s in 0..n {
                  eps_cache[s] = eps_closure_masked(std::slice::from_ref(&s), &self.states, &fut);
                  if let Some(p) = &pb_eps {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_eps {
                  p.finish_with_message("ε-closures done");
              }

              // 2) Build macro-signatures (grouping NWA states by identical behavior up to ε-closure + weights)
              let mut step_pool = StepPool::new();
              let mut sigs: Vec<MacroSig> = Vec::with_capacity(n);
              let mut state_to_sig_id: Vec<usize> = vec![0; n];
              let mut sig_intern: HashMap<MacroSigKey, usize> = HashMap::new();

              let pb_sigs = if PROGRESS_BAR_ENABLED {
                  Some(ProgressBar::new(n as u64).with_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Macro signatures)")
                          .unwrap(),
                  ))
              } else {
                  None
              };
              for s in 0..n {
                  let final_acc = self.states[s].final_weight.clone();

                  // Default steps: collect step ids
                  let mut def_steps: Vec<usize> = Vec::new();
                  for (to, wdef) in &self.states[s].default {
                      if *to >= n {
                          continue;
                      }
                      let pairs_def = apply_weight_to_pairs(&eps_cache[*to], wdef);
                      if !pairs_def.is_empty() {
                          def_steps.push(step_pool.intern(pairs_def));
                      }
                  }
                  def_steps.sort_unstable();

                  // Labeled exceptions: per label sets of step ids
                  let mut ex: BTreeMap<i16, Vec<usize>> = BTreeMap::new();
                  for (lbl, targets) in self.states[s].transitions.iter() {
                      let mut step_exs: Vec<usize> = Vec::new();
                      for (to, wlbl) in targets {
                          if *to >= n {
                              continue;
                          }
                          let pairs_ex = apply_weight_to_pairs(&eps_cache[*to], wlbl);
                          if !pairs_ex.is_empty() {
                              step_exs.push(step_pool.intern(pairs_ex));
                          }
                      }
                      if !step_exs.is_empty() {
                          step_exs.sort_unstable();
                          // If exception identical to default, drop it
                          if step_exs != def_steps {
                              ex.insert(*lbl, step_exs);
                          }
                      }
                  }

                  let key = MacroSigKey {
                      final_fp: final_acc.as_ref().map(|w| w.fp).unwrap_or(FP_ZERO),
                      def: def_steps.clone(),
                      ex: ex.iter().map(|(k, v)| (*k, v.clone())).collect(),
                  };
                  let sig_id = *sig_intern.entry(key).or_insert_with(|| {
                      let id = sigs.len();
                      sigs.push(MacroSig {
                          final_w: final_acc.clone(),
                          def: def_steps.clone(),
                          ex: ex.clone(),
                      });
                      id
                  });
                  state_to_sig_id[s] = sig_id;

                  if let Some(p) = &pb_sigs {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_sigs {
                  p.finish_with_message("Macro signatures done");
              }

              // 3) Compile step effects grouped by target macro-sig (this enables fast accumulation)
              let pb_compile = if PROGRESS_BAR_ENABLED {
                  Some(ProgressBar::new(step_pool.raw.len() as u64).with_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Compile steps)")
                          .unwrap(),
                  ))
              } else {
                  None
              };
              let mut compiled_steps: Vec<CompiledStep> = Vec::with_capacity(step_pool.raw.len());
              // Build mapping from NWA state to macro signature id (via state_to_sig_id) after ε-closure compile:
              // Already done above; compiled steps convert pairs (NWAStateID, Weight) to (MacroSigID, Weight) aggregating by union.
              for pairs in &step_pool.raw {
                  let mut acc: HashMap<usize, Weight> = HashMap::new();
                  for (t, w) in pairs.iter() {
                      // Map target NWA state to its macro-signature
                      let sid = state_to_sig_id[*t];
                      *acc.entry(sid).or_default() |= w;
                  }
                  let mut by_sig: Vec<(usize, Weight)> = acc.into_iter().collect();
                  by_sig.sort_by_key(|(sid, _)| *sid);
                  let mask = by_sig.iter().fold(Weight::zeros(), |mut acc, (_, w)| {
                      acc |= w;
                      acc
                  });
                  compiled_steps.push(CompiledStep { by_sig, mask });
                  if let Some(p) = &pb_compile {
                      p.inc(1);
                  }
              }
              if let Some(p) = pb_compile {
                  p.finish_with_message("Compile steps done");
              }

              // 4) Precompute per-signature effect maps (def and per-label) and a coarse upper mask.
              // This enables fast antichain subsumption checks later.
              struct SigEffects {
                  def_by_sig: HashMap<usize, Weight>,
                  ex_by_label_by_sig: BTreeMap<i16, HashMap<usize, Weight>>,
                  upper_all: Weight,
                  final_w: Option<Weight>,
              }

              let mut effects: Vec<SigEffects> = Vec::with_capacity(sigs.len());
              effects.resize_with(sigs.len(), || SigEffects {
                  def_by_sig: HashMap::new(),
                  ex_by_label_by_sig: BTreeMap::new(),
                  upper_all: Weight::zeros(),
                  final_w: None,
              });

              for (sid, sig) in sigs.iter().enumerate() {
                  let mut def_map: HashMap<usize, Weight> = HashMap::new();
                  for step_id in &sig.def {
                      for (tsig, w) in &compiled_steps[*step_id].by_sig {
                          *def_map.entry(*tsig).or_default() |= w;
                      }
                  }
                  let mut ex_maps: BTreeMap<i16, HashMap<usize, Weight>> = BTreeMap::new();
                  for (lbl, step_ids) in &sig.ex {
                      let mut map: HashMap<usize, Weight> = HashMap::new();
                      for step_id in step_ids {
                          for (tsig, w) in &compiled_steps[*step_id].by_sig {
                              *map.entry(*tsig).or_default() |= w;
                          }
                      }
                      ex_maps.insert(*lbl, map);
                  }

                  let mut upper = sig.final_w.clone().unwrap_or_else(Weight::zeros);
                  for w in def_map.values() {
                      upper |= w;
                  }
                  for map in ex_maps.values() {
                      for w in map.values() {
                          upper |= w;
                      }
                  }

                  effects[sid] = SigEffects {
                      def_by_sig: def_map,
                      ex_by_label_by_sig: ex_maps,
                      upper_all: upper,
                      final_w: sig.final_w.clone(),
                  };
              }

              // Helper: accumulate weights for a target composition map from one compiled step masked by a gate.
              fn accumulate(dst: &mut HashMap<usize, Weight>, compiled: &[(usize, Weight)], gate: &Weight) {
                  if gate.is_all_fast() {
                      for (sid, w) in compiled.iter() {
                          match dst.entry(*sid) {
                              Entry::Occupied(mut e) => {
                                  let v = e.get_mut();
                                  *v |= w;
                              }
                              Entry::Vacant(e) => {
                                  e.insert(w.clone());
                              }
                          }
                      }
                  } else {
                      for (sid, w) in compiled.iter() {
                          let x = w & gate;
                          if x.is_empty() {
                              continue;
                          }
                          match dst.entry(*sid) {
                              Entry::Occupied(mut e) => {
                                  let v = e.get_mut();
                                  *v |= &x;
                              }
                              Entry::Vacant(e) => {
                                  e.insert(x);
                              }
                          }
                      }
                  }
              }

              // 5) Antichain-based subsumption pruning within a gates map: remove macro-signatures whose
              // contributions are included in others for all labels (including default) and final.
              fn is_subsumed_by(
                  a_sig: usize,
                  b_sig: usize,
                  ga: &Weight,
                  gb: &Weight,
                  eff: &Vec<SigEffects>,
              ) -> bool {
                  if ga.is_empty() {
                      return true;
                  }
                  // Quick necessary filter: (ga & upper_a) ⊆ (gb & upper_b)
                  let upper_a = &eff[a_sig].upper_all;
                  let upper_b = &eff[b_sig].upper_all;
                  if !((&(ga & upper_a)).is_subset_of(&(gb & upper_b))) {
                      return false;
                  }

                  // Final contributions: (ga & Fa) ⊆ (gb & Fb)
                  let fa = eff[a_sig].final_w.as_ref().cloned().unwrap_or_else(Weight::zeros);
                  let fb = eff[b_sig].final_w.as_ref().cloned().unwrap_or_else(Weight::zeros);
                  if !((&(ga & &fa)).is_subset_of(&(gb & &fb))) {
                      return false;
                  }

                  // Default: for each target macro-sig t that a reaches via default
                  for (t, wa) in &eff[a_sig].def_by_sig {
                      let vb = eff[b_sig].def_by_sig.get(t).cloned().unwrap_or_else(Weight::zeros);
                      let ca = ga & wa;
                      let cb = gb & &vb;
                      if !ca.is_subset_of(&cb) {
                          return false;
                      }
                  }

                  // For labels that have any exceptions in either a or b, compare contributions.
                  let mut labels: BTreeSet<i16> = BTreeSet::new();
                  labels.extend(eff[a_sig].ex_by_label_by_sig.keys().copied());
                  labels.extend(eff[b_sig].ex_by_label_by_sig.keys().copied());

                  for lbl in labels {
                      let map_a = eff[a_sig]
                          .ex_by_label_by_sig
                          .get(&lbl)
                          .unwrap_or(&eff[a_sig].def_by_sig);
                      let map_b = eff[b_sig]
                          .ex_by_label_by_sig
                          .get(&lbl)
                          .unwrap_or(&eff[b_sig].def_by_sig);

                      for (t, wa) in map_a {
                          let vb = map_b.get(t).cloned().unwrap_or_else(Weight::zeros);
                          let ca = ga & wa;
                          let cb = gb & &vb;
                          if !ca.is_subset_of(&cb) {
                              return false;
                          }
                      }
                  }
                  true
              }

              fn prune_map_inplace(map: &mut HashMap<usize, Weight>, eff: &Vec<SigEffects>) -> bool {
                  let mut changed = false;
                  // Drop empties first
                  let before = map.len();
                  map.retain(|_, w| !w.is_empty());
                  if map.len() != before {
                      changed = true;
                  }
                  if map.len() <= 1 {
                      return changed;
                  }
                  let ids: Vec<usize> = map.keys().copied().collect();
                  let mut remove: BTreeSet<usize> = BTreeSet::new();
                  for i in 0..ids.len() {
                      if remove.contains(&ids[i]) {
                          continue;
                      }
                      let ga = map.get(&ids[i]).cloned().unwrap_or_else(Weight::zeros);
                      if ga.is_empty() {
                          remove.insert(ids[i]);
                          continue;
                      }
                      for j in 0..ids.len() {
                          if i == j || remove.contains(&ids[i]) {
                              continue;
                          }
                          let gb = match map.get(&ids[j]) {
                              Some(w) => w.clone(),
                              None => continue,
                          };
                          if is_subsumed_by(ids[i], ids[j], &ga, &gb, eff) {
                              remove.insert(ids[i]);
                              break;
                          }
                      }
                  }
                  if !remove.is_empty() {
                      for k in remove {
                          map.remove(&k);
                      }
                      changed = true;
                  }
                  changed
              }

              #[derive(Clone, Eq, PartialEq, Hash, Ord, PartialOrd)]
              struct MembersKey(Vec<usize>);

              impl MembersKey {
                  fn new(mut v: Vec<usize>) -> Self {
                      v.sort_unstable();
                      v.dedup();
                      MembersKey(v)
                  }
                  fn of_map_keys<K>(map: &HashMap<usize, K>) -> Self {
                      let mut ks: Vec<usize> = map.keys().copied().collect();
                      ks.sort_unstable();
                      ks.dedup();
                      MembersKey(ks)
                  }
              }

              #[derive(Clone)]
              struct CompositionNode {
                  key: MembersKey,
                  final_weight: Option<Weight>,
                  default_target_idx: Option<usize>,
                  exception_targets: BTreeMap<i16, usize>,
                  gates: HashMap<usize, Weight>, // macro-sig -> gate mask
                  redirect: Option<usize>,
              }

              // Helper to find canonical representative of a node following redirects.
              fn find_canonical(nodes: &Vec<CompositionNode>, mut idx: usize) -> usize {
                  loop {
                      if let Some(to) = nodes[idx].redirect {
                          if to == idx {
                              break;
                          }
                          idx = to;
                      } else {
                          break;
                      }
                  }
                  idx
              }

              let pb_discover = if PROGRESS_BAR_ENABLED {
                  Some(
                      ProgressBar::new(0).with_style(
                          ProgressStyle::default_bar()
                              .template("{spinner:.green} [Determinize: {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} (Discovering states)")
                              .unwrap(),
                      ),
                  )
              } else {
                  None
              };

              // Create the initial state
              let mut init_map: HashMap<usize, Weight> = HashMap::new();
              for (t, w) in eps_cache[self.body.start_state].iter() {
                  let sid = state_to_sig_id[*t];
                  match init_map.entry(sid) {
                      Entry::Occupied(mut e) => {
                          let v = e.get_mut();
                          *v |= w;
                      }
                      Entry::Vacant(e) => {
                          e.insert(w.clone());
                      }
                  }
              }
              // Prune initial map by subsumption
              let _ = prune_map_inplace(&mut init_map, &effects);

              let init_key = MembersKey::of_map_keys(&init_map);
              let start_idx = 0;

              let mut nodes: Vec<CompositionNode> = Vec::new();
              nodes.push(CompositionNode {
                  key: init_key.clone(),
                  final_weight: None,
                  default_target_idx: None,
                  exception_targets: BTreeMap::new(),
                  gates: init_map,
                  redirect: None,
              });

              let mut key_to_idx: HashMap<MembersKey, usize> = HashMap::new();
              key_to_idx.insert(init_key, start_idx);

              let mut work: VecDeque<usize> = VecDeque::new();
              let mut in_queue: Vec<bool> = vec![false; 1];

              in_queue[start_idx] = true;
              work.push_back(start_idx);

              // Helper to intern or create a node by key; returns canonical index.
              let mut intern_by_key = |key: MembersKey,
                                       nodes: &mut Vec<CompositionNode>,
                                       key_to_idx: &mut HashMap<MembersKey, usize>,
                                       in_queue: &mut Vec<bool>,
                                       work: &mut VecDeque<usize>|
               -> usize {
                  if let Some(&idx) = key_to_idx.get(&key) {
                      let repr = find_canonical(nodes, idx);
                      if repr != idx {
                          key_to_idx.insert(key, repr);
                      }
                      return repr;
                  }
                  let new_idx = nodes.len();
                  nodes.push(CompositionNode {
                      key: key.clone(),
                      final_weight: None,
                      default_target_idx: None,
                      exception_targets: BTreeMap::new(),
                      gates: HashMap::new(),
                      redirect: None,
                  });
                  key_to_idx.insert(key, new_idx);
                  if new_idx >= in_queue.len() {
                      in_queue.resize(new_idx + 1, false);
                  }
                  in_queue[new_idx] = true;
                  work.push_back(new_idx);
                  new_idx
              };

              while let Some(idx0) = work.pop_front() {
                  if let Some(p) = &pb_discover {
                      p.inc(1);
                      p.set_length(nodes.len() as u64);
                  }

                  // Ignore outdated nodes (redirected)
                  let idx = find_canonical(&nodes, idx0);
                  if idx != idx0 {
                      continue;
                  }
                  in_queue[idx] = false;

                  // 5.a) Prune current gates by subsumption; if key changes, canonicalize node.
                  let gates_pruned = prune_map_inplace(&mut nodes[idx].gates, &effects);
                  let key_changed = gates_pruned && MembersKey::of_map_keys(&nodes[idx].gates) != nodes[idx].key;

                  if key_changed {
                      let gates_clone = nodes[idx].gates.clone();
                      let new_key = MembersKey::of_map_keys(&gates_clone);

                      let target_idx = intern_by_key(new_key, &mut nodes, &mut key_to_idx, &mut in_queue, &mut work);

                      let mut any_change = false;
                      for (sig, w) in gates_clone {
                          let entry = nodes[target_idx].gates.entry(sig).or_insert_with(Weight::zeros);
                          let nw = &*entry | &w;
                          if nw != *entry {
                              *entry = nw;
                              any_change = true;
                          }
                      }
                      if any_change && !in_queue[target_idx] {
                          in_queue[target_idx] = true;
                          work.push_back(target_idx);
                      }
                      nodes[idx].redirect = Some(target_idx);
                      continue;
                  }
                  let node_gates = nodes[idx].gates.clone();
                  if node_gates.is_empty() {
                      // No contributions -> no transitions; final is None
                      nodes[idx].final_weight = None;
                      nodes[idx].default_target_idx = None;
                      nodes[idx].exception_targets.clear();
                      continue;
                  }

                  // Aggregate gates by "step id" to avoid per-member/per-label loops.
                  let mut def_groups: HashMap<usize, Weight> = HashMap::new(); // step_id -> gate union
                  let mut ex_groups_by_label: BTreeMap<i16, HashMap<usize, Weight>> = BTreeMap::new(); // lbl -> (ex_step_id -> gate union)
                  let mut def_exers_by_label: BTreeMap<i16, HashMap<usize, Weight>> = BTreeMap::new(); // lbl -> (def_step_id -> gate union of members that DO have an ex on lbl)

                  // Build group aggregations
                  for (sig_id, gate) in &node_gates {
                      let sig = &sigs[*sig_id];
                      if !sig.def.is_empty() {
                          for def_id in &sig.def {
                              let e = def_groups.entry(*def_id).or_insert_with(Weight::zeros);
                              *e |= gate;
                          }
                      }
                      for (lbl, ex_steps) in &sig.ex {
                          let ex_map = ex_groups_by_label.entry(*lbl).or_insert_with(HashMap::new);
                          for ex_step in ex_steps {
                              let e = ex_map.entry(*ex_step).or_insert_with(Weight::zeros);
                              *e |= gate;
                          }
                          if !sig.def.is_empty() {
                              let dmap = def_exers_by_label.entry(*lbl).or_insert_with(HashMap::new);
                              for def_id in &sig.def {
                                  let ed = dmap.entry(*def_id).or_insert_with(Weight::zeros);
                                  *ed |= gate;
                              }
                          }
                      }
                  }

                  // Reset transitions from this node; we will recompute them
                  nodes[idx].default_target_idx = None;
                  nodes[idx].exception_targets.clear();

                  // Helper: prune a target map, intern, union gates, and enqueue on change; returns canonical target index
                  let mut process_target_map = |map: &mut HashMap<usize, Weight>,
                                                nodes: &mut Vec<CompositionNode>,
                                                key_to_idx: &mut HashMap<MembersKey, usize>,
                                                in_queue: &mut Vec<bool>,
                                                work: &mut VecDeque<usize>|
                   -> Option<usize> {
                      // Subsumption prune on the target gates
                      let _ = prune_map_inplace(map, &effects);
                      if map.is_empty() {
                          return None;
                      }
                      let key = MembersKey::of_map_keys(map);
                      let target_idx = intern_by_key(key, nodes, key_to_idx, in_queue, work);
                      let mut any_change = false;
                      // Union gates into target
                      for (sig_id, weight) in map.iter() {
                          let entry = nodes[target_idx].gates.entry(*sig_id).or_insert_with(Weight::zeros);
                          let new_w = &*entry | weight;
                          if new_w != *entry {
                              *entry = new_w;
                              any_change = true;
                          }
                      }
                      if any_change && !in_queue[target_idx] {
                          in_queue[target_idx] = true;
                          work.push_back(target_idx);
                      }
                      Some(target_idx)
                  };

                  // 1) Default transition: accumulate once from def_groups.
                  let mut def_target_map: HashMap<usize, Weight> = HashMap::new();
                  for (def_step, g) in &def_groups {
                      if !g.is_empty() {
                          accumulate(&mut def_target_map, &compiled_steps[*def_step].by_sig, g);
                      }
                  }
                  if let Some(tidx) = process_target_map(&mut def_target_map, &mut nodes, &mut key_to_idx, &mut in_queue, &mut work) {
                      nodes[idx].default_target_idx = Some(tidx);
                  }

                  // 2) Exception transitions per label (only labels that appear among members).
                  for (lbl, ex_groups) in &ex_groups_by_label {
                      let mut map: HashMap<usize, Weight> = HashMap::new();

                      // Default contribution from members that DO NOT have an exception on this label:
                      if !def_groups.is_empty() {
                          if let Some(def_exers) = def_exers_by_label.get(lbl) {
                              for (def_step, total_g) in &def_groups {
                                  let g_exers = def_exers.get(def_step).cloned().unwrap_or_else(Weight::zeros);
                                  let mut g_nonex = total_g.clone();
                                  if !g_exers.is_empty() {
                                      g_nonex -= &g_exers;
                                  }
                                  if !g_nonex.is_empty() {
                                      accumulate(&mut map, &compiled_steps[*def_step].by_sig, &g_nonex);
                                  }
                              }
                          } else {
                              // No exers on this label => identical to default
                              for (def_step, g) in &def_groups {
                                  if !g.is_empty() {
                                      accumulate(&mut map, &compiled_steps[*def_step].by_sig, g);
                                  }
                              }
                          }
                      }

                      // Exception contribution from members that do have an exception on this label:
                      for (ex_step, g_ex) in ex_groups {
                          if !g_ex.is_empty() {
                              accumulate(&mut map, &compiled_steps[*ex_step].by_sig, g_ex);
                          }
                      }

                      if let Some(tidx) = process_target_map(&mut map, &mut nodes, &mut key_to_idx, &mut in_queue, &mut work) {
                          nodes[idx].exception_targets.insert(*lbl, tidx);
                      }
                  }

                  // Recompute final weight for this node from its current gates.
                  let mut final_acc: Option<Weight> = None;
                  for (sig_id, gate) in &nodes[idx].gates {
                      if let Some(fw) = &sigs[*sig_id].final_w {
                          let x = gate & fw;
                          if !x.is_empty() {
                              if let Some(ref mut a) = final_acc {
                                  *a |= &x;
                              } else {
                                  final_acc = Some(x);
                              }
                          }
                      }
                  }
                  nodes[idx].final_weight = final_acc;

                  if let Some(p) = &pb_discover {
                      p.set_length(nodes.len() as u64);
                  }
              }
              if let Some(p) = pb_discover {
                  p.finish_with_message(format!("Discovered {} compositions", nodes.len()));
              }

              // 6) Canonicalize nodes by removing redirects and fixing transition indices to canonical ones
              let mut repr_of: Vec<usize> = Vec::with_capacity(nodes.len());
              for i in 0..nodes.len() {
                  let r = find_canonical(&nodes, i);
                  repr_of.push(r);
              }
              let mut uniq_repr: BTreeMap<usize, usize> = BTreeMap::new();
              let mut next_id = 0usize;
              for r in repr_of.iter().copied() {
                  uniq_repr.entry(r).or_insert_with(|| {
                      let id = next_id;
                      next_id += 1;
                      id
                  });
              }

              let mut canon_nodes: Vec<CompositionNode> = vec![
                  CompositionNode {
                      key: MembersKey(Vec::new()),
                      final_weight: None,
                      default_target_idx: None,
                      exception_targets: BTreeMap::new(),
                      gates: HashMap::new(),
                      redirect: None,
                  };
                  uniq_repr.len()
              ];

              for (r, new_id) in uniq_repr.iter() {
                  let node = &nodes[*r];
                  canon_nodes[*new_id] = CompositionNode {
                      key: node.key.clone(),
                      final_weight: node.final_weight.clone(),
                      default_target_idx: node
                          .default_target_idx
                          .map(|t| uniq_repr[&repr_of[t]]),
                      exception_targets: node
                          .exception_targets
                          .iter()
                          .map(|(lbl, t)| (*lbl, uniq_repr[&repr_of[*t]]))
                          .collect(),
                      gates: node.gates.clone(),
                      redirect: None,
                  };
              }

              let start_idx_canon = uniq_repr[&repr_of[start_idx]];
              let nodes = canon_nodes;

              // --- Phase 2: Partition Refinement on composition graph (exact, compressing isomorphic states) ---
              let num_nodes = nodes.len();
              let mut partitions = vec![0; num_nodes];

              // Initialize with a coarse partition by final_weight fingerprint
              let mut init_map: HashMap<u64, usize> = HashMap::new();
              for i in 0..num_nodes {
                  let fp = nodes[i].final_weight.as_ref().map(|w| w.fp).unwrap_or(FP_ZERO);
                  let len = init_map.len();
                  let pid = *init_map.entry(fp).or_insert_with(|| len);
                  partitions[i] = pid;
              }

              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 20 {
                  rounds += 1;
                  changed = false;
                  let mut next_partitions = vec![0usize; num_nodes];

                  let mut sig2pid: HashMap<(u64, Option<usize>, Vec<(i16, usize)>), usize> = HashMap::new();
                  for i in 0..num_nodes {
                      let node = &nodes[i];
                      let fpf = node.final_weight.as_ref().map(|w| w.fp).unwrap_or(FP_ZERO);

                      let def_cls = node.default_target_idx.map(|d| partitions[d]);

                      let mut ex_sig: Vec<(i16, usize)> = node
                          .exception_targets
                          .iter()
                          .map(|(lbl, tgt)| (*lbl, partitions[*tgt]))
                          .collect();
                      ex_sig.sort_unstable();

                      let key = (fpf, def_cls, ex_sig);
                      let pid_next = sig2pid.len();
                      next_partitions[i] = *sig2pid.entry(key).or_insert(pid_next);
                  }

                  if next_partitions != partitions {
                      partitions = next_partitions;
                      changed = true;
                  }
              }

              // Build final DWA from partitions
              let mut dwa = DWA::new();
              if num_nodes == 0 {
                  return dwa;
              }

              // Map partition id -> DWA state id
              let mut part_to_dwa_id: HashMap<usize, usize> = HashMap::new();
              for i in 0..num_nodes {
                  part_to_dwa_id.entry(partitions[i]).or_insert_with(|| dwa.add_state());
              }
              // Ensure start state is correct
              dwa.body.start_state = *part_to_dwa_id.get(&partitions[start_idx_canon]).unwrap();

              // Assign final weights
              for i in 0..num_nodes {
                  let dwa_id = *part_to_dwa_id.get(&partitions[i]).unwrap();
                  if let Some(fw) = &nodes[i].final_weight {
                      if !fw.is_empty() {
                          if let Some(existing) = dwa.states[dwa_id].final_weight.clone() {
                              let mut nw = existing.clone();
                              nw |= fw;
                              dwa.states[dwa_id].final_weight = Some(nw);
                          } else {
                              dwa.states[dwa_id].final_weight = Some(fw.clone());
                          }
                      }
                  }
              }

              // Helper to compute edge weight as union of target node gates
              let compute_edge_weight = |target_idx: usize, nodes: &Vec<CompositionNode>| -> Weight {
                  let mut mask = Weight::zeros();
                  for w in nodes[target_idx].gates.values() {
                      mask |= w;
                  }
                  mask
              };

              // Emit transitions (union weights for states merged in same partition)
              for i in 0..num_nodes {
                  let from_part = partitions[i];
                  let from_dwa_id = *part_to_dwa_id.get(&from_part).unwrap();
                  let node = &nodes[i];

                  if let Some(def_idx) = node.default_target_idx {
                      let to_part = partitions[def_idx];
                      let to_dwa_id = *part_to_dwa_id.get(&to_part).unwrap();
                      let weight = compute_edge_weight(def_idx, &nodes);
                      if !weight.is_empty() {
                          if let Some(w) = dwa.states[from_dwa_id].trans_weight_default.as_mut() {
                              let old = w.clone();
                              let nw = &old | &weight;
                              if nw != old {
                                  *w = nw;
                              }
                          } else {
                              let _ = dwa.set_default_transition(from_dwa_id, to_dwa_id, weight);
                          }
                      }
                  }

                  for (lbl, ex_idx) in &node.exception_targets {
                      let to_part = partitions[*ex_idx];
                      let to_dwa_id = *part_to_dwa_id.get(&to_part).unwrap();
                      let weight = compute_edge_weight(*ex_idx, &nodes);
                      if !weight.is_empty() {
                          if let Some(w) = dwa.states[from_dwa_id].trans_weights_exceptions.get_mut(lbl) {
                              let old = w.clone();
                              let nw = &old | &weight;
                              if nw != old {
                                  *w = nw;
                              }
                          } else {
                              let _ = dwa.add_transition(from_dwa_id, *lbl, to_dwa_id, weight);
                          }
                      }
                  }
              }

              dwa
          }
      }
