              assert_eq!(&d1 & &d2, d1);
              assert_eq!(&d1 | &d2, d1);
              assert_eq!(&d1 ^ &d2, d1);
              assert_eq!(&d1 - &d2, d1);

              assert_eq!(&d1 & &d3, d1);
              assert_eq!(&d3 & &d1, d1);
              assert_eq!(&d1 | &d3, d3);
              assert_eq!(&d3 | &d1, d3);
              assert_eq!(&d1 ^ &d3, d3);
              assert_eq!(&d3 ^ &d1, d3);
              assert_eq!(&d1 - &d3, d1);
              assert_eq!(&d3 - &d1, d3);

              let d4 = HybridBitset::from_iter(0..5);
              let d5 = HybridBitset::from_iter(3..10);

              let inter = &d4 & &d5;
              assert_eq!(
