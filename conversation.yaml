      # ----------------------------
      # Sweep Presets
      # ----------------------------

      @dataclass
      class SweepConfig:
          workload: str
          axis: str
          values: List[Any] = field(default_factory=list)


      SWEEP_PRESETS: Dict[str, List[SweepConfig]] = {
          "tiny": [
              SweepConfig("push_scaling", "prefix_depth", [10, 25, 50, 75]),
              SweepConfig("pop_common_parent", "parent_prefix_depth", [10, 25, 50, 75]),
