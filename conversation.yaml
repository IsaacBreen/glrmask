      const MAX_OPTIMIZE_ITERATIONS: usize = 20;

      #[derive(Clone, Debug)]
      struct Partition {
          class_of: Vec<usize>,
          num_classes: usize,
      }

      impl Partition {
          fn new(num_states: usize) -> Self {
              Self {
