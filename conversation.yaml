              let acc2 = Arc::new(mock_acc(2));
              let leaf2 = Arc::new(GSSNode::new((*acc2).clone()));

              let acc_b = Arc::new(mock_acc(3));
              let b = Arc::new(GSSNode::new_with_single_predecessor(leaf1.clone(), mock_edge(1), (*acc_b).clone()));

