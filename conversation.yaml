      from __future__ import annotations

      import os
      from dataclasses import dataclass, field
      from functools import reduce
      from itertools import chain
      from typing import Callable, Dict, Generic, List, Optional, Set, Tuple, Any, Generator, TypeVar, Iterator, Iterable, Type, Literal
      from collections import Counter, defaultdict

      from ..interface import GSS, T, Acc, NewAcc, Mergeable
      from .reference_impl import ReferenceGSS

      # ------------------------------
      # Internal node classes
      # ------------------------------

      type Upper[T, Acc] = UpperBranch[T, Acc] | Interface[T, Acc]


      @dataclass(frozen=True, eq=True)
      class UpperBranch(Generic[T, Acc]):
          children: Dict[T, Dict[int, Upper[T, Acc]]]
          empty: Optional[Acc]
          _max_depth: int = field(init=False)

          def __post_init__(self):
              depth = max(child._max_depth for child in self._all_children()) + 1 if self.children else 0
              object.__setattr__(self, '_max_depth', depth)

          def __hash__(self) -> int:
              frozen_children = frozenset(
                  (k, frozenset(v.items())) for k, v in self.children.items()
              )
              return hash((frozen_children, self.empty))

          def _all_children(self) -> Iterator[Upper[T, Acc]]:
              """Returns an iterator over all child nodes."""
              for children_at_depth in self.children.values():
                  yield from children_at_depth.values()


      @dataclass(frozen=True, eq=True)
      class Lower(Generic[T]):
          children: Dict[T, Dict[int, 'Lower[T]']]
          empty: bool
          _max_depth: int = field(init=False)

          def __post_init__(self):
              depth = max(child._max_depth for child in self._all_children()) + 1 if self.children else 0
              object.__setattr__(self, '_max_depth', depth)

          def __hash__(self) -> int:
              frozen_children = frozenset(
                  (k, frozenset(v.items())) for k, v in self.children.items()
              )
              return hash((frozen_children, self.empty))

          def _all_children(self) -> Iterator['Lower[T]']:
              for v_children in self.children.values():
                  yield from v_children.values()


      @dataclass(frozen=True, eq=True)
      class Interface(Generic[T, Acc]):
          inner: Lower[T]
          acc: Acc
          _max_depth: int = field(init=False)

          def __post_init__(self):
              # If there are no lower edges, depth is 0; otherwise it's inner._max_depth + 1
              depth = self.inner._max_depth + 1 if self.inner.children else 0
              object.__setattr__(self, '_max_depth', depth)

          def _all_children(self) -> Iterator[Lower[T]]:
              # For compatibility with the old shape, expose the immediate lower children
              for v_children in self.inner.children.values():
                  yield from v_children.values()


      @dataclass(frozen=True)
      class LeveledGSSStats(Generic[T, Acc]):
          # Stack-level statistics
          top_values: Set[T]

          # Structure-level statistics (unique nodes/edges in the DAG)
          num_upperbranch_nodes: int
          num_interface_nodes: int
          num_lower_nodes: int
          total_unique_nodes: int

          upper_edges: int                      # UpperBranch -> (Upper | Interface)
          interface_to_lower_edges: int         # Interface -> Lower immediate children (sum of outgoing value-labeled edges)
          lower_edges: int                      # Lower -> Lower
          total_edges: int

          max_upper_depth: int                  # inner._max_depth at root (Upper tree)
          max_lower_depth: int                  # max _max_depth across Lower nodes

          # Value/accumulator coverage
          distinct_values_count: int
          distinct_values: Set[T]
          unique_accumulators_count: int
          unique_accumulators: Set[Acc]
          total_accumulator_instances: int

          # "Empty" flags / terminal interfaces
          num_upper_with_empty: int
          num_interfaces_with_empty: int        # Interfaces whose inner.empty is True
          num_lower_terminal_nodes: int
          num_interface_implicit_terminals: int  # Unused in new model (always 0)

          # Multi-depth slot metrics
          num_multi_depth_slots_upper: int       # Count of (UpperBranch node, value) pairs with >1 children at different depths
          num_multi_depth_slots_lower: int       # Same for the lower layer (Interface and Lower children)
          max_multiplicity_per_value_upper: int
          max_multiplicity_per_value_lower: int

          # Sharing/graph metrics
          average_in_degree: float               # average incoming edges across nodes with at least one incoming edge
          max_in_degree: int
          structural_sharing_factor: float       # edges / max(1, nodes - 1) — >1 implies sharing

          # Potential canonicalization insights (non-fatal)
          promotable_upper_nodes: int            # UpperBranch nodes that could be promoted to Interface

          def _fmt_subset(self, s: Set[Any], max_items: int = 10) -> str:
              if not s:
                  return "{}"
              items = list(s)
              shown = ", ".join(repr(x) for x in items[:max_items])
              suffix = "" if len(items) <= max_items else ", ..."
              return "{" + shown + suffix + "}"

          def _fmt_hist(self, h: Dict[int, int], max_items: int = 12) -> str:
              if not h:
                  return "{}"
              keys = sorted(h.keys())
              shown_pairs = []
              for k in keys[:max_items]:
                  shown_pairs.append(f"{k}:{h[k]}")
              suffix = "" if len(keys) <= max_items else ", ..."
              return "{" + ", ".join(shown_pairs) + suffix + "}"

          def __str__(self) -> str:
              lines: List[str] = []
              lines.append("LeveledGSSStats")
              lines.append(f"- top_values: {len(self.top_values)} distinct -> {self._fmt_subset(self.top_values)}")

              lines.append("- structure:")
              lines.append(f"  nodes: UpperBranch={self.num_upperbranch_nodes}, Interface={self.num_interface_nodes}, Lower={self.num_lower_nodes}, total={self.total_unique_nodes}")
              lines.append(f"  edges: upper={self.upper_edges}, interface_to_lower={self.interface_to_lower_edges}, lower={self.lower_edges}, total={self.total_edges}")
              lines.append(f"  depths: max_upper_depth={self.max_upper_depth}, max_lower_depth={self.max_lower_depth}")

              lines.append("- values/accumulators:")
              lines.append(f"  distinct_values_count={self.distinct_values_count}, sample={self._fmt_subset(self.distinct_values)}")
              lines.append(f"  unique_accumulators_count={self.unique_accumulators_count} (physically stored)")
              lines.append(f"  total_accumulator_instances={self.total_accumulator_instances} (storage slots used)")

              lines.append("- empties/terminals:")
              lines.append(f"  upper_with_empty={self.num_upper_with_empty} (nodes representing a true empty stack)")
              lines.append(f"  interfaces_with_empty={self.num_interfaces_with_empty} (interfaces whose inner.empty is True)")
              lines.append(f"  lower_terminal_nodes={self.num_lower_terminal_nodes} (nodes where a stack can end)")
              lines.append(f"  interface_implicit_terminals={self.num_interface_implicit_terminals} (legacy, expected 0)")

              lines.append("- multi-depth slots:")
              lines.append(f"  num_multi_depth_slots_upper={self.num_multi_depth_slots_upper}, max_multiplicity_per_value_upper={self.max_multiplicity_per_value_upper}")
              lines.append(f"  num_multi_depth_slots_lower={self.num_multi_depth_slots_lower}, max_multiplicity_per_value_lower={self.max_multiplicity_per_value_lower}")

              lines.append("- sharing/graph:")
              lines.append(f"  average_in_degree={self.average_in_degree}, max_in_degree={self.max_in_degree}, structural_sharing_factor={self.structural_sharing_factor}")

              lines.append("- canonicalization opportunities (non-fatal):")
              lines.append(f"  promotable_upper_nodes={self.promotable_upper_nodes}")
              return "\n".join(lines)


      @dataclass(frozen=True, eq=True)
      class LeveledGSS(GSS[T, Acc], Generic[T, Acc]):
          inner: Upper[T, Acc]

          def __post_init__(self):
              if os.environ.get("GSS_TESTER_VALIDATE"):
                  self._validate()

          def _validate(self):
              self._validate_max_depths()
              self._validate_no_promotions()
              self._validate_populated_nodes()

          def _validate_max_depths(self) -> None:
              """Recursively validates that the `_max_depth` of each node is correct."""
              self._validate_depths_node(self.inner)

          def _validate_depths_node(self, node: Upper[T, Acc]) -> None:
              """Recursive helper for validating max_depth on Upper nodes."""
              if isinstance(node, Interface):
                  # Validate depths on the Lower subtree.
                  def _validate_lower_recursively(l: Lower[T]):
                      for children_at_depth in l.children.values():
                          for depth, child in children_at_depth.items():
                              if depth != child._max_depth:
                                  raise ValueError(
                                      "LeveledGSS validation failed: incorrect max_depth for Lower child. "
                                      f"Expected {depth}, got {child._max_depth}. Node: {l}"
                                  )
                              _validate_lower_recursively(child)
                  _validate_lower_recursively(node.inner)
                  return  # Leaf of the upper tree

              # It must be an UpperBranch
              # Recurse on children and check their depths
              for children_at_depth in node.children.values():
                  for depth, child in children_at_depth.items():
                      if depth != child._max_depth:
                          raise ValueError(
                              "LeveledGSS validation failed: incorrect max_depth for Upper child. "
                              f"Expected {depth}, got {child._max_depth}. Node: {node}"
                          )
                      self._validate_depths_node(child)

          def _validate_no_promotions(self) -> None:
              """
              Recursively validates that no UpperBranch nodes can be promoted to an Interface.
              Under the new rule, an UpperBranch can be promoted if all its children are Interfaces
              and the set of accumulators across U.empty (if present) and all children's accs
              has at most one unique value.
              """
              if isinstance(self.inner, UpperBranch):
                  self._validate_promotion_node(self.inner)

          def _validate_promotion_node(self, node: Upper[T, Acc]) -> None:
              """Recursive helper for promotion validation."""
              if isinstance(node, Interface):
                  return  # Leaf of the upper tree

              # It must be an UpperBranch
              # First, recurse on children
              for children_at_depth in node.children.values():
                  for child in children_at_depth.values():
                      self._validate_promotion_node(child)

              # Now, check for promotion condition on the current node
              # All children are Interfaces. Gather all accumulators including U.empty.
              accs: Set[Acc] = set()
              if node.empty is not None:
                  accs.add(node.empty)
              for child in node._all_children():
                  interface_child: Interface[T, Acc] = child  # type: ignore[assignment]
                  accs.add(interface_child.acc)

              if len(accs) == 1:
                  raise ValueError(
                      "LeveledGSS validation failed: an UpperBranch can be promoted to an Interface, "
                      f"indicating a non-canonical structure. Node: {node}"
                  )

          def _validate_populated_nodes(self) -> None:
              """
              Validates that every node represents at least one stack, with the
              exception of the root UpperBranch for an empty GSS.
              """
              # The root can be an empty UpperBranch, which represents an empty GSS.
              if isinstance(self.inner, UpperBranch) and not self.inner.children and self.inner.empty is None:
                  return

              self._validate_node_is_populated(self.inner)

          def _validate_node_is_populated(self, node: Upper[T, Acc] | Lower[T]) -> None:
              """Recursive helper for validation."""
              if isinstance(node, UpperBranch):
                  if not node.children and node.empty is None:
                      raise ValueError(
                          "LeveledGSS validation failed: UpperBranch with no children and no empty accumulator "
                          f"found in a non-root position. Node: {node}"
                      )
                  for children_at_depth in node.children.values():
                      for child in children_at_depth.values():
                          self._validate_node_is_populated(child)
              elif isinstance(node, Interface):
                  if not node.inner.children and not node.inner.empty:
                      raise ValueError(
                          "LeveledGSS validation failed: Interface with no lower children and no empty terminal found. "
                          f"Node: {node}"
                      )
                  for children_at_depth in node.inner.children.values():
                      for child in children_at_depth.values():
                          self._validate_node_is_populated(child)
              elif isinstance(node, Lower):
                  if not node.children and not node.empty:
                      raise ValueError(
                          "LeveledGSS validation failed: Lower node with no children and empty=False found. "
                          f"Node: {node}"
                      )
                  for children_at_depth in node.children.values():
                      for child in children_at_depth.values():
                          self._validate_node_is_populated(child)

          @classmethod
          def from_stacks(cls, stacks: List[Tuple[List[T], Acc]]) -> LeveledGSS[T, Acc]:
              # Use ReferenceGSS to canonicalize stacks by merging accumulators.
              # We access _stacks directly to avoid the sorting done by to_stacks().
              canonical_stacks = ReferenceGSS(stacks)._stacks

              empty_acc: Optional[Acc] = None
              # A simple trie: { val: { "end": Optional[Acc], "sub": <subtrie> } }
              trie: Dict[T, Dict[str, Any]] = {}

              for vals, acc in canonical_stacks:
                  if not vals:
                      empty_acc = acc
                      continue
                  node = trie
                  for i, v in enumerate(reversed(vals)):
                      entry = node.setdefault(v, {"end": None, "sub": {}})
                      if i == len(vals) - 1:
                          # Since input is canonical, there's no need to merge.
                          entry["end"] = acc
                      else:
                          node = entry["sub"]

              def build(d: Dict[T, Dict[str, Any]], root_empty: Optional[Acc] = None) -> Upper[T, Acc]:
                  # Build children recursively
                  children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
                  all_child_nodes: List[Upper[T, Acc]] = []
                  for v, e in d.items():
                      nodes_for_v: List[Upper[T, Acc]] = []
                      end_acc = e.get("end")
                      sub = e.get("sub", {})
                      if end_acc is not None:
                          # Represent a leaf/end-of-stack using an UpperBranch with the accumulator in 'empty', then promote
                          nodes_for_v.append(try_promote(UpperBranch(children={}, empty=end_acc)))
                      if sub:
                          nodes_for_v.append(build(sub))
                      if nodes_for_v:
                          children[v] = {n._max_depth: n for n in nodes_for_v}
                          all_child_nodes.extend(nodes_for_v)

                  # Check for promotion (new rule: include root_empty among accs)
                  if all(isinstance(child, Interface) for child in all_child_nodes):
                      accs: Set[Acc] = set()
                      if root_empty is not None:
                          accs.add(root_empty)
                      for c in all_child_nodes:
                          ic: Interface[T, Acc] = c  # type: ignore[assignment]
                          accs.add(ic.acc)

                      if len(accs) <= 1:
                          the_acc = next(iter(accs)) if accs else None
                          if the_acc is None:
                              # This is a truly empty GSS.
                              return UpperBranch(children={}, empty=None)

                          def build_lower(sub_d: Dict[T, Dict[str, Any]]) -> Lower[T]:
                              l_children: Dict[T, Dict[int, Lower[T]]] = {}
                              for v_l, e_l in sub_d.items():
                                  sub_l = e_l.get("sub", {})
                                  has_end = e_l.get("end") is not None
                                  sub_lower = build_lower(sub_l) if sub_l else Lower(children={}, empty=False)
                                  node_for_v = Lower(children=sub_lower.children, empty=has_end)
                                  l_children[v_l] = {node_for_v._max_depth: node_for_v}
                              return Lower(children=l_children, empty=False)

                          lower_tree = build_lower(d)
                          # Root lower empty is True iff root_empty is present
                          lower_root = Lower(children=lower_tree.children, empty=(root_empty is not None))
                          return Interface(
                              inner=lower_root,
                              acc=the_acc,
                          )

                  return UpperBranch(children=children, empty=root_empty)

              return LeveledGSS(build(trie, empty_acc))

          def to_stacks(self) -> List[Tuple[List[T], Acc]]:
              res: List[Tuple[List[T], Acc]] = []

              def dfs_lower(l: Lower[T], pref: List[T], acc: Acc) -> None:
                  if l.empty:
                      res.append((list(reversed(pref)), acc))
                  for v, kids in l.children.items():
                      for child in kids.values():
                          dfs_lower(child, pref + [v], acc)

              def dfs_upper(u: Upper[T, Acc], pref: List[T]) -> None:
                  if isinstance(u, UpperBranch):
                      if u.empty is not None:
                          res.append((list(reversed(pref)), u.empty))
                      for v, kids in u.children.items():
                          for child in kids.values():
                              dfs_upper(child, pref + [v])
                  elif isinstance(u, Interface):
                      # The interface's inner.empty is for a stack ending at `pref` with acc u.acc
                      if u.inner.empty:
                          res.append((list(reversed(pref)), u.acc))
                      # Explore Lower subtree for extensions
                      for v, kids in u.inner.children.items():
                          for child in kids.values():
                              dfs_lower(child, pref + [v], u.acc)

              dfs_upper(self.inner, [])

              # The internal representation is canonical. We use ReferenceGSS to sort
              # the stacks into a canonical list representation.
              return ReferenceGSS(res).to_stacks()

          def push(self, value: T) -> LeveledGSS[T, Acc]:
              if self.is_empty():
                  return self
              if isinstance(self.inner, Interface):
                  # Wrap the current inner as a single child under 'value'
                  new_lower = Lower(children={value: {self.inner.inner._max_depth: self.inner.inner}}, empty=False)
                  return LeveledGSS(Interface(inner=new_lower, acc=self.inner.acc))
              else:
                  return LeveledGSS(UpperBranch(children={value: {self.inner._max_depth: self.inner}}, empty=None))

          def pop(self) -> LeveledGSS[T, Acc]:
              if isinstance(self.inner, Interface):
                  all_children = list(self.inner._all_children())
                  merged: Lower[T] = reduce(merge_lower, all_children[1:], all_children[0]) if all_children else Lower(children={}, empty=False)
                  if not merged.children and not merged.empty:
                      return LeveledGSS(UpperBranch(children={}, empty=None))
                  else:
                      return LeveledGSS(Interface(inner=merged, acc=self.inner.acc))
              else:
                  all_children = list(self.inner._all_children())
                  merged: UpperBranch[T, Acc] | Interface[T, Acc] = reduce(merge_upper, all_children[1:], all_children[0]) if all_children else UpperBranch(children={}, empty=None)
                  return LeveledGSS(try_promote(merged))

          def popn(self, n: int) -> LeveledGSS[T, Acc]:
              if n <= 0:
                  return self
              if self.is_empty():
                  return self

              # Memoization caches to avoid recomputing on shared subtrees
              memo_upper: Dict[Tuple[int, int], Upper[T, Acc]] = {}
              memo_lower: Dict[Tuple[int, int], Lower[T]] = {}

              def _popn_lower(node: Lower[T], k: int) -> Lower[T]:
                  """Recursively pop k levels from a Lower node."""
                  if k == 0:
                      return node

                  key = (id(node), k)
                  if key in memo_lower:
                      return memo_lower[key]

                  all_children = list(node._all_children())
                  if not all_children:
                      res = Lower(children={}, empty=False)
                      memo_lower[key] = res
                      return res

                  # Recursively pop k-1 from all children and merge the results
                  popped_children = [_popn_lower(child, k - 1) for child in all_children]
                  res = reduce(merge_lower, popped_children[1:], popped_children[0])
                  memo_lower[key] = res
                  return res

              def _popn_upper(node: Upper[T, Acc], k: int) -> Upper[T, Acc]:
                  """Recursively pop k levels from an Upper node."""
                  if k == 0:
                      return node

                  key = (id(node), k)
                  if key in memo_upper:
                      return memo_upper[key]

                  # Base case for recursion: no children to pop from
                  all_children: List[Upper[T, Acc]] | List[Lower[T]] = list(node._all_children())
                  if not all_children:
                      res = UpperBranch(children={}, empty=None)
                      memo_upper[key] = res
                      return res

                  if isinstance(node, Interface):
                      # For an Interface, we pop k levels from its Lower subtree.
                      # The Interface node itself doesn't represent a stack item/level.
                      popped_lower = _popn_lower(node.inner, k)
                      if not popped_lower.children and not popped_lower.empty:
                          res = UpperBranch(children={}, empty=None)
                      else:
                          res = Interface(inner=popped_lower, acc=node.acc)
                  else:  # UpperBranch
                      # For an UpperBranch, we pop k-1 levels from its Upper children
                      all_children = list(node._all_children())
                      popped_upper_children = [_popn_upper(child, k - 1) for child in all_children]
                      merged = reduce(merge_upper, popped_upper_children[1:], popped_upper_children[0])
                      res = try_promote(merged)

                  memo_upper[key] = res
                  return res

              return LeveledGSS(_popn_upper(self.inner, n))

          def is_empty(self) -> bool:
              # An empty GSS is represented by an UpperBranch with no children and no empty accumulator.
              if isinstance(self.inner, UpperBranch):
                  return not self.inner.children and self.inner.empty is None
              # An Interface always represents at least one stack, as it has an accumulator and/or lower.empty is True.
              return False

          def isolate(self, value: Optional[T]) -> LeveledGSS[T, Acc]:
              if value is None:
                  # Keep only empty stacks.
                  if isinstance(self.inner, UpperBranch):
                      empty_acc = self.inner.empty
                  else:
                      empty_acc = self.inner.acc if self.inner.inner.empty else None
                  new_root = UpperBranch(children={}, empty=empty_acc)
                  # Promote to canonical form if applicable (avoids validator errors).
                  return LeveledGSS(try_promote(new_root))

              # Keep stacks with `value` at the top.
              if isinstance(self.inner, UpperBranch):
                  filtered_children = {value: self.inner.children[value]} if value in self.inner.children else {}
                  return LeveledGSS(try_promote(UpperBranch(children=filtered_children, empty=None)))
              else:
                  if value not in self.inner.inner.children:
                      return LeveledGSS(UpperBranch(children={}, empty=None))
                  else:
                      filtered_children = {value: self.inner.inner.children[value]}
                      return LeveledGSS(Interface(inner=Lower(children=filtered_children, empty=False), acc=self.inner.acc))

          def isolate_many(self, values: Iterable[Optional[T]]) -> LeveledGSS[T, Acc]:
              values_set = set(values)

              if isinstance(self.inner, UpperBranch):
                  new_empty: Optional[Acc] = self.inner.empty if None in values_set else None
                  filtered_children = {
                      v: kids for v, kids in self.inner.children.items() if v in values_set
                  }
                  new_inner = try_promote(UpperBranch(children=filtered_children, empty=new_empty))
                  return LeveledGSS(new_inner)
              else:  # The root is an Interface
                  keep_empty = (None in values_set) and self.inner.inner.empty
                  filtered_children = {
                      v: kids for v, kids in self.inner.inner.children.items() if v in values_set
                  }

                  if filtered_children or keep_empty:
                      new_lower = Lower(children=filtered_children, empty=keep_empty)
                      new_inner = Interface(inner=new_lower, acc=self.inner.acc)
                      return LeveledGSS(new_inner)
                  else:
                      # No stacks remain.
                      new_inner = try_promote(UpperBranch(children={}, empty=None))
                      return LeveledGSS(new_inner)

          def filter_by_length(self, min_len: Optional[int] = None, max_len: Optional[int] = None) -> LeveledGSS[T, Acc]:
              _min = min_len if min_len is not None else 0
              _max = max_len if max_len is not None else float('inf')

              memo: Dict[Tuple[str, int, int], Optional[Any]] = {}

              def _filter_lower(node: Lower[T], depth: int) -> Optional[Lower[T]]:
                  key = ('L', id(node), depth)
                  if key in memo:
                      return memo[key]

                  if depth > _max:
                      memo[key] = None
                      return None

                  keep_empty = node.empty and _min <= depth <= _max

                  new_children: Dict[T, Dict[int, Lower[T]]] = {}
                  if depth < _max:
                      for v, kids in node.children.items():
                          new_kids_for_v: Dict[int, Lower[T]] = {}
                          for d, child in kids.items():
                              new_child = _filter_lower(child, depth + 1)
                              if new_child:
                                  new_kids_for_v[new_child._max_depth] = new_child
                          if new_kids_for_v:
                              new_children[v] = new_kids_for_v

                  if not new_children and not keep_empty:
                      memo[key] = None
                      return None

                  if new_children == node.children and keep_empty == node.empty:
                      memo[key] = node
                      return node

                  res = Lower(children=new_children, empty=keep_empty)
                  memo[key] = res
                  return res

              def _filter_upper(node: Upper[T, Acc], depth: int) -> Optional[Upper[T, Acc]]:
                  key = ('U', id(node), depth)
                  if key in memo:
                      return memo[key]

                  if depth > _max:
                      memo[key] = None
                      return None

                  if isinstance(node, Interface):
                      keep_empty = node.inner.empty and _min <= depth <= _max

                      new_children: Dict[T, Dict[int, Lower[T]]] = {}
                      if depth < _max:
                          for v, kids in node.inner.children.items():
                              new_kids_for_v: Dict[int, Lower[T]] = {}
                              for d, child in kids.items():
                                  new_child = _filter_lower(child, depth + 1)
                                  if new_child:
                                      new_kids_for_v[new_child._max_depth] = new_child
                              if new_kids_for_v:
                                  new_children[v] = new_kids_for_v

                      if not new_children and not keep_empty:
                          memo[key] = None
                          return None

                      if new_children == node.inner.children and keep_empty == node.inner.empty:
                          memo[key] = node
                          return node

                      res = Interface(inner=Lower(children=new_children, empty=keep_empty), acc=node.acc)
                      memo[key] = res
                      return res

                  # UpperBranch
                  keep_empty = node.empty is not None and _min <= depth <= _max
                  new_empty = node.empty if keep_empty else None

                  new_children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
                  for v, kids in node.children.items():
                      new_kids_for_v: Dict[int, Upper[T, Acc]] = {}
                      for d, child in kids.items():
                          new_child = _filter_upper(child, depth + 1)
                          if new_child:
                              new_kids_for_v[new_child._max_depth] = new_child
                      if new_kids_for_v:
                          new_children[v] = new_kids_for_v

                  if not new_children and not keep_empty:
                      memo[key] = None
                      return None

                  if new_children == node.children and new_empty == node.empty:
                      memo[key] = node
                      return node

                  res = try_promote(UpperBranch(children=new_children, empty=new_empty))
                  memo[key] = res
                  return res

              new_inner = _filter_upper(self.inner, 0)
              if new_inner is None:
                  return self.empty()
              return LeveledGSS(new_inner)

          def apply(self, func: Callable[[Acc], NewAcc], memo: Optional[Dict[int, Any]] = None) -> LeveledGSS[T, NewAcc]:
              if memo is None:
                  memo = {}

              def transform(node: Upper[T, Acc]) -> Upper[T, NewAcc]:
                  if id(node) in memo:
                      return memo[id(node)]

                  if isinstance(node, Interface):
                      new_acc = func(node.acc)
                      res = Interface(inner=node.inner, acc=new_acc)
                      memo[id(node)] = res
                      return res

                  # It's an UpperBranch
                  assert isinstance(node, UpperBranch)
                  new_empty = func(node.empty) if node.empty is not None else None
                  new_children: Dict[T, Dict[int, Upper[T, NewAcc]]] = {}

                  for v, kids in node.children.items():
                      new_kids_for_v: Dict[int, Upper[T, NewAcc]] = {}
                      for d, child in kids.items():
                          new_child = transform(child)
                          new_kids_for_v[new_child._max_depth] = new_child
                      new_children[v] = new_kids_for_v

                  res = UpperBranch(children=new_children, empty=new_empty)
                  promoted = try_promote(res)
                  memo[id(node)] = promoted
                  return promoted

              return LeveledGSS(transform(self.inner))  # type: ignore[arg-type]

          def prune(self, predicate: Callable[[Acc], bool], memo: Optional[Dict[int, Any]] = None) -> LeveledGSS[T, Acc]:
              if memo is None:
                  memo = {}

              def transform(node: Upper[T, Acc]) -> Optional[Upper[T, Acc]]:
                  if id(node) in memo:
                      return memo[id(node)]

                  if isinstance(node, Interface):
                      keep_acc = predicate(node.acc)

                      if not keep_acc:
                          memo[id(node)] = None
                          return None

                      # Acc kept; nothing else to prune at this node since lower carries no accumulators.
                      memo[id(node)] = node
                      return node

                  # It's an UpperBranch
                  new_empty = node.empty if node.empty is not None and predicate(node.empty) else None
                  changed = new_empty != node.empty

                  new_children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
                  for v, kids in node.children.items():
                      new_kids_for_v: Dict[int, Upper[T, Acc]] = {}
                      child_map_changed = False
                      for d, child in kids.items():
                          new_child = transform(child)
                          if new_child is not child:
                              child_map_changed = True
                          if new_child is not None:
                              new_kids_for_v[new_child._max_depth] = new_child

                      if len(new_kids_for_v) != len(kids):
                          child_map_changed = True

                      if child_map_changed:
                          changed = True
                          if new_kids_for_v:
                              new_children[v] = new_kids_for_v
                      else:
                          new_children[v] = kids  # Reuse

                  if not changed:
                      memo[id(node)] = node
                      return node

                  if not new_children and new_empty is None:
                      memo[id(node)] = None
                      return None

                  res = UpperBranch(children=new_children, empty=new_empty)
                  promoted = try_promote(res)
                  memo[id(node)] = promoted
                  return promoted

              res_inner = transform(self.inner)
              if res_inner is None:
                  return LeveledGSS(UpperBranch(children={}, empty=None))
              return LeveledGSS(res_inner)

          def apply_and_prune(self, mutator: Callable[[Acc], Optional[NewAcc]], memo: Optional[Dict[int, Any]] = None) -> LeveledGSS[T, NewAcc]:
              """
              Fast single-pass implementation of apply_and_prune for LeveledGSS.
              - mutator(acc) -> Optional[NewAcc]
                  * return None to prune stacks carrying `acc`
                  * return NewAcc (possibly unchanged) to keep/update stacks
              This fuses the behavior of `apply` and `prune` and minimizes reconstruction.
              """
              acc_cache: Dict[int, Optional[NewAcc]] = {}

              def mutate_acc(a: Acc) -> Optional[NewAcc]:
                  k = id(a)
                  if k in acc_cache:
                      return acc_cache[k]
                  r = mutator(a)
                  acc_cache[k] = r
                  return r

              if memo is None:
                  memo = {}

              def transform(node: Upper[T, Acc]) -> Optional[Upper[T, NewAcc]]:
                  nid = id(node)
                  if nid in memo:
                      return memo[nid]

                  if isinstance(node, Interface):
                      # Mutate/prune the primary accumulator
                      new_acc_opt = mutate_acc(node.acc)

                      if new_acc_opt is None:
                          memo[nid] = None
                          return None

                      # keep_acc is True
                      new_acc = new_acc_opt  # type: ignore[assignment]
                      res = Interface(inner=node.inner, acc=new_acc)
                      memo[nid] = res
                      return res

                  # UpperBranch
                  new_empty_opt = mutate_acc(node.empty) if node.empty is not None else None
                  new_children: Dict[T, Dict[int, Upper[T, NewAcc]]] = {}

                  for v, kids in node.children.items():
                      new_kids_for_v: Dict[int, Upper[T, NewAcc]] = {}
                      for d, child in kids.items():
                          new_child = transform(child)
                          if new_child is not None:
                              new_kids_for_v[new_child._max_depth] = new_child
                      if new_kids_for_v:
                          new_children[v] = new_kids_for_v

                  if not new_children and new_empty_opt is None:
                      memo[nid] = None
                      return None

                  res = UpperBranch(children=new_children, empty=new_empty_opt)
                  promoted = try_promote(res)
                  memo[nid] = promoted
                  return promoted

              res_inner = transform(self.inner)
              if res_inner is None:
                  return LeveledGSS(UpperBranch(children={}, empty=None))  # type: ignore[arg-type]
              return LeveledGSS(res_inner)

          def merge(self, other: LeveledGSS[T, Acc]) -> LeveledGSS[T, Acc]:
              return LeveledGSS(merge_upper(self.inner, other.inner))

          def fuse(self, levels: Optional[int | Literal["to_interface"]] = None, memo: Optional[Dict] = None) -> LeveledGSS[T, Acc]:
              if isinstance(levels, int) and levels <= 0:
                  return self
              if memo is None:
                  memo = {}

              def fuse_lower_node(node: Lower[T], remain: Optional[int | Literal["to_interface"]]) -> Lower[T]:
                  if remain == "to_interface":
                      return node
                  key = ('L', id(node), remain)
                  cached = memo.get(key)
                  if cached is not None:
                      return cached
                  if isinstance(remain, int) and remain == 0:
                      memo[key] = node
                      return node

                  next_remain: Optional[int | Literal["to_interface"]]
                  if isinstance(remain, int):
                      next_remain = None if remain is None else remain - 1
                  else:
                      next_remain = remain

                  has_multi_depth_slots = any(len(kids) > 1 for kids in node.children.values())

                  new_children_by_value: Dict[T, List[Lower[T]]] = defaultdict(list)
                  children_changed = False
                  for v, kids in node.children.items():
                      for child in kids.values():
                          fused_child = fuse_lower_node(child, next_remain)
                          if fused_child is not child:
                              children_changed = True
                          new_children_by_value[v].append(fused_child)

                  if not has_multi_depth_slots and not children_changed:
                      memo[key] = node
                      return node

                  final_children: Dict[T, Dict[int, Lower[T]]] = {}
                  for v, fused_kids in new_children_by_value.items():
                      if not fused_kids:
                          continue
                      merged_child = reduce(merge_lower, fused_kids[1:], fused_kids[0])
                      final_children[v] = {merged_child._max_depth: merged_child}

                  res = Lower(children=final_children, empty=node.empty)
                  memo[key] = res
                  return res

              def fuse_upper_node(node: Upper[T, Acc], remain: Optional[int | Literal["to_interface"]]) -> Upper[T, Acc]:
                  key = ('U', id(node), remain)
                  cached = memo.get(key)
                  if cached is not None:
                      return cached
                  if isinstance(remain, int) and remain == 0:
                      memo[key] = node
                      return node

                  next_remain: Optional[int | Literal["to_interface"]]
                  if isinstance(remain, int):
                      next_remain = None if remain is None else remain - 1
                  else:
                      next_remain = remain

                  if isinstance(node, Interface):
                      has_multi_depth_slots = any(len(kids) > 1 for kids in node.inner.children.values())
                      fused_lower = fuse_lower_node(node.inner, next_remain)
                      if not has_multi_depth_slots and fused_lower is node.inner:
                          memo[key] = node
                          return node
                      res: Upper[T, Acc] = Interface(inner=fused_lower, acc=node.acc)
                      memo[key] = res
                      return res
                  else:
                      has_multi_depth_slots = any(len(kids) > 1 for kids in node.children.values())

                      new_children_by_value: Dict[T, List[Upper[T, Acc]]] = defaultdict(list)
                      children_changed = False
                      for v, kids in node.children.items():
                          for child in kids.values():
                              fused_child = fuse_upper_node(child, next_remain)
                              if fused_child is not child:
                                  children_changed = True
                              new_children_by_value[v].append(fused_child)

                      if not has_multi_depth_slots and not children_changed:
                          memo[key] = node
                          return node

                      final_children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
                      for v, fused_kids in new_children_by_value.items():
                          if not fused_kids:
                              continue
                          merged_child_u = reduce(merge_upper, fused_kids[1:], fused_kids[0])
                          final_children[v] = {merged_child_u._max_depth: merged_child_u}

                      res_branch = UpperBranch(children=final_children, empty=node.empty)
                      res_promoted = try_promote(res_branch)
                      memo[key] = res_promoted
                      return res_promoted

              new_inner = fuse_upper_node(self.inner, levels)
              if new_inner is self.inner:
                  return self
              return LeveledGSS(new_inner)

          def peek(self) -> Set[T]:
              if isinstance(self.inner, Interface):
                  return set(self.inner.inner.children.keys())
              else:
                  return set(self.inner.children.keys())

          def reduce_acc(self) -> Optional[Acc]:
              # 1. Collect unique accumulator objects by their ID to avoid redundant merges
              # of the same object, and to be proportional to unique accs, not total stacks.
              unique_acc_objects: Dict[int, Acc] = {}
              visited_nodes: Set[int] = set()

              # Use a queue for iterative traversal to avoid recursion depth issues.
              queue: List[Upper[T, Acc]] = [self.inner]

              while queue:
                  node = queue.pop()
                  node_id = id(node)
                  if node_id in visited_nodes:
                      continue
                  visited_nodes.add(node_id)

                  if isinstance(node, Interface):
                      unique_acc_objects[id(node.acc)] = node.acc
                      # No need to traverse children, they are Lower nodes without accumulators.
                  elif isinstance(node, UpperBranch):
                      if node.empty is not None:
                          unique_acc_objects[id(node.empty)] = node.empty
                      # Recurse into children.
                      for children_at_depth in node.children.values():
                          for child in children_at_depth.values():
                              queue.append(child)

              accumulators = list(unique_acc_objects.values())

              # 2. Merge the collected unique accumulators.
              if not accumulators:
                  return None

              if len(accumulators) == 1:
                  return accumulators[0]

              return reduce(_merge_acc, accumulators)

          def max_depth(self) -> int:
              """Returns the maximum length of any stack in the GSS."""
              if isinstance(self.inner, UpperBranch):
                  # For UpperBranch, _max_depth is the maximum stack length.
                  return self.inner._max_depth
              else:
                  # For Interface, the maximum stack length is the max depth of the lower tree.
                  return self.inner.inner._max_depth

          def stats(self) -> LeveledGSSStats[T, Acc]:
              """
              Compute a comprehensive set of statistics for this LeveledGSS.
              This operation is efficient and does not enumerate all stacks, focusing on structural properties.
              """
              if isinstance(self.inner, Interface):
                  top_values: Set[T] = set(self.inner.inner.children.keys())
              else:
                  top_values = set(self.inner.children.keys())

              # --------------------
              # Structural scan (unique nodes/edges, depths, values, accumulators, multi-depth slots, sharing)
              # --------------------
              visited_upperbranch: Set[int] = set()
              visited_interface: Set[int] = set()
              visited_lower: Set[int] = set()

              num_upperbranch_nodes = 0
              num_interface_nodes = 0
              num_lower_nodes = 0

              upper_edges = 0
              interface_to_lower_edges = 0  # counts immediate edges (value-labeled) from interfaces to their lower children
              lower_edges = 0

              distinct_values: Set[T] = set()
              unique_accumulators: Set[Acc] = set()
              total_accumulator_instances = 0

              num_upper_with_empty = 0
              num_interfaces_with_empty = 0
              num_lower_terminal_nodes = 0
              num_interface_implicit_terminals = 0  # Not applicable in new model

              num_multi_depth_slots_upper = 0
              num_multi_depth_slots_lower = 0
              max_multiplicity_per_value_upper = 1
              max_multiplicity_per_value_lower = 1

              max_lower_depth = 0

              incoming_edges: Dict[int, int] = {}

              def bump_incoming(child_obj: Any) -> None:
                  cid = id(child_obj)
                  incoming_edges[cid] = incoming_edges.get(cid, 0) + 1

              # Promotable UpperBranch nodes
              promotable_upper_nodes = 0

              def is_promotable(node: UpperBranch[T, Acc]) -> bool:
                  all_children = list(node._all_children())
                  if not all_children:
                      # Under new rule, leaf UpperBranch with an empty acc is promotable.
                      return node.empty is not None
                  if not all(isinstance(c, Interface) for c in all_children):
                      return False
                  accs: Set[Acc] = set()
                  if node.empty is not None:
                      accs.add(node.empty)
                  for c in all_children:
                      ic: Interface[T, Acc] = c  # type: ignore[assignment]
                      accs.add(ic.acc)
                  return len(accs) == 1

              # Traverse graph collecting the structural stats
              # Use queues to ensure we visit each UNIQUE node once for node-level data,
              # but we still count edges (which are properties of parents) when visiting each unique parent.
              upper_queue: List[Upper[T, Acc]] = [self.inner]
              lower_queue: List[Lower[T]] = []

              while upper_queue:
                  node = upper_queue.pop()
                  if isinstance(node, UpperBranch):
                      nid = id(node)
                      if nid not in visited_upperbranch:
                          visited_upperbranch.add(nid)
                          num_upperbranch_nodes += 1
                          if node.empty is not None:
                              num_upper_with_empty += 1
                              unique_accumulators.add(node.empty)
                              total_accumulator_instances += 1
                          # edges and values
                          for v, kids in node.children.items():
                              distinct_values.add(v)
                              # multi-depth slot counting for upper layer
                              if len(kids) > 1:
                                  num_multi_depth_slots_upper += 1
                                  if len(kids) > max_multiplicity_per_value_upper:
                                      max_multiplicity_per_value_upper = len(kids)
                              for child in kids.values():
                                  upper_edges += 1
                                  bump_incoming(child)
                                  upper_queue.append(child)
                          # promotable?
                          if is_promotable(node):
                              promotable_upper_nodes += 1
                  else:
                      # Interface
                      nid = id(node)
                      if nid not in visited_interface:
                          visited_interface.add(nid)
                          num_interface_nodes += 1
                          unique_accumulators.add(node.acc)
                          total_accumulator_instances += 1
                          if node.inner.empty:
                              num_interfaces_with_empty += 1
                          # edges to lower children and values
                          for v, kids in node.inner.children.items():
                              distinct_values.add(v)
                              # multi-depth slot counting for lower layer at interface boundary
                              if len(kids) > 1:
                                  num_multi_depth_slots_lower += 1
                                  if len(kids) > max_multiplicity_per_value_lower:
                                      max_multiplicity_per_value_lower = len(kids)
                              for child in kids.values():
                                  interface_to_lower_edges += 1
                                  bump_incoming(child)
                                  lower_queue.append(child)

              while lower_queue:
                  node = lower_queue.pop()
                  nid = id(node)
                  if nid in visited_lower:
                      continue
                  visited_lower.add(nid)
                  num_lower_nodes += 1
                  if node.empty:
                      num_lower_terminal_nodes += 1
                  if node._max_depth > max_lower_depth:
                      max_lower_depth = node._max_depth
                  # edges and values
                  for v, kids in node.children.items():
                      distinct_values.add(v)
                      # multi-depth at lower layer
                      if len(kids) > 1:
                          num_multi_depth_slots_lower += 1
                          if len(kids) > max_multiplicity_per_value_lower:
                              max_multiplicity_per_value_lower = len(kids)
                      for child in kids.values():
                          lower_edges += 1
                          bump_incoming(child)
                          lower_queue.append(child)

              total_unique_nodes = num_upperbranch_nodes + num_interface_nodes + num_lower_nodes
              total_edges = upper_edges + interface_to_lower_edges + lower_edges
              max_upper_depth = self.inner._max_depth
              distinct_values_count = len(distinct_values)
              unique_accumulators_count = len(unique_accumulators)

              # Sharing metrics
              if incoming_edges:
                  max_in_degree = max(incoming_edges.values())
                  # average over nodes that actually have an incoming edge
                  average_in_degree = sum(incoming_edges.values()) / len(incoming_edges)
              else:
                  max_in_degree = 0
                  average_in_degree = 0.0
              structural_sharing_factor = total_edges / float(max(1, total_unique_nodes - 1))

              return LeveledGSSStats(
                  top_values=top_values,
                  num_upperbranch_nodes=num_upperbranch_nodes,
                  num_interface_nodes=num_interface_nodes,
                  num_lower_nodes=num_lower_nodes,
                  total_unique_nodes=total_unique_nodes,
                  upper_edges=upper_edges,
                  interface_to_lower_edges=interface_to_lower_edges,
                  lower_edges=lower_edges,
                  total_edges=total_edges,
                  max_upper_depth=max_upper_depth,
                  max_lower_depth=max_lower_depth,
                  distinct_values_count=distinct_values_count,
                  distinct_values=distinct_values,
                  unique_accumulators_count=unique_accumulators_count,
                  unique_accumulators=unique_accumulators,
                  total_accumulator_instances=total_accumulator_instances,
                  num_upper_with_empty=num_upper_with_empty,
                  num_interfaces_with_empty=num_interfaces_with_empty,
                  num_lower_terminal_nodes=num_lower_terminal_nodes,
                  num_interface_implicit_terminals=num_interface_implicit_terminals,
                  num_multi_depth_slots_upper=num_multi_depth_slots_upper,
                  num_multi_depth_slots_lower=num_multi_depth_slots_lower,
                  max_multiplicity_per_value_upper=max_multiplicity_per_value_upper,
                  max_multiplicity_per_value_lower=max_multiplicity_per_value_lower,
                  average_in_degree=average_in_degree,
                  max_in_degree=max_in_degree,
                  structural_sharing_factor=structural_sharing_factor,
                  promotable_upper_nodes=promotable_upper_nodes,
              )

          def to_graph_string(self, memo: Optional[Set[int]] = None, upper_only: bool = False) -> str:
              """
              Generates a pretty, indented string representation of the GSS structure.
              Nodes are expanded inline on first appearance. Subsequent encounters are
              represented as references to avoid redundancy and cycles.

              Args:
                  memo: An optional set of node IDs (from id()) that have already been
                        printed. This method will mutate the set by adding IDs of
                        nodes it prints. This allows for coherent printing of multiple
                        GSS structures that share nodes.
                  upper_only: If True, do not expand Lower nodes from Interface nodes.
              """
              if memo is None:
                  memo = set()
              printed_nodes = memo  # Use the provided or a new memo
              output_lines: List[str] = []

              def _get_node_info(node: Any) -> str:
                  node_type = type(node).__name__
                  info = f"{node_type} @ {hex(id(node))} (MaxDepth: {node._max_depth})"
                  if isinstance(node, Interface):
                      info += f" | acc: {repr(node.acc)}"

                  terminal_info = ""
                  if isinstance(node, UpperBranch):
                      if node.empty is not None:
                          terminal_info = f" [TERMINAL empty: {repr(node.empty)}]"
                  elif isinstance(node, Interface):
                      if node.inner.empty:
                          terminal_info = f" [TERMINAL via acc: {repr(node.acc)}]"
                  elif isinstance(node, Lower):
                      if node.empty:
                          terminal_info = " [TERMINAL]"

                  return info + terminal_info

              def _format_recursive(node: Any, current_prefix: str):
                  # This node is being expanded now, so future encounters will be refs.
                  printed_nodes.add(id(node))

                  # Collect children edges to be printed for this node
                  children_to_print = []
                  child_map: Optional[Dict[T, Dict[int, Any]]] = None
                  if isinstance(node, Interface):
                      child_map = node.inner.children
                  elif hasattr(node, 'children') and node.children:
                      child_map = node.children  # type: ignore[assignment]

                  if child_map:
                      if not (upper_only and isinstance(node, Interface)):
                          sorted_children = sorted(child_map.items())
                          for v, kids_at_depths in sorted_children:
                              sorted_kids = sorted(kids_at_depths.items())
                              for depth, child in sorted_kids:
                                  label = f"Edge {repr(v)} (d={depth})"
                                  children_to_print.append((label, child))

                  # Iterate through the collected children and format them
                  for i, (label, child) in enumerate(children_to_print):
                      is_last = (i == len(children_to_print) - 1)
                      prefix_char = "└── " if is_last else "├── "

                      child_id = id(child)
                      if child_id in printed_nodes:
                          # Already expanded elsewhere, just print a reference
                          line = current_prefix + prefix_char + label + f" -> Ref to Node @ {hex(child_id)}"
                          output_lines.append(line)
                      else:
                          # New node, expand it recursively
                          line = current_prefix + prefix_char + label + f" -> {_get_node_info(child)}"
                          output_lines.append(line)

                          # Prepare prefix for the next level of recursion
                          child_prefix = current_prefix + ("    " if is_last else "│   ")
                          _format_recursive(child, child_prefix)

                  if upper_only and isinstance(node, Interface) and node.inner.children:
                      prefix_char = "└── "
                      num_lower_edges = sum(len(kids) for kids in node.inner.children.values())
                      line = current_prefix + prefix_char + f"[{num_lower_edges} lower edges omitted]"
                      output_lines.append(line)

              # Start the process from the root node
              root = self.inner
              root_id = id(root)
              if root_id in printed_nodes:
                  output_lines.append(f"--- Root -> Ref to Node @ {hex(root_id)} ---")
              else:
                  output_lines.append(f"--- Root {_get_node_info(root)} ---")
                  _format_recursive(root, "")

              return "\n".join(output_lines)


      Node = TypeVar("Node")
      AccPromote = TypeVar("AccPromote", bound="Mergeable")

      def _merge_optional_acc(a: Optional[Acc], b: Optional[Acc]) -> Optional[Acc]:
          if a is None:
              return b
          if b is None:
              return a
          return a.merge(b)

      def _merge_acc(a: Acc, b: Acc) -> Acc:
          return a if a is b else a.merge(b)

      def _merge_children_by_depth(
          c1: Dict[T, Dict[int, Node]],
          c2: Dict[T, Dict[int, Node]],
          merge_func: Callable[[Node, Node], Node],
      ) -> Dict[T, Dict[int, Node]]:
          if c1 is c2:
              return c1
          merged_children: Dict[T, Dict[int, Node]] = {}
          all_vals = c1.keys() | c2.keys()
          for v in all_vals:
              nodes_by_depth: Dict[int, list[Node]] = defaultdict(list)
              children_c1 = c1.get(v, {}).items()
              children_c2 = c2.get(v, {}).items()
              for depth, child in chain(children_c1, children_c2):
                  nodes_by_depth[depth].append(child)
              if not nodes_by_depth:
                  continue
              v_out = {
                  (merged := reduce(merge_func, nodes))._max_depth: merged
                  for nodes in nodes_by_depth.values()
              }
              merged_children[v] = v_out
          return merged_children

      def try_promote(node: Upper[T, AccPromote]) -> Upper[T, AccPromote]:
          if isinstance(node, Interface):
              return node
          all_children: List[Upper[T, AccPromote]] = list(node._all_children())
          if not all_children:
              # Leaf UpperBranch: if it represents an explicit empty stack (empty is not None),
              # it can be represented canonically as an Interface with inner.empty=True and no children.
              if node.empty is not None:
                  return Interface(inner=Lower(children={}, empty=True), acc=node.empty)
              return node
          if not all(isinstance(c, Interface) for c in all_children):
              return node

          accs: Set[AccPromote] = set()
          if node.empty is not None:
              accs.add(node.empty)
          for c in all_children:
              ic: Interface[T, AccPromote] = c  # type: ignore[assignment]
              accs.add(ic.acc)

          if len(accs) <= 1:
              the_acc: Optional[AccPromote] = next(iter(accs)) if accs else None
              if the_acc is None:
                  return UpperBranch(children={}, empty=None)
              l_children: Dict[T, Dict[int, Lower[T]]] = {}
              for v, kids in node.children.items():
                  v_map: Dict[int, Lower[T]] = {}
                  for child in kids.values():
                      ci: Interface[T, AccPromote] = child  # type: ignore[assignment]
                      inner = ci.inner
                      v_map[inner._max_depth] = inner
                  if v_map:
                      l_children[v] = v_map
              lower_root = Lower(children=l_children, empty=(node.empty is not None))
              return Interface(inner=lower_root, acc=the_acc)
          return node

      def interface_to_upperbranch(it: Interface[T, Acc]) -> UpperBranch[T, Acc]:
          children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
          for v, kids in it.inner.children.items():
              v_map: Dict[int, Upper[T, Acc]] = {}
              for lchild in kids.values():
                  ci = Interface(
                      inner=lchild,
                      acc=it.acc,
                  )
                  v_map[ci._max_depth] = ci
              if v_map:
                  children[v] = v_map
          new_empty = it.acc if it.inner.empty else None
          return UpperBranch(children=children, empty=new_empty)

      def merge_upper(u1: Upper[T, Acc], u2: Upper[T, Acc]) -> Upper[T, Acc]:
          if u1 is u2:
              return u1
          # If both are the same type, use the appropriate merge function
          if isinstance(u1, Interface) and isinstance(u2, Interface):
              return merge_interfaces(u1, u2)
          if isinstance(u1, UpperBranch) and isinstance(u2, UpperBranch):
              return merge_upperbranches(u1, u2)
          # Mixed types: convert Interface(s) to UpperBranch and merge
          ub1 = u1 if isinstance(u1, UpperBranch) else interface_to_upperbranch(u1)
          ub2 = u2 if isinstance(u2, UpperBranch) else interface_to_upperbranch(u2)
          return merge_upperbranches(ub1, ub2)  # type: ignore[arg-type]

      def merge_upperbranches(a: UpperBranch[T, Acc], b: UpperBranch[T, Acc]) -> Upper[T, Acc]:
          if a is b:
              return a
          new_empty = _merge_optional_acc(a.empty, b.empty)
          merged_children = _merge_children_by_depth(a.children, b.children, merge_upper)
          return try_promote(UpperBranch(children=merged_children, empty=new_empty))

      def merge_interfaces(a: Interface[T, Acc], b: Interface[T, Acc]) -> Upper[T, Acc]:
          # Only safe to keep as Interface if either:
          #  - both represent exactly the same set of stacks (inner identity),
          #  - or both already have the same accumulator.
          # Otherwise, converting to UpperBranch preserves per-stack accumulator distinctions.
          if a.acc == b.acc or a.inner is b.inner:
              merged_lower = merge_lower(a.inner, b.inner)
              new_acc = _merge_acc(a.acc, b.acc)
              return Interface(inner=merged_lower, acc=new_acc)
          return merge_upperbranches(interface_to_upperbranch(a), interface_to_upperbranch(b))

      def merge_lower(l1: Lower[T], l2: Lower[T]) -> Lower[T]:
          # Fast paths
          if l1 is l2:
              return l1
          new_empty = l1.empty or l2.empty
          merged_children = _merge_children_by_depth(l1.children, l2.children, merge_lower)
          return Lower(children=merged_children, empty=new_empty)


      def lower_to_upper(l: Lower[T], acc: Acc) -> Upper[T, Acc]:
          # Convert a Lower subtree to an Upper subtree; the accumulator for all stacks is 'acc'.
          children: Dict[T, Dict[int, Upper[T, Acc]]] = {}
          for v, kids in l.children.items():
              v_map: Dict[int, Upper[T, Acc]] = {}
              for lchild in kids.values():
                  up_child = lower_to_upper(lchild, acc)
                  v_map[up_child._max_depth] = up_child
              if v_map:
                  children[v] = v_map
          ub = UpperBranch(children=children, empty=(acc if l.empty else None))
          return try_promote(ub)
