              for link in glr_state.head.predecessors.iter() { // Iterate to avoid consuming
                  // Adapt prune_and_transform_recursive to take (node_arc, edge_to_node_value)
                  // and return Option<(new_node_arc, new_edge_to_node_value)>
                  if let Some((new_node_arc, new_edge_val)) = prune_and_transform_recursive(
