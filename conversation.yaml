          ```rust
          fn new(nwa: &'a NWA) -> Self {
              let mut dwa = DWA::new();
              Determinizer {
                  nwa,
                  seen: HashMap::new(),
                  subsets: Vec::new(),
                  closures: Vec::new(),
                  queue: VecDeque::new(),
                  dwa,
              }
          }
