          unsafe fn add_tr_unchecked(&mut self, state: StateId, tr: Tr<W>);

          /// Adds a transition to the FST. The transition will start in the state `source`.
          ///
          /// # Errors
          ///
          /// An error is raised if the state `source` doesn't exist.
          ///
          /// # Example
