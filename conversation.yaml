    src/test_precompute_optimizations.rs: |-
      //! Precompute2 optimization equivalence tests.
      //!
      //! This suite verifies that applying optimization passes to the Precompute2
      //! trie graph preserves its semantics by comparing the optimized result
      //! against an unoptimized baseline using are_precompute2_trees_equivalent.
      //!
      //! We keep tests compact by:
      //! - Defining grammars via inline EBNF strings.
      //! - Using small, explicit LLM vocabularies.
      //! - Factoring common logic into small helpers.

      use crate::constraint::{GrammarConstraint, GrammarConstraintConfig, Precomputed2, Trie2GodWrapper};
      use crate::interface::{CompiledGrammar, GrammarDefinition};
      use crate::tokenizer::{LLMTokenID, LLMTokenMap};
      use reqwest::blocking;
      use std::collections::BTreeMap;
      use std::error::Error;
      use std::fs::{self, File};
      use std::io::{BufReader, BufWriter, Write};
      use std::path::Path;
      use std::sync::Arc;
      use bimap::BiBTreeMap;
      use crate::constraint_extra::PrecomputeStats;
      use crate::constraint_precompute2_utils::{are_precompute2_trees_equivalent, clone_trie2_graph, optimize_trie2_size};
      use crate::json_serialization::JSONConvertible;
      //
      // -------------------------------
      // Common helpers
      // -------------------------------
      //

      fn compiled_from_ebnf_str(ebnf: &str) -> Result<CompiledGrammar, Box<dyn Error>> {
          let def = GrammarDefinition::from_ebnf(ebnf)?;
          Ok(CompiledGrammar::from_definition(Arc::new(def)))
      }

      fn make_llm_token_map(tokens: &[&str]) -> (LLMTokenMap, usize) {
          let mut map = LLMTokenMap::new();
          let mut max_id = 0usize;
          for (i, t) in tokens.iter().enumerate() {
              map.insert(t.as_bytes().to_vec(), LLMTokenID(i));
              max_id = max_id.max(i);
          }
          (map, max_id)
      }

      fn assert_trees_are_equivalent(
          original_precomputed2: &Precomputed2,
          original_god: &Trie2GodWrapper,
          optimized_precomputed2: &Precomputed2,
          optimized_god: &Trie2GodWrapper,
          original_to_internal_id_bimap: &BiBTreeMap<usize, usize>,
          llm_token_map: &LLMTokenMap,
      ) {
          println!("\n--- Final Stats Comparison ---");
          println!("\n--- Stats for Original Precompute2 Tree ---");
          let mut stats_original = PrecomputeStats::default();
          crate::constraint_extra::calculate_final_stats2(original_precomputed2, &mut stats_original, original_god);
          crate::constraint_extra::print_precompute_stats2(&stats_original, original_god);

          println!("\n--- Stats for Optimized Precompute2 Tree ---");
          let mut stats_optimized = PrecomputeStats::default();
          crate::constraint_extra::calculate_final_stats2(optimized_precomputed2, &mut stats_optimized, optimized_god);
          crate::constraint_extra::print_precompute_stats2(&stats_optimized, optimized_god);

          println!("\n--- Dumping Optimized Precompute2 Tree ---");
          GrammarConstraint::_dump_precomputed2(
              optimized_precomputed2,
              original_to_internal_id_bimap,
              llm_token_map,
              optimized_god,
          );
          println!("--- Finished Dumping Optimized Tree ---\n");

          // Compare the original and optimized trees for semantic equivalence
          assert_eq!(
              original_precomputed2.len(),
              optimized_precomputed2.len(),
              "Number of tokenizer states with trees differs."
          );

          for sid in original_precomputed2.keys() {
              let original_root = original_precomputed2.get(sid).unwrap();
              let optimized_root = optimized_precomputed2.get(sid).unwrap();
              if !are_precompute2_trees_equivalent(original_root, original_god, optimized_root, optimized_god) {
                  // Detailed info is now printed inside are_precompute2_trees_equivalent
                  panic!(
                      "Optimized and original Precompute2 trees are not equivalent for tokenizer state ID: {}. See details above.",
                      sid.0);
              }
          }
      }

      fn run_equivalence_test(ebnf: &str, llm_tokens: &[&str]) -> Result<(), Box<dyn Error>> {
          let compiled = compiled_from_ebnf_str(ebnf)?;
          let (llm_token_map, max_original_llm_token_id) = make_llm_token_map(llm_tokens);

          // Create with optimizations OFF to get the baseline
          let no_opt_config = GrammarConstraintConfig {
              optimize_trie2_prune_dead_paths: false,
              optimize_trie2_merge_nodes: false,
              optimize_trie2_factor_common_destinations: false,
              optimize_trie2_compress_edges: false,
              optimize_trie2_gc: true,
          };
          println!("\n--- Building baseline GrammarConstraint (optimizations OFF) ---");
          let gc_baseline = GrammarConstraint::from_compiled_grammar_with_config(
              compiled.clone(),
              llm_token_map.clone(),
              LLMTokenID(0), // dummy EOF placeholder
              max_original_llm_token_id,
              &no_opt_config,
          );

          // Create with optimizations ON
          let opt_config = GrammarConstraintConfig::default(); // Now defaults to ON
          println!("\n--- Building optimized GrammarConstraint (optimizations ON) ---");
          let gc_optimized = GrammarConstraint::from_compiled_grammar_with_config(
              compiled,
              llm_token_map.clone(),
              LLMTokenID(0), // dummy EOF placeholder
              max_original_llm_token_id,
              &opt_config,
          );

          assert_trees_are_equivalent(
              &gc_baseline.precomputed2,
              &gc_baseline.trie2_god,
              &gc_optimized.precomputed2,
              &gc_optimized.trie2_god,
              &gc_baseline.llm_vocab.original_to_internal_id_bimap,
              &llm_token_map,
          );
          Ok(())
      }

      //
      // -------------------------------
      // Specialized JS test (large grammar + GPT-2 subset vocab)
      // -------------------------------
      //

      fn load_or_download_gpt2_vocab(
          cache_dir: &Path,
          file_name: &str,
          url: &str,
      ) -> Result<Vec<String>, Box<dyn std::error::Error>> {
          fs::create_dir_all(cache_dir)?;
          let cache_path = cache_dir.join(file_name);

          let vocab_map: BTreeMap<String, u32> = if cache_path.exists() {
              println!("Loading GPT-2 vocab from cache: {:?}", cache_path);
              let file = File::open(cache_path)?;
              let reader = BufReader::new(file);
              serde_json::from_reader(reader)?
          } else {
              println!("Downloading GPT-2 vocab from: {}", url);
              let response = blocking::get(url)?.error_for_status()?;
              let content = response.text()?;

              let mut file = File::create(&cache_path)?;
              file.write_all(content.as_bytes())?;
              println!("Saved GPT-2 vocab to cache: {:?}", cache_path);

              serde_json::from_str(&content)?
          };
          Ok(vocab_map.into_keys().collect())
      }

      #[test]
      fn test_precompute_optimizations_are_equivalent_for_js() -> Result<(), Box<dyn std::error::Error>> {
          if cfg!(rustrover) {
              println!("Skipping test_precompute2_optimizations_are_equivalent_for_js in rustrover mode.");
              return Ok(());
          }

          // --- Setup Phase ---
          println!("--- Setting up for Precompute2 Optimization Equivalence Test (JS) ---");

          // 1. Load and compile the JavaScript grammar.
          let grammar_path = "src/js_simplified3.ebnf";
          let grammar_definition = GrammarDefinition::from_ebnf_file(grammar_path)?;
          println!("Compiling GrammarDefinition into CompiledGrammar...");
          let compiled_grammar = CompiledGrammar::from_definition(Arc::new(grammar_definition));
          println!("Successfully compiled GrammarDefinition.");
          println!("{}", compiled_grammar);

          // 2. Load a small, representative vocabulary.
          println!("\nLoading GPT-2 vocabulary...");
          let vocab_cache_dir = Path::new(".cache/test_vocabs");
          let vocab_url = "https://huggingface.co/openai-community/gpt2/raw/main/vocab.json";
          let vocab_file_name = "gpt2_vocab.json";
          let mut gpt2_raw_vocab = load_or_download_gpt2_vocab(vocab_cache_dir, vocab_file_name, vocab_url)?;
          // Keep a smaller subset to speed up the test
          gpt2_raw_vocab.retain(|s| s.len() < 2);
          println!("Using a subset of {} tokens for the test.", gpt2_raw_vocab.len());

          let mut llm_token_map = LLMTokenMap::new();
          let mut max_original_llm_token_id_val: usize = 0;
          for (i, token_str) in gpt2_raw_vocab.iter().enumerate() {
              let id_val = i;
              let processed_token_str = token_str.replace("Ġ", " ").replace("ą", "\n").replace("Ċ", "\n");
              let token_bytes = processed_token_str.as_bytes().to_vec();
              llm_token_map.insert(token_bytes, LLMTokenID(id_val));
              max_original_llm_token_id_val = max_original_llm_token_id_val.max(id_val);
          }

          // 3. Construct baseline GrammarConstraint (optimizations OFF)
          println!("\nConstructing baseline GrammarConstraint with optimizations OFF...");
          let no_opt_config = GrammarConstraintConfig {
              optimize_trie2_prune_dead_paths: false,
              optimize_trie2_merge_nodes: false,
              optimize_trie2_factor_common_destinations: false,
              optimize_trie2_compress_edges: false,
              optimize_trie2_gc: true,
          };
          let gc_baseline = GrammarConstraint::from_compiled_grammar_with_config(
              compiled_grammar.clone(),
              llm_token_map.clone(),
              LLMTokenID(0),
              max_original_llm_token_id_val,
              &no_opt_config,
          );

          // 4. Construct optimized GrammarConstraint (optimizations ON)
          println!("\nConstructing optimized GrammarConstraint with optimizations ON...");
          let opt_config = GrammarConstraintConfig::default();
          let gc_optimized = GrammarConstraint::from_compiled_grammar_with_config(
              compiled_grammar.clone(),
              llm_token_map.clone(),
              LLMTokenID(0),
              max_original_llm_token_id_val,
              &opt_config,
          );

          // 5. Assert equivalence
          assert_trees_are_equivalent(
              &gc_baseline.precomputed2,
              &gc_baseline.trie2_god,
              &gc_optimized.precomputed2,
              &gc_optimized.trie2_god,
              &gc_baseline.llm_vocab.original_to_internal_id_bimap,
              &llm_token_map,
          );

          println!("\nEquivalence test passed: All trees are semantically equivalent after optimization (JS).");

          Ok(())
      }

      //
      // -------------------------------
      // Compact tests using inline EBNF
      // (based on grammars in test_constraint_basic.rs)
      // -------------------------------
      //

      // Trivial: s -> A EOF; A -> 'a'; EOF -> '$'
      #[test]
      fn test_p_opt_trivial_a_eof() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= A EOF;
              A ::= 'a';
              EOF ::= '$';
          "#;
          let llm = ["a", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Simple choice: s -> x EOF; x -> A B_OR_C | AB
      #[test]
      fn test_p_opt_simple_choice_ab_or_ac() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= x EOF;
              x ::= A B_OR_C | AB;
              A ::= 'a';
              B_OR_C ::= 'b' | 'c';
              AB ::= 'ab';
              EOF ::= '$';
          "#;
          let llm = ["ab", "ac", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Expression grammar (e -> e + t | t; t -> t * f | f; f -> (e) | i)
      #[test]
      fn test_p_opt_expression_full() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= e EOF;
              e ::= e PLUS t | t;
              t ::= t TIMES f | f;
              f ::= LPAREN e RPAREN | I;

              PLUS ::= '+';
              TIMES ::= '*';
              LPAREN ::= '(';
              RPAREN ::= ')';
              I ::= 'i';
              EOF ::= '$';
          "#;
          let llm = ["i", "+", "*", "(", ")", "(i", "+i", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Expression (no '*'): e -> e + t | t; t -> f; f -> (e) | i
      #[test]
      fn test_p_opt_expression_no_times() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= e EOF;
              e ::= e PLUS t | t;
              t ::= f;
              f ::= LPAREN e RPAREN | I;

              PLUS ::= '+';
              LPAREN ::= '(';
              RPAREN ::= ')';
              I ::= 'i';
              EOF ::= '$';
          "#;
          let llm = ["i", "+", "(", ")", "(i", "+i", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Expression (no parens): e -> e + t | t; t -> t * f | f; f -> i
      #[test]
      fn test_p_opt_expression_no_parens() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= e EOF;
              e ::= e PLUS t | t;
              t ::= t TIMES f | f;
              f ::= I;

              PLUS ::= '+';
              TIMES ::= '*';
              I ::= 'i';
              EOF ::= '$';
          "#;
          let llm = ["i", "+", "*", "+i", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Expression (no '+' or '*'): e -> t; t -> f; f -> (e) | i
      #[test]
      fn test_p_opt_expression_no_plus_times() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= e EOF;
              e ::= t;
              t ::= f;
              f ::= LPAREN e RPAREN | I;

              LPAREN ::= '(';
              RPAREN ::= ')';
              I ::= 'i';
              EOF ::= '$';
          "#;
          let llm = ["i", "(", ")", "(i", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Direct recursion: e -> '(' e | 'i'; s -> e EOF
      #[test]
      fn test_p_opt_expression_trivial_direct() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= e EOF;
              e ::= LPAREN e | I;

              LPAREN ::= '(';
              I ::= 'i';
              EOF ::= '$';
          "#;
          let llm = ["i", "(", "(i", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Same as above, but limited vocab: only "(i" (to exercise multi-grammar-token LLM token)
      #[test]
      fn test_p_opt_expression_trivial_direct_limited_vocab() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= e EOF;
              e ::= LPAREN e | I;

              LPAREN ::= '(';
              I ::= 'i';
              EOF ::= '$';
          "#;
          let llm = ["(i"];
          run_equivalence_test(ebnf, &llm)
      }

      // Unbalanced parens variant (f -> '(' e | 'i')
      #[test]
      fn test_p_opt_expression_unbalanced_parens() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= e EOF;
              e ::= t;
              t ::= f;
              f ::= LPAREN e | I;

              LPAREN ::= '(';
              I ::= 'i';
              EOF ::= '$';
          "#;
          let llm = ["i", "(", "(i", "$"];
          run_equivalence_test(ebnf, &llm)
      }

      // Indirect recursion simplified: s -> 'a' e | 'b'; e -> s
      #[test]
      fn test_p_opt_indirect_recursion_simplified() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= A e | B;
              e ::= s;

              A ::= 'a';
              B ::= 'b';
          "#;
          let llm = ["a", "b"];
          run_equivalence_test(ebnf, &llm)
      }

      // Repetition: s ::= A*, A ::= 'a'
      #[test]
      fn test_p_opt_repetition_a_star() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= A*;
              A ::= 'a';
          "#;
          let llm = ["a"];
          run_equivalence_test(ebnf, &llm)
      }

      // a+ token: s ::= A_PLUS; A_PLUS ::= 'a'+
      #[test]
      fn test_p_opt_a_plus_terminal() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= A_PLUS;
              A_PLUS ::= 'a'+;
          "#;
          let llm = ["a", "aaa"];
          run_equivalence_test(ebnf, &llm)
      }

      // Ignore whitespace: WS ignored between tokens. s ::= A B; A='a'; B='b'; WS=' '
      // LLM tokens include "a", " ", "b", "a b"
      #[test]
      fn test_p_opt_ignore_whitespace() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              #![ignore(WS)]
              s ::= A B;
              A ::= 'a';
              B ::= 'b';
              WS ::= ' '+;
          "#;
          let llm = ["a", " ", "b", "a b"];
          run_equivalence_test(ebnf, &llm)
      }

      // 'x' SPACE+ '=' pattern (compact variant of x_eq)
      #[test]
      fn test_p_opt_x_space_equals() -> Result<(), Box<dyn Error>> {
          let ebnf = r#"
              s ::= X SPACE EQUALS;
              X ::= 'x';
              SPACE ::= ' '+;
              EQUALS ::= '=';
          "#;
          let llm = ["x", " ="];
          run_equivalence_test(ebnf, &llm)
      }
    src/constraint_precompute2_utils.rs: |-
      use crate::constraint::{GrammarConstraintConfig, PrecomputeNode2, PrecomputeNode2Index, PrecomputeNodeIndex, Trie2GodWrapper};
      use crate::datastructures::gss::{LLMTokenBV, PrecomputedNodeContents};
      use crate::datastructures::ordered_hash_map::Retain;
      use crate::datastructures::trie::{EdgeInserter, Trie, Trie2Index};
      use crate::datastructures::ArcPtrWrapper;
      use crate::glr::table::StateID;
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use crate::tokenizer::TokenizerStateID;
      use deterministic_hash::DeterministicHasher;
      use indicatif::{ProgressBar, ProgressDrawTarget, ProgressStyle};
      use ordered_hash_map::OrderedHashMap;
      use rand::prelude::IndexedRandom;
      use rand::Rng;
      use std::collections::{BTreeMap, HashMap, HashSet, VecDeque};
      use std::hash::{Hash, Hasher};
      use std::sync::{Arc, RwLock};

      type NormalizedPath = Vec<(usize, StateID)>;
      type PathMap = BTreeMap<NormalizedPath, LLMTokenBV>;

      /// Samples a single normalized path by performing a random walk from the root.
      fn sample_normalized_path(
          root: &Trie2Index,
          rng: &mut impl Rng,
          max_len: usize,
          trie2_god: &Trie2GodWrapper,
      ) -> Option<NormalizedPath> {
          let mut current_node = root.clone();
          let mut path = NormalizedPath::new();
          let mut current_k = 0;
          let mut bv = root.read(trie2_god).unwrap().value.live_tokens.clone();

          while path.len() < max_len {
              let can_terminate = current_node.read(trie2_god).unwrap().value.end;
              let can_continue = !current_node.read(trie2_god).unwrap().children().is_empty();

              if !can_continue {
                  return if can_terminate { Some(path) } else { None };
              }

              if can_terminate && rng.gen_bool(0.2) { // 20% chance to terminate at an end node
                  return Some(path);
              }

              let all_outgoing_edges: Vec<_> = current_node.read(trie2_god).unwrap()
                  .children()
                  .iter()
                  .flat_map(|(ek, dest_map)| {
                      dest_map.iter().map(move |(dest_ptr, edge_bv)| (ek.clone(), dest_ptr.clone(), edge_bv.clone()))
                  })
                  .collect();

              if all_outgoing_edges.is_empty() {
                  return if current_node.read(trie2_god).unwrap().value.end { Some(path) } else { None };
              }

              let (ek, dest_ptr, edge_bv) = all_outgoing_edges.choose(rng)?;

              bv &= edge_bv;
              if bv.is_empty() {
                  return None; // Path became invalid
              }

              let (k, sid_opt) = ek;
              current_k += k;
              if let Some(sid) = sid_opt {
                  path.push((current_k, *sid));
                  current_k = 0;
              }

              current_node = dest_ptr.as_arc().clone();
          }

          Some(path)
      }

      /// For a given normalized path, computes the union of LLM token bitvectors for all
      /// possible ways to traverse that path in the trie.
      fn get_bv_for_normalized_path(
          root: &Trie2Index,
          path: &NormalizedPath,
          trie2_god: &Trie2GodWrapper,
      ) -> LLMTokenBV {
          // State: (current_node, path_segment_index, accumulated_k, current_bv)
          let mut q: VecDeque<(Trie2Index, usize, usize, LLMTokenBV)> = VecDeque::new();
          let mut final_bv = LLMTokenBV::zeros();

          let initial_bv = root.read(trie2_god).unwrap().value.live_tokens.clone();
          q.push_back((root.clone(), 0, 0, initial_bv.clone()));

          // To handle cycles and redundant exploration
          let mut visited: HashMap<(PrecomputeNode2Index, usize, usize), LLMTokenBV> = HashMap::new();
          visited.insert((*root, 0, 0), initial_bv);

          while let Some((node, path_idx, k_so_far, bv)) = q.pop_front() {
              // Check if we've completed the path
              if path_idx == path.len() {
                  // We have successfully traversed the path. Now we need to reach an `end` node from here
                  // with only `(k, None)` edges.
                  let end_bv = find_end_bv_from_node_via_none_edges(node, bv, &trie2_god);
                  final_bv |= &end_bv;
                  continue;
              }

              let (target_k, target_sid) = path[path_idx];

              // Explore children
              let guard = node.read(trie2_god).unwrap();
              for (ek, dest_map) in guard.children() {
                  for (dest_ptr, edge_bv) in dest_map {
                      let new_bv = &bv & edge_bv;
                      if new_bv.is_empty() { continue; }

                      let child_arc = dest_ptr.as_arc().clone();
                      let (k, sid_opt) = ek;
                      let new_k = k_so_far + *k;

                      if let Some(sid) = sid_opt {
                          if new_k == target_k && sid == &target_sid {
                              // Matched a path segment. Advance.
                              let visited_key = (child_arc, path_idx + 1, 0);
                              if let Some(existing_bv) = visited.get_mut(&visited_key) {
                                  let diff = &new_bv - &*existing_bv;
                                  if !diff.is_empty() {
                                      *existing_bv |= &diff;
                                      q.push_back((child_arc, path_idx + 1, 0, diff));
                                  }
                              } else {
                                  visited.insert(visited_key, new_bv.clone());
                                  q.push_back((child_arc, path_idx + 1, 0, new_bv));
                              }
                          }
                      } else { // sid_opt is None
                          if new_k <= target_k {
                              // Continue accumulating k
                              let visited_key = (child_arc, path_idx, new_k);
                              if let Some(existing_bv) = visited.get_mut(&visited_key) {
                                  let diff = &new_bv - &*existing_bv;
                                  if !diff.is_empty() {
                                      *existing_bv |= &diff;
                                      q.push_back((child_arc, path_idx, new_k, diff));
                                  }
                              } else {
                                  visited.insert(visited_key, new_bv.clone());
                                  q.push_back((child_arc, path_idx, new_k, new_bv));
                              }
                          }
                      }
                  }
              }
          }
          final_bv
      }

      /// Helper to find the union of BVs for all paths from a start node to any `end` node
      /// that consist solely of `(k, None)` edges.
      fn find_end_bv_from_node_via_none_edges(
          start_node: Trie2Index,
          initial_bv: LLMTokenBV,
          trie2_god: &Trie2GodWrapper,
      ) -> LLMTokenBV {
          let mut end_bv = LLMTokenBV::zeros();
          let mut q = VecDeque::new();
          q.push_back((start_node, initial_bv));
          let mut visited: HashMap<PrecomputeNode2Index, LLMTokenBV> = HashMap::new();

          while let Some((node, bv)) = q.pop_front() {
              let guard = node.read(trie2_god).unwrap();
              if guard.value.end {
                  end_bv |= &bv;
              }

              for (ek, dest_map) in guard.children() {
                  let (_k, sid_opt) = ek;
                  if sid_opt.is_none() { // Only (k, None) edges
                      for (dest_ptr, edge_bv) in dest_map {
                          let new_bv = &bv & edge_bv;
                          if new_bv.is_empty() { continue; }

                          let child_arc = dest_ptr.as_arc().clone();
                          let child_ptr = child_arc;
                          if let Some(existing_bv) = visited.get_mut(&child_ptr) {
                              let diff = &new_bv - &*existing_bv;
                              if !diff.is_empty() {
                                  *existing_bv |= &diff;
                                  q.push_back((child_arc, diff));
                              }
                          } else {
                              visited.insert(child_ptr, new_bv.clone());
                              q.push_back((child_arc, new_bv));
                          }
                      }
                  }
              }
          }
          end_bv
      }

      /// Checks for semantic equivalence between two `precompute2` trees.
      ///
      /// Two trees are considered equivalent if they generate the same set of "normalized paths",
      /// where each path is associated with a bitvector of applicable LLM tokens.
      /// A normalized path collapses consecutive edge keys of the form `(k, None)`.
      ///
      /// # Arguments
      /// * `a`: An `Arc` to the first trie's root node.
      /// * `b`: An `Arc` to the second trie's root node.
      ///
      /// # Returns
      /// `true` if the tries are semantically equivalent, `false` otherwise.
      pub fn are_precompute2_trees_equivalent(
          a: &Trie2Index,
          trie2_god_a: &Trie2GodWrapper,
          b: &Trie2Index,
          trie2_god_b: &Trie2GodWrapper,
      ) -> bool {
          // Stochastic version
          if a == b && trie2_god_a == trie2_god_b {
              return true;
          }

          const NUM_SAMPLES: usize = 100;
          const MAX_PATH_LEN: usize = 32;
          let mut rng = rand::thread_rng();

          // Sample from A, check in B
          for i in 0..NUM_SAMPLES {
              if let Some(path) = sample_normalized_path(a, &mut rng, MAX_PATH_LEN, trie2_god_a) {
                  let bv_a = get_bv_for_normalized_path(a, &path, trie2_god_a);
                  if bv_a.is_empty() && i > 0 {
                      continue;
                  } // Skip trivial paths, but always check the empty path
                  let bv_b = get_bv_for_normalized_path(b, &path, trie2_god_b);
                  if bv_a != bv_b {
                      println!("\n--- Precompute2 Equivalence Mismatch ---");
                      println!("Path sampled from Tree A:");
                      println!("  Path: {:?}", path);
                      println!("  BV from A: {:?}", bv_a);
                      println!("  BV from B: {:?}", bv_b);
                      println!("  Difference (A ^ B): {:?}", bv_a.symmetric_difference(&bv_b));
                      return false;
                  }
              }
          }

          // Sample from B, check in A
          for i in 0..NUM_SAMPLES {
              if let Some(path) = sample_normalized_path(b, &mut rng, MAX_PATH_LEN, trie2_god_b) {
                  let bv_b = get_bv_for_normalized_path(b, &path, trie2_god_b);
                  if bv_b.is_empty() && i > 0 {
                      continue;
                  } // Skip trivial paths, but always check the empty path
                  let bv_a = get_bv_for_normalized_path(a, &path, trie2_god_a);
                  if bv_a != bv_b {
                      println!("\n--- Precompute2 Equivalence Mismatch ---");
                      println!("Path sampled from Tree B:");
                      println!("  Path: {:?}", path);
                      println!("  BV from A: {:?}", bv_a);
                      println!("  BV from B: {:?}", bv_b);
                      println!("  Difference (A ^ B): {:?}", bv_a.symmetric_difference(&bv_b));
                      return false;
                  }
              }
          }

          true
      }

      pub fn prune_dead_paths_trie2(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode2Index>, trie2_god: &Trie2GodWrapper) {
          crate::debug!(2, "Pruning dead paths from precomputed trie 2.");

          // Use a worklist algorithm to propagate "liveness" backwards from end nodes.
          // This correctly handles cycles, iterating until a fixed point is reached.
          let all_nodes = Trie::all_nodes(trie2_god, &roots.values().cloned().collect::<Vec<_>>());
          let mut predecessors: HashMap<PrecomputeNode2Index, Vec<(PrecomputeNode2Index, LLMTokenBV)>> = HashMap::new();
          let mut worklist = VecDeque::new();
          let mut live: HashMap<PrecomputeNode2Index, LLMTokenBV> = HashMap::new();

          // 1. Initialize live sets and build predecessor map.
          for node_arc in &all_nodes {
              let node_ptr = *node_arc;
              live.insert(node_ptr, LLMTokenBV::zeros());

              let guard = node_arc.read(trie2_god).unwrap();
              if guard.value.end {
                  let initial_live = guard.value.live_tokens.clone();
                  if !initial_live.is_empty() {
                      live.insert(node_ptr, initial_live);
                      worklist.push_back(node_ptr);
                  }
              }

              for dest_map in guard.children().values() {
                  for (child_wrap, edge_bv) in dest_map {
                      let child_arc = child_wrap.as_arc().clone();
                      let child_ptr = child_arc;
                      predecessors.entry(child_ptr).or_default().push((node_ptr, edge_bv.clone()));
                  }
              }
          }

          // 2. Propagate liveness until a fixed point is reached.
          while let Some(node_ptr) = worklist.pop_front() {
              let live_at_node = live.get(&node_ptr).unwrap().clone();
              if let Some(preds) = predecessors.get(&node_ptr) {
                  for (pred_ptr, edge_bv) in preds {
                      let live_from_edge = &live_at_node & edge_bv;
                      if live_from_edge.is_empty() {
                          continue;
                      }

                      let pred_live = live.get_mut(pred_ptr).unwrap();
                      let old_len = pred_live.len();
                      *pred_live |= &live_from_edge;
                      if pred_live.len() > old_len {
                          worklist.push_back(*pred_ptr);
                      }
                  }
              }
          }

          // 3. Prune the graph based on the computed live sets.
          for node_arc in &all_nodes {
              let mut guard = node_arc.write(trie2_god).unwrap();
              guard.children_mut().retain(|_edge_key, dest_map| {
                  dest_map.retain(|child_wrapper, edge_value_bv| {
                      let child_arc = child_wrapper.as_arc().clone();
                      let child_ptr = child_arc;
                      let live_from_child = live.get(&child_ptr).unwrap();
                      let live_on_edge = &*edge_value_bv & live_from_child;
                      if live_on_edge.is_empty() {
                          false
                      } else {
                          *edge_value_bv = live_on_edge;
                          true
                      }
                  });
                  !dest_map.is_empty()
              });
              // Update the node's own live_tokens field with the final computed value.
              let node_ptr = *node_arc;
              guard.value.live_tokens = live.get(&node_ptr).unwrap().clone();
          }
          crate::debug!(2, "Finished pruning dead paths from trie 2.");
      }

      pub fn simplify_trie2_factor_common_destinations(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode2Index>, trie2_god: &Trie2GodWrapper) {
          crate::debug!(2, "Simplifying trie 2 by factoring common destinations.");

          const MIN_INCOMING_EDGES_FOR_FACTORING: usize = 3;

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie2_god, &roots_vec);
          let arc_map: HashMap<_, _> = all_nodes.iter().map(|n| (*n, n.clone())).collect();

          type EdgeKey2 = (usize, Option<StateID>);
          let mut incoming_map: HashMap<
              PrecomputeNode2Index,
              HashMap<
                  EdgeKey2,
                  Vec<(PrecomputeNode2Index, LLMTokenBV)>,
              >,
          > = HashMap::new();

          for src_arc in &all_nodes {
              let src_ptr = *src_arc;
              let guard = src_arc.read(trie2_god).expect("poison");
              for (ek, dest_map) in guard.children() {
                  for (dest_wrapper, bv) in dest_map {
                      let dest_arc = dest_wrapper.as_arc().clone();
                      let dest_ptr = dest_arc;
                      incoming_map
                          .entry(dest_ptr)
                          .or_default()
                          .entry(ek.clone())
                          .or_default()
                          .push((src_ptr, bv.clone()));
                  }
              }
          }

          for (dest_ptr, edges_by_key) in incoming_map {
              for (edge_key, sources) in edges_by_key {
                  if sources.len() >= MIN_INCOMING_EDGES_FOR_FACTORING {
                      let dest_arc = arc_map.get(&dest_ptr).unwrap().clone();

                      let intermediate_node = PrecomputeNode2Index::new(trie2_god.insert(PrecomputeNode2::new(PrecomputedNodeContents::internal())));

                      let mut union_bv = LLMTokenBV::zeros();
                      for (_, bv) in &sources {
                          union_bv |= bv;
                      }

                      {
                          let mut intermediate_guard = intermediate_node.write(trie2_god).expect("poison");
                          let mut edge_val_opt = Some(union_bv.clone());
                          intermediate_guard.try_insert_unchecked(edge_key.clone(), &mut edge_val_opt, dest_arc.clone());
                          intermediate_guard.value.live_tokens |= &union_bv;
                      }

                      let identity_edge_key = (0, None);
                      for (src_ptr, bv) in &sources {
                          let src_arc = arc_map.get(src_ptr).unwrap();
                          let mut src_guard = src_arc.write(trie2_god).expect("poison");

                          let mut remove_ek = false;
                          if let Some(dest_map_for_ek) = src_guard.children_mut().get_mut(&edge_key) {
                              let strong_key = dest_arc.clone();
                              dest_map_for_ek.remove(&strong_key);
                              if dest_map_for_ek.is_empty() {
                                  remove_ek = true;
                              }
                          }
                          if remove_ek {
                              src_guard.children_mut().remove(&edge_key);
                          }

                          let mut edge_val_opt = Some(bv.clone());
                          src_guard.try_insert_unchecked(identity_edge_key.clone(), &mut edge_val_opt, intermediate_node.clone()); // ignore cycle error, should not happen
                          src_guard.value.live_tokens |= bv;
                      }
                  }
              }
          }
          crate::debug!(2, "Finished factoring common destinations in trie 2.");
      }

      pub fn optimize_trie2_size(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode2Index>,
          trie2_god: &Trie2GodWrapper,
          config: &GrammarConstraintConfig,
      ) {
          crate::debug!(2, "Optimizing Trie 2 size...");
          // Pin all nodes to prevent dangling weak pointers while we rewire.
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes_pinner = Trie::all_nodes(&trie2_god, &roots_vec);

          if config.optimize_trie2_prune_dead_paths {
              prune_dead_paths_trie2(roots, &trie2_god);
          }
          if config.optimize_trie2_merge_nodes {
              merge_nodes_trie2(roots, &trie2_god);
          }
          if config.optimize_trie2_factor_common_destinations {
              simplify_trie2_factor_common_destinations(roots, &trie2_god);
          }
          if config.optimize_trie2_compress_edges {
              compress_trie2_edges(roots, &trie2_god);
          }
          if config.optimize_trie2_prune_dead_paths {
              prune_dead_paths_trie2(roots, &trie2_god);
          }
          if config.optimize_trie2_merge_nodes {
              merge_nodes_trie2(roots, &trie2_god);
          }
          if config.optimize_trie2_gc {
              Trie::gc(&trie2_god, &roots.values().cloned().collect::<Vec<_>>());
          }
          Trie::recompute_all_max_depths(&trie2_god, &roots.values().cloned().collect::<Vec<_>>());
      }

      fn trie2_shape_hash(
          arc: &Trie2Index,
          memo: &mut HashMap<PrecomputeNode2Index, u64>,
          trie2_god: &Trie2GodWrapper
      ) -> u64 {
          let ptr = *arc;
          if let Some(&h) = memo.get(&ptr) {
              return h;
          }

          // Insert a placeholder to break cycles. A fixed value like 0 is fine.
          memo.insert(ptr, 0);

          let node_guard = arc.read(trie2_god).unwrap();
          let mut hasher = DeterministicHasher::new(std::collections::hash_map::DefaultHasher::new());

          // Hash shape-defining value fields
          node_guard.value.end.hash(&mut hasher);

          // Hash children structure
          let mut edge_hashes = Vec::new();
          for (ek, dest_map) in node_guard.children() {
              for (np, ev) in dest_map {
                  let child = np.as_arc().clone();
                  let child_h = trie2_shape_hash(&child, memo, trie2_god);
                  let mut pair_hasher = DeterministicHasher::new(std::collections::hash_map::DefaultHasher::new());
                  ek.hash(&mut pair_hasher);
                  ev.hash(&mut pair_hasher);
                  child_h.hash(&mut pair_hasher);
                  edge_hashes.push(pair_hasher.finish());
              }
          }

          edge_hashes.sort_unstable();
          for h in edge_hashes {
              h.hash(&mut hasher);
          }

          let final_hash = hasher.finish();
          // Update the memo with the real hash.
          memo.insert(ptr, final_hash);
          final_hash
      }

      /// Cycle-safe, depth-bounded structural hash for Trie nodes.
      /// This "skeleton" hash is intended only for bucketing candidates before
      /// running exact structural equality. It never recurses indefinitely.
      fn trie2_skeleton_hash(
          arc: &Trie2Index,
          memo: &mut HashMap<PrecomputeNode2Index, u64>,
          trie2_god: &Trie2GodWrapper,
      ) -> u64 {
          const MAX_DEPTH: usize = 64; // generous, but bounded
          fn inner(
              node: &Trie2Index,
              memo: &mut HashMap<PrecomputeNode2Index, u64>,
              visiting: &mut HashSet<PrecomputeNode2Index>,
              depth_left: usize,
              trie2_god: &Trie2GodWrapper,
          ) -> u64 {
              let ptr = *node;
              if let Some(&h) = memo.get(&ptr) {
                  return h;
              }
              if depth_left == 0 {
                  // Depth cutoff: use stable mix of pointer and end flag (non-deterministic across runs is fine for bucketing).
                  let guard = node.read(trie2_god).expect("poison");
                  let mut h = DeterministicHasher::new(std::collections::hash_map::DefaultHasher::new());
                  (ptr).hash(&mut h);
                  guard.value.end.hash(&mut h);
                  let out = h.finish();
                  memo.insert(ptr, out);
                  return out;
              }
              if !visiting.insert(ptr) {
                  // Cycle detected on current recursion path: fall back to pointer + end flag.
                  let guard = node.read(trie2_god).expect("poison");
                  let mut h = DeterministicHasher::new(std::collections::hash_map::DefaultHasher::new());
                  (ptr).hash(&mut h);
                  guard.value.end.hash(&mut h);
                  let out = h.finish();
                  memo.insert(ptr, out);
                  return out;
              }

              let guard = node.read(trie2_god).expect("poison");
              let mut edge_hashes = Vec::new();
              for (ek, dest_map) in guard.children() {
                  for (np, _ev) in dest_map {
                      let child = np.as_arc().clone();
                      let child_h = inner(&child, memo, visiting, depth_left - 1, trie2_god);
                      let mut pair_hasher = DeterministicHasher::new(std::collections::hash_map::DefaultHasher::new());
                      // Only hash the "kind" of edge key: (k, sid_is_some) and whether strong/weak.
                      let (k, sid_opt) = ek;
                      k.hash(&mut pair_hasher);
                      sid_opt.is_some().hash(&mut pair_hasher);
                      child_h.hash(&mut pair_hasher);
                      edge_hashes.push(pair_hasher.finish());
                  }
              }
              drop(guard);

              edge_hashes.sort_unstable();
              let mut hasher = DeterministicHasher::new(std::collections::hash_map::DefaultHasher::new());
              {
                  let guard2 = node.read(trie2_god).expect("poison");
                  guard2.value.end.hash(&mut hasher);
              }
              for h in edge_hashes {
                  h.hash(&mut hasher);
              }
              let out = hasher.finish();
              visiting.remove(&ptr);
              memo.insert(ptr, out);
              out
          }

          let mut visiting: HashSet<PrecomputeNode2Index> = HashSet::new();
          inner(arc, memo, &mut visiting, MAX_DEPTH, trie2_god)
      }

      fn trie2_shape_eq(
          a: &Trie2Index,
          b: &Trie2Index,
          cache: &mut HashMap<(PrecomputeNode2Index, PrecomputeNode2Index), bool>,
          trie2_god_a: &Trie2GodWrapper,
          trie2_god_b: &Trie2GodWrapper,
      ) -> bool {
          if a == b {
              return true;
          }

          let (p1, p2) = if *a < *b {
              (*a, *b)
          } else {
              (*b, *a)
          };

          if let Some(&res) = cache.get(&(p1, p2)) {
              return res;
          }

          cache.insert((p1, p2), true); // Optimistic insertion for cycles

          let guard_a = a.read(trie2_god_a).unwrap();
          let guard_b = b.read(trie2_god_b).unwrap();

          // Compare shape-defining value fields
          if guard_a.value.end != guard_b.value.end {
              cache.insert((p1, p2), false);
              return false;
          }

          // Compare children
          if guard_a.children().len() != guard_b.children().len() {
              cache.insert((p1, p2), false);
              return false;
          }

          for (ek, dest_map_a) in guard_a.children() {
              if let Some(dest_map_b) = guard_b.children().get(ek) {
                  if dest_map_a.len() != dest_map_b.len() {
                      cache.insert((p1, p2), false);
                      return false;
                  }

                  let mut pairs_b: Vec<_> = dest_map_b.iter().map(|(np, ev)| (ev, np.as_arc().clone())).collect();

                  for (np_a, ev_a) in dest_map_a.iter() {
                      let arc_a = np_a.as_arc().clone();
                      let mut found_match = false;
                      for i in 0..pairs_b.len() {
                          let (ev_b, ref arc_b) = pairs_b[i];
                          if ev_a == ev_b {
                              if trie2_shape_eq(&arc_a, arc_b, cache, trie2_god_a, trie2_god_b) {
                                  pairs_b.remove(i);
                                  found_match = true;
                                  break;
                              }
                          }
                      }
                      if !found_match {
                          cache.insert((p1, p2), false);
                          return false;
                      }
                  }
              } else {
                  cache.insert((p1, p2), false);
                  return false;
              }
          }

          true
      }

      pub fn merge_nodes_trie2(roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode2Index>, trie2_god: &Trie2GodWrapper) {
          crate::debug!(2, "Merging identical subtrees in precomputed trie 2.");

          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let all_nodes = Trie::all_nodes(trie2_god, &roots_vec);

          let pb = ProgressBar::new(all_nodes.len() as u64);
          pb.set_style(
              ProgressStyle::default_bar()
                  .template("{spinner:.green} [{elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta})")
                  .expect("progress-bar"),
          );
          if !PROGRESS_BAR_ENABLED {
              pb.set_draw_target(ProgressDrawTarget::hidden());
          }

          let mut canonical_nodes: HashMap<u64, Vec<PrecomputeNode2Index>> = HashMap::new();
          let mut visited: HashMap<PrecomputeNode2Index, PrecomputeNode2Index> = HashMap::new();
          let mut shape_hash_memo: HashMap<PrecomputeNode2Index, u64> = HashMap::new();
          let mut shape_eq_cache: HashMap<(PrecomputeNode2Index, PrecomputeNode2Index), bool> = HashMap::new();

          let mut new_roots = BTreeMap::new();
          for (sid, root_arc) in roots.iter() {
              let canonical_root = deduplicate_recursive_trie2(
                  root_arc.clone(),
                  &mut canonical_nodes,
                  &mut visited,
                  &mut shape_hash_memo,
                  &mut shape_eq_cache,
                  &pb,
                  trie2_god
              );
              new_roots.insert(*sid, canonical_root);
          }
          *roots = new_roots;

          // Recompute depths after structural changes from merging
          let final_roots_vec: Vec<_> = roots.values().cloned().collect();
          Trie::recompute_all_max_depths(trie2_god, &final_roots_vec);

          pb.finish_with_message("Finished merging Trie 2 nodes");
          crate::debug!(2, "Finished merging subtrees in trie 2. Canonical nodes: {}", canonical_nodes.values().map(|v| v.len()).sum::<usize>());
      }

      fn deduplicate_recursive_trie2(
          node_arc: Trie2Index,
          canonical_nodes: &mut HashMap<u64, Vec<PrecomputeNode2Index>>,
          visited: &mut HashMap<PrecomputeNode2Index, PrecomputeNode2Index>,
          shape_hash_memo: &mut HashMap<PrecomputeNode2Index, u64>,
          shape_eq_cache: &mut HashMap<(PrecomputeNode2Index, PrecomputeNode2Index), bool>,
          pb: &ProgressBar,
          trie2_god: &Trie2GodWrapper,
      ) -> Trie2Index {
          let node_ptr = node_arc;
          if let Some(cached_node) = visited.get(&node_ptr) {
              return cached_node.clone();
          }

          // Pre-emptively insert to break cycles.
          // We will update this later if we find a different canonical node.
          visited.insert(node_ptr, node_arc.clone());

          pb.inc(1);

          // Post-order: canonicalize children first
          let mut new_children_map = BTreeMap::new();
          let mut children_changed = false;

          {
              let node_guard = node_arc.read(trie2_god).unwrap().clone();
              for (edge_key, dest_map) in node_guard.children() {
                  let mut new_dest_map = OrderedHashMap::new();
                  for (node_ptr_wrapper, edge_val) in dest_map.iter() {
                      let child_arc = node_ptr_wrapper.as_arc().clone();
                      let canonical_child_arc = deduplicate_recursive_trie2(
                          child_arc.clone(),
                          canonical_nodes,
                          visited,
                          shape_hash_memo,
                          shape_eq_cache,
                          pb,
                          trie2_god,
                      );
                      if child_arc != canonical_child_arc {
                          children_changed = true;
                      }
                      let new_node_ptr_wrapper = canonical_child_arc;
                      new_dest_map.insert(new_node_ptr_wrapper, edge_val.clone());
                  }
                  if !new_dest_map.is_empty() {
                      new_children_map.insert(edge_key.clone(), new_dest_map);
                  }
              }
          }

          if children_changed {
              let mut node_guard = node_arc.write(trie2_god).unwrap();
              *node_guard.children_mut() = new_children_map;
              // max_depth will be recomputed globally at the end
          }

          // Now find a canonical representative for the current node using cycle-safe skeleton hash
          let fp = trie2_skeleton_hash(&node_arc, shape_hash_memo, trie2_god);
          let bucket = canonical_nodes.entry(fp).or_default();

          for candidate_arc in bucket.iter() {
              if trie2_shape_eq(&node_arc, candidate_arc, shape_eq_cache, trie2_god, trie2_god) {
                  // Found a match. Merge live_tokens and return the canonical version.
                  let node_live_tokens = { node_arc.read(trie2_god).unwrap().value.live_tokens.clone() };
                  if !node_live_tokens.is_empty() {
                      let mut candidate_guard = candidate_arc.write(trie2_god).unwrap();
                      candidate_guard.value.live_tokens |= node_live_tokens;
                  }
                  // Update visited map with the true canonical node.
                  visited.insert(node_ptr, candidate_arc.clone());
                  return candidate_arc.clone();
              }
          }

          // No match found. This node becomes a new canonical representative.
          bucket.push(node_arc.clone());
          // The visited map already contains (node_ptr, node_arc), which is correct in this case.
          node_arc
      }

      /// Compress linear chains in Trie by merging consecutive edges where safe.
      ///
      /// Given A -(k1,s1)-> B and B -(k2,s2)-> C, this pass replaces with
      /// A -(k1+k2, s1.or(s2))-> C with edge BV = bv1 ∧ bv2,
      /// provided:
      ///   - B is not an end node.
      ///   - B has exactly one outgoing destination (across all keys).
      ///   - B has exactly one incoming edge (across all parents, strong or weak).
      ///   - Not both s1 and s2 are Some(...) (i.e., at most one has a state ID).
      /// This reduces redundant intermediate nodes introduced during construction.
      pub fn compress_trie2_edges(
          roots: &mut BTreeMap<TokenizerStateID, PrecomputeNode2Index>,
          trie2_god: &Trie2GodWrapper,
      ) {
          crate::debug!(2, "Compressing Trie 2 by merging linear chains...");
          type EdgeKey2 = (usize, Option<StateID>);

          // Helper to count incoming edges for each node (both strong and weak).
          let roots_vec: Vec<_> = roots.values().cloned().collect();
          let mut changed = true;
          let mut iterations = 0usize;
          let _all_nodes = Trie::all_nodes(trie2_god, &roots_vec);

          while changed {
              iterations += 1;
              changed = false;
              let all_nodes = Trie::all_nodes(trie2_god, &roots_vec);
              let mut arc_map: HashMap<PrecomputeNode2Index, PrecomputeNode2Index> = HashMap::new();
              for n in &all_nodes {
                  arc_map.insert(*n, n.clone());
              }

              // Build incoming counts
              let mut incoming_count: HashMap<PrecomputeNode2Index, usize> = HashMap::new();
              for src_arc in &all_nodes {
                  let guard = src_arc.read(trie2_god).expect("poison");
                  for (_ek, dest_map) in guard.children() {
                      for (node_ptr, _ev) in dest_map {
                          let child_arc = node_ptr.as_arc().clone();
                          let ptr = child_arc;
                          *incoming_count.entry(ptr).or_insert(0) += 1;
                      }
                  }
              }

              // Try to compress from each source node
              'src_loop: for src_arc in &all_nodes {
                  // Snapshot children
                  let children_snapshot: Vec<(EdgeKey2, Vec<(PrecomputeNode2Index, LLMTokenBV)>)> = {
                      let g = src_arc.read(trie2_god).expect("poison");
                      g.children()
                          .iter()
                          .map(|(ek, dest_map)| {
                              let entries = dest_map
                                  .iter()
                                  .map(|(np, ev)| (np.clone(), ev.clone()))
                                  .collect::<Vec<_>>();
                              (ek.clone(), entries)
                          })
                          .collect()
                  };

                  for (ek1, entries) in children_snapshot {
                      for (child_ptr, bv1) in entries {
                          let child_arc = child_ptr.as_arc().clone();
                          let child_ptr_raw = child_arc;

                          // Preconditions: B has in-degree 1, not end, and exactly one outgoing edge overall.
                          if incoming_count.get(&child_ptr_raw).cloned().unwrap_or(0) != 1 {
                              continue;
                          }
                          let (is_end, child_outgoing): (bool, Vec<(EdgeKey2, Vec<(PrecomputeNode2Index, LLMTokenBV)>)>) = {
                              let cg = child_arc.read(trie2_god).expect("poison");
                              let mut out = Vec::new();
                              for (ek, dest_map) in cg.children() {
                                  let mut v = Vec::new();
                                  for (np, ev) in dest_map {
                                      v.push((np.clone(), ev.clone()));
                                  }
                                  if !v.is_empty() {
                                      out.push((ek.clone(), v));
                                  }
                              }
                              (cg.value.end, out)
                          };
                          if is_end {
                              continue;
                          }
                          // Exactly one outgoing destination (across all keys)
                          if child_outgoing.len() != 1 {
                              continue;
                          }
                          let (ek2, dests2) = &child_outgoing[0];
                          if dests2.len() != 1 {
                              continue;
                          }
                          let (grand_ptr, bv2) = &dests2[0];
                          let grand_arc = grand_ptr.as_arc().clone();
                          // Check state-id merge safety: not both Some(...)
                          let s1 = ek1.1;
                          // The first edge in a compressible chain must not have a state ID check.
                          // A state ID check on the first edge (s1) is an intermediate validation
                          // that is lost if we merge the edges. We can only merge if the first
                          // edge is just a pop (s1 is None).
                          if s1.is_some() {
                              continue;
                          }
                          let s2 = ek2.1;

                          // Compute merged edge
                          let merged_k = ek1.0 + ek2.0;
                          let merged_sid = s1.or(s2);
                          let merged_key: EdgeKey2 = (merged_k, merged_sid);
                          let merged_bv = &bv1 & bv2;
                          if merged_bv.is_empty() {
                              continue;
                          }

                          // Perform rewire on src: subtract moved tokens from src->child edge, add/merge src->grand edge
                          {
                              let mut src_w = src_arc.write(trie2_god).expect("poison");
                              // 1) Reduce/remove src --ek1--> child by merged_bv
                              if let Some(dest_map_for_ek1) = src_w.children_mut().get_mut(&ek1) {
                                  let child_key_in_map = child_arc.clone();
                                  let mut removed = false;
                                  if let Some(ev) = dest_map_for_ek1.get_mut(&child_key_in_map) {
                                      *ev -= &merged_bv;
                                      if ev.is_empty() {
                                          dest_map_for_ek1.remove(&child_key_in_map);
                                          removed = true;
                                      }
                                  }
                                  if removed && dest_map_for_ek1.is_empty() {
                                      src_w.children_mut().remove(&ek1);
                                  }
                              }
                          }

                          // 2) Add/merge src --merged_key--> grand with merged_bv
                          {
                              let inserter = EdgeInserter::new(
                                  trie2_god,
                                  src_arc.clone(),
                                  merged_key.clone(),
                                  merged_bv.clone(),
                                  |e, n| *e |= n,
                                  |node_value, edge_value| node_value.live_tokens |= edge_value,
                                  |ev, t| *ev &= &t.live_tokens,
                              );
                              let _ = inserter.try_destination(grand_arc.clone()).into_option();
                          }

                          // Mark progress; we'll iterate again to catch further compressible segments.
                          changed = true;
                          // Move on to next source after mutation to avoid borrow complexity.
                          continue 'src_loop;
                      }
                  }
              }

              // After a full pass, prune trivial dead ends introduced by compression.
              if changed {
                  prune_dead_paths_trie2(roots, trie2_god);
                  merge_nodes_trie2(roots, trie2_god);
              }
          }
          crate::debug!(2, "Finished compressing Trie 2 in {} iteration(s).", iterations);
      }

      pub fn clone_trie2_graph(
          root: &Trie2Index,
          trie2_god: &Trie2GodWrapper,
      ) -> (
          Trie2Index,
          HashMap<PrecomputeNode2Index, PrecomputeNode2Index>,
      ) {
          // old_ptr -> new arc
          let mut map: HashMap<PrecomputeNode2Index, PrecomputeNode2Index> = HashMap::new();
          let mut q: VecDeque<PrecomputeNode2Index> = VecDeque::new();

          let root_ptr = *root;
          let root_value = { root.read(trie2_god).expect("poison").value.clone() };
          let new_root = PrecomputeNode2Index::new(trie2_god.insert(PrecomputeNode2::new(root_value)));
          map.insert(root_ptr, new_root.clone());
          q.push_back(root.clone());

          while let Some(old_arc) = q.pop_front() {
              let old_ptr = old_arc;
              let new_arc = map.get(&old_ptr).expect("parent must be created").clone();

              // Snapshot children outside of lock to avoid recursive lock explosion.
              let children_snapshot: Vec<( (usize, Option<StateID>), Vec<(PrecomputeNode2Index, LLMTokenBV)> )> = {
                  let g = old_arc.read(trie2_god).expect("poison");
                  g.children()
                      .iter()
                      .map(|(ek, dest_map)| {
                          let entries = dest_map
                              .iter()
                              .map(|(node_ptr, ev)| {
                                  (node_ptr.clone(), ev.clone())
                              })
                              .collect::<Vec<_>>();
                          (ek.clone(), entries)
                      })
                      .collect()
              };

              // For each child, ensure it exists in map (create a blank new node with same value).
              for (_ek, entries) in &children_snapshot {
                  for (node_ptr, _ev) in entries {
                      let child_arc_old = node_ptr.as_arc().clone();
                      let child_ptr_old = child_arc_old;
                      if !map.contains_key(&child_ptr_old) {
                          let child_value = { child_arc_old.read(trie2_god).expect("poison").value.clone() };
                          let child_arc_new = PrecomputeNode2Index::new(trie2_god.insert(PrecomputeNode2::new(child_value)));
                          map.insert(child_ptr_old, child_arc_new);
                          q.push_back(child_arc_old);
                      }
                  }
              }

              // Now wire edges on new_arc
              {
                  let mut new_g = new_arc.write(trie2_god).expect("poison");
                  for (ek, entries) in children_snapshot {
                      let dest_map = new_g.children_mut().entry(ek).or_default();
                      for (old_node_ptr, ev) in entries {
                          let child_arc_old = old_node_ptr.as_arc().clone();
                          let child_ptr_old = child_arc_old;
                          let child_arc_new = map.get(&child_ptr_old).expect("must exist").clone(); // With weak refs removed, all edges are strong.
                          let new_key = child_arc_new;
                          dest_map.insert(new_key, ev);
                      }
                  }
              }
          }

          // Recompute max_depths in the clone to keep invariants consistent.
          Trie::recompute_all_max_depths(trie2_god, &[new_root.clone()]);
          (new_root, map)
      }
