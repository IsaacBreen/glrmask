          #[time_it]
          pub fn try_insert_unchecked(
              &mut self,
              edge_key: EK,
              edge_value: &mut Option<EV>, // Changed to allow taking the value
              child: Arc<RwLock<Trie<EK, EV, T>>>,
          ) -> Result<(), CycleDetectedError> {

