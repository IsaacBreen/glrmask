                  # Store
                  self.nodes[uid_int] = _NodeData(end_flag=end_flag, groups=groups, max_depth=md_int)

          @staticmethod
          def from_json_string(s: str) -> 'Model':
              data = json.loads(s)
              roots_map = data["precomputed3"]
              arena_json = data["trie3_god"]
