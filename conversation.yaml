        // Compute (state_map, terminals_map) for a single original LLM token ID using precomputed0
        // Returns None if this token is not mapped in precompute stage.
        pub fn compute_commit_maps_precompute0(
            &self,
            llm_token_original: LLMTokenID,
        ) -> Option<(BTreeMap<TokenizerStateID, TokenizerStateID>, BTreeMap<TokenizerStateID, TerminalBV>)> {
            // Map original -> internal using precompute_vocab (stage-local)
            let internal_id = *self.precompute_vocab.original_to_internal.get(&llm_token_original.0)?;
            let mut state_map: BTreeMap<TokenizerStateID, TokenizerStateID> = BTreeMap::new();
            let mut terminals_map: BTreeMap<TokenizerStateID, TerminalBV> = BTreeMap::new();

            for (sid, root0) in &self.precomputed0 {
                // state_map: from precomputed end-state map
                if let Some(end_sid) = self.precomputed0_end_state_map.get(sid).and_then(|m| m.get(&internal_id)) {
                    state_map.insert(*sid, *end_sid);
                }
                // terminals_map: union of gtid on root’s outgoing edges whose dest contains this token
                let mut terminals = TerminalBV::zeros();
                let root_g = root0.read(&self.trie0_god).expect("poison");
                for ((gtid_opt, _disallowed), dests) in root_g.children() {
                    if let Some(gtid) = gtid_opt {
                        // If any child under this key includes the token, the terminal is allowed
                        let mut present = false;
                        for (_child, bv) in dests.iter() {
                            if bv.contains(internal_id) { present = true; break; }
                        }
                        if present {
                            terminals.insert(gtid.0);
                        }
                    }
                }
                terminals_map.insert(*sid, terminals);
            }
            Some((state_map, terminals_map))
        }

