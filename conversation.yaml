              let table_dict = PyDict::new_bound(py);
              for (&state_id, row) in &self.inner.table {
                  let row_dict = PyDict::new_bound(py);

                  let actions_dict = PyDict::new_bound(py);
                  for (&terminal_id, action) in &row.shifts_and_reduces_full {
