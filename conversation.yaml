                                  }
                              }
                              _ => return Err("U8Set JSON array elements must be Int (single value) or 2-element Array of Ints (range)".to_string()),
                          }
                      }
                      Ok(set)
                  }
                  _ => Err("Expected JSONNode::Array for U8Set".to_string()),
