                 py::dict arena_py,                     // uid -> node dict (children carry bitset JSON)
                 py::dict possible_matches,             // tsid -> term_id -> _sep1.Bitset
                 py::object all_internal_llm_tokens_bitset,
                 py::dict internal_to_original_map)
