              states.add_transition(start_state, 1, nt1_state, WaWeight::all());
              states.add_transition(start_state, 3, nt0_state, WaWeight::all());

              let nt_nodes = BTreeMap::from([(NonTerminalID(0), nt0_state), (NonTerminalID(1), nt1_state)]);

