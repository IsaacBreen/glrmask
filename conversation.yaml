              let input = vec![
                  TestEK::new(0, None),
                  TestEK::new(-2, Some(3)),
              ];
              let expected = vec![
                  TestEK::new(-2, Some(3)),
                  TestEK::new(2, None),
                  TestEK::new(-2, None),
              ];
              let got = bubble_up_negative_pops_stack(input);
              assert_eq!(got, expected);
          }

          #[test]
          fn test_stack_pipeline_simple_pair_yields_non_negative_after_neutralize() {
              let input = vec![
