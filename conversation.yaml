              let e = Arc::new(GSSNode::new(empty_acc()));

              let mut c_preds = NodeSet::new();
              c_preds.insert((d, mock_edge(30)));
              c_preds.insert((e, mock_edge(40)));
              let c_preds_map = process_predecessors(&c_preds);
