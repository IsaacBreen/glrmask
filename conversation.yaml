      impl PyCompiledGrammar {
          #[new]
          fn new(exprs: Vec<(String, PyGrammarExpr)>) -> PyResult<Self> {
              let inner_exprs = exprs.into_iter().map(|(s, e)| (s, e.inner)).collect();
              let compiled_grammar = CompiledGrammar::from_exprs(inner_exprs)
