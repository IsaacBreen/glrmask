          expected.set_default_transition(exp_s3, exp_s_after_4, Weight::all()).unwrap();
          expected.add_transition(exp_s_after_4, 7, exp_s_final, Weight::all()).unwrap();

          stochastic_equivalence_test(d, expected);
      }

