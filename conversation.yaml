      // src/precompute4/weighted_automata/simplification.rs
      //
      // Simplified structure with the same core passes and behavior:
      // - One core simplification loop parameterized for small/large DWAs.
      // - Helpers to normalize edges, prune unreachable, relax edge weights, and minimize via partition refinement.
      // - NWA simplification kept feature-complete with light refactoring for clarity.

      #![allow(dead_code)]
      #![allow(clippy::needless_borrow)]

      use crate::r#macro::is_debug_level_enabled;
      use super::common::{StateID, Weight, STOCHASTIC_DEBUG};
      use super::dwa::{DWABody, DWAState, DWAStates, DWA};
      use super::nwa::{NWAState, NWAStates, NWA};
      use crate::precompute4::test_weighted_automata;
      use crate::precompute4::weighted_automata::{NWAStateID, DEFAULT_TRANSITION_SYMBOL};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use std::cell::Cell;
      use std::collections::{BTreeMap, BTreeSet, HashMap, VecDeque, hash_map::DefaultHasher};
      use std::time::Instant;

      /// For very large DWAs, we skip heavy fixpoint/minimization passes to guarantee fast simplification.
      /// This is semantics-preserving; it only reduces the amount of compression performed.
      const LARGE_AUTOMATON_THRESHOLD: usize = 20_000_000;

      thread_local! {
          static IN_SIMPLIFY_CHECK: Cell<bool> = Cell::new(false);
      }

      impl DWA {
          pub fn simplify(&mut self) {
              let is_checking = IN_SIMPLIFY_CHECK.with(|c| c.get());
              let before_simplify = if !is_checking && STOCHASTIC_DEBUG { Some(self.clone()) } else { None };

              Self::simplify_components(&mut self.states, &mut self.body);

              if let Some(before) = before_simplify {
                  IN_SIMPLIFY_CHECK.with(|c| c.set(true));
                  test_weighted_automata::stochastic_equivalence_test(before, self.clone());
                  IN_SIMPLIFY_CHECK.with(|c| c.set(false));
              }
          }

          pub fn simplify_components(states: &mut DWAStates, body: &mut DWABody) {
              let now = Instant::now();
              let initial_len = states.len();
              if states.0.is_empty() {
                  return;
              }
              let large = states.len() > LARGE_AUTOMATON_THRESHOLD;
              Self::simplify_core(states, body, large);
              if is_debug_level_enabled(3) {
                  eprintln!("DWA::simplify_components ({} states -> {} states) took: {:?}", initial_len, states.len(), now.elapsed());
              }
          }

          fn run_pass_with_test<F>(
              states: &mut DWAStates,
              body: &mut DWABody,
              pass_name: &str,
              mut pass: F,
          ) -> bool
          where
              F: FnMut(&mut DWAStates, &mut DWABody) -> bool,
          {
              let is_checking = IN_SIMPLIFY_CHECK.with(|c| c.get());
              let before_dwa = if !is_checking && STOCHASTIC_DEBUG {
                  Some(DWA { states: states.clone(), body: body.clone() })
              } else {
                  None
              };

              let now = Instant::now();
              let changed = pass(states, body);
              let elapsed = now.elapsed();
              if is_debug_level_enabled(3) {
                  eprintln!("DWA simplify pass '{}' took {:?} (changed: {})", pass_name, elapsed, changed);
              }

              if let Some(before) = before_dwa {
                  if changed {
                      let after_dwa = DWA { states: states.clone(), body: body.clone() };
                      IN_SIMPLIFY_CHECK.with(|c| c.set(true));
                      if is_debug_level_enabled(1) {
                          eprintln!("Stochastic testing DWA after pass: {}", pass_name);
                      }
                      test_weighted_automata::stochastic_equivalence_test(before, after_dwa);
                      IN_SIMPLIFY_CHECK.with(|c| c.set(false));
                  }
              }
              changed
          }

          fn simplify_core(states: &mut DWAStates, body: &mut DWABody, large: bool) {
              let max_passes: usize = if large { 2 } else { 50 };
              let pb = if PROGRESS_BAR_ENABLED {
                  let title = if large { "Simplifying DWA (large)" } else { "Simplifying DWA (small)" };
                  let p = ProgressBar::new(max_passes as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template(&("{spinner:.green} [".to_owned() + title + ": {elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} passes ({msg})"))
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };

              // Initial normalize + prune + constrain finals
              if let Some(p) = &pb { p.set_message("normalize/prune".to_string()); }
              let _ = Self::run_pass_with_test(states, body, "initial normalize_edges_inplace", |s, _b| {
                  Self::normalize_edges_inplace(s)
              });
              let _ = Self::run_pass_with_test(states, body, "initial prune_dead_ends", |s, _b| {
                  Self::prune_dead_ends(s)
              });
              let _ = Self::run_pass_with_test(states, body, "initial prune_unreachable", |s, b| {
                  Self::prune_unreachable(s, b)
              });
              let _ = Self::run_pass_with_test(states, body, "initial constrain and absorb", |s, b| {
                  Self::constrain_and_absorb_sinks_fixpoint(s, b)
              });

              let mut changed_any = true;
              let mut passes = 0usize;
              while changed_any && passes < max_passes {
                  passes += 1;
                  if let Some(p) = &pb { p.inc(1); }
                  changed_any = false;

                  if let Some(p) = &pb { p.set_message("normalize".to_string()); }
                  changed_any |= Self::run_pass_with_test(states, body, "normalize_edges_inplace", |s, _b| {
                      Self::normalize_edges_inplace(s)
                  });

                  if let Some(p) = &pb { p.set_message("constrain/absorb".to_string()); }
                  changed_any |= Self::run_pass_with_test(states, body, "constrain_and_absorb_sinks_fixpoint", |s, b| {
                      Self::constrain_and_absorb_sinks_fixpoint(s, b)
                  });

                  // Relax edges locally (cheap) to unlock structure equality.
                  if let Some(p) = &pb { p.set_message("relax local future".to_string()); }
                  changed_any |=
                      Self::run_pass_with_test(states, body, "relax_weights_by_local_future", |s, _b| {
                          Self::relax_weights_by_local_future(s)
                      });

                  if !large {
                      if let Some(p) = &pb { p.set_message("minimize".to_string()); }
                      changed_any |=
                          Self::run_pass_with_test(states, body, "minimize_partition_refinement", |s, b| {
                              Self::minimize_partition_refinement(s, b)
                          });
                  }

                  if let Some(p) = &pb { p.set_message("prune dead".to_string()); }
                  changed_any |= Self::run_pass_with_test(states, body, "prune_dead_ends", |s, _b| {
                      Self::prune_dead_ends(s)
                  });

                  if let Some(p) = &pb { p.set_message("prune unreachable".to_string()); }
                  changed_any |= Self::run_pass_with_test(states, body, "prune_unreachable", |s, b| {
                      Self::prune_unreachable(s, b)
                  });
              }

              if let Some(p) = &pb {
                  p.finish_with_message(format!("Simplified to {} states", states.len()));
              }
          }

          pub fn constrain_and_absorb_sinks_fixpoint(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let mut changed_overall = false;
              // This loop computes the fixpoint of reachability constraints and sink absorption.
              // A small iteration limit is a safeguard against unforeseen non-termination.
              for _ in 0..5 {
                  // Part 1: propagate_and_constrain_weights logic
                  let n = states.len();
                  if n == 0 {
                      return changed_overall;
                  }

                  let mut reachable_weights = vec![Weight::zeros(); n];
                  let mut worklist = VecDeque::new();

                  if body.start_state >= n {
                      return changed_overall;
                  }
                  reachable_weights[body.start_state] = Weight::all();
                  worklist.push_back(body.start_state);

                  while let Some(u) = worklist.pop_front() {
                      let u_rw = reachable_weights[u].clone();
                      if u_rw.is_empty() {
                          continue;
                      }
                      let u_state = &states[u];
                      let gated_u_rw = if let Some(sw) = &u_state.state_weight { &u_rw & sw } else { u_rw };
                      for (_, v, edge_w) in u_state.iter_edges() {
                          if v >= n {
                              continue;
                          }
                          let new_v_rw = &gated_u_rw & edge_w;
                          if !new_v_rw.is_subset_of(&reachable_weights[v]) {
                              reachable_weights[v] |= &new_v_rw;
                              worklist.push_back(v);
                          }
                      }
                  }

                  let mut changed_this_iteration = false;
                  for i in 0..n {
                      let old_fw = states[i].final_weight.clone();
                      if let Some(fw) = states[i].final_weight.as_mut() {
                          *fw &= &reachable_weights[i];
                          if fw.is_empty() {
                              states[i].final_weight = None;
                          }
                      }
                      if states[i].final_weight != old_fw {
                          changed_this_iteration = true;
                      }
                  }

                  // Part 2: absorb_sink_finals_into_incoming logic
                  let mut def_preds: Vec<Vec<StateID>> = vec![Vec::new(); n];
                  let mut ex_preds: Vec<Vec<(StateID, i16)>> = vec![Vec::new(); n];
                  for p in 0..n {
                      for (ch, d, _w) in states[p].iter_edges() {
                          if d < n {
                              if ch == DEFAULT_TRANSITION_SYMBOL {
                                  def_preds[d].push(p);
                              } else {
                                  ex_preds[d].push((p, ch));
                              }
                          }
                      }
                  }

                  for v in 0..n {
                      if !states[v].transitions.is_empty() {
                          continue;
                      }

                      let mut effective_weight = Weight::all();
                      let mut has_restriction = false;
                      if let Some(fw) = &states[v].final_weight {
                          if !fw.is_all_fast() {
                              effective_weight &= fw;
                              has_restriction = true;
                          }
                      }
                      if let Some(sw) = &states[v].state_weight {
                          if !sw.is_all_fast() {
                              effective_weight &= sw;
                              has_restriction = true;
                          }
                      }
                      if !has_restriction {
                          continue;
                      }
                      if def_preds[v].is_empty() && ex_preds[v].is_empty() {
                          continue;
                      }

                      for &p in &def_preds[v] {
                          if let Some(w) = states[p].trans_weights.get_mut(&DEFAULT_TRANSITION_SYMBOL) {
                              let old_w = w.clone();
                              *w &= &effective_weight;
                              if *w != old_w {
                                  changed_this_iteration = true;
                              }
                          }
                      }
                      for &(p, ch) in &ex_preds[v] {
                          if let Some(w) = states[p].trans_weights.get_mut(&ch) {
                              let old_w = w.clone();
                              *w &= &effective_weight;
                              if *w != old_w {
                                  changed_this_iteration = true;
                              }
                          }
                      }

                      if states[v].final_weight.as_ref().map_or(false, |w| !w.is_all_fast()) {
                          states[v].final_weight = Some(Weight::all());
                          changed_this_iteration = true;
                      }
                      if states[v].state_weight.is_some() {
                          states[v].state_weight = None;
                          changed_this_iteration = true;
                      }
                  }

                  changed_overall |= changed_this_iteration;
                  if !changed_this_iteration {
                      break;
                  }
              }
              changed_overall
          }

          pub fn propagate_future_weights(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              // Reverse adjacency (unique preds)
              let mut rev_adj: Vec<Vec<StateID>> = vec![vec![]; n];
              for i in 0..n {
                  for (_, v, _w) in states[i].iter_edges() {
                      if v < n { rev_adj[v].push(i); }
                  }
              }
              for preds in rev_adj.iter_mut() {
                  preds.sort_unstable();
                  preds.dedup();
              }

              let mut future_weights = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();
              for i in 0..n {
                  if let Some(fw) = &states[i].final_weight {
                      if !fw.is_empty() {
                          future_weights[i] = fw.clone();
                          for &pred in &rev_adj[i] {
                              worklist.push_back(pred);
                          }
                      }
                  }
              }

              while let Some(u) = worklist.pop_front() {
                  let mut u_new_fw = states[u].final_weight.clone().unwrap_or_else(Weight::zeros);

                  if let Some(sw) = &states[u].state_weight {
                      u_new_fw |= sw;
                  }

                  for (_, v, edge_w) in states[u].iter_edges() {
                      if v < n {
                          u_new_fw |= &(edge_w & &future_weights[v]);
                      }
                  }

                  if u_new_fw != future_weights[u] {
                      future_weights[u] = u_new_fw;
                      for &pred in &rev_adj[u] {
                          worklist.push_back(pred);
                      }
                  }
              }

              // Precompute complements to avoid recomputing !future_weights[v] many times
              let not_future: Vec<Weight> = future_weights.iter().map(|w| !w).collect();

              // 2. Update edge weights. An edge weight W can be relaxed to W | !future_weight(target)
              // because any bits not in future_weight(target) would be filtered out anyway.
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  let keys: Vec<i16> = st.transitions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.get(&ch) {
                          if v < n {
                              if let Some(w) = st.trans_weights.get_mut(&ch) {
                                  let new_w = &*w | &not_future[v];
                                  if new_w != *w {
                                      *w = new_w;
                                      any_weight_changed = true;
                                  }
                              }
                          }
                      }
                  }
              }

              any_weight_changed
          }

          /// Fast, single-pass local relaxation:
          /// For each state v, compute an upper bound U[v] on future acceptance:
          ///     U[v] = (state_weight[v] if present else ALL) ∧ (final_weight[v] ∪ default_weight[v] ∪ ⋃ exception_weights[v])
          /// Then S[v] = ¬U[v] ⊆ ¬F[v], so for each edge u→v we can safely set weight(u→v) := weight(u→v) ∪ S[v].
          /// This preserves semantics and is O(E) per pass.
          pub fn relax_weights_by_local_future(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }
              // 1) Compute U[v] for all v
              let mut upper: Vec<Weight> = Vec::with_capacity(n);
              for i in 0..n {
                  let mut u = states[i].final_weight.clone().unwrap_or_else(Weight::zeros);
                  for w in states[i].trans_weights.values() {
                      u |= w;
                  }
                  if let Some(sw) = states[i].state_weight.as_ref() {
                      u &= sw;
                  }
                  upper.push(u);
              }
              // 2) Precompute complements S[v] = ¬U[v]
              let not_upper: Vec<Weight> = upper.iter().map(|w| !w).collect();
              // 3) Relax all edges using S[target]
              let mut any_weight_changed = false;
              for i in 0..n {
                  let st = &mut states[i];
                  let keys: Vec<i16> = st.transitions.keys().copied().collect();
                  for ch in keys {
                      if let Some(&v) = st.transitions.get(&ch) {
                          if let Some(w) = st.trans_weights.get_mut(&ch) {
                              let new_w = &*w | &not_upper[v];
                              if new_w != *w {
                                  *w = new_w;
                                  any_weight_changed = true;
                              }
                          }
                      }
                  }
              }
              any_weight_changed
          }

          pub fn normalize_edges_inplace(states: &mut DWAStates) -> bool {
              let mut changed = false;
              for st in &mut states.0 {
                  let before = st.transitions.len();
                  if let Some(&def_tgt) = st.transitions.get(&DEFAULT_TRANSITION_SYMBOL) {
                      if let Some(def_w) = st.trans_weights.get(&DEFAULT_TRANSITION_SYMBOL).cloned() {
                          st.transitions.retain(|&ch, &mut tgt| {
                              if ch == DEFAULT_TRANSITION_SYMBOL { return true; }
                              if tgt != def_tgt { return true; }
                              st.trans_weights.get(&ch) != Some(&def_w)
                          });
                      }
                  }
                  changed |= st.transitions.len() != before;

                  let before_w = st.trans_weights.len();
                  st.trans_weights
                      .retain(|ch, _| st.transitions.contains_key(ch));
                  changed |= st.trans_weights.len() != before_w;
              }
              changed
          }

          /// Partition-refinement minimization (structure-only), aggregating weights by union.
          pub fn minimize_partition_refinement(states: &mut DWAStates, body: &mut DWABody) -> bool {
              let n = states.0.len();
              if n <= 1 {
                  return false;
              }

              // Initial partition by outputs (state_weight, final_weight).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<(Option<Weight>, Option<Weight>), usize> = HashMap::new();
              for i in 0..n {
                  let key = (states[i].state_weight.clone(), states[i].final_weight.clone());
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Refine until stable
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<(
                      Option<Weight>, Option<Weight>, BTreeMap<i16, (usize, Weight)>
                  ), usize> = HashMap::new();

                  for i in 0..n {
                      let st = &states[i];
                      let trans_sig: BTreeMap<_, _> = st.transitions.iter().map(|(ch, &tgt)| (*ch, (part[tgt], st.trans_weights.get(ch).cloned().unwrap_or_else(Weight::all)))).collect();

                      let sig = (st.state_weight.clone(), st.final_weight.clone(), trans_sig);
                      let next_pid = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(next_pid);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Build groups
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Map partition id -> new state id
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<DWAState> = vec![DWAState::default(); groups.len()];

              // Pre-assign ids
              for (pid, _) in &groups {
                  let new_id = pid_to_new.len();
                  pid_to_new.insert(*pid, new_id);
              }

              // Rebuild states by copying representative weights and remapping targets by partition.
              for (pid, members) in &groups {
                  let rep = members[0];
                  let rep_state = &states[rep];
                  let new_id = *pid_to_new.get(pid).unwrap();

                  let mut st = DWAState::default();
                  st.state_weight = rep_state.state_weight.clone();
                  st.final_weight = rep_state.final_weight.clone();

                  // Transitions (copy rep structure; members have the same by construction)
                  for (ch, tgt) in &rep_state.transitions {
                      let cls = part[*tgt];
                      st.transitions.insert(*ch, *pid_to_new.get(&cls).unwrap());
                      if let Some(w) = rep_state.trans_weights.get(ch) {
                          st.trans_weights.insert(*ch, w.clone());
                      }
                  }

                  new_states[new_id] = st;
              }

              states.0 = new_states;
              let _ = Self::normalize_edges_inplace(states);
              let start_pid = part[body.start_state];
              body.start_state = *pid_to_new.get(&start_pid).unwrap();

              true
          }

          pub fn prune_dead_ends(states: &mut DWAStates) -> bool {
              let n = states.len();
              if n == 0 {
                  return false;
              }

              // 1. Backward reachability from final states to find "live" states.
              let mut live = vec![false; n];
              let mut q_live: VecDeque<usize> = VecDeque::new();
              let mut rev_adj: Vec<Vec<usize>> = vec![vec![]; n];
              for i in 0..n {
                  if states[i].final_weight.as_ref().map_or(false, |w| !w.is_empty()) {
                      live[i] = true;
                      q_live.push_back(i);
                  }
                  for (_, v, w) in states[i].iter_edges() {
                      if v < n && !w.is_empty() {
                          rev_adj[v].push(i);
                      }
                  }
              }
              while let Some(u) = q_live.pop_front() {
                  for &v in &rev_adj[u] {
                      if !live[v] {
                          live[v] = true;
                          q_live.push_back(v);
                      }
                  }
              }

              // 2. Remove transitions to non-live states, preserving correctness.
              let mut changed = false;
              for i in 0..n {
                  let st = &mut states[i];

                  // Check if default transition goes to a live state.
                  let default_goes_live = st.transitions.get(&DEFAULT_TRANSITION_SYMBOL).map_or(false, |&d| d < n && live[d]);

                  // A transition to a dead state can be removed if it's not the default
                  // and the default goes to a live state.
                  let before = st.transitions.len();
                  st.transitions.retain(|&ch, tgt| {
                      if *tgt >= n { return false; } // Target is out of bounds (shouldn't happen after prune_unreachable)
                      if live[*tgt] { return true; } // Target is live
                      if ch == DEFAULT_TRANSITION_SYMBOL { return false; } // Default to dead state is removed
                      // Exception to dead state is kept only if the default goes live.
                      default_goes_live
                  });

                  if st.transitions.len() != before {
                      changed = true;
                      st.trans_weights.retain(|ch, _| st.transitions.contains_key(ch));
                  }
              }
              changed
          }

          pub fn prune_unreachable(states: &mut DWAStates, body: &mut DWABody) -> bool {
              if states.0.is_empty() {
                  return false;
              }
              let n = states.0.len();

              // 1. Forward reachability from start state.
              let mut visited = vec![false; n];
              let mut q: VecDeque<usize> = VecDeque::new();
              if body.start_state < n {
                  visited[body.start_state] = true;
                  q.push_back(body.start_state);
              } else {
                  // Start state is out of bounds, everything is unreachable.
                  if n > 0 {
                      states.0.clear();
                      body.start_state = states.add_state();
                      return true;
                  }
                  return false;
              }
              while let Some(u) = q.pop_front() {
                  for (_, v, _w) in states[u].iter_edges() {
                      if v < n && !visited[v] {
                          visited[v] = true;
                          q.push_back(v);
                      }
                  }
              }

              let num_reachable = visited.iter().filter(|&&b| b).count();
              if num_reachable == n {
                  return false;
              }

              // 2. Remap kept states.
              let mut map = vec![usize::MAX; n];
              let mut new_states: Vec<DWAState> = Vec::with_capacity(num_reachable);
              for i in 0..n {
                  if visited[i] {
                      map[i] = new_states.len();
                      new_states.push(states[i].clone());
                  }
              }

              for st in &mut new_states {
                  for tgt in st.transitions.values_mut() {
                      *tgt = map[*tgt];
                  }
              }
              states.0 = new_states;
              if num_reachable > 0 {
                  body.start_state = map[body.start_state];
              } else {
                  // This case should be handled by the start_state check above, but for safety:
                  states.0.clear();
                  body.start_state = states.add_state();
              }
              true
          }
      }

      impl NWA {
          pub fn push_weights(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }

              // 1. Compute d[q] for all q (future weights) using a worklist algorithm.
              // This is a backward dataflow analysis.
              let mut d = vec![Weight::zeros(); n];
              let mut worklist = VecDeque::new();
              let mut in_worklist = vec![false; n];

              // Precompute reverse adjacency list.
              let mut rev_adj: Vec<Vec<NWAStateID>> = vec![vec![]; n];
              for i in 0..n {
                  let st = &self.states[i];
                  for (target, _) in &st.epsilons {
                      if *target < n {
                          rev_adj[*target].push(i);
                      }
                  }
                  for (_, targets) in &st.transitions {
                      for (target, _) in targets {
                          if *target < n {
                              rev_adj[*target].push(i);
                          }
                      }
                  }
              }
              for preds in &mut rev_adj {
                  preds.sort_unstable();
                  preds.dedup();
              }

              // Initialize d and worklist with final states.
              for i in 0..n {
                  if let Some(fw) = &self.states[i].final_weight {
                      if !fw.is_empty() {
                          d[i] = fw.clone();
                          // Add predecessors of final states to the worklist.
                          for &p in &rev_adj[i] {
                              if !in_worklist[p] {
                                  worklist.push_back(p);
                                  in_worklist[p] = true;
                              }
                          }
                      }
                  }
              }

              while let Some(p) = worklist.pop_front() {
                  in_worklist[p] = false;
                  let st = &self.states[p];
                  let mut new_d_p = st.final_weight.clone().unwrap_or_else(Weight::zeros);

                  for (target, weight) in &st.epsilons {
                      if *target < n {
                          new_d_p |= &(weight & &d[*target]);
                      }
                  }
                  for (_, targets) in &st.transitions {
                      for (target, weight) in targets {
                          if *target < n {
                              new_d_p |= &(weight & &d[*target]);
                          }
                      }
                  }

                  if !new_d_p.is_subset_of(&d[p]) {
                      d[p] |= &new_d_p;
                      for &pred in &rev_adj[p] {
                          if !in_worklist[pred] {
                              worklist.push_back(pred);
                              in_worklist[pred] = true;
                          }
                      }
                  }
              }

              let not_d: Vec<Weight> = d.iter().map(|w| !w).collect();
              let mut any_change = false;

              // 2. Update weights
              for i in 0..n {
                  let st = &mut self.states[i];
                  // Final weights: ρ'(q) ← ρ(q) | !d(q)
                  let old_fw = st.final_weight.clone();
                  let new_fw = st.final_weight.clone().unwrap_or_else(Weight::zeros) | &not_d[i];
                  if new_fw.is_empty() {
                      st.final_weight = None;
                  } else {
                      st.final_weight = Some(new_fw);
                  }
                  if st.final_weight != old_fw {
                      any_change = true;
                  }

                  // Edge weights: w'[e] = (w[e] | !d(p)) & d(n)
                  for (target, weight) in &mut st.epsilons {
                      if *target < n {
                          let old_w = weight.clone();
                          *weight |= &not_d[i];
                          *weight &= &d[*target];
                          if *weight != old_w {
                              any_change = true;
                          }
                      }
                  }
                  for (_, targets) in &mut st.transitions {
                      for (target, weight) in targets {
                          if *target < n {
                              let old_w = weight.clone();
                              *weight |= &not_d[i];
                              *weight &= &d[*target];
                              if *weight != old_w {
                                  any_change = true;
                              }
                          }
                      }
                  }
              }

              // Handle initial weight: λ'(start) = λ(start) & d(start)
              let old_start = self.body.start_state;
              if old_start < n && !d[old_start].is_all_fast() {
                  let new_start = self.states.add_state();
                  self.states.add_epsilon(new_start, old_start, d[old_start].clone());
                  self.body.start_state = new_start;
                  any_change = true;
              }

              any_change
          }
      }

      macro_rules! run_pass_macro {
          ($self:ident, $pb:expr, $msg:expr, $changed_any:expr, $pass_expr:expr) => {
              {
                  if let Some(p) = $pb {
                      p.set_message($msg.to_string());
                  }
                  let before_n = $self.states.len();
                  let now = Instant::now();
                  let changed = $pass_expr;
                  let elapsed = now.elapsed();
                  let after_n = $self.states.len();
                  if is_debug_level_enabled(3) {
                      eprintln!("NWA simplify pass '{}' ({} -> {}) took {:?} (changed: {})", $msg, before_n, after_n, elapsed, changed);
                  }
                  if changed {
                      *$changed_any = true;
                  }
              }
          };
      }

      impl NWA {
          pub fn simplify(&mut self) -> bool {
              let now = Instant::now();
              let initial_n = self.states.len();
              let max_passes = 15; // Allow a few more passes for the new logic
              let pb = if PROGRESS_BAR_ENABLED {
                  let p = ProgressBar::new(max_passes as u64);
                  p.set_style(
                      ProgressStyle::default_bar()
                          .template("{spinner:.green} [Simplifying NWA: {elapsed_precise}] [{bar:40.cyan/blue}] {pos}/{len} passes ({msg})")
                          .expect("progress-bar"),
                  );
                  Some(p)
              } else {
                  None
              };

              let mut changed_overall = false;
              let mut passes = 0;
              loop {
                  passes += 1;
                  if let Some(p) = &pb { p.inc(1); }
                  let mut changed_this_iteration = false;

                  // --- Structural Simplification Passes ---
                  run_pass_macro!(self, &pb, "normalize", &mut changed_this_iteration, self.states.normalize_edges_inplace());
                  run_pass_macro!(self, &pb, "dedup labeled", &mut changed_this_iteration, self.dedup_labeled_edges());
                  run_pass_macro!(self, &pb, "dedup epsilons", &mut changed_this_iteration, self.dedup_epsilon_edges());
                  run_pass_macro!(self, &pb, "unify final states", &mut changed_this_iteration, self.unify_final_states());
                  run_pass_macro!(self, &pb, "bypass ε-chains", &mut changed_this_iteration, self.bypass_trivial_epsilon_chains());
                  run_pass_macro!(self, &pb, "collapse SCCs", &mut changed_this_iteration, self.collapse_all_weight_epsilon_sccs());
                  run_pass_macro!(self, &pb, "prune unreachable", &mut changed_this_iteration, self.prune_unreachable());
                  run_pass_macro!(self, &pb, "prune dead ends", &mut changed_this_iteration, self.prune_dead_ends());
                  run_pass_macro!(self, &pb, "merge equivalent", &mut changed_this_iteration, self.merge_equivalent_states_partition());

                  if changed_this_iteration {
                      changed_overall = true;
                  } else {
                      // Structure is stable. Try pushing weights to unlock more simplifications.
                      let mut pushed = false;
                      run_pass_macro!(self, &pb, "push weights", &mut pushed, self.push_weights());
                      if pushed {
                          changed_overall = true;
                          // Loop again to apply structural passes on the weight-pushed graph.
                      } else {
                          // No more changes are possible.
                          break;
                      }
                  }

                  if passes >= max_passes { break; }
              }

              if let Some(p) = &pb { p.finish_with_message(format!("Simplified to {} states", self.states.len())); }
              if is_debug_level_enabled(3) {
                  eprintln!("NWA::simplify ({} states -> {} states) took: {:?}", initial_n, self.states.len(), now.elapsed());
              }
              changed_overall
          }

          fn prune_unreachable(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut reachable = vec![false; n];
              let mut q = VecDeque::new();

              if self.body.start_state < n {
                  reachable[self.body.start_state] = true;
                  q.push_back(self.body.start_state);
              } else {
                  let changed = n > 0;
                  if changed {
                      self.states.0.clear();
                      self.body.start_state = self.states.add_state();
                  }
                  return changed;
              }

              while let Some(u) = q.pop_front() {
                  let st = &self.states[u];
                  for (v, _) in &st.epsilons {
                      if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                  }
                  for (_, targets) in &st.transitions {
                      for (v, _) in targets {
                          if *v < n && !reachable[*v] { reachable[*v] = true; q.push_back(*v); }
                      }
                  }
              }

              let num_reachable = reachable.iter().filter(|&&b| b).count();
              if num_reachable == n { return false; }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_reachable);
              for i in 0..n {
                  if reachable[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);
                  st.transitions.values_mut().for_each(|targets| {
                      for (v, _) in targets {
                          *v = remap[*v];
                      }
                  });
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

      fn prune_dead_ends(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              // Fast liveness analysis via backward reachability from final states.
              let mut live = vec![false; n];
              let mut q = VecDeque::new();
              let mut rev_adj: Vec<Vec<NWAStateID>> = vec![vec![]; n];

              for p in 0..n {
                  let st = &self.states[p];
                  // An edge can only propagate liveness if its weight is not empty.
                  for &(t, ref w) in &st.epsilons {
                      if t < n && !w.is_empty() { rev_adj[t].push(p); }
                  }
                  for (_, targets) in &st.transitions {
                      for &(t, ref w) in targets {
                          if t < n && !w.is_empty() { rev_adj[t].push(p); }
                      }
                  }
              }

              for s in 0..n {
                  if self.states[s].final_weight.as_ref().map_or(false, |w| !w.is_empty()) {
                      if !live[s] {
                          live[s] = true;
                          q.push_back(s);
                      }
                  }
              }

              while let Some(v) = q.pop_front() {
                  for &p in &rev_adj[v] {
                      if !live[p] {
                          live[p] = true;
                          q.push_back(p);
                      }
                  }
              }

              if self.body.start_state >= n || !live[self.body.start_state] {
                  let changed = n > 0;
                  if changed {
                      self.states.0.clear();
                      self.body.start_state = self.states.add_state();
                  }
                  return changed;
              }

              let num_live = live.iter().filter(|&&b| b).count();
              if num_live == n { return false; }

              let mut remap = vec![usize::MAX; n];
              let mut new_states_vec = Vec::with_capacity(num_live);
              for i in 0..n {
                  if live[i] {
                      remap[i] = new_states_vec.len();
                      new_states_vec.push(self.states[i].clone());
                  }
              }

              for st in &mut new_states_vec {
                  st.epsilons.retain(|(v, _)| live[*v]);
                  st.epsilons.iter_mut().for_each(|(v, _)| *v = remap[*v]);

                  st.transitions.values_mut().for_each(|targets| {
                      targets.retain(|(v, _)| live[*v]);
                      targets.iter_mut().for_each(|(v, _)| *v = remap[*v]);
                  });
                  st.transitions.retain(|_, targets| !targets.is_empty());
              }

              self.states.0 = new_states_vec;
              self.body.start_state = remap[self.body.start_state];

              true
          }

          fn collapse_all_weight_epsilon_sccs(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 { return false; }

              let mut index = 0;
              let mut indices = vec![usize::MAX; n];
              let mut lowlink = vec![0; n];
              let mut on_stack = vec![false; n];
              let mut stack = Vec::new();
              let mut comp_of = vec![0; n];
              let mut comps: Vec<Vec<NWAStateID>> = Vec::new();

              for i in 0..n {
                  if indices[i] == usize::MAX {
                      self.strongconnect(i, &mut index, &mut indices, &mut lowlink, &mut on_stack, &mut stack, &mut comp_of, &mut comps);
                  }
              }

              if comps.len() == n { return false; }

              let mut new_states_vec = Vec::with_capacity(comps.len());
              for (cid, comp) in comps.iter().enumerate() {
                  let mut new_state = NWAState::default();

                  let mut final_weight: Option<Weight> = None;
                  for &sid in comp {
                      if let Some(fw) = &self.states[sid].final_weight {
                          if let Some(acc) = &mut final_weight { *acc |= fw; } else { final_weight = Some(fw.clone()); }
                      }
                  }
                  new_state.final_weight = final_weight;

                  for &sid in comp {
                      for (&lbl, targets) in &self.states[sid].transitions {
                          for &(to, ref w) in targets {
                              let to_comp = comp_of[to];
                              Self::add_transition_to_state(&mut new_state, lbl, to_comp, w.clone());
                          }
                      }
                      for &(to, ref w) in &self.states[sid].epsilons {
                          let to_comp = comp_of[to];
                          if cid != to_comp || !w.is_all_fast() {
                              new_state.epsilons.push((to_comp, w.clone()));
                          }
                      }
                  }
                  new_states_vec.push(new_state);
              }

              self.states.0 = new_states_vec;
              self.body.start_state = comp_of[self.body.start_state];

              true
          }

          fn strongconnect(&self, v: NWAStateID, index: &mut usize, indices: &mut [usize], lowlink: &mut [usize], on_stack: &mut [bool], stack: &mut Vec<NWAStateID>, comp_of: &mut [usize], comps: &mut Vec<Vec<NWAStateID>>) {
              indices[v] = *index;
              lowlink[v] = *index;
              *index += 1;
              stack.push(v);
              on_stack[v] = true;

              for (w, weight) in &self.states[v].epsilons {
                  if weight.is_all_fast() {
                      if indices[*w] == usize::MAX {
                          self.strongconnect(*w, index, indices, lowlink, on_stack, stack, comp_of, comps);
                          lowlink[v] = lowlink[v].min(lowlink[*w]);
                      } else if on_stack[*w] {
                          lowlink[v] = lowlink[v].min(indices[*w]);
                      }
                  }
              }

              if lowlink[v] == indices[v] {
                  let mut comp = Vec::new();
                  loop {
                      let w = stack.pop().unwrap();
                      on_stack[w] = false;
                      comp_of[w] = comps.len();
                      comp.push(w);
                      if w == v { break; }
                  }
                  comps.push(comp);
              }
          }

          fn add_transition_to_state(state: &mut NWAState, on: i16, to: NWAStateID, w: Weight) {
              let targets = state.transitions.entry(on).or_default();
              if let Some((_, existing_w)) = targets.iter_mut().find(|(t, _)| *t == to) {
                  *existing_w |= &w;
              } else {
                  targets.push((to, w));
              }
          }

          /// New: Merge duplicate labeled edges by unioning weights per (label, target).
          fn dedup_labeled_edges(&mut self) -> bool {
              let mut changed = false;
              for st in &mut self.states.0 {
                  for targets in st.transitions.values_mut() {
                      if targets.len() <= 1 {
                          continue;
                      }
                      let old_targets = targets.clone();

                      let mut acc: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                      for (to, w) in targets.iter() {
                          *acc.entry(*to).or_insert_with(Weight::zeros) |= w;
                      }

                      let new_targets: Vec<_> = acc.into_iter().collect();
                      if new_targets != old_targets {
                          *targets = new_targets;
                          changed = true;
                      }
                  }
              }
              changed
          }
      }

      impl NWAStates {
          /// Normalize in-place:
          /// - Remove empty-weight edges (ε, labeled, and default)
          /// - Drop labeled transitions that are identical to the default (same target and weight)
          fn normalize_edges_inplace(&mut self) -> bool {
              let mut changed = false;
              for st in &mut self.0 {
                  // Remove empty-weight epsilons
                  let before_eps = st.epsilons.len();
                  st.epsilons.retain(|(_, w)| !w.is_empty());
                  if st.epsilons.len() != before_eps { changed = true; }

                  // Remove empty-weight labeled transitions
                  let before_lbl = st.transitions.len();
                  st.transitions.values_mut().for_each(|targets| targets.retain(|(_, w)| !w.is_empty()));
                  st.transitions.retain(|_, targets| !targets.is_empty());
                  if st.transitions.len() != before_lbl { changed = true; }

                  // NOTE: The old logic for removing labeled transitions identical to default is now simpler
                  // as there is only one kind of default transition. However, since an NWA can have multiple
                  // default transitions, we leave this logic to the DWA simplification.
              }
              changed
          }
      }

      impl NWA {
          /// Deduplicate epsilon edges to the same target by unioning their weights.
          fn dedup_epsilon_edges(&mut self) -> bool {
              let mut changed = false;
              for st in &mut self.states.0 {
                  if st.epsilons.len() <= 1 {
                      continue;
                  }
                  let mut acc: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  for (to, w) in &st.epsilons {
                      let e = acc.entry(*to).or_insert_with(Weight::zeros);
                      *e |= w;
                  }
                  let new_eps: Vec<(NWAStateID, Weight)> = acc.into_iter().collect();
                  if new_eps != st.epsilons {
                      st.epsilons = new_eps;
                      changed = true;
                  }
              }
              changed
          }

          /// Consolidate all final states into a single new final state.
          /// For each state `s` with `final_weight` `w`, add an ε-transition from `s` to a new
          /// final state `F` with weight `w`, and then clear `s.final_weight`. `F` will have
          /// `final_weight = ALL`.
          fn unify_final_states(&mut self) -> bool {
              let final_states: Vec<(NWAStateID, Weight)> = self
                  .states
                  .0
                  .iter()
                  .enumerate()
                  .filter_map(|(i, s)| s.final_weight.clone().map(|w| (i, w)))
                  .collect();

              if final_states.len() <= 1 {
                  return false;
              }

              // Find a suitable existing sink final state to reuse.
              let sink_final_id = self.states.0.iter().enumerate().find(|(_, s)| {
                  s.final_weight.is_some() &&
                  s.transitions.is_empty() &&
                  s.epsilons.is_empty()
              }).map(|(i, _)| i);

              let unified_final_id = sink_final_id.unwrap_or_else(|| {
                  let new_id = self.states.add_state();
                  self.states[new_id].final_weight = Some(Weight::all());
                  new_id
              });

              // Ensure the target final state has weight ALL. This is safe because we redirect
              // other final states via epsilons carrying their original final weights.
              if self.states[unified_final_id].final_weight != Some(Weight::all()) {
                  self.states[unified_final_id].final_weight = Some(Weight::all());
              }

              let mut changed = false;
              for (sid, weight) in final_states {
                  if sid == unified_final_id {
                      continue;
                  }

                  if !weight.is_empty() {
                      self.states.add_epsilon(sid, unified_final_id, weight);
                  }
                  if self.states[sid].final_weight.is_some() {
                      self.states[sid].final_weight = None;
                      changed = true;
                  }
              }

              changed
          }

          /// Bypass trivial ε-chains: if a state s
          /// - has no labeled transitions
          /// - has no final weight
          /// - has exactly one ε edge with ALL weight to t (t != s)
          /// then redirect all incoming edges targeting s to t and (after a prune) drop s.
          fn bypass_trivial_epsilon_chains(&mut self) -> bool {
              let n = self.states.len();
              if n == 0 {
                  return false;
              }
              let mut bypass: Vec<Option<NWAStateID>> = vec![None; n];
              for s in 0..n {
                  let st = &self.states[s];
                  if st.final_weight.is_some() { continue; }
                  if !st.transitions.is_empty() { continue; }
                  if st.epsilons.len() != 1 { continue; }
                  let (t, w) = &st.epsilons[0];
                  if !w.is_all_fast() { continue; }
                  if *t == s { continue; }
                  bypass[s] = Some(*t);
              }
              if bypass.iter().all(|o| o.is_none()) {
                  return false;
              }

              // Compute ultimate mapping along bypass chains (path compression-like).
              let mut ultimate: Vec<NWAStateID> = (0..n).collect();
              for i in 0..n {
                  let mut v = i;
                  while let Some(t) = bypass[v] {
                      if t == v { break; }
                      v = t;
                  }
                  ultimate[i] = v;
              }

              let mut changed = false;
              for st in &mut self.states.0 {
                  for (v, _) in &mut st.epsilons {
                      let nv = ultimate[*v];
                      if nv != *v { *v = nv; changed = true; }
                  }
                  for (_, targets) in &mut st.transitions {
                      for (v, _) in targets {
                          let nv = ultimate[*v];
                          if nv != *v { *v = nv; changed = true; }
                      }
                  }
              }
              let new_start = ultimate[self.body.start_state];
              if new_start != self.body.start_state {
                  self.body.start_state = new_start;
                  changed = true;
              }
              if changed {
                  changed |= self.prune_unreachable();
              }
              changed
          }

          /// Merge equivalent NWA states by partition refinement.
          /// Signature per state includes:
          ///  - final_weight
          ///  - epsilons: vector of (class(target), UNION(weight to that class)), sorted by class
          ///  - labeled transitions: vector of (label, class(target), weight), sorted by label
          fn merge_equivalent_states_partition(&mut self) -> bool {
              let n = self.states.len();
              if n <= 1 {
                  return false;
              }
              // Initial partition by final_weight only (coarse).
              let mut part: Vec<usize> = vec![0; n];
              let mut canon0: HashMap<Option<Weight>, usize> = HashMap::new();
              for i in 0..n {
                  let key = self.states[i].final_weight.clone();
                  let next_id = canon0.len();
                  part[i] = *canon0.entry(key).or_insert(next_id);
              }

              // Iteratively refine using structural signatures keyed by current partitions.
              let mut changed = true;
              let mut rounds = 0usize;
              while changed && rounds < 30 {
                  rounds += 1;
                  changed = false;
                  let mut next_part: Vec<usize> = vec![0; n];
                  let mut sig2pid: HashMap<(Option<Weight>, u64), usize> = HashMap::new();

                  for i in 0..n {
                      let st = &self.states[i];

                      let transitions_hash = {
                          use std::hash::{Hash, Hasher};
                          let mut hasher = DefaultHasher::new();

                          // Hash epsilon transitions
                          let mut eps_map: BTreeMap<usize, Weight> = BTreeMap::new();
                          for (to, w) in &st.epsilons {
                              *eps_map.entry(part[*to]).or_default() |= w;
                          }
                          eps_map.hash(&mut hasher);

                          // Hash labeled transitions
                          let mut lbl_map: BTreeMap<(i16, usize), Weight> = BTreeMap::new();
                          for (lbl, targets) in &st.transitions {
                              for (to, w) in targets {
                                  *lbl_map.entry((*lbl, part[*to])).or_default() |= w;
                              }
                          }
                          lbl_map.hash(&mut hasher);

                          hasher.finish()
                      };

                      let sig = (st.final_weight.clone(), transitions_hash);
                      let pid_next = sig2pid.len();
                      next_part[i] = *sig2pid.entry(sig).or_insert(pid_next);
                  }
                  if next_part != part {
                      part = next_part;
                      changed = true;
                  }
              }

              // Group states by final partition id
              let mut groups: BTreeMap<usize, Vec<usize>> = BTreeMap::new();
              for (i, p) in part.iter().enumerate() {
                  groups.entry(*p).or_default().push(i);
              }
              if groups.len() == n {
                  return false;
              }

              // Map partition id -> new state id
              let mut pid_to_new: HashMap<usize, usize> = HashMap::new();
              let mut new_states: Vec<NWAState> = Vec::with_capacity(groups.len());
              for (pid, members) in &groups {
                  let rep = members[0];
                  let mut st = self.states[rep].clone();

                  // Fix targets to new partition ids
                  // Labeled transitions
                  let trans = st.transitions.clone();
                  st.transitions.clear();
                  for (lbl, targets) in trans {
                      let mut new_targets = Vec::new();
                      for (to, w) in targets {
                          let cls = part[to];
                          new_targets.push((cls, w));
                      }
                      st.transitions.insert(lbl, new_targets);
                  }
                  // Epsilons (aggregate after class remap)
                  let eps = st.epsilons.clone();
                  st.epsilons.clear();
                  for (to, w) in eps {
                      let cls = part[to];
                      st.epsilons.push((cls, w));
                  }

                  pid_to_new.insert(*pid, new_states.len());
                  new_states.push(st);
              }

              // Rewrite class ids in edges to actual new state ids and deduplicate ε-edges
              for st in &mut new_states {
                  // Labeled
                  let trans = st.transitions.clone();
                  st.transitions.clear();
                  for (lbl, targets) in trans {
                      let mut new_targets = Vec::new();
                      for (cls, w) in targets {
                          let to_new = *pid_to_new.get(&cls).expect("missing class");
                          new_targets.push((to_new, w));
                      }
                      st.transitions.insert(lbl, new_targets);
                  }
                  // Epsilons
                  let eps = st.epsilons.clone();
                  st.epsilons.clear();
                  let mut acc: BTreeMap<NWAStateID, Weight> = BTreeMap::new();
                  for (cls, w) in eps {
                      let to_new = *pid_to_new.get(&cls).expect("missing class");
                      let e = acc.entry(to_new).or_insert_with(Weight::zeros);
                      *e |= &w;
                  }
                  st.epsilons = acc.into_iter().collect();
              }

              self.states.0 = new_states;
              self.body.start_state = *pid_to_new.get(&part[self.body.start_state]).expect("missing start class");
              let _ = self.states.normalize_edges_inplace();
              let _ = self.dedup_epsilon_edges();

              true
          }
      }
    src/precompute4/weighted_automata/test_determinization.rs: |-
      #![cfg(test)]

      use super::*;

      #[test]
      fn test_determinize_simple_divergence() {
          let mut nwa = NWA::new(); // new() creates a start state 0
          nwa.states.0.clear(); // but we'll manage states manually for clarity

          // NWA for "ac" with weight A1 (0)
          let s0 = nwa.states.add_state();
          let s1 = nwa.states.add_state();
          let s2 = nwa.states.add_state();
          nwa.add_transition(s0, 'a' as i16, s1, Weight::all()).unwrap();
          nwa.add_transition(s1, 'c' as i16, s2, Weight::all()).unwrap();
          nwa.states[s2].final_weight = Some(Weight::from_item(0));

          // NWA for "bc" with weight A2 (1)
          let s3 = nwa.states.add_state();
          let s4 = nwa.states.add_state();
          let s5 = nwa.states.add_state();
          nwa.add_transition(s3, 'b' as i16, s4, Weight::all()).unwrap();
          nwa.add_transition(s4, 'c' as i16, s5, Weight::all()).unwrap();
          nwa.states[s5].final_weight = Some(Weight::from_item(1));

          // Union them with a new start state
          let start = nwa.states.add_state();
          nwa.add_epsilon(start, s0, Weight::all());
          nwa.add_epsilon(start, s3, Weight::all());
          nwa.body.start_state = start;

          let dwa = nwa.determinize_to_dwa();
          println!("{}", nwa);
          println!("{}", dwa);

          // Check accepted words and their weights.
          assert_eq!(
              dwa.eval_word_weight(&['a' as i16, 'c' as i16]),
              Weight::from_item(0)
          );
          assert_eq!(
              dwa.eval_word_weight(&['b' as i16, 'c' as i16]),
              Weight::from_item(1)
          );
          assert!(dwa.eval_word_weight(&['a' as i16, 'b' as i16]).is_empty());
          assert!(dwa.eval_word_weight(&['c' as i16]).is_empty());
          assert!(dwa.eval_word_weight(&[]).is_empty());

          // An efficient DWA should merge states with similar future behavior,
          // resulting in a small automaton.
          // Allowing for a sink state, we assert a small number.
          assert!(
              dwa.states.len() <= 4,
              "Expected a small number of states for simple divergence, got {}",
              dwa.states.len()
          );
      }

      #[test]
      fn test_determinize_hypercube_catastrophe() {
          const N: usize = 4;
          let alphabet: Vec<i16> = (0..N as i16).map(|i| i + 'a' as i16).collect();
          let atoms: Vec<Weight> = (0..N).map(Weight::from_item).collect();

          let mut nwa = NWA::new();
          nwa.states.0.clear();

          let mut component_starts = vec![];

          for i in 0..N {
              // L_i = words without alphabet[i]
              let s = nwa.states.add_state();
              component_starts.push(s);
              nwa.states[s].final_weight = Some(atoms[i].clone());

              for j in 0..N {
                  if i == j {
                      continue;
                  }
                  nwa.add_transition(s, alphabet[j], s, Weight::all()).unwrap();
              }
          }

          let start = nwa.states.add_state();
          for &s_comp in &component_starts {
              nwa.add_epsilon(start, s_comp, Weight::all());
          }
          nwa.body.start_state = start;

          let dwa = nwa.determinize_to_dwa();

          // An efficient DWA construction should avoid the 2^N state explosion by
          // encoding the history of seen characters within the accumulated weight,
          // not in the state space.
          assert!(
              dwa.states.len() <= 2,
              "Expected a very small DWA (1-2 states) for hypercube, but got {} states. State explosion was not avoided.",
              dwa.states.len()
          );

          // Test some words
          // word "ac" (chars 0 and 2) -> should not contain 1 or 3 ('b' or 'd'). Belongs to L1 and L3.
          // Weight should be A1 | A3.
          let word_ac = vec![alphabet[0], alphabet[2]];
          let expected_weight_ac = &atoms[1] | &atoms[3];
          assert_eq!(dwa.eval_word_weight(&word_ac), expected_weight_ac);

          // word "abcd" -> contains all symbols. Should be rejected by all components.
          let word_all = alphabet.clone();
          assert!(dwa.eval_word_weight(&word_all).is_empty());

          // empty word -> belongs to all languages.
          let empty_word = vec![];
          let mut expected_weight_empty = Weight::zeros();
          for atom in &atoms {
              expected_weight_empty |= atom;
          }
          assert_eq!(dwa.eval_word_weight(&empty_word), expected_weight_empty);
      }
