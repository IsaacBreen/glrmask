                              let follow_lhs = follow_sets.get(lhs).unwrap().clone();
                              follow_sets.get_mut(nt).unwrap().extend(follow_lhs);
                          }

                          if follow_sets.get_mut(nt).unwrap().len() != old_size {
                              changed = true;
                          }
                      }
                  }
              }
          }

          follow_sets
      }
