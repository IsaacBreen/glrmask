                              starts = dest.starts
                              if not starts:
                                  # As per original get_mask: ignore epsilon transitions on GSS stack here.
                                  continue

                              # Build matched parent nodes by slicing parent_nodes within each [a,b]
                              ends = dest.ends
                              matched: List[ffi.GSSNode] = []

