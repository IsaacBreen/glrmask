          nonterminal_id: int
          len: int
          production_ids: Tuple[int, ...]


      @dataclass(frozen=True)
      class Split:
          shift: Optional[int]
          reduces: Dict[int, Dict[int, Tuple[int, ...]]]  # len -> nt_id -> pids


      # Action can be a Shift (int), Reduce, or Split
      Action = Union[int, Reduce, Split]


