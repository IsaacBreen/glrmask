          }

          pub fn map<F, U>(&self, f: F) -> GSSNode<U>
          where
              F: Copy + Fn(&T) -> U,
              U: Clone + Ord + Hash, // Add these bounds for U
          {
              GSSNode {
                  value: f(&self.value),
                  predecessors: self.predecessors.iter()
