      +                if target_vec.is_empty() {
      +                    continue;
      +                }
      +
      +                let target_sv = intern_step_vec(target_vec, &mut step_intern);
      +                let target_key = StepKeyArc::new(target_sv.clone());
      +                let target_d_id = if let Some(id) = subset_to_d_id.get(&target_key) {
      +                    *id
      +                } else {
      +                    let nid = dwa.states.add_state();
      +                    subset_to_d_id.insert(target_key.clone(), nid);
      +                    worklist.push_back(target_key.clone());
      +                    if let Some(p) = &pb { p.set_length(subset_to_d_id.len() as u64); }
      +                    nid
      +                };
      +
      +                // Edge weight = union of all weights in accumulated target_sv (cached)
      +                let edge_w = union_weight_of_sv(&target_sv, &mut stepvec_union_cache);
      +                if let (Some(def_t), Some(ref def_w)) = (def_edge_target, def_edge_weight.as_ref()) {
      +                    if def_t == target_d_id && **def_w == edge_w {
      +                        continue;
      +                    }
      +                }
      +                for lbl in class_labels {
      +                    dwa.add_transition(d_id, lbl, target_d_id, edge_w.clone()).expect("DWA insertion should not fail");
      +                }
      +            }
               }
       
               if let Some(p) = &pb {
                   p.finish_with_message(format!("Determinized to {} states", subset_to_d_id.len()));
               }
       
               dwa
           }
      ```

      What you get from these changes

      - Language-preserving widening (relax_edges_by_future) aggressively turns weights into ALL where safe, dramatically simplifying the NWA before determinization.
      - Epsilon closure masks exclude empty weights, shrinking StepVecs and caches.
      - Group compilation fast-path for ALL reduces CPU and memory on the hottest path.
      - Cache limits prevent runaway memory usage during determinization.
      - Label pattern grouping amortizes the cost of explicit label processing across entire equivalence classes of labels, a massive win for tokenizers or NFAs with few underlying character classes but many concrete labels.

      All changes preserve correctness:
      - Widening is proven neutral with respect to accepted weights.
      - Filtering zero-weight entries removes dead contributions only.
      - Grouping computes exactly the same target subset and edge weight, shared for all labels in the class.

      These should make determinization radically faster and memory-stable on your workload.
