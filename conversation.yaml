          dst_counts: HashMap<Trie2Index, usize>,
          key_counts: HashMap<Option<GrammarTokenID>, usize>,
          bitset_len_dist: BTreeMap<usize, usize>,
          dsts_per_src_key_dist: BTreeMap<usize, usize>,
      }

