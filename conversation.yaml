                  } else {
                      panic!("byte_buffer not found or not an array");
                  }
              } else {
                  panic!("Expected JSONNode::Object, got {:?}", json_node);
              }

              let deserialized = MyStruct::from_json(json_node).expect("Deserialization failed");
              assert_eq!(original, deserialized);
