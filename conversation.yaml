              if self.is_empty():
                  return PyRangeSet.empty()
              if other.is_empty():
                  return self
              a = list(self.intervals)
              b = list(other.intervals)
              res: List[Tuple[int, int]] = []
              j = 0
              for s1, e1 in a:
                  curr = s1
                  while j < len(b) and b[j][1] < curr:
                      j += 1
                  k = j
