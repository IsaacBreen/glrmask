          Symbol::NonTerminal(NonTerminal(name.to_string()))
      }

      pub fn t(name: &str) -> Symbol {
          Symbol::Terminal(regex_name(name))
      }

      pub fn prod(name: &str, rhs: Vec<Symbol>) -> Production {
          Production {
              lhs: NonTerminal(name.to_string()),
              rhs,
          }
