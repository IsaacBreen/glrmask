              prod("E", vec![nt("F")]),
              // prod("F", vec![nt("E")]),
              prod("F", vec![t("I")]),
          ];
          // Map grammar terminals to IDs matching regex order
          let mut grammar_token_map: BiBTreeMap<Terminal, TerminalID> = BiBTreeMap::new();
          grammar_token_map.insert(regex_name("I"), TerminalID(0));
          grammar_token_map.insert(regex_name("EOF"), TerminalID(1));

          let parser = generate_glr_parser_with_terminal_map(&productions, grammar_token_map.clone(), None);

          let mut token_name_map = BiBTreeMap::new();
           for (term, id) in &grammar_token_map {
              token_name_map.insert(term.clone(), id.0);
          }

          let constraint = GrammarConstraint::new(
              tokenizer.clone(),
              parser.clone(),
              llm_token_map.clone(),
              token_name_map,
              1, // max_original_llm_token_id
          );
          // constraint.dump_precomputed1();
          // constraint.dump_precomputed2();

          // Initial state and step
          let mut state = constraint.init();
          let mask = state.get_mask();
          // Expect LLM tokens that can start an expression: i (0)
          assert_eq!(mask, HybridBitset::from_iter(vec![0]));

          // Commit "i"
          state.commit(LLMTokenID(0));
          let mask = state.get_mask();
          // After "i", E is satisfied, so we expect EOF ($)
          assert_eq!(mask, HybridBitset::from_iter(vec![1]));

          // Commit "$"
          state.commit(LLMTokenID(1));
          assert!(state.is_active());
          let mask = state.get_mask();
          // After "(i", the inner E is satisfied. The outer E is satisfied. We now expect EOF.
          assert_eq!(mask, HybridBitset::from_iter(vec![]));
      }

      #[test]
      fn test_js_simplified_ebnf_string() -> Result<(), Box<dyn std::error::Error>> {
          // 1. Load and compile the grammar from the EBNF file
          let ebnf_grammar = indoc! {r#"
              // Instruct the parser to ignore Whitespace and single-line Comments.
              #![ignore(IGNORE)]

              program ::= statement_list? EOF;
              EOF ::= '<|EOF|>';

              // --- Lexical Grammar (Minimal) ---
              IGNORE ::= ( ' ' | '\t' | '\n' | '\r' )+ | '//' [^\n\r]* ;

              // --- Statements (Core Imperative Set) ---
              statement_list ::= statement+ ;

              statement ::=
                  block
                | declaration_statement
                | if_statement
                | while_statement
                | expression_statement
                ;

              block ::= '{' statement_list? '}' ;
              declaration_statement ::= 'let' IDENTIFIER ( '=' expression )? ';' ;
              if_statement ::= 'if' '(' expression ')' statement ; // No 'else'
              while_statement ::= 'while' '(' expression ')' statement ;
              expression_statement ::= expression ';' ;

              // --- Expressions (Completely Flattened) ---
              expression ::= term ( ( '+' | '*' | '==' ) term )* ; // All operators have same precedence

              term ::= ( '-' | '!' )? primary ; // Unary operators

              primary ::=
                  IDENTIFIER
                | literal
                | '(' expression ')'
                ;

              // --- Literals and Terminals (Minimal) ---
              literal ::= 'true' | 'false' | NUMERIC_LITERAL | STRING_LITERAL ;

              NUMERIC_LITERAL ::= [0-9]+ ; // Integers only
              STRING_LITERAL ::= '"' [^"]* '"' ; // No escape characters
              IDENTIFIER ::= [a-zA-Z_] [a-zA-Z0-9_]* ;
          "#};
          let grammar_definition = GrammarDefinition::from_ebnf(&ebnf_grammar)?;
          let compiled_grammar = CompiledGrammar::from_definition(Arc::new(grammar_definition));

          // 2. Define the LLM vocabulary
          let mut llm_token_map = LLMTokenMap::new();
          let llm_a = LLMTokenID(0);
          let llm_not_quote = LLMTokenID(1);
          let llm_quote = LLMTokenID(2);
          llm_token_map.insert(b"a".to_vec(), llm_a);
          llm_token_map.insert(b"!\"".to_vec(), llm_not_quote);
          llm_token_map.insert(b"\"".to_vec(), llm_quote);
          let max_original_llm_token_id = 2;

          // 3. Create the GrammarConstraint
          let constraint = GrammarConstraint::from_compiled_grammar(
              compiled_grammar,
              llm_token_map,
              LLMTokenID(max_original_llm_token_id + 1), // dummy EOF
              max_original_llm_token_id,
          );
          println!("Tokenizer: {}", constraint.tokenizer);
          println!("Parser: {}", constraint.parser);
          constraint.dump_precomputed0();
          constraint.dump_precomputed1();
          constraint.dump_precomputed3();

          // 4. Initialize state and get the initial mask
          let mut state = constraint.init();
          let mask1 = state.get_mask();

          // The grammar can start with an IDENTIFIER ("a"), a unary '!' ("!\""), or a STRING_LITERAL ("\"").
          // It can also start with other things like 'let', 'if', 'while', '{', '(', 'true', 'false', a number, or a unary '-'.
          // The LLM tokens provided match the start of IDENTIFIER, unary '!', and STRING_LITERAL.
          let expected_mask1 = HybridBitset::from_iter(vec![llm_a.0, llm_not_quote.0, llm_quote.0]);
          assert_eq!(
              mask1,
              expected_mask1,
              "Initial mask should allow 'a', '!\"', and '\"'"
          );

          // 5. Commit "a" and get the next mask
          state.commit(llm_a);
          state.print_gss();
          let mask2 = state.get_mask();

          // After committing "a", the only valid continuation from the LLM vocabulary is another "a"
          // to form a longer identifier (e.g., "aa"). The path where "a" is a complete identifier
          // would require an operator (+, *, ==) or a semicolon, none of which are available as tokens.
          let expected_mask2 = HybridBitset::from_iter(vec![llm_a.0]);
          assert_eq!(
              mask2,
              expected_mask2,
              "After 'a', mask should only allow 'a' to continue the identifier"
          );

          Ok(())
      }

