                      // (e.g. A -> alpha A beta)
                      if is_used_in_rhs_of_other_rules && !is_recursive_in_its_own_sole_rule {
                          candidate_to_inline_info = Some((nt_candidate.clone(), single_prod_rule.rhs.clone(), *original_prod_idx));
                          break;
                      }
