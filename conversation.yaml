                  let bits = bitvec![usize, Lsb0; 1; num_elements]; // Create BitVec of `num_elements` length, all set to 1
                  HybridBitset {
                      inner: BitsetRepr::Dense { bits, cached_exact_count: RefCell::new(Some(num_elements)) }
                  }
