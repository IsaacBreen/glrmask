          print(f"\n--- Running benchmark ({len(token_ids)} steps) ---")
          progress_bar = tqdm(enumerate(token_ids), total=len(token_ids), desc="Benchmarking steps", disable=os.environ.get("DISABLE_TQDM") == "1")
