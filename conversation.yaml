              tops: Set[T] = set()
              for g in self._parts.values():
                  tops.update(g.peek())
              return tops

          def reduce_acc(self) -> Optional[Acc]:
              if not self._parts:
                  return None
              
              accs = iter(self._parts.keys())
              return reduce(lambda a, b: a.merge(b), accs)


