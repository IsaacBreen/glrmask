                          nt_reachables.get_mut(nt).unwrap().extend(reachable_reachables);
                      }
                  }
                  if nt_reachables[nt].len() != old_len {
                      changed = true;
                  }
              }
              if !changed {
                  break;
              }
          }

          let start_prod = &productions[0];
          let mut reachable_from_start = BTreeSet::new();
          for symbol in &start_prod.rhs {
