                          Some(n) => StageVocab::from_json(n)?,
                          None => precompute_vocab.clone(),
      				};

                      Ok(GrammarConstraint {
                          tokenizer,
                          parser,
                          precomputed0,
                          precomputed1,
                          precomputed2,
                          precomputed3,
                          llm_vocab: Arc::new(LLMVocab { llm_token_map, max_original_llm_token_id }),
                          token_name_map,
                          possible_matches,
                          trie0_god,
                          trie1_god,
                          trie2_god,
                          trie3_god,
