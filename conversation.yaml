          pub fn as_single_path(&self) -> Option<(Vec<T>, A)> {
              let mut path = Vec::new();
              if let Some(acc) = Self::as_single_path_upper(&self.inner, &mut path) {
                  path.reverse();
                  Some((path, acc))
              } else {
