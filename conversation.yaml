          print(f"  - Nodes: {num_nodes}")
          print(f"  - End nodes: {num_end_nodes} ({num_end_nodes/num_nodes:.2%} of total)")

          # Detect model type by inspecting the first child edge of the first node with children
          is_precompute3 = False
