          let mut worklist = VecDeque::from([initial_closure.clone()]);

          let mut transitions: BTreeMap<BTreeSet<Item>, BTreeMap<Option<Symbol>, BTreeSet<Item>>> = BTreeMap::new();

          while let Some(items) = worklist.pop_front() {
