      pub fn drop_dead(productions: &[Production]) -> Vec<Production> {
          // todo: this function is broken
          let mut nt_reachables: BTreeMap<&NonTerminal, BTreeSet<&NonTerminal>> = BTreeMap::new();

          for prod in productions {
