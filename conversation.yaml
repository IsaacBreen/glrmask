                  for term_id, bit in inner.items():
                      mapped[int(term_id)] = RangeSet.from_ranges(bit.to_ranges())
                  pmc_rs[int(tsid)] = mapped
              possible_matches_cache = pmc_rs

              vocab = data['precompute3_vocab']
