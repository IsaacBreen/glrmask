          pub fn add_transition(&mut self, from: usize, on_u8: u8, to: usize) {
              self.states[from]
                  .transitions
                  .entry(on_u8)
                  .or_insert_with(Vec::new)
                  .push(to);
          }

          pub fn add_epsilon_transition(&mut self, from: usize, to: usize) {
              self.states[from].epsilon_transitions.push(to);
