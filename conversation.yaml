                          entry["dests"].extend(dests_list)

                  # Finalize pop entries with prebuilt bitsets and has_state flag
                  pop_entries: Dict[int, _PopEntry] = {}
                  for pop, groups_dict in by_pop.items():
                      groups: List[_Group] = []
