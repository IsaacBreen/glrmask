              let inner_rules = rules.into_iter().map(|(s, e)| (s, e.inner)).collect();
              let inner_terminals = terminals.into_iter().map(|(s, e)| (s, e.inner)).collect();

              let grammar_def = GrammarDefinition::from_exprs(inner_rules, inner_terminals)
