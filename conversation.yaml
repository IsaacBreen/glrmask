          // Initial state and step
          let mut state = constraint.init();
          let mask = state.get_mask();
          // Expect LLM tokens that can start an expression: i (0)
          assert_eq!(mask, HybridBitset::from_iter(vec![0]));

          // Commit "i"
          state.commit(LLMTokenID(0));
          let mask = state.get_mask();
