      use std::collections::{BTreeMap, BTreeSet, VecDeque, HashMap};
      use std::fmt;

      /// Compact node id for the mini trie.
      pub type NodeId = u32;

      /// A compact sorted set of usize indices with deterministic ordering.
      /// Backed by Vec<usize> kept sorted and deduplicated.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug, Default, Hash)]
      pub struct SortedSet {
          pub elems: Vec<usize>,
      }

      impl SortedSet {
          pub fn new() -> Self {
              Self { elems: Vec::new() }
          }
          pub fn from_iter<I: IntoIterator<Item = usize>>(it: I) -> Self {
              let mut v: Vec<usize> = it.into_iter().collect();
              v.sort_unstable();
              v.dedup();
              Self { elems: v }
          }
          pub fn insert(&mut self, x: usize) {
              match self.elems.binary_search(&x) {
                  Ok(_) => {}
                  Err(pos) => self.elems.insert(pos, x),
              }
          }
          pub fn union_inplace(&mut self, other: &SortedSet) {
              if other.elems.is_empty() {
                  return;
              }
              let mut out = Vec::with_capacity(self.elems.len() + other.elems.len());
              let mut i = 0usize;
              let mut j = 0usize;
              while i < self.elems.len() && j < other.elems.len() {
                  let a = self.elems[i];
                  let b = other.elems[j];
                  if a < b {
                      out.push(a);
                      i += 1;
                  } else if a > b {
                      out.push(b);
                      j += 1;
                  } else {
                      out.push(a);
                      i += 1;
                      j += 1;
                  }
              }
              while i < self.elems.len() {
                  out.push(self.elems[i]);
                  i += 1;
              }
              while j < other.elems.len() {
                  out.push(other.elems[j]);
                  j += 1;
              }
              self.elems = out;
          }
          pub fn intersect(&self, other: &SortedSet) -> SortedSet {
              let mut out = Vec::new();
              let mut i = 0usize;
              let mut j = 0usize;
              while i < self.elems.len() && j < other.elems.len() {
                  let a = self.elems[i];
                  let b = other.elems[j];
                  if a < b {
                      i += 1;
                  } else if a > b {
                      j += 1;
                  } else {
                      out.push(a);
                      i += 1;
                      j += 1;
                  }
              }
              SortedSet { elems: out }
          }
          pub fn difference(&self, other: &SortedSet) -> SortedSet {
              let mut out = Vec::new();
              let mut i = 0;
              let mut j = 0;
              while i < self.elems.len() && j < other.elems.len() {
                  if self.elems[i] < other.elems[j] {
                      out.push(self.elems[i]);
                      i += 1;
                  } else if self.elems[i] > other.elems[j] {
                      j += 1;
                  } else {
                      i += 1;
                      j += 1;
                  }
              }
              while i < self.elems.len() {
                  out.push(self.elems[i]);
                  i += 1;
              }
              SortedSet { elems: out }
          }
          /// Returns true if self and other share at least one common element.
          /// This is a fast, allocation-free check using a merged scan on the sorted vectors.
          pub fn intersects(&self, other: &SortedSet) -> bool {
              let mut i = 0usize;
              let mut j = 0usize;
              while i < self.elems.len() && j < other.elems.len() {
                  let a = self.elems[i];
                  let b = other.elems[j];
                  if a < b {
                      i += 1;
                  } else if a > b {
                      j += 1;
                  } else {
                      return true;
                  }
              }
              false
          }
          pub fn is_empty(&self) -> bool {
              self.elems.is_empty()
          }
          pub fn len(&self) -> usize {
              self.elems.len()
          }
          pub fn iter(&self) -> impl Iterator<Item = usize> + '_ {
              self.elems.iter().cloned()
          }
      }

      /// Edge key for the mini trie: pop delta and a token set.
      #[derive(Clone, Eq, PartialEq, Ord, PartialOrd, Debug)]
      #[derive(Hash)]
      pub struct EdgeKey {
          pub pop: isize,
          pub tokens: SortedSet,
      }

      impl EdgeKey {
          pub fn new(pop: isize, tokens: SortedSet) -> Self {
              Self { pop, tokens }
          }
      }

      /// A node in the mini trie.
      #[derive(Clone, Debug)]
      pub struct Node {
          id: NodeId,
          end: bool,
          // key: (pop, tokens) -> dest map: dest node -> state-set
          children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>>,
          // src map: src node -> (key: (pop, tokens) -> state-set)
          parents: BTreeMap<NodeId, BTreeMap<EdgeKey, SortedSet>>,
      }

      impl Node {
          pub fn new(id: NodeId, end: bool) -> Self {
              Self {
                  id,
                  end,
                  children: BTreeMap::new(),
                  parents: BTreeMap::new(),
              }
          }
          pub fn id(&self) -> NodeId {
              self.id
          }
          pub fn is_end(&self) -> bool {
              self.end
          }
          pub fn children(&self) -> &BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>> {
              &self.children
          }
          pub fn parents(&self) -> &BTreeMap<NodeId, BTreeMap<EdgeKey, SortedSet>> {
              &self.parents
          }
          pub fn out_degree(&self) -> usize {
              self.children.values().map(|m| m.len()).sum()
          }
          pub fn in_degree(&self) -> usize {
              self.parents.values().map(|m| m.len()).sum()
          }
      }

      /// A compact, no-generics mini trie for precompute3 optimization.
      #[derive(Clone, Debug)]
      pub struct MiniTrie {
          nodes: BTreeMap<NodeId, Node>,
          pub root_ids: Vec<NodeId>,
          /// Counter to generate unique node IDs.
          next_node_id: NodeId,
      }

      impl MiniTrie {
          pub fn new() -> Self {
              Self {
                  nodes: BTreeMap::new(),
                  root_ids: Vec::new(),
                  next_node_id: 0,
              }
          }
          pub fn add_node(&mut self, end: bool) -> NodeId {
              let id = self.next_node_id;
              self.next_node_id += 1;
              self.nodes.insert(id, Node::new(id, end));
              id
          }
          pub fn add_edge(
              &mut self,
              src: NodeId,
              key: EdgeKey,
              dst: NodeId,
              states: SortedSet,
          ) {
              // Update children of src node
              if let Some(src_node) = self.nodes.get_mut(&src) {
                  let dm = src_node.children.entry(key.clone()).or_default();
                  dm.entry(dst)
                      .and_modify(|e| e.union_inplace(&states))
                      .or_insert(states.clone());
              }

              // Update parents of dst node
              if let Some(dst_node) = self.nodes.get_mut(&dst) {
                  let parent_edges = dst_node.parents.entry(src).or_default();
                  parent_edges.entry(key)
                      .and_modify(|e| e.union_inplace(&states))
                      .or_insert(states);
              }
          }
          pub fn add_root(&mut self, id: NodeId) {
              self.root_ids.push(id);
          }

          pub fn get_node(&self, id: NodeId) -> Option<&Node> {
              self.nodes.get(&id)
          }

          pub fn nodes(&self) -> impl Iterator<Item = &Node> {
              self.nodes.values()
          }

          pub fn node_ids(&self) -> impl Iterator<Item = NodeId> + '_ {
              self.nodes.keys().copied()
          }

          pub fn num_nodes(&self) -> usize {
              self.nodes.len()
          }

          pub fn set_end(&mut self, node_id: NodeId, is_end: bool) {
              if let Some(node) = self.nodes.get_mut(&node_id) {
                  node.end = is_end;
              }
          }

          /// Removes a specific destination from an edge. Returns the state set of the removed edge destination.
          pub fn remove_edge_dest(&mut self, src: NodeId, key: &EdgeKey, dst: NodeId) -> Option<SortedSet> {
              let removed_sids;
              if let Some(src_node) = self.nodes.get_mut(&src) {
                  if let Some(dm) = src_node.children.get_mut(key) {
                      removed_sids = dm.remove(&dst);
                      if dm.is_empty() {
                          src_node.children.remove(key);
                      }
                  } else {
                      removed_sids = None;
                  }
              } else {
                  removed_sids = None;
              }

              if removed_sids.is_some() {
                  if let Some(dst_node) = self.nodes.get_mut(&dst) {
                      if let Some(parent_edges) = dst_node.parents.get_mut(&src) {
                          parent_edges.remove(key);
                          if parent_edges.is_empty() {
                              dst_node.parents.remove(&src);
                          }
                      }
                  }
              }
              removed_sids
          }

          /// Removes all outgoing edges from a node.
          pub fn clear_children(&mut self, node_id: NodeId) {
              if let Some(node) = self.nodes.get_mut(&node_id) {
                  let old_children = std::mem::take(&mut node.children);
                  for (ek, dm) in old_children {
                      for (dst, _sids) in dm {
                          if let Some(dst_node) = self.nodes.get_mut(&dst) {
                              if let Some(parent_edges) = dst_node.parents.get_mut(&node_id) {
                                  parent_edges.remove(&ek);
                                  if parent_edges.is_empty() {
                                      dst_node.parents.remove(&node_id);
                                  }
                              }
                          }
                      }
                  }
              }
          }

          /// Replaces all outgoing edges for a node.
          pub fn set_children(&mut self, node_id: NodeId, new_children: BTreeMap<EdgeKey, BTreeMap<NodeId, SortedSet>>) {
              self.clear_children(node_id);
              for (ek, dm) in new_children {
                  for (dst, sids) in dm {
                      self.add_edge(node_id, ek.clone(), dst, sids);
                  }
              }
          }

          /// Compute set of nodes reachable from any root.
          pub fn reachable_from_roots(&self) -> BTreeSet<NodeId> {
              let mut seen: BTreeSet<NodeId> = BTreeSet::new();
              let mut q: VecDeque<NodeId> = self.root_ids.iter().cloned().collect();
              while let Some(u) = q.pop_front() {
                  if !seen.insert(u) {
                      continue;
                  }
                  let node = self.nodes.get(&u).unwrap();
                  for (_ek, dm) in node.children.iter() {
                      for (v, _s) in dm.iter() {
                          if !seen.contains(v) {
                              q.push_back(*v);
                          }
                      }
                  }
              }
              seen
          }

          /// Compute set of nodes that can reach an end node (reverse reachability).
          pub fn can_reach_end(&self) -> BTreeSet<NodeId> {
              let mut productive: BTreeSet<NodeId> = BTreeSet::new();
              let mut q: VecDeque<NodeId> = VecDeque::new();
              for n in self.nodes() {
                  if n.is_end() {
                      productive.insert(n.id());
                      q.push_back(n.id());
                  }
              }
              while let Some(v_id) = q.pop_front() {
                  if let Some(v_node) = self.nodes.get(&v_id) {
                      for &u_id in v_node.parents.keys() {
                          if productive.insert(u_id) {
                              q.push_back(u_id);
                          }
                      }
                  }
              }
              productive
          }

          /// Removes nodes not reachable from any root.
          pub fn gc(&mut self) {
              let live_nodes = self.reachable_from_roots();

              if live_nodes.len() == self.nodes.len() {
                  return;
              }

              // Remove dead nodes from the main nodes map.
              self.nodes.retain(|id, _| live_nodes.contains(id));

              // Clean up edges in remaining live nodes to not point to dead nodes.
              for node in self.nodes.values_mut() {
                  // Clean children: remove destinations that are not live.
                  for (_ek, dm) in node.children.iter_mut() {
                      dm.retain(|dst, _| live_nodes.contains(dst));
                  }
                  node.children.retain(|_ek, dm| !dm.is_empty());

                  // Clean parents: remove parents that are not live.
                  node.parents.retain(|parent_id, _| live_nodes.contains(parent_id));
              }
          }

          /// Compute for each node, the set of LLM tokens that can appear on any path starting from it.
          /// This is a forward reachability analysis of tokens.
          pub fn live_tokens_at_nodes(&self) -> HashMap<NodeId, SortedSet> {
              let mut live_tokens: HashMap<NodeId, SortedSet> =
                  self.node_ids().map(|id| (id, SortedSet::new())).collect();

              let mut changed = true;
              while changed {
                  changed = false;
                  for u_id in self.node_ids() {
                      // The node is guaranteed to exist.
                      let u_node = self.nodes.get(&u_id).unwrap();
                      let mut new_live = SortedSet::new();
                      for (ek, dm) in u_node.children() {
                          new_live.union_inplace(&ek.tokens);
                          for v_id in dm.keys() {
                              if let Some(live_v) = live_tokens.get(v_id) {
                                  new_live.union_inplace(live_v);
                              }
                          }
                      }

                      let current_live = live_tokens.get_mut(&u_id).unwrap();
                      if new_live.elems != current_live.elems {
                          *current_live = new_live;
                          changed = true;
                      }
                  }
              }
              live_tokens
          }

          /// Compute for each node, the set of LLM tokens that can appear on a path from it to an END node.
          /// This is a backward reachability analysis of tokens.
          pub fn productive_tokens_at_nodes(
              &self,
              universe: &SortedSet,
          ) -> HashMap<NodeId, SortedSet> {
              let mut worklist = VecDeque::new();
              let mut productive_tokens: HashMap<NodeId, SortedSet> = self
                  .node_ids()
                  .map(|id| (id, SortedSet::new()))
                  .collect();

              for node in self.nodes() {
                  if node.is_end() {
                      productive_tokens.insert(node.id(), universe.clone());
                      worklist.push_back(node.id());
                  }
              }

              while let Some(node_id) = worklist.pop_front() {
                  let live_at_node = productive_tokens.get(&node_id).unwrap().clone();
                  if let Some(node) = self.get_node(node_id) {
                      for (pred_id, edges) in node.parents() {
                          for edge_key in edges.keys() {
                              let live_from_edge = live_at_node.intersect(&edge_key.tokens);
                              if live_from_edge.is_empty() {
                                  continue;
                              }
                              let pred_live = productive_tokens.get_mut(pred_id).unwrap();
                              let old_len = pred_live.len();
                              pred_live.union_inplace(&live_from_edge);
                              if pred_live.len() > old_len {
                                  worklist.push_back(*pred_id);
                              }
                          }
                      }
                  }
              }
              productive_tokens
          }
      }

      impl MiniTrie {
          fn fmt_node_recursive(
              &self,
              node_id: NodeId,
              f: &mut fmt::Formatter<'_>,
              prefix: &str,
              visited: &mut BTreeSet<NodeId>,
          ) -> fmt::Result {
              if visited.contains(&node_id) {
                  return Ok(()); // Stop recursion for cycles
              }
              visited.insert(node_id);

              let node = self.get_node(node_id).unwrap();
              let total_dests: usize = node.children().values().map(|dm| dm.len()).sum();
              let mut dests_processed = 0;

              for (edge_key, dest_map) in node.children() {
                  for (dest_id, states) in dest_map {
                      dests_processed += 1;
                      let is_last = dests_processed == total_dests;

                      let (current_prefix, next_prefix_part) = if is_last {
                          ("└── ", "    ")
                      } else {
                          ("├── ", "│   ")
                      };

                      let tokens_str = if edge_key.tokens.len() > 5 {
                          format!("[{} tokens]", edge_key.tokens.len())
                      } else {
                          format!("{:?}", edge_key.tokens.elems)
                      };

                      let states_str = if states.len() > 5 {
                          format!("[{} states]", states.len())
                      } else {
                          format!("{:?}", states.elems)
                      };

                      write!(
                          f,
                          "{}{}Edge(pop: {}, tokens: {}) -> Node({}) [states: {}]",
                          prefix, current_prefix, edge_key.pop, tokens_str, dest_id, states_str
                      )?;

                      let dest_node = self.get_node(*dest_id).unwrap();
                      if dest_node.is_end() {
                          write!(f, " [END]")?;
                      }
                      if visited.contains(dest_id) {
                          write!(f, " ... (cycle)")?;
                      }
                      writeln!(f)?;

                      let next_prefix = format!("{}{}", prefix, next_prefix_part);
                      self.fmt_node_recursive(*dest_id, f, &next_prefix, visited)?;
                  }
              }

              visited.remove(&node_id);
              Ok(())
          }
      }

      impl fmt::Display for MiniTrie {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              writeln!(f, "MiniTrie with {} nodes, {} roots.", self.nodes.len(), self.root_ids.len())?;

              for (i, root_id) in self.root_ids.iter().enumerate() {
                  let root_node = self.get_node(*root_id).unwrap();
                  if i > 0 { writeln!(f)?; }
                  writeln!(f, "--- Root Index {} (NodeId: {}) ---", i, root_id)?;
                  write!(f, "Root Node({})", root_id)?;
                  if root_node.is_end() { write!(f, " [END]")?; }
                  writeln!(f)?;
                  let mut visited = BTreeSet::new();
                  self.fmt_node_recursive(*root_id, f, "", &mut visited)?;
              }
              Ok(())
          }
      }
    src/trie3_opt/metrics.rs: |+
      use crate::trie3_opt::core::MiniTrie;
      use std::collections::BTreeMap;
      use std::fmt::Write;
      use kdam::{tqdm, BarExt};
      use crate::profiler::PROGRESS_BAR_ENABLED;

      /// A helper for collecting numeric data and computing summary statistics.
      #[derive(Debug, Clone, Default)]
      pub struct NumericStats {
          values: Vec<f64>,
      }

      impl NumericStats {
          pub fn new() -> Self {
              Self::default()
          }

          pub fn from_samples<T: Into<f64> + Copy>(samples: &[T]) -> Self {
              Self {
                  values: samples.iter().map(|&v| v.into()).collect(),
              }
          }

          pub fn push<T: Into<f64>>(&mut self, value: T) {
              self.values.push(value.into());
          }

          pub fn to_pretty_string(&self) -> String {
              if self.values.is_empty() {
                  return "{ count: 0 }".to_string();
              }

              // Fast O(N) pass for sum/mean/stdev/min/max (no full sort).
              let count = self.values.len();
              let mut sum = 0.0;
              let mut min = f64::INFINITY;
              let mut max = f64::NEG_INFINITY;
              for &v in &self.values {
                  sum += v;
                  if v < min { min = v; }
                  if v > max { max = v; }
              }
              let mean = sum / count as f64;
              let mut m2 = 0.0;
              for &v in &self.values {
                  let diff = v - mean;
                  m2 += diff * diff;
              }
              let variance = m2 / count as f64;
              let stdev = variance.sqrt();

              // Approximate quantiles from a bounded sample to avoid O(N log N) sort.
              // Adjust MAX_SAMPLE if needed for speed/accuracy tradeoff.
              const MAX_SAMPLE: usize = 100_000;
              let target = MAX_SAMPLE.min(count);
              let mut sample: Vec<f64> = Vec::with_capacity(target);
              if count <= MAX_SAMPLE {
                  // Small enough: use exact quantiles.
                  sample.extend_from_slice(&self.values);
              } else {
                  // Deterministic uniform sampling with a stride.
                  // This avoids storing or sorting the entire dataset.
                  let stride = (count + target - 1) / target; // ceil(count/target)
                  let offset = stride / 2;
                  let mut i = offset;
                  while i < count {
                      sample.push(self.values[i]);
                      i += stride;
                  }
                  if sample.is_empty() {
                      sample.push(self.values[0]);
                      sample.push(self.values[count - 1]);
                  }
              }
              sample.sort_by(|a, b| a.partial_cmp(b).unwrap());
              let slen = sample.len();
              let q_index = |p: f64| -> usize {
                  // Clamp index to valid range.
                  ((p * (slen as f64 - 1.0)).floor() as usize).min(slen - 1)
              };
              let p25 = sample[q_index(0.25)];
              let median = sample[q_index(0.50)];
              let p75 = sample[q_index(0.75)];
              let p95 = sample[q_index(0.95)];

              format!(
                  "{{ count: {}, sum: {:.2}, mean: {:.2}, stdev: {:.2}, min: {:.2}, p25: {:.2}, median: {:.2}, p75: {:.2}, p95: {:.2}, max: {:.2} }}",
                  count, sum, mean, stdev, min, p25, median, p75, p95, max
              )
          }
      }

      /// A trait for a modular metric that can be computed on a MiniTrie.
      pub trait Metric {
          /// The name of the metric.
          fn name(&self) -> &'static str;
          /// Computes the metric and returns a formatted string.
          fn compute(&self, trie: &MiniTrie) -> String;
      }

      // --- Concrete Metric Implementations ---

      pub struct NumNodesMetric;
      impl Metric for NumNodesMetric {
          fn name(&self) -> &'static str { "num_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.num_nodes().to_string() }
      }

      pub struct NumEdgesMetric;
      impl Metric for NumEdgesMetric {
          fn name(&self) -> &'static str { "num_edges" }
          fn compute(&self, trie: &MiniTrie) -> String {
              trie.nodes().map(|n| n.out_degree()).sum::<usize>().to_string()
          }
      }

      pub struct NumRootsMetric;
      impl Metric for NumRootsMetric {
          fn name(&self) -> &'static str { "num_roots" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.root_ids.len().to_string() }
      }

      pub struct NumEndNodesMetric;
      impl Metric for NumEndNodesMetric {
          fn name(&self) -> &'static str { "num_end_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String {
              trie.nodes().filter(|n| n.is_end()).count().to_string()
          }
      }

      pub struct NumReachableNodesMetric;
      impl Metric for NumReachableNodesMetric {
          fn name(&self) -> &'static str { "num_reachable_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.reachable_from_roots().len().to_string() }
      }

      pub struct NumProductiveNodesMetric;
      impl Metric for NumProductiveNodesMetric {
          fn name(&self) -> &'static str { "num_productive_nodes" }
          fn compute(&self, trie: &MiniTrie) -> String { trie.can_reach_end().len().to_string() }
      }

      pub struct RootFanoutMetric;
      impl Metric for RootFanoutMetric {
          fn name(&self) -> &'static str { "root_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let fanouts: Vec<f64> = trie
                  .nodes()
                  .filter(|n| trie.root_ids.contains(&n.id()))
                  .map(|n| n.out_degree() as f64)
                  .collect();
              NumericStats::from_samples(&fanouts).to_pretty_string()
          }
      }

      pub struct NonRootFanoutMetric;
      impl Metric for NonRootFanoutMetric {
          fn name(&self) -> &'static str { "non_root_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let fanouts: Vec<f64> = trie
                  .nodes()
                  .filter(|n| !trie.root_ids.contains(&n.id()))
                  .map(|n| n.out_degree() as f64)
                  .collect();
              NumericStats::from_samples(&fanouts).to_pretty_string()
          }
      }

      pub struct AllFanoutMetric;
      impl Metric for AllFanoutMetric {
          fn name(&self) -> &'static str { "all_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let fanouts: Vec<f64> = trie
                  .nodes()
                  .map(|n| n.out_degree() as f64)
                  .collect();
              NumericStats::from_samples(&fanouts).to_pretty_string()
          }
      }

      /// Helper to compute edge overlap score for a single node.
      fn compute_edge_overlap_for_node(node: &crate::trie3_opt::core::Node) -> f64 {
          use crate::trie3_opt::core::{NodeId, SortedSet};
          use std::collections::BTreeMap;

          let mut node_score = 0.0;

          // Group destination maps by pop
          let mut by_pop: BTreeMap<isize, Vec<&BTreeMap<NodeId, SortedSet>>> = BTreeMap::new();
          for (ek, dm) in node.children() {
              by_pop.entry(ek.pop).or_default().push(dm);
          }

          for (_pop, dms) in by_pop {
              if dms.len() < 2 {
                  continue;
              }
              for i in 0..dms.len() {
                  for j in (i + 1)..dms.len() {
                      let dm1 = dms[i];
                      let dm2 = dms[j];

                      let mut common_dests_with_overlap = 0;
                      for (d, sids1) in dm1 {
                          if let Some(sids2) = dm2.get(d) {
                              if !sids1.intersect(sids2).is_empty() {
                                  common_dests_with_overlap += 1;
                              }
                          }
                      }
                      node_score += common_dests_with_overlap as f64;
                  }
              }
          }
          node_score
      }

      pub struct EdgeOverlapMetric;
      impl Metric for EdgeOverlapMetric {
          fn name(&self) -> &'static str { "edge_overlap" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut scores: Vec<f64> = Vec::new();
              #[cfg(not(rustrover))]
              let it = tqdm!(
                  trie.nodes(),
                  desc = "Metric: EdgeOverlap",
                  total = trie.num_nodes(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = trie.nodes();

              for node in it {
                  let node_score = compute_edge_overlap_for_node(node);
                  if node_score > 0.0 {
                      scores.push(node_score);
                  }
              }
              NumericStats::from_samples(&scores).to_pretty_string()
          }
      }

      pub struct RootEdgeOverlapMetric;
      impl Metric for RootEdgeOverlapMetric {
          fn name(&self) -> &'static str { "root_edge_overlap" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut scores: Vec<f64> = Vec::new();
              let root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  root_nodes.iter(),
                  desc = "Metric: RootEdgeOverlap",
                  total = root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = root_nodes.iter();

              for node in it {
                  let node_score = compute_edge_overlap_for_node(node);
                  if node_score > 0.0 {
                      scores.push(node_score);
                  }
              }
              NumericStats::from_samples(&scores).to_pretty_string()
          }
      }

      pub struct NonRootEdgeOverlapMetric;
      impl Metric for NonRootEdgeOverlapMetric {
          fn name(&self) -> &'static str { "non_root_edge_overlap" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut scores: Vec<f64> = Vec::new();
              let non_root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| !trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  non_root_nodes.iter(),
                  desc = "Metric: NonRootEdgeOverlap",
                  total = non_root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = non_root_nodes.iter();

              for node in it {
                  let node_score = compute_edge_overlap_for_node(node);
                  if node_score > 0.0 {
                      scores.push(node_score);
                  }
              }
              NumericStats::from_samples(&scores).to_pretty_string()
          }
      }

      /// Helper to compute state fanout values for a single node and append them to stats.
      /// This avoids per-node Vec allocations and uses HashMap for faster aggregation.
      fn compute_state_fanout_for_node_into(
          node: &crate::trie3_opt::core::Node,
          stats: &mut NumericStats,
      ) {
          use std::collections::HashMap;

          // For this node, build: pop -> (state_id -> count of outgoing transitions)
          let mut by_pop: HashMap<isize, HashMap<usize, usize>> = HashMap::new();

          for (edge_key, dest_map) in node.children() {
              let pop = edge_key.pop;
              let state_counts = by_pop.entry(pop).or_default();
              for (_dest, state_set) in dest_map {
                  for state_id in state_set.iter() {
                      *state_counts.entry(state_id).or_default() += 1;
                  }
              }
          }

          // Append counts for this node into the shared stats accumulator.
          for inner in by_pop.values() {
              for &count in inner.values() {
                  stats.push(count as f64);
              }
          }
      }

      pub struct StateFanoutMetric;
      impl Metric for StateFanoutMetric {
          fn name(&self) -> &'static str { "state_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut stats = NumericStats::new();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  trie.nodes(),
                  desc = "Metric: StateFanout",
                  total = trie.num_nodes(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = trie.nodes();

              for node in it {
                  compute_state_fanout_for_node_into(node, &mut stats);
              }

              stats.to_pretty_string()
          }
      }

      pub struct RootStateFanoutMetric;
      impl Metric for RootStateFanoutMetric {
          fn name(&self) -> &'static str { "root_state_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut stats = NumericStats::new();
              let root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  root_nodes.iter(),
                  desc = "Metric: RootStateFanout",
                  total = root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = root_nodes.iter();

              for node in it {
                  compute_state_fanout_for_node_into(node, &mut stats);
              }
              stats.to_pretty_string()
          }
      }

      pub struct NonRootStateFanoutMetric;
      impl Metric for NonRootStateFanoutMetric {
          fn name(&self) -> &'static str { "non_root_state_fanout" }
          fn compute(&self, trie: &MiniTrie) -> String {
              let mut stats = NumericStats::new();
              let non_root_nodes: Vec<_> = trie
                  .nodes()
                  .filter(|n| !trie.root_ids.contains(&n.id()))
                  .collect();

              #[cfg(not(rustrover))]
              let it = tqdm!(
                  non_root_nodes.iter(),
                  desc = "Metric: NonRootStateFanout",
                  total = non_root_nodes.len(),
                  disable = !PROGRESS_BAR_ENABLED,
                  leave = false
              );
              #[cfg(rustrover)]
              let it = non_root_nodes.iter();

              for node in it {
                  compute_state_fanout_for_node_into(node, &mut stats);
              }
              stats.to_pretty_string()
          }
      }

      /// Instantiates and runs all standard metrics on a given trie.
      pub fn run_all_metrics(trie: &MiniTrie) -> BTreeMap<String, String> {
          let metrics: Vec<Box<dyn Metric>> = vec![
              Box::new(NumNodesMetric),
              Box::new(NumEdgesMetric),
              Box::new(NumRootsMetric),
              Box::new(NumEndNodesMetric),
              Box::new(NumReachableNodesMetric),
              Box::new(NumProductiveNodesMetric),
              Box::new(AllFanoutMetric),
              Box::new(RootFanoutMetric),
              Box::new(NonRootFanoutMetric),
              Box::new(EdgeOverlapMetric),
              Box::new(RootEdgeOverlapMetric),
              Box::new(NonRootEdgeOverlapMetric),
              Box::new(StateFanoutMetric),
              Box::new(RootStateFanoutMetric),
              Box::new(NonRootStateFanoutMetric),
          ];

          let mut results = BTreeMap::new();
          for metric in metrics {
              crate::debug!(3, "  Computing metric: {}", metric.name());
              results.insert(metric.name().to_string(), metric.compute(trie));
          }
          results
      }

      /// Formats a map of metrics into a pretty, indented string.
      pub fn pretty_print_metrics_map(metrics: &BTreeMap<String, String>) -> String {
          let mut buf = String::new();
          buf.push_str("{\n");
          let mut first = true;
          for (k, v) in metrics {
              if !first {
                  buf.push_str(",\n");
              }
              first = false;
              write!(buf, "  \"{}\": {}", k, v).unwrap();
          }
          buf.push_str("\n}");
          buf
      }

