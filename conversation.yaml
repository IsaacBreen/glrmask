              let r1_orig_non_canonical = nc_node_arc(r_val, vec![m1_nc.clone(), m2_nc.clone(), m3_nc.clone()]);

              let simplified_roots = simplify_gss_forest(&[r1_orig_non_canonical]);
              let simplified_r1_arc = simplified_roots[0].clone();

