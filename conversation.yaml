              return PyAcc(terminals_union=self.terminals_union.union(other.terminals_union))


      def get_disallowed_terminals_py(gss: GSS) -> ffi.HybridL2Bitset:
          merged_acc = gss.reduce_acc()
          if merged_acc is None:
