      ## 4. Edge Manipulation

      ### struct `EdgeInserter`

      A helper struct to facilitate inserting an edge into a Trie with a fluent, chainable interface. It handles logic for merging with existing edges or creating new destination nodes.

      ```rust
      pub struct EdgeInserter<'a, EK, EV, T, FMergeEV, FUpdateT, FMergeEV_T>
      where ...
      {
          pub edge_value: Option<EV>,
          // other fields are private
      }
      ```

      #### Methods

      *   **`pub fn new(...) -> Self`**
          Creates a new `EdgeInserter`.
          *   `arena`, `source_idx`, `edge_key`, `edge_value`: The context for the edge insertion.
          *   `merge_edge_value`: Closure to merge a new edge value into an existing one.
          *   `update_node_value`: Closure to update a destination node's value based on the incoming edge value.
          *   `merge_edge_value_and_source_node_value`: Closure to modify the new edge value based on the source node's value before insertion.

      *   **`pub fn try_destination(mut self, destination: Trie2Index) -> Self`**
          Attempts to add/merge the edge to a specific destination. If successful, no further `try_` or `else_` methods will have an effect.

      *   **`pub fn try_destinations(mut self, destinations: &[Trie2Index]) -> Self`**
          Calls `try_destination` for each index in the slice until one succeeds.

      *   **`pub fn try_destinations_iter(mut self, destinations: impl Iterator<Item = Trie2Index>) -> Self`**
          Calls `try_destination` for each index from the iterator until one succeeds.

      *   **`pub fn try_destinations_iter_with<F, R>(mut self, destinations: F) -> Self`**
          Calls `try_destination` for each index from the iterator produced by the closure `destinations` until one succeeds.

      *   **`pub fn try_children(mut self) -> Self`**
          Attempts to merge the edge with any existing children of the source node that share the same `edge_key`.

      *   **`pub fn else_create_destination_with_value(mut self, value: T) -> Self`**
          If no destination has been found yet, creates a new node with the given `value` and adds the edge to it.

      *   **`pub fn else_create_destination_with(self, value_fn: impl FnOnce() -> T) -> Self`**
          Lazily creates a new destination node using the `value_fn` if no destination has been found.

      *   **`pub fn else_create_destination(self) -> Self`** (where `T: Default`)
          Creates a new destination node with `T::default()` if no destination has been found.

      *   **`pub fn into_option(self) -> Option<Trie2Index>`**
          Consumes the inserter and returns the destination `Trie2Index` if one was found or created.

      *   **`pub fn is_some(&self) -> bool`**
          Checks if a destination has been set.

      *   **`pub fn clone_into_option(&self) -> Option<Trie2Index>`**
          Returns the destination `Trie2Index` without consuming the inserter.

      *   **`pub fn unwrap(self) -> Trie2Index`**
          Consumes the inserter and returns the destination, panicking if none was set.

      *   **`pub fn expect(self, msg: &str) -> Trie2Index`**
          Consumes the inserter and returns the destination, panicking with a custom message if none was set.

      ### trait `MergeableEdgeValue`

      A trait for edge values that can be merged.

      ```rust
      pub trait MergeableEdgeValue: Sized {
          fn merge(&mut self, other: Self);
      }
      ```

      *   **`fn merge(&mut self, other: Self)`**
          Merges `other` into `self`.

      ### Standalone Functions

      These are convenience wrappers around `EdgeInserter`.

      *   **`pub fn try_destination(...) -> Option<Trie2Index>`**
          Attempts to establish an edge from `source` to a single `destination`.

      *   **`pub fn try_destination_with(...) -> Option<Trie2Index>`**
          Attempts to establish an edge from `source` to any of the provided `destinations`.

