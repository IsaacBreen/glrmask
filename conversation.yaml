          fn add_tr(&mut self, source: StateId, tr: Tr<W>) -> Result<()>;

          /// Adds a transition to the FST. The transition will start in the state `state`.
          ///
          /// # Safety
          ///
          /// Unsafe behaviour if `state` is not present in Fst.
