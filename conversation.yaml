              In all cases, x ≤ φ(x) is maintained.

      - **C2 (Closure/Stability): ∀r ∈ R, ∀a ∈ Σ, succ(r, a) ∈ Dom**
          The algorithm uses a worklist (work_queue and work_set) to explore representatives. It starts with p0 in the worklist. For every representative rpopped from the worklist, it computes all its successors succ(r, a) for every symbol a. Each such successor x is then processed to ensure it is either already in image or is added to image (either by mapping to an existing r_j or by becoming a new r_new). If a representative reps[j] is modified (becomes more specific) during Phase 2, it is re-added to the worklist. This fixed-point iteration ensures that all reachable successors of all representatives eventually have a home in image, satisfying C2.


      ### Quality Objective (Minimize |R|):

      The refined strategy aims to minimize |R| through these heuristics:

      - **Prioritizing existing coverage:** By first checking if x is already covered by an existing r_j and choosing the most general such r_j, the algorithm avoids unnecessary modifications or new representative creations. A more general r_j is more likely to cover other future product points without needing further specialization.

