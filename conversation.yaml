              else:
                  # Generic path
                  other_rb = RoaringBitmap()
                  for start, end in other.intervals:
                      if start < 0:
                          raise ValueError("RoaringRangeSet only supports non-negative integers.")
                      other_rb.add_range(start, end + 1)
                  return self._new_from_rb(self._rb | other_rb)

