              let mut set7 = HybridBitset::from_iter(vec![1, 2, 3, 4, 5]);
              let set8 = HybridBitset::from_iter(vec![2, 4, 6]);
              set7 -= set8.clone();
              assert_eq!(
                  set7.iter_indices().collect::<BTreeSet<_>>(),
