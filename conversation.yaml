                  matched_terminals.reserve(32);
                  for (auto tm : matches_obj) {
                      py::tuple tmt = py::cast<py::tuple>(tm);
                      int terminal_id = py::cast<int>(tmt[0]);
                      matched_terminals.push_back(static_cast<unsigned long long>(terminal_id));
                  }
