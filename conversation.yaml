          }

          pub fn init_glr_parser_with_acc(&self, initial_acc: Acc) -> GLRParserState { // No longer generic
              let initial_parse_state = self.init_parse_state_with_acc(initial_acc);
              GLRParserState {
                  parser: self,
                  active_state: initial_parse_state,
