          gss_m1 = gss_class.from_stacks([(['a'], MergeableInt(1))])
          gss_m2 = gss_class.from_stacks([(['a'], MergeableInt(2)), (['b'], MergeableInt(3))])
          gss_m3 = gss_class.from_stacks([(['c'], MergeableInt(4))])
          
