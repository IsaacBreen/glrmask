          fn test_load_simple_tokenizer() -> Result<(), Box<dyn Error>> {
              let json_content = r#"
              {
                  "version": "1.0",
                  "added_tokens": [
                      {"id": 0, "content": "<BOS>", "special": true},
                      {"id": 1, "content": "<EOS>", "special": true},
