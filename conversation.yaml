          # Read the gzipped JSON into a string and construct the GrammarConstraint using the
          # available from_json_string(...) API.
          p = str(args.constraint_file)
          if p.endswith('.gz'):
              with gzip.open(p, 'rt', encoding='utf-8') as f:
