                      if sid in state_map:
                          dest_map = state_map[sid]
                          for dest_idx, llm_bv_pair in dest_map.items():
                              llm_bv_pair_to_dest_states[llm_bv_pair][dest_idx].append(sid)

                  for (llm_bv, llm_bv_not), dest_states in llm_bv_pair_to_dest_states.items():
