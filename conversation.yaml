      class PyAcc:
          terminals_union: Dict[int, RangeSet]
          llm_mask: RangeSet

          def __eq__(self, other):
              if not isinstance(other, PyAcc):
                  return NotImplemented
              return self.llm_mask == other.llm_mask and self.terminals_union == other.terminals_union

          def __hash__(self):
