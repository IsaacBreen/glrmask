      There's usually a few steps that are much slower than the others.
      I want to run the model through the input text and identify the most expensive `get_mask` call, then run the model up to that step so it's in a state ready to run that same expensive `get_mask` call again.
      Then here I want to copy the model and make some variation to each copy. A variation might be eg replacing `get_mask`. It might be optimizing the tree.

      It's easier to optimize the tree in intermediate form. Add a method that converts the final tree *back* to intermediate form.

      Also, we might want to optimize with respect to some arbitrary stats...
      Let's make it so each variation is a function that gets run on the model. And there's a method on the model that returns a list of variations to try.
