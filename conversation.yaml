              #[serde(untagged)]
              enum RangeRepr {
                  Single(usize),
                  Range((usize, usize)),
              }

              match Repr::deserialize(deserializer)? {
                  Repr::All(s) => {
                      if s == "ALL" {
                          Ok(SimpleBitset::all())
                      } else {
                          Err(de::Error::custom("expected string 'ALL' for all-bitset"))
                      }
                  }
                  Repr::Ranges(ranges) => {
