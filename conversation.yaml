                      stats.inc('get_mask.traversal.edges_traversed')
                      stats.inc(f'get_mask.traversal.edge_pop_val.{pop}')
                      stats.start('get_mask.main_loop.edge.popn')
                      popped: GSS = gss_node.popn(pop)
                      stats.stop('get_mask.main_loop.edge.popn')
                      if popped.is_empty():
