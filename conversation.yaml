              new_states: Dict[int, List[GSS]] = collections.defaultdict(list)
              q = collections.deque()
              for tokenizer_sid, gss in current_state_for_processing.items():
                  q.append((0, tokenizer_sid, gss))  # offset, tokenizer_state, gss

