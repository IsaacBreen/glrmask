              // This suggests that `get_canonical` should take an `acc_contribution_from_current_context` argument.
              // `GSSNode::get_canonical(value, canonical_preds, acc_from_original_node, cache)`
              // Then, in `get_canonical`, if node exists: `existing.acc = existing.acc.union(acc_from_original_node)`. If new: `new.acc = acc_from_original_node`.
