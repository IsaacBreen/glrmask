      How to simplify default reduction chains...
      Look at a state. Imagine we're part way through a reduction by nonterminal A for length x (although length x is irrelevant in this case), having just done the x pops, we've just popped *to* state s (from another state). ie this is the 'revealed' state, and our next step is to look up goto for nonterminal A in the goto row for this taste.
      Initialise a 'virtual' stack (just a normal vector stack, not a GSS) with state s as its only item.
      The basic idea is that we'll continue executing default reductions until one reduction requires us to pop below the bottom of this stack.

      The end result will be an eum that is either a vector of state IDs or an unused reduction
      - unused reduction is the remainder of the last reduction that took us below the stack (a copy of some actual *full* reduction, eg its nonterminal... but its length is just the remaining length)
      - the vector of states is a vector of states to push
      ie this is saying we either need to add a bunch of states to the current stack (like a bulk update), or we need to reduce on the parse stack.

      We put these values in each row in a new field.

      Now, when we're computing these things, we keep going until we encounter a clone_and_merge of true.
      We need to do this, because this indicates that there are non-default actions that can be performed at this point.
      So there we stop.

