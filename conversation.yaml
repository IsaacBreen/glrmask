      ### Why this refactor is functionally equivalent

      This section states explicit hypotheses about your data structures and then argues, step by step, that the new implementation computes exactly the same mathematical objects as the original one.

      #### 1. Setting and notation

      Fix a parser `P` and a terminal `t`.

      Let:

      1. `P.table` be a mapping from states `q ∈ Q` to rows.
      2. Each row contains:
         1. `row.shifts_and_reduces_full : TerminalID → Action`, where  
            `Action = Shift(q') ∣ Reduce{nonterminal_id, len, …} ∣ Split{shift, reduces}`.
         2. `row.gotos : NonTerminalID → { state_id: Option<StateID>, … }`.

      We only care about:

      1. For each state `q` and terminal `t`, the action `A(q, t)`, if any.
      2. For each state `q` and nonterminal `X`, the goto target `G(q, X) ∈ Option<StateID>`.

      We define the following sets (for fixed `t`):

      1. `InitialShifts(t)` is the set of pairs `(q0, q1)` such that, in `q0` on lookahead `t`, there is a shift to `q1`.
      2. `InitialReduces(t)` is the set of triples `(q0, L-1, X)` such that, in `q0` on lookahead `t`, there is a reduce with length `L > 0` to nonterminal `X`. The code stores `L-1` instead of `L`; this encoding is preserved.

      For each nonterminal `X`, the reduce characterization for terminal `t` is a pair of sets:

      1. `RA(t, X)` (reveal-and-rereduce triples):  
         triples `(q_revealed, k, Y)` denoting that from revealed state `q_revealed`, there is a reduction by nonterminal `Y` of length `L ≥ 2`, and we store `k = L-2`.
      2. `RGS(t, X)` (reveal-goto-shift escapes):  
         triples `(q_revealed, q_goto_state, q_shift_state)` indicating that from `q_goto_state` (reachable via a goto on `X` from `q_revealed`) on lookahead `t` we can shift to `q_shift_state`.

      The exported type `BelowBottomCharacterization` for terminal `t` wraps:

      1. `InitialShifts(t)`.
      2. `InitialReduces(t)`.
      3. For each nonterminal `X`, `RA(t, X)` and `RGS(t, X)`.
      4. `all_nts`, the set of all nonterminals in the grammar (unchanged).

      The only real algorithmic change is in `collect_reduce_characterizations`; the other differences are stylistic (inlining `process_reduce_action` into `explore_from_goto`, minor style cleanups, and a small optimization).


      #### 2. Hypotheses about the parser and table

      We assume the following, which matches how GLR tables are typically structured and how the original code uses them:

      1. For each state `q` and terminal `t`, there is at most one `Action` in `row.shifts_and_reduces_full`.
      2. `len` in a `Reduce` action is the number of stack elements popped (a nonnegative integer).
      3. For a `Split` action:
         1. `shift: Option<StateID>` is an optional shift successor.
         2. `reduces` is a collection of pairs `(len, nts)`, where `nts` maps nonterminals to some associated payload (ignored here).
      4. `parser.table` defines all states we care about; if `parser.table.get(&q)` returns `None`, then there are no relevant actions from state `q` in the computation.

      These are the same assumptions implicit in the original code, and the refactored code does not add any new assumptions.


      #### 3. Unchanged parts

      The following functions and behaviors are unchanged (up to minor cosmetic tweaks):

      1. `compute_all_characterizations`  
