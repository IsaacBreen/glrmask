      impl From<BitVec<usize, Lsb0>> for HybridBitset {
          fn from(bitvec: BitVec<usize, Lsb0>) -> Self {
              HybridBitset { inner: RangeSetBlaze::from_iter(bitvec.iter_ones()) }
          }
