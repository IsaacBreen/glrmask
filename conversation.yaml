      +    pub fn find_longest_prefix_token<'s>(&'s self, bytes: &[u8]) -> Option<(usize, &'s [u8])> {
      +        let mut longest_match_info: Option<(usize, &'s [u8])> = None;
      +        let mut current_node: &'s VocabPrefixTreeNode = &self.root;
