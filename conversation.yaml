                      let (glr_s2, allowed_bv2) = state2;
                      crate::debug!(1, "    - MERGE: gss1_ptr={:p}, mask1={:?} WITH gss2_ptr={:p}, mask2={:?}", glr_s1.active_state.stack, allowed_bv1, glr_s2.active_state.stack, allowed_bv2);
