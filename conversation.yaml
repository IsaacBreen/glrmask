                  TestEK::new(-2, Some(2)),
              ];
              let bubbled = bubble_up_negative_pops_stack(input);
              let neutralized = neutralize_remaining_negative_pops_stack(bubbled);
              // Expect the last to be neutralized and all non-negative pops.
              for ek in neutralized {
                  assert!(ek.pop >= 0);
              }
          }

          // --- Graph-level tests ---

