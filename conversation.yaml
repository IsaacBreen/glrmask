              .get_by_left(&Terminal("$".to_string()))
              .unwrap();
          // dbg!(&parser); // Keep commented unless debugging needed

          let test_cases = [
              ("b", true),
              ("ba", true),
              ("baa", true),
              ("a", false), // Cannot start with 'a'
