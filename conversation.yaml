          - **Phase 1: Check for existing coverage.** If a new successor x is already covered by an existing representative r_j (i.e., x ≤ r_j), we simply map x to r_j. If multiple such r_j exist, we choose the most general one (the one with the fewest specified coordinates) to keep representatives as general as possible, potentially allowing them to cover more future points.

          - **Phase 2: Attempt unification.** If x is not covered by any existing r_j, we then try to find an r_j that is compatible with x and can be unified (i.e., r_j is updated to unify(r_j, x)). If multiple such r_j exist, we choose the one whose unification with x results in the most general unified_tuple. This minimizes the specificity increase of r_j, making it less disruptive and potentially more versatile. If r_j is updated, it's re-added to the worklist to re-evaluate its successors.

          - **Phase 3: Create a new representative.** If neither of the above phases succeeds, x cannot be accommodated by existing representatives, so a new representative r_new = x is created.

      3. **Optimize worklist management:** To improve performance, especially for the work.contains(&j)check, we will use a HashSet alongside the VecDeque to track which representatives are currently in the worklist.


      ### Proof of Correctness (C1-C3) for the Optimized Algorithm:

      The optimized algorithm maintains the correctness properties (C1-C3) as follows:

      - **C3 (Start): p0 ∈ Dom**
          The algorithm explicitly initializes reps with inst.start and inserts inst.start into the image map, ensuring p0 is part of the domain.

      - **C1 (Well-formedness): ∀x ∈ Dom, x ≤ φ(x)**
