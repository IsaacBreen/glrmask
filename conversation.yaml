           * Negative `p`: allowed weight = `all_labels_weight - state_info[u][p]`.
         - Intersects the edge weights with this “valid” weight or removes them if it is empty.

         This is a direct encoding of “only keep transitions whose tokens are allowed under some valid next label”.

