      use crate::precompute4::utils::DEFAULT_TRANSITION_SYMBOL;
      use crate::precompute4::weighted_automata::{DWA, NWA, NWAStateID, NWAStates, Weight};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressStyle};
      use std::collections::{HashMap, VecDeque};
      use std::time::Instant;

      type Code = i16;
      type QueryKey = (NWAStateID, Code);

      #[inline]
      fn is_negative_symbol(label: Code) -> bool { label < 0 && label != DEFAULT_TRANSITION_SYMBOL }

      fn make_progress_bar(length: u64, template: &str) -> Option<ProgressBar> {
          if !PROGRESS_BAR_ENABLED {
              return None;
          }
          let pb = ProgressBar::new(length);
          pb.set_style(ProgressStyle::default_bar().template(template).expect("progress-bar"));
          Some(pb)
      }

      fn progress_step(pb: &Option<ProgressBar>, step: u64, msg: &str) {
          if let Some(p) = pb {
              p.set_message(msg.to_string());
              p.set_position(step);
          }
      }

      pub fn resolve_negative_codes_in_nwa(nwa: &mut NWA) {
          let pb = make_progress_bar(
              3,
              "{spinner:.green} [Resolving negatives in NWA: {elapsed_precise}] \
               [{wide_bar:.cyan/blue}] step {pos}/{len} ({msg})",
          );

          progress_step(&pb, 1, "Compute cancellations");
          apply_cancellations(nwa);

          progress_step(&pb, 2, "Propagate finality");
          apply_finality_fixpoint(nwa);

          progress_step(&pb, 3, "Apply changes & remove negatives");
          remove_negative_transitions(nwa);
          crate::debug!(4, "Applied changes to NWA.");

          if let Some(p) = &pb {
              p.finish_with_message("Done");
          }
      }

      pub fn apply_cancellations(nwa: &mut NWA) {
          let epsilons_to_add = compute_cancellations(&nwa.states);
          crate::debug!(4, "Computed {} new epsilon transitions from cancellations.", epsilons_to_add.len());
          for (from, to, w) in epsilons_to_add {
              nwa.states.add_epsilon(from, to, w);
          }
      }

      pub fn apply_finality_fixpoint(nwa: &mut NWA) {
          let final_fix = compute_finality_fixpoint(&nwa.states);
          for sid in 0..nwa.states.len() {
              if final_fix[sid].is_empty() {
                  continue;
              }
              let st = &mut nwa.states.0[sid];
              if let Some(fw) = &mut st.final_weight {
                  *fw |= &final_fix[sid];
              } else {
                  st.final_weight = Some(final_fix[sid].clone());
              }
          }
      }

      pub fn remove_negative_transitions(nwa: &mut NWA) {
          for st in &mut nwa.states.0 {
              st.transitions.retain(|&label, _| !is_negative_symbol(label));
          }
      }

      /// Resolve negative codes in a DWA by a single, high-performance, semantics-preserving NWA rewrite.
      pub fn resolve_negative_codes_in_dwa(dwa: &mut DWA) {
          let now = Instant::now();
          crate::debug!(4, "Resolving negative codes in DWA with {} states...", dwa.states.len());

          let pb = make_progress_bar(
              4,
              "{spinner:.green} [Resolving negative codes: {elapsed_precise}] \
               [{wide_bar:.cyan/blue}] step {pos}/{len} ({msg})",
          );

          progress_step(&pb, 1, "DWA -> NWA");
          let mut nwa = NWA::from_dwa(dwa);
          crate::debug!(4, "Converted to NWA with {} states.", nwa.states.len());
          crate::debug!(4, "Stats for NWA from DWA:\n{}", nwa.stats());

          progress_step(&pb, 2, "Resolve negatives in NWA");
          resolve_negative_codes_in_nwa(&mut nwa);
          crate::debug!(4, "Applied changes, NWA has {} states before determinization.", nwa.states.len());
          crate::debug!(4, "Stats for NWA after negative resolution:\n{}", nwa.stats());

          progress_step(&pb, 3, "Determinize");
          let mut result = nwa.determinize_to_dwa();

          progress_step(&pb, 4, "Simplify");
          result.simplify();
          *dwa = result;
          crate::debug!(4, "Stats for final DWA after negative resolution:\n{}", dwa.stats());

          if let Some(p) = &pb {
              p.finish_with_message("Done");
          }
          crate::debug!(4, "resolve_negative_codes_in_dwa took: {:?}", now.elapsed());
      }

      fn compute_cancellations(states: &NWAStates) -> Vec<(NWAStateID, NWAStateID, Weight)> {
          let n = states.len();

          let mut queries: Vec<HashMap<QueryKey, Weight>> = vec![HashMap::new(); n];
          let mut worklist: VecDeque<(NWAStateID, NWAStateID, Code, Weight)> = VecDeque::new();
          let mut new_epsilons: HashMap<(NWAStateID, NWAStateID), Weight> = HashMap::new();

          // Seed from negative transitions.
          for a in 0..n {
              for (&label, targets) in &states[a].transitions {
                  if !is_negative_symbol(label) {
                      continue;
                  }
                  let c = label.wrapping_sub(Code::MIN);
                  for (b, w_ab) in targets {
                      if *b >= n {
                          continue;
                      }
                      let query_key: QueryKey = (a, c);
                      let query_weight = queries[*b].entry(query_key).or_default();
                      let old_w = query_weight.clone();
                      *query_weight |= w_ab;
                      if *query_weight != old_w {
                          worklist.push_back((*b, a, c, query_weight.clone()));
                      }
                  }
              }
          }

          while let Some((s, a, c, w_as)) = worklist.pop_front() {
              let mut check_cancellations = |target: NWAStateID,
                                             w_st: &Weight,
                                             worklist: &mut VecDeque<(NWAStateID, NWAStateID, Code, Weight)>| {
                  let new_eps_w = &w_as & w_st;
                  if new_eps_w.is_empty() {
                      return;
                  }

                  let eps_key = (a, target);
                  let eps_weight = new_epsilons.entry(eps_key).or_default();
                  let old_eps_w = eps_weight.clone();
                  *eps_weight |= &new_eps_w;

                  if *eps_weight != old_eps_w {
                      let queries_at_a = queries[a].clone();
                      for (&(a_prime, c_prime), w_a_prime_a) in &queries_at_a {
                          let prop_w = w_a_prime_a & &*eps_weight;
                          if prop_w.is_empty() {
                              continue;
                          }
                          let query_key: QueryKey = (a_prime, c_prime);
                          let query_weight = queries[target].entry(query_key).or_default();
                          let old_qw = query_weight.clone();
                          *query_weight |= &prop_w;
                          if *query_weight != old_qw {
                              worklist.push_back((target, a_prime, c_prime, query_weight.clone()));
                          }
                      }
                  }
              };

              if let Some(pos_targets) = states[s].transitions.get(&c) {
                  for (t, w_st) in pos_targets {
                      if *t < n {
                          check_cancellations(*t, w_st, &mut worklist);
                      }
                  }
              }
              if let Some(default_targets) = states[s].transitions.get(&DEFAULT_TRANSITION_SYMBOL) {
                  for (target, weight) in default_targets {
                      check_cancellations(*target, weight, &mut worklist);
                  }
              }

              for (t, w_st) in &states[s].epsilons {
                  if *t >= n {
                      continue;
                  }
                  let prop_w = &w_as & w_st;
                  if prop_w.is_empty() {
                      continue;
                  }
                  let query_key: QueryKey = (a, c);
                  let query_weight = queries[*t].entry(query_key).or_default();
                  let old_qw = query_weight.clone();
                  *query_weight |= &prop_w;
                  if *query_weight != old_qw {
                      worklist.push_back((*t, a, c, query_weight.clone()));
                  }
              }
          }

          new_epsilons.into_iter().map(|((from, to), w)| (from, to, w)).collect()
      }

      fn compute_finality_fixpoint(states: &NWAStates) -> Vec<Weight> {
          let n = states.len();
          let mut future_final: Vec<Weight> = vec![Weight::zeros(); n];
          let mut predecessors: Vec<Vec<(NWAStateID, Weight)>> = vec![vec![]; n];

          for u in 0..n {
              for &(v, ref w) in &states[u].epsilons {
                  if v < n {
                      predecessors[v].push((u, w.clone()));
                  }
              }
              for (&label, targets) in &states[u].transitions {
                  if !is_negative_symbol(label) {
                      continue;
                  }
                  for (v, w) in targets {
                      if *v < n {
                          predecessors[*v].push((u, w.clone()));
                      }
                  }
              }
          }

          let mut queue: VecDeque<NWAStateID> = VecDeque::new();
          for s in 0..n {
              if let Some(ref fw) = states[s].final_weight {
                  if !fw.is_empty() {
                      future_final[s] = fw.clone();
                      queue.push_back(s);
                  }
              }
          }

          while let Some(v) = queue.pop_front() {
              let fv = future_final[v].clone();
              if fv.is_empty() {
                  continue;
              }
              for &(u, ref w_uv) in &predecessors[v] {
                  let add = &fv & w_uv;
                  if add.is_empty() {
                      continue;
                  }
                  let old = &future_final[u];
                  if (&add & old) != add {
                      future_final[u] |= &add;
                      queue.push_back(u);
                  }
              }
          }

          future_final
      }
    src/precompute4/test_resolve_negatives.rs: |-
      use crate::precompute4::resolve_negatives::resolve_negative_codes_in_dwa;
      use crate::precompute4::test_weighted_automata::stochastic_equivalence_test;
      use crate::precompute4::utils::DEFAULT_TRANSITION_SYMBOL;
      use crate::precompute4::weighted_automata::{DWA, NWA, Weight};

      #[test]
      fn test_resolve_negatives_simple_cancellation() {
          // Corresponds to a sequence like `a, neg(a)`.
          // The DWA should resolve to an automaton that accepts `a` and is final.
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();

          let code_a = 7;
          let neg_code_a = i16::MIN + code_a;

          // 0 --a--> 1
          d.add_transition(d.body.start_state, code_a, s1, Weight::from_item(2)).unwrap();
          // 1 --neg(a)--> 2
          d.add_transition(s1, neg_code_a, s2, Weight::all()).unwrap();
          // 2 is final
          d.set_final_weight(s2, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          // Expected: 0 --a--> final_state
          let mut expected = DWA::new();
          let s_final = expected.add_state();
          expected.add_transition(expected.body.start_state, code_a, s_final, Weight::from_item(2)).unwrap();
          expected.set_final_weight(s_final, Weight::from_item(2)).unwrap();

          stochastic_equivalence_test(d, expected);
      }

      #[test]
      fn test_resolve_negatives_from_complex_nwa_log() {
          let mut nwa = NWA::new();
          for _ in 0..=68 {
              nwa.add_state();
          }
          nwa.body.start_state = 68;

          // State 0: final_weight: ALL
          nwa.states.0[0].final_weight = Some(Weight::all());
          // State 1: ε -> 0 (weight: ALL)
          nwa.states.add_epsilon(1, 0, Weight::all());
          // State 2: ε -> 1 (weight: ALL)
          nwa.states.add_epsilon(2, 1, Weight::all());
          // State 3: ε -> 4 (weight: ALL)
          nwa.states.add_epsilon(3, 4, Weight::all());
          // State 4: ε -> 5 (weight: ALL)
          nwa.states.add_epsilon(4, 5, Weight::all());
          // State 5: 458 -> 12 (weight: ALL)
          nwa.states.add_transition(5, 458, 12, Weight::all());
          // State 12: neg(458) -> 16 (weight: ALL)
          nwa.states.add_transition(12, i16::MIN + 458, 16, Weight::all());
          // State 16: neg(459) -> 17 (weight: ALL)
          nwa.states.add_transition(16, i16::MIN + 459, 17, Weight::all());
          // State 17: ε -> 2 (weight: [1])
          nwa.states.add_epsilon(17, 2, Weight::from_item(1));
          // State 18: ε -> 3 (weight: ALL)
          nwa.states.add_epsilon(18, 3, Weight::all());
          // State 21: ε -> 22 (weight: ALL)
          nwa.states.add_epsilon(21, 22, Weight::all());
          // State 22: 459 -> 24 (weight: ALL)
          nwa.states.add_transition(22, 459, 24, Weight::all());
          // State 23: 422 -> 30 (weight: ALL)
          nwa.states.add_transition(23, 422, 30, Weight::all());
          // State 24: 32767 -> 23 (weight: ALL)
          nwa.states.add_transition(24, DEFAULT_TRANSITION_SYMBOL, 23, Weight::all());
          // State 26: neg(436) -> 32 (weight: ALL)
          nwa.states.add_transition(26, i16::MIN + 436, 32, Weight::all());
          // State 30: neg(422) -> 26 (weight: ALL)
          nwa.states.add_transition(30, i16::MIN + 422, 26, Weight::all());
          // State 32: neg(458) -> 34 (weight: ALL)
          nwa.states.add_transition(32, i16::MIN + 458, 34, Weight::all());
          // State 34: ε -> 18 (weight: [1])
          nwa.states.add_epsilon(34, 18, Weight::from_item(1));
          // State 35: ε -> 21 (weight: ALL)
          nwa.states.add_epsilon(35, 21, Weight::all());
          // State 36: ε -> 37 (weight: ALL)
          nwa.states.add_epsilon(36, 37, Weight::all());
          // State 37: ε -> 38 (weight: ALL)
          nwa.states.add_epsilon(37, 38, Weight::all());
          // State 38: 458 -> 45 (weight: ALL)
          nwa.states.add_transition(38, 458, 45, Weight::all());
          // State 45: neg(458) -> 49 (weight: ALL)
          nwa.states.add_transition(45, i16::MIN + 458, 49, Weight::all());
          // State 49: neg(459) -> 50 (weight: ALL)
          nwa.states.add_transition(49, i16::MIN + 459, 50, Weight::all());
          // State 50: ε -> 35 (weight: [1])
          nwa.states.add_epsilon(50, 35, Weight::from_item(1));
          // State 51: ε -> 36 (weight: ALL)
          nwa.states.add_epsilon(51, 36, Weight::all());
          // State 52: ε -> 54 (weight: ALL)
          nwa.states.add_epsilon(52, 54, Weight::all());
          // State 54: 422 -> 57 (weight: ALL)
          nwa.states.add_transition(54, 422, 57, Weight::all());
          // State 57: neg(422) -> 64 (weight: ALL)
          nwa.states.add_transition(57, i16::MIN + 422, 64, Weight::all());
          // State 64: neg(458) -> 66 (weight: ALL)
          nwa.states.add_transition(64, i16::MIN + 458, 66, Weight::all());
          // State 66: ε -> 51 (weight: [1])
          nwa.states.add_epsilon(66, 51, Weight::from_item(1));
          // State 67: ε -> 52 (weight: ALL)
          nwa.states.add_epsilon(67, 52, Weight::all());
          // State 68: 0 -> 67 (weight: ALL)
          nwa.states.add_transition(68, 0, 67, Weight::all());

          let mut d = nwa.determinize_to_dwa();
          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          let s_final = expected.add_state();
          expected.add_transition(expected.body.start_state, 0, s_final, Weight::all()).unwrap();
          expected.set_final_weight(s_final, Weight::from_item(1)).unwrap();

          stochastic_equivalence_test(d, expected);
      }

      #[test]
      fn test_resolve_negatives_long_cancellation_chain() {
          // The path is: 0 --7--> 5 --neg(7)--> 10 --neg(3)--> 13 --3--> 15 --7--> 22 --neg(7)--> 27 --neg(1)--> 29 --neg(2)--> 30(final)
          let mut d = DWA::new();
          let s5 = d.add_state();
          let s10 = d.add_state();
          let s13 = d.add_state();
          let s15 = d.add_state();
          let s22 = d.add_state();
          let s27 = d.add_state();
          let s29 = d.add_state();
          let s30 = d.add_state();

          let code7 = 7;
          let neg_code7 = i16::MIN + code7;
          let code3 = 3;
          let neg_code3 = i16::MIN + code3;
          let code1 = 1;
          let neg_code1 = i16::MIN + code1;
          let code2 = 2;
          let neg_code2 = i16::MIN + code2;

          d.add_transition(d.body.start_state, code7, s5, Weight::all()).unwrap();
          d.add_transition(s5, neg_code7, s10, Weight::all()).unwrap();
          d.add_transition(s10, neg_code3, s13, Weight::all()).unwrap();
          d.add_transition(s13, code3, s15, Weight::all()).unwrap();
          d.add_transition(s15, code7, s22, Weight::all()).unwrap();
          d.add_transition(s22, neg_code7, s27, Weight::all()).unwrap();
          d.add_transition(s27, neg_code1, s29, Weight::all()).unwrap();
          d.add_transition(s29, neg_code2, s30, Weight::all()).unwrap();
          d.set_final_weight(s30, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          let s_final = expected.add_state();
          expected.add_transition(expected.body.start_state, code7, s_final, Weight::all()).unwrap();
          expected.set_final_weight(s_final, Weight::all()).unwrap();

          stochastic_equivalence_test(d, expected);
      }

      #[test]
      fn test_resolve_negatives_from_debug_log() {
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();
          let s3 = d.add_state();
          let s4 = d.add_state();
          let s5 = d.add_state();
          let s6 = d.add_state();

          let code0 = 0;
          let neg_code0 = i16::MIN + code0;
          let neg_code1 = i16::MIN + 1;
          let code2 = 2;
          let neg_code2 = i16::MIN + code2;

          d.add_transition(d.body.start_state, code0, s1, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, code2, s2, Weight::all()).unwrap();
          d.add_transition(s1, neg_code0, s3, Weight::all()).unwrap();
          d.add_transition(s2, neg_code2, s4, Weight::all()).unwrap();
          d.add_transition(s3, neg_code1, s5, Weight::all()).unwrap();
          d.add_transition(s4, neg_code0, s6, Weight::all()).unwrap();
          d.set_final_weight(s5, Weight::from_item(1)).unwrap();
          d.set_final_weight(s6, Weight::from_item(0)).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          let s_final1 = expected.add_state();
          let s_final2 = expected.add_state();
          expected.add_transition(expected.body.start_state, code0, s_final1, Weight::all()).unwrap();
          expected.set_final_weight(s_final1, Weight::from_item(1)).unwrap();
          expected.add_transition(expected.body.start_state, code2, s_final2, Weight::all()).unwrap();
          expected.set_final_weight(s_final2, Weight::from_item(0)).unwrap();

          stochastic_equivalence_test(d, expected);
      }

      #[test]
      fn test_resolve_negatives_from_intermediate_debug_log() {
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();
          let s3 = d.add_state();
          let s4 = d.add_state();
          let s5 = d.add_state();
          let s6 = d.add_state();
          let s7 = d.add_state();

          let neg_code1 = i16::MIN + 1;
          let neg_code7 = i16::MIN + 7;

          // State 0 (start)
          d.add_transition(d.body.start_state, 1, s1, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, 3, s2, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, 4, s3, Weight::all()).unwrap();
          d.add_transition(d.body.start_state, 7, s4, Weight::all()).unwrap();

          // State 1
          d.add_transition(s1, neg_code1, s5, Weight::all()).unwrap();
          d.add_transition(s1, 7, s4, Weight::all()).unwrap();

          // State 2
          d.add_transition(s2, 7, s6, Weight::all()).unwrap();

          // State 3
          d.add_transition(s3, DEFAULT_TRANSITION_SYMBOL, s2, Weight::all()).unwrap();

          // State 4
          d.set_final_weight(s4, Weight::from_item(2)).unwrap();

          // State 5
          d.add_transition(s5, DEFAULT_TRANSITION_SYMBOL, s7, Weight::all()).unwrap();

          // State 6
          d.set_final_weight(s6, Weight::from_item(2)).unwrap();
          d.add_transition(s6, neg_code7, s1, Weight::all()).unwrap();

          // State 7
          d.add_transition(s7, 7, s4, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          let exp_s1 = expected.add_state();
          let exp_s2 = expected.add_state();
          let exp_s3 = expected.add_state();
          let exp_s_after_4 = expected.add_state();
          let exp_s_final = expected.add_state();

          expected.set_final_weight(exp_s_final, Weight::from_item(2)).unwrap();

          // Paths leading to final state
          expected.add_transition(expected.body.start_state, 7, exp_s_final, Weight::all()).unwrap();

          expected.add_transition(expected.body.start_state, 1, exp_s1, Weight::all()).unwrap();
          expected.add_transition(exp_s1, 7, exp_s_final, Weight::all()).unwrap();

          expected.add_transition(expected.body.start_state, 3, exp_s2, Weight::all()).unwrap();
          expected.add_transition(exp_s2, 7, exp_s_final, Weight::all()).unwrap();

          expected.add_transition(expected.body.start_state, 4, exp_s3, Weight::all()).unwrap();
          expected.add_transition(exp_s3, DEFAULT_TRANSITION_SYMBOL, exp_s_after_4, Weight::all()).unwrap();
          expected.add_transition(exp_s_after_4, 7, exp_s_final, Weight::all()).unwrap();

          stochastic_equivalence_test(d, expected);
      }

      #[test]
      fn test_resolve_negatives_minimal_loop_with_default() {
          let mut d = DWA::new();
          let s1 = d.add_state();
          let s2 = d.add_state();

          let neg_code1 = i16::MIN + 1;

          // 0 --neg(1)--> 1
          d.add_transition(d.body.start_state, neg_code1, s1, Weight::all()).unwrap();
          // 1 --*--> 2 (default)
          d.add_transition(s1, DEFAULT_TRANSITION_SYMBOL, s2, Weight::all()).unwrap();
          // 2 is final
          d.set_final_weight(s2, Weight::all()).unwrap();

          resolve_negative_codes_in_dwa(&mut d);

          let mut expected = DWA::new();
          expected.set_final_weight(expected.body.start_state, Weight::all()).unwrap();

          stochastic_equivalence_test(d, expected);
      }
