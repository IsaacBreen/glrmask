          fn test_from_iter() {
              let data = [1, 2, 3, 4, 5];
              let fs = FrozenSet::from_iter(data.iter().cloned());
              assert_eq!(fs.len(), 5);
              for i in 1..=5 {
                  assert!(fs.contains(&i));
              }
          }

