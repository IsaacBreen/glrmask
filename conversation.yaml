          #[test]
          fn test_bitwise_ops() {
              let mut set1 = HybridL2Bitset::new();
              set1.insert(10, 100);
              set1.insert(10, 101);
              set1.insert(20, 200);

              let mut set2 = HybridL2Bitset::new();
              set2.insert(11, 101);
              set2.insert(11, 102);
              set2.insert(20, 200);
              set2.insert(30, 300);

              // Intersection
              let intersection = &set1 & &set2;
              let expected_intersection: BTreeSet<(usize, usize)> = vec![(20, 200)].into_iter().collect();
              assert_eq!(
                  intersection.iter().collect::<BTreeSet<_>>(),
                  expected_intersection
              );

              // Union
              let union = &set1 | &set2;
              let expected_union: BTreeSet<(usize, usize)> = vec![
                  (10, 100),
                  (10, 101),
                  (11, 101),
                  (11, 102),
                  (20, 200),
