          let (child_arc_wrapper, edge_bv) = destinations.iter().next().unwrap();
          assert_eq!(*edge_bv, expected_tokens, "Edge token bitset is incorrect");
          let child_node = child_arc_wrapper.as_arc().read().unwrap();
