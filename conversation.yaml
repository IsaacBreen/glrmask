              }
          }
      }

      impl BitOr for &HybridBitset {
          type Output = HybridBitset;

          fn bitor(self, rhs: Self) -> Self::Output {
              HybridBitset {
                  inner: &self.inner | &rhs.inner,
              }
          }
      }

      impl BitXor for &HybridBitset {
