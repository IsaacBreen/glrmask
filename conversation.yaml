      The compiler error `E0499: cannot borrow *self as mutable more than once at a time` occurs because the `if let` structure attempts to take a mutable borrow of `self` with `self.get_mut(&key)` in the `if` branch, and then, if that fails, it attempts to take a *second* mutable borrow of `self` for the `VacantEntry` in the `else` branch. Even though the branches are mutually exclusive, the borrow checker is conservative about the lifetime of the initial `get_mut` borrow.

      The fix is to perform a non-mutable check for the key's presence first, which releases the shared borrow immediately, and then only take the mutable borrow in the specific branch that requires it.

      Here are the step-by-step instructions and the corresponding git diff.

      ### Step-by-step Instructions

      In the file `src/datastructures/entry_api.rs`, modify the `entry` method implementation for `OrderedHashMap<K, V>` to use a shared borrow for the initial key presence check.

      1.  Open `src/datastructures/entry_api.rs`.
      2.  Locate the `entry` function within the `impl<K, V> EntryApi<K, V> for OrderedHashMap<K, V>` block (around lines 178-184).
      3.  Replace the existing function body with the following code:

      ```rust
          fn entry<'a>(&'a mut self, key: K) -> Self::Entry<'a> {
              if self.get(&key).is_some() {
                  // Key is present, now take the mutable borrow
                  let value = self.get_mut(&key).unwrap();
                  OrderedMapEntry::Occupied(OccupiedEntry { value })
              } else {
                  // Key is absent, take the mutable borrow for the VacantEntry
                  OrderedMapEntry::Vacant(VacantEntry { map: self, key })
