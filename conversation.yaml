              let root = nodes[0];

              let mut llm_0 = LLMTokenBV::zeros();
              llm_0.insert(0);

              let mut bv_1 = StateIDBV::zeros();
              bv_1.insert(1);
              let mut bv_2 = StateIDBV::zeros();
              bv_2.insert(2);
              let mut bv_4 = StateIDBV::zeros();
              bv_4.insert(4);
              let mut bv_5 = StateIDBV::zeros();
              bv_5.insert(5);
