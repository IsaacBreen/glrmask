              add_edge(&god, c, t, TestEK::new(0, None));

              let roots = vec![a];
              run_test(&god, &roots);
          }

          // --- Realized-actions preservation tests for the stack helper ---

          #[test]
          fn test_bubble_preserves_realized_actions_simple_pair_map() {
              let original = vec![
                  TestEK::new(3, Some(0)),
                  TestEK::new(-2, Some(2)),
