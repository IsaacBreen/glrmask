              let s_d_from_c1 = s_c1.predecessors.iter().find(|n| n.value == 40).expect("D node from C1").clone();

              assert!(Arc::ptr_eq(&s_d_from_a1, &s_d_from_c1), "D nodes should be canonicalized to the same Arc");
