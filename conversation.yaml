              let mut all_nodes = HashSet::new();
              fn collect_all_nodes(node: &Arc<TestGSSNode>, set: &mut HashSet<*const TestGSSNode>) {
                  if set.insert(Arc::as_ptr(node)) {
                      for pred_arc in node.predecessors.values() {
