                                      values[d] = (existing_gss_set, combined_mask)
                                  else:
                                      values[d] = (set(child_gss_nodes_set), group_child_mask)

                                  enqueue(max_depth.get(d, 0), d)

              return RangeSet.from_ranges(final_mask.to_ranges())
