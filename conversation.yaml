          alphabet_size: usize,
      ) -> (Vec<ProductTuple>, HashMap<ProductTuple, usize>) {
          let inst = Instance {
              start: start_tuple,
              components: components.to_vec(),
              alphabet_size,
          };
          let sol = synthesize_optimized(&inst);
          (sol.reps, sol.image)
      }

