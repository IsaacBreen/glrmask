          }
      }

      impl BitOrAssign for HybridBitset {
          // #[time_it]
          fn bitor_assign(&mut self, rhs: Self) {
              // let self_ranges_len = self.inner.ranges_len();
              // let rhs_ranges_len = rhs.inner.ranges_len();
