              ideal_map = expectations.get(workload, {}).get(axis, {})

              # Build x,y series per phase
              x = []
              phase_ys: Dict[str, List[float]] = {p: [] for p in phases}
              for r in runs:
                  pv = r.get("params", {}).get(axis)
                  if pv is None:
                      pv = r.get("derived", {}).get(axis)
                  try:
