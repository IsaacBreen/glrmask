      from __future__ import annotations

      from dataclasses import dataclass
      from typing import (
          Any,
          Callable,
          Dict,
          Generic,
          Iterable,
          List,
          Optional,
          Set,
          Tuple,
          Type,
          TypeVar,
          Union,
      )

      import json

      from .interface import GSS, T, Acc


      # Internal immutable node that maintains the “leveled” invariant:
      # Exactly one of the following is “active” at a node:
      # - own_accs + keyset: the node itself carries accumulators and no children carry accumulators.
      # - leaf_accs: each outgoing edge carries accumulators and no children carry accumulators.
      # - children: outgoing edges map to deeper nodes; no accumulators at this level.
      #
      # Additional invariant: if leaf_accs is active and all children’s accumulators are equal (including multiplicity),
      # then they are “sucked up” into the parent (i.e., replaced by own_accs + keyset).
      #
      # This node is used to represent a trie of equal-length stacks. The entire GSS state maintains that all stacks
      # in a given instance have the same length (or the instance is empty). This lets us satisfy the invariants cleanly
      # and implement push/pop in O(number of frontier nodes).
      #
      # Notes:
      # - own_accs is a tuple of accumulators representing multiplicity (we preserve duplicates).
      # - leaf_accs maps each outgoing value (top element at this depth) to a tuple of accumulators.
      # - keyset is kept when we “suck up” accs from children so we still know which top symbols this node can expose;
      #   this makes peek/isolate fast even after sucking up.
      @dataclass(frozen=True, slots=True)
      class _Node(Generic[T, Acc]):
          own_accs: Optional[Tuple[Acc, ...]] = None
          keyset: Optional[frozenset] = None
          leaf_accs: Optional[Dict[T, Tuple[Acc, ...]]] = None
          children: Optional[Dict[T, "_Node[T, Acc]"]] = None

          def mode(self) -> str:
              if self.own_accs is not None:
                  return "own"
              if self.leaf_accs is not None:
                  return "leaf"
              if self.children is not None:
                  return "children"
              return "empty"

          def is_empty(self) -> bool:
              m = self.mode()
              if m == "own":
                  return len(self.own_accs or ()) == 0 or not self.keyset
              if m == "leaf":
                  la = self.leaf_accs or {}
                  if not la:
                      return True
                  # all tuples empty?
                  for v in la.values():
                      if v:
                          return False
                  return True
              if m == "children":
                  ch = self.children or {}
                  if not ch:
                      return True
                  # Children may represent future potential but in our model, absence of accs at any level
                  # and no future exposure (because we keep only active stacks) means children-only nodes should
                  # not happen without underlying active stacks (we always maintain active stacks).
                  # Nevertheless, treat as empty if every child is empty.
                  for c in ch.values():
                      if not c.is_empty():
                          return False
                  return True
              return True


      def _suck_up_if_possible(node: _Node[T, Acc]) -> _Node[T, Acc]:
          # If node has leaf_accs and all children's acc tuples are equal (including multiplicity),
          # then replace with own_accs + keyset.
          if node.leaf_accs is None:
              return node
          la = node.leaf_accs
          if not la:
              return node
          it = iter(la.values())
          first = next(it)
          for rest in it:
              if rest != first:
                  return node
          # All equal
          return _Node(own_accs=first, keyset=frozenset(la.keys()))


      def _flatten_accs(accs_map: Dict[T, Tuple[Acc, ...]]) -> Tuple[Acc, ...]:
          # Concatenate across keys in stable order for determinism.
          if not accs_map:
              return ()
          result: List[Acc] = []
          for k in sorted(accs_map.keys(), key=lambda x: repr(x)):
              result.extend(accs_map[k])
          return tuple(result)


      def _prune_empty_structures(node: Optional[_Node[T, Acc]]) -> Optional[_Node[T, Acc]]:
          if node is None:
              return None
          m = node.mode()
          if m == "own":
              if not node.own_accs or len(node.own_accs) == 0 or not node.keyset:
                  return None
              return node
          if m == "leaf":
              la = node.leaf_accs or {}
              # Drop empty tuples
              la2: Dict[T, Tuple[Acc, ...]] = {k: v for k, v in la.items() if v and len(v) > 0}
              if not la2:
                  return None
              if la2 is not la:
                  node = _Node(leaf_accs=la2)
              return node
          if m == "children":
              ch = node.children or {}
              ch2: Dict[T, _Node[T, Acc]] = {}
              changed = False
              for k, c in ch.items():
                  pc = _prune_empty_structures(c)
                  if pc is not None:
                      ch2[k] = pc
                  else:
                      changed = True
              if not ch2:
                  return None
              if changed:
                  node = _Node(children=ch2)
              return node
          return None


      def _apply_node(node: Optional[_Node[T, Acc]], fn: Callable[[Acc], Acc]) -> Optional[_Node[T, Acc]]:
          if node is None:
              return None
          m = node.mode()
          if m == "own":
              transformed = tuple(fn(a) for a in (node.own_accs or ()))
              return _Node(own_accs=transformed, keyset=node.keyset)
          if m == "leaf":
              la = node.leaf_accs or {}
              new_la: Dict[T, Tuple[Acc, ...]] = {k: tuple(fn(a) for a in v) for k, v in la.items()}
              new_node = _Node(leaf_accs=new_la)
              return _suck_up_if_possible(_prune_empty_structures(new_node) or new_node)
          if m == "children":
              ch = node.children or {}
              new_ch: Dict[T, _Node[T, Acc]] = {}
              for k, c in ch.items():
                  pc = _apply_node(c, fn)
                  if pc is not None:
                      new_ch[k] = pc
              if not new_ch:
                  return None
              return _Node(children=new_ch)
          return None


      def _prune_node(node: Optional[_Node[T, Acc]], pred: Callable[[Acc], bool]) -> Optional[_Node[T, Acc]]:
          if node is None:
              return None
          m = node.mode()
          if m == "own":
              kept = tuple(a for a in (node.own_accs or ()) if pred(a))
              if not kept:
                  return None
              return _Node(own_accs=kept, keyset=node.keyset)
          if m == "leaf":
              la = node.leaf_accs or {}
              new_la: Dict[T, Tuple[Acc, ...]] = {}
              for k, v in la.items():
                  kept = tuple(a for a in v if pred(a))
                  if kept:
                      new_la[k] = kept
              if not new_la:
                  return None
              new_node = _Node(leaf_accs=new_la)
              return _suck_up_if_possible(_prune_empty_structures(new_node) or new_node)
          if m == "children":
              ch = node.children or {}
              new_ch: Dict[T, _Node[T, Acc]] = {}
              for k, c in ch.items():
                  pc = _prune_node(c, pred)
                  if pc is not None:
                      new_ch[k] = pc
              if not new_ch:
                  return None
              return _Node(children=new_ch)
          return None


      def _peek_node(node: Optional[_Node[T, Acc]]) -> Set[T]:
          tops: Set[T] = set()
          if node is None:
              return tops
          m = node.mode()
          if m == "own":
              # Top-of-stack values at this level are the keyset
              tops |= set(node.keyset or frozenset())
              return tops
          if m == "leaf":
              tops |= set((node.leaf_accs or {}).keys())
              return tops
          if m == "children":
              for c in (node.children or {}).values():
                  tops |= _peek_node(c)
              return tops
          return tops


      def _isolate_node(node: Optional[_Node[T, Acc]], value: T) -> Optional[_Node[T, Acc]]:
          if node is None:
              return None
          m = node.mode()
          if m == "own":
              if value in (node.keyset or frozenset()):
                  return _Node(own_accs=node.own_accs, keyset=frozenset({value}))
              return None
          if m == "leaf":
              la = node.leaf_accs or {}
              if value in la:
                  new_node = _Node(leaf_accs={value: la[value]})
                  return _suck_up_if_possible(new_node)
              return None
          if m == "children":
              ch = node.children or {}
              new_ch: Dict[T, _Node[T, Acc]] = {}
              for k, c in ch.items():
                  ic = _isolate_node(c, value)
                  if ic is not None:
                      new_ch[k] = ic
              if not new_ch:
                  return None
              return _Node(children=new_ch)
          return None


      def _enumerate_pairs(node: Optional[_Node[T, Acc]], prefix: List[T], out: List[Tuple[List[T], Acc]]) -> None:
          if node is None:
              return
          m = node.mode()
          if m == "own":
              ks = sorted(list(node.keyset or frozenset()), key=lambda x: repr(x))
              for k in ks:
                  for a in (node.own_accs or ()):
                      out.append((prefix + [k], a))
              return
          if m == "leaf":
              la = node.leaf_accs or {}
              for k in sorted(la.keys(), key=lambda x: repr(x)):
                  for a in la[k]:
                      out.append((prefix + [k], a))
              return
          if m == "children":
              ch = node.children or {}
              for k in sorted(ch.keys(), key=lambda x: repr(x)):
                  prefix.append(k)
                  _enumerate_pairs(ch[k], prefix, out)
                  prefix.pop()


      def _build_node_from_stacks(items: List[Tuple[List[T], Acc]], L: int) -> Optional[_Node[T, Acc]]:
          # Build a leveled node-trie from stacks that all have length L > 0.
          # We construct a trie down to depth L-1 where leaf_accs resides.
          def build_at_pos(pos: int, group: List[Tuple[List[T], Acc]]) -> Optional[_Node[T, Acc]]:
              if pos == L - 1:
                  # Leaf level: assign accs by last symbol
                  by_key: Dict[T, List[Acc]] = {}
                  for vals, acc in group:
                      k = vals[pos]
                      by_key.setdefault(k, []).append(acc)
                  la: Dict[T, Tuple[Acc, ...]] = {k: tuple(v) for k, v in by_key.items()}
                  node = _Node(leaf_accs=la)
                  return _suck_up_if_possible(_prune_empty_structures(node) or node)
              # Internal level: group by current symbol and recurse
              by_key_g: Dict[T, List[Tuple[List[T], Acc]]] = {}
              for vals, acc in group:
                  k = vals[pos]
                  by_key_g.setdefault(k, []).append((vals, acc))
              children: Dict[T, _Node[T, Acc]] = {}
              for k, g in by_key_g.items():
                  ch = build_at_pos(pos + 1, g)
                  if ch is not None:
                      children[k] = ch
              if not children:
                  return None
              return _Node(children=children)

          if L <= 0:
              return None
          return build_at_pos(0, items)


      def _push_node(node: Optional[_Node[T, Acc]], value: T) -> Optional[_Node[T, Acc]]:
          if node is None:
              return None
          m = node.mode()
          if m == "own":
              # Distribute own_accs to each key as a new child with that key, then attach leaf_accs {value: own_accs}
              children: Dict[T, _Node[T, Acc]] = {}
              for k in sorted(list(node.keyset or frozenset()), key=lambda x: repr(x)):
                  child_leaf = _Node(leaf_accs={value: node.own_accs or ()})
                  child_leaf = _suck_up_if_possible(_prune_empty_structures(child_leaf) or child_leaf)
                  children[k] = child_leaf
              if not children:
                  return None
              return _Node(children=children)
          if m == "leaf":
              # Each leaf becomes a child whose leaf_accs is {value: accs}
              children: Dict[T, _Node[T, Acc]] = {}
              for k, accs in (node.leaf_accs or {}).items():
                  child_leaf = _Node(leaf_accs={value: accs})
                  child_leaf = _suck_up_if_possible(_prune_empty_structures(child_leaf) or child_leaf)
                  children[k] = child_leaf
              if not children:
                  return None
              return _Node(children=children)
          if m == "children":
              new_children: Dict[T, _Node[T, Acc]] = {}
              for k, c in (node.children or {}).items():
                  pc = _push_node(c, value)
                  if pc is not None:
                      new_children[k] = pc
              if not new_children:
                  return None
              return _Node(children=new_children)
          return None


      def _collect_pop_leaf_map(node: Optional[_Node[T, Acc]]) -> Dict[T, Tuple[Acc, ...]]:
          # Compute the leaf_accs mapping at the parent of this node (i.e., pop one layer).
          # For:
          # - own: returns {k: own_accs for k in keyset}
          # - leaf: returns leaf_accs directly
          # - children: for each child u, we flatten its result across keys and assign to {u: concatenated_accs}
          result: Dict[T, Tuple[Acc, ...]] = {}
          if node is None:
              return result
          m = node.mode()
          if m == "own":
              for k in (node.keyset or frozenset()):
                  if node.own_accs:
                      result[k] = node.own_accs
              return result
          if m == "leaf":
              return dict(node.leaf_accs or {})
          if m == "children":
              for u, child in (node.children or {}).items():
                  sub = _collect_pop_leaf_map(child)
                  accs = _flatten_accs(sub)
                  if accs:
                      result[u] = accs
              return result
          return result


      def _pop_node(node: Optional[_Node[T, Acc]]) -> Optional[_Node[T, Acc]]:
          # Produce a node with leaf_accs at this level equal to _collect_pop_leaf_map(node)
          la = _collect_pop_leaf_map(node)
          if not la:
              return None
          new_node = _Node(leaf_accs=la)
          return _suck_up_if_possible(_prune_empty_structures(new_node) or new_node)


      class LeveledGSS(GSS[T, Acc], Generic[T, Acc]):
          """
          A high-performance leveled GSS implementation with invariants:

          - Accumulators exist at exactly one “level” per node:
            either all immediate children have accumulators (leaf mode),
            or none do (children mode), or the parent node carries accumulators (own mode),
            but never both a parent and its children having accumulators simultaneously.

          - If all children's accumulators are equal (including multiplicity), they are sucked up
            into the parent node (replacing child accumulators with a uniform parent accumulator).

          Additional design choices:
          - This implementation maintains that every LeveledGSS instance contains stacks all of the same length,
            or the instance is empty. This is natural for push/pop/isolate semantics that act on the top value.
            from_stacks will validate this condition. If you need to merge states, merge() enforces equal lengths
            across inputs and combines identical stacks using the provided merge function.

          - Multiplicity is preserved: if multiple identical stacks exist, their accumulators are kept in a tuple
            (MultiAcc). Operations like apply/prune operate element-wise on these.
          """

          __slots__ = ("_depth", "_root", "_empties")

          def __init__(self, depth: int, root: Optional[_Node[T, Acc]], empties: Optional[Tuple[Acc, ...]]):
              self._depth = depth  # All stacks have this length (unless the instance is empty)
              self._root = root
              self._empties = empties  # Only meaningful when depth == 0. May contain duplicates.

          @classmethod
          def from_stacks(cls: Type["LeveledGSS[T, Acc]"], stacks: List[Tuple[List[T], Acc]]) -> "LeveledGSS[T, Acc]":
              if not stacks:
                  # Represent truly empty state: no stacks at all.
                  return cls(depth=0, root=None, empties=None)

              lengths = {len(vals) for vals, _ in stacks}
              if len(lengths) != 1:
                  raise ValueError(
                      "LeveledGSS requires all stacks in an instance to have the same length. "
                      f"Found lengths: {sorted(lengths)}"
                  )

              L = next(iter(lengths))
              if L == 0:
                  empties = tuple(acc for _, acc in stacks)
                  return cls(depth=0, root=None, empties=empties)
              root = _build_node_from_stacks(stacks, L)
              # If build yields None, it means no stacks (shouldn't happen because stacks was non-empty and L > 0).
              return cls(depth=L, root=root, empties=None)

          def push(self, value: T) -> "LeveledGSS[T, Acc]":
              # Pushing onto all active stacks.
              if self._root is None and not self._empties:
                  # No active stacks; remains empty
                  return LeveledGSS(depth=self._depth, root=None, empties=None)

              if self._depth == 0:
                  # We have only empty stacks; they become stacks of length 1 with top 'value'
                  if not self._empties:
                      return LeveledGSS(depth=0, root=None, empties=None)
                  root = _Node(leaf_accs={value: self._empties})
                  root = _suck_up_if_possible(_prune_empty_structures(root) or root)
                  return LeveledGSS(depth=1, root=root, empties=None)

              # General case: depth > 0
              new_root = _push_node(self._root, value)
              return LeveledGSS(depth=self._depth + 1, root=new_root, empties=None)

          def pop(self) -> "LeveledGSS[T, Acc]":
              # Pop one element from every non-empty stack; empty stacks are dropped.
              if self._root is None:
                  # If depth == 0 and we had empties, they are dropped by pop() semantics
                  # (pop removes the top from non-empty stacks only; empties are ignored).
                  # Reference drops empty stacks by not including them in the pop result.
                  return LeveledGSS(depth=0, root=None, empties=None)

              if self._depth == 1:
                  # After popping, stacks become empty. Gather all leaf_accs at root level into empties.
                  la = _collect_pop_leaf_map(self._root)
                  empties = _flatten_accs(la)
                  if not empties:
                      return LeveledGSS(depth=0, root=None, empties=None)
                  return LeveledGSS(depth=0, root=None, empties=empties)

              # depth > 1
              new_root = _pop_node(self._root)
              return LeveledGSS(depth=self._depth - 1, root=new_root, empties=None)

          def popn(self, n: int) -> "LeveledGSS[T, Acc]":
              gss: LeveledGSS[T, Acc] = self
              for _ in range(n):
                  gss = gss.pop()
              return gss

          def is_empty(self) -> bool:
              # Exactly one active stack which is empty: depth=0 and exactly one empty accumulator.
              if self._depth != 0:
                  return False
              return self._empties is not None and len(self._empties) == 1

          def isolate(self, value: Optional[T]) -> "LeveledGSS[T, Acc]":
              if value is None:
                  # Keep only empty stacks.
                  if self._depth == 0 and self._empties:
                      return LeveledGSS(depth=0, root=None, empties=self._empties)
                  return LeveledGSS(depth=0, root=None, empties=None)
              # value is not None: keep only stacks with this top symbol.
              if self._depth == 0:
                  return LeveledGSS(depth=0, root=None, empties=None)
              new_root = _isolate_node(self._root, value)
              return LeveledGSS(depth=self._depth, root=new_root, empties=None)

          def apply(self, func: Callable[[Acc], Acc]) -> "LeveledGSS[T, Acc]":
              if self._depth == 0:
                  if not self._empties:
                      return LeveledGSS(depth=0, root=None, empties=None)
                  return LeveledGSS(depth=0, root=None, empties=tuple(func(a) for a in self._empties))
              new_root = _apply_node(self._root, func)
              return LeveledGSS(depth=self._depth, root=new_root, empties=None)

          def prune(self, predicate: Callable[[Acc], bool]) -> "LeveledGSS[T, Acc]":
              if self._depth == 0:
                  if not self._empties:
                      return LeveledGSS(depth=0, root=None, empties=None)
                  kept = tuple(a for a in self._empties if predicate(a))
                  if not kept:
                      return LeveledGSS(depth=0, root=None, empties=None)
                  return LeveledGSS(depth=0, root=None, empties=kept)
              new_root = _prune_node(self._root, predicate)
              return LeveledGSS(depth=self._depth, root=new_root, empties=None)

          def peek(self) -> Set[T]:
              if self._depth == 0:
                  return set()
              return _peek_node(self._root)

          def reduce_acc(self, merge_func: Callable[[Acc, Acc], Acc]) -> Optional[Acc]:
              # Merge all accumulators across all active stacks into one.
              # Returns None if there are no active stacks.
              # Note: result depends only on the multiset of accs; order is unspecified.
              accs: List[Acc] = []
              if self._depth == 0:
                  if not self._empties:
                      return None
                  accs.extend(self._empties)
              else:
                  pairs: List[Tuple[List[T], Acc]] = []
                  _enumerate_pairs(self._root, [], pairs)
                  accs.extend(a for _, a in pairs)
              if not accs:
                  return None
              it = iter(accs)
              res = next(it)
              for a in it:
                  res = merge_func(res, a)
              return res

          @staticmethod
          def merge(
              gss_list: Iterable["LeveledGSS[T, Acc]"],
              merge_func: Callable[[Acc, Acc], Acc],
          ) -> "LeveledGSS[T, Acc]":
              # Merge multiple leveled GSS instances that all have the same stack length,
              # combining accumulators for identical stacks using merge_func (including duplicates within each input).
              lst = list(gss_list)
              if not lst:
                  return LeveledGSS(depth=0, root=None, empties=None)

              depths = {g._depth for g in lst}
              if len(depths) != 1:
                  raise ValueError(f"Cannot merge LeveledGSS with different depths: {sorted(depths)}")
              depth = next(iter(depths))

              # Flatten all stacks from all inputs into path -> list-of-accs per GSS.
              # Then reduce per path with merge_func to a single acc.
              accum: Dict[Tuple[T, ...], List[Acc]] = {}

              for g in lst:
                  if depth == 0:
                      if g._empties:
                          key = tuple()
                          accum.setdefault(key, []).extend(g._empties)
                  else:
                      pairs: List[Tuple[List[T], Acc]] = []
                      _enumerate_pairs(g._root, [], pairs)
                      for vals, acc in pairs:
                          key = tuple(vals)
                          accum.setdefault(key, []).append(acc)

              # Reduce per key
              reduced_items: List[Tuple[List[T], Acc]] = []
              for k, accs in accum.items():
                  if not accs:
                      continue
                  it = iter(accs)
                  res = next(it)
                  for a in it:
                      res = merge_func(res, a)
                  reduced_items.append((list(k), res))

              # Build a new LeveledGSS from reduced items
              if not reduced_items:
                  return LeveledGSS(depth=0, root=None, empties=None)

              if depth == 0:
                  # All stacks must be empty
                  empties = tuple(acc for _, acc in reduced_items)
                  return LeveledGSS(depth=0, root=None, empties=empties)
              root = _build_node_from_stacks(reduced_items, depth)
              return LeveledGSS(depth=depth, root=root, empties=None)

          def to_json_serializable(self) -> Any:
              # Canonical: a list of [values, acc] pairs (duplicates preserved) sorted stably
              items: List[Tuple[List[T], Acc]] = []
              if self._depth == 0:
                  if self._empties:
                      for a in self._empties:
                          items.append(([], a))
              else:
                  _enumerate_pairs(self._root, [], items)

              def _encode_for_sort(obj: Any) -> str:
                  try:
                      return json.dumps(obj, sort_keys=True, default=repr, separators=(",", ":"))
                  except Exception:
                      return repr(obj)

              items.sort(key=lambda pair: (_encode_for_sort(pair[0]), _encode_for_sort(pair[1])))
              return [[vals, acc] for vals, acc in items]

          def __str__(self) -> str:
              try:
                  data = self.to_json_serializable()
                  return json.dumps(data, indent=2, sort_keys=True)
              except Exception:
                  return super().__str__()

          def __eq__(self, other: object) -> bool:
              if not isinstance(other, GSS):
                  return NotImplemented
              return self.to_json_serializable() == other.to_json_serializable()

          def __hash__(self):
              try:
                  canonical = self.to_json_serializable()
                  s = json.dumps(canonical, sort_keys=True, default=repr, separators=(",", ":"))
                  return hash(s)
              except Exception:
                  try:
                      # Fallback: hash flattened pairs
                      items: List[Tuple[Tuple[T, ...], Acc]] = []
                      if self._depth == 0:
                          if self._empties:
                              items.extend((tuple(), a) for a in self._empties)
                      else:
                          pairs: List[Tuple[List[T], Acc]] = []
                          _enumerate_pairs(self._root, [], pairs)
                          items.extend((tuple(vals), acc) for vals, acc in pairs)
                      return hash(tuple(items))
                  except Exception:
                      return object.__hash__(self)
