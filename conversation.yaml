      fn create_expression_parser() -> GLRParser {
          // S -> E $
          // E -> E + T
          // These chains can increase the number of states in the parse table and add parsing steps
          // that don't consume input. Eliminating them is an optimization.
          //
          // This test uses a standard expression grammar with the chain E -> T -> F. It verifies
          // that the optimized parser (with unit production elimination now being the default)
          // still correctly accepts and rejects inputs.
          let productions = vec![
              prod("S", vec![nt("E"), t("$")]), // Start rule
              prod("E", vec![nt("E"), t("+"), nt("T")]),
              prod("E", vec![nt("T")]),
              prod("T", vec![nt("T"), t("*"), nt("F")]),
              prod("T", vec![nt("F")]),
              prod("F", vec![t("("), nt("E"), t(")")]),
              prod("F", vec![t("i")]),
          ];
          generate_glr_parser(&productions, None)
      }

      fn tokenize(parser: &GLRParser, input: &str) -> Vec<TerminalID> {
          input
              .chars()
              .filter_map(|c| {
                  parser.terminal_map.get_by_left(&regex_name(&c.to_string()))
                      .copied()
              })
              .collect()
      }

