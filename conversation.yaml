      +    for var in variations:
      +        try:
      +            res = run_eval_for_variation(var)
      +            results["variations"].append(res)
      +        except Exception as e:
      +            print(f"[Coordinator] Variation '{var.name}' failed with error: {e}")
      +            results["variations"].append({
      +                "name": var.name,
      +                "error": str(e),
      +            })
