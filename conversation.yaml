              let mut empty_set_cleared = HybridBitset::from_iter(vec![5]);
              empty_set_cleared.clear();
              assert_eq!(
                  empty_set_cleared.iter_bits().collect::<Vec<bool>>(),
                  Vec::<bool>::new()
              );
              assert_eq!(empty_set_cleared.iter_bits().len(), 0);
