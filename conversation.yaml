              for symbol in &self.rhs {
                  match symbol {
                      Symbol::Terminal(terminal) => write!(f, " {}", terminal)?,
                      Symbol::NonTerminal(non_terminal) => write!(f, " {}", non_terminal.0)?,
                  }
              }
              Ok(())
          }
