                                  })?;
                              Ok(Stage7ShiftsAndReducesLookaheadValue::Split { shift, reduces })
                          }
                          _ => Err(format!(
                              "Unknown variant {} for Stage7ShiftsAndReducesLookaheadValue",
                              variant
                          )),
                      }
                  }
                  _ => Err(
                      "Expected JSONNode::Object for Stage7ShiftsAndReducesLookaheadValue".to_string(),
