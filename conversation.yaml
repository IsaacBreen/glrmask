      filename: src/constraint_extra.rs
  - user: |-
      I want to remap LLM tokens so that they're in lexiographical order.
      But we need the interface of `constraint.rs` to be the same. i.e we should be able to pass our unsorted LLM tokens in, and get out LLM tokens that are consistent with those, e.g. from `get_mask`. Public functions should take and return (if applicable) in the original LLM token space, not the sorted space.
      Internally, functions should map the LLM tokens to the sorted space before running, and map them back before returning.

      (The reason we're doing this is that the hybrid bitset uses `range-set-blaze` internally, which works much more efficiently for contiguous runs of integers, in contrast to sparse or 'holey' sets of integers.)
