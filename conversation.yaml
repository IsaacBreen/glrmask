              BTreeMap::new();

          for (pred_arc, edge_val) in incoming {
              grouped
                  .entry((edge_val.clone(), pred_arc.dest_key()))
                  .or_default()
                  .push(pred_arc.clone());
          }

          let mut result: NodeMap = BTreeMap::new();
          for ((edge_val, dest_key), pred_arcs) in grouped {
