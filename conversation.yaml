      Immediately **after** the `parse` method you just edited (and before `fn parse_grammar_expression`), **insert** a new method:

      ```rust
          fn parse_ignore_directive(
              &mut self,
              ignore_symbol_name: &mut Option<String>,
          ) -> Result<(), ParseError> {
              let directive_start_span = self.tokens.peek().unwrap().span;
              self.consume_grammar_op("#")?;

              // Supported forms:
              //   #![ignore(symbol)]
              //   #[ignore(symbol)]
              //   #ignore symbol
              //   #ignore(symbol)
              let symbol_name;
              if self.peek_grammar_op("!") {
                  // #![ignore(symbol)]
                  self.consume_grammar_op("!")?;
                  self.expect_grammar_op("[")?;
                  let (directive_name, directive_span) = self.expect_ident()?;
                  if directive_name != "ignore" {
                      return Err(ParseError::new(
                          self.source,
                          directive_span,
                          format!("Unknown directive: {}", directive_name),
                      ));
                  }
                  self.expect_grammar_op("(")?;
                  let (name, _) = self.expect_ident()?;
                  self.expect_grammar_op(")")?;
                  self.expect_grammar_op("]")?;
                  symbol_name = name;
              } else if self.peek_grammar_op("[") {
                  // #[ignore(symbol)] (no '!')
                  self.consume_grammar_op("[")?;
                  let (directive_name, directive_span) = self.expect_ident()?;
                  if directive_name != "ignore" {
                      return Err(ParseError::new(
                          self.source,
                          directive_span,
                          format!("Unknown directive: {}", directive_name),
                      ));
                  }
                  self.expect_grammar_op("(")?;
                  let (name, _) = self.expect_ident()?;
                  self.expect_grammar_op(")")?;
                  self.expect_grammar_op("]")?;
                  symbol_name = name;
              } else {
                  // Legacy: #ignore symbol or #ignore(symbol)
                  let (directive_name, directive_span) = self.expect_ident()?;
                  if directive_name != "ignore" {
                      return Err(ParseError::new(
                          self.source,
                          directive_span,
                          format!("Unknown directive: {}", directive_name),
                      ));
                  }
                  if self.peek_grammar_op("(") {
                      self.consume_grammar_op("(")?;
                      let (name, _) = self.expect_ident()?;
                      self.expect_grammar_op(")")?;
                      symbol_name = name;
                  } else {
                      let (name, _) = self.expect_ident()?;
                      symbol_name = name;
                  }
              }

              if ignore_symbol_name.is_some() {
                  return Err(ParseError::new(
                      self.source,
                      directive_start_span,
                      "Duplicate ignore directive found",
                  ));
              }

              // Allow an optional trailing semicolon for directives so that both
              // `#![ignore(ws)]` and `#ignore ws;` parse correctly.
              if self.peek_grammar_op(";") {
                  self.consume_grammar_op(";")?;
              }

              *ignore_symbol_name = Some(symbol_name);
              Ok(())
          }
      ```

      **Behavioral summary of this helper:**

      - Consumes the leading `#` token.
      - If the next token is:
        - `!` and then `[`: treats it as `#![ignore(symbol)]` (existing syntax).
        - `[` directly: treats it as `#[ignore(symbol)]`.
        - Otherwise: expects `ignore` as an identifier, then either:
          - a bare identifier (`#ignore ws`) or
          - an identifier wrapped in parentheses (`#ignore(ws)`).
      - Throws an error if:
        - The directive name is not `ignore`.
        - An `ignore` directive is seen more than once.
      - Accepts an **optional trailing `;`** after any of these directive forms.

      This is what bridges the incompatibility with a generator that emits `#ignore WS` or `#ignore WS;` instead of `#![ignore(WS)]`.

