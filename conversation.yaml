          pub fn to_graph_string_with_memo(&self, memo: &mut HashSet<usize>, upper_only: bool) -> String
          where
              T: std::fmt::Debug,
              A: std::fmt::Debug,
          {
              let mut output_lines = Vec::new();
              let root = &self.inner;
              let root_id = Arc::as_ptr(root) as usize;

              if memo.contains(&root_id) {
