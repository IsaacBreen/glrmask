          pub fn map<F, U>(&self, f: F) -> GSSNode<U, A>
          where
              F: Copy + Fn(&T, &A) -> U, // Closure gets Value and Accumulator
              U: Ord + Hash, A: PathAccumulator, // For GSSNode<U, A> value
              T: Hash,
