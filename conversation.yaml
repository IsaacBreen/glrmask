                          continue
                      gss_node, llm_mask = item
                      if self.debug_logging:
                          print(f"  - PROCESS: node_ptr={node_idx}, gss_ptr={gss_node.ptr()}, mask={llm_mask.to_ranges()}")

                      # Process
                      if self.is_end(node_idx):
                          if self.debug_logging:
                              print(f"    - END NODE found. Updating final_mask.")
