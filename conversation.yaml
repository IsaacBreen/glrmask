              `GSSNode::get_canonical_with_acc_seed(value: T, predecessors: BTreeSet<Arc<Self>>, seed_acc: A, cache: &mut NodeCache<T, A>) -> Arc<Self>`
              If new node created: its `acc` is `seed_acc` unioned with `acc`s from `predecessors`.
              If existing node found: its `acc` is updated by unioning with `seed_acc` and `acc`s from `predecessors`. (Requires `make_mut`).

              This is getting very complex. A simpler model: `simplify_gss_forest` creates a new graph.
              `simplify_node_recursive` returns `Arc<GSSNode<T,A>>`.
              The `acc` of this returned node is `original_node_arc.acc` unioned with `acc`s from its *newly simplified* predecessors.
              No, `acc` should be purely structural from its canonical predecessors *within the canonical graph*.
              The `original_node_arc.acc` is the source of truth for *that specific node*.
              When calling `GSSNode::get_canonical(original_node_arc.value.clone(), canonical_predecessor_arcs, cache)`, the resulting canonical node `C` will have `C.acc` determined by `canonical_predecessor_arcs`.
