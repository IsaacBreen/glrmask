              import heapq
              heap: List[Tuple[int, int]] = []
              in_queue: set[int] = set()

              # Seed: map tokenizer state -> trie root by merging cloned GSS nodes
              for sid, gss in state_to_gss.items():
                  root_idx = self.roots_map.get(int(sid))
                  if root_idx is None:
                      continue
                  r = int(root_idx)
                  gss_clone = gss.clone_node()
                  if r in values:
