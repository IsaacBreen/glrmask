      | Sum             | $O(\|T_1\| + \|T_2\|)$                               | +         |
      | Product         | $O(\|T_1\| + \|T_2\| + \|F_1\|\|I_2\|)$               | +         |
      | Closure         | $O(\|T\|)$                                           | +         |
      | Reversal        | $O(\|T\|)$                                           | -         |
      | Inversion       | $O(\|T\|)$                                           | +         |
      | Projection      | $O(\|T\|)$                                           | +         |
      | Composition     | $O(\|T_1\|\|T_2\|)$                                   | +         |
