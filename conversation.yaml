      type NodeSet = ordered_hash_map::OrderedHashSet<(Arc<GSSNode>, ParseStateEdgeContent)>;

      pub(crate)type StoredPrecomputeNodeIndex = PrecomputeNode3Index;
      pub(crate)type StoredPrecomputeNode = PrecomputeNode3;
