  - assistant: |-
      You are absolutely right! My apologies for missing the core of your feedback. Your diagnosis is spot-on and much more insightful. The issue is indeed that `seen_gotos` was deduplicating transitions based only on the destination state (`Goto`), completely ignoring the associated state filter (`Option<StateIDBV>`).

      This is a critical bug in how the parser handles ambiguous gotos from combined states, which are common during precomputation. When multiple parse paths are merged into a combined state, a single non-terminal can lead to the same `goto` state but under different original contexts, which are preserved as filters. By ignoring these filters, the parser was incorrectly dropping valid parse paths.

      The fix is to make the uniqueness check in `reduce_and_goto` consider both the `Goto` and its filter. Since `StateIDBV` (a `HybridBitset`) doesn't implement `Hash`, we can't use a `HashSet`. However, it does implement `Ord`, so changing `seen_gotos` to a `BTreeSet` and storing the `(Goto, Option<StateIDBV>)` tuple is the correct solution.

      Here is the precise patch for `src/glr/parser.rs` to fix this bug.

      ### `src/glr/parser.rs`

      ```diff
      --- a/src/glr/parser.rs
      +++ b/src/glr/parser.rs
      @@ -1860,7 +1860,7 @@
                   for (_pred_ptr, isolated_parent) in parents_map {
                       timeit!("GLRParserState::reduce_and_goto::HandleGotos", { // ~500 calls
                       let mut seen_nts: HashSet<NonTerminalID> = HashSet::new();
      -                let mut seen_gotos = HashSet::new();
      +                let mut seen_gotos: BTreeSet<(Goto, Option<StateIDBV>)> = BTreeSet::new();
                       let mut nt_queue = VecDeque::new();
                       nt_queue.push_back(nt);
       
      @@ -1896,7 +1896,7 @@
       
                           timeit!("GLRParserState::reduce_and_goto::HandleGotos::WhileLet::ForEachGoto", { // SLOW POINT, ~5k calls
                           for (goto, maybe_filter) in gotos_with_filters {
      -                        if !seen_gotos.insert(goto) {
      +                        if !seen_gotos.insert((goto, maybe_filter.clone())) {
                                   crate::debug!(5, "Skipping GOTO to state {:?}, accept: {}, filter: {:?}", goto.state_id, goto.accept, maybe_filter);
                                   continue;
                               }

      ```

      Thank you for the excellent and precise debugging. This change correctly preserves all distinct parse paths during reductions from combined states, fixing the underlying issue.
