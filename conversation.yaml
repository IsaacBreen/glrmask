                  delta:
              """
              if delta is None:
                  delta = KDELTA

              config = ctypes.pointer(ctypes.c_void_p())
              ret_code = lib.fst_determinize_config_new(
                  ctypes.c_float(delta),
                  ctypes.c_size_t(det_type.value),
