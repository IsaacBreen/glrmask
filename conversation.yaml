         - This will compress final-only edges like 17 -> end-node into direct edges from the parents to the end-node with tokens intersected, removing the unnecessary intermediate node step.

      What the added block does
      - Iterates until no changes:
        - For each non-root node b, splits its outgoing edges into pop=0 and non-pop=0.
        - For each pop=0 edge b -> c with tokens Tb and SIDs Sbc, and for each parent a -> b with tokens Ta and SIDs Sab, it adds edge a -> c with tokens (Ta ∩ Tb) and SIDs (Sab ∩ Sbc), and keeps b’s non-pop=0 children.
