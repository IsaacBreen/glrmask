      I want to basically compute the values in `below_bottom_cache` once over all possible (nonterminal, terminal) pairs, and then resuse them...
      To reuse them, we'll need to deep copy the whole thing *into* the cache at the beginning of the step. (For greater efficiency, we could copy just the subtrees needed, but we can worry about that later.) The precomputed values will need to be stored in another field.
      So there'll be two caches: a 'stored' cache and a 'local' cache.
      The stored cache won't even be the same type as the local one.
      The stored cache will have type `HashMap<(NonTerminalID, TerminalID), (PrecomputeNode3Index, Arc<GSSNode>)>`. The precompute node index is the index of the root for this (nonterminal, terminal) combination.

      Now, how do we compute the stored cache?
      We compute the things right after the parser is constructed.
      Basically, we'll create a trie3 root for each (nonterminal, terminal) combination. We'll loop through them all and initalize a state with `init_parser_state_combined_with_acc`, ensuring the trie3 root is in the stored nodes in the acc.
      Create a trie god and add it to `GLRParserState`.

      BUT we can't just run `process_token_advanced` yet. We need to trigger the reduction.
      Create a bunch of new states - one for every nonterminal. Keep track of which nonterminal each belongs to.
      Start from the current max state ID out of those in `self.table` and `combined_rows`, plus one.
      The states will be stored in `GLRParser` as a map state ID -> terminal ID -> `Stage7ShiftsAndReducesLookaheadValue::Reduce`.
      Each reduce will be the nonterminal for that state ID (remember, one state here per nonterminal). The production IDs can be empty. The length should be 2.
      Just to be clear, these states should not be added to the existing table, nor to `combined_rows`, but to a new field on `GLRParser`.
      Make sure the action selector identifies the state as one of these and gets the right action.

      Now, let's go back. We're looping through each (nonterminal, terminal) combination. We've initialized the state with `init_parser_state_combined_with_acc`. Add the god to it. We're not done. Push to the stack a state corresponding to the nonterminal we're processing. This primes the parser to reduce immediately with that nonterminal.
      NOW we can run the parser with `process_token_advanced`.

      Once it's done, we have a GSS stack in the parse state.
      We take the root trie3 node index we created here, and the final parse stack, and store the stack in the stored cache map under (NonTerminalID, TerminalID).


      Now, how do we *use* the stored cache.
      Well, when we find there isn't an entry in the local cache, we look in the stored one. We transfer the entry from the stored cache to the local one, and importantly, add the GSS node as a final 'shifted' state. Then we treat the precompute3 node index, now in the local cache, just like we'd treat a hit on the local cache, creating an edge etc.
      When we transfer the precompute3 node index, however, we must deep copy it.
      To deep copy a subtree, you can use this method (already defined in trie.rs:)
      ```rust
