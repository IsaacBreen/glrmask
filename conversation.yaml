                                      # inclusive range
                                      for sid in range(a, b + 1):
                                          yield (int(pop), int(sid), int(dest.dest))

          def commit(self, token_id: int):
              self.constraint_state.commit(token_id)

          def get_mask(self) -> RangeSet:
