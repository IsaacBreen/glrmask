          /// Unsafe, pointer-based DFS to propagate token IDs upward to all ancestors in a single pass.
          /// Safety rationale:
          /// - We never mutate the shape of BTreeMap (no insert/remove), so raw pointers to children remain valid.
          /// - We only mutate disjoint nodes' reachable_token_ids via raw pointers to avoid borrow checker overhead.
          /// - We collect child pointers first (ending the temporary &mut borrow) before recursing.
          unsafe fn propagate_reachable_ids_dfs(
              node_ptr: *mut VocabPrefixTreeNode,
              ancestors: &mut Vec<*mut VocabPrefixTreeNode>,
          ) {
              // Insert this node's token into itself.
              (*node_ptr).reachable_token_ids.insert((*node_ptr).token_id);

              // Insert this node's token into all ancestors.
              let token_id = (*node_ptr).token_id;
              for &ancestor_ptr in ancestors.iter() {
                  (*ancestor_ptr).reachable_token_ids.insert(token_id);
              }

              // Collect child raw pointers first so the &mut borrow does not live across recursion.
              let mut child_ptrs: Vec<*mut VocabPrefixTreeNode> = Vec::new();
              {
                  let current: &mut VocabPrefixTreeNode = &mut *node_ptr;
                  for child in current.children.values_mut() {
                      child_ptrs.push(child as *mut VocabPrefixTreeNode);
                  }
              }

              // Recurse into children, with this node on the ancestor stack.
              ancestors.push(node_ptr);
              for child_ptr in child_ptrs {
                  Self::propagate_reachable_ids_dfs(child_ptr, ancestors);
              }
              ancestors.pop();
          }

          /// Clears reachable_token_ids for the entire subtree rooted at `node`.
          fn clear_reachable_ids_recursive(node: &mut VocabPrefixTreeNode) {
              node.reachable_token_ids = RangeSetBlaze::new();
              for child in node.children.values_mut() {
                  Self::clear_reachable_ids_recursive(child);
              }
          }

          /// Collects (token_id, full_prefix) pairs for all nodes in the subtree.
          /// If `include_this` is false, the current node is skipped (used to exclude root
          /// when no empty string token was provided).
          #[allow(dead_code)]
          fn collect_tokens_recursive(
              node: &VocabPrefixTreeNode,
              out: &mut Vec<(usize, Vec<u8>)>,
              include_this: bool,
          ) {
              if include_this {
                  out.push((node.token_id, node.prefix.to_vec()));
              }
              for child in node.children.values() {
                  // Children are always included
                  Self::collect_tokens_recursive(child, out, true);
              }
          }

           /// Finds the token ID corresponding to the exact byte sequence.
           /// Returns `None` if the sequence does not correspond to a token in the tree.
           /// Specifically, searching for the empty string `b""` only succeeds if an
           /// empty string token was explicitly added during the build process.
          pub fn find_token(&self, bytes: &[u8]) -> Option<usize> {
              if bytes.is_empty() {
                  // Only return the root's ID if it represents an actual empty string token.
                  if self.has_empty_string_token {
                      return Some(self.root.token_id);
                  } else {
                      // The root ID (likely 0) is just a convention, not a real token here.
                      return None;
                  }
              }

              let mut current_node = &self.root;
              let mut remaining_bytes = bytes;

              loop {
                  let mut found_match = false;
                  // Narrow candidate children by first byte using BTreeMap::range.
                  let first = remaining_bytes[0];
                  let lower_key = vec![first];
                  for (edge_label, child_node) in current_node.children.range(lower_key..) {
                      // Stop once keys no longer start with the same first byte.
                      if edge_label.first().copied() != Some(first) {
                          break;
                      }
                      if remaining_bytes.starts_with(edge_label) {
                          // Found the only possible matching edge from this node.
                          remaining_bytes = &remaining_bytes[edge_label.len()..];
                          current_node = child_node;
                          found_match = true;
                          break;
                      }
                  }

                  if !found_match {
                      // No child edge matches the start of the remaining bytes.
                      // The full sequence is not present in the tree.
                      return None;
                  }

                  if remaining_bytes.is_empty() {
                      // We have consumed all bytes and landed exactly on `current_node`.
                      // Return its token_id. Every node has one.
                      return Some(current_node.token_id);
                  }
                  // If remaining_bytes is not empty, continue the loop from the new current_node.
              }
          }

          /// Finds the longest token in the tree that is a prefix of the given `bytes`.
          ///
          /// Returns `Some((token_id, matched_prefix_bytes))` if a match is found.
          /// The `matched_prefix_bytes` is a slice of the token's full byte sequence stored in the tree.
          ///
          /// If the input `bytes` is empty:
          ///  - If the empty string `""` is a token in the tree, it returns `Some((empty_token_id, &[]))`.
          ///  - Otherwise, it returns `None`.
          ///
          /// If the input `bytes` is not empty:
          ///  - It searches for the longest token that is a prefix of `bytes`.
          ///  - If the empty string `""` is a token and no non-empty token prefix is found,
          ///    it will return `Some((empty_token_id, &[]))`.
          ///  - If no token (including potentially the empty string) is a prefix, it returns `None`.
          pub fn find_longest_prefix_token<'s>(&'s self, bytes: &[u8]) -> Option<(usize, &'s [u8])> {
              let mut longest_match_info: Option<(usize, &'s [u8])> = None;
              let mut current_node: &'s VocabPrefixTreeNode = &self.root;

              // Handle empty string token possibility upfront.
              // If it exists, it's a candidate for the longest prefix.
              if self.has_empty_string_token {
                  longest_match_info = Some((self.root.token_id(), self.root.prefix())); // prefix is &[]
              }

              // If the input `bytes` itself is empty, the only possible match is the empty string token (if it exists).
              if bytes.is_empty() {
                  return longest_match_info;
              }

              let mut remaining_bytes = bytes;

              // Traverse the tree along the path defined by the input `bytes`.
              // Every node landed on is a token, and thus a candidate for the longest prefix match.
              loop {
                  let mut found_match_in_children = false;
                  let first = remaining_bytes[0];
                  let lower_key = vec![first];
                  // Only iterate children whose first byte matches `first`.
                  for (edge_label, child_node) in current_node.children.range(lower_key..) {
                      if edge_label.first().copied() != Some(first) {
                          break;
                      }
                      if remaining_bytes.starts_with(edge_label) {
                          // Descend to the child node.
                          current_node = child_node;
                          remaining_bytes = &remaining_bytes[edge_label.len()..];

                          // This child_node represents a token. Its full prefix is `current_node.prefix()`.
                          longest_match_info = Some((current_node.token_id(), current_node.prefix()));

                          found_match_in_children = true;
                          break; // Continue traversal from the new current_node.
                      }
                  }

                  if !found_match_in_children {
                      // No child edge matches the start of the remaining_bytes.
                      // Cannot extend the prefix further. The current longest_match_info is the result.
                      break;
                  }

                  if remaining_bytes.is_empty() {
                      // All input bytes have been consumed along tree edges.
                      // The token corresponding to the current_node is the longest possible match.
                      // (This was already updated when we landed on current_node).
                      break;
                  }
              }
              longest_match_info
          }

          /// Returns `true` if the empty string `""` was provided as a token
          /// during the build process, `false` otherwise.
          pub fn has_empty_string_token(&self) -> bool {
              self.has_empty_string_token
          }

          /// Returns an iterator over the direct children of the root node.
          /// The iterator yields pairs of `(&Vec<u8>, &VocabPrefixTreeNode)`, representing the edge label and the child node.
          pub fn root_children(&self) -> std::collections::btree_map::Iter<'_, Vec<u8>, VocabPrefixTreeNode> {
              self.root.iter_children()
          }

          /// Returns the maximum token ID used to build this tree.
          pub fn max_token_id(&self) -> usize {
              self.max_token_id
          }

          // ----------------------- Legacy (unused) -----------------------
          // Keeping this here for reference; it's no longer used in build().
          // It was replaced by the much faster path-based propagation above.
          #[allow(dead_code)]
          fn compute_reachable_ids_recursive(node: &mut VocabPrefixTreeNode, _max_token_id: usize) -> HashSet<usize> { // max_token_id not used
              let mut current_node_ids_set = HashSet::new();
              current_node_ids_set.insert(node.token_id);
              for child_node in node.children.values_mut() {
                  let child_ids_set = Self::compute_reachable_ids_recursive(child_node, _max_token_id);
                  current_node_ids_set.extend(child_ids_set);
              }
              let mut final_bitvec = RangeSetBlaze::new();
              for token_id_val in &current_node_ids_set {
                  final_bitvec.insert(*token_id_val);
              }
              node.reachable_token_ids = final_bitvec;
              current_node_ids_set
          }
      }

      impl Default for VocabPrefixTree {
          fn default() -> Self {
              Self::new()
          }
      }

      // Need Eq to implement Ord
      impl Eq for VocabPrefixTreeNode {}

      impl PartialOrd for VocabPrefixTreeNode {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              Some(self.cmp(other))
          }
      }

      impl Ord for VocabPrefixTreeNode {
          /// Compares nodes primarily based on `prefix_length` and secondarily on `token_id`.
          /// Note: This ordering ignores the `children` field and is therefore NOT necessarily
          /// consistent with the derived `PartialEq` implementation which compares all fields.
          fn cmp(&self, other: &Self) -> Ordering {
              self.prefix_length.cmp(&other.prefix_length)
                  .then_with(|| self.token_id.cmp(&other.token_id))
          }
      }

      #[cfg(test)]
      #[path = "vocab_prefix_tree_tests.rs"]
      mod tests;
    src/equivalence_analysis_finite_automata.rs: |
      use crate::finite_automata::{ExecutionResult, GroupID, Match, Regex};
      use crate::profiler::PROGRESS_BAR_ENABLED;
      use indicatif::{ProgressBar, ProgressDrawTarget, ProgressStyle};
      use std::collections::{BTreeMap, BTreeSet};
      use hashbrown::{HashMap, HashSet};
      use smallvec::SmallVec;

      // For debugging: verify equivalence classes using a brute-force method.
      const VERIFY_EQUIVALENCE_CLASSES: bool = false;

      // A canonical representation of a signature. It can be hashed and compared.
      // It's derived from the graph of tokenization possibilities.
      // It represents the result of a single greedy tokenization step.
      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]
      struct CanonicalSignature {
          // All possible matches and the signature of their remainders (sorted and deduped).
          matches: Vec<(GroupID, usize, SignatureId)>,
          // If the string can be fully consumed without a match, the final DFA state.
          // Note: We only record final_state when there are NO matches (consistent with the intent).
          final_state: Option<usize>,
      }

      // An ID representing a unique canonical signature.
      type SignatureId = usize;

      // Manages interning of canonical signatures to unique IDs.
      struct SignatureInterner {
          signatures: Vec<CanonicalSignature>,
          buckets: HashMap<u128, Vec<SignatureId>>,
      }

      impl SignatureInterner {
          fn new() -> Self {
              SignatureInterner {
                  signatures: Vec::new(),
                  buckets: HashMap::new(),
              }
          }

          fn intern(&mut self, sig: CanonicalSignature) -> SignatureId {
              let fp = fingerprint_canonical_signature(&sig);
              if let Some(ids) = self.buckets.get_mut(&fp) {
                  for &id in ids.iter() {
                      if self.signatures[id] == sig {
                          return id;
                      }
                  }
                  let id = self.signatures.len();
                  self.signatures.push(sig);
                  ids.push(id);
                  id
              } else {
                  let id = self.signatures.len();
                  self.signatures.push(sig);
                  self.buckets.insert(fp, vec![id]);
                  id
              }
          }
      }

      // Canonical representation of a suffix by referencing an original string and an offset.
      #[derive(Clone, Copy)]
      struct CanonicalSuffixRep {
          str_idx: usize,
          offset: usize,
      }

      // Deduplicates suffixes across all strings by content using a lightweight 128-bit hash,
      // verifying equality by comparing the actual bytes on collisions. Also caches lookups
      // by (str_idx, offset) to avoid re-hashing within the same process.
      struct SuffixDeduper<'a> {
          strings: &'a [Vec<u8>],
          // hash -> list of node IDs (we verify equality inside bucket)
          buckets: HashMap<u128, Vec<usize>>,
          // node_id -> canonical representative
          nodes: Vec<CanonicalSuffixRep>,
          // (str_idx, offset) -> node_id
          offset_cache: HashMap<(usize, usize), usize>,
      }

      impl<'a> SuffixDeduper<'a> {
          fn new(strings: &'a [Vec<u8>]) -> Self {
              SuffixDeduper {
                  strings,
                  buckets: HashMap::new(),
                  nodes: Vec::new(),
                  offset_cache: HashMap::new(),
              }
          }

          #[inline]
          fn slice_of(&self, node_id: usize) -> &[u8] {
              let rep = self.nodes[node_id];
              &self.strings[rep.str_idx][rep.offset..]
          }

          fn get_or_intern(&mut self, str_idx: usize, offset: usize) -> usize {
              if let Some(&nid) = self.offset_cache.get(&(str_idx, offset)) {
                  return nid;
              }
              let bytes = &self.strings[str_idx][offset..];
              let h = hash128(bytes);
              if let Some(bucket) = self.buckets.get(&h) {
                  for &nid in bucket.iter() {
                      let rep = self.nodes[nid];
                      let rep_bytes = &self.strings[rep.str_idx][rep.offset..];
                      if rep_bytes == bytes {
                          self.offset_cache.insert((str_idx, offset), nid);
                          return nid;
                      }
                  }
              }
              let nid = self.nodes.len();
              self.nodes.push(CanonicalSuffixRep { str_idx, offset });
              self.buckets.entry(h).or_default().push(nid);
              self.offset_cache.insert((str_idx, offset), nid);
              nid
          }

          #[inline]
          fn remainder_of(&mut self, node_id: usize, pos: usize) -> usize {
              let rep = self.nodes[node_id];
              self.get_or_intern(rep.str_idx, rep.offset + pos)
          }
      }

      // 128-bit non-cryptographic hash for byte slices, computed in one pass.
      #[inline]
      fn hash128(bytes: &[u8]) -> u128 {
          const FNV_OFFSET_BASIS1: u64 = 1469598103934665603;
          const FNV_OFFSET_BASIS2: u64 = 1099511628211;
          const FNV_PRIME1: u64 = 1099511628211;
          const FNV_PRIME2: u64 = 14029467366897019727;

          let mut h1: u64 = FNV_OFFSET_BASIS1;
          let mut h2: u64 = FNV_OFFSET_BASIS2 ^ 0x9E3779B97F4A7C15;

          for &b in bytes {
              h1 ^= b as u64;
              h1 = h1.wrapping_mul(FNV_PRIME1);

              let rb = (b as u64).rotate_left(5);
              h2 ^= rb;
              h2 = h2.wrapping_mul(FNV_PRIME2);
          }

          ((h1 as u128) << 64) | (h2 as u128)
      }

      #[inline]
      fn mix64(mut x: u64) -> u64 {
          // SplitMix64 mix function
          x ^= x >> 30;
          x = x.wrapping_mul(0xbf58476d1ce4e5b9);
          x ^= x >> 27;
          x = x.wrapping_mul(0x94d049bb133111eb);
          x ^= x >> 31;
          x
      }

      // Computes a 128-bit fingerprint for CanonicalSignature to bucket interning candidates.
      // This avoids hashing long vectors with the default hasher on every insertion/lookup.
      #[inline]
      fn fingerprint_canonical_signature(sig: &CanonicalSignature) -> u128 {
          let mut h1: u64 = 0x9E3779B97F4A7C15;
          let mut h2: u64 = 0xD6E8FEB86659FD93;
          for &(g, p, r) in &sig.matches {
              let k1 = mix64((g as u64).wrapping_mul(0x9E3779B185EBCA87) ^ (p as u64));
              let k2 = mix64((r as u64).wrapping_mul(0x94D049BB133111EB) ^ ((p as u64) << 1));
              h1 = h1.wrapping_mul(0x9E3779B97F4A7C15).wrapping_add(k1);
              h2 = h2.wrapping_mul(0x94D049BB133111EB).wrapping_add(k2);
          }
          let fsv = sig.final_state.map(|x| x as u64).unwrap_or(0xFFFF_FFFF_FFFF_FFFF);
          h1 ^= mix64(fsv);
          h2 ^= mix64(fsv.rotate_left(17));
          ((h1 as u128) << 64) | (h2 as u128)
      }

      pub struct EquivalenceAnalyzer<'a> {
          regex: &'a Regex,
          strings: &'a [Vec<u8>],
          initial_states: &'a [usize],
      }

      impl<'a> EquivalenceAnalyzer<'a> {
          pub fn new(regex: &'a Regex, strings: &'a [Vec<u8>], initial_states: &'a [usize]) -> Self {
              EquivalenceAnalyzer {
                  regex,
                  strings,
                  initial_states,
              }
          }

          // New accelerated analysis:
          // 1) Deduplicate all suffixes by content.
          // 2) Compute canonical signatures for all unique suffixes once (from start_state) bottom-up by length.
          // 3) For each token and each initial state, run the DFA once to enumerate match positions; remainder signatures come from step 2.
          //    This removes recursive engine calls on remainders entirely.
          pub fn find_equivalence_classes(&mut self) -> BTreeMap<Vec<SignatureId>, Vec<usize>> {
              crate::debug!(
                  2,
                  "Starting accelerated LLM token equivalence analysis for {} strings...",
                  self.strings.len()
              );

              // Phase 0: Build suffix deduper over all (string, offset) pairs.
              let mut deduper = SuffixDeduper::new(self.strings);
              // Insert all suffixes (including empty) for all strings.
              let pb_build = ProgressBar::new(self.strings.len() as u64);
              pb_build.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [{elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta}) (Build Suffix Set)")
                      .expect("progress-bar"),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb_build.set_draw_target(ProgressDrawTarget::hidden());
              }
              for (i, s) in self.strings.iter().enumerate() {
                  // Insert all suffixes of s: offsets 0..=len
                  for off in 0..=s.len() {
                      let _ = deduper.get_or_intern(i, off);
                  }
                  pb_build.inc(1);
              }
              pb_build.finish();

              // Phase 1: Compute canonical signatures for all unique suffixes from start_state, bottom-up by length.
              let total_nodes = deduper.nodes.len();
              let mut node_ids: Vec<usize> = (0..total_nodes).collect();
              // Sort by suffix length increasing.
              node_ids.sort_unstable_by_key(|&nid| deduper.slice_of(nid).len());

              let mut signature_interner = SignatureInterner::new();
              let mut suffix_sig_ids: Vec<Option<SignatureId>> = vec![None; total_nodes];

              let pb_suffix = ProgressBar::new(total_nodes as u64);
              pb_suffix.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [{elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta}) (Suffix Signatures)")
                      .expect("progress-bar"),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb_suffix.set_draw_target(ProgressDrawTarget::hidden());
              }

              for &nid in &node_ids {
                  pb_suffix.inc(1);
                  let bytes = deduper.slice_of(nid);
                  let result = self.regex.execute_from_state2(bytes, self.regex.dfa.start_state);

                  // Gather matches; for each match, remainder signature must already be computed.
                  let mut matches_vec: SmallVec<[(GroupID, usize, SignatureId); 4]> = SmallVec::new();
                  for m in result.matches {
                      // Filter out zero-width tokens to avoid cycles and spurious recursion.
                      if m.position == 0 {
                          continue;
                      }
                      let remainder_node = deduper.remainder_of(nid, m.position);
                      let remainder_sig = suffix_sig_ids[remainder_node]
                          .expect("BUG: remainder signature should be available (processed earlier)");
                      matches_vec.push((m.group_id, m.position, remainder_sig));
                  }
                  matches_vec.sort_unstable();
                  matches_vec.dedup();

                  // Only record final_state if there are no matches (canonical per design intent).
                  let final_state = if matches_vec.is_empty() {
                      result.end_state
                  } else {
                      None
                  };

                  let sig = CanonicalSignature {
                      matches: matches_vec.into_vec(),
                      final_state,
                  };
                  let sid = signature_interner.intern(sig);
                  suffix_sig_ids[nid] = Some(sid);
              }
              pb_suffix.finish();

              // Phase 2: Classify original strings based on their signature vectors for the provided initial states.
              let pb_class = ProgressBar::new(self.strings.len() as u64);
              pb_class.set_style(
                  ProgressStyle::default_bar()
                      .template("{spinner:.green} [{elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta}) (Token Classification)")
                      .expect("progress-bar"),
              );
              if !PROGRESS_BAR_ENABLED {
                  pb_class.set_draw_target(ProgressDrawTarget::hidden());
              }

              let mut equivalence_classes: HashMap<Vec<SignatureId>, Vec<usize>> = HashMap::new();
              for (i, s) in self.strings.iter().enumerate() {
                  pb_class.inc(1);
                  let base_node = deduper.get_or_intern(i, 0);

                  let mut signature_vector = Vec::with_capacity(self.initial_states.len());
                  for &initial_state in self.initial_states {
                      // Execute once per (token, initial_state) to enumerate match positions,
                      // but remainder handling is fully shared via suffix_sig_ids computed from start_state.
                      let result = self.regex.execute_from_state2(s, initial_state);

                      let mut matches_vec: SmallVec<[(GroupID, usize, SignatureId); 4]> = SmallVec::new();
                      for m in result.matches {
                          if m.position == 0 {
                              continue;
                          }
                          let remainder_node = deduper.remainder_of(base_node, m.position);
                          let remainder_sig = suffix_sig_ids[remainder_node]
                              .expect("BUG: suffix signature should have been computed");
                          matches_vec.push((m.group_id, m.position, remainder_sig));
                      }
                      matches_vec.sort_unstable();
                      matches_vec.dedup();

                      let final_state = if matches_vec.is_empty() {
                          result.end_state
                      } else {
                          None
                      };

                      let sig = CanonicalSignature {
                          matches: matches_vec.into_vec(),
                          final_state,
                      };
                      let sid = signature_interner.intern(sig);
                      signature_vector.push(sid);
                  }
                  equivalence_classes.entry(signature_vector).or_default().push(i);
              }
              pb_class.finish();

              if VERIFY_EQUIVALENCE_CLASSES {
                  verify_equivalence_classes(self.regex, self.strings, self.initial_states, &equivalence_classes);
              }

              // Convert to BTreeMap to preserve determinism of output ordering.
              let mut out: BTreeMap<Vec<SignatureId>, Vec<usize>> = BTreeMap::new();
              for (k, v) in equivalence_classes {
                  out.entry(k).or_default().extend(v);
              }
              out
          }
      }

      /// Finds equivalence classes among a set of strings based on their tokenization
      /// behavior with a given Regex, starting from a set of initial DFA states.
      ///
      /// Two strings are considered equivalent if, for every initial DFA state provided,
      /// they produce the same sequence of tokens.
      pub fn find_equivalence_classes(
          regex: &Regex,
          strings: &[Vec<u8>],
          initial_states: &[usize],
      ) -> BTreeMap<Vec<SignatureId>, Vec<usize>> {
          let mut analyzer = EquivalenceAnalyzer::new(regex, strings, initial_states);
          analyzer.find_equivalence_classes()
      }

      /// Brute-force verification of equivalence classes.
      /// This is slow and should only be used for debugging.
      fn verify_equivalence_classes(
          regex: &Regex,
          strings: &[Vec<u8>],
          initial_states: &[usize],
          computed_classes: &HashMap<Vec<SignatureId>, Vec<usize>>,
      ) {
          println!("Verifying equivalence classes (this may be slow)...");
       
          // A canonical representation of the tokenization graph for verification.
          #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
          struct InternedVerificationSignature {
              matches: BTreeSet<(GroupID, usize, InternedVerificationSignatureId)>,
              final_state: Option<usize>,
          }
          type InternedVerificationSignatureId = usize;

          struct VerificationSignatureInterner {
              signatures: Vec<InternedVerificationSignature>,
              map: HashMap<InternedVerificationSignature, InternedVerificationSignatureId>,
          }

          impl VerificationSignatureInterner {
              fn new() -> Self {
                  VerificationSignatureInterner {
                      signatures: Vec::new(),
                      map: HashMap::new(),
                  }
              }

              fn intern(&mut self, sig: InternedVerificationSignature) -> InternedVerificationSignatureId {
                  if let Some(&id) = self.map.get(&sig) {
                      return id;
                  }
                  let id = self.signatures.len();
                  self.signatures.push(sig.clone());
                  self.map.insert(sig, id);
                  id
              }
          }

          // 1. Collect all unique suffixes.
          let mut suffixes = HashSet::new();
          suffixes.insert(&[] as &[u8]);
          for s in strings {
              for i in 0..=s.len() {
                  suffixes.insert(&s[i..]);
              }
          }
          let mut sorted_suffixes: Vec<&[u8]> = suffixes.into_iter().collect();
          sorted_suffixes.sort_by_key(|s| s.len());

          // 2. Identify all relevant DFA states.
          let relevant_states: BTreeSet<usize> = initial_states
              .iter()
              .cloned()
              .chain(std::iter::once(regex.dfa.start_state))
              .collect();

          // 3. Compute signatures for all suffixes, from shortest to longest.
          let mut interner = VerificationSignatureInterner::new();
          let mut memo: HashMap<&[u8], BTreeMap<usize, InternedVerificationSignatureId>> = HashMap::new();

          let pb = ProgressBar::new(sorted_suffixes.len() as u64);
          pb.set_style(
              ProgressStyle::default_bar()
                  .template("{spinner:.green} [{elapsed_precise}] [{wide_bar:.cyan/blue}] {pos}/{len} ({percent}%, {eta}) (Verification)")
                  .expect("progress-bar"),
          );
          if !PROGRESS_BAR_ENABLED {
              pb.set_draw_target(ProgressDrawTarget::hidden());
          }

          for &suffix in &sorted_suffixes {
              pb.inc(1);
              let mut state_sigs = BTreeMap::new();
              for &dfa_state in &relevant_states {
                  let result = regex.execute_from_state2(suffix, dfa_state);

                  let mut matches = BTreeSet::new();
                  for m in result.matches {
                      if m.position == 0 {
                          continue;
                      }
                      let remainder = &suffix[m.position..];
                      let remainder_sigs = memo
                          .get(remainder)
                          .expect("BUG: remainder signature should be pre-computed");
                      let remainder_sig_id = *remainder_sigs
                          .get(&regex.dfa.start_state)
                          .expect("BUG: remainder signature for start_state should exist");
                      matches.insert((m.group_id, m.position, remainder_sig_id));
                  }

                  // Only record final_state if there are no matches (align with production path).
                  let final_state = if matches.is_empty() {
                      result.end_state
                  } else {
                      None
                  };

                  let sig = InternedVerificationSignature {
                      matches,
                      final_state,
                  };
                  let sig_id = interner.intern(sig);
                  state_sigs.insert(dfa_state, sig_id);
              }
              memo.insert(suffix, state_sigs);
          }
          pb.finish();

          // 4. Classify original strings based on their signature vectors.
          let mut brute_force_classes: BTreeMap<Vec<InternedVerificationSignatureId>, Vec<usize>> = BTreeMap::new();
          for (i, s) in strings.iter().enumerate() {
              let mut signature_vector = Vec::with_capacity(initial_states.len());
              if let Some(string_sigs) = memo.get(s.as_slice()) {
                  for &initial_state in initial_states {
                      let sig_id = *string_sigs.get(&initial_state).unwrap();
                      signature_vector.push(sig_id);
                  }
              }
              brute_force_classes.entry(signature_vector).or_default().push(i);
          }

          // 5. Compare partitions.
          let computed_partitions: BTreeSet<BTreeSet<usize>> = computed_classes
              .values()
              .map(|class| class.iter().cloned().collect())
              .collect();

          let brute_force_partitions: BTreeSet<BTreeSet<usize>> = brute_force_classes
              .values()
              .map(|class| class.iter().cloned().collect())
              .collect();

          if computed_partitions == brute_force_partitions {
              println!("Equivalence class verification successful!");
          } else {
              eprintln!("Equivalence class verification FAILED!");
              eprintln!("Computed partitions ({}): {:?}", computed_partitions.len(), computed_partitions);
              eprintln!("Brute-force partitions ({}): {:?}", brute_force_partitions.len(), brute_force_partitions);
              panic!("Equivalence class verification failed.");
          }
      }
