                          eps_bundle = _ArcBundle(dests=eps_dests, masks=eps_masks)
                      else:
                          eps_bundle = _ArcBundle(dests=[], masks=[])

                      groups.append(_PopGroup(pop=int(pop_val), sid_to_arcs=sid_to_arcs, eps_arcs=eps_bundle))

