              if self.trie2_god.is_some() && other.trie2_god.is_some() {
                  assert_eq!(self.trie2_god.as_ref().unwrap(), other.trie2_god.as_ref().unwrap());
              } else if other.trie2_god.is_some() {
                  self.trie2_god = other.trie2_god;
              }
              });
