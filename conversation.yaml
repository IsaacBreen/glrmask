      Clean up the 'mini trie' structure. Make it simpler but also better.
      eg Make it kind of 'ambidexterous' wrt which direction edges go in. I mean there still must be a notion of direction. But you know. It shouldn't matter that much. An optimization pass that goes backwards should look similar to one that goes forwards in the way it's written, but should also perform similarly. i.e. it's just as efficient to get/modify incoming edges as outgoing edges.

      Having just a vector of nodes kind of makes it difficult when one is removed, for example. Like, the node continues to exist. We can't just remove it from the vector.
      We need removal to be efficient.
      Let's keep it simple and use a map from ID to node, and use unique IDs via a counter.
