              let set1 = HybridBitset::from_iter(0..SPARSE_TO_DENSE_THRESHOLD + 10);
              let set2 = HybridBitset::from_iter(5..SPARSE_TO_DENSE_THRESHOLD + 20);

              let intersection = &set1 & &set2;
              let union = &set1 | &set2;
              let difference = &set1 - &set2;
