                          # Cache matches and merged GSS per state_bv within this (node_idx, pop) processing
                          matched_cache: Dict[int, List[ffi.GSSNode]] = {}
                          merged_cache: Dict[int, ffi.GSSNode] = {}

                          # Process each edge under this pop
