                  let ev_c2 = children_map_target_key.get(&NodePtr::Strong(ArcPtrWrapper::new(child2.clone()))).expect("Child2 should be under target_key");
                  assert_eq!(*ev_c2, initial_ev_c2, "Edge value for child2 should be unchanged");

