      # --- Data Structures for the Optimized Graph ---

      class _PopGroup:
          """
          Represents all transitions from a single node for a specific pop count.
          This structure is optimized for fast lookups during get_mask.
          """
          __slots__ = ("sid_to_arcs", "eps_arcs")

          def __init__(
              self,
              sid_to_arcs: Dict[int, List[Tuple[int, Optional[ffi.Bitset]]]],
              eps_arcs: List[Tuple[int, Optional[ffi.Bitset]]],
          ):
              # Maps a tokenizer state ID (sid) to a list of possible transitions.
              # Each arc is (destination_node_index, llm_bitset_or_None).
              # None for llm_bitset means no token restriction.
              self.sid_to_arcs = sid_to_arcs

              # A list of transitions that are not dependent on the SID (epsilon transitions).
              self.eps_arcs = eps_arcs

      class _NodeData:
          """
          A preprocessed, optimized representation of a node in the trie.
          """
          __slots__ = ("is_end", "groups", "max_depth")

          def __init__(self, is_end: bool, groups: Dict[int, _PopGroup], max_depth: int):
              self.is_end = is_end  # Does this node represent an end state?
              self.groups = groups  # Maps pop_count -> _PopGroup
              self.max_depth = max_depth

      # --- The Model Implementation ---

      class Model(GraphProvider):
          """
          An ultra-optimized model (gemini-4) building on the principles of gpt-5-9.

          Key Optimizations:
          1.  **Graph Preprocessing**: The original graph is transformed into a highly
              efficient structure (`_NodeData`, `_PopGroup`). Transitions are grouped
              by pop count and then indexed by tokenizer state ID (SID). This allows
              for direct lookups, eliminating the most expensive inner loops in `get_mask`.

          2.  **Direct SID-to-Arc Mapping**: Instead of iterating through all possible
              destinations and checking if a given SID is allowed, we can directly
              query `sid_to_arcs[sid]` to get all valid transitions.

          3.  **Optimized `get_mask` Algorithm**:
              - A depth-based scheduler prioritizes nodes, improving efficiency.
              - GSS parent nodes are efficiently grouped by SID to minimize redundant lookups.
              - A robust check prevents re-processing nodes if their state (GSS parents
                and LLM mask) hasn't changed, preventing redundant work.
