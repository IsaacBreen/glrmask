                      sid_map: Dict[int, Dict[int, Optional[ffi.Bitset]]] = entry["sid_map"]
                      eps_map: Dict[int, Optional[ffi.Bitset]] = entry["eps_map"]

                      # Epsilon arcs to ArcBundle
                      if eps_map:
                          eps_dests: List[int] = []
