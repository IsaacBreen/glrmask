      ### High-level overview

      I keep the core algorithms exactly the same, and only:

      1. Factor out a small helper to recognize negative labels (`is_negative_symbol`), used consistently in all three places that dealt with negative transitions.
      2. Factor out progress-bar construction and step updates into `make_progress_bar` and `progress_step`, removing duplicated boilerplate.
      3. Introduce simple type aliases (`Code`, `QueryKey`) for clarity in `compute_cancellations`.
      4. Do minor variable renaming and formatting to make the logic easier to read without changing behavior.

      No public function signatures or semantic logic are changed. Only `src/precompute4/resolve_negatives.rs` is modified; `src/precompute4/mod.rs` stays as-is.

      ---

      ## Hypotheses and correctness argument

      ### Hypothesis 1: Refactoring negative-label checks is behaviorally neutral

      Original code used three logically equivalent patterns:

      ```rust
      // In compute_cancellations and compute_finality_fixpoint:
      if *label < 0 && *label != DEFAULT_TRANSITION_SYMBOL {
          ...
      }

      // In remove_negative_transitions:
      st.transitions.retain(|k, _| *k >= 0 || *k == DEFAULT_TRANSITION_SYMBOL);
      ```

      I introduce:

      ```rust
      type Code = i16;

      #[inline]
      fn is_negative_symbol(label: Code) -> bool {
          label < 0 && label != DEFAULT_TRANSITION_SYMBOL
      }
      ```

      and then:

      ```rust
      // Places that used the first condition
      if !is_negative_symbol(label) { continue; }

      // Place that used the second condition (logical negation)
      st.transitions.retain(|&label, _| !is_negative_symbol(label));
      ```

      **Claim**: For any label `x: i16`, the new code behaves exactly as before.

      1. By definition,
         `is_negative_symbol(x)` is equivalent to `x < 0 && x != DEFAULT_TRANSITION_SYMBOL`.

         Therefore,
         `!is_negative_symbol(x)` is equivalent to `!(x < 0 && x != DEFAULT_TRANSITION_SYMBOL)`.

      2. Apply De Morgan:
         `!(x < 0 && x != DEFAULT_TRANSITION_SYMBOL)` is equivalent to  
         `(x >= 0) || (x == DEFAULT_TRANSITION_SYMBOL)`.

      3. That is exactly the predicate previously used in `remove_negative_transitions`.

      Thus:

      • Every place that used `x < 0 && x != DEFAULT_TRANSITION_SYMBOL` now uses `is_negative_symbol(x)` (identical).  
      • `remove_negative_transitions` now uses `!is_negative_symbol(x)`, which is exactly the old predicate.

      Therefore, **no behavior changes** in which transitions are treated as “negative” or which ones are removed.

      ---

      ### Hypothesis 2: Progress-bar refactoring is purely cosmetic

      Original pattern in each function:

      ```rust
      let pb = if PROGRESS_BAR_ENABLED {
          let p = ProgressBar::new(LEN);
          p.set_style(
              ProgressStyle::default_bar()
                  .template(TEMPLATE_STR)
                  .expect("progress-bar"),
          );
          Some(p)
      } else {
          None
      };

      if let Some(p) = &pb { p.set_message("..."); p.set_position(k); }
      // ...
      if let Some(p) = &pb { p.finish_with_message("Done"); }
      ```

      New code:

      ```rust
      fn make_progress_bar(length: u64, template: &str) -> Option<ProgressBar> {
          if !PROGRESS_BAR_ENABLED {
              return None;
          }
          let pb = ProgressBar::new(length);
          pb.set_style(
              ProgressStyle::default_bar()
                  .template(template)
                  .expect("progress-bar"),
          );
          Some(pb)
      }

      fn progress_step(pb: &Option<ProgressBar>, step: u64, msg: &str) {
          if let Some(p) = pb {
              p.set_message(msg.to_string());
              p.set_position(step);
          }
      }

      // Usage
      let pb = make_progress_bar(3, "...exact same template...");
      progress_step(&pb, 1, "Compute cancellations");
      ...
      if let Some(p) = &pb {
          p.finish_with_message("Done");
      }
      ```

      Logical changes:

      1. `make_progress_bar` returns exactly `None` when `PROGRESS_BAR_ENABLED` was false, and `Some(ProgressBar)` with identical style and length when true, using the same template strings as before. This matches the previous `if PROGRESS_BAR_ENABLED { ... } else { None }`.

      2. `progress_step` performs exactly the previous `if let Some(p) = &pb { p.set_message(...); p.set_position(step); }` block.

      3. Only minor difference: message strings now go through `msg.to_string()` instead of using a `&'static str`. `indicatif`'s `set_message` takes `impl Into<Cow<'static, str>>`, so both are acceptable; the only effect is that we now allocate a `String` rather than relying on a static literal. This does not affect program semantics (only a tiny performance detail).

      Thus the progress-bar refactor is **purely cosmetic** and cannot affect the automata semantics.

      ---

      ### Hypothesis 3: Type aliases and renaming do not affect semantics

      I introduce:

      ```rust
      type Code = i16;
      type QueryKey = (NWAStateID, Code);
      ```

      and use `Code` instead of `i16` in a handful of local variable declarations and `QueryKey` instead of `(NWAStateID, i16)` for the map key.

      This is syntactic sugar only: in Rust, `type Code = i16;` is not a newtype, it is exactly the same type. All operations, including `wrapping_sub`, comparisons, indexing, and hash map keys, behave identically.

      Variable renamings (`fut` → `future_final`, `rev` → `predecessors`, etc.) do not change code logic.

      Hence, **no semantic change**.

      ---

      ### Hypothesis 4: Core algorithms remain identical

      The core functions:

      • `resolve_negative_codes_in_nwa`  
      • `resolve_negative_codes_in_dwa`  
      • `compute_cancellations`  
      • `compute_finality_fixpoint`  
      • `apply_cancellations`  
      • `apply_finality_fixpoint`  
      • `remove_negative_transitions`

      are preserved in the following sense:

      1. **Control-flow structure**  
         The loops (`for`, `while let Some(...)`) and branch conditions (`if`, `if let`) are unchanged, except for factoring shared predicates into `is_negative_symbol`, whose behavior is proven equivalent in Hypothesis 1.

      2. **State updates and operations on `Weight`**  
         All uses of `|`, `&`, `.is_empty()`, `.zeros()`, and `.clone()` on `Weight` objects are in the same places and in the same order as before. For instance:

         • The condition `let add = &fv & w_uv; if add.is_empty() { continue; }` in `compute_finality_fixpoint` is unchanged.  
         • The condition `if (&add & old) != add` is unchanged; this guards when a state’s future_final weight truly grows.  
         • In `compute_cancellations`, combining weights as `let new_eps_w = &w_as & w_st;` and `prop_w = w_a_prime_a & &*eps_weight;` is identical.

      3. **Data structures and their evolution**  
         In `compute_cancellations`:

         • `queries` remains a `Vec<HashMap<QueryKey, Weight>>` with identical semantics.  
         • `worklist` remains a `VecDeque` of the same tuple type `(s, a, c, w_as)`.  
         • `new_epsilons` remains a `HashMap<(from, to), Weight>`.  
         • The initialization phase populating `queries` and `worklist` by iterating over negative transitions is unchanged except for calling `is_negative_symbol`.  
         • The main `while let Some(...)` loop performs the same sequence of:
           1. Looking for positive or default transitions to cancel with `c`.
           2. Updating `new_epsilons`.
           3. Propagating all existing searches through any strengthened epsilon.
           4. Propagating the current search over original epsilon edges.

         No new edges are explored, nor are any old ones ignored.

      4. **Output types and side effects**

         • `compute_cancellations` still returns exactly the set of epsilon transitions `(from, to, weight)` implied by the fixpoint.  
         • `compute_finality_fixpoint` still returns a `Vec<Weight>` of length `states.len()` with the same propagation semantics.  
         • `apply_cancellations` still calls `add_epsilon` with each tuple from `compute_cancellations`.  
         • `apply_finality_fixpoint` merges final weights with `|=` as before.  
         • `remove_negative_transitions` removes exactly the same transitions as previously shown in Hypothesis 1.

      Therefore, the refactored code implements **the same mathematical transformation** on the automata, while being a bit more organized and readable.

      ---

