          fst1.add_tr(s1, tr1_2)

          tr1_3 = Tr(4, 5, 3.0, s3)
          fst1.add_tr(s2, tr1_3)

          # FST 2
          fst2 = VectorFst()

          s1 = fst2.add_state()
          s2 = fst2.add_state()

          fst2.set_start(s1)
          fst2.set_final(s2, 0.2)

          tr2_1 = Tr(1, 2, 1.0, s2)
          fst2.add_tr(s1, tr2_1)

          tr2_2 = Tr(3, 4, 2.5, s2)
          fst2.add_tr(s2, tr2_2)

          # Expected FST
