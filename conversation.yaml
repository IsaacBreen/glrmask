          assert!(compare_prods(&prods4, &expected4), "Test 4 failed. Got: {:?}", prods4);

          // --- Test Case 5: Multiple Non-Recursive Choices ---
          let mut prods5 = vec![
              prod("S", vec![t("a"), nt("S")]),
              prod("S", vec![t("b")]),
              prod("S", vec![t("c")]),
