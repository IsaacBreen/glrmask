              for state in self.state.values_mut() {
                  reset_llm_tokens(&mut state.active_state.stack, &mut gss_transformation_memo);
              }
              gss_transformation_memo.clear();

              self.state.retain(|_, glr_parser_state| glr_parser_state.is_ok());

