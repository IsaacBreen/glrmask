      **Public Fields:**

      *   `skip_precomputation: bool`: If true, skips all precomputation stages.
      *   `precompute0_only: bool`: If true, only performs the first stage of precomputation (Trie0).
      *   `trie0: Trie0Config`, `trie1: Trie1Config`, `trie2: Trie2Config`, `trie3: Trie3Config`: Stage-specific configuration objects that control optimizations.

      **Associated Functions:**

