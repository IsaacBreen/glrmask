                  _ => Err("Expected JSONNode::Object for DFA".to_string()),
              }
          }
      }

      // TODO: should this *really* derive `Clone`? Users probably shouldn't clone this, should they?
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct Regex {
