                          def intersect_and_prune(acc: PyAcc) -> Optional[PyAcc]:
                              stats['apply_prune_acc_visited'] += 1
                              cached = acc_memo_group.get(acc)
                              if cached is not None or acc in acc_memo_group:
                                  stats['acc_memo_hits'] += 1
