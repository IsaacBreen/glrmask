      : "${SKIP_CPP_BUILD:=0}"
      : "${WARMUP_REPS:=2}"
      : "${TEST_REPS:=10}"
      : "${NUM_STEPS:=1}"
      : "${AGG_METHOD:="mean"}"

      # --- PYTHONPATH setup ---
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
