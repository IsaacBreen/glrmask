  - user: |-
      I think we could make a lot of the logic in src/trie3_opt/passes/nwa_dwa_roundtrip.rs substantially simpler.
      e.g. When converting from DWA back to mini trie instead of trying to add edges eagerly, we can accumulate stuff until we're ready to add them.

      For one, this makes it much simpler to handle pop chains.

      It also makes for cleaner edges to end nodes. Right now, we always create an edge in the mini trie to the canonical end node when we see a state with final weights. This can be a bit of a waste, though, and can lead to things like this
      ```
      --- Tokenizer State ID: 0 ---
      Root Node Trie2Index(15) (MaxDepth: 0)
      ├── Edge (pop: 0, tokens: [0] (e.g., ["$"])): states [1] -> Node Trie2Index(17) (MaxDepth: 1)
      │  └── Edge (pop: 0, tokens: [0] (e.g., ["$"])): states [0..=5] -> Node Trie2Index(13) (MaxDepth: 2) [END]
      └── Edge (pop: 0, tokens: [1] (e.g., ["a"])): states [4] -> Node Trie2Index(18) (MaxDepth: 1)
         └── Edge (pop: 0, tokens: [1] (e.g., ["a"])): states [0..=5] -> Node Trie2Index(13) (MaxDepth: 2) [END]
      ```
      which really just simplifies down to
      ```
      --- Tokenizer State ID: 0 ---
      Root Node Trie2Index(0) (MaxDepth: 0) [Live: [0..=1] (e.g., ["$", "a"])]
      ├── Edge 'A': [1] (e.g., ["a"]) -> Node Trie2Index(2) (MaxDepth: 1) [END] [Live: [0..=1] (e.g., ["$", "a"])]
      └── Edge 'EOF': [0] (e.g., ["$"]) -> Node Trie2Index(2) (MaxDepth: 1) [END] [Live: [0..=1] (e.g., ["$", "a"])]
      ```
      i.e. we didn't need to add 15 -> 17 and 17 -> 13, just could have added 15 -> 13. But right now since we don't look ahead or anything we can't know.
      Now, since we defer actually creating edges until we know we need them, we can get this right.

