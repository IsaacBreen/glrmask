          }

          pub(crate) fn narrow(from: &Self, to: &Self) -> Self {
              Acc {
                  llm_tokens_union: &from.llm_tokens_union & &to.llm_tokens_union,
                  terminals_union: &from.terminals_union & &to.terminals_union,
