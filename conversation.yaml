      In fact, being all 'true' is preferable, since it means on the next commit we can stop early. This helps us avoid computational cost per step being proportional to the complexity of the state stack! We can rules that induce deep nesting and computational cost remains proportional to only the top of the stack tree, the part that changes from step to step.

