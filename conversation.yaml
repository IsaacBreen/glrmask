      //! Masked-Product Point Synthesis (self-contained spec and baseline)
      //!
      //! This file defines a small, abstract puzzle (no domain-specific context):
      //!
      //! Problem (informal):
      //! - There are K components. Each component has a finite set of local states S_i plus a
      //!   special "masked" value ⊥ (read: off/irrelevant).
      //! - We have an alphabet of symbols Σ = {0,1,...,M-1}.
      //! - For each component i and each local state s ∈ S_i, we define a partial transition
      //!   τ_i(s, a) ∈ S_i on symbol a. If a transition does not exist, we treat it as masked (⊥).
      //!   When a coordinate is already masked (⊥), it remains masked under any symbol.
      //!
      //! A product point is a K-tuple p = (p_0, ..., p_{K-1}) where each coordinate p_i ∈ S_i ∪ {⊥}.
      //! A product successor is defined componentwise: succ(p, a)_i =
      //!   - τ_i(p_i, a) if p_i ∈ S_i and the symbol a-transition exists;
      //!   - ⊥ otherwise (including when p_i = ⊥).
      //!
      //! We write ⊥ as None in code; some local state x ∈ S_i is encoded as Some(x).
      //!
      //! Compatibility and Unification:
      //! - Define a quasiorder ≤ on points: x ≤ y iff for all i, either x_i = ⊥ or x_i = y_i.
      //!   Intuitively, y is at least as "specific" as x: whenever x specifies a concrete local
      //!   state, y agrees. Otherwise x leaves the coordinate unspecified (⊥).
      //! - Two points x,y are compatible iff they do not conflict on specified coordinates,
      //!   i.e., ∀i: not (x_i = Some(u), y_i = Some(v), u ≠ v).
      //! - The unification (least upper bound) unify(x,y) is defined iff x,y are compatible,
      //!   and is computed coordinatewise:
      //!     unify(Some(u), Some(u)) = Some(u),
      //!     unify(Some(u), None)    = Some(u),
      //!     unify(None,    Some(u)) = Some(u),
      //!     unify(None,    None)    = None.
      //!
      //! Synthesis task (formal):
      //! - Input:
      //!   - K ≥ 1 components, each with a finite local-graph structure captured as a sparse
      //!     adjacency (only non-masked transitions are stored). For each component i and each
      //!     local state s, we have a sparse map s -> { a ↦ s' }. For symbols not in the map,
      //!     the successor is masked (⊥).
      //!   - An alphabet size M.
      //!   - A start point p0 ∈ (S_0 ∪ {⊥}) × ... × (S_{K-1} ∪ {⊥}).
      //!
      //! - Goal:
      //!   Produce a finite set R ⊆ (S_0 ∪ {⊥}) × ... × (S_{K-1} ∪ {⊥}) of "representatives"
      //!   and a map φ defined on at least:
      //!     Dom ⊇ { p0 } ∪ { succ(r, a) | r ∈ R, a ∈ Σ } ∪ { succ(succ(r, a), b) | ... } ...,
      //!   i.e., on every product successor encountered when starting from any representative,
      //!   such that:
      //!     (C1) Well-formedness: ∀x ∈ Dom, x ≤ φ(x).
      //!          (Every tuple we "name" is mapped to a representative that is at least as
      //!          specific as the tuple.)
      //!     (C2) Closure/Stability: ∀r ∈ R, ∀a ∈ Σ, succ(r, a) ∈ Dom.
      //!          (All outgoing successors of every representative have a home.)
      //!     (C3) Start: p0 ∈ Dom.
      //!
      //! If these hold, we obtain a total transition function on R:
      //!   δ: R × Σ → R,   δ(r, a) = φ(succ(r, a)).
      //! This is well-defined by (C2) and assigns every representative a successor representative
      //! under each symbol. Different valid (R, φ) choices are possible; smaller |R| is better.
      //!
      //! Quality objective (to optimize in future work):
      //!   Minimize |R| subject to (C1–C3).
      //!
      //! Baseline algorithm (provided here):
      //!   synthesize_greedy implements a simple, deterministic construction:
      //!   - Maintain a growing vector of representatives R = [r_0, r_1, ...] and a map φ from
      //!     product points to indices in R.
      //!   - Initialize with r_0 := p0 and φ(p0) = 0.
      //!   - Perform a worklist exploration of representatives. Whenever a new product successor
      //!     x arises, either assign it to an existing representative r_j that can unify with x
      //!     (updating r_j := unify(r_j, x) if this increases specificity), or create a fresh
      //!     representative r_new := x.
      //!   This satisfies (C1–C3), but is not guaranteed to be minimal.
      //!
      //! Verification:
      //!   The struct Solution offers verify(&Instance) -> Result<(), String> to mechanically
      //!   check (C1–C3). Any alternative algorithm can output (reps, image) and be verified the
      //!   same way.
      //!
      //! Public API kept for backward compatibility:
      //!   - type ProductTuple
      //!   - fn successor_tuple(...)
      //!   - fn merge_and_build_automaton(...) -> (Vec<ProductTuple>, HashMap<ProductTuple, usize>)
      //!     which simply wraps the greedy synthesizer.

      #![allow(dead_code)]

      use std::collections::{BTreeMap, BTreeSet, HashMap, HashSet, VecDeque};

      /// Symbol index in 0..alphabet_size.
      pub type Symbol = usize;

      /// Local state id for a component.
      pub type LocalState = usize;

      /// A K-tuple product point; coordinate i is either masked (None) or a concrete local state Some(id).
      pub type ProductTuple = Vec<Option<LocalState>>;

      /// Sparse encoding of one component's local transitions:
      /// For each local state s, a map from Symbol -> successor local state.
      /// Symbols missing from the map are treated as masked (⊥).
      pub type SparseComponent = Vec<BTreeMap<Symbol, LocalState>>;

      /// All components.
      pub type Components = Vec<SparseComponent>;

      /// Attempt pointwise unification; returns None if the two tuples conflict on some specified coordinate.
      fn unify_tuples(a: &ProductTuple, b: &ProductTuple) -> Option<ProductTuple> {
          if a.len() != b.len() {
              return None;
          }
          let mut out = Vec::with_capacity(a.len());
          for i in 0..a.len() {
              match (a[i], b[i]) {
                  (Some(x), Some(y)) => {
                      if x == y {
                          out.push(Some(x));
                      } else {
                          return None;
                      }
                  }
                  (Some(x), None) => out.push(Some(x)),
                  (None, Some(y)) => out.push(Some(y)),
                  (None, None) => out.push(None),
              }
          }
          Some(out)
      }

      /// Fast compatibility check and cost computation used during candidate selection.
      /// Returns Some(spec_increase) if `b` can be merged into `a` without conflict, else None.
      /// - spec_increase = number of coordinates where `a` is None and `b` is Some(v).
      /// - No allocation; early exits on conflict.
      #[inline]
      fn merge_spec_increase_if_compatible(a: &ProductTuple, b: &ProductTuple) -> Option<usize> {
          if a.len() != b.len() {
              return None;
          }
          let mut inc = 0usize;
          // We only care about conflicts and how many new concrete coordinates b would add.
          for i in 0..a.len() {
              match (a[i], b[i]) {
                  (Some(x), Some(y)) => {
                      if x != y {
                          return None; // Conflict
                      }
                  }
                  (None, Some(_)) => inc += 1,
                  _ => {}
              }
          }
          Some(inc)
      }

      /// Checks if tuple `a` is less specific than or equal to tuple `b` (a ≤ b).
      fn is_less_or_equal(a: &ProductTuple, b: &ProductTuple) -> bool {
          debug_assert_eq!(a.len(), b.len(), "Tuples must have same arity for comparison");
          for i in 0..a.len() {
              match (a[i], b[i]) {
                  (Some(xs), Some(ys)) => {
                      if xs != ys {
                          return false; // Conflict: a specifies something different from b
                      }
                  }
                  (Some(_), None) => {
                      return false; // a specifies a value, but b is masked (a is more specific than b)
                  }
                  _ => {} // a is masked or both agree; condition holds for this coordinate
              }
          }
          true
      }

      /// Compute the successor of a product point under a given symbol, using sparse components.
      /// Rule:
      /// - If the coordinate is None (masked), it stays None.
      /// - If the coordinate is Some(s), we follow components[i][s][symbol] if present, else return None.
      pub fn successor_tuple(tuple: &ProductTuple, symbol: Symbol, components: &[SparseComponent]) -> ProductTuple {
          let k = components.len();
          let mut out = Vec::with_capacity(k);
          for i in 0..k {
              match tuple.get(i).copied().flatten() {
                  Some(s) => {
                      let map = &components[i][s];
                      if let Some(&t) = map.get(&symbol) {
                          out.push(Some(t));
                      } else {
                          out.push(None);
                      }
                  }
                  None => out.push(None),
              }
          }
          out
      }

      /// A dense encoding for components to speed up successor computations.
      /// For each component i, we store for every local state s (row) an array over all symbols (columns).
      /// Missing transitions are represented as None.
      type DenseComponent = Vec<Vec<Option<LocalState>>>;
      type DenseComponents = Vec<DenseComponent>;

      /// Build a dense (state × symbol) table for each component.
      fn build_dense_components(components: &[SparseComponent], alphabet_size: usize) -> DenseComponents {
          let mut dense: DenseComponents = Vec::with_capacity(components.len());
          for comp in components {
              let mut dc: DenseComponent = Vec::with_capacity(comp.len());
              for state_map in comp {
                  let mut row = vec![None; alphabet_size];
                  for (&sym, &succ) in state_map {
                      // Symbols beyond alphabet_size should not appear; ignore them defensively.
                      if sym < alphabet_size {
                          row[sym] = Some(succ);
                      }
                  }
                  dc.push(row);
              }
              dense.push(dc);
          }
          dense
      }

      /// Fast successor using dense components. Mirrors successor_tuple semantics.
      fn successor_tuple_dense(tuple: &ProductTuple, symbol: Symbol, dense: &DenseComponents) -> ProductTuple {
          let k = dense.len();
          let mut out = Vec::with_capacity(k);
          for i in 0..k {
              match tuple.get(i).copied().flatten() {
                  Some(s) => {
                      // Panics if s is out-of-range, matching the original behavior that indexed directly.
                      if let Some(t) = dense[i][s][symbol] {
                          out.push(Some(t));
                      } else {
                          out.push(None);
                      }
                  }
                  None => out.push(None),
              }
          }
          out
      }

      /// A complete problem instance.
      pub struct Instance {
          /// The product start point p0.
          pub start: ProductTuple,
          /// All components, in the order matching coordinates of the product point.
          pub components: Components,
          /// |Σ|, the size of the alphabet, with symbols indexed by 0..alphabet_size-1.
          pub alphabet_size: usize,
      }

      impl Instance {
          pub fn new(start: ProductTuple, components: Components, alphabet_size: usize) -> Self {
              Self { start, components, alphabet_size }
          }

          fn validate_shape(&self) -> Result<(), String> {
              if self.alphabet_size == 0 {
                  return Err("alphabet_size must be ≥ 1".to_string());
              }
              let k = self.components.len();
              if k == 0 {
                  return Err("components must be non-empty".to_string());
              }
              if self.start.len() != k {
                  return Err(format!(
                      "start tuple length {} must match number of components {}",
                      self.start.len(),
                      k
                  ));
              }
              // Check components have at least one local state (empty component doesn't make sense).
              for (i, comp) in self.components.iter().enumerate() {
                  if comp.is_empty() {
                      return Err(format!("component {} has no local states", i));
                  }
              }
              Ok(())
          }
      }

      /// A candidate solution to the synthesis problem.
      /// reps: representatives (R)
      /// image: φ mapping specific product points (keys) to indices in reps
      pub struct Solution {
          pub reps: Vec<ProductTuple>,
          pub image: HashMap<ProductTuple, usize>,
      }

      impl Solution {
          /// Check constraints (C1)–(C3) and some basic shape invariants.
          ///
          /// (C1) For all x in image: x ≤ reps[image[x]].
          /// (C2) For all r in reps and all symbols a: succ(r, a) ∈ image.
          /// (C3) start ∈ image.
          ///
          /// Also checks that all tuples have the correct arity (K) and all image indices are valid.
          pub fn verify(&self, inst: &Instance) -> Result<(), String> {
              inst.validate_shape()?;
              let k = inst.components.len();

              if self.reps.is_empty() {
                  return Err("reps must be non-empty".into());
              }
              for (i, r) in self.reps.iter().enumerate() {
                  if r.len() != k {
                      return Err(format!("rep[{}] has wrong arity: expected {}, got {}", i, k, r.len()));
                  }
              }
              if !self.image.contains_key(&inst.start) {
                  return Err("start point is not in image (violates C3)".into());
              }

              // All image mappings must point to valid representatives and satisfy x ≤ rep.
              for (x, &id) in &self.image {
                  if id >= self.reps.len() {
                      return Err("image maps to out-of-range representative index".into());
                  }
                  if x.len() != k {
                      return Err("a tuple in image has wrong arity".into());
                  }
                  // Check x ≤ reps[id]
                  if !is_less_or_equal(x, &self.reps[id]) {
                      return Err(
                          "image well-formedness violated: x is not less than or equal to its representative"
                              .into(),
                      );
                  }
              }

              // Closure: for all representatives r and all symbols a, succ(r,a) must be in image.
              for (rid, r) in self.reps.iter().enumerate() {
                  for a in 0..inst.alphabet_size {
                      let suc = successor_tuple(r, a, &inst.components);
                      if !self.image.contains_key(&suc) {
                          return Err(format!(
                              "closure violated: succ(rep #{}, a={}) has no home in image",
                              rid, a
                          ));
                      }
                  }
              }

              Ok(())
          }
      }

      /// An index to drastically prune the set of candidate representatives for merging.
      /// - present[i][v] contains reps j where reps[j][i] == Some(v) (append-only; filtered at query time).
      /// - masked[i] contains reps j that had reps[j][i] == None when created (append-only; filtered at query time).
      /// - spec_buckets[spec] is a set of rep ids with current specificity = spec, used when x is all-None.
      struct CandidateIndex {
          present: Vec<HashMap<LocalState, Vec<usize>>>,
          masked: Vec<Vec<usize>>,
          spec_buckets: Vec<BTreeSet<usize>>, // buckets by specificity 0..=K
      }

      impl CandidateIndex {
          fn new(k: usize) -> Self {
              Self {
                  present: (0..k).map(|_| HashMap::new()).collect(),
                  masked: vec![Vec::new(); k],
                  spec_buckets: vec![BTreeSet::new(); k + 1],
              }
          }

          /// Add a fresh representative and index it.
          fn on_new_rep(&mut self, rid: usize, tuple: &ProductTuple, spec: usize) {
              for (i, &coord) in tuple.iter().enumerate() {
                  match coord {
                      Some(v) => self.present[i].entry(v).or_default().push(rid),
                      None => self.masked[i].push(rid),
                  }
              }
              self.spec_buckets[spec].insert(rid);
          }

          /// Update buckets when a representative's specificity increases.
          fn on_rep_spec_increase(&mut self, rid: usize, old_spec: usize, new_spec: usize) {
              if old_spec != new_spec {
                  let _ = self.spec_buckets[old_spec].remove(&rid);
                  self.spec_buckets[new_spec].insert(rid);
              }
          }

          /// Record that a coordinate turned from None to Some(v) for a representative.
          fn on_rep_coordinate_becomes_some(&mut self, rid: usize, i: usize, v: LocalState) {
              self.present[i].entry(v).or_default().push(rid);
          }

          fn argmin_rep_for_all_none(&self) -> Option<usize> {
              for bucket in &self.spec_buckets {
                  if let Some(&rid) = bucket.iter().next() {
                      return Some(rid);
                  }
              }
              None
          }
      }

      /// Improved greedy synthesizer that aims to minimize |R| by making principled local choices.
      ///
      /// When finding a home for a new successor `x`, it evaluates all existing compatible
      /// representatives `r_j`. It chooses the one that minimizes a lexicographical cost:
      ///   cost(j) = (specificity_increase, current_specificity_of_r_j, j)
      ///
      /// This prioritizes merges that add the least new information. As a tie-breaker, it
      /// prefers to modify the most general (least specific) representative, thus preserving
      /// flexibility in the overall set of representatives. A new representative is created
      /// only as a last resort.
      pub fn synthesize_greedy(inst: &Instance) -> Solution {
          let _ = inst.validate_shape(); // If invalid, we'll likely fail later; callers can validate first.

          // Toggle this to true if you want to re-enable progress logs for diagnostics.
          const VERBOSE: bool = false;

          // Precompute a dense adjacency for fast successors.
          let k = inst.components.len();
          let dense_components = build_dense_components(&inst.components, inst.alphabet_size);

          // Reserve some space up front to reduce reallocations in large instances.
          let mut reps: Vec<ProductTuple> = Vec::with_capacity(256);
          let mut image: HashMap<ProductTuple, usize> = HashMap::with_capacity(1024);
          let mut work_queue: VecDeque<usize> = VecDeque::with_capacity(256);
          let mut work_set: HashSet<usize> = HashSet::with_capacity(256); // For efficient presence checks
          let mut rep_spec: Vec<usize> = Vec::with_capacity(256); // Specificity (count of Some) per representative
          let mut index = CandidateIndex::new(k);

          // Initialize
          reps.push(inst.start.clone());
          let start_spec = inst.start.iter().filter(|opt| opt.is_some()).count();
          rep_spec.push(start_spec);
          image.insert(inst.start.clone(), 0);
          work_queue.push_back(0);
          work_set.insert(0);
          index.on_new_rep(0, &inst.start, start_spec);
          if VERBOSE {
              println!("Starting greedy synthesis...");
          }

          // Explore representatives
          while let Some(rid) = work_queue.pop_front() {
              work_set.remove(&rid);

              for a in 0..inst.alphabet_size {
                  // Compute successor of current representative under symbol a.
                  let x = successor_tuple_dense(&reps[rid], a, &dense_components);

                  // Already has a home? Skip.
                  if image.contains_key(&x) {
                      continue;
                  }

                  // Find the best existing representative to merge with (if any),
                  // using cost = (spec_increase, current_spec). Lower is better; ties pick lower j.
                  let mut best_j: Option<usize> = None;
                  let mut best_cost: (usize, usize) = (usize::MAX, usize::MAX);
                  let mut best_spec_increase: usize = 0;

                  // Collect coordinates where x is Some(v).
                  let mut coords: Vec<(usize, LocalState)> = Vec::new();
                  for i in 0..k {
                      if let Some(v) = x[i] {
                          coords.push((i, v));
                      }
                  }

                  if coords.is_empty() {
                      // x is all masked; any representative is compatible with spec_increase=0.
                      if let Some(j) = index.argmin_rep_for_all_none() {
                          best_j = Some(j);
                          best_cost = (0, rep_spec[j]);
                          best_spec_increase = 0;
                      }
                  } else {
                      // Choose an anchor coordinate with smallest (present + masked) list size.
                      let mut anchor_idx = 0usize;
                      let mut anchor_size = {
                          let (ai, av) = coords[0];
                          let present_len = index.present[ai].get(&av).map(|v| v.len()).unwrap_or(0);
                          present_len + index.masked[ai].len()
                      };
                      for (idx, &(ai, av)) in coords.iter().enumerate().skip(1) {
                          let present_len = index.present[ai].get(&av).map(|v| v.len()).unwrap_or(0);
                          let size = present_len + index.masked[ai].len();
                          if size < anchor_size {
                              anchor_size = size;
                              anchor_idx = idx;
                          }
                      }
                      let (ai, av) = coords[anchor_idx];

                      // Helper to consider a candidate j. Fully checks compatibility and updates best.
                      let mut consider = |j: usize| {
                          if let Some(spec_increase) = merge_spec_increase_if_compatible(&reps[j], &x) {
                              let current_cost = (spec_increase, rep_spec[j]);
                              if current_cost < best_cost || (current_cost == best_cost && Some(j) < best_j) {
                                  best_cost = current_cost;
                                  best_j = Some(j);
                                  best_spec_increase = spec_increase;
                              }
                          }
                      };

                      // Candidates from reps where coordinate ai == Some(av).
                      if let Some(list) = index.present[ai].get(&av) {
                          for &j in list {
                              // Filter out stale entries (coordinates may have changed since insertion).
                              if reps[j][ai] == Some(av) {
                                  consider(j);
                              }
                          }
                      }
                      // Candidates from reps where coordinate ai == None.
                      for &j in &index.masked[ai] {
                          if reps[j][ai].is_none() {
                              consider(j);
                          }
                      }
                  }

                  if let Some(j) = best_j {
                      // Found a best-fit representative to merge with.
                      // Note: This must succeed because we just checked compatibility.
                      let unified_tuple = unify_tuples(&reps[j], &x).unwrap();

                      if unified_tuple != reps[j] {
                          // Apply the merge and update specificity count incrementally
                          // using the precomputed spec increase.
                          let old_rep = std::mem::replace(&mut reps[j], unified_tuple);
                          // Count and index the coordinates that became Some.
                          let mut inc_count = 0usize;
                          for i in 0..k {
                              if old_rep[i].is_none() && reps[j][i].is_some() {
                                  inc_count += 1;
                                  index.on_rep_coordinate_becomes_some(j, i, reps[j][i].unwrap());
                              }
                          }
                          if inc_count > 0 {
                              let old_spec = rep_spec[j];
                              rep_spec[j] += inc_count;
                              index.on_rep_spec_increase(j, old_spec, rep_spec[j]);
                          }
                          // If the representative changed, re-queue it for processing.
                          if !work_set.contains(&j) {
                              work_queue.push_back(j);
                              work_set.insert(j);
                          }
                      }
                      image.insert(x, j);
                  } else {
                      // No compatible representative found. Create a new one.
                      let new_id = reps.len();
                      let spec = x.iter().filter(|opt| opt.is_some()).count();
                      reps.push(x.clone());
                      rep_spec.push(spec);
                      image.insert(x, new_id);
                      work_queue.push_back(new_id);
                      work_set.insert(new_id);
                      index.on_new_rep(new_id, &reps[new_id], spec);
                      if VERBOSE && reps.len() % 100 == 0 {
                          println!(
                              " -> Representative count reached {}. |Work|={}",
                              reps.len(),
                              work_queue.len()
                          );
                      }
                  }
              }
          }

          if VERBOSE {
              println!(
                  "Greedy synthesis finished. Total reps: {}, total image size: {}.",
                  reps.len(),
                  image.len()
              );
          }
          Solution { reps, image }
      }

      /// Backwards-compatible wrapper: constructs a solution by the greedy method and
      /// returns its representatives and point-map.
      ///
      /// - start_tuple: the start point p0
      /// - components: sparse transitions per component (symbols missing => masked)
      /// - alphabet_size: |Σ|
      ///
      /// Returns:
      /// - (reps, point_map) where:
      ///     reps      = representatives R
      ///     point_map = φ mapping each visited product successor (and the start) to a representative id
      pub fn merge_and_build_automaton(
          start_tuple: ProductTuple,
          components: &[Vec<BTreeMap<usize, usize>>],
          alphabet_size: usize,
      ) -> (Vec<ProductTuple>, HashMap<ProductTuple, usize>) {
          let inst = Instance {
              start: start_tuple,
              components: components.to_vec(),
              alphabet_size,
          };
          let sol = synthesize_greedy(&inst);
          (sol.reps, sol.image)
      }

      #[cfg(test)]
      mod tests {
          use super::*;

          #[test]
          fn test_unify_tuples() {
              assert_eq!(
                  super::unify_tuples(&vec![Some(1), None], &vec![None, Some(2)]),
                  Some(vec![Some(1), Some(2)])
              );
              assert_eq!(
                  super::unify_tuples(&vec![Some(1), Some(2)], &vec![Some(1), Some(2)]),
                  Some(vec![Some(1), Some(2)])
              );
              assert_eq!(
                  super::unify_tuples(&vec![Some(1), None], &vec![Some(1), Some(3)]),
                  Some(vec![Some(1), Some(3)])
              );
              assert_eq!(
                  super::unify_tuples(&vec![Some(1), Some(2)], &vec![Some(1), Some(3)]),
                  None
              );
              assert_eq!(
                  super::unify_tuples(&vec![None, None], &vec![Some(1), Some(2)]),
                  Some(vec![Some(1), Some(2)])
              );
          }

          #[test]
          fn test_is_less_or_equal() {
              // x <= y
              assert!(is_less_or_equal(&vec![None, None], &vec![Some(1), Some(2)]));
              assert!(is_less_or_equal(&vec![Some(1), None], &vec![Some(1), Some(2)]));
              assert!(is_less_or_equal(&vec![None, Some(2)], &vec![Some(1), Some(2)]));
              assert!(is_less_or_equal(&vec![Some(1), Some(2)], &vec![Some(1), Some(2)]));

              // x not <= y
              assert!(!is_less_or_equal(&vec![Some(1), Some(2)], &vec![Some(1), None])); // x is more specific
              assert!(!is_less_or_equal(&vec![Some(1), Some(2)], &vec![Some(1), Some(3)])); // conflict
              assert!(!is_less_or_equal(&vec![Some(1), Some(2)], &vec![None, Some(2)])); // x is more specific
          }

          #[test]
          fn test_successor_tuple_sparse() {
              // Two components, one local state each (id 0)
              // Component 0: only symbol 0 loops 0->0
              // Component 1: only symbol 1 loops 0->0
              let comp0 = vec![BTreeMap::from([(0usize, 0usize)])];
              let comp1 = vec![BTreeMap::from([(1usize, 0usize)])];
              let components = vec![comp0, comp1];

              let p = vec![Some(0), Some(0)];
              assert_eq!(successor_tuple(&p, 0, &components), vec![Some(0), None]);
              assert_eq!(successor_tuple(&p, 1, &components), vec![None, Some(0)]);
              assert_eq!(successor_tuple(&p, 2, &components), vec![None, None]);

              let q = vec![Some(0), None];
              assert_eq!(successor_tuple(&q, 0, &components), vec![Some(0), None]);
              assert_eq!(successor_tuple(&q, 1, &components), vec![None, None]);
          }

          #[test]
          fn test_simple_merge_greedy_wrapper() {
              // Same as original simple test: components only react to distinct symbols (0 vs 1).
              let comp0 = vec![BTreeMap::from([(0usize, 0usize)])];
              let comp1 = vec![BTreeMap::from([(1usize, 0usize)])];
              let components = vec![comp0, comp1];
              let alphabet_size = 3;
              let start_tuple = vec![Some(0), Some(0)];

              let (states, point_map) =
                  merge_and_build_automaton(start_tuple, &components, alphabet_size);

              // The improved algorithm should find a single representative, because all
              // successors can be merged with the start representative with 0 specificity increase.
              assert_eq!(states.len(), 1);
              assert_eq!(states[0], vec![Some(0), Some(0)]);

              let succ0 = successor_tuple(&states[0], 0, &components);
              let succ1 = successor_tuple(&states[0], 1, &components);
              assert_eq!(*point_map.get(&succ0).unwrap(), 0);
              assert_eq!(*point_map.get(&succ1).unwrap(), 0);
          }

          #[test]
          fn test_verify_solution_constraints() {
              // Components: both have 2 local states: 0 and 1.
              // For comp0: symbol 0 toggles 0->1, 1->1; symbol 1 no-op (masked)
              // For comp1: symbol 1 toggles 0->1, 1->1; symbol 0 no-op (masked)
              let mut c0_s0: BTreeMap<usize, usize> = BTreeMap::new();
              c0_s0.insert(0, 1);
              let mut c0_s1: BTreeMap<usize, usize> = BTreeMap::new();
              c0_s1.insert(0, 1);
              let comp0 = vec![c0_s0, c0_s1];

              let mut c1_s0: BTreeMap<usize, usize> = BTreeMap::new();
              c1_s0.insert(1, 1);
              let mut c1_s1: BTreeMap<usize, usize> = BTreeMap::new();
              c1_s1.insert(1, 1);
              let comp1 = vec![c1_s0, c1_s1];

              let components = vec![comp0, comp1];
              let inst = Instance::new(vec![Some(0), Some(0)], components, 2);

              let sol = synthesize_greedy(&inst);
              sol.verify(&inst).expect("greedy solution must satisfy constraints");

              // Manual trace of the improved algorithm:
              // Start: p0 = (0,0)
              // R = [(0,0)], image = {(0,0):0}, work = [0]
              //
              // Pop 0, rep = (0,0)
              // a=0: x = succ((0,0), 0) = (1, None)
              //   - No existing rep is compatible. Create new.
              //   - R = [(0,0), (1,None)], image{(1,None):1}, work.push(1)
              //
              // a=1: x = succ((0,0), 1) = (None, 1)
              //   - Check compatibility with existing reps:
              //     - r0=(0,0): Incompatible (conflict on coords 0 and 1).
              //     - r1=(1,None): Compatible. unify -> (1,1).
              //       - cost: spec_inc=1, current_spec=1. best_candidate = (j=1, cost=(1,1)).
              //   - Merge with r1. reps[1] becomes (1,1). Add 1 back to worklist.
              //   - R = [(0,0), (1,1)], image{(None,1):1}, work has [1].
              //
              // Pop 1, rep = (1,1)
              // a=0: x = succ((1,1), 0) = (1, None)
              //   - Already in image. Mapped to 1. is_less_or_equal((1,None), (1,1)) is true. OK.
              // a=1: x = succ((1,1), 1) = (None, 1)
              //   - Already in image. Mapped to 1. is_less_or_equal((None,1), (1,1)) is true. OK.
              //
              // Worklist empty. Final R = [(0,0), (1,1)]. Size 2. This is minimal.
              assert_eq!(sol.reps.len(), 2);
              assert_eq!(sol.reps[0], vec![Some(0), Some(0)]);
              assert_eq!(sol.reps[1], vec![Some(1), Some(1)]);
          }
      }
    src/precompute4/full_dwa.rs: |
      use crate::r#macro::is_debug_level_enabled;
      use crate::constraint::{PrecomputeNode1Index, StateIDBV, Trie1GodWrapper};
      use crate::datastructures::trie::{Trie, Trie2Index};
      use crate::json_serialization::JSONConvertible;
      use crate::glr::parser::{ExpectElse, GLRParser};
      use crate::glr::table::{NonTerminalID, StateID as ParserStateID, TerminalID};
      use crate::precompute4::characterize::{compute_all_characterizations, BelowBottomCharacterization};
      use crate::precompute4::resolve_negatives::{apply_cancellations, apply_finality_fixpoint, remove_negative_transitions};
      use crate::precompute4::utils::{self, decode_symbol_i16, is_default_transition};
      use crate::precompute4::weighted_automata::{DWA, DWABody, DWAState, DWAStates, NWA, NWABuildError, NWAStates, NWABody, StateID, Weight};
      use crate::constraint::LLMTokenBV;
      use range_set_blaze::RangeSetBlaze;
      use std::cell::RefCell;
      use std::collections::{BTreeMap, BTreeSet, VecDeque};
      use std::env;
      use std::time::Instant;
      use chrono::Local;
      use crate::precompute4::utils::DEFAULT_TRANSITION_SYMBOL;
      use crate::precompute4::weighted_automata::nwa::SimplifyRustfstConfig;

      pub type Precomputed4 = DWA;
      use crate::tokenizer::TokenizerStateID;

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub enum FullDWABuildError {
          ParserStateIdOutOfRange { state_id: ParserStateID },
          AutomatonBuild(NWABuildError),
      }

      impl From<NWABuildError> for FullDWABuildError {
          fn from(e: NWABuildError) -> Self {
              FullDWABuildError::AutomatonBuild(e)
          }
      }

      fn build_template_nwa_from_characterization(
          bb: &BelowBottomCharacterization,
      ) -> Result<NWA, FullDWABuildError> {
          let mut nwa = NWA::new();
          let w_all = Weight::all();

          // Create a node for each non-terminal, similar to the NWA construction.
          let mut nt_nodes: BTreeMap<NonTerminalID, StateID> = BTreeMap::new();
          for &nt in &bb.all_nts {
              let id = nwa.states.add_state();
              nt_nodes.insert(nt, id);
          }

          let start = nwa.body.start_state;

          // --- Initial Actions from Start State ---

          for &(initial_state, shift_state) in &bb.initial_shifts {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let neg_initial = utils::encode_negative_i16(initial_state)?;
              let neg_shift = utils::encode_negative_i16(shift_state)?;

              let s0 = nwa.states.add_state();
              let s1 = nwa.states.add_state();
              let s2 = nwa.states.add_state();
              let s3 = nwa.states.add_state();

              // start --(eps)--> s0 --(+initial)--> s1 --(-initial)--> s2 --(-shift)--> s3 (final)
              nwa.add_epsilon(start, s0, w_all.clone());
              nwa.add_transition(s0, pos_initial, s1, w_all.clone())?;
              nwa.add_transition(s1, neg_initial, s2, w_all.clone())?;
              nwa.add_transition(s2, neg_shift, s3, w_all.clone())?;
              nwa.states[s3].final_weight = Some(w_all.clone());
          }

          for &(initial_state, len, nt) in &bb.initial_reduces {
              let pos_initial = utils::encode_symbol_i16(initial_state)?;
              let target_nt_state = *nt_nodes.get(&nt).expect("nt_node must exist for initial_reduce");

              // Create a chain of default transitions for the pops.
              // start --(eps)--> s0 --(+initial)--> s1 --(default)*len--> target_nt_state
              let s0 = nwa.states.add_state();
              nwa.add_epsilon(start, s0, w_all.clone());
              let mut from = s0;
              let next_state = if len == 0 { target_nt_state } else { nwa.states.add_state() };
              nwa.add_transition(from, pos_initial, next_state, w_all.clone())?;
              from = next_state;

              for i in 0..len {
                  let to = if i == len - 1 { target_nt_state } else { nwa.states.add_state() };
                  nwa.states.add_transition(from, DEFAULT_TRANSITION_SYMBOL, to, w_all.clone())?;
                  from = to;
              }
          }

          // --- Actions from Non-Terminal States ---

          for (nt, rc) in &bb.reduce_characterizations {
              let src_nt_state = *nt_nodes.get(nt).expect("nt_node must exist for reduce_char");

              for &(revealed_state, len, reduce_nt) in &rc.reveal_and_rereduces {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let dst_nt_state = *nt_nodes.get(&reduce_nt).expect("dst nt_node must exist");

                  // src --(eps)--> s0 --(+revealed)--> s1 --(default)*len--> dst
                  let s0 = nwa.states.add_state();
                  nwa.add_epsilon(src_nt_state, s0, w_all.clone());
                  let mut from = s0;
                  let next_state = if len == 0 { dst_nt_state } else { nwa.states.add_state() };
                  nwa.add_transition(from, pos_revealed, next_state, w_all.clone())?;
                  from = next_state;

                  for i in 0..len {
                      let to = if i == len - 1 { dst_nt_state } else { nwa.states.add_state() };
                      nwa.states.add_transition(from, DEFAULT_TRANSITION_SYMBOL, to, w_all.clone())?;
                      from = to;
                  }
              }

              for &(revealed_state, goto_state, shift_state) in &rc.reveal_goto_shift_escapes {
                  let pos_revealed = utils::encode_symbol_i16(revealed_state)?;
                  let neg_revealed = utils::encode_negative_i16(revealed_state)?;
                  let neg_goto = utils::encode_negative_i16(goto_state)?;
                  let neg_shift = utils::encode_negative_i16(shift_state)?;

                  let s0 = nwa.states.add_state();
                  let s1 = nwa.states.add_state();
                  let s2 = nwa.states.add_state();
                  let s3 = nwa.states.add_state();
                  let s4 = nwa.states.add_state();

                  // src --(eps)--> s0 --(+revealed)--> s1 --(-revealed)--> s2 --(-goto)--> s3 --(-shift)--> s4 (final)
                  nwa.add_epsilon(src_nt_state, s0, w_all.clone());
                  nwa.add_transition(s0, pos_revealed, s1, w_all.clone())?;
                  nwa.add_transition(s1, neg_revealed, s2, w_all.clone())?;
                  nwa.add_transition(s2, neg_goto, s3, w_all.clone())?;
                  nwa.add_transition(s3, neg_shift, s4, w_all.clone())?;
                  nwa.states[s4].final_weight = Some(w_all.clone());
              }
          }


          Ok(nwa)
      }

      fn build_template_dwas(
          parser: &GLRParser,
      ) -> Result<BTreeMap<TerminalID, DWA>, FullDWABuildError> {
          let all = compute_all_characterizations(parser);
          let mut out = BTreeMap::new();
          for (term, bb) in all {
              let nwa = build_template_nwa_from_characterization(&bb)?;
              let mut dwa = nwa.determinize_to_dwa_with_rustfst();
              // dwa.simplify();
              crate::debug!(5, "Built template DWA for terminal {:?}:", term);
              crate::debug!(5, "{}", dwa);
              out.insert(term, dwa);
          }
          Ok(out)
      }

      fn build_ignore_terminal_dwa() -> DWA {
          // Identity DWA: start is final, no transitions.
          let mut dwa = DWA::new();
          dwa.states[dwa.body.start_state].final_weight = Some(Weight::all());
          dwa
      }

      fn build_epsilon_dwa(weight: Weight) -> DWA {
          let mut dwa = DWA::new();
          dwa.states[dwa.body.start_state].final_weight = Some(weight);
          dwa
      }

      /// For any state with a final weight, subtract that weight from all outgoing transitions.
      /// This prunes paths that continue after a word has already been accepted with a given weight.
      fn prune_continuations_from_final_states(nwa: &mut NWA) -> bool {
          let mut changed = false;
          for i in 0..nwa.states.len() {
              if let Some(final_weight) = nwa.states[i].final_weight.clone() {
                  if final_weight.is_empty() {
                      continue;
                  }

                  let state = &mut nwa.states[i];

                  // Epsilon transitions
                  for (_, w) in &mut state.epsilons {
                      let old_w = w.clone();
                      *w -= &final_weight;
                      if *w != old_w {
                          changed = true;
                      }
                  }

                  // Labeled transitions
                  for targets in state.transitions.values_mut() {
                      for (_, w) in targets {
                          let old_w = w.clone();
                          *w -= &final_weight;
                          if *w != old_w {
                              changed = true;
                          }
                      }
                  }
              }
          }
          changed
      }

      /// If a default transition for A -> B exists with weight W, subtract W from the weights of all
      /// non-default transitions A -> B (and remove if the resulting weight is empty).
      fn simplify_default_transitions(nwa: &mut NWA) -> bool {
          let mut changed = false;
          for i in 0..nwa.states.len() {
              let state = &mut nwa.states[i];

              // Find default transitions and aggregate their weights by target.
              let mut default_weights: BTreeMap<StateID, Weight> = BTreeMap::new();
              if let Some(default_targets) = state.transitions.get(&DEFAULT_TRANSITION_SYMBOL) {
                  for (target, weight) in default_targets {
                      if !weight.is_empty() {
                          *default_weights.entry(*target).or_insert_with(Weight::zeros) |= weight;
                      }
                  }
              }

              if default_weights.is_empty() {
                  continue;
              }

              // Iterate over all labeled transitions and subtract default weights where targets match.
              for (label, targets) in state.transitions.iter_mut() {
                  if *label == DEFAULT_TRANSITION_SYMBOL {
                      continue;
                  }

                  for (target, weight) in targets.iter_mut() {
                      if let Some(default_weight) = default_weights.get(target) {
                          let old_weight = weight.clone();
                          *weight -= default_weight;
                          if *weight != old_weight {
                              changed = true;
                          }
                      }
                  }
              }

              // Clean up: remove empty-weight transitions.
              for targets in state.transitions.values_mut() {
                  let old_len = targets.len();
                  targets.retain(|(_, w)| !w.is_empty());
                  if targets.len() != old_len {
                      changed = true;
                  }
              }
              let old_len = state.transitions.len();
              state.transitions.retain(|_, targets| !targets.is_empty());
              if state.transitions.len() != old_len {
                  changed = true;
              }
          }
          changed
      }

      fn build_label_follower_map(parser: &GLRParser) -> BTreeMap<ParserStateID, StateIDBV> {
          let mut follower_map: BTreeMap<ParserStateID, StateIDBV> = BTreeMap::new();

          let mut add_follower = |from_sid: ParserStateID, to_sid: ParserStateID| {
              follower_map.entry(from_sid).or_default().insert(to_sid.0);
          };

          // From parser.table
          for (&from_sid, row) in &parser.table {
              // Shifts
              for &to_sid in row.shifts_and_reduces_full.values().filter_map(|action| match action {
                  crate::glr::table::Stage7ShiftsAndReducesLookaheadValue::Shift(sid) => Some(sid),
                  crate::glr::table::Stage7ShiftsAndReducesLookaheadValue::Split { shift, .. } => shift.as_ref(),
                  _ => None,
              }) {
                  add_follower(from_sid, to_sid);
              }
              // Gotos
              for goto in row.gotos.values() {
                  if let Some(to_sid) = goto.state_id {
                      add_follower(from_sid, to_sid);
                  }
              }
          }

          // Default transition
          let default_sid = ParserStateID(DEFAULT_TRANSITION_SYMBOL as usize);
          for sid in 0..parser.table.len() {
              let state_id = ParserStateID(sid);
              add_follower(default_sid, state_id);
              add_follower(state_id, default_sid);
          }

          follower_map
      }

      fn propagate_and_prune_labels(parser: &GLRParser, nwa: &mut NWA) {
          crate::debug!(4, "Starting label propagation and pruning...");
          let now = Instant::now();

          let follower_map = build_label_follower_map(parser);

          let mut state_info: Vec<BTreeMap<ParserStateID, Weight>> = vec![BTreeMap::new(); nwa.states.len()];
          let mut worklist: VecDeque<StateID> = VecDeque::new();
          let mut in_worklist: BTreeSet<StateID> = BTreeSet::new();

          // Seed initial states
          let start_state = &nwa.states[nwa.body.start_state];
          let mut initial_states: BTreeSet<StateID> = BTreeSet::new();
          for (_, targets) in &start_state.transitions {
              for (target_state, w) in targets {
                  initial_states.insert(*target_state);
                  let s_init = *target_state;
                  for (label, _) in &nwa.states[s_init].transitions {
                      if let Ok((is_pos, p_id)) = decode_symbol_i16(*label) {
                          if is_pos {
                              let entry = state_info[s_init].entry(p_id).or_insert_with(Weight::zeros);
                              *entry |= w;
                          }
                      }
                  }
                  if !state_info[s_init].is_empty() && in_worklist.insert(s_init) {
                      worklist.push_back(s_init);
                  }
              }
          }

          // Fixpoint propagation
          while let Some(u) = worklist.pop_front() {
              in_worklist.remove(&u);
              let info_at_u = state_info[u].clone();
              if info_at_u.is_empty() {
                  continue;
              }

              for (l, targets) in &nwa.states[u].transitions {
                  for (v, w_uv) in targets {
                      let v = *v;
                      let mut changed = false;

                      let process_propagation = |pw: &Weight, followers: &StateIDBV, state_info: &mut Vec<BTreeMap<ParserStateID, Weight>>| -> bool {
                          let mut any_change = false;
                          for follower_id_val in followers.iter() {
                              let follower_id = ParserStateID(follower_id_val);
                              let entry = state_info[v].entry(follower_id).or_insert_with(Weight::zeros);
                              let old_len = entry.len();
                              *entry |= pw;
                              if entry.len() != old_len {
                                  any_change = true;
                              }
                          }
                          any_change
                      };

                      // Non-default: must decode as a parser-state label.
                      match decode_symbol_i16(*l) {
                          Ok((is_pos, p_id)) => {
                              if is_pos {
                                  // Positive label: only propagate from that label at u.
                                  if let Some(w_p) = info_at_u.get(&p_id) {
                                      let pw = w_p & w_uv;
                                      if pw.is_empty() {
                                          continue;
                                      }
                                      if let Some(followers) = follower_map.get(&p_id) {
                                          if process_propagation(&pw, followers, &mut state_info) {
                                              changed = true;
                                          }
                                      }
                                  }
                              } else {
                                  panic!("Unexpected negative label during label propagation: {}", l);
                              }
                          }
                          Err(_) => {
                              // Unknown non-default label: skip propagation for this label.
                              panic!("Unexpected unknown non-default label during label propagation: {}", l);
                          }
                      }

                      if changed && in_worklist.insert(v) {
                          worklist.push_back(v);
                      }
                  }
              }
          }
          crate::debug!(4, "Label propagation fixpoint took: {:?}", now.elapsed());

          // Pruning pass
          let now_prune = Instant::now();
          let mut changed_count = 0;
          for u in 0..nwa.states.len() {
              if initial_states.contains(&u) || u == nwa.body.start_state {
                  continue;
              }

              let info_at_u = &state_info[u];

              let state = &mut nwa.states[u];
              for (l, targets) in state.transitions.iter_mut() {
                  let valid_incoming_weight = {
                      // Non-default: decode as parser-state label, or skip if we can't.
                      match decode_symbol_i16(*l) {
                          Ok((is_pos, p_id)) => {
                              if is_pos {
                                  info_at_u
                                      .get(&p_id)
                                      .cloned()
                                      .unwrap_or_else(Weight::zeros)
                              } else {
                                  panic!("Unexpected negative label during pruning: {}", l);
                              }
                          }
                          Err(_) => {
                              // Unknown non-default label: don't prune it (leave weights as-is).
                              panic!("Unexpected unknown non-default label during pruning: {}", l);
                              continue;
                          }
                      }
                  };

                  if valid_incoming_weight.is_empty() {
                      // All transitions for this label can be pruned
                      for (_, w_uv) in targets.iter_mut() {
                          if !w_uv.is_empty() {
                              changed_count += 1;
                              *w_uv = Weight::zeros();
                          }
                      }
                  } else {
                      for (_, w_uv) in targets.iter_mut() {
                          let old_w = w_uv.clone();
                          *w_uv &= &valid_incoming_weight;
                          if *w_uv != old_w {
                              changed_count += 1;
                          }
                      }
                  }
              }
          }

          crate::debug!(6, "state_info after propagation:");
          for (i, info) in state_info.iter().enumerate() {
              crate::debug!(6, "  State {}: {:?}", i, info);
          }

          // Clean up empty transitions
          for state in &mut nwa.states.0 {
              for targets in state.transitions.values_mut() {
                  targets.retain(|(_, w)| !w.is_empty());
              }
              state.transitions.retain(|_, v| !v.is_empty());
          }
          crate::debug!(4, "Pruning pass changed {} weights and took: {:?}", changed_count, now_prune.elapsed());
      }

      // Public API: precompute4 using NWA-first approach, determinize at the end.
      pub fn precompute4(parser: &GLRParser, precomputed1: &BTreeMap<TokenizerStateID, PrecomputeNode1Index>, trie1_god: &Trie1GodWrapper) -> DWA {
          let now_total = Instant::now();
          let now = Instant::now();
          crate::debug!(5, "Starting precompute4...");
          // 1. Build template DWAs for all terminals.
          let template_dwas = match build_template_dwas(parser) {
              Ok(m) => m,
              Err(e) => panic!("Failed to build template DWAs: {:?}", e),
          };
          let ignore_dwa = build_ignore_terminal_dwa();
          crate::debug!(4, "Built {} template DWAs in {:?}", template_dwas.len(), now.elapsed());
          if is_debug_level_enabled(5) {
              for (term, dwa) in template_dwas.iter().take(5) {
                  crate::debug!(5, "Stats for template DWA for terminal {:?}:\n{}", term, dwa.stats());
              }
          }

          // 2. Set up shared NWA state arena.
          let states_arena = RefCell::new(NWAStates::default());

          // 3. Reverse the precompute1 trie.
          let trie1_roots: Vec<_> = precomputed1.values().cloned().collect();

          let all_nodes = Trie::all_nodes(trie1_god, &trie1_roots);

          let leaf_node = all_nodes.iter().find_map(|&idx| {
              idx.read(trie1_god).and_then(|g| if g.value.end { Some(idx) } else { None })
          }).expect("Precompute1 trie must have a single leaf node.");

          let reversed_trie1_god = Trie::reverse(trie1_god, &trie1_roots);
          let reversed_trie_root = leaf_node;

          // 4. Traverse the reversed trie with NWA bodies.
          let initial_nwa_body = {
              let mut states = states_arena.borrow_mut();
              let start = states.add_state();
              states[start].final_weight = Some(Weight::all());
              NWABody { start_state: start }
          };
          let initial_tokens = LLMTokenBV::max_ones();
          let initial_values: Vec<(Trie2Index, (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV))> = vec![(reversed_trie_root, (BTreeMap::from([(initial_nwa_body, vec![initial_nwa_body])]), initial_tokens))];
          let traversal_data = Trie::compute_traversal_data(&reversed_trie1_god, &[reversed_trie_root]).expect("Failed to compute traversal data for reversed trie1");
          let mut original_trie1_roots_map: BTreeMap<PrecomputeNode1Index, Vec<TokenizerStateID>> = BTreeMap::new();
          for (k, v) in precomputed1.iter() {
              original_trie1_roots_map.entry(v.clone()).or_default().push(*k);
          }

          let options = crate::datastructures::trie::PrettyPrintOptions::default()
              .omit_nodes()
              .omit_depth()
              ;
          crate::debug!(5, "Trie:\n{}", Trie::pretty_print_with_options(&trie1_god, &trie1_roots, &options));
          crate::debug!(5, "Reversed trie:\n{}", Trie::pretty_print_with_options(&reversed_trie1_god, &[reversed_trie_root], &options));

          let mut final_bodies: BTreeMap<TokenizerStateID, NWABody> = BTreeMap::new();

          let now = Instant::now();
          Trie::special_map_grouped(
              &reversed_trie1_god,
              &traversal_data,
              initial_values,
              // step function
              |current_val: &(NWABody, LLMTokenBV), edge_terminal_opt, dest_map| {
                  let (current_nwa_body, current_tokens) = current_val;
                  let template_dwa: &DWA = if edge_terminal_opt.is_some() && *edge_terminal_opt != parser.ignore_terminal_id {
                      let terminal_id = edge_terminal_opt.unwrap();
                      template_dwas.get(&terminal_id).expect_else(|| format!("No template DWA for terminal {:?}", terminal_id))
                  } else {
                      &ignore_dwa
                  };

                  let mut results: Vec<(PrecomputeNode1Index, (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV))> = Vec::new();
                  for (dest_idx, llm_token_bv) in dest_map.iter() {
                      let next_tokens = current_tokens & llm_token_bv;
                      if next_tokens.is_empty() {
                          continue;
                      }

                      let mut states = states_arena.borrow_mut();

                      // Convert template DWA to NWA and copy it into the arena
                      let mut template_dwa = template_dwa.clone();
                      let eps_weight = Weight::from_rsb(llm_token_bv.inner.as_ref().clone());
                      template_dwa = DWA::concatenate(&template_dwa, &build_epsilon_dwa(eps_weight));
                      let template_nwa = NWA::from_dwa(&template_dwa);
                      crate::debug!(6, "Template NWA for terminal {:?} with epsilon gate weight {:?}:\n{}", edge_terminal_opt, llm_token_bv, template_nwa);
                      crate::debug!(5, "Applying template NWA for terminal {:?} with epsilon gate weight {:?}...", edge_terminal_opt, llm_token_bv);
                      let (template_start_in_arena, _) = states.copy_subgraph_from(&template_nwa.states, template_nwa.body.start_state);
                      crate::debug!(5, "Template NWA copied into arena. Current arena size: {} states.", states.0.len());
                      let left_body = NWABody { start_state: template_start_in_arena };

                      // Concatenate: left then current (right) via epsilon with weight = llm_token_bv
                      crate::debug!(5, "Starting NWA::concatenate_components: left_start={} right_start={}...", left_body.start_state, current_nwa_body.start_state);
                      // let eps_weight = Weight::from_rsb(llm_token_bv.inner.as_ref().clone());
                      // let composed_body = NWA::concatenate_components(&mut states, &left_body, current_nwa_body, &eps_weight);
                      // crate::debug!(5, "NWA::concatenate_components finished. New start state: {}.", composed_body.start_state);

                      results.push((*dest_idx, (BTreeMap::from([(*current_nwa_body, vec![left_body])]), next_tokens)));
                  }
                  results
              },
              // merge function: union them via epsilon
              |val1: &mut (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV), val2: (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV)| {
                  let (bodies1, tokens1) = val1;
                  let (bodies2, tokens2) = val2;
                  for (right_body, left_bodies) in bodies2 {
                      bodies1.entry(right_body).or_default().extend(left_bodies);
                  }
                  *tokens1 |= &tokens2;
              },
              // process function: capture at original roots
              |_node_data, node_idx, val: (BTreeMap<NWABody, Vec<NWABody>>, LLMTokenBV)| {
                  let (nwa_bodies_map, tokens) = val;
                  // Combine all left bodies into a single NWA body via union (epsilon)
                  let mut nwa_body = {
                      let mut states = states_arena.borrow_mut();
                      let start = states.add_state();
                      NWABody { start_state: start }
                  };
                  crate::debug!(6, "NWA states:\n{}", states_arena.borrow());
                  crate::debug!(6, "{:?}", nwa_bodies_map);
                  for (right_body, left_bodies) in nwa_bodies_map {
                      let mut states2 = NWAStates::default();
                      let mut left_bodies_union2 = {
                          let start = states2.add_state();
                          NWABody { start_state: start }
                      };
                      for left_body in left_bodies {
                          let left_body2 = states2.copy_subgraph_from_and_return_body(&states_arena.borrow(), left_body);
                          left_bodies_union2 = NWA::union_components(&mut states2, &left_bodies_union2, &left_body2);
                          let mut nwa = NWA { states: states2.clone(), body: left_bodies_union2.clone() };
                          nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true).with_determinize(true));
                          states2 = nwa.states;
                          left_bodies_union2 = nwa.body;
                      }
                      let mut left_bodies_nwa = NWA { states: states2, body: left_bodies_union2 };
                      left_bodies_nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true).with_determinize(true));
                      let NWA { states: states2, body: left_bodies_union2 } = left_bodies_nwa;
                      let mut states = states_arena.borrow_mut();
                      let left_bodies_union = states.copy_subgraph_from_and_return_body(&states2, left_bodies_union2);
                      let composed_body = NWA::concatenate_components(&mut states, &left_bodies_union, &right_body, &Weight::all());
                      nwa_body = NWA::union_components(&mut states, &nwa_body, &composed_body);
                      // let mut nwa = NWA { states: states.clone(), body: nwa_body.clone() };
                      // nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true).with_determinize(true));
                      // nwa_body = states.copy_subgraph_from_and_return_body(&nwa.states, nwa.body);
                  }

                  crate::debug!(6, "At trie node {:?}, obtained NWA body with start state {} and {} states.", node_idx, nwa_body.start_state, states_arena.borrow().len());
                  crate::debug!(6, "NWA body:\n{}", nwa_body);
                  crate::debug!(6, "NWA states:\n{}", states_arena.borrow());

                  if !tokens.is_empty() {
                      if let Some(tokenizer_state_ids) = original_trie1_roots_map.get(&node_idx) {
                          for tokenizer_state_id in tokenizer_state_ids {
                              final_bodies.insert(*tokenizer_state_id, nwa_body.clone());
                          }
                      }
                      Some((nwa_body, tokens)) // continue traversal
                  } else {
                      None
                  }
              },
          );
          crate::debug!(4, "Reversed trie traversal (special_map_grouped) took: {:?}", now.elapsed());

          // Combine all final NWA bodies into a single NWA
          let mut combined_nwa_states = states_arena.into_inner();
          let combined_start_state = combined_nwa_states.add_state();

          for (tok_id, body) in final_bodies {
              // Add a transition from the new combined start state to the start of the NWA for this tokenizer state.
              // The label is the tokenizer state ID.
              let label = tok_id.0 as i16;
              combined_nwa_states.add_transition(combined_start_state, label, body.start_state, Weight::all()).unwrap();
          }

          let mut combined_nwa = NWA {
              states: combined_nwa_states,
              body: NWABody { start_state: combined_start_state },
          };
          combined_nwa.simplify_rustfst();
          crate::debug!(5, "Resolving negative codes in combined NWA: {}", combined_nwa);
          crate::debug!(4, "Combined NWA has {} states.", combined_nwa.states.len());
          crate::debug!(4, "Stats for combined NWA before negative resolution:\n{}", combined_nwa.stats());

          // prune_continuations_from_final_states(&mut combined_nwa);
          // combined_nwa.simplify();
          // prune_continuations_from_final_states(&mut combined_nwa);
          // combined_nwa.simplify();
          // combined_nwa = NWA::from_dwa(&combined_nwa.determinize_to_dwa());

          let now = Instant::now();
          crate::debug!(4, "Starting negative code resolution...");
          apply_cancellations(&mut combined_nwa);
          apply_finality_fixpoint(&mut combined_nwa);
          remove_negative_transitions(&mut combined_nwa);
          combined_nwa.simplify_rustfst();
          crate::debug!(4, "Negative code resolution took: {:?}. NWA now has {} states.", now.elapsed(), combined_nwa.states.len());
          crate::debug!(4, "Stats for combined NWA after negative resolution:\n{}", combined_nwa.stats());

          let now = Instant::now();
          crate::debug!(4, "Pruning continuations from final states...");
          prune_continuations_from_final_states(&mut combined_nwa);
          combined_nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true));
          crate::debug!(4, "Pruning and simplifying took: {:?}. NWA now has {} states.", now.elapsed(), combined_nwa.states.len());
          crate::debug!(4, "Stats for combined NWA after pruning:\n{}", combined_nwa.stats());

          let now = Instant::now();
          crate::debug!(4, "Simplifying default transitions...");
          simplify_default_transitions(&mut combined_nwa);
          combined_nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true));
          crate::debug!(4, "Default transition simplification took: {:?}. NWA now has {} states.", now.elapsed(), combined_nwa.states.len());
          crate::debug!(4, "Stats for combined NWA after default simplification:\n{}", combined_nwa.stats());

          // let now = Instant::now();
          // crate::debug!(4, "Starting label propagation and pruning...");
          // // New optimization pass
          // propagate_and_prune_labels(parser, &mut combined_nwa);
          // combined_nwa.simplify_rustfst();
          // crate::debug!(4, "Label propagation and pruning took: {:?}. NWA now has {} states.", now.elapsed(), combined_nwa.states.len());
          // crate::debug!(4, "Stats for combined NWA after label propagation:\n{}", combined_nwa.stats());

          crate::debug!(4, "Starting simplification before final determinization...");
          combined_nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true));
          combined_nwa.simplify();
          combined_nwa.simplify_rustfst_with_config(SimplifyRustfstConfig::default().with_rm_epsilon(true));
          crate::debug!(4, "Simplification before final determinization took: {:?}. NWA now has {} states.", now.elapsed(), combined_nwa.states.len());
          crate::debug!(4, "Stats for combined NWA before final determinization:\n{}", combined_nwa.stats());

          if env::var("RLLM_DUMP_NWA").is_ok() {
              let timestamp = Local::now().format("%Y%m%d-%H%M%S");
              let filename = format!("nwa_dump_before_final_det_{}.json", timestamp);
              eprintln!("Dumping NWA to {} before final determinization...", filename);
              let f = std::fs::File::create(&filename).expect("Unable to create NWA dump file");
              serde_json::to_writer_pretty(f, &combined_nwa).expect("Unable to write NWA to file");
              eprintln!("NWA dump complete.");
              let parser_filename = format!("parser_dump_before_final_det_{}.json", timestamp);
              eprintln!("Dumping parser to {}...", parser_filename);
              let parser_f = std::fs::File::create(&parser_filename).expect("Unable to create parser dump file");
              let parser_json = parser.to_json();
              serde_json::to_writer_pretty(parser_f, &parser_json).expect("Unable to write parser to file");
              eprintln!("Parser dump complete.");
          }
          let now = Instant::now();
          // Determinize the single combined NWA
          crate::debug!(4, "Determinizing final combined NWA...");
          combined_nwa = NWA::from_dwa(&combined_nwa.determinize_to_dwa());
          crate::debug!(4, "Stats after final NWA determinization:\n{}", combined_nwa.stats());
          let mut final_dwa = combined_nwa.determinize_to_dwa_with_rustfst();
          // final_dwa.simplify();
          crate::debug!(4, "Final determinize & simplify took: {:?}. Final DWA has {} states.", now.elapsed(), final_dwa.states.len());
          crate::debug!(4, "Stats for final DWA:\n{}", final_dwa.stats());

          crate::debug!(3, "Total precompute4 time: {:?}", now_total.elapsed());
          final_dwa
      }
