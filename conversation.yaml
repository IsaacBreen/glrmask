                                          matched.append(parent_node)
                              time_filter_peeks += time.time() - t1
                              if not matched:
                                  continue

                              # Merge matched parents
                              t1 = time.time()
                              child_gss = ffi.gss_merge_many_with_depth(matched, 1)
