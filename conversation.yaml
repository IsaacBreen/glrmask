      +        node_arc: PrecomputeNode0Index,
      +        canonical_nodes: &mut HashMap<PrecomputeNode0, PrecomputeNode0Index>,
      +        visited: &mut HashMap<PrecomputeNode0Index, PrecomputeNode0Index>,
      +    ) -> PrecomputeNode0Index {
