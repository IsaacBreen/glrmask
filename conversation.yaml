      ### Why these changes are faster and correct (mathematical view)

      I’ll outline the key hypotheses and the reasoning behind the new algorithms.

      #### Hypothesis 1: Stage 3 is dominated by fixed-point FIRST/FOLLOW computations

      - **Old behaviour:**
        - `compute_first_sets_for_nonterminals` iterates:
          ```text
          while changed:
              for each production P:
                  ...
          ```
          Each iteration can scan all productions, and the number of iterations is bounded by the number of nonterminals `N`, giving worst-case `O(N × P × L)` where `L` is average RHS length.
        - `compute_follow_sets_for_nonterminals` does the same, with an inner loop over suffixes, making it effectively `O(N × P × L²)` in dense grammars.
      - With 50k productions, this is exactly the pattern that can “get stuck” in stage 3.

      **New behaviour:**

      - We precompute dependency graphs (`nt → [nt₁, nt₂, ...]`) and propagate sets along edges only when they grow.
      - Each edge is considered only when necessary; total cost is `O(P × L + E × |FIRST|)` and `O(P × L² + E × |FOLLOW|)`, where `E` is the number of constraint edges, typically comparable to `P × L`.
      - For your 50k-production grammar, this collapses what used to be many full passes over the grammar into a small, bounded number of passes over edges.

      #### Hypothesis 2: Nullability can be computed in (almost) linear time

      Define:

      - `ε(A)` true iff `A ⇒* ε`.
      - `T(A)` true iff `A` can derive a string containing at least one terminal.

      The original algorithm:

      - Computes `ε(A)` via:
        ```text
        while changed:
            for each production A → α:
                if every symbol in α is a nonterminal in ε then add A to ε
        ```
        which is a naive iterative solver over the monotone function:
        ```text
        F_ε(S) = S ∪ { A | ∃ A → α and every symbol in α is a nonterminal in S }.
        ```
        Complexity: `O(iterations × P × L)`.

      - Computes `T(A)` similarly, again scanning the entire grammar per iteration.

      **New algorithm:**

      - For ε:
        - For each production `p: A → α` with **no terminals in α**, we count the number of nonterminal occurrences in α: `eps_unsatisfied[p]`.
        - For each nonterminal `X` and each occurrence of `X` in the RHS of a production, we record that occurrence in a map `nt_rhs_occurs[X]`.
        - If `eps_unsatisfied[p] == 0`, then `A` is ε-derivable and we enqueue it.
        - When a nonterminal `X` becomes ε-derivable, we decrement `eps_unsatisfied[p]` for each RHS occurrence of `X` in every production; whenever a count hits zero, we enqueue the corresponding LHS.

      This is a standard worklist algorithm on the constraint system that defines `ε`. Each production is processed once, and each RHS occurrence yields a constant amount of work, so time is `O(P × L)`.

      - For `T(A)`:

        We interpret the logical condition:

        > A can derive a string containing at least one terminal iff there exists a production A → X₁ X₂ ... Xₙ such that:
        > - every Xᵢ can derive *some* string (either ε or a terminal string), and  
        > - at least one Xᵢ can derive a string containing a terminal.

        Given that `ε(A)` is already known, "can derive some string" is `ε(A) ∨ T(A)`.

        We then:
        - For each production `p`, compute:
          - `prod_unsatisfied[p]`: number of RHS nonterminals that are *not* in `ε` (they might become productive later).
          - `prod_has_terminal_or_prod_nt[p]`: true if RHS contains a terminal directly.
        - Seed `T` with any `A` such that `prod_has_terminal_or_prod_nt[p]` is true and `prod_unsatisfied[p] == 0` (no “unknown” RHS nonterminals).
        - When a nonterminal `X` enters `T`, for each RHS occurrence of `X` in `p`:
          - If `X` was **not** in `ε`, we decrement `prod_unsatisfied[p]`.
          - We set `prod_has_terminal_or_prod_nt[p] = true` (a productive nonterminal is a source of terminals).
          - If now `prod_unsatisfied[p] == 0` and `prod_has_terminal_or_prod_nt[p] == true`, we add the LHS of `p` to `T`.

      Again, each occurrence is processed a constant number of times; total complexity `O(P × L)`.

      **Correctness sketch:**

      - The constraint systems for `ε` and `T` are monotone functions over finite lattices (subsets of nonterminals), so they have unique least fixed points.
      - Each of the algorithms above:
        - Starts from the empty set.
        - Only adds elements when their defining rule is satisfied w.r.t the current set.
        - Uses a worklist to ensure that every rule that could have become satisfied is eventually processed.
      - By standard dataflow analysis theory, such a worklist algorithm converges to the least fixed point of the constraint system, i.e., exactly the desired sets `ε` and `T`.

      `Nullability` then classifies nonterminals as:

      - `Null`  iff `ε(A)` and not `T(A)`.
      - `Nullable` iff `ε(A)` and `T(A)`.
      - `NotNull` otherwise.

      This matches your original semantics.

      #### Hypothesis 3: FIRST/FOLLOW via edges are equivalent to the classical definitions

      **FIRST:**

      - Classical rules:

        - If `A → a α` (with `a` terminal) then `a ∈ FIRST(A)`.
        - If `A → B α` and `ε ∈ FIRST(B)`, then `FIRST(B) \ {ε} ⊆ FIRST(A)` and also, if `ε ∈ FIRST(B)`, consider the next symbol in α.
        - Fixed point over all such rules.

      - We encode:

        - Direct terminals via initial seeding (terminals that appear at the start of some production under a nullable prefix).
        - For each `A → ... B ...` where the prefix before `B` is nullable, we record an edge `B → A`.

      - Then we propagate terminals along these edges until no FIRST set grows.

      This exactly encodes the standard inference rules. Each propagation step is justified by one of the above rules, and we never add anything else; hence the result is the least fixed point.

      **FOLLOW:**

      - Classical rules:

        1. `EOF ∈ FOLLOW(S)` for the start symbol `S`.
        2. For each production `A → α B β`:
           - `FIRST(β) \ {ε} ⊆ FOLLOW(B)`.
           - If `β ⇒* ε`, then `FOLLOW(A) ⊆ FOLLOW(B)`.

      - We do:

        - Rule 1: add `EOF` to `FOLLOW(S)`.
        - For each `A → α B β`:
          - Compute `FIRST(β)` using precomputed FIRST sets, add it to `FOLLOW(B)`.
          - If `β` is nullable (using the precomputed nullable set), add an edge `A → B`.

      - Then we propagate along edges `A → B` with a worklist: whenever `FOLLOW(A)` grows, we add its contents to `FOLLOW(B)`.

      This implements exactly the same constraints as the iterative algorithm; again, by monotonicity and finiteness, the worklist solution is the least fixed point and hence equivalent.

      #### Hypothesis 4: Caching `goto` in Stage 1 removes unnecessary work in Stage 2

      `compute_goto` is purely deterministic and depends only on the set of items and the productions:

      - Stage 1 already computes `goto_set = compute_goto(items_in_split, productions)` for each split to discover new kernels.
      - Stage 2 recomputes the same `compute_goto` call for each split purely to fill the `shifts`/`gotos` maps.

      By caching `goto_set` into `Stage1Entry` during stage 1 and reusing it in stage 2:

      - We eliminate a full pass over `items_in_split` for every `(state, symbol)` pair.
      - The LR-item graph structure (i.e., the automaton) remains unchanged: we are using the exact same `goto_set` computed earlier.

      Thus, we preserve semantics and significantly reduce repeated work.

