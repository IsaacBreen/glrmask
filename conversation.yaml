      import time
      import inspect
      from collections import defaultdict
      from typing import Dict, Iterable, List, Tuple, Optional


      class Stats:
          """A simple singleton class for collecting performance stats with grouping.

          Features:
          - Counters via inc(key).
          - Timers via start(key)/stop(key) with duration totals AND hit counts.
          - Optional groups defined by key prefixes, e.g. "get_mask" or "get_mask.seeding".
            Each group reports:
              * All timed members whose keys are equal to the group prefix or start with "prefix.".
              * The group's "hit count": if there is a timer count for the exact group key, use it;
                otherwise, use the maximum timer count among descendant members.
              * For each member: total ms, hits, avg ms per hit, and ms per group hit.
            Notes:
              - Defining nested groups (e.g. "get_mask" and "get_mask.seeding") is supported.
                A key may appear in multiple groups independently. Each group computes its own
                per-group-hit normalization using its own group hit count.
              - Group totals are simple sums of member totals and may double-count if some timers
                are nested within others. These totals are provided to aid quick inspection rather
                than to guarantee exclusivity.
          """
          _instance = None

          def __init__(self):
              # General counters (manual via inc()).
              self.counts: Dict[str, int] = defaultdict(int)

              # Timings: total duration (seconds) per key.
              self.times: Dict[str, float] = defaultdict(float)

              # Timings: hit counts per key (number of successful stop() calls).
              self.time_counts: Dict[str, int] = defaultdict(int)

              # Location of first call for each key: key -> (file, line)
              self.key_positions: Dict[str, Tuple[str, int]] = {}

              # Active timers: key -> start_time
              self.timers: Dict[str, float] = {}

              # Enabled flag lets callers noop the collection if needed.
              self.enabled = True

              # Optional group prefixes (strings).
              self.groups = set()

          @staticmethod
          def get():
              """Get the singleton instance."""
              if Stats._instance is None:
                  Stats._instance = Stats()
              return Stats._instance

          def reset(self):
              """Clear all collected stats."""
              self.counts.clear()
              self.times.clear()
              self.time_counts.clear()
              self.timers.clear()
              self.key_positions.clear()

          def inc(self, key: str, value: int = 1):
              """Increment a counter."""
              if not self.enabled:
                  return
              self._record_key_position(key)
              self.counts[key] += value

          def start(self, key: str):
              """Start a timer."""
              if not self.enabled:
                  return
              self._record_key_position(key)
              self.timers[key] = time.perf_counter()

          def stop(self, key: str):
              """Stop a timer and record the duration and hit count."""
              if not self.enabled:
                  return
              if key in self.timers:
                  self.times[key] += time.perf_counter() - self.timers[key]
                  self.time_counts[key] += 1
                  del self.timers[key]

          def _record_key_position(self, key: str):
              """If seeing a key for the first time, record its call site (file, line)."""
              if self.enabled and key not in self.key_positions:
                  # Inspection is expensive. Pause all active timers while it runs.
                  now = time.perf_counter()
                  active_timer_keys = list(self.timers.keys())
                  for k in active_timer_keys:
                      self.times[k] += now - self.timers[k]

                  # --- Expensive operation ---
                  caller_frame = None
                  try:
                      frame = inspect.currentframe()
                      # The call stack is:
                      #   - model code (the one we want)
                      #   - inc() or start() in this class
                      #   - _record_key_position() (current frame)
                      # So we need to go up two levels.
                      if frame and frame.f_back and frame.f_back.f_back:
                          caller_frame = frame.f_back.f_back
                          info = inspect.getframeinfo(caller_frame)
                          self.key_positions[key] = (info.filename, info.lineno)
                      else:
                          self.key_positions[key] = ("<unknown>", 0)
                  finally:
                      # Avoid reference cycles
                      del frame
                      if caller_frame:
                          del caller_frame
                  # --- End of expensive operation ---

                  # Resume timers
                  new_start_time = time.perf_counter()
                  for k in active_timer_keys:
                      self.timers[k] = new_start_time

          # -------- Group management --------

          def add_group(self, prefix: str):
              """Register a single group prefix."""
              self.groups.add(prefix)

          def set_groups(self, prefixes: Iterable[str]):
              """Replace current group prefixes with the provided list/iterable."""
              self.groups = set(prefixes)

          def clear_groups(self):
              """Clear configured groups."""
              self.groups.clear()

          # -------- Reporting --------

          def report(self):
              """Print a formatted report of all collected stats."""
              if not self.enabled:
                  return

              # --- Data Preparation Phase ---
              # This phase gathers all data and rows for all tables before printing.

              # 1. Prepare combined stats data  
              stats_headers = ("key", "hits", "total_ms", "avg_ms")
              stats_formats = (str, self._fmt_int_or_blank, self._fmt_ms_or_blank, self._fmt_ms_or_blank)
              stats_rows = []
              all_keys = self.counts.keys() | self.times.keys()
              if all_keys:
                  sorted_keys = sorted(all_keys, key=lambda k: self.key_positions.get(k, ("", 0)))
                  for key in sorted_keys:
                      # 'hits' is timer hits if available, otherwise counter value.
                      hits = self.time_counts.get(key)
                      if hits is None:
                          hits = self.counts.get(key)

                      total_ms = None
                      avg_ms = None
                      if key in self.times:
                          total_ms = self.times[key] * 1000.0
                          timer_hits_for_avg = self.time_counts.get(key, 0)
                          avg_ms = (total_ms / timer_hits_for_avg) if timer_hits_for_avg else 0.0

                      stats_rows.append((key, hits, total_ms, avg_ms))

              # 2. Prepare Groups data
              groups_data = []
              group_members_headers = ("member", "hits", "hits/group_hit", "total_ms", "avg_ms", "ms/group_hit")
              group_members_formats = (str, self._fmt_int_or_blank, self._fmt_ratio_or_blank, self._fmt_ms_or_blank, self._fmt_ms_or_blank, self._fmt_ms_or_blank)
              if self.groups:
                  group_sort_keys = {}
                  for g in self.groups:
                      members = self._group_members(g)
                      if members:
                          min_pos = min(self.key_positions.get(m, ("~", float("inf"))) for m in members)
                          group_sort_keys[g] = min_pos

                  sorted_groups = sorted(self.groups, key=lambda g: group_sort_keys.get(g, ("~", float("inf"))))
                  for g in sorted_groups:
                      all_members = self._group_members(g)
                      if not all_members:
                          continue

                      timing_members = [m for m in all_members if m in self.times]

                      group_hits = self._group_hits(g, timing_members)
                      group_total_ms = sum(self.times[k] for k in timing_members) * 1000.0
                      group_avg_ms = (group_total_ms / group_hits) if group_hits else 0.0

                      group_info = {
                          "name": g,
                          "members_count": len(all_members),
                          "timing_members_count": len(timing_members),
                          "hits": group_hits,
                          "total_ms": group_total_ms,
                          "avg_ms": group_avg_ms,
                      }

                      member_rows = []
                      if all_members:
                          sorted_members = sorted(all_members, key=lambda k: self.key_positions.get(k, ("", 0)))
                          for k in sorted_members:
                              # 'hits' is timer hits if available, otherwise counter value.
                              hits = self.time_counts.get(k)
                              if hits is None:
                                  hits = self.counts.get(k)

                              hits_per_group_hit = None
                              if hits is not None and group_hits > 0:
                                  hits_per_group_hit = hits / group_hits

                              total_ms = None
                              avg_ms = None
                              per_group_ms = None
                              if k in self.times:
                                  total_ms = self.times[k] * 1000.0
                                  timer_hits_for_avg = self.time_counts.get(k, 0)
                                  avg_ms = (total_ms / timer_hits_for_avg) if timer_hits_for_avg else 0.0
                                  per_group_ms = (total_ms / group_hits) if group_hits else 0.0

                              member_rows.append((k, hits, hits_per_group_hit, total_ms, avg_ms, per_group_ms))

                      groups_data.append({"info": group_info, "member_rows": member_rows})

              # --- Width Calculation Phase ---
              # This phase determines the max width for each column across all tables.

              max_widths = defaultdict(int)

              def update_widths(headers, rows, formats):
                  fmts = formats if formats is not None else tuple([str] * len(headers))
                  for i, h in enumerate(headers):
                      max_widths[h] = max(max_widths[h], len(h))
                  for r in rows:
                      for i, h in enumerate(headers):
                          val = r[i]
                          cell_str = fmts[i](val) if callable(fmts[i]) else str(val)
                          max_widths[h] = max(max_widths[h], len(cell_str))

              if stats_rows: update_widths(stats_headers, stats_rows, stats_formats)
              if groups_data:
                  for group in groups_data:
                      if group["member_rows"]:
                          update_widths(group_members_headers, group["member_rows"], group_members_formats)

              # Unify 'key' and 'member' widths for consistent alignment
              if 'key' in max_widths or 'member' in max_widths:
                  unified_width = max(max_widths.get('key', 0), max_widths.get('member', 0))
                  max_widths['key'] = unified_width
                  max_widths['member'] = unified_width

              # --- Printing Phase ---
              # This phase prints all the tables using the pre-calculated widths.

              print("\n═══ Performance Stats ═══")

              if stats_rows:
                  print("\n▶ All Stats")
                  self._print_table(headers=stats_headers, rows=stats_rows, formats=stats_formats, indent="  ", widths=max_widths)

              if self.groups and groups_data:
                  print("\n▶ Groups")
                  for group in groups_data:
                      info = group["info"]
                      print(f"\n  [{info['name']}]")
                      summary_parts = []
                      if info['timing_members_count'] > 0:
                          summary_parts.append(f"{info['members_count']} members")
                          summary_parts.append(f"{self._fmt_int(info['hits'])} hits")
                          summary_parts.append(f"{self._fmt_ms(info['total_ms'])}ms total")
                          summary_parts.append(f"{self._fmt_ms(info['avg_ms'])}ms/hit")
                      print(f"    {' · '.join(summary_parts)}")

                      if group["member_rows"]:
                          self._print_table(headers=group_members_headers, rows=group["member_rows"], formats=group_members_formats, indent="    ", widths=max_widths)

              print("\n═════════════════════════\n")

          # -------- Helpers --------

          @staticmethod
          def _fmt_int(value: int) -> str:
              """Format integer with thousands separator."""
              return f"{value:,}"

          @staticmethod
          def _fmt_ms(value: float) -> str:
              """Format milliseconds with 3 decimals and thousands separator."""
              return f"{value:,.3f}"

          @staticmethod
          def _fmt_int_or_blank(value: Optional[int]) -> str:
              """Format integer with thousands separator, or return blank string if None."""
              if value is None:
                  return ""
              return f"{value:,}"

          @staticmethod
          def _fmt_ms_or_blank(value: Optional[float]) -> str:
              """Format ms with 3 decimals and thousands separator, or return blank string if None."""
              if value is None:
                  return ""
              return f"{value:,.3f}"

          @staticmethod
          def _fmt_ratio_or_blank(value: Optional[float]) -> str:
              """Format a ratio with 2 decimals, or return blank string if None."""
              if value is None:
                  return ""
              return f"{value:.2f}"

          def _print_table(
              self,
              headers: Tuple[str, ...],
              rows: List[Tuple],
              formats: Tuple = None,
              indent: str = "",
              widths: Dict[str, int] = None,
          ):
              """Print a simple aligned table.

              headers: tuple of column names.
              rows: list of tuples aligned with headers.
              formats: tuple of formatter callables (len == len(headers)), applied to each cell.
                       If None, str() is used.
              indent: left indentation for each printed row.
              widths: optional dict of {header: width} to enforce column widths.
              """
              if not rows:
                  return

              ncols = len(headers)
              fmts = formats if formats is not None else tuple([str] * ncols)

              # Determine which columns are numeric (should be right-aligned)
              # Check against the static formatters defined in the class.
              numeric_formatters = (self._fmt_int, self._fmt_ms, self._fmt_int_or_blank, self._fmt_ms_or_blank, self._fmt_ratio_or_blank)
              is_numeric_col = [f in numeric_formatters for f in fmts]

              # Convert cells to strings using provided formatters
              str_rows: List[List[str]] = []
              for r in rows:
                  str_row = []
                  for i in range(ncols):
                      val = r[i]
                      str_row.append(fmts[i](val) if callable(fmts[i]) else str(val))
                  str_rows.append(str_row)

              # Compute column widths
              if widths:
                  col_widths = [widths[h] for h in headers]
              else:
                  col_widths = [len(h) for h in headers]
                  for r in str_rows:
                      for i, cell in enumerate(r):
                          col_widths[i] = max(col_widths[i], len(cell))

              # Print header
              header_line = indent + " | ".join(
                  h.rjust(col_widths[i]) if is_numeric_col[i] else h.ljust(col_widths[i])
                  for i, h in enumerate(headers)
              )
              sep_line = indent + "-+-".join("-" * col_widths[i] for i in range(ncols))
              print(header_line)
              print(sep_line)

              # Print rows
              for r in str_rows:
                  print(
                      indent + " | ".join(
                          r[i].rjust(col_widths[i]) if is_numeric_col[i] else r[i].ljust(col_widths[i])
                          for i in range(ncols)
                      )
                  )

          def _group_members(self, prefix: str) -> List[str]:
              """Return all timing and count keys that belong to the group 'prefix'.

              A key belongs if key == prefix or key.startswith(prefix + ".").
              """
              pfx_dot = prefix + "."
              all_keys = self.times.keys() | self.counts.keys()
              members = [k for k in all_keys if k == prefix or k.startswith(pfx_dot)]
              return members

          def _group_hits(self, prefix: str, members: List[str]) -> int:
              """Determine the 'group hit count' for a group.

              Rule:
              - If the exact group key has a timing hit count, use that.
              - Else use the maximum timing hit count among its members (descendants).
              This approximates "how many times the group ran" even if the root itself
              wasn't timed explicitly.
              """
              direct = self.time_counts.get(prefix, 0)
              if direct > 0:
                  return direct
              max_desc = 0
              for k in members:
                  max_desc = max(max_desc, self.time_counts.get(k, 0))
              return max_desc

          def __enter__(self):
              self.reset()
              return self

          def __exit__(self, exc_type, exc_val, exc_tb):
              self.report()
    python/run_benchmarks.sh: |
      #!/bin/bash
      set -euo pipefail

      # ==============================================================================
      # run_benchmarks.sh
      #
      # A script to automate running benchmarks for multiple model and constraint
      # file pairs, generating JSON results and analysis plots.
      #
      # This script should be run from the project root directory.
      #
      # Usage:
      #   Usage (Mode 1: model:constraint pairs):
      #     ./run_benchmarks.sh <model1.py:constraint1.json.gz> [model2.py:constraint2.json.gz ...]
      #
      #   Usage (Mode 2: legacy, with CONSTRAINT_FILE env var):
      #     CONSTRAINT_FILE=c.json.gz ./run_benchmarks.sh <model1.py> [model2.py ...]
      #
      # Example:
      #   ./run_benchmarks.sh model.py:c1.json.gz model.py:c2.json.gz
      #
      # Environment Variables:
      #   CONSTRAINT_FILE: Path to a constraint file. Used as a default in legacy mode.
      #   CODE_FILE:       Path to the code file to use as input.
      #                    (Default: ./src/example_code.js)
      #   REPEAT:          Number of times to run each benchmark. (Default: 1)
      #   AGG_METHOD:      Aggregation method for analyzer (mean, median, min, max).
      #                    If unset, runs are plotted individually. (Default: "")
      # ==============================================================================

      # --- Configuration ---
      : "${CONSTRAINT_FILE:=""}"
      : "${CODE_FILE:="./src/example_code.js"}"
      : "${SKIP_CPP_BUILD:=0}" # Set to 1 to disable C++ compilation
      : "${SKIP_RUST:=0}" # Set to 1 to disable Rust compilation
      : "${REPEAT:=1}"
      : "${AGG_METHOD:=""}"
      : "${SKIP_PLOTS:=0}" # Set to 1 to skip plot generation

      # --- PYTHONPATH setup ---
      # The script is run from the project root. The python modules are in the 'python' directory.
      # We add the 'python' directory to PYTHONPATH so that compiled extension modules (like leveled_gss_cpp)
      # can be found via top-level imports.
      SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
      export PYTHONPATH="${SCRIPT_DIR}:${PYTHONPATH:-}"

      # --- Argument Validation ---
      if [ "$#" -lt 1 ]; then
          echo "Usage 1: $0 <model1.py:constraint1.json.gz> [model2.py:constraint2.json.gz ...]"
          echo "Usage 2: CONSTRAINT_FILE=c.json.gz $0 <model1.py> [model2.py ...]"
          echo "Error: At least one model argument is required."
          exit 1
      fi

      ALL_PAIRS=()
      # Check if we are in pair mode (arg contains ':') or legacy mode
      if [[ "$1" == *":"* ]]; then
          echo "Detected 'model:constraint' pair syntax."
          ALL_PAIRS=("$@")
      else
          echo "Detected legacy model-only syntax. Using CONSTRAINT_FILE env var."
          if [ -z "$CONSTRAINT_FILE" ]; then
              echo "Error: CONSTRAINT_FILE must be set when using legacy model-only syntax."
              exit 1
          fi
          if [ ! -f "$CONSTRAINT_FILE" ]; then
              echo "Error: Constraint file from environment not found: $CONSTRAINT_FILE"
              exit 1
          fi
          for model_file in "$@"; do
              ALL_PAIRS+=("${model_file}:${CONSTRAINT_FILE}")
          done
      fi

      BASELINE_PAIR="${ALL_PAIRS[0]}"

      # Check that all provided files exist
      for pair in "${ALL_PAIRS[@]}"; do
          MODEL_FILE="${pair%%:*}"
          CONSTRAINT_FILE_ARG="${pair#*:}"
          if [ "$MODEL_FILE" == "$CONSTRAINT_FILE_ARG" ]; then # handles case where there is no ':'
              echo "Error: Invalid argument format '$pair'. Expected 'model.py:constraint.json.gz'."
              exit 1
          fi
          if [ ! -f "$MODEL_FILE" ]; then
              echo "Error: Model file not found: $MODEL_FILE"
              exit 1
          fi
          if [ ! -f "$CONSTRAINT_FILE_ARG" ]; then
              echo "Error: Constraint file not found: $CONSTRAINT_FILE_ARG"
              exit 1
          fi
      done
      if [ ! -f "$CODE_FILE" ]; then
          echo "Error: Code file not found: $CODE_FILE"
          exit 1
      fi


      # --- Setup ---
      # Create a unique directory for this benchmark run's results.
      RESULTS_DIR="benchmark_results/$(date +"%Y-%m-%d_%H-%M-%S")"
      mkdir -p "$RESULTS_DIR"
      echo "Benchmark results will be saved in: $RESULTS_DIR"
      echo "Benchmark pairs: ${ALL_PAIRS[*]}"
      echo "Code: $CODE_FILE"
      echo "Repeat count: $REPEAT"
      if [[ -n "$AGG_METHOD" ]]; then
        echo "Aggregation: $AGG_METHOD"
      fi
      echo "---"


      if [[ "${SKIP_CPP_BUILD}" != "1" ]]; then
        # --- Automated C++ Build Process ---
        echo "Ensuring C++ extensions are built..."

        # Determine project root, assuming this script is in the 'python' directory.
        SCRIPT_DIR=$( cd -- "$( dirname -- "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )
        PROJECT_ROOT=$(dirname "$SCRIPT_DIR")

        # 1) Setup: download Boost headers locally and install pybind11
        BOOST_VERSION="1.83.0"
        BOOST_VER_UNDERSCORES="1_83_0"
        BOOST_DIR="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}"
        mkdir -p "${PROJECT_ROOT}/.build"

        if [ ! -d "$BOOST_DIR" ]; then
          BOOST_TGZ="${PROJECT_ROOT}/.build/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Downloading Boost ${BOOST_VERSION} headers..."
          curl -L -o "$BOOST_TGZ" "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDERSCORES}.tar.gz"
          echo "Extracting Boost..."
          tar -C "${PROJECT_ROOT}/.build" -xzf "$BOOST_TGZ"
        fi

        echo "Installing pybind11..."
        python3 -m pip install --quiet pybind11

        # 2) Build the C++ extensions in place
        echo "Building C++ extensions..."

        # Compute extension suffix and includes via pybind11
        EXT_SUFFIX="$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("EXT_SUFFIX") or ".so")')"
        PYBIND_INCLUDES="$(python3 -m pybind11 --includes)"
        CXX="${CXX:-c++}"
        CXXFLAGS="-O3 -DNDEBUG -march=native -flto -std=c++17 -shared -fPIC"
        LDFLAGS="-flto"
        if [[ "$(uname)" == "Darwin" ]]; then
          LDFLAGS="${LDFLAGS} -undefined dynamic_lookup"
        fi

        # Optional ASan (opt-in via SANITIZE=1 env var)
        if [[ "${SANITIZE:-0}" == "1" ]]; then
          echo "Building with AddressSanitizer (SANITIZE=1)"
          CXXFLAGS="-g -O1 -fsanitize=address -fno-omit-frame-pointer -std=c++17 -shared -fPIC"
          LDFLAGS="${LDFLAGS} -fsanitize=address"
        fi

        # Control C++ stats collection. Default to enabled.
        : "${ENABLE_CPP_STATS:=1}"
        if [[ "${ENABLE_CPP_STATS}" == "1" ]]; then
          echo "Building C++ with stats enabled (ENABLE_CPP_STATS=1)"
          CXXFLAGS="${CXXFLAGS} -DENABLE_STATS"
        else
          echo "Building C++ with stats disabled (ENABLE_CPP_STATS=0)"
        fi

        # Change to python directory to run build commands with relative paths
        ORIGINAL_CWD=$(pwd)
        cd "$SCRIPT_DIR"

        # Compile extensions. Paths are relative to the 'python' directory.
        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/icl_rangeset.cpp" -o "aug25/models/icl_rangeset${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/leveled_gss_py.cpp" -o "leveled_gss_cpp${EXT_SUFFIX}" ${LDFLAGS}

        ${CXX} ${CXXFLAGS} ${PYBIND_INCLUDES} -I"${BOOST_DIR}" \
          "aug25/models/precompute3_engine.cpp" -o "aug25/models/precompute3_engine${EXT_SUFFIX}" ${LDFLAGS}

        # Change back to original directory
        cd "$ORIGINAL_CWD"

        echo "Build complete."
        echo "---"
      else
        echo "Skipping C++ extension build (SKIP_CPP_BUILD=1)."
        echo "---"
      fi

      # --- Automated Rust Build Process ---
      if [ "${SKIP_RUST:-0}" == "1" ]; then
        echo "SKIP_RUST is set. Skipping Rust module build."
        echo "---"
      else
        echo "Automating Rust module build..."
        RUST_PROJECT_DIR="$SCRIPT_DIR/leveled_rs"
        if [ -d "$RUST_PROJECT_DIR" ]; then
          echo "  Building Rust modules with maturin..."
          # Assuming maturin is installed in the environment. 'maturin develop' builds and installs the wheel in the current venv.
          (cd "$RUST_PROJECT_DIR" && maturin develop)
          echo "Rust module build complete."
        else
          echo "Rust project directory not found at $RUST_PROJECT_DIR. Skipping build."
        fi
        echo "---"
      fi

      # --- Run Benchmarks ---
      echo "Starting benchmark runs..."
      # Define the ASAN library path at the top of the loop for clarity
      ASAN_LIB="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/17/lib/darwin/libclang_rt.asan_osx_dynamic.dylib"

      for pair in "${ALL_PAIRS[@]}"; do
          MODEL_FILE="${pair%%:*}"
          CONSTRAINT_FILE_ARG="${pair#*:}"

          echo
          echo ">>> Running benchmark for: $(basename "$MODEL_FILE") with $(basename "$CONSTRAINT_FILE_ARG")"
          cmd=(python -m python.aug25.benchmark_runner
              --code "$CODE_FILE"
              --constraint-file "$CONSTRAINT_FILE_ARG"
              --model "$MODEL_FILE"
              --output "$RESULTS_DIR"
              --repeat "$REPEAT")
          echo "${cmd[*]}"
          # Prepend the environment variable ONLY for the C++ model
          if [[ "$MODEL_FILE" == *"precompute3_model_cpp.py"* ]]; then
              echo ">>> Running with AddressSanitizer..."
              if DYLD_INSERT_LIBRARIES="$ASAN_LIB" "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$MODEL_FILE")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$MODEL_FILE") failed with exit code $exit_code. Skipping."
              fi
          else
              if "${cmd[@]}"; then
                  echo ">>> Finished benchmark for: $(basename "$MODEL_FILE")"
              else
                  exit_code=$?
                  echo
                  echo ">>> Benchmark for $(basename "$model_to_benchmark") failed with exit code $exit_code. Skipping."
              fi
          fi
      done
      echo
      echo "All benchmark runs completed."
      echo "---"


      # --- Analyze Results ---
      echo "Analyzing results and generating plots..."
      PLOTS_DIR="${RESULTS_DIR}/analysis"

      BASELINE_MODEL_FILE="${BASELINE_PAIR%%:*}"
      BASELINE_CONSTRAINT_FILE="${BASELINE_PAIR#*:}"
      BASELINE_MODEL_STEM="$(basename "$BASELINE_MODEL_FILE" .py)"
      BASELINE_CONSTRAINT_STEM=$(basename "${BASELINE_CONSTRAINT_FILE}")
      BASELINE_CONSTRAINT_STEM=${BASELINE_CONSTRAINT_STEM%.json.gz}
      BASELINE_CONSTRAINT_STEM=${BASELINE_CONSTRAINT_STEM%.json}
      BASELINE_KEY="${BASELINE_MODEL_STEM}__${BASELINE_CONSTRAINT_STEM}"

      cmd=(python -m python.aug25.benchmark_analyzer
          "${RESULTS_DIR}"/*.json
          --baseline "$BASELINE_KEY"
          --output-dir "$PLOTS_DIR")

      if [[ -n "$AGG_METHOD" ]]; then
        cmd+=(--agg-method "$AGG_METHOD")
      fi

      if [[ "${SKIP_PLOTS}" == "1" ]]; then
        cmd+=(--skip-plots)
      fi

      echo "${cmd[*]}"
      "${cmd[@]}"

      echo
      echo "---"
      echo "Benchmark analysis complete."
      echo "Baseline: $BASELINE_KEY"
      echo "Summary printed above. Plots are saved in: $PLOTS_DIR"
      echo "Full JSON results are in: $RESULTS_DIR"
