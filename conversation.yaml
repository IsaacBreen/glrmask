              max_ms_tiny=4_000,
              max_ms_small=15_000,
              max_ms_medium=60_000,
              max_ms_large=240_000,
          ),
          runner=_workload_split_modify_merge_shared
      ))

      register_workload(Workload(
          name="pairwise_merge_pop",
