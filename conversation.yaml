      #### 1. Replace the inline ignore‑directive handling in `parse()`

      Locate the `impl<'a> EbnfParser<'a>` block and find the `parse` method. It currently looks like this (abridged to the relevant part):

      ```rust
          pub(super) fn parse(&mut self) -> Result<EbnfParseResult, ParseError> {
              let mut rules: Vec<(String, GrammarExpr)> = Vec::new();
              let mut seen_names = HashSet::new();
              let mut ignore_symbol_name = None;

              while self.tokens.peek().is_some() {
