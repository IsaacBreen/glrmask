              assert!(Arc::ptr_eq(&result_node, &dest));
              let s = source.lock().unwrap();
              let children_map = s.get(&"key").unwrap(); // Now a BTreeMap<ArcPtrWrapper<Mutex<...>>, EV>
              assert_eq!(children_map.len(), 1);
