      13. **Update `GLRParserState::is_ok()`:**
          `!self.active_states.is_empty()` becomes `!self.head.predecessors.is_empty()`.

      14. **Update `ParseState::key()`:**
          `stack_state_id: self.stack.peek().state_id` becomes `stack_state_id: self.stack_top_node.state_id`.

      15. **Update `ParseState::merge()`:**
          -   `self_content = self.stack.peek(); other_content = other.stack.peek();`
