              prod("T", vec![nt("T"), t("TIMES"), nt("F")]),
              prod("T", vec![nt("F")]),
              prod("F", vec![t("LPAREN"), nt("E"), t("RPAREN")]),
              prod("F", vec![t("I")]),
          ];
          // Map grammar terminals to IDs matching regex order
          let mut grammar_token_map: BiBTreeMap<Terminal, TerminalID> = BiBTreeMap::new();
