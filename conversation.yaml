          pub fn deep_copy_subtrees_into(
              source_arena: &Arena<Self>,
              dest_arena: &Arena<Self>,
              roots: &[Trie2Index],
          ) -> Vec<Trie2Index> {
              ...
          }
      }
      ```


      Implement this in full.

      Notes:
      - to access nonterminal IDs, use `self.non_terminal_map.right_values()`
      - to create a god wrapper, use `Trie3GodWrapper::new()`
