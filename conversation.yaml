      ## 5.3 Difference

      Negation is not defined for all semirings, but a *difference* operation can be defined for a weighted automata $A_1$ and an unweighted deterministic automaton $A_2$ as follows:[^8]
      $$
      \forall x \in \Sigma^*, (A_1 - A_2)(x) = \begin{cases} A_1(x) & \text{if } x \notin L(A_2) \\ \overline{0} & \text{otherwise}. \end{cases}
      $$
      Thus, $(A_1 - A_2)$ is the weighted automaton $A_1$ from which all accepting paths labeled with a string accepted by $A_2$ are removed, which leads to the following equivalent formulation:
      $$
      \forall x \in \Sigma^*, (A_1 - A_2)(x) = (A_1 \cap \overline{A_2})(x),
      $$
      where $\overline{A_2}$ is a weighted automaton over the semiring $S$ accepting exactly the complement of $L(A_2)$ and assigning weight $\overline{1}$ to each string accepted. Since $A_2$ is deterministic, its complement $\overline{A_2}$ can be computed from $A_2$ in linear time, with the following two steps:
      - *completion*: first making $A_2$ *complete*, that is creating an equivalent automaton to $A_2$ such that all alphabet symbols can be read from any state. This can be done by augmenting $A_2$ with a new state $p$ with self-loops labeled with all alphabet symbols, and by adding a transition labeled with $\alpha \in \Sigma$ from state $q$ to $p$ when no transition labeled with $\alpha$ is available at $q$ in $A_2$.
      - *complementation*: then making all final states of the modified automaton $A_2$ non-final and vice-versa. Finally, all weights of the automaton are set to $\overline{1}$ to make it an automaton over $S$.

      Both of these steps can be executed in linear time $O(|A_2| + |\Sigma|)$ and admit a natural on-demand implementation. Note that the complementation of arbitrary finite automata is PSPACE-complete [1], this is the reason why $A_2$ was assumed to be deterministic here. The difference can then be obtained by computing the intersection of $A_1$ and $\overline{A_2}$. Since intersection or composition also admit a natural on-the-demand computation, the same is true of the difference algorithm. Note that using that property, the alphabet symbol actually used in complementation can be limited to the symbols appearing in $A_1$ and $A_2$. Thus, the overall complexity of difference is $O(|A_1|(|A_2| + |\Sigma'|)$.

