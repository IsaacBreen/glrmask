          fn original_to_internal_map(&self) -> PyResult<std::collections::BTreeMap<usize, usize>> {
              let mut m = std::collections::BTreeMap::new();
              for (orig, intl) in self.inner.llm_vocab.original_to_internal_id_bimap.iter() {
