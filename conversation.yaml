          return [0]


      def are_equivalent_for_state(provider_a: GraphProvider, root_a: int, provider_b: GraphProvider, root_b: int,
                                   tokens: Optional[List[int]] = None, verbose: bool = False) -> Tuple[bool, Optional[str]]:
