                      for (v, children) in &i.inner.children {
                          for child in children.values() {
                              path.push(v.clone());
                              if let Some(res) = Self::get_first_path_lower(child, path, &i.acc) {
                                  return Some(res);
                              }
                              path.pop();
                          }
                      }
                  }
              }
