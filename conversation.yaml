                      g.children()
                          .iter()
                          .map(|(ek, dm)| {
                              let dests = dm.iter().map(|(d, sids)| (*d, sids.clone())).collect::<Vec<_>>();
                              (ek.clone(), dests)
                          })
                          .collect()
