      ## 1. Core Data Structures

      These are the central types for creating and managing the graph. The design uses an **arena allocator** (`Arena`) to store all nodes (`Trie`). Nodes do not hold direct pointers to each other; instead, they reference other nodes via a lightweight handle, `Trie2Index`.

      ### struct `Trie<EK, EV, T>`

      Represents a node in a Trie-like structure, which can be part of a more general Directed Acyclic Graph (DAG).

      ```rust
      #[derive(Debug, Clone)]
      pub struct Trie<EK: Ord, EV, T> {
          pub value: T,
          pub max_depth: usize,
          // children are private
      }
      ```

      *   **Generic Parameters:**
          *   `EK`: The type of the edge key. Must implement `Ord`.
          *   `EV`: The type of the edge value.
          *   `T`: The type of the value stored within the node itself.
      *   **Public Fields:**
          *   `value: T`: The data stored at this node.
          *   `max_depth: usize`: The "longest distance" from a source node, as computed by `recompute_all_max_depths`. Defaults to `usize::MAX` on creation.

      #### Methods

      The methods of `Trie` are primarily accessed through a `Trie2Index` and an `Arena`.

      ##### Core Functionality
      `impl<EK: Ord + Clone, EV, T> Trie<EK, EV, T>`

      *   **`pub fn new(value: T) -> Self`**
          Creates a new trie node with the given value and no children. `max_depth` is initialized to `usize::MAX`.

      *   **`pub fn force_insert_to_new_node(...) -> Trie2Index`**
          Creates a new destination node in the arena with the given `value`, inserts an edge from `self` to the new node, and returns the index of the new node.
          ```rust
          pub fn force_insert_to_new_node(
              &mut self,
              arena: &Arena<Trie<EK, EV, T>>,
              edge_key: EK,
              edge_value: EV,
              value: T,
          ) -> Trie2Index
          ```

      *   **`pub fn force_insert_to_node(&mut self, edge_key: EK, edge_value: EV, dst: Trie2Index)`**
          Inserts an edge from `self` to an existing destination node `dst`.

      *   **`pub fn already_has_dst(&self, edge_key: EK, dst: Trie2Index) -> bool`**
          Checks if an edge with the specified `edge_key` to the destination `dst` already exists.

      *   **`pub fn already_has_dst_for_any_key(&self, dst: Trie2Index) -> bool`**
          Checks if any edge from this node points to the destination `dst`, regardless of the edge key.

      *   **`pub fn get_edge_value(&self, edge_key: EK, dst: Trie2Index) -> Option<&EV>`**
          Returns a reference to the value of the edge from `self` to `dst` with the given `edge_key`, if it exists.

      *   **`pub fn get_edge_value_mut(&mut self, edge_key: EK, dst: &Trie2Index) -> Option<&mut EV>`**
          Returns a mutable reference to the value of the edge from `self` to `dst` with the given `edge_key`, if it exists.

      *   **`pub fn try_insert(&mut self, edge_key: EK, edge_value: &mut Option<EV>, child: Trie2Index)`**
          Inserts an edge. This is a simple wrapper around `try_insert_unchecked`.

      *   **`pub fn try_insert_unchecked(&mut self, edge_key: EK, edge_value: &mut Option<EV>, child: Trie2Index)`**
          Inserts an edge without performing any cycle checks or depth updates. The `edge_value` is taken from the `Option`. Panics if `edge_value` is `None`.

      *   **`pub fn get(&self, edge_key: &EK) -> Option<&OrderedHashMap<Trie2Index, EV>>`**
          Returns a reference to the map of destination nodes for a given edge key.

      *   **`pub fn get_mut(&mut self, edge_key: &EK) -> Option<&mut OrderedHashMap<Trie2Index, EV>>`**
          Returns a mutable reference to the map of destination nodes for a given edge key.

      *   **`pub fn children(&self) -> &BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>`**
          Returns an immutable reference to the entire children map.

      *   **`pub fn children_mut(&mut self) -> &mut BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>`**
          Returns a mutable reference to the entire children map.

      *   **`pub fn is_leaf(&self) -> bool`**
          Returns `true` if the node has no children.

      ##### Graph-level Operations (Associated Functions)

      *   **`pub fn all_nodes(arena: &Arena<Self>, roots: &[Trie2Index]) -> Vec<Trie2Index>`**
          Performs a breadth-first search (BFS) from the given `roots` and collects all unique reachable node indices.

      *   **`pub fn gc(arena: &Arena<Self>, roots: &[Trie2Index])`**
          Performs garbage collection on the arena. It removes all nodes that are not reachable from the given `roots`.

      *   **`pub fn recompute_all_max_depths(arena: &Arena<Self>, roots: &[Trie2Index])`**
          Recomputes the `max_depth` field for all nodes reachable from `roots`. This is done using a topological sort (Kahn's algorithm) and assumes the graph is acyclic. This should be called after the graph structure is finalized.

      *   **`pub fn recompute_max_depth(&mut self, arena: &Arena<Self>) -> bool`**
          Recomputes the `max_depth` of this single node based on its children's depths. Returns `true` if the depth changed. Does not propagate changes.

      *   **`pub fn has_cycle(arena: &Arena<Self>, roots: impl IntoIterator<Item = Trie2Index>) -> bool`**
          Detects if there are any cycles in the graph reachable from the given `roots` using a depth-first search.

      *   **`pub fn stats(arena: &Arena<Self>, roots: &[Trie2Index]) -> TrieStats`**
          Computes statistics for the graph reachable from the given `roots`. See [`TrieStats`](#struct-triestats) for details.

      ##### Graph Equality
      `impl<EK, EV, T> Trie<EK, EV, T> where EK: Ord + Clone, EV: PartialEq + Clone, T: PartialEq`

      *   **`pub fn are_graphs_equal(...) -> bool`**
          Recursively compares two graphs starting from `a_idx` in `arena_a` and `b_idx` in `arena_b` for deep equality. It correctly handles shared subtrees and cycles.
          ```rust
          pub fn are_graphs_equal(
              arena_a: &Arena<Trie<EK, EV, T>>,
              a_idx: Trie2Index,
              arena_b: &Arena<Trie<EK, EV, T>>,
              b_idx: Trie2Index,
          ) -> bool
          ```

      ##### Path Traversal (Test Utilities)
      `impl<EK, EV, T> where ...`

      *   **`pub fn get_all_paths<F>(...) -> Vec<(T, Vec<(EK, EV, T)>)>`**
          Traverses the graph from `roots` and returns all paths ending in a node that satisfies the `is_end` predicate. This version uses a `visiting` set to stop traversal on cycles.
          ```rust
          pub fn get_all_paths<F>(
              arena: &Arena<Self>,
              roots: &[Trie2Index],
              is_end: F,
          ) -> Vec<(T, Vec<(EK, EV, T)>)>
          where
              F: Fn(Trie2Index, &Trie<EK, EV, T>) -> bool,
              T: Clone,
              EV: Clone,
          ```

      *   **`pub fn get_all_paths_with_cycles<F, G>(...) -> Vec<(T, Vec<(EK, EV, T)>)>`**
          A more advanced path-finding method that correctly handles cycles. It allows nodes to be revisited as long as path constraints are met.
          *   `is_end`: Predicate to identify the end of a valid path.
          *   `is_path_edge`: Predicate to determine if an edge should be counted towards the path length and included in the result. This allows for "transient" edges.
          *   `max_path_length`: The maximum number of "path edges" to explore.
          ```rust
          pub fn get_all_paths_with_cycles<F, G>(
              arena: &Arena<Self>,
              roots: &[Trie2Index],
              is_end: F,
              is_path_edge: G,
              max_path_length: usize,
          ) -> Vec<(T, Vec<(EK, EV, T)>)>
          where
              F: Fn(Trie2Index, &Trie<EK, EV, T>) -> bool,
              G: Fn(&EK, &EV, Trie2Index) -> bool,
              T: Clone,
              EV: Clone,
          ```

      ##### Pretty Printing
      `impl<EK, EV, T> where EK: Ord + Clone + Debug, ...`

      *   **`pub fn pretty_print(arena: &Arena<Self>, roots: &[Trie2Index]) -> String`**
          Pretty-prints the trie structure starting from the given `roots` into a string. Handles shared subtrees and cycles.

      *   **`pub fn pretty_print_arena(arena: &Arena<Self>) -> String`**
          Pretty-prints the entire arena. It automatically identifies root nodes (those with an in-degree of 0) and prints from them.

      *   **`pub fn pretty_print_with_options(...) -> String`**
          Pretty-prints from `roots` using advanced formatting specified by [`PrettyPrintOptions`](#struct-prettyprintoptionsa-ek-ev-t).
          ```rust
          pub fn pretty_print_with_options(
              arena: &Arena<Self>,
              roots: &[Trie2Index],
              options: &PrettyPrintOptions<EK, EV, T>,
          ) -> String
          ```

      *   **`pub fn pretty_print_arena_with_options(...) -> String`**
          Pretty-prints the entire arena with advanced formatting options.
          ```rust
          pub fn pretty_print_arena_with_options(
              arena: &Arena<Self>,
              options: &PrettyPrintOptions<EK, EV, T>,
          ) -> String
          ```

      ##### Deep Copy & Traversal
      `impl<T: Clone, EK: Ord + Clone, EV: Clone> Trie<EK, EV, T>`

      *   **`pub fn deep_copy_subtrees(...) -> (Arena<Self>, Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`**
          Deep copies the subtrees rooted at `roots` from `source_arena` into a **new** `Arena`. Returns the new arena, the new root indices, and a map from old indices to new indices.
          ```rust
          pub fn deep_copy_subtrees(
              source_arena: &Arena<Self>,
              roots: &[Trie2Index],
          ) -> (Arena<Self>, Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)
          ```

      *   **`pub fn deep_copy_subtrees_into(...) -> (Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`**
          Deep copies subtrees from `source_arena` into an **existing** `dest_arena`. Returns the new root indices and the old-to-new index map.
          ```rust
          pub fn deep_copy_subtrees_into(
              source_arena: &Arena<Self>,
              dest_arena: &Arena<Self>,
              roots: &[Trie2Index],
          ) -> (Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)
          ```

      *   **`pub fn special_map<V: Clone>(...)`**
          Performs a specialized, depth-driven breadth-first traversal for propagation or scheduling tasks.
          *   `initial_nodes_and_values`: The starting points for the traversal.
          *   `step`: A closure called for each edge to compute a new value for the child node.
          *   `merge`: A closure to merge multiple incoming values for a single child node.
          *   `process`: A closure called on each node to process its aggregated value and decide whether to continue propagation (`true`) or stop (`false`).
          ```rust
          pub fn special_map<V: Clone>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: impl FnMut(&V, &EK, &EV, &Trie<EK, EV, T>) -> Option<V>,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          )
          ```

      *   **`pub fn special_map_grouped<V, S, I>(...)`**
          A more efficient version of `special_map` for cases where many edges share the same key. The `step` function is called once per group of edges sharing a key, rather than once per edge.
          ```rust
          pub fn special_map_grouped<V, S, I>(
              arena: &Arena<Trie<EK, EV, T>>,
              initial_nodes_and_values: Vec<(Trie2Index, V)>,
              mut step: S,
              mut merge: impl FnMut(&mut V, V),
              mut process: impl FnMut(&Trie<EK, EV, T>, &mut V) -> bool,
          ) where
              V: Clone,
              S: FnMut(&V, &EK, &OrderedHashMap<Trie2Index, EV>) -> I,
              I: IntoIterator<Item = (Trie2Index, V)>,
          ```

      #### Trait Implementations

      *   `JSONConvertible`: Serializes/deserializes the node's local data (`value`, `max_depth`, and `children`). Children are represented by their indices, not recursively expanded.
      *   `PartialEq`, `Eq`: Performs a shallow comparison of `value`, `max_depth`, and the immediate children map.
      *   `PartialOrd`, `Ord`: Provides a total ordering based on `value`, then `max_depth`, then the children map.
      *   `Hash`: Computes a shallow hash based on `value`, `max_depth`, and the immediate children map.

      ### struct `Trie2Index`

      A lightweight, copyable handle to a `Trie` node within an `Arena`. This is the primary way to reference and interact with nodes.

      ```rust
      #[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub struct Trie2Index {
          // index is private
      }
      ```

      #### Methods

      *   **`pub fn new(index: Index) -> Self`**
          Creates a new `Trie2Index` from a lower-level `Index`.

      *   **`pub fn as_usize(self) -> usize`**
          Returns the underlying index as a `usize`.

      *   **`pub fn as_index(self) -> Index`**
          Returns the underlying `Index`.

      *   **`pub fn read<'a, ...>(self, arena: &'a Arena<...>) -> Option<Trie2ReadGuard<'a, ...>>`**
          Acquires a read lock on the arena and returns a read guard for the node at this index. Returns `None` if the index is invalid.

      *   **`pub fn write<'a, ...>(self, arena: &'a Arena<...>) -> Option<Trie2WriteGuard<'a, ...>>`**
          Acquires a write lock on the arena and returns a write guard for the node at this index. Returns `None` if the index is invalid.

      *   **`pub fn from_usize(i: usize) -> Self`**
          Convenience constructor from a `usize`.

      *   **`pub fn insert_edge<'a, ...>(self, ...) -> EdgeInserter<'a, ...>`**
          Creates an `EdgeInserter` to fluently add an edge originating from this node index. See [`EdgeInserter`](#struct-edgeinserter) for details.

      #### Trait Implementations

      *   `Display`: Formats as `Trie2Index(123)`.
      *   `From<Index>`, `From<usize>`: Conversion from underlying index types.
      *   `From<Trie2Index> for Index`, `From<Trie2Index> for usize`: Conversion to underlying index types.
      *   `JSONConvertible`: Serializes the index as a JSON number.

      ### struct `Arena<T>`

      A thread-safe, arena-based allocator for storing objects of type `T` (in this case, `Trie` nodes). It uses an `Arc<RwLock<...>>` internally.

      ```rust
      #[derive(Debug, Clone)]
      pub struct Arena<T> {
          pub(crate) inner: Arc<RwLock<ArenaInner<T>>>,
      }
      ```

      #### Methods

      *   **`pub fn new() -> Self`**
          Creates a new, empty arena.

      *   **`pub fn insert(&self, value: T) -> Index`**
          Inserts a value into the arena at the next available slot and returns its `Index`.

      *   **`pub fn insert_at(&self, index: Index, value: T) -> Option<T>`**
          Inserts or replaces a value at a specific index. Returns the old value if one existed.

      *   **`pub fn remove(&self, index: Index) -> Option<T>`**
          Removes the value at a given index, leaving the slot empty. Returns the removed value.

      *   **`pub fn contains(&self, index: Index) -> bool`**
          Returns `true` if a value exists at the given index.

      *   **`pub fn get(&self, index: Index) -> Option<T>`** (where `T: Clone`)
          Returns a clone of the value at the given index.

      *   **`pub fn with<R>(&self, index: Index, f: impl FnOnce(&T) -> R) -> Option<R>`**
          Provides read-only access to the value at an index via a closure, avoiding a clone.

      *   **`pub fn with_mut<R>(&self, index: Index, f: impl FnOnce(&mut T) -> R) -> Option<R>`**
          Provides mutable access to the value at an index via a closure.

      *   **`pub fn len(&self) -> usize`**
          Returns the number of items currently stored in the arena.

      *   **`pub fn is_empty(&self) -> bool`**
          Returns `true` if the arena contains no items.

      *   **`pub fn clear(&self)`**
          Removes all items from the arena.

      *   **`pub fn indices(&self) -> Vec<Index>`**
          Returns a vector of all valid indices currently in the arena.

      *   **`pub fn to_vec(&self) -> Vec<(Index, T)>`** (where `T: Clone`)
          Returns a vector of `(Index, T)` pairs for all items in the arena.

      *   **`pub fn deep_clone(&self) -> Self`** (where `T: Clone`)
          Creates a completely new `Arena` with a deep copy of the contents.

      #### Methods on `Arena<Trie<...>>`
      `impl<EK, EV, T> Arena<Trie<EK, EV, T>> where EK: Ord + Clone, EV: Clone + MergeableEdgeValue`

      *   **`pub fn insert_edge_simple(&self, src: Trie2Index, dst: Trie2Index, edge_key: EK, edge_value: EV)`**
          A simple method to insert an edge. If the edge already exists, it merges the edge values using the `MergeableEdgeValue` trait.

      *   **`pub fn remove_edge(&self, src: Trie2Index, dst: Trie2Index, edge_key: &EK) -> Option<EV>`**
          Removes the specified edge from `src` to `dst`. Returns the value of the removed edge if it existed.

      #### Trait Implementations

      *   `PartialEq`, `Eq`: Compares two arenas for deep content equality.
      *   `PartialOrd`, `Ord`: Provides a total ordering based on arena content.
      *   `Hash`: Hashes the pointer to the inner data. Note: two arenas with identical content but different allocations will have different hashes.
      *   `JSONConvertible`: Serializes the arena's counter and its list of (index, value) pairs.

