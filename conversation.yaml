              record_metric('FFIRangeSet.__hash__', 1)
              return h

          @staticmethod
          def _merge_unsorted(ranges: Iterable[Tuple[int, int]]) -> List[Tuple[int, int]]:
              """
              Normalizes a list of [start, end] intervals into a sorted, merged, disjoint list of pairs.
