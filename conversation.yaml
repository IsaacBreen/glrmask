                      reduce: Option::<(Reduce, TerminalBV)>::from_json(obj.remove("reduce").ok_or_else(|| "Missing field reduce for DefaultReduce".to_string())?)?,
                  }),
                  _ => Err("Expected JSONNode::Object for DefaultReduce".to_string()),
              }
