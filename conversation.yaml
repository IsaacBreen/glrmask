              map.insert("b_key".to_string(), 20i32);
              map.insert("a_key".to_string(), 10i32);

              let json_node = map.to_json();
              // Expected: [["a_key", Int(10)], ["b_key", Int(20)]] (sorted by key)
              match json_node {
                  JSONNode::Array(pairs) => {
                      assert_eq!(pairs.len(), 2);
