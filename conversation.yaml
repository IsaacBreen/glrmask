          *   [struct `Trie2WriteGuard<'a, EK, EV, T>`](#struct-trie2writeguarda-ek-ev-t)
      3.  [Graph Utilities & Statistics](#graph-utilities--statistics)
          *   [struct `TrieStats`](#struct-triestats)
          *   [struct `PrettyPrintOptions<'a, EK, EV, T>`](#struct-prettyprintoptionsa-ek-ev-t)
      4.  [Edge Manipulation](#edge-manipulation)
          *   [struct `EdgeInserter`](#struct-edgeinserter)
          *   [trait `MergeableEdgeValue`](#trait-mergeableedgevalue)
