                  new_children: Dict[Optional[T], Dict[int, LeveledGSSInner[T]]] = defaultdict(dict)
                  all_keys = c1.keys() | c2.keys()

                  for t in all_keys:
                      by_depth1 = c1.get(t, {})
                      by_depth2 = c2.get(t, {})
                      all_depths = by_depth1.keys() | by_depth2.keys()

                      for d in all_depths:
                          child1 = by_depth1.get(d)
                          child2 = by_depth2.get(d)

