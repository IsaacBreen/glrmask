      - The code tries to reuse from work_queue[next_pos][initial_state], which contains D, causing a self-loop D -> D.

      Two simple and safe fixes
      1) Filter candidates equal to the source
      Right where you build the reuse iterator for dest_nodes_in_queue, filter out the current source node:

      // Before:
      inserter = inserter.try_destinations_iter(
