      It appears my previous fixes introduced a subtle bug in how default transitions were handled during the construction of the per-atom NFAs. The exception set for a default transition was being incorrectly recalculated based on which labeled transitions survived pruning for a given atom, instead of using the original exception set from the NWA. This caused the determinized automaton to follow incorrect paths.

      I will now correct this logic.

      ### Step-by-step Instructions

      The fix is a small but critical change in `src/precompute4/weighted_automata/determinization.rs`.

      1.  **Locate the `PerAtomNFA::from_nwa` function.**
      2.  Inside the main loop that iterates over the NWA states to build the per-atom NFA (`for (new_s, &old_s) in order.iter().enumerate()`), find the section that handles default transitions.
      3.  You will see a commented-out line `let ex_for_def: BTreeSet<i16> = local_ex.keys().copied().collect();`. This was the source of the bug. I will remove it.
      4.  In the loop over `states[old_s].default`, I will change the line that pushes to `def_by_state`. Instead of using a locally computed (and incorrect) exception set, it will now use `def.exceptions.clone()`, which is the correct, original exception set from the NWA's default transition definition.

      This ensures that the semantics of default transitions are correctly preserved in each per-atom NFA, leading to a correctly determinized final DWA.

      ### Git Diff

      Here is the git diff to apply the fix.

      ```diff
      --- a/src/precompute4/weighted_automata/determinization.rs
      +++ b/src/precompute4/weighted_automata/determinization.rs
      @@ -582,14 +582,12 @@
                   }
                   ex_by_state[new_s] = local_ex.clone();
       
      -            let ex_for_def: BTreeSet<i16> = local_ex.keys().copied().collect();
                   for def in &states[old_s].default {
                       let to_old = def.target;
                       if to_old < n_total && live[to_old] && !(&atom_w & &def.weight).is_empty() {
                           let to_new = id_of[to_old];
                           if to_new != usize::MAX {
      -                        def_by_state[new_s].push((to_new, ex_for_def.clone()));
      +                        def_by_state[new_s].push((to_new, def.exceptions.clone()));
                           }
                       }
                   }

      ```
