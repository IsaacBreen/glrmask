      ### 1.5. Complexity and performance discussion

      - Let:
        - `P` = number of productions (~50k),
        - `L` = average RHS length,
        - `N` = number of LR(0) items (bounded by `P * (L+1)`),
        - `S` = number of LR(0) states.

      - **Before:**
        - Each `Item` stores `Arc<Production>`; closure repeatedly constructs `Arc::new(prod.clone())`, so in worst case you allocate O(N) `Production` clones.
        - Each insertion into a `BTreeSet<Item>` involves `O(log N)` comparisons, and each comparison is `O(L)` because comparing two `Production`s compares `lhs` and `rhs` sequences.
        - Stage 4 builds a `BTreeMap<Production, ProductionID>` keyed by `Production`, which again has `O(log P * L)` per insertion and lookup.

      - **After:**
        - `Item` is two `usize`s; no `Production` cloning in automaton code.
        - Each comparison of `Item` is O(1): just compare `(production_id, dot_position)`.
        - Stage 4 maps directly via `ProductionID(item.production_id)`, no `BTreeMap<Production, _>` at all.
        - FIRST/FOLLOW/nullability remain the same asymptotics, but their cost is typically dwarfed by the item‑set construction for large grammars.

      Under a reasonable assumption that your bottleneck was in state construction and reduction mapping, this should reduce CPU and memory by a substantial factor, especially for grammars with many large RHSs.

