          ///
          /// # Example
          ///
          /// ```
          /// # use rustfst::fst_traits::{CoreFst, MutableFst, ExpandedFst};
          /// # use rustfst::fst_impls::VectorFst;
          /// # use rustfst::semirings::{BooleanWeight, Semiring};
