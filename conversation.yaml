                                  # Keep the provided depth (already corresponds to remaining length); to be safe ensure >= 0
                                  key_t: T = kt  # type: ignore[assignment]
                                  depth_int = max(d - 1, 0)
                                  inner_children.setdefault(key_t, {})[depth_int] = _InnerRoot()
                              else:
