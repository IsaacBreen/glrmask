              Raises:
                ValueError: Write failed.
              """
              ret_code = lib.vec_fst_write_file(self.ptr, str(filename).encode("utf-8"))
              err_msg = f"Write failed. file: {filename}"
              check_ffi_error(ret_code, err_msg)

