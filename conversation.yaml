                                matches!(symbol, Symbol::NonTerminal(nt) if nullable_nonterminals.contains(nt))
                            })
                            && !nullable_nonterminals.contains(&production.lhs)
                  {
                      nullable_nonterminals.insert(production.lhs.clone());
                      changed = true;
                  }
              }
