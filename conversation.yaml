      IGNORE ::= WS | COMMENT ;
      WS ::= ( ' ' | '\t' | '\n' | '\r' )+ ;
      COMMENT ::= SINGLE_LINE_COMMENT | MULTI_LINE_COMMENT ;
      SINGLE_LINE_COMMENT ::= '//' ( [^\n\r] )* ; // Non-greedy match
      MULTI_LINE_COMMENT ::= '/*' ( [^*] | '*' [^/] )* '*/' ; // Non-greedy match

      // Statements
      statement_list ::= statement+ ;

      statement ::=
          block
        | declaration_statement
        | if_statement
        | iteration_statement
        | switch_statement
        | with_statement
        | try_statement
        | function_declaration
        | return_statement
        | break_statement
        | continue_statement
        | throw_statement
        | debugger_statement
        | labeled_statement
        | class_declaration
        | import_statement
        | export_statement
        | expression_statement
