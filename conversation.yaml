              .iter()
              .filter_map(|nt| nt_map.get_by_left(nt).copied())
              .collect();

          // 2. Use Vecs indexed by ID for data structures.
          let mut first_sets_by_id: Vec<HashSet<Terminal>> = vec![HashSet::new(); num_nts];
