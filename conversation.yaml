              items = sorted(intervals)
              if not items:
                  return []

              merged: List[Tuple[int, int]] = []
              cs, ce = items[0]
              for ns, ne in items[1:]:
                  if ns <= ce + 1:
                      ce = max(ce, ne)
                  else:
                      merged.append((cs, ce))
                      cs, ce = ns, ne
              merged.append((cs, ce))
              return merged

