                          peeks = []
                          for gss_node in gss_set:
                              peeks.extend(gss_node.popn_fast(int(pop)))
                          time_popn_collect += time.time() - t1
                          hits_popn_collect += 1
                          if not peeks:
                              continue

                          for dest_idx, state_bv in dests:
                              # Filter popped parents by state bitset
                              t1 = time.time()
                              matched = []
                              if not state_bv.is_empty():
                                  for (sid_val, parent_node) in peeks:
                                      if state_bv.contains(sid_val):
                                          matched.append(parent_node)
                              time_filter_peeks += time.time() - t1
                              hits_filter_peeks += 1
                              if not matched:
                                  continue

                              # Merge matched parents
                              t1 = time.time()
                              child_gss_nodes = [g for g in matched]
                              time_merge_matched += time.time() - t1
                              hits_merge_matched += 1
                              if not child_gss_nodes:
                                  continue

                              child_llm_mask = llm_mask
                              if not llm_bv.is_empty():
                                  child_llm_mask = child_llm_mask.intersection(llm_bv)

                              d = int(dest_idx)
