      use std::collections::BTreeMap;
      use std::fmt;
      use std::cmp::Ordering;
      use std::collections::HashSet;

      use bitvec::prelude::*;

      // Represents a node in the VocabPrefixTree
      #[derive(PartialEq)] // Keep derived PartialEq for structural comparison in tests
      pub struct VocabPrefixTreeNode {
          /// The token ID corresponding to the path from the root to this node.
          /// Every node represents a valid token endpoint.
          token_id: usize,
          /// The byte sequence from the root to this node (full prefix).
          prefix: Vec<u8>,
          /// The length of the byte sequence from the root to this node.
          prefix_length: usize,
          /// Children nodes, keyed by the byte vector representing the edge label.
          /// BTreeMap ensures edges are sorted lexicographically by byte vector.
          children: BTreeMap<Vec<u8>, VocabPrefixTreeNode>,
          /// Bit vector indicating all token IDs reachable from or including this node.
          /// The length is max_token_id + 1.
          reachable_token_ids: BitVec,
      }

      impl VocabPrefixTreeNode {
          /// Creates a new node representing a token endpoint.
          fn new(token_id: usize, prefix: Vec<u8>) -> Self {
              let prefix_length = prefix.len();
              VocabPrefixTreeNode {
                  token_id,
                  prefix,
                  prefix_length,
                  children: BTreeMap::new(),
                  // Initialize empty; will be computed after tree structure is built.
                  reachable_token_ids: BitVec::new(),
              }
          }

          /// Returns the token ID corresponding to the path from the root to this node.
          pub fn token_id(&self) -> usize {
              self.token_id
          }

          /// Returns the length of the prefix for this node.
          pub fn prefix_length(&self) -> usize {
              self.prefix_length
          }
          
          /// Returns the prefix byte sequence for this node.
          pub fn prefix(&self) -> &[u8] {
              &self.prefix
          }

          pub fn children(&self) -> &BTreeMap<Vec<u8>, VocabPrefixTreeNode> {
              &self.children
          }

          /// Returns an iterator over the children of this node.
          /// The iterator yields pairs of `(&Vec<u8>, &VocabPrefixTreeNode)`, representing the edge label and the child node.
          pub fn iter_children(&self) -> std::collections::btree_map::Iter<'_, Vec<u8>, VocabPrefixTreeNode> {
              self.children.iter()
          }

          /// Returns a bitvec representing the set of token IDs reachable from this node.
          pub fn reachable_token_ids(&self) -> &BitVec {
              &self.reachable_token_ids
          }
      }

      // Manual implementation of Debug for concise node representation.
      impl fmt::Debug for VocabPrefixTreeNode {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              // Helper to format byte vectors for display, limiting length.
              fn format_bytes(bytes: &[u8]) -> String {
                  const MAX_BYTES_DISPLAY: usize = 10;
                  let display_str = String::from_utf8_lossy(bytes.get(..MAX_BYTES_DISPLAY).unwrap_or(bytes));
                  if bytes.len() > MAX_BYTES_DISPLAY {
                      format!("{}...({} bytes)", display_str, bytes.len())
                  } else {
                      format!("{}", display_str)
                  }
              }

              let mut debug_struct = f.debug_struct("VocabPrefixTreeNode");
              debug_struct.field("token_id", &self.token_id);
              debug_struct.field("prefix_length", &self.prefix_length);

              // Summarize reachable_token_ids for brevity
              let reachable_summary = format!(
                  "{} set bits (len {})",
                  self.reachable_token_ids.count_ones(),
                  self.reachable_token_ids.len()
              );
              debug_struct.field("reachable_token_ids", &reachable_summary);

              // Format children concisely using the helper.
              let children_summary: BTreeMap<String, &VocabPrefixTreeNode> = self
                  .iter_children()            .map(|(k, v)| (format_bytes(k), v))
                  .collect();
              debug_struct.field("children", &children_summary);

              debug_struct.finish()
          }
      }


      /// A vocabulary prefix tree (a specialized radix tree) where every node
      /// corresponds to a valid token ID from the input vocabulary.
      /// Edges are labeled with byte vectors.
      #[derive(Debug, PartialEq)]
      pub struct VocabPrefixTree {
          pub root: VocabPrefixTreeNode,
          /// Flag indicating if the empty string `""` was explicitly provided as a token.
          max_token_id: usize,
          /// The maximum token ID encountered during build, used for BitVec sizing.
          has_empty_string_token: bool,
      }

      impl VocabPrefixTree {
          /// Creates an empty VocabPrefixTree.
          /// The root node is assigned token ID 0 by convention, and it's marked
          /// as not representing an explicit empty string token initially.
          pub fn new() -> Self {
              VocabPrefixTree {
                  // Root node represents the empty prefix (length 0), ID 0 by convention.
                  root: VocabPrefixTreeNode::new(0, Vec::new()),
                  // Initially, assume no empty string token is present.
                  // Max ID is 0 initially, will be updated during build.
                  max_token_id: 0,
                  has_empty_string_token: false,
              }
          }

          /// Builds the VocabPrefixTree from a list of tokens.
          /// Tokens are provided as (token_id, byte_vector) pairs.
          /// The construction algorithm ensures that if token P is a prefix of token Q,
          /// the node for P becomes an ancestor of the node for Q.
          /// If an empty string token "" is provided, its ID overwrites the root's
          /// default ID 0, and the `has_empty_string_token` flag is set.
          pub fn build(tokens: &[(usize, Vec<u8>)]) -> Self {
              let mut tree = VocabPrefixTree::new(); // Root starts with ID 0, flag false

              // Determine the maximum token ID for BitVec sizing.
              // Handle empty input gracefully.
              tree.max_token_id = tokens.iter().map(|(id, _)| *id).max().unwrap_or(0);
                                                     // Root prefix_length is 0
              // 1. Initial population: Add all tokens as direct children of the root.
              //    Each edge uses the full token byte vector as its label, leading
              //    to a leaf node holding the token's ID.
              crate::debug!(2, "Building vocab prefix tree");
              for (id, bytes) in tokens {
                  crate::debug!(3, "Adding token {} with bytes {:?}", id, bytes);
                  if bytes.is_empty() {
                      // Assign the token ID for the empty string directly to the root,
                      // overwriting the default 0 if necessary.
                       tree.root.token_id = *id;
                       // tree.root.prefix_length remains 0, which is correct.
                       // Mark that the root ID now represents an actual token.
                       tree.has_empty_string_token = true;
                      continue;
                  }
                  // Insert node. If duplicate byte vecs exist, the last ID wins due to BTreeMap semantics.
                  // The prefix_length is the length of the full token bytes.
                  let node = VocabPrefixTreeNode::new(*id, bytes.clone());
                  tree.root.children.insert(bytes.clone(), node);
              }

              // 2. Merge nodes recursively starting from the root's children.
              //    This step restructures the tree into the compact radix form
              //    based on shared prefixes that are themselves valid tokens.
              crate::debug!(2, "Merging nodes");
              Self::merge_nodes(&mut tree.root);

              // 3. Compute reachable token IDs for all nodes in a post-order traversal.
              crate::debug!(2, "Computing reachable IDs");
              Self::compute_reachable_ids_recursive(&mut tree.root, tree.max_token_id);
              crate::debug!(2, "Done computing reachable IDs");

              // 4. Adjust root's reachable IDs if its ID 0 is just the convention.
              if !tree.has_empty_string_token && tree.root.token_id == 0 && tree.max_token_id >= 0 && !tree.root.reachable_token_ids.is_empty() {
                  tree.root.reachable_token_ids.set(0, false);
              }

              tree
          }

          /// Recursively merges nodes based on the prefix relationship described.
          /// Assumes `node.children` is sorted lexicographically (guaranteed by BTreeMap).
          fn merge_nodes(node: &mut VocabPrefixTreeNode) {
              if node.children.len() <= 1 {
                  // Base case: No merging needed if 0 or 1 child.
                  // Still need to recurse down in case the single child has children needing merging.
                  for child_node in node.children.values_mut() {
                      Self::merge_nodes(child_node);
                  }
                  return;
              }

              // Take ownership of the children map to rebuild it during the merge process.
              let old_children = std::mem::take(&mut node.children);
              let mut new_children = BTreeMap::new();

              // Use an iterator to process children in sorted byte order.
              let mut iter = old_children.into_iter().peekable();

              while let Some((marker_label, mut marker_node)) = iter.next() {
                  // `marker_node` corresponds to the token `marker_label`.
                  // Check subsequent nodes to see if they should become children of `marker_node`.

                  while let Some((current_label, _)) = iter.peek() {
                      // Check if `current_label` starts with `marker_label`.
                      if current_label.starts_with(&marker_label) {
                          // Yes, the token `current_label` has `marker_label` as a prefix.
                          // Consume the current item from the iterator.
                          let (current_label_owned, current_node) = iter.next().unwrap();

                          // Calculate the suffix: the part of `current_label_owned` after `marker_label`.
                          let suffix = current_label_owned[marker_label.len()..].to_vec();

                          // Add `current_node` as a child of `marker_node` using the suffix as the edge label.
                          if !suffix.is_empty() {
                               marker_node.children.insert(suffix, current_node);
                          } else {
                              // This case implies current_label == marker_label (duplicate token bytes).
                              // The BTreeMap insertion during initial population already handled this
                              // by keeping the last ID. The `marker_node` already represents this token.
                              // We effectively discard the duplicate node structure here.
                              // Log a warning as this might indicate an issue in the input vocabulary.
                               eprintln!("Warning: Duplicate token bytes encountered and merged: {:?}", marker_label);
                          }

                      } else {
                          // No prefix match, this node starts a new group relative to the current parent `node`.
                          // Stop checking against the current `marker_node`.
                          break;
                      }
                  }

                  // After potentially adding children to `marker_node`, recursively merge *its* new children.
                  // This ensures the prefix structure propagates down the tree.
                  Self::merge_nodes(&mut marker_node);

                  // Add the (potentially updated) `marker_node` back into the parent's `new_children` map.
                  new_children.insert(marker_label, marker_node);
              }

              // Replace the original node's children with the newly structured map.
              node.children = new_children;
          }

          /// Recursively computes the `reachable_token_ids` for each node.
          /// This should be called after the tree structure is finalized by `merge_nodes`.
          /// Uses HashSet internally for efficient merging and converts to BitVec at the end.
          fn compute_reachable_ids_recursive(node: &mut VocabPrefixTreeNode, max_token_id: usize) -> HashSet<usize> {
              // Initialize a HashSet to store reachable IDs for the current node.
              let mut current_node_ids_set = HashSet::new();

              // Add the node's own token ID to the set.
              if node.token_id <= max_token_id {
                  current_node_ids_set.insert(node.token_id);
              }

              // Recursively call on children and merge their results.
              for child_node in node.children.values_mut() {
                  // Get the HashSet of reachable IDs from the child.
                  let child_ids_set = Self::compute_reachable_ids_recursive(child_node, max_token_id);
                  // Union the child's reachable IDs into the current node's set.
                  current_node_ids_set.extend(child_ids_set);
              }

              // Convert the final HashSet to a BitVec and store it in the node.
              let mut final_bitvec = bitvec![0; max_token_id + 1];
              for token_id in &current_node_ids_set {
                  final_bitvec.set(*token_id, true);
              }
              node.reachable_token_ids = final_bitvec;

              // Return the HashSet for the parent call to use.
              current_node_ids_set
          }

           /// Finds the token ID corresponding to the exact byte sequence.
           /// Returns `None` if the sequence does not correspond to a token in the tree.
           /// Specifically, searching for the empty string `b""` only succeeds if an
           /// empty string token was explicitly added during the build process.
          pub fn find_token(&self, bytes: &[u8]) -> Option<usize> {
              if bytes.is_empty() {
                  // Only return the root's ID if it represents an actual empty string token.
                  if self.has_empty_string_token {
                      return Some(self.root.token_id);
                  } else {
                      // The root ID (likely 0) is just a convention, not a real token here.
                      return None;
                  }
              }

              let mut current_node = &self.root;
              let mut remaining_bytes = bytes;

              loop {
                  let mut found_match = false;
                  // Iterate through the children of the current node.
                  for (edge_label, child_node) in &current_node.children {
                      if remaining_bytes.starts_with(edge_label) {
                          // Found an edge matching a prefix of the remaining bytes.
                          remaining_bytes = &remaining_bytes[edge_label.len()..];
                          current_node = child_node; // Move down to the child node.
                          found_match = true;
                          break; // Proceed to the next level or check for final match.
                      }
                  }

                  if !found_match {
                      // No child edge matches the start of the remaining bytes.
                      // The full sequence is not present in the tree.
                      return None;
                  }

                  if remaining_bytes.is_empty() {
                      // We have consumed all bytes and landed exactly on `current_node`.
                      // Return its token_id. Every node has one.
                      return Some(current_node.token_id);
                  }
                  // If remaining_bytes is not empty, continue the loop from the new current_node.
              }
          }

          /// Returns `true` if the empty string `""` was provided as a token
          /// during the build process, `false` otherwise.
          pub fn has_empty_string_token(&self) -> bool {
              self.has_empty_string_token
          }

          /// Returns an iterator over the direct children of the root node.
          /// The iterator yields pairs of `(&Vec<u8>, &VocabPrefixTreeNode)`, representing the edge label and the child node.
          pub fn root_children(&self) -> std::collections::btree_map::Iter<'_, Vec<u8>, VocabPrefixTreeNode> {
              self.root.iter_children()
          }

          /// Returns the maximum token ID used to build this tree.
          pub fn max_token_id(&self) -> usize {
              self.max_token_id
          }
      }

      impl Default for VocabPrefixTree {
          fn default() -> Self {
              Self::new()
          }
      }

      // Need Eq to implement Ord
      impl Eq for VocabPrefixTreeNode {}

      impl PartialOrd for VocabPrefixTreeNode {
          fn partial_cmp(&self, other: &Self) -> Option<Ordering> {
              Some(self.cmp(other))
          }
      }

      impl Ord for VocabPrefixTreeNode {
          /// Compares nodes primarily based on `prefix_length` and secondarily on `token_id`.
          /// Note: This ordering ignores the `children` field and is therefore NOT necessarily
          /// consistent with the derived `PartialEq` implementation which compares all fields.
          fn cmp(&self, other: &Self) -> Ordering {
              self.prefix_length.cmp(&other.prefix_length)
                  .then_with(|| self.token_id.cmp(&other.token_id))
          }
      }

      // --- Tests ---
      #[cfg(test)]
      mod tests {
          use super::*;
          use bitvec::prelude::*;

          // Helper to create byte vecs from strings for tests.
          fn b(s: &str) -> Vec<u8> {
              s.as_bytes().to_vec()
          }

          #[test]
          fn test_empty_tree() {
              let tokens: Vec<(usize, Vec<u8>)> = vec![];
              let tree = VocabPrefixTree::build(&tokens);
              assert_eq!(tree.root.token_id, 0); // Root defaults to 0
              assert_eq!(tree.root.prefix_length, 0); // Root length is 0
              assert!(!tree.has_empty_string_token()); // No empty token provided
              assert_eq!(tree.max_token_id(), 0); // Max ID is 0 for empty input
              assert!(tree.root.children.is_empty());
              assert_eq!(tree.find_token(b"a"), None);
              assert_eq!(tree.find_token(b""), None); // Empty query returns None (flag is false)
              // Root's reachable IDs should be empty (bit 0 removed as it's conventional)
              assert!(tree.root.reachable_token_ids.not_any());
          }

          #[test]
          fn test_single_token() {
              let tokens = vec![(1, b("hello"))];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 0); // Root ID remains 0
              assert_eq!(tree.root.prefix_length, 0);
              assert!(!tree.has_empty_string_token()); // No empty token provided
              assert_eq!(tree.max_token_id(), 1);
              assert_eq!(tree.root.children.len(), 1);
              assert!(tree.root.children.contains_key(&b("hello")));

              let node = tree.root.children.get(&b("hello")).unwrap();
              assert_eq!(node.token_id, 1);
              assert_eq!(node.prefix_length, 5); // "hello" has length 5
              assert!(node.children.is_empty());
              // Node "hello" should only have its own ID reachable
              let expected_node_bits = bitvec![0, 1]; // Size max_id + 1 = 2
              assert_eq!(node.reachable_token_ids, expected_node_bits);

              assert_eq!(tree.find_token(&b("hello")), Some(1));
              assert_eq!(tree.find_token(&b("hell")), None);
              assert_eq!(tree.find_token(&b("hello world")), None);
              assert_eq!(tree.find_token(b""), None); // Flag is false

              // Root's reachable IDs should contain only ID 1 (ID 0 is conventional)
              let expected_root_bits = bitvec![0, 1]; // Size max_id + 1 = 2
              assert_eq!(tree.root.reachable_token_ids, expected_root_bits);
          }

           #[test]
          fn test_empty_string_token() {
              // Assign ID 99 to the empty string
              let tokens = vec![(99, b("")), (1, b("a"))];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 99); // Root gets the ID for ""
              assert_eq!(tree.root.prefix_length, 0); // Empty string has length 0
              assert!(tree.has_empty_string_token()); // Empty token WAS provided
              assert_eq!(tree.max_token_id(), 99);
              assert_eq!(tree.root.children.len(), 1);
              assert!(tree.root.children.contains_key(&b("a")));

              let node_a = tree.root.children.get(&b("a")).unwrap();
              assert_eq!(node_a.token_id, 1);
              // Node "a" should only have its own ID reachable
              let mut expected_node_a_bits = bitvec![0; 100]; // Size max_id + 1 = 100
              expected_node_a_bits.set(1, true);
              assert_eq!(node_a.reachable_token_ids, expected_node_a_bits);

              assert_eq!(tree.find_token(&b("")), Some(99)); // Query for "" returns its ID (flag is true)
              assert_eq!(tree.find_token(&b("a")), Some(1));

              // Root's reachable IDs should contain 1 (from child) and 99 (itself)
              let mut expected_root_bits = bitvec![0; 100];
              expected_root_bits.set(1, true);
              expected_root_bits.set(99, true);
              assert_eq!(tree.root.reachable_token_ids, expected_root_bits);
          }

          #[test]
          fn test_empty_string_token_with_id_zero() {
              // Assign ID 0 to the empty string explicitly
              let tokens = vec![(0, b("")), (1, b("a"))];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 0); // Root gets the ID 0 for ""
              assert_eq!(tree.root.prefix_length, 0);
              assert!(tree.has_empty_string_token()); // Empty token WAS provided
              assert_eq!(tree.max_token_id(), 1);
              assert_eq!(tree.root.children.len(), 1);
              assert!(tree.root.children.contains_key(&b("a")));

              let node_a = tree.root.children.get(&b("a")).unwrap();
              assert_eq!(node_a.token_id, 1);
              // Node "a" should only have its own ID reachable
              let expected_node_a_bits = bitvec![0, 1]; // Size max_id + 1 = 2
              assert_eq!(node_a.reachable_token_ids, expected_node_a_bits);

              assert_eq!(tree.find_token(&b("")), Some(0)); // Query for "" returns its ID 0 (flag is true)
              assert_eq!(tree.find_token(&b("a")), Some(1));

              // Root's reachable IDs should contain 1 (from child) and 0 (itself, as it's explicit)
              let mut expected_root_bits = bitvec![0; 2];
              expected_root_bits.set(0, true);
              expected_root_bits.set(1, true);
              assert_eq!(tree.root.reachable_token_ids, expected_root_bits);
          }


          #[test]
          fn test_simple_prefix() {
              // "a" is prefix of "ab"
              let tokens = vec![(1, b("a")), (2, b("ab"))];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 0);
              assert_eq!(tree.root.prefix_length, 0);
              assert!(!tree.has_empty_string_token());
              assert_eq!(tree.max_token_id(), 2);
              assert_eq!(tree.root.children.len(), 1);
              assert!(tree.root.children.contains_key(&b("a")));

              let node_a = tree.root.children.get(&b("a")).unwrap();
              assert_eq!(node_a.token_id, 1);
              assert_eq!(node_a.prefix_length, 1); // "a" length 1
              assert_eq!(node_a.children.len(), 1);
              assert!(node_a.children.contains_key(&b("b")));

              let node_ab = node_a.children.get(&b("b")).unwrap();
              assert_eq!(node_ab.prefix_length, 2); // "ab" length 2
              assert_eq!(node_ab.token_id, 2);
              assert!(node_ab.children.is_empty());
              // Node "ab" reachable IDs: {2}
              let expected_ab_bits = bitvec![0, 0, 1]; // Size 3
              assert_eq!(node_ab.reachable_token_ids, expected_ab_bits);

              // Node "a" reachable IDs: {1, 2}
              let expected_a_bits = bitvec![0, 1, 1]; // Size 3
              assert_eq!(node_a.reachable_token_ids, expected_a_bits);

              assert_eq!(tree.find_token(&b("a")), Some(1));
              assert_eq!(tree.find_token(&b("ab")), Some(2));
              assert_eq!(tree.find_token(&b("b")), None);
              assert_eq!(tree.find_token(&b("abc")), None);
              assert_eq!(tree.find_token(b""), None); // Flag is false

              // Root reachable IDs: {1, 2} (0 is conventional)
              assert_eq!(tree.root.reachable_token_ids, expected_a_bits);
          }

          #[test]
          fn test_multiple_prefixes() {
              // "a", "ab", "abc"
              let tokens = vec![(1, b("a")), (2, b("ab")), (3, b("abc"))];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 0);
              assert_eq!(tree.root.prefix_length, 0);
              assert!(!tree.has_empty_string_token());
              assert_eq!(tree.max_token_id(), 3);
              assert_eq!(tree.root.children.len(), 1);
              let node_a = tree.root.children.get(&b("a")).unwrap();
              assert_eq!(node_a.token_id, 1);
              assert_eq!(node_a.prefix_length, 1);
              assert_eq!(node_a.children.len(), 1);

              let node_ab = node_a.children.get(&b("b")).unwrap();
              assert_eq!(node_ab.token_id, 2);
              assert_eq!(node_ab.prefix_length, 2);
              assert_eq!(node_ab.children.len(), 1);

              let node_abc = node_ab.children.get(&b("c")).unwrap();
              assert_eq!(node_abc.prefix_length, 3);
              assert_eq!(node_abc.token_id, 3);
              assert!(node_abc.children.is_empty());
              // Node "abc" reachable: {3}
              let expected_abc_bits = bitvec![0, 0, 0, 1]; // Size 4
              assert_eq!(node_abc.reachable_token_ids, expected_abc_bits);

              // Node "ab" reachable: {2, 3}
              let expected_ab_bits = bitvec![0, 0, 1, 1]; // Size 4
              assert_eq!(node_ab.reachable_token_ids, expected_ab_bits);

              // Node "a" reachable: {1, 2, 3}
              let expected_a_bits = bitvec![0, 1, 1, 1]; // Size 4
              assert_eq!(node_a.reachable_token_ids, expected_a_bits);

              assert_eq!(tree.find_token(&b("a")), Some(1));
              assert_eq!(tree.find_token(&b("ab")), Some(2));
              assert_eq!(tree.find_token(&b("abc")), Some(3));
              assert_eq!(tree.find_token(&b("b")), None);
              assert_eq!(tree.find_token(&b("abcd")), None);

              // Root reachable: {1, 2, 3}
              assert_eq!(tree.root.reachable_token_ids, expected_a_bits);
              assert_eq!(tree.find_token(b""), None); // Flag is false
          }

          #[test]
          fn test_shared_prefix_branching_where_prefix_is_token() {
              let tokens_with_prefix = vec![(5, b("app")), (10, b("apple")), (20, b("apply"))];
              let tree_with_prefix = VocabPrefixTree::build(&tokens_with_prefix);

              assert_eq!(tree_with_prefix.root.token_id, 0);
              assert_eq!(tree_with_prefix.root.prefix_length, 0);
              assert!(!tree_with_prefix.has_empty_string_token());
              assert_eq!(tree_with_prefix.max_token_id(), 20);
              assert_eq!(tree_with_prefix.root.children.len(), 1);
              assert!(tree_with_prefix.root.children.contains_key(&b("app")));

              let node_app = tree_with_prefix.root.children.get(&b("app")).unwrap();
              assert_eq!(node_app.token_id, 5);
              assert_eq!(node_app.prefix_length, 3); // "app" length 3
              assert_eq!(node_app.children.len(), 2);

              assert!(node_app.children.contains_key(&b("le")));
              let node_apple = node_app.children.get(&b("le")).unwrap();
              assert_eq!(node_apple.token_id, 10);
              assert_eq!(node_apple.prefix_length, 5); // "apple" length 5
              assert!(node_apple.children.is_empty());
              // Node "apple" reachable: {10}
              let mut expected_apple_bits = bitvec![0; 21];
              expected_apple_bits.set(10, true);
              assert_eq!(node_apple.reachable_token_ids, expected_apple_bits);

              assert!(node_app.children.contains_key(&b("ly")));
              let node_apply = node_app.children.get(&b("ly")).unwrap();
              assert_eq!(node_apply.prefix_length, 5); // "apply" length 5
              assert_eq!(node_apply.token_id, 20);
              assert!(node_apply.children.is_empty());
              // Node "apply" reachable: {20}
              let mut expected_apply_bits = bitvec![0; 21];
              expected_apply_bits.set(20, true);
              assert_eq!(node_apply.reachable_token_ids, expected_apply_bits);

              // Node "app" reachable: {5, 10, 20}
              let mut expected_app_bits = bitvec![0; 21];
              expected_app_bits.set(5, true);
              expected_app_bits.set(10, true);
              expected_app_bits.set(20, true);
              assert_eq!(node_app.reachable_token_ids, expected_app_bits);

              assert_eq!(tree_with_prefix.find_token(&b("app")), Some(5));
              assert_eq!(tree_with_prefix.find_token(&b("apple")), Some(10));
              assert_eq!(tree_with_prefix.find_token(&b("apply")), Some(20));
              assert_eq!(tree_with_prefix.find_token(&b("appl")), None);
              assert_eq!(tree_with_prefix.find_token(&b("ap")), None);
              // Root reachable: {5, 10, 20}
              assert_eq!(tree_with_prefix.root.reachable_token_ids, expected_app_bits);
              assert_eq!(tree_with_prefix.find_token(b""), None); // Flag is false
          }

           #[test]
          fn test_shared_prefix_branching_where_prefix_is_not_token() {
              let tokens = vec![(10, b("apple")), (20, b("apply"))];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 0);
              assert_eq!(tree.root.prefix_length, 0);
              assert!(!tree.has_empty_string_token());
              assert_eq!(tree.max_token_id(), 20);
              assert_eq!(tree.root.children.len(), 2);
              assert!(tree.root.children.contains_key(&b("apple")));
              assert!(tree.root.children.contains_key(&b("apply")));

              let node_apple = tree.root.children.get(&b("apple")).unwrap();
              assert_eq!(node_apple.prefix_length, 5);
              assert_eq!(node_apple.token_id, 10);
              assert!(node_apple.children.is_empty());
              // Node "apple" reachable: {10}
              let mut expected_apple_bits = bitvec![0; 21];
              expected_apple_bits.set(10, true);
              assert_eq!(node_apple.reachable_token_ids, expected_apple_bits);

              let node_apply = tree.root.children.get(&b("apply")).unwrap();
              assert_eq!(node_apply.prefix_length, 5);
              assert_eq!(node_apply.token_id, 20);
              assert!(node_apply.children.is_empty());
              // Node "apply" reachable: {20}
              let mut expected_apply_bits = bitvec![0; 21];
              expected_apply_bits.set(20, true);
              assert_eq!(node_apply.reachable_token_ids, expected_apply_bits);

              assert_eq!(tree.find_token(&b("apple")), Some(10));
              assert_eq!(tree.find_token(&b("apply")), Some(20));
              assert_eq!(tree.find_token(&b("app")), None);
              assert_eq!(tree.find_token(&b("appl")), None);

              // Root reachable: {10, 20}
              let mut expected_root_bits = bitvec![0; 21];
              expected_root_bits.set(10, true);
              expected_root_bits.set(20, true);
              assert_eq!(tree.root.reachable_token_ids, expected_root_bits);
              assert_eq!(tree.find_token(b""), None); // Flag is false
          }


          #[test]
          fn test_complex_case() {
              let tokens = vec![
                  (1, b("a")),
                  (2, b("b")),
                  (10, b("ape")),
                  (11, b("apple")),
                  (12, b("apply")),
                  (20, b("banana")),
                  (99, b("")), // Add empty token
              ];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 99); // Root ID set by "" token
              assert_eq!(tree.root.prefix_length, 0);
              assert!(tree.has_empty_string_token()); // Flag is true
              assert_eq!(tree.max_token_id(), 99);
              assert_eq!(tree.root.children.len(), 2);
              assert!(tree.root.children.contains_key(&b("a")));
              assert!(tree.root.children.contains_key(&b("b")));

              // Check branch 'a'
              // The merge logic places nodes whose token is prefixed by another token
              // as children of that prefix token's node.
              // "a" (1) is a token. "ape"(10), "apple"(11), "apply"(12) all start with "a".
              // So, they become children of the node for "a".
              let node_a = tree.root.children.get(&b("a")).unwrap();
              assert_eq!(node_a.token_id, 1);
              assert_eq!(node_a.prefix_length, 1);
              assert_eq!(node_a.children.len(), 3);
              assert!(node_a.children.contains_key(&b("pe")));
              assert!(node_a.children.contains_key(&b("pple")));
              assert!(node_a.children.contains_key(&b("pply")));
              let node_ape = node_a.children.get(&b("pe")).unwrap();
              let node_apple = node_a.children.get(&b("pple")).unwrap();
              let node_apply = node_a.children.get(&b("pply")).unwrap();
              assert_eq!(node_ape.token_id, 10);
              assert_eq!(node_ape.prefix_length, 3); // "ape"
              assert_eq!(node_apple.token_id, 11);
              assert_eq!(node_apple.prefix_length, 5); // "apple"
              assert_eq!(node_apply.token_id, 12);
              assert_eq!(node_apply.prefix_length, 5); // "apply"

              // Node "a" reachable: {1, 10, 11, 12}
              let mut expected_a_bits = bitvec![0; 100];
              expected_a_bits.set(1, true);
              expected_a_bits.set(10, true);
              expected_a_bits.set(11, true);
              expected_a_bits.set(12, true);
              assert_eq!(node_a.reachable_token_ids, expected_a_bits);


              // Check branch 'b'
              let node_b = tree.root.children.get(&b("b")).unwrap();
              assert_eq!(node_b.token_id, 2);
              assert_eq!(node_b.prefix_length, 1);
              assert_eq!(node_b.children.len(), 1);
              assert!(node_b.children.contains_key(&b("anana")));
              assert_eq!(node_b.children.get(&b("anana")).unwrap().token_id, 20);
              let node_banana = node_b.children.get(&b("anana")).unwrap();
              assert_eq!(node_banana.prefix_length, 6); // "banana"

              // Node "b" reachable: {2, 20}
              let mut expected_b_bits = bitvec![0; 100];
              expected_b_bits.set(2, true);
              expected_b_bits.set(20, true);
              assert_eq!(node_b.reachable_token_ids, expected_b_bits);

              // Test lookups
              assert_eq!(tree.find_token(&b("a")), Some(1));
              assert_eq!(tree.find_token(&b("ape")), Some(10));
              assert_eq!(tree.find_token(&b("apple")), Some(11));
              assert_eq!(tree.find_token(&b("apply")), Some(12));
              assert_eq!(tree.find_token(&b("b")), Some(2));
              assert_eq!(tree.find_token(&b("banana")), Some(20));
              assert_eq!(tree.find_token(&b("app")), None);
              assert_eq!(tree.find_token(&b("ban")), None);
              assert_eq!(tree.find_token(&b("c")), None);

              // Root reachable: {1, 2, 10, 11, 12, 20, 99}
              let mut expected_root_bits = bitvec![0; 100];
              expected_root_bits.set(1, true);
              expected_root_bits.set(2, true);
              expected_root_bits.set(10, true);
              expected_root_bits.set(11, true);
              expected_root_bits.set(12, true);
              expected_root_bits.set(20, true);
              expected_root_bits.set(99, true);
              assert_eq!(tree.find_token(b""), Some(99)); // Query for "" returns its ID (flag is true)
          }

           #[test]
          fn test_duplicate_token_bytes() {
              let tokens = vec![(1, b("a")), (2, b("ab")), (3, b("a"))];
              let tree = VocabPrefixTree::build(&tokens);

              assert_eq!(tree.root.token_id, 0);
              assert_eq!(tree.root.prefix_length, 0);
              assert!(!tree.has_empty_string_token());
              assert_eq!(tree.max_token_id(), 3);
              assert_eq!(tree.root.children.len(), 1);
              assert!(tree.root.children.contains_key(&b("a")));

              let node_a = tree.root.children.get(&b("a")).unwrap();
              assert_eq!(node_a.token_id, 3); // Last ID wins
              assert_eq!(node_a.prefix_length, 1); // Length of "a"
              assert_eq!(node_a.children.len(), 1);

              assert!(node_a.children.contains_key(&b("b")));
              let node_ab = node_a.children.get(&b("b")).unwrap();
              assert_eq!(node_ab.prefix_length, 2); // Length of "ab"
              assert_eq!(node_ab.token_id, 2);
              assert!(node_ab.children.is_empty());
              // Node "ab" reachable: {2}
              let expected_ab_bits = bitvec![0, 0, 1, 0]; // Size 4
              assert_eq!(node_ab.reachable_token_ids, expected_ab_bits);

              // Node "a" reachable: {2, 3} (ID 1 was overwritten)
              let expected_a_bits = bitvec![0, 0, 1, 1]; // Size 4
              assert_eq!(node_a.reachable_token_ids, expected_a_bits);

              assert_eq!(tree.find_token(&b("a")), Some(3));
              assert_eq!(tree.find_token(&b("ab")), Some(2));
              // Root reachable: {2, 3}
              assert_eq!(tree.root.reachable_token_ids, expected_a_bits);
              assert_eq!(tree.find_token(b""), None); // Flag is false
          }

          #[test]
          fn test_children_iteration() {
              let tokens = vec![
                  (1, b("a")),
                  (2, b("b")),
                  (10, b("ape")),
                  (20, b("banana")),
              ];
              let tree = VocabPrefixTree::build(&tokens);

              // Iterate root children
              let mut root_children_iter = tree.root_children();

              let (edge_a, node_a_ref) = root_children_iter.next().unwrap();
              assert_eq!(edge_a, &b("a"));
              assert_eq!(node_a_ref.token_id, 1);
              assert_eq!(node_a_ref.prefix_length, 1);

              let (edge_b, node_b_ref) = root_children_iter.next().unwrap();
              assert_eq!(edge_b, &b("b"));
              assert_eq!(node_b_ref.token_id, 2);
              assert_eq!(node_b_ref.prefix_length, 1);

              assert!(root_children_iter.next().is_none()); // Only 'a' and 'b' are direct children of root

              // Iterate children of node 'a'
              let mut node_a_children_iter = node_a_ref.iter_children();
              let (edge_pe, node_ape_ref) = node_a_children_iter.next().unwrap();
              assert_eq!(edge_pe, &b("pe"));
              assert_eq!(node_ape_ref.token_id, 10);
              assert_eq!(node_ape_ref.prefix_length, 3); // "ape"
              assert!(node_a_children_iter.next().is_none());

              // Iterate children of node 'b'
              let mut node_b_children_iter = node_b_ref.iter_children();
              let (edge_anana, node_banana_ref) = node_b_children_iter.next().unwrap();
              assert_eq!(edge_anana, &b("anana"));
              assert_eq!(node_banana_ref.token_id, 20);
              assert_eq!(node_banana_ref.prefix_length, 6); // "banana"
              assert!(node_b_children_iter.next().is_none());
          }
      }

    src/finite_automata.rs: |
      use crate::datastructures::charmap::TrieMap;
      use crate::datastructures::frozenset::FrozenSet;
      use crate::datastructures::u8set::U8Set;
      use std::collections::{BTreeMap, BTreeSet};
      use std::fmt::{Debug, Formatter};

      pub type GroupID = usize;

      #[derive(Debug, Clone)]
      pub struct NFAState {
          transitions: TrieMap<Vec<usize>>,
          epsilon_transitions: Vec<usize>,
          finalizers: BTreeSet<GroupID>,
          non_greedy_finalizers: BTreeSet<GroupID>,
      }

      #[derive(Clone)]
      pub struct NFA {
          states: Vec<NFAState>,
          start_state: usize,
      }

      #[derive(Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct DFAState {
          pub transitions: TrieMap<usize>,
          pub finalizers: BTreeSet<GroupID>,
          pub possible_future_group_ids: BTreeSet<GroupID>,
          pub group_id_to_u8set: BTreeMap<GroupID, U8Set>,
      }

      #[derive(Clone, PartialEq, Eq, PartialOrd, Ord)]
      pub struct DFA {
          pub states: Vec<DFAState>,
          pub start_state: usize,
          pub non_greedy_finalizers: BTreeSet<GroupID>,
      }

      // TODO: should this *really* derive `Clone`? Users probably shouldn't clone this, should they?
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct Regex {
          pub dfa: DFA,
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct Match {
          pub group_id: GroupID,
          pub position: usize,
      }

      #[derive(Debug, Clone, PartialEq, Eq, Default)]
      pub struct FinalStateReport {
          pub position: usize,
          pub matches: BTreeMap<GroupID, usize>, // GroupID to position
      }

      #[derive(Clone, Debug, PartialEq, Eq)]
      pub struct RegexState<'a> {
          pub regex: &'a Regex,
          pub position: usize,
          pub current_state: usize,
          pub matches: BTreeMap<GroupID, usize>, // Publicly accessible matches (GroupID to position)
          pub done: bool,
      }

      #[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]
      pub enum Expr {
          U8Seq(Vec<u8>),
          U8Class(U8Set),
          Quantifier(Box<Expr>, QuantifierType),
          Choice(Vec<Expr>),
          Seq(Vec<Expr>),
          Epsilon, // Explicit epsilon transition
      }

      #[derive(Debug, Clone, Eq, PartialEq, PartialOrd, Ord, Hash)]
      pub enum QuantifierType {
          ZeroOrMore, // *
          OneOrMore,  // +
          ZeroOrOne,  // ?
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct ExprGroup {
          pub expr: Expr,
          pub is_non_greedy: bool,
      }

      #[derive(Debug, Clone)]
      pub struct ExprGroups {
          pub groups: Vec<ExprGroup>,
      }

      impl From<Expr> for ExprGroup {
          fn from(expr: Expr) -> Self {
              ExprGroup { expr, is_non_greedy: false }
          }
      }

      impl From<Expr> for ExprGroups {
          fn from(expr: Expr) -> Self {
              ExprGroups { groups: vec![ExprGroup { expr, is_non_greedy: false }] }
          }
      }

      pub fn eat_u8(c: u8) -> Expr {
          Expr::U8Seq(vec![c])
      }

      pub fn eat_u8_negation(c: u8) -> Expr {
          Expr::U8Seq(vec![c ^ 0xff])
      }

      pub fn eat_u8_set(u8s: U8Set) -> Expr {
          Expr::U8Class(u8s)
      }

      pub fn rep<T: Into<Expr>>(expr: T) -> Expr {
          Expr::Quantifier(Box::new(expr.into()), QuantifierType::ZeroOrMore)
      }

      pub fn rep1<T: Into<Expr>>(expr: T) -> Expr {
          Expr::Quantifier(Box::new(expr.into()), QuantifierType::OneOrMore)
      }

      pub fn opt<T: Into<Expr>>(expr: T) -> Expr {
          Expr::Quantifier(Box::new(expr.into()), QuantifierType::ZeroOrOne)
      }

      pub fn prec<T: Into<Expr>>(_precedence: isize, expr: T) -> ExprGroup {
          ExprGroup { expr: expr.into(), is_non_greedy: false }
      }

      pub fn eps() -> Expr {
          Expr::Epsilon
      }

      pub fn _seq(exprs: Vec<Expr>) -> Expr {
          Expr::Seq(exprs)
      }

      pub fn _choice(exprs: Vec<Expr>) -> Expr {
          Expr::Choice(exprs)
      }

      #[macro_export]
      macro_rules! choice {
          ($($expr:expr),* $(,)?) => {
              $crate::finite_automata::Expr::Choice(vec![$($expr.into()),*])
          };
      }

      #[macro_export]
      macro_rules! seq {
          ($($expr:expr),* $(,)?) => {
              $crate::finite_automata::Expr::Seq(vec![$($expr.into()),*])
          };
      }

      #[macro_export]
      macro_rules! groups {
          ($($expr:expr),* $(,)?) => {
              $crate::finite_automata::groups(vec![$($expr.into()),*])
          };
      }

      pub fn groups(groups: Vec<ExprGroup>) -> ExprGroups {
          ExprGroups { groups }
      }

      pub fn greedy_group<T: Into<ExprGroup>>(expr: T) -> ExprGroup {
          expr.into()
      }

      pub fn non_greedy_group<T: Into<ExprGroup>>(expr: T) -> ExprGroup {
          let mut group = expr.into();
          group.is_non_greedy = true;
          group
      }

      impl Debug for NFA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              f.write_str("Regex State NFA:\n")?;

              for (state_index, state) in self.states.iter().enumerate() {
                  f.write_str(&format!("State {}:\n", state_index))?;

                  for (transition_u8, next_states) in &state.transitions {
                      f.write_str(&format!("  - '{}': {:?}\n", transition_u8, next_states))?;
                  }

                  for next_state in &state.epsilon_transitions {
                      f.write_str(&format!("  - Epsilon: {}\n", next_state))?;
                  }

                  if !state.finalizers.is_empty() {
                      f.write_str(&format!("  - Finalizers: {:?}\n", state.finalizers))?;
                  }

                  if !state.non_greedy_finalizers.is_empty() {
                      f.write_str(&format!("  - Non-Greedy Finalizers: {:?}\n", state.non_greedy_finalizers))?;
                  }
              }

              Ok(())
          }
      }

      impl Debug for DFA {
          fn fmt(&self, f: &mut Formatter<'_>) -> std::fmt::Result {
              f.write_str("Regex State DFA:\n")?;

              for (state_index, state) in self.states.iter().enumerate() {
                  f.write_str(&format!("State {}:\n", state_index))?;

                  for (transition_u8, next_state) in &state.transitions {
                      f.write_str(&format!("  - {} ({:?}): {}\n", transition_u8, transition_u8 as char, next_state))?;
                  }

                  if !state.finalizers.is_empty() {
                      f.write_str(&format!("  - Finalizers: {:?}\n", state.finalizers))?;
                  }

                  if !state.possible_future_group_ids.is_empty() {
                      f.write_str(&format!("  - Possible Future Group IDs: {:?}\n", state.possible_future_group_ids))?;
                  }

                  if !state.group_id_to_u8set.is_empty() {
                      f.write_str("  - Group ID to U8Set:\n")?;
                      for (group_id, u8set) in &state.group_id_to_u8set {
                          f.write_str(&format!("    - Group {}: {}\n", group_id, u8set))?;
                      }
                  }
              }

              Ok(())
          }
      }

      impl NFAState {
          pub fn new() -> NFAState {
              NFAState {
                  transitions: TrieMap::new(),
                  epsilon_transitions: Vec::new(),
                  finalizers: BTreeSet::new(),
                  non_greedy_finalizers: BTreeSet::new(),
              }
          }
      }

      impl ExprGroups {
          pub fn build(self) -> Regex {
              let mut dfa = self.build_nfa().to_dfa();
              dfa.minimize();
              Regex { dfa }
          }

          fn build_nfa(self) -> NFA {
              let mut nfa = NFA {
                  states: vec![NFAState::new()],
                  start_state: 0,
              };

              for (group, ExprGroup { expr, is_non_greedy }) in self.groups.into_iter().enumerate() {
                  let end_state = Expr::handle_expr(expr, &mut nfa, 0);
                  if is_non_greedy {
                      nfa.states[end_state].finalizers.insert(group);
                      // Additionally, track that this finalizer is non-greedy
                      nfa.states[end_state].non_greedy_finalizers.insert(group);
                  } else {
                      nfa.states[end_state].finalizers.insert(group);
                  }
              }

              nfa
          }
      }

      impl Expr {
          pub fn build(self) -> Regex {
              ExprGroups { groups: vec![ExprGroup { expr: self, is_non_greedy: false }] }.build()
          }

          fn handle_expr(expr: Expr, nfa: &mut NFA, mut current_state: usize) -> usize {
              match expr {
                  Expr::U8Seq(u8s) => {
                      let mut next_state = current_state;
                      for c in u8s {
                          let new_state = nfa.add_state();
                          nfa.add_transition(next_state, c, new_state);
                          next_state = new_state;
                      }
                      next_state
                  }
                  Expr::U8Class(u8s) => {
                      let new_state = nfa.add_state();
                      for ch in u8s.iter() {
                          nfa.add_transition(current_state, ch, new_state);
                      }
                      new_state
                  }
                  Expr::Quantifier(expr, quantifier_type) => {
                      match quantifier_type {
                          QuantifierType::ZeroOrMore => {
                              let loop_start_state = nfa.add_state();
                              let loop_end_state = nfa.add_state();

                              // Epsilon transition from current state to loop start state
                              nfa.add_epsilon_transition(current_state, loop_start_state);

                              // Process the expr
                              let expr_end_state = Self::handle_expr(*expr, nfa, loop_start_state);

                              // Epsilon transition from expr end state back to loop start state for repetition
                              nfa.add_epsilon_transition(expr_end_state, loop_start_state);

                              // Epsilon transition from loop start state to loop end state to allow skipping
                              nfa.add_epsilon_transition(loop_start_state, loop_end_state);

                              // The loop end state becomes the new current state
                              loop_end_state
                          }
                          QuantifierType::OneOrMore => {
                              let loop_start_state = nfa.add_state();

                              // Process the expr first to ensure at least one occurrence
                              let expr_end_state = Self::handle_expr(*expr, nfa, current_state);

                              // Epsilon transition from expr end state back to loop start state for repetition
                              nfa.add_epsilon_transition(expr_end_state, loop_start_state);

                              // Epsilon transition from loop start state back to expr start state to allow repetition
                              nfa.add_epsilon_transition(loop_start_state, current_state);

                              // The expr end state becomes the new current state
                              expr_end_state
                          }
                          QuantifierType::ZeroOrOne => {
                              let optional_end_state = nfa.add_state();

                              // Epsilon transition from current state to optional end state to allow skipping
                              nfa.add_epsilon_transition(current_state, optional_end_state);

                              // Process the expr
                              let expr_end_state = Self::handle_expr(*expr, nfa, current_state);

                              // Epsilon transition from expr end state to optional end state
                              nfa.add_epsilon_transition(expr_end_state, optional_end_state);

                              // The optional end state becomes the new current state
                              optional_end_state
                          }
                      }
                  }
                  Expr::Choice(exprs) => {
                      let choice_start_state = nfa.add_state(); // New start state for choice
                      let choice_end_state = nfa.add_state();   // New end state for choice

                      // Epsilon transition from the current state to the start state of the choice
                      nfa.add_epsilon_transition(current_state, choice_start_state);

                      for expr in exprs {
                          // For each expr, connect the start state of the choice to the start state of the expr
                          let expr_start_state = nfa.add_state();
                          nfa.add_epsilon_transition(choice_start_state, expr_start_state);

                          // Process the expr and get its end state
                          let expr_end_state = Self::handle_expr(expr, nfa, expr_start_state);

                          // Connect the end state of the expr to the end state of the choice
                          nfa.add_epsilon_transition(expr_end_state, choice_end_state);
                      }

                      // The end state of the choice becomes the new current state
                      choice_end_state
                  }
                  Expr::Seq(exprs) => {
                      for expr in exprs {
                          current_state = Self::handle_expr(expr, nfa, current_state);
                      }
                      current_state
                  }
                  Expr::Epsilon => {
                      let new_state = nfa.add_state();
                      nfa.add_epsilon_transition(current_state, new_state);
                      new_state
                  }
              }
          }
      }

      impl NFA {
          pub fn add_state(&mut self) -> usize {
              let new_index = self.states.len();
              self.states.push(NFAState::new());
              new_index
          }

          pub fn add_transition(&mut self, from: usize, on_u8: u8, to: usize) {
              self.states[from]
                  .transitions
                  .entry(on_u8)
                  .or_insert_with(Vec::new)
                  .push(to);
          }

          pub fn add_epsilon_transition(&mut self, from: usize, to: usize) {
              self.states[from].epsilon_transitions.push(to);
          }

          pub fn to_dfa(self) -> DFA {
              let mut dfa_states: Vec<DFAState> = Vec::new();
              let mut dfa_state_map: BTreeMap<FrozenSet<usize>, usize> = BTreeMap::new();
              let mut worklist: Vec<FrozenSet<usize>> = Vec::new();

              let mut epsilon_closures = self.compute_epsilon_closures();

              // Compute the epsilon closure of the NFA start state and use it as the DFA start state
              let start_closure = epsilon_closures[self.start_state].clone();
              let start_state_set = FrozenSet::from_iter(start_closure.iter().cloned());
              worklist.push(start_state_set.clone());
              dfa_state_map.insert(start_state_set.clone(), 0);

              // Initialize the first DFA state
              let closure = epsilon_closures[self.start_state].clone();
              let mut finalizers = BTreeSet::new();
              let mut non_greedy_finalizers = BTreeSet::new();
              for &state in &closure {
                  finalizers.extend(self.states[state].finalizers.iter().cloned());
                  non_greedy_finalizers.extend(self.states[state].non_greedy_finalizers.iter().cloned());
              }

              dfa_states.push(DFAState {
                  transitions: TrieMap::new(),
                  finalizers,
                  possible_future_group_ids: BTreeSet::new(), // Will be computed later
                  group_id_to_u8set: BTreeMap::new(),  // Will be computed later
              });

              while let Some(current_set) = worklist.pop() {
                  let current_dfa_state = *dfa_state_map.get(&current_set).unwrap();
                  let mut transition_map: BTreeMap<u8, BTreeSet<usize>> = BTreeMap::new();

                  // For each state in the current DFA state, look at the NFA transitions
                  for &state in current_set.iter() {
                      for (input, next_states) in &self.states[state].transitions {
                          for &next_state in next_states {
                              transition_map
                                  .entry(input)
                                  .or_insert_with(BTreeSet::new)
                                  .insert(next_state);
                          }
                      }
                  }

                  // For each transition, compute the epsilon closure of the resulting state set
                  for (&input_u8, next_states) in &transition_map {
                      let mut closure = BTreeSet::new();
                      for &next_state in next_states {
                          closure.extend(&epsilon_closures[next_state]);
                      }
                      let frozen_closure = FrozenSet::from_iter(closure.iter().cloned());

                      // If this set of states is new, add it as a new DFA state
                      let next_dfa_state = if let Some(&existing_state) = dfa_state_map.get(&frozen_closure) {
                          existing_state
                      } else {
                          let new_state_index = dfa_states.len();
                          dfa_state_map.insert(frozen_closure.clone(), new_state_index);
                          worklist.push(frozen_closure.clone());

                          // Compute finalizers for the new DFA state
                          let mut new_finalizers = BTreeSet::new();
                          let mut new_non_greedy_finalizers = BTreeSet::new();
                          for &state in closure.iter() {
                              new_finalizers.extend(self.states[state].finalizers.iter().cloned());
                              new_non_greedy_finalizers.extend(self.states[state].non_greedy_finalizers.iter().cloned());
                          }

                          dfa_states.push(DFAState {
                              transitions: TrieMap::new(),
                              finalizers: new_finalizers,
                              possible_future_group_ids: BTreeSet::new(), // Will be computed later
                              group_id_to_u8set: BTreeMap::new(),  // Will be computed later
                          });

                          new_state_index
                      };

                      // Insert the transition into the DFA state
                      dfa_states[current_dfa_state].transitions.insert(input_u8, next_dfa_state);
                  }
              }

              let mut dfa = DFA {
                  states: dfa_states,
                  start_state: 0,
                  non_greedy_finalizers: BTreeSet::new(),
              };

              for state in &self.states {
                  dfa.non_greedy_finalizers.extend(state.non_greedy_finalizers.iter().cloned());
              }

              dfa.compute_possible_future_group_ids();
              dfa.compute_group_id_to_u8set();

              dfa
          }

          fn epsilon_closure(&self, state: usize) -> BTreeSet<usize> {
              let mut closure = BTreeSet::new();
              let mut stack = vec![state];

              while let Some(state) = stack.pop() {
                  if closure.insert(state) {
                      stack.extend(&self.states[state].epsilon_transitions);
                  }
              }

              closure
          }

          fn compute_epsilon_closures(&self) -> Vec<BTreeSet<usize>> {
              (0..self.states.len())
                  .map(|state| self.epsilon_closure(state))
                  .collect()
          }
      }

      impl DFA {
          pub fn compute_possible_future_group_ids(&mut self) {
              // Initialize possible_future_group_ids as empty. We only want to include
              // group IDs reachable via *future* transitions.
              for state in &mut self.states {
                  state.possible_future_group_ids = BTreeSet::new();
              }

              loop {
                  let mut changed = false;
                  for state_index in 0..self.states.len() {
                      let state = self.states[state_index].clone(); // Clone to avoid borrow checker issues
                      for (_input, &next_state_index) in &state.transitions {
                          let next_possible_future_groups = self.states[next_state_index].possible_future_group_ids.clone();
                          let next_finalizers = self.states[next_state_index].finalizers.clone();
                          let state_possible_future_groups = &mut self.states[state_index].possible_future_group_ids;

                          let old_len = state_possible_future_groups.len();
                          state_possible_future_groups.extend(next_finalizers.iter()); // Add finalizers of the *next* state
                          state_possible_future_groups.extend(next_possible_future_groups.iter());

                          if state_possible_future_groups.len() > old_len {
                              changed = true;
                          }
                      }
                  }
                  if !changed {
                      break;
                  }
              }
          }

          pub fn compute_group_id_to_u8set(&mut self) {
              // Create the vector of possible future group IDs within a block scope, cloning the data
              let possible_current_or_future_group_ids: Vec<BTreeSet<GroupID>> = {
                  self.states.iter().map(|state| &state.possible_future_group_ids | &state.finalizers).collect()
              };

              // Now that the block has ended, there are no borrows of self.states
              for state in self.states.iter_mut() {
                  let mut group_id_to_u8set: BTreeMap<GroupID, U8Set> = BTreeMap::new();

                  for (input_u8, &next_state_index) in &state.transitions {
                      let next_possible_current_or_future_group_ids = &possible_current_or_future_group_ids[next_state_index];

                      for &group_id in next_possible_current_or_future_group_ids {
                          group_id_to_u8set
                              .entry(group_id)
                              .or_insert_with(U8Set::none)
                              .insert(input_u8);
                      }
                  }

                  state.group_id_to_u8set = group_id_to_u8set;
              }
          }

          fn remove_unreachable_states(&mut self) {
              // Find reachable states using BFS
              let mut reachable = vec![false; self.states.len()];
              let mut queue = vec![self.start_state];
              reachable[self.start_state] = true;

              while let Some(state) = queue.pop() {
                  for &next_state in self.states[state].transitions.values() {
                      if !reachable[next_state] {
                          reachable[next_state] = true;
                          queue.push(next_state);
                      }
                  }
              }

              // Create mapping from old indices to new indices
              let mut state_mapping = vec![0; self.states.len()];
              let mut new_index = 0;
              for (old_index, &is_reachable) in reachable.iter().enumerate() {
                  if is_reachable {
                      state_mapping[old_index] = new_index;
                      new_index += 1;
                  }
              }

              // Keep only reachable states and update transitions
              let mut new_states = Vec::new();
              for (old_index, state) in self.states.iter().enumerate() {
                  if reachable[old_index] {
                      let mut new_state = state.clone();
                      // Update transitions to use new state indices
                      new_state.transitions = new_state.transitions
                          .iter()
                          .map(|(u8, &next)| (u8, state_mapping[next]))
                          .collect();
                      new_states.push(new_state);
                  }
              }

              // Update the DFA
              self.states = new_states;
              // Start state remains at 0 since it's always reachable
              self.start_state = 0;
          }

          fn minimize(&mut self) {
              if self.states.is_empty() {
                  return;
              }

              // Step 1: Create initial partition based on finalizers and transitions
              let mut partitions = BTreeMap::<(BTreeSet<GroupID>, BTreeMap<u8, usize>), BTreeSet<usize>>::new();

              for (state_idx, state) in self.states.iter().enumerate() {
                  let key = (
                      state.finalizers.clone(),
                      state.transitions.iter().map(|(u8, &next)| (u8, next)).collect()
                  );
                  partitions.entry(key).or_default().insert(state_idx);
              }

              // Step 2: Refine partitions until no more refinement is possible
              let mut partition_list: Vec<BTreeSet<usize>> = partitions.into_values().collect();
              let mut changed = true;
              while changed {
                  changed = false;
                  let mut new_partitions = Vec::new();

                  for partition in &partition_list {
                      let mut refined_partitions = BTreeMap::new();

                      for &state in partition {
                          let mut signature = BTreeMap::new();

                          // For each transition, record which partition it leads to
                          for (u8, &next_state) in &self.states[state].transitions {
                              let target_partition = new_partitions.iter()
                                  .chain(partition_list.iter())
                                  .position(|p| p.contains(&next_state))
                                  .unwrap_or(usize::MAX);
                              signature.insert(u8, target_partition);
                          }

                          refined_partitions.entry(signature)
                              .or_insert_with(BTreeSet::new)
                              .insert(state);
                      }

                      if refined_partitions.len() > 1 {
                          changed = true;
                          new_partitions.extend(refined_partitions.into_values());
                      } else {
                          new_partitions.push(partition.clone());
                      }
                  }

                  partition_list = new_partitions;
              }

              // Step 3: Build the minimized DFA
              let mut state_mapping = vec![0; self.states.len()];

              // Find which partition contains the start state
              let start_partition_idx = partition_list.iter()
                  .position(|p| p.contains(&self.start_state))
                  .unwrap();

              // Ensure the start partition is first in the list
              if start_partition_idx != 0 {
                  partition_list.swap(0, start_partition_idx);
              }

              // Build state mapping
              for (new_state, partition) in partition_list.iter().enumerate() {
                  for &old_state in partition {
                      state_mapping[old_state] = new_state;
                  }
              }

              let mut new_states = Vec::with_capacity(partition_list.len());
              for partition in &partition_list {
                  let old_state = partition.iter().next().unwrap();
                  let mut new_state = self.states[*old_state].clone();

                  // Update transitions according to the new state mapping
                  new_state.transitions = new_state.transitions
                      .iter()
                      .map(|(u8, &next)| (u8, state_mapping[next]))
                      .collect();

                  new_states.push(new_state);
              }

              // The start state should now be at index 0
              self.start_state = 0;
              self.states = new_states;
              self.remove_unreachable_states();

              // Recompute metadata
              self.compute_possible_future_group_ids();
              self.compute_group_id_to_u8set();
          }
      }

      impl RegexState<'_> {
          pub fn execute(&mut self, text: &[u8]) {
              if self.done {
                  self.position += text.len();
                  return;
              }
              let dfa = &self.regex.dfa;
              let mut local_position = 0;
              while local_position < text.len() {
                  let state_data = &dfa.states[self.current_state];
                  let next_u8 = text[local_position];
                  if let Some(&next_state) = state_data.transitions.get(next_u8) {
                      self.current_state = next_state;
                      local_position += 1;
                      // Handle greedy finalizers
                      for &group_id in &dfa.states[self.current_state].finalizers {
                          if dfa.non_greedy_finalizers.contains(&group_id) {
                              self.matches.entry(group_id).or_insert(self.position + local_position);
                          } else {
                              // Overwrite existing match for greedy groups
                              self.matches.insert(group_id, self.position + local_position);
                          }
                      }

                      // Check for early termination. Only continue if it's possible to match either:
                      // - a greedy group, or
                      // - a non-greedy group that has not been matched yet
                      let matched: BTreeSet<GroupID> = self.matches.keys().cloned().collect();
                      let excluded: BTreeSet<GroupID> = matched.intersection(&dfa.non_greedy_finalizers).cloned().collect();
                      let should_terminate = dfa.states[self.current_state].possible_future_group_ids.difference(&excluded).next().is_none();

                      if should_terminate {
                          self.position += text.len();
                          self.done = true;
                          return;
                      }
                  } else {
                      // No matching transition, we're done
                      self.position += text.len();
                      self.done = true;
                      return;
                  }
              }
              // Reached the end of input, mark as done if no further transitions
              self.position += text.len();
              if dfa.states[self.current_state].transitions.is_empty() {
                  self.done = true;
              }
          }

          pub fn end(&mut self) {
              self.done = true;
          }

          pub fn ended(&self) -> bool {
              self.done
          }

          pub fn reset(&mut self) {
              self.current_state = self.regex.dfa.start_state;
              self.matches.clear();
              self.position = 0;
              self.done = false;
          }

          /// Matches repeatedly, resolving ambiguity in the following way:
          /// 1. If it's still possible to match something, stop. Don't return a result for the final match, since we can't rule out the possibility of a longer match.
          /// 2. Otherwise, if there is more than one match, return the longest match.
          /// 3. If there is more than one match of this length, return the one with the lowest group ID.
          pub fn greedy_find_all(&mut self, text: &[u8], terminate: bool) -> Vec<Match> {
              let mut matches: Vec<Match> = Vec::new();
              let start_position = self.position;
              let mut local_position = 0;
              self.position = 0;
              loop {
                  self.execute(&text[local_position..]);
                  if self.ended() {
                      if let Some(m) = self.get_greedy_match() {
                          // Advance the local position to the end of the match.
                          local_position += m.position;

                          // Add the match to the list of successful matches.
                          matches.push(m);

                          // Reset the state and advance the internal position.
                          self.reset();
                      } else {
                          // Ended but no match. This indicates a tokenization error.
                          // Return the successful matches.
                          self.position = start_position + local_position;
                          return matches;
                      }
                  } else {
                      // Didn't end. We must have run out of input.
                      // If we're supposed to terminate, add the final match (if any) and terminate.
                      if terminate {
                          if let Some(m) = self.get_greedy_match() {
                              // Add the final match to the list of successful matches.
                              matches.push(m);
                          }
                          self.end();
                          return matches;
                      }
                      // Return the successful matches.
                      self.position = start_position + local_position;
                      return matches;
                  }
              }
          }

          /// Returns a single match as follows:
          ///
          /// 1. If there is more than one match, return the longest match.
          /// 2. If there is more than one match of this length, return the one with the lowest group ID.
          ///
          /// If there is no match, returns None.
          pub fn get_greedy_match(&self) -> Option<Match> {
              if self.matches.len() == 0 {
                  return None;
              }
              let mut matches = self.matches.iter();
              let (mut longest_match_group_id, mut longest_match_position) = matches.next().unwrap();
              for (group_id, position) in matches {
                  if position > longest_match_position {
                      longest_match_group_id = group_id;
                      longest_match_position = position;
                  }
              }
              Some(Match {
                  group_id: *longest_match_group_id,
                  position: *longest_match_position,
              })
          }

          pub fn final_state_report(&self) -> FinalStateReport {
              FinalStateReport {
                  position: self.position,
                  matches: self.matches.clone(),
              }
          }

          pub fn get_u8set(&self) -> U8Set {
              let dfa = &self.regex.dfa;
              let state_data = &dfa.states[self.current_state];
              // Get all possible u8s that can match next
              state_data.transitions.keys_as_u8set()
          }

          pub fn get_terminal_u8set(&self) -> U8Set {
              // Get u8s that could take the regex to a terminal state (a state with a finalizer)
              let mut u8set = U8Set::none();
              let dfa = &self.regex.dfa;
              let state_data = &dfa.states[self.current_state];
              for (value, &i_next_state) in &state_data.transitions {
                  if !dfa.states[i_next_state].finalizers.is_empty() {
                      u8set.insert(value);
                  }
              }
              u8set
          }

          pub fn matches(&self) -> Option<bool> {
              if !self.matches.is_empty() {
                  Some(true)
              } else if self.done {
                  Some(false)
              } else {
                  None
              }
          }

          pub fn definitely_matches(&self) -> bool {
              self.matches().unwrap_or(false)
          }

          pub fn could_match(&self) -> bool {
              self.matches().unwrap_or(true)
          }

          pub fn fully_matches(&self) -> Option<bool> {
              if let Some(max_position) = self.matches.values().max() {
                  Some(*max_position == self.position)
              } else {
                  if self.done {
                      Some(false)
                  } else {
                      None
                  }
              }
          }

          pub fn definitely_fully_matches(&self) -> bool {
              self.fully_matches().unwrap_or(false)
          }

          pub fn could_fully_match(&self) -> bool {
              self.fully_matches().unwrap_or(true)
          }

          pub fn fully_matches_here(&self) -> bool {
              self.definitely_fully_matches()
          }

          pub fn done(&self) -> bool {
              // Returns true if the regex has matched and cannot possibly match anymore
              self.done
          }

          pub fn failed(&self) -> bool {
              // Returns true if the regex has failed to match and cannot possibly match
              !self.could_match()
          }

          pub fn clear_matches(&mut self) {
              self.matches.clear();
          }

          pub fn possible_future_group_ids(&self) -> BTreeSet<GroupID> {
              let state = &self.regex.dfa.states[self.current_state];
              state.possible_future_group_ids.clone()
          }

          pub fn get_u8set_for_group(&self, group_id: GroupID) -> U8Set {
              let state = &self.regex.dfa.states[self.current_state];
              state
                  .group_id_to_u8set
                  .get(&group_id)
                  .cloned()
                  .unwrap_or_else(U8Set::none)
          }
      }

      impl Regex {
          pub fn init_to_state(&self, state: usize) -> RegexState {
              let done = self.dfa.states[state].transitions.is_empty();
              let matches = self.dfa.states[state]
                  .finalizers
                  .iter()
                  .map(|&group_id| (group_id, 0))
                  .collect();
              RegexState {
                  regex: self,
                  position: 0,
                  current_state: state,
                  matches,
                  done,
              }
          }

          pub fn init(&self) -> RegexState {
              self.init_to_state(self.dfa.start_state)
          }

          pub fn get_next_state(&self, current_state: usize, byte: u8) -> Option<usize> {
              self.dfa.states[current_state].transitions.get(byte).copied()
          }

          pub fn find(&self, text: &[u8]) -> Option<(GroupID, usize)> {
              let mut regex_state = self.init();
              regex_state.execute(text);
              regex_state
                  .matches
                  .iter()
                  .next()
                  .map(|(&group_id, &position)| (group_id, position))
          }

          pub fn matches(&self, text: &[u8]) -> Option<bool> {
              let mut regex_state = self.init();
              regex_state.execute(text);
              regex_state.matches()
          }

          pub fn definitely_matches(&self, text: &[u8]) -> bool {
              self.matches(text).unwrap_or(false)
          }

          pub fn could_match(&self, text: &[u8]) -> bool {
              self.matches(text).unwrap_or(true)
          }

          pub fn fully_matches(&self, text: &[u8]) -> Option<bool> {
              let mut regex_state = self.init();
              regex_state.execute(text);
              regex_state.fully_matches()
          }

          pub fn definitely_fully_matches(&self, text: &[u8]) -> bool {
              self.fully_matches(text).unwrap_or(false)
          }

          pub fn could_fully_match(&self, text: &[u8]) -> bool {
              self.fully_matches(text).unwrap_or(true)
          }
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use crate::{choice, seq};

          #[test]
          fn test_literal() {
              let expr: Expr = eat_u8(b'a');
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"a"));
              assert!(!regex.could_match(b"b"));

              assert!(!regex.definitely_matches(b"")); // Incomplete match not allowed
              assert!(regex.could_match(b"")); // Incomplete match allowed
              assert!(regex.definitely_matches(b"ab")); // Prefix match allowed
              assert!(regex.definitely_matches(b"aa")); // Prefix match allowed
          }

          #[test]
          fn test_quantifier() {
              let expr = rep(eat_u8(b'a'));
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b""));
              assert!(regex.definitely_fully_matches(b"a"));
              assert!(regex.definitely_fully_matches(b"aaaa"));
              assert!(regex.could_match(b"b"));

              let mut state = regex.init();
              state.execute(b"aa");
              assert_eq!(state.matches, BTreeMap::from([(0, 2)]));
              assert!(!state.done()); // Could match more 'a's
          }

          #[test]
          fn test_choice() {
              let expr = choice![eat_u8(b'a'), eat_u8(b'b')];
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"a"));
              assert!(regex.definitely_fully_matches(b"b"));
              assert!(!regex.could_match(b"c"));
          }

          #[test]
          fn test_seq() {
              let expr = seq![eat_u8(b'a'), eat_u8(b'b')];
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.could_match(b"a"));
              assert!(!regex.definitely_matches(b"a"));
              assert!(!regex.could_match(b"b"));
              assert!(regex.definitely_matches(b"ab"));
              assert!(regex.definitely_matches(b"abab"));
              assert!(!regex.could_match(b"c"));
          }

          #[test]
          fn test_opt() {
              let expr = opt(eat_u8(b'a'));
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"")); // Optional 'a' can be absent
              assert!(regex.definitely_fully_matches(b"a")); // Optional 'a' can be present
              assert!(!regex.could_fully_match(b"aa")); // Should not match more than one 'a'
              assert!(regex.could_match(b"b")); // Can still match the empty string in "b"
          }

          #[test]
          fn test_0() {
              let expr = eat_u8(0);
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"\0"));
              assert!(!regex.could_match(b"1"));
          }

          #[test]
          fn test_epsilon() {
              let expr = eps();
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b""));
              assert!(regex.definitely_matches(b"a")); // Epsilon matches the empty string at the beginning
              assert!(!regex.definitely_fully_matches(b"a"));
          }

          #[test]
          fn test_u8seq() {
              let expr = Expr::U8Seq(vec![b'a', b'b']);
              dbg!(&expr);
              let regex = expr.build();
              dbg!(&regex);

              assert!(regex.definitely_fully_matches(b"ab"));
              assert!(regex.could_match(b"a"));
              assert!(!regex.could_match(b"b"));
              assert!(!regex.could_match(b"ba"));
          }
      }

