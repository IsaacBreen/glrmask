          gss_i1 = gss_class.from_stacks([([], MergeableInt(1))]) # An empty stack
          gss_i2 = gss_class.from_stacks([([10], MergeableInt(2))]) # A non-empty stack
          gss_i_merged = gss_i1.merge(gss_i2)
