                  self.max_depth[uid_int] = int(node.get("max_depth", 0) or 0)

                  children = node.get("children") or []
                  if not children:
                      node["children"] = []
                      continue

                  new_children = []
                  for edge_key, dest_map in children:
                      pop, llm_bv_json = edge_key
                      llm_bv = bs_from_json(dumps(llm_bv_json))
                      new_dest_map = []
