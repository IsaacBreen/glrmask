      ```rust
      fn compute_structural_fingerprints(
          order: &[IntermediatePrecomputeNode3Index],
          god: &IntermediateTrie3GodWrapper,
          cache: &mut HashMap<IntermediatePrecomputeNode3Index, u64>,
      ) {
          for n in order {
              let g = match n.read(god) {
                  Some(guard) => guard,
                  None => continue,
              };

              let mut pairs: Vec<(IntermediateTrie3EdgeKey, Vec<u64>)> = Vec::new();
              for (ek, dm) in g.children() {
                  let mut child_sigs: Vec<u64> = dm
                      .keys()
                      .filter_map(|dst| cache.get(dst))
                      .cloned()
                      .collect();
                  child_sigs.sort_unstable();
                  pairs.push((ek.clone(), child_sigs));
              }
              // Sort by edge key to make deterministic
              pairs.sort_by(|a, b| a.0.cmp(&b.0));

              // Hash the structure into a u64
              let mut hasher = std::collections::hash_map::DefaultHasher::new();
              g.value.end.hash(&mut hasher);
              for (ek, cs) in &pairs {
                  ek.hash(&mut hasher);
                  cs.len().hash(&mut hasher);
                  for s in cs {
                      s.hash(&mut hasher);
                  }
              }
              let sig = hasher.finish();
              cache.insert(*n, sig);
          }
      }
      ```

      6) Insert helper: redirect all incoming edges for a node to a new node
