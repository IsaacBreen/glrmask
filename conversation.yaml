      }
      pub trait DynHash {
          fn dyn_hash(&self, state: &mut dyn std::hash::Hasher);
      }
      impl DynEq for () {
          fn dyn_eq(&self, _other: &dyn Any) -> bool { true }
      }
      impl DynOrd for () {
