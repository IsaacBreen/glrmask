                  if !first {
                      write!(writer, ",").map_err(|e| e.to_string())?;
                  }
                  write!(writer, "[").map_err(|e| e.to_string())?;
                  k.to_writer(&mut writer)?;
                  write!(writer, ",").map_err(|e| e.to_string())?;
                  v.to_writer(&mut writer)?;
                  write!(writer, "]").map_err(|e| e.to_string())?;
                  first = false;
              }
              write!(writer, "]").map_err(|e| e.to_string())?;
              Ok(())
          }

