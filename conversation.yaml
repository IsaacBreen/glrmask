                  if bv.is_all() {
                      return "[ALL]".to_string();
                  }

                  const MAX_RANGES_TO_SHOW: usize = 10;
                  let total_ranges = bv.inner().ranges_len();

                  let mut parts: Vec<String> = bv.iter_ranges().take(MAX_RANGES_TO_SHOW).map(|(start, end)| {
