              assert!(Trie::has_any_cycle(root4.clone()));

              // Disconnected graph with a cycle: root5 (linear chain), root6 (cycle)
              let root5: TestNodeBasic = Arc::new(RwLock::new(TestTrieBasic::new(40)));
