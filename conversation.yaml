                  ek(5, Some(&[4]), None), // e
                  ek(1, Some(&[5]), None), // f
                  // Pair 3 (compatible)
                  ek(-1, Some(&[6, 100]), None), // g
                  ek(-1, Some(&[7, 100]), None), // h
                  ek(2, Some(&[7, 100]), None),  // h
                  // Trailing
                  ek(-4, Some(&[8]), None), // i
