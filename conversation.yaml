              if isinstance(other, RoaringRangeSet):
                  return self._rb.isdisjoint(other._rb)
              else:
                  other_rb = RoaringBitmap(other.iter_indices())
                  return self._rb.isdisjoint(other_rb)

          def union_update(self, other: RangeSet[int]) -> None:
