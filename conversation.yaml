              let initial_content = ParseStateEdgeContent {
                  state_id: self.start_state_id,
              };
              let llm_vocab = initial_acc.llm_tokens().llm_vocab().clone();
              let root = Arc::new(GSSNode::new(Acc::new_fresh(llm_vocab))); // root has empty acc
