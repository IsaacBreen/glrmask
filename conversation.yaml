          }

          pub fn total_edges(&self) -> usize {
              self.total_edges
          }
      }

      #[time_it]
      pub fn gather_gss_stats(roots: &[&GSSNode]) -> LeveledGSSStats<ParseStateEdgeContent, Acc> {
          let active_roots: Vec<_> = roots.iter().copied().filter(|r| !r.is_empty()).collect();

           // --- Graph-level stats (from merged GSS to handle sharing correctly) ---
           let mut merged_gss = LeveledGSS::empty();
           for r in &active_roots {
               merged_gss = merged_gss.merge(&r.inner);
           }

          merged_gss.stats()
      }
      // --- GSS printer config & helpers ---
      pub struct GSSPrintConfig<'a> {
          pub(crate) labels: Option<&'a [String]>,
          pub(crate) max_edges: usize,
          pub(crate) original_internal_bimap: Option<&'a BTreeMap<usize, usize>>,
          pub(crate) llm_token_map: Option<&'a BiBTreeMap<Vec<u8>, LLMTokenID>>,
          pub(crate) verbose: bool,
      }
      impl<'a> Default for GSSPrintConfig<'a> {
          fn default() -> Self {
              Self {
                  labels: None,
                  max_edges: usize::MAX,
                  original_internal_bimap: None,
                  llm_token_map: None,
                  verbose: false,
              }
          }
      }

      pub fn print_gss_forest(
          roots: &[Arc<GSSNode>],
          terminal_map: &BiBTreeMap<crate::glr::grammar::Terminal, TerminalID>,
          config: &GSSPrintConfig,
      ) -> (String, Vec<StateID>) {
          let mut out = String::new();
          let mut state_ids_in_order = Vec::new();
          if roots.is_empty() {
              return ("GSS Forest: (No roots)".to_string(), state_ids_in_order);
          }
          writeln!(&mut out, "GSS Forest (leveled adapter):").unwrap();
          for (i, r) in roots.iter().enumerate() {
              // Use label if available
              if let Some(labels) = config.labels {
                  assert!(labels.len() == roots.len());
                  writeln!(&mut out, "{}", labels[i]).unwrap();
              } else {
                  writeln!(&mut out, " Root {}:", i).unwrap();
              }
              let stacks = r.inner.to_stacks();
              for (path, acc) in stacks {
                  let sids: Vec<_> = path.iter().map(|e| e.state_id).collect();
                  for sid in &sids {
                      if !state_ids_in_order.contains(sid) {
                          state_ids_in_order.push(*sid);
                      }
                  }
                  let s: Vec<_> = sids.iter().map(|s| s.0.to_string()).collect();
                  let acc_str = format_acc(
                      &acc,
                      terminal_map,
                      config.original_internal_bimap,
                      config.llm_token_map,
                      config,
                  );
                  if acc_str.is_empty() {
                      writeln!(&mut out, "  - [{}]", s.join(" ")).unwrap();
                  } else {
                      writeln!(&mut out, "  - [{}] {}", s.join(" "), acc_str).unwrap();
                  }
              }
          }
          (out, state_ids_in_order)
      }

      pub fn find_longest_path(root: &Arc<GSSNode>) -> Option<Vec<(ParseStateEdgeContent, Arc<GSSNode>)>> {
          root.inner
              .get_longest_path()
              .map(|(p, _a)| p.into_iter().map(|e| (e, root.clone())).collect())
      }

      pub fn sample_path<'a>(roots: &[&'a GSSNode], _seed: u64) -> Option<Vec<ParseStateEdgeContent>> {
          roots
              .get(0)
              .map(|r| r.inner.get_first_path().map(|(p, _)| p).unwrap_or_default())
      }

      // --- GSS wrapper ---
      #[derive(Clone)]
      pub struct GSSNode {
          pub(crate) inner: LeveledGSS<ParseStateEdgeContent, Acc>,
      }

      impl Debug for GSSNode {
          fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
              write!(f, "GSSNode(len_paths={})", self.inner.num_paths())
          }
      }

      // A global, thread-safe counter initialized to 0.
      static GSSNODE_EQ_CALLS: std::sync::atomic::AtomicUsize = std::sync::atomic::AtomicUsize::new(0);

      impl PartialEq for GSSNode {
          fn eq(&self, other: &Self) -> bool {
              // 1. Atomically increment the counter.
              // Ordering::Relaxed is sufficient here; we don't need strict synchronization
              // guarantees between threads, just a generally increasing counter.
              // fetch_add returns the previous value, so we add 1 to get the current count.
              let count = GSSNODE_EQ_CALLS.fetch_add(1, std::sync::atomic::Ordering::Relaxed) + 1;

              // 2. Check if 'count' is a power of 2 using a fast bitwise trick.
              // If x is a power of 2, its binary representation has exactly one '1'.
              // (x & (x - 1)) will be 0 only if x is a power of 2 (or x is 0).
              // This will trigger at counts: 1, 2, 4, 8, 16, 32, 64, ...
              if (count & (count - 1)) == 0 {
                  eprintln!(
                      "PERFORMANCE WARNING: GSSNode::eq performs expensive full stack comparison. \
                       Total calls: {}",
                      count
                  );
              }

              // --- Original expensive logic ---
              let mut a_stacks = self.inner.to_stacks();
              let mut b_stacks = other.inner.to_stacks();
              a_stacks.sort();
              b_stacks.sort();
              a_stacks == b_stacks
          }
      }
      impl Eq for GSSNode {}

      impl Hash for GSSNode {
          fn hash<H: Hasher>(&self, state: &mut H) {
              // println!("WARNING: GSSNode::hash performs expensive full stack hashing.");
          }
      }

      impl GSSNode {
          pub fn new(acc: Acc) -> Self {
              GSSNode {
                  inner: LeveledGSS::from_stacks(&vec![(vec![], acc)]),
              }
          }
          pub fn new_fresh() -> Self {
              GSSNode {
                  inner: LeveledGSS::from_stacks(&vec![(vec![], Acc::new_fresh())]),
              }
          }
          pub fn new_dead() -> Self {
              // Represent dead as empty; allowed_llm_tokens() on empty returns zeros.
              GSSNode {
                  inner: LeveledGSS::empty(),
              }
          }

          // Helper: append a value to all stacks; if empty, create singleton stack.
          fn push_all(
              inner: &LeveledGSS<ParseStateEdgeContent, Acc>,
              edge: ParseStateEdgeContent,
          ) -> LeveledGSS<ParseStateEdgeContent, Acc> {
              if inner.is_empty() {
                  LeveledGSS::from_stacks(&[(vec![edge], Acc::new_fresh())])
              } else {
                  inner.push(edge)
              }
          }

          pub fn push(&self, edge_value: ParseStateEdgeContent) -> Self {
              GSSNode {
                  inner: Self::push_all(&self.inner, edge_value),
              }
          }
          pub fn push_many(&self, edge_values: Vec<ParseStateEdgeContent>) -> Self {
              if edge_values.is_empty() {
                  return self.clone();
              }
              let mut merged = LeveledGSS::empty();
              for e in edge_values {
                  let next = Self::push_all(&self.inner, e);
                  merged = merged.merge(&next);
              }
              GSSNode { inner: merged }
          }

          pub fn is_empty(&self) -> bool {
              self.inner.is_empty()
          }
          pub fn is_alive(&self) -> bool {
              !self.is_empty()
          }
          pub fn is_ok(&self) -> bool {
              self.is_alive()
          }
          pub fn allowed_llm_tokens(&self) -> LLMTokenBV {
              self.inner
                  .reduce_acc()
                  .map_or(HybridBitset::zeros(), |acc| acc.llm_tokens_union)
          }
          pub fn disallowed_terminals(&self) -> HybridL2Bitset {
              self.inner
                  .reduce_acc()
                  .map(|acc| acc.terminals_union.complement())
                  .unwrap_or_else(|| HybridL2Bitset::all().complement())
          }
          #[time_it]
          pub fn stored_trie_nodes(&self) -> BTreeSet<StoredPrecomputeNodeIndex> {
              self.inner
                  .reduce_acc()
                  .map_or_else(BTreeSet::new, |acc| acc.stored_trie_nodes.clone())
          }
          pub fn max_depth(&self) -> usize {
              self.inner.max_depth() as usize
          }
          pub fn flatten(&self) -> Vec<(Vec<ParseStateEdgeContent>, Acc)> {
              self.inner.to_stacks()
          }

          pub fn print(&self) -> String {
              let (s, _sid) = print_gss_forest(&[Arc::new(self.clone())], &BiBTreeMap::new(), &GSSPrintConfig::default());
              s
          }

          pub fn merge_with_depth(&mut self, merge_depth: usize, other: &Self) {
              self.inner = self.inner.merge(&other.inner);
              // If there's more than 10k nodes, panic
              // let num_nodes = self.inner.stats().total_unique_nodes;
              // if num_nodes > 10_000 {
              //     panic!("GSSNode merge resulted in too many nodes: {}", num_nodes);
              // }
              self.inner.fuse(Some(merge_depth as isize));
          }
          pub fn merged(mut self, other: Self, depth: usize) -> Self {
              self.merge_with_depth(depth, &other);
              self
          }

          pub fn merge_many_with_depth(merge_depth: usize, nodes: impl IntoIterator<Item = Arc<GSSNode>>) -> Arc<GSSNode> {
              let mut it = nodes.into_iter();
              if let Some(first) = it.next() {
                  let mut acc = (*first).clone();
                  for n in it {
                      acc.merge_with_depth(merge_depth, &n);
                  }
                  Arc::new(acc)
              } else {
                  Arc::new(GSSNode::new_dead())
              }
          }

          pub fn predecessors(&self) -> BTreeMap<ParseStateEdgeContent, BTreeMap<isize, Vec<Arc<GSSNode>>>> {
              self.inner
                  .predecessors()
                  .into_iter()
                  .map(|(edge_val, preds_by_depth)| {
                      let new_preds_by_depth = preds_by_depth
                          .into_iter()
                          .map(|(depth, gss_vec)| {
                              let new_gss_vec = gss_vec.into_iter().map(|gss| Arc::new(GSSNode { inner: gss })).collect();
                              (depth, new_gss_vec)
                          })
                          .collect();
                      (edge_val, new_preds_by_depth)
                  })
                  .collect()
          }

          pub fn num_predecessors(&self) -> usize {
              self.inner.peek().len()
          }

          pub fn popn(&self, n: usize) -> GSSPopper {
              let mut popper = GSSPopper {
                  inner: self.inner.clone(),
                  below_bottom: BTreeMap::new(),
              };
              popper.popn(n);
              popper
          }

          pub fn peek_iter(&self) -> impl Iterator<Item = GSSPeek<'_>> {
              let keys: Vec<_> = self.inner.peek().into_iter().collect();
              GSSPeekIter {
                  parent: &self.inner,
                  keys,
                  idx: 0,
              }
          }

          #[time_it]
          pub fn fuse_predecessors(&mut self, levels: usize) {
              if levels == 0 {
                  return;
              }
              let self_arc = Arc::new(self.clone());
              let mut memo = HashMap::new();
              let fused_arc = fuse_predecessors_recursive(&self_arc, levels, &mut memo);
              if !Arc::ptr_eq(&self_arc, &fused_arc) {
                  *self = (*fused_arc).clone();
              }
          }

          pub fn normalize_many(nodes: impl IntoIterator<Item = Arc<GSSNode>>) -> Vec<Arc<GSSNode>> {
              let leveled_gsss: Vec<LeveledGSS<ParseStateEdgeContent, Acc>> = nodes.into_iter().map(|n| n.inner.clone()).collect();
              LeveledGSS::normalize_many(leveled_gsss).into_iter().map(|inner| Arc::new(GSSNode { inner })).collect()
          }

          pub fn fuse_predecessors_recursive(&self, levels: usize, _memo: &mut PruneAndTransformRecursiveMemo) -> Arc<GSSNode> {
              let self_arc = Arc::new(self.clone());
              let mut dummy_memo = HashMap::new();
              fuse_predecessors_recursive(&self_arc, levels, &mut dummy_memo)
          }
      }

      // --- GSSPeek & iterator (updated to borrow LeveledGSS directly) ---
      pub struct GSSPeek<'a> {
          parent_arc: &'a LeveledGSS<ParseStateEdgeContent, Acc>,
          edge_value: ParseStateEdgeContent,
      }
      struct GSSPeekIter<'a> {
          parent: &'a LeveledGSS<ParseStateEdgeContent, Acc>,
          keys: Vec<ParseStateEdgeContent>,
          idx: usize,
      }
      impl<'a> Iterator for GSSPeekIter<'a> {
          type Item = GSSPeek<'a>;
          fn next(&mut self) -> Option<Self::Item> {
              if self.idx >= self.keys.len() {
                  None
              } else {
                  let ev = self.keys[self.idx].clone();
                  self.idx += 1;
                  Some(GSSPeek {
                      parent_arc: self.parent,
                      edge_value: ev,
                  })
              }
          }
      }
      impl<'a> GSSPeek<'a> {
          pub fn edge_value(&self) -> &ParseStateEdgeContent {
              &self.edge_value
          }
          pub fn isolated_parent(&self) -> Arc<GSSNode> {
              let iso = self.parent_arc.isolate(Some(self.edge_value.clone()));
              Arc::new(GSSNode { inner: iso })
          }
          pub fn push_on_parent(&self, edge_value: ParseStateEdgeContent) -> GSSNode {
              let iso = self.isolated_parent();
              iso.as_ref().push(edge_value)
          }
          pub fn popn(&self, n: usize) -> GSSPopper {
              self.isolated_parent().popn(n)
          }
          pub fn resolved_llm_tokens_union(&self) -> LLMTokenBV {
              self.isolated_parent().allowed_llm_tokens()
          }
          pub(crate) fn _parent(&self) -> Arc<GSSNode> {
              Arc::new(GSSNode { inner: self.parent_arc.clone() })
          }
      }

      // --- Popper ---
      pub struct GSSPopper {
          inner: LeveledGSS<ParseStateEdgeContent, Acc>,
          below_bottom: BTreeMap<usize, BTreeMap<ParseStateEdgeContent, Acc>>,
      }
      pub struct GSSPopperItem {
          inner: LeveledGSS<ParseStateEdgeContent, Acc>,
      }
      pub struct GSSPopperItemPeek<'a> {
          parent_arc: &'a LeveledGSS<ParseStateEdgeContent, Acc>,
          edge_value: &'a ParseStateEdgeContent,
      }

      impl GSSPopper {
          pub fn new_from_node(node: Arc<GSSNode>, _acc: Arc<Acc>) -> Self {
              GSSPopper { inner: node.inner.clone(), below_bottom: BTreeMap::new() }
          }
          pub fn iter(&self) -> impl Iterator<Item = GSSPopperItem> {
              let keys: Vec<_> = self.inner.peek().into_iter().collect();
              let parent = self.inner.clone();
              keys.into_iter().map(move |edge| {
                  let iso = parent.isolate(Some(edge));
                  GSSPopperItem { inner: iso }
              })
          }
          pub fn below_bottom(&self) -> &BTreeMap<usize, BTreeMap<ParseStateEdgeContent, Acc>> {
              &self.below_bottom
          }
          pub fn num_predecessors(&self) -> usize {
              self.inner.peek().len()
          }
          pub fn popn(&mut self, n: usize) {
              for _ in 0..n {
                  self.pop();
              }
          }
          pub fn pop(&mut self) {
              let mut inner = self.inner.clone();
              let mut belows: BTreeMap<_, _> = self.below_bottom.iter().map(|(k, v)| (*k + 1, v.clone())).collect();
              let new_below_slice = inner.filter_by_length(Some(1), Some(1));
              if !new_below_slice.is_empty() {
                  let mut new_below_map = BTreeMap::new();
                  for edge in new_below_slice.peek() {
                      let isolated = new_below_slice.isolate(Some(edge.clone()));
                      if let Some(acc) = isolated.reduce_acc() {
                          new_below_map.insert(edge, acc);
                      }
                  }
                  if !new_below_map.is_empty() {
                      belows.insert(1, new_below_map);
                  }
              }
              self.below_bottom = belows;
              inner = inner.pop();
              inner = inner.filter_by_length(Some(1), None);
              self.inner = inner;
          }
          pub(crate) fn _inner(&self) -> &LeveledGSS<ParseStateEdgeContent, Acc> {
              &self.inner
          }
      }

      impl GSSPopperItem {
          pub fn peek_iter(&self) -> impl Iterator<Item = GSSPopperItemPeek<'_>> {
              let keys: Vec<_> = self.inner.peek().into_iter().collect();
              GSSPopperItemPeekIter {
                  parent: &self.inner,
                  keys,
                  idx: 0,
              }
          }
          pub(crate) fn resolved_acc(&self) -> Acc {
              self.inner.reduce_acc().unwrap_or_else(Acc::new_dead)
          }
      }
      struct GSSPopperItemPeekIter<'a> {
          parent: &'a LeveledGSS<ParseStateEdgeContent, Acc>,
          keys: Vec<ParseStateEdgeContent>,
          idx: usize,
      }
      impl<'a> Iterator for GSSPopperItemPeekIter<'a> {
          type Item = GSSPopperItemPeek<'a>;
          fn next(&mut self) -> Option<Self::Item> {
              if self.idx >= self.keys.len() {
                  None
              } else {
                  let ev = &self.keys[self.idx];
                  self.idx += 1;
                  Some(GSSPopperItemPeek {
                      parent_arc: self.parent,
                      edge_value: unsafe { &*(ev as *const ParseStateEdgeContent) },
                  })
              }
          }
      }
      impl<'a> GSSPopperItemPeek<'a> {
          pub fn edge_value(&self) -> &'a ParseStateEdgeContent {
              self.edge_value
          }
          pub fn isolated_parent(&self) -> Arc<GSSNode> {
              let iso = self.parent_arc.isolate(Some(self.edge_value.clone()));
              Arc::new(GSSNode { inner: iso })
          }
          pub fn push_on_parent(&self, edge_value: ParseStateEdgeContent) -> GSSNode {
              let iso = self.isolated_parent();
              iso.as_ref().push(edge_value)
          }
          pub(crate) fn _parent(&self) -> Arc<GSSNode> {
              Arc::new(GSSNode { inner: self.parent_arc.clone() })
          }
      }

      // --- Roots & helpers ---
      #[time_it]
      pub fn get_roots<'a>(nodes: impl IntoIterator<Item = &'a GSSNode>) -> BTreeMap<ParseStateEdgeContent, BTreeSet<Arc<Acc>>> {
          let mut out: BTreeMap<ParseStateEdgeContent, BTreeSet<Arc<Acc>>> = BTreeMap::new();
          for n in nodes {
              for edge in n.inner.peek() {
                  let iso = n.inner.isolate(Some(edge.clone()));
                  if let Some(acc) = iso.reduce_acc() {
                      out.entry(edge).or_default().insert(Arc::new(acc));
                  }
              }
          }
          out
      }

      // --- Transformations (simplified) ---
      fn transform_all(root_arc: &mut Arc<GSSNode>, f: impl FnMut(&Acc) -> Option<Acc>) {
          let new_inner = root_arc.inner.apply_and_prune(f);
          *root_arc = Arc::new(GSSNode { inner: new_inner });
      }

      pub type PruneAndTransformRecursiveMemo = HashMap<*const GSSNode, Option<Arc<GSSNode>>>;

      pub fn allow_only_llm_tokens_and_prune(root_arc: &mut Arc<GSSNode>, allowed_tokens: &LLMTokenBV) {
          let mut memo = HashMap::new();
          allow_only_llm_tokens_and_prune_arc(root_arc, allowed_tokens, &mut memo);
      }

      pub(crate) fn allow_only_llm_tokens_and_prune_arc(
          root_arc: &mut Arc<GSSNode>,
          allowed_tokens: &LLMTokenBV,
          _memo: &mut PruneAndTransformRecursiveMemo,
      ) {
          transform_all(root_arc, |a| {
              let mut na = a.clone();
              na.llm_tokens_union &= allowed_tokens;
              if na.llm_tokens_union.is_empty() {
                  None
              } else {
                  Some(na)
              }
          });
      }

      pub(crate) fn disallow_llm_tokens_and_prune_arc(
          root_arc: &mut Arc<GSSNode>,
          tokens_to_disallow: &LLMTokenBV,
          memo: &mut PruneAndTransformRecursiveMemo,
      ) {
          let allowed = HybridBitset::max_ones() - tokens_to_disallow.clone();
          allow_only_llm_tokens_and_prune_arc(root_arc, &allowed, memo);
      }

      pub fn reset_llm_tokens(root_arc: &mut Arc<GSSNode>, _memo: &mut PruneAndTransformRecursiveMemo) {
          transform_all(root_arc, |a| {
              let mut na = a.clone();
              na.llm_tokens_union = HybridBitset::max_ones();
              Some(na)
          });
      }

      pub(crate) fn reset_terminals(root_arc: &mut Arc<GSSNode>, _memo: &mut PruneAndTransformRecursiveMemo) {
          transform_all(root_arc, |a| {
              let mut na = a.clone();
              na.terminals_union = HybridL2Bitset::all();
              Some(na)
          });
      }

      pub(crate) fn disallow_terminals_and_prune_arc(
          root_arc: &mut Arc<GSSNode>,
          disallowed_terminals: &HybridL2Bitset,
          _memo: &mut PruneAndTransformRecursiveMemo,
      ) {
          transform_all(root_arc, |a| {
              let mut na = a.clone();
              // println!("Disallowing terminals: {:?}", disallowed_terminals);
              // println!("Before: {:?}", na.terminals_union);
              na.terminals_union -= disallowed_terminals;
              // println!("After: {:?}", na.terminals_union);
              Some(na)
          });
      }

      pub fn prune_llm_tokens_by_disallowed_terminals(
          root_arc: &mut Arc<GSSNode>,
          possible_matches: &BTreeMap<TokenizerStateID, BTreeMap<TerminalID, LLMTokenBV>>,
          memo: &mut PruneAndTransformRecursiveMemo,
      ) {
          transform_all(root_arc, |acc| {
              if acc.terminals_union == HybridL2Bitset::all() {
                  return Some(acc.clone());
              }

              let mut forbidden_llm_tokens = LLMTokenBV::zeros();
              let disallowed_terminals_l2 = acc.terminals_union.complement();

              for (tokenizer_state_range, disallowed_terminals_for_range) in disallowed_terminals_l2.range_values() {
                  if disallowed_terminals_for_range.is_empty() {
                      continue;
                  }

                  let relevant_possible_matches = possible_matches.range(TokenizerStateID(*tokenizer_state_range.start())..=TokenizerStateID(*tokenizer_state_range.end()));

                  for (_tokenizer_state_id, possible_matches_for_state) in relevant_possible_matches {
                      for (terminal_id, llm_tokens_that_match_this_terminal) in possible_matches_for_state {
                          if disallowed_terminals_for_range.contains(terminal_id.0) {
                              forbidden_llm_tokens |= llm_tokens_that_match_this_terminal;
                          }
                      }
                  }
              }

              if forbidden_llm_tokens.is_empty() {
                  return Some(acc.clone());
              }

              let mut new_acc = acc.clone();
              new_acc.llm_tokens_union -= &forbidden_llm_tokens;

              if new_acc.llm_tokens_union.is_empty() {
                  None // Prune this path
              } else {
                  Some(new_acc)
              }
          });
      }

      pub fn prune_disallowed_terminals(
          root_arc: &mut Arc<GSSNode>,
          matched_terminals: &BTreeMap<crate::tokenizer::TokenizerStateID, TerminalBV>,
          _memo: &mut PruneAndTransformRecursiveMemo,
      ) {
          let matched = matched_terminals.clone();
          let all = HybridBitset::max_ones();
          transform_all(root_arc, |a| {
              for (sid, bv) in &matched {
                  let allowed = a.terminals_union.get_l2_bitset(sid.0).unwrap_or(&all);
                  if !bv.is_subset(allowed) {
                      return None;
                  }
              }
              Some(a.clone())
          });
      }

      pub fn map_allowed_terminals_tokenizer_states(
          root_arc: &mut Arc<GSSNode>,
          map: &BTreeMap<crate::tokenizer::TokenizerStateID, crate::tokenizer::TokenizerStateID>,
          _memo: &mut PruneAndTransformRecursiveMemo,
      ) {
          let mapping = map.clone();
          transform_all(root_arc, |a| {
              let mut new_map = BTreeMap::new();
              for (old, new) in &mapping {
                  if let Some(bv) = a.terminals_union.get_l2_bitset(old.0) {
                      new_map
                          .entry(new.0)
                          .and_modify(|b: &mut HybridBitset| *b |= bv.clone())
                          .or_insert_with(|| bv.clone());
                  }
              }
              let mut out = HybridL2Bitset::all();
              for (sid, bv) in new_map {
                  out.insert_l2_bitset(sid, bv);
              }
              let mut na = a.clone();
              na.terminals_union = out;
              Some(na)
          });
      }

      #[time_it]
      pub(crate) fn allow_only_llm_tokens_on_stored_trie_nodes_and_prune_arc(
          root_arc: &mut Arc<GSSNode>,
          allowed_tokens: &LLMTokenBV,
          _memo: &mut PruneAndTransformRecursiveMemo,
          stored_trie_god: &StoredTrieGodWrapper,
      ) {
          let mut source_to_dest_map = BTreeMap::new();

          transform_all(root_arc, |acc| {
              let mut final_nodes = BTreeSet::new();

              for source_node in acc.stored_trie_nodes() {
                  let dest_node = source_to_dest_map
                      .entry(source_node.clone())
                      .or_insert_with(|| {
                          StoredPrecomputeNodeIndex::new(
                              stored_trie_god.insert(crate::constraint::IntermediatePrecomputeNode3::new(
                                  crate::constraint::IntermediatePrecomputedNodeContents3::internal(),
                              )),
                          )
                      })
                      .clone();

                  let edge_key = (0, allowed_tokens.clone());
                  let edge_key = crate::constraint::IntermediateTrie3EdgeKey::CheckLLM(allowed_tokens.clone());
                  let edge_value = ();

                  let inserter = crate::datastructures::trie::EdgeInserter::new(
                      stored_trie_god,
                      source_node.as_arc().clone(),
                      edge_key,
                      edge_value,
                      |_, _| {},
                      |_, _| {},
                      |_, _| {},
                  );
                  inserter.try_destination(dest_node.clone()).expect("Cycle detected");

                  final_nodes.insert(dest_node);
              }

              let mut new_acc = acc.clone();
              new_acc.stored_trie_nodes = final_nodes;
              Some(new_acc)
          });
      }

      pub fn simplify(_states: &mut BTreeMap<crate::tokenizer::TokenizerStateID, Arc<GSSNode>>) {}
      pub(crate) fn simplify_roots_in_place(_roots: &mut [Arc<GSSNode>]) {}
      pub fn fuse_predecessors_recursive(node_arc: &Arc<GSSNode>, levels: usize, _memo: &mut HashMap<*const GSSNode, Arc<GSSNode>>) -> Arc<GSSNode> {
          let fused_inner = node_arc.inner.fuse(Some(levels as isize));
          if fused_inner.ptr_eq(&node_arc.inner) {
              node_arc.clone()
          } else {
              Arc::new(GSSNode { inner: fused_inner })
          }
      }

      impl GSSNode {
          pub fn reset_llm_tokens(&mut self) {
              let mut memo = PruneAndTransformRecursiveMemo::new();
              let mut arc = Arc::new(self.clone());
              reset_llm_tokens(&mut arc, &mut memo);
              *self = (*arc).clone();
          }
      }

      // --- Trie-utils stubs (no-ops) ---
      #[time_it]
      pub(crate) fn deep_add_precompute_trie_edges(
          root_arc: &mut Arc<GSSNode>,
          god: &StoredTrieGodWrapper,
          edge_key: &crate::constraint::IntermediateTrie3EdgeKey,
          destination_provider: &mut impl FnMut() -> StoredPrecomputeNodeIndex,
          _memo: &mut PruneAndTransformRecursiveMemo,
      ) {
          transform_all(root_arc, |acc| {
              if acc.stored_trie_nodes().is_empty() {
                  return Some(acc.clone());
              }

              let destination = destination_provider();

              for source_wrapper in acc.stored_trie_nodes() {
                  let source_arc = source_wrapper.as_arc().clone();

                  let inserter = crate::datastructures::trie::EdgeInserter::new(
                      god,
                      source_arc,
                      edge_key.clone(), (), |_, _| {}, |_, _| {}, |_, _| {},
                  );
                  inserter.try_destination(destination.clone()).expect("Cycle detected when adding precompute trie edges");
              }

              // destination.write(god).expect("poison").value.live_tokens |= tokens_for_update;

              let mut new_acc = acc.clone();
              *new_acc.stored_trie_nodes_mut() = BTreeSet::from([destination]);
              Some(new_acc)
          });
      }

      #[time_it]
      pub(crate) fn merge_stored_trie_nodes(
          root_arc: &mut Arc<GSSNode>,
          _memo: &mut PruneAndTransformRecursiveMemo,
          stored_trie_god: &StoredTrieGodWrapper,
      ) {
          // --- 1. Collect all unique node sets from Accs that need merging ---
          let mut all_node_sets = BTreeSet::new();
          root_arc.inner.visit_accs(|acc| {
              if acc.stored_trie_nodes().iter().any(|n| {
                  true
              }) {
                  all_node_sets.insert(acc.stored_trie_nodes().clone());
              }
          });

          if all_node_sets.is_empty() {
              return; // Nothing to do
          }

          let all_node_sets_vec: Vec<_> = all_node_sets.into_iter().collect();
          let union_nodes: BTreeSet<_> =
              all_node_sets_vec.iter().flat_map(|s| s.iter().cloned()).collect();

          // --- 2. Find partitions based on co-occurrence in the collected sets ---
          let mut partitions: BTreeMap<Vec<bool>, BTreeSet<StoredPrecomputeNodeIndex>> = BTreeMap::new();
          for node in union_nodes {
              let signature: Vec<bool> = all_node_sets_vec.iter().map(|s| s.contains(&node)).collect();
              partitions.entry(signature).or_default().insert(node);
          }

          // --- 3. Create destination nodes for each partition ---
          let partition_dests: BTreeMap<BTreeSet<StoredPrecomputeNodeIndex>, StoredPrecomputeNodeIndex> =
              partitions
                  .into_values()
                  .map(|p| {
                      let dest = StoredPrecomputeNodeIndex::new(
                          stored_trie_god.insert(crate::constraint::IntermediatePrecomputeNode3::new(
                              crate::constraint::IntermediatePrecomputedNodeContents3::internal(),
                          )),
                      );
                      (p, dest)
                  })
                  .collect();

          // --- 4. Create a map from each source node to its partition's destination ---
          let mut source_to_dest_map = BTreeMap::new();
          for (partition, dest) in &partition_dests {
              for source_node in partition {
                  source_to_dest_map.insert(source_node.clone(), dest.clone());
              }
          }

          // --- 5. Transform all Accs, adding edges and updating node sets ---
          transform_all(root_arc, |acc| {
              let needs_merging = acc.stored_trie_nodes().iter().any(|n| {
                  true
              });

              if !needs_merging {
                  return Some(acc.clone());
              }

              let mut new_acc = acc.clone();
              let new_nodes: BTreeSet<_> = acc
                  .stored_trie_nodes()
                  .iter()
                  .map(|source_node| source_to_dest_map.get(source_node).unwrap().clone())
                  .collect();

              let tokens_for_edge = acc.llm_tokens_union.clone();
              let edge_key = crate::constraint::IntermediateTrie3EdgeKey::CheckLLM(tokens_for_edge.clone());
              let edge_value = ();

              for source_node in acc.stored_trie_nodes() {
                  let dest_node = source_to_dest_map.get(source_node).unwrap();

                  let inserter = crate::datastructures::trie::EdgeInserter::new(
                      stored_trie_god,
                      source_node.as_arc().clone(),
                      edge_key.clone(),
                      edge_value,
                      |_, _| {},
                      |_, _| {},
                      |_, _| {},
                  );
                  inserter.try_destination(dest_node.clone()).expect("Cycle detected when merging stored_trie nodes");
              }

              new_acc.stored_trie_nodes = new_nodes;
              Some(new_acc)
          });
      }

      pub(crate) fn map_trie3_node_ids(
          root_arc: &mut Arc<GSSNode>,
          id_map: &HashMap<Trie2Index, Trie2Index>,
      ) {
          transform_all(root_arc, |acc| {
              let mut new_acc = acc.clone();
              new_acc.stored_trie_nodes = new_acc.stored_trie_nodes.iter().map(|node| id_map.get(node).cloned().unwrap_or_else(|| panic!("Trie2Index {:?} not found in id_map", node))).collect();
              Some(new_acc)
          });
      }


      #[time_it]
      pub(crate) fn is_simple_gss(
          node: &Arc<GSSNode>,
          hallucinated_state_id: StateID,
      ) -> Option<(StateID, Arc<Acc>)> {
          if let Some((path, acc)) = node.inner.as_single_path() {
              // Path must have length 2. The path is from leaf to root.
              if path.len() == 2 {
                  let edge_to_leaf = &path[0];
                  let edge_to_middle = &path[1];

                  // The edge into the leaf must be the hallucinated one.
                  if edge_to_leaf.state_id == hallucinated_state_id {
                      let state_id_x = edge_to_middle.state_id;
                      // The structure is what matters for caching, not the contents.
                      return Some((state_id_x, Arc::new(acc)));
                  }
              }
          }
          None
      }

      // helper used by parser logging
      pub fn popn_collect_isolated_parents(node_arc: &Arc<GSSNode>, n: usize) -> Vec<(StateID, Arc<GSSNode>)> {
          let popped = node_arc.inner.popn(n as isize);
          let mut out = Vec::new();
          for edge in popped.peek() {
              let iso_inner = popped.isolate(Some(edge.clone()));
              let num_paths = iso_inner.num_paths();
              if num_paths > 0 {
                  let gss_node = Arc::new(GSSNode { inner: iso_inner });
                  for _ in 0..num_paths {
                      out.push((edge.state_id, gss_node.clone()));
                  }
              }
          }
          out
      }

      // Compatibility for formatting acc (used by printer)
      pub(crate) fn format_acc(
          acc: &Acc,
          terminal_map: &BiBTreeMap<Terminal, TerminalID>,
          original_internal_bimap: Option<&BTreeMap<usize, usize>>,
          llm_token_map: Option<&BiBTreeMap<Vec<u8>, LLMTokenID>>,
          config: &GSSPrintConfig,
      ) -> String {
          let _ = (original_internal_bimap, llm_token_map);

          if config.verbose {
              // In verbose mode, print the full debug representation of the Acc.
              return format!("[acc: {:?}]", acc);
          }

          let summarize_llm = |bv: &HybridBitset, label: &str| -> Option<String> {
              if *bv == HybridBitset::max_ones() {
                  return None;
              }
              if bv.is_empty() {
                  return Some(format!("{}=∅", label));
              }
              let total = bv.len();
              const MAX_SHOW: usize = 8;
              let sample: Vec<String> = bv.iter().take(MAX_SHOW).map(|id| id.to_string()).collect();
              if total > MAX_SHOW {
                  Some(format!("{}({}): [{} …]", label, total, sample.join(", ")))
              } else {
                  Some(format!("{}({}): [{}]", label, total, sample.join(", ")))
              }
          };

          let summarize_disallowed_terminals = |allowed_terminals: &HybridL2Bitset, label: &str| -> Option<String> {
              let mut any_disallowed = false;
              let mut parts = Vec::new();
              const MAX_RANGES_TO_SHOW: usize = 3;
              for (range, allowed_bv) in allowed_terminals.range_values() {
                  let disallowed_bv = HybridBitset::max_ones() - allowed_bv;
                  if disallowed_bv.is_empty() {
                      continue;
                  }
                  any_disallowed = true;
                  if parts.len() >= MAX_RANGES_TO_SHOW {
                      break;
                  }
                  let range_str = if range.start() == range.end() {
                      format!("{}", range.start())
                  } else {
                      format!("{}..={}", range.start(), range.end())
                  };

                  if disallowed_bv == HybridBitset::max_ones() {
                      parts.push(format!("state(s) {}: all", range_str));
                      continue;
                  }

                  const MAX_NAMES_TO_SHOW: usize = 5;
                  let num_disallowed = disallowed_bv.len();
                  let names: Vec<_> = disallowed_bv.iter().take(MAX_NAMES_TO_SHOW)
                      .map(|tid_val| terminal_map.get_by_right(&TerminalID(tid_val))
                          .map_or_else(|| format!("<ID:{}>", tid_val), |t| t.to_string()))
                      .collect();
                  let names_str = names.join(", ");

                  if num_disallowed > MAX_NAMES_TO_SHOW {
                      parts.push(format!("state(s) {} ({}): [{}, …]", range_str, num_disallowed, names_str));
                  } else {
                      parts.push(format!("state(s) {}: [{}]", range_str, names_str));
                  }
              }
              if !any_disallowed {
                  None
              } else if parts.is_empty() {
                  Some(format!("Disallowed {}(…)", label))
              } else {
                  Some(format!("Disallowed {}({})", label, parts.join("; ")))
              }
          };

          let union_llm_opt = summarize_llm(&acc.llm_tokens_union, "LLM(U)");
          let union_terminals_opt = summarize_disallowed_terminals(&acc.terminals_union, "Term(U)");

          let stored_trie_nodes_str = {
              const MAX_PTRS_TO_SHOW: usize = 5;
              let n = acc.stored_trie_nodes().len();
              if n == 0 {
                  None
              } else if n <= MAX_PTRS_TO_SHOW {
                  let ptrs: Vec<String> = acc
                      .stored_trie_nodes()
                      .iter()
                      .map(|wrapper| format!("{}", wrapper.as_arc()))
                      .collect();
                  Some(format!("Trie(n={}, [{}])", n, ptrs.join(", ")))
              } else {
                  let ptrs_sample: Vec<String> = acc
                      .stored_trie_nodes()
                      .iter()
                      .take(MAX_PTRS_TO_SHOW)
                      .map(|wrapper| format!("{}", wrapper.as_arc()))
                      .collect();
                  let remaining = n - MAX_PTRS_TO_SHOW;
                  Some(format!("Trie(n={}, first {}: {}, …; +{} more)", n, MAX_PTRS_TO_SHOW, ptrs_sample.join(", "), remaining))
              }
          };

          let mut parts: Vec<String> = Vec::new();
          if let Some(s) = union_llm_opt { parts.push(s); }
          if let Some(s) = union_terminals_opt { parts.push(s); }
          if let Some(s) = stored_trie_nodes_str { parts.push(s); }

          if parts.is_empty() {
              String::new()
          } else {
              format!("[{}]", parts.join(", "))
          }
      }
    src/datastructures/leveled_gss.rs: |
      //! Pure Rust, Python-free core implementation of the Leveled GSS.
      //! This module contains the generic data structures and algorithms, parameterized
      //! over stack item type `T` and accumulator type `A`.
      //!
      //! - T must implement Clone + Eq + Hash
      //! - A must implement Clone + Eq + Hash + Merge
      //!
      //! The representation mirrors the Python implementation's semantics and supports:
      //! - from_stacks / to_stacks
      //! - push, pop, popn
      //! - is_empty
      //! - isolate, isolate_many
      //! - apply, prune, apply_and_prune
      //! - merge, peek, reduce_acc
      //!
      //! All logic here is pure Rust and contains no Python bindings.

      use im::{HashMap as IHashMap, OrdMap};
      use profiler_macro::time_it;
      use std::collections::{BTreeMap, HashMap as StdHashMap, HashSet, VecDeque};
      use std::hash::Hash;
      use std::sync::Arc;

      /// Trait for accumulator types that can be merged.
      pub trait Merge: Clone {
          fn merge(&self, other: &Self) -> Self;
      }

      type Children<T, N> = IHashMap<T, OrdMap<isize, Arc<N>>>;

      #[derive(Clone)]
      struct Lower<T: Clone + Eq + Hash> {
          children: Children<T, Lower<T>>,
          empty: bool,
          max_depth: isize,
      }

      #[derive(Clone)]
      struct Interface<T: Clone + Eq + Hash, A: Merge + Clone + Eq + Hash> {
          inner: Arc<Lower<T>>,
          acc: A,
      }

      #[derive(Clone)]
      struct UpperBranch<T: Clone + Eq + Hash, A: Merge + Clone + Eq + Hash> {
          children: Children<T, Upper<T, A>>,
          empty: Option<A>,
          max_depth: isize,
      }

      #[derive(Clone)]
      enum Upper<T: Clone + Eq + Hash, A: Merge + Clone + Eq + Hash> {
          Branch(Arc<UpperBranch<T, A>>),
          Interface(Arc<Interface<T, A>>),
      }

      impl<T: Clone + Eq + Hash, A: Merge + Clone + Eq + Hash> Upper<T, A> {
          fn max_depth(&self) -> isize {
              match self {
                  Upper::Branch(b) => b.max_depth,
                  Upper::Interface(i) => {
                      if i.inner.children.is_empty() {
                          0
                      } else {
                          i.inner.max_depth + 1
                      }
                  }
              }
          }

          fn children_keys(&self) -> Vec<T> {
              match self {
                  Upper::Branch(b) => b.children.keys().cloned().collect(),
                  Upper::Interface(i) => i.inner.children.keys().cloned().collect(),
              }
          }
      }

      #[cfg(test)]
      mod tests {
          use super::*;
          use std::sync::Arc;

          // A simple accumulator that just collects integers.
          #[derive(Clone, Eq, PartialEq, Hash, Debug, Ord, PartialOrd)]
          struct IntAcc(im::HashSet<i32>);

          impl Merge for IntAcc {
              fn merge(&self, other: &Self) -> Self {
                  IntAcc(self.0.clone().union(other.0.clone()))
              }
          }

          impl IntAcc {
              fn new(vals: &[i32]) -> Self {
                  let mut set = im::HashSet::new();
                  for &v in vals {
                      set.insert(v);
                  }
                  IntAcc(set)
              }
          }

          type TestGSS = LeveledGSS<String, IntAcc>;
          type TestGSSInt = LeveledGSS<i32, IntAcc>;

          fn gss_from_str_stacks(stacks: &[(&[&str], &[i32])]) -> TestGSS {
              let stacks_vec: Vec<(Vec<String>, IntAcc)> = stacks
                  .iter()
                  .map(|(s, a)| {
                      (
                          s.iter().map(|&v| v.to_string()).collect(),
                          IntAcc::new(a),
                      )
                  })
                  .collect();
              TestGSS::from_stacks(&stacks_vec)
          }

          #[test]
          fn test_pop_sharing_and_determinism() {
              let gss0 = gss_from_str_stacks(&[(
                  &["A", "B", "C"],
                  &[1],
              )]);

              let gss1 = gss0.pop();
              let gss2 = gss0.pop();

              // Popping is deterministic and should produce structurally identical GSS
              // with maximum sharing.
              assert!(gss1.inner_ptrs_eq(&gss2));
              assert!(!gss1.ptr_eq(&gss2)); // The top-level Arc will be different.
          }

          #[test]
          fn test_push_pop_identity() {
              let gss0 = gss_from_str_stacks(&[(
                  &["A", "B"],
                  &[1],
              )]);

              let gss1 = gss0.push("X".to_string()).pop();

              // push followed by pop should return the exact same GSS structure.
              assert!(gss0.inner_ptrs_eq(&gss1));
              assert!(!gss0.ptr_eq(&gss1)); // The top-level Arc will be different.
          }

          #[test]
          fn test_push_pop_identity_from_empty() {
              let gss0 = TestGSS::empty();
              let gss1 = gss0.push("X".to_string()).pop();

              // On an empty GSS, push is a no-op, so pop is also a no-op on the result.
              assert!(gss0.ptr_eq(&gss1));
          }

          #[test]
          fn test_pop_preserves_child_node_sharing() {
              let gss_abc = gss_from_str_stacks(&[(
                  &["C", "B", "A"],
                  &[1],
              )]);

              let gss_bc_from_pop = gss_abc.pop();

              // Manually find the node for "B"->"C" in the original GSS
              let preds = gss_abc.predecessors();
              let children_of_a = preds.get(&"A".to_string()).unwrap();
              let gss_bc_from_preds = children_of_a.values().next().unwrap().first().unwrap();

              // The GSS resulting from pop should be structurally identical to the
              // predecessor GSS found inside the original.
              assert!(gss_bc_from_pop.inner_ptrs_eq(gss_bc_from_preds));

              // And more strongly, the children of their roots should be the *same pointers*.
              let inner_pop = &gss_bc_from_pop.inner;
              let inner_preds = &gss_bc_from_preds.inner;

              match (&**inner_pop, &**inner_preds) {
                  (Upper::Interface(i_pop), Upper::Interface(i_preds)) => {
                      let children_pop = i_pop.inner.children.get(&"B".to_string()).unwrap();
                      let children_preds = i_preds.inner.children.get(&"B".to_string()).unwrap();
                      let child_c_pop = children_pop.values().next().unwrap();
                      let child_c_preds = children_preds.values().next().unwrap();
                      assert!(Arc::ptr_eq(child_c_pop, child_c_preds));
                  }
                  _ => panic!("Expected Interface nodes"),
              }
          }

          #[test]
          fn test_parallel_push_identity_empty() {
              let gss0 = gss_from_str_stacks(&[(
                  &[],
                  &[1],
              )]);

              let gss1 = gss0.push("X".to_string());
              let gss2 = gss0.push("X".to_string());

              assert!(gss1.inner_ptrs_eq(&gss2));
              assert!(!gss1.ptr_eq(&gss2)); // The top-level Arc will be different.
          }

          #[test]
          fn test_parallel_push_identity_one() {
              let gss0 = gss_from_str_stacks(&[(
                  &["A"],
                  &[1],
              )]);

              let gss1 = gss0.push("X".to_string());
              let gss2 = gss0.push("X".to_string());

              assert!(gss1.inner_ptrs_eq(&gss2));
              assert!(!gss1.ptr_eq(&gss2)); // The top-level Arc will be different.
          }

          #[test]
          fn test_parallel_push_identity_two() {
              let gss0 = gss_from_str_stacks(&[(
                  &["A", "B"],
                  &[1],
              )]);

              let gss1 = gss0.push("X".to_string());
              let gss2 = gss0.push("X".to_string());

              assert!(gss1.inner_ptrs_eq(&gss2));
              assert!(!gss1.ptr_eq(&gss2)); // The top-level Arc will be different.
          }

          #[test]
          fn test_isolate_preserves_ptr_on_noop() {
              // Case 1: Isolate single child, no empty. Should be a no-op.
              let gss0 = gss_from_str_stacks(&[(&["A"], &[1])]);
              let gss1 = gss0.isolate(Some("A".to_string()));
              assert!(gss0.ptr_eq(&gss1));

              // Case 2: Isolate None on a GSS that is only an empty path. Should be a no-op.
              let gss2 = gss_from_str_stacks(&[(&[], &[1])]);
              let gss3 = gss2.isolate(None);
              assert!(gss2.ptr_eq(&gss3));

              // Case 3: Isolate single child from multiple. Should NOT be a no-op.
              let gss4 = gss_from_str_stacks(&[(&["A"], &[1]), (&["B"], &[2])]);
              let gss5 = gss4.isolate(Some("A".to_string()));
              assert!(!gss4.ptr_eq(&gss5));

              // Case 4: Isolate None from a GSS with children. Should NOT be a no-op.
              let gss6 = gss_from_str_stacks(&[(&["A"], &[1]), (&[], &[2])]);
              let gss7 = gss6.isolate(None);
              assert!(!gss6.ptr_eq(&gss7));
          }

          #[test]
          fn test_isolate_many_preserves_ptr_on_noop() {
              let gss0 = gss_from_str_stacks(&[(&["A"], &[1]), (&["B"], &[2]), (&[], &[3])]);

              // Case 1: Select all children and empty. Should be a no-op.
              let gss1 = gss0.isolate_many(vec![Some("A".to_string()), Some("B".to_string()), None]);
              assert!(gss0.ptr_eq(&gss1));

              // Case 2: Select a superset of children. Should be a no-op.
              let gss2 = gss0.isolate_many(vec![Some("A".to_string()), Some("B".to_string()), Some("C".to_string()), None]);
              assert!(gss0.ptr_eq(&gss2));

              // Case 3: Select a subset of children. Should NOT be a no-op.
              let gss3 = gss0.isolate_many(vec![Some("A".to_string()), None]);
              assert!(!gss0.ptr_eq(&gss3));

              // Case 4: Select all children but forget empty. Should NOT be a no-op.
              let gss4 = gss0.isolate_many(vec![Some("A".to_string()), Some("B".to_string())]);
              assert!(!gss0.ptr_eq(&gss4));

              // Case 5: GSS with no empty, select all children and None. Should NOT be a no-op.
              let gss5 = gss_from_str_stacks(&[(&["A"], &[1]), (&["B"], &[2])]);
              let gss6 = gss5.isolate_many(vec![Some("A".to_string()), Some("B".to_string()), None]);
              assert!(!gss5.ptr_eq(&gss6));
          }

          #[test]
          fn test_filter_by_length_preserves_ptr_on_noop() {
              let gss0 = gss_from_str_stacks(&[
                  (&["A", "B", "C"], &[1]),
                  (&["X", "Y"], &[2]),
                  (&["Z"], &[3]),
                  (&[], &[4]),
              ]);

              // Case 1: No filter applied. Should be a no-op.
              let gss1 = gss0.filter_by_length(None, None);
              assert!(gss0.ptr_eq(&gss1));

              // Case 2: Filter range includes all paths. Should be a no-op.
              // Paths have lengths 0, 1, 2, 3.
              let gss2 = gss0.filter_by_length(Some(0), Some(3));
              assert!(gss0.ptr_eq(&gss2));
              let gss3 = gss0.filter_by_length(Some(-1), Some(10));
              assert!(gss0.ptr_eq(&gss3));

              // Case 3: Filter prunes some paths. Should NOT be a no-op.
              let gss4 = gss0.filter_by_length(Some(1), Some(2));
              assert!(!gss0.ptr_eq(&gss4));
              assert_eq!(gss4.to_stacks().len(), 2);

              // Case 4: Filter on empty GSS.
              let gss_empty = TestGSS::empty();
              let gss_empty_filtered = gss_empty.filter_by_length(Some(1), Some(2));
              assert!(gss_empty.ptr_eq(&gss_empty_filtered));
          }

          #[test]
          fn test_prune_preserves_ptr_on_noop() {
              // GSS with two different accumulators.
              let gss0 = gss_from_str_stacks(&[
                  (&["A", "B"], &[1, 2]), // acc IntAcc({1, 2})
                  (&["X"], &[3]),       // acc IntAcc({3})
                  (&[], &[1, 3]),       // acc IntAcc({1, 3})
              ]);

              // Case 1: Predicate keeps everything. Should be a no-op.
              let gss1 = gss0.prune(|_acc| true);
              assert!(gss0.ptr_eq(&gss1));

              // Case 2: Predicate prunes something. Should NOT be a no-op.
              let gss2 = gss0.prune(|acc| acc.0.contains(&1));
              assert!(!gss0.ptr_eq(&gss2));
              // The path ["X"] with acc {3} should be pruned.
              assert_eq!(gss2.to_stacks().len(), 2);

              // Case 3: Predicate prunes everything. Result should be empty.
              let gss3 = gss0.prune(|_acc| false);
              assert!(gss3.is_empty());
              assert!(!gss0.ptr_eq(&gss3));

              // Case 4: Prune on empty GSS.
              let gss_empty = TestGSS::empty();
              let gss_empty_pruned = gss_empty.prune(|_acc| true);
              assert!(gss_empty.ptr_eq(&gss_empty_pruned));
          }

          #[test]
          fn test_normalization_sharing_factor_regression() {
              type TestGSSInt = LeveledGSS<i32, IntAcc>;

              // Manually construct the GSS from the log to reproduce the issue.
              // The key is to create a structure that is not fully optimal,
              // with multiple paths to similar substructures that are not yet shared.

              // 1. Build the shared terminal `Lower` node.
              // This corresponds to `Lower @ ... (MaxDepth: 0) [TERMINAL]` in the log.
              let l_terminal = new_lower::<i32>(IHashMap::new(), true);

              // 2. Build the `Lower` node that is a parent to the terminal via edge 500.
              // This is a shared structural component.
              let l_500_parent = new_lower(
                  IHashMap::unit(500, OrdMap::unit(l_terminal.max_depth, l_terminal.clone())),
                  false,
              );

              // 3. Build the `Interface` nodes.

              // The branch for path `... -> 295 -> 569 -> 500`
              let i_54_inner = new_lower(
                  IHashMap::unit(569, OrdMap::unit(l_500_parent.max_depth, l_500_parent.clone())),
                  false,
              );
              let i_54 = new_interface(i_54_inner, IntAcc::new(&[54]));

              // The branch with 10 parallel interfaces. Their `inner` is `l_500_parent`.
              let acc_vals = vec![38, 39, 40, 44, 45, 46, 47, 48, 49, 50];
              let interfaces_10: Vec<_> = acc_vals
                  .iter()
                  .map(|&acc| new_interface(l_500_parent.clone(), IntAcc::new(&[acc])))
                  .collect();

              // 4. Build the `UpperBranch` nodes.
              let edge_vals = vec![419, 437, 66, 477, 531, 541, 556, 558, 560, 562];
              let mut children_101 = IHashMap::new();
              for (edge, interface) in edge_vals.iter().zip(interfaces_10.iter()) {
                  children_101.insert(*edge, OrdMap::unit(interface.max_depth(), interface.clone()));
              }
              let ub_101 = new_branch(children_101, None);

              let ub_295_d4 = new_branch(
                  IHashMap::unit(101, OrdMap::unit(ub_101.max_depth(), ub_101)),
                  None,
              );

              // 5. Build the root, which has two children for edge 295 at different depths.
              let mut children_295 = OrdMap::new();
              children_295.insert(i_54.max_depth(), i_54);
              children_295.insert(ub_295_d4.max_depth(), ub_295_d4);
              let root_children = IHashMap::unit(295, children_295);
              let root_inner = new_branch(root_children, None);

              let gss = TestGSSInt { inner: root_inner };

              // 6. Check stats before normalization to confirm we've built the right structure.
              let stats_before = gss.stats();

              // 7. Normalize and check stats after.
              let gss_after = gss.normalize();
              let stats_after = gss_after.stats();

              println!("GSS before normalization: {}", gss.to_graph_string(false));
              println!("GSS after normalization: {}", gss_after.to_graph_string(false));

              println!("Stats before: {:?}", stats_before);
              println!("Stats after: {:?}", stats_after);

              // The number of paths must be conserved.
              assert_eq!(gss.to_stacks().len(), 11);
              assert_eq!(gss_after.to_stacks().len(), 11);

              // Normalization should not increase the number of nodes.
              // In this case, fusing balances out other changes, so it's equal.
              assert!(
                  stats_after.total_unique_nodes <= stats_before.total_unique_nodes,
                  "total unique nodes increased: {} vs {}",
                  stats_before.total_unique_nodes,
                  stats_after.total_unique_nodes
              );

              // The number of unique lower nodes should be preserved.
              assert_eq!(stats_before.num_lower_nodes, 3);
              assert_eq!(stats_after.num_lower_nodes, 2);

              // The multi-depth slot at the root should be fused.
              assert_eq!(stats_before.num_multi_depth_slots_upper, 1);
              assert_eq!(stats_after.num_multi_depth_slots_upper, 0);

              // The number of structurally unique nodes should also decrease as the
              // graph becomes more regular after fusing.
              assert!(
                  stats_after.num_structurally_unique_nodes < stats_before.num_structurally_unique_nodes,
                  "num structurally unique nodes did not decrease: {} vs {}",
                  stats_before.num_structurally_unique_nodes,
                  stats_after.num_structurally_unique_nodes
              );
              assert_eq!(stats_before.num_structurally_unique_nodes, 6);
              assert_eq!(stats_after.num_structurally_unique_nodes, 5);
          }

          #[test]
          fn test_split_at_depth() {
              let gss = gss_from_str_stacks(&[
                  (&["A", "B", "C"], &[1]),
                  (&["A", "D"], &[2]),
                  (&["E"], &[3]),
              ]);

              // Split at depth 1
              let (below1, above1) = gss.split_at_depth(1);

              let expected_below1 = gss_from_str_stacks(&[
                  (&["B", "C"], &[1]),
                  (&["D"], &[2]),
                  (&[], &[3]),
              ]);
              let expected_above1 = gss_from_str_stacks(&[
                  (&["A"], &[1, 2]),
                  (&["E"], &[3]),
              ]);

              assert_eq!(below1.to_stacks().into_iter().collect::<HashSet<_>>(), expected_below1.to_stacks().into_iter().collect::<HashSet<_>>());
              assert_eq!(above1.to_stacks().into_iter().collect::<HashSet<_>>(), expected_above1.to_stacks().into_iter().collect::<HashSet<_>>());

              // Split at depth 2
              let (below2, above2) = gss.split_at_depth(2);
              let expected_below2 = gss_from_str_stacks(&[
                  (&["C"], &[1]),
                  (&[], &[2]),
              ]);
              let expected_above2 = gss_from_str_stacks(&[
                  (&["A", "B"], &[1]),
                  (&["A", "D"], &[2]),
                  (&["E"], &[3]),
              ]);
              assert_eq!(below2.to_stacks().into_iter().collect::<HashSet<_>>(), expected_below2.to_stacks().into_iter().collect::<HashSet<_>>());
              assert_eq!(above2.to_stacks().into_iter().collect::<HashSet<_>>(), expected_above2.to_stacks().into_iter().collect::<HashSet<_>>());
          }

          #[test]
          fn test_accs_by_depth() {
              let gss = gss_from_str_stacks(&[
                  (&["A", "B"], &[1]), // len 2
                  (&["C", "D"], &[2]), // len 2
                  (&["E"], &[3]),       // len 1
                  (&[], &[4]),         // len 0
              ]);

              let accs = gss.accs_by_depth();

              let mut expected = BTreeMap::new();
              expected.insert(0, IntAcc::new(&[4]));
              expected.insert(1, IntAcc::new(&[3]));
              expected.insert(2, IntAcc::new(&[1, 2]));

              assert_eq!(accs.len(), 3);
              assert_eq!(accs.get(&0), expected.get(&0));
              assert_eq!(accs.get(&1), expected.get(&1));
              assert_eq!(accs.get(&2), expected.get(&2));
          }
      }

      // --------------------
      // Small, reusable helpers
      // --------------------

      #[derive(Debug, Clone, Copy, Default)]
      pub struct GSSPathsInfo {
          pub num_paths: usize,
          pub total_depth: usize,
      }

      impl std::ops::Add for GSSPathsInfo {
          type Output = Self;
          fn add(self, rhs: Self) -> Self {
              Self {
                  num_paths: self.num_paths + rhs.num_paths,
                  total_depth: self.total_depth + rhs.total_depth,
              }
          }
      }

      impl std::ops::AddAssign for GSSPathsInfo {
          fn add_assign(&mut self, rhs: Self) {
              self.num_paths += rhs.num_paths;
              self.total_depth += rhs.total_depth;
          }
      }

      fn merge_optional_acc<A: Merge + Clone>(a: &Option<A>, b: &Option<A>) -> Option<A> {
          match (a, b) {
              (None, Some(bv)) => Some(bv.clone()),
              (Some(av), None) => Some(av.clone()),
              (Some(av), Some(bv)) => Some(av.merge(bv)),
              (None, None) => None,
          }
      }

      fn max_depth_from_children<T, N, F>(children: &Children<T, N>, depth_of: F) -> isize
      where
          T: Clone + Eq + Hash,
          F: Fn(&Arc<N>) -> isize,
      {
          children
              .values()
              .flat_map(|kids| kids.values())
              .map(|c| depth_of(c))
              .max()
              .map_or(0, |d| d + 1)
      }

      fn merge_children<T, N, F>(c1: &Children<T, N>, c2: &Children<T, N>, merge_fn: F) -> Children<T, N>
      where
          T: Clone + Eq + Hash,
          F: Fn(&Arc<N>, &Arc<N>) -> Arc<N>,
      {
          if c1.ptr_eq(c2) {
              return c1.clone();
          }
          let mut merged = c1.clone();
          for (k, v2_map) in c2.iter() {
              if let Some(v1_map) = merged.get(k) {
                  let mut new_map = v1_map.clone();
                  for (depth, child2) in v2_map.iter() {
                      if let Some(child1) = new_map.get(depth) {
                          let merged_child = merge_fn(child1, child2);
                          new_map.insert(*depth, merged_child);
                      } else {
                          new_map.insert(*depth, child2.clone());
                      }
                  }
                  merged.insert(k.clone(), new_map);
              } else {
                  merged.insert(k.clone(), v2_map.clone());
              }
          }
          merged
      }

      fn new_lower<T: Clone + Eq + Hash>(children: Children<T, Lower<T>>, empty: bool) -> Arc<Lower<T>> {
          let max_depth = max_depth_from_children(&children, |n: &Arc<Lower<T>>| n.max_depth);
          Arc::new(Lower {
              children,
              empty,
              max_depth,
          })
      }

      fn new_interface<T, A>(inner: Arc<Lower<T>>, acc: A) -> Arc<Upper<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          Arc::new(Upper::Interface(Arc::new(Interface { inner, acc })))
      }

      fn new_branch<T, A>(
          children: Children<T, Upper<T, A>>,
          empty: Option<A>,
      ) -> Arc<Upper<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          let max_depth = max_depth_from_children(&children, |n: &Arc<Upper<T, A>>| n.max_depth());
          Arc::new(Upper::Branch(Arc::new(UpperBranch {
              children,
              empty,
              max_depth,
          })))
      }

      fn empty_upper_inner<T, A>() -> Arc<Upper<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          new_branch(IHashMap::new(), None)
      }

      // --------------------
      // Filtering
      // --------------------

      fn filter_lower<T: Clone + Eq + Hash>(
          node: &Arc<Lower<T>>,
          current_depth: isize,
          min_len: Option<isize>,
          max_len: Option<isize>,
      ) -> Option<Arc<Lower<T>>> {
          let min_d = min_len.unwrap_or(0);
          let max_d = max_len.unwrap_or(isize::MAX);

          if current_depth > max_d {
              return None;
          }

          let keep_empty = node.empty && current_depth >= min_d;

          let mut new_children: Children<T, Lower<T>> = IHashMap::new();
          let mut children_identical = true;

          if current_depth < max_d {
              for (v, kids) in node.children.iter() {
                  let mut new_kids: OrdMap<isize, Arc<Lower<T>>> = OrdMap::new();
                  let mut same_kids = true;
                  let mut count = 0usize;
                  for (orig_depth, child) in kids.iter() {
                      if let Some(new_child) =
                          filter_lower(child, current_depth + 1, min_len, max_len)
                      {
                          // Preserve identicality if pointer and depth key match
                          if !Arc::ptr_eq(&new_child, child) || new_child.max_depth != *orig_depth {
                              same_kids = false;
                          }
                          new_kids.insert(new_child.max_depth, new_child);
                          count += 1;
                      } else {
                          same_kids = false;
                      }
                  }
                  if count > 0 {
                      new_children.insert(v.clone(), new_kids);
                  } else {
                      children_identical = false;
                  }
                  children_identical &= same_kids;
              }
          } else {
              // We cannot descend; identical only if there were no children to begin with
              children_identical = node.children.is_empty();
          }

          // If nothing changed at this node, return the original pointer for maximal sharing.
          if keep_empty == node.empty && children_identical {
              return Some(node.clone());
          }

          if !keep_empty && new_children.is_empty() {
              None
          } else {
              Some(new_lower(new_children, keep_empty))
          }
      }

      fn filter_upper<T, A>(
          node: &Arc<Upper<T, A>>,
          current_depth: isize,
          min_len: Option<isize>,
          max_len: Option<isize>,
      ) -> Option<Arc<Upper<T, A>>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          let min_d = min_len.unwrap_or(0);
          let max_d = max_len.unwrap_or(isize::MAX);

          if current_depth > max_d {
              return None;
          }

          match &**node {
              Upper::Branch(b) => {
                  let keep_empty = b.empty.is_some() && current_depth >= min_d;
                  let new_empty = if keep_empty { b.empty.clone() } else { None };

                  let mut new_children: Children<T, Upper<T, A>> = IHashMap::new();
                  let mut children_identical = true;
                  if current_depth < max_d {
                      for (v, kids) in b.children.iter() {
                          let mut new_kids: OrdMap<isize, Arc<Upper<T, A>>> = OrdMap::new();
                          let mut same_kids = true;
                          let mut count = 0usize;
                          for (orig_depth, child) in kids.iter() {
                              if let Some(new_child) =
                                  filter_upper(child, current_depth + 1, min_len, max_len)
                              {
                                  if !Arc::ptr_eq(&new_child, child)
                                      || new_child.max_depth() != *orig_depth
                                  {
                                      same_kids = false;
                                  }
                                  new_kids.insert(new_child.max_depth(), new_child);
                                  count += 1;
                              } else {
                                  same_kids = false;
                              }
                          }
                          if count > 0 {
                              new_children.insert(v.clone(), new_kids);
                          } else {
                              children_identical = false;
                          }
                          children_identical &= same_kids;
                      }
                  } else {
                      // We cannot descend; identical only if there were no children to begin with
                      children_identical = b.children.is_empty();
                  }

                  // If nothing changed at this node, return original pointer for maximal sharing.
                  if new_empty == b.empty && children_identical {
                      return Some(node.clone());
                  }

                  if new_children.is_empty() && new_empty.is_none() {
                      None
                  } else {
                      let new_b = new_branch(new_children, new_empty);
                      Some(try_promote(&new_b))
                  }
              }
              Upper::Interface(i) => {
                  let keep_empty = i.inner.empty && current_depth >= min_d;

                  let mut new_children: Children<T, Lower<T>> = IHashMap::new();
                  let mut children_identical = true;
                  if current_depth < max_d {
                      for (v, kids) in i.inner.children.iter() {
                          let mut new_kids: OrdMap<isize, Arc<Lower<T>>> = OrdMap::new();
                          let mut same_kids = true;
                          let mut count = 0usize;
                          for (orig_depth, child) in kids.iter() {
                              if let Some(new_child) =
                                  filter_lower(child, current_depth + 1, min_len, max_len)
                              {
                                  if !Arc::ptr_eq(&new_child, child)
                                      || new_child.max_depth != *orig_depth
                                  {
                                      same_kids = false;
                                  }
                                  new_kids.insert(new_child.max_depth, new_child);
                                  count += 1;
                              } else {
                                  same_kids = false;
                              }
                          }
                          if count > 0 {
                              new_children.insert(v.clone(), new_kids);
                          } else {
                              children_identical = false;
                          }
                          children_identical &= same_kids;
                      }
                  } else {
                      children_identical = i.inner.children.is_empty();
                  }

                  if !keep_empty && new_children.is_empty() {
                      return None;
                  }

                  if keep_empty == i.inner.empty && children_identical {
                      return Some(node.clone());
                  }

                  let new_inner = new_lower(new_children, keep_empty);
                  Some(new_interface(new_inner, i.acc.clone()))
              }
          }
      }

      fn truncate_lower<T: Clone + Eq + Hash>(
          node: &Arc<Lower<T>>,
          current_depth: isize,
          max_len: isize,
          memo: &mut StdHashMap<usize, Option<Arc<Lower<T>>>>,
      ) -> Option<Arc<Lower<T>>> {
          let ptr = Arc::as_ptr(node) as usize;
          if let Some(cached) = memo.get(&ptr) {
              return cached.clone();
          }

          if current_depth == max_len {
              let res = if node.empty || !node.children.is_empty() {
                  Some(new_lower(IHashMap::new(), true))
              } else {
                  None
              };
              memo.insert(ptr, res.clone());
              return res;
          }

          let mut new_children: Children<T, Lower<T>> = IHashMap::new();
          let mut children_identical = true;

          for (v, kids) in node.children.iter() {
              let mut new_kids_map = OrdMap::new();
              let mut kids_identical = true;
              for (depth, child) in kids.iter() {
                  if let Some(new_child) = truncate_lower(child, current_depth + 1, max_len, memo) {
                      if !Arc::ptr_eq(child, &new_child) || *depth != new_child.max_depth {
                          kids_identical = false;
                      }
                      new_kids_map.insert(new_child.max_depth, new_child);
                  } else {
                      kids_identical = false;
                  }
              }
              if !new_kids_map.is_empty() {
                  new_children.insert(v.clone(), new_kids_map);
              } else {
                  children_identical = false;
              }
              children_identical &= kids_identical;
          }

          if node.empty && children_identical {
              memo.insert(ptr, Some(node.clone()));
              return Some(node.clone());
          }

          let res = if !node.empty && new_children.is_empty() {
              None
          } else {
              Some(new_lower(new_children, node.empty))
          };
          memo.insert(ptr, res.clone());
          res
      }

      fn truncate_upper<T, A>(
          node: &Arc<Upper<T, A>>,
          current_depth: isize,
          max_len: isize,
          memo_upper: &mut StdHashMap<usize, Option<Arc<Upper<T, A>>>>,
          memo_lower: &mut StdHashMap<usize, Option<Arc<Lower<T>>>>,
      ) -> Option<Arc<Upper<T, A>>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          let ptr = Arc::as_ptr(node) as usize;
          if let Some(cached) = memo_upper.get(&ptr) {
              return cached.clone();
          }

          if current_depth == max_len {
              let sub_gss = LeveledGSS {
                  inner: node.clone(),
              };
              let res = if let Some(acc) = sub_gss.reduce_acc() {
                  let terminal_lower = new_lower(IHashMap::new(), true);
                  Some(new_interface(terminal_lower, acc))
              } else {
                  None
              };
              memo_upper.insert(ptr, res.clone());
              return res;
          }

          let res = match &**node {
              Upper::Branch(b) => {
                  let new_empty = b.empty.clone();
                  let mut new_children: Children<T, Upper<T, A>> = IHashMap::new();
                  let mut children_identical = true;

                  for (v, kids) in b.children.iter() {
                      let mut new_kids_map = OrdMap::new();
                      let mut kids_identical = true;
                      for (depth, child) in kids.iter() {
                          if let Some(new_child) =
                              truncate_upper(child, current_depth + 1, max_len, memo_upper, memo_lower)
                          {
                              if !Arc::ptr_eq(child, &new_child) || *depth != new_child.max_depth() {
                                  kids_identical = false;
                              }
                              new_kids_map.insert(new_child.max_depth(), new_child);
                          } else {
                              kids_identical = false;
                          }
                      }
                      if !new_kids_map.is_empty() {
                          new_children.insert(v.clone(), new_kids_map);
                      } else {
                          children_identical = false;
                      }
                      children_identical &= kids_identical;
                  }

                  if new_empty == b.empty && children_identical {
                      memo_upper.insert(ptr, Some(node.clone()));
                      return Some(node.clone());
                  }

                  if new_children.is_empty() && new_empty.is_none() {
                      None
                  } else {
                      Some(try_promote(&new_branch(new_children, new_empty)))
                  }
              }
              Upper::Interface(i) => {
                  if let Some(new_inner) = truncate_lower(&i.inner, current_depth, max_len, memo_lower) {
                      if Arc::ptr_eq(&i.inner, &new_inner) {
                          Some(node.clone())
                      } else {
                          Some(new_interface(new_inner, i.acc.clone()))
                      }
                  } else {
                      None
                  }
              }
          };

          memo_upper.insert(ptr, res.clone());
          res
      }

      fn accs_by_depth_lower<T, A>(
          node: &Arc<Lower<T>>,
          current_depth: isize,
          acc: &A,
          accs: &mut BTreeMap<isize, A>,
          memo_lower: &mut HashSet<usize>,
      ) where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          let ptr = Arc::as_ptr(node) as usize;
          if !memo_lower.insert(ptr) {
              return;
          }

          if node.empty {
              if let Some(existing) = accs.get_mut(&current_depth) {
                  *existing = existing.merge(acc);
              } else {
                  accs.insert(current_depth, acc.clone());
              }
          }

          for kids in node.children.values() {
              for child in kids.values() {
                  accs_by_depth_lower(child, current_depth + 1, acc, accs, memo_lower);
              }
          }
      }

      fn accs_by_depth_upper<T, A>(
          node: &Arc<Upper<T, A>>,
          current_depth: isize,
          accs: &mut BTreeMap<isize, A>,
          memo_upper: &mut HashSet<usize>,
      ) where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          let ptr = Arc::as_ptr(node) as usize;
          if !memo_upper.insert(ptr) {
              return;
          }

          match &**node {
              Upper::Branch(b) => {
                  if let Some(acc) = &b.empty {
                      if let Some(existing) = accs.get_mut(&current_depth) {
                          *existing = existing.merge(acc);
                      } else {
                          accs.insert(current_depth, acc.clone());
                      }
                  }
                  for kids in b.children.values() {
                      for child in kids.values() {
                          accs_by_depth_upper(child, current_depth + 1, accs, memo_upper);
                      }
                  }
              }
              Upper::Interface(i) => {
                  let mut memo_lower = HashSet::new();
                  accs_by_depth_lower(&i.inner, current_depth, &i.acc, accs, &mut memo_lower);
              }
          }
      }

      // --------------------
      // Conversions and merges
      // --------------------

      fn merge_lower<T: Clone + Eq + Hash>(l1: &Arc<Lower<T>>, l2: &Arc<Lower<T>>) -> Arc<Lower<T>> {
          if Arc::ptr_eq(l1, l2) {
              return l1.clone();
          }
          let new_empty = l1.empty || l2.empty;
          let merged_children = merge_children(&l1.children, &l2.children, |a, b| merge_lower(a, b));
          new_lower(merged_children, new_empty)
      }

      fn interface_to_upperbranch<T, A>(it: &Arc<Interface<T, A>>) -> Arc<UpperBranch<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          let mut children: Children<T, Upper<T, A>> = IHashMap::new();
          for (v, kids) in it.inner.children.iter() {
              let mut v_map: OrdMap<isize, Arc<Upper<T, A>>> = OrdMap::new();
              for lchild in kids.values() {
                  let ci = new_interface(lchild.clone(), it.acc.clone());
                  v_map.insert(ci.max_depth(), ci);
              }
              if !v_map.is_empty() {
                  children.insert(v.clone(), v_map);
              }
          }

          let new_empty = if it.inner.empty {
              Some(it.acc.clone())
          } else {
              None
          };

          let max_depth = max_depth_from_children(&children, |n: &Arc<Upper<T, A>>| n.max_depth());
          Arc::new(UpperBranch {
              children,
              empty: new_empty,
              max_depth,
          })
      }

      fn merge_upperbranches<T, A>(
          a: &Arc<UpperBranch<T, A>>,
          b: &Arc<UpperBranch<T, A>>,
      ) -> Arc<Upper<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          if Arc::ptr_eq(a, b) {
              return Arc::new(Upper::Branch(a.clone()));
          }
          let new_empty = merge_optional_acc(&a.empty, &b.empty);
          let merged_children = merge_children(&a.children, &b.children, |x, y| merge_upper(x, y));
          let new_b = new_branch(merged_children, new_empty);
          try_promote(&new_b)
      }

      fn merge_interfaces<T, A>(a: &Arc<Interface<T, A>>, b: &Arc<Interface<T, A>>) -> Arc<Upper<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          // Keep as Interface if:
          // - both represent exactly the same set of stacks (lower identity: inner pointer-eq), or
          // - both already have the same accumulator.
          if a.acc == b.acc || Arc::ptr_eq(&a.inner, &b.inner) {
              let merged_lower = merge_lower(&a.inner, &b.inner);
              let new_acc = a.acc.merge(&b.acc);
              new_interface(merged_lower, new_acc)
          } else {
              let ub1 = interface_to_upperbranch(a);
              let ub2 = interface_to_upperbranch(b);
              merge_upperbranches(&ub1, &ub2)
          }
      }

      fn merge_upper<T, A>(u1: &Arc<Upper<T, A>>, u2: &Arc<Upper<T, A>>) -> Arc<Upper<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          if Arc::ptr_eq(u1, u2) {
              return u1.clone();
          }
          match (&**u1, &**u2) {
              (Upper::Interface(i1), Upper::Interface(i2)) => merge_interfaces(i1, i2),
              (Upper::Branch(b1), Upper::Branch(b2)) => merge_upperbranches(b1, b2),
              (Upper::Branch(b), Upper::Interface(i)) | (Upper::Interface(i), Upper::Branch(b)) => {
                  let ub = interface_to_upperbranch(i);
                  merge_upperbranches(b, &ub)
              }
          }
      }

      fn try_promote<T, A>(node: &Arc<Upper<T, A>>) -> Arc<Upper<T, A>>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          if let Upper::Branch(b) = &**node {
              let all_children: Vec<_> = b
                  .children
                  .values()
                  .flat_map(|kids| kids.values())
                  .collect();

              // Leaf-branch with explicit empty: represent as Interface with lower.empty=True and no children
              if all_children.is_empty() {
                  if let Some(empty) = &b.empty {
                      let lower_root = new_lower(IHashMap::new(), true);
                      return new_interface(lower_root, empty.clone());
                  }
                  return node.clone();
              }

              // Must have all Interface children to be promotable
              if !all_children
                  .iter()
                  .all(|c| matches!(&***c, Upper::Interface(_)))
              {
                  return node.clone();
              }

              // Collect all accumulators present across U.empty and children's acc
              let mut accs: HashSet<A> = HashSet::new();
              if let Some(empty) = &b.empty {
                  accs.insert(empty.clone());
              }
              for c in all_children {
                  if let Upper::Interface(ic) = &**c {
                      accs.insert(ic.acc.clone());
                  }
              }

              if accs.len() <= 1 {
                  if let Some(the_acc) = accs.into_iter().next() {
                      // Build lower layer by collapsing interface children to lowers
                      let mut l_children: Children<T, Lower<T>> = IHashMap::new();
                      for (v, kids) in b.children.iter() {
                          let mut v_map: OrdMap<isize, Arc<Lower<T>>> = OrdMap::new();
                          for child in kids.values() {
                              if let Upper::Interface(ci) = &**child {
                                  let lower = ci.inner.clone();
                                  v_map.insert(lower.max_depth, lower);
                              }
                          }
                          if !v_map.is_empty() {
                              l_children.insert(v.clone(), v_map);
                          }
                      }
                      let lower_root = new_lower(l_children, b.empty.is_some());
                      return new_interface(lower_root, the_acc);
                  } else {
                      return empty_upper_inner();
                  }
              }
          }
          node.clone()
      }

      fn empty_upper<T, A>() -> LeveledGSS<T, A>
      where
          T: Clone + Eq + Hash,
          A: Merge + Clone + Eq + Hash,
      {
          LeveledGSS {
              inner: empty_upper_inner(),
          }
      }

