      use std::fmt;

      #[derive(Debug, Clone)]
      pub struct Trie3MergeConfig {
          pub enabled: bool,
          pub exact_max_iters: usize,
      }

      impl Default for Trie3MergeConfig {
          fn default() -> Self {
              Self {
                  enabled: true,
                  exact_max_iters: 1000,
              }
          }
      }

      impl Trie3MergeConfig {
          pub fn off() -> Self {
              Self {
                  enabled: false,
                  exact_max_iters: 0,
              }
          }
