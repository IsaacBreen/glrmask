      Add the code for the global interner, including statics for zero, all, and the interning function. This code should be placed after the new struct definitions and before the fingerprint constants.

      ```rust
      // src/precompute4/weighted_automata/bitset.rs

      // Global interning for SimpleBitset
      struct Interner(HashMap<u64, Vec<Arc<SimpleBitsetInner>>>);
      static INTERNER: Lazy<Mutex<Interner>> = Lazy::new(|| Mutex::new(Interner(HashMap::new())));
      static ZEROS: Lazy<SimpleBitset> =
