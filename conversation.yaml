                          let (len, mut nts) = reduces.into_iter().next().unwrap();
                          let (nt_id, pids) = nts.into_iter().next().unwrap();
                          *self = Stage7ShiftsAndReducesLookaheadValue::Reduce { nonterminal_id: nt_id, len, production_ids: pids };
