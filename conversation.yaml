      #[derive(Clone)]
      pub struct Grammar {
          pub productions: Vec<Production>,
          pub start_production_id: usize,
          // pub literal_map: BTreeMap<String, String>, // Remove this line
          pub terminal_name_to_group_id: BiBTreeMap<String, usize>,
