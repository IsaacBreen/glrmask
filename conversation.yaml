                      Ok(GrammarDefinition {
                          productions,
                          start_production_id,
                          regex_name_to_group_id: new_regex_name_to_group_id,
                          literal_to_group_id: new_literal_to_group_id,
                          regex_expr_to_group_id: new_regex_expr_to_group_id,
