                  new_mask = gss_clone.allowed_llm_tokens()
                  print(f"  SEED: sid={sid}, root_idx={root_idx}, gss_ptr={gss_clone.ptr()}, mask={new_mask.to_ranges()}")

                  if root_idx in values:
                      existing_gss, existing_mask = values[root_idx]
