      #### `pub struct Arena<T>`
      A thread-safe, reference-counted arena for storing values of type `T`.

      ##### Public Methods
      *   `pub fn new() -> Self`: Creates a new, empty `Arena`.
      *   `pub fn insert(&self, value: T) -> Index`: Inserts a value into the arena and returns its new `Index`.
      *   `pub fn insert_at(&self, index: Index, value: T) -> Option<T>`: Inserts or replaces a value at a specific index.
      *   `pub fn remove(&self, index: Index) -> Option<T>`: Removes a value at a given index.
      *   `pub fn contains(&self, index: Index) -> bool`: Checks if a value exists at the given index.
      *   `pub fn get(&self, index: Index) -> Option<T>`: Clones and returns the value at a given index.
      *   `pub fn with<R>(&self, index: Index, f: impl FnOnce(&T) -> R) -> Option<R>`: Provides scoped, immutable access to a value without cloning.
      *   `pub fn with_mut<R>(&self, index: Index, f: impl FnOnce(&mut T) -> R) -> Option<R>`: Provides scoped, mutable access to a value.
      *   `pub fn len(&self) -> usize`: Returns the number of items currently in the arena.
      *   `pub fn is_empty(&self) -> bool`: Returns `true` if the arena contains no items.
      *   `pub fn clear(&self)`: Removes all items from the arena.
      *   `pub fn indices(&self) -> Vec<Index>`: Returns a vector of all valid indices in the arena.
      *   `pub fn to_vec(&self) -> Vec<(Index, T)>`: Returns a vector of (Index, T) pairs for all items in the arena.

      ##### Trait Implementations
      *   `impl<T> Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash for Arena<T>`
