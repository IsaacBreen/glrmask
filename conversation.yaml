      #[time_it]
      pub fn generate_glr_parser_with_maps(
          productions: &[Production],
          terminal_map: BiBTreeMap<Terminal, TerminalID>,
          mut non_terminal_map: BiBTreeMap<NonTerminal, NonTerminalID>,
          actions: BTreeMap<NonTerminal, ActionFn>,
