                  JSONNode::String(s) => SerdeValue::String(s.clone()),
                  JSONNode::Array(arr) => {
                      SerdeValue::Array(arr.iter().map(|node| node.to_serde_value()).collect())
                  }
                  JSONNode::Object(obj) => {
                      let mut map = SerdeMap::new();
                      for (k, v) in obj {
                          map.insert(k.clone(), v.to_serde_value());
