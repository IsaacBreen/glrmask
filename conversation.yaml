              nwa.states.add_transition(0, b'a' as u16, s2, SimpleBitset::from_iter(vec![2, 5]));
              nwa.states.set_final_weight(s1, SimpleBitset::from_iter(vec![1, 10]));
              nwa.states.set_final_weight(s2, SimpleBitset::from_iter(vec![2, 20]));

              let dwa = nwa.determinize();
              // Expected DWA:
              // S0 (start): weight=ALL
              //   'a' -> S1
              // S1: composition={1:{1}, 2:{2}}. weight={1}|{2}. final_weight=({1}&{10})|({2}&{20})
              assert_eq!(dwa.states.states.len(), 2);

