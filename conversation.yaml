              let input = vec![
                  TestEK::new(3, None),
                  TestEK::new(-2, None),
                  TestEK::new(2, None),
                  TestEK::new(0, None),
                  TestEK::new(1, None),
              ];
              let expected = vec![TestEK::new(4, None)];
              let got = compress_stack(input);
              assert_eq!(got, expected);
          }

          #[test]
