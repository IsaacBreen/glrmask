              raise NotImplementedError

          @classmethod
          @abstractmethod
          def from_indices(cls, indices: Iterable[T]) -> "RangeSet[T]":
              """Creates a RangeSet from an iterable of individual indices."""
              raise NotImplementedError

          @classmethod
          @abstractmethod
          def empty(cls) -> "RangeSet[T]":
              """Creates an empty RangeSet."""
              raise NotImplementedError
