      ```text '/Users/isaacbreen/Projects2/obsidian/grammars25/public interface of trie.rs.md'
      This document specifies the public interface for the `trie.rs` module, which provides a generic, arena-based graph data structure. This structure is suitable for representing Directed Acyclic Graphs (DAGs) and graphs with cycles, often used in scenarios requiring shared subtrees, like tries or state graphs.

      The design centers around three main components:
      1.  **`Arena<T>`**: A memory manager that owns all graph nodes, providing safe, concurrent access.
      2.  **`Trie<EK, EV, T>`**: The data structure for a single node within the graph.
      3.  **`Trie2Index`**: A lightweight, safe handle used to reference nodes within the `Arena`.

      ---

      ## 1. Core Data Structures

      ### `Trie<EK, EV, T>`
      Represents a single node in the graph. It allows multiple outgoing edges for the same key, each with its own value and destination.

      **Generics:**
      *   `EK`: The type for an **E**dge **K**ey. Must implement `Ord`.
      *   `EV`: The type for an **E**dge **V**alue.
      *   `T`: The type for the node's internal **V**alue.

      **Public Fields:**
      *   `pub value: T`: The data stored within the node.
      *   `pub max_depth: usize`: The longest path from a source node to this node. This value is computed by `recompute_all_max_depths` and is used for scheduling in traversal algorithms. It defaults to `usize::MAX`.

      **Note:** Nodes do not hold direct pointers to their children. Instead, they store `Trie2Index` handles, and all node access must be mediated through an `Arena`.

      ### `Trie2Index`
      A lightweight, copyable handle that acts as a safe pointer to a `Trie` node within an `Arena`. This is the primary type used to identify and interact with nodes.

      **Key Methods:**
      *   `pub fn from_usize(i: usize) -> Self`: Creates a `Trie2Index` from a raw `usize`.
      *   `pub fn as_usize(self) -> usize`: Converts the index back to a `usize`.
      *   `pub fn read<'a, ...>(self, arena: &'a Arena<...>) -> Option<Trie2ReadGuard<'a, ...>>`: Acquires a read lock on the arena and returns a guard that provides immutable access (`&Trie`) to the node. Returns `None` if the index is invalid.
      *   `pub fn write<'a, ...>(self, arena: &'a Arena<...>) -> Option<Trie2WriteGuard<'a, ...>>`: Acquires a write lock on the arena and returns a guard that provides mutable access (`&mut Trie`) to the node. Returns `None` if the index is invalid.

      ### `Arena<T>`
      An arena allocator that owns all `Trie` nodes. It provides shared, concurrent access to its contents via an `Arc<RwLock<...>>`.

      **Key Methods:**
      *   `pub fn new() -> Self`: Creates a new, empty arena.
      *   `pub fn insert(&self, value: T) -> Index`: Adds a value to the arena and returns its unique `Index`.
      *   `pub fn remove(&self, index: Index) -> Option<T>`: Removes the value at the given index, returning it if it existed.
      *   `pub fn get(&self, index: Index) -> Option<T>` (where `T: Clone`): Returns a clone of the value at the given index.
      *   `pub fn with<R>(&self, index: Index, f: impl FnOnce(&T) -> R) -> Option<R>`: Provides read-only access to a value via a closure without needing to clone it.
      *   `pub fn with_mut<R>(&self, index: Index, f: impl FnOnce(&mut T) -> R) -> Option<R>`: Provides mutable access to a value via a closure.
      *   `pub fn len(&self) -> usize`: Returns the number of active items in the arena.
      *   `pub fn indices(&self) -> Vec<Index>`: Returns a vector of all valid indices in the arena.
      *   `pub fn deep_clone(&self) -> Self` (where `T: Clone`): Creates a new `Arena` with a completely independent, deep copy of all items.

      ### `TrieStats`
      A struct that holds statistics about a graph reachable from a set of roots.

      **Public Fields:**
      *   `pub num_reachable_nodes: usize`
      *   `pub num_reachable_edges: usize`
      *   `pub max_depth: usize`
      *   `pub num_roots: usize`
      *   `pub num_leaves: usize`
      *   `pub max_in_degree: usize`
      *   `pub avg_in_degree: f64`
      *   `pub max_out_degree: usize`
      *   `pub avg_out_degree: f64`

      ---

      ## 2. `Trie` Functionality

      Methods are available on `Trie` itself (accessed via a read/write guard) or as associated functions (`Trie::...`).

      ### Node Creation and Modification
      These methods are called on a mutable `Trie` node, typically via `node_idx.write(&arena).unwrap()`.

      *   `pub fn new(value: T) -> Self`: Creates a new `Trie` node with the given value and no children.
      *   `pub fn force_insert_to_new_node(...) -> Trie2Index`: Creates a new destination node in the arena, adds an edge to it from the current node, and returns the new node's index.
      *   `pub fn force_insert_to_node(&mut self, edge_key: EK, edge_value: EV, dst: Trie2Index)`: Adds an edge from the current node to an existing destination node.
      *   `pub fn children(&self) -> &BTreeMap<EK, OrderedHashMap<Trie2Index, EV>>`: Returns an immutable reference to the node's children map.
      *   `pub fn is_leaf(&self) -> bool`: Returns `true` if the node has no children.

      ### Graph Analysis and Traversal
      These are associated functions that operate on an `Arena` and a set of root nodes.

      *   `pub fn all_nodes(arena: &Arena<Self>, roots: &[Trie2Index]) -> Vec<Trie2Index>`: Performs a breadth-first search (BFS) to find all unique nodes reachable from the given roots.
      *   `pub fn recompute_all_max_depths(arena: &Arena<Self>, roots: &[Trie2Index])`: Updates the `max_depth` field for all nodes reachable from the roots. This is crucial for the performance of scheduling algorithms like `special_map`. It assumes the graph is a DAG.
      *   `pub fn has_cycle(arena: &Arena<Self>, roots: impl IntoIterator<Item = Trie2Index>) -> bool`: Detects if there are any cycles in the graph reachable from the given roots using a depth-first search (DFS).
      *   `pub fn stats(arena: &Arena<Self>, roots: &[Trie2Index]) -> TrieStats`: Computes and returns a `TrieStats` struct for the graph.
      *   `pub fn are_graphs_equal(...) -> bool`: Performs a deep, recursive comparison of two graphs (potentially in different arenas) starting from given root indices. It correctly handles shared subtrees and cycles.
      *   `pub fn gc(arena: &Arena<Self>, roots: &[Trie2Index])`: Performs garbage collection, removing any nodes in the arena that are not reachable from the given set of roots.

      ### Path Finding Utilities
      These methods are primarily for testing and debugging to inspect paths through the graph.

      *   `pub fn get_all_paths<F>(...) -> Vec<(T, Vec<(EK, EV, T)>)>`: Traverses a DAG to find all paths from the roots to nodes satisfying an `is_end` predicate.
      *   `pub fn get_all_paths_with_cycles<F, G>(...) -> Vec<(T, Vec<(EK, EV, T)>)>`: A more powerful path-finding function that correctly handles graphs with cycles.
          *   `is_end`: A predicate to identify valid terminal nodes for a path.
          *   `counts_toward_length`: A predicate to determine if an edge should be included in the final path and count against the length limit. This allows for traversing "structural" or "zero-cost" edges without them appearing in the output.
          *   `max_path_length`: The maximum number of "counted" edges a path can have.

      ### Graph Transformation

      *   `pub fn deep_copy_subtrees(...) -> (Arena<Self>, Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`: Creates a deep copy of the subgraphs reachable from `roots` into a **new** `Arena`. Returns the new arena, the new root indices, and a map from old indices to new ones.
      *   `pub fn deep_copy_subtrees_into(...) -> (Vec<Trie2Index>, HashMap<Trie2Index, Trie2Index>)`: Same as above, but copies the subgraphs into an **existing** `Arena`.

      ### Specialized Propagation Algorithms

      These methods perform a specialized, depth-driven traversal suitable for propagation, simulation, or scheduling tasks.

      *   `pub fn special_map<V: Clone>(...)`: Traverses the graph, applying user-defined logic at each step.
          *   `initial_nodes_and_values`: The starting points for the traversal.
          *   `step`: A closure called for each edge to compute a new value (`V`) for the child node.
          *   `merge`: A closure to combine multiple values arriving at the same child node.
          *   `process`: A closure called on each node to process its aggregated value and decide whether to continue propagation to its children.
      *   `pub fn special_map_grouped<V, S, I>(...)`: A more efficient version of `special_map` for cases where many edges share the same key. The `step` function is called once per unique edge key from a node, rather than once per edge.

      ---

      ## 3. Helper Structs and Traits

      ### `EdgeInserter`
      A helper struct that provides a chainable, builder-style interface for inserting an edge with complex logic. It is typically created via `Trie2Index::insert_edge`.

      **Key Methods:**
      *   `pub fn new(...) -> Self`: Constructor.
      *   `pub fn try_destination(mut self, destination: Trie2Index) -> Self`: Attempts to add/merge an edge to a specific destination.
      *   `pub fn try_destinations(mut self, destinations: &[Trie2Index]) -> Self`: Tries a list of potential destinations in order.
      *   `pub fn try_children(mut self) -> Self`: Tries to merge with any existing children under the same edge key.
      *   `pub fn else_create_destination_with_value(mut self, value: T) -> Self`: If no destination has been found, creates a new node with the given value and adds an edge to it.
      *   `pub fn unwrap(self) -> Trie2Index`: Consumes the inserter and returns the resulting destination index, panicking if none was found.
      *   `pub fn into_option(self) -> Option<Trie2Index>`: Consumes the inserter and returns the result as an `Option`.

      ### `PrettyPrintOptions`
      A struct for customizing the output of pretty-printing functions.

      **Key Methods (Builder Pattern):**
      *   `pub fn debug_nodes(self) -> Self`: Formats node values using `Debug`.
      *   `pub fn display_edges(self) -> Self`: Formats edge keys/values using `Display`.
      *   `pub fn omit_depth(mut self) -> Self`: Hides the `max_depth` field in the output.
      *   `pub fn omit_nodes(mut self) -> Self`: Hides node values in the output.
      *   ... and many other combinations.

      ### `MergeableEdgeValue` Trait
      A trait for edge values that can be merged.

      *   `fn merge(&mut self, other: Self)`: Merges another value into the current one.

      The `Arena` provides a convenience method that uses this trait:
      *   `pub fn insert_edge_simple(&self, src: Trie2Index, dst: Trie2Index, edge_key: EK, edge_value: EV)`: Inserts an edge, merging the value if the edge already exists.

      ---

      ## 4. Pretty Printing

      Functions for generating a human-readable string representation of the graph. They correctly handle cycles and shared subtrees.

      *   `pub fn pretty_print(arena: &Arena<Self>, roots: &[Trie2Index]) -> String`: Prints the graph starting from the given roots using default formatting.
      *   `pub fn pretty_print_arena(arena: &Arena<Self>) -> String`: Automatically finds root nodes (those with in-degree 0) in the arena and prints from them.
      *   `pub fn pretty_print_with_options(...) -> String`: Prints the graph using custom formatting defined by a `PrettyPrintOptions` struct.
      *   `pub fn pretty_print_arena_with_options(...) -> String`: Prints the entire arena with custom formatting options.

      ---

      ## 5. Serialization

      The core data structures implement the `JSONConvertible` trait for serialization and deserialization.

      *   **`Trie`**: Serializes its own `value`, `max_depth`, and `children`. Children are represented by their `Trie2Index`, not recursively expanded.
      *   **`Trie2Index`**: Serializes to a JSON number (its `usize` representation).
      *   **`Arena`**: Serializes to a JSON object containing all its items, keyed by their index. This allows for a complete dump and reconstruction of the entire graph state.

      ---

      ## 6. Type Aliases

      For convenience, the following type aliases are provided:

      *   `pub type GodWrapper<EK, EV, T> = Arena<Trie<EK, EV, T>>;`
      *   `pub type God<EK, EV, T> = Arena<Trie<EK, EV, T>>;`
      ```
