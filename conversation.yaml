          Signature: `fn pop_and_goto(&self, stack_top_node: &Arc<GSSNode<T>>, len: usize, nt: NonTerminalID, current_top_edge_value: &T) -> Vec<ParseState<T>>`
          Body:
          ```rust
          // Old: parents = stack.popn(len);
          // New: parents_and_edges = stack_top_node.popn(len); // Returns Vec<(Arc<GSSNode<T>>, T_edge_to_it)>
          parents_and_edges.bulk_merge(); // Ensure BulkMerge is adapted for Vec<(Arc<GSSNode<T>>, T)>

          let mut out_parse_states = Vec::new();

          for (parent_node, edge_val_to_parent) in parents_and_edges { // Iterate over (Arc<GSSNode<T>>, T)
              // Old: top = parent.peek(); goto = ...[&top.state_id]
              // New:
              let goto_target_state_id = self.parser.stage_7_table[&parent_node.state_id].gotos[&nt];
              
              // Old: merged_t = top.t.intersect(cur_t);
              // New: merged_t is intersection of edge_val_to_parent and current_top_edge_value
              let new_edge_val_for_goto = edge_val_to_parent.intersect(current_top_edge_value);
              
              crate::debug!(4, "  Goto from state {} to state {}", parent_node.state_id.0, goto_target_state_id.0);
              
              // Old: out.push(Arc::new(parent.push(ParseStateNodeContent { state_id: goto, t: merged_t })));
              // New: Create new GSSNode and ParseState
              let new_successor_obj = GSSNode::make_successor_node(parent_node, goto_target_state_id, new_edge_val_for_goto.clone());
              out_parse_states.push(ParseState {
                  stack_top_node: Arc::new(new_successor_obj),
                  top_edge_value: new_edge_val_for_goto,
              });
          }
          out_parse_states
          ```

      9.  **Update `GLRParserState::log_gss`:**
          -   `roots: Vec<_> = self.active_states.values().map(|s| s.stack.clone()).collect();`
              Becomes (get stack tops from `self.head.predecessors`):
