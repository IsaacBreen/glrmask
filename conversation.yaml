                          }
                          IntermediateTrie3EdgeKey::CheckLLM(bv) => {
                              (Intermediate2Trie3EdgeKey::NoOp, bv.clone())
                          }
                      };

                      god2.insert_edge_simple(idx2, child2_idx, edge_key2, edge_value2);
