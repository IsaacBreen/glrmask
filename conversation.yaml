              final_mask = ffi.Bitset.zeros()
              # {node_idx: ({gss_parents}, llm_mask)}
              values: Dict[int, Tuple[Set[ffi.GSSNode], ffi.Bitset]] = {}
              # {depth: {node_idx, ...}}
              todo: Dict[int, Set[int]] = defaultdict(set)
