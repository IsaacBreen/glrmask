          // LLM token vocabulary: a
          let mut llm_token_map = LLMTokenMap::new();
          llm_token_map.insert(b"a".to_vec(), LLMTokenID(0));

          // Tokenizer regex for grammar tokens 'a', '$'
          let expr = groups![
              eat_u8(b'a'),
