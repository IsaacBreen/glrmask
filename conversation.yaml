              Python::with_gil(|py| {
                  self.acc.as_ref(py).eq(other.acc.as_ref(py)).unwrap_or(false) &&
                  py_obj_eq(&self.empty, &other.empty) &&
                  self.max_depth == other.max_depth &&
                  self.children.ptr_eq(&other.children)
              })
          }
      }
      impl Eq for Interface {}

      impl Hash for Interface {
