                          // Now get mutable borrow to set
                          bits.set(index, true);
                          // Increment bounds only if we actually changed the bit from 0 to 1
                          *lower_bound_count = lower_bound_count.saturating_add(1);
                          *upper_bound_count = upper_bound_count.saturating_add(1);
                      }
