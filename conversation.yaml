      struct Determinizer<'a> {
          nwa: &'a NWA,
          future_weights: Vec<Weight>,
          eps_cache: Vec<Vec<(NWAStateID, Weight)>>,
          step_pool: StepPool,
          signatures: Vec<MacroSig>,
          state_to_sig_id: Vec<usize>,
          compiled_steps: Vec<CompiledStep>,
