          };
          template <>
          struct equal_to<std::shared_ptr<Acc>> {
              bool operator()(const std::shared_ptr<Acc>& lhs, const std::shared_ptr<Acc>& rhs) const {
                  if (!lhs && !rhs) return true;
                  if (!lhs || !rhs) return false;
                  return *lhs == *rhs;
