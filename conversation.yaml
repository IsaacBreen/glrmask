      1) Replace the CanonicalSignature matches representation:
      - Change CanonicalSignature.matches from BTreeSet<(GroupID, usize, SignatureId)> to Vec<(GroupID, usize, SignatureId)>.
      - We will sort and deduplicate this Vec before interning so equality/hashing stays canonical but is much faster than BTreeSet for small match sets.

      2) Remove the pre-interned “empty” signature:
