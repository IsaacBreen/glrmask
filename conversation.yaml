              let final2 = SimpleBitset::from_iter(vec![2, 5]) & SimpleBitset::from_iter(vec![2, 20]);
              let expected_final = final1 | &final2;
              assert_eq!(state1.final_weight, Some(expected_final));
          }

          #[test]
          fn test_determinize_complex_nondeterminism() {
              // NWA from the user input:
              // Start state: 1. Final state: 3 (weight: ALL).
              // s1 transitions:
              // 1 --0, [0..=1]--> 2
              // 1 --1, [0]--> 3
              // 1 --1, [0..=1]--> 2 (Nondeterminism)
              // 1 --2, [0..=1]--> 2
              // 1 --3, [0..=1]--> 2
              // 1 --4, [0..=1]--> 2
              // 1 --4, [1]--> 3 (Nondeterminism)
              // 1 --5, [0..=1]--> 2
              let mut nwa = NWA::default();
              let s0 = nwa.add_state(); // 0
              let s1 = nwa.add_state(); // 1 (Start)
              let s2 = nwa.add_state(); // 2
              let s3 = nwa.add_state(); // 3 (Final)
              nwa.start_state = s1;

              let w01 = SimpleBitset::from_iter(0..=1);
              let w0 = SimpleBitset::from_item(0);
              let w1 = SimpleBitset::from_item(1);
              nwa.set_final_weight(s3, SimpleBitset::all());

              // Transitions from s1 (1)
              nwa.add_transition(s1, 0, s2, w01.clone());
              nwa.add_transition(s1, 1, s3, w0.clone());
              nwa.add_transition(s1, 1, s2, w01.clone());
              nwa.add_transition(s1, 2, s2, w01.clone());
              nwa.add_transition(s1, 3, s2, w01.clone());
              nwa.add_transition(s1, 4, s2, w01.clone());
              nwa.add_transition(s1, 4, s3, w1.clone());
              nwa.add_transition(s1, 5, s2, w01.clone());

              let dwa = nwa.determinize();
              println!("{}", nwa);
              println!("{}", dwa);

              // Expected DWA: 4 states (S0, S1, S2, S3)
              assert_eq!(dwa.states.len(), 4);
              let s0_dwa = &dwa.states[dwa.start_state]; // S0: {1:ALL}
              let w01_expected = SimpleBitset::from_iter(0..=1);

              // S0 checks
              assert_eq!(s0_dwa.weight, SimpleBitset::all());
              assert!(s0_dwa.final_weight.is_none());

              // S1: {2:[0..=1]}. Target for '0', '2', '3', '5'.
              let s1_dwa_id = *s0_dwa.transitions.get(0).unwrap();
              let s1_dwa = &dwa.states[s1_dwa_id];
              assert_eq!(s1_dwa.weight, w01_expected);
              assert!(s1_dwa.final_weight.is_none());

              // S2: {3:[0], 2:[0..=1]}. Target for '1'.
              let s2_dwa_id = *s0_dwa.transitions.get(1).unwrap();
              let s2_dwa = &dwa.states[s2_dwa_id];
              assert_eq!(s2_dwa.weight, w01_expected);
              assert_eq!(s2_dwa.final_weight, Some(w0)); // [0] & ALL = [0]

              // S3: {2:[0..=1], 3:[1]}. Target for '4'.
              let s3_dwa_id = *s0_dwa.transitions.get(4).unwrap();
              let s3_dwa = &dwa.states[s3_dwa_id];
              assert_eq!(s3_dwa.weight, w01_expected);
              assert_eq!(s3_dwa.final_weight, Some(w1)); // [1] & ALL = [1]

              // Check that '2', '3', '5' also go to S1
              assert_eq!(*s0_dwa.transitions.get(2).unwrap(), s1_dwa_id);
              assert_eq!(*s0_dwa.transitions.get(3).unwrap(), s1_dwa_id);
              assert_eq!(*s0_dwa.transitions.get(5).unwrap(), s1_dwa_id);
          }

          #[test]
          fn test_determinize_complex_nwa_from_input() {
              let nwa = build_complex_nwa();
              let dwa = nwa.determinize();

              // Expected DWA states: 15 (0 to 14)
              assert_eq!(dwa.states.len(), 15);

              let w0 = SimpleBitset::from_item(0);
              let w1 = SimpleBitset::from_item(1);
              let w2 = SimpleBitset::from_item(2);
              let w3 = SimpleBitset::from_item(3);
              let w12 = SimpleBitset::from_iter(1..=2);
              let w123 = SimpleBitset::from_iter(1..=3);
              let wall = SimpleBitset::all();

              // S0 (ID 0): {1:ALL} - Start state
              let s0 = &dwa.states[dwa.start_state];
              assert_eq!(s0.weight, wall);
              assert!(s0.final_weight.is_none());

              // S1 (ID 1): Target of '1' from S0. Composition: {2:[0]}
              let s1_id = *s0.transitions.get(1).unwrap();
              assert_eq!(s1_id, 1);
              let s1 = &dwa.states[s1_id];
              assert_eq!(s1.weight, w0.clone());
              assert!(s1.final_weight.is_none());

              // S2 (ID 2): Target of '2' from S0. Composition: {7:[1..=2], 3:[3]}
              let s2_id = *s0.transitions.get(2).unwrap();
              assert_eq!(s2_id, 2);
              let s2 = &dwa.states[s2_id];
              assert_eq!(s2.weight, w123.clone());
              // Final weight: ([1..=2] & ALL) | ([3] & None) = [1..=2]
              assert_eq!(s2.final_weight, Some(w12.clone()));

              // S7 (ID 7): Target of '10' from S0. Composition: {7:[1..=3]}
              let s7_id = *s0.transitions.get(10).unwrap();
              assert_eq!(s7_id, 7);
              let s7 = &dwa.states[s7_id];
              assert_eq!(s7.weight, w123.clone());
              // Final weight: [1..=3] & ALL = [1..=3]
              assert_eq!(s7.final_weight, Some(w123.clone()));

              // S9 (ID 9): Target of '10' from S2. Composition: {7:[3]}
              let s9_id = *s2.transitions.get(10).unwrap();
              assert_eq!(s9_id, 9);
              let s9 = &dwa.states[s9_id];
              assert_eq!(s9.weight, w3.clone());
              // Final weight: [3] & ALL = [3]
              assert_eq!(s9.final_weight, Some(w3.clone()));

              // Check S6 (ID 6) and S8 (ID 8) properties and transitions
              let s6_id = *s0.transitions.get(7).unwrap(); // Target of '7' from S0. Composition: {7:[0]}
              assert_eq!(s6_id, 6);
              let s6 = &dwa.states[s6_id];
              assert_eq!(s6.weight, w0.clone());
              assert_eq!(s6.final_weight, Some(w0.clone()));

              let s8_id = s1.transitions.default.unwrap(); // Target of '*' from S1. Composition: {8:[0]}
              assert_eq!(s8_id, 8);
              let s8 = &dwa.states[s8_id];
              assert_eq!(s8.weight, w0.clone());
              assert!(s8.final_weight.is_none());
              
              // Check a transition to a known state (S8 -> '10' -> S6)
              assert_eq!(*s8.transitions.get(10).unwrap(), s6_id);

              // Check a transition to a known state (S7 is a sink)
              assert!(s7.transitions.exceptions.is_empty());
              assert!(s7.transitions.default.is_none());
          }
      }
    src/trie3_opt/passes/nwa_dwa_roundtrip.rs: |+
      use std::collections::{BTreeMap, BTreeSet, VecDeque};
      use crate::datastructures::trie::Trie;
      use crate::trie3_opt::context::OptimizationContext;
      use crate::weighted_automata::DWAState;
      use crate::trie3_opt::core::{EdgeKey, MiniTrie, Node, NodeId, SortedSet};
      use crate::trie3_opt::passes::OptimizationPass;
      use crate::weighted_automata::{NWA, SimpleBitset};

      /// A roundtrip pass that:
      /// - Converts the MiniTrie subgraph for each root into a weighted NWA,
      /// - Determinizes it into a DWA,
      /// - Converts the DWA back into a MiniTrie,
      /// - Merges all per-root results into a single MiniTrie, preserving root order.
      ///
      /// Encoding:
      /// - `pop = m` is modeled as a chain of `m-1` default transitions followed by a SID-specific transition.
      /// - State IDs from the `MiniTrie` are used as alphabet symbols in the NWA.
      /// - LLM token sets from the `MiniTrie` are used as weights in the NWA.
      pub struct NwaDwaRoundtripPass;

      impl NwaDwaRoundtripPass {
          fn reachable_from_one(trie: &MiniTrie, start: NodeId) -> BTreeSet<NodeId> {
              let mut seen: BTreeSet<NodeId> = BTreeSet::new();
              let mut q: VecDeque<NodeId> = VecDeque::new();
              q.push_back(start);
              while let Some(u) = q.pop_front() {
                  if !seen.insert(u) {
                      continue;
                  }
                  if let Some(node) = trie.get_node(u) {
                      for (_ek, dm) in node.children() {
                          for (v, _) in dm {
                              if !seen.contains(v) {
                                  q.push_back(*v);
                              }
                          }
                      }
                  }
              }
              seen
          }

          fn build_nwa_for_root(
              mini: &MiniTrie,
              root: NodeId,
              _ctx: &OptimizationContext,
          ) -> (NWA, BTreeMap<NodeId, usize>) {
              let mut nwa = NWA::new();
              // Collect subgraph nodes reachable from this root.
              let sub_nodes = Self::reachable_from_one(mini, root);
              // Map MiniTrie node -> NWA state
              let mut map_mt_to_nwa: BTreeMap<NodeId, usize> = BTreeMap::new();
              for n_id in sub_nodes.iter() {
                  let s = nwa.add_state();
                  map_mt_to_nwa.insert(*n_id, s);
              }
              // Root state is the NWA start
              if let Some(&start_id) = map_mt_to_nwa.get(&root) {
                  nwa.start_state = start_id;
              }
              // Mark final weights for ends
              for (mt_id, nwa_id) in map_mt_to_nwa.iter() {
                  if let Some(node) = mini.get_node(*mt_id) {
                      if node.is_end() {
                          nwa.set_final_weight(*nwa_id, SimpleBitset::all());
                      }
                  }
              }

              for (mt_id, &nwa_src) in map_mt_to_nwa.iter() {
                  let node = mini.get_node(*mt_id).unwrap();
                  for (ek, dm) in node.children() {
                      if ek.pop < 0 { continue; }
                      let pop = ek.pop as usize;
                      let mut cur = nwa_src;
                      // Create pop chain using default transitions. A pop `m` operation has `m-1` intermediate
                      // steps that consume any SID, followed by one SID-specific step.
                      for _ in 0..pop.saturating_sub(1) {
                          let inter = nwa.add_state();
                          // Pop steps consume any SID and don't constrain tokens.
                          nwa.add_default_transition(cur, inter, SimpleBitset::all());
                          cur = inter;
                      }
                      for (&mt_dst, sids) in dm {
                          // The last step is not a default transition, but specific to the SIDs.
                          let nwa_dst = map_mt_to_nwa[&mt_dst];
                          let weight = SimpleBitset::from_iter(ek.tokens.iter());
                          for sid in sids.iter() {
                              // State IDs are the alphabet.
                              nwa.add_transition(cur, sid as u16, nwa_dst, weight.clone());
                          }
                      }
                  }
              }
              (nwa, map_mt_to_nwa)
          }

          /// Follows a chain of 'simple' states via default transitions, returning:
          /// (terminal_state_id, number_of_simple_default_steps).
          /// A 'simple' state is one where `DWAState::simple_default_target()` returns Some(_).
          /// Cycle detection prevents infinite loops; in a cycle, we stop and return the current state.
          fn follow_simple_chain(
              dwa: &crate::weighted_automata::DWA,
              start: usize,
          ) -> (usize, usize) {
              let mut steps = 0usize;
              let mut u = start;
              let mut visited: BTreeSet<usize> = BTreeSet::new();
              loop {
                  let state = &dwa.states[u];
                  if let Some(next) = state.simple_default_target() {
                      if !visited.insert(u) { break; }
                      steps += 1;
                      u = next;
                  } else { break; }
              }
              (u, steps)
          }
          fn convert_dwa_to_minitrie(
              dwa: crate::weighted_automata::DWA,
              ctx: &OptimizationContext,
          ) -> (MiniTrie, NodeId) {
              let mut mini = MiniTrie::new();
              if dwa.states.is_empty() {
                  // Should not happen if NWA was non-empty, as DWA gets at least a start state.
                  let root_id = mini.add_node(false);
                  return (mini, root_id);
              }

              // 1. Create MiniTrie nodes for each DWA state.
              let mut dwa_to_mt_map: BTreeMap<usize, NodeId> = BTreeMap::new();
              let end_node_id = mini.add_node(true);
              for (dwa_id, _dwa_state) in dwa.states.iter().enumerate() {
                  // DWA states are not end nodes themselves. Finality is modeled by an edge to a canonical end node.
                  let mt_id = mini.add_node(false);
                  dwa_to_mt_map.insert(dwa_id, mt_id);
              }

              let mt_root_id = dwa_to_mt_map[&dwa.start_state];

              // 2. Create MiniTrie edges.
              for (dwa_src_id, dwa_src_state) in dwa.states.iter().enumerate() {
                  let mt_src_id = dwa_to_mt_map[&dwa_src_id];

                  // Accumulate simple default-only states into the pop count.
                  let (terminal_dwa_id, simple_steps) = Self::follow_simple_chain(&dwa, dwa_src_id);
                  let dwa_term_state = &dwa.states[terminal_dwa_id];
                  let pop_base = 1isize;
                  let pop = pop_base + (simple_steps as isize);

                  // Group by (tokens, dst) to build MiniTrie edges, since pop is fixed for this src node.
                  let mut edge_groups: BTreeMap<(SortedSet, NodeId), SortedSet> = BTreeMap::new();

                  // Handle exception transitions
                  for (&sid, &dwa_dst_id) in &dwa_term_state.transitions.exceptions {
                      if let Some(tokens) = dwa_term_state.trans_weights_exceptions.get(&sid) {
                          if tokens.is_empty() {
                              continue;
                          }

                          let tokens_set = SortedSet::from_iter(tokens.iter_up_to(ctx.max_llm_token_id));
                          let mt_dst_id = dwa_to_mt_map[&dwa_dst_id];

                          let key = (tokens_set, mt_dst_id);
                          edge_groups.entry(key).or_default().insert(sid as usize);
                      }
                  }

                  // Handle default transition
                  if let Some(dwa_dst_id) = dwa_term_state.transitions.default {
                      if let Some(tokens) = &dwa_term_state.trans_weight_default {
                          if !tokens.is_empty() {
                              let tokens_set = SortedSet::from_iter(tokens.iter_up_to(ctx.max_llm_token_id));
                              let mt_dst_id = dwa_to_mt_map[&dwa_dst_id];
                              let key = (tokens_set, mt_dst_id);

                              let exception_sids: BTreeSet<u16> =
                                  dwa_term_state.transitions.exceptions.keys().cloned().collect();

                              let default_sids_entry = edge_groups.entry(key).or_default();
                              for sid in 0..=ctx.max_state_id {
                                  if !exception_sids.contains(&(sid as u16)) {
                                      default_sids_entry.insert(sid);
                                  }
                              }
                          }
                      }
                  }

                  // Now build the new children for the MiniTrie node
                  let mut new_children = BTreeMap::<EdgeKey, BTreeMap<NodeId, SortedSet>>::new();
                  for ((tokens, dst), sids) in edge_groups {
                      if sids.is_empty() {
                          continue;
                      }
                      let ek = EdgeKey::new(pop, tokens);
                      new_children.entry(ek).or_default().insert(dst, sids);
                  }

                  // If the DWA state has a final weight, create an edge to a canonical end node.
                  // This encodes the conditional finality.
                  if let Some(final_weight) = &dwa_src_state.final_weight {
                      if !final_weight.is_empty() {
                          let tokens = SortedSet::from_iter(final_weight.iter_up_to(ctx.max_llm_token_id));
                          let sids = SortedSet::from_iter(0..=ctx.max_state_id);  // TODO: VERY INEFFICIENT
                          new_children.entry(EdgeKey::new(0, tokens)).or_default().insert(end_node_id, sids);
                      }
                  }
                  mini.set_children(mt_src_id, new_children);
              }

              (mini, mt_root_id)
          }
      }

      impl OptimizationPass for NwaDwaRoundtripPass {
          fn name(&self) -> &'static str {
              "NwaDwaRoundtrip"
          }

          fn run(&self, trie: &mut MiniTrie, ctx: &mut OptimizationContext) {
              if trie.num_nodes() == 0 {
                  return;
              }

              // println!("{}", trie);

              // Eliminate pop=0 edges on non-root nodes by merging them into predecessors.
              // This is a prerequisite for NWA conversion, which has simplified handling for pop>0.
              // After this loop, only root nodes may have pop=0 edges.
              let mut changed = true;
              while changed {
                  changed = false;
                  let node_ids: Vec<_> = trie.node_ids().collect();
                  let root_set: BTreeSet<_> = trie.root_ids.iter().copied().collect();

                  for b_id in node_ids {
                      if root_set.contains(&b_id) {
                          continue;
                      }

                      // Must clone, as we will be modifying the trie.
                      let b_node = if let Some(n) = trie.get_node(b_id) {
                          n.clone()
                      } else {
                          continue;
                      };

                      let mut pop0_edges = BTreeMap::new();
                      let mut non_pop0_edges = BTreeMap::new();

                      for (ek, dm) in b_node.children() {
                          if ek.pop == 0 {
                              pop0_edges.insert(ek.clone(), dm.clone());
                          } else {
                              non_pop0_edges.insert(ek.clone(), dm.clone());
                          }
                      }

                      if pop0_edges.is_empty() {
                          continue;
                      }

                      changed = true;
                      let parents_of_b = b_node.parents().clone();

                      for (pop0_ek, pop0_dm) in &pop0_edges {
                          for (c_id, sids_bc) in pop0_dm {
                              for (a_id, edges_from_a_to_b) in &parents_of_b {
                                  for (ek_ab, sids_ab) in edges_from_a_to_b {
                                      let new_tokens = ek_ab.tokens.intersect(&pop0_ek.tokens);
                                      let new_sids = sids_ab.intersect(sids_bc);
                                      let new_ek = EdgeKey::new(ek_ab.pop, new_tokens);
                                      trie.add_edge(*a_id, new_ek, *c_id, new_sids);
                                  }
                              }
                          }
                      }
                      trie.set_children(b_id, non_pop0_edges);
                  }
              }

              // Prune edges that don't lead to an end node.
              let productive_nodes = trie.can_reach_end();
              let all_node_ids: Vec<_> = trie.node_ids().collect();
              for node_id in all_node_ids {
                  let node = if let Some(n) = trie.get_node(node_id) {
                      n.clone()
                  } else {
                      continue;
                  };
                  let mut to_remove = Vec::new();
                  for (ek, dm) in node.children() {
                      for dst in dm.keys() {
                          if !productive_nodes.contains(dst) {
                              to_remove.push((ek.clone(), *dst));
                          }
                      }
                  }
                  for (ek, dst) in to_remove {
                      trie.remove_edge_dest(node_id, &ek, dst);
                  }
              }

              let original_roots = trie.root_ids.clone();
              // Build a single shared NWA that covers all roots and add a synthetic
              // first-step edge per root (edge key = enumerate index).
              let mut nwa = NWA::new();
              // Collect all nodes reachable from any root.
              let mut sub_nodes: BTreeSet<NodeId> = BTreeSet::new();
              for &r in &original_roots {
                  sub_nodes.extend(Self::reachable_from_one(trie, r));
              }
              // Map MiniTrie node -> NWA state
              let mut map_mt_to_nwa: BTreeMap<NodeId, usize> = BTreeMap::new();
              for n_id in sub_nodes.iter() {
                  let s = nwa.add_state();
                  map_mt_to_nwa.insert(*n_id, s);
              }
              // Synthetic transitions from start to each root (weight = ALL).
              for (i, &root) in original_roots.iter().enumerate() {
                  if let Some(&dst) = map_mt_to_nwa.get(&root) {
                      nwa.add_transition(nwa.start_state, i as u16, dst, SimpleBitset::all());
                  }
              }
              // Mark final weights for end nodes.
              for (mt_id, nwa_id) in map_mt_to_nwa.iter() {
                  if let Some(node) = trie.get_node(*mt_id) {
                      if node.is_end() {
                          nwa.set_final_weight(*nwa_id, SimpleBitset::all());
                      }
                  }
              }
              // Encode MiniTrie edges (pop chains and SID-specific steps).
              for (mt_id, &nwa_src) in map_mt_to_nwa.iter() {
                  let node = trie.get_node(*mt_id).unwrap();
                  for (ek, dm) in node.children() {
                      if ek.pop < 0 { continue; }
                      let pop = ek.pop as usize;
                      let mut cur = nwa_src;
                      for _ in 0..pop.saturating_sub(1) {
                          let inter = nwa.add_state();
                          nwa.add_default_transition(cur, inter, SimpleBitset::all());
                          cur = inter;
                      }
                      let weight = SimpleBitset::from_iter(ek.tokens.iter());
                      for (&mt_dst, sids) in dm {
                          let nwa_dst = map_mt_to_nwa[&mt_dst];
                          for sid in sids.iter() {
                              nwa.add_transition(cur, sid as u16, nwa_dst, weight.clone());
                          }
                      }
                  }
              }
              // Determinize + simplify once
              let mut dwa = nwa.determinize();
              dwa.simplify();
              // Convert back into a MiniTrie
              let (mut merged, mt_root_id) = Self::convert_dwa_to_minitrie(dwa, ctx);
              // Derive final roots by following the synthetic first edges (0..N).
              let mut new_roots: Vec<NodeId> = Vec::with_capacity(original_roots.len());
              let root_node = merged.get_node(mt_root_id).unwrap().clone();
              for i in 0..original_roots.len() {
                  let mut chosen: Option<NodeId> = None;
                  for (_ek, dm) in root_node.children() {
                      for (dst, sids) in dm {
                          for sid in sids.iter() {
                              if sid == i {
                                  chosen = Some(*dst);
                                  break;
                              }
                          }
                          if chosen.is_some() { break; }
                      }
                      if chosen.is_some() { break; }
                  }
                  new_roots.push(chosen.expect("missing synthetic root edge during roundtrip"));
              }
              // Drop the synthetic edges from the artificial root node and set root order.
              merged.set_children(mt_root_id, BTreeMap::new());
              merged.root_ids = new_roots;
              // For the real root nodes, force their outgoing edges to have pop=0.
              // They should have pop=0 or 1 at this point from the conversion logic.
              for root_id in merged.root_ids.clone() {
                  let root_node = merged.get_node(root_id).unwrap().clone();
                  let mut new_children = BTreeMap::new();
                  for (ek, dm) in root_node.children() {
                      assert!(ek.pop == 0 || ek.pop == 1, "Expected pop=0 or 1 for edges from a new root node");
                      let new_ek = EdgeKey::new(0, ek.tokens.clone());
                      new_children.insert(new_ek, dm.clone());
                  }
                  merged.set_children(root_id, new_children);
              }
              *trie = merged;
          }
      }

