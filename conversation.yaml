              // Pair: [-1 b, -1 c] vs [+2 c, +1 d].
              // Reversed neg: [+1 c, +1 b]. Total pop 2.
              // Pos: [+2 c, +1 d]. Total pop 3.
              // Cancel amount is 2.
              // Check positions: neg_rev has c at 1, b at 2. pos has c at 2.
