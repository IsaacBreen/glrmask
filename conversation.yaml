      Below is a concise, rule-by-rule recipe you can follow to remove every instance of right-recursion (both direct and indirect) from src/js.ebnf.  
      Follow the steps in the order shown; do not add “+ / –” prefixes—just edit the file exactly as described.  

      ---

      1.  Locate the “Expressions (Precedence from lowest to highest)” block and find the rule that currently starts with  

             assignment_expression ::=  

          It has four alternatives; the fourth one is the self-referential, right-recursive clause that begins with  

             left_hand_side_expression ( '=' | …  

          Replace the entire assignment_expression rule **by the three-alternative version shown below** (keep the exact indentation you already use):  

             assignment_expression ::=
                 yield_expression
               | arrow_function
               | assignment_chain
               ;

          •  yield_expression and arrow_function are left untouched.  
          •  assignment_chain is a new helper rule you will add in the next step.

      2.  Immediately after the assignment_expression rule you just rewrote, insert the three new rules that implement a non-recursive, Kleene-star loop:

             assignment_chain ::= conditional_expression ( assignment_operator conditional_expression )* ;
             assignment_operator ::= '=' | '+=' | '-=' | '*=' | '/=' | '%='
                                   | '<<=' | '>>=' | '>>>='
                                   | '&='  | '^='  | '|='  | '**=' ;

          Notes  
          •  The ( … )* construct is EBNF, so no recursion is involved.  
          •  Because only conditional_expression appears inside the loop, there is no longer any path that can put assignment_expression on the far right of itself.

      3.  Still in the same “Expressions” section, find the rule that begins

             exponentiation_expression ::= unary_expression ( '**' exponentiation_expression )? ;

          Remove that entire line and **replace it with**:

             exponentiation_expression ::= unary_expression ( '**' unary_expression )* ;

          The rule is now iterative instead of right-recursive.  
          Yes, the operator is right-associative in JavaScript; you can recover that during AST construction if necessary.  The grammar itself is now free of right recursion.

      4.  No other rule in this grammar ends with itself (directly or indirectly), so after completing the two edits above the file is fully free of right-recursion.  
          Left-recursion that was already present (e.g. the various call_expression and member_expression chains) is unchanged—only right-recursion is removed, exactly as requested.

      Save the file and regenerate your parser; it will no longer contain any right-recursive rules.
