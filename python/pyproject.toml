[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "glrmask"
version = "0.1.0"
requires-python = ">=3.9,<3.14"
description = "Grammar-constrained token masking for LLM decoding"
readme = "README.md"
license = { text = "MIT OR Apache-2.0" }
dependencies = ["numpy>=1.21"]

[tool.maturin]
features = []
python-source = "python"
module-name = "glrmask._glrmask"
