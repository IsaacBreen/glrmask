name: Render final benchmark plots

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render figures
        run: |
          python -m pip install --disable-pip-version-check pillow numpy matplotlib
          git show origin/main:docs/assets/benchmark-mask-tail-2026-07-16.webp > /tmp/original-tail.webp
          python <<'PY'
          from __future__ import annotations

          from io import BytesIO
          from pathlib import Path

          import matplotlib
          matplotlib.use('Agg')
          import matplotlib.pyplot as plt
          import matplotlib.ticker as ticker
          from matplotlib.lines import Line2D
          import numpy as np
          from numpy.lib.stride_tricks import sliding_window_view
          from PIL import Image

          assets = Path('docs/assets')
          assets.mkdir(parents=True, exist_ok=True)

          LIGHT = {
              'bg': '#ffffff',
              'text': '#1f2328',
              'muted': '#656d76',
              'grid': '#d8dee4',
              'minor': '#eef1f4',
              'blue': '#0969da',
              'gray': '#57606a',
              'zero': '#8c959f',
          }
          DARK = {
              'bg': '#0d1117',
              'text': '#e6edf3',
              'muted': '#8b949e',
              'grid': '#30363d',
              'minor': '#21262d',
              'blue': '#58a6ff',
              'gray': '#c9d1d9',
              'zero': '#6e7681',
          }

          source = np.asarray(Image.open('/tmp/original-tail.webp').convert('RGB'))
          x0, x1 = 222, 2530
          pixel_x = np.arange(x0, x1 + 1)

          def groups(values: np.ndarray) -> list[np.ndarray]:
              if len(values) == 0:
                  return []
              splits = np.where(np.diff(values) > 1)[0] + 1
              return [group for group in np.split(values, splits) if len(group) >= 2]

          target_cyan = np.array([22, 199, 217])
          cyan_distance = np.linalg.norm(source.astype(int) - target_cyan, axis=2)
          cyan_mask = cyan_distance < 40
          cyan_y: list[float] = []
          previous = 875.0
          for x in pixel_x:
              candidates = np.where(cyan_mask[520:920, x])[0] + 520
              centers = [float(np.median(group)) for group in groups(candidates)]
              if centers:
                  center = min(centers, key=lambda value: abs(value - previous))
                  if abs(center - previous) < 20:
                      previous = center
              cyan_y.append(previous)

          dark_mask = np.all(source < 80, axis=2)
          black_y: list[float] = []
          previous = 766.0
          for x in pixel_x:
              candidates = np.where(dark_mask[150:900, x])[0] + 150
              centers = [float(np.median(group)) for group in groups(candidates)]
              if centers:
                  scores = [abs(center - previous) + (20 if center > previous + 8 else 0) for center in centers]
                  center = centers[int(np.argmin(scores))]
                  if abs(center - previous) <= 22:
                      previous = center
              black_y.append(previous)

          neutral_range = source.max(axis=2) - source.min(axis=2)
          neutral_mask = (neutral_range < 10) & (source[:, :, 0] < 150) & (source[:, :, 0] > 25)
          speed_y: list[float] = []
          previous = 1344.0
          for x in pixel_x:
              candidates = np.where(neutral_mask[1040:1380, x])[0] + 1040
              centers = [float(np.median(group)) for group in groups(candidates)]
              if centers:
                  center = min(centers, key=lambda value: abs(value - previous))
                  if abs(center - previous) < 25:
                      previous = center
              speed_y.append(previous)

          def smooth(values: np.ndarray, width: int = 7) -> np.ndarray:
              radius = width // 2
              padded = np.pad(values, (radius, radius), mode='edge')
              return np.median(sliding_window_view(padded, width), axis=1)

          exceedance = 10 ** np.linspace(np.log10(100.0), np.log10(0.0008), len(pixel_x))
          glrmask_latency = 10 ** ((836 - np.asarray(cyan_y)) / 179.0)
          llguidance_latency = 10 ** ((836 - np.asarray(black_y)) / 179.0)
          speedup = (1345 - np.asarray(speed_y)) * (200 / (1345 - 1134))

          glrmask_latency = np.maximum.accumulate(smooth(glrmask_latency))
          llguidance_latency = np.maximum.accumulate(smooth(llguidance_latency))
          speedup = smooth(speedup)

          def save_webp(fig: plt.Figure, path: Path, background: str) -> None:
              buffer = BytesIO()
              fig.savefig(buffer, format='png', dpi=220, facecolor=background, bbox_inches='tight', pad_inches=0.15)
              plt.close(fig)
              buffer.seek(0)
              Image.open(buffer).convert('RGB').save(path, 'WEBP', lossless=True, method=6)

          def latency_tick(value: float, _position: float) -> str:
              if value >= 1000:
                  return f'{value / 1000:g} ms'
              return f'{value:g} µs'

          def render_tail(theme: dict[str, str], suffix: str) -> None:
              plt.rcParams.update({
                  'font.family': 'DejaVu Sans',
                  'font.size': 11,
                  'axes.labelsize': 12,
                  'xtick.labelsize': 10,
                  'ytick.labelsize': 10,
                  'text.color': theme['text'],
                  'axes.labelcolor': theme['text'],
                  'xtick.color': theme['muted'],
                  'ytick.color': theme['muted'],
                  'axes.edgecolor': theme['grid'],
              })
              fig = plt.figure(figsize=(12.6, 7.8), dpi=220, facecolor=theme['bg'])
              grid = fig.add_gridspec(
                  2,
                  1,
                  height_ratios=[3.25, 1.1],
                  hspace=0.10,
                  left=0.095,
                  right=0.975,
                  top=0.84,
                  bottom=0.18,
              )
              top = fig.add_subplot(grid[0])
              bottom = fig.add_subplot(grid[1], sharex=top)
              for axis in (top, bottom):
                  axis.set_facecolor(theme['bg'])
                  axis.spines[['top', 'right']].set_visible(False)
                  axis.spines['left'].set_color(theme['grid'])
                  axis.spines['bottom'].set_color(theme['grid'])

              top.plot(exceedance, llguidance_latency, color=theme['gray'], linewidth=2.25, solid_capstyle='round')
              top.plot(exceedance, glrmask_latency, color=theme['blue'], linewidth=2.45, solid_capstyle='round')
              top.set_xscale('log')
              top.invert_xaxis()
              top.set_yscale('log')
              top.set_ylim(0.35, 15000)
              top.set_ylabel('Mask-generation latency')
              top.yaxis.set_major_locator(ticker.FixedLocator([1, 10, 100, 1000, 10000]))
              top.yaxis.set_major_formatter(ticker.FuncFormatter(latency_tick))
              top.yaxis.set_minor_locator(ticker.LogLocator(base=10, subs=(2, 5)))
              top.grid(axis='both', which='major', color=theme['grid'], linewidth=0.8, alpha=0.75)
              top.grid(axis='y', which='minor', color=theme['minor'], linewidth=0.55, alpha=0.7)

              top.axhline(8041.301, color=theme['gray'], linewidth=1.1, linestyle=(0, (2, 2)), alpha=0.9)
              top.axhline(28.565, color=theme['blue'], linewidth=1.1, linestyle=(0, (2, 2)), alpha=0.9)
              label_box = {
                  'boxstyle': 'round,pad=0.28',
                  'facecolor': theme['bg'],
                  'edgecolor': theme['grid'],
                  'linewidth': 0.8,
                  'alpha': 0.97,
              }
              top.text(
                  0.22,
                  8041.301 * 1.08,
                  'sample maximum · 8.0413 ms',
                  color=theme['gray'],
                  fontsize=9.3,
                  ha='center',
                  va='bottom',
                  bbox=label_box,
              )
              top.text(
                  1.3,
                  28.565 / 1.12,
                  'sample maximum · 28.565 µs',
                  color=theme['blue'],
                  fontsize=9.3,
                  ha='center',
                  va='top',
                  bbox=label_box,
              )

              legend = [
                  Line2D([], [], color=theme['blue'], linewidth=2.6, label='GLRMask'),
                  Line2D([], [], color=theme['gray'], linewidth=2.4, label='LLGuidance'),
              ]
              fig.legend(
                  handles=legend,
                  loc='upper right',
                  frameon=False,
                  ncol=2,
                  bbox_to_anchor=(0.975, 0.918),
                  borderaxespad=0,
                  handlelength=2.7,
                  columnspacing=1.5,
                  labelcolor=theme['text'],
              )

              bottom.plot(exceedance, speedup, color=theme['gray'], linewidth=2.0, solid_capstyle='round')
              bottom.axhline(1, color=theme['zero'], linewidth=1.0, linestyle='--', alpha=0.9)
              bottom.set_ylim(-12, 310)
              bottom.set_yticks([1, 100, 200, 300])
              bottom.set_yticklabels(['1×', '100×', '200×', '300×'])
              bottom.set_ylabel('Latency ratio', labelpad=10)
              bottom.text(
                  0.012,
                  0.93,
                  'LLGuidance ÷ GLRMask',
                  transform=bottom.transAxes,
                  ha='left',
                  va='top',
                  fontsize=9.2,
                  color=theme['muted'],
              )
              bottom.grid(axis='both', which='major', color=theme['grid'], linewidth=0.8, alpha=0.75)
              bottom.set_xticks([100, 10, 1, 0.1, 0.01, 0.001])
              bottom.set_xticklabels(
                  [
                      '100%\n1 in 1',
                      '10%\n1 in 10',
                      '1%\n1 in 100',
                      '0.1%\n1 in 1,000',
                      '0.01%\n1 in 10,000',
                      '0.001%\n1 in 100,000',
                  ],
                  linespacing=1.8,
              )
              bottom.xaxis.set_minor_formatter(ticker.NullFormatter())
              bottom.set_xlabel('Exceedance probability', labelpad=12)
              plt.setp(top.get_xticklabels(), visible=False)

              fig.text(
                  0.095,
                  0.955,
                  'Mask-generation latency tail',
                  fontsize=19,
                  fontweight=650,
                  color=theme['text'],
                  ha='left',
                  va='top',
              )
              fig.text(
                  0.095,
                  0.922,
                  'Coverage-matched measurements · lower is better',
                  fontsize=10.5,
                  color=theme['muted'],
                  ha='left',
                  va='top',
              )
              save_webp(fig, assets / f'benchmark-mask-tail-2026-07-16{suffix}.webp', theme['bg'])

          def mask_axis(value: float, _position: float) -> str:
              if value < 1:
                  return ''
              if value >= 1000:
                  return f'{value / 1000:g} ms'
              return f'{value:g} µs'

          def compile_axis(value: float, _position: float) -> str:
              if value < 0.5:
                  return ''
              if value >= 1000:
                  return f'{value / 1000:g} s'
              return f'{value:g} ms'

          def mask_value(value: float) -> str:
              return f'{value / 1000:.3f} ms' if value >= 1000 else f'{value:.3f} µs'

          def compile_value(value: float) -> str:
              return f'{value / 1000:.3f} s' if value >= 1000 else f'{value:.3f} ms'

          def render_summary(theme: dict[str, str], suffix: str, kind: str) -> None:
              if kind == 'mask':
                  rows = ['Mean', 'Median', 'p99', 'p99.9', 'p99.99', 'Maximum']
                  glrmask = np.array([1.743, 1.440, 5.171, 7.673, 11.556, 28.565])
                  llguidance = np.array([24.179, 12.205, 247.306, 950.700, 2771.304, 8041.301])
                  title = 'Mask-generation latency'
                  subtitle = 'Coverage-matched measurements · logarithmic scale · lower is better'
                  limits = (0.55, 15000)
                  axis_formatter = mask_axis
                  value_formatter = mask_value
                  name = 'benchmark-mask-summary-2026-07-16'
              else:
                  rows = ['Mean', 'Median', 'p99', 'p99.9', 'Maximum']
                  glrmask = np.array([86.698, 50.963, 565.257, 2221.152, 6440.287])
                  llguidance = np.array([1.527, 0.904, 11.711, 42.989, 239.964])
                  title = 'Compilation time'
                  subtitle = 'Coverage-matched successful builds · logarithmic scale · lower is better'
                  limits = (0.28, 11000)
                  axis_formatter = compile_axis
                  value_formatter = compile_value
                  name = 'benchmark-compilation-summary-2026-07-16'

              plt.rcParams.update({
                  'font.family': 'DejaVu Sans',
                  'font.size': 11,
                  'text.color': theme['text'],
                  'axes.labelcolor': theme['text'],
                  'xtick.color': theme['muted'],
                  'ytick.color': theme['text'],
                  'axes.edgecolor': theme['grid'],
              })
              fig, axis = plt.subplots(figsize=(10.8, 5.8), dpi=220, facecolor=theme['bg'])
              axis.set_facecolor(theme['bg'])
              y_positions = np.arange(len(rows))[::-1]

              for y, glrmask_point, llguidance_point in zip(y_positions, glrmask, llguidance, strict=True):
                  axis.plot(
                      [glrmask_point, llguidance_point],
                      [y, y],
                      color=theme['grid'],
                      linewidth=2.0,
                      zorder=1,
                      solid_capstyle='round',
                  )
              axis.scatter(
                  glrmask,
                  y_positions,
                  s=90,
                  marker='o',
                  color=theme['blue'],
                  edgecolor=theme['bg'],
                  linewidth=1.4,
                  zorder=3,
              )
              axis.scatter(
                  llguidance,
                  y_positions,
                  s=83,
                  marker='s',
                  color=theme['gray'],
                  edgecolor=theme['bg'],
                  linewidth=1.4,
                  zorder=3,
              )

              for y, glrmask_point, llguidance_point in zip(y_positions, glrmask, llguidance, strict=True):
                  smaller, larger = (
                      (('glrmask', glrmask_point), ('llguidance', llguidance_point))
                      if glrmask_point < llguidance_point
                      else (('llguidance', llguidance_point), ('glrmask', glrmask_point))
                  )
                  for side, (framework, value) in [('left', smaller), ('right', larger)]:
                      color = theme['blue'] if framework == 'glrmask' else theme['gray']
                      axis.annotate(
                          value_formatter(value),
                          (value, y),
                          xytext=(-10 if side == 'left' else 10, 0),
                          textcoords='offset points',
                          ha='right' if side == 'left' else 'left',
                          va='center',
                          fontsize=10.2,
                          fontweight=600,
                          color=color,
                          bbox={
                              'facecolor': theme['bg'],
                              'edgecolor': 'none',
                              'pad': 0.5,
                              'alpha': 0.96,
                          },
                      )

              axis.set_xscale('log')
              axis.set_xlim(*limits)
              axis.set_ylim(-0.7, len(rows) - 0.3)
              axis.set_yticks(y_positions, rows)
              axis.tick_params(axis='y', length=0, pad=14)
              axis.xaxis.set_major_locator(ticker.LogLocator(base=10))
              axis.xaxis.set_major_formatter(ticker.FuncFormatter(axis_formatter))
              axis.xaxis.set_minor_locator(ticker.LogLocator(base=10, subs=(2, 5)))
              axis.xaxis.set_minor_formatter(ticker.NullFormatter())
              axis.grid(axis='x', which='major', color=theme['grid'], linewidth=0.9, alpha=0.8)
              axis.grid(axis='x', which='minor', color=theme['minor'], linewidth=0.55, alpha=0.75)
              axis.grid(False, axis='y')
              axis.spines[['left', 'right', 'top']].set_visible(False)
              axis.spines['bottom'].set_color(theme['grid'])
              axis.set_title(title, loc='left', fontsize=18, fontweight=650, pad=28)
              axis.text(
                  0,
                  1.02,
                  subtitle,
                  transform=axis.transAxes,
                  ha='left',
                  va='bottom',
                  fontsize=10.2,
                  color=theme['muted'],
              )
              legend = [
                  Line2D([], [], marker='o', linestyle='None', markersize=7, color=theme['blue'], label='GLRMask'),
                  Line2D([], [], marker='s', linestyle='None', markersize=7, color=theme['gray'], label='LLGuidance'),
              ]
              axis.legend(
                  handles=legend,
                  loc='upper right',
                  frameon=False,
                  ncol=2,
                  bbox_to_anchor=(1, 1.12),
                  handletextpad=0.45,
                  columnspacing=1.15,
                  labelcolor=theme['text'],
              )
              fig.subplots_adjust(left=0.14, right=0.92, top=0.80, bottom=0.14)
              save_webp(fig, assets / f'{name}{suffix}.webp', theme['bg'])

          for suffix, theme in [('', LIGHT), ('-dark', DARK)]:
              render_tail(theme, suffix)
              render_summary(theme, suffix, 'mask')
              render_summary(theme, suffix, 'compile')

          expected = [
              'benchmark-mask-tail-2026-07-16.webp',
              'benchmark-mask-tail-2026-07-16-dark.webp',
              'benchmark-mask-summary-2026-07-16.webp',
              'benchmark-mask-summary-2026-07-16-dark.webp',
              'benchmark-compilation-summary-2026-07-16.webp',
              'benchmark-compilation-summary-2026-07-16-dark.webp',
          ]
          for filename in expected:
              path = assets / filename
              with Image.open(path) as image:
                  image.verify()
              if path.stat().st_size < 20_000:
                  raise SystemExit(f'implausibly small output: {path}')
              print(filename, path.stat().st_size)
          PY
      - name: Commit figures
        run: |
          rm -f \
            .github/workflows/render-final-benchmark-plots.yml \
            .github/workflows/upload-benchmark-plot-preview.yml \
            TEMP-plot-inspection.txt \
            TEMP-render.log \
            TEMP-render-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Polish README benchmark figures"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
