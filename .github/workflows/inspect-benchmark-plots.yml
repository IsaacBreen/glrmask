name: Render polished benchmark figures

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - name: Run renderer with diagnostics
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr
          python -m pip install --disable-pip-version-check pillow numpy matplotlib opencv-python-headless pytesseract
          python <<'PY'
          from pathlib import Path
          import subprocess

          source = subprocess.check_output([
              'git', 'show',
              'b2f13cfeae607a38c5d2465cb7041bf71e3ee30a:.github/workflows/inspect-benchmark-plots.yml',
          ], text=True)
          marker = "          python <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          code = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/render_readme_benchmarks.py').write_text(code)

          readme = Path('README.md')
          text = readme.read_text()
          current_warning = '> **Preliminary:** these timings are not yet accurate and should not be relied on.\n\n'
          expected_warning = '> **Preliminary:** this engineering run spans three GLRMask revisions. The comparisons below use only coverage-matched GLRMask and LLGuidance observations; see the [full benchmark report](docs/benchmark-full-corpus-2026-07-16.md) for methodology and limitations.\n\n'
          if current_warning not in text:
              raise SystemExit('current preliminary warning not found')
          text = text.replace(current_warning, expected_warning)
          injected = (
              'GLRMask shifts work into ahead-of-time compilation. In this run, that made compilation substantially slower than LLGuidance, while keeping mask generation in the low-microsecond range across the measured distribution and widening the latency advantage in the tail.\n\n'
              '<p align="center"><em>Full paired tail over 2,122,307 shared finite token positions. The lower panel is LLGuidance latency divided by GLRMask latency.</em></p>\n\n'
              'The figure gives a fuller percentile view; the table preserves the headline values exactly. Lower is better.\n\n'
          )
          if '## Installation' not in text:
              raise SystemExit('installation heading not found')
          readme.write_text(text.replace('## Installation', injected + '## Installation', 1))
          PY
          status=0
          python /tmp/render_readme_benchmarks.py > TEMP-render.log 2>&1 || status=$?
          cat TEMP-render.log
          echo "$status" > TEMP-render-status.txt
      - name: Commit result or diagnostics
        run: |
          status="$(cat TEMP-render-status.txt)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$status" = 0 ]; then
            rm -f .github/workflows/inspect-benchmark-plots.yml TEMP-plot-inspection.txt TEMP-render.log TEMP-render-status.txt
            git add -A
            git diff --cached --check
            git commit -m "Polish README benchmark figures"
          else
            git add -f TEMP-render.log TEMP-render-status.txt
            git commit -m "Record benchmark render failure"
          fi
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
